<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tubewar — 사이버 공방전 플랫폼</title>
    <!-- Google Identity Services — 구글 로그인 버튼/ID 토큰 발급 (GOOGLE_CLIENT_ID 설정 시에만 동작) -->
    <script src="https://accounts.google.com/gsi/client" async></script>
    <!-- Mermaid (로컬 벤더링, npm 레지스트리 미접근 환경 대응) — 강의 다이어그램 그래픽 렌더링
         /vendor/ 경로 사용: 루트 직속 파일명이 vite 프록시 prefix(/me 등)와 충돌하는 것을 회피 -->
    <script src="/vendor/mermaid.min.js"></script>
    <script>
      if (window.mermaid) window.mermaid.initialize({
        startOnLoad: false, theme: 'dark', securityLevel: 'loose',
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
