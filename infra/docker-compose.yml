# tubewar 개발 인프라 — postgres 단일 (Phase 1).
# Phase 3+ 에서 별도 ollama 추가 예정.
services:
  postgres:
    image: postgres:15
    container_name: tubewar-postgres
    environment:
      POSTGRES_DB: tubewar
      POSTGRES_USER: tubewar
      POSTGRES_PASSWORD: tubewar
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - tubewar-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubewar -d tubewar"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  tubewar-pg:
