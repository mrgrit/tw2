  - order: 10
    instruction: |
      ## 🎯 미션 — 실습 룰·객체 정리 (cleanup, 필수)

      실습으로 추가한 룰(악성 IP 차단, SSH rate limit, DNAT, @blocklist)과 객체(blocklist 그룹)를
      모두 삭제해 방화벽을 원래 상태로 되돌린다. 콘솔의 **룰 관리 / NAT / 객체** 화면의 "삭제"
      버튼으로도 가능하다. (객체는 그것을 참조하는 룰을 먼저 지워야 삭제된다.)

      ## 💻 정리 명령 (방화벽 장비에서)
      방화벽 장비에서 `nft -j`(JSON) 로 룰셋을 읽어, 실습으로 넣은 룰만 handle 로 골라 삭제한다
      (베이스라인 룰은 건드리지 않는다). 룰을 먼저 지운 뒤 그룹(set)을 지운다.
      ```bash
      sudo python3 - <<'PYEOF'
      import json, subprocess as sp
      rs = json.loads(sp.check_output(["nft","-j","list","ruleset"]))
      n = 0
      for o in rs["nftables"]:
          r = o.get("rule")
          if not r: continue
          s = json.dumps(r)
          # 실습 룰만: 악성IP차단 / DNAT8088 / @blocklist / SSH rate limit
          if ("192.168.0.202" in s) or ("8088" in s) or ("blocklist" in s) or ("limit" in s):
              sp.call(["nft","delete","rule",r["family"],r["table"],r["chain"],"handle",str(r["handle"])]); n += 1
      sp.call(["nft","delete","set","inet","six_filter","blocklist"], stderr=sp.DEVNULL)
      print("cleanup done deleted=%d" % n)
      PYEOF
      ```
