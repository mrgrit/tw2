lab_id: secuops-easy-week04
title: "W04 — IPS 침해대응 30: 공격별 탐지룰 작성 실전"
version: standalone-easy
course: secuops-easy
week: 4
description: |
  IPS 장비(`ips`, `10.20.31.2`)에 SSH 로 접속해 공격 유형별(웹/스캔/심화) 탐지룰을 직접 작성하는 실전이다.
  대표 유형(sqlmap UA / SSH 무차별대입 threshold / DNS / pcre / classtype)의 룰을 `sudo tee -a local.rules`
  + `suricatasc -c reload-rules` 로 만들어 적용하고, 룰이 올바르게 로딩·구성됐는지 확인한다. 마지막에 실제
  sqlmap 도구로 공격해 탐지를 실증하고 실습 룰(sid 9000000+)을 정리한다. (`ssh ccc@10.20.31.2` 비번 `1`.)
difficulty: easy
duration_minutes: 150
audience: 보안 솔루션 운영 입문자 (4주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - IPS 장비 접속 가능 (`ssh ccc@10.20.31.2`, 비번 `1`, sudo 보유) + 공격 VM `ssh att@192.168.0.202`
  - W04 강의안 정독 — 그룹별 탐지 전략, 좋은 룰 4원칙 / W03 실습 완료
objectives:
  - "웹 공격을 버퍼+content 로 탐지하는 룰을 작성한다"
  - "스캔/무차별대입을 threshold(by_src)로 탐지한다"
  - "dns.query·pcre·classtype 를 활용한 룰을 작성한다"
  - "각 룰이 올바르게 로딩·구성됐는지 확인한다"
  - "공격 재현으로 실제 탐지를 확인하고 실습 룰을 정리한다"
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 실습 준비: 룰 파일 접근 + 현재 룰 확인

      이번 주는 공격 유형별(웹/스캔/심화) 탐지룰을 **직접 작성**하는 실전이다. IPS 장비의 학생 룰
      파일 `local.rules` 에 룰을 넣고 reload 하며 익힌다. 먼저 그 파일에 접근되는지와 현재 몇 개의
      룰이 있는지 확인한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # IPS 장비 접속 (비밀번호: 1)
      ssh ccc@10.20.31.2

      # 학생 룰 파일과 현재 활성 룰 수 확인
      ls -l /etc/suricata/rules/local.rules
      grep -cE '^(alert|drop)' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      `local.rules` 파일이 보이고 접근된다.
    hint: 'ssh ccc@10.20.31.2 → ls -l /etc/suricata/rules/local.rules'
    answer: |
      # 학생 룰 파일 접근 + 현재 룰 수 확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'ls -l /etc/suricata/rules/local.rules; echo -n "current rules: "; grep -cE "^(alert|drop)" /etc/suricata/rules/local.rules'
    answer_detail: "local.rules 가 학생이 룰을 추가·삭제하는 파일. 여기에 rule 을 tee -a 로 넣고 suricatasc reload-rules 로 적용하며, 웹/스캔/심화 공격 유형별 탐지룰을 이번 주에 직접 만든다."
    verify:
      type: output_contains
      expect: local.rules
      field: stdout
      semantic:
        intent: "학생 룰 파일 접근 확인 — 이번 주 룰 작성 실습의 준비"
        success_criteria: ["local.rules 접근 가능", "현재 룰 수 확인"]

  - order: 2
    instruction: |
      ## 🎯 미션 — [웹] sqlmap 스캐너 탐지 (ips-s08)

      User-Agent 에 `sqlmap` 이 보이면 탐지. 폼: 버퍼 `http.user_agent`, content `sqlmap`, nocase,
      flow `to_server`. 적용 후 ips-s08 을 검증한다(`ok: true`면 통과).

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # sqlmap UA 탐지룰을 local.rules 에 추가 + reload
      echo 'alert http any any -> any any (msg:"EDU s08 sqlmap"; flow:to_server; http.user_agent; content:"sqlmap"; nocase; sid:9000008; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules"

      # 내 룰이 등록됐는지 확인
      grep -o 'sid:9000008' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      룰이 로딩되고 `sid:9000008` 이 등록된다.
    hint: 'http.user_agent + content sqlmap → tee -a local.rules → reload → grep 9000008'
    answer: |
      # sqlmap UA 탐지룰 작성·적용·확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'echo "alert http any any -> any any (msg:\"EDU s08 sqlmap\"; flow:to_server; http.user_agent; content:\"sqlmap\"; nocase; sid:9000008; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000008" /etc/suricata/rules/local.rules | head -1'
    answer_detail: "http.user_agent 버퍼 + content sqlmap + nocase. 도구 핑거프린트(sqlmap UA)는 User-Agent 버퍼에서 잡는다. reload 후 sid:9000008 이 등록되면 로딩 성공."
    verify:
      type: output_contains
      expect: "9000008"
      field: stdout
      semantic:
        intent: "도구 핑거프린트(UA)를 정확한 버퍼로 탐지 — 버퍼 선택의 중요성"
        success_criteria: ["http.user_agent 버퍼 사용", "content sqlmap + nocase", "룰 로딩(sid:9000008)"]

  - order: 3
    instruction: |
      ## 🎯 미션 — [스캔] SSH 무차별 대입 (ips-s20, threshold)

      tcp 22번으로 같은 출처가 60초 10회 초과 연결이면 탐지. 폼: proto `tcp`, dport `22`,
      threshold count `10`, seconds `60`, track `by_src`, type `both`. 적용 후 ips-s20 검증.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # SSH 무차별대입 탐지룰(threshold by_src) 추가 + reload
      echo 'alert tcp any any -> any 22 (msg:"EDU s20 ssh brute"; threshold:type both, track by_src, count 10, seconds 60; sid:9000020; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules"
      grep -o 'sid:9000020' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      룰이 로딩되고 `sid:9000020` 이 등록된다.
    hint: 'tcp dport 22 + threshold by_src → tee -a → reload → grep 9000020'
    answer: |
      # SSH 무차별대입 threshold 탐지룰 작성·적용·확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'echo "alert tcp any any -> any 22 (msg:\"EDU s20 ssh brute\"; threshold:type both, track by_src, count 10, seconds 60; sid:9000020; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000020" /etc/suricata/rules/local.rules | head -1'
    answer_detail: "단발 SSH 연결은 정상 → threshold(track by_src, 60s 10회 초과)로 무차별 대입만 탐지한다. 포트는 헤더 dport 22. 빈도 기반 탐지로 정상 사용자를 오탐하지 않는다."
    verify:
      type: output_contains
      expect: "9000020"
      field: stdout
      semantic:
        intent: "빈도 기반(threshold) 탐지 — 단발 정상, 폭주만 탐지하는 전략"
        success_criteria: ["tcp dport 22", "threshold track by_src", "룰 로딩(sid:9000020)"]

  - order: 4
    instruction: |
      ## 🎯 미션 — [심화] 의심 도메인 DNS 탐지 (ips-s25, dns.query)

      DNS 질의 도메인에 `.xyz` 가 보이면 탐지. 폼: proto `dns`, 버퍼 `dns.query`, content `.xyz`,
      nocase. 적용 후 ips-s25 검증.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 의심 TLD(.xyz) DNS 질의 탐지룰 추가 + reload
      echo 'alert dns any any -> any any (msg:"EDU s25 dns xyz"; dns.query; content:".xyz"; nocase; sid:9000025; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules"
      grep -o 'sid:9000025' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      룰이 로딩되고 `sid:9000025` 이 등록된다.
    hint: 'proto dns + dns.query 버퍼 + content .xyz → tee -a → reload → grep 9000025'
    answer: |
      # DNS(.xyz) 탐지룰 작성·적용·확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'echo "alert dns any any -> any any (msg:\"EDU s25 dns xyz\"; dns.query; content:\".xyz\"; nocase; sid:9000025; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000025" /etc/suricata/rules/local.rules | head -1'
    answer_detail: "dns.query 버퍼로 조회 도메인을 검사. 의심 TLD(.xyz)는 C2 의 단골. HTTP 외 프로토콜(DNS)도 전용 버퍼가 있다 — 버퍼는 http 만이 아니다."
    verify:
      type: output_contains
      expect: "9000025"
      field: stdout
      semantic:
        intent: "HTTP 외 프로토콜(DNS)도 전용 버퍼로 탐지 — 버퍼의 폭 이해"
        success_criteria: ["proto dns", "dns.query 버퍼", "룰 로딩(sid:9000025)"]

  - order: 5
    instruction: |
      ## 🎯 미션 — [심화] 정규식 패턴 탐지 (ips-s29, pcre)

      content 로 못 잡는 "형태"(13~16자리 숫자)를 pcre 로 잡는다. 폼: 버퍼 `http.uri`, pcre 칸에
      `/\d{13,16}/`. 적용 후 ips-s29 검증.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 카드번호 형태(13~16자리) pcre 탐지룰 추가 + reload
      echo 'alert http any any -> any any (msg:"EDU s29 cc pattern"; http.uri; pcre:"/\d{13,16}/"; sid:9000029; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules"
      grep -o 'sid:9000029' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      룰이 로딩되고 `sid:9000029` 이 등록된다.
    hint: 'http.uri + pcre:"/\d{13,16}/" → tee -a → reload → grep 9000029'
    answer: |
      # pcre(카드번호 형태) 탐지룰 작성·적용·확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'echo "alert http any any -> any any (msg:\"EDU s29 cc pattern\"; http.uri; pcre:\"/\d{13,16}/\"; sid:9000029; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000029" /etc/suricata/rules/local.rules | head -1'
    answer_detail: 'pcre /\d{13,16}/ = 13~16자리 연속 숫자(카드 형태). content 로 못 잡는 가변 패턴을 정규식(pcre)으로 잡는다 — content 의 한계를 보완하는 형태 기반 탐지.'
    verify:
      type: output_contains
      expect: "9000029"
      field: stdout
      semantic:
        intent: "정규식(pcre)으로 형태 기반 탐지 — content 의 한계 보완"
        success_criteria: ["pcre 사용", "http.uri 버퍼", "룰 로딩(sid:9000029)"]

  - order: 6
    instruction: |
      ## 🎯 미션 — [종합] 단계 분류 (ips-s30, classtype)

      정찰(sqlmap UA)을 잡되 `classtype:attempted-recon` 으로 분류해 kill-chain 초입을 표시한다.
      폼: 버퍼 `http.user_agent`, content `sqlmap`, nocase, classtype `attempted-recon`. 적용 후
      ips-s30 검증.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 정찰(sqlmap UA)을 classtype:attempted-recon 으로 분류하는 룰 추가 + reload
      echo 'alert http any any -> any any (msg:"EDU s30 recon sqlmap"; flow:to_server; http.user_agent; content:"sqlmap"; nocase; classtype:attempted-recon; sid:9000030; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules"
      grep -o 'sid:9000030' /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      룰이 로딩되고 `sid:9000030` 이 등록된다.
    hint: 'classtype:attempted-recon 추가 → tee -a → reload → grep 9000030'
    answer: |
      # classtype 분류 탐지룰 작성·적용·확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'echo "alert http any any -> any any (msg:\"EDU s30 recon sqlmap\"; flow:to_server; http.user_agent; content:\"sqlmap\"; nocase; classtype:attempted-recon; sid:9000030; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000030" /etc/suricata/rules/local.rules | head -1'
    answer_detail: "classtype 로 공격 단계(정찰)를 분류 → SOC 가 우선순위를 매길 수 있다. kill-chain 초입(정찰)을 조기 경보하는 다단계 방어."
    verify:
      type: output_contains
      expect: "9000030"
      field: stdout
      semantic:
        intent: "classtype 로 공격 단계를 분류 — kill-chain 초입 탐지와 우선순위"
        success_criteria: ["classtype:attempted-recon", "정찰 단계 탐지", "룰 로딩(sid:9000030)"]

  - order: 7
    instruction: |
      ## 🎯 미션 — 실제 도구로 공격해 탐지 확인

      방금 만든 sqlmap UA 탐지 룰들이 진짜 잡는지, **실제 sqlmap 도구**로 확인한다. 내 공격 VM
      (`192.168.0.202`)에서 sqlmap 을 juice 에 돌리면 sqlmap 이 자기 User-Agent(`sqlmap/...`)를 실어
      보내고, 그걸 내 http.user_agent 룰이 잡는다. 그다음 IPS 장비 `eve.json` 에서 alert 를 본다.

      ## 💻 실행 명령
      ```bash
      # ① 내 공격 VM 에서 sqlmap 실행 (자연 URL, 도구가 sqlmap UA 를 실어 보냄)
      ssh att@192.168.0.202
      sqlmap -u 'http://juice.el34.lab/?id=1' --batch --flush-session

      # ② IPS 장비 eve.json 에서 sqlmap 탐지 alert 확인
      ssh ccc@10.20.31.2
      tail -400 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and (.alert.signature|test("sqlmap";"i")))|.alert.signature' | sort | uniq -c
      ```
      ## ✅ 합격 기준
      IPS eve.json 의 alert 에 `sqlmap` signature(내 룰 EDU s08/s30)가 보인다.
    hint: 'sqlmap 실행(자연 URL) → IPS eve.json 에서 sqlmap alert'
    answer: |
      # ① 공격 VM(202)에서 실제 sqlmap 도구로 공격 (sqlmap UA 유발)
      ssh att@192.168.0.202 "timeout 40 sqlmap -u 'http://juice.el34.lab/?id=1' --batch --flush-session >/dev/null 2>&1; echo sent"
      # ② IPS 장비 eve.json 에서 내 룰이 잡은 sqlmap alert 확인
      ssh ccc@10.20.31.2 "sleep 2; tail -500 /var/log/suricata/eve.json | jq -rc 'select(.event_type==\"alert\" and (.alert.signature|test(\"sqlmap\";\"i\")))|.alert.signature' | tail -3"
    answer_detail: "실제 sqlmap 도구가 자기 User-Agent(sqlmap/...)를 실어 보내면, 내가 만든 http.user_agent content:sqlmap 룰(EDU s08/s30)이 eve.json 에 alert 로 남긴다 — 도구로 공격하고 로그로 탐지를 확인하는 실전 흐름."
    verify:
      type: output_contains
      expect: sqlmap
      field: stdout
      semantic:
        intent: "작성한 룰이 실제 트래픽을 탐지함을 eve.json 으로 확인 — 룰의 실효성 검증"
        success_criteria: ["sqlmap 공격 재현", "eve alert 에 signature", "내 룰의 탐지 확인"]

  - order: 8
    instruction: |
      ## 🎯 미션 — 실습 룰 정리 (cleanup, 필수)

      실습으로 만든 룰(sid 9000000 이상)을 모두 삭제해 IPS 를 원래 상태로 되돌린다. 기본 룰
      (1000000번대)은 보존한다. (과제로 30개를 다 풀 때도 끝나면 이 정리를 실행한다.)

      ## 💻 정리 명령 (IPS 장비에서)
      ```bash
      # 실습 룰(sid 9xxxxxx)만 local.rules 에서 삭제 + reload
      sudo sed -i -E '/sid:9[0-9]{6}/d' /etc/suricata/rules/local.rules
      sudo suricatasc -c "reload-rules" >/dev/null; echo "cleanup done"
      ```
      ## ✅ 합격 기준
      실습 룰이 모두 삭제되어 `cleanup done` 이 보인다.
    hint: "sudo sed -i -E '/sid:9[0-9]{6}/d' local.rules; suricatasc reload-rules → cleanup done"
    answer: |
      # 실습 룰(sid 9xxxxxx)만 삭제 + reload (IPS 장비에서)
      ssh ccc@10.20.31.2 "sudo sed -i -E '/sid:9[0-9]{6}/d' /etc/suricata/rules/local.rules; sudo suricatasc -c 'reload-rules' >/dev/null; echo 'cleanup done'"
    answer_detail: "sid 가 9로 시작하는 7자리(9000000 이상) 실습 룰만 local.rules 에서 지우고 reload. 기본 룰(1000000번대)은 보존된다 — 실습 후 IPS 룰셋을 원상 복구하는 운영 위생."
    verify:
      type: output_contains
      expect: cleanup done
      field: stdout
      semantic:
        intent: "실습 후 룰셋 원상 복구 — 운영 위생"
        success_criteria: ["edu 룰 전부 삭제", "기본 룰 보존", "loaded 기본값 복귀"]
