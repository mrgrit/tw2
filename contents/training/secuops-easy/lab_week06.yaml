lab_id: secuops-easy-week06
title: "W06 — WAF 침해대응 30 + 종합: 세 장비가 함께 막는다"
version: standalone-easy
course: secuops-easy
week: 6
description: |
  WAF 콘솔(192.168.136.145:8083)의 침해대응 훈련 30 SecRule 작성 시나리오를 푼다(대표 5개 + 과제
  20개 이상). transform·@pm·deny/pass 를 두루 연습한다. 마지막 종합 capstone 에서는 같은 공격 하나를
  보내고 방화벽(conntrack)·IPS(eve.json alert)·WAF(audit 403) 세 장비의 흔적을 한 번에 확인해 심층
  방어를 종합한다. 끝나면 실습 룰을 정리한다. 세 콘솔(8081/8082/8083)을 모두 사용한다.
difficulty: easy
duration_minutes: 150
audience: 보안 솔루션 운영 입문자 (6주차, 최종)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - el34 호스트 브라우저에서 세 콘솔(8081/8082/8083) 접속 가능
  - W06 강의안 정독 — 그룹별 전략, transform, deny/pass, 세 장비 종합 / W01~W05 실습 완료
objectives:
  - "WAF 시나리오를 변수+연산자+transform 으로 작성·검증한다"
  - "transform(urlDecodeUni/lowercase)으로 우회를 막는다"
  - "deny(차단)와 pass(탐지)를 구분해 적용한다"
  - "같은 공격을 방화벽·IPS·WAF 세 장비에서 추적한다(capstone)"
  - "실습 룰을 정리한다"
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — WAF 침해대응 30 목록 확인

      **침해대응 훈련** 메뉴에서 30개 시나리오(주입 1-10 / 스캐너·경로 11-20 / 심화 21-30)를 훑는다.

      ## 💻 확인 명령
      ```bash
      curl -s http://192.168.136.145:8083/api/scenarios
      ```
      ## ✅ 합격 기준
      목록에 `waf-s30` 까지 보인다.
    hint: 'GET /api/scenarios — waf-s01 ~ waf-s30'
    answer: |
      curl -s http://192.168.136.145:8083/api/scenarios
    answer_detail: "30개 시나리오(waf-s01~s30), 3그룹(주입/스캐너·경로/심화)."
    verify:
      type: output_contains
      expect: waf-s30
      field: stdout
      semantic:
        intent: "30개 WAF 시나리오 구성 파악"
        success_criteria: ["30개 확인", "3그룹 구분"]

  - order: 2
    instruction: |
      ## 🎯 미션 — [주입] SQLi UNION 차단 (waf-s01)

      변수 `REQUEST_URI`, 연산자 `@rx`, 패턴 `union.+select`, transform `lowercase`, action `deny`.
      적용 후 waf-s01 검증.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_URI \"@rx union.+select\" \"id:9000001,phase:2,t:lowercase,deny,status:403,log,msg:'\''EDU s01 sqli'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s01"}'
      ```
      ## ✅ 합격 기준
      검증 결과가 `"ok": true` 다.
    hint: 'REQUEST_URI @rx union.+select + lowercase + deny → scenario/check waf-s01'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_URI \"@rx union.+select\" \"id:9000001,phase:2,t:lowercase,deny,status:403,log,msg:'\''EDU s01 sqli'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s01"}'
    answer_detail: "@rx + t:lowercase 로 UnIoN 우회까지 차단. waf-s01 통과(ok=true)."
    verify:
      type: output_contains
      expect: '"ok": true'
      field: stdout
      semantic:
        intent: "SQLi 를 정규식+변환으로 차단 — @rx, t:lowercase"
        success_criteria: ["REQUEST_URI @rx", "t:lowercase", "waf-s01 통과"]

  - order: 3
    instruction: |
      ## 🎯 미션 — [주입] 경로탐색 + 인코딩 우회 (waf-s06, transform)

      변수 `REQUEST_URI`, 연산자 `@contains`, 패턴 `../`, transform `urlDecodeUni`, action `deny`.
      `..%2f` 같은 인코딩을 디코딩 후 잡는다. 적용 후 waf-s06 검증.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_URI \"@contains ../\" \"id:9000006,phase:2,t:urlDecodeUni,deny,status:403,log,msg:'\''EDU s06 traversal'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s06"}'
      ```
      ## ✅ 합격 기준
      검증 결과가 `"ok": true` 다.
    hint: 'urlDecodeUni 가 핵심 → scenario/check waf-s06'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_URI \"@contains ../\" \"id:9000006,phase:2,t:urlDecodeUni,deny,status:403,log,msg:'\''EDU s06 traversal'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s06"}'
    answer_detail: "t:urlDecodeUni 없으면 %2f 우회됨. 변환이 인코딩 우회를 무력화 — WAF 의 슈퍼파워."
    verify:
      type: output_contains
      expect: '"ok": true'
      field: stdout
      semantic:
        intent: "인코딩 우회를 transform 으로 차단 — WAF 의 슈퍼파워"
        success_criteria: ["@contains ../", "t:urlDecodeUni", "waf-s06 통과"]

  - order: 4
    instruction: |
      ## 🎯 미션 — [스캐너] 다수 도구 한 번에 (waf-s13, @pm)

      변수 `REQUEST_HEADERS:User-Agent`, 연산자 `@pm`, 패턴 `sqlmap nikto nmap gobuster`, transform
      `lowercase`, action `deny`. 적용 후 waf-s13 검증.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_HEADERS:User-Agent \"@pm sqlmap nikto nmap gobuster\" \"id:9000013,phase:1,t:lowercase,deny,status:403,log,msg:'\''EDU s13 scanners'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s13"}'
      ```
      ## ✅ 합격 기준
      검증 결과가 `"ok": true` 다.
    hint: '@pm 으로 여러 문구 한 번에 → scenario/check waf-s13'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_HEADERS:User-Agent \"@pm sqlmap nikto nmap gobuster\" \"id:9000013,phase:1,t:lowercase,deny,status:403,log,msg:'\''EDU s13 scanners'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s13"}'
    answer_detail: "@pm = 여러 문구 고속 다중 매칭. 스캐너 목록 관리에 적합."
    verify:
      type: output_contains
      expect: '"ok": true'
      field: stdout
      semantic:
        intent: "@pm 으로 다중 시그니처를 한 룰로 — 연산자 선택"
        success_criteria: ["@pm 사용", "User-Agent 변수", "waf-s13 통과"]

  - order: 5
    instruction: |
      ## 🎯 미션 — [운영] 탐지 전용(pass) 모드 (waf-s27)

      새 룰은 바로 차단하지 말고 먼저 탐지만 한다. 변수 `ARGS`, 연산자 `@contains`, 패턴
      `test_pattern_xyz`, action `pass`, severity `NOTICE`. 적용 후 waf-s27 검증.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule ARGS \"@contains test_pattern_xyz\" \"id:9000027,phase:2,t:none,pass,log,msg:'\''EDU s27 detect-only'\'',severity:'\''NOTICE'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s27"}'
      ```
      ## ✅ 합격 기준
      검증 결과가 `"ok": true` 다.
    hint: 'action=pass(탐지/로그만) → scenario/check waf-s27'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule ARGS \"@contains test_pattern_xyz\" \"id:9000027,phase:2,t:none,pass,log,msg:'\''EDU s27 detect-only'\'',severity:'\''NOTICE'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s27"}'
    answer_detail: "pass = 매칭해도 통과시키고 로그만. 신규 룰은 pass→관찰→deny 순서가 안전."
    verify:
      type: output_contains
      expect: '"ok": true'
      field: stdout
      semantic:
        intent: "pass(탐지)와 deny(차단)의 차이 — 안전한 룰 도입 절차"
        success_criteria: ["action=pass", "오탐 관찰 의도", "waf-s27 통과"]

  - order: 6
    instruction: |
      ## 🎯 미션 — [우회] 이중 인코딩 (waf-s28, transform 2개)

      변수 `ARGS`, 연산자 `@contains`, 패턴 `script`, transform `urlDecodeUni`+`lowercase`(둘 다),
      action `deny`. 변환을 여러 개 순서대로 적용한다. 적용 후 waf-s28 검증.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule ARGS \"@contains script\" \"id:9000028,phase:2,t:urlDecodeUni,t:lowercase,deny,status:403,log,msg:'\''EDU s28 double-enc'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s28"}'
      ```
      ## ✅ 합격 기준
      검증 결과가 `"ok": true` 다.
    hint: 'transform 2개(urlDecodeUni, lowercase) → scenario/check waf-s28'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule ARGS \"@contains script\" \"id:9000028,phase:2,t:urlDecodeUni,t:lowercase,deny,status:403,log,msg:'\''EDU s28 double-enc'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/scenario/check -d '{"id":"waf-s28"}'
    answer_detail: "변환을 순서대로(urlDecodeUni→lowercase) 적용해 이중 인코딩 우회 차단."
    verify:
      type: output_contains
      expect: '"ok": true'
      field: stdout
      semantic:
        intent: "다중 transform 으로 고급 우회 차단 — 변환 순서 이해"
        success_criteria: ["transform 2개", "@contains script", "waf-s28 통과"]

  - order: 7
    instruction: |
      ## 🎯 종합 capstone — 한 공격, 세 장비의 흔적

      6주의 마무리다. 공격자가 **sqlmap UA + SQLi(UNION)**로 한 번 공격하면, 그 흔적이 세 장비에
      동시에 남는다. 한 번에 확인해 심층 방어를 종합한다.
      - **WAF**: sqlmap/SQLi 룰에 걸려 403 차단
      - **IPS**: eve.json 에 sqlmap/UNION alert
      - **방화벽**: conntrack 에 공격자 연결 기록

      ## 💻 확인 명령
      ```bash
      # ① WAF 에 sqlmap 차단 룰
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_HEADERS:User-Agent \"@contains sqlmap\" \"id:9000099,phase:1,t:lowercase,deny,status:403,log,msg:'\''EDU capstone'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      # ② 공격자 → sqlmap UA + SQLi(UNION)
      W=$(docker exec el34-attacker curl -s -o /dev/null -w "%{http_code}" -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?q=1%20UNION%20SELECT%201")
      sleep 3
      # ③ 세 장비 흔적 수집(jq 없이)
      I=$(curl -s "http://192.168.136.145:8082/api/eve?type=alert&n=50" | grep -ci "sqlmap\|union")
      F=$(curl -s "http://192.168.136.145:8081/api/conntrack" | grep -o '"count":[0-9]*' | head -1)
      A=$(curl -s "http://192.168.136.145:8083/api/audit?n=30&blocked=1" | grep -c '"status": 403')
      echo "capstone WAF=$W IPS_alerts=$I FW_$F WAF_blocks=$A"
      ```
      ## ✅ 합격 기준
      출력에 `WAF=403` 이 보인다(세 장비 흔적: WAF 차단 + IPS alert + FW 연결).
    hint: '한 공격 → WAF 403 + IPS alert + FW conntrack. expect: WAF=403'
    answer: |
      curl -s -X POST -H "Content-Type: application/json" http://192.168.136.145:8083/api/rule/apply -d '{"rule":"SecRule REQUEST_HEADERS:User-Agent \"@contains sqlmap\" \"id:9000099,phase:1,t:lowercase,deny,status:403,log,msg:'\''EDU capstone'\'',severity:'\''CRITICAL'\''\""}' >/dev/null
      W=$(docker exec el34-attacker curl -s -o /dev/null -w "%{http_code}" -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?q=1%20UNION%20SELECT%201")
      sleep 3
      I=$(curl -s "http://192.168.136.145:8082/api/eve?type=alert&n=50" | grep -ci "sqlmap\|union")
      F=$(curl -s "http://192.168.136.145:8081/api/conntrack" | grep -o '"count":[0-9]*' | head -1)
      A=$(curl -s "http://192.168.136.145:8083/api/audit?n=30&blocked=1" | grep -c '"status": 403')
      echo "capstone WAF=$W IPS_alerts=$I FW_$F WAF_blocks=$A"
    answer_detail: "세 장비 흔적: WAF=403(웹 차단)+IPS alert(네트워크 패턴)+FW conntrack(연결). 모두 같은 SIEM(10.20.32.100)으로 모임 — 분석가 한 화면 상관분석. 호스트 행위는 el34-sysmon-host 가 보충."
    verify:
      type: output_contains
      expect: WAF=403
      field: stdout
      semantic:
        intent: "한 공격을 세 장비에서 동시 추적 — 심층 방어 종합(6주 finale)"
        success_criteria:
          - "WAF 403 차단 (sqlmap UA)"
          - "IPS eve alert (sqlmap/union)"
          - "FW conntrack 연결 기록"
          - "세 흔적이 SIEM 으로 모임을 이해"

  - order: 8
    instruction: |
      ## 🎯 미션 — 실습 룰 정리 (cleanup, 필수, 최종)

      WAF 콘솔의 실습 SecRule(id 9000000+)을 모두 삭제한다. (IPS/방화벽에는 capstone 에서 룰을
      추가하지 않았다 — 기본 룰이 탐지했을 뿐.) 호스트에 jq 가 없으므로 python3 로 처리한다.

      ## 💻 정리 명령
      ```bash
      python3 -c '
      import json, urllib.request as u
      B="http://192.168.136.145:8083"
      def post(p,o):
          r=u.Request(B+p,data=json.dumps(o).encode(),headers={"Content-Type":"application/json"})
          return u.urlopen(r,timeout=8).read().decode()
      rs=json.load(u.urlopen(B+"/api/rules",timeout=8))
      n=0
      for r in rs.get("rules",[]):
          rid=str(r.get("id",""))
          if rid: post("/api/rule/delete",{"id":rid}); n+=1
      print("cleanup done deleted=%d"%n)
      '
      ```
      ## ✅ 합격 기준
      실습 룰이 모두 삭제되어 `cleanup done` 이 보인다.
    hint: 'python3 로 WAF edu 룰 일괄 삭제 → cleanup done'
    answer: |
      python3 -c '
      import json, urllib.request as u
      B="http://192.168.136.145:8083"
      def post(p,o):
          r=u.Request(B+p,data=json.dumps(o).encode(),headers={"Content-Type":"application/json"})
          return u.urlopen(r,timeout=8).read().decode()
      rs=json.load(u.urlopen(B+"/api/rules",timeout=8))
      n=0
      for r in rs.get("rules",[]):
          rid=str(r.get("id",""))
          if rid: post("/api/rule/delete",{"id":rid}); n+=1
      print("cleanup done deleted=%d"%n)
      '
    answer_detail: "edu_rules.conf 의 모든 GUI 룰(id>=9000000) 삭제 → graceful reload. CRS/기본 보호는 유지. 특강 종료 — 운영 위생."
    verify:
      type: output_contains
      expect: cleanup done
      field: stdout
      semantic:
        intent: "특강 종료 — 모든 실습 룰 원상 복구(운영 위생)"
        success_criteria: ["WAF edu 룰 전부 삭제", "CRS 보호 유지"]
