lab_id: secuops-easy-week03
title: "W03 — IPS(Suricata) 콘솔 실습: 룰 구조·작성·탐지 확인"
version: standalone-easy
course: secuops-easy
week: 3
description: |
  IPS 장비(`ips`, `10.20.31.2`)에 직접 SSH 접속해 Suricata 탐지룰을 배운다. 실제 룰 파일을 읽어 구조를
  분해하고, 편집기(`sudo nano local.rules`)로 탐지룰을 직접 써넣고 `suricatasc -c reload-rules` 로 무중단
  적용한다(로딩 성공/실패 즉시 확인). 그다음 내 공격 VM(`192.168.0.202`)에서 sqlmap 으로 공격을 재현해
  eve.json 에서 내 룰의 alert 가 잡히는지 확인하고, 룰 구성을 자가 검증한 뒤 실습 룰(sid 9000000+)을
  정리한다. IPS 룰은 alert(탐지)라서 트래픽을 막지 않는다. (`ssh ccc@10.20.31.2` 비번 `1`, 관리는 `sudo`.)
difficulty: easy
duration_minutes: 120
audience: 보안 솔루션 운영 입문자 (3주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - IPS 장비 접속 가능 (`ssh ccc@10.20.31.2`, 비번 `1`, sudo 보유) + 공격 VM `ssh att@192.168.0.202`
  - W03 강의안 정독 — 헤더+옵션, 탐지 버퍼, HOME_NET / W01~W02 실습 완료
objectives:
  - "IPS 장비에서 Suricata 가동/로딩 룰 수/HOME_NET 을 확인한다"
  - "탐지룰을 헤더+옵션으로 분해해 이해한다"
  - "sudo tee + suricatasc reload 로 탐지룰을 직접 만들어 적용한다"
  - "공격을 재현해 eve.json 의 alert 로 탐지를 확인한다"
  - "내 룰의 구성(버퍼/content/nocase)을 자가 검증하고 실습 룰을 정리한다"
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — IPS 상태 확인

      IPS 장비(`ips`, `10.20.31.2`)에 SSH 로 접속해, Suricata 가 가동 중인지와 탐지룰이 몇 개
      로딩돼 있는지 직접 확인한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # IPS 장비에 접속 (비밀번호: 1)
      ssh ccc@10.20.31.2

      # Suricata 가동 확인
      pgrep -af suricata

      # 로딩된 탐지룰 수 (활성 룰만)
      grep -hcE '^(alert|drop)' /etc/suricata/rules/*.rules 2>/dev/null | paste -sd+ | bc
      ```
      ## ✅ 합격 기준
      Suricata 가 가동 중(`suricata` 프로세스)이고 탐지룰이 로딩돼 있다.
    hint: 'ssh ccc@10.20.31.2 → pgrep -af suricata; 룰 수 집계'
    answer: |
      # IPS 장비에서 Suricata 가동 + 로딩 룰 수를 직접 확인
      ssh ccc@10.20.31.2 'pgrep -af suricata; echo -n "rules loaded: "; grep -hcE "^(alert|drop)" /etc/suricata/rules/*.rules 2>/dev/null | paste -sd+ | bc'
    answer_detail: "pgrep 로 Suricata 프로세스 가동, 룰 파일의 활성 룰(alert/drop) 수 집계. 잘못된 룰이 있으면 reload 시 실패 → 탐지 무력화 위험이므로 룰 로딩 상태를 늘 확인한다."
    verify:
      type: output_contains
      expect: suricata
      field: stdout
      semantic:
        intent: "IPS 가동/로딩 룰/실패 수 확인 — 탐지 엔진 건강 점검 습관"
        success_criteria: ["running=true", "rules_loaded>0", "rules_failed=0"]

  - order: 2
    instruction: |
      ## 🎯 미션 — 구성과 HOME_NET 확인

      **구성·디렉토리** 메뉴에서 HOME_NET, 룰 디렉토리, eve.json 경로를 확인한다. 우리 실습망은
      공격자도 HOME_NET 안이라, 룰 출발지를 `any`로 둔다는 점을 기억한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # Suricata 설정에서 HOME_NET·룰경로·eve 경로 확인
      grep -E 'HOME_NET|default-rule-path|rule-files|eve' /etc/suricata/suricata.yaml | grep -vE '^\s*#' | head
      ```
      ## ✅ 합격 기준
      출력에 `HOME_NET` 이 보인다.
    hint: "grep HOME_NET /etc/suricata/suricata.yaml"
    answer: |
      # Suricata 설정에서 HOME_NET 등을 IPS 장비에서 직접 확인
      ssh ccc@10.20.31.2 "grep -E 'HOME_NET|default-rule-path|eve' /etc/suricata/suricata.yaml | grep -vE '^\s*#' | head"
    answer_detail: "HOME_NET 이 우리 사설망(192.168/10/172.16)을 가리킨다. 폐쇄망이라 공격자도 HOME_NET 안 → 룰의 출발지를 any 로 둔다. suricata.yaml 이 설정의 중심."
    verify:
      type: output_contains
      expect: HOME_NET
      field: stdout
      semantic:
        intent: "IPS 설정/경로 파악 + HOME_NET 의미 이해 — any 를 쓰는 이유"
        success_criteria: ["HOME_NET 확인", "local.rules/eve.json 경로 확인", "any 사용 이유 이해"]

  - order: 3
    instruction: |
      ## 🎯 미션 — 실제 탐지룰을 읽고 구조 분해하기

      IPS 장비의 실제 룰 파일에서 sqlmap 탐지 룰을 찾아 읽는다. 탐지룰은 **헤더**(action/proto/
      src/방향/dst)와 **옵션**(msg/flow/버퍼/content/sid)으로 이뤄진다. 특히 **탐지 버퍼**
      (`http.user_agent` 등)가 "요청의 어느 부분을 검사할지"를 정한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 실제 룰 파일에서 sqlmap 탐지 룰을 찾아 읽는다
      grep -rh 'sqlmap' /etc/suricata/rules/*.rules | head -1
      ```
      ## 🔍 무엇을 보나
      `alert http any any -> any any (msg:"...sqlmap"; flow:to_server; http.user_agent; content:"sqlmap";
      nocase; sid:...;)` — 헤더 5부분 + 옵션. `http.user_agent` 가 검사 버퍼(User-Agent 헤더를 검사).
      ## ✅ 합격 기준
      찾은 룰에 탐지 버퍼 `http.user_agent` 가 보인다.
    hint: "grep sqlmap /etc/suricata/rules/*.rules — 헤더+옵션 구조 읽기"
    answer: |
      # 실제 sqlmap 탐지 룰을 IPS 장비에서 찾아 읽고 구조 분해
      ssh ccc@10.20.31.2 "grep -rh 'sqlmap' /etc/suricata/rules/*.rules | grep 'http.user_agent' | head -1"
    answer_detail: "action=alert, proto=http, 헤더=any any -> any any, 탐지버퍼=http.user_agent, content=sqlmap, sid. 버퍼가 '요청의 어느 부위를 검사할지'를 정한다 — 룰 읽기의 핵심."
    verify:
      type: output_contains
      expect: http.user_agent
      field: stdout
      semantic:
        intent: "탐지룰을 헤더+옵션으로 분해 — 룰 읽는 능력(특히 탐지 버퍼) 습득"
        success_criteria: ["헤더 5부분 분해", "옵션(buffer/content/sid) 분해", "sticky buffer 역할 이해"]

  - order: 4
    instruction: |
      ## 🎯 미션 — SQLi(UNION) 탐지룰 미리보기

      **탐지룰 관리** 폼에서 — action `alert`, proto `http`, 출발지/목적지 `any`, 탐지 버퍼
      `http.uri`, content `UNION`, nocase 체크, flow `to_server`, msg `EDU SQLi UNION` →
      **① 룰 미리보기**.

      ## 💻 실행 명령 (IPS 장비에서)
      우리가 만들 UNION 탐지 룰(적용은 다음 스텝, 지금은 검토):
      ```bash
      # 만들 탐지룰을 눈으로 검토 (URI 에 UNION 이 오면 alert)
      echo 'alert http any any -> any any (msg:"EDU SQLi UNION"; flow:to_server; http.uri; content:"UNION"; nocase; sid:9000001; rev:1;)'
      ```
      ## 🔍 무엇을 보나
      헤더 `alert http any any -> any any`(폐쇄망이라 any) + 옵션(msg / flow:to_server / 버퍼 http.uri /
      content:"UNION" / nocase / sid:9000001). 요청 URI 에 UNION 이 나오면 탐지한다.
      ## ✅ 합격 기준
      검토한 룰이 `alert http any any -> any any` 로 시작한다.
    hint: 'echo 로 만들 Suricata 룰 검토'
    answer: |
      # 만들 UNION 탐지룰을 IPS 장비에서 검토
      ssh ccc@10.20.31.2 'echo "alert http any any -> any any (msg:\"EDU SQLi UNION\"; flow:to_server; http.uri; content:\"UNION\"; nocase; sid:9000001; rev:1;)"'
    answer_detail: 'alert http any any -> any any (msg:"EDU SQLi UNION"; flow:to_server; http.uri; content:"UNION"; nocase; sid:9000001; rev:1;). 적용 전 룰을 검토하는 습관 — 문법·버퍼·sid 를 미리 점검.'
    verify:
      type: output_contains
      expect: alert http any any -> any any
      field: stdout
      semantic:
        intent: "폼이 Suricata rule 로 변환되는 과정 확인 — 명령을 학습"
        success_criteria: ["헤더가 any any -> any any (폐쇄망)", "버퍼+content 결합", "sid 자동 배정"]

  - order: 5
    instruction: |
      ## 🎯 미션 — 룰 적용 + 로딩 확인

      만든 룰을 룰 파일에 넣고 Suricata 에 반영한다. 운영자처럼 **편집기로 `local.rules` 를 열어
      룰을 추가·저장**한 뒤 reload 한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 1) IPS 장비에 접속해 룰 파일을 편집기로 연다
      ssh ccc@10.20.31.2
      sudo nano /etc/suricata/rules/local.rules
      ```
      편집기가 열리면 **맨 아래에 다음 한 줄을 입력**하고 저장한다(nano: `Ctrl+O`→`Enter`, 종료 `Ctrl+X`):
      ```
      alert http any any -> any any (msg:"EDU SQLi UNION"; flow:to_server; http.uri; content:"UNION"; nocase; sid:9000001; rev:1;)
      ```
      그다음 Suricata 에 반영하고, 내 룰이 로딩됐는지 확인한다:
      ```bash
      sudo suricatasc -c "reload-rules"
      grep sid:9000001 /etc/suricata/rules/local.rules
      ```
      ## ✅ 합격 기준
      저장·reload 후 local.rules 에 내 룰 `9000001` 이 보인다(reload 결과 `"return": "OK"`).
    hint: 'sudo nano local.rules 로 룰 추가·저장 → suricatasc -c reload-rules → grep 9000001'
    answer: |
      # (편집기로 룰을 추가·저장한 것과 동일 — 채점용 비대화식) reload + 확인 (IPS 장비에서)
      ssh ccc@10.20.31.2 'grep -q sid:9000001 /etc/suricata/rules/local.rules || echo "alert http any any -> any any (msg:\"EDU SQLi UNION\"; flow:to_server; http.uri; content:\"UNION\"; nocase; sid:9000001; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules >/dev/null; sudo suricatasc -c "reload-rules" >/dev/null; grep -o "sid:9000001" /etc/suricata/rules/local.rules | head -1'
    answer_detail: "편집기(nano/vi)로 local.rules 를 열어 룰을 추가·저장한 뒤 suricatasc reload-rules 로 무중단 재로딩한다. 문법이 맞으면 로딩되고(sid:9000001 등록), 틀리면 reload 가 실패한다 — 즉시 피드백 루프. (answer 는 편집기 대신 비대화식으로 같은 결과를 만드는 채점용.)"
    verify:
      type: output_contains
      expect: "9000001"
      field: stdout
      semantic:
        intent: "룰을 적용하고 reload·로딩 결과를 즉시 확인 — 문법 피드백 루프 체득"
        success_criteria: ["reload OK", "loaded 증가/failed 불변", "local.rules 에 sid 등록"]

  - order: 6
    instruction: |
      ## 🎯 미션 — 공격을 일으켜 내 룰이 잡는지 확인 (탐지 테스트)

      "룰을 만들었다"로 끝이 아니라, **실제 공격을 일으켜 내 룰이 잡는지** 봐야 한다. 내 공격 VM
      (`192.168.0.202`)에서 URI 에 `UNION SELECT` 가 든 요청을 보내 방금 만든 룰을 테스트한다. vhost 는
      `/etc/hosts` 에 등록돼 있어 **자연 URL(`http://juice.el34.lab/...`)** 로 바로 보낸다(`-H Host` 불필요).
      그다음 IPS 장비의 `eve.json` 에서 내 룰의 alert 를 본다.

      > 💡 **화면으로 보기:** 학생 PC 브라우저에서 `http://juice.el34.lab/?q=1 UNION SELECT 1` 을 직접
      > 열어도 같은 탐지가 난다. 실제 공격 도구(sqlmap 등)로 SQLi 를 돌리면 baseline sqlmap/UNION 룰까지
      > 함께 뜨는 것도 볼 수 있다. (탐지룰 테스트는 그 룰이 노리는 패턴을 정확히 보내는 게 확실하다.)

      ## 💻 실행 명령
      ```bash
      # ① 내 공격 VM 에서 URI 에 UNION 이 든 요청 (자연 URL, 공백은 %20 으로)
      ssh att@192.168.0.202
      curl -s -o /dev/null 'http://juice.el34.lab/?q=1%20UNION%20SELECT%201'

      # ② IPS 장비에서 내 룰(EDU SQLi UNION)이 잡은 alert 확인
      ssh ccc@10.20.31.2
      tail -400 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and (.alert.signature|test("UNION";"i")))|.alert.signature' | tail -3
      ```
      ## ✅ 합격 기준
      IPS eve.json 의 alert signature 에 `UNION`(내 룰 EDU SQLi UNION)이 보인다.
    hint: '자연 URL 로 UNION 요청 → IPS eve.json 에서 UNION alert'
    answer: |
      # ① 공격 VM(202)에서 URI 에 UNION 이 든 요청을 자연 URL 로 보냄 (내 룰 테스트)
      ssh att@192.168.0.202 "curl -s -o /dev/null 'http://juice.el34.lab/?q=1%20UNION%20SELECT%201'; curl -s -o /dev/null 'http://dvwa.el34.lab/?id=1%20UNION%20SELECT%201'; echo sent"
      # ② IPS 장비 eve.json 에서 내 룰(EDU SQLi UNION)이 잡은 alert 확인
      ssh ccc@10.20.31.2 "sleep 2; tail -500 /var/log/suricata/eve.json | jq -rc 'select(.event_type==\"alert\" and (.alert.signature|test(\"UNION\";\"i\")))|.alert.signature' | tail -3"
    answer_detail: "URI 에 UNION 이 든 요청을 보내면 내가 만든 http.uri content:UNION 룰이 eve.json 에 'EDU SQLi UNION' alert 로 남긴다 — 룰이 실제 공격을 탐지한다는 실증. 탐지룰 테스트는 그 룰이 노리는 패턴을 정확히 보내 확인한다(sqlmap 같은 도구는 baseline 룰까지 함께 유발)."
    verify:
      type: output_contains
      expect: UNION
      field: stdout
      semantic:
        intent: "내가 만든 룰이 실제 공격을 탐지하는 것을 eve.json 에서 확인 — 탐지의 실증"
        success_criteria: ["공격 재현", "eve alert 에 UNION signature", "내 룰이 탐지"]

  - order: 7
    instruction: |
      ## 🎯 미션 — 내 탐지룰이 올바르게 구성됐는지 검증

      침해대응의 마무리는 "내 룰이 정답 조건을 갖췄나" 자가 점검이다. SQLi UNION 탐지룰이라면 반드시
      ① 올바른 탐지 버퍼(`http.uri`) ② 탐지 문자열(`content:"UNION"`) ③ 대소문자 무시(`nocase`)를
      갖춰야 한다. 내가 만든 룰(sid 9000001)이 이 조건을 충족하는지 직접 확인한다.

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 내 룰이 http.uri + UNION + nocase 조건을 갖췄는지 확인
      grep 'sid:9000001' /etc/suricata/rules/local.rules | grep -oE 'http\.uri|content:"UNION"|nocase'
      ```
      ## 🔍 무엇을 보나
      `http.uri`, `content:"UNION"`, `nocase` 세 조건이 모두 나오면 룰이 정답대로 구성된 것이다.
      하나라도 빠지면(예: 버퍼가 없거나 nocase 누락) 탐지가 새거나 대소문자 우회에 뚫린다.
      ## ✅ 합격 기준
      내 룰에 탐지 버퍼 `http.uri` 가 있음이 확인된다(+ UNION, nocase).
    hint: "grep sid:9000001 local.rules → http.uri / content UNION / nocase 확인"
    answer: |
      # 내 UNION 탐지룰이 http.uri+UNION+nocase 조건을 갖췄는지 IPS 장비에서 자가 검증
      ssh ccc@10.20.31.2 "grep 'sid:9000001' /etc/suricata/rules/local.rules | grep -oE 'http\.uri|content:\"UNION\"|nocase'"
    answer_detail: "룰이 정답 조건(http.uri 버퍼 + content UNION + nocase)을 갖췄는지 자가 점검. 버퍼가 없으면 요청 전체를 검사해 오탐↑, nocase 가 없으면 UnIoN 같은 대소문자 우회에 뚫린다 — 이래서 룰 검증이 필요하다."
    verify:
      type: output_contains
      expect: http.uri
      field: stdout
      semantic:
        intent: "작성한 탐지룰이 올바른 버퍼·content·nocase 를 갖췄는지 실제 룰 파일로 자가 검증"
        success_criteria: ["http.uri 버퍼 존재", "content UNION 존재", "nocase 존재"]

  - order: 8
    instruction: |
      ## 🎯 미션 — SIEM(Wazuh) 연동 확인

      **SIEM 연동** 메뉴에서 eve.json 이 Wazuh 매니저(10.20.32.100)로 가는지 확인한다. 대개 이미
      연동돼 있다(Suricata alert → Wazuh rule.id 86601).

      ## 💻 실행 명령 (IPS 장비에서)
      ```bash
      # 이 IPS 가 어느 SIEM 매니저로 로그를 보내는지 (Wazuh 에이전트 설정)
