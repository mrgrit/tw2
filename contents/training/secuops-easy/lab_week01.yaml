lab_id: secuops-easy-week01
title: "W01 — 전체 토폴로지 탐험: 세 콘솔에 접속해 지도 그리기"
version: standalone-easy
course: secuops-easy
week: 1
description: |
  이번 실습은 명령어를 외우는 시간이 아니라 "지도"를 직접 확인하는 시간이다. 운영자처럼 세 보안장비
  (방화벽 `10.20.30.1` / IPS `10.20.31.2` / WAF·웹서버 `10.20.32.80`)에 **직접 SSH 접속해** 각 장비가
  어느 구역에 있는지, 무엇을 검사하는지 진짜 CLI 명령으로 확인한다. 그다음 내 공격 VM(`192.168.0.202`)에서
  정상 웹 요청을 한 번 흘려보내, 그 요청이 방화벽→IPS→WAF→웹앱을 지나며 IPS·SIEM에 남기는 흔적을 추적한다.
  (`ssh ccc@<장비IP>` 비밀번호 `1`, 장비 관리 명령은 `sudo`.)
difficulty: easy
duration_minutes: 90
audience: 보안 솔루션 운영 입문자 (1주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - 세 보안장비(fw 10.20.30.1 / ips 10.20.31.2 / web 10.20.32.80)에 ssh ccc@ 접속 가능(비번 1, sudo 보유) + 공격 VM ssh att@192.168.0.202
  - W01 강의안 정독 — 4구역(ext/pipe/dmz/int)과 세 장비의 역할
objectives:
  - "세 보안장비(방화벽/IPS/WAF)에 SSH 접속해 실제 CLI로 상태를 읽는다"
  - "방화벽의 두 인터페이스(ext 10.20.30.1 / pipe 10.20.31.1)와 존을 확인한다"
  - "IPS 가 가동 중이며 탐지룰이 로딩돼 있음을 확인한다"
  - "WAF 의 SecRuleEngine 모드와 CRS 버전을 확인한다"
  - "정상 웹 요청 한 개의 경로(방화벽→IPS→WAF→앱)를 추적한다"
  - "세 보안장비가 모두 SIEM(Wazuh)에 에이전트로 연결됐음을 확인한다"
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 방화벽 장비에 접속해 두 인터페이스 확인

      운영자는 GUI 화면만 보고 끝내지 않는다. 방화벽 장비에 **직접 접속해** 상태를 읽는다. el34
      호스트에서 방화벽 장비(`fw`, `10.20.30.1`)에 SSH 로 들어가, 방화벽이 가진 두 개의 다리
      (인터페이스)를 눈으로 확인한다.

      - ext 쪽 다리 = **10.20.30.1** → ext(외부, 공격자가 있는 망)를 향한다.
      - pipe 쪽 다리 = **10.20.31.1** → pipe(통로, IPS로 가는 길)를 향한다.

      ## 💻 실행 명령 (방화벽 장비에서 직접)

      ```bash
      # 1) el34 호스트에서 방화벽 장비에 SSH 접속 (비밀번호: 1)
      ssh ccc@10.20.30.1

      # 2) 방화벽의 두 다리(인터페이스)와 IP 주소 확인
      ip -br addr

      # 3) 방화벽이 다루는 nftables 테이블 확인
      sudo nft list tables
      ```

      ## 🔍 무엇을 보나
      `ip -br addr` 에서 두 다리(`10.20.30.1`, `10.20.31.1`)를, `sudo nft list tables` 에서 방화벽 테이블
      (`six_filter` 편집가능 / `six_nat`)을 본다. 방화벽은 두 구역에 양다리를 걸친 "문"이다.

      ## ✅ 합격 기준
      방화벽 장비에서 인터페이스와 테이블을 확인. 출력에 `six_filter` 가 보인다.
    hint: 'ssh ccc@10.20.30.1 → ip -br addr; sudo nft list tables'
    answer: |
      # 방화벽 장비(fw)에 접속해 인터페이스와 테이블을 직접 확인
      ssh ccc@10.20.30.1 'ip -br addr; sudo nft list tables'
    answer_detail: |
      방화벽 장비에 직접 접속해 확인 — 두 다리 10.20.30.1(ext)·10.20.31.1(pipe), nftables 테이블
      six_filter(편집가능)/six_nat. 방화벽은 두 구역에 양다리를 걸친 "문". six_filter 가 W2에서 룰을 만들 곳.
    verify:
      type: output_contains
      expect: six_filter
      field: stdout
      semantic:
        intent: "방화벽 콘솔에서 두 인터페이스(ext/pipe)를 확인 — 방화벽이 경계의 문임을 이해"
        success_criteria:
          - "ext 쪽 10.20.30.1, pipe 쪽 10.20.31.1 두 인터페이스 확인"
          - "방화벽이 두 구역에 걸쳐 있음을 설명"

  - order: 2
    instruction: |
      ## 🎯 미션 — IPS 장비에 접속해 "가동 중 + 탐지룰" 확인

      IPS 장비(`ips`, `10.20.31.2`)에 SSH 로 접속해 세 가지를 확인한다. ① Suricata 프로세스가
      **가동 중**인가(`pgrep`) ② 어느 인터페이스를 감시하나(pipe/dmz) ③ 이벤트 로그(`eve.json`)가
      실제로 쌓이고 있나.

      ## 💻 실행 명령 (IPS 장비에서 직접)

      ```bash
      # 1) IPS 장비에 SSH 접속 (비밀번호: 1)
      ssh ccc@10.20.31.2

      # 2) Suricata 프로세스 가동 확인 (어느 인터페이스를 감시하는지 함께 보인다)
      pgrep -af suricata

      # 3) 이벤트 로그가 실제로 쌓이는지 — 가장 최근 이벤트 타입 확인
      tail -1 /var/log/suricata/eve.json | jq -r '.event_type + " @ " + .timestamp'
      ```

      ## 🔍 무엇을 보나
      `pgrep -af suricata` 가 `suricata -i eth1 -i eth0 -c ...`(감시 인터페이스 포함) 프로세스를
      보여주면 가동 중. eve.json 의 최근 event_type(http/flow 등)이 나오면 검사가 살아 있는 것이다.
      IPS 는 pipe(10.20.31.2)와 dmz(10.20.32.1)를 감시한다.

      ## ✅ 합격 기준
      IPS 가 가동 중이고 이벤트가 쌓이고 있음을 확인. 출력에 `suricata` 가 보인다.
    hint: 'ssh ccc@10.20.31.2 → pgrep -af suricata'
    answer: |
      # IPS 장비(ips)에 접속해 Suricata 가동과 이벤트 적재를 직접 확인
      ssh ccc@10.20.31.2 'pgrep -af suricata; tail -1 /var/log/suricata/eve.json | jq -r .event_type'
    answer_detail: |
      IPS 장비에 직접 접속해 확인 — pgrep 로 Suricata 프로세스(감시 인터페이스 eth0/eth1 포함)가 살아
      있고, eve.json 최근 event_type 으로 검사가 동작함을 본다. Suricata 는 방화벽 다음의 "내용 검사" 층.
    verify:
      type: output_contains
      expect: suricata
      field: stdout
      semantic:
        intent: "IPS 가 가동 중이고 탐지룰이 로딩됐음을 확인 — IPS 가 '내용 검사' 층임을 이해"
        success_criteria:
          - "Suricata 프로세스 가동(pgrep)"
          - "eve.json 에 이벤트가 쌓임"

  - order: 3
    instruction: |
      ## 🎯 미션 — WAF 장비에 접속해 보호 모드 확인

      WAF(웹서버) 장비(`web`, `10.20.32.80`)에 SSH 로 접속해, ModSecurity 가 로딩됐는지와
      **SecRuleEngine** 모드를 확인한다.

      - `SecRuleEngine On` → 공격을 탐지하면 **실제로 차단(403)** 한다.
      - `SecRuleEngine DetectionOnly` → 탐지만 하고 통과시킨다(학습/튜닝용).

      ## 💻 실행 명령 (WAF 장비에서 직접)

      ```bash
      # 1) WAF(웹서버) 장비에 SSH 접속 (비밀번호: 1)
      ssh ccc@10.20.32.80

      # 2) ModSecurity 모듈이 Apache 에 로딩됐는지 확인
      sudo apache2ctl -M | grep security2

      # 3) SecRuleEngine 모드(차단 On / 탐지만 DetectionOnly) 확인
      grep -rhi SecRuleEngine /etc/apache2/ /etc/modsecurity/ | grep -v '#'
      ```

      ## 🔍 무엇을 보나
      `security2_module (shared)` 가 보이면 ModSecurity 로딩됨. `SecRuleEngine` 값이 `On` 이면 차단,
      `DetectionOnly` 면 탐지만. WAF 는 dmz 의 웹서버 앞단에서 HTTP 요청의 의미를 검사하는 마지막 방패다.

      ## ✅ 합격 기준
      WAF 장비에서 ModSecurity 로딩과 엔진 모드를 확인. 출력에 `SecRuleEngine` 이 보인다.
    hint: 'ssh ccc@10.20.32.80 → apache2ctl -M | grep security2; grep SecRuleEngine'
    answer: |
      # WAF(web) 장비에 접속해 ModSecurity 로딩과 엔진 모드를 직접 확인
      ssh ccc@10.20.32.80 'sudo apache2ctl -M | grep security2; grep -rhi SecRuleEngine /etc/apache2/ /etc/modsecurity/ | grep -v "#" | head -1'
    answer_detail: |
      WAF 장비에 직접 접속해 확인 — security2_module 로딩 여부와 SecRuleEngine 모드(On=차단 403 /
      DetectionOnly=탐지만). WAF 는 dmz 웹서버에서 HTTP 요청을 검사하는 마지막 방패다.
    verify:
      type: output_contains
      expect: SecRuleEngine
      field: stdout
      semantic:
        intent: "WAF 의 보호 모드(On)와 CRS 버전을 확인 — WAF 가 HTTP 의미를 검사하는 층임을 이해"
        success_criteria:
          - "security2_module 로딩, SecRuleEngine 모드 확인"
          - "WAF 가 웹서버 앞단에서 HTTP 를 검사한다고 설명"

  - order: 4
    instruction: |
      ## 🎯 미션 — 세 장비가 서로 다른 컴퓨터임을 확인

      세 보안장비는 각각 다른 컴퓨터(장비)다. 세 장비에 차례로 SSH 접속해 각자의 `hostname` 을
      직접 읽어, 서로 다른 장비(fw / ips / web)임을 확인한다.

      ## 💻 실행 명령 (세 장비에 차례로 접속)

      ```bash
      # 세 장비(fw 10.20.30.1 / ips 10.20.31.2 / web 10.20.32.80)에 각각 접속해 hostname 확인
      for h in 10.20.30.1 10.20.31.2 10.20.32.80; do
        echo -n "$h => "
        ssh ccc@$h hostname
      done
      ```

      ## 🔍 무엇을 보나
      10.20.30.1 → `fw`, 10.20.31.2 → `ips`, 10.20.32.80 → `web`. 세 장비가 각자 다른 구역에서 자기
      역할을 한다.

      ## ✅ 합격 기준
      세 장비의 hostname(fw/ips/web)이 서로 다름을 확인. 출력에 `web` 이 보인다.
    hint: '세 장비(10.20.30.1/.31.2/.32.80)에 ssh 접속해 hostname 비교'
    answer: |
      # 세 장비에 차례로 접속해 hostname 을 직접 확인
      for h in 10.20.30.1 10.20.31.2 10.20.32.80; do
        echo -n "$h => "
        ssh ccc@$h hostname
      done
    answer_detail: |
      fw / ips / web — 세 장비가 각각 ext/pipe 경계, pipe/dmz 경계, dmz 웹서버에 위치한다. 한 장비가
      다 하지 않고 경계마다 전문 장비를 두는 것이 분산 방어.
    verify:
      type: output_contains
      expect: web
      field: stdout
      semantic:
        intent: "세 콘솔이 서로 다른 장비(fw/ips/web)에서 동작함을 확인 — 분산된 방어 구조 이해"
        success_criteria:
          - "10.20.30.1→fw, 10.20.31.2→ips, 10.20.32.80→web"

  - order: 5
    instruction: |
      ## 🎯 미션 — 정상 요청 한 개의 경로 추적

      이제 정상 웹 요청을 한 번 보내, 그 요청이 **방화벽 → IPS → WAF → 내부 앱**을 거쳐 응답이
      돌아오는지 확인한다. 요청은 **실제 외부 공격자 위치**(내 공격 VM `192.168.0.202`)에서 대상의
      공인 진입(`192.168.0.161`)으로 보낸다.

      ## 💻 실행 명령
      정상 GET 요청 하나다. **브라우저로 열든 curl 로 보내든 완전히 동일하다**(vhost 는 hosts 에
      juice.el34.lab → 192.168.0.161 로 등록돼 있어 자연 URL 을 쓴다).

      - **브라우저(학생 PC):** 주소창에 `http://juice.el34.lab/` 를 열면 JuiceShop 첫 화면이 뜬다
        (그 한 번의 요청이 방화벽→IPS→WAF→앱을 다 지난 결과).
      - **CLI(채점용, 내 공격 VM 에서 같은 요청):**
        ```bash
        ssh att@192.168.0.202     # 비밀번호: 1
        echo "응답 코드: $(ssh att@192.168.0.202 'whatweb -a1 --color=never "http://juice.el34.lab/" 2>/dev/null' | grep -oE '\[[0-9]{3}' | tr -dc '0-9')"
        ```

      ## 🔍 무엇을 보나
      `200`(정상) 같은 응답 코드가 돌아오면(브라우저면 화면이 뜨면), 이 요청이 방화벽(80포트 허용+DNAT)을
      통과하고, IPS를 거쳐(공격 패턴 없음), WAF를 통과해(정상 요청), 내부 JuiceShop까지 닿았다가 응답이
      같은 길로 돌아온 것이다. 한 번의 접속에 4개 장비가 관여한다.

      ## ✅ 합격 기준
      정상 응답 코드를 받는다. 출력에 `응답 코드` 가 보인다(브라우저면 JuiceShop 화면).
    hint: '브라우저로 http://juice.el34.lab/ 열기 = att 에서 nc 로 juice 에 GET 요청'
    answer: |
      # 내 공격 VM(192.168.0.202)에서 대상으로 정상 GET (브라우저로 http://juice.el34.lab/ 여는 것과 동일)
      echo "응답 코드: $(ssh att@192.168.0.202 'whatweb -a1 --color=never "http://juice.el34.lab/" 2>/dev/null' | grep -oE '\[[0-9]{3}' | tr -dc '0-9')"
    answer_detail: |
      응답 코드(예: 200) = 방화벽(포트 허용+DNAT)→IPS(내용 정상)→WAF(HTTP 정상)→JuiceShop 도달→
      응답 복귀. 정상 트래픽은 네 장비를 매끄럽게 통과한다. juice 는 DetectionOnly vhost 라 정상 200.
    verify:
      type: output_contains
      expect: "응답 코드"
      field: stdout
      semantic:
        intent: "정상 요청이 4개 장비를 통과해 응답을 받는 전체 경로를 체감 — 트래픽 흐름 이해"
        success_criteria:
          - "HTTP 응답 코드 수신 (200 등)"
          - "요청이 방화벽→IPS→WAF→앱 경로를 지났음을 설명"

  - order: 6
    instruction: |
      ## 🎯 미션 — 그 요청이 IPS 에 남긴 흔적 보기

      방금 보낸 요청은 IPS를 지났으므로, IPS 장비의 **이벤트 로그(`eve.json`)**에 흔적이 남는다.
      IPS 장비에 접속해 최근 이벤트 타입(http/flow 등)을 직접 확인한다.

      ## 💻 실행 명령 (IPS 장비에서 직접)

      ```bash
      # 1) IPS 장비에 SSH 접속 (비밀번호: 1)
      ssh ccc@10.20.31.2

      # 2) 최근 이벤트의 타입을 뽑아 본다 (내가 보낸 요청이 잡혔는지)
      tail -5 /var/log/suricata/eve.json | jq -r '.event_type' | sort | uniq -c
      ```

      ## 🔍 무엇을 보나
      `event_type`(http, flow, fileinfo 등)이 보인다. 우리가 보낸 웹 요청이 IPS의 눈에 잡혀 기록된
      것이다. (이것이 나중에 SIEM으로 모이는 원천 데이터다.)

      ## ✅ 합격 기준
      IPS 이벤트에 `event_type`(flow/http 등)이 보인다. 출력에 `flow` 또는 `http` 가 보인다.
    hint: 'ssh ccc@10.20.31.2 → tail eve.json | jq .event_type'
    answer: |
      # IPS 장비에서 최근 이벤트 타입을 직접 확인
      ssh ccc@10.20.31.2 'sudo tail -5 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c'
    answer_detail: |
      http/flow/fileinfo 등 event_type 이 보임 — 방금 요청이 IPS 에 기록됐다. 이 eve.json 데이터가
      SIEM(Wazuh)으로 모여 통합 관제의 재료가 된다.
    verify:
      type: output_contains
      expect: flow
      field: stdout
      semantic:
        intent: "한 요청이 IPS 에 기록되는 것을 확인 — IPS 가 원천 로그를 만드는 곳임을 이해"
        success_criteria:
          - "eve.json 이벤트에 event_type(http/flow 등)이 보임"

  - order: 7
    instruction: |
      ## 🎯 미션 — 세 장비가 모두 SIEM 에 보고하는지 확인 + 토폴로지 정리

      강의 §6에서 본 대로, 세 보안장비(방화벽·IPS·웹서버)의 기록은 모두 **SIEM(Wazuh, 10.20.32.100)**
      한 곳으로 모인다. el34에서는 세 장비가 각각 Wazuh 에이전트(`fw`·`ips`·`web`)로 SIEM에
      연결돼 있다. 세 에이전트가 모두 **Active**인지 확인한다.

      ## 💻 실행 명령 (SIEM 장비에서 직접)

      ```bash
      # 1) SIEM(Wazuh 관리서버) 장비에 SSH 접속 (비밀번호: 1)
      ssh ccc@10.20.32.100

      # 2) 연결된 에이전트 목록에서 세 장비(fw/ips/web)가 Active 인지 확인
      sudo /var/ossec/bin/agent_control -l | grep -E "Name: (fw|ips|web)"
      ```

      ## 🔍 무엇을 보나
      `Name: fw ... Active`, `Name: web ... Active`, `Name: ips ... Active`. 세 관문이 모두 관제실에
      보고 중이다. **관문 3개 + 통합 관제 = 심층 방어의 완성.**

      ## ✅ 합격 기준
      출력에 `Name: web`(및 fw/ips) 이 Active 로 보인다. + 4구역 토폴로지 그림 제출.
    hint: 'ssh ccc@10.20.32.100 → sudo /var/ossec/bin/agent_control -l'
    answer: |
      # SIEM 장비에 접속해 세 장비가 에이전트로 Active 연결됐는지 직접 확인
      ssh ccc@10.20.32.100 'sudo /var/ossec/bin/agent_control -l | grep -E "Name: (fw|ips|web)"'
    answer_detail: |
      세 보안장비가 Wazuh 에이전트(fw/ips/web)로 SIEM 에 Active 연결 — 방화벽이 막은 것, IPS 가
      탐지한 것, WAF 가 차단한 것이 한 관제실에 모인다. 토폴로지: ext(10.20.30)→pipe(10.20.31)→
      dmz(10.20.32, WAF+웹서버+SIEM)→int(10.20.40, 앱 7종), 경계마다 방화벽/IPS.
    verify:
      type: output_contains
      expect: "Name: web"
      field: stdout
      semantic:
        intent: "세 보안장비가 모두 SIEM 에 연결됨을 확인 + 전체 토폴로지 종합 — 1주차 마무리"
        success_criteria:
          - "Wazuh 에 fw/ips/web 에이전트가 Active"
          - "세 장비의 로그가 한 SIEM 으로 모임을 이해"
          - "4구역 토폴로지를 직접 그려 정리"
