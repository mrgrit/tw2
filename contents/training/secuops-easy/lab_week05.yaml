lab_id: secuops-easy-week05
title: "W05 — WAF(ModSecurity) 콘솔 실습: SecRule·configtest·차단 확인"
version: standalone-easy
course: secuops-easy
week: 5
description: |
  WAF(웹서버) 장비(`web`, `10.20.32.80`)에 SSH 로 접속해 ModSecurity SecRule 을 배운다. 실제 CRS 룰을
  읽어 분해하고, SecRule 을 직접 작성해 `/etc/modsecurity/edu_rules.conf` 에 넣고 `apache2ctl configtest`
  로 문법 검사 후 `graceful` 로 무중단 적용한다. 잘못된 룰은 configtest 에서 거부돼 웹서버가 살아남는
  안전장치를 체험한다. 그다음 내 공격 VM(`192.168.0.202`)에서 자연 URL 로 공격해 dvwa(On)의 403 차단을
  확인하고 실습 룰(id 9000000+)을 정리한다. (`ssh ccc@10.20.32.80` 비번 `1`.)
difficulty: easy
duration_minutes: 130
audience: 보안 솔루션 운영 입문자 (5주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - WAF 장비 접속 가능 (`ssh ccc@10.20.32.80`, 비번 `1`, sudo 보유) + 공격 VM `ssh att@192.168.0.202`
  - W05 강의안 정독 — SecRule 구조, transform, configtest, anomaly / W01~W04 실습 완료
objectives:
  - "WAF 엔진 모드/CRS 를 콘솔에서 확인한다"
  - "SecRule 을 변수+연산자+액션으로 분해해 이해한다"
  - "SecRule 을 직접 작성해 configtest 후 적용한다"
  - "잘못된 룰이 거부되고 웹서버가 보존됨을 확인한다(안전장치)"
  - "공격을 재현해 403 차단을 확인하고, 내 룰 구성을 자가 검증한다"
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — WAF 상태 확인

      WAF(웹서버) 장비(`web`, `10.20.32.80`)에 SSH 로 접속해, ModSecurity 로딩과 SecRuleEngine 모드
      (전역 `On`=차단)를 확인한다. dvwa vhost 는 전역 설정을 따라 On(차단)으로 동작한다.

      ## 💻 실행 명령 (WAF 장비에서)
      ```bash
      # WAF 장비 접속 (비밀번호: 1)
      ssh ccc@10.20.32.80

      # ModSecurity 모듈 로딩 + 엔진 모드 확인
      sudo apache2ctl -M | grep security2
      grep SecRuleEngine /etc/modsecurity/modsecurity.conf
      ```
      ## ✅ 합격 기준
      전역 설정에 `SecRuleEngine On` 이 보인다.
    hint: 'ssh ccc@10.20.32.80 → grep SecRuleEngine /etc/modsecurity/modsecurity.conf'
    answer: |
      # WAF 장비에서 ModSecurity 로딩 + 엔진 모드 직접 확인
      ssh ccc@10.20.32.80 'sudo apache2ctl -M | grep security2; grep SecRuleEngine /etc/modsecurity/modsecurity.conf'
    answer_detail: "전역 modsecurity.conf 의 SecRuleEngine On → dvwa 같은 vhost 는 공격을 403 으로 차단한다(juice/ai vhost 는 DetectionOnly 로 override). security2_module 로딩 확인."
    verify:
      type: output_contains
      expect: SecRuleEngine On
      field: stdout
      semantic:
        intent: "WAF 동작 모드/CRS 확인 — On(차단) vs DetectionOnly(탐지) 구분"
        success_criteria: ["SecRuleEngine On", "CRS 3.3.2", "Apache 가동"]

  - order: 2
    instruction: |
      ## 🎯 미션 — 구성과 CRS 패밀리 확인

      **구성·CRS** 메뉴에서 ModSecurity 설정과 OWASP CRS 룰 패밀리(941 XSS, 942 SQLi 등)를 본다.

      ## 💻 실행 명령 (WAF 장비에서)
      ```bash
      # OWASP CRS 룰 패밀리 파일 확인 (941 XSS, 942 SQLi, 930 LFI, 932 RCE ...)
      ls /usr/share/modsecurity-crs/rules/ | grep -oE 'REQUEST-9[0-9]{2}' | sort -u
      ```
      ## ✅ 합격 기준
      출력에 CRS SQLi 패밀리 `942` 가 보인다(941 XSS 등도).
    hint: "ls /usr/share/modsecurity-crs/rules/ — REQUEST-941/942/930/932 ..."
    answer: |
      # WAF 장비에서 OWASP CRS 룰 패밀리를 직접 확인
      ssh ccc@10.20.32.80 "ls /usr/share/modsecurity-crs/rules/ | grep -oE 'REQUEST-9[0-9]{2}' | sort -u"
    answer_detail: "CRS 패밀리: 941 XSS / 942 SQLi / 930 LFI / 932 RCE / 913 스캐너 / 949 anomaly. 내가 룰을 하나도 안 만들어도 CRS 가 기본 방어를 제공한다 — 그 위에 커스텀 SecRule 을 얹는다."
    verify:
      type: output_contains
      expect: "942"
      field: stdout
      semantic:
        intent: "WAF 설정과 CRS 표준 룰셋 파악 — 직접 만들기 전에도 보호됨을 이해"
        success_criteria: ["modsec 설정 확인", "CRS 패밀리 확인", "anomaly 모델 인지"]

  - order: 3
    instruction: |
      ## 🎯 미션 — 실제 CRS SecRule 읽고 구조 분해

      WAF 장비의 실제 CRS SQLi 룰 파일에서 SecRule 하나를 읽는다. SecRule 은 **변수**(ARGS 등)·
      **연산자**(@rx/@contains)·**액션**(id/phase/transform/deny/severity)으로 이뤄진다.
      변수는 IPS 의 "탐지 버퍼"에 대응한다("요청의 어느 부분을 볼지").

      ## 💻 실행 명령 (WAF 장비에서)
      ```bash
      # CRS SQLi(942) 룰에서 ARGS 변수를 쓰는 SecRule 하나 읽기
      sudo grep -h 'SecRule ARGS' /usr/share/modsecurity-crs/rules/REQUEST-942*.conf | head -1
      ```
      ## ✅ 합격 기준
      읽은 룰에 변수 `ARGS` 가 보인다.
    hint: "grep 'SecRule ARGS' /usr/share/modsecurity-crs/rules/REQUEST-942*.conf"
    answer: |
      # 실제 CRS SQLi SecRule 을 WAF 장비에서 읽고 구조 분해
      ssh ccc@10.20.32.80 "sudo grep -h 'SecRule ARGS' /usr/share/modsecurity-crs/rules/REQUEST-942*.conf | head -1"
    answer_detail: "SecRule <변수 ARGS> <연산자 @rx/@detectSQLi> <액션 id/phase/t:transform/deny/severity>. 변수 ARGS 는 요청 파라미터를 검사 — IPS 의 http.uri 버퍼에 대응하는 개념."
    verify:
      type: output_contains
      expect: ARGS
      field: stdout
      semantic:
        intent: "SecRule 을 변수+연산자+액션으로 분해 — 룰 읽는 능력"
        success_criteria: ["변수/연산자/패턴 분해", "액션(transform/deny/severity) 분해", "transform 의미 이해"]

  - order: 4
    instruction: |
      ## 🎯 미션 — sqlmap 차단 SecRule 미리보기

      **SecRule 관리** 폼에서 — 변수 `REQUEST_HEADERS:User-Agent`, 연산자 `@contains`, 패턴 `sqlmap`,
      transform `lowercase`, action `deny`, phase `1`, severity `CRITICAL` → **① 미리보기**.

      ## 💻 실행 명령 (WAF 장비에서)
      우리가 만들 sqlmap 차단 SecRule(적용은 다음 스텝, 지금은 검토):
      ```bash
      # 만들 SecRule 을 눈으로 검토 (User-Agent 에 sqlmap 이 있으면 차단)
      echo 'SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" "id:9000011,phase:1,t:lowercase,deny,status:403,log,msg:'"'"'EDU sqlmap block'"'"',severity:'"'"'CRITICAL'"'"'"'
      ```
      ## 🔍 무엇을 보나
      변수 `REQUEST_HEADERS:User-Agent`(특정 헤더만 콕 집어) + `@contains sqlmap` + `t:lowercase`
      (소문자 변환 후 비교=우회 방지) + `deny,status:403`(차단). id/phase/severity 도 필수.
      ## ✅ 합격 기준
      검토한 룰이 `SecRule REQUEST_HEADERS:User-Agent` 로 시작한다.
    hint: 'echo 로 만들 SecRule 검토'
    answer: |
      # 만들 sqlmap 차단 SecRule 을 WAF 장비에서 검토
      ssh ccc@10.20.32.80 'echo "SecRule REQUEST_HEADERS:User-Agent \"@contains sqlmap\" \"id:9000011,phase:1,t:lowercase,deny,status:403,log,msg:EDU-sqlmap-block\""'
    answer_detail: "SecRule REQUEST_HEADERS:User-Agent \"@contains sqlmap\" \"id:9000011,phase:1,t:lowercase,deny,status:403,...\". 특정 헤더만 콕 집어 검사하고, t:lowercase 로 대소문자 우회를 막는다. 적용 전 검토 습관."
    verify:
      type: output_contains
      expect: SecRule REQUEST_HEADERS:User-Agent
      field: stdout
      semantic:
        intent: "폼이 SecRule 로 변환되는 과정 확인 — 명령을 학습"
        success_criteria: ["변수=특정 헤더", "@contains+transform", "id 자동 배정"]

  - order: 5
    instruction: |
      ## 🎯 미션 — 적용 (configtest + reload)

      이제 SecRule 을 edu_rules.conf 에 추가하고 **configtest**로 문법을 검사한 뒤,
      통과하면 graceful reload 한다. 적용 후 edu_rules.conf 에서 내 룰(id 9000011)이 등록됐는지 확인한다.

      ## 💻 실행 명령 (WAF 장비에서)
      ```bash
      # 1) WAF 장비에 접속해 커스텀 룰 파일을 편집기로 연다
      ssh ccc@10.20.32.80
      sudo nano /etc/modsecurity/edu_rules.conf
      ```
      편집기 맨 아래에 다음 SecRule 한 줄을 입력하고 저장한다(nano: `Ctrl+O`→`Enter`, 종료 `Ctrl+X`):
      ```
      SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" "id:9000011,phase:1,t:lowercase,deny,status:403,log,msg:EDU-sqlmap-block,severity:CRITICAL"
      ```
      그다음 문법 검사(통과해야 안전) → 무중단 reload → 확인:
      ```bash
      sudo apache2ctl configtest      # Syntax OK 여야 함
      sudo apache2ctl graceful
      grep id:9000011 /etc/modsecurity/edu_rules.conf
      ```
      ## ✅ 합격 기준
      configtest 통과(Syntax OK) 후 reload 되고 `id:9000011` 이 등록된다.
    hint: 'sudo nano edu_rules.conf 로 SecRule 추가·저장 → apache2ctl configtest → graceful → grep 9000011'
    answer: |
      # (편집기로 SecRule 추가·저장한 것과 동일 — 채점용 비대화식) configtest + graceful + 확인 (WAF 장비에서)
      ssh ccc@10.20.32.80 'grep -q id:9000011 /etc/modsecurity/edu_rules.conf || echo "SecRule REQUEST_HEADERS:User-Agent \"@contains sqlmap\" \"id:9000011,phase:1,t:lowercase,deny,status:403,log,msg:EDU-sqlmap-block,severity:CRITICAL\"" | sudo tee -a /etc/modsecurity/edu_rules.conf >/dev/null; sudo apache2ctl configtest 2>&1 | tail -1; sudo apache2ctl graceful >/dev/null 2>&1; grep -o "id:9000011" /etc/modsecurity/edu_rules.conf | head -1'
    answer_detail: "SecRule 을 /etc/modsecurity/edu_rules.conf(전역 include)에 추가 → apache2ctl configtest 로 문법 검사 → Syntax OK 면 graceful reload. id:9000011 등장 = 적용 성공. configtest 가 실무의 안전장치."
    verify:
      type: output_contains
      expect: "9000011"
      field: stdout
      semantic:
        intent: "SecRule 을 안전하게 적용 — configtest 통과 후에만 reload"
        success_criteria: ["configtest Syntax OK", "graceful reload", "edu_rules.conf 에 id 등록"]

  - order: 6
    instruction: |
      ## 🎯 미션 — 안전장치 체험: 잘못된 룰은 거부된다

      일부러 문법이 틀린 룰을 적용해 본다. configtest 가 실패해 룰이 **거부**되고, 웹서버는 그대로
      **살아남는다**. (운영 WAF 를 죽이지 않는 안전장치)

      ## 💻 실행 명령 (WAF 장비에서)
      편집기로 임시 룰 파일을 하나 만들어 **일부러 틀린 룰**을 넣어 본다 —
      `sudo nano /etc/modsecurity/edu-bad.conf` 로 열어 다음 한 줄을 넣고 저장:
      ```
      SecRule ARGS "@rx (unclosed" "id:9000098,phase:2,deny,bogusaction"
      ```
      그다음 문법 검사 → **실패**를 확인하고, reload 하지 말고 그 파일을 지워 되돌린다:
      ```bash
      sudo apache2ctl configtest      # Syntax error ... 로 실패
      sudo rm -f /etc/modsecurity/edu-bad.conf      # 되돌림 (reload 안 했으니 운영 WAF 무사)
      ```
      ## ✅ 합격 기준
      configtest 가 실패해 `문법 오류` 로 거부된다(reload 안 함 → 기존 설정·웹서버 보존).
    hint: '잘못된 룰 → configtest 실패 → reload 안 하고 제거. expect: 문법 오류'
    answer: |
      # 틀린 SecRule 을 configtest 로 검사 → 실패 확인 후 되돌림 (WAF 장비에서)
      ssh ccc@10.20.32.80 'echo "SecRule ARGS \"@rx (unclosed\" \"id:9000098,phase:2,deny,bogusaction\"" | sudo tee /etc/modsecurity/edu-bad.conf >/dev/null; if sudo apache2ctl configtest 2>&1 | grep -qiE "syntax error|error on line|failed"; then echo "문법 오류 — 룰 거부, reload 안 함, 웹서버 보존"; else echo "예상외 통과"; fi; sudo rm -f /etc/modsecurity/edu-bad.conf'
    answer_detail: "틀린 룰은 configtest(apache2ctl configtest)에서 Syntax error 로 잡혀 거부된다. reload 를 하지 않으므로 운영 WAF 는 기존 설정 그대로 살아남는다 — 잘못된 룰이 웹서버를 죽이지 않게 하는 실무 안전장치. 확인 후 나쁜 룰 파일을 제거."
    verify:
      type: output_contains
      expect: 문법 오류
      field: stdout
      semantic:
        intent: "configtest 보호를 직접 체험 — 잘못된 룰이 웹서버를 죽이지 않음"
        success_criteria: ["ok=false", "문법 오류 반환", "웹서버는 정상"]

  - order: 7
    instruction: |
      ## 🎯 미션 — 실제 차단 확인 (403)

      차단용 SecRule 을 만들고(ARGS 에 EDUBLKW5 포함 시 deny), 내 공격 VM(`192.168.0.202`)에서 그
      요청을 자연 URL 로 보내 **403 차단**을 확인한다. dvwa 는 전역 On(차단) vhost 다.

      ## 💻 실행 명령
      ① WAF 장비에서 차단 SecRule 을 추가한다 — `sudo nano /etc/modsecurity/edu_rules.conf` 로 열어
      맨 아래에 다음 한 줄을 추가·저장한 뒤 검사·reload:
      ```
      SecRule ARGS "@contains EDUBLKW5" "id:9000077,phase:2,t:none,deny,status:403,log,msg:EDU-live-block,severity:CRITICAL"
      ```
      ```bash
      ssh ccc@10.20.32.80
      # (nano 로 위 줄 추가·저장 후)
      sudo apache2ctl configtest && sudo apache2ctl graceful
      ```

      ② 그 패턴으로 요청을 보낸다. **GET 요청이라 브라우저로 열든 curl 로 보내든 완전히 동일하다.**

      - **브라우저(학생 PC):** 주소창에 아래 URL 을 붙여넣고 열면 `403 Forbidden` 이 뜬다 →
        `http://dvwa.el34.lab/?q=EDUBLKW5`
      - **CLI(채점용, 내 공격 VM 에서 같은 요청):**
        ```bash
        ssh att@192.168.0.202
        echo "응답: $(echo -en 'GET /?q=EDUBLKW5 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"
        ```
      ## ✅ 합격 기준
      차단되어 응답 코드 `403` 이 보인다(브라우저면 403 Forbidden 페이지).
    hint: '차단 룰 적용 후 그 패턴으로 자연 URL 접속 → 403'
    answer: |
      # ① (편집기로 SecRule 추가·저장한 것과 동일 — 채점용 비대화식) WAF 장비에서 차단 룰 적용
      ssh ccc@10.20.32.80 'grep -q id:9000077 /etc/modsecurity/edu_rules.conf || echo "SecRule ARGS \"@contains EDUBLKW5\" \"id:9000077,phase:2,t:none,deny,status:403,log,msg:EDU-live-block,severity:CRITICAL\"" | sudo tee -a /etc/modsecurity/edu_rules.conf >/dev/null; sudo apache2ctl configtest >/dev/null 2>&1 && sudo apache2ctl graceful >/dev/null 2>&1; echo applied'
      # ② 공격 VM(202)에서 그 패턴으로 자연 URL 요청 → 403
      echo "응답: $(ssh att@192.168.0.202 "echo -en 'GET /?q=EDUBLKW5 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
    answer_detail: "ARGS @contains EDUBLKW5 deny → 그 파라미터가 든 요청은 dvwa(On)에서 403 으로 차단된다. WAF 가 실제로 막는 것을 응답 코드로 확인(modsec_audit.log 에도 기록). 자연 URL(http://dvwa.el34.lab) 사용."
    verify:
      type: output_contains
      expect: "403"
      field: stdout
      semantic:
        intent: "내가 만든 SecRule 이 실제 공격을 403 으로 차단함을 확인 — 차단의 실증"
        success_criteria: ["deny 룰 적용", "해당 패턴 요청 403", "정상 요청은 통과"]

  - order: 8
    instruction: |
      ## 🎯 미션 — 내 SecRule 이 올바르게 구성됐는지 검증

      sqlmap 차단 SecRule(S5, id 9000011)이 정답 조건을 갖췄는지 자가 점검한다: ① 올바른 변수
      (`REQUEST_HEADERS:User-Agent`) ② 연산자·패턴(`@contains sqlmap`) ③ 차단 액션(`deny`). 그리고
      전체 설정이 문법상 유효한지(configtest)도 함께 본다.

      ## 💻 실행 명령 (WAF 장비에서)
      ```bash
      # 내 룰이 올바른 변수·패턴·액션을 갖췄는지 확인
      grep 'id:9000011' /etc/modsecurity/edu_rules.conf | grep -oE 'REQUEST_HEADERS:User-Agent|@contains sqlmap|deny'
      # 전체 설정 문법 유효성
      sudo apache2ctl configtest
      ```
