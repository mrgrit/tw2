lab_id: agent-ir-adv-week03
title: "W03 — AD Kerberoasting: TGS 요청 이상·약한 표적 식별·서비스 계정 강화"
version: ai
course: agent-ir-adv
week: 3
description: |
  AD Kerberoasting 탐지·방어. 비정상 TGS 대량 요청 탐지(KERBEROAST_DETECTED), 약한 암호화·계정 식별
  (WEAK_TARGET), gMSA·AES 강화(HARDENED), 종합(Assessment).
  ⚠️ Windows/AD 텔레메트리 el34 미보유 — 탐지 로직 결정론 시뮬(Windows 4769 이벤트 상당).
difficulty: hard
duration_minutes: 150
audience: 에이전트 IR 심화 (3주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W03 강의안 정독 — §0.5(Kerberoasting·TGS 이상·gMSA)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "비정상 TGS 대량 요청 탐지(KERBEROAST_DETECTED)"
  - "약한 암호화·계정 식별(WEAK_TARGET)"
  - "gMSA·AES 강화(HARDENED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 비정상 TGS 요청 탐지 → KERBEROAST_DETECTED
      > **🎯 목표:** 한 계정의 대량 SPN 티켓 요청을 탐지(Windows 4769 상당).
      > **개념:** 오프라인 크랙은 안 보이니 요청 단계를 노린다.
      ```bash
      python3 - <<'PY'
      # TGS 요청 로그 (계정, 요청한 SPN)
      requests=[{"user":"jdoe","spn":f"MSSQLSvc/host{i}"} for i in range(12)] + \
               [{"user":"alice","spn":"HTTP/webapp"}]
      from collections import defaultdict
      by_user=defaultdict(set)
      for r in requests: by_user[r["user"]].add(r["spn"])
      THRESHOLD=10   # 짧은 시간 10개 이상 SPN 티켓 = 정상 사용자 아님
      suspects=[u for u,spns in by_user.items() if len(spns)>=THRESHOLD]
      for u,spns in by_user.items(): print(f"  {u}: {len(spns)} distinct SPN tickets requested")
      print("KERBEROAST_DETECTED" if suspects else "NORMAL")
      PY
      ```
      ✅ 마지막 줄 `KERBEROAST_DETECTED` (jdoe가 12개 SPN 티켓 요청 = 대량, 정상 아님).
      🔎 정상 사용자는 서비스 티켓 몇 개만. 한 계정의 대량 SPN 요청은 Kerberoasting 열거 신호.
    answer: |
      jdoe: 12 distinct SPN tickets requested
      alice: 1 distinct SPN tickets requested
      KERBEROAST_DETECTED
    answer_detail: "한 계정의 대량 SPN 티켓 요청 탐지 → KERBEROAST_DETECTED. 요청 단계 탐지."
    verify:
      type: output_contains
      expect: KERBEROAST_DETECTED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 약한 표적 식별 → WEAK_TARGET
      > **🎯 목표:** RC4 암호화·약한 비밀번호 서비스 계정 식별.
      > **개념:** 크랙 성공은 약한 표적에 달렸다.
      ```bash
      python3 - <<'PY'
      # 서비스 계정 (암호화 유형, 비밀번호 정책)
      accounts=[{"name":"svc_sql","etype":"RC4","pw_len":8,"managed":False},   # 약함: RC4+짧은 pw+수동
                {"name":"svc_web","etype":"AES256","pw_len":25,"managed":False},
                {"name":"svc_app","etype":"AES256","pw_len":120,"managed":True}]  # gMSA
      weak=[]
      for a in accounts:
          risk=[]
          if a["etype"]=="RC4": risk.append("RC4 (crackable)")
          if a["pw_len"]<20 and not a["managed"]: risk.append("short password")
          if risk: weak.append((a["name"],risk))
          print(f"  {a['name']}: etype={a['etype']} pw_len={a['pw_len']} managed={a['managed']} -> {risk or 'strong'}")
      print("WEAK_TARGET" if weak else "ALL_STRONG")
      PY
      ```
      ✅ 마지막 줄 `WEAK_TARGET` (svc_sql: RC4+8자 비밀번호 = 크랙 쉬움).
      🔎 RC4+짧은 비밀번호+수동관리 = 오프라인 크랙 표적. AES+긴 비밀번호+gMSA면 사실상 안전.
    answer: |
      svc_sql: etype=RC4 pw_len=8 managed=False -> ['RC4 (crackable)', 'short password']
      svc_web: etype=AES256 pw_len=25 managed=False -> strong
      svc_app: etype=AES256 pw_len=120 managed=True -> strong
      WEAK_TARGET
    answer_detail: "RC4·약한 비밀번호 서비스 계정 식별 → WEAK_TARGET. 크랙 표적."
    verify:
      type: output_contains
      expect: WEAK_TARGET
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 서비스 계정 강화 → HARDENED
      > **🎯 목표:** gMSA·AES로 서비스 계정을 강화.
      > **개념:** 약한 비밀번호를 없애면 Kerberoasting 무력화.
      ```bash
      python3 - <<'PY'
      # 약한 계정 강화 정책 적용
      def harden(account):
          return {"name":account["name"], "etype":"AES256",
                  "pw_len":120, "managed":True, "note":"converted to gMSA (auto 120-char rotation)"}
      weak={"name":"svc_sql","etype":"RC4","pw_len":8,"managed":False}
      hardened=harden(weak)
      # 강화 후 크랙 가능성 평가
      def crackable(a): return a["etype"]=="RC4" or (a["pw_len"]<20 and not a["managed"])
      print("before:", {k:weak[k] for k in ["etype","pw_len","managed"]}, "crackable:", crackable(weak))
      print("after :", {k:hardened[k] for k in ["etype","pw_len","managed"]}, "crackable:", crackable(hardened))
      print("HARDENED" if crackable(weak) and not crackable(hardened) else "CHECK")
      PY
      ```
      ✅ 마지막 줄 `HARDENED` (svc_sql을 gMSA+AES로 강화 → 크랙 불가).
      🔎 gMSA(120자 자동 갱신)+AES면 오프라인 크랙이 사실상 불가. 공격의 전제(약한 비밀번호)를 제거.
    answer: |
      before: {'etype': 'RC4', 'pw_len': 8, 'managed': False} crackable: True
      after : {'etype': 'AES256', 'pw_len': 120, 'managed': True} crackable: False
      HARDENED
    answer_detail: "gMSA+AES로 서비스 계정 강화, 크랙 불가 → HARDENED. 공격 전제 제거."
    verify:
      type: output_contains
      expect: HARDENED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W03 on AD Kerberoasting. Findings: one account requesting many SPN tickets was detected (KERBEROAST_DETECTED), a service account with RC4 and a short password was identified as weak (WEAK_TARGET), and converting it to a gMSA with AES made it uncrackable (HARDENED). Explain that attackers request TGS tickets and crack them offline, AI does this in minutes, and defense monitors ticket requests plus strong/managed passwords and AES. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: Kerberoasting은 티켓 오프라인 크랙. 요청 이상 탐지+gMSA/AES 강화로 방어. 약한 비밀번호가 전제.
      다음 주(W04)는 **Cloud IAM 자동 Pivot**.
    answer: |
      Assessment
      Kerberoasting requests service TGS tickets and cracks them offline; AI does this in minutes.
      Defense monitors ticket-request anomalies and enforces strong/managed (gMSA) passwords with AES.
    answer_detail: "W03 Kerberoasting 종합(Assessment). 요청 이상 탐지·gMSA/AES 강화."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
