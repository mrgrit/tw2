lab_id: standalone-soc-adv-week08
title: "메모리 포렌식 — 휘발성 메모리에서 은닉 위협 복원"
version: standalone-soc-adv
course: soc-adv
week: 8
description: |
  SOC 고급 W08 — 메모리 포렌식. 디스크에 없는 것이 메모리에는 있다. /proc 가상 파일시스템으로 실행 중
  프로세스의 메모리 영역·인자·환경변수·열린 파일을 분석하고, 디스크에서 삭제된 실행 파일(on_disk=0)의
  원본을 메모리에서 복원한다. el34-web /proc 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc-adv W06(헌팅 on_disk=0)·W07(네트워크 포렌식) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(/proc 구조) §3(메모리 복원) §4(휘발성 순서) 숙지"
objectives:
  - "/proc로 프로세스 메모리·인자·환경 분석"
  - "삭제된 실행 파일을 메모리에서 복원"
  - "휘발성 순서(order of volatility) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 메모리 포렌식의 원천(/proc)이 보이는지 확인
      > **이 단계에서 할 일:** /proc 아래 숫자(PID) 디렉터리 개수를 세어 실행 중 프로세스가 보이는지 본다.
      > **왜:** 메모리 포렌식의 모든 소스는 /proc 가상 파일시스템이다 — 커널이 실행 중 프로세스를 파일처럼
      > 노출한다. 각 /proc/<pid>가 그 프로세스의 메모리를 들여다보는 창.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c 'N=$(ls -d /proc/[0-9]* 2>/dev/null | wc -l); echo "실행 중 프로세스 ${N}개 가시"; [ "$N" -ge 1 ] && echo proc_ready'
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 환경마다 다름)
      ```
      실행 중 프로세스 16개 가시
      proc_ready
      ```

      ### ▷ 결과 해석
      /proc/<pid> 디렉터리가 보이면(여기선 16개) 각 프로세스의 cmdline·environ·exe·maps·fd를 파일처럼
      읽을 수 있다는 뜻. 디스크에 없는 것도 여기엔 살아 있다 — 그게 메모리 포렌식의 힘.
    hint: '/proc'
    category: survey
    points: 10
    answer: |
      # 1) /proc PID 디렉터리 개수 집계 + 1개 이상이면 마커
      docker exec el34-web sh -c 'N=$(ls -d /proc/[0-9]* 2>/dev/null | wc -l); echo "실행 중 프로세스 ${N}개 가시"; [ "$N" -ge 1 ] && echo proc_ready'
    answer_detail: "메모리 포렌식 소스 = /proc 가상 파일시스템. 각 /proc/<pid>가 실행 중 프로세스의 창."
    verify:
      type: output_contains
      expect: 'proc_ready'
      field: stdout
      semantic: {intent: "/proc 접근", success_criteria: ["/proc"], acceptable_methods: ["**[OSS] /proc (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 전체 실행 인자를 복원한다 (cmdline)
      > **이 단계에서 할 일:** 첫 PID의 /proc/<pid>/cmdline을 읽어 전체 실행 인자를 본다.
      > **왜:** ps는 긴 명령행을 자른다. /proc/<pid>/cmdline에는 잘리지 않은 전체 인자가 있어, 숨은
      > 옵션이나 평문 비밀번호까지 복원된다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        tr "\0" " " < /proc/$PID/cmdline 2>/dev/null | head -c 60; echo
        [ -n "$PID" ] && echo cmdline_read
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 프로세스는 환경마다 다름)
      ```
      sshd: /usr/sbin/sshd -D -e [listener] 0 of 10-100 startups
      cmdline_read
      ```

      ### ▷ 결과 해석
      cmdline은 NUL(\0)로 구분된 인자라 공백으로 치환해 읽는다. 여기선 첫 PID가 sshd(데몬). 침해 조사에선
      이렇게 의심 프로세스의 전체 인자를 보고 `-c base64...`, `nc -e`, DB 비밀번호 노출 등을 찾는다.
    hint: 'cmdline'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # cmdline(NUL 구분 인자)을 공백으로 치환해 앞 60자 표시
        tr "\0" " " < /proc/$PID/cmdline 2>/dev/null | head -c 60; echo
        # cmdline을 읽었으면 마커
        [ -n "$PID" ] && echo cmdline_read
      '
    answer_detail: "cmdline = /proc/<pid>/cmdline. NUL 구분 실행 인자. ps가 자르는 전체 명령행 복원."
    verify:
      type: output_contains
      expect: 'cmdline_read'
      field: stdout
      semantic: {intent: "cmdline", success_criteria: ["인자"], acceptable_methods: ["**[OSS] /proc/cmdline (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 메모리 속 환경변수를 점검한다 (environ)
      > **이 단계에서 할 일:** 첫 PID의 /proc/<pid>/environ에서 환경변수 개수를 센다.
      > **왜:** 디스크의 .env가 지워져도 프로세스 메모리의 environ엔 토큰·DB 자격 같은 비밀이 남아 있곤
      > 한다 — 유출 점검의 핵심 자리.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        C=$(tr "\0" "\n" < /proc/$PID/environ 2>/dev/null | grep -c "=")
        echo "환경변수 ${C}개"
        [ -n "$PID" ] && echo environ_read
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 프로세스마다 다름)
      ```
      환경변수 0개
      environ_read
      ```

      ### ▷ 결과 해석
      여기선 첫 PID(sshd)의 environ이 0개로 보인다(루트 데몬은 환경이 비거나, 권한상 안 보일 수 있다).
      앱 프로세스의 PID를 골라 보면 DB_PASSWORD·API_TOKEN 같은 비밀이 메모리에 그대로 노출되는 걸 흔히 본다.
    hint: 'environ'
    category: manipulation
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # environ에서 "=" 포함 줄 수 = 환경변수 개수
        C=$(tr "\0" "\n" < /proc/$PID/environ 2>/dev/null | grep -c "=")
        echo "환경변수 ${C}개"
        # environ을 읽었으면 마커
        [ -n "$PID" ] && echo environ_read
      '
    answer_detail: "environ = /proc/<pid>/environ. 메모리에만 남은 비밀(토큰·DB 자격) 복원·유출 점검 핵심."
    verify:
      type: output_contains
      expect: 'environ_read'
      field: stdout
      semantic: {intent: "environ", success_criteria: ["환경변수"], acceptable_methods: ["**[OSS] /proc/environ (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 삭제된 실행 파일을 메모리에서 되살린다 (exe)
      > **이 단계에서 할 일:** 첫 PID의 /proc/<pid>/exe 링크가 가리키는 바이너리 경로를 확인한다.
      > **왜:** exe는 실행 중 바이너리로의 링크다. 디스크에서 지워져도(on_disk=0) 이 링크를 cp 하면
      > 메모리 이미지에서 원본 멀웨어를 복원할 수 있다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        readlink /proc/$PID/exe 2>/dev/null
        echo "(지워졌다면 (deleted) 표시 → exe로 원본 복원)"
        [ -n "$PID" ] && echo exe_recovered
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      /usr/sbin/sshd
      (지워졌다면 (deleted) 표시 → exe로 원본 복원)
      exe_recovered
      ```

      ### ▷ 결과 해석
      정상 프로세스는 실제 경로(/usr/sbin/sshd)가 보인다. 멀웨어가 자기 파일을 지운 채 돌고 있으면
      readlink에 `/tmp/x (deleted)`처럼 (deleted)가 붙는다 → `cp /proc/<pid>/exe 복원본`으로 분석용
      원본을 되살린다.
    hint: 'exe 복원'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # exe 링크 대상 확인 (지워졌으면 (deleted))
        readlink /proc/$PID/exe 2>/dev/null
        echo "(지워졌다면 (deleted) 표시 → exe로 원본 복원)"
        # exe 링크를 확인했으면 마커
        [ -n "$PID" ] && echo exe_recovered
      '
    answer_detail: "exe 복원 = /proc/<pid>/exe 링크. on_disk=0(삭제 후 실행) 멀웨어를 메모리에서 원본 복원."
    verify:
      type: output_contains
      expect: 'exe_recovered'
      field: stdout
      semantic: {intent: "exe 복원", success_criteria: ["바이너리 복원"], acceptable_methods: ["**[OSS] /proc/exe (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 인젝션·은닉을 본다 (maps·fd)
      > **이 단계에서 할 일:** 첫 PID의 maps에서 rwxp(쓰기+실행 동시) 영역 수와, fd(열린 파일/소켓)
      > 개수를 센다.
      > **왜:** maps의 rwxp 영역은 코드 인젝션 의심 지표(정상 코드는 보통 r-xp). fd엔 삭제된 파일
      > 핸들·은닉 소켓이 보인다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        echo "rwxp(쓰기+실행) 영역: $(grep -c rwxp /proc/$PID/maps 2>/dev/null)개"
        echo "열린 fd: $(ls /proc/$PID/fd 2>/dev/null | wc -l)개"
        [ -n "$PID" ] && echo maps_fd_read
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수는 프로세스마다 다름)
      ```
      rwxp(쓰기+실행) 영역: 0개
      열린 fd: 5개
      maps_fd_read
      ```

      ### ▷ 결과 해석
      rwxp 0개 = 쓰기+실행 동시 메모리 영역이 없다(정상). 1개 이상이면 셸코드 인젝션 의심 → 그 영역을
      덤프해 분석. fd 5개는 이 프로세스가 연 파일/소켓 수 — `ls -l /proc/<pid>/fd`로 (deleted) 핸들이나
      예상 밖 소켓을 찾는다.
    hint: 'maps/fd'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # maps의 rwxp(쓰기+실행) 영역 개수 (인젝션 의심)
        echo "rwxp(쓰기+실행) 영역: $(grep -c rwxp /proc/$PID/maps 2>/dev/null)개"
        # fd = 열린 파일/소켓 디스크립터 수
        echo "열린 fd: $(ls /proc/$PID/fd 2>/dev/null | wc -l)개"
        # 두 영역을 읽었으면 마커
        [ -n "$PID" ] && echo maps_fd_read
      '
    answer_detail: "maps/fd = 메모리 매핑(rwxp=인젝션 의심)·열린 파일 디스크립터(은닉 핸들). 인젝션·은닉 탐지."
    verify:
      type: output_contains
      expect: 'maps_fd_read'
      field: stdout
      semantic: {intent: "maps/fd", success_criteria: ["메모리 영역"], acceptable_methods: ["**[OSS] /proc/maps (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 숨은 프로세스를 찾는다 (/proc vs ps)
      > **이 단계에서 할 일:** 커널이 직접 노출하는 /proc의 PID 개수와, ps가 보고하는 개수를 교차 비교한다.
      > **왜:** 루트킷은 ps의 출력을 가릴 수 있다. /proc는 커널이 직접 노출해 속이기 어렵다 — 두 수의
      > 차이가 곧 은닉 프로세스 신호.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        PROC=$(ls /proc | grep -cE "^[0-9]+$")
        PS=$(ps -e 2>/dev/null | grep -c "[0-9]")
        echo "proc=$PROC ps=$PS"
        [ "$PROC" -ge 1 ] && echo crosscheck_done
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수는 환경마다 다름)
      ```
      proc=16 ps=16
      crosscheck_done
      ```

      ### ▷ 결과 해석
      proc와 ps가 같으면(16=16) 숨은 프로세스 없음(정상). proc > ps면 ps에는 안 보이는데 /proc엔 있는
      프로세스가 있다는 뜻 = ps를 가린 루트킷 의심 → 그 PID를 /proc에서 직접 조사한다.
    hint: '교차 비교'
    category: analysis
    points: 12
    answer: |
      docker exec el34-web sh -c '
        # /proc PID 개수 (커널 직접)
        PROC=$(ls /proc | grep -cE "^[0-9]+$")
        # ps 프로세스 개수 (라이브러리 경유)
        PS=$(ps -e 2>/dev/null | grep -c "[0-9]")
        # 교차 비교: 차이=루트킷 은닉 의심
        echo "proc=$PROC ps=$PS"
        [ "$PROC" -ge 1 ] && echo crosscheck_done
      '
    answer_detail: "교차 비교 = /proc PID 목록 vs ps 출력. 차이 = ps를 가린 루트킷의 은닉 프로세스 의심."
    verify:
      type: output_contains
      expect: 'crosscheck_done'
      field: stdout
      semantic: {intent: "교차 비교", success_criteria: ["은닉 탐지"], acceptable_methods: ["**[OSS] /proc vs ps (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 휘발성 높은 것부터 수집한다 (order of volatility)
      > **이 단계에서 할 일:** 메모리(/proc)→네트워크(/proc/net/tcp)→디스크 순으로 실제 수집해 보며
      > 수집 순서를 실증한다.
      > **왜:** 증거는 사라지기 전에 잡아야 한다(RFC 3227). 메모리·연결 상태는 재부팅이면 소멸하므로
      > 디스크보다 먼저 수집한다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-web sh -c '
        echo "휘발성 순서(RFC 3227) 실수집:"
        P=$(ls /proc 2>/dev/null | grep -cE "^[0-9]+$"); echo "1) 메모리·프로세스(/proc): ${P}개"
        NC=$(cat /proc/net/tcp 2>/dev/null | wc -l); echo "2) 네트워크 상태(/proc/net/tcp): ${NC}줄"
        echo "3) 디스크(영속, 마지막)"
        [ "$P" -ge 1 ] && echo volatility_order_done
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수는 환경마다 다름)
      ```
      휘발성 순서(RFC 3227) 실수집:
      1) 메모리·프로세스(/proc): 16개
      2) 네트워크 상태(/proc/net/tcp): 38줄
      3) 디스크(영속, 마지막)
      volatility_order_done
      ```

      ### ▷ 결과 해석
      순서대로 메모리(1순위)→네트워크 연결(2순위)→디스크(3순위)를 수집했다. 실수로 디스크부터 만지면
      그 행위가 메모리·캐시를 바꿔 휘발성 증거를 오염시킨다. 그래서 '가장 빨리 사라지는 것부터'가 원칙.
    hint: '휘발성 순서'
    category: report
    points: 10
    answer: |
      docker exec el34-web sh -c '
        echo "휘발성 순서(RFC 3227) 실수집:"
        # 1순위: 메모리·프로세스(/proc) — 먼저 수집
        P=$(ls /proc 2>/dev/null | grep -cE "^[0-9]+$"); echo "1) 메모리·프로세스(/proc): ${P}개"
        # 2순위: 네트워크 상태
        NC=$(cat /proc/net/tcp 2>/dev/null | wc -l); echo "2) 네트워크 상태(/proc/net/tcp): ${NC}줄"
        # 3순위: 디스크(마지막)
        echo "3) 디스크(영속, 마지막)"
        # 메모리를 실제 먼저 수집했으면 마커
        [ "$P" -ge 1 ] && echo volatility_order_done
      '
    answer_detail: "휘발성 순서 = /proc 메모리·네트워크를 실제 먼저 수집. 가짜 echo 아닌 실수집. RFC 3227."
    verify:
      type: output_contains
      expect: 'volatility_order_done'
