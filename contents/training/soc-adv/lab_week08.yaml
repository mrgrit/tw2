lab_id: standalone-soc-adv-week08
title: "메모리 포렌식 — 휘발성 메모리에서 은닉 위협 복원"
version: standalone-soc-adv
course: soc-adv
week: 8
description: |
  SOC 고급 W08 — 메모리 포렌식. 디스크에 없는 것이 메모리에는 있다. /proc 가상 파일시스템으로 실행 중
  프로세스의 메모리 영역·인자·환경변수·열린 파일을 분석하고, 디스크에서 삭제된 실행 파일(on_disk=0)의
  원본을 메모리에서 복원한다. el34-web /proc 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc-adv W06(헌팅 on_disk=0)·W07(네트워크 포렌식) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(/proc 구조) §3(메모리 복원) §4(휘발성 순서) 숙지"
objectives:
  - "/proc로 프로세스 메모리·인자·환경 분석"
  - "삭제된 실행 파일을 메모리에서 복원"
  - "휘발성 순서(order of volatility) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 /proc 접근 확인
      **실습 의미:** 메모리 포렌식의 모든 소스는 /proc 가상 파일시스템이다(커널이 실행 중 프로세스를 파일처럼 노출) — 먼저 /proc가 보이는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) /proc 아래 숫자(PID) 디렉터리 개수를 세어 실행 중 프로세스 가시성을 확인하고, 1개 이상이면 마커
      docker exec el34-web sh -c 'N=$(ls -d /proc/[0-9]* 2>/dev/null | wc -l); echo "실행 중 프로세스 ${N}개 가시"; [ "$N" -ge 1 ] && echo proc_ready'
      ```
      ## ✅ 합격 기준
      `proc_ready`(과 프로세스 수)가 출력되면 통과. **근거:** 마커는 /proc에서 프로세스가 실제 보일 때만 찍히므로, 메모리 포렌식 원천 데이터가 확보됐음을 뜻한다.
    hint: '/proc'
    category: survey
    points: 10
    answer: |
      # 1) /proc PID 디렉터리 개수 집계 + 1개 이상이면 마커
      docker exec el34-web sh -c 'N=$(ls -d /proc/[0-9]* 2>/dev/null | wc -l); echo "실행 중 프로세스 ${N}개 가시"; [ "$N" -ge 1 ] && echo proc_ready'
    answer_detail: "메모리 포렌식 소스 = /proc 가상 파일시스템. 각 /proc/<pid>가 실행 중 프로세스의 창."
    verify:
      type: output_contains
      expect: 'proc_ready'
      field: stdout
      semantic: {intent: "/proc 접근", success_criteria: ["/proc"], acceptable_methods: ["**[OSS] /proc (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 프로세스 인자 (cmdline)
      **실습 의미:** /proc/<pid>/cmdline은 프로세스의 전체 실행 인자다 — ps로 잘리는 긴 명령행·숨은 옵션·평문 비밀번호를 여기서 복원한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 분석할 첫 번째 실제 프로세스 PID를 고른다
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # cmdline은 NUL로 구분된 전체 실행 인자 → 공백으로 치환해 앞 60자 표시 (ps가 자르는 긴 명령 복원)
        tr "\0" " " < /proc/$PID/cmdline 2>/dev/null | head -c 60; echo
        # PID를 잡아 cmdline을 읽었으면 분석 완료 마커
        [ -n "$PID" ] && echo cmdline_read
      '
      ```
      ## ✅ 합격 기준
      `cmdline_read`(과 인자 일부)가 출력되면 통과. **근거:** 마커는 PID를 잡아 cmdline을 실제 읽었을 때만 찍히므로, ps가 자르는 전체 명령행을 복원했음을 뜻한다.
    hint: 'cmdline'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # cmdline(NUL 구분 인자)을 공백으로 치환해 앞 60자 표시
        tr "\0" " " < /proc/$PID/cmdline 2>/dev/null | head -c 60; echo
        # cmdline을 읽었으면 마커
        [ -n "$PID" ] && echo cmdline_read
      '
    answer_detail: "cmdline = /proc/<pid>/cmdline. NUL 구분 실행 인자. ps가 자르는 전체 명령행 복원."
    verify:
      type: output_contains
      expect: 'cmdline_read'
      field: stdout
      semantic: {intent: "cmdline", success_criteria: ["인자"], acceptable_methods: ["**[OSS] /proc/cmdline (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 환경 변수 (environ)
      **실습 의미:** /proc/<pid>/environ은 프로세스 환경변수다 — 디스크 .env가 지워져도 메모리엔 남아 토큰·DB 자격 같은 비밀이 노출되곤 한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # environ(NUL 구분 환경변수)을 줄바꿈으로 바꿔 "=" 포함 줄 수 = 환경변수 개수 집계 (메모리 속 비밀 점검)
        C=$(tr "\0" "\n" < /proc/$PID/environ 2>/dev/null | grep -c "=")
        echo "환경변수 ${C}개"
        # environ을 읽었으면 마커
        [ -n "$PID" ] && echo environ_read
      '
      ```
      ## ✅ 합격 기준
      `environ_read`(과 환경변수 수)가 출력되면 통과. **근거:** 마커는 environ을 실제 읽었을 때만 찍히므로, 메모리에만 남은 비밀(토큰·자격)을 복원·점검할 수 있음을 뜻한다.
    hint: 'environ'
    category: manipulation
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # environ에서 "=" 포함 줄 수 = 환경변수 개수
        C=$(tr "\0" "\n" < /proc/$PID/environ 2>/dev/null | grep -c "=")
        echo "환경변수 ${C}개"
        # environ을 읽었으면 마커
        [ -n "$PID" ] && echo environ_read
      '
    answer_detail: "environ = /proc/<pid>/environ. 메모리에만 남은 비밀(토큰·DB 자격) 복원·유출 점검 핵심."
    verify:
      type: output_contains
      expect: 'environ_read'
      field: stdout
      semantic: {intent: "environ", success_criteria: ["환경변수"], acceptable_methods: ["**[OSS] /proc/environ (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 삭제된 실행 파일 복원 (exe)
      **실습 의미:** /proc/<pid>/exe는 실행 중 바이너리로의 링크다 — 디스크에서 지워져도(on_disk=0) 이 링크를 cp 하면 메모리 이미지로 원본을 되살린다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # /proc/<pid>/exe 링크 대상 확인 (지워졌으면 " (deleted)" 표시 → 이 링크를 cp 하면 원본 복원)
        readlink /proc/$PID/exe 2>/dev/null
        echo "(지워졌다면 (deleted) 표시 → exe로 원본 복원)"
        # exe 링크를 확인했으면 마커
        [ -n "$PID" ] && echo exe_recovered
      '
      ```
      ## ✅ 합격 기준
      `exe_recovered`(과 링크 경로)가 출력되면 통과. **근거:** 마커는 exe 링크를 실제 확인했을 때만 찍히므로, on_disk=0(삭제 후 실행) 멀웨어를 메모리에서 복원할 수 있음을 뜻한다.
    hint: 'exe 복원'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # exe 링크 대상 확인 (지워졌으면 (deleted))
        readlink /proc/$PID/exe 2>/dev/null
        echo "(지워졌다면 (deleted) 표시 → exe로 원본 복원)"
        # exe 링크를 확인했으면 마커
        [ -n "$PID" ] && echo exe_recovered
      '
    answer_detail: "exe 복원 = /proc/<pid>/exe 링크. on_disk=0(삭제 후 실행) 멀웨어를 메모리에서 원본 복원."
    verify:
      type: output_contains
      expect: 'exe_recovered'
      field: stdout
      semantic: {intent: "exe 복원", success_criteria: ["바이너리 복원"], acceptable_methods: ["**[OSS] /proc/exe (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 메모리 영역·열린 파일 (maps·fd)
      **실습 의미:** /proc/<pid>/maps(메모리 매핑)와 fd(열린 파일 디스크립터)로 인젝션된 영역과 은닉 파일 핸들을 본다 — maps의 rwxp(쓰기+실행)는 코드 인젝션 의심 지표다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # maps의 rwxp(쓰기+실행 동시 허용) 영역 개수 = 코드 인젝션 의심 지표
        echo "rwxp(쓰기+실행) 영역: $(grep -c rwxp /proc/$PID/maps 2>/dev/null)개"
        # fd = 열린 파일/소켓 디스크립터 수 (삭제된 파일 핸들도 보임)
        echo "열린 fd: $(ls /proc/$PID/fd 2>/dev/null | wc -l)개"
        # 두 영역을 읽었으면 마커
        [ -n "$PID" ] && echo maps_fd_read
      '
      ```
      ## ✅ 합격 기준
      `maps_fd_read`(과 rwxp·fd 수)가 출력되면 통과. **근거:** 마커는 maps·fd를 실제 읽었을 때만 찍히므로, 인젝션 영역과 은닉 파일 핸들을 점검했음을 뜻한다.
    hint: 'maps/fd'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 분석할 첫 PID 선택
        PID=$(ls /proc | grep -E "^[0-9]+$" | head -1)
        # maps의 rwxp(쓰기+실행) 영역 개수 (인젝션 의심)
        echo "rwxp(쓰기+실행) 영역: $(grep -c rwxp /proc/$PID/maps 2>/dev/null)개"
        # fd = 열린 파일/소켓 디스크립터 수
        echo "열린 fd: $(ls /proc/$PID/fd 2>/dev/null | wc -l)개"
        # 두 영역을 읽었으면 마커
        [ -n "$PID" ] && echo maps_fd_read
      '
    answer_detail: "maps/fd = 메모리 매핑(rwxp=인젝션 의심)·열린 파일 디스크립터(은닉 핸들). 인젝션·은닉 탐지."
    verify:
      type: output_contains
      expect: 'maps_fd_read'
      field: stdout
      semantic: {intent: "maps/fd", success_criteria: ["메모리 영역"], acceptable_methods: ["**[OSS] /proc/maps (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 은닉 프로세스 탐지 (/proc vs ps)
      **실습 의미:** 루트킷은 ps의 출력을 가릴 수 있다 — 커널이 직접 노출하는 /proc의 PID 목록과 ps를 교차 비교해 은닉 프로세스를 찾는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # /proc의 PID 개수 (커널이 직접 노출 — 속이기 어려움)
        PROC=$(ls /proc | grep -cE "^[0-9]+$")
        # ps의 프로세스 개수 (라이브러리 경유 — 루트킷이 가릴 수 있음)
        PS=$(ps -e 2>/dev/null | grep -c "[0-9]")
        # 두 수를 교차 비교: 차이가 크면 ps를 가린 루트킷 의심
        echo "proc=$PROC ps=$PS"
        [ "$PROC" -ge 1 ] && echo crosscheck_done
      '
      ```
      ## ✅ 합격 기준
      `crosscheck_done`(과 proc=·ps= 수)가 출력되면 통과. **근거:** 마커는 두 소스를 실제 집계해 비교했을 때만 찍히므로, ps를 가린 은닉 프로세스를 판정할 수 있음을 뜻한다.
    hint: '교차 비교'
    category: analysis
    points: 12
    answer: |
      docker exec el34-web sh -c '
        # /proc PID 개수 (커널 직접)
        PROC=$(ls /proc | grep -cE "^[0-9]+$")
        # ps 프로세스 개수 (라이브러리 경유)
        PS=$(ps -e 2>/dev/null | grep -c "[0-9]")
        # 교차 비교: 차이=루트킷 은닉 의심
        echo "proc=$PROC ps=$PS"
        [ "$PROC" -ge 1 ] && echo crosscheck_done
      '
    answer_detail: "교차 비교 = /proc PID 목록 vs ps 출력. 차이 = ps를 가린 루트킷의 은닉 프로세스 의심."
    verify:
      type: output_contains
      expect: 'crosscheck_done'
      field: stdout
      semantic: {intent: "교차 비교", success_criteria: ["은닉 탐지"], acceptable_methods: ["**[OSS] /proc vs ps (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 휘발성 순서 (order of volatility)
      **실습 의미:** 증거는 휘발성 높은 것부터 수집해야 사라지기 전에 확보한다(RFC 3227) — 메모리(/proc)를 디스크보다 먼저 수집하는 순서를 직접 실증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        echo "휘발성 순서(RFC 3227) 실수집:"
        # 1순위: 메모리·프로세스(/proc) — 재부팅 시 소멸하므로 가장 먼저 수집
        P=$(ls /proc 2>/dev/null | grep -cE "^[0-9]+$"); echo "1) 메모리·프로세스(/proc): ${P}개"
        # 2순위: 네트워크 연결 상태(/proc/net/tcp)
        NC=$(cat /proc/net/tcp 2>/dev/null | wc -l); echo "2) 네트워크 상태(/proc/net/tcp): ${NC}줄"
        # 3순위: 디스크(영속적이라 마지막)
        echo "3) 디스크(영속, 마지막)"
        # 휘발성 높은 메모리를 실제 먼저 수집했으면 마커
        [ "$P" -ge 1 ] && echo volatility_order_done
      '
      ```
      ## ✅ 합격 기준
      `volatility_order_done` 출력 시 통과. **근거:** 마커는 메모리(/proc)를 실제 먼저 수집했을 때만 찍히므로, 휘발성 순서(메모리→네트워크→디스크) 원칙을 실증했음을 뜻한다.
    hint: '휘발성 순서'
    category: report
    points: 10
    answer: |
      docker exec el34-web sh -c '
        echo "휘발성 순서(RFC 3227) 실수집:"
        # 1순위: 메모리·프로세스(/proc) — 먼저 수집
        P=$(ls /proc 2>/dev/null | grep -cE "^[0-9]+$"); echo "1) 메모리·프로세스(/proc): ${P}개"
        # 2순위: 네트워크 상태
        NC=$(cat /proc/net/tcp 2>/dev/null | wc -l); echo "2) 네트워크 상태(/proc/net/tcp): ${NC}줄"
        # 3순위: 디스크(마지막)
        echo "3) 디스크(영속, 마지막)"
        # 메모리를 실제 먼저 수집했으면 마커
        [ "$P" -ge 1 ] && echo volatility_order_done
      '
    answer_detail: "휘발성 순서 = /proc 메모리·네트워크를 실제 먼저 수집. 가짜 echo 아닌 실수집. RFC 3227."
    verify:
      type: output_contains
      expect: 'volatility_order_done'
      field: stdout
      semantic: {intent: "휘발성 순서", success_criteria: ["수집 순서"], acceptable_methods: ["**[관리적] 휘발성 순서 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 메모리 포렌식 보고서 작성
      **실습 의미:** 앞 단계의 실측(/proc 프로세스 수)을 인용한 보고서로 정리한다 — 추측이 아닌 실측을 근거로 메모리 분석 결과를 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 실측 /proc 프로세스 수를 집계 (보고서 인용 근거)
        P=$(ls /proc 2>/dev/null | grep -cE "^[0-9]+$")
        # 실측 수치를 인용한 메모리 포렌식 보고서 출력 (본문 상세는 학생이 보강)
        echo "# W08 메모리 포렌식 보고서 — /proc ${P}개: cmdline/environ·exe복원·maps/fd·휘발성순서"
        # 실측 인용 보고서면 완료 마커
        [ "$P" -ge 1 ] && echo mem_forensics_report_done
      '
      ```
      ## ✅ 합격 기준
      `mem_forensics_report_done` 출력 시 통과. **근거:** 마커는 실측 /proc 프로세스 수를 인용한 보고서가 생성될 때만 찍히므로, 증거 기반 보고가 작성됐음을 뜻한다.
