lab_id: standalone-soc-adv-week01
title: "SOC 성숙도 평가 — 가시성 공백 점검과 탐지역량 정량화"
version: standalone-soc-adv
course: soc-adv
week: 1
description: |
  SOC 고급 W01 — 성숙도(SOC-CMM)는 문서가 아니라 "실제로 무엇을 탐지하는가"로 증명된다. 공격을 흘려
  웹(ModSec)·네트워크(Suricata)·호스트(osquery)·SIEM(Wazuh) 4계층 가시성을 점검하고, 갭을 정량화한다.
  공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc 트랙 W01~W15 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(가시성 4계층) §3(SOC-CMM) §4(갭 분석) 숙지"
objectives:
  - "4계층(웹·네트워크·호스트·SIEM) 가시성 점검"
  - "탐지 공백 식별·정량화"
  - "SOC-CMM 성숙도 평가·로드맵"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 대상 도달 확인
      **실습 의미:** 4계층 가시성 점검 전에 표적(웹)에 실제 도달하는지부터 확인한다 — 도달이 안 되면 이후 "안 보임"이 가시성 공백인지 단순 미도달인지 구분할 수 없다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자 컨테이너에서 웹 표적(dvwa)에 HTTP 요청을 보내 응답 코드를 dvwa= 형식으로 출력한다
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      `dvwa=` 와 응답코드(예 302)가 출력되면 통과. **근거:** 코드가 찍힌다는 건 표적에 실제 도달했다는 뜻이므로, 이후의 가시성 점검 결과를 신뢰할 수 있다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 웹 표적(dvwa)에 HTTP 요청 → 응답코드를 dvwa= 형식으로 출력 (도달 확인)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "SOC 성숙도 평가 대상 = el34 인프라(웹/네트워크/호스트/SIEM 4계층)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 웹 계층 가시성 — SQLi → ModSec 탐지
      **실습 의미:** "우리 SOC가 웹공격을 보는가?"를 확인한다 — SQLi를 한 발 보내 WAF(ModSec) audit에 탐지로 남는지로 웹 계층 가시성을 판정.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자가 SQLi(UNION SELECT) 요청을 웹 표적에 전송한다
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'sqli=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password--\""
      # 2) 웹서버 ModSec audit 로그에서 SQLi 탐지 룰군(942xxx)만 골라 발화 횟수를 센다
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '942[0-9]{3}' | sort | uniq -c | head -3"
      ```
      ## ✅ 합격 기준
      `942`(CRS의 SQLi 룰군)가 출력되면 통과. **근거:** 942가 audit에 남았다는 건 ModSec이 SQLi를 실제로 탐지했다는 뜻이라, 웹 계층 가시성이 확보된 것이다.
    hint: 'ModSec 942'
    category: manipulation
    points: 14
    answer: |
      # 1) 공격자가 SQLi(UNION SELECT) 요청 전송
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'sqli=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password--\""
      # 2) ModSec audit 로그에서 SQLi 탐지 룰군(942xxx)만 골라 발화 횟수 집계 → 942가 보이면 SQLi 탐지됨
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '942[0-9]{3}' | sort | uniq -c | head -3"
    answer_detail: "웹 가시성 = SQLi 시도가 ModSec 942 audit에 탐지로 남는가. 942 보이면 웹공격 가시성 있음."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic:
        intent: "웹 가시성"
        success_criteria: ["942 탐지"]
        acceptable_methods: ["**[OSS] modsec audit (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ② 네트워크 계층 가시성 — Suricata 흔적
      **실습 의미:** 네트워크 계층(IPS)이 공격 트래픽을 보는가 — 스캔을 흘려 Suricata eve.json에 출처 IP 흔적이 남는지로 판정.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자가 포트 스캔을 수행한다 (IPS가 트래픽을 보게 만든다)
      docker exec el34-attacker sh -c "nmap -sS -T4 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open"
      # 2) IPS eve.json에서 출처 IP(10.20.30.202) 흔적 건수를 센다
      docker exec el34-ips sh -c "tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"
      # 3) 네트워크 가시성 점검 완료 마커
      echo netvis_done
      ```
      ## ✅ 합격 기준
      `netvis_done`(과 흔적 건수)이 출력되면 통과. **근거:** eve.json에 출처 흔적이 잡힌다는 건 IPS가 트래픽을 본다는 뜻 — el34는 SNAT가 없어 출처가 보존되므로 공격자 귀속까지 가능하다.
    hint: 'Suricata eve'
    category: manipulation
    points: 12
    answer: |
      # 1) 포트 스캔 수행 (IPS가 트래픽을 보게 만든다)
      docker exec el34-attacker sh -c "nmap -sS -T4 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open"
      # 2) eve.json에서 출처 IP(10.20.30.202) 흔적 건수 집계
      docker exec el34-ips sh -c "tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"
      # 3) 네트워크 가시성 점검 완료 마커
      echo netvis_done
    answer_detail: "네트워크 가시성 = Suricata eve.json의 출처 IP 흔적. 출처 보존(SNAT 없음)으로 귀속 가능."
    verify:
      type: output_contains
      expect: 'netvis_done'
      field: stdout
      semantic:
        intent: "네트워크 가시성"
        success_criteria: ["Suricata 흔적"]
        acceptable_methods: ["**[OSS] Suricata (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ③ SIEM 계층 가시성 — Wazuh 고위험 상관
      **실습 의미:** SIEM이 다소스 로그를 모아 고위험으로 상관·격상하는가 — Wazuh alerts.json의 고위험(level≥10) 건수로 판정.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIEM(Wazuh) alerts.json에서 고위험(level 10~19) 알림 수를 세어 siem_high=N 으로 출력한다
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "siem_high=$N"'
      ```
      ## ✅ 합격 기준
      `siem_high=`(과 건수)이 출력되면 통과. **근거:** 고위험 집계가 나온다는 건 Wazuh가 여러 소스를 모아 상관·격상하고 있다는 뜻 — SIEM 계층 가시성의 핵심 증거다.
    hint: 'Wazuh level>=10'
    category: analysis
    points: 12
    answer: |
      # 1) Wazuh alerts.json의 고위험(level 10~19) 알림 수 집계 → siem_high=N
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "siem_high=$N"'
    answer_detail: "SIEM 가시성 = Wazuh alerts.json 고위험 집계. 다소스 상관·격상이 SOC 성숙의 지표."
    verify:
      type: output_contains
      expect: 'siem_high='
      field: stdout
      semantic:
        intent: "SIEM 가시성"
        success_criteria: ["고위험 집계"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ④ 호스트 계층 가시성 — osquery 헌팅
      **실습 의미:** 호스트 계층(은닉 프로세스·백도어 계정·리스너)을 볼 수 있는가 — osquery로 호스트 상태를 SQL 질의할 수 있는지로 판정.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹서버에서 osquery로 프로세스 테이블을 1건 질의한다 (호스트를 SQL로 들여다볼 수 있는지)
      docker exec el34-web sh -c "osqueryi --json 'SELECT pid,name FROM processes LIMIT 1' 2>/dev/null | head -c 40"
      # 2) 줄바꿈 후 호스트 가시성 점검 완료 마커
      echo; echo hostvis_done
      ```
      ## ✅ 합격 기준
      `hostvis_done`(과 질의 결과)이 출력되면 통과. **근거:** osquery 질의가 된다는 건 processes·listening_ports·users 테이블로 백도어/은닉을 헌팅할 수 있다는 뜻 — 호스트 계층 가시성 확보.
    hint: 'osquery'
    category: manipulation
    points: 12
    answer: |
      # 1) osquery로 프로세스 1건 질의 (호스트를 SQL로 점검 가능한지)
      docker exec el34-web sh -c "osqueryi --json 'SELECT pid,name FROM processes LIMIT 1' 2>/dev/null | head -c 40"
      # 2) 줄바꿈 + 호스트 가시성 점검 완료 마커
      echo; echo hostvis_done
    answer_detail: "호스트 가시성 = osquery로 프로세스/포트/계정 헌팅 가능. 호스트 계층 탐지의 토대."
    verify:
      type: output_contains
      expect: 'hostvis_done'
      field: stdout
      semantic:
        intent: "호스트 가시성"
        success_criteria: ["osquery 질의"]
        acceptable_methods: ["**[OSS] osquery (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 SOC-CMM 가시성 정량화
      **실습 의미:** 성숙도(SOC-CMM)는 문서가 아니라 "실제로 탐지하는 계층 수"로 증명된다 — 4계층을 실제 프로브해 가시성을 숫자로 정량화한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 가시성 확보 계층 수 카운터 초기화
      N=0
      # 2) 네트워크 계층: Suricata eve.json 있으면 +1
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && { echo "네트워크(Suricata eve) OK"; N=$((N+1)); }
      # 3) SIEM 계층: Wazuh alerts.json 있으면 +1
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && { echo "SIEM(Wazuh alerts) OK"; N=$((N+1)); }
      # 4) 호스트 계층: osqueryi 설치돼 있으면 +1
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null 2>&1' && { echo "호스트(osquery) OK"; N=$((N+1)); }
      # 5) 확보 계층 수 출력 + 2계층 이상이면 합격 마커 (SOC-CMM Technology 가시성 정량화)
      echo "가시성 확보 계층: $N/3"; [ "$N" -ge 2 ] && echo soc_cmm_assessed
      ```
      ## ✅ 합격 기준
      `soc_cmm_assessed` 출력 시 통과(2계층 이상 확보). **근거:** 이 마커는 N≥2일 때만 찍히므로, 출력은 가시성이 실제로 정량화되어 최소 기준을 넘었음을 증명한다.
    hint: 'SOC-CMM'
    category: analysis
    points: 12
    answer: |
      # 1) 가시성 확보 계층 수 카운터 초기화
      N=0
      # 2) 네트워크: Suricata eve.json 있으면 +1
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && { echo "네트워크(Suricata eve) 가시성 OK"; N=$((N+1)); }
      # 3) SIEM: Wazuh alerts.json 있으면 +1
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && { echo "SIEM(Wazuh alerts) 가시성 OK"; N=$((N+1)); }
      # 4) 호스트: osqueryi 있으면 +1
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null 2>&1' && { echo "호스트(osquery) 가시성 OK"; N=$((N+1)); }
      # 5) 확보 계층 수 + 2계층 이상이면 합격 마커
      echo "가시성 확보 계층: $N/3"; [ "$N" -ge 2 ] && echo soc_cmm_assessed
    answer_detail: "SOC-CMM = 4계층 가시성 실프로브로 정량화(N≥2 게이트). 가짜 echo 아닌 실측. 성숙도=탐지 역량."
    verify:
      type: output_contains
      expect: 'soc_cmm_assessed'
      field: stdout
      semantic:
        intent: "성숙도 평가"
        success_criteria: ["SOC-CMM"]
        acceptable_methods: ["**[표준] SOC-CMM (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 갭 분석·개선 로드맵
      **실습 의미:** 탐지 못 하는 계층(갭)이 곧 공격자의 사각지대다 — 어느 계층이 안 보이는지 실제로 찾아 개선 우선순위를 정한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 갭(미탐 계층) 목록 초기화
      GAP=""
      # 2) 각 계층 프로브가 실패(||)하면 그 계층명을 갭 목록에 추가
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' || GAP="$GAP 네트워크"
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' || GAP="$GAP SIEM"
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null 2>&1' || GAP="$GAP 호스트"
      # 3) 갭 목록 + 표준 개선 로드맵 출력 → 완료 마커
      echo "탐지 갭(미탐 계층):${GAP:- 없음}"; echo "로드맵: ①룰 보강(SIGMA/Suricata) ②격상(Wazuh) ③SOAR ④헌팅 정례화"; echo gap_roadmap_done
      ```
      ## ✅ 합격 기준
      `gap_roadmap_done` 출력 시 통과. **근거:** 이 마커는 세 계층 프로브를 모두 돌려 갭을 집계한 뒤에야 찍히므로, 출력은 갭 식별·로드맵 도출이 실제 수행됐음을 뜻한다.
    hint: '갭/로드맵'
    category: report
    points: 14
    answer: |
      # 1) 갭(미탐 계층) 목록 초기화
      GAP=""
      # 2) 각 계층 프로브 실패 시 그 계층명을 갭 목록에 추가
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' || GAP="$GAP 네트워크"
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' || GAP="$GAP SIEM"
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null 2>&1' || GAP="$GAP 호스트"
      # 3) 갭 목록 + 개선 로드맵 출력 → 완료 마커
      echo "탐지 갭(미탐 계층):${GAP:- 없음}"; echo "로드맵: ①룰 보강(SIGMA/Suricata) ②격상(Wazuh) ③SOAR ④헌팅 정례화"; echo gap_roadmap_done
    answer_detail: "갭 분석 = 계층 실프로브로 미탐 갭 식별. 가짜 echo 아닌 실식별. 로드맵=룰보강→격상→SOAR→헌팅."
    verify:
      type: output_contains
      expect: 'gap_roadmap_done'
      field: stdout
      semantic:
        intent: "갭 분석"
        success_criteria: ["갭/로드맵"]
        acceptable_methods: ["**[관리적] 로드맵 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SOC 성숙도 보고서 작성
      **실습 의미:** 점검 결과를 의사결정자가 행동할 수 있는 보고서로 정리한다 — 앞 단계에서 실측한 가시성 수치를 근거로 인용해야 신뢰받는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 가시성 계층 수를 다시 집계한다 (보고서 인용 근거)
