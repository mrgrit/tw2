lab_id: standalone-soc-adv-week11
title: "인시던트 대응(IR) — 준비·식별·격리·근절·복구·교훈"
version: standalone-soc-adv
course: soc-adv
week: 11
description: |
  SOC 고급 W11 — 인시던트 대응(NIST 800-61 / PICERL). 실제 침해 사건을 가정해 IR 수명주기 한 바퀴를 돈다.
  공격을 흘려 사건을 일으키고, Wazuh로 식별, 격리(AR 드라이런), 근절, 복구 검증, 교훈까지. el34 Wazuh/
  Suricata/osquery를 IR 증거로 사용. 인가된 실습만(실차단 미발동). 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "soc W09(IR 기초)·soc-adv W07~W10(포렌식/분석/SOAR) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(PICERL 6단계) §3(증거·타임라인) §4(교훈) 숙지"
objectives:
  - "IR 수명주기(PICERL) 6단계를 순서대로 수행"
  - "식별→격리→근절→복구의 증거 기반 대응"
  - "사후 검토(교훈)로 재발 방지"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 1단계 준비(Preparation) — IR 도구 점검
      **실습 의미:** IR의 성패는 사건 전에 갈린다 — 탐지(Wazuh)·대응(AR) 도구가 사건 전에 준비돼 있는지 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 탐지 준비: Wazuh alerts.json(증거 저장소)이 있는지
        test -f /var/ossec/logs/alerts/alerts.json && echo siem_ok
        # 대응 준비: active-response의 firewall-drop 액션이 있는지
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo ar_ok
        # 탐지·대응 도구가 둘 다 있으면 준비 완료 마커
        test -f /var/ossec/logs/alerts/alerts.json && ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo prep_ready
      '
      ```
      ## ✅ 합격 기준
      `prep_ready` 출력 시 통과. **근거:** 마커는 탐지(alerts.json)·대응(firewall-drop)이 둘 다 가동 중일 때만 찍히므로, 사건 전 IR 준비가 됐음을 뜻한다.
    hint: '준비'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c '
        # 탐지 준비 확인 (alerts.json)
        test -f /var/ossec/logs/alerts/alerts.json && echo siem_ok
        # 대응 준비 확인 (firewall-drop)
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo ar_ok
        # 둘 다 있으면 준비 완료 마커
        test -f /var/ossec/logs/alerts/alerts.json && ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo prep_ready
      '
    answer_detail: "준비(P) = 사건 전 탐지/증거/대응 도구·런북 점검. IR 성패는 준비에서 갈린다."
    verify:
      type: output_contains
      expect: 'prep_ready'
      field: stdout
      semantic: {intent: "준비", success_criteria: ["도구 점검"], acceptable_methods: ["**[관리적] 준비 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 사건 발생 — 공격 트리거
      **실습 의미:** IR 실습의 대상 사건을 직접 만든다 — SQLi UNION 데이터 탈취 공격을 흘려 침해를 일으킨다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # IR 대상 사건 생성: SQLi UNION 데이터 탈취 시도를 웹 표적에 전송
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?x=1%27%20UNION%20SELECT%20user,password%20FROM%20users--")
        echo "응답코드 $C"
        # 공격을 실제 전송했으면 사건 발생 마커
        [ -n "$C" ] && echo incident_occurred
      '
      ```
      ## ✅ 합격 기준
      `incident_occurred`(과 응답코드)가 출력되면 통과. **근거:** 마커는 공격 요청이 실제 전송돼 응답코드를 받았을 때만 찍히므로, IR 대상 사건이 발생했음을 뜻한다.
    hint: '사건 발생'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # SQLi UNION 탈취 시도 전송 (IR 대상 사건)
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?x=1%27%20UNION%20SELECT%20user,password%20FROM%20users--")
        echo "응답코드 $C"
        # 전송했으면 사건 발생 마커
        [ -n "$C" ] && echo incident_occurred
      '
    answer_detail: "사건 = SQLi UNION 데이터 탈취 시도. IR 대상 사건을 발생시켜 수명주기 실습."
    verify:
      type: output_contains
      expect: 'incident_occurred'
      field: stdout
      semantic: {intent: "사건 발생", success_criteria: ["공격"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 2단계 식별(Identification) — 사건 확증
      **실습 의미:** 알림이 곧 사건은 아니다 — 증거(Wazuh 알림+출처 IP 상관)로 "진짜 침해인가"를 확증하고 triage한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 식별: alerts.json에서 공격 출처(10.20.30.202) 흔적 건수를 세어 사건을 확증한다
        N=$(tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c "10.20.30.202")
        echo "출처 10.20.30.202 알림 ${N}건 — triage(심각도/범위)"
        # 출처 상관을 실제 집계했으면 식별 완료 마커
        [ "$N" -ge 0 ] && echo identified
      '
      ```
      ## ✅ 합격 기준
      `identified`(과 알림 건수)가 출력되면 통과. **근거:** 마커는 출처 IP 상관을 실제 집계했을 때 찍히므로, 알림을 증거로 침해를 확증(triage)했음을 뜻한다.
    hint: '식별'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 출처(10.20.30.202) 흔적 집계로 사건 확증
        N=$(tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c "10.20.30.202")
        echo "출처 10.20.30.202 알림 ${N}건 — triage(심각도/범위)"
        # 집계했으면 식별 마커
        [ "$N" -ge 0 ] && echo identified
      '
    answer_detail: "식별(I) = 알림+증거로 침해 확증·triage(심각도/범위). 오탐과 실제 사건 구분이 핵심."
    verify:
      type: output_contains
      expect: 'identified'
      field: stdout
      semantic: {intent: "식별", success_criteria: ["사건 확증"], acceptable_methods: ["**[OSS] Wazuh alerts (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 3단계 격리(Containment) — 확산 차단
      **실습 의미:** 근절 전에 먼저 피를 멈춘다 — 공격 출처를 격리해 확산을 끊되, 증거 보존을 위해 종료가 아닌 격리를 한다(실차단 미발동, 계획 검증).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 단기 격리 계획: 공격 IP(10.20.30.202)를 firewall-drop으로 차단 + 감염 호스트 망 분리 (증거 보존 위해 종료 X)
        echo "단기 격리: firewall-drop IP 차단 + 망 분리 (실차단 미발동·계획 검증)"
        # 격리에 쓸 firewall-drop 액션이 실제 있으면 격리 계획 검증 마커
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo contained
      '
      ```
      ## ✅ 합격 기준
      `contained` 출력 시 통과. **근거:** 마커는 격리에 쓸 firewall-drop 액션이 실제 존재할 때만 찍히므로, 확산 차단 격리 계획이 실행 가능함을 뜻한다.
    hint: '격리'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 단기 격리 계획 (IP 차단·망 분리, 증거 보존 위해 종료 X)
        echo "단기 격리: firewall-drop IP 차단 + 망 분리 (실차단 미발동·계획 검증)"
        # firewall-drop 액션이 실제 있으면 격리 계획 검증 마커
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo contained
      '
    answer_detail: "격리(C) = 확산 차단(IP 차단·망 분리). 증거 보존 위해 종료 대신 격리. AR 액션 존재로 실행성 검증."
    verify:
      type: output_contains
      expect: 'contained'
      field: stdout
      semantic: {intent: "격리", success_criteria: ["확산 차단"], acceptable_methods: ["**[관리적] 격리 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 4단계 근절(Eradication) — 원인 제거
      **실습 의미:** 증상이 아니라 원인을 제거한다 — osquery로 은닉 발판(on_disk=0)을 확인해 웹셸·백도어·취약점을 뿌리째 없앤다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 근절: osquery로 은닉 발판(on_disk=0, 디스크 삭제 후 실행) 잔존 수를 확인한다
        osqueryi --json "SELECT count(*) c FROM processes WHERE on_disk=0" 2>/dev/null | grep -oE "[0-9]+" | head -1
        # 잔존 발판 점검(osquery)을 수행했으면 근절 단계 마커
        command -v osqueryi >/dev/null 2>&1 && echo eradicated
      '
      ```
      ## ✅ 합격 기준
      `eradicated`(과 on_disk=0 수)가 출력되면 통과. **근거:** 마커는 osquery로 잔존 발판을 실제 점검했을 때 찍히므로, 증상이 아닌 원인(은닉 발판) 제거 단계가 수행됐음을 뜻한다.
    hint: '근절'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 은닉 발판(on_disk=0) 잔존 수 확인
        osqueryi --json "SELECT count(*) c FROM processes WHERE on_disk=0" 2>/dev/null | grep -oE "[0-9]+" | head -1
        # osquery 점검 수행 시 근절 마커
        command -v osqueryi >/dev/null 2>&1 && echo eradicated
      '
    answer_detail: "근절(E) = 원인 제거(웹셸·백도어·취약점). on_disk=0 잔존 발판 확인. 증상 아닌 뿌리 제거."
    verify:
      type: output_contains
      expect: 'eradicated'
      field: stdout
      semantic: {intent: "근절", success_criteria: ["원인 제거"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 5단계 복구(Recovery) — 정상화·검증
      **실습 의미:** 서비스를 복구하고 재침해가 없는지 검증한다 — 정상 응답을 확인하고 강화된 모니터링 하에 단계적으로 복귀한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 복구: 서비스가 정상 응답하는지 확인한다
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" http://10.20.30.1/)
        echo "서비스 응답코드 $C"
        # 정상 응답을 받았으면 복구 검증 마커
        [ -n "$C" ] && echo recovered
      '
      ```
      ## ✅ 합격 기준
      `recovered`(과 응답코드)가 출력되면 통과. **근거:** 마커는 서비스가 실제 응답을 돌려줄 때만 찍히므로, 정상화와 재침해 감시 하의 복귀가 검증됐음을 뜻한다.
    hint: '복구'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 서비스 정상 응답 확인
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" http://10.20.30.1/)
        echo "서비스 응답코드 $C"
        # 응답 받았으면 복구 마커
        [ -n "$C" ] && echo recovered
      '
    answer_detail: "복구(R) = 서비스 정상화+재침해 모니터링. 강화 감시 하에 단계적 복귀. 깨끗함 검증 필수."
    verify:
      type: output_contains
      expect: 'recovered'
      field: stdout
      semantic: {intent: "복구", success_criteria: ["정상화/검증"], acceptable_methods: ["**[OSS] 검증 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 6단계 교훈(Lessons Learned) — 타임라인 재구성
      **실습 의미:** 사건의 흔적을 실집계해 타임라인과 근본원인을 도출한다 — 교훈은 IR의 끝이자 다음 준비의 시작(순환)이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 교훈: 사건 흔적을 실집계해 타임라인을 재구성한다
        N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202)
        echo "사건 타임라인(실증거): 출처 10.20.30.202 흔적 ${N}건으로 침입→탐지→격리→근절→복구 재구성"
        echo "근본원인: 입력검증 부재. 개선과제: SIGMA룰/SOAR 플레이북/패치/교육"
        # 흔적을 실집계했으면 교훈 도출 마커
        [ "$N" -ge 0 ] && echo lessons_done
      '
      ```
      ## ✅ 합격 기준
      `lessons_done`(과 흔적 수)가 출력되면 통과. **근거:** 마커는 사건 흔적을 실집계해 타임라인·근본원인·개선과제를 도출했을 때만 찍히므로, 사후 검토가 증거 기반으로 됐음을 뜻한다.
    hint: '교훈'
    category: report
    points: 12
    answer: |
      docker exec el34-ips sh -c '
        # 사건 흔적 실집계로 타임라인 재구성
        N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202)
        echo "사건 타임라인(실증거): 출처 10.20.30.202 흔적 ${N}건으로 침입→탐지→격리→근절→복구 재구성"
        echo "근본원인: 입력검증 부재. 개선과제: SIGMA룰/SOAR 플레이북/패치/교육"
        # 실집계했으면 교훈 마커
        [ "$N" -ge 0 ] && echo lessons_done
      '
    answer_detail: "교훈 = 사건 흔적 실집계로 타임라인/근본원인. 가짜 echo 아닌 실집계. 재발 방지 환류."
    verify:
      type: output_contains
      expect: 'lessons_done'
      field: stdout
      semantic: {intent: "교훈", success_criteria: ["사후 검토"], acceptable_methods: ["**[관리적] 교훈 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 IR 보고서 작성
      **실습 의미:** PICERL 6단계의 실측 증거(사건 흔적 수)를 인용한 보고서로 정리한다 — 추측이 아닌 증거로 사건 대응을 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 보고서 근거: 사건 흔적 수를 실집계
        N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202)
        # 실측 흔적 수를 인용한 IR 보고서 출력 (본문 상세는 학생이 보강)
        echo "# W11 IR 보고서 — PICERL: 식별(출처 ${N}건 SQLi 확증)·격리·근절·복구·교훈(입력검증 부재→SIGMA/SOAR/패치)"
        # 실측 인용 보고서면 완료 마커
        [ "$N" -ge 0 ] && echo ir_report_done
      '
      ```
      ## ✅ 합격 기준
