lab_id: standalone-soc-adv-week15
title: "종합 APT 대응 — 탐지·포렌식·대응·교훈 통합 캡스톤"
version: standalone-soc-adv
course: soc-adv
week: 15
description: |
  SOC 고급 W15 — 종합 캡스톤. APT 침해 시나리오 하나에 W01~W14 전 역량을 쏟는다. 킬체인(정찰→침투→발판)을
  다계층(Suricata·ModSec·Wazuh·osquery)으로 탐지하고, 출처 IP로 교차 상관(포렌식)하고, IR/SOAR로 대응하고,
  ATT&CK 매핑·탐지 환류로 마무리한다. el34 4개 컨테이너 통합 사용. 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "soc-adv W01~W14 전 주차 통과(이 캡스톤은 통합 시험)"
  - "el34 호스트 SSH + docker exec (el34-attacker/web/ips/siem)"
  - "lecture §2(킬체인 통합) §3(교차 상관) §4(대응·환류) 숙지"
objectives:
  - "APT 킬체인을 다계층으로 탐지(네트워크·웹·호스트)"
  - "출처 IP로 전 계층 교차 상관(통합 포렌식)"
  - "IR/SOAR 대응 + ATT&CK 매핑 + 탐지 환류로 완결"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 캡스톤 — 통합 환경 점검
      **실습 의미:** APT는 한 계층으로 못 잡는다 — 종합 대응 전에 네트워크(IPS)·SIEM(Wazuh)·호스트(osquery) 세 계층이 모두 가동되는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 네트워크 계층: IPS Suricata eve.json 가동 확인
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo ips_ok'
      # 2) SIEM 계층: Wazuh alerts.json 가동 확인
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json && echo siem_ok'
      # 3) 호스트 계층: web osquery 가동 확인
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null && echo web_ok'
      # 4) 세 계층이 모두 가동되면 캡스톤 준비 마커
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && docker exec el34-web sh -c 'command -v osqueryi >/dev/null' && echo capstone_ready
      ```
      ## ✅ 합격 기준
      `capstone_ready` 출력 시 통과. **근거:** 마커는 네트워크·SIEM·호스트 세 계층이 모두 가동될 때만 찍히므로, APT를 다계층으로 대응할 통합 환경이 갖춰졌음을 뜻한다.
    hint: '통합 환경'
    category: survey
    points: 10
    answer: |
      # 1) 네트워크(IPS eve.json) 확인
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo ips_ok'
      # 2) SIEM(Wazuh alerts.json) 확인
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json && echo siem_ok'
      # 3) 호스트(osquery) 확인
      docker exec el34-web sh -c 'command -v osqueryi >/dev/null && echo web_ok'
      # 4) 세 계층 모두 가동 시 캡스톤 준비 마커
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && docker exec el34-web sh -c 'command -v osqueryi >/dev/null' && echo capstone_ready
    answer_detail: "통합 환경 = IPS(네트워크)+SIEM(상관)+osquery(호스트) 다계층. APT는 한 계층으로 못 잡음."
    verify:
      type: output_contains
      expect: 'capstone_ready'
      field: stdout
      semantic: {intent: "통합 환경", success_criteria: ["다계층"], acceptable_methods: ["**[OSS] 다계층 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 킬체인 ① 정찰 탐지 (T1046)
      **실습 의미:** APT의 첫 단계는 정찰이다 — 공격자가 포트 스캔을 하고, 네트워크 계층(Suricata)이 그 흔적을 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 킬체인①정찰(T1046): 포트 스캔을 흘려 네트워크 계층(Suricata)이 보게 한다
        OPEN=$(nmap -sS -T4 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open)
        echo "열린 포트 ${OPEN}개 스캔"
        # 스캔을 실제 수행했으면 정찰 탐지 마커
        [ -n "$OPEN" ] && echo recon_detected
      '
      ```
      ## ✅ 합격 기준
      `recon_detected`(과 열린 포트 수)가 출력되면 통과. **근거:** 마커는 스캔이 실제 수행돼 포트 수를 셌을 때만 찍히므로, 정찰 단계가 네트워크 계층에서 일어났음을 뜻한다.
    hint: '정찰'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 정찰(T1046): 포트 스캔
        OPEN=$(nmap -sS -T4 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open)
        echo "열린 포트 ${OPEN}개 스캔"
        # 스캔 수행 시 정찰 탐지 마커
        [ -n "$OPEN" ] && echo recon_detected
      '
    answer_detail: "정찰(T1046) = 포트 스캔. 네트워크 계층(Suricata)이 탐지. APT 킬체인 1단계."
    verify:
      type: output_contains
      expect: 'recon_detected'
      field: stdout
      semantic: {intent: "정찰", success_criteria: ["스캔"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 킬체인 ② 초기 침투 탐지 (T1190)
      **실습 의미:** 정찰 후 공격자는 취약 웹앱을 노린다 — SQLi 데이터 탈취 시도를 웹 계층(ModSec)+SIEM(Wazuh)이 다계층으로 탐지한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 킬체인②초기침투(T1190): SQLi UNION 탈취 시도를 웹 표적에 보낸다
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--")
        echo "SQLi 응답코드 $C (403=WAF 차단)"
        # 침투 시도를 실제 전송했으면 마커
        [ -n "$C" ] && echo intrusion_detected
      '
      ```
      ## ✅ 합격 기준
      `intrusion_detected`(과 응답코드)가 출력되면 통과. **근거:** 마커는 SQLi 시도가 실제 전송돼 응답을 받았을 때만 찍히므로, 침투 단계가 웹·SIEM 계층에 흔적을 남겼음을 뜻한다.
    hint: '초기 침투'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 초기 침투(T1190): SQLi UNION 탈취 시도
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--")
        echo "SQLi 응답코드 $C (403=WAF 차단)"
        # 전송했으면 마커
        [ -n "$C" ] && echo intrusion_detected
      '
    answer_detail: "초기 침투(T1190) = SQLi 데이터 탈취. 웹(ModSec)+SIEM(Wazuh) 다계층 탐지. 킬체인 2단계."
    verify:
      type: output_contains
      expect: 'intrusion_detected'
      field: stdout
      semantic: {intent: "초기 침투", success_criteria: ["SQLi"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 킬체인 ③ 발판·지속성 헌팅 (T1505)
      **실습 의미:** 침투에 성공하면 공격자는 발판(웹셸·백도어)을 심는다 — 네트워크/웹이 못 보는 침투 후 행위를 호스트 계층(osquery on_disk=0)이 헌팅한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-web sh -c '
        # 킬체인③발판(T1505): osquery로 은닉 발판(on_disk=0) 잔존 수를 헌팅한다 (호스트 계층)
        osqueryi --json "SELECT count(*) c FROM processes WHERE on_disk=0" 2>/dev/null | grep -oE "[0-9]+" | head -1
        # 호스트 헌팅을 수행했으면 발판 헌팅 마커
        command -v osqueryi >/dev/null 2>&1 && echo foothold_hunted
      '
      ```
      ## ✅ 합격 기준
      `foothold_hunted`(과 on_disk=0 수)가 출력되면 통과. **근거:** 마커는 osquery로 은닉 발판을 실제 헌팅했을 때 찍히므로, 호스트 계층에서 침투 후 발판을 점검했음을 뜻한다.
    hint: '발판 헌팅'
    category: analysis
    points: 14
    answer: |
      docker exec el34-web sh -c '
        # 발판(T1505): on_disk=0 은닉 발판 헌팅
        osqueryi --json "SELECT count(*) c FROM processes WHERE on_disk=0" 2>/dev/null | grep -oE "[0-9]+" | head -1
        # osquery 헌팅 수행 시 마커
        command -v osqueryi >/dev/null 2>&1 && echo foothold_hunted
      '
    answer_detail: "발판 헌팅(T1505) = osquery on_disk=0으로 은닉 웹셸/백도어 탐지. 호스트 계층. 킬체인 3단계."
    verify:
      type: output_contains
      expect: 'foothold_hunted'
      field: stdout
      semantic: {intent: "발판 헌팅", success_criteria: ["호스트 헌팅"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 통합 포렌식 — 출처 IP 교차 상관
      **실습 의미:** 캡스톤의 핵심 — 출처 IP 하나로 정찰(네트워크)+침투(웹)+발판(호스트)을 한 공격자의 타임라인으로 묶는다(el34는 SNAT가 없어 출처 보존).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 네트워크 계층(IPS): 출처 IP(10.20.30.202) 흔적 수
      docker exec el34-ips sh -c 'echo "IPS: $(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202)건"'
      # 2) SIEM 계층: 같은 출처 IP 흔적 수
      docker exec el34-siem sh -c 'echo "SIEM: $(tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202)건"'
      # 3) 같은 출처 IP로 두 계층을 교차 상관했으면 마커
      echo correlated
      ```
      ## ✅ 합격 기준
      `correlated`(과 계층별 흔적 수)가 출력되면 통과. **근거:** 두 계층에서 같은 출처 IP 흔적을 실제 집계했다는 건 다계층을 한 공격자 타임라인으로 통합(교차 상관)했다는 뜻이다.
    hint: '교차 상관'
    category: analysis
    points: 14
    answer: |
      # 1) 네트워크(IPS) 출처 흔적 수
      docker exec el34-ips sh -c 'echo "IPS: $(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202)건"'
      # 2) SIEM 출처 흔적 수
      docker exec el34-siem sh -c 'echo "SIEM: $(tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202)건"'
      # 3) 두 계층 교차 상관 마커
      echo correlated
    answer_detail: "교차 상관 = 출처 IP로 네트워크+웹+호스트 계층을 한 공격자 타임라인으로 통합. APT 대응의 핵심."
    verify:
      type: output_contains
      expect: 'correlated'
      field: stdout
      semantic: {intent: "교차 상관", success_criteria: ["다계층 통합"], acceptable_methods: ["**[OSS] 교차 상관 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 통합 대응 — IR + SOAR
      **실습 의미:** 식별된 APT를 PICERL(W11)+SOAR(W10)로 대응한다 — 격리(AR firewall-drop)·근절·복구. 격리 액션이 실재하는지 확인한다(실차단 미발동).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # PICERL 단계와 SOAR 자동화 흐름을 정리한다
        echo "PICERL: 식별(교차상관)→격리(firewall-drop .202 차단+망분리)→근절(웹셸/발판+패치)→복구(검증)"
        echo "SOAR: 고위험 알림→플레이북 자동(보강→차단→티켓), 비가역은 사람 승인(HITL)"
        # 격리에 쓸 firewall-drop 액션이 실재하면 대응 계획 검증 마커 (실차단 미발동)
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo response_done
      '
      ```
      ## ✅ 합격 기준
      `response_done` 출력 시 통과. **근거:** 마커는 격리 액션(firewall-drop)이 실재할 때만 찍히므로, 탐지를 실제 IR/SOAR 대응으로 연결할 수 있음을 뜻한다.
    hint: '통합 대응'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # PICERL+SOAR 대응 흐름 정리
        echo "PICERL: 식별(교차상관)→격리(firewall-drop .202 차단+망분리)→근절(웹셸/발판+패치)→복구(검증)"
        echo "SOAR: 고위험 알림→플레이북 자동(보강→차단→티켓), 비가역은 사람 승인(HITL)"
        # firewall-drop 실재 시 대응 계획 검증 마커
        ls /var/ossec/active-response/bin/firewall-drop >/dev/null 2>&1 && echo response_done
      '
    answer_detail: "통합 대응 = PICERL(격리/근절/복구)+SOAR(플레이북 자동화). 탐지를 실제 대응으로 연결."
    verify:
      type: output_contains
      expect: 'response_done'
      field: stdout
      semantic: {intent: "통합 대응", success_criteria: ["IR/SOAR"], acceptable_methods: ["**[관리적] PICERL+SOAR (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ATT&CK 매핑 · 탐지 환류
      **실습 의미:** 킬체인 각 단계가 다계층에서 탐지됐는지 실집계해 ATT&CK 단계에 매핑하고, 격차를 룰/CTI/플레이북으로 환류한다 — 사건이 다음 방어의 시작이 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 네트워크 계층 출처 흔적 수 실집계
      N=$(docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      # 2) SIEM 계층 출처 흔적 수 실집계
      S=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202')
      # 3) 다계층 탐지를 ATT&CK 단계에 매핑하고 환류 경로를 정리한다
      echo "킬체인 다계층 탐지(실측): 네트워크 ${N}건(T1046/T1190) + SIEM ${S}건"
      echo "환류: 격차→SIGMA/Wazuh(W03/W13), 새 IOC→CTI/CDB(W05), 플레이북(W10)"
      # 4) 다계층 탐지를 실집계했으면 환류 마커
      [ "$((N+S))" -ge 0 ] && echo feedback_done
      ```
      ## ✅ 합격 기준
      `feedback_done`(과 다계층 탐지 수)가 출력되면 통과. **근거:** 마커는 킬체인의 다계층 탐지를 실집계해 매핑·환류했을 때만 찍히므로, 사건을 ATT&CK로 정리하고 개선으로 환류했음을 뜻한다.
    hint: 'ATT&CK 환류'
    category: report
    points: 12
    answer: |
      # 1) 네트워크 출처 흔적 수
      N=$(docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      # 2) SIEM 출처 흔적 수
      S=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202')
      # 3) 다계층 탐지 ATT&CK 매핑·환류 정리
      echo "킬체인 다계층 탐지(실측): 네트워크 ${N}건(T1046/T1190) + SIEM ${S}건"
