lab_id: standalone-soc-adv-week07
title: "네트워크 포렌식 — 흐름·패킷에서 공격 흔적 복원"
version: standalone-soc-adv
course: soc-adv
week: 7
description: |
  SOC 고급 W07 — 네트워크 포렌식. Suricata eve.json(alert/http/flow/dns 이벤트)에서 공격의 흐름을 복원한다.
  공격을 흘려 eve.json에 흔적을 만들고, event_type별 분석·출처 상관·타임라인을 구성한다. el34-ips Suricata
  eve.json·jq 사용. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W02(스캔)·secuops W03~W04(Suricata) + soc-adv W01~W06 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(eve.json event_type) §3(흐름 분석) §4(타임라인) 숙지"
objectives:
  - "Suricata eve.json event_type별 분석"
  - "출처 상관·흐름(flow) 분석"
  - "공격 타임라인 복원"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 eve.json 접근 확인
      **실습 의미:** 네트워크 포렌식의 모든 분석은 Suricata eve.json에서 출발한다 — 먼저 그 로그에 접근되는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) IPS 컨테이너의 Suricata eve.json 파일 크기를 조회한다 (포렌식 원천 로그가 있고 읽히는지 확인)
      docker exec el34-ips sh -c "ls -la /var/log/suricata/eve.json 2>/dev/null | awk '{print \$5}'"
      # 2) 여기까지 왔으면 소스 접근 OK — 단계 완료 마커를 남긴다
      echo eve_ready
      ```
      ## ✅ 합격 기준
      `eve_ready` 가 출력되면 통과. **근거:** eve.json이 실제로 조회돼야 다음 줄까지 진행되므로, 마커는 네트워크 포렌식 원천 데이터가 확보됐음을 뜻한다.
    hint: 'eve.json'
    category: survey
    points: 10
    answer: |
      # 1) IPS 컨테이너의 Suricata eve.json 파일 크기를 조회 (포렌식 원천 로그 접근 확인)
      docker exec el34-ips sh -c "ls -la /var/log/suricata/eve.json 2>/dev/null | awk '{print \$5}'"
      # 2) 단계 완료 마커
      echo eve_ready
    answer_detail: "네트워크 포렌식 소스 = el34-ips Suricata eve.json(JSON 라인 이벤트 로그)."
    verify:
      type: output_contains
      expect: 'eve_ready'
      field: stdout
      semantic: {intent: "eve 접근", success_criteria: ["eve.json"], acceptable_methods: ["**[OSS] eve.json (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 공격 흐름 생성
      **실습 의미:** 분석할 대상을 직접 만든다 — 스캔과 웹공격을 흘려 eve.json에 flow/alert/http 등 여러 이벤트 흔적을 남긴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자에서 포트 스캔을 흘린다 → IPS가 flow/alert 이벤트를 기록한다
      docker exec el34-attacker sh -c "nmap -sS -T4 --top-ports 30 10.20.30.1 2>/dev/null | grep -c open"
      # 2) 같은 출처로 SQLi 웹공격을 보낸다 → http/alert 이벤트를 기록한다
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20OR%201=1--'"
      # 3) 분석 대상(흔적)이 만들어졌으면 단계 완료 마커
      echo traffic_generated
      ```
      ## ✅ 합격 기준
      `traffic_generated` 가 출력되면 통과. **근거:** 스캔·웹공격이 실제 전송돼야 마커까지 도달하므로, eve.json에 포렌식으로 분석할 흔적이 생성된 것이다.
    hint: '흐름 생성'
    category: manipulation
    points: 12
    answer: |
      # 1) 포트 스캔 → IPS에 flow/alert 이벤트 생성
      docker exec el34-attacker sh -c "nmap -sS -T4 --top-ports 30 10.20.30.1 2>/dev/null | grep -c open"
      # 2) SQLi 웹공격 → http/alert 이벤트 생성
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20OR%201=1--'"
      # 3) 단계 완료 마커
      echo traffic_generated
    answer_detail: "흐름 생성 = 스캔+웹공격으로 eve.json에 flow/alert/http 이벤트 남김. 포렌식 분석 대상."
    verify:
      type: output_contains
      expect: 'traffic_generated'
      field: stdout
      semantic: {intent: "흐름 생성", success_criteria: ["트래픽"], acceptable_methods: ["**[OSS] nmap/curl (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 event_type별 분석
      **실습 의미:** eve.json은 event_type(alert/http/flow/dns/tls)으로 나뉘고 각 타입이 다른 포렌식 단서를 준다 — 어떤 단서가 얼마나 있는지 분포를 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 최근 eve.json 3000줄에서 event_type 값만 뽑는다
      # 2) 정렬 후 종류별로 묶어 건수를 센다 (sort | uniq -c)
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"event_type\":\"[a-z]+\"' | sort | uniq -c | head"
      # 3) 분포가 나왔으면 단계 완료 마커
      echo types_analyzed
      ```
      ## ✅ 합격 기준
      `types_analyzed` 와 타입별 건수가 출력되면 통과. **근거:** 타입별 집계가 실제 나왔다는 건 어떤 포렌식 단서(탐지·연결·요청)가 얼마나 쌓였는지 파악했다는 뜻이다.
    hint: 'event_type'
    category: manipulation
    points: 14
    answer: |
      # 1~2) eve.json에서 event_type 값을 뽑아 종류별 건수 집계
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"event_type\":\"[a-z]+\"' | sort | uniq -c | head"
      # 3) 단계 완료 마커
      echo types_analyzed
    answer_detail: "event_type 분석 = eve.json의 alert/flow/http/dns/tls 분포. 각 타입이 다른 포렌식 단서."
    verify:
      type: output_contains
      expect: 'types_analyzed'
      field: stdout
      semantic: {intent: "event_type", success_criteria: ["타입 분포"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 출처 상관 (공격자 IP)
      **실습 의미:** 포렌식의 핵심 질문은 "누가"다 — 출처 IP로 모든 이벤트를 묶어 한 공격자의 활동을 복원한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 최근 eve.json에서 공격자 출처 IP(10.20.30.202)가 든 이벤트 건수를 센다
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"
      # 2) 출처로 활동을 묶었으면 단계 완료 마커
      echo src_correlated
      ```
      ## ✅ 합격 기준
      `src_correlated` 와 건수가 출력되면 통과. **근거:** 출처 IP로 이벤트가 집계됐다는 뜻 — el34는 SNAT가 없어 출처가 보존되므로 한 공격자 활동을 귀속·복원할 수 있다.
    hint: '출처 상관'
    category: manipulation
    points: 14
    answer: |
      # 1) 공격자 출처 IP(10.20.30.202) 이벤트 건수 집계 (출처 기반 활동 묶기)
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"
      # 2) 단계 완료 마커
      echo src_correlated
    answer_detail: "출처 상관 = 출처 IP로 eve.json 이벤트 묶기. SNAT 없는 출처 보존이 포렌식 귀속의 기반."
    verify:
      type: output_contains
      expect: 'src_correlated'
      field: stdout
      semantic: {intent: "출처 상관", success_criteria: ["IP 묶기"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 흐름(flow) 분석
      **실습 의미:** flow 이벤트는 연결 단위 요약(바이트·패킷·기간)을 준다 — 대량 전송(데이터 유출)·주기적 소량(C2 비콘)을 식별하는 단서다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) eve.json에서 flow(연결 요약) 이벤트 한 건을 뽑아 앞부분(필드 형태)을 본다
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep '\"event_type\":\"flow\"' | head -1 | head -c 80"
      # 2) 줄바꿈 후 단계 완료 마커
      echo; echo flow_analyzed
      ```
      ## ✅ 합격 기준
      `flow_analyzed` (와 flow 샘플)이 출력되면 통과. **근거:** flow 이벤트가 실제 추출됐다는 뜻이라, 연결 요약(bytes/pkts)으로 대량 전송·비콘을 식별할 단서를 확보한 것이다.
    hint: 'flow 분석'
    category: analysis
    points: 12
    answer: |
      # 1) flow 이벤트 한 건의 앞부분(연결 요약 필드) 확인
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep '\"event_type\":\"flow\"' | head -1 | head -c 80"
      # 2) 줄바꿈 + 단계 완료 마커
      echo; echo flow_analyzed
    answer_detail: "flow 분석 = 연결 단위 요약(bytes/pkts/duration). 대량=유출, 주기적 소량=비콘 식별."
    verify:
      type: output_contains
      expect: 'flow_analyzed'
      field: stdout
      semantic: {intent: "flow 분석", success_criteria: ["연결 요약"], acceptable_methods: ["**[OSS] eve flow (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 타임라인 복원
      **실습 의미:** 포렌식의 산출물은 "언제 무엇이 일어났나"의 타임라인이다 — 출처 이벤트의 시각을 뽑아 정찰→침투→유출 순서로 재구성한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자 출처 이벤트의 timestamp를 시간순으로 5개 뽑는다
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep 10.20.30.202 | grep -oE '\"timestamp\":\"[0-9T:.-]+' | head -5"
      # 2) 타임라인에 들어갈 총 이벤트 수를 센다
      N=$(docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202")
      echo "타임라인 이벤트 ${N}건"
      # 3) 시각 추출로 타임라인을 구성했으면 단계 완료 마커
      echo timeline_built
      ```
      ## ✅ 합격 기준
      `timeline_built` 와 타임스탬프가 출력되면 통과. **근거:** 시각이 실제 추출됐다는 뜻이라, 킬체인을 시간순으로 재구성한 포렌식 산출물(사건 재구성·법적 증거)이 만들어진 것이다.
    hint: '타임라인'
    category: analysis
    points: 12
    answer: |
      # 1) 출처 이벤트의 timestamp 시간순 추출
      docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep 10.20.30.202 | grep -oE '\"timestamp\":\"[0-9T:.-]+' | head -5"
      # 2) 타임라인 총 이벤트 수
      N=$(docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202")
      echo "타임라인 이벤트 ${N}건"
      # 3) 단계 완료 마커
      echo timeline_built
    answer_detail: "타임라인 = eve.json timestamp 추출로 시간순 재구성. 포렌식 핵심 산출물."
    verify:
      type: output_contains
      expect: 'timeline_built'
      field: stdout
      semantic: {intent: "타임라인", success_criteria: ["시간순 재구성"], acceptable_methods: ["**[관리적] 타임라인 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 증거 보전 (무결성 해시)
      **실습 의미:** 포렌식 증거가 법적 효력을 가지려면 변조되지 않았음을 증명해야 한다 — 증거 파일의 SHA-256 해시로 무결성(chain of custody)을 확보한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 증거 로그(eve.json)의 SHA-256 해시를 계산해 변수에 담는다 (무결성 지문)
      H=$(docker exec el34-ips sh -c "sha256sum /var/log/suricata/eve.json 2>/dev/null | cut -c1-32")
      echo "eve.json 증거 무결성 해시(SHA-256): ${H}"
      # 2) chain of custody 개념 메모 (원본 패킷은 pcap으로 별도 보전)
      echo "chain of custody: 해시+수집시각으로 변조 방지"
      # 3) 해시가 16자리 이상 16진수로 산출됐으면 단계 완료 마커
      echo "$H" | grep -qE "^[a-f0-9]{16}" && echo evidence_preserved
      ```
      ## ✅ 합격 기준
      `evidence_preserved` 와 해시값이 출력되면 통과. **근거:** 마커는 해시가 실제 산출됐을 때만 찍히므로, 증거의 변조 여부를 검증할 chain of custody가 성립한다.
    hint: 'PCAP/증거'
    category: report
    points: 12
    answer: |
      # 1) 증거 로그 SHA-256 해시 계산 (무결성 지문)
      H=$(docker exec el34-ips sh -c "sha256sum /var/log/suricata/eve.json 2>/dev/null | cut -c1-32")
      echo "eve.json 증거 무결성 해시(SHA-256): ${H}"
      # 2) chain of custody 메모
      echo "chain of custody: 해시+수집시각으로 변조 방지 (원본 패킷은 pcap)"
      # 3) 해시 산출 확인 → 단계 완료 마커
      echo "$H" | grep -qE "^[a-f0-9]{16}" && echo evidence_preserved
    answer_detail: "증거 보전 = eve.json SHA-256 해시로 무결성(chain of custody). 원본은 pcap."
    verify:
      type: output_contains
      expect: 'evidence_preserved'
      field: stdout
      semantic: {intent: "PCAP/증거", success_criteria: ["보전"], acceptable_methods: ["**[설명] 증거 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 네트워크 포렌식 보고서 작성
      **실습 의미:** 앞 단계의 실측(출처 건수·증거 해시)을 인용한 보고서로 정리한다 — 추측이 아닌 집계 수치를 근거로 사건을 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 출처 이벤트 수를 다시 집계한다 (보고서 인용 근거 ①)
      N=$(docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202")
      # 2) 증거 해시를 다시 계산한다 (보고서 인용 근거 ②)
      H=$(docker exec el34-ips sh -c "sha256sum /var/log/suricata/eve.json 2>/dev/null | cut -c1-16")
      # 3) 실측 수치를 인용한 보고서를 출력한다 (본문 상세는 학생이 보강)
      echo "# W07 네트워크 포렌식 보고서 — event_type/출처상관(${N}건)·flow/타임라인·증거(해시 ${H})"
      # 4) 보고서 생성 완료 마커
      echo netforensics_report_done
      ```
      ## ✅ 합격 기준
      `netforensics_report_done` 가 출력되면 통과. **근거:** 실측 출처 건수·증거 해시를 인용한 보고서가 생성될 때만 마커가 찍히므로, 출력은 증거 기반 보고가 작성됐음을 뜻한다.
    hint: '분석+타임라인+증거'
    category: report
    points: 14
    answer: |
      # 1) 출처 이벤트 수 집계 (인용 근거 ①)
      N=$(docker exec el34-ips sh -c "tail -n 3000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202")
      # 2) 증거 해시 계산 (인용 근거 ②)
