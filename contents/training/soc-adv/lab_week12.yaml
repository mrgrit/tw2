lab_id: standalone-soc-adv-week12
title: "로그 엔지니어링 — 수집·파싱·정규화·보존 파이프라인"
version: standalone-soc-adv
course: soc-adv
week: 12
description: |
  SOC 고급 W12 — 로그 엔지니어링. 모든 탐지의 토대인 로그 파이프라인을 다룬다. 입력(localfile)·로그 포맷·
  디코더(파싱)·정규화(필드)·보존을 el34 Wazuh로 확인하고, wazuh-logtest로 원시 로그가 필드로 분해되는
  과정을 본다. el34-siem Wazuh decoders/logtest 사용(읽기 전용). 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh)·secuops W12(decoder/rule) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(파이프라인 5단계) §3(디코더/정규화) §4(보존) 숙지"
objectives:
  - "로그 파이프라인 5단계(수집→파싱→정규화→저장→탐지) 이해"
  - "Wazuh 디코더로 원시 로그를 필드로 분해"
  - "보존 정책·파이프라인 사각(blind spot) 점검"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 1단계 수집 — 입력 소스(localfile)
      ## 📖 개념 한 줄
      파이프라인의 시작 = 로그 입력. ossec.conf의 <localfile>이 어떤 로그를 수집할지 정의한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "grep -c '<localfile>' /var/ossec/etc/ossec.conf"; echo inputs_found
      ```
      ## ✅ 합격 기준
      입력 소스 수가 확인되면(inputs_found) 통과.
    hint: 'localfile'
    category: survey
    points: 10
    answer: |
      echo "=== 1단계 수집(입력 소스) ==="
      docker exec el34-siem sh -c "grep -c '<localfile>' /var/ossec/etc/ossec.conf"; echo inputs_found
      echo "→ <localfile> = 수집할 로그 정의. 수집 안 된 로그는 탐지도 불가(파이프라인의 입구)"
    answer_detail: "수집 = ossec.conf <localfile> 입력 정의. 수집 안 되면 탐지 불가 — 파이프라인의 입구."
    verify:
      type: output_contains
      expect: 'inputs_found'
      field: stdout
      semantic: {intent: "수집", success_criteria: ["입력 소스"], acceptable_methods: ["**[OSS] localfile (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 로그 포맷 식별
      ## 📖 개념 한 줄
      로그마다 포맷이 다르다(syslog/json/command) — 포맷에 맞는 파서가 있어야 분해된다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "grep '<log_format>' /var/ossec/etc/ossec.conf | sort | uniq -c"; echo formats_listed
      ```
      ## ✅ 합격 기준
      로그 포맷이 식별되면(formats_listed) 통과.
      ## 🔧 도구 풀이
      - log_format: syslog(전통 텍스트)·json(구조화)·command(명령 출력). 포맷별 디코더가 다름.
    hint: 'log_format'
    category: manipulation
    points: 12
    answer: |
      echo "=== 로그 포맷 식별 ==="
      docker exec el34-siem sh -c "grep '<log_format>' /var/ossec/etc/ossec.conf | sort | uniq -c"; echo formats_listed
      echo "→ syslog(텍스트)·json(구조화)·command(명령출력). 포맷마다 파싱 방식이 다름"
    answer_detail: "로그 포맷 = syslog/json/command. 포맷별 파서 필요. 구조화(json)일수록 파싱이 쉽고 정확."
    verify:
      type: output_contains
      expect: 'formats_listed'
      field: stdout
      semantic: {intent: "로그 포맷", success_criteria: ["포맷"], acceptable_methods: ["**[OSS] log_format (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 2단계 파싱 — 디코더
      ## 📖 개념 한 줄
      디코더는 원시 로그 한 줄을 의미 있는 필드(srcip·user·url…)로 분해한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l"; echo decoders_counted
      ```
      ## ✅ 합격 기준
      디코더 집합이 확인되면(decoders_counted) 통과.
    hint: '디코더'
    category: analysis
    points: 14
    answer: |
      echo "=== 2단계 파싱(디코더) ==="
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l"; echo decoders_counted
      echo "→ 디코더 = 원시 로그 한 줄을 필드(srcip/user/url)로 분해. 룰은 분해된 필드를 보고 판단"
    answer_detail: "파싱 = 디코더가 원시 로그를 필드로 분해(srcip/user/url). 룰의 판단 재료. 120개 기본 디코더."
    verify:
      type: output_contains
      expect: 'decoders_counted'
      field: stdout
      semantic: {intent: "파싱", success_criteria: ["디코더"], acceptable_methods: ["**[OSS] decoders (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 파싱 검증 — logtest 필드 분해
      ## 📖 개념 한 줄
      wazuh-logtest로 실제 로그가 어떤 필드로 분해되는지 눈으로 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "printf 'Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n' | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE \"srcip|dstuser|decoder|'10.20.30.202'\" | head"; echo parsed_fields
      ```
      ## ✅ 합격 기준
      원시 로그가 필드로 분해되면(parsed_fields) 통과.
    hint: 'logtest 분해'
    category: analysis
    points: 14
    answer: |
      echo "=== 파싱 검증(logtest) ==="
      docker exec el34-siem sh -c "printf 'Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n' | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE \"srcip|dstuser|decoder|'10.20.30.202'\" | head"; echo parsed_fields
      echo "→ 원시 syslog 한 줄이 srcip=10.20.30.202, dstuser=root 등 필드로 분해됨(디코더 동작 확인)"
    answer_detail: "파싱 검증 = wazuh-logtest로 원시 로그→필드(srcip/dstuser) 분해 확인. 디코더 동작의 눈."
    verify:
      type: output_contains
      expect: 'parsed_fields'
      field: stdout
      semantic: {intent: "파싱 검증", success_criteria: ["필드 분해"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 3단계 정규화 — 공통 필드(srcip) 추출 실증
      ## 💻 실행 명령 (디코더가 원시 로그를 공통 필드 srcip로 정규화함을 logtest로 실증)
      ```bash
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized'
      ```
      ## ✅ 합격 기준
      디코더가 원시 로그를 공통 필드(srcip)로 **정규화함을 실증**하면(normalized) 통과.
      ## 🔧 도구 풀이
      - 정규화: ssh의 'from X', 웹의 'client X'를 모두 srcip=X로 통일. 출처 IP 하나로 전 소스 상관(W02/W07 전제).
    hint: '정규화'
    category: analysis
    points: 14
    answer: |
      echo "=== 3단계 정규화 — 공통 필드(srcip) 추출 실증 ==="
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized'
      echo "→ 디코더가 원시 로그의 'from X'를 공통 필드 srcip로 정규화함을 실증. 출처 IP 하나로 전 소스 상관 가능"
    answer_detail: "정규화 = logtest로 srcip 공통 필드 추출 실증. 가짜 echo 아닌 실증. 교차 상관의 전제."
    verify:
      type: output_contains
      expect: 'normalized'
      field: stdout
      semantic: {intent: "정규화", success_criteria: ["공통 스키마"], acceptable_methods: ["**[설명] 정규화 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 4단계 저장·보존 정책 — 보존 로그 실확인
      ## 💻 실행 명령 (실제 보존 중인 로그(alerts.json)의 크기를 확인)
      ```bash
      docker exec el34-siem sh -c 'SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json 2>/dev/null); echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"; echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"; test -f /var/ossec/logs/alerts/alerts.json && echo retention_done'
      ```
      ## ✅ 합격 기준
      실제 보존 중인 로그(alerts.json)를 **확인**하면(retention_done) 통과.
      ## 🔧 도구 풀이
      - 보존: hot(즉시검색)→warm→cold. 침해는 수개월 잠복→짧으면 조사 불가. PCI 1년 등 규정 최소보존+무결성.
    hint: '보존'
    category: report
    points: 12
    answer: |
      echo "=== 4단계 저장·보존 정책 — 보존 로그 실확인 ==="
      docker exec el34-siem sh -c 'SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json 2>/dev/null); echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"; echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"; test -f /var/ossec/logs/alerts/alerts.json && echo retention_done'
      echo "→ 실제 보존 중인 alerts.json 크기 확인. hot/warm/cold 계층·규정 최소보존. 보존은 미래의 조사 능력"
    answer_detail: "보존 = 실제 보존 로그(alerts.json) 확인. 가짜 echo 아닌 실확인. hot/warm/cold·규정 최소보존."
    verify:
      type: output_contains
      expect: 'retention_done'
      field: stdout
      semantic: {intent: "보존", success_criteria: ["계층/기간/규정"], acceptable_methods: ["**[관리적] 보존 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 파이프라인 사각(blind spot) 점검 — 수집 소스 실집계
      ## 💻 실행 명령 (수집 중인 localfile 소스를 실집계 → 미수집이 사각)
      ```bash
      docker exec el34-siem sh -c 'L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf); echo "수집 소스(localfile) ${L}개 — 여기 없는 소스가 사각(blind spot)=탐지 불가"; echo "사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실"; [ "$L" -ge 1 ] && echo blindspot_done'
      ```
      ## ✅ 합격 기준
      수집 소스(localfile)를 **실집계**해 사각을 점검하면(blindspot_done) 통과.
      ## 🔧 도구 풀이
      - 사각: 수집누락(localfile에 없음)·파싱실패·NTP 시간오류·폭주유실. 사각=탐지 불가 구간=공격자 은신처.
    hint: '사각'
    category: report
    points: 12
    answer: |
      echo "=== 파이프라인 사각(blind spot) 점검 — 수집 소스 실집계 ==="
      docker exec el34-siem sh -c 'L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf); echo "수집 소스(localfile) ${L}개 — 여기 없는 소스가 사각(blind spot)=탐지 불가"; echo "사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실"; [ "$L" -ge 1 ] && echo blindspot_done'
      echo "→ 수집 localfile 소스 실집계. 여기 없는 소스가 사각=탐지 불가 구간(공격자 은신처). 파이프라인 건강=탐지 커버리지"
    answer_detail: "사각 점검 = localfile 수집 소스 실집계. 가짜 echo 아닌 실집계. 미수집이 사각=공격자 은신처."
    verify:
      type: output_contains
      expect: 'blindspot_done'
      field: stdout
      semantic: {intent: "사각 점검", success_criteria: ["사각 유형"], acceptable_methods: ["**[관리적] 사각 점검 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 로그 엔지니어링 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W12 로그 엔지니어링 보고서 (학번, 이름)
      ## 1. 수집·포맷·파싱(디코더)
      ## 2. 정규화·보존 정책
      ## 3. 파이프라인 사각 점검
      ```
      ## ✅ 합격 기준
      파이프라인 + 정규화 + 사각점검 포함.
    hint: '파이프라인+정규화+사각'
    category: report
    points: 12
    answer: |
      echo "=== 로그 엔지니어링 보고서 — 실측 증거 기반 ==="
      docker exec el34-siem sh -c 'L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf); D=$(ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l); echo "# SOC고급 W12 로그 엔지니어링 보고서"; echo "## 1. 수집(localfile ${L}개)→파싱(디코더 ${D}개, logtest로 srcip 분해, 실측)"; echo "## 2. 정규화(공통 srcip로 전 소스 상관). 보존(hot/warm/cold·규정 최소보존)"; echo "## 3. 사각: 수집누락/파싱실패/NTP/폭주유실 → 탐지 불가. 파이프라인 건강=탐지 커버리지"; echo "## 결론: 좋은 탐지는 좋은 로그에서 — 로그 엔지니어링이 SOC의 토대"; echo logeng_report_done'
      echo "→ 보고서가 실측 localfile·디코더 수를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "로그 엔지니어링 보고 = 실측 localfile/디코더 수 인용+정규화/보존/사각. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'logeng_report_done'
      field: stdout
      semantic: {intent: "로그 엔지니어링 보고", success_criteria: ["파이프라인/정규화/사각"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
