lab_id: standalone-soc-adv-week12
title: "로그 엔지니어링 — 수집·파싱·정규화·보존 파이프라인"
version: standalone-soc-adv
course: soc-adv
week: 12
description: |
  SOC 고급 W12 — 로그 엔지니어링. 모든 탐지의 토대인 로그 파이프라인을 다룬다. 입력(localfile)·로그 포맷·
  디코더(파싱)·정규화(필드)·보존을 el34 Wazuh로 확인하고, wazuh-logtest로 원시 로그가 필드로 분해되는
  과정을 본다. el34-siem Wazuh decoders/logtest 사용(읽기 전용). 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh)·secuops W12(decoder/rule) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(파이프라인 5단계) §3(디코더/정규화) §4(보존) 숙지"
objectives:
  - "로그 파이프라인 5단계(수집→파싱→정규화→저장→탐지) 이해"
  - "Wazuh 디코더로 원시 로그를 필드로 분해"
  - "보존 정책·파이프라인 사각(blind spot) 점검"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 1단계 수집 — 입력 소스(localfile)
      **실습 의미:** 파이프라인의 시작은 로그 입력이다 — ossec.conf의 <localfile>이 어떤 로그를 수집할지 정의하며, 수집 안 된 로그는 탐지도 불가하다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 수집: ossec.conf의 <localfile> 입력 정의 개수를 센다
        N=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        echo "입력 소스(localfile) ${N}개"
        # 입력 소스를 집계했으면 마커
        [ "$N" -ge 0 ] && echo inputs_found
      '
      ```
      ## ✅ 합격 기준
      `inputs_found`(과 입력 소스 수)가 출력되면 통과. **근거:** 마커는 ossec.conf의 입력 정의를 실제 집계했을 때 찍히므로, 파이프라인 입구(수집)를 확인했음을 뜻한다.
    hint: 'localfile'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c '
        # <localfile> 입력 정의 개수 집계
        N=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        echo "입력 소스(localfile) ${N}개"
        # 집계했으면 마커
        [ "$N" -ge 0 ] && echo inputs_found
      '
    answer_detail: "수집 = ossec.conf <localfile> 입력 정의. 수집 안 되면 탐지 불가 — 파이프라인의 입구."
    verify:
      type: output_contains
      expect: 'inputs_found'
      field: stdout
      semantic: {intent: "수집", success_criteria: ["입력 소스"], acceptable_methods: ["**[OSS] localfile (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 로그 포맷 식별
      **실습 의미:** 로그마다 포맷이 다르다(syslog/json/command) — 포맷에 맞는 파서가 있어야 분해되므로, 어떤 포맷을 수집 중인지 식별한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 로그 포맷별(syslog/json/command) 개수를 집계한다 (포맷마다 파서가 다름)
        grep "<log_format>" /var/ossec/etc/ossec.conf | sort | uniq -c
        # 포맷을 실제 집계했으면 마커
        grep -q "<log_format>" /var/ossec/etc/ossec.conf && echo formats_listed
      '
      ```
      ## ✅ 합격 기준
      `formats_listed`(과 포맷별 수)가 출력되면 통과. **근거:** 마커는 log_format이 실제 존재해 집계됐을 때만 찍히므로, 포맷별 파서 매핑의 기준을 파악했음을 뜻한다.
    hint: 'log_format'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 로그 포맷별 개수 집계
        grep "<log_format>" /var/ossec/etc/ossec.conf | sort | uniq -c
        # 포맷 존재 시 마커
        grep -q "<log_format>" /var/ossec/etc/ossec.conf && echo formats_listed
      '
    answer_detail: "로그 포맷 = syslog/json/command. 포맷별 파서 필요. 구조화(json)일수록 파싱이 쉽고 정확."
    verify:
      type: output_contains
      expect: 'formats_listed'
      field: stdout
      semantic: {intent: "로그 포맷", success_criteria: ["포맷"], acceptable_methods: ["**[OSS] log_format (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 2단계 파싱 — 디코더
      **실습 의미:** 디코더는 원시 로그 한 줄을 의미 있는 필드(srcip·user·url…)로 분해한다 — 룰은 이 분해된 필드를 보고 판단하므로 디코더 집합을 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 파싱: 디코더 집합 개수를 센다 (원시 로그를 필드로 분해하는 파서들)
        D=$(ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l)
        echo "디코더 ${D}개"
        # 디코더 집합이 있으면 마커
        [ "$D" -ge 1 ] && echo decoders_counted
      '
      ```
      ## ✅ 합격 기준
      `decoders_counted`(과 디코더 수)가 출력되면 통과. **근거:** 마커는 디코더 집합이 실제 존재할 때만 찍히므로, 원시 로그를 필드로 분해할 파싱 자산이 있음을 뜻한다.
    hint: '디코더'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 디코더 집합 개수 집계
        D=$(ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l)
        echo "디코더 ${D}개"
        # 디코더가 있으면 마커
        [ "$D" -ge 1 ] && echo decoders_counted
      '
    answer_detail: "파싱 = 디코더가 원시 로그를 필드로 분해(srcip/user/url). 룰의 판단 재료. 120개 기본 디코더."
    verify:
      type: output_contains
      expect: 'decoders_counted'
      field: stdout
      semantic: {intent: "파싱", success_criteria: ["디코더"], acceptable_methods: ["**[OSS] decoders (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 파싱 검증 — logtest 필드 분해
      **실습 의미:** wazuh-logtest로 실제 원시 로그가 어떤 필드(srcip/dstuser)로 분해되는지 눈으로 확인한다 — 디코더가 동작하는지 검증하는 단계다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 원시 syslog 한 줄을 wazuh-logtest에 넣어 분해된 필드(srcip/dstuser/decoder)를 본다 (2>&1: logtest는 stderr 출력)
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip|dstuser|decoder" | head
        # 필드로 실제 분해(srcip/decoder)되면 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "srcip|decoder" && echo parsed_fields
      '
      ```
      ## ✅ 합격 기준
      `parsed_fields`(과 필드)가 출력되면 통과. **근거:** 마커는 원시 로그가 srcip/decoder 등 필드로 실제 분해될 때만 찍히므로, 디코더가 동작함을 검증했음을 뜻한다.
    hint: 'logtest 분해'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 원시 로그를 logtest에 넣어 분해 필드 확인 (2>&1)
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip|dstuser|decoder" | head
        # 필드 분해되면 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "srcip|decoder" && echo parsed_fields
      '
    answer_detail: "파싱 검증 = wazuh-logtest(2>&1)로 원시 로그→필드(srcip/dstuser) 분해 확인. 디코더 동작의 눈."
    verify:
      type: output_contains
      expect: 'parsed_fields'
      field: stdout
      semantic: {intent: "파싱 검증", success_criteria: ["필드 분해"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 3단계 정규화 — 공통 필드(srcip) 추출
      **실습 의미:** ssh의 'from X', 웹의 'client X'를 모두 srcip=X로 통일하는 것이 정규화다 — 출처 IP 하나로 전 소스를 상관(W02/W07)할 수 있는 전제다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 정규화: ssh의 "from X"가 공통 필드 srcip로 통일되는지 logtest로 확인한다
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"
        # srcip 공통 필드가 실제 추출되면 정규화 실증 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized
      '
      ```
      ## ✅ 합격 기준
      `normalized` 출력 시 통과. **근거:** 마커는 원시 로그에서 공통 필드 srcip가 실제 추출될 때만 찍히므로, 출처 IP 하나로 전 소스를 상관할 정규화가 됐음을 뜻한다.
    hint: '정규화'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # srcip 공통 필드 추출 확인
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"
        # srcip 추출되면 정규화 실증 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized
      '
    answer_detail: "정규화 = logtest로 srcip 공통 필드 추출 실증. 가짜 echo 아닌 실증. 교차 상관의 전제."
    verify:
      type: output_contains
      expect: 'normalized'
      field: stdout
      semantic: {intent: "정규화", success_criteria: ["공통 스키마"], acceptable_methods: ["**[설명] 정규화 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 4단계 저장·보존 정책
      **실습 의미:** 침해는 수개월 잠복하므로 보존이 짧으면 조사 자체가 불가하다 — 실제 보존 중인 로그(alerts.json) 크기를 확인하고 hot/warm/cold·규정 최소보존을 이해한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 보존: 실제 보존 중인 alerts.json 크기를 확인한다 (hot 계층)
        SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json 2>/dev/null)
        echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"
        echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"
        # 보존 로그가 실제 존재하면 마커
        test -f /var/ossec/logs/alerts/alerts.json && echo retention_done
      '
      ```
      ## ✅ 합격 기준
      `retention_done`(과 보존 크기)가 출력되면 통과. **근거:** 마커는 보존 로그(alerts.json)가 실제 존재할 때만 찍히므로, 미래의 조사 능력(보존)이 확보됐음을 뜻한다.
    hint: '보존'
    category: report
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 실제 보존 alerts.json 크기 확인 (hot 계층)
        SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json 2>/dev/null)
        echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"
        echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"
        # 보존 로그 존재 시 마커
        test -f /var/ossec/logs/alerts/alerts.json && echo retention_done
      '
    answer_detail: "보존 = 실제 보존 로그(alerts.json) 확인. 가짜 echo 아닌 실확인. hot/warm/cold·규정 최소보존."
    verify:
      type: output_contains
      expect: 'retention_done'
      field: stdout
      semantic: {intent: "보존", success_criteria: ["계층/기간/규정"], acceptable_methods: ["**[관리적] 보존 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 파이프라인 사각(blind spot) 점검
      **실습 의미:** 수집되지 않는 소스는 탐지 불가 구간(사각)이자 공격자의 은신처다 — 수집 중인 localfile 소스를 실집계해 사각을 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 사각 점검: 수집 중인 localfile 소스를 실집계한다 (여기 없는 소스가 사각=탐지 불가)
        L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        echo "수집 소스(localfile) ${L}개 — 여기 없는 소스가 사각(blind spot)=탐지 불가"
        echo "사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실"
        # 수집 소스를 실집계했으면 사각 점검 마커
        [ "$L" -ge 1 ] && echo blindspot_done
      '
      ```
      ## ✅ 합격 기준
      `blindspot_done`(과 소스 수)가 출력되면 통과. **근거:** 마커는 수집 소스를 실집계했을 때 찍히므로, 미수집 사각(공격자 은신처)을 점검할 기준이 섰음을 뜻한다.
    hint: '사각'
    category: report
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 수집 localfile 소스 실집계 (미수집이 사각)
        L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        echo "수집 소스(localfile) ${L}개 — 여기 없는 소스가 사각(blind spot)=탐지 불가"
        echo "사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실"
        # 실집계했으면 마커
        [ "$L" -ge 1 ] && echo blindspot_done
      '
    answer_detail: "사각 점검 = localfile 수집 소스 실집계. 가짜 echo 아닌 실집계. 미수집이 사각=공격자 은신처."
    verify:
      type: output_contains
      expect: 'blindspot_done'
      field: stdout
      semantic: {intent: "사각 점검", success_criteria: ["사각 유형"], acceptable_methods: ["**[관리적] 사각 점검 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 로그 엔지니어링 보고서 작성
      **실습 의미:** 앞 단계의 실측(localfile·디코더 수)을 인용한 보고서로 정리한다 — 좋은 탐지는 좋은 로그에서 나오므로 파이프라인 건강을 증거로 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 보고서 근거: localfile 수집 소스 수와 디코더 수를 실측
        L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        D=$(ls /var/ossec/ruleset/decoders/ 2>/dev/null | wc -l)
        # 실측 수치를 인용한 로그 엔지니어링 보고서 출력 (본문 상세는 학생이 보강)
        echo "# W12 로그 엔지니어링 보고서 — 수집(localfile ${L})→파싱(디코더 ${D}, srcip 분해)·정규화·보존·사각점검"
        # 실측 인용 보고서면 완료 마커
        [ "$D" -ge 1 ] && echo logeng_report_done
      '
      ```
