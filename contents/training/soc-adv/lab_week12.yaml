lab_id: standalone-soc-adv-week12
title: "로그 엔지니어링 — 수집·파싱·정규화·보존 파이프라인"
version: standalone-soc-adv
course: soc-adv
week: 12
description: |
  SOC 고급 W12 — 로그 엔지니어링. 모든 탐지의 토대인 로그 파이프라인을 다룬다. 입력(localfile)·로그 포맷·
  디코더(파싱)·정규화(필드)·보존을 el34 Wazuh로 확인하고, wazuh-logtest로 원시 로그가 필드로 분해되는
  과정을 본다. el34-siem Wazuh decoders/logtest 사용(읽기 전용). 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh)·secuops W12(decoder/rule) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(파이프라인 5단계) §3(디코더/정규화) §4(보존) 숙지"
objectives:
  - "로그 파이프라인 5단계(수집→파싱→정규화→저장→탐지) 이해"
  - "Wazuh 디코더로 원시 로그를 필드로 분해"
  - "보존 정책·파이프라인 사각(blind spot) 점검"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 수집(Collection): 무엇을 로그로 받는지 본다 (localfile)
      > **이 단계에서 할 일:** ossec.conf의 <localfile> 입력 정의 개수를 센다.
      > **왜:** 파이프라인의 시작은 로그 입력이다. <localfile>이 '어떤 로그를 수집할지'를 정한다 —
      > 수집 안 된 로그는 아무리 중요해도 탐지가 불가능하다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      N=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
      echo "입력 소스(localfile) ${N}개"
      [ "$N" -ge 0 ] && echo inputs_found
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 환경마다 다름)
      ```
      입력 소스(localfile) 4개
      inputs_found
      ```

      ### ▷ 결과 해석
      localfile 4개 = 이 Wazuh가 4종류의 로그 입력을 받고 있다는 뜻. 파이프라인 5단계(수집→파싱→정규화→
      저장→탐지) 중 첫 단계. 여기에 없는 로그 소스가 곧 STEP 7의 '사각'이다.
    hint: 'localfile'
    category: survey
    points: 10
    answer: |
      ssh ccc@10.20.32.100 '
        # <localfile> 입력 정의 개수 집계
        N=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
        echo "입력 소스(localfile) ${N}개"
        # 집계했으면 마커
        [ "$N" -ge 0 ] && echo inputs_found
      '
    answer_detail: "수집 = ossec.conf <localfile> 입력 정의. 수집 안 되면 탐지 불가 — 파이프라인의 입구."
    verify:
      type: output_contains
      expect: 'inputs_found'
      field: stdout
      semantic: {intent: "수집", success_criteria: ["입력 소스"], acceptable_methods: ["**[OSS] localfile (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 수집되는 로그의 '포맷'을 식별한다
      > **이 단계에서 할 일:** ossec.conf의 <log_format>을 포맷별(syslog/json/command…)로 집계한다.
      > **왜:** 로그마다 포맷이 다르고, 포맷에 맞는 파서가 있어야 분해된다. 어떤 포맷을 받는지 알아야
      > 파싱 전략이 선다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      grep "<log_format>" /var/ossec/etc/ossec.conf | sort | uniq -c
      grep -q "<log_format>" /var/ossec/etc/ossec.conf && echo formats_listed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 분포는 환경마다 다름)
      ```
            1     <log_format>command</log_format>
            2     <log_format>full_command</log_format>
            1     <log_format>plain</log_format>
            1     <log_format>syslog</log_format>
      formats_listed
      ```

      ### ▷ 결과 해석
      syslog=전통적 텍스트 로그, command/full_command=명령 실행 출력, plain=가공 없는 줄. 구조화된
      포맷(json)일수록 파싱이 쉽고 정확하다. 비구조 텍스트(syslog)는 디코더 정규식이 필요하다.
    hint: 'log_format'
    category: manipulation
    points: 12
    answer: |
      ssh ccc@10.20.32.100 '
        # 로그 포맷별 개수 집계
        grep "<log_format>" /var/ossec/etc/ossec.conf | sort | uniq -c
        # 포맷 존재 시 마커
        grep -q "<log_format>" /var/ossec/etc/ossec.conf && echo formats_listed
      '
    answer_detail: "로그 포맷 = syslog/json/command. 포맷별 파서 필요. 구조화(json)일수록 파싱이 쉽고 정확."
    verify:
      type: output_contains
      expect: 'formats_listed'
      field: stdout
      semantic: {intent: "로그 포맷", success_criteria: ["포맷"], acceptable_methods: ["**[OSS] log_format (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 파싱(Parsing): 디코더 자산을 확인한다
      > **이 단계에서 할 일:** Wazuh 디코더 파일 개수를 센다.
      > **왜:** 디코더는 원시 로그 한 줄을 의미 있는 필드(srcip·user·url…)로 분해한다. 룰은 이 분해된
      > 필드를 보고 판단하므로, 디코더가 파이프라인의 핵심 파서다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      D=$(ls /var/ossec/ruleset/decoders/ | wc -l)
      echo "디코더 ${D}개"
      [ "$D" -ge 1 ] && echo decoders_counted
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 버전마다 다름)
      ```
      디코더 120개
      decoders_counted
      ```

      ### ▷ 결과 해석
      기본 디코더 120개가 sshd·apache·firewall 등 수많은 로그 형식을 필드로 분해할 준비가 됐다는 뜻.
      새 로그 소스가 기존 디코더로 안 잡히면 커스텀 디코더를 추가한다(secuops W12). 다음 단계에서 실제
      분해를 눈으로 확인한다.
    hint: '디코더'
    category: analysis
    points: 14
    answer: |
      ssh ccc@10.20.32.100 '
        # 디코더 집합 개수 집계
        D=$(ls /var/ossec/ruleset/decoders/ | wc -l)
        echo "디코더 ${D}개"
        # 디코더가 있으면 마커
        [ "$D" -ge 1 ] && echo decoders_counted
      '
    answer_detail: "파싱 = 디코더가 원시 로그를 필드로 분해(srcip/user/url). 룰의 판단 재료. 120개 기본 디코더."
    verify:
      type: output_contains
      expect: 'decoders_counted'
      field: stdout
      semantic: {intent: "파싱", success_criteria: ["디코더"], acceptable_methods: ["**[OSS] decoders (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 파싱 검증: 원시 로그가 필드로 쪼개지는지 본다 (logtest)
      > **이 단계에서 할 일:** wazuh-logtest에 syslog 한 줄을 넣어 어떤 필드(srcip/dstuser/decoder)로
      > 분해되는지 확인한다.
      > **왜:** 디코더가 있어도 실제로 동작하는지는 넣어 봐야 안다. logtest가 파싱을 눈으로 보여준다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip|dstuser|decoder" | head
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "srcip|decoder" && echo parsed_fields
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
              dstuser: 'root'
              srcip: '192.168.0.202'
      parsed_fields
      ```

      ### ▷ 결과 해석
      원시 텍스트 `...Failed password for root from 192.168.0.202...`가 dstuser='root', srcip='192.168.0.202'
      로 분해됐다 = 디코더가 동작한다는 뜻. 이 필드들이 룰의 판단 재료가 된다.
    hint: 'logtest 분해'
    category: analysis
    points: 14
    answer: |
      ssh ccc@10.20.32.100 '
        # 원시 로그를 logtest에 넣어 분해 필드 확인 (2>&1)
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip|dstuser|decoder" | head
        # 필드 분해되면 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "srcip|decoder" && echo parsed_fields
      '
    answer_detail: "파싱 검증 = wazuh-logtest(2>&1)로 원시 로그→필드(srcip/dstuser) 분해 확인. 디코더 동작의 눈."
    verify:
      type: output_contains
      expect: 'parsed_fields'
      field: stdout
      semantic: {intent: "파싱 검증", success_criteria: ["필드 분해"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 정규화(Normalization): 제각각을 '공통 필드'로 통일한다
      > **이 단계에서 할 일:** ssh의 'from X'가 공통 필드 srcip로 통일되는지 logtest로 확인한다.
      > **왜:** ssh는 'from X', 웹은 'client X'로 출처를 적는다. 이걸 모두 srcip=X로 통일(정규화)해야,
      > 출처 IP 하나로 전 소스를 상관(W02 교차상관·W07 포렌식)할 수 있다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
              srcip: '192.168.0.202'
      원시 로그→공통 필드(srcip) 정규화 확인
      normalized
      ```

      ### ▷ 결과 해석
      ssh의 'from 192.168.0.202'가 srcip 필드로 정규화됐다. 웹·방화벽 로그도 같은 srcip로 통일되므로,
      이 한 필드로 'sshd에서 무차별 대입하던 그 IP가 웹에서도 SQLi했다'를 한 번에 묶을 수 있다.
    hint: '정규화'
    category: analysis
    points: 14
    answer: |
      ssh ccc@10.20.32.100 '
        # srcip 공통 필드 추출 확인
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "srcip"
        # srcip 추출되면 정규화 실증 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qi "srcip" && echo "원시 로그→공통 필드(srcip) 정규화 확인" && echo normalized
      '
    answer_detail: "정규화 = logtest로 srcip 공통 필드 추출 실증. 가짜 echo 아닌 실증. 교차 상관의 전제."
    verify:
      type: output_contains
      expect: 'normalized'
      field: stdout
      semantic: {intent: "정규화", success_criteria: ["공통 스키마"], acceptable_methods: ["**[설명] 정규화 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 저장·보존(Retention): 미래의 조사 능력을 지킨다
      > **이 단계에서 할 일:** 실제 보존 중인 alerts.json 크기를 확인하고 보존 계층·규정을 이해한다.
      > **왜:** 침해는 수개월 잠복하기도 한다. 보존 기간이 짧으면 사건을 발견했을 때 이미 로그가 사라져
      > 조사 자체가 불가능하다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json)
      echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"
      echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"
      test -f /var/ossec/logs/alerts/alerts.json && echo retention_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 크기는 환경마다 다름)
      ```
      alerts.json 보존 크기: 2569148 bytes (hot 계층)
      계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가
      retention_done
      ```

      ### ▷ 결과 해석
      현재 hot 계층(즉시 검색용)에 약 2.5MB가 보존 중. 운영에선 비용 때문에 hot(최근, 빠름)→warm→
      cold(오래됨, 저렴·느림)로 계층화한다. PCI-DSS는 최소 1년 보존을 요구한다(compliance 트랙과 연결).
    hint: '보존'
    category: report
    points: 12
    answer: |
      ssh ccc@10.20.32.100 '
        # 실제 보존 alerts.json 크기 확인 (hot 계층)
        SZ=$(wc -c < /var/ossec/logs/alerts/alerts.json)
        echo "alerts.json 보존 크기: ${SZ} bytes (hot 계층)"
        echo "계층: hot(즉시검색)→warm→cold. 규정: PCI 1년 최소보존. 로그 없으면 포렌식/IR 불가"
        # 보존 로그 존재 시 마커
        test -f /var/ossec/logs/alerts/alerts.json && echo retention_done
      '
    answer_detail: "보존 = 실제 보존 로그(alerts.json) 확인. 가짜 echo 아닌 실확인. hot/warm/cold·규정 최소보존."
    verify:
      type: output_contains
      expect: 'retention_done'
      field: stdout
      semantic: {intent: "보존", success_criteria: ["계층/기간/규정"], acceptable_methods: ["**[관리적] 보존 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 파이프라인의 '사각(blind spot)'을 점검한다
      > **이 단계에서 할 일:** 수집 중인 localfile 소스를 집계해, 여기에 없는 소스(=사각)를 점검할
      > 기준을 세운다.
      > **왜:** 수집되지 않는 소스는 탐지 불가 구간이자 공격자의 은신처다. '무엇을 안 보고 있나'를 아는
      > 게 로그 엔지니어링의 핵심.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
      echo "수집 소스(localfile) ${L}개 — 여기 없는 소스가 사각(blind spot)=탐지 불가"
      echo "사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실"
      [ "$L" -ge 1 ] && echo blindspot_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      수집 소스(localfile) 4개 — 여기 없는 소스가 사각(blind spot)=탐지 불가
      사각 유형: 수집누락/파싱실패/NTP 시간오류/폭주유실
      blindspot_done
      ```

      ### ▷ 결과 해석
      4개 소스 밖의 로그(예: 특정 앱 로그, DNS 쿼리)는 안 보인다 = 사각. 사각은 ① 수집 누락 ② 파싱
      실패(디코더 없음) ③ NTP 시간 오류로 상관 깨짐 ④ 폭주 시 유실로 생긴다. 이 사각을 메우는 게 다음 과제.
    hint: '사각'
    category: report
    points: 12
    answer: |
      ssh ccc@10.20.32.100 '
        # 수집 localfile 소스 실집계 (미수집이 사각)
        L=$(grep -c "<localfile>" /var/ossec/etc/ossec.conf)
