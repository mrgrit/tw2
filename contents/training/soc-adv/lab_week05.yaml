      ### ▷ 그대로 입력

      **실행 위치:** el34 **호스트** — 변수(P/L) 집계가 호스트 셸에서 일어나므로(docker ps + docker exec 출력 캡처), 컨테이너에 접속하지 않고 호스트에서 실행한다.

      ```bash
      P=$(docker ps --format '{{.Names}}' | grep -ciE "opencti|misp")
      L=$(ssh ccc@10.20.32.100 'ls /var/ossec/etc/lists/ | wc -l')
      echo "# W05 CTI 보고서 — 플랫폼 ${P}개·CDB ${L}개·STIX/TAXII·신뢰도/TLP·운영 루프(수집→평가→배포→탐지→환류)"
      [ "$P" -ge 1 ] && echo cti_report_done
      ```

