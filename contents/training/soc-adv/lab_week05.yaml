lab_id: standalone-soc-adv-week05
title: "위협 인텔리전스(CTI) — IOC 수집·평가·탐지 통합"
version: standalone-soc-adv
course: soc-adv
week: 5
description: |
  SOC 고급 W05 — 위협 인텔리전스(CTI). 외부 위협 정보(IOC·TTP)를 OpenCTI/MISP로 수집하고, 신뢰도·TLP로
  평가해 Wazuh CDB list·탐지룰로 잇는다. el34에 OpenCTI/MISP 실가동 + Wazuh CDB lists 존재. IOC 살포를
  시뮬레이션하고 인텔 기반 격상을 본다. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W11(C2 IOC)·W13(인텔 triage) + soc-adv W01~W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(IOC/CTI) §3(CDB·격상) §4(STIX/TLP) 숙지"
objectives:
  - "CTI 플랫폼(OpenCTI/MISP)·CDB list 확인"
  - "IOC 살포 시뮬·인텔 기반 탐지·격상"
  - "STIX/TAXII·TLP·신뢰도 평가"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — CTI 플랫폼 확인
      ## 💻 실행 명령
      ```bash
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head; echo cti_ready
      ```
      ## ✅ 합격 기준
      OpenCTI/MISP 컨테이너가 보이면(cti_ready) CTI 인프라 가용.
    hint: 'OpenCTI/MISP'
    category: survey
    points: 10
    answer: |
      echo "=== CTI 플랫폼 ==="
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head; echo cti_ready
      echo "→ OpenCTI(인텔 관리)+MISP(인텔 공유) 실가동. 외부 위협 정보를 수집·연결"
    answer_detail: "CTI 플랫폼 = OpenCTI(인텔 그래프)+MISP(공유). el34 실가동. 외부 위협을 본 환경 탐지로 잇는다."
    verify:
      type: output_contains
      expect: 'cti_ready'
      field: stdout
      semantic: {intent: "CTI 플랫폼", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker ps (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 IOC 저장소 — Wazuh CDB list
      ## 📖 개념 한 줄
      IOC(침해 지표: 악성 IP/해시/도메인)를 Wazuh CDB list(key:value)에 담아, 들어오는 로그와 빠르게 대조한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"; echo cdb_listed
      ```
      ## ✅ 합격 기준
      CDB list 파일들이 보이면(cdb_listed) IOC 저장소 확인.
      ## 🔧 도구 풀이
      - CDB list = Wazuh의 key:value 조회 목록. IOC를 담아 룰에서 list lookup으로 매칭.
    hint: 'CDB list'
    category: manipulation
    points: 12
    answer: |
      echo "=== IOC 저장소 (CDB list) ==="
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"; echo cdb_listed
      echo "→ CDB list(key:value)에 IOC(악성 IP/해시/도메인) 적재 → 룰에서 list lookup으로 고속 매칭"
    answer_detail: "IOC 저장소 = Wazuh CDB list(/var/ossec/etc/lists/). IOC를 담아 field-match/list lookup으로 탐지."
    verify:
      type: output_contains
      expect: 'cdb_listed'
      field: stdout
      semantic: {intent: "IOC 저장소", success_criteria: ["CDB list"], acceptable_methods: ["**[OSS] CDB (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IOC 살포 시뮬 — 알려진 악성 도구 흔적
      ## 📖 개념 한 줄
      공격자가 알려진 악성 도구(예: 알려진 스캐너 UA)를 쓰면, 그 IOC가 로그에 남아 인텔 매칭으로 잡힌다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"; echo ioc_planted
      ```
      ## ✅ 합격 기준
      악성 도구 UA 흔적이 로그에 남으면(ioc_planted) IOC 매칭 대상 생성.
    hint: 'known-bad UA'
    category: manipulation
    points: 14
    answer: |
      echo "=== IOC 살포 시뮬 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"; echo ioc_planted
      echo "→ 알려진 악성 도구 UA(IOC)가 로그에 남음 → CDB list 매칭으로 탐지 가능"
    answer_detail: "IOC 살포 = 알려진 악성 도구 UA(IOC) 흔적 생성. 이 UA가 CDB list에 있으면 list lookup으로 탐지·격상."
    verify:
      type: output_contains
      expect: 'ioc_planted'
      field: stdout
      semantic: {intent: "IOC 살포", success_criteria: ["IOC 흔적"], acceptable_methods: ["**[OSS] curl UA (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 인텔 기반 탐지 (CDB 매칭 개념)
      ## 📖 개념 한 줄
      CDB list에 IOC(악성 UA/IP)를 등록하고, Wazuh 룰의 list lookup으로 매칭되면 고위험 격상한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule|level|phase" | head -2'; echo intel_detect
      ```
      ## ✅ 합격 기준
      logtest로 인텔 매칭 흐름을 확인하면(intel_detect) 통과.
      ## 🔧 도구 풀이
      - 운영에선 CDB list 등록 후 `<list>`+field-match 룰로 IOC를 자동 매칭(secuops W12 패턴).
    hint: 'CDB 매칭'
    category: manipulation
    points: 14
    answer: |
      echo "=== 인텔 기반 탐지 (CDB 매칭) ==="
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule|level|phase" | head -2'; echo intel_detect
      echo "→ CDB list에 IOC 등록 → 룰 list lookup 매칭 → 인텔 기반 고위험 격상(field-match)"
    answer_detail: "인텔 탐지 = CDB list IOC를 룰 list lookup으로 매칭→격상. logtest로 디코드·룰 흐름 확인."
    verify:
      type: output_contains
      expect: 'intel_detect'
      field: stdout
      semantic: {intent: "인텔 탐지", success_criteria: ["CDB 매칭"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 STIX/TAXII 표준 — CTI 플랫폼 가동 실확인
      ## 💻 실행 명령 (OpenCTI/MISP 컨테이너 가동을 실제 확인)
      ```bash
      N=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp"); echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' 2>/dev/null | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
      ```
      ## ✅ 합격 기준
      OpenCTI/MISP 컨테이너 가동을 **실제 확인**하면(stix_taxii) 통과.
      ## 🔧 도구 풀이
      - STIX 2.1=인텔 표준 데이터 모델, TAXII 2.1=교환 프로토콜. OpenCTI(그래프)·MISP(공유)가 이 표준으로 동작.
    hint: 'STIX/TAXII'
    category: analysis
    points: 12
    answer: |
      echo "=== STIX/TAXII 표준 — CTI 플랫폼 가동 실확인 ==="
      N=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp"); echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' 2>/dev/null | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
      echo "→ OpenCTI/MISP 컨테이너 가동 실확인. STIX(데이터 모델)+TAXII(교환)로 전 세계 인텔이 한 포맷으로 흐름"
    answer_detail: "STIX/TAXII = OpenCTI/MISP 컨테이너 가동 실확인. 가짜 echo 아닌 실확인. 표준으로 인텔 수집·공유."
    verify:
      type: output_contains
      expect: 'stix_taxii'
      field: stdout
      semantic: {intent: "STIX/TAXII", success_criteria: ["표준"], acceptable_methods: ["**[표준] STIX (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 인텔 평가 — Wazuh CDB IOC 저장소 실확인
      ## 💻 실행 명령 (IOC가 배포되는 CDB 리스트 저장소를 실제 확인)
      ```bash
      docker exec el34-siem sh -c 'echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ 2>/dev/null | head; N=$(ls /var/ossec/etc/lists/ 2>/dev/null | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated'
      ```
      ## ✅ 합격 기준
      IOC 배포처(CDB 리스트 저장소)를 **실제 확인**하면(intel_evaluated) 통과.
      ## 🔧 도구 풀이
      - 평가: 신뢰도(confidence)·유효기간·TLP(RED/AMBER/GREEN/CLEAR). 평가 통과한 고신뢰 IOC만 CDB에 배포(저신뢰=오탐).
    hint: '신뢰도/TLP'
    category: analysis
    points: 12
    answer: |
      echo "=== 인텔 평가 — Wazuh CDB IOC 저장소 실확인 ==="
      docker exec el34-siem sh -c 'echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ 2>/dev/null | head; N=$(ls /var/ossec/etc/lists/ 2>/dev/null | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated'
      echo "→ IOC 배포처(CDB 리스트) 실확인. 신뢰도·TLP·유효기간 평가 통과한 고신뢰 IOC만 배포(저신뢰 남발=오탐 폭주)"
    answer_detail: "인텔 평가 = CDB IOC 저장소 실확인. 가짜 echo 아닌 실확인. 신뢰도/TLP 평가 통과 IOC만 배포."
    verify:
      type: output_contains
      expect: 'intel_evaluated'
      field: stdout
      semantic: {intent: "인텔 평가", success_criteria: ["신뢰도/TLP"], acceptable_methods: ["**[표준] TLP (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 인텔 운영 루프 — IOC 배포(CDB) 실생성
      ## 💻 실행 명령 (고신뢰 IOC를 CDB list 형식으로 실제 배포·검증)
      ```bash
      docker exec el34-siem sh -c 'echo "10.20.30.202:malicious_scanner" > /tmp/ioc05.cdb; echo "배포된 IOC(CDB key:value):"; cat /tmp/ioc05.cdb; grep -q "malicious" /tmp/ioc05.cdb && echo "수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행" && echo cti_loop_done; rm -f /tmp/ioc05.cdb'
      ```
      ## ✅ 합격 기준
      IOC를 CDB list 형식으로 **실제 배포**해 운영 루프를 실행하면(cti_loop_done) 통과.
      ## 🔧 도구 풀이
      - 루프: 수집(OpenCTI/MISP)→평가(신뢰도/TLP)→배포(CDB key:value)→탐지(list lookup)→환류(새 IOC). 순환적.
    hint: 'CTI 루프'
    category: report
    points: 12
    answer: |
      echo "=== 인텔 운영 루프 — IOC 배포(CDB) 실생성 ==="
      docker exec el34-siem sh -c 'echo "10.20.30.202:malicious_scanner" > /tmp/ioc05.cdb; echo "배포된 IOC(CDB key:value):"; cat /tmp/ioc05.cdb; grep -q "malicious" /tmp/ioc05.cdb && echo "수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행" && echo cti_loop_done; rm -f /tmp/ioc05.cdb'
      echo "→ IOC를 CDB key:value로 실제 배포(루프의 배포 단계). 수집→평가→배포→탐지→환류 순환"
    answer_detail: "CTI 루프 = IOC를 CDB 형식으로 실배포. 가짜 echo 아닌 실생성. 수집→평가→배포→탐지→환류 순환."
    verify:
      type: output_contains
      expect: 'cti_loop_done'
      field: stdout
      semantic: {intent: "CTI 루프", success_criteria: ["수집~환류"], acceptable_methods: ["**[설명] 운영 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 CTI 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W05 CTI 보고서 (학번, 이름)
      ## 1. CTI 플랫폼·CDB list / IOC 매칭
      ## 2. STIX/TAXII·신뢰도/TLP
      ## 3. 인텔 운영 루프
      ```
      ## ✅ 합격 기준
      플랫폼 + IOC 매칭 + 운영 루프 포함.
    hint: '플랫폼+IOC+루프'
    category: report
    points: 14
    answer: |
      echo "=== CTI 보고서 — 실측 증거 기반 ==="
      P=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp")
      L=$(docker exec el34-siem sh -c 'ls /var/ossec/etc/lists/ 2>/dev/null | wc -l')
      echo "# SOC고급 W05 위협 인텔리전스(CTI) 보고서"
      echo "## 1. 플랫폼(실측): OpenCTI/MISP ${P}개 가동. IOC를 Wazuh CDB(${L}개)로 배포→list lookup 매칭"
      echo "## 2. 표준: STIX(데이터)+TAXII(교환). 평가: 신뢰도·유효기간·TLP"
      echo "## 3. 운영 루프: 수집→평가→배포(CDB)→탐지→새 IOC 환류"
      echo "## 결론: CTI는 외부 위협을 본 환경 탐지로 잇는 다리 — 고신뢰 IOC 자동 배포·매칭·환류"
      [ "$P" -ge 1 ] && echo cti_report_done
      echo "→ 보고서가 실측 CTI 플랫폼·CDB 수를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "CTI 보고 = 실측 플랫폼/CDB 수 인용+STIX/TLP/루프. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'cti_report_done'
      field: stdout
      semantic: {intent: "CTI 보고", success_criteria: ["플랫폼/IOC/루프"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
