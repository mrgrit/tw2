      보고서 한 줄 골격이다. 제출용은 STEP 1~7의 구체값(플랫폼 가동, CDB 저장소, IOC 살포/매칭, STIX/TLP
      평가, 배포 루프)과 인텔 출처·신뢰도 표를 본문으로 채운다.
