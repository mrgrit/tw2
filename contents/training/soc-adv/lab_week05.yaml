lab_id: standalone-soc-adv-week05
title: "위협 인텔리전스(CTI) — IOC 수집·평가·탐지 통합"
version: standalone-soc-adv
course: soc-adv
week: 5
description: |
  SOC 고급 W05 — 위협 인텔리전스(CTI). 외부 위협 정보(IOC·TTP)를 OpenCTI/MISP로 수집하고, 신뢰도·TLP로
  평가해 Wazuh CDB list·탐지룰로 잇는다. el34에 OpenCTI/MISP 실가동 + Wazuh CDB lists 존재. IOC 살포를
  시뮬레이션하고 인텔 기반 격상을 본다. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W11(C2 IOC)·W13(인텔 triage) + soc-adv W01~W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(IOC/CTI) §3(CDB·격상) §4(STIX/TLP) 숙지"
objectives:
  - "CTI 플랫폼(OpenCTI/MISP)·CDB list 확인"
  - "IOC 살포 시뮬·인텔 기반 탐지·격상"
  - "STIX/TAXII·TLP·신뢰도 평가"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 CTI 플랫폼 확인
      **실습 의미:** CTI 실습은 외부 위협 정보를 다루는 플랫폼이 있어야 시작된다 — OpenCTI(관리)·MISP(공유) 가동을 먼저 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 중 컨테이너 목록에서 OpenCTI/MISP를 찾아 CTI 인프라 가동을 확인한다
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      # 2) CTI 플랫폼 확인 마커
      echo cti_ready
      ```
      ## ✅ 합격 기준
      `cti_ready`(과 컨테이너명)가 출력되면 통과. **근거:** 플랫폼 컨테이너가 실제 떠 있어야 목록에 나오므로, 출력은 인텔 수집·공유 인프라가 가용함을 뜻한다.
    hint: 'OpenCTI/MISP'
    category: survey
    points: 10
    answer: |
      # 1) 실행 중 컨테이너에서 OpenCTI/MISP 찾기 (CTI 인프라 가동 확인)
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      # 2) CTI 플랫폼 확인 마커
      echo cti_ready
    answer_detail: "CTI 플랫폼 = OpenCTI(인텔 그래프)+MISP(공유). el34 실가동. 외부 위협을 본 환경 탐지로 잇는다."
    verify:
      type: output_contains
      expect: 'cti_ready'
      field: stdout
      semantic: {intent: "CTI 플랫폼", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker ps (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 IOC 저장소 — Wazuh CDB list
      **실습 의미:** 외부 IOC(악성 IP/해시/도메인)를 어디에 담아 로그와 대조하는지 확인한다 — Wazuh의 CDB list(key:value)가 그 저장소다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIEM의 /var/ossec/etc/lists/ 아래 CDB list 파일들을 나열한다 (IOC 저장소)
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"
      # 2) IOC 저장소 확인 마커
      echo cdb_listed
      ```
      ## ✅ 합격 기준
      `cdb_listed`(과 리스트 파일)가 출력되면 통과. **근거:** CDB list가 실제 존재한다는 뜻이라, IOC를 담아 룰의 list lookup으로 고속 매칭할 기반이 있음을 확인한다.
    hint: 'CDB list'
    category: manipulation
    points: 12
    answer: |
      # 1) /var/ossec/etc/lists/ CDB list 파일 나열 (IOC 저장소)
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"
      # 2) IOC 저장소 확인 마커
      echo cdb_listed
    answer_detail: "IOC 저장소 = Wazuh CDB list(/var/ossec/etc/lists/). IOC를 담아 field-match/list lookup으로 탐지."
    verify:
      type: output_contains
      expect: 'cdb_listed'
      field: stdout
      semantic: {intent: "IOC 저장소", success_criteria: ["CDB list"], acceptable_methods: ["**[OSS] CDB (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IOC 살포 시뮬 (알려진 악성 도구 흔적)
      **실습 의미:** 인텔 매칭을 검증할 대상을 만든다 — 알려진 악성 도구 UA(IOC)를 흘려 로그에 흔적을 남긴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 알려진 악성 도구 UA(IOC)로 요청을 보내 로그에 흔적을 남긴다
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      # 2) 웹 액세스 로그에서 그 UA(IOC) 흔적 건수를 센다
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"
      # 3) IOC 흔적 생성 마커
      echo ioc_planted
      ```
      ## ✅ 합격 기준
      `ioc_planted`(과 흔적 건수)가 출력되면 통과. **근거:** 악성 UA가 로그에 남았다는 뜻이라, 이 IOC가 CDB list에 있으면 매칭·격상될 대상이 실제로 생긴 것이다.
    hint: 'known-bad UA'
    category: manipulation
    points: 14
    answer: |
      # 1) 알려진 악성 도구 UA(IOC)로 요청 전송 (로그 흔적 생성)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      # 2) 웹 액세스 로그에서 그 UA(IOC) 흔적 건수 집계
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"
      # 3) IOC 흔적 생성 마커
      echo ioc_planted
    answer_detail: "IOC 살포 = 알려진 악성 도구 UA(IOC) 흔적 생성. 이 UA가 CDB list에 있으면 list lookup으로 탐지·격상."
    verify:
      type: output_contains
      expect: 'ioc_planted'
      field: stdout
      semantic: {intent: "IOC 살포", success_criteria: ["IOC 흔적"], acceptable_methods: ["**[OSS] curl UA (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 인텔 기반 탐지 (CDB 매칭)
      **실습 의미:** 등록한 IOC가 들어오는 로그와 자동 대조돼 격상되는 흐름을 본다 — 외부 인텔이 우리 탐지로 이어지는 핵심 고리.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) IOC(known-bad-tool)가 든 로그를 wazuh-logtest에 넣어 디코드·룰 처리 단계를 본다 (2>&1: logtest는 stderr 출력)
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|level" | head -3'
      # 2) logtest가 처리 단계(Phase)를 내면 인텔 기반 탐지 흐름 확인 마커 (운영에선 CDB list+field-match로 자동 매칭)
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase" && echo intel_detect'
      ```
      ## ✅ 합격 기준
      `intel_detect` 출력 시 통과. **근거:** 마커는 logtest가 IOC 포함 로그를 실제 처리(Phase)했을 때만 찍히므로, CDB 등록 시 인텔 기반 자동 매칭·격상이 가능함을 보인다.
    hint: 'CDB 매칭'
    category: manipulation
    points: 14
    answer: |
      # 1) IOC가 든 로그를 wazuh-logtest에 넣어 처리 단계 확인 (2>&1)
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|level" | head -3'
      # 2) Phase 처리 확인 시에만 인텔 탐지 흐름 마커
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase" && echo intel_detect'
    answer_detail: "인텔 탐지 = CDB list IOC를 룰 list lookup으로 매칭→격상. logtest Phase 게이트 — 가짜 echo 아님."
    verify:
      type: output_contains
      expect: 'intel_detect'
      field: stdout
      semantic: {intent: "인텔 탐지", success_criteria: ["CDB 매칭"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 STIX/TAXII 표준
      **실습 의미:** STIX(인텔 표준 데이터 모델)+TAXII(교환 프로토콜) 덕에 전 세계 인텔이 한 포맷으로 흐른다 — 이 표준으로 동작하는 OpenCTI/MISP 가동을 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 중 컨테이너에서 OpenCTI/MISP 개수(N)를 센다
      N=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp")
      # 2) 플랫폼 수·이름 출력 + N≥1이면 STIX/TAXII 가동 마커
      echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' 2>/dev/null | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
      ```
      ## ✅ 합격 기준
      `stix_taxii` 출력 시 통과. **근거:** 마커는 N≥1(플랫폼이 실제 떠 있음)일 때만 찍히므로, 출력은 STIX/TAXII 기반 인텔 인프라가 동작함을 뜻한다.
    hint: 'STIX/TAXII'
    category: analysis
    points: 12
    answer: |
      # 1) OpenCTI/MISP 컨테이너 개수(N) 집계
      N=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp")
      # 2) 수·이름 출력 + N≥1이면 STIX/TAXII 가동 마커
      echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' 2>/dev/null | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
    answer_detail: "STIX/TAXII = OpenCTI/MISP 컨테이너 가동 실확인. 가짜 echo 아닌 실확인. 표준으로 인텔 수집·공유."
    verify:
      type: output_contains
      expect: 'stix_taxii'
      field: stdout
      semantic: {intent: "STIX/TAXII", success_criteria: ["표준"], acceptable_methods: ["**[표준] STIX (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 인텔 평가 (신뢰도·TLP)
      **실습 의미:** 모든 IOC가 같지 않다 — 신뢰도·유효기간·TLP로 평가해 고신뢰만 배포해야 오탐이 안 터진다. 평가 통과 IOC가 모이는 CDB 저장소를 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIEM의 CDB 리스트를 나열하고 개수(N)를 세어 IOC 배포 위치를 확인한다 (평가 통과 IOC만 여기 배포)
      docker exec el34-siem sh -c 'echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ 2>/dev/null | head; N=$(ls /var/ossec/etc/lists/ 2>/dev/null | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated'
      ```
      ## ✅ 합격 기준
      `intel_evaluated`(과 리스트 수)가 출력되면 통과. **근거:** CDB 저장소가 실제 확인됐다는 뜻이라, 평가 통과한 고신뢰 IOC만 골라 배포하는 운영 기반이 있음을 보인다.
    hint: '신뢰도/TLP'
    category: analysis
    points: 12
    answer: |
      # 1) CDB 리스트 나열·개수 집계 → IOC 배포 위치 확인 → 마커
      docker exec el34-siem sh -c 'echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ 2>/dev/null | head; N=$(ls /var/ossec/etc/lists/ 2>/dev/null | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated'
    answer_detail: "인텔 평가 = CDB IOC 저장소 실확인. 가짜 echo 아닌 실확인. 신뢰도/TLP 평가 통과 IOC만 배포."
    verify:
      type: output_contains
      expect: 'intel_evaluated'
      field: stdout
      semantic: {intent: "인텔 평가", success_criteria: ["신뢰도/TLP"], acceptable_methods: ["**[표준] TLP (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 인텔 운영 루프 (IOC 배포)
      **실습 의미:** CTI는 일회성이 아니라 수집→평가→배포→탐지→환류의 순환이다 — 그 중 '배포' 단계를 직접 수행해 IOC를 CDB 형식으로 만든다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 평가 통과 IOC를 CDB key:value(IP:라벨) 형식으로 작성한다 (배포 단계)
      docker exec el34-siem sh -c 'echo "10.20.30.202:malicious_scanner" > /tmp/ioc05.cdb'
      # 2) 배포된 IOC를 확인하고, 형식이 맞으면 운영 루프 배포 단계 마커 + self-clean
      docker exec el34-siem sh -c 'echo "배포된 IOC(CDB key:value):"; cat /tmp/ioc05.cdb; grep -q "malicious" /tmp/ioc05.cdb && echo "수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행" && echo cti_loop_done; rm -f /tmp/ioc05.cdb'
      ```
      ## ✅ 합격 기준
      `cti_loop_done` 출력 시 통과. **근거:** 마커는 CDB 형식 IOC가 실제 작성됐을 때만 찍히므로, 출력은 수집~환류 루프의 배포 단계가 실행됐음을 뜻한다.
    hint: 'CTI 루프'
    category: report
    points: 12
    answer: |
      # 1) IOC를 CDB key:value 형식으로 작성 (배포 단계)
      docker exec el34-siem sh -c 'echo "10.20.30.202:malicious_scanner" > /tmp/ioc05.cdb'
      # 2) 배포 확인 + 형식 맞으면 마커 + self-clean
      docker exec el34-siem sh -c 'echo "배포된 IOC(CDB key:value):"; cat /tmp/ioc05.cdb; grep -q "malicious" /tmp/ioc05.cdb && echo "수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행" && echo cti_loop_done; rm -f /tmp/ioc05.cdb'
    answer_detail: "CTI 루프 = IOC를 CDB 형식으로 실배포. 가짜 echo 아닌 실생성. 수집→평가→배포→탐지→환류 순환."
    verify:
      type: output_contains
      expect: 'cti_loop_done'
      field: stdout
      semantic: {intent: "CTI 루프", success_criteria: ["수집~환류"], acceptable_methods: ["**[설명] 운영 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 CTI 보고서 작성
      **실습 의미:** 앞 단계의 실측(플랫폼·CDB 수)을 인용한 보고서로 정리한다 — 추측이 아닌 가동 현황을 근거로 인텔 운영을 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) CTI 플랫폼 수(P)를 집계한다 (보고서 인용 근거 ①)
      P=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp")
      # 2) CDB 리스트 수(L)를 집계한다 (보고서 인용 근거 ②)
      L=$(docker exec el34-siem sh -c 'ls /var/ossec/etc/lists/ 2>/dev/null | wc -l')
      # 3) 실측 수치를 인용한 CTI 보고서 출력 (본문 상세는 학생이 보강)
      echo "# W05 CTI 보고서 — 플랫폼 ${P}개·CDB ${L}개·STIX/TAXII·신뢰도/TLP·운영 루프(수집→평가→배포→탐지→환류)"
      # 4) 플랫폼 1개 이상 실측 인용이면 완료 마커
      [ "$P" -ge 1 ] && echo cti_report_done
      ```
      ## ✅ 합격 기준
      `cti_report_done` 출력 시 통과. **근거:** 실측 플랫폼/CDB 수를 인용한 보고서가 생성될 때만 마커가 찍히므로, 출력은 증거 기반 보고가 작성됐음을 뜻한다.
    hint: '플랫폼+IOC+루프'
    category: report
    points: 14
    answer: |
      # 1) CTI 플랫폼 수(P) 집계 (인용 근거 ①)
      P=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -ciE "opencti|misp")
      # 2) CDB 리스트 수(L) 집계 (인용 근거 ②)
      L=$(docker exec el34-siem sh -c 'ls /var/ossec/etc/lists/ 2>/dev/null | wc -l')
      # 3) 실측 수치 인용 CTI 보고서 출력
      echo "# W05 CTI 보고서 — 플랫폼 ${P}개·CDB ${L}개·STIX/TAXII·신뢰도/TLP·운영 루프(수집→평가→배포→탐지→환류)"
      # 4) 플랫폼 1개 이상 실측 인용이면 완료 마커
      [ "$P" -ge 1 ] && echo cti_report_done
    answer_detail: "CTI 보고 = 실측 플랫폼/CDB 수 인용+STIX/TLP/루프. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'cti_report_done'
      field: stdout
      semantic: {intent: "CTI 보고", success_criteria: ["플랫폼/IOC/루프"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
