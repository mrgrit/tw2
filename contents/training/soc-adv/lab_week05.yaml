lab_id: standalone-soc-adv-week05
title: "위협 인텔리전스(CTI) — IOC 수집·평가·탐지 통합"
version: standalone-soc-adv
course: soc-adv
week: 5
description: |
  SOC 고급 W05 — 위협 인텔리전스(CTI). 외부 위협 정보(IOC·TTP)를 OpenCTI/MISP로 수집하고, 신뢰도·TLP로
  평가해 Wazuh CDB list·탐지룰로 잇는다. el34에 OpenCTI/MISP 실가동 + Wazuh CDB lists 존재. IOC 살포를
  시뮬레이션하고 인텔 기반 격상을 본다. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W11(C2 IOC)·W13(인텔 triage) + soc-adv W01~W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(IOC/CTI) §3(CDB·격상) §4(STIX/TLP) 숙지"
objectives:
  - "CTI 플랫폼(OpenCTI/MISP)·CDB list 확인"
  - "IOC 살포 시뮬·인텔 기반 탐지·격상"
  - "STIX/TAXII·TLP·신뢰도 평가"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — CTI 플랫폼 확인
      ## 💻 실행 명령
      ```bash
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head; echo cti_ready
      ```
      ## ✅ 합격 기준
      OpenCTI/MISP 컨테이너가 보이면(cti_ready) CTI 인프라 가용.
    hint: 'OpenCTI/MISP'
    category: survey
    points: 10
    answer: |
      echo "=== CTI 플랫폼 ==="
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head; echo cti_ready
      echo "→ OpenCTI(인텔 관리)+MISP(인텔 공유) 실가동. 외부 위협 정보를 수집·연결"
    answer_detail: "CTI 플랫폼 = OpenCTI(인텔 그래프)+MISP(공유). el34 실가동. 외부 위협을 본 환경 탐지로 잇는다."
    verify:
      type: output_contains
      expect: 'cti_ready'
      field: stdout
      semantic: {intent: "CTI 플랫폼", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker ps (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 IOC 저장소 — Wazuh CDB list
      ## 📖 개념 한 줄
      IOC(침해 지표: 악성 IP/해시/도메인)를 Wazuh CDB list(key:value)에 담아, 들어오는 로그와 빠르게 대조한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"; echo cdb_listed
      ```
      ## ✅ 합격 기준
      CDB list 파일들이 보이면(cdb_listed) IOC 저장소 확인.
      ## 🔧 도구 풀이
      - CDB list = Wazuh의 key:value 조회 목록. IOC를 담아 룰에서 list lookup으로 매칭.
    hint: 'CDB list'
    category: manipulation
    points: 12
    answer: |
      echo "=== IOC 저장소 (CDB list) ==="
      docker exec el34-siem sh -c "ls /var/ossec/etc/lists/ 2>/dev/null"; echo cdb_listed
      echo "→ CDB list(key:value)에 IOC(악성 IP/해시/도메인) 적재 → 룰에서 list lookup으로 고속 매칭"
    answer_detail: "IOC 저장소 = Wazuh CDB list(/var/ossec/etc/lists/). IOC를 담아 field-match/list lookup으로 탐지."
    verify:
      type: output_contains
      expect: 'cdb_listed'
      field: stdout
      semantic: {intent: "IOC 저장소", success_criteria: ["CDB list"], acceptable_methods: ["**[OSS] CDB (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IOC 살포 시뮬 — 알려진 악성 도구 흔적
      ## 📖 개념 한 줄
      공격자가 알려진 악성 도구(예: 알려진 스캐너 UA)를 쓰면, 그 IOC가 로그에 남아 인텔 매칭으로 잡힌다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"; echo ioc_planted
      ```
      ## ✅ 합격 기준
      악성 도구 UA 흔적이 로그에 남으면(ioc_planted) IOC 매칭 대상 생성.
    hint: 'known-bad UA'
    category: manipulation
    points: 14
    answer: |
      echo "=== IOC 살포 시뮬 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A 'known-bad-tool/1.0' -H 'Host: dvwa.el34.lab' http://10.20.30.1/?id=ioc_test"
      docker exec el34-web sh -c "sudo tail -200 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log 2>/dev/null | grep -c 'known-bad-tool'"; echo ioc_planted
      echo "→ 알려진 악성 도구 UA(IOC)가 로그에 남음 → CDB list 매칭으로 탐지 가능"
    answer_detail: "IOC 살포 = 알려진 악성 도구 UA(IOC) 흔적 생성. 이 UA가 CDB list에 있으면 list lookup으로 탐지·격상."
    verify:
      type: output_contains
      expect: 'ioc_planted'
      field: stdout
      semantic: {intent: "IOC 살포", success_criteria: ["IOC 흔적"], acceptable_methods: ["**[OSS] curl UA (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 인텔 기반 탐지 (CDB 매칭 개념)
      ## 📖 개념 한 줄
      CDB list에 IOC(악성 UA/IP)를 등록하고, Wazuh 룰의 list lookup으로 매칭되면 고위험 격상한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule|level|phase" | head -2'; echo intel_detect
      ```
      ## ✅ 합격 기준
      logtest로 인텔 매칭 흐름을 확인하면(intel_detect) 통과.
      ## 🔧 도구 풀이
      - 운영에선 CDB list 등록 후 `<list>`+field-match 룰로 IOC를 자동 매칭(secuops W12 패턴).
    hint: 'CDB 매칭'
    category: manipulation
    points: 14
    answer: |
      echo "=== 인텔 기반 탐지 (CDB 매칭) ==="
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host suspicious activity from 10.20.30.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule|level|phase" | head -2'; echo intel_detect
      echo "→ CDB list에 IOC 등록 → 룰 list lookup 매칭 → 인텔 기반 고위험 격상(field-match)"
    answer_detail: "인텔 탐지 = CDB list IOC를 룰 list lookup으로 매칭→격상. logtest로 디코드·룰 흐름 확인."
    verify:
      type: output_contains
      expect: 'intel_detect'
      field: stdout
      semantic: {intent: "인텔 탐지", success_criteria: ["CDB 매칭"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 STIX/TAXII 표준
      ## 💻 실행 명령
      ```bash
      echo "STIX(인텔 데이터 표준 포맷)+TAXII(교환 프로토콜). OpenCTI/MISP가 STIX로 IOC·TTP·관계를 표현·공유"
      ```
      ## ✅ 합격 기준
      STIX/TAXII 개념이 정리되면 통과.
    hint: 'STIX/TAXII'
    category: analysis
    points: 12
    answer: |
      echo "=== STIX/TAXII ==="
      echo "STIX 2.1: 위협 인텔의 표준 데이터 모델(Indicator·Malware·Threat Actor·관계를 그래프로)"
      echo "TAXII 2.1: STIX를 주고받는 표준 교환 프로토콜(피드 구독/공유)"
      echo "OpenCTI: STIX 그래프로 인텔을 연결·축적. MISP: 커뮤니티 IOC 공유"
      echo "→ 표준 덕에 전 세계 인텔이 한 포맷으로 흐르고, 자동 수집·연동이 가능"
      echo "stix_taxii"
    answer_detail: "STIX(표준 데이터 모델)+TAXII(교환 프로토콜). OpenCTI/MISP가 이 표준으로 인텔 수집·공유."
    verify:
      type: output_contains
      expect: 'stix_taxii'
      field: stdout
      semantic: {intent: "STIX/TAXII", success_criteria: ["표준"], acceptable_methods: ["**[표준] STIX (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 인텔 평가 — 신뢰도·TLP
      ## 💻 실행 명령
      ```bash
      echo "IOC는 신뢰도(confidence)·출처·기간으로 평가. TLP(RED/AMBER/GREEN/CLEAR)로 공유 범위 통제"
      ```
      ## ✅ 합격 기준
      신뢰도·TLP 평가가 정리되면 통과.
    hint: '신뢰도/TLP'
    category: analysis
    points: 12
    answer: |
      echo "=== 인텔 평가 (신뢰도·TLP) ==="
      echo "신뢰도: 모든 IOC가 같지 않다 — 출처·검증·최신성으로 confidence 평가(저신뢰 IOC 무차별 차단=오탐)"
      echo "유효기간: IOC는 시들해진다(악성 IP 회수 등) — 만료 관리"
      echo "TLP: RED(비공개)/AMBER(제한)/GREEN(커뮤니티)/CLEAR(공개) — 인텔 공유 범위 통제"
      echo "→ 인텔은 '많이'가 아니라 '신뢰도 높고 최신'이 핵심. 저신뢰 IOC 남발은 오탐 폭주"
      echo "intel_evaluated"
    answer_detail: "인텔 평가 = 신뢰도(confidence)+유효기간+TLP. 저신뢰 IOC 무차별 적용은 오탐 폭주 — 평가가 필수."
    verify:
      type: output_contains
      expect: 'intel_evaluated'
      field: stdout
      semantic: {intent: "인텔 평가", success_criteria: ["신뢰도/TLP"], acceptable_methods: ["**[표준] TLP (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 인텔 운영 루프
      ## 💻 실행 명령
      ```bash
      echo "수집(OpenCTI/MISP)→평가(신뢰도/TLP)→배포(CDB list/룰)→탐지→피드백(새 IOC) 순환"
      ```
      ## ✅ 합격 기준
      CTI 운영 루프가 정리되면 통과.
    hint: 'CTI 루프'
    category: report
    points: 12
    answer: |
      echo "=== 인텔 운영 루프 ==="
      echo "1) 수집: OpenCTI/MISP로 외부 피드·리포트에서 IOC/TTP 수집"
      echo "2) 평가: 신뢰도·TLP·유효기간으로 선별"
      echo "3) 배포: 고신뢰 IOC를 Wazuh CDB list·탐지룰로 자동 반영"
      echo "4) 탐지: list lookup·field-match로 매칭→격상"
      echo "5) 피드백: 탐지에서 나온 새 IOC를 인텔에 환류"
      echo "→ CTI는 일회성이 아니라 수집→평가→배포→탐지→환류 순환"
    answer_detail: "CTI 루프 = 수집(OpenCTI/MISP)→평가(신뢰도/TLP)→배포(CDB/룰)→탐지→환류. 순환적 운영."
    verify:
      type: output_contains
      expect: '순환'
      field: stdout
      semantic: {intent: "CTI 루프", success_criteria: ["수집~환류"], acceptable_methods: ["**[설명] 운영 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 CTI 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W05 CTI 보고서 (학번, 이름)
      ## 1. CTI 플랫폼·CDB list / IOC 매칭
      ## 2. STIX/TAXII·신뢰도/TLP
      ## 3. 인텔 운영 루프
      ```
      ## ✅ 합격 기준
      플랫폼 + IOC 매칭 + 운영 루프 포함.
    hint: '플랫폼+IOC+루프'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # SOC고급 W05 위협 인텔리전스(CTI) 보고서
      ## 1. 플랫폼: OpenCTI(그래프)+MISP(공유) 실가동. IOC를 Wazuh CDB list로 배포→list lookup 매칭
      ## 2. 표준: STIX(데이터)+TAXII(교환). 평가: 신뢰도·유효기간·TLP(RED~CLEAR)로 선별
      ## 3. 운영 루프: 수집→평가→배포(CDB/룰)→탐지→새 IOC 환류
      ## 결론: CTI는 외부 위협을 본 환경 탐지로 잇는 다리. 신뢰도 높은 IOC를 자동 배포·매칭하고 환류한다
      EOF
    answer_detail: "CTI 보고 = 플랫폼/CDB+IOC 매칭+STIX/TLP+운영 루프. 외부 인텔→본 환경 탐지 연결."
    verify:
      type: output_contains
      expect: 'CTI'
      field: stdout
      semantic: {intent: "CTI 보고", success_criteria: ["플랫폼/IOC/루프"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
