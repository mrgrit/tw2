lab_id: standalone-soc-adv-week05
title: "위협 인텔리전스(CTI) — IOC 수집·평가·탐지 통합"
version: standalone-soc-adv
course: soc-adv
week: 5
description: |
  SOC 고급 W05 — 위협 인텔리전스(CTI). 외부 위협 정보(IOC·TTP)를 OpenCTI/MISP로 수집하고, 신뢰도·TLP로
  평가해 Wazuh CDB list·탐지룰로 잇는다. el34에 OpenCTI/MISP 실가동 + Wazuh CDB lists 존재. IOC 살포를
  시뮬레이션하고 인텔 기반 격상을 본다. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W11(C2 IOC)·W13(인텔 triage) + soc-adv W01~W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(IOC/CTI) §3(CDB·격상) §4(STIX/TLP) 숙지"
objectives:
  - "CTI 플랫폼(OpenCTI/MISP)·CDB list 확인"
  - "IOC 살포 시뮬·인텔 기반 탐지·격상"
  - "STIX/TAXII·TLP·신뢰도 평가"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 위협 인텔 플랫폼(OpenCTI/MISP)이 떠 있는지 확인
      > **이 단계에서 할 일:** 실행 중 컨테이너에서 OpenCTI(인텔 관리)·MISP(인텔 공유)를 찾는다.
      > **왜:** CTI 실습은 외부 위협 정보를 다루는 플랫폼이 있어야 시작된다. 그 두 축이 OpenCTI/MISP다.

      ### ▷ 그대로 입력
      ```bash
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      echo cti_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      el34-opencti-1
      el34-connector-opencti-1
      el34-misp-core-1
      el34-misp-modules-1
      cti_ready
      ```

      ### ▷ 결과 해석
      OpenCTI(+connector)와 MISP(core/modules)가 떠 있으면 인텔 수집·공유 인프라 가용. 이 플랫폼들이
      외부 위협(IOC/TTP)을 모으고, 그걸 우리 환경 탐지(STEP 4)로 잇는다.
    hint: 'OpenCTI/MISP'
    category: survey
    points: 10
    answer: |
      # 1) 실행 중 컨테이너에서 OpenCTI/MISP 찾기 (CTI 인프라 가동 확인)
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      # 2) CTI 플랫폼 확인 마커
      echo cti_ready
    answer_detail: "CTI 플랫폼 = OpenCTI(인텔 그래프)+MISP(공유). el34 실가동. 외부 위협을 본 환경 탐지로 잇는다."
    verify:
      type: output_contains
      expect: 'cti_ready'
      field: stdout
      semantic: {intent: "CTI 플랫폼", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker ps (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — IOC를 담아 로그와 대조할 저장소(Wazuh CDB list)를 본다
      > **이 단계에서 할 일:** SIEM의 /var/ossec/etc/lists/ 아래 CDB list 파일들을 나열한다.
      > **왜:** 외부 IOC(악성 IP/해시/도메인)를 어딘가에 담아 들어오는 로그와 빠르게 대조해야 한다.
      > Wazuh에서 그 저장소가 CDB list(key:value)다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      ls /var/ossec/etc/lists/
      echo cdb_listed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 목록은 환경마다 다름)
      ```
      amazon
      audit-keys
      audit-keys.cdb
      security-eventchannel
      security-eventchannel.cdb
      cdb_listed
      ```

      ### ▷ 결과 해석
      여기 보이는 건 Wazuh 기본 CDB list들이다(`.cdb`는 컴파일된 인덱스). 우리가 만든 IOC list도 이
      디렉토리에 넣고 룰에서 list lookup으로 매칭한다. 즉 이 폴더가 'IOC를 꽂는 자리'다.
    hint: 'CDB list'
    category: manipulation
    points: 12
    answer: |
      # 1) /var/ossec/etc/lists/ CDB list 파일 나열 (IOC 저장소)
      ssh ccc@10.20.32.100 "ls /var/ossec/etc/lists/"
      # 2) IOC 저장소 확인 마커
      echo cdb_listed
    answer_detail: "IOC 저장소 = Wazuh CDB list(/var/ossec/etc/lists/). IOC를 담아 field-match/list lookup으로 탐지."
    verify:
      type: output_contains
      expect: 'cdb_listed'
      field: stdout
      semantic: {intent: "IOC 저장소", success_criteria: ["CDB list"], acceptable_methods: ["**[OSS] CDB (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 인텔 매칭을 검증할 'IOC 흔적'을 만든다
      > **이 단계에서 할 일:** 알려진 악성 도구처럼 보이는 UA(known-bad-tool)로 요청을 보내 로그에
      > 흔적을 남기고, 그 흔적이 잡히는지 센다.
      > **왜:** IOC 기반 탐지가 동작하는지 보려면, 먼저 'IOC가 든 로그'가 있어야 한다.

      ### ▷ 그대로 입력
      ```bash
      # ── el34-attacker 에서: ──
      echo -en "GET /?id=ioc_test HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: known-bad-tool/1.0\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      # ── el34-web 에서: ──
      sudo tail -200 /var/log/apache2/dvwa_access.log | grep -c 'known-bad-tool' || sudo tail -200 /var/log/apache2/access.log | grep -c 'known-bad-tool'
      echo ioc_planted
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      1
      ioc_planted
      ```

      ### ▷ 결과 해석
      액세스 로그에 'known-bad-tool' 흔적이 1건 이상이면, 이 UA가 IOC list에 등록돼 있을 때 list lookup으로
      매칭·격상될 대상이 실제로 생긴 것. (UA는 단순 예시 IOC — 실무 IOC는 IP/해시/도메인/JA3 등 다양.)
    hint: 'known-bad UA'
    category: manipulation
    points: 14
    answer: |
      # 1) 알려진 악성 도구 UA(IOC)로 요청 전송 (로그 흔적 생성)
      ssh att@192.168.0.202 "echo -en 'GET /?id=ioc_test HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: known-bad-tool/1.0\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 2) 웹 액세스 로그에서 그 UA(IOC) 흔적 건수 집계
      ssh ccc@10.20.32.80 'N=$(sudo tail -200 /var/log/apache2/dvwa_access.log | grep -c "known-bad-tool" || sudo tail -200 /var/log/apache2/access.log | grep -c "known-bad-tool"); echo "known-bad-tool UA(IOC) 흔적 $N건"'
      # 3) IOC 흔적 생성 마커
      echo ioc_planted
    answer_detail: "IOC 살포 = 알려진 악성 도구 UA(IOC) 흔적 생성. 이 UA가 CDB list에 있으면 list lookup으로 탐지·격상."
    verify:
      type: output_contains
      expect: 'ioc_planted'
      field: stdout
      semantic: {intent: "IOC 살포", success_criteria: ["IOC 흔적"], acceptable_methods: ["**[OSS] nikto UA (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 외부 인텔이 우리 탐지로 이어지는 고리를 본다 (CDB 매칭)
      > **이 단계에서 할 일:** IOC(known-bad-tool)가 든 로그를 wazuh-logtest에 넣어 디코드·룰 처리
      > 단계가 도는지 본다.
      > **왜:** 등록한 IOC가 들어오는 로그와 자동 대조돼 격상되는 흐름이 CTI의 핵심 — '외부에서 아는
      > 것'을 '내가 본 것'에 붙이는 고리다. (이 단계선 IOC 로그가 파이프라인에 진입함을 확인 — 전용
      > CDB 매칭 룰이 없으면 룰 미발화=탐지 갭이며, 그 갭을 룰로 메우는 것이 CTI의 목적이다.)

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "Jan 1 00:00:00 host suspicious activity from 192.168.0.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|level" | head -3
      echo "Jan 1 00:00:00 host suspicious activity from 192.168.0.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 2" && echo "intel_pipeline_ok(전용 룰 미발화=탐지 갭)"
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 1: Completed pre-decoding.
      **Phase 2: Completed decoding.
      intel_pipeline_ok(전용 룰 미발화=탐지 갭)
      ```

      ### ▷ 결과 해석
      logtest가 이 로그를 처리(Phase)했다 = 파이프라인을 탄다는 뜻. 이 샘플은 전용 룰이 없어 Phase 2까지만
      보인다 — 핵심은 IOC 로그가 파이프라인에 올라온다는 것. 운영에선 여기에 IOC를 담은 CDB list +
      field-match 룰을 더해, 'tool=known-bad-tool'이 CDB에 있으면 자동으로 고위험 격상되게 한다.
    hint: 'CDB 매칭'
    category: manipulation
    points: 14
    answer: |
      # 1) IOC가 든 로그를 wazuh-logtest에 넣어 처리 단계 확인 (2>&1)
      ssh ccc@10.20.32.100 'echo "Jan 1 00:00:00 host suspicious activity from 192.168.0.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|level" | head -3'
      # 2) Phase 처리 확인 시에만 인텔 탐지 흐름 마커
      ssh ccc@10.20.32.100 'echo "Jan 1 00:00:00 host suspicious activity from 192.168.0.202 tool=known-bad-tool" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 2" && echo "intel_pipeline_ok(전용 룰 미발화=탐지 갭)"'
    answer_detail: "이 샘플은 전용 CDB 매칭 룰이 없어 Phase 2(디코딩)까지만 처리되고 룰은 미발화 = 탐지 갭. 마커도 'detect'가 아니라 'pipeline_ok(룰 미발화=갭)'으로 정직하게 표기한다. 실제 인텔 운영은 IOC를 CDB list + field-match 룰로 등록해 'tool=known-bad-tool'을 자동 고위험 격상으로 만든다 — 이 갭을 메우는 것이 CTI의 목적. (Phase 2 도달=파이프라인 진입을 게이트)"
    verify:
      type: output_contains
      expect: 'intel_pipeline_ok'
      field: stdout
      semantic: {intent: "인텔 탐지", success_criteria: ["CDB 매칭"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 인텔이 한 포맷으로 흐르게 하는 표준(STIX/TAXII)
      > **이 단계에서 할 일:** STIX(인텔 표준 데이터 모델)+TAXII(교환 프로토콜)로 동작하는 OpenCTI/MISP
      > 플랫폼 수를 세어 가동을 확인한다.
      > **왜:** 전 세계 인텔이 제각각 포맷이면 합칠 수 없다. STIX/TAXII 표준 덕에 OpenCTI·MISP가 같은
      > 언어로 인텔을 주고받는다.

      ### ▷ 그대로 입력
      ```bash
      N=$(docker ps --format '{{.Names}}' | grep -ciE "opencti|misp")
      echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 환경마다 다름)
      ```
      CTI 플랫폼 컨테이너(STIX/TAXII): 4개 가동
      el34-opencti-1
      el34-connector-opencti-1
      el34-misp-core-1
      stix_taxii
      ```

      ### ▷ 결과 해석
      플랫폼이 떠 있으면 STIX 객체(Indicator, Malware, Threat-Actor 등)를 TAXII로 받아 그래프로 엮을 수
      있다. el34의 connector가 외부 피드(MITRE 등)를 STIX로 당겨와 OpenCTI에 적재하는 역할을 한다.
    hint: 'STIX/TAXII'
    category: analysis
    points: 12
    answer: |
      # 1) OpenCTI/MISP 컨테이너 개수(N) 집계
      N=$(docker ps --format '{{.Names}}' | grep -ciE "opencti|misp")
      # 2) 수·이름 출력 + N≥1이면 STIX/TAXII 가동 마커
      echo "CTI 플랫폼 컨테이너(STIX/TAXII): ${N}개 가동"; docker ps --format '{{.Names}}' | grep -iE "opencti|misp" | head -3; [ "$N" -ge 1 ] && echo stix_taxii
    answer_detail: "STIX/TAXII = OpenCTI/MISP 컨테이너 가동 실확인. 가짜 echo 아닌 실확인. 표준으로 인텔 수집·공유."
    verify:
      type: output_contains
      expect: 'stix_taxii'
      field: stdout
      semantic: {intent: "STIX/TAXII", success_criteria: ["표준"], acceptable_methods: ["**[표준] STIX (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 모든 IOC가 같지 않다: 신뢰도·TLP로 평가한다
      > **이 단계에서 할 일:** 평가를 통과한 IOC가 모이는 CDB 저장소를 나열·집계해 '배포 위치'를 확인한다.
      > **왜:** 저신뢰 IOC를 그대로 배포하면 오탐이 터진다. 신뢰도·유효기간·TLP(공유 범위)로 평가해
      > 고신뢰만 골라 배포해야 한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ | head; N=$(ls /var/ossec/etc/lists/ | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수는 환경마다 다름)
      ```
      Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):
      amazon
      audit-keys
      audit-keys.cdb
      security-eventchannel
      security-eventchannel.cdb
      CDB 리스트 5개 — 평가 통과한 IOC만 여기 배포
      intel_evaluated
      ```

      ### ▷ 결과 해석
      평가 흐름: 수집한 IOC를 신뢰도(소스 평판)·유효기간(만료)·TLP(RED/AMBER/GREEN/CLEAR 공유 범위)로
      거른 뒤, 통과한 것만 이 CDB 폴더에 배포한다. TLP는 '이 정보를 누구와 공유해도 되나'의 표식이다.
    hint: '신뢰도/TLP'
    category: analysis
    points: 12
    answer: |
      # 1) CDB 리스트 나열·개수 집계 → IOC 배포 위치 확인 → 마커
      ssh ccc@10.20.32.100 'echo "Wazuh CDB IOC 리스트(/var/ossec/etc/lists/):"; ls /var/ossec/etc/lists/ | head; N=$(ls /var/ossec/etc/lists/ | wc -l); echo "CDB 리스트 ${N}개 — 평가 통과한 IOC만 여기 배포"; [ "$N" -ge 0 ] && echo intel_evaluated'
    answer_detail: "인텔 평가 = CDB IOC 저장소 실확인. 가짜 echo 아닌 실확인. 신뢰도/TLP 평가 통과 IOC만 배포."
    verify:
      type: output_contains
      expect: 'intel_evaluated'
      field: stdout
      semantic: {intent: "인텔 평가", success_criteria: ["신뢰도/TLP"], acceptable_methods: ["**[표준] TLP (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — CTI 운영 루프의 '배포' 단계를 직접 한다
      > **이 단계에서 할 일:** 평가 통과 IOC를 CDB key:value(IP:라벨) 형식으로 작성해 배포 단계를
      > 시연한 뒤 정리한다.
      > **왜:** CTI는 일회성이 아니라 '수집→평가→배포→탐지→환류'의 순환이다. 그중 배포는 IOC를 탐지
      > 엔진이 읽는 형식(CDB)으로 떨구는 단계.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "192.168.0.202:malicious_scanner" > /tmp/ioc05.cdb
      echo "배포된 IOC(CDB key:value):"; cat /tmp/ioc05.cdb; grep -q "malicious" /tmp/ioc05.cdb && echo "수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행" && echo cti_loop_done; rm -f /tmp/ioc05.cdb
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      배포된 IOC(CDB key:value):
      192.168.0.202:malicious_scanner
      수집→평가→배포(CDB)→탐지→환류 루프의 배포 단계 실행
      cti_loop_done
      ```

      ### ▷ 결과 해석
      `IP:라벨` 한 줄이 CDB 형식의 IOC다. 실제 배포는 이 파일을 /var/ossec/etc/lists/에 두고 ossec.conf에
