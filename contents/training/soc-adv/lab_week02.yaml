lab_id: standalone-soc-adv-week02
title: "SIEM 상관분석 — 다벡터 공격을 복합 탐지로 묶기"
version: standalone-soc-adv
course: soc-adv
week: 2
description: |
  SOC 고급 W02 — 성숙한 SOC는 경보 1건이 아니라 여러 경보의 패턴을 본다. 같은 출처가 짧은 시간에 SQLi+XSS를
  섞어 퍼붓는 다벡터 패턴을 상관(frequency/timeframe/same_source_ip)으로 묶어 고위험 격상한다. ModSec audit·
  Wazuh alerts 실점검. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc-adv W01 + soc W01~W15 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(상관 개념) §3(상관룰) §4(ATT&CK) 숙지"
objectives:
  - "다벡터 공격 패턴 생성·식별"
  - "same_source_ip 상관으로 캠페인 묶기"
  - "복합 격상룰·오탐 예외 설계"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 대상 도달
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "상관분석 점검 대상 = el34(dvwa 차단형, ModSec→Wazuh 적재)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic: {intent: "대상", success_criteria: ["도달"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 다벡터 공격 생성 (SQLi + XSS 반복)
      ## 📖 개념 한 줄
      같은 출처에서 SQLi와 XSS를 여러 번 섞어 보내 "다벡터 캠페인" 패턴을 만든다. 개별 시도는 노이즈처럼 보여도
      묶으면 분명한 공격이다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "for i in 1 2 3; do curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user--\"; curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E\"; done; echo sent"
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '94[12]' | sort | uniq -c"
      ```
      ## ✅ 합격 기준
      ModSec audit에 942(SQLi)+941(XSS)이 함께 탐지되면 다벡터 패턴 생성됨.
      ## 🔧 도구 풀이
      - 942=SQLi, 941=XSS 룰군. 두 벡터가 같은 출처에서 반복 = 상관 대상.
    hint: '942+941'
    category: manipulation
    points: 16
    answer: |
      echo "=== 다벡터 공격 (SQLi+XSS 반복) ==="
      docker exec el34-attacker sh -c "for i in 1 2 3; do curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user--\"; curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E\"; done; echo sent"
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '94[12]' | sort | uniq -c"
      echo "→ 942(SQLi)+941(XSS) 동시 = 다벡터 캠페인 패턴"
    answer_detail: "다벡터 = 같은 출처가 SQLi(942)+XSS(941)를 반복. 개별은 노이즈, 묶으면 캠페인."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic: {intent: "다벡터 생성", success_criteria: ["942+941"], acceptable_methods: ["**[OSS] modsec (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 상관 패턴 식별 (same source IP)
      ## 📖 개념 한 줄
      상관의 핵심 축은 "같은 출처(same_source_ip)가 짧은 시간(timeframe)에 여러 번(frequency)". 출처 IP로 묶는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c '10.20.30.202' || sudo tail -400 /var/log/apache2/access.log 2>/dev/null | grep -c '10.20.30.202'"; echo corr_axis
      ```
      ## ✅ 합격 기준
      같은 출처 IP의 다수 요청이 확인되면(corr_axis) 상관 축 확보.
    hint: 'same_source_ip'
    category: analysis
    points: 12
    answer: |
      echo "=== 상관 패턴 식별 (same source) ==="
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c '10.20.30.202' || sudo tail -400 /var/log/apache2/access.log 2>/dev/null | grep -c '10.20.30.202'"; echo corr_axis
      echo "→ 같은 출처 IP의 다수 요청 = 상관 3축(same_source_ip + timeframe + frequency)의 기반"
    answer_detail: "상관 축 = same_source_ip(출처)+timeframe(시간창)+frequency(횟수). 출처 보존이 묶음의 기반."
    verify:
      type: output_contains
      expect: 'corr_axis'
      field: stdout
      semantic: {intent: "상관 축", success_criteria: ["same source"], acceptable_methods: ["**[OSS] access.log (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Wazuh 상관 데이터 확인
      ## 📖 개념 한 줄
      Wazuh가 ModSec/Suricata 로그를 모아 상관할 수 있어야 복합 격상룰이 동작한다. 웹 그룹 알림 적재를 본다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"'
      ```
      ## ✅ 합격 기준
      웹 그룹 알림 적재(web_alerts=)가 확인되면 상관 가능.
    hint: 'Wazuh 상관'
    category: manipulation
    points: 14
    answer: |
      echo "=== Wazuh 상관 데이터 ==="
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"'
      echo "→ 웹 알림 적재 = 상관룰(frequency/timeframe/if_matched_sid + same_source_ip) 입력. 복합 격상룰 id 예: 102021"
    answer_detail: "Wazuh 상관 = 웹 알림을 frequency/timeframe/same_source_ip 룰로 묶어 고위험 격상. 적재가 전제."
    verify:
      type: output_contains
      expect: 'web_alerts='
      field: stdout
      semantic: {intent: "Wazuh 상관", success_criteria: ["적재"], acceptable_methods: ["**[OSS] Wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 오탐 예외 설계 (내부 스캐너)
      ## 💻 실행 명령
      ```bash
      echo "내부 취약점 스캐너/모니터링 IP는 화이트리스트(예외룰)로 상관에서 제외 → 오탐 폭주 방지"
      ```
      ## ✅ 합격 기준
      오탐 예외 설계가 정리되면 통과.
    hint: '오탐 예외'
    category: analysis
    points: 12
    answer: |
      echo "=== 오탐 예외 (내부 스캐너) ==="
      echo "내부 정기 스캐너/헬스체크 IP는 같은 다벡터 패턴을 만들어 상관룰을 오탐시킨다"
      echo "대응: 출처 IP/UA 화이트리스트 예외룰(if_sid + srcip 제외)로 상관에서 배제"
      echo "→ 상관룰은 강력한 만큼 오탐도 증폭 — 예외 관리가 필수"
      echo "fp_exception_designed"
    answer_detail: "오탐 예외 = 내부 스캐너 화이트리스트. 상관룰은 오탐도 증폭하므로 예외 관리 필수."
    verify:
      type: output_contains
      expect: 'fp_exception_designed'
      field: stdout
      semantic: {intent: "오탐 예외", success_criteria: ["화이트리스트"], acceptable_methods: ["**[설명] 예외 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 네트워크+호스트 교차 상관
      ## 💻 실행 명령
      ```bash
      echo "웹(ModSec)+네트워크(Suricata)+호스트(osquery) 교차: 같은 출처의 SQLi→스캔→백도어를 한 사건으로"
      ```
      ## ✅ 합격 기준
      교차 상관 설계가 정리되면 통과.
    hint: '교차 상관'
    category: report
    points: 12
    answer: |
      echo "=== 네트워크+호스트 교차 상관 ==="
      echo "단일 계층 상관(웹+웹)을 넘어, 계층 간 교차 상관으로 킬체인을 재구성:"
      echo "출처 10.20.30.202: 웹 SQLi(ModSec) → 포트 스캔(Suricata) → 백도어 계정(osquery)"
      echo "→ 같은 출처/시간으로 묶으면 '정찰→침투→발판' 캠페인이 드러남"
      echo "cross_correlation"
    answer_detail: "교차 상관 = 웹+네트워크+호스트를 출처/시간으로 묶어 킬체인 재구성. 성숙한 SOC의 상관."
    verify:
      type: output_contains
      expect: 'cross_correlation'
      field: stdout
      semantic: {intent: "교차 상관", success_criteria: ["계층 간"], acceptable_methods: ["**[설명] 상관 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ATT&CK 커버리지·룰 테스트
      ## 💻 실행 명령
      ```bash
      echo "상관룰을 MITRE ATT&CK(T1190 Exploit Public-Facing App 등)에 매핑, 테스트로 발화·오탐 검증"
      ```
      ## ✅ 합격 기준
      ATT&CK 커버리지·룰 테스트가 정리되면 통과.
    hint: 'ATT&CK 커버리지'
    category: report
    points: 12
    answer: |
      echo "=== ATT&CK 커버리지·룰 테스트 ==="
      echo "상관룰 → ATT&CK 매핑: T1190(Exploit Public-Facing App), T1059(스크립트)"
      echo "룰 테스트: wazuh-logtest로 발화 확인 + 정상 트래픽으로 오탐 없음 확인"
      echo "커버리지 맵: 어떤 Tactic/Technique를 탐지하는가 → 공백 식별"
      echo "→ 상관룰은 만들고 끝이 아니라 ATT&CK 커버리지로 관리·검증"
    answer_detail: "ATT&CK 커버리지 = 상관룰을 Technique에 매핑해 공백 관리 + logtest 룰 검증."
    verify:
      type: output_contains
      expect: 'ATT&CK'
      field: stdout
      semantic: {intent: "ATT&CK 커버리지", success_criteria: ["매핑/테스트"], acceptable_methods: ["**[표준] ATT&CK (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SIEM 상관분석 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W02 상관분석 보고서 (학번, 이름)
      ## 1. 다벡터 패턴(SQLi+XSS, same source)
      ## 2. 상관룰(frequency/timeframe)·오탐 예외
      ## 3. 교차 상관·ATT&CK 커버리지
      ```
      ## ✅ 합격 기준
      다벡터 + 상관룰 + 커버리지 포함.
    hint: '다벡터+상관룰+커버리지'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # SOC고급 W02 상관분석 보고서
      ## 1. 다벡터: 같은 출처(10.20.30.202)가 SQLi(942)+XSS(941) 반복 → 캠페인 패턴
      ## 2. 상관룰: same_source_ip+frequency+timeframe로 묶어 고위험 격상. 내부 스캐너 화이트리스트 예외
      ## 3. 교차 상관: 웹+네트워크+호스트를 출처/시간으로 킬체인 재구성. ATT&CK(T1190) 커버리지+logtest 검증
      ## 결론: 성숙한 SOC는 경보 1건이 아니라 패턴을 본다. 상관룰로 다벡터 캠페인을 한 사건으로 격상
      EOF
    answer_detail: "상관 보고 = 다벡터 패턴+상관룰/예외+교차상관/ATT&CK. 패턴 탐지가 성숙의 핵심."
    verify:
      type: output_contains
      expect: '상관'
      field: stdout
      semantic: {intent: "상관 보고", success_criteria: ["다벡터/상관룰/커버리지"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
