    instruction: |
      ## STEP 7 — 룰이 실제로 발화하는지 검증하고 ATT&CK에 매핑한다 (커버리지)
      > **이 단계에서 할 일:** 샘플 로그 한 줄을 wazuh-logtest에 넣어 디코딩→룰 발화(Phase 1~3)를
      > 직접 보고, 탐지된 기법을 ATT&CK Technique에 매핑한다.
      > **왜:** "우리가 어느 공격 기법을 탐지하는가"(커버리지)를 관리하려면, 룰이 진짜 발화하는지
      > 검증하고 그 룰을 ATT&CK 번호로 분류해 둬야 한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 192.168.0.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "ATT&CK T1110 매핑(SSH 무차별 대입) 룰 발화 검증"
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 1: Completed pre-decoding.
      **Phase 2: Completed decoding.
              srcip: '192.168.0.202'
      **Phase 3: Completed filtering (rules).
      ATT&CK T1110 매핑(SSH 무차별 대입) 룰 발화 검증
      ```
      Phase 3까지 갔다 = 디코더가 필드(srcip)를 뽑고, 그 위에서 룰이 발화했다는 뜻.

      ### ▷ 결과 해석
      wazuh-logtest는 라이브 SIEM을 건드리지 않고 '이 로그가 어느 룰을 깨우나'를 단계별로 보여준다 →
      룰 커버리지 검증 도구. ATT&CK 매핑은 탐지 기법별로 붙인다: 이번 주 SQLi 같은 웹 익스플로잇은
      **T1190(Exploit Public-Facing Application)**, 위 샘플처럼 SSH 무차별 대입은 **T1110(Brute Force)**.
      (샘플로 SSH 로그를 쓴 건 룰 5760이 안정적으로 발화해 검증이 쉽기 때문 — 매핑 번호는 탐지된 실제
      기법에 맞춰 분류한다.)
