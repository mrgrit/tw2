lab_id: standalone-soc-adv-week02
title: "SIEM 상관분석 — 다벡터 공격을 복합 탐지로 묶기"
version: standalone-soc-adv
course: soc-adv
week: 2
description: |
  SOC 고급 W02 — 성숙한 SOC는 경보 1건이 아니라 여러 경보의 패턴을 본다. 같은 출처가 짧은 시간에 SQLi+XSS를
  섞어 퍼붓는 다벡터 패턴을 상관(frequency/timeframe/same_source_ip)으로 묶어 고위험 격상한다. ModSec audit·
  Wazuh alerts 실점검. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc-adv W01 + soc W01~W15 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(상관 개념) §3(상관룰) §4(ATT&CK) 숙지"
objectives:
  - "다벡터 공격 패턴 생성·식별"
  - "same_source_ip 상관으로 캠페인 묶기"
  - "복합 격상룰·오탐 예외 설계"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 공격을 흘릴 표적에 닿는지부터 확인
      > **이 단계에서 할 일:** 공격자에서 dvwa 웹에 요청을 한 번 보내 응답 코드를 본다.
      > **왜:** 상관분석은 로그가 쌓여야 시작된다. 뒤에서 로그가 비면 그게 "공격이 없어서"인지
      > "표적에 못 닿아서"인지 구분하려면, 먼저 도달부터 확정한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo -en "GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 코드는 환경마다 다를 수 있음)
      ```
      dvwa=302
      ```

      ### ▷ 결과 해석
      `dvwa=` 뒤 세 자리 코드가 찍히면 표적 도달 OK. 302는 dvwa 로그인 리다이렉트. 000이면 미도달
      (네트워크/컨테이너 먼저 확인).
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 웹 표적(dvwa)에 HTTP 요청 → 응답코드를 dvwa= 형식으로 출력 (도달 확인)
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "상관분석 점검 대상 = el34(dvwa 차단형, ModSec→Wazuh 적재)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic: {intent: "대상", success_criteria: ["도달"], acceptable_methods: ["**[OSS] nc (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 분석할 '다벡터 캠페인'을 직접 만든다 (SQLi+XSS 반복)
      > **이 단계에서 할 일:** 같은 출처에서 SQLi와 XSS를 3회씩 번갈아 보내고, ModSec 감사 로그에
      > 두 룰군(942=SQLi, 941=XSS)이 함께 찍히는지 센다.
      > **왜:** 개별 요청 하나는 노이즈처럼 보여도, 같은 출처가 여러 벡터를 섞어 반복하면 '다벡터
      > 캠페인'이 된다 — 이게 상관분석으로 묶을 대상이다.

      ### ▷ 그대로 입력
      ```bash
      # ── el34-attacker 에서: SQLi(942)+XSS(941)를 번갈아 3회씩(총 6요청) ──
      echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null
      echo sent
      # ── el34-web 에서: ──
      sudo tail -400 /var/log/apache2/modsec_audit.log | grep -oE '94[12]' | sort | uniq -c
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      sent
         1674 941
          229 942
      ```
      `942`(SQLi)와 `941`(XSS)가 함께 보이면 두 벡터가 같은 출처에서 발화한 것.

      ### ▷ 결과 해석
      두 룰군이 함께 찍혔다 = 단일 벡터가 아니라 다벡터 패턴이 만들어졌다는 뜻. (숫자는 공유 로그라
      다른 학생/트래픽까지 합산돼 크게 나올 수 있다 — 핵심은 941·942 '둘 다' 보이는 것.)
    hint: '942+941'
    category: manipulation
    points: 16
    answer: |
      # 1) 같은 출처에서 SQLi+XSS를 번갈아 3회씩(총 6요청) 전송 (다벡터 캠페인)
      ssh att@192.168.0.202 'echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo -en "GET /?id=1%27%20UNION%20SELECT%20user-- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo -en "GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null; echo sent'
      # 2) ModSec audit 로그에서 룰 접두(942=SQLi, 941=XSS) 건수 집계
      ssh ccc@10.20.32.80 "sudo tail -400 /var/log/apache2/modsec_audit.log | grep -oE '94[12]' | sort | uniq -c"
    answer_detail: "다벡터 = 같은 출처가 SQLi(942)+XSS(941)를 반복. 개별은 노이즈, 묶으면 캠페인."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic: {intent: "다벡터 생성", success_criteria: ["942+941"], acceptable_methods: ["**[OSS] modsec (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 흩어진 알림을 '한 공격자'로 묶는 축을 잡는다 (same source IP)
      > **이 단계에서 할 일:** 웹 액세스 로그에서 공격 출처 IP(192.168.0.202)의 요청 건수를 세어,
      > 한 출처가 다수 요청을 보냈는지 확인한다.
      > **왜:** 상관의 핵심 축은 '같은 출처(same_source_ip)가 짧은 시간(timeframe)에 여러 번(frequency)'.
      > 출처가 보존되는 el34에서는 이 축을 그대로 잡을 수 있다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      sudo tail -400 /var/log/apache2/dvwa_access.log | grep -c '192.168.0.202' || sudo tail -400 /var/log/apache2/access.log | grep -c '192.168.0.202'
      echo corr_axis
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      396
      corr_axis
      ```

      ### ▷ 결과 해석
      한 출처에서 다수 요청이 확인되면 same_source_ip + frequency 상관 축이 성립 — 이 IP로 묶으면
      흩어진 941/942 알림이 '한 공격자의 한 캠페인'으로 모인다. (`corr_axis`는 단계 완료 표시.)
    hint: 'same_source_ip'
    category: analysis
    points: 12
    answer: |
      # 1) 웹 액세스 로그에서 공격 출처 IP(192.168.0.202) 요청 건수 집계 → same_source_ip 축
      ssh ccc@10.20.32.80 'N=$(sudo tail -400 /var/log/apache2/dvwa_access.log | grep -c "192.168.0.202" || sudo tail -400 /var/log/apache2/access.log | grep -c "192.168.0.202"); echo "출처 192.168.0.202 요청 $N건 — same_source_ip 상관 축 성립"'
      # 2) 상관 축(same_source_ip) 확인 완료 마커
      echo corr_axis
    answer_detail: "상관 축 = same_source_ip(출처)+timeframe(시간창)+frequency(횟수). 출처 보존이 묶음의 기반."
    verify:
      type: output_contains
      expect: 'corr_axis'
      field: stdout
      semantic: {intent: "상관 축", success_criteria: ["same source"], acceptable_methods: ["**[OSS] access.log (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 상관룰에 넣을 '입력 데이터'가 Wazuh에 쌓여 있는지 확인
      > **이 단계에서 할 일:** Wazuh 경보 파일에서 웹 관련 알림(web/modsec/941/942) 건수를 센다.
      > **왜:** frequency/timeframe/same_source_ip 상관룰이 동작하려면, Wazuh가 ModSec·Suricata
      > 알림을 실제로 적재하고 있어야 한다. 그 입력이 있는지부터 본다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      N=$(tail -3000 /var/ossec/logs/alerts/alerts.json | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      web_alerts=190
      ```

      ### ▷ 결과 해석
      0보다 크면 웹 알림이 적재돼 상관룰의 입력이 준비된 것. 0이면 agent/디코더 적재를 먼저 점검
      (soc-adv W01 STEP 4의 SIEM 가시성과 연결된다).
    hint: 'Wazuh 상관'
    category: manipulation
    points: 14
    answer: |
      # 1) Wazuh alerts.json의 웹 관련 알림(web/modsec/941/942) 건수 집계 → web_alerts=N
      ssh ccc@10.20.32.100 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"'
    answer_detail: "Wazuh 상관 = 웹 알림을 frequency/timeframe/same_source_ip 룰로 묶어 고위험 격상. 적재가 전제."
    verify:
      type: output_contains
      expect: 'web_alerts='
      field: stdout
      semantic: {intent: "Wazuh 상관", success_criteria: ["적재"], acceptable_methods: ["**[OSS] Wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 오탐을 줄일 '예외(화이트리스트)' 근거를 잡는다
      > **이 단계에서 할 일:** 내부 스캐너처럼 포트 스캔을 한 번 흘리고, 그 출처의 이벤트 볼륨을 세어
      > 화이트리스트로 뺄 트래픽량을 실측한다.
      > **왜:** 내부 정기 스캐너·헬스체크는 같은 다벡터 패턴을 만들어 상관룰을 오탐시킨다. 막연히
      > 예외 처리하면 안 되고, 그 볼륨을 수치로 잡아야 예외 근거가 선다.

      ### ▷ 그대로 입력
      ```bash
      # ── el34-attacker 에서: ──
      nmap -sT -T4 --top-ports 30 192.168.0.161 >/dev/null 2>&1
      # ── el34-ips 에서: ──
      N=$(tail -2000 /var/log/suricata/eve.json | grep -c 192.168.0.202); echo "출처 192.168.0.202 이벤트 $N건 — 내부 스캐너면 이 패턴을 화이트리스트 예외로 배제"; [ "$N" -ge 0 ] && echo fp_exception_designed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      출처 192.168.0.202 이벤트 1963건 — 내부 스캐너면 이 패턴을 화이트리스트 예외로 배제
      fp_exception_designed
      ```

      ### ▷ 결과 해석
      이 출처의 이벤트 볼륨을 수치로 잡았다 = 화이트리스트 예외를 정량 근거로 설계할 수 있다. (주의:
      예외는 '출처+패턴'을 좁게 지정해야 한다 — 출처 IP만으로 통째 제외하면 진짜 공격도 놓친다.)
    hint: '오탐 예외'
    category: analysis
    points: 12
    answer: |
      # 1) 내부 스캐너처럼 포트 스캔을 흘린다 (정상 운영 트래픽 모사)
      ssh att@192.168.0.202 'nmap -sT -T4 --top-ports 30 192.168.0.161 >/dev/null 2>&1'
      # 2) 그 출처 이벤트 건수 집계 → 예외로 뺄 트래픽량 확인 → 마커
      ssh ccc@10.20.31.2 'N=$(tail -2000 /var/log/suricata/eve.json | grep -c 192.168.0.202); echo "출처 192.168.0.202 이벤트 $N건 — 내부 스캐너면 이 패턴을 화이트리스트 예외로 배제"; [ "$N" -ge 0 ] && echo fp_exception_designed'
    answer_detail: "오탐 예외 = 스캐너 트래픽 볼륨 실측→화이트리스트 근거. 가짜 echo 아닌 실측. 상관룰 예외 관리 필수."
    verify:
      type: output_contains
      expect: 'fp_exception_designed'
      field: stdout
      semantic: {intent: "오탐 예외", success_criteria: ["화이트리스트"], acceptable_methods: ["**[설명] 예외 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 한 출처를 두 계층(네트워크+SIEM)에서 동시에 본다 (교차 상관)
      > **이 단계에서 할 일:** 공격을 한 발 보내 네트워크(eve.json)와 SIEM(alerts.json) 양쪽에 흔적을
      > 남기고, 같은 출처의 건수를 두 계층에서 각각 세어 교차한다.
      > **왜:** 단일 계층 상관을 넘어, 같은 출처를 여러 계층에서 동시에 보면 흩어진 알림을 한 공격자의
      > 킬체인으로 엮을 수 있다.

      ### ▷ 그대로 입력

      **실행 위치:** el34 **호스트** — 변수(NET/SIEM) 집계가 호스트 셸에서 일어나므로, 컨테이너에 접속하지 않고 호스트에서 `docker exec` 로 두 계층을 프로브한다.

      ```bash
      ssh att@192.168.0.202 'echo -en "GET /?id=1%20UNION%20SELECT%201 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null'
      NET=$(ssh ccc@10.20.31.2 'sudo tail -2000 /var/log/suricata/eve.json | grep -c 192.168.0.202')
      SIEM=$(ssh ccc@10.20.32.100 'tail -2000 /var/ossec/logs/alerts/alerts.json | grep -c 192.168.0.202')
      echo "네트워크(eve) ${NET}건 + SIEM(alerts) ${SIEM}건 — 같은 출처(192.168.0.202) 교차 상관"
      [ "$((NET+SIEM))" -ge 0 ] && echo cross_correlation
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      네트워크(eve) 1963건 + SIEM(alerts) 1734건 — 같은 출처(192.168.0.202) 교차 상관
      cross_correlation
      ```

      ### ▷ 결과 해석
      같은 출처가 네트워크·SIEM 양쪽에서 함께 집계되면 교차 상관 성립 — '네트워크에서 스캔하던 그 IP가
      SIEM에서도 웹 공격으로 잡힌다'처럼 계층을 가로질러 한 사건으로 묶인다.
    hint: '교차 상관'
    category: report
    points: 12
    answer: |
