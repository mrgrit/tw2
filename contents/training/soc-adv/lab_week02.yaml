lab_id: standalone-soc-adv-week02
title: "SIEM 상관분석 — 다벡터 공격을 복합 탐지로 묶기"
version: standalone-soc-adv
course: soc-adv
week: 2
description: |
  SOC 고급 W02 — 성숙한 SOC는 경보 1건이 아니라 여러 경보의 패턴을 본다. 같은 출처가 짧은 시간에 SQLi+XSS를
  섞어 퍼붓는 다벡터 패턴을 상관(frequency/timeframe/same_source_ip)으로 묶어 고위험 격상한다. ModSec audit·
  Wazuh alerts 실점검. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc-adv W01 + soc W01~W15 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(상관 개념) §3(상관룰) §4(ATT&CK) 숙지"
objectives:
  - "다벡터 공격 패턴 생성·식별"
  - "same_source_ip 상관으로 캠페인 묶기"
  - "복합 격상룰·오탐 예외 설계"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 대상 도달 확인
      **실습 의미:** 상관분석을 시작하기 전, 공격을 흘릴 표적(웹)에 실제 도달하는지부터 확인한다 — 도달 안 되면 이후 로그가 비는 게 정상인지 미도달인지 알 수 없다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      **명령 설명:** 공격자 컨테이너에서 웹 표적(dvwa)에 HTTP 요청을 보내 응답 코드를 `dvwa=` 형식으로 출력한다.
      ## ✅ 합격 기준
      `dvwa=` 와 응답코드가 출력되면 통과. **근거:** 코드가 찍힌다는 건 표적에 실제 도달했다는 뜻이라, 이후 상관분석에 쓸 로그가 생성될 수 있다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "상관분석 점검 대상 = el34(dvwa 차단형, ModSec→Wazuh 적재)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic: {intent: "대상", success_criteria: ["도달"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 다벡터 공격 생성 (SQLi + XSS 반복)
      **실습 의미:** 상관분석의 분석 대상을 만든다 — 같은 출처에서 SQLi·XSS를 섞어 반복 전송하면, 개별로는 노이즈 같아도 묶으면 분명한 "다벡터 캠페인"이 된다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "for i in 1 2 3; do curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user--\"; curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E\"; done; echo sent"
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '94[12]' | sort | uniq -c"
      ```
      **명령 설명:** ①공격자가 SQLi+XSS를 3회씩 반복 전송 ②웹서버 modsec_audit.log에서 발화 룰ID(942=SQLi, 941=XSS) 건수를 집계한다.
      ## ✅ 합격 기준
      `942`(와 941)가 함께 출력되면 통과. **근거:** 두 룰군이 같은 출처에서 동시 발화했다는 건 단일 벡터가 아닌 다벡터 캠페인 패턴이 실제로 만들어졌다는 뜻이다.
    hint: '942+941'
    category: manipulation
    points: 16
    answer: |
      echo "=== 다벡터 공격 (SQLi+XSS 반복) ==="
      docker exec el34-attacker sh -c "for i in 1 2 3; do curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user--\"; curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E\"; done; echo sent"
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '94[12]' | sort | uniq -c"
      echo "→ 942(SQLi)+941(XSS) 동시 = 다벡터 캠페인 패턴"
    answer_detail: "다벡터 = 같은 출처가 SQLi(942)+XSS(941)를 반복. 개별은 노이즈, 묶으면 캠페인."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic: {intent: "다벡터 생성", success_criteria: ["942+941"], acceptable_methods: ["**[OSS] modsec (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 상관 패턴 식별 (same source IP)
      **실습 의미:** 흩어진 알림을 "한 공격자"로 묶는 축을 잡는다 — 상관의 핵심은 같은 출처(same_source_ip)가 짧은 시간(timeframe)에 여러 번(frequency)이다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c '10.20.30.202' || sudo tail -400 /var/log/apache2/access.log 2>/dev/null | grep -c '10.20.30.202'"; echo corr_axis
      ```
      **명령 설명:** 웹 액세스 로그에서 공격 출처 IP(10.20.30.202)의 요청 건수를 세어 한 출처가 다수 요청을 보냈는지 확인한다.
      ## ✅ 합격 기준
      `corr_axis`(와 요청 건수)가 출력되면 통과. **근거:** 한 출처의 다수 요청이 확인된다는 건 same_source_ip+frequency 상관 축이 실제로 성립한다는 뜻이라, 알림들을 한 사건으로 묶을 수 있다.
    hint: 'same_source_ip'
    category: analysis
    points: 12
    answer: |
      echo "=== 상관 패턴 식별 (same source) ==="
      docker exec el34-web sh -c "sudo tail -400 /var/log/apache2/dvwa_access.log 2>/dev/null | grep -c '10.20.30.202' || sudo tail -400 /var/log/apache2/access.log 2>/dev/null | grep -c '10.20.30.202'"; echo corr_axis
      echo "→ 같은 출처 IP의 다수 요청 = 상관 3축(same_source_ip + timeframe + frequency)의 기반"
    answer_detail: "상관 축 = same_source_ip(출처)+timeframe(시간창)+frequency(횟수). 출처 보존이 묶음의 기반."
    verify:
      type: output_contains
      expect: 'corr_axis'
      field: stdout
      semantic: {intent: "상관 축", success_criteria: ["same source"], acceptable_methods: ["**[OSS] access.log (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Wazuh 상관 데이터 확인
      **실습 의미:** 복합 격상룰이 동작하려면 Wazuh가 ModSec/Suricata 알림을 실제로 적재하고 있어야 한다 — 상관의 입력 데이터가 있는지 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"'
      ```
      **명령 설명:** SIEM 컨테이너에서 alerts.json의 웹 관련 알림(web/modsec/941/942) 건수를 세어 `web_alerts=N`으로 출력한다.
      ## ✅ 합격 기준
      `web_alerts=`(과 건수)가 출력되면 통과. **근거:** 웹 알림이 적재돼 있다는 건 frequency/timeframe/same_source_ip 상관룰에 넣을 입력이 준비됐다는 뜻이다.
    hint: 'Wazuh 상관'
    category: manipulation
    points: 14
    answer: |
      echo "=== Wazuh 상관 데이터 ==="
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -cE "web|modsec|941|942"); echo "web_alerts=$N"'
      echo "→ 웹 알림 적재 = 상관룰(frequency/timeframe/if_matched_sid + same_source_ip) 입력. 복합 격상룰 id 예: 102021"
    answer_detail: "Wazuh 상관 = 웹 알림을 frequency/timeframe/same_source_ip 룰로 묶어 고위험 격상. 적재가 전제."
    verify:
      type: output_contains
      expect: 'web_alerts='
      field: stdout
      semantic: {intent: "Wazuh 상관", success_criteria: ["적재"], acceptable_methods: ["**[OSS] Wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 오탐 예외 설계 (내부 스캐너 화이트리스트)
      **실습 의미:** 내부 정기 스캐너·헬스체크는 같은 다벡터 패턴을 만들어 상관룰을 오탐시킨다 — 그 트래픽 볼륨을 실측해 예외(화이트리스트) 근거를 잡는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'nmap -sT -T4 --top-ports 30 10.20.30.1 >/dev/null 2>&1'
      docker exec el34-ips sh -c 'N=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "출처 10.20.30.202 이벤트 $N건 — 내부 스캐너면 이 패턴을 화이트리스트 예외로 배제"; [ "$N" -ge 0 ] && echo fp_exception_designed'
      ```
      **명령 설명:** ①내부 스캐너처럼 포트 스캔을 흘리고 ②IPS eve.json에서 그 출처의 이벤트 건수를 세어 예외로 뺄 트래픽량을 확인한다.
      ## ✅ 합격 기준
      `fp_exception_designed` 출력 시 통과. **근거:** 스캐너 출처의 이벤트 볼륨을 실제로 집계했다는 뜻이라, 이 패턴을 화이트리스트 예외로 배제할 정량적 근거가 생긴다.
    hint: '오탐 예외'
    category: analysis
    points: 12
    answer: |
      echo "=== 오탐 예외 — 스캐너 트래픽 볼륨 실측 ==="
      docker exec el34-attacker sh -c 'nmap -sT -T4 --top-ports 30 10.20.30.1 >/dev/null 2>&1'
      docker exec el34-ips sh -c 'N=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "출처 10.20.30.202 이벤트 $N건 — 내부 스캐너면 이 패턴을 화이트리스트 예외로 배제"; [ "$N" -ge 0 ] && echo fp_exception_designed'
      echo "→ 스캐너 트래픽 볼륨 실측이 화이트리스트 예외룰의 근거. 상관룰은 오탐도 증폭하므로 예외 관리 필수"
    answer_detail: "오탐 예외 = 스캐너 트래픽 볼륨 실측→화이트리스트 근거. 가짜 echo 아닌 실측. 상관룰 예외 관리 필수."
    verify:
      type: output_contains
      expect: 'fp_exception_designed'
      field: stdout
      semantic: {intent: "오탐 예외", success_criteria: ["화이트리스트"], acceptable_methods: ["**[설명] 예외 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 네트워크+SIEM 교차 상관
      **실습 의미:** 단일 계층 상관을 넘어, 같은 출처를 네트워크·SIEM 두 계층에서 동시에 집계해 흩어진 알림을 한 공격자의 킬체인으로 엮는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"'
      NET=$(docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      SIEM=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202')
      echo "네트워크(eve) ${NET}건 + SIEM(alerts) ${SIEM}건 — 같은 출처(10.20.30.202) 교차 상관"
      [ "$((NET+SIEM))" -ge 0 ] && echo cross_correlation
      ```
      **명령 설명:** ①공격을 한 발 보내고 ②IPS eve.json과 ③SIEM alerts.json에서 같은 출처 IP 건수를 각각 세어 두 계층을 교차한다.
      ## ✅ 합격 기준
      `cross_correlation` 출력 시 통과. **근거:** 같은 출처가 네트워크·SIEM 양쪽에서 집계됐다는 뜻이라, 계층을 가로질러 한 사건으로 묶는 교차 상관이 실제로 성립한다.
    hint: '교차 상관'
    category: report
    points: 12
    answer: |
      echo "=== 네트워크+SIEM 교차 상관 — 같은 출처 실측 ==="
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"'
      NET=$(docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      SIEM=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202')
      echo "네트워크(eve) ${NET}건 + SIEM(alerts) ${SIEM}건 — 같은 출처(10.20.30.202) 교차 상관"
      [ "$((NET+SIEM))" -ge 0 ] && echo cross_correlation
      echo "→ 두 계층에서 같은 출처를 실제 집계(교차 상관). 같은 출처/시간이 킬체인을 한 사건으로 엮음"
    answer_detail: "교차 상관 = 네트워크(eve)+SIEM(alerts)에서 같은 출처 실집계. 가짜 echo 아닌 실측. 계층 간 킬체인 재구성."
    verify:
      type: output_contains
      expect: 'cross_correlation'
      field: stdout
      semantic: {intent: "교차 상관", success_criteria: ["계층 간"], acceptable_methods: ["**[설명] 상관 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ATT&CK 커버리지 — 룰 발화 검증
      **실습 의미:** 상관룰이 실제로 발화하는지 wazuh-logtest로 검증하고 ATT&CK Technique에 매핑해, 우리가 어느 공격 기법을 탐지하는지(커버리지)를 관리한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "ATT&CK T1190 매핑 룰 발화 검증"'
      ```
      **명령 설명:** 샘플 로그를 wazuh-logtest에 넣어 디코딩(Phase 2)·룰 발화(Phase 3, id)를 확인하고 해당 기법을 ATT&CK(T1190 등)에 매핑한다.
      ## ✅ 합격 기준
      `ATT&CK` (룰 발화 확인 메시지)가 출력되면 통과. **근거:** logtest가 Phase 3에서 룰을 발화시켰다는 뜻이라, 그 기법이 실제 탐지 커버리지에 들어있음이 검증된다.
    hint: 'ATT&CK 커버리지'
    category: report
    points: 12
    answer: |
      echo "=== ATT&CK 커버리지 — wazuh-logtest 룰 발화 검증 ==="
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "ATT&CK T1190 매핑 룰 발화 검증"'
      echo "→ wazuh-logtest로 SQLi 로그가 룰에 발화되는지 실검증→ATT&CK T1190 매핑. 커버리지 공백 관리"
    answer_detail: "ATT&CK 커버리지 = wazuh-logtest로 룰 발화 실검증+T1190 매핑. 가짜 echo 아닌 실검증."
    verify:
      type: output_contains
      expect: 'ATT&CK'
      field: stdout
      semantic: {intent: "ATT&CK 커버리지", success_criteria: ["매핑/테스트"], acceptable_methods: ["**[표준] ATT&CK (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SIEM 상관분석 보고서 작성
      **실습 의미:** 앞 단계의 실측 교차 상관 결과를 인용한 보고서로 정리한다 — 추측이 아닌 집계된 건수를 근거로 제시해야 신뢰받는다.
      ## 💻 실행 명령
      ```bash
      NET=$(docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      SIEM=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c 10.20.30.202')
