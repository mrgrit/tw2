lab_id: standalone-soc-adv-week10
title: "SOAR — 플레이북으로 탐지 대응을 자동화한다"
version: standalone-soc-adv
course: soc-adv
week: 10
description: |
  SOC 고급 W10 — SOAR(보안 오케스트레이션·자동 대응). 반복적 탐지 대응을 플레이북으로 자동화한다.
  el34 Wazuh active-response(firewall-drop·host-deny·disable-account)를 실제 SOAR 액션으로 확인하고,
  트리거→보강→판단→실행→사람검토의 플레이북을 설계한다. el34-siem Wazuh AR 사용(읽기 전용, 실차단 미발동).
  인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh 탐지/격상)·soc-adv W05(CTI 보강) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SOAR 구성요소) §3(플레이북) §4(사람검토) 숙지"
objectives:
  - "SOAR의 가치(반복 대응 자동화·MTTR 단축) 설명"
  - "Wazuh active-response를 SOAR 액션으로 활용"
  - "플레이북 설계(트리거→보강→판단→실행→검토)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 SOAR 엔진 확인
      **실습 의미:** el34의 SOAR 실행 엔진은 Wazuh active-response다(알림에 반응해 자동 액션 실행) — 먼저 그 액션 스크립트가 있는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # SOAR 실행 엔진 = active-response/bin 의 자동 액션 스크립트 개수를 센다
        N=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l)
        echo "active-response 액션 ${N}개"
        # 액션 스크립트가 1개 이상이면 SOAR 엔진 준비 마커
        [ "$N" -ge 1 ] && echo soar_ready
      '
      ```
      ## ✅ 합격 기준
      `soar_ready`(과 액션 수)가 출력되면 통과. **근거:** 마커는 active-response 액션이 실제 존재할 때만 찍히므로, 자동 대응 실행 엔진이 가용함을 뜻한다.
    hint: 'active-response'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c '
        # active-response/bin 액션 스크립트 개수 집계
        N=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l)
        echo "active-response 액션 ${N}개"
        # 1개 이상이면 SOAR 엔진 준비 마커
        [ "$N" -ge 1 ] && echo soar_ready
      '
    answer_detail: "SOAR 실행 엔진 = Wazuh active-response/bin/(자동 액션 스크립트 모음). 알림 트리거로 실행."
    verify:
      type: output_contains
      expect: 'soar_ready'
      field: stdout
      semantic: {intent: "SOAR 엔진", success_criteria: ["active-response"], acceptable_methods: ["**[OSS] Wazuh AR (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SOAR 액션 카탈로그
      **실습 의미:** 플레이북이 호출하는 실제 액션을 확인한다 — firewall-drop(IP 차단)·host-deny(hosts.deny)·disable-account(계정 잠금) 등.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 플레이북이 호출하는 핵심 차단/격리 액션이 실제 있는지 확인한다
        ls /var/ossec/active-response/bin/ | grep -E "firewall-drop|host-deny|disable-account"
      '
      ```
      ## ✅ 합격 기준
      `firewall-drop`(과 다른 액션)이 출력되면 통과. **근거:** 차단 액션 스크립트가 실제 나열됐다는 건 플레이북의 '실행' 단계가 호출할 자동 대응이 갖춰졌다는 뜻이다.
    hint: '액션 카탈로그'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 차단/격리 액션(firewall-drop·host-deny·disable-account) 존재 확인
        ls /var/ossec/active-response/bin/ | grep -E "firewall-drop|host-deny|disable-account"
      '
    answer_detail: "액션 카탈로그 = firewall-drop(IP차단)·host-deny·disable-account. 플레이북이 호출하는 자동 대응."
    verify:
      type: output_contains
      expect: 'firewall-drop'
      field: stdout
      semantic: {intent: "액션 카탈로그", success_criteria: ["차단 액션"], acceptable_methods: ["**[OSS] AR bin (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 트리거 정의 (command 등록)
      **실습 의미:** ossec.conf의 <command>가 SOAR 액션을 등록하고 <active-response>가 트리거 조건(룰/레벨)에 묶는다 — 알림→자동 대응의 연결고리를 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # ossec.conf의 <command>에 등록된 SOAR 액션 이름을 확인한다
        grep -E "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf | head
        # command 등록이 실제 확인되면 마커
        grep -qE "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf && echo triggers_defined
      '
      ```
      ## ✅ 합격 기준
      `triggers_defined`(과 command 이름)이 출력되면 통과. **근거:** 마커는 ossec.conf에 액션 command가 실제 등록돼 있을 때만 찍히므로, 알림→자동 대응 트리거가 정의됐음을 뜻한다.
    hint: 'command 등록'
    category: manipulation
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # ossec.conf <command>에 등록된 액션 이름 확인
        grep -E "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf | head
        # command 등록 확인 시 마커
        grep -qE "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf && echo triggers_defined
      '
    answer_detail: "트리거 정의 = ossec.conf <command>(액션 등록)+<active-response>(룰/레벨 트리거). 자동화 연결고리."
    verify:
      type: output_contains
      expect: 'triggers_defined'
      field: stdout
      semantic: {intent: "트리거 정의", success_criteria: ["command 등록"], acceptable_methods: ["**[OSS] ossec.conf (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 플레이북 설계 (실행 액션 확인)
      **실습 의미:** 플레이북은 트리거→보강(CTI)→판단→실행(AR 액션)→검토의 5단계로 표준 대응을 코드화한다 — 그 '실행' 단계가 호출할 AR 액션을 실제로 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 플레이북 실행 단계가 호출할 AR 액션 목록을 확인한다
        echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head
        # 사용 가능 액션 수를 세어 플레이북 5단계의 실행 재료를 확보 → 1개 이상이면 마커
        A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계(트리거→보강→판단→실행→검토)의 실행 재료"
        [ "$A" -ge 1 ] && echo playbook_designed
      '
      ```
      ## ✅ 합격 기준
      `playbook_designed`(과 액션 수)가 출력되면 통과. **근거:** 마커는 실행에 쓸 AR 액션을 실제 확인했을 때만 찍히므로, 플레이북 5단계의 실행 재료가 갖춰졌음을 뜻한다.
    hint: '플레이북'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 플레이북 실행 액션 목록 확인
        echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head
        # 사용 가능 액션 수 집계 → 1개 이상이면 마커
        A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계의 실행 재료"
        [ "$A" -ge 1 ] && echo playbook_designed
      '
    answer_detail: "플레이북 = AR 실행 액션 카탈로그 실확인. 가짜 echo 아닌 실확인. 5단계 표준 대응 코드화."
    verify:
      type: output_contains
      expect: 'playbook_designed'
      field: stdout
      semantic: {intent: "플레이북", success_criteria: ["5단계"], acceptable_methods: ["**[관리적] 플레이북 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 자동 대응 드라이런 (매핑 확인)
      **실습 의미:** 실차단을 발동하지 않고 ossec.conf의 트리거→액션 매핑만 검증한다 — 실차단은 검증 후 단계적으로 활성(처음엔 알림-only)해 오차단을 막는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 실차단 없이 ossec.conf의 트리거→액션 매핑만 확인한다 (드라이런)
        echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head
        echo "매핑 예: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그(실차단 미발동)"
        # 매핑이 실제 존재하면 드라이런 완료 마커
        grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done
      '
      ```
      ## ✅ 합격 기준
      `dryrun_done` 출력 시 통과. **근거:** 마커는 ossec.conf에 트리거→액션 매핑이 실제 있을 때만 찍히므로, 실차단 없이 매핑을 검증하는 드라이런이 됐음을 뜻한다.
    hint: '드라이런'
    category: analysis
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # ossec.conf 트리거→액션 매핑 확인 (실차단 미발동)
        echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head
        echo "매핑 예: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그"
        # 매핑이 실제 존재하면 드라이런 마커
        grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done
      '
    answer_detail: "드라이런 = ossec.conf command 매핑 실확인. 가짜 echo 아닌 실확인. 단계적 활성으로 오차단 관리."
    verify:
      type: output_contains
      expect: 'dryrun_done'
      field: stdout
      semantic: {intent: "드라이런", success_criteria: ["레벨→액션"], acceptable_methods: ["**[관리적] 드라이런 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 사람 검토 (human-in-the-loop)
      **실습 의미:** 고위험·비가역 액션(계정잠금 등)은 사람 승인 게이트를 둔다 — 자동화는 사람을 대체가 아니라 증폭하는 것이다. 어떤 액션이 비가역인지 실제로 식별한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # AR 액션 중 비가역(되돌리기 어려운) 액션을 실제 식별한다
        echo "비가역 액션(사람 승인 필요) 식별:"; ls /var/ossec/active-response/bin/ | grep -E "disable-account|firewall-drop|host-deny"
        echo "disable-account=계정잠금(비가역)→사람 승인 게이트, firewall-drop=가역→자동+사후검토"
        # 비가역 액션(disable-account)이 실제 존재하면 사람검토 게이트 확인 마커
        ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1 && echo human_loop_done
      '
      ```
      ## ✅ 합격 기준
      `human_loop_done` 출력 시 통과. **근거:** 마커는 비가역 액션(disable-account)이 실제 존재할 때만 찍히므로, 사람 승인 게이트가 필요한 액션을 식별했음을 뜻한다.
    hint: '사람 검토'
    category: report
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 비가역 액션 실제 식별
        echo "비가역 액션(사람 승인 필요) 식별:"; ls /var/ossec/active-response/bin/ | grep -E "disable-account|firewall-drop|host-deny"
        echo "disable-account=계정잠금(비가역)→승인 게이트, firewall-drop=가역→자동+사후검토"
        # 비가역 액션 존재 시 마커
        ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1 && echo human_loop_done
      '
    answer_detail: "사람 검토 = AR 비가역 액션 실식별→승인 게이트. 가짜 echo 아닌 실식별. 자동화는 증폭이지 대체 아님."
    verify:
      type: output_contains
      expect: 'human_loop_done'
      field: stdout
      semantic: {intent: "사람 검토", success_criteria: ["승인 게이트"], acceptable_methods: ["**[관리적] HITL (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 SOAR 효과 측정 (MTTR)
      **실습 의미:** SOAR의 가치는 MTTR(평균 대응 시간) 단축·분석가 피로 감소·일관성이다 — 실제 알림량을 집계해 수동 대응 부하를 정량화하면 자동화 필요성이 드러난다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 최근 알림 건수를 실제 집계해 수동 대응 부하를 정량화한다
        N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l)
        echo "최근 알림 ${N}건 — 수동 대응 시 MTTR×${N}건의 부하, SOAR 자동화로 단축"
        echo "지표: MTTR(수십분→수초)·자동화율↑·일관성(새벽3시도 동일)"
        # 알림량을 실제 집계했으면 측정 완료 마커
        [ "$N" -ge 0 ] && echo metrics_done
      '
      ```
      ## ✅ 합격 기준
      `metrics_done`(과 알림 건수)가 출력되면 통과. **근거:** 마커는 실제 알림량을 집계했을 때 찍히므로, 자동화 필요성을 정량 근거로 제시했음을 뜻한다.
    hint: 'MTTR'
    category: report
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 최근 알림 건수 집계 (수동 대응 부하 정량화)
        N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l)
        echo "최근 알림 ${N}건 — 수동 대응 시 MTTR×${N}건의 부하, SOAR 자동화로 단축"
        echo "지표: MTTR(수십분→수초)·자동화율↑·일관성"
        # 집계했으면 마커
        [ "$N" -ge 0 ] && echo metrics_done
      '
    answer_detail: "SOAR 측정 = 실제 알림량 집계로 MTTR 부하 정량화. 가짜 echo 아닌 실집계. 자동화로 MTTR 단축."
    verify:
      type: output_contains
      expect: 'metrics_done'
      field: stdout
      semantic: {intent: "MTTR", success_criteria: ["측정 지표"], acceptable_methods: ["**[관리적] 지표 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SOAR 보고서 작성
      **실습 의미:** 앞 단계의 실측(AR 액션 수·알림량)을 인용한 보고서로 정리한다 — 추측이 아닌 실측을 근거로 SOAR 운영을 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-siem sh -c '
        # 보고서 근거: AR 액션 수와 최근 알림량을 실측
        A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l)
        N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l)
        # 실측 수치를 인용한 SOAR 보고서 출력 (본문 상세는 학생이 보강)
