lab_id: standalone-soc-adv-week10
title: "SOAR — 플레이북으로 탐지 대응을 자동화한다"
version: standalone-soc-adv
course: soc-adv
week: 10
description: |
  SOC 고급 W10 — SOAR(보안 오케스트레이션·자동 대응). 반복적 탐지 대응을 플레이북으로 자동화한다.
  el34 Wazuh active-response(firewall-drop·host-deny·disable-account)를 실제 SOAR 액션으로 확인하고,
  트리거→보강→판단→실행→사람검토의 플레이북을 설계한다. el34-siem Wazuh AR 사용(읽기 전용, 실차단 미발동).
  인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh 탐지/격상)·soc-adv W05(CTI 보강) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SOAR 구성요소) §3(플레이북) §4(사람검토) 숙지"
objectives:
  - "SOAR의 가치(반복 대응 자동화·MTTR 단축) 설명"
  - "Wazuh active-response를 SOAR 액션으로 활용"
  - "플레이북 설계(트리거→보강→판단→실행→검토)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — SOAR 실행 엔진(Wazuh active-response)이 있는지 확인
      > **이 단계에서 할 일:** active-response/bin 의 자동 액션 스크립트 개수를 센다.
      > **왜:** el34의 SOAR 실행 엔진은 Wazuh active-response다 — 알림에 반응해 자동 액션(차단/격리)을
      > 실행한다. 그 액션 스크립트가 있어야 자동 대응이 가능하다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      N=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l)
      echo "active-response 액션 ${N}개"
      [ "$N" -ge 1 ] && echo soar_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 개수는 환경마다 다름)
      ```
      active-response 액션 15개
      soar_ready
      ```

      ### ▷ 결과 해석
      액션이 15개 있으면 SOAR 엔진 준비 완료. 이 스크립트들이 '알림이 울리면 자동으로 실행할 손'이다 —
      다음 단계에서 그중 차단/격리 액션을 확인한다.
    hint: 'active-response'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c '
        # active-response/bin 액션 스크립트 개수 집계
        N=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l)
        echo "active-response 액션 ${N}개"
        # 1개 이상이면 SOAR 엔진 준비 마커
        [ "$N" -ge 1 ] && echo soar_ready
      '
    answer_detail: "SOAR 실행 엔진 = Wazuh active-response/bin/(자동 액션 스크립트 모음). 알림 트리거로 실행."
    verify:
      type: output_contains
      expect: 'soar_ready'
      field: stdout
      semantic: {intent: "SOAR 엔진", success_criteria: ["active-response"], acceptable_methods: ["**[OSS] Wazuh AR (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 플레이북이 호출할 실제 액션을 본다 (카탈로그)
      > **이 단계에서 할 일:** 핵심 차단/격리 액션(firewall-drop·host-deny·disable-account)이 있는지 확인한다.
      > **왜:** 플레이북의 '실행' 단계가 이 액션들을 호출한다 — IP 차단·hosts.deny·계정 잠금.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      ls /var/ossec/active-response/bin/ | grep -E "firewall-drop|host-deny|disable-account"
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      default-firewall-drop
      disable-account
      firewall-drop
      host-deny
      ```

      ### ▷ 결과 해석
      firewall-drop=공격 IP를 방화벽에서 차단, host-deny=hosts.deny에 추가, disable-account=계정 잠금.
      이게 SOAR이 '손으로 할 일'을 자동으로 하는 액션들이다.
    hint: '액션 카탈로그'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 차단/격리 액션(firewall-drop·host-deny·disable-account) 존재 확인
        ls /var/ossec/active-response/bin/ | grep -E "firewall-drop|host-deny|disable-account"
      '
    answer_detail: "액션 카탈로그 = firewall-drop(IP차단)·host-deny·disable-account. 플레이북이 호출하는 자동 대응."
    verify:
      type: output_contains
      expect: 'firewall-drop'
      field: stdout
      semantic: {intent: "액션 카탈로그", success_criteria: ["차단 액션"], acceptable_methods: ["**[OSS] AR bin (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 알림→자동대응의 연결고리를 본다 (command 등록)
      > **이 단계에서 할 일:** ossec.conf의 <command>에 등록된 SOAR 액션 이름을 확인한다.
      > **왜:** <command>가 액션을 등록하고 <active-response>가 트리거 조건(룰/레벨)에 묶는다 — 이게
      > '알림이 울리면 어떤 액션을 실행하나'의 연결고리다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      grep -E "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf | head
      grep -qE "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf && echo triggers_defined
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
          <name>disable-account</name>
          <name>restart-wazuh</name>
          <name>firewall-drop</name>
          <name>host-deny</name>
      triggers_defined
      ```

      ### ▷ 결과 해석
      ossec.conf에 이 <command>들이 등록돼 있으면, <active-response>에서 'rule level≥N이면 이 command
      실행'처럼 묶을 수 있다. 이게 SOAR의 자동화 배선이다(여기선 읽기만, 실차단은 미발동).
    hint: 'command 등록'
    category: manipulation
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # ossec.conf <command>에 등록된 액션 이름 확인
        grep -E "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf | head
        # command 등록 확인 시 마커
        grep -qE "<name>(firewall-drop|host-deny|disable-account|restart-wazuh)" /var/ossec/etc/ossec.conf && echo triggers_defined
      '
    answer_detail: "트리거 정의 = ossec.conf <command>(액션 등록)+<active-response>(룰/레벨 트리거). 자동화 연결고리."
    verify:
      type: output_contains
      expect: 'triggers_defined'
      field: stdout
      semantic: {intent: "트리거 정의", success_criteria: ["command 등록"], acceptable_methods: ["**[OSS] ossec.conf (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 플레이북 5단계의 '실행' 재료를 확인한다
      > **이 단계에서 할 일:** 플레이북 실행 단계가 호출할 AR 액션 목록과 개수를 확인한다.
      > **왜:** 플레이북은 트리거→보강(CTI)→판단→실행(AR 액션)→검토의 5단계로 표준 대응을 코드화한다.
      > 그 '실행' 칸에 넣을 액션이 실제로 있어야 한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head
      A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계(트리거→보강→판단→실행→검토)의 실행 재료"
      [ "$A" -ge 1 ] && echo playbook_designed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 목록/개수는 환경마다 다름)
      ```
      플레이북 실행 액션(active-response/bin):
      default-firewall-drop
      disable-account
      firewall-drop
      host-deny
      ip-customblock
      사용 가능 액션 15개 → 플레이북 5단계(트리거→보강→판단→실행→검토)의 실행 재료
      playbook_designed
      ```

      ### ▷ 결과 해석
      예: "SSH 무차별 대입 알림(트리거) → CTI로 출처 평판 조회(보강) → 고위험 판단 → firewall-drop 실행
      → 분석가 사후 검토". 이 5단계를 코드화한 게 플레이북. 액션 카탈로그가 그 '실행' 재료다.
    hint: '플레이북'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 플레이북 실행 액션 목록 확인
        echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head
        # 사용 가능 액션 수 집계 → 1개 이상이면 마커
        A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계의 실행 재료"
        [ "$A" -ge 1 ] && echo playbook_designed
      '
    answer_detail: "플레이북 = AR 실행 액션 카탈로그 실확인. 가짜 echo 아닌 실확인. 5단계 표준 대응 코드화."
    verify:
      type: output_contains
      expect: 'playbook_designed'
      field: stdout
      semantic: {intent: "플레이북", success_criteria: ["5단계"], acceptable_methods: ["**[관리적] 플레이북 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 실차단 없이 매핑만 검증한다 (드라이런)
      > **이 단계에서 할 일:** 실제 차단을 발동하지 않고 ossec.conf의 트리거→액션 매핑만 확인한다.
      > **왜:** 자동 차단을 처음부터 켜면 오차단으로 정상 사용자를 막는 사고가 난다. 먼저 매핑을
      > 드라이런으로 검증하고, 알림-only→단계적 활성으로 올린다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head
      echo "매핑 예: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그(실차단 미발동)"
      grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      트리거→액션 매핑(ossec.conf <command>):
          <name>disable-account</name>
          <name>firewall-drop</name>
          <name>host-deny</name>
      매핑 예: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그(실차단 미발동)
      dryrun_done
      ```

      ### ▷ 결과 해석
      매핑이 존재하면 '어떤 레벨이 어떤 액션을 부르나'의 설계가 확인된 것. 본 실습은 매핑만 보고 실차단은
      발동하지 않는다(공유 인프라 보존). 운영 전환 시에도 처음엔 알림-only로 1~2주 관찰 후 차단 활성한다.
    hint: '드라이런'
    category: analysis
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # ossec.conf 트리거→액션 매핑 확인 (실차단 미발동)
        echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head
        echo "매핑 예: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그"
        # 매핑이 실제 존재하면 드라이런 마커
        grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done
      '
    answer_detail: "드라이런 = ossec.conf command 매핑 실확인. 가짜 echo 아닌 실확인. 단계적 활성으로 오차단 관리."
    verify:
      type: output_contains
      expect: 'dryrun_done'
      field: stdout
      semantic: {intent: "드라이런", success_criteria: ["레벨→액션"], acceptable_methods: ["**[관리적] 드라이런 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 비가역 액션엔 사람 승인을 둔다 (human-in-the-loop)
      > **이 단계에서 할 일:** AR 액션 중 되돌리기 어려운(비가역) 액션을 식별한다.
      > **왜:** 자동화는 사람을 대체가 아니라 증폭하는 것이다. 계정 잠금처럼 비가역·고영향 액션은 사람
      > 승인 게이트를 둬야 오작동이 큰 사고로 번지지 않는다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      echo "비가역 액션(사람 승인 필요) 식별:"; ls /var/ossec/active-response/bin/ | grep -E "disable-account|firewall-drop|host-deny"
      echo "disable-account=계정잠금(비가역)→사람 승인 게이트, firewall-drop=가역→자동+사후검토"
      ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1 && echo human_loop_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      비가역 액션(사람 승인 필요) 식별:
      disable-account
      firewall-drop
      host-deny
      disable-account=계정잠금(비가역)→사람 승인 게이트, firewall-drop=가역→자동+사후검토
      human_loop_done
      ```

      ### ▷ 결과 해석
      firewall-drop은 가역(타임아웃 후 자동 해제)이라 자동 실행+사후 검토가 적당하지만, disable-account는
      계정을 잠가 업무를 멈출 수 있어(비가역적 영향) 사람 승인을 거치게 한다. 이게 human-in-the-loop 설계.
    hint: '사람 검토'
    category: report
    points: 12
    answer: |
      docker exec el34-siem sh -c '
        # 비가역 액션 실제 식별
        echo "비가역 액션(사람 승인 필요) 식별:"; ls /var/ossec/active-response/bin/ | grep -E "disable-account|firewall-drop|host-deny"
        echo "disable-account=계정잠금(비가역)→승인 게이트, firewall-drop=가역→자동+사후검토"
        # 비가역 액션 존재 시 마커
        ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1 && echo human_loop_done
      '
    answer_detail: "사람 검토 = AR 비가역 액션 실식별→승인 게이트. 가짜 echo 아닌 실식별. 자동화는 증폭이지 대체 아님."
    verify:
      type: output_contains
      expect: 'human_loop_done'
      field: stdout
      semantic: {intent: "사람 검토", success_criteria: ["승인 게이트"], acceptable_methods: ["**[관리적] HITL (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — SOAR의 효과를 수치로 본다 (MTTR)
      > **이 단계에서 할 일:** 최근 알림 건수를 집계해 수동 대응 부하를 정량화한다.
      > **왜:** SOAR의 가치는 MTTR(평균 대응 시간) 단축·분석가 피로 감소·일관성이다. 알림이 많을수록
      > 수동 대응 부하가 크다 → 자동화 필요성이 수치로 드러난다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l)
      echo "최근 알림 ${N}건 — 수동 대응 시 MTTR×${N}건의 부하, SOAR 자동화로 단축"
      echo "지표: MTTR(수십분→수초)·자동화율↑·일관성(새벽3시도 동일)"
      [ "$N" -ge 0 ] && echo metrics_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      최근 알림 1838건 — 수동 대응 시 MTTR×1838건의 부하, SOAR 자동화로 단축
      지표: MTTR(수십분→수초)·자동화율↑·일관성(새벽3시도 동일)
      metrics_done
