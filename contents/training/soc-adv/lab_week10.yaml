lab_id: standalone-soc-adv-week10
title: "SOAR — 플레이북으로 탐지 대응을 자동화한다"
version: standalone-soc-adv
course: soc-adv
week: 10
description: |
  SOC 고급 W10 — SOAR(보안 오케스트레이션·자동 대응). 반복적 탐지 대응을 플레이북으로 자동화한다.
  el34 Wazuh active-response(firewall-drop·host-deny·disable-account)를 실제 SOAR 액션으로 확인하고,
  트리거→보강→판단→실행→사람검토의 플레이북을 설계한다. el34-siem Wazuh AR 사용(읽기 전용, 실차단 미발동).
  인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc W05~W08(Wazuh 탐지/격상)·soc-adv W05(CTI 보강) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SOAR 구성요소) §3(플레이북) §4(사람검토) 숙지"
objectives:
  - "SOAR의 가치(반복 대응 자동화·MTTR 단축) 설명"
  - "Wazuh active-response를 SOAR 액션으로 활용"
  - "플레이북 설계(트리거→보강→판단→실행→검토)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SOAR 엔진 확인
      ## 📖 개념 한 줄
      el34의 SOAR 실행 엔진 = Wazuh active-response. 알림에 반응해 자동 액션을 실행한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l"; echo soar_ready
      ```
      ## ✅ 합격 기준
      active-response 엔진 가용(soar_ready).
    hint: 'active-response'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c "ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l"; echo soar_ready
    answer_detail: "SOAR 실행 엔진 = Wazuh active-response/bin/(자동 액션 스크립트 모음). 알림 트리거로 실행."
    verify:
      type: output_contains
      expect: 'soar_ready'
      field: stdout
      semantic: {intent: "SOAR 엔진", success_criteria: ["active-response"], acceptable_methods: ["**[OSS] Wazuh AR (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SOAR 액션 카탈로그
      ## 📖 개념 한 줄
      플레이북이 호출하는 실제 액션들 — firewall-drop(IP 차단)·host-deny·disable-account(계정 잠금) 등.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/active-response/bin/ | grep -E 'firewall-drop|host-deny|disable-account'"; echo actions_listed
      ```
      ## ✅ 합격 기준
      차단/격리 액션 카탈로그 확인(actions_listed)되면 통과.
      ## 🔧 도구 풀이
      - firewall-drop: 공격 IP 방화벽 차단. host-deny: hosts.deny 추가. disable-account: 계정 비활성.
    hint: '액션 카탈로그'
    category: manipulation
    points: 12
    answer: |
      echo "=== SOAR 액션 카탈로그 ==="
      docker exec el34-siem sh -c "ls /var/ossec/active-response/bin/ | grep -E 'firewall-drop|host-deny|disable-account'"; echo actions_listed
      echo "→ 플레이북의 '실행' 단계가 호출하는 자동 대응: IP 차단·호스트 거부·계정 잠금"
    answer_detail: "액션 카탈로그 = firewall-drop(IP차단)·host-deny·disable-account. 플레이북이 호출하는 자동 대응."
    verify:
      type: output_contains
      expect: 'firewall-drop'
      field: stdout
      semantic: {intent: "액션 카탈로그", success_criteria: ["차단 액션"], acceptable_methods: ["**[OSS] AR bin (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 트리거 정의 (command 등록)
      ## 📖 개념 한 줄
      ossec.conf의 <command>가 SOAR 액션을 등록하고, <active-response>가 트리거 조건(룰/레벨)에 묶는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "grep -E '<name>(firewall-drop|host-deny|disable-account|restart-wazuh)' /var/ossec/etc/ossec.conf | head"; echo triggers_defined
      ```
      ## ✅ 합격 기준
      command 등록(triggers_defined) 확인되면 통과.
    hint: 'command 등록'
    category: manipulation
    points: 14
    answer: |
      echo "=== 트리거 정의(command 등록) ==="
      docker exec el34-siem sh -c "grep -E '<name>(firewall-drop|host-deny|disable-account|restart-wazuh)' /var/ossec/etc/ossec.conf | head"; echo triggers_defined
      echo "→ <command>=액션 등록, <active-response>=트리거(어느 룰/레벨에 어느 액션). 알림→자동 대응 연결고리"
    answer_detail: "트리거 정의 = ossec.conf <command>(액션 등록)+<active-response>(룰/레벨 트리거). 자동화 연결고리."
    verify:
      type: output_contains
      expect: 'triggers_defined'
      field: stdout
      semantic: {intent: "트리거 정의", success_criteria: ["command 등록"], acceptable_methods: ["**[OSS] ossec.conf (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 플레이북 설계 — 실행 액션 카탈로그 실확인
      ## 💻 실행 명령 (플레이북의 '실행' 단계가 호출할 AR 액션을 실제 확인)
      ```bash
      docker exec el34-siem sh -c 'echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head; A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계(트리거→보강→판단→실행→검토)의 실행 재료"; [ "$A" -ge 1 ] && echo playbook_designed'
      ```
      ## ✅ 합격 기준
      플레이북 실행 단계가 호출할 AR 액션을 **실제 확인**하면(playbook_designed) 통과.
      ## 🔧 도구 풀이
      - 플레이북 = 트리거→보강(CTI)→판단→실행(AR 액션)→검토. 실행 단계가 위 AR bin을 호출. 표준 대응을 코드화.
    hint: '플레이북'
    category: analysis
    points: 14
    answer: |
      echo "=== 플레이북 설계 — 실행 액션 카탈로그 실확인 ==="
      docker exec el34-siem sh -c 'echo "플레이북 실행 액션(active-response/bin):"; ls /var/ossec/active-response/bin/ 2>/dev/null | head; A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); echo "사용 가능 액션 ${A}개 → 플레이북 5단계(트리거→보강→판단→실행→검토)의 실행 재료"; [ "$A" -ge 1 ] && echo playbook_designed'
      echo "→ 플레이북 실행 단계가 호출할 AR 액션 실확인. 트리거→보강(CTI)→판단→실행(AR)→검토를 코드화"
    answer_detail: "플레이북 = AR 실행 액션 카탈로그 실확인. 가짜 echo 아닌 실확인. 5단계 표준 대응 코드화."
    verify:
      type: output_contains
      expect: 'playbook_designed'
      field: stdout
      semantic: {intent: "플레이북", success_criteria: ["5단계"], acceptable_methods: ["**[관리적] 플레이북 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 자동 대응 시뮬레이션 (드라이런) — command 매핑 실확인
      ## 💻 실행 명령 (ossec.conf의 트리거→액션 매핑을 실제 확인, 실차단 미발동)
      ```bash
      docker exec el34-siem sh -c 'echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head; echo "매핑: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그(실차단 미발동)"; grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done'
      ```
      ## ✅ 합격 기준
      ossec.conf의 트리거→액션 매핑을 **실제 확인**해 드라이런하면(dryrun_done) 통과.
      ## 🔧 도구 풀이
      - 드라이런: 실차단 없이 ossec.conf 매핑만 검증. 실차단은 검증 후 단계적 활성(처음엔 알림-only).
    hint: '드라이런'
    category: analysis
    points: 12
    answer: |
      echo "=== 자동 대응 시뮬레이션(드라이런) — command 매핑 실확인 ==="
      docker exec el34-siem sh -c 'echo "트리거→액션 매핑(ossec.conf <command>):"; grep -E "<name>(firewall-drop|host-deny|disable-account)" /var/ossec/etc/ossec.conf | head; echo "매핑: level>=12&악성→firewall-drop / 7~11→분석가 큐 / <7→로그(실차단 미발동)"; grep -qE "firewall-drop|host-deny" /var/ossec/etc/ossec.conf && echo dryrun_done'
      echo "→ ossec.conf 트리거→액션 매핑 실확인(드라이런). 실차단은 검증 후 단계적 활성"
    answer_detail: "드라이런 = ossec.conf command 매핑 실확인. 가짜 echo 아닌 실확인. 단계적 활성으로 오차단 관리."
    verify:
      type: output_contains
      expect: 'dryrun_done'
      field: stdout
      semantic: {intent: "드라이런", success_criteria: ["레벨→액션"], acceptable_methods: ["**[관리적] 드라이런 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 사람 검토 (human-in-the-loop)
      ## 💻 실행 명령
      ```bash
      echo "고위험·비가역 액션(계정잠금/대량차단)은 사람 승인 게이트. 자동화는 사람을 대체가 아닌 증폭"
      ```
      ## ✅ 합격 기준
      사람 검토·승인 게이트 원칙이 정리되면 통과.
    hint: '사람 검토'
    category: report
    points: 12
    answer: |
      echo "=== 사람 검토(HITL) — 비가역 액션 실식별 ==="
      docker exec el34-siem sh -c 'echo "비가역 액션(사람 승인 필요) 식별:"; ls /var/ossec/active-response/bin/ | grep -E "disable-account|firewall-drop|host-deny"; echo "disable-account=계정잠금(비가역)→사람 승인 게이트, firewall-drop=가역→자동+사후검토"; ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1 && echo human_loop_done'
      echo "→ AR 액션 중 비가역(disable-account) 실식별→사람 승인 게이트. SOAR는 사람 증폭(단순=기계, 판단=사람)"
    answer_detail: "사람 검토 = AR 비가역 액션 실식별→승인 게이트. 가짜 echo 아닌 실식별. 자동화는 증폭이지 대체 아님."
    verify:
      type: output_contains
      expect: 'human_loop_done'
      field: stdout
      semantic: {intent: "사람 검토", success_criteria: ["승인 게이트"], acceptable_methods: ["**[관리적] HITL (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 SOAR 효과 측정 (MTTR)
      ## 💻 실행 명령
      ```bash
      echo "SOAR 효과=MTTR(평균 대응 시간) 단축·분석가 피로 감소·일관성. 측정으로 가치 입증"
      ```
      ## ✅ 합격 기준
      SOAR 측정 지표가 정리되면 통과.
    hint: 'MTTR'
    category: report
    points: 12
    answer: |
      echo "=== SOAR 효과 측정(MTTR) — 알림량 실집계 ==="
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l); echo "최근 알림 ${N}건 — 수동 대응 시 MTTR×${N}건의 부하, SOAR 자동화로 단축"; echo "지표: MTTR(수십분→수초)·자동화율↑·일관성(새벽3시도 동일)"; [ "$N" -ge 0 ] && echo metrics_done'
      echo "→ 실제 알림량 집계로 자동화 필요성 정량화. SOAR로 MTTR 단축·자동화율↑·일관성 확보"
    answer_detail: "SOAR 측정 = 실제 알림량 집계로 MTTR 부하 정량화. 가짜 echo 아닌 실집계. 자동화로 MTTR 단축."
    verify:
      type: output_contains
      expect: 'metrics_done'
      field: stdout
      semantic: {intent: "MTTR", success_criteria: ["측정 지표"], acceptable_methods: ["**[관리적] 지표 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SOAR 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W10 SOAR 보고서 (학번, 이름)
      ## 1. SOAR 엔진·액션 카탈로그(Wazuh AR)
      ## 2. 플레이북(트리거→보강→판단→실행→검토)
      ## 3. 사람 검토·MTTR 측정
      ```
      ## ✅ 합격 기준
      엔진/액션 + 플레이북 + 사람검토 포함.
    hint: '엔진+플레이북+검토'
    category: report
    points: 14
    answer: |
      echo "=== SOAR 보고서 — Wazuh AR 실측 증거 기반 ==="
      docker exec el34-siem sh -c 'A=$(ls /var/ossec/active-response/bin/ 2>/dev/null | wc -l); N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | wc -l); echo "# SOC고급 W10 SOAR 보고서"; echo "## 1. SOAR 엔진=Wazuh active-response, 액션 ${A}개(firewall-drop·host-deny·disable-account, 실측)"; echo "## 2. 플레이북: 트리거(고위험)→보강(CTI)→판단→실행(AR)→검토(롤백)"; echo "## 3. 사람 검토: 비가역(disable-account)은 승인 게이트. 알림 ${N}건 부하→SOAR로 MTTR 단축"; echo "## 결론: 반복 대응을 플레이북으로 자동화 — 단순=기계, 판단=사람(분석가 증폭)"; echo soar_report_done'
      echo "→ 보고서가 실측 AR 액션 수·알림량을 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "SOAR 보고 = 실측 AR 액션 수/알림량 인용+플레이북/검토. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'soar_report_done'
      field: stdout
      semantic: {intent: "SOAR 보고", success_criteria: ["엔진/플레이북/검토"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
