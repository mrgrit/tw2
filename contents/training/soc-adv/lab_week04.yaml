lab_id: standalone-soc-adv-week04
title: "YARA 악성코드 탐지 — 웹셸·페이로드 시그니처"
version: standalone-soc-adv
course: soc-adv
week: 4
description: |
  SOC 고급 W04 — YARA는 파일·메모리에서 악성코드를 문자열/패턴 시그니처로 탐지하는 표준 도구. 웹셸·페이로드
  탐지 룰을 작성하고, 악성 샘플은 탐지(진탐)·정상 파일은 미탐(오탐 없음)을 검증한다. el34-attacker의 yara
  4.1.3 사용. 샘플은 /tmp에 만들고 즉시 삭제(self-clean). 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "soc W10(웹셸) + soc-adv W01~W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(YARA 구조) §3(스캔) §4(오탐) 숙지"
objectives:
  - "YARA 룰 구조(strings/condition) 작성"
  - "웹셸 샘플 탐지(진탐)·정상 파일 미탐(오탐 0)"
  - "YARA를 탐지 파이프라인에 통합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 YARA 엔진 가용 확인
      **실습 의미:** 악성코드 시그니처 탐지를 시작하려면 YARA 엔진이 있어야 한다 — 먼저 도구 가용성부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자 컨테이너에서 yara 버전을 출력해 엔진 설치를 확인한다
      docker exec el34-attacker sh -c "yara --version"
      # 2) 엔진 가용 확인 마커
      echo yara_ready
      ```
      ## ✅ 합격 기준
      `yara_ready` 출력 시 통과. **근거:** yara --version이 성공해야 마커가 찍히므로, 출력은 탐지 엔진이 준비됐음을 뜻한다.
    hint: 'yara version'
    category: survey
    points: 10
    answer: |
      # 1) yara 버전 출력 (엔진 설치 확인)
      docker exec el34-attacker sh -c "yara --version"
      # 2) 엔진 가용 확인 마커
      echo yara_ready
    answer_detail: "YARA = 파일/메모리 악성코드 시그니처 스캐너(el34-attacker 4.1.3)."
    verify:
      type: output_contains
      expect: 'yara_ready'
      field: stdout
      semantic: {intent: "yara 가용", success_criteria: ["버전"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 YARA 룰 구조 작성 (strings/condition)
      **실습 의미:** YARA 룰은 strings(찾을 문자열/바이트)+condition(조합 논리)로 구성된다 — 웹셸 특징을 잡는 룰을 직접 열어 구조를 익힌다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹셸 탐지 YARA 룰을 생성한다 (base64 디코드 → strings: system($_GET·<?php / condition: 둘 다 AND)
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 생성한 룰 본문을 출력해 strings/condition 구조를 확인한다
      docker exec el34-attacker sh -c 'cat /tmp/sa04.yar'
      # 3) 룰 파일 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar'
      ```
      ## ✅ 합격 기준
      `condition`(섹션)이 출력되면 통과. **근거:** 룰 본문이 실제 출력됐다는 뜻이라, YARA의 핵심 구성(특징 문자열+조합 논리)을 파악한 것이다.
    hint: 'strings/condition'
    category: manipulation
    points: 14
    answer: |
      # 1) 웹셸 탐지 룰 생성 (base64 디코드)
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 룰 본문 출력 → strings/condition 확인
      docker exec el34-attacker sh -c 'cat /tmp/sa04.yar'
      # 3) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar'
    answer_detail: "YARA 룰 = strings(찾을 패턴)+condition(논리). 웹셸 특징 문자열 조합으로 탐지."
    verify:
      type: output_contains
      expect: 'condition'
      field: stdout
      semantic: {intent: "YARA 구조", success_criteria: ["strings/condition"], acceptable_methods: ["**[OSS] yara rule (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 웹셸 샘플 탐지 (진탐)
      **실습 의미:** 작성한 룰이 진짜 악성을 잡는지 검증한다 — 웹셸 샘플을 YARA로 스캔해 매칭(탐지)이 나는지로 진탐 능력을 확인.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 악성 웹셸 샘플 생성 (system($_GET[c]) 백도어)
      docker exec el34-attacker sh -c 'echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php'
      # 3) yara <룰> <파일>로 스캔 → 매칭 시 "webshell_php <경로>" 출력
      docker exec el34-attacker sh -c 'yara /tmp/sa04.yar /tmp/sa04_shell.php'
      # 4) 샘플·룰 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar /tmp/sa04_shell.php'
      ```
      ## ✅ 합격 기준
      `webshell_php`(매칭)가 출력되면 통과. **근거:** YARA가 샘플에서 룰을 매칭했다는 뜻이라, 룰이 실제 악성을 탐지하는 진탐 능력이 입증된다.
    hint: 'yara 스캔 매칭'
    category: manipulation
    points: 16
    answer: |
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 악성 웹셸 샘플 생성
      docker exec el34-attacker sh -c 'echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php'
      # 3) yara 스캔 → webshell_php 매칭 출력
      docker exec el34-attacker sh -c 'yara /tmp/sa04.yar /tmp/sa04_shell.php'
      # 4) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar /tmp/sa04_shell.php'
    answer_detail: "진탐 = 악성 웹셸 샘플을 YARA 룰이 매칭. 출력 'webshell_php <파일>'이 탐지 증거. 샘플 self-clean."
    verify:
      type: output_contains
      expect: 'webshell_php'
      field: stdout
      semantic: {intent: "웹셸 탐지", success_criteria: ["매칭"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 정상 파일 미탐 (오탐 0)
      **실습 의미:** 좋은 룰은 악성은 잡고 정상은 안 잡는다 — 정상 PHP를 스캔해 매칭이 없어야(오탐 0) 운영에 쓸 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 정상 PHP 파일 생성 (phpinfo만, 악성 아님)
      docker exec el34-attacker sh -c 'echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php'
      # 3) 정상 파일 스캔 → 매칭 없으면 yara는 아무 줄도 안 찍음, 이어 no_false_positive 출력
      docker exec el34-attacker sh -c 'yara /tmp/sa04.yar /tmp/sa04_ok.php; echo no_false_positive'
      # 4) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar /tmp/sa04_ok.php'
      ```
      ## ✅ 합격 기준
      매칭 줄 없이 `no_false_positive`만 출력되면 통과. **근거:** 정상 파일에 룰이 안 걸렸다는 뜻이라, 진탐(3단계)과 함께 오탐 0의 균형 잡힌 룰임이 입증된다.
    hint: '오탐 0'
    category: manipulation
    points: 12
    answer: |
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 정상 PHP 파일 생성 (악성 아님)
      docker exec el34-attacker sh -c 'echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php'
      # 3) 정상 파일 스캔 → 매칭 없음 + no_false_positive
      docker exec el34-attacker sh -c 'yara /tmp/sa04.yar /tmp/sa04_ok.php; echo no_false_positive'
      # 4) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar /tmp/sa04_ok.php'
    answer_detail: "오탐 0 = 정상 PHP는 룰에 안 걸림(yara 출력 없음). 진탐(웹셸)+오탐0(정상)이 룰 품질."
    verify:
      type: output_contains
      expect: 'no_false_positive'
      field: stdout
      semantic: {intent: "오탐 0", success_criteria: ["정상 미탐"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 메모리/디렉토리 스캔
      **실습 의미:** YARA는 파일뿐 아니라 디렉토리 재귀(-r)·실행 중 프로세스 메모리(-p PID)도 스캔한다 — 디스크에 없는 파일리스 악성코드를 메모리에서 잡기 위함.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) yara -r 로 /tmp 디렉토리를 재귀 스캔한다 (-p PID를 쓰면 프로세스 메모리 스캔)
      docker exec el34-attacker sh -c 'yara -r /tmp/sa04.yar /tmp 2>/dev/null; echo dir_scanned'
      # 3) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar'
      ```
      ## ✅ 합격 기준
      `dir_scanned` 출력 시 통과. **근거:** 재귀 스캔이 실제 수행됐다는 뜻이라, 파일 단위를 넘어 디렉토리·메모리까지 탐지 범위를 넓힐 수 있음이 확인된다.
    hint: 'yara -r / -p'
    category: analysis
    points: 12
    answer: |
      # 1) 웹셸 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) yara -r 로 /tmp 디렉토리 재귀 스캔
      docker exec el34-attacker sh -c 'yara -r /tmp/sa04.yar /tmp 2>/dev/null; echo dir_scanned'
      # 3) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -f /tmp/sa04.yar'
    answer_detail: "확장 스캔 = yara -r(디렉토리 재귀)·-p PID(메모리). 디스크에 없는 파일리스 악성코드도 메모리에서 탐지."
    verify:
      type: output_contains
      expect: 'dir_scanned'
      field: stdout
      semantic: {intent: "확장 스캔", success_criteria: ["재귀/메모리"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 탐지 파이프라인 통합
      **실습 의미:** YARA는 단독이 아니라 업로드 디렉토리·FIM 트리거 스캔→Wazuh 경보로 엮어야 자동 탐지가 된다 — 업로드 폴더 재귀 스캔으로 그 한 토막을 시연.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 업로드 폴더를 만들고 웹셸을 떨군다 (업로드 공격 모사)
      docker exec el34-attacker sh -c 'mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php'
      # 2) 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar'
      # 3) 업로드 디렉토리 재귀 스캔 → 웹셸 매칭되면 경보 파이프라인 마커
      docker exec el34-attacker sh -c 'echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done'
      # 4) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -rf /tmp/y4 /tmp/y4.yar'
      ```
      ## ✅ 합격 기준
      `pipeline_done` 출력 시 통과. **근거:** 마커는 업로드 폴더 재귀 스캔이 웹셸을 실제 매칭했을 때만 찍히므로, 출력은 자동 탐지 파이프라인이 동작함을 뜻한다.
    hint: 'YARA 통합'
    category: report
    points: 12
    answer: |
      # 1) 업로드 폴더에 웹셸을 떨군다
      docker exec el34-attacker sh -c 'mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php'
      # 2) 탐지 룰 생성
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar'
      # 3) 재귀 스캔 → 웹셸 매칭 시 경보 파이프라인 마커
      docker exec el34-attacker sh -c 'echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done'
      # 4) 정리(self-clean)
      docker exec el34-attacker sh -c 'rm -rf /tmp/y4 /tmp/y4.yar'
    answer_detail: "통합 = 업로드 디렉토리 재귀 YARA 스캔으로 웹셸 실매칭. 가짜 echo 아닌 실스캔. FIM/SIEM/CI 파이프라인."
    verify:
      type: output_contains
      expect: 'pipeline_done'
      field: stdout
      semantic: {intent: "YARA 통합", success_criteria: ["재귀 스캔 매칭"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 룰 정교화 (회피 대응)
      **실습 의미:** 공격자는 문자열을 변형해 단순 룰을 회피한다 — 다중 문자열 AND 조합으로 룰을 정교화해 회피에 견디게 한다(단 너무 넓히면 오탐↑).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
