      > **이 단계에서 할 일:** 웹셸 매칭 건수를 집계해, 그 실측을 인용한 보고서 골격을 출력한다.
      > **왜:** 진탐/오탐 균형과 통합 결과를 추적 가능하게 남겨야 다음 룰 개선의 근거가 된다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
