lab_id: standalone-soc-adv-week04
title: "YARA 악성코드 탐지 — 웹셸·페이로드 시그니처"
version: standalone-soc-adv
course: soc-adv
week: 4
description: |
  SOC 고급 W04 — YARA는 파일·메모리에서 악성코드를 문자열/패턴 시그니처로 탐지하는 표준 도구. 웹셸·페이로드
  탐지 룰을 작성하고, 악성 샘플은 탐지(진탐)·정상 파일은 미탐(오탐 없음)을 검증한다. el34-attacker의 yara
  4.1.3 사용. 샘플은 /tmp에 만들고 즉시 삭제(self-clean). 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "soc W10(웹셸) + soc-adv W01~W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(YARA 구조) §3(스캔) §4(오탐) 숙지"
objectives:
  - "YARA 룰 구조(strings/condition) 작성"
  - "웹셸 샘플 탐지(진탐)·정상 파일 미탐(오탐 0)"
  - "YARA를 탐지 파이프라인에 통합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 악성코드 시그니처 엔진(YARA)이 있는지 확인
      > **이 단계에서 할 일:** 공격자 컨테이너에서 yara 버전을 출력해 엔진이 설치돼 있는지 본다.
      > **왜:** 이번 주는 파일·메모리에서 악성코드를 '문자열/패턴 시그니처'로 잡는다. 그 엔진이 YARA다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      yara --version
      echo yara_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      4.1.3
      yara_ready
      ```

      ### ▷ 결과 해석
      버전(4.1.3)이 찍히면 엔진 준비 완료. 이제 룰을 만들고(STEP 2) 악성/정상 파일에 스캔한다(STEP 3~4).
    hint: 'yara version'
    category: survey
    points: 10
    answer: |
      # 1) yara 버전 출력 (엔진 설치 확인)
      ssh att@192.168.0.202 "yara --version"
      # 2) 엔진 가용 확인 마커
      echo yara_ready
    answer_detail: "YARA = 파일/메모리 악성코드 시그니처 스캐너(el34-attacker 4.1.3)."
    verify:
      type: output_contains
      expect: 'yara_ready'
      field: stdout
      semantic: {intent: "yara 가용", success_criteria: ["버전"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — YARA 룰의 2대 구조를 만들고 읽는다 (strings/condition)
      > **이 단계에서 할 일:** 웹셸 탐지 룰을 만들고(base64 디코드) 본문을 출력해 'strings(찾을 패턴)+
      > condition(조합 논리)' 구조를 익힌 뒤 정리한다.
      > **왜:** 이 두 칸이 YARA의 핵심. 어떤 문자열을 어떻게 조합해 '악성'으로 판정할지가 여기서 정해진다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar
      cat /tmp/sa04.yar
      rm -f /tmp/sa04.yar
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      rule webshell_php {
        strings:
          $shell = "system($_GET"
          $tag = "<?php"
        condition:
          $shell and $tag
      }
      ```

      ### ▷ 결과 해석
      `strings`에 웹셸 특징 두 개($shell=`system($_GET`, $tag=`<?php`)를 정의하고, `condition`에서
      둘 다(AND) 있어야 매칭. 'AND'라서 둘 중 하나만 있는 정상 파일은 안 걸린다(오탐↓). (룰 파일은 보고
      나서 self-clean으로 지운다.)
    hint: 'strings/condition'
    category: manipulation
    points: 14
    answer: |
      # 1) 웹셸 탐지 룰 생성 (base64 디코드)
      ssh att@192.168.0.202 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 룰 본문 출력 → strings/condition 확인
      ssh att@192.168.0.202 'cat /tmp/sa04.yar'
      # 3) 정리(self-clean)
      ssh att@192.168.0.202 'rm -f /tmp/sa04.yar'
    answer_detail: "YARA 룰 = strings(찾을 패턴)+condition(논리). 웹셸 특징 문자열 조합으로 탐지."
    verify:
      type: output_contains
      expect: 'condition'
      field: stdout
      semantic: {intent: "YARA 구조", success_criteria: ["strings/condition"], acceptable_methods: ["**[OSS] yara rule (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 진짜 악성(웹셸)을 잡는지 검증한다 (진탐)
      > **이 단계에서 할 일:** 룰을 만들고, 악성 웹셸 샘플을 만들어, yara로 스캔해 매칭이 나는지 본다.
      > **왜:** 룰을 썼다고 끝이 아니다. 진짜 악성 샘플에 매칭(진탐)되는지 확인해야 쓸 수 있는 룰이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar
      echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php
      yara /tmp/sa04.yar /tmp/sa04_shell.php
      rm -f /tmp/sa04.yar /tmp/sa04_shell.php
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      webshell_php /tmp/sa04_shell.php
      ```

      ### ▷ 결과 해석
      `webshell_php <파일경로>` = 그 파일이 룰에 매칭됐다는 뜻(=탐지 성공, 진탐). 샘플은 `system($_GET[c])`
      백도어라 두 문자열을 모두 갖는다. (샘플·룰은 self-clean으로 삭제.)
    hint: 'yara 스캔 매칭'
    category: manipulation
    points: 16
    answer: |
      # 1) 웹셸 탐지 룰 생성
      ssh att@192.168.0.202 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 악성 웹셸 샘플 생성
      ssh att@192.168.0.202 'echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php'
      # 3) yara 스캔 → webshell_php 매칭 출력
      ssh att@192.168.0.202 'yara /tmp/sa04.yar /tmp/sa04_shell.php'
      # 4) 정리(self-clean)
      ssh att@192.168.0.202 'rm -f /tmp/sa04.yar /tmp/sa04_shell.php'
    answer_detail: "진탐 = 악성 웹셸 샘플을 YARA 룰이 매칭. 출력 'webshell_php <파일>'이 탐지 증거. 샘플 self-clean."
    verify:
      type: output_contains
      expect: 'webshell_php'
      field: stdout
      semantic: {intent: "웹셸 탐지", success_criteria: ["매칭"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 정상 파일은 안 잡는지 검증한다 (오탐 0)
      > **이 단계에서 할 일:** 정상 PHP(phpinfo만)를 같은 룰로 스캔해, 매칭이 '안' 나는지 본다.
      > **왜:** 좋은 룰은 악성은 잡고(진탐) 정상은 안 잡는다(오탐 0). 오탐이 많으면 운영에서 결국 무시당한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar
      echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php
      yara /tmp/sa04.yar /tmp/sa04_ok.php; echo no_false_positive
      rm -f /tmp/sa04.yar /tmp/sa04_ok.php
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      no_false_positive
      ```

      ### ▷ 결과 해석
      매칭 줄(`webshell_php ...`) 없이 `no_false_positive`만 찍히면 = 정상 파일에 안 걸렸다는 뜻(오탐 0).
      정상 PHP엔 `system($_GET`가 없어 AND condition이 성립 안 한다. 진탐(STEP 3)+오탐0(여기)이 룰 품질.
    hint: '오탐 0'
    category: manipulation
    points: 12
    answer: |
      # 1) 웹셸 탐지 룰 생성
      ssh att@192.168.0.202 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) 정상 PHP 파일 생성 (악성 아님)
      ssh att@192.168.0.202 'echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php'
      # 3) 정상 파일 스캔 → 매칭 없음 + no_false_positive
      ssh att@192.168.0.202 'yara /tmp/sa04.yar /tmp/sa04_ok.php; echo no_false_positive'
      # 4) 정리(self-clean)
      ssh att@192.168.0.202 'rm -f /tmp/sa04.yar /tmp/sa04_ok.php'
    answer_detail: "오탐 0 = 정상 PHP는 룰에 안 걸림(yara 출력 없음). 진탐(웹셸)+오탐0(정상)이 룰 품질."
    verify:
      type: output_contains
      expect: 'no_false_positive'
      field: stdout
      semantic: {intent: "오탐 0", success_criteria: ["정상 미탐"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 파일 하나를 넘어 디렉토리·메모리까지 스캔한다
      > **이 단계에서 할 일:** yara -r 로 /tmp 디렉토리를 재귀 스캔한다(-p PID를 쓰면 프로세스 메모리).
      > **왜:** 악성코드는 한 파일에만 있지 않다. 디렉토리 전체, 나아가 디스크에 없는 '파일리스'는
      > 메모리(-p)에서 잡아야 한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar
      yara -r /tmp/sa04.yar /tmp; echo dir_scanned
      rm -f /tmp/sa04.yar
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      webshell_php /tmp/sa04.yar
      dir_scanned
      ```

      ### ▷ 결과 해석
      `-r`로 /tmp 아래 모든 파일을 검사했다. (재미있는 점: 룰 파일 자체가 `system($_GET`·`<?php` 문자열을
      담고 있어 룰이 '자기 자신'을 매칭한다 — 그래서 sa04.yar가 잡힌다. 운영에선 룰 디렉토리를 스캔
      대상에서 제외한다.) `-p <PID>`로 바꾸면 그 프로세스의 메모리를 스캔한다.
    hint: 'yara -r / -p'
    category: analysis
    points: 12
    answer: |
      # 1) 웹셸 탐지 룰 생성
      ssh att@192.168.0.202 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar'
      # 2) yara -r 로 /tmp 디렉토리 재귀 스캔
      ssh att@192.168.0.202 'yara -r /tmp/sa04.yar /tmp; echo dir_scanned'
      # 3) 정리(self-clean)
      ssh att@192.168.0.202 'rm -f /tmp/sa04.yar'
    answer_detail: "확장 스캔 = yara -r(디렉토리 재귀)·-p PID(메모리). 디스크에 없는 파일리스 악성코드도 메모리에서 탐지."
    verify:
      type: output_contains
      expect: 'dir_scanned'
      field: stdout
      semantic: {intent: "확장 스캔", success_criteria: ["재귀/메모리"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — YARA를 자동 탐지 파이프라인에 끼운다
      > **이 단계에서 할 일:** 업로드 폴더에 웹셸을 떨구고(업로드 공격 모사), 그 폴더를 재귀 스캔해
      > 매칭되면 '경보 파이프라인' 한 토막을 시연한다.
      > **왜:** YARA는 단독 명령이 아니라 '업로드/FIM 트리거 → 스캔 → Wazuh 경보'로 엮여야 자동 탐지가 된다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar
      echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4; yara -r /tmp/y4.yar /tmp/y4 | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done
      rm -rf /tmp/y4 /tmp/y4.yar
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      업로드 디렉토리 재귀 YARA 스캔:
      webshell_php /tmp/y4/upload_shell.php
      웹셸 매칭→Wazuh 경보 파이프라인
      pipeline_done
      ```

      ### ▷ 결과 해석
      업로드된 웹셸이 재귀 스캔에 매칭되면, 운영에선 그 결과를 Wazuh 경보로 보내 자동 대응(격리/삭제)에
      건다. 여기선 그 사슬의 '탐지' 토막을 실제로 돌려본 것. (폴더·룰은 self-clean.)
    hint: 'YARA 통합'
    category: report
    points: 12
    answer: |
      # 1) 업로드 폴더에 웹셸을 떨군다
      ssh att@192.168.0.202 'mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php'
      # 2) 탐지 룰 생성
      ssh att@192.168.0.202 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar'
      # 3) 재귀 스캔 → 웹셸 매칭 시 경보 파이프라인 마커
      ssh att@192.168.0.202 'echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4; yara -r /tmp/y4.yar /tmp/y4 | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done'
      # 4) 정리(self-clean)
      ssh att@192.168.0.202 'rm -rf /tmp/y4 /tmp/y4.yar'
    answer_detail: "통합 = 업로드 디렉토리 재귀 YARA 스캔으로 웹셸 실매칭. 가짜 echo 아닌 실스캔. FIM/SIEM/CI 파이프라인."
    verify:
      type: output_contains
      expect: 'pipeline_done'
      field: stdout
      semantic: {intent: "YARA 통합", success_criteria: ["재귀 스캔 매칭"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 회피에 견디게 룰을 정교화한다 (다중 문자열 AND)
      > **이 단계에서 할 일:** 다중 문자열을 AND로 묶은 룰로 웹셸을 다시 스캔해, 여전히 진탐되는지 본다.
      > **왜:** 공격자는 문자열을 변형해 단순 룰을 회피한다. 여러 특징을 AND로 묶으면 회피에 더 견딘다
      > (단 너무 넓히면 오탐↑ — 균형이 핵심).

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4r.yar
      echo "정교화 룰(다중 문자열 shell+tag, AND condition):"; head -6 /tmp/y4r.yar
      echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4r.php; yara /tmp/y4r.yar /tmp/y4r.php | grep -q webshell_php && echo "다중 문자열 AND 룰 진탐 성공" && echo rule_refined
      rm -f /tmp/y4r.yar /tmp/y4r.php
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      정교화 룰(다중 문자열 shell+tag, AND condition):
      rule webshell_php {
        strings:
          $shell = "system($_GET"
          $tag = "<?php"
        condition:
          $shell and $tag
      다중 문자열 AND 룰 진탐 성공
      rule_refined
      ```

      ### ▷ 결과 해석
      두 문자열을 AND로 묶은 룰이 웹셸을 여전히 잡는다. 실무 정교화는 여기에 nocase·정규식·바이트
      패턴·파일 크기 조건 등을 더해 변형까지 잡되, 오탐이 늘지 않게 condition을 좁힌다.
    hint: '회피 대응'
