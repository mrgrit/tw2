lab_id: standalone-soc-adv-week04
title: "YARA 악성코드 탐지 — 웹셸·페이로드 시그니처"
version: standalone-soc-adv
course: soc-adv
week: 4
description: |
  SOC 고급 W04 — YARA는 파일·메모리에서 악성코드를 문자열/패턴 시그니처로 탐지하는 표준 도구. 웹셸·페이로드
  탐지 룰을 작성하고, 악성 샘플은 탐지(진탐)·정상 파일은 미탐(오탐 없음)을 검증한다. el34-attacker의 yara
  4.1.3 사용. 샘플은 /tmp에 만들고 즉시 삭제(self-clean). 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "soc W10(웹셸) + soc-adv W01~W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(YARA 구조) §3(스캔) §4(오탐) 숙지"
objectives:
  - "YARA 룰 구조(strings/condition) 작성"
  - "웹셸 샘플 탐지(진탐)·정상 파일 미탐(오탐 0)"
  - "YARA를 탐지 파이프라인에 통합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — YARA 가용 확인
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "yara --version"; echo yara_ready
      ```
      ## ✅ 합격 기준
      yara 버전 출력(yara_ready).
    hint: 'yara version'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "yara --version"; echo yara_ready
    answer_detail: "YARA = 파일/메모리 악성코드 시그니처 스캐너(el34-attacker 4.1.3)."
    verify:
      type: output_contains
      expect: 'yara_ready'
      field: stdout
      semantic: {intent: "yara 가용", success_criteria: ["버전"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 YARA 룰 작성 (strings/condition)
      ## 📖 개념 한 줄
      YARA 룰은 strings(찾을 문자열/바이트) + condition(조합 논리)로 구성된다. 웹셸 특징 문자열을 잡는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; cat /tmp/sa04.yar; rm -f /tmp/sa04.yar'
      ```
      ## ✅ 합격 기준
      룰의 condition 섹션이 보이면 구조 이해.
      ## 🔧 도구 풀이
      - `$shell="system($_GET"` + `$tag="<?php"`, condition `$shell and $tag` = PHP 웹셸 특징 조합.
    hint: 'strings/condition'
    category: manipulation
    points: 14
    answer: |
      echo "=== YARA 룰 작성 ==="
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; cat /tmp/sa04.yar; rm -f /tmp/sa04.yar'
      echo "→ strings(특징 문자열)+condition(조합). 웹셸은 system($_GET + <?php 조합으로 식별"
    answer_detail: "YARA 룰 = strings(찾을 패턴)+condition(논리). 웹셸 특징 문자열 조합으로 탐지."
    verify:
      type: output_contains
      expect: 'condition'
      field: stdout
      semantic: {intent: "YARA 구조", success_criteria: ["strings/condition"], acceptable_methods: ["**[OSS] yara rule (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 웹셸 샘플 탐지 (진탐)
      ## 📖 개념 한 줄
      악성 웹셸 샘플을 YARA로 스캔해 룰이 매칭(탐지)되는지 본다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php; yara /tmp/sa04.yar /tmp/sa04_shell.php; rm -f /tmp/sa04.yar /tmp/sa04_shell.php'
      ```
      ## ✅ 합격 기준
      `webshell_php /tmp/sa04_shell.php` 매칭이 출력되면 진탐 성공.
      ## 🔧 도구 풀이
      - `yara <룰> <파일>` → 매칭 시 `룰이름 파일경로` 출력. 출력 = 탐지.
    hint: 'yara 스캔 매칭'
    category: manipulation
    points: 16
    answer: |
      echo "=== 웹셸 샘플 탐지 (진탐) ==="
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyBlY2hvICJvayI7ID8+Cg== | base64 -d > /tmp/sa04_shell.php; yara /tmp/sa04.yar /tmp/sa04_shell.php; rm -f /tmp/sa04.yar /tmp/sa04_shell.php'
      echo "→ webshell_php 매칭 = 진탐. 웹셸의 특징 문자열을 시그니처로 잡음"
    answer_detail: "진탐 = 악성 웹셸 샘플을 YARA 룰이 매칭. 출력 'webshell_php <파일>'이 탐지 증거. 샘플 self-clean."
    verify:
      type: output_contains
      expect: 'webshell_php'
      field: stdout
      semantic: {intent: "웹셸 탐지", success_criteria: ["매칭"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 정상 파일 미탐 (오탐 0)
      ## 📖 개념 한 줄
      좋은 룰은 악성은 잡고 정상은 안 잡는다 — 정상 PHP 파일을 스캔해 매칭이 없어야(오탐 0) 한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php; yara /tmp/sa04.yar /tmp/sa04_ok.php; echo "no_false_positive"; rm -f /tmp/sa04.yar /tmp/sa04_ok.php'
      ```
      ## ✅ 합격 기준
      정상 파일에 매칭이 없고 `no_false_positive`가 출력되면 오탐 0.
    hint: '오탐 0'
    category: manipulation
    points: 12
    answer: |
      echo "=== 정상 파일 미탐 (오탐 0) ==="
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; echo ZWNobyAidGhpcyBpcyBhIG5vcm1hbCBwaHAgZmlsZSI7IHBocGluZm8oKTsK | base64 -d > /tmp/sa04_ok.php; yara /tmp/sa04.yar /tmp/sa04_ok.php; echo "no_false_positive"; rm -f /tmp/sa04.yar /tmp/sa04_ok.php'
      echo "→ 정상 파일은 매칭 없음(yara 출력 비어있음)+no_false_positive. 진탐과 오탐0의 균형이 좋은 룰"
    answer_detail: "오탐 0 = 정상 PHP는 룰에 안 걸림(yara 출력 없음). 진탐(웹셸)+오탐0(정상)이 룰 품질."
    verify:
      type: output_contains
      expect: 'no_false_positive'
      field: stdout
      semantic: {intent: "오탐 0", success_criteria: ["정상 미탐"], acceptable_methods: ["**[OSS] yara (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 메모리/디렉토리 스캔
      ## 📖 개념 한 줄
      YARA는 파일뿐 아니라 디렉토리 재귀(-r)·실행 중 프로세스 메모리(-p PID)도 스캔한다 — 디스크에 없는
      파일리스 악성코드도 메모리에서 잡는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; yara -r /tmp/sa04.yar /tmp 2>/dev/null; echo "dir_scanned"; rm -f /tmp/sa04.yar'
      ```
      ## ✅ 합격 기준
      디렉토리 재귀 스캔이 수행되면(dir_scanned) 통과.
      ## 🔧 도구 풀이
      - `yara -r <룰> <디렉토리>` = 재귀 스캔. `-p <PID>` = 프로세스 메모리 스캔(파일리스 탐지).
    hint: 'yara -r / -p'
    category: analysis
    points: 12
    answer: |
      echo "=== 메모리/디렉토리 스캔 ==="
      docker exec el34-attacker sh -c 'echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/sa04.yar; yara -r /tmp/sa04.yar /tmp 2>/dev/null; echo "dir_scanned"; rm -f /tmp/sa04.yar'
      echo "→ -r 재귀(디렉토리 전체)·-p PID(프로세스 메모리). 파일리스 악성코드는 메모리 스캔으로"
    answer_detail: "확장 스캔 = yara -r(디렉토리 재귀)·-p PID(메모리). 디스크에 없는 파일리스 악성코드도 메모리에서 탐지."
    verify:
      type: output_contains
      expect: 'dir_scanned'
      field: stdout
      semantic: {intent: "확장 스캔", success_criteria: ["재귀/메모리"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 탐지 파이프라인 통합 — 업로드 디렉토리 재귀 스캔
      ## 💻 실행 명령 (업로드 디렉토리에 웹셸을 두고 재귀 YARA 스캔 실행)
      ```bash
      docker exec el34-attacker sh -c 'mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php; echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar; echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done; rm -rf /tmp/y4 /tmp/y4.yar'
      ```
      ## ✅ 합격 기준
      업로드 디렉토리를 재귀 YARA 스캔해 웹셸을 **실제 매칭**하면(pipeline_done) 통과.
      ## 🔧 도구 풀이
      - 파이프라인: 업로드 디렉토리/FIM 트리거 YARA 스캔→Wazuh 경보, CI 이미지 스캔. YARA는 FIM·SIEM·CI와 엮음.
    hint: 'YARA 통합'
    category: report
    points: 12
    answer: |
      echo "=== YARA 탐지 파이프라인 통합 — 업로드 디렉토리 재귀 스캔 ==="
      docker exec el34-attacker sh -c 'mkdir -p /tmp/y4; echo PD9waHAgc3lzdGVtKCRfR0VUWyJjIl0pOyA/Pgo= | base64 -d > /tmp/y4/upload_shell.php; echo cnVsZSB3ZWJzaGVsbF9waHAgewogIHN0cmluZ3M6CiAgICAkc2hlbGwgPSAic3lzdGVtKCRfR0VUIgogICAgJHRhZyA9ICI8P3BocCIKICBjb25kaXRpb246CiAgICAkc2hlbGwgYW5kICR0YWcKfQo= | base64 -d > /tmp/y4.yar; echo "업로드 디렉토리 재귀 YARA 스캔:"; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null; yara -r /tmp/y4.yar /tmp/y4 2>/dev/null | grep -q webshell_php && echo "웹셸 매칭→Wazuh 경보 파이프라인" && echo pipeline_done; rm -rf /tmp/y4 /tmp/y4.yar'
      echo "→ 업로드 디렉토리 재귀 YARA 스캔으로 웹셸 실매칭. FIM 트리거 스캔→Wazuh 경보, CI 이미지 스캔으로 파이프라인화"
    answer_detail: "통합 = 업로드 디렉토리 재귀 YARA 스캔으로 웹셸 실매칭. 가짜 echo 아닌 실스캔. FIM/SIEM/CI 파이프라인."
    verify:
      type: output_contains
      expect: 'pipeline_done'
      field: stdout
      semantic: {intent: "YARA 통합", success_criteria: ["재귀 스캔 매칭"], acceptable_methods: ["**[OSS] yara -r (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 룰 정교화 (회피 대응) — 다중 문자열 condition 실검증
