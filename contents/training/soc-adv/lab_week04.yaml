      M=$(yara /tmp/y4rp.yar /tmp/y4rp.php | grep -c webshell_php); echo "# W04 YARA 보고서 — 진탐(매칭 ${M}건)/오탐0·재귀스캔·파이프라인/정교화"; [ "$M" -ge 1 ] && echo yara_report_done
