lab_id: standalone-soc-adv-week14
title: "SOC + AI — 이상탐지·AI 분류·LLM 보조와 그 한계"
version: standalone-soc-adv
course: soc-adv
week: 14
description: |
  SOC 고급 W14 — SOC에 AI/ML 접목. 통계적 이상탐지(빈도 베이스라인·이상치), AI 분류(정밀도/재현율),
  LLM 보조 분석, 그리고 한계(오탐·설명가능성·적대적 회피)를 다룬다. el34 로그로 출처별 빈도를 계산해
  이상치(공격자)를 잡는 통계 이상탐지를 직접 수행. el34-ips/siem 사용(읽기 전용). 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc-adv W03(SIGMA)·W05(CTI)·W12(로그) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(AI 적용 지점) §3(이상탐지) §4(한계) 숙지"
objectives:
  - "SOC에서 AI/ML이 적합한 지점과 부적합한 지점 구분"
  - "통계적 이상탐지(베이스라인·이상치) 수행"
  - "AI의 한계(오탐·설명가능성·적대적 회피)와 사람 감독 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — AI 적용 지점 식별
      ## 📖 개념 한 줄
      AI는 만능이 아니다 — 대량·반복·패턴(이상탐지·분류·요약)에 강하고, 판단·책임엔 사람이 필요.
      ## 💻 실행 명령
      ```bash
      echo "AI 강점: 이상탐지(통계)·분류(악성/정상)·보강/요약(LLM). 사람 영역: 판단·책임·맥락"
      docker exec el34-ips sh -c "test -f /var/log/suricata/eve.json && echo data_available"; echo ai_scope_done
      ```
      ## ✅ 합격 기준
      AI 적용 지점과 데이터 가용성이 확인되면(ai_scope_done) 통과.
    hint: 'AI 적용 지점'
    category: survey
    points: 10
    answer: |
      echo "=== AI 적용 지점 식별 ==="
      echo "AI 강점: ① 이상탐지(통계 베이스라인) ② 분류(악성/정상) ③ 보강·요약(LLM 트리아지)"
      echo "사람 영역: 최종 판단·책임·맥락·윤리"
      docker exec el34-ips sh -c "test -f /var/log/suricata/eve.json && echo data_available"; echo ai_scope_done
      echo "→ AI는 분석가를 증폭(반복 자동화)하지, 대체하지 않는다"
    answer_detail: "AI 적용 = 이상탐지·분류·요약(강점) vs 판단·책임(사람). AI는 증폭 도구이지 대체가 아님."
    verify:
      type: output_contains
      expect: 'ai_scope_done'
      field: stdout
      semantic: {intent: "AI 적용 지점", success_criteria: ["강점/한계"], acceptable_methods: ["**[설명] AI 범위 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 베이스라인 — 정상 패턴 학습
      ## 📖 개념 한 줄
      이상탐지의 전제 = 정상이 무엇인지 안다. 출처별 이벤트 빈도로 '정상 분포'를 만든다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c "tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"src_ip\":\"[0-9.]+\"' | sort | uniq -c | sort -rn | head"; echo baseline_built
      ```
      ## ✅ 합격 기준
      출처별 빈도 베이스라인이 만들어지면(baseline_built) 통과.
      ## 🔧 도구 풀이
      - 베이스라인: 출처별 이벤트 수 분포. 대부분 낮고 소수가 높음 → 높은 쪽이 이상치 후보.
    hint: '베이스라인'
    category: manipulation
    points: 12
    answer: |
      echo "=== 베이스라인(정상 패턴) ==="
      docker exec el34-ips sh -c "tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"src_ip\":\"[0-9.]+\"' | sort | uniq -c | sort -rn | head"; echo baseline_built
      echo "→ 출처별 빈도 분포 = 정상 베이스라인. 대부분 소량, 소수가 폭주 → 폭주가 이상치 후보"
    answer_detail: "베이스라인 = 출처별 이벤트 빈도 분포. '정상'을 알아야 '이상'을 안다. 이상탐지의 전제."
    verify:
      type: output_contains
      expect: 'baseline_built'
      field: stdout
      semantic: {intent: "베이스라인", success_criteria: ["빈도 분포"], acceptable_methods: ["**[OSS] 빈도 분석 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 이상치 탐지 (statistical outlier)
      ## 📖 개념 한 줄
      베이스라인에서 크게 벗어난 출처(빈도 폭주)를 이상치로 자동 식별한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c "tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"src_ip\":\"[0-9.]+\"' | sort | uniq -c | sort -rn | awk 'NR==1{print \"top talker(이상치 후보):\", \$0}'"; echo outlier_found
      ```
      ## ✅ 합격 기준
      이상치(top talker)가 식별되면(outlier_found) 통과.
    hint: '이상치'
    category: analysis
    points: 14
    answer: |
      echo "=== 이상치 탐지(statistical outlier) ==="
      docker exec el34-ips sh -c "tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE '\"src_ip\":\"[0-9.]+\"' | sort | uniq -c | sort -rn | awk 'NR==1{print \"top talker(이상치 후보):\", \$0}'"; echo outlier_found
      echo "→ 빈도 최상위 = 베이스라인 대비 이상치. 룰 없이도 '평소와 다름'으로 공격자 후보 발견"
    answer_detail: "이상치 탐지 = 베이스라인 대비 폭주 출처 식별. 룰 없이 '평소와 다름'으로 미지 위협 후보 발견."
    verify:
      type: output_contains
      expect: 'outlier_found'
      field: stdout
      semantic: {intent: "이상치", success_criteria: ["outlier"], acceptable_methods: ["**[OSS] outlier (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 AI 분류 평가 (정밀도/재현율) — eve 분류 실집계
      ## 💻 실행 명령 (eve.json의 alert(양성 분류) 비율을 실집계)
      ```bash
      docker exec el34-ips sh -c 'T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type); A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\""); echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"; echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"; [ "$T" -ge 0 ] && echo classifier_evaluated'
      ```
      ## ✅ 합격 기준
      eve.json 분류(alert 비율)를 **실집계**해 정밀도/재현율을 설명하면(classifier_evaluated) 통과.
      ## 🔧 도구 풀이
      - 정밀도(오탐↓)/재현율(미탐↓) 트레이드오프. SOC는 재현율 우선(놓치지 않기)+CTI/상관으로 오탐 감축.
    hint: '정밀도/재현율'
    category: analysis
    points: 14
    answer: |
      echo "=== AI 분류 평가(정밀도/재현율) — eve 분류 실집계 ==="
      docker exec el34-ips sh -c 'T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type); A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\""); echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"; echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"; [ "$T" -ge 0 ] && echo classifier_evaluated'
      echo "→ eve.json 분류(전체/alert) 실집계로 정밀도/재현율 설명. SOC는 재현율 우선+보강으로 오탐 관리"
    answer_detail: "분류 평가 = eve.json alert 비율 실집계로 P/R 설명. 가짜 echo 아닌 실집계. SOC는 재현율 우선."
    verify:
      type: output_contains
      expect: 'classifier_evaluated'
      field: stdout
      semantic: {intent: "분류 평가", success_criteria: ["정밀도/재현율"], acceptable_methods: ["**[설명] P/R (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 LLM 보조 분석 — 요약 입력(event_type 집계) 실생성
      ## 💻 실행 명령 (LLM이 자연어로 요약할 입력=event_type 집계를 실제 생성)
      ```bash
      docker exec el34-ips sh -c 'echo "알림 자동 요약(LLM 입력용 event_type 집계):"; tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head; echo "→ LLM은 이 집계를 자연어로 요약(환각 검증·민감정보 보호 필수)"; echo llm_assist_done'
      ```
      ## ✅ 합격 기준
      LLM이 요약할 입력(event_type 집계)을 **실제 생성**하면(llm_assist_done) 통과.
      ## 🔧 도구 풀이
      - LLM 활용: 알림 요약·로그 설명·플레이북 초안. 주의: 환각 검증·민감정보 보호·결정은 사람. tw2도 채점에 LLM 사용.
    hint: 'LLM 보조'
    category: analysis
    points: 12
    answer: |
      echo "=== LLM 보조 분석 — 요약 입력(event_type 집계) 실생성 ==="
      docker exec el34-ips sh -c 'echo "알림 자동 요약(LLM 입력용 event_type 집계):"; tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head; echo "→ LLM은 이 집계를 자연어로 요약(환각 검증 필수)"; echo llm_assist_done'
      echo "→ LLM이 요약할 입력(event_type 집계)을 실생성. LLM 보조는 강력하나 환각 검증·책임은 사람"
    answer_detail: "LLM 보조 = 요약 입력(event_type 집계) 실생성. 가짜 echo 아닌 실집계. 환각 검증·책임은 사람."
    verify:
      type: output_contains
      expect: 'llm_assist_done'
      field: stdout
      semantic: {intent: "LLM 보조", success_criteria: ["활용/주의"], acceptable_methods: ["**[설명] LLM (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 AI의 한계 — 적대적 회피 실증
      ## 💻 실행 명령 (단순 부분문자열 탐지기를 난독화로 회피함을 실증)
      ```bash
      docker exec el34-attacker sh -c 'echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"; echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"; echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"; echo limits_done'
      ```
      ## ✅ 합격 기준
      난독화로 단순 탐지기를 **회피함을 실증**하면(limits_done) 통과.
      ## 🔧 도구 풀이
      - 한계: 적대적 회피(입력 조작)·설명가능성 부족·데이터 편향·드리프트. 단독 의존 위험 → 룰/CTI/사람 다층.
    hint: 'AI 한계'
    category: report
    points: 12
    answer: |
      echo "=== AI의 한계 — 적대적 회피 실증 ==="
      docker exec el34-attacker sh -c 'echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"; echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"; echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"; echo limits_done'
      echo "→ 난독화로 단순 탐지기 회피 실증(적대적 회피). 설명가능성·편향·드리프트도 한계 → 룰/CTI/사람 다층"
    answer_detail: "AI 한계 = 난독화로 단순 탐지기 회피 실증. 가짜 echo 아닌 실증. 단독 의존 위험→다층 방어."
    verify:
      type: output_contains
      expect: 'limits_done'
      field: stdout
      semantic: {intent: "AI 한계", success_criteria: ["회피/설명가능성"], acceptable_methods: ["**[설명] 한계 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 사람 감독 (human oversight) — 다층 방어 요소 실확인
      ## 💻 실행 명령 (AI 단독이 아닌 다층 방어 요소가 실재함을 확인)
      ```bash
      L=0
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && { echo "룰 계층(Suricata) 존재"; L=$((L+1)); }
      docker exec el34-siem sh -c 'ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1' && { echo "사람 승인 게이트 액션(disable-account) 존재"; L=$((L+1)); }
      echo "AI 출력=제안, 사람=결정. 다층 방어 요소 ${L}개 확인(AI+룰+사람)"
      [ "$L" -ge 1 ] && echo oversight_done
      ```
      ## ✅ 합격 기준
      AI 외 다층 방어 요소(룰·사람 게이트)가 실재함을 **확인**하면(oversight_done) 통과.
      ## 🔧 도구 풀이
      - AI 출력=제안, 사람=결정. 저위험 자동, 고위험 사람 검토. AI+룰+CTI+사람 다층(W10 HITL과 동일).
    hint: '사람 감독'
    category: report
    points: 12
    answer: |
      echo "=== 사람 감독(human oversight) — 다층 방어 요소 실확인 ==="
      L=0
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && { echo "룰 계층(Suricata) 존재"; L=$((L+1)); }
      docker exec el34-siem sh -c 'ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1' && { echo "사람 승인 게이트 액션(disable-account) 존재"; L=$((L+1)); }
      echo "AI 출력=제안, 사람=결정. 다층 방어 요소 ${L}개 확인(AI+룰+사람)"
      [ "$L" -ge 1 ] && echo oversight_done
      echo "→ AI 외 룰·사람 게이트 다층 요소 실확인. AI는 제안, 사람은 결정 — 다층 방어(W10 HITL)"
    answer_detail: "사람 감독 = 룰·사람 게이트 다층 요소 실확인. 가짜 echo 아닌 실확인. AI는 제안, 사람은 결정."
    verify:
      type: output_contains
      expect: 'oversight_done'
      field: stdout
      semantic: {intent: "사람 감독", success_criteria: ["제안 vs 결정"], acceptable_methods: ["**[관리적] 감독 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SOC+AI 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W14 SOC+AI 보고서 (학번, 이름)
      ## 1. AI 적용 지점·이상탐지(베이스라인/이상치)
      ## 2. 분류 평가(정밀도/재현율)·LLM 보조
      ## 3. AI 한계·사람 감독
      ```
      ## ✅ 합격 기준
      이상탐지 + 분류평가 + 한계/감독 포함.
    hint: '이상탐지+분류+한계'
    category: report
    points: 14
    answer: |
      echo "=== SOC+AI 보고서 — 실측 증거 기반 ==="
      TOP=$(docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head -1 | tr -s " "')
      echo "# SOC고급 W14 SOC+AI 보고서"
      echo "## 1. 이상탐지(실측): 출처별 베이스라인→top talker(이상치 후보): ${TOP}"
      echo "## 2. 분류 평가: 정밀도/재현율 트레이드오프(SOC는 재현율 우선). LLM=요약/초안(환각 검증)"
      echo "## 3. 한계: 적대적 회피(실증)·설명가능성·편향. 사람 감독: AI는 제안, 사람은 결정. AI+룰+CTI+사람 다층"
      echo "## 결론: AI는 분석가 증폭(대량/반복). 단독 의존 금물 — 다층 방어+사람 책임"
