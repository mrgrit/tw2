lab_id: standalone-soc-adv-week14
title: "SOC + AI — 이상탐지·AI 분류·LLM 보조와 그 한계"
version: standalone-soc-adv
course: soc-adv
week: 14
description: |
  SOC 고급 W14 — SOC에 AI/ML 접목. 통계적 이상탐지(빈도 베이스라인·이상치), AI 분류(정밀도/재현율),
  LLM 보조 분석, 그리고 한계(오탐·설명가능성·적대적 회피)를 다룬다. el34 로그로 출처별 빈도를 계산해
  이상치(공격자)를 잡는 통계 이상탐지를 직접 수행. el34-ips/siem 사용(읽기 전용). 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc-adv W03(SIGMA)·W05(CTI)·W12(로그) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(AI 적용 지점) §3(이상탐지) §4(한계) 숙지"
objectives:
  - "SOC에서 AI/ML이 적합한 지점과 부적합한 지점 구분"
  - "통계적 이상탐지(베이스라인·이상치) 수행"
  - "AI의 한계(오탐·설명가능성·적대적 회피)와 사람 감독 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — AI를 어디에 쓸지 식별한다 (만능이 아니다)
      > **이 단계에서 할 일:** AI의 강점/사람 영역을 정리하고, 이상탐지에 쓸 데이터(eve.json)가 있는지 본다.
      > **왜:** AI는 대량·반복·패턴(이상탐지·분류·요약)에 강하지만, 판단·책임·맥락은 사람의 몫이다.
      > 적합한 지점에만 써야 한다.

      ### ▷ 그대로 입력
      ```bash
      echo "AI 강점: 이상탐지(통계)·분류(악성/정상)·요약(LLM) / 사람 영역: 판단·책임·맥락"
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo data_available' && echo ai_scope_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      AI 강점: 이상탐지(통계)·분류(악성/정상)·요약(LLM) / 사람 영역: 판단·책임·맥락
      data_available
      ai_scope_done
      ```

      ### ▷ 결과 해석
      eve.json 데이터가 있으면 이번 주 이상탐지(통계)를 직접 돌릴 수 있다. AI는 분석가를 '증폭'하는
      도구이지 '대체'가 아니다 — 이 원칙이 STEP 6(한계)·STEP 7(사람 감독)에서 다시 강조된다.
    hint: 'AI 적용 지점'
    category: survey
    points: 10
    answer: |
      # 1) AI 강점·사람 영역 정리
      echo "AI 강점: 이상탐지(통계)·분류(악성/정상)·요약(LLM) / 사람 영역: 판단·책임·맥락"
      # 2) 데이터(eve.json) 있으면 AI 적용 범위 마커
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo data_available' && echo ai_scope_done
    answer_detail: "AI 적용 = 이상탐지·분류·요약(강점) vs 판단·책임(사람). AI는 증폭 도구이지 대체가 아님."
    verify:
      type: output_contains
      expect: 'ai_scope_done'
      field: stdout
      semantic: {intent: "AI 적용 지점", success_criteria: ["강점/한계"], acceptable_methods: ["**[설명] AI 범위 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 베이스라인: '정상'이 무엇인지 학습한다
      > **이 단계에서 할 일:** 출처(src_ip)별 이벤트 빈도 분포를 만든다(빈도 내림차순).
      > **왜:** 이상탐지의 전제는 '정상을 안다'이다. 대부분의 출처는 소량, 소수가 폭주하는 분포가 정상
      > 모양 — 이 분포가 베이스라인이다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-ips sh -c '
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"src_ip\":\"[0-9.]+\"" && echo baseline_built
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 분포는 환경마다 다름)
      ```
         1945 "src_ip":"10.20.30.202"
          991 "src_ip":"10.20.32.80"
           44 "src_ip":"10.20.31.1"
            3 "src_ip":"10.20.31.254"
      baseline_built
      ```

      ### ▷ 결과 해석
      대부분의 IP는 수십 건 이하인데 10.20.30.202가 1945건으로 압도적이다 = 베이스라인에서 크게 벗어난
      모양. 이 '평소와 다름'을 다음 단계에서 이상치로 자동 식별한다(룰 없이).
    hint: '베이스라인'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-ips sh -c '
        # 출처별 이벤트 빈도 분포 (베이스라인)
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head
        # 빈도 집계되면 베이스라인 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"src_ip\":\"[0-9.]+\"" && echo baseline_built
      '
    answer_detail: "베이스라인 = 출처별 이벤트 빈도 분포. '정상'을 알아야 '이상'을 안다. 이상탐지의 전제."
    verify:
      type: output_contains
      expect: 'baseline_built'
      field: stdout
      semantic: {intent: "베이스라인", success_criteria: ["빈도 분포"], acceptable_methods: ["**[OSS] 빈도 분석 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 이상치(outlier)를 자동으로 잡는다
      > **이 단계에서 할 일:** 빈도 최상위(top talker) 출처를 이상치 후보로 뽑는다.
      > **왜:** 베이스라인에서 크게 벗어난 폭주 출처는 룰이 없어도 '평소와 다름'만으로 공격자 후보가
      > 된다 — 미지의 위협을 통계로 잡는 방식.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-ips sh -c '
        TOP=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head -1)
        echo "top talker(이상치 후보): ${TOP}"
        [ -n "$TOP" ] && echo outlier_found
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      top talker(이상치 후보):    1945 "src_ip":"10.20.30.202"
      outlier_found
      ```

      ### ▷ 결과 해석
      10.20.30.202가 top talker = 이상치(여기선 공격자 컨테이너). 시그니처 룰이 그 공격을 몰라도 '빈도
      이상'만으로 후보를 좁힌다. 단 top talker가 항상 악성은 아니다(정상 프록시·백업도 폭주한다 → 사람 확인 필요).
    hint: '이상치'
    category: analysis
    points: 14
    answer: |
      docker exec el34-ips sh -c '
        # 빈도 최상위(top talker) = 이상치 후보
        TOP=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head -1)
        echo "top talker(이상치 후보): ${TOP}"
        # 이상치 식별되면 마커
        [ -n "$TOP" ] && echo outlier_found
      '
    answer_detail: "이상치 탐지 = 베이스라인 대비 폭주 출처 식별. 룰 없이 '평소와 다름'으로 미지 위협 후보 발견."
    verify:
      type: output_contains
      expect: 'outlier_found'
      field: stdout
      semantic: {intent: "이상치", success_criteria: ["outlier"], acceptable_methods: ["**[OSS] outlier (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — AI 분류의 정밀도/재현율을 데이터로 본다
      > **이 단계에서 할 일:** 전체 이벤트 수와 alert(양성으로 분류된) 수를 집계한다.
      > **왜:** 분류기는 정밀도(오탐↓)와 재현율(미탐↓)을 동시에 못 올리는 트레이드오프가 있다. 실데이터의
      > alert 비율로 이 개념을 감 잡는다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-ips sh -c '
        T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type)
        A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\"")
        echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"
        echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"
        [ "$T" -ge 0 ] && echo classifier_evaluated
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수치는 환경마다 다름)
      ```
      전체 이벤트 3000, alert(양성 분류) 49
      정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)
      classifier_evaluated
      ```

      ### ▷ 결과 해석
      3000건 중 49건만 alert로 분류됐다. 정밀도=이 49건 중 진짜 공격 비율, 재현율=실제 공격 중 49건에
      포함된 비율. SOC는 보통 '놓치면 큰일'이라 재현율(미탐 최소)을 우선하고, 늘어난 오탐은 튜닝으로 줄인다.
    hint: '정밀도/재현율'
    category: analysis
    points: 14
    answer: |
      docker exec el34-ips sh -c '
        # 전체 이벤트·alert(양성 분류) 수 실집계
        T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type)
        A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\"")
        echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"
        echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"
        # 실집계했으면 마커
        [ "$T" -ge 0 ] && echo classifier_evaluated
      '
    answer_detail: "분류 평가 = eve.json alert 비율 실집계로 P/R 설명. 가짜 echo 아닌 실집계. SOC는 재현율 우선."
    verify:
      type: output_contains
      expect: 'classifier_evaluated'
      field: stdout
      semantic: {intent: "분류 평가", success_criteria: ["정밀도/재현율"], acceptable_methods: ["**[설명] P/R (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — LLM 보조: 요약할 입력을 만든다
      > **이 단계에서 할 일:** LLM이 자연어로 요약할 입력(event_type별 집계)을 생성한다.
      > **왜:** LLM은 알림 요약·로그 설명·플레이북 초안에 유용하다. 단 LLM에 넣을 '구조화된 입력'을
      > 사람이 먼저 만들어 주고, 출력은 환각·민감정보를 검증해야 한다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-ips sh -c '
        echo "알림 자동 요약(LLM 입력용 event_type 집계):"
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head
        echo "→ LLM은 이 집계를 자연어로 요약(환각 검증·민감정보 보호 필수)"
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"event_type\":\"[a-z]+\"" && echo llm_assist_done
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 분포는 환경마다 다름)
      ```
      알림 자동 요약(LLM 입력용 event_type 집계):
         1023 "event_type":"http"
         1003 "event_type":"fileinfo"
          807 "event_type":"flow"
          118 "event_type":"tls"
           49 "event_type":"alert"
      → LLM은 이 집계를 자연어로 요약(환각 검증·민감정보 보호 필수)
      llm_assist_done
      ```

      ### ▷ 결과 해석
      이 집계를 LLM에 주면 "최근 3000건 중 HTTP 1023·alert 49건, 한 출처가 폭주…" 같은 자연어 요약을
      만든다(분석가 시간 절약). 단 LLM은 없는 사실을 지어낼(환각) 수 있어, 요약은 원본과 대조해 검증하고
      민감정보는 넣지 않는다. 결정과 책임은 사람.
    hint: 'LLM 보조'
    category: analysis
    points: 12
    answer: |
      docker exec el34-ips sh -c '
        # LLM 요약 입력 = event_type 집계 실생성
        echo "알림 자동 요약(LLM 입력용 event_type 집계):"
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head
        echo "→ LLM은 이 집계를 자연어로 요약(환각 검증 필수)"
        # 집계 생성되면 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"event_type\":\"[a-z]+\"" && echo llm_assist_done
      '
    answer_detail: "LLM 보조 = 요약 입력(event_type 집계) 실생성. 가짜 echo 아닌 실집계. 환각 검증·책임은 사람."
    verify:
      type: output_contains
      expect: 'llm_assist_done'
      field: stdout
      semantic: {intent: "LLM 보조", success_criteria: ["활용/주의"], acceptable_methods: ["**[설명] LLM (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — AI의 한계: 입력 조작으로 회피된다 (적대적 회피)
      > **이 단계에서 할 일:** 평문 SQLi와 난독화 SQLi를 '단순 부분문자열 탐지기'(grep)에 넣어, 난독화가
      > 탐지를 회피하는 걸 직접 본다.
      > **왜:** AI/단순 탐지기는 입력을 조작(난독화)하면 회피될 수 있다. 한 가지 탐지에만 의존하면
      > 위험하다는 걸 손으로 확인한다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-attacker sh -c '
        echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"
        echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" || echo limits_done
      '
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      적대적 회피 실증(단순 부분문자열 탐지 대상):
        평문 UNION SELECT: 탐지됨
        난독화: 단순 매칭 회피(정규화 WAF는 잡음)
      limits_done
      ```

      ### ▷ 결과 해석
      평문 `UNION SELECT`는 grep에 잡히지만, 주석을 끼운 `UN/**/ION SE/**/LECT`는 grep을 회피한다 =
      단순 탐지기는 난독화에 약하다. (주의: 출력 끝의 "정규화 WAF는 잡음"은 이론적 기대일 뿐 — el34의
      실제 ModSec CRS 에서는 이 주석 난독화가 WAF 도 우회하는 것이 attack 트랙에서 확인됐다. 즉 '정규화면
      다 잡힌다'는 과신이며, 그래서 다층 방어와 사람 감독이 필요하다 → STEP 7.)
    hint: 'AI 한계'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 적대적 회피 실증 (평문 vs 난독화)
        echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"
        echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"
        # 난독화가 단순 매칭 회피 시 한계 실증 마커
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" || echo limits_done
      '
    answer_detail: "AI 한계 = 난독화로 단순 탐지기 회피 실증(grep 실패 게이트). 가짜 echo 아님. 단독 의존 위험→다층."
    verify:
      type: output_contains
      expect: 'limits_done'
      field: stdout
