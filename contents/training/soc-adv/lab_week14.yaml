lab_id: standalone-soc-adv-week14
title: "SOC + AI — 이상탐지·AI 분류·LLM 보조와 그 한계"
version: standalone-soc-adv
course: soc-adv
week: 14
description: |
  SOC 고급 W14 — SOC에 AI/ML 접목. 통계적 이상탐지(빈도 베이스라인·이상치), AI 분류(정밀도/재현율),
  LLM 보조 분석, 그리고 한계(오탐·설명가능성·적대적 회피)를 다룬다. el34 로그로 출처별 빈도를 계산해
  이상치(공격자)를 잡는 통계 이상탐지를 직접 수행. el34-ips/siem 사용(읽기 전용). 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "soc-adv W03(SIGMA)·W05(CTI)·W12(로그) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(AI 적용 지점) §3(이상탐지) §4(한계) 숙지"
objectives:
  - "SOC에서 AI/ML이 적합한 지점과 부적합한 지점 구분"
  - "통계적 이상탐지(베이스라인·이상치) 수행"
  - "AI의 한계(오탐·설명가능성·적대적 회피)와 사람 감독 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 AI 적용 지점 식별
      **실습 의미:** AI는 만능이 아니다 — 대량·반복·패턴(이상탐지·분류·요약)에 강하고 판단·책임엔 사람이 필요하다. AI에 쓸 데이터가 있는지부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) AI의 강점·사람 영역을 정리한다 (개념)
      echo "AI 강점: 이상탐지(통계)·분류(악성/정상)·요약(LLM) / 사람 영역: 판단·책임·맥락"
      # 2) 이상탐지에 쓸 데이터(eve.json)가 있으면 AI 적용 범위 확인 마커
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo data_available' && echo ai_scope_done
      ```
      ## ✅ 합격 기준
      `ai_scope_done` 출력 시 통과. **근거:** 마커는 이상탐지에 쓸 데이터(eve.json)가 실제 존재할 때만 찍히므로, AI를 적용할 지점과 데이터 가용성이 확인됐음을 뜻한다.
    hint: 'AI 적용 지점'
    category: survey
    points: 10
    answer: |
      # 1) AI 강점·사람 영역 정리
      echo "AI 강점: 이상탐지(통계)·분류(악성/정상)·요약(LLM) / 사람 영역: 판단·책임·맥락"
      # 2) 데이터(eve.json) 있으면 AI 적용 범위 마커
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json && echo data_available' && echo ai_scope_done
    answer_detail: "AI 적용 = 이상탐지·분류·요약(강점) vs 판단·책임(사람). AI는 증폭 도구이지 대체가 아님."
    verify:
      type: output_contains
      expect: 'ai_scope_done'
      field: stdout
      semantic: {intent: "AI 적용 지점", success_criteria: ["강점/한계"], acceptable_methods: ["**[설명] AI 범위 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 베이스라인 — 정상 패턴 학습
      **실습 의미:** 이상탐지의 전제는 '정상이 무엇인지 안다'이다 — 출처(src_ip)별 이벤트 빈도로 정상 분포를 만든다(대부분 소량, 소수가 폭주).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 베이스라인: 출처별 이벤트 빈도 분포를 만든다 (빈도 내림차순 상위)
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head
        # 출처 빈도가 실제 집계되면 베이스라인 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"src_ip\":\"[0-9.]+\"" && echo baseline_built
      '
      ```
      ## ✅ 합격 기준
      `baseline_built`(과 빈도 분포)가 출력되면 통과. **근거:** 마커는 출처별 빈도가 실제 집계될 때만 찍히므로, '정상' 분포(베이스라인)가 만들어졌음을 뜻한다.
    hint: '베이스라인'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-ips sh -c '
        # 출처별 이벤트 빈도 분포 (베이스라인)
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head
        # 빈도 집계되면 베이스라인 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"src_ip\":\"[0-9.]+\"" && echo baseline_built
      '
    answer_detail: "베이스라인 = 출처별 이벤트 빈도 분포. '정상'을 알아야 '이상'을 안다. 이상탐지의 전제."
    verify:
      type: output_contains
      expect: 'baseline_built'
      field: stdout
      semantic: {intent: "베이스라인", success_criteria: ["빈도 분포"], acceptable_methods: ["**[OSS] 빈도 분석 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 이상치 탐지 (statistical outlier)
      **실습 의미:** 베이스라인에서 크게 벗어난 출처(빈도 폭주=top talker)를 이상치로 자동 식별한다 — 룰 없이도 '평소와 다름'으로 공격자 후보를 찾는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 베이스라인 대비 빈도 최상위(top talker)를 이상치 후보로 뽑는다
        TOP=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head -1)
        echo "top talker(이상치 후보): ${TOP}"
        # 이상치를 실제 식별했으면 마커
        [ -n "$TOP" ] && echo outlier_found
      '
      ```
      ## ✅ 합격 기준
      `outlier_found`(과 top talker)가 출력되면 통과. **근거:** 마커는 빈도 최상위 출처가 실제 산출될 때만 찍히므로, 베이스라인 대비 이상치(공격자 후보)를 식별했음을 뜻한다.
    hint: '이상치'
    category: analysis
    points: 14
    answer: |
      docker exec el34-ips sh -c '
        # 빈도 최상위(top talker) = 이상치 후보
        TOP=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"src_ip\":\"[0-9.]+\"" | sort | uniq -c | sort -rn | head -1)
        echo "top talker(이상치 후보): ${TOP}"
        # 이상치 식별되면 마커
        [ -n "$TOP" ] && echo outlier_found
      '
    answer_detail: "이상치 탐지 = 베이스라인 대비 폭주 출처 식별. 룰 없이 '평소와 다름'으로 미지 위협 후보 발견."
    verify:
      type: output_contains
      expect: 'outlier_found'
      field: stdout
      semantic: {intent: "이상치", success_criteria: ["outlier"], acceptable_methods: ["**[OSS] outlier (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 AI 분류 평가 (정밀도/재현율)
      **실습 의미:** 분류기는 정밀도(오탐↓)와 재현율(미탐↓)의 트레이드오프를 가진다 — eve.json의 alert(양성 분류) 비율을 실집계해 이 개념을 데이터로 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 전체 이벤트 수와 alert(양성 분류) 수를 실집계한다
        T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type)
        A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\"")
        echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"
        echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"
        # 분류를 실집계했으면 마커
        [ "$T" -ge 0 ] && echo classifier_evaluated
      '
      ```
      ## ✅ 합격 기준
      `classifier_evaluated`(과 분류 수)가 출력되면 통과. **근거:** 마커는 eve.json 분류(전체/alert)를 실집계했을 때 찍히므로, 정밀도/재현율 트레이드오프를 실데이터로 평가했음을 뜻한다.
    hint: '정밀도/재현율'
    category: analysis
    points: 14
    answer: |
      docker exec el34-ips sh -c '
        # 전체 이벤트·alert(양성 분류) 수 실집계
        T=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c event_type)
        A=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "\"event_type\":\"alert\"")
        echo "전체 이벤트 ${T}, alert(양성 분류) ${A}"
        echo "정밀도=alert 중 진짜 비율, 재현율=진짜 중 잡은 비율(트레이드오프)"
        # 실집계했으면 마커
        [ "$T" -ge 0 ] && echo classifier_evaluated
      '
    answer_detail: "분류 평가 = eve.json alert 비율 실집계로 P/R 설명. 가짜 echo 아닌 실집계. SOC는 재현율 우선."
    verify:
      type: output_contains
      expect: 'classifier_evaluated'
      field: stdout
      semantic: {intent: "분류 평가", success_criteria: ["정밀도/재현율"], acceptable_methods: ["**[설명] P/R (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 LLM 보조 분석 (요약 입력 생성)
      **실습 의미:** LLM은 알림 요약·로그 설명·플레이북 초안에 쓰인다 — LLM이 자연어로 요약할 입력(event_type 집계)을 실제 생성한다(환각 검증·결정은 사람).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # LLM이 자연어로 요약할 입력 = event_type별 집계를 실제 생성한다
        echo "알림 자동 요약(LLM 입력용 event_type 집계):"
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head
        echo "→ LLM은 이 집계를 자연어로 요약(환각 검증·민감정보 보호 필수)"
        # 요약 입력을 실제 생성했으면 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"event_type\":\"[a-z]+\"" && echo llm_assist_done
      '
      ```
      ## ✅ 합격 기준
      `llm_assist_done`(과 집계)이 출력되면 통과. **근거:** 마커는 event_type 집계(LLM 입력)가 실제 생성될 때만 찍히므로, LLM 보조의 입력을 만들었음을 뜻한다(요약 결과의 환각 검증·책임은 사람).
    hint: 'LLM 보조'
    category: analysis
    points: 12
    answer: |
      docker exec el34-ips sh -c '
        # LLM 요약 입력 = event_type 집계 실생성
        echo "알림 자동 요약(LLM 입력용 event_type 집계):"
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -oE "\"event_type\":\"[a-z]+\"" | sort | uniq -c | sort -rn | head
        echo "→ LLM은 이 집계를 자연어로 요약(환각 검증 필수)"
        # 집계 생성되면 마커
        tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -qoE "\"event_type\":\"[a-z]+\"" && echo llm_assist_done
      '
    answer_detail: "LLM 보조 = 요약 입력(event_type 집계) 실생성. 가짜 echo 아닌 실집계. 환각 검증·책임은 사람."
    verify:
      type: output_contains
      expect: 'llm_assist_done'
      field: stdout
      semantic: {intent: "LLM 보조", success_criteria: ["활용/주의"], acceptable_methods: ["**[설명] LLM (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 AI의 한계 — 적대적 회피 실증
      **실습 의미:** AI/단순 탐지기는 입력 조작(난독화)으로 회피될 수 있다 — 평문 SQLi와 난독화 SQLi를 단순 부분문자열 탐지기에 넣어 회피를 직접 실증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 적대적 회피 실증: 단순 부분문자열 탐지기에 평문/난독화 SQLi를 각각 넣어 본다
        echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"
        echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"
        # 난독화가 단순 매칭을 회피(grep 실패)하면 AI 한계(적대적 회피) 실증 마커
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" || echo limits_done
      '
      ```
      ## ✅ 합격 기준
      `limits_done` 출력 시 통과. **근거:** 마커는 난독화 입력이 단순 부분문자열 탐지를 실제 회피(grep 매칭 실패)할 때만 찍히므로, 적대적 회피라는 AI 한계를 실증했음을 뜻한다.
    hint: 'AI 한계'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 적대적 회피 실증 (평문 vs 난독화)
        echo "적대적 회피 실증(단순 부분문자열 탐지 대상):"
        echo "1 UNION SELECT pass" | grep -qi "union select" && echo "  평문 UNION SELECT: 탐지됨"
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" && echo "  난독화: 탐지됨" || echo "  난독화: 단순 매칭 회피(정규화 WAF는 잡음)"
        # 난독화가 단순 매칭 회피 시 한계 실증 마커
        echo "1 UN/**/ION SE/**/LECT" | grep -qi "union select" || echo limits_done
      '
    answer_detail: "AI 한계 = 난독화로 단순 탐지기 회피 실증(grep 실패 게이트). 가짜 echo 아님. 단독 의존 위험→다층."
    verify:
      type: output_contains
      expect: 'limits_done'
      field: stdout
      semantic: {intent: "AI 한계", success_criteria: ["회피/설명가능성"], acceptable_methods: ["**[설명] 한계 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 사람 감독 (human oversight)
      **실습 의미:** AI 출력은 제안이고 결정은 사람이다 — AI 단독이 아닌 다층 방어 요소(룰 계층·사람 승인 게이트)가 실재함을 확인한다(W10 HITL과 동일 원칙).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 다층 방어 요소 카운터 초기화
      L=0
      # 2) 룰 계층(Suricata eve.json)이 있으면 +1
      docker exec el34-ips sh -c 'test -f /var/log/suricata/eve.json' && { echo "룰 계층(Suricata) 존재"; L=$((L+1)); }
      # 3) 사람 승인 게이트 액션(disable-account)이 있으면 +1
      docker exec el34-siem sh -c 'ls /var/ossec/active-response/bin/disable-account >/dev/null 2>&1' && { echo "사람 승인 게이트 액션(disable-account) 존재"; L=$((L+1)); }
      # 4) AI 외 다층 방어 요소가 1개 이상이면 사람 감독 확인 마커
      echo "AI 출력=제안, 사람=결정. 다층 방어 요소 ${L}개 확인(AI+룰+사람)"
      [ "$L" -ge 1 ] && echo oversight_done
      ```
      ## ✅ 합격 기준
      `oversight_done`(과 요소 수)가 출력되면 통과. **근거:** 마커는 AI 외 다층 방어 요소(룰·사람 게이트)가 실제 1개 이상 존재할 때만 찍히므로, AI를 사람이 감독하는 다층 구조가 있음을 뜻한다.
    hint: '사람 감독'
    category: report
    points: 12
    answer: |
