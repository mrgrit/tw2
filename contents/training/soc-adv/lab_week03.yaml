lab_id: standalone-soc-adv-week03
title: "SIGMA 탐지 엔지니어링 — 벤더 독립 룰을 여러 백엔드로"
version: standalone-soc-adv
course: soc-adv
week: 3
description: |
  SOC 고급 W03 — SIGMA는 벤더 독립적 탐지 룰 표준(YAML). 한 번 작성한 탐지 로직을 Wazuh·Suricata 등 여러
  백엔드로 변환한다. el34의 ~/el34/sigma 룰(ssh-bruteforce·web-sqli·linux-suspicious-cmd)과 sigma2wazuh
  변환기로 탐지 엔지니어링(작성→변환→테스트→튜닝)을 실습. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W07(SIGMA) + soc-adv W01~W02 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SIGMA 구조) §3(변환) §4(튜닝) 숙지"
objectives:
  - "SIGMA 룰 구조(logsource/detection/condition) 해석"
  - "한 SIGMA를 여러 백엔드로 변환"
  - "탐지 엔지니어링 수명주기(작성→변환→테스트→튜닝)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 SIGMA 소스 확인
      **실습 의미:** 탐지 엔지니어링을 시작하려면 작업할 SIGMA 룰과 변환기가 환경에 있어야 한다 — 먼저 소스 존재부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) ~/el34/sigma의 룰 디렉터리와 sigma2wazuh.py 변환기가 있는지 ls로 확인한다
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null
      # 2) 소스 확인 완료 마커
      echo sigma_ready
      ```
      ## ✅ 합격 기준
      `sigma_ready` 출력 시 통과. **근거:** 룰·변환기가 실제로 있어야 ls가 성공하므로, 출력은 탐지 엔지니어링 작업 소스가 갖춰졌음을 뜻한다.
    hint: 'sigma 소스'
    category: survey
    points: 10
    answer: |
      # 1) 룰 디렉터리 + sigma2wazuh.py 변환기 존재 확인
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null
      # 2) 소스 확인 완료 마커
      echo sigma_ready
    answer_detail: "SIGMA 탐지 엔지니어링 소스 = ~/el34/sigma(룰 yml + sigma2wazuh.py 변환기)."
    verify:
      type: output_contains
      expect: 'sigma_ready'
      field: stdout
      semantic: {intent: "소스", success_criteria: ["룰/변환기"], acceptable_methods: ["**[OSS] ls (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SIGMA 룰 구조 읽기
      **실습 의미:** SIGMA 룰을 직접 열어 logsource(어떤 로그)+detection(찾을 패턴)+condition(조합 논리) 구조를 눈으로 익힌다 — 이걸 알아야 룰을 쓰고 튜닝할 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 의심 명령 탐지 룰(0003) 파일을 출력해 detection 키워드와 condition 논리를 확인한다
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
      ```
      ## ✅ 합격 기준
      `detection`(과 condition) 섹션이 출력되면 통과. **근거:** 룰 본문이 실제로 읽혔다는 뜻이라, SIGMA의 핵심 구성(패턴+논리)을 파악한 것이다.
    hint: 'detection/condition'
    category: manipulation
    points: 14
    answer: |
      # 1) 의심 명령 탐지 룰(0003) 출력 → detection/condition 확인
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
    answer_detail: "SIGMA 구조 = logsource+detection+condition. 0003은 권한상승/C2 의심 명령 탐지(벤더 독립)."
    verify:
      type: output_contains
      expect: 'detection'
      field: stdout
      semantic: {intent: "SIGMA 구조", success_criteria: ["detection/condition"], acceptable_methods: ["**[OSS] cat (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 탐지 룰 카탈로그 파악
      **실습 의미:** 현재 보유한 탐지 룰의 목록을 훑어 어떤 TTP(인증·웹·호스트)를 덮고 있는지 — 탐지 커버리지의 단위를 파악한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) sigma 룰 디렉터리의 각 yml에서 title을 뽑아 카탈로그(파일명: 제목)를 나열한다
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done
      # 2) 카탈로그 출력 완료 마커
      echo catalog_done
      ```
      ## ✅ 합격 기준
      `catalog_done`(과 룰 목록)이 출력되면 통과. **근거:** 룰들의 제목이 실제 나열됐다는 뜻이라, 보유 탐지 자산과 커버 TTP를 확인한 것이다.
    hint: '룰 카탈로그'
    category: recon
    points: 12
    answer: |
      # 1) 각 룰 yml의 title을 뽑아 카탈로그 나열
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done
      # 2) 카탈로그 출력 완료 마커
      echo catalog_done
    answer_detail: "탐지 룰 카탈로그 = SIGMA 룰 목록. 각 룰이 어떤 TTP를 덮는지 = 커버리지의 단위."
    verify:
      type: output_contains
      expect: 'catalog_done'
      field: stdout
      semantic: {intent: "룰 카탈로그", success_criteria: ["목록"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 다중 백엔드 변환 (SIGMA→Wazuh)
      **실습 의미:** 한 번 쓴 SIGMA 룰을 여러 SIEM/IDS 백엔드로 변환한다 — 같은 탐지 로직을 도구마다 다시 짜지 않는 것이 SIGMA의 핵심 가치.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) sigma2wazuh.py로 SIGMA 룰들을 Wazuh XML 룰로 변환하고, 생성된 rule id= 개수를 센다
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='
      # 2) 변환 완료 마커
      echo converted
      ```
      ## ✅ 합격 기준
      `converted`(과 변환된 룰 수)가 출력되면 통과. **근거:** SIGMA가 Wazuh 룰로 실제 변환됐다는 뜻이라, 한 로직을 여러 백엔드로 재사용하는 다중 백엔드가 입증된다.
    hint: 'sigma2wazuh'
    category: manipulation
    points: 14
    answer: |
      # 1) sigma2wazuh.py로 변환 → 생성된 rule id= 개수 집계
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='
      # 2) 변환 완료 마커
      echo converted
    answer_detail: "다중 백엔드 = 한 SIGMA를 Wazuh/Suricata 등으로 변환. 탐지 로직 한 번 작성, 여러 도구 적용."
    verify:
      type: output_contains
      expect: 'converted'
      field: stdout
      semantic: {intent: "백엔드 변환", success_criteria: ["변환"], acceptable_methods: ["**[OSS] sigma2wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 룰 테스트 (logtest 발화)
      **실습 의미:** 변환된 룰이 실제 로그에 발화하는지 wazuh-logtest로 검증한다 — 작성·변환만으로는 탐지를 보장하지 못한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 샘플 SSH 실패 로그를 wazuh-logtest에 넣어 발화 단계(Phase 3/id/level)를 본다 (logtest는 stderr 출력 → 2>&1 필요)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head -3'
      # 2) 같은 로그가 Phase 3(룰 발화)에 도달하면 테스트 통과 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo tested'
      ```
      ## ✅ 합격 기준
      `tested` 출력 시 통과. **근거:** 마커는 logtest가 Phase 3에서 룰을 발화시켰을 때만 찍히므로, 출력은 룰이 실제 로그에 동작함을 검증한다.
    hint: 'wazuh-logtest'
    category: manipulation
    points: 12
    answer: |
      # 1) 샘플 로그를 wazuh-logtest에 넣어 발화 단계 확인 (2>&1로 stderr 포함)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head -3'
      # 2) Phase 3(룰 발화) 도달 시에만 tested 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo tested'
    answer_detail: "룰 테스트 = wazuh-logtest(2>&1)로 실제 발화 검증. Phase 3 게이트 — 가짜 echo 아님."
    verify:
      type: output_contains
      expect: 'tested'
      field: stdout
      semantic: {intent: "룰 테스트", success_criteria: ["발화 검증"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 룰 튜닝 (오탐 감소)
      **실습 의미:** 룰이 발화하는지 확인한 뒤 정상까지 잡는 오탐을 filter로 줄인다 — 튜닝 없는 룰은 오탐 폭주로 결국 무시당한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 샘플 로그를 wazuh-logtest(2>&1)에 넣어 발화 단계(Phase/id/srcip)를 확인한다 (튜닝의 출발점)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4'
      # 2) 룰 발화가 확인되면 filter 추가 튜닝의 기준선이 선 것 → 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
      ```
      ## ✅ 합격 기준
      `tuned` 출력 시 통과. **근거:** 마커는 룰 발화가 실제 확인될 때만 찍히므로, 출력은 튜닝의 기준선(룰이 동작함)이 확보됐음을 뜻한다.
    hint: '튜닝'
    category: analysis
    points: 12
    answer: |
      # 1) wazuh-logtest(2>&1)로 발화 단계 확인 (튜닝 출발점)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4'
      # 2) 발화 확인 시에만 튜닝 기준선 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
    answer_detail: "튜닝 = wazuh-logtest 발화 실검증→filter 튜닝 기반. 가짜 echo 아닌 실검증. 작성→변환→테스트→튜닝 반복."
    verify:
      type: output_contains
      expect: 'tuned'
      field: stdout
      semantic: {intent: "튜닝", success_criteria: ["오탐 감소"], acceptable_methods: ["**[설명] 튜닝 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ATT&CK 커버리지 관리
      **실습 의미:** 보유 룰이 ATT&CK의 어느 기법을 덮는지 정량화한다 — 빈 칸(미커버 기법)이 다음에 만들 룰의 우선순위가 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIGMA 룰 개수를 센다
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      # 2) 룰에 박힌 ATT&CK technique 태그(t1xxx) 종류 수를 센다
      T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l)
      # 3) 커버리지 수치 출력 + 룰이 1개 이상이면 마커
      echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
      ```
      ## ✅ 합격 기준
      `coverage_managed`(과 룰/태그 수)가 출력되면 통과. **근거:** 룰·태그가 실제 집계됐다는 뜻이라, 탐지 커버리지를 숫자로 관리하고 공백을 식별할 수 있다.
    hint: '커버리지'
    category: report
    points: 12
    answer: |
      # 1) SIGMA 룰 개수
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      # 2) ATT&CK technique 태그(t1xxx) 종류 수
      T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l)
      # 3) 커버리지 수치 출력 + 룰 1개 이상이면 마커
      echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
    answer_detail: "커버리지 관리 = SIGMA 룰/ATT&CK 태그 실집계. 가짜 echo 아닌 실측. 빈 칸이 신규 룰 우선순위."
    verify:
      type: output_contains
      expect: 'coverage_managed'
      field: stdout
      semantic: {intent: "커버리지", success_criteria: ["ATT&CK 매핑"], acceptable_methods: ["**[표준] ATT&CK (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SIGMA 탐지 엔지니어링 보고서 작성
      **실습 의미:** 앞 단계의 실측(룰 수 등)을 인용한 보고서로 정리한다 — 탐지 엔지니어링 결과를 추적·재현 가능한 형태로 남긴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIGMA 룰 수를 다시 집계한다 (보고서 인용 근거)
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      # 2) 실측 룰 수를 인용한 탐지 엔지니어링 보고서 출력 (본문 상세는 학생이 보강)
      echo "# W03 SIGMA 보고서 — 구조/카탈로그·변환/테스트·튜닝/커버리지(실측 룰 ${R}개)"
      # 3) 실측 인용 보고서면 완료 마커
      [ "$R" -ge 1 ] && echo sigma_report_done
      ```
      ## ✅ 합격 기준
      `sigma_report_done` 출력 시 통과. **근거:** 실측 룰 수를 인용한 보고서가 생성될 때만 마커가 찍히므로, 출력은 증거 기반 보고가 작성됐음을 뜻한다.
    hint: '구조+변환+커버리지'
    category: report
    points: 14
    answer: |
      # 1) SIGMA 룰 수 재집계 (인용 근거)
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      # 2) 실측 룰 수 인용 보고서 출력
      echo "# W03 SIGMA 보고서 — 구조/카탈로그·변환/테스트·튜닝/커버리지(실측 룰 ${R}개)"
      # 3) 실측 인용 보고서면 완료 마커
      [ "$R" -ge 1 ] && echo sigma_report_done
    answer_detail: "SIGMA 보고 = 실측 SIGMA 룰 수 인용+변환/튜닝/커버리지. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'sigma_report_done'
      field: stdout
      semantic: {intent: "SIGMA 보고", success_criteria: ["구조/변환/커버리지"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
