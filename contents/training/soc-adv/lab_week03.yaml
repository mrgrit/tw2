lab_id: standalone-soc-adv-week03
title: "SIGMA 탐지 엔지니어링 — 벤더 독립 룰을 여러 백엔드로"
version: standalone-soc-adv
course: soc-adv
week: 3
description: |
  SOC 고급 W03 — SIGMA는 벤더 독립적 탐지 룰 표준(YAML). 한 번 작성한 탐지 로직을 Wazuh·Suricata 등 여러
  백엔드로 변환한다. el34의 ~/el34/sigma 룰(ssh-bruteforce·web-sqli·linux-suspicious-cmd)과 sigma2wazuh
  변환기로 탐지 엔지니어링(작성→변환→테스트→튜닝)을 실습. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W07(SIGMA) + soc-adv W01~W02 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SIGMA 구조) §3(변환) §4(튜닝) 숙지"
objectives:
  - "SIGMA 룰 구조(logsource/detection/condition) 해석"
  - "한 SIGMA를 여러 백엔드로 변환"
  - "탐지 엔지니어링 수명주기(작성→변환→테스트→튜닝)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SIGMA 소스 확인
      ## 💻 실행 명령
      ```bash
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null; echo sigma_ready
      ```
      ## ✅ 합격 기준
      SIGMA 룰·변환기 존재(sigma_ready).
    hint: 'sigma 소스'
    category: survey
    points: 10
    answer: |
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null; echo sigma_ready
    answer_detail: "SIGMA 탐지 엔지니어링 소스 = ~/el34/sigma(룰 yml + sigma2wazuh.py 변환기)."
    verify:
      type: output_contains
      expect: 'sigma_ready'
      field: stdout
      semantic: {intent: "소스", success_criteria: ["룰/변환기"], acceptable_methods: ["**[OSS] ls (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SIGMA 구조 — logsource/detection/condition
      ## 📖 개념 한 줄
      SIGMA 룰은 logsource(어떤 로그) + detection(찾을 패턴) + condition(조합 논리)으로 구성된다.
      ## 💻 실행 명령
      ```bash
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
      ```
      ## ✅ 합격 기준
      detection/condition 섹션이 보이면 구조 이해.
      ## 🔧 도구 풀이
      - 0003 = 권한상승/C2 관련 의심 명령 탐지 룰. detection의 keywords + condition으로 매칭.
    hint: 'detection/condition'
    category: manipulation
    points: 14
    answer: |
      echo "=== SIGMA 구조 (linux-suspicious-cmd) ==="
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
      echo "→ logsource(로그종류)+detection(패턴)+condition(논리). 벤더 독립 표준"
    answer_detail: "SIGMA 구조 = logsource+detection+condition. 0003은 권한상승/C2 의심 명령 탐지(벤더 독립)."
    verify:
      type: output_contains
      expect: 'detection'
      field: stdout
      semantic: {intent: "SIGMA 구조", success_criteria: ["detection/condition"], acceptable_methods: ["**[OSS] cat (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 탐지 룰 카탈로그
      ## 💻 실행 명령
      ```bash
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done; echo catalog_done
      ```
      ## ✅ 합격 기준
      룰 카탈로그(제목)가 나열되면 통과.
    hint: '룰 카탈로그'
    category: recon
    points: 12
    answer: |
      echo "=== SIGMA 룰 카탈로그 ==="
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done; echo catalog_done
      echo "→ ssh-bruteforce/web-sqli/linux-suspicious-cmd = 인증·웹·호스트 TTP 커버"
    answer_detail: "탐지 룰 카탈로그 = SIGMA 룰 목록. 각 룰이 어떤 TTP를 덮는지 = 커버리지의 단위."
    verify:
      type: output_contains
      expect: 'catalog_done'
      field: stdout
      semantic: {intent: "룰 카탈로그", success_criteria: ["목록"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 다중 백엔드 변환 (SIGMA→Wazuh)
      ## 📖 개념 한 줄
      한 번 쓴 SIGMA 룰을 여러 SIEM/IDS 백엔드로 변환 — 같은 탐지 로직을 도구마다 다시 안 짜도 된다.
      ## 💻 실행 명령
      ```bash
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='; echo converted
      ```
      ## ✅ 합격 기준
      SIGMA 룰이 Wazuh 룰로 변환되면(converted) 다중 백엔드 입증.
      ## 🔧 도구 풀이
      - sigma2wazuh.py = SIGMA→Wazuh XML 변환기. sigma CLI는 Suricata 등 다른 백엔드도 지원.
    hint: 'sigma2wazuh'
    category: manipulation
    points: 14
    answer: |
      echo "=== 다중 백엔드 변환 (SIGMA→Wazuh) ==="
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='; echo converted
      echo "→ 한 SIGMA → Wazuh 룰 변환. 같은 로직을 Suricata 백엔드로도(sigma convert -t suricata)"
    answer_detail: "다중 백엔드 = 한 SIGMA를 Wazuh/Suricata 등으로 변환. 탐지 로직 한 번 작성, 여러 도구 적용."
    verify:
      type: output_contains
      expect: 'converted'
      field: stdout
      semantic: {intent: "백엔드 변환", success_criteria: ["변환"], acceptable_methods: ["**[OSS] sigma2wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 룰 테스트 (logtest 발화)
      ## 📖 개념 한 줄
      변환된 룰이 실제 로그에 발화하는지 wazuh-logtest로 검증 — 작성·변환만으로는 탐지를 보장 못 한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 1 ssh2" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule id|level" | head -2'; echo tested
      ```
      ## ✅ 합격 기준
      logtest가 룰 발화를 보이면(tested) 룰 검증 완료.
    hint: 'wazuh-logtest'
    category: manipulation
    points: 12
    answer: |
      echo "=== 룰 테스트 (logtest) ==="
      docker exec el34-siem sh -c 'echo "Jan 1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 1 ssh2" | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE "Rule id|level" | head -2'; echo tested
      echo "→ logtest로 발화·레벨 확인. 작성→변환→테스트가 탐지 엔지니어링의 검증 단계"
    answer_detail: "룰 테스트 = wazuh-logtest로 실제 로그에 발화 확인. 작성·변환만으로는 탐지 보장 안 됨."
    verify:
      type: output_contains
      expect: 'tested'
      field: stdout
      semantic: {intent: "룰 테스트", success_criteria: ["발화 검증"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 튜닝 (오탐 감소) — wazuh-logtest 발화 실검증
      ## 💻 실행 명령 (룰이 실제 발화하는지 logtest로 검증 → 튜닝 기반)
      ```bash
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
      ```
      ## ✅ 합격 기준
      wazuh-logtest로 룰 발화를 **실제 검증**하고 튜닝 기반을 확보하면(tuned) 통과.
      ## 🔧 도구 풀이
      - 튜닝: 발화 확인→detection filter(정상 제외)+condition 조정→재테스트. 튜닝 없는 룰은 오탐 폭주.
    hint: '튜닝'
    category: analysis
    points: 12
    answer: |
      echo "=== 룰 튜닝 — wazuh-logtest 발화 실검증 ==="
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
      echo "→ wazuh-logtest로 룰 발화(Phase 3, id) 실검증. 튜닝=발화 확인 후 filter로 오탐만 제외+재테스트"
    answer_detail: "튜닝 = wazuh-logtest 발화 실검증→filter 튜닝 기반. 가짜 echo 아닌 실검증. 작성→변환→테스트→튜닝 반복."
    verify:
      type: output_contains
      expect: 'tuned'
      field: stdout
      semantic: {intent: "튜닝", success_criteria: ["오탐 감소"], acceptable_methods: ["**[설명] 튜닝 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 커버리지 관리 — SIGMA 룰·ATT&CK 태그 실집계
      ## 💻 실행 명령 (SIGMA 룰 수와 ATT&CK technique 태그를 실제 집계)
      ```bash
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l); T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l); echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
      ```
      ## ✅ 합격 기준
      SIGMA 룰 수·ATT&CK 태그를 **실제 집계**해 커버리지를 정량화하면(coverage_managed) 통과.
      ## 🔧 도구 풀이
      - SIGMA tags(attack.txxxx)로 ATT&CK 매핑(T1110/T1190/T1059). 커버리지 맵의 빈 칸이 다음 룰 우선순위.
    hint: '커버리지'
    category: report
    points: 12
    answer: |
      echo "=== 커버리지 관리 — SIGMA 룰·ATT&CK 태그 실집계 ==="
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l); T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l); echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
      echo "→ SIGMA 룰 수·ATT&CK 태그 실집계로 커버리지 정량화. 빈 칸(미커버 technique)이 신규 룰 우선순위"
    answer_detail: "커버리지 관리 = SIGMA 룰/ATT&CK 태그 실집계. 가짜 echo 아닌 실측. 빈 칸이 신규 룰 우선순위."
    verify:
      type: output_contains
      expect: 'coverage_managed'
      field: stdout
      semantic: {intent: "커버리지", success_criteria: ["ATT&CK 매핑"], acceptable_methods: ["**[표준] ATT&CK (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SIGMA 탐지 엔지니어링 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W03 SIGMA 보고서 (학번, 이름)
      ## 1. SIGMA 구조·룰 카탈로그
      ## 2. 다중 백엔드 변환·룰 테스트
      ## 3. 튜닝·ATT&CK 커버리지
      ```
      ## ✅ 합격 기준
      구조 + 변환 + 커버리지 포함.
    hint: '구조+변환+커버리지'
    category: report
    points: 14
    answer: |
      echo "=== SIGMA 탐지 엔지니어링 보고서 — 실측 증거 기반 ==="
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      echo "# SOC고급 W03 SIGMA 탐지 엔지니어링 보고서"
      echo "## 1. SIGMA(실측 ${R}개 룰): logsource+detection+condition. 카탈로그(ssh-bruteforce/web-sqli/suspicious-cmd)"
      echo "## 2. 변환: sigma2wazuh로 Wazuh 룰 생성. wazuh-logtest로 발화 검증(실검증)"
      echo "## 3. 튜닝: detection filter로 오탐 감소. ATT&CK(T1110/T1190/T1059) 커버리지 관리"
      echo "## 결론: SIGMA는 벤더 독립 탐지 표준 — 작성→변환→테스트→튜닝으로 ATT&CK 커버리지 확장"
      [ "$R" -ge 1 ] && echo sigma_report_done
      echo "→ 보고서가 실측 SIGMA 룰 수를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "SIGMA 보고 = 실측 SIGMA 룰 수 인용+변환/튜닝/커버리지. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'sigma_report_done'
      field: stdout
      semantic: {intent: "SIGMA 보고", success_criteria: ["구조/변환/커버리지"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
