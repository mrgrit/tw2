lab_id: standalone-soc-adv-week03
title: "SIGMA 탐지 엔지니어링 — 벤더 독립 룰을 여러 백엔드로"
version: standalone-soc-adv
course: soc-adv
week: 3
description: |
  SOC 고급 W03 — SIGMA는 벤더 독립적 탐지 룰 표준(YAML). 한 번 작성한 탐지 로직을 Wazuh·Suricata 등 여러
  백엔드로 변환한다. el34의 ~/el34/sigma 룰(ssh-bruteforce·web-sqli·linux-suspicious-cmd)과 sigma2wazuh
  변환기로 탐지 엔지니어링(작성→변환→테스트→튜닝)을 실습. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W07(SIGMA) + soc-adv W01~W02 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SIGMA 구조) §3(변환) §4(튜닝) 숙지"
objectives:
  - "SIGMA 룰 구조(logsource/detection/condition) 해석"
  - "한 SIGMA를 여러 백엔드로 변환"
  - "탐지 엔지니어링 수명주기(작성→변환→테스트→튜닝)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 작업할 SIGMA 룰과 변환기가 있는지 확인
      > **이 단계에서 할 일:** 호스트의 ~/el34/sigma 에 SIGMA 룰 디렉터리와 변환기(sigma2wazuh.py)가
      > 있는지 ls로 본다.
      > **왜:** 탐지 엔지니어링은 '작성→변환→테스트→튜닝'인데, 그 출발점인 룰과 변환기가 환경에
      > 있어야 시작할 수 있다.

      ### ▷ 그대로 입력
      ```bash
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null
      echo sigma_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      /home/ccc/el34/sigma/sigma2wazuh.py

      /home/ccc/el34/sigma/rules/:
      0001-ssh-bruteforce.yml
      0002-web-sqli.yml
      0003-linux-suspicious-cmd.yml
      sigma_ready
      ```

      ### ▷ 결과 해석
      룰 3종(SSH 무차별 대입·웹 SQLi·리눅스 의심명령)과 변환기가 보이면 준비 완료. 이 룰들을 다음
      단계에서 읽고(STEP 2~3) Wazuh 백엔드로 변환(STEP 4)한다.
    hint: 'sigma 소스'
    category: survey
    points: 10
    answer: |
      # 1) 룰 디렉터리 + sigma2wazuh.py 변환기 존재 확인
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py 2>/dev/null
      # 2) 소스 확인 완료 마커
      echo sigma_ready
    answer_detail: "SIGMA 탐지 엔지니어링 소스 = ~/el34/sigma(룰 yml + sigma2wazuh.py 변환기)."
    verify:
      type: output_contains
      expect: 'sigma_ready'
      field: stdout
      semantic: {intent: "소스", success_criteria: ["룰/변환기"], acceptable_methods: ["**[OSS] ls (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — SIGMA 룰의 3대 구조를 직접 읽는다 (logsource/detection/condition)
      > **이 단계에서 할 일:** 의심 명령 탐지 룰(0003)을 열어 'logsource(어떤 로그)+detection(찾을
      > 패턴)+condition(조합 논리)' 구조를 눈으로 익힌다.
      > **왜:** 이 세 칸이 SIGMA의 전부다. 구조를 알아야 룰을 쓰고 오탐을 튜닝할 수 있다.

      ### ▷ 그대로 입력
      ```bash
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 일부)
      ```
      title: Suspicious Linux Reconnaissance/Download Command
      logsource:
          product: linux
          category: process_creation
      detection:
          selection_dl:
              keywords:
                  - 'wget http'
                  - 'curl http'
                  - 'chmod +x'
                  - '/etc/shadow'
                  - 'base64 -d'
          condition: selection_dl
      level: medium
      tags:
          - attack.t1059
      ```

      ### ▷ 결과 해석
      `logsource`=어디서 볼 로그(linux process_creation), `detection`=찾을 키워드 묶음(selection_dl),
      `condition`=그 묶음을 어떻게 조합할지(여기선 selection_dl 하나면 발화). `tags`의 attack.t1059는
      ATT&CK 매핑(Command and Scripting Interpreter). 이 구조라서 도구가 달라도 같은 로직을 변환할 수 있다.
    hint: 'detection/condition'
    category: manipulation
    points: 14
    answer: |
      # 1) 의심 명령 탐지 룰(0003) 출력 → detection/condition 확인
      cat ~/el34/sigma/rules/0003-linux-suspicious-cmd.yml
    answer_detail: "SIGMA 구조 = logsource+detection+condition. 0003은 권한상승/C2 의심 명령 탐지(벤더 독립)."
    verify:
      type: output_contains
      expect: 'detection'
      field: stdout
      semantic: {intent: "SIGMA 구조", success_criteria: ["detection/condition"], acceptable_methods: ["**[OSS] cat (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 보유 탐지 룰 카탈로그를 훑는다 (커버 TTP 파악)
      > **이 단계에서 할 일:** sigma 룰 디렉터리의 각 yml에서 title만 뽑아 '파일명: 제목' 목록을 만든다.
      > **왜:** 우리가 어떤 공격(인증·웹·호스트)을 덮고 있는지 = 탐지 커버리지의 단위를 한눈에 본다.

      ### ▷ 그대로 입력
      ```bash
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done
      echo catalog_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      0001-ssh-bruteforce.yml: title: SSH Brute Force - Repeated Failed Password
      0002-web-sqli.yml: title: Web SQL Injection Pattern in Access Log
      0003-linux-suspicious-cmd.yml: title: Suspicious Linux Reconnaissance/Download Command
      catalog_done
      ```

      ### ▷ 결과 해석
      세 룰이 각각 인증(SSH 무차별 대입)·웹(SQLi)·호스트(의심 명령)를 덮는다. 빠진 영역이 곧 다음에
      만들 룰의 우선순위(STEP 7의 커버리지 관리로 이어진다).
    hint: '룰 카탈로그'
    category: recon
    points: 12
    answer: |
      # 1) 각 룰 yml의 title을 뽑아 카탈로그 나열
      for r in ~/el34/sigma/rules/*.yml; do echo "$(basename $r): $(grep -m1 '^title:' $r)"; done
      # 2) 카탈로그 출력 완료 마커
      echo catalog_done
    answer_detail: "탐지 룰 카탈로그 = SIGMA 룰 목록. 각 룰이 어떤 TTP를 덮는지 = 커버리지의 단위."
    verify:
      type: output_contains
      expect: 'catalog_done'
      field: stdout
      semantic: {intent: "룰 카탈로그", success_criteria: ["목록"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 한 SIGMA를 다른 백엔드(Wazuh)로 변환한다
      > **이 단계에서 할 일:** sigma2wazuh.py로 SIGMA 룰들을 Wazuh XML 룰로 변환하고, 만들어진
      > 'rule id=' 개수를 센다.
      > **왜:** 같은 탐지 로직을 도구마다 다시 짜는 건 낭비다. 한 번 쓴 SIGMA를 변환해 여러 SIEM/IDS에
      > 재사용하는 것이 SIGMA의 핵심 가치.

      ### ▷ 그대로 입력
      ```bash
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='
      echo converted
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 룰 수는 환경마다 다름)
      ```
      3
      converted
      ```

      ### ▷ 결과 해석
      SIGMA 룰 3개가 Wazuh 룰 3개로 변환됐다(rule id= 3개). 같은 detection 로직이 Wazuh 문법으로
      자동 번역된 것 — 이게 '한 번 작성, 여러 백엔드'다. (실무에선 Suricata 등 다른 백엔드로도 같은 식.)
    hint: 'sigma2wazuh'
    category: manipulation
    points: 14
    answer: |
      # 1) sigma2wazuh.py로 변환 → 생성된 rule id= 개수 집계
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -cE 'rule id='
      # 2) 변환 완료 마커
      echo converted
    answer_detail: "다중 백엔드 = 한 SIGMA를 Wazuh/Suricata 등으로 변환. 탐지 로직 한 번 작성, 여러 도구 적용."
    verify:
      type: output_contains
      expect: 'converted'
      field: stdout
      semantic: {intent: "백엔드 변환", success_criteria: ["변환"], acceptable_methods: ["**[OSS] sigma2wazuh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 변환된 룰이 실제 로그에 발화하는지 검증한다 (logtest)
      > **이 단계에서 할 일:** 샘플 로그 한 줄을 wazuh-logtest에 넣어 디코딩→룰 발화(Phase 3)에
      > 도달하는지 본다.
      > **왜:** 룰을 쓰고 변환만 해서는 탐지를 보장하지 못한다. 실제 로그를 넣어 발화하는지 확인해야
      > '동작하는 룰'이다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head -3'
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo tested'
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 3: Completed filtering (rules).
          id: '5760'
          level: '5'
      tested
      ```

      ### ▷ 결과 해석
      Phase 3 도달 + rule id 5760(SSH 다중 인증 실패) + level 5 = 이 로그가 룰을 깨웠다는 뜻. (wazuh-logtest는
      라이브 SIEM을 안 건드리고 한 줄만 시험하는 도구 — 변환 결과 검증에 딱이다.)
    hint: 'wazuh-logtest'
    category: manipulation
    points: 12
    answer: |
      # 1) 샘플 로그를 wazuh-logtest에 넣어 발화 단계 확인 (2>&1로 stderr 포함)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head -3'
      # 2) Phase 3(룰 발화) 도달 시에만 tested 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo tested'
    answer_detail: "룰 테스트 = wazuh-logtest(2>&1)로 실제 발화 검증. Phase 3 게이트 — 가짜 echo 아님."
    verify:
      type: output_contains
      expect: 'tested'
      field: stdout
      semantic: {intent: "룰 테스트", success_criteria: ["발화 검증"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 오탐을 줄이는 튜닝의 기준선을 잡는다
      > **이 단계에서 할 일:** 룰이 발화하는 걸 다시 확인하고(튜닝의 출발점), 정상까지 잡는 오탐을
      > filter로 줄일 기준선을 세운다.
      > **왜:** 튜닝 없는 룰은 오탐 폭주로 결국 무시당한다. 먼저 '룰이 동작한다'는 기준선이 있어야
      > 거기서 filter로 정상만 빼낼 수 있다.

      ### ▷ 그대로 입력
      ```bash
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4'
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 1: Completed pre-decoding.
      **Phase 2: Completed decoding.
          srcip: '10.20.30.202'
      **Phase 3: Completed filtering (rules).
      룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)
      tuned
      ```

      ### ▷ 결과 해석
      발화가 확인되면(기준선) 거기서 튜닝한다: SIGMA 룰에 filter 묶음을 더하고 condition을
      'selection and not filter'로 바꿔 정상 패턴(예: 내부 점검 IP)을 제외한다. 작성→변환→테스트→튜닝의 마지막 고리.
    hint: '튜닝'
    category: analysis
    points: 12
    answer: |
      # 1) wazuh-logtest(2>&1)로 발화 단계 확인 (튜닝 출발점)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase|id:|srcip" | head -4'
      # 2) 발화 확인 시에만 튜닝 기준선 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "룰 발화 확인 → filter 추가로 오탐만 제외(튜닝)" && echo tuned'
    answer_detail: "튜닝 = wazuh-logtest 발화 실검증→filter 튜닝 기반. 가짜 echo 아닌 실검증. 작성→변환→테스트→튜닝 반복."
    verify:
      type: output_contains
      expect: 'tuned'
      field: stdout
      semantic: {intent: "튜닝", success_criteria: ["오탐 감소"], acceptable_methods: ["**[설명] 튜닝 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 탐지 커버리지를 숫자로 관리한다 (ATT&CK)
      > **이 단계에서 할 일:** 보유 SIGMA 룰 수와, 룰에 박힌 ATT&CK technique 태그(t1xxx) 종류 수를
      > 세어 커버리지를 정량화한다.
      > **왜:** "우리가 ATT&CK의 어느 기법을 덮는가"를 숫자로 알아야, 빈 칸(미커버 기법)을 다음
      > 룰의 우선순위로 삼을 수 있다.

      ### ▷ 그대로 입력
      ```bash
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l)
      echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 수치는 환경마다 다름)
      ```
      SIGMA 룰 3개, ATT&CK technique 태그 3종 커버
      coverage_managed
      ```

      ### ▷ 결과 해석
      룰 3개가 ATT&CK 3종 기법을 덮는다. ATT&CK 매트릭스에 이 3종을 칠하면 나머지 빈 칸이 보인다 —
      그 빈 칸이 곧 신규 룰 제작 우선순위. 이렇게 '커버리지'를 추적하는 게 탐지 엔지니어링의 운영이다.
    hint: '커버리지'
    category: report
    points: 12
    answer: |
      # 1) SIGMA 룰 개수
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      # 2) ATT&CK technique 태그(t1xxx) 종류 수
      T=$(grep -rhoiE "t1[0-9]{3}" ~/el34/sigma/rules/ 2>/dev/null | sort -u | wc -l)
      # 3) 커버리지 수치 출력 + 룰 1개 이상이면 마커
      echo "SIGMA 룰 ${R}개, ATT&CK technique 태그 ${T}종 커버"; [ "$R" -ge 1 ] && echo coverage_managed
    answer_detail: "커버리지 관리 = SIGMA 룰/ATT&CK 태그 실집계. 가짜 echo 아닌 실측. 빈 칸이 신규 룰 우선순위."
    verify:
      type: output_contains
      expect: 'coverage_managed'
      field: stdout
      semantic: {intent: "커버리지", success_criteria: ["ATT&CK 매핑"], acceptable_methods: ["**[표준] ATT&CK (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## STEP 8 — 탐지 엔지니어링 결과를 보고서로 남긴다
      > **이 단계에서 할 일:** 보유 SIGMA 룰 수를 다시 집계해, 그 수치를 인용한 보고서 골격을 출력한다.
      > **왜:** 탐지 엔지니어링은 '추적·재현 가능'해야 한다. 무엇을 몇 개 만들었고 어디를 덮는지
      > 실측을 인용해 남긴다.

      ### ▷ 그대로 입력
      ```bash
      R=$(ls ~/el34/sigma/rules/*.yml 2>/dev/null | wc -l)
      echo "# W03 SIGMA 보고서 — 구조/카탈로그·변환/테스트·튜닝/커버리지(실측 룰 ${R}개)"
      [ "$R" -ge 1 ] && echo sigma_report_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      # W03 SIGMA 보고서 — 구조/카탈로그·변환/테스트·튜닝/커버리지(실측 룰 3개)
      sigma_report_done
      ```

      ### ▷ 결과 해석
      보고서 한 줄 골격이다. 제출용은 여기에 STEP 2~7의 구체값(룰 구조, 변환된 Wazuh 룰 수, logtest
