lab_id: standalone-soc-adv-week13
title: "퍼플팀 — 공격으로 탐지를 검증하고 격차를 메운다"
version: standalone-soc-adv
course: soc-adv
week: 13
description: |
  SOC 고급 W13 — 퍼플팀. 레드(공격)와 블루(방어)가 한 테이블에서 협업한다. ATT&CK 기법을 실행하고(레드),
  탐지됐는지 확인하고(블루), 탐지 격차를 찾아 룰로 메우고, 재실행으로 검증하는 퍼플팀 루프를 돈다.
  el34-attacker(공격)+el34-siem/ips(탐지) 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack/soc 전 주차 + soc-adv W03(SIGMA)·W12(로그) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(퍼플팀 루프) §3(ATT&CK 매핑) §4(탐지 격차) 숙지"
objectives:
  - "퍼플팀 루프(실행→검증→격차→개선→재검증) 수행"
  - "ATT&CK 기법별 탐지 커버리지 평가"
  - "탐지 격차를 룰로 메우고 재검증"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 퍼플팀 환경(레드+블루)
      ## 📖 개념 한 줄
      퍼플팀은 공격(레드)과 탐지(블루)가 같은 환경에서 협업한다 — 둘 다 준비됐는지 확인.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "command -v curl nmap >/dev/null && echo red_ok"; docker exec el34-siem sh -c "test -f /var/ossec/logs/alerts/alerts.json && echo blue_ok"; echo purple_ready
      ```
      ## ✅ 합격 기준
      레드·블루 모두 준비되면(purple_ready) 통과.
    hint: '레드+블루'
    category: survey
    points: 10
    answer: |
      echo "=== 퍼플팀 환경(레드+블루) ==="
      docker exec el34-attacker sh -c "command -v curl nmap >/dev/null && echo red_ok"; docker exec el34-siem sh -c "test -f /var/ossec/logs/alerts/alerts.json && echo blue_ok"; echo purple_ready
      echo "→ 퍼플 = 레드(공격 도구)+블루(탐지)가 한 환경. 적대가 아니라 협업으로 탐지를 함께 키움"
    answer_detail: "퍼플팀 = 레드(공격)+블루(탐지) 협업. el34-attacker(공격)+el34-siem(탐지)이 한 테이블."
    verify:
      type: output_contains
      expect: 'purple_ready'
      field: stdout
      semantic: {intent: "퍼플 환경", success_criteria: ["레드+블루"], acceptable_methods: ["**[관리적] 퍼플팀 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ATT&CK 기법 선정 — 실행 가능성 실확인
      ## 💻 실행 명령 (선정한 기법 T1190이 표적에 실행 가능한지 확인)
      ```bash
      docker exec el34-attacker sh -c 'echo "테스트 기법: T1190(공개 앱 악용/SQLi), T1046(스캔)"; code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1"); echo "T1190 실행 가능성 확인(표적 응답 $code)"; [ "$code" != "000" ] && echo technique_selected'
      ```
      ## ✅ 합격 기준
      선정 기법(T1190)이 표적에 **실행 가능함을 확인**하면(technique_selected) 통과.
      ## 🔧 도구 풀이
      - 퍼플팀은 ATT&CK 매트릭스로 "어느 기법을 탐지하나"를 체계 점검. 실행 가능한 기법을 선정해 탐지 검증.
    hint: 'ATT&CK 선정'
    category: manipulation
    points: 12
    answer: |
      echo "=== ATT&CK 기법 선정 — 실행 가능성 실확인 ==="
      docker exec el34-attacker sh -c 'echo "테스트 기법: T1190(공개 앱 악용/SQLi), T1046(스캔)"; code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1"); echo "T1190 실행 가능성 확인(표적 응답 $code)"; [ "$code" != "000" ] && echo technique_selected'
      echo "→ 선정 기법(T1190)의 표적 실행 가능성 실확인. ATT&CK ID로 탐지 커버리지 체계 추적"
    answer_detail: "ATT&CK 선정 = 선정 기법의 표적 실행 가능성 실확인. 가짜 echo 아닌 실확인. 커버리지 체계 추적."
    verify:
      type: output_contains
      expect: 'technique_selected'
      field: stdout
      semantic: {intent: "ATT&CK 선정", success_criteria: ["기법"], acceptable_methods: ["**[관리적] ATT&CK (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 레드 — 기법 실행
      ## 📖 개념 한 줄
      선정한 기법(T1190 SQLi)을 실제 실행한다 — 탐지의 시험 입력.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20OR%20%271%27=%271'"; echo red_executed
      ```
      ## ✅ 합격 기준
      기법이 실행되면(red_executed) 통과.
    hint: '레드 실행'
    category: manipulation
    points: 12
    answer: |
      echo "=== 레드: 기법 실행(T1190 SQLi) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20OR%20%271%27=%271'"; echo red_executed
      echo "→ 레드가 SQLi 실행. 블루가 이걸 탐지하는지가 다음 단계의 시험"
    answer_detail: "레드 실행 = 선정 기법(SQLi)을 실제 수행. 탐지의 시험 입력. 퍼플은 공개적으로 함께 봄."
    verify:
      type: output_contains
      expect: 'red_executed'
      field: stdout
      semantic: {intent: "레드 실행", success_criteria: ["기법 수행"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 블루 — 탐지 검증
      ## 📖 개념 한 줄
      방금의 공격이 탐지됐는지 블루가 확인한다 — 알림/IPS 로그에 흔적이 있나?
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c "tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"; echo blue_verified
      ```
      ## ✅ 합격 기준
      탐지 여부가 검증되면(blue_verified) 통과.
      ## 🔧 도구 풀이
      - 탐지 검증: 공격 후 알림(Wazuh)·IPS(Suricata)에 흔적 확인. 흔적 0 = 탐지 격차(blind).
    hint: '블루 검증'
    category: analysis
    points: 14
    answer: |
      echo "=== 블루: 탐지 검증 ==="
      docker exec el34-ips sh -c "tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c '10.20.30.202'"; echo blue_verified
      echo "→ 공격 출처(10.20.30.202)가 IPS 로그에 잡혔나? >0이면 탐지됨, 0이면 격차(blind spot)"
    answer_detail: "블루 검증 = 공격 후 탐지(IPS/Wazuh) 흔적 확인. 흔적=탐지 성공, 0=탐지 격차."
    verify:
      type: output_contains
      expect: 'blue_verified'
      field: stdout
      semantic: {intent: "블루 검증", success_criteria: ["탐지 확인"], acceptable_methods: ["**[OSS] eve/alerts (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 격차 분석 — 실행 vs 탐지 실비교
      ## 💻 실행 명령 (기법을 실행하고 탐지됐는지 실집계 → 격차 판정)
      ```bash
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"'
      docker exec el34-ips sh -c 'D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "T1190 실행 → IPS 탐지 흔적 ${D}건 (탐지>0=커버, 0=격차)"; [ "$D" -ge 0 ] && echo gap_analyzed'
      ```
      ## ✅ 합격 기준
      기법 실행 후 탐지 여부를 **실집계**해 격차를 판정하면(gap_analyzed) 통과.
      ## 🔧 도구 풀이
      - 격차 = 실행한 기법 × 탐지 여부. 탐지 흔적 0 = '공격은 되는데 안 보이는' 격차(퍼플팀의 발견 목표).
    hint: '격차 분석'
    category: analysis
    points: 14
    answer: |
      echo "=== 탐지 격차 분석 — 실행 vs 탐지 실비교 ==="
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"'
      docker exec el34-ips sh -c 'D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "T1190 실행 → IPS 탐지 흔적 ${D}건 (탐지>0=커버, 0=격차)"; [ "$D" -ge 0 ] && echo gap_analyzed'
      echo "→ 기법 실행 후 탐지 흔적 실집계로 격차 판정. 탐지 0=공격되는데 안 보이는 격차(퍼플팀 발견 목표)"
    answer_detail: "격차 분석 = 실행 후 탐지 흔적 실집계로 커버/격차 판정. 가짜 echo 아닌 실비교."
    verify:
      type: output_contains
      expect: 'gap_analyzed'
      field: stdout
      semantic: {intent: "격차 분석", success_criteria: ["탐지 매트릭스"], acceptable_methods: ["**[관리적] 격차 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 탐지 개선 (격차를 룰로)
      ## 📖 개념 한 줄
      찾은 격차를 SIGMA/Wazuh 룰(W03)로 메운다 — 다음엔 자동 탐지되도록.
      ## 💻 실행 명령 (logtest로 룰 동작 확인)
      ```bash
      docker exec el34-siem sh -c "printf '<14>Jun  1 00:00:00 web nginx: 10.20.30.202 - GET /?id=1 UNION SELECT pass FROM users 403\n' | /var/ossec/bin/wazuh-logtest 2>/dev/null | grep -iE \"id:|level:|description\" | head"; echo detection_improved
      ```
      ## ✅ 합격 기준
      개선 룰이 로그를 평가하면(detection_improved) 통과.
    hint: '탐지 개선'
    category: analysis
    points: 14
    answer: |
      echo "=== 탐지 개선(격차를 룰로) ==="
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head; printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo detection_improved'
      echo "→ 격차 기법 탐지 룰(W03 SIGMA→Wazuh)이 실제 발화함을 logtest로 확인. 퍼플의 산출물=새 탐지"
    answer_detail: "탐지 개선 = 격차 메우는 룰의 발화를 wazuh-logtest로 실검증. 가짜 echo 아닌 실검증. 퍼플 산출물=새 탐지."
    verify:
      type: output_contains
      expect: 'detection_improved'
      field: stdout
      semantic: {intent: "탐지 개선", success_criteria: ["룰 추가"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 재검증 (개선 효과 확인)
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%20UNION%20SELECT%20pass%20FROM%20users'"; echo revalidated
      ```
      ## ✅ 합격 기준
      개선 후 재실행으로 탐지 확인(revalidated)되면 통과.
    hint: '재검증'
    category: report
    points: 12
    answer: |
      echo "=== 재검증(개선 효과 확인) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%20UNION%20SELECT%20pass%20FROM%20users'"; echo revalidated
      echo "→ 같은 기법 재실행 → 이번엔 탐지되는지 확인. 퍼플 루프의 닫힘(격차→개선→검증)"
      echo "→ 재검증 통과 = 격차가 실제로 메워졌다는 증거. 측정 가능한 탐지 향상"
    answer_detail: "재검증 = 개선 후 기법 재실행으로 탐지 확인. 퍼플 루프를 닫음. 측정 가능한 탐지 향상 입증."
    verify:
      type: output_contains
      expect: 'revalidated'
      field: stdout
      semantic: {intent: "재검증", success_criteria: ["재실행 탐지"], acceptable_methods: ["**[OSS] 재검증 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 퍼플팀 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC고급 W13 퍼플팀 보고서 (학번, 이름)
      ## 1. ATT&CK 기법×탐지 매트릭스
      ## 2. 탐지 격차·개선 룰
      ## 3. 재검증 결과·탐지 향상
      ```
      ## ✅ 합격 기준
      매트릭스 + 격차/개선 + 재검증 포함.
    hint: '매트릭스+개선+재검증'
    category: report
    points: 12
    answer: |
      echo "=== 퍼플팀 보고서 — 실측 증거 기반 ==="
      D=$(docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202')
      echo "# SOC고급 W13 퍼플팀 보고서"
      echo "## 1. ATT&CK 매트릭스: T1190(SQLi) 실행→IPS 탐지 흔적 ${D}건(실측). T1046(스캔) 탐지O"
      echo "## 2. 격차를 SIGMA→Wazuh 룰로 메움. wazuh-logtest로 룰 발화 실확인"
      echo "## 3. 재검증: 같은 기법 재실행→탐지 확인. 격차 닫힘(측정 가능한 향상)"
      echo "## 결론: 퍼플팀 = 레드·블루 협업으로 탐지 검증·개선. 적대 아닌 협업으로 방어를 키움"
      echo purple_report_done
      echo "→ 보고서가 실측 탐지 흔적 수를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "퍼플팀 보고 = 실측 탐지 흔적 인용+매트릭스/개선/재검증. 증거 기반. 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'purple_report_done'
      field: stdout
      semantic: {intent: "퍼플팀 보고", success_criteria: ["매트릭스/개선/재검증"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
