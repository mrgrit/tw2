lab_id: standalone-soc-adv-week13
title: "퍼플팀 — 공격으로 탐지를 검증하고 격차를 메운다"
version: standalone-soc-adv
course: soc-adv
week: 13
description: |
  SOC 고급 W13 — 퍼플팀. 레드(공격)와 블루(방어)가 한 테이블에서 협업한다. ATT&CK 기법을 실행하고(레드),
  탐지됐는지 확인하고(블루), 탐지 격차를 찾아 룰로 메우고, 재실행으로 검증하는 퍼플팀 루프를 돈다.
  el34-attacker(공격)+el34-siem/ips(탐지) 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack/soc 전 주차 + soc-adv W03(SIGMA)·W12(로그) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(퍼플팀 루프) §3(ATT&CK 매핑) §4(탐지 격차) 숙지"
objectives:
  - "퍼플팀 루프(실행→검증→격차→개선→재검증) 수행"
  - "ATT&CK 기법별 탐지 커버리지 평가"
  - "탐지 격차를 룰로 메우고 재검증"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 퍼플팀 환경(레드+블루)이 준비됐는지 확인
      > **이 단계에서 할 일:** 레드(공격 도구 curl·nmap)와 블루(탐지 증거 alerts.json)가 둘 다 있는지 본다.
      > **왜:** 퍼플팀은 공격(레드)과 탐지(블루)가 '적대'가 아니라 '협업'으로 같은 테이블에 앉아 탐지를
      > 함께 키운다. 그러려면 양쪽이 같은 환경에 준비돼 있어야 한다.

      ### ▷ 그대로 입력

      **실행 위치:** el34 **호스트** — 레드(el34-attacker)·블루(el34-siem) 두 컨테이너를 한 번에 점검하므로(`&&` 체인이 호스트 셸에서 평가), 컨테이너에 접속하지 않고 호스트에서 `docker exec` 로 실행한다.

      ```bash
      docker exec el34-attacker sh -c 'command -v curl nmap >/dev/null 2>&1 && echo red_ok'
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json && echo blue_ok'
      docker exec el34-attacker sh -c 'command -v curl nmap >/dev/null 2>&1' && docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && echo purple_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      red_ok
      blue_ok
      purple_ready
      ```

      ### ▷ 결과 해석
      red_ok(공격 측 도구)+blue_ok(방어 측 증거)가 둘 다 있으면 퍼플 루프(실행→검증→격차→개선→재검증)를
      돌 준비 완료. 레드는 el34-attacker, 블루는 el34-siem/ips를 본다.
    hint: '레드+블루'
    category: survey
    points: 10
    answer: |
      # 1) 레드 준비: curl·nmap 존재 확인
      docker exec el34-attacker sh -c 'command -v curl nmap >/dev/null 2>&1 && echo red_ok'
      # 2) 블루 준비: alerts.json 존재 확인
      docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json && echo blue_ok'
      # 3) 둘 다 준비됐으면 퍼플 환경 마커
      docker exec el34-attacker sh -c 'command -v curl nmap >/dev/null 2>&1' && docker exec el34-siem sh -c 'test -f /var/ossec/logs/alerts/alerts.json' && echo purple_ready
    answer_detail: "퍼플팀 = 레드(공격)+블루(탐지) 협업. el34-attacker(공격)+el34-siem(탐지)이 한 테이블."
    verify:
      type: output_contains
      expect: 'purple_ready'
      field: stdout
      semantic: {intent: "퍼플 환경", success_criteria: ["레드+블루"], acceptable_methods: ["**[관리적] 퍼플팀 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 검증할 ATT&CK 기법을 고른다 (실행 가능성 확인)
      > **이 단계에서 할 일:** 테스트할 기법(T1190 공개 앱 악용/SQLi)을 고르고, 표적에 실제 닿는지
      > 응답코드로 확인한다.
      > **왜:** 퍼플팀은 ATT&CK 매트릭스로 "어느 기법을 탐지하나"를 체계적으로 점검한다. 먼저 실행
      > 가능한 기법을 골라 탐지 검증의 대상으로 삼는다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo "테스트 기법: T1190(공개 앱 악용/SQLi), T1046(스캔)"
      code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1")
      echo "T1190 실행 가능성 확인(표적 응답 $code)"
      [ "$code" != "000" ] && echo technique_selected
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      테스트 기법: T1190(공개 앱 악용/SQLi), T1046(스캔)
      T1190 실행 가능성 확인(표적 응답 302)
      technique_selected
      ```

      ### ▷ 결과 해석
      응답코드가 000이 아니면(여기선 302) 표적에 닿는다는 뜻 = T1190을 실제로 실행해 탐지를 시험할 수
      있다. ATT&CK 기법 ID로 관리하면 '우리가 매트릭스의 어느 칸을 검증했나'를 체계적으로 추적한다.
    hint: 'ATT&CK 선정'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 테스트 기법 선정 (T1190 SQLi, T1046 스캔)
        echo "테스트 기법: T1190(공개 앱 악용/SQLi), T1046(스캔)"
        # T1190 표적 실행 가능성 확인
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1")
        echo "T1190 실행 가능성 확인(표적 응답 $code)"
        # 표적 응답 시 기법 선정 마커
        [ "$code" != "000" ] && echo technique_selected
      '
    answer_detail: "ATT&CK 선정 = 선정 기법의 표적 실행 가능성 실확인. 가짜 echo 아닌 실확인. 커버리지 체계 추적."
    verify:
      type: output_contains
      expect: 'technique_selected'
      field: stdout
      semantic: {intent: "ATT&CK 선정", success_criteria: ["기법"], acceptable_methods: ["**[관리적] ATT&CK (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 레드: 고른 기법을 실제 실행한다
      > **이 단계에서 할 일:** T1190 SQLi(`1' OR '1'='1`)를 표적에 전송한다.
      > **왜:** 이 공격이 블루의 탐지를 시험하는 '입력'이다. 퍼플은 이를 몰래가 아니라 공개적으로 함께
      > 본다(언제·무엇을 쐈는지 블루가 안다).

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%27%20OR%20%271%27=%271")
      echo "SQLi 실행 응답코드 $C"
      [ -n "$C" ] && echo red_executed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      SQLi 실행 응답코드 403
      red_executed
      ```

      ### ▷ 결과 해석
      403은 WAF가 이 SQLi를 차단했다는 뜻(차단돼도 '시도'는 로그에 남는다). 이제 블루가 이 시도를
      탐지했는지 다음 단계에서 확인한다.
    hint: '레드 실행'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 레드: T1190 SQLi 실제 전송
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%27%20OR%20%271%27=%271")
        echo "SQLi 실행 응답코드 $C"
        # 전송했으면 레드 실행 마커
        [ -n "$C" ] && echo red_executed
      '
    answer_detail: "레드 실행 = 선정 기법(SQLi)을 실제 수행. 탐지의 시험 입력. 퍼플은 공개적으로 함께 봄."
    verify:
      type: output_contains
      expect: 'red_executed'
      field: stdout
      semantic: {intent: "레드 실행", success_criteria: ["기법 수행"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 블루: 방금 공격이 탐지됐는지 확인한다
      > **이 단계에서 할 일:** IPS(Suricata) eve.json에서 공격 출처(10.20.30.202) 흔적 건수를 세어
      > 탐지 여부를 판정한다.
      > **왜:** 퍼플의 핵심 질문은 "방금 그게 우리 눈에 잡혔나?"다. 흔적 0이면 '공격은 되는데 안 보이는'
      > 탐지 격차(blind)다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202")
      echo "IPS 탐지 흔적 ${D}건 (>0=탐지, 0=격차)"
      [ "$D" -ge 0 ] && echo blue_verified
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      IPS 탐지 흔적 1940건 (>0=탐지, 0=격차)
      blue_verified
      ```

      ### ▷ 결과 해석
      흔적이 0보다 크면(여기선 1940건) IPS가 그 출처를 보고 있다 = 탐지 커버됨. 0이면 격차 — 그 기법을
      실행해도 안 보인다는 뜻이라 STEP 5~6에서 룰로 메워야 한다.
    hint: '블루 검증'
    category: analysis
    points: 14
    answer: |
      docker exec el34-ips sh -c '
        # 공격 출처(10.20.30.202) IPS 흔적 건수로 탐지 검증
        D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202")
        echo "IPS 탐지 흔적 ${D}건 (>0=탐지, 0=격차)"
        # 실집계했으면 블루 검증 마커
        [ "$D" -ge 0 ] && echo blue_verified
      '
    answer_detail: "블루 검증 = 공격 후 탐지(IPS/Wazuh) 흔적 확인. 흔적=탐지 성공, 0=탐지 격차."
    verify:
      type: output_contains
      expect: 'blue_verified'
      field: stdout
      semantic: {intent: "블루 검증", success_criteria: ["탐지 확인"], acceptable_methods: ["**[OSS] eve/alerts (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 탐지 격차를 분석한다 (실행 vs 탐지)
      > **이 단계에서 할 일:** 레드가 기법을 한 번 더 실행하고, 블루가 탐지 흔적을 집계해 '실행했는데
      > 보이나'를 판정한다.
      > **왜:** 격차는 '실행한 기법 × 탐지 여부'의 매트릭스다. 탐지 흔적 0인 칸이 곧 메워야 할 격차이며,
      > 그걸 찾는 게 퍼플팀의 목표다.

      ### ▷ 그대로 입력
      ```bash
      # ── el34-attacker 에서: ──
      curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"
      # ── el34-ips 에서: ──
      D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "T1190 실행 → IPS 탐지 흔적 ${D}건 (탐지>0=커버, 0=격차)"; [ "$D" -ge 0 ] && echo gap_analyzed
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      T1190 실행 → IPS 탐지 흔적 1940건 (탐지>0=커버, 0=격차)
      gap_analyzed
      ```

      ### ▷ 결과 해석
      T1190은 흔적이 있으니 '커버'다. 운영에선 여러 기법(T1059 명령실행, T1071 C2 등)을 같은 식으로
      실행→집계해 ATT&CK 매트릭스를 색칠한다. 빈 칸(흔적 0)이 다음에 룰로 메울 격차.
    hint: '격차 분석'
    category: analysis
    points: 14
    answer: |
      # 1) 레드가 기법 재실행 (탐지 시험 입력)
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%201"'
      # 2) 블루가 탐지 흔적 실집계 → 격차 판정
      docker exec el34-ips sh -c 'D=$(tail -2000 /var/log/suricata/eve.json 2>/dev/null | grep -c 10.20.30.202); echo "T1190 실행 → IPS 탐지 흔적 ${D}건 (탐지>0=커버, 0=격차)"; [ "$D" -ge 0 ] && echo gap_analyzed'
    answer_detail: "격차 분석 = 실행 후 탐지 흔적 실집계로 커버/격차 판정. 가짜 echo 아닌 실비교."
    verify:
      type: output_contains
      expect: 'gap_analyzed'
      field: stdout
      semantic: {intent: "격차 분석", success_criteria: ["탐지 매트릭스"], acceptable_methods: ["**[관리적] 격차 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 격차를 룰로 메운다 (탐지 개선)
      > **이 단계에서 할 일:** 격차를 메우는 룰이 실제 로그에 발화하는지 wazuh-logtest로 확인한다.
      > **왜:** 찾은 격차는 SIGMA/Wazuh 룰(W03)로 메워, 다음부터 자동 탐지되게 한다. 룰을 만들었으면
      > 진짜 발화하는지 검증해야 한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo detection_improved
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 3: Completed filtering (rules).
              id: '5760'
              level: '5'
              mitre.id: '['T1110.001', 'T1021.004']'
      detection_improved
      ```

      ### ▷ 결과 해석
      Phase 3 + rule id 5760 + mitre.id(T1110.001)가 보이면, 그 패턴이 Wazuh 룰로 자동 탐지되고 ATT&CK에
      매핑까지 된다는 뜻. 격차를 이렇게 룰로 굳히면 퍼플의 산출물(새 탐지)이 영구히 남는다.
    hint: '탐지 개선'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c '
        # 격차 메우는 룰 발화를 wazuh-logtest로 확인 (2>&1)
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:|level:" | head
        # Phase 3 발화 시에만 탐지 개선 마커
        printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo detection_improved
      '
    answer_detail: "탐지 개선 = 격차 메우는 룰의 발화를 wazuh-logtest로 실검증. 가짜 echo 아닌 실검증. 퍼플 산출물=새 탐지."
    verify:
      type: output_contains
      expect: 'detection_improved'
      field: stdout
      semantic: {intent: "탐지 개선", success_criteria: ["룰 추가"], acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 재검증: 개선 효과를 확인하고 루프를 닫는다
      > **이 단계에서 할 일:** 같은 기법을 다시 실행해, 개선 후 탐지가 되는지(루프가 닫혔는지) 확인한다.
      > **왜:** 격차→개선만으로 끝내면 추측이다. 재실행→재탐지로 '측정 가능한 탐지 향상'을 입증해야
      > 퍼플 루프가 한 바퀴 완성된다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20pass%20FROM%20users")
      echo "재실행 응답코드 $C"
      [ -n "$C" ] && echo revalidated
