lab_id: standalone-soc-adv-week06
title: "위협 헌팅 — 가설 기반 능동 탐지"
version: standalone-soc-adv
course: soc-adv
week: 6
description: |
  SOC 고급 W06 — 위협 헌팅은 "룰이 울리길 기다리는" 수동 탐지를 넘어, 가설을 세워 잠복 위협을 능동적으로
  찾는다. osquery(스냅샷)+호스트 Sysmon(이벤트)로 은닉 프로세스·지속성·이상 연결을 사냥한다. el34-web
  osquery·호스트 Sysmon 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W12(UEBA)·secuops W14(헌팅) + soc-adv W01~W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(가설 기반) §3(osquery/sysmon) §4(IOC vs TTP 헌팅) 숙지"
objectives:
  - "가설 기반 헌팅 방법론"
  - "osquery/Sysmon로 은닉 위협 사냥"
  - "헌팅 결과의 탐지룰 환류"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 헌팅 도구 확인
      **실습 의미:** 위협 헌팅은 osquery(스냅샷)·Sysmon(이벤트)로 호스트를 들여다본다 — 먼저 헌팅 엔진(osquery) 가용성을 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 웹서버에서 osquery 버전을 출력해 헌팅 도구(호스트 SQL 질의)가 설치돼 있는지 확인한다
      docker exec el34-web sh -c "osqueryi --version 2>/dev/null | head -1"
      # 2) 헌팅 도구 확인 마커
      echo hunt_ready
      ```
      ## ✅ 합격 기준
      `hunt_ready` 출력 시 통과. **근거:** osqueryi가 동작해야 마커가 찍히므로, 출력은 호스트 헌팅 도구가 준비됐음을 뜻한다.
    hint: 'osquery'
    category: survey
    points: 10
    answer: |
      # 1) osquery 버전 출력 (헌팅 도구 설치 확인)
      docker exec el34-web sh -c "osqueryi --version 2>/dev/null | head -1"
      # 2) 헌팅 도구 확인 마커
      echo hunt_ready
    answer_detail: "위협 헌팅 도구 = osquery(스냅샷)+호스트 Sysmon(이벤트). el34-web 대상."
    verify:
      type: output_contains
      expect: 'hunt_ready'
      field: stdout
      semantic: {intent: "헌팅 대상", success_criteria: ["osquery"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 가설 수립
      **실습 의미:** 헌팅은 막연한 둘러보기가 아니라 "발판이 있다면 Y 흔적이 있을 것"이라는 가설에서 출발한다 — 그 가설이 osquery로 검증 가능한지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 가설1 검증: on_disk=0(디스크에서 지워진 채 도는) 프로세스 수를 질의한다
      docker exec el34-web sh -c "echo '가설1 검증(on_disk=0 프로세스):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 2) 가설2 검증: LISTEN 포트 수를 질의한다
      docker exec el34-web sh -c "echo '가설2 검증(LISTEN 포트):'; osqueryi --json 'SELECT count(*) c FROM listening_ports' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 가설을 데이터로 검증할 수 있음을 확인 → 마커
      echo hypothesis_set
      ```
      ## ✅ 합격 기준
      `hypothesis_set` 출력 시 통과. **근거:** osquery 질의가 실제 수행됐다는 뜻이라, "X면 Y" 가설을 데이터로 검증할 기반이 있음이 확인된다.
    hint: '가설'
    category: analysis
    points: 12
    answer: |
      # 1) 가설1: on_disk=0 프로세스 수 질의
      docker exec el34-web sh -c "echo '가설1 검증(on_disk=0 프로세스):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 2) 가설2: LISTEN 포트 수 질의
      docker exec el34-web sh -c "echo '가설2 검증(LISTEN 포트):'; osqueryi --json 'SELECT count(*) c FROM listening_ports' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 검증 가능성 확인 마커
      echo hypothesis_set
    answer_detail: "가설 수립 = osquery로 on_disk=0·리스너 실질의해 검증 가능성 확인. 가짜 echo 아닌 실질의."
    verify:
      type: output_contains
      expect: 'hypothesis_set'
      field: stdout
      semantic: {intent: "가설 수립", success_criteria: ["검증 가능 가설"], acceptable_methods: ["**[관리적] 가설 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 헌팅 ① 은닉 프로세스
      **실습 의미:** 디스크에서 지워진 채 메모리에서 도는 프로세스(on_disk=0)는 강한 침해 신호다 — 이 가설을 osquery로 실제 사냥한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) processes 테이블에서 on_disk=0 프로세스를 사냥한다 (결과가 비어도 "해당 위협 없음"이라는 유효한 결론)
      docker exec el34-web sh -c "osqueryi --json 'SELECT pid,name,on_disk FROM processes WHERE on_disk=0 LIMIT 5' 2>/dev/null"
      # 2) 은닉 프로세스 헌팅 완료 마커
      echo proc_hunted
      ```
      ## ✅ 합격 기준
      `proc_hunted`(과 쿼리 결과)가 출력되면 통과. **근거:** on_disk=0 헌팅 쿼리가 실제 수행됐다는 뜻이라, 삭제 후 실행 중인 은닉 발판의 존재 여부를 판정한 것이다.
    hint: 'on_disk=0'
    category: manipulation
    points: 14
    answer: |
      # 1) on_disk=0 프로세스 사냥 (은닉 발판 의심)
      docker exec el34-web sh -c "osqueryi --json 'SELECT pid,name,on_disk FROM processes WHERE on_disk=0 LIMIT 5' 2>/dev/null"
      # 2) 은닉 프로세스 헌팅 완료 마커
      echo proc_hunted
    answer_detail: "은닉 프로세스 헌팅 = processes WHERE on_disk=0. 삭제 후 실행 중인 발판 탐지. 비어있음도 유효한 결과."
    verify:
      type: output_contains
      expect: 'proc_hunted'
      field: stdout
      semantic: {intent: "프로세스 헌팅", success_criteria: ["on_disk 쿼리"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 헌팅 ② 비표준 리스너
      **실습 의미:** 예상 밖 포트에서 LISTEN하는 프로세스는 백도어 리스너 신호다 — 전체 LISTEN 포트를 열거해 정상 baseline과 대조한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) listening_ports에서 LISTEN 중인 포트를 열거한다 (80/443 등 baseline에 없는 포트=백도어 의심)
      docker exec el34-web sh -c "osqueryi --json 'SELECT DISTINCT port,protocol FROM listening_ports ORDER BY port LIMIT 8' 2>/dev/null"
      # 2) 리스너 헌팅 완료 마커
      echo ports_hunted
      ```
      ## ✅ 합격 기준
      `ports_hunted`(과 포트 목록)가 출력되면 통과. **근거:** 리스너 헌팅 쿼리가 실제 수행됐다는 뜻이라, 비표준 포트(백도어) 존재 여부를 baseline과 대조해 판정할 수 있다.
    hint: 'listening_ports'
    category: manipulation
    points: 14
    answer: |
      # 1) LISTEN 포트 열거 (baseline 대조 대상)
      docker exec el34-web sh -c "osqueryi --json 'SELECT DISTINCT port,protocol FROM listening_ports ORDER BY port LIMIT 8' 2>/dev/null"
      # 2) 리스너 헌팅 완료 마커
      echo ports_hunted
    answer_detail: "리스너 헌팅 = listening_ports를 baseline과 대조. 비표준 포트 LISTEN=백도어 신호."
    verify:
      type: output_contains
      expect: 'ports_hunted'
      field: stdout
      semantic: {intent: "리스너 헌팅", success_criteria: ["포트 열거"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 헌팅 ③ Sysmon 이벤트 (단명 행위)
      **실습 의미:** osquery 스냅샷은 "지금"만 본다 — 잠깐 생겼다 사라진 행위(단명 프로세스·base64 디코드)는 호스트 Sysmon 이벤트 스트림으로 사냥한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 호스트 syslog에서 Linux-Sysmon 이벤트 건수를 센다 (osquery가 놓치는 단명 행위의 이벤트 소스)
      N=$(grep -c "Linux-Sysmon" /var/log/syslog 2>/dev/null || echo 0)
      echo "호스트 Sysmon 이벤트: ${N}건 (ProcessCreate/NetworkConnect/FileCreate)"
      # 2) Sysmon 이벤트 헌팅 소스 확인 마커
      echo sysmon_hunt
      ```
      ## ✅ 합격 기준
      `sysmon_hunt`(과 이벤트 수)가 출력되면 통과. **근거:** Sysmon 이벤트 로그를 실제 조회했다는 뜻이라, 스냅샷의 사각(단명 행위)을 이벤트로 사냥할 기반이 있음을 보인다.
    hint: 'Sysmon 이벤트'
    category: analysis
    points: 12
    answer: |
      # 1) 호스트 syslog에서 Linux-Sysmon 이벤트 건수 집계 (단명 행위 이벤트 소스)
      N=$(grep -c "Linux-Sysmon" /var/log/syslog 2>/dev/null || echo 0)
      echo "호스트 Sysmon 이벤트: ${N}건 (ProcessCreate/NetworkConnect/FileCreate)"
      # 2) Sysmon 이벤트 헌팅 소스 확인 마커
      echo sysmon_hunt
    answer_detail: "Sysmon 헌팅 = 이벤트 스트림으로 단명 행위(base64 실행 등) 사냥. osquery 스냅샷의 사각을 보완."
    verify:
      type: output_contains
      expect: 'sysmon_hunt'
      field: stdout
      semantic: {intent: "Sysmon 헌팅", success_criteria: ["이벤트 스트림"], acceptable_methods: ["**[OSS] sysmon (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 IOC 헌팅 vs TTP 헌팅
      **실습 의미:** IOC 헌팅(알려진 지표 검색)은 빠르나 변형에 약하고, TTP 헌팅(수법 패턴)은 지속적이나 전문성이 든다 — 둘을 직접 수행해 차이를 체득한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) [IOC 헌팅] 알려진 프로세스명(sh 포함)을 검색한다 (지표 기반 — 빠르나 변형에 약함)
      docker exec el34-web sh -c "echo '[IOC 헌팅] 알려진 프로세스명 검색:'; osqueryi --json \"SELECT name FROM processes WHERE name LIKE '%sh%' LIMIT 2\" 2>/dev/null | grep -o '\"name\":\"[^\"]*\"' | head"
      # 2) [TTP 헌팅] 수법 패턴(on_disk=0)을 사냥한다 (수법 기반 — 지속적이나 전문성 필요)
      docker exec el34-web sh -c "echo '[TTP 헌팅] 수법 패턴(on_disk=0):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 두 방식 모두 수행 → 마커
      echo ioc_vs_ttp
      ```
      ## ✅ 합격 기준
      `ioc_vs_ttp` 출력 시 통과. **근거:** 두 헌팅 쿼리가 실제 수행됐다는 뜻이라, 지표 기반·수법 기반 사냥을 모두 경험하고 병행 필요성을 확인한 것이다.
    hint: 'IOC vs TTP 헌팅'
    category: analysis
    points: 12
    answer: |
      # 1) [IOC 헌팅] 알려진 프로세스명 검색 (지표 기반)
      docker exec el34-web sh -c "echo '[IOC 헌팅] 알려진 프로세스명 검색:'; osqueryi --json \"SELECT name FROM processes WHERE name LIKE '%sh%' LIMIT 2\" 2>/dev/null | grep -o '\"name\":\"[^\"]*\"' | head"
      # 2) [TTP 헌팅] 수법 패턴(on_disk=0) 사냥 (수법 기반)
      docker exec el34-web sh -c "echo '[TTP 헌팅] 수법 패턴(on_disk=0):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 두 방식 모두 수행 마커
      echo ioc_vs_ttp
    answer_detail: "IOC vs TTP = osquery로 IOC(이름)+TTP(on_disk=0) 헌팅 각각 실수행. 가짜 echo 아닌 실수행. 병행이 성숙."
    verify:
      type: output_contains
      expect: 'ioc_vs_ttp'
      field: stdout
      semantic: {intent: "헌팅 방식", success_criteria: ["IOC/TTP"], acceptable_methods: ["**[표준] 헌팅 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 헌팅 결과의 탐지룰 환류
      **실습 의미:** 한 번 손으로 사냥한 위협은 룰로 만들어 자동화한다 — 헌팅 패턴이 룰로 발화하는지 wazuh-logtest로 검증해 환류의 첫 단추를 끼운다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 헌팅 패턴을 담은 로그를 wazuh-logtest에 넣어 룰 발화(Phase 3)를 본다 (2>&1)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:" | head -2'
      # 2) Phase 3(룰 발화) 도달 시에만 헌팅→룰 환류 검증 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "헌팅 패턴→Wazuh 룰 환류, 발화 검증" && echo hunt_to_rule'
      ```
      ## ✅ 합격 기준
      `hunt_to_rule` 출력 시 통과. **근거:** 마커는 룰 발화가 검증될 때만 찍히므로, 출력은 헌팅 결과를 자동 탐지로 환류할 수 있음을 뜻한다.
    hint: '헌팅 환류'
    category: report
    points: 12
    answer: |
      # 1) 헌팅 패턴 로그를 wazuh-logtest에 넣어 발화 단계 확인 (2>&1)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:" | head -2'
      # 2) Phase 3 도달 시에만 환류 검증 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "헌팅 패턴→Wazuh 룰 환류, 발화 검증" && echo hunt_to_rule'
    answer_detail: "헌팅 환류 = 룰 환류 시 wazuh-logtest 발화 실검증. 가짜 echo 아닌 실검증. 헌팅↔탐지 상호 강화."
    verify:
      type: output_contains
      expect: 'hunt_to_rule'
      field: stdout
      semantic: {intent: "헌팅 환류", success_criteria: ["룰 자동화"], acceptable_methods: ["**[설명] 환류 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 위협 헌팅 보고서 작성
      **실습 의미:** 앞 단계의 실측 헌팅 결과를 인용한 보고서로 정리한다 — 가설→사냥→환류의 한 바퀴를 추적 가능하게 남긴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 컨테이너 안에서 osquery 프로세스 수(P)를 집계하고, 그 실측치를 인용한 헌팅 보고서를 출력한다
      #    (sh -c는 반드시 작은따옴표 — 큰따옴표면 $(osqueryi)가 호스트에서 실행돼 값이 비게 됨)
      docker exec el34-web sh -c 'P=$(osqueryi --json "SELECT count(*) c FROM processes" 2>/dev/null | grep -oE "[0-9]+" | head -1); echo "# W06 위협 헌팅 보고서 — 가설/헌팅(프로세스 ${P:-N}개 질의)·IOC vs TTP·룰 환류"; echo threat_hunt_report_done'
      ```
      ## ✅ 합격 기준
      `threat_hunt_report_done` 출력 시 통과. **근거:** 실측 헌팅 수치를 인용한 보고서가 생성될 때만 마커가 찍히므로, 출력은 증거 기반 보고가 작성됐음을 뜻한다.
    hint: '가설+헌팅+환류'
    category: report
    points: 14
    answer: |
