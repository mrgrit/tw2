lab_id: standalone-soc-adv-week06
title: "위협 헌팅 — 가설 기반 능동 탐지"
version: standalone-soc-adv
course: soc-adv
week: 6
description: |
  SOC 고급 W06 — 위협 헌팅은 "룰이 울리길 기다리는" 수동 탐지를 넘어, 가설을 세워 잠복 위협을 능동적으로
  찾는다. osquery(스냅샷)+호스트 Sysmon(이벤트)로 은닉 프로세스·지속성·이상 연결을 사냥한다. el34-web
  osquery·호스트 Sysmon 사용. 인가된 실습만. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "soc W12(UEBA)·secuops W14(헌팅) + soc-adv W01~W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(가설 기반) §3(osquery/sysmon) §4(IOC vs TTP 헌팅) 숙지"
objectives:
  - "가설 기반 헌팅 방법론"
  - "osquery/Sysmon로 은닉 위협 사냥"
  - "헌팅 결과의 탐지룰 환류"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 헌팅 엔진(osquery)이 있는지 확인
      > **이 단계에서 할 일:** 웹서버에서 osquery 버전을 출력해 호스트를 SQL로 질의할 도구가 있는지 본다.
      > **왜:** 위협 헌팅은 osquery(스냅샷)·Sysmon(이벤트)로 호스트를 들여다본다. 그 첫 엔진이 osquery다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      osqueryi --version 2>/dev/null | head -1
      echo hunt_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      osqueryi version 5.23.0
      hunt_ready
      ```

      ### ▷ 결과 해석
      버전이 찍히면 호스트를 SQL 테이블(processes·listening_ports·users 등)로 질의할 수 있다는 뜻.
      이제 가설을 세우고(STEP 2) 그 가설을 osquery로 사냥한다(STEP 3~).
    hint: 'osquery'
    category: survey
    points: 10
    answer: |
      # 1) osquery 버전 출력 (헌팅 도구 설치 확인)
      docker exec el34-web sh -c "osqueryi --version 2>/dev/null | head -1"
      # 2) 헌팅 도구 확인 마커
      echo hunt_ready
    answer_detail: "위협 헌팅 도구 = osquery(스냅샷)+호스트 Sysmon(이벤트). el34-web 대상."
    verify:
      type: output_contains
      expect: 'hunt_ready'
      field: stdout
      semantic: {intent: "헌팅 대상", success_criteria: ["osquery"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — 헌팅 가설을 세운다 (막연한 둘러보기가 아니라)
      > **이 단계에서 할 일:** "발판이 있다면 Y 흔적이 있을 것"이라는 가설 두 개(① 디스크에서 지워진 채
      > 도는 프로세스 ② LISTEN 포트)를 osquery로 검증 가능한지 본다.
      > **왜:** 헌팅은 가설에서 출발한다. 가설이 데이터로 검증 가능해야 사냥이 된다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      echo '가설1 검증(on_disk=0 프로세스):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '"c":"[0-9]*"'
      echo '가설2 검증(LISTEN 포트):'; osqueryi --json 'SELECT count(*) c FROM listening_ports' 2>/dev/null | grep -o '"c":"[0-9]*"'
      echo hypothesis_set
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 숫자는 환경마다 다름)
      ```
      가설1 검증(on_disk=0 프로세스):
      "c":"0"
      가설2 검증(LISTEN 포트):
      "c":"46"
      hypothesis_set
      ```

      ### ▷ 결과 해석
      두 가설이 모두 숫자로 답해진다 = osquery로 검증 가능한 가설이라는 뜻. 가설1이 0이면 "삭제 후
      실행 중인 발판 없음"(정상), 가설2의 46은 LISTEN 포트 수 — 이 중 예상 밖 포트가 STEP 4의 사냥감.
    hint: '가설'
    category: analysis
    points: 12
    answer: |
      # 1) 가설1: on_disk=0 프로세스 수 질의
      docker exec el34-web sh -c "echo '가설1 검증(on_disk=0 프로세스):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 2) 가설2: LISTEN 포트 수 질의
      docker exec el34-web sh -c "echo '가설2 검증(LISTEN 포트):'; osqueryi --json 'SELECT count(*) c FROM listening_ports' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 검증 가능성 확인 마커
      echo hypothesis_set
    answer_detail: "가설 수립 = osquery로 on_disk=0·리스너 실질의해 검증 가능성 확인. 가짜 echo 아닌 실질의."
    verify:
      type: output_contains
      expect: 'hypothesis_set'
      field: stdout
      semantic: {intent: "가설 수립", success_criteria: ["검증 가능 가설"], acceptable_methods: ["**[관리적] 가설 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — 헌팅 ① 은닉 프로세스를 사냥한다 (on_disk=0)
      > **이 단계에서 할 일:** processes 테이블에서 on_disk=0(디스크에서 지워진 채 메모리에서 도는)
      > 프로세스를 질의한다.
      > **왜:** 삭제 후 실행 중인 프로세스는 강한 침해 신호다. 결과가 비어도 "해당 위협 없음"이라는
      > 유효한 결론.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      osqueryi --json 'SELECT pid,name,on_disk FROM processes WHERE on_disk=0 LIMIT 5' 2>/dev/null
      echo proc_hunted
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — el34는 보통 비어 있음)
      ```
      [

      ]
      proc_hunted
      ```

      ### ▷ 결과 해석
      빈 배열 `[ ]` = on_disk=0 프로세스가 없다 = 삭제 후 실행 중인 은닉 발판 없음(정상). 만약 여기에
      행이 잡히면 그 pid를 즉시 조사한다(메모리 덤프·부모 프로세스·열린 소켓 추적).
    hint: 'on_disk=0'
    category: manipulation
    points: 14
    answer: |
      # 1) on_disk=0 프로세스 사냥 (은닉 발판 의심)
      docker exec el34-web sh -c "osqueryi --json 'SELECT pid,name,on_disk FROM processes WHERE on_disk=0 LIMIT 5' 2>/dev/null"
      # 2) 은닉 프로세스 헌팅 완료 마커
      echo proc_hunted
    answer_detail: "은닉 프로세스 헌팅 = processes WHERE on_disk=0. 삭제 후 실행 중인 발판 탐지. 비어있음도 유효한 결과."
    verify:
      type: output_contains
      expect: 'proc_hunted'
      field: stdout
      semantic: {intent: "프로세스 헌팅", success_criteria: ["on_disk 쿼리"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 헌팅 ② 비표준 리스너를 사냥한다
      > **이 단계에서 할 일:** listening_ports에서 LISTEN 중인 포트를 열거해 정상 baseline과 대조한다.
      > **왜:** 예상 밖 포트에서 LISTEN하는 프로세스는 백도어 리스너 신호다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      osqueryi --json 'SELECT DISTINCT port,protocol FROM listening_ports ORDER BY port LIMIT 8' 2>/dev/null
      echo ports_hunted
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 포트는 환경마다 다름)
      ```
      [
        {"port":"0","protocol":"0"},
        {"port":"22","protocol":"6"},
        {"port":"80","protocol":"6"},
        {"port":"443","protocol":"6"},
        {"port":"8001","protocol":"6"}
      ]
      ports_hunted
      ```

      ### ▷ 결과 해석
      22(SSH)·80/443(웹)·8001~(앱)은 이 호스트의 정상 서비스 baseline. protocol 6=TCP, 0=ALL. baseline에
      없는 포트(예: 4444, 1337)가 LISTEN으로 잡히면 백도어 의심 → 그 포트를 연 프로세스를 추적한다.
    hint: 'listening_ports'
    category: manipulation
    points: 14
    answer: |
      # 1) LISTEN 포트 열거 (baseline 대조 대상)
      docker exec el34-web sh -c "osqueryi --json 'SELECT DISTINCT port,protocol FROM listening_ports ORDER BY port LIMIT 8' 2>/dev/null"
      # 2) 리스너 헌팅 완료 마커
      echo ports_hunted
    answer_detail: "리스너 헌팅 = listening_ports를 baseline과 대조. 비표준 포트 LISTEN=백도어 신호."
    verify:
      type: output_contains
      expect: 'ports_hunted'
      field: stdout
      semantic: {intent: "리스너 헌팅", success_criteria: ["포트 열거"], acceptable_methods: ["**[OSS] osquery (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 헌팅 ③ 단명 행위를 Sysmon 이벤트로 사냥한다
      > **이 단계에서 할 일:** 호스트 syslog에서 Linux-Sysmon 이벤트 건수를 센다.
      > **왜:** osquery 스냅샷은 '지금'만 본다. 잠깐 생겼다 사라진 행위(단명 프로세스·base64 디코드)는
      > 호스트 Sysmon 이벤트 스트림으로 잡아야 한다.

      ### ▷ 그대로 입력
      ```bash
      N=$(grep -c "Linux-Sysmon" /var/log/syslog 2>/dev/null || echo 0)
      echo "호스트 Sysmon 이벤트: ${N}건 (ProcessCreate/NetworkConnect/FileCreate)"
      echo sysmon_hunt
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 건수는 환경마다 다름)
      ```
      호스트 Sysmon 이벤트: 36042건 (ProcessCreate/NetworkConnect/FileCreate)
      sysmon_hunt
      ```

      ### ▷ 결과 해석
      Sysmon이 호스트의 프로세스 생성·네트워크 연결·파일 생성을 이벤트로 기록한다(el34는 호스트
      /var/log/syslog로 흐른다). osquery가 놓친 단명 행위를 이 이벤트 스트림에서 EventID로 사냥한다
      (예: ProcessCreate에서 `base64 -d | bash` 같은 명령줄 검색).
    hint: 'Sysmon 이벤트'
    category: analysis
    points: 12
    answer: |
      # 1) 호스트 syslog에서 Linux-Sysmon 이벤트 건수 집계 (단명 행위 이벤트 소스)
      N=$(grep -c "Linux-Sysmon" /var/log/syslog 2>/dev/null || echo 0)
      echo "호스트 Sysmon 이벤트: ${N}건 (ProcessCreate/NetworkConnect/FileCreate)"
      # 2) Sysmon 이벤트 헌팅 소스 확인 마커
      echo sysmon_hunt
    answer_detail: "Sysmon 헌팅 = 이벤트 스트림으로 단명 행위(base64 실행 등) 사냥. osquery 스냅샷의 사각을 보완."
    verify:
      type: output_contains
      expect: 'sysmon_hunt'
      field: stdout
      semantic: {intent: "Sysmon 헌팅", success_criteria: ["이벤트 스트림"], acceptable_methods: ["**[OSS] sysmon (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 두 가지 사냥법: IOC 헌팅 vs TTP 헌팅
      > **이 단계에서 할 일:** 알려진 지표(IOC, 프로세스명)와 수법 패턴(TTP, on_disk=0)을 각각 한 번씩
      > 사냥해 두 방식의 차이를 체감한다.
      > **왜:** IOC 헌팅(지표 검색)은 빠르나 변형에 약하고, TTP 헌팅(수법 패턴)은 지속적이나 전문성이
      > 든다 — 둘을 병행해야 성숙한 헌팅이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      echo '[IOC 헌팅] 알려진 프로세스명 검색:'; osqueryi --json "SELECT name FROM processes WHERE name LIKE '%sh%' LIMIT 2" 2>/dev/null | grep -o '"name":"[^"]*"' | head
      echo '[TTP 헌팅] 수법 패턴(on_disk=0):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '"c":"[0-9]*"'
      echo ioc_vs_ttp
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      [IOC 헌팅] 알려진 프로세스명 검색:
      "name":"sshd"
      "name":"sh"
      [TTP 헌팅] 수법 패턴(on_disk=0):
      "c":"0"
      ioc_vs_ttp
      ```

      ### ▷ 결과 해석
      IOC 헌팅은 '이름에 sh가 든' 알려진 지표를 콕 찍어 빠르게 찾는다(단 이름을 바꾸면 놓침).
      TTP 헌팅은 '디스크에서 지워진 채 도는'이라는 수법 자체를 본다(이름이 무엇이든 잡음). 둘은 보완재.
    hint: 'IOC vs TTP 헌팅'
    category: analysis
    points: 12
    answer: |
      # 1) [IOC 헌팅] 알려진 프로세스명 검색 (지표 기반)
      docker exec el34-web sh -c "echo '[IOC 헌팅] 알려진 프로세스명 검색:'; osqueryi --json \"SELECT name FROM processes WHERE name LIKE '%sh%' LIMIT 2\" 2>/dev/null | grep -o '\"name\":\"[^\"]*\"' | head"
      # 2) [TTP 헌팅] 수법 패턴(on_disk=0) 사냥 (수법 기반)
      docker exec el34-web sh -c "echo '[TTP 헌팅] 수법 패턴(on_disk=0):'; osqueryi --json 'SELECT count(*) c FROM processes WHERE on_disk=0' 2>/dev/null | grep -o '\"c\":\"[0-9]*\"'"
      # 3) 두 방식 모두 수행 마커
      echo ioc_vs_ttp
    answer_detail: "IOC vs TTP = osquery로 IOC(이름)+TTP(on_disk=0) 헌팅 각각 실수행. 가짜 echo 아닌 실수행. 병행이 성숙."
    verify:
      type: output_contains
      expect: 'ioc_vs_ttp'
      field: stdout
      semantic: {intent: "헌팅 방식", success_criteria: ["IOC/TTP"], acceptable_methods: ["**[표준] 헌팅 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 손으로 사냥한 위협을 룰로 자동화한다 (환류)
      > **이 단계에서 할 일:** 헌팅 패턴을 담은 로그를 wazuh-logtest에 넣어 룰 발화(Phase 3)를 확인,
      > 환류(헌팅→자동탐지)의 첫 단추를 끼운다.
      > **왜:** 한 번 손으로 잡은 위협은 룰로 만들어 다음부터 자동 탐지해야 한다. 그래야 헌팅의 성과가
      > 영구히 남는다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:" | head -2
      printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "헌팅 패턴→Wazuh 룰 환류, 발화 검증" && echo hunt_to_rule
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      **Phase 3: Completed filtering (rules).
              id: '5760'
      헌팅 패턴→Wazuh 룰 환류, 발화 검증
      hunt_to_rule
      ```

      ### ▷ 결과 해석
      Phase 3 + rule id 5760 = 이 패턴이 Wazuh 룰로 자동 탐지된다는 뜻. 헌팅으로 새 수법을 찾으면, 그
      수법을 SIGMA/Wazuh 룰로 굳혀(W03 참조) '한 번 사냥 → 영구 자동 탐지'로 만든다.
    hint: '헌팅 환류'
    category: report
    points: 12
    answer: |
      # 1) 헌팅 패턴 로그를 wazuh-logtest에 넣어 발화 단계 확인 (2>&1)
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "Phase 3|id:" | head -2'
      # 2) Phase 3 도달 시에만 환류 검증 마커
      docker exec el34-siem sh -c 'printf "Jan  1 00:00:00 host sshd[1]: Failed password for root from 10.20.30.202 port 22 ssh2\n" | /var/ossec/bin/wazuh-logtest 2>&1 | grep -qiE "Phase 3|id:" && echo "헌팅 패턴→Wazuh 룰 환류, 발화 검증" && echo hunt_to_rule'
    answer_detail: "헌팅 환류 = 룰 환류 시 wazuh-logtest 발화 실검증. 가짜 echo 아닌 실검증. 헌팅↔탐지 상호 강화."
    verify:
      type: output_contains
      expect: 'hunt_to_rule'
