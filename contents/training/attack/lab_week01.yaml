lab_id: standalone-attack-week01
title: "침투 환경·정찰 개시 vs 방어 가시성 확인"
version: standalone-attack
course: attack
week: 1
description: |
  침투 테스트(penetration test)의 첫 단계인 정찰(Reconnaissance)을 RoE(교전 규칙) 안에서 개시한다.
  대상의 도달성을 확인하고, 열린 포트(nmap -p)와 서비스/버전(nmap -sV)을 발견하며, 웹 기술 스택을
  핑거프린팅(curl -I)한 뒤, 그 정찰이 방어 스택(Suricata eve.json)에 출처 IP 10.20.30.202 로 어떻게
  탐지되는지 동시에 추적한다(공방 통합 — 자기 행동의 탐지를 아는 것이 회피의 출발점). 발견한 포트·vhost를
  공격 표면(attack surface)으로 정리하고 정찰 보고서로 종합한다. 공격 위치는 내부 발판 공격자
  `el34-attacker`(10.20.30.202), 대상은 fw 게이트웨이(10.20.30.1, DNAT)와 그 뒤 web Apache 의 vhost들이다.
  모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 실행하며, 컨테이너 작업은 docker exec -it <컨테이너> bash 로
  접속해 수행하고, 인가된 실습 환경에서만 진행한다.
difficulty: medium
duration_minutes: 150
prerequisites:
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec"
  - "lecture §1(PTES/RoE) §3-§5(정찰/가시성) 숙지"
objectives:
  - "PTES 방법론과 RoE 안에서 정찰을 개시한다(인가된 환경 한정)"
  - "대상 도달성을 확인하고 열린 포트를 발견한다(nmap -p)"
  - "서비스/버전을 식별해 CVE 매핑의 출발점을 만든다(nmap -sV)"
  - "웹 기술 스택을 핑거프린팅하고 vhost별 앱을 구분한다(curl -I)"
  - "내 정찰의 방어 가시성(Suricata 탐지·출처 IP)을 확인한다(공격자 관점)"
  - "발견 자산을 공격 표면으로 매핑하고 정찰 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 공격자 도구 + 대상 도달성 점검
      정찰의 0번째 단계: 내 도구가 준비됐고 대상에 도달 가능한지 확인한다.

      ## 📖 개념 한 줄
      도구가 없거나 대상에 닿지 못하면 그 뒤 모든 정찰이 무의미하다. 그래서 침투 테스트의
      첫 명령은 항상 도구·도달성 점검이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker`(10.20.30.202) — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 정찰 도구(nmap/curl) 설치 경로 확인 — 경로 나오면 설치됨
      which nmap curl
      # 2) 대상(fw 게이트웨이 10.20.30.1) 도달성 — HTTP 응답코드만(dvwa vhost로 분기)
      curl -s -o /dev/null -w "도달=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/
      ```
      - `which nmap curl`(두 도구 경로 확인), `curl -s -o /dev/null -w "%{http_code}"`(본문 버리고 응답코드만), `-H "Host: ..."`(web Apache 가 vhost 로 분기).

      ## ✅ 합격 기준
      `nmap` 출력 시 통과. **근거:** which 가 nmap/curl 경로를 출력하고 도달성 curl 이 200/302/403 같은
      HTTP 코드를 반환하면 정상 — 000 이면 네트워크 미연결 또는 대상 다운.
    hint: 'which nmap curl + 도달성'
    category: survey
    points: 10
    answer: |
      # 1) 정찰 도구(nmap/curl) 설치 경로 확인 — 경로 나오면 설치됨
      docker exec el34-attacker sh -c 'which nmap curl'
      # 2) 대상(fw 게이트웨이 10.20.30.1) 도달성 — HTTP 응답코드만(dvwa vhost로 분기)
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -w "도달=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/'
    answer_detail: "정찰 도구(nmap/curl)의 설치와 대상(fw 게이트웨이 10.20.30.1) 도달성을 확인하는 것이 침투의 출발점이다. el34-attacker(10.20.30.202)가 본 트랙의 공격 위치이며, which 가 경로를 출력하고 도달 curl 이 HTTP 코드를 반환하면 통과로 판정한다."
    expected_output: |
      /usr/bin/nmap
      /usr/bin/curl
      도달=302
    verify:
      type: output_contains
      expect: 'nmap'
      field: stdout
      semantic:
        intent: "공격자 도구 + 대상 도달성 점검"
        success_criteria: ["nmap/curl 가용", "대상 도달"]
        acceptable_methods: ["**[OSS] which + curl 도달성 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 포트 스캔으로 열린 포트 발견
      대상에 어떤 포트가 열렸는지 능동 정찰로 점검한다.

      ## 📖 개념 한 줄
      열린 포트(port)는 한 IP 위에서 서비스가 응답하는 출입문이며, 곧 침입 가능한 입구
      후보다. 공격 표면의 가장 기본 단위가 포트다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) fw DNAT 공개 포트를 SYN 스캔(-T4 빠르게)하고 open/PORT 줄만 추림
      nmap -p 80,443,8001-8007,9100 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
      ```
      - `-p 80,443,8001-8007,9100`(fw DNAT 공개 포트), `-T4`(빠른 타이밍, 탐지 위험↑), `--max-retries 1`(무응답 재시도 1회로 속도↑).

      ## ✅ 합격 기준
      `open` 출력 시 통과. **근거:** open 으로 표시된 포트(80/443 등)가 보이면 열린 포트 발견 —
      filtered 는 방화벽이 응답을 막은 것, closed 는 서비스 없음이다.
    hint: 'nmap -p 포트 스캔'
    category: recon
    points: 12
    answer: |
      # 1) fw DNAT 공개 포트를 SYN 스캔(-T4 빠르게)하고 open/PORT 줄만 추림
      docker exec el34-attacker nmap -p 80,443,8001-8007,9100 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
    answer_detail: "fw 가 DNAT 한 공개 포트(80/443/8001-8007)가 open 으로 보이며, 이것이 el34 의 외부 노출 공격 표면이다. 닫힌 포트는 filtered(방화벽 차단) 또는 closed 로 나타난다. 출력에 open 이 포함되면 열린 포트 발견으로 통과 판정한다."
    expected_output: |
      PORT     STATE    SERVICE
      80/tcp   open     http
      443/tcp  open     https
      8001/tcp open     vcom-tunnel
      8002/tcp open     teradataordbms
      8003/tcp open     mcreport
      8004/tcp open     p2pevolvenet
      8005/tcp open     mxi
      8006/tcp open     wpl-analytics
      8007/tcp open     ajp12
    verify:
      type: output_contains
      expect: 'open'
      field: stdout
      semantic:
        intent: "열린 포트 발견"
        success_criteria: ["open 포트", "공격 표면"]
        acceptable_methods: ["**[OSS] nmap -p (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표 — 서비스/버전 식별 (nmap -sV)
      열린 포트 뒤에서 동작하는 서비스의 종류·버전을 식별한다.

      ## 📖 개념 한 줄
      "포트가 열렸다" 만으로는 부족하다. 그 문 뒤 서비스(service)가 Apache 인지, 어떤
      버전인지 알아야 그에 맞는 알려진 취약점(CVE)을 찾을 수 있다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 웹 포트(80,443) 서비스/버전 식별(-sV) — CVE 매핑의 출발점
      nmap -sV -p 80,443 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT|http"
      ```
      - `-sV`(서비스/버전 식별 — "Apache httpd 2.4.x"까지). 식별한 버전을 CVE DB 에서 검색하면 그 버전의 알려진 약점을 확인.

      ## ✅ 합격 기준
      `http` 출력 시 통과. **근거:** http/Apache 같은 서비스·버전 문자열이 식별되면 통과 — 버전이
      오래됐다면 그 자체가 익스플로잇 후보다.
    hint: 'nmap -sV 서비스 버전'
    category: recon
    points: 12
    answer: |
      # 1) 웹 포트(80,443) 서비스/버전 식별(-sV) — CVE 매핑의 출발점
      docker exec el34-attacker nmap -sV -p 80,443 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT|http"
    answer_detail: "-sV 옵션으로 서비스/버전을 식별하는 것은 알려진 취약점(CVE) 매핑의 출발점이다. 식별된 버전이 오래됐으면 그 버전에 공개된 익스플로잇이 곧 침투 후보가 된다. 출력에 http(또는 서비스/버전 단서)가 보이면 통과로 판정한다."
    expected_output: |
      Starting Nmap 7.80 ( https://nmap.org ) at 2026-06-26 14:43 UTC
      PORT    STATE SERVICE  VERSION
      80/tcp  open  http     Apache httpd 2.4.52 ((Ubuntu))
      443/tcp open  ssl/http Apache httpd 2.4.52 ((Ubuntu))
      Service detection performed. Please report any incorrect results at https://nmap.org/submit/ .
    verify:
      type: output_contains
      expect: 'http'
      field: stdout
      semantic:
        intent: "서비스 버전 식별"
        success_criteria: ["http 서비스", "버전 단서"]
        acceptable_methods: ["**[OSS] nmap -sV (권장)**"]
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 목표 — 웹 기술 스택 핑거프린팅
      열린 웹 포트의 기술 스택을 식별하고, vhost별로 다른 앱이 응답함을 확인한다.

      ## 📖 개념 한 줄
      핑거프린팅(fingerprinting)은 응답의 특징(헤더 등)으로 SW 종류·버전을 식별하는 기법이다.
      같은 IP·포트라도 Host 헤더에 따라 vhost(가상 호스트)가 분기하므로 앱이 완전히 달라진다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) dvwa vhost 헤더만(curl -I) — Server 헤더/응답코드로 기술 스택 핑거프린팅
      curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | head -8
      # 2) 다른 vhost(juice) 헤더 — Host 바꾸면 다른 앱이 응답(별개 공격 표면)
      curl -sI -H 'Host: juice.el34.lab' http://10.20.30.1/ | head -3
      ```
      - `curl -I`(헤더만 HEAD 요청), `-s`(silent). `Server:` 헤더=웹 서버 종류·버전, `Set-Cookie` 이름=백엔드 언어 단서. Host 를 바꿔 vhost 열거.

      ## ✅ 합격 기준
      `HTTP` 출력 시 통과. **근거:** HTTP 응답 라인과 Server 헤더가 보이면 식별 성공 — vhost(dvwa vs
      juice)별로 응답이 달라지면 각각이 별개의 공격 표면이라는 뜻이다.
    hint: 'curl -sI Server 헤더'
    category: recon
    points: 12
    answer: |
      # 1) dvwa vhost 헤더만(curl -I) — Server 헤더/응답코드로 기술 스택 핑거프린팅
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | head -8"
      # 2) 다른 vhost(juice) 헤더 — Host 바꾸면 다른 앱이 응답(별개 공격 표면)
      docker exec el34-attacker sh -c "curl -sI -H 'Host: juice.el34.lab' http://10.20.30.1/ | head -3"
    answer_detail: "curl -I 로 Server 헤더와 응답 코드를 식별하면 웹 서버 종류·버전(Apache)을 알 수 있고, Host 헤더를 dvwa/juice 로 바꾸면 vhost별로 다른 앱이 응답함을 확인한다. 각 vhost 가 서로 다른 익스플로잇 표면이므로 빠짐없이 열거할수록 표면이 넓어진다. 출력에 HTTP 응답이 보이면 통과 판정한다."
    expected_output: |
      HTTP/1.1 302 Found
      Date: Fri, 26 Jun 2026 14:43:57 GMT
      Server: Apache/2.4.25 (Debian)
      Expires: Thu, 19 Nov 1981 08:52:00 GMT
      Cache-Control: no-store, no-cache, must-revalidate
      Pragma: no-cache
      Location: login.php
      Content-Type: text/html; charset=UTF-8
      HTTP/1.1 200 OK
      Date: Fri, 26 Jun 2026 14:43:57 GMT
      Server: Apache/2.4.52 (Ubuntu)
    verify:
      type: output_contains
      expect: 'HTTP'
      field: stdout
      semantic:
        intent: "웹 기술 스택 핑거프린팅"
        success_criteria: ["Server 헤더/응답", "vhost별 앱"]
        acceptable_methods: ["**[OSS] curl -I (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 방어 가시성: 내 정찰이 보이나 (공격자 관점)
      내가 보낸 정찰이 방어 스택(Suricata)에 내 출처 IP 로 탐지됐는지 확인한다.

      ## 📖 개념 한 줄
      좋은 공격자는 자기 행동의 탐지를 안다. 그것이 탐지 회피의 출발점이다. el34 는 출처 IP 를
      위장(SNAT)하지 않으므로, 공격자 IP(10.20.30.202)가 방어 로그에 그대로 보존된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      # 1) eve.json에서 alert+내 출발지(10.20.30.202)만 골라 출발지 집계(내 정찰 탐지 확인)
      tail -2000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and .src_ip=="10.20.30.202")|.src_ip' | sort | uniq -c
      # 2) 내 스캔이 무슨 시그니처로 탐지됐는지(예: Nmap/SCAN)
      tail -2000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and .src_ip=="10.20.30.202")|.alert.signature' | sort | uniq -c | tail -3
      # 3) 해석 — 내 스캔이 출발지 10.20.30.202로 탐지됨, 회피는 느린(-T2)/분산 스캔(고급)
      echo "→ 내 스캔이 출발지 10.20.30.202로 탐지됨. 느린 스캔(-T2)/분산으로 회피 가능(고급)"
      ```
      - alert 는 드물어 `tail -2000` 으로 깊게 본다. `.alert.signature` = 내 스캔이 무슨 공격 이름으로 탐지됐는지(예: ET SCAN Nmap).

      ## ✅ 합격 기준
      `10.20.30.202` 출력 시 통과. **근거:** 출발지 10.20.30.202 의 alert 가 보이면 내 정찰이 탐지된 것 —
      시그니처에 Nmap/SCAN 이 보이면 "스캔 행위"로 분류돼 실전이라면 즉시 차단됐을 것이다.
    hint: 'eve.json 의 src 10.20.30.202 탐지'
    category: analysis
    points: 14
    answer: |
      # 1) eve.json에서 alert+내 출발지(10.20.30.202)만 골라 출발지 집계(내 정찰 탐지 확인)
      docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|.src_ip" | sort | uniq -c'
      # 2) 내 스캔이 무슨 시그니처로 탐지됐는지(예: Nmap/SCAN)
      docker exec el34-ips sh -c 'tail -2000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|.alert.signature" | sort | uniq -c | tail -3'
      # 3) 해석 — 내 스캔이 출발지 10.20.30.202로 탐지됨, 회피는 느린(-T2)/분산 스캔(고급)
