      ## 🎯 목표 — 공격 표면 매핑
      앞서 발견한 포트·vhost 를 익스플로잇 후보 목록(공격 표면)으로 통합 정리한다.

      ## 📖 개념 한 줄
      공격 표면(attack surface)은 공격자가 노릴 수 있는 모든 진입점의 총합이다 — 열린 포트 +
      각 vhost(앱) + 엔드포인트. 표면을 넓게 매핑할수록 익스플로잇 기회가 많아진다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공개 포트 정리
      echo "공개 포트(open): 80/443(HTTP/S), 8001-8007(앱 포트). 9100(API)은 외부 attacker엔 filtered(미도달)"
      # 2) 웹 vhost 정리(각 vhost = 다른 익스플로잇 표면)
      echo "웹 vhost: dvwa.el34.lab(SQLi/XSS), juice.el34.lab(modern), neobank/mediforum/govportal..."
      # 3) 결론 — 각 vhost/포트가 다른 익스플로잇 표면, 다음 주 정찰 심화로 숨은 자산까지
      echo "→ 각 vhost/포트가 다른 익스플로잇 표면. 다음 주 정찰 심화로 숨은 자산까지"
      ```
      - 각 진입점 옆에 익스플로잇 후보(예: dvwa → SQLi/XSS, neobank → IDOR)를 메모 — PTES ③ 위협 모델링·④ 취약점 분석의 입력.

      ## ✅ 합격 기준
      `vhost` 출력 시 통과. **근거:** 발견한 포트와 vhost 를 익스플로잇 후보가 명시된 공격 표면 목록으로
      정리하면 통과 — 넓게 매핑할수록 침투 기회가 많다.
