    instruction: |
      ## 🎯 목표 — 정찰 방법론: PTES + RoE
      명령 암기를 넘어, "왜 이 순서인가(PTES)" 와 "어디까지 합법인가(RoE)" 를 내재화한다.

      ## 📖 개념 한 줄
      PTES(Penetration Testing Execution Standard)는 침투 테스트의 표준 단계 방법론이고,
      RoE(Rules of Engagement)는 합법과 불법을 가르는 경계선이다. 정찰은 PTES 의 정보 수집 단계다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) PTES 6단계 — 정찰부터 보고까지(정찰이 이번 주)
      echo "PTES 6단계: ① 정찰(Intelligence Gathering) ← 이번 주 ② 위협모델링 ③ 취약점분석 ④ 익스플로잇 ⑤ 포스트익스플로잇 ⑥ 보고"
      # 2) RoE 4요소 — 범위/시간/방법/증거, 인가된 환경(el34)만
      echo "RoE 4요소: 범위(어디까지)·시간(언제)·방법(무엇 금지)·증거(기록). 인가된 환경(el34)만, 무단 공격 불법"
      ```
      - PTES 를 건너뛰면 무엇이 열렸는지도 모른 채 시끄럽게 난사하게 된다. 본 트랙 RoE = "el34 안에서, 제공된 명령으로만"(외부 시도 절대 금지).

      ## ✅ 합격 기준
      `PTES` 출력 시 통과. **근거:** PTES 6단계와 RoE 4요소를 본인 말로 정리하면 통과 — 충분히 알고
      공격해야 성공률이 높고 조용하다.
    hint: 'PTES 단계 + RoE'
