lab_id: standalone-attack-week15
title: "캡스톤 — PTES 7단계 침투 완주 vs 킬체인 재구성 방어"
version: standalone-attack
course: attack
week: 15
description: |
  공격기법 수료 캡스톤. PTES 방법론으로 정찰→취약점분석→익스플로잇/셸→권한상승→persistence→유출의
  한 침투를 완주하고, 방어자가 전체 킬체인을 로그로 재구성한다. W01–W14 전 기법 종합. 전 흔적 self-clean.
  인가된 실습만. 외부 공격(정찰·익스플로잇)은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입
  192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고, 침투 후 권한상승·persistence
  단계와 방어 로그 재구성은 표적 web 셸 `ssh ccc@10.20.32.80`(비번 1)에서 한다. bash`로 수행한다.
difficulty: hard
duration_minutes: 280
prerequisites:
  - "W01–W14 전부 통과"
  - "공격 VM ssh att@192.168.0.202 + 표적 web 셸 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §1(PTES) §2(킬체인) §3(방어 재구성) 숙지"
objectives:
  - "PTES 단계로 정찰→침투→privesc→persistence→유출 완주"
  - "방어자 관점 킬체인 재구성"
  - "전 흔적 self-clean (공유 인프라 보존)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 점검: 전 도구
      캡스톤에 쓸 공격 도구(nmap/ffuf/sqlmap)가 attacker 에 준비됐는지 점검한다.

      ## 📖 개념 한 줄
      PTES 침투는 한 도구가 아니라 정찰(nmap/ffuf)·익스플로잇(sqlmap) 도구 체인으로 완주한다.
      시작 전 도구 가용성부터 확인한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 공격 도구 체인 점검 — 정찰(nmap/ffuf)·익스플로잇(sqlmap)이 attacker에 있는지
      command -v nmap; command -v ffuf; command -v sqlmap; echo tools-ok
      ```

      ## ✅ 합격 기준
      `tools-ok` 출력 시 통과. **근거:** nmap/ffuf/sqlmap 경로가 출력되고 tools-ok 가 찍히면 캡스톤
      침투에 쓸 도구 체인이 준비된 것.
    hint: 'nmap/ffuf/sqlmap'
    category: survey
    points: 8
    answer: |
      # 1) 공격 도구 체인 점검 — 정찰(nmap/ffuf)·익스플로잇(sqlmap)이 attacker에 있는지
      ssh att@192.168.0.202 'command -v nmap; command -v ffuf; command -v sqlmap; echo tools-ok'
    answer_detail: "캡스톤 = 전 기법 종합. 정찰(nmap/ffuf)·익스플로잇(sqlmap) 등 전 도구."
    expected_output: |
      /usr/bin/nmap
      /usr/local/bin/ffuf
      /usr/bin/sqlmap
      tools-ok
    verify:
      type: output_contains
      expect: 'tools-ok'
      field: stdout
      semantic:
        intent: "전 도구 점검"
        success_criteria: ["도구 준비"]
        acceptable_methods: ["**[OSS] command -v (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — PTES ② 정찰
      nmap 으로 포트, ffuf 로 경로를 매핑해 공격 표면을 그린다.

      ## 📖 개념 한 줄
      PTES 정보수집(Intelligence Gathering) — 포트(nmap)와 웹 경로(ffuf)를 훑어 어디를 칠지 표면을
      그린다(W01–W02). fw gateway 192.168.0.161 의 공개 vhost 를 Host 헤더로 노린다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 포트 스캔 — fw gateway(192.168.0.161)의 80/443/8001 개방 포트 확인
      nmap -p 80,443,8001 192.168.0.161 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
      # 2) 경로 퍼징 — juice.el34.lab vhost에 admin/login/ftp 경로 탐색(ffuf)
      printf "admin\nlogin\nftp\n" > /tmp/pt15.txt; ffuf -u http://juice.el34.lab/FUZZ -w /tmp/pt15.txt -mc 200,301,403 -s 2>&1 | head -5; rm -f /tmp/pt15.txt
      ```

      ## ✅ 합격 기준
      `open` 출력 시 통과. **근거:** nmap 에 개방 포트(open)가 보이고 ffuf 가 경로를 훑으면 공격
      표면(포트+경로) 매핑 성공 — PTES 정찰 단계 완료.
    hint: 'nmap + ffuf'
    category: recon
    points: 10
    answer: |
      # 1) 포트 스캔 — fw gateway(192.168.0.161)의 80/443/8001 개방 포트 확인
      ssh att@192.168.0.202 'nmap -p 80,443,8001 192.168.0.161 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"'
      # 2) 경로 퍼징 — juice.el34.lab vhost에 admin/login/ftp 경로 탐색(ffuf)
      ssh att@192.168.0.202 'printf "admin\nlogin\nftp\n" > /tmp/pt15.txt; ffuf -u http://juice.el34.lab/FUZZ -w /tmp/pt15.txt -mc 200,301,403 -s 2>&1 | head -5; rm -f /tmp/pt15.txt'
    answer_detail: "PTES 정보수집 — 포트(nmap)+경로(ffuf). 공격 표면 매핑."
    expected_output: |
      PORT     STATE SERVICE
      80/tcp   open  http
      443/tcp  open  https
      8001/tcp open  vcom-tunnel
      login
      admin
      ftp
    verify:
      type: output_contains
      expect: 'open'
      field: stdout
      semantic:
        intent: "PTES 정찰"
        success_criteria: ["포트+경로"]
        acceptable_methods: ["**[OSS] nmap+ffuf (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표 — PTES ④ 취약점 분석: 웹 익스플로잇
      두 vhost 의 웹 취약점을 식별한다 — SQLi(차단)·강제 브라우징(열림).

      ## 📖 개념 한 줄
      정찰로 찾은 표면을 실제 취약점으로 좁힌다 — dvwa(SecRuleEngine On)는 SQLi 가 WAF 에 403 으로
      막히고(W04), juice(DetectionOnly)는 /ftp 강제 브라우징이 200 으로 열린다(W06). 막힘/열림 자체가
      침투 경로 정보다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi 시도 — dvwa.el34.lab에 UNION SELECT 주입(ModSec On이라 403 차단=탐지)
      curl -s -o /dev/null -w 'sqli=%{http_code} ' -A sqlmap/1.7 "http://dvwa.el34.lab/?id=pt15%27%20UNION%20SELECT%201--"
      # 2) 강제 브라우징 — juice.el34.lab /ftp 접근(DetectionOnly라 200 열림)
      curl -s -o /dev/null -w 'ftp=%{http_code}\n' http://juice.el34.lab/ftp
      ```
      sqli=403(dvwa WAF 차단=탐지) vs ftp=200(juice 강제 브라우징 열림)의 대비가 침투 경로 정보다 —
      막힌 문(SQLi) 대신 열린 문(/ftp)으로 들어간다.
      > 💡 **화면으로 확인:** 브라우저에서 `http://juice.el34.lab/ftp` 를 열면 UI 에 없던 디렉토리 목록이 그대로
      > 뜬다(200). SQLi 는 스캐너 UA(sqlmap/1.7)까지 재현하려면 **Burp Repeater** 로 User-Agent 를 바꿔 보내 403 을 확인한다.

      ## ✅ 합격 기준
      `ftp=200` 출력 시 통과. **근거:** /ftp 강제 브라우징이 200(열림)으로 응답하면 침투 경로가
      확인된 것 — SQLi 는 dvwa 에서 403(WAF 차단=탐지)으로 막히는 대비가 보인다.
    hint: 'SQLi + /ftp'
    category: manipulation
    points: 12
    answer: |
      # 1) SQLi 시도 — dvwa.el34.lab에 UNION SELECT 주입(ModSec On이라 403 차단=탐지)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'sqli=%{http_code} ' -A sqlmap/1.7 \"http://dvwa.el34.lab/?id=pt15%27%20UNION%20SELECT%201--\""
      # 2) 강제 브라우징 — juice.el34.lab /ftp 접근(DetectionOnly라 200 열림)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'ftp=%{http_code}\n' http://juice.el34.lab/ftp"
    answer_detail: "취약점 분석 — SQLi(W04)+강제 브라우징(W06). 침투 경로 선택."
    expected_output: |
      sqli=403 ftp=200
    verify:
      type: output_contains
      expect: 'ftp=200'
      field: stdout
      semantic:
        intent: "웹 취약점 익스플로잇"
        success_criteria: ["SQLi+강제브라우징"]
        acceptable_methods: ["**[OSS] SQLi+/ftp (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — PTES ⑤ 익스플로잇: 셸 캡처
      코드 실행 거점(셸)을 확보하고 리스너 포트를 osquery 로 확인한다.

      ## 📖 개념 한 줄
      익스플로잇의 결과물은 "코드 실행 거점"이다. 여기선 리스너(포트 51515)를 띄워 셸 확보를 모사하고,
      방어자 도구 osquery listening_ports 로 그 포트를 확인한다(W08 패턴). 확인 후 즉시 정리.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다(root 작업은 `sudo`).

      ```bash
      # 1) 셸 거점 모사 — 백그라운드 리스너(포트 51515) 기동
      nohup python3 -m http.server 51515 >/dev/null 2>&1 &
      # 2) 리스너가 뜰 때까지 대기 — 고정 sleep 대신 포트가 열리면 즉시 진행(조건 폴링, 최대 5초)
      timeout 5 bash -c 'until ss -tlnp | grep -q :51515; do :; done'
      # 3) 포트 51515를 듣는 프로세스(pid) 확인 = 코드 실행 거점(셸) 확보
      ss -tlnp | grep ':51515'
      # 4) 리스너 즉시 정리([h]ttp 자기매칭 회피)
      pkill -f "[h]ttp.server 51515"
      ```
      `ss -tlnp` 출력에 포트 51515 와 주인 프로세스(pid)가 보이면 임의 프로세스를 띄울 수 있었다는 뜻 = 셸
      확보다. 공유 인프라라 확인 직후 pkill 로 정리한다(방어자는 osquery `listening_ports` 로도 같은 포트를 본다).

      ## ✅ 합격 기준
      `51515` 출력 시 통과. **근거:** ss 로 포트 51515 리스너(pid)가 잡히면 코드 실행 거점(셸) 확보 —
      고정 sleep 대신 조건 폴링으로 포트가 뜰 때까지 기다렸다 확인하고, 확인 즉시 리스너를 정리한다.
    hint: '리스너 51515'
    category: manipulation
    points: 12
    answer: |
      # ⑤ 익스플로잇 — 리스너 기동 → 조건 폴링 대기 → ss로 51515 확인 → self-clean(한 세션 원자 실행)
      ssh ccc@10.20.32.80 'nohup python3 -m http.server 51515 >/dev/null 2>&1 &
      timeout 5 bash -c "until ss -tlnp | grep -q :51515; do :; done"
      ss -tlnp | grep ":51515"
      pkill -f "[h]ttp.server 51515"'
    answer_detail: "PTES 익스플로잇 = 코드 실행 거점(셸) 확보(W08 CTF 패턴). 비표준 포트 51515 리스너를 띄워 코드 실행을 모사하고, 고정 sleep 대신 'until ss grep -q :51515' 조건 폴링으로 리스너가 뜰 때까지 기다렸다 ss -tlnp 로 포트·pid 를 확인하면 셸 확보 입증. 방어자는 osquery listening_ports 로도 같은 포트를 본다. 출력에 51515 가 보이면 통과. 공유 인프라 보존을 위해 확인 즉시 pkill self-clean."
    expected_output: |
      LISTEN 0      5            0.0.0.0:51515      0.0.0.0:*    users:(("python3",pid=53899,fd=3))
    verify:
      type: output_contains
      expect: '51515'
      field: stdout
      semantic:
        intent: "셸 캡처"
        success_criteria: ["리스너 51515", "ss 조건폴링 확인"]
        acceptable_methods: ["**[OSS] 리스너+ss(조건폴링) (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — PTES ⑤ 권한 상승: 열거
      저권한(ccc) 컨텍스트에서 SUID/그룹을 열거해 root 경로를 탐색한다.

      ## 📖 개념 한 줄
      셸은 보통 저권한이다. SUID 바이너리·그룹 멤버십을 열거해 GTFObins root 경로 후보를 찾는다(W11).
      캡스톤은 열거까지만(읽기전용), 실제 상승은 개념.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 저권한 셸:** 침투로 얻은 거점 — `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 sudo 없이 열거한다(저권한 시선).

      ```bash
      # 1) SUID 열거 — 저권한 ccc로 root 권한 실행 파일 목록 + 그룹 멤버십(id) 확인
      echo "[SUID]"; find / -perm -4000 -type f 2>/dev/null | head -5; echo "[그룹]"; id
      ```
      SUID 목록에서 비정상 바이너리(셸/에디터/find 등)를 GTFObins 경로에 대조하면 root 후보가 나오고, id 의
      sudo/www-data 그룹 멤버십도 상승 단서다(W11). 캡스톤은 열거까지만 하고 실제 root 상승은 개념으로 남긴다(읽기전용).

      ## ✅ 합격 기준
      `SUID` 출력 시 통과. **근거:** [SUID] 표지와 함께 root 권한 실행 파일 목록·그룹 멤버십이
      출력되면 privesc 열거 성공 — 비정상 SUID 는 GTFObins root 경로 후보다(캡스톤은 열거까지).
    hint: 'SUID 열거'
    category: recon
    points: 12
    answer: |
      # 1) SUID 열거 — 저권한 ccc로 root 권한 실행 파일 목록 + 그룹 멤버십(id) 확인
      ssh ccc@10.20.32.80 'echo "[SUID]"; find / -perm -4000 -type f 2>/dev/null | head -5; echo "[그룹]"; id'
    answer_detail: "권한 상승 — SUID/sudo 열거(W11) → GTFObins로 root. 캡스톤은 열거까지(실제 상승은 읽기전용)."
    expected_output: |
      [SUID]
      /usr/bin/passwd
      /usr/bin/su
      /usr/bin/mount
      /usr/bin/umount
      /usr/bin/chsh
      [그룹]
      uid=1000(ccc) gid=1000(ccc) groups=1000(ccc),27(sudo),33(www-data)
    verify:
      type: output_contains
      expect: 'SUID'
      field: stdout
      semantic:
        intent: "privesc 열거"
        success_criteria: ["SUID/sudo 열거"]
        acceptable_methods: ["**[OSS] find -perm -4000 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — PTES ⑥ 포스트 익스플로잇: persistence + 유출
      백도어 계정(persistence)과 데이터 staging(유출 준비)을 수행한다.

      ## 📖 개념 한 줄
      침투를 "끊기지 않는 접근 + 데이터 탈취"로 굳힌다 — 백도어 계정 pt15ghost(T1136, W12)와 민감 파일
      tar staging(유출 준비, W12 UEBA). 둘 다 미션 9 에서 self-clean.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다(root 작업은 `sudo`).

      ```bash
      # 1) persistence + staging — 백도어 계정 pt15ghost 생성 + 민감 파일 tar로 유출 준비
      sudo userdel -r pt15ghost >/dev/null 2>&1; sudo useradd -m -s /bin/bash pt15ghost; tar czf /tmp/pt15_exfil.tar.gz -C / etc/passwd etc/hostname; echo "persist+exfil"
      # 2) 발판 확인 — osquery users로 백도어 계정 pt15ghost 조회
      sudo osqueryi --json 'SELECT username,uid FROM users WHERE username="pt15ghost";'
      ```
      osquery users 에 pt15ghost 가 잡히면 persistence(백도어 계정, T1136 W12) + 유출 staging(민감 파일 tar,
      W12 UEBA)의 포스트 익스플로잇이 완료된 것 — 침투를 "끊기지 않는 접근 + 데이터 탈취"로 굳혔다(미션 9에서 self-clean).

      ## ✅ 합격 기준
      `pt15ghost` 출력 시 통과. **근거:** osquery users 조회에 백도어 계정 pt15ghost 가 잡히면
      persistence(계정)+유출(staging) 포스트 익스플로잇 성공 — 미션 9 에서 전수 self-clean.
