      ## 🎯 목표
      W03 전 과정(열거 → 인증 우회 → JWT 디코드/위조 → 방어 탐지)을 침투 테스트 보고서로 종합한다.
      실제 펜테스트 산출물(보고서)의 축소판을 편집기로 작성하는 단계다.

      ## 💡 개념 한 줄
      좋은 공격자는 발견·우회·노출·탐지를 재현 가능한 보고서로 남긴다 — 무엇을 어떻게 찾았고, 그것이
      방어에 어떻게 보였는지가 핵심이다(PTES ⑥ 보고 단계).

      ## 💻 실행 방법 — 편집기로 보고서 작성

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 `nano ~/w03_report.md` 를 열고, 앞서 만든
      공격표면 맵(`~/w03_surface.md`)과 각 단계의 관찰값을 참고해 아래 골격을 채운 뒤 저장한다
      (Ctrl+O 저장, Ctrl+X 종료). `<관찰값>` 자리엔 자신이 실제로 본 응답·룰ID·email 을 적는다.

      ```markdown
      # 공격 W03 — API/JWT 침투 보고서 (juice.el34.lab)
      ## 1. API 열거   : /rest/* 매핑(ffuf) — 발견 경로 <관찰값>
      ## 2. 인증 우회   : 로그인 SQLi(email에 OR 1=1-- 주입) → admin JWT 획득 (OWASP A07)
      ## 3. JWT 분석    : payload 디코드 → email=<관찰값>, role=admin / jwt_tool -X a 로 alg:none 위조
      ## 4. 방어 가시성 : 로그인 SQLi → ModSec 룰 <관찰값>(942 대역). juice DetectionOnly라 200 통과+로그 기록
      ## 결론          : 현대 웹 공격 = 엔드포인트 + 토큰 중심. JWT 는 디코드 가능 + 서명(alg:none) 우회 위험
      ```
      작성 후 `cat ~/w03_report.md` 로 확인한다 — echo 로 찍어내는 게 아니라 직접 쓴 문서라야 보고서다.

      ## ✅ 합격 기준
      `JWT` 출력 시 통과. **근거:** 보고서에 API 열거·인증 우회·JWT 분석이 모두 포함되면 통과 — 공격이
      방어에 어떻게 보이는지까지 담는 것이 핵심이다.
