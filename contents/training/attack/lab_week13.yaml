      ## 🎯 목표 — Caldera 자동화 이해 + 정리
      Caldera 자동화 구조(server/ability/adversary/agent)를 정리하고 atomic 흔적(atkw13)을 self-clean 한다.

      ## 📖 개념 한 줄
      우리가 손으로 한 atomic 기법들을 Caldera 는 server(본부)→adversary(ability 묶음)→agent(sandcat)로
      자동·일관 실행한다. 실습 흔적(계정 atkw13)은 공유 인프라 보존을 위해 전수 제거한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** Caldera 구조 확인은 el34 호스트(`~/caldera-src`), 흔적 정리는 `el34-web`.

      ```bash
      # ── el34 호스트에서: Caldera 자동화 구조 확인 ──
      # 1) Caldera 자동화 구조 — 서버→adversary(ability 묶음)→agent(sandcat) 자동 실행
      echo "서버(UI/API) → adversary(ability 묶음) → agent(sandcat)가 타깃에서 ability 자동 실행"
      # 2) 설치 구조 확인 — server.py/plugins/conf 존재
      ls ~/caldera-src/ | grep -E "server.py|plugins|conf" | head
      # ── el34-web 에서: atomic 흔적 정리(self-clean) ──
      # 3) atomic 흔적 정리(self-clean) — 백도어 계정 atkw13 제거 후 잔재 확인
      userdel -r atkw13 2>/dev/null; id atkw13 2>/dev/null && echo "계정 잔재!" || echo clean
      ```

      ## ✅ 합격 기준
      `clean` 출력 시 통과. **근거:** Caldera 구조(server/ability/adversary/agent)를 정리하고 계정
