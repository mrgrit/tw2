lab_id: standalone-attack-week13
title: "MITRE Caldera ATT&CK 자동 에뮬레이션 vs 탐지·매핑"
version: standalone-attack
course: attack
week: 13
description: |
  ATT&CK 기법을 에뮬레이션하고 탐지 커버리지를 매핑한다. Caldera(설치됨)가 자동화하는 atomic 기법
  (discovery/persistence/execution)을 실행하고, Wazuh/sysmon/osquery 탐지에 매핑해 커버리지 갭을 찾는다.
  atomic 기법은 self-clean. 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W12 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(Caldera) §3(atomic) §4(커버리지) 숙지"
objectives:
  - "ATT&CK 기법(discovery/persistence/execution) 에뮬레이션"
  - "각 기법의 Wazuh/sysmon/osquery 탐지 매핑"
  - "탐지 커버리지 갭 식별 + Caldera 자동화 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — Caldera + Wazuh
      ## 💻 실행 명령
      ```bash
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera 설치됨"
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ```
      ## ✅ 합격 기준
      Caldera 설치 + Wazuh 가동.
    hint: 'caldera server.py + analysisd'
    category: survey
    points: 10
    answer: |
      echo "=== Caldera ==="
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera 설치됨" || echo "caldera 미설치"
      echo "=== Wazuh ==="
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "Caldera(ATT&CK 자동 에뮬레이션 서버) + Wazuh(탐지). Caldera는 ability/adversary를 agent로 자동 실행."
    verify:
      type: output_contains
      expect: 'caldera'
      field: stdout
      semantic:
        intent: "Caldera + Wazuh 점검"
        success_criteria: ["caldera 설치", "analysisd"]
        acceptable_methods: ["**[OSS] ls caldera + wazuh-control (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 에뮬레이션 — discovery (T1082/T1087/T1083)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'echo "[T1082]"; uname -a; echo "[T1087]"; head -3 /etc/passwd; echo "[T1083]"; find /etc -name "*.conf" 2>/dev/null | head -3'
      ```
      ## ✅ 합격 기준
      discovery 기법(시스템/계정/파일)을 에뮬레이션한다.
    hint: 'uname/passwd/find discovery'
    category: recon
    points: 12
    answer: |
      echo "=== ATT&CK discovery 에뮬레이션 ==="
      docker exec el34-web sh -c 'echo "[T1082 System Info]"; uname -a; echo "[T1087 Account]"; head -3 /etc/passwd; echo "[T1083 File/Dir]"; find /etc -name "*.conf" 2>/dev/null | head -3'
      echo "→ Caldera ability가 자동화하는 discovery 기법. 일관·반복 가능"
    answer_detail: "discovery = 환경 정찰(T1082 시스템/T1087 계정/T1083 파일). Caldera ability가 이 atomic 명령을 agent로 자동 실행. 손으로 하던 정찰을 자동으로."
    verify:
      type: output_contains
      expect: 'T1082'
      field: stdout
      semantic:
        intent: "discovery 기법 에뮬레이션"
        success_criteria: ["T1082/T1087/T1083 실행"]
        acceptable_methods: ["**[OSS] discovery atomic (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 에뮬레이션 — persistence (T1136)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; useradd -m -s /bin/bash atkw13 && echo "[T1136] account created"'
      ```
      ## ✅ 합격 기준
      persistence(계정 생성) 기법을 에뮬레이션한다.
    hint: 'useradd T1136'
    category: manipulation
    points: 12
    answer: |
      echo "=== ATT&CK persistence 에뮬레이션 (T1136) ==="
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; useradd -m -s /bin/bash atkw13 && echo "[T1136] account atkw13 created"'
      echo "→ Caldera persistence ability = 계정/cron/키 자동 생성"
    answer_detail: "persistence T1136 Create Account. Caldera가 자동 실행하는 지속성 기법. (cron/키 등 다른 ability도)"
    verify:
      type: output_contains
      expect: 'T1136'
      field: stdout
      semantic:
        intent: "persistence 기법 에뮬레이션"
        success_criteria: ["T1136 계정 생성"]
        acceptable_methods: ["**[OSS] useradd T1136 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 에뮬레이션 — execution (T1059 인코딩)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web python3 -c "import base64; base64.b64decode('aGk=')  # atkw13 T1059"
      sleep 2
      echo "[T1059] encoded exec done"
      ```
      ## ✅ 합격 기준
      execution(인코딩 명령) 기법을 에뮬레이션한다.
    hint: 'b64 encoded exec T1059'
    category: manipulation
    points: 12
    answer: |
      echo "=== ATT&CK execution 에뮬레이션 (T1059) ==="
      docker exec el34-web python3 -c "import base64; base64.b64decode('aGk=')  # atkw13 b64decode T1059" 2>/dev/null
      sleep 2
      echo "[T1059] encoded command executed"
    answer_detail: "execution T1059 Command Interpreter — 인코딩 명령(b64decode). Caldera execution ability. sysmon이 ProcessCreate로 잡는다(다음 단계)."
    verify:
      type: output_contains
      expect: 'T1059'
      field: stdout
      semantic:
        intent: "execution 기법 에뮬레이션"
        success_criteria: ["T1059 인코딩 실행"]
        acceptable_methods: ["**[OSS] b64 exec (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 매핑 — 각 기법
      ## 💻 실행 명령
      ```bash
      echo "[T1136 탐지]"; docker exec el34-web osqueryi --json 'SELECT username FROM users WHERE username="atkw13";'
      echo "[T1059 탐지]"; grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,30}" | head -1
      ```
      ## ✅ 합격 기준
      에뮬레이션 기법이 osquery/sysmon에 탐지됨을 매핑한다.
    hint: 'osquery(T1136) + sysmon(T1059)'
    category: analysis
    points: 14
    answer: |
      echo "=== 탐지 매핑 ==="
      echo "[T1136 Create Account → osquery]"; docker exec el34-web osqueryi --json 'SELECT username,uid FROM users WHERE username="atkw13";'
      echo "[T1059 Encoded Exec → sysmon]"; grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,30}" | head -1
      echo "→ 각 ATT&CK 기법을 탐지 소스에 매핑: T1136=osquery users, T1059=sysmon ProcessCreate"
    answer_detail: "탐지 매핑 = 각 에뮬레이션 기법이 어느 소스에 잡히나. T1136(계정)=osquery, T1059(인코딩 exec)=sysmon. 커버리지 측정의 기초."
    verify:
      type: output_contains
      expect: 'atkw13'
      field: stdout
      semantic:
        intent: "기법별 탐지 매핑"
        success_criteria: ["T1136 osquery", "T1059 sysmon"]
        acceptable_methods: ["**[OSS] osquery+sysmon 매핑 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 커버리지 갭 식별
      ## 💻 실행 명령
      ```bash
      echo "T1136 osquery ✅ / T1059 sysmon ✅ / T1082 discovery(read-only) ❌(탐지 어려움) → 갭"
      ```
      ## ✅ 합격 기준
      탐지된 기법과 갭(미탐지)을 구분한다.
    hint: '탐지✅ vs 갭❌'
    category: analysis
    points: 12
    answer: |
      echo "=== 탐지 커버리지 ==="
      echo "T1136 Create Account → osquery/FIM ✅"
      echo "T1059 Encoded Exec   → sysmon ProcessCreate ✅"
      echo "T1082/T1087/T1083 Discovery(읽기 명령) → 탐지 어려움 ❌ (read-only, 시그니처 약함)"
      echo "→ 갭(❌) = 룰 보강 대상(W14). discovery는 baseline 이상행위로 잡아야"
    answer_detail: "커버리지 갭 = 탐지 안 된 기법. persistence/execution은 잘 잡지만 discovery(읽기 명령)는 시그니처가 약해 갭. 갭은 W14에서 룰 보강."
    verify:
      type: output_contains
      expect: '갭'
      field: stdout
      semantic:
        intent: "탐지 커버리지 갭 식별"
        success_criteria: ["탐지/갭 구분"]
        acceptable_methods: ["**[설명] 커버리지 갭 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 Caldera 자동화 이해 + 정리
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; id atkw13 2>/dev/null && echo "잔재!" || echo clean'
      ls ~/caldera-src/ | grep -E "server.py|plugins" | head
      ```
      ## ✅ 합격 기준
      Caldera 구조 이해 + atomic 흔적 정리.
    hint: 'Caldera 구조 + self-clean'
    category: cleanup
    points: 12
    answer: |
      echo "=== Caldera 자동화 구조 ==="
      echo "서버(UI/API) → adversary(ability 묶음) → agent(sandcat)가 타깃에서 ability 자동 실행"
      ls ~/caldera-src/ | grep -E "server.py|plugins|conf" | head
      echo "=== atomic 흔적 정리 ==="
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; id atkw13 2>/dev/null && echo "계정 잔재!" || echo clean'
    answer_detail: "Caldera = 서버+ability+adversary+agent. 우리가 손으로 한 atomic 기법을 agent로 자동·일관 실행. atomic 흔적(atkw13) self-clean."
    verify:
      type: output_contains
      expect: 'clean'
      field: stdout
      semantic:
        intent: "Caldera 구조 이해 + 정리"
        success_criteria: ["Caldera 구조", "흔적 정리"]
        acceptable_methods: ["**[OSS] 정리 + 구조 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 에뮬레이션 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격 W13 ATT&CK 에뮬레이션 보고서 (학번, 이름)
      ## 1. 에뮬레이션 기법 (discovery/persistence/execution)
      ## 2. 탐지 매핑 (기법→소스)
      ## 3. 커버리지 갭
      ## 4. Caldera 자동화
      ```
      ## ✅ 합격 기준
      보고서에 에뮬레이션 + 커버리지가 포함된다.
    hint: '에뮬레이션+매핑+갭'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 공격 W13 ATT&CK 에뮬레이션 보고서
      ## 1. 에뮬레이션: T1082/T1087/T1083(discovery), T1136(persistence), T1059(execution)
      ## 2. 탐지 매핑: T1136→osquery✅, T1059→sysmon✅, discovery→❌
      ## 3. 커버리지 갭: discovery(읽기 명령) 탐지 약함 → W14 보강 대상
      ## 4. Caldera: 서버+ability+adversary+agent로 이 기법들을 자동·일관 실행
      ## 결론: 자동 에뮬레이션으로 탐지 커버리지를 객관 측정. 갭을 찾아 보강(W14)
      EOF
    answer_detail: "ATT&CK 에뮬레이션 = 기법 자동 실행 + 탐지 매핑 + 갭 식별. Caldera가 자동화. purple team의 시작."
    verify:
      type: output_contains
      expect: 'ATT&CK'
      field: stdout
      semantic:
        intent: "에뮬레이션 종합 보고"
        success_criteria: ["에뮬레이션/매핑/갭"]
        acceptable_methods: ["**[관리적] 에뮬레이션 보고서 (권장)**"]
    target_vm: web
