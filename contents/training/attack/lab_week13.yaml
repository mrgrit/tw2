lab_id: standalone-attack-week13
title: "MITRE Caldera ATT&CK 자동 에뮬레이션 vs 탐지·매핑"
version: standalone-attack
course: attack
week: 13
description: |
  MITRE Caldera 가 자동화하는 ATT&CK 기법을 손으로 에뮬레이션하고, 그 각각이 방어 스택에 잡히는지
  탐지 커버리지를 매핑한다. Caldera 는 ATT&CK 기법을 자동 에뮬레이션하는 레드팀 프레임워크로,
  server(본부)·ability(기법=atomic 명령)·adversary(ability 묶음=시나리오)·agent(sandcat, 현장 요원)로
  구성된다(el34 호스트 ~/caldera-src 에 설치됨). 본 lab 은 Caldera 가 자동화하는 atomic 기법을 학생이
  직접 한 번씩 실행해 — discovery(T1082/T1087/T1083), persistence(T1136), execution(T1059) — 각 기법을
  Wazuh/sysmon/osquery 탐지에 매핑하고, 상태를 바꾸는 기법(잘 잡힘)과 읽기 기반 discovery(시그니처
  약함=갭)를 구분해 커버리지 갭을 찾는다. 갭은 W14 에서 룰로 보강·재검증한다(purple team). 심은 계정
  흔적(atkw13)은 self-clean. 인가된 실습 환경(el34)에서만. 모든 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W12 통과 (정찰·SQLi·접근제어·권한상승·지속성을 손으로 수행한 경험)"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151, pw 1) + docker exec 사용"
  - "lecture §2(Caldera 4구성요소·설치) §3(ATT&CK=atomic 명령) §4(탐지 커버리지·갭) 숙지"
objectives:
  - "adversary emulation 의 정의(알려진 ATT&CK 기법을 일관·반복 재현)와 pentest 와의 차이를 설명한다"
  - "ATT&CK 기법(discovery T1082/T1087/T1083 · persistence T1136 · execution T1059)을 atomic 명령으로 에뮬레이션한다"
  - "각 기법을 탐지 소스에 매핑한다 — T1136=osquery users, T1059=sysmon ProcessCreate"
  - "탐지 커버리지 갭을 식별한다 — 상태 변경 기법은 탐지, 읽기 기반 discovery 는 갭(W14 보강 대상)"
  - "Caldera 자동화 구조(server/ability/adversary/agent sandcat)를 설명하고 atomic 흔적을 self-clean 한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      에뮬레이션을 시작하기 전, 두 전제를 점검한다 — 공격 자동화 도구 **Caldera 가 설치**되어 있고,
      측정용 방어 **Wazuh 가 가동** 중인가.

      ## 📖 개념 (왜 이걸 하나)
      adversary emulation 은 "공격을 일관 재현해 탐지를 **측정**"하는 활동이다. 그러려면 (1) 공격을
      자동화하는 Caldera 와 (2) 탐지를 평가하는 Wazuh 가 모두 준비돼야 한다. 측정 도구(Wazuh)가
      죽어 있으면 "탐지됨/안 됨" 결과 자체를 믿을 수 없다.

      ## 💻 실행 명령
      ```bash
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera 설치됨"
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ```

      ## 🧩 처음 나오는 것
      - **Caldera** — MITRE 의 ATT&CK 자동 에뮬레이션 프레임워크. el34 호스트 `~/caldera-src` 에
        설치됨(원래 없던 도구를 이번 주 위해 설치, lecture §2.3). 진입점이 `server.py`.
      - **analysisd** — Wazuh manager 의 핵심 데몬. agent 가 올린 로그를 룰로 평가해 경보를 만드는
        "두뇌". 이게 떠 있어야 탐지가 동작한다.

      ## ✅ 합격 기준
      출력에 `caldera`(설치됨)가 보이고 `analysisd` 가 running 이면 통과. 둘 중 하나라도 없으면
      에뮬레이션·측정의 전제가 깨진 것이니 먼저 원인을 본다.
    hint: 'caldera server.py + analysisd'
    category: survey
    points: 10
    answer: |
      echo "=== Caldera ==="
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera 설치됨" || echo "caldera 미설치"
      echo "=== Wazuh ==="
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "에뮬레이션의 두 전제 점검. Caldera = ATT&CK 자동 에뮬레이션 프레임워크(server/ability/adversary/agent sandcat 으로 구성, ability·adversary 를 agent 가 타깃에서 자동 실행). el34 호스트 ~/caldera-src 에 설치(server.py 가 진입점). Wazuh analysisd = 로그를 룰로 평가하는 탐지 두뇌 — 이게 살아 있어야 뒤 미션의 탐지 결과를 신뢰할 수 있다."
    verify:
      type: output_contains
      expect: 'caldera'
      field: stdout
      semantic:
        intent: "Caldera + Wazuh 점검"
        success_criteria: ["caldera 설치", "analysisd"]
        acceptable_methods: ["**[OSS] ls caldera + wazuh-control (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표
      공격의 첫 전술 **Discovery(정찰)** 를 atomic 명령으로 직접 에뮬레이션한다. 세 기법을 한 번에 —
      T1082(시스템 정보) · T1087(계정) · T1083(파일/디렉터리).

      ## 📖 개념 (왜 이걸 하나)
      Caldera 의 ability(동작 하나 = ATT&CK 기법 하나)가 자동화하는 정찰 명령이 무엇인지 손으로
      익힌다. 자동화의 부품(atomic 명령)을 알아야, 나중에 Caldera 가 돌린 결과를 해석할 수 있다.
      세 기법 모두 **읽기 명령**이라는 공통점이 미션 6(갭)의 복선이다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'echo "[T1082]"; uname -a; echo "[T1087]"; head -3 /etc/passwd; echo "[T1083]"; find /etc -name "*.conf" 2>/dev/null | head -3'
      ```

      ## 🧩 처음 나오는 것
      - **atomic 명령** — 한 ATT&CK 기법을 표현하는 가장 작은 단일 명령. T1082=`uname -a`,
        T1087=`/etc/passwd` 읽기, T1083=`find ... *.conf`.
      - **ATT&CK ID(T####)** — 같은 행위를 누가 하든 같은 번호로 부르는 표준 식별자. 공격–방어가
        같은 단어를 쓰게 해 매핑을 가능케 한다(lecture §1.3).

      ## ✅ 합격 기준
      출력에 `T1082` 등 각 기법 표지와 함께 시스템 정보·계정 일부·설정 파일 목록이 보이면 통과.
      세 기법이 모두 "시스템을 바꾸지 않는 읽기"임을 확인한다.
    hint: 'uname/passwd/find discovery'
    category: recon
    points: 12
    answer: |
      echo "=== ATT&CK discovery 에뮬레이션 ==="
      docker exec el34-web sh -c 'echo "[T1082 System Info]"; uname -a; echo "[T1087 Account]"; head -3 /etc/passwd; echo "[T1083 File/Dir]"; find /etc -name "*.conf" 2>/dev/null | head -3'
      echo "→ Caldera ability가 자동화하는 discovery 기법. 일관·반복 가능"
    answer_detail: "Discovery(정찰) 전술의 세 기법을 atomic 명령으로 에뮬레이션 — T1082 System Info(uname)/T1087 Account(/etc/passwd)/T1083 File·Dir(find). Caldera ability 가 이 atomic 명령을 agent(sandcat)로 자동·일관 실행하는 것을 손으로 재현한 것. 셋 다 시스템 상태를 바꾸지 않는 읽기 명령이라 미션 6 에서 탐지 갭이 되는 복선."
    verify:
      type: output_contains
      expect: 'T1082'
      field: stdout
      semantic:
        intent: "discovery 기법 에뮬레이션"
        success_criteria: ["T1082/T1087/T1083 실행"]
        acceptable_methods: ["**[OSS] discovery atomic (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      지속성(Persistence)의 대표 기법 **T1136 Create Account** 를 에뮬레이션한다 — 백도어 계정
      `atkw13` 생성. (W12 에서 손으로 심던 백도어 계정의 ATT&CK 이름표가 T1136 이다.)

      ## 📖 개념 (왜 이걸 하나)
      공격자는 침투 후 재부팅·패치에도 살아남을 발판을 굳힌다(지속성). 계정 생성은 가장 흔한
      지속성 기법이다. 이 동작은 시스템 **상태를 바꾸므로**(users 테이블·/etc/passwd 에 새 항목)
      미션 5 에서 osquery 에 명확히 잡힌다 — "상태 변화 = 탐지 용이"의 예고다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; useradd -m -s /bin/bash atkw13 && echo "[T1136] account created"'
      ```

      ## 🧩 처음 나오는 것
      - **T1136 Create Account** — 지속성 전술의 ATT&CK 기법. Caldera persistence ability 가
        자동화하는 것이 이런 계정/cron/SSH 키 생성 동작이다.
      - **네임스페이스** — 본 주차의 흔적 계정명은 `atkw13` 으로 고정(다른 학생·주차와 충돌 방지).
        앞의 `userdel -r` 은 이전 실행 잔재를 먼저 지워 멱등(반복 실행 안전)하게 만드는 것.

      ## ✅ 합격 기준
      `[T1136] account ... created` 가 출력되면 통과. 이 계정은 미션 7 에서 반드시 self-clean 한다.
    hint: 'useradd T1136'
    category: manipulation
    points: 12
    answer: |
      echo "=== ATT&CK persistence 에뮬레이션 (T1136) ==="
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; useradd -m -s /bin/bash atkw13 && echo "[T1136] account atkw13 created"'
      echo "→ Caldera persistence ability = 계정/cron/키 자동 생성"
    answer_detail: "Persistence(지속성) 전술의 T1136 Create Account 를 에뮬레이션 — 백도어 계정 atkw13 생성. Caldera persistence ability 가 자동화하는 발판 굳히기 동작(계정/cron/SSH 키 등). 계정 생성은 시스템 상태를 바꾸므로 미션 5 에서 osquery users 테이블에 명확히 탐지된다(상태 변경=탐지 용이). 흔적은 atkw13 으로 고정, 미션 7 에서 self-clean."
    verify:
      type: output_contains
      expect: 'T1136'
      field: stdout
      semantic:
        intent: "persistence 기법 에뮬레이션"
        success_criteria: ["T1136 계정 생성"]
        acceptable_methods: ["**[OSS] useradd T1136 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 에뮬레이션 — execution (T1059 인코딩)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web python3 -c "import base64; base64.b64decode('aGk=')  # atkw13 T1059"
      sleep 2
      echo "[T1059] encoded exec done"
      ```
      ## ✅ 합격 기준
      execution(인코딩 명령) 기법을 에뮬레이션한다.
    hint: 'b64 encoded exec T1059'
    category: manipulation
    points: 12
    answer: |
      echo "=== ATT&CK execution 에뮬레이션 (T1059) ==="
      docker exec el34-web python3 -c "import base64; base64.b64decode('aGk=')  # atkw13 b64decode T1059" 2>/dev/null
      sleep 2
      echo "[T1059] encoded command executed"
    answer_detail: "execution T1059 Command Interpreter — 인코딩 명령(b64decode). Caldera execution ability. sysmon이 ProcessCreate로 잡는다(다음 단계)."
    verify:
      type: output_contains
      expect: 'T1059'
      field: stdout
      semantic:
        intent: "execution 기법 에뮬레이션"
        success_criteria: ["T1059 인코딩 실행"]
        acceptable_methods: ["**[OSS] b64 exec (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 매핑 — 각 기법
      ## 💻 실행 명령
      ```bash
      echo "[T1136 탐지]"; docker exec el34-web osqueryi --json 'SELECT username FROM users WHERE username="atkw13";'
      echo "[T1059 탐지]"; grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,30}" | head -1
      ```
      ## ✅ 합격 기준
      에뮬레이션 기법이 osquery/sysmon에 탐지됨을 매핑한다.
    hint: 'osquery(T1136) + sysmon(T1059)'
    category: analysis
    points: 14
    answer: |
      echo "=== 탐지 매핑 ==="
      echo "[T1136 Create Account → osquery]"; docker exec el34-web osqueryi --json 'SELECT username,uid FROM users WHERE username="atkw13";'
      echo "[T1059 Encoded Exec → sysmon]"; grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,30}" | head -1
      echo "→ 각 ATT&CK 기법을 탐지 소스에 매핑: T1136=osquery users, T1059=sysmon ProcessCreate"
    answer_detail: "탐지 매핑 = 각 에뮬레이션 기법이 어느 소스에 잡히나. T1136(계정)=osquery, T1059(인코딩 exec)=sysmon. 커버리지 측정의 기초."
    verify:
      type: output_contains
      expect: 'atkw13'
      field: stdout
      semantic:
        intent: "기법별 탐지 매핑"
        success_criteria: ["T1136 osquery", "T1059 sysmon"]
        acceptable_methods: ["**[OSS] osquery+sysmon 매핑 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 커버리지 갭 식별
      ## 💻 실행 명령
      ```bash
      echo "T1136 osquery ✅ / T1059 sysmon ✅ / T1082 discovery(read-only) ❌(탐지 어려움) → 갭"
      ```
      ## ✅ 합격 기준
      탐지된 기법과 갭(미탐지)을 구분한다.
    hint: '탐지✅ vs 갭❌'
    category: analysis
    points: 12
    answer: |
      echo "=== 탐지 커버리지 ==="
      echo "T1136 Create Account → osquery/FIM ✅"
      echo "T1059 Encoded Exec   → sysmon ProcessCreate ✅"
      echo "T1082/T1087/T1083 Discovery(읽기 명령) → 탐지 어려움 ❌ (read-only, 시그니처 약함)"
      echo "→ 갭(❌) = 룰 보강 대상(W14). discovery는 baseline 이상행위로 잡아야"
    answer_detail: "커버리지 갭 = 탐지 안 된 기법. persistence/execution은 잘 잡지만 discovery(읽기 명령)는 시그니처가 약해 갭. 갭은 W14에서 룰 보강."
    verify:
      type: output_contains
      expect: '갭'
      field: stdout
      semantic:
        intent: "탐지 커버리지 갭 식별"
        success_criteria: ["탐지/갭 구분"]
        acceptable_methods: ["**[설명] 커버리지 갭 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 Caldera 자동화 이해 + 정리
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; id atkw13 2>/dev/null && echo "잔재!" || echo clean'
      ls ~/caldera-src/ | grep -E "server.py|plugins" | head
      ```
      ## ✅ 합격 기준
      Caldera 구조 이해 + atomic 흔적 정리.
    hint: 'Caldera 구조 + self-clean'
    category: cleanup
    points: 12
    answer: |
      echo "=== Caldera 자동화 구조 ==="
      echo "서버(UI/API) → adversary(ability 묶음) → agent(sandcat)가 타깃에서 ability 자동 실행"
      ls ~/caldera-src/ | grep -E "server.py|plugins|conf" | head
      echo "=== atomic 흔적 정리 ==="
      docker exec el34-web sh -c 'userdel -r atkw13 2>/dev/null; id atkw13 2>/dev/null && echo "계정 잔재!" || echo clean'
    answer_detail: "Caldera = 서버+ability+adversary+agent. 우리가 손으로 한 atomic 기법을 agent로 자동·일관 실행. atomic 흔적(atkw13) self-clean."
    verify:
      type: output_contains
      expect: 'clean'
      field: stdout
      semantic:
        intent: "Caldera 구조 이해 + 정리"
        success_criteria: ["Caldera 구조", "흔적 정리"]
        acceptable_methods: ["**[OSS] 정리 + 구조 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 에뮬레이션 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격 W13 ATT&CK 에뮬레이션 보고서 (학번, 이름)
      ## 1. 에뮬레이션 기법 (discovery/persistence/execution)
      ## 2. 탐지 매핑 (기법→소스)
      ## 3. 커버리지 갭
      ## 4. Caldera 자동화
      ```
      ## ✅ 합격 기준
      보고서에 에뮬레이션 + 커버리지가 포함된다.
    hint: '에뮬레이션+매핑+갭'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 공격 W13 ATT&CK 에뮬레이션 보고서
      ## 1. 에뮬레이션: T1082/T1087/T1083(discovery), T1136(persistence), T1059(execution)
      ## 2. 탐지 매핑: T1136→osquery✅, T1059→sysmon✅, discovery→❌
      ## 3. 커버리지 갭: discovery(읽기 명령) 탐지 약함 → W14 보강 대상
      ## 4. Caldera: 서버+ability+adversary+agent로 이 기법들을 자동·일관 실행
