lab_id: standalone-attack-week02
title: "정찰 심화(nmap NSE·nikto·디렉토리 brute) vs IDS/WAF 탐지"
version: standalone-attack
course: attack
week: 2
description: |
  열거(enumeration) 심화 — 포트 너머의 "숨은 콘텐츠"를 캔다. W01 이 "어디가 열렸나(포트)"였다면,
  W02 는 그 열린 웹 서버 안에 링크로 노출되지 않은 경로(/admin·/backup·/config)와 취약 파일을 찾는다.
  세 도구를 쓴다 — nmap NSE 스크립트(핑거프린팅 자동화), nikto(알려진 취약 파일/헤더 누락 자동 점검),
  ffuf(디렉토리 브루트포싱: 워드리스트의 각 단어를 경로로 요청해 응답 상태코드로 존재 경로를 판별).
  핵심 기술은 상태코드 읽기 — 200=접근 가능, 301/302=존재(이동), 403=존재하나 권한 차단, 404=없음.
  특히 403 은 "실패"가 아니라 "발견"이다. 더 깊은 열거는 더 많은 익스플로잇 기회를 주지만 더 시끄럽다
  (깊이 vs 은밀의 trade-off). 공격은 el34-attacker(도구 완비, 단 gobuster 는 인자 버그 → ffuf 사용),
  방어 가시성은 ips 의 Suricata eve.json·web 의 ModSecurity audit log(913 scanner 룰). el34 는 출처
  IP(10.20.30.202)를 fw→ips→web 전 계층에 보존하므로 공격하며 그 흔적을 동시에 본다. 인가된 실습만.
  명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec el34-attacker 로.
difficulty: medium
duration_minutes: 160
prerequisites:
  - "W01(정찰 개시) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2-§4(NSE/nikto/dir brute) §5(trade-off) 숙지"
objectives:
  - "정찰(recon, 포트·서비스)과 열거(enumeration, 경로·파일)의 차이를 PTES 안에서 구분한다"
  - "nmap NSE 스크립트(http-headers·http-title)로 수동 curl 핑거프린팅을 자동화한다"
  - "nikto 로 알려진 취약 파일·설정·보안 헤더 누락을 자동 점검하고, UA 노출로 인한 시끄러움을 이해한다"
  - "ffuf 디렉토리 브루트포싱으로 숨은 경로를 발견하고, 상태코드(200/301/403 vs 404)로 존재 경로를 판별한다"
  - "열거 흔적이 ModSec 913 scanner 룰·Suricata eve.json 에 출처 IP·시그니처로 남는 것을 추적한다"
  - "깊이(정보량) vs 은밀(탐지 위험)의 trade-off 와 완화 기법(UA 변조·느린 스캔·작은 워드리스트)을 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 심화 열거 도구 점검
      본격 열거에 앞서 도구 상자를 확인한다. 침투 현장의 첫 단계는 늘 "내 도구에 무엇이
      있는가"를 점검하는 것이다 — 도구 부재를 모르고 진행하면 이후 미션이 줄줄이 실패한다.

      ## 🧩 개념 한 줄
      `command -v <도구>` 는 그 명령의 실행 파일 경로를 출력한다(없으면 아무것도 안 나옴) —
      설치 여부를 확인하는 표준 방법이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 심화 열거 도구(nikto/gobuster/ffuf) 설치 경로 확인(없으면 빈 출력)
      docker exec el34-attacker sh -c 'command -v nikto; command -v gobuster; command -v ffuf'
      ```
      - nikto(웹 취약점 자동 점검), ffuf(디렉토리 브루트포싱 표준 도구), gobuster(el34-attacker 인자 버그 → ffuf 로 대체, 설치만 확인).

      ## ✅ 합격 기준
      `nikto` 출력 시 통과. **근거:** nikto/gobuster/ffuf 각각의 경로가 출력되면(=설치됨) 통과 —
      실제 브루트포싱은 ffuf 로 한다.
    hint: 'command -v nikto gobuster ffuf'
    category: survey
    points: 10
    answer: |
      # 1) 심화 열거 도구(nikto/gobuster/ffuf) 설치 경로 확인(없으면 빈 출력)
      docker exec el34-attacker sh -c 'command -v nikto; command -v gobuster; command -v ffuf'
    answer_detail: "심화 열거 도구 점검 — nikto(웹 취약점 자동 점검), ffuf(디렉토리 브루트포싱: gobuster 는 el34-attacker 인자 버그로 대체), nmap NSE(핑거프린팅 자동화). command -v 가 실행 파일 경로를 출력하면 설치됨. 세 도구 모두 el34-attacker 에 완비. 합격 판정은 출력에 'nikto' 가 보이는지로 한다."
    expected_output: |
      /usr/bin/nikto
      /usr/bin/gobuster
      /usr/local/bin/ffuf
    verify:
      type: output_contains
      expect: 'nikto'
      field: stdout
      semantic:
        intent: "심화 도구 점검"
        success_criteria: ["nikto/gobuster/ffuf"]
        acceptable_methods: ["**[OSS] command -v (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — nmap NSE 로 핑거프린팅 자동화
      W01 에서 `curl -I` 로 한 vhost 씩 손으로 보던 HTTP 헤더·타이틀을, NSE 스크립트로 한 번에
      자동 수집한다. 같은 정보를 더 빠르고 일관되게 얻는다.

      ## 🧩 개념 한 줄
      NSE(Nmap Scripting Engine)는 nmap 내장 스크립트 엔진으로, 단순 포트 스캔을 넘어 서비스
      상세 정보 수집·취약점 점검까지 자동화한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) NSE(http-headers/http-title)로 HTTP 헤더·타이틀 자동 수집(수동 curl 핑거프린팅 자동화)
      docker exec el34-attacker nmap -sV --script=http-headers,http-title -p 80 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -iE "http|Server|title|open" | head
      ```
      - `--script=http-headers,http-title`(응답 헤더+페이지 타이틀 수집), `-sV`(서비스/버전), `-T4`(빠름; T0 은밀~T5 시끄러움).

      ## ✅ 합격 기준
      `http` 출력 시 통과. **근거:** HTTP 정보(Server 헤더·title·http 관련 줄)가 보이면 NSE 수집 성공.
    hint: 'nmap --script http-headers,http-title'
    category: recon
    points: 12
    answer: |
      # 1) NSE(http-headers/http-title)로 HTTP 헤더·타이틀 자동 수집(수동 curl 핑거프린팅 자동화)
      docker exec el34-attacker nmap -sV --script=http-headers,http-title -p 80 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -iE "http|Server|title|open" | head
    answer_detail: "NSE(Nmap Scripting Engine) 스크립트 http-headers/http-title 가 HTTP 응답 헤더(Server 등)와 페이지 타이틀을 자동 수집 — W01 의 수동 curl 핑거프린팅을 자동화한 것. title/Server 로 대상 웹의 기술 스택·정체를 식별한다. vuln 카테고리 스크립트로 알려진 취약점까지 능동 점검 가능하나 매우 시끄러움(고급). 깊은 스캔일수록 요청이 늘어 Suricata 탐지 가능성↑. 합격은 출력에 'http' 정보가 보이는지로 판정."
    expected_output: |
      Starting Nmap 7.80 ( https://nmap.org ) at 2026-06-26 14:43 UTC
      80/tcp open  http    Apache httpd 2.4.52 ((Ubuntu))
      | http-headers:
      |   Server: Apache/2.4.52 (Ubuntu)
      |_http-server-header: Apache/2.4.52 (Ubuntu)
      |_http-title: 403 Forbidden
      Service detection performed. Please report any incorrect results at https://nmap.org/submit/ .
    verify:
      type: output_contains
      expect: 'http'
      field: stdout
      semantic:
        intent: "nmap NSE 정보 수집"
        success_criteria: ["http 정보 수집"]
        acceptable_methods: ["**[OSS] nmap --script (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표 — nikto 로 알려진 취약점 자동 점검
      알려진 취약 파일·위험 설정·누락된 보안 헤더 수천 항목을 자동 점검한다. 사람이 손으로
      `/admin.php`·`/.git/`·`/server-status` 를 일일이 확인하던 일을 수 분에 끝낸다.

      ## 🧩 개념 한 줄
      nikto 는 점검 항목 DB 를 들고 웹 서버를 자동으로 훑는 스캐너 — 표준 체크리스트를 든 점검원.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) nikto로 알려진 취약 파일/설정/헤더 누락 자동 점검(30초 제한, 앞 15줄)
      docker exec el34-attacker sh -c 'nikto -h http://10.20.30.1 -maxtime 30s 2>&1 | head -15'
      # 2) 해석 — nikto는 알려진 취약 파일/헤더 누락 자동 점검, UA에 Nikto 노출 → WAF에 잡힘
      echo "→ nikto는 알려진 취약 파일/헤더 누락을 자동 점검. UA에 Nikto 노출 → WAF에 잡힘"
      ```
      - `-h`(대상 호스트), `-maxtime 30s`(최대 30초로 끊음). nikto 는 UA 에 `Nikto` 를 박아 WAF(ModSecurity)의 913 스캐너 룰에 즉시 걸린다(시끄러움).

      ## ✅ 합격 기준
      `Nikto` 출력 시 통과. **근거:** Nikto 배너와 발견 항목이 보이면 스캔 성공 — 각 발견 항목이 추가
      조사 대상이다.
    hint: 'nikto -h (웹 취약점 스캔)'
    category: recon
    points: 12
    answer: |
      # 1) nikto로 알려진 취약 파일/설정/헤더 누락 자동 점검(30초 제한, 앞 15줄)
      docker exec el34-attacker sh -c 'nikto -h http://10.20.30.1 -maxtime 30s 2>&1 | head -15'
      # 2) 해석 — nikto는 알려진 취약 파일/헤더 누락 자동 점검, UA에 Nikto 노출 → WAF에 잡힘
      echo "→ nikto는 알려진 취약 파일/헤더 누락을 자동 점검. UA에 Nikto 노출 → WAF에 잡힘"
    answer_detail: "nikto = 웹 취약점 자동 스캐너. 알려진 취약 파일/위험 설정/보안 헤더 누락 수천 항목을 점검 DB 로 자동 확인. 출력 각 줄이 발견 항목(추가 조사 대상). 빠르지만 요청 UA(User-Agent)에 'Nikto' 가 박혀 WAF 의 913 scanner 룰(CRS 스캐너 탐지 룰군)에 즉시·명확히 잡히고, 단시간 다량 요청으로 IDS 에도 남는다 — 정보량은 높으나 은밀성은 최저. 합격은 출력에 'Nikto' 가 보이는지로 판정."
    expected_output: |
      - Nikto v2.1.5
      ---------------------------------------------------------------------------
      + ERROR: Host maximum execution time of 30 seconds reached
      + Target IP:          10.20.30.1
      + Target Hostname:    adminconsole.6v6.lab
      + Target Port:        80
      + Start Time:         2026-06-26 14:44:05 (GMT0)
      ---------------------------------------------------------------------------
      + Server: Apache/2.4.52 (Ubuntu)
      + The anti-clickjacking X-Frame-Options header is not present.
      + No CGI Directories found (use '-C all' to force check all possible dirs)
      + ERROR: Host maximum execution time of 30 seconds reached
      … (이하 생략)
    verify:
      type: output_contains
      expect: 'Nikto'
      field: stdout
      semantic:
        intent: "nikto 웹 취약점 스캔"
        success_criteria: ["nikto 실행/결과"]
        acceptable_methods: ["**[OSS] nikto -h (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — ffuf 디렉토리 브루트포싱으로 숨은 경로 발견
      메인 페이지 링크에 없는 숨은 경로(/admin·/login·/backup 등)를 끌어낸다 — 본 주차의
      핵심 기술. 워드리스트의 각 단어를 경로로 요청해(=모든 방 노크) 응답 상태코드로 존재
      경로를 가려낸다.

      ## 🧩 개념 한 줄
      디렉토리 브루트포싱 = 후보 경로 단어를 대량 요청해 실제 존재하는 경로를 찾는 기법.
      ffuf 는 URL 의 `FUZZ` 자리에 워드리스트 단어를 하나씩 대입(퍼징)하며 요청을 보낸다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 워드리스트(경로 후보, 한 줄에 하나) 생성
      docker exec el34-attacker sh -c 'printf "admin\nlogin\nindex.php\nrobots.txt\nconfig\nbackup\napi\nlogin.php\nsetup.php\n" > /tmp/aw2.txt'
      # 2) ffuf로 FUZZ 자리에 단어 대입 — 매칭 상태코드(200/301/302/403)만 = 존재 경로
      docker exec el34-attacker ffuf -u http://10.20.30.1/FUZZ -w /tmp/aw2.txt -H 'Host: dvwa.el34.lab' -mc 200,301,302,403 -s 2>&1 | head -10
      # 3) 워드리스트 정리(self-clean)
      docker exec el34-attacker rm -f /tmp/aw2.txt
      # 4) 해석 — 매칭 상태코드=있는 경로(숨은 표면), 대량 요청이라 access.log/IDS에 폭주
      echo "→ ffuf -mc로 매칭된 상태코드(200/301/403)=있는 경로(숨은 표면). 대량 요청이라 access.log/IDS에 폭주"
      ```
      - `-u .../FUZZ`(경로 자리에 단어 대입), `-mc 200,301,302,403`(이 코드만 발견으로 출력, 404 제외), `-s`(발견 경로만). **상태코드: 200 접근가능 / 301·302 존재(이동) / 403 존재하나 권한 차단(=발견!) / 404 없음.**

      ## ✅ 합격 기준
      `login` 출력 시 통과. **근거:** ffuf 가 존재하는 경로(login/admin 등)를 발견하면 통과 — 403 은
      실패가 아니라 "발견"(권한 차단)이라 오히려 흥미로운 표적이다. (gobuster 버그 → ffuf 사용.)
    hint: 'ffuf -u .../FUZZ -w wordlist -mc 200,301,403'
    category: recon
    points: 14
    answer: |
      # 1) 워드리스트(경로 후보, 한 줄에 하나) 생성
      docker exec el34-attacker sh -c 'printf "admin\nlogin\nindex.php\nrobots.txt\nconfig\nbackup\napi\nlogin.php\nsetup.php\n" > /tmp/aw2.txt'
      # 2) ffuf로 FUZZ 자리에 단어 대입 — 매칭 상태코드(200/301/302/403)만 = 존재 경로
      docker exec el34-attacker ffuf -u http://10.20.30.1/FUZZ -w /tmp/aw2.txt -H 'Host: dvwa.el34.lab' -mc 200,301,302,403 -s 2>&1 | head -10
      # 3) 워드리스트 정리(self-clean)
      docker exec el34-attacker rm -f /tmp/aw2.txt
      # 4) 해석 — 매칭 상태코드=있는 경로(숨은 표면), 대량 요청이라 access.log/IDS에 폭주
      echo "→ ffuf -mc로 매칭된 상태코드(200/301/403)=있는 경로(숨은 표면). 대량 요청이라 access.log/IDS에 폭주"
    answer_detail: "디렉토리 브루트포싱 = 워드리스트의 각 단어를 URL 의 FUZZ 자리에 대입(퍼징)해 요청, 응답 상태코드로 숨은 경로(/admin,/login...)를 판별. ffuf -mc 200,301,302,403 으로 존재 경로만 필터(200=접근가능, 301/302=이동, 403=존재하나 권한차단; 404 는 제외). 403 은 실패가 아니라 '발견'이다. Host 헤더로 vhost(dvwa) 라우팅. 링크에 노출 안 된 익스플로잇 표면을 끌어낸다. 대량 요청이라 access.log/IDS 에 폭주로 남아 시끄럽다. (el34-attacker gobuster 는 인자 버그 → ffuf 사용.) 합격은 출력에 'login' 등 발견 경로가 보이는지로 판정."
    expected_output: |
      backup
      login.php
      admin
      login
      setup.php
      robots.txt
      index.php
      config
      api
      → ffuf -mc로 매칭된 상태코드(200/301/403)=있는 경로(숨은 표면). 대량 요청이라 access.log/IDS에 폭주
    verify:
      type: output_contains
      expect: 'login'
      field: stdout
      semantic:
        intent: "디렉토리 brute로 숨은 경로 발견"
        success_criteria: ["경로 발견(login/admin 등)", "숨은 표면"]
        acceptable_methods: ["**[OSS] ffuf -u FUZZ (권장)**"]
