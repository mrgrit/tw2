      ## 🎯 차단 vs 탐지 — dvwa(On) vs juice(DetectionOnly)
      본 주차의 핵심 비교다. 완전히 같은 SQLi payload 를 두 vhost 에 보내 결과가 갈리는 것을 확인한다.
