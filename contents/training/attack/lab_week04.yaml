        acceptable_methods: ["**[OSS] sqlmap --batch (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 분석 — ModSec 942(방어 측 시점)
      공격을 보냈으니 이제 방어 측이 무엇을 봤는지 확인한다. el34 의 WAF(ModSecurity)는 차단된
      트랜잭션을 web 컨테이너의 modsec_audit.log 에 JSON 한 줄씩 남긴다. 앞 단계들에서 보낸 SQLi 가
      어떤 룰에 잡혔는지 룰 ID 를 집계해, 본인 공격이 정확히 SQLi 룰군(942)에 걸렸음을 검증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) modsec_audit 최근 150줄에서 942(SQLi)/949110(anomaly) 룰ID 집계 — 내 공격의 탐지 흔적
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      # 2) 해석 — 942xxx(SQLi 룰군)이 변형을 잡고 949110(anomaly 누적)에서 차단
      echo "→ 942xxx(SQLi 룰군)이 payload 변형을 잡고, 949110(anomaly 누적)에서 차단"
      ```
      - `grep -oE "94[0-9]1[0-9]{2}"`(9xx 룰 ID 추출), `sort | uniq -c`(빈도 집계). 942=SQLi 룰군, 949110=anomaly score 임계치 도달(차단 발동점).

