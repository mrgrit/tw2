      ## 🎯 차단 vs 탐지 — dvwa(On) vs juice(DetectionOnly)
      본 주차의 핵심 비교다. 완전히 같은 SQLi payload 를 두 vhost 에 보내 결과가 갈리는 것을 확인한다.
      차이의 원인은 WAF 운영 모드 한 줄 — dvwa 는 SecRuleEngine On(차단)이라 403, juice 는
      DetectionOnly(탐지만)라 200 으로 통과한다. 단, juice 의 200 은 "안 들킨 것"이 아니라 audit
      log 에는 기록되되 막지만 않는 것임을 이해한다. 이는 버그가 아니라 운영 정책의 선택이다(새 룰을
      도입할 때 오탐 관찰을 위해 DetectionOnly 로 켰다가 안정되면 On 으로 전환).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 같은 SQLi payload를 dvwa(차단 모드)로 — 응답코드
      curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' "http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--"
      # 2) 같은 payload를 juice(DetectionOnly)로 — 응답코드
      curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' "http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--"
      # 3) 해석 — dvwa=403(차단)/juice=200(탐지만), 같은 공격 다른 결과 = WAF 정책 차이
      echo "→ dvwa=403(차단 모드), juice=200(DetectionOnly, 탐지만). 같은 공격, 다른 결과 = WAF 정책 차이"
      ```
      - 두 요청의 payload(`1' UNION SELECT 1--`)는 동일, 다른 것은 Host 헤더(vhost)뿐. 같은 web 컨테이너가 두 vhost 를 호스팅하나 ModSec 모드가 달라 결과가 갈린다.

