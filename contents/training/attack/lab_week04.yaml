      echo "[dvwa 차단 모드]"; sqlmap -u 'http://dvwa.el34.lab/?id=1' --batch --flush-session --disable-coloring 2>&1 | grep -iE 'do not appear to be injectable|403 \(Forbidden\)' | head -2
      echo "[juice DetectionOnly]"; sqlmap -u 'http://juice.el34.lab/rest/products/search?q=apple' --batch --dbms=sqlite --technique=B --disable-coloring 2>&1 | grep -iE 'Parameter: q|Type:|back-end DBMS' | head -3
      ```
      같은 진짜 SQLi 도구(sqlmap)를 두 vhost 에 돌리면 결과가 갈린다 — dvwa 는 WAF 가 sqlmap 의 페이로드를
      403 으로 막아 "not injectable" 로 보고되지만, juice 는 DetectionOnly 라 그대로 통과해 sqlmap 이
      `Parameter: q` 를 취약(boolean/time-based blind)으로 확정한다. 같은 공격, 호스트명만 다른데 한쪽은
      막히고 한쪽은 뚫리는 건 ModSec 운영 모드 차이다.
