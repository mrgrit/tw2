    instruction: |
      ## 🎯 방어 — parameterized query(근본) + WAF(보조)
      공격자도 근본 방어를 알아야 한다(코드 수준 방어가 된 대상에서는 SQLi 가 안 먹힌다). SQLi 의
      진짜 해결은 parameterized query(prepared statement) — 입력을 SQL 문자열에 이어 붙이지 않고
      자리표시자에 데이터로만 바인딩해, `' OR '1'='1` 이 들어와도 코드가 아닌 "그런 이름의 데이터를
      찾아라"로만 처리되게 한다. SQLi 가 원천적으로 성립하지 않는다. WAF 는 알려진 패턴을 앞단에서
      걸러 시간을 벌어주는 보조일 뿐(우회 가능)이라 단독 의존은 금물이다.
