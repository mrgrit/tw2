      DetectionOnly(탐지만)라 200 으로 통과한다. 단, juice 의 200 은 "안 들킨 것"이 아니라 audit
      log 에는 기록되되 막지만 않는 것임을 이해한다. 이는 버그가 아니라 운영 정책의 선택이다(새 룰을
      도입할 때 오탐 관찰을 위해 DetectionOnly 로 켰다가 안정되면 On 으로 전환).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

