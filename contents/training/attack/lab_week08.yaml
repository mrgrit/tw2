      ## 🎯 목표 — 플래그 검증 + self-clean
      플래그 캡처를 입증한 뒤, 심은 흔적(셸 리스너 48008 / IDS 룰 9408001)이 모두 정리됐는지 검증한다.

      ## 📖 개념 한 줄
      el34 는 공유 인프라다. CTF 흔적을 끝까지 남기면 다음 학생·운영에 영향을 준다. 각 미션에서 심은 것을
      그 미션에서 정리(self-clean)했으니, 여기서 **잔재 0** 을 최종 확인한다(lecture §8).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 셸 잔재는 `el34-web`, IDS 룰 잔재는 `el34-ips` 에서 확인.

      ```bash
      # ── el34-web 에서: 셸 리스너 잔재 ──
      # 1) 셸 리스너(48008) 정리 후 잔재 확인(살아있으면 셸 잔재!, 없으면 shell clean)
      pkill -f "[h]ttp.server 48008" 2>/dev/null; pgrep -f "[h]ttp.server 48008" && echo "셸 잔재!" || echo "shell clean"
      # ── el34-ips 에서: IDS 룰 잔재 ──
      # 2) IDS 룰(9408001) 잔재 카운트(0이어야 정상)
      echo "9408001 잔재=$(sudo grep -c 9408001 /etc/suricata/rules/local.rules)"
      # 3) 마무리 — 플래그 캡처 + self-clean
      echo "CTF flag(48008) 캡처 완료 + self-clean"
      ```
      - `pgrep -f "[h]ttp.server 48008"`(48008 리스너 잔존 확인, `[h]`는 grep 자기매치 방지), `grep -c 9408001`(IDS 룰 잔재 줄 수, 0이어야 정상).

      ## ✅ 합격 기준
      `shell clean` 출력 시 통과. **근거:** 48008 리스너 잔재 0(shell clean) + 9408001 잔재 카운트 0 이면
