      - **913**=정찰(스캐너), **942**=SQLi 침투, **949110**=anomaly 누적 차단(403), 호스트 포트 **48008**=셸. 세 흔적이 같은 출처 10.20.30.202 면 한 공격자의 정찰→침투→셸 체인.

