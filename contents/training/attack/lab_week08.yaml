      ## 🎯 목표 — 방어자의 시선 ④ IDS 탐지 룰(sid 9408001)
      방어자(블루팀) 관점으로 돌아서서, 정찰(스캐너 UA)을 체인 초기에 잡는 IDS 룰을 직접 작성·검증한다.

      ## 📖 개념 한 줄
      좋은 공격자는 자기 정찰이 어떻게 탐지되는지 안다(lecture §1.3). WAF 는 HTTP 도착 후에 보지만
      **IDS 는 네트워크에서** 본다. Suricata `local.rules` 에 스캐너 UA 탐지 룰을 만들어 "탐지를 설계하는"
      능력을 평가한다. 룰 수명주기 = 작성 → reload → 트리거 → eve 확인 → **sid 로 삭제**(베이스 보존).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 룰 작성·reload·확인·정리는 `el34-ips`, UA 트리거만 `외부 공격자 VM 192.168.0.202`.

      ```bash
      # ── el34-ips 에서: IDS 룰 추가 + reload ──
      # 1) IDS 룰 추가 — sqlmap UA 정찰 탐지(http.user_agent content, sid 9408001)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"CTF8 sqlmap recon\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; sid:9408001; rev:1;)
      EOF"
      # 2) 무중단 reload — suricatasc는 reload 완료 후 반환(동기)하므로 별도 대기 불필요
      sudo suricatasc -c reload-rules
      # ── 외부 공격자 VM 192.168.0.202 에서: 진짜 sqlmap 으로 트리거(sqlmap 이 자기 UA 'sqlmap/x'를 그대로 보냄) ──
      timeout 30 sqlmap -u "http://dvwa.el34.lab/?id=ct8b" --batch --level=1 --disable-coloring < /dev/null >/dev/null 2>&1
      # ── el34-ips 에서: eve 확인 + self-clean ──
      # 3) eve.json에 시그니처가 기록될 때까지 대기(고정 sleep 대신 조건 폴링) 후 확인
      timeout 8 bash -c 'until sudo grep -q 9408001 /var/log/suricata/eve.json; do :; done'
      sudo grep "9408001" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature}'
      # 4) self-clean — 룰 삭제 + reload(베이스 보존)
      sudo sed -i "/sid:9408001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo rule_removed
      ```
      UA 를 위조하지 않고 **진짜 sqlmap** 을 돌리면 sqlmap 이 자기 User-Agent(`sqlmap/1.6.4#stable ...`)를
      그대로 보내므로 같은 룰(9408001)이 자연히 발화한다 — 여기서 관찰할 것은 sqlmap 의 SQLi 성공 여부가
      아니라 IDS 가 남긴 **eve.json 경보**라서 sqlmap 출력은 `>/dev/null` 로 버린다. (sqlmap 은 여러 요청을
      보내므로 경보가 여러 건 남는다 — 요청 한 발보다 실제 스캐너 트래픽에 가깝다.)
      - `http.user_agent; content:"sqlmap"; nocase`(진짜 sqlmap 의 UA 문자열 매치), `fast_pattern`(성능), `sid:9408001`(내 네임스페이스 9408xxx). `suricatasc -c reload-rules`(무중단), 끝나면 sed 로 삭제→reload(base 보존).

      ## ✅ 합격 기준
      `CTF8 sqlmap` 출력 시 통과. **근거:** eve.json 에 CTF8 sqlmap recon 시그니처가 잡히고 정리 후
      local.rules 에서 9408001 이 사라지면 통과 — base 룰은 절대 건드리지 않고 9408xxx 만 쓴다.
