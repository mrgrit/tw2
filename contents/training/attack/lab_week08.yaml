lab_id: standalone-attack-week08
title: "중간고사 CTF — 익스플로잇 체인으로 플래그(셸) 캡처"
version: standalone-attack
course: attack
week: 8
description: |
  공격기법 W08 중간고사 CTF. W01–W07 에서 하나씩 익힌 개별 공격 기법(정찰·API/JWT·SQLi·XSS·
  접근제어·SSRF/업로드)을 하나의 익스플로잇 체인으로 엮는다. 공격자(레드팀) 시선으로
  정찰(nmap) → 웹 익스플로잇(SQLi 침투) → 셸 캡처(코드 실행 거점 = 리스너 포트 48008 = 플래그)의
  4 단계를 수행하고, 그다음 방어자 시선으로 돌아서서 흩어진 흔적(WAF 913/942 + IDS + 호스트 포트)을
  출처 IP(10.20.30.202)로 한 체인으로 역재구성한다. 정찰을 잡는 IDS 탐지 룰(sid 9408001)을 직접
  작성·reload·트리거·검증 후 sid 로 삭제한다.
  CTF 의 플래그는 "코드 실행을 증명하는 것" — 본 시험은 리스너 포트 48008 캡처를 플래그로 한다.
  셸(리스너)·IDS 룰은 캡처·검증 직후 self-clean(공유 인프라 보존). 인가된 실습 환경(el34)에서만.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 실행하며, 컨테이너 작업은 docker exec -it <컨테이너> bash 로
  접속해 수행한다. 합격 임계값 0.7.
difficulty: hard
duration_minutes: 220
prerequisites:
  - "W01–W07 통과 (정찰·API/JWT·SQLi·XSS·접근제어·SSRF/업로드)"
  - "el34 호스트 SSH 접속 + docker exec 로 컨테이너 진입"
  - "lecture §1(왜 단일 취약점이 아니라 체인인가) §2(체인 4 단계) §3(진입 경로·플래그 정의) 숙지"
objectives:
  - "W01–W07 개별 기법을 정찰→침투→셸의 익스플로잇 체인으로 통합 구성"
  - "CTF 플래그(코드 실행 거점 = 셸 리스너 포트 48008) 캡처·확인"
  - "방어자 관점으로 WAF/IDS/호스트 흔적을 출처 IP 로 한 체인으로 역재구성"
  - "정찰 탐지 IDS 룰(sid 9408001) 작성→reload→트리거→검증→삭제(베이스 보존)"
  - "셸/룰 self-clean 으로 공유 인프라 보존, 증거 기반 CTF 보고서 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      익스플로잇 체인을 시작하기 전, 공격 도구가 갖춰져 있고 대상에 도달 가능한지 점검한다.

      ## 📖 개념 한 줄
      침투 테스트는 RoE(교전 규칙) 확인 직후 항상 **도구 가용성 + 대상 도달성**부터 점검한다.
      도구가 없거나 대상이 무응답이면 체인을 시작할 수 없기 때문이다(lecture §7 미션 1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 정찰 도구 nmap 설치 경로 확인
      command -v nmap
      # 2) SQLi 자동화 도구 sqlmap 설치 경로 확인
      command -v sqlmap
      # 3) 대상 vhost(dvwa) 도달성 — 응답코드
      curl -s -o /dev/null -w "dvwa=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/
      ```
      - nmap(포트·서비스 스캐너, W01), sqlmap(SQLi 자동화, W04, 여기선 존재만 확인). `-H "Host: ..."` 로 vhost 지정.

      ## ✅ 합격 기준
      `nmap` 출력 시 통과. **근거:** nmap/sqlmap 경로가 보이고 dvwa 가 HTTP 코드로 응답하면 체인 시작
      준비 완료다.
    hint: 'nmap/sqlmap + 대상'
    category: survey
    points: 8
    answer: |
      # 1) 정찰 도구 nmap 설치 경로 확인
      docker exec el34-attacker sh -c 'command -v nmap'
      # 2) SQLi 자동화 도구 sqlmap 설치 경로 확인
      docker exec el34-attacker sh -c 'command -v sqlmap'
      # 3) 대상 vhost(dvwa) 도달성 — 응답코드
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -w "dvwa=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/'
    answer_detail: "CTF 착수 점검 — 공격 도구(nmap 정찰 / sqlmap SQLi)와 대상(dvwa vhost) 도달성을 확인. nmap 경로가 출력되면 도구 준비 완료로 판정. 도구·대상이 갖춰져야 정찰→침투→셸의 익스플로잇 체인을 시작할 수 있다."
    expected_output: |
      /usr/bin/nmap
      /usr/bin/sqlmap
      dvwa=302
    verify:
      type: output_contains
      expect: 'nmap'
      field: stdout
      semantic:
        intent: "도구/대상 점검"
        success_criteria: ["도구 + 대상"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ① 정찰: 공격 표면 식별
      nmap 으로 대상의 열린 포트를 매핑해 "어디로 들어갈 수 있는가"를 그린다.

      ## 📖 개념 한 줄
      **정찰(Recon)** 은 익스플로잇 체인의 첫 단계(PTES 1단계)다. 열린 포트·웹 vhost 가 곧 다음 단계의
      **익스플로잇 후보**가 된다(lecture §2.1). 입구를 모르면 침투할 수 없다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) ① 정찰 — fw DNAT 공개 포트 스캔(open/PORT 줄만), 익스플로잇 후보 표면 매핑
      nmap -p 80,443,8001-8007 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
      ```
      - `-T4`(빠른 타이밍, 빠를수록 IDS에 더 잘 잡힘=은밀성↔속도 trade-off), `-p`(스캔 포트, el34 fw DNAT 공개 포트). ⚠️ 정찰은 가장 시끄러운 단계 — 이 스캔 자체가 Suricata 에 흔적.

      ## ✅ 합격 기준
      `open` 출력 시 통과. **근거:** 열린 포트(open)가 식별되면 공격 표면 매핑 성공 — 이 포트·vhost 가
      다음 침투 단계의 익스플로잇 후보다.
    hint: 'nmap 포트'
    category: recon
    points: 10
    answer: |
      # 1) ① 정찰 — fw DNAT 공개 포트 스캔(open/PORT 줄만), 익스플로잇 후보 표면 매핑
      docker exec el34-attacker nmap -p 80,443,8001-8007 10.20.30.1 -T4 --max-retries 1 2>/dev/null | grep -E "open|PORT"
    answer_detail: "익스플로잇 체인 1단계(정찰, PTES 1단계) — nmap 으로 대상 표면(열린 포트·서비스)을 매핑. open 포트가 출력되면 성공. 열린 포트·웹 vhost 가 다음 침투 단계의 익스플로잇 후보다. 빠른 스캔(-T4)은 그만큼 IDS 에 시끄럽게 잡힌다."
    expected_output: |
      PORT     STATE SERVICE
      80/tcp   open  http
      443/tcp  open  https
      8001/tcp open  vcom-tunnel
      8002/tcp open  teradataordbms
      8003/tcp open  mcreport
      8004/tcp open  p2pevolvenet
      8005/tcp open  mxi
      8006/tcp open  wpl-analytics
      8007/tcp open  ajp12
    verify:
      type: output_contains
      expect: 'open'
      field: stdout
      semantic:
        intent: "정찰 표면 식별"
        success_criteria: ["열린 포트"]
        acceptable_methods: ["**[OSS] nmap (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ② 웹 익스플로잇: SQLi 침투
      정찰로 찾은 입력점에 가장 효과적인 취약점(SQL Injection)을 시도해 웹앱 안으로 들어간다.

      ## 📖 개념 한 줄
      **웹 익스플로잇(Exploit)** 은 익스플로잇 체인의 침투 단계(PTES 4단계)다. `' UNION SELECT 1-- -`
      같은 SQL 조각을 파라미터에 끼워 넣어 웹앱이 의도하지 않은 DB 질의를 실행하게 만든다(lecture §2.2,
      W03–W04 복습). 스캐너 UA 와 함께 보내면 같은 요청이 정찰 신호(UA) + 침투 신호(SQLi)를 동시에 담는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) ② 웹 익스플로잇 — sqlmap UA + SQLi(UNION SELECT) 침투 시도(dvwa 차단 모드면 403)
      curl -s -o /dev/null -w 'exploit=%{http_code}\n' -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' "http://10.20.30.1/?id=ct8%27%20UNION%20SELECT%201--%20-"
      # 2) 해석 — 침투 시도, dvwa 차단 모드면 403(탐지), 실전 CTF는 취약 vhost/엔드포인트 선택
      echo "→ 침투 시도. dvwa 차단 모드면 403(탐지). 실제 CTF는 취약 vhost/엔드포인트 선택"
      ```
      - `-A sqlmap/1.7`(스캐너 UA=정찰 신호), `?id=ct8' UNION SELECT 1-- -`(URL 인코딩 SQLi). dvwa=차단 모드라 SQLi 403(juice 는 탐지만).

      ## ✅ 합격 기준
      `exploit` 출력 시 통과. **근거:** SQLi 침투를 시도하면 통과 — dvwa(차단 모드)는 exploit=403
      (WAF 차단=탐지)이 정상이며, 실전 CTF 는 이 403 신호를 읽고 차단 안 되는 경로/취약점으로 방향을 튼다.
    hint: 'SQLi 침투'
    category: manipulation
    points: 12
    answer: |
      # 1) ② 웹 익스플로잇 — sqlmap UA + SQLi(UNION SELECT) 침투 시도(dvwa 차단 모드면 403)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'exploit=%{http_code}\n' -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=ct8%27%20UNION%20SELECT%201--%20-\""
      # 2) 해석 — 침투 시도, dvwa 차단 모드면 403(탐지), 실전 CTF는 취약 vhost/엔드포인트 선택
      echo "→ 침투 시도. dvwa 차단 모드면 403(탐지). 실제 CTF는 취약 vhost/엔드포인트 선택"
    answer_detail: "익스플로잇 체인 2단계(침투, PTES 4단계) — 정찰로 찾은 입력점에 가장 효과적인 취약점(SQLi UNION SELECT)을 스캐너 UA 와 함께 시도. dvwa 차단 모드라 WAF 가 942→949110 으로 403 차단(탐지 성공). exploit= 출력이 보이면 침투 시도 입증. 실전 CTF 는 403 신호를 읽고 차단 안 되는 경로/취약점으로 방향을 튼다."
    expected_output: |
      exploit=403
      → 침투 시도. dvwa 차단 모드면 403(탐지). 실제 CTF는 취약 vhost/엔드포인트 선택
    verify:
      type: output_contains
      expect: 'exploit'
      field: stdout
      semantic:
        intent: "웹 익스플로잇 침투"
        success_criteria: ["SQLi 침투 시도"]
        acceptable_methods: ["**[OSS] SQLi (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 익스플로잇 체인 ③ 셸 캡처(플래그): 포트 48008
      코드 실행 거점(셸)을 확보해 **플래그**를 캡처한다. 본 시험의 플래그 = 리스너 포트 48008.

      ## 📖 개념 한 줄
      CTF 의 **플래그는 "코드 실행을 증명하는 것"** 이다(lecture §2.3, §3.3). 침투로 확보한 코드 실행
      능력을, 표적 호스트(web)에 **비표준 포트 48008 리스너**를 띄우는 것으로 모사·증명한다. 리스너가
      떠 있음은 임의 프로세스를 실행할 수 있었다는 뜻 = 셸(코드 실행 거점) 확보.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) ③ 셸 캡처 — 표적 호스트(web)에 비표준 포트 48008 리스너 기동(코드 실행 거점 모사)
      nohup python3 -m http.server 48008 >/dev/null 2>&1 & echo shell_captured
      # 2) 기동 대기
      sleep 1
      # 3) osquery로 포트 48008을 듣는 프로세스(pid) 확인 = 플래그 캡처 입증
      osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=48008;'
      # 4) self-clean — 리스너 즉시 종료([h]ttp 자기매치 방지)
      pkill -f "[h]ttp.server 48008" 2>/dev/null; true
      # 5) 플래그 캡처 마커
      echo "flag captured (48008)"
      ```
      - `nohup ... &`(백그라운드 분리), `listening_ports WHERE port=48008`(포트 주인 pid 확인=플래그 입증), `[h]ttp` 대괄호(pkill 자기매치 방지). ⚠️ 공유 인프라라 확인 직후 pkill self-clean.

      ## ✅ 합격 기준
      `48008` 출력 시 통과. **근거:** osquery 결과에 포트 48008 과 주인 프로세스(pid)가 보이면 플래그(셸)
      캡처 = 익스플로잇 체인 완성 — 확인 직후 pkill 로 리스너를 정리한다(self-clean).
    hint: '리스너 48008 = 플래그'
    category: manipulation
    points: 14
    answer: |
      # 1) ③ 셸 캡처 — 표적 호스트(web)에 비표준 포트 48008 리스너 기동(코드 실행 거점 모사)
      docker exec el34-web sh -c 'nohup python3 -m http.server 48008 >/dev/null 2>&1 & echo shell_captured'
      # 2) 기동 대기
      sleep 1
      # 3) osquery로 포트 48008을 듣는 프로세스(pid) 확인 = 플래그 캡처 입증
      docker exec el34-web osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=48008;'
      # 4) self-clean — 리스너 즉시 종료([h]ttp 자기매치 방지)
      docker exec el34-web sh -c 'pkill -f "[h]ttp.server 48008" 2>/dev/null; true'
      # 5) 플래그 캡처 마커
      echo "flag captured (48008)"
    answer_detail: "익스플로잇 체인 3단계 = 플래그 캡처(PTES 5단계의 첫 발). CTF 플래그는 코드 실행을 증명하는 것 — 비표준 포트 48008 리스너로 코드 실행 거점(셸)을 모사·확보. osquery listening_ports 결과에 48008 이 보이면 플래그 캡처 입증 = 체인 완성. 출력에 48008 이 포함되면 통과. 공유 인프라 보존을 위해 확인 즉시 pkill 로 self-clean."
    expected_output: |
      shell_captured
      [
        {"pid":"53649","port":"48008"},
        {"pid":"53649","port":"48008"}
      ]
      flag captured (48008)
    verify:
      type: output_contains
      expect: '48008'
      field: stdout
      semantic:
        intent: "셸 캡처(플래그) 획득"
        success_criteria: ["리스너 48008 캡처", "osquery 확인"]
        acceptable_methods: ["**[OSS] 리스너 + osquery (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 방어자의 시선 ④ IDS 탐지 룰(sid 9408001)
      방어자(블루팀) 관점으로 돌아서서, 정찰(스캐너 UA)을 체인 초기에 잡는 IDS 룰을 직접 작성·검증한다.

      ## 📖 개념 한 줄
      좋은 공격자는 자기 정찰이 어떻게 탐지되는지 안다(lecture §1.3). WAF 는 HTTP 도착 후에 보지만
      **IDS 는 네트워크에서** 본다. Suricata `local.rules` 에 스캐너 UA 탐지 룰을 만들어 "탐지를 설계하는"
      능력을 평가한다. 룰 수명주기 = 작성 → reload → 트리거 → eve 확인 → **sid 로 삭제**(베이스 보존).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 룰 작성·reload·확인·정리는 `el34-ips`, UA 트리거만 `el34-attacker`.

      ```bash
      # ── el34-ips 에서: IDS 룰 추가 + reload ──
      # 1) IDS 룰 추가 — sqlmap UA 정찰 탐지(http.user_agent content, sid 9408001)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"CTF8 sqlmap recon\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; sid:9408001; rev:1;)
      EOF"
      # 2) 무중단 reload
      sudo suricatasc -c reload-rules; sleep 2
      # ── el34-attacker 에서: sqlmap UA로 트리거 ──
      curl -s -o /dev/null -A sqlmap/1.7 -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=ct8b"; sleep 4
      # ── el34-ips 에서: eve 확인 + self-clean ──
      # 3) eve.json에서 9408001 시그니처 확인
      sudo grep "9408001" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature}'
      # 4) self-clean — 룰 삭제 + reload(베이스 보존)
      sudo sed -i "/sid:9408001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo rule_removed
      ```
      - `http.user_agent; content:"sqlmap"; nocase`(UA에 sqlmap 매치), `fast_pattern`(성능), `sid:9408001`(내 네임스페이스 9408xxx). `suricatasc -c reload-rules`(무중단), 끝나면 sed 로 삭제→reload(base 보존).

      ## ✅ 합격 기준
      `CTF8 sqlmap` 출력 시 통과. **근거:** eve.json 에 CTF8 sqlmap recon 시그니처가 잡히고 정리 후
      local.rules 에서 9408001 이 사라지면 통과 — base 룰은 절대 건드리지 않고 9408xxx 만 쓴다.
