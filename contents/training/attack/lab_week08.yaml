      ## 📖 개념 한 줄
      **역재구성**은 방어자가 흩어진 점(흔적)을 출처 IP 하나로 한 선(체인)으로 잇는 작업이다(lecture §2.4,
      §6). 공격자는 흔적을 흩어 남기지만, el34 가 출처 IP(10.20.30.202)를 전 계층에 보존하므로 방어자는
      정찰(913)·침투(942)·셸(48008)을 한 공격자의 한 경로로 묶을 수 있다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

