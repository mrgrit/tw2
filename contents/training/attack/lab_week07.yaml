      모의침투는 발사로 끝나지 않는다 — 발견(Finding) → 영향(Impact) → 권고(Remediation)를 하나의
      문서로 엮어야 가치가 된다. 이번 주 세 공격·탐지·방어를 보고서 한 장으로 정리한다(실제 진단
      보고서의 축약판).
      ## 💻 실행 방법 — 편집기로 보고서 작성

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 `nano ~/w07_report.md` 를 열고, 세 공격·탐지·
      방어를 아래 골격에 채워 저장한다(Ctrl+O 저장, Ctrl+X 종료). `<관찰값>` 은 실제 응답 코드·룰ID 로 채운다.

      ```markdown
      # 공격 W07 — SSRF/Path Traversal/업로드 침투 보고서
      ## 1. Path Traversal : ../../etc/passwd → <관찰값>(403, 930). wfuzz로 변종도 전부 차단, 인코딩 정규화
      ## 2. SSRF           : 169.254.169.254 메타데이터/localhost 요청 유도 → 위험 URL 탐지(형태 유사, 확정 403 아님)
      ## 3. 악성 콘텐츠     : PHP 코드 주입(<?php system(id) ?>) → <관찰값>(403, 933) = 코드 미실행
      ## 4. 탐지·방어       : ModSec 930/931/932/933 룰군 → 949110. 방어=정규화+allowlist+내부IP 차단
      ## 결론 : 입력으로 경계를 넘는 세 공격. 영향 큼(파일~RCE). 근본 방어=입력 불신+allowlist
      ```
      작성 후 `cat ~/w07_report.md` 로 확인한다 — 보고서는 heredoc 출력이 아니라 편집기로 직접 쓴 산출물이다.

      ## ✅ 합격 기준
      `SSRF` 출력 시 통과. **근거:** 보고서에 세 공격(경로순회·SSRF·악성 업로드/PHP 주입) + 탐지
      (ModSec 930/932/933) + 방어(입력 불신·allowlist)가 모두 포함되면 통과.
