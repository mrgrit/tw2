      > 차단 화면 — 코드만 필요하면 `-o /dev/null -w`).

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** PHP 코드 주입이 403 으로 차단되면 통과 — CRS 933 룰군(PHP Injection)이
