lab_id: standalone-attack-week14
title: "Caldera+Wazuh 탐지 커버리지 측정·보강·재검증 (Purple Team)"
version: standalone-attack
course: attack
week: 14
description: |
  공격기법 W14 — Purple Team(퍼플팀) 사이클을 한 바퀴 직접 돈다. W13 에서 미탐지로 드러난
  커버리지 갭(T1087 계정 열거, cat /etc/passwd)을 골라, 레드 시선으로 다시 에뮬레이션하고 →
  wazuh-logtest 로 보강 전 상태(미탐지/저레벨)를 증거로 측정하고 → 블루 시선으로 그 갭을 닫는
  Wazuh 탐지 룰(local_rules.xml, rule id 101414, level 10)을 작성해 logtest 로 발화를 검증하고 →
  다시 같은 기법을 에뮬레이션해 갭이 닫혔음(❌→✅)을 재검증한다. 보강 전후를 커버리지 매트릭스로
  정리하고 사이클을 보고서로 종합한다.
  핵심 원칙 — "고쳤다고 믿지 말고 다시 공격해 확인". 탐지 커버리지를 '추측'이 아니라 '검증된
  데이터'로 끌어올린다. el34 의 Wazuh manager(el34-siem, v4.10)는 여러 학생이 함께 쓰는 공유
  SIEM 이므로, 룰은 매니저 재시작 없이 wazuh-logtest 로 검증만 하고 cp 로 원복(baseline 보존)한다.
  인가된 실습 환경(el34)에서만. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 실행하며, 컨테이너
  작업은 SIEM `ssh ccc@10.20.32.100`·표적 web `ssh ccc@10.20.32.80`(비번 1)로 접속해 수행한다(Caldera 는 el34 호스트 ~/caldera-src).
  합격 임계값 0.7.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W13(Caldera 자동 에뮬레이션·갭 식별)·W04(Wazuh local_rules.xml 룰 작성) 통과"
  - "SIEM ssh ccc@10.20.32.100 + 표적 web ssh ccc@10.20.32.80 (비번 1) + Caldera el34 호스트"
  - "lecture §1(왜 갭을 찾기만으로는 부족한가) §2(퍼플 4단계: 에뮬→측정→보강→재검증) §3(Wazuh decoder→rule 파이프라인·logtest 무중단 검증) 숙지"
objectives:
  - "W13 의 커버리지 갭(T1087 계정 열거, 읽기성 정찰이라 시그니처 약함)을 재에뮬레이션해 측정 대상으로 무대에 올림"
  - "wazuh-logtest 로 보강 전 상태 측정 — decoder 는 T1087 을 파싱하나 격상 룰 부재로 미탐지/저레벨(갭) 임을 증거로 확인"
  - "갭을 닫는 Wazuh 룰(rule id 101414, level 10, field name=technique) 작성 → 매니저 무중단 logtest 발화 검증 → cp 원복(공유 SIEM baseline 보존)"
  - "재에뮬레이션으로 갭 닫힘(❌→✅) 재검증 + 보강 전후 커버리지 매트릭스 정리 + 사이클 보고서 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 점검: Caldera + Wazuh
      퍼플 사이클을 시작하기 전, 공격 측 도구(Caldera)와 방어 측 탐지 엔진(Wazuh analysisd)이
      모두 준비됐는지 점검한다.

      ## 📖 개념 한 줄
      퍼플팀 사이클(에뮬레이션→측정→보강→재검증)의 전제는 **에뮬레이션 도구 + 탐지 엔진**이
      양쪽 다 살아 있어야 한다는 것이다. analysisd 가 멈춰 있으면 어떤 룰도 평가되지 않는다(lecture §1·§3.1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** Caldera 확인은 el34 호스트(`~/caldera-src`), Wazuh 점검은 `el34-siem` 안.

      ```bash
      # ── el34 호스트에서: Caldera 소스 확인 ──
      # 1) Caldera 소스(W13 설치) 존재 확인 — 에뮬레이션 도구 가용성
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera ok" || echo "caldera 미설치"
      # ── SIEM(10.20.32.100)에서: Wazuh 탐지 엔진 점검 (ssh ccc@10.20.32.100) ──
      # 2) Wazuh 탐지 엔진(analysisd) 가동 확인 — 디코더·룰 평가의 심장
      /var/ossec/bin/wazuh-control status | grep analysisd
      ```
      - `ls ~/caldera-src/server.py` — 호스트에 Caldera 소스(W13 에서 설치)가 있는지 확인.
      - `ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd` — Wazuh 의 핵심 데몬
        **analysisd**(디코더·룰의 심장)가 가동 중인지 확인.

      ## 🧰 처음 나오는 도구
      - **Caldera** — ATT&CK 기법을 자동 에뮬레이션하는 레드팀 프레임워크(W13). el34 기본에 없어 호스트에 설치됨.
      - **analysisd** — Wazuh manager 의 데몬으로, 들어온 로그를 decoder→rule 로 평가해 alert 를 만든다(W09).

      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** Caldera 소스가 보이고 analysisd 가 is running 이면 에뮬레이션
      도구 + 탐지 엔진이 양쪽 다 준비된 것 — 퍼플 사이클(에뮬→측정→보강→재검증) 착수 가능.
    hint: 'caldera + analysisd'
    category: survey
    points: 10
    answer: |
      # 1) Caldera 소스(W13 설치) 존재 확인 — 에뮬레이션 도구 가용성
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera ok" || echo "caldera 미설치"
      # 2) Wazuh 탐지 엔진(analysisd) 가동 확인 — 디코더·룰 평가의 심장
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "퍼플 사이클 착수 점검 — 에뮬레이션 도구(Caldera, 호스트 ~/caldera-src)와 탐지 엔진(Wazuh analysisd) 양쪽의 가용성을 확인. analysisd 가 'is running' 이면 디코더·룰 평가가 동작하므로 측정·보강으로 넘어갈 수 있다고 판정. 둘 중 하나라도 없으면 사이클을 시작할 수 없다."
    expected_output: |
      caldera 미설치
      wazuh-analysisd is running...
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "Caldera+Wazuh 점검"
        success_criteria: ["caldera + analysisd"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표 — 퍼플 사이클 ① 갭 재현: 안 잡히던 기법을 다시 일으킨다
      W13 에서 미탐지로 드러난 T1087(계정 열거)을 다시 에뮬레이션해, 본 사이클에서 "닫을 대상"을 무대에 올린다.

      ## 📖 개념 한 줄
      **T1087 Account Discovery** 는 ATT&CK Discovery 전술의 "계정 열거" 기법이다. Linux 의 가장
      단순한 형태가 `cat /etc/passwd`(계정 목록 파일 읽기)다. **읽기 명령**이라 변경·통신·위험
      프로세스 신호가 없어 기본 룰이 잡을 단서가 약하다 — 이것이 갭의 본질이다(lecture §2.1).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      # 1) T1087 Account Discovery 에뮬레이션 — /etc/passwd 앞 2줄 읽어 계정 열거 모사
      echo "[T1087 Account Discovery]"; cat /etc/passwd | head -2; echo emulated
      # 2) 해석 — W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음
      echo "→ W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음"
      ```
      - `cat /etc/passwd | head -2` — 시스템 계정 목록 파일의 앞 2줄을 읽어 계정 열거(T1087)를 모사.
      - `echo emulated` — 에뮬레이션이 수행됐음을 표시하는 마커.

      ## 🧰 처음 나오는 용어
      - **T1087** — ATT&CK 계정 열거 기법 ID. **`/etc/passwd`** 는 누구나 읽을 수 있는(world-readable)
        리눅스 계정 목록 파일로, 공격자가 침투 후 어떤 계정을 노릴지 정찰하는 데 읽는다.

      ## ✅ 합격 기준
      `emulated` 출력 시 통과. **근거:** 계정 목록 일부와 emulated 마커가 출력되면 갭 기법(T1087)이
      무대에 오른 것 — 읽기 명령이라 기본 룰이 못 잡는 게 이 사이클에서 닫을 대상이다.
    hint: 'T1087 discovery 에뮬'
    category: recon
    points: 12
    answer: |
      # 1) T1087 Account Discovery 에뮬레이션 — /etc/passwd 앞 2줄 읽어 계정 열거 모사
      ssh ccc@10.20.32.80 'echo "[T1087 Account Discovery]"; cat /etc/passwd | head -2; echo emulated'
      # 2) 해석 — W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음
      echo "→ W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음"
    answer_detail: "갭 기법 = W13에서 탐지 안 된 discovery(T1087, cat /etc/passwd). 읽기 명령이라 시그니처가 약해 기본 커버리지 갭."
    expected_output: |
      [T1087 Account Discovery]
      root:x:0:0:root:/root:/bin/bash
      daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
      emulated
      → W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음
    verify:
      type: output_contains
      expect: 'emulated'
      field: stdout
      semantic:
        intent: "갭 기법 에뮬레이션"
        success_criteria: ["T1087 discovery"]
        acceptable_methods: ["**[OSS] discovery 에뮬 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 퍼플 사이클 ② 커버리지 측정: 갭 확인
      보강 전 상태(갭)를 증거로 확인한다. T1087 마커 이벤트를 wazuh-logtest 에 넣어, 격상 룰이 없어
      미탐지/저레벨임을 본다.

      ## 📖 개념 한 줄
      wazuh-logtest 는 매니저 재시작 없이 로그 한 줄이 decoder→rule 파이프라인을 어떻게 통과하는지
      보여주는 도구. 커스텀 룰이 없으면 T1087 은 json decoder 에 파싱만 되고 격상되지 않는다 —
      이 "미탐지/저레벨"이 갭의 증거다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **방어자 시선(SIEM):** Wazuh 매니저 `ssh ccc@10.20.32.100`(비번 `1`, /var/ossec 은 sudo)로 접속해 실행한다.

      ```bash
      # 1) 측정용 T1087 마커 이벤트(json)를 임시 파일로 생성
      cat > /tmp/aw14m.json <<EOF
      {"technique":"T1087","action":"account_discovery"}
      EOF
      # 2) wazuh-logtest로 decoder→rule 통과 결과 확인 후 임시 파일 삭제(보강 전이라 격상 룰 없음)
      sudo /var/ossec/bin/wazuh-logtest < /tmp/aw14m.json 2>&1 | grep -aE "Completed|decoder|No rule|level:" | head -5; rm -f /tmp/aw14m.json
      # 3) 해석 — 커스텀 룰 없으면 T1087 미탐지/저레벨 = 커버리지 갭(보강 전)
      echo "→ 커스텀 룰 없으면 T1087이 미탐지/저레벨 = 커버리지 갭(보강 전)"
      ```

      ## ✅ 합격 기준
      `Completed` 출력 시 통과. **근거:** wazuh-logtest 가 Completed(파이프라인 통과)를 출력하되
      T1087 을 격상하는 룰이 없어 미탐지/저레벨에 그치면 보강 전 갭이 측정된 것이다.
    hint: 'logtest로 미탐지 확인'
    category: analysis
    points: 12
    answer: |
      # 1) 측정용 T1087 마커 이벤트(json)를 컨테이너 임시 파일로 생성
      ssh ccc@10.20.32.100 'cat > /tmp/aw14m.json <<EOF
      {"technique":"T1087","action":"account_discovery"}
      EOF'
      # 2) wazuh-logtest로 decoder→rule 통과 결과 확인 후 임시 파일 삭제(보강 전이라 격상 룰 없음)
      ssh ccc@10.20.32.100 'sudo /var/ossec/bin/wazuh-logtest < /tmp/aw14m.json 2>&1 | grep -aE "Completed|decoder|No rule|level:" | head -5; rm -f /tmp/aw14m.json'
      # 3) 해석 — 커스텀 룰 없으면 T1087 미탐지/저레벨 = 커버리지 갭(보강 전)
      echo "→ 커스텀 룰 없으면 T1087이 미탐지/저레벨 = 커버리지 갭(보강 전)"
    answer_detail: "보강 전 측정 — T1087 마커가 json decoder엔 파싱되나 커스텀 룰 없으면 escalate 안 됨(미탐지/저레벨) = 커버리지 갭."
    expected_output: |
      **Phase 1: Completed pre-decoding.
      **Phase 2: Completed decoding.
      → 커스텀 룰 없으면 T1087이 미탐지/저레벨 = 커버리지 갭(보강 전)
    verify:
      type: output_contains
      expect: 'Completed'
      field: stdout
      semantic:
        intent: "커버리지 갭 측정(보강 전)"
        success_criteria: ["미탐지/저레벨 확인"]
        acceptable_methods: ["**[OSS] logtest 보강전 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 목표 — 퍼플 사이클 ③ 갭 보강 룰 (id 101414)
      T1087 을 탐지하는 Wazuh 룰(rule id 101414, level 10)을 작성하고, 매니저 무중단으로 logtest
      발화를 검증한 뒤 baseline 을 원복한다(공유 SIEM 보존).

      ## 📖 개념 한 줄
      갭을 닫는다 = decoder 가 이미 파싱하는 field(여기선 technique=T1087)에 격상 룰을 달아 경보
      레벨을 올리는 것. 공유 SIEM 이므로 매니저 재시작 없이 wazuh-logtest 로 발화만 검증하고
      cp 로 원복해 baseline 을 보존한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **방어자 시선(SIEM):** Wazuh 매니저 `ssh ccc@10.20.32.100`(비번 `1`, /var/ossec 은 sudo)로 접속해 실행한다.

      ```bash
      # 1) 공유 SIEM baseline 백업 — 룰 추가 전 local_rules.xml 보존(나중에 cp 원복)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/aw14_lr.bak
      # 2) 갭 보강 룰 추가 — technique=T1087을 level 10으로 격상하는 rule id 101414
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"atk_w14,\">
        <rule id=\"101414\" level=\"10\">
          <decoded_as>json</decoded_as>
          <field name=\"technique\">T1087</field>
          <description>ATK W14 account discovery detected gap closed</description>
        </rule>
      </group>
      EOF"
      # 3) 검증용 T1087 마커 이벤트(json) 생성
      cat > /tmp/aw14.json <<EOF
      {"technique":"T1087","action":"account_discovery"}
      EOF
      # 4) wazuh-logtest로 101414 발화 확인(id/level/Alert) 후 임시 파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/aw14.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/aw14.json
      # 5) baseline 원복 — 백업 복원 후 101414 잔재 0 확인(공유 SIEM 보존)
      sudo cp /tmp/aw14_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/aw14_lr.bak; echo "복원 잔재=$(grep -c 101414 /var/ossec/etc/rules/local_rules.xml)"
      ```

      ## ✅ 합격 기준
      `101414` 출력 시 통과. **근거:** logtest 출력에 rule id 101414(level 10) 발화가 보이면 갭이 룰로
      닫힌 것 — 검증 후 cp 원복으로 공유 SIEM baseline 을 보존한다(복원 잔재=0).
    hint: '보강 룰(101414) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      # 1) 공유 SIEM baseline 백업 — 룰 추가 전 local_rules.xml 보존(나중에 cp 원복)
      ssh ccc@10.20.32.100 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/aw14_lr.bak'
      # 2) 갭 보강 룰 추가 — technique=T1087을 level 10으로 격상하는 rule id 101414
      ssh ccc@10.20.32.100 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"atk_w14,\">
        <rule id=\"101414\" level=\"10\">
          <decoded_as>json</decoded_as>
          <field name=\"technique\">T1087</field>
