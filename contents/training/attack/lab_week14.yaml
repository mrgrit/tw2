lab_id: standalone-attack-week14
title: "Caldera+Wazuh 탐지 커버리지 측정·보강·재검증 (Purple Team)"
version: standalone-attack
course: attack
week: 14
description: |
  공격기법 W14 — Purple Team(퍼플팀) 사이클을 한 바퀴 직접 돈다. W13 에서 미탐지로 드러난
  커버리지 갭(T1087 계정 열거, cat /etc/passwd)을 골라, 레드 시선으로 다시 에뮬레이션하고 →
  wazuh-logtest 로 보강 전 상태(미탐지/저레벨)를 증거로 측정하고 → 블루 시선으로 그 갭을 닫는
  Wazuh 탐지 룰(local_rules.xml, rule id 101414, level 10)을 작성해 logtest 로 발화를 검증하고 →
  다시 같은 기법을 에뮬레이션해 갭이 닫혔음(❌→✅)을 재검증한다. 보강 전후를 커버리지 매트릭스로
  정리하고 사이클을 보고서로 종합한다.
  핵심 원칙 — "고쳤다고 믿지 말고 다시 공격해 확인". 탐지 커버리지를 '추측'이 아니라 '검증된
  데이터'로 끌어올린다. el34 의 Wazuh manager(el34-siem, v4.10)는 여러 학생이 함께 쓰는 공유
  SIEM 이므로, 룰은 매니저 재시작 없이 wazuh-logtest 로 검증만 하고 cp 로 원복(baseline 보존)한다.
  인가된 실습 환경(el34)에서만. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec 로.
  합격 임계값 0.7.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W13(Caldera 자동 에뮬레이션·갭 식별)·W04(Wazuh local_rules.xml 룰 작성) 통과"
  - "el34 호스트 SSH 접속(ssh ccc@192.168.0.151) + docker exec 로 컨테이너 진입"
  - "lecture §1(왜 갭을 찾기만으로는 부족한가) §2(퍼플 4단계: 에뮬→측정→보강→재검증) §3(Wazuh decoder→rule 파이프라인·logtest 무중단 검증) 숙지"
objectives:
  - "W13 의 커버리지 갭(T1087 계정 열거, 읽기성 정찰이라 시그니처 약함)을 재에뮬레이션해 측정 대상으로 무대에 올림"
  - "wazuh-logtest 로 보강 전 상태 측정 — decoder 는 T1087 을 파싱하나 격상 룰 부재로 미탐지/저레벨(갭) 임을 증거로 확인"
  - "갭을 닫는 Wazuh 룰(rule id 101414, level 10, field name=technique) 작성 → 매니저 무중단 logtest 발화 검증 → cp 원복(공유 SIEM baseline 보존)"
  - "재에뮬레이션으로 갭 닫힘(❌→✅) 재검증 + 보강 전후 커버리지 매트릭스 정리 + 사이클 보고서 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 점검: Caldera + Wazuh
      퍼플 사이클을 시작하기 전, 공격 측 도구(Caldera)와 방어 측 탐지 엔진(Wazuh analysisd)이
      모두 준비됐는지 점검한다.

      ## 📖 개념 한 줄
      퍼플팀 사이클(에뮬레이션→측정→보강→재검증)의 전제는 **에뮬레이션 도구 + 탐지 엔진**이
      양쪽 다 살아 있어야 한다는 것이다. analysisd 가 멈춰 있으면 어떤 룰도 평가되지 않는다(lecture §1·§3.1).

      ## 💻 실행 명령
      ```bash
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera ok"
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ```
      - `ls ~/caldera-src/server.py` — 호스트에 Caldera 소스(W13 에서 설치)가 있는지 확인.
      - `docker exec el34-siem ... wazuh-control status | grep analysisd` — Wazuh 의 핵심 데몬
        **analysisd**(디코더·룰의 심장)가 가동 중인지 확인.

      ## 🧰 처음 나오는 도구
      - **Caldera** — ATT&CK 기법을 자동 에뮬레이션하는 레드팀 프레임워크(W13). el34 기본에 없어 호스트에 설치됨.
      - **analysisd** — Wazuh manager 의 데몬으로, 들어온 로그를 decoder→rule 로 평가해 alert 를 만든다(W09).

      ## ✅ 합격 기준
      Caldera 소스가 보이고 `analysisd` 가 `is running` 으로 출력된다(사이클 착수 준비 완료).
    hint: 'caldera + analysisd'
    category: survey
    points: 10
    answer: |
      ls ~/caldera-src/server.py 2>/dev/null && echo "caldera ok" || echo "caldera 미설치"
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "퍼플 사이클 착수 점검 — 에뮬레이션 도구(Caldera, 호스트 ~/caldera-src)와 탐지 엔진(Wazuh analysisd) 양쪽의 가용성을 확인. analysisd 가 'is running' 이면 디코더·룰 평가가 동작하므로 측정·보강으로 넘어갈 수 있다고 판정. 둘 중 하나라도 없으면 사이클을 시작할 수 없다."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "Caldera+Wazuh 점검"
        success_criteria: ["caldera + analysisd"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표 — 퍼플 사이클 ① 갭 재현: 안 잡히던 기법을 다시 일으킨다
      W13 에서 미탐지로 드러난 T1087(계정 열거)을 다시 에뮬레이션해, 본 사이클에서 "닫을 대상"을 무대에 올린다.

      ## 📖 개념 한 줄
      **T1087 Account Discovery** 는 ATT&CK Discovery 전술의 "계정 열거" 기법이다. Linux 의 가장
      단순한 형태가 `cat /etc/passwd`(계정 목록 파일 읽기)다. **읽기 명령**이라 변경·통신·위험
      프로세스 신호가 없어 기본 룰이 잡을 단서가 약하다 — 이것이 갭의 본질이다(lecture §2.1).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'echo "[T1087 Account Discovery]"; cat /etc/passwd | head -2; echo emulated'
      ```
      - `cat /etc/passwd | head -2` — 시스템 계정 목록 파일의 앞 2줄을 읽어 계정 열거(T1087)를 모사.
      - `echo emulated` — 에뮬레이션이 수행됐음을 표시하는 마커.

      ## 🧰 처음 나오는 용어
      - **T1087** — ATT&CK 계정 열거 기법 ID. **`/etc/passwd`** 는 누구나 읽을 수 있는(world-readable)
        리눅스 계정 목록 파일로, 공격자가 침투 후 어떤 계정을 노릴지 정찰하는 데 읽는다.

      ## ✅ 합격 기준
      계정 목록 일부가 출력되고 `emulated` 마커가 찍힌다(갭 기법이 무대에 오름).
    hint: 'T1087 discovery 에뮬'
    category: recon
    points: 12
    answer: |
      echo "=== 갭 기법 에뮬레이션 (T1087 Account Discovery) ==="
      docker exec el34-web sh -c 'echo "[T1087]"; cat /etc/passwd | head -2; echo emulated'
      echo "→ W13에서 discovery는 탐지 갭. 읽기 명령이라 기본 룰이 안 잡음"
    answer_detail: "갭 기법 = W13에서 탐지 안 된 discovery(T1087, cat /etc/passwd). 읽기 명령이라 시그니처가 약해 기본 커버리지 갭."
    verify:
      type: output_contains
      expect: 'emulated'
      field: stdout
      semantic:
        intent: "갭 기법 에뮬레이션"
        success_criteria: ["T1087 discovery"]
        acceptable_methods: ["**[OSS] discovery 에뮬 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 커버리지 측정 — 갭 확인
      ## 💻 실행 명령
      ```bash
      echo '{"technique":"T1087","action":"account_discovery"}' | docker exec -i el34-siem /var/ossec/bin/wazuh-logtest | grep -iE "no rule|level"
      ```
      ## ✅ 합격 기준
      해당 기법이 (보강 전) 미탐지/저레벨임을 확인한다.
    hint: 'logtest로 미탐지 확인'
    category: analysis
    points: 12
    answer: |
      echo "=== 커버리지 측정 (보강 전: 갭) ==="
      docker exec el34-siem sh -c 'cat > /tmp/aw14m.json <<EOF
      {"technique":"T1087","action":"account_discovery"}
      EOF'
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/aw14m.json 2>&1 | grep -aE "Completed|decoder|No rule|level:" | head -5; rm -f /tmp/aw14m.json'
      echo "→ 커스텀 룰 없으면 T1087이 미탐지/저레벨 = 커버리지 갭(보강 전)"
    answer_detail: "보강 전 측정 — T1087 마커가 json decoder엔 파싱되나 커스텀 룰 없으면 escalate 안 됨(미탐지/저레벨) = 커버리지 갭."
    verify:
      type: output_contains
      expect: 'Completed'
      field: stdout
      semantic:
        intent: "커버리지 갭 측정(보강 전)"
        success_criteria: ["미탐지/저레벨 확인"]
        acceptable_methods: ["**[OSS] logtest 보강전 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 갭 보강 룰 (id 101414)
      ## 💻 실행 명령
      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/aw14_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="atk_w14,">
        <rule id="101414" level="10">
          <decoded_as>json</decoded_as>
          <field name="technique">T1087</field>
          <description>ATK W14 - account discovery detected (gap closed)</description>
        </rule>
      </group>
      EOF'
      echo '{"technique":"T1087","action":"account_discovery"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/aw14_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/aw14_lr.bak
      ```
      ## ✅ 합격 기준
      보강 룰(101414)이 갭 기법을 탐지한다(정리 후 보존).
    hint: '보강 룰(101414) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/aw14_lr.bak'
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"atk_w14,\">
        <rule id=\"101414\" level=\"10\">
          <decoded_as>json</decoded_as>
          <field name=\"technique\">T1087</field>
          <description>ATK W14 account discovery detected gap closed</description>
        </rule>
      </group>
      EOF"'
      docker exec el34-siem sh -c 'cat > /tmp/aw14.json <<EOF
      {"technique":"T1087","action":"account_discovery"}
      EOF'
      echo "=== 보강 룰 logtest ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/aw14.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/aw14.json'
      docker exec el34-siem sh -c 'sudo cp /tmp/aw14_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/aw14_lr.bak; echo "복원 잔재=$(grep -c 101414 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "갭 보강 = T1087을 탐지하는 Wazuh 룰(101414, level 10) 작성 → logtest 발화 확인. 커버리지 갭을 룰로 메운다. cp 복원으로 보존."
    verify:
      type: output_contains
      expect: '101414'
      field: stdout
      semantic:
        intent: "갭 보강 룰 + 검증"
        success_criteria: ["id 101414 발화", "cp 복원"]
        acceptable_methods: ["**[OSS] 보강 룰 + logtest (권장)**"]
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 재검증 — 갭이 닫혔나
      ## 💻 실행 명령
      ```bash
      echo "보강 전: T1087 미탐지(❌) → 보강 후: 101414 level 10 발화(✅). 갭 닫힘"
      ```
      ## ✅ 합격 기준
      재에뮬레이션으로 갭이 닫혔음(❌→✅)을 확인한다.
    hint: '보강 전후 ❌→✅'
    category: analysis
    points: 12
    answer: |
      echo "=== 재검증 (재에뮬레이션) ==="
      echo "보강 전: T1087(account discovery) → 미탐지 ❌"
      echo "보강 후: 룰 101414 → level 10 발화 ✅"
      echo "→ 같은 기법을 다시 에뮬레이션해 탐지 확인 = 갭 닫힘. '고쳤다 믿지 말고 다시 공격해 확인'"
    answer_detail: "재검증 = purple team의 핵심. 보강 후 같은 기법을 다시 에뮬레이션해 이제 잡히는지 확인(❌→✅). 룰이 실제 동작함을 입증."
    verify:
      type: output_contains
      expect: '갭 닫힘'
      field: stdout
      semantic:
        intent: "재검증으로 갭 닫힘 확인"
        success_criteria: ["보강 전후 ❌→✅"]
        acceptable_methods: ["**[설명] 재검증 (권장)**"]
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 커버리지 매트릭스
      ## 💻 실행 명령
      ```bash
      echo "Discovery T1087: ❌→✅ / Persistence T1136: ✅ / Execution T1059: ✅ → 커버리지 향상"
      ```
      ## ✅ 합격 기준
      보강 전후 커버리지 매트릭스를 정리한다.
    hint: '커버리지 매트릭스'
    category: analysis
    points: 12
    answer: |
      echo "=== 탐지 커버리지 매트릭스 ==="
      echo "| Tactic | 기법 | 보강 전 | 보강 후 |"
      echo "| Discovery | T1087 | ❌ | ✅(101414) |"
      echo "| Persistence | T1136 | ✅ | ✅ |"
      echo "| Execution | T1059 | ✅ | ✅ |"
      echo "→ 갭(T1087) 보강으로 커버리지 향상. 매트릭스로 우선순위화·지속 개선"
    answer_detail: "커버리지 매트릭스 = ATT&CK 기법별 탐지 여부 시각화. 보강으로 갭(❌)이 ✅로. purple team이 매트릭스를 채워간다."
    verify:
      type: output_contains
      expect: '커버리지'
      field: stdout
      semantic:
        intent: "커버리지 매트릭스 정리"
        success_criteria: ["보강 전후 매트릭스"]
        acceptable_methods: ["**[관리적] 매트릭스 (권장)**"]
    target_vm: siem

  - order: 7
    instruction: |
      ## 🎯 Purple 사이클 정리
      ## 💻 실행 명령
      ```bash
      echo "에뮬레이션→측정→보강→재검증 반복. 레드+블루 협업으로 커버리지 지속 향상"
      ```
      ## ✅ 합격 기준
      purple team 사이클을 정리한다.
    hint: '에뮬→측정→보강→재검증'
    category: report
    points: 12
    answer: |
      echo "=== Purple Team 사이클 ==="
      echo "① 에뮬레이션(Caldera) → ② 커버리지 측정(잡혔나?) → ③ 갭 보강(Wazuh 룰) → ④ 재검증(재에뮬레이션) → ①…"
      echo "→ 레드(공격)+블루(방어) 협업. 객관적·지속적 탐지 개선. '추측'이 아닌 '검증된 커버리지'"
    answer_detail: "purple team = 에뮬레이션→측정→보강→재검증 반복. 레드/블루가 함께 커버리지를 객관적으로 끌어올린다. 추측 아닌 데이터 기반."
    verify:
      type: output_contains
      expect: 'Purple'
      field: stdout
      semantic:
        intent: "purple 사이클 정리"
        success_criteria: ["4단계 사이클"]
        acceptable_methods: ["**[설명] purple 사이클 (권장)**"]
    target_vm: siem

  - order: 8
    instruction: |
      ## 🎯 커버리지 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격 W14 커버리지 보고서 (학번, 이름)
      ## 1. 갭 측정 (미탐지 기법)
      ## 2. 보강 룰(101414) + logtest
      ## 3. 재검증 (❌→✅)
      ## 4. 커버리지 매트릭스 + purple 사이클
      ```
      ## ✅ 합격 기준
      보고서에 측정·보강·재검증이 포함된다.
    hint: '측정+보강+재검증'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 공격 W14 커버리지 보고서
      ## 1. 갭 측정: T1087(discovery) 미탐지(❌)
      ## 2. 보강: Wazuh 룰 101414(technique=T1087, level 10) → logtest 발화
      ## 3. 재검증: 재에뮬레이션 → 이제 탐지(✅). 갭 닫힘
      ## 4. 매트릭스: Discovery ❌→✅, Persistence/Execution ✅. purple 사이클(에뮬→측정→보강→재검증)
