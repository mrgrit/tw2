      # 2) sudo 최소권한 — NOPASSWD·ALL·위험 명령 제거, 명시 명령만
      echo "② sudo 최소권한: NOPASSWD·ALL·위험 명령(vi/awk/less) 제거, 명시 명령만"
      # 3) cron/민감파일 권한 강화 — root-only write, passwd/shadow/sudoers 점검
      echo "③ cron 스크립트 권한 강화(root-only write), 민감 파일(passwd/shadow/sudoers) 권한 점검"
      # 4) 결론 — 최소 권한 원칙(필요한 것만, root는 최소로)
      echo "→ 최소 권한 원칙: 필요한 것만, root는 최소로"
    answer_detail: "privesc 하드닝 = 최소 권한. 불필요 SUID 제거(chmod -s), sudo 최소화(NOPASSWD/ALL/위험 명령 제거), cron/민감파일 권한 강화(root-only). 공격자의 열거에서 오설정이 안 나오게. 출력에 '최소 권한' 이 보이면 통과."
