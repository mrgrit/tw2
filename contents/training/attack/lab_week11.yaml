  - order: 7
    instruction: |
      ## 🎯 하드닝 — 최소 권한
      공격자의 열거에서 오설정이 안 나오게 하는 방어 = 최소 권한 원칙. 불필요 SUID 제거·sudo 최소화·
      cron/민감파일 권한 강화를 정리한다.

      ## 📖 개념 한 줄
      privesc 의 모든 경로는 "필요 이상의 권한"에서 나온다. 셸/에디터 SUID 제거, sudo 명시 명령만 허용,
      cron 스크립트·민감 파일을 root-only 로 잠그면 열거해도 오설정이 없다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 불필요 SUID 제거 — chmod -s(셸/에디터 SUID 절대 금지)
      echo "① 불필요 SUID 제거: chmod -s <binary> (셸/에디터 SUID 절대 금지)"
      # 2) sudo 최소권한 — NOPASSWD·ALL·위험 명령 제거, 명시 명령만
      echo "② sudo 최소권한: NOPASSWD·ALL·위험 명령(vi/awk/less) 제거, 명시 명령만"
      # 3) cron/민감파일 권한 강화 — root-only write, passwd/shadow/sudoers 점검
      echo "③ cron 스크립트 권한 강화(root-only write), 민감 파일(passwd/shadow/sudoers) 권한 점검"
      # 4) 결론 — 최소 권한 원칙(필요한 것만, root는 최소로)
      echo "→ 최소 권한 원칙: 필요한 것만, root는 최소로"
      ```

      ## ✅ 합격 기준
      `최소 권한` 출력 시 통과. **근거:** 불필요 SUID 제거·sudo 최소화·cron/민감파일 권한 강화가
      정리되면 통과 — 공격자의 열거에서 오설정이 안 나오게 하는 것이 방어의 핵심이다.
    hint: 'SUID 제거 + sudo 최소화'
