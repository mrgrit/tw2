      ## 🎯 탐지 — osquery suid_bin / FIM (방어자 시점)
      방어자 관점으로 돌아서서, 공격자의 열거 대상(SUID 바이너리)을 osquery 로 baseline 감시하고
      민감 파일 변경을 FIM 으로 탐지한다.

      ## 📖 개념 한 줄
      osquery 의 `suid_bin` 테이블은 SUID 바이너리 목록을 SQL 로 조회해 baseline 대비 신규/비정상을
      잡고, FIM 은 /etc/sudoers·passwd 변경을 탐지한다 — 공격자의 열거·오설정 추가를 호스트에서 본다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web(관리/방어 확인):** `ssh ccc@10.20.32.80`(비번 `1`, sudo 보유)로 접속해 실행한다.

      ```bash
      # 1) SUID 바이너리 baseline 조회 — 방어자는 osquery suid_bin 테이블로, 여기선 find로 동등 확인
      find / -perm -4000 -type f 2>/dev/null | head -8
      ```
      방어자는 이 SUID 목록을 osquery `suid_bin` 테이블로 SQL 조회해 baseline 을 잡고, 신규/비정상 SUID 가
      추가되면 즉시 탐지한다. 함께 FIM(File Integrity Monitoring)으로 /etc/sudoers·passwd 변경을 감시하면
      공격자의 오설정 추가·SUID 심기를 호스트에서 본다.

      ## ✅ 합격 기준
      `passwd` 출력 시 통과. **근거:** osquery suid_bin(또는 find 폴백)으로 SUID 바이너리가 탐지되면
      통과 — 방어자는 이 baseline 으로 신규/비정상 SUID 와 sudoers/passwd 변경을 감시한다.
