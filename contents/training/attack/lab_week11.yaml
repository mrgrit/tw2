lab_id: standalone-attack-week11
title: "권한 상승 — SUID·sudo·cron 오설정 vs 탐지·하드닝"
version: standalone-attack
course: attack
week: 11
description: |
  W08에서 얻은 셸은 거의 언제나 저권한(www-data/일반 계정)이다. 본 실습은 그 저권한 셸을 root로 끌어올리는
  권한 상승(privilege escalation)을 다룬다. 리눅스 privesc의 4대 단골 경로 — SUID 오설정·sudo 오설정·cron
  작업 탈취·쓰기 가능 민감 파일 — 을 직접 열거(enumeration)로 찾아내고, 그것을 root로 잇는 GTFObins 경로를
  식별한 뒤, 방어자 시선으로 osquery·FIM 탐지와 최소 권한 하드닝까지 종합한다. privesc의 90%는 화려한
  익스플로잇이 아니라 "이미 잘못 놓인 오설정을 찾는 열거"다.
  본 실습은 열거 중심(읽기 전용)이며, 실제 root 상승(GTFObins 실행)·하드닝(권한 변경)은 개념·점검까지만 한다
  (공유 인프라 보존). 침투로 얻은 표적 web 셸 `ssh ccc@10.20.32.80`(비번 1)에서 privesc 벡터를 sudo 없이
  열거하고, 방어·하드닝 확인은 같은 셸에서 sudo 로 수행한다. 인가된 실습 환경(el34)에서만 수행한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W08(익스플로잇 체인 → 저권한 셸 획득) 통과"
  - "표적 web 셸 ssh ccc@10.20.32.80 (비번 1) — privesc 열거는 sudo 없이, 하드닝은 sudo"
  - "lecture §1(셸≠root) §2(열거) §3(SUID/sudo/cron/파일 권한 + GTFObins) §5(탐지·하드닝) 숙지"
objectives:
  - "저권한(ccc, uid 1000) 컨텍스트에서 privesc 열거 3종 세트(SUID 바이너리·sudo 권한·cron/쓰기 가능 파일) 수행"
  - "정상 SUID(passwd/su/mount)와 비정상 SUID(셸/에디터/find 등)를 구분하고, 비정상 바이너리를 GTFObins 경로로 매핑"
  - "방어자 시선으로 osquery suid_bin·FIM으로 탐지하고, 최소 권한 원칙(불필요 SUID 제거·sudo 최소화)으로 하드닝"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 비-root 컨텍스트
      privesc의 전제는 "지금 내가 저권한"이라는 사실이다. 침투 테스터는 상승을 시도하기 전에
      항상 현재 권한부터 확인한다 — 셸을 막 얻은 공격자의 첫 명령이 `id`/`whoami`다.
      표적 web 에 로그인한 `ccc` 사용자로 privesc 벡터(SUID·sudo·cron)를 **열거**한다(uid 1000)가
      준비돼 있다. `ssh ccc@10.20.32.80` 이 곧 "침투로 얻은 표적 web 셸" 이다(sudo 없이 열거하면 저권한 시선).다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸(침투로 얻은 거점):** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다(침투로 막 얻은 저권한 셸 모사).

      ```bash
      # 1) 저권한 컨텍스트 확인 — ccc(uid 1000)로 id 실행(침투로 막 얻은 저권한 셸 모사)
      id
      ```
      출력의 uid=1000(ccc) 이 비-root 저권한 컨텍스트다 — 여기서 오설정을 찾아 root 로 상승하는 것이 목표다.
      groups 의 멤버십(sudo/www-data 등)이 곧 다음 단계의 단서다.
      - id 의 그룹 멤버십도 privesc 단서(sudo/wheel 그룹이면 sudo 경로, docker 그룹이면 docker 소켓 경로 등).

      ## ✅ 합격 기준
      `ccc` 출력 시 통과. **근거:** uid=1000(ccc) 비-root 가 보이면 저권한 출발점 확보 — id 의 그룹
      멤버십(sudo/www-data 등)이 다음 단계의 단서다.
    hint: 'ssh ccc@10.20.32.80 id'
    category: survey
    points: 10
    answer: |
      # 1) 저권한 컨텍스트 확인 — ccc(uid 1000)로 id 실행(침투로 막 얻은 저권한 셸 모사)
      ssh ccc@10.20.32.80 id
    answer_detail: "privesc 출발점 = 저권한 셸(ccc, uid 1000). id로 현재 권한과 그룹 멤버십(sudo/www-data 등)을 확인한다 — 그룹이 곧 다음 단계의 단서. 판정: 출력에 uid 1000(ccc) 비-root 컨텍스트가 보이면 합격. 여기서 오설정을 찾아 root로 상승하는 것이 W11의 목표."
    expected_output: |
      uid=1000(ccc) gid=1000(ccc) groups=1000(ccc),27(sudo),33(www-data)
    verify:
      type: output_contains
      expect: 'ccc'
      field: stdout
      semantic:
        intent: "비-root 컨텍스트 점검"
        success_criteria: ["ccc uid 1000"]
        acceptable_methods: ["**[OSS] ssh ccc@10.20.32.80 id (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SUID 열거 — privesc 1순위
      SUID(Set-User-ID) 비트가 붙은 실행 파일은, 누가 실행하든 **파일 소유자(root) 권한으로** 동작한다.
      그래서 SUID 바이너리 목록이 곧 가장 빠른 root 경로 후보이며, 열거의 1순위다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸(침투로 얻은 거점):** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      # 1) SUID(-perm -4000) 일반 파일 열거 — 누가 실행하든 소유자(root) 권한으로 도는 파일
      find / -perm -4000 -type f 2>/dev/null
      ```
      목록에서 정상 SUID(passwd/su/mount/sudo = 의도된 것)와 비정상 SUID(find/vim/bash/cp/awk = 임의 코드·
      파일 능력)를 구분하는 게 핵심이다 — 비정상 SUID 하나가 곧 GTFObins root 경로다. 이 수동 열거를 실무자는
      `linpeas`(리눅스 privesc 자동 열거 스크립트) 같은 도구로 한 번에 훑지만, 무엇을·왜 보는지는 손 열거로 익힌다.
      - `-perm -4000`(SUID 비트 포함 파일, `-` 접두사=비트 포함), `-type f`(일반 파일만), `2>/dev/null`(권한 없는 디렉터리 오류 버림 — SUID 열거의 표준 관용).

      ## ✅ 합격 기준
      `passwd` 출력 시 통과. **근거:** SUID 목록(passwd 등 정상 포함)이 출력되면 통과 — 핵심은 정상
      (passwd/su/mount)과 비정상(find/vim/bash/cp/awk)을 구분하는 것(비정상 SUID = GTFObins root 후보).
    hint: 'find -perm -4000'
    category: recon
    points: 12
    answer: |
      # 1) SUID(-perm -4000) 일반 파일 열거 — 누가 실행하든 소유자(root) 권한으로 도는 파일
      ssh ccc@10.20.32.80 'find / -perm -4000 -type f 2>/dev/null'
    answer_detail: "SUID 열거 = privesc 1순위. find -perm -4000으로 root 권한 실행 파일 목록을 뽑는다. 판정: 출력에 SUID 목록(passwd 등)이 보이면 합격. 핵심 해석은 정상 SUID(passwd/su/mount/sudo = 의도된 것)와 비정상 SUID(find/vim/bash/cp/awk = 임의 코드·파일 능력)의 구분이며, 비정상 바이너리가 GTFObins root 셸 후보다."
    expected_output: |
      /usr/bin/passwd
      /usr/bin/su
      /usr/bin/mount
      /usr/bin/umount
      /usr/bin/chsh
      /usr/bin/newgrp
      /usr/bin/chfn
      /usr/bin/gpasswd
      /usr/bin/sudo
      /usr/lib/openssh/ssh-keysign
    verify:
      type: output_contains
      expect: 'passwd'
      field: stdout
      semantic:
        intent: "SUID 열거"
        success_criteria: ["SUID 목록(passwd 등)"]
        acceptable_methods: ["**[OSS] find -perm -4000 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 sudo·그룹 점검 — 너무 넓은 대리 허가 찾기
      `sudo`는 지정된 명령을 root로 실행하게 해 주는 도구다. "이 명령에 한해 root 대리"라는 최소 권한으로
      써야 안전한데, NOPASSWD·`ALL`·위험 명령을 허용하면 그 하나가 곧 root 셸이 된다. SUID 다음으로 흔한 경로.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸(침투로 얻은 거점):** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      # 1) 현재 그룹 멤버십 확인(sudo/wheel 그룹이 단서)
      id
      # 2) sudo 권한 조회 — NOPASSWD/ALL/위험 명령(비번 필요시 그룹 멤버십이 차선 단서)
      sudo -ln | grep -iE "NOPASSWD|ALL|may run" | head -5 || echo "(sudo -l 비번 필요 — 그룹 sudo 멤버십이 단서)"
      ```
      id 의 sudo 그룹 멤버십 + sudo -ln 의 (ALL) ALL·NOPASSWD·위험 명령(vi/awk/less)이 보이면 그 명령의 셸
      탈출(GTFObins escape)로 root 가 된다. 비번이 필요해 sudo -l 이 막히면 그룹 멤버십이 차선 단서다.
      - `sudo -ln`(비번 프롬프트 없이 sudo 권한 조회), `NOPASSWD:`(비번 없이 실행), id 의 sudo(데비안)/wheel(레드햇) 그룹도 단서.

      ## ✅ 합격 기준
      `sudo` 출력 시 통과. **근거:** id 와 sudo 권한 점검이 수행되면 통과 — (ALL) ALL·NOPASSWD·위험 명령
      (vi/awk/less)이 보이면 root 경로, 비번이 필요해 막히면 그룹 멤버십이 차선 단서다.
    hint: 'id 그룹 + sudo -ln'
    category: recon
    points: 12
    answer: |
      # 1) 현재 그룹 멤버십 확인(sudo/wheel 그룹이 단서)
      ssh ccc@10.20.32.80 id
      # 2) sudo 권한 조회 — NOPASSWD/ALL/위험 명령(비번 필요시 그룹 멤버십이 차선 단서)
      ssh ccc@10.20.32.80 'sudo -ln | grep -iE "NOPASSWD|ALL|may run" | head -5 || echo "(sudo -l 비번 필요 — 그룹 sudo 멤버십이 단서)"'
    answer_detail: "sudo 오설정 점검 — id의 sudo 그룹 멤버십과 sudo -ln의 NOPASSWD/위험 명령을 함께 본다. 판정: 출력에 sudo 관련 정보(그룹 또는 권한)가 보이면 합격. ALL이나 vi/less/awk를 sudo로 실행 가능하면 그 명령의 셸 탈출(GTFObins escape)로 root. 비번이 필요해 sudo -l이 막히면 그룹 멤버십이 차선 단서."
    expected_output: |
      uid=1000(ccc) gid=1000(ccc) groups=1000(ccc),27(sudo),33(www-data)
      User ccc may run the following commands on web:
          (ALL : ALL) ALL
          (ALL) NOPASSWD: ALL
    verify:
      type: output_contains
      expect: 'sudo'
      field: stdout
      semantic:
        intent: "sudo/그룹 점검"
        success_criteria: ["sudo 그룹/권한 확인"]
        acceptable_methods: ["**[OSS] id + sudo -ln (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 cron·쓰기 가능 점검 — 자동 순찰 코스의 함정 + 권한의 원장
      SUID·sudo가 막혀도 두 경로가 더 있다. ① **cron 작업 탈취** — root cron이 부르는 스크립트가 쓰기 가능
      하면, 그 내용을 바꿔 다음 실행 시각에 root 코드를 돌린다. ② **쓰기 가능 민감 파일** — /etc/passwd·
      shadow·sudoers가 world-writable이면 권한 체계를 직접 고쳐 root가 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **표적 web 셸(침투로 얻은 거점):** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      # 1) cron 정의 점검 — root cron이 쓰기 가능 스크립트를 부르면 탈취 가능
      ls -la /etc/cron.d/; ls -la /etc/crontab
      # 2) 민감 파일 권한 — passwd/shadow others에 w 있으면 치명적 오설정
      ls -la /etc/passwd /etc/shadow | head
      ```
      others(권한 끝자리)에 `w` 가 있으면 치명적 오설정이다 — root cron 이 world-writable 스크립트를 실행하면
      그 스크립트를 교체해 root 코드를 돌리고, passwd/shadow/sudoers 가 world-writable 이면 권한 체계를 직접
      고쳐 root 가 된다. 정상은 passwd `-rw-r--r--`, shadow `-rw-r-----` 로 others 에 `w` 가 없다(경로 막힘).
      - cron 탈취는 ①root cron 존재 ②그 스크립트를 내가 쓸 수 있을 때 성립. world-writable=권한 끝자리(others)에 `w`.

      ## ✅ 합격 기준
      `passwd` 출력 시 통과. **근거:** cron 정의와 민감 파일 권한(passwd 등)이 출력되면 통과 — others 에
      `w` 가 보이면 치명적 오설정, 없으면(정상) 그 경로는 막힌 것이다.
    hint: 'cron.d + world-writable'
    category: recon
    points: 12
    answer: |
      # 1) cron 정의 점검 — root cron이 쓰기 가능 스크립트를 부르면 탈취 가능
      ssh ccc@10.20.32.80 'ls -la /etc/cron.d/; ls -la /etc/crontab'
      # 2) 민감 파일 권한 — passwd/shadow others에 w 있으면 치명적 오설정
      ssh ccc@10.20.32.80 'ls -la /etc/passwd /etc/shadow | head'
    answer_detail: "cron 탈취·쓰기 가능 민감 파일 점검 — root cron이 쓰기 가능 스크립트를 실행하면 그 스크립트를 교체해 root 코드 실행. /etc/passwd·shadow·sudoers가 world-writable이면 uid 0 계정/규칙을 직접 추가. 판정: 출력에 cron 정의와 민감 파일 권한(passwd 등)이 보이면 합격. 민감 파일 others에 w가 없으면(정상) 그 경로는 막힌 것."
    expected_output: |
      total 16
      drwxr-xr-x 1 root root 4096 Jun 24 23:25 .
      drwxr-xr-x 1 root root 4096 Jun 24 23:29 ..
      -rw-r--r-- 1 root root  201 Jan  8  2022 e2scrub_all
      -rw-r--r-- 1 root root   1047 Jun 24 23:29 /etc/passwd
      -rw-r----- 1 root shadow  651 Jun 24 23:29 /etc/shadow
    verify:
      type: output_contains
      expect: 'passwd'
      field: stdout
      semantic:
        intent: "cron/쓰기가능 점검"
        success_criteria: ["cron + 민감파일 권한"]
        acceptable_methods: ["**[OSS] cron + writable 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 권한 상승 경로 — GTFObins
      열거(미션 2–4)에서 찾은 비정상 SUID/sudo 바이너리를, 정상 도구의 악용법을 모은 GTFObins DB 에
      대조해 실제 root 셸 경로로 잇는다.

      ## 📖 개념 한 줄
      **GTFObins** = find·vim·awk 같은 정상 바이너리가 SUID/sudo 로 실행될 때 셸을 띄우는 악용법 DB.
      비정상 SUID/sudo 바이너리 하나하나가 이 DB 의 한 경로로 root 가 된다.

      ## 💻 실행 방법 — 편집기로 GTFObins 매핑 작성

      **표적 web 셸:** `ssh ccc@10.20.32.80`(비번 1) 로 접속해 `nano ~/w11_gtfobins.md` 를 열고, 열거에서
      찾은 비정상 SUID/sudo 바이너리를 GTFObins 경로에 대조해 아래처럼 정리·저장한다(Ctrl+O 저장, Ctrl+X 종료).

      ```markdown
      # W11 GTFObins 권한 상승 경로 매핑
      ## find (SUID/sudo) → find . -exec /bin/sh -p (셸 실행, 권한 유지)
      ## vim  (SUID/sudo) → :!/bin/sh 로 셸 탈출
      ## awk  (sudo)      → BEGIN 블록에서 system(/bin/sh) 호출
      ## less/more (sudo) → 뷰어에서 !/bin/sh 입력
      ## bash (SUID)      → bash -p (권한 유지 셸)
      ## 결론 : 열거(미션 2~4)에서 찾은 비정상 SUID/sudo 를 GTFObins DB(gtfobins.github.io)에 대조해 root 경로 확정
      ```
      작성 후 `cat ~/w11_gtfobins.md` 로 확인한다 — 매핑은 echo 로 찍는 게 아니라 찾은 바이너리를 스스로 대조해
      쓰는 문서다(실제 root 실행은 개념까지 — 공유 인프라 보존).

      ## ✅ 합격 기준
