lab_id: standalone-attack-week09
title: "scapy 패킷 크래프팅·비정상 스캔 vs 패킷 분석·네트워크 탐지룰"
version: standalone-attack
course: attack
week: 9
description: |
  완성 도구(nmap)를 넘어 scapy로 TCP 패킷을 한 필드씩 직접 조립한다. SYN 을 보내 응답 플래그
  (SYN-ACK 0x12=open / RST 0x14=closed)로 포트 상태를 판정하고, 표준이 아닌 비정상 스캔
  (FIN/XMAS/NULL)으로 일부 stateless 필터·스택을 우회하려 시도한다. 이어 방어자 시선으로
  돌아서서, 대규모 스캔(100+ 포트)이 Suricata 의 임계 기반 탐지에 걸리는 것과, 정상 트래픽에
  결코 없는 NULL 패킷(flags:0)을 시그니처 룰로 잡는 것을 직접 확인한다. 마지막으로 은밀(소량·
  저속) ↔ 탐지(대량·고속)의 trade-off 를 정리한다. 공격은 외부 공격자 VM 192.168.0.202(att/1, scapy 2.4.4,
  raw socket 은 sudo 로 사용), 방어는 el34-ips 의 Suricata. 작성한 IDS 룰은 sid(9409xxx)로 self-clean 해
  베이스 룰을 보존한다. 공격은 `ssh att@192.168.0.202`(비번 1)로 접속해 대상 192.168.0.161에 수행하고,
  IDS 흔적 확인은 IPS 장비 `ssh ccc@10.20.31.2`(비번 1)에서 한다.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W08 통과"
  - "공격 VM ssh att@192.168.0.202 + IPS 장비 ssh ccc@10.20.31.2 (비번 1)"
  - "lecture §2(scapy) §3(비정상 스캔) §4(탐지) 숙지"
objectives:
  - "패킷 크래프팅의 개념을 이해하고 scapy 로 IP()/TCP() 패킷을 한 필드씩 조립·전송한다"
  - "scapy SYN 스캔으로 응답 플래그(0x12=open)를 읽어 open 포트를 식별한다"
  - "비정상 스캔(FIN/XMAS/NULL)을 수행하고 그 우회 원리와 탐지 취약성을 설명한다"
  - "임계 기반 탐지를 이해하고 대규모 스캔(100+ 포트)이 Suricata 에 잡히는 것을 증거로 보인다"
  - "NULL 스캔(flags:0)을 잡는 시그니처 룰(sid 9409001)을 작성·검증·트리거·삭제한다"
  - "은밀(소량·저속) vs 탐지(대량·고속)의 trade-off 를 정리하고 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      패킷 크래프팅 도구 scapy 가 외부 공격자 VM 192.168.0.202에서 동작하는지 점검한다. 모든 패킷 작업의
      출발점이다.

      ## 개념 한 줄
      **scapy** = 파이썬으로 패킷을 한 필드씩 조립·전송·분석하는 라이브러리. 패킷을 보내려면
      OS 의 **raw socket**(낮은 계층 패킷을 직접 다루는 root 권한)이 필요한데, 공격 VM 192.168.0.202에서 sudo 로 실행한다. (hping3 도 있으나 본 실습은 필드별 조립을 배우려 scapy 를
      쓴다.)

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 패킷 크래프팅 도구 scapy 동작 확인(버전) — raw socket은 root라 가능
      python3 -c "import scapy; print('scapy', scapy.__version__)"
      ```

      ## ✅ 합격 기준
      `scapy` 출력 시 통과. **근거:** scapy <버전>(2.4 계열)이 출력되면 크래프팅 준비 완료 —
      import 오류가 나면 라이브러리·권한 문제이므로 먼저 해결한다.
    hint: 'python3 import scapy'
    category: survey
    points: 10
    answer: |
      # 1) 패킷 크래프팅 도구 scapy 동작 확인(버전) — raw socket은 root라 가능
      ssh att@192.168.0.202 'python3 -c "import scapy; print('\''scapy'\'', scapy.__version__)"'
    answer_detail: "scapy = 패킷을 한 필드씩 직접 조립하는 라이브러리. raw socket(낮은 계층 패킷 전송)에 root 권한이 필요하며 외부 공격자 VM 192.168.0.202에서 sudo 로 실행한다. 버전 문자열이 stdout 에 출력되면 가용으로 판정. 패킷 크래프팅은 scapy 로 한다(hping3 도 설치됨)."
    expected_output: |
      scapy 2.4.4
    verify:
      type: output_contains
      expect: 'scapy'
      field: stdout
      semantic:
        intent: "scapy 점검"
        success_criteria: ["scapy 버전"]
        acceptable_methods: ["**[OSS] import scapy (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      scapy 로 SYN 패킷을 직접 조립해 여러 포트에 보내고, 응답으로 열린 포트를 식별한다(도구가
      자동화하던 일을 패킷 한 필드씩 수동으로).

      ## 개념 한 줄
      포트 스캔의 본질은 **SYN 을 보내고 무엇이 돌아오는지 보는 것**이다 — 열린 포트는
      SYN-ACK(flags **0x12**)을, 닫힌 포트는 RST(0x14)을 답한다. `sr()`(send-receive)은 패킷을
      보내고 응답을 받아 (응답온것 ans, 안온것 u) 으로 돌려준다. SYN 만 보내고 마지막 ACK 은
      안 보내 연결을 끝까지 안 맺는 "반열림 스캔"이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) scapy로 SYN(flags='S') 패킷을 여러 포트에 조립·전송 → SYN-ACK(0x12) 응답 포트=open
      sudo python3 -c "from scapy.all import *; ans,u=sr(IP(dst='192.168.0.161')/TCP(dport=[22,80,443,8001,8002,3306,5432],flags='S'),timeout=4,verbose=0); print('open:', sorted(p[1].sport for p in ans if p[1][TCP].flags==0x12))"
      ```
      `open: [...]` 에 나온 포트가 SYN-ACK(flags 0x12)로 응답한 열린 포트다 — RST(0x14)=closed, 무응답=filtered.
      nmap 이 자동화하던 반열림 스캔을 패킷 한 필드씩 손으로 조립한 것이라, 다음 미션의 비정상 플래그 조합도 자유롭게 만든다.
      - scapy 의 `/` 는 계층을 포갬: `IP(dst=...)/TCP(dport=[...],flags='S')` = SYN 패킷. `sr` 응답 중 flags 0x12(SYN-ACK)인 것의 출발 포트(sport)가 열린 포트.

      ## ✅ 합격 기준
      `open:` 출력 시 통과. **근거:** open: [...] 에 열린 포트가 나타나면 통과 — SYN-ACK(0x12)=open,
      RST(0x14)=closed, 무응답=filtered 로 해석한다.
    hint: 'scapy sr SYN → SYN-ACK(0x12)=open'
    category: manipulation
    points: 12
    answer: |
      # 1) scapy로 SYN(flags='S') 패킷을 여러 포트에 조립·전송 → SYN-ACK(0x12) 응답 포트=open
      ssh att@192.168.0.202 'sudo python3 -c "from scapy.all import *; ans,u=sr(IP(dst='\''192.168.0.161'\'')/TCP(dport=[22,80,443,8001,8002,3306,5432],flags='\''S'\''),timeout=4,verbose=0); print('\''open:'\'', sorted(p[1].sport for p in ans if p[1][TCP].flags==0x12))"'
    answer_detail: "scapy 로 SYN 을 직접 조립(IP/TCP flags='S')해 보내고, 응답 플래그로 포트 상태를 판정한다 — SYN-ACK(0x12)=open, RST(0x14)=closed, 무응답=filtered. stdout 의 'open:' 목록으로 채점한다. nmap 이 자동화하는 반열림 스캔을 패킷 한 필드씩 수동으로 한 것이며, 그래서 다음 미션의 비정상 플래그 조합도 자유롭게 만들 수 있다."
    expected_output: |
      open: [22, 80, 443, 8001, 8002]
    verify:
      type: output_contains
      expect: 'open:'
      field: stdout
      semantic:
        intent: "scapy SYN 크래프팅 + open 식별"
        success_criteria: ["open 포트 식별"]
        acceptable_methods: ["**[OSS] scapy sr SYN (권장)**"]
    target_vm: ips

  - order: 3
    instruction: |
      ## 🎯 목표
      표준 SYN 으로 막히는 곳을 우회하려는 시도로, 비정상 플래그 조합(FIN·XMAS·NULL) 패킷을
      scapy 로 직접 만들어 보낸다.

      ## 개념 한 줄
      **비정상 스캔** = TCP 규약상 정상 연결엔 나오지 않는 플래그 조합을 보내, stateless 필터·
      오래된 스택의 처리 차이를 노리는 정찰. **FIN(`flags='F'`)** =FIN 만, **XMAS(`flags='FPU'`)**
      =FIN+PSH+URG 를 다 켬(불 켜진 트리 모양), **NULL(`flags=0`)** =플래그를 하나도 안 켬(정상엔
      결코 없는 모양).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 비정상 플래그 3종(FIN=F/XMAS=FPU/NULL=0) 패킷을 차례로 전송 — 일부 필터/스택 우회 시도
      sudo python3 -c "from scapy.all import *; sr(IP(dst='192.168.0.161')/TCP(dport=80,flags='F'),timeout=2,verbose=0); sr(IP(dst='192.168.0.161')/TCP(dport=80,flags='FPU'),timeout=2,verbose=0); sr(IP(dst='192.168.0.161')/TCP(dport=80,flags=0),timeout=2,verbose=0); print('FIN/XMAS/NULL sent')"
      ```
      `FIN/XMAS/NULL sent` 이 나오면 세 비정상 패킷(F·FPU·0)이 와이어로 나간 것이다 — 표준 밖 플래그로 일부
      stateless 필터·스택을 우회하려는 시도지만, 정상 트래픽엔 없는 모양이라 오히려 §6 에서 시그니처에 확실히 잡힌다.
      - 플래그 문자열만 `F`→`FPU`→`0` 으로 바꿔 세 비정상 패킷을 차례로 전송(nmap 의 -sF/-sX/-sN 대응, scapy 는 임의 조합까지).

      ## ✅ 합격 기준
      `sent` 출력 시 통과. **근거:** FIN/XMAS/NULL sent 가 나오면 세 비정상 패킷이 와이어로 나간 것 —
      학습 초점은 "표준 밖 플래그를 직접 조립했다"와 이 비정상 모양이 §5 에서 시그니처에 확실히 잡힌다는 점.
    hint: 'flags=F / FPU / 0'
    category: manipulation
    points: 12
    answer: |
      # 1) 비정상 플래그 3종(FIN=F/XMAS=FPU/NULL=0) 패킷을 차례로 전송 — 일부 필터/스택 우회 시도
      ssh att@192.168.0.202 'sudo python3 -c "from scapy.all import *; sr(IP(dst='\''192.168.0.161'\'')/TCP(dport=80,flags='\''F'\''),timeout=2,verbose=0); sr(IP(dst='\''192.168.0.161'\'')/TCP(dport=80,flags='\''FPU'\''),timeout=2,verbose=0); sr(IP(dst='\''192.168.0.161'\'')/TCP(dport=80,flags=0),timeout=2,verbose=0); print('\''FIN/XMAS/NULL sent'\'')"'
    answer_detail: "비정상 스캔 = 표준 SYN 대신 FIN(F)/XMAS(FPU)/NULL(0) 플래그로 보내 일부 stateless 필터·오래된 스택의 처리 차이를 노리는 정찰. scapy 라 플래그 문자열만 바꿔 임의 조합을 조립한다(nmap 의 -sF/-sX/-sN 대응). 'sent' 출력으로 전송 성공을 채점한다. 우회를 노리지만 정상에 없는 모양이라 오히려 시그니처 탐지에 취약하다는 trade-off 가 핵심."
    expected_output: |
      FIN/XMAS/NULL sent
    verify:
      type: output_contains
      expect: 'sent'
      field: stdout
      semantic:
        intent: "비정상 플래그 스캔"
        success_criteria: ["FIN/XMAS/NULL 전송"]
        acceptable_methods: ["**[OSS] scapy 비정상 플래그 (권장)**"]
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 목표
      같은 SYN 스캔이라도 규모가 임계를 넘으면 탐지된다는 것을 증거로 확인한다 — 대규모(100+
      포트) 스캔을 보내고 Suricata 의 scan 경보를 집계한다.

      ## 개념 한 줄
      **임계 기반 IDS 탐지** = 개별 패킷의 모양이 아니라 "짧은 시간에 같은 출처가 N개 넘는
      포트를 건드렸나"라는 빈도·규모로 스캔을 판정. 그래서 소량(미션 2 의 6~7개)은 임계 미달로
      빠져나가고, **대량(100+ 포트)** 이라야 탐지된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 대량 스캔 발사는 `외부 공격자 VM 192.168.0.202`, 탐지 집계는 `el34-ips`.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: 대규모 스캔 발사 ──
      # 1) 대규모 SYN 스캔(포트 1~200 범위) — 임계 초과 유발(scapy 튜플=범위)
      sudo python3 -c "from scapy.all import *; sr(IP(dst='192.168.0.161')/TCP(dport=(1,200),flags='S'),timeout=6,verbose=0); print('mass scan sent')"
      # ── el34-ips 에서: scan 경보가 eve에 뜰 때까지 조건 폴링 후 집계 ──
      # 2) scan 경보 대기 — 고정 sleep 대신 출처 192.168.0.202의 scan 시그니처가 나타날 때까지 조건 폴링
      timeout 15 bash -c 'until tail -3000 /var/log/suricata/eve.json | grep 192.168.0.202 | grep -qi scan; do :; done'
      # 3) eve.json에서 출처 192.168.0.202의 scan 시그니처 집계(SNAT 없어 출처 보존)
      tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and .src_ip=="192.168.0.202" and (.alert.signature|test("scan";"i")))|.alert.signature' | sort | uniq -c | tail -2
      ```
      대량 SYN(1~200 포트)이 Suricata 의 스캔 임계를 초과해 eve.json 에 'scan' 시그니처로 남는다 — 소량(미션 2 의
      6~7개)은 임계 미달로 은밀하게 빠져나간다. 규모가 탐지 여부를 가른다(공격자는 소량·저속으로 회피, 방어자는 임계 튜닝).

      ## ✅ 합격 기준
      `scan` 출력 시 통과. **근거:** 집계 결과에 scan 을 포함한 시그니처가 나타나면 통과 — 소규모는
      은밀, 대규모는 탐지. 규모가 탐지 여부를 가른다.
    hint: 'scapy dport=(1,200) 대량 → eve scan'
    category: detect
    points: 14
    answer: |
      # 1) 대규모 SYN 스캔(포트 1~200 범위) — 임계 초과 유발(scapy 튜플=범위)
      ssh att@192.168.0.202 'sudo python3 -c "from scapy.all import *; sr(IP(dst='\''192.168.0.161'\'')/TCP(dport=(1,200),flags='\''S'\''),timeout=6,verbose=0); print('\''mass scan sent'\'')"'
      # 2) scan 경보가 eve에 뜰 때까지 조건 폴링 후 집계(고정 sleep 대신 실제 경보를 기다림)
      ssh ccc@10.20.31.2 'timeout 15 bash -c "until tail -3000 /var/log/suricata/eve.json | grep 192.168.0.202 | grep -qi scan; do :; done"; tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"192.168.0.202\" and (.alert.signature|test(\"scan\";\"i\")))|.alert.signature" | sort | uniq -c | tail -2'
    answer_detail: "임계 기반 탐지는 빈도·규모로 잡는다 — 소량 스캔(미션 2 의 6~7개)은 임계 미달로 통과하지만 대량(1~200, 100+ 포트)은 Suricata 의 스캔 임계를 초과해 eve.json 에 'scan' 시그니처로 남는다. 출처 IP 192.168.0.202(SNAT 없어 보존) 필터로 집계한 결과에 scan 이 보이면 탐지. 공격자는 느림·소량으로 회피, 방어자는 임계 튜닝(미탐↔오탐 균형)으로 대응한다."
    expected_output: |
      mass scan sent
