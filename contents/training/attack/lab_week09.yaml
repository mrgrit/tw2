      즉시 경보(임계와 달리 횟수로 못 숨김). 룰은 Suricata 의 `local.rules` 에 한 줄씩 적고
      고유 번호 **sid**(이번 주 네임스페이스 `9409xxx`)로 식별하며, 끝나면 그 sid 만 삭제해
      베이스 룰을 보존한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 룰 작성·검증·reload·확인·정리는 `el34-ips`, NULL 패킷 트리거만 `외부 공격자 VM 192.168.0.202`.

      ```bash
      # ── el34-ips 에서: 룰 추가 + 문법검증 + reload ──
      # 1) NULL 스캔(flags:0) 탐지룰 추가 — 정상엔 없는 모양이라 단발도 잡힘(sid 9409001)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert tcp any any -> any any (msg:\"W9 NULL scan detected\"; flags:0; sid:9409001; rev:1;)
      EOF"
      # 2) 적용 전 룰 문법 검증(-T) — "successfully loaded" 확인
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -2
      # 3) 무중단 reload — suricatasc는 reload 완료 후 반환(동기)하므로 별도 대기 불필요
      sudo suricatasc -c reload-rules >/dev/null
      # ── 외부 공격자 VM 192.168.0.202 에서: NULL 패킷 트리거(여러 포트) ──
      sudo python3 -c "from scapy.all import *; [sr(IP(dst='192.168.0.161')/TCP(dport=p,flags=0),timeout=1,verbose=0) for p in (80,443,22,8001)]; print('null sent')"
      # ── el34-ips 에서: eve 확인(best-effort) + self-clean ──
      # 4) 최대 5초 조건 폴링으로 9409001 매치를 기다렸다 매치 줄 표시(단발이라 없을 수도 = best-effort)
      timeout 5 bash -c 'until sudo grep -q 9409001 /var/log/suricata/eve.json; do :; done'; sudo grep 9409001 /var/log/suricata/eve.json | tail -1
      # 5) self-clean — 룰 삭제 + reload + 잔재 확인(base 보존, 카운트 아닌 매치 유무)
      sudo sed -i "/sid:9409001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; sudo grep 9409001 /etc/suricata/rules/local.rules && echo "룰 잔재!" || echo "rule_removed clean"
      ```
      - 룰 핵심: `flags:0`(NULL 패킷 조건), `sid:9409001`(내 네임스페이스). `suricata -T`(문법 검증, "successfully loaded"), `suricatasc -c reload-rules`(무중단·동기), 끝나면 sed 삭제→reload(base 보존).

