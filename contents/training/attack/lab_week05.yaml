      ## 🎯 방어 — 출력 인코딩(근본) + CSP + HttpOnly
      ## 💡 개념 (왜 이걸 하나)
      공격을 이해했으니 근본 방어를 정리한다(공격자도 방어를 알아야 우회를 설계한다). WAF는
      단순 우회를 잘 막지만 고급 우회·DOM-based에는 한계가 있으므로 **보조**일 뿐이다. XSS를
      근본적으로 막는 것은 애플리케이션 코드 차원의 방어다.
      - ① **출력 인코딩(근본)**: 입력을 화면에 낼 때 출력 컨텍스트(HTML 본문/속성/JS/URL)에
        맞춰 이스케이프 → 브라우저가 '코드' 아닌 '글자'로 표시 → 3유형 공통 뿌리를 끊는다.
      - ② **CSP**: 응답 헤더로 "허용된 출처의 스크립트만 실행" 지시 → 실행 자체를 차단(2차선).
      - ③ **HttpOnly 쿠키**: JS의 세션 쿠키 접근 차단 → 가장 흔한 피해인 세션 탈취 완화.
      - ④ **입력 검증 + WAF(보조)**: 알려진 패턴 거르기(단독 의존 금지).
