lab_id: standalone-attack-week05
title: "XSS(Reflected·Stored·DOM·WAF 우회) vs XSS 탐지·차단 분석"
version: standalone-attack
course: attack
week: 5
description: |
  XSS(Cross-Site Scripting, 크로스사이트 스크립팅) 공방 실습. 공격자(외부 공격자 VM 192.168.0.202)가 심은
  JavaScript를 다른 사용자 브라우저에서 실행시키는 공격을 dvwa·juice 두 웹앱에 직접 던져 본다.
  다루는 범위: ① Reflected XSS 기본형(dvwa 차단 모드 → 403), ② payload 변형(img onerror·svg
  onload 등 이벤트 핸들러 — el34에서는 공백을 %20으로 인코딩해 전송), ③ 단순 WAF 우회(대소문자·
  URL 인코딩)와 CRS의 정규화로 인한 한계, ④ ModSec 941 룰군 탐지 분석(941 누적 → 949110 차단),
  ⑤ 차단(dvwa 403) vs 탐지만(juice 200) 운영 모드 차이, ⑥ 근본 방어(출력 인코딩·CSP·HttpOnly).
  공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 수행한다 —
  `ssh att@192.168.0.202`(비번 1)로 접속해 공격하고, 방어(WAF) 로그 분석은 WAF 장비
  `ssh ccc@10.20.32.80`(비번 1)에서 시선을 바꿔 확인한다. 인가된 el34 실습 환경 안에서만 수행한다.
difficulty: medium
duration_minutes: 170
prerequisites:
  - "W01–W04 통과"
  - "공격 VM ssh att@192.168.0.202 + 방어 WAF 장비 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §2(3유형) §3(변형) §4(우회) 숙지"
objectives:
  - "Reflected XSS 기본형을 dvwa에 전송하고 ModSec 차단(403)을 확인한다"
  - "img onerror·svg onload 등 이벤트 핸들러 payload 변형을 %20 인코딩으로 전송한다"
  - "대소문자·URL 인코딩 단순 WAF 우회가 CRS 정규화에 무력함을 실측한다"
  - "modsec_audit.log에서 941 룰군 탐지 → 949110 차단의 2단계를 읽어낸다"
  - "dvwa(403 차단) vs juice(200 탐지만) 운영 모드 차이를 설명한다"
  - "XSS 근본 방어(출력 인코딩·CSP·HttpOnly)를 우선순위와 함께 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 공격 대상 두 웹앱 도달성 확인
      ## 💡 개념 (왜 이걸 하나)
      공격 전 첫 단계는 대상 도달성 확인이다. 이번 주는 같은 XSS를 **두 운영 모드**에 던져
      비교한다 — `dvwa`(ModSec 차단 모드)와 `juice`(DetectionOnly, 탐지만). 둘 다 살아 있어야
      이후 "차단 vs 탐지만" 비교(미션 6)가 의미를 갖는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) dvwa(차단 모드) 도달성 — 응답코드만
      whatweb -a1 http://dvwa.el34.lab/
      # 2) juice(DetectionOnly, 탐지만) 도달성 — 응답코드만
      whatweb -a1 http://juice.el34.lab/
      ```
      > 💡 브라우저 주소창에 `http://dvwa.el34.lab/`·`http://juice.el34.lab/` 를 각각 열면 두 앱 화면이 뜬다 —
      > 이 단계는 도달성만 보면 되므로 응답 **코드만** 필요해 `-o /dev/null -w`(본문 버리고 코드만)로 확인한다.
      - `-o /dev/null`(본문 버림), `-w '%{http_code}'`(응답 코드만), 자연 URL `http://dvwa.el34.lab/`(호스트명이 web Apache 의 vhost 라우팅 지정).
      ## ✅ 합격 기준
      `dvwa` 출력 시 통과. **근거:** 대상이 도달(응답 코드 출력)하면 통과 — 200/302 등이면 정상,
      무응답·503 이면 라우팅·backend 점검.
    hint: '대상 도달성'
    category: survey
    points: 10
    answer: |
      # 1) dvwa(차단 모드) 도달성 — 응답코드만
      ssh att@192.168.0.202 "whatweb -a1 http://dvwa.el34.lab/"
      # 2) juice(DetectionOnly, 탐지만) 도달성 — 응답코드만
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/"
    answer_detail: "XSS 공방 대상 두 곳의 도달성을 확인한다 — dvwa(SecRuleEngine On, 차단 모드)와 juice(DetectionOnly, 탐지만). 두 vhost가 모두 응답해야 이후 같은 payload로 '차단(403) vs 탐지만(200)'을 비교할 수 있다. 채점은 출력에 'dvwa' 문자열(도달 신호)이 보이는지로 판정한다."
    expected_output: |
      dvwa=302
      juice=200
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["대상 도달"]
        acceptable_methods: ["**[OSS] whatweb 도달성 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Reflected XSS — dvwa 차단(403) 확인
      ## 💡 개념 (왜 이걸 하나)
      Reflected XSS는 요청 파라미터(`?q=`)가 **즉시 그 응답 페이지에 반사**되어 실행되는 가장
      기본형이다. 가장 흔한 payload `<script>alert(1)</script>`를 차단 모드 WAF에 던져, ModSec
      941 룰군이 어떻게 반응하는지 본다. 정상 동작이라면 값이 페이지에 반사되겠지만, dvwa는
      차단 모드라 941이 잡아 403을 돌려준다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 진짜 XSS 스캐너 dalfox로 dvwa 공격 — 수백 개 XSS payload(<script>·이벤트핸들러 등) 자동 발사
      dalfox url --url 'http://dvwa.el34.lab/?q=FUZZ' 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'WAF|reflected|XSS found'
      ```
      dalfox 가 `<script>alert(1)</script>` 을 포함한 XSS payload 를 자동으로 던지자 dvwa 는 전부 403 으로 막고,
      dalfox 는 `WAF ... (HTTP 403) detected` 로 방화벽을 지문한다 — 941 탐지 → 949110 누적 차단이라 `XSS found 0`(막혀서 성립 못 함).
      > 💡 **화면으로 보기(운영 모드 차이):** 학생 PC 브라우저에서
      > `http://dvwa.el34.lab/?q=<script>alert(1)</script>` 를 열면 dvwa(차단형)는 **403 Forbidden 페이지**가
      > 뜬다(WAF 가 payload 를 막음). 같은 요청을 `http://juice.el34.lab/...` (탐지형)로 열면 **200 으로
      > 통과**한다(WAF 는 로그만 남기고 차단 안 함 — 뒤 스텝에서 modsec_audit 로 탐지 확인). 자동 XSS
      > 탐지는 `dalfox url 'http://juice.el34.lab/rest/products/search?q=test' -S` 로 돌려볼 수 있다.

      - `?q=<script>alert(1)</script>`(검색 파라미터에 스크립트 태그). 공백 없는 payload라 추가 인코딩 없이 전송(공백 있으면 미션 3처럼 %20 필요).

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** `<script>` XSS가 dvwa 에서 xss=403(WAF 차단)으로 막히면 통과 —
      941 탐지 → anomaly 누적 → 949110 차단의 2단계다(200 이면 차단 모드인지 확인).
    hint: '<script>alert(1)</script> → 403'
    category: manipulation
    points: 12
    answer: |
      # 진짜 XSS 스캐너 dalfox로 dvwa 공격 — WAF가 XSS payload를 403 차단(dalfox가 WAF 지문)
      ssh att@192.168.0.202 "dalfox url --url 'http://dvwa.el34.lab/?q=FUZZ' 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'WAF|reflected|XSS found'"
    answer_detail: "Reflected XSS는 요청 파라미터가 즉시 응답에 반사되어 실행되는 유형이다(저장되지 않으므로 공격자는 악성 링크 클릭을 유도해야 한다). 진짜 XSS 전용 스캐너 dalfox(dalfox url --url)는 <script>alert(1)</script>를 포함한 수백 개 XSS payload를 자동으로 던진다. 차단 모드 vhost(dvwa)에서는 CRS 941 룰군(941100 등)이 탐지·누적하고 949110이 403 차단하므로, dalfox는 'WAF ... (HTTP 403) detected'로 방화벽을 지문하고 'XSS found 0 XSS'(막혀서 성립 못 함)로 보고한다. 즉 '941이 직접 막은' 게 아니라 '941 탐지 → 누적 → 949110 차단'의 2단계다. 채점은 출력의 WAF 403 지문(HTTP 403)으로 판정한다."
    expected_output: |
      WAF Unknown (HTTP 403) detected (confidence: 40%, evidence: Provocation probe returned HTTP 403)
      found reflected 0 params
      XSS found 0 XSS
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "dalfox XSS 스캔 + WAF 차단"
        success_criteria: ["dalfox XSS payload 발사", "WAF 403 지문"]
        acceptable_methods: ["**[OSS] dalfox XSS 스캔 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 XSS payload 변형 — 이벤트 핸들러(img onerror·svg onload)
      ## 💡 개념 (왜 이걸 하나)
      방어자가 `<script>`만 막으면 공격자는 다른 방식으로 스크립트를 실행시킨다. `<img src=x
      onerror=...>`는 존재하지 않는 이미지 로딩이 실패할 때 `onerror` 이벤트로, `<svg onload=...>`는
      SVG가 로드될 때 `onload` 이벤트로 코드를 실행한다. 즉 **스크립트 태그가 없어도 이벤트
      핸들러만으로** XSS가 성립한다. 이 변형들이 CRS 941에 잡히는지 확인한다.
      ## ⚠️ el34 사실 — dalfox가 인코딩을 알아서 처리
      수작업 raw 요청에서는 payload 공백이 셸·URL 파서에 깨져 `%20`으로 인코딩해야 했지만, 진짜 XSS
      스캐너 dalfox 는 payload 인코딩·전송을 자동으로 처리한다. 그래서 `<img src=x onerror=alert(1)>`
      같은 이벤트 핸들러 변형을 그대로 넣으면 dalfox 가 알아서 인코딩해 발사하고, WAF 는 디코드 후 검사한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 이벤트 핸들러 XSS 변형(img onerror·svg onload)만 dalfox custom-payload로 발사 — <script> 없이도 성립
      printf '<img src=x onerror=alert(1)>\n<svg onload=alert(1)>\n' > /tmp/eh.txt
      dalfox url --url 'http://dvwa.el34.lab/?q=FUZZ' --custom-payload /tmp/eh.txt --only-custom-payload 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'WAF|reflected|XSS found'
      rm -f /tmp/eh.txt
      ```
      dalfox 가 이벤트 핸들러 변형(img onerror·svg onload)만 골라 던져도 dvwa 는 `WAF ... (HTTP 403) detected`
      로 전부 막는다 — 스크립트 태그가 없어도 이벤트 핸들러(onerror/onload)만으로 성립하는 XSS 를 CRS 941
      (특히 941160 NoScript)이 잡기 때문이다(`XSS found 0` = 막혀서 성립 못 함).
      > 💡 **화면으로 확인:** 브라우저에서 변형 URL `http://dvwa.el34.lab/?q=<img src=x onerror=alert(1)>` 를
      > 열면 dvwa(차단형)는 **403 페이지**를 돌려준다 — 이벤트 핸들러 변형도 실행되지 못한다.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 이벤트 핸들러 XSS 변형(img/svg)이 탐지·차단(403)되면 통과 —
      941160(NoScript) 등이 onerror=/onload= 패턴을 잡는다.
    hint: '<img onerror>, <svg onload> 변형'
    category: manipulation
    points: 12
    answer: |
      # 이벤트 핸들러 XSS 변형(img onerror·svg onload)만 dalfox custom-payload로 발사 — dvwa WAF가 403 차단
      ssh att@192.168.0.202 "printf '<img src=x onerror=alert(1)>\n<svg onload=alert(1)>\n' > /tmp/eh.txt; dalfox url --url 'http://dvwa.el34.lab/?q=FUZZ' --custom-payload /tmp/eh.txt --only-custom-payload 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'WAF|reflected|XSS found'; rm -f /tmp/eh.txt"
    answer_detail: "XSS는 <script> 태그 외에도 이벤트 핸들러(img의 onerror, svg의 onload, body의 onload 등)나 스킴(javascript:)만으로 실행된다 — 그래서 '스크립트 태그만 거르기' 식 방어는 우회된다. dalfox의 --custom-payload/--only-custom-payload로 이벤트 핸들러 변형(<img src=x onerror=alert(1)>·<svg onload=alert(1)>)만 골라 발사하면(dalfox가 인코딩·전송 자동 처리), dvwa의 CRS 941 룰군(941160 NoScript 등)이 onerror=/onload= 패턴을 탐지·차단해 dalfox가 'WAF ... (HTTP 403) detected' + 'XSS found 0'로 보고한다(막혀서 성립 못 함). 채점은 출력의 WAF 403 지문으로 판정한다."
    expected_output: |
      WAF Unknown (HTTP 403) detected (confidence: 40%, evidence: Provocation probe returned HTTP 403)
      found reflected 0 params
      XSS found 0 XSS
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "이벤트 핸들러 XSS 변형 + WAF 차단"
        success_criteria: ["dalfox 이벤트핸들러 payload", "WAF 403 지문"]
        acceptable_methods: ["**[OSS] dalfox 이벤트핸들러 payload (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 WAF 우회 시도 — 그리고 그 한계 확인
      ## 💡 개념 (왜 이걸 하나)
      공격자는 WAF 패턴 매칭을 피하려 payload를 변형한다 — 대소문자 섞기(`<ScRiPt>`), URL
      인코딩(`%3Cscript%3E`, 여기서 `%3C`=`<`, `%3E`=`>`) 등. 이 단순 우회가 실제로 통하는지
      직접 실측한다. 핵심 학습은 "왜 무력한가" 다 — ModSec CRS는 비교 **전에 정규화**(URL 디코드 +
      대소문자 통일 + 엔티티 해제)로 원형을 복원한 뒤 941 룰군과 매치하기 때문에, 단순 우회는
      그대로 잡힌다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # dalfox가 대소문자(<ScRiPt>)·URL 인코딩(%3Cscript%3E) 등 수백 개 우회 변형을 자동 발사 + WAF 지문 탐지
      dalfox url --url 'http://dvwa.el34.lab/?q=FUZZ' 2>&1 | sed -r 's/\x1b\[[0-9;]*m//g' | grep -iE 'WAF|reflected|XSS found'
      ```
      dalfox 는 대소문자(`<ScRiPt>`)·URL 인코딩(`%3Cscript%3E`) 등 수백 개 payload·인코딩 조합을 자동으로
      던진다 — 출력의 `WAF ... (HTTP 403) detected` 가 그 결과다(WAF 지문까지 탐지). `found reflected 0
      params` 는 이 엔드포인트가 반사하지 않음을 뜻한다(차단형이라 애초에 통과 못 함). CRS 는 비교 전에
      정규화(URL 디코드 + 대소문자 통일)로 원형을 복원하므로 단순 우회 변형이 전부 무력화된다(`XSS found 0`).
      > 💡 **화면으로 확인:** 브라우저에서 `http://dvwa.el34.lab/?q=<ScRiPt>alert(1)</ScRiPt>` 를 열어도 403 이다.

      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** dalfox 의 대소문자·인코딩 우회 변형이 CRS 정규화에 전부 막혀
      `WAF ... (HTTP 403) detected` 가 뜨면 통과 — 단 고급 우회나 서버를 안 거치는 DOM-based XSS 는
      WAF 로 잡기 어렵다(WAF 는 보조 방어선).
    hint: '<ScRiPt> 대소문자, URL 인코딩 우회'
    category: manipulation
