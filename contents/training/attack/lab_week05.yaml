lab_id: standalone-attack-week05
title: "XSS(Reflected·Stored·DOM·WAF 우회) vs XSS 탐지·차단 분석"
version: standalone-attack
course: attack
week: 5
description: |
  XSS(Cross-Site Scripting, 크로스사이트 스크립팅) 공방 실습. 공격자(el34-attacker)가 심은
  JavaScript를 다른 사용자 브라우저에서 실행시키는 공격을 dvwa·juice 두 웹앱에 직접 던져 본다.
  다루는 범위: ① Reflected XSS 기본형(dvwa 차단 모드 → 403), ② payload 변형(img onerror·svg
  onload 등 이벤트 핸들러 — el34에서는 공백을 %20으로 인코딩해 전송), ③ 단순 WAF 우회(대소문자·
  URL 인코딩)와 CRS의 정규화로 인한 한계, ④ ModSec 941 룰군 탐지 분석(941 누적 → 949110 차단),
  ⑤ 차단(dvwa 403) vs 탐지만(juice 200) 운영 모드 차이, ⑥ 근본 방어(출력 인코딩·CSP·HttpOnly).
  공격은 el34-attacker, 로그 분석은 el34-web. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서
  docker exec로. 인가된 el34 실습 환경 안에서만 수행한다.
difficulty: medium
duration_minutes: 170
prerequisites:
  - "W01–W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(3유형) §3(변형) §4(우회) 숙지"
objectives:
  - "Reflected XSS 기본형을 dvwa에 전송하고 ModSec 차단(403)을 확인한다"
  - "img onerror·svg onload 등 이벤트 핸들러 payload 변형을 %20 인코딩으로 전송한다"
  - "대소문자·URL 인코딩 단순 WAF 우회가 CRS 정규화에 무력함을 실측한다"
  - "modsec_audit.log에서 941 룰군 탐지 → 949110 차단의 2단계를 읽어낸다"
  - "dvwa(403 차단) vs juice(200 탐지만) 운영 모드 차이를 설명한다"
  - "XSS 근본 방어(출력 인코딩·CSP·HttpOnly)를 우선순위와 함께 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 공격 대상 두 웹앱 도달성 확인
      ## 💡 개념 (왜 이걸 하나)
      공격 전 첫 단계는 대상 도달성 확인이다. 이번 주는 같은 XSS를 **두 운영 모드**에 던져
      비교한다 — `dvwa`(ModSec 차단 모드)와 `juice`(DetectionOnly, 탐지만). 둘 다 살아 있어야
      이후 "차단 vs 탐지만" 비교(미션 6)가 의미를 갖는다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      - `-o /dev/null`: 응답 본문은 버린다. `-w '%{http_code}'`: 응답 코드만 출력.
      - `-H 'Host: dvwa.el34.lab'`: web Apache가 어느 vhost로 라우팅할지 지정하는 Host 헤더.
      ## ✅ 합격 기준
      대상이 도달(응답 코드 출력)한다. `200`/`302` 등이면 정상, 무응답·`503`이면 라우팅·backend 점검.
    hint: '대상 도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "XSS 공방 대상 두 곳의 도달성을 확인한다 — dvwa(SecRuleEngine On, 차단 모드)와 juice(DetectionOnly, 탐지만). 두 vhost가 모두 응답해야 이후 같은 payload로 '차단(403) vs 탐지만(200)'을 비교할 수 있다. 채점은 출력에 'dvwa' 문자열(도달 신호)이 보이는지로 판정한다."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["대상 도달"]
        acceptable_methods: ["**[OSS] curl 도달성 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Reflected XSS — dvwa 차단(403) 확인
      ## 💡 개념 (왜 이걸 하나)
      Reflected XSS는 요청 파라미터(`?q=`)가 **즉시 그 응답 페이지에 반사**되어 실행되는 가장
      기본형이다. 가장 흔한 payload `<script>alert(1)</script>`를 차단 모드 WAF에 던져, ModSec
      941 룰군이 어떻게 반응하는지 본다. 정상 동작이라면 값이 페이지에 반사되겠지만, dvwa는
      차단 모드라 941이 잡아 403을 돌려준다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      ```
      - `?q=<script>alert(1)</script>`: 검색 파라미터에 스크립트 태그를 실은 payload. 공백이
        없는 payload라 추가 인코딩 없이 그대로 전송된다(공백이 있으면 미션 3처럼 %20 필요).
      ## ✅ 합격 기준
      `<script>` XSS가 dvwa에서 `xss=403`(WAF 차단)으로 막힌다. `200`이 나오면 해당 vhost가 차단 모드인지 확인.
    hint: '<script>alert(1)</script> → 403'
    category: manipulation
    points: 12
    answer: |
      echo "=== Reflected XSS (dvwa 차단) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      echo "→ <script> XSS가 941(XSS)+949110에 차단(403)"
    answer_detail: "Reflected XSS는 요청 파라미터가 즉시 응답에 반사되어 실행되는 유형이다(저장되지 않으므로 공격자는 악성 링크 클릭을 유도해야 한다). 기본 payload <script>alert(1)</script>를 차단 모드 vhost(dvwa)에 보내면 CRS 941 룰군(941100 등)이 탐지해 anomaly score를 누적하고, 949110이 임계 초과로 403 차단한다. 즉 '941이 직접 막은' 것이 아니라 '941 탐지 → 누적 → 949110 차단'의 2단계다. 채점은 출력에 '403'이 보이는지로 판정한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "Reflected XSS + WAF 차단"
        success_criteria: ["<script> XSS", "403"]
        acceptable_methods: ["**[OSS] XSS → 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 XSS payload 변형 — 이벤트 핸들러(img onerror·svg onload)
      ## 💡 개념 (왜 이걸 하나)
      방어자가 `<script>`만 막으면 공격자는 다른 방식으로 스크립트를 실행시킨다. `<img src=x
      onerror=...>`는 존재하지 않는 이미지 로딩이 실패할 때 `onerror` 이벤트로, `<svg onload=...>`는
      SVG가 로드될 때 `onload` 이벤트로 코드를 실행한다. 즉 **스크립트 태그가 없어도 이벤트
      핸들러만으로** XSS가 성립한다. 이 변형들이 CRS 941에 잡히는지 확인한다.
      ## ⚠️ el34 사실 — payload 공백은 %20으로 인코딩
      `<img src=x onerror=...>`처럼 payload에 **공백**이 들어가면, 그 공백이 URL·셸에서 인자
      구분자로 잘못 해석되어 요청이 깨진다. 그래서 el34에서는 공백을 URL 인코딩 값 `%20`으로
      바꿔 `<img%20src=x%20onerror=alert(1)>` 형태로 보낸다. WAF는 디코드 후 검사하므로 이는
      우회가 아니라 단지 전송용 표기다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img%20src=x%20onerror=alert(1)>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'svg=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<svg%20onload=alert(1)>'"
      ```
      ## ✅ 합격 기준
      이벤트 핸들러 XSS 변형(img/svg)이 탐지·차단(`403`)된다 — 941160(NoScript) 등이 잡는다.
    hint: '<img onerror>, <svg onload> 변형'
    category: manipulation
    points: 12
    answer: |
      echo "=== XSS 변형 (공백 %20 인코딩) ==="
      echo "[img onerror]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img%20src=x%20onerror=alert(1)>'"
      echo "[svg onload]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'svg=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<svg%20onload=alert(1)>'"
      echo "→ 태그/이벤트 다양화(img/svg/onerror/onload)로 필터 우회 시도 — CRS 941은 이벤트 핸들러도 잡음"
    answer_detail: "XSS는 <script> 태그 외에도 이벤트 핸들러(img의 onerror, svg의 onload, body의 onload 등)나 스킴(javascript:)만으로 실행된다 — 그래서 '스크립트 태그만 거르기' 식 방어는 우회된다. el34에서는 payload 공백을 %20으로 인코딩해 전송해야 요청이 깨지지 않는다(%20은 우회가 아니라 전송용 표기이며 WAF는 디코드 후 검사). CRS 941 룰군은 onerror=/onload= 같은 이벤트 핸들러 패턴(941160 NoScript 등)도 탐지하므로 변형도 403으로 막힌다. 채점은 출력에 '403'이 보이는지로 판정한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "XSS payload 변형"
        success_criteria: ["img/svg 변형", "탐지/차단"]
        acceptable_methods: ["**[OSS] 이벤트 핸들러 XSS (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 WAF 우회 시도 — 그리고 그 한계 확인
      ## 💡 개념 (왜 이걸 하나)
      공격자는 WAF 패턴 매칭을 피하려 payload를 변형한다 — 대소문자 섞기(`<ScRiPt>`), URL
      인코딩(`%3Cscript%3E`, 여기서 `%3C`=`<`, `%3E`=`>`) 등. 이 단순 우회가 실제로 통하는지
      직접 실측한다. 핵심 학습은 "왜 무력한가" 다 — ModSec CRS는 비교 **전에 정규화**(URL 디코드 +
      대소문자 통일 + 엔티티 해제)로 원형을 복원한 뒤 941 룰군과 매치하기 때문에, 단순 우회는
      그대로 잡힌다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<ScRiPt>alert(1)</ScRiPt>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E'"
      ```
      ## ✅ 합격 기준
      우회 시도 결과를 확인한다 — CRS 정규화로 `case`·`enc` 모두 여전히 `403`(단순 우회 무력)임을 본다.
    hint: '<ScRiPt> 대소문자, URL 인코딩 우회'
    category: manipulation
    points: 12
    answer: |
      echo "=== WAF 우회 시도 ==="
      echo "[대소문자]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'case=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<ScRiPt>alert(1)</ScRiPt>'"
      echo "[URL 인코딩]"; docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3Cscript%3Ealert(1)%3C/script%3E'"
      echo "→ CRS는 정규화(대소문자 통일/URL 디코드) 후 검사 → 단순 우회는 여전히 403"
    answer_detail: "단순 WAF 우회(대소문자 <ScRiPt>, URL 인코딩 %3Cscript%3E)는 ModSec CRS의 정규화에 무력하다 — CRS는 패턴 비교 전에 URL 디코드·대소문자 통일·엔티티 해제로 원형(<script>...)을 복원한 뒤 941 룰군과 매치하므로, 두 시도 모두 여전히 403으로 차단된다. 다만 단순 우회가 막힌다고 WAF가 만능은 아니다 — 특정 출력 컨텍스트에 맞춘 고급 우회나 서버를 안 거치는 DOM-based XSS는 WAF로 잡기 어렵다(WAF는 보조 방어선). 채점은 출력에 '403'이 보이는지로 판정한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "WAF 우회 시도 + CRS 한계"
        success_criteria: ["우회 시도", "정규화로 차단"]
        acceptable_methods: ["**[OSS] 대소문자/인코딩 우회 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 분석 — ModSec 941 룰군(방어 가시성)
      ## 💡 개념 (왜 이걸 하나)
      공격자 관점에서 "내 XSS가 방어 스택에 어떻게 기록되는지" 를 직접 본다(el34는 출처 IP를
      전 계층에 보존하므로 공격하며 방어를 함께 학습한다). web 컨테이너의 ModSec audit log에서
      앞 미션들이 남긴 XSS 매치를 집계해, **941 룰군 탐지 → 949110 차단**의 2단계를 읽어낸다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      ```
      - `tail -150 .../modsec_audit.log`: ModSec audit log(JSON, 한 transaction=1줄)의 최근 150줄.
      - `grep -oE "94[0-9]1[0-9]{2}"`: 941xx·949xx 형식의 6자리 CRS 룰 ID만 추출. `sort | uniq -c`: 룰별 개수 집계.
      ## ✅ 합격 기준
      XSS가 ModSec 941 룰군에 탐지됨을 확인한다 — `941`xxx(941100/941160 등)가 보이고, 함께 `949110`(누적 차단)이 보이면 완벽.
    hint: 'modsec 941 (XSS)'
    category: analysis
    points: 12
    answer: |
      echo "=== XSS 탐지 (ModSec 941) ==="
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}" | sort | uniq -c'
      echo "→ 941xxx(XSS 룰군)이 <script>/onerror/onload 패턴을 잡고, 949110에서 차단"
    answer_detail: "XSS는 CRS의 941 룰군(REQUEST-941-APPLICATION-ATTACK-XSS)이 탐지한다 — 941100(libinjection으로 <script> 탐지)/941110(스크립트 태그)/941160(NoScript, onerror=·onload= 이벤트 핸들러) 등이 변형별로 매치된다. 각 941 매치가 anomaly score를 누적하고, 임계(기본 5) 초과 시 949110이 403으로 차단한다. 즉 audit log에서 941xxx(탐지)와 949110(누적 차단)을 함께 봐야 '탐지 → 누적 → 차단'의 전 과정이 보인다. 매치된 개별 룰 ID는 vhost별 *_error.log(예: dvwa_error.log)에도 id \"941160\" 형식으로 기록된다. 채점은 출력에 '941'이 보이는지로 판정한다."
    verify:
      type: output_contains
      expect: '941'
      field: stdout
      semantic:
        intent: "XSS ModSec 탐지"
        success_criteria: ["941 XSS 룰"]
        acceptable_methods: ["**[OSS] modsec 941 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 차단 vs 탐지만 — dvwa(403) vs juice(200)
      ## 💡 개념 (왜 이걸 하나)
      **똑같은** payload를 두 vhost에 보내, WAF 운영 모드 차이를 한 화면에서 비교한다.
      dvwa는 `SecRuleEngine On`(차단 모드)이라 941 탐지 후 949110이 403으로 막고, juice는
      `DetectionOnly`(탐지만)라 941이 탐지해 로그는 남기되 차단하지 않고 200으로 통과시킨다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      ```
