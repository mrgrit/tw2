      ## 2. Broken Access(A01): /rest/admin/application-configuration 무인증 200
      ## 3. 일관성: /api/Users 401(보호) vs admin-config 200(노출). IDOR=순차 자원 ID
      ## 4. 탐지: access.log /ftp,/admin 패턴. 방어: 서버측 인가 검사+기본 deny
      ## 결론: 인증보다 인가가 약하다(A01 1위). UI 숨김은 방어 아님 — 서버 인가가 근본
    verify:
      type: output_contains
      expect: 'IDOR'
      field: stdout
      semantic:
        intent: "접근 제어 종합 보고"
        success_criteria: ["강제브라우징/A01/IDOR/방어"]
        acceptable_methods: ["**[관리적] 접근제어 보고서 (권장)**"]
    target_vm: web
