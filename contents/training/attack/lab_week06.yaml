lab_id: standalone-attack-week06
title: "권한 경계 넘기 — 무차별대입·IDOR·강제 브라우징 (A01·A07)"
version: standalone-attack
course: attack
week: 6
description: |
  접근제어(인가, authorization) 우회를 공격자(PTES 익스플로잇 단계) 관점에서 실습한다. 화려한 익스플로잇
  코드 없이도 권한 경계는 넘을 수 있다 — UI에 링크 없는 경로를 직접 요청하는 강제 브라우징(forced
  browsing), 관리 전용 기능이 토큰 없이 열린 Broken Access Control(OWASP A01), 자원 ID만 바꿔 남의
  자원에 닿는 IDOR(Insecure Direct Object Reference)가 그 방법이다. 인증(누구냐)보다 인가(무엇을 할 수
  있냐)가 허술하기에 A01이 OWASP Top 10 1위다. el34 juiceshop을 대상으로, 결함을 입증하고(상태 코드
  증거), access.log에 남는 탐지 흔적을 확인하며, 근본 방어(서버측 인가 검사 + 기본 deny)까지 정리한다.
  공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`
  (비번 1)로 접속해 수행하고, 방어 로그 확인은 WAF(웹) 장비 `ssh ccc@10.20.32.80`(비번 1)에서
  시선을 바꿔 확인한다. 인가된 실습 환경에서만 한다.
difficulty: medium
duration_minutes: 170
prerequisites:
  - "W01–W05 통과 (정찰·디렉토리 brute·인증우회·SQLi·XSS)"
  - "공격 VM ssh att@192.168.0.202 + 방어 웹 장비 ssh ccc@10.20.32.80 (비번 1)"
  - "lecture §0(인증 vs 인가) §2(강제브라우징) §3(A01 무인증 관리) §4(비일관성+IDOR) §5(탐지·방어) 숙지"
objectives:
  - "인증(authentication)과 인가(authorization)의 차이를 설명하고 A01이 1위인 이유를 근거로 댄다"
  - "강제 브라우징으로 UI에 링크 없는 경로(/ftp)가 직접 요청만으로 열림을 curl로 입증한다"
  - "무인증 관리 엔드포인트(/rest/admin/application-configuration)로 A01 결함을 입증한다"
  - "보호(/api/Users 401) vs 노출(admin-config 200)을 대조해 인가의 비일관성을 공격 표면으로 식별한다"
  - "IDOR의 원리(소유권 검사 누락+직접 객체 참조)를 이해하고 공개 자원과 보호 자원의 위험도 차이를 판별한다"
  - "access.log의 접근제어 공격 흔적을 찾고 근본 방어(서버측 인가+기본 deny)가 표면 대책보다 우월함을 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      본 주차 접근제어 공격의 대상인 juiceshop에 도달 가능한지 0단계로 확인한다.

      ## 📖 개념 한 줄
      모든 공격의 출발점은 "대상에 닿는가"다. fw(L3/L4) → ips → web Apache → juiceshop 경로가 살아
      있어야 이후 미션이 의미를 가진다(lecture §1.2 공방 경로).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juiceshop 도달성 — fw→ips→web→juice 경로(응답코드만)
      curl -s -o /dev/null -w 'juice=%{http_code}\n' http://juice.el34.lab/
      ```
      - `curl -s -o /dev/null -w '%{http_code}'`(상태 코드만), 자연 URL `http://juice.el34.lab/`(호스트명이 vhost 라우팅 기준, `/etc/hosts`→fw ext 게이트웨이 192.168.0.161).

      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** juice=200(또는 정상 리다이렉트 코드)이 출력돼 juiceshop 에 도달하면
      통과 — 연결 거부/무응답이면 경로 문제이므로 이후 미션 전에 먼저 해결한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) juiceshop 도달성 — fw→ips→web→juice 경로(응답코드만)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'juice=%{http_code}\n' http://juice.el34.lab/"
    answer_detail: "본 주차 접근제어 공격 대상은 juiceshop(A01·IDOR에 취약). 이 점검으로 fw→ips→web→juiceshop 경로의 도달성을 확인한다. 응답 코드가 돌아오면(예: 200) 도달 성공으로 판정한다."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      UI 어디에도 링크가 없는 경로 `/ftp`를 직접 요청해, 강제 브라우징(forced browsing)으로 숨은
      디렉토리·파일에 접근됨을 입증한다.

      ## 📖 개념 한 줄
      강제 브라우징은 "메뉴에 안 보이니 안전하다"는 착각(security through obscurity)을 깨는 공격이다 —
      링크를 지워도 URL을 직접 요청하면 서버가 그대로 응답한다(lecture §2). 링크 숨김은 방어가 아니다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 강제 브라우징 — UI에 링크 없는 /ftp 디렉토리 직접 요청(응답코드)
      curl -s -o /dev/null -w 'ftp=%{http_code} ' http://juice.el34.lab/ftp
      # 2) 그 디렉토리 안 파일(/ftp/legal.md)까지 직접 접근
      curl -s -o /dev/null -w 'legal=%{http_code}\n' http://juice.el34.lab/ftp/legal.md
      # 3) 해석 — 링크 없어도 /ftp 직접 접근 200(디렉토리/파일 노출) = 접근 제어 누락
      echo "→ UI에 링크 없어도 /ftp 직접 접근 = 200(디렉토리/파일 노출). 접근 제어 누락"
      ```
      - 1) `/ftp` 디렉토리 리스팅 여부, 2) 그 안 파일(legal.md) 직접 획득 여부(실전엔 백업·설정·소스가 노출돼 더 큰 침해로).

      ## ✅ 합격 기준
      `ftp=200` 출력 시 통과. **근거:** 링크 없는 /ftp 디렉토리·파일에 직접 접근(ftp=200, 가능하면
      legal=200)되면 통과 — 404 면 경로/Host 헤더를 점검한다.
    hint: '/ftp 강제 브라우징'
    category: manipulation
    points: 14
    answer: |
      # 1) 강제 브라우징 — UI에 링크 없는 /ftp 디렉토리 직접 요청(응답코드)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'ftp=%{http_code} ' http://juice.el34.lab/ftp"
      # 2) 그 디렉토리 안 파일(/ftp/legal.md)까지 직접 접근
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'legal=%{http_code}\n' http://juice.el34.lab/ftp/legal.md"
      # 3) 해석 — 링크 없어도 /ftp 직접 접근 200(디렉토리/파일 노출) = 접근 제어 누락
      echo "→ UI에 링크 없어도 /ftp 직접 접근 = 200(디렉토리/파일 노출). 접근 제어 누락"
    answer_detail: "강제 브라우징 = UI에 링크 없는 경로를 직접 요청하는 기법. juiceshop의 /ftp가 200으로 디렉토리 리스팅 + 그 안 파일(legal.md)까지 노출된다. ftp=200이면 합격. 핵심 교훈은 UI 숨김(security through obscurity)은 방어가 아니라는 점 — 노출 경로는 W02 디렉토리 brute로도 드러난다."
    expected_output: |
      ftp=200 legal=200
      → UI에 링크 없어도 /ftp 직접 접근 = 200(디렉토리/파일 노출). 접근 제어 누락
    verify:
      type: output_contains
      expect: 'ftp=200'
      field: stdout
      semantic:
        intent: "강제 브라우징으로 숨은 경로 접근"
        success_criteria: ["/ftp 200 접근", "접근제어 누락"]
        acceptable_methods: ["**[OSS] curl /ftp (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      관리(admin) 전용이어야 할 엔드포인트 `/rest/admin/application-configuration`을 **토큰 없이**
      호출해, OWASP A01(Broken Access Control) 결함을 입증한다.

      ## 📖 개념 한 줄
      Broken Access Control(A01, 접근제어 결함)은 관리자/로그인 전용 기능이 인가 검사 없이 열린 상태다
      (lecture §3). 강제 브라우징이 "숨은 경로"라면, 여기서는 한 발 더 나아가 강력한 관리 기능 자체가
      무인증으로 노출된 경우다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 관리 전용 엔드포인트를 토큰 없이 호출 — 200=무인증 노출, 401/403=정상 보호
      curl -s -o /dev/null -w 'admincfg=%{http_code}\n' http://juice.el34.lab/rest/admin/application-configuration
      # 2) 해석 — 200 = 관리 설정이 인증 없이 노출(A01), 인가 검사 누락
      echo "→ 200 = 관리 설정이 인증 없이 노출(A01). 토큰 없이 접근 가능 = 인가 검사 누락"
      ```
      - `200`=무인증 노출(취약, 인가 누락), `401`=인증 필요/`403`=권한 없음(둘 다 정상 보호). el34 juice 는 이 엔드포인트가 200 으로 열려 있다.

      ## ✅ 합격 기준
      `admincfg=200` 출력 시 통과. **근거:** 관리 엔드포인트가 토큰 없이 200(무인증 접근)이면 A01 결함
      입증 — 공격자가 로그인을 전혀 거치지 않고 관리 기능에 닿은 것이다.
    hint: '/rest/admin/application-configuration 무인증'
    category: manipulation
    points: 14
    answer: |
      # 1) 관리 전용 엔드포인트를 토큰 없이 호출 — 200=무인증 노출, 401/403=정상 보호
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' http://juice.el34.lab/rest/admin/application-configuration"
      # 2) 해석 — 200 = 관리 설정이 인증 없이 노출(A01), 인가 검사 누락
      echo "→ 200 = 관리 설정이 인증 없이 노출(A01). 토큰 없이 접근 가능 = 인가 검사 누락"
    answer_detail: "A01(Broken Access Control)의 전형 — 관리 전용이어야 할 /rest/admin/application-configuration이 토큰 없이 200을 반환한다. admincfg=200이면 합격. 공격자가 로그인(인증)을 전혀 거치지 않고 관리 기능에 닿았다는 뜻으로, 가장 바깥 방어선이 이 엔드포인트엔 적용되지 않은 것이다(401/403이면 정상 보호)."
    expected_output: |
      admincfg=200
      → 200 = 관리 설정이 인증 없이 노출(A01). 토큰 없이 접근 가능 = 인가 검사 누락
    verify:
      type: output_contains
      expect: 'admincfg=200'
      field: stdout
      semantic:
        intent: "Broken Access Control 식별"
        success_criteria: ["무인증 관리 엔드포인트 200", "A01"]
        acceptable_methods: ["**[OSS] curl 무인증 관리 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      같은 juiceshop 안에서 보호된 엔드포인트와 노출된 엔드포인트를 나란히 호출해, 인가가 들쭉날쭉하다는
      **비일관성** 자체가 공격 표면임을 입증한다.

      ## 📖 개념 한 줄
      A01의 본질적 위험은 "일관성 없음"이다(lecture §4.1) — 개발자가 일부 지점에만 인가 검사를 넣어,
      한 앱 안에서 어떤 엔드포인트는 막혀 있고 어떤 엔드포인트는 뚫려 있다. 공격자는 둘을 비교해 빈틈을
      정확히 짚는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 보호 엔드포인트 — /api/Users(인증 필요, 401 기대)
      curl -s -o /dev/null -w 'users=%{http_code} ' http://juice.el34.lab/api/Users
      # 2) 노출 엔드포인트 — admin-config(무인증 200)
      curl -s -o /dev/null -w 'admincfg=%{http_code}\n' http://juice.el34.lab/rest/admin/application-configuration
      # 3) 해석 — users=401(보호) vs admin-config=200(노출), 같은 앱서도 인가 비일관 = 공격 기회
      echo "→ /api/Users=401(보호됨) vs admin-config=200(노출). 같은 앱서도 인가 일관성 없음 = 공격 기회"
      ```
      - `/api/Users`→401(보호됨), `/rest/admin/application-configuration`→200(뚫림). 두 결과가 한 화면에 떠야 비일관성이 한눈에 드러난다.

      ## ✅ 합격 기준
      `users=401` 출력 시 통과. **근거:** users=401(보호)과 admincfg=200(노출)의 불일치를 동시에 확인하면
      통과 — 전체 엔드포인트를 같은 인가 기준으로 일관 점검해야 한다는 운영 원칙의 근거다.
    hint: '/api/Users(401) vs admin-config(200)'
    category: analysis
    points: 12
    answer: |
      # 1) 보호 엔드포인트 — /api/Users(인증 필요, 401 기대)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'users=%{http_code} ' http://juice.el34.lab/api/Users"
      # 2) 노출 엔드포인트 — admin-config(무인증 200)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' http://juice.el34.lab/rest/admin/application-configuration"
      # 3) 해석 — users=401(보호) vs admin-config=200(노출), 같은 앱서도 인가 비일관 = 공격 기회
      echo "→ /api/Users=401(보호됨) vs admin-config=200(노출). 같은 앱서도 인가 일관성 없음 = 공격 기회"
    answer_detail: "접근제어의 비일관성이 곧 약점 — 같은 juiceshop 안에서 /api/Users는 401(보호)인데 /rest/admin/application-configuration은 200(노출)이다. users=401이면 합격. 전체 엔드포인트를 같은 인가 기준으로 일관 점검해야 한다는 운영 원칙의 근거가 된다."
    expected_output: |
      users=401 admincfg=200
      → /api/Users=401(보호됨) vs admin-config=200(노출). 같은 앱서도 인가 일관성 없음 = 공격 기회
    verify:
      type: output_contains
      expect: 'users=401'
      field: stdout
      semantic:
        intent: "접근 제어 일관성 비교"
        success_criteria: ["보호(401) vs 노출(200) 불일치"]
        acceptable_methods: ["**[OSS] 엔드포인트 비교 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      자원 ID를 1, 2, 3으로 바꿔가며 순차 호출해, IDOR(Insecure Direct Object Reference)의 핵심 동작인
      "ID 열거"를 안전하게 체험한다.

      ## 📖 개념 한 줄
      IDOR은 자원을 ID로 직접 참조하는데 서버가 소유권을 검사하지 않는 결함이다(lecture §4.2~4.4) —
      호텔로 치면 1205호 카드키로 1206호가 열리는 격. ID가 순차(예측 가능)일수록 1씩 올려 전수 조사가
      쉬워진다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 순차 자원 ID(1,2,3) 열거 — /api/Products/N 로 공개 자원 순차 접근(IDOR 방법론, 실제 200)
      curl -s -o /dev/null -w 'product1=%{http_code} ' http://juice.el34.lab/api/Products/1
