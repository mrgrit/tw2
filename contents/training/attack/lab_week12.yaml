      ## 🎯 목표 — 전수 제거 (self-clean)
      헌팅에서 찾은 모든 발판을 빠짐없이 제거한다(공유 인프라 보존).

      ## 📖 개념 한 줄
      전수 제거 = 발견한 모든 벡터를 빠짐없이 끊는 것(계정 userdel + cron rm + 키 sed). 하나라도 남으면
      그게 곧 재침투 경로가 된다 — 헌팅도 제거도 "전수"가 원칙이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 전수 제거 — 계정(userdel)·cron(rm)·SSH키(sed) 세 벡터를 한 번에 제거
      docker exec el34-web sh -c 'userdel -r atkw12bd 2>/dev/null; rm -f /etc/cron.d/atkw12_persist; sed -i "/ATKW12FAKE/d" /root/.ssh/authorized_keys 2>/dev/null; echo cleaned'
      # 2) 제거 확인 — 계정·cron 잔재가 없는지 재점검(하나라도 남으면 재침투)
      docker exec el34-web sh -c 'id atkw12bd 2>/dev/null && echo "계정 잔재!" || echo "user ok"; ls /etc/cron.d/atkw12_persist 2>/dev/null && echo "cron 잔재!" || echo "cron ok"'
      ```
      - `userdel -r`(계정+홈 제거) · `rm -f`(cron 정의 제거) · `sed -i "/ATKW12FAKE/d"`(키 라인 삭제).
      - 2) 의 `id ... || echo "user ok"` 는 계정이 없을 때만 ok — 잔재가 남으면 "계정 잔재!"로 경고.

      ## ✅ 합격 기준
      `cleaned` 출력 시 통과. **근거:** 계정·cron·키 세 벡터를 모두 제거하면 cleaned 가 출력되고, 이어진
      재점검에서 잔재 없음(user ok/cron ok)이 확인된다 — 하나라도 남으면 재침투.
