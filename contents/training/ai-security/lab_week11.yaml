lab_id: ai-security-week11
title: "W11 — 자율 미션: 다단계 계획·순차 실행·승인 게이트·Purple 자동화"
version: ai
course: ai-security
week: 11
description: |
  bastion에게 다단계 자율 미션을 맡긴다. Manager가 정찰→분석→대응을 계획(MISSION_PLANNED),
  단계별 실행 매핑(MISSION_RUN), 위험 단계 승인 게이트(GATED), Purple 자동화 종합(Assessment).
  자율성과 통제(검증·승인)의 균형이 핵심. (다단계 계획은 GPU Manager로 시연, 실행은 bastion skill 매핑.)
difficulty: medium
duration_minutes: 130
audience: AI 보안 활용 입문 (11주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W11 강의안 정독 — §0.5(자율 미션·Red/Blue/Purple·승인 게이트)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "Manager가 다단계 미션 계획(MISSION_PLANNED)"
  - "미션 단계 순차 실행 매핑(MISSION_RUN)"
  - "위험 단계 승인 게이트(GATED)"
  - "Purple 자동화 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 다단계 미션 계획 → MISSION_PLANNED
      > **🎯 목표:** Manager에게 "브루트포스 조사·대응" 목표를 주고 정찰→분석→대응 단계를 JSON으로 계획하게 한다.
      > **개념:** 한 지시가 다단계 계획으로 분해된다.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      prompt=('Output JSON only: {"mission":"brute_force_ir","plan":["<recon step>","<analysis step>","<response step>"]}. '
              'Plan a 3-phase autonomous mission (recon, analysis, response) for an SSH brute force incident.')
      b={"model":"gemma3:4b","prompt":prompt,"stream":False,"format":"json","options":{"num_predict":150,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=70)).get("response","")
      d=json.loads(r); plan=d.get("plan",[])
      print("mission:", d.get("mission"), "| phases:", len(plan))
      for p in plan[:3]: print("  -", str(p)[:60])
      print("MISSION_PLANNED" if len(plan)>=3 else "SHALLOW")
      PY
      ```
      ✅ 마지막 줄 `MISSION_PLANNED` (정찰·분석·대응 3단계 계획).
      🔎 Manager의 harness가 미션 전체를 하나의 절차로 구성.
    answer: |
      mission: brute_force_ir | phases: 3
        - Recon: query wazuh alerts and auth logs for the source IP
        - Analysis: correlate failed logins and confirm brute force
        - Response: block the IP (approval required)
      MISSION_PLANNED
    answer_detail: "한 지시를 정찰→분석→대응 3단계 미션으로 계획 → MISSION_PLANNED."
    verify:
      type: output_contains
      expect: MISSION_PLANNED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 미션 단계 실행 → MISSION_RUN
      > **🎯 목표:** 각 단계를 bastion skill/조치에 매핑해 순차 실행(결정론 시뮬).
      > **개념:** 정찰→분석→대응이 이어서 수행된다.
      ```bash
      python3 - <<'PY'
      # 미션 단계 → skill/조치 매핑 + 순차 실행(결정론)
      plan=["recon: query wazuh alerts","analysis: correlate failed logins","response: block ip"]
      MAP=[("recon","wazuh.alerts (조사)"),("analysis","상관분석 (검증)"),("response","nft block (위험·승인)")]
      log=[]
      for ph in plan:
          skill=next((s for k,s in MAP if k in ph.lower()), "manual")
          log.append((ph.split(":")[0], skill))
      for phase,skill in log: print(f"  [{phase:8}] -> {skill}")
      print("MISSION_RUN" if len(log)==3 else "PARTIAL")
      PY
      ```
      ✅ 마지막 줄 `MISSION_RUN` (3단계 순차 실행 매핑).
      🔎 각 단계 사이에 결과 검증(W04·W06)을 넣어 오판 전파를 막는다.
    answer: |
      [recon   ] -> wazuh.alerts (조사)
      [analysis] -> 상관분석 (검증)
      [response] -> nft block (위험·승인)
      MISSION_RUN
    answer_detail: "미션 단계를 skill로 매핑해 순차 실행 → MISSION_RUN. 단계 간 검증 포함."
    verify:
      type: output_contains
      expect: MISSION_RUN
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 승인 게이트 → GATED
      > **🎯 목표:** 대응(차단) 단계에서 승인 게이트가 걸려 사람 승인 전엔 실행 안 됨을 확인.
      > **개념:** 자율이라도 위험 단계는 통제 — 자율성과 통제의 균형.
      ```bash
      python3 - <<'PY'
      RISKY={"block","delete","disable","remove","drop"}
      def gate(action):
          return "APPROVAL_REQUIRED" if any(r in action.lower() for r in RISKY) else "AUTO"
      steps=["query wazuh alerts","correlate failed logins","block the source ip"]
      for s in steps: print(f"  {gate(s):18} <- {s}")
      # 위험 단계(차단)가 승인 대기면 게이트 작동
      print("GATED" if gate("block the source ip")=="APPROVAL_REQUIRED" else "NO_GATE")
      PY
      ```
      ✅ 마지막 줄 `GATED` (차단 단계가 승인 대기, 조사/분석은 자동).
      🔎 되돌리기 어려운 행동(차단·삭제)만 사람 승인 → 자율 미션의 안전선.
    answer: |
      AUTO               <- query wazuh alerts
      AUTO               <- correlate failed logins
      APPROVAL_REQUIRED  <- block the source ip
      GATED
    answer_detail: "위험 대응 단계에 승인 게이트 → GATED. 자율 미션의 통제(자율+승인 균형)."
    verify:
      type: output_contains
      expect: GATED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합(Purple 자동화) → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note on autonomous missions for W11. Findings: a Manager planned a 3-phase mission recon->analysis->response (MISSION_PLANNED), executed the phases mapped to skills (MISSION_RUN), and the block phase required approval while recon/analysis ran automatically (GATED). Explain Red/Blue/Purple missions and give 3 controls (verify each step, approval gate for risky actions, mission logging and stop conditions). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":300}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 자율 미션은 한 지시로 다단계 완주. 단계 검증+위험 단계 승인이 폭주를 막는다. Purple 자동화로 방어 빈틈을 지속 발견.
      다음 주(W12)는 상시 자율 운영 **Agent Daemon**.
    answer: |
      Assessment
      Autonomous missions complete multi-step work from one instruction; Red/Blue/Purple cover attack, defense, and validation.
      Controls: (1) verify each step, (2) approval gate for risky actions, (3) mission logging and stop conditions.
    answer_detail: "W11 자율 미션 종합(Assessment). 자율+검증+승인, Purple 자동화 가치."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
