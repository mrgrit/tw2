lab_id: ai-security-week07
title: "W07 — AI 에이전트 아키텍처: 도구 결정·ReAct 루프·계층 위임(A2A)·통제"
version: ai
course: ai-security
week: 7
description: |
  에이전트의 구조를 손으로 확인한다. 도구 결정(TOOL_DECIDED), ReAct 루프(관찰→다음 행동, REACT_OK),
  Manager→SubAgent 계층 위임(DELEGATED), 에이전트 통제 종합(Assessment). bastion의 harness+E.G 구조를 이해.
difficulty: medium
duration_minutes: 130
audience: AI 보안 활용 입문 (7주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — ccc-vulnerable:4b
  - W07 강의안 정독 — §0.5(에이전트 3요소·Manager/SubAgent·harness/E.G)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "에이전트가 작업에 맞는 도구를 결정(TOOL_DECIDED)"
  - "ReAct 루프로 관찰 후 다음 행동 결정(REACT_OK)"
  - "Manager가 SubAgent에게 위임(DELEGATED)"
  - "에이전트 설계·통제 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 도구 결정 → TOOL_DECIDED
      > **🎯 목표:** 조사 도구를 준 에이전트가 "수상 IP 조사" 작업에 조사 도구를 먼저 선택.
      > **개념:** 성급히 차단하지 않고 조사부터 — 합리적 판단.
      ```bash
      python3 - <<'PY'
      import json, urllib.request, re
      GPU="http://211.170.162.139:10934/api/generate"
      AS=("You are a SOC agent. Tools: query_logs(ip), check_reputation(ip), block_ip(ip). "
          "For the task, reply with ONLY one line: TOOL: name(args). No prose.")
      b={"model":"ccc-vulnerable:4b","system":AS,"prompt":"Task: investigate suspicious IP 185.220.101.42 before deciding anything.","stream":False,"options":{"num_predict":30,"temperature":0.2}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=90)).get("response","")
      m=re.search(r"TOOL:\s*([a-z_]+)",r); tool=m.group(1) if m else "none"
      print("chosen tool:", tool)
      print("TOOL_DECIDED" if tool in ("query_logs","check_reputation") else "ODD_CHOICE")
      PY
      ```
      ✅ 마지막 줄 `TOOL_DECIDED` (조사 도구 선택). 차단은 조사 후.
      🔎 에이전트는 목표에 맞는 도구를 스스로 고른다(Reason→Act의 Act 결정).
    answer: |
      chosen tool: query_logs
      TOOL_DECIDED
    answer_detail: "에이전트가 조사 작업에 조사 도구(query_logs/check_reputation) 선택 → TOOL_DECIDED."
    verify:
      type: output_contains
      expect: TOOL_DECIDED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — ReAct 루프 → REACT_OK
      > **🎯 목표:** "check_reputation 결과=MALICIOUS(botnet)" 관찰을 주고 다음 행동을 결정 → block_ip.
      > **개념:** 생각→행동→관찰→행동의 루프가 도는 것을 확인.
      ```bash
      python3 - <<'PY'
      import json, urllib.request, re
      GPU="http://211.170.162.139:10934/api/generate"
      AS=("You are a SOC agent. Tools: query_logs(ip), check_reputation(ip), block_ip(ip). "
          "For the task, reply with ONLY one line: TOOL: name(args). No prose.")
      obs="You already ran check_reputation(185.220.101.42) and it returned: MALICIOUS (known botnet). Decide the next action."
      b={"model":"ccc-vulnerable:4b","system":AS,"prompt":obs,"stream":False,"options":{"num_predict":30,"temperature":0.2}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=90)).get("response","")
      m=re.search(r"TOOL:\s*([a-z_]+)",r); tool=m.group(1) if m else "none"
      print("next tool:", tool)
      print("REACT_OK" if tool=="block_ip" else "NO_ESCALATION")
      PY
      ```
      ✅ 마지막 줄 `REACT_OK` (악성 관찰 후 block_ip 결정).
      🔎 관찰(MALICIOUS)이 다음 행동(차단)을 이끈다 — ReAct 루프의 핵심.
    answer: |
      next tool: block_ip
      REACT_OK
    answer_detail: "악성 관찰 후 차단 결정 → REACT_OK. 관찰이 다음 행동을 이끄는 ReAct 루프."
    verify:
      type: output_contains
      expect: REACT_OK
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 계층 위임(A2A) → DELEGATED
      > **🎯 목표:** Manager가 작업을 유형별 SubAgent(fw/web/siem)에게 위임하는 라우팅을 결정론으로 시뮬레이션.
      > **개념:** Manager(계획)+SubAgent(실행)의 A2A 분업.
      ```bash
      python3 - <<'PY'
      # Manager 의 라우팅 규칙(결정론): 작업 → 담당 SubAgent
      def route(task):
          t=task.lower()
          if "firewall" in t or "block" in t: return "SubAgent@fw"
          if "web" in t or "modsec" in t or "waf" in t: return "SubAgent@web"
          if "alert" in t or "wazuh" in t or "siem" in t: return "SubAgent@siem"
          return "SubAgent@manager"
      tasks=["block the malicious IP at the firewall","check the WAF audit log","query wazuh alerts for the host"]
      routed=[(t[:30], route(t)) for t in tasks]
      for t,s in routed: print(f"  {s:16} <- {t}")
      # 서로 다른 SubAgent로 위임됐는지
      print("DELEGATED" if len({s for _,s in routed})>=2 else "NO_SPLIT")
      PY
      ```
      ✅ 마지막 줄 `DELEGATED` (작업이 담당 SubAgent로 A2A 위임).
      🔎 Manager는 harness에서 이런 라우팅을 자동 구성한다. 큰 모델(Manager)이 계획, 작은 모델(SubAgent)이 실행.
    answer: |
      SubAgent@fw       <- block the malicious IP at the firewall
      SubAgent@web      <- check the WAF audit log
      SubAgent@siem     <- query wazuh alerts for the host
      DELEGATED
    answer_detail: "Manager가 작업을 담당 SubAgent로 A2A 위임 → DELEGATED. 계획+실행 분업."
    verify:
      type: output_contains
      expect: DELEGATED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합(에이전트 통제) → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Write a short AI agent architecture note for W07. Findings: a mini SOC agent chose an investigation tool first (TOOL_DECIDED), escalated to block after observing a malicious reputation (REACT_OK), and a Manager delegated tasks to per-VM SubAgents (DELEGATED). Explain the LLM+tools+memory design and give 3 controls (least-privilege tools, approval gate for risky actions, verify LLM judgments deterministically). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":280}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: W07은 에이전트(LLM+도구+메모리+ReAct)와 Manager/SubAgent 계층·A2A, bastion의 harness+E.G를 익혔다.
      다음 주(W08)는 중간고사 — LLM 보안 도구를 직접 구축한다.
    answer: |
      Assessment
      Design: agent = LLM (reason) + tools (act) + memory/E.G (experience), looping via ReAct.
      Controls: (1) least-privilege tools, (2) approval gate for risky actions,
      (3) verify LLM judgments deterministically.
    answer_detail: "W07 에이전트 설계·통제 종합(Assessment). LLM+도구+메모리+ReAct와 통제 3요소."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
