lab_id: ai-security-week03
title: "W03 — 프롬프트 엔지니어링 for 보안: Zero/Few-shot·Chain-of-Thought·보안 템플릿"
version: ai
course: ai-security
week: 3
description: |
  프롬프트 기법을 보안 업무에 적용한다. Zero-shot 기준선(ZEROSHOT_OK), Few-shot 분류(FEWSHOT_OK),
  Chain-of-Thought 추론(COT_OK), 역할+형식+작업 결합 템플릿(TEMPLATE_OK)을 실측한다.
  프롬프트가 자동화 품질을 좌우하나, 출력은 여전히 검증 대상.
difficulty: easy
duration_minutes: 120
audience: AI 보안 활용 입문 (3주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W03 강의안 정독 — §0.5(Zero/Few/CoT·프롬프트 4요소)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "Zero-shot 로그 분석 기준선(ZEROSHOT_OK)"
  - "Few-shot 예시로 로그 분류(FEWSHOT_OK)"
  - "Chain-of-Thought로 복잡 이벤트 판단(COT_OK)"
  - "역할+형식+작업 보안 템플릿(TEMPLATE_OK)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — Zero-shot 기준선 → ZEROSHOT_OK
      > **🎯 목표:** 예시 없이 바로 로그 분석을 요청해 기준선을 본다.
      > **개념:** 빠르지만 형식·기준이 흔들릴 수 있음 → few-shot 필요성의 근거.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      log="GET /admin.php?id=1' OR '1'='1 -- HTTP/1.1"
      b={"model":"gemma3:4b","prompt":f"Is this web request benign or malicious? One word.\n{log}","stream":False,"options":{"num_predict":10,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=60)).get("response","")
      print("zero-shot:", repr(r[:40]))
      print("ZEROSHOT_OK" if "malicious" in r.lower() else "unclear")
      PY
      ```
      ✅ 마지막 줄 `ZEROSHOT_OK` (SQLi를 malicious로 판단).
      🔎 zero-shot은 빠르지만 답 형식이 매번 다를 수 있다 → 형식·일관성이 필요하면 few-shot(STEP3).
    answer: |
      zero-shot: 'Malicious'
      ZEROSHOT_OK
    answer_detail: "예시 없이 SQLi를 malicious로 판단 → ZEROSHOT_OK. 빠르나 형식 흔들림."
    verify:
      type: output_contains
      expect: ZEROSHOT_OK
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — Few-shot 분류 → FEWSHOT_OK
      > **🎯 목표:** BENIGN/MALICIOUS 예시 3개를 보여 준 뒤 경로 순회 로그를 분류시킨다.
      > **개념:** 모델이 예시 패턴을 따라 일관되게 분류.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      fs=("Classify the LAST log as exactly one word: BENIGN or MALICIOUS. Output only that one word.\n"
          "GET /index.html -> BENIGN\n"
          "GET /admin.php?id=1' OR '1'='1 -> MALICIOUS\n"
          "POST /login 200 -> BENIGN\n"
          "GET /../../etc/passwd -> ")
      b={"model":"gemma3:4b","prompt":fs,"stream":False,"options":{"num_predict":8,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=60)).get("response","")
      print("few-shot:", repr(r[:30]))
      print("FEWSHOT_OK" if "malicious" in r.lower() else "unclear")
      PY
      ```
      ✅ 마지막 줄 `FEWSHOT_OK` (경로 순회를 MALICIOUS로, 한 단어로 일관 분류).
      🔎 예시가 형식(한 단어)과 기준(악성 판단)을 동시에 가르친다 → 일관성↑.
    answer: |
      few-shot: 'MALICIOUS'
      FEWSHOT_OK
    answer_detail: "few-shot 예시로 경로 순회를 한 단어 MALICIOUS로 일관 분류 → FEWSHOT_OK."
    verify:
      type: output_contains
      expect: FEWSHOT_OK
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — Chain-of-Thought → COT_OK
      > **🎯 목표:** 200회 로그인 이벤트를 "단계별 추론 후 VERDICT"로 판단시킨다.
      > **개념:** 과정을 밟아 복잡 판단의 정확도를 올린다.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      p=("A web log shows 200 requests to /login in 10 seconds from one IP, each with a different password. "
         "Reason step by step (brief), then on the final line write exactly 'VERDICT: <attack name>'.")
      b={"model":"gemma3:4b","prompt":p,"stream":False,"options":{"num_predict":260,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=90)).get("response","")
      print(r[-90:].replace(chr(10)," "))
      print("COT_OK" if "VERDICT:" in r else "NO_VERDICT")
      PY
      ```
      ✅ 마지막 줄 `COT_OK` (단계 추론 후 VERDICT 도출, 예: Brute-Force).
      🔎 CoT는 토큰·지연을 늘리므로(num_predict 넉넉히) 복잡 판단에만 쓴다. 단순 분류엔 과함.
    answer: |
      ...credential stuffing or brute-force attacks. VERDICT: Brute-Force Attack
      COT_OK
    answer_detail: "단계적 추론 후 VERDICT 도출 → COT_OK. 복잡 이벤트 판단 정확도↑."
    verify:
      type: output_contains
      expect: COT_OK
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 보안 프롬프트 템플릿(역할+형식+작업) → TEMPLATE_OK
      > **🎯 목표:** 역할(SOC)+형식(JSON)+작업(분석)을 결합한 템플릿으로 로그를 분석해 구조화 출력.
      > **개념:** 4요소 결합 → 재사용 가능한 안정적 자동화 골격.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      log='192.168.0.202 - "GET /?q=<script>alert(1)</script> HTTP/1.1" 200'
      prompt=("You are a SOC L2 analyst. Analyze the web log and return JSON with keys "
              "attack, severity(low/medium/high), action.\nLog: "+log)
      b={"model":"gemma3:4b","prompt":prompt,"stream":False,"format":"json","options":{"num_predict":100,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=60)).get("response","")
      try:
          j=json.loads(r); ok={"attack","severity","action"} <= {k.lower() for k in j}
          print("template output:", json.dumps(j)[:110])
          print("TEMPLATE_OK" if ok else "MISSING_KEYS")
      except Exception:
          print("parse_fail:", r[:80]); print("PARSE_FAIL")
      PY
      ```
      ✅ 마지막 줄 `TEMPLATE_OK` (역할+형식+작업 템플릿이 구조화 분석 산출).
      🔎 정리: W03은 Zero/Few/CoT와 4요소 템플릿을 익혔다. 이 템플릿이 다음 주차 업무(로그·룰·보고)의 골격이
      된다. 다음 주(W04)는 el34 실 로그로 **LLM 기반 로그 분석**을 본격화한다.
    answer: |
      template output: {"attack": "XSS", "severity": "medium", "action": "block and sanitize input"}
      TEMPLATE_OK
    answer_detail: "역할+형식+작업 결합 템플릿이 구조화 분석(attack/severity/action) 산출 → TEMPLATE_OK. 자동화 골격."
    verify:
      type: output_contains
      expect: TEMPLATE_OK
      field: stdout
