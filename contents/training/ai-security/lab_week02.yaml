lab_id: ai-security-week02
title: "W02 — LLM 기초+Ollama 심화: temperature 결정성·JSON 구조화·모델 비교·길이 제어"
version: ai
course: ai-security
week: 2
description: |
  LLM을 정밀하게 조율한다. temperature=0 결정성(DETERMINISTIC), format=json 구조화 출력(JSON_OK),
  모델 비교(COMPARED), num_predict 길이 제어(LENGTH_OK)를 실측한다. 재현성과 구조화가 자동화의 두 축.
difficulty: easy
duration_minutes: 120
audience: AI 보안 활용 입문 (2주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — ccc-vulnerable:4b, llama3.2:3b
  - W02 강의안 정독 — §0.5(결정성·구조화 출력·모델 선택)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "temperature=0 결정적 출력을 실측(DETERMINISTIC)"
  - "format=json 구조화 출력을 파싱(JSON_OK)"
  - "두 모델을 비교(COMPARED)"
  - "num_predict로 출력 길이를 제어(LENGTH_OK)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — temperature=0 결정성 → DETERMINISTIC
      > **🎯 목표:** 같은 프롬프트를 `temperature=0` 으로 두 번 보내 출력이 완전히 같음을 확인.
      > **개념:** 분석·트리아지는 재현성이 필요 → 낮은 temperature.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      def gen():
          b={"model":"ccc-vulnerable:4b","prompt":"List exactly the 3 letters A B C separated by spaces. Only the letters.","stream":False,"options":{"num_predict":20,"temperature":0.0}}
          req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
          return json.load(urllib.request.urlopen(req,timeout=60)).get("response","").strip()
      a,b=gen(),gen()
      print(f"run1={a!r}  run2={b!r}")
      print("DETERMINISTIC" if a==b else "VARIED")
      PY
      ```
      ✅ 마지막 줄 `DETERMINISTIC` (두 실행 출력이 동일).
      🔎 temperature를 높이면(예 1.5) 매번 달라진다 — 브레인스토밍엔 좋지만 분석엔 부적합.
    answer: |
      run1='A B C'  run2='A B C'
      DETERMINISTIC
    answer_detail: "temperature=0 → 같은 입력 같은 출력 → DETERMINISTIC. 분석 재현성의 근거."
    verify:
      type: output_contains
      expect: DETERMINISTIC
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — JSON 구조화 출력 → JSON_OK
      > **🎯 목표:** `format=json` 으로 severity·action 필드를 담은 JSON을 받아 파싱한다.
      > **개념:** 기계가 처리 가능한 출력 → SOAR·bastion 자동화의 문.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      b={"model":"ccc-vulnerable:4b","prompt":"Return a JSON object with keys severity (high) and action (block ip) for a brute force event.",
         "stream":False,"format":"json","options":{"num_predict":80,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=60)).get("response","")
      try:
          parsed=json.loads(r)
          keys={k.lower() for k in parsed}
          print("parsed:", json.dumps(parsed)[:100])
          print("JSON_OK" if "severity" in keys else "MISSING_KEY")
      except Exception as e:
          print("parse_fail:", r[:80]); print("PARSE_FAIL")
      PY
      ```
      ✅ 마지막 줄 `JSON_OK` (유효 JSON에 severity 필드).
      🔎 이 구조화 출력을 프로그램이 받아 자동으로 차단·티켓·경보를 실행한다(SOAR).
    answer: |
      parsed: {"severity": "high", "action": "block ip"}
      JSON_OK
    answer_detail: "format=json 으로 파싱 가능한 구조화 출력 → JSON_OK. 자동화의 전제."
    verify:
      type: output_contains
      expect: JSON_OK
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 모델 비교 → COMPARED
      > **🎯 목표:** 같은 보안 질문을 두 모델에 보내 답을 비교한다.
      > **개념:** 속도·정확도·크기의 균형으로 작업에 맞는 모델을 고른다.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      def gen(m):
          b={"model":m,"prompt":"Name the OWASP category for SQL injection in 3 words.","stream":False,"options":{"num_predict":25,"temperature":0.1}}
          req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
          return json.load(urllib.request.urlopen(req,timeout=60)).get("response","").strip()
      for m in ["ccc-vulnerable:4b","llama3.2:3b"]:
          print(f"  {m}: {gen(m)[:50]}")
      print("COMPARED")
      PY
      ```
      ✅ 마지막 줄 `COMPARED` (두 모델 답 비교).
      🔎 빠른 분류엔 작은 모델, 복잡 추론엔 큰 모델. bastion은 Manager(큰)+SubAgent(작은) 조합.
    answer: |
      ccc-vulnerable:4b: Injection - Database Attacks
      llama3.2:3b: SQL Injection Attack
      COMPARED
    answer_detail: "같은 질문에 두 모델의 답을 비교 → COMPARED. 작업별 모델 선택의 근거."
    verify:
      type: output_contains
      expect: COMPARED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 출력 길이 제어 → LENGTH_OK
      > **🎯 목표:** `num_predict` 를 작게/크게 바꿔 출력 길이가 제어됨을 확인.
      > **개념:** 대량 자동화에선 길이 제어가 곧 비용·지연 제어.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      def gen(n):
          b={"model":"ccc-vulnerable:4b","prompt":"Explain SIEM.","stream":False,"options":{"num_predict":n,"temperature":0.2}}
          req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
          return json.load(urllib.request.urlopen(req,timeout=60)).get("response","")
      short=gen(12); long=gen(120)
      print(f"num_predict=12 len={len(short)}  num_predict=120 len={len(long)}")
      print("LENGTH_OK" if len(long) > len(short) else "NO_CONTROL")
      PY
      ```
      ✅ 마지막 줄 `LENGTH_OK` (num_predict가 클수록 출력이 김).
      🔎 정리: W02는 결정성(temperature)+구조화(JSON)+모델선택+길이제어를 익혔다. 이 네 가지가 안정적 자동화의
      토대다. 다음 주(W03)는 프롬프트 자체를 설계하는 **프롬프트 엔지니어링 for 보안**.
    answer: |
      num_predict=12 len=63  num_predict=120 len=640
      LENGTH_OK
    answer_detail: "num_predict로 출력 길이 제어 → LENGTH_OK. 대량 자동화의 비용·지연 관리."
    verify:
      type: output_contains
      expect: LENGTH_OK
      field: stdout
