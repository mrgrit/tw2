lab_id: ai-security-week08
title: "W08 — 중간고사: LLM 보안 도구 구축 (트리아지 봇 종합 프로젝트)"
version: ai
course: ai-security
week: 8
description: |
  W01~W07 종합. 로그를 LLM으로 구조화 분석(TOOL_BUILT), 결정론으로 검증(VERIFIED), 배치를 처리해
  트리아지 리포트 산출(E2E_OK), 도구 평가(Assessment). 'LLM 분석 + 결정론 검증' 파이프라인을 구현한다.
difficulty: medium
duration_minutes: 150
audience: AI 보안 활용 입문 (8주차 중간고사)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — ccc-vulnerable:4b
  - W01~W07 이수
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "LLM 구조화 분석 함수 구현(TOOL_BUILT)"
  - "LLM 결과 결정론 검증(VERIFIED)"
  - "배치 end-to-end 트리아지(E2E_OK)"
  - "도구 자기 평가(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 구조화 분석 함수 → TOOL_BUILT
      > **🎯 목표:** 단일 로그를 LLM으로 분석해 `{attack,ip,severity}` JSON을 얻는다(봇의 핵심 부품).
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      def analyze(log):
          p=('You are a SOC triage bot. Analyze the log and output JSON only: '
             '{"attack":"<type or none>","ip":"<source ip>","severity":"<low/medium/high>"}\nLog: '+log)
          b={"model":"ccc-vulnerable:4b","prompt":p,"stream":False,"format":"json","options":{"num_predict":80,"temperature":0.1}}
          req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
          return json.loads(json.load(urllib.request.urlopen(req,timeout=60)).get("response","{}"))
      a=analyze('185.220.101.42 - "GET /?id=1 UNION SELECT pw FROM users--" 200')
      print("analysis:", json.dumps(a)[:110])
      print("TOOL_BUILT" if {"attack","ip","severity"} <= {k.lower() for k in a} else "MISSING_KEYS")
      PY
      ```
      ✅ 마지막 줄 `TOOL_BUILT` (attack/ip/severity 구조화 분석).
    answer: |
      analysis: {"attack": "SQL Injection", "ip": "185.220.101.42", "severity": "high"}
      TOOL_BUILT
    answer_detail: "LLM 구조화 분석 함수(attack/ip/severity) 완성 → TOOL_BUILT. 봇의 핵심 부품."
    verify:
      type: output_contains
      expect: TOOL_BUILT
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 결정론 검증 → VERIFIED
      > **🎯 목표:** LLM이 뽑은 IP가 실제 로그에 있는지 확인(환각 IP 배제).
      > **개념:** 검증 통과만 신뢰 — 이 과목의 핵심 원칙.
      ```bash
      python3 - <<'PY'
      # LLM 분석 결과(STEP2)와 원본 로그
      log='185.220.101.42 - "GET /?id=1 UNION SELECT pw FROM users--" 200'
      analysis={"attack":"SQL Injection","ip":"185.220.101.42","severity":"high"}
      # 결정론 검증: 뽑은 ip가 실제 로그에 있나 + 공격 패턴 실재?
      ip_ok = analysis["ip"] in log
      pattern_ok = ("union select" in log.lower()) if "sql" in analysis["attack"].lower() else True
      print(f"ip_in_log={ip_ok}  pattern_real={pattern_ok}")
      print("VERIFIED" if (ip_ok and pattern_ok) else "HALLUCINATION")
      PY
      ```
      ✅ 마지막 줄 `VERIFIED` (LLM이 뽑은 IP·패턴이 실제 로그에 존재).
      🔎 만약 LLM이 로그에 없는 IP를 지어냈다면 ip_in_log=False → 환각으로 폐기.
    answer: |
      ip_in_log=True  pattern_real=True
      VERIFIED
    answer_detail: "LLM이 뽑은 IP·패턴을 결정론으로 확인 → VERIFIED. 환각 배제."
    verify:
      type: output_contains
      expect: VERIFIED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — end-to-end 배치 처리 → E2E_OK
      > **🎯 목표:** 로그 배치를 분석+검증해 트리아지 리포트(JSON 리스트)를 산출한다.
      > **개념:** 파이프라인이 통째로 돈다 — 중간고사 핵심.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      def analyze(log):
          p=('You are a SOC triage bot. Analyze the log and output JSON only: '
             '{"attack":"<type or none>","ip":"<source ip>","severity":"<low/medium/high>"}\nLog: '+log)
          b={"model":"ccc-vulnerable:4b","prompt":p,"stream":False,"format":"json","options":{"num_predict":80,"temperature":0.1}}
          req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
          try: return json.loads(json.load(urllib.request.urlopen(req,timeout=60)).get("response","{}"))
          except: return {}
      batch=['185.220.101.42 - "GET /?id=1 UNION SELECT pw FROM users--" 200',
             '10.0.0.5 - "GET /home" 200']
      report=[]
      for log in batch:
          a=analyze(log)
          a["verified"] = bool(a.get("ip")) and a["ip"] in log   # 결정론 검증
          report.append(a)
      print(json.dumps(report, ensure_ascii=False)[:240])
      # 검증된 공격 이벤트가 최소 1건이면 파이프라인 성공
      ok=any(r.get("attack","").lower() not in ("none","") and r.get("verified") for r in report)
      print("E2E_OK" if ok else "PIPELINE_FAIL")
      PY
      ```
      ✅ 마지막 줄 `E2E_OK` (배치 분석+검증 리포트 산출).
      🔎 이 검증된 구조화 리포트가 SOAR·티켓팅의 입력이 된다.
    answer: |
      [{"attack":"SQL Injection","ip":"185.220.101.42","severity":"high","verified":true},{"attack":"none","ip":"10.0.0.5","severity":"low","verified":true}]
      E2E_OK
    answer_detail: "배치를 분석+검증해 트리아지 리포트 산출 → E2E_OK. LLM 분석+결정론 검증 파이프라인 완성."
    verify:
      type: output_contains
      expect: E2E_OK
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 도구 평가 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Write a short self-evaluation for a triage bot built in W08. It analyzes logs into JSON (attack/ip/severity), verifies the LLM-extracted IP against the raw log to reject hallucinations, and outputs a triage report for a batch. Give strengths, one limitation, and 2 improvements. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":260}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: W08 중간고사로 'LLM 분석 + 결정론 검증' 파이프라인을 코드로 구현했다. 이 원칙이 후반부 bastion의
      신뢰 기반이다. 다음 주(W09)부터 el34의 실물 자율 에이전트 **bastion** 을 직접 다룬다.
    answer: |
      Assessment
      Strengths: combines LLM flexibility with deterministic verification to reject hallucinations.
      Limitation: keyword-based verification can miss novel patterns.
      Improvements: (1) add pattern verification per attack type, (2) log unverified cases for review.
    answer_detail: "트리아지 봇 자기 평가(Assessment). LLM+검증 결합의 강점·한계·개선."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
