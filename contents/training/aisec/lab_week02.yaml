lab_id: aisec-week02
title: "W02 — LLM API와 Tool Calling: 메시지 역할·도구 호출·실행 되먹임"
version: ai
course: aisec
week: 2
description: |
  에이전트가 도구를 부르는 핵심 배선. 메시지 역할(ROLES_OK), Tool Calling 도구 호출 생성(TOOL_CALLED),
  도구 실행+결과 되먹임 루프(TOOL_RESULT), LLM≠실행 권한 종합(Assessment).
  LLM은 '무엇을 할지' 요청, 코드가 검증 후 실행 — 이 분리가 안전선.
difficulty: easy
duration_minutes: 120
audience: AI 보안 에이전트 입문 (2주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — ccc-vulnerable:4b
  - W02 강의안 정독 — §0.5(메시지 역할·Tool Calling 루프·LLM≠실행)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "메시지 역할(system/user) 분리(ROLES_OK)"
  - "Tool Calling 도구 호출 생성(TOOL_CALLED)"
  - "도구 실행+결과 되먹임(TOOL_RESULT)"
  - "LLM≠실행 권한 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 메시지 역할 → ROLES_OK
      > **🎯 목표:** system(역할)+user(요청)로 에이전트 응답을 유도하고 역할 분리를 확인.
      > **개념:** system이 에이전트의 정체성을 정의.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      # system=역할 규칙, user=요청
      sysp="You are a SOC triage assistant. Always answer in one short line, prefixed with SOC:"
      b={"model":"ccc-vulnerable:4b","system":sysp,"prompt":"What should I check first for a brute force alert?","stream":False,"options":{"num_predict":40,"temperature":0.2}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      r=json.load(urllib.request.urlopen(req,timeout=70)).get("response","").strip()
      print("assistant:", r[:80])
      # system 프롬프트의 역할(SOC: 접두)이 반영되면 역할 분리 확인
      print("ROLES_OK" if "SOC" in r else "NO_ROLE")
      PY
      ```
      ✅ 마지막 줄 `ROLES_OK` (system이 지정한 역할(SOC: 접두)이 응답에 반영).
      🔎 system=역할/규칙, user=요청 — 역할 분리가 에이전트 설계의 기본.
    answer: |
      assistant: SOC: Check the source IP's auth logs and failed-login count first.
      ROLES_OK
    answer_detail: "system이 지정한 SOC 역할이 응답에 반영 → ROLES_OK. system=정체성."
    verify:
      type: output_contains
      expect: ROLES_OK
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — Tool Calling → TOOL_CALLED
      > **🎯 목표:** LLM이 요청에 맞는 도구 호출(이름+인자) JSON을 생성한다.
      > **개념:** LLM은 '무엇을 할지' 결정 — 도구를 고른다.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      TOOLS="Tools: get_ip_reputation(ip), block_ip(ip), read_log(service)."
      sysp="You are a security agent with tools. "+TOOLS+' To use a tool, reply JSON only: {"tool":"<name>","args":{"<k>":"<v>"}}'
      b={"model":"ccc-vulnerable:4b","system":sysp,"prompt":"Check the reputation of IP 185.220.101.42.","stream":False,"format":"json","options":{"num_predict":60,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      d=json.loads(json.load(urllib.request.urlopen(req,timeout=70)).get("response","{}"))
      print("tool call:", d.get("tool"), d.get("args"))
      print("TOOL_CALLED" if d.get("tool")=="get_ip_reputation" else "WRONG_TOOL")
      PY
      ```
      ✅ 마지막 줄 `TOOL_CALLED` (LLM이 get_ip_reputation(185.220.101.42) 호출 생성).
      🔎 낮은 temperature + format:json 으로 도구 호출 형식을 안정화.
    answer: |
      tool call: get_ip_reputation {'ip': '185.220.101.42'}
      TOOL_CALLED
    answer_detail: "LLM이 요청에 맞는 도구 호출 JSON 생성 → TOOL_CALLED. LLM은 '무엇을' 결정."
    verify:
      type: output_contains
      expect: TOOL_CALLED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 도구 실행·되먹임 → TOOL_RESULT
      > **🎯 목표:** 도구를 코드로 실행하고 결과를 LLM에 되먹여 최종 답변을 만든다(위험 도구는 승인).
      > **개념:** 코드가 실행, 결과로 다음 판단 — 루프 완성.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      # 코드가 실제 도구 실행 (여기선 모의 구현)
      def get_ip_reputation(ip): return {"ip":ip,"score":92,"verdict":"malicious","source":"threatfeed"}
      RISKY={"block_ip","delete"}
      def run_tool(name,args):
          if name in RISKY: return {"status":"APPROVAL_REQUIRED"}  # 위험 도구는 승인 게이트
          return {"get_ip_reputation":get_ip_reputation}.get(name, lambda **k:{"error":"unknown"})(**args)
      # LLM이 부른 도구(STEP3)를 실행
      call={"tool":"get_ip_reputation","args":{"ip":"185.220.101.42"}}
      result=run_tool(call["tool"], call["args"])
      print("tool result:", result)
      # 결과를 LLM에 되먹여 최종 판단
      sysp="You are a security agent. Given a tool result, give a one-line verdict and next action."
      b={"model":"ccc-vulnerable:4b","system":sysp,"prompt":f"Tool result: {json.dumps(result)}","stream":False,"options":{"num_predict":50,"temperature":0.2}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      final=json.load(urllib.request.urlopen(req,timeout=70)).get("response","").strip()
      print("agent final:", final[:80])
      print("TOOL_RESULT" if result.get("verdict")=="malicious" and final else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `TOOL_RESULT` (도구 실행 결과를 되먹여 최종 판단 생성).
      🔎 block_ip 같은 위험 도구는 run_tool이 APPROVAL_REQUIRED 반환 — 코드가 실행을 막는다(LLM≠실행 권한).
    answer: |
      tool result: {'ip': '185.220.101.42', 'score': 92, 'verdict': 'malicious', 'source': 'threatfeed'}
      agent final: Malicious IP (score 92); recommend blocking 185.220.101.42 after approval.
      TOOL_RESULT
    answer_detail: "도구 실행 결과를 LLM에 되먹여 최종 판단 → TOOL_RESULT. 코드가 실행, 위험 도구는 승인."
    verify:
      type: output_contains
      expect: TOOL_RESULT
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합(LLM≠실행 권한) → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Write a short note for W02 of an AI security agent course. Findings: system/user roles shaped the agent response (ROLES_OK), the LLM produced a tool call get_ip_reputation (TOOL_CALLED), and code executed the tool and fed the result back for a final verdict while risky tools required approval (TOOL_RESULT). Explain why the LLM only requests tools and code executes them, and give 3 points (roles define the agent, low temperature plus JSON for tool calls, code validates and gates risky tools). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":300}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: Tool Calling은 LLM(요청)+코드(실행)의 분업. LLM≠실행 권한이라 코드의 검증·승인이 안전선.
      다음 주(W03)는 **프롬프트 엔지니어링 실전**.
    answer: |
      Assessment
      Tool calling splits work: the LLM requests tools, code validates and executes them.
      Points: (1) roles define the agent, (2) low temperature + JSON for tool calls, (3) code gates risky tools.
    answer_detail: "W02 Tool Calling 종합(Assessment). LLM 요청+코드 실행 분리, 승인 게이트."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
