lab_id: aisec-week15
title: "W15 — 프로젝트 C: 보안 교육 에이전트 + 최종 발표 (설명·퀴즈 채점·캡스톤 종합)"
version: ai
course: aisec
week: 15
description: |
  마지막 프로젝트+종합. 근거 기반 개념 설명(TEACH_OK), 퀴즈 생성·채점(QUIZ_GRADED), 세 프로젝트 캡스톤
  종합(CAPSTONE_OK), 최종 발표(Assessment).
  관통 원칙: LLM(넓게 훑기)+결정론(좁혀 확정)+통제(안전장치). aisec의 결론.
difficulty: hard
duration_minutes: 170
audience: AI 보안 에이전트 심화 (15주차·프로젝트 C·최종)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — ccc-vulnerable:4b
  - W01~W14 실습·프로젝트 A/B 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "근거 기반 개념 설명(TEACH_OK)"
  - "퀴즈 생성·채점(QUIZ_GRADED)"
  - "세 프로젝트 캡스톤 종합(CAPSTONE_OK)"
  - "최종 발표(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 교육 에이전트(설명) → TEACH_OK
      > **🎯 목표:** 보안 개념을 근거 기반으로 쉽게 설명.
      > **개념:** RAG(근거)+프롬프트로 정확한 설명 — 교육은 정확성이 생명.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      # 근거 문서(교육 KB)
      doc="Prompt injection: attacker input overrides the system instructions; defense is code-level output validation, not prompt rules alone."
      sysp="You are a security tutor. Explain the concept in 2 short sentences using ONLY the provided context."
      b={"model":"ccc-vulnerable:4b","system":sysp,"prompt":f"Context: {doc}\n\nExplain prompt injection to a beginner.","stream":False,"options":{"num_predict":80,"temperature":0.2}}
      r=json.load(urllib.request.urlopen(urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"}),timeout=70)).get("response","").strip()
      print("explanation:", r[:120])
      # 근거의 핵심(override/validation)이 설명에 반영되면 근거 기반 교육
      print("TEACH_OK" if ("inject" in r.lower() or "override" in r.lower() or "instruction" in r.lower()) else "OFF_TOPIC")
      PY
      ```
      ✅ 마지막 줄 `TEACH_OK` (근거 기반으로 프롬프트 인젝션 개념 설명).
      🔎 RAG로 근거를 대 정확히 설명. 틀린 개념을 가르치지 않으려면 근거+검증.
    answer: |
      explanation: Prompt injection is when an attacker's input overrides the system's instructions. The defense is validating the output in code, not relying on prompt rules alone.
      TEACH_OK
    answer_detail: "근거 기반으로 개념 설명(override/validation 반영) → TEACH_OK. RAG 교육."
    verify:
      type: output_contains
      expect: TEACH_OK
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 퀴즈·채점 → QUIZ_GRADED
      > **🎯 목표:** 퀴즈 생성 + 학습자 답 채점(결정론 검증).
      > **개념:** 이해 확인 — 채점은 결정론 대조.
      ```bash
      python3 - <<'PY'
      # 퀴즈(정답 키 보유) + 결정론 채점
      quiz={"q":"What is the robust defense against prompt injection?",
            "options":{"a":"longer prompt","b":"code-level output validation","c":"higher temperature"},
            "answer":"b"}
      # 학습자 답변들 채점
      submissions={"student1":"b","student2":"a"}
      def grade(ans): return "correct" if ans==quiz["answer"] else "incorrect"
      results={s:grade(a) for s,a in submissions.items()}
      for s,res in results.items():
          fb = "Well done." if res=="correct" else f"Review: the answer is '{quiz['answer']}' (code-level output validation)."
          print(f"  {s}: {res} - {fb}")
      graded = results["student1"]=="correct" and results["student2"]=="incorrect"
      print("QUIZ_GRADED" if graded else "GRADING_ERROR")
      PY
      ```
      ✅ 마지막 줄 `QUIZ_GRADED` (정답 결정론 채점 + 피드백).
      🔎 채점은 LLM이 아니라 정답 키로 결정론 검증 — 교육의 신뢰(오채점 방지).
    answer: |
      student1: correct - Well done.
      student2: incorrect - Review: the answer is 'b' (code-level output validation).
      QUIZ_GRADED
    answer_detail: "퀴즈 생성+정답 키 결정론 채점+피드백 → QUIZ_GRADED. 근거+검증 평가."
    verify:
      type: output_contains
      expect: QUIZ_GRADED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 캡스톤 종합 → CAPSTONE_OK
      > **🎯 목표:** 세 프로젝트(방어·공격·교육)가 같은 뼈대(LLM+결정론+통제)임을 확인.
      > **개념:** 도메인 달라도 설계 원칙은 하나.
      ```bash
      python3 - <<'PY'
      # 세 프로젝트의 공통 뼈대 점검
      projects={
        "A_IR_defense":  {"llm":"analyze","deterministic":"verify severity","control":"approval gate"},
        "B_CTF_attack":  {"llm":"hypothesize","deterministic":"verify flag","control":"authorized target only"},
        "C_education":   {"llm":"explain","deterministic":"grade by key","control":"grounded/verified"},
      }
      pillars=["llm","deterministic","control"]
      all_have = all(all(p in proj for p in pillars) for proj in projects.values())
      for name,proj in projects.items():
          print(f"  {name:16} LLM={proj['llm'][:10]:10} DET={proj['deterministic'][:14]:14} CTRL={proj['control'][:16]}")
      print("all three share LLM + deterministic + control:", all_have)
      print("CAPSTONE_OK" if all_have else "INCONSISTENT")
      PY
      ```
      ✅ 마지막 줄 `CAPSTONE_OK` (세 프로젝트 모두 LLM+결정론+통제 뼈대 공유).
      🔎 방어·공격·교육 — 도메인은 달라도 관통 원칙(세 기둥)은 하나. 이것이 과목의 결론.
    answer: |
      A_IR_defense     LLM=analyze    DET=verify severity DET CTRL=approval gate
      B_CTF_attack     LLM=hypothesize DET=verify flag     CTRL=authorized target
      C_education      LLM=explain    DET=grade by key    CTRL=grounded/verified
      all three share LLM + deterministic + control: True
      CAPSTONE_OK
    answer_detail: "세 프로젝트가 LLM+결정론+통제 뼈대 공유 확인 → CAPSTONE_OK. 관통 원칙."
    verify:
      type: output_contains
      expect: CAPSTONE_OK
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 발표 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Write a final capstone presentation note for the AI security agent course. Findings: a tutor agent explained a concept grounded in context (TEACH_OK), generated and deterministically graded a quiz (QUIZ_GRADED), and the three projects (IR defense, CTF attack, education) were shown to share one skeleton: LLM plus deterministic plus control (CAPSTONE_OK). Conclude with the course principle: sweep broadly with the LLM, narrow to certainty with deterministic checks, and tame autonomy with controls. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 보안 교육 에이전트로 종합. 세 프로젝트는 하나의 뼈대(LLM+결정론+통제). AI를 보안에 신뢰할 수 있게 쓰는 법 완성.
      수고했습니다 — aisec 과목을 마칩니다.
    answer: |
      Assessment
      The course built, secured, and applied AI security agents across defense, attack, and education, all sharing one skeleton.
      Principle: sweep broadly with the LLM, narrow to certainty with deterministic checks, and tame autonomy with controls.
    answer_detail: "W15 프로젝트 C·최종 종합(Assessment). 교육 에이전트, 세 프로젝트 뼈대, 관통 원칙."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
