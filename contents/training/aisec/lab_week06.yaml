lab_id: aisec-week06
title: "W06 — 서버 하네스 (2) Playbook + RL: 표준 절차 생성·harness 반영·경험 개선"
version: ai
course: aisec
week: 6
description: |
  서버 하네스를 스스로 나아지게. LLM playbook 생성으로 E.G 지식(PLAYBOOK_OK), Manager harness 반영
  (HARNESS_PLAN), RL 보상으로 선택 개선(RL_IMPROVED), E.G 종합(Assessment).
  Playbook=E.G 지식, RL 보상=E.G 경험. 둘이 Manager의 harness engineering을 매 대응 개선.
difficulty: medium
duration_minutes: 130
audience: AI 보안 에이전트 입문 (6주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W06 강의안 정독 — §0.5(Playbook·RL·E.G 지식/경험)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "LLM playbook 생성으로 E.G 지식(PLAYBOOK_OK)"
  - "Manager harness 반영(HARNESS_PLAN)"
  - "RL 보상으로 선택 개선(RL_IMPROVED)"
  - "E.G 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — Playbook 생성 → PLAYBOOK_OK
      > **🎯 목표:** LLM으로 대응 playbook을 구조화 생성해 E.G 지식으로 넣는다.
      > **개념:** 반복 대응을 표준 절차(KG 지식)로.
      ```bash
      python3 - <<'PY'
      import json, urllib.request
      GPU="http://211.170.162.139:10934/api/generate"
      prompt=('Output JSON only: {"playbook":"web_attack_response","steps":["<s1>","<s2>","<s3>"]}. '
              'Create a 3-step response playbook for a web application attack (e.g., SQL injection).')
      b={"model":"gemma3:4b","prompt":prompt,"stream":False,"format":"json","options":{"num_predict":150,"temperature":0.1}}
      req=urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"})
      d=json.loads(json.load(urllib.request.urlopen(req,timeout=70)).get("response","{}"))
      steps=d.get("steps",[])
      print("playbook:", d.get("playbook"), "| steps:", len(steps))
      for s in steps[:3]: print("  -", str(s)[:55])
      print("PLAYBOOK_OK" if len(steps)>=3 else "SHALLOW")
      PY
      ```
      ✅ 마지막 줄 `PLAYBOOK_OK` (3단계 웹공격 대응 playbook 생성).
      🔎 이 playbook이 E.G의 KG(지식)에 들어가 Manager가 뼈대로 참조한다.
    answer: |
      playbook: web_attack_response | steps: 3
        - Identify the malicious request and source IP from WAF/app logs
        - Block the source and add a WAF rule for the payload
        - Investigate scope and patch the vulnerability
      PLAYBOOK_OK
    answer_detail: "LLM이 웹공격 대응 3단계 playbook 생성 → PLAYBOOK_OK. E.G 지식."
    verify:
      type: output_contains
      expect: PLAYBOOK_OK
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — Manager harness 반영 → HARNESS_PLAN
      > **🎯 목표:** playbook 단계를 bastion skill 절차로 조립한다(결정론).
      > **개념:** E.G 지식(playbook)이 harness(실행 절차)가 된다.
      ```bash
      python3 - <<'PY'
      # playbook 단계 → bastion skill 절차 (Manager harness engineering)
      playbook=["identify malicious request from waf/app logs","block source and add waf rule","investigate and patch"]
      SKILL=[("identify","apache.error_log / suricata.tail_eve"),
             ("block","nft.list_ruleset + rule add (위험·승인)"),
             ("investigate","상관분석 + 패치")]
      harness=[]
      for step in playbook:
          sk=next((s for k,s in SKILL if k in step.lower()), "manual")
          harness.append((step[:28], sk))
      for st,sk in harness: print(f"  {st:30} -> {sk}")
      print("HARNESS_PLAN" if len(harness)==3 else "PARTIAL")
      PY
      ```
      ✅ 마지막 줄 `HARNESS_PLAN` (playbook 3단계가 skill 절차로 조립).
      🔎 차단 단계는 위험 → 승인 게이트. Manager가 playbook을 harness로 구체화.
    answer: |
      identify malicious request fro -> apache.error_log / suricata.tail_eve
      block source and add waf rule  -> nft.list_ruleset + rule add (위험·승인)
      investigate and patch          -> 상관분석 + 패치
      HARNESS_PLAN
    answer_detail: "playbook 단계를 bastion skill 절차로 조립 → HARNESS_PLAN. 지식이 harness로."
    verify:
      type: output_contains
      expect: HARNESS_PLAN
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — RL 보상 개선 → RL_IMPROVED
      > **🎯 목표:** 두 절차의 보상 경험으로 Manager가 더 나은 절차를 선호한다(결정론).
      > **개념:** 경험이 E.G(Experience DB)에 쌓여 선택 개선.
      ```bash
      python3 - <<'PY'
      from collections import defaultdict
      # E.G Experience DB: (절차, 보상) — 다면 보상(정확+/오탐-/지연-)
      experience=[("block_then_investigate", +1),   # 성급 차단: 일부 오탐
                  ("verify_then_block", +3),         # 검증 후 차단: 정확
                  ("block_then_investigate", 0),
                  ("verify_then_block", +3)]
      avg=defaultdict(list)
      for proc,r in experience: avg[proc].append(r)
      scores={p:sum(v)/len(v) for p,v in avg.items()}
      best=max(scores,key=scores.get)
      for p,v in scores.items(): print(f"  {p:24} avg_reward={v:+.1f}")
      print("Manager now prefers:", best)
      print("RL_IMPROVED" if best=="verify_then_block" else "MISLEARNED")
      PY
      ```
      ✅ 마지막 줄 `RL_IMPROVED` (경험 보상으로 'verify_then_block' 절차 선호).
      🔎 E.G 경험이 Manager의 harness engineering을 개선한다 — 서버 하네스가 스스로 나아짐.
    answer: |
      block_then_investigate   avg_reward=+0.5
      verify_then_block        avg_reward=+3.0
      Manager now prefers: verify_then_block
      RL_IMPROVED
    answer_detail: "E.G 경험 보상으로 Manager가 'verify_then_block' 선호 → RL_IMPROVED. 경험 학습."
    verify:
      type: output_contains
      expect: RL_IMPROVED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W06 on making a server-side harness improve itself. Findings: an LLM generated a web-attack response playbook stored as E.G knowledge (PLAYBOOK_OK), a Manager assembled it into a bastion skill procedure with an approval gate on the block step (HARNESS_PLAN), and reward experience made the Manager prefer verify-then-block (RL_IMPROVED). Explain that playbooks fill E.G knowledge and RL rewards fill E.G experience, both improving the Manager harness engineering, and warn about reward hacking. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":320}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: Playbook(E.G 지식) + RL 보상(E.G 경험)이 Manager의 harness engineering을 매 대응 개선. 보상 정렬·검증 필수.
      다음 주(W07)는 클라이언트 사이드 하네스 **Claude Code**.
    answer: |
      Assessment
      Playbooks fill E.G knowledge and RL rewards fill E.G experience; together they improve the Manager's harness engineering each response.
      Guard against reward hacking with multi-objective rewards, held-out verification, and human oversight.
    answer_detail: "W06 Playbook+RL 종합(Assessment). E.G 지식+경험이 harness engineering 개선."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
