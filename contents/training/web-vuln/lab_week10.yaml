lab_id: standalone-web-vuln-week10
title: "전송 보안(TLS) — 약한 프로토콜/cipher/인증서 점검 vs 전송 강화"
version: standalone-web-vuln
course: web-vuln
week: 10
description: |
  OWASP A02(Cryptographic Failures, 암호 실패) / WSTG-CRYP 전송 보안 점검. 앱 코드가 견고해도
  데이터가 네트워크 전송 구간(선)에서 약하게 암호화되면 중간자(MITM)가 평문/세션을 가로챈다.
  본 lab 은 el34 web(443)의 TLS 를 세 축으로 점검한다 — ① 프로토콜 버전(openssl s_client 로
  협상 결과 확인, TLS1.3 기대), ② cipher 강도(nmap ssl-enum-ciphers 로 등급 A~F·least strength
  열거), ③ 인증서 신뢰(subject==issuer 비교로 자체서명 탐지). 이어 폐기 프로토콜(TLS1.1) 거부를
  확인하고, 전송 약점의 영향(MITM/세션 탈취/가용성)을 정리한 뒤 전송 강화(TLS1.2+/AEAD/유효 CA
  인증서/HSTS/자동 갱신)를 권고한다. el34 web 은 프로토콜·cipher 는 견고하나(TLS1.3, least
  strength A) 인증서가 자체서명(CN=*.6v6.lab, 호스트명 불일치)이라 A02 결함을 갖는다.
  공격(점검)은 el34-attacker 에서 수행한다. 인가된 실습만. 모든 명령은 el34 호스트
  (ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec 로. 신규 도구 설치 없음(openssl/nmap 기본 탑재).
difficulty: hard
duration_minutes: 160
prerequisites:
  - "W01–W09 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(프로토콜) §3(cipher) §4(인증서) 숙지"
objectives:
  - "openssl s_client 로 협상된 프로토콜/cipher 확인 — TLS1.3 + AEAD(GCM) 가 강함, 옛 버전/약한 cipher 는 결함"
  - "nmap ssl-enum-ciphers 로 cipher 등급(A~F)·least strength 열거 — 전체 cipher 정책의 견고성 평가"
  - "인증서 subject==issuer 비교로 자체서명 탐지 + 호스트명 불일치 식별(신뢰 체인 부재 → MITM 위조 식별 불가)"
  - "폐기 프로토콜(TLS1.1) 협상 거부 확인 — PCI-DSS 금지 항목 충족 여부"
  - "전송 강화 방어(TLS1.2/1.3만·약한 cipher 배제·유효 CA 인증서·HSTS·ACME 자동 갱신) 권고와 보고서 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 점검 표적(HTTPS 443)에 도달하는지 먼저 확인
      ## 📖 개념
      전송 보안 점검의 전제는 표적의 HTTPS 포트(443)에 요청이 닿는다는 것이다. 연결이 안 되면 이후의
      모든 "약점 없음" 결과가 무의미하므로, 점검자는 늘 도달성부터 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) HTTPS 443 도달 확인 — -k로 자체서명 경고 무시(인증서 결함은 미션4), Host로 vhost 지정, 응답코드만 https= 형식으로
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'https=%{http_code}\n' -H 'Host: dvwa.el34.lab' https://10.20.30.1/"
      ```
      ## 🔧 도구/옵션 풀이
      - `curl` : HTTP(S) 요청을 보내는 표준 도구.
      - `-k`(--insecure) : 자체서명 인증서 경고를 무시하고 연결 자체의 도달성만 확인(인증서 결함은
        미션 4 에서 별도로 다룬다).
      - `-H 'Host: dvwa.el34.lab'` : el34 web 은 Host/SNI 로 vhost 를 구분하므로 어느 사이트인지 지정.
      - `-o /dev/null -w 'https=%{http_code}'` : 본문은 버리고 응답 코드만 출력하는 관용구.
      ## ✅ 합격 기준
      `https=` 출력 시 통과. **근거:** `https=<코드>`(예: 200/302)가 나오면 443 에 도달한 것 — 응답이
      없으면 게이트웨이(10.20.30.1)·Host 헤더부터 재점검한다.
    hint: 'https 도달'
    category: survey
    points: 10
    answer: |
      # 1) HTTPS 443 도달 확인 — -k로 자체서명 경고 무시(인증서 결함은 미션4), Host로 vhost 지정, 응답코드만 https= 형식으로
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'https=%{http_code}\n' -H 'Host: dvwa.el34.lab' https://10.20.30.1/"
    answer_detail: "전송 보안 점검 대상 = el34 web 443(HTTPS). curl -k 로 인증서 경고를 무시하고 443 도달성만 확인한다(인증서 신뢰는 미션 4에서 평가). 응답 코드가 돌아오면 표적이 점검 가능 상태."
    verify:
      type: output_contains
      expect: 'https='
      field: stdout
      semantic:
        intent: "HTTPS 점검"
        success_criteria: ["443 도달"]
        acceptable_methods: ["**[OSS] curl -k (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 협상된 TLS 프로토콜 버전·cipher 묶음 확인
      ## 📖 개념
      TLS 의 보안 수준은 핸드셰이크에서 합의된 **프로토콜 버전**(세대)과 **cipher 묶음**(암호
      알고리즘 조합)으로 결정된다. 추측이 아니라 실제 협상 결과를 증거로 확인한다. TLS1.3 +
      AEAD(GCM)이면 견고, 옛 버전(TLS1.0/1.1)이나 RC4/3DES 면 결함이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) openssl s_client로 TLS 핸드셰이크를 맺고(echo|로 입력 즉시 닫음) 협상된 Protocol/Cipher 줄만 추출(SNI로 vhost 지정)
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -3"
      # 2) 해석 — TLSv1.3 + AEAD(GCM) cipher면 강력, 옛 버전/약한 cipher면 결함
      echo "→ TLSv1.3 + AEAD(GCM) cipher = 강력. 약한 협상이면 결함"
      ```
      ## 🔧 도구/옵션 풀이
      - `openssl s_client` : 지정한 서버와 직접 TLS 핸드셰이크를 맺어 보는 클라이언트. 결과에 협상된
        프로토콜·cipher·인증서가 들어 있다.
      - `-connect 10.20.30.1:443` : 점검 대상(IP:포트).
      - `-servername dvwa.el34.lab` : SNI — 어느 vhost 의 인증서를 받을지 지정.
      - `echo |` : 핸드셰이크만 맺고 입력을 바로 닫는 관용구. `2>/dev/null` 로 진단 메시지 제거,
        `grep -iE 'Protocol|Cipher'` 로 핵심 두 줄만 추출.
      ## ✅ 합격 기준
      `TLSv1` 출력 시 통과. **근거:** `Protocol :` 와 `Cipher :` 줄이 보이면 협상 결과를 확인한 것 —
      el34 는 TLSv1.3 + TLS_AES_256_GCM_SHA384(강한 AEAD). 옛 버전/약한 cipher 가 보이면 결함으로 보고.
    hint: 's_client Protocol/Cipher'
    category: analysis
    points: 14
    answer: |
      # 1) openssl s_client로 TLS 핸드셰이크를 맺고(echo|로 입력 즉시 닫음) 협상된 Protocol/Cipher 줄만 추출(SNI로 vhost 지정)
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -3"
      # 2) 해석 — TLSv1.3 + AEAD(GCM) cipher면 강력, 옛 버전/약한 cipher면 결함
      echo "→ TLSv1.3 + AEAD(GCM) cipher = 강력. 약한 협상이면 결함"
    answer_detail: "openssl s_client 는 핸드셰이크로 협상된 프로토콜 버전/cipher 묶음을 보여준다. el34 web 은 TLSv1.3 + TLS_AES_256_GCM_SHA384(AEAD, 256비트 AES+GCM 무결성)로 협상 — 강력. 출력에 TLSv1(여기선 1.3)이 보이면 합격. 옛 버전/RC4·3DES 면 결함."
    verify:
      type: output_contains
      expect: 'TLSv1'
      field: stdout
      semantic:
        intent: "프로토콜/cipher 점검"
        success_criteria: ["TLS 버전/cipher"]
        acceptable_methods: ["**[OSS] openssl s_client (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 서버가 허용하는 모든 cipher 의 등급(A~F)과 least strength 열거
      ## 📖 개념
      미션 2 가 "이번 연결의 cipher"라면, 미션 3 은 서버가 **허용하는 전체 cipher**를 본다. 약한
      cipher 가 하나라도 살아 있으면 공격자가 그것을 골라 다운그레이드할 수 있기 때문이다. 사슬은
      가장 약한 고리에서 끊기듯, **least strength**(가장 낮은 등급)가 cipher 정책의 실질 강도다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) nmap ssl-enum-ciphers로 서버가 허용하는 전체 cipher의 등급(A~F)과 least strength(최저 등급=전체 약점) 열거
      docker exec el34-attacker sh -c "timeout 55 nmap --script ssl-enum-ciphers -p 443 10.20.30.1 2>/dev/null | grep -iE 'TLSv|least strength'"
      # 2) 해석 — least strength A면 약한 cipher 없음, C~F면 RC4/3DES/EXPORT 잔존 의심
      echo "→ least strength A = 약한 cipher 없음. C~F면 RC4/3DES/EXPORT 잔존 의심"
      ```
      ## 🔧 도구/옵션 풀이
      - `nmap` : 네트워크/포트 스캐너. `--script ssl-enum-ciphers` 는 대상의 TLS cipher 를 모두 시험해
        각각 A~F 등급(강도·전방향 비밀성 등 반영)을 매기는 스크립트다.
      - `-p 443` : 점검 포트. `timeout 55` : 스크립트가 오래 걸릴 수 있으니 상한을 둔다.
      - 출력 끝의 `least strength` : 지원 cipher 중 가장 낮은 등급 = 전체 약점 지표.
      ## ✅ 합격 기준
      `least strength` 출력 시 통과. **근거:** least strength 등급이 나오면 cipher 정책의 실질 강도를
      확인한 것 — el34 는 least strength A(약한 cipher 없음). C~F 면 RC4/3DES/EXPORT 잔존 신호로 결함 보고.
    hint: 'ssl-enum-ciphers least strength'
    category: analysis
    points: 14
    answer: |
      # 1) nmap ssl-enum-ciphers로 서버가 허용하는 전체 cipher의 등급(A~F)과 least strength(최저 등급=전체 약점) 열거
      docker exec el34-attacker sh -c "timeout 55 nmap --script ssl-enum-ciphers -p 443 10.20.30.1 2>/dev/null | grep -iE 'TLSv|least strength'"
      # 2) 해석 — least strength A면 약한 cipher 없음, C~F면 RC4/3DES/EXPORT 잔존 의심
      echo "→ least strength A = 약한 cipher 없음. C~F면 RC4/3DES/EXPORT 잔존 의심"
    answer_detail: "nmap ssl-enum-ciphers 는 지원 cipher 마다 등급(A~F)을 매기고 least strength(최저 등급=전체 약점)를 출력한다. el34 web 은 least strength A — 약한 cipher 잔존 없음(견고). C~F 면 RC4/3DES/EXPORT 의심 → 결함."
    verify:
      type: output_contains
      expect: 'least strength'
      field: stdout
      semantic:
        intent: "cipher 강도"
        success_criteria: ["least strength 등급"]
        acceptable_methods: ["**[OSS] nmap ssl-enum (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 인증서의 subject 와 issuer 를 비교해 자체서명 식별
      ## 📖 개념
      암호(프로토콜·cipher)가 강해도 **인증서가 신뢰되지 않으면** 중간자(MITM)가 위조 인증서로
      끼어든다. 인증서에는 대상자(subject)와 발급자(issuer)가 있는데, **둘이 같으면 자체서명
      (self-signed)** 이다 — 공인 CA 가 보증하지 않아 신뢰 체인이 없고, 공격자도 똑같이 만들 수
      있어 진짜와 가짜를 구분할 수 없다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 핸드셰이크로 받은 인증서를 파일로 저장 → 2) subject(대상자)와 issuer(발급자)를 추출해 비교(같으면 자체서명)
      docker exec el34-attacker sh -c 'echo | openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null > /tmp/cert.txt; S=$(openssl x509 -noout -subject -in /tmp/cert.txt 2>/dev/null | sed "s/subject=//"); I=$(openssl x509 -noout -issuer -in /tmp/cert.txt 2>/dev/null | sed "s/issuer=//"); echo "subject:$S"; echo "issuer:$I"; [ "$S" = "$I" ] && echo "cert=selfsigned" || echo "cert=ca-signed"'
      # 3) 해석 — subject==issuer면 자체서명(신뢰체인 부재→MITM 위조 식별 불가), CN(*.6v6.lab)이 호스트와 불일치도 결함
      echo "→ subject==issuer = 자체서명. 브라우저 경고, MITM 인증서 위조 식별 불가. CN(*.6v6.lab)이 호스트(el34.lab)와 불일치도 결함"
      ```
      ## 🔧 도구/옵션 풀이
      - `openssl s_client ... > /tmp/cert.txt` : 핸드셰이크로 받은 인증서를 파일로 저장.
      - `openssl x509 -noout -subject` / `-issuer` : 저장한 인증서에서 대상자/발급자만 추출
        (`-noout` 은 인증서 원문을 다시 찍지 않음). `sed` 로 라벨을 떼어 값만 비교.
      - `[ "$S" = "$I" ]` : subject 와 issuer 가 같으면 자체서명으로 판정.
      ## ✅ 합격 기준
      `cert=selfsigned` 출력 시 통과. **근거:** subject==issuer 면 자체서명으로 식별된 것 — el34 web 은
      자체서명이며 CN 이 구 명명 `*.6v6.lab` 이라 호스트(el34.lab)와도 불일치(둘 다 결함 단서).
    hint: 'subject == issuer'
    category: manipulation
    points: 16
    answer: |
      # 1) 핸드셰이크로 받은 인증서를 파일로 저장 → 2) subject(대상자)와 issuer(발급자)를 추출해 비교(같으면 자체서명)
      docker exec el34-attacker sh -c 'echo | openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null > /tmp/cert.txt; S=$(openssl x509 -noout -subject -in /tmp/cert.txt 2>/dev/null | sed "s/subject=//"); I=$(openssl x509 -noout -issuer -in /tmp/cert.txt 2>/dev/null | sed "s/issuer=//"); echo "subject:$S"; echo "issuer:$I"; [ "$S" = "$I" ] && echo "cert=selfsigned" || echo "cert=ca-signed"'
      # 3) 해석 — subject==issuer면 자체서명(신뢰체인 부재→MITM 위조 식별 불가), CN(*.6v6.lab)이 호스트와 불일치도 결함
      echo "→ subject==issuer = 자체서명. 브라우저 경고, MITM 인증서 위조 식별 불가. CN(*.6v6.lab)이 호스트(el34.lab)와 불일치도 결함"
    answer_detail: "자체서명 = subject==issuer(자기가 자기를 발급). 공인 CA 보증이 없어 신뢰 체인 부재 → MITM 위조 인증서를 식별할 수 없다. el34 web 은 자체서명(CN=*.6v6.lab)이고 호스트명(el34.lab)과도 불일치 → 실서비스라면 A02 결함. cert=selfsigned 출력이 식별 성공."
    verify:
      type: output_contains
      expect: 'cert=selfsigned'
      field: stdout
      semantic:
        intent: "자체서명 탐지"
        success_criteria: ["subject==issuer"]
        acceptable_methods: ["**[OSS] openssl x509 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 폐기된 프로토콜(TLS1.1)이 거부되는지 확인
      ## 📖 개념
      최신 버전 지원만으로는 부족하다. **옛 버전을 거부**해야 공격자가 핸드셰이크에서 약한 버전을
      고르도록 유도하는 다운그레이드를 막는다. TLS1.0/1.1 은 약점이 누적돼 PCI-DSS 등이 명시적으로
      금지한다. 따라서 협상이 **불가(refused)** 한 것이 정상이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) -tls1_1로 협상 버전을 TLS1.1로 못 박아 핸드셰이크 시도 → 실패 신호(no protocols/alert/handshake fail)면 tls11=refused
      docker exec el34-attacker sh -c 'if echo | openssl s_client -connect 10.20.30.1:443 -tls1_1 2>&1 | grep -qiE "no protocols|alert|handshake fail|no peer cert"; then echo "tls11=refused"; else echo "tls11=accepted"; fi'
