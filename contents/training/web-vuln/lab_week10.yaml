      ## 🎯 목표 — 발견을 전송 강화(Transport Hardening) 방어로 묶어 권고
      ## 📖 개념
      점검의 가치는 "고치는 길"에 있다. 전송 강화는 **암호 강도**(프로토콜·cipher)와 **신뢰**
      (인증서·HSTS)를 함께 끌어올린다. 핵심을 한 줄로 줄이면 "최신 TLS + 신뢰 인증서 + HSTS".
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 프로토콜 — TLS1.2/1.3만, TLS1.0/1.1 비활성(다운그레이드 차단)
      echo "1) 프로토콜: TLS1.2/1.3만, TLS1.0/1.1 비활성"
      # 2) cipher — 약한(RC4/3DES/NULL/EXPORT) 배제, AEAD(GCM) 선호
      echo "2) cipher: 약한(RC4/3DES/NULL/EXPORT) 배제, AEAD(GCM) 선호"
      # 3) 인증서 — 유효 CA 서명(자체서명 금지), 호스트명 일치, ACME 자동갱신
      echo "3) 인증서: 유효 CA 서명(자체서명 금지), 호스트명 일치, 자동갱신(ACME)"
      # 4) HSTS — Strict-Transport-Security + HTTP→HTTPS 리다이렉트(평문 다운그레이드 차단)
      echo "4) HSTS(Strict-Transport-Security) + HTTP→HTTPS 리다이렉트"
      # 5) 핵심 — 최신 TLS + 신뢰 인증서 + HSTS
      echo "→ 핵심: 최신 TLS + 신뢰 인증서 + HSTS"
      ```
      ## 🔧 방어 4축 풀이
      - 프로토콜 : TLS1.2/1.3 만 허용, TLS1.0/1.1(및 SSL2/3) 비활성 → 다운그레이드 차단.
