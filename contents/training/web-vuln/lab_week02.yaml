      `X-Powered-By` 는 언어·프레임워크를 흘린다. 노출된 버전은 곧 CVE 매핑의 입구이므로,
      "무엇을 숨길지"는 "무엇이 노출되는지"를 본 다음에 정한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 응답 헤더만(-I=head) 조용히(-s=silent) 가져와 핑거프린팅 노출원(Server/X-Powered-By/X-AspNet)만 추출
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE 'Server|X-Powered|X-AspNet'"
      ```

      ## 💡 참고 (el34 사실)
      el34 의 web 은 현재 `Server` 헤더가 버전·OS 정보까지 비교적 자세히 노출되도록 설정돼
      있어(ServerTokens 미축소) 노출을 직접 관찰하기 좋다. 버전이 그대로 보인다는 것은 곧
      `ServerTokens Prod` 로 줄여야 할 개선 지점이라는 뜻이다(미션 7 방어로 연결).

      ## ✅ 합격 기준
