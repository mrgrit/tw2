lab_id: standalone-web-vuln-week02
title: "점검 도구 — 스캐너 공격 vs 스캐너 탐지·핑거프린팅 방어"
version: standalone-web-vuln
course: web-vuln
week: 2
description: |
  자동 점검 도구(nikto/whatweb/ffuf) 스캔과 방어(스캐너 탐지 WAF 913 + 핑거프린팅 정보 축소). 공격은
  el34-attacker. 인가된 실습만. 명령은 el34 호스트에서.
difficulty: medium
duration_minutes: 150
prerequisites:
  - "W01 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(스캐너) §3(탐지) §4(핑거프린팅) 숙지"
objectives:
  - "nikto/whatweb/ffuf로 자동 점검"
  - "스캐너의 WAF 탐지(913) 확인"
  - "핑거프린팅 정보 축소 방어"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 도구
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'command -v nikto whatweb ffuf'
      ```
      ## ✅ 합격 기준
      스캐너 도구 사용 가능.
    hint: 'command -v nikto whatweb ffuf'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c 'command -v nikto; command -v whatweb; command -v ffuf'
    answer_detail: "자동 점검 도구 — nikto/whatweb/ffuf."
    verify:
      type: output_contains
      expect: 'nikto'
      field: stdout
      semantic:
        intent: "스캐너 도구 점검"
        success_criteria: ["nikto/whatweb/ffuf"]
        acceptable_methods: ["**[OSS] command -v (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 nikto 스캔
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'nikto -h http://10.20.30.1 -maxtime 25s 2>&1 | head -12'
      ```
      ## ✅ 합격 기준
      nikto 웹 취약점 스캔이 실행된다.
    hint: 'nikto -h'
    category: recon
    points: 12
    answer: |
      echo "=== nikto 웹 취약점 스캔 ==="
      docker exec el34-attacker sh -c 'nikto -h http://10.20.30.1 -maxtime 25s 2>&1 | head -12'
    answer_detail: "nikto = 웹 취약점 자동 스캐너. 취약 파일/헤더 누락 점검. UA(Nikto) 노출 → WAF 탐지."
    verify:
      type: output_contains
      expect: 'Nikto'
      field: stdout
      semantic:
        intent: "nikto 스캔"
        success_criteria: ["nikto 실행"]
        acceptable_methods: ["**[OSS] nikto (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 whatweb 핑거프린팅
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "whatweb -H 'Host: dvwa.el34.lab' http://10.20.30.1/ 2>&1 | head -5"
      ```
      ## ✅ 합격 기준
      whatweb로 기술 스택을 핑거프린팅한다.
    hint: 'whatweb'
    category: recon
    points: 12
    answer: |
      echo "=== whatweb 핑거프린팅 ==="
      docker exec el34-attacker sh -c "whatweb -H 'Host: dvwa.el34.lab' http://10.20.30.1/ 2>&1 | head -5"
      echo "→ 서버/프레임워크/언어 식별. 버전 노출 시 CVE 매핑"
    answer_detail: "whatweb = 기술 스택 핑거프린팅(서버/프레임워크/CMS/언어). 버전 노출은 익스플로잇 단서."
    verify:
      type: output_contains
      expect: '10.20.30.1'
      field: stdout
      semantic:
        intent: "whatweb 핑거프린팅"
        success_criteria: ["기술 스택 식별"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ffuf 디렉토리
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'printf "admin\nlogin\nconfig\n" > /tmp/wv2.txt; ffuf -u http://10.20.30.1/FUZZ -w /tmp/wv2.txt -H "Host: dvwa.el34.lab" -mc 200,301,403 -s 2>&1 | head; rm -f /tmp/wv2.txt'
      ```
      ## ✅ 합격 기준
      ffuf로 숨은 경로를 탐색한다.
    hint: 'ffuf FUZZ'
    category: recon
    points: 12
    answer: |
      echo "=== ffuf 디렉토리 탐색 ==="
      docker exec el34-attacker sh -c 'printf "admin\nlogin\nconfig\nrobots.txt\nindex.php\n" > /tmp/wv2.txt; ffuf -u http://10.20.30.1/FUZZ -w /tmp/wv2.txt -H "Host: dvwa.el34.lab" -mc 200,301,403 -s 2>&1 | head; rm -f /tmp/wv2.txt'
      echo "→ 존재 경로(200/301/403) 발견"
    answer_detail: "ffuf = 디렉토리/파일 brute. 숨은 경로(admin/config) 발견."
    verify:
      type: output_contains
      expect: 'login'
      field: stdout
      semantic:
        intent: "ffuf 디렉토리 탐색"
        success_criteria: ["경로 발견"]
        acceptable_methods: ["**[OSS] ffuf (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 스캐너 탐지 — WAF 913
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -200 /var/log/apache2/modsec_audit.log | grep -oiE "nikto|913[0-9]{3}" | sort | uniq -c'
      ```
      ## ✅ 합격 기준
      스캐너(nikto)가 WAF 913에 탐지됨을 확인한다.
    hint: 'modsec nikto/913'
    category: analysis
    points: 12
    answer: |
      echo "=== 스캐너 탐지 (WAF 913) ==="
      docker exec el34-web sh -c 'sudo tail -200 /var/log/apache2/modsec_audit.log | grep -oiE "nikto|913[0-9]{3}" | sort | uniq -c'
      echo "→ nikto UA가 913(scanner)에 명확히 탐지. 스캐너는 매우 시끄럽다"
    answer_detail: "스캐너 탐지 = ModSec 913(scanner UA: nikto/sqlmap/nmap). UA 노출 + 요청 폭주로 명확히 탐지."
    verify:
      type: output_contains
      expect: 'nikto'
      field: stdout
      semantic:
        intent: "스캐너 WAF 탐지"
        success_criteria: ["nikto/913 탐지"]
        acceptable_methods: ["**[OSS] modsec 913 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 핑거프린팅 정보 점검
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE 'Server|X-Powered'"
      ```
      ## ✅ 합격 기준
      서버/기술 노출 정보를 점검한다.
    hint: 'Server/X-Powered-By 헤더'
    category: analysis
    points: 12
    answer: |
      echo "=== 핑거프린팅 노출 정보 ==="
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE 'Server|X-Powered|X-AspNet'"
      echo "→ Server 헤더(Apache 버전)/X-Powered-By 노출 = 핑거프린팅 단서. 숨겨야"
    answer_detail: "핑거프린팅 정보 = Server 버전, X-Powered-By 등. 노출되면 CVE 매핑 쉬워짐 → 숨김 필요."
    verify:
      type: output_contains
      expect: 'Server'
      field: stdout
      semantic:
        intent: "핑거프린팅 정보 점검"
        success_criteria: ["Server/기술 노출"]
        acceptable_methods: ["**[OSS] curl -sI Server (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 정보 숨김 + 탐지
      ## 💻 실행 명령
      ```bash
      echo "방어: ServerTokens Prod/ServerSignature Off(버전 숨김), X-Powered-By 제거, 스캐너 UA/빈도 탐지·차단"
      ```
      ## ✅ 합격 기준
      스캐너/핑거프린팅 방어를 정리한다.
    hint: 'ServerTokens + 스캐너 탐지'
    category: report
    points: 10
    answer: |
      echo "=== 방어 ==="
      echo "핑거프린팅: ServerTokens Prod, ServerSignature Off, X-Powered-By 제거, 오류페이지 일반화"
      echo "스캐너 탐지: ModSec 913(UA), rate-limit, 반복 출발지 차단"
      echo "→ 정보를 숨겨 핑거프린팅을 어렵게, 스캐너는 탐지·차단"
    answer_detail: "방어 = 정보 숨김(ServerTokens/버전) + 스캐너 탐지(913/rate). 정찰을 어렵게."
    verify:
      type: output_contains
      expect: 'ServerTokens'
      field: stdout
      semantic:
        intent: "스캐너/핑거프린팅 방어"
        success_criteria: ["정보 숨김", "스캐너 탐지"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 스캐너 점검 보고서
      ## 💻 보고서 양식
      ```markdown
      # 웹취약점 W02 스캐너 보고서 (학번, 이름)
      ## 1. nikto/whatweb/ffuf 결과
      ## 2. 스캐너 탐지(913)
      ## 3. 핑거프린팅 노출
      ## 4. 방어
      ```
      ## ✅ 합격 기준
      보고서에 스캐너 결과 + 방어가 포함된다.
    hint: '스캐너+탐지+방어'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # 웹취약점 W02 스캐너 보고서
      ## 1. nikto(취약점)/whatweb(스택)/ffuf(경로) 자동 점검
      ## 2. 탐지: nikto UA → WAF 913. 매우 시끄러움
      ## 3. 핑거프린팅: Server 버전/X-Powered-By 노출
      ## 4. 방어: 정보 숨김(ServerTokens) + 스캐너 탐지(913/rate)
      ## 결론: 자동 스캐너는 빠르나 탐지된다. 방어는 정보 숨김+탐지
      EOF
    answer_detail: "스캐너 점검 = 자동 도구 효율 + 탐지 trade-off. 방어는 정보 숨김+스캐너 탐지."
    verify:
      type: output_contains
      expect: '스캐너'
      field: stdout
      semantic:
        intent: "스캐너 종합 보고"
        success_criteria: ["스캐너/탐지/방어"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
