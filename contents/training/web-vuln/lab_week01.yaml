      ## 🎯 목표 — HTTP 표면 최소화(하드닝) 방어 정리
      점검으로 찾은 위험을 실제로 줄이는 방어책을 정리해, 발견을 "조치 권고"로 전환한다.

      ## 개념 한 줄
      웹 서버 하드닝의 핵심은 세 축이다 — ① 불필요 메서드 제한(TRACE off), ② 보안 헤더 추가,
      ③ Host 검증. 즉 공격할 입구(HTTP 표면) 자체를 줄인다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 메서드 제한 — 불필요 메서드 차단(TRACE off로 XST 차단)
      echo "① 메서드 제한: Apache <LimitExcept GET POST HEAD>, TraceEnable off"
      # 2) 보안 헤더 추가 — HSTS/CSP/X-Frame-Options/nosniff
      echo "② 보안 헤더: Header set Strict-Transport-Security/Content-Security-Policy/X-Frame-Options/X-Content-Type-Options"
      # 3) Host 검증 — ServerName 고정, 임의 Host 거부(XFF는 신뢰 프록시만)
      echo "③ Host 검증: ServerName 고정, 임의 Host 거부. XFF는 신뢰 프록시만"
      # 4) 결론 — HTTP 표면 최소화가 웹 보안의 기본
      # → HTTP 표면 최소화 = 웹 보안의 기본
      ```

      ## ✅ 합격 기준
      메서드 제한(`LimitExcept`/`TraceEnable off`)·보안 헤더 추가·Host 검증의 세 축이 정리된 방어
      산출물이 출력되면 합격이다.

      ## 도구·옵션 풀이
      - `<LimitExcept GET POST HEAD>` — 나열한 메서드 외 모든 메서드(PUT/DELETE/TRACE 등)를 막는 Apache 지시자.
      - `TraceEnable off` — TRACE 메서드를 비활성화해 XST 를 차단한다.
      - `Header set ...` — 응답에 보안 헤더를 실어 보내는 Apache 지시자.
      - `ServerName 고정` — 임의 Host 요청을 거부해 Host 인젝션을 막는다.
