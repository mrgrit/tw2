lab_id: standalone-web-vuln-week01
title: "HTTP 기초 — 위험 메서드·헤더 악용 vs HTTP 보안 점검"
version: standalone-web-vuln
course: web-vuln
week: 1
description: |
  OWASP WSTG 의 설정·배포 관리(HTTP 메서드/헤더) 점검을 손에 익히는 W01 실습이다. 점검자(웹 진단
  엔지니어)의 시선으로 대상 웹 서버에 (1) curl 로 도달해 응답 코드를 읽고, (2) OPTIONS 로 허용 메서드를
  열거한 뒤, (3) 위험 메서드(PUT/DELETE/TRACE)를 실제로 보내 차단(403/405)인지 허용(200/201)인지
  판별하고, (4) 응답에서 보안 헤더(HSTS/CSP/X-Frame-Options/nosniff) 누락을 식별하며, (5) Host 인젝션·
  X-Forwarded-For 위조 같은 헤더 악용에 서버가 어떻게 반응하는지 관찰한다. 마지막에 (6) 점검 흔적이
  access.log 에 남는 것을 확인하고, (7) 메서드 제한·보안 헤더·Host 검증으로 HTTP 표면을 줄이는 방어를
  정리한 뒤, (8) 1페이지 점검 보고서로 종합한다. 점검은 내부 발판 el34-attacker(출처 10.20.30.202)에서
  fw 게이트웨이 10.20.30.1 을 향해 Host 헤더로 대상 vhost(dvwa.el34.lab, 차단형 WAF)를 지정해 수행한다.
  모든 명령은 인가된 실습 환경(el34)에서만 실행한다.
difficulty: medium
duration_minutes: 150
prerequisites:
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec"
  - "lecture §2(메서드) §3(보안헤더) §4(헤더악용) 숙지"
objectives:
  - "HTTP 요청·응답 구조(메서드·상태 코드·헤더)를 읽고 curl 로 대상 웹 서버에 도달한다"
  - "OPTIONS 로 허용 메서드(Allow 헤더)를 열거하고, 위험 메서드(PUT/DELETE/TRACE)를 실제로 보내 차단/허용을 판별한다"
  - "응답에서 보안 헤더(HSTS/CSP/X-Frame-Options/nosniff) 누락을 식별한다"
  - "Host 인젝션·X-Forwarded-For 위조 등 헤더 악용에 대한 서버 반응을 관찰한다"
  - "점검 흔적(access.log)을 확인하고, 메서드 제한·보안 헤더·Host 검증으로 방어한 뒤 HTTP 점검 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 점검 대상에 도달
      어떤 웹 점검이든 첫 단계는 "대상이 실제로 응답하는가"를 확인하는 것이다. 도달성이 확보되어야
      이후의 메서드·헤더 점검이 의미를 가진다.

      ## 개념 한 줄
      curl 로 HTTP 요청을 보내 응답 코드(상태 코드)를 받는다. 이 트랙의 점검은 내부 발판
      el34-attacker(출처 10.20.30.202)에서 fw 게이트웨이 10.20.30.1 을 향해 `Host:` 헤더로 대상
      vhost(dvwa.el34.lab)를 지정해 수행한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```

      ## ✅ 합격 기준
      출력에 `dvwa=<응답코드>`(예: 200/302/403)가 보이면 대상 도달 성공이다.

      ## 도구·옵션 풀이
      - `docker exec el34-attacker` — el34 호스트에서 점검자(내부 발판) 컨테이너로 명령을 보낸다.
      - `curl` — 명령줄에서 HTTP 요청을 직접 보내는 도구.
      - `-s` 진행 표시 숨김 / `-o /dev/null` 응답 본문 버림 / `-w 'dvwa=%{http_code}\n'` 응답 코드만 출력.
      - `-H 'Host: dvwa.el34.lab'` — 같은 IP 에서 vhost 를 구분하는 Host 헤더 지정.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "WSTG 설정 점검의 첫 단계 = 점검 대상(web vhost, Apache)에 대한 도달성 확인. curl 응답에 dvwa=<코드>가 출력되면(200/302/403 등) attacker→fw→web 경로가 정상이고 대상이 응답하는 것이며, 이후 메서드·헤더 점검을 진행할 수 있다."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — OPTIONS 로 허용 메서드 열거
      서버가 어떤 메서드를 허용하는지 알아야, 다음 단계(위험 메서드 시도)의 후보를 좁힐 수 있다.
      이것이 WSTG 설정 점검의 첫 항목인 "허용된 HTTP 메서드 점검"이다.

      ## 개념 한 줄
      OPTIONS 는 "이 서버가 무엇을 주문받는가"를 묻는 메서드다. 서버는 응답의 `Allow:` 헤더에 허용
      메서드 목록을 담아 돌려준다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -i -X OPTIONS -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE '^Allow|^HTTP' | head -3"
      ```

      ## ✅ 합격 기준
      `Allow:` 헤더의 메서드 목록 또는 상태 라인(`HTTP/1.1 ...`)이 출력되면 합격이다. `Allow` 에
      PUT/DELETE/TRACE 가 보이면 점검 대상이고, 없거나 405 면 제한된 것이다. 단, `Allow` 는 서버의
      자기 신고라 미션 3 에서 실제로 보내 검증한다.

      ## 도구·옵션 풀이
      - `-X OPTIONS` — 요청 메서드를 OPTIONS 로 지정.
      - `-i` — 응답 헤더까지 출력(상태 라인과 Allow 헤더를 보려고).
      - `grep -iE '^Allow|^HTTP'` — 대소문자 무시(`-i`)로 Allow 헤더와 상태 라인만 추려 본다.
      - `head -3` — 출력 상위 3줄만 보여 화면을 깔끔하게 유지한다.
    hint: 'curl -X OPTIONS | grep Allow'
    category: recon
    points: 12
    answer: |
      echo "=== HTTP 메서드 열거 (OPTIONS) ==="
      docker exec el34-attacker sh -c "curl -s -i -X OPTIONS -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE '^Allow|^HTTP' | head -3"
      echo "→ Allow 헤더가 허용 메서드 노출. PUT/DELETE/TRACE 있으면 위험"
    answer_detail: "OPTIONS 로 허용 메서드를 열거한다. 응답의 Allow 헤더에 PUT/DELETE/TRACE 가 있으면 점검 대상(위험 메서드 후보)이고, 없거나 405 면 제한된 것이다. Allow 는 서버의 자기 신고값이라 실제 동작과 다를 수 있으므로 미션 3 에서 직접 보내 검증한다. 출력에 상태 라인(HTTP)이 보이면 OPTIONS 응답을 정상 수신한 것이다."
    verify:
      type: output_contains
      expect: 'HTTP'
      field: stdout
      semantic:
        intent: "OPTIONS 메서드 열거"
        success_criteria: ["Allow/응답 확인"]
        acceptable_methods: ["**[OSS] curl -X OPTIONS (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 위험 메서드(PUT/DELETE/TRACE)를 실제로 시도
      OPTIONS 의 신고와 무관하게, 위험 메서드가 실제로 동작하는지 직접 보내 검증한다. 열려 있으면
      그 자체가 치명적 취약점이다.

      ## 개념 한 줄
      PUT 은 파일을 올리고(웹셸 위험), DELETE 는 콘텐츠를 지우며, TRACE 는 요청을 그대로 되돌려
      XST(쿠키 탈취)에 악용될 수 있다. 응답 코드로 차단/허용을 판별한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'PUT=%{http_code}\n' -X PUT -H 'Host: dvwa.el34.lab' http://10.20.30.1/wvtest.txt"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'DELETE=%{http_code}\n' -X DELETE -H 'Host: dvwa.el34.lab' http://10.20.30.1/wvtest.txt"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'TRACE=%{http_code}\n' -X TRACE -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```

      ## ✅ 합격 기준
      `PUT=`, `DELETE=`, `TRACE=` 각각의 응답 코드가 출력되면 합격이다. **405/403=제한됨(안전)**,
      **200/201=허용됨(위험: PUT 업로드 / DELETE 삭제 / TRACE XST)**. dvwa 는 차단형 WAF 라 보통
      차단된다.

      ## 도구·옵션 풀이
      - `-X PUT` / `-X DELETE` / `-X TRACE` — 위험 메서드를 각각 지정해 보낸다.
      - `/wvtest.txt` — PUT/DELETE 의 대상 경로(점검용 임시 파일명). 실제로 생성/삭제되는지 코드로 판별.
      - `-w '...=%{http_code}\n'` — 본문 없이 응답 코드만 한 줄로 출력.
    hint: 'PUT/TRACE 응답코드'
    category: manipulation
    points: 12
    answer: |
      echo "=== 위험 메서드 시도 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'PUT=%{http_code}\n' -X PUT -H 'Host: dvwa.el34.lab' http://10.20.30.1/wvtest.txt"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'DELETE=%{http_code}\n' -X DELETE -H 'Host: dvwa.el34.lab' http://10.20.30.1/wvtest.txt"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'TRACE=%{http_code}\n' -X TRACE -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      echo "→ 405/403=제한(안전), 200/201=허용(위험: PUT 업로드/DELETE 삭제/TRACE XST)"
    answer_detail: "위험 메서드를 실제로 보내 응답 코드로 판별한다 — PUT(파일 업로드/웹셸), DELETE(콘텐츠 삭제), TRACE(XST 쿠키 탈취). 405(메서드 불허)/403(WAF 차단)이면 제한됨(안전 신호)이고, 200/201(생성됨)이면 그 메서드가 실제로 열려 있는 것으로 즉시 보고할 고위험 취약점이다. dvwa.el34.lab 은 차단형 WAF 라 정상적으로는 차단된다. 채점은 PUT= 응답이 출력되는지로 시도 수행을 확인한다."
    verify:
      type: output_contains
      expect: 'PUT='
      field: stdout
      semantic:
        intent: "위험 메서드 점검"
        success_criteria: ["PUT/DELETE/TRACE 응답"]
        acceptable_methods: ["**[OSS] curl -X PUT/TRACE (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 보안 헤더 누락 식별
      응답에 보안 헤더가 빠져 있으면 그 자체가 취약점이거나, XSS·클릭재킹 같은 다른 공격의 피해를
      키운다. 누락 식별은 빠르고 확실한 점검이다.

      ## 개념 한 줄
      보안 헤더는 서버가 브라우저에게 "이렇게 안전하게 동작하라"고 강제하는 응답 헤더다 — HSTS(HTTPS
      강제), CSP(스크립트 출처 제한/XSS 완화), X-Frame-Options(클릭재킹 방지), nosniff(MIME 스니핑 방지).

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE 'strict-transport|content-security|x-frame|x-content' || echo '주요 보안 헤더 누락(HSTS/CSP/X-Frame)'"
      ```

      ## ✅ 합격 기준
      보안 헤더가 출력되면 적용된 것, `grep` 이 하나도 못 찾아 "주요 보안 헤더 누락"이 출력되면 누락이다.
      누락은 낮음~중간 위험으로 평가하되 보고 대상이다.

      ## 도구·옵션 풀이
      - `-I` — HEAD 요청. 본문 없이 응답 헤더만 받아 빠르게 확인한다.
      - `grep -iE 'strict-transport|content-security|x-frame|x-content'` — 네 보안 헤더 이름을 한 번에 검색.
      - `|| echo '주요 보안 헤더 누락(HSTS/CSP/X-Frame)'` — grep 이 아무것도 못 찾으면(누락) 이 메시지를 대신 출력.
    hint: 'curl -sI 보안 헤더 grep'
    category: analysis
    points: 12
    answer: |
      echo "=== 보안 헤더 점검 ==="
      docker exec el34-attacker sh -c "curl -sI -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -iE 'strict-transport|content-security|x-frame|x-content' || echo '주요 보안 헤더 누락(HSTS/CSP/X-Frame)'"
      echo "→ 누락된 헤더 = 취약점. HSTS(HTTPS강제)/CSP(XSS완화)/X-Frame(클릭재킹)/nosniff"
    answer_detail: "응답 헤더에서 보안 헤더 4종의 누락을 식별한다 — HSTS(HTTPS 강제), CSP(XSS 완화), X-Frame-Options(클릭재킹 방지), X-Content-Type-Options: nosniff(MIME 스니핑 방지). 헤더가 보이면 적용된 것, 안 보여 '보안 헤더 누락'이 출력되면 누락(낮음~중간 위험, 보고 대상)이다. 존재만으로 안전을 단정하지 않는다(정책 품질은 심화 점검). 채점은 출력에 '헤더' 문자열이 포함되는지로 점검 수행을 확인한다."
    verify:
      type: output_contains
      expect: '헤더'
      field: stdout
      semantic:
        intent: "보안 헤더 누락 점검"
        success_criteria: ["보안 헤더 존재/누락 확인"]
        acceptable_methods: ["**[OSS] curl -sI 헤더 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 헤더 악용(Host 인젝션 / X-Forwarded-For 위조)에 대한 서버 반응 관찰
      서버가 요청 헤더 값을 신뢰해 동작을 바꾸는지 본다. Host 인젝션은 비밀번호 재설정 링크 변조·
      계정 탈취·캐시 포이즌으로, XFF 위조는 IP 기반 접근 통제·로깅 우회로 이어질 수 있다.

      ## 개념 한 줄
      Host 헤더는 "어느 사이트로 가는 요청인가"를, X-Forwarded-For 는 "원래 클라이언트 IP 가
      무엇인가"를 알린다. 이 값을 일부러 조작해 서버가 위험하게 반응하는지를 점검한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'evilhost=%{http_code}\n' -H 'Host: evil.attacker.com' http://10.20.30.1/"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xff=%{http_code}\n' -H 'Host: dvwa.el34.lab' -H 'X-Forwarded-For: 127.0.0.1' http://10.20.30.1/"
      ```

      ## ✅ 합격 기준
      `evilhost=<코드>` 와 `xff=<코드>` 가 출력되면 합격이다. 응답 코드·동작 변화를 정상 요청과
      비교해, 서버가 조작된 헤더를 얼마나 신뢰하는지를 판단한다.

      ## 도구·옵션 풀이
      - `-H 'Host: evil.attacker.com'` — 정상 vhost 대신 임의 Host 를 보내 거부 여부를 본다(Host 인젝션).
      - `-H 'X-Forwarded-For: 127.0.0.1'` — 정상 Host 는 유지한 채 XFF 만 위조해 IP 통제/로깅 우회를 본다.
      - `-w 'evilhost=%{http_code}'` / `-w 'xff=%{http_code}\n'` — 각 시도의 응답 코드만 라벨과 함께 출력.
    hint: 'Host: evil + X-Forwarded-For'
    category: manipulation
    points: 12
    answer: |
      echo "=== 헤더 악용 ==="
