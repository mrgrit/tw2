lab_id: standalone-web-vuln-week13
title: "자동화 스캐닝 — nuclei/dalfox 템플릿 점검 vs 자동화의 한계"
version: standalone-web-vuln
course: web-vuln
week: 13
description: |
  템플릿 기반 자동 취약점 스캐닝과 그 한계를 한 바퀴로 점검한다. nuclei(템플릿=YAML 서명 기반
  대량 스캐너)로 기술 탐지·보안 헤더 누락·HSTS 누락을 자동으로 찾고, dalfox(XSS 특화 스캐너)로 XSS
  자동 점검을 돌려 el34 dvwa 에서 WAF(ModSecurity 941)에 막혀 '무탐'이 나오는 것을 관찰한다. 핵심
  깨달음: '무탐 = 안전'이 아니다(WAF가 가렸을 뿐). 이어 자동화가 구조적으로 못 보는 영역(로직/인가
  취약점 — W12 BOLA 같은 — 은 템플릿화 불가)을 정리하고, 스캐너 결과를 방어(헤더 보강·CVE 패치·CI/CD
  통합)로 연결하되 수동 점검과 병행한다는 운영 원칙을 세운다. 표적은 juice/dvwa, 공격은 el34-attacker
  컨테이너, 인가된 실습만. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 docker exec 로 실행한다.
  도구: nuclei v3.3.5(템플릿 10,964개 — egress 차단된 컨테이너 대신 호스트에서 받아 docker cp 로 주입,
  lecture §2.5 참고)/dalfox/httpx 탑재. nuclei 출력 순서는 비결정적이라 합격은 줄 순서가 아니라 키워드
  포함 여부로 판정한다.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "W01–W12 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(nuclei) §2.1(템플릿 설치) §4(한계) 숙지"
objectives:
  - "nuclei(템플릿 기반 스캐너)로 기술 스택과 누락 보안 헤더(CSP/HSTS 등)를 대량 자동 점검한다"
  - "수동(W10 HSTS)과 자동(nuclei) 결과를 교차검증해 발견의 신뢰도를 높인다"
  - "dalfox로 XSS 자동 점검을 돌려 WAF(941) 차단에 의한 '무탐'을 관찰하고 '무탐≠안전'을 입증한다"
  - "자동화가 구조적으로 못 보는 영역(로직/인가 취약점, 오탐/미탐)을 정리한다"
  - "스캐너 결과를 방어(헤더 보강·CVE 패치·CI/CD 통합)로 연결하되 수동 점검과 병행한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 표적 도달성
      자동 스캔의 전제는 표적에 요청이 닿는다는 것이다. 연결이 안 되면 이후 스캐너의 모든 '무탐'이
      무의미하므로(없는 게 아니라 못 닿은 것), 본격 스캔 전에 항상 도달성부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) juice vhost 도달 확인 — Host로 표적 지정, 본문 버리고 응답코드만 juice= 형식으로(무탐과 미도달 혼동 방지)
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
      ```
      - `curl` = 명령줄 HTTP 클라이언트. `-H 'Host: juice.el34.lab'` 로 표적 vhost(JuiceShop)를 지정하고,
        `-sk`(조용히·인증서 무시) `-o /dev/null`(본문 버림) `-w '...%{http_code}'`(응답 코드만 출력) 으로
        도달 여부만 빠르게 확인한다.
      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice` 와 함께 응답 코드(보통 `juice=200`)가 돌아오면 표적 도달 —
      스캔 착수 가능(무탐이 '없음'인지 '미도달'인지 혼동하지 않게 된다).
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) juice vhost 도달 확인 — Host로 표적 지정, 본문 버리고 응답코드만 juice= 형식으로(무탐과 미도달 혼동 방지)
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "자동화 스캐닝 표적 = JuiceShop(juice.el34.lab). curl 로 fw→web 경로 도달성을 먼저 확인해, 이후 스캐너 무탐이 '취약점 없음'인지 '표적 미도달'인지 혼동하지 않게 한다."
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 기술 탐지 — nuclei tech-detect
      점검의 첫 자동화는 표적이 '무엇으로 만들어졌는가'를 알아내는 핑거프린팅이다. nuclei 는 점검 로직을
      코드가 아니라 **템플릿(YAML 서명)** 으로 분리한 스캐너로, 템플릿 1개가 응답 단서를 보고 기술을
      자동 식별한다. 기술 스택을 알면 그에 맞는 CVE·오설정 점검으로 좁혀 갈 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) nuclei tech-detect 템플릿 1개로 표적의 사용 기술을 자동 핑거프린팅(-H로 vhost, -silent 매치만, -nc 색상끔)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/technologies/tech-detect.yaml -silent -nc 2>/dev/null"
      # 2) 해석 — tech-detect 템플릿이 기술(google-font-api 등)을 자동 식별(사람의 수동 헤더 분석을 대체)
      echo "→ tech-detect 템플릿이 기술(google-font-api 등) 자동 핑거프린팅"
      ```
      - `nuclei` = 템플릿 기반 대량 스캐너. `-u` 기본 URL, `-H 'Host: ...'` 표적 vhost 지정,
        `-t <경로>` 사용할 **템플릿** 지정(여기서는 기술 탐지 1개), `-silent` 매치 결과만 출력,
        `-nc` 색상 끔. (템플릿은 egress 차단된 컨테이너 대신 호스트에서 받아 주입한 것 — lecture §2.5.)
      ## ✅ 합격 기준
      `tech-detect` 출력 시 통과. **근거:** tech-detect 매치가 나타나 기술(예: google-font-api)이 자동
      탐지되면 합격 — 출력 순서는 비결정적이므로 줄 위치가 아니라 매치 내용으로 판정한다.
    hint: 'tech-detect'
    category: recon
    points: 14
    answer: |
      # 1) nuclei tech-detect 템플릿 1개로 표적의 사용 기술을 자동 핑거프린팅(-H로 vhost, -silent 매치만, -nc 색상끔)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/technologies/tech-detect.yaml -silent -nc 2>/dev/null"
      # 2) 해석 — tech-detect 템플릿이 기술(google-font-api 등)을 자동 식별(사람의 수동 헤더 분석을 대체)
      echo "→ tech-detect 템플릿이 기술(google-font-api 등) 자동 핑거프린팅"
    answer_detail: "nuclei tech-detect = 응답 단서로 사용 기술을 자동 핑거프린팅하는 템플릿. 템플릿 1개가 사람의 수동 헤더 분석을 대신한다. 합격은 `tech-detect` 매치(기술 1건 이상) 포함 여부로 판정 — 출력 순서는 비결정적."
    verify:
      type: output_contains
      expect: 'tech-detect'
      field: stdout
      semantic:
        intent: "기술 자동 탐지"
        success_criteria: ["tech-detect 매치"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 보안 헤더 누락 — nuclei
      누락된 보안 헤더(CSP/HSTS 등)는 매우 흔한 오설정인데, 손으로 하나하나 확인하면 지루하다. 자동화가
      가장 빛나는 영역이다. **보안 헤더** = 브라우저에 안전 정책을 지시하는 HTTP 응답 헤더로, 빠지면
      XSS·다운그레이드 등에 노출된다. 템플릿 하나가 여러 헤더 누락을 한 번에 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) nuclei 오설정 템플릿 1개로 누락 보안 헤더(CSP/HSTS/Referrer/COOP 등)를 일괄 탐지(앞 10줄만)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | head -10"
      # 2) 해석 — 템플릿 1개로 여러 헤더 누락을 한 번에 점검(수동 점검 여러 번을 대체)
      echo "→ CSP/Referrer-Policy/COOP 등 다수 누락. 템플릿 1개로 모든 헤더 점검"
      ```
      - `http-missing-security-headers.yaml` = CSP·HSTS·Referrer-Policy·COOP 등 **누락 헤더를 일괄 탐지**
        하는 오설정 템플릿. `| head -10` 은 출력이 많을 때 앞 10줄만 본다(전체를 봐도 무방).
      ## ✅ 합격 기준
      `missing-security-headers` 출력 시 통과. **근거:** missing-security-headers 매치가 다수 나타나면
      누락 헤더가 일괄 탐지된 것 — 없으면 표적·템플릿 경로를 재확인(출력 순서는 비결정적, 내용으로 판정).
    hint: 'missing-security-headers'
    category: manipulation
    points: 14
    answer: |
      # 1) nuclei 오설정 템플릿 1개로 누락 보안 헤더(CSP/HSTS/Referrer/COOP 등)를 일괄 탐지(앞 10줄만)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | head -10"
      # 2) 해석 — 템플릿 1개로 여러 헤더 누락을 한 번에 점검(수동 점검 여러 번을 대체)
      echo "→ CSP/Referrer-Policy/COOP 등 다수 누락. 템플릿 1개로 모든 헤더 점검"
    answer_detail: "nuclei 오설정 템플릿 1개가 CSP/HSTS/Referrer-Policy/COOP 등 누락 보안 헤더를 일괄 탐지한다 — 수동 점검 여러 번을 대체. 합격은 `missing-security-headers` 매치 포함 여부(다수)로 판정. 방어자도 같은 템플릿으로 자기 사이트 누락 헤더를 찾아 닫는다."
    verify:
      type: output_contains
      expect: 'missing-security-headers'
      field: stdout
      semantic:
        intent: "보안 헤더 누락 탐지"
        success_criteria: ["헤더 누락 매치"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 HSTS 누락 확정 — 수동·자동 교차검증
      W10 에서 학생은 **수동**으로 HSTS 부재를 확인했다. 같은 결함을 **자동** 스캐너가 재확인하면, 서로
      독립적인 두 방법이 같은 결론에 도달했으므로 발견의 **신뢰도가 올라간다**(교차검증). HSTS
      (HTTP Strict Transport Security) = '이 사이트는 항상 HTTPS 로만 접속하라'고 브라우저에 강제하는 헤더로,
      빠지면 평문(HTTP) 다운그레이드 공격에 노출된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 같은 누락-헤더 템플릿 출력에서 HSTS(strict-transport-security) 한 줄만 추려 누락 확정(W10 수동 결과와 교차검증)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | grep strict-transport-security"
      # 2) 해석 — W10(TLS)에서 본 HSTS 부재를 스캐너가 자동 확정, 수동·자동 일치가 신뢰도를 올림
      echo "→ W10(TLS)에서 본 HSTS 부재를 스캐너가 자동 확정. 수동·자동 결과 교차검증"
      ```
      - 미션 3 의 누락 헤더 출력에서 `| grep strict-transport-security` 로 HSTS 한 줄만 추려, 누락을
        콕 집어 확정한다.
      ## ✅ 합격 기준
      `strict-transport-security` 출력 시 통과. **근거:** strict-transport-security 매치가 나타나면 HSTS
      누락 확정(수동=자동 일치) — 없으면 미션 3 의 헤더 스캔이 정상 동작했는지부터 확인한다.
    hint: 'strict-transport-security'
    category: analysis
    points: 14
    answer: |
      # 1) 같은 누락-헤더 템플릿 출력에서 HSTS(strict-transport-security) 한 줄만 추려 누락 확정(W10 수동 결과와 교차검증)
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | grep strict-transport-security"
      # 2) 해석 — W10(TLS)에서 본 HSTS 부재를 스캐너가 자동 확정, 수동·자동 일치가 신뢰도를 올림
      echo "→ W10(TLS)에서 본 HSTS 부재를 스캐너가 자동 확정. 수동·자동 결과 교차검증"
    answer_detail: "HSTS(strict-transport-security) 누락을 nuclei 가 자동 확정 — W10 수동 점검과 같은 결론. 두 독립 방법의 일치(교차검증)가 발견의 신뢰도를 올린다. 합격은 `strict-transport-security` 매치 포함 여부."
    verify:
      type: output_contains
      expect: 'strict-transport-security'
      field: stdout
      semantic:
        intent: "HSTS 누락 확정"
        success_criteria: ["HSTS 매치"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 XSS 자동화 — dalfox (WAF 차단 = '무탐' 관찰)
      본 주차의 가장 중요한 깨달음을 직접 체험하는 미션이다 — 스캐너의 '무탐'은 '안전'이 아니다.
      **dalfox** = XSS(W06) 한 종류에 특화된 자동 스캐너로, 파라미터에 XSS 페이로드를 자동 변이·주입하고
      실행 여부를 검증한다. 그런데 el34 의 dvwa 는 WAF(ModSecurity)가 차단 모드라, XSS 페이로드가 CRS
      **941(XSS) 룰**에 걸려 **403** 으로 막힌다. 그래서 dalfox 는 실행 가능한 XSS 를 못 찾는다 — 즉 무탐.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) dalfox로 XSS 자동 점검(파라미터에 페이로드 자동 변이·주입) — dvwa는 WAF(941)가 403 차단 → 무탐, 끝나면 dalfox=done
      docker exec el34-attacker sh -c "timeout 60 dalfox url 'http://10.20.30.1/?q=test' -H 'Host: dvwa.el34.lab' --silence --no-color 2>&1; echo dalfox=done"
      # 2) 해석 — ModSec(941)이 XSS payload 차단 → dalfox 무탐, '무탐=안전' 아님(WAF가 가림)
      echo "→ ModSec(941)이 XSS payload 차단 → dalfox 무탐. '무탐=안전' 아님(WAF가 가림). 자동화 한계"
      ```
      - `dalfox url '<URL>'` 점검 표적, `-H 'Host: dvwa.el34.lab'` 표적 vhost(DVWA), `--silence` 결과 위주
        출력, `--no-color` 색상 끔. `timeout 60` 으로 최대 60초 제한, 끝나면 `dalfox=done` 출력.
      ## ✅ 합격 기준
      `dalfox=done` 출력 시 통과. **근거:** 스캔이 끝까지 실행되어 dalfox=done 이 나오면 무탐(자동화 한계)
