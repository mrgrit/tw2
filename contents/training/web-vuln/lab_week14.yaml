      ## 🎯 목표
      발견마다 **구체적 수정 권고**를 제시한다.

      ## 📖 개념 (왜 이걸 하나)
      권고는 "고쳐라"가 아니라 **무엇을 어떻게**까지 구체적이어야 한다(lecture §5.2). 가능하면
      **근본 수정(fix)** 과 **임시 완화(mitigation)** 를 구분한다 — WAF 룰(완화)은 빠르지만 우회·오설정에
      약하고, 파라미터화 쿼리 같은 근본 수정은 코드 변경이라 시간이 걸린다. 둘을 함께 제시하면 조직이
      "오늘 완화를 켜고 다음 릴리스에 근본 수정"이라는 현실적 계획을 세운다.
      처음 나오는 **CSP**(Content-Security-Policy)는 브라우저가 실행할 스크립트 출처를 제한하는 보안 헤더,
      **allowlist**(허용 목록)는 허용된 입력만 통과시키는 검증 방식이다.

