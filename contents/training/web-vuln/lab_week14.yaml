      ## 📖 개념 (왜 이걸 하나)
      **PoC(Proof of Concept)** 는 취약점이 실재함을 보이는 재현 절차와 증거다(lecture §5.1). 보고서에
      "SQLi 가 있다"는 주장일 뿐 — 개발자는 그것만으로 고칠 수 없고 의심하면 반박한다. PoC 는 "이 요청을
      보내면 이 응답이 돌아온다"여야 한다. 보고서의 신뢰는 주장이 아니라 **재현 가능성**에서 나온다.
      좋은 PoC = **재현 명령 + 응답 증거 + 영향**.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
