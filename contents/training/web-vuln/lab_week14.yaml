      표준 구조의 한 문서로 종합해야 점검이 완성된다(lecture §6.1). 표준 5절 구조:
      ① Executive Summary(경영진용 요약) ② 범위/방법론(대상·기간·표준) ③ 발견 상세(제목·심각도·CVSS·PoC·
      영향·권고) ④ 위험 매트릭스(가능성×영향) ⑤ 권고 요약(우선순위별 조치·SLA).
      한 문서가 두 독자 — 위험만 빠르게 알 경영진(①)과 재현·CVSS·권고를 정밀히 볼 개발자/감사(③) — 를
      모두 만족시킨다. 처음 나오는 **WSTG**(OWASP 웹앱 점검 표준 절차서)·**PTES**(침투 테스트 실행 표준)는
      방법론 절에 명시해 점검이 즉흥이 아닌 재현 가능한 공정이었음을 보인다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 표준 5절 전문 보고서를 출력 — Exec→범위/방법론→발견(심각도·CVSS·PoC·권고)→우선순위→결론
      cat <<'EOF'
      # 웹 침투 점검 보고서
      ## 1. Executive Summary: Critical 2 포함 6건. 무인증 원격 데이터 침해 가능. 즉시 조치 필요
      ## 2. 범위/방법론: JuiceShop/dvwa, WSTG, el34 인가 실습
      ## 3. 발견:
      ##   - SQLi 9.8 Critical: PoC(' OR 1=1--), 영향(DB 침해), 권고(파라미터화)
      ##   - RCE 9.8 Critical: PoC(;id), 영향(시스템 장악), 권고(입력검증)
      ##   - A01 7.5 High: PoC(admin-config 200), 권고(서버측 인가)
      ##   - 정보노출/XSS/헤더 Medium: 권고(generic에러/인코딩/CSP·HSTS)
      ## 4. 우선순위: Critical 2 → A01 → Medium. 가능성×영향 매트릭스
      ## 결론: 발견을 CVSS로 정량화하고 우선순위·권고로 행동 가능하게 전달
      EOF
      ```

      ## ✅ 합격 기준
      `CVSS` 출력 시 통과. **근거:** Executive Summary + 범위/방법론 + 발견 상세(심각도/CVSS/PoC/권고) +
      우선순위가 한 문서로 묶이면 점검의 최종 산출물이 완성된다(이 양식이 W15 기말의 보고서 틀).
