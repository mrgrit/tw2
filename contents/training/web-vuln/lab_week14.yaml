lab_id: standalone-web-vuln-week14
title: "위험 평가(CVSS)와 전문 보고서 — 발견을 행동으로"
version: standalone-web-vuln
course: web-vuln
week: 14
description: |
  발견을 행동으로 바꾸는 마지막 단계 — 위험 평가와 전문 보고. W01~W13 에서 찾은 취약점(SQLi·XSS·
  RCE·접근제어 A01·정보 노출·보안 헤더 누락)을 한 목록으로 취합하고, CVSS 3.1 의 8개 메트릭
  (AV·AC·PR·UI·S·C·I·A)으로 벡터/점수를 산정한 뒤, 점수→심각도 등급(Critical~Low) 변환, 가능성×
  영향(OWASP Risk Rating) 우선순위, 재현 가능한 증거(PoC)와 구체 권고, 비전문가용 Executive Summary,
  그리고 전 구조를 갖춘 전문 보고서까지 작성한다. el34(JuiceShop/dvwa) 발견 참조. 본 주차는 분석·
  문서 중심이라 신규 도구 설치가 없으며, 인가된 실습 결과만 다룬다. lecture §2(CVSS 메트릭)·§3(심각도
  등급)·§4(우선순위)·§5(PoC/권고)·§6(보고서 구조)와 1:1 로 대응한다.
difficulty: medium
duration_minutes: 150
prerequisites:
  - "W01–W13 통과 (평가 대상 발견을 직접 입증했어야 함)"
  - "lecture §2(CVSS 8개 메트릭) §3(심각도 등급) §4(가능성×영향 우선순위) §5(PoC/권고) §6(보고서 구조) 숙지"
objectives:
  - "W01~W13 발견을 위험 평가용 단일 목록으로 취합한다"
  - "CVSS 3.1 8개 메트릭으로 무인증 원격 SQLi 의 벡터를 구성하고 9.8(Critical)임을 설명한다"
  - "CVSS 점수를 심각도 등급(Critical~Low)으로 변환하고 발견을 등급별로 자리매김한다"
  - "악용 가능성 × 자산 중요도로 수정 우선순위를 세운다"
  - "발견마다 재현 가능한 증거(PoC)와 근본·완화를 구분한 구체 권고를 문서화한다"
  - "경영진용 Executive Summary 와 전 구조의 전문 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      W01~W13 동안 직접 입증한 모든 발견을 **위험 평가용 단일 목록**으로 취합한다.

      ## 📖 개념 (왜 이걸 하나)
      위험 평가의 첫 단계는 평가 대상을 정의하는 것이다(lecture §1.2 파이프라인 ①의 입력). 발견이
      여러 주차에 흩어져 있으면 무엇을 점수화·우선순위화할지 정해지지 않는다. 실무에서도 보고서 작성
      전에 "발견 목록(findings inventory)"을 먼저 확정하고, 이후 모든 평가가 이 목록을 기준으로 진행된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) W01~W13 발견을 위험 평가용 단일 목록으로 취합(각 발견에 출처 주차 표기)
      echo "1) SQLi (인증 우회/주입) — W04/W08"
      echo "2) XSS (reflected/stored) — W05"
      echo "3) RCE (명령주입/PHP) — W07"
      echo "4) 접근제어 A01 (무인증 관리/강제브라우징) — W09"
      echo "5) 정보 노출 (SQLITE_ERROR/배너) — W11"
      echo "6) 전송/헤더 (자체서명 인증서/HSTS 누락) — W10/W13"
      # 2) 종합 — 발견 6종을 위험 평가 대상으로
      echo "→ 발견 6종을 위험 평가 대상으로"
      ```

      ## ✅ 합격 기준
      `발견` 출력 시 통과. **근거:** 발견(SQLi·XSS·RCE·접근제어 A01·정보 노출·보안 헤더 누락) 6종이 한
      목록으로 취합되면 이후 모든 평가의 기준이 선다(각 발견의 출처 주차를 적으면 추적성↑).
    hint: '발견 목록'
    category: survey
    points: 10
    answer: |
      # 1) W01~W13 발견을 위험 평가용 단일 목록으로 취합(각 발견에 출처 주차 표기)
      echo "1) SQLi (인증 우회/주입) — W04/W08"
      echo "2) XSS (reflected/stored) — W05"
      echo "3) RCE (명령주입/PHP) — W07"
      echo "4) 접근제어 A01 (무인증 관리/강제브라우징) — W09"
      echo "5) 정보 노출 (SQLITE_ERROR/배너) — W11"
      echo "6) 전송/헤더 (자체서명 인증서/HSTS 누락) — W10/W13"
      # 2) 종합 — 발견 6종을 위험 평가 대상으로
      echo "→ 발견 6종을 위험 평가 대상으로"
    answer_detail: "발견 취합 = W01~W13 전 발견(SQLi/XSS/RCE/접근제어 A01/정보 노출/보안 헤더 누락 6종)을 위험 평가용 단일 목록으로 정리하는 단계. 이후 모든 CVSS 산정·우선순위·보고가 이 목록을 기준으로 진행되므로, 출력에 발견 목록이 보이면(키워드 `발견` 포함) 통과. 채점은 발견을 빠짐없이 모았는가를 본다."
    expected_output: |
      1) SQLi (인증 우회/주입) — W04/W08
      2) XSS (reflected/stored) — W05
      3) RCE (명령주입/PHP) — W07
      4) 접근제어 A01 (무인증 관리/강제브라우징) — W09
      5) 정보 노출 (SQLITE_ERROR/배너) — W11
      6) 전송/헤더 (자체서명 인증서/HSTS 누락) — W10/W13
      → 발견 6종을 위험 평가 대상으로
    verify:
      type: output_contains
      expect: '발견'
      field: stdout
      semantic:
        intent: "발견 취합"
        success_criteria: ["발견 목록"]
        acceptable_methods: ["**[관리적] 취합 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      무인증 원격 SQLi(JuiceShop 로그인 우회, W04·W08 에서 입증)의 **CVSS 3.1 벡터/점수**를 구성한다.

      ## 📖 개념 (왜 이걸 하나)
      **CVSS(Common Vulnerability Scoring System)** 는 취약점 위험을 0.0~10.0 으로 표준화한 채점 체계다
      (lecture §2). 기본 점수는 8개 메트릭으로 정해진다 —
      **AV**(공격 벡터: N네트워크/A인접/L로컬/P물리), **AC**(복잡도: L낮음/H높음),
      **PR**(필요 권한: N없음/L낮음/H높음), **UI**(사용자 상호작용: N불필요/R필요),
      **S**(범위: U불변/C변경), **C·I·A**(기밀/무결/가용 영향: H높음/L낮음/N없음).
      각 메트릭은 "얼마나 쉽게 공격하나(AV·AC·PR·UI) · 영향이 경계를 넘나(S) · 성공하면 무엇이 깨지나(C·I·A)"를 묻는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 무인증 원격 SQLi의 CVSS 3.1 벡터를 8개 메트릭으로 구성
      echo "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
      # 2) 각 메트릭 근거 — AV:N(원격) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)
      echo "→ AV:N(네트워크) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)"
      # 3) 점수 — 9.8(Critical), 범위가 S:U라 10.0은 아님
      echo "→ 점수 9.8 (Critical)"
      ```

      ## ✅ 합격 기준
      `9.8` 출력 시 통과. **근거:** AV:N·AC:L·PR:N·UI:N·S:U·C/I/A:H 벡터를 근거와 함께 구성하면 점수
      9.8(Critical) — 10.0 이 아닌 이유는 범위가 불변 S:U 이기 때문(lecture §2.5). el34 는 인터넷 차단이라
      강의 제시 표준 벡터/점수를 기준으로 한다.
    hint: 'CVSS:3.1 9.8'
    category: analysis
    points: 16
    answer: |
      # 1) 무인증 원격 SQLi의 CVSS 3.1 벡터를 8개 메트릭으로 구성
      echo "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
      # 2) 각 메트릭 근거 — AV:N(원격) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)
      echo "→ AV:N(네트워크) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)"
      # 3) 점수 — 9.8(Critical), 범위가 S:U라 10.0은 아님
      echo "→ 점수 9.8 (Critical)"
    answer_detail: "CVSS 3.1 기본 점수 = 8개 메트릭(AV·AC·PR·UI·S·C·I·A)으로 산정. 무인증 원격 SQLi 는 AV:N(원격)·AC:L(' OR 1=1-- 한 줄로 매번)·PR:N(인증 불필요)·UI:N(공격자 혼자 완결)·S:U(영향이 앱 DB 안)·C:H/I:H/A:H(DB 전체 읽기·쓰기·삭제) → 점수 9.8(Critical). 10.0 이 아닌 것은 S:U 때문. 채점은 점수 9.8 이 보이는가(벡터의 근거가 일관되는가)를 본다."
    expected_output: |
      CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
      → AV:N(네트워크) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)
      → 점수 9.8 (Critical)
    verify:
      type: output_contains
      expect: '9.8'
      field: stdout
      semantic:
        intent: "CVSS 벡터 구성"
        success_criteria: ["벡터/점수"]
        acceptable_methods: ["**[표준] CVSS 3.1 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      발견을 **CVSS 점수 → 심각도 등급(라벨)** 으로 분류한다.

      ## 📖 개념 (왜 이걸 하나)
      숫자 점수(9.8)는 정확하지만, 보고서를 읽는 사람은 라벨(Critical=긴급)을 더 직관적으로 받아들인다.
      CVSS 는 점수 구간마다 등급을 정해두었다(lecture §3) —
      **Critical 9.0~10.0 / High 7.0~8.9 / Medium 4.0~6.9 / Low 0.1~3.9 / None 0.0**.
      이 등급은 보고서 정렬 순서와 SLA(수정 기한: Critical 즉시, Low 여유)의 근거가 된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 각 발견을 CVSS 점수→심각도 등급(라벨)으로 분류
      echo "SQLi(인증우회): 9.8 Critical"
      echo "RCE(명령주입): 9.8 Critical"
      echo "XSS(reflected): 6.1 Medium"
      echo "정보 노출(DB에러): 5.3 Medium"
      echo "보안 헤더 누락(HSTS): 4.3 Medium"
      # 2) 등급 구간 — 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low
      echo "→ 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low"
      ```

      ## ✅ 합격 기준
      `Critical` 출력 시 통과. **근거:** el34 발견이 등급별로 자리매김(SQLi/RCE 9.8 Critical, A01 7.5 High,
      XSS 6.1·정보 노출 5.3·HSTS 4.3 Medium)되면 보고서 정렬·SLA 근거가 선다(등급이 점수 구간과 어긋나면 구간표 재확인).

      ## 💡 주의 — WAF 차단은 등급을 낮추지 않는다
      el34 의 dvwa 는 ModSec(932/941/942)로 일부 공격을 403 차단하지만, **차단은 완화이지 수정이 아니다.**
      등급은 "WAF 가 없다고 가정한 근본 취약점"으로 매기고, 차단 현황은 보고서에 *완화 현황*으로 따로 적는다.
    hint: 'Critical/High/Medium'
    category: analysis
    points: 14
    answer: |
      # 1) 각 발견을 CVSS 점수→심각도 등급(라벨)으로 분류
      echo "SQLi(인증우회): 9.8 Critical"
      echo "RCE(명령주입): 9.8 Critical"
      echo "XSS(reflected): 6.1 Medium"
      echo "정보 노출(DB에러): 5.3 Medium"
      echo "보안 헤더 누락(HSTS): 4.3 Medium"
      # 2) 등급 구간 — 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low
      echo "→ 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low"
    answer_detail: "심각도 = CVSS 점수→라벨 변환(9.0+ Critical, 7.0+ High, 4.0+ Medium, 0.1+ Low, 0.0 None). el34 발견: SQLi/RCE 9.8 Critical, 무인증 정보 노출형 A01 7.5 High, reflected XSS 6.1·제한적 정보 노출 5.3·HSTS 누락 4.3 Medium. 등급은 보고서 정렬·SLA 의 근거. 채점은 출력에 Critical 이 보이고 등급이 점수 구간과 일관되는가를 본다(WAF 차단은 등급을 낮추지 않음)."
    expected_output: |
      SQLi(인증우회): 9.8 Critical
      RCE(명령주입): 9.8 Critical
      XSS(reflected): 6.1 Medium
      정보 노출(DB에러): 5.3 Medium
      보안 헤더 누락(HSTS): 4.3 Medium
      → 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low
    verify:
      type: output_contains
      expect: 'Critical'
      field: stdout
      semantic:
        intent: "심각도 분류"
        success_criteria: ["점수→등급"]
        acceptable_methods: ["**[표준] CVSS 등급 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      **가능성 × 영향**으로 발견의 수정 우선순위를 정한다.

      ## 📖 개념 (왜 이걸 하나)
      CVSS 등급만으로는 Critical 이 여럿일 때 무엇부터 할지 안 갈린다. 실무는 CVSS 위에
      **OWASP Risk Rating**(위험 = 가능성 × 영향)을 한 겹 더 얹는다(lecture §4). **가능성**은
      "실제로 악용될 확률"(공개 익스플로잇·무인증·노출 정도), **영향**은 "악용 시 피해"(데이터 민감도·
      비즈니스 손실)다. 둘 다 높은 것이 최우선이다 — 응급실의 중증도 분류(triage)와 같다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 위험 우선순위 = 가능성 × 영향으로 정렬
      echo "위험 우선순위(가능성 × 영향):"
      echo "1순위: SQLi/RCE — Critical + 무인증 악용 쉬움 + 전체 DB/시스템"
      echo "2순위: 접근제어 A01 — High + 무인증 + 민감 데이터"
      echo "3순위: XSS/정보노출 — Medium + 조건부 악용"
      echo "4순위: 헤더 누락 — Medium + 단독 영향 작음(방어심화)"
      # 2) 종합 — CVSS + 악용 가능성 + 자산 중요도
      echo "→ CVSS + 악용 가능성 + 자산 중요도 종합"
      ```

      ## ✅ 합격 기준
      `우선순위` 출력 시 통과. **근거:** 1순위(SQLi/RCE) → 2순위(A01) → 3순위(XSS/정보 노출) → 4순위
      (헤더 누락)가 가능성×영향 근거로 정렬되면 무엇부터 고칠지가 선다(우선순위는 자원·규제·완화 장치에 따라 조정 가능).
    hint: '가능성×영향'
    category: analysis
    points: 12
    answer: |
