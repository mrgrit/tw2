lab_id: standalone-web-vuln-week14
title: "위험 평가(CVSS)와 전문 보고서 — 발견을 행동으로"
version: standalone-web-vuln
course: web-vuln
week: 14
description: |
  CVSS 3.1 벡터/점수 산정, 심각도 분류, 가능성×영향 우선순위, 증거(PoC)/권고, Executive Summary,
  전문 보고서 작성. W01~W13 발견 종합. el34 참조. 인가된 실습만. 신규 설치 없음(분석/문서 중심).
difficulty: medium
duration_minutes: 150
prerequisites:
  - "W01–W13 통과"
  - "lecture §2(CVSS) §4(우선순위) §5(보고서 구조) 숙지"
objectives:
  - "CVSS 3.1 벡터/점수 산정"
  - "가능성×영향 우선순위"
  - "전문 보고서/Executive Summary 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 발견 취합 — W01~W13 종합
      ## 💻 실행 명령
      ```bash
      echo "발견: SQLi, XSS, RCE(명령주입), 접근제어(A01), 정보노출(SQLITE_ERROR), 보안헤더누락(HSTS)"
      ```
      ## ✅ 합격 기준
      그동안의 발견을 한 목록으로 취합한다.
    hint: '발견 목록'
    category: survey
    points: 10
    answer: |
      echo "=== 발견 취합 (W01~W13) ==="
      echo "1) SQLi (인증 우회/주입) — W04/W08"
      echo "2) XSS (reflected/stored) — W05"
      echo "3) RCE (명령주입/PHP) — W07"
      echo "4) 접근제어 A01 (무인증 관리/강제브라우징) — W09"
      echo "5) 정보 노출 (SQLITE_ERROR/배너) — W11"
      echo "6) 전송/헤더 (자체서명 인증서/HSTS 누락) — W10/W13"
      echo "→ 발견 6종을 위험 평가 대상으로"
    answer_detail: "발견 취합 = W01~W13 전 발견을 위험 평가용 단일 목록으로 정리."
    verify:
      type: output_contains
      expect: '발견'
      field: stdout
      semantic:
        intent: "발견 취합"
        success_criteria: ["발견 목록"]
        acceptable_methods: ["**[관리적] 취합 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 CVSS 벡터 — SQLi
      ## 💻 실행 명령
      ```bash
      echo "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H = 9.8"
      ```
      ## ✅ 합격 기준
      무인증 원격 SQLi의 CVSS 벡터/점수를 구성한다.
    hint: 'CVSS:3.1 9.8'
    category: analysis
    points: 16
    answer: |
      echo "=== CVSS 벡터 (SQLi) ==="
      echo "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
      echo "→ AV:N(네트워크) AC:L(쉬움) PR:N(무인증) UI:N(상호작용 불필요) C/I/A:H(전면 영향)"
      echo "→ 점수 9.8 (Critical)"
    answer_detail: "CVSS = 8개 메트릭으로 점수화. 무인증 원격 SQLi = AV:N/AC:L/PR:N/C:H/I:H/A:H = 9.8."
    verify:
      type: output_contains
      expect: '9.8'
      field: stdout
      semantic:
        intent: "CVSS 벡터 구성"
        success_criteria: ["벡터/점수"]
        acceptable_methods: ["**[표준] CVSS 3.1 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 심각도 분류 — 점수→등급
      ## 💻 실행 명령
      ```bash
      echo "SQLi/RCE 9.8 Critical, XSS 6.1 Medium, 정보노출 5.3 Medium, 헤더누락 4.x Medium"
      ```
      ## ✅ 합격 기준
      발견을 CVSS 점수→등급으로 분류한다.
    hint: 'Critical/High/Medium'
    category: analysis
    points: 14
    answer: |
      echo "=== 심각도 분류 ==="
      echo "SQLi(인증우회): 9.8 Critical"
      echo "RCE(명령주입): 9.8 Critical"
      echo "XSS(reflected): 6.1 Medium"
      echo "정보 노출(DB에러): 5.3 Medium"
      echo "보안 헤더 누락(HSTS): 4.3 Medium"
      echo "→ 9.0+ Critical / 7.0+ High / 4.0+ Medium / 0.1+ Low"
    answer_detail: "심각도 = CVSS 점수→라벨. 9.0+ Critical, 7.0+ High, 4.0+ Medium, 0.1+ Low."
    verify:
      type: output_contains
      expect: 'Critical'
      field: stdout
      semantic:
        intent: "심각도 분류"
        success_criteria: ["점수→등급"]
        acceptable_methods: ["**[표준] CVSS 등급 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 우선순위 — 가능성 × 영향
      ## 💻 실행 명령
      ```bash
      echo "우선순위 = 악용가능성(공개익스플로잇/무인증) × 자산중요도(데이터민감도)"
      ```
      ## ✅ 합격 기준
      가능성×영향으로 수정 우선순위를 정한다.
    hint: '가능성×영향'
    category: analysis
    points: 12
    answer: |
      echo "=== 우선순위 (가능성 × 영향) ==="
      echo "1순위: SQLi/RCE — Critical + 무인증 악용 쉬움 + 전체 DB/시스템"
      echo "2순위: 접근제어 A01 — High + 무인증 + 민감 데이터"
      echo "3순위: XSS/정보노출 — Medium + 조건부 악용"
      echo "4순위: 헤더 누락 — Medium + 단독 영향 작음(방어심화)"
      echo "→ CVSS + 악용 가능성 + 자산 중요도 종합"
    answer_detail: "우선순위 = CVSS × 악용가능성 × 자산중요도. Critical+쉬운악용+민감데이터=최우선."
    verify:
      type: output_contains
      expect: '우선순위'
      field: stdout
      semantic:
        intent: "위험 우선순위"
        success_criteria: ["가능성×영향"]
        acceptable_methods: ["**[표준] OWASP Risk (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 증거/PoC — 재현 절차
      ## 💻 실행 명령
      ```bash
      echo "각 발견: 재현 명령 + 응답 증거 + 영향. 'SQLi: 로그인에 \\' OR 1=1-- → 관리자 JWT 발급'"
      ```
      ## ✅ 합격 기준
      발견마다 재현 가능한 증거(PoC)를 문서화한다.
    hint: 'PoC 재현'
    category: report
    points: 12
    answer: |
      echo "=== 증거/PoC ==="
      echo "SQLi: POST /rest/user/login {email:\"' OR 1=1--\"} → authentication 우회/JWT 발급"
      echo "RCE: GET /?q=1;id → ModSec 932 탐지(차단형) / 미차단 시 명령 실행"
      echo "A01: GET /rest/admin/application-configuration → 200(무인증 설정 노출)"
      echo "정보노출: GET /rest/products/search?q=test' → SQLITE_ERROR(엔진 노출)"
      echo "→ 각 발견 = 재현 명령 + 응답 증거 + 영향(있다가 아니라 이렇게 재현된다)"
    answer_detail: "PoC = 재현 명령 + 응답 증거 + 영향. 재현 가능성이 보고서 신뢰의 핵심."
    verify:
      type: output_contains
      expect: 'PoC'
      field: stdout
      semantic:
        intent: "증거 문서화"
        success_criteria: ["재현 절차"]
        acceptable_methods: ["**[관리적] PoC (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 권고 — 구체 조치
      ## 💻 실행 명령
      ```bash
      echo "SQLi:파라미터화쿼리, XSS:출력인코딩+CSP, RCE:입력검증+API, A01:서버측인가, 정보노출:generic에러"
      ```
      ## ✅ 합격 기준
      발견마다 구체적 수정 권고를 제시한다.
    hint: '파라미터화/인코딩/인가'
    category: report
    points: 12
    answer: |
      echo "=== 권고 ==="
      echo "SQLi: 파라미터화 쿼리(prepared statement) — 근본"
      echo "XSS: 문맥별 출력 인코딩 + CSP"
      echo "RCE: OS 호출 회피(API)+입력 allowlist"
      echo "A01: 서버측 객체수준 인가 + 기본 deny"
      echo "정보 노출: generic 에러 + 배너 억제(ServerTokens Prod)"
      echo "헤더: CSP/HSTS 추가"
      echo "→ 권고는 '무엇을 어떻게'까지 구체적으로"
    answer_detail: "권고 = 발견별 구체 조치(파라미터화/인코딩/인가/generic에러). 실행 가능해야."
    verify:
      type: output_contains
      expect: '파라미터화'
      field: stdout
      semantic:
        intent: "수정 권고"
        success_criteria: ["구체 조치"]
        acceptable_methods: ["**[설명] 권고 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 Executive Summary — 경영진용
      ## 💻 보고서 양식
      ```markdown
      ## Executive Summary
      JuiceShop/dvwa 점검 결과 Critical 2건(SQLi/RCE) 포함 6건 발견.
      무인증 원격 공격으로 전체 데이터 침해 가능. 1순위 즉시 조치 필요.
      ```
      ## ✅ 합격 기준
      비전문가가 위험을 이해할 Executive Summary를 작성한다.
    hint: '경영진용 요약'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      ## Executive Summary
      대상(JuiceShop/dvwa) 점검 결과 총 6건 발견 — Critical 2(SQLi, RCE), Medium 4.
      무인증 원격 공격자가 SQLi로 인증을 우회하고 DB 전체를 침해할 수 있으며, 명령주입으로
      시스템 장악이 가능하다(단, 현재 WAF가 일부 차단). 비즈니스 영향: 고객 데이터 유출·서비스 장악.
      권고: Critical 2건 즉시 조치(파라미터화 쿼리, 입력검증), 이후 접근제어·헤더 보강.
      EOF
    answer_detail: "Executive Summary = 비전문가용 위험 한 문단 + 등급 분포 + 핵심 권고. 기술용어 최소."
    verify:
      type: output_contains
      expect: 'Executive Summary'
      field: stdout
      semantic:
        intent: "경영진 요약"
        success_criteria: ["위험/등급/권고"]
        acceptable_methods: ["**[관리적] Exec Summary (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 전문 보고서
      ## 💻 보고서 양식
      ```markdown
      # 웹 침투 점검 보고서 (학번, 이름)
      ## 1. Executive Summary
      ## 2. 범위/방법론(WSTG)
      ## 3. 발견(심각도/CVSS/PoC/권고)
      ## 4. 위험 매트릭스 + 권고 요약
      ```
      ## ✅ 합격 기준
      Executive~발견~권고를 갖춘 전문 보고서를 작성한다.
    hint: 'Exec/방법론/발견/권고'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 웹 침투 점검 보고서
      ## 1. Executive Summary: Critical 2 포함 6건. 무인증 원격 데이터 침해 가능. 즉시 조치 필요
      ## 2. 범위/방법론: JuiceShop/dvwa, WSTG, el34 인가 실습
      ## 3. 발견:
      ##   - SQLi 9.8 Critical: PoC(' OR 1=1--), 영향(DB 침해), 권고(파라미터화)
      ##   - RCE 9.8 Critical: PoC(;id), 영향(시스템 장악), 권고(입력검증)
      ##   - A01 7.5 High: PoC(admin-config 200), 권고(서버측 인가)
      ##   - 정보노출/XSS/헤더 Medium: 권고(generic에러/인코딩/CSP·HSTS)
      ## 4. 우선순위: Critical 2 → A01 → Medium. 가능성×영향 매트릭스
      ## 결론: 발견을 CVSS로 정량화하고 우선순위·권고로 행동 가능하게 전달
      EOF
    answer_detail: "전문 보고서 = Exec Summary + 방법론 + 발견(CVSS/PoC/권고) + 우선순위. 발견을 행동으로."
    verify:
      type: output_contains
      expect: 'CVSS'
      field: stdout
      semantic:
        intent: "전문 보고서"
        success_criteria: ["Exec/발견/CVSS/권고"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
