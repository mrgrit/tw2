    instruction: |
      ## 🎯 ⑥ 권고 — 발견별 근본 조치 + 우선순위
      ## 📖 개념 한 줄
      보고서의 가치는 "고치는 길"을 제시하는 데 있다. 발견마다 WAF 차단 같은 완화가 아니라 **근본 방어**를
      짚고, 심각도순 우선순위로 묶어 의뢰인이 무엇부터 할지 알게 한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SQLi 근본 방어 — 파라미터화 쿼리
      echo "SQLi: 파라미터화 쿼리(근본)"
      # 2) XSS 근본 방어 — 출력 인코딩 + CSP
      echo "XSS: 문맥별 출력 인코딩 + CSP"
      # 3) RCE 근본 방어 — OS 호출 회피 + 입력 allowlist
      echo "RCE: OS 호출 회피(API) + 입력 allowlist"
      # 4) A01 근본 방어 — 서버측 객체수준 인가 + 기본 deny
      echo "A01: 서버측 객체수준 인가 + 기본 deny"
      # 5) 정보 노출/헤더 — generic 에러 + 배너 억제 + 보안 헤더
      echo "정보 노출: generic 에러 + 배너 억제, 보안 헤더(HSTS/CSP) 추가"
      # 6) 우선순위 — Critical 2(SQLi/RCE) 즉시 → A01 → Medium
      # → 우선순위: Critical 2(SQLi/RCE) 즉시 → A01 → Medium
      ```
      ## 🔧 발견별 근본 권고
      - **SQLi**(인증 우회 포함) → parameterized query(쿼리와 데이터 분리)가 근본.
      - **XSS** → 문맥별 출력 인코딩 + CSP(Content-Security-Policy).
      - **RCE**(명령주입) → OS 호출 회피(안전한 API) + 입력 allowlist.
      - **A01**(접근제어) → 서버측 객체수준 인가 + 기본 deny.
      - **정보 노출/헤더** → generic 에러 + 배너 억제 + 보안 헤더(HSTS/CSP) 추가.
      ## ✅ 합격 기준
      `파라미터화` 출력 시 통과. **근거:** 발견별 구체 근본 권고와 심각도순 우선순위(Critical 2 즉시 →
      A01 → Medium)가 제시되면 의뢰인이 무엇부터 할지가 선다(우선순위 근거가 없으면 미션 8 등급과 연결).
