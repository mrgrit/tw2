lab_id: standalone-web-vuln-week15
title: "기말: 종합 웹 침투 점검 — 정찰→침해→위험평가→보고 전 과정"
version: standalone-web-vuln
course: web-vuln
week: 15
description: |
  기말 종합 침투 점검 — 한 명의 점검자가 el34 표적(JuiceShop/DVWA)에 WSTG 점검 한 사이클을 처음부터
  끝까지 수행한다: ① 정찰(nuclei 기술/보안헤더 자동 매핑) → ② 인증 우회(로그인 SQLi → 관리자 JWT →
  payload 디코드) → ③ 주입(SQLi/XSS/RCE 를 차단 모드 DVWA 에 보내 WAF 942/941/932 차단 확인) →
  ④ 접근제어(무인증 관리 엔드포인트 + 강제 브라우징 /ftp = A01) → ⑤ 위험 평가(발견을 CVSS 3.1 로
  정량화) → ⑥ 전문 보고(Executive Summary→발견(CVSS/PoC)→권고). 공격은 외부 공격자 VM 192.168.0.202(att/1)에서
  공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행한다. 인가된 표적 vhost
  (juice.el34.lab / dvwa.el34.lab) 만 점검한다. "취약점을 찾았다"가 아니라 재현 가능한 증거로 보고한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W01–W14 통과 (HTTP/정보수집·인증·주입·접근제어·위험 평가/보고 역량)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, 비밀번호 1) + docker exec 접근"
  - "WSTG 점검 순서와 CVSS 3.1·전문 보고서 구조 이해(W08·W14)"
objectives:
  - "WSTG 점검 한 사이클(정찰→인증→주입→접근제어→위험 평가→보고)을 한 표적에 처음부터 끝까지 통합 수행한다"
  - "각 발견을 CVSS 3.1 벡터로 정량화해 Critical~Medium 으로 자리매김한다"
  - "발견→증거(PoC)→심각도→권고 구조의 전문 침투 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검(도달성) — 표적 JuiceShop 에 도달하나
      ## 📖 개념 한 줄
      점검의 전제는 "표적에 요청이 닿는다"는 것이다. 연결이 안 되면 이후 모든 음성 결과(취약점이
      없어 보이는 것)가 무의미하므로, 점검자는 본격 점검 전에 항상 도달성부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice vhost 도달 확인 — Host로 표적 지정, 본문 버리고 응답코드만 juice= 형식으로(점검 가능 상태 검증)
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```
      ## 🔧 도구·옵션 풀이
      - `nc`(넷캣) — 명령줄 raw HTTP 요청 도구. 요청의 `Host: juice.el34.lab` 줄로 어느 vhost(표적)인지 지정한다
        (el34 web 의 Apache 가 Host 헤더로 라우팅).
      - `| head -1 | grep -oE '[0-9]{3}'` — 응답 상태 라인에서 **코드만** 뽑는 관용구.
      - `nc -w3 192.168.0.161 80` — raw HTTP 요청을 보내고 응답을 받는다(3초 타임아웃).
      - `http://192.168.0.161/` — fw 의 ext 게이트웨이. 요청은 fw → ips → web 경로로 흐른다.
      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice=<코드>` 가 나타나면 fw→web 경로로 표적에 도달해 점검 가능
      상태(scope alive) — 응답이 없으면 Host 헤더·게이트웨이 주소부터 재확인한다.
    hint: '도달성'
