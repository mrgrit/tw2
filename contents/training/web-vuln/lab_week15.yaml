      주입(OWASP A03)은 앱이 입력을 검증 없이 신뢰할 때 생긴다. SQLi 는 SQL 문법을(`' OR '1'='1`), XSS 는
      스크립트를(`<script>...`) 입력에 끼워 넣는 공격이다. 여기서는 **차단 모드** 표적 DVWA 로 보내 WAF
      (ModSecurity CRS)가 어떻게 막는지(403)를 직접 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi(?id=1' OR '1'='1, %27='/%20=공백)를 차단 모드 dvwa에 전송 → sqli= 응답코드(CRS 942 차단)
      echo -en "GET /?id=1%27%20OR%20%271%27=%271 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      # 2) 이어서 XSS(?q=<script>alert(1)</script>)도 전송 → xss= 응답코드(CRS 941 차단)
      echo -en 'GET /?q=%3Cscript%3Ealert(1)%3C/script%3E HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      # 3) 해석 — dvwa는 ModSec 942(SQLi)/941(XSS) 차단형 403(차단은 보완, 근본은 입력검증)
      # → dvwa는 ModSec 942(SQLi)/941(XSS) 차단형 403
      ```
      ## 🔧 도구·옵션 풀이
      - `Host: dvwa.el34.lab` — 표적을 **DVWA**(차단 모드)로 지정. JuiceShop(탐지만)과 달리 공격을 막는다.
      - SQLi 페이로드 `?id=1' OR '1'='1`(URL 인코딩 `%27`=`'`)는 ModSec CRS **942**(SQLi) 룰군에 걸린다.
      - XSS 페이로드 `?q=<script>alert(1)</script>`(인코딩됨)는 CRS **941**(XSS) 룰군에 걸린다.
      - `-o /dev/null -w 'sqli=%{http_code} xss=...'` — 응답 코드만 라벨과 함께 출력한다.
      ## ✅ 합격 기준
      `sqli=` 출력 시 통과. **근거:** `sqli=403 xss=403` 이면 WAF(942/941) 차단 확인 — 200 이면 표적/모드
      (dvwa vs juice)를 재확인. ⚠️ 403(차단)은 WAF 가 패턴을 막은 것이지 앱이 안전해진 것은 아니다(근본 방어는 미션 9).
