    instruction: |
      ## 🎯 ⑥ 전문 침투 보고서 — 점검 한 사이클의 총결산
      ## 📖 개념 한 줄
      점검의 산출물은 보고서다. 미션 1–9 의 발견을 **Executive Summary(경영진용 위험 한 문단) → 범위/
      방법론(WSTG) → 발견 상세(CVSS·PoC·권고) → 우선순위/결론** 구조의 한 문서로 종합해야 점검 한 사이클이
      완성된다. 핵심은 "있다"가 아니라 "이렇게 재현되고(PoC), 이만큼 위험하며(CVSS), 이렇게 막는다(권고)".
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 전문 침투 기말 보고서를 출력 — Exec→범위/방법론→발견(CVSS·PoC·권고)→우선순위/결론
      cat > ~/web-vuln_w15_note1.md <<'EOF'
      # 웹 침투 점검 기말 보고서
      ## 1. Executive Summary: Critical 2(SQLi/RCE) 포함 5건. 무인증 원격 데이터 침해·시스템 장악 가능(일부 WAF 차단). 즉시 조치 필요
      ## 2. 범위/방법론: JuiceShop/dvwa, WSTG, el34 인가 실습
      ## 3. 발견:
      ##   - SQLi 9.8 Critical: PoC(' OR 1=1-- → 관리자 JWT), 권고(파라미터화)
      ##   - RCE 9.8 Critical: PoC(;cat /etc/passwd → 932 탐지), 권고(입력검증)
      ##   - 접근제어 A01 7.5 High: PoC(admin-config 200, /ftp), 권고(서버측 인가)
      ##   - XSS/정보노출 Medium: 권고(인코딩+CSP/generic 에러)
      ## 4. 우선순위: Critical 2 → A01 → Medium. 결론: 점검→CVSS 정량화→재현가능 보고로 행동 가능하게
      EOF
      cat ~/web-vuln_w15_note1.md
      ```
      ## 🔧 작성 지침
      - **Executive Summary**: 등급 분포(Critical 2/High 1/Medium 2)와 핵심 위험(무인증 원격 데이터
        침해·시스템 장악)을 비전문가도 읽게 한 문단으로.
      - **발견 상세**: 발견마다 심각도순으로 CVSS 점수 + PoC(재현 절차, 예: `' OR 1=1--` → 관리자 JWT) +
        근본 권고를 함께 적는다.
      - **우선순위/결론**: Critical 2(SQLi/RCE) → A01 → Medium 순. "점검→CVSS 정량화→재현 가능 보고로
        행동 가능하게" 로 마무리.
      ## ✅ 합격 기준
      `CVSS` 출력 시 통과. **근거:** Executive Summary ~ 발견(CVSS/PoC) ~ 권고 ~ 우선순위/결론을 모두
      갖추고 각 발견에 재현 절차(PoC)가 있으면 전문 보고서 완성 — 증거 없는 주장만 있으면 PoC 를 보강한다.
