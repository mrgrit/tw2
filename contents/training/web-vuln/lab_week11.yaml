lab_id: standalone-web-vuln-week11
title: "에러/정보 노출 — 배너·상세에러·DB에러 점검 vs 정보 최소화"
version: standalone-web-vuln
course: web-vuln
week: 11
description: |
  OWASP A05(Security Misconfiguration) — 정보 노출(Information Disclosure)을 네 채널로 점검한다:
  ① 응답 헤더의 Server 배너(웹서버 버전 → CVE 매핑), ② 잘못된 경로의 상세 에러(내부 라우팅 노출),
  ③ 잘못된 입력의 DB 엔진 에러(SQLITE_ERROR → 엔진 확정 + SQLi 표면 입증, 가장 위험),
  ④ 비표준 헤더 누출(X-Recruiting → 기술 스택·숨은 경로). 정보 노출은 직접 침해가 아니라
  공격자의 정찰(reconnaissance)을 가속해 후속 공격의 시간·시도를 줄인다는 점을 입증하고,
  정보 최소화(ServerTokens Prod·커스텀 에러 페이지·DB 에러 generic 화·불필요 헤더 제거)로 방어한다.
  WSTG-INFO/ERRH. 표적은 juiceshop(juice.el34.lab, DetectionOnly 라 노출이 그대로 보임).
  점검은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로
  접속해 수행한다. 인가된 실습만.
  신규 설치 없음(curl 기본 탑재).
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W10 통과 (특히 W03 정보수집, W05 SQLi 표면 개념)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, 비밀번호 1) + docker exec 외부 공격자 VM 192.168.0.202"
  - "lecture §2(네 채널 점검: 배너/상세에러/DB에러/헤더), §3(정찰 가속), §4(정보 최소화 방어) 숙지"
objectives:
  - "네 채널(배너·상세에러·DB에러·헤더)에서 정보 노출을 식별하고 응답 증거로 입증한다"
  - "각 노출이 공격자에게 무엇을 주는지(버전→CVE / 에러→내부경로 / DB에러→엔진+SQLi표면 / 헤더→스택+숨은경로) 설명한다"
  - "정보 노출이 직접 침해가 아니라 정찰을 가속한다는 본질(A05)을 이해한다"
  - "정보 최소화(ServerTokens Prod·커스텀 에러·DB에러 generic·헤더 제거)로 방어를 설계한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 표적 JuiceShop 도달성 점검
      본격 점검에 앞서 표적에 요청이 닿는지부터 확인한다. 연결이 안 되면 이후의 모든
      "노출 없음" 결과가 무의미하기 때문이다.

      ## 개념 한 줄
      el34 의 web(Apache)은 한 IP/포트에서 여러 사이트를 운영하므로, `Host: juice.el34.lab`
      헤더로 표적 vhost 를 지정해 fw 게이트웨이(192.168.0.161)로 보낸다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice vhost 도달 확인 — -k로 인증서 검증 생략, Host로 vhost 지정, 본문 버리고 응답코드만 juice= 형식으로
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```
      - `-o /dev/null` 은 본문을 버리고 `-w '%{http_code}'` 로 응답 코드만 출력한다(도달성 확인 관용구).
      - `-s` 조용히, `-k` 인증서 검증 생략, `-H 'Host: ...'` 로 표적 vhost 지정.

      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice` 와 함께 HTTP 응답 코드(200 등)가 돌아오면 표적이 점검
      가능한 상태다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) juice vhost 도달 확인 — -k로 인증서 검증 생략, Host로 vhost 지정, 본문 버리고 응답코드만 juice= 형식으로
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "정보 노출 점검 대상 = JuiceShop(juice.el34.lab). 출력에 juice 가 보이고 HTTP 코드가 돌아오면 도달 성공으로 판정. JuiceShop vhost 는 DetectionOnly 라 점검 요청이 차단(403)되지 않고 통과해 노출을 끝까지 입증하기 좋다."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] nc raw (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — ① 배너 노출(Server 헤더의 웹서버 버전)
      응답 헤더 한 줄(`Server:`)에 웹서버 종류·버전이 그대로 실려 나오는지 확인한다.
      가장 적은 노력으로 얻는 정찰 정보다.

      ## 개념 한 줄
      배너(banner)는 가게 간판처럼 서버가 스스로 적어 보내는 자기 소개다 — 버전 한 줄이
      공격자에게 "그 버전의 알려진 취약점(CVE)을 찾아라"는 출발점을 공짜로 준다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 응답 헤더를 덤프(-D -)하고 본문은 버려(-o /dev/null) Server 헤더만 추출 → 웹서버 종류·버전 노출 확인
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -i 'server:'
      # 2) 해석 — Apache/2.4.x 버전 노출은 해당 버전 CVE 매핑에 악용됨
      # → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
      ```
      - `-D -` 는 응답 헤더를 표준출력으로 덤프한다(헤더 보기 핵심 옵션).
      - `-o /dev/null` 로 본문은 버리고, `grep -i 'server:'` 로 Server 줄만 추출한다.

      ## ✅ 합격 기준
      `Apache` 출력 시 통과. **근거:** `Server: Apache/2.4.x (Ubuntu)` 처럼 웹서버 종류·버전이 노출되면
      배너 노출이다(방어가 잘 된 서버는 `Server: Apache` 한 단어만 — el34 JuiceShop 은 학습용으로 버전 노출).
    hint: 'Server: Apache'
    category: recon
    points: 14
    answer: |
      # 1) 응답 헤더를 덤프(-D -)하고 본문은 버려(-o /dev/null) Server 헤더만 추출 → 웹서버 종류·버전 노출 확인
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -i 'server:'"
      # 2) 해석 — Apache/2.4.x 버전 노출은 해당 버전 CVE 매핑에 악용됨
      # → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
    answer_detail: "배너 = Server 헤더에 실린 웹서버 종류/버전. 출력에 Apache 가 보이면 노출 확인. 버전→해당 버전 CVE 즉시 매핑으로 정찰을 가속한다. 방어는 ServerTokens Prod(+ ServerSignature Off)로 버전·OS 를 숨겨 Server: Apache 한 단어까지 억제."
    expected_output: |
      Server: Apache/2.4.52 (Ubuntu)
      → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
    verify:
      type: output_contains
      expect: 'Apache'
      field: stdout
      semantic:
        intent: "배너 노출"
        success_criteria: ["Server 버전"]
        acceptable_methods: ["**[OSS] nc raw 헤더 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — ② 상세 에러(내부 경로/라우팅 노출)
      존재하지 않는 경로를 일부러 호출해, 앱이 일반 메시지 대신 내부 경로·라우팅을 그대로
      토해내는지(상세 에러) 확인한다.

      ## 개념 한 줄
      잘 만든 앱은 에러에 "처리할 수 없습니다"만 보여주고 상세는 서버 로그로만 남긴다.
      상세 에러가 노출되면 공격자는 그걸로 내부 구조를 읽어 공격 표면 지도를 그린다(WSTG-ERRH).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 일부러 없는 경로(/api/Nonexistent123)를 호출 → 응답 본문에서 'Unexpected path' 상세 에러 문구만 추출
      echo -en "GET /api/Nonexistent123 HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -oE 'Unexpected path[^<]*' | head -1
      # 2) 해석 — 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출(커스텀 에러로 숨겨야)
      # → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
      ```
      - `/api/Nonexistent123` 은 일부러 없는 경로다(에러 유발용).
      - `grep -oE 'Unexpected path[^<]*'` 은 응답 본문에서 그 에러 문구만 추출한다.

      ## ✅ 합격 기준
      `Unexpected path` 출력 시 통과. **근거:** 존재하지 않는 경로 요청에 `Unexpected path: /api/...` 같은
      상세 에러(내부 경로)가 노출되면 공격 표면 지도를 내준 것이다.
    hint: 'Unexpected path'
    category: manipulation
    points: 14
    answer: |
      # 1) 일부러 없는 경로(/api/Nonexistent123)를 호출 → 응답 본문에서 'Unexpected path' 상세 에러 문구만 추출
      ssh att@192.168.0.202 "echo -en 'GET /api/Nonexistent123 HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -oE 'Unexpected path[^<]*' | head -1"
      # 2) 해석 — 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출(커스텀 에러로 숨겨야)
      # → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
    answer_detail: "상세 에러 = 잘못된 경로 요청에 내부 경로/라우팅 구조가 그대로 노출되는 것(Unexpected path 문구가 증거). 공격자에게 공격 표면 지도를 준다. 방어는 커스텀 에러 페이지로 사용자에겐 일반 메시지만, 상세 원인은 서버측 로그에만 남기는 것."
    expected_output: |
      Unexpected path: /api/Nonexistent123
      → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
    verify:
      type: output_contains
      expect: 'Unexpected path'
      field: stdout
      semantic:
        intent: "상세 에러 노출"
        success_criteria: ["내부 경로 노출"]
        acceptable_methods: ["**[OSS] 잘못된 경로 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — ③ DB 에러 노출 (네 채널 중 가장 위험)
      검색 파라미터에 따옴표 하나(`'`)를 넣어 SQL 문법을 깨뜨려, 앱이 DB 원본 에러를
      사용자에게 그대로 보여주는지 확인한다.

      ## 개념 한 줄
      DB 원본 에러는 두 가지를 한 번에 준다 — (1) `SQLITE_ERROR` 라는 문자열로 DB 엔진이
      SQLite 임을 확정하고, (2) 내 따옴표가 질의에 섞여 오류를 냈다는 것 = 이 지점이 SQLi
      표면(주입 가능 입력 지점)임을 입증한다. 그래서 단독 위험이 가장 크다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 검색 파라미터에 따옴표 하나(q=test')를 넣어 SQL 문법을 깨고 → 응답에서 DB 원본 에러(SQLITE_ERROR) 문구만 추출
      echo -en 'GET /rest/products/search?q=test%27 HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -oE 'SQLITE_ERROR[^<]*' | head -1
      # 2) 해석 — SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증(주입 문법까지 노출)
      # → SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증. 공격자에게 주입 문법을 알려줌
      ```
      - `q=test'` 의 끝 따옴표가 DB 질의의 문법을 깬다(잘못된 입력 유발).
      - `grep -oE 'SQLITE_ERROR[^<]*'` 로 노출된 DB 엔진 에러 문구만 추출한다.

      ## ✅ 합격 기준
      `SQLITE_ERROR` 출력 시 통과. **근거:** 잘못된 입력에 `SQLITE_ERROR: ... syntax error` 같은 DB 엔진
      에러가 노출되면 엔진 확정 + SQLi 표면 입증으로 곧바로 다음 공격(SQLi)으로 이어진다.
    hint: 'SQLITE_ERROR'
    category: manipulation
    points: 16
    answer: |
      # 1) 검색 파라미터에 따옴표 하나(q=test')를 넣어 SQL 문법을 깨고 → 응답에서 DB 원본 에러(SQLITE_ERROR) 문구만 추출
      ssh att@192.168.0.202 "echo -en 'GET /rest/products/search?q=test%27 HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -oE 'SQLITE_ERROR[^<]*' | head -1"
      # 2) 해석 — SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증(주입 문법까지 노출)
      # → SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증. 공격자에게 주입 문법을 알려줌
    answer_detail: "DB 에러 = 잘못된 입력(따옴표)에 DB 원본 에러가 노출되는 것(SQLITE_ERROR 가 증거). DB 엔진(SQLite) 확정 + SQLi 표면 입증으로 곧바로 다음 공격(SQLi)으로 이어지므로 네 채널 중 가장 위험. 방어 1차는 사용자에겐 generic 메시지·원본은 로그로만, 근본 방어는 입력 검증·parameterized query(W05)."
    expected_output: |
      SQLITE_ERROR: near &quot;&#39;%&#39;&quot;: syntax error
      → SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증. 공격자에게 주입 문법을 알려줌
    verify:
      type: output_contains
      expect: 'SQLITE_ERROR'
      field: stdout
      semantic:
        intent: "DB 에러 노출"
        success_criteria: ["DB 엔진 노출"]
        acceptable_methods: ["**[OSS] 잘못된 입력 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — ④ 헤더 누출(비표준 헤더의 숨은 경로/스택)
      운영에 꼭 필요하지 않은 비표준 헤더(`X-...`)가 기술 스택이나 화면에 없는 숨은 경로를
      흘리는지 확인한다.

      ## 개념 한 줄
      `X-Powered-By` 는 어떤 언어·프레임워크인지, `X-Recruiting` 같은 앱별 헤더는 링크에 없는
      숨은 경로(메뉴)를 알려준다 — 공격자의 다음 진입점 단서다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

