lab_id: standalone-web-vuln-week11
title: "에러/정보 노출 — 배너·상세에러·DB에러 점검 vs 정보 최소화"
version: standalone-web-vuln
course: web-vuln
week: 11
description: |
  OWASP A05(Security Misconfiguration) — 정보 노출(Information Disclosure)을 네 채널로 점검한다:
  ① 응답 헤더의 Server 배너(웹서버 버전 → CVE 매핑), ② 잘못된 경로의 상세 에러(내부 라우팅 노출),
  ③ 잘못된 입력의 DB 엔진 에러(SQLITE_ERROR → 엔진 확정 + SQLi 표면 입증, 가장 위험),
  ④ 비표준 헤더 누출(X-Recruiting → 기술 스택·숨은 경로). 정보 노출은 직접 침해가 아니라
  공격자의 정찰(reconnaissance)을 가속해 후속 공격의 시간·시도를 줄인다는 점을 입증하고,
  정보 최소화(ServerTokens Prod·커스텀 에러 페이지·DB 에러 generic 화·불필요 헤더 제거)로 방어한다.
  WSTG-INFO/ERRH. 표적은 juiceshop(juice.el34.lab, DetectionOnly 라 노출이 그대로 보임).
  점검은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로
  접속해 수행한다. 인가된 실습만.
  도구: 도달성·배너·에러·헤더 노출은 whatweb(핑거프린팅), DB 에러 기반 노출은 sqlmap — 모두 att 192.168.0.202 에 탑재.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W10 통과 (특히 W03 정보수집, W05 SQLi 표면 개념)"
  - "외부 공격자 VM 접속(ssh att@192.168.0.202, 비밀번호 1) — whatweb/sqlmap 탑재"
  - "lecture §2(네 채널 점검: 배너/상세에러/DB에러/헤더), §3(정찰 가속), §4(정보 최소화 방어) 숙지"
objectives:
  - "네 채널(배너·상세에러·DB에러·헤더)에서 정보 노출을 식별하고 응답 증거로 입증한다"
  - "각 노출이 공격자에게 무엇을 주는지(버전→CVE / 에러→내부경로 / DB에러→엔진+SQLi표면 / 헤더→스택+숨은경로) 설명한다"
  - "정보 노출이 직접 침해가 아니라 정찰을 가속한다는 본질(A05)을 이해한다"
  - "정보 최소화(ServerTokens Prod·커스텀 에러·DB에러 generic·헤더 제거)로 방어를 설계한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 표적 JuiceShop 도달성 점검
      본격 점검에 앞서 표적에 요청이 닿는지부터 확인한다. 연결이 안 되면 이후의 모든
      "노출 없음" 결과가 무의미하기 때문이다.

      ## 개념 한 줄
      el34 의 web(Apache)은 한 IP/포트에서 여러 사이트를 운영하므로, `Host: juice.el34.lab`
      헤더로 표적 vhost 를 지정해 fw 게이트웨이(192.168.0.161)로 보낸다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb으로 juice vhost 도달 확인 + 1차 핑거프린팅 — 상태코드([200 OK])·서버·타이틀·IP를 한 줄로
      whatweb -a1 --color=never http://juice.el34.lab/
      ```
      - `whatweb` 는 응답을 분석해 상태코드(`[200 OK]`)·웹서버(`Apache[2.4.52]`)·타이틀·비표준 헤더·IP 를 한 줄로 요약하는 표준 웹 핑거프린팅 도구다(raw 소켓 nc 와 달리 곧바로 노출을 읽어준다).
      - `-a1` 은 공격성 낮은 1단계(수동적 정찰), `--color=never` 는 색상 코드를 끈다. att 의 `/etc/hosts` 가 `*.el34.lab → 192.168.0.161` 로 매핑돼 fw 게이트웨이로 요청이 나간다.

      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice` 와 함께 HTTP 응답 코드(200 등)가 돌아오면 표적이 점검
      가능한 상태다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) whatweb으로 juice vhost 도달 확인 + 1차 핑거프린팅 — 상태코드([200 OK])·서버·타이틀·IP를 한 줄로
      ssh att@192.168.0.202 "whatweb -a1 --color=never http://juice.el34.lab/"
    answer_detail: "정보 노출 점검 대상 = JuiceShop(juice.el34.lab). whatweb 출력에 juice.el34.lab 과 [200 OK] 가 보이면 도달 성공으로 판정. JuiceShop vhost 는 DetectionOnly 라 점검 요청이 차단(403)되지 않고 통과해 노출을 끝까지 입증하기 좋다."
    expected_output: |
      http://juice.el34.lab/ [200 OK] Apache[2.4.52], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[OWASP Juice Shop], UncommonHeaders[access-control-allow-origin,x-content-type-options,feature-policy,x-recruiting], IP[192.168.0.161]
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — ① 배너 노출(Server 헤더의 웹서버 버전)
      응답 헤더 한 줄(`Server:`)에 웹서버 종류·버전이 그대로 실려 나오는지 확인한다.
      가장 적은 노력으로 얻는 정찰 정보다.

      ## 개념 한 줄
      배너(banner)는 가게 간판처럼 서버가 스스로 적어 보내는 자기 소개다 — 버전 한 줄이
      공격자에게 "그 버전의 알려진 취약점(CVE)을 찾아라"는 출발점을 공짜로 준다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb 결과에서 서버 배너(Apache/버전)만 추려 웹서버 종류·버전 노출 확인
      whatweb -a1 --color=never http://juice.el34.lab/ | tr ',' '\n' | grep -i apache
      # 2) 해석 — Apache/2.4.x 버전 노출은 해당 버전 CVE 매핑에 악용됨
      # → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
      ```
      - `whatweb` 는 `Server:` 응답 헤더를 파싱해 `Apache[2.4.52]`·`HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)]` 로 종류·버전·OS 를 보여준다.
      - `tr ',' '\n'` 으로 필드를 줄로 나눈 뒤 `grep -i apache` 로 서버 배너 줄만 추출한다.

      ## ✅ 합격 기준
      `Apache` 출력 시 통과. **근거:** `Server: Apache/2.4.x (Ubuntu)` 처럼 웹서버 종류·버전이 노출되면
      배너 노출이다(방어가 잘 된 서버는 `Server: Apache` 한 단어만 — el34 JuiceShop 은 학습용으로 버전 노출).
    hint: 'Server: Apache'
    category: recon
    points: 14
    answer: |
      # 1) whatweb 결과에서 서버 배너(Apache/버전)만 추려 웹서버 종류·버전 노출 확인
      ssh att@192.168.0.202 "whatweb -a1 --color=never http://juice.el34.lab/ | tr ',' '\n' | grep -i apache"
      # 2) 해석 — Apache/2.4.x 버전 노출은 해당 버전 CVE 매핑에 악용됨
      # → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
    answer_detail: "배너 = Server 헤더에 실린 웹서버 종류/버전. whatweb 이 Apache[2.4.52]·HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)] 로 잡아준다. 버전→해당 버전 CVE 즉시 매핑으로 정찰을 가속한다. 방어는 ServerTokens Prod(+ ServerSignature Off)로 버전·OS 를 숨겨 Server: Apache 한 단어까지 억제."
    expected_output: |
      Apache[2.4.52]
      HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)]
      → Apache/2.4.x 버전 노출 → 해당 버전 CVE 매핑에 악용
    verify:
      type: output_contains
      expect: 'Apache'
      field: stdout
      semantic:
        intent: "배너 노출"
        success_criteria: ["Server 버전"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — ② 상세 에러(내부 경로/라우팅 노출)
      존재하지 않는 경로를 일부러 호출해, 앱이 일반 메시지 대신 내부 경로·라우팅을 그대로
      토해내는지(상세 에러) 확인한다.

      ## 개념 한 줄
      잘 만든 앱은 에러에 "처리할 수 없습니다"만 보여주고 상세는 서버 로그로만 남긴다.
      상세 에러가 노출되면 공격자는 그걸로 내부 구조를 읽어 공격 표면 지도를 그린다(WSTG-ERRH).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 일부러 없는 경로(/api/Nonexistent123)를 whatweb으로 호출 → 에러 페이지 타이틀에서 'Unexpected path' 상세 에러 노출 확인
      whatweb -a1 --color=never http://juice.el34.lab/api/Nonexistent123 | tr ',' '\n' | grep -i unexpected
      # 2) 해석 — 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출(커스텀 에러로 숨겨야)
      # → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
      ```
      - `/api/Nonexistent123` 은 일부러 없는 경로다(에러 유발용). 앱은 500 과 함께 `Error: Unexpected path: /api/Nonexistent123` 를 그대로 내주고, whatweb 은 이를 `Title[...]` 로 잡아낸다.
      - `tr ',' '\n' | grep -i unexpected` 으로 그 에러 타이틀 줄만 추출한다.

      ## ✅ 합격 기준
      `Unexpected path` 출력 시 통과. **근거:** 존재하지 않는 경로 요청에 `Unexpected path: /api/...` 같은
      상세 에러(내부 경로)가 노출되면 공격 표면 지도를 내준 것이다.
    hint: 'Unexpected path'
    category: manipulation
    points: 14
    answer: |
      # 1) 일부러 없는 경로(/api/Nonexistent123)를 whatweb으로 호출 → 에러 페이지 타이틀에서 'Unexpected path' 상세 에러 노출 확인
      ssh att@192.168.0.202 "whatweb -a1 --color=never http://juice.el34.lab/api/Nonexistent123 | tr ',' '\n' | grep -i unexpected"
      # 2) 해석 — 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출(커스텀 에러로 숨겨야)
      # → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
    answer_detail: "상세 에러 = 잘못된 경로 요청에 내부 경로/라우팅 구조가 그대로 노출되는 것(Unexpected path 문구가 증거). 공격자에게 공격 표면 지도를 준다. 방어는 커스텀 에러 페이지로 사용자에겐 일반 메시지만, 상세 원인은 서버측 로그에만 남기는 것."
    expected_output: |
      Title[Error: Unexpected path: /api/Nonexistent123]
      → 'Unexpected path: /api/...' = 라우팅 구조/내부 경로 노출. 커스텀 에러로 숨겨야
    verify:
      type: output_contains
      expect: 'Unexpected path'
      field: stdout
      semantic:
        intent: "상세 에러 노출"
        success_criteria: ["내부 경로 노출"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — ③ DB 에러 노출 (네 채널 중 가장 위험)
      검색 파라미터에 따옴표 하나(`'`)를 넣어 SQL 문법을 깨뜨려, 앱이 DB 원본 에러를
      사용자에게 그대로 보여주는지 확인한다.

      ## 개념 한 줄
      DB 원본 에러는 두 가지를 한 번에 준다 — (1) `SQLITE_ERROR` 라는 문자열로 DB 엔진이
      SQLite 임을 확정하고, (2) 내 따옴표가 질의에 섞여 오류를 냈다는 것 = 이 지점이 SQLi
      표면(주입 가능 입력 지점)임을 입증한다. 그래서 단독 위험이 가장 크다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) sqlmap으로 검색 파라미터(q)에 주입을 시도 — 앱이 DB 원본 에러(SQLITE_ERROR)를 노출해 sqlmap이 엔진을 SQLite로 확정
      sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring
      # 2) 해석 — 앱의 verbose DB 에러(SQLITE_ERROR) → sqlmap이 back-end DBMS: SQLite 판정 + q 파라미터 주입가능 확인
      # → SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증. 공격자에게 주입 문법을 알려줌
      ```
      - sqlmap 은 `q` 파라미터에 여러 페이로드를 던지는데, JuiceShop 이 잘못된 입력에 `SQLITE_ERROR: near "'%'": syntax error` 같은 원본 DB 에러를 그대로 노출하므로, sqlmap 이 이 오류를 근거로 엔진을 확정하고 주입 가능성을 판정한다.
      - `--batch` 무인상호작용, `--level=2 --risk=2` 탐지 강도, `--disable-coloring` 색상 끔. (블라인드 추출 `--tables`/`--dump` 은 W05 의 인가 범위에서.)

      ## ✅ 합격 기준
      `SQLITE_ERROR` 출력 시 통과. **근거:** 잘못된 입력에 `SQLITE_ERROR: ... syntax error` 같은 DB 엔진
      에러가 노출되면 엔진 확정 + SQLi 표면 입증으로 곧바로 다음 공격(SQLi)으로 이어진다.
    hint: 'SQLITE_ERROR'
    category: manipulation
    points: 16
    answer: |
      # 1) sqlmap으로 검색 파라미터(q)에 주입을 시도 — 앱이 DB 원본 에러(SQLITE_ERROR)를 노출해 sqlmap이 엔진을 SQLite로 확정
      ssh att@192.168.0.202 'sqlmap -u "http://juice.el34.lab/rest/products/search?q=apple" --batch --level=2 --risk=2 --disable-coloring'
      # 2) 해석 — 앱의 verbose DB 에러(SQLITE_ERROR) → sqlmap이 back-end DBMS: SQLite 판정 + q 파라미터 주입가능 확인
      # → SQLITE_ERROR = DB 엔진(SQLite) 확정 + SQLi 표면 입증. 공격자에게 주입 문법을 알려줌
    answer_detail: "DB 에러 = 잘못된 입력에 DB 원본 에러가 노출되는 것(SQLITE_ERROR 가 증거). 앱이 이 오류를 그대로 흘리므로 sqlmap 이 back-end DBMS: SQLite 로 엔진을 확정하고 q 파라미터가 주입 가능함을 입증한다 — 곧바로 다음 공격(SQLi)으로 이어지므로 네 채널 중 가장 위험. 방어 1차는 사용자에겐 generic 메시지·원본은 로그로만, 근본 방어는 입력 검증·parameterized query(W05)."
    expected_output: |
      GET parameter 'q' is vulnerable. Do you want to keep testing the others (if any)? [y/N] N
      Parameter: q (GET)
          Type: boolean-based blind
          Title: AND boolean-based blind - WHERE or HAVING clause
      back-end DBMS: SQLite
      → SQLITE_ERROR(원본 DB 에러) 노출 → sqlmap이 back-end DBMS: SQLite 확정 + q 주입 표면 입증
    verify:
      type: output_contains
      expect: 'SQLite'
      field: stdout
      semantic:
        intent: "DB 에러 노출"
        success_criteria: ["DB 엔진 노출"]
        acceptable_methods: ["**[OSS] sqlmap (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — ④ 헤더 누출(비표준 헤더의 숨은 경로/스택)
      운영에 꼭 필요하지 않은 비표준 헤더(`X-...`)가 기술 스택이나 화면에 없는 숨은 경로를
      흘리는지 확인한다.

      ## 개념 한 줄
      `X-Powered-By` 는 어떤 언어·프레임워크인지, `X-Recruiting` 같은 앱별 헤더는 링크에 없는
      숨은 경로(메뉴)를 알려준다 — 공격자의 다음 진입점 단서다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb의 UncommonHeaders에서 비표준 헤더(x-recruiting/feature-policy/x-powered)만 추려 숨은 경로/스택 힌트 확인
      whatweb -a1 --color=never http://juice.el34.lab/ | tr ',' '\n' | grep -iE 'recruiting|feature-policy|powered'
      # 2) 해석 — X-Recruiting: /#/jobs = 숨은 경로 힌트, 불필요 헤더는 제거
      # → X-Recruiting: /#/jobs = 숨은 경로 힌트. 불필요 헤더는 제거
      ```
      - whatweb 은 표준 밖 응답 헤더를 `UncommonHeaders[...,feature-policy,x-recruiting]` 로 모아 보여준다. `tr ',' '\n' | grep -iE` 로 비표준 헤더 후보만 골라 본다(대소문자 무시).

      ## ✅ 합격 기준
      `Recruiting` 출력 시 통과. **근거:** `X-Recruiting: /#/jobs` 같은 비표준 헤더에서 숨은 경로/스택
      힌트가 노출되면 공격자의 다음 진입점 단서를 내준 것이다.
