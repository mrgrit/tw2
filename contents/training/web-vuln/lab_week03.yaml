      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/robots.txt"
      # 2) dvwa 의 robots.txt 도 수집 — 같은 IP(192.168.0.161), vhost 만 바꿔 확인(dvwa 는 WAF 가 403 차단)
      ssh att@192.168.0.202 "whatweb -a1 http://dvwa.el34.lab/robots.txt"
    answer_detail: "robots.txt = 크롤러 차단 목록이지만, Disallow 경로가 '숨긴 곳'을 역설적으로 알려준다(접근 차단 수단 아님). whatweb 의 robots_txt 플러그인이 juice 에서 robots_txt[/ftp] 를 그대로 파싱해 노출한다 — 이 /ftp 가 다음 정찰(디렉터리 리스팅) 의 입구다. dvwa 는 WAF 가 403 으로 막아 robots 수집 자체가 차단된다."
    expected_output: |
