        success_criteria: ["정보 노출 발견"]
        acceptable_methods: ["**[OSS] nikto (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      흔한 백업·임시 파일 이름을 돌며 응답 코드를 모아, 소스·설정·자격증명이 평문으로 노출되는지 점검한다.

      ## 📖 개념 한 줄
      서버는 `.php` 는 실행하지만 `.php.bak`/`~`/`.old` 같은 확장자는 실행하지 않고 텍스트로 그대로 내려준다.
      그래서 백업 파일이 200 이면 소스·DB 접속정보·시크릿이 평문 유출된다. 특히 `.env`(환경 변수) 는 치명적이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 흔한 백업/임시 파일명으로 커스텀 워드리스트 생성
      printf 'index.php.bak\nindex.php~\nconfig.php.old\nbackup.zip\n.env\n' > /tmp/wvbak.txt
      # 2) ffuf 로 FUZZ 자리에 대입 — 노출(200) 매치: dvwa 는 WAF 로 하나도 안 나옴(빈 출력 = 노출 없음)
      ffuf -u http://dvwa.el34.lab/FUZZ -w /tmp/wvbak.txt -mc 200 -s
      # 3) WAF 차단(403) 매치: 백업 이름 전부가 403 으로 막힘 = ModSec WAF 차단 시연
      ffuf -u http://dvwa.el34.lab/FUZZ -w /tmp/wvbak.txt -mc 403 -s
      # 4) 임시 워드리스트 정리
      rm -f /tmp/wvbak.txt
      ```

      ## 🔎 도구·옵션 풀이
      - `printf '...\n...' > /tmp/wvbak.txt` — 백업/임시 파일명을 한 줄에 하나씩 담은 커스텀 워드리스트.
      - `ffuf -u .../FUZZ -w <목록> -mc <코드> -s` — FUZZ 자리에 목록을 대입해 지정 상태 코드만 조용히 출력.
      - `-mc 200`(노출된 파일) 과 `-mc 403`(WAF 가 막은 요청) 을 나눠 돌려 "노출 vs 차단"을 대비해 본다.

      ## 🔢 응답 코드 읽기
      `-mc 200` 목록에 뜬 파일 = 노출(소스/설정/자격증명 유출, 즉시 심각) / `-mc 403` 에만 뜨면 WAF 차단 / 어디에도
      없으면 없음(404). dvwa 는 WAF(ModSecurity) 가 이 요청들을 전부 403 으로 막아 노출(200) 은 하나도 없다.

      ## ✅ 합격 기준
      `.env` 출력 시 통과. **근거:** ffuf 가 각 백업 파일명을 대입해 결과(여기선 전부 403 차단) 를 내면 점검
      성공이고, 만약 실환경에서 `.env` 가 200 목록에 뜨면 DB 비밀번호·시크릿 평문 유출로 즉시 심각 등급이다.
    hint: 'ffuf 백업 워드리스트'
    category: recon
    points: 12
    answer: |
      # 1) 흔한 백업/임시 파일명으로 커스텀 워드리스트 생성
      ssh att@192.168.0.202 "printf 'index.php.bak\nindex.php~\nconfig.php.old\nbackup.zip\n.env\n' > /tmp/wvbak.txt"
      # 2) ffuf 로 FUZZ 자리에 대입 — 노출(200) 매치: dvwa 는 WAF 로 하나도 안 나옴(빈 출력 = 노출 없음)
