      - Nikto v2.1.5
      + Target IP:          192.168.0.161
      + Target Hostname:    juice.el34.lab
      + Server: Apache/2.4.52 (Ubuntu)
      + Server leaks inodes via ETags, header found with file /, fields: 0xW/26af 0x19f308920ef
      + Uncommon header 'x-recruiting' found, with contents: /#/jobs
      + Uncommon header 'feature-policy' found, with contents: payment 'self'
