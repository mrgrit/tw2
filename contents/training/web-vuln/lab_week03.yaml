lab_id: standalone-web-vuln-week03
title: "정보수집(Recon) — WSTG-INFO 정찰 vs 정보 노출 축소"
version: standalone-web-vuln
course: web-vuln
week: 3
description: |
  WSTG-INFO(정보 수집) 실습 — 본격 공격(인증/SQLi/XSS) 에 앞서 표적이 의도치 않게 흘린 정보를 점검한다.
  robots.txt(숨긴 경로의 역설적 노출), HTML 주석(개발자 메모·자격증명), 백업 파일(.bak/.old/.env 의 소스·설정
  평문 유출), VCS 디렉토리(.git 노출 → 소스 전체 복원), 메타/에러 메시지(버전·내부 경로 노출) 를 수집하고,
  흩어진 노출을 하나의 익스플로잇 실마리로 종합한 뒤, 운영자 관점의 노출 축소(차단) 까지 정리한다.
  점검·공격은 모두 외부 공격자 VM 192.168.0.202(att/1, 출처 IP 192.168.0.202)에서 공인 진입 192.168.0.161 을
  거쳐 표적 vhost 로 수행한다 — `ssh att@192.168.0.202`(비번 1)로 접속해 실행한다. 인가된 실습만.
difficulty: medium
duration_minutes: 150
prerequisites:
  - "W01(HTTP 헤더·메서드)–W02(스캐너 nikto/whatweb/ffuf) 통과"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec 외부 공격자 VM 192.168.0.202 사용 가능"
  - "lecture §2(다섯 노출원 수집)·§3(실마리 종합)·§4(노출 축소) 숙지"
objectives:
  - "robots.txt·HTML 주석·백업 파일·VCS(.git) 노출을 nc 로 빠짐없이 수집한다"
  - "응답 코드(200=노출 / 404=없음 / 403=차단) 를 점검자 시선으로 해석한다"
  - "흩어진 노출(숨은 경로+소스+설정+자격증명) 을 다음 공격(인증/SQLi) 의 실마리로 종합한다"
  - "정보 노출 축소(robots 민감경로 제거·백업 분리·.git 차단·에러 일반화) 방어를 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      정보 수집을 시작하기 전, 표적 vhost 에 실제로 도달 가능한지부터 확인한다.

      ## 📖 개념 한 줄
      모든 웹 점검의 첫 단추는 "대상이 응답하는가"다. el34 에서는 외부 공격자 VM 192.168.0.202 컨테이너 외부 공격자 VM 192.168.0.202 가
      방화벽 게이트웨이 192.168.0.161 을 거쳐 표적에 닿고, `Host:` 헤더로 어느 vhost(사이트) 를 볼지 지정한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1)(att·1, 출처 192.168.0.202) 로 접속해 실행한다.

      ```bash
      # 1) 외부 공격자 VM 192.168.0.202(attacker)에서 juice vhost 도달 확인 — Host 헤더로 vhost 지정, 본문 버리고 응답코드만 juice= 형식으로
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      # 2) dvwa vhost 도 도달 확인 — 같은 IP(192.168.0.161), Host 헤더만 바꿔 다른 사이트 점검
      echo -en "GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```

      ## 🔎 도구·옵션 풀이
      - `nc`(넷캣) — 명령줄에서 raw HTTP 요청을 보내는 기본 도구.
      - `-w3` 3초 타임아웃, `| head -1 | grep -oE '[0-9]{3}'` 응답 상태 라인에서 코드만 `juice=<코드>` 로 출력.
      - 요청의 `Host: juice.el34.lab` 줄 — 같은 IP(192.168.0.161) 에서 어느 vhost 를 점검할지 지정.

      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice=200`(또는 302) 처럼 HTTP 코드가 돌아오면 대상에 도달해
      정보 수집을 시작할 준비가 된 것이다.
    hint: '도달성'
