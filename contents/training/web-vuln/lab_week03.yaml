        acceptable_methods: ["**[OSS] grep <!-- (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      흔한 백업·임시 파일 이름을 돌며 응답 코드를 모아, 소스·설정·자격증명이 평문으로 노출되는지 점검한다.

      ## 📖 개념 한 줄
      서버는 `.php` 는 실행하지만 `.php.bak`/`~`/`.old` 같은 확장자는 실행하지 않고 텍스트로 그대로 내려준다.
      그래서 백업 파일이 200 이면 소스·DB 접속정보·시크릿이 평문 유출된다. 특히 `.env`(환경 변수) 는 치명적이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 흔한 백업/임시 파일명을 하나씩 요청해 각 응답코드를 '파일명=코드' 로 나열(-o /dev/null: 본문 버림)
      echo -en "GET /index.php.bak HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      echo -en "GET /index.php~ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      echo -en "GET /config.php.old HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      echo -en "GET /backup.zip HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      echo -en "GET /.env HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      echo
      # 2) 해석 — 200=노출(소스/설정/자격증명 유출), 404=없음, 403=차단. 특히 .env=200 은 즉시 심각 등급
      ```

      ## 🔎 도구·옵션 풀이
      - `for f in ...; do ... done` — 흔한 백업 이름 목록을 한 번에 순회한다.
      - `-o /dev/null -w '$f=%{http_code} '` — 본문은 버리고 "파일명=응답코드"만 한 줄로 나열.
      - 마지막 `echo` — 줄바꿈 정리(가독성).

      ## 🔢 응답 코드 읽기
      `=200`(노출! 소스/설정/자격증명 유출) / `=404`(없음) / `=403`(차단). 200 이 보이면 즉시 그 파일을 받아 본다.

      ## ✅ 합격 기준
      `.env=` 출력 시 통과. **근거:** 각 파일의 응답 코드가 한 줄로 나오면 점검 성공이고, `.env=200` 이면
      DB 비밀번호·시크릿 평문 유출로 즉시 심각 등급이다.
    hint: '.bak/~/.old/.env 탐색'
    category: recon
    points: 12
    answer: |
      # 1) 흔한 백업/임시 파일명을 하나씩 요청해 각 응답코드를 '파일명=코드' 로 나열(-o /dev/null: 본문 버림)
      ssh att@192.168.0.202 "echo -en 'GET /index.php.bak HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
      ssh att@192.168.0.202 "echo -en 'GET /index.php~ HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
