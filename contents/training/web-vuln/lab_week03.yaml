      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
      # 2) dvwa vhost 도 도달 확인 — 같은 IP(192.168.0.161), Host 헤더만 바꿔 다른 사이트 점검
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "정보 수집 대상 = el34 의 web vhost 들(juice/dvwa). 응답 코드가 돌아오면 도달 성공으로, 본격 수집(robots/주석/백업/VCS) 의 전제 조건이 충족된 것이다."
