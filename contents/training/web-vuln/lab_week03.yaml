    instruction: |
      ## 🎯 목표
      웹루트에 노출된 VCS(버전 관리) 디렉토리와 메타 파일의 응답 코드를 모아, 소스 전체 유출 위험을 점검한다.

      ## 📖 개념 한 줄
      `.git` 폴더에는 프로젝트의 모든 소스와 수정 이력이 들어 있다. 이게 웹에 노출되면 git-dumper 같은 도구로
      소스 전체를 복원할 수 있어, 정보 수집에서 최고 등급의 발견이다(lecture §0.5.3). `.svn`·`.DS_Store` 도 동류다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) VCS/메타 파일명으로 커스텀 워드리스트 생성(백업 열거와 같은 ffuf 패턴)
      printf '.git/config\n.git/HEAD\n.svn/entries\n.DS_Store\n' > /tmp/wvvcs.txt
      # 2) 노출(200) 매치 — dvwa 는 WAF 로 하나도 안 나옴(빈 출력 = 노출 없음)
      ffuf -u http://dvwa.el34.lab/FUZZ -w /tmp/wvvcs.txt -mc 200 -s
      # 3) WAF 차단(403) 매치 — VCS 파일 전부가 403 으로 막힘 = ModSec WAF 차단 시연
      ffuf -u http://dvwa.el34.lab/FUZZ -w /tmp/wvvcs.txt -mc 403 -s
      # 4) 임시 워드리스트 정리
      rm -f /tmp/wvvcs.txt
      ```

      ## 🔎 도구·옵션 풀이
      - `.git/config`·`.git/HEAD` — git 저장소의 핵심 메타 파일(존재 시 .git 노출 확정).
      - `.svn/entries` — subversion 메타, `.DS_Store` — macOS 가 남기는 디렉토리 목록 파일.
      - 백업 열거와 같은 ffuf 커스텀 워드리스트로 `-mc 200`(노출)·`-mc 403`(차단) 을 나눠 확인한다.

      ## 🔢 응답 코드 읽기
      `-mc 200` 목록에 `.git/config` 이 뜨면 사실상 **소스 전체 유출**(최고 등급). `.DS_Store` 가 200 이면 디렉토리
      구조 노출. dvwa 는 WAF 가 이 요청들을 전부 403 으로 막아 노출(200) 은 없고 `-mc 403` 에 전부 뜬다.

