  - order: 2
    instruction: |
      ## 🎯 목표
      표적의 robots.txt 를 수집해, 거기 적힌 `Disallow:` 경로(숨긴 곳) 를 다음 점검 후보로 확보한다.

      ## 📖 개념 한 줄
      robots.txt 는 검색 크롤러에게 "긁지 말 경로"를 알리는 파일이지만, 거기 적힌 경로는 공격자에게는
      "숨긴 곳 목록"이 된다 — robots 는 접근 차단 수단이 아니라 역설적 노출원이다(lecture §0.5.2).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) dvwa 의 robots.txt 수집 — 본문 뒤에 [robots=응답코드] 를 덧붙여 존재 여부를 함께 확인
      echo -en "GET /robots.txt HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}' | head
      # 2) juice 의 robots.txt 도 수집 — Disallow 경로가 숨긴 곳을 역설적으로 노출
      echo -en "GET /robots.txt HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}' | head -5
      ```

      ## 🔎 도구·옵션 풀이
      - `/robots.txt` — 웹루트에 놓이는 크롤러 안내 파일(고정 경로).
      - `-w '\n[robots=%{http_code}]\n'` — 본문 뒤에 응답 코드를 한 줄로 덧붙여 존재 여부를 함께 본다.
      - `head` — 응답이 길 수 있으니 앞부분만 확인.

      ## ✅ 합격 기준
      `robots=` 출력 시 통과. **근거:** `[robots=200]` 과 `Disallow:` 줄이 보이면 숨긴 경로 확보,
      `[robots=404]` 면 robots.txt 자체가 없는 것(노출 없음).
    hint: 'nc raw robots.txt'
    category: recon
    points: 12
    answer: |
      # 1) dvwa 의 robots.txt 수집 — 본문 뒤에 [robots=응답코드] 를 덧붙여 존재 여부를 함께 확인
      ssh att@192.168.0.202 "echo -en 'GET /robots.txt HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}' | head"
      # 2) juice 의 robots.txt 도 수집 — Disallow 경로가 숨긴 곳을 역설적으로 노출
      ssh att@192.168.0.202 "echo -en 'GET /robots.txt HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}' | head -5"
    answer_detail: "robots.txt = 크롤러 차단 목록이지만, Disallow 경로가 '숨긴 곳'을 역설적으로 알려준다(접근 차단 수단 아님). 공격자의 첫 정찰 항목으로, 여기서 발견한 관리자·백업 경로가 다음 단계(인증/SQLi) 의 입구가 된다."
    expected_output: |
      User-agent: *
      Disallow: /
      [robots=200]
      User-agent: *
      Disallow: /ftp
      [juice robots=200]
    verify:
      type: output_contains
      expect: 'robots='
      field: stdout
      semantic:
        intent: "robots.txt 수집"
        success_criteria: ["robots 응답"]
        acceptable_methods: ["**[OSS] nc raw (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      페이지 소스에 남은 HTML 주석(`<!-- ... -->`) 을 추려, 개발자가 흘린 내부 정보를 점검한다.

      ## 📖 개념 한 줄
      HTML 주석은 브라우저 화면엔 안 보이지만 소스에는 그대로 남는 개발자 메모다. TODO·내부 경로·디버그
      정보, 때로는 임시 자격증명이 남기도 한다 — "화면에 안 보임"은 "비공개"가 아니다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice 페이지 본문을 받아 HTML 주석(<!-- 뒤 최대 50자)만 추출 — 하나도 없으면 '주석 없음' 출력
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -ioE '<!--.{0,50}' | head -3 || echo '주석 없음'
      # 2) 점검 의미 요약 — 개발자 주석에 TODO/자격증명/내부경로가 남기도 함
      # → 개발자 주석에 TODO/자격증명/내부경로/디버그 정보가 남기도
      ```

      ## 🔎 도구·옵션 풀이
      - `nc ... | grep` — 페이지 본문을 받아 파이프로 패턴 검색에 넘긴다.
      - `grep -ioE '<!--.{0,50}'` — 대소문자 무시(`-i`)·매치 부분만(`-o`)·확장정규식(`-E`) 으로
        `<!--` 뒤 최대 50자를 뽑는다.
      - `|| echo '주석 없음'` — 주석이 하나도 없으면(grep 실패) 대신 "주석 없음"을 출력.

      ## ✅ 합격 기준
      `주석` 출력 시 통과. **근거:** 내부 경로·자격증명 단서가 보이면 실마리로 기록하고, 없으면 `주석 없음`
      이 정상 출력(노출 없음)이다.
    hint: 'nc raw | grep <!--'
    category: recon
    points: 12
    answer: |
      # 1) juice 페이지 본문을 받아 HTML 주석(<!-- 뒤 최대 50자)만 추출 — 하나도 없으면 '주석 없음' 출력
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -ioE '<!--.{0,50}' | head -3 || echo '주석 없음'"
      # 2) 점검 의미 요약 — 개발자 주석에 TODO/자격증명/내부경로가 남기도 함
      # → 개발자 주석에 TODO/자격증명/내부경로/디버그 정보가 남기도
    answer_detail: "HTML 주석 = 개발자 메모(TODO/내부 경로/때로 자격증명). 브라우저 화면엔 안 보여도 페이지 소스에는 그대로 남으므로 nc+grep 으로 읽힌다. 자격증명이 주석에 남아 그대로 침해로 이어진 실제 사례가 많다."
    expected_output: |
      <!--
      → 개발자 주석에 TODO/자격증명/내부경로/디버그 정보가 남기도
    verify:
      type: output_contains
      expect: '주석'
      field: stdout
      semantic:
        intent: "HTML 주석 점검"
