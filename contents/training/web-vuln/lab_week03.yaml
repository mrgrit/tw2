      소스(지도) 가 합쳐지면 비로소 구체적 공격 경로가 된다 — 점 하나는 작지만, 이은 선이 곧 침해다(lecture §3).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
