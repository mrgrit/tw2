  - order: 2
    instruction: |
      ## 🎯 목표
      표적의 robots.txt 를 수집해, 거기 적힌 `Disallow:` 경로(숨긴 곳) 를 다음 점검 후보로 확보한다.

      ## 📖 개념 한 줄
      robots.txt 는 검색 크롤러에게 "긁지 말 경로"를 알리는 파일이지만, 거기 적힌 경로는 공격자에게는
      "숨긴 곳 목록"이 된다 — robots 는 접근 차단 수단이 아니라 역설적 노출원이다(lecture §0.5.2).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice 의 robots.txt 수집 — whatweb 의 robots_txt 플러그인이 Disallow 경로를 robots_txt[...] 로 그대로 뽑아 준다
      whatweb -a1 http://juice.el34.lab/robots.txt
      # 2) dvwa 의 robots.txt 도 수집 — 같은 IP(192.168.0.161), vhost 만 바꿔 확인(dvwa 는 WAF 가 403 차단)
      whatweb -a1 http://dvwa.el34.lab/robots.txt
      ```

      ## 🔎 도구·옵션 풀이
      - `/robots.txt` — 웹루트에 놓이는 크롤러 안내 파일(고정 경로).
      - `whatweb` 의 `robots_txt` 플러그인 — robots.txt 가 존재하면 그 안의 `Disallow:` 경로를 `robots_txt[/ftp]` 처럼 파싱해 노출한다.
      - 출력 머리의 `[200 OK]` 는 robots.txt 존재, `[403 Forbidden]` 은 WAF 차단(dvwa) 을 뜻한다.

      ## ✅ 합격 기준
      `robots_txt` 출력 시 통과. **근거:** juice 에서 `[200 OK]` 와 함께 `robots_txt[/ftp]` 가 보이면
      숨긴 경로(`/ftp`) 를 확보한 것, dvwa 는 `[403 Forbidden]` 으로 WAF 차단이 확인된다.
