  - order: 3
    instruction: |
      ## 🎯 목표
      취약점 스캐너 nikto 로 표적의 정보 노출(서버 배너·비표준 헤더·robots 항목·주석/메타 등)을 자동으로 점검한다.

      ## 📖 개념 한 줄
      개발자가 흘리는 정보는 HTML 주석(`<!-- ... -->`)뿐 아니라 서버 배너·비표준 응답 헤더·robots 항목·ETag
      까지 다양하다. nikto 는 이런 알려진 노출 패턴을 한 번에 점검하는 웹 취약점 스캐너다 — "화면에 안 보임"은 "비공개"가 아니다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) nikto 로 juice 의 정보 노출 자동 점검 — -maxtime 30s 로 시간 제한(공유 인프라 점유 방지), 앞 20줄만 확인
      nikto -h http://juice.el34.lab -maxtime 30s 2>&1 | head -20
      ```

      ## 🔎 도구·옵션 풀이
      - `nikto -h <URL>` — 알려진 취약 파일·위험 설정·누락 헤더·정보 노출을 자동 점검하는 웹 취약점 스캐너(W02 복습).
      - `-maxtime 30s` — 최대 30초만 점검하고 멈춰 공유 인프라 점유를 막는다.
      - 각 `+` 줄이 하나의 발견 — `Server:`(버전 노출), `Uncommon header`(비표준 헤더 노출), `robots.txt`(숨긴 경로 항목) 을 주목한다.

      ## ✅ 합격 기준
      `Uncommon header` 출력 시 통과. **근거:** nikto 가 `Server: Apache/2.4.52 (Ubuntu)`·`Uncommon header 'x-recruiting'`·
      robots 항목 등을 보고하면 정보 노출이 자동으로 식별된 것이다(각 항목은 사람이 재현·검증).
    hint: 'nikto 정보 노출'
    category: recon
    points: 12
    answer: |
      # 1) nikto 로 juice 의 정보 노출 자동 점검 — -maxtime 30s 로 시간 제한(공유 인프라 점유 방지), 앞 20줄만 확인
      ssh att@192.168.0.202 "nikto -h http://juice.el34.lab -maxtime 30s 2>&1 | head -20"
