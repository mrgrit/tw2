lab_id: standalone-web-vuln-week12
title: "API 보안 — BOLA/과다 데이터 노출/mass assignment vs API 인가"
version: standalone-web-vuln
course: web-vuln
week: 12
description: |
  OWASP API Security Top 10 점검 — API 는 화면(UI) 없는 또 다른 공격 표면이다. 화면에서 막은 통제도
  서버가 API 요청에 대해 다시 검사하지 않으면 curl 한 줄로 우회된다. 본 실습은 JuiceShop REST API 를
  대상으로 ① 공개 자원(/api/Products 200)과 보호 자원(/api/Users 401)의 경계를 매핑하고, ② 무인증
  엔드포인트(/api/Feedbacks)가 UserId 등 불필요 필드를 흘리는 과다 데이터 노출(API3)을 입증하며,
  ③ 순차 객체 id(/api/Users/{id})로 BOLA(API1, 객체 수준 인가)를 점검(el34 JuiceShop 은 401 보호=양호)
  하고, ④ 요청 본문에 미허용 필드를 끼워 넣는 mass assignment(API6)의 원리·영향·방어를 정리한다.
  근본 방어는 "모든 통제는 서버에서, 객체마다, 입력·출력 양쪽에" — 객체 수준 인가 + 응답/입력 allowlist
  + 토큰 검증이다. 공격은 el34-attacker(출처 IP 10.20.30.202). 인가된 표적(juice.el34.lab) vhost 만
  점검한다. 명령은 모두 el34 호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec 로 실행하며,
  신규 도구 설치는 없다(curl 기본 탑재).
difficulty: hard
duration_minutes: 160
prerequisites:
  - "W01–W11 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §3(BOLA) §4(과다노출) §5(mass assignment) 숙지"
objectives:
  - "curl 로 JuiceShop REST API 에 직접 요청해 공개(/api/Products 200)·보호(/api/Users 401) 경계를 응답 코드로 매핑한다"
  - "무인증 /api/Feedbacks 응답에서 UserId 등 불필요 필드를 추출해 과다 데이터 노출(API3)을 입증한다"
  - "순차 객체 id(/api/Users/{id})로 BOLA(API1)를 점검하고 401 보호(양호)·200 노출(치명)을 구분한다"
  - "mass assignment(API6)의 원리와 권한상승 영향을 설명한다"
  - "객체 수준 인가 + 응답/입력 allowlist + 토큰 검증으로 이어지는 서버측 API 인가 방어를 보고서로 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — REST API 도달성 확인
      점검의 전제는 표적 API 에 요청이 닿는다는 것이다. 연결이 안 되면 이후의 모든 음성 결과("취약점
      없음")가 무의미하므로, 본격 점검 전 항상 도달성부터 확인한다. 본 주차의 표적은 화면(UI)이 아니라
      JuiceShop 의 REST API(`/api/...`)이며, `curl` 로 직접 두드린다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'api=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Products"
      ```
      - `-sk` = 진행표시 숨김(`-s`) + 자체서명 인증서 허용(`-k`). `-H 'Host: juice.el34.lab'` 로 어느
        vhost(여기선 JuiceShop)를 점검할지 지정한다. `-o /dev/null -w 'api=%{http_code}'` 는 본문은 버리고
        **응답 코드만** 출력하는 관용구다.

      ## ✅ 합격 기준
      출력에 `api=<코드>`(예: `api=200`)가 나오면 REST API 에 도달한 것이다. 요청은
      el34-attacker(10.20.30.202) → fw → ips → web → JuiceShop 경로를 거친다.
    hint: 'api 도달'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'api=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Products"
    answer_detail: "API 보안 점검 대상 = JuiceShop REST API. 출력에 'api='(응답 코드)가 보이면 표적에 도달해 점검 가능한 상태임을 확인한 것 — 점검 착수의 첫 단계다."
    verify:
      type: output_contains
      expect: 'api='
      field: stdout
      semantic:
        intent: "API 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 공개 자원 매핑 — /api/Products (200)
      API 점검의 첫 단계는 **공개/보호 경계 매핑** 이다. 어디가 인증 없이 열려 있고 어디가 보호되는지를
      알아야 점검 방향이 선다. `/api/Products` 는 상품 카탈로그라 인증 없이 열려 있는 것이 **정상 설계일
      수 있는** 공개 자원이며, 경계 매핑의 기준선(공개 쪽)이 된다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'prod=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Products"
      ```

      ## ✅ 합격 기준
      출력이 `prod=200` 이면 인증 없이 접근 가능한 공개 자원으로 식별된다. 주의 — 200 이라고 무조건
      취약한 것이 아니다(카탈로그 공개는 정상일 수 있다). 다음 미션에서 볼 보호 자원(401)과의 **대비**가
      핵심이다.
    hint: 'Products 200'
    category: recon
    points: 12
    answer: |
      echo "=== 공개 자원 ==="
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'prod=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Products"
      echo "→ 200 = 인증 없이 접근 가능한 공개 자원(정상 설계일 수 있음)"
    answer_detail: "공개 자원 = 인증 불필요(200). 카탈로그 등 의도된 공개일 수 있어 200 자체가 취약은 아니다. 보호 자원(401)과 대비해 경계를 긋는 매핑의 출발점이다."
    verify:
      type: output_contains
      expect: 'prod=200'
      field: stdout
      semantic:
        intent: "공개 자원 식별"
        success_criteria: ["200 공개"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 보호 자원 매핑 — /api/Users (401)
      공개 쪽 기준선(미션 2)을 그렸으면, 이번엔 **보호되어야 할 자원이 실제로 보호되는가** 를 확인한다.
      사용자 목록은 인증 없이 열려선 안 되는 대표적 자원이다. `401 Unauthorized`(인증 필요)는 인증 경계가
      제대로 그어졌다는 1차 증거이고, BOLA(미션 5)의 1차 방어가 양호하다는 신호이기도 하다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'users=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users"
      ```

      ## ✅ 합격 기준
      출력이 `users=401` 이면 인증으로 보호되는 자원으로 식별된다(양호). 만약 200 이 나온다면 사용자
      목록이 무인증으로 노출되는 것으로, 그 자체가 심각한 인증·인가 결함이다. 공개(미션 2 200)와 보호
      (미션 3 401)의 대비로 API 인가 경계 지도가 완성된다.
    hint: 'Users 401'
    category: recon
    points: 12
    answer: |
      echo "=== 보호 자원 ==="
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'users=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users"
      echo "→ 401 = 인증 필요(양호). 사용자 목록은 보호되어야 정상"
    answer_detail: "보호 자원 = 인증 필요(401). /api/Users가 401 로 보호됨 = 인증 경계가 그어져 있고 BOLA 1차 방어 양호. 여기서 200 이 나오면 사용자 목록 무인증 노출이라는 발견이 된다."
    verify:
      type: output_contains
      expect: 'users=401'
      field: stdout
      semantic:
        intent: "보호 자원 식별"
        success_criteria: ["401 보호"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 과다 데이터 노출 (OWASP API3)
      과다 데이터 노출(API3)은 응답이 **클라이언트가 실제로 쓰지 않는 필드까지** 내려주는 결함이다.
      개발자가 DB 객체를 통째로 직렬화해 보내고 "어차피 화면이 거른다"고 가정하면 생긴다. 그러나 거르는
      것은 화면일 뿐 응답 자체는 모든 필드를 담으므로, 응답 **본문을 직접 받아 보면** 화면에 안 보이던
      필드가 드러난다. 이번 미션은 그래서 응답 코드가 아니라 **응답 본문** 을 검사한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE 'UserId[^,]*' | head -3"
      ```
      - 앞 미션들과 달리 `-o /dev/null` 을 빼고 **본문을 받아** `grep -oE 'UserId[^,]*'` 로 `UserId` 필드를
        뽑는다. `/api/Feedbacks` 는 고객 피드백 엔드포인트로 **무인증 200** 을 준다.

      ## ✅ 합격 기준
      출력에 `UserId` 가 보이면 과다 데이터 노출(API3) 입증이다 — 피드백 내용만 보여주면 될 응답에 작성
      사용자의 `UserId`(와 일부 이메일 조각)가 함께 실려 있다. 화면에는 안 보이지만 응답에는 들어 있다는
      점이 핵심이다.
    hint: 'Feedbacks UserId'
    category: manipulation
    points: 16
    answer: |
      echo "=== 과다 데이터 노출 (API3) ==="
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE 'UserId[^,]*' | head -3"
      echo "→ /api/Feedbacks 무인증 200 + UserId·이메일 조각 노출. 응답이 필요 이상(API3)"
    answer_detail: "과다 노출(API3) = 응답에 클라이언트가 안 쓰는 불필요 필드(UserId/이메일)까지 포함. /api/Feedbacks 가 무인증 200 으로 UserId 를 흘리는 것이 증거 — 화면이 아니라 응답 본문을 봐야 잡힌다. 방어는 직렬화 allowlist(필요한 필드만)."
    verify:
      type: output_contains
      expect: 'UserId'
      field: stdout
      semantic:
        intent: "과다 데이터 노출"
        success_criteria: ["불필요 필드 노출"]
        acceptable_methods: ["**[OSS] API 응답 검사 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 BOLA (OWASP API1) — 객체 수준 인가 점검
      BOLA(Broken Object Level Authorization)는 OWASP API Top 10 의 **1위** 이자 가장 흔한 API 침해
      원인이다. API 가 객체를 `/api/Users/1` 처럼 **순차 숫자 id** 로 가리킬 때, 서버가 인증(로그인)만
      확인하고 **"이 객체가 요청자의 것이냐"(객체 소유권 = 인가)** 를 검사하지 않으면, id 를 `1→2→3` 으로
      바꿔가며 남의 객체를 줄줄이 읽을 수 있다. 화면에서 내 데이터만 보이게 가려도 막을 수 없는, 순수한
      서버측 인가 문제다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo -n 'bola='; for id in 1 2 3; do curl -sk -o /dev/null -w \"\$id:%{http_code} \" -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users/\$id; done; echo"
      ```
      - `for id in 1 2 3` 로 객체 id 를 순차로 바꿔 `/api/Users/$id` 를 호출하고, 각 응답 코드를
        `$id:%{http_code}` 형식으로 한 줄에 모아 출력한다.

      ## ✅ 합격 기준
      출력이 `bola=1:401 2:401 3:401` 처럼 **401(보호)** 이면 객체 수준 인가가 작동하는 것이다 — el34
      JuiceShop 의 정상(양호) 상태다. 핵심 깨달음: **막혀 있음(401)을 확인하는 것도 점검의 결과** 다.
      반대로 200 이 섞여 나오면 그 id 의 객체가 무인증으로 노출되는 **치명적 BOLA** 의 증거다.
    hint: 'Users/{id} 순차'
    category: manipulation
    points: 14
    answer: |
      echo "=== BOLA (API1) ==="
      docker exec el34-attacker sh -c "echo -n 'bola='; for id in 1 2 3; do curl -sk -o /dev/null -w \"\$id:%{http_code} \" -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users/\$id; done; echo"
      echo "→ 순차 객체 id로 남의 자원 접근 시도. 401 = 객체수준 인가 양호. 200이면 BOLA 치명"
    answer_detail: "BOLA(API1) = 순차 객체 id로 타인 자원 접근 시도. el34 JuiceShop 은 401(보호)=객체 수준 인가 양호이며, 막혀 있음을 확인하는 것도 점검 결과다. 200 이면 치명적 노출. 근본 방어는 접근마다 객체 소유권을 검사하는 객체 수준 인가."
    verify:
      type: output_contains
      expect: 'bola='
      field: stdout
      semantic:
        intent: "BOLA 시도"
        success_criteria: ["객체수준 인가 점검"]
        acceptable_methods: ["**[OSS] 순차 id (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 영향 — API 취약점이 현실에 미치는 결과
      발견을 나열만 하면 "그래서 무엇이 위험한가"가 보이지 않는다. 본 미션은 앞서 점검한 세 API
      취약점이 실제로 어떤 피해로 이어지는지를 한 줄씩 자리매김한다. mass assignment(API6)는 직접
      점검하지 않았지만 원리상 영향이 명확하므로 함께 정리한다(요청 본문에 미허용 필드를 끼워 넣어
      서버가 무비판 바인딩하면 권한이 상승한다).

      ## 💻 실행 명령
      ```bash
      echo "BOLA→타인데이터, 과다노출→PII유출, mass assignment→권한상승"
      ```
      - PII(Personally Identifiable Information) = 개인을 식별할 수 있는 정보(이메일·이름·전화번호 등).

      ## ✅ 합격 기준
      출력에 세 영향이 정리되고 핵심어 `PII` 가 포함되면 된다. BOLA(API1)→객체 id 교체로 타인 데이터
      대량 수집, 과다 노출(API3)→응답의 불필요 필드로 PII 유출, mass assignment(API6)→미허용 필드
      주입으로 권한 상승. 셋의 공통점은 모두 **UI 통제를 우회** 한다는 것이다.
    hint: 'PII유출/권한상승'
    category: analysis
    points: 10
    answer: |
      echo "=== 영향 ==="
      echo "BOLA(API1): 객체 id 교체로 타인 데이터 대량 수집"
      echo "과다 노출(API3): 응답의 불필요 필드(이메일/내부ID) → PII 유출"
      echo "Mass assignment(API6): 미허용 필드(isAdmin) 주입 → 권한 상승"
      echo "→ API는 UI 통제 우회. 서버측 인가/직렬화 통제 없으면 치명"
    answer_detail: "영향 = 타인 데이터 대량 수집(BOLA/API1) / PII 유출(과다노출/API3) / 권한상승(mass assignment/API6). 세 취약점 모두 화면(UI) 통제를 우회한다는 것이 공통 핵심이며, 그래서 통제는 서버측에서 강제해야 한다."
    verify:
      type: output_contains
      expect: 'PII'
      field: stdout
      semantic:
        intent: "API 영향"
        success_criteria: ["데이터유출/권한상승"]
        acceptable_methods: ["**[관리적] 영향 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 서버측 API 인가
      점검의 가치는 "고치는 길"을 제시하는 데 있다. 본 주차 세 취약점은 뿌리가 같으므로(통제를 화면에
      맡기고 서버에서 빠뜨림), 방어도 하나의 원칙으로 모인다 — **모든 통제는 서버에서, 객체마다,
      입력·출력 양쪽에 강제한다.** 이를 네 가지 구체 통제로 정리한다. WAF(ModSecurity)는 SQLi/XSS 같은
      알려진 패턴은 잡지만 BOLA·mass assignment 같은 인가·로직 결함은 시그니처로 잡기 어려우므로,
      근본 방어는 WAF 가 아니라 **애플리케이션 서버측 인가·검증** 임에 유의한다.

      ## 💻 실행 명령
      ```bash
      echo "객체수준인가(BOLA), 응답필드최소화(과다노출), 입력allowlist/DTO(mass assignment), 토큰검증"
      ```
      - DTO(Data Transfer Object) = 입력으로 받을 필드만 정의해 둔 전용 객체(허용 필드 틀).

      ## ✅ 합격 기준
      출력에 네 통제가 정리되고 핵심어 `allowlist` 가 포함되면 된다. ① 객체 수준 인가(BOLA)
      ② 응답 필드 최소화/직렬화 allowlist(과다 노출) ③ 입력 바인딩 allowlist/DTO(mass assignment)
      ④ 토큰 검증 + 속도 제한 + 로깅(인증·열거). 각 통제가 어느 취약점(API1/3/6/2)에 대응하는지 1:1 로
      연결할 수 있어야 한다.
