lab_id: standalone-web-vuln-week09
title: "접근제어 — IDOR/권한상승/인가우회 vs 서버측 인가"
version: standalone-web-vuln
course: web-vuln
week: 9
description: |
  OWASP Top 10 의 1위 취약점인 A01(Broken Access Control, 취약한 접근제어)을 WSTG-ATHZ(인가 점검)
  방법론으로 점검한다. 인증(누구냐)은 통과하거나 아예 요구되지 않더라도, 인가(무엇을 할 수 있느냐)
  검사가 비면 남의 자원·관리 기능에 닿는다. el34 의 JuiceShop(juice.el34.lab)을 표적으로,
  점검자 컨테이너 외부 공격자 VM 192.168.0.202(출처 IP 192.168.0.202)에서 네 가지 접근제어 결함을 차례로 입증한다 —
  ① 무인증 관리 엔드포인트(로그인 없이 200), ② 강제 브라우징(링크 없는 /ftp 직접 접근), ③ 인가
  일관성 부재(보호 401 vs 노출 200 불일치), ④ IDOR(순차 자원 ID 바꿔치기 = 수평 권한상승). 발견의
  증거는 모두 HTTP 응답 코드(200=노출/취약, 401·403=보호)이며, 흔적은 web 의 access.log 에 남는다.
  근본 방어는 서버측 인가(소유권·역할 전수 검사 + 기본 거부)뿐임을 보고서로 정리한다.
  공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인 진입 192.168.0.161로 — `ssh att@192.168.0.202`(비번 1)로
  접속해 수행하고, 방어 로그 확인은 `ssh ccc@{{TARGET_IP}}`(el34 호스트) 후 `docker exec -it el34-web bash`. 인가된 표적만 점검한다.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(WSTG-ATHZ 4축) §4(서버측 인가) 숙지"
objectives:
  - "무인증 관리 엔드포인트(수직 권한상승의 극단형)와 강제 브라우징(UI 숨김은 방어 아님)을 응답 코드로 발견한다"
  - "보호(401) vs 노출(200) 대조로 인가 일관성 부재가 통제 누락의 신호임을 확인한다"
  - "순차 자원 ID(IDOR=수평 권한상승)로 소유권 검사 여부를 점검한다"
  - "서버측 인가(소유권·역할 전수 검사 + 기본 거부)를 근본 방어로 정리하고 종합 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      접근제어 점검을 시작하기 전에, 표적 JuiceShop 에 요청이 도달하는지부터 확인한다.
      ## 개념 한 줄
      도달성(reachability) 확인은 점검의 전제다 — 연결이 안 되면 이후 "접근 안 됨" 결과가 모두 무의미하다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) juice vhost 도달·핑거프린팅 — whatweb로 상태코드/서버/타이틀을 한 번에(att /etc/hosts가 juice.el34.lab→161)
      whatweb -a1 http://juice.el34.lab/
      ```
      ## ✅ 합격 기준
      `Juice Shop` 출력 시 통과. **근거:** whatweb 결과에 `[200 OK]` 와 `Title[OWASP Juice Shop]` 이 나오면 fw→web 경로로 표적에 도달·라우팅된 것 — 점검 착수 가능.
      - **whatweb**: 웹 핑거프린팅 스캐너. URL 하나로 응답 상태코드(`[200 OK]`)·서버(`Apache`)·타이틀(`Title[OWASP Juice Shop]`)을
        한 번에 식별한다. `-a1` 은 공격성 레벨 1(stealthy, 최소 요청).
      - **192.168.0.161**: el34 방화벽(fw) 게이트웨이. att 의 `/etc/hosts` 가 `juice.el34.lab → 192.168.0.161` 이라 요청이 fw → web(Apache) 경로로 JuiceShop 에 닿는다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) juice vhost 도달·핑거프린팅 — whatweb로 상태코드/서버/타이틀을 한 번에(att /etc/hosts가 juice.el34.lab→161)
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/"
    answer_detail: "접근제어 점검 대상 = JuiceShop. whatweb 결과에 [200 OK] + Title[OWASP Juice Shop] 이 나오면 fw→web 경로로 표적에 도달·라우팅된 것 — 점검 착수 가능."
    expected_output: |
      http://juice.el34.lab/ [200 OK] Apache[2.4.52], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[OWASP Juice Shop], X-Frame-Options[SAMEORIGIN], UncommonHeaders[access-control-allow-origin,x-content-type-options,feature-policy,x-recruiting], IP[192.168.0.161]
    verify:
      type: output_contains
      expect: 'Juice Shop'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      로그인 없이(익명으로) 관리 엔드포인트에 접근되는지 확인해 가장 손쉬운 접근제어 실패(A01)를 입증한다.
      ## 개념 한 줄
      무인증 노출 = *관리자만* 접근해야 할 자원이 인증조차 요구하지 않고 열려 있는 것 — 수직 권한상승의 극단형이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 로그인(인증 헤더) 없이 관리 설정 엔드포인트를 whatweb로 호출 → [200 OK]면 역할검사 누락(A01)
      whatweb -a1 http://juice.el34.lab/rest/admin/application-configuration
      # 2) 해석 — [200 OK]=인증 없이 앱 설정 노출(인가 통제 부재 A01), [401/403]=보호됨
      # → 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)
      ```
      ## ✅ 합격 기준
      `200 OK` 출력 시 통과. **근거:** 인증 헤더 없이 관리 설정(application-configuration)이 `[200 OK]` 로
      노출되면(whatweb 가 Email[donotreply@owasp-juice.shop] 등 설정 내부 정보까지 파싱) 서버가 "관리자만"이라는
      역할 검사를 빼먹은 A01 취약이다([401/403] 이면 보호됨).
      - **/rest/admin/application-configuration**: 이름 그대로 *관리(admin)* 설정 엔드포인트. 익명 `[200 OK]` 면 서버가
        "관리자만"이라는 역할 검사를 빼먹은 것이다.
      - **A01(Broken Access Control)**: OWASP Top 10 의 1위 결함. 권한 검사를 서버에서 누락해 권한 밖 자원에 닿는 모든 경우.
    hint: 'application-configuration'
    category: manipulation
    points: 14
    answer: |
      # 1) 로그인(인증 헤더) 없이 관리 설정 엔드포인트를 whatweb로 호출 → [200 OK]면 역할검사 누락(A01)
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/rest/admin/application-configuration"
      # 2) 해석 — [200 OK]=인증 없이 앱 설정 노출(인가 통제 부재 A01), [401/403]=보호됨
      # → 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)
    answer_detail: "무인증 관리 엔드포인트 = 역할(role) 검사 누락. [200 OK] 면 익명에게 관리 설정이 노출된 것 = A01 취약(수직 권한상승의 극단형). whatweb 가 노출된 설정에서 Email[donotreply@owasp-juice.shop] 까지 파싱해 낸다. [401/403] 이면 보호됨."
    expected_output: |
      http://juice.el34.lab/rest/admin/application-configuration [200 OK] Apache[2.4.52], Email[donotreply@owasp-juice.shop], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], IP[192.168.0.161], UncommonHeaders[access-control-allow-origin,x-content-type-options,feature-policy,x-recruiting], X-Frame-Options[SAMEORIGIN]
      → 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)
    verify:
      type: output_contains
      expect: '200 OK'
      field: stdout
      semantic:
        intent: "무인증 관리"
        success_criteria: ["200 노출"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      화면 메뉴에 링크가 없는 경로(/ftp)를 URL 로 직접 호출해, "UI 에 안 보이면 안전하다"는 착각을 깬다.
      ## 개념 한 줄
      강제 브라우징(Forced Browsing) = 링크를 따르지 않고 URL 을 직접 입력해 숨겨진 경로에 접근을 시도하는 점검 기법.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 화면 메뉴에 링크 없는 경로 /ftp 를 whatweb로 직접 호출 → [200 OK] + 디렉터리 리스팅(강제 브라우징)
      whatweb -a1 http://juice.el34.lab/ftp
      # 2) 해석 — UI에 링크 없어도 직접 URL로 접근됨, 인가는 UI 숨김이 아니다
      # → UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다
      ```
      ## ✅ 합격 기준
      `listing directory` 출력 시 통과. **근거:** whatweb 가 `[200 OK]` 와 `Title[listing directory /ftp]` 를 내면
      링크가 없어도 접근 자체는 막히지 않고 디렉터리가 리스팅됨이 확인된다 — UI 숨김은 방어가 아니다.
      - **/ftp**: JuiceShop 의 화면 메뉴에 링크가 없는 디렉터리. 직접 호출해 `[200 OK]` 디렉터리 리스팅이 나오면 UI 숨김이 방어가 아님이 입증된다.
      - **자동화 참고**: 단어 목록으로 경로 수천 개를 던지는 디렉터리 퍼저 **ffuf** 가 attacker 에 있다(예: `ffuf -u http://juice.el34.lab/FUZZ -w /usr/share/wfuzz/wordlist/general/common.txt -ac -mc 200,301,302,401,403 -s` → `assets`, `ftp` 발견). 본 미션은 whatweb 로 단일 경로만 확인.
    hint: '/ftp'
    category: manipulation
    points: 14
    answer: |
      # 1) 화면 메뉴에 링크 없는 경로 /ftp 를 whatweb로 직접 호출 → [200 OK] + 디렉터리 리스팅(강제 브라우징)
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/ftp"
      # 2) 해석 — UI에 링크 없어도 직접 URL로 접근됨, 인가는 UI 숨김이 아니다
      # → UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다
    answer_detail: "강제 브라우징 = 링크 없는 자원(/ftp)에 URL 직접 접근. whatweb 가 [200 OK] + Title[listing directory /ftp] 를 내면 'UI 숨김은 방어가 아님'이 입증됨. 진짜 방어는 그 경로에도 인가 검사를 두는 것."
    expected_output: |
      http://juice.el34.lab/ftp [200 OK] HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[listing directory /ftp], IP[192.168.0.161]
      → UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다
    verify:
      type: output_contains
      expect: 'listing directory'
      field: stdout
      semantic:
        intent: "강제 브라우징"
        success_criteria: ["직접 접근"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      보호되는 엔드포인트(401)와 노출되는 엔드포인트(200)를 나란히 호출해 인가 정책의 불일치를 드러낸다.
      ## 개념 한 줄
      인가 일관성 부재 = 접근제어가 중앙에서 균일하게 강제되지 않아, 어떤 곳은 막고(401) 어떤 곳은 여는(200) 구조적 약점.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 보호되어야 정상인 사용자 컬렉션(/api/Users)을 whatweb로 → [401 Unauthorized]면 인가 동작 중
      whatweb -a1 http://juice.el34.lab/api/Users
      # 2) 같은 사이트의 관리 설정도 whatweb로 → [200 OK] 노출
      whatweb -a1 http://juice.el34.lab/rest/admin/application-configuration
      # 3) 해석 — /api/Users(401 보호) vs admin-config(200 노출)의 불일치가 중앙 인가 정책 부재 신호
      # → /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호
      ```
      ## ✅ 합격 기준
      `401 Unauthorized` 출력 시 통과. **근거:** `/api/Users`(보호 `[401 Unauthorized]`, Title 에 `No Authorization
      header`)와 admin-config(노출 `[200 OK]`)의 불일치가 드러나면 중앙 인가 정책이 없다는 신호다.
      - **/api/Users**: 보호되어야 정상인 사용자 컬렉션 엔드포인트. `[401 Unauthorized]` 면 인가가 동작 중이라는 뜻(whatweb Title 이 `UnauthorizedError: No Authorization header was found`).
      - **401 vs 403**: 401=인증 필요(누군지 모름), 403=인가 거부(누군진 알지만 권한 없음). 둘 다 "막힘". 200 이 곧 노출(취약).
      - **불일치의 의미**: 한쪽은 막고(401) 한쪽은 여는(200) 것 자체가 "중앙 인가 정책이 없다"는 신호다.
    hint: '401 vs 200'
    category: analysis
    points: 14
    answer: |
      # 1) 보호되어야 정상인 사용자 컬렉션(/api/Users)을 whatweb로 → [401 Unauthorized]면 인가 동작 중
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/api/Users"
      # 2) 같은 사이트의 관리 설정도 whatweb로 → [200 OK] 노출
      ssh att@192.168.0.202 "whatweb -a1 http://juice.el34.lab/rest/admin/application-configuration"
      # 3) 해석 — /api/Users(401 보호) vs admin-config(200 노출)의 불일치가 중앙 인가 정책 부재 신호
      # → /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호
    answer_detail: "인가 일관성 = 같은 종류 자원인데 일부는 보호(401)·일부는 노출(200)되는 불일치. /api/Users 가 [401 Unauthorized](No Authorization header)로 보호되고 admin-config 가 [200 OK] 노출이면, 둘의 불일치 자체가 중앙 인가 정책 부재(통제 누락)의 신호다."
    expected_output: |
      http://juice.el34.lab/api/Users [401 Unauthorized] HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[UnauthorizedError: No Authorization header was found], IP[192.168.0.161]
      http://juice.el34.lab/rest/admin/application-configuration [200 OK] Email[donotreply@owasp-juice.shop], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], IP[192.168.0.161]
      → /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호
    verify:
      type: output_contains
      expect: '401 Unauthorized'
      field: stdout
      semantic:
        intent: "인가 일관성"
        success_criteria: ["보호 vs 노출 대조"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      자원 ID 를 1, 2, 3 으로 바꿔가며 호출해, 서버가 소유권을 검사하는지(남의 자원이 노출되는지) 점검한다.
      ## 개념 한 줄
      IDOR(Insecure Direct Object Reference) = 자원 ID 만 바꿔 소유권 검사 없는 틈으로 남의 자원에 접근하는 결함 = 수평 권한상승.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 자원 ID를 ffuf로 1~5 퍼징(순차 ID는 예측 가능) → 각 ID의 Status 확인
      seq 1 5 > /tmp/ids.txt
      ffuf -u http://juice.el34.lab/api/Users/FUZZ -w /tmp/ids.txt -mc all 2>/dev/null | grep 'Status'
      # 2) 해석 — 모든 ID가 401(No Authorization)=소유권/인가 검사 동작, 200이면 남의 자원 노출(치명적)
