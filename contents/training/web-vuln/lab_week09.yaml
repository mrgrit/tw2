      - **sudo tail -N**: 로그 끝 N 줄을 권한으로 읽는다. **grep -E 'admin|ftp|Users'**: 관리/강제브라우징 경로가 든 줄만 추린다(접근 시도 흔적).
      - 인가 *실패* 자체를 앱이 로깅하고 SIEM 으로 모으는 것이 형식상 정상인 이 공격을 잡는 핵심 운영이다.
