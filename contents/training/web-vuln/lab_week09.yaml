      docker exec el34-web sh -c "sudo tail -120 /var/log/apache2/juice_access.log 2>/dev/null | grep -E 'admin|ftp|Users' | tail -5; echo detected"
      # 2) 해석 — 무인증 관리/강제 브라우징 시도는 access.log에 흔적(인가 실패는 앱 로그 모니터링 필요)
