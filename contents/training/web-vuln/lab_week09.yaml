lab_id: standalone-web-vuln-week09
title: "접근제어 — IDOR/권한상승/인가우회 vs 서버측 인가"
version: standalone-web-vuln
course: web-vuln
week: 9
description: |
  OWASP Top 10 의 1위 취약점인 A01(Broken Access Control, 취약한 접근제어)을 WSTG-ATHZ(인가 점검)
  방법론으로 점검한다. 인증(누구냐)은 통과하거나 아예 요구되지 않더라도, 인가(무엇을 할 수 있느냐)
  검사가 비면 남의 자원·관리 기능에 닿는다. el34 의 JuiceShop(juice.el34.lab)을 표적으로,
  점검자 컨테이너 el34-attacker(출처 IP 10.20.30.202)에서 네 가지 접근제어 결함을 차례로 입증한다 —
  ① 무인증 관리 엔드포인트(로그인 없이 200), ② 강제 브라우징(링크 없는 /ftp 직접 접근), ③ 인가
  일관성 부재(보호 401 vs 노출 200 불일치), ④ IDOR(순차 자원 ID 바꿔치기 = 수평 권한상승). 발견의
  증거는 모두 HTTP 응답 코드(200=노출/취약, 401·403=보호)이며, 흔적은 web 의 access.log 에 남는다.
  근본 방어는 서버측 인가(소유권·역할 전수 검사 + 기본 거부)뿐임을 보고서로 정리한다.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec 로 실행하며, 인가된 표적만 점검한다.
difficulty: hard
duration_minutes: 160
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(WSTG-ATHZ 4축) §4(서버측 인가) 숙지"
objectives:
  - "무인증 관리 엔드포인트(수직 권한상승의 극단형)와 강제 브라우징(UI 숨김은 방어 아님)을 응답 코드로 발견한다"
  - "보호(401) vs 노출(200) 대조로 인가 일관성 부재가 통제 누락의 신호임을 확인한다"
  - "순차 자원 ID(IDOR=수평 권한상승)로 소유권 검사 여부를 점검한다"
  - "서버측 인가(소유권·역할 전수 검사 + 기본 거부)를 근본 방어로 정리하고 종합 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      접근제어 점검을 시작하기 전에, 표적 JuiceShop 에 요청이 도달하는지부터 확인한다.
      ## 개념 한 줄
      도달성(reachability) 확인은 점검의 전제다 — 연결이 안 되면 이후 "접근 안 됨" 결과가 모두 무의미하다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 내부 발판(attacker)에서 juice vhost 도달 확인 — Host 헤더로 vhost 지정, 응답코드만 juice= 형식으로
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice=<코드>`(예: 200)가 나오면 fw→web 경로로 표적에 도달한 것 — 점검 착수 가능.
      - **curl**: 명령줄 HTTP 클라이언트. `-H 'Host: juice.el34.lab'` 로 어느 vhost(사이트)를 칠지 지정하고,
        `-o /dev/null -w '%{http_code}'` 로 본문은 버리고 응답 코드만 출력한다.
      - **10.20.30.1**: el34 방화벽(fw) 게이트웨이. 여기로 보낸 요청이 fw → web(Apache) 경로로 JuiceShop 에 닿는다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 내부 발판(attacker)에서 juice vhost 도달 확인 — Host 헤더로 vhost 지정, 응답코드만 juice= 형식으로
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "접근제어 점검 대상 = JuiceShop. juice=<코드>가 출력되면 fw→web 경로로 표적에 도달한 것 — 점검 착수 가능."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      로그인 없이(익명으로) 관리 엔드포인트에 접근되는지 확인해 가장 손쉬운 접근제어 실패(A01)를 입증한다.
      ## 개념 한 줄
      무인증 노출 = *관리자만* 접근해야 할 자원이 인증조차 요구하지 않고 열려 있는 것 — 수직 권한상승의 극단형이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 로그인(인증 헤더) 없이 관리 설정 엔드포인트 호출 → admincfg= 응답코드(200이면 역할검사 누락 = A01)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/rest/admin/application-configuration"
      # 2) 해석 — 200=인증 없이 앱 설정 노출(인가 통제 부재 A01), 401/403=보호됨
      echo "→ 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)"
      ```
      ## ✅ 합격 기준
      `admincfg=200` 출력 시 통과. **근거:** 인증 헤더 없이 관리 설정(application-configuration)이 200 으로
      노출되면 서버가 "관리자만"이라는 역할 검사를 빼먹은 A01 취약이다(401/403 이면 보호됨).
      - **/rest/admin/application-configuration**: 이름 그대로 *관리(admin)* 설정 엔드포인트. 익명 200 이면 서버가
        "관리자만"이라는 역할 검사를 빼먹은 것이다.
      - **A01(Broken Access Control)**: OWASP Top 10 의 1위 결함. 권한 검사를 서버에서 누락해 권한 밖 자원에 닿는 모든 경우.
    hint: 'application-configuration'
    category: manipulation
    points: 14
    answer: |
      # 1) 로그인(인증 헤더) 없이 관리 설정 엔드포인트 호출 → admincfg= 응답코드(200이면 역할검사 누락 = A01)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/rest/admin/application-configuration"
      # 2) 해석 — 200=인증 없이 앱 설정 노출(인가 통제 부재 A01), 401/403=보호됨
      echo "→ 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)"
    answer_detail: "무인증 관리 엔드포인트 = 역할(role) 검사 누락. admincfg=200 이면 익명에게 관리 설정이 노출된 것 = A01 취약(수직 권한상승의 극단형). 401/403 이면 보호됨."
    expected_output: |
      admincfg=200
      → 200 = 인증 없이 앱 설정 노출. 인가 통제 부재(A01)
    verify:
      type: output_contains
      expect: 'admincfg=200'
      field: stdout
      semantic:
        intent: "무인증 관리"
        success_criteria: ["200 노출"]
        acceptable_methods: ["**[OSS] 강제 접근 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      화면 메뉴에 링크가 없는 경로(/ftp)를 URL 로 직접 호출해, "UI 에 안 보이면 안전하다"는 착각을 깬다.
      ## 개념 한 줄
      강제 브라우징(Forced Browsing) = 링크를 따르지 않고 URL 을 직접 입력해 숨겨진 경로에 접근을 시도하는 점검 기법.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 화면 메뉴에 링크 없는 경로 /ftp 를 URL로 직접 호출 → ftp= 응답코드(강제 브라우징)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'ftp=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/ftp"
      # 2) 해석 — UI에 링크 없어도 직접 URL로 접근됨, 인가는 UI 숨김이 아니다
      echo "→ UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다"
      ```
      ## ✅ 합격 기준
      `ftp=` 출력 시 통과. **근거:** `ftp=<코드>` 가 접근 가능(예: 200)을 가리키면 링크가 없어도 접근 자체는
      막히지 않음이 확인된다 — UI 숨김은 방어가 아니다.
      - **/ftp**: JuiceShop 의 화면 메뉴에 링크가 없는 디렉터리. 직접 호출해 접근되면 UI 숨김이 방어가 아님이 입증된다.
      - **자동화 참고**: 단어 목록으로 경로 수천 개를 던지는 디렉터리 퍼저 **ffuf** 가 attacker 에 있다(본 미션은 curl 로 단일 경로만 확인).
    hint: '/ftp'
    category: manipulation
    points: 14
    answer: |
      # 1) 화면 메뉴에 링크 없는 경로 /ftp 를 URL로 직접 호출 → ftp= 응답코드(강제 브라우징)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'ftp=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/ftp"
      # 2) 해석 — UI에 링크 없어도 직접 URL로 접근됨, 인가는 UI 숨김이 아니다
      echo "→ UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다"
    answer_detail: "강제 브라우징 = 링크 없는 자원(/ftp)에 URL 직접 접근. ftp= 코드가 접근 가능(예: 200)을 가리키면 'UI 숨김은 방어가 아님'이 입증됨. 진짜 방어는 그 경로에도 인가 검사를 두는 것."
    expected_output: |
      ftp=200
      → UI에 링크 없어도 직접 URL로 접근. 인가는 UI 숨김이 아니다
    verify:
      type: output_contains
      expect: 'ftp='
      field: stdout
      semantic:
        intent: "강제 브라우징"
        success_criteria: ["직접 접근"]
        acceptable_methods: ["**[OSS] forced browsing (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      보호되는 엔드포인트(401)와 노출되는 엔드포인트(200)를 나란히 호출해 인가 정책의 불일치를 드러낸다.
      ## 개념 한 줄
      인가 일관성 부재 = 접근제어가 중앙에서 균일하게 강제되지 않아, 어떤 곳은 막고(401) 어떤 곳은 여는(200) 구조적 약점.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 보호되어야 정상인 사용자 컬렉션(/api/Users) 호출 → users= 응답코드(401이면 인가 동작 중)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'users=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users"
      # 2) 같은 사이트의 관리 설정도 호출 → admincfg= 응답코드(노출 200)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/rest/admin/application-configuration"
      # 3) 해석 — /api/Users(401 보호) vs admin-config(200 노출)의 불일치가 중앙 인가 정책 부재 신호
      echo "→ /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호"
      ```
      ## ✅ 합격 기준
      `users=` 출력 시 통과. **근거:** `/api/Users`(보호 401)와 admin-config(노출 200)의 불일치가 드러나면
      중앙 인가 정책이 없다는 신호다.
      - **/api/Users**: 보호되어야 정상인 사용자 컬렉션 엔드포인트. 401 이면 인가가 동작 중이라는 뜻.
      - **401 vs 403**: 401=인증 필요(누군지 모름), 403=인가 거부(누군진 알지만 권한 없음). 둘 다 "막힘". 200 이 곧 노출(취약).
      - **불일치의 의미**: 한쪽은 막고 한쪽은 여는 것 자체가 "중앙 인가 정책이 없다"는 신호다.
    hint: '401 vs 200'
    category: analysis
    points: 14
    answer: |
      # 1) 보호되어야 정상인 사용자 컬렉션(/api/Users) 호출 → users= 응답코드(401이면 인가 동작 중)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'users=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users"
      # 2) 같은 사이트의 관리 설정도 호출 → admincfg= 응답코드(노출 200)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admincfg=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/rest/admin/application-configuration"
      # 3) 해석 — /api/Users(401 보호) vs admin-config(200 노출)의 불일치가 중앙 인가 정책 부재 신호
      echo "→ /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호"
    answer_detail: "인가 일관성 = 같은 종류 자원인데 일부는 보호(401)·일부는 노출(200)되는 불일치. users= 코드가 보호 쪽(401)을 가리키고 admin-config 가 노출 쪽(200)이면, 둘의 불일치 자체가 중앙 인가 정책 부재(통제 누락)의 신호다."
    expected_output: |
      users=401
      admincfg=200
      → /api/Users(401 보호) vs admin-config(200 노출). 일관성 부재가 취약의 신호
    verify:
      type: output_contains
      expect: 'users='
      field: stdout
      semantic:
        intent: "인가 일관성"
        success_criteria: ["보호 vs 노출 대조"]
        acceptable_methods: ["**[OSS] 대조 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      자원 ID 를 1, 2, 3 으로 바꿔가며 호출해, 서버가 소유권을 검사하는지(남의 자원이 노출되는지) 점검한다.
      ## 개념 한 줄
      IDOR(Insecure Direct Object Reference) = 자원 ID 만 바꿔 소유권 검사 없는 틈으로 남의 자원에 접근하는 결함 = 수평 권한상승.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 자원 ID를 1,2,3으로 바꿔가며 호출(순차 ID는 예측 가능) → user1=/user2=/user3= 응답코드
      docker exec el34-attacker sh -c "for id in 1 2 3; do curl -s -o /dev/null -w \"user\$id=%{http_code} \" -H 'Host: juice.el34.lab' http://10.20.30.1/api/Users/\$id; done; echo"
      # 2) 해석 — idor= 순차 자원ID로 남의 자원 접근 시도, 보호되면 401·소유권검사 없으면 노출(200)
      echo "→ idor= 순차 자원ID로 남의 자원 접근 시도. 보호되면 401, 소유권검사 없으면 노출"
      ```
      ## ✅ 합격 기준
      `idor=` 출력 시 통과. **근거:** `user1=/user2=/user3=` 순차 ID 응답이 나오면 IDOR 점검이 수행된 것 —
      각 ID 가 401/403 이면 소유권 검사 동작, 200 이면 남의 자원 노출(치명적)이다.
      - **for id in 1 2 3**: 셸 반복문으로 ID 를 순차 증가시켜 보낸다. 순차 ID 는 예측 가능해 반복문 하나로 전체를 훑을 수 있다(대량 유출 위험).
      - **소유권 검사(ownership)**: 요청한 자원이 *그 토큰 주인의 것인지* 서버가 확인하는 것. IDOR 의 유일한 근본 방어.
      - 형식상 완전히 정상인 요청이라 WAF 로는 잡히지 않는다 — 앱이 직접 막아야 한다.
    hint: '순차 ID'
    category: manipulation
