      ## 🧩 차단 vs 탐지
      el34 의 두 표적은 WAF 모드가 다르다. **DVWA(dvwa.el34.lab)는 차단 모드**라 공격성 입력에 403 으로
      응답하고, **JuiceShop 은 탐지(DetectionOnly) 모드**라 기록만 하고 200 으로 통과시킨다. 이 미션은
      차단을 보기 위해 DVWA 로 보낸다.

