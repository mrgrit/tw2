      입력을 검증 없이 신뢰한 결함이 주입(A03)이다. **SQLi**(SQL Injection)는 입력에 SQL 문법을 주입해
      DB 를 조작하고(`UNION SELECT` 로 다른 테이블 결과를 덧붙여 추출), **XSS**(Cross-Site Scripting)는
