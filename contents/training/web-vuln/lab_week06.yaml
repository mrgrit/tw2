lab_id: standalone-web-vuln-week06
title: "XSS/CSRF — 스크립트 주입 vs XSS 탐지·CSP 방어"
version: standalone-web-vuln
course: web-vuln
week: 6
description: |
  XSS·CSRF 점검(WSTG-CLNT) — 피해자의 브라우저(XSS)와 인증된 세션(CSRF)을 노리는 두 공격을
  WSTG 점검자 관점에서 실제 도구로 확인한다. XSS 전용 스캐너 `dalfox` 로 dvwa 의 반사형·DOM XSS
  엔드포인트를 자동 점검하면, ModSec 941 룰군이 반사·이벤트 핸들러·mutation 변형을 모두 403 으로
  막아 dalfox 가 `WAF ... 403 detected` 로 보고한다. 웹 핑거프린팅 도구 `whatweb` 로는 도달성과
  응답 헤더(CSRF 관련 X-Frame-Options·SameSite, XSS 2차 방어선 CSP)를 점검해, 출력 인코딩(근본)+
  CSP(2차)+HttpOnly, CSRF 토큰+SameSite+재인증으로 이어지는 방어 우선순위를 정리한다.
  대상은 dvwa(차단)/juice(탐지·헤더 관찰) vhost. 공격은 외부 공격자 VM 192.168.0.202(att/1)에서 공인
  진입 192.168.0.161로 발신하며 — `ssh att@192.168.0.202`(비번 1)로 접속해 수행하고, 탐지 로그 확인은
  `ssh ccc@{{TARGET_IP}}`(el34 호스트) 후 `docker exec -it el34-web bash`. 인가된 실습만.
difficulty: medium
duration_minutes: 160
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(XSS·세션 탈취) §3(CSRF·쿠키 속성·세션 고정) §4(방어 우선순위) 숙지"
objectives:
  - "dalfox 로 Reflected/DOM XSS 를 자동 점검하고 WAF(941) 차단·우회 인코더 보고를 해석"
  - "whatweb 로 CSRF 관련 통제(X-Frame-Options·SameSite) + CSP 헤더 유무를 점검"
  - "ModSec 941 탐지를 룰 ID 증거로 확인 + 출력 인코딩/CSP/CSRF 토큰 방어 우선순위 정리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성·핑거프린팅
      XSS·CSRF 점검의 첫걸음은 대상 vhost(`dvwa.el34.lab`)가 응답하는지 확인하는 것이다.
      페이로드를 던지기 전에 대상 도달성과 서버 스택을 먼저 보는 것은 모든 웹 점검의 표준 절차다 —
      대상이 무응답이면 이후 결과를 신뢰할 수 없다. 여기서는 웹 핑거프린팅 도구 `whatweb` 로
      도달성과 응답(WAF 유무)을 함께 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb로 dvwa vhost 도달성·핑거프린팅 — WAF가 걸린 자산은 [403 Forbidden]으로 응답
      whatweb -a1 http://dvwa.el34.lab/
      ```
      `whatweb -a1` 은 대상에 정상 요청을 보내 서버·프레임워크·타이틀·헤더를 식별하는 핑거프린팅
      도구다(`-a1` = 가장 조용한 패시브 수준). `dvwa.el34.lab` 은 ModSec WAF(차단 모드) 뒤에 있어
      `[403 Forbidden]` 과 함께 `Apache/2.4.52 (Ubuntu)` 배너가 찍힌다 — 응답이 온다는 것 자체가
      도달 성공이고, 403 은 "이 자산은 WAF 차단형"이라는 신호다.
      ## ✅ 합격 기준
      `Forbidden`(또는 `403`) 출력 시 통과. **근거:** whatweb 이 `[403 Forbidden]` 과 서버 배너를
      반환하면 대상에 도달한 것이고, WAF 가 응답하고 있음을 확인 — XSS·CSRF 점검을 시작할 수 있다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) whatweb로 dvwa vhost 도달성·핑거프린팅 — WAF가 걸린 자산은 [403 Forbidden]으로 응답
      ssh att@192.168.0.202 "whatweb -a1 http://dvwa.el34.lab/"
    answer_detail: "XSS·CSRF 점검 대상 = web 컨테이너의 dvwa vhost(ModSec 차단 모드). whatweb -a1 로 핑거프린팅하면 [403 Forbidden] + Apache/2.4.52 (Ubuntu) 배너가 나온다 — 응답이 온다는 것이 도달 성공이고, 403 은 WAF 차단형 자산이라는 신호. 판정은 출력에 `Forbidden`(403)이 포함되는지로 한다."
    expected_output: |
      http://dvwa.el34.lab/ [403 Forbidden] Apache[2.4.52], HTTPServer[Ubuntu Linux][Apache/2.4.52 (Ubuntu)], Title[403 Forbidden], IP[192.168.0.161]
    verify:
      type: output_contains
      expect: 'Forbidden'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] whatweb (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Reflected XSS — dalfox 자동 점검(WAF 차단)
      Reflected XSS 는 요청 파라미터(`?name=`)가 응답 페이지에 그대로 반사되어 피해자 브라우저에서
      실행되는 XSS 의 기본형이다. 손으로 페이로드를 하나씩 넣는 대신, XSS 전용 스캐너 `dalfox` 로
      dvwa 의 반사형 XSS 엔드포인트를 자동 점검해, WAF 가 이를 어떻게 막는지 도구의 눈으로 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) dalfox로 dvwa 반사형 XSS 엔드포인트(xss_r?name=) 자동 점검 — 파라미터 마이닝·페이로드 주입까지 자동
      dalfox url --url 'http://dvwa.el34.lab/vulnerabilities/xss_r/?name=test' 2>&1 | grep -viE '░|█|▓|▒|Dalfox v|open-source|and utility|focused'
      ```
      `dalfox url --url '<URL>'` 은 대상 파라미터에 수십 종의 XSS 페이로드를 자동 주입하고 반사 여부를
      판정하는 XSS 전용 스캐너다(뒤 `grep -viE` 는 배너 이모지 줄만 걷어내 결과를 깔끔히 본다).
      dvwa 는 ModSec WAF 뒤에 있어 dalfox 의 탐침이 `HTTP 403` 으로 막히고, dalfox 는 이를
      **`WAF Unknown (HTTP 403) detected`** 로 보고하며 우회 인코더(`2url, unicode, zwsp`)까지 제안한다.
      결과적으로 반사 파라미터 0, XSS 0 — WAF(941→949110)가 반사형 XSS 를 차단했다는 뜻이다.
      ## ✅ 합격 기준
      `WAF` 출력 시 통과. **근거:** dalfox 가 `WAF Unknown (HTTP 403) detected` 를 보고하면, 이 자산이
      XSS 를 WAF 로 차단하는 자산임을 도구가 확인한 것 — 탐지 성공 신호다.
    hint: 'dalfox XSS → WAF'
    category: manipulation
    points: 12
    answer: |
      # 1) dalfox로 dvwa 반사형 XSS 엔드포인트(xss_r?name=) 자동 점검 — 파라미터 마이닝·페이로드 주입까지 자동
      ssh att@192.168.0.202 "dalfox url --url 'http://dvwa.el34.lab/vulnerabilities/xss_r/?name=test' 2>&1 | grep -viE '░|█|▓|▒|Dalfox v|open-source|and utility|focused'"
    answer_detail: "Reflected XSS = 요청 파라미터(?name=)가 응답에 즉시 반사되어 피해자 브라우저에서 실행되는 XSS. XSS 전용 스캐너 dalfox(v3, `dalfox url --url` 문법)로 dvwa 반사형 엔드포인트를 자동 점검하면, ModSec WAF 가 탐침을 403 으로 막아 `WAF Unknown (HTTP 403) detected` + 우회 인코더(2url/unicode/zwsp) 제안 + `found reflected 0 params` / `XSS found 0 XSS` 로 끝난다 = WAF 차단(941). 판정은 출력에 `WAF` 가 포함되는지로 한다."
    expected_output: |
      INF start scan to http://dvwa.el34.lab/vulnerabilities/xss_r/?name=test
      WAF Unknown (HTTP 403) detected (confidence: 40%, evidence: Provocation probe returned HTTP 403)
        └── bypass encoders: 2url, unicode, zwsp
        └── bypass mutations: 7 types
      INF found reflected 0 params
      WRN XSS found 0 XSS
      → dvwa는 ModSec WAF가 반사형 XSS를 403 차단 — dalfox가 WAF 탐지·우회 인코더 제안
    verify:
      type: output_contains
      expect: 'WAF'
      field: stdout
      semantic:
        intent: "Reflected XSS"
        success_criteria: ["dalfox WAF 차단"]
        acceptable_methods: ["**[OSS] dalfox (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 XSS 변형 — 이벤트 핸들러·mutation(dalfox DOM 점검)
      사이트가 `<script>` 만 걸러내면 공격자는 **이벤트 핸들러**(`onerror`·`onload`)나 인코딩 변형으로
      우회한다. dalfox 는 이런 변형을 mutation 엔진으로 자동 생성해 시도한다. 여기서는 dvwa 의
      DOM 기반 XSS 엔드포인트에 dalfox 를 걸어, 스크립트 태그 없는 변형까지 WAF(941)가 커버하는지 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) dalfox로 dvwa DOM 기반 XSS 엔드포인트(xss_d?default=) 자동 점검 — 이벤트 핸들러(onerror/onload) 변형·mutation까지 시도
      dalfox url --url 'http://dvwa.el34.lab/vulnerabilities/xss_d/?default=English' 2>&1 | grep -viE '░|█|▓|▒|Dalfox v|open-source|and utility|focused'
      ```
      dalfox 는 `<img onerror=...>`·`<svg onload=...>` 같은 이벤트 핸들러 변형과 인코딩 우회(2url·
      unicode·zwsp)를 mutation(7종)으로 자동 생성해 던진다. dvwa 에서는 이 변형들도 모두 ModSec
      941 룰군에 걸려 `HTTP 403` 으로 막히므로 dalfox 는 다시 `WAF Unknown (HTTP 403) detected`,
      `XSS found 0 XSS` 를 보고한다 — 특정 단어(`<script>`)만이 아니라 변형까지 941 이 커버한다는 증거다.
      ## ✅ 합격 기준
      `WAF` 출력 시 통과. **근거:** 이벤트 핸들러·mutation 변형에도 dalfox 가 `WAF ... 403 detected`,
      `XSS found 0` 를 내면 941 이 스크립트 태그 없는 변형까지 탐지·차단함이 확인된다.
