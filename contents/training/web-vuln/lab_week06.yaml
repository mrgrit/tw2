      ## 🎯 CSP 헤더 점검 — XSS 2차 방어선
      **CSP(Content-Security-Policy)** 는 서버가 응답 헤더로 브라우저에게 "어떤 출처의 스크립트만
      실행하라"를 지시하는 정책이다. 출력 인코딩이 한 군데서 빠져 XSS 가 주입돼도 브라우저가 인라인
      /외부 스크립트 실행을 거부해 피해를 줄이는 2차 방어선이다. 여기서는 그 헤더의 유무를 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb로 juice 헤더 덤프 → Content-Security-Policy 유무 판정(마커 CSP)
      H=$(whatweb -a1 -v http://juice.el34.lab/ 2>&1); echo "$H" | grep -iE 'X-Frame-Options:|Content-Security-Policy:|Feature-Policy:'; echo "$H" | grep -iq 'Content-Security-Policy:' && echo 'CSP=설정됨' || echo 'CSP=미설정 → XSS 2차 방어선 부재(X-Frame-Options만 있어 클릭재킹만 완화)'
      # 2) 해석 — juice는 X-Frame-Options(SAMEORIGIN)는 있으나 CSP 미설정 = XSS 2차 방어선 부재
      ```
      `whatweb -a1 -v` 로 juice 응답 헤더를 덤프한 뒤 `Content-Security-Policy` 유무를 판정한다. juice
      는 `X-Frame-Options: SAMEORIGIN`·`Feature-Policy` 는 내려주지만 CSP 는 없다 → 출력 인코딩이 한
      곳만 뚫려도 브라우저가 스크립트 실행을 거부해 줄 2차 방어선이 없다는 뜻이다(차단형 dvwa 는
