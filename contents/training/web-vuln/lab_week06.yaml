      # 1) dalfox로 dvwa DOM 기반 XSS 엔드포인트(xss_d?default=) 자동 점검 — 이벤트 핸들러(onerror/onload) 변형·mutation까지 시도
      ssh att@192.168.0.202 "dalfox url --url 'http://dvwa.el34.lab/vulnerabilities/xss_d/?default=English' 2>&1 | grep -viE '░|█|▓|▒|Dalfox v|open-source|and utility|focused'"
      # 2) 해석 — 이벤트 핸들러·7종 mutation 변형도 941/WAF에 403 차단
