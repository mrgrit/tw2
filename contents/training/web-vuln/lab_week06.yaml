lab_id: standalone-web-vuln-week06
title: "XSS/CSRF — 스크립트 주입 vs XSS 탐지·CSP 방어"
version: standalone-web-vuln
course: web-vuln
week: 6
description: |
  XSS·CSRF 점검(WSTG-CLNT) — 피해자의 브라우저(XSS)와 인증된 세션(CSRF)을 노리는 두 공격을
  WSTG 점검자 관점으로 손으로 확인한다. Reflected XSS(`<script>`)와 이벤트 핸들러 변형
  (`<img onerror>`·`<svg onload>`)이 ModSec 941 룰군에 걸려 dvwa 에서 403(차단)으로,
  juice 에서는 200(탐지만)으로 갈리는 것을 응답 코드로 본다. 응답을 점검해 CSRF 토큰 유무,
  세션 쿠키 속성(HttpOnly/Secure/SameSite), CSP 헤더 유무를 확인하고, 출력 인코딩(근본)+CSP(2차)
  +HttpOnly, CSRF 토큰+SameSite+재인증으로 이어지는 방어 우선순위를 정리한다.
  대상은 dvwa(차단)/juice(탐지만) vhost. 공격은 el34-attacker 에서 발신하며 XSS payload 의
  공백은 반드시 %20 으로 인코딩한다. 인가된 실습 환경(el34)에서만 수행하고, 모든 명령은
  el34 호스트(ssh ccc@192.168.0.151)에서 docker exec 로 실행한다.
difficulty: medium
duration_minutes: 160
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(XSS·세션 탈취) §3(CSRF·쿠키 속성·세션 고정) §4(방어 우선순위) 숙지"
objectives:
  - "Reflected XSS(`<script>`) + 이벤트 핸들러 변형(img onerror/svg onload) 주입과 %20 인코딩 이해"
  - "CSRF 토큰 유무 + CSP 헤더 + 세션 쿠키 속성(HttpOnly/Secure/SameSite) 점검"
  - "ModSec 941 탐지를 룰 ID 증거로 확인 + 출력 인코딩/CSP/CSRF 토큰 방어 우선순위 정리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 확인
      XSS·CSRF 점검의 첫걸음은 대상 vhost(`dvwa.el34.lab`)가 응답하는지 확인하는 것이다.
      페이로드를 던지기 전에 대상 도달성을 먼저 보는 것은 모든 웹 점검의 표준 절차다 —
      대상이 무응답이면 이후 결과를 신뢰할 수 없다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      `el34-attacker`(내부 발판, 출처 10.20.30.202)에서 fw 게이트웨이(10.20.30.1)로 요청을
      보내되, `Host: dvwa.el34.lab` 헤더로 dvwa vhost 를 지정한다. curl 옵션은 `-s`(진행 표시
      숨김), `-o /dev/null`(본문 버림), `-w 'dvwa=%{http_code}'`(응답 코드만 출력)다.
      ## ✅ 합격 기준
      `dvwa=` 와 함께 HTTP 응답 코드(예: `dvwa=200`)가 출력되어 대상에 도달함을 확인한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "XSS·CSRF 점검 대상 = web 컨테이너의 dvwa vhost(차단 모드). `Host: dvwa.el34.lab` 헤더로 라우팅된 정상 응답 코드가 나오면 대상 도달 = 점검 시작 준비 완료. 판정은 출력에 `dvwa=`(응답 코드)가 포함되는지로 한다."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 Reflected XSS — `<script>` 주입 → 403
      Reflected XSS 는 요청 파라미터(`?q=`)가 응답 페이지에 그대로 반사되어 피해자 브라우저에서
      실행되는 XSS 의 기본형이다. 여기서는 검색어 파라미터에 `<script>` 페이로드를 넣어, dvwa
      (차단 모드)의 WAF 가 이를 어떻게 막는지 응답 코드로 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      ```
      `?q=<script>alert(1)</script>` 가 Reflected XSS 페이로드다. dvwa 의 ModSec **941 룰군**
      (XSS 전담)이 이를 탐지해 anomaly score 를 누적하고, 임계를 넘으면 949110 룰이 발동해
      403 으로 차단한다(단일 룰이 아니라 점수 누적 후 차단 — W05 SQLi 와 같은 메커니즘).
      ## ✅ 합격 기준
      응답이 `403`(WAF 차단=탐지 성공)이다. 403 은 "이 자산은 차단형"이라는 신호다.
    hint: '<script> → 403'
    category: manipulation
    points: 12
    answer: |
      echo "=== Reflected XSS ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xss=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      echo "→ <script> 주입 → 941 탐지 → 403"
    answer_detail: "Reflected XSS = 요청 파라미터(?q=)가 응답에 즉시 반사되어 피해자 브라우저에서 실행되는 XSS. `<script>alert(1)</script>` 가 ModSec 941 룰군에 매치 → anomaly score 누적 → 949110 발동 → dvwa(차단 모드)에서 403. 판정은 출력에 `403` 이 포함되는지로 한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "Reflected XSS"
        success_criteria: ["<script> 403"]
        acceptable_methods: ["**[OSS] XSS → 403 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 XSS 변형 — 이벤트 핸들러(img onerror / svg onload)
      사이트가 `<script>` 만 걸러내면 공격자는 **이벤트 핸들러**로 우회한다. `onerror`·`onload`
      는 특정 사건(이미지 로드 실패·SVG 로드 완료)이 일어나면 자동으로 스크립트를 실행하는 HTML
      속성이다. 여기서는 스크립트 태그 없는 변형도 941 룰군이 커버하는지 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img%20src=x%20onerror=alert(1)>'"
      ```
      `<img src=x onerror=alert(1)>` 는 `src=x` 로딩이 실패하면 `onerror` 가 실행되는 변형이다.
      URL 의 **공백은 그대로 쓸 수 없으므로**(셸·HTTP 가 구분자로 해석해 페이로드가 잘림) 공백을
      그 코드값인 `%20` 으로 인코딩해 `<img%20src=x%20onerror=...>` 로 보낸다. 이 인코딩은 공격을
      숨기는 우회가 아니라 변형 페이로드를 온전히 전달하기 위한 필수 절차다. `<svg onload=alert(1)>`
      도 같은 원리의 변형이다.
      ## ✅ 합격 기준
      변형 페이로드(img onerror / svg onload)도 `403` 으로 차단되어, 941 이 변형까지 탐지함을 확인한다.
    hint: 'img onerror (%20)'
    category: manipulation
    points: 12
    answer: |
      echo "=== XSS 변형 (img onerror) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'img=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<img%20src=x%20onerror=alert(1)>'"
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'svg=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<svg%20onload=alert(1)>'"
      echo "→ 이벤트 핸들러(onerror/onload)도 941이 탐지"
    answer_detail: "XSS 변형 = `<script>` 외에 `<img onerror>`·`<svg onload>` 같은 이벤트 핸들러로 스크립트를 실행시키는 우회. ModSec 941 룰군(libinjection 기반)이 이런 변형까지 폭넓게 커버해 dvwa 에서 403 으로 차단. URL 의 공백은 반드시 %20 으로 인코딩해야 페이로드가 잘리지 않는다(필수). 판정은 출력에 `403` 이 포함되는지로 한다. 교훈: XSS 방어는 특정 단어 차단이 아니라 출력 인코딩이라는 근본 처리여야 한다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "XSS 변형"
        success_criteria: ["이벤트 핸들러 탐지"]
        acceptable_methods: ["**[OSS] img/svg XSS (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 CSRF 점검 — 토큰 유무
      CSRF 는 로그인된 피해자가 공격자 페이지를 열면 피해자의 인증된 세션으로 위조 요청이 전송되는
      공격이다. 이를 막는 근본 방어가 **CSRF 토큰**(서버가 발급하는 예측 불가능한 일회성 값)이다.
      점검자는 상태 변경 폼/요청에 이 토큰이 포함되는지를 가장 먼저 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -ioE 'csrf|token|user_token' | head -3 || echo 'CSRF 토큰 미발견'"
      ```
      dvwa 응답 HTML 을 받아 `csrf`·`token`·`user_token` 같은 토큰 필드를 대소문자 무시(`-i`)로
      grep 한다(`-o` 매치 부분만, `-E` 확장 정규식). dvwa 는 화면에 `user_token` 형태의 CSRF
      토큰을 노출하므로 검출될 수 있다. 토큰이 없으면 위조 요청을 거를 장치가 없다는 뜻이다.
      ## ✅ 합격 기준
      CSRF 토큰 키워드 검출 또는 "미발견"이 출력되어, 토큰 유무를 점검한 결과를 확인한다.
    hint: 'csrf/token grep'
    category: analysis
    points: 12
    answer: |
      echo "=== CSRF 토큰 점검 ==="
      docker exec el34-attacker sh -c "curl -s -H 'Host: dvwa.el34.lab' http://10.20.30.1/ | grep -ioE 'csrf|user_token|anti.?csrf' | head -3 || echo 'CSRF 토큰 미발견 → 위조 가능'"
      echo "→ 상태 변경 요청에 예측 불가 CSRF 토큰 없으면 위조 가능(피해자 세션 악용)"
    answer_detail: "CSRF 점검 = 상태 변경 폼/요청에 예측 불가능한 CSRF 토큰(예: dvwa 의 user_token)이 포함되는지 확인. 없으면 공격자 페이지가 피해자의 인증된 세션으로 위조 요청(비밀번호·이메일 변경 등)을 전송할 수 있다. 단, XSS 가 가능하면 같은 페이지에서 토큰이 읽혀 이 방어도 무력화됨(XSS 방어가 전제). 판정은 출력에 `CSRF` 가 포함되는지로 한다."
    verify:
      type: output_contains
      expect: 'CSRF'
      field: stdout
      semantic:
        intent: "CSRF 토큰 점검"
        success_criteria: ["토큰 유무"]
        acceptable_methods: ["**[OSS] csrf token grep (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 — ModSec 941 룰군(증거 확인)
      "차단됐다(403)"를 넘어, 방어 스택이 **무엇을 근거로 탐지했는가**를 로그 증거로 확인한다.
      점검자는 선언이 아니라 증거(룰 ID)를 남긴다. el34 web 의 Apache 는 ModSec audit 로그에
      매치된 CRS 룰 ID 를 기록하며, 941 룰군이 XSS 탐지를 전담한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "941[0-9]{3}" | sort | uniq -c'
      ```
      web 컨테이너의 `/var/log/apache2/modsec_audit.log` 끝 150줄에서 `941xxx` 형태의 시그니처
      ID 만 뽑아(`grep -oE`) 정렬·집계(`sort | uniq -c`)한다. 941100(script)·941160(이벤트
      핸들러) 같은 ID 가 횟수와 함께 보이면 앞 미션의 XSS 가 실제로 941 에 탐지된 증거다.
      ## ✅ 합격 기준
      `941` 로 시작하는 시그니처 ID 가 카운트와 함께 출력되어, XSS 탐지의 증거를 확인한다.
    hint: 'modsec 941'
    category: analysis
    points: 12
    answer: |
      echo "=== XSS 탐지 (ModSec 941) ==="
      docker exec el34-web sh -c 'sudo tail -150 /var/log/apache2/modsec_audit.log | grep -oE "941[0-9]{3}" | sort | uniq -c'
      echo "→ 941100(script)/941160(이벤트핸들러) 등 XSS 룰군"
    answer_detail: "XSS 탐지 = ModSec audit 로그에 남은 941 룰군 시그니처 ID(예: 941100=script, 941160=이벤트 핸들러). script/이벤트/속성 변형을 폭넓게 커버한다. 응답 코드(403)와 로그 룰 ID 를 함께 묶어야 탐지 증거의 신뢰도가 높다. 판정은 출력에 `941` 이 포함되는지로 한다."
    verify:
      type: output_contains
      expect: '941'
      field: stdout
      semantic:
        intent: "XSS ModSec 탐지"
        success_criteria: ["941 룰"]
        acceptable_methods: ["**[OSS] modsec 941 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 CSP 헤더 점검 — XSS 2차 방어선
      **CSP(Content-Security-Policy)** 는 서버가 응답 헤더로 브라우저에게 "어떤 출처의 스크립트만
      실행하라"를 지시하는 정책이다. 출력 인코딩이 한 군데서 빠져 XSS 가 주입돼도 브라우저가 인라인
      /외부 스크립트 실행을 거부해 피해를 줄이는 2차 방어선이다. 여기서는 그 헤더의 유무를 본다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sI -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -iE 'content-security|x-frame' || echo 'CSP 미설정'"
      ```
      `curl -I`(또는 `-sI`)는 응답 **헤더만** 받는 옵션이다. 대상은 `juice.el34.lab` vhost 인데,
      juice 는 DetectionOnly(탐지만) 모드라 200 응답의 헤더를 그대로 받아볼 수 있어 헤더 점검에
      적합하다(차단형 dvwa 는 페이로드가 403 으로 끊겨 헤더 관찰이 불편). `Content-Security-Policy`
      와 클릭재킹 완화용 `X-Frame-Options` 의 유무를 grep 한다.
      ## ✅ 합격 기준
      CSP/X-Frame 헤더가 출력되거나 "미설정"이 출력되어, CSP 2차 방어선의 유무를 확인한다.
    hint: 'content-security-policy 헤더'
    category: analysis
    points: 12
    answer: |
      echo "=== CSP 헤더 점검 ==="
      docker exec el34-attacker sh -c "curl -sI -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -iE 'content-security|x-frame' || echo 'CSP/X-Frame 미설정 → XSS 2차 방어선 부재'"
      echo "→ CSP는 인라인 스크립트/외부 출처를 제한해 XSS를 완화하는 2차 방어선"
    answer_detail: "CSP 점검 = 응답 헤더의 Content-Security-Policy(및 X-Frame-Options) 유무. CSP 는 XSS 의 2차 방어선으로, 출력 인코딩이 한 군데서 빠져도 브라우저가 인라인/외부 스크립트 실행을 거부해 피해를 완화한다. 없으면 XSS 방어가 출력 인코딩 하나에만 의존하는 셈이다. juice 는 탐지만 모드라 헤더 관찰에 적합. 판정은 출력에 `CSP` 가 포함되는지로 한다."
    verify:
      type: output_contains
      expect: 'CSP'
      field: stdout
      semantic:
        intent: "CSP 헤더 점검"
        success_criteria: ["CSP 유무"]
        acceptable_methods: ["**[OSS] CSP 헤더 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 우선순위로 정리(근본 → 보완)
      앞 미션에서 확인한 취약·안전장치를 항목 나열이 아니라 **우선순위 있는 방어**로 정리한다.
      XSS 는 출력 인코딩(근본)에 CSP(2차)·HttpOnly(세션 탈취 차단)를 겹치고, CSRF 는 CSRF 토큰
      (근본)에 SameSite 쿠키·민감 작업 재인증을 겹치는 깊이 방어 구조다.
      ## 💻 실행 명령
      ```bash
      echo "XSS: 출력 인코딩(근본)+CSP+HttpOnly. CSRF: CSRF 토큰+SameSite+재인증"
      ```
      핵심은 두 방어가 얽혀 있다는 점이다 — HttpOnly·SameSite 한 쌍이 XSS·CSRF 를 동시에 보완하고,
      XSS 를 근본(출력 인코딩)에서 막으면 CSRF 토큰 탈취도 막힌다.
      ## ✅ 합격 기준
      출력에 인코딩·CSP·CSRF 토큰이 모두 포함되어 XSS/CSRF 방어를 우선순위로 정리함을 확인한다.
    hint: '인코딩+CSP+CSRF토큰'
    category: report
    points: 10
    answer: |
      echo "=== XSS/CSRF 방어 ==="
      echo "XSS: ① 출력 인코딩(context-aware, 근본) ② CSP(2차) ③ HttpOnly 쿠키(탈취 차단)"
      echo "CSRF: ① CSRF 토큰(동기화) ② SameSite 쿠키 ③ 민감 작업 재인증"
      echo "→ XSS는 인코딩+CSP, CSRF는 토큰+SameSite"
    answer_detail: "XSS 방어 = 출력 인코딩(context-aware, 근본) + CSP(2차) + HttpOnly 쿠키(뚫려도 세션 쿠키 탈취 차단). CSRF 방어 = CSRF 토큰(근본) + SameSite 쿠키 + 민감 작업 재인증. HttpOnly·SameSite 한 쌍이 양쪽을 동시에 보완하고, XSS 를 근본에서 막으면 CSRF 토큰 탈취도 막힌다. 판정은 출력에 `CSP` 가 포함되는지로 한다."
    verify:
      type: output_contains
      expect: 'CSP'
      field: stdout
      semantic:
        intent: "XSS/CSRF 방어"
        success_criteria: ["인코딩/CSP/CSRF토큰"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

