    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 CSRF 점검 — 응답 헤더의 CSRF 관련 통제
      CSRF 는 로그인된 피해자가 공격자 페이지를 열면 피해자의 인증된 세션으로 위조 요청이 전송되는
      공격이다. 근본 방어는 **CSRF 토큰**(예측 불가 일회성 값)과 **SameSite 쿠키**다. dvwa 의 CSRF 폼은
      WAF(403) 뒤라 외부에서 토큰을 직접 긁을 수 없으므로, 여기서는 `whatweb` 로 juice 응답 헤더의
      CSRF 관련 통제(클릭재킹 완화용 `X-Frame-Options`, 세션 쿠키의 `SameSite`)를 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) whatweb로 juice 응답 헤더 덤프 → CSRF 관련 통제(X-Frame-Options·SameSite 쿠키) 확인
      H=$(whatweb -a1 -v http://juice.el34.lab/ 2>&1); echo "$H" | grep -iE 'X-Frame-Options:|Set-Cookie|SameSite'; echo "$H" | grep -iq 'SameSite' && echo 'SameSite 쿠키=있음' || echo 'CSRF: SameSite 쿠키 미관측 → 토큰 기반(Bearer) 인증 의존, 클래식 CSRF 방어는 토큰+SameSite'
      # 2) 해석 — 상태 변경 요청에 CSRF 토큰/SameSite가 없으면 피해자 세션으로 위조 가능
      ```
      `whatweb -a1 -v` 로 juice 응답 헤더를 통째로 덤프한 뒤 CSRF 관련 헤더만 grep 한다. juice 는
      `X-Frame-Options: SAMEORIGIN`(프레임 삽입=클릭재킹 완화)은 있으나 서버 세션 쿠키(SameSite)를
      내려주지 않는 토큰 기반 SPA 라, 클래식 쿠키 편승 CSRF 표면은 제한적이다. 상태 변경 요청에
      예측 불가 CSRF 토큰과 SameSite 가 모두 없으면 위조 요청을 거를 장치가 없다는 뜻이다.
      ## ✅ 합격 기준
      `CSRF` 출력 시 통과. **근거:** CSRF 관련 통제(X-Frame-Options·SameSite)를 헤더에서 점검한 결과가
      나오면 통과 — 토큰·SameSite 가 없으면 위조 요청을 거를 장치가 없음을 확인한다.
    hint: 'csrf 헤더 점검'
    category: analysis
    points: 12
    answer: |
      # 1) whatweb로 juice 응답 헤더 덤프 → CSRF 관련 통제(X-Frame-Options·SameSite 쿠키) 확인
      ssh att@192.168.0.202 "H=\$(whatweb -a1 -v http://juice.el34.lab/ 2>&1); echo \"\$H\" | grep -iE 'X-Frame-Options:|Set-Cookie|SameSite'; echo \"\$H\" | grep -iq 'SameSite' && echo 'SameSite 쿠키=있음' || echo 'CSRF: SameSite 쿠키 미관측 → 토큰 기반(Bearer) 인증 의존, 클래식 CSRF 방어는 토큰+SameSite'"
      # 2) 해석 — 상태 변경 요청에 CSRF 토큰/SameSite가 없으면 피해자 세션으로 위조 가능
    answer_detail: "CSRF 점검 = 상태 변경 요청을 거를 통제(CSRF 토큰·SameSite 쿠키)가 있는지 확인. dvwa CSRF 폼은 WAF(403) 뒤라 외부에서 토큰을 못 긁으므로, whatweb -a1 -v 로 juice 응답 헤더를 덤프해 CSRF 관련 통제를 본다. juice 는 X-Frame-Options: SAMEORIGIN(클릭재킹 완화)은 있으나 SameSite 세션 쿠키가 없는 토큰(Bearer) 기반 SPA. 토큰·SameSite 가 없으면 위조 요청을 거를 장치가 없다(단 XSS 가 되면 토큰도 읽혀 무력화 → XSS 방어가 전제). 판정은 출력에 `CSRF` 가 포함되는지로 한다."
    expected_output: |
      X-Frame-Options: SAMEORIGIN
      CSRF: SameSite 쿠키 미관측 → 토큰 기반(Bearer) 인증 의존, 클래식 CSRF 방어는 토큰+SameSite
    verify:
