      ## 🎯 방어 — 입력검증과 allowlist (근본 방어)
      점검은 취약점을 찾는 데서 끝나지 않는다. **어떻게 고칠지(근본 방어)** 를 제시해야 보고서가 완성된다.
      세 취약점의 뿌리가 "입력 신뢰" 하나였듯, 방어의 뿌리도 하나다 — **입력을 적이 보낸 것으로 가정하고,
      허용된 것만 통과시키는 allowlist 로 입력 범위를 좁힌다.** (차단목록(denylist)은 새 우회 표현이 나오면
      무너지지만, allowlist 는 허용 집합이 작고 명확해 우회가 어렵다.)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 경로순회 근본 방어 — 경로 정규화 + allowlist(사용자 입력으로 경로 구성 금지)
      echo "경로순회: 경로 정규화 + allowlist, 사용자 입력으로 경로 구성 금지"
      # 2) 명령주입 근본 방어 — OS 호출 회피(언어 API) + 불가피 시 allowlist+이스케이프
      echo "명령주입: OS 명령 호출 회피(언어 API), 불가피 시 엄격 allowlist + 이스케이프"
      # 3) 파일 업로드 근본 방어 — 확장자/MIME allowlist + 실행권한 제거·분리
      echo "업로드: 확장자/MIME allowlist, 업로드 디렉토리 실행권한 제거+분리, 콘텐츠 검사"
      # 4) 공통 — 입력 불신 + allowlist(WAF는 근본 아닌 보완 한 겹)
      # → 공통: 입력 불신 + allowlist
      ```
      ## ✅ 합격 기준
      `allowlist` 출력 시 통과. **근거:** 세 취약점 각각의 근본 방어가 정리되고 WAF(ModSec)가 근본이 아닌
