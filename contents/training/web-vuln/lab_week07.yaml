      ## 🎯 영향 — 파일읽기 vs RCE 심각도 구분
      발견한 취약점의 **영향(impact)** 을 분류하는 것은 점검 보고서의 우선순위를 정하는 일이다. 같은 "입력
      신뢰" 결함이라도 결과의 크기는 천차만별이다 — 경로순회는 "임의 파일 읽기(정보 노출)"에 그치지만,
      명령주입·파일 업로드는 "RCE(완전 장악)"로 끝난다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 경로순회의 영향 — 임의 파일 읽기(설정/소스/키 → 정보 노출)
      echo "경로순회: /etc/passwd, 설정/소스/키 읽기 → 정보 노출"
      # 2) 명령주입의 영향 — 임의 OS 명령 → RCE(완전 장악)
      echo "명령주입: 임의 OS 명령 → RCE → 완전 장악"
      # 3) 파일 업로드의 영향 — webshell → RCE(완전 장악)
      echo "업로드: webshell → RCE → 완전 장악"
      # 4) 결론 — 명령주입/업로드는 RCE(최고 심각도)
      # → 명령주입/업로드는 RCE(최고 심각도)
      ```
