      - `grep -oE "9[0-9]{5}"` = 로그에서 6자리 CRS 룰 ID(9xxxxx)만 뽑고, `sort -u` 로 중복 제거,
        `grep -E "^93"` 로 **93 으로 시작하는 룰**(930/932/933)만 남긴다.
