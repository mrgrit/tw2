      echo "경로순회: 경로 정규화 + allowlist, 사용자 입력으로 경로 구성 금지"
      # 2) 명령주입 근본 방어 — OS 호출 회피(언어 API) + 불가피 시 allowlist+이스케이프
      echo "명령주입: OS 명령 호출 회피(언어 API), 불가피 시 엄격 allowlist + 이스케이프"
      # 3) 파일 업로드 근본 방어 — 확장자/MIME allowlist + 실행권한 제거·분리
      echo "업로드: 확장자/MIME allowlist, 업로드 디렉토리 실행권한 제거+분리, 콘텐츠 검사"
      # 4) 공통 — 입력 불신 + allowlist(WAF는 근본 아닌 보완 한 겹)
      echo "→ 공통: 입력 불신 + allowlist"
      ```
