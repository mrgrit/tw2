    instruction: |
      ## 🎯 방어 — 입력검증과 allowlist (근본 방어)
      점검은 취약점을 찾는 데서 끝나지 않는다. **어떻게 고칠지(근본 방어)** 를 제시해야 보고서가 완성된다.
      세 취약점의 뿌리가 "입력 신뢰" 하나였듯, 방어의 뿌리도 하나다 — **입력을 적이 보낸 것으로 가정하고,
      허용된 것만 통과시키는 allowlist 로 입력 범위를 좁힌다.** (차단목록(denylist)은 새 우회 표현이 나오면
      무너지지만, allowlist 는 허용 집합이 작고 명확해 우회가 어렵다.)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
