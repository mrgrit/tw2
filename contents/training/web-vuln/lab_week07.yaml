  - order: 4
    instruction: |
      ## 🎯 PHP 주입 — 웹 취약점 스캐너로 위험 콘텐츠 반입 점검
      **파일 업로드 취약점**의 핵심 무기는 **webshell**(`<?php system($_GET['c']); ?>` 같은 악성 스크립트)
      이다. 여기서는 실제 업로드 폼 대신, 웹 취약점 스캐너 `nikto` 의 **주입 계열(Tuning 4)** 점검으로
      dvwa 에 XSS/스크립트/HTML 주입 계열 탐침을 보내, 위험 콘텐츠가 WAF(933)에 어떻게 막히는지 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) nikto 주입 계열(Tuning 4) 점검으로 dvwa에 위험 콘텐츠 탐침 — WAF가 <?php/스크립트 주입을 차단
      nikto -h http://dvwa.el34.lab -Tuning 4 -maxtime 30s
      ```
      - `nikto -h http://dvwa.el34.lab -Tuning 4` = 인젝션(XSS/스크립트/HTML) 계열 위험 탐침만 골라 보낸다.
        `-maxtime 30s` = 30초 제한. `<?php ... ?>` 같은 위험 콘텐츠 주입도 이 계열에 포함된다.
      - dvwa 는 ModSec 933(PHP) 룰군이 PHP 태그·위험 함수를 403 차단 → nikto 는 주입 취약점을 하나도
        보고하지 못하고 서버 배너·헤더 관찰만 남긴다(위험 콘텐츠가 WAF 에 걸림).
      ## ✅ 합격 기준
      `Nikto`(스캐너 배너) 출력 시 통과. **근거:** nikto 주입 계열 점검이 실행되고 주입 취약점을 못
      내면, `<?php` 위험 콘텐츠가 ModSec 933 에 막힌 것 — 단, 실제 파일을 올려 실행한 것은 아니다(고급 트랙).
    hint: 'nikto 주입 점검'
    category: manipulation
    points: 12
    answer: |
      # 1) nikto 주입 계열(Tuning 4) 점검으로 dvwa에 위험 콘텐츠 탐침 — WAF가 <?php/스크립트 주입을 차단
      ssh att@192.168.0.202 "nikto -h http://dvwa.el34.lab -Tuning 4 -maxtime 30s"
      # 2) 해석 — 주입 계열 탐침 다수 실행, 주입 취약점 0건 = dvwa ModSec 933이 <?php webshell 콘텐츠 차단
    answer_detail: "PHP 주입 = webshell 의 핵심 시그니처(<?php ... ?>) 콘텐츠. 웹 취약점 스캐너 nikto 의 주입 계열(-Tuning 4: XSS/스크립트/HTML 인젝션) 점검으로 dvwa 에 위험 탐침을 보내면, ModSec 933(PHP) 룰군이 PHP 태그·위험 함수를 403 차단 → nikto 는 주입 취약점을 보고하지 못하고 서버 배너(Apache/2.4.52)·헤더 관찰만 남긴다 = 위험 콘텐츠가 WAF 에 걸림. 실제 업로드 우회는 대체 확장자(.phtml)·MIME 위조·polyglot(고급). 판정은 nikto 배너(`Nikto`)가 출력되는지로 한다."
