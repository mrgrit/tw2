lab_id: iot-security-week13
title: "W13 — 자동차 보안: CAN 덤프 분석·메시지 주입 탐지·SecOC/도메인 분리"
version: ai
course: iot-security
week: 13
description: |
  차량 CAN 버스 보안을 **실제 아티팩트(candump 로그)로** 분석한다. CAN 프레임은 `ID#DATA` 뿐이라 **발신자
  인증도 서명도 없다** — 로그만 봐도 이 구조가 드러난다. 실습은 (1) candump 로그를 만들어 CAN 무인증 구조를
  확인하고, (2) 정상 트래픽에 섞인 **주입된 브레이크-해제 프레임**을 `awk` 로 탐지하며, (3) SecOC(메시지 인증
  코드) 프레임과 대비한다. (실제로는 `candump can0 -l` 로그나 pcap 에 같은 분석을 적용한다.)

  모든 명령은 사람이 한 줄씩 직접 입력한다. el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)에서 실행하며,
  분석 아티팩트(CAN 로그)는 이 실습이 `/tmp` 에 직접 만든다.
difficulty: medium
duration_minutes: 120
audience: IoT 보안 (13주차)
prerequisites:
  - "el34 호스트 접속: `ssh ccc@{{TARGET_IP}}` (비밀번호 `1`)"
  - "GPU Ollama 도달 — http://211.170.162.139:10934 (gemma3:4b), 종합용"
  - "도구: grep·awk·python3 (el34 에 존재)"
  - "W13 강의안 정독 — §0.5(CAN·무인증·SecOC·도메인 분리)"
objectives:
  - "GPU 응답 확인 (GEN_OK)"
  - "CAN 덤프에서 무인증(발신자/서명 없음) 구조 확인 (CAN_INSECURE)"
  - "정상 트래픽에 주입된 위조 프레임 awk 탐지 (CAN_INJECTION)"
  - "SecOC(MAC) 프레임과 대비 (VEHICLE_HARDENED)"
  - "종합 소견 (Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION
      종합용 GPU(gemma3) 응답 확인.
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## 📋 확인 사항 — 마지막 줄 `GEN_OK`
      ## 🔍 결과 해석 — 정상 `GEN_OK` / 비정상 `GEN_EMPTY`·연결오류
    hint: "curl /api/generate → response 있으면 GEN_OK."
    category: survey
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## 🎯 MISSION
      **candump 로그**를 만들고, CAN 프레임이 `ID#DATA` 뿐 — **발신자 식별·서명이 없음**을 확인한다.

      ## 💻 실행 명령
      ```bash
      DUMP=/tmp/candump_STU42.log
      # 1) candump 형식 로그를 만든다: (타임스탬프) can0 ID#DATA. 정상 주행 트래픽.
      cat > "$DUMP" <<'EOF'
      (1699.001) can0 123#1A2B000000000000
      (1699.011) can0 1A0#0032000000000000
      (1699.021) can0 0A0#0100000000000000
      (1699.031) can0 123#1A2C000000000000
      (1699.041) can0 1A0#0033000000000000
      (1699.051) can0 0A0#0100000000000000
      EOF
      #  ID 123=엔진RPM, 1A0=차속, 0A0=브레이크상태(01=작동중)

      # 2) 프레임 구조 확인: ID#DATA 만 있고, 발신 ECU·서명 필드가 없다.
      awk '{print "frame:", $3}' "$DUMP" | head -3
      echo -n "서명/MAC 필드 존재? "; grep -Eq "#.{16}$" "$DUMP" && echo "8바이트 데이터뿐(인증 필드 없음)" || echo "확장"

      # 3) 판정: 프레임에 발신자/서명이 없으면(순수 ID#DATA) CAN_INSECURE.
      #    (모든 프레임이 8바이트=16 hex 데이터뿐 → 인증 없음)
      T=$(wc -l < "$DUMP"); A=$(awk -F'#' '{print $2}' "$DUMP" | grep -Ec '^[0-9A-Fa-f]{16}$')
      test "$A" = "$T" && echo CAN_INSECURE || echo HAS_AUTH
      ```
      ## 📋 확인 사항
      - 프레임이 `123#…`, `1A0#…`, `0A0#…` 처럼 ID#8바이트 데이터뿐
      - 마지막 줄 `CAN_INSECURE`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — CAN 프레임은 **누가 보냈는지·위조인지 확인할 필드가 없다**(ID+데이터뿐). 그래서 약한
      > ECU(인포테인먼트) 하나만 뚫으면 브레이크·조향 ID 로 위조 프레임을 버스에 뿌릴 수 있다.

      ## 🔍 결과 해석 — 정상 `CAN_INSECURE`
    hint: "candump 로그 생성 → 프레임이 ID#8바이트뿐(발신자/서명 없음) 확인 → CAN_INSECURE."
    category: recon
    answer: |
      frame: 123#1A2B000000000000
      frame: 1A0#0032000000000000
      frame: 0A0#0100000000000000
      서명/MAC 필드 존재? 8바이트 데이터뿐(인증 필드 없음)
      CAN_INSECURE
    answer_detail: "CAN 프레임은 ID#데이터뿐 — 발신자 식별·서명 없음. 무인증 브로드캐스트 구조."
    verify:
      type: output_contains
      expect: CAN_INSECURE
      field: stdout
      semantic:
        intent: "candump 로그에서 CAN 프레임의 무인증 구조 확인."
        success_criteria:
          - "프레임이 ID#데이터뿐(발신자/서명 없음) 확인"
          - "CAN_INSECURE 출력"

  - order: 3
    instruction: |
      ## 🎯 MISSION
      정상 트래픽에 **주입된 위조 브레이크-해제 프레임**을 `awk` 로 탐지한다. 브레이크 상태 ID(`0A0`)는 정상적으로
      `01`(작동)인데, 공격자가 `00`(해제)을 주입하면 주행 중 브레이크가 풀린다.

      ## 💻 실행 명령
      ```bash
      DUMP=/tmp/candump_inj_STU42.log
      # 1) 정상 트래픽 + 주입된 브레이크-해제(0A0#00...) 프레임이 섞인 로그.
      cat > "$DUMP" <<'EOF'
      (1699.001) can0 123#1A2B000000000000
      (1699.011) can0 1A0#0050000000000000
      (1699.021) can0 0A0#0100000000000000
      (1699.026) can0 0A0#0000000000000000
      (1699.031) can0 123#1A2C000000000000
      (1699.041) can0 1A0#0051000000000000
      EOF
      #  1A0#0050 = 차속 80(고속). 0A0#00.. = 브레이크 해제 (고속 주행 중 브레이크 풀림 = 위조!)

      # 2) 브레이크 ID(0A0) 프레임만 뽑아 상태를 본다.
      grep "can0 0A0#" "$DUMP"

      # 3) awk 로 '브레이크 해제(0A0 데이터가 00으로 시작)' 위조 프레임을 탐지한다.
      awk '$3 ~ /^0A0#00/ {print "INJECTED brake-release:", $0}' "$DUMP"

      # 4) 판정: 브레이크-해제 위조 프레임이 있으면 CAN_INJECTION.
      awk '$3 ~ /^0A0#00/{f=1} END{print (f?"CAN_INJECTION":"CLEAN")}' "$DUMP"
      ```
      ## 📋 확인 사항
      - 명령 2: `0A0#0100…`(정상 작동)과 `0A0#0000…`(주입 해제)이 함께 보임
      - 명령 3: `INJECTED brake-release: (1699.026) can0 0A0#0000000000000000`
      - 명령 4: 마지막 줄 `CAN_INJECTION`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — CAN 은 발신자 검증이 없어, 뚫린 ECU 가 브레이크 ID(0A0)로 **위조 상태**를 주입하면 다른
      > ECU 가 그대로 믿는다. 고속(1A0#0050)에서 브레이크-해제(0A0#00) 주입은 물리 사고로 직결된다(Jeep 해킹 계열).

      ## 🔍 결과 해석 — 정상 `CAN_INJECTION` + 주입 프레임 식별
    hint: "candump 로그에서 awk 로 0A0#00(브레이크 해제) 위조 프레임 탐지 → CAN_INJECTION."
    category: exploit
    answer: |
      (1699.021) can0 0A0#0100000000000000
      (1699.026) can0 0A0#0000000000000000
      INJECTED brake-release: (1699.026) can0 0A0#0000000000000000
      CAN_INJECTION
    answer_detail: "고속 주행 중 브레이크 ID(0A0)에 해제(00) 위조 프레임 주입을 awk 로 탐지. CAN 무인증 악용."
    verify:
      type: output_contains
      expect: CAN_INJECTION
      field: stdout
      semantic:
        intent: "candump 로그에서 주입된 위조 브레이크 프레임 탐지."
        success_criteria:
          - "브레이크 ID 위조 프레임(0A0#00) 식별"
          - "CAN_INJECTION 출력"

  - order: 4
    instruction: |
      ## 🎯 MISSION
      **SecOC(메시지 인증 코드)** 가 적용된 로그와 대비한다 — 프레임에 MAC(freshness+truncated MAC) 이 붙어 위조를
      걸러낼 수 있음을 확인한다.

      ## 💻 실행 명령
      ```bash
      SLOG=/tmp/candump_secoc_STU42.log
      # SecOC: 데이터 뒤에 MAC(예: 8바이트 데이터 + 카운터 + truncated MAC). 위조는 MAC 검증 실패.
      cat > "$SLOG" <<'EOF'
      (1700.001) can0 0A0#0100  MAC=1F3A CTR=0041 verify=OK
      (1700.011) can0 0A0#0100  MAC=2B7C CTR=0042 verify=OK
      (1700.016) can0 0A0#0000  MAC=0000 CTR=0000 verify=FAIL(rejected)
      EOF

      # 정상 프레임(verify=OK)과 위조 프레임(verify=FAIL)을 구분한다.
      echo "인증 통과:"; grep "verify=OK" "$SLOG"
      echo "위조 거부:"; grep "verify=FAIL" "$SLOG"
      # 판정: MAC 검증으로 위조가 거부되면(verify=FAIL 존재) 강화됨.
      grep -q "MAC=" "$SLOG" && grep -q "verify=FAIL" "$SLOG" && echo VEHICLE_HARDENED || echo NO_AUTH
      ```
      ## 📋 확인 사항
      - 정상 프레임은 `verify=OK`, 위조 브레이크-해제는 `verify=FAIL(rejected)`
      - 마지막 줄 `VEHICLE_HARDENED`

      ## 💡 왜 이걸 하는가?
      SecOC 는 각 프레임에 카운터(재전송 방지)+MAC(위조 방지)을 붙여, 키 없는 ECU 의 위조 프레임을 수신 측이 거부한다.
      여기에 인포테인먼트/안전 도메인 **게이트웨이 분리**·차량 IDS 를 더하면 W13 공격 경로가 끊긴다.

      ## 🔍 결과 해석 — 정상 `VEHICLE_HARDENED`
    hint: "SecOC 로그(MAC+verify) 생성 → 위조가 verify=FAIL 로 거부됨 확인 → VEHICLE_HARDENED."
    category: defense
    answer: |
      인증 통과:
      (1700.001) can0 0A0#0100  MAC=1F3A CTR=0041 verify=OK
      위조 거부:
      (1700.016) can0 0A0#0000  MAC=0000 CTR=0000 verify=FAIL(rejected)
      VEHICLE_HARDENED
    answer_detail: "SecOC(MAC+카운터)로 위조 프레임 거부. 도메인 분리·차량 IDS 병행."
    verify:
      type: output_contains
      expect: VEHICLE_HARDENED
      field: stdout

  - order: 5
    instruction: |
      ## 🎯 MISSION
      W13 발견(CAN 무인증·브레이크 위조 주입·SecOC 방어)을 소견으로 정리한다. (정리: `rm -f /tmp/candump*STU42.log`)
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a concise note for Week 13 of an IoT security course on automotive CAN bus security. Facts: a candump log showed CAN frames are just ID and data with no sender authentication or signature (CAN_INSECURE); among normal high-speed traffic, an injected brake-release frame on the brake ID 0A0 with data 00 was detected with awk, a spoofed safety-critical message (CAN_INJECTION); a SecOC log with per-frame counters and MACs rejected the forged frame (verify=FAIL), hardening the bus (VEHICLE_HARDENED). Explain that CAN has no message authentication so a compromised ECU can inject brake or steering frames, and defense uses SecOC message authentication, gateway domain separation, and a vehicle IDS. Begin with exactly the single word Assessment on its own first line.","stream":false,"options":{"num_predict":330}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ## 📋 확인 사항 — 첫머리에 `Assessment`
      ## 🔍 결과 해석 — 정상 첫 줄 `Assessment` / 비정상 `[형식 미준수 — 재실행]`

      ---
      **다음 주(W14) 예고** — IoT 보안 가이드라인(OWASP IoT Top 10·Security by Design).
    hint: "curl 로 gemma3 에 발견 넣어 요약, 첫 줄 Assessment 강제. 임시 파일 정리."
    category: report
    answer: |
      Assessment
      A candump log showed CAN frames are just ID and data with no authentication; among high-speed
      traffic an injected brake-release frame (0A0#00) was detected with awk, a spoofed safety-critical
      message. A SecOC log with counters and MACs rejected the forgery (verify=FAIL). CAN has no message
      authentication, so a compromised ECU can inject brake/steering frames; defense uses SecOC, gateway
      domain separation, and a vehicle IDS.
    answer_detail: "W13 자동차 종합(Assessment): CAN 무인증·브레이크 위조 주입 탐지·SecOC/도메인 분리."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
