lab_id: iot-security-week14
title: "W14 — IoT 보안 가이드라인: OWASP IoT Top 10·Security by Design·컴플라이언스 갭"
version: ai
course: iot-security
week: 14
description: |
  체계적 IoT 보안 프레임워크. OWASP IoT Top 10 평가(OWASP_ASSESSED), Security by Design 원칙 점검
  (SEC_BY_DESIGN), 표준 대비 컴플라이언스 갭(GAPS_IDENTIFIED), 종합(Assessment).
  산발적 점검을 표준으로 체계화 — 설계 단계 보안이 근본. 규정 준수의 시대.
difficulty: medium
duration_minutes: 120
audience: IoT 보안 (14주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W14 강의안 정독 — §0.5(OWASP IoT Top 10·Security by Design·표준)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "OWASP IoT Top 10 평가(OWASP_ASSESSED)"
  - "Security by Design 원칙 점검(SEC_BY_DESIGN)"
  - "표준 대비 컴플라이언스 갭(GAPS_IDENTIFIED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — OWASP IoT Top 10 평가 → OWASP_ASSESSED
      > **🎯 목표:** IoT 제품을 OWASP IoT Top 10 체크리스트로 평가.
      > **개념:** 10대 위험을 체계적으로 점검.
      ```bash
      python3 - <<'PY'
      # OWASP IoT Top 10 점검(제품 상태)
      checklist={"I1 weak password":"FAIL (default admin/admin)",
                 "I2 insecure network services":"FAIL (unauth RTSP)",
                 "I3 insecure interfaces":"FAIL (command injection)",
                 "I4 lack of update":"FAIL (no OTA)",
                 "I5 insecure components":"PASS",
                 "I6 privacy":"FAIL (unencrypted data)",
                 "I7 insecure data transfer":"FAIL (plaintext)",
                 "I8 device management":"PASS",
                 "I9 insecure defaults":"FAIL (default enabled debug)",
                 "I10 physical hardening":"FAIL (UART exposed)"}
      fails=[k for k,v in checklist.items() if "FAIL" in v]
      for k,v in list(checklist.items())[:5]: print(f"  {k}: {v}")
      print(f"  ... ({len(fails)}/10 FAIL)")
      print("OWASP_ASSESSED" if len(fails)>=5 else "MOSTLY_PASS")
      PY
      ```
      ✅ 마지막 줄 `OWASP_ASSESSED` (OWASP IoT Top 10 중 다수 FAIL — 체계적 평가).
      🔎 약한 비밀번호·안전하지 않은 서비스·인터페이스·업데이트 부재 등 다수 위반. 체크리스트로 체계적 점검.
    answer: |
      I1 weak password: FAIL (default admin/admin)
      I2 insecure network services: FAIL (unauth RTSP)
      I3 insecure interfaces: FAIL (command injection)
      I4 lack of update: FAIL (no OTA)
      I5 insecure components: PASS
       ... (8/10 FAIL)
      OWASP_ASSESSED
    answer_detail: "OWASP IoT Top 10 체계적 평가(다수 FAIL) → OWASP_ASSESSED."
    verify:
      type: output_contains
      expect: OWASP_ASSESSED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — Security by Design → SEC_BY_DESIGN
      > **🎯 목표:** 설계 단계 보안 내장 여부를 점검.
      > **개념:** 사후 추가가 아니라 설계부터.
      ```bash
      python3 - <<'PY'
      # Security by Design 원칙 점검
      principles={"no_default_password":False,      # 기본 비밀번호 없이 출고
                  "secure_update_mechanism":False,  # 안전한 OTA 내장
                  "minimal_attack_surface":False,   # 최소 포트·서비스
                  "encryption_by_default":False,    # 암호화 기본 켜짐
                  "vuln_disclosure_process":False}  # 취약점 공개 절차
      # 이 제품은 설계 단계 보안이 없음
      met=[k for k,v in principles.items() if v]
      for k,v in principles.items(): print(f"  {k}: {'yes' if v else 'NO (bolted-on or absent)'}")
      # 원칙 대부분 미충족 = Security by Design 아님(사후 보안)
      print("SEC_BY_DESIGN" if len(met)==0 else "PARTIAL")
      PY
      ```
      ✅ 마지막 줄 `SEC_BY_DESIGN` (설계 단계 보안 원칙 미충족 = 사후 보안 문제 확인).
      🔎 기본 비밀번호 없이 출고·안전한 업데이트·최소 표면·기본 암호화·취약점 공개 — 이 원칙들이 없으면 사후 보안(비쌈·불완전).
    answer: |
      no_default_password: NO (bolted-on or absent)
      secure_update_mechanism: NO (bolted-on or absent)
      minimal_attack_surface: NO (bolted-on or absent)
      encryption_by_default: NO (bolted-on or absent)
      vuln_disclosure_process: NO (bolted-on or absent)
      SEC_BY_DESIGN
    answer_detail: "Security by Design 원칙 미충족(사후 보안) 확인 → SEC_BY_DESIGN."
    verify:
      type: output_contains
      expect: SEC_BY_DESIGN
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 컴플라이언스 갭 → GAPS_IDENTIFIED
      > **🎯 목표:** ETSI EN 303 645 등 표준 대비 갭을 식별·우선순위.
      > **개념:** 갭이 위험이자 규정 위반.
      ```bash
      python3 - <<'PY'
      # ETSI EN 303 645 핵심 요구 대비
      requirements={"no universal default passwords":False,   # 위반
                    "provide security updates":False,          # 위반
                    "securely store credentials":False,        # 위반
                    "encrypt communications":False,            # 위반
                    "vulnerability disclosure":True}           # 충족
      gaps=[req for req,met in requirements.items() if not met]
      # 갭에 우선순위(기본 비밀번호가 최우선)
      priority_order=["no universal default passwords","provide security updates","encrypt communications"]
      for g in gaps: print(f"  GAP (compliance violation): {g}")
      print(f"top priority gap: {gaps[0] if gaps else 'none'}")
      print("GAPS_IDENTIFIED" if len(gaps)>=3 else "COMPLIANT")
      PY
      ```
      ✅ 마지막 줄 `GAPS_IDENTIFIED` (ETSI 요구 대비 다수 갭 — 규정 위반).
      🔎 기본 비밀번호·업데이트·암호화 미충족은 ETSI EN 303 645 위반. 갭은 위험이자 규정 위반 — 우선순위로 보강.
    answer: |
      GAP (compliance violation): no universal default passwords
      GAP (compliance violation): provide security updates
      GAP (compliance violation): securely store credentials
      GAP (compliance violation): encrypt communications
      top priority gap: no universal default passwords
      GAPS_IDENTIFIED
    answer_detail: "ETSI 표준 대비 컴플라이언스 갭 식별 → GAPS_IDENTIFIED."
    verify:
      type: output_contains
      expect: GAPS_IDENTIFIED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W14 on IoT security guidelines. Findings: an OWASP IoT Top 10 assessment found most items failing (OWASP_ASSESSED), Security by Design principles were absent so security was bolted on (SEC_BY_DESIGN), and compliance gaps against ETSI EN 303 645 (default passwords, updates, encryption) were identified (GAPS_IDENTIFIED). Explain that IoT security should follow standards like OWASP IoT Top 10 and ETSI, use Security by Design, and that regulation now makes it compliance. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: IoT 보안은 OWASP IoT Top 10·ETSI 표준으로 체계 평가, Security by Design으로 구축. 규정 준수의 시대.
      다음 주(W15)는 **종합 평가 — 전체 IoT 침투 + 보안**.
    answer: |
      Assessment
      IoT security follows standards like the OWASP IoT Top 10 and ETSI EN 303 645, and uses Security by Design rather than bolt-on security.
      Compliance gaps (default passwords, updates, encryption) are both risks and regulatory violations to fix by priority.
    answer_detail: "W14 IoT 가이드라인 종합(Assessment). OWASP·Security by Design·컴플라이언스."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
