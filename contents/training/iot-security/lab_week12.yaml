lab_id: iot-security-week12
title: "W12 — OT/SCADA: Modbus 캡처 분석·위험 쓰기 명령 탐지·Purdue 분리"
version: ai
course: iot-security
week: 12
description: |
  산업제어(OT) 프로토콜 Modbus/TCP 보안을 **실제 아티팩트(패킷 캡처)로** 분석한다. Modbus/TCP 는 1979년 설계라
  **인증·암호가 전혀 없다** — MBAP 헤더에 자격 필드가 없고, 502 포트에 닿으면 누구나 레지스터를 읽고 **코일/
  레지스터를 쓸(제어)** 수 있다. 실습은 (1) Modbus 캡처를 만들어 python 으로 파싱해 무인증 구조를 확인하고,
  (2) 정상 읽기 사이에 섞인 **위험한 쓰기 명령(Write Single Coil = 액추에이터 강제)**을 탐지하며, (3) Purdue
  모델 방화벽 설정으로 IT/OT 분리를 확인한다.

  모든 명령은 사람이 한 줄씩 직접 입력한다. el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)에서 실행하며,
  분석 아티팩트(캡처·방화벽 설정)는 이 실습이 `/tmp` 에 직접 만든다. ⚠️ 실제로는 `tcpdump -r`·IDS 로그에 동일 적용.
difficulty: medium
duration_minutes: 120
audience: IoT 보안 (12주차)
prerequisites:
  - "el34 호스트 접속: `ssh ccc@{{TARGET_IP}}` (비밀번호 `1`)"
  - "GPU Ollama 도달 — http://211.170.162.139:10934 (gemma3:4b), 종합용"
  - "도구: grep·xxd·python3 (el34 에 존재)"
  - "W12 강의안 정독 — §0.5(Modbus·무인증·Purdue·세그멘테이션)"
objectives:
  - "GPU 응답 확인 (GEN_OK)"
  - "Modbus 캡처를 파싱해 무인증 구조 확인 (OT_PROTOCOL_WEAK)"
  - "위험한 쓰기(Write Coil/Register) 명령 탐지 (UNSAFE_COMMAND)"
  - "Purdue 방화벽 설정으로 IT/OT 분리 확인 (OT_ISOLATED)"
  - "종합 소견 (Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION
      종합용 GPU(gemma3) 응답 확인.
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## 📋 확인 사항 — 마지막 줄 `GEN_OK`
      ## 🔍 결과 해석 — 정상 `GEN_OK` / 비정상 `GEN_EMPTY`·연결오류
    hint: "curl /api/generate → response 있으면 GEN_OK."
    category: survey
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## 🎯 MISSION
      **Modbus/TCP 트랜잭션 로그**를 만들고, MBAP 헤더 필드를 하나씩 살펴 **자격 필드가 없음(무인증)**을 확인한다.

      ## 💻 실행 명령
      ```bash
      # 1) Modbus/TCP 트랜잭션 로그를 만든다(디코드 형식: MBAP 필드 + PDU). 실제 tshark 요약과 같은 형태.
      #    MBAP = tid(트랜잭션) proto(0000) unit(슬레이브). PDU = FC(기능코드) + 데이터. 인증/서명 필드는 없다.
      cat > /tmp/modbus_STU42.log <<'EOF'
      frame=1 tid=1 proto=0000 unit=1 FC=03 name=ReadHolding   addr=0   qty=10
      frame=2 tid=2 proto=0000 unit=1 FC=03 name=ReadHolding   addr=100 qty=2
      frame=3 tid=3 proto=0000 unit=1 FC=05 name=WriteSingleCoil addr=16 value=FF00
      EOF

      # 2) 로그를 그대로 본다(각 프레임의 MBAP·FC 확인).
      cat /tmp/modbus_STU42.log

      # 3) MBAP 에 인증/서명 필드가 있는지 grep 으로 찾는다(auth/key/sign 같은 필드).
      grep -iE "auth|key|sign|token|cert" /tmp/modbus_STU42.log || echo "→ 인증/서명 필드 없음"

      # 4) 모든 프레임의 proto 가 0000(표준 Modbus, 무인증)인지 확인한다.
      grep -oE "proto=[0-9]+" /tmp/modbus_STU42.log | sort -u

      # 5) 판정: proto=0000 뿐이고 인증 필드가 없으면 무인증 프로토콜.
      if ! grep -qiE "auth|key|sign|token|cert" /tmp/modbus_STU42.log && [ "$(grep -oE 'proto=[0-9]+' /tmp/modbus_STU42.log | sort -u)" = "proto=0000" ]; then echo OT_PROTOCOL_WEAK; else echo HAS_AUTH; fi
      ```
      ## 📋 확인 사항
      - `grep` 명령 3: 인증/서명 필드 `없음`
      - `grep` 명령 4: `proto=0000` 한 종류뿐
      - 마지막 줄 `OT_PROTOCOL_WEAK`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — Modbus/TCP 는 MBAP 헤더에 **누가·권한 있는지 확인할 필드가 없다**. 502 포트에 닿기만
      > 하면 PLC 의 레지스터를 읽고 **쓸** 수 있다. IT 망과 OT 망이 붙어 있으면 IT 침해가 곧 물리 제어 탈취다.

      ## 🔍 결과 해석 — 정상 `OT_PROTOCOL_WEAK`
    hint: "Modbus 로그 생성 → grep 로 인증 필드 없음 + proto=0000 확인 → OT_PROTOCOL_WEAK."
    category: recon
    answer: |
      frame=1 tid=1 proto=0000 unit=1 FC=03 name=ReadHolding   addr=0   qty=10
      frame=2 tid=2 proto=0000 unit=1 FC=03 name=ReadHolding   addr=100 qty=2
      frame=3 tid=3 proto=0000 unit=1 FC=05 name=WriteSingleCoil addr=16 value=FF00
      → 인증/서명 필드 없음
      proto=0000
      OT_PROTOCOL_WEAK
    answer_detail: "Modbus MBAP 에는 인증 필드가 없음. 502 도달=읽기/쓰기 가능. IT/OT 연결 시 물리 제어 탈취."
    verify:
      type: output_contains
      expect: OT_PROTOCOL_WEAK
      field: stdout
      semantic:
        intent: "Modbus 캡처 파싱으로 무인증 구조 확인."
        success_criteria:
          - "MBAP 에 자격/서명 필드 없음 확인"
          - "OT_PROTOCOL_WEAK 출력"

  - order: 3
    instruction: |
      ## 🎯 MISSION
      캡처에서 **위험한 쓰기 명령**(Write Single Coil FC05 / Write Register FC06 / Write Multiple FC10)을 python 으로
      탐지한다. 읽기(FC03)는 관측이지만, 쓰기는 액추에이터를 직접 제어한다.

      ## 💻 실행 명령
      ```bash
      # 1) 로그에서 쓰기 계열 기능코드(FC=05/06/10 = 코일/레지스터 쓰기)를 grep 으로 찾는다.
      grep -E "FC=(05|06|10)" /tmp/modbus_STU42.log

      # 2) awk 로 각 프레임을 읽기/쓰기로 분류해 보여준다(쓰기는 액추에이터 직접 제어).
      awk '{
        fc=""; for(i=1;i<=NF;i++) if($i ~ /^FC=/){split($i,a,"="); fc=a[2]}
        if(fc=="05"||fc=="06"||fc=="10") print "  UNSAFE " $0 "  <-- 액추에이터 강제";
        else print "  read   " $0
      }' /tmp/modbus_STU42.log

      # 3) 판정: 쓰기 기능코드(05/06/10)가 있으면 위험 명령 존재.
      grep -qE "FC=(05|06|10)" /tmp/modbus_STU42.log && echo UNSAFE_COMMAND || echo READ_ONLY
      ```
      ## 📋 확인 사항
      - FC03 은 `read`, FC05 는 `UNSAFE ... WriteSingleCoil addr=16 value=FF00 <-- 액추에이터 강제`
      - 마지막 줄 `UNSAFE_COMMAND`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — `Write Single Coil addr=16 value=FF00` 은 코일(디지털 출력)을 **강제로 ON** 한다 —
      > 펌프·차단기·밸브를 임의로 조작하는 것이다. 인증이 없으니 캡처의 이 한 프레임이 곧 물리 사보타주(Stuxnet
      > 계열)다. IDS 는 OT 망의 예기치 않은 **쓰기 명령**을 최우선 경보로 삼아야 한다.

      ## 🔍 결과 해석 — 정상 `UNSAFE_COMMAND` + 쓰기 명령 식별
    hint: "grep/awk 로 로그의 FC=05/06/10(쓰기)이 있으면 UNSAFE_COMMAND. FC05 WriteSingleCoil 강제 ON 탐지."
    category: exploit
    answer: |
      frame=3 tid=3 proto=0000 unit=1 FC=05 name=WriteSingleCoil addr=16 value=FF00
      read   frame=1 tid=1 proto=0000 unit=1 FC=03 name=ReadHolding   addr=0   qty=10
      read   frame=2 tid=2 proto=0000 unit=1 FC=03 name=ReadHolding   addr=100 qty=2
      UNSAFE frame=3 tid=3 proto=0000 unit=1 FC=05 name=WriteSingleCoil addr=16 value=FF00  <-- 액추에이터 강제
      UNSAFE_COMMAND
    answer_detail: "Write Single Coil(FC05) addr16 = FF00(강제 ON) 탐지 = 무인증 물리 제어. IDS 최우선 경보 대상."
    verify:
      type: output_contains
      expect: UNSAFE_COMMAND
      field: stdout
      semantic:
        intent: "Modbus 캡처에서 위험한 쓰기 명령 탐지."
        success_criteria:
          - "쓰기 계열 FC(05/06/0F/10) 식별"
          - "UNSAFE_COMMAND 출력"

  - order: 4
    instruction: |
      ## 🎯 MISSION
      **Purdue 모델 방화벽 설정**을 만들어, IT(레벨4/5)와 OT(레벨0~3)가 분리되고 Modbus 가 IT 에서 직접 닿지 못함을
      확인한다.

      ## 💻 실행 명령
      ```bash
      FW=/tmp/purdue_fw_STU42.conf
      cat > "$FW" <<'EOF'
      # Purdue 네트워크 분리 정책 (IT=10.20.x, DMZ=10.30.x, OT=10.40.x)
      deny  from 10.20.0.0/16 to 10.40.0.0/16 port 502    # IT -> OT Modbus 직결 차단
      allow from 10.20.0.0/16 to 10.30.0.0/16 port 443    # IT -> DMZ(데이터 히스토리안)만
      allow from 10.30.0.0/16 to 10.40.0.5   port 502     # DMZ conduit -> 지정 PLC 만(단방향)
      default deny
      EOF

      # IT 에서 OT Modbus(502) 직결이 차단됐는지 + 기본 deny 인지 확인.
      echo "[IT->OT 502 차단]"; grep -E "deny .*10.20.*10.40.*502" "$FW"
      echo "[기본 정책]"; grep -E "default deny" "$FW"
      grep -Eq "deny .*10.20.*10.40.*502" "$FW" && grep -Eq "default deny" "$FW" && echo OT_ISOLATED || echo FLAT_NETWORK
      ```
      ## 📋 확인 사항
      - `deny from 10.20.0.0/16 to 10.40.0.0/16 port 502`, `default deny`
      - 마지막 줄 `OT_ISOLATED`

      ## 💡 왜 이걸 하는가?
      Modbus 자체를 인증화하기 어려우므로(레거시 PLC), 방어의 핵심은 **네트워크 분리**다. Purdue 모델로 IT↔OT 를
      DMZ conduit 로만 잇고, OT 쓰기는 지정 호스트·단방향으로 제한하고, OT IDS 로 이상 쓰기를 탐지한다.

      ## 🔍 결과 해석 — 정상 `OT_ISOLATED`
    hint: "Purdue 방화벽 설정 생성 → grep 로 IT->OT 502 deny + default deny 확인 → OT_ISOLATED."
    category: defense
    answer: |
      [IT->OT 502 차단]
      deny  from 10.20.0.0/16 to 10.40.0.0/16 port 502    # IT -> OT Modbus 직결 차단
      [기본 정책]
      default deny
      OT_ISOLATED
    answer_detail: "Purdue 분리(IT->OT Modbus 직결 차단·DMZ conduit·default deny). Modbus 인증화 어려우니 분리가 핵심."
    verify:
      type: output_contains
      expect: OT_ISOLATED
      field: stdout

  - order: 5
    instruction: |
      ## 🎯 MISSION
      W12 발견(Modbus 무인증·위험 쓰기 명령·Purdue 분리)을 소견으로 정리한다. (정리: `rm -f /tmp/modbus_STU42.bin /tmp/purdue_fw_STU42.conf`)
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a concise note for Week 12 of an IoT security course on OT/SCADA Modbus security. Facts: parsing a Modbus/TCP capture showed the MBAP header has no authentication field (protocol id 0000, unit only), so anyone reaching port 502 can read and write (OT_PROTOCOL_WEAK); among read requests a Write Single Coil (FC05) forcing a coil to FF00 was detected, an unauthenticated actuator command (UNSAFE_COMMAND); a Purdue-model firewall config denied IT-to-OT Modbus and used a DMZ conduit with default deny (OT_ISOLATED). Explain that legacy OT protocols cannot easily add authentication, so defense relies on Purdue network segmentation, DMZ conduits, and an OT IDS that flags unexpected write commands. Begin with exactly the single word Assessment on its own first line.","stream":false,"options":{"num_predict":330}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ## 📋 확인 사항 — 첫머리에 `Assessment`
      ## 🔍 결과 해석 — 정상 첫 줄 `Assessment` / 비정상 `[형식 미준수 — 재실행]`

      ---
      **다음 주(W13) 예고** — 자동차 CAN 버스 보안(무인증·메시지 주입·SecOC).
    hint: "curl 로 gemma3 에 발견 넣어 요약, 첫 줄 Assessment 강제. 임시 파일 정리."
    category: report
    answer: |
      Assessment
      Parsing a Modbus/TCP capture showed the MBAP header has no authentication (protocol id 0000, unit
      only), so anyone reaching port 502 can read and write; a Write Single Coil (FC05) forcing a coil
      to FF00 was an unauthenticated actuator command. A Purdue firewall denied IT-to-OT Modbus with a
      DMZ conduit and default deny. Legacy OT protocols cannot easily add auth, so defense relies on
      network segmentation, DMZ conduits, and an OT IDS flagging unexpected writes.
    answer_detail: "W12 OT/SCADA 종합(Assessment): Modbus 무인증·위험 쓰기 탐지·Purdue 분리."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
