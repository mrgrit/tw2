lab_id: iot-security-week15
title: "W15 — 종합 평가: 전체 IoT 시스템 침투·표준 기반 방어·핵심 원칙 종합"
version: ai
course: iot-security
week: 15
description: |
  W01~W14 종합. 전체 IoT 시스템 4대 표면 종합 평가(FULL_IOT_PENTEST), 표준 기반 우선순위 방어
  (DEFENSE_SYNTHESIZED), IoT 보안 핵심 원칙 종합(SYNTHESIS), 최종 종합(Assessment).
  IoT는 가장 넓은 표면 — 4대 표면·Security by Design·생태계 분리·표준·물리 안전.
difficulty: hard
duration_minutes: 150
audience: IoT 보안 (15주차·종합)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W14 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "전체 IoT 시스템 종합 평가(FULL_IOT_PENTEST)"
  - "표준 기반 우선순위 방어(DEFENSE_SYNTHESIZED)"
  - "IoT 보안 핵심 원칙 종합(SYNTHESIS)"
  - "최종 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 전체 시스템 종합 평가 → FULL_IOT_PENTEST
      > **🎯 목표:** IoT 시스템(여러 장치+표면)을 종합 평가하고 경로를 구성.
      > **개념:** 전체 시스템 4대 표면 + 취약점 연결.
      ```bash
      # 스마트홈 전체를 4대 표면·공격 경로로 종합해 보고서 파일에 작성한다.
      cat > /tmp/fullpentest_STU42.txt <<'EOF'
      camera [device] : default creds + unauth RTSP
      hub    [network]: weak auth, flat network
      cloud  [cloud]  : API no rate limit
      app    [app]    : hardcoded token
      path: camera default creds -> lateral to hub (flat net) -> cloud API -> all devices
      EOF
      cat /tmp/fullpentest_STU42.txt
      # 4대 표면 + 3단계 이상 경로가 모두 있으면 전체 침투 종합 완료.
      M=""; for s in device network cloud app; do grep -q "\[$s\]" /tmp/fullpentest_STU42.txt || M=1; done
      { [ -z "$M" ] && grep -q "path:" /tmp/fullpentest_STU42.txt; } && echo FULL_IOT_PENTEST || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `FULL_IOT_PENTEST` (4대 표면 평가 + 카메라→허브→클라우드 경로).
      🔎 전체 시스템의 4대 표면을 점검하고 취약점을 연결해 경로(카메라→허브→클라우드)를 구성. 종합 능력.
    answer: |
      camera [device] : default creds + unauth RTSP
      hub    [network]: weak auth, flat network
      cloud  [cloud]  : API no rate limit
      app    [app]    : hardcoded token
      path: camera default creds -> lateral to hub (flat net) -> cloud API -> all devices
      FULL_IOT_PENTEST
    answer_detail: "전체 시스템 4대 표면 평가+공격 경로 → FULL_IOT_PENTEST."
    verify:
      type: output_contains
      expect: FULL_IOT_PENTEST
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 표준 기반 방어 종합 → DEFENSE_SYNTHESIZED
      > **🎯 목표:** OWASP/ETSI 표준 기반으로 우선순위 방어를 종합.
      > **개념:** 경로 차단+표준 준수를 우선순위로.
      ```bash
      # 표준(OWASP IoT)에 매핑한 다층 방어를 보고서 파일로 정리한다.
      cat > /tmp/defsynth_STU42.txt <<'EOF'
      device : 기본자격 제거·per-device 프로비저닝·보안부팅 (I1,I9,I10)
      network: TLS·인증·ACL·VLAN 분리 (I2,I7)
      cloud  : API 인증·레이트리밋·최소권한 (I2)
      app    : 토큰 안전 저장·핀닝 (I6)
      lifecycle: 안전한 OTA·취약점 공개 절차 (I4)
      EOF
      cat /tmp/defsynth_STU42.txt
      # device/network/cloud/app/lifecycle 5개 층을 모두 다루면 방어 종합 완료.
      M=""; for s in device network cloud app lifecycle; do grep -q "^$s" /tmp/defsynth_STU42.txt || M=1; done
      [ -z "$M" ] && echo DEFENSE_SYNTHESIZED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `DEFENSE_SYNTHESIZED` (기본 자격 제거 최우선, 표준 기반).
      🔎 기본 자격 제거(경로 차단+최고 위험+ETSI 표준)가 최우선. 모든 방어가 표준(OWASP/ETSI)에 매핑.
    answer: |
      device : 기본자격 제거·per-device 프로비저닝·보안부팅 (I1,I9,I10)
      network: TLS·인증·ACL·VLAN 분리 (I2,I7)
      cloud  : API 인증·레이트리밋·최소권한 (I2)
      app    : 토큰 안전 저장·핀닝 (I6)
      lifecycle: 안전한 OTA·취약점 공개 절차 (I4)
      DEFENSE_SYNTHESIZED
    answer_detail: "표준 기반 우선순위 방어(기본 자격 제거 최우선) → DEFENSE_SYNTHESIZED."
    verify:
      type: output_contains
      expect: DEFENSE_SYNTHESIZED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 핵심 원칙 종합 → SYNTHESIS
      > **🎯 목표:** IoT 보안 5대 원칙이 방어에 구현됐는지 확인.
      > **개념:** 4대 표면·Security by Design·생태계 분리·표준·물리 안전.
      ```bash
      # IoT 보안 핵심 원칙을 보고서 파일로 종합한다(과목 결론).
      cat > /tmp/synthesis_STU42.txt <<'EOF'
      1. IoT 는 device/network/cloud/app 4대 표면을 함께 가진다.
      2. 물리 접근(UART/펌웨어)·기본자격·평문 프로토콜이 반복되는 근본 약점.
      3. 방어는 표준(OWASP IoT Top10)+Security by Design+심층 방어.
      4. 하드코딩 비밀은 전 모델 공유라 치명적 → per-device 프로비저닝.
      EOF
      cat /tmp/synthesis_STU42.txt
      # 4대 표면·표준·심층 방어 키워드가 모두 있으면 종합 완료.
      grep -q "4대 표면" /tmp/synthesis_STU42.txt && grep -qE "OWASP|Security by Design" /tmp/synthesis_STU42.txt && grep -q "심층 방어" /tmp/synthesis_STU42.txt && echo SYNTHESIS || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `SYNTHESIS` (4대 표면·Security by Design·생태계 분리·표준·물리 안전 5대 원칙).
      🔎 IoT 보안=4대 표면 종합+설계 보안+생태계 분리+표준 준수+물리 안전. 과목의 결론.
    answer: |
      1. IoT 는 device/network/cloud/app 4대 표면을 함께 가진다.
      2. 물리 접근(UART/펌웨어)·기본자격·평문 프로토콜이 반복되는 근본 약점.
      3. 방어는 표준(OWASP IoT Top10)+Security by Design+심층 방어.
      4. 하드코딩 비밀은 전 모델 공유라 치명적 → per-device 프로비저닝.
      SYNTHESIS
    answer_detail: "IoT 보안 5대 원칙 종합 → SYNTHESIS. 과목 결론."
    verify:
      type: output_contains
      expect: SYNTHESIS
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone note for an IoT security course. Findings: a full smart-home system was assessed across all four surfaces with an attack path from camera to hub to cloud (FULL_IOT_PENTEST), standards-based defenses were prioritized with removing default credentials first (DEFENSE_SYNTHESIZED), and five principles (four surfaces, security by design, ecosystem segmentation, standards, physical safety) were confirmed (SYNTHESIS). Conclude that IoT is the widest attack surface, defense combines all four surfaces, security by design, segmentation, standards, and physical safety. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: IoT 침투 테스트=전체 시스템 4대 표면+경로+표준 방어. IoT는 가장 넓은 표면, 물리 안전까지. 수고했습니다.
      다음(autonomous-systems)은 자율 시스템 과목.
    answer: |
      Assessment
      A full IoT system was assessed across four surfaces with an attack path, and standards-based defenses were prioritized (default credentials first).
      IoT is the widest attack surface; defense combines four surfaces, security by design, ecosystem segmentation, standards, and physical safety.
    answer_detail: "W15 IoT 종합 평가(Assessment). 전체 시스템·표준 방어·5대 원칙."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
