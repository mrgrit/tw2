lab_id: iot-security-week04
title: "W04 — 펌웨어 분석: 하드코딩 비밀 추출·백도어 탐지·펌웨어 강화"
version: ai
course: iot-security
week: 4
description: |
  펌웨어 정적 분석. 모의 펌웨어에서 하드코딩 비밀 추출(SECRETS_FOUND), 백도어 계정 탐지(BACKDOOR_FOUND),
  비밀 제거·서명·고유 자격 강화(FIRMWARE_HARDENED), 종합(Assessment).
  펌웨어 문자열 분석은 el34에서 실제 수행. 하드코딩 비밀은 전 모델 공유라 치명적.
difficulty: medium
duration_minutes: 130
audience: IoT 보안 입문 (4주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W04 강의안 정독 — §0.5(펌웨어 분석·하드코딩 비밀·백도어)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "하드코딩 비밀 추출(SECRETS_FOUND)"
  - "백도어 계정 탐지(BACKDOOR_FOUND)"
  - "비밀 제거·서명·고유 자격 강화(FIRMWARE_HARDENED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 하드코딩 비밀 추출 → SECRETS_FOUND
      > **🎯 목표:** 모의 펌웨어에서 하드코딩된 비밀을 strings/정규식으로 추출.
      > **개념:** strings·grep만으로 많은 IoT 비밀이 드러난다.
      ```bash
      python3 - <<'PY'
      import re
      # 모의 펌웨어 이미지(바이너리 + 박힌 문자열)
      firmware=(b"\x7fELF...binary..." +
                b"http_server v1.2\x00admin_password=SuperSecret123\x00" +
                b"...\x00api_key=ak_live_9f8e7d6c5b4a3210\x00" +
                b"...\x00tls_cert=-----BEGIN PRIVATE KEY-----\x00config...")
      # strings 상당: 출력 가능 문자열 추출
      strings=re.findall(rb"[\x20-\x7e]{6,}", firmware)
      strings=[s.decode() for s in strings]
      # 비밀 패턴 grep
      SECRET_PAT=[re.compile(r"password=\S+"), re.compile(r"api_key=\S+"),
                  re.compile(r"PRIVATE KEY", re.I)]
      secrets=[s for s in strings if any(p.search(s) for p in SECRET_PAT)]
      for s in secrets: print("  secret:", s[:40])
      print("SECRETS_FOUND" if len(secrets)>=3 else "CLEAN")
      PY
      ```
      ✅ 마지막 줄 `SECRETS_FOUND` (하드코딩 비밀번호·API 키·개인 키 추출).
      🔎 strings로 펌웨어의 문자열을 뽑고 grep으로 비밀 패턴 검색. admin_password·api_key·PRIVATE KEY 노출.
    answer: |
      secret: admin_password=SuperSecret123
      secret: api_key=ak_live_9f8e7d6c5b4a3210
      secret: tls_cert=-----BEGIN PRIVATE KEY-----
      SECRETS_FOUND
    answer_detail: "모의 펌웨어에서 하드코딩 비밀 추출 → SECRETS_FOUND."
    verify:
      type: output_contains
      expect: SECRETS_FOUND
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 백도어 계정 탐지 → BACKDOOR_FOUND
      > **🎯 목표:** 펌웨어의 숨은(문서화 안 된) 백도어 계정을 탐지.
      > **개념:** 정상 계정 뒤에 숨은 관리자 통로.
      ```bash
      python3 - <<'PY'
      # 펌웨어에서 추출한 /etc/passwd 상당 + 문서화된 계정 목록
      passwd_entries=["root:x:0:0","admin:x:1000:1000","factory:x:0:0","daemon:x:2:2"]
      DOCUMENTED={"root","admin","daemon"}  # 문서에 있는 정상 계정
      # 문서에 없는 계정 + UID 0(루트 권한)이면 백도어 의심
      backdoors=[]
      for e in passwd_entries:
          user,_,uid,_=e.split(":")
          if user not in DOCUMENTED:
              risk="UID 0 (root!)" if uid=="0" else "undocumented"
              backdoors.append((user,risk))
      for u,r in backdoors: print(f"  backdoor account: {u} ({r})")
      # 'factory' 같은 미문서 루트 계정 = 백도어
      print("BACKDOOR_FOUND" if backdoors else "CLEAN")
      PY
      ```
      ✅ 마지막 줄 `BACKDOOR_FOUND` (문서화 안 된 factory 계정, UID 0 = 백도어).
      🔎 문서화된 정상 계정에 없는 'factory'가 UID 0(루트)로 존재 = 제조사 백도어. 정상 로그인 뒤 숨은 통로.
    answer: |
      backdoor account: factory (UID 0 (root!))
      BACKDOOR_FOUND
    answer_detail: "펌웨어의 미문서 루트 계정(factory) 탐지 → BACKDOOR_FOUND."
    verify:
      type: output_contains
      expect: BACKDOOR_FOUND
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 펌웨어 강화 → FIRMWARE_HARDENED
      > **🎯 목표:** 비밀 제거·장치별 고유 자격·서명·최소 구성으로 강화.
      > **개념:** 비밀을 애초에 안 넣으면 추출당해도 얻을 게 없다.
      ```bash
      python3 - <<'PY'
      def harden(fw):
          return {"hardcoded_secrets":[],                    # 비밀 제거
                  "credential_source":"per-device provisioning (secure element)",  # 장치별 고유
                  "backdoor_accounts":[],                    # 백도어 제거
                  "signed":True,"minimal_config":True}
      before={"hardcoded_secrets":["admin_password","api_key"],"backdoor_accounts":["factory"],"signed":False}
      after=harden(before)
      def vulnerable(fw):
          return bool(fw["hardcoded_secrets"]) or bool(fw.get("backdoor_accounts")) or not fw.get("signed")
      print("before vulnerable:", vulnerable(before))
      print("after vulnerable:", vulnerable(after), "(no secrets, per-device creds, no backdoor, signed)")
      print("FIRMWARE_HARDENED" if vulnerable(before) and not vulnerable(after) else "CHECK")
      PY
      ```
      ✅ 마지막 줄 `FIRMWARE_HARDENED` (비밀·백도어 제거+장치별 자격+서명).
      🔎 비밀 미포함+장치별 고유 자격+백도어 제거+펌웨어 서명+최소 구성. 추출당해도 얻을 게 없다.
    answer: |
      before vulnerable: True
      after vulnerable: False (no secrets, per-device creds, no backdoor, signed)
      FIRMWARE_HARDENED
    answer_detail: "비밀 제거·장치별 자격·백도어 제거·서명 강화 → FIRMWARE_HARDENED."
    verify:
      type: output_contains
      expect: FIRMWARE_HARDENED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W04 on IoT firmware analysis. Findings: hardcoded secrets (admin password, API key, private key) were extracted with strings/grep (SECRETS_FOUND), an undocumented root account named factory was found (BACKDOOR_FOUND), and removing secrets, using per-device credentials, deleting backdoors, and signing the firmware hardened it (FIRMWARE_HARDENED). Explain that hardcoded secrets are shared across all units so one dump compromises the whole model, and defense keeps secrets out of firmware with per-device provisioning and signing. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 펌웨어 정적 분석은 하드코딩 비밀·백도어를 드러낸다(전 모델 공유라 치명적). 비밀 미포함+고유 자격+서명으로 방어.
      다음 주(W05)는 **IoT 웹 인터페이스 공격**.
    answer: |
      Assessment
      Firmware static analysis reveals hardcoded secrets and backdoors; shared hardcoded secrets mean one dump compromises the whole model.
      Defense keeps secrets out of firmware via per-device provisioning, removes backdoors, and signs firmware.
    answer_detail: "W04 펌웨어 분석 종합(Assessment). 하드코딩 비밀·백도어·서명/고유 자격."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
