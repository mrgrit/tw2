      echo "① SBOM: 무엇이 들었나 명세화 → 취약점 추적(trivy/syft)"
      echo "② 핀고정(pinning): 버전+해시 고정(lock 파일) → 몰래 바뀐 의존성 차단"
      echo "③ 서명 검증: 패키지·이미지 서명(cosign/sigstore) 검증"
      echo "④ CI 스캔: trivy를 빌드에 통합 → 취약 의존성 자동 차단"
      echo "⑤ 최소 의존성·격리 빌드·CI 시크릿 보호·내부 레지스트리(의존성 혼동 차단)"
      echo "→ 원칙: '신뢰하되 검증'. 공급망은 가장 약한 고리만큼 안전 — 검증 없는 신뢰가 SolarWinds를 낳음"
      echo "defense_done"
    answer_detail: "공급망 방어 = SBOM·핀고정·서명검증·CI 스캔(trivy)·최소의존성·내부 레지스트리. '신뢰하되 검증' 원칙."
    verify:
      type: output_contains
