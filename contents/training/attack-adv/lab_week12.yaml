      echo "      ③ CI 시크릿 탈취 ④ 업데이트 서버 장악(서명된 악성 업데이트 배포)"
      echo "사례: SolarWinds(빌드 오염→18,000 고객), Codecov, XZ Utils 백도어"
      echo "→ 한 번의 빌드 오염 = 그 빌드를 받는 모든 고객 감염. 공급망 공격의 최대 파괴력"
