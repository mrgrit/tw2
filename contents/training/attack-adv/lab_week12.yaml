      ## 1. 의존성 표면·취약 의존성(SBOM/trivy)
      ## 2. 타이포스쿼팅·의존성혼동·빌드 오염
      ## 3. 서명 검증·SBOM 방어
      ```
      ## ✅ 합격 기준
      의존성분석 + 오염기법 + 방어 포함.
    hint: '의존성+오염+방어'
    category: report
    points: 14
    answer: |
      echo "=== 공급망 공격 보고서 — 실측 trivy 증거 기반 ==="
      mkdir -p /tmp/d12r && printf 'flask==0.5\nrequests==2.6.0\n' > /tmp/d12r/requirements.txt && T=$(trivy --quiet fs --scanners vuln /tmp/d12r 2>/dev/null | grep -iE "^Total|Total:" | head -1); rm -rf /tmp/d12r; echo "# 공격고급 W12 공급망 공격 보고서"; echo "## 1. 의존성 표면(전이 의존성)·취약 의존성(trivy 실탐: $T)"; echo "## 2. 타이포스쿼팅·의존성 혼동·빌드 오염(빌드 스크립트 주입 실증, SolarWinds형)"; echo "## 3. 방어: SBOM·핀고정·서명검증(cosign)·CI trivy 스캔·내부 레지스트리"; echo "## 결론: 신뢰의 연쇄 악용 — 방어는 '신뢰하되 검증'(SBOM+서명)"; echo supplychain_report_done
