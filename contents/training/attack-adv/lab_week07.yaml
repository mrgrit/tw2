week: 7
description: |
  공격 고급 W07 — C2(Command and Control) 인프라. 장악 호스트를 원격 통제하는 C2를 직접 구축·운용한다.
  모든 미션이 el34에서 실제 동작한다: HTTP C2 리스너 기동, 주기적 비콘 폴링, TLS 암호화 채널, 도메인
  프론팅(SNI≠Host 라우팅 실증), DNS 터널 유출(데이터를 DNS 라벨로 전송), 비콘 탐지(액세스 로그 분석).
