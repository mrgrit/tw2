lab_id: standalone-attack-adv-week02
title: "OSINT·수동 정찰 — 표적이 모르게 공격 표면을 그린다"
version: standalone-attack-adv
course: attack-adv
week: 2
description: |
  공격 고급 W02 — OSINT·수동 정찰. 능동 스캔(W01) 전에, 표적이 눈치채지 못하게 공개 정보로 공격 표면을
  그린다. DNS 열거·TLS 인증서·웹 기술 핑거프린팅·WAF 탐지·HTTP 헤더로 정보를 모은다. el34-attacker
  (dig·openssl·whatweb·wafw00f) 사용, 인가된 표적(el34-web)에. ⚠️ 인가된 실습만. 외부 정찰 금지.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W01(킬체인) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(수동 vs 능동) §3(정보원) §4(표면 매핑) 숙지"
objectives:
  - "수동 정찰(OSINT)과 능동 정찰의 차이·은밀성 이해"
  - "DNS·TLS·핑거프린팅·WAF 탐지로 정보 수집"
  - "수집 정보를 공격 표면 지도로 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## STEP 1 — OSINT 도구함을 확인한다 (수동 정찰)
      > **이 단계에서 할 일:** dig(DNS)·openssl(TLS)·whatweb(핑거프린팅)·wafw00f(WAF)·whois가 있는지 확인한다.
      > **왜:** 수동 정찰(OSINT)은 표적을 직접 건드리지 않고 공개 정보로 공격 표면을 그린다. 그 도구함을
      > 먼저 갖춘다. ⚠️ **인가된 el34 표적에만.**

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      command -v dig openssl whatweb wafw00f whois >/dev/null 2>&1 && echo osint_ready
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      osint_ready
      ```

      ### ▷ 결과 해석
      osint_ready가 보이면 도구함 준비 완료(el34-attacker엔 dig/openssl/whatweb/wafw00f/whois가 다 있다).
      이제 능동 스캔(W01) 없이도 DNS·TLS·헤더만으로 표적을 그린다 — '표적이 모르게'가 OSINT의 강점.
    hint: 'OSINT 도구'
    category: survey
    points: 10
    answer: |
      ssh att@192.168.0.202 '
        # OSINT 도구 가용 시 준비 마커
        command -v dig openssl whatweb wafw00f whois >/dev/null 2>&1 && echo osint_ready
      '
    answer_detail: "OSINT 도구 = dig(DNS)·openssl(TLS)·whatweb(핑거프린팅)·wafw00f(WAF)·whois. 수동 정찰 도구함."
    verify:
      type: output_contains
      expect: 'osint_ready'
      field: stdout
      semantic: {intent: "OSINT 도구", success_criteria: ["dig/openssl"], acceptable_methods: ["**[OSS] OSINT 도구 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## STEP 2 — DNS로 호스트 지도를 그린다
      > **이 단계에서 할 일:** 표적 호스트명을 IP로 해석한다(getent=/etc/hosts+DNS, dig=DNS A 레코드).
      > **왜:** DNS는 공격 표면의 지도다 — 호스트명·서브도메인·메일 서버를 드러낸다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      getent hosts dvwa.el34.lab
      dig +short dvwa.el34.lab
      echo "실무: 서브도메인 무차별(amass/subfinder)로 표면 확장"
      getent hosts dvwa.el34.lab >/dev/null 2>&1 && echo dns_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      10.20.30.1      dvwa.el34.lab
      실무: 서브도메인 무차별(amass/subfinder)로 표면 확장
      dns_done
      ```

      ### ▷ 결과 해석
      dvwa.el34.lab → 10.20.30.1로 해석됐다(여기선 /etc/hosts 기반이라 getent가 답하고 dig는 빈 줄).
      실전에선 amass/subfinder로 서브도메인을 무차별 열거해 'admin.·dev.·vpn.' 같은 숨은 표면을 확장한다.
    hint: 'DNS'
    category: manipulation
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # 호스트명 → IP 해석 (getent=/etc/hosts+DNS, dig=DNS)
        getent hosts dvwa.el34.lab
        dig +short dvwa.el34.lab
        echo "실무: 서브도메인 무차별(amass/subfinder)로 표면 확장"
        # 실제 해석되면 DNS 열거 마커
        getent hosts dvwa.el34.lab >/dev/null 2>&1 && echo dns_done
      '
    answer_detail: "DNS 열거 = getent/dig로 호스트·서브도메인·레코드 수집. 공격 표면 지도의 기초."
    verify:
      type: output_contains
      expect: 'dns_done'
      field: stdout
      semantic: {intent: "DNS", success_criteria: ["DNS 정보"], acceptable_methods: ["**[OSS] dig (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## STEP 3 — TLS 인증서에서 도메인 체계를 캔다
      > **이 단계에서 할 일:** 443에 연결해 인증서의 subject(CN)·issuer를 추출한다.
      > **왜:** 인증서의 CN·SAN은 조직명·도메인 체계를 노출한다 — 서브도메인 발견의 보고(寶庫)다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      CERT=$(echo | timeout 6 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab | openssl x509 -noout -subject -issuer)
      echo "$CERT"
      [ -n "$CERT" ] && echo cert_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      subject=CN = *.6v6.lab, O = 6v6, C = KR
      issuer=CN = *.6v6.lab, O = 6v6, C = KR
      cert_done
      ```

      ### ▷ 결과 해석
      와일드카드 인증서 `*.6v6.lab`(조직 6v6, 국가 KR)이 보인다 = 'el34.lab 외에 6v6.lab 도메인 체계도
      쓴다'는 단서. subject=issuer면 self-signed. 실전에선 CT(Certificate Transparency) 로그를 뒤져
      그 도메인의 모든 발급 인증서로 서브도메인을 더 찾는다.
    hint: 'TLS 인증서'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # 443 인증서 subject/issuer 추출
        CERT=$(echo | timeout 6 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab | openssl x509 -noout -subject -issuer)
        echo "$CERT"
        # 추출되면 마커
        [ -n "$CERT" ] && echo cert_done
      '
    answer_detail: "TLS 인증서 = CN/SAN으로 도메인 체계·조직 노출. CT 로그로 서브도메인 발견. 수동 정찰의 보고."
    verify:
      type: output_contains
      expect: 'cert_done'
      field: stdout
      semantic: {intent: "TLS 인증서", success_criteria: ["CN/issuer"], acceptable_methods: ["**[OSS] openssl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## STEP 4 — 웹 기술 스택을 핑거프린팅한다
      > **이 단계에서 할 일:** HTTP 헤더(Server/Set-Cookie)와 whatweb으로 서버·프레임워크·버전을 식별한다.
      > **왜:** 기술·버전을 알면 그 버전의 알려진 취약점(CVE)을 매핑할 수 있다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      echo -en "HEAD / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -iE "server|x-powered|set-cookie" | head
      whatweb -a 1 http://10.20.30.1/ --header "Host: dvwa.el34.lab" | head -c 200; echo
      echo -en "HEAD / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -qi "server" && echo fingerprint_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — whatweb 줄은 색상 코드가 섞여 보일 수 있음)
      ```
      Server: Apache/2.4.25 (Debian)
      Set-Cookie: PHPSESSID=...; path=/
      Set-Cookie: security=low
      http://10.20.30.1/ [403 Forbidden] Apache[2.4.52], HTTPServer[Ubuntu Linux]...
      fingerprint_done
      ```

      ### ▷ 결과 해석
      재미있는 단서: Server 헤더는 `Apache/2.4.25 (Debian)`(백엔드 dvwa 앱), whatweb은 `Apache 2.4.52
      Ubuntu`(앞단 ModSec 프록시)를 본다 = 2단 구조가 드러난다. `security=low` 쿠키는 dvwa 보안 레벨까지
      노출. 이 버전들로 CVE를 매핑해 공격 후보를 좁힌다.
    hint: '핑거프린팅'
    category: analysis
    points: 14
    answer: |
      ssh att@192.168.0.202 '
        # HTTP 헤더로 기술 스택 식별
        echo -en "HEAD / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -iE "server|x-powered|set-cookie" | head
        # whatweb 추가 식별
        whatweb -a 1 http://10.20.30.1/ --header "Host: dvwa.el34.lab" | head -c 200; echo
        # Server 헤더 응답 시 마커
        echo -en "HEAD / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -qi "server" && echo fingerprint_done
      '
    answer_detail: "핑거프린팅 = 서버 헤더·쿠키·whatweb로 기술/버전 식별. CVE 매핑으로 공격 후보 도출."
    verify:
      type: output_contains
      expect: 'fingerprint_done'
      field: stdout
      semantic: {intent: "핑거프린팅", success_criteria: ["기술 스택"], acceptable_methods: ["**[OSS] whatweb (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## STEP 5 — 공격 전에 방어(WAF)를 탐지한다
      > **이 단계에서 할 일:** wafw00f로 WAF 유무를 보고, 악성 요청(XSS)의 응답코드로 차단 여부를 확인한다.
      > **왜:** WAF가 있으면 단순 공격은 막힌다(W03 우회가 필요). 공격 전에 방어를 알면 전략이 선다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      wafw00f http://10.20.30.1/ | grep -iE "is behind|seems|No WAF|result" | head
      C=$(echo -en "GET /?x=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
      echo "malicious_req=$C"
      [ -n "$C" ] && echo waf_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      [*] The site http://10.20.30.1/ seems to be behind a WAF or some sort of security solution
      malicious_req=403
      waf_done
      ```

      ### ▷ 결과 해석
      wafw00f가 'WAF 뒤에 있는 것 같다'고 하고, XSS 악성 요청이 403으로 차단됐다 = 방어(ModSec WAF)가
      있다는 확증. 그래서 다음 주(W03)에서 인코딩·난독화 같은 우회 기법이 필요해진다. 방어를 알고 공격을 짠다.
    hint: 'WAF 탐지'
    category: analysis
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # wafw00f로 WAF 유무 확인
        wafw00f http://10.20.30.1/ | grep -iE "is behind|seems|No WAF|result" | head
        # 악성 요청 응답코드 (403=차단)
        C=$(echo -en "GET /?x=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')
        echo "malicious_req=$C"
        # 응답 받았으면 WAF 탐지 마커
        [ -n "$C" ] && echo waf_done
      '
    answer_detail: "WAF 탐지 = wafw00f·악성요청 응답코드로 방어 식별. 공격 전 방어 파악 → 우회 전략 수립."
    verify:
      type: output_contains
      expect: 'waf_done'
      field: stdout
      semantic: {intent: "WAF 탐지", success_criteria: ["방어 식별"], acceptable_methods: ["**[OSS] wafw00f (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## STEP 6 — 노출된 민감 파일·메타데이터를 찾는다
      > **이 단계에서 할 일:** robots.txt·.git/config·sitemap·README 같은 민감 파일의 응답코드를 점검한다.
      > **왜:** 숨기려는 정보가 역설적으로 노출되곤 한다 — robots.txt는 '숨길 경로'를 알려주고, .git이
      > 열려 있으면 소스가 통째로 유출된다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      c=$(echo -en "GET /robots.txt HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "robots.txt=$c"
      c=$(echo -en "GET /.git/config HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo ".git/config=$c"
      c=$(echo -en "GET /sitemap.xml HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "sitemap.xml=$c"
      c=$(echo -en "GET /README.md HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "README.md=$c"
      echo metadata_done
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 코드는 환경마다 다름)
      ```
      robots.txt=200
      .git/config=403
      sitemap.xml=404
      README.md=200
      metadata_done
      ```

      ### ▷ 결과 해석
      robots.txt=200(존재 — 그 안에 숨기려던 경로가 적혀 있다), README.md=200(버전·구조 단서),
      .git/config=403(WAF가 막음 — 안 막혔으면 소스 유출), sitemap=404(없음). 200인 파일이 곧 정보원이다.
    hint: '노출 경로'
    category: analysis
    points: 12
    answer: |
      ssh att@192.168.0.202 '
        # 민감 파일 후보 응답코드 점검(각 파일 한 줄씩)
        c=$(echo -en "GET /robots.txt HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "robots.txt=$c"
        c=$(echo -en "GET /.git/config HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo ".git/config=$c"
        c=$(echo -en "GET /sitemap.xml HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "sitemap.xml=$c"
        c=$(echo -en "GET /README.md HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'); echo "README.md=$c"
        # 점검했으면 마커
        echo metadata_done
      '
    answer_detail: "노출 경로 = robots.txt/.git/sitemap 점검. 숨기려는 정보가 역설적으로 노출되는 정보원."
    verify:
      type: output_contains
      expect: 'metadata_done'
      field: stdout
      semantic: {intent: "노출 경로", success_criteria: ["robots/.git"], acceptable_methods: ["**[OSS] nc (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## STEP 7 — 흩어진 정보를 '공격 표면 지도'로 종합한다
      > **이 단계에서 할 일:** 호스트·인증서·서버 헤더 세 데이터포인트를 실제로 수집해, 몇 개를 확보했는지 센다.
      > **왜:** 수동 정찰의 산출물은 흩어진 단서를 하나의 '공격 표면 지도'로 묶는 것이다.

      ### ▷ 그대로 입력

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      H=$(getent hosts dvwa.el34.lab | head -1); echo "호스트: ${H:-<없음>}"
      CN=$(echo | timeout 6 openssl s_client -connect 10.20.30.1:443 -servername dvwa.el34.lab | openssl x509 -noout -subject); echo "인증서: ${CN:-<없음>}"
      SRV=$(echo -en "HEAD / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | grep -i "^server:" | tr -d "\r"); echo "기술: ${SRV:-<없음>}"
      C=0; [ -n "$H" ] && C=$((C+1)); [ -n "$CN" ] && C=$((C+1)); [ -n "$SRV" ] && C=$((C+1))
      echo "수집 데이터포인트: $C/3"; [ "$C" -ge 2 ] && echo surface_mapped
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예)
      ```
      호스트: 10.20.30.1      dvwa.el34.lab
      인증서: subject=CN = *.6v6.lab, O = 6v6, C = KR
