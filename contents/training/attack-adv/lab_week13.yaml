lab_id: standalone-attack-adv-week13
title: "클라우드 공격 — IAM·메타데이터·스토리지·컨테이너 탈출 (개념+실점검)"
version: standalone-attack-adv
course: attack-adv
week: 13
description: |
  공격 고급 W13 — 클라우드 공격. ⚠️ el34는 온프렘(클라우드 아님)이라 IAM/스토리지는 '개념', 컨테이너 탈출은
  el34 Docker로 '실점검'한다. 메타데이터 SSRF(W04 연계)·IAM 오설정·스토리지 노출·컨테이너 탈출 벡터(권한/
  docker.sock/capabilities)를 다룬다. el34-attacker(컨테이너 내부 점검). ⚠️ 인가된 실습만. 외부 클라우드 금지.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W04(SSRF)·W06(권한상승) + cloud-container 트랙 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(IAM/메타데이터) §3(스토리지/컨테이너 탈출) §4(방어) 숙지"
objectives:
  - "클라우드 공격 표면(IAM·메타데이터·스토리지) 이해"
  - "컨테이너 탈출 벡터(권한·docker.sock·capabilities) 실점검"
  - "CSPM·최소권한 IAM·컨테이너 강화 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 환경 스코핑 (클라우드 vs 온프렘)
      ## 📖 개념 한 줄
      정직한 스코핑 — el34는 온프렘 Docker. IAM/스토리지는 개념, 컨테이너 탈출은 실점검.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'metadata=%{http_code}' --connect-timeout 3 http://169.254.169.254/ 2>/dev/null || echo 'metadata=unreachable(온프렘)'; echo; cat /proc/1/cgroup 2>/dev/null | head -1"; echo cloud_scoping_done
      ```
      ## ✅ 합격 기준
      환경(온프렘·컨테이너)이 스코핑되면(cloud_scoping_done) 통과.
    hint: '환경 스코핑'
    category: survey
    points: 10
    answer: |
      echo "=== 환경 스코핑(클라우드 vs 온프렘) ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w 'metadata=%{http_code}' --connect-timeout 3 http://169.254.169.254/ 2>/dev/null || echo 'metadata=unreachable(온프렘)'; echo; cat /proc/1/cgroup 2>/dev/null | head -1"; echo cloud_scoping_done
      echo "→ el34=온프렘 Docker(클라우드 메타데이터 없음). IAM/스토리지=개념, 컨테이너 탈출=실점검"
    answer_detail: "환경 스코핑 = 클라우드 메타데이터 도달성·컨테이너 여부 확인. el34는 온프렘 → IAM 개념+컨테이너 실점검."
    verify:
      type: output_contains
      expect: 'cloud_scoping_done'
      field: stdout
      semantic: {intent: "환경 스코핑", success_criteria: ["온프렘/컨테이너"], acceptable_methods: ["**[OSS] 스코핑 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 메타데이터 서비스 (IMDS) — SSRF 연계
      ## 📖 개념 한 줄
      클라우드 인스턴스의 169.254.169.254는 IAM 임시 자격을 노출 — SSRF(W04)의 최우선 표적.
      ## 💻 실행 명령
      ```bash
      echo "AWS: http://169.254.169.254/latest/meta-data/iam/security-credentials/<role> → 임시 키 탈취"
      echo "SSRF(W04)로 서버가 IMDS를 대신 요청하게 만들면 → IAM 자격 → 클라우드 장악(Capital One 사고)"
      echo imds_done
      ```
      ## ✅ 합격 기준
      IMDS·SSRF 연계가 정리되면(imds_done) 통과.
      ## 🔧 도구 풀이
      - IMDSv1은 인증 없이 응답(SSRF 취약). IMDSv2는 토큰 요구(완화). 메타데이터=클라우드 공격의 관문.
    hint: 'IMDS'
    category: manipulation
    points: 12
    answer: |
      echo "=== 메타데이터 서비스(IMDS) — SSRF 연계 ==="
      echo "AWS IMDS: http://169.254.169.254/latest/meta-data/iam/security-credentials/<role>"
      echo "→ SSRF(W04)로 서버가 IMDS를 대신 요청 → IAM 임시 키 탈취 → 클라우드 계정 장악(Capital One 2019)"
      echo "IMDSv1(인증 없음, SSRF 취약) vs IMDSv2(토큰 요구, 완화)"
      echo imds_done
    answer_detail: "IMDS = 169.254.169.254 IAM 자격 노출. SSRF(W04)로 탈취→클라우드 장악. IMDSv2가 완화책."
    verify:
      type: output_contains
      expect: 'imds_done'
      field: stdout
      semantic: {intent: "IMDS", success_criteria: ["169.254/IAM"], acceptable_methods: ["**[설명] IMDS (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IAM 오설정
      ## 💻 실행 명령
      ```bash
      echo "과한 권한(*:*)·신뢰정책 오설정·권한 상승 경로(iam:PassRole). 탈취 자격으로 권한 확장"
      ```
      ## ✅ 합격 기준
      IAM 오설정·권한 상승 개념이 정리되면 통과.
      ## 🔧 도구 풀이
      - 최소권한 위반(와일드카드)·교차계정 신뢰·privesc 경로(PassRole/AttachPolicy). ScoutSuite/pmapper 분석.
    hint: 'IAM 오설정'
    category: analysis
    points: 14
    answer: |
      echo "=== IAM 오설정 ==="
      echo "① 과한 권한: Action:* Resource:* (최소권한 위반) → 한 자격으로 전체 제어"
      echo "② 신뢰 정책 오설정: 교차 계정/외부 신뢰 → 외부자 역할 인수(AssumeRole)"
      echo "③ 권한 상승 경로: iam:PassRole·AttachUserPolicy → 저권한에서 관리자로"
      echo "분석 도구: ScoutSuite·pmapper·cloudsplaining (IAM 경로 그래프 — 클라우드판 BloodHound)"
      echo "→ 탈취한 IAM 자격(W04 IMDS)으로 권한 확장 → 클라우드 측면 이동/장악"
      echo "iam_done"
    answer_detail: "IAM 오설정 = 과한 권한·신뢰 오설정·privesc 경로(PassRole). ScoutSuite/pmapper로 분석. 클라우드판 권한상승."
    verify:
      type: output_contains
      expect: 'iam_done'
      field: stdout
      semantic: {intent: "IAM 오설정", success_criteria: ["과한 권한/PassRole"], acceptable_methods: ["**[설명] IAM (권장)**"]}
    target_vm: web

