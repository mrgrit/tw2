    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 컨테이너 탈출 벡터 점검 (실점검)
      ## 📖 개념 한 줄
      컨테이너가 호스트로 탈출 가능한지 점검 — 특권 모드·docker.sock·위험 capabilities.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo '== docker.sock =='; ls /var/run/docker.sock 2>/dev/null || echo 'none(탈출 불가)'; echo '== privileged(블록장치) =='; ls /dev | grep -cE 'sda|vda'; echo '== CapEff =='; grep CapEff /proc/self/status"; echo escape_check_done
      ```
      ## ✅ 합격 기준
      컨테이너 탈출 벡터가 점검되면(escape_check_done) 통과.
      ## 🔧 도구 풀이
      - docker.sock 마운트=호스트 제어. privileged=장치 접근. 위험 cap(SYS_ADMIN)=탈출. 없으면 잘 격리됨.
    hint: '탈출 벡터'
    category: analysis
    points: 14
    answer: |
      echo "=== 컨테이너 탈출 벡터 점검(실점검) ==="
      docker exec el34-attacker sh -c "echo '== docker.sock =='; ls /var/run/docker.sock 2>/dev/null || echo 'none(탈출 불가)'; echo '== privileged(블록장치) =='; ls /dev | grep -cE 'sda|vda'; echo '== CapEff =='; grep CapEff /proc/self/status"; echo escape_check_done
      echo "→ docker.sock 없음·블록장치 0·표준 cap = el34-attacker는 잘 격리(탈출 벡터 없음)"
      echo "→ 취약 시: docker.sock 마운트→호스트 제어, --privileged→장치 접근, CAP_SYS_ADMIN→탈출"
    answer_detail: "컨테이너 탈출 점검 = docker.sock/privileged/위험 cap 확인. el34-attacker는 잘 격리(벡터 없음). 취약 시 호스트 장악."
    verify:
      type: output_contains
      expect: 'escape_check_done'
      field: stdout
      semantic: {intent: "탈출 벡터", success_criteria: ["docker.sock/cap"], acceptable_methods: ["**[OSS] /proc 점검 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 컨테이너 → 호스트 탈출 기법
      ## 💻 실행 명령
      ```bash
      echo "탈출: docker.sock→호스트 컨테이너 생성·privileged→호스트 디스크 마운트·CAP_SYS_ADMIN/커널 취약점"
      ```
      ## ✅ 합격 기준
      컨테이너 탈출 기법이 정리되면 통과.
    hint: '탈출 기법'
    category: report
    points: 12
    answer: |
      echo "=== 컨테이너 → 호스트 탈출 기법 ==="
      echo "① docker.sock 마운트: docker -H unix:///var/run/docker.sock run -v /:/host → 호스트 FS 제어"
      echo "② --privileged: 호스트 장치 접근 → 디스크 마운트·커널 모듈 로드"
      echo "③ CAP_SYS_ADMIN/위험 cap: 네임스페이스·마운트 조작"
      echo "④ 커널 취약점: 컨테이너↔호스트 공유 커널(runc CVE-2019-5736 등)"
      echo "→ 컨테이너는 VM이 아니라 '격리된 프로세스' — 격리가 약하면 호스트로 탈출(cloud-container 트랙 연계)"
      echo "escape_done"
    answer_detail: "컨테이너 탈출 = docker.sock/privileged/위험cap/커널취약점으로 호스트 장악. 컨테이너=격리 프로세스(VM 아님)."
    verify:
      type: output_contains
      expect: 'escape_done'
      field: stdout
      semantic: {intent: "탈출 기법", success_criteria: ["docker.sock/privileged"], acceptable_methods: ["**[설명] 탈출 (권장)**"]}
    target_vm: web

