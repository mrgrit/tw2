prerequisites:
  - "attack-adv W04(SSRF)·W06(권한상승) + cloud-container 트랙 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(IAM/메타데이터) §3(스토리지/컨테이너 탈출) §4(방어) 숙지"
objectives:
