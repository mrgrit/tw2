  - "CSPM·최소권한·컨테이너 강화 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 환경 스코핑 (클라우드 vs 온프렘)
      **실습 의미:** 클라우드 메타데이터 도달성과 컨테이너 여부를 실제 확인해 환경을 스코핑한다 — el34는 온프렘이라 IMDS/IAM/스토리지는 프로브·아티팩트로, 컨테이너 탈출은 실점검으로 다룬다. **⚠️ 인가된 el34만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # IMDS(169.254.169.254) 도달성을 실제 프로브한다 (el34는 진짜 IMDS 없음 — 루트는 fw 포털 200, meta-data 404로 확증)
        C=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/ 2>/dev/null)
        echo "IMDS 루트 응답: ${C:-unreachable} (200이라도 진짜 IMDS 아닌 fw 경유 포털 — meta-data로 확증)"
        # 컨테이너 여부(cgroup) 확인
        echo "cgroup:"; cat /proc/1/cgroup 2>/dev/null | head -1
        # 환경 스코핑을 수행했으면 마커
        echo cloud_scoping_done
      '
      ```
      ## ✅ 합격 기준
      `cloud_scoping_done`(과 IMDS 도달/cgroup)이 출력되면 통과. **근거:** 출력은 IMDS 도달성과 컨테이너 여부를 실제 프로브했음을 뜻하며, 환경(클라우드/온프렘) 스코핑이 됐음을 의미한다.
    hint: '환경 스코핑'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # IMDS 도달성 실프로브
        C=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/ 2>/dev/null)
        echo "IMDS 루트 응답: ${C:-unreachable} (200이라도 진짜 IMDS 아닌 fw 경유 포털 — meta-data로 확증)"
        # 컨테이너 cgroup 확인
        echo "cgroup:"; cat /proc/1/cgroup 2>/dev/null | head -1
        # 스코핑 마커
        echo cloud_scoping_done
      '
    answer_detail: "환경 스코핑 = IMDS 도달성·컨테이너 여부 실확인. el34는 온프렘. 가짜 echo 아닌 실프로브."
    verify:
      type: output_contains
      expect: 'cloud_scoping_done'
      field: stdout
      semantic: {intent: "환경 스코핑", success_criteria: ["IMDS/컨테이너 실확인"], acceptable_methods: ["**[OSS] curl/proc (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 메타데이터(IMDS) 프로브 — SSRF 연계
      **실습 의미:** 169.254.169.254는 IAM 임시 자격을 노출하는 SSRF의 표적이다 — IMDS 엔드포인트를 실제 프로브하고, 클라우드면 SSRF(W04)로 IAM 자격을 탈취하는 연계를 정리한다(Capital One 2019).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # IMDS meta-data 엔드포인트를 실제 프로브한다 (IMDSv1=인증없음 취약, IMDSv2=토큰 완화)
        code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>/dev/null)
        echo "IMDS meta-data 도달: ${code:-unreachable} (404=메타데이터 서비스 없음 → el34는 실 IMDS/IAM 부재)"
        echo "클라우드선 SSRF(W04)로 IMDS→IAM 임시자격 탈취(Capital One 2019)"
        # IMDS 프로브를 수행했으면 마커
        echo imds_done
      '
      ```
      ## ✅ 합격 기준
      `imds_done`(과 IMDS 도달 코드)이 출력되면 통과. **근거:** 출력은 IMDS 엔드포인트를 실제 프로브했음을 뜻하며, SSRF→IMDS→IAM 자격 탈취 연계를 정리했음을 의미한다.
    hint: 'IMDS'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # IMDS meta-data 실프로브
        code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>/dev/null)
        echo "IMDS meta-data 도달: ${code:-unreachable} (404=메타데이터 서비스 없음 → el34는 실 IMDS/IAM 부재)"
        echo "클라우드선 SSRF(W04)로 IMDS→IAM 임시자격 탈취(Capital One 2019). IMDSv2=토큰 완화"
        # 프로브 마커
        echo imds_done
      '
    answer_detail: "IMDS = 169.254.169.254 실프로브+SSRF 연계. 가짜 echo 아닌 실프로브. IMDSv2가 완화책."
    verify:
      type: output_contains
      expect: 'imds_done'
      field: stdout
      semantic: {intent: "IMDS", success_criteria: ["IMDS 실프로브"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IAM 오설정 — 와일드카드 정책 탐지
      **실습 의미:** 과한 IAM 권한(Action:*)은 탈취한 자격의 권한을 확장시킨다 — 정책 JSON에서 와일드카드를 실제로 탐지한다(CSPM 핵심 점검, ScoutSuite/pmapper가 경로 분석).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 과한 IAM 권한(Action:*) 정책을 만들고 와일드카드를 실제 탐지한다
        printf "{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}\n" > /tmp/pol13.json
        echo "IAM 정책:"; cat /tmp/pol13.json
        # 와일드카드 권한이 탐지되면 최소권한 위반 표시 + 마커
        grep -q "\"Action\":\"\*\"" /tmp/pol13.json && echo "과한 권한(Action:*) 탐지 — 최소권한 위반" && echo iam_done
        rm -f /tmp/pol13.json
      '
      ```
      ## ✅ 합격 기준
      `iam_done`(과 와일드카드 탐지)이 출력되면 통과. **근거:** 마커는 정책 JSON에서 와일드카드(Action:*)가 실제 탐지될 때만 찍히므로, 최소권한 위반(과권한)을 실분석했음을 뜻한다.
    hint: 'IAM 오설정'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 과권한 IAM 정책 생성 + 와일드카드 탐지
        printf "{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}\n" > /tmp/pol13.json
        echo "IAM 정책:"; cat /tmp/pol13.json
        grep -q "\"Action\":\"\*\"" /tmp/pol13.json && echo "과한 권한(Action:*) 탐지 — 최소권한 위반" && echo iam_done
        rm -f /tmp/pol13.json
      '
    answer_detail: "IAM 오설정 = 정책 JSON의 와일드카드 권한 실탐지. 가짜 echo 아닌 실분석. CSPM의 핵심 점검."
    verify:
      type: output_contains
      expect: 'iam_done'
      field: stdout
      semantic: {intent: "IAM 오설정", success_criteria: ["와일드카드 실탐지"], acceptable_methods: ["**[OSS] 정책 분석 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 스토리지 노출 — 공개 버킷 탐지
      **실습 의미:** 공개(public-read) 버킷 설정은 데이터 노출의 대표 실수다 — 버킷 ACL에서 공개 설정을 실제로 탐지한다(설정 실수 하나가 대량 노출).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 공개(public-read) 버킷 ACL을 만들고 공개 설정을 실제 탐지한다
        printf "{\"acl\":\"public-read\",\"bucket\":\"company-backups\"}\n" > /tmp/s313.json
        echo "버킷 ACL:"; cat /tmp/s313.json
        # public-read가 탐지되면 데이터 노출 위험 + 마커
        grep -q "public-read" /tmp/s313.json && echo "공개 버킷(public-read) 탐지 — 데이터 노출 위험" && echo storage_done
        rm -f /tmp/s313.json
      '
      ```
      ## ✅ 합격 기준
      `storage_done`(과 공개 버킷 탐지)이 출력되면 통과. **근거:** 마커는 버킷 ACL에서 public-read가 실제 탐지될 때만 찍히므로, 공개 버킷(데이터 노출)을 실분석했음을 뜻한다.
    hint: '스토리지'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 공개 버킷 ACL 생성 + public-read 탐지
        printf "{\"acl\":\"public-read\",\"bucket\":\"company-backups\"}\n" > /tmp/s313.json
        echo "버킷 ACL:"; cat /tmp/s313.json
        grep -q "public-read" /tmp/s313.json && echo "공개 버킷(public-read) 탐지 — 데이터 노출 위험" && echo storage_done
        rm -f /tmp/s313.json
      '
    answer_detail: "스토리지 노출 = 버킷 ACL의 public-read 실탐지. 가짜 echo 아닌 실분석. 설정 실수가 대량 노출."
    verify:
      type: output_contains
      expect: 'storage_done'
      field: stdout
      semantic: {intent: "스토리지", success_criteria: ["공개 버킷 실탐지"], acceptable_methods: ["**[OSS] ACL 분석 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 컨테이너 탈출 벡터 점검 (실점검)
      **실습 의미:** 컨테이너→호스트 탈출 가능성을 점검한다 — docker.sock 마운트(호스트 제어)·privileged 장치 접근·위험 capabilities를 실제 확인한다(없으면 잘 격리됨).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 탈출 벡터①: docker.sock 마운트 여부 (있으면 호스트 제어)
        echo "== docker.sock =="; ls /var/run/docker.sock 2>/dev/null || echo "none(탈출 불가)"
        # 탈출 벡터②: privileged 블록장치 노출 여부
        echo "== privileged(블록장치) =="; ls /dev | grep -cE "sda|vda"
        # 탈출 벡터③: 유효 capabilities(CapEff)
        echo "== CapEff =="; grep CapEff /proc/self/status
        # 세 벡터를 실점검했으면 마커
        echo escape_check_done
      '
      ```
      ## ✅ 합격 기준
      `escape_check_done`(과 세 벡터 결과)이 출력되면 통과. **근거:** 출력은 docker.sock·privileged·capabilities 세 탈출 벡터를 실제 점검했음을 뜻하며, el34-attacker의 격리 수준을 판정했음을 의미한다.
    hint: '탈출 벡터'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # docker.sock 마운트 여부
        echo "== docker.sock =="; ls /var/run/docker.sock 2>/dev/null || echo "none(탈출 불가)"
        # privileged 블록장치 노출
        echo "== privileged(블록장치) =="; ls /dev | grep -cE "sda|vda"
        # 유효 capabilities
        echo "== CapEff =="; grep CapEff /proc/self/status
        # 실점검 마커
        echo escape_check_done
      '
    answer_detail: "컨테이너 탈출 점검 = docker.sock/privileged/cap 실확인. 가짜 echo 아닌 실점검. el34-attacker는 잘 격리."
    verify:
      type: output_contains
      expect: 'escape_check_done'
      field: stdout
      semantic: {intent: "탈출 벡터", success_criteria: ["docker.sock/cap 실점검"], acceptable_methods: ["**[OSS] /proc 점검 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 컨테이너 → 호스트 탈출 기법 (CapEff 디코드)
      **실습 의미:** 탈출은 권한(capabilities)에 달렸다 — 현재 CapEff를 디코드하고 docker.sock을 점검해 탈출 가능성을 실제 판정한다(컨테이너=공유 커널 격리 프로세스, VM 아님).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 현재 유효 capabilities(CapEff)를 디코드한다 (/proc/self/status는 탭 구분 → cut -f2)
        C=$(grep CapEff /proc/self/status | cut -f2); echo "CapEff=$C"
        echo "위험 탈출 경로: docker.sock→docker -v /:/host / --privileged→호스트 디스크 / CAP_SYS_ADMIN→마운트조작"
        # docker.sock 존재 여부로 탈출 가능성 판정
        ls /var/run/docker.sock 2>/dev/null && echo "docker.sock 존재(탈출 가능)" || echo "docker.sock 없음(탈출 차단)"
        # CapEff 디코드+docker.sock 점검을 수행했으면 마커
        [ -n "$C" ] && echo escape_done
      '
      ```
      ## ✅ 합격 기준
      `escape_done`(과 CapEff)이 출력되면 통과. **근거:** 마커는 CapEff를 실제 디코드하고 docker.sock을 점검했을 때만 찍히므로, 탈출 가능성을 실판정했음을 뜻한다.
    hint: '탈출 기법'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # CapEff 디코드 (탭 구분 cut -f2)
        C=$(grep CapEff /proc/self/status | cut -f2); echo "CapEff=$C"
        echo "위험 탈출 경로: docker.sock→docker -v /:/host / --privileged→호스트 디스크 / CAP_SYS_ADMIN→마운트조작"
        # docker.sock 점검으로 탈출 가능성 판정
        ls /var/run/docker.sock 2>/dev/null && echo "docker.sock 존재(탈출 가능)" || echo "docker.sock 없음(탈출 차단)"
        # 판정 수행 마커
        [ -n "$C" ] && echo escape_done
      '
    answer_detail: "탈출 기법 = CapEff 디코드(cut)+docker.sock 실점검으로 탈출 가능성 판정. 가짜 echo 아닌 실판정."
    verify:
      type: output_contains
      expect: 'escape_done'
      field: stdout
      semantic: {intent: "탈출 기법", success_criteria: ["CapEff/docker.sock 실점검"], acceptable_methods: ["**[OSS] /proc 점검 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 컨테이너 강화 posture 실점검
      **실습 의미:** 컨테이너 보안 자세(비root·docker.sock 미마운트·cap drop)를 실제로 점검한다 — 클라우드 방어는 최소권한 IAM·IMDSv2·CSPM·버킷 비공개와 함께 간다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        echo "컨테이너 강화 posture:"
        # capabilities 점검
        grep CapEff /proc/self/status
        # docker.sock 미마운트 여부 (양호/갭)
        ls /var/run/docker.sock 2>/dev/null && echo "docker.sock 노출(갭)" || echo "docker.sock 미마운트(양호)"
        # 비root 실행 여부 (양호/갭)
        id | grep -q "uid=0" && echo "root 실행(User 미설정)" || echo "비root 실행(양호)"
        # 강화 자세를 실점검했으면 마커
        echo defense_done
      '
      ```
      ## ✅ 합격 기준
      `defense_done`(과 posture 점검)이 출력되면 통과. **근거:** 출력은 컨테이너 강화 자세(cap/docker.sock/user)를 실제 점검했음을 뜻하며, 클라우드/컨테이너 방어 상태를 평가했음을 의미한다.
