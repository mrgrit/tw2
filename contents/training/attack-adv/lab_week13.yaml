lab_id: standalone-attack-adv-week13
title: "클라우드 공격 — IMDS·IAM·스토리지·컨테이너 탈출 (실관측)"
version: standalone-attack-adv
course: attack-adv
week: 13
description: |
  공격 고급 W13 — 클라우드 공격. ⚠️ el34는 온프렘이라 IMDS/IAM/스토리지는 실제 프로브·정책 아티팩트 분석으로,
  컨테이너 탈출은 el34 Docker로 실점검한다. 메타데이터 프로브·IAM 와일드카드 탐지·공개 버킷 탐지·컨테이너
  탈출 벡터(docker.sock/privileged/capabilities) 점검을 모두 실제 명령으로 수행한다. el34-attacker.
  ⚠️ 인가된 실습만. 외부 클라우드 금지.
difficulty: hard
