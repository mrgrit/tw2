      ## 💻 실행 명령
      ```bash
      echo "공개 버킷(S3)·잘못된 ACL·서명 URL 유출. 설정 실수 하나로 대량 데이터 공개 노출"
      ```
      ## ✅ 합격 기준
      스토리지 노출 개념이 정리되면 통과.
