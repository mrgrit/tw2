    category: analysis
    points: 12
    answer: |
      echo "=== 스토리지 노출 ==="
      echo "① 공개 버킷: S3/Blob을 public-read로 → 누구나 데이터 열람(설정 실수의 대표)"
      echo "② 잘못된 ACL/정책: authenticated-users(=모든 AWS 계정) 허용"
