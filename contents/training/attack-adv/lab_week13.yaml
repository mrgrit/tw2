lab_id: standalone-attack-adv-week13
title: "클라우드 공격 — IMDS·IAM·스토리지·컨테이너 탈출 (실관측)"
version: standalone-attack-adv
course: attack-adv
week: 13
description: |
  공격 고급 W13 — 클라우드 공격. ⚠️ el34는 온프렘이라 IMDS/IAM/스토리지는 실제 프로브·정책 아티팩트 분석으로,
  컨테이너 탈출은 el34 Docker로 실점검한다. 메타데이터 프로브·IAM 와일드카드 탐지·공개 버킷 탐지·컨테이너
  탈출 벡터(docker.sock/privileged/capabilities) 점검을 모두 실제 명령으로 수행한다. el34-attacker.
  ⚠️ 인가된 실습만. 외부 클라우드 금지.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W04(SSRF)·W06(권한상승) + cloud-container 트랙 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(IAM/메타데이터) §3(스토리지/컨테이너 탈출) §4(방어) 숙지"
objectives:
  - "IMDS 프로브·IAM 와일드카드·공개 버킷을 실제 탐지"
  - "컨테이너 탈출 벡터(docker.sock/privileged/cap)를 실점검"
  - "CSPM·최소권한·컨테이너 강화 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 환경 스코핑 (클라우드 vs 온프렘)
      ## 📖 개념 한 줄
      클라우드 메타데이터 도달성과 컨테이너 여부를 실제 확인해 환경을 스코핑한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'C=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/ 2>/dev/null); echo "IMDS 도달: ${C:-unreachable}(온프렘)"; cat /proc/1/cgroup 2>/dev/null | head -1; echo cloud_scoping_done'
      ```
      ## ✅ 합격 기준
      IMDS 도달성·컨테이너 여부를 실제 확인하면(cloud_scoping_done) 통과.
    hint: '환경 스코핑'
    category: survey
    points: 10
    answer: |
      echo "=== 환경 스코핑(클라우드 vs 온프렘) ==="
      docker exec el34-attacker sh -c 'C=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/ 2>/dev/null); echo "IMDS(169.254.169.254) 도달: ${C:-unreachable}(온프렘=없음)"; echo "cgroup:"; cat /proc/1/cgroup 2>/dev/null | head -1; echo cloud_scoping_done'
      echo "→ IMDS 도달성·컨테이너(cgroup) 실확인. el34=온프렘 → IMDS/IAM/스토리지는 프로브·아티팩트, 컨테이너 탈출은 실점검"
    answer_detail: "환경 스코핑 = IMDS 도달성·컨테이너 여부 실확인. el34는 온프렘. 가짜 echo 아닌 실프로브."
    verify:
      type: output_contains
      expect: 'cloud_scoping_done'
      field: stdout
      semantic: {intent: "환경 스코핑", success_criteria: ["IMDS/컨테이너 실확인"], acceptable_methods: ["**[OSS] curl/proc (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 메타데이터(IMDS) 프로브 — SSRF 연계
      ## 📖 개념 한 줄
      169.254.169.254는 IAM 임시 자격을 노출(SSRF의 표적). 실제 프로브해 도달성을 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>/dev/null); echo "IMDS meta-data 도달: ${code:-unreachable}"; echo "클라우드선 SSRF(W04)로 IMDS→IAM 임시자격 탈취(Capital One 2019)"; echo imds_done'
      ```
      ## ✅ 합격 기준
      IMDS 엔드포인트를 실제 프로브하고 SSRF 연계를 정리하면(imds_done) 통과.
      ## 🔧 도구 풀이
      - IMDSv1=인증 없음(SSRF 취약), IMDSv2=토큰 요구(완화). 메타데이터=클라우드 공격의 관문.
    hint: 'IMDS'
    category: manipulation
    points: 12
    answer: |
      echo "=== 메타데이터(IMDS) 프로브 — SSRF 연계 ==="
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://169.254.169.254/latest/meta-data/ 2>/dev/null); echo "IMDS meta-data 도달: ${code:-unreachable}(온프렘=없음)"; echo "클라우드선 SSRF(W04)로 IMDS→IAM 임시자격 탈취(Capital One 2019). IMDSv2=토큰 완화"; echo imds_done'
      echo "→ IMDS 엔드포인트 실프로브. 클라우드면 SSRF로 169.254.169.254→IAM 자격→계정 장악"
    answer_detail: "IMDS = 169.254.169.254 실프로브+SSRF 연계. 가짜 echo 아닌 실프로브. IMDSv2가 완화책."
    verify:
      type: output_contains
      expect: 'imds_done'
      field: stdout
      semantic: {intent: "IMDS", success_criteria: ["IMDS 실프로브"], acceptable_methods: ["**[OSS] curl (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IAM 오설정 — 와일드카드 정책 탐지
      ## 📖 개념 한 줄
      과한 IAM 권한(Action:*)을 정책 JSON에서 실제로 탐지한다(CSPM의 핵심 점검).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'printf "{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}\n" > /tmp/pol13.json; echo "IAM 정책:"; cat /tmp/pol13.json; grep -q "\"Action\":\"\*\"" /tmp/pol13.json && echo "과한 권한(Action:*) 탐지 — 최소권한 위반"; rm -f /tmp/pol13.json; echo iam_done'
      ```
      ## ✅ 합격 기준
      IAM 정책의 와일드카드 권한을 **실제 탐지**하면(iam_done) 통과.
      ## 🔧 도구 풀이
      - 과한 권한·신뢰 오설정·privesc 경로(PassRole). ScoutSuite/pmapper가 IAM 경로 분석(클라우드판 BloodHound).
    hint: 'IAM 오설정'
    category: analysis
    points: 14
    answer: |
      echo "=== IAM 오설정 — 와일드카드 정책 탐지 ==="
      docker exec el34-attacker sh -c 'printf "{\"Effect\":\"Allow\",\"Action\":\"*\",\"Resource\":\"*\"}\n" > /tmp/pol13.json; echo "IAM 정책:"; cat /tmp/pol13.json; grep -q "\"Action\":\"\*\"" /tmp/pol13.json && echo "과한 권한(Action:*) 탐지 — 최소권한 위반"; rm -f /tmp/pol13.json; echo iam_done'
      echo "→ IAM 정책 JSON에서 와일드카드(Action:*) 실탐지. 탈취한 자격이 과권한이면 권한 확장. ScoutSuite/pmapper로 경로 분석"
    answer_detail: "IAM 오설정 = 정책 JSON의 와일드카드 권한 실탐지. 가짜 echo 아닌 실분석. CSPM의 핵심 점검."
    verify:
      type: output_contains
      expect: 'iam_done'
      field: stdout
      semantic: {intent: "IAM 오설정", success_criteria: ["와일드카드 실탐지"], acceptable_methods: ["**[OSS] 정책 분석 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 스토리지 노출 — 공개 버킷 탐지
      ## 📖 개념 한 줄
      공개(public-read) 버킷 설정을 ACL에서 실제로 탐지한다(데이터 노출의 대표 실수).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'printf "{\"acl\":\"public-read\",\"bucket\":\"company-backups\"}\n" > /tmp/s313.json; echo "버킷 ACL:"; cat /tmp/s313.json; grep -q "public-read" /tmp/s313.json && echo "공개 버킷(public-read) 탐지 — 데이터 노출 위험"; rm -f /tmp/s313.json; echo storage_done'
      ```
      ## ✅ 합격 기준
      버킷 ACL의 공개 설정을 **실제 탐지**하면(storage_done) 통과.
      ## 🔧 도구 풀이
      - 공개 버킷·잘못된 ACL·키 유출(W02 .git 연계). CSPM/버킷 스캐너로 탐지. 설정 실수 하나가 대량 노출.
    hint: '스토리지'
    category: analysis
    points: 12
    answer: |
      echo "=== 스토리지 노출 — 공개 버킷 탐지 ==="
      docker exec el34-attacker sh -c 'printf "{\"acl\":\"public-read\",\"bucket\":\"company-backups\"}\n" > /tmp/s313.json; echo "버킷 ACL:"; cat /tmp/s313.json; grep -q "public-read" /tmp/s313.json && echo "공개 버킷(public-read) 탐지 — 데이터 노출 위험"; rm -f /tmp/s313.json; echo storage_done'
      echo "→ 버킷 ACL JSON에서 public-read 실탐지. 설정 실수 하나가 대량 데이터 노출. CSPM/버킷 스캐너로 탐지"
    answer_detail: "스토리지 노출 = 버킷 ACL의 public-read 실탐지. 가짜 echo 아닌 실분석. 설정 실수가 대량 노출."
    verify:
      type: output_contains
      expect: 'storage_done'
      field: stdout
      semantic: {intent: "스토리지", success_criteria: ["공개 버킷 실탐지"], acceptable_methods: ["**[OSS] ACL 분석 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 컨테이너 탈출 벡터 점검 (실점검)
      ## 📖 개념 한 줄
      컨테이너→호스트 탈출 가능성을 점검 — docker.sock·특권·위험 capabilities를 실제 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo "== docker.sock =="; ls /var/run/docker.sock 2>/dev/null || echo "none(탈출 불가)"; echo "== privileged(블록장치) =="; ls /dev | grep -cE "sda|vda"; echo "== CapEff =="; grep CapEff /proc/self/status; echo escape_check_done'
      ```
      ## ✅ 합격 기준
      탈출 벡터(docker.sock/특권/cap)를 **실제 점검**하면(escape_check_done) 통과.
      ## 🔧 도구 풀이
      - docker.sock 마운트=호스트 제어. privileged=장치 접근. 위험 cap(SYS_ADMIN)=탈출. 없으면 잘 격리됨.
    hint: '탈출 벡터'
    category: analysis
    points: 14
    answer: |
      echo "=== 컨테이너 탈출 벡터 점검(실점검) ==="
      docker exec el34-attacker sh -c 'echo "== docker.sock =="; ls /var/run/docker.sock 2>/dev/null || echo "none(탈출 불가)"; echo "== privileged(블록장치) =="; ls /dev | grep -cE "sda|vda"; echo "== CapEff =="; grep CapEff /proc/self/status; echo escape_check_done'
      echo "→ docker.sock 없음·블록장치 0·표준 cap = el34-attacker 잘 격리(탈출 벡터 없음). 취약 시 호스트 장악"
    answer_detail: "컨테이너 탈출 점검 = docker.sock/privileged/cap 실확인. 가짜 echo 아닌 실점검. el34-attacker는 잘 격리."
    verify:
      type: output_contains
      expect: 'escape_check_done'
      field: stdout
      semantic: {intent: "탈출 벡터", success_criteria: ["docker.sock/cap 실점검"], acceptable_methods: ["**[OSS] /proc 점검 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 컨테이너 → 호스트 탈출 기법 (CapEff 디코드)
      ## 📖 개념 한 줄
      탈출은 권한(capabilities)에 달렸다. 현재 CapEff를 디코드해 위험 권한 보유 여부를 실제 판정한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'C=$(grep CapEff /proc/self/status | awk "{print \$2}"); echo "CapEff=$C"; echo "위험 탈출 경로: docker.sock 마운트→docker -v /:/host / --privileged→호스트 디스크 / CAP_SYS_ADMIN→마운트조작"; ls /var/run/docker.sock 2>/dev/null && echo "docker.sock 존재(탈출 가능)" || echo "docker.sock 없음(탈출 차단)"; echo escape_done'
      ```
      ## ✅ 합격 기준
      CapEff 디코드 + docker.sock 점검으로 탈출 가능성을 **실제 판정**하면(escape_done) 통과.
      ## 🔧 도구 풀이
      - 컨테이너=공유 커널 격리 프로세스(VM 아님). docker.sock·privileged·CAP_SYS_ADMIN·커널취약점(runc CVE)이 탈출 경로.
    hint: '탈출 기법'
    category: report
    points: 12
    answer: |
      echo "=== 컨테이너 → 호스트 탈출 기법(CapEff 디코드) ==="
      docker exec el34-attacker sh -c 'C=$(grep CapEff /proc/self/status | awk "{print \$2}"); echo "CapEff=$C"; echo "위험 탈출 경로: docker.sock→docker -v /:/host / --privileged→호스트 디스크 / CAP_SYS_ADMIN→마운트조작"; ls /var/run/docker.sock 2>/dev/null && echo "docker.sock 존재(탈출 가능)" || echo "docker.sock 없음(탈출 차단)"; echo escape_done'
      echo "→ CapEff 실디코드+docker.sock 실점검으로 탈출 가능성 판정. 컨테이너=공유 커널 격리 프로세스(VM 아님)"
    answer_detail: "탈출 기법 = CapEff 디코드+docker.sock 실점검으로 탈출 가능성 판정. 가짜 echo 아닌 실판정."
    verify:
      type: output_contains
      expect: 'escape_done'
      field: stdout
      semantic: {intent: "탈출 기법", success_criteria: ["CapEff/docker.sock 실점검"], acceptable_methods: ["**[OSS] /proc 점검 (권장)**"]}
    target_vm: web

