lab_id: standalone-attack-adv-week08
title: "측면 이동 — 한 발판에서 네트워크 전체로"
version: standalone-attack-adv
course: attack-adv
week: 8
description: |
  공격 고급 W08 — 측면 이동(Lateral Movement). 한 호스트 발판에서 내부망 전체로 확산한다. 내부 정찰·자격
  재사용·피벗(터널)·Pass-the-Hash 개념을 다룬다. el34-attacker(내부망 10.20.30.0/24 위치)에서 실제 내부
  호스트(bastion·web·sysmon)를 정찰·이동 시도. ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W06(자격 수집)·W07(C2) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker(내부망 발판)"
  - "lecture §2(내부 정찰) §3(자격 재사용/피벗) §4(탐지) 숙지"
objectives:
  - "내부 정찰로 측면 이동 표적 발견"
  - "자격 재사용·피벗(터널)·Pass-the-Hash 이해"
  - "측면 이동 탐지(내부 인증·비정상 연결)와 분리 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 내부망 발판 확인
      **실습 의미:** 측면 이동의 출발점은 내부망에 있는 내 위치다 — 발판의 IP·서브넷·라우팅을 확인해 같은 서브넷의 다른 호스트(표적)를 파악한다. **⚠️ 인가된 el34 표적에만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 출발점 파악: 발판의 내부망 IP와 기본 라우팅을 확인한다 (이 서브넷의 다른 호스트가 표적)
      ip -4 addr show eth0 2>/dev/null | grep inet
      ip route 2>/dev/null | grep default
      # 내부망 위치를 확인했으면 마커
      ip -4 addr show eth0 2>/dev/null | grep -q inet && echo foothold_confirmed
      ```
      ## ✅ 합격 기준
      `foothold_confirmed`(과 IP·라우팅)이 출력되면 통과. **근거:** 마커는 발판의 내부망 IP를 실제 확인했을 때만 찍히므로, 측면 이동의 출발점(내부 위치)을 파악했음을 뜻한다.
    hint: '내부 발판'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 발판 내부 IP·라우팅 확인
        ip -4 addr show eth0 2>/dev/null | grep inet
        ip route 2>/dev/null | grep default
        # 내부 IP 확인 시 마커
        ip -4 addr show eth0 2>/dev/null | grep -q inet && echo foothold_confirmed
      '
    answer_detail: "내부 발판 = 침투한 호스트의 내부망 위치. 같은 서브넷의 호스트들이 측면 이동 대상."
    verify:
      type: output_contains
      expect: 'foothold_confirmed'
      field: stdout
      semantic: {intent: "내부 발판", success_criteria: ["내부 IP"], acceptable_methods: ["**[OSS] ip (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 내부 정찰 — 호스트 발견
      **실습 의미:** 외부에선 안 보이던 내부 호스트들을 발판에서 스캔한다 — ping sweep(-sn)으로 발판에서만 보이는 bastion·관리 서버·DB를 발견한다(외부 정찰 W02와 다른 그림).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 내부 정찰: 발판에서 내부 서브넷을 ping sweep(-sn)으로 스캔한다
      R=$(nmap -sn 10.20.30.0/24 2>/dev/null | grep -i "scan report")
      echo "$R" | head
      # 내부 호스트를 발견했으면 마커
      [ -n "$R" ] && echo internal_recon_done
      ```
      ## ✅ 합격 기준
      `internal_recon_done`(과 호스트 목록)이 출력되면 통과. **근거:** 마커는 ping sweep이 내부 호스트를 실제 발견했을 때만 찍히므로, 발판에서만 보이는 내부 지도를 그렸음을 뜻한다.
    hint: '내부 정찰'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 내부 서브넷 ping sweep
        R=$(nmap -sn 10.20.30.0/24 2>/dev/null | grep -i "scan report")
        echo "$R" | head
        # 호스트 발견 시 마커
        [ -n "$R" ] && echo internal_recon_done
      '
    answer_detail: "내부 정찰 = 발판에서 내부 서브넷 스캔. 외부에선 안 보이던 관리 서버·DB·bastion 발견."
    verify:
      type: output_contains
      expect: 'internal_recon_done'
      field: stdout
      semantic: {intent: "내부 정찰", success_criteria: ["내부 호스트"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 표적 포트·서비스 열거
      **실습 의미:** 발견한 내부 표적의 서비스(SSH 22·DB 3306/5432·Redis 6379)는 측면 이동 진입점이다 — 내부는 외부보다 방어가 느슨한 경우가 많다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 표적 서비스 열거: 내부 표적(.201 bastion, .1 web)의 주요 포트 개방 여부를 본다
      R=$(nmap -p 22,80,443,3306,5432,6379 --open 10.20.30.201 10.20.30.1 2>/dev/null | grep -E "Nmap scan|open" | head)
      echo "$R"
      # 서비스 열거를 수행했으면 마커
      echo services_enum_done
      ```
      ## ✅ 합격 기준
      `services_enum_done`(과 개방 서비스)이 출력되면 통과. **근거:** 출력은 내부 표적의 포트·서비스를 실제 열거했음을 뜻하며, 개방된 SSH/DB/Redis가 측면 이동 진입점이 된다.
    hint: '서비스 열거'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 내부 표적 주요 포트(SSH/DB/Redis) 개방 열거
        R=$(nmap -p 22,80,443,3306,5432,6379 --open 10.20.30.201 10.20.30.1 2>/dev/null | grep -E "Nmap scan|open" | head)
        echo "$R"
        # 열거 수행 마커
        echo services_enum_done
      '
    answer_detail: "서비스 열거 = 내부 표적의 SSH/DB/Redis 등 진입점. 내부는 외부보다 방어가 약한 경우가 많음."
    verify:
      type: output_contains
      expect: 'services_enum_done'
      field: stdout
      semantic: {intent: "서비스 열거", success_criteria: ["내부 서비스"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 자격 재사용 (credential reuse)
      **실습 의미:** W06에서 수집한 자격을 다른 내부 호스트에 재사용한다 — 비번 재사용·공유 계정이 측면 이동의 고속도로다(crackmapexec가 실무 자동화).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 자격 재사용: 수집 자격(SSH 키/비번)을 다른 내부 호스트(.201)에 적용 시도 (BatchMode=키/비번 없으면 즉시 거부)
      timeout 5 ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.20.30.201 "id" 2>&1 | head -2
      echo "(키/비번 없으면 거부 — 실무선 W06 수집 자격으로 인증, crackmapexec 자동화)"
      # 재사용 시도를 수행했으면 마커
      echo cred_reuse_done
      ```
      ## ✅ 합격 기준
      `cred_reuse_done`(과 시도 결과)이 출력되면 통과. **근거:** 출력은 다른 호스트에 자격 재사용을 실제 시도했음을 뜻하며, 비번 재사용·공유 계정이 통하면 즉시 확산으로 이어진다.
    hint: '자격 재사용'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 수집 자격을 다른 호스트(.201)에 재사용 시도 (BatchMode)
        timeout 5 ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.20.30.201 "id" 2>&1 | head -2
        echo "(키/비번 없으면 거부 — 실무선 W06 수집 자격으로 인증, crackmapexec 자동화)"
        # 시도 수행 마커
        echo cred_reuse_done
      '
    answer_detail: "자격 재사용 = 수집 자격(W06)을 다른 호스트에 적용. 비번 재사용·공유 계정이 확산 경로. crackmapexec 자동화."
    verify:
      type: output_contains
      expect: 'cred_reuse_done'
      field: stdout
      semantic: {intent: "자격 재사용", success_criteria: ["재사용 시도"], acceptable_methods: ["**[OSS] ssh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 피벗 (pivoting·터널)
      **실습 의미:** 직접 못 닿는 깊은 호스트를 장악한 중간 호스트(발판)를 경유지로 삼아 공격한다 — 발판에서 도달 가능한 호스트가 곧 피벗 경유지다(터널: SSH -L/-D·proxychains).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 피벗: 발판을 경유지로 내부 호스트(.201,.210) 도달성을 nc로 한 줄씩 실측한다 (도달 호스트=피벗 경유지)
      echo "발판 경유 내부 호스트 도달성(피벗 가능성):"
      OK=0
      if nc -z -w2 10.20.30.201 22 2>/dev/null || nc -z -w2 10.20.30.201 80 2>/dev/null; then echo "  10.20.30.201 도달(피벗 경유지)"; OK=$((OK+1)); fi
      if nc -z -w2 10.20.30.210 22 2>/dev/null || nc -z -w2 10.20.30.210 80 2>/dev/null; then echo "  10.20.30.210 도달(피벗 경유지)"; OK=$((OK+1)); fi
      echo "터널 예: ssh -L 9999:DEEP:3306 user@PIVOT / ssh -D 1080 + proxychains"
      # 내부 호스트에 1개 이상 실제 도달했으면 피벗 마커
      [ "$OK" -ge 1 ] && echo pivot_done
      ```
      ## ✅ 합격 기준
      `pivot_done`(과 도달 호스트)이 출력되면 통과. **근거:** 마커는 발판에서 내부 호스트에 실제 1개 이상 도달했을 때만 찍히므로, 피벗 경유지를 확보했음을 뜻한다.
    hint: '피벗'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 발판 경유 내부 호스트 도달성 nc 실측
        echo "발판 경유 내부 호스트 도달성(피벗 가능성):"
        OK=0
        if nc -z -w2 10.20.30.201 22 2>/dev/null || nc -z -w2 10.20.30.201 80 2>/dev/null; then echo "  10.20.30.201 도달(피벗 경유지)"; OK=$((OK+1)); fi
        if nc -z -w2 10.20.30.210 22 2>/dev/null || nc -z -w2 10.20.30.210 80 2>/dev/null; then echo "  10.20.30.210 도달(피벗 경유지)"; OK=$((OK+1)); fi
        echo "터널 예: ssh -L 9999:DEEP:3306 user@PIVOT / ssh -D 1080 + proxychains"
        # 1개 이상 도달 시 피벗 마커
        [ "$OK" -ge 1 ] && echo pivot_done
      '
    answer_detail: "피벗 = 발판 경유 내부 호스트 도달성 실측(nc). 가짜 echo 아닌 실증. 도달 호스트가 피벗 경유지."
    verify:
      type: output_contains
      expect: 'pivot_done'
      field: stdout
      semantic: {intent: "피벗", success_criteria: ["터널/경유"], acceptable_methods: ["**[설명] 피벗 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 Pass-the-Hash·티켓 (해시 인증)
      **실습 의미:** PtH는 평문 비번 없이 해시로 인증한다(Windows NTLM) — el34는 Linux라 SSH 키 재사용이 대응이다. 자격 해시 아티팩트를 만들고 SSH 키 재사용을 헌팅한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # SSH 키 재사용 헌팅: 시스템에서 개인키(id_rsa/id_ed25519)를 찾는다 (다른 호스트 인증에 재사용)
      echo "SSH 키 재사용 헌팅:"; find / -name id_rsa -o -name id_ed25519 2>/dev/null | head -3 || true
      # 자격 해시 생성: PtH는 평문 아닌 이 해시로 인증한다 (awk 회피: cut 사용)
      H=$(echo -n "P@ssw0rd123" | md5sum | cut -d" " -f1); echo "  해시: $H"
      # 해시 아티팩트가 실제 생성됐으면 마커
      echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo pth_done
      ```
      ## ✅ 합격 기준
      `pth_done`(과 해시)이 출력되면 통과. **근거:** 마커는 자격 해시(32자리 16진수) 아티팩트가 실제 생성됐을 때만 찍히므로, 평문 없이 해시로 인증하는 PtH 원리(el34는 SSH 키 대응)를 실증했음을 뜻한다.
    hint: 'PtH/PtT'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # SSH 키 재사용 헌팅
        echo "SSH 키 재사용 헌팅:"; find / -name id_rsa -o -name id_ed25519 2>/dev/null | head -3 || true
        # 자격 해시 생성 (cut으로 awk 회피)
        H=$(echo -n "P@ssw0rd123" | md5sum | cut -d" " -f1); echo "  해시: $H"
        # 32자리 16진수 해시 생성됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo pth_done
      '
    answer_detail: "PtH = 자격 해시 아티팩트 실생성(cut)+SSH키 헌팅. 가짜 echo 아닌 실증. 해시로 인증(평문 불필요)이 핵심."
    verify:
      type: output_contains
      expect: 'pth_done'
      field: stdout
      semantic: {intent: "PtH/PtT", success_criteria: ["해시/티켓"], acceptable_methods: ["**[설명] PtH (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 탐지·방어 — 측면 이동 차단
      **실습 의미:** 발판에서 도달 가능한 내부 호스트가 많을수록 평평한 망(측면이동 쉬움=갭)이다 — 망 분리 수준을 실측하고, 망분리·MFA·고유자격이 측면이동의 천적임을 이해한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 망 분리 점검: 발판에서 여러 내부 호스트의 SSH(22) 도달성을 한 줄씩 실측한다 (도달 많으면 평평한 망=갭)
      echo "망 분리 점검(도달 가능 내부 호스트=평평한 망이면 갭):"
      R=0
      nc -z -w1 10.20.30.1 22 2>/dev/null && { echo "  .1:22 도달"; R=$((R+1)); }
      nc -z -w1 10.20.30.201 22 2>/dev/null && { echo "  .201:22 도달"; R=$((R+1)); }
      nc -z -w1 10.20.30.210 22 2>/dev/null && { echo "  .210:22 도달"; R=$((R+1)); }
      nc -z -w1 10.20.30.254 22 2>/dev/null && { echo "  .254:22 도달"; R=$((R+1)); }
      echo "발판에서 SSH 도달 가능 호스트: ${R}개"
      echo "방어: 망분리·MFA·고유자격이 측면이동 천적"
      # 망 분리 점검(도달성 실측)을 수행했으면 방어 마커
      echo defense_done
      ```
      ## ✅ 합격 기준
