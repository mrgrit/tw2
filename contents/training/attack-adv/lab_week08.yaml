lab_id: standalone-attack-adv-week08
title: "측면 이동 — 한 발판에서 네트워크 전체로"
version: standalone-attack-adv
course: attack-adv
week: 8
description: |
  공격 고급 W08 — 측면 이동(Lateral Movement). 한 호스트 발판에서 내부망 전체로 확산한다. 내부 정찰·자격
  재사용·피벗(터널)·Pass-the-Hash 개념을 다룬다. el34-attacker(내부망 10.20.30.0/24 위치)에서 실제 내부
  호스트(bastion·web·sysmon)를 정찰·이동 시도. ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W06(자격 수집)·W07(C2) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker(내부망 발판)"
  - "lecture §2(내부 정찰) §3(자격 재사용/피벗) §4(탐지) 숙지"
objectives:
  - "내부 정찰로 측면 이동 표적 발견"
  - "자격 재사용·피벗(터널)·Pass-the-Hash 이해"
  - "측면 이동 탐지(내부 인증·비정상 연결)와 분리 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 내부망 발판 확인
      ## 📖 개념 한 줄
      측면 이동의 출발점 = 내부망에 있는 내 위치. 내 IP·서브넷·라우팅을 확인한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "ip -4 addr show eth0 2>/dev/null | grep inet; ip route 2>/dev/null | grep default"; echo foothold_confirmed
      ```
      ## ✅ 합격 기준
      내부망 위치가 확인되면(foothold_confirmed) 통과.
    hint: '내부 발판'
    category: survey
    points: 10
    answer: |
      echo "=== 내부망 발판 확인 ==="
      docker exec el34-attacker sh -c "ip -4 addr show eth0 2>/dev/null | grep inet; ip route 2>/dev/null | grep default"; echo foothold_confirmed
      echo "→ 발판 위치(10.20.30.202/24). 이 서브넷의 다른 호스트가 측면 이동 표적"
    answer_detail: "내부 발판 = 침투한 호스트의 내부망 위치. 같은 서브넷의 호스트들이 측면 이동 대상."
    verify:
      type: output_contains
      expect: 'foothold_confirmed'
      field: stdout
      semantic: {intent: "내부 발판", success_criteria: ["내부 IP"], acceptable_methods: ["**[OSS] ip (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 내부 정찰 — 호스트 발견
      ## 📖 개념 한 줄
      외부에선 안 보이던 내부 호스트들을 발판에서 스캔한다(ping sweep).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nmap -sn 10.20.30.0/24 2>/dev/null | grep -i 'scan report' | head"; echo internal_recon_done
      ```
      ## ✅ 합격 기준
      내부 호스트가 발견되면(internal_recon_done) 통과.
      ## 🔧 도구 풀이
      - 내부 정찰: 발판에서만 보이는 호스트(bastion·관리 서버·DB). 외부 정찰(W02)과 전혀 다른 그림.
    hint: '내부 정찰'
    category: manipulation
    points: 12
    answer: |
      echo "=== 내부 정찰: 호스트 발견 ==="
      docker exec el34-attacker sh -c "nmap -sn 10.20.30.0/24 2>/dev/null | grep -i 'scan report' | head"; echo internal_recon_done
      echo "→ 발판에서만 보이는 내부 호스트(bastion .201·web .1·sysmon .210). 외부 정찰과 다른 내부 지도"
    answer_detail: "내부 정찰 = 발판에서 내부 서브넷 스캔. 외부에선 안 보이던 관리 서버·DB·bastion 발견."
    verify:
      type: output_contains
      expect: 'internal_recon_done'
      field: stdout
      semantic: {intent: "내부 정찰", success_criteria: ["내부 호스트"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 표적 포트·서비스 열거
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nmap -p 22,80,443,3306,5432,6379 --open 10.20.30.201 10.20.30.1 2>/dev/null | grep -E 'Nmap scan|open' | head"; echo services_enum_done
      ```
      ## ✅ 합격 기준
      내부 표적의 서비스가 열거되면(services_enum_done) 통과.
      ## 🔧 도구 풀이
      - 내부 서비스(SSH 22·DB 3306/5432·Redis 6379)는 측면 이동 진입점. 내부는 방어가 약한 경우 많음.
    hint: '서비스 열거'
    category: analysis
    points: 14
    answer: |
      echo "=== 표적 포트·서비스 열거 ==="
      docker exec el34-attacker sh -c "nmap -p 22,80,443,3306,5432,6379 --open 10.20.30.201 10.20.30.1 2>/dev/null | grep -E 'Nmap scan|open' | head"; echo services_enum_done
      echo "→ SSH(22)·DB(3306/5432)·Redis(6379) 등 내부 서비스 = 측면 이동 진입점. 내부는 종종 방어가 느슨"
    answer_detail: "서비스 열거 = 내부 표적의 SSH/DB/Redis 등 진입점. 내부는 외부보다 방어가 약한 경우가 많음."
    verify:
      type: output_contains
      expect: 'services_enum_done'
      field: stdout
      semantic: {intent: "서비스 열거", success_criteria: ["내부 서비스"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 자격 재사용 (credential reuse)
      ## 📖 개념 한 줄
      W06에서 수집한 자격을 다른 내부 호스트에 재사용한다 — 비번 재사용이 측면 이동의 고속도로.
      ## 💻 실행 명령 (재사용 시도)
      ```bash
      docker exec el34-attacker sh -c "timeout 5 ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.20.30.201 'id' 2>&1 | head -2; echo '(키/비번 없으면 거부 — 실무선 수집 자격으로 인증)'"; echo cred_reuse_done
      ```
      ## ✅ 합격 기준
      자격 재사용 시도가 수행되면(cred_reuse_done) 통과.
      ## 🔧 도구 풀이
      - 재사용: 한 호스트의 자격이 다른 호스트에도 통하면(공유 계정·비번 재사용) 즉시 확산. crackmapexec 자동화.
    hint: '자격 재사용'
    category: analysis
    points: 14
    answer: |
      echo "=== 자격 재사용(credential reuse) ==="
      docker exec el34-attacker sh -c "timeout 5 ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.20.30.201 'id' 2>&1 | head -2; echo '(키/비번 없으면 거부 — 실무선 W06 수집 자격으로 인증)'"; echo cred_reuse_done
      echo "→ W06 수집 자격(비번/SSH키)을 다른 호스트에 재사용. 비번 재사용·공유 계정이 확산 고속도로. crackmapexec 자동화"
    answer_detail: "자격 재사용 = 수집 자격(W06)을 다른 호스트에 적용. 비번 재사용·공유 계정이 확산 경로. crackmapexec 자동화."
    verify:
      type: output_contains
      expect: 'cred_reuse_done'
      field: stdout
      semantic: {intent: "자격 재사용", success_criteria: ["재사용 시도"], acceptable_methods: ["**[OSS] ssh (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 피벗 (pivoting·터널)
      ## 📖 개념 한 줄
      직접 못 닿는 깊은 호스트를, 장악한 중간 호스트를 거쳐(터널) 공격한다.
      ## 💻 실행 명령 (발판을 경유지로 내부 호스트 도달성 실측)
      ```bash
      docker exec el34-attacker sh -c 'echo "발판 경유 내부 호스트 도달성(피벗 가능성):"; OK=0; for h in 201 210; do if nc -z -w2 10.20.30.$h 22 2>/dev/null || nc -z -w2 10.20.30.$h 80 2>/dev/null; then echo "  10.20.30.$h 도달(피벗 경유지)"; OK=$((OK+1)); fi; done; echo "터널 예: ssh -L 9999:DEEP:3306 user@PIVOT / ssh -D 1080 + proxychains"; [ "$OK" -ge 1 ] && echo pivot_done'
      ```
      ## ✅ 합격 기준
      발판에서 내부 호스트에 **실제 도달**해 피벗 경유지 확보를 입증해야(pivot_done) 통과.
      ## 🔧 도구 풀이
      - 피벗: 발판을 경유지로. 도달 가능 호스트가 곧 피벗 경유지. 터널 도구 SSH -L/-D·proxychains·chisel·ligolo.
    hint: '피벗'
    category: analysis
    points: 12
    answer: |
      echo "=== 피벗(pivoting·터널) — 도달성 실측 ==="
      docker exec el34-attacker sh -c 'echo "발판 경유 내부 호스트 도달성(피벗 가능성):"; OK=0; for h in 201 210; do if nc -z -w2 10.20.30.$h 22 2>/dev/null || nc -z -w2 10.20.30.$h 80 2>/dev/null; then echo "  10.20.30.$h 도달(피벗 경유지)"; OK=$((OK+1)); fi; done; echo "터널 예: ssh -L 9999:DEEP:3306 user@PIVOT / ssh -D 1080 + proxychains"; [ "$OK" -ge 1 ] && echo pivot_done'
      echo "→ 발판에서 내부 호스트 실제 도달 확인(nc 게이트)=피벗 경유지 확보. SSH -L/-D·proxychains로 분리망 우회"
    answer_detail: "피벗 = 발판 경유 내부 호스트 도달성 실측(nc). 가짜 echo 아닌 실증. 도달 호스트가 피벗 경유지."
    verify:
      type: output_contains
      expect: 'pivot_done'
      field: stdout
      semantic: {intent: "피벗", success_criteria: ["터널/경유"], acceptable_methods: ["**[설명] 피벗 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 Pass-the-Hash·티켓 (Windows/AD 개념)
      ## 💻 실행 명령
      ## 💻 실행 명령 (해시 기반 인증 아티팩트 + SSH 키 재사용 헌팅)
      ```bash
      docker exec el34-attacker sh -c 'echo "SSH 키 재사용 헌팅:"; find / -name id_rsa -o -name id_ed25519 2>/dev/null | head -3 || true; echo "자격 해시(PtH는 평문 아닌 이 해시로 인증):"; H=$(echo -n "P@ssw0rd123" | md5sum | awk "{print \$1}"); echo "  해시: $H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo pth_done'
      ```
      ## ✅ 합격 기준
      자격 해시 아티팩트를 **실제 생성**하고 SSH 키 재사용을 헌팅해야(pth_done) 통과.
      ## 🔧 도구 풀이
      - PtH=평문 없이 해시로 인증(Windows NTLM). el34는 Linux→SSH 키 재사용이 대응. 해시/티켓이 AD 측면 이동 핵심(mimikatz/impacket).
    hint: 'PtH/PtT'
    category: report
    points: 12
    answer: |
      echo "=== Pass-the-Hash·티켓 — 해시 아티팩트 실생성 ==="
      docker exec el34-attacker sh -c 'echo "SSH 키 재사용 헌팅:"; find / -name id_rsa -o -name id_ed25519 2>/dev/null | head -3 || true; echo "자격 해시(PtH는 평문 아닌 이 해시로 인증):"; H=$(echo -n "P@ssw0rd123" | md5sum | awk "{print \$1}"); echo "  해시: $H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo pth_done'
      echo "→ 자격 해시를 실제 생성(PtH는 이 해시로 인증, 평문 불필요)+SSH 키 재사용 헌팅. Windows는 NTLM/Kerberos 티켓, el34는 SSH 키 대응"
    answer_detail: "PtH = 자격 해시 아티팩트 실생성+SSH키 헌팅. 가짜 echo 아닌 실증. 해시로 인증(평문 불필요)이 핵심."
    verify:
      type: output_contains
      expect: 'pth_done'
      field: stdout
      semantic: {intent: "PtH/PtT", success_criteria: ["해시/티켓"], acceptable_methods: ["**[설명] PtH (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 탐지·방어 — 측면 이동 차단
      ## 💻 실행 명령 (망 분리 점검 — 도달 가능 내부 호스트 실측)
      ```bash
      docker exec el34-attacker sh -c 'echo "망 분리 점검(도달 가능 내부 호스트=평평한 망이면 갭):"; R=0; for h in 1 201 210 254; do nc -z -w1 10.20.30.$h 22 2>/dev/null && { echo "  .$h:22 도달"; R=$((R+1)); }; done; echo "발판에서 SSH 도달 가능 호스트: $R개"; echo "방어: 망분리·MFA·고유자격이 측면이동 천적"; echo defense_done'
      ```
      ## ✅ 합격 기준
      발판에서 도달 가능한 내부 호스트를 **실제 점검**해 망 분리 수준을 평가해야(defense_done) 통과.
      ## 🔧 도구 풀이
      - 도달 가능 호스트가 많을수록 평평한 망(측면이동 쉬움=갭). 방어: 망 분리·MFA(재사용 무력화)·고유 자격(LAPS). 탐지: 비정상 내부 인증.
    hint: '탐지/방어'
    category: report
    points: 12
    answer: |
      echo "=== 탐지·방어: 망 분리 점검 실측 ==="
      docker exec el34-attacker sh -c 'echo "망 분리 점검(도달 가능 내부 호스트=평평한 망이면 갭):"; R=0; for h in 1 201 210 254; do nc -z -w1 10.20.30.$h 22 2>/dev/null && { echo "  .$h:22 도달"; R=$((R+1)); }; done; echo "발판에서 SSH 도달 가능 호스트: $R개"; echo "방어: 망분리·MFA·고유자격이 측면이동 천적"; echo defense_done'
      echo "→ 발판에서 도달 가능 호스트를 실측(많으면 평평한 망=갭). 망분리+고유자격+MFA가 측면이동 천적"
    answer_detail: "탐지/방어 = 도달 가능 내부 호스트 실측으로 망 분리 평가. 가짜 echo 아닌 실점검. 망분리+고유자격이 천적."
    verify:
      type: output_contains
      expect: 'defense_done'
      field: stdout
      semantic: {intent: "탐지/방어", success_criteria: ["망분리/MFA"], acceptable_methods: ["**[관리적] 방어 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 측면 이동 보고서
      ## 💻 보고서 양식
      ```markdown
      # 공격고급 W08 측면 이동 보고서 (학번, 이름)
      ## 1. 내부 정찰·서비스 열거
      ## 2. 자격 재사용·피벗·PtH
      ## 3. 탐지·방어(망분리·MFA)
      ```
      ## ✅ 합격 기준
      내부정찰 + 이동기법 + 방어 포함.
    hint: '정찰+이동+방어'
    category: report
    points: 14
    answer: |
      echo "=== 측면 이동 보고서 — 실측 증거 기반 ==="
      docker exec el34-attacker sh -c 'H=$(nmap -sn 10.20.30.0/24 2>/dev/null | grep -ic "scan report"); echo "# 공격고급 W08 측면 이동 보고서"; echo "## 1. 내부 정찰(실측): 발판(10.20.30.202)에서 서브넷 스캔 → 호스트 $H개 발견"; echo "## 2. 이동: 자격 재사용(W06)·피벗(SSH -L/-D·proxychains)·PtH(해시 인증)"; echo "## 3. 탐지: 비정상 내부 인증·새 연결쌍. 방어: 망분리·MFA·고유자격"; echo "## 결론: 한 발판을 네트워크로 확장. 비번 재사용이 고속도로 — 망분리+고유자격+MFA가 천적"; [ "$H" -ge 1 ] && echo "측면 이동 보고 완료(발견 호스트 $H)"'
      echo "→ 보고서가 실제 내부 정찰 호스트 수를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "측면 이동 보고 = 실측 내부 호스트 수 인용+이동기법+방어. 증거 기반(호스트 수 게이트). 정적 템플릿 아님."
    verify:
      type: output_contains
      expect: '측면 이동'
      field: stdout
      semantic: {intent: "측면 이동 보고", success_criteria: ["정찰/이동/방어"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
