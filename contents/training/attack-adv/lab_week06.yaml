lab_id: standalone-attack-adv-week06
title: "권한 상승 — 일반 사용자에서 root로"
version: standalone-attack-adv
course: attack-adv
week: 6
description: |
  공격 고급 W06 — 권한 상승(Privilege Escalation). 발판(W01)을 잡은 뒤 일반 사용자→root로 올라간다.
  SUID 바이너리·sudo 오설정·쓰기 가능 파일/cron·자격 수집·커널 취약점·GTFOBins를 체계적으로 열거한다.
  el34-web의 비root 사용자 ccc(uid 1000)에서 privesc 열거(읽기 전용, 실제 상승 미수행) — 침투로 막 얻은
  저권한 셸을 모사한다. ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W01~W05 + 리눅스 권한 모델 이해"
  - "el34 호스트 SSH + docker exec, el34-web의 비root 사용자 ccc(docker exec -u ccc)"
  - "lecture §2(SUID/sudo) §3(자격/커널) §4(GTFOBins) 숙지"
objectives:
  - "권한 상승 벡터(SUID·sudo·쓰기파일·cron)를 체계적으로 열거"
  - "자격 수집·커널 취약점·GTFOBins 활용 이해"
  - "최소 권한 방어와 SUID 감사 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 현재 권한 파악
      **실습 의미:** 권한 상승의 시작은 '내가 누구인가'다 — 현재 사용자·그룹·권한(uid/gid)을 파악해야 root(uid=0)로 가는 경로를 찾을 수 있다. **⚠️ 인가된 el34 표적에만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # 출발점 파악: 현재 사용자·그룹·권한(uid/gid)을 본다 (목표는 root uid=0)
      id; echo ---; whoami
      # 현재 권한을 파악했으면 마커
      id >/dev/null 2>&1 && echo privesc_ready
      ```
      ## ✅ 합격 기준
      `privesc_ready`(과 id 출력)가 출력되면 통과. **근거:** 마커는 id가 현재 권한을 실제 반환했을 때만 찍히므로, 권한 상승의 출발점(현재 위치)을 파악했음을 뜻한다.
    hint: '현재 권한'
    category: survey
    points: 10
    answer: |
      docker exec -u ccc el34-web sh -c '
        # 현재 사용자/그룹/권한 파악
        id; echo ---; whoami
        # 파악했으면 마커
        id >/dev/null 2>&1 && echo privesc_ready
      '
    answer_detail: "현재 권한 = id/whoami. 권한 상승은 현재 위치(일반 사용자)에서 root(uid=0)로 가는 경로 찾기."
    verify:
      type: output_contains
      expect: 'privesc_ready'
      field: stdout
      semantic: {intent: "현재 권한", success_criteria: ["id"], acceptable_methods: ["**[OSS] id (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SUID 바이너리 열거
      **실습 의미:** SUID 비트가 붙은 실행 파일은 소유자(주로 root) 권한으로 실행된다 — 비표준 SUID(find/vim/python)는 GTFOBins로 root 셸이 가능하므로 1순위로 열거한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # SUID 비트(-4000) 붙은 실행 파일을 열거한다 (소유자 권한 실행 → 악용 시 권한 상승)
      find / -perm -4000 -type f 2>/dev/null | head -20
      N=$(find / -perm -4000 -type f 2>/dev/null | wc -l); echo "SUID 총 ${N}개"
      # SUID 파일을 1개 이상 열거했으면 마커
      [ "$N" -ge 1 ] && echo suid_done
      ```
      ## ✅ 합격 기준
      `suid_done`(과 SUID 목록·개수)이 출력되면 통과. **근거:** 마커는 SUID 파일이 실제 1개 이상 열거됐을 때만 찍히므로, 권한 상승 1순위 벡터를 확보했음을 뜻한다.
    hint: 'SUID'
    category: manipulation
    points: 14
    answer: |
      docker exec -u ccc el34-web sh -c '
        # SUID(-4000) 파일 열거
        find / -perm -4000 -type f 2>/dev/null | head -20
        N=$(find / -perm -4000 -type f 2>/dev/null | wc -l); echo "SUID 총 ${N}개"
        # 1개 이상이면 마커
        [ "$N" -ge 1 ] && echo suid_done
      '
    answer_detail: "SUID 열거 = find -perm -4000. 비표준 SUID는 GTFOBins로 root 셸 획득. 1순위 privesc 벡터."
    verify:
      type: output_contains
      expect: 'suid_done'
      field: stdout
      semantic: {intent: "SUID", success_criteria: ["SUID 파일"], acceptable_methods: ["**[OSS] find (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 sudo 권한 점검
      **실습 의미:** sudo -l은 내가 sudo로 실행 가능한 명령을 보여준다 — NOPASSWD나 GTFOBins 바이너리(less/vi/awk)면 root 직행이라 흔한 오설정 벡터다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # sudo로 실행 가능한 명령을 열거한다 (NOPASSWD·GTFOBins 바이너리면 root 직행)
      sudo -n -l 2>/dev/null || echo "(sudo 비번 필요/권한 없음 — 실무선 sudo -l)"
      echo "확인 대상: NOPASSWD·(ALL)·악용가능 바이너리(vi/less/awk)"
      # sudo 권한 점검을 수행했으면 마커
      echo sudo_done
      ```
      ## ✅ 합격 기준
      `sudo_done`(과 sudo 점검 결과)이 출력되면 통과. **근거:** 출력은 sudo -l 점검을 실제 시도해 허용 명령(또는 권한 없음)을 확인했음을 뜻하며, NOPASSWD·GTFOBins 바이너리가 있으면 root 셸로 이어진다.
    hint: 'sudo'
    category: analysis
    points: 14
    answer: |
      docker exec -u ccc el34-web sh -c '
        # sudo 허용 명령 열거 (NOPASSWD·GTFOBins면 root 직행)
        sudo -n -l 2>/dev/null || echo "(sudo 비번 필요/권한 없음 — 실무선 sudo -l)"
        echo "확인 대상: NOPASSWD·(ALL)·악용가능 바이너리(vi/less/awk). 예: sudo less /x→!/bin/sh"
        # 점검 수행 마커
        echo sudo_done
      '
    answer_detail: "sudo 점검 = sudo -l. NOPASSWD·GTFOBins 바이너리(less/vi/awk)면 root 셸. 흔한 오설정 벡터."
    verify:
      type: output_contains
      expect: 'sudo_done'
      field: stdout
      semantic: {intent: "sudo", success_criteria: ["sudo -l"], acceptable_methods: ["**[OSS] sudo -l (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 쓰기 가능 파일·cron 점검
      **실습 의미:** root가 실행하는 스크립트/cron이 내게 쓰기 가능하면 그 내용을 바꿔 root 권한을 얻는다 — 쓰기 가능 파일과 cron을 점검한다(PATH 하이재킹도 벡터).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # root 실행 파일이 내게 쓰기 가능한지 점검 (내용 교체로 권한 상승)
      echo "== writable files =="; find /etc /usr/local -writable -type f 2>/dev/null | head
      # cron 작업 점검 (쓰기 가능한 root cron이면 권한 상승)
      echo "== cron =="; ls -la /etc/cron* 2>/dev/null | head; cat /etc/crontab 2>/dev/null | grep -v "^#" | head
      # 쓰기파일/cron 점검을 수행했으면 마커
      echo writable_done
      ```
      ## ✅ 합격 기준
      `writable_done`(과 점검 결과)이 출력되면 통과. **근거:** 출력은 쓰기 가능 파일과 cron을 실제 열거했음을 뜻하며, root가 실행하는 쓰기 가능 파일/cron은 내용 교체로 권한 상승으로 이어진다.
    hint: '쓰기 파일/cron'
    category: analysis
    points: 14
    answer: |
      docker exec -u ccc el34-web sh -c '
        # 쓰기 가능 root 파일 점검
        echo "== writable files =="; find /etc /usr/local -writable -type f 2>/dev/null | head
        # cron 점검
        echo "== cron =="; ls -la /etc/cron* 2>/dev/null | head; cat /etc/crontab 2>/dev/null | grep -v "^#" | head
        # 점검 수행 마커
        echo writable_done
      '
    answer_detail: "쓰기파일/cron = root 실행 파일이 내게 쓰기가능하면 내용 교체로 권한 상승. PATH 하이재킹 포함."
    verify:
      type: output_contains
      expect: 'writable_done'
      field: stdout
      semantic: {intent: "쓰기파일/cron", success_criteria: ["writable/cron"], acceptable_methods: ["**[OSS] find (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 자격 수집 (credential harvesting)
      **실습 의미:** 시스템 곳곳의 평문 비밀(설정·히스토리·키)을 수집해 다른 계정/호스트로 확장한다 — 수집한 자격은 측면 이동(W08)의 연료다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # 평문 비밀 수집①: 명령 히스토리
      echo "== history =="; ls -la ~/.bash_history 2>/dev/null
      # 평문 비밀 수집②: SSH 키
      echo "== ssh keys =="; ls -la ~/.ssh 2>/dev/null | head
      # 평문 비밀 수집③: 설정 파일 내 password/secret/api_key
      echo "== config secrets =="; grep -rIl -iE "password|secret|api_key" /etc 2>/dev/null | head -3
      # 자격 수집 위치를 점검했으면 마커
      echo creds_done
      ```
      ## ✅ 합격 기준
      `creds_done`(과 수집 위치)이 출력되면 통과. **근거:** 출력은 history·SSH 키·설정 평문 비밀 위치를 실제 점검했음을 뜻하며, 수집 자격은 권한 상승·측면 이동(W08)의 연료가 된다.
    hint: '자격 수집'
    category: analysis
    points: 12
    answer: |
      docker exec -u ccc el34-web sh -c '
        # 히스토리/SSH키/설정 평문 비밀 수집
        echo "== history =="; ls -la ~/.bash_history 2>/dev/null
        echo "== ssh keys =="; ls -la ~/.ssh 2>/dev/null | head
        echo "== config secrets =="; grep -rIl -iE "password|secret|api_key" /etc 2>/dev/null | head -3
        # 점검 수행 마커
        echo creds_done
      '
    answer_detail: "자격 수집 = history/.ssh/설정 평문 비밀. 권한 상승+측면 이동(W08)의 연료. 메모리(soc-adv W08)도 소스."
    verify:
      type: output_contains
      expect: 'creds_done'
      field: stdout
      semantic: {intent: "자격 수집", success_criteria: ["history/키/비밀"], acceptable_methods: ["**[OSS] grep (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 커널·GTFOBins
      **실습 의미:** 커널 버전으로 알려진 LPE(DirtyCow/DirtyPipe/PwnKit)를 매핑하고, GTFOBins(SUID/sudo 바이너리 악용 백과)를 활용한다 — linpeas.sh가 이 모든 벡터를 자동 열거한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # 커널 버전 확인 → 알려진 LPE 익스플로잇 매핑
      K=$(uname -r); echo "커널: $K"
      echo "LPE 예: DirtyCow(2016-5195)·DirtyPipe(2022-0847)·PwnKit(pkexec 2021-4034)"
      echo "GTFOBins: SUID/sudo 바이너리 악용 백과(find/vim/awk/less/python). 자동화=linpeas.sh"
      # 커널 버전을 확인했으면 마커
      [ -n "$K" ] && echo kernel_done
      ```
      ## ✅ 합격 기준
      `kernel_done`(과 커널 버전)이 출력되면 통과. **근거:** 마커는 커널 버전을 실제 확인했을 때만 찍히므로, 알려진 LPE 매핑과 GTFOBins 활용의 기준을 잡았음을 뜻한다.
    hint: '커널/GTFOBins'
    category: analysis
    points: 12
    answer: |
      docker exec -u ccc el34-web sh -c '
        # 커널 버전 → LPE 매핑
        K=$(uname -r); echo "커널: $K"
        echo "LPE 예: DirtyCow(2016-5195)·DirtyPipe(2022-0847)·PwnKit(pkexec 2021-4034)"
        echo "GTFOBins: SUID/sudo 바이너리 악용 백과(find/vim/awk/less/python). 자동화=linpeas.sh"
        # 커널 확인 시 마커
        [ -n "$K" ] && echo kernel_done
      '
    answer_detail: "커널/GTFOBins = 커널 버전→알려진 LPE(DirtyPipe/PwnKit). GTFOBins=바이너리 악용 백과. linpeas 자동화."
    verify:
      type: output_contains
      expect: 'kernel_done'
      field: stdout
      semantic: {intent: "커널/GTFOBins", success_criteria: ["커널/LPE"], acceptable_methods: ["**[OSS] uname/GTFOBins (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — SUID 감사 (방어자 관점)
      **실습 의미:** 방어 핵심은 SUID 정기 감사·sudo 엄격·커널 패치다 — 방어자가 돌리는 SUID 감사(총개수+GTFOBins 위험 바이너리 점검)를 직접 수행한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # 방어자 SUID 감사: SUID 총개수를 세고 GTFOBins 위험 바이너리가 있는지 점검한다
      N=$(find / -perm -4000 -type f 2>/dev/null | wc -l); echo "SUID 바이너리 총 ${N}개(감사 대상)"
      echo "GTFOBins 위험 SUID 점검:"
      find / -perm -4000 -type f 2>/dev/null | grep -E "/(find|vim|nmap|python|awk|less|nano)$" || echo "  비표준 위험 SUID 없음(양호)"
      # 감사를 실제 수행(SUID 1개 이상 집계)했으면 방어 마커
      [ "$N" -ge 1 ] && echo defense_done
      ```
      ## ✅ 합격 기준
      `defense_done`(과 감사 결과)이 출력되면 통과. **근거:** 마커는 SUID 감사를 실제 수행(총개수 집계+위험 바이너리 점검)했을 때만 찍히므로, 권한 상승을 차단하는 정기 감사의 핵심을 방어자 관점에서 실행했음을 뜻한다.
    hint: '방어'
    category: report
    points: 12
    answer: |
      docker exec -u ccc el34-web sh -c '
        # SUID 총개수 감사 + GTFOBins 위험 바이너리 점검
        N=$(find / -perm -4000 -type f 2>/dev/null | wc -l); echo "SUID 바이너리 총 ${N}개(감사 대상)"
        echo "GTFOBins 위험 SUID 점검:"
        find / -perm -4000 -type f 2>/dev/null | grep -E "/(find|vim|nmap|python|awk|less|nano)$" || echo "  비표준 위험 SUID 없음(양호)"
        # 감사 수행 시 방어 마커
        [ "$N" -ge 1 ] && echo defense_done
      '
    answer_detail: "방어 = SUID 감사를 실제 수행(find 총개수+위험 바이너리 점검). 가짜 echo 아닌 실점검. sudo 엄격·커널 패치 병행."
    verify:
      type: output_contains
      expect: 'defense_done'
      field: stdout
      semantic: {intent: "방어", success_criteria: ["최소권한/SUID감사"], acceptable_methods: ["**[관리적] 방어 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 권한 상승 보고서 작성
      **실습 의미:** 앞 단계의 실측(SUID 수·커널 버전)을 인용한 보고서로 정리한다 — 권한 상승은 체계적 열거가 9할이고 작은 오설정이 root로 이어지므로 방어(최소권한+감사)까지 담는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` (비-root 사용자 `ccc`) — `docker exec -it -u ccc el34-web bash` 로 접속해 실행한다(저권한 셸 모사).

      ```bash
      # 보고서 근거: SUID 수와 커널 버전을 실측
      N=$(find / -perm -4000 -type f 2>/dev/null | wc -l); K=$(uname -r)
      # 실측을 인용한 권한 상승 보고서 출력 (본문 상세는 학생이 보강)
      echo "# 공격고급 W06 권한 상승 보고서 — 열거(SUID ${N}개)·sudo/쓰기파일/cron·자격수집·커널 ${K}(LPE)·GTFOBins·방어(최소권한/SUID감사/패치)"
      # 실측 인용 보고서면 완료 마커
      [ "$N" -ge 1 ] && echo privesc_report_done
      ```
