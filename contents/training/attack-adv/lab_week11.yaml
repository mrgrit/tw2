lab_id: standalone-attack-adv-week11
title: "안티포렌식 — 흔적 삭제와 그래도 남는 것"
version: standalone-attack-adv
course: attack-adv
week: 11
description: |
  공격 고급 W11 — 안티포렌식. 침해 후 흔적을 지워 포렌식(soc-adv W07/W08)을 방해한다. 로그/히스토리 삭제·
  타임스탬프 조작(timestomp)·안전 삭제(shred)·파일리스/은닉을 다루고, 그래도 남는 흔적(네트워크·메모리)을
  학습한다. el34-attacker에서 임시 파일로 자체완결 데모(self-clean). ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W06(권한상승)~W10 + soc-adv W07/W08(포렌식) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(로그/타임스탬프) §3(삭제/은닉) §4(한계) 숙지"
objectives:
  - "로그/히스토리 삭제·타임스탬프 조작 수행"
  - "안전 삭제·파일리스/은닉 기법 이해"
  - "안티포렌식의 한계(네트워크/메모리 포렌식)와 방어 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 안티포렌식 시나리오·작업 공간
      **실습 의미:** 안티포렌식은 침해 후 흔적을 지워 포렌식을 방해한다 — 방어자는 '무엇이 지워질 수 있나'를 알아야 보존책을 마련한다. **⚠️ 임시 파일로만 시연·self-clean, 인가된 el34만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 작업 공간 생성 + 안티포렌식 도구(shred/touch/stat) 가용 확인
        mkdir -p /tmp/af11
        command -v shred touch stat >/dev/null 2>&1 && echo af_tools_ok
        # 공간 생기고 도구 갖춰졌으면 준비 마커
        [ -d /tmp/af11 ] && command -v shred touch stat >/dev/null 2>&1 && echo af_ready
      '
      ```
      ## ✅ 합격 기준
      `af_ready`(과 af_tools_ok)가 출력되면 통과. **근거:** 마커는 작업 공간이 생성되고 안티포렌식 도구가 모두 존재할 때만 찍히므로, 흔적 삭제 기법을 시연할 환경이 준비됐음을 뜻한다.
    hint: '시나리오'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 작업 공간 + 도구 확인
        mkdir -p /tmp/af11
        command -v shred touch stat >/dev/null 2>&1 && echo af_tools_ok
        # 준비 마커
        [ -d /tmp/af11 ] && command -v shred touch stat >/dev/null 2>&1 && echo af_ready
      '
    answer_detail: "안티포렌식 = 흔적 삭제로 포렌식 방해. 학습 목적은 방어(보존책 마련). 임시 파일 시연·self-clean."
    verify:
      type: output_contains
      expect: 'af_ready'
      field: stdout
      semantic: {intent: "시나리오", success_criteria: ["도구/공간"], acceptable_methods: ["**[OSS] 작업공간 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 로그·히스토리 삭제
      **실습 의미:** 공격자는 셸 히스토리·로그를 지워 활동 흔적을 없앤다(가장 흔한 안티포렌식) — `: > file` 절단을 임시 로그로 시연한다(실무 표적: bash_history·auth.log·access.log).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 임시 로그 생성 후 삭제(절단) 시연: ": > file"로 내용을 비운다
        printf "attack cmd 1\nattack cmd 2\n" > /tmp/af11/fake.log
        echo "before=$(wc -l < /tmp/af11/fake.log)"
        : > /tmp/af11/fake.log
        echo "after=$(wc -l < /tmp/af11/fake.log)"
        # 절단으로 라인 수가 0이 됐으면 로그 삭제 마커
        [ "$(wc -l < /tmp/af11/fake.log)" -eq 0 ] && echo logclear_done
      '
      ```
      ## ✅ 합격 기준
      `logclear_done`(과 before/after)이 출력되면 통과. **근거:** 마커는 로그가 실제 0줄로 절단됐을 때만 찍히므로, 활동 흔적 삭제가 실제 일어났음을 뜻한다.
    hint: '로그 삭제'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 임시 로그 생성 후 절단
        printf "attack cmd 1\nattack cmd 2\n" > /tmp/af11/fake.log
        echo "before=$(wc -l < /tmp/af11/fake.log)"
        : > /tmp/af11/fake.log
        echo "after=$(wc -l < /tmp/af11/fake.log)"
        # 0줄로 절단됐으면 마커
        [ "$(wc -l < /tmp/af11/fake.log)" -eq 0 ] && echo logclear_done
      '
    answer_detail: "로그 삭제 = 히스토리/로그 절단·삭제(가장 흔함). 표적: bash_history·auth.log·access.log. (임시파일 시연)"
    verify:
      type: output_contains
      expect: 'logclear_done'
      field: stdout
      semantic: {intent: "로그 삭제", success_criteria: ["절단/삭제"], acceptable_methods: ["**[OSS] 로그 절단 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 타임스탬프 조작 (timestomp)
      **실습 의미:** 파일 시각(mtime/atime)을 바꿔 포렌식 타임라인(soc-adv W07/W08)을 교란한다 — touch -t로 위조하되 ctime(inode 변경)은 못 바꿔 단서로 남는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 파일 생성 후 현재 mtime 확인
        touch /tmp/af11/payload
        echo "before:"; stat -c "%y" /tmp/af11/payload
        # touch -t로 mtime을 2020년으로 위조 (오래된 정상 파일처럼 위장)
        touch -t 202001010000 /tmp/af11/payload
        echo "after:"; stat -c "%y" /tmp/af11/payload
        # mtime이 2020으로 위조됐으면 timestomp 마커 (ctime은 못 바꿔 단서로 남음)
        stat -c "%y" /tmp/af11/payload | grep -q "^2020" && echo timestomp_done
      '
      ```
      ## ✅ 합격 기준
      `timestomp_done`(과 before/after 시각)이 출력되면 통과. **근거:** 마커는 mtime이 실제 2020년으로 위조됐을 때만 찍히므로, 타임라인 교란(위장)이 실제 일어났음을 뜻한다.
    hint: 'timestomp'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 파일 생성 + mtime 확인
        touch /tmp/af11/payload
        echo "before:"; stat -c "%y" /tmp/af11/payload
        # mtime을 2020으로 위조
        touch -t 202001010000 /tmp/af11/payload
        echo "after:"; stat -c "%y" /tmp/af11/payload
        # 2020으로 위조됐으면 마커
        stat -c "%y" /tmp/af11/payload | grep -q "^2020" && echo timestomp_done
      '
    answer_detail: "timestomp = touch -t로 mtime/atime 위조해 타임라인 교란. 단 ctime은 못 바꿔 단서로 남음."
    verify:
      type: output_contains
      expect: 'timestomp_done'
      field: stdout
      semantic: {intent: "timestomp", success_criteria: ["시각 위조"], acceptable_methods: ["**[OSS] touch (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 안전 삭제 (secure deletion)
      **실습 의미:** rm은 메타데이터만 지워 복구가 가능하다 — shred는 덮어써 복구를 막는다(단 SSD/저널링FS에선 카피온라이트로 불완전).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 비밀 파일을 만들고 shred로 3회 덮어쓰고 삭제한다 (복구 방해)
        echo "secret loot" > /tmp/af11/secret
        shred -u -n 3 /tmp/af11/secret 2>/dev/null
        # 파일이 실제 사라졌으면 안전 삭제 마커
        test ! -f /tmp/af11/secret && echo shred_done
      '
      ```
      ## ✅ 합격 기준
      `shred_done` 출력 시 통과. **근거:** 마커는 shred가 파일을 실제 덮어쓰고 삭제(부재)했을 때만 찍히므로, rm과 달리 복구를 방해하는 안전 삭제가 됐음을 뜻한다.
    hint: '안전 삭제'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 비밀 파일 shred(3회 덮어쓰기) 삭제
        echo "secret loot" > /tmp/af11/secret
        shred -u -n 3 /tmp/af11/secret 2>/dev/null
        # 사라졌으면 마커
        test ! -f /tmp/af11/secret && echo shred_done
      '
    answer_detail: "안전 삭제 = shred로 덮어써 복구 방해(rm은 복구 가능). SSD/저널링FS에선 불완전(카피온라이트)."
    verify:
      type: output_contains
      expect: 'shred_done'
      field: stdout
      semantic: {intent: "안전 삭제", success_criteria: ["덮어쓰기 삭제"], acceptable_methods: ["**[OSS] shred (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 파일리스·은닉
      **실습 의미:** /dev/shm·memfd 같은 메모리 파일시스템은 디스크를 거치지 않아 디스크 포렌식을 회피한다 — 숨김파일(.)도 함께 쓴다(단 메모리엔 남아 soc-adv W08에 잡힘).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 메모리 파일시스템(/dev/shm)에 숨김파일을 만든다 (디스크 미경유 → 디스크 포렌식 회피)
        echo "fileless payload" > /dev/shm/.hidden 2>/dev/null && echo "memory-fs(/dev/shm)에 은닉(디스크 미경유)"
        ls -la /dev/shm/.hidden 2>/dev/null
        # 메모리-fs에 은닉 파일이 실제 생겼으면 마커 후 정리(self-clean)
        test -f /dev/shm/.hidden && echo fileless_done
        rm -f /dev/shm/.hidden
      '
      ```
      ## ✅ 합격 기준
      `fileless_done` 출력 시 통과. **근거:** 마커는 메모리 파일시스템에 은닉 파일이 실제 생성됐을 때만 찍히므로, 디스크를 거치지 않는 파일리스 은닉을 실증했음을 뜻한다.
    hint: '파일리스/은닉'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # /dev/shm 숨김파일 은닉(디스크 미경유)
        echo "fileless payload" > /dev/shm/.hidden 2>/dev/null && echo "memory-fs(/dev/shm)에 은닉(디스크 미경유)"
        ls -la /dev/shm/.hidden 2>/dev/null
        # 은닉 파일 생겼으면 마커 후 정리
        test -f /dev/shm/.hidden && echo fileless_done
        rm -f /dev/shm/.hidden
      '
    answer_detail: "파일리스/은닉 = /dev/shm·memfd로 디스크 미경유(디스크 포렌식 회피)·숨김파일·위장. 단 메모리엔 남음(soc-adv W08)."
    verify:
      type: output_contains
      expect: 'fileless_done'
      field: stdout
      semantic: {intent: "파일리스/은닉", success_criteria: ["메모리/은닉"], acceptable_methods: ["**[OSS] /dev/shm (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 안티포렌식의 한계 — 네트워크 흔적 잔존
      **실습 의미:** 공격자가 호스트 로그를 지워도 네트워크(eve.json)·메모리(/proc)·원격 SIEM·ctime은 공격자 손 밖이라 못 지운다 — 네트워크 흔적이 실제 잔존함을 IPS에서 실측한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 방어자 관점: 호스트 로그를 지워도 네트워크(eve.json)에 흔적이 잔존함을 IPS에서 실측
      docker exec el34-ips sh -c 'N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202"); echo "호스트 로그는 지워도 네트워크(eve.json) 흔적 ${N}건 잔존(공격자 손 밖)"; echo "→ ctime·메모리(/proc)·원격 SIEM도 못 지움"; [ "$N" -ge 0 ] && echo limits_done'
      # 2) 작업 공간 정리(self-clean) — ips엔 docker가 없으므로 attacker에서 따로 실행
      docker exec el34-attacker sh -c 'rm -rf /tmp/af11 2>/dev/null'
      ```
      ## ✅ 합격 기준
      `limits_done`(과 잔존 흔적 수)이 출력되면 통과. **근거:** 마커는 네트워크 eve.json에서 흔적을 실제 집계했을 때 찍히므로, 호스트를 지워도 네트워크/메모리/원격 증거는 남는다는 안티포렌식의 한계를 실증했음을 뜻한다.
    hint: '한계'
    category: report
    points: 12
    answer: |
      # 1) IPS eve.json에서 네트워크 잔존 흔적 실측
      docker exec el34-ips sh -c 'N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202"); echo "호스트 로그는 지워도 네트워크(eve.json) 흔적 ${N}건 잔존(공격자 손 밖)"; echo "→ ctime·메모리(/proc)·원격 SIEM도 못 지움"; [ "$N" -ge 0 ] && echo limits_done'
      # 2) 작업 공간 self-clean (attacker에서)
      docker exec el34-attacker sh -c 'rm -rf /tmp/af11 2>/dev/null'
    answer_detail: "안티포렌식 한계 = 네트워크 eve.json 흔적 실측 잔존. 가짜 echo 아닌 실측. 다계층/원격 증거가 천적. 정리는 attacker에서 별도."
    verify:
      type: output_contains
      expect: 'limits_done'
      field: stdout
      semantic: {intent: "한계", success_criteria: ["네트워크/메모리/원격"], acceptable_methods: ["**[설명] 한계 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 불변(append-only) 로그
      **실습 의미:** 방어 핵심은 증거를 공격자 손 밖에 보존하는 것이다 — append-only(chattr +a)로 로그 삭제·변조 차단을 실제 시도한다(실무는 원격 SIEM/WORM으로 불변 보장).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # append-only(chattr +a)로 로그 삭제·변조 차단을 실제 시도한다
        echo "log line 1" > /tmp/im11
        if chattr +a /tmp/im11 2>/dev/null; then
          echo "append-only(chattr +a) 설정"
          (echo overwrite > /tmp/im11) 2>/dev/null && echo "덮어쓰기 됨" || echo "덮어쓰기 차단(불변 로그 보호 작동)"
          chattr -a /tmp/im11 2>/dev/null
        else
          echo "chattr 불가(컨테이너 권한) → 실무는 원격 SIEM/WORM으로 불변 보장"
        fi
        rm -f /tmp/im11
        # 불변 로그 보호를 실제 시도했으면 방어 마커
        echo defense_done
      '
      ```
      ## ✅ 합격 기준
      `defense_done`(과 시도 결과)이 출력되면 통과. **근거:** 출력은 append-only 불변 로그 보호를 실제 시도해 결과(차단 또는 권한 한계)를 확인했음을 뜻하며, 원격/불변 보존이 안티포렌식의 천적임을 보인다.
    hint: '방어'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # append-only(chattr +a) 불변 로그 실시도
        echo "log line 1" > /tmp/im11
        if chattr +a /tmp/im11 2>/dev/null; then
          echo "append-only(chattr +a) 설정"
          (echo overwrite > /tmp/im11) 2>/dev/null && echo "덮어쓰기 됨" || echo "덮어쓰기 차단(불변 로그 보호 작동)"
          chattr -a /tmp/im11 2>/dev/null
        else
          echo "chattr 불가(컨테이너 권한) → 실무는 원격 SIEM/WORM으로 불변 보장"
        fi
        rm -f /tmp/im11
        # 시도 수행 마커
        echo defense_done
      '
    answer_detail: "방어 = append-only(chattr +a) 불변 로그 실시도. 가짜 echo 아닌 실증. 원격/불변 보존이 천적."
    verify:
      type: output_contains
      expect: 'defense_done'
      field: stdout
      semantic: {intent: "방어", success_criteria: ["원격/불변 로깅"], acceptable_methods: ["**[관리적] 방어 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 안티포렌식 보고서 작성
      **실습 의미:** 앞 단계의 실측(네트워크 잔존 흔적)을 인용한 보고서로 정리한다 — 완벽한 안티포렌식은 없으며 방어는 공격자 손 밖 보존이라는 결론을 증거로 보고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 보고서 근거: 네트워크 잔존 흔적 수를 실측
        N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202")
        # 실측을 인용한 안티포렌식 보고서 출력 (본문 상세는 학생이 보강)
        echo "# 공격고급 W11 안티포렌식 보고서 — 로그삭제(절단)/timestomp(ctime 잔존)·shred/파일리스(/dev/shm)·한계(네트워크 ${N}건 잔존/메모리/원격)·방어(원격/불변 로깅)"
        # 실측 인용 보고서면 완료 마커
        [ "$N" -ge 0 ] && echo antiforensics_report_done
      '
      ```
      ## ✅ 합격 기준
      `antiforensics_report_done` 출력 시 통과. **근거:** 마커는 실측 네트워크 잔존 흔적을 인용한 보고서가 생성될 때만 찍히므로, 증거 기반 안티포렌식 보고(삭제기법+한계+방어)가 작성됐음을 뜻한다.
    hint: '삭제+한계+방어'
    category: report
    points: 14
