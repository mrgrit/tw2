lab_id: standalone-attack-adv-week10
title: "데이터 유출 — 스테이징·암호화·은밀한 반출"
version: standalone-attack-adv
course: attack-adv
week: 10
description: |
  공격 고급 W10 — 데이터 유출(Exfiltration). 침해의 최종 목적. 데이터 스테이징(수집·압축)·암호화·유출 채널
  (HTTP/DNS/ICMP)·저속 분할(low-and-slow)·DLP 우회를 다룬다. el34-attacker에서 스테이징→압축→암호화→로컬
  리스너 유출을 자체완결 데모(self-clean). 방어자의 DLP·아웃바운드 통제도 학습. ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W07(C2)·W08(측면 이동) + soc-adv W07(flow) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(스테이징/암호화) §3(채널/저속) §4(DLP) 숙지"
objectives:
  - "데이터 스테이징(수집·압축)·암호화 수행"
  - "유출 채널(HTTP/DNS/ICMP)과 저속 분할 이해"
  - "DLP 우회와 방어자의 유출 탐지(아웃바운드 통제) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 유출 시나리오·작업 공간
      **실습 의미:** 유출은 침투의 최종 목적(데이터 절도)이다 — 격리 작업 공간을 만들고 도구를 확인해 스테이징→압축→암호화→반출 사슬을 시연할 준비를 한다. **⚠️ 인가된 el34 표적에만·self-clean.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 격리 작업 공간 생성 + 유출 도구(openssl/tar/nc/python3) 가용 확인
        mkdir -p /tmp/exfil10
        command -v openssl tar nc python3 >/dev/null 2>&1 && echo exfil_tools_ok
        # 작업 공간이 생기고 도구가 갖춰졌으면 준비 마커
        [ -d /tmp/exfil10 ] && command -v openssl tar nc >/dev/null 2>&1 && echo exfil_ready
      '
      ```
      ## ✅ 합격 기준
      `exfil_ready`(과 exfil_tools_ok)가 출력되면 통과. **근거:** 마커는 작업 공간이 생성되고 유출 도구가 모두 존재할 때만 찍히므로, 유출 사슬을 시연할 환경이 준비됐음을 뜻한다.
    hint: '유출 시나리오'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 작업 공간 + 도구 확인
        mkdir -p /tmp/exfil10
        command -v openssl tar nc python3 >/dev/null 2>&1 && echo exfil_tools_ok
        # 준비 마커
        [ -d /tmp/exfil10 ] && command -v openssl tar nc >/dev/null 2>&1 && echo exfil_ready
      '
    answer_detail: "유출 시나리오 = 데이터 반출이 침투 목적. 도구(tar/openssl/nc) + 격리 작업공간. 8단계 끝 self-clean."
    verify:
      type: output_contains
      expect: 'exfil_ready'
      field: stdout
      semantic: {intent: "유출 시나리오", success_criteria: ["도구/공간"], acceptable_methods: ["**[OSS] 작업공간 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 데이터 스테이징 (수집·압축)
      **실습 의미:** 반출 전 데이터를 한곳에 모으고 압축한다 — 전송량을 줄이고 한 번에 빼낼 준비다(실무는 DB덤프·문서·소스, 여기선 모의 파일).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 스테이징: 흩어진 모의 데이터를 작업 공간에 모은다
        cp /etc/hostname /etc/os-release /tmp/exfil10/ 2>/dev/null
        # 압축: 전송량을 줄이고 단일 반출 준비 (loot.tar.gz)
        tar czf /tmp/exfil10/loot.tar.gz -C /tmp/exfil10 hostname os-release 2>/dev/null
        echo "압축본 크기: $(wc -c < /tmp/exfil10/loot.tar.gz) bytes"
        # 압축본이 생겼으면 스테이징 마커
        [ -s /tmp/exfil10/loot.tar.gz ] && echo staged_done
      '
      ```
      ## ✅ 합격 기준
      `staged_done`(과 압축본 크기)이 출력되면 통과. **근거:** 마커는 데이터가 실제 압축본(loot.tar.gz)으로 모였을 때만 찍히므로, 단일 반출용 스테이징이 됐음을 뜻한다.
    hint: '스테이징'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 모의 데이터 수집
        cp /etc/hostname /etc/os-release /tmp/exfil10/ 2>/dev/null
        # tar 압축
        tar czf /tmp/exfil10/loot.tar.gz -C /tmp/exfil10 hostname os-release 2>/dev/null
        echo "압축본 크기: $(wc -c < /tmp/exfil10/loot.tar.gz) bytes"
        # 압축본 생겼으면 마커
        [ -s /tmp/exfil10/loot.tar.gz ] && echo staged_done
      '
    answer_detail: "스테이징 = 흩어진 데이터를 staging dir에 모아 압축. 전송량 감소·단일 반출 준비. (모의 파일)"
    verify:
      type: output_contains
      expect: 'staged_done'
      field: stdout
      semantic: {intent: "스테이징", success_criteria: ["수집/압축"], acceptable_methods: ["**[OSS] tar (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 암호화 (반출 전 은닉)
      **실습 의미:** 반출 데이터를 AES로 암호화하면 DLP의 내용 검사(키워드·정규식)를 회피한다 — 단 '암호화된 대량 반출'은 그 자체가 이상 신호다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 암호화: 반출 데이터를 AES-256으로 암호화해 DLP 내용검사를 회피한다
        openssl enc -aes-256-cbc -pbkdf2 -in /tmp/exfil10/loot.tar.gz -out /tmp/exfil10/loot.enc -k "aa10key" 2>/dev/null
        file /tmp/exfil10/loot.enc | grep -o "data"
        # 암호화 산출물이 생겼으면 마커
        [ -s /tmp/exfil10/loot.enc ] && echo encrypted_done
      '
      ```
      ## ✅ 합격 기준
      `encrypted_done`(과 data 타입)이 출력되면 통과. **근거:** 마커는 AES 암호화 산출물(loot.enc)이 실제 생성됐을 때만 찍히므로, 내용 검사를 회피할 은닉이 됐음을 뜻한다.
    hint: '암호화'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # AES-256 암호화로 내용 은닉
        openssl enc -aes-256-cbc -pbkdf2 -in /tmp/exfil10/loot.tar.gz -out /tmp/exfil10/loot.enc -k "aa10key" 2>/dev/null
        file /tmp/exfil10/loot.enc | grep -o "data"
        # 암호화 산출물 생겼으면 마커
        [ -s /tmp/exfil10/loot.enc ] && echo encrypted_done
      '
    answer_detail: "암호화 = AES로 반출 데이터 은닉→DLP 내용검사 회피. 단 암호화+대량은 그 자체가 이상 신호."
    verify:
      type: output_contains
      expect: 'encrypted_done'
      field: stdout
      semantic: {intent: "암호화", success_criteria: ["내용 은닉"], acceptable_methods: ["**[OSS] openssl (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 유출 채널 (반출 데모)
      **실습 의미:** 암호화 데이터를 채널로 반출한다 — HTTP POST·DNS 쿼리·ICMP 등 허용 채널을 악용한다(정상과 섞임). 여기선 로컬 TCP로 메커니즘을 시연한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 유출 채널: 로컬 TCP 리스너를 띄우고 암호화 데이터를 반출(데모, 실무는 HTTP POST/DNS/클라우드)
        (timeout 3 nc -lnp 55010 >/tmp/exfil10/recv.bin 2>/dev/null &)
        sleep 0.4
        timeout 2 nc 127.0.0.1 55010 < /tmp/exfil10/loot.enc
        sleep 0.3
        echo "received=$(wc -c < /tmp/exfil10/recv.bin) bytes"
        # 수신 파일이 데이터를 실제 받았으면 채널 마커
        [ -s /tmp/exfil10/recv.bin ] && echo channel_done
      '
      ```
      ## ✅ 합격 기준
      `channel_done`(과 received 크기)이 출력되면 통과. **근거:** 마커는 리스너가 반출 데이터를 실제 수신(파일 비어있지 않음)했을 때만 찍히므로, 유출 채널로 데이터가 실제 흘렀음을 뜻한다.
    hint: '유출 채널'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 로컬 TCP 리스너로 암호화 데이터 반출 데모
        (timeout 3 nc -lnp 55010 >/tmp/exfil10/recv.bin 2>/dev/null &)
        sleep 0.4
        timeout 2 nc 127.0.0.1 55010 < /tmp/exfil10/loot.enc
        sleep 0.3
        echo "received=$(wc -c < /tmp/exfil10/recv.bin) bytes"
        # 수신했으면 채널 마커
        [ -s /tmp/exfil10/recv.bin ] && echo channel_done
      '
    answer_detail: "유출 채널 = HTTP POST/DNS/ICMP/클라우드로 반출. 허용 채널 악용(정상과 섞임). 데모는 로컬 TCP."
    verify:
      type: output_contains
      expect: 'channel_done'
      field: stdout
      semantic: {intent: "유출 채널", success_criteria: ["반출"], acceptable_methods: ["**[OSS] nc (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 저속·분할 (low-and-slow)
      **실습 의미:** 대량을 한 번에 빼면 볼륨 탐지에 걸린다 — split로 데이터를 작은 청크로 실제 분할해 시간 분산 반출(임계 회피)을 준비한다(DNS는 쿼리당 소량씩).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 저속·분할: 데이터를 split로 작은 청크(200B)로 실제 분할한다 (시간 분산 반출로 볼륨 임계 회피)
        mkdir -p /tmp/ex10s; seq 1 300 > /tmp/ex10s/data
        SZ=$(wc -c < /tmp/ex10s/data)
        split -b 200 /tmp/ex10s/data /tmp/ex10s/chunk_
        N=$(ls /tmp/ex10s/chunk_* 2>/dev/null | wc -l)
        echo "데이터 ${SZ}바이트를 ${N}개 청크(200B)로 분할(저속 분산 반출용)"
        rm -rf /tmp/ex10s
        # 2개 이상 청크로 실제 분할됐으면 마커
        [ "$N" -ge 2 ] && echo slow_done
      '
      ```
      ## ✅ 합격 기준
      `slow_done`(과 청크 수)이 출력되면 통과. **근거:** 마커는 데이터가 실제 2개 이상 청크로 분할됐을 때만 찍히므로, 가짜 echo가 아니라 시간 분산 반출(볼륨 임계 회피)을 준비했음을 뜻한다.
    hint: '저속 분할'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # split로 데이터를 청크(200B) 분할
        mkdir -p /tmp/ex10s; seq 1 300 > /tmp/ex10s/data
        SZ=$(wc -c < /tmp/ex10s/data)
        split -b 200 /tmp/ex10s/data /tmp/ex10s/chunk_
        N=$(ls /tmp/ex10s/chunk_* 2>/dev/null | wc -l)
        echo "데이터 ${SZ}바이트를 ${N}개 청크(200B)로 분할(저속 분산 반출용)"
        rm -rf /tmp/ex10s
        # 2개 이상 청크면 마커
        [ "$N" -ge 2 ] && echo slow_done
      '
    answer_detail: "저속·분할 = split로 데이터를 실제 청크 분할(N≥2 게이트). 가짜 echo 아닌 실분할. 볼륨 탐지 회피."
    verify:
      type: output_contains
      expect: 'slow_done'
      field: stdout
      semantic: {intent: "저속 분할", success_criteria: ["분할/분산"], acceptable_methods: ["**[설명] low-and-slow (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 DLP 우회 — 인코딩으로 내용검사 회피
      **실습 의미:** DLP는 평문의 민감 패턴(카드번호 4111…)을 탐지한다 — base64 인코딩하면 그 패턴이 안 보여 내용검사를 회피함을 실증한다(단 메타=볼륨/목적지는 못 숨김).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 민감 데이터 생성 후 평문에서 DLP가 카드번호 패턴(4111)을 탐지함을 보인다
        echo "creditcard:4111111111111111 ssn:123456" > /tmp/dlp10raw
        base64 /tmp/dlp10raw > /tmp/dlp10enc
        echo "평문(DLP 탐지):"; grep -o "4111" /tmp/dlp10raw && echo "  → DLP가 카드번호 패턴 탐지"
        # base64 인코딩본에는 카드번호 패턴이 안 보임을 확인 (내용검사 우회)
        echo "인코딩본(DLP 회피):"; grep -c "4111" /tmp/dlp10enc | grep -q "^0$" && echo "  → 카드번호 패턴 안 보임(내용검사 우회)"
        # 정리(self-clean) 후 마커
        rm -f /tmp/dlp10raw /tmp/dlp10enc; rm -rf /tmp/exfil10 2>/dev/null; echo dlp_done
      '
      ```
      ## ✅ 합격 기준
      `dlp_done`(과 평문 탐지/인코딩 회피)이 출력되면 통과. **근거:** 출력은 평문은 DLP가 4111을 탐지하고 base64 인코딩본은 패턴이 안 보임을 실제로 보였음을 뜻하므로, 인코딩 DLP 우회를 실증했음을 의미한다.
    hint: 'DLP 우회'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 민감 데이터 평문/인코딩 생성
        echo "creditcard:4111111111111111 ssn:123456" > /tmp/dlp10raw
        base64 /tmp/dlp10raw > /tmp/dlp10enc
        # 평문은 DLP가 4111 탐지
        echo "평문(DLP 탐지):"; grep -o "4111" /tmp/dlp10raw && echo "  → DLP가 카드번호 패턴 탐지"
        # 인코딩본은 패턴 안 보임(우회)
        echo "인코딩본(DLP 회피):"; grep -c "4111" /tmp/dlp10enc | grep -q "^0$" && echo "  → 카드번호 패턴 안 보임(내용검사 우회)"
        # self-clean + 마커
        rm -f /tmp/dlp10raw /tmp/dlp10enc; rm -rf /tmp/exfil10 2>/dev/null; echo dlp_done
      '
    answer_detail: "DLP 우회 = 민감 데이터를 base64 인코딩→DLP 키워드(4111) 탐지 회피 실증. 가짜 echo 아닌 실증. 메타는 못 숨김."
    verify:
      type: output_contains
      expect: 'dlp_done'
      field: stdout
      semantic: {intent: "DLP 우회", success_criteria: ["우회/정리"], acceptable_methods: ["**[설명] DLP (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 탐지·방어 — 아웃바운드 흔적 분석
      **실습 의미:** 내용은 숨겨도 메타(볼륨·목적지)는 못 숨긴다 — 방어자 관점에서 출처의 아웃바운드 흔적을 IPS 로그에서 분석한다(아웃바운드 통제가 유출의 천적).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-ips sh -c '
        # 방어자 관점: 출처(.202)의 아웃바운드 흔적을 IPS eve.json에서 분석한다 (볼륨/목적지 이상이 유출 단서)
        N=$(tail -3000 /var/log/suricata/eve.json 2>/dev/null | grep -c "10.20.30.202")
        echo "출처 .202 아웃바운드 흔적: $N건(볼륨/목적지 이상이 유출 탐지 단서)"
        # 아웃바운드 흔적을 실분석했으면 방어 마커
        [ "$N" -ge 0 ] && echo defense_done
      '
      ```
      ## ✅ 합격 기준
