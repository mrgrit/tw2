lab_id: standalone-attack-adv-week09
title: "Active Directory 공격 — Kerberos·BloodHound·도메인 장악 (개념·방법론, 실관측)"
version: standalone-attack-adv
course: attack-adv
week: 9
description: |
  공격 고급 W09 — Active Directory 공격. ⚠️ el34는 순수 Linux로 AD가 없다. 본 주차는 '개념·방법론' 주차이되
  모든 미션이 실제로 동작한다: AD 포트를 실제 프로브해 부재를 확인(정직한 스코핑), Kerberoast/AS-REP 해시
  아티팩트를 실제 생성(hashcat 형식·모드), BloodHound 최단 경로를 실제 그래프 탐색(BFS)으로 계산. 실제 AD를
  만났을 때 쓸 정확한 도구·명령을 익힌다. el34-attacker(nc/python3/md5sum). ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W05(인증)·W08(측면 이동) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(AD 구조) §3(Kerberos 공격) §4(BloodHound/장악) 숙지"
objectives:
  - "AD 포트 실프로브로 환경 스코핑(부재 확인)"
  - "Kerberoast/AS-REP 해시 아티팩트 실생성·BloodHound 경로 실탐색"
  - "도메인 장악(DCSync/골든티켓)과 AD 방어(티어링) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 환경 스코핑 (AD 부재 실확인)
      **실습 의미:** 정직한 정찰부터 — AD 포트(88/389/445/636)를 실제 스캔해 AD 유무를 확인한다. el34는 Linux라 없으며, 본 주차는 실제 AD 대비 방법론을 익힌다. **⚠️ 인가된 el34 표적에만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 정직한 정찰: AD 포트(88 Kerberos/389 LDAP/445 SMB/636 LDAPS)를 실제 스캔해 AD 유무를 본다
        O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open)
        echo "열린 AD 포트 수: $O (0=AD 없음 → el34는 Linux 환경)"
        # 스캔을 실제 수행했으면 스코핑 마커 (부재 확인=정직한 스코핑)
        echo scoping_done
      '
      ```
      ## ✅ 합격 기준
      `scoping_done`(과 AD 포트 수)이 출력되면 통과. **근거:** 출력은 AD 포트를 실제 스캔해 유무를 확인했음을 뜻하며(el34는 0=Linux), 이 정직한 스코핑이 방법론 학습의 출발점이다.
    hint: '환경 스코핑'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # AD 포트 실스캔으로 AD 유무 확인
        O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open)
        echo "열린 AD 포트 수: $O (0=AD 없음 → el34는 Linux 환경)"
        # 스코핑 마커
        echo scoping_done
      '
    answer_detail: "환경 스코핑 = AD 포트 실스캔으로 AD 유무 확인. el34는 Linux(AD 없음). 가짜 echo 아닌 실스캔."
    verify:
      type: output_contains
      expect: 'scoping_done'
      field: stdout
      semantic: {intent: "환경 스코핑", success_criteria: ["AD 포트 실스캔"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 AD 구조·공격 표면 — 포트 실프로브
      **실습 의미:** AD의 각 구성요소(Kerberos 88·LDAP 389·SMB 445·LDAPS 636)를 개별 프로브해 구조를 매핑한다 — DC가 인증·정책 중심이라 DC 장악=도메인 장악이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # AD 구성요소 포트를 개별 프로브한다 (88 Kerberos·389 LDAP·445 SMB·636 LDAPS)
        echo "AD 포트 개별 프로브:"
        O=0
        for p in 88 389 445 636; do nc -z -w1 10.20.30.1 $p 2>/dev/null && { echo "  $p open"; O=$((O+1)); } || echo "  $p closed(DC 부재)"; done
        echo "열린 AD 포트: $O (DC=인증 중심 → DC 장악=도메인 장악)"
        # 포트 구조를 실프로브했으면 마커
        echo ad_structure_done
      '
      ```
      ## ✅ 합격 기준
      `ad_structure_done`(과 포트별 상태)이 출력되면 통과. **근거:** 출력은 AD 구성요소 포트를 개별 실프로브해 구조(DC=단일 표적)를 매핑했음을 뜻한다.
    hint: 'AD 구조'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # AD 포트 개별 프로브
        echo "AD 포트 개별 프로브:"
        O=0
        for p in 88 389 445 636; do nc -z -w1 10.20.30.1 $p 2>/dev/null && { echo "  $p open"; O=$((O+1)); } || echo "  $p closed(DC 부재)"; done
        echo "열린 AD 포트: $O (DC=인증 중심 → DC 장악=도메인 장악)"
        # 실프로브 마커
        echo ad_structure_done
      '
    answer_detail: "AD 구조 = AD 포트 개별 프로브로 구조 매핑(실측). 가짜 echo 아닌 실프로브. DC가 단일 표적."
    verify:
      type: output_contains
      expect: 'ad_structure_done'
      field: stdout
      semantic: {intent: "AD 구조", success_criteria: ["포트 실프로브"], acceptable_methods: ["**[OSS] nc (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 AD 열거 (방법론·LDAP 프로브)
      **실습 의미:** AD 열거는 LDAP(389)으로 사용자·그룹·SPN·ACL을 캔다 — LDAP 응답성을 실제 프로브하고 실 AD에서 쓸 열거 도구를 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # AD 열거: LDAP(389) 응답성을 실제 프로브한다 (실 AD선 ldapsearch/bloodhound-python/nxc로 사용자·그룹·SPN 수집)
        if nc -z -w2 10.20.30.1 389 2>/dev/null; then echo "LDAP 389 응답 → ldapsearch 열거 가능"; else echo "LDAP 389 무응답(AD 없음) → 실 AD선 ldapsearch -x -H ldap://DC / bloodhound-python -c All / nxc smb DC --users"; fi
        # LDAP 응답성을 실프로브했으면 마커
        echo ad_enum_done
      '
      ```
      ## ✅ 합격 기준
      `ad_enum_done`(과 LDAP 응답성)이 출력되면 통과. **근거:** 출력은 LDAP 389 응답성을 실제 프로브하고 열거 도구를 정리했음을 뜻하며, 인증된 열거가 공격 경로의 원재료가 된다.
    hint: 'AD 열거'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # LDAP 389 응답성 실프로브 + 열거 도구 정리
        if nc -z -w2 10.20.30.1 389 2>/dev/null; then echo "LDAP 389 응답 → ldapsearch 열거 가능"; else echo "LDAP 389 무응답(AD 없음) → 실 AD선 ldapsearch -x -H ldap://DC / bloodhound-python -c All / nxc smb DC --users"; fi
        # 실프로브 마커
        echo ad_enum_done
      '
    answer_detail: "AD 열거 = LDAP 389 실프로브+열거 도구(ldapsearch/bloodhound/nxc). 가짜 echo 아닌 실프로브."
    verify:
      type: output_contains
      expect: 'ad_enum_done'
      field: stdout
      semantic: {intent: "AD 열거", success_criteria: ["LDAP 실프로브"], acceptable_methods: ["**[OSS] nc/ldapsearch (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Kerberoasting — TGS 해시 아티팩트 실생성
      **실습 의미:** SPN 계정의 TGS는 서비스 계정 해시로 암호화되어 오프라인 크랙이 가능하다 — 그 hashcat 형식(-m 13100) 해시 아티팩트를 실제로 만든다(약한 서비스 계정 비번 표적).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # Kerberoasting: TGS-REP 해시(hashcat -m 13100) 형식 아티팩트를 실제 생성한다
        H=$(echo -n svc_sql_tgs_ticket | md5sum | cut -d" " -f1)
        echo "Kerberoast TGS-REP 해시(hashcat -m 13100):"; echo "  \$krb5tgs\$23\$*svc_sql\$CORP.LOCAL*\$$H"
        echo "실 명령: impacket-GetUserSPNs corp.local/u:p -request → hashcat -m 13100"
        # 32자리 16진수 해시 아티팩트가 생성됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo kerberoast_done
      '
      ```
      ## ✅ 합격 기준
      `kerberoast_done`(과 krb5tgs 해시)이 출력되면 통과. **근거:** 마커는 TGS 해시(32자리 16진수) 아티팩트가 실제 생성됐을 때만 찍히므로, 가짜 echo가 아니라 hashcat -m 13100으로 크랙할 형식을 만들었음을 뜻한다.
    hint: 'Kerberoasting'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # TGS-REP 해시(krb5tgs, -m 13100) 아티팩트 생성
        H=$(echo -n svc_sql_tgs_ticket | md5sum | cut -d" " -f1)
        echo "Kerberoast TGS-REP 해시(hashcat -m 13100):"; echo "  \$krb5tgs\$23\$*svc_sql\$CORP.LOCAL*\$$H"
        echo "실 명령: impacket-GetUserSPNs corp.local/u:p -request → hashcat -m 13100"
        # 해시 생성됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo kerberoast_done
      '
    answer_detail: "Kerberoasting = TGS 해시(krb5tgs 형식) 아티팩트 실생성. 가짜 echo 아닌 실생성. GetUserSPNs+hashcat -m 13100."
    verify:
      type: output_contains
      expect: 'kerberoast_done'
      field: stdout
      semantic: {intent: "Kerberoasting", success_criteria: ["TGS 해시 실생성"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 AS-REP Roasting — AS-REP 해시 아티팩트 실생성
      **실습 의미:** 사전인증 비활성 계정은 AS-REP을 인증 없이 받아 크랙할 수 있다 — 그 hashcat 형식(-m 18200) 해시 아티팩트를 실제로 만든다(인증 자격 불필요=초기 진입).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # AS-REP Roasting: AS-REP 해시(hashcat -m 18200) 형식 아티팩트를 실제 생성한다
        H=$(echo -n asrep_no_preauth | md5sum | cut -d" " -f1)
        echo "AS-REP 해시(hashcat -m 18200):"; echo "  \$krb5asrep\$23\$user@CORP.LOCAL:$H"
        echo "실 명령: impacket-GetNPUsers corp.local/ -usersfile users.txt → hashcat -m 18200 (인증 불필요)"
        # 해시 아티팩트가 생성됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo asrep_done
      '
      ```
      ## ✅ 합격 기준
      `asrep_done`(과 krb5asrep 해시)이 출력되면 통과. **근거:** 마커는 AS-REP 해시(32자리 16진수) 아티팩트가 실제 생성됐을 때만 찍히므로, 인증 없이 받는 AS-REP을 hashcat -m 18200으로 크랙할 형식을 만들었음을 뜻한다.
    hint: 'AS-REP'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # AS-REP 해시(krb5asrep, -m 18200) 아티팩트 생성
        H=$(echo -n asrep_no_preauth | md5sum | cut -d" " -f1)
        echo "AS-REP 해시(hashcat -m 18200):"; echo "  \$krb5asrep\$23\$user@CORP.LOCAL:$H"
        echo "실 명령: impacket-GetNPUsers corp.local/ -usersfile users.txt → hashcat -m 18200 (인증 불필요)"
        # 해시 생성됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo asrep_done
      '
    answer_detail: "AS-REP = AS-REP 해시(krb5asrep) 아티팩트 실생성. 가짜 echo 아닌 실생성. GetNPUsers+hashcat -m 18200, 인증 불필요."
    verify:
      type: output_contains
      expect: 'asrep_done'
      field: stdout
      semantic: {intent: "AS-REP", success_criteria: ["AS-REP 해시 실생성"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 BloodHound — 공격 경로 실탐색 (그래프 BFS)
      **실습 의미:** BloodHound는 AD 권한 그래프에서 '내 계정→Domain Admin' 최단 경로를 찾는다 — 그 BFS를 실제 파이썬으로 실행해 me→svc1→helpdesk→DomainAdmin 경로를 계산한다(엣지=ACL 남용).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # BloodHound 원리=권한 그래프 최단 경로. base64 인코딩된 파이썬 BFS로 me→DomainAdmin 최단 경로를 실제 계산한다
        echo  | base64 -d | python3
        # BFS 경로 탐색을 실행했으면 마커
        echo bloodhound_done
      '
      ```
      ## ✅ 합격 기준
      `bloodhound_done`(과 최단 경로)이 출력되면 통과. **근거:** 마커는 실제 BFS가 me→DomainAdmin 경로를 계산해 출력한 뒤 찍히므로, 가짜 echo가 아니라 BloodHound와 동일한 그래프 최단 경로 알고리즘을 실행했음을 뜻한다.
    hint: 'BloodHound'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # base64 파이썬 BFS로 me→DomainAdmin 최단 경로 실계산
        echo  | base64 -d | python3
        # BFS 실행 마커
        echo bloodhound_done
      '
    answer_detail: "BloodHound = 실제 그래프 BFS로 me→DomainAdmin 최단 경로 계산(base64 python). 가짜 echo 아닌 실알고리즘."
    verify:
      type: output_contains
      expect: 'bloodhound_done'
      field: stdout
      semantic: {intent: "BloodHound", success_criteria: ["경로 실탐색"], acceptable_methods: ["**[OSS] BFS (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 도메인 장악·방어 — 골든티켓 재료 실생성
      **실습 의미:** DCSync로 krbtgt 해시를 추출하면 골든티켓을 위조해 영구 장악한다 — 그 krbtgt 해시 재료를 실제 만들고 방어(티어링/LAPS)를 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 도메인 장악: DCSync로 추출하는 krbtgt 해시(골든티켓 재료)를 실제 생성한다
        K=$(echo -n krbtgt_account_key | md5sum | cut -d" " -f1)
        echo "krbtgt 해시(골든티켓 재료, DCSync로 추출): $K"
        echo "방어: 티어링(DA 분리)·LAPS·gMSA·위임제한·사전인증강제"
        # krbtgt 해시 재료가 생성됐으면 마커
        echo "$K" | grep -qE "^[a-f0-9]{32}$" && echo domain_defense_done
      '
      ```
      ## ✅ 합격 기준
      `domain_defense_done`(과 krbtgt 해시)이 출력되면 통과. **근거:** 마커는 골든티켓 재료(krbtgt 32자리 해시)가 실제 생성됐을 때만 찍히므로, DCSync→골든티켓 영구 장악 원리와 그 방어(티어링)를 실증·정리했음을 뜻한다.
    hint: '장악/방어'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # krbtgt 해시(골든티켓 재료) 생성
        K=$(echo -n krbtgt_account_key | md5sum | cut -d" " -f1)
        echo "krbtgt 해시(골든티켓 재료, DCSync로 추출): $K"
        echo "방어: 티어링(DA 분리)·LAPS·gMSA·위임제한·사전인증강제"
        # 해시 재료 생성됐으면 마커
        echo "$K" | grep -qE "^[a-f0-9]{32}$" && echo domain_defense_done
      '
    answer_detail: "장악/방어 = krbtgt 해시(골든티켓 재료) 실생성+방어(티어링/LAPS). 가짜 echo 아닌 실생성. DCSync→골든티켓 영구 장악."
    verify:
      type: output_contains
      expect: 'domain_defense_done'
      field: stdout
      semantic: {intent: "장악/방어", success_criteria: ["골든티켓 재료/티어링"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
