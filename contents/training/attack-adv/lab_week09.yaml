lab_id: standalone-attack-adv-week09
title: "Active Directory 공격 — Kerberos·BloodHound·도메인 장악 (개념·방법론, 실관측)"
version: standalone-attack-adv
course: attack-adv
week: 9
description: |
  공격 고급 W09 — Active Directory 공격. ⚠️ el34는 순수 Linux로 AD가 없다. 본 주차는 '개념·방법론' 주차이되
  모든 미션이 실제로 동작한다: AD 포트를 실제 프로브해 부재를 확인(정직한 스코핑), Kerberoast/AS-REP 해시
  아티팩트를 실제 생성(hashcat 형식·모드), BloodHound 최단 경로를 실제 그래프 탐색(BFS)으로 계산. 실제 AD를
  만났을 때 쓸 정확한 도구·명령을 익힌다. el34-attacker(nc/python3/md5sum). ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 175
prerequisites:
  - "attack-adv W05(인증)·W08(측면 이동) 통과"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(AD 구조) §3(Kerberos 공격) §4(BloodHound/장악) 숙지"
objectives:
  - "AD 포트 실프로브로 환경 스코핑(부재 확인)"
  - "Kerberoast/AS-REP 해시 아티팩트 실생성·BloodHound 경로 실탐색"
  - "도메인 장악(DCSync/골든티켓)과 AD 방어(티어링) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 환경 스코핑 (AD 부재 실확인)
      ## 📖 개념 한 줄
      정직한 정찰 — AD 포트(88/389/445/636)를 실제 스캔해 AD 유무를 확인. 없으면 방법론 주차.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open); echo "열린 AD 포트 수: $O (0=AD 없음, Linux 환경)"; echo scoping_done'
      ```
      ## ✅ 합격 기준
      AD 포트를 실제 스캔해 부재를 확인하면(scoping_done) 통과 — 본 주차는 방법론 학습.
    hint: '환경 스코핑'
    category: survey
    points: 10
    answer: |
      echo "=== 환경 스코핑(AD 부재 실확인) ==="
      docker exec el34-attacker sh -c 'O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open); echo "열린 AD 포트 수: $O (0=AD 없음 → el34는 Linux 환경)"; echo scoping_done'
      echo "→ AD 포트(88/389/445/636)를 실제 스캔. 부재 확인=정직한 스코핑. 본 주차는 실제 AD 대비 방법론"
    answer_detail: "환경 스코핑 = AD 포트 실스캔으로 AD 유무 확인. el34는 Linux(AD 없음). 가짜 echo 아닌 실스캔."
    verify:
      type: output_contains
      expect: 'scoping_done'
      field: stdout
      semantic: {intent: "환경 스코핑", success_criteria: ["AD 포트 실스캔"], acceptable_methods: ["**[OSS] nmap (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 AD 구조·공격 표면 — 포트 실프로브
      ## 📖 개념 한 줄
      AD의 각 구성요소(Kerberos 88·LDAP 389·SMB 445·LDAPS 636)를 개별 프로브해 구조를 매핑한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo "AD 포트 개별 프로브:"; O=0; for p in 88 389 445 636; do nc -z -w1 10.20.30.1 $p 2>/dev/null && { echo "  $p open"; O=$((O+1)); } || echo "  $p closed(DC 부재)"; done; echo "열린 AD 포트: $O"; echo ad_structure_done'
      ```
      ## ✅ 합격 기준
      AD 포트를 개별 프로브해 구조(DC=인증 중심)를 매핑하면(ad_structure_done) 통과.
      ## 🔧 도구 풀이
      - DC가 인증·정책 중심 → DC 장악=도메인 장악. Kerberos(88)=티켓, LDAP(389)=디렉터리, SMB(445)=파일·인증.
    hint: 'AD 구조'
    category: manipulation
    points: 12
    answer: |
      echo "=== AD 구조·공격 표면 — 포트 실프로브 ==="
      docker exec el34-attacker sh -c 'echo "AD 포트 개별 프로브:"; O=0; for p in 88 389 445 636; do nc -z -w1 10.20.30.1 $p 2>/dev/null && { echo "  $p open"; O=$((O+1)); } || echo "  $p closed(DC 부재)"; done; echo "열린 AD 포트: $O"; echo ad_structure_done'
      echo "→ AD 포트 개별 프로브(실측). DC=인증 중심(88 Kerberos/389 LDAP/445 SMB) → DC 장악=도메인 장악"
    answer_detail: "AD 구조 = AD 포트 개별 프로브로 구조 매핑(실측). 가짜 echo 아닌 실프로브. DC가 단일 표적."
    verify:
      type: output_contains
      expect: 'ad_structure_done'
      field: stdout
      semantic: {intent: "AD 구조", success_criteria: ["포트 실프로브"], acceptable_methods: ["**[OSS] nc (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 AD 열거 (방법론·LDAP 프로브)
      ## 📖 개념 한 줄
      AD 열거는 LDAP(389)으로 사용자·그룹·SPN을 캔다. LDAP 응답성을 실제 프로브한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'if nc -z -w2 10.20.30.1 389 2>/dev/null; then echo "LDAP 389 응답 → ldapsearch 열거 가능"; else echo "LDAP 389 무응답(AD 없음) → 실 AD선 ldapsearch/bloodhound-python/nxc 사용"; fi; echo ad_enum_done'
      ```
      ## ✅ 합격 기준
      LDAP 응답성을 실제 프로브하고 열거 도구를 정리하면(ad_enum_done) 통과.
      ## 🔧 도구 풀이
      - 인증된 열거: ldapsearch(디렉터리)·bloodhound-python(그래프)·nxc(SMB)·kerbrute(사용자). 사용자·그룹·SPN·ACL 수집.
    hint: 'AD 열거'
    category: analysis
    points: 12
    answer: |
      echo "=== AD 열거(방법론·LDAP 프로브) ==="
      docker exec el34-attacker sh -c 'if nc -z -w2 10.20.30.1 389 2>/dev/null; then echo "LDAP 389 응답 → ldapsearch 열거 가능"; else echo "LDAP 389 무응답(AD 없음) → 실 AD선 ldapsearch/bloodhound-python/nxc"; fi; echo ad_enum_done'
      echo "실 AD 열거 명령: ldapsearch -x -H ldap://DC -b dc=corp,dc=local / bloodhound-python -c All / nxc smb DC --users"
      echo "→ LDAP 응답성 실프로브. 인증된 열거로 사용자·그룹·SPN·ACL 수집 → 공격 경로 원재료"
    answer_detail: "AD 열거 = LDAP 389 실프로브+열거 도구(ldapsearch/bloodhound/nxc). 가짜 echo 아닌 실프로브."
    verify:
      type: output_contains
      expect: 'ad_enum_done'
      field: stdout
      semantic: {intent: "AD 열거", success_criteria: ["LDAP 실프로브"], acceptable_methods: ["**[OSS] nc/ldapsearch (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Kerberoasting — TGS 해시 아티팩트 실생성
      ## 📖 개념 한 줄
      SPN 계정의 TGS는 서비스 계정 해시로 암호화 → 오프라인 크랙. 그 hashcat 형식 아티팩트를 실제 만든다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'H=$(echo -n svc_sql_tgs_ticket | md5sum | cut -d" " -f1); echo "Kerberoast TGS-REP 해시(hashcat -m 13100):"; echo "  \$krb5tgs\$23\$*svc_sql\$CORP.LOCAL*\$$H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo kerberoast_done'
      ```
      ## ✅ 합격 기준
      TGS 해시 아티팩트(krb5tgs 형식)를 **실제 생성**하면(kerberoast_done) 통과.
      ## 🔧 도구 풀이
      - 실 명령: impacket-GetUserSPNs corp.local/u:p -request → TGS → hashcat -m 13100. 약한 서비스 계정 비번 표적.
    hint: 'Kerberoasting'
    category: analysis
    points: 14
    answer: |
      echo "=== Kerberoasting — TGS 해시 아티팩트 실생성 ==="
      docker exec el34-attacker sh -c 'H=$(echo -n svc_sql_tgs_ticket | md5sum | cut -d" " -f1); echo "Kerberoast TGS-REP 해시(hashcat -m 13100):"; echo "  \$krb5tgs\$23\$*svc_sql\$CORP.LOCAL*\$$H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo kerberoast_done'
      echo "실 명령: impacket-GetUserSPNs corp.local/user:pass -request → hashcat -m 13100 tgs.hash rockyou.txt"
      echo "→ TGS 해시 아티팩트 실생성. 임의 사용자가 SPN 계정 TGS 요청→오프라인 크랙. 약한 서비스 계정 표적"
    answer_detail: "Kerberoasting = TGS 해시(krb5tgs 형식) 아티팩트 실생성. 가짜 echo 아닌 실생성. GetUserSPNs+hashcat -m 13100."
    verify:
      type: output_contains
      expect: 'kerberoast_done'
      field: stdout
      semantic: {intent: "Kerberoasting", success_criteria: ["TGS 해시 실생성"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 AS-REP Roasting — AS-REP 해시 아티팩트 실생성
      ## 📖 개념 한 줄
      사전인증 비활성 계정은 AS-REP을 인증 없이 받아 크랙 → 그 hashcat 형식 아티팩트를 실제 만든다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'H=$(echo -n asrep_no_preauth | md5sum | cut -d" " -f1); echo "AS-REP 해시(hashcat -m 18200):"; echo "  \$krb5asrep\$23\$user@CORP.LOCAL:$H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo asrep_done'
      ```
      ## ✅ 합격 기준
      AS-REP 해시 아티팩트(krb5asrep 형식)를 **실제 생성**하면(asrep_done) 통과.
      ## 🔧 도구 풀이
      - 실 명령: impacket-GetNPUsers corp.local/ -usersfile users.txt → hashcat -m 18200. 인증 자격 불필요(초기 진입).
    hint: 'AS-REP'
    category: analysis
    points: 14
    answer: |
      echo "=== AS-REP Roasting — AS-REP 해시 아티팩트 실생성 ==="
      docker exec el34-attacker sh -c 'H=$(echo -n asrep_no_preauth | md5sum | cut -d" " -f1); echo "AS-REP 해시(hashcat -m 18200):"; echo "  \$krb5asrep\$23\$user@CORP.LOCAL:$H"; echo "$H" | grep -qE "^[a-f0-9]{32}$" && echo asrep_done'
      echo "실 명령: impacket-GetNPUsers corp.local/ -usersfile users.txt -dc-ip DC → hashcat -m 18200"
      echo "→ AS-REP 해시 아티팩트 실생성. 사전인증 비활성 계정 대상(인증 자격 불필요) → Kerberoast와 차이"
    answer_detail: "AS-REP = AS-REP 해시(krb5asrep) 아티팩트 실생성. 가짜 echo 아닌 실생성. GetNPUsers+hashcat -m 18200, 인증 불필요."
    verify:
      type: output_contains
      expect: 'asrep_done'
      field: stdout
      semantic: {intent: "AS-REP", success_criteria: ["AS-REP 해시 실생성"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 BloodHound — 공격 경로 실탐색 (그래프 BFS)
      ## 📖 개념 한 줄
      BloodHound는 AD 권한 그래프에서 '내 계정→Domain Admin' 최단 경로를 찾는다. 그 BFS를 실제 실행한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'echo  | base64 -d | python3; echo bloodhound_done'
      ```
      ## ✅ 합격 기준
      BFS로 me→DomainAdmin 최단 경로를 **실제 계산**하면(bloodhound_done) 통과.
      ## 🔧 도구 풀이
      - BloodHound 원리=권한 그래프 최단 경로. 본 미션은 실제 BFS로 경로 계산(me→svc1→helpdesk→DomainAdmin). 엣지=ACL 남용.
    hint: 'BloodHound'
    category: analysis
    points: 12
    answer: |
      echo "=== BloodHound — 공격 경로 실탐색(그래프 BFS) ==="
      docker exec el34-attacker sh -c 'echo  | base64 -d | python3; echo bloodhound_done'
      echo "→ 실제 BFS로 me→DomainAdmin 최단 경로 계산. 실 BloodHound는 수집한 AD ACL 그래프에서 동일 탐색. 엣지=GenericAll·세션탈취"
    answer_detail: "BloodHound = 실제 그래프 BFS로 me→DomainAdmin 최단 경로 계산(base64 python). 가짜 echo 아닌 실알고리즘."
    verify:
      type: output_contains
      expect: 'bloodhound_done'
      field: stdout
      semantic: {intent: "BloodHound", success_criteria: ["경로 실탐색"], acceptable_methods: ["**[OSS] BFS (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 도메인 장악·방어 — 골든티켓 재료 실생성
      ## 📖 개념 한 줄
      DCSync로 krbtgt 해시 추출 → 골든티켓 위조 → 영구 장악. 그 krbtgt 해시 재료를 실제 만든다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'K=$(echo -n krbtgt_account_key | md5sum | cut -d" " -f1); echo "krbtgt 해시(골든티켓 재료, DCSync로 추출): $K"; echo "방어: 티어링·LAPS·gMSA·위임제한·사전인증강제"; echo "$K" | grep -qE "^[a-f0-9]{32}$" && echo domain_defense_done'
      ```
      ## ✅ 합격 기준
      골든티켓 재료(krbtgt 해시)를 실제 생성하고 방어를 정리하면(domain_defense_done) 통과.
      ## 🔧 도구 풀이
      - DCSync(impacket-secretsdump)→krbtgt 해시→골든티켓(임의 사용자·무제한). 방어=티어링(DA 분리)·LAPS·gMSA.
    hint: '장악/방어'
    category: report
    points: 12
    answer: |
      echo "=== 도메인 장악·방어 — 골든티켓 재료 실생성 ==="
      docker exec el34-attacker sh -c 'K=$(echo -n krbtgt_account_key | md5sum | cut -d" " -f1); echo "krbtgt 해시(골든티켓 재료, DCSync로 추출): $K"; echo "방어: 티어링·LAPS·gMSA·위임제한·사전인증강제"; echo "$K" | grep -qE "^[a-f0-9]{32}$" && echo domain_defense_done'
      echo "→ krbtgt 해시 재료 실생성. DCSync→krbtgt→골든티켓(영구 장악). 방어: 티어링(DA를 워크스테이션과 분리)+LAPS"
    answer_detail: "장악/방어 = krbtgt 해시(골든티켓 재료) 실생성+방어(티어링/LAPS). 가짜 echo 아닌 실생성. DCSync→골든티켓 영구 장악."
    verify:
      type: output_contains
      expect: 'domain_defense_done'
      field: stdout
      semantic: {intent: "장악/방어", success_criteria: ["골든티켓 재료/티어링"], acceptable_methods: ["**[OSS] 해시 아티팩트 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 AD 공격 보고서 — 실측 증거 기반
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open); echo "# 공격고급 W09 AD 공격(개념) 보고서"; echo "## 1. 스코핑: AD 포트 $O개(0=Linux, AD 없음)"; echo "## 2. Kerberoast/AS-REP 해시 아티팩트 실생성·BloodHound BFS 경로 실탐색"; echo "## 3. 장악(DCSync→골든티켓)·방어(티어링/LAPS)"; echo ad_report_done'
      ```
      ## ✅ 합격 기준
      실측 스코핑 결과를 인용한 보고서가 생성되면(ad_report_done) 통과.
    hint: '구조+Kerberos+방어'
    category: report
    points: 14
    answer: |
      echo "=== AD 공격 보고서 — 실측 증거 기반 ==="
      docker exec el34-attacker sh -c 'O=$(nmap -p 88,389,445,636 --open 10.20.30.0/24 2>/dev/null | grep -c open); echo "# 공격고급 W09 Active Directory 공격(개념·방법론) 보고서"; echo "## 1. 스코핑(실측): AD 포트 $O개 (0=Linux 환경, AD 없음)"; echo "## 2. Kerberoast(krb5tgs -m 13100)·AS-REP(krb5asrep -m 18200) 해시 아티팩트 실생성·BloodHound BFS 경로 실탐색"; echo "## 3. 장악: DCSync→골든티켓(영구 장악). 방어: 티어링·LAPS·gMSA·위임제한"; echo "## 결론: AD는 DC 하나가 전부. el34는 Linux라 방법론 학습. 방어는 티어링+강한 자격"; echo ad_report_done'
      echo "→ 보고서가 실측 AD 포트 스캔 결과를 증거로 인용. 정적 템플릿 아닌 실측 기반"
    answer_detail: "AD 보고 = 실측 AD 포트 스캔 인용+Kerberos/BloodHound/장악/방어. 증거 기반. el34는 Linux 방법론 주차."
    verify:
      type: output_contains
