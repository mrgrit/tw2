lab_id: standalone-attack-adv-week15
title: "침투 보고서·재현 가능성 — 발견을 행동으로 바꾼다"
version: standalone-attack-adv
course: attack-adv
week: 15
description: |
  공격 고급 W15 — 모의 침투의 완성: 보고. 아무리 잘 침투해도 보고가 부실하면 방어로 이어지지 않는다.
  보고서 구조(경영진/기술진)·위험 등급화(CVSS)·재현 가능 PoC·증거/추적성·윤리/법적 책임·개선 추적을
  다룬다. el34-attacker(python3로 CVSS 계산 등). 공격 고급 과정의 마무리. ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "attack-adv W01~W14 전 주차 통과(W14 캡스톤 포함)"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(보고서 구조) §3(CVSS/재현) §4(윤리/법적) 숙지"
objectives:
  - "경영진·기술진을 위한 보고서 구조 작성"
  - "CVSS로 위험을 등급화하고 재현 가능 PoC 작성"
  - "증거·추적성·윤리/법적 책임·개선 추적 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 보고의 가치
      ## 📖 개념 한 줄
      침투의 목적은 '뚫기'가 아니라 '방어 개선'. 보고서가 발견을 행동으로 바꾸는 다리다.
      ## 💻 실행 명령
      ```bash
      echo "좋은 보고서 = 경영진(위험·비용)+기술진(재현·수정)이 모두 행동 가능. 부실 보고=침투 무의미"
      docker exec el34-attacker sh -c "command -v python3 >/dev/null && echo report_tools_ok"; echo report_ready
      ```
      ## ✅ 합격 기준
      보고의 가치·도구가 정리되면(report_ready) 통과.
    hint: '보고 가치'
    category: survey
    points: 10
    answer: |
      echo "=== 보고의 가치 ==="
      echo "침투의 목적 = 방어 개선. 보고서 = 발견→행동의 다리"
      echo "부실 보고: 아무리 뚫어도 수정 안 됨 → 침투 무의미"
      docker exec el34-attacker sh -c "command -v python3 >/dev/null && echo report_tools_ok"; echo report_ready
      echo "→ 좋은 보고 = 경영진(위험/비용 판단)+기술진(재현/수정) 모두 행동 가능"
    answer_detail: "보고 가치 = 침투의 목적은 방어 개선, 보고서가 발견→행동의 다리. 부실 보고는 침투를 무의미하게 함."
    verify:
      type: output_contains
      expect: 'report_ready'
      field: stdout
      semantic: {intent: "보고 가치", success_criteria: ["발견→행동"], acceptable_methods: ["**[관리적] 보고 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 보고서 구조 (경영진·기술진)
      ## 💻 실행 명령
      ```bash
      echo "경영진 요약(위험/영향/비용, 비기술)+기술 상세(재현/증거/수정). 독자별 두 층 구조"
      ```
      ## ✅ 합격 기준
      보고서 두 층 구조가 정리되면 통과.
      ## 🔧 도구 풀이
      - Executive Summary(비즈니스 위험)+Technical Findings(재현·증거·remediation). 독자가 다르면 언어도 다름.
    hint: '보고서 구조'
    category: manipulation
    points: 12
    answer: |
      echo "=== 보고서 구조 — 골격 파일 실생성·검증 ==="
      docker exec el34-attacker sh -c 'printf "# Penetration Test Report\n## 1. Executive Summary\n## 2. Methodology/Scope\n## 3. Technical Findings\n## 4. Appendix\n" > /tmp/rpt15.md; echo "생성된 보고서 골격:"; cat /tmp/rpt15.md; grep -q "Executive Summary" /tmp/rpt15.md && grep -q "Technical Findings" /tmp/rpt15.md && echo "경영진(Exec)+기술진(Findings) 섹션 확인" && echo structure_done; rm -f /tmp/rpt15.md'
      echo "→ 보고서 골격 파일을 실제 생성→경영진/기술진 두 섹션 존재 검증(grep 게이트). 독자별 두 층 구조"
    answer_detail: "보고서 구조 = 골격 파일 실생성+Exec/Findings 섹션 grep 검증. 가짜 echo 아닌 실생성. 독자별 두 층."
    verify:
      type: output_contains
      expect: 'structure_done'
      field: stdout
      semantic: {intent: "보고서 구조", success_criteria: ["경영진/기술진"], acceptable_methods: ["**[관리적] 구조 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 위험 등급화 (CVSS)
      ## 📖 개념 한 줄
      발견의 심각도를 CVSS로 객관 점수화한다 — 우선순위의 근거.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "python3 -c \"print('SQLi 예: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H → CVSS 9.8(Critical)'); print('등급: 0-3.9 Low / 4-6.9 Medium / 7-8.9 High / 9-10 Critical')\""; echo cvss_done
      ```
      ## ✅ 합격 기준
      CVSS 등급화가 정리되면(cvss_done) 통과.
      ## 🔧 도구 풀이
      - CVSS: 공격벡터·복잡도·권한·영향(CIA)으로 0~10 점수. 객관 우선순위 + 비즈니스 맥락 보정.
    hint: 'CVSS'
    category: analysis
    points: 14
    answer: |
      echo "=== 위험 등급화(CVSS) ==="
      docker exec el34-attacker sh -c "python3 -c \"print('SQLi 예: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H → CVSS 9.8(Critical)'); print('등급: 0-3.9 Low / 4.0-6.9 Medium / 7.0-8.9 High / 9.0-10 Critical')\""; echo cvss_done
      echo "→ CVSS = 공격벡터(N=원격)·복잡도(L)·권한(N)·영향(CIA)로 0~10 점수. 객관 우선순위"
      echo "→ 보정: 비즈니스 맥락(노출도·데이터 민감도)으로 실제 위험 조정"
    answer_detail: "CVSS = 공격벡터/복잡도/권한/영향(CIA)으로 0~10 점수화. 객관 우선순위+비즈니스 맥락 보정."
    verify:
      type: output_contains
      expect: 'cvss_done'
      field: stdout
      semantic: {intent: "CVSS", success_criteria: ["점수화/등급"], acceptable_methods: ["**[설명] CVSS (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 재현 가능 PoC
      ## 📖 개념 한 줄
      개발자가 그대로 따라 재현할 수 있는 단계별 PoC — 재현 안 되면 수정도 검증도 불가.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo '재현 PoC 예(W14 태그):'; echo 'curl -H \"Host: dvwa.el34.lab\" \"http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%201=1--\"'; echo '→ 정확한 요청·파라미터·기대 결과 명시'"; echo poc_done
      ```
      ## ✅ 합격 기준
      재현 가능 PoC 원칙이 정리되면(poc_done) 통과.
      ## 🔧 도구 풀이
      - 재현 PoC: 정확한 명령·입력·환경·기대 결과. 스크린샷·요청/응답. 재현성 = 보고의 신뢰성.
    hint: '재현 PoC'
    category: analysis
    points: 14
    answer: |
      echo "=== 재현 가능 PoC ==="
      docker exec el34-attacker sh -c "echo '재현 PoC 예(W14 태그 aa14cap):'; echo 'curl -H \"Host: dvwa.el34.lab\" \"http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%201=1--\"'; echo '구성: 정확한 요청+파라미터+환경+기대 결과+스크린샷'"; echo poc_done
      echo "→ 재현 안 되는 발견은 무시됨. 개발자가 그대로 따라할 수 있어야 수정·재검증 가능"
    answer_detail: "재현 PoC = 정확한 명령/입력/환경/기대결과+증거. 재현성=신뢰성. 재현 안 되면 수정·검증 불가."
    verify:
      type: output_contains
      expect: 'poc_done'
      field: stdout
      semantic: {intent: "재현 PoC", success_criteria: ["단계별 재현"], acceptable_methods: ["**[관리적] PoC (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 증거·추적성
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo 'evidence' | sha256sum | cut -c1-16; echo '→ 증거 해시+타임스탬프+귀속 태그로 추적성'"; echo evidence_done
      ```
      ## ✅ 합격 기준
      증거·추적성이 정리되면(evidence_done) 통과.
      ## 🔧 도구 풀이
      - 증거: 요청/응답·스크린샷·로그. 해시+시각+태그(aa14cap)로 추적성·무결성(방어 chain of custody와 대칭).
    hint: '증거/추적성'
    category: analysis
    points: 12
    answer: |
      echo "=== 증거·추적성 ==="
      docker exec el34-attacker sh -c "echo 'evidence' | sha256sum | cut -c1-16; echo '→ 증거 무결성 해시'"; echo evidence_done
      echo "증거: 요청/응답 로그·스크린샷·명령 기록"
      echo "추적성: SHA-256 해시+타임스탬프+귀속 태그(aa14cap) → 무결성·내 활동 입증"
      echo "→ 방어자의 chain of custody(soc-adv W07/W11)와 대칭 — 공격자도 증거를 무결하게 보존"
    answer_detail: "증거/추적성 = 요청/응답/스크린샷+해시+시각+태그. 무결성·활동 입증. 방어 chain of custody와 대칭."
    verify:
      type: output_contains
      expect: 'evidence_done'
      field: stdout
      semantic: {intent: "증거/추적성", success_criteria: ["해시/태그"], acceptable_methods: ["**[OSS] sha256 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 윤리·법적 책임
      ## 💻 실행 명령
      ```bash
      echo "RoE 준수·범위 엄수·기밀 유지·책임 공개(responsible disclosure)·데이터 비유출. 인가가 합법의 경계"
      ```
      ## ✅ 합격 기준
      윤리·법적 책임이 정리되면 통과.
    hint: '윤리/법적'
    category: report
    points: 12
    answer: |
      echo "=== 윤리·법적 — RoE 문서 실생성·인가 필드 검증 ==="
      docker exec el34-attacker sh -c 'printf "engagement: el34 pentest\nscope: 10.20.30.0/24\nauthorized: yes\nstart: 2026-06-01\nend: 2026-06-30\ndisclosure: responsible\n" > /tmp/roe15.yaml; echo "RoE(교전 규칙) 문서:"; cat /tmp/roe15.yaml; grep -q "authorized: yes" /tmp/roe15.yaml && grep -q "scope:" /tmp/roe15.yaml && echo "서면 인가+범위 확인(합법 경계)" && echo ethics_done; rm -f /tmp/roe15.yaml'
      echo "→ RoE 문서를 실제 생성→인가(authorized)·범위(scope) 필드 검증. 인가가 합법/불법의 경계"
    answer_detail: "윤리/법적 = RoE 문서 실생성+인가/범위 필드 grep 검증. 가짜 echo 아닌 실생성. 인가가 합법의 경계."
    verify:
      type: output_contains
      expect: 'ethics_done'
      field: stdout
      semantic: {intent: "윤리/법적", success_criteria: ["인가/범위/공개"], acceptable_methods: ["**[관리적] 윤리 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 개선 추적·재검증
      ## 💻 실행 명령
      ```bash
      echo "발견→remediation→재검증(retest). 수정 확인까지가 침투의 완결. 퍼플팀(soc-adv W13)으로 순환"
      ```
      ## ✅ 합격 기준
      개선 추적·재검증이 정리되면 통과.
    hint: '개선 추적'
    category: report
    points: 12
    answer: |
      echo "=== 개선 추적·재검증 — 발견 재검증(retest) 실수행 ==="
      docker exec el34-attacker sh -c 'code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20pass"); echo "발견(SQLi) 재검증(retest) 응답: $code"; [ "$code" = "403" ] && echo "→ WAF 차단(수정/방어 작동 확인)" || echo "→ 미차단(추가 조치 필요)"; [ -n "$code" ] && echo retest_done'
      echo "→ 보고한 발견(SQLi)을 실제 재검증. 수정/방어 작동 확인까지가 침투의 완결. 퍼플팀(soc-adv W13)으로 순환"
    answer_detail: "개선 추적·재검증 = 발견(SQLi) 실제 retest로 수정/방어 확인. 가짜 echo 아닌 실재검증. 수정 확인까지가 완결."
    verify:
      type: output_contains
      expect: 'retest_done'
      field: stdout
      semantic: {intent: "개선 추적", success_criteria: ["remediation/retest"], acceptable_methods: ["**[관리적] 재검증 (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 종합 침투 보고서 (과정 캡스톤)
      ## 💻 보고서 양식
      ```markdown
      # 공격고급 W15 침투 보고서 (학번, 이름)
      ## 1. Executive Summary(경영진)·Scope/RoE
      ## 2. Findings(재현 PoC·CVSS·증거)
      ## 3. Remediation·재검증·윤리 준수
      ```
      ## ✅ 합격 기준
      보고서구조 + CVSS/재현 + 윤리/개선 포함.
    hint: '구조+CVSS/재현+윤리'
    category: report
    points: 14
    answer: |
      echo "=== 침투 보고서(과정 캡스톤) — 재검증 증거 기반 ==="
      docker exec el34-attacker sh -c 'R=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20pass"); echo "# 공격고급 W15 침투 보고서(과정 캡스톤)"; echo "## 1. Executive Summary: 전반 위험·영향. Scope/RoE: 인가 범위·기간"; echo "## 2. Findings: 재현 PoC·CVSS(SQLi 9.8 Critical)·증거. 재검증 SQLi 응답=$R(실측)"; echo "## 3. Remediation: 수정안·우선순위. 윤리: RoE 준수·기밀유지·책임공개"; echo "## 결론: 침투의 완성=방어 개선. 재현·CVSS·윤리가 신뢰의 3축. 공격(attack-adv)과 방어(soc-adv)는 양면"; echo pentest_report_done'
      echo "→ 보고서가 실제 재검증 응답코드를 증거로 인용. 정적 템플릿 아닌 실측 기반. 과정 캡스톤"
    answer_detail: "침투 보고 캡스톤 = 실측 재검증 응답 인용+구조/CVSS/윤리. 증거 기반. 침투 완성=방어 개선. 공방은 양면."
    verify:
      type: output_contains
      expect: 'pentest_report_done'
      field: stdout
      semantic: {intent: "침투 보고 캡스톤", success_criteria: ["구조/CVSS/윤리"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
