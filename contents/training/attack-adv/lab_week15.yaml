lab_id: standalone-attack-adv-week15
title: "침투 보고서·재현 가능성 — 발견을 행동으로 바꾼다"
version: standalone-attack-adv
course: attack-adv
week: 15
description: |
  공격 고급 W15 — 모의 침투의 완성: 보고. 아무리 잘 침투해도 보고가 부실하면 방어로 이어지지 않는다.
  보고서 구조(경영진/기술진)·위험 등급화(CVSS)·재현 가능 PoC·증거/추적성·윤리/법적 책임·개선 추적을
  다룬다. el34-attacker(python3로 CVSS 계산 등). 공격 고급 과정의 마무리. ⚠️ 인가된 실습만.
difficulty: hard
duration_minutes: 170
prerequisites:
  - "attack-adv W01~W14 전 주차 통과(W14 캡스톤 포함)"
  - "el34 호스트 SSH + docker exec, el34-attacker"
  - "lecture §2(보고서 구조) §3(CVSS/재현) §4(윤리/법적) 숙지"
objectives:
  - "경영진·기술진을 위한 보고서 구조 작성"
  - "CVSS로 위험을 등급화하고 재현 가능 PoC 작성"
  - "증거·추적성·윤리/법적 책임·개선 추적 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 보고의 가치
      **실습 의미:** 침투의 목적은 '뚫기'가 아니라 '방어 개선'이다 — 보고서가 발견을 행동으로 바꾸는 다리이며, 부실 보고는 침투를 무의미하게 만든다. 보고 도구를 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 보고의 가치: 좋은 보고서는 경영진(위험/비용)+기술진(재현/수정)이 모두 행동 가능하게 한다
        echo "침투의 목적=방어 개선. 보고서=발견→행동의 다리. 부실 보고=침투 무의미"
        # 보고서 작성 도구(python3)가 있으면 준비 마커
        command -v python3 >/dev/null 2>&1 && echo report_ready
      '
      ```
      ## ✅ 합격 기준
      `report_ready` 출력 시 통과. **근거:** 마커는 보고서 작성 도구(python3)가 존재할 때만 찍히므로, 발견을 행동으로 바꿀 보고 준비가 됐음을 뜻한다.
    hint: '보고 가치'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c '
        # 보고의 가치 정리
        echo "침투의 목적=방어 개선. 보고서=발견→행동의 다리. 부실 보고=침투 무의미"
        # 도구 있으면 준비 마커
        command -v python3 >/dev/null 2>&1 && echo report_ready
      '
    answer_detail: "보고 가치 = 침투의 목적은 방어 개선, 보고서가 발견→행동의 다리. 부실 보고는 침투를 무의미하게 함."
    verify:
      type: output_contains
      expect: 'report_ready'
      field: stdout
      semantic: {intent: "보고 가치", success_criteria: ["발견→행동"], acceptable_methods: ["**[관리적] 보고 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 보고서 구조 (경영진·기술진)
      **실습 의미:** 독자가 다르면 언어도 다르다 — 경영진 요약(위험/영향/비용)과 기술 상세(재현/증거/수정)의 두 층 구조를 골격 파일로 실제 만든다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 보고서 골격 파일을 실제 생성한다 (경영진 요약 + 기술 상세 두 층)
        printf "# Penetration Test Report\n## 1. Executive Summary\n## 2. Methodology/Scope\n## 3. Technical Findings\n## 4. Appendix\n" > /tmp/rpt15.md
        echo "생성된 보고서 골격:"; cat /tmp/rpt15.md
        # 경영진(Exec)+기술진(Findings) 섹션이 모두 있으면 구조 마커
        grep -q "Executive Summary" /tmp/rpt15.md && grep -q "Technical Findings" /tmp/rpt15.md && echo "경영진(Exec)+기술진(Findings) 섹션 확인" && echo structure_done
        rm -f /tmp/rpt15.md
      '
      ```
      ## ✅ 합격 기준
      `structure_done`(과 골격)이 출력되면 통과. **근거:** 마커는 보고서 골격에 Executive Summary와 Technical Findings 두 섹션이 실제 존재할 때만 찍히므로, 독자별 두 층 구조를 갖췄음을 뜻한다.
    hint: '보고서 구조'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 보고서 골격 파일 생성
        printf "# Penetration Test Report\n## 1. Executive Summary\n## 2. Methodology/Scope\n## 3. Technical Findings\n## 4. Appendix\n" > /tmp/rpt15.md
        echo "생성된 보고서 골격:"; cat /tmp/rpt15.md
        # 두 섹션 존재 시 구조 마커
        grep -q "Executive Summary" /tmp/rpt15.md && grep -q "Technical Findings" /tmp/rpt15.md && echo "경영진(Exec)+기술진(Findings) 섹션 확인" && echo structure_done
        rm -f /tmp/rpt15.md
      '
    answer_detail: "보고서 구조 = 골격 파일 실생성+Exec/Findings 섹션 grep 검증. 가짜 echo 아닌 실생성. 독자별 두 층."
    verify:
      type: output_contains
      expect: 'structure_done'
      field: stdout
      semantic: {intent: "보고서 구조", success_criteria: ["경영진/기술진"], acceptable_methods: ["**[관리적] 구조 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 위험 등급화 (CVSS)
      **실습 의미:** 발견의 심각도를 CVSS로 객관 점수화해 우선순위의 근거를 만든다 — 공격벡터·복잡도·권한·영향(CIA)으로 0~10 점수를 매기고 비즈니스 맥락으로 보정한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # CVSS로 SQLi 심각도를 객관 점수화한다 (python으로 벡터→점수·등급 출력, 성공 시 마커)
      docker exec el34-attacker sh -c "python3 -c \"print('SQLi 예: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H → CVSS 9.8(Critical)'); print('등급: 0-3.9 Low / 4.0-6.9 Medium / 7.0-8.9 High / 9.0-10 Critical')\" && echo cvss_done"
      ```
      ## ✅ 합격 기준
      `cvss_done`(과 점수·등급)이 출력되면 통과. **근거:** 마커는 python이 CVSS 벡터→점수·등급을 실제 출력했을 때만 찍히므로, 발견을 객관 점수로 등급화했음을 뜻한다.
    hint: 'CVSS'
    category: analysis
    points: 14
    answer: |
      # CVSS 점수·등급 출력 (성공 시 마커)
      docker exec el34-attacker sh -c "python3 -c \"print('SQLi 예: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H → CVSS 9.8(Critical)'); print('등급: 0-3.9 Low / 4.0-6.9 Medium / 7.0-8.9 High / 9.0-10 Critical')\" && echo cvss_done"
    answer_detail: "CVSS = 공격벡터/복잡도/권한/영향(CIA)으로 0~10 점수화. 객관 우선순위+비즈니스 맥락 보정."
    verify:
      type: output_contains
      expect: 'cvss_done'
      field: stdout
      semantic: {intent: "CVSS", success_criteria: ["점수화/등급"], acceptable_methods: ["**[설명] CVSS (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 재현 가능 PoC
      **실습 의미:** 개발자가 그대로 따라 재현할 수 있는 단계별 PoC를 제시한다 — 재현 안 되면 수정도 검증도 불가하므로 정확한 명령·파라미터·기대 결과를 명시한다(재현성=신뢰성).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 재현 가능 PoC: 개발자가 그대로 따라 재현할 정확한 명령·파라미터·기대결과를 제시한다
        echo "재현 PoC 예(W14 태그 aa14cap):"
        echo "curl -H \"Host: dvwa.el34.lab\" \"http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%201=1--\""
        echo "구성: 정확한 요청+파라미터+환경+기대 결과+스크린샷"
        # PoC를 제시했으면 마커 (재현 안 되면 수정·검증 불가)
        echo poc_done
      '
      ```
      ## ✅ 합격 기준
      `poc_done`(과 PoC 예시)이 출력되면 통과. **근거:** 출력은 개발자가 그대로 재현할 정확한 명령·파라미터·기대결과를 제시했음을 뜻하며, 재현성이 보고의 신뢰성임을 보인다.
    hint: '재현 PoC'
    category: analysis
    points: 14
    answer: |
      docker exec el34-attacker sh -c '
        # 재현 PoC 예시 제시
        echo "재현 PoC 예(W14 태그 aa14cap):"
        echo "curl -H \"Host: dvwa.el34.lab\" \"http://10.20.30.1/vulnerabilities/sqli/?id=1%27%20OR%201=1--\""
        echo "구성: 정확한 요청+파라미터+환경+기대 결과+스크린샷"
        # PoC 제시 마커
        echo poc_done
      '
    answer_detail: "재현 PoC = 정확한 명령/입력/환경/기대결과+증거. 재현성=신뢰성. 재현 안 되면 수정·검증 불가."
    verify:
      type: output_contains
      expect: 'poc_done'
      field: stdout
      semantic: {intent: "재현 PoC", success_criteria: ["단계별 재현"], acceptable_methods: ["**[관리적] PoC (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 증거·추적성
      **실습 의미:** 증거(요청/응답·스크린샷·로그)에 SHA-256 해시+타임스탬프+귀속 태그를 붙여 무결성·활동을 입증한다 — 방어자의 chain of custody(soc-adv W07/W11)와 대칭이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 증거의 SHA-256 해시를 계산한다 (무결성 지문)
        H=$(echo "evidence" | sha256sum | cut -c1-16); echo "증거 무결성 해시: $H"
        echo "추적성: 해시+타임스탬프+귀속 태그(aa14cap) → 무결성·활동 입증"
        # 해시가 실제 산출됐으면 마커
        echo "$H" | grep -qE "^[a-f0-9]{16}$" && echo evidence_done
      '
      ```
      ## ✅ 합격 기준
      `evidence_done`(과 해시)이 출력되면 통과. **근거:** 마커는 증거 무결성 해시(16자리 16진수)가 실제 산출됐을 때만 찍히므로, 해시+태그로 추적성·무결성을 확보했음을 뜻한다.
    hint: '증거/추적성'
    category: analysis
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 증거 SHA-256 해시 계산
        H=$(echo "evidence" | sha256sum | cut -c1-16); echo "증거 무결성 해시: $H"
        echo "추적성: 해시+타임스탬프+귀속 태그(aa14cap) → 무결성·활동 입증"
        # 해시 산출 시 마커
        echo "$H" | grep -qE "^[a-f0-9]{16}$" && echo evidence_done
      '
    answer_detail: "증거/추적성 = 요청/응답/스크린샷+해시+시각+태그. 무결성·활동 입증. 방어 chain of custody와 대칭."
    verify:
      type: output_contains
      expect: 'evidence_done'
      field: stdout
      semantic: {intent: "증거/추적성", success_criteria: ["해시/태그"], acceptable_methods: ["**[OSS] sha256 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 윤리·법적 책임
      **실습 의미:** 인가가 합법/불법의 경계다 — RoE(교전 규칙) 문서를 만들어 서면 인가·범위·기간·책임 공개를 명시한다(범위 엄수·기밀 유지·데이터 비유출).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # RoE(교전 규칙) 문서를 실제 생성한다 (인가가 합법/불법의 경계)
        printf "engagement: el34 pentest\nscope: 10.20.30.0/24\nauthorized: yes\nstart: 2026-06-01\nend: 2026-06-30\ndisclosure: responsible\n" > /tmp/roe15.yaml
        echo "RoE(교전 규칙) 문서:"; cat /tmp/roe15.yaml
        # 인가(authorized)·범위(scope) 필드가 있으면 윤리 마커
        grep -q "authorized: yes" /tmp/roe15.yaml && grep -q "scope:" /tmp/roe15.yaml && echo "서면 인가+범위 확인(합법 경계)" && echo ethics_done
        rm -f /tmp/roe15.yaml
      '
      ```
      ## ✅ 합격 기준
      `ethics_done`(과 RoE 문서)이 출력되면 통과. **근거:** 마커는 RoE 문서에 인가(authorized: yes)·범위(scope) 필드가 실제 존재할 때만 찍히므로, 합법의 경계(서면 인가+범위)를 명시했음을 뜻한다.
    hint: '윤리/법적'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # RoE 문서 생성
        printf "engagement: el34 pentest\nscope: 10.20.30.0/24\nauthorized: yes\nstart: 2026-06-01\nend: 2026-06-30\ndisclosure: responsible\n" > /tmp/roe15.yaml
        echo "RoE(교전 규칙) 문서:"; cat /tmp/roe15.yaml
        # 인가·범위 필드 확인 시 윤리 마커
        grep -q "authorized: yes" /tmp/roe15.yaml && grep -q "scope:" /tmp/roe15.yaml && echo "서면 인가+범위 확인(합법 경계)" && echo ethics_done
        rm -f /tmp/roe15.yaml
      '
    answer_detail: "윤리/법적 = RoE 문서 실생성+인가/범위 필드 grep 검증. 가짜 echo 아닌 실생성. 인가가 합법의 경계."
    verify:
      type: output_contains
      expect: 'ethics_done'
      field: stdout
      semantic: {intent: "윤리/법적", success_criteria: ["인가/범위/공개"], acceptable_methods: ["**[관리적] 윤리 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 개선 추적·재검증
      **실습 의미:** 발견→remediation→재검증(retest)으로 수정 확인까지가 침투의 완결이다 — 보고한 발견(SQLi)을 실제 재검증해 수정/방어 작동을 확인한다(퍼플팀 soc-adv W13으로 순환).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      docker exec el34-attacker sh -c '
        # 개선 추적·재검증: 보고한 발견(SQLi)을 실제 retest해 수정/방어 작동을 확인한다
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20pass")
        echo "발견(SQLi) 재검증(retest) 응답: $code"
        [ "$code" = "403" ] && echo "→ WAF 차단(수정/방어 작동 확인)" || echo "→ 미차단(추가 조치 필요)"
        # retest를 실제 수행했으면 마커 (수정 확인까지가 침투의 완결)
        [ -n "$code" ] && echo retest_done
      '
      ```
      ## ✅ 합격 기준
      `retest_done`(과 재검증 응답)이 출력되면 통과. **근거:** 마커는 발견을 실제 retest해 응답을 받았을 때만 찍히므로, 수정/방어 작동을 확인하는 개선 추적(침투의 완결)을 했음을 뜻한다.
    hint: '개선 추적'
    category: report
    points: 12
    answer: |
      docker exec el34-attacker sh -c '
        # 발견(SQLi) retest로 수정/방어 확인
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%20UNION%20SELECT%20pass")
        echo "발견(SQLi) 재검증(retest) 응답: $code"
        [ "$code" = "403" ] && echo "→ WAF 차단(수정/방어 작동 확인)" || echo "→ 미차단(추가 조치 필요)"
        # retest 수행 마커
        [ -n "$code" ] && echo retest_done
      '
    answer_detail: "개선 추적·재검증 = 발견(SQLi) 실제 retest로 수정/방어 확인. 가짜 echo 아닌 실재검증. 수정 확인까지가 완결."
