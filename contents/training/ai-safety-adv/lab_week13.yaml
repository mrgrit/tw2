lab_id: ai-safety-adv-week13
title: "W13 — AI 거버넌스+규제: EU AI Act 등급·NIST RMF 매핑·컴플라이언스 자동점검"
version: ai
course: ai-safety-adv
week: 13
description: |
  AI 거버넌스를 실습한다. EU AI Act 위험 등급 분류(RISK_TIER), NIST AI RMF 4함수 매핑(RMF_MAPPED),
  규제 요건 컴플라이언스 자동 점검(COMPLIANCE_CHECKED), 종합 보고서(Assessment). 대부분 결정적 파이썬.
difficulty: easy
duration_minutes: 120
audience: AI Safety 고급 (13주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W13 강의안 정독 — §0.5(EU AI Act 4등급·NIST RMF 4함수)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "AI 시스템을 EU AI Act 위험 등급으로 분류(RISK_TIER)"
  - "위험 관리 활동을 NIST RMF 4함수에 매핑(RMF_MAPPED)"
  - "규제 요건을 자동 점검(COMPLIANCE_CHECKED)"
  - "종합 거버넌스 권고(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with a one sentence definition of AI governance.","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      AI governance is the policies, roles, and controls that hold an organization accountable for its AI.
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — EU AI Act 위험 등급 분류 → RISK_TIER
      > **🎯 목표:** AI 시스템의 용도로 금지/고위험/제한적/최소를 판정한다.
      > **개념:** 용도가 등급을 정한다. bastion(인프라 자율 운영)은 고위험.
      ```bash
      python3 - <<'PY'
      def classify(use_case):
          u=use_case.lower()
          if any(k in u for k in ["social scoring","subliminal","manipulat"]): return "PROHIBITED"
          if any(k in u for k in ["medical","hiring","critical infrastructure","law enforcement","firewall","security operations"]): return "HIGH"
          if any(k in u for k in ["chatbot","assistant","recommend"]): return "LIMITED"
          return "MINIMAL"
      systems=["bastion: autonomous firewall/security operations agent",
               "customer support chatbot",
               "government social scoring system",
               "game NPC dialogue generator"]
      for s in systems: print(f"  {classify(s):10} <- {s[:45]}")
      print("RISK_TIER: bastion ->", classify("bastion: autonomous firewall/security operations agent"))
      PY
      ```
      ✅ 출력에 `RISK_TIER:` (bastion=HIGH).
      🔎 고위험은 인간 감독·로깅·위험 평가·데이터 품질 요건이 붙는다.
    answer: |
      HIGH       <- bastion: autonomous firewall/security operations
      LIMITED    <- customer support chatbot
      PROHIBITED <- government social scoring system
      MINIMAL    <- game NPC dialogue generator
      RISK_TIER: bastion -> HIGH
    answer_detail: "용도 기반 EU AI Act 등급 분류 → RISK_TIER. bastion=고위험(인프라 운영)."
    verify:
      type: output_contains
      expect: "RISK_TIER:"
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — NIST AI RMF 매핑 → RMF_MAPPED
      > **🎯 목표:** 지난 주차 활동을 GOVERN/MAP/MEASURE/MANAGE 4함수에 배치한다.
      > **개념:** 우리가 한 ASR 측정·방어·모니터링이 곧 MEASURE·MANAGE 실무.
      ```bash
      python3 - <<'PY'
      activities={
        "AI 책임자 지정·정책 문서":"GOVERN",
        "이 AI가 어디 쓰이고 무엇이 위험한지 식별":"MAP",
        "ASR·오탐·편향 지표 측정(W01~W12)":"MEASURE",
        "방어 적용·지속 감시·사고 대응":"MANAGE",
      }
      for act,fn in activities.items(): print(f"  [{fn:8}] {act}")
      funcs=set(activities.values())
      print("RMF_MAPPED" if funcs=={"GOVERN","MAP","MEASURE","MANAGE"} else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `RMF_MAPPED` (4함수 모두 매핑).
      🔎 거버넌스는 기술 활동(MEASURE/MANAGE) 위에 책임·정책(GOVERN)을 얹는다.
    answer: |
      [GOVERN  ] AI 책임자 지정·정책 문서
      [MAP     ] 이 AI가 어디 쓰이고 무엇이 위험한지 식별
      [MEASURE ] ASR·오탐·편향 지표 측정(W01~W12)
      [MANAGE  ] 방어 적용·지속 감시·사고 대응
      RMF_MAPPED
    answer_detail: "활동을 NIST RMF 4함수에 매핑 → RMF_MAPPED. 우리 실습=MEASURE·MANAGE 실무."
    verify:
      type: output_contains
      expect: RMF_MAPPED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 컴플라이언스 자동 점검 → COMPLIANCE_CHECKED
      > **🎯 목표:** AI 설정을 입력받아 고위험 요건 충족 여부를 자동 판정한다.
      > **개념:** 미충족 항목이 곧 개선 과제.
      ```bash
      python3 - <<'PY'
      # bastion 설정 예시 (고위험 요건 점검)
      config={"logging_enabled":True, "human_oversight":True, "risk_assessment_doc":False,
              "data_quality_controls":True, "incident_response_plan":False}
      REQUIRED=["logging_enabled","human_oversight","risk_assessment_doc","data_quality_controls","incident_response_plan"]
      missing=[r for r in REQUIRED if not config.get(r)]
      for r in REQUIRED: print(f"  {'OK ' if config.get(r) else 'MISS'} {r}")
      print(f"missing={missing}")
      print("COMPLIANCE_CHECKED")
      PY
      ```
      ✅ 마지막 줄 `COMPLIANCE_CHECKED` (미충족: risk_assessment_doc·incident_response_plan).
      🔎 미충족이 개선 백로그가 된다. 자동 점검을 CI/배포에 넣어 규제 드리프트를 막는다.
    answer: |
      OK  logging_enabled ... MISS risk_assessment_doc ... MISS incident_response_plan
      missing=['risk_assessment_doc', 'incident_response_plan']
      COMPLIANCE_CHECKED
    answer_detail: "고위험 요건 자동 점검 → COMPLIANCE_CHECKED. 미충족 항목=개선 과제."
    verify:
      type: output_contains
      expect: COMPLIANCE_CHECKED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 보고서 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short AI governance assessment for W13. Findings: an autonomous security agent (bastion) classifies as EU AI Act HIGH risk (RISK_TIER), activities mapped to NIST RMF GOVERN/MAP/MEASURE/MANAGE (RMF_MAPPED), and a compliance check found missing risk-assessment doc and incident-response plan (COMPLIANCE_CHECKED). Give guidance and 3 recommendations (assign accountability/GOVERN, keep audit logs and human oversight for high-risk, automate compliance checks in CI). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":280}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 W13 종합: 안전은 기술+정책+책임의 삼각형. 고위험 AI는 인간 감독·감사·위험 평가가 의무.
      다음 주(W14)는 사고가 났을 때의 **AI 인시던트 대응**.
    answer: |
      Assessment
      Guidance: bastion is high-risk; governance is mandatory, not optional.
      Recommendations: (1) assign accountability (GOVERN), (2) keep audit logs and human oversight,
      (3) automate compliance checks in CI.
    answer_detail: "W13 종합 거버넌스 권고(Assessment). 기술+정책+책임의 삼각형."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
