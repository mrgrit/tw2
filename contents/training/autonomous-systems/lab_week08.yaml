lab_id: autonomous-systems-week08
title: "W08 — 중간 평가: 사이버→물리 공격 경로·다층 방어·안전 우선순위"
version: ai
course: autonomous-systems
week: 8
description: |
  W01~W07 종합. 사이버→물리 공격 경로 구성(CPS_PATH), 다층 방어 평가(DEFENSE_LAYERED), 안전 우선순위
  방어 정렬(SAFETY_PRIORITIZED), 종합(Assessment).
  사이버 공격이 물리 결과로 — 3계층·겹층 방어·안전 최우선.
difficulty: hard
duration_minutes: 150
audience: 자율 시스템 보안 (8주차·중간 평가)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W07 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "사이버→물리 공격 경로 구성(CPS_PATH)"
  - "다층 방어 평가(DEFENSE_LAYERED)"
  - "안전 우선순위 방어 정렬(SAFETY_PRIORITIZED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 사이버→물리 공격 경로 → CPS_PATH
      > **🎯 목표:** 사이버 진입이 물리 결과로 이어지는 경로 구성.
      > **개념:** CPS는 사이버 공격이 물리 사고.
      ```bash
      # 사이버→브리지→물리 공격 경로를 기록한다.
      cat > /tmp/cpspath2_STU42.txt <<'EOF'
      cyber    deauth WiFi + MAVLink injection (W03)
      bridge   autopilot executes forged NAV_LAND
      physical drone diverted/crash
      EOF
      cat /tmp/cpspath2_STU42.txt
      [ "$(cut -d' ' -f1 /tmp/cpspath2_STU42.txt | tr '\n' ',')" = "cyber,bridge,physical," ] && tail -1 /tmp/cpspath2_STU42.txt | grep -qE "crash|diverted" && echo CPS_PATH || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `CPS_PATH` (사이버→브리지→물리 추락 경로).
      🔎 WiFi deauth+MAVLink 인젝션(사이버)→autopilot 위조 명령 수용(브리지)→추락/유도(물리). 사이버가 물리 재앙.
    answer: |
      [cyber   ] deauth WiFi + MAVLink injection (W03)
      [bridge  ] autopilot accepts forged land/redirect
      [physical] drone crashes / diverted to no-fly zone
      CPS_PATH
    answer_detail: "사이버→브리지→물리 공격 경로 구성 → CPS_PATH."
    verify:
      type: output_contains
      expect: CPS_PATH
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 다층 방어 평가 → DEFENSE_LAYERED
      > **🎯 목표:** 각 공격 단계에 방어 겹층이 있는지 평가.
      > **개념:** 한 겹 뚫려도 다음 겹이 안전.
      ```bash
      # 다층 방어(계층별 통제 2개 이상)를 파일로 기록한다.
      cat > /tmp/deflayer_STU42.txt <<'EOF'
      comms: MAVLink signing, WiFi WPA2
      navigation: GPS anti-spoof, alt-nav
      perception: sensor redundancy, consistency
      last_resort: failsafe RTL, safety monitor
      EOF
      cat /tmp/deflayer_STU42.txt
      # 4개 계층이 모두 2개 이상 통제를 가지고 최후 안전(last_resort)이 있으면 다층 방어.
      C=$(awk -F: '{n=split($2,a,","); if(n>=2)print}' /tmp/deflayer_STU42.txt | wc -l)
      { [ "$C" -eq 4 ] && grep -q "last_resort" /tmp/deflayer_STU42.txt; } && echo DEFENSE_LAYERED || echo GAPS
      ```
      ✅ 마지막 줄 `DEFENSE_LAYERED` (통신·항법·인식·최후 안전 각 단계 겹층 방어).
      🔎 통신 서명+GPS 안티스푸핑+센서 중복성+페일세이프/안전 모니터. 각 단계에 겹층이 있어 한 겹 뚫려도 안전.
    answer: |
      comms       : ['MAVLink signing', 'WiFi WPA2']
      navigation  : ['GPS anti-spoof', 'alt-nav']
      perception  : ['sensor redundancy', 'consistency']
      last_resort : ['failsafe RTL', 'safety monitor']
      DEFENSE_LAYERED
    answer_detail: "각 단계 다층 방어+독립 안전 계층 → DEFENSE_LAYERED."
    verify:
      type: output_contains
      expect: DEFENSE_LAYERED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 안전 우선순위 → SAFETY_PRIORITIZED
      > **🎯 목표:** 인명·물리 위협을 데이터 위협보다 우선 정렬.
      > **개념:** CPS는 안전 최우선.
      ```bash
      # 위협을 안전 영향 기준으로 우선순위화한다.
      cat > /tmp/safeprio_STU42.csv <<'EOF'
      hijack over crowd,life,10,2
      GPS spoof divert,physical,6,3
      telemetry eavesdrop,data,1,3
      EOF
      awk -F, '{printf "  %-22s 안전가중 위험=%d (%s)\n",$1,$3*$4,$2}' /tmp/safeprio_STU42.csv | sort -t= -k2 -rn
      # 안전 가중 최고 위협의 영향이 생명(life)이면 안전 우선순위 확정.
      TOP=$(awk -F, '{print $3*$4","$2}' /tmp/safeprio_STU42.csv | sort -rn | head -1)
      echo "$TOP" | grep -q "life" && echo SAFETY_PRIORITIZED || echo CHECK
      ```
      ✅ 마지막 줄 `SAFETY_PRIORITIZED` (군중 위 하이재킹(인명)이 최우선, 감청(데이터) 후순위).
      🔎 인명 위협(하이재킹)을 물리·데이터 위협보다 우선 가중. CPS 방어는 안전(인명·물리) 최우선.
    answer: |
      hijack over crowd      [life] risk 20
      GPS spoof divert       [physical] risk 18
      telemetry eavesdrop    [data] risk 3
      SAFETY_PRIORITIZED
    answer_detail: "안전(인명>물리>데이터) 우선순위 정렬 → SAFETY_PRIORITIZED."
    verify:
      type: output_contains
      expect: SAFETY_PRIORITIZED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W08, a midterm on drone and self-driving security. Findings: a cyber-to-physical attack path from WiFi deauth and MAVLink injection to a drone crash was built (CPS_PATH), layered defenses across comms, navigation, perception, and a last-resort safety layer were assessed (DEFENSE_LAYERED), and threats were prioritized by safety with a life-threatening hijack first (SAFETY_PRIORITIZED). Explain that CPS security tracks how cyber attacks cause physical consequences and uses layered defense with safety first. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: CPS 평가=3계층+사이버→물리 경로+안전 우선 다층 방어. 사이버 공격의 물리 결과를 이해하고 겹층으로 방어.
      다음 주(W09)는 **로봇 보안(ROS2)**.
    answer: |
      Assessment
      CPS security tracks how cyber attacks (deauth, injection) become physical consequences (crash), and layers defenses across comms, navigation, perception, and a last-resort safety layer.
      Threats are prioritized by safety, putting life-threatening hijacking first.
    answer_detail: "W08 CPS 중간 평가 종합(Assessment). 사이버→물리 경로·다층 방어·안전 우선."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
