lab_id: autonomous-systems-week15
title: "W15 — 종합 평가: 전체 CPS 3계층 침투·안전 우선 다층 방어·핵심 원칙 종합"
version: ai
course: autonomous-systems
week: 15
description: |
  W01~W14 종합. 전체 CPS 3계층 종합 평가·사이버→물리 경로(FULL_CPS_PENTEST), 안전 우선 다층 방어
  (DEFENSE_SYNTHESIZED), CPS 보안 5대 원칙 종합(SYNTHESIS), 최종 종합(Assessment).
  CPS는 사이버 공격이 물리 결과 — 3계층·심층 방어·안전 최우선.
difficulty: hard
duration_minutes: 150
audience: 자율 시스템 보안 (15주차·종합)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W14 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "전체 CPS 3계층 종합 평가(FULL_CPS_PENTEST)"
  - "안전 우선 다층 방어(DEFENSE_SYNTHESIZED)"
  - "CPS 보안 5대 원칙 종합(SYNTHESIS)"
  - "최종 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 전체 CPS 종합 평가 → FULL_CPS_PENTEST
      > **🎯 목표:** CPS를 3계층에서 점검하고 사이버→물리 경로 구성.
      > **개념:** 3계층 + 물리 결과.
      ```bash
      # CPS 3계층(cyber/bridge/physical) 전체 침투 경로를 보고서 파일로 종합한다.
      cat > /tmp/fullcps_STU42.txt <<'EOF'
      cyber    deauth + MAVLink injection (W03) / GPS spoof (W05)
      bridge   autopilot executes forged commands / trusts spoofed GPS
      physical drone crash or diversion over populated area
      EOF
      cat /tmp/fullcps_STU42.txt
      M=""; for l in cyber bridge physical; do grep -q "^$l" /tmp/fullcps_STU42.txt || M=1; done
      [ -z "$M" ] && echo FULL_CPS_PENTEST || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `FULL_CPS_PENTEST` (3계층 평가 + 사이버→물리 경로).
      🔎 사이버(GPS/MAVLink)·브리지(autopilot 신뢰)·물리(모터) 3계층 점검 + GPS 스푸핑→위조 위치→유도/추락 경로.
    answer: |
      cyber    deauth + MAVLink injection (W03) / GPS spoof (W05)
      bridge   autopilot executes forged commands / trusts spoofed GPS
      physical drone crash or diversion over populated area
      FULL_CPS_PENTEST
    answer_detail: "전체 CPS 3계층 평가+사이버→물리 경로 → FULL_CPS_PENTEST."
    verify:
      type: output_contains
      expect: FULL_CPS_PENTEST
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 안전 우선 다층 방어 → DEFENSE_SYNTHESIZED
      > **🎯 목표:** 안전 우선으로 다층 방어를 종합·우선순위.
      > **개념:** 독립 안전 계층이 최후 보루.
      ```bash
      # 안전 우선 다층 방어를 보고서 파일로 종합한다.
      cat > /tmp/defsynth_STU42.txt <<'EOF'
      cyber: MAVLink 서명·WPA2/3·SROS2
      navigation: GPS 안티스푸핑·INS 대체 항법
      perception: 센서 중복·일관성 검사
      last_resort: 페일세이프 RTL·독립 안전 모니터(사이버와 분리)
      EOF
      cat /tmp/defsynth_STU42.txt
      M=""; for s in cyber navigation perception last_resort; do grep -q "^$s" /tmp/defsynth_STU42.txt || M=1; done
      [ -z "$M" ] && echo DEFENSE_SYNTHESIZED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `DEFENSE_SYNTHESIZED` (독립 안전 계층 최우선, 프라이버시 후순위).
      🔎 독립 페일세이프/지오펜싱(보안 뚫려도 안전)이 최우선. 통신·GPS 방어가 그다음, 프라이버시는 후순위. 안전 우선.
    answer: |
      cyber: MAVLink 서명·WPA2/3·SROS2
      navigation: GPS 안티스푸핑·INS 대체 항법
      perception: 센서 중복·일관성 검사
      last_resort: 페일세이프 RTL·독립 안전 모니터(사이버와 분리)
      DEFENSE_SYNTHESIZED
    answer_detail: "안전 우선 다층 방어(독립 안전 계층 최우선) → DEFENSE_SYNTHESIZED."
    verify:
      type: output_contains
      expect: DEFENSE_SYNTHESIZED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 핵심 원칙 종합 → SYNTHESIS
      > **🎯 목표:** CPS 보안 5대 원칙 구현 확인.
      > **개념:** 3계층·경로·심층 방어·안전 최우선·CPS 대응.
      ```bash
      # CPS 보안 핵심 원칙을 보고서 파일로 종합한다(과목 결론).
      cat > /tmp/synthesis_STU42.txt <<'EOF'
      1. CPS 는 cyber/physical/bridge 3계층 — 사이버 침해가 물리 피해로 전이.
      2. 안전(safety)이 보안(security)보다 우선 — 물리 안전 먼저.
      3. 단일 신호 불신 — 다중 센서·항법 교차검증(GPS/센서 스푸핑 대비).
      4. 독립 안전 시스템(SIS/failsafe)은 사이버와 분리해 최후 방어.
      EOF
      cat /tmp/synthesis_STU42.txt
      grep -q "3계층" /tmp/synthesis_STU42.txt && grep -qE "안전.*우선|safety" /tmp/synthesis_STU42.txt && grep -qE "독립 안전|failsafe|SIS" /tmp/synthesis_STU42.txt && echo SYNTHESIS || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `SYNTHESIS` (3계층·사이버→물리 경로·심층 방어·안전 최우선·CPS 대응 5대 원칙).
      🔎 CPS 보안=3계층 점검+사이버→물리 경로+심층 방어+안전 최우선+CPS 대응. 과목의 결론.
    answer: |
      1. CPS 는 cyber/physical/bridge 3계층 — 사이버 침해가 물리 피해로 전이.
      2. 안전(safety)이 보안(security)보다 우선 — 물리 안전 먼저.
      3. 단일 신호 불신 — 다중 센서·항법 교차검증(GPS/센서 스푸핑 대비).
      4. 독립 안전 시스템(SIS/failsafe)은 사이버와 분리해 최후 방어.
      SYNTHESIS
    answer_detail: "CPS 보안 5대 원칙 종합 → SYNTHESIS. 과목 결론."
    verify:
      type: output_contains
      expect: SYNTHESIS
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone note for an autonomous systems (CPS) security course. Findings: a delivery drone was assessed across cyber/physical/bridge layers with a cyber-to-physical attack path (FULL_CPS_PENTEST), defenses were prioritized by safety with an independent safety layer first (DEFENSE_SYNTHESIZED), and five principles (three-layer model, cyber-to-physical path, defense in depth, safety first, CPS incident response) were confirmed (SYNTHESIS). Conclude that in CPS a cyber attack becomes a physical consequence, defense is safety-first defense in depth, and lives are at stake. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: CPS 침투 평가=3계층+사이버→물리 경로+안전 우선 심층 방어. 사이버 공격이 물리 결과, 생명이 걸려 있다. 수고했습니다.
      다음(autonomous-security)은 자율 보안 과목.
    answer: |
      Assessment
      In CPS a cyber attack becomes a physical consequence, assessed across cyber/physical/bridge layers with cyber-to-physical paths.
      Defense is safety-first defense in depth with an independent safety layer, because lives are at stake.
    answer_detail: "W15 CPS 종합 평가(Assessment). 3계층·경로·안전 우선 심층 방어."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
