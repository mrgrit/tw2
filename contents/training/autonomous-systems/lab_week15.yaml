lab_id: autonomous-systems-week15
title: "W15 — 종합 평가: 전체 CPS 3계층 침투·안전 우선 다층 방어·핵심 원칙 종합"
version: ai
course: autonomous-systems
week: 15
description: |
  W01~W14 종합. 전체 CPS 3계층 종합 평가·사이버→물리 경로(FULL_CPS_PENTEST), 안전 우선 다층 방어
  (DEFENSE_SYNTHESIZED), CPS 보안 5대 원칙 종합(SYNTHESIS), 최종 종합(Assessment).
  CPS는 사이버 공격이 물리 결과 — 3계층·심층 방어·안전 최우선.
difficulty: hard
duration_minutes: 150
audience: 자율 시스템 보안 (15주차·종합)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W14 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "전체 CPS 3계층 종합 평가(FULL_CPS_PENTEST)"
  - "안전 우선 다층 방어(DEFENSE_SYNTHESIZED)"
  - "CPS 보안 5대 원칙 종합(SYNTHESIS)"
  - "최종 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 전체 CPS 종합 평가 → FULL_CPS_PENTEST
      > **🎯 목표:** CPS를 3계층에서 점검하고 사이버→물리 경로 구성.
      > **개념:** 3계층 + 물리 결과.
      ```bash
      python3 - <<'PY'
      # 자율 배송 드론 시스템 종합
      assessment={"cyber":["MAVLink no signing","GPS spoofable"],
                  "bridge":["autopilot trusts commands/GPS"],
                  "physical":["motors","no geofence backup"]}
      layers=set(assessment.keys())
      # 사이버→물리 경로
      path=[("cyber","GPS spoof + MAVLink inject (W03,W05)"),
            ("bridge","autopilot follows fake position/command"),
            ("physical","drone diverted/crashed over people")]
      for l in ["cyber","bridge","physical"]: print(f"  {l:8}: {assessment[l]}")
      print("path:", " -> ".join(f"[{l}]{s}" for l,s in path))
      complete = {"cyber","bridge","physical"}.issubset(layers) and path[-1][0]=="physical"
      print("FULL_CPS_PENTEST" if complete else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `FULL_CPS_PENTEST` (3계층 평가 + 사이버→물리 경로).
      🔎 사이버(GPS/MAVLink)·브리지(autopilot 신뢰)·물리(모터) 3계층 점검 + GPS 스푸핑→위조 위치→유도/추락 경로.
    answer: |
      cyber   : ['MAVLink no signing', 'GPS spoofable']
      bridge  : ['autopilot trusts commands/GPS']
      physical: ['motors', 'no geofence backup']
      path: [cyber]GPS spoof + MAVLink inject (W03,W05) -> [bridge]autopilot follows fake position/command -> [physical]drone diverted/crashed over people
      FULL_CPS_PENTEST
    answer_detail: "전체 CPS 3계층 평가+사이버→물리 경로 → FULL_CPS_PENTEST."
    verify:
      type: output_contains
      expect: FULL_CPS_PENTEST
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 안전 우선 다층 방어 → DEFENSE_SYNTHESIZED
      > **🎯 목표:** 안전 우선으로 다층 방어를 종합·우선순위.
      > **개념:** 독립 안전 계층이 최후 보루.
      ```bash
      python3 - <<'PY'
      defenses=[{"fix":"independent failsafe/geofence (safety layer)","safety_critical":True,"risk":10},
                {"fix":"MAVLink signing + WiFi encryption","safety_critical":True,"risk":8},
                {"fix":"GPS anti-spoof + alt-nav","safety_critical":True,"risk":8},
                {"fix":"telemetry encryption (privacy)","safety_critical":False,"risk":4}]
      ranked=sorted(defenses, key=lambda d:(d["safety_critical"], d["risk"]), reverse=True)
      for d in ranked: print(f"  [risk {d['risk']}{' SAFETY' if d['safety_critical'] else ''}] {d['fix']}")
      top=ranked[0]
      # 독립 안전 계층(최후 보루)이 최우선
      print("DEFENSE_SYNTHESIZED" if top["safety_critical"] and top["risk"]==10 else "CHECK")
      PY
      ```
      ✅ 마지막 줄 `DEFENSE_SYNTHESIZED` (독립 안전 계층 최우선, 프라이버시 후순위).
      🔎 독립 페일세이프/지오펜싱(보안 뚫려도 안전)이 최우선. 통신·GPS 방어가 그다음, 프라이버시는 후순위. 안전 우선.
    answer: |
      [risk 10 SAFETY] independent failsafe/geofence (safety layer)
      [risk 8 SAFETY] MAVLink signing + WiFi encryption
      [risk 8 SAFETY] GPS anti-spoof + alt-nav
      [risk 4] telemetry encryption (privacy)
      DEFENSE_SYNTHESIZED
    answer_detail: "안전 우선 다층 방어(독립 안전 계층 최우선) → DEFENSE_SYNTHESIZED."
    verify:
      type: output_contains
      expect: DEFENSE_SYNTHESIZED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 핵심 원칙 종합 → SYNTHESIS
      > **🎯 목표:** CPS 보안 5대 원칙 구현 확인.
      > **개념:** 3계층·경로·심층 방어·안전 최우선·CPS 대응.
      ```bash
      python3 - <<'PY'
      principles={
        "three_layer_model":["cyber/physical/bridge (W01)"],
        "cyber_to_physical_path":["comms/AI/GPS -> physical (W03,W05,W07)"],
        "defense_in_depth":["comms+sensor redundancy+anti-spoof+AI robustness (W02-13)"],
        "safety_first":["independent safety layer, failsafe (W01,W11,W14)"],
        "cps_incident_response":["physical-safety-first IR (W14)"],
      }
      implemented=all(len(e)>=1 for e in principles.values())
      for p,e in principles.items(): print(f"  {p:24}: {e[0]}")
      print("all 5 principles:", implemented)
      print("SYNTHESIS" if implemented else "GAPS")
      PY
      ```
      ✅ 마지막 줄 `SYNTHESIS` (3계층·사이버→물리 경로·심층 방어·안전 최우선·CPS 대응 5대 원칙).
      🔎 CPS 보안=3계층 점검+사이버→물리 경로+심층 방어+안전 최우선+CPS 대응. 과목의 결론.
    answer: |
      three_layer_model       : cyber/physical/bridge (W01)
      cyber_to_physical_path  : comms/AI/GPS -> physical (W03,W05,W07)
      defense_in_depth        : comms+sensor redundancy+anti-spoof+AI robustness (W02-13)
      safety_first            : independent safety layer, failsafe (W01,W11,W14)
      cps_incident_response   : physical-safety-first IR (W14)
      all 5 principles: True
      SYNTHESIS
    answer_detail: "CPS 보안 5대 원칙 종합 → SYNTHESIS. 과목 결론."
    verify:
      type: output_contains
      expect: SYNTHESIS
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone note for an autonomous systems (CPS) security course. Findings: a delivery drone was assessed across cyber/physical/bridge layers with a cyber-to-physical attack path (FULL_CPS_PENTEST), defenses were prioritized by safety with an independent safety layer first (DEFENSE_SYNTHESIZED), and five principles (three-layer model, cyber-to-physical path, defense in depth, safety first, CPS incident response) were confirmed (SYNTHESIS). Conclude that in CPS a cyber attack becomes a physical consequence, defense is safety-first defense in depth, and lives are at stake. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: CPS 침투 평가=3계층+사이버→물리 경로+안전 우선 심층 방어. 사이버 공격이 물리 결과, 생명이 걸려 있다. 수고했습니다.
      다음(autonomous-security)은 자율 보안 과목.
    answer: |
      Assessment
      In CPS a cyber attack becomes a physical consequence, assessed across cyber/physical/bridge layers with cyber-to-physical paths.
      Defense is safety-first defense in depth with an independent safety layer, because lives are at stake.
    answer_detail: "W15 CPS 종합 평가(Assessment). 3계층·경로·안전 우선 심층 방어."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
