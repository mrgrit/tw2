lab_id: autonomous-systems-week12
title: "W12 — V2X/자동차: BSM 로그 분석·위조 안전 메시지 탐지·1609.2 PKI/오작동 탐지"
version: ai
course: autonomous-systems
week: 12
description: |
  V2X(차량-사물 통신)는 차량이 서로 **BSM**(기본 안전 메시지: 위치·속도·방향)을 방송해 충돌을 예방한다. 문제는
  메시지가 **인증되지 않으면** 공격자가 유령 차량·가짜 급제동을 방송해 주변 차량을 급감속·회피시켜 사고를 유발한다는
  것이다. 이번 주는 **실제 아티팩트(BSM 수신 로그)로** (1) 무인증 구조를 확인하고, (2) 물리적으로 불가능한 위조
  메시지를 `awk` 로 탐지하며, (3) IEEE 1609.2 PKI 서명 검증 + 오작동 탐지로 위조가 거부됨을 확인한다.

  모든 명령은 사람이 한 줄씩 직접 입력한다. el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)에서 실행하며,
  분석 아티팩트(BSM 로그)는 이 실습이 `/tmp` 에 직접 만든다.
difficulty: medium
duration_minutes: 120
audience: 자율 시스템 (12주차)
prerequisites:
  - "el34 호스트 접속: `ssh ccc@{{TARGET_IP}}` (비밀번호 `1`)"
  - "GPU Ollama 도달 — http://211.170.162.139:10934 (gemma3:4b), 종합용"
  - "도구: grep·awk·python3 (el34 에 존재)"
  - "W12 강의안 정독 — §0.5(V2X·BSM·1609.2 PKI·오작동 탐지)"
objectives:
  - "GPU 응답 확인 (GEN_OK)"
  - "BSM 로그에서 무인증(무서명) 구조 확인 (V2X_VULNERABLE)"
  - "물리적으로 불가능한 위조 안전 메시지 탐지 (MESSAGE_SPOOFED)"
  - "1609.2 PKI 검증·오작동 탐지로 위조 거부 (V2X_SECURED)"
  - "종합 소견 (Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION
      종합용 GPU(gemma3) 응답 확인.
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## 📋 확인 사항 — 마지막 줄 `GEN_OK`
      ## 🔍 결과 해석 — 정상 `GEN_OK` / 비정상 `GEN_EMPTY`·연결오류
    hint: "curl /api/generate → response 있으면 GEN_OK."
    category: survey
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## 🎯 MISSION
      **BSM 수신 로그**를 만들고, 안전 메시지에 **서명/인증서가 없음(무인증)**을 확인한다.

      ## 💻 실행 명령
      ```bash
      LOG=/tmp/v2x_bsm_STU42.log
      # 1) BSM 로그: id, 위치(lat/lon), 속도, 이벤트, 서명 유무.
      cat > "$LOG" <<'EOF'
      t=1.0 id=V-A lat=37.3010 lon=127.0100 speed=60 event=none  sig=absent
      t=1.1 id=V-B lat=37.3009 lon=127.0102 speed=58 event=none  sig=absent
      t=1.2 id=V-A lat=37.3011 lon=127.0101 speed=60 event=none  sig=absent
      EOF

      # 2) 각 메시지의 서명 여부를 확인한다(안전 메시지가 서명 없이 방송되는지).
      echo "[서명 상태]"; awk '{print "  ", $1, $2, $(NF)}' "$LOG"

      # 3) 판정: 모든 BSM 이 서명 없음(sig=absent)이면 무인증 = 위조 가능.
      T=$(wc -l < "$LOG"); A=$(grep -c "sig=absent" "$LOG")
      test "$A" = "$T" && echo V2X_VULNERABLE || echo SIGNED
      ```
      ## 📋 확인 사항
      - 모든 BSM 이 `sig=absent`
      - 마지막 줄 `V2X_VULNERABLE`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — BSM 이 서명 없이 방송되면, 누구나 임의 차량을 사칭해 위치·속도·긴급 이벤트를 방송할 수
      > 있다. 주변 차량은 이를 믿고 제동·회피하므로, 무인증 V2X 는 원격 유발 사고의 통로다.

      ## 🔍 결과 해석 — 정상 `V2X_VULNERABLE`
    hint: "BSM 로그 생성 → 모든 메시지 sig=absent 확인 → V2X_VULNERABLE."
    category: recon
    answer: |
      LOG=/tmp/v2x_bsm_STU42.log
      # 1) BSM 로그: id, 위치(lat/lon), 속도, 이벤트, 서명 유무.
      cat > "$LOG" <<'EOF'
      t=1.0 id=V-A lat=37.3010 lon=127.0100 speed=60 event=none  sig=absent
      t=1.1 id=V-B lat=37.3009 lon=127.0102 speed=58 event=none  sig=absent
      t=1.2 id=V-A lat=37.3011 lon=127.0101 speed=60 event=none  sig=absent
      EOF
      
      # 2) 각 메시지의 서명 여부를 확인한다(안전 메시지가 서명 없이 방송되는지).
      echo "[서명 상태]"; awk '{print "  ", $1, $2, $(NF)}' "$LOG"
      
      # 3) 판정: 모든 BSM 이 서명 없음(sig=absent)이면 무인증 = 위조 가능.
      T=$(wc -l < "$LOG"); A=$(grep -c "sig=absent" "$LOG")
      test "$A" = "$T" && echo V2X_VULNERABLE || echo SIGNED
    answer_detail: "모든 BSM 이 무서명 = 임의 차량 사칭 가능. 무인증 V2X 는 원격 사고 유발 통로."
    verify:
      type: output_contains
      expect: V2X_VULNERABLE
      field: stdout
      semantic:
        intent: "BSM 로그에서 무인증(무서명) 구조 확인."
        success_criteria:
          - "안전 메시지 무서명 확인"
          - "V2X_VULNERABLE 출력"

  - order: 3
    instruction: |
      ## 🎯 MISSION
      로그에 섞인 **위조 안전 메시지**를 `awk` 로 탐지한다 — 물리적으로 불가능한 값(순간이동·비현실적 감속)을 가진
      유령 차량/가짜 급제동.

      ## 💻 실행 명령
      ```bash
      LOG=/tmp/v2x_spoof_STU42.log
      # 정상 BSM + 위조: 같은 id 가 0.1초 만에 순간이동, 그리고 유령 차량의 급제동(HARD_BRAKE) 방송.
      cat > "$LOG" <<'EOF'
      t=2.0 id=V-A lat=37.3010 lon=127.0100 speed=60 event=none       sig=absent
      t=2.1 id=V-A lat=37.3500 lon=127.0600 speed=60 event=none       sig=absent
      t=2.2 id=GHOST lat=37.3011 lon=127.0101 speed=0 event=HARD_BRAKE sig=absent
      EOF

      # 1) 같은 id 의 0.1초 간 위치 점프(순간이동)를 계산한다.
      awk '{split($3,a,"="); split($4,b,"="); id=$2; lat=a[2]+0;
            if(prev[id]!=""){ d=lat-prev[id]; if(d<0)d=-d;
              if(d>0.01) printf "  %s 순간이동 Δlat=%.4f  <-- 위조!\n", id, d }
            prev[id]=lat }' "$LOG"
      # 2) 급제동/정지(speed=0 HARD_BRAKE) 유령 차량 방송을 표시한다.
      awk '/HARD_BRAKE/{print "  가짜 급제동 방송:", $2, $5, $6}' "$LOG"

      # 3) 판정: 순간이동 또는 유령 급제동이 있으면 위조 메시지.
      awk '{split($3,a,"="); id=$2; lat=a[2]+0; if(prev[id]!=""){d=lat-prev[id]; if(d<0)d=-d; if(d>0.01)f=1} prev[id]=lat} /HARD_BRAKE/{f=1} END{print (f?"MESSAGE_SPOOFED":"PLAUSIBLE")}' "$LOG"
      ```
      ## 📋 확인 사항
      - `V-A 순간이동 Δlat=0.0490 <-- 위조!`, `가짜 급제동 방송: id=GHOST speed=0 event=HARD_BRAKE`
      - 마지막 줄 `MESSAGE_SPOOFED`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — 공격자는 존재하지 않는 유령 차량이 바로 앞에서 급정거했다고 방송해 뒤차를 급제동·급회피
      > 시켜 추돌을 유발한다. 하지만 **물리 정합성**(한 차량이 0.1초에 5km 이동 불가, 유령의 급출현)이 위조의 흔적이다.

      ## 🔍 결과 해석 — 정상 `MESSAGE_SPOOFED` + 위조 식별
    hint: "awk 로 같은 id 순간이동(Δlat>0.01) 또는 HARD_BRAKE 유령 차량 탐지 → MESSAGE_SPOOFED."
    category: exploit
    answer: |
      LOG=/tmp/v2x_spoof_STU42.log
      # 정상 BSM + 위조: 같은 id 가 0.1초 만에 순간이동, 그리고 유령 차량의 급제동(HARD_BRAKE) 방송.
      cat > "$LOG" <<'EOF'
      t=2.0 id=V-A lat=37.3010 lon=127.0100 speed=60 event=none       sig=absent
      t=2.1 id=V-A lat=37.3500 lon=127.0600 speed=60 event=none       sig=absent
      t=2.2 id=GHOST lat=37.3011 lon=127.0101 speed=0 event=HARD_BRAKE sig=absent
      EOF
      
      # 1) 같은 id 의 0.1초 간 위치 점프(순간이동)를 계산한다.
      awk '{split($3,a,"="); split($4,b,"="); id=$2; lat=a[2]+0;
            if(prev[id]!=""){ d=lat-prev[id]; if(d<0)d=-d;
              if(d>0.01) printf "  %s 순간이동 Δlat=%.4f  <-- 위조!\n", id, d }
            prev[id]=lat }' "$LOG"
      # 2) 급제동/정지(speed=0 HARD_BRAKE) 유령 차량 방송을 표시한다.
      awk '/HARD_BRAKE/{print "  가짜 급제동 방송:", $2, $5, $6}' "$LOG"
      
      # 3) 판정: 순간이동 또는 유령 급제동이 있으면 위조 메시지.
      awk '{split($3,a,"="); id=$2; lat=a[2]+0; if(prev[id]!=""){d=lat-prev[id]; if(d<0)d=-d; if(d>0.01)f=1} prev[id]=lat} /HARD_BRAKE/{f=1} END{print (f?"MESSAGE_SPOOFED":"PLAUSIBLE")}' "$LOG"
    answer_detail: "같은 차량의 물리 불가능 순간이동 + 유령 차량 급제동 방송 = 위조 안전 메시지. 물리 정합성으로 탐지."
    verify:
      type: output_contains
      expect: MESSAGE_SPOOFED
      field: stdout
      semantic:
        intent: "물리적으로 불가능한 위조 안전 메시지 탐지."
        success_criteria:
          - "순간이동 또는 유령 급제동 등 위조 식별"
          - "MESSAGE_SPOOFED 출력"

  - order: 4
    instruction: |
      ## 🎯 MISSION
      **IEEE 1609.2 PKI 서명 검증 + 오작동 탐지**가 적용된 로그와 대비한다 — 유효 인증서 없는 위조 메시지가 거부됨.

      ## 💻 실행 명령
      ```bash
      SLOG=/tmp/v2x_pki_STU42.log
      # 각 BSM 에 1609.2 인증서 검증 결과 + 오작동 탐지(MBD) 판정.
      cat > "$SLOG" <<'EOF'
      t=3.0 id=V-A  cert=valid(1609.2)  mbd=plausible   action=accept
      t=3.1 id=V-A  cert=valid(1609.2)  mbd=plausible   action=accept
      t=3.2 id=GHOST cert=none          mbd=implausible action=reject(무인증서+물리모순)
      EOF
      echo "[검증 통과]"; grep "action=accept" "$SLOG"
      echo "[위조 거부]"; grep "action=reject" "$SLOG"
      # 판정: 인증서 검증 + 오작동 탐지로 위조가 거부되면 방어 성립.
      grep -q "cert=none" "$SLOG" && grep -q "action=reject" "$SLOG" && echo V2X_SECURED || echo NO_PKI
      ```
      ## 📋 확인 사항
      - 정상 차량 `cert=valid(1609.2) accept`, 유령 `cert=none ... reject`
      - 마지막 줄 `V2X_SECURED`

      ## 💡 왜 이걸 하는가?
      IEEE 1609.2 는 각 BSM 에 **단기 익명 인증서**로 서명해 사칭을 막고(프라이버시 보존), **오작동 탐지(MBD)**는
      서명이 유효해도 물리적으로 모순된 메시지를 걸러 인증서 오남용까지 차단한다. 서명+정합성의 이중 방어다.

      ## 🔍 결과 해석 — 정상 `V2X_SECURED`
    hint: "1609.2 로그 생성 → 위조가 cert=none + action=reject 확인 → V2X_SECURED."
    category: defense
    answer: |
      SLOG=/tmp/v2x_pki_STU42.log
      # 각 BSM 에 1609.2 인증서 검증 결과 + 오작동 탐지(MBD) 판정.
      cat > "$SLOG" <<'EOF'
      t=3.0 id=V-A  cert=valid(1609.2)  mbd=plausible   action=accept
      t=3.1 id=V-A  cert=valid(1609.2)  mbd=plausible   action=accept
      t=3.2 id=GHOST cert=none          mbd=implausible action=reject(무인증서+물리모순)
      EOF
      echo "[검증 통과]"; grep "action=accept" "$SLOG"
      echo "[위조 거부]"; grep "action=reject" "$SLOG"
      # 판정: 인증서 검증 + 오작동 탐지로 위조가 거부되면 방어 성립.
      grep -q "cert=none" "$SLOG" && grep -q "action=reject" "$SLOG" && echo V2X_SECURED || echo NO_PKI
    answer_detail: "1609.2 인증서 서명(사칭 차단)+오작동 탐지(물리 모순 차단)로 위조 거부. 서명+정합성 이중 방어."
    verify:
      type: output_contains
      expect: V2X_SECURED
      field: stdout

  - order: 5
    instruction: |
      ## 🎯 MISSION
      W12 발견(무인증 BSM·위조 안전 메시지·PKI/오작동 탐지)을 소견으로 정리한다. (정리: `rm -f /tmp/v2x_*STU42.log`)
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a concise note for Week 12 of an autonomous systems course on V2X and automotive security. Facts: a BSM log showed safety messages broadcast without signatures (V2X_VULNERABLE); awk detected a spoofed message where one vehicle teleported about 5 km in 0.1 s and a ghost vehicle broadcast a hard-brake event, physically impossible forgeries (MESSAGE_SPOOFED); with IEEE 1609.2 certificate verification plus misbehavior detection, the forged message with no certificate and implausible physics was rejected (V2X_SECURED). Explain that unauthenticated V2X lets attackers broadcast ghost vehicles and fake emergency braking to cause crashes, and defense uses 1609.2 short-lived anonymous certificates for signing plus misbehavior detection for physical plausibility. Begin with exactly the single word Assessment on its own first line.","stream":false,"options":{"num_predict":330}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ## 📋 확인 사항 — 첫머리에 `Assessment`
      ## 🔍 결과 해석 — 정상 첫 줄 `Assessment` / 비정상 `[형식 미준수 — 재실행]`

      ---
      **다음 주(W13) 예고** — AI 모델 공격/방어(적대적 섭동·로버스트니스·적대적 학습).
    hint: "curl 로 gemma3 에 발견 넣어 요약, 첫 줄 Assessment 강제. 임시 파일 정리."
    category: report
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a concise note for Week 12 of an autonomous systems course on V2X and automotive security. Facts: a BSM log showed safety messages broadcast without signatures (V2X_VULNERABLE); awk detected a spoofed message where one vehicle teleported about 5 km in 0.1 s and a ghost vehicle broadcast a hard-brake event, physically impossible forgeries (MESSAGE_SPOOFED); with IEEE 1609.2 certificate verification plus misbehavior detection, the forged message with no certificate and implausible physics was rejected (V2X_SECURED). Explain that unauthenticated V2X lets attackers broadcast ghost vehicles and fake emergency braking to cause crashes, and defense uses 1609.2 short-lived anonymous certificates for signing plus misbehavior detection for physical plausibility. Begin with exactly the single word Assessment on its own first line.","stream":false,"options":{"num_predict":330}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
    answer_detail: "W12 V2X 종합(Assessment): 무인증 BSM·위조 안전 메시지·1609.2 PKI/오작동 탐지."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
