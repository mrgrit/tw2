lab_id: autonomous-systems-week05
title: "W05 — GPS 보안: NMEA 로그 분석·스푸핑 탐지·안티스푸핑·대체 항법"
version: ai
course: autonomous-systems
week: 5
description: |
  자율 시스템(드론·차량·선박)은 GPS 로 위치를 잡는데, GPS 신호는 **인증이 없고 매우 약해** 손쉽게 스푸핑된다.
  스푸퍼는 가짜 위성 신호를 더 강하게 쏴 수신기를 원하는 좌표로 속인다. 이번 주는 **실제 아티팩트(NMEA 수신
  로그)로** (1) 물리적으로 불가능한 위치 점프 등 스푸핑 흔적을 `awk` 로 탐지하고, (2) 다중 검증(관성항법 대조·
  신호 세기 균일성) 안티스푸핑을 적용하며, (3) 스푸핑 확정 시 대체 항법(INS) 전환을 확인한다.

  모든 명령은 사람이 한 줄씩 직접 입력한다. el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)에서 실행하며,
  분석 아티팩트(NMEA 로그)는 이 실습이 `/tmp` 에 직접 만든다. ⚠️ 실제로는 `gpsd`/수신기 로그에 동일 적용.
difficulty: medium
duration_minutes: 120
audience: 자율 시스템 (5주차)
prerequisites:
  - "el34 호스트 접속: `ssh ccc@{{TARGET_IP}}` (비밀번호 `1`)"
  - "GPU Ollama 도달 — http://211.170.162.139:10934 (gemma3:4b), 종합용"
  - "도구: grep·awk·python3 (el34 에 존재)"
  - "W05 강의안 정독 — §0.5(GPS·스푸핑·안티스푸핑·INS)"
objectives:
  - "GPU 응답 확인 (GEN_OK)"
  - "NMEA 로그에서 불가능한 위치 점프로 스푸핑 탐지 (SPOOF_DETECTED)"
  - "다중 검증 안티스푸핑 적용 (ANTISPOOF_APPLIED)"
  - "대체 항법(INS) 전환 확인 (ALT_NAV_ENGAGED)"
  - "종합 소견 (Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION
      종합용 GPU(gemma3) 응답 확인.
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## 📋 확인 사항 — 마지막 줄 `GEN_OK`
      ## 🔍 결과 해석 — 정상 `GEN_OK` / 비정상 `GEN_EMPTY`·연결오류
    hint: "curl /api/generate → response 있으면 GEN_OK."
    category: survey
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## 🎯 MISSION
      **NMEA 수신 로그**를 만들고, 연속 좌표 사이의 **물리적으로 불가능한 점프**를 `awk` 로 탐지해 스푸핑을 찾는다.

      ## 💻 실행 명령
      ```bash
      LOG=/tmp/gps_nmea_STU42.log
      # 1) NMEA GPRMC 로그를 만든다: 정상 이동(1초 간격) 후 갑자기 순간이동(스푸핑).
      #    필드: $GPRMC,시각,상태,위도,N,경도,E,속도,침로,날짜,...
      cat > "$LOG" <<'EOF'
      $GPRMC,120000,A,3730.100,N,12701.000,E,5.0,090,300626,,*10
      $GPRMC,120001,A,3730.101,N,12701.001,E,5.0,090,300626,,*11
      $GPRMC,120002,A,3730.102,N,12701.002,E,5.0,090,300626,,*12
      $GPRMC,120003,A,3745.900,N,12715.800,E,5.0,090,300626,,*13
      $GPRMC,120004,A,3745.901,N,12715.801,E,5.0,090,300626,,*14
      EOF
      #  120002→120003 사이 위도 3730.1→3745.9 (약 29km) 를 1초에 이동 = 불가능(스푸핑)

      # 2) awk 로 인접 좌표의 위도 변화량(분 단위)을 계산해 임계 초과를 찾는다.
      awk -F, '/GPRMC/{
        lat=$4+0;
        if(prev!=""){ d=lat-prev; if(d<0)d=-d;
          printf "  t=%s lat=%.3f  Δlat=%.3f%s\n", $2, lat, d, (d>1.0?"  <-- 불가능한 점프!":"") }
        prev=lat }' "$LOG"

      # 3) 판정: 1초에 위도 1.000분(≈1.8km) 초과 변화가 있으면 스푸핑.
      J=$(awk -F, '/GPRMC/{lat=$4+0; if(prev!=""){d=lat-prev; if(d<0)d=-d; if(d>1.0)c++} prev=lat} END{print c+0}' "$LOG")
      test "$J" -ge 1 && echo SPOOF_DETECTED || echo CLEAN
      ```
      ## 📋 확인 사항
      - `120003` 지점에서 `Δlat=15.798  <-- 불가능한 점프!`
      - 마지막 줄 `SPOOF_DETECTED`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — GPS 신호는 인증이 없어, 스푸퍼가 가짜 좌표를 주입하면 드론·차량이 "여기 있다"고 잘못
      > 믿는다. 하지만 **물리 법칙**(1초에 29km 이동 불가)은 못 속인다 — 연속 좌표의 급격한 점프가 스푸핑의 흔적이다.

      ## 🔍 결과 해석 — 정상 `SPOOF_DETECTED` + 불가능한 점프 식별
    hint: "NMEA 로그 생성 → awk 로 인접 좌표 위도 변화>1.0분(불가능) 탐지 → SPOOF_DETECTED."
    category: exploit
    answer: |
      t=120001 lat=3730.101  Δlat=0.001
      t=120002 lat=3730.102  Δlat=0.001
      t=120003 lat=3745.900  Δlat=15.798  <-- 불가능한 점프!
      t=120004 lat=3745.901  Δlat=0.001
      SPOOF_DETECTED
    answer_detail: "연속 NMEA 좌표에서 1초에 약 29km 점프(위도 Δ15.8분)=물리적으로 불가능 → 스푸핑."
    verify:
      type: output_contains
      expect: SPOOF_DETECTED
      field: stdout
      semantic:
        intent: "NMEA 로그에서 불가능한 위치 점프로 스푸핑 탐지."
        success_criteria:
          - "인접 좌표의 급격한(불가능한) 변화 탐지"
          - "SPOOF_DETECTED 출력"

  - order: 3
    instruction: |
      ## 🎯 MISSION
      **다중 검증** 안티스푸핑을 적용한다: GPS 위치를 관성항법(IMU/추측항법)과 대조하고, 위성 신호 세기(SNR)가
      비정상적으로 균일한지 본다.

      ## 💻 실행 명령
      ```bash
      CHK=/tmp/gps_crosscheck_STU42.txt
      # 1) 같은 시각의 GPS 좌표와 IMU 추정 위치, 그리고 위성 SNR 을 나란히 기록.
      cat > "$CHK" <<'EOF'
      t=120003 gps_lat=3745.900 imu_lat=3730.103 delta_km=29.1
      t=120003 sat_snr=52,52,52,52,52,52   note=all-identical(비정상)
      EOF

      # 2) GPS vs IMU 불일치(사람이 못 움직인 거리) 확인.
      echo "[GPS-IMU 불일치]"; awk '/delta_km/{split($4,a,"="); print "  차이:", a[2], "km (IMU와 불일치)"}' "$CHK"
      # 3) 위성 SNR 이 전부 동일한지(진짜 위성은 고도·거리 달라 SNR 제각각; 스푸퍼는 한 송신원이라 균일).
      echo "[SNR 균일성]"; grep "all-identical" "$CHK"

      # 4) 판정: IMU 불일치(>1km) + SNR 균일이면 안티스푸핑이 스푸핑을 확증.
      grep -q "delta_km=29" "$CHK" && grep -q "all-identical" "$CHK" && echo ANTISPOOF_APPLIED || echo INCONCLUSIVE
      ```
      ## 📋 확인 사항
      - GPS-IMU 차이 `29.1 km`(불일치), 위성 SNR `all-identical(비정상)`
      - 마지막 줄 `ANTISPOOF_APPLIED`

      ## 💡 왜 이걸 하는가?
      > ⚠️ **보안 함의** — 단일 신호(GPS)만 믿으면 속는다. **다중 검증**이 핵심이다: (a) 관성항법(IMU)은 스푸핑
      > 불가능하니 GPS 와 대조, (b) 진짜 위성은 각기 다른 거리·고도라 SNR 이 제각각인데 스푸퍼는 한 송신원이라
      > **SNR 이 균일**하다. 이 두 신호가 스푸핑을 확증한다.

      ## 🔍 결과 해석 — 정상 `ANTISPOOF_APPLIED`
    hint: "GPS-IMU 불일치(delta_km) + SNR 균일(all-identical) 확인 → ANTISPOOF_APPLIED."
    category: defense
    answer: |
      [GPS-IMU 불일치]
      차이: 29.1 km (IMU와 불일치)
      [SNR 균일성]
      t=120003 sat_snr=52,52,52,52,52,52   note=all-identical(비정상)
      ANTISPOOF_APPLIED
    answer_detail: "IMU 대조 불일치+위성 SNR 균일(단일 송신원)로 스푸핑 확증. 다중 검증이 핵심."
    verify:
      type: output_contains
      expect: ANTISPOOF_APPLIED
      field: stdout

  - order: 4
    instruction: |
      ## 🎯 MISSION
      스푸핑 확정 시 **대체 항법(INS/추측항법)으로 전환**함을 확인한다(GPS 무시, 안전 유지).

      ## 💻 실행 명령
      ```bash
      STATE=/tmp/nav_state_STU42.txt
      # 스푸핑 플래그가 서면 항법 소스를 GPS→INS 로 전환하는 상태 로그.
      cat > "$STATE" <<'EOF'
      spoof_flag=1
      nav_source=INS(inertial)      # GPS 무시, 관성항법으로 위치 추정
      action=hold_position_and_alert
      gps_weight=0.0
      EOF
      echo "[항법 상태]"; cat "$STATE"
      # 판정: 스푸핑 플래그 + 항법 소스가 INS 로 전환 + GPS 가중치 0 이면 대체 항법 가동.
      grep -q "spoof_flag=1" "$STATE" && grep -q "nav_source=INS" "$STATE" && grep -q "gps_weight=0.0" "$STATE" && echo ALT_NAV_ENGAGED || echo STILL_GPS
      ```
      ## 📋 확인 사항
      - `nav_source=INS(inertial)`, `gps_weight=0.0`
      - 마지막 줄 `ALT_NAV_ENGAGED`

      ## 💡 왜 이걸 하는가?
      스푸핑이 확정되면 **GPS 를 신뢰하지 않고** 관성항법(INS)·시각항법·지형대조로 전환해 안전을 유지한다(드론은
      호버링/귀환, 차량은 감속·정지). 탐지에서 끝나지 않고 **안전한 대체 동작**까지 이어져야 한다.

      ## 🔍 결과 해석 — 정상 `ALT_NAV_ENGAGED`
    hint: "상태 로그에 spoof_flag=1 + nav_source=INS + gps_weight=0.0 → ALT_NAV_ENGAGED."
    category: defense
    answer: |
      [항법 상태]
      spoof_flag=1
      nav_source=INS(inertial)      # GPS 무시, 관성항법으로 위치 추정
      action=hold_position_and_alert
      gps_weight=0.0
      ALT_NAV_ENGAGED
    answer_detail: "스푸핑 확정 시 GPS 무시하고 INS 대체 항법 전환+안전 동작(호버/감속). 탐지→안전 대응."
    verify:
      type: output_contains
      expect: ALT_NAV_ENGAGED
      field: stdout

  - order: 5
    instruction: |
      ## 🎯 MISSION
      W05 발견(불가능한 점프 탐지·다중 검증·대체 항법)을 소견으로 정리한다. (정리: `rm -f /tmp/gps_*STU42.* /tmp/nav_state_STU42.txt`)
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a concise note for Week 5 of an autonomous systems course on GPS security. Facts: an NMEA log showed a physically impossible position jump of about 29 km in one second, detected with awk, revealing GPS spoofing (SPOOF_DETECTED); anti-spoofing cross-checked GPS against inertial navigation (a 29 km disagreement) and noticed uniform satellite SNR from a single spoofing transmitter (ANTISPOOF_APPLIED); on confirmation the system switched navigation source to INS with gps_weight 0 and held position (ALT_NAV_ENGAGED). Explain that GPS signals are unauthenticated and weak so they are easily spoofed, but physics and multi-sensor cross-checks expose it, and defense falls back to inertial or alternative navigation. Begin with exactly the single word Assessment on its own first line.","stream":false,"options":{"num_predict":330}}' \
        | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ## 📋 확인 사항 — 첫머리에 `Assessment`
      ## 🔍 결과 해석 — 정상 첫 줄 `Assessment` / 비정상 `[형식 미준수 — 재실행]`

      ---
      **다음 주(W06) 예고** — 자율주행 기초(센서 퓨전·인식 공격 표면·중복성).
    hint: "curl 로 gemma3 에 발견 넣어 요약, 첫 줄 Assessment 강제. 임시 파일 정리."
    category: report
    answer: |
      Assessment
      An NMEA log showed a physically impossible 29 km jump in one second (detected with awk), revealing
      GPS spoofing; anti-spoofing cross-checked GPS against inertial navigation (29 km disagreement) and
      noticed uniform satellite SNR from a single transmitter; on confirmation the system switched to INS
      with gps_weight 0 and held position. GPS is unauthenticated and weak, so it is easily spoofed, but
      physics and multi-sensor cross-checks expose it; defense falls back to inertial navigation.
    answer_detail: "W05 GPS 종합(Assessment): 불가능한 점프 탐지·IMU/SNR 다중 검증·INS 대체 항법."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
