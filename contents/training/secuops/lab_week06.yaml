  - order: 4
    instruction: |
      ## 🎯 MISSION — 헌팅 쿼리 5 패턴 (on_disk / SUID / 비표준 shell / cron / outbound)

      lecture §6 의 10 패턴 중 가장 흔한 5 — disk 없는 process / SUID / 비표준 shell /
      cron entry / outbound C2.

      ## 💻 실행 명령

      ```bash
      echo "=== 1. disk 없는 process (malware 의심) ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT pid, name, path, cmdline FROM processes WHERE on_disk = 0;"' 2>&1

      echo "=== 2. SUID binary ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT path, username FROM suid_bin LIMIT 10;"' 2>&1

      echo "=== 3. 비표준 shell ==="
      docker exec el34-bastion sh -c 'sudo osqueryi --json "SELECT username, shell FROM users WHERE shell NOT IN (\"/bin/bash\", \"/bin/sh\", \"/sbin/nologin\", \"/usr/sbin/nologin\", \"/bin/false\");"' 2>&1

      echo "=== 4. cron entry 모두 ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT command, path FROM crontab;"' 2>&1

      echo "=== 5. cmdline 의 wget/curl/base64 ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT pid, name, cmdline FROM processes WHERE cmdline LIKE \"%base64%\" OR cmdline LIKE \"%wget%\" OR cmdline LIKE \"%curl%\";"' 2>&1
      ```

      ## 📋 확인 사항

      - 5 헌팅 모두 실행 + JSON 응답
      - 정상 환경에서 대부분 빈 array (`[]`) — anomaly 없음
      - SUID 는 표준 (sudo, su, passwd, ping 등) 출력
      - 비표준 shell 은 zsh 등 (없을 수도)
      - cron 은 /etc/crontab + cron.d 표준 entry
      - curl/wget cmdline 은 보통 빈 array (정상 운영)

      ## 💡 왜 이걸 하는가?

      운영 인수 시 5 헌팅이 baseline. 비정상 발견 시 추가 조사.

      ## 🔍 결과 해석

      - **정상**: 비정상 결과 없음 (모두 standard)
      - **위험 1**: on_disk=0 의 process — fileless malware
      - **위험 2**: 새 SUID binary — 권한 상승
      - **위험 3**: zsh / ksh 등 비표준 shell — 사용자 추가 흔적
      - **위험 4**: 비표준 cron entry — backdoor
      - **위험 5**: cmdline 의 외부 download — post-exploit
    hint: 'on_disk=0 + suid_bin + cron + cmdline LIKE %wget%'
