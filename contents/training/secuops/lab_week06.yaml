  - order: 5
    instruction: |
      ## 🎯 MISSION — FIM 설정 (file_paths + file_events) + osquery.conf 시뮬

      lecture §7 — FIM 의 inotify + file_paths + file_events. el34 의 osqueryd 미운영
      이므로 시뮬 (osquery.conf 작성 + 검증만, 실 적용은 W10).

      ## 💻 실행 명령

      ```bash
      # 1. osquery.conf FIM 패치 작성 (시뮬)
      docker exec el34-web sh -c 'sudo mkdir -p /etc/osquery 2>/dev/null'
      docker exec el34-web sh -c 'sudo bash -c "cat > /tmp/osquery_w07.conf <<EOF
      {
        \"options\": {
          \"logger_path\": \"/var/log/osquery\",
          \"host_identifier\": \"hostname\"
        },
        \"file_paths\": {
          \"system_etc\": [
            \"/etc/passwd\",
            \"/etc/shadow\",
            \"/etc/sudoers\",
            \"/etc/sudoers.d/%%\"
          ],
          \"ssh_keys\": [
            \"/root/.ssh/%%\"
          ],
          \"cron_paths\": [
            \"/etc/crontab\",
            \"/etc/cron.d/%%\"
          ],
          \"apache_config\": [
            \"/etc/apache2/sites-enabled/%%\",
            \"/etc/apache2/conf-enabled/%%\"
          ]
        },
        \"schedule\": {
          \"file_changes\": {
            \"query\": \"SELECT target_path, action, time, category, hashed FROM file_events;\",
            \"interval\": 60,
            \"removed\": false
          }
        }
      }
      EOF"'

      # 2. JSON syntax 검증
      docker exec el34-web sh -c 'python3 -m json.tool /tmp/osquery_w07.conf 2>&1 | tail -3'

      # 3. osqueryctl config-check (있다면)
      docker exec el34-web sh -c 'sudo osqueryctl config-check /tmp/osquery_w07.conf 2>&1 | head'

      # 4. 시뮬 — file_paths 카테고리 별 path 수
      echo "=== file_paths 카테고리 별 ==="
      docker exec el34-web sh -c 'python3 -c "
      import json
      c=json.load(open(\"/tmp/osquery_w07.conf\"))
      for cat, paths in c[\"file_paths\"].items():
          print(f\"  {cat}: {len(paths)} path\")
      "'

      # 5. inotify max_user_watches 확인 (FIM capacity)
      docker exec el34-web sh -c 'cat /proc/sys/fs/inotify/max_user_watches'

      # cleanup (lab 임시 파일만)
      docker exec el34-web sh -c 'sudo rm -f /tmp/osquery_w07.conf'
      ```

      ## 📋 확인 사항

      - JSON syntax pass (no parse error)
      - 4 카테고리 (system_etc / ssh_keys / cron_paths / apache_config)
      - schedule.file_changes interval 60
      - inotify max_user_watches = 8192 또는 비슷 (kernel default)

      ## 💡 왜 이걸 하는가?

      FIM 의 표준 패턴. 4 카테고리가 운영 환경의 frequent target. inotify 한계 인지
      (수만 path 감시 시 limit 상향 필요).

      ## 🔍 결과 해석

      - **정상**: JSON pass + 4 카테고리 + inotify > 8192
      - **운영 권장**:
        - osqueryd enable 후 실 운영 (W10)
        - file_events log 모니터
        - inotify limit 부족 시 `sysctl -w fs.inotify.max_user_watches=524288`
    hint: 'osquery.conf 의 file_paths + schedule.file_changes'
    category: configuration
    points: 18
    answer: |
      docker exec el34-web sh -c 'sudo mkdir -p /etc/osquery 2>/dev/null'
      docker exec el34-web sh -c 'sudo bash -c "cat > /tmp/osquery_w07.conf <<EOF
      {
