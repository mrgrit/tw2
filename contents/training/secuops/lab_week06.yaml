lab_id: standalone-secuops-week06
title: osquery 호스트 가시화 — 158 테이블 + SQL JOIN + 헌팅 10 + FIM + R/B/P
version: standalone-non-ai
course: secuops
week: 6
description: |
  el34 의 4 호스트 (bastion / fw / ips / web) 에 설치된 osquery 5.23.0 으로 OS-as-SQL
  가시화. 158 테이블 + 6 핵심 (processes / users / file / listening_ports /
  authorized_keys / crontab) + SQL JOIN 3 패턴 + 헌팅 10 + FIM (file_paths +
  file_events) + scheduled query 시뮬 + R/B/P (새 user / SSH key / cron backdoor →
  5 헌팅 매치) + Wazuh ship + 종합 보고서. 한 cycle.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W01-W05 통과"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec (컨테이너 root)"
  - "lecture §1-§12 (158 테이블 + JOIN + FIM + W11 비교) 숙지"
objectives:
  - "osqueryi 5.23.0 + 158 테이블 카테고리 분류"
  - "6 핵심 테이블 (processes/users/file/listening_ports/authorized_keys/crontab)"
  - "SQL JOIN — processes + listening_ports / process_open_sockets"
  - "헌팅 10 패턴 (on_disk=0 / 새 user / SSH key / cron / SUID / 외부 outbound)"
  - "FIM 설정 (file_paths + file_events)"
  - "osqueryd scheduled query 시뮬"
  - "R/B/P — 호스트 침해 시뮬 + 5 헌팅 매치"
  - "Wazuh ship 검증 (W10 예고)"
  - "종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — osqueryi 진입 + version + 158 테이블 가시화

      el34 4 호스트의 osquery 5.23.0 설치 상태 + 158 테이블 확인 + osqueryd daemon
      미운영 확인.

      ## 💻 실행 명령

      ```bash
      for h in bastion fw ips web; do
        printf "%-8s " "$h"
        docker exec el34-$h sh -c 'sudo osqueryi --version' 2>&1
      done

      # 1 호스트의 osquery_info
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT version, build_distro, instance_id FROM osquery_info LIMIT 1;"'

      # 158 테이블 카운트
      docker exec el34-web sh -c 'sudo osqueryi ".tables" 2>&1 | wc -l'

      # 카테고리 별 테이블 sample
      docker exec el34-web sh -c 'sudo osqueryi ".tables" 2>&1 | grep -E "process|user|file|listening|cron|crypto|kernel" | head -15'

      # osqueryd daemon 상태 (el34 는 미운영 예상)
      docker exec el34-web sh -c 'sudo systemctl status osqueryd 2>&1 | head -3'
      docker exec el34-web sh -c 'sudo ls /etc/osquery/ 2>&1'
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      - 4 호스트 모두 `osqueryi version 5.23.0`
      - osquery_info: `version 5.23.0`, build_distro `centos7` (osquery 빌드 환경), instance_id UUID
      - 158 테이블 (line 1 의 `.tables` 헤더 포함)
      - osqueryd 미운영 (`Unit osqueryd.service could not be found` 또는 inactive)
      - /etc/osquery/ 없음 (config 미존재)

      ## 💡 왜 이걸 하는가?

      운영 인수 30초 — 4 호스트 osquery 설치 상태 + 버전 + 테이블 + 데몬 운영 여부 확인.
      el34 는 osqueryi ad-hoc only — W10 에서 daemon + config 본격 도입.

      ## 🔍 결과 해석

      - **정상**: 4 호스트 5.23.0 + 158 테이블
      - **운영 패치 권장 (W10)**: osquery.conf 작성 + osqueryd enable + Wazuh ship
