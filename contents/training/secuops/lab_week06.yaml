  - order: 2
    instruction: |
      ## 🎯 MISSION — 6 핵심 테이블 쿼리 (processes / users / file / listening_ports / authorized_keys / crontab)

      lecture §4.2 의 6 핵심 테이블 각각 ad-hoc 쿼리 + 결과 분석.

      ## 💻 실행 명령

      ```bash
      # 1. processes
      echo "=== processes (Wazuh + osquery 5개) ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT pid, name, cmdline FROM processes ORDER BY pid DESC LIMIT 5;"' 2>&1 | python3 -m json.tool 2>&1 | head -30

      # 2. users
      echo "=== users (uid >= 1000) ==="
      docker exec el34-bastion sh -c 'sudo osqueryi --json "SELECT username, uid, shell, directory FROM users WHERE uid >= 1000;"' 2>&1

      # 3. file (/etc/passwd metadata)
      echo "=== file /etc/passwd ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT path, mode, uid, mtime, size FROM file WHERE path = \"/etc/passwd\";"' 2>&1

      # 4. listening_ports
      echo "=== listening_ports ==="
      docker exec el34-fw sh -c 'sudo osqueryi --json "SELECT port, protocol, address, pid FROM listening_ports WHERE address NOT LIKE \"127.%\" LIMIT 5;"' 2>&1

      # 5. authorized_keys
      echo "=== authorized_keys ==="
      docker exec el34-bastion sh -c 'sudo osqueryi --json "SELECT uid, key_type, comment FROM authorized_keys;"' 2>&1 | head -20

      # 6. crontab
      echo "=== crontab ==="
      docker exec el34-web sh -c 'sudo osqueryi --json "SELECT * FROM crontab;"' 2>&1 | head -20
      ```

      ## 📋 확인 사항

      - processes: pid + name + cmdline (Wazuh / Apache / Suricata 등)
      - users: uid >= 1000 의 사용자 (ccc 또는 비슷)
      - file: /etc/passwd 의 mode / uid / mtime / size
      - listening_ports: 22 (sshd), 80 (apache or haproxy), 443
      - authorized_keys: uid 별 key 목록
      - crontab: /etc/crontab + cron.d 의 entry

      ## 💡 왜 이걸 하는가?

      6 핵심 테이블이 운영 인수의 90% cover. 매 cycle 첫 점검.

      ## 🔍 결과 해석

