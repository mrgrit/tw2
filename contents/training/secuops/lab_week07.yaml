lab_id: standalone-secuops-week07
title: "Linux 엔드포인트 IR — osquery 로 침해 호스트 조사 + 침해대응 5 (R/B/P)"
version: standalone-secuops
course: secuops
week: 7
description: |
  el34 의 Linux 호스트(victim = el34-web)를 **침해 현장**으로 보고, 그 현장에 출동한 **분석가(analyst)**
  시점에서 침해대응(IR)을 수행한다. 방화벽(W02)·IPS(W03/04)·WAF(W05)가 보는 것은 "지나가는 트래픽"이지만,
  본 실습이 보는 것은 **이미 호스트 안으로 들어온 공격자가 남긴 흔적** — 떨어진 파일·수상한 프로세스·
  백도어 리스너·몰래 만든 계정·재진입용 지속성(persistence) — 이다. 이 흔적들은 네트워크에는 거의 남지
  않고 오직 호스트 내부에만 또렷이 남으므로, W06 에서 배운 **osquery**(OS 를 SQL 로 질의) + **Wazuh
  FIM**(파일 변경 실시간 감시) 으로 잡는다.

  진행은 분석가의 표준 절차 **SOP 3단계** — Triage(선별) → Investigate(조사) → Contain(봉쇄) — 를 따른다.
  침해대응 5 시나리오(R/B/P)를 하나씩 **재현(Red) → osquery 탐지(Blue) → 제거(Purple/Contain)** 의 한
  사이클로 돌린다: ① 의심 다운로드(file) ② 인코딩된 셸 프로세스(processes.cmdline) ③ 백도어 리스너
  (listening_ports) ④ 백도어 계정(users) ⑤ persistence(crontab + authorized_keys + FIM). el34-web 은
  공유 인프라이므로, 각 시나리오 끝에 실습 흔적을 **반드시 제거(self-clean)** 해 다음 사람의 베이스 상태를
  보존하는 것까지가 IR 의 SOP 다.

  접근 경로 — 모든 명령은 el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 1)에 들어간 뒤
  `ssh ccc@10.20.32.80 ...`(victim 에 osquery) / `ssh ccc@10.20.32.100 ...`(Wazuh 적재 확인) 로 실행한다.
  (참고: el34-web 은 컨테이너라 `/var/log/auth.log` 대신 컨테이너 로깅을 쓰므로, 본 실습의 주 도구는 osquery 다.)
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W01-W06 통과 (특히 W06 osquery — 테이블/SQL/헌팅)"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, root은 sudo) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §1-§9 (두 페르소나 / 텔레메트리 / SOP / R/B/P) 숙지"
objectives:
  - "IR 첫 단계로 victim 호스트(el34-web)의 텔레메트리(osquery 5.23.0 + Wazuh agent Active)가 살아있는지 점검한다"
  - "osquery 다섯 핵심 테이블(file / processes / listening_ports / users / crontab)을 침해 신호별로 질의해 탐지한다"
  - "침해대응 5 시나리오(R/B/P)를 재현(Red) → osquery 탐지(Blue) → 제거(Contain) 한 사이클로 돌린다"
  - "JOIN(processes ⨝ process_open_sockets)으로 포트의 주인 프로세스를, on_disk=0 으로 은닉 프로세스를 추적한다"
  - "방화벽이 못 본 호스트 행위가 Wazuh FIM 을 통해 SIEM(el34-siem)으로 적재됨을 확인한다"
  - "분석가 SOP(Triage→Investigate→Contain)를 사건에 적용해 IR 보고서를 쓰고, 공유 호스트를 self-clean 으로 베이스 보존한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — victim 호스트(el34-web) 엔드포인트 텔레메트리 점검

      **개념 한 줄** — IR(침해대응)의 0단계는 "조사할 도구가 살아있는가"다. 현장에 도착한 수사관이
      먼저 손전등과 무전기가 작동하는지 확인하는 것과 같다. 여기서 손전등 = **osquery**(호스트를
      SQL 로 검색), 무전기 = **Wazuh agent**(호스트 행위를 SIEM 으로 전송).

      이 둘이 정상이어야 이후 모든 탐지(Investigate)와 SIEM 적재가 성립한다. 셋을 확인한다 —
      osquery 가 동작하는가(버전), 호스트가 살아있는가(프로세스 수), agent 가 SIEM 에 붙어 있는가(Active).

      > **왜 auth.log 가 아니라 osquery 인가** — 일반 서버라면 로그온/sudo 흔적이 `/var/log/auth.log`
      > 에 쌓이지만, el34-web 은 컨테이너라 그 파일에 의존하지 않는다. 그래서 본 lab 의 **주 도구는
      > osquery** 다. auth.log 가 없어도 processes·users·listening_ports·crontab·file 테이블만으로
      > 침해 흔적을 충분히 잡는다.

      ## 💻 실행 명령

      **실습 컨테이너:** osquery 점검은 `el34-web`, agent 연결 확인은 `el34-siem`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: ──
      osqueryi --version                                  # 손전등(osquery) 동작 확인
      osqueryi --json 'SELECT count(*) c FROM processes;' # 호스트가 살아있나(프로세스 수)

      # ── el34-siem 에서: 무전기(agent) SIEM 연결 확인 ──
      /var/ossec/bin/agent_control -l | grep -E "Name: web,"
      ```
      - `osqueryi --version` — osquery 의 단발 SQL 실행기 버전 출력. el34 는 5.23.0.
      - `--json 'SELECT count(*) ...'` — 결과를 JSON 으로 받는다. 본 lab 의 모든 탐지가 이 형태다.
      - `agent_control -l` — Wazuh 매니저(el34-siem)에 등록된 agent 목록. `Name: web` 의 상태가 핵심.

      ## ✅ 합격 기준
      osquery 5.x 버전 + processes count(숫자) + web agent `Active`. agent 가 Disconnected 면 SIEM
      적재가 끊긴 상태이므로 이후 step 8 의 적재 확인 전에 먼저 점검한다.
    hint: 'osqueryi --version; agent_control -l | grep web'
    category: survey
    points: 10
    answer: |
      echo "=== osquery 버전 ==="
      ssh ccc@10.20.32.80 osqueryi --version
      echo "=== processes count ==="
      ssh ccc@10.20.32.80 osqueryi --json 'SELECT count(*) c FROM processes;'
      echo "=== Wazuh web agent ==="
      ssh ccc@10.20.32.100 /var/ossec/bin/agent_control -l | grep -E "Name: web," || echo "web agent 확인 필요"
    answer_detail: "IR 의 0단계 = 조사 도구 가용성 점검. osquery 5.23.0(손전등) + 프로세스 스냅샷(호스트 생존) + web 의 Wazuh agent Active(SIEM 무전기) 세 가지가 모두 확인되면 IR 도구 준비 완료. 합격 판정은 출력에 osquery 버전 '5.23' 이 포함되는지로 한다."
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "조사 호스트의 IR 텔레메트리(osquery+Wazuh) 가용성 확인"
        success_criteria: ["osquery 5.x", "processes count", "web agent Active"]
        acceptable_methods:
          - "**[OSS] osqueryi --version (권장)**"
          - "**[OSS] agent_control -l 로 web Active**"
          - "**[설명] auth.log 부재 → osquery 주도 IR**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ep-s01 — 의심 외부 다운로드 (R/B/P)

      **개념 한 줄** — 침해의 가장 흔한 1단계는 "외부에서 도구(바이너리)를 끌어오는" 것이다. 이렇게
      떨어진 파일은 네트워크에는 IP 단편만 남거나 아예 안 남지만, 호스트의 **`file` 테이블**에는
      경로·크기·수정시각으로 또렷이 남는다.

      - **Red** — victim 에 외부 바이너리가 떨어진 상황을 모사한다(`/tmp/evil.bin`). `/tmp` 는 누구나
        쓸 수 있어 공격자가 즐겨 쓰는 drop 지점이다(`/dev/shm` 도 마찬가지).
      - **Blue** — osquery `file` 로 그 파일을 메타데이터(size/mtime)와 함께 찾아낸다.
      - **Purple/Contain** — 파일을 제거하고, "어떻게 들어왔는지"를 메모한다(근본 원인 추적).

      ## 💻 단계 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      echo "ELF...payload" > /tmp/evil.bin                                          # Red(다운로드 모사)
      osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/evil.bin";'  # Blue
      rm -f /tmp/evil.bin                                                            # Contain
      ```
      - `file` 테이블 — osquery 가 파일 시스템 메타데이터를 보는 테이블. `path`(경로) / `size`(바이트) /
        `mtime`(마지막 수정 epoch) 컬럼으로 "언제 생긴 얼마짜리 파일인가"를 본다.
      - `WHERE path="/tmp/evil.bin"` — 정확한 경로 한 건을 지목. 경로 패턴 헌팅은 `LIKE "/tmp/%"` 형태.
      - `rm -f` — 탐지 확인 후 즉시 제거(Contain). 공유 호스트이므로 잔재를 남기지 않는다.

      ## ✅ 합격 기준
      osquery `file` 결과 JSON 에 `/tmp/evil.bin` (path) 와 size 가 보인다.
    hint: 'osquery file 테이블로 /tmp 의 의심 파일 탐지 → 제거'
    category: response
    points: 15
    answer: |
      ssh ccc@10.20.32.80 'echo "ELF...payload-w07" > /tmp/evil.bin'
      echo "=== osquery file 탐지 ==="
      ssh ccc@10.20.32.80 osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/evil.bin";'
      ssh ccc@10.20.32.80 rm -f /tmp/evil.bin
      echo "self-clean done"
    answer_detail: "ep-s01 의 정답 흐름은 Red(파일 drop 모사) → Blue(osquery file 테이블로 path/size/mtime 식별) → Contain(rm -f 제거). 다운로드된 파일은 네트워크에 흔적이 거의 없어도 호스트 file 테이블에는 남는다. /tmp·/dev/shm 등 누구나 쓸 수 있는 경로가 흔한 drop 지점. 합격은 출력에 'evil.bin' 포함 여부로 판정한다."
    verify:
      type: output_contains
      expect: 'evil.bin'
      field: stdout
      semantic:
        intent: "drop 된 의심 파일을 osquery 로 식별 + 제거"
        success_criteria: ["file 테이블에 /tmp/evil.bin", "size/mtime 확인", "제거(contain)"]
        acceptable_methods:
          - "**[OSS] osquery file WHERE path/directory (권장)**"
          - "**[OSS] /tmp /dev/shm 헌팅**"
          - "**[설명] drop 경로의 의미**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ep-s02 — 인코딩/의심 cmdline 프로세스 (R/B/P)

      **개념 한 줄** — 공격자는 무엇을 실행하는지 숨기려고 명령을 base64 로 인코딩하거나 `-c` 로
      인라인 실행한다. 하지만 무엇을 실행했든 그 명령행은 osquery **`processes` 테이블의 `cmdline`**
      에 그대로 남는다. 오히려 "왜 이렇게 꼬아놨지?"라는 난독화 자체가 강력한 탐지 신호가 된다 —
      Windows 의 PowerShell `-EncodedCommand` 탐지와 똑같은 발상이다.

      - **Red** — base64 로 인코딩된 페이로드를 디코드해 실행하는, 의심 cmdline 을 가진 프로세스를
        띄운다(실제 악성 아님, 탐지 연습용 lingering 프로세스).
      - **Blue** — `cmdline` 에 `b64decode` / `-c` 패턴이 있는 프로세스를 SQL `LIKE` 로 찾는다.
      - **Purple/Contain** — 해당 프로세스를 이름 패턴으로 종료(`pkill -f`)한다.

      ## 💻 단계 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      # Red — 의심 cmdline 의 lingering 프로세스 (실제 악성 아님, 탐지용)
      nohup python3 -c "import time;exec(__import__(chr(98)+\"ase64\").b64decode(\"aW1wb3J0IHRpbWU=\"));time.sleep(180)" >/dev/null 2>&1 & echo started
      sleep 1
      # Blue — cmdline 에 base64/-c 패턴
      osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%b64decode%" OR cmdline LIKE "%-c %";' | head -c 400
      # Contain — 종료
      pkill -f b64decode 2>/dev/null; echo killed
      ```
      - `processes` 테이블 — 실행 중 프로세스. `pid`(번호) / `name`(이름) / `cmdline`(전체 명령행)을 본다.
      - `WHERE cmdline LIKE "%b64decode%"` — 명령행 안에 그 문자열이 들어간 프로세스만. `%` 는 SQL 와일드카드.
      - `nohup ... &` — Red 가 백그라운드로 띄우는 부분(탐지 대상 생성). `sleep 1` 은 프로세스가 뜰 시간을 준다.
      - `pkill -f b64decode` — 명령행에 `b64decode` 가 든 프로세스를 이름이 아닌 **명령행 매칭**으로 종료.

      ## ✅ 합격 기준
      osquery 결과 JSON 의 cmdline 에 `python3` + 인코딩 패턴(b64decode 등)이 보인다.
    hint: 'osquery processes 의 cmdline LIKE 패턴 → pkill'
    category: response
    points: 15
    answer: |
      ssh ccc@10.20.32.80 'nohup python3 -c "import time,base64;exec(base64.b64decode(\"aW1wb3J0IHRpbWU=\"));time.sleep(180)" >/dev/null 2>&1 & echo started'
      sleep 1
      echo "=== osquery 의심 cmdline ==="
      ssh ccc@10.20.32.80 osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%b64decode%";'
      ssh ccc@10.20.32.80 'pkill -f b64decode 2>/dev/null; echo killed'
      echo "self-clean done"
    answer_detail: "ep-s02 정답 흐름은 Red(인코딩 셸 프로세스 생성) → Blue(processes.cmdline 의 LIKE 패턴으로 탐지) → Contain(pkill -f 종료). cmdline 패턴(base64/exec/-c)은 osquery processes 에서 강력한 탐지 단서이며, 난독화 자체가 신호가 된다 — Windows 의 PowerShell -EncodedCommand 와 같은 발상. 합격은 출력에 'python3' 포함 여부로 판정한다."
    verify:
      type: output_contains
      expect: 'python3'
      field: stdout
      semantic:
        intent: "인코딩/난독 cmdline 프로세스를 osquery 로 탐지 + 종료"
        success_criteria: ["cmdline 에 base64/exec 패턴", "python3 프로세스", "pkill contain"]
        acceptable_methods:
          - "**[OSS] osquery processes WHERE cmdline LIKE (권장)**"
          - "**[OSS] on_disk=0 헌팅**"
          - "**[설명] cmdline 패턴의 탐지 가치**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ep-s03 — 의심 리스너/외부 연결 (R/B/P)

      **개념 한 줄** — 공격자는 재진입이나 명령 수신을 위해 호스트에 **백도어 리스너**(임의 포트를
      여는 프로세스)를 띄운다. 호스트가 "듣고 있는 포트 목록"은 곧 "외부에서 들어올 수 있는 통로
      목록"이며, osquery **`listening_ports`** 로 한눈에 본다. 정상 서비스 포트 목록(baseline)에 없는
      포트가 곧 의심 대상이다.

      - **Red** — 임의 포트(4444)에 리스너가 뜬 상황을 모사한다.
      - **Blue** — `listening_ports` 로 어느 pid 가 어느 포트를 듣는지 찾는다(어디서 = address).
      - **Purple/Contain** — 그 리스너 프로세스를 종료한다.

      ## 💻 단계 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      nohup python3 -m http.server 4444 >/dev/null 2>&1 & echo started   # Red
      sleep 1
      osqueryi --json 'SELECT pid,port,address FROM listening_ports WHERE port=4444;'  # Blue
      pkill -f "http.server 4444" 2>/dev/null; echo killed              # Contain
      ```
      - `listening_ports` 테이블 — LISTEN 상태의 모든 소켓. `pid`(주인 프로세스) / `port`(포트) /
        `address`(바인딩 주소, 0.0.0.0 이면 모든 인터페이스 노출).
      - `WHERE port=4444` — 의심 포트 한 건을 지목. (짝꿍 테이블 `process_open_sockets` 는 외부로 나가는
        연결을 `remote_port` 로 본다 — step 7 에서 JOIN 으로 함께 쓴다.)
      - `python3 -m http.server 4444` — Red 가 4444 포트를 여는 부분(탐지 대상 생성).
      - `pkill -f "http.server 4444"` — 그 리스너만 명령행 매칭으로 정확히 종료.

      ## ✅ 합격 기준
      osquery `listening_ports` 결과에 port `4444` 가 보인다.
    hint: 'osquery listening_ports/process_open_sockets 로 백도어 리스너 → pkill'
