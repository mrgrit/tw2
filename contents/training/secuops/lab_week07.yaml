lab_id: standalone-secuops-week07
title: "Linux 엔드포인트 IR — osquery 로 침해 호스트 조사 + 침해대응 5 (R/B/P)"
version: standalone-secuops
course: secuops
week: 7
description: |
  el34 의 Linux 호스트(victim = el34-web)를 침해 현장으로 보고, W06 에서 배운 osquery + Wazuh(FIM) 로
  분석가 시점의 IR(Triage→Investigate→Contain)을 한다. 침해대응 5 시나리오(R/B/P) — 의심 다운로드 /
  인코딩된 셸 프로세스 / 의심 리스너 / 백도어 계정 / persistence(cron+authorized_keys) — 를 재현하고
  osquery 로 탐지한 뒤 **반드시 제거(self-clean)** 해 베이스 상태를 보존한다. 호스트는 공유 인프라다.
  모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서 `docker exec el34-web` / `docker exec el34-attacker` 로.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W01-W06 통과 (특히 W06 osquery — 테이블/SQL/헌팅)"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec (컨테이너 내부 root)"
  - "lecture §1-§9 (두 페르소나 / 텔레메트리 / SOP / R/B/P) 숙지"
objectives:
  - "victim 호스트(el34-web)의 osquery + Wazuh agent 상태 확인"
  - "osquery 로 프로세스/소켓/파일/사용자/cron 을 IR 관점으로 질의"
  - "침해대응 5 시나리오(R/B/P)를 재현→osquery 탐지→self-clean"
  - "Wazuh FIM(syscheck) 가 persistence 파일 변경을 잡음을 el34-siem 에서 확인"
  - "분석가 SOP(Triage→Investigate→Contain)를 사건에 적용 + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — victim 호스트(el34-web) 엔드포인트 텔레메트리 점검

      IR 첫 단계 — 조사할 호스트의 도구가 살아있나. osquery 동작 + Wazuh agent active 확인.
      (el34-web 은 auth.log 대신 컨테이너 로깅을 쓰므로, 본 lab 은 **osquery** 를 주 도구로 한다.)

      ## 💻 실행 명령
      ```bash
      docker exec el34-web osqueryi --version
      docker exec el34-web osqueryi --json 'SELECT count(*) c FROM processes;'
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "Name: web,"
      ```
      ## ✅ 합격 기준
      osquery 5.x + processes count + web agent Active.
    hint: 'osqueryi --version; agent_control -l | grep web'
    category: survey
    points: 10
    answer: |
      echo "=== osquery 버전 ==="
      docker exec el34-web osqueryi --version
      echo "=== processes count ==="
      docker exec el34-web osqueryi --json 'SELECT count(*) c FROM processes;'
      echo "=== Wazuh web agent ==="
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "Name: web," || echo "web agent 확인 필요"
    answer_detail: "osquery 5.23.0 + 프로세스 스냅샷 + web 의 Wazuh agent Active = IR 도구 준비 완료."
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "조사 호스트의 IR 텔레메트리(osquery+Wazuh) 가용성 확인"
        success_criteria: ["osquery 5.x", "processes count", "web agent Active"]
        acceptable_methods:
          - "**[OSS] osqueryi --version (권장)**"
          - "**[OSS] agent_control -l 로 web Active**"
          - "**[설명] auth.log 부재 → osquery 주도 IR**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ep-s01 — 의심 외부 다운로드 (R/B/P)

      Red — victim 에 외부 바이너리가 떨어졌다(/tmp/evil.bin). Blue — osquery `file` 로 의심 파일을
      mtime/size 와 함께 찾는다. Purple — 제거 + 어떻게 들어왔는지 메모.

      ## 💻 단계 명령
      ```bash
      docker exec el34-web sh -c 'echo "ELF...payload" > /tmp/evil.bin'         # Red(다운로드 모사)
      docker exec el34-web osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/evil.bin";'  # Blue
      docker exec el34-web rm -f /tmp/evil.bin                                  # Contain
      ```
      ## ✅ 합격 기준
      osquery `file` 결과에 `/tmp/evil.bin` (path/size) 가 보인다.
    hint: 'osquery file 테이블로 /tmp 의 의심 파일 탐지 → 제거'
    category: response
    points: 15
    answer: |
      docker exec el34-web sh -c 'echo "ELF...payload-w07" > /tmp/evil.bin'
      echo "=== osquery file 탐지 ==="
      docker exec el34-web osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/evil.bin";'
      docker exec el34-web rm -f /tmp/evil.bin
      echo "self-clean done"
    answer_detail: "다운로드된 파일은 osquery file 테이블로 path/size/mtime 확인. /tmp·/dev/shm 등 쓰기 가능 경로가 흔한 drop 지점."
    verify:
      type: output_contains
      expect: 'evil.bin'
      field: stdout
      semantic:
        intent: "drop 된 의심 파일을 osquery 로 식별 + 제거"
        success_criteria: ["file 테이블에 /tmp/evil.bin", "size/mtime 확인", "제거(contain)"]
        acceptable_methods:
          - "**[OSS] osquery file WHERE path/directory (권장)**"
          - "**[OSS] /tmp /dev/shm 헌팅**"
          - "**[설명] drop 경로의 의미**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ep-s02 — 인코딩/의심 cmdline 프로세스 (R/B/P)

      Red — base64/`-c` 로 위장한 셸이 떠 있다. Blue — osquery `processes` 의 cmdline 패턴으로 잡는다.
      Purple — 프로세스 종료.

      ## 💻 단계 명령
      ```bash
      # Red — 의심 cmdline 의 lingering 프로세스 (실제 악성 아님, 탐지용)
      docker exec el34-web sh -c 'nohup python3 -c "import time;exec(__import__(chr(98)+\"ase64\").b64decode(\"aW1wb3J0IHRpbWU=\"));time.sleep(180)" >/dev/null 2>&1 & echo started'
      sleep 1
      # Blue — cmdline 에 base64/-c 패턴
      docker exec el34-web osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%b64decode%" OR cmdline LIKE "%-c %";' | head -c 400
      # Contain — 종료
      docker exec el34-web sh -c 'pkill -f b64decode 2>/dev/null; echo killed'
      ```
      ## ✅ 합격 기준
      osquery 결과 cmdline 에 `python3` + 인코딩 패턴이 보인다.
    hint: 'osquery processes 의 cmdline LIKE 패턴 → pkill'
    category: response
    points: 15
    answer: |
      docker exec el34-web sh -c 'nohup python3 -c "import time,base64;exec(base64.b64decode(\"aW1wb3J0IHRpbWU=\"));time.sleep(180)" >/dev/null 2>&1 & echo started'
      sleep 1
      echo "=== osquery 의심 cmdline ==="
      docker exec el34-web osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%b64decode%";'
      docker exec el34-web sh -c 'pkill -f b64decode 2>/dev/null; echo killed'
      echo "self-clean done"
    answer_detail: "cmdline 패턴(base64/exec/-c)이 osquery processes 에서 강력한 탐지 단서. Windows 의 PowerShell -EncodedCommand 와 같은 발상. 종료로 contain."
    verify:
      type: output_contains
      expect: 'python3'
      field: stdout
      semantic:
        intent: "인코딩/난독 cmdline 프로세스를 osquery 로 탐지 + 종료"
        success_criteria: ["cmdline 에 base64/exec 패턴", "python3 프로세스", "pkill contain"]
        acceptable_methods:
          - "**[OSS] osquery processes WHERE cmdline LIKE (권장)**"
          - "**[OSS] on_disk=0 헌팅**"
          - "**[설명] cmdline 패턴의 탐지 가치**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ep-s03 — 의심 리스너/외부 연결 (R/B/P)

      Red — 호스트에 백도어 리스너가 떴다(임의 포트). Blue — osquery `listening_ports` /
      `process_open_sockets` 로 어느 프로세스가 어디서 듣는지 찾는다. Purple — 종료.

      ## 💻 단계 명령
      ```bash
      docker exec el34-web sh -c 'nohup python3 -m http.server 4444 >/dev/null 2>&1 & echo started'   # Red
      sleep 1
      docker exec el34-web osqueryi --json 'SELECT pid,port,address FROM listening_ports WHERE port=4444;'  # Blue
      docker exec el34-web sh -c 'pkill -f "http.server 4444" 2>/dev/null; echo killed'                # Contain
      ```
      ## ✅ 합격 기준
      `listening_ports` 에 port `4444` 가 보인다.
    hint: 'osquery listening_ports/process_open_sockets 로 백도어 리스너 → pkill'
    category: response
    points: 15
    answer: |
      docker exec el34-web sh -c 'nohup python3 -m http.server 4444 >/dev/null 2>&1 & echo started'
      sleep 1
      echo "=== osquery listening_ports 4444 ==="
      docker exec el34-web osqueryi --json 'SELECT pid,port,address FROM listening_ports WHERE port=4444;'
      docker exec el34-web sh -c 'pkill -f "http.server 4444" 2>/dev/null; echo killed'
      echo "self-clean done"
    answer_detail: "백도어 리스너는 listening_ports(어느 포트) + process_open_sockets(어느 연결)로 식별. 정상 서비스 포트 목록과 대조해 비정상 리스너를 찾는다."
    verify:
      type: output_contains
      expect: '4444'
      field: stdout
      semantic:
        intent: "비정상 리스너/연결을 osquery 로 식별 + 종료"
        success_criteria: ["listening_ports 에 4444", "pid 식별", "pkill contain"]
        acceptable_methods:
          - "**[OSS] osquery listening_ports (권장)**"
          - "**[OSS] process_open_sockets WHERE remote_port!=0**"
          - "**[설명] 정상 포트 목록 대조**"
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ep-s04 — 백도어 계정 (R/B/P)

      Red — 침투 후 백도어 계정(uid 1099) 생성. Blue — osquery `users` 로 비정상 계정 식별
      (낮은 uid·이상 shell·최근 생성). Purple — `userdel` 로 제거.

      ## 💻 단계 명령
      ```bash
      docker exec el34-web sh -c 'userdel -r w07intruder 2>/dev/null; useradd -m -s /bin/bash -u 1099 w07intruder && echo created'  # Red
      docker exec el34-web osqueryi --json 'SELECT username,uid,shell,directory FROM users WHERE username="w07intruder";'  # Blue
      docker exec el34-web sh -c 'userdel -r w07intruder 2>/dev/null; echo removed'   # Contain
      ```
      ## ✅ 합격 기준
      osquery `users` 에 `w07intruder` 가 보인다.
    hint: 'osquery users 로 백도어 계정 → userdel'
    category: response
    points: 15
    answer: |
      docker exec el34-web sh -c 'userdel -r w07intruder 2>/dev/null; useradd -m -s /bin/bash -u 1099 w07intruder && echo created'
      echo "=== osquery users 탐지 ==="
      docker exec el34-web osqueryi --json 'SELECT username,uid,shell,directory FROM users WHERE username="w07intruder";'
      docker exec el34-web sh -c 'userdel -r w07intruder 2>/dev/null; echo removed'
      echo "self-clean done"
    answer_detail: "백도어 계정은 osquery users 로 식별(이상 uid/shell). 정상 계정 baseline 과 대조. userdel 로 제거(contain). 베이스 계정은 보존."
    verify:
      type: output_contains
      expect: 'w07intruder'
      field: stdout
      semantic:
        intent: "백도어 계정을 osquery 로 식별 + 제거"
        success_criteria: ["users 에 w07intruder", "uid 1099 이상", "userdel contain"]
        acceptable_methods:
          - "**[OSS] osquery users (권장)**"
          - "**[OSS] shadow/last 와 교차**"
          - "**[설명] 계정 baseline 대조**"
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 ep-s05 — persistence(cron + authorized_keys) + Wazuh FIM (R/B/P)

      Red — `/etc/cron.d` 백도어 + `/root/.ssh/authorized_keys` 키 추가(append). Blue — osquery `crontab`
      + Wazuh **FIM(syscheck)** alert 로 파일 변경 탐지. Purple — 제거(키는 append 분만 sed 삭제 → 베이스 보존).

      ## 💻 단계 명령
      ```bash
      docker exec el34-web sh -c 'echo "* * * * * root /tmp/.w07bd.sh" > /etc/cron.d/w07_backdoor'                 # Red 1
      docker exec el34-web sh -c 'echo "ssh-rsa AAAAB3Nz_W07FAKE w07@evil" >> /root/.ssh/authorized_keys'          # Red 2
      docker exec el34-web osqueryi --json 'SELECT command,path FROM crontab WHERE path LIKE "%w07_backdoor%";'    # Blue
      # Contain — cron 제거 + 추가한 키 1줄만 삭제(베이스 보존)
      docker exec el34-web sh -c 'rm -f /etc/cron.d/w07_backdoor; sed -i "/W07FAKE/d" /root/.ssh/authorized_keys; echo cleaned'
      ```
      ## ✅ 합격 기준
      osquery `crontab` 에 `w07_backdoor` 가 보인다.
    hint: 'osquery crontab + Wazuh FIM → cron rm + authorized_keys sed 삭제'
    category: response
    points: 15
    answer: |
      docker exec el34-web sh -c 'echo "* * * * * root /tmp/.w07bd.sh" > /etc/cron.d/w07_backdoor'
      docker exec el34-web sh -c 'echo "ssh-rsa AAAAB3Nz_W07FAKE w07@evil" >> /root/.ssh/authorized_keys'
      echo "=== osquery crontab 탐지 ==="
      docker exec el34-web osqueryi --json 'SELECT command,path FROM crontab WHERE path LIKE "%w07_backdoor%";'
      echo "=== authorized_keys 변경(FIM 대상) ==="
      docker exec el34-web sh -c 'grep -c W07FAKE /root/.ssh/authorized_keys'
      docker exec el34-web sh -c 'rm -f /etc/cron.d/w07_backdoor; sed -i "/W07FAKE/d" /root/.ssh/authorized_keys; echo cleaned'
      echo "self-clean done"
    answer_detail: "persistence 는 osquery crontab + Wazuh FIM(syscheck 가 /etc, /root/.ssh 감시)로 잡는다. 방화벽이 못 본 호스트 지속성을 엔드포인트가 잡는 다층 방어. 키는 append 분만 sed 삭제 → 베이스 보존."
    verify:
      type: output_contains
      expect: 'w07_backdoor'
      field: stdout
      semantic:
        intent: "cron/authorized_keys persistence 를 osquery+FIM 으로 탐지 + 제거(베이스 보존)"
        success_criteria: ["crontab 에 w07_backdoor", "authorized_keys 변경", "cron rm + 키 sed 삭제"]
        acceptable_methods:
          - "**[OSS] osquery crontab + authorized_keys (권장)**"
          - "**[OSS] Wazuh FIM syscheck alert**"
          - "**[설명] persistence 경로 baseline**"
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 MISSION — Investigate: osquery JOIN 으로 프로세스↔포트 소유 추적

      분석가의 핵심 — "이 포트를 **어느 프로세스**가 듣고 있나"를 `processes` ⨝ `process_open_sockets`
      JOIN 으로 한 줄에 본다(의심 포트 → 책임 프로세스 → cmdline). 외부 연결이 있다면
      `remote_port!=0` 로 필터해 C2 통신을 본다. + `on_disk=0` 헌팅(삭제된 바이너리로 도는 은닉 프로세스).

      ## 💻 실행 명령
      ```bash
      # 프로세스 ↔ 소켓 소유 (서버는 리스닝 소켓이 항상 있음 → 포트의 주인 추적)
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.local_port,s.remote_address,s.remote_port FROM processes p JOIN process_open_sockets s USING(pid) WHERE s.local_port IN (80,443) LIMIT 5;'
      # 외부 연결만 (있을 때 C2 후보)
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.remote_address,s.remote_port FROM processes p JOIN process_open_sockets s USING(pid) WHERE s.remote_port!=0 LIMIT 5;'
      # 은닉 프로세스 헌팅
      docker exec el34-web osqueryi --json 'SELECT pid,name,path FROM processes WHERE on_disk=0 LIMIT 5;'
      ```
      ## ✅ 합격 기준
      JOIN 결과에 `pid` 와 포트(80/443)가 함께 보인다.
    hint: 'processes JOIN process_open_sockets USING(pid) — 포트의 주인 프로세스'
    category: analysis
    points: 10
    answer: |
      echo "=== 프로세스 ↔ 포트 소유 (80/443 의 주인) ==="
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.local_port,s.remote_address,s.remote_port FROM processes p JOIN process_open_sockets s USING(pid) WHERE s.local_port IN (80,443) LIMIT 5;'
      echo "=== 외부 연결(C2 후보, 있을 때만) ==="
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.remote_address,s.remote_port FROM processes p JOIN process_open_sockets s USING(pid) WHERE s.remote_port!=0 LIMIT 5;'
      echo "=== on_disk=0 (삭제된 바이너리로 도는 은닉 프로세스 헌팅) ==="
      docker exec el34-web osqueryi --json 'SELECT pid,name,path FROM processes WHERE on_disk=0 LIMIT 5;'
    answer_detail: "osquery JOIN 으로 '이 포트의 주인 프로세스는?' 를 한 줄에. 의심 포트→pid→cmdline 으로 역추적. remote_port!=0 은 외부(C2) 연결, on_disk=0 은 삭제된 바이너리로 도는 은닉 프로세스 헌팅. 분석가 timeline 의 핵심 질의."
    verify:
      type: output_contains
      expect: 'pid'
      field: stdout
      semantic:
        intent: "osquery JOIN/헌팅으로 포트↔프로세스 소유 + 외부연결/은닉 조사"
        success_criteria: ["processes JOIN sockets (포트의 주인)", "remote_port!=0 외부연결", "on_disk=0 헌팅"]
        acceptable_methods:
          - "**[OSS] JOIN USING(pid) 로 포트 소유 추적 (권장)**"
          - "**[OSS] remote_port!=0 / on_disk=0 헌팅**"
          - "**[설명] 의심 포트→프로세스 역추적**"
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 MISSION — SIEM: Wazuh 가 본 호스트 활동 (FIM/alert)

      ep-s05 의 파일 변경(/etc/cron.d, /root/.ssh)이 web 의 Wazuh agent → el34-siem 으로 갔는지 확인.
      방화벽이 못 본 호스트 행위를 SIEM 이 잡는 다층 방어의 마무리.

      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "Name: web,"
      docker exec el34-siem sh -c 'tail -300 /var/ossec/logs/alerts/alerts.json | grep -iE "syscheck|integrity|added|modified" | tail -3'
      ```
      ## ✅ 합격 기준
      web agent Active + (FIM 활동 시) syscheck/integrity alert 가 보인다.
    hint: 'agent_control web Active + alerts.json 의 syscheck/integrity'
    category: detect
    points: 10
    answer: |
      echo "=== web agent ==="
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "Name: web," || echo "(web agent)"
