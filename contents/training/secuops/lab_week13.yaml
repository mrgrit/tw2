      semantic:
        intent: "인텔→CDB 자동화(Stream Connector) 이해"
        success_criteria: ["connector 가동 확인", "OpenCTI→CDB sync 흐름"]
        acceptable_methods:
          - "**[OSS] docker ps connector (권장)**"
          - "**[설명] 자동 sync 파이프라인**"
    target_vm: siem

  - order: 7
    instruction: |
      ## 🎯 반복 공격 수렴 — 같은 출처 (출처 보존)

      반복 공격이 Wazuh로 수렴하는지(같은 출처 IP) 확인한다 — 빈도 룰의 입력원.

      ## 💻 실행 명령
      ```bash
      for i in 1 2 3; do docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=ct13b-$i%27%20UNION%20SELECT%201--%20-'"; done
      sleep 8
      docker exec el34-siem sh -c 'tail -400 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.rule.groups|index(\"ids\"))|.data.src_ip" | sort | uniq -c | tail -3'
      ```
      ## ✅ 합격 기준
      alerts.json 에 같은 출처 `10.20.30.202` 가 반복 집계된다.
