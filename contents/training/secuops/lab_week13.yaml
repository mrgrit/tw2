lab_id: standalone-secuops-week13
title: "맥락이 평결을 바꾼다 — enrichment + 빈도로 경보 우선순위 자동 격상"
version: standalone-secuops
course: secuops
week: 13
description: |
  W12의 정적 IOC 매칭(아느냐/모르느냐)을 넘어, 같은 경보라도 맥락(평판·지역·빈도)으로 위험도를
  동적으로 올린다. enrichment(맥락 보강)는 경보를 지우거나 만들지 않고 우선순위(level)만 바꾼다는
  것이 핵심 철칙이다. 본 실습에서는 (1) 평판이 나쁜 출발지를 올리는 평판 enrichment 격상 룰(101302,
  level 12)과 (2) 같은 출발지의 반복을 잡는 frequency/timeframe 빈도 격상 룰(base 101300 level5 →
  빈도 101301 level13)을 직접 작성한다. 빈도 룰은 한 줄로는 발화하지 않으므로 wazuh-logtest에 같은
  로그를 여러 줄(다중 라인) 입력해 누적을 재현하여 검증한다. 마지막으로 손으로 IOC를 넣던 한계를
  OpenCTI Stream Connector → Wazuh CDB 자동 동기화가 어떻게 넘는지 확인한다. 격상 룰은 검증 후 반드시
  삭제한다(공유 매니저 무중단·베이스 보존 — el34-siem은 모든 학생이 함께 쓰는 단일 manager).
  각 장비에 직접 접속(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, 공격 192.168.0.202, root은 sudo)해 실행한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W12(IOC/CDB 매칭) 통과"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §2(enrichment) §3(빈도) §4(평판격상) §5(자동화) 숙지"
objectives:
  - "enrichment(평판/지역/자산/빈도) 개념과 '우선순위만 바꾼다' 철칙 + 평판 격상 룰(id 101302, level 12) logtest 검증"
  - "frequency/timeframe + if_matched_sid 빈도 격상 룰(base 101300 → 빈도 101301, level 13)을 다중 라인 logtest로 검증"
  - "enrichment(평판/지역) + 빈도(반복) 결합으로 같은 경보를 P3→P2→P1로 동적 격상하는 우선순위 로직 이해"
  - "수작업 IOC 입력의 한계를 OpenCTI Stream Connector → STIX→key:value → Wazuh CDB 자동 동기화가 넘는 그림 이해"
  - "반복 공격이 같은 출처 IP(192.168.0.202, SNAT 없음)로 Wazuh에 수렴해 빈도 상관의 입력이 됨 + 커스텀 룰 정리로 베이스 보존"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — Wazuh 상관 엔진 + 인텔 스택이 살아 있는가

      이번 주의 동적 격상은 두 기반 위에서만 돈다 — (1) 빈도 상관을 계산하는 엔진
      **analysisd**(W09에서 배운 평결의 '심장')와, (2) enrichment 인텔(평판·STIX)을 공급하는
      **OpenCTI/connector** 스택이다. 둘 중 하나라도 죽어 있으면 빈도 격상도, 평판 격상도
      일어나지 않는다. 운영 인수 첫 30초의 점검이다.

      ## 💻 실행 명령

      **실습 컨테이너:** analysisd 는 `el34-siem`, `docker ps` 는 el34 호스트에서.

      ```bash
      # ── el34-siem 에서: 상관 엔진(analysisd) ──
      /var/ossec/bin/wazuh-control status | grep analysisd

      # ── el34 호스트에서: OpenCTI/connector 컨테이너 수 ──
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|connector'
      ```
      - `wazuh-control status` : manager의 daemon 상태 목록. `grep analysisd`로 상관 엔진만 추린다.
      - `grep -ciE 'opencti|connector'` : OpenCTI/connector 이름을 가진 컨테이너 **개수**를 센다
        (`-c`=count, `-i`=대소문자 무시, `-E`=확장 정규식).

      ## ✅ 합격 기준
      `wazuh-analysisd is running` + OpenCTI/connector 컨테이너가 1개 이상 가동(개수 ≥ 1).
    hint: 'wazuh-control analysisd + opencti/connector 수'
    category: survey
    points: 8
    answer: |
      echo "=== Wazuh 상관 엔진 ==="
      ssh ccc@10.20.32.100 /var/ossec/bin/wazuh-control status | grep analysisd
      echo "=== OpenCTI/connector 컨테이너 수 ==="
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|connector'
    answer_detail: "analysisd는 decoder→rule을 돌릴 뿐 아니라 timeframe 안의 반복을 세는 빈도(frequency) 상관까지 담당하는 엔진이다 — 이게 멈추면 빈도 격상 자체가 안 돈다(가용성 점검 1순위). OpenCTI/connector는 enrichment(평판)와 자동화(Stream Connector→CDB)의 인텔 소스다. 둘이 곧 동적 격상의 두 기반."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "상관 엔진 + 인텔 스택 점검"
        success_criteria: ["analysisd running", "opencti/connector 가동"]
        acceptable_methods:
          - "**[OSS] wazuh-control + docker ps (권장)**"
          - "**[설명] analysisd=빈도 상관 엔진**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 평판 enrichment 격상 룰 (id 101302)

      enrichment의 가장 직접적인 형태 — **출발지 평판이 나쁘면 같은 경보라도 우선순위를 올린다.**
      enrichment 단계에서 경보에 붙은 `reputation` 필드를 룰이 읽어, 값이 `known-bad`면 level 12로
      격상한다. 빈도 룰(다음 미션)과 달리 평판 룰에는 frequency가 없다 — "단 한 번이라도 알려진
      악성 출발지면 위험"이므로 **한 줄로도 발화**한다. 작업 절차는 (1) 백업 → (2) 룰 추가 →
      (3) wazuh-logtest로 격상 검증 → (4) cp 복원(self-clean)이다. 룰 id는 W13 네임스페이스 1013xx.

      ## 💻 실행 명령

      **SIEM 장비:** `ssh ccc@10.20.32.100`(비번 `1`)로 접속해 실행한다.
      (이 단계는 이미 bare — el34-siem 안에서 그대로 실행한다.)

      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w13_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="edu_w13,">
        <rule id="101302" level="12">
          <decoded_as>json</decoded_as>
          <field name="reputation">known-bad</field>
          <description>EDU W13 - bad-reputation source, escalate</description>
        </rule>
      </group>
      EOF'
      echo '{"reputation":"known-bad","src_ip":"9.9.9.9"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/w13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w13_lr.bak
      ```
      - `<decoded_as>json</decoded_as>` : json decoder가 파싱한 로그만 대상으로 좁힌다.
      - `<field name="reputation">known-bad</field>` : 경보의 `reputation` 필드가 `known-bad`일 때만 매치.
      - `wazuh-logtest` : 라이브 analysisd를 건드리지 않고 룰셋을 새로 읽어 테스트하는 모의재판 도구.

      ## ✅ 합격 기준
      logtest Phase 3에 rule `101302` level 12 격상이 "Alert to be generated"로 발화하고,
      정리 후 잔재가 0이다.
    hint: 'reputation 필드 격상 룰(101302) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      ssh ccc@10.20.32.100 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w13_lr.bak'
      ssh ccc@10.20.32.100 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"edu_w13r,\">
        <rule id=\"101302\" level=\"12\">
          <decoded_as>json</decoded_as>
          <field name=\"reputation\">known-bad</field>
          <description>EDU W13 bad-reputation source escalate</description>
        </rule>
      </group>
      EOF"'
      ssh ccc@10.20.32.100 'cat > /tmp/w13r.json <<EOF
      {"reputation":"known-bad","src_ip":"9.9.9.9"}
      EOF'
      echo "=== 평판 격상 logtest ==="
      ssh ccc@10.20.32.100 'sudo /var/ossec/bin/wazuh-logtest < /tmp/w13r.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/w13r.json'
      ssh ccc@10.20.32.100 'sudo cp /tmp/w13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w13_lr.bak; echo "복원 잔재=$(grep -c 101302 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "enrichment(평판)이 붙인 reputation 필드가 known-bad면 level 12로 격상 — 경보 자체는 그대로 두고 출발지 평판 때문에 우선순위만 오른다(enrichment의 철칙). 빈도 룰과 달리 frequency가 없어 한 줄로도 발화한다. 운영에서는 reputation을 사람이 넣지 않고 CDB list(평판 IOC)+<list lookup>로 src_ip를 조회해 자동 판정한다. 평판은 시간이 지나면 낡으므로 신선도 관리가 생명 → 자동화(STEP 6)로 이어진다."
    verify:
      type: output_contains
      expect: '101302'
      field: stdout
      semantic:
        intent: "평판 enrichment 기반 격상 룰 작성 + logtest 검증"
        success_criteria: ["id 101302 작성", "logtest level 12 발화", "cp 복원 self-clean"]
        acceptable_methods:
          - "**[OSS] reputation field 룰 + wazuh-logtest (권장)**"
          - "**[설명] enrichment=우선순위 변경**"
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 반복 IOC 공격 — 같은 출발지에서 반복

      빈도 룰의 입력은 "같은 출발지의 반복"이다. 그 입력을 실제로 만들어내야 다음 미션의 빈도
      격상을 검증할 수 있다. 외부 공격자(같은 출발지 192.168.0.202)에서 알려진 악성 도구(sqlmap UA)로
      4회 반복 공격을 흘려보내, web의 ModSecurity audit 로그에 반복 흔적이 남는지 확인한다.
      단발이면 P3지만, 이렇게 짧은 시간에 반복되면 빈도 룰의 격상 대상이 된다.

      ## 💻 실행 명령

      **실습 컨테이너:** 반복 공격은 `el34-attacker`, audit 확인은 `el34-web`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: sqlmap 4회 반복 공격 ──
      curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-1'
      curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-2'
      curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-3'
      curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-4'

      # ── el34-web 에서: audit 의 sqlmap 반복 건수 (공격 3초 후) ──
      sudo tail -120 /var/log/apache2/modsec_audit.log | grep -c sqlmap
      ```
      - `-A sqlmap/1.7` : User-Agent를 sqlmap으로 위장(알려진 악성 도구 시그니처).
      - 자연 URL `http://dvwa.el34.lab/` : Apache vhost 라우팅(호스트명=Host 헤더(공인 .161 경유 dvwa로).
      - `grep -c sqlmap` : audit 로그에 남은 sqlmap 흔적의 건수를 센다.

      ## ✅ 합격 기준
      반복 공격(sqlmap)이 modsec audit에 여러 건(반복 횟수만큼) 남는다.
    hint: '같은 출처 sqlmap 4회 반복 → audit 다건'
    category: recon
    points: 10
    answer: |
      echo "=== 반복 IOC 공격 (4회) ==="
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-1'"
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-2'"
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-3'"
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 'http://dvwa.el34.lab/?id=ct13-4'"
      sleep 3
      echo "=== audit 의 sqlmap 반복 건수 ==="
      ssh ccc@10.20.32.80 'sudo tail -120 /var/log/apache2/modsec_audit.log | grep -c sqlmap'
    answer_detail: "같은 출발지(192.168.0.202)에서 sqlmap을 반복하면 빈도 신호가 만들어진다 — 이게 다음 미션 빈도 룰(101301)의 입력원이다. 단발이면 P3지만 timeframe 안에 반복되면 빈도 룰이 격상하고, 평판 enrichment(101302)와 결합하면 즉시 P1이 된다. el34는 fw가 SNAT를 안 해 출발지 IP가 보존되므로 same_source_ip 빈도가 정확히 동작한다."
    verify:
      type: output_contains
      expect: 'sqlmap'
      field: stdout
      semantic:
        intent: "반복 IOC 공격으로 빈도 신호 생성"
        success_criteria: ["sqlmap 반복 공격", "audit 다건", "빈도 신호 이해"]
        acceptable_methods:
          - "**[OSS] 외부 attacker 반복 sqlmap (권장)**"
          - "**[설명] 빈도=격상 신호**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 빈도 격상 룰 — 반복되면 고위험 (id 101301)

      이번 주의 핵심 — "**120초 안에 3회 이상 매칭되면 critical로 격상**" 하는 빈도 룰을 직접 쓴다.
      빈도 격상은 항상 **두 단 구조**다 — 한 건을 잡는 base 룰(101300, level 5)과, 그 base의 반복을
      세는 빈도 룰(101301, level 13). `frequency="3" timeframe="120"`이 "120초 안에 3회+"라는 임계이고,
      `<if_matched_sid>101300</if_matched_sid>`가 "101300이 그 시간 창 안에 반복됐을 때만" 발동한다는
      뜻이다.

      ⚠️ **빈도 룰의 함정**: wazuh-logtest에 로그를 **한 줄만** 넣으면 base(101300, level 5)만 뜨고
      빈도 룰(101301)은 조용하다 — 누적이 안 됐기 때문이다. 그래서 같은 로그를 **5줄(다중 라인)**
      넣어 frequency=3 임계를 넘겨야 101301(level 13)이 발화한다.

      ## 💻 실행 명령

      **SIEM 장비:** `ssh ccc@10.20.32.100`(비번 `1`)로 접속해 실행한다.
      (이 단계는 이미 bare — el34-siem 안에서 그대로 실행한다.)

      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w13_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="edu_w13f,">
        <rule id="101300" level="5">
          <decoded_as>json</decoded_as>
          <field name="tool">sqlmap</field>
          <description>EDU W13 base - known-bad tool</description>
        </rule>
        <rule id="101301" level="13" frequency="3" timeframe="120">
          <if_matched_sid>101300</if_matched_sid>
          <description>EDU W13 - repeated known-bad, escalate critical</description>
        </rule>
      </group>
      EOF'
      # 반복 입력(5줄) → 빈도 룰 발화
      printf '%s\n%s\n%s\n%s\n%s\n' '{"tool":"sqlmap"}' '{"tool":"sqlmap"}' '{"tool":"sqlmap"}' '{"tool":"sqlmap"}' '{"tool":"sqlmap"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/w13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w13_lr.bak
      ```
      - `frequency="3" timeframe="120"` : 120초 안에 3회 이상이 격상 임계.
      - `<if_matched_sid>101300</if_matched_sid>` : base 룰 101300이 그 시간 창 안에 반복됐을 때만 발동.
      - `printf '%s\n%s\n...'` : 같은 sqlmap 로그를 5줄로 만들어 표준입력으로 흘려 빈도 누적을 재현.
      - (정밀화) `<same_source_ip/>`를 더하면 "서로 다른 IP 한 번씩"이 아니라 "같은 출처의 반복"만 격상한다.

      ## ✅ 합격 기준
      logtest 출력에 rule `101301` level 13 + `frequency` 표시가 떠 빈도 격상이 발화하고,
      정리 후 잔재가 0이다. (처음 몇 줄은 101300 level 5만 뜨다가 임계를 넘으면 101301로 격상)
    hint: 'base(101300)+frequency(101301) → 반복 입력 logtest 발화 → cp 복원'
    category: manipulation
    points: 18
    answer: |
      ssh ccc@10.20.32.100 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w13_lr.bak'
      ssh ccc@10.20.32.100 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"edu_w13f,\">
        <rule id=\"101300\" level=\"5\">
          <decoded_as>json</decoded_as>
          <field name=\"tool\">sqlmap</field>
          <description>EDU W13 base known-bad tool</description>
        </rule>
        <rule id=\"101301\" level=\"13\" frequency=\"3\" timeframe=\"120\">
          <if_matched_sid>101300</if_matched_sid>
          <description>EDU W13 repeated known-bad escalate critical</description>
        </rule>
      </group>
      EOF"'
      ssh ccc@10.20.32.100 'cat > /tmp/w13f.json <<EOF
      {"tool":"sqlmap","src_ip":"9.9.9.9"}
      {"tool":"sqlmap","src_ip":"9.9.9.9"}
      {"tool":"sqlmap","src_ip":"9.9.9.9"}
      {"tool":"sqlmap","src_ip":"9.9.9.9"}
      {"tool":"sqlmap","src_ip":"9.9.9.9"}
