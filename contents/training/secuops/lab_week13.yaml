      ## 💻 보고서 양식
      ```markdown
      # el34 W13 enrichment/빈도 보고서 (학번, 이름)
      ## 1. enrichment (평판/지역/자산) — 평판 격상 룰 101302
      ## 2. 빈도 (frequency/timeframe) — 빈도 격상 룰 101301
      ## 3. 결합 → 동적 우선순위 (P3→P2→P1)
      ## 4. 자동화 (OpenCTI Stream Connector → CDB)
      ## 5. 출처 보존 → same_source_ip 빈도 상관
      ```
      ## ✅ 합격 기준
      보고서에 enrichment + 빈도 격상이 포함된다.
    hint: 'enrichment + 빈도 → 동적 우선순위 + 자동화'
    category: report
    points: 5
    answer: |
      cat <<'EOF'
      # el34 W13 enrichment/빈도 보고서
      ## 1. enrichment: 평판(known-bad)→101302 level12, 지역(GeoIP), 자산가치
      ## 2. 빈도: frequency=3 timeframe=120 + if_matched_sid → 101301 level13
