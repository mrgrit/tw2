      echo "평판 불량(rule 101302)   → P2 (주의)"
      echo "적대 국가(GeoIP)         → P2 (주의)"
      echo "평판 불량 + 반복(101301) → P1 (고위험, 자동 격상)"
      echo "→ enrichment(평판/지역) + 빈도(반복)가 결합되면 같은 경보가 P1로"
    answer_detail: "맥락이 평결을 바꾼다 — enrichment(평판/지역/자산)와 빈도(반복)를 결합해 우선순위를 동적 조정. 분석가는 P1부터 본다. 정적 매칭(W12)을 넘은 CTI 운영의 성숙."
    verify:
      type: output_contains
      expect: 'P1'
      field: stdout
      semantic:
        intent: "enrichment + 빈도 결합의 동적 우선순위 이해"
        success_criteria: ["맥락별 P3→P2→P1", "결합 격상 로직"]
        acceptable_methods:
          - "**[설명] 맥락 결합 우선순위 (권장)**"
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 자동화 — OpenCTI Stream Connector → CDB sync

      수작업 IOC 입력의 한계를 자동화로 넘는다. OpenCTI connector가 인텔을 실시간 수집·변환한다.

      ## 💻 실행 명령
