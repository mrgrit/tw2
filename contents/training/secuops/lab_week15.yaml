      - `<rule id="101510" level="13">` — 내 네임스페이스(1015xx)의 IOC 격상 룰. level 13 은 고위험.
        `<decoded_as>json</decoded_as>` 는 json decoder 가 파싱한 로그만 대상으로 좁히고,
        `<field name="apt_ioc">apt15-c2</field>` 는 그 로그의 apt_ioc 필드가 apt15-c2 일 때 매치한다.
      - `echo '{...}' | wazuh-logtest` — 라이브 analysisd 를 건드리지 않고 별도 테스트 인스턴스에서
