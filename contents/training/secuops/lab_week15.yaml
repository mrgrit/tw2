        뜨면 격상 로직이 맞은 것.
      - `cp /tmp/w15_lr.bak ...; rm -f` — 백업으로 복원하고 백업 파일을 지운다 — 잔재 0.

      ## ✅ 합격 기준
      logtest에 rule `101510` level 13 격상이 발화한다(정리 후 잔재 0, 베이스 보존).
