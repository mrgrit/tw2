  - order: 12
    instruction: |
      ## 🎯 정리 확인 — 공유 인프라 베이스 복원 (수료 마무리)

      **개념 한 줄.** 공유 인프라에서는 기말 실습 흔적을 끝까지 남기지 않아야 한다 — 다음 학생·운영에
      영향을 주면 안 된다. "내가 심은 것은 내가 정리한다" 는 보안운영자의 기본 규율이다.

      네 가지 흔적이 모두 사라졌는지 최종 확인한다 — 백도어 계정 **w15ghost**, C2 리스너 **61515**,
      IDS 룰 **sid 9015001**, Wazuh 룰 **101510**. 각 미션에서 self-clean 했더라도, 여기서 일괄 점검해
      잔재 0 을 보장한다.

      ## 💻 확인 명령

      **실습 컨테이너:** 계정/리스너는 `el34-web`, IDS 룰은 `el34-ips`, Wazuh 룰은 `el34-siem`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: 계정/리스너 잔재 ──
      id w15ghost >/dev/null 2>&1 && userdel -r w15ghost; id w15ghost >/dev/null 2>&1 && echo "계정 잔재!" || echo "user ok"; pgrep -f "http.server 61515" && echo "리스너 잔재!" || echo "listener ok"

      # ── el34-ips 에서: IDS sid 9015001 잔재 ──
      sudo grep -c "9015001" /etc/suricata/rules/local.rules

      # ── el34-siem 에서: Wazuh rule 101510 잔재 ──
      echo "101510 잔재=$(grep -c 101510 /var/ossec/etc/rules/local_rules.xml)"

      echo "---check done---"
      ```

      ## 🔍 도구·옵션 풀이
      - `id w15ghost >/dev/null 2>&1 && userdel -r w15ghost; id w15ghost && echo "계정 잔재!" || echo "user ok"` — 계정을
        한 번 더 지운 뒤(멱등) `id` 로 존재 여부를 확인한다. 없으면 `user ok`.
      - `pgrep -f "http.server 61515" && echo "리스너 잔재!" || echo "listener ok"` — 리스너 프로세스가
        남았는지 본다. 없으면 `listener ok`.
      - `grep -c "9015001" .../local.rules` — IDS 커스텀 룰 잔재 수. 0 이어야 베이스 보존(sid
        1000001–1000005)이 지켜진 것.
      - `grep -c 101510 .../local_rules.xml` — Wazuh 인텔 룰 잔재 수. 0 이어야 한다. `check done` 이
        뜨고 모든 잔재가 0 이면 공유 인프라가 베이스 상태로 복원된 것.

      ## ✅ 합격 기준
      계정/리스너/IDS sid/Wazuh 룰 잔재 0 + `check done`(잔재가 있으면 해당 미션의 정리 명령을 재실행).
