lab_id: standalone-secuops-week15
title: "기말(수료) — APT 캠페인을 5종 장비 + 위협인텔로 끝까지 막기"
version: standalone-secuops
course: secuops
week: 15
description: |
  보안운영 과정 수료 시험. 한 APT가 5단계 킬체인(정찰→웹 익스플로잇→호스트 발판→C2/유출→대응)으로
  들어온다. 14주의 무기(방화벽·IDS·WAF·SIEM·osquery·sysmon·위협인텔)를 하나의 캠페인에 총동원해 각
  단계를 탐지·차단·헌팅하고 APT IR 보고서로 종합한다. 출처 10.20.30.202(보존)로 5단계를 한 타임라인으로.
  모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서 `docker exec el34-<comp>`(sysmon은 호스트 syslog).
  IDS/Wazuh 룰은 추가→검증→삭제, 발판은 self-clean — 끝나면 베이스 상태로 복원.
difficulty: hard
duration_minutes: 300
prerequisites:
  - "W01–W14 전부 통과"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec"
  - "lecture §3(단계별 대응) §4(IR 보고서) 숙지"
objectives:
  - "APT 5단계 킬체인을 전 무기로 탐지·차단·헌팅"
  - "IDS 룰(sid 9015001) + WAF anomaly(949110) + osquery 헌팅 + sysmon + Wazuh 인텔 룰(101510)"
  - "5계층 SIEM 수렴 + 출처 IP 상관 + APT IR 보고서"
  - "모든 실습 흔적 self-clean (공유 인프라 보존)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 전 무기 가용성 (기말 동원 준비)

      APT 5단계에 동원할 모든 무기를 점검한다(fw/ips/web/host/sysmon/siem).

      ## 💻 실행 명령
      ```bash
      docker exec el34-fw sh -c 'sudo nft list ruleset 2>/dev/null | grep -c dnat'
      docker exec el34-ips sh -c 'suricata -V 2>/dev/null | head -1'
      docker exec el34-web osqueryi --version
      systemctl is-active sysmon
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ```
      ## ✅ 합격 기준
      fw/ips/web(osquery)/sysmon/siem 전부 응답.
    hint: 'fw nft + suricata + osquery + sysmon active + analysisd'
    category: survey
    points: 8
    answer: |
      echo "=== fw(nftables DNAT) ==="; docker exec el34-fw sh -c 'sudo nft list ruleset 2>/dev/null | grep -c dnat'
      echo "=== ips(Suricata) ==="; docker exec el34-ips sh -c 'suricata -V 2>/dev/null | head -1'
      echo "=== host(osquery) ==="; docker exec el34-web osqueryi --version
      echo "=== sysmon ==="; systemctl is-active sysmon
      echo "=== siem(Wazuh) ==="; docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "기말은 전 무기 동원 — fw(L4 DNAT)·IDS(Suricata)·WAF/osquery(web)·sysmon(host event)·Wazuh(SIEM). 하나라도 죽으면 그 단계가 사각이 된다."
    verify:
      type: output_contains
      expect: 'active'
      field: stdout
      semantic:
        intent: "APT 대응 전 무기 가용성 점검"
        success_criteria: ["fw/ips/web/sysmon/siem 응답", "전 계층 준비"]
        acceptable_methods:
          - "**[OSS] 각 무기 상태 확인 (권장)**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정찰 (Recon) — 스캐너 UA → WAF 913

      APT 1단계: 외부 공격자(10.20.30.202)가 스캐너로 표면을 훑는다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=apt15-1"'
      sleep 3
      docker exec el34-web sh -c 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "913[0-9]{3}" | sort -u'
      ```
      ## ✅ 합격 기준
      WAF audit에 스캐너 탐지(`913`)가 남는다.
    hint: 'sqlmap UA 정찰 → modsec 913'
    category: recon
    points: 8
    answer: |
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=apt15-1"'
      sleep 3
      echo "=== WAF scanner 탐지(913) ==="
      docker exec el34-web sh -c 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "913[0-9]{3}" | sort -u'
    answer_detail: "APT 1단계 정찰 — 스캐너 UA가 WAF 913(scanner detection)에 잡힌다. 같은 UA는 다음 IDS 룰로 네트워크에서도 잡혀 두 무기가 교차한다."
    verify:
      type: output_contains
      expect: '913'
      field: stdout
      semantic:
        intent: "APT 정찰을 WAF로 탐지"
        success_criteria: ["modsec 913 scanner", "정찰 단계 식별"]
        acceptable_methods:
          - "**[OSS] 외부 attacker sqlmap UA → audit 913 (권장)**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ① IDS 정찰 탐지 룰 (sid 9015001)

      정찰을 네트워크에서도 끊는다. Suricata 룰(sid 9015001) 추가→reload→트리거→eve→삭제(베이스 보존).

      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"APT15 sqlmap recon UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; sid:9015001; rev:1;)
      EOF"'
      docker exec el34-ips sh -c 'sudo suricatasc -c reload-rules'
      sleep 2
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=apt15-3"'
      sleep 4
      docker exec el34-ips sh -c 'sudo grep "9015001" /var/log/suricata/eve.json | tail -1 | jq "{sig:.alert.signature,src:.src_ip}"'
      docker exec el34-ips sh -c 'sudo sed -i "/sid:9015001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null'
      ```
      ## ✅ 합격 기준
      eve.json에 `APT15 sqlmap` 시그니처가 잡힌다(정리 후 베이스 보존).
    hint: 'local.rules sqlmap UA 룰(9015001) → reload → 트리거 → eve → sed 삭제'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-ips sh -c 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"APT15 sqlmap recon UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; classtype:web-application-attack; sid:9015001; rev:1;)
      EOF"'
      docker exec el34-ips sh -c 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -1'
      docker exec el34-ips sh -c 'sudo suricatasc -c reload-rules'
      sleep 2
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=apt15-3"'
      sleep 4
      echo "=== eve.json alert ==="
      docker exec el34-ips sh -c 'sudo grep "9015001" /var/log/suricata/eve.json | tail -1 | jq "{sig:.alert.signature,src:.src_ip}"'
      docker exec el34-ips sh -c 'sudo sed -i "/sid:9015001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo rule_removed'
    answer_detail: "APT 정찰을 IDS(sid 9015001 fast_pattern)로 네트워크에서 차단. WAF(913, HTTP 의미)와 IDS(UA 문자열, 네트워크)가 같은 정찰을 두 관점으로. 끝나면 sed 삭제로 base 룰(1000001-5) 보존."
    verify:
      type: output_contains
      expect: 'APT15 sqlmap'
      field: stdout
      semantic:
        intent: "APT 정찰을 커스텀 IDS 룰로 탐지 + 베이스 보존"
        success_criteria: ["sid 9015001 작성·reload", "eve.json 발화", "sed 삭제 보존"]
        acceptable_methods:
          - "**[OSS] http.user_agent fast_pattern + suricatasc (권장)**"
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 ② 웹 익스플로잇 침투 — SQLi → 403

      APT 2단계: 정찰에 이어 SQLi로 웹앱 침투 시도. dvwa 차단 모드 → WAF 403.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w '침투 응답:%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=apt15-4%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
      ```
      ## ✅ 합격 기준
      응답이 `403`(WAF 차단)이다.
    hint: 'UNION SELECT → dvwa 403'
    category: response
    points: 10
    answer: |
      echo "=== APT 2단계 웹 익스플로잇 ==="
      docker exec el34-attacker sh -c "curl -s -o /dev/null -w '침투 응답:%{http_code}\n' -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=apt15-4%27%20UNION%20SELECT%20user,password%20FROM%20users--%20-\""
    answer_detail: "APT 2단계 — SQLi 웹 익스플로잇. dvwa(차단 모드)에서 WAF anomaly 누적 → 403. 정찰(IDS/WAF)에 이은 침투를 WAF가 막는다."
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "APT 웹 익스플로잇을 WAF로 차단(403)"
        success_criteria: ["UNION SELECT 침투", "403 차단"]
        acceptable_methods:
          - "**[OSS] 외부 attacker SQLi → 403 (권장)**"
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ② WAF anomaly 차단 확인 (942 → 949110)

      침투가 단일 룰이 아닌 anomaly 누적으로 차단됨을 확인한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=apt15-5%27%20UNION%20SELECT%201,2--%20-\""
      sleep 3
      docker exec el34-web sh -c 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "94[29]1[0-9]{2}" | sort -u'
      ```
      ## ✅ 합격 기준
      audit에 `949110`(anomaly 누적 차단)이 보인다.
    hint: 'SQLi 재현 후 audit 의 942100 + 949110'
    category: detect
    points: 12
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=apt15-5%27%20UNION%20SELECT%201,2--%20-\""
      sleep 3
      echo "=== audit 942/949 ==="
      docker exec el34-web sh -c 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "94[29]1[0-9]{2}" | sort -u'
    answer_detail: "942100(SQLi)이 anomaly score를 올리고 949110(Inbound Anomaly Score Exceeded)에서 누적 임계 초과 → 403. 단일 룰이 아닌 누적 결정."
    verify:
      type: output_contains
      expect: '949110'
      field: stdout
      semantic:
        intent: "WAF anomaly 누적 차단(942→949110) 확인"
        success_criteria: ["audit 942100 + 949110", "누적 차단 이해"]
        acceptable_methods:
          - "**[OSS] audit grep 94x (권장)**"
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 ③ 호스트 발판 재현 — C2 리스너(61515) + 백도어 계정(w15ghost)

      APT 3단계: 침투를 발판으로 C2 리스너와 백도어 계정을 심는다(측면이동·지속성).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'nohup python3 -m http.server 61515 >/dev/null 2>&1 & echo c2_started'
      docker exec el34-web sh -c 'userdel -r w15ghost 2>/dev/null; useradd -m -s /bin/bash w15ghost && echo account_created'
      sleep 1
      docker exec el34-web osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=61515;'
      docker exec el34-web sh -c 'pkill -f "http.server 61515"'
      ```
      ## ✅ 합격 기준
      C2 리스너(`61515`) + 계정 생성이 재현된다.
    hint: 'python3 리스너 61515 + useradd w15ghost'
    category: response
    points: 10
    answer: |
      docker exec el34-web sh -c 'nohup python3 -m http.server 61515 >/dev/null 2>&1 & echo c2_started'
      docker exec el34-web sh -c 'userdel -r w15ghost 2>/dev/null; useradd -m -s /bin/bash w15ghost && echo account_created'
      sleep 1
      echo "=== C2 리스너 61515 확인 ==="
      docker exec el34-web osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=61515;'
      docker exec el34-web sh -c 'pkill -f "http.server 61515" 2>/dev/null; echo listener_killed'
    answer_detail: "APT 3단계 발판 — C2 리스너(비표준 포트 61515, T1571) + 백도어 계정(w15ghost, T1136). 네트워크 장비가 못 보는 호스트 내부. 계정은 다음 헌팅 단계로 남긴다."
    verify:
      type: output_contains
      expect: '61515'
      field: stdout
      semantic:
        intent: "APT 호스트 발판(C2 리스너 + 계정) 재현"
        success_criteria: ["리스너 61515", "계정 w15ghost", "발판 기법 이해"]
        acceptable_methods:
          - "**[OSS] python 리스너 + useradd (권장)**"
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ③ osquery 헌팅 — 발판 사냥

      APT의 호스트 발판을 osquery로 사냥한다(C2 리스너 JOIN + 백도어 계정).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'nohup python3 -m http.server 61515 >/dev/null 2>&1 & sleep 1'
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.port FROM processes p JOIN listening_ports s USING(pid) WHERE s.port=61515;'
      docker exec el34-web osqueryi --json 'SELECT username,uid,shell FROM users WHERE username="w15ghost";'
      docker exec el34-web sh -c 'pkill -f "http.server 61515"'
      ```
      ## ✅ 합격 기준
      osquery로 발판(계정 `w15ghost` + 리스너 61515)을 사냥한다.
    hint: 'osquery listening_ports JOIN(61515) + users(w15ghost)'
    category: analysis
    points: 12
    answer: |
      docker exec el34-web sh -c 'nohup python3 -m http.server 61515 >/dev/null 2>&1 & sleep 1; echo ready'
      echo "=== C2 리스너 헌팅 (JOIN) ==="
      docker exec el34-web osqueryi --json 'SELECT p.pid,p.name,s.port FROM processes p JOIN listening_ports s USING(pid) WHERE s.port=61515;'
      echo "=== 백도어 계정 헌팅 ==="
      docker exec el34-web osqueryi --json 'SELECT username,uid,shell FROM users WHERE username="w15ghost";'
      docker exec el34-web sh -c 'pkill -f "http.server 61515" 2>/dev/null; echo hunted'
    answer_detail: "APT 발판을 osquery로 사냥 — 리스너는 listening_ports⨝processes(포트의 주인 프로세스), 계정은 users. 방화벽/IDS가 못 본 호스트 내부 측면이동·C2를 호스트 가시성으로 끄집어낸다."
    verify:
      type: output_contains
      expect: 'w15ghost'
      field: stdout
      semantic:
        intent: "APT 호스트 발판을 osquery로 헌팅"
        success_criteria: ["리스너 61515 JOIN", "계정 w15ghost", "호스트 내부 가시성"]
        acceptable_methods:
          - "**[OSS] osquery JOIN + users (권장)**"
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 ④ C2 채널 — sysmon 이벤트 (인코딩 명령)

      APT 4단계: 인코딩된 C2 명령은 sysmon ProcessCreate 이벤트로 잡는다(단명이라 스냅샷은 놓침).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web python3 -c "import base64; base64.b64decode('YzI=')  # apt15 c2 sim"
      sleep 5
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,60}" | head -1
      ```
      ## ✅ 합격 기준
      sysmon 이벤트에 인코딩 C2 명령(`b64decode`)이 남는다.
    hint: '단명 인코딩 C2 프로세스 → sysmon syslog (b64decode)'
    category: detect
    points: 12
    answer: |
      echo "=== APT 4단계 인코딩 C2 명령(단명) ==="
      docker exec el34-web python3 -c "import base64; base64.b64decode('YzI=')  # apt15 c2 sim" 2>/dev/null
      sleep 5
      echo "=== sysmon ProcessCreate 이벤트 (스냅샷은 못 잡음) ==="
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,60}" | head -1
    answer_detail: "APT 4단계 인코딩 C2 명령은 단명이라 osquery 스냅샷이 놓치지만, sysmon ProcessCreate(EventID 1)가 생성 순간의 cmdline을 남긴다. 호스트 이벤트 스트림의 가치."
    verify:
      type: output_contains
      expect: 'b64decode'
      field: stdout
      semantic:
        intent: "APT C2 인코딩 명령을 sysmon 이벤트로 포착"
        success_criteria: ["sysmon syslog b64decode", "단명=이벤트 영역"]
        acceptable_methods:
          - "**[OSS] sysmon syslog 헌팅 (권장)**"
    target_vm: siem

  - order: 9
    instruction: |
      ## 🎯 ④ APT IOC 인텔 룰 (Wazuh id 101510)

      이 APT의 IOC(C2 도구/포트)를 Wazuh 룰로 격상해 재발 시 자동 고위험. logtest 검증 → 삭제.

      ## 💻 실행 명령
      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w15_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="edu_w15,">
        <rule id="101510" level="13">
          <decoded_as>json</decoded_as>
          <field name="apt_ioc">apt15-c2</field>
          <description>EDU W15 - APT IOC matched, escalate critical</description>
        </rule>
      </group>
      EOF'
      echo '{"apt_ioc":"apt15-c2","src_ip":"10.20.30.202"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/w15_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w15_lr.bak
      ```
      ## ✅ 합격 기준
      logtest에 rule `101510` level 13 격상이 발화한다(정리 후 보존).
    hint: 'APT IOC 격상 룰(101510) → logtest → cp 복원'
    category: manipulation
    points: 14
    answer: |
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w15_lr.bak'
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"edu_w15,\">
        <rule id=\"101510\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"apt_ioc\">apt15-c2</field>
          <description>EDU W15 APT IOC matched escalate critical</description>
