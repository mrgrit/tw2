      ## 🔍 작성 지침
      - **단계별 대응 표** 의 각 행에 STEP 2–9 에서 직접 확보한 **증거** 를 적는다 — 정찰(eve sig /
        audit 913), 침투(403 + remote IP), 발판(uid / pid:port), C2(b64decode cmdline / logtest).
      - **출처 상관** — 5단계 모두 출처 192.168.0.202(보존)임을 명시해 한 캠페인임을 입증한다.
      - **결론** — "단일 무기로 APT 를 못 막는다 → 다층 방어 + SIEM 수렴 + 인텔 격상(재발 자동탐지)"
        의 종합 결론을 적는다. lecture §3.2 의 IR 보고서 구조를 따른다.

      ## ✅ 합격 기준
