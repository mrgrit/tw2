lab_id: standalone-secuops-week15
title: "기말(수료) — APT 캠페인을 5종 장비 + 위협인텔로 끝까지 막기"
version: standalone-secuops
course: secuops
week: 15
description: |
  보안운영 과정 수료 시험. 한 APT(끈질긴 표적 공격)가 5단계 킬체인(① 정찰 → ② 웹 익스플로잇 →
  ③ 호스트 발판·측면이동 → ④ C2 채널·유출 → ⑤ 대응·복구)으로 들어온다. W08 중간고사가 3단계
  사슬을 5종 장비로 끊는 시험이었다면, 기말은 거기에 ④ C2(sysmon+위협인텔)와 ⑤ IR(보고서)을 더해
  킬체인 전 주기를 다룬다. 14주의 모든 무기(방화벽·IDS·WAF·osquery·SIEM·sysmon·위협인텔)를 하나의
  캠페인에 총동원해 각 단계를 탐지·차단·헌팅하고, 출처 IP 192.168.0.202(SNAT 없음 → 보존)로 5단계를
  한 캠페인 타임라인에 엮어 APT IR 보고서로 종합한다. 핵심 평가는 단일 무기 실력이 아니라, 한
  캠페인을 전 계층에서 추적·대응하고 한 사건으로 종합하는 통합 능력이다.
  각 장비에 직접 접속(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, 공격 192.168.0.202, root은 sudo)해 실행한다.
  IDS/Wazuh 룰은 추가→검증→삭제, 발판(계정·리스너)은 self-clean — 끝나면 베이스 상태로 복원.
difficulty: hard
duration_minutes: 300
prerequisites:
  - "W01–W14 전부 통과"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §3(단계별 대응) §4(IR 보고서) 숙지"
objectives:
  - "동원할 전 무기(fw/ips/web/host/sysmon/siem)의 가용성을 시험 전 점검한다"
  - "APT ① 정찰(스캐너 UA)을 WAF(913)와 IDS 커스텀 룰(sid 9015001)로 다른 층위에서 탐지하고 베이스 룰을 보존한다"
  - "APT ② 웹 익스플로잇(SQLi)이 WAF anomaly 누적(942100→949110)으로 403 차단됨을 audit 로 확인한다"
  - "APT ③ 호스트 발판(C2 리스너 61515/백도어 계정 w15ghost)을 osquery 의 SQL 질의(users·listening_ports JOIN)로 사냥한다"
  - "APT ④ C2 단명·인코딩 명령을 sysmon ProcessCreate(EventID 1)로 포착하고, IOC를 Wazuh 인텔 룰(id 101510, level 13)로 격상한다"
  - "APT ⑤ 5계층 흔적의 SIEM(Wazuh) 수렴을 확인하고 출처 IP(192.168.0.202)로 한 캠페인 타임라인으로 상관한다"
  - "5단계를 단계별 무기·증거·출처 상관·재발 방지(인텔 격상)로 종합한 APT IR 보고서를 작성한다"
  - "공유 인프라에 심은 모든 흔적(계정/리스너/IDS 룰/Wazuh 룰)을 self-clean 해 베이스 상태로 복원한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 전 무기 가용성 (기말 동원 준비)

      **개념 한 줄.** APT 종합 대응의 전제는 5단계에 동원할 모든 무기가 가용해야 한다는 것이다.
      하나라도 죽어 있으면 그 단계가 사각(blind spot)이 되어, 그 계층의 공격을 통째로 놓친다.

      기말에서 동원할 무기는 여섯이다 — **방화벽(el34-fw / nftables DNAT)** · **IDS(el34-ips /
      Suricata)** · **호스트 가시화(el34-web / osquery)** · **sysmon(호스트 / 이벤트 스트림)** ·
      **SIEM(el34-siem / Wazuh analysisd)** 이고, WAF(el34-web / ModSecurity)는 ②③ 미션에서 직접
      쓴다. 각 무기에 버전/상태를 물어 응답을 본다.

      ## 💻 실행 명령

      **실행 위치:** fw/ips/web(osquery)/siem 는 각 컨테이너, sysmon 은 el34 호스트.

      ```bash
      # ── el34-fw: nftables DNAT 수 ──
      sudo nft list ruleset | grep -c dnat
      # ── el34-ips: Suricata 버전 ──
      suricata -V | head -1
      # ── el34-web: osquery 버전 ──
      osqueryi --version
      # ── el34 호스트: sysmon ──
      systemctl is-active sysmon
      # ── el34-siem: Wazuh analysisd ──
      /var/ossec/bin/wazuh-control status | grep analysisd
      ```

      ## 🔍 도구·옵션 풀이
      - `nft list ruleset | grep -c dnat` — 방화벽 nftables 정책에서 DNAT 규칙(공개 포트 → 내부) 수를
        센다. >0 이면 fw 의 진입 경로가 살아 있는 것.
      - `suricata -V` — Suricata 버전(el34 = 6.0.4)을 출력한다. 응답이 있으면 IDS 바이너리 가용.
      - `osqueryi --version` — osquery 버전을 출력한다. 호스트 가시화(③ 발판 헌팅) 무기의 가용 확인.
      - `systemctl is-active sysmon` — 호스트의 sysmon 데몬(eBPF 센서)이 `active` 인지. ④ C2 단명
        명령 포착의 전제다. sysmon 은 컨테이너가 아니라 **호스트에 설치**돼 있다(W11).
      - `wazuh-control status | grep analysisd` — Wazuh 평결 엔진(심장)이 running 인지. 이게 멈추면
        로그가 들어와도 alert 가 안 난다(W09) — ⑤ SIEM 수렴의 전제.

      ## ✅ 합격 기준
      fw/ips/web(osquery)/sysmon/siem 전부 응답(어느 하나라도 무응답이면 그 단계는 동원 불가 — 먼저
      원인부터 파악).
    hint: 'fw nft + suricata + osquery + sysmon active + analysisd'
    category: survey
    points: 8
    answer: |
      echo "=== fw(nftables DNAT) ==="; ssh ccc@10.20.30.1 'sudo nft list ruleset | grep dnat' | jq -s length
      echo "=== ips(Suricata) ==="; ssh ccc@10.20.31.2 'suricata -V | head -1'
      echo "=== host(osquery) ==="; ssh ccc@10.20.32.80 sudo osqueryi --version
      echo "=== sysmon ==="; systemctl is-active sysmon
      echo "=== siem(Wazuh) ==="; ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "기말은 전 무기 동원 — fw(L4 DNAT)·IDS(Suricata)·WAF/osquery(web)·sysmon(호스트 이벤트 스트림)·Wazuh(SIEM analysisd). 다층 방어는 전 계층이 모두 살아 있어야 성립한다. 하나라도 죽으면 그 단계가 사각(blind spot)이 된다 — 방화벽이 죽으면 진입 경로를, sysmon 이 죽으면 단명 C2 명령을, analysisd 가 죽으면 5단계 수렴을 통째로 놓친다. 그래서 시험 본 단계에 들어가기 전 반드시 전 무기 가용성부터 확인한다."
    verify:
      type: output_contains
      expect: 'active'
      field: stdout
      semantic:
        intent: "APT 대응 전 무기 가용성 점검"
        success_criteria: ["fw/ips/web/sysmon/siem 응답", "전 계층 준비"]
        acceptable_methods:
          - "**[OSS] 각 무기 상태 확인 (권장)**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정찰 (Recon) — 스캐너 UA → WAF 913

      **개념 한 줄.** APT 킬체인의 첫 단계인 **정찰(Recon)** 은 공격 전에 표적의 표면을 자동화
      스캐너로 훑어 약점을 찾는 것이다. sqlmap·nikto 같은 스캐너는 자기 정체를 드러내는
      **User-Agent(UA)** 문자열(예: `sqlmap/1.7`)을 HTTP 헤더에 담는다.

      이 APT(`el34-attacker`, 출처 192.168.0.202)가 sqlmap UA 로 `dvwa.el34.lab` 표면을 훑으면,
      WAF(ModSecurity/CRS)의 **913 룰군(scanner detection)** 이 이를 audit 에 기록한다. 같은 UA 는
      다음 미션(STEP 3)에서 학생이 만들 IDS 룰로 네트워크에서도 잡힌다 — **한 캠페인의 한 행위를 두
      무기가 다른 층위로 본다.**

      ## 💻 실행 명령

      **실습 컨테이너:** 정찰은 `el34-attacker`, audit 확인은 `el34-web`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: sqlmap UA 정찰 ──
      echo -en 'GET /?id=apt15-1 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-web 에서: WAF scanner 탐지(913) (정찰 3초 후) ──
      sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "913[0-9]{3}" | sort -u
      ```

      ## 🔍 도구·옵션 풀이
      - nc `User-Agent: sqlmap/1.7` 헤더 — raw HTTP 요청에 스캐너 UA 를 담아 APT
        정찰을 재현한다.
      - 자연 URL `http://dvwa.el34.lab/` — web 의 Apache vhost(dvwa, 차단 모드)를 고른다. 요청은
        fw 게이트웨이 `http://10.20.30.1` 로 보내지만 도착 vhost 는 이 헤더가 결정한다.
      - `-s -o /dev/null` — 본문은 버리고(`-o /dev/null`) 조용히(`-s`) 보낸다. 여기서는 audit 흔적만
        본다.
      - `grep -oE "913[0-9]{3}" | sort -u` — audit 최근 60줄에서 CRS 913xxx(스캐너 탐지) 룰 id 만
        뽑아 중복 제거한다.

      ## ✅ 합격 기준
      WAF audit에 스캐너 탐지(`913`)가 남는다(방화벽은 L4 라 이 UA 를 못 본다 — 정찰은 IDS/WAF 의 영역).
    hint: 'sqlmap UA 정찰 → modsec 913'
    category: recon
    points: 8
    answer: |
      ssh att@192.168.0.202 "echo -en 'GET /?id=apt15-1 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 고정 sleep 대신 로그에 흔적이 나타날 때까지 조건 대기(zero-sleep)
      ssh ccc@10.20.32.80 "timeout 10 bash -c 'until sudo grep -q "913[0-9]{3}" /var/log/apache2/modsec_audit.log; do :; done'" || true
      echo "=== WAF scanner 탐지(913) ==="
      ssh ccc@10.20.32.80 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "913[0-9]{3}" | sort -u'
    answer_detail: "APT 1단계 정찰 — 스캐너 UA(sqlmap)가 OWASP CRS 의 913xxx 룰군(scanner detection)에 매치되어 modsec_audit.log 에 기록된다. 핵심 깨달음 — 방화벽은 패킷의 IP/포트(L3/L4)만 보므로 HTTP 헤더 안의 UA 문자열을 못 본다. 따라서 정찰 탐지는 방화벽이 아니라 IDS/WAF 의 영역이다. 같은 sqlmap UA 가 다음 미션의 IDS 룰(sid 9015001)로도 잡혀, 두 무기가 한 캠페인의 정찰을 다른 층위(WAF=HTTP 의미 / IDS=네트워크 문자열)로 본다 — 이 교차가 종합 평가의 출발점이다."
    verify:
      type: output_contains
      expect: '913'
      field: stdout
      semantic:
        intent: "APT 정찰을 WAF로 탐지"
        success_criteria: ["modsec 913 scanner", "정찰 단계 식별"]
        acceptable_methods:
          - "**[OSS] 외부 attacker sqlmap UA → audit 913 (권장)**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ① IDS 정찰 탐지 룰 (sid 9015001)

      **개념 한 줄.** 정찰을 캠페인 초기에 끊으려면 IDS 가 **네트워크에서** 잡아야 한다. WAF(913)는
      요청이 HTTP 까지 도착한 뒤 보지만, IDS(Suricata)는 네트워크를 흐르는 페이로드를 본다. 학생이
      직접 탐지 룰을 설계하는 능력을 평가한다.

      커스텀 룰(sid **9015001**)을 `local.rules` 에 추가 → 무중단 reload → 트리거 → eve.json 확인 →
      **sed 로 삭제**(베이스 보존)하는 룰 수명주기 전체를 한 미션에서 본다. 룰의 핵심은
      `http.user_agent; content:"sqlmap"; fast_pattern` — UA 안의 `sqlmap` 문자열을 빠르게 거른다.

      ## 💻 실행 명령

      **실습 컨테이너:** IDS 룰 작성·reload·검증·정리는 `el34-ips`, 트리거는 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 룰 작성 + 무중단 reload ──
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"APT15 sqlmap recon UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; sid:9015001; rev:1;)
      EOF"
      sudo suricatasc -c reload-rules

      # ── el34-attacker 에서: 트리거 (sqlmap UA) ──
      echo -en 'GET /?id=apt15-3 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-ips 에서: eve.json 확인 + 정리(sid 삭제, 베이스 보존) (트리거 4초 후) ──
      sudo grep "9015001" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature,src:.src_ip}'
      sudo sed -i "/sid:9015001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null
      ```

      ## 🔍 도구·옵션 풀이
      - `alert http any any -> any any (...)` — Suricata 룰 문법. HTTP 트래픽 전체를 대상으로 alert 를
        낸다. `msg` 는 시그니처 이름, `sid` 는 룰 고유번호(내 네임스페이스 9015xxx).
      - `http.user_agent; content:"sqlmap"; nocase` — UA 헤더에서 대소문자 무시(`nocase`)로 `sqlmap`
        문자열을 찾는다.
      - `fast_pattern` — Suricata 가 룰 전체를 검사하기 전 이 문자열로 빠르게 후보를 거르는 성능
        최적화 지정이다.
      - `suricatasc -c reload-rules` — Suricata 데몬을 멈추지 않고(무중단) 룰만 다시 읽는다. 공유
        인프라라 재시작 대신 reload 를 쓴다.
      - `sed -i "/sid:9015001/d"` — local.rules 에서 내 룰 줄만 지우고 다시 reload — 베이스 룰
        (sid 1000001–1000005)은 그대로 보존한다.

      ## ✅ 합격 기준
      eve.json에 `APT15 sqlmap` 시그니처가 잡힌다(정리 후 베이스 보존, local.rules 의 9015001 = 0).
    hint: 'local.rules sqlmap UA 룰(9015001) → reload → 트리거 → eve → sed 삭제'
    category: manipulation
    points: 12
    answer: |
      ssh ccc@10.20.31.2 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"APT15 sqlmap recon UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; classtype:web-application-attack; sid:9015001; rev:1;)
      EOF"'
      ssh ccc@10.20.31.2 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -1'
      ssh ccc@10.20.31.2 'sudo suricatasc -c reload-rules'
      # 고정 sleep 대신 로그에 흔적이 나타날 때까지 조건 대기(zero-sleep)
      ssh ccc@10.20.31.2 "timeout 10 bash -c 'until sudo grep -q "9015001" /var/log/suricata/eve.json; do :; done'" || true
      ssh att@192.168.0.202 "echo -en 'GET /?id=apt15-3 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 고정 sleep 대신 로그에 흔적이 나타날 때까지 조건 대기(zero-sleep)
      ssh ccc@10.20.31.2 "timeout 10 bash -c 'until sudo grep -q "9015001" /var/log/suricata/eve.json; do :; done'" || true
      echo "=== eve.json alert ==="
