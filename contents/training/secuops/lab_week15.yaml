      보고서는 표준 흐름을 따른다 — ① 캠페인 개요 → ② 단계별 대응(무기·증거 표) → ③ 출처 IP 상관
      타임라인 → ④ 결론 + 재발 방지(인텔 격상). 특히 마지막 "재발 방지" 에 STEP 9 의 인텔 룰(101510)을
      담는 것이 APT 대응의 특징이다 — 일반 사고는 "막았다" 로 끝나지만, 끈질긴 APT 는 "다음에 같은
      IOC 가 오면 자동으로 잡히게 했다" 까지 보고해야 대응이 완결된다.

      ## 💻 보고서 양식
