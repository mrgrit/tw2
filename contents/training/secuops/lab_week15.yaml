      echo '{"apt_ioc":"apt15-c2","src_ip":"192.168.0.202"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/w15_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w15_lr.bak
      ```

