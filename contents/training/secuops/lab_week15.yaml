    instruction: |
      ## 🎯 ④ C2 채널 — sysmon 이벤트 (인코딩 명령)

      **개념 한 줄.** APT 4단계 **C2(Command & Control)** 는 침입한 호스트를 외부에서 조종하는 통신
      채널이다. 공격자는 탐지를 피하려 명령을 **base64 등으로 인코딩** 해 실행하고, 그 명령은 **짧게
      실행되고 사라진다**(단명 프로세스, MITRE T1059/T1027).

      **왜 osquery 로는 부족한가.** osquery 는 **스냅샷** 이다 — "지금 떠 있는 것" 을 찍는다. 단명
      명령은 다음 스냅샷 때 이미 없다. 반면 **sysmon** 은 **이벤트 스트림** 이라 프로세스가 *생성되는
      순간* 의 cmdline 을 **ProcessCreate(EventID 1)** 로 남긴다(W11). el34 의 sysmon 은 호스트
      ({{TARGET_IP}})에 설치돼 있고, 컨테이너 프로세스도 호스트 커널 프로세스라 el34-web 내부의 명령
      까지 호스트 `/var/log/syslog` 에 포착된다. 그래서 이 미션의 관측은 컨테이너가 아닌 **호스트 syslog** 다.

      ## 💻 실행 명령

      **실행 위치:** 인코딩 명령 실행은 `el34-web`, sysmon syslog 관측은 **el34 호스트**.

      ```bash
      # ── el34-web 에서: 인코딩 C2 명령(단명) ──
      python3 -c "import base64; base64.b64decode('YzI=')  # apt15 c2 sim"

      # ── el34 호스트에서: sysmon ProcessCreate 헌팅 (5초 후) ──
      grep -a "Linux-Sysmon" /var/log/syslog | grep -a "b64decode" | tail -1 | grep -oaE "b64decode[^<]{0,60}" | head -1
      ```

      ## 🔍 도구·옵션 풀이
      - `python3 -c "import base64; base64.b64decode('YzI=')"` — 인코딩 C2 명령을 모사한다(짧게 실행
        되고 즉시 종료 = 단명). `# apt15 c2 sim` 주석은 syslog 에서 이 실습 흔적을 찾기 쉽게 하는 마커.
      - 조건 폴링(로그 흔적 대기) — sysmon 이벤트가 eBPF 센서 → syslog 에 기록되기까지의 짧은 지연을 기다린다.
      - `grep -a "Linux-Sysmon" /var/log/syslog` — 호스트 syslog 의 sysmon 소스 줄만 고른다. `-a` 는
        바이너리로 인식되는 줄도 텍스트로 처리하라는 옵션.
      - `grep -a "b64decode" | ... grep -oaE "b64decode[^<]{0,60}"` — 인코딩 명령 cmdline 을 잡아
        XML 태그(`<`) 전까지 일부를 출력한다 — 단명 프로세스의 생성 순간이 sysmon 에 남았다는 증거.

      ## ✅ 합격 기준
      sysmon 이벤트(호스트 syslog)에 인코딩 C2 명령(`b64decode`)이 남는다(osquery 스냅샷은 못 잡는다).
