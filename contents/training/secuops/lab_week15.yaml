      <group name="edu_w15,">
        <rule id="101510" level="13">
          <decoded_as>json</decoded_as>
          <field name="apt_ioc">apt15-c2</field>
          <description>EDU W15 - APT IOC matched, escalate critical</description>
        </rule>
