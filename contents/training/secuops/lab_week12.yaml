      echo -en 'GET /?id=ct12-7%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-siem 에서: alerts.json IOC 공격 경보 (공격 8초 후, 출처 보존) ──
      tail -300 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.groups|index("ids"))|{r:.rule.id,s:.data.src_ip}' | tail -2
      ```
