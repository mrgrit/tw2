      ## 🎯 ATT&CK 매핑 — IOC에 맥락을 더한다

      ## 개념 (왜 이걸 하나)
      IOC 하나(sqlmap)는 점(point) 정보다. 그것을 **MITRE ATT&CK** technique에 연결하면 "어느 단계의
      공격인가"라는 공격 사슬 위의 위치(line)가 된다(lecture §6). 분석가는 IOC를 보는 순간 "이건 초기
      침투구나, 다음은 권한상승…" 하고 대응을 설계한다. el34의 OpenCTI MITRE connector가 technique를
      STIX attack-pattern 객체로 보관하므로, indicator(sqlmap)를 relationship으로 연결해두면 IOC와
      ATT&CK 맥락을 함께 본다.

      ## 처음 나오는 것
      - **MITRE ATT&CK**: 공격 전술·기법을 표준 코드로 정리한 체계. **T1190** = Exploit
        Public-Facing Application(공개 웹 앱 익스플로잇), **T1059** = Command and Scripting
        Interpreter, **T1136** = Create Account.
      - **attack-pattern / relationship**: ATT&CK technique를 담는 STIX 객체, 그리고 indicator를
        technique에 잇는 STIX 연결(lecture §2.3).

      ## 💻 실행 명령
