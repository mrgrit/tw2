      안 해 공격자 IP(내부 192.168.0.202)가 전 계층에 그대로 남고, 그래야 "이 IOC 도구를 누가 썼나"를
      IP로 추적·상관할 수 있다. 격상 룰이 라이브였다면 이 경보가 STEP 4의 로직대로 level 12로 떴을
      바로 그 대상이다.

      ## 처음 나오는 것
      - **alerts.json**: Wazuh manager의 최종 평결 출력(`/var/ossec/logs/alerts/`). **ids 그룹**은
        Suricata(네트워크) 디코딩 경보 분류.
      - `jq -c 'select(.rule.groups|index("ids"))'`: alerts.json에서 ids 그룹 경보만 골라 룰 id·출처
        IP를 뽑는 필터.
      - `sleep 8`: 공격이 eve.json을 거쳐 alerts.json에 반영되기까지의 파이프라인 지연을 기다림.

      ## 💻 실행 명령

      **실습 컨테이너:** IOC 공격은 `el34-attacker`, 수렴 확인은 `el34-siem`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
