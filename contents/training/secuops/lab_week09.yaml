lab_id: standalone-secuops-week09
title: "SIEM의 두뇌 — Wazuh manager: decoder→rule→alert 평결 파이프라인"
version: standalone-secuops
course: secuops
week: 9
description: |
  SIEM 은 로그를 모으는 창고가 아니라 판결하는 법원이다. 형식이 제각각인 raw 로그(증거)가
  decoder(증거 정리)→rule(양형)→alert(판결문)를 거쳐 정규화된 한 평결(alerts.json)이 되는
  과정을, 흩어진 로그를 Wazuh manager(el34-siem)가 어떻게 한 곳으로 모으는지로 직접 확인한다.

  흐름: manager daemon 중 심장인 analysisd(=decoder→rule 판사) 점검 → alerts.json 그룹 분포로
  다소스 수렴 확인 → wazuh-logtest 로 decoder/rule 3 phase(pre-decode/decode/rule) 디버그
  (sshd→rule 5760, MITRE T1110) → local_rules.xml 커스텀 룰(id 100909, level 11)로 특정 JSON
  필드를 상위 레벨로 격상하되 라이브 재시작 없이 logtest 로만 발화 검증 → 외부 SQLi 재현으로
  ingest 추적(출처 IP 10.20.30.202 보존) → agent ossec.conf 의 localfile 수집 소스 점검 →
  네트워크(ids)+호스트(syscheck) 두 소스의 수렴을 데이터로 확인.

  el34-siem 은 모든 학생이 함께 쓰는 단일 manager 이므로, 커스텀 룰은 wazuh-logtest 로만
  검증하고 끝나면 그룹째 삭제(공유 manager 무중단·베이스 local_rules.xml 보존)한다.
  모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서 `docker exec el34-<comp>` 로.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W08 통과 (5계층 + SIEM 수렴 개념)"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec (컨테이너 root)"
  - "lecture §1(raw→decoder→rule→alert) §4(logtest) §5-§6(rule/커스텀룰) 숙지"
objectives:
  - "평결 파이프라인(raw→decoder→rule→alert) 4단계를 이해하고, 심장 daemon analysisd(=판사) + agent 가용성을 wazuh-control status/agent_control -l 로 점검한다"
  - "wazuh-logtest 로 로그 한 줄을 넣어 3 phase(Phase1 pre-decode / Phase2 decoder·필드 / Phase3 rule id·level)를 분해하고 sshd→rule 5760(MITRE T1110)을 추적한다"
  - "local_rules.xml 에 커스텀 룰(id 100909, level 11)을 작성해 특정 JSON 필드를 상위 레벨로 격상하고, 라이브 재시작 없이 logtest 로만 발화 검증 후 self-clean 한다"
  - "외부 SQLi 를 재현해 ips(Suricata)→manager→alerts.json ids 그룹 ingest 를 추적하고 출처 IP(10.20.30.202) 보존을 확인한다"
  - "agent ossec.conf 의 localfile log_format(apache/json) 수집 소스가 가시성의 출발점임을 점검하고, 네트워크(ids)+호스트(syscheck) 두 소스가 한 alerts.json 으로 수렴함을 데이터로 확인한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — manager의 심장(analysisd)이 뛰는가

      ### 개념 — 왜 이걸 먼저 하나
      Wazuh manager(el34-siem)는 단일 프로그램이 아니라 역할이 다른 여러 **daemon**(백그라운드 상주
      프로세스)의 묶음이다. 그중 **analysisd** 가 decoder→rule 을 돌려 평결(alert)을 만드는 "판사" 다.
      판사가 자리를 비우면 우편물(로그)이 아무리 잘 와도 판결문(alert)은 한 장도 안 나온다 — 즉
      analysisd 가 멈추면 로그는 들어와도 alerts.json 에 새 줄이 안 생긴다. 그래서 SIEM 가용성 점검의
      1순위가 analysisd 다. 함께 보는 daemon 의 역할:
      - **wazuh-analysisd** = decoder→rule 평결 엔진(판사)
      - **wazuh-remoted** = agent 통신(1514 수신, 1515 등록) 우편함
      - **wazuh-logcollector** = 로컬 로그 수집원

      등록 agent(`000`=manager 자신 / `003`=ips / `004`=web) 중 ips·web 두 개가 두 ingest 소스다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep -E "analysisd|remoted|logcollector"
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "ips,|web,"
      ```
      - `wazuh-control` : manager daemon 들의 상태/시작/정지를 다루는 제어 명령(`status` 로 가용성 조회).
      - `agent_control -l` : manager 에 등록된 agent 목록과 연결 상태(Active/Disconnected)를 출력.

      ## ✅ 합격 기준
      `wazuh-analysisd is running` + ips/web agent Active. analysisd 가 stopped 면 평결 자체가 멈춘
      것이므로 최우선 복구 대상이고, 특정 agent 만 Disconnected 면 그 agent 컨테이너의 wazuh-agentd 를
      점검한다.
    hint: 'wazuh-control status (analysisd 심장) + agent_control -l'
    category: survey
    points: 10
    answer: |
      echo "=== manager daemon ==="
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep -E "analysisd|remoted|logcollector"
      echo "=== agents ==="
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "ips,|web," || echo "(agent)"
    answer_detail: "analysisd=decoder→rule 평결 엔진(판사), remoted=agent통신(1514 수신/1515 등록) 우편함, logcollector=로컬 로그 수집원. analysisd 가 멈추면 로그는 들어와도 alerts.json 에 평결이 안 생긴다 → 가용성 점검 1순위. 활성 agent ips(003)+web(004)가 두 ingest 소스(각각 Suricata eve / ModSec audit). 판정은 wazuh-analysisd is running 문자열로 한다."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "Wazuh manager daemon(analysisd) + agent 가용성 점검"
        success_criteria: ["wazuh-analysisd running", "remoted/logcollector running", "ips/web agent active"]
        acceptable_methods:
          - "**[OSS] wazuh-control status (권장)**"
          - "**[OSS] agent_control -l**"
          - "**[설명] analysisd=평결 엔진**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 데이터 흐름 — 여러 소스가 한 alerts.json으로

      ### 개념 — "통합 가시성" 을 데이터로 확인
      manager 의 최종 출력은 `/var/ossec/logs/alerts/alerts.json` **한 곳** 이다. 형식이 제각각이던
      raw 로그(Suricata eve.json, ModSec audit…)가 decoder→rule 을 거쳐 정규화된 "한 평결 스트림" 으로
      합쳐진다. 각 평결에는 분류 태그인 **group**(`ids`/`syscheck`/`pam` 등)이 붙는데, 이 그룹 분포를
      보면 어떤 소스의 경보가 한 곳에 모였는지가 한눈에 보인다 — 이것이 SIEM=통합 가시성의 실체다.
      el34 는 보통 `ids/suricata`(네트워크)가 다수이고 `syscheck`(FIM/파일변조), `pam`/`sudo`(인증),
      `sca`(보안설정점검)가 섞인다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc .rule.groups 2>/dev/null | sort | uniq -c | sort -rn | head -10'
      ```
      - `jq -rc .rule.groups` : 각 평결(JSON 라인)의 `rule.groups` 배열만 뽑는다(`-r` raw, `-c` compact).
      - `sort | uniq -c | sort -rn` : 같은 그룹 조합을 빈도순으로 집계 — 어느 소스가 많은지 즉시 보인다.

      ## ✅ 합격 기준
      그룹 분포에 `suricata`(ids) 등 복수 소스가 보인다. 한 그룹만 보이면 다른 계층의 수집/디코딩이
      끊겼을 수 있다는 신호다.
    hint: 'alerts.json 의 .rule.groups 분포 (여러 소스 수렴)'
    category: analysis
    points: 10
    answer: |
      echo "=== alerts.json 그룹 분포 (소스별) ==="
      docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc .rule.groups 2>/dev/null | sort | uniq -c | sort -rn | head -10'
    answer_detail: "한 alerts.json에 ids/suricata(네트워크)+syscheck(FIM/파일변조)+pam/sudo(인증)+sca(보안설정점검) 등 서로 다른 계층의 경보가 수렴. 이것이 '한 평결 스트림'의 의미 — 형식이 제각각이던 raw 로그가 아니라 같은 스키마로 정규화된 사건들이라서 검색·집계·상관이 된다. 판정은 그룹 분포에 suricata 가 보이는지로 한다."
    verify:
      type: output_contains
      expect: 'suricata'
      field: stdout
      semantic:
        intent: "여러 소스가 한 alerts.json으로 수렴함을 그룹 분포로 확인"
        success_criteria: ["그룹 분포 출력", "ids/suricata 등 복수 소스", "정규화된 평결 스트림 이해"]
        acceptable_methods:
          - "**[OSS] jq .rule.groups | uniq -c (권장)**"
          - "**[설명] 다소스 수렴**"
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 decoder — wazuh-logtest 3 phase 로 파싱 디버그

      ### 개념 — decoder 가 raw 를 필드로 바꾼다
      raw 로그가 평결이 되는 첫 단계 = **decoder** 가 텍스트에서 의미 있는 필드(src_ip, user 등)를
      뽑는 것(증거 정리원). 필드가 뽑혀야 그 다음 rule(판사)이 그 필드를 조건으로 판결할 수 있다.
      **`wazuh-logtest`** 는 로그 한 줄을 넣어 이 과정을 안전하게 디버그하는 도구다 — **현재 룰셋을
      새로 읽어 별도 테스트 인스턴스에서** 돌리므로 라이브 manager(공유 el34-siem)를 건드리지 않는다.
      출력은 정확히 3단계:
      - **Phase 1 pre-decoding** : 공통 헤더 분해(시각/호스트/program_name)
      - **Phase 2 decoding** : decoder 매치 + 필드 추출 (예: `decoder: 'sshd'`, `srcip: 9.9.9.9`)
      - **Phase 3 filtering(rules)** : 매치된 rule id + level (Phase2 의 필드로 판결)

      핵심은 Phase2(무엇을 뽑았나=decoder)와 Phase3(어떻게 판결했나=rule)의 구분이다.

      ## 💻 실행 명령
      ```bash
      echo 'Jan  1 00:00:00 web sshd[1]: Failed password for root from 9.9.9.9 port 22 ssh2' \
        | docker exec -i el34-siem /var/ossec/bin/wazuh-logtest
      ```
      - `wazuh-logtest` : 표준입력으로 받은 로그 한 줄을 decoder→rule 로 시험 판결하는 디버그 도구.

      ## ✅ 합격 기준
      Phase 3 에 rule id `5760`(sshd 다중 인증실패, MITRE T1110 Brute Force) 가 매치된다. Phase 2 에서
      decoder 가 비면 필드 추출 실패이므로 그 로그는 rule 까지 도달하지 못한다.
    hint: 'sshd Failed password 한 줄 → wazuh-logtest → rule 5760'
    category: analysis
    points: 12
    answer: |
      docker exec el34-siem sh -c 'cat > /tmp/w09ssh.log <<EOF
      Jan  1 00:00:00 web sshd[1]: Failed password for root from 9.9.9.9 port 22 ssh2
      EOF'
      echo "=== wazuh-logtest 3 phase (sshd) ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/w09ssh.log 2>&1 | grep -E "Phase|decoder|id:|srcip|Failed" | head -8; rm -f /tmp/w09ssh.log'
    answer_detail: "Phase1 pre-decode 가 시각/호스트/program(sshd)을 분해하고, Phase2 에서 sshd decoder 가 srcip(9.9.9.9)/user 를 필드로 뽑고, Phase3 에서 rule 5760(SSHD 다중 인증실패, MITRE T1110 Brute Force)이 매치돼 level 이 부여된다. raw→필드→평결의 앞 두 단계가 한 명령에 다 보인다. logtest 는 라이브 analysisd 를 안 건드리는 안전한 디버그(공유 인프라). 판정은 Phase3 의 rule id 5760 으로 한다."
    verify:
      type: output_contains
      expect: '5760'
      field: stdout
      semantic:
        intent: "wazuh-logtest 3 phase로 decoder→rule 파이프라인 디버그"
        success_criteria: ["Phase2 decoder 필드 추출", "Phase3 rule 5760 매치", "raw→필드→평결 이해"]
        acceptable_methods:
          - "**[OSS] wazuh-logtest 표준입력 (권장)**"
          - "**[설명] 3 phase 의미**"
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 커스텀 룰 격상 — local_rules.xml (id 100909) → logtest 발화 → self-clean

      ### 개념 — 탐지를 "내 환경의 우선순위" 에 맞춘다
      기본 룰(Wazuh 내장 + Suricata/CRS 디코딩)은 흔한 위협을 평범한 level 로 잡는다. 운영자가 자기
      환경에서만 결정적인 위협을 상위 level 로 끌어올리려면 **`local_rules.xml`**(`/var/ossec/etc/
      rules/local_rules.xml`, 운영자의 자체 판례집)에 커스텀 **rule** 을 쓴다. rule 은 XML 로 기술하며
      `level`(0~16 형량), `decoded_as`(어느 decoder 가 잡은 로그만), `field`(특정 필드 값 매치) 같은
      조건을 갖는다. 본 트랙은 위협 격상(escalation)을 직접 해본다 — json decoder 가 잡은 로그 중
      `eduw09=FIREME` 인 것을 level 11(고위험)로 올린다.

      절차는 (1) 백업 → (2) 룰 추가 → (3) **라이브 재시작 없이 `wazuh-logtest` 로만 발화 검증** →
      (4) 원복(self-clean) 이다. 공유 el34-siem 에서는 라이브 manager 를 재시작하면 다른 학생의
      ingest 가 끊기므로 logtest(모의재판)로만 검증한다.

      ## 💻 실행 명령
      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w09_lr.bak    # 백업
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="edu_w09,">
        <rule id="100909" level="11">
          <decoded_as>json</decoded_as>
          <field name="eduw09">FIREME</field>
          <description>EDU W09 - JSON marker escalated</description>
        </rule>
      </group>
      EOF'
      echo '{"eduw09":"FIREME","src_ip":"9.9.9.9"}' | sudo /var/ossec/bin/wazuh-logtest   # 발화 검증
      sudo cp /tmp/w09_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w09_lr.bak   # self-clean
      ```
      - `<group name="edu_w09,">` : 룰을 한 그룹으로 묶어 끝나면 그룹째 지우기 쉽게 한다.
      - `id="100909"` : **100000 미만은 Wazuh 예약** — 사용자 룰은 100000+, 본 트랙은 `1009xx` 로 격리.
      - `<decoded_as>json</decoded_as>` + `<field name="eduw09">FIREME</field>` : json decoder 가
        파싱한 로그 중 eduw09 필드 값이 FIREME 인 경우만 매치 → level 11 격상.

      ## ✅ 합격 기준
      logtest Phase 3 에 rule `100909` level 11 이 "Alert to be generated" 로 발화한다(정리 후 베이스
      보존). XML 문법 오류가 있으면 logtest 시작 시 룰셋 로드 에러가 표시되므로 거기서 먼저 잡는다.
    hint: 'local_rules.xml에 json field 격상 룰(100909) → logtest 발화 → cp 복원'
    category: manipulation
    points: 18
    answer: |
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w09_lr.bak'
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"edu_w09,\">
        <rule id=\"100909\" level=\"11\">
          <decoded_as>json</decoded_as>
          <field name=\"eduw09\">FIREME</field>
          <description>EDU W09 JSON marker escalated</description>
        </rule>
      </group>
      EOF"'
      docker exec el34-siem sh -c 'cat > /tmp/w09t.json <<EOF
      {"eduw09":"FIREME","src_ip":"9.9.9.9"}
      EOF'
      echo "=== 커스텀 룰 발화 (wazuh-logtest, 라이브 무중단) ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/w09t.json 2>&1 | grep -E "id:|level:|Alert to be" | head -4; rm -f /tmp/w09t.json'
      echo "=== self-clean (베이스 복원) ==="
      docker exec el34-siem sh -c 'sudo cp /tmp/w09_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w09_lr.bak; echo "잔재 100909 = $(grep -c 100909 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "운영자가 local_rules.xml(자체 판례집)에 쓰는 커스텀 룰의 본질 = 탐지를 내 환경의 우선순위에 맞추는 격상. 여기선 json decoder 가 잡은 로그 중 eduw09=FIREME 필드를 level 11(고위험)로 격상한다. wazuh-logtest 는 룰셋을 새로 읽어 별도 테스트 인스턴스에서 돌리므로 라이브 analysisd 를 안 건드린다(공유 인프라 안전). id 는 1009xx 네임스페이스(100000 미만은 Wazuh 예약)로 격리하고, 끝나면 cp 복원으로 베이스 그대로 둔다. 판정은 logtest 출력의 id 100909 로 한다."
    verify:
