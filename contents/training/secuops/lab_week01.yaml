lab_id: standalone-secuops-week01
title: el34 4-tier 인프라 헬스체크 + Red/Blue/Purple 통합 시나리오
version: standalone-non-ai
course: secuops
week: 1
description: |
  el34 4-tier 토폴로지 (ext → pipe → dmz → int) 위의 5종 보안 솔루션 (방화벽
  nftables / IPS Suricata / WAF ModSecurity / SIEM Wazuh / 운영 portal) 을 단계별
  헬스체크. 마지막 4 step 은 Red/Blue/Purple 통합 — attacker 한 공격이 fw → ips →
  web → siem 4 도구에 어떻게 흔적을 남기는지 실시간 추적.
difficulty: easy
duration_minutes: 180
audience: 보안 솔루션 운영 입문자 (1주차)
prerequisites:
  - el34 호스트 SSH 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - 학생 PC `/etc/hosts` 에 공인 IP `{{WEB_ENTRY}}` 의 11 vhost (`*.el34.lab`) 매핑 (web 접근용)
  - 인프라 인벤토리는 el34 호스트에서 `docker ps`(ccc docker 접근), 각 장비 점검은 `ssh ccc@<장비IP>`, 공격은 `ssh att@192.168.0.202`)

objectives:
  - 4-tier 토폴로지의 보안 핵심 16 컨테이너 가시화(el34 전체 40여 개) + 4 bridge 분리 검증
  - 5종 보안 솔루션 (방화벽/IPS/WAF/SIEM/호스트 가시화) 가동 상태 확인
  - 접근 모델 (인벤토리=호스트 docker / 장비=ssh ccc@IP / 공격=ssh att@202) 이해 + 외부 직접 IP 접속 차단 검증
  - web Apache 의 11 vhost 라우팅 (host header 별) + 운영/학생 트래픽의 ModSec 적용 차이
  - "Red/Blue/Purple 통합 — 공격 1건의 4 도구 흔적 추적 + gap 식별"

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — bastion 점프 호스트 + 보안 핵심 16 컨테이너 가시화
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION

      el34 호스트에서 `docker ps` 로 **보안 핵심 16개 컨테이너**가 모두 `Up` 상태인지 확인한다.
      (el34 전체는 OpenCTI/MISP·Wazuh 스택까지 포함해 40여 개가 돌지만, 본 주차 보안 운영 대상은
      그중 핵심 16개다.) bastion 컨테이너도 docker 소켓을 가지므로 `docker ps` 로 동일하게 확인 가능.

      ## 💻 실행 명령

      **실습 컨테이너:** `el34-bastion` — 호스트(`ssh ccc@{{TARGET_IP}}`, 비밀번호 1)에서
      el34 호스트(ccc는 docker 접근 가능)에서 아래를 한 줄씩 실행한다.

      ```bash
      # 1. 전체 컨테이너 가시화 (핵심 16 + OpenCTI/MISP·Wazuh 스택 = 40여 개)
      docker ps --format "{{.Names}} {{.Status}}"

      # 2. 보안 핵심 16개만 카운트 (전체 수가 아니라 핵심 셋 → 16 이어야 정상)
      docker ps --format "{{.Names}}" | grep -cE "el34-(bastion|attacker|fw|ips|web|siem|wazuh-indexer|wazuh-dashboard|portal|juiceshop|dvwa|neobank|govportal|mediforum|adminconsole|aicompanion)$"

      # 3. 비정상 컨테이너 (Restarting / Exited) 만 추출 (없어야 정상)
      docker ps -a --format "{{.Names}} {{.Status}}" | grep -vE "Up|^$"
      ```

      ## 📋 확인 사항

      - 명령 1: 전체 40여 개 컨테이너 출력 (보안 핵심 16 + OpenCTI/MISP·Wazuh 스택)
      - 명령 2: 보안 핵심 16개 카운트 = `16` (bastion, attacker, fw, ips, web, siem,
        wazuh-indexer, wazuh-dashboard, portal, juiceshop, dvwa, neobank, govportal,
        mediforum, adminconsole, aicompanion)
      - 핵심 컨테이너 라인의 상태가 모두 `Up` 으로 시작
      - 3번 명령 결과가 빈 결과 (= 비정상 0건)

      ## 💡 왜 이걸 하는가?

      보안 운영자는 인프라 인수 시 첫 30초 안에 자산 인벤토리를 확보해야 한다. el34 는
      보안 핵심 컨테이너의 단일 진입점 (bastion) 을 두어 ISMS-P 2.5 (인증·권한관리) 의
      single point of access 원칙을 모사한다.

      > ⚠️ **보안 함의** — bastion 의 `docker ps` 가 호스트와 동일한 이유는 호스트
      > `/var/run/docker.sock` 이 bastion 에 마운트돼 **같은 Docker daemon** 을 제어하기 때문이다
      > (별도 엔진 아님). 즉 docker.sock 마운트 = 호스트 root 급 권한(읽기전용 마운트여도 API 제어는
      > 가능) → **bastion 침해 = 호스트 장악**(컨테이너 탈출 표면, cloud-container W06/W09 의 docker.sock 갭).

      ## 🔍 결과 해석

      - **정상**: 핵심 16개 모두 `Up` + 비정상 0건 (전체 40여 개 중)
      - **비정상**: `Restarting` / `Exited` 1개라도 있으면 즉시 `docker logs <name>` 로 원인 파악
    hint: sh -c 'docker ps --format "{{.Names}} {{.Status}}"'
    category: survey
    points: 8
    answer: |
      sh -c 'docker ps --format "{{.Names}} {{.Status}}"' | tee /tmp/w01s1.txt
      echo "--- 보안 핵심 16개 수 (el34 전체는 40여 개) ---"
      grep -cE "el34-(bastion|attacker|fw|ips|web|siem|wazuh-indexer|wazuh-dashboard|portal|juiceshop|dvwa|neobank|govportal|mediforum|adminconsole|aicompanion)( |$)" /tmp/w01s1.txt
      echo "--- 비정상 컨테이너 ---"
      grep -vE "Up|^$" /tmp/w01s1.txt || echo "(없음 — 모두 Up)"
    answer_detail: |
      보안 핵심 16개 컨테이너 모두 Up + 비정상 0건(el34 전체는 OpenCTI/MISP·Wazuh 스택
      포함 40여 개). 핵심 수가 16 미만이면 `docker compose ps -a` 로 Exited 컨테이너
      확인 후 `docker compose up -d <name>` 으로 복구.
    verify:
      type: output_contains
      expect: el34-
      field: stdout
      semantic:
        intent: |
          bastion 의 docker 소켓으로 docker ps 가시화. 보안 핵심 16개 컨테이너 모두 Up
          (el34 전체 40여 개 중). ISMS-P 2.5 + NIST CSF Identify (자산 인벤토리) 의 첫 단계.
        success_criteria:
          - el34- prefix 컨테이너 15+ 출력
          - Up 키워드
          - bastion / fw / ips / web / siem 5 핵심 컨테이너 포함
        acceptable_methods:
          - sh -c 'docker ps --format "{{.Names}} {{.Status}}"'
          - |
            **[OSS] docker ps 표준** — 가장 자주.
              sh -c 'docker ps --format "{{.Names}} {{.Status}}"'
              # 보안 핵심 16개 수 (el34 전체는 40여 개)
              sh -c 'docker ps --format "{{.Names}}" | grep -cE "el34-(bastion|attacker|fw|ips|web|siem|wazuh-indexer|wazuh-dashboard|portal|juiceshop|dvwa|neobank|govportal|mediforum|adminconsole|aicompanion)$"'
            예상 출력 `el34-bastion Up … / el34-attacker Up … / …(전체 40여 개) / 핵심 16`.
            운영 해석: 보안 핵심 16개가 모두 Up 인지 확인. 핵심 수가 16 미만이면 Exited 점검.
          - |
            **[OSS] docker compose ps (호스트 측)** — 강사용.
              cd ~/el34 && docker compose ps
              # 서비스명 + 상태 + health
              docker compose ps --format json | jq '.[] | {Service, State, Health}'
            예상 출력 `bastion running / fw running / ips running / ...`.
            운영 해석: compose 단위로 의존성 검증 (ips 가 fw 보다 먼저 시작 시 fail).
          - |
            **[OSS] docker stats — 자원 사용** — 모니터링.
              sh -c 'docker stats --no-stream --format "{{.Name}} {{.CPUPerc}} {{.MemUsage}}"'
            예상 출력 `el34-wazuh-indexer 5.0% 1.2GiB / 5.8GiB / ...`.
            운영 해석: indexer 가 1GB+ 메모리 사용 정상 (heap 1g). 그 외는 100MB 내.
          - |
            **[OSS] docker inspect — fw/ips dual NIC** — 토폴로지.
              for c in el34-fw el34-ips; do
                echo "=== $c ==="
                sh -c "docker inspect $c --format '{{range \$k,\$v := .NetworkSettings.Networks}}{{\$k}}={{\$v.IPAddress}} {{end}}'"
              done
            예상 출력 `el34-ext=10.20.30.1 el34-pipe=10.20.31.1 / el34-pipe=10.20.31.2 el34-dmz=10.20.32.1`.
            운영 해석: fw + ips 각 2 NIC = 라우터 모드. 1 NIC 만 있으면 forward 불가.
          - |
            **[OSS] docker network ls — 4 bridge** — 토폴로지.
              sh -c 'docker network ls | grep el34'
              for n in el34-ext el34-pipe el34-dmz el34-int; do
                sh -c "docker network inspect $n --format '{{(index .IPAM.Config 0).Subnet}}'"
              done
            예상 출력 `el34-ext / el34-pipe / el34-dmz / el34-int / 10.20.30.0/24 / 10.20.31.0/24 / 10.20.32.0/24 / 10.20.40.0/24`.
            운영 해석: 4 bridge 의 subnet 이 CURRICULUM 의 4-tier 와 일치.
          - |
            **[OSS] ssh -G + el34-bastion 라인** — config 검증.
              ssh -G el34-bastion | grep -E "^(hostname|user|port|proxyjump)"
            예상 출력 `hostname {{TARGET_IP}} / user ccc / port 2204`.
            운영 해석: ssh -G 가 실제 적용된 config. ProxyJump 비어 있으면 학생 PC
            `~/.ssh/config` 점검.
          - |
            **[OSS] /etc/hosts 의 11 vhost 매핑** — 학생 PC 환경.
              getent hosts juice.el34.lab dvwa.el34.lab siem.el34.lab portal.el34.lab
              # 모두 같은 VM_IP 로 resolve 되어야 함
            예상 출력 `{{TARGET_IP}} juice.el34.lab / {{TARGET_IP}} dvwa.el34.lab / ...`.
            운영 해석: hosts 매핑 없으면 브라우저에서 host header 가 다른 도메인으로
            → default backend (waf) 로 떨어짐.
          - |
            **[OSS] sudo NOPASSWD 검증** — 학습 환경 전제.
              ssh ccc@10.20.30.1 'sudo -n nft list tables 2>&1 | head -3'
              ssh ccc@10.20.30.1 'cat /etc/sudoers.d/ccc 2>/dev/null'
            예상 출력 `table inet six_filter / ccc ALL=(ALL) NOPASSWD: ALL`.
            운영 해석: 학습 환경만 NOPASSWD. production 절대 금지.
        negative_signs:
          - SSH 접속 실패
          - 보안 핵심 16개 미만
          - Restarting 상태
    target_vm: bastion

  # ============================================================
  # STEP 2 — ProxyJump 4 컨테이너 통과
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION

      el34 접근 검증 — **fw / ips / web / siem 4 컨테이너에 순차 진입** 후 hostname 응답 확인.

      ## 💻 실행 명령

      여러 장비를 확인하는 단계라 각 장비에 `ssh ccc@<IP>` 로 접속하거나, 인벤토리는 호스트 `docker ps` 로 한다(for문 없이 한 줄씩).

      ```bash
      # fw / ips / web / siem 각 컨테이너의 hostname 을 한 줄씩 질의
      ssh ccc@10.20.30.1 hostname
      ssh ccc@10.20.31.2 hostname
      ssh ccc@10.20.32.80 hostname
      ssh ccc@10.20.32.100 hostname        # 출력: wazuh.manager (siem 컨테이너 hostname)
      ```

      ## 📋 확인 사항

      - `ssh ccc@10.20.30.1 hostname` → `fw`
      - `ssh ccc@10.20.31.2 hostname` → `ips`
      - `ssh ccc@10.20.32.80 hostname` → `web`
      - `ssh ccc@10.20.32.100 hostname` → `wazuh.manager` (siem 컨테이너 hostname)
      - 4 hostname 모두 응답이 나와야 정상

      ## 💡 왜 이걸 하는가?

      el34 의 접근 모델 검증. 외부(학생 PC LAN)에서 fw/ips/web/siem 의 내부 IP 로 **직접 접속은
      불가** (docker bridge 가 외부에 라우팅되지 않음). 외부 진입은 공인 IP(.161 web / .151 호스트 SSH /
      bastion :2204)로만 가능하고, 장비 점검은 각 장비 `ssh ccc@<IP>`, 인벤토리는 호스트 `docker ps` 로 한다. bastion 은
      외부 운영 진입의 "안내데스크"(감사된 단일 진입점) 역할이다.

      ## 🔍 결과 해석

      - **정상**: 4 hostname 모두 응답 → 장비 SSH 접근 동작
      - **비정상 1**: 1+ 컨테이너 오류 → 해당 컨테이너 상태(`docker ps -a`) 점검
      - **비정상 2**: docker 명령 자체 실패 → 호스트에서 ccc 의 docker 권한(그룹) 점검
    hint: |
      ssh ccc@10.20.30.1 hostname  (fw/ips/web/siem 각각 한 줄씩)
    category: survey
    points: 8
    answer: |
      ssh ccc@10.20.30.1 hostname
      ssh ccc@10.20.31.2 hostname
      ssh ccc@10.20.32.80 hostname
      ssh ccc@10.20.32.100 hostname
    answer_detail: |
      4 컨테이너 모두 hostname 응답 — 예상: `fw / ips / web / wazuh.manager`. siem 의
      hostname 은 컨테이너 안에서 `wazuh.manager`. 오류 발생 시 `docker ps -a` 로 해당
      컨테이너 상태를 확인한다.
    verify:
      type: output_contains
      expect: fw
      field: stdout
      semantic:
        intent: |
          장비 SSH 접근 검증. 4 장비 (fw/ips/web/siem) 의
          hostname 응답 → 컨테이너 진입 정상.
        success_criteria:
          - fw hostname 출력
          - ips hostname 출력
          - web hostname 출력
          - wazuh.manager 또는 siem hostname
        acceptable_methods:
          - |
            **[OSS] for + ssh ccc@IP + hostname** — 표준.
              for h in 10.20.30.1 10.20.31.2 10.20.32.80 10.20.32.100; do
                ssh ccc@$h hostname
              done
            예상 출력 `fw / ips / web / wazuh.manager`.
            운영 해석: 4 hostname 모두 응답 → 정상.
          - |
            **[OSS] 외부에서 내부 IP 직접 접속 차단 검증** — 보안 정책 (학생 PC 관점).
              # 학생 PC(외부)에서 실행 시:
              ssh -o ConnectTimeout=3 ccc@10.20.30.1 hostname 2>&1 | tail -2
            예상 출력 `connect to host 10.20.30.1 port 22: No route to host` 또는 timeout.
            운영 해석: 외부 ↔ docker bridge 라우팅 없음 → 내부 IP 직접 진입 불가. 공인 IP·호스트만 진입점.
            (호스트 .151 안에서는 bridge 가 보이므로 결과가 다르다 — 이 검증은 외부 PC 기준.)
          - |
            **[OSS] bastion sshd_config 의 AllowTcpForwarding** — 외부 진입점 점검.
              sh -c 'grep -E "^AllowTcpForwarding|^GatewayPorts|^MaxSessions" /etc/ssh/sshd_config'
            예상 출력 `AllowTcpForwarding yes / GatewayPorts no / MaxSessions 10`.
            운영 해석: bastion 을 ProxyJump 로 쓸 때 AllowTcpForwarding yes 가 필수.
          - |
            **[OSS] PermitRootLogin 검증** — 보안.
              for h in 10.20.30.1 10.20.31.2 10.20.32.80 10.20.32.100; do
                echo "--- $h ---"
                ssh ccc@$h 'grep -E "^PermitRootLogin" /etc/ssh/sshd_config'
              done
            예상 출력 `PermitRootLogin` 설정 × 4.
            운영 해석: root 직접 로그인 정책 확인.
          - |
            **[OSS] 각 컨테이너의 uname + id** — 정체성.
              for h in 10.20.30.1 10.20.31.2 10.20.32.80 10.20.32.100; do
                echo "=== $h ==="
                ssh ccc@$h 'hostname; uname -r; id'
              done
            예상 출력 `fw / 6.x.0-... / uid=0(root) ...`.
            운영 해석: kernel 공통 (Docker container), 장비 SSH 는 ccc(sudo 보유).
        negative_signs:
          - hostname 출력 누락 (1+ 컨테이너)
          - SSH 접근 오류
          - 내부 IP 직접 접속 시도
    target_vm: bastion

  # ============================================================
  # STEP 3 — fw nftables ruleset + six_nat DNAT
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION

      fw 컨테이너의 nftables ruleset (3 table) + `six_nat` DNAT + host header 4 라우팅을
      확인한다. (L7 host-header 라우팅은 그 뒤 web 의 Apache vhost 가 한다.)

      > 📌 **이름 주의** — `six_filter`/`six_nat` 은 nftables 표준 명칭이 **아니라** 이 인프라가
      > 임의로 붙인 테이블 이름이다(`six` = 원래 인프라명 6v6 의 흔적). nftables 테이블 이름은
      > 관리자가 자유롭게 정하므로 다른 환경에선 다른 이름일 수 있다. 셋 중 `table ip nat` 만
      > Docker 가 자동 생성한 것이고, `six_filter`(필터)·`six_nat`(NAT)은 el34 운영자가 만든 정책 테이블이다.

      ## 💻 실행 명령

      **실습 컨테이너:** nftables 점검은 `el34-fw`, 라우팅 실측은 `el34-attacker`. 각 컨테이너에
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 아래를 실행한다.

      ```bash
      # ── el34-fw 에서: nftables 정책 점검 ──
      # 1. nftables 3 table 가시화
      nft list tables
      # 2. forward chain 정책
      nft list chain inet six_filter forward
      # 3. six_nat DNAT 규칙 (공인 .161 → 내부)
      nft list table ip six_nat

