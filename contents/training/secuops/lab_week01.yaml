      - 명령 2: `192.168.0.202 - - [<date>] "GET /?q=<script>... HTTP/1.1" 403 438 "-" "sqlmap/1.5"` 1+ 라인
      - 명령 3: 매치 룰 ID `941160`(XSS) / `942100`(SQLi) / `942190` / `942360` / `949110`(anomaly) / `980130`(correlation)

      ## 💡 왜 이걸 하는가?

      "WAF 가 어느 룰로 차단했나?" 의 답. el34 의 Apache 는 11 vhost 별 별도 access /
      error log → 분석이 정밀하다.

