      - **client IP = 192.168.0.202 (실제 공격자)**: el34 는 fw 가 SNAT 하지 않아 출처 IP 가 web 까지
        그대로 보존된다. 외부 공격자({{ATTACKER_IP}})도 동일하게 보존 — 구 6v6 의 gateway-src(client 가
        hop IP 로 보이던) 문제를 el34 가 제거했다. X-Forwarded-For 의존 없이 바로 attacker IP 를 추적 가능
      - **비정상**: audit log 비어 있음 → SecAuditEngine 또는 SecAuditLog 경로 점검
