  # STEP 8 — Blue: fw conntrack + ips eve.json 추적
  # ============================================================
  - order: 8
    instruction: |
      ## 🎯 MISSION (Blue Team — 1)

      STEP 7 의 Red 공격이 **fw (conntrack)** 와 **ips Suricata** 두 도구에 흔적을 남겼는지
      추적. (chain 의 첫 2 hop 검증)

      ## 💻 실행 명령

      **실습 컨테이너:** L3/L4 흐름은 `el34-fw`, L7 event 는 `el34-ips`. 각 컨테이너에
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-fw 에서: conntrack (L3/L4 흐름, payload 는 못 봄) ──
      conntrack -L 2>/dev/null | grep -E "dport=80|10.20.32.80" | tail -3

      # ── el34-ips 에서: Suricata eve.json 의 HTTP event (http event 는 드물어 깊게 tail) ──
      tail -5000 /var/log/suricata/eve.json | jq -c 'select(.event_type=="http" and .http.hostname=="dvwa.el34.lab") | {ts:.timestamp, src:.src_ip, url:.http.url, status:.http.status}' | tail -2
