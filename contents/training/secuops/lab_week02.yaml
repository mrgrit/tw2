      ```bash
      # ── el34-attacker 에서: 연결 1건 발생 ──
      curl -s -m 3 -H "Host: juice.el34.lab" http://10.20.30.1/ >/dev/null

      # ── el34-fw 에서: conntrack 표 읽기 ──
      conntrack -L 2>/dev/null | grep -c "dport=80"
      conntrack -L 2>/dev/null | grep "10.20.30.202" | head -2
      ```
      ## ✅ 합격 기준
      conntrack 표에 80 으로의 연결(`dport=80`)이 1개 이상 보인다.
    hint: 'curl 발생 → conntrack -L 에서 dport=80 연결'
