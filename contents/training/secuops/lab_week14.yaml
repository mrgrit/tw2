lab_id: standalone-secuops-week14
title: "기다리지 말고 사냥하라 — Threat Hunting (가설 → 질의 → Sighting → 운영화)"
version: standalone-secuops
course: secuops
week: 14
description: |
  위협 헌팅(Threat Hunting): 경보를 기다리는 수동 관제를 넘어, 가설을 세워 침입을 선제적으로 사냥하는
  능동 방어를 한 바퀴 실습한다. 탐지 룰이 없어 경보가 안 뜨는 조용한 persistence(백도어 계정 + cron)를
  ATT&CK(T1136/T1053)에 매단 가설로 추적해, osquery 스냅샷(지금 남은 것)과 sysmon 이벤트(잠깐 떴다 죽은
  인코딩 셸)를 결합해 끄집어낸다. 발견은 STIX Sighting/ATT&CK 매핑/MISP TLP로 표준 문서화하고, Wazuh
  룰(id 101401)로 굳혀 재발 시 자동 탐지로 전환(운영화)한다. 위협 헌팅 5단계(가설→질의→발견→문서화→
  운영화)를 완주한다. 각 장비에 직접 접속(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, 공격 192.168.0.202, root은 sudo)해 실행한다.
  실행하며 sysmon 관측만 호스트 `/var/log/syslog`다. el34-web/el34-siem은 공유 자원이므로 룰은
  wazuh-logtest로만 검증하고 실습 발판(계정/cron/룰)은 끝나면 self-clean으로 베이스를 보존한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W07(osquery)·W11(sysmon)·W12–W13(인텔/룰) 통과"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §2(5단계) §3(가설) §4(질의) §6(운영화) 숙지"
objectives:
  - "헌팅의 전제인 3종 텔레메트리(osquery 스냅샷 + sysmon 이벤트 + Wazuh 평결) 가용성 점검"
  - "MITRE ATT&CK Persistence(TA0003)에서 검증 가능한 가설 수립 + 경보 없는 잠복 persistence 재현"
  - "osquery로 계정/cron(지금 남은 것) + sysmon으로 인코딩 프로세스(잠깐 떴다 죽은 것)를 결합 선제 발견"
  - "IOC 헌팅(알려진 것)과 TTP 헌팅(행동 패턴)의 차이를 이해하고 TTP 기반으로 잠복 발판 식별"
  - "헌팅 발견을 Wazuh 룰(id 101401, level 12)로 운영화 — 1회 발견을 재발 자동 탐지로 전환"
  - "발견을 STIX Sighting/ATT&CK 매핑/MISP TLP로 표준 문서화·공유 + 공유 인프라 베이스 보존"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 헌팅 텔레메트리(osquery + sysmon + Wazuh)

      **개념:** 위협 헌팅의 전제는 "캘 데이터(텔레메트리)가 있다"는 것이다. 텔레메트리가 죽어 있으면
      그 영역은 사냥이 불가능하고, "경보가 없으니 깨끗하다"는 판단은 카메라가 꺼진 줄 모르는 것과 같다.
      그래서 헌팅 세션의 첫 30초는 항상 3종 소스 점검이다. 셋은 강한 영역이 다르다 —
      **osquery(스냅샷)** 는 "지금 남아 있는 것"(계정·cron·키)에, **sysmon(이벤트 스트림)** 은 "잠깐
      떴다 죽은 것"(단명·인코딩 프로세스)에, **Wazuh(평결)** 는 발견을 룰로 굳히는 데 강하다.

      ## 💻 실행 명령

      **실행 위치:** osquery 는 `el34-web`, sysmon 은 el34 호스트, analysisd 는 `el34-siem`.

      ```bash
      # ── el34-web 에서: osquery(스냅샷) ──
      osqueryi --version
      # ── el34 호스트에서: sysmon(이벤트) ──
      systemctl is-active sysmon
      # ── el34-siem 에서: Wazuh(평결) ──
      /var/ossec/bin/wazuh-control status | grep analysisd
      ```
      - `osqueryi --version` — el34-web에 설치된 osquery 대화형 셸의 버전(5.x 기대). osquery는 OS를 SQL
        테이블로 질의하는 호스트 가시화 도구(W06–W07)다.
      - `systemctl is-active sysmon` — 호스트의 Sysmon for Linux(eBPF 센서) systemd 서비스 가동 여부.
        `active`면 ProcessCreate/NetworkConnect/FileCreate 이벤트가 `/var/log/syslog`에 남는다(W11).
      - `wazuh-control status | grep analysisd` — Wazuh manager의 평결 엔진(analysisd)이 사는지. 이게
        멈추면 발견을 룰로 굳혀도 평결이 안 난다(W09).

      ## ✅ 합격 기준
      osquery 5.x + sysmon active + analysisd running — 세 소스가 모두 살아 있어 "지금 남은 것 + 과거에
      일어난 것 + 평결"을 모두 다룰 수 있는 상태.
    hint: 'osquery + sysmon active + Wazuh analysisd'
    category: survey
    points: 8
    answer: |
      echo "=== osquery (스냅샷) ==="
      ssh ccc@10.20.32.80 sudo osqueryi --version
      echo "=== sysmon (이벤트) ==="
      systemctl is-active sysmon
      echo "=== Wazuh (평결) ==="
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
    answer_detail: "헌팅의 전제 = 텔레메트리 가용성. osquery(현재 상태 스냅샷, '지금 남은 것'에 강함) + sysmon(과거 이벤트 스트림, '잠깐 떴다 죽은 것'에 강함) + Wazuh(평결, 발견을 룰로 굳힘)를 결합해 '지금 있는 것 + 과거에 일어난 것'을 빠짐없이 캔다. 채점은 셋 중 sysmon `active`를 기준 신호로 본다 — 단명 프로세스 헌팅(STEP 5)이 이것 없이는 불가하기 때문. 하나라도 죽어 있으면 그 영역은 사냥 불능이다."
    verify:
      type: output_contains
      expect: 'active'
      field: stdout
      semantic:
        intent: "헌팅 텔레메트리 3소스 가용성 점검"
        success_criteria: ["osquery 5.x", "sysmon active", "analysisd running"]
        acceptable_methods:
          - "**[OSS] 3소스 상태 확인 (권장)**"
          - "**[설명] 텔레메트리=헌팅 전제**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 가설 + 잠복 침투 재현 — 조용한 persistence

      **개념:** 헌팅은 막연히 뒤지는 게 아니라 **가설**에서 출발한다. 좋은 가설은 구체적·검증 가능해야
      하고, 보통 MITRE ATT&CK에서 나온다. 이번 가설: "정찰이 있었으니(이전 주차) 그 뒤 호스트에 발판
      (persistence)이 생겼을 것" — ATT&CK 전술 **TA0003 Persistence**, 기법 **T1136 Create Account** +
      **T1053 Scheduled Task/Job(cron)**. 핵심은 이 발판이 정상 명령(`useradd`, cron 한 줄)으로 만들어져
      **기본 탐지 룰로는 경보가 안 뜬다**는 것 — "경보 없음 ≠ 침입 없음". 이 조용한 발판을 먼저 심어
      사냥 대상으로 두고(이후 STEP 3~5에서 가설을 데이터로 검증), STEP 6에서 탐지 룰을 만든다.

      ## 💻 실행 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      id huntme >/dev/null 2>&1 && userdel -r huntme; useradd -m -s /bin/bash huntme && echo planted
      echo "*/5 * * * * root /tmp/.huntme.sh" > /etc/cron.d/huntme_persist
      ```
      - `id huntme >/dev/null 2>&1 && userdel -r huntme` — 이전 실습 잔재가 있으면 먼저 지워(멱등성 확보) 깨끗이 다시
        심는다. `2>/dev/null`은 "없어서 못 지움" 에러를 숨긴다.
      - `useradd -m -s /bin/bash huntme` — 홈 디렉터리(`-m`)와 로그인 셸(`-s /bin/bash`)을 가진 백도어
        계정 생성(T1136). 로그인 가능 shell이라 STEP 3의 osquery 필터(`shell LIKE "%/bash"`)에 잡힌다.
      - `/etc/cron.d/huntme_persist` — `*/5`(5분마다) root 권한으로 스크립트를 도는 cron persistence
        (T1053). 시스템 cron 디렉터리에 심어 재부팅 후에도 재진입로가 유지된다.

      ## ✅ 합격 기준
      잠복 발판(계정 `huntme` + cron `huntme_persist`)이 재현되고 `planted`가 출력된다. **이 시점에
      Wazuh 경보는 뜨지 않는다** — 이 "조용함"이 헌팅이 필요한 바로 그 이유다.
    hint: 'useradd huntme + cron huntme_persist (조용한 발판)'
    category: response
    points: 10
    answer: |
      echo "=== 가설: persistence(T1136/T1053)가 잠복했을 것 ==="
      ssh ccc@10.20.32.80 'sudo id huntme >/dev/null 2>&1 && userdel -r huntme; useradd -m -s /bin/bash huntme && echo planted'
      ssh ccc@10.20.32.80 'echo "*/5 * * * * root /tmp/.huntme.sh" > /etc/cron.d/huntme_persist; echo cron_planted'
      echo "→ 경보는 안 떴다. 이제 가설로 사냥한다."
    answer_detail: "능동 헌팅은 경보를 안 기다린다. 조용한 persistence(계정 huntme + cron huntme_persist)는 정상 운영 행위와 똑같이 생겨 탐지 룰이 없으면 alerts.json에 한 줄도 안 남는다 — 그래서 ATT&CK Persistence(TA0003: T1136 계정 / T1053 cron)에 매단 가설을 세워 선제적으로 캔다. 채점은 `planted` 출력으로 발판 재현을 확인. 이 발판이 STEP 3~5 헌팅의 사냥 대상이 되고, STEP 6에서 탐지 룰로 굳혀진다."
    verify:
      type: output_contains
      expect: 'planted'
      field: stdout
      semantic:
        intent: "ATT&CK 기반 가설 수립 + 잠복 persistence 재현"
        success_criteria: ["huntme 계정", "cron persistence", "가설(경보 없이 사냥) 이해"]
        acceptable_methods:
          - "**[OSS] useradd + cron (사냥 대상) (권장)**"
          - "**[설명] 가설=ATT&CK persistence**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 질의 1 (osquery) — 비정상 계정 헌팅

      **개념:** 가설(백도어 계정 T1136)을 **데이터로 검증**하는 첫 질의다. 이것은 IOC 헌팅(알려진 악성
      이름을 찾기)이 아니라 **TTP 헌팅** — "uid≥1000인 예상 밖 로그인 가능 계정"이라는 **행동 패턴**을
      단서로 삼는다. 그래서 공격자가 계정 이름을 무엇으로 바꿔도 패턴이 같으면 잡힌다. osquery `users`는
      OS의 계정 목록을 SQL 테이블로 보여주는 스냅샷 소스로, 계정 같은 "지금 남아 있는" persistence에 강하다.

      ## 💻 실행 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      osqueryi --json 'SELECT username,uid,shell,directory FROM users WHERE uid>=1000 AND shell LIKE "%/bash";'
      ```
      - `--json` — 결과를 JSON 배열로 출력(파싱·기록에 유리).
      - `FROM users` — OS 계정 테이블(`/etc/passwd` 추상화).
      - `WHERE uid>=1000` — 시스템 계정(보통 uid<1000)을 빼고 사람/공격자가 만든 계정으로 좁힌다.
      - `AND shell LIKE "%/bash"` — 로그인 **가능한** 계정만 추린다(nologin/false 계정 제외). 두 조건의
        결합이 "백도어로 쓸 만한 계정"이라는 TTP 패턴이다.

      ## ✅ 합격 기준
      헌팅으로 `huntme` 계정을 발견한다. baseline(정상 계정 목록)에 없던 계정이므로 "발견"으로 확정한다.
    hint: 'osquery users WHERE uid>=1000 → huntme 발견'
    category: analysis
    points: 12
    answer: |
      echo "=== osquery 계정 헌팅 (uid>=1000 + bash shell) ==="
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT username,uid,shell,directory FROM users WHERE uid>=1000 AND shell LIKE "%/bash";'
    answer_detail: "가설(백도어 계정 T1136)을 osquery users로 검증 — uid>=1000(시스템 계정 제외) + 로그인 가능 shell(`%/bash`)로 좁혀 huntme를 끄집어낸다. 이름이 아니라 '예상 밖 로그인 계정'이라는 행동 패턴을 단서로 하는 TTP 헌팅이라, 공격자가 계정명을 바꿔도 잡힌다. 핵심은 baseline(정상 계정 목록)과의 대조 — baseline 없이는 huntme가 정상인지 가릴 수 없다. 채점은 출력에 huntme 포함 여부."
    verify:
      type: output_contains
      expect: 'huntme'
      field: stdout
      semantic:
        intent: "가설을 osquery 질의로 검증 — 비정상 계정 발견"
        success_criteria: ["users 헌팅으로 huntme 발견", "uid/shell 필터", "baseline 대조"]
        acceptable_methods:
          - "**[OSS] osquery users 헌팅 (권장)**"
          - "**[설명] 가설→질의→발견**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 질의 2 (osquery) — persistence 다(多)벡터 헌팅

      **개념:** persistence는 한 벡터가 아니다. 공격자는 계정(T1136) 외에도 cron(T1053)·SSH 키(T1098)
      등 여러 재진입로를 동시에 심는다. 한 발판만 지우고 다른 것을 놓치면, 남은 cron이 계정을 다시
      만들어 "꼬리 자르기"가 실패한다. 그래서 좋은 헌팅은 한 가설의 **여러 발현을 빠짐없이** 질의한다.
      cron은 상태로 남는 persistence라 osquery 스냅샷으로 잘 잡힌다.

      ## 💻 실행 명령

      **WAF/웹 장비:** `ssh ccc@10.20.32.80`(비번 `1`)로 접속해 실행한다.

      ```bash
      osqueryi --json 'SELECT command,path FROM crontab WHERE path LIKE "%huntme%";'
      ```
      - `FROM crontab` — 시스템에 등록된 예약 작업(cron) 테이블. STEP 2에서 `/etc/cron.d/`에 심은
        백도어 cron이 여기 잡힌다.
      - `WHERE path LIKE "%huntme%"` — 의심 경로로 좁혀 huntme 관련 cron만 추린다.
      - (answer는 여기에 `authorized_keys`(SSH 키, T1098) 점검도 더해 다벡터 헌팅을 완성한다.)

      ## ✅ 합격 기준
      cron persistence(`huntme_persist`)를 발견한다. SSH 키 벡터는 이번 시나리오에선 비어 있을 수 있으나,
      "벡터를 빠짐없이 점검했다"는 절차 자체가 산출물이다.
    hint: 'osquery crontab WHERE path LIKE %huntme% → huntme_persist'
    category: analysis
    points: 12
    answer: |
      echo "=== osquery cron persistence 헌팅 ==="
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT command,path FROM crontab WHERE path LIKE "%huntme%";'
      echo "=== (보강) authorized_keys 벡터도 점검 ==="
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT key_file,algorithm FROM authorized_keys LIMIT 3;' >/dev/null 2>&1 || echo "(authorized_keys 없음)"
    answer_detail: "persistence는 한 벡터가 아니다 — 계정(users, T1136) 외 cron(crontab, T1053)·SSH키(authorized_keys, T1098)도 캔다. 한 발판만 지우고 다른 것을 놓치면 남은 cron이 계정을 다시 만들어 꼬리 자르기가 실패하므로, 헌팅은 가설의 여러 발현을 빠짐없이 질의한다. 채점은 crontab 출력에 huntme_persist 포함 여부."
    verify:
      type: output_contains
      expect: 'huntme_persist'
      field: stdout
      semantic:
        intent: "다중 persistence 벡터(cron) 헌팅"
        success_criteria: ["crontab에서 huntme_persist", "다벡터 점검(cron/keys)"]
        acceptable_methods:
          - "**[OSS] osquery crontab/authorized_keys (권장)**"
          - "**[설명] persistence 다벡터**"
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 질의 3 (sysmon) — 인코딩 프로세스 이벤트 헌팅

      **개념:** 지금까지(STEP 3~4)는 osquery 스냅샷으로 "지금 남아 있는 것"을 캤다. 그러나 스냅샷에는
      사각지대가 있다 — **base64로 인코딩되어 잠깐 실행되고 사라지는 셸**(T1059 Command Interpreter +
      T1027 Obfuscation)은 조사 시점에 이미 죽어 osquery에 안 잡힌다. 이런 단명·인코딩 프로세스는
      **sysmon 이벤트 스트림**만 잡는다 — sysmon은 프로세스가 **생성되는 순간**의 cmdline을
      ProcessCreate(EventID 1)로 `/var/log/syslog`에 남기기 때문이다. 헌팅은 스냅샷+이벤트를 **결합**해
      "지금 없지만 과거에 일어난" 실행까지 캔다.

      ## 💻 실행 명령

