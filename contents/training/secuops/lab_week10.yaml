lab_id: standalone-secuops-week10
title: "분석가의 조종석 — Wazuh dashboard + FIM(실시간) + Active Response"
version: standalone-secuops
course: secuops
week: 10
description: |
  탐지(W01–W09)는 "무슨 일이 났는가" 까지다. 이번 주는 거기에 ① 한 화면에서 보고(dashboard) ②
  네트워크가 못 보는 호스트 파일 변조를 잡고(FIM) ③ 손 안 대고 되받아치는(Active Response) — 분석가의
  조종석(cockpit)을 더해 탐지를 운영으로 바꾼다. 평결(alerts.json)을 색인·검색 가능하게 만드는 부품이
  indexer(OpenSearch, el34-wazuh-indexer)이고, 그 색인을 패널로 그리는 부품이 dashboard(el34-wazuh-dashboard,
  vhost siem.el34.lab)다.

  흐름: ① manager(평결)→indexer(색인)→dashboard(표시) 3컴포넌트 생존 점검(indexer https 401=인증
  보호된 채 살아 있음) → ② web syscheck 의 realtime(즉시·민감 경로) vs frequency(주기·광범위 경로)
  감시 방식 확인 → ③ realtime 경로(/home/ccc) canary 로 변경 즉시 탐지(rule 554=File added) 후 self-clean
  → ④ /etc/passwd 변조를 level 12 로 격상하는 커스텀 룰(id 101010)을 local_rules.xml 에 작성하고 라이브
  재시작 없이 wazuh-logtest 로 룰셋 로드만 검증(syscheck 이벤트는 내부 발생이라 직접 발화 대신 로드 검증)
  후 self-clean → ⑤ Active Response(firewall-drop+timeout) 설계를 ossec.conf 에서 읽기전용 점검(자가 DoS
  방지=timeout+화이트리스트) → ⑥ ids(네트워크)+syscheck(호스트) 두 소스가 한 alerts.json 으로 수렴 확인
  → ⑦ 그 전제인 web agent ship(wazuh-agentd) 점검.

  el34-siem 은 모든 학생이 함께 쓰는 단일 manager 이므로, FIM canary 는 rm 으로, 커스텀 룰은 cp 복원으로
  정리하고, 라이브 manager 는 재시작하지 않고 active-response 는 활성·트리거하지 않는다(공유 조종석
  보존·다른 학생 영향 방지). 모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서 `docker exec el34-<comp>` 로.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W09 통과 (manager decoder→rule→alert + local_rules.xml + wazuh-logtest)"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec (컨테이너 root)"
  - "lecture §2(dashboard/indexer) §3(FIM realtime) §4(격상) §5(Active Response) 숙지"
objectives:
  - "조종석 3컴포넌트(manager analysisd=평결 / el34-wazuh-indexer=색인 / el34-wazuh-dashboard=표시)의 생존을 점검하고, indexer https 401 이 '인증 보호된 채 살아 있음' 의 증거임을 이해한다"
  - "web ossec.conf 에서 syscheck 의 realtime(즉시·민감 경로) vs frequency 43200(12h 주기·광범위 경로) 감시 방식을 구분하고 비용/적시성 트레이드오프를 설명한다"
  - "realtime 경로(/home/ccc)에 canary 를 만들어 변경 즉시 alerts.json 에 rule 554(File added)가 올라옴을 추적하고 rm 으로 self-clean 한다"
  - "/etc/passwd 변조를 level 12 로 격상하는 커스텀 룰(id 101010, if_group syscheck+field file)을 local_rules.xml 에 작성하고, 라이브 재시작 없이 wazuh-logtest 로 룰셋 로드만 검증 후 cp 복원으로 self-clean 한다"
  - "Active Response(firewall-drop+timeout) 설계를 ossec.conf 에서 읽기전용 점검하고, timeout·화이트리스트가 없으면 오탐 한 번에 자가 DoS 가 나는 이유를 설명한다(실제 활성·트리거 금지)"
  - "ids(네트워크/Suricata)+syscheck(호스트/FIM) 두 소스가 한 alerts.json·한 조종석으로 수렴함을 데이터로 확인하고, 그 전제인 web agent ship(wazuh-agentd)을 점검한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 조종석이 살아있나 (manager + dashboard + indexer)

      ### 개념 — 왜 이걸 먼저 하나
      평결이 화면이 되는 길은 manager(평결)→indexer(색인)→dashboard(표시) 3단계다(도서관의 서고→사서→
      안내판). 세 컴포넌트가 다 살아야 조종석이 동작한다.
      - **manager analysisd** = 평결(alerts.json)을 만드는 판사. `el34-siem`.
      - **indexer(OpenSearch)** = 평결을 `wazuh-alerts-*` 인덱스로 색인해 빠른 검색·집계를 가능케 하는
        사서. 별도 컨테이너 `el34-wazuh-indexer`.
      - **dashboard** = 색인을 패널·그래프로 그리는 안내판. 별도 컨테이너 `el34-wazuh-dashboard`
        (vhost siem.el34.lab).

      핵심: dashboard 화면이 비면 dashboard 가 아니라 거의 항상 그 앞(indexer 색인 또는 평결)이 원인이므로
      백엔드부터 본다.

      ## 💻 실행 명령

      **실습 컨테이너:** analysisd 는 `el34-siem`, indexer 응답은 `el34-wazuh-indexer`.
      `docker ps` 는 el34 호스트에서 직접 실행한다.

      ```bash
      # ── el34-siem 에서: manager 심장(analysisd) ──
      /var/ossec/bin/wazuh-control status | grep analysisd

      # ── el34 호스트에서: indexer/dashboard 컨테이너 Up 확인 ──
      docker ps --format '{{.Names}}\t{{.Status}}' | grep -iE 'indexer|dashboard'

      # ── el34-wazuh-indexer 에서: 생존(401=인증보호된 채 살아있음) ──
      curl -sk -o /dev/null -w "indexer https=%{http_code}\n" https://localhost:9200/
      ```
      - `wazuh-control status` : manager daemon 들의 가용성 조회(여기선 평결 엔진 analysisd).
      - `docker ps ... grep indexer|dashboard` : 두 별도 컨테이너가 `Up` 인지 확인.
      - `curl -sk -w "%{http_code}"` : indexer 9200 의 https 응답 코드만 출력(`-k` 자체서명 인증서 허용,
        `-s` 조용히). 인증으로 보호되어 자격 없이 두드리면 **401** 이 정상이다.

      ## ✅ 합격 기준
      analysisd running + `el34-wazuh-indexer`/`-dashboard` Up + indexer 응답(401/200=생존). 401 은
      오류가 아니라 "인증 보호된 채 살아 있음" 의 증거다. 연결 거부(000)면 indexer 가 죽은 것.
    hint: 'analysisd + indexer/dashboard 컨테이너 Up + indexer https 응답(401=alive)'
    category: survey
    points: 10
    answer: |
      echo "=== manager 심장 ==="
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      echo "=== dashboard/indexer 컨테이너 ==="
      docker ps --format '{{.Names}}\t{{.Status}}' | grep -iE 'indexer|dashboard'
      echo "=== indexer 생존(401=인증보호된 채 살아있음) ==="
      docker exec el34-wazuh-indexer sh -c 'curl -sk -o /dev/null -w "indexer https=%{http_code}\n" https://localhost:9200/ 2>/dev/null'
    answer_detail: "manager(analysisd)=평결, el34-wazuh-indexer(OpenSearch)=색인, el34-wazuh-dashboard=표시. indexer https 401 = 인증 보호된 채 정상 가동(평결을 wazuh-alerts-* 인덱스로 색인)."
    verify:
      type: output_contains
      expect: 'indexer'
      field: stdout
      semantic:
        intent: "조종석 3컴포넌트(manager/indexer/dashboard) 생존 점검"
        success_criteria: ["analysisd running", "indexer/dashboard 컨테이너 Up", "indexer https 응답(생존)"]
        acceptable_methods:
          - "**[OSS] wazuh-control + docker ps + indexer curl (권장)**"
          - "**[설명] alerts→indexer→dashboard 경로**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 FIM 설정 — 무엇을 실시간으로 감시하나

      ### 개념 — realtime vs 주기 스캔
      **FIM(File Integrity Monitoring, syscheck)** 은 지정한 디렉터리의 파일을 해싱해 변경(delta)을 잡는
      금고 CCTV 다. 네트워크 3계층(fw/ips/WAF)이 못 보는 호스트 안의 파일 변조를 잡는 사각지대용이다.
      감시에는 두 방식이 있고 그 트레이드오프가 핵심이다.
      - **realtime(실시간 생중계)** : 파일이 바뀌는 그 순간(초 단위) 경보. 비용이 커서 **민감·소수
        경로**(설정 디렉터리·홈)에만.
      - **주기 스캔(frequency, 순찰)** : 정해진 간격마다 한 번 훑음. 싸지만 다음 스캔까지 지연 →
        **광범위·덜 급한 경로**(/usr/bin 등)에.

      el34-web 은 `/etc,/usr/bin,/bin,/boot`=frequency 43200(12h 주기), `/etc/apache2,/etc/modsecurity,
      /home/ccc`=realtime(+report_changes=무엇이 바뀌었나 diff, +whodata=누가 바꿨나)로 나눠 둔다.

      ## 💻 실행 명령

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      grep -E "directories|frequency" /var/ossec/etc/ossec.conf | head -12
      ```
      - `grep -E "directories|frequency"` : ossec.conf 의 `<directories ...>` 감시 경로 줄과 `frequency`
        주기 설정을 함께 뽑아 realtime/주기 구분이 한눈에 보이게 한다.

      ## ✅ 합격 기준
      `realtime="yes"` 경로(/home/ccc, /etc/modsecurity 등)와 frequency 주기 경로가 함께 보인다.
      realtime 이 하나도 없으면 실시간 탐지가 꺼진 것이다.
    hint: 'web ossec.conf 의 <directories realtime="yes"> 경로'
    category: survey
    points: 8
    answer: |
      echo "=== web syscheck 감시 경로 ==="
      docker exec el34-web sh -c 'grep -E "directories|frequency" /var/ossec/etc/ossec.conf | head -14'
    answer_detail: "광범위 경로(/etc,/bin)는 frequency 43200(12h 주기), 민감 경로(/home/ccc,/etc/apache2,/etc/modsecurity)는 realtime+report_changes(+whodata)로 즉시. 비용/적시성 트레이드오프."
    verify:
      type: output_contains
      expect: 'realtime'
      field: stdout
      semantic:
        intent: "syscheck realtime vs 주기 감시 경로 구분"
        success_criteria: ["realtime 경로 식별", "주기(frequency) 경로 식별", "트레이드오프 이해"]
        acceptable_methods:
          - "**[OSS] ossec.conf syscheck directories (권장)**"
          - "**[설명] realtime/report_changes/whodata 의미**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 FIM 실시간 탐지 — 변경 즉시 잡기 (rule 554)

      ### 개념 — 호스트 사각지대를 초 단위로
      realtime 감시 경로(/home/ccc)에 파일을 만들면 syscheck 가 즉시 delta 를 잡아 analysisd 를 거쳐
      alerts.json 에 기록한다. 방화벽·IDS·WAF 가 못 보는 **호스트 안의 파일 변조** 를 FIM 이 초 단위로
      잡음을 직접 증명하는 미션이다. FIM 의 세 기본 변경 이벤트는 **rule 550(modified·수정) / 554
      (added·추가) / 555(deleted·삭제)** 이며, 여기선 파일 생성이라 554 가 매치된다. 공유 인프라이므로
      확인 후 rm 으로 정리(self-clean)한다.

      ## 💻 실행 명령

      **실습 컨테이너:** canary 생성/삭제는 `el34-web`, 탐지 확인은 `el34-siem`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: realtime 감시 경로(/home/ccc)에 canary 생성 → 변경 유발 ──
      echo "w10-fim-test" > /home/ccc/w10_canary.txt; echo created

      # FIM(syscheck→analysisd→alerts.json)은 지연이 있어 ~45초 대기 후 el34-siem 에서 확인한다

      # ── el34-siem 에서: alerts.json 에서 canary 의 syscheck added(rule 554) 탐지 ──
      tail -2000 /var/ossec/logs/alerts/alerts.json | grep w10_canary | tail -1

      # ── el34-web 에서: canary 정리(self-clean) ──
      rm -f /home/ccc/w10_canary.txt; echo cleaned
      ```
      - 카나리 생성 → realtime syscheck delta → analysisd → alerts.json(rule 554 'File added').
      - 고정 sleep 대신 폴링: FIM 지연·alert 부하에 견고. 미탐 시 web 에이전트 realtime watch 점검.

      ## ✅ 합격 기준
      alerts.json 에 `w10_canary` 의 syscheck `added`(rule 554) 경보가 보이면 통과. **근거:** 네트워크
      장비가 못 보는 호스트 파일 변조를 FIM이 초 단위로 잡음을 실제 경보로 증명(폴링으로 지연/부하에 견고).
    hint: '/home/ccc canary → sleep 12 → alerts.json syscheck added → rm'
    category: detect
    points: 17
    answer: |
      docker exec el34-web sh -c 'echo "w10-fim-test" > /home/ccc/w10_canary.txt; echo created'
      echo "=== alerts.json syscheck (canary 실시간 탐지, 최대 ~45초 폴링) ==="
      R=""
      for i in $(seq 1 15); do
        sleep 3
        R=$(docker exec el34-siem sh -c 'tail -2000 /var/ossec/logs/alerts/alerts.json | grep w10_canary | tail -1')
        [ -n "$R" ] && { echo "탐지: $(echo "$R" | grep -oE 'w10_canary[^\"]*' | head -1) (rule 554 File added)"; break; }
      done
      [ -z "$R" ] && echo "(45초 내 미탐 — web wazuh-control restart로 realtime watch 재확립)"
      docker exec el34-web sh -c 'rm -f /home/ccc/w10_canary.txt; echo cleaned'
    answer_detail: "realtime 경로 변경 → syscheckd 즉시 delta → analysisd → alerts.json. rule 554='File added to the system'. 네트워크 장비가 못 보는 호스트 파일 변조를 FIM이 초 단위로 잡는다. rm으로 self-clean."
    verify:
      type: output_contains
      expect: 'w10_canary'
      field: stdout
      semantic:
        intent: "FIM 실시간 변경 탐지 + self-clean"
        success_criteria: ["canary 생성→syscheck added 경보", "rule 554", "rm 정리"]
        acceptable_methods:
          - "**[OSS] realtime 경로 변경 → alerts.json syscheck (권장)**"
          - "**[설명] realtime delta 메커니즘**"
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 FIM 격상 룰 — 민감 파일 변조를 상위 level로 (id 101010)

      ### 개념 — 위험한 변조만 골라 끌어올린다
      모든 파일 변경이 같은 위험은 아니다. 로그가 커지는 건 일상이지만 /etc/passwd 에 계정이 끼어드는 건
      백도어 신호다. 기본 syscheck 룰(550/554/555)은 위험도를 구분하지 않으므로, **민감 파일 변조만 골라
      상위 level 로 격상** 해 대시보드 최상단에 띄운다. 형식은 W09 의 체이닝 — 기존 syscheck 경보
      (`<if_group>syscheck</if_group>`) 뒤에 특정 파일(`<field name="file">/etc/passwd</field>`) 조건을 더
      걸어 level 12 로 올린다.

      **검증 방식 주의.** W09 의 JSON 필드 격상과 달리 syscheck 이벤트는 manager **내부에서 발생** 해
      로그 한 줄로 직접 발화시키기 어렵다. 그래서 발화가 아니라 **"룰셋이 에러 없이 로드되는지"** 로
      검증한다. wazuh-logtest 는 시작 때 현재 룰셋을 새로 읽으므로, 우리가 추가한 XML 에 문법 오류가
      있으면 에러를, 정상이면 `Type one log per line` 프롬프트를 띄운다 → 프롬프트가 뜨면 로드 성공이다.
      라이브 analysisd 는 건드리지 않는다(공유 인프라 무중단). id 는 1010xx(100000 미만은 Wazuh 예약).

      ## 💻 실행 명령

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.
      (이 단계는 이미 bare — el34-siem 안에서 그대로 실행한다.)

      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/w10_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="edu_w10,syscheck,">
        <rule id="101010" level="12">
          <if_group>syscheck</if_group>
          <field name="file">/etc/passwd</field>
          <description>EDU W10 - /etc/passwd tampered (possible backdoor)</description>
        </rule>
      </group>
      EOF'
      printf "test\n" | sudo /var/ossec/bin/wazuh-logtest 2>&1 | grep -iE "error|Type one log"   # 로드 검증
      sudo cp /tmp/w10_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/w10_lr.bak    # self-clean
      ```
      - `cp ... /tmp/w10_lr.bak` : 베이스 local_rules.xml 백업(나중에 원복용).
      - `cat >> ... <<EOF` : 격상 룰 그룹을 local_rules.xml 에 추가(append). `if_group`=체이닝 조건,
        `field name="file"`=대상 파일 한정.
      - `wazuh-logtest 2>&1 | grep -iE "error|Type one log"` : 룰셋 로드 결과만 추림 — 에러 또는
