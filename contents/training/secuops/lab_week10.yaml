      ## 🎯 Active Response 점검 — 자동 대응 설계 (읽기전용)

      ### 개념 — 손 안 대고 닫히는 셔터, 그리고 자가 DoS
      **Active Response(AR)** 는 고위험 경보가 뜨면 사람을 기다리지 않고 자동으로 대응 명령을 실행한다.
      가장 흔한 게 출처 IP 를 방화벽에서 차단하는 **firewall-drop** 이다(침입 감지 시 내려오는 자동 셔터).
      설계는 ossec.conf 의 두 블록 조합이다 — `<command>`(무엇을 실행: firewall-drop) + `<active-response>`
      (언제: level≥12 경보에, timeout=600초 뒤 자동 해제).

      **치명적 함정 = 자가 DoS.** 셔터가 손님을 도둑으로 오인해 내려오고 다시 안 열리면 가게가 스스로
      마비된다. AR 도 오탐으로 정상 IP 를 영구 차단하면 운영자 스스로 서비스를 막는다. 그래서 **반드시
      timeout(일정 시간 뒤 자동 해제) + 화이트리스트(절대 차단 금지 출처)** 가 필요하다.

      ⚠️ el34 기본 ossec.conf 의 active-response 는 **주석 처리된 비활성 템플릿** 이다. 공유 인프라이므로
      **실제 활성/트리거 금지** — 설정 점검 + 설계 서술(왜 timeout/예외가 필요한가)까지만 한다.

      ## 💻 실행 명령

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      grep -nE "active-response|firewall-drop|command" /var/ossec/etc/ossec.conf | head
      ls -la /var/ossec/logs/active-responses.log 2>/dev/null || echo "(AR 로그 — 트리거 시 기록)"
      ```
      - `grep -nE "active-response|firewall-drop|command"` : ossec.conf 에서 AR 설계 블록(템플릿)을
        줄번호와 함께 확인(`-n` 줄번호).
      - `ls -la .../active-responses.log` : AR 이 실제 실행되면 기록되는 로그 경로 확인. el34 는 AR
        미활성이라 비어 있거나 없는 것이 정상.

      ## ✅ 합격 기준
      ossec.conf 에 `active-response` 설정(주석 템플릿)이 확인된다. AR 로그가 비어 있는 것도 정상
      (el34 미활성). 실제 firewall-drop 을 활성·트리거하면 안 된다.
    hint: 'ossec.conf 의 active-response/firewall-drop 점검 (활성/트리거 금지)'
