  - order: 4
    instruction: |
      ## 🎯 MISSION — SQLi + 942xxx + libinjection fingerprint

      SQL Injection 페이로드 → 942xxx 룰 매치 + libinjection fingerprint 확인 + encoding
      bypass 시뮬.

      ## 💻 실행 명령

      **실습 컨테이너:** 로그 격리·분석은 `el34-web`, SQLi 공격은 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
