      echo "=== 방법 A: audit log(단일라인 JSON) grep+jq — messages 룰 ID ==="
      ssh ccc@10.20.32.80 "sudo grep 192.168.0.202 /var/log/apache2/modsec_audit.log | tail -1 | jq -r '.audit_data.messages[]?' | grep -oE 'id \"9[0-9]{5}\"' | sort -u"
      ssh ccc@10.20.32.80 "sudo grep 192.168.0.202 /var/log/apache2/modsec_audit.log | tail -1 | jq '{remote:.transaction.remote_address, status:.response.status}'"
      echo "=== 방법 B: error.log의 ModSec 경고 레코드(구조) ==="
      ssh ccc@10.20.32.80 'sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "ModSecurity: [^[]+" | head -3'
      echo "=== 방법 B: 한 레코드의 임베드 메타(id + 익명점수 요약) ==="
      ssh ccc@10.20.32.80 'sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "id .[0-9]+.|SQLI=[0-9]+,XSS=[0-9]+[^]]*" | head'
    answer_detail: 'el34 audit log=단일라인 JSON(Serial). 방법 A: audit grep+jq(.audit_data.messages[], remote_address, response.status) 정상 동작. 방법 B: per-vhost error.log 라인의 id/msg/SQLI=,XSS=. 두 경로 모두 출처 192.168.0.202 보존. audit는 전 vhost 섞임→내 요청 grep 필요, error.log는 라인 격리+Wazuh 파싱.'
    verify:
      type: output_contains
