      # el34 modsec_audit.log는 단일라인 JSON(Serial) → audit grep+jq(방법 A)와 error.log(방법 B) 둘 다 유효
      ssh att@192.168.0.202 "echo -en 'GET /?q=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # sleep 대신 error.log 에 이번 공격의 ModSec 경고가 실제로 기록될 때까지 조건 대기(zero-sleep)
