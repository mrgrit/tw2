    answer_detail: 'el34 audit log=멀티라인 JSON(tail|jq 불가). 룰 ID·익명점수 요약은 per-vhost error.log의 ModSec 경고 라인에 임베드(id/msg/SQLI=,XSS=). remote_address(출처)도 [client]에 보존.'
