    instruction: |
      ## 🎯 MISSION — SQLi + 942xxx + libinjection fingerprint

      SQL Injection 페이로드 → 942xxx 룰 매치 + libinjection fingerprint 확인 + encoding
      bypass 시뮬.

      ## 💻 실행 명령

      **실습 컨테이너:** 로그 격리·분석은 `el34-web`, SQLi 공격은 `el34-attacker`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: SQLi 직전 error.log 라인 수 기록 (이번 요청만 격리) ──
      B=$(sudo wc -l < /var/log/apache2/dvwa_error.log)

      # ── el34-attacker 에서: SQLi 전송 — ' OR '1'='1 (URL 인코딩) ──
      curl -s -o /dev/null -w "응답: %{http_code}\n" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=1%27%20OR%20%271%27=%271"

      # ── el34-web 에서: 이번 요청 신규 라인만 분석 (공격 1초 후) ──
      # 942xxx(SQLi) 매치 룰
      sudo tail -n +$((B+1)) /var/log/apache2/dvwa_error.log | grep -oE 'id "942[0-9]+"' | sort -u
      # SQLI 익명점수
      sudo tail -n +$((B+1)) /var/log/apache2/dvwa_error.log | grep -oE 'SQLI=[0-9]+' | head -1
      ```

      ## 📋 확인 사항

      - **응답: 403** (block)
      - **942xxx 매치**: `id "942100"` (libinjection) + `id "942190"`/`id "942360"`
      - **SQLI 점수**: `SQLI=5` 이상 (libinjection critical → score 누적)
      - **격리**: error.log 라인수 차이로 이번 요청만 추출(직전 공격과 안 섞임)

      ## 💡 왜 이걸 하는가?

      libinjection 의 SQL fingerprint 는 정규식 기반보다 정확. encoding bypass 도 CRS 가
      normalize 후 매치 → paranoia 1 에서도 효과.

      ## 🔍 결과 해석

      - **정상**: 403 + 942xxx + fingerprint
      - **IR 활용**: fingerprint 가 attack vector 식별 단서
      - **paranoia 2 효과**: comment 우회 (`/*X*/UNION`) 매치
