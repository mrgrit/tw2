  - order: 2
    instruction: |
      ## 🎯 MISSION — el34 audit log 실제 형식(단일라인 JSON) + 룰 메타 추출 2 경로

      el34의 `modsec_audit.log`는 **SecAuditLogType Serial + SecAuditLogFormat JSON**이라 **트랜잭션 1건 =
      한 줄의 완전한 JSON 객체**다. 따라서 `tail -1 | jq`·`.audit_data.messages[]` 추출이 **정상 동작한다**
      (실측: `tail -1 | jq -e .` = valid JSON). 다만 이 로그는 **모든 vhost·모든 요청**을 한 파일에 섞어 기록해
      `tail -1`이 내 공격이 아닐 수 있다 → 내 요청을 **출처 IP/URI로 grep**해 고르거나, per-vhost `error.log`를
      **라인 오프셋으로 격리**한다. error.log의 ModSec 경고 라인은 `[id "..."] [msg "... SQLI=..,XSS=.. ..."]`
      형식(W01과 동일)이고 **W10 Wazuh decoder가 그대로 라인 파싱**한다.

      ## 💻 실행 명령

      **실습 컨테이너:** 공격은 `el34-attacker`, 로그 분석은 `el34-web`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: 1) 공격을 한 발 보내 ModSec 기록을 만든다 ──
      # 💡 이 payload URL 은 브라우저 주소창이나 Burp Repeater 로 열어도 ModSec 403 차단 페이지가 뜬다.
      #    여기선 응답 화면이 아니라 로그(error.log) 구조 분석이 목적이라 nc 로 한 발만 보낸다.
      echo -en 'GET /?q=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-web 에서: 방법 A — audit log(단일라인 JSON)에서 내 요청을 골라 jq ──
      # 내 출처(192.168.0.202)의 마지막 트랜잭션 1줄 = 완전한 JSON → messages[]로 룰 ID 추출
      sudo grep 192.168.0.202 /var/log/apache2/modsec_audit.log | tail -1 | jq -r '.audit_data.messages[]?' | grep -oE 'id "9[0-9]{5}"' | sort -u
      sudo grep 192.168.0.202 /var/log/apache2/modsec_audit.log | tail -1 | jq '{remote:.transaction.remote_address, status:.response.status}'

      # ── el34-web 에서: 방법 B — per-vhost error.log(라인 기반, W10 Wazuh 파싱과 동일) ──
      # ModSec 경고 레코드(구조) — [client]에 출처(remote_address) 보존
      sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "ModSecurity: [^[]+" | head -3
      # 임베드 메타(룰 id + 익명점수 요약 SQLI=,XSS=)
      sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "id .[0-9]+.|SQLI=[0-9]+,XSS=[0-9]+[^]]*" | head
      ```

      ## 📋 확인 사항

      - **방법 A**: `tail -1 | jq`가 valid JSON 파싱 → `id "941100"/"941110"/"941160"/"949110"/"980130"` +
        `{remote:"192.168.0.202", status:403}`
      - **방법 B**: `ModSecurity: Warning ...` / `Access denied ...` 경고 라인 + 룰 ID + `SQLI=0,XSS=15,...` 요약
      - **출처 보존**: 두 경로 모두 `192.168.0.202` = 실제 attacker(el34 SNAT 없음)
      - **선택 기준**: audit(전체·상관·jq 파이프) vs error.log(per-vhost·라인격리·Wazuh decoder 파싱)

      ## 💡 왜 이걸 하는가?

      audit log는 단일라인 JSON이라 jq 파이프가 바로 되지만 **전 vhost를 섞어** 노이즈가 크다 — 한 공격의 룰 ID를
      정확히 분리하려면 출처 IP grep 또는 per-vhost error.log + 라인 오프셋이 깔끔하다. W10 Wazuh decoder도
      error.log 라인을 파싱하므로 error.log 포맷 숙지가 곧 decoder 이해로 이어진다.

      ## 🔍 결과 해석

      - **정상**: 방법 A(audit jq messages[]) + 방법 B(error.log 경고 라인) 모두 같은 룰 ID·출처 IP 추출
      - **운영 권장**: 실시간 IR = error.log grep(즉시)/audit grep+jq, 상관분석 = `jq -s`로 audit 전체 슬러프,
        영속 정규화 = W10 Wazuh decoder(manager 측)
    hint: 'jq + grep -oE — messages 의 [id "X"] embedded format'
