  - order: 3
    instruction: |
      ## 🎯 MISSION — XSS 공격 + 941xxx 매치 + anomaly score 15 가시화

      lecture §4.4 의 실측 재현 — XSS 가 941100 + 941110 + 941160 의 3 CRITICAL 룰 매치 →
      score 15 → 949110 block + 980130 correlation summary.

      ## 💻 실행 명령

      **실습 컨테이너:** 로그 격리·분석은 `el34-web`, XSS 공격은 `el34-attacker`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.
      (el34-web 세션을 연 채 다른 터미널에서 공격하면 B 변수가 유지된다.)

      ```bash
      # ── el34-web 에서: 공격 직전 error.log 라인 수 기록 (이번 요청만 격리) ──
      B=$(sudo wc -l < /var/log/apache2/dvwa_error.log)

      # ── el34-attacker 에서: XSS 페이로드 전송 ──
      curl -s -o /dev/null -w "응답: %{http_code}\n" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"

      # ── el34-web 에서: 이번 요청 신규 라인만 분석 (공격 1초 후) ──
      # 매치 룰 ID
      sudo tail -n +$((B+1)) /var/log/apache2/dvwa_error.log | grep -oE 'id "9[0-9]{5}"' | sort -u
      # 익명점수 요약(Total Inbound Score + SQLI=,XSS=)
      sudo tail -n +$((B+1)) /var/log/apache2/dvwa_error.log | grep -oE 'Total Inbound Score: [0-9]+|SQLI=[0-9]+,XSS=[0-9]+[^]]*' | head -2
      ```

      ## 📋 확인 사항

      - **응답: 403** (block)
      - **매치 룰**: `id "941100"` `id "941110"` `id "941160"` + `id "949110"`(block) + `id "980130"`(correlation)
      - **익명점수**: `Total Inbound Score: 15` (XSS critical 3 × 5)
      - **summary**: `SQLI=0,XSS=15,...`

      ## 💡 왜 이걸 하는가?

      anomaly scoring 누적 수학 실증. 1 payload → 여러 룰 매치 → score 누적 → block.
      운영 IR 시 980130 summary 가 한 줄 요약 → 5분 → 30초.

      ## 🔍 결과 해석

      - **정상**: 403 + 941 3 매치 + score 15 + XSS=15
      - **누적 의미**: XSS critical 3 × 5 = 15 ≥ threshold 5 → block
      - **paranoia 2 효과**: 941180 등 추가 룰 → score 더 누적
