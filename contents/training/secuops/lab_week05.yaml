      ## 🎯 MISSION — 공격자 IP 식별: remote_address (el34 출처 보존)

      el34 는 fw 가 SNAT 하지 않아 ModSec audit 의 `transaction.remote_address` 가 **곧 실제 공격자 IP**
      다 (X-Forwarded-For 없이도). 그래서 IP 기반 ModSec/차단 룰을 remote_address 로 바로 작성할 수 있다.

      ## 💻 실행 명령

      **실습 컨테이너:** 공격은 `el34-attacker`, audit log 분석은 `el34-web`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: 공격 1발 ──
      # 💡 브라우저/Burp 로 열어도 audit log 에 같은 remote_address 가 기록된다(el34 는 출처 보존).
      echo -en 'GET /?q=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-web 에서: remote_address / XFF 확인 (공격 2초 후) ──
      sudo tail -1 /var/log/apache2/modsec_audit.log | jq '{remote:.transaction.remote_address, xff:.request.headers."x-forwarded-for"}'
      sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.error_messages[0]" | grep -oE "client [0-9.]+"

      # el34: remote_address 가 곧 공격자 → IP 룰을 초안 파일로 작성해 검토·적용
      cat > ~/w05_ipblock.conf <<'EOF'
      SecRule REMOTE_ADDR "@ipMatch 192.168.0.202" \
          "id:9006001,phase:1,deny,status:403,msg:'attacker IP block'"
      EOF
      cat ~/w05_ipblock.conf
      # (참고) src 를 가리는 reverse-proxy 환경이라면 XFF 신뢰가 필요
      cat > ~/w05_remoteip.conf <<'EOF'
      RemoteIPHeader X-Forwarded-For
      RemoteIPInternalProxy 10.20.31.0/24
      EOF
      cat ~/w05_remoteip.conf
      ```

      ## 📋 확인 사항

      - `{remote: "192.168.0.202", xff: null}` — el34 는 remote_address 가 곧 공격자 IP, XFF 불필요
      - error_messages 의 `client 192.168.0.202` — Apache 가 본 실제 source (보존)
      - IP 룰을 `REMOTE_ADDR` 로 바로 작성 가능

      ## 💡 왜 이걸 하는가?

      많은 reverse-proxy 환경은 src 를 프록시 IP 로 가려 XFF 신뢰 설정이 필요하다. el34 는 fw 가 출처를
      보존하므로 그 복잡성 없이 remote_address 로 바로 공격자를 식별·차단한다 — 운영이 단순해진다.

