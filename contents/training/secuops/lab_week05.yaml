  - order: 2
    instruction: |
      ## 🎯 MISSION — el34 audit log 실제 형식 + error.log에서 룰 메타 추출

      ⚠️ el34의 `modsec_audit.log`는 **멀티라인(pretty) JSON**이라 `tail -1 | jq`가 깨진다(한 줄이
      JSON 조각). 룰 ID·익명점수 요약 같은 메타는 **per-vhost `error.log`의 ModSec 경고 라인**에
      `[id "..."] [msg "... SQLI=..,XSS=.. ..."]` 형식으로 임베드된다(W01과 동일한 신뢰 소스).

      ## 💻 실행 명령

      **실습 컨테이너:** 공격은 `el34-attacker`, 로그 분석은 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: 1) 공격을 한 발 보내 ModSec 기록을 만든다 ──
      curl -s -o /dev/null -H "Host: dvwa.el34.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"

      # ── el34-web 에서: error.log 분석 (공격 1초 후) ──
      # 2) ModSec 경고 레코드(구조) — [client]에 출처(remote_address) 보존
      sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "ModSecurity: [^[]+" | head -3
      # 3) 한 레코드의 임베드 메타(룰 id + 익명점수 요약 SQLI=,XSS=)
      sudo tail -8 /var/log/apache2/dvwa_error.log | grep -oE "id .[0-9]+.|SQLI=[0-9]+,XSS=[0-9]+[^]]*" | head
      ```

      ## 📋 확인 사항

      - **2)**: `ModSecurity: Warning ...` / `ModSecurity: Access denied ...` 경고 라인 출력
      - **3)**: `id "941100"` 등 룰 ID + `SQLI=0,XSS=15,...` 익명점수 요약
      - **출처 보존**: error.log 라인의 `[client 10.20.30.202]` = 실제 attacker(el34 SNAT 없음)
      - audit_data.messages(jq) 방식은 el34 멀티라인 JSON에서 동작하지 않음 → error.log가 표준

      ## 💡 왜 이걸 하는가?

      audit log 분석 자동화 시 환경별 실제 포맷 인지가 필수. el34는 audit JSON이 멀티라인이라
      줄 단위 jq가 silent fail → per-vhost error.log의 임베드 메타가 신뢰 소스(W10 Wazuh decoder도 동일 라인 파싱).

      ## 🔍 결과 해석

      - **정상**: ModSecurity 경고 라인 + 룰 id + 익명점수 요약 추출
      - **운영 권장**: error.log grep(즉시) + Wazuh decoder(manager 측 정규화). audit log는 전체 슬러프(`jq -s`) 필요
    hint: 'jq + grep -oE — messages 의 [id "X"] embedded format'
    category: analysis
    points: 15
