lab_id: standalone-secuops-week05
title: Apache + ModSecurity v2 + OWASP CRS 3.3.2 — 설정 / audit / 5 공격 차단 / R/B/P / exception
version: standalone-non-ai
course: secuops
week: 5
description: |
  el34-web 의 Apache 2.4 + mod_security2 + OWASP CRS 3.3.2 + 11 vhost reverse proxy
  + SecAuditLogFormat JSON 의 실 운영. 설정 점검 → audit log 정확한 구조 분석 → XSS /
  SQLi / LFI / RCE / PHP 5 공격 차단 검증 + anomaly score 추적 → paranoia 시뮬 →
  exception 작성 → R/B/P (5 공격 anomaly summary + paranoia 권장) → Wazuh ship 검증 →
  종합 보고서. 한 cycle.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W01-W04 통과"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec (컨테이너 root)"
  - "lecture §1-§9 (5 phase / anomaly / audit log 정확한 구조) 숙지"
objectives:
  - "modsecurity.conf 의 6 키 + 11 vhost 점검"
  - "audit log JSON 정확한 구조 + messages[] embedded metadata 파싱"
  - "5 공격 (XSS/SQLi/LFI/RCE/PHP) 차단 + 매칭 룰 ID 추출"
  - "anomaly score 누적 (실측 XSS=15 = 941100+941110+941160)"
  - "remote_address = 실제 공격자 IP (el34 가 fw 에서 SNAT 안 함 → 출처 보존) 이해"
  - "paranoia 1 / 2 시뮬 + 영향 분석"
  - "exception 작성 (LocationMatch + SecRuleRemoveById)"
  - "R/B/P 5 공격 + 980130 correlation summary"
  - "Wazuh agent ship 검증 (W10 예고) + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — modsecurity.conf 6 핵심 키 + CRS 3.3.2 + 11 vhost 점검

      운영 인수 첫 점검. Apache + mod_security2 모듈 + CRS 버전 + audit log 설정 + 11
      vhost 활성 확인.

      ## 💻 실행 명령

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      sudo apache2ctl -M 2>&1 | grep -i security
      sudo dpkg -l | grep -E "modsec|crs"
      sudo grep -E "^SecRuleEngine|^SecRequestBodyAccess|^SecResponseBodyAccess|^SecAuditLog|^SecAuditLogFormat|^SecAuditLogParts|^SecAuditLogType" /etc/modsecurity/modsecurity.conf
      sudo ls /usr/share/modsecurity-crs/rules/ | wc -l
      sudo wc -l /usr/share/modsecurity-crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
      sudo ls /etc/apache2/sites-enabled/
      sudo ls -la /var/log/apache2/modsec_audit.log
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      - `security2_module (shared)` — 모듈 로드
      - `modsecurity-crs 3.3.2-1` — CRS 버전
      - 7 라인: `SecRuleEngine On` / `SecRequestBodyAccess On` / `SecResponseBodyAccess On` /
        `SecAuditLog /var/log/apache2/modsec_audit.log` / `SecAuditLogFormat JSON` /
        `SecAuditLogType Serial` / `SecAuditLogParts ABCFHZ`
      - 30+ 룰 파일 + 941 XSS 파일 884 라인
      - 11 vhost (000-landing ~ 100-bastion)
      - audit log root:root 640

      ## 💡 왜 이걸 하는가?

      운영 인수 30초 안에 정책 본체 + audit format + vhost 11개 확인. production WAF
      minimum bar.

      ## 🔍 결과 해석 + 트러블슈팅

      - **비정상 1**: 모듈 미로드 → `a2enmod security2 && reload apache2`
      - **비정상 2**: SecRuleEngine DetectionOnly → log 만, 차단 X → production 부적합
      - **비정상 3**: format 이 JSON 아님 → Wazuh decoder 부적합
      - **비정상 4**: vhost 11 아님 → docker-compose 의 vhost mount 점검
    hint: 'el34-web 접속 후 — apache2ctl -M | grep security; grep SecRuleEngine /etc/modsecurity/modsecurity.conf'
