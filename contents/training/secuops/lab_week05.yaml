      docker exec el34-web sh -c 'sudo ls /usr/share/modsecurity-crs/rules/ | wc -l'
      docker exec el34-web sh -c 'sudo wc -l /usr/share/modsecurity-crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf'
      docker exec el34-web sh -c 'sudo ls /etc/apache2/sites-enabled/'
      docker exec el34-web sh -c 'sudo ls -la /var/log/apache2/modsec_audit.log'
