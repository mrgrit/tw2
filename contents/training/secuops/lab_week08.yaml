lab_id: standalone-secuops-week08
title: "중간고사 — 한 침입 사슬을 5종 장비(fw/IDS/WAF/osquery/SIEM)로 끝까지 막기"
version: standalone-secuops
course: secuops
week: 8
description: |
  W01–W07 종합 실기(중간고사). 한 외부 침입자(출처 192.168.0.202)가 정찰 → 웹 침투(SQLi) →
  호스트 발판의 한 공격 사슬(kill chain)을 시도한다. 운영자(학생)는 지난 7주 동안 하나씩 익힌
  5종 보안 장비 — 방화벽(W02)·IDS(W03–04)·WAF(W05)·osquery(W06)·엔드포인트 IR(W07) — 을 모두
  동원해, "어느 단계를 어느 장비로 끊을지" 판단하고, 각 단계를 알맞은 장비로 차단·사냥하며,
  그 증거(로그/audit/eve.json/osquery 결과)를 제시한다. 마지막에는 el34 가 SNAT 를 하지 않아
  출처 IP 가 끝까지 보존된다는 사실을 이용해, IDS 의 src_ip 와 WAF 의 remote_address 가 같은
  192.168.0.202 임을 확인하여 5계층의 흔적을 한 타임라인으로 상관(correlation)한다.

  핵심 메시지 — 어떤 단일 장비도 사슬 전체를 못 막는다. 방화벽은 호스트 내부를 못 보고(L4),
  osquery 는 네트워크 정찰을 못 본다(호스트 한정). 다층 방어(defense in depth) + 통합 가시성
  (SIEM 수렴)이 정답이다.

  인프라 주의 — el34 에는 HAProxy 가 없다. 공개 진입은 el34-fw(nftables: inet six_filter 필터 +
  ip six_nat DNAT), L7 라우팅+WAF 는 el34-web(Apache 2.4 + ModSecurity/CRS). 모든 명령은 el34
  각 장비에 직접 접속(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, 공격 192.168.0.202)해 실행한다. 공유
  인프라이므로 baseline 은 수정하지 말고, 각 단계에서 심은 흔적은 그 단계에서 스스로 정리한다(self-clean).
difficulty: hard
duration_minutes: 240
prerequisites:
  - "W01–W07 통과 (방화벽/IDS/WAF/osquery/엔드포인트 IR)"
  - "장비 직접 SSH: ssh ccc@<장비IP>(fw 10.20.30.1/ips 31.2/web 32.80/siem 32.100, root은 sudo) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §2(kill chain) §5(판단표) §6(상관) 숙지"
objectives:
  - "동원할 5종 장비(fw/ips/web/host/siem)의 가용성을 시험 전 점검한다"
  - "공격 사슬 ① 정찰(스캐너 UA)을 IDS 커스텀 룰(sid 9008001)로 탐지하고 끝나면 베이스 룰을 보존한다"
  - "같은 sqlmap UA 가 WAF(913)와 IDS(네트워크 UA 문자열)에 서로 다른 층위로 잡힘을 증거로 본다"
  - "공격 사슬 ② 웹 침투(SQLi)가 WAF anomaly 누적(942100→949110)으로 403 차단됨을 audit 로 확인한다"
  - "방화벽 정책·DNAT 경로(공개→web 10.20.32.80)를 점검하고 L7/WAF=Apache(HAProxy 아님)임을 안다"
  - "공격 사슬 ③ 호스트 발판(리스너 38088/계정 w08user/cron)을 osquery 로 사냥하고 즉시 self-clean 한다"
  - "5계층 흔적의 SIEM(Wazuh) 수렴을 확인하고 출처 IP(192.168.0.202)로 한 타임라인으로 상관한다"
  - "사슬 단계별로 끊은 장비와 증거를 종합 보고서로 정리하고 공유 인프라 흔적을 0 으로 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 5종 장비가 모두 살아있나

      **개념 한 줄.** 종합 대응의 전제는 동원할 5종 장비가 모두 가용해야 한다는 것이다. 운영자는
      사건 대응에 들어가기 전 항상 도구의 가용성부터 확인한다 — 막상 끊으려는데 장비가 죽어 있으면
      그 계층은 사슬에서 빈틈이 된다.

      중간고사에서 동원할 5계층은 **방화벽(el34-fw / nftables)** · **IDS(el34-ips / Suricata)** ·
      **WAF(el34-web / Apache+ModSecurity)** · **호스트 가시화(el34-web / osquery)** ·
      **SIEM(el34-siem / Wazuh manager + web·ips agent)** 다. 각 컨테이너에 버전/상태를 물어 응답을 본다.

      ## 💻 실행 명령

      **실습 컨테이너:** 5종 장비를 각 컨테이너에서 점검(주석의 `el34-<host>` 에 접속해 실행).

      ```bash
      # ── el34-fw: nftables 정책 줄 수 ──
      sudo nft list ruleset 2>/dev/null | wc -l
      # ── el34-ips: Suricata 버전 ──
      suricata -V 2>/dev/null
      # ── el34-web: ModSec 모듈 + osquery 버전 ──
      sudo apache2ctl -M 2>/dev/null | grep -i security
      osqueryi --version
      # ── el34-siem: web/ips agent ──
      /var/ossec/bin/agent_control -l | grep -E "web,|ips,"
      ```

      ## 🔍 도구·옵션 풀이
      - `nft list ruleset` — nftables 의 현재 정책 전체를 출력한다. `wc -l` 로 줄 수만 세어 "정책이
        비어 있지 않은지(>0)"를 빠르게 본다.
      - `suricata -V` — Suricata 버전(el34 = 6.0.4)을 출력한다. 응답이 있으면 IDS 바이너리 가용.
      - `apache2ctl -M | grep -i security` — Apache 에 로드된 모듈 중 ModSecurity(`security2_module`)가
        있는지 확인한다. 보이면 WAF 엔진이 떠 있는 것.
      - `osqueryi --version` — osquery 버전(el34 = 5.23.0)을 출력한다.
      - `agent_control -l` — Wazuh manager 에 등록된 agent 목록. `web,`(004)·`ips,`(003)가 Active 면
        SIEM 수렴 경로가 살아 있다.

      ## ✅ 합격 기준
      osquery 5.x + suricata + modsec + web/ips agent 가 모두 응답한다(어느 하나라도 무응답이면 그
      계층은 시험에서 동원 불가 — 먼저 원인부터 파악).
    hint: 'fw nft / ips suricata -V / web modsec+osquery / siem agent_control'
    category: survey
    points: 8
    answer: |
      echo "=== fw nftables (정책 줄 수) ==="
      ssh ccc@10.20.30.1 'sudo nft list ruleset 2>/dev/null | wc -l'
      echo "=== ips suricata ==="
      ssh ccc@10.20.31.2 'suricata -V 2>/dev/null'
      echo "=== web modsec ==="
      ssh ccc@10.20.32.80 'sudo apache2ctl -M 2>/dev/null | grep -i security'
      echo "=== host osquery ==="
      ssh ccc@10.20.32.80 sudo osqueryi --version
      echo "=== siem agents ==="
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/agent_control -l | grep -E "web,|ips," || echo "(agent 확인)"
    answer_detail: "5종 장비 가용성 확인은 종합 대응의 전제다. 다층 방어는 5계층이 모두 살아 있어야 성립한다. 점검 대상은 fw(nftables 정책 존재)·ips(Suricata 동작)·web(Apache 에 ModSec 로드)·host(osquery 5.23.0)·siem(Wazuh manager + web(004)/ips(003) agent Active). 어느 하나라도 무응답이면 그 계층이 사슬의 빈틈이 되므로, 시험 본 단계 전에 반드시 확인한다."
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "5종 장비 가용성 점검"
        success_criteria: ["nftables 정책 존재", "Suricata 동작", "ModSec 로드", "osquery 5.x", "web/ips agent active"]
        acceptable_methods:
          - "**[OSS] 각 컨테이너 버전/상태 질의 (권장)**"
          - "**[설명] 5계층 = 다층 방어 전제**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정찰 재현 — 스캐너 UA (WAF 가 913 으로 본다)

      **개념 한 줄.** 공격 사슬의 첫 단계인 **정찰(Recon)** 은 공격 전에 표적의 표면을 자동화
      스캐너로 훑어 약점을 찾는 것이다. sqlmap·nikto 같은 스캐너는 자기 정체를 드러내는
      **User-Agent(UA)** 문자열(예: `sqlmap/1.7`)을 HTTP 헤더에 담는다.

      외부 공격자(`el34-attacker`, 출처 192.168.0.202)가 sqlmap UA 로 `dvwa.el34.lab` 표면을 훑으면,
      WAF(ModSecurity/CRS)의 **913 룰군(scanner detection)** 이 이를 audit 에 기록한다. 같은 UA 는
      다음 미션에서 학생이 만들 IDS 룰로 IPS 에도 잡힌다 — **한 사건을 두 장비가 다른 층위로 본다.**

      ## 💻 실행 명령

      **실습 컨테이너:** 정찰은 `el34-attacker`, audit 확인은 `el34-web`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: sqlmap UA 정찰 ──
      echo "정찰 응답:$(echo -en 'GET /?id=w08mt1 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}')"

      # ── el34-web 에서: WAF audit 의 913 scanner (정찰 3초 후) ──
      sudo tail -60 /var/log/apache2/modsec_audit.log | grep -c "913"
      sudo tail -60 /var/log/apache2/modsec_audit.log | grep -o "sqlmap" | head -1
      ```

      ## 🔍 도구·옵션 풀이
      - nc `User-Agent: sqlmap/1.7` 헤더 — 스캐너 UA 를 담은 raw HTTP 요청으로 정찰을
        재현한다.
      - 자연 URL `http://dvwa.el34.lab/` — 호스트명이 web 의 Apache vhost(dvwa, 차단 모드)를 고른다. 요청은
        fw 게이트웨이 `http://10.20.30.1` 로 보내지만 도착지 vhost 는 이 헤더가 결정한다.
      - `-s -o /dev/null -w "...%{http_code}"` — 본문은 버리고(`-o /dev/null`) 조용히(`-s`) 응답 코드만
        출력한다.
      - `grep -c "913"` — audit 로그 최근 60줄에서 CRS 913xxx(스캐너 탐지) 흔적의 개수를 센다.

      ## ✅ 합격 기준
      WAF audit 에 스캐너 탐지(`913`)가 남는다(방화벽은 L4 라 이 UA 를 못 본다 — 정찰은 IDS/WAF 의 영역).
    hint: '외부 attacker 의 sqlmap UA 요청 → modsec audit 의 913'
    category: recon
    points: 10
    answer: |
      echo "정찰 응답:$(ssh att@192.168.0.202 "echo -en 'GET /?id=w08mt1 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 | head -1 | grep -oE '[0-9]{3}'")"
      sleep 3
      echo "=== modsec audit 913 scanner ==="
      ssh ccc@10.20.32.80 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -c "913"'
      ssh ccc@10.20.32.80 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "913[0-9]{3}" | sort -u'
    answer_detail: "스캐너 UA(sqlmap)는 OWASP CRS 의 913xxx 룰군(scanner detection)에 매치되어 modsec_audit.log 에 기록된다. 핵심 깨달음 — 방화벽은 패킷의 IP/포트(L3/L4)만 보므로 HTTP 헤더 안의 UA 문자열을 못 본다. 따라서 정찰 탐지는 방화벽이 아니라 IDS/WAF 의 영역이다. 같은 sqlmap UA 가 다음 미션의 IDS 룰로도 잡히며, 두 장비가 한 사건을 다른 층위(HTTP 의미 vs 네트워크 문자열)로 본다는 것이 종합 평가의 핵심이다."
    verify:
      type: output_contains
      expect: '913'
      field: stdout
      semantic:
        intent: "스캐너 UA 정찰을 WAF(913)로 식별"
        success_criteria: ["modsec audit 에 913xxx", "sqlmap UA 흔적", "방화벽이 못 보는 층위 이해"]
        acceptable_methods:
          - "**[OSS] 외부 attacker sqlmap UA → audit 913 (권장)**"
          - "**[설명] L4(fw) vs L7(WAF) 가시성 차이**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ① IDS 룰 — 스캐너 UA 탐지(sid 9008001) 작성→reload→트리거→정리

      **개념 한 줄.** 정찰을 사슬 초기에 끊으려면 IDS 가 잡아야 한다. WAF 는 HTTP 가 도착한 뒤 보지만,
      IDS(Suricata)는 네트워크를 흐르는 페이로드 안에서 본다. 이 미션은 학생이 직접 탐지 룰을 설계해
      "탐지를 만드는" 능력을 평가한다.

      Suricata `local.rules` 에 스캐너 UA 탐지 룰(sid **9008001**, `http.user_agent` + `content:"sqlmap"`
      + `fast_pattern`)을 추가하고, **문법 검사(-T) → 무중단 reload → 트리거 → eve.json 확인 → sid 로
      삭제(베이스 보존)** 의 룰 수명주기 전체를 수행한다. 내 룰은 `9008xxx` 네임스페이스를 쓰고, base
      룰(sid 1000001–1000005)은 절대 건드리지 않는다.

      ## 💻 실행 명령

      **실습 컨테이너:** IDS 룰 작성·reload·검증·정리는 `el34-ips`, 트리거는 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 룰 작성 + 문법검사(-T) + 무중단 reload ──
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"el34 W08 sqlmap scanner UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; classtype:web-application-attack; sid:9008001; rev:1;)
      EOF"
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -2
      sudo suricatasc -c reload-rules

      # ── el34-attacker 에서: 트리거 (sqlmap UA) ──
      echo -en 'GET /?id=w08mt3 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-ips 에서: eve.json 확인 + 정리(sid 삭제, 베이스 보존) (트리거 4초 후) ──
      sudo grep "9008001" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature, src:.src_ip}'
      sudo sed -i "/sid:9008001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null
      ```

      ## 🔍 룰·옵션 풀이
      - `alert http any any -> any any` — HTTP 트래픽 전 방향에 대해 매치 시 alert 를 낸다.
      - `http.user_agent; content:"sqlmap"; nocase;` — HTTP 의 User-Agent 헤더에서 대소문자 무시하고
        문자열 `sqlmap` 을 찾는다.
      - `fast_pattern` — Suricata 가 룰 전체를 검사하기 전에 이 문자열로 1차 후보를 빠르게 거른다(성능).
      - `sid:9008001; rev:1;` — 룰의 고유 번호(시험용 네임스페이스 9008xxx)와 리비전.
      - `suricata -T -S <파일>` — `-T` 는 테스트(문법 검사) 모드, `-S` 는 검사할 룰 파일 지정. 적용 전
        문법 오류를 잡는다.
      - `suricatasc -c reload-rules` — Suricata 소켓 클라이언트로 데몬을 멈추지 않고 룰만 다시 읽게 한다
        (무중단 reload).
      - `sed -i "/sid:9008001/d"` — 끝나면 내 룰 한 줄을 sid 로 찾아 삭제하고 다시 reload — baseline 보존.

      ## ✅ 합격 기준
      eve.json 에 `el34 W08 sqlmap` 시그니처가 잡힌다(정리 후 local.rules 에서 9008001 이 사라져 베이스 보존).
    hint: 'local.rules 에 sqlmap UA fast_pattern 룰(9008001) → reload → 트리거 → eve → sid 삭제'
    category: manipulation
    points: 15
    answer: |
      ssh ccc@10.20.31.2 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"el34 W08 sqlmap scanner UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; classtype:web-application-attack; sid:9008001; rev:1;)
      EOF"'
      echo "=== syntax ==="
      ssh ccc@10.20.31.2 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -2'
      ssh ccc@10.20.31.2 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh att@192.168.0.202 "echo -en 'GET /?id=w08mt3 HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      sleep 4
      echo "=== eve.json alert ==="
      ssh ccc@10.20.31.2 'sudo grep "9008001" /var/log/suricata/eve.json | tail -1 | jq "{sig:.alert.signature, src:.src_ip}"'
