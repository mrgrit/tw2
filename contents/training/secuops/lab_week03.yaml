lab_id: standalone-secuops-week03
title: Suricata IDS — 데몬 + 설정 + 룰 작성 + eve.json 깊이 분석 + R/B/P + 트러블슈팅
version: standalone-non-ai
course: secuops
week: 3
description: |
  el34-ips 의 Suricata 6.0.4 가 두 NIC sniff + 배포 룰셋 + eve.json JSON event 로
  출력하는 흐름을 단계별 검증. 데몬 + suricata.yaml + dump-counters 의 drop rate +
  event_type 8 종 jq pattern + flow_id 로 한 conn 의 모든 event 추적 + 새 alert 룰
  작성·트리거 + suricata-update workflow + R/B/P (sqlmap UA × 5 → 10 alert + threshold
  권장) + 트러블슈팅 시뮬 + 종합 보고서. 한 cycle.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W01-W02 통과 (특히 W02 의 nft/NAT 흐름 + el34 출처 IP 보존 이해)"
  - "장비 직접 SSH: ips ssh ccc@10.20.31.2 (root 명령은 sudo) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §1-§9 (Suricata 내부 + eve.json + 트러블슈팅) 숙지"
objectives:
  - "Suricata 4 모듈 (capture/decode/detect/output) + autofp + cluster_flow 이해"
  - "suricata.yaml 의 af-packet / rule-files / eve-log / HOME_NET 4 키 점검"
  - "dump-counters 의 drop rate 0% 목표 + stats.log 8초 주기"
  - "eve.json 8 event_type 별 jq pattern + flow_id 로 conn 통합"
  - "새 alert 룰 (sid 9004001 sqlmap UA) 작성·reload·트리거·검증"
  - "suricata-update workflow + 룰셋(local.rules+suricata.rules) 관리"
  - "R/B/P — sqlmap UA × 5 → 양 NIC 10 alert + threshold 권장"
  - "트러블슈팅 — rule-files 미등록 + capture drop > 0 + sticky buffer 오류"
  - "종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — Suricata 데몬 상태 + version + uptime + 두 NIC sniff

      운영 인수 첫 점검. 데몬 살아 있고 두 NIC (eth0 pipe / eth1 dmz) 모두 sniff 중인지
      + Suricata 6.0.4 버전 + 가동 시간 확인. **autofp runmode** 가시화.

      ## 💻 실행 명령

      **IPS 장비:** `ssh ccc@10.20.31.2`(비번 `1`)로 접속해 실행한다.

      ```bash
      # 1. 프로세스 + 시작 옵션
      pgrep -a Suricata

      # 2. version (suricatasc - Suricata 의 unix socket control)
      sudo suricatasc -c version

      # 3. uptime (초)
      sudo suricatasc -c uptime

      # 4. 두 NIC sniff stats (interface 별)
      sudo suricatasc -c iface-list
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      - **명령 1**: `<pid> suricata -i eth1 -i eth0 -c /etc/suricata/suricata.yaml --runmode autofp -l /var/log/suricata`
        - `-i eth1 -i eth0`: 두 NIC (autofp 가 자동으로 thread group 분리)
        - `--runmode autofp`: auto flow-pinned (cache-friendly)
      - **명령 2**: `{"message":"6.0.4 RELEASE","return":"OK"}`
      - **명령 3**: `{"message":31737,"return":"OK"}` (uptime 초)
      - **명령 4**: `{"message":{"ifaces":["eth0","eth1"]},"return":"OK"}` — 두 NIC 모두

      ## 💡 왜 이걸 하는가?

      SOC 의 "alert 가 안 보일 때 첫 명령". Suricata 가 죽으면 모든 IDS alert 사라진다.
      운영 인수 시 30초 안에 데몬 + 두 NIC + runmode + version 확인 가능.

      ## 🔍 결과 해석 + 트러블슈팅

      - **정상**: 프로세스 + version + uptime > 0 + 두 NIC
      - **비정상 1**: 프로세스 없음 → `docker logs el34-ips | tail -50` 으로 시작 시
        error 확인 (보통 suricata.yaml syntax 오류 또는 NIC 미존재)
      - **비정상 2**: NIC 1개만 → entrypoint 의 `-i eth0 -i eth1` argv 점검
      - **비정상 3**: uptime 짧음 (수십 초) → 데몬 crash + auto-restart 가능 → suricata.log
        의 SIGSEGV / fatal 검토
