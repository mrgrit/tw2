  - order: 4
    instruction: |
      ## 🎯 MISSION — eve.json 8 event_type 별 jq pattern + flow_id 로 conn 통합

      lecture §5 의 8 event_type 별 핵심 필드 jq 추출 + 같은 flow_id 의 모든 event 묶음
      (한 conn 의 alert + http + flow 연결).

      ## 💻 실행 명령

      **실습 컨테이너:** 트래픽 발생은 `el34-attacker`, eve.json 분석은 `el34-ips`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-attacker 에서: 0. 새 HTTP 트래픽 3건 발생 (분석 대상 확보) ──
      curl -s -o /dev/null -A 'TestUA/1' http://juice.el34.lab/w04_test_1
      curl -s -o /dev/null -A 'TestUA/2' http://juice.el34.lab/w04_test_2
      curl -s -o /dev/null -A 'TestUA/3' http://juice.el34.lab/w04_test_3

      # ── el34-ips 에서: eve.json 분석 (트래픽 후 4초쯤 대기) ──
      # 1. event_type 분포 (최근 200 event)
      sudo tail -200 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn

      # 2. HTTP event 의 핵심 필드
      sudo grep '"event_type":"http"' /var/log/suricata/eve.json | tail -1 | \
          jq '{ts:.timestamp, url:.http.url, src:.src_ip, status:.http.status, ua:.http.http_user_agent}'

      # 3. TLS event 의 JA3 fingerprint
      sudo grep '"event_type":"tls"' /var/log/suricata/eve.json | tail -1 | \
          jq '{sni:.tls.sni, ja3:.tls.ja3.hash, version:.tls.version}'

      # 4. flow event 의 양방향 bytes
      sudo grep '"event_type":"flow"' /var/log/suricata/eve.json | tail -1 | \
          jq '{src:.src_ip, dst:.dest_ip, to_srv:.flow.bytes_toserver, to_cli:.flow.bytes_toclient, state:.flow.state}'

      # 5. 같은 flow_id 의 모든 event (한 conn 통합)
      FLOW=$(sudo tail -100 /var/log/suricata/eve.json | jq -r 'select(.event_type=="http") | .flow_id' | tail -1)
      echo "FLOW_ID=$FLOW"
      sudo tail -500 /var/log/suricata/eve.json | jq -c "select(.flow_id==$FLOW) | {ts:.timestamp, type:.event_type, iface:.in_iface}"
      ```

      ## 📋 확인 사항 (실측)

      - **명령 1**: 4+ event_type (flow 가 가장 많고 http / tls / alert / stats / fileinfo 등)
      - **명령 2**: `{ts, url:"/w04_test_3", src:"192.168.0.202", status:200, ua:"TestUA/3"}`
        - **src_ip** = 실제 attacker IP (el34 는 fw 가 SNAT 안 함 → 출처 보존 — xff 불요)
      - **명령 3**: `{sni:"...", ja3:"<32자 hash>", version:"TLS 1.3"}`
      - **명령 4**: `{src, dst, to_srv:<bytes>, to_cli:<bytes>, state:"closed"}`
      - **명령 5**: 같은 flow_id 의 event 2~5 개 (in_iface eth0 + eth1 둘 다 — 양 NIC sniff)

      ## 💡 왜 이걸 하는가?

      SOC 분석가의 일상 작업. 한 alert 의 context 를 알려면 flow_id 로 같은 conn 의 다른
      event 추적이 필수. el34 는 `src_ip` 가 곧 실 client IP (출처 보존) 라 별도 xff 없이 바로 식별된다.

      ## 🔍 결과 해석

      - **정상**: 4+ event_type + src_ip 가 attacker IP (보존) + flow_id 매칭 2+
      - **운영 활용**: alert 받으면 → flow_id 추출 → 같은 conn 의 http/tls/flow event 추적 →
        full context 파악 → 5분 안에 IR 결정
    hint: 'el34-ips 접속 후 — sudo tail -200 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c'
