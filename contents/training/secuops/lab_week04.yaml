lab_id: standalone-secuops-week04
title: Suricata 룰 심화 — pcre / fast_pattern / flowbits / threshold / suppression + R/B/P
version: standalone-non-ai
course: secuops
week: 4
description: |
  W03 의 단순 content 매칭에서 한 단계 위 — content modifier 5종 (nocase / depth /
  offset / distance / within), HTTP sticky buffer 9종, pcre 정규식 + content prefilter
  결합, fast_pattern 명시, flowbits 다단계 추적, threshold rate-limit (룰 modifier),
  threshold.config 의 suppress + event_filter (운영 통제), 그리고 5 기술 결합 1개 룰
  (sid 9005099) + R/B/P (다단계 공격 추적 + suppression 권장) + 종합 보고서. 한 cycle.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W03 통과 — Suricata 데몬 + eve.json + 새 alert 룰 작성 익숙"
  - "장비 직접 SSH: ips ssh ccc@10.20.31.2 (root 명령은 sudo) + 공격 ssh att@192.168.0.202 (비번 1)"
  - "lecture §1-§9 (5 기술 + 트러블슈팅) 숙지"
objectives:
  - "content modifier 5종 + HTTP sticky buffer 9종 사용"
  - "pcre + content prefilter — 한국 주민번호 / SQL UNION"
  - "fast_pattern 명시 + multi-pattern matcher 효과 이해"
  - "flowbits 다단계 추적 (401 → /admin)"
  - "threshold rate-limit (룰 modifier) + 3 mode + 3 track"
  - "threshold.config 의 suppress + event_filter (운영 통제)"
  - "5 기술 결합 production-grade 룰 (sid 9005099)"
  - "R/B/P — 다단계 공격 + suppression 권장"
  - "트러블슈팅 + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — content modifier 5종 + http.uri 결합 룰 (sid 9005041 /admin)

      `/etc/suricata/rules/local.rules` 에 **http.uri + depth + nocase + fast_pattern**
      4 modifier 결합 룰 작성 → syntax 검증 → reload → 트리거 → eve.json 검증 → cleanup.

      ## 💻 실행 명령

      **실습 컨테이너:** 룰 작성·검증은 `el34-ips`, 트리거는 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 룰 작성 + 검증 + reload ──
      # 1. 룰 작성 (heredoc 사용 — escape 단순화)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"el34 admin path access\"; http.uri; content:\"/admin\"; depth:6; nocase; fast_pattern; classtype:attempted-recon; priority:2; sid:9005041; rev:1;)
      EOF"
      # 2. syntax 검증
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3
      # 3. rule-files 등록 확인 (suricata.yaml 이미 local.rules 포함)
      sudo grep "local.rules" /etc/suricata/suricata.yaml
      # 4. reload
      sudo suricatasc -c reload-rules

      # ── el34-attacker 에서: 5. 트리거 — /admin + /ADMIN (nocase 검증) ──
      # 💡 이 트리거 트래픽은 브라우저(자연 URL)나 Burp Repeater 로도 발생시킬 수 있다 — 탐지(eve.json)가 목적이라 응답은 -o /dev/null 로 버린다.
      echo -en 'GET /admin HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET /ADMIN HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-ips 에서: 6. alert 검증 (트리거 4초 후) ──
      sudo grep "9005041" /var/log/suricata/eve.json | jq -s length
      sudo grep "9005041" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature, severity:.alert.severity, url:.http.url}'
      ```

      ## 📋 확인 사항

      - syntax 검증: `Notice: ...successfully loaded. Exiting.`
      - reload: `{"message":"done","return":"OK"}`
      - 명령 6 카운트: **4** (2 요청 × 2 NIC sniff)
      - alert 출력: `{sig:"el34 admin path access", severity:2, url:"/admin" 또는 "/ADMIN"}`

      ## 💡 왜 이걸 하는가?

      4 modifier 결합 — `http.uri` (영역) + `content` (패턴) + `depth:6` (URI 첫 6 byte) +
      `nocase` (대소문자) + `fast_pattern` (성능). production 룰의 표준 형식.

      ## 🔍 결과 해석 + 트러블슈팅

      - **정상**: 4 alert (2 요청 × 2 NIC) + sig 일치 + severity 2 (priority 2 매핑)
      - **비정상 1**: alert 1-2 (양 NIC 중 하나만 capture) → af-packet 점검
      - **비정상 2**: alert 0 → http.uri sticky buffer 5.x 후위 문법 사용했는지 점검 (6v6
        은 6.0.4 → 전위 문법)
      - **비정상 3**: ADMIN 만 매치 안 됨 → nocase 누락
    hint: 'el34-ips 접속 후 — local.rules 에 http.uri + content:"/admin" + depth:6 + nocase + fast_pattern 룰(sid 9005041) append → suricatasc -c reload-rules'
