  - order: 2
    instruction: |
      ## 🎯 MISSION — pcre + content prefilter (한국 주민번호 패턴)

      lecture §2.4 의 pattern — `content:"|2d|"` (= '-' byte) prefilter + `pcre:"/\d{6}-[1-4]\d{6}/"`
      정밀 매칭. POST body 의 RRN 패턴 탐지.

      ## 💻 실행 명령

      **실습 컨테이너:** 룰 작성·검증은 `el34-ips`, 트리거는 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 룰 작성 + reload ──
      # 1. 룰 작성 — content prefilter + pcre
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"el34 RRN in POST body\"; flow:to_server,established; http.request_body; content:\"|2d|\"; nocase; pcre:\"/\\\\d{6}-[1-4]\\\\d{6}/\"; classtype:policy-violation; priority:2; sid:9005002; rev:1;)
      EOF"
      # 2. 검증 + reload
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3
      sudo suricatasc -c reload-rules

      # ── el34-attacker 에서: 3. 트리거 (POST body 에 가짜 RRN) ──
      # 💡 이 트리거 트래픽은 브라우저(자연 URL)나 Burp Repeater 로도 발생시킬 수 있다 — 탐지(eve.json)가 목적이라 응답은 -o /dev/null 로 버린다.
      printf 'POST / HTTP/1.0\r\nHost: juice.el34.lab\r\nContent-Type: application/x-www-form-urlencoded\r\nContent-Length: 42\r\nConnection: close\r\n\r\nname=hong&rrn=901231-1234567&email=h@a.com' | nc -w3 192.168.0.161 80 >/dev/null

      # ── el34-ips 에서: 4. alert 검증 (트리거 4초 후) ──
      sudo grep "9005002" /var/log/suricata/eve.json | jq -s length
      sudo grep "9005002" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature, classtype:.alert.category, method:.http.http_method, url:.http.url}'
      ```

      ## 📋 확인 사항

      - syntax pass
      - reload OK
      - alert 1+ (POST body 의 RRN 매치)
      - alert.category: "Potential Corporate Privacy Violation"

      ## 💡 왜 이걸 하는가?

      개인정보 (RRN / 신용카드 / 이메일) 의 평문 전송 검출. ISMS-P 의 PII 관리 + GDPR
      / 개인정보보호법 의 표준 통제.

      ## 🔍 결과 해석

      - **정상**: alert 1+ + classtype "policy-violation"
      - **비정상 1**: alert 없음 → http.request_body 디코더 비활성 또는 `SecRequestBodyAccess`
        문제 → W05 의 ModSec 과 별도 (Suricata 는 자체적으로 body access)
      - **비정상 2**: pcre escape 오류 (`\d` 가 `d` 로 해석) → suricata.log 의 syntax error

      ## 운영 응용

      - `http.response_body` 로 변경하면 응답 본문 (예: 누출 데이터 모니터)
      - `http.cookie` 로 변경하면 cookie 안의 PII
      - 신용카드 → `pcre:"/\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}/"`
      - 이메일 → `pcre:"/[\w._%+-]+@[\w.-]+\.[A-Za-z]{2,}/"`
