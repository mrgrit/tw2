  - order: 3
    instruction: |
      ## 🎯 MISSION — flowbits 다단계 추적 (UA test → /admin 접근)

      lecture §4 의 다단계 패턴. 같은 conn 에서 step1 (특정 UA) → step2 (/admin) 흐름을
      flowbits 로 추적. step1 은 `flowbits:noalert` (state 만), step2 는 isset 으로 alert.

      ## 💻 실행 명령

      **실습 컨테이너:** 룰 작성·검증은 `el34-ips`, 트리거는 `el34-attacker`.
      각 장비에 `ssh ccc@<장비IP>`(fw 10.20.30.1 / ips 31.2 / web 32.80 / siem 32.100)로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 2 룰 작성 + reload ──
      # 1. 2 룰 작성
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"step1 FlowbitTest UA\"; http.user_agent; content:\"FlowbitTest\"; flowbits:set,fb_test_step1; flowbits:noalert; sid:9005010; rev:1;)
      alert http any any -> any any (msg:\"step2 admin after step1\"; http.uri; content:\"/admin\"; flowbits:isset,fb_test_step1; classtype:successful-recon; priority:1; sid:9005011; rev:1;)
      EOF"
      # 2. 검증 + reload
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3
      sudo suricatasc -c reload-rules

      # ── el34-attacker 에서: step1(UA, state set, alert 없음) → step2(같은 conn 의 /admin, alert 발생) ──
      # 💡 이 트리거 트래픽은 브라우저(자연 URL)나 Burp Repeater 로도 발생시킬 수 있다 — 탐지(eve.json)가 목적이라 응답은 -o /dev/null 로 버린다.
      echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nUser-Agent: FlowbitTest/1.0\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nUser-Agent: FlowbitTest/1.0\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/nulladmin

      # ── el34-ips 에서: alert 검증 (트리거 4초 후) ──
      echo "step1 alert (noalert 이므로 0):"
      sudo grep "9005010" /var/log/suricata/eve.json | grep -c '"event_type":"alert"'
      echo "step2 alert (양 NIC sniff 라 2):"
      sudo grep "9005011" /var/log/suricata/eve.json | grep -c '"event_type":"alert"'
      sudo grep "9005011" /var/log/suricata/eve.json | tail -1 | jq '{sig:.alert.signature, sev:.alert.severity, url:.http.url}'
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      - syntax pass + reload OK
      - step1 alert event 0 (noalert 효과)
      - step2 alert event 2 (양 NIC sniff)
      - step2 alert 의 sig "step2 admin after step1" + severity 1 (priority 1 매핑)

      ## 💡 왜 이걸 하는가?

      단순 content 매칭은 1 packet 의 패턴만 검사. 다단계 침해 (정찰 → 인증 시도 → 권한
      상승 → 데이터 유출) 는 한 conn 의 흐름 분석 필요. flowbits 가 in-line 상태 추적의
      표준 도구.

      ## 🔍 결과 해석 + 운영 제약

      - **정상**: step1 alert 0 + step2 alert 2 (양 NIC)
      - **위험 1 (flow 경계)**: client 가 step1 후 새 TCP conn 으로 step2 → flow_id 다름
        → flowbits 매치 실패. 단일 TCP 연결(keep-alive) 유지 확인.
      - **위험 2 (flow timeout)**: step1 과 step2 사이 60초+ 경과 시 flow context 만료
      - **위험 3 (flow memcap)**: 대규모 traffic 환경에서 일부 flow context drop → SIEM 통합 권장

      ## 운영 응용

      - 401 → /admin 의 인증 우회 (KISA 사고 패턴)
      - SQL injection probing → 성공 패턴 → DB dump
      - APT — recon → execution → lateral movement
