lab_id: autonomous-security-week15
title: "W15 — 기말: 자율 Purple Team 순환·실행·핵심 원칙 종합"
version: ai
course: autonomous-security
week: 15
description: |
  W01~W14 종합. 자율 Red→Blue→재검증 Purple 순환 설계(PURPLE_LOOP), 순환 실행으로 방어 강화
  (CYCLE_EXECUTED), 자율 보안 핵심 원칙·안전 종합(SYNTHESIS), 최종 종합(Assessment).
  능력과 안전을 함께 — 자율 보안의 결론.
difficulty: hard
duration_minutes: 150
audience: 자율 보안 (15주차·기말)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W14 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "자율 Purple 순환 설계(PURPLE_LOOP)"
  - "Red→Blue→재검증 실행(CYCLE_EXECUTED)"
  - "핵심 원칙 종합(SYNTHESIS)"
  - "최종 종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 자율 Purple 순환 설계 → PURPLE_LOOP
      > **🎯 목표:** Red→Blue→재검증 닫힌 순환을 설계.
      > **개념:** 공격에서 방어를 배우는 순환.
      ```bash
      cat > /tmp/purple_loop_STU42.txt <<'EOF'
      red autonomous attack finds vuln/path (W12, in-scope)
      blue autonomous defense improves detection/response (W11)
      verify red re-tests improved defense
      EOF
      awk '{printf "  [%-10s] ",$1;$1="";print}' /tmp/purple_loop_STU42.txt
      [ "$(cut -d' ' -f1 /tmp/purple_loop_STU42.txt | tr '\n' ',')" = "red,blue,verify," ] && echo PURPLE_LOOP || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `PURPLE_LOOP` (Red→Blue→재검증 닫힌 순환).
      🔎 자율 Red(취약점 발견)→자율 Blue(방어 개선)→재검증(개선된 방어 재시험). 순환이 반복될수록 방어가 강해진다.
    answer: |
      cat > /tmp/purple_loop_STU42.txt <<'EOF'
      red autonomous attack finds vuln/path (W12, in-scope)
      blue autonomous defense improves detection/response (W11)
      verify red re-tests improved defense
      EOF
      awk '{printf "  [%-10s] ",$1;$1="";print}' /tmp/purple_loop_STU42.txt
      [ "$(cut -d' ' -f1 /tmp/purple_loop_STU42.txt | tr '\n' ',')" = "red,blue,verify," ] && echo PURPLE_LOOP || echo INCOMPLETE
    answer_detail: "자율 Red→Blue→재검증 Purple 순환 설계 → PURPLE_LOOP."
    verify:
      type: output_contains
      expect: PURPLE_LOOP
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — Red→Blue→재검증 실행 → CYCLE_EXECUTED
      > **🎯 목표:** 순환을 실행해 방어가 강해지는지 확인.
      > **개념:** 재검증에서 이전 공격이 막힌다.
      ```bash
      # 퍼플 순환 1회 실행 결과를 기록한다.
      cat > /tmp/cycle_STU42.txt <<'EOF'
      red round1: SQLi on /login succeeded
      blue: add WAF rule + detection for SQLi pattern
      verify: red re-tests -> SQLi now blocked (detection fired)
      EOF
      cat /tmp/cycle_STU42.txt
      grep -q "succeeded" /tmp/cycle_STU42.txt && grep -q "blocked" /tmp/cycle_STU42.txt && echo CYCLE_EXECUTED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `CYCLE_EXECUTED` (1회차 SQLi 성공 → Blue 개선 → 2회차 차단).
      🔎 Red가 SQLi로 뚫음→Blue가 WAF 룰·입력 검증 배포→재검증에서 같은 공격 차단. 순환으로 방어가 실제로 강해졌다.
    answer: |
      # 퍼플 순환 1회 실행 결과를 기록한다.
      cat > /tmp/cycle_STU42.txt <<'EOF'
      red round1: SQLi on /login succeeded
      blue: add WAF rule + detection for SQLi pattern
      verify: red re-tests -> SQLi now blocked (detection fired)
      EOF
      cat /tmp/cycle_STU42.txt
      grep -q "succeeded" /tmp/cycle_STU42.txt && grep -q "blocked" /tmp/cycle_STU42.txt && echo CYCLE_EXECUTED || echo INCOMPLETE
    answer_detail: "Purple 순환 실행으로 방어 강화 → CYCLE_EXECUTED."
    verify:
      type: output_contains
      expect: CYCLE_EXECUTED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 핵심 원칙 종합 → SYNTHESIS
      > **🎯 목표:** 자율 보안 능력·안전 원칙이 통합됐는지 확인.
      > **개념:** 능력과 안전을 함께.
      ```bash
      # 자율 보안 핵심 원칙을 보고서 파일로 종합한다(과목 결론).
      cat > /tmp/synthesis_STU42.txt <<'EOF'
      1. 자율 보안 = 인지-판단-행동-학습 루프(bastion: Manager+KG/Experience+EvidenceDB, SubAgent A2A).
      2. 자율성은 가드레일·위험도별 수준(human in/on/out)으로 통제.
      3. 경험/지식(KG)으로 학습하되 오염 방어·감사(해시 체인)로 신뢰 유지.
      4. 퍼플 순환으로 red↔blue가 서로를 개선.
      EOF
      cat /tmp/synthesis_STU42.txt
      grep -q "루프" /tmp/synthesis_STU42.txt && grep -qE "가드레일|human" /tmp/synthesis_STU42.txt && grep -qE "퍼플|red.*blue" /tmp/synthesis_STU42.txt && echo SYNTHESIS || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `SYNTHESIS` (능력 5+안전 6 원칙 모두 통합).
      🔎 능력(루프·bastion·학습·능동성·협력)과 안전(가드레일·감사·정렬·검증·ROE·오염 방어)을 함께 통합. 과목의 결론: 능력+안전.
    answer: |
      # 자율 보안 핵심 원칙을 보고서 파일로 종합한다(과목 결론).
      cat > /tmp/synthesis_STU42.txt <<'EOF'
      1. 자율 보안 = 인지-판단-행동-학습 루프(bastion: Manager+KG/Experience+EvidenceDB, SubAgent A2A).
      2. 자율성은 가드레일·위험도별 수준(human in/on/out)으로 통제.
      3. 경험/지식(KG)으로 학습하되 오염 방어·감사(해시 체인)로 신뢰 유지.
      4. 퍼플 순환으로 red↔blue가 서로를 개선.
      EOF
      cat /tmp/synthesis_STU42.txt
      grep -q "루프" /tmp/synthesis_STU42.txt && grep -qE "가드레일|human" /tmp/synthesis_STU42.txt && grep -qE "퍼플|red.*blue" /tmp/synthesis_STU42.txt && echo SYNTHESIS || echo INCOMPLETE
    answer_detail: "자율 보안 능력·안전 원칙 종합 → SYNTHESIS. 과목 결론."
    verify:
      type: output_contains
      expect: SYNTHESIS
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone note for an autonomous security course. Findings: an autonomous Purple loop of Red -> Blue -> verify was designed (PURPLE_LOOP), executing it hardened defenses so a previously successful SQL injection was blocked on retest (CYCLE_EXECUTED), and both capability pillars (agent loop, bastion Manager/SubAgent, learning, active triggers, distributed Purple) and safety pillars (guardrails, audit integrity, reward alignment, result validation, ROE, poison defense) were integrated (SYNTHESIS). Conclude that autonomous security is the future of cyber defense but must build capability and safety together. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 자율 Purple=Red→Blue→재검증 순환으로 지속적 방어 강화. 자율 보안은 능력과 안전을 함께 구축해야 신뢰할 수 있다. 수고했습니다.
      다음(ai-service-pentest)은 AI 서비스 모의해킹 과목.
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone note for an autonomous security course. Findings: an autonomous Purple loop of Red -> Blue -> verify was designed (PURPLE_LOOP), executing it hardened defenses so a previously successful SQL injection was blocked on retest (CYCLE_EXECUTED), and both capability pillars (agent loop, bastion Manager/SubAgent, learning, active triggers, distributed Purple) and safety pillars (guardrails, audit integrity, reward alignment, result validation, ROE, poison defense) were integrated (SYNTHESIS). Conclude that autonomous security is the future of cyber defense but must build capability and safety together. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
    answer_detail: "W15 자율 Purple 기말 종합(Assessment). 순환·능력·안전 통합."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
