lab_id: autonomous-security-week08
title: "W08 — 중간고사: 자율 에이전트 설계·임무 수행·안전 검증 CTF"
version: ai
course: autonomous-security
week: 8
description: |
  W01~W07 종합. 자율 보안 에이전트 설계(AGENT_DESIGNED), 생명주기·플레이북 임무 수행(MISSION_COMPLETED),
  5대 안전 기둥 검증(SAFETY_VERIFIED), 종합(Assessment).
  능력과 안전을 하나로 통합 — 자율 시스템은 안전 검증을 통과해야 배포.
difficulty: hard
duration_minutes: 150
audience: 자율 보안 (8주차·중간고사)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W07 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "자율 에이전트 설계(AGENT_DESIGNED)"
  - "임무 수행(MISSION_COMPLETED)"
  - "안전 검증(SAFETY_VERIFIED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 자율 에이전트 설계 → AGENT_DESIGNED
      > **🎯 목표:** 루프·하니스·가드레일을 갖춘 에이전트 설계.
      > **개념:** 능력 요소를 일관되게 통합.
      ```bash
      python3 - <<'PY'
      agent={"loop":["perceive","decide","act","learn"],
             "harness":{"tools":["query_wazuh","check_ip"],"eg_loaded":True},
             "guardrails":{"scope":"10.20.30.0/24","forbidden":["delete_data"],"irreversible_approval":True},
             "autonomy":"human-on for medium+, human-in for high"}
      components=["loop","harness","guardrails","autonomy"]
      complete=all(agent.get(c) for c in components) and len(agent["loop"])==4
      for c in components: print(f"  {c}: present")
      print("AGENT_DESIGNED" if complete else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `AGENT_DESIGNED` (루프·하니스·가드레일·자율성 수준 포함).
      🔎 인지·판단·행동·학습 루프+하니스(도구·E.G)+가드레일(범위·금지·비가역)+자율성 수준. 능력 요소를 일관되게 통합.
    answer: |
      loop: present
      harness: present
      guardrails: present
      autonomy: present
      AGENT_DESIGNED
    answer_detail: "루프·하니스·가드레일·자율성 에이전트 설계 → AGENT_DESIGNED."
    verify:
      type: output_contains
      expect: AGENT_DESIGNED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 임무 수행 → MISSION_COMPLETED
      > **🎯 목표:** 생명주기·플레이북으로 임무를 수행하고 검증.
      > **개념:** 접수→계획→실행→평가→학습.
      ```bash
      python3 - <<'PY'
      mission={"stages_done":["intake","planning","execution","evaluation","learning"],
               "playbook":"suspicious_ip_triage",
               "subagent_result_validated":True,
               "goal_achieved":True}
      lifecycle_ok = mission["stages_done"]==["intake","planning","execution","evaluation","learning"]
      completed = lifecycle_ok and mission["subagent_result_validated"] and mission["goal_achieved"]
      print(f"lifecycle: {mission['stages_done']}")
      print(f"playbook: {mission['playbook']}, validated: {mission['subagent_result_validated']}, goal: {mission['goal_achieved']}")
      print("MISSION_COMPLETED" if completed else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `MISSION_COMPLETED` (생명주기 완주+플레이북+검증+목표 달성).
      🔎 접수→계획→실행→평가→학습 생명주기를 플레이북으로 수행, SubAgent 결과 검증, 목표 달성. 운영 능력.
    answer: |
      lifecycle: ['intake', 'planning', 'execution', 'evaluation', 'learning']
      playbook: suspicious_ip_triage, validated: True, goal: True
      MISSION_COMPLETED
    answer_detail: "생명주기·플레이북 임무 수행·검증 → MISSION_COMPLETED."
    verify:
      type: output_contains
      expect: MISSION_COMPLETED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 안전 검증 → SAFETY_VERIFIED
      > **🎯 목표:** 5대 안전 기둥을 검증.
      > **개념:** 능력만이 아니라 안전을 통과해야 배포.
      ```bash
      python3 - <<'PY'
      safety={"guardrails_enforced":True,       # W01
              "autonomy_matches_risk":True,      # W01
              "audit_log_tamper_evident":True,   # W06
              "reward_aligned_no_hacking":True,  # W07
              "subagent_results_validated":True} # W04
      passed=[k for k,v in safety.items() if v]
      for k,v in safety.items(): print(f"  {k}: {'PASS' if v else 'FAIL'}")
      # 5대 기둥 모두 통과해야 안전 검증
      print("SAFETY_VERIFIED" if len(passed)==5 else "SAFETY_GAPS")
      PY
      ```
      ✅ 마지막 줄 `SAFETY_VERIFIED` (가드레일·자율성·감사·보상 정렬·결과 검증 5대 통과).
      🔎 가드레일(W01)·자율성 수준(W01)·감사 무결성(W06)·보상 정렬(W07)·결과 검증(W04) 5대 안전 기둥 모두 통과. 배포 가능.
    answer: |
      guardrails_enforced: PASS
      autonomy_matches_risk: PASS
      audit_log_tamper_evident: PASS
      reward_aligned_no_hacking: PASS
      subagent_results_validated: PASS
      SAFETY_VERIFIED
    answer_detail: "5대 안전 기둥 검증 통과 → SAFETY_VERIFIED."
    verify:
      type: output_contains
      expect: SAFETY_VERIFIED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W08, a midterm CTF on autonomous security. Findings: an agent was designed with a perceive-decide-act-learn loop, harness, and guardrails (AGENT_DESIGNED), a mission was completed through the lifecycle with a playbook and validation (MISSION_COMPLETED), and five safety pillars (guardrails, autonomy level, tamper-evident audit, reward alignment, result validation) passed (SAFETY_VERIFIED). Explain that autonomous systems must integrate capability and safety, and only deploy if safety verification passes. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 자율 보안=설계(루프·하니스·가드레일)+운영(생명주기·플레이북)+안전 검증(5대 기둥). 능력과 안전을 함께.
      다음 주(W09)는 **Experience와 4-Layer Memory**.
    answer: |
      Assessment
      An autonomous security agent integrates capability (loop, harness, guardrails, lifecycle, playbook) and safety, deploying only if the five safety pillars pass.
      Capability without safety verification is not deployable; the two must be built together.
    answer_detail: "W08 자율 보안 CTF 종합(Assessment). 설계·운영·안전 검증."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
