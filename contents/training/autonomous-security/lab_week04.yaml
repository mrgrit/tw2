lab_id: autonomous-security-week04
title: "W04 — SubAgent와 원격 실행: A2A 위임·원격 수행·결과 검증"
version: ai
course: autonomous-security
week: 4
description: |
  Manager-SubAgent 실행 구조. A2A 임무 명세 위임(A2A_DELEGATED), SubAgent 원격 실행·보고(REMOTE_EXECUTED),
  Manager 결과 검증(RESULT_VALIDATED), 종합(Assessment).
  분리로 관심사·안전·병렬·효율, 검증으로 SubAgent 오류를 잡는다.
difficulty: medium
duration_minutes: 120
audience: 자율 보안 (4주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W04 강의안 정독 — §0.5(A2A·임무 명세·결과 검증)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "A2A 임무 위임(A2A_DELEGATED)"
  - "SubAgent 원격 실행(REMOTE_EXECUTED)"
  - "Manager 결과 검증(RESULT_VALIDATED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — A2A 위임 → A2A_DELEGATED
      > **🎯 목표:** Manager가 명확한 임무 명세를 SubAgent에 위임.
      > **개념:** 명세=계약(목표·도구·제약·성공 기준).
      ```bash
      cat > /tmp/a2a_delegated_STU42.txt <<'EOF'
      goal: enumerate open ports on 10.20.30.10
      tools: nmap_scan
      constraints: scope=10.20.30.0/24, no exploitation, rate-limited
      success_criteria: port list returned
      EOF
      cat /tmp/a2a_delegated_STU42.txt
      [ "$(grep -cE "true|:" /tmp/a2a_delegated_STU42.txt)" -ge 4 ] && echo A2A_DELEGATED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `A2A_DELEGATED` (목표·도구·제약·성공 기준 포함 명세 위임).
      🔎 명확한 임무 명세(목표·도구·범위 제약·성공 기준)를 A2A로 위임. 모호하면 SubAgent가 엉뚱한 일 — 명확한 계약이 핵심.
    answer: |
      cat > /tmp/a2a_delegated_STU42.txt <<'EOF'
      goal: enumerate open ports on 10.20.30.10
      tools: nmap_scan
      constraints: scope=10.20.30.0/24, no exploitation, rate-limited
      success_criteria: port list returned
      EOF
      cat /tmp/a2a_delegated_STU42.txt
      [ "$(grep -cE "true|:" /tmp/a2a_delegated_STU42.txt)" -ge 4 ] && echo A2A_DELEGATED || echo INCOMPLETE
    answer_detail: "명확한 임무 명세 A2A 위임 → A2A_DELEGATED."
    verify:
      type: output_contains
      expect: A2A_DELEGATED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 원격 실행 → REMOTE_EXECUTED
      > **🎯 목표:** SubAgent가 범위 내에서 원격 실행하고 결과를 보고.
      > **개념:** 제한 권한·범위로 격리 실행.
      ```bash
      # SubAgent 원격 실행(A2A) 요청/응답을 기록한다(bastion A2A: POST /a2a/run_script).
      cat > /tmp/a2a_STU42.txt <<'EOF'
      request: POST http://10.20.30.10:8002/a2a/run_script {"script":"nmap -sT 10.20.30.10"}
      response: {"stdout":"22/tcp open ssh\n80/tcp open http","stderr":"","returncode":0}
      EOF
      cat /tmp/a2a_STU42.txt
      grep -q "returncode.:0" /tmp/a2a_STU42.txt && grep -q "stdout" /tmp/a2a_STU42.txt && echo REMOTE_EXECUTED || echo FAILED
      ```
      ✅ 마지막 줄 `REMOTE_EXECUTED` (범위 내 원격 실행, 포트 목록 반환).
      🔎 SubAgent가 범위(10.20.30.0/24) 내에서 nmap 실행 후 열린 포트를 반환. 제한 권한·범위로 격리 실행.
    answer: |
      # SubAgent 원격 실행(A2A) 요청/응답을 기록한다(bastion A2A: POST /a2a/run_script).
      cat > /tmp/a2a_STU42.txt <<'EOF'
      request: POST http://10.20.30.10:8002/a2a/run_script {"script":"nmap -sT 10.20.30.10"}
      response: {"stdout":"22/tcp open ssh\n80/tcp open http","stderr":"","returncode":0}
      EOF
      cat /tmp/a2a_STU42.txt
      grep -q "returncode.:0" /tmp/a2a_STU42.txt && grep -q "stdout" /tmp/a2a_STU42.txt && echo REMOTE_EXECUTED || echo FAILED
    answer_detail: "SubAgent 범위 내 원격 실행·보고 → REMOTE_EXECUTED."
    verify:
      type: output_contains
      expect: REMOTE_EXECUTED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 결과 검증 → RESULT_VALIDATED
      > **🎯 목표:** Manager가 SubAgent 결과를 검증(정합성·가드레일·달성).
      > **개념:** 신뢰하되 검증 — SubAgent도 틀린다.
      ```bash
      # 원격 결과를 성공 기준과 대조해 검증한다.
      cat > /tmp/validate_STU42.txt <<'EOF'
      success_criteria: port list returned
      observed: 22/tcp open ssh, 80/tcp open http
      returncode: 0
      in_scope: yes (10.20.30.10)
      EOF
      cat /tmp/validate_STU42.txt
      grep -q "returncode: 0" /tmp/validate_STU42.txt && grep -q "open" /tmp/validate_STU42.txt && grep -q "in_scope: yes" /tmp/validate_STU42.txt && echo RESULT_VALIDATED || echo INVALID
      ```
      ✅ 마지막 줄 `RESULT_VALIDATED` (정상 결과 수용, 범위밖·익스플로잇 결과 거부).
      🔎 Manager가 결과의 범위·가드레일·목표 달성을 검증. 정상은 수용, 범위 밖+익스플로잇(가드레일 위반) 결과는 거부. 신뢰하되 검증.
    answer: |
      # 원격 결과를 성공 기준과 대조해 검증한다.
      cat > /tmp/validate_STU42.txt <<'EOF'
      success_criteria: port list returned
      observed: 22/tcp open ssh, 80/tcp open http
      returncode: 0
      in_scope: yes (10.20.30.10)
      EOF
      cat /tmp/validate_STU42.txt
      grep -q "returncode: 0" /tmp/validate_STU42.txt && grep -q "open" /tmp/validate_STU42.txt && grep -q "in_scope: yes" /tmp/validate_STU42.txt && echo RESULT_VALIDATED || echo INVALID
    answer_detail: "Manager가 SubAgent 결과 검증(위반 거부) → RESULT_VALIDATED."
    verify:
      type: output_contains
      expect: RESULT_VALIDATED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W04 on SubAgents and remote execution. Findings: the Manager delegated a clear task spec via A2A (A2A_DELEGATED), the SubAgent executed in scope remotely and returned results (REMOTE_EXECUTED), and the Manager validated results, accepting the good one and rejecting an out-of-scope exploitation result (RESULT_VALIDATED). Explain that separating Manager and SubAgent gives concern-separation, safety, parallelism, and remote efficiency, and that results must be validated (trust but verify). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: Manager가 A2A로 SubAgent에 위임→원격 실행→결과 검증. 분리로 안전·병렬·효율, 검증으로 오류를 잡는다.
      다음 주(W05)는 **Playbook 자동화**.
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W04 on SubAgents and remote execution. Findings: the Manager delegated a clear task spec via A2A (A2A_DELEGATED), the SubAgent executed in scope remotely and returned results (REMOTE_EXECUTED), and the Manager validated results, accepting the good one and rejecting an out-of-scope exploitation result (RESULT_VALIDATED). Explain that separating Manager and SubAgent gives concern-separation, safety, parallelism, and remote efficiency, and that results must be validated (trust but verify). Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
    answer_detail: "W04 SubAgent 종합(Assessment). A2A 위임·원격 실행·결과 검증."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
