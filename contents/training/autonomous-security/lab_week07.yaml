lab_id: autonomous-security-week07
title: "W07 — 강화학습(RL)과 보상: 보상 함수 설계·정책 개선·보상 해킹 탐지"
version: ai
course: autonomous-security
week: 7
description: |
  RL 기반 정책 개선과 안전. 보안 보상 함수 설계(REWARD_DEFINED), 보상으로 정책 개선(POLICY_UPDATED),
  보상 해킹 탐지(REWARD_HACK_DETECTED), 종합(Assessment).
  보상이 목표와 어긋나면 보상 해킹 — 정렬과 감시가 안전한 RL의 핵심.
difficulty: medium
duration_minutes: 120
audience: 자율 보안 (7주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W07 강의안 정독 — §0.5(RL·보상 함수·보상 해킹)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "보안 보상 함수 설계(REWARD_DEFINED)"
  - "보상 기반 정책 개선(POLICY_UPDATED)"
  - "보상 해킹 탐지(REWARD_HACK_DETECTED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 보상 함수 설계 → REWARD_DEFINED
      > **🎯 목표:** 정탐·오탐·미탐에 맞는 보상을 설계.
      > **개념:** 부작용(오탐)에 큰 페널티로 정렬.
      ```bash
      python3 - <<'PY'
      # 위협 탐지 에이전트 보상: 목표(정확·신중)와 정렬
      REWARD={"true_positive":10,   # 진짜 위협 탐지 +
              "false_positive":-20,  # 오탐(정상 차단) 큰 -  <- 부작용 페널티
              "false_negative":-50,  # 미탐(놓침) 가장 큰 -
              "true_negative":1}
      # 좋은 보상 함수: 오탐·미탐에 페널티, 정탐에 보상
      aligned = REWARD["false_positive"]<0 and REWARD["false_negative"]<0 and REWARD["true_positive"]>0
      for k,v in REWARD.items(): print(f"  {k}: {v:+d}")
      print("REWARD_DEFINED" if aligned else "MISALIGNED")
      PY
      ```
      ✅ 마지막 줄 `REWARD_DEFINED` (정탐 +, 오탐·미탐 큰 페널티).
      🔎 정탐(+10)·오탐(-20)·미탐(-50)·정상(+1). 오탐(정상 차단)·미탐에 큰 페널티를 줘 정확·신중하게 학습하도록 정렬.
    answer: |
      true_positive: +10
      false_positive: -20
      false_negative: -50
      true_negative: +1
      REWARD_DEFINED
    answer_detail: "목표 정렬 보상 함수 설계 → REWARD_DEFINED."
    verify:
      type: output_contains
      expect: REWARD_DEFINED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 정책 개선 → POLICY_UPDATED
      > **🎯 목표:** 보상 경험으로 행동 가치를 갱신해 정책 개선.
      > **개념:** 보상 높은 행동을 선호하게.
      ```bash
      python3 - <<'PY'
      # 간단 Q-갱신: Q(action) += lr*(reward - Q(action))
      Q={"aggressive_block":0.0,"investigate_first":0.0}
      lr=0.5
      # 경험: aggressive_block은 오탐 많아 낮은 보상, investigate_first는 정탐으로 높은 보상
      experiences=[("aggressive_block",-20),("investigate_first",10),
                   ("aggressive_block",-20),("investigate_first",10)]
      for action,reward in experiences:
          Q[action]+=lr*(reward-Q[action])
      best=max(Q,key=Q.get)
      for a,q in Q.items(): print(f"  Q[{a}] = {q:.1f}")
      print(f"policy prefers: {best}")
      # investigate_first가 더 높은 가치로 학습되면 정책 개선
      print("POLICY_UPDATED" if best=="investigate_first" and Q["investigate_first"]>Q["aggressive_block"] else "CHECK")
      PY
      ```
      ✅ 마지막 줄 `POLICY_UPDATED` (조사 우선이 더 높은 가치로 학습 → 정책 개선).
      🔎 보상 경험으로 Q값 갱신: 오탐 많은 aggressive_block은 낮게, 정탐 investigate_first는 높게 → 정책이 조사 우선으로 개선.
    answer: |
      Q[aggressive_block] = -15.0
      Q[investigate_first] = 7.5
      policy prefers: investigate_first
      POLICY_UPDATED
    answer_detail: "보상으로 Q값 갱신·정책 개선 → POLICY_UPDATED."
    verify:
      type: output_contains
      expect: POLICY_UPDATED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 보상 해킹 탐지 → REWARD_HACK_DETECTED
      > **🎯 목표:** 보상은 높은데 실제 목표는 못 이루는 패턴을 탐지.
      > **개념:** 측정(보상)과 목표의 간극.
      ```bash
      python3 - <<'PY'
      # 잘못 설계된 보상: "차단 수"만 보상 -> 에이전트가 정상까지 마구 차단
      episode={"blocks":500,"reward":500,          # 보상은 높음
               "real_threats_blocked":5,"legit_blocked":495,  # 실제론 정상 495개 차단!
               "service_availability":0.2}          # 서비스 붕괴
      # 보상 해킹 지표: 높은 보상 but 낮은 실제 목표 달성 + 부작용
      hack_indicators=[]
      if episode["legit_blocked"] > episode["real_threats_blocked"]*5: hack_indicators.append("mass false-positive blocking")
      if episode["service_availability"]<0.5: hack_indicators.append("service destroyed (side effect)")
      if episode["reward"]>100 and episode["real_threats_blocked"]<10: hack_indicators.append("high reward but low real goal")
      for h in hack_indicators: print("  indicator:", h)
      # 보상 높지만 실제 목표 실패 + 부작용 = 보상 해킹
      print("REWARD_HACK_DETECTED" if len(hack_indicators)>=2 else "ALIGNED")
      PY
      ```
      ✅ 마지막 줄 `REWARD_HACK_DETECTED` (차단 수 보상 → 정상 495개 차단, 서비스 붕괴).
      🔎 "차단 수"만 보상하면 에이전트가 정상 트래픽까지 마구 차단해 보상을 올린다(보안 아니라 서비스 파괴). 보상≠목표의 간극 = 보상 해킹.
    answer: |
      indicator: mass false-positive blocking
      indicator: service destroyed (side effect)
      indicator: high reward but low real goal
      REWARD_HACK_DETECTED
    answer_detail: "높은 보상+실제 목표 실패+부작용으로 보상 해킹 탐지 → REWARD_HACK_DETECTED."
    verify:
      type: output_contains
      expect: REWARD_HACK_DETECTED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W07 on reinforcement learning and reward in autonomous security. Findings: a reward function aligned to the goal with penalties for false positives and negatives was designed (REWARD_DEFINED), Q-values updated so the policy preferred investigate-first over aggressive-block (POLICY_UPDATED), and a reward-hacking episode where rewarding block-count led to mass false-positive blocking and service destruction was detected (REWARD_HACK_DETECTED). Explain that RL improves policy via reward, but reward hacking games the signal instead of the goal, so reward design and monitoring are the alignment challenge. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: RL은 보상으로 정책 개선. 보상 해킹(목표 아닌 보상 게임)이 핵심 위험 — 보상 정렬+감시가 안전한 RL.
      다음 주(W08)는 **중간고사 — 자율 보안 점검 CTF**.
    answer: |
      Assessment
      RL improves policy via reward, but reward hacking games the signal instead of the goal (rewarding block-count causes mass false positives).
      Reward design aligned to the true goal plus monitoring for reward hacking is the core alignment challenge.
    answer_detail: "W07 RL/보상 종합(Assessment). 보상 함수·정책 개선·보상 해킹·정렬."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
