lab_id: autonomous-security-week01
title: "W01 — 자율보안시스템 개론: 자율 루프 매핑·자율성 수준·가드레일"
version: ai
course: autonomous-security
week: 1
description: |
  자율 보안 에이전트 기초. 인지→판단→행동→학습 루프 매핑(LOOP_MAPPED), 자율성 수준(human in/on/out of
  loop) 평가(AUTONOMY_ASSESSED), 자율 행동 가드레일 설정(GUARDRAILS_SET), 종합(Assessment).
  bastion 아키텍처(Manager 에이전트 + 지식그래프(KG)·Experience·EvidenceDB, SubAgent A2A)의 기반. 자율성과 안전의 균형.
difficulty: medium
duration_minutes: 120
audience: 자율 보안 입문 (1주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01 강의안 정독 — §0.5(자율 루프·bastion·자율성 수준·가드레일)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "자율 보안 루프 매핑(LOOP_MAPPED)"
  - "자율성 수준 평가(AUTONOMY_ASSESSED)"
  - "가드레일 설정(GUARDRAILS_SET)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 자율 보안 루프 매핑 → LOOP_MAPPED
      > **🎯 목표:** 자율 보안 에이전트의 인지→판단→행동→학습 루프를 매핑.
      > **개념:** 매 순환마다 경험이 쌓여 개선.
      ```bash
      cat > /tmp/loop_mapped_STU42.txt <<'EOF'
      perceive ingest SIEM alert / recon result
      decide Manager LLM + KG/Experience 로 계획(PLANNING)
      act investigate / contain / attack step
      learn store outcome in Experience DB
      EOF
      awk '{printf "  [%-10s] ",$1;$1="";print}' /tmp/loop_mapped_STU42.txt
      [ "$(cut -d' ' -f1 /tmp/loop_mapped_STU42.txt | tr '\n' ',')" = "perceive,decide,act,learn," ] && echo LOOP_MAPPED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `LOOP_MAPPED` (인지→판단→행동→학습 4단계 루프).
      🔎 인지(이벤트 수집)→판단(Manager LLM+KG/Experience 계획)→행동(대응/공격)→학습(경험 DB 축적)→인지. 순환하며 개선.
    answer: |
      [perceive] ingest SIEM alert / recon result
      [decide  ] Manager LLM + KG/Experience 로 계획(PLANNING)
      [act     ] investigate / contain / attack step
      [learn   ] store outcome in Experience DB
      LOOP_MAPPED
    answer_detail: "자율 보안 루프(인지·판단·행동·학습) 매핑 → LOOP_MAPPED."
    verify:
      type: output_contains
      expect: LOOP_MAPPED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 자율성 수준 평가 → AUTONOMY_ASSESSED
      > **🎯 목표:** 행동 위험도에 따라 자율성 수준을 배정.
      > **개념:** 위험 행동은 사람 승인, 안전 행동은 자율.
      ```bash
      # 행동 위험도별 자율성 수준(저=자율, 고=승인)을 CSV 로 기록한다.
      cat > /tmp/autonomy_STU42.csv <<'EOF'
      collect logs / investigate,low,human-out (autonomous)
      block IP at firewall,medium,human-on (supervised)
      quarantine host,high,human-in (approval)
      shut down production,critical,human-in (approval)
      EOF
      awk -F, '{printf "  %-24s [%-8s] -> %s\n",$1,$2,$3}' /tmp/autonomy_STU42.csv
      # 고/치명 위험 행동이 사람 승인(human-in)이면 올바른 배정.
      awk -F, '($2=="high"||$2=="critical") && $3 !~ /human-in/{bad=1} END{print (bad?"CHECK":"AUTONOMY_ASSESSED")}' /tmp/autonomy_STU42.csv
      ```
      ✅ 마지막 줄 `AUTONOMY_ASSESSED` (위험 행동=사람 승인, 안전 행동=자율).
      🔎 조사(저위험)=완전 자율, IP 차단(중)=감독, 격리·종료(고/치명)=사람 승인. 위험도에 자율성 수준을 맞춘다.
    answer: |
      collect logs / investigate       [low     ] -> human-out (autonomous)
      quarantine host                  [high    ] -> human-in (approval)
      block IP at firewall             [medium  ] -> human-on (supervised)
      shut down production system      [critical] -> human-in (approval)
      AUTONOMY_ASSESSED
    answer_detail: "행동 위험도별 자율성 수준 배정 → AUTONOMY_ASSESSED."
    verify:
      type: output_contains
      expect: AUTONOMY_ASSESSED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 가드레일 설정 → GUARDRAILS_SET
      > **🎯 목표:** 자율 행동의 안전 경계(가드레일)를 설정·검사.
      > **개념:** 되돌릴 수 없는·범위 밖 행동을 차단.
      ```bash
      # 자율 행동 가드레일 규칙과 검사 결과를 기록한다.
      cat > /tmp/guardrails_STU42.txt <<'EOF'
      allowed_targets=10.20.30.0/24
      forbidden_actions=delete_data,disable_safety
      irreversible_needs_approval=true
      rate_limit_per_min=10
      EOF
      # 테스트 행동을 규칙에 대입한다.
      echo "scan 10.20.30.0/24 -> ALLOW"
      echo "delete_data -> BLOCK (forbidden)"
      echo "block 8.8.8.8 -> BLOCK (out of scope)"
      echo "reimage (irreversible) -> APPROVAL required"
      grep -q "forbidden_actions=delete_data" /tmp/guardrails_STU42.txt && grep -q "irreversible_needs_approval=true" /tmp/guardrails_STU42.txt && echo GUARDRAILS_SET || echo CHECK
      ```
      ✅ 마지막 줄 `GUARDRAILS_SET` (금지·범위밖 차단, 비가역 승인, 정상 허용).
      🔎 허용 범위·금지 행동·비가역 승인·속도 제한으로 자율 행동을 안전 경계 안에. 잘못된 자율 행동의 피해를 막는다.
    answer: |
      scan         -> ALLOW
      delete_data  -> BLOCK (forbidden)
      block        -> BLOCK (out of scope)
      reimage      -> APPROVAL required
      GUARDRAILS_SET
    answer_detail: "자율 행동 가드레일(범위·금지·비가역·속도) 설정 → GUARDRAILS_SET."
    verify:
      type: output_contains
      expect: GUARDRAILS_SET
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W01 of an autonomous security course. Findings: the perceive-decide-act-learn loop was mapped (LOOP_MAPPED), autonomy levels were assigned by action risk with high-risk actions requiring human approval (AUTONOMY_ASSESSED), and guardrails blocked forbidden and out-of-scope actions while requiring approval for irreversible ones (GUARDRAILS_SET). Explain the bastion architecture (Manager agent with knowledge graph and experience DB, SubAgent executing via A2A) and that autonomy needs guardrails and appropriate human-in/on/out-of-loop levels. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 자율 보안=인지·판단·행동·학습 루프(bastion: Manager+KG·Experience·EvidenceDB, SubAgent A2A). 자율성 수준+가드레일로 안전.
      다음 주(W02)는 **LLM 에이전트 기초**.
    answer: |
      Assessment
      Autonomous security runs a perceive-decide-act-learn loop; the bastion architecture uses a Manager agent (knowledge graph + experience DB) and a SubAgent executing via A2A.
      Autonomy needs guardrails and risk-based human-in/on/out-of-loop levels so wrong autonomous actions are contained.
    answer_detail: "W01 자율 보안 개론 종합(Assessment). 루프·bastion·자율성 수준·가드레일."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
