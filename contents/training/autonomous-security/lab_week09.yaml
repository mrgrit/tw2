lab_id: autonomous-security-week09
title: "W09 — Experience와 4-Layer Memory: 계층 매핑·경험 저장/검색·기억 기반 판단"
version: ai
course: autonomous-security
week: 9
description: |
  4계층 메모리 학습. 작업·일화·의미·절차 계층 매핑(MEMORY_MAPPED), 경험 저장·관련 검색(EXPERIENCE_STORED),
  검색한 기억으로 판단 개선(MEMORY_APPLIED), 종합(Assessment).
  저장(무엇을)과 검색(무엇을 꺼낼지)이 학습의 핵심.
  ※ 4계층(working/episodic/semantic/procedural)은 학습용 인지 모델이다. bastion 의 실제 구현은
  지식그래프(graph.py: Playbook·Experience·Skill·Concept 노드)+Experience(experience.py: 오버피팅 방지·3회+
  성공 승격·시간 감쇠·LRU)+EvidenceDB(SQLite)로 조직된다(semantic≈KG, episodic/procedural≈Experience).
difficulty: medium
duration_minutes: 120
audience: 자율 보안 (9주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W09 강의안 정독 — §0.5(4계층 메모리·저장·검색)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "4계층 메모리 매핑(MEMORY_MAPPED)"
  - "경험 저장·검색(EXPERIENCE_STORED)"
  - "기억 기반 판단(MEMORY_APPLIED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 4계층 메모리 매핑 → MEMORY_MAPPED
      > **🎯 목표:** 정보를 작업·일화·의미·절차 계층에 매핑.
      > **개념:** 용도별 계층.
      ```bash
      # 정보를 4계층 메모리로 분류한다(bastion: semantic≈KG, episodic/procedural≈Experience).
      cat > /tmp/memory_STU42.txt <<'EOF'
      working    current alert being investigated
      episodic   on 2026-03-01 blocked bruteforcer 203.0.113.5
      semantic   web-tier host runs Apache+ModSec
      procedural playbook: suspicious_ip_triage steps
      EOF
      awk '{printf "  [%-10s] ",$1;$1="";print}' /tmp/memory_STU42.txt
      M=""; for l in working episodic semantic procedural; do grep -q "^$l" /tmp/memory_STU42.txt || M=1; done
      [ -z "$M" ] && echo MEMORY_MAPPED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `MEMORY_MAPPED` (작업·일화·의미·절차 4계층 매핑).
      🔎 현재 임무=작업, 과거 사건=일화, 자산 지식=의미, 플레이북=절차. 4계층으로 나눠 용도별 활용.
    answer: |
      [working   ] current alert being investigated
      [episodic  ] on 2026-03-01 blocked bruteforcer 203.0.113.5
      [semantic  ] web-tier host runs Apache+ModSec
      [procedural] playbook: suspicious_ip_triage steps
      MEMORY_MAPPED
    answer_detail: "정보를 4계층 메모리에 매핑 → MEMORY_MAPPED."
    verify:
      type: output_contains
      expect: MEMORY_MAPPED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 경험 저장·검색 → EXPERIENCE_STORED
      > **🎯 목표:** 사건을 일화 기억에 저장하고 유사 상황을 검색.
      > **개념:** 관련 기억을 정확히 꺼낸다.
      ```bash
      # 경험을 태그와 함께 저장하고 태그로 검색한다.
      cat > /tmp/exp_STU42.txt <<'EOF'
      situation=bruteforce from 203.0.113.5 action=block+notify result=contained tags=bruteforce,ssh
      situation=phishing url in email action=sandbox+block result=contained tags=phishing
      EOF
      echo "태그 'bruteforce' 검색:"; grep "tags=.*bruteforce" /tmp/exp_STU42.txt
      grep -q "tags=bruteforce" /tmp/exp_STU42.txt && echo EXPERIENCE_STORED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `EXPERIENCE_STORED` (bruteforce 태그로 관련 일화만 검색).
      🔎 사건을 태그와 함께 일화 기억에 저장, 새 임무에서 태그로 관련 일화만 검색(phishing은 제외). 검색 품질이 학습 효과.
    answer: |
      retrieved: bruteforce from 203.0.113.5 -> block+notify (contained)
      EXPERIENCE_STORED
    answer_detail: "일화 저장·관련 검색 → EXPERIENCE_STORED."
    verify:
      type: output_contains
      expect: EXPERIENCE_STORED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 기억 기반 판단 → MEMORY_APPLIED
      > **🎯 목표:** 검색한 과거 경험으로 이번 판단을 개선.
      > **개념:** 경험이 없으면 처음부터, 있으면 강화.
      ```bash
      # 검색한 과거 경험으로 현재 판단을 강화한다.
      cat > /tmp/apply_STU42.txt <<'EOF'
      current: new bruteforce from 198.51.100.9
      retrieved: past bruteforce -> block+notify -> contained (proven)
      decision: apply proven approach -> block+notify
      EOF
      cat /tmp/apply_STU42.txt
      grep -q "retrieved:" /tmp/apply_STU42.txt && grep -q "decision: apply proven" /tmp/apply_STU42.txt && echo MEMORY_APPLIED || echo CHECK
      ```
      ✅ 마지막 줄 `MEMORY_APPLIED` (검증된 과거 방법을 이번 판단에 활용).
      🔎 과거에 통한 방법(investigate then block)을 검색해 이번 판단에 활용. 경험이 있으면 처음부터가 아니라 강화된 판단.
    answer: |
      retrieved past success: investigate then block+notify
      decision: apply proven playbook: investigate then block+notify (mode: informed)
      MEMORY_APPLIED
    answer_detail: "검색한 경험으로 판단 개선 → MEMORY_APPLIED."
    verify:
      type: output_contains
      expect: MEMORY_APPLIED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W09 on experience and 4-layer memory. Findings: information was mapped into working, episodic, semantic, and procedural memory (MEMORY_MAPPED), an episode was stored and relevant past experience retrieved by tags (EXPERIENCE_STORED), and the retrieved proven approach informed the current decision (MEMORY_APPLIED). Explain the four memory layers, that semantic memory is the knowledge graph and episodic/procedural is the experience DB, and that storage and retrieval quality drive real learning. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 4계층 메모리(작업·일화·의미·절차)로 경험을 저장·검색해 학습. 의미=지식 그래프, 일화·절차=경험 DB. 검색 품질이 핵심.
      다음 주(W10)는 **Schedule과 Watcher**.
    answer: |
      Assessment
      Four memory layers (working, episodic, semantic, procedural) structure learning; semantic memory is the knowledge graph and episodic/procedural is the experience DB.
      Storage selection and retrieval quality drive real learning, applying proven past experience to new decisions.
    answer_detail: "W09 4계층 메모리 종합(Assessment). 계층·저장/검색·기억 기반 판단."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
