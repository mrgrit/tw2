lab_id: autonomous-security-week10
title: "W10 — Schedule과 Watcher: 이벤트 Watcher·스마트 스케줄·트리거 발동"
version: ai
course: autonomous-security
week: 10
description: |
  능동적 자율성. 이벤트 Watcher 설계(WATCHER_SET), cron 대신 스마트 스케줄(SCHEDULE_SET), 중요도·하트비트·
  이상 기반 트리거 발동(TRIGGER_FIRED), 종합(Assessment).
  gwanje 원칙(salience>=5 | heartbeat>=25분 | 이상 즉시, cron 금지)으로 잡음 없이 능동적.
difficulty: medium
duration_minutes: 120
audience: 자율 보안 (10주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W10 강의안 정독 — §0.5(Watcher·스마트 트리거·cron 금지)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "이벤트 Watcher 설계(WATCHER_SET)"
  - "스마트 스케줄(SCHEDULE_SET)"
  - "트리거 발동 로직(TRIGGER_FIRED)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — Watcher 설계 → WATCHER_SET
      > **🎯 목표:** 이벤트 조건을 감시하는 Watcher를 정의.
      > **개념:** 조건 만족 시 에이전트 발동.
      ```bash
      cat > /tmp/watcher_set_STU42.txt <<'EOF'
      condition: alerts_per_min > 20 OR new_critical_ioc
      on_fire: launch triage agent with playbook suspicious_ip_triage
      guardrail: max 5 launches/hour
      EOF
      cat /tmp/watcher_set_STU42.txt
      [ "$(grep -cE "true|:" /tmp/watcher_set_STU42.txt)" -ge 3 ] && echo WATCHER_SET || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `WATCHER_SET` (조건·발동 행동·가드레일 포함 Watcher).
      🔎 조건(알림 급증 또는 신규 critical IOC)·발동(트리아지 에이전트)·가드레일(시간당 5회 제한). 이벤트 기반 능동 감시.
    answer: |
      condition: alerts_per_min > 20 OR new_critical_ioc
      on_fire: launch triage agent with playbook suspicious_ip_triage
      guardrail: max 5 launches/hour
      WATCHER_SET
    answer_detail: "이벤트 Watcher(조건·발동·가드레일) 설계 → WATCHER_SET."
    verify:
      type: output_contains
      expect: WATCHER_SET
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 스마트 스케줄 → SCHEDULE_SET
      > **🎯 목표:** cron 무조건 실행 대신 스마트 트리거 스케줄.
      > **개념:** 의미 있을 때만 발동.
      ```bash
      # 스마트 스케줄(주기+이상시 즉시)을 정의한다.
      cat > /tmp/schedule_STU42.txt <<'EOF'
      heartbeat: every 25 min (baseline sweep)
      immediate: on salience>=5 or anomaly
      quiet_hours: suppress low-severity 00:00-06:00
      EOF
      cat /tmp/schedule_STU42.txt
      grep -q "^immediate:" /tmp/schedule_STU42.txt && grep -q "^heartbeat:" /tmp/schedule_STU42.txt && echo SCHEDULE_SET || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `SCHEDULE_SET` (cron 아닌 스마트 트리거: 중요도·하트비트·이상 시에만).
      🔎 cron(매분 무조건)은 잡음. 스마트 트리거는 salience≥5·하트비트≥25분·즉시 이상일 때만 발동, 아니면 침묵. gwanje 원칙.
    answer: |
      naive: * * * * * (every minute, always run+report)
      smart: fire if ['salience >= 5', 'heartbeat >= 25min', 'immediate anomaly'], else stay silent
      SCHEDULE_SET
    answer_detail: "cron 대신 스마트 트리거 스케줄 → SCHEDULE_SET."
    verify:
      type: output_contains
      expect: SCHEDULE_SET
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 트리거 발동 로직 → TRIGGER_FIRED
      > **🎯 목표:** 중요도·하트비트·이상으로 발동 여부를 판정.
      > **개념:** 셋 중 하나면 발동, 아니면 침묵.
      ```bash
      # 조건 충족 이벤트로 Watcher 가 발동함을 확인한다.
      cat > /tmp/trigger_STU42.txt <<'EOF'
      event: alerts_per_min=35 (> 20)
      watcher: siem_spike_watcher matched
      action: launched triage agent (playbook suspicious_ip_triage)
      guardrail_check: launches_this_hour=1 (<5) OK
      EOF
      cat /tmp/trigger_STU42.txt
      grep -q "matched" /tmp/trigger_STU42.txt && grep -q "launched" /tmp/trigger_STU42.txt && echo TRIGGER_FIRED || echo NO_FIRE
      ```
      ✅ 마지막 줄 `TRIGGER_FIRED` (중요도·하트비트·이상은 발동, 조용하면 침묵).
      🔎 salience≥5·하트비트≥25분·즉시 이상 중 하나면 발동, 다 아니면 침묵. 중요한 건 즉시, 조용할 땐 최소 — 잡음 없는 능동성.
    answer: |
      sal=7 mins=3 anomaly=False -> FIRE (salience 7 >= 5)
      sal=2 mins=30 anomaly=False -> FIRE (heartbeat 30min >= 25)
      sal=1 mins=5 anomaly=True -> FIRE (immediate anomaly)
      sal=1 mins=5 anomaly=False -> silent (stay silent)
      TRIGGER_FIRED
    answer_detail: "중요도·하트비트·이상 트리거 발동 로직 → TRIGGER_FIRED."
    verify:
      type: output_contains
      expect: TRIGGER_FIRED
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W10 on schedules and watchers in autonomous security. Findings: an event watcher with condition, action, and a rate guardrail was set (WATCHER_SET), a smart-trigger schedule replaced naive cron (SCHEDULE_SET), and trigger logic fired only on salience>=5, heartbeat>=25min, or immediate anomaly, staying silent otherwise (TRIGGER_FIRED). Explain that watchers and schedules make the system active, that naive cron causes noise and alert fatigue, and that smart triggers fire only when meaningful. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: Watcher(이벤트)·Schedule(주기)이 능동성을. cron은 잡음 — 스마트 트리거(중요도·하트비트·이상)로 잡음 없이 능동적.
      다음 주(W11)는 **자율 Blue Agent**.
    answer: |
      Assessment
      Watchers (event-driven) and schedules make the system active; naive cron causes noise and alert fatigue.
      Smart triggers fire only on high salience, heartbeat timeout, or immediate anomaly, staying silent otherwise.
    answer_detail: "W10 Schedule/Watcher 종합(Assessment). 능동성·스마트 트리거·cron 금지."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
