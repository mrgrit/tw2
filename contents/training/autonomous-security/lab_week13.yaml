lab_id: autonomous-security-week13
title: "W13 — 분산 지식 아키텍처: 노드 공유·동기화 병합·집단 학습·오염 방어"
version: ai
course: autonomous-security
week: 13
description: |
  다중 에이전트 분산 지식. 노드 간 지식 공유 매핑(DISTRIBUTED_MAPPED), 충돌 해결 동기화 병합
  (KNOWLEDGE_SYNCED), 집단 학습+오염 방어(COLLECTIVE_LEARNING), 종합(Assessment).
  집단 학습으로 함께 성장하되 출처 검증·무결성으로 오염을 막는다.
difficulty: hard
duration_minutes: 130
audience: 자율 보안 (13주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W13 강의안 정독 — §0.5(분산 지식·병합·집단 학습·오염)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "분산 지식 노드 매핑(DISTRIBUTED_MAPPED)"
  - "지식 동기화·병합(KNOWLEDGE_SYNCED)"
  - "집단 학습·오염 방어(COLLECTIVE_LEARNING)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 분산 지식 노드 매핑 → DISTRIBUTED_MAPPED
      > **🎯 목표:** 여러 bastion 노드가 공유 지식을 주고받는 구조 매핑.
      > **개념:** 한 곳의 발견이 모두에게.
      ```bash
      # 분산 노드별 로컬 경험을 기록한다.
      cat > /tmp/nodes_STU42.txt <<'EOF'
      bastion-A: new bruteforce TTP
      bastion-B: phishing playbook v2
      bastion-C: c2 IOC list
      EOF
      cat /tmp/nodes_STU42.txt
      [ "$(grep -c '^bastion-' /tmp/nodes_STU42.txt)" -ge 3 ] && echo DISTRIBUTED_MAPPED || echo INCOMPLETE
      ```
      ✅ 마지막 줄 `DISTRIBUTED_MAPPED` (3개 노드 지식이 공유 풀로).
      🔎 bastion-A(bruteforce TTP)·B(피싱 플레이북)·C(C2 IOC)의 지식이 공유 풀에 모인다. 한 곳의 발견이 전체 자산.
    answer: |
      bastion-A shares: ['new bruteforce TTP']
      bastion-B shares: ['phishing playbook v2']
      bastion-C shares: ['c2 IOC list']
      shared knowledge pool: 3 items
      DISTRIBUTED_MAPPED
    answer_detail: "노드 지식 공유 풀 매핑 → DISTRIBUTED_MAPPED."
    verify:
      type: output_contains
      expect: DISTRIBUTED_MAPPED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 지식 동기화·병합 → KNOWLEDGE_SYNCED
      > **🎯 목표:** 노드 간 충돌하는 지식을 병합 규칙으로 해결.
      > **개념:** 신뢰도·최신 우선으로 일관성.
      ```bash
      # 노드 간 상충 주장을 신뢰도로 병합한다.
      cat > /tmp/claims_STU42.csv <<'EOF'
      A,203.0.113.5,malicious,0.9,100
      B,203.0.113.5,benign,0.5,90
      EOF
      awk -F, '{printf "  node%s: %s=%s (trust %s)\n",$1,$3,$3,$4}' /tmp/claims_STU42.csv
      # 신뢰도 높은 최신 주장(A malicious)으로 병합.
      WIN=$(sort -t, -k4 -rn /tmp/claims_STU42.csv | head -1 | cut -d, -f3)
      [ "$WIN" = "malicious" ] && echo "병합 결과: malicious (higher trust)" && echo KNOWLEDGE_SYNCED || echo CHECK
      ```
      ✅ 마지막 줄 `KNOWLEDGE_SYNCED` (신뢰도 가중 병합으로 malicious 채택).
      🔎 A·C(malicious, 신뢰 0.9+0.8)가 B(benign, 0.5)를 이겨 병합 결과 malicious. 신뢰도 가중 다수결로 충돌 해결·일관성.
    answer: |
      claims: [('A', 'malicious', 0.9), ('B', 'benign', 0.5), ('C', 'malicious', 0.8)]
      trust-weighted merge: {'malicious': 1.7, 'benign': 0.5} -> malicious
      KNOWLEDGE_SYNCED
    answer_detail: "신뢰도 가중 병합으로 충돌 해결 → KNOWLEDGE_SYNCED."
    verify:
      type: output_contains
      expect: KNOWLEDGE_SYNCED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 집단 학습·오염 방어 → COLLECTIVE_LEARNING
      > **🎯 목표:** 한 노드 교훈이 전체에 전파되되, 오염 지식은 차단.
      > **개념:** 집단 지능 + 오염 방지.
      ```bash
      # 한 노드의 교훈이 전체로 전파돼 집단 학습이 되는지 확인한다.
      cat > /tmp/collective_STU42.txt <<'EOF'
      A learns: new bruteforce TTP signature
      sync: shared to B, C (with provenance + trust)
      B applies: detects same TTP without local incident
      poison_guard: unverified claim quarantined until corroborated
      EOF
      cat /tmp/collective_STU42.txt
      grep -q "B applies" /tmp/collective_STU42.txt && grep -q "poison_guard" /tmp/collective_STU42.txt && echo COLLECTIVE_LEARNING || echo CHECK
      ```
      ✅ 마지막 줄 `COLLECTIVE_LEARNING` (정상 교훈 전파, 오염 지식 차단).
      🔎 A의 검증된 교훈은 전체로 전파(집단 학습), 손상 노드의 미검증 오염 지식(악성 IP를 신뢰로)은 출처 검증으로 차단. 지능+안전.
    answer: |
      legit lesson propagated to all: True
      poison knowledge accepted: False (blocked by source verification)
      COLLECTIVE_LEARNING
    answer_detail: "집단 학습 전파+오염 차단 → COLLECTIVE_LEARNING."
    verify:
      type: output_contains
      expect: COLLECTIVE_LEARNING
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W13 on distributed knowledge architecture. Findings: knowledge from multiple bastion nodes was pooled (DISTRIBUTED_MAPPED), conflicting claims were merged by trust-weighted voting (KNOWLEDGE_SYNCED), and a verified lesson propagated to all while poisoned knowledge was blocked by source verification (COLLECTIVE_LEARNING). Explain that sharing enables fast collective learning, merge rules keep consistency, and source verification plus integrity prevent knowledge poisoning. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":330}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 분산 지식=공유로 집단 학습(빠른 성장). 병합 규칙으로 일관성, 출처 검증·무결성으로 오염 방지.
      다음 주(W14)는 **RL Steering과 정책 최적화**.
    answer: |
      Assessment
      Distributed knowledge lets multiple bastion nodes share and merge knowledge for fast collective learning.
      Trust-weighted merge keeps consistency, and source verification plus integrity prevent knowledge poisoning.
    answer_detail: "W13 분산 지식 종합(Assessment). 공유·병합·집단 학습·오염 방어."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
