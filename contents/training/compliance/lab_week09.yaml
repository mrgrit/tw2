lab_id: standalone-compliance-week09
title: "보안 구성 평가 (SCA/CIS) — 자동 점검과 수동 검증"
version: standalone-compliance
course: compliance
week: 9
description: |
  Wazuh SCA(Security Configuration Assessment) — 모듈 활성, CIS 정책, 점검 항목(ServerTokens CIS 8.1),
  자동 점검↔수동 검증, 점수·조치. el34-siem/web 실 점검. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SCA활성) §4(점검항목) §5(수동검증) 숙지"
objectives:
  - "SCA 모듈/정책 확인"
  - "CIS 점검 항목 해석"
  - "자동 점검↔수동 검증 일치"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "SCA 점검 대상 = el34-web(에이전트)/el34-siem(매니저)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SCA 활성 — ossec.conf
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6"
      ```
      ## ✅ 합격 기준
      SCA 모듈이 활성·정기 실행되는지 확인한다.
    hint: '<sca> enabled'
    category: manipulation
    points: 14
    answer: |
      echo "=== SCA 활성 ==="
      docker exec el34-web sh -c "grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6"
      echo "→ enabled yes + interval 12h = 자동 구성 평가 가동(준수)"
    answer_detail: "SCA 활성 = ossec.conf <sca> enabled+interval. 12h 주기 자동 평가."
    verify:
      type: output_contains
      expect: 'sca'
      field: stdout
      semantic:
        intent: "SCA 활성 확인"
        success_criteria: ["모듈 가동"]
        acceptable_methods: ["**[OSS] ossec.conf (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SCA 정책 — CIS 목록
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/sca/ | grep -i cis | head -8"
      ```
      ## ✅ 합격 기준
      내장 CIS 정책을 확인한다.
    hint: 'cis_*.yml'
    category: recon
    points: 12
    answer: |
      echo "=== SCA 정책 (CIS) ==="
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/sca/ | grep -i cis | head -10"
      echo "→ CIS Apache/OS 정책 다수 내장. 대상에 맞는 정책 활성화"
    answer_detail: "SCA 정책 = 내장 CIS 벤치마크(Apache/OS). 대상별 활성화로 자동 점검."
    verify:
      type: output_contains
      expect: 'cis'
      field: stdout
      semantic:
        intent: "SCA 정책 확인"
        success_criteria: ["CIS 정책"]
        acceptable_methods: ["**[OSS] ls (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 SCA 결과 — 적재 확인
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"'
      ```
      ## ✅ 합격 기준
      SCA 점검 결과가 SIEM에 적재됨을 확인한다.
    hint: 'sca 알림 수'
    category: analysis
    points: 14
    answer: |
      echo "=== SCA 결과 적재 ==="
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"'
      echo "→ SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작"
    answer_detail: "SCA 결과 = alerts.json에 적재. 자동 평가가 정기 동작하는 증적."
    verify:
      type: output_contains
      expect: 'sca_alerts='
      field: stdout
      semantic:
        intent: "SCA 결과 확인"
        success_criteria: ["결과 적재"]
        acceptable_methods: ["**[OSS] alerts.json (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 점검 항목 — ServerTokens (CIS 8.1)
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "grep -B1 -A2 'ServerTokens' /var/ossec/ruleset/sca/cis_apache_24.yml.disabled | head -6"
      ```
      ## ✅ 합격 기준
      CIS 점검 항목(ServerTokens) 정의를 확인한다.
    hint: 'ServerTokens CIS 항목'
    category: analysis
    points: 14
    answer: |
      echo "=== 점검 항목 (ServerTokens, CIS 8.1) ==="
      docker exec el34-siem sh -c "grep -A3 'ServerTokens' /var/ossec/ruleset/sca/cis_apache_24.yml.disabled | head -8"
      echo "→ CIS 8.1: 'Ensure ServerTokens is Set to Prod' — rationale/remediation/compliance 포함"
      echo "→ W01에서 수동 발견한 갭이 SCA 정책에 그대로 정의됨"
    answer_detail: "CIS 항목 = ServerTokens Prod(8.1). title/rationale/remediation/compliance 구조."
    verify:
      type: output_contains
      expect: 'ServerTokens'
      field: stdout
      semantic:
        intent: "CIS 점검 항목"
        success_criteria: ["항목 정의"]
        acceptable_methods: ["**[OSS] SCA 정책 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 수동 검증 — 실제 설정 대조
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "actual:$V"; echo "$V" | grep -qi "Prod" && echo "pass" || echo "fail=not_Prod"'
      ```
      ## ✅ 합격 기준
      자동 점검 항목을 실제 설정으로 검증한다(오탐 제거).
    hint: '실제 설정 대조'
    category: manipulation
    points: 12
    answer: |
      echo "=== 수동 검증 ==="
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "actual:$V"; echo "$V" | grep -qi "Prod" && echo "pass" || echo "fail=not_Prod"'
      echo "→ 실제 ServerTokens OS → CIS(Prod) 미달 = SCA fail과 일치. 자동 결과를 증적으로 확정"
    answer_detail: "수동 검증 = SCA 항목을 실제 설정으로 재확인. fail 일치 → 증적 확정, 오탐 제거."
    verify:
      type: output_contains
      expect: 'fail='
      field: stdout
      semantic:
        intent: "자동↔수동 검증"
        success_criteria: ["실제 설정 대조"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 점수·조치
      ## 💻 실행 명령
      ```bash
      echo "SCA 점수=pass/(pass+fail). fail 항목은 remediation 적용 후 재스캔으로 점수 개선"
      ```
      ## ✅ 합격 기준
      SCA 점수·조치 흐름을 정리한다.
    hint: '점수/remediation'
    category: report
    points: 12
    answer: |
      echo "=== 점수·조치 ==="
      echo "점수: pass / (pass+fail) 비율(%). 기준선 준수율"
      echo "조치: fail 항목의 remediation 적용(예: ServerTokens Prod)"
      echo "재스캔: 다음 SCA 주기/수동 트리거로 점수 개선 확인"
      echo "→ 점수 추세로 보안 기준선의 지속 관리"
    answer_detail: "SCA 점수 = pass 비율. fail→remediation→재스캔으로 점수 개선. 추세 관리."
    verify:
      type: output_contains
      expect: 'remediation'
      field: stdout
      semantic:
        intent: "SCA 점수·조치"
        success_criteria: ["점수/조치"]
        acceptable_methods: ["**[표준] SCA 점수 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 SCA 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W09 SCA 보고서 (학번, 이름)
      ## 1. SCA 활성/CIS 정책/결과
      ## 2. 점검 항목(ServerTokens) + 수동 검증
      ## 3. 점수·조치
      ```
      ## ✅ 합격 기준
      보고서에 SCA 운영 + 항목 검증 + 조치가 포함된다.
    hint: 'SCA+항목+조치'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W09 SCA 보고서
      ## 1. SCA: el34-web 활성(12h), CIS Apache/OS 정책 내장, 결과 SIEM 적재
      ## 2. 항목: ServerTokens(CIS 8.1) SCA fail ↔ 수동 검증(실제 OS, Prod 아님) 일치
      ## 3. 점수: pass 비율. 조치: remediation(ServerTokens Prod) 후 재스캔
      ## 결론: SCA로 수백 항목을 자동·정기 점검하고, fail은 수동 검증으로 확정·조치. 자동+수동 결합
      EOF
    answer_detail: "SCA 보고 = 자동 평가 운영 + 항목 수동검증 일치 + 점수/조치. 자동+수동 결합."
    verify:
      type: output_contains
      expect: 'ServerTokens'
      field: stdout
      semantic:
        intent: "SCA 종합 보고"
        success_criteria: ["SCA/검증/조치"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
