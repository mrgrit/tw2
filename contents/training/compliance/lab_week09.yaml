      SCA 의 가치는 "지금 fail 을 찾았다"가 아니라 **"점수를 개선해 가는 순환"**에 있다. 한 번 fail 을
      찾는 데서 끝나면 수동 점검과 다를 게 없다 — SCA 는 시점마다 점수를 남겨 **추세로 관리**하게 해준다.
      이 단계는 그 점수·조치 흐름을 정리한다.

      > **용어 — SCA 점수 / remediation / 재스캔.** **SCA 점수** 는 `pass / (pass + fail)` 의 비율(%)로,
      > 한 정책에 대한 **기준선 준수율**이다(예: 150항목 중 129 pass → 86%). **remediation** 은 fail
      > 항목을 기준에 맞게 고치는 시정 조치(예: `ServerTokens Prod`)이고, **재스캔** 은 시정 후 SCA 를
      > 다시 돌려 점수가 올랐는지 확인하는 것이다. 점수는 정책 범위 안의 준수율일 뿐(정책에 없는 약점은
      > 반영 안 됨), 추세로 봐야 의미가 크다.
