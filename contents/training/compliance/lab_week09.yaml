lab_id: standalone-compliance-week09
title: "보안 구성 평가 (SCA/CIS) — 자동 점검과 수동 검증"
version: standalone-compliance
course: compliance
week: 9
description: |
  보안 구성 평가(SCA) 실습 — 수백 개 CIS 기준선 항목을 손이 아니라 도구로 자동·정기 점검하는 한 바퀴.

  W08 중간고사에서는 표적 하나(el34-web)를 CIS Benchmark 기준으로 항목마다 손으로 점검했다. 항목이
  10개면 손이 충분하지만, 실제 CIS Apache 2.4 Benchmark 한 종만 해도 수백 항목이고 OS·DB까지 더하면
  수천 항목이라 수작업은 느리고 빠뜨린다. 본 실습은 이 점검을 자동·정기로 돌리는 도구인 SCA(Security
  Configuration Assessment, 보안 구성 평가)를 다룬다. SCA 는 CIS 정책(yml)을 에이전트가 항목별로 자동
  점검해 pass/fail 점수와 알림을 내며, el34 의 SIEM 인 Wazuh 가 이 SCA 모듈을 내장한다.

  학생은 ① SCA 모듈이 켜졌는지(ossec.conf <sca> enabled), ② 어떤 CIS 정책이 내장돼 있는지
  (/var/ossec/ruleset/sca/), ③ 점검 결과가 SIEM 에 적재되는지(alerts.json), ④ 정책 속 한 항목
  (ServerTokens, CIS Apache 8.1)이 어떻게 정의돼 있는지, ⑤ 그 fail 이 실제 설정과 일치하는지를 수동
  검증으로 확정하고, ⑥ 점수·조치(remediation·재스캔) 순환을 종합하는 한 바퀴를 돈다.

  핵심 메시지: 자동화(SCA)는 감사자를 대체하지 않고 증폭한다. SCA 가 수백 항목을 넓게 훑어 갭 후보를
  쏟아내면, 감사자가 우선순위 높은 fail 을 수동 검증으로 깊게 확정한다 — 자동으로 넓게, 수동으로 깊게.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec 로 실행한다(에이전트 점검=
  el34-web, 정책·결과 점검=el34-siem). 기존 OS 명령(grep/ls/tail)만 쓰며 신규 도구 설치는 없다.
  강의 lecture_week09.md §0(용어)·§2(SCA 6단계)·§3(점수·조치)와 짝을 이룬다.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SCA활성) §4(점검항목) §5(수동검증) 숙지"
objectives:
  - "SCA(보안 구성 평가)가 W08 의 수동 기준선 점검과 같은 일(CIS 항목 점검)을 자동·정기로 한다는 것을 설명한다"
  - "el34-web 에서 Wazuh SCA 모듈이 활성(<sca> enabled)·12시간 주기(interval 12h)로 자동 실행됨을 ossec.conf 에서 직접 확인한다"
  - "내장 CIS 정책 파일(/var/ossec/ruleset/sca/)을 찾고, SCA 결과가 SIEM(alerts.json)에 적재됨을 증적으로 확인한다"
  - "CIS 점검 항목(ServerTokens, CIS Apache 8.1)의 정책 정의를 읽어 W08·W01 의 수동 갭이 그대로 코드화돼 있음을 해석한다"
  - "SCA 가 fail 로 표시한 항목을 실제 설정으로 수동 재검증해 오탐을 거르고 자동 결과를 증적으로 확정한다(자동↔수동 일치)"
  - "SCA 점수(pass 비율) → remediation → 재스캔 의 조치 순환을 정리해 종합 보고한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (SCA 의 전제)
      모든 점검의 전제는 표적에 접근이 된다는 것이다. SCA 도 예외가 아니라, 먼저 점검 대상이 살아있고
      도달 가능한지부터 확인한다 — 대상에 못 닿으면 이후 모든 결과가 무의미하다.

      이번 주의 평가 구도를 먼저 머리에 넣자. el34 의 SIEM 인 **Wazuh** 는 **에이전트-매니저** 구조다.
      SCA 모듈은 점검 대상인 **에이전트(`el34-web`)** 에서 돌고, 그 결과(정책·알림)는 **매니저
      (`el34-siem`)** 로 모인다. 그래서 "점검 대상"은 web, "정책·결과가 모이는 곳"은 siem 이다. 이번
      평가는 web 의 Apache·OS 설정을 CIS 기준으로 보는 것이라 표적은 **`el34-web`** 이다.

      > **용어 — SCA(Security Configuration Assessment, 보안 구성 평가).** CIS Benchmark 같은 점검
      > 기준(정책 파일)을 입력받아 시스템 보안 설정을 항목별로 자동·정기 점검하고 pass/fail 점수를 내는
      > 기능. W08 에서 손으로 하던 기준선 점검을 도구가 대신 돌린다고 보면 된다.
      ## 💻 실행 명령
      `docker exec` 는 이미 떠 있는 컨테이너 안에서 명령을 실행한다. `el34-web` 안에서 `hostname` 이
      응답하고 `target_ok` 가 찍히면 대상에 도달한 것이다.
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      출력에 `target_ok` 가 나오면 대상 접근 성공. 이것은 판정이 아니라 점검의 전제다. (응답이 없으면
      호스트 SSH·컨테이너 상태 `docker ps` 부터 점검한다.)
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "SCA 점검 대상 = el34-web(에이전트, SCA 모듈이 도는 곳) / el34-siem(매니저, 정책·결과가 모이는 곳). 이번 평가는 web 의 Apache·OS 설정을 CIS 기준으로 보므로 표적은 web. hostname 응답 + target_ok 출력으로 도달성 확인 — 본격 점검의 전제 단계."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SCA 모듈 활성 — 자동 점검이 켜져 있나 (ossec.conf)
      대상에 도달했으면, 이제 "에이전트에서 SCA 가 실제로 켜져 있고 얼마나 자주 자동으로 도는가"를
      확인한다. SCA 의 가치는 사람 개입 없이 정기적으로 도는 데 있으므로, 모듈 활성과 실행 주기를 가장
      먼저 본다.

      > **용어 — ossec.conf 와 `<sca>` 블록.** `ossec.conf`(경로 `/var/ossec/etc/ossec.conf`)는 Wazuh
      > 에이전트/매니저의 설정 파일로, FIM(`<syscheck>`)·SCA(`<sca>`) 같은 모듈을 켜고 끄는 패널이다.
      > `<sca>` 블록 안에서 `<enabled>yes</enabled>` 는 SCA 모듈을 켜고, `<scan_on_start>yes</scan_on_start>`
      > 는 에이전트 시작 시 즉시 한 번 점검하며, `<interval>12h</interval>` 은 이후 12시간마다 반복하라는
      > 뜻이다. 즉 이 세 줄이 "정기·자동 점검"의 실체다.
      ## 💻 실행 명령
      `grep -A4 '<sca>'` 는 `<sca>` 가 나온 줄과 그 **다음 4줄(After)** 까지 함께 보여 블록 내용을
      드러낸다. `head -6` 으로 앞부분만 추린다. 출력에서 `enabled yes` 와 `interval 12h` 를 확인한다.
      ```bash
      docker exec el34-web sh -c "grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6"
      ```
      ## ✅ 합격 기준
      출력에 `<sca>` 블록(특히 `enabled yes` + `interval 12h`)이 나오면 통과 — SCA 가 12시간마다 보안
      구성을 자동 평가하도록 켜진 **준수** 상태다. W08 이라면 사람이 직접 돌려야 할 점검을, 여기서는
      모듈이 하루 두 번 알아서 돈다. (블록이 비거나 enabled 가 no 면 자동 점검이 꺼진 갭이다.)
    hint: '<sca> enabled'
    category: manipulation
    points: 14
    answer: |
      echo "=== SCA 활성 ==="
      docker exec el34-web sh -c "grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6"
      echo "→ enabled yes + interval 12h = 자동 구성 평가 가동(준수)"
    answer_detail: "SCA 활성 = ossec.conf 의 <sca> 블록에 enabled yes + interval 12h. enabled 가 모듈을 켜고, interval 12h 가 12시간 주기 자동 평가를 정한다 = 정기·자동 구성 평가 가동(준수). 수동 점검(W08)과 달리 사람 개입 없이 하루 두 번 자동 실행. 증적 = <sca> 블록 출력."
    verify:
      type: output_contains
      expect: 'sca'
      field: stdout
      semantic:
        intent: "SCA 활성 확인"
        success_criteria: ["모듈 가동"]
        acceptable_methods: ["**[OSS] ossec.conf (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SCA 정책 — 어떤 CIS 기준으로 점검하나
      모듈이 켜진 것을 확인했으면, 다음 질문은 "그래서 **어떤 기준**으로 점검하는가"다. 점검의 기준이
      무엇인지 아는 것은 모든 판정의 출발점이다(판정에는 항상 근거 기준이 붙는다). SCA 의 기준은 내장된
      **CIS 정책 파일**이며, 정책은 매니저(`el34-siem`)에 모여 있다.

      > **용어 — CIS Benchmark / SCA 정책(yml) / `.disabled`.** **CIS Benchmark** 는 Center for Internet
      > Security 가 OS·앱별 권장 보안 설정을 모은 표준 점검 기준서다(원래 사람이 읽는 PDF). 이걸 SCA 가
      > 실행할 수 있게 항목마다 점검 규칙을 `yml` 로 코드화한 것이 **SCA 정책 파일**이다(예:
      > `cis_apache_24.yml` = CIS Apache 2.4 Benchmark). Wazuh 는 이런 정책을 `/var/ossec/ruleset/sca/`
      > 에 다수 내장한다. 파일명 끝의 **`.disabled`** 는 "내장돼 있으나 현재 비활성"이라는 뜻으로,
      > 대상에 맞는 정책만 골라 활성화해 쓴다 — 디렉토리에 있다고 다 도는 게 아니다.
      ## 💻 실행 명령
      `ls` 로 정책 디렉토리의 파일을 나열하고, `grep -i cis`(`-i` = 대소문자 무시)로 CIS 정책만 걸러
      `head -10` 으로 앞 10개를 본다.
      ```bash
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/sca/ | grep -i cis | head -10"
      ```
      ## ✅ 합격 기준
      출력에 `cis_apache_24.yml`(또는 `.disabled`) 같은 CIS 정책이 나오면 통과 — 점검의 기준(어떤 CIS
      Benchmark)을 확인한 것이다. CIS Apache·OS 계열 정책이 다수 내장돼 있어, 대상(web)에 맞는 정책을
      활성화해 자동 점검에 쓴다. (목록이 비면 경로 `/var/ossec/ruleset/sca/` 를 재확인.)
    hint: 'cis_*.yml'
    category: recon
    points: 12
    answer: |
      echo "=== SCA 정책 (CIS) ==="
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/sca/ | grep -i cis | head -10"
      echo "→ CIS Apache/OS 정책 다수 내장. 대상에 맞는 정책 활성화"
    answer_detail: "SCA 정책 = Wazuh 에 내장된 CIS Benchmark(Apache 2.4·OS 계열)를 yml 로 코드화한 점검 규칙 파일. /var/ossec/ruleset/sca/ 에 다수 존재하며 .disabled 는 비활성 상태 — 대상별로 활성화해 자동 점검에 쓴다. 정책 = 점검의 기준(모든 판정의 근거). 증적 = cis_* 정책 목록."
    verify:
      type: output_contains
      expect: 'cis'
      field: stdout
      semantic:
        intent: "SCA 정책 확인"
        success_criteria: ["CIS 정책"]
        acceptable_methods: ["**[OSS] ls (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 SCA 결과 — 자동 평가가 실제로 도나 (적재 확인)
      모듈이 켜졌고(미션 2) 정책도 있다(미션 3). 하지만 "켜져 있다"가 "실제로 돌아서 결과를 남긴다"를
      보장하지는 않는다. 이 단계는 SCA 가 **말로만 켜진 게 아니라 진짜 돌아 결과를 적재하고 있는지**를
      증적으로 확인한다.

      > **용어 — alerts.json 과 SCA 알림.** `alerts.json`(경로 `/var/ossec/logs/alerts/`)은 Wazuh
      > 매니저가 모든 알림을 **한 줄에 한 JSON** 으로 적재하는 중앙 로그다(W08 미션 8 에서 본 그 파일).
      > SCA 점검이 끝나면 그 요약·항목 결과가 이 파일에 알림으로 기록되므로, 여기에 SCA 알림이 쌓여
      > 있으면 자동 평가가 실제로 동작하고 있다는 증적이 된다.
      ## 💻 실행 명령
      `tail -8000` 으로 로그 끝 8000줄만 빠르게 읽고(파일 전체를 읽지 않는다), `grep -c sca` 의 `-c`
      옵션이 'sca' 가 포함된 줄 수를 **세어** 숫자만 돌려준다. 그 수를 변수 `N` 에 담아 `sca_alerts=<수>`
      로 출력한다.
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"'
      ```
      ## ✅ 합격 기준
      출력에 `sca_alerts=<수>` 가 나오면 통과. 수가 0 보다 크면 SCA 점검 결과가 SIEM 에 적재되는 중 —
      미션 2 에서 본 "12시간 주기 자동 평가"가 말이 아니라 **실제 동작**임을 증적으로 확인한 것이다.
      (이 수는 가동 증적일 뿐, 점수나 갭의 수가 아니다.)
    hint: 'sca 알림 수'
    category: analysis
    points: 14
    answer: |
      echo "=== SCA 결과 적재 ==="
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"'
      echo "→ SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작"
    answer_detail: "SCA 결과 = 매니저의 alerts.json(중앙 알림 로그)에 SCA 알림으로 적재됨. grep -c sca 로 센 수가 0보다 크면 자동 평가가 정기적으로 실제 동작한다는 가동 증적. 단 알림 수는 점수나 갭 수가 아니라 '돌고 있다'는 사실까지만 보장. 증적 = sca_alerts= 출력."
    verify:
      type: output_contains
      expect: 'sca_alerts='
      field: stdout
      semantic:
        intent: "SCA 결과 확인"
        success_criteria: ["결과 적재"]
        acceptable_methods: ["**[OSS] alerts.json (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 점검 항목 — ServerTokens (CIS Apache 8.1)
      이제 정책 안의 **개별 점검 항목 하나**를 열어, 그것이 무엇을·왜·어떻게 점검하는지를 정책 정의
      수준에서 본다. 고른 항목은 **ServerTokens** — W01·W08 에서 학생이 **손으로** 발견했던 바로 그
      갭이다. 여기서는 같은 갭이 SCA 정책에 **코드로** 어떻게 적혀 있는지를 본다(자동 ↔ 수동이 같은
      항목을 가리킨다는 것을 확인하는 순간).

      > **용어 — CIS Apache 8.1 (ServerTokens) 와 정책 항목 구조.** CIS Apache 2.4 Benchmark 8.1 항목은
      > *"Ensure ServerTokens is Set to 'Prod'"* 다. ServerTokens 는 Apache 가 `Server:` 헤더와 에러
      > 페이지에 제품·OS 정보를 얼마나 노출할지 정하는 설정으로, `Prod`(제품명만 노출)가 권고치다(`OS`
      > 면 버전·OS 가 그대로 드러나 공격 정찰을 돕는다). SCA 정책의 한 항목은 `title`(이름)·
      > `rationale`(왜 필요한가)·`remediation`(fail 이면 어떻게 고치나)·`compliance`(어느 조항인가,
      > `cis: 8.1`)의 구조로 정의된다 — W08 에서 학생이 머릿속으로 했던 판단(기준→점검→판정)을 파일로
      > 박제한 셈이다.
      ## 💻 실행 명령
