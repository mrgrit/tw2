lab_id: standalone-compliance-week09
title: "보안 구성 평가 (SCA/CIS) — 자동 점검과 수동 검증"
version: standalone-compliance
course: compliance
week: 9
description: |
  보안 구성 평가(SCA) 실습 — 수백 개 CIS 기준선 항목을 손이 아니라 도구로 자동·정기 점검하는 한 바퀴.

  W08 중간고사에서는 표적 하나(el34-web)를 CIS Benchmark 기준으로 항목마다 손으로 점검했다. 항목이
  10개면 손이 충분하지만, 실제 CIS Apache 2.4 Benchmark 한 종만 해도 수백 항목이고 OS·DB까지 더하면
  수천 항목이라 수작업은 느리고 빠뜨린다. 본 실습은 이 점검을 자동·정기로 돌리는 도구인 SCA(Security
  Configuration Assessment, 보안 구성 평가)를 다룬다. SCA 는 CIS 정책(yml)을 에이전트가 항목별로 자동
  점검해 pass/fail 점수와 알림을 내며, el34 의 SIEM 인 Wazuh 가 이 SCA 모듈을 내장한다.

  학생은 ① SCA 모듈이 켜졌는지(ossec.conf <sca> enabled), ② 어떤 CIS 정책이 내장돼 있는지
  (/var/ossec/ruleset/sca/), ③ 점검 결과가 SIEM 에 적재되는지(alerts.json), ④ 정책 속 한 항목
  (ServerTokens, CIS Apache 8.1)이 어떻게 정의돼 있는지, ⑤ 그 fail 이 실제 설정과 일치하는지를 수동
  검증으로 확정하고, ⑥ 점수·조치(remediation·재스캔) 순환을 종합하는 한 바퀴를 돈다.

  핵심 메시지: 자동화(SCA)는 감사자를 대체하지 않고 증폭한다. SCA 가 수백 항목을 넓게 훑어 갭 후보를
  쏟아내면, 감사자가 우선순위 높은 fail 을 수동 검증으로 깊게 확정한다 — 자동으로 넓게, 수동으로 깊게.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec -it <컨테이너> bash 로 접속해 실행한다(에이전트 점검=
  el34-web, 정책·결과 점검=el34-siem). 기존 OS 명령(grep/ls/tail)만 쓰며 신규 도구 설치는 없다.
  강의 lecture_week09.md §0(용어)·§2(SCA 6단계)·§3(점수·조치)와 짝을 이룬다.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SCA활성) §4(점검항목) §5(수동검증) 숙지"
objectives:
  - "SCA(보안 구성 평가)가 W08 의 수동 기준선 점검과 같은 일(CIS 항목 점검)을 자동·정기로 한다는 것을 설명한다"
  - "el34-web 에서 Wazuh SCA 모듈이 활성(<sca> enabled)·12시간 주기(interval 12h)로 자동 실행됨을 ossec.conf 에서 직접 확인한다"
  - "내장 CIS 정책 파일(/var/ossec/ruleset/sca/)을 찾고, SCA 결과가 SIEM(alerts.json)에 적재됨을 증적으로 확인한다"
  - "CIS 점검 항목(ServerTokens, CIS Apache 8.1)의 정책 정의를 읽어 W08·W01 의 수동 갭이 그대로 코드화돼 있음을 해석한다"
  - "SCA 가 fail 로 표시한 항목을 실제 설정으로 수동 재검증해 오탐을 거르고 자동 결과를 증적으로 확정한다(자동↔수동 일치)"
  - "SCA 점수(pass 비율) → remediation → 재스캔 의 조치 순환을 정리해 종합 보고한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (SCA 의 전제)
      모든 점검의 전제는 표적에 접근이 된다는 것이다. SCA 도 예외가 아니라, 먼저 점검 대상이 살아있고
      도달 가능한지부터 확인한다. el34 의 Wazuh 는 에이전트-매니저 구조 — SCA 모듈은 에이전트
      (`el34-web`)에서 돌고 결과는 매니저(`el34-siem`)로 모인다. 이번 평가의 표적은 web 의 Apache·OS 설정이다.

      > **용어 — SCA(Security Configuration Assessment).** CIS Benchmark 같은 점검 기준(정책 파일)을
      > 입력받아 보안 설정을 항목별로 자동·정기 점검하고 pass/fail 점수를 내는 기능(W08 의 수동 점검을 도구가 대신).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) SCA 점검 대상 el34-web(에이전트) 도달성 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 대상 접근 성공(점검의 전제) — 응답이 없으면
      호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) SCA 점검 대상 el34-web(에이전트) 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "SCA 점검 대상 = el34-web(에이전트, SCA 모듈이 도는 곳) / el34-siem(매니저, 정책·결과가 모이는 곳). 이번 평가는 web 의 Apache·OS 설정을 CIS 기준으로 보므로 표적은 web. hostname 응답 + target_ok 출력으로 도달성 확인 — 본격 점검의 전제 단계."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 SCA 모듈 활성 — 자동 점검이 켜져 있나 (ossec.conf)
      대상에 도달했으면, 에이전트에서 SCA 가 실제로 켜져 있고 얼마나 자주 자동으로 도는지를 확인한다.
      SCA 의 가치는 사람 개입 없이 정기적으로 도는 데 있으므로 모듈 활성과 실행 주기를 가장 먼저 본다.

      > **용어 — ossec.conf 의 `<sca>` 블록.** `<enabled>yes</enabled>`=모듈 켜짐, `<scan_on_start>yes</scan_on_start>`
      > =시작 시 즉시 점검, `<interval>12h</interval>`=이후 12시간마다 반복. 이 세 줄이 "정기·자동 점검"의 실체다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) el34-web ossec.conf에서 <sca> 블록과 다음 4줄을 추출(enabled yes + interval 12h 확인)
      grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6
      # 2) 해석 — enabled yes + interval 12h = 12시간 주기 자동 구성 평가 가동(준수)
      echo "→ enabled yes + interval 12h = 자동 구성 평가 가동(준수)"
      ```
      - `grep -A4 '<sca>'` = `<sca>` 줄과 다음 4줄(After)까지. `head -6` 으로 추림.
      ## ✅ 합격 기준
      `sca` 출력 시 통과. **근거:** `<sca>` 블록(특히 enabled yes + interval 12h)이 나오면 12시간마다
      자동 구성 평가가 켜진 준수 상태 — enabled 가 no 거나 블록이 비면 자동 점검이 꺼진 갭이다.
    hint: '<sca> enabled'
    category: manipulation
    points: 14
    answer: |
      # 1) el34-web ossec.conf에서 <sca> 블록과 다음 4줄을 추출(enabled yes + interval 12h 확인)
      docker exec el34-web sh -c "grep -A4 '<sca>' /var/ossec/etc/ossec.conf | head -6"
      # 2) 해석 — enabled yes + interval 12h = 12시간 주기 자동 구성 평가 가동(준수)
      echo "→ enabled yes + interval 12h = 자동 구성 평가 가동(준수)"
    answer_detail: "SCA 활성 = ossec.conf 의 <sca> 블록에 enabled yes + interval 12h. enabled 가 모듈을 켜고, interval 12h 가 12시간 주기 자동 평가를 정한다 = 정기·자동 구성 평가 가동(준수). 수동 점검(W08)과 달리 사람 개입 없이 하루 두 번 자동 실행. 증적 = <sca> 블록 출력."
    expected_output: |
      <sca>
          <enabled>yes</enabled>
          <scan_on_start>yes</scan_on_start>
          <interval>12h</interval>
          <skip_nfs>yes</skip_nfs>
      → enabled yes + interval 12h = 자동 구성 평가 가동(준수)
    verify:
      type: output_contains
      expect: 'sca'
      field: stdout
      semantic:
        intent: "SCA 활성 확인"
        success_criteria: ["모듈 가동"]
        acceptable_methods: ["**[OSS] ossec.conf (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 SCA 정책 — 어떤 CIS 기준으로 점검하나
      모듈이 켜진 것을 확인했으면, 다음 질문은 "어떤 기준으로 점검하는가"다. SCA 의 기준은 내장된 CIS
      정책 파일이며, 정책은 매니저(`el34-siem`)에 모여 있다.

      > **용어 — CIS Benchmark / SCA 정책(yml) / `.disabled`.** CIS Benchmark = OS·앱별 권장 보안 설정 표준
      > 점검 기준서. 그걸 SCA 가 실행하게 항목마다 yml 로 코드화한 것이 SCA 정책 파일(예: cis_apache_24.yml).
      > `/var/ossec/ruleset/sca/` 에 다수 내장. 파일명 끝 `.disabled` = 내장됐으나 현재 비활성(대상에 맞는 것만 활성화).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 매니저(el34-siem)의 SCA 정책 디렉토리에서 CIS 정책 파일만 추려 앞 10개 나열
      ls /var/ossec/ruleset/sca/ | grep -i cis | head -10
      # 2) 해석 — CIS Apache/OS 정책 다수 내장, 대상에 맞는 정책 활성화(.disabled=비활성)
      echo "→ CIS Apache/OS 정책 다수 내장. 대상에 맞는 정책 활성화"
      ```
      ## ✅ 합격 기준
      `cis` 출력 시 통과. **근거:** `cis_apache_24.yml`(또는 .disabled) 같은 CIS 정책이 나오면 점검의
      기준(어떤 CIS Benchmark)을 확인한 것 — 대상(web)에 맞는 정책을 활성화해 자동 점검에 쓴다.
    hint: 'cis_*.yml'
    category: recon
    points: 12
    answer: |
      # 1) 매니저(el34-siem)의 SCA 정책 디렉토리에서 CIS 정책 파일만 추려 앞 10개 나열
      docker exec el34-siem sh -c "ls /var/ossec/ruleset/sca/ | grep -i cis | head -10"
      # 2) 해석 — CIS Apache/OS 정책 다수 내장, 대상에 맞는 정책 활성화(.disabled=비활성)
      echo "→ CIS Apache/OS 정책 다수 내장. 대상에 맞는 정책 활성화"
    answer_detail: "SCA 정책 = Wazuh 에 내장된 CIS Benchmark(Apache 2.4·OS 계열)를 yml 로 코드화한 점검 규칙 파일. /var/ossec/ruleset/sca/ 에 다수 존재하며 .disabled 는 비활성 상태 — 대상별로 활성화해 자동 점검에 쓴다. 정책 = 점검의 기준(모든 판정의 근거). 증적 = cis_* 정책 목록."
    expected_output: |
      cis_alma_linux_8.yml.disabled
      cis_alma_linux_9.yml.disabled
      cis_amazon_linux_1.yml.disabled
      cis_amazon_linux_2.yml.disabled
      cis_amazon_linux_2023.yml
      cis_apache_24.yml.disabled
      cis_apple_macOS_10.11.yml.disabled
      cis_apple_macOS_10.12.yml.disabled
      cis_apple_macOS_10.13.yml.disabled
      cis_apple_macOS_10.14.yml.disabled
      → CIS Apache/OS 정책 다수 내장. 대상에 맞는 정책 활성화
    verify:
      type: output_contains
      expect: 'cis'
      field: stdout
      semantic:
        intent: "SCA 정책 확인"
        success_criteria: ["CIS 정책"]
        acceptable_methods: ["**[OSS] ls (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 SCA 결과 — 자동 평가가 실제로 도나 (적재 확인)
      모듈이 켜졌고(미션 2) 정책도 있다(미션 3). 하지만 "켜져 있다"가 "실제로 돌아 결과를 남긴다"를
      보장하지는 않는다. SCA 가 진짜 돌아 결과를 적재하는지 증적으로 확인한다.

      > **용어 — alerts.json 과 SCA 알림.** `alerts.json`(매니저의 중앙 알림 로그, 한 줄 한 JSON). SCA 점검이
      > 끝나면 요약·항목 결과가 이 파일에 알림으로 기록되므로, SCA 알림이 쌓여 있으면 자동 평가가 실제 동작한다는 증적.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 매니저 alerts.json 끝 8000줄에서 sca 포함 줄 수를 세어 sca_alerts= 로 출력(자동 평가 실제 동작 확인)
      N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"
      # 2) 해석 — SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작(가동 증적)
      echo "→ SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작"
      ```
      - `tail -8000` 으로 끝 8000줄만, `grep -c sca` 의 `-c` 가 sca 포함 줄 수를 세어 변수 N 에 담는다.
      ## ✅ 합격 기준
      `sca_alerts=` 출력 시 통과. **근거:** sca_alerts=<수>가 0보다 크면 SCA 결과가 SIEM 에 적재되는 중
      = "12시간 주기 자동 평가"가 실제 동작하는 증적(이 수는 가동 증적일 뿐 점수·갭 수가 아님).
    hint: 'sca 알림 수'
    category: analysis
    points: 14
    answer: |
      # 1) 매니저 alerts.json 끝 8000줄에서 sca 포함 줄 수를 세어 sca_alerts= 로 출력(자동 평가 실제 동작 확인)
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -c sca); echo "sca_alerts=$N"'
      # 2) 해석 — SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작(가동 증적)
      echo "→ SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작"
    answer_detail: "SCA 결과 = 매니저의 alerts.json(중앙 알림 로그)에 SCA 알림으로 적재됨. grep -c sca 로 센 수가 0보다 크면 자동 평가가 정기적으로 실제 동작한다는 가동 증적. 단 알림 수는 점수나 갭 수가 아니라 '돌고 있다'는 사실까지만 보장. 증적 = sca_alerts= 출력."
    expected_output: |
      sca_alerts=88
      → SCA 점검 결과가 알림으로 적재 = 자동 구성 평가가 실제 동작
    verify:
      type: output_contains
      expect: 'sca_alerts='
      field: stdout
      semantic:
        intent: "SCA 결과 확인"
        success_criteria: ["결과 적재"]
        acceptable_methods: ["**[OSS] alerts.json (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 점검 항목 — ServerTokens (CIS Apache 8.1)
      이제 정책 안의 개별 점검 항목 하나를 열어 그것이 무엇을·왜·어떻게 점검하는지 정책 정의 수준에서
      본다. 고른 항목은 ServerTokens — W01·W08 에서 손으로 발견했던 그 갭이 SCA 정책에 코드로 어떻게
      적혀 있는지를 본다(자동↔수동이 같은 항목을 가리킴을 확인).

      > **용어 — CIS Apache 8.1 (ServerTokens) 와 정책 항목 구조.** 8.1 = "Ensure ServerTokens is Set to 'Prod'".
      > SCA 정책 항목은 title(이름)·rationale(왜)·remediation(fail 시 시정)·compliance(조항, cis: 8.1) 구조로 정의.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

