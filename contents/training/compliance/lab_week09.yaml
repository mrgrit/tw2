      ## 🎯 수동 검증 — fail 을 실제 설정으로 확정 (W09 의 정점)
      SCA 가 어떤 항목을 fail 로 찍었다고 곧장 "갭 확정"은 아니다 — 정책 가정과 실제가 다르면 오탐(준수인데
      fail) 일 수 있다. 감사자는 fail 을 실제 설정 파일로 직접 재확인해 오탐을 거르고 진짜 갭임을 증적으로
      확정한다. "자동으로 넓게, 수동으로 깊게"의 깊은 쪽이자 W09 의 정점이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) SCA가 fail로 본 ServerTokens를 실제 Apache 설정으로 재확인 — actual 값 출력 후 Prod 아니면 fail=not_Prod
      V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "actual:$V"; echo "$V" | grep -qi "Prod" && echo "pass" || echo "fail=not_Prod"
      # 2) 해석 — 실제 ServerTokens OS → CIS(Prod) 미달 = SCA fail과 일치(오탐 아닌 갭으로 확정)
      echo "→ 실제 ServerTokens OS → CIS(Prod) 미달 = SCA fail과 일치. 자동 결과를 증적으로 확정"
      ```
      - `grep -rhiE`(재귀·파일명 숨김·대소문자 무시·확장정규식)로 실제 ServerTokens 줄을 V 에 담아 Prod 여부 판정.
      ## ✅ 합격 기준
      `fail=` 출력 시 통과. **근거:** fail=not_Prod 면 실제 설정 ServerTokens OS 가 CIS Prod 미달 = SCA
      자동 fail 과 수동 검증 결과가 일치 → 오탐이 아닌 실제 갭으로 확정(증적: 실제 설정값).
