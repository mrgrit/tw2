      오탐을 거르고 진짜 갭임을 증적으로 확정한다. 이것이 "자동으로 넓게, 수동으로 깊게"의 깊은 쪽이자
      W09 의 정점이다.

      > **용어 — 자동 점검 vs 수동 검증.** **자동 점검(SCA)** 은 Wazuh 가 정책을 읽어 수백 항목을
      > 빠짐없이 훑어 pass/fail 을 낸다(넓지만 오탐 가능). **수동 검증** 은 사람이 그 한 항목을 실제
      > 설정으로 다시 확인한다(좁지만 정확). 둘은 대립이 아니라 한 쌍이다 — SCA 가 fail 을 쏟아내면,
      > 감사자가 우선순위 높은 fail 을 골라 수동으로 확정한다. 자동 결과와 수동 결과가 **일치**해야
      > fail 이 비로소 "증적이 붙은 갭"이 된다.
      ## 💻 실행 명령
      `grep -rhiE`(`-r` 재귀·`-h` 파일명 숨김·`-i` 대소문자 무시·`-E` 확장정규식)로 Apache 설정에서
      실제 `ServerTokens` 줄을 찾아 변수 `V` 에 담고, `actual:` 로 그 값을 보여준 뒤 `grep -qi "Prod"`
      로 권고치 `Prod` 인지 판정한다(`-q` = 조용히 종료코드만). Prod 면 `pass`, 아니면 `fail=not_Prod`.
      ```bash
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "actual:$V"; echo "$V" | grep -qi "Prod" && echo "pass" || echo "fail=not_Prod"'
      ```
