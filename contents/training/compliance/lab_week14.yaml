    answer_detail: "부적합(NC) 관리 = 발견(증적 기반)→근본원인 분석→시정조치(CAPA)+재발방지→조치 완료 증적→후속 심사 확인. Major(중부적합, 인증 보류급)/Minor(경부적합, 기한 내 시정) 구분. CAPA = 시정(현재 해결)+예방(재발 방지). 부적합은 처벌이 아니라 근본원인을 제거하는 개선 기회. 증적 = CAPA 포함 출력."
