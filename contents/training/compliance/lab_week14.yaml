      # 3) 시정조치(CAPA) + 재발방지
      echo "3) 시정조치(CAPA) + 재발방지"
      # 4) 조치 완료 증적 → 후속 심사 확인
      echo "4) 조치 완료 증적 → 후속 심사 확인"
      # 5) 구분 — 중부적합(Major)/경부적합(Minor), 기한 내 조치 의무
      echo "구분: 중부적합(Major)/경부적합(Minor), 기한 내 조치 의무"
      # 6) 결론 — 부적합은 처벌이 아니라 개선 기회(근본원인 제거)
      echo "→ 부적합은 처벌이 아니라 개선 기회(근본원인 제거)"
      ```
      ## ✅ 합격 기준
      `CAPA` 출력 시 통과. **근거:** 발견→근본원인→CAPA→조치 증적→후속 확인 순환과 Major/Minor 구분이
      정리되면 통과 — 부적합은 처벌이 아니라 근본원인을 제거하는 개선 기회임을 짚는다.
