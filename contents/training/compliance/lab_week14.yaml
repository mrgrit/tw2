lab_id: standalone-compliance-week14
title: "감사와 증적 수집 — 재현성·무결성·추적성"
version: standalone-compliance
course: compliance
week: 14
description: |
  감사(ISO 19011)와 증적 수집 실습 — 점검 결과를 "증거능력 있는 증적"으로 전환하는 기술을 손에 익힌다.
  el34-web 의 보안 설정 파일에 sha256sum(무결성)+date -u(추적)+명령(재현)을 함께 남겨 증적 3요건을 충족시키고,
  내부감사 vs 인증심사(ISMS-P/ISO)의 차이, 감사 계획(범위·기준·체크리스트), 부적합(NC)/CAPA(시정·예방) 관리,
  감사 체계 방어, 감사 보고서까지 한 바퀴 돈다. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서
  docker exec 로 실행하며 신규 설치는 없다(기존 OS 명령 sha256sum/date/hostname/echo 만 사용).
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W13 통과 (영역별 점검 역량을 증적으로 전환하는 주차)"
  - "el34 호스트 SSH 접속 + docker exec 사용 가능"
  - "lecture §2(증적 수집) §3(3요건) §4(내부감사/인증심사) §6(부적합/CAPA) 숙지"
objectives:
  - "sha256sum+date -u 로 재현·무결성·추적 3요건을 갖춘 증적을 직접 수집한다"
  - "내부감사(1자·개선)와 인증심사(3자·ISMS-P/ISO 인증)의 목적·주체·주기 차이를 구분한다"
  - "부적합(NC)을 근본원인 분석→CAPA(시정·예방)→후속 확인으로 관리하고 Major/Minor 를 구분한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 증적 수집 대상 도달성 확인
      감사의 전제는 표적에 접근이 된다는 것이다. 본격 증적 수집 전, 감사자는 항상 대상이
      실제로 가동·점검 가능한 상태인지부터 확인한다(접근이 안 되면 모든 음성 결과가 무의미).

      ## 💡 개념 한 줄
      증적 수집 대상은 `el34-web`(dmz 계층 Apache+ModSecurity 컨테이너)이며, 그 보안 설정이
      본 주차 증적의 원천이다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web ...` — el34 호스트에서 web 컨테이너 안의 명령을 실행한다.
      - `hostname` — 컨테이너가 살아 응답하는지 확인(증적 대상의 신원).

      ## ✅ 합격 기준
      출력에 `target_ok` 가 보이면 대상 접근 성공. 응답이 없으면 호스트 SSH·컨테이너
      상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "감사 증적 수집 대상 = el34-web(dmz Apache+ModSec). 도달성 확인은 모든 감사의 전제 — 접근 불가 시 음성 결과가 무의미하므로 본격 수집 전 첫 단계로 둔다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 증거능력 있는 증적 수집(해시 + 시각)
      본 주차의 핵심 기술. 설정 파일을 그냥 캡처하는 것과, **해시(무결성) + 수집 시각(추적) +
      명령(재현)** 을 함께 남기는 것의 차이가 곧 "감사에서 인정되는 증적"과 "그냥 메모"의 차이다.

      ## 💡 개념 한 줄
      증적 = 해시(무결성) + 시각·대상(추적) + 명령(재현). 셋이 한 묶음이어야 증거능력이 생긴다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "sha256sum /etc/apache2/conf-available/security.conf | cut -c1-32; date -u +%Y-%m-%dT%H:%M:%SZ; echo evidence_collected"
      ```
      - `sha256sum <파일>` — SHA-256(256비트, 64자리 16진수) 지문을 출력. 파일이 1비트만 바뀌어도
        값이 완전히 달라져 변조를 잡아낸다 → **무결성**. (`cut -c1-32` 는 화면 표시용으로 앞 32자만
        보여줄 뿐, 무결성 원리는 동일.)
      - `date -u +%Y-%m-%dT%H:%M:%SZ` — 수집 시각을 UTC(세계 표준시)·ISO 8601 형식(끝의 `Z`=UTC)으로
        기록 → **추적**. 로컬 시간 대신 UTC 를 쓰는 이유는 여러 시스템 로그의 시간 순서를 맞추기 위함.
      - 명령 자체를 알므로 누구든 다시 실행하면 같은 절차로 검증 가능 → **재현**.

      ## ✅ 합격 기준
      출력에 `evidence_collected` 가 나오고 그 앞에 파일 해시와 UTC 시각이 함께 보이면 성공. 파일을
      못 읽으면 경로(`/etc/apache2/conf-available/`)·권한을 점검한다.
    hint: 'sha256sum + date'
    category: manipulation
    points: 16
    answer: |
      echo "=== 증적 수집 (해시+시각) ==="
      docker exec el34-web sh -c "echo '대상: /etc/apache2/conf-available/security.conf'; sha256sum /etc/apache2/conf-available/security.conf | cut -c1-40; date -u +%Y-%m-%dT%H:%M:%SZ; echo evidence_collected"
      echo "→ 파일 해시(무결성) + UTC 시각(추적) + 명령(재현) = 감사 인정 증적"
    answer_detail: "증적 수집 = 해시(무결성)+시각/대상(추적)+명령(재현). 3요건 충족 증거."
    verify:
      type: output_contains
      expect: 'evidence_collected'
      field: stdout
      semantic:
        intent: "증적 수집"
        success_criteria: ["해시+시각"]
        acceptable_methods: ["**[OSS] sha256sum (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 증적 3요건
      ## 💻 실행 명령
      ```bash
      echo "재현성(같은 절차→같은 결과), 무결성(해시/서명), 추적성(누가/언제/무엇)"
      ```
      ## ✅ 합격 기준
      증적의 3요건을 정리한다.
    hint: '재현/무결성/추적'
    category: analysis
    points: 12
    answer: |
      echo "=== 증적 3요건 ==="
      echo "재현성: 같은 점검 반복 시 같은 결과(명령·절차 명시)"
      echo "무결성: 해시/서명으로 수집 후 변조 없음 증명"
      echo "추적성: 누가·언제·어디서·무엇을(메타데이터)"
      echo "→ 3요건 미충족 증적은 감사에서 불인정"
    answer_detail: "증적 3요건 = 재현성+무결성+추적성. 하나라도 빠지면 증거능력 약화."
    verify:
      type: output_contains
      expect: '무결성'
      field: stdout
      semantic:
        intent: "증적 3요건"
        success_criteria: ["재현/무결성/추적"]
        acceptable_methods: ["**[표준] 증적 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 내부감사 vs 인증심사
      ## 💻 실행 명령
      ```bash
      echo "내부감사(자체/개선목적), 인증심사(외부기관 ISMS-P/ISO, 최초/사후/갱신). 둘 다 독립성+증적"
      ```
      ## ✅ 합격 기준
      내부감사와 인증심사를 구분한다.
    hint: '내부/인증'
    category: analysis
    points: 12
    answer: |
      echo "=== 내부감사 vs 인증심사 ==="
      echo "내부감사: 조직 자체 점검(연 1회+), 개선 목적, 독립 부서 수행"
      echo "인증심사: 외부 심사기관(ISMS-P/ISO) — 최초/사후/갱신 심사"
      echo "공통: 객관성(독립성) + 증적 기반 판정"
      echo "→ 내부감사로 미리 갭을 닫아야 인증심사 통과율 상승"
    answer_detail: "내부감사(자체/개선) vs 인증심사(외부기관). 둘 다 독립성+증적 기반."
    verify:
      type: output_contains
      expect: '인증심사'
      field: stdout
      semantic:
        intent: "감사 유형"
        success_criteria: ["내부/인증 구분"]
        acceptable_methods: ["**[표준] 감사 유형 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 감사 계획
      ## 💻 실행 명령
      ```bash
      echo "범위(대상/기간), 기준(ISMS-P/CIS), 체크리스트, 일정, 감사팀(독립성)"
      ```
      ## ✅ 합격 기준
      감사 계획 요소를 정리한다.
    hint: '범위/기준/체크리스트'
    category: report
    points: 12
    answer: |
      echo "=== 감사 계획 ==="
      echo "범위: 대상 시스템/조직/기간"
      echo "기준: ISMS-P/ISO/CIS 등 점검 기준"
      echo "체크리스트: 통제 항목별 점검 항목"
      echo "일정 + 감사팀(피감부서와 독립)"
      echo "→ 계획 없는 감사는 누락·중복. 기준 기반 체크리스트가 핵심"
    answer_detail: "감사 계획 = 범위+기준+체크리스트+일정+독립 감사팀. 기준 기반 점검."
    verify:
      type: output_contains
      expect: '체크리스트'
      field: stdout
      semantic:
        intent: "감사 계획"
        success_criteria: ["범위/기준"]
        acceptable_methods: ["**[표준] 감사 계획 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 부적합(NC) 관리 — CAPA
      ## 💻 실행 명령
      ```bash
      echo "부적합→근본원인 분석→시정조치(CAPA)→증적과 조치 완료→후속 확인. 중/경부적합 구분"
      ```
      ## ✅ 합격 기준
      부적합 관리(CAPA) 흐름을 정리한다.
    hint: 'NC/CAPA/시정조치'
    category: report
    points: 12
    answer: |
      echo "=== 부적합(NC) 관리 ==="
      echo "1) 부적합 발견(증적 기반)"
      echo "2) 근본원인 분석(왜 발생했나)"
      echo "3) 시정조치(CAPA) + 재발방지"
      echo "4) 조치 완료 증적 → 후속 심사 확인"
      echo "구분: 중부적합(Major)/경부적합(Minor), 기한 내 조치 의무"
      echo "→ 부적합은 처벌이 아니라 개선 기회(근본원인 제거)"
    answer_detail: "부적합 관리 = 발견→근본원인→CAPA→조치증적→후속확인. Major/Minor 구분."
    verify:
      type: output_contains
      expect: 'CAPA'
      field: stdout
      semantic:
        intent: "부적합 관리"
        success_criteria: ["NC/CAPA"]
        acceptable_methods: ["**[표준] CAPA (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 감사 체계
      ## 💻 실행 명령
      ```bash
      echo "정기 내부감사 + 증적 자동수집 + 부적합 추적(CAPA) + 인증심사 대비 + 증적 보관"
      ```
      ## ✅ 합격 기준
      감사 체계 방어를 정리한다.
    hint: '내부감사/증적/CAPA'
    category: report
    points: 12
    answer: |
      echo "=== 감사 체계 방어 ==="
      echo "1) 정기 내부감사(연간 계획)"
      echo "2) 증적 자동 수집(해시+시각, 스크립트화)"
      echo "3) 부적합 추적(CAPA 대장) + 기한 관리"
      echo "4) 인증심사 대비(사전 갭 분석)"
      echo "5) 증적 보관(기간/무결성)"
      echo "→ 핵심: 증적의 상시 확보 + 부적합의 추적·폐쇄"
    answer_detail: "방어 = 정기 내부감사+증적 자동수집+CAPA 추적+심사 대비+증적 보관."
    verify:
      type: output_contains
      expect: '내부감사'
      field: stdout
      semantic:
        intent: "감사 체계 방어"
        success_criteria: ["감사/증적/CAPA"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 감사 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W14 감사 보고서 (학번, 이름)
      ## 1. 증적 수집(해시+시각)/3요건
      ## 2. 감사 계획/유형
      ## 3. 부적합(CAPA)
      ```
      ## ✅ 합격 기준
      보고서에 증적 + 감사 계획 + 부적합 관리가 포함된다.
    hint: '증적+계획+CAPA'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W14 감사 보고서
      ## 1. 증적: security.conf 해시+UTC 시각 수집(재현/무결성/추적 충족)
      ## 2. 감사: 내부감사(자체)→인증심사(ISMS-P/ISO). 계획=범위+기준+체크리스트
      ## 3. 부적합: 발견→근본원인→CAPA→조치증적→후속확인(Major/Minor)
      ## 결론: 증명할 수 없으면 하지 않은 것. 무결성 있는 증적과 부적합 추적이 감사의 핵심
      EOF
    answer_detail: "감사 보고 = 증적(해시)+감사 계획/유형+부적합(CAPA). 증적이 모든 판정의 근거."
    verify:
      type: output_contains
      expect: 'CAPA'
      field: stdout
      semantic:
        intent: "감사 보고"
        success_criteria: ["증적/계획/부적합"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
