lab_id: standalone-compliance-week14
title: "감사와 증적 수집 — 재현성·무결성·추적성"
version: standalone-compliance
course: compliance
week: 14
description: |
  감사(ISO 19011)와 증적 수집 실습 — 점검 결과를 "증거능력 있는 증적"으로 전환하는 기술을 손에 익힌다.
  el34-web 의 보안 설정 파일에 sha256sum(무결성)+date -u(추적)+명령(재현)을 함께 남겨 증적 3요건을 충족시키고,
  내부감사 vs 인증심사(ISMS-P/ISO)의 차이, 감사 계획(범위·기준·체크리스트), 부적합(NC)/CAPA(시정·예방) 관리,
  감사 체계 방어, 감사 보고서까지 한 바퀴 돈다. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서
  docker exec 로 실행하며 신규 설치는 없다(기존 OS 명령 sha256sum/date/hostname/echo 만 사용).
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W13 통과 (영역별 점검 역량을 증적으로 전환하는 주차)"
  - "el34 호스트 SSH 접속 + docker exec 사용 가능"
  - "lecture §2(증적 수집) §3(3요건) §4(내부감사/인증심사) §6(부적합/CAPA) 숙지"
objectives:
  - "sha256sum+date -u 로 재현·무결성·추적 3요건을 갖춘 증적을 직접 수집한다"
  - "내부감사(1자·개선)와 인증심사(3자·ISMS-P/ISO 인증)의 목적·주체·주기 차이를 구분한다"
  - "부적합(NC)을 근본원인 분석→CAPA(시정·예방)→후속 확인으로 관리하고 Major/Minor 를 구분한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 증적 수집 대상 도달성 확인
      감사의 전제는 표적에 접근이 된다는 것이다. 본격 증적 수집 전, 감사자는 항상 대상이
      실제로 가동·점검 가능한 상태인지부터 확인한다(접근이 안 되면 모든 음성 결과가 무의미).

      ## 💡 개념 한 줄
      증적 수집 대상은 `el34-web`(dmz 계층 Apache+ModSecurity 컨테이너)이며, 그 보안 설정이
      본 주차 증적의 원천이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 증적 수집 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web ...`(web 컨테이너 안에서 실행), `hostname`(증적 대상의 신원·응답 확인).
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 보이면 증적 대상(el34-web) 접근 성공 — 응답이
      없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 증적 수집 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "감사 증적 수집 대상 = el34-web(dmz Apache+ModSec). 도달성 확인은 모든 감사의 전제 — 접근 불가 시 음성 결과가 무의미하므로 본격 수집 전 첫 단계로 둔다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 증거능력 있는 증적 수집(해시 + 시각)
      본 주차의 핵심 기술. 설정 파일을 그냥 캡처하는 것과, **해시(무결성) + 수집 시각(추적) +
      명령(재현)** 을 함께 남기는 것의 차이가 곧 "감사에서 인정되는 증적"과 "그냥 메모"의 차이다.

      ## 💡 개념 한 줄
      증적 = 해시(무결성) + 시각·대상(추적) + 명령(재현). 셋이 한 묶음이어야 증거능력이 생긴다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 대상 파일 명시 + sha256(무결성) + UTC 시각(추적) + 완료 마커를 한 번에 — 증적 3요건을 한 묶음으로 남김
      docker exec el34-web sh -c "echo '대상: /etc/apache2/conf-available/security.conf'; sha256sum /etc/apache2/conf-available/security.conf | cut -c1-40; date -u +%Y-%m-%dT%H:%M:%SZ; echo evidence_collected"
      # 2) 해석 — 파일 해시(무결성) + UTC 시각(추적) + 명령(재현) = 감사 인정 증적
      echo "→ 파일 해시(무결성) + UTC 시각(추적) + 명령(재현) = 감사 인정 증적"
      ```
      - `sha256sum <파일>`(1비트만 바뀌어도 값이 달라지는 256비트 지문=무결성), `date -u +...Z`(UTC·ISO 8601 수집 시각=추적), 명령 자체(누구든 재실행 가능=재현).
      ## ✅ 합격 기준
      `evidence_collected` 출력 시 통과. **근거:** 파일 해시 + UTC 시각 + 완료 마커가 함께 나오면 재현·
      무결성·추적 3요건을 갖춘 증적을 수집한 것 — 파일을 못 읽으면 경로·권한을 점검한다.
    hint: 'sha256sum + date'
    category: manipulation
    points: 16
    answer: |
      # 1) 대상 파일 명시 + sha256(무결성) + UTC 시각(추적) + 완료 마커를 한 번에 — 증적 3요건을 한 묶음으로 남김
      docker exec el34-web sh -c "echo '대상: /etc/apache2/conf-available/security.conf'; sha256sum /etc/apache2/conf-available/security.conf | cut -c1-40; date -u +%Y-%m-%dT%H:%M:%SZ; echo evidence_collected"
      # 2) 해석 — 파일 해시(무결성) + UTC 시각(추적) + 명령(재현) = 감사 인정 증적
      echo "→ 파일 해시(무결성) + UTC 시각(추적) + 명령(재현) = 감사 인정 증적"
    answer_detail: "증적 수집 = 해시(무결성)+시각/대상(추적)+명령(재현). sha256sum(변조 탐지)·date -u(UTC 수집 시각)·대상 파일 명시를 한 묶음으로 남겨 3요건을 충족한 증거. 셋이 함께라야 '감사 인정 증적'이 된다. 증적 = evidence_collected + 해시 + UTC 시각."
    verify:
      type: output_contains
      expect: 'evidence_collected'
      field: stdout
      semantic:
        intent: "증적 수집"
        success_criteria: ["해시+시각"]
        acceptable_methods: ["**[OSS] sha256sum (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 증적 3요건 — 무엇이 증적을 증적으로 만드나
      미션 2 에서 손으로 만든 증적이 "왜" 인정되는지를 원리로 정리한다. 증적은 재현성·무결성·추적성의
      세 요건을 갖춰야 증거능력을 가진다 — 하나라도 빠지면 "그냥 메모"로 떨어진다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 재현성 — 같은 점검 반복 시 같은 결과(명령·절차 명시)
      echo "재현성: 같은 점검 반복 시 같은 결과(명령·절차 명시)"
      # 2) 무결성 — 해시/서명으로 수집 후 변조 없음 증명
      echo "무결성: 해시/서명으로 수집 후 변조 없음 증명"
      # 3) 추적성 — 누가·언제·어디서·무엇을(메타데이터)
      echo "추적성: 누가·언제·어디서·무엇을(메타데이터)"
      # 4) 결론 — 3요건 미충족 증적은 감사에서 불인정
      echo "→ 3요건 미충족 증적은 감사에서 불인정"
      ```
      ## ✅ 합격 기준
      `무결성` 출력 시 통과. **근거:** 재현성·무결성·추적성 3요건이 정리되면 통과 — 미션 2 의 명령(재현)·
      sha256(무결성)·date(추적)이 각 요건에 어떻게 대응하는지 짚으면 더 좋다.
    hint: '재현/무결성/추적'
    category: analysis
    points: 12
    answer: |
      # 1) 재현성 — 같은 점검 반복 시 같은 결과(명령·절차 명시)
      echo "재현성: 같은 점검 반복 시 같은 결과(명령·절차 명시)"
      # 2) 무결성 — 해시/서명으로 수집 후 변조 없음 증명
      echo "무결성: 해시/서명으로 수집 후 변조 없음 증명"
      # 3) 추적성 — 누가·언제·어디서·무엇을(메타데이터)
      echo "추적성: 누가·언제·어디서·무엇을(메타데이터)"
      # 4) 결론 — 3요건 미충족 증적은 감사에서 불인정
      echo "→ 3요건 미충족 증적은 감사에서 불인정"
    answer_detail: "증적 3요건 = 재현성(같은 절차→같은 결과·명령 명시)+무결성(해시/서명으로 변조 없음 증명)+추적성(누가·언제·어디서·무엇을 메타데이터). 미션 2 의 명령=재현·sha256=무결성·date -u=추적에 대응. 하나라도 빠지면 증거능력이 약화돼 감사에서 불인정. 증적 = 무결성 포함 출력."
    verify:
      type: output_contains
      expect: '무결성'
      field: stdout
      semantic:
        intent: "증적 3요건"
        success_criteria: ["재현/무결성/추적"]
        acceptable_methods: ["**[표준] 증적 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 내부감사 vs 인증심사 — 누가·왜·언제 보나
      감사는 누가 무슨 목적으로 하느냐에 따라 성격이 다르다. 조직 스스로 개선을 위해 하는 내부감사와,
      외부 기관이 인증을 위해 하는 인증심사를 구분한다.

      > **용어 — 내부감사(1자) / 인증심사(3자).** 내부감사 = 조직 자체가 개선 목적으로(연 1회+). 인증심사 =
      > 외부 심사기관(ISMS-P/ISO)이 인증 부여를 위해(최초/사후/갱신). 둘 다 독립성 + 증적 기반 판정이 공통.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 내부감사 — 조직 자체 점검(연 1회+), 개선 목적, 독립 부서 수행
      echo "내부감사: 조직 자체 점검(연 1회+), 개선 목적, 독립 부서 수행"
      # 2) 인증심사 — 외부 심사기관(ISMS-P/ISO) 최초/사후/갱신 심사
      echo "인증심사: 외부 심사기관(ISMS-P/ISO) — 최초/사후/갱신 심사"
      # 3) 공통 — 객관성(독립성) + 증적 기반 판정
      echo "공통: 객관성(독립성) + 증적 기반 판정"
      # 4) 결론 — 내부감사로 미리 갭을 닫아야 인증심사 통과율 상승
      echo "→ 내부감사로 미리 갭을 닫아야 인증심사 통과율 상승"
      ```
      ## ✅ 합격 기준
      `인증심사` 출력 시 통과. **근거:** 내부감사(자체·개선)와 인증심사(외부기관·인증)의 목적·주체·주기
      차이가 정리되면 통과 — 둘 다 독립성 + 증적 기반이라는 공통점도 함께 짚는다.
    hint: '내부/인증'
    category: analysis
    points: 12
    answer: |
      # 1) 내부감사 — 조직 자체 점검(연 1회+), 개선 목적, 독립 부서 수행
      echo "내부감사: 조직 자체 점검(연 1회+), 개선 목적, 독립 부서 수행"
      # 2) 인증심사 — 외부 심사기관(ISMS-P/ISO) 최초/사후/갱신 심사
      echo "인증심사: 외부 심사기관(ISMS-P/ISO) — 최초/사후/갱신 심사"
      # 3) 공통 — 객관성(독립성) + 증적 기반 판정
      echo "공통: 객관성(독립성) + 증적 기반 판정"
      # 4) 결론 — 내부감사로 미리 갭을 닫아야 인증심사 통과율 상승
      echo "→ 내부감사로 미리 갭을 닫아야 인증심사 통과율 상승"
    answer_detail: "내부감사(1자, 조직 자체·개선 목적·연 1회+·독립 부서) vs 인증심사(3자, 외부 심사기관 ISMS-P/ISO·인증 부여·최초/사후/갱신). 공통 = 객관성(독립성) + 증적 기반 판정. 내부감사로 미리 갭을 닫아야 인증심사 통과율이 오른다. 증적 = 인증심사 포함 출력."
    verify:
      type: output_contains
      expect: '인증심사'
      field: stdout
      semantic:
        intent: "감사 유형"
        success_criteria: ["내부/인증 구분"]
        acceptable_methods: ["**[표준] 감사 유형 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 감사 계획 — 범위·기준·체크리스트
      계획 없는 감사는 누락과 중복을 부른다. 감사를 시작하기 전에 무엇을(범위)·무슨 기준으로(기준)·
      어떤 항목으로(체크리스트) 볼지를 먼저 정한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 범위 — 대상 시스템/조직/기간
      echo "범위: 대상 시스템/조직/기간"
      # 2) 기준 — ISMS-P/ISO/CIS 등 점검 기준
      echo "기준: ISMS-P/ISO/CIS 등 점검 기준"
      # 3) 체크리스트 — 통제 항목별 점검 항목
      echo "체크리스트: 통제 항목별 점검 항목"
      # 4) 일정 + 감사팀(피감부서와 독립)
      echo "일정 + 감사팀(피감부서와 독립)"
      # 5) 결론 — 계획 없는 감사는 누락·중복. 기준 기반 체크리스트가 핵심
      echo "→ 계획 없는 감사는 누락·중복. 기준 기반 체크리스트가 핵심"
      ```
      ## ✅ 합격 기준
      `체크리스트` 출력 시 통과. **근거:** 범위·기준·체크리스트·일정·독립 감사팀이 정리되면 통과 —
      기준(ISMS-P/CIS)에서 도출한 체크리스트가 누락·중복 없는 감사의 핵심이다.
    hint: '범위/기준/체크리스트'
    category: report
    points: 12
    answer: |
      # 1) 범위 — 대상 시스템/조직/기간
