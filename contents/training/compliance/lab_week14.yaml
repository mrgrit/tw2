      ## 🎯 부적합(NC) 관리 — CAPA
      감사에서 발견한 부적합(NC, Non-Conformity)은 그 자체로 끝이 아니라 닫아야(close) 한다. 발견 →
      근본원인 → 시정·예방조치(CAPA) → 조치 증적 → 후속 확인의 순환으로 관리한다.

      > **용어 — NC / CAPA / Major·Minor.** NC = 기준 미충족(부적합). CAPA(Corrective And Preventive Action)
      > = 시정(현재 문제 해결) + 예방(재발 방지). Major(중부적합)는 인증 보류급, Minor(경부적합)는 기한 내 시정.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
