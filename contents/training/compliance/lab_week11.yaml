      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "incidents=$N"'
      # 2) 해석 — Wazuh 고위험 알림 = IR 탐지 단계 입력. 탐지 없는 IR은 시작 불가
      echo "→ Wazuh 고위험 알림 = IR 탐지 단계 입력. 탐지 없는 IR은 시작 불가"
    answer_detail: "사고 탐지 = SIEM(Wazuh manager) 고위험(level≥10) 알림 집계. IR 생명주기 탐지 단계의 입력이자 시작점 — 탐지 없는 IR 은 시작 불가. incidents=<수>가 분석가가 트리아지할 사건 큐(queue)의 개수다. 단, 고위험 알림은 탐지의 '입력'일 뿐 사고 확정은 아니므로(오탐·미탐 가능) 사람의 트리아지·분석이 뒤따라야 한다. 증적 = incidents= 출력."
    verify:
      type: output_contains
      expect: 'incidents='
      field: stdout
      semantic:
        intent: "사고 탐지"
        success_criteria: ["고위험 알림"]
        acceptable_methods: ["**[OSS] SIEM (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IR 생명주기 — NIST SP 800-61 4단계
      사고는 즉흥이 아니라 **표준 절차**로 다뤄야 우왕좌왕을 막는다. **NIST IR 생명주기**란, 미국 NIST
      가 펴낸 사고대응 표준 지침(SP 800-61)이 정의한 4단계 순환 — **준비 → 탐지·분석 → 봉쇄·근절·복구
      → 사후** — 으로, IR 의 사실상 표준이며 한국 **ISMS-P 2.11(사고 예방 및 대응)** 도 같은 골격을
      요구한다. 화재 대응 매뉴얼에 비유하면: 평소 준비(소화기·대피훈련) → 발견(경보) → 진압(번짐 차단
      →불씨 제거→복구) → 사후 조사의 순환이다. 핵심은 **"준비가 토대"** 라는 점 — 탐지가 빠르려면 미리
      SIEM 이, 봉쇄가 매끄러우려면 미리 플레이북이 있어야 한다. 또한 3번째 단계는 **봉쇄(확산부터 차단)
      → 근절(원인 제거) → 복구(정상화)** 순서가 중요하다(봉쇄 없이 근절부터 하면 그사이 옆 시스템으로
      번진다). 본 미션은 이 4단계와 각 핵심 활동을 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 1단계 — 준비(정책·CSIRT·도구·연락망·훈련)
      echo "1) 준비: 정책·CSIRT·도구·연락망·훈련"
      # 2) 2단계 — 탐지·분석(알림 triage, 범위/영향 파악)
      echo "2) 탐지·분석: 알림 triage, 범위/영향 파악"
      # 3) 3단계 — 봉쇄·근절·복구(확산 차단→원인 제거→정상화)
      echo "3) 봉쇄·근절·복구: 확산 차단→원인 제거→정상화"
      # 4) 4단계 — 사후(교훈·재발 방지·보고)
      echo "4) 사후: 교훈(lessons learned), 재발 방지, 보고"
      # 5) 결론 — 준비가 부실하면 나머지 단계가 무너짐
      echo "→ 준비가 부실하면 나머지 단계가 무너짐"
      ```
      ## ✅ 합격 기준
      `봉쇄` 출력 시 통과. **근거:** 4단계(준비→탐지·분석→봉쇄·근절·복구→사후)가 정리되고 3단계 핵심어
      봉쇄가 나오면 NIST 생명주기를 정확히 진술한 것 — 봉쇄(확산 차단)→근절→복구 순서가 중요하다.
    hint: '준비~사후'
    category: analysis
    points: 12
    answer: |
      # 1) 1단계 — 준비(정책·CSIRT·도구·연락망·훈련)
      echo "1) 준비: 정책·CSIRT·도구·연락망·훈련"
      # 2) 2단계 — 탐지·분석(알림 triage, 범위/영향 파악)
      echo "2) 탐지·분석: 알림 triage, 범위/영향 파악"
