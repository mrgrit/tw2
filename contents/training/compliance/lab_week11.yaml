lab_id: standalone-compliance-week11
title: "사고대응 컴플라이언스 — IR 생명주기·증적·신고 의무"
version: standalone-compliance
course: compliance
week: 11
description: |
  사고대응 — SIEM 탐지, NIST IR 생명주기, 증적 보존(chain of custody), 신고 의무(개인정보보호법 72h),
  사고 분류. el34-siem 실 점검. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W10 통과 (soc IR 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §3(IR 생명주기) §4(증적) §5(신고) 숙지"
objectives:
  - "SIEM 사고 탐지 확인"
  - "IR 생명주기/증적 보존"
  - "법적 신고 의무 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem sh -c "hostname; echo target_ok"
    answer_detail: "사고대응 점검 대상 = el34-siem(SIEM)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 사고 탐지 — SIEM 고위험 알림
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "incidents=$N"'
      ```
      ## ✅ 합격 기준
      고위험(level≥10) 이벤트를 탐지 입력으로 확인한다.
    hint: 'level>=10'
    category: manipulation
    points: 14
    answer: |
      echo "=== 사고 탐지 (SIEM) ==="
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "incidents=$N"'
      echo "→ Wazuh 고위험 알림 = IR 탐지 단계 입력. 탐지 없는 IR은 시작 불가"
    answer_detail: "사고 탐지 = SIEM 고위험(level≥10) 알림. IR의 시작점."
    verify:
      type: output_contains
      expect: 'incidents='
      field: stdout
      semantic:
        intent: "사고 탐지"
        success_criteria: ["고위험 알림"]
        acceptable_methods: ["**[OSS] SIEM (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 IR 생명주기 (NIST)
      ## 💻 실행 명령
      ```bash
      echo "준비→탐지·분석→봉쇄·근절·복구→사후(교훈)"
      ```
      ## ✅ 합격 기준
      NIST IR 생명주기를 정리한다.
    hint: '준비~사후'
    category: analysis
    points: 12
    answer: |
      echo "=== IR 생명주기 (NIST SP 800-61) ==="
      echo "1) 준비: 정책·CSIRT·도구·연락망·훈련"
      echo "2) 탐지·분석: 알림 triage, 범위/영향 파악"
      echo "3) 봉쇄·근절·복구: 확산 차단→원인 제거→정상화"
      echo "4) 사후: 교훈(lessons learned), 재발 방지, 보고"
      echo "→ 준비가 부실하면 나머지 단계가 무너짐"
    answer_detail: "IR 생명주기 = 준비→탐지·분석→봉쇄·근절·복구→사후(NIST). 준비가 토대."
    verify:
      type: output_contains
      expect: '봉쇄'
      field: stdout
      semantic:
        intent: "IR 생명주기"
        success_criteria: ["4단계"]
        acceptable_methods: ["**[표준] NIST IR (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 증적 보존 — Chain of Custody
      ## 💻 실행 명령
      ```bash
      echo "휘발성 우선(메모리>연결>디스크>로그), 해시(SHA-256), 수집시각/자, 원본보존+사본분석"
      ```
      ## ✅ 합격 기준
      증적 보존 원칙을 정리한다.
    hint: 'chain of custody'
    category: analysis
    points: 12
    answer: |
      echo "=== 증적 보존 (Chain of Custody) ==="
      echo "수집 순서: 휘발성 우선(메모리 > 네트워크 연결 > 디스크 > 로그)"
      echo "무결성: SHA-256 해시, 수집 시각/수집자 기록"
      echo "원본 보존 + 사본 분석(원본 미변경)"
      echo "연속성: chain of custody 문서화 → 법적 증거능력"
      echo "→ 증적 = 분석뿐 아니라 법적 대응의 근거"
    answer_detail: "증적 보존 = 휘발성 우선 수집+해시+chain of custody. 법적 증거능력 확보."
    verify:
      type: output_contains
      expect: '휘발성'
      field: stdout
      semantic:
        intent: "증적 보존"
        success_criteria: ["수집/무결성/연속성"]
        acceptable_methods: ["**[표준] 포렌식 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 신고 의무 — 법적 기한
      ## 💻 실행 명령
      ```bash
      echo "개인정보 유출: 인지 후 72시간 내 신고(개인정보보호위/KISA) + 정보주체 통지"
      ```
      ## ✅ 합격 기준
      법적 신고 의무·기한을 정리한다.
    hint: '72시간 신고'
    category: report
    points: 14
    answer: |
      echo "=== 신고 의무 ==="
      echo "개인정보 유출(개인정보보호법): 인지 후 72시간 내 신고"
      echo "신고처: 개인정보보호위원회 / KISA"
      echo "정보주체 통지: 유출 항목·시점·대응·문의처"
      echo "기한 초과 = 그 자체로 위반(과징금/과태료)"
      echo "→ 언제·무엇을·누구에게 신고할지 사전 정의(준비 단계)"
    answer_detail: "신고 의무 = 개인정보 유출 72시간 내 신고+정보주체 통지. 기한 초과는 위반."
    verify:
      type: output_contains
      expect: '72'
      field: stdout
      semantic:
        intent: "신고 의무"
        success_criteria: ["기한/신고처"]
        acceptable_methods: ["**[법규] 신고 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 사고 분류 — 심각도
      ## 💻 실행 명령
      ```bash
      echo "심각도: 영향범위×데이터민감도×지속성. Critical(개인정보 대량 유출) 즉시 에스컬레이션"
      ```
      ## ✅ 합격 기준
      사고 심각도 분류를 정리한다.
    hint: '심각도 분류'
    category: analysis
    points: 12
    answer: |
      echo "=== 사고 분류 (심각도) ==="
      echo "기준: 영향 범위 × 데이터 민감도 × 지속성/확산성"
      echo "Critical: 개인정보 대량 유출/핵심 시스템 장악 → 즉시 에스컬레이션+신고"
      echo "High/Medium/Low: 영향에 따라 대응 SLA 차등"
      echo "→ 심각도가 에스컬레이션·신고 여부·대응 속도를 결정"
    answer_detail: "사고 분류 = 영향×민감도×확산. 심각도가 에스컬레이션/신고/SLA 결정."
    verify:
      type: output_contains
      expect: '심각도'
      field: stdout
      semantic:
        intent: "사고 분류"
        success_criteria: ["심각도 기준"]
        acceptable_methods: ["**[표준] 분류 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — IR 체계
      ## 💻 실행 명령
      ```bash
      echo "CSIRT+플레이북+SIEM탐지+증적절차+신고체계+정기훈련(테이블탑)"
      ```
      ## ✅ 합격 기준
      IR 체계 방어를 정리한다.
    hint: 'CSIRT/플레이북/훈련'
    category: report
    points: 12
    answer: |
      echo "=== IR 체계 방어 ==="
      echo "1) CSIRT 구성 + 역할/연락망"
      echo "2) 플레이북(사고 유형별 대응 절차)"
      echo "3) SIEM 탐지 + 자동 알림"
      echo "4) 증적 절차(chain of custody) 표준화"
      echo "5) 신고 체계(기한/창구) 사전 정의"
      echo "6) 정기 훈련(테이블탑/모의훈련)"
      echo "→ 준비된 IR이 사고 피해와 법적 리스크를 줄인다"
    answer_detail: "방어 = CSIRT+플레이북+SIEM+증적절차+신고체계+훈련. 준비가 핵심."
    verify:
      type: output_contains
      expect: '플레이북'
      field: stdout
      semantic:
        intent: "IR 체계 방어"
        success_criteria: ["체계 구성"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 사고대응 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W11 사고대응 보고서 (학번, 이름)
      ## 1. 탐지/IR 생명주기
      ## 2. 증적 보존/신고 의무(72h)
      ## 3. IR 체계
      ```
      ## ✅ 합격 기준
      보고서에 IR 생명주기 + 증적/신고 + 체계가 포함된다.
    hint: 'IR+증적/신고+체계'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W11 사고대응 보고서
      ## 1. 탐지: SIEM 고위험 알림. IR 생명주기(준비→탐지·분석→봉쇄·근절·복구→사후)
      ## 2. 증적: 휘발성 우선+해시+chain of custody. 신고: 개인정보 유출 72시간 내(개인정보보호법)
      ## 3. 체계: CSIRT+플레이북+SIEM+증적절차+신고체계+정기훈련
      ## 결론: 사고는 불가피, 준비가 차이. 탐지·증적·신고를 절차화하고 훈련으로 검증
      EOF
    answer_detail: "사고대응 보고 = 탐지/IR생명주기+증적/신고(72h)+IR체계. 준비 중심."
    verify:
      type: output_contains
      expect: '72'
      field: stdout
      semantic:
        intent: "사고대응 보고"
        success_criteria: ["IR/증적/신고"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
