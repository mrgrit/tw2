  - order: 4
    instruction: |
      ## 🎯 증적 보존 — Chain of Custody (증거 연속성)
      증거 없는 대응은 원인 규명도 법적 소명도 불가능하다. 사고 증거는 **사라지기 전에·변조 없이·이력을
      남기며** 다뤄야 법정에서 살아남는다. 이를 떠받치는 3대 원칙을 본 미션에서 정리한다.
      - **휘발성 우선 수집(order of volatility)**: 증거는 사라지는 속도가 다르므로, **가장 빨리 사라지는
        것부터** 수집한다 — 메모리(RAM, 전원 끄면 즉시 소멸) > 네트워크 연결(세션 종료 시 소멸) >
        디스크 > 로그/아카이브. "녹기 전에 눈사람 사진부터 찍기"와 같다(순서를 뒤집으면 메모리의 실행
        중 악성코드·복호화된 암호키를 영영 놓친다).
      - **무결성(integrity)**: 수집 즉시 **SHA-256 해시**(데이터의 256비트 고유 지문)를 떠두고, 수집
        시각·수집자를 기록하며, **원본은 보존하고 사본을 분석**한다 — 같은 해시가 나오면 "원본이 한
        비트도 안 변했다"가 수학적으로 증명된다.
      - **연속성(chain of custody)**: 증거를 **누가·언제·어떻게** 다뤘는지 끊김 없이 기록한 이력이다
        (압수물 인계 인수 대장과 같음). 이 연속성이 깨지거나 봉인이 뜯기면, 아무리 결정적 증거라도
        법정에서 채택되지 않는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 수집 순서 — 휘발성 우선(메모리>네트워크 연결>디스크>로그)
      echo "수집 순서: 휘발성 우선(메모리 > 네트워크 연결 > 디스크 > 로그)"
      # 2) 무결성 — SHA-256 해시, 수집 시각/수집자 기록
