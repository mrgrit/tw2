      echo "→ 준비가 부실하면 나머지 단계가 무너짐"
    answer_detail: "IR 생명주기 = 준비→탐지·분석→봉쇄·근절·복구→사후(NIST SP 800-61, ISMS-P 2.11 동일 골격). 준비가 토대이고, 사후의 교훈(lessons learned)이 다음 준비로 되먹임되는 순환(직선이 아님). 3단계는 봉쇄(확산 차단)→근절(원인 제거)→복구(정상화) 순서가 중요. 모든 IR 플레이북·사고 보고서의 골격으로 '지금 어느 단계인가'를 자리매김하는 기준. 증적 = 봉쇄 포함 4단계 출력."
