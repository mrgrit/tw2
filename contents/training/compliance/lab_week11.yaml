lab_id: standalone-compliance-week11
title: "사고대응 컴플라이언스 — IR 생명주기·증적·신고 의무"
version: standalone-compliance
course: compliance
week: 11
description: |
  사고대응(IR) 컴플라이언스를 감사자(auditor)의 시선으로 한 바퀴 점검한다. 침해는 못 막을 수 있다 —
  그래서 컴플라이언스가 묻는 것은 "막았는가"가 아니라 "준비했는가·절차대로 했는가·증거가 남는가·기한을
  지켰는가"다. 본 실습에서 학생은 el34-siem(Wazuh manager)에서 ① 고위험 알림(level≥10)을 직접 집계해
  사고 탐지를 확인하고, ② NIST SP 800-61 의 IR 생명주기 4단계(준비→탐지·분석→봉쇄·근절·복구→사후)를
  정리하며, ③ 증적 보존(chain of custody)의 3대 원칙(휘발성 우선 수집·무결성·연속성)을 진술하고,
  ④ 개인정보 유출 시 법정 신고 의무(인지 후 72시간)를 정리하며, ⑤ 사고 심각도 분류와 IR 체계를 점검해
  하나의 사고대응 보고서로 종합한다. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}}, 비밀번호 1)에서
  docker exec(탐지)·echo(원칙 정리)로 실행하며 신규 도구 설치는 없다. 인가된 표적(el34)만, 원본은 읽기만
  한다(증거 보존). 같은 주차 강의(lecture_week11.md)의 §0.5(핵심 용어)·§2(점검 5영역)·§5(판단 프레임)와
  1:1 로 대응한다. 합격 임계값 0.7.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W10 통과 (soc IR 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §3(IR 생명주기) §4(증적) §5(신고) 숙지"
objectives:
  - "el34-siem(Wazuh manager)에서 고위험 알림(level≥10)을 집계해 IR 탐지 단계의 입력을 증거로 확인한다"
  - "NIST SP 800-61 의 IR 생명주기 4단계(준비→탐지·분석→봉쇄·근절·복구→사후)를 순서대로 정리하고, 준비가 토대이며 사후→준비로 되먹임됨을 설명한다"
  - "증적 보존(chain of custody) 3대 원칙(휘발성 우선 수집·무결성(SHA-256·원본보존)·연속성)으로 법적 증거능력이 확보되는 까닭을 진술한다"
  - "개인정보 유출 시 법적 신고 의무(인지 후 72시간 내 개인정보보호위/KISA 신고 + 정보주체 통지)와 기한 초과가 그 자체로 위반인 까닭을 정리한다"
  - "사고 심각도 분류와 IR 체계(CSIRT·플레이북·SIEM·증적절차·신고체계·훈련)를 점검해 하나의 사고대응 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (사고대응 점검의 전제)
      사고대응 점검의 첫 단계는 탐지의 원천인 SIEM 에 접근이 되는지 확인하는 것이다. 감사자는 본격
      점검 전 항상 대상의 도달성부터 본다 — 접근이 안 되면 이후 모든 음성 결과("알림 없음" 등)가
      무의미해지기 때문이다. 본 주차의 중심 대상은 el34 4-tier 의 dmz 계층에 있는 **siem 컨테이너**
      (`el34-siem`, Wazuh manager)다. 사고대응의 첫 단추인 "탐지"가 바로 이 SIEM 이 적재하는 고위험
      알림에서 시작되므로, 사고대응 컴플라이언스 점검의 중심 대상이 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 탐지 원천 el34-siem(Wazuh manager) 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-siem sh -c "hostname; echo target_ok"
      ```
      - `docker exec <컨테이너> sh -c "..."` = 호스트에서 컨테이너 안으로 들어가 실행. `hostname`(응답 확인) + `echo target_ok`(셸 정상 종료 표식, 채점 기준).
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 탐지 원천(Wazuh manager)이 살아있고 점검
      가능한 상태 — 응답이 없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 탐지 원천 el34-siem(Wazuh manager) 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-siem sh -c "hostname; echo target_ok"
    answer_detail: "사고대응 점검 대상 = el34-siem(dmz 계층 Wazuh manager). hostname 응답 + target_ok 출력으로 도달성 확인 — 탐지 원천이 가동·접근 가능한지 검증하는 점검 착수의 전제 단계. 접근 실패 시 모든 음성 결과가 무의미하므로 가장 먼저 확인한다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 사고 탐지 — SIEM 고위험 알림 (IR: 탐지 단계 입력)
      탐지 없는 IR(사고대응)은 시작조차 못 한다. 사고대응의 첫 단추는 SIEM 이 모은 수많은 이벤트에서
      **고위험 알림**을 가려내, IR 생명주기의 **탐지 단계 입력**으로 삼는 것이다. el34 의 SIEM 인
      **Wazuh manager**(`el34-siem`)는 ips·web 에이전트가 보낸 로그를 한곳으로 모아 분석하고, 그 결과를
      한 줄에 한 JSON 으로 `/var/ossec/logs/alerts/alerts.json` 에 적재한다. 각 알림에는 0~15 의
      **rule level**(심각도 점수)이 붙으며, **level 이 높을수록 위험**하다 — 운영 관례상 **level≥10**
      (두 자리)이 즉시 주목할 고위험 알림의 기준선이고, level 1~3 은 정보성 잡음에 가깝다. 본 미션은
      그중 고위험 알림의 수를 세어 사고 후보의 개수를 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 최근 3000줄 표본에서 두 자리 level(10~19=고위험) 알림 수를 세어 incidents= 로 출력
      docker exec el34-siem sh -c 'N=$(tail -3000 /var/ossec/logs/alerts/alerts.json 2>/dev/null | grep -oE "\"level\":1[0-9]" | wc -l); echo "incidents=$N"'
      # 2) 해석 — Wazuh 고위험 알림 = IR 탐지 단계 입력. 탐지 없는 IR은 시작 불가
      echo "→ Wazuh 고위험 알림 = IR 탐지 단계 입력. 탐지 없는 IR은 시작 불가"
      ```
      - `tail -3000`(최근 표본, 전수 아님)→`grep -oE '"level":1[0-9]'`(두 자리 level만)→`wc -l`(개수). 결과 incidents=<수>가 탐지 단계로 넘길 사고 후보.
      ## ✅ 합격 기준
      `incidents=` 출력 시 통과. **근거:** incidents=<수>가 IR 탐지·분석 단계로 넘길 사고 후보 — 0 이어도
      "현재 표본에 고위험 알림 없음"이라는 정상적 탐지 결과다(절차는 동일).
    hint: 'level>=10'
    category: manipulation
    points: 14
    answer: |
