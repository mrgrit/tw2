  - order: 7
    instruction: |
      ## 🎯 목표 — 감사 추적 강화 (방어 종합)
      앞 미션들이 "현재 상태 점검"이라면, 이 미션은 그 결과를 개선 방안(방어)으로 종합한다. 로그
      수명주기(생성→중앙화→무결성→보존→모니터링)의 전 단계를 빠짐없이 강화하는 것이 감사 추적 통제의
      완성이다. 어느 한 단계만 빠져도 사슬이 끊긴다.

      ## 💡 개념 한 줄
      감사 추적은 한 번의 행위가 아니라 다섯 단계의 수명주기다 — 생성만 하면 공격자가 지우고, 수집해도
      무결성 보호가 없으면 변조되며, 보존을 안 하면 과거를 못 보고, 모니터링을 안 하면 alert 가 떠도
      아무도 모른다(Target 2013 사례).

      ## 💻 실행 명령
      ```bash
      echo "전 시스템 로깅 + 중앙 SIEM + 무결성 보호 + 1년 보존 + NTP + 실시간 알림"
      ```
      - 본 미션은 보고서의 "권고(remediation)" 절에 해당한다 — 앞 미션 2~6 의 점검 결과를 다섯 단계
        강화책으로 묶어 제시한다.

      ## ✅ 합격 기준
      다섯 단계 강화책 — ① 전 시스템 로깅 ② 중앙 SIEM 수집+상관 ③ 무결성 보호+로그 접근 로깅 ④ 보존
      1년+NTP ⑤ 실시간 알림 — 이 정리되면 합격. "생성→중앙화→무결성→보존→모니터링" 전 주기를 한 흐름
      으로 설명할 수 있어야 한다.
