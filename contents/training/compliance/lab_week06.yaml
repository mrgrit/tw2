lab_id: standalone-compliance-week06
title: "로깅·모니터링 컴플라이언스 — 감사 추적 (PCI-DSS 10)"
version: standalone-compliance
course: compliance
week: 6
description: |
  로깅·모니터링 점검 — 로그 활성(Apache), 중앙 수집(Wazuh), 감사 추적 요소, 무결성·보존·시간 동기화.
  el34-web/siem 실 점검. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(로그활성) §3(중앙수집) §4(감사요소) 숙지"
objectives:
  - "로그 활성/중앙 수집 확인"
  - "감사 추적 요소 이해"
  - "무결성·보존·시간 동기화"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "로깅 점검 대상 = el34-web(로그 생성)/el34-siem(중앙 수집)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 로그 활성 — Apache access
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"'
      ```
      ## ✅ 합격 기준
      웹 접근 로그가 활성화되어 있다(PCI 10.2 접근 기록).
    hint: 'access.log 개수'
    category: recon
    points: 14
    answer: |
      echo "=== 로그 활성 ==="
      docker exec el34-web sh -c 'N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"; ls /var/log/apache2/*access*.log 2>/dev/null | head -4'
      echo "→ vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)"
    answer_detail: "로그 활성 = Apache access 로그 다수. 접근 기록 = 감사 추적의 기본."
    verify:
      type: output_contains
      expect: 'access_logs='
      field: stdout
      semantic:
        intent: "로그 활성 점검"
        success_criteria: ["접근 로그 존재"]
        acceptable_methods: ["**[OSS] 로그 점검 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 중앙 수집 — Wazuh
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok'
      ```
      ## ✅ 합격 기준
      SIEM(Wazuh)이 로그를 중앙 수집·적재 중임을 확인한다.
    hint: 'Wazuh alerts.json'
    category: manipulation
    points: 14
    answer: |
      echo "=== 중앙 수집 (Wazuh) ==="
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok'
      echo "→ Wazuh가 IPS/web 로그 중앙 수집·상관·알림. 분산 로그를 한 곳에서 감사(변조·삭제 방지)"
    answer_detail: "중앙 수집 = Wazuh alerts.json 적재. 중앙화가 변조 방지·통합 모니터링 전제."
    verify:
      type: output_contains
      expect: 'siem_ingest_ok'
      field: stdout
      semantic:
        intent: "중앙 수집 확인"
        success_criteria: ["SIEM 적재"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 감사 추적 요소 (PCI 10.2)
      ## 💻 실행 명령
      ```bash
      echo "누가(user)·언제(timestamp)·무엇을(event)·어디서(source IP)·결과(success/fail)"
      ```
      ## ✅ 합격 기준
      감사 추적 필수 요소를 정리한다.
    hint: '누가/언제/무엇/결과'
    category: analysis
    points: 12
    answer: |
      echo "=== 감사 추적 요소 ==="
      echo "누가(user) · 언제(timestamp) · 무엇을(event/object) · 어디서(source IP) · 결과(성공/실패)"
      echo "필수 기록: 인증 시도, 권한 변경, 관리 행위, 데이터 접근, 로그 자체 접근"
      echo "→ 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)"
    answer_detail: "감사 요소 = 누가/언제/무엇을/어디서/결과(PCI 10.2). 사건 재구성의 최소 단위."
    verify:
      type: output_contains
      expect: '감사 추적'
      field: stdout
      semantic:
        intent: "감사 추적 요소"
        success_criteria: ["5요소"]
        acceptable_methods: ["**[표준] PCI 10.2 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 무결성·보존
      ## 💻 실행 명령
      ```bash
      echo "무결성: append-only/해시/WORM, 로그 접근도 로깅. 보존: PCI 최소 1년"
      ```
      ## ✅ 합격 기준
      로그 무결성·보존 요건을 정리한다.
    hint: 'WORM/1년'
    category: analysis
    points: 12
    answer: |
      echo "=== 무결성·보존 ==="
      echo "무결성: 변조 방지(append-only, 해시 체인, WORM), 로그 접근 자체도 로깅"
      echo "보존: PCI 최소 1년(즉시 조회 3개월), 법규별 상이"
      echo "→ 공격자가 가장 먼저 지우는 게 로그. 중앙화+무결성 보호가 필수"
    answer_detail: "무결성=WORM/해시(변조 방지), 보존=PCI 1년. 로그는 공격자 1순위 삭제 대상."
    verify:
      type: output_contains
      expect: '무결성'
      field: stdout
      semantic:
        intent: "무결성·보존"
        success_criteria: ["WORM/보존"]
        acceptable_methods: ["**[표준] PCI 10.5 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 시간 동기화 (NTP)
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "date -u +%Y-%m-%dT%H:%M:%SZ; echo time_checked"
      ```
      ## ✅ 합격 기준
      시간 동기화의 중요성(PCI 10.4)을 확인한다.
    hint: 'NTP 동기화'
    category: analysis
    points: 12
    answer: |
      echo "=== 시간 동기화 ==="
      docker exec el34-web sh -c "date -u +%Y-%m-%dT%H:%M:%SZ; echo time_checked"
      echo "→ PCI 10.4: 모든 시스템 NTP 동기화. 시계 어긋나면 사건 시간선 붕괴(상관분석 불가)"
    answer_detail: "시간 동기화 = NTP(PCI 10.4). 시스템 간 시계 일치가 사건 상관분석의 전제."
    verify:
      type: output_contains
      expect: 'time_checked'
      field: stdout
      semantic:
        intent: "시간 동기화"
        success_criteria: ["NTP 중요성"]
        acceptable_methods: ["**[OSS] date (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 감사 추적 강화
      ## 💻 실행 명령
      ```bash
      echo "전 시스템 로깅 + 중앙 SIEM + 무결성 보호 + 1년 보존 + NTP + 실시간 알림"
      ```
      ## ✅ 합격 기준
      로깅 컴플라이언스 방어를 정리한다.
    hint: 'SIEM/무결성/보존/NTP'
    category: report
    points: 12
    answer: |
      echo "=== 감사 추적 강화 ==="
      echo "1) 전 시스템 로깅(인증/권한/관리/데이터 접근)"
      echo "2) 중앙 SIEM 수집(Wazuh) + 상관분석"
      echo "3) 무결성 보호(WORM/해시) + 로그 접근 로깅"
      echo "4) 보존 1년+ , NTP 시간 동기화"
      echo "5) 실시간 알림(이상징후)"
      echo "→ 핵심: 생성→중앙화→무결성→보존→모니터링 전 주기"
    answer_detail: "방어 = 전 시스템 로깅+중앙SIEM+무결성+보존+NTP+알림. 감사 추적 전 주기."
    verify:
      type: output_contains
      expect: 'SIEM'
      field: stdout
      semantic:
        intent: "감사 추적 강화"
        success_criteria: ["전 주기 통제"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 로깅 컴플라이언스 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W06 로깅 보고서 (학번, 이름)
      ## 1. 로그 활성/중앙 수집(Wazuh)
      ## 2. 감사 추적 요소/무결성·보존
      ## 3. 방어(전 주기)
      ```
      ## ✅ 합격 기준
      보고서에 로깅 점검 + 감사 요소 + 방어가 포함된다.
    hint: '로그+감사요소+방어'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W06 로깅 보고서
      ## 1. 점검: Apache access 로그 다수 활성 + Wazuh 중앙 수집(준수)
      ## 2. 감사 요소: 누가/언제/무엇을/어디서/결과(PCI 10.2). 무결성(WORM)·보존(1년)·NTP
      ## 3. 방어: 전 시스템 로깅+중앙SIEM+무결성+보존+알림
      ## 결론: 로그 생성·중앙화는 양호. 무결성 보호·보존 기간·NTP를 표준에 맞춰 운영
      EOF
    answer_detail: "로깅 보고 = 로그 활성/중앙수집(준수)+감사요소+무결성/보존+방어. PCI 10 충족."
    verify:
      type: output_contains
      expect: 'PCI'
      field: stdout
      semantic:
        intent: "로깅 컴플라이언스 보고"
        success_criteria: ["로그/감사요소/방어"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
