lab_id: standalone-compliance-week06
title: "로깅·모니터링 컴플라이언스 — 감사 추적 (PCI-DSS 10)"
version: standalone-compliance
course: compliance
week: 6
description: |
  로깅·모니터링 컴플라이언스를 감사자(auditor) 관점에서 점검한다 — PCI-DSS 요구사항 10(감사 추적)과
  ISMS-P 2.9(로그 관리)를 기준으로, el34 인프라가 (1) 로그를 실제로 생성하는가(el34-web 의 Apache
  vhost별 access 로그, PCI 10.2), (2) 분산 로그를 한 곳으로 중앙 수집하는가(el34-siem 의 Wazuh,
  PCI 10.6/10.7), (3) 감사 5요소(누가·언제·무엇을·어디서·결과)를 담는가, (4) 무결성(WORM·해시·
  append-only, PCI 10.5)·보존(최소 1년, PCI 10.5.1)·시간동기화(NTP, PCI 10.4)를 갖추었는가를 점검하고,
  그 결과를 컴플라이언스 보고서로 종합한다.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec el34-web / el34-siem 로
  실행한다. 신규 설치 없음 — 이미 가동 중인 로깅 체계를 읽기 전용으로 점검한다. 강의 lecture_week06.md
  의 §1.3(로그 수명주기) §3(el34 로깅 체계) §4(감사 품질: 5요소·무결성·보존·시간)와 1:1 정합.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(로그활성) §3(중앙수집) §4(감사요소) 숙지"
objectives:
  - "el34-web 에서 로그가 실제 생성됨(Apache vhost별 access 로그)을 점검하고 PCI 10.2 접근 기록 충족 증거로 판정한다"
  - "el34-siem(Wazuh)이 분산 로그를 한 곳으로 중앙 수집·적재함을 확인하고 무결성·통합 모니터링의 전제임을 설명한다"
  - "감사 추적 5요소(누가·언제·무엇을·어디서·결과)를 열거하고 source IP·결과 누락 시 사건 재구성이 불가능함을 설명한다"
  - "로그 무결성(WORM·해시·append-only)·보존(PCI 최소 1년)·시간동기화(NTP, PCI 10.4) 요건을 정의하고 충족 여부를 판정한다"
  - "점검 결과를 발견→증거→표준 조항(PCI 10.x/ISMS-P 2.9)→권고 구조의 컴플라이언스 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 로깅 점검 대상 확인
      모든 컴플라이언스 점검의 전제는 점검 범위(scope)의 시스템에 실제로 접근이 된다는 것이다. 본 주차의
      대상은 로그를 **생성**하는 el34-web(Apache)과 그것을 **중앙 수집**하는 el34-siem(Wazuh) 두 곳이다.
      먼저 web 컨테이너에 접근해 점검을 시작할 수 있는 상태인지 확인한다.

      ## 💡 개념 한 줄
      감사자는 본격 점검에 앞서 항상 대상 자산이 실재하고 접근 가능한지부터 확인한다(scope 검증).

      ## 💻 실행 명령
      el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서:
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web sh -c "..."` — el34 호스트에서 el34-web 컨테이너 안의 셸 명령을 실행한다.
      - `hostname` — 컨테이너의 호스트명을 출력(접근 성공의 1차 증거). `echo target_ok` — 점검 마커.

      ## ✅ 합격 기준
      출력에 `target_ok` 가 나타나면 대상 접근 성공. 응답이 없으면 호스트 SSH·컨테이너 가동
      상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "로깅 점검 대상 = el34-web(로그 생성)/el34-siem(중앙 수집). 본 미션은 scope 검증 — 출력 마커 target_ok 로 대상 접근 성공을 판정한다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 로그 활성 점검 (Apache access 로그)
      PCI-DSS 10.2 의 출발점은 "접근이 **기록되고 있는가**"다. 로그가 아예 생성되지 않으면 그 뒤의 모든
      통제(중앙수집·보존·모니터링)가 무의미하다. el34-web 은 vhost(juice/dvwa/neobank 등)마다 별도의
      access 로그를 남기므로, `/var/log/apache2/` 의 `*access*.log` 파일 개수를 세어 로그 생성 여부를
      정량 확인한다.

      ## 💡 개념 한 줄
      Apache access 로그는 웹서버가 받은 모든 HTTP 요청을 한 줄씩 적은 기록으로, 건물 출입구의 방문자
      기록부에 해당한다 — 그 줄에 출처 IP·시각·요청·응답코드가 담겨 감사 5요소 중 넷이 자동으로 채워진다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"'
      ```
      - `ls /var/log/apache2/*access*.log` — access 로그 파일들을 나열(vhost마다 하나씩).
      - `2>/dev/null` — 파일이 없을 때의 오류 메시지를 버린다. `wc -l` — 줄 수, 즉 파일 개수를 센다.

      ## ✅ 합격 기준
      `access_logs=N`(N≥1, 보통 vhost 수만큼)이 출력되면 로그 활성 = PCI 10.2 접근 기록 충족. `access_logs=0`
      이면 로깅이 꺼진 중대 결함 — 즉시 시정 대상이다.
    hint: 'access.log 개수'
    category: recon
    points: 14
    answer: |
      echo "=== 로그 활성 ==="
      docker exec el34-web sh -c 'N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"; ls /var/log/apache2/*access*.log 2>/dev/null | head -4'
      echo "→ vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)"
    answer_detail: "로그 활성 = Apache vhost별 access 로그 다수 존재. 파일 개수가 '로그가 켜져 있다'의 객관 증거이며, 접근 기록은 감사 추적(PCI 10.2)의 기본이다. 운영자의 구두 주장이 아니라 파일 존재로 입증한다."
    verify:
      type: output_contains
      expect: 'access_logs='
      field: stdout
      semantic:
        intent: "로그 활성 점검"
        success_criteria: ["접근 로그 존재"]
        acceptable_methods: ["**[OSS] 로그 점검 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 중앙 수집 점검 (Wazuh SIEM)
      로그를 생성만 하고 침투 서버의 로컬에 두면 공격자가 자기 흔적과 함께 지운다. 중앙 수집은 (a)
      공격자가 못 지우게 하는 무결성과 (b) 흩어진 단서를 한 사건으로 잇는 상관분석의 전제이며, PCI 10.6/
      10.7 의 토대다. el34-siem 의 Wazuh manager 가 web·ips 의 로그를 한 곳으로 모아 적재 중인지 확인한다.

      ## 💡 개념 한 줄
      SIEM 은 분산된 여러 서버의 로그를 한 곳으로 모아 정규화·상관분석·알림 하는 관제실이고, el34 에서는
      Wazuh 가 그 역할을 한다(web=agent web004, ips=agent ips003 으로 등록되어 실시간 전송).

      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok'
      ```
      - `/var/ossec/logs/alerts/alerts.json` — Wazuh manager 가 수집·상관 결과를 한 줄씩 JSON 으로 적재하는 파일.
      - `tail -1` — 가장 최근 한 줄. `head -c 80` — 그 줄의 앞 80바이트만 출력(적재 사실 확인용 발췌).

      ## ✅ 합격 기준
      alerts.json 의 최근 줄 일부와 `siem_ingest_ok` 가 출력되면 중앙 수집 동작 확인. 파일이 비었거나
      없으면 Wazuh manager·agent 연결(ips003/web004) 상태를 점검한다.
    hint: 'Wazuh alerts.json'
    category: manipulation
    points: 14
    answer: |
      echo "=== 중앙 수집 (Wazuh) ==="
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok'
      echo "→ Wazuh가 IPS/web 로그 중앙 수집·상관·알림. 분산 로그를 한 곳에서 감사(변조·삭제 방지)"
    answer_detail: "중앙 수집 = Wazuh manager 의 alerts.json 에 이벤트 적재. 중앙화가 무결성(공격자가 침투 서버에서 로그를 못 지움)과 통합 모니터링(흩어진 단서를 한 사건으로 상관)의 전제다 — PCI 10.6/10.7."
    verify:
      type: output_contains
      expect: 'siem_ingest_ok'
      field: stdout
      semantic:
        intent: "중앙 수집 확인"
        success_criteria: ["SIEM 적재"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 감사 추적 5요소 정리 (PCI 10.2)
      로그가 "있다"는 것만으로는 부족하다. 한 줄 한 줄에 감사 5요소 — 누가(who)·언제(when)·무엇을(what)·
      어디서(where)·결과(outcome) — 가 담겨야 사건을 재구성할 수 있다. 또한 PCI 10.2 는 특정 행위들(인증
      시도·권한 변경·관리 행위·데이터 접근·로그 자체 접근)을 반드시 기록하라고 요구한다. 이 기준을 정리한다.

      ## 💡 개념 한 줄
      감사 5요소는 사건 보고서의 육하원칙과 같다 — 특히 source IP(어디서)와 결과(성공/실패)가 빠지면
      "외부 공격자가 로그인에 성공했는가, 실패만 반복했는가"를 구분할 수 없어 사건의 심각도조차 판정 불가다.

      ## 💻 실행 명령
      ```bash
      echo "누가(user)·언제(timestamp)·무엇을(event)·어디서(source IP)·결과(success/fail)"
      ```
      - 본 미션은 시스템 조회가 아니라, 감사 기준(5요소 + PCI 10.2 필수 기록 행위)을 정리·이해하는 분석
        단계다. el34-web 의 access 로그 한 줄(출처 IP·시각·요청·응답코드)에 이 요소들이 어떻게 채워지는지
        강의 §3.1 의 예시와 대조하라.

      ## ✅ 합격 기준
      5요소와 PCI 10.2 필수 기록 행위(인증 시도·권한 변경·관리 행위·데이터 접근·로그 자체 접근)가
      정리되면 합격. "로그 자체 접근"이 왜 필수인지(공격자가 흔적을 지우려 로그에 손대는 것 자체가 침해
      신호) 설명할 수 있어야 한다.
    hint: '누가/언제/무엇/결과'
    category: analysis
    points: 12
    answer: |
      echo "=== 감사 추적 요소 ==="
      echo "누가(user) · 언제(timestamp) · 무엇을(event/object) · 어디서(source IP) · 결과(성공/실패)"
      echo "필수 기록: 인증 시도, 권한 변경, 관리 행위, 데이터 접근, 로그 자체 접근"
      echo "→ 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)"
    answer_detail: "감사 요소 = 누가/언제/무엇을/어디서/결과(PCI 10.2) — 사건 재구성의 최소 단위. source IP·결과가 빠지면 공격 성공 여부조차 판정 불가하고, '로그 자체 접근'까지 기록해야 흔적 삭제 시도를 탐지한다."
    verify:
      type: output_contains
      expect: '감사 추적'
      field: stdout
      semantic:
        intent: "감사 추적 요소"
        success_criteria: ["5요소"]
        acceptable_methods: ["**[표준] PCI 10.2 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 무결성·보존 요건 정리 (PCI 10.5 / 10.5.1)
      공격자가 가장 먼저 노리는 것이 로그다. 따라서 로그는 생성된 뒤 변조·삭제되지 않아야 하고(무결성),
      사후 추적이 가능하도록 일정 기간 보관되어야 한다(보존). 무결성 기법과 보존 기준을 정리하고, el34
      에서 중앙 수집(Wazuh)이 1차 무결성 장치임을 이해한다.

      ## 💡 개념 한 줄
      무결성은 봉인된 증거물(손대면 표시), 보존은 서류 보관 의무 기간에 해당한다 — 둘 다 없으면 감사
      추적을 신뢰할 수 없다.

      ## 💻 실행 명령
      ```bash
      echo "무결성: append-only/해시/WORM, 로그 접근도 로깅. 보존: PCI 최소 1년"
      ```
      - **append-only** = 끝에 추가만 되고 기존 줄은 못 고침(두루마리). **해시 체인** = 줄마다 앞줄 해시를
        묶어 한 줄만 고쳐도 사슬이 깨짐(이어 붙인 봉인). **WORM(Write Once Read Many)** = 한 번 쓰면 물리적
        으로 못 고치는 저장(잉크 장부).
      - **보존** = PCI 최소 1년(그중 최근 3개월은 즉시 조회 가능). 침해가 평균 수개월간 미탐지되기 때문이다.

      ## ✅ 합격 기준
      무결성 3기법(append-only/해시 체인/WORM) + 로그 접근 로깅 + 보존(PCI 1년) 요건이 정리되면 합격.
      el34 에서 Wazuh 중앙 수집이 왜 무결성을 돕는지(침투 서버의 로컬 로그를 지워도 siem 사본은 안전)
      설명할 수 있어야 한다.
    hint: 'WORM/1년'
    category: analysis
    points: 12
    answer: |
      echo "=== 무결성·보존 ==="
      echo "무결성: 변조 방지(append-only, 해시 체인, WORM), 로그 접근 자체도 로깅"
      echo "보존: PCI 최소 1년(즉시 조회 3개월), 법규별 상이"
      echo "→ 공격자가 가장 먼저 지우는 게 로그. 중앙화+무결성 보호가 필수"
    answer_detail: "무결성=append-only/해시 체인/WORM(변조 방지) + 로그 접근 로깅, 보존=PCI 최소 1년(즉시 조회 3개월). 로그는 공격자 1순위 삭제 대상이므로 중앙화(Wazuh)와 무결성 보호가 함께 가야 PCI 10.5/10.5.1 을 충족한다."
    verify:
      type: output_contains
      expect: '무결성'
      field: stdout
      semantic:
        intent: "무결성·보존"
        success_criteria: ["WORM/보존"]
        acceptable_methods: ["**[표준] PCI 10.5 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 시간 동기화 점검 (NTP, PCI 10.4)
      사건 재구성은 시간선(timeline) 위에서 이루어진다. 시스템 간 시계가 어긋나면 "fw 통과 → web 공격"의
      인과 순서가 로그상으로 뒤바뀌어 상관분석이 통째로 무너진다. el34-web 의 UTC 시각을 확인해 시간
      기준의 일관성을 점검하고, NTP 동기화가 왜 상관분석의 전제인지 이해한다.

      ## 💡 개념 한 줄
      NTP(Network Time Protocol)는 모든 시스템의 시계를 하나의 표준시(UTC)에 맞추는 프로토콜이다 — 모든
      시계를 표준시에 동기화하는 것과 같다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "date -u +%Y-%m-%dT%H:%M:%SZ; echo time_checked"
      ```
      - `date -u` — 로컬 시간대가 아니라 **UTC**(협정 세계시) 기준으로 출력한다. 모든 시스템이 UTC 를
        쓰면 시간대 차이 없이 한 시간선에 올릴 수 있다.
      - `+%Y-%m-%dT%H:%M:%SZ` — ISO 8601 형식(예: `2026-06-14T11:06:44Z`). 끝의 `Z` 는 UTC 를 뜻한다.

      ## ✅ 합격 기준
      UTC 시각(`YYYY-MM-DDThh:mm:ssZ`)과 `time_checked` 가 출력되면 시간 기준 확인. 시각이 실제 시간과
      크게 어긋나면 NTP 설정 점검 대상이다 — PCI 10.4 위반.
    hint: 'NTP 동기화'
    category: analysis
    points: 12
    answer: |
