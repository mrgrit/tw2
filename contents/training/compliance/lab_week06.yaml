  - order: 8
    instruction: |
      ## 🎯 목표 — 로깅 컴플라이언스 보고서 종합
      컴플라이언스 점검의 산출물은 보고서다. 미션 1–7 의 점검·발견을 한 문서로 종합해야 점검이 완성되고,
      그 보고서가 PCI-DSS / ISMS-P 감사에 제출된다. 발견을 **발견 → 증거 → 표준 조항 → 권고 → 결론**
      구조로 묶는다.

      ## 💡 개념 한 줄
      감사 보고서의 가치는 "통제가 동작하고 그 증거가 보존됨"을 입증하는 데 있다 — 증거 없는 주장은 감사
      에서 효력이 없고, 합격·불합격이 이 보고서로 갈린다.

      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W06 로깅 보고서 (학번, 이름)
      ## 1. 로그 활성/중앙 수집(Wazuh)
      ## 2. 감사 추적 요소/무결성·보존
      ## 3. 방어(전 주기)
      ```
      - **1. 로그 활성/중앙 수집** — 미션 2(access 로그 개수)·미션 3(Wazuh alerts.json)의 증거로 PCI
        10.2·10.6 준수를 입증.
      - **2. 감사 요소/무결성·보존** — 미션 4(5요소)·미션 5(WORM/1년)·미션 6(NTP)을 PCI 10.2·10.5·10.4
        조항에 매핑.
      - **3. 방어** — 미션 7 의 전 주기 강화책을 권고로 정리.

      ## ✅ 합격 기준
      보고서에 로깅 점검(로그 활성·중앙수집=준수) + 감사 5요소 + 무결성/보존/NTP + 방어 + 결론이 포함되고,
      각 발견이 PCI 10.x 조항에 매핑되면 합격. 증거 없는 주장만 있으면 미션 2~6 의 점검 결과를 연결한다.
