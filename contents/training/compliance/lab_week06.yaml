lab_id: standalone-compliance-week06
title: "로깅·모니터링 컴플라이언스 — 감사 추적 (PCI-DSS 10)"
version: standalone-compliance
course: compliance
week: 6
description: |
  로깅·모니터링 컴플라이언스를 감사자(auditor) 관점에서 점검한다 — PCI-DSS 요구사항 10(감사 추적)과
  ISMS-P 2.9(로그 관리)를 기준으로, el34 인프라가 (1) 로그를 실제로 생성하는가(el34-web 의 Apache
  vhost별 access 로그, PCI 10.2), (2) 분산 로그를 한 곳으로 중앙 수집하는가(el34-siem 의 Wazuh,
  PCI 10.6/10.7), (3) 감사 5요소(누가·언제·무엇을·어디서·결과)를 담는가, (4) 무결성(WORM·해시·
  append-only, PCI 10.5)·보존(최소 1년, PCI 10.5.1)·시간동기화(NTP, PCI 10.4)를 갖추었는가를 점검하고,
  그 결과를 컴플라이언스 보고서로 종합한다.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec -it el34-web bash / docker exec -it el34-siem bash 로 접속해
  실행한다. 신규 설치 없음 — 이미 가동 중인 로깅 체계를 읽기 전용으로 점검한다. 강의 lecture_week06.md
  의 §1.3(로그 수명주기) §3(el34 로깅 체계) §4(감사 품질: 5요소·무결성·보존·시간)와 1:1 정합.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(로그활성) §3(중앙수집) §4(감사요소) 숙지"
objectives:
  - "el34-web 에서 로그가 실제 생성됨(Apache vhost별 access 로그)을 점검하고 PCI 10.2 접근 기록 충족 증거로 판정한다"
  - "el34-siem(Wazuh)이 분산 로그를 한 곳으로 중앙 수집·적재함을 확인하고 무결성·통합 모니터링의 전제임을 설명한다"
  - "감사 추적 5요소(누가·언제·무엇을·어디서·결과)를 열거하고 source IP·결과 누락 시 사건 재구성이 불가능함을 설명한다"
  - "로그 무결성(WORM·해시·append-only)·보존(PCI 최소 1년)·시간동기화(NTP, PCI 10.4) 요건을 정의하고 충족 여부를 판정한다"
  - "점검 결과를 발견→증거→표준 조항(PCI 10.x/ISMS-P 2.9)→권고 구조의 컴플라이언스 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 로깅 점검 대상 확인
      모든 컴플라이언스 점검의 전제는 점검 범위(scope)의 시스템에 실제로 접근이 된다는 것이다. 본 주차의
      대상은 로그를 **생성**하는 el34-web(Apache)과 그것을 **중앙 수집**하는 el34-siem(Wazuh) 두 곳이다.
      먼저 web 컨테이너에 접근해 점검을 시작할 수 있는 상태인지 확인한다.

      ## 💡 개념 한 줄
      감사자는 본격 점검에 앞서 항상 대상 자산이 실재하고 접근 가능한지부터 확인한다(scope 검증).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서 `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 로깅 점검 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      - `docker exec -it el34-web bash` — el34 호스트에서 el34-web 컨테이너로 접속해 명령을 실행한다.
      - `hostname` — 컨테이너 호스트명 출력(접근 성공의 1차 증거). `echo target_ok` — 점검 마커.

      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나타나면 대상 접근 성공 — 응답이 없으면 호스트
      SSH·컨테이너 가동 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 로깅 점검 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "로깅 점검 대상 = el34-web(로그 생성)/el34-siem(중앙 수집). 본 미션은 scope 검증 — 출력 마커 target_ok 로 대상 접근 성공을 판정한다."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 로그 활성 점검 (Apache access 로그)
      PCI-DSS 10.2 의 출발점은 "접근이 **기록되고 있는가**"다. 로그가 아예 생성되지 않으면 그 뒤의 모든
      통제(중앙수집·보존·모니터링)가 무의미하다. el34-web 은 vhost(juice/dvwa/neobank 등)마다 별도의
      access 로그를 남기므로, `/var/log/apache2/` 의 `*access*.log` 파일 개수를 세어 로그 생성 여부를
      정량 확인한다.

      ## 💡 개념 한 줄
      Apache access 로그는 웹서버가 받은 모든 HTTP 요청을 한 줄씩 적은 기록으로, 건물 출입구의 방문자
      기록부에 해당한다 — 그 줄에 출처 IP·시각·요청·응답코드가 담겨 감사 5요소 중 넷이 자동으로 채워진다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) Apache vhost별 access 로그 파일 수를 세어 access_logs= 로 출력하고 앞 4개 나열(로그 활성 정량 확인)
      N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"; ls /var/log/apache2/*access*.log 2>/dev/null | head -4
      # 2) 해석 — vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)
      echo "→ vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)"
      ```
      - `ls /var/log/apache2/*access*.log` — access 로그 파일 나열(vhost마다 하나씩). `2>/dev/null` 오류 숨김, `wc -l` 개수.

      ## ✅ 합격 기준
      `access_logs=` 출력 시 통과. **근거:** `access_logs=N`(N≥1, 보통 vhost 수만큼)이면 로그 활성 = PCI
      10.2 접근 기록 충족 — `access_logs=0` 이면 로깅이 꺼진 중대 결함(즉시 시정 대상).
    hint: 'access.log 개수'
    category: recon
    points: 14
    answer: |
      # 1) Apache vhost별 access 로그 파일 수를 세어 access_logs= 로 출력하고 앞 4개 나열(로그 활성 정량 확인)
      docker exec el34-web sh -c 'N=$(ls /var/log/apache2/*access*.log 2>/dev/null | wc -l); echo "access_logs=$N"; ls /var/log/apache2/*access*.log 2>/dev/null | head -4'
      # 2) 해석 — vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)
      echo "→ vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)"
    answer_detail: "로그 활성 = Apache vhost별 access 로그 다수 존재. 파일 개수가 '로그가 켜져 있다'의 객관 증거이며, 접근 기록은 감사 추적(PCI 10.2)의 기본이다. 운영자의 구두 주장이 아니라 파일 존재로 입증한다."
    expected_output: |
      access_logs=31
      /var/log/apache2/access.log
      /var/log/apache2/admin_access.log
      /var/log/apache2/admin_port_access.log
      /var/log/apache2/admin_tls_access.log
      → vhost별 access 로그 활성 = 웹 접근 감사 추적 존재(PCI 10.2)
    verify:
      type: output_contains
      expect: 'access_logs='
      field: stdout
      semantic:
        intent: "로그 활성 점검"
        success_criteria: ["접근 로그 존재"]
        acceptable_methods: ["**[OSS] 로그 점검 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 중앙 수집 점검 (Wazuh SIEM)
      로그를 생성만 하고 침투 서버의 로컬에 두면 공격자가 자기 흔적과 함께 지운다. 중앙 수집은 (a)
      공격자가 못 지우게 하는 무결성과 (b) 흩어진 단서를 한 사건으로 잇는 상관분석의 전제이며, PCI 10.6/
      10.7 의 토대다. el34-siem 의 Wazuh manager 가 web·ips 의 로그를 한 곳으로 모아 적재 중인지 확인한다.

      ## 💡 개념 한 줄
      SIEM 은 분산된 여러 서버의 로그를 한 곳으로 모아 정규화·상관분석·알림 하는 관제실이고, el34 에서는
      Wazuh 가 그 역할을 한다(web=agent web004, ips=agent ips003 으로 등록되어 실시간 전송).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) Wazuh manager의 alerts.json 마지막 줄 일부 출력 후 siem_ingest_ok(중앙 수집·적재 확인)
      tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok
      # 2) 해석 — Wazuh가 IPS/web 로그 중앙 수집·상관·알림(분산 로그를 한 곳에서 감사, 변조·삭제 방지)
      echo "→ Wazuh가 IPS/web 로그 중앙 수집·상관·알림. 분산 로그를 한 곳에서 감사(변조·삭제 방지)"
      ```
      - `/var/ossec/logs/alerts/alerts.json` — Wazuh 수집·상관 결과를 한 줄씩 JSON 으로 적재하는 파일. `tail -1`=최근 줄, `head -c 80`=앞 80바이트만.

      ## ✅ 합격 기준
      `siem_ingest_ok` 출력 시 통과. **근거:** alerts.json 최근 줄 일부와 siem_ingest_ok 가 나오면 중앙
      수집 동작 — 파일이 비었거나 없으면 Wazuh manager·agent 연결(ips003/web004)을 점검한다.
    hint: 'Wazuh alerts.json'
    category: manipulation
    points: 14
    answer: |
      # 1) Wazuh manager의 alerts.json 마지막 줄 일부 출력 후 siem_ingest_ok(중앙 수집·적재 확인)
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 80; echo; echo siem_ingest_ok'
      # 2) 해석 — Wazuh가 IPS/web 로그 중앙 수집·상관·알림(분산 로그를 한 곳에서 감사, 변조·삭제 방지)
      echo "→ Wazuh가 IPS/web 로그 중앙 수집·상관·알림. 분산 로그를 한 곳에서 감사(변조·삭제 방지)"
    answer_detail: "중앙 수집 = Wazuh manager 의 alerts.json 에 이벤트 적재. 중앙화가 무결성(공격자가 침투 서버에서 로그를 못 지움)과 통합 모니터링(흩어진 단서를 한 사건으로 상관)의 전제다 — PCI 10.6/10.7."
    expected_output: |
      {"timestamp":"2026-06-26T14:49:29.372+0000","rule":{"level":10,"description":"[S
      siem_ingest_ok
      → Wazuh가 IPS/web 로그 중앙 수집·상관·알림. 분산 로그를 한 곳에서 감사(변조·삭제 방지)
    verify:
      type: output_contains
      expect: 'siem_ingest_ok'
      field: stdout
      semantic:
        intent: "중앙 수집 확인"
        success_criteria: ["SIEM 적재"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 감사 추적 5요소 정리 (PCI 10.2)
      로그가 "있다"는 것만으로는 부족하다. 한 줄 한 줄에 감사 5요소 — 누가(who)·언제(when)·무엇을(what)·
      어디서(where)·결과(outcome) — 가 담겨야 사건을 재구성할 수 있다. 또한 PCI 10.2 는 특정 행위들(인증
      시도·권한 변경·관리 행위·데이터 접근·로그 자체 접근)을 반드시 기록하라고 요구한다. 이 기준을 정리한다.

      ## 💡 개념 한 줄
      감사 5요소는 사건 보고서의 육하원칙과 같다 — 특히 source IP(어디서)와 결과(성공/실패)가 빠지면
      "외부 공격자가 로그인에 성공했는가, 실패만 반복했는가"를 구분할 수 없어 사건의 심각도조차 판정 불가다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 감사 추적 5요소 — 누가/언제/무엇을/어디서/결과(사건 재구성의 최소 단위)
      echo "감사 추적 5요소: 누가(user) · 언제(timestamp) · 무엇을(event/object) · 어디서(source IP) · 결과(성공/실패)"
      # 2) PCI 10.2 필수 기록 행위 — 인증 시도/권한 변경/관리 행위/데이터 접근/로그 자체 접근
      echo "필수 기록: 인증 시도, 권한 변경, 관리 행위, 데이터 접근, 로그 자체 접근"
      # 3) 결론 — 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)
      echo "→ 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)"
      ```
      - 본 미션은 시스템 조회가 아니라 감사 기준(5요소 + PCI 10.2 필수 기록 행위)을 정리·이해하는 분석 단계.

      ## ✅ 합격 기준
      `감사 추적` 출력 시 통과. **근거:** 5요소와 PCI 10.2 필수 기록 행위(인증 시도·권한 변경·관리 행위·
      데이터 접근·로그 자체 접근)가 정리되면 통과 — "로그 자체 접근"이 왜 필수인지(흔적 삭제 시도 탐지)를 설명할 수 있어야 한다.
    hint: '누가/언제/무엇/결과'
    category: analysis
    points: 12
    answer: |
      # 1) 감사 추적 5요소 — 누가/언제/무엇을/어디서/결과(사건 재구성의 최소 단위)
      echo "감사 추적 5요소: 누가(user) · 언제(timestamp) · 무엇을(event/object) · 어디서(source IP) · 결과(성공/실패)"
      # 2) PCI 10.2 필수 기록 행위 — 인증 시도/권한 변경/관리 행위/데이터 접근/로그 자체 접근
      echo "필수 기록: 인증 시도, 권한 변경, 관리 행위, 데이터 접근, 로그 자체 접근"
      # 3) 결론 — 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)
      echo "→ 5요소 누락 시 사건 재구성 불가(특히 source IP·결과)"
    answer_detail: "감사 요소 = 누가/언제/무엇을/어디서/결과(PCI 10.2) — 사건 재구성의 최소 단위. source IP·결과가 빠지면 공격 성공 여부조차 판정 불가하고, '로그 자체 접근'까지 기록해야 흔적 삭제 시도를 탐지한다."
    expected_output: |
