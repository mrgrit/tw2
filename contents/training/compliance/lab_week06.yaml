      ## 🎯 목표 — 시간 동기화 점검 (NTP, PCI 10.4)
      사건 재구성은 시간선(timeline) 위에서 이루어진다. 시스템 간 시계가 어긋나면 "fw 통과 → web 공격"의
      인과 순서가 로그상으로 뒤바뀌어 상관분석이 통째로 무너진다. el34-web 의 UTC 시각을 확인해 시간
      기준의 일관성을 점검하고, NTP 동기화가 왜 상관분석의 전제인지 이해한다.

      ## 💡 개념 한 줄
      NTP(Network Time Protocol)는 모든 시스템의 시계를 하나의 표준시(UTC)에 맞추는 프로토콜이다 — 모든
      시계를 표준시에 동기화하는 것과 같다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) el34-web의 UTC 시각을 ISO 8601로 출력 후 time_checked(시간 기준 일관성 확인)
      date -u +%Y-%m-%dT%H:%M:%SZ; echo time_checked
      # 2) 해석 — PCI 10.4: 모든 시스템 NTP 동기화, 시계 어긋나면 사건 시간선 붕괴(상관분석 불가)
      echo "→ PCI 10.4: 모든 시스템 NTP 동기화. 시계 어긋나면 사건 시간선 붕괴(상관분석 불가)"
      ```
      - `date -u` UTC 기준(시간대 차이 없이 한 시간선에 정렬). `+%Y-%m-%dT%H:%M:%SZ` ISO 8601(끝의 Z=UTC).

      ## ✅ 합격 기준
