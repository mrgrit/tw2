      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp15.txt | head -3; echo findings=\$(wc -l < /tmp/cp15.txt); rm -f /tmp/cp15.txt"
      # 2) 해석 — 보안 헤더 누락 등 발견(갭). 정기 스캔의 한 회차(PCI-DSS 11.3)
      echo "→ 보안 헤더 누락 등 발견(갭)"
      ```
