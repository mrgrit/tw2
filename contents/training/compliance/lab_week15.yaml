      `/usr/bin`·`/etc/apache2` 등 핵심 디렉토리를 실시간(realtime+whodata)으로 감시한다. 무단 변경(예:
      웹셸 업로드, 설정 조작)이 나면 즉시 알림이 떠, 변경관리 기록과 결합하면 "기록 없는 변경 = 조사
