lab_id: standalone-compliance-week15
title: "기말: 종합 컴플라이언스 감사 — 전 영역 점검→준수율→시정 로드맵"
version: standalone-compliance
course: compliance
week: 15
description: |
  기말(수료) 종합 컴플라이언스 감사 — 14주 동안 영역별로 하나씩 익힌 통제를 단 하나의 표적(el34) 위에
  올려, 정보노출(W01) → 접근통제(W04) → 암호화(W05) → 로깅(W06) → 구성평가 SCA(W09) → 무결성 FIM(W10)
  → 취약점(W07) → 개인정보(W12) 의 여덟 영역을 한 바퀴 점검한다. 각 영역에서 기준(CIS/PCI-DSS/ISMS-P/
  개인정보보호법) ↔ el34 현재 상태를 대조해 준수(compliant)/갭(gap)을 증적과 함께 판정하고, 그 판정을
  모아 준수율(compliance score) 산정 → 갭 도출 → 위험 기반 시정 로드맵까지 갖춘 종합 감사 보고서 한 편으로
  종합한다. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec 로 실행하며(설정·SCA 는
  el34-web, 로깅·FIM 적재는 el34-siem, 전송 암호화·취약점 스캔·PII 점검은 el34-attacker), 신규 도구 설치는
  없다. 인가된 표적(el34)만 점검하며, 점검만 하고 설정은 변경하지 않는다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W01–W14 통과"
  - "el34 호스트 SSH + docker exec"
  - "전 주차 점검·평가·보고 역량"
objectives:
  - "정보노출~개인정보 여덟 영역 종합 감사를 단 하나의 표적(el34)에 처음부터 끝까지 한 바퀴 수행한다"
  - "각 영역을 어느 주차(W01·W04·W05·W06·W07·W09·W10·W12)·어느 프레임워크 조항에 대응시키고 기준 대비 준수/갭을 증적과 함께 판정한다"
  - "여덟 영역의 판정을 모아 준수율을 산정하고 갭을 위험 기반 우선순위로 정렬해 시정 로드맵을 작성한다"
  - "준수율 + 갭 목록 + 시정 로드맵 + 결론(강점·최우선 시정)을 종합 컴플라이언스 감사 보고서 한 편으로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (종합 감사의 전제)
      종합 감사의 첫 단계는 표적에 접근이 되는지 확인하는 것이다. 접근이 안 되면 이후 모든 음성 결과가
      무의미하다. 이번 기말의 감사 대상은 el34 전반 — 설정·SCA 를 보는 `el34-web`(dmz Apache+ModSec),
      로깅·FIM 적재를 보는 `el34-siem`(Wazuh), 전송 암호화·취약점 스캔·PII 점검을 던지는 `el34-attacker`
      세 컨테이너다. 여기서는 그 중심인 web 컨테이너에 `docker exec` 로 진입해 hostname 이 응답하는지로
      대상이 살아있고 점검 가능한 상태인지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 종합 감사 중심 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 종합 감사 착수 가능(대상 접근 성공) —
      응답이 없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 8
    answer: |
      # 1) 종합 감사 중심 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "종합 감사 대상 = el34 전반(설정·SCA 는 el34-web, 로깅·FIM 은 el34-siem, 전송·스캔·PII 는 el34-attacker). hostname 응답 + target_ok 출력으로 도달성 확인 — 여덟 영역 점검 착수의 전제 단계."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정보노출 — ServerTokens (W01: 프레임워크·갭 분석)
      종합 감사의 첫 영역은 정보 최소화다. `ServerTokens` 는 Apache 가 응답 `Server:` 헤더와 에러
      페이지에 자신의 정보를 얼마나 노출할지 정하는 설정으로, `OS` 면 `Apache/2.4.52 (Ubuntu)` 처럼
      제품 버전과 OS 가 그대로 드러나 공격자에게 표적에 맞는 CVE 를 고를 단서를 준다. **CIS Apache 2.4
      Benchmark 는 제품명만 노출하는 `Prod`** 를 요구한다(W01 에서 처음 만난 갭이며, W09 SCA 정책
      CIS 8.1 에도 같은 항목으로 정의돼 있다 — 수동→자동→종합으로 추적되는 갭). 이 명령은 설정값을 읽어
      기준(Prod) 대비 준수/갭을 셸 한 줄로 자동 판정한다(`grep -qi Prod && compliant || gap`).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) ServerTokens 실제값(current:)을 읽어 CIS 기준 Prod와 대조 — Prod면 compliant, 아니면 gap=ServerTokens
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ | head -1); echo "current:$V"; echo "$V" | grep -qi Prod && echo compliant || echo "gap=ServerTokens"'
      ```
      - `V=$(grep ...)`(실제 설정값)→`echo "current:$V"`(증적)→`grep -qi Prod && echo compliant || echo "gap=..."`(기준 대비 자동 판정).
      ## ✅ 합격 기준
      `gap=` 출력 시 통과. **근거:** gap=ServerTokens 가 나오면 현재값 OS 가 CIS 기준 Prod 에 미달한 갭 —
      낮은 위험(정찰 단서)이라 시정 로드맵 후순위(④)로 보고한다(설정을 못 읽으면 경로·권한 점검).
    hint: 'ServerTokens'
    category: manipulation
    points: 10
    answer: |
      # 1) ServerTokens 실제값(current:)을 읽어 CIS 기준 Prod와 대조 — Prod면 compliant, 아니면 gap=ServerTokens
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ | head -1); echo "current:$V"; echo "$V" | grep -qi Prod && echo compliant || echo "gap=ServerTokens"'
    answer_detail: "ServerTokens OS = 제품+OS 노출 → CIS Apache 2.4(8.1) 의 Prod 요구 미달 = 갭(W01, 정보노출). 공격자 정찰 단서라 낮은 위험이나 시정 로드맵 후순위(④)로 보고. W09 SCA 정책에도 같은 항목이 있어 수동·자동 점검이 같은 갭을 가리킨다. 증적 = current: 뒤의 실제 설정값."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "정보노출 점검"
        success_criteria: ["갭"]
        acceptable_methods: ["**[OSS] 설정 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ② 접근통제 — 암호 만료 PASS_MAX_DAYS (W04: 접근통제)
      접근통제는 "누가 어떻게 접근하고 그 자격이 안전하게 관리되는가"를 보며, 기말에서는 **암호 만료
      주기**를 대표 항목으로 점검한다. `PASS_MAX_DAYS` 는 `/etc/login.defs` 에 정의된 암호 강제 만료
      주기(일)로, 만료가 없으면 한 번 유출된 암호가 무기한 악용된다. **PCI-DSS 8.3.9 / CIS 는 ≤90일**을
      권고하며, 값이 `99999` 면 사실상 무기한이다. 이 명령은 설정값에서 숫자만 추출(`tr -dc 0-9`)해 90 과
      비교하고 90 초과면 갭으로 판정한다. 같은 접근통제 영역에서 `PermitRootLogin no`(원격 root 직접
      로그인 차단)는 **준수**라, 한 영역 안에 준수와 갭이 섞인 혼합 상태를 보여준다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) PASS_MAX_DAYS 숫자만 뽑아 max_days= 로 출력 후 90 초과면 gap=no_expiry, 이하면 compliant
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo compliant'
      # 2) 해석 — root 로그인은 차단(준수), 암호 만료는 무기한(갭) = 영역 내 혼합
      echo "→ root 로그인은 차단(준수), 암호 만료는 무기한(갭)"
      ```
      ## ✅ 합격 기준
      `gap=` 출력 시 통과. **근거:** gap=no_expiry 가 나오면 max_days=99999(사실상 무기한)가 PCI-DSS
      8.3.9(≤90일) 미달 — 계정 보호 직결이라 시정 우선순위 높음(②). (90 이하로 나오면 표적·설정 재확인.)
    hint: 'PASS_MAX_DAYS'
    category: manipulation
    points: 10
    answer: |
      # 1) PASS_MAX_DAYS 숫자만 뽑아 max_days= 로 출력 후 90 초과면 gap=no_expiry, 이하면 compliant
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo compliant'
      # 2) 해석 — root 로그인은 차단(준수), 암호 만료는 무기한(갭) = 영역 내 혼합
      echo "→ root 로그인은 차단(준수), 암호 만료는 무기한(갭)"
    answer_detail: "PASS_MAX_DAYS 99999 = 암호 사실상 무기한 → PCI-DSS 8.3.9/CIS(≤90일) 미달 = 갭(W04, 접근통제). 유출 시 무기한 악용되어 계정 보호 직결, 시정 우선순위 높음(②). 같은 영역의 PermitRootLogin no(원격 root 차단)는 준수 — 영역 내 혼합 상태. 증적 = max_days= 출력."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "접근통제 점검"
        success_criteria: ["만료 갭"]
        acceptable_methods: ["**[OSS] login.defs (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ③ 암호화 — TLS (W05: 전송 암호화, PCI-DSS 4)
      전송 구간 암호화는 도청·변조 방어의 기본이며 **PCI-DSS 요구사항 4 는 TLS1.2 이상**을 의무화한다
      (TLS1.0/1.1 은 폐기 대상). 이 점검은 표적의 **외부 진입점**을 보는 것이라 web 컨테이너 내부가
      아니라 점검자 컨테이너(`el34-attacker`)에서 fw 게이트웨이(`10.20.30.1:443`)로 핸드셰이크를 맺어
      협상된 프로토콜을 본다. `openssl s_client -connect <ip:443> -servername <vhost>` 가 명령줄에서
      TLS 핸드셰이크를 직접 맺어 `Protocol:`(버전)을 보여주는 점검 도구다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-attacker에서 게이트웨이 443에 TLS 핸드셰이크를 맺어 협상된 Protocol/Cipher 확인
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -2"
      # 2) 해석 — TLSv1.3 = PCI-DSS 4 준수(단, 자체서명 인증서는 별도 갭)
      echo "→ TLSv1.3 = PCI 4 준수(자체서명 인증서는 별도 갭)"
      ```
      ## ✅ 합격 기준
      `TLSv1` 출력 시 통과. **근거:** TLSv1.2/1.3 협상이 나오면 PCI-DSS 4(강한 전송 암호화) 준수 — 다만
      인증서가 자체서명이라 운영 환경이면 신뢰된 CA 인증서로 교체할 중간 순위(③) 주의 사항이다.
    hint: 'TLSv1.2+'
    category: analysis
    points: 10
    answer: |
      # 1) el34-attacker에서 게이트웨이 443에 TLS 핸드셰이크를 맺어 협상된 Protocol/Cipher 확인
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -2"
      # 2) 해석 — TLSv1.3 = PCI-DSS 4 준수(단, 자체서명 인증서는 별도 갭)
      echo "→ TLSv1.3 = PCI 4 준수(자체서명 인증서는 별도 갭)"
    answer_detail: "TLSv1.3 협상 = PCI-DSS 4(강한 전송 암호화) 준수(W05, 암호화). 단 자체서명 인증서는 신뢰 체인 결함이라 운영 환경이면 갭으로 시정 로드맵 ③. 증적 = Protocol/Cipher 출력."
    verify:
      type: output_contains
      expect: 'TLSv1'
      field: stdout
      semantic:
        intent: "암호화 점검"
        success_criteria: ["TLS1.2+"]
        acceptable_methods: ["**[OSS] openssl (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ④ 로깅 — Wazuh 중앙수집 (W06: 감사 추적, PCI-DSS 10)
      로그 없는 보안은 침해 후 추적·법적 대응·재발 방지가 모두 무너진다. **PCI-DSS 요구사항 10 은 모든
      접근에 감사 추적(audit trail)** 을, 그리고 그 로그의 **중앙 수집**을 요구한다. 중앙 수집은 공격자가
      침입한 호스트의 로컬 로그를 지워도 중앙에는 사본이 남게 해 변조·삭제를 방어하며 통합 모니터링의
      전제다. el34 의 SIEM 인 Wazuh(`el34-siem`)는 IPS·web 의 로그를 한 곳(`/var/ossec/logs/alerts/
      alerts.json`)에 모은다. 이 명령은 그 파일의 최근 한 줄을 읽어 이벤트가 실제로 적재되는지 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) SIEM alerts.json 최근 1줄 앞부분 + siem_ok — 분산 로그가 Wazuh에 중앙 적재되는지 확인
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | head -c 40; echo; echo siem_ok'
      # 2) 해석 — 중앙 수집 = PCI-DSS 10 준수
      echo "→ 중앙 수집 = PCI 10 준수"
      ```
      ## ✅ 합격 기준
      `siem_ok` 출력 시 통과. **근거:** alerts.json 선두 + siem_ok 가 나오면 분산 로그가 Wazuh 에 중앙
      수집되어 PCI-DSS 10 충족(준수) — 완전하려면 무결성·보존 1년+·NTP 동기화까지 보장돼야 한다.
    hint: 'Wazuh'
    category: analysis
    points: 10
    answer: |
      # 1) SIEM alerts.json 최근 1줄 앞부분 + siem_ok — 분산 로그가 Wazuh에 중앙 적재되는지 확인
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | head -c 40; echo; echo siem_ok'
      # 2) 해석 — 중앙 수집 = PCI-DSS 10 준수
      echo "→ 중앙 수집 = PCI 10 준수"
    answer_detail: "Wazuh(el34-siem) alerts.json 적재 = 분산 로그 중앙 수집 → PCI-DSS 10(감사 추적·중앙 수집) 준수(W06, 로깅). 변조 방지·통합 모니터링의 전제. 증적 = siem_ok + alerts.json 선두."
    verify:
      type: output_contains
      expect: 'siem_ok'
      field: stdout
      semantic:
        intent: "로깅 점검"
        success_criteria: ["중앙 수집"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 ⑤ 구성평가 — SCA 자동 점검 (W09: SCA/CIS)
      수백 항목을 손으로 점검하면 느리고 누락된다. **SCA(Security Configuration Assessment)** 는 CIS 같은
