      →재검증)이 컴플라이언스의 요구이며, **PCI-DSS 11.3 은 분기별·변경 후 스캔**을 의무화한다.
      `nuclei` 는 템플릿(`.yaml`) 기반 취약점 스캐너로, 여기서는 보안 헤더 누락 템플릿을 표적에 던진다.
      **보안 헤더**(`X-Frame-Options`·`Content-Security-Policy` 등)는 브라우저에 보안 동작을 지시하는 응답
      헤더로, 누락 시 클릭재킹·XSS 방어가 약해진다. 명령은 발견을 임시 파일에 모아(`tee`) 줄 수를 세어
      `findings=<n>` 으로 보고한다.
