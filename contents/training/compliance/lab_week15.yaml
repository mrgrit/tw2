lab_id: standalone-compliance-week15
title: "기말: 종합 컴플라이언스 감사 — 전 영역 점검→준수율→시정 로드맵"
version: standalone-compliance
course: compliance
week: 15
description: |
  기말 종합 감사 — 정보노출/접근통제/암호화/로깅/구성평가(SCA)/무결성(FIM)/취약점/개인정보를 한 바퀴
  점검해 준수율·갭·시정 로드맵 산출. el34 전반 실 점검. 명령은 el34 호스트에서. 인가된 실습만. 신규 설치 없음.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W01–W14 통과"
  - "el34 호스트 SSH + docker exec"
  - "전 주차 점검·평가·보고 역량"
objectives:
  - "전 영역 종합 감사 수행"
  - "준수율 산정/갭 도출"
  - "시정 로드맵(우선순위) 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 8
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "종합 감사 대상 = el34 전반(web/siem/attacker)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 정보노출 — ServerTokens
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ | head -1); echo "$V" | grep -qi Prod && echo compliant || echo "gap=ServerTokens"'
      ```
      ## ✅ 합격 기준
      정보노출 갭을 판정한다.
    hint: 'ServerTokens'
    category: manipulation
    points: 10
    answer: |
      echo "=== 정보노출 ==="
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ | head -1); echo "current:$V"; echo "$V" | grep -qi Prod && echo compliant || echo "gap=ServerTokens"'
    answer_detail: "ServerTokens OS → CIS Prod 미달(갭)."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "정보노출 점검"
        success_criteria: ["갭"]
        acceptable_methods: ["**[OSS] 설정 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 접근통제 — 암호 만료
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo compliant'
      ```
      ## ✅ 합격 기준
      암호 만료 갭을 판정한다.
    hint: 'PASS_MAX_DAYS'
    category: manipulation
    points: 10
    answer: |
      echo "=== 접근통제 (암호 만료) ==="
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo compliant'
      echo "→ root 로그인은 차단(준수), 암호 만료는 무기한(갭)"
    answer_detail: "PASS_MAX_DAYS 99999 = 만료 없음(갭). PermitRootLogin no는 준수."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "접근통제 점검"
        success_criteria: ["만료 갭"]
        acceptable_methods: ["**[OSS] login.defs (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 암호화 — TLS
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -i Protocol | head -1"
      ```
      ## ✅ 합격 기준
      전송 암호화(준수)를 확인한다.
    hint: 'TLSv1.2+'
    category: analysis
    points: 10
    answer: |
      echo "=== 암호화 (TLS) ==="
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -2"
      echo "→ TLSv1.3 = PCI 4 준수(자체서명 인증서는 별도 갭)"
    answer_detail: "TLSv1.3 = 암호화 준수. 자체서명 인증서는 갭."
    verify:
      type: output_contains
      expect: 'TLSv1'
      field: stdout
      semantic:
        intent: "암호화 점검"
        success_criteria: ["TLS1.2+"]
        acceptable_methods: ["**[OSS] openssl (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 로깅 — Wazuh
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | head -c 40; echo; echo siem_ok'
      ```
      ## ✅ 합격 기준
      로깅 중앙 수집(준수)을 확인한다.
    hint: 'Wazuh'
    category: analysis
    points: 10
    answer: |
      echo "=== 로깅 (Wazuh) ==="
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | head -c 40; echo; echo siem_ok'
      echo "→ 중앙 수집 = PCI 10 준수"
    answer_detail: "Wazuh 중앙수집 = 로깅 준수."
    verify:
      type: output_contains
      expect: 'siem_ok'
      field: stdout
      semantic:
        intent: "로깅 점검"
        success_criteria: ["중앙 수집"]
        acceptable_methods: ["**[OSS] Wazuh (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 구성평가 — SCA
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "grep -A1 '<sca>' /var/ossec/etc/ossec.conf | head -2"
      ```
      ## ✅ 합격 기준
      SCA 자동 평가(가동)를 확인한다.
    hint: 'SCA enabled'
    category: manipulation
    points: 10
    answer: |
      echo "=== 구성평가 (SCA) ==="
      docker exec el34-web sh -c "grep -A2 '<sca>' /var/ossec/etc/ossec.conf | head -3"
      echo "→ SCA enabled = CIS 자동 점검 가동(준수)"
    answer_detail: "SCA enabled = 자동 구성평가 가동(준수)."
    verify:
      type: output_contains
      expect: 'sca'
      field: stdout
      semantic:
        intent: "구성평가 점검"
        success_criteria: ["SCA 가동"]
        acceptable_methods: ["**[OSS] ossec.conf (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 무결성 — FIM
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json | grep -c syscheck); echo "fim_alerts=$N"'
      ```
      ## ✅ 합격 기준
      FIM 무결성 모니터링(가동)을 확인한다.
    hint: 'syscheck'
    category: analysis
    points: 10
    answer: |
      echo "=== 무결성 (FIM) ==="
      docker exec el34-siem sh -c 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json | grep -c syscheck); echo "fim_alerts=$N"'
      echo "→ FIM 알림 다수 = 무결성 모니터링 가동(준수)"
    answer_detail: "FIM syscheck 알림 = 무결성 모니터링 가동(준수)."
    verify:
      type: output_contains
      expect: 'fim_alerts='
      field: stdout
      semantic:
        intent: "무결성 점검"
        success_criteria: ["FIM 가동"]
        acceptable_methods: ["**[OSS] alerts.json (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 취약점 — nuclei
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp15.txt | head -3; echo findings=\$(wc -l < /tmp/cp15.txt); rm -f /tmp/cp15.txt"
      ```
      ## ✅ 합격 기준
      취약점 스캔을 수행한다.
    hint: 'nuclei'
    category: manipulation
    points: 10
    answer: |
      echo "=== 취약점 (nuclei) ==="
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp15.txt | head -3; echo findings=\$(wc -l < /tmp/cp15.txt); rm -f /tmp/cp15.txt"
      echo "→ 보안 헤더 누락 등 발견(갭)"
    answer_detail: "nuclei 스캔 = 보안 헤더 누락 등 취약점 발견(갭)."
    verify:
      type: output_contains
      expect: 'findings='
      field: stdout
      semantic:
        intent: "취약점 점검"
        success_criteria: ["스캔"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 9
    instruction: |
      ## 🎯 개인정보 — Feedbacks 노출
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE '@[a-zA-Z0-9.-]+' | head -1; echo pii_check"
      ```
      ## ✅ 합격 기준
      개인정보 노출 갭을 확인한다.
    hint: '이메일 노출'
    category: manipulation
    points: 10
    answer: |
      echo "=== 개인정보 (Feedbacks) ==="
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE '@[a-zA-Z0-9.-]+' | head -1; echo pii_check"
      echo "→ 무인증 이메일/UserId 노출 = 개인정보 보호 갭"
    answer_detail: "Feedbacks 무인증 PII 노출 = 개인정보 보호 갭."
    verify:
      type: output_contains
      expect: 'pii_check'
      field: stdout
      semantic:
        intent: "개인정보 점검"
        success_criteria: ["노출 갭"]
        acceptable_methods: ["**[OSS] API (권장)**"]
    target_vm: web

  - order: 10
    instruction: |
      ## 🎯 종합 감사 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W15 종합 감사 보고서 (학번, 이름)
      ## 1. 준수율(준수/전체)
      ## 2. 갭 목록
      ## 3. 시정 로드맵(우선순위)
      ```
      ## ✅ 합격 기준
      준수율 + 갭 + 시정 로드맵이 포함된다.
    hint: '준수율+갭+로드맵'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W15 종합 감사 보고서
      ## 1. 준수율: 준수(암호화 TLS, 로깅 Wazuh, SCA, FIM, root 로그인 차단, 파일권한) / 갭(ServerTokens, 암호 만료, 자체서명 인증서, 보안헤더, PII 노출)
      ##   → 8개 핵심 영역 중 준수 다수, 갭 5건
      ## 2. 갭 목록:
      ##   - [High] PII 무인증 노출(Feedbacks) — 개인정보보호법
      ##   - [High] 암호 만료 없음(PASS_MAX_DAYS) — PCI 8.3.9
      ##   - [Medium] 자체서명 인증서 — PCI 4
      ##   - [Medium] ServerTokens OS / 보안 헤더 누락 — CIS
      ## 3. 시정 로드맵: ①PII 접근통제(즉시) ②암호 만료 90일 ③CA 인증서 ④ServerTokens Prod+헤더
      ## 결론: 탐지/암호화/로깅 기반은 견고. 개인정보 노출·암호 만료가 최우선 시정. 위험 기반 로드맵으로 단계 개선
      EOF
    answer_detail: "종합 감사 = 준수율+갭(PII/암호만료/인증서/헤더)+위험기반 시정 로드맵. 한 학기 통합."
    verify:
      type: output_contains
      expect: '시정'
      field: stdout
      semantic:
        intent: "종합 감사 보고"
        success_criteria: ["준수율/갭/로드맵"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
