  - order: 8
    instruction: |
      ## 🎯 취약점 관리 보고서 — 감사 제출용 증적
      미션 1~7 의 점검을 한 문서로 종합해, 취약점 관리 통제의 감사 증적을 만든다.
      ## 📖 개념 한 줄
      취약점 관리의 산출물은 보고서다. 각 단계를 PCI-DSS 조항(11=점검·재검증 / 6=패치)에 매핑하고
      증적(스캔 건수·severity 등급·SLA 표·가상패치 동작)을 붙여야 '주장'이 아닌 '증거'가 된다.
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W07 취약점 관리 보고서 (학번, 이름)
      ## 1. 정기 스캔(nuclei) 결과
      ## 2. 위험도 분류/패치 SLA
      ## 3. 관리 순환/보상 통제
      ```
      - 1절(PCI 11): nuclei 정기 스캔 결과와 발견 건수 — '정기 점검을 프로세스화'한 증적.
      - 2절(PCI 6): severity/CVSS 위험도 분류 + 위험도별 패치 SLA(Critical≤7/High30/Medium90).
      - 3절: 식별→평가→조치→재검증→반복 순환 + 보상 통제(ModSec 가상패치)·예외(위험 수용) 관리.
      ## ✅ 합격 기준
      보고서에 정기 스캔 + 패치 SLA + 관리 순환이 종합되면 합격(증적 없는 주장만으로는 채점되지 않음).
    hint: '스캔+SLA+순환'
