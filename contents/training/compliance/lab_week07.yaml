    answer_detail: "방어 = 정기 스캔(분기+변경 후)+위험도 분류+SLA 패치+재검증+보상 통제+예외(위험 수용) 관리를 누가·언제·어떻게의 제도로 정의. 정책 문서와 실행 증적(최근 스캔 결과·패치 이력)을 함께 갖춰 '서류상 통제'가 아닌 실제 도는 순환임을 입증하는 것이 핵심."
