lab_id: standalone-compliance-week07
title: "취약점 관리 컴플라이언스 — 정기 스캔·패치·재검증 (PCI-DSS 11·6)"
version: standalone-compliance
course: compliance
week: 7
description: |
  취약점 관리 컴플라이언스를 감사자의 눈으로 한 바퀴 점검한다. 취약점은 매일 새 CVE가 공개되어
  일회성 점검으로 끝낼 수 없으므로, 정기 스캔 → 위험도 분류 → 기한 내 패치 → 재검증이 순환
  프로세스(제도)로 도는지를 증적과 함께 확인하는 것이 핵심이다. el34-attacker 의 nuclei(v3.3.5,
  템플릿 기반 스캐너)로 juice.el34.lab 에 보안 헤더 누락을 실제로 스캔하고(PCI-DSS 11=점검), 발견을
  severity(critical~info)/CVSS로 분류한 뒤, 위험도별 패치 SLA(Critical≤7/High30/Medium90, PCI-DSS
  6=패치)와 변경관리 절차를 정리한다. 패치가 당장 불가능한 경우의 보상 통제로 el34 의 ModSecurity
  가상패치(WAF 룰로 SQLi/XSS 차단)를 자리매김하고, 위험 수용 문서화·재검토까지 묶어 감사 제출용
  취약점 관리 보고서를 작성한다. 표적은 juice/dvwa 뿐, 스캔은 el34-attacker 컨테이너, 인가된 실습만.
  모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}}, 비밀번호 1)에서 docker exec -it el34-attacker bash 로 접속해 실행한다. nuclei
  템플릿은 이미 설치되어 있어 신규 설치는 없다(web-vuln 자동화 스캐닝 주차에서 호스트→컨테이너로 주입).
  nuclei 출력 순서는 병렬 실행이라 비결정적이므로 합격은 줄 순서가 아니라 키워드 포함 여부로 판정한다.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W06 통과 (web-vuln W13 nuclei 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(스캔) §4(패치) §5(재검증) 숙지"
objectives:
  - "정기 스캔(nuclei)을 수행하고 발견 건수를 집계해 PCI-DSS 11(점검) 통제를 증적으로 만든다"
  - "결과를 severity(critical~info)/CVSS로 분류하고 위험도별 패치 SLA(PCI-DSS 6)를 정리한다"
  - "취약점 관리 순환(식별→평가→조치→재검증→반복)을 일회성이 아닌 제도화된 프로세스로 정의한다"
  - "패치 불가 시 보상 통제(ModSec 가상패치·망분리·모니터링+위험 수용 문서화)를 자리매김한다"
  - "정기 스캔·분류·SLA·순환·보상통제를 PCI-DSS 11·6에 매핑한 감사 제출용 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 표적 도달성
      취약점 관리의 첫 단계인 정기 스캔을 시작하기 전에, 표적에 요청이 실제로 닿는지부터 확인한다.
      ## 📖 개념 한 줄
      연결이 안 되면 스캐너의 '무탐(발견 없음)'이 '취약점이 없는 것'인지 '표적에 못 닿은 것'인지
      구분할 수 없으므로, 모든 점검은 도달성 확인으로 시작한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 표적 juice vhost 도달성 확인 — Host로 vhost 지정, 응답코드만 juice= 형식으로(무탐과 미도달 혼동 방지)
      curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/
      ```
      - `curl -H 'Host: juice.el34.lab'` 로 점검할 vhost 지정, `-sk -o /dev/null -w '...%{http_code}'`로 응답 코드만. 요청은 fw(10.20.30.1)→web.
      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** `juice` 와 응답 코드(보통 juice=200)가 돌아오면 표적 도달 → 스캔 착수 가능.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) 표적 juice vhost 도달성 확인 — Host로 vhost 지정, 응답코드만 juice= 형식으로(무탐과 미도달 혼동 방지)
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "취약점 관리 점검 대상 = JuiceShop(juice.el34.lab). curl 로 fw→web 경로 도달성을 먼저 확인해, 이후 nuclei 스캔의 무탐이 '취약점 없음'인지 '표적 미도달'인지 혼동하지 않게 한다."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 정기 스캔 — nuclei (PCI-DSS 11)
      취약점 관리 순환의 ① 식별 단계 — 자동 스캐너로 정기 점검을 수행하고 발견 건수를 집계한다.
      ## 📖 개념 한 줄
      PCI-DSS 11(보안 시스템·프로세스의 정기 시험)은 분기별 + 중대한 변경 후 취약점 스캔을 의무화한다.
      자동 스캐너로 점검을 '프로세스화'하는 것이 일회성 수동 점검과의 결정적 차이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) nuclei로 보안 헤더 누락 템플릿 스캔(임시파일 저장→앞 6줄) 후 발견 줄 수를 findings= 로 집계, 임시파일 정리
      nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp7.txt | head -6; echo findings=$(wc -l < /tmp/cp7.txt); rm -f /tmp/cp7.txt
      # 2) 해석 — PCI 11.3: 분기별+변경 후 스캔, 자동 스캐너로 정기 점검을 프로세스화
      echo "→ PCI 11.3: 분기별+변경 후 스캔. 자동 스캐너로 정기 점검을 프로세스화"
      ```
      - `nuclei -t <템플릿>` 으로 "무엇을 점검할지"를 갈아끼움(여기선 http-missing-security-headers). `findings=$(wc -l ...)` 로 발견 줄 수 집계.
      ## ✅ 합격 기준
      `findings=` 출력 시 통과. **근거:** 스캔이 수행되고 findings=<숫자> 가 나오면 건수 집계(추세 관리의
      기초) 성공 — nuclei 출력은 병렬이라 줄 순서가 매번 달라 findings= 포함 여부로 판정한다.
    hint: 'nuclei 스캔'
    category: manipulation
    points: 14
    answer: |
      # 1) nuclei로 보안 헤더 누락 템플릿 스캔(임시파일 저장→앞 6줄) 후 발견 줄 수를 findings= 로 집계, 임시파일 정리
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp7.txt | head -6; echo findings=\$(wc -l < /tmp/cp7.txt); rm -f /tmp/cp7.txt"
      # 2) 해석 — PCI 11.3: 분기별+변경 후 스캔, 자동 스캐너로 정기 점검을 프로세스화
      echo "→ PCI 11.3: 분기별+변경 후 스캔. 자동 스캐너로 정기 점검을 프로세스화"
    answer_detail: "정기 스캔 = nuclei(템플릿 기반 스캐너)로 보안 헤더 누락 등을 자동 점검(PCI-DSS 11, 분기별+변경 후). 발견 건수 집계는 주기별 증감을 추적하는 추세 관리의 기초이자, '정기 점검을 도구로 자동화·프로세스화했다'는 감사 증적이 된다."
    expected_output: |
      [http-missing-security-headers:x-permitted-cross-domain-policies] [http] [info] http://10.20.30.1
      [http-missing-security-headers:referrer-policy] [http] [info] http://10.20.30.1
      [http-missing-security-headers:cross-origin-embedder-policy] [http] [info] http://10.20.30.1
      [http-missing-security-headers:cross-origin-opener-policy] [http] [info] http://10.20.30.1
      [http-missing-security-headers:cross-origin-resource-policy] [http] [info] http://10.20.30.1
      [http-missing-security-headers:strict-transport-security] [http] [info] http://10.20.30.1
      findings=8
      → PCI 11.3: 분기별+변경 후 스캔. 자동 스캐너로 정기 점검을 프로세스화
    verify:
      type: output_contains
      expect: 'findings='
      field: stdout
      semantic:
        intent: "정기 스캔"
        success_criteria: ["스캔 수행/집계"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 결과 분류 — severity (관리 순환 ② 평가)
      스캔으로 식별한 취약점에 위험 등급을 매겨, 무엇부터 고칠지 우선순위를 세운다.
      ## 📖 개념 한 줄
      발견을 나열만 하면 우선순위를 정할 수 없다. severity(스캐너의 대략적 분류)를 CVSS·자산 중요도와
      연계해야 다음 단계(패치 SLA)의 기준이 선다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) nuclei severity 등급 — critical/high/medium/low/info
      echo "nuclei severity 등급: critical / high / medium / low / info"
      # 2) 맥락 — 보안 헤더 누락(info)은 단독 위험 낮으나 심층방어 약화
      echo "보안 헤더 누락(info) → 단독 위험은 낮으나 심층방어 약화"
      # 3) 결론 — severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정
      echo "→ severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정"
      # 4) 분류 완료 표식
      echo "severity=classified"
      ```
      - severity=nuclei 5단계 꼬리표, CVSS=공격 난이도·영향을 0.0~10.0으로 표준화한 수치. 등급은 노출 위치·자산 중요도 맥락과 함께 읽는다.
      ## ✅ 합격 기준
      `severity=` 출력 시 통과. **근거:** severity 등급 분류가 나오면 위험도 분류(패치 우선순위의 근거)가 선다.
    hint: 'severity 분류'
    category: analysis
    points: 12
    answer: |
      # 1) nuclei severity 등급 — critical/high/medium/low/info
      echo "nuclei severity 등급: critical / high / medium / low / info"
      # 2) 맥락 — 보안 헤더 누락(info)은 단독 위험 낮으나 심층방어 약화
      echo "보안 헤더 누락(info) → 단독 위험은 낮으나 심층방어 약화"
      # 3) 결론 — severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정
      echo "→ severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정"
      # 4) 분류 완료 표식
      echo "severity=classified"
    answer_detail: "결과 분류 = nuclei severity(critical~info)를 CVSS 점수·자산 중요도와 연계해 최종 위험도 등급 부여. 등급은 노출 위치·자산 중요도라는 맥락과 함께 읽어야 하며, 이 위험도가 다음 단계 패치 SLA 적용의 근거가 된다."
    expected_output: |
      nuclei severity 등급: critical / high / medium / low / info
      보안 헤더 누락(info) → 단독 위험은 낮으나 심층방어 약화
      → severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정
      severity=classified
    verify:
      type: output_contains
      expect: 'severity='
      field: stdout
      semantic:
        intent: "결과 분류"
        success_criteria: ["위험도 등급"]
        acceptable_methods: ["**[표준] severity (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 패치 관리 — 위험도별 SLA (PCI-DSS 6, 관리 순환 ③ 조치)
      위험도별로 '언제까지 패치한다'는 기한(SLA)과 통제된 변경 절차를 정리한다.
      ## 📖 개념 한 줄
      식별·평가까지 해도 기한 없이 "고친다"만 있으면 무기한 방치된다. PCI-DSS 6(안전한 개발·패치)의
      핵심은 위험도가 높을수록 짧은 기한을 못 박는 것이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) Critical — 즉시(예 ≤7일)
      echo "Critical: 즉시(예 ≤7일)"
      # 2) High — 30일 이내
      echo "High: 30일 이내"
      # 3) Medium — 90일 이내
      echo "Medium: 90일 이내"
      # 4) 절차 — 변경관리(테스트→승인→배포→검증)
      echo "절차: 변경관리(테스트→승인→배포→검증) 준수"
      # 5) 결론 — SLA 없는 패치는 무기한 방치, 위험도별 기한이 핵심
      echo "→ SLA 없는 패치는 무기한 방치. 위험도별 기한이 핵심"
      ```
      - SLA=위험 등급별 패치 기한 약속(예 Critical≤7/High30/Medium90, 일수는 정책별 상이). 변경관리=테스트→승인→배포→검증의 통제 절차.
      ## ✅ 합격 기준
      `SLA` 출력 시 통과. **근거:** 위험도별 기한(SLA)과 변경관리 절차가 정리되면 통과 — SLA 없는 정책은
      우선순위·책임 시한이 없어 무기한 방치로 이어진다.
    hint: 'SLA 7/30/90'
    category: analysis
    points: 14
    answer: |
      # 1) Critical — 즉시(예 ≤7일)
      echo "Critical: 즉시(예 ≤7일)"
      # 2) High — 30일 이내
      echo "High: 30일 이내"
      # 3) Medium — 90일 이내
      echo "Medium: 90일 이내"
      # 4) 절차 — 변경관리(테스트→승인→배포→검증)
      echo "절차: 변경관리(테스트→승인→배포→검증) 준수"
      # 5) 결론 — SLA 없는 패치는 무기한 방치, 위험도별 기한이 핵심
      echo "→ SLA 없는 패치는 무기한 방치. 위험도별 기한이 핵심"
    answer_detail: "패치 SLA = 위험도별 기한(예 Critical≤7/High30/Medium90일, PCI-DSS 6)을 정책으로 명시하고, 변경관리(테스트→승인→배포→검증) 절차로 적용. 기한 없는 패치 정책은 우선순위·책임 시한이 없어 무기한 방치로 이어진다 — 위험도별 기한 명시가 통제의 핵심."
    expected_output: |
      Critical: 즉시(예 ≤7일)
      High: 30일 이내
      Medium: 90일 이내
      절차: 변경관리(테스트→승인→배포→검증) 준수
      → SLA 없는 패치는 무기한 방치. 위험도별 기한이 핵심
    verify:
      type: output_contains
      expect: 'SLA'
      field: stdout
      semantic:
        intent: "패치 관리 SLA"
        success_criteria: ["위험도별 기한"]
        acceptable_methods: ["**[표준] PCI 6.3 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 취약점 관리 순환 (④ 재검증 + ⑤ 반복)
      개별 단계를 하나의 순환 프로세스로 묶어 정리한다 — 일회성이 아닌 순환이 컴플라이언스의 본질이다.
      ## 📖 개념 한 줄
