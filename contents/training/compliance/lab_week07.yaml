lab_id: standalone-compliance-week07
title: "취약점 관리 컴플라이언스 — 정기 스캔·패치·재검증 (PCI-DSS 11·6)"
version: standalone-compliance
course: compliance
week: 7
description: |
  취약점 관리 — 정기 스캔(nuclei, PCI 11.3), 결과 분류(severity), 패치 관리(PCI 6.3 SLA),
  관리 순환, 보상 통제. el34 nuclei 실스캔. 공격은 el34-attacker. 인가된 실습만. 신규 설치 없음(W13서 설치됨).
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W06 통과 (web-vuln W13 nuclei 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(스캔) §4(패치) §5(재검증) 숙지"
objectives:
  - "정기 스캔 수행(PCI 11.3)"
  - "결과 위험도 분류/패치 SLA"
  - "취약점 관리 순환 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "취약점 관리 점검 대상 = juiceshop."
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 정기 스캔 — nuclei (PCI 11.3)
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp7.txt | head -6; echo findings=\$(wc -l < /tmp/cp7.txt); rm -f /tmp/cp7.txt"
      ```
      ## ✅ 합격 기준
      정기 취약점 스캔을 수행하고 결과 건수를 집계한다.
    hint: 'nuclei 스캔'
    category: manipulation
    points: 14
    answer: |
      echo "=== 정기 스캔 (nuclei, PCI 11.3) ==="
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp7.txt | head -6; echo findings=\$(wc -l < /tmp/cp7.txt); rm -f /tmp/cp7.txt"
      echo "→ PCI 11.3: 분기별+변경 후 스캔. 자동 스캐너로 정기 점검을 프로세스화"
    answer_detail: "정기 스캔 = nuclei로 자동 점검(PCI 11.3 분기/변경후). 건수 집계로 추세 관리."
    verify:
      type: output_contains
      expect: 'findings='
      field: stdout
      semantic:
        intent: "정기 스캔"
        success_criteria: ["스캔 수행/집계"]
        acceptable_methods: ["**[OSS] nuclei (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 결과 분류 — severity
      ## 💻 실행 명령
      ```bash
      echo "nuclei severity: critical/high/medium/low/info → CVSS 연계 위험도 등급"
      ```
      ## ✅ 합격 기준
      스캔 결과를 위험도로 분류한다.
    hint: 'severity 분류'
    category: analysis
    points: 12
    answer: |
      echo "=== 결과 분류 (severity) ==="
      echo "nuclei severity 등급: critical / high / medium / low / info"
      echo "보안 헤더 누락(info) → 단독 위험은 낮으나 심층방어 약화"
      echo "→ severity를 CVSS(W14)와 연계해 위험도 등급 + 패치 우선순위 결정"
      echo "severity=classified"
    answer_detail: "결과 분류 = severity(critical~info) + CVSS 연계. 패치 우선순위의 근거."
    verify:
      type: output_contains
      expect: 'severity='
      field: stdout
      semantic:
        intent: "결과 분류"
        success_criteria: ["위험도 등급"]
        acceptable_methods: ["**[표준] severity (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 패치 관리 — 위험도별 SLA (PCI 6.3)
      ## 💻 실행 명령
      ```bash
      echo "Critical 즉시(≤7일), High 30일, Medium 90일. 변경관리(테스트→승인→배포→검증)"
      ```
      ## ✅ 합격 기준
      위험도별 패치 SLA를 정리한다.
    hint: 'SLA 7/30/90'
    category: analysis
    points: 14
    answer: |
      echo "=== 패치 관리 (PCI 6.3) ==="
      echo "Critical: 즉시(예 ≤7일)"
      echo "High: 30일 이내"
      echo "Medium: 90일 이내"
      echo "절차: 변경관리(테스트→승인→배포→검증) 준수"
      echo "→ SLA 없는 패치는 무기한 방치. 위험도별 기한이 핵심"
    answer_detail: "패치 SLA = Critical≤7/High30/Medium90일. 변경관리 절차로 적용."
    verify:
      type: output_contains
      expect: 'SLA'
      field: stdout
      semantic:
        intent: "패치 관리 SLA"
        success_criteria: ["위험도별 기한"]
        acceptable_methods: ["**[표준] PCI 6.3 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 취약점 관리 순환
      ## 💻 실행 명령
      ```bash
      echo "식별(스캔)→평가(CVSS)→조치(패치/완화)→재검증(재스캔)→반복"
      ```
      ## ✅ 합격 기준
      취약점 관리 생명주기를 정리한다.
    hint: '식별~재검증'
    category: report
    points: 12
    answer: |
      echo "=== 취약점 관리 순환 ==="
      echo "1) 식별: 정기 스캔(nuclei) + 위협 인텔"
      echo "2) 평가: CVSS/자산 중요도로 위험도"
      echo "3) 조치: 패치 또는 완화(보상 통제)"
      echo "4) 재검증: 재스캔으로 조치 확인"
      echo "5) 반복: 분기/변경후"
      echo "→ 일회성 점검이 아니라 순환 프로세스"
    answer_detail: "관리 순환 = 식별→평가→조치→재검증→반복. 일회성 아닌 지속 프로세스."
    verify:
      type: output_contains
      expect: '재검증'
      field: stdout
      semantic:
        intent: "취약점 관리 순환"
        success_criteria: ["생명주기"]
        acceptable_methods: ["**[표준] 관리 순환 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 보상 통제 — 가상패치
      ## 💻 실행 명령
      ```bash
      echo "패치 불가 시 보상 통제: WAF 가상패치(ModSec), 망분리, 접근제한 + 문서화"
      ```
      ## ✅ 합격 기준
      패치 불가 시 보상 통제를 정리한다.
    hint: '가상패치/보상통제'
    category: report
    points: 12
    answer: |
      echo "=== 보상 통제 ==="
      echo "패치 불가(레거시/호환성) 시:"
      echo "- WAF 가상패치(ModSec 룰로 익스플로잇 차단)"
      echo "- 망분리/접근 제한으로 노출 축소"
      echo "- 모니터링 강화 + 위험 수용 문서화(예외 승인)"
      echo "→ el34는 ModSec이 SQLi/XSS 차단 = 가상패치 사례"
    answer_detail: "보상 통제 = 패치 불가 시 WAF 가상패치/망분리/모니터링 + 문서화. el34 ModSec이 예시."
    verify:
      type: output_contains
      expect: '가상패치'
      field: stdout
      semantic:
        intent: "보상 통제"
        success_criteria: ["가상패치/문서화"]
        acceptable_methods: ["**[설명] 보상 통제 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 취약점 관리 프로세스
      ## 💻 실행 명령
      ```bash
      echo "정기 스캔 + 위험도 분류 + SLA 패치 + 재검증 + 보상통제 + 예외관리"
      ```
      ## ✅ 합격 기준
      취약점 관리 프로세스를 정리한다.
    hint: '스캔/SLA/재검증'
    category: report
    points: 12
    answer: |
      echo "=== 취약점 관리 프로세스 ==="
      echo "1) 정기 스캔(분기+변경후, 내부/외부)"
      echo "2) 위험도 분류(CVSS+자산)"
      echo "3) SLA 기반 패치(Critical≤7/High30/Medium90)"
      echo "4) 재검증(재스캔)"
      echo "5) 보상 통제 + 예외(위험 수용) 관리"
      echo "→ 핵심: 순환 프로세스로 제도화(일회성 금지)"
    answer_detail: "방어 = 정기스캔+분류+SLA패치+재검증+보상통제+예외관리. 제도화가 핵심."
    verify:
      type: output_contains
      expect: '재검증'
      field: stdout
      semantic:
        intent: "취약점 관리 방어"
        success_criteria: ["프로세스 제도화"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 취약점 관리 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W07 취약점 관리 보고서 (학번, 이름)
      ## 1. 정기 스캔(nuclei) 결과
      ## 2. 위험도 분류/패치 SLA
      ## 3. 관리 순환/보상 통제
      ```
      ## ✅ 합격 기준
      보고서에 스캔 + SLA + 관리 순환이 포함된다.
    hint: '스캔+SLA+순환'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W07 취약점 관리 보고서
      ## 1. 정기 스캔: nuclei로 보안 헤더 누락 등 다건 발견(PCI 11.3 분기/변경후)
      ## 2. 분류: severity(critical~info)+CVSS. 패치 SLA(Critical≤7/High30/Medium90, PCI 6.3)
      ## 3. 순환: 식별→평가→조치→재검증→반복. 보상통제(ModSec 가상패치)
      ## 결론: 취약점은 순환 프로세스로 관리. 정기 스캔+SLA 패치+재검증의 제도화가 컴플라이언스
      EOF
    answer_detail: "취약점 관리 보고 = 정기스캔+위험도분류+패치SLA+순환+보상통제. PCI 11·6."
    verify:
      type: output_contains
      expect: 'SLA'
      field: stdout
      semantic:
        intent: "취약점 관리 보고"
        success_criteria: ["스캔/SLA/순환"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
