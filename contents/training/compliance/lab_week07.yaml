  - order: 7
    instruction: |
      ## 🎯 방어 — 취약점 관리 프로세스 제도화 (⑤ 반복)
      앞 단계들을 누가·언제·어떻게 돌리는지가 정해진 '제도(프로세스)'로 묶는다.
      ## 📖 개념 한 줄
      한 사람이 한 번 잘 돌린 것은 통제가 아니다. 사람이 바뀌어도 순환이 유지되도록 정책·일정·책임자가
      문서로 정해져 있어야 하며, 감사자가 가장 무겁게 보는 것이 이 제도화의 증거다.
      ## 💻 실행 명령
      ```bash
      echo "정기 스캔 + 위험도 분류 + SLA 패치 + 재검증 + 보상통제 + 예외관리"
      ```
      - 제도화된 프로세스 6요소: ① 정기 스캔(분기+변경 후, 내부/외부 분리) ② 위험도 분류(CVSS+자산)
        ③ SLA 패치(Critical≤7/High30/Medium90) ④ 재검증(재스캔) ⑤ 보상 통제 ⑥ 예외(위험 수용) 관리.
      - `예외관리` = 못 고치는 위험을 책임자가 승인해 문서로 남기고(위험 수용) 재검토 일정을 거는 것.
      - 정책이 문서로만 있고 실제로 안 돌면 '서류상 통제'에 그치므로, 정책 문서와 실행 증적(최근 스캔
        결과·패치 이력)을 함께 갖춰야 한다.
      ## ✅ 합격 기준
      출력에 `재검증` 을 포함한 프로세스 전체가 정리되면 합격(핵심: 일회성이 아닌 순환 프로세스 제도화).
