    instruction: |
      ## 🎯 보상 통제 — 가상패치 (관리 순환 ③ 조치의 대체)
      패치가 당장 불가능한 경우, 위험을 방치하지 않고 두는 대체 방어를 정리한다.
      ## 📖 개념 한 줄
      레거시·호환성·벤더 미출시 등으로 코드를 못 고칠 때, 보상 통제(특히 WAF 가상패치)로 익스플로잇을
      입구에서 막는다. 취약점 자체는 남지만 그것을 찌르려는 공격이 도달하지 못하게 한다.
      ## 💻 실행 명령
      ```bash
      echo "패치 불가 시 보상 통제: WAF 가상패치(ModSec), 망분리, 접근제한 + 문서화"
      ```
      - `보상 통제`(compensating control) = 본 통제(코드 패치)를 당장 충족할 수 없을 때 두는 대체 통제.
      - `가상패치`(virtual patching) = 코드 대신 WAF/IPS 룰로 익스플로잇을 차단하는 보상 통제. el34 의
        ModSecurity(WAF+CRS)가 SQLi/XSS 페이로드를 차단(dvwa vhost 는 403)하는 것이 실제 사례다 —
        백엔드 코드는 그대로인데 공격이 입구에서 막힌다(탐지만 모드는 통과하므로 가상패치가 아님).
      - 가상패치 외에 망분리·접근제한(노출 표면 축소)·모니터링 강화를 함께 쓰며, 무엇을 쓰든 마지막에
        `위험 수용 문서화`(사유·대체통제·재검토 일정을 책임자가 승인)가 있어야 컴플라이언스로 인정된다.
      ## ✅ 합격 기준
      출력에 `가상패치` 와 보상 통제 요소가 정리되면 합격(보상 통제는 임시 완화 — 문서화 필수).
