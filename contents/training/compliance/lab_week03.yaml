lab_id: standalone-compliance-week03
title: "자산 식별과 분류 — Inventory·중요도·데이터 분류"
version: standalone-compliance
course: compliance
week: 3
description: |
  자산 식별(vhost inventory), 중요도 분류(CIA 등급), 데이터 분류(공개~극비), 자산 대장·소유자,
  자산-통제 매핑. el34-web 실 자산 점검. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "W01–W02 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(식별) §3(분류) §4(데이터) 숙지"
objectives:
  - "자산 식별/대장 작성"
  - "CIA 중요도/데이터 분류"
  - "자산-통제 차등 매핑"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "자산 식별 대상 = el34-web."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 자산 식별 — vhost 목록
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'N=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l); echo "assets=$N"; ls /etc/apache2/sites-enabled/'
      ```
      ## ✅ 합격 기준
      웹 애플리케이션 자산(vhost)을 식별·집계한다.
    hint: 'sites-enabled'
    category: recon
    points: 14
    answer: |
      echo "=== 자산 식별 (vhost) ==="
      docker exec el34-web sh -c 'N=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l); echo "assets=$N"; ls /etc/apache2/sites-enabled/'
      echo "→ juice/dvwa/neobank/govportal/mediforum/admin/siem/bastion 등 각각이 보호 대상 자산"
    answer_detail: "자산 식별 = 실제 vhost 열거(대장 등록). 누락 자산이 가장 위험(shadow IT)."
    verify:
      type: output_contains
      expect: 'assets='
      field: stdout
      semantic:
        intent: "자산 식별"
        success_criteria: ["vhost 집계"]
        acceptable_methods: ["**[OSS] inventory (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 자산 분류 — CIA 중요도
      ## 💻 실행 명령
      ```bash
      echo "neobank/govportal/mediforum=1급(기밀H), admin/siem/bastion=관리(1급), juice/dvwa=시험"
      ```
      ## ✅ 합격 기준
      자산을 CIA 중요도로 등급화한다.
    hint: 'CIA 등급'
    category: analysis
    points: 14
    answer: |
      echo "=== 자산 분류 (CIA 중요도) ==="
      echo "1급(핵심): neobank(금융 기밀H/무결H), govportal/mediforum(개인정보 기밀H)"
      echo "1급(관리): admin/siem/bastion(침해 시 전체 영향)"
      echo "3급(시험): juice/dvwa(시험용)"
      echo "→ 등급 = 기밀성×무결성×가용성 영향. 높을수록 강한 통제"
    answer_detail: "분류 = CIA 영향 등급. 금융/개인정보/관리 자산=1급, 시험 자산=하위. 차등 통제 근거."
    verify:
      type: output_contains
      expect: '1급'
      field: stdout
      semantic:
        intent: "CIA 중요도 분류"
        success_criteria: ["등급화"]
        acceptable_methods: ["**[표준] CIA 등급 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 데이터 분류
      ## 💻 실행 명령
      ```bash
      echo "공개/내부/기밀/극비. 개인정보·카드·인증정보=기밀 이상"
      ```
      ## ✅ 합격 기준
      데이터를 민감도로 분류한다.
    hint: '공개~극비'
    category: analysis
    points: 12
    answer: |
      echo "=== 데이터 분류 ==="
      echo "공개(Public): 카탈로그·공지"
      echo "내부(Internal): 운영 문서"
      echo "기밀(Confidential): 개인정보(mediforum/govportal), 인증정보"
      echo "극비(Restricted): 카드정보(neobank), 키/시크릿"
      echo "→ 분류 라벨이 암호화·접근통제 수준을 결정"
    answer_detail: "데이터 분류 = 공개/내부/기밀/극비. 개인정보·카드=기밀 이상. 라벨이 통제 수준 결정."
    verify:
      type: output_contains
      expect: '기밀'
      field: stdout
      semantic:
        intent: "데이터 분류"
        success_criteria: ["민감도 등급"]
        acceptable_methods: ["**[표준] 데이터 분류 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 자산 대장 — 항목
      ## 💻 실행 명령
      ```bash
      echo "대장 항목: 자산명·유형·위치·소유자·중요도·데이터분류·통제수준"
      ```
      ## ✅ 합격 기준
      자산 대장 구성 항목을 정리한다.
    hint: '대장 항목/소유자'
    category: report
    points: 12
    answer: |
      echo "=== 자산 대장(Inventory) ==="
      echo "항목: 자산명 | 유형 | 위치 | 소유자 | 중요도 | 데이터분류 | 통제수준"
      echo "예: neobank | 웹앱 | el34-web | 금융팀 | 1급 | 극비 | 강함(TLS+접근통제+감사)"
      echo "→ 소유자 지정이 핵심(책임 주체 없는 자산은 방치). CMDB로 최신성 유지"
    answer_detail: "자산 대장 = 자산명/유형/위치/소유자/중요도/분류/통제. 소유자 지정이 방치 방지."
    verify:
      type: output_contains
      expect: '소유자'
      field: stdout
      semantic:
        intent: "자산 대장"
        success_criteria: ["대장 항목/소유자"]
        acceptable_methods: ["**[관리적] 대장 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 자산-통제 매핑
      ## 💻 실행 명령
      ```bash
      echo "1급(neobank)→강한 통제(TLS+MFA+감사+암호화), 3급(juice)→기본 통제"
      ```
      ## ✅ 합격 기준
      중요도별 통제 차등을 매핑한다.
    hint: '중요도별 차등'
    category: report
    points: 12
    answer: |
      echo "=== 자산-통제 매핑 ==="
      echo "1급(neobank/govportal): TLS1.2+ + 강한 인증(MFA) + 감사로깅 + 저장 암호화"
      echo "1급(admin/siem): 망분리 + 접근통제 + 변경관리"
      echo "3급(juice/dvwa): 기본 통제(시험 환경)"
      echo "→ 통제는 중요도에 비례한 차등 적용(과·부족 모두 비효율)"
    answer_detail: "자산-통제 매핑 = 중요도에 비례한 차등 통제. 1급=강함, 하위=기본."
    verify:
      type: output_contains
      expect: '차등'
      field: stdout
      semantic:
        intent: "자산-통제 매핑"
        success_criteria: ["중요도별 차등"]
        acceptable_methods: ["**[설명] 매핑 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 정리
      ## 💻 실행 명령
      ```bash
      echo "자산관리 = 식별→분류→소유자→통제차등. 모르는 자산은 못 지킨다"
      ```
      ## ✅ 합격 기준
      자산 관리 흐름을 종합한다.
    hint: '식별~통제차등'
    category: report
    points: 12
    answer: |
      echo "=== 자산 관리 종합 ==="
      echo "1) 식별: 누락 없는 자산 대장(vhost 12종 등)"
      echo "2) 분류: CIA 중요도 + 데이터 민감도"
      echo "3) 소유자 지정 + CMDB 최신성"
      echo "4) 통제 차등: 중요도 비례"
      echo "→ 자산 관리가 모든 후속 통제의 기준점"
    answer_detail: "자산 관리 = 식별→분류→소유자→차등 통제. 모든 통제 배치의 기준."
    verify:
      type: output_contains
      expect: '자산'
      field: stdout
      semantic:
        intent: "자산 관리 종합"
        success_criteria: ["식별~통제차등"]
        acceptable_methods: ["**[설명] 종합 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 자산 관리 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W03 자산 관리 보고서 (학번, 이름)
      ## 1. 자산 식별(vhost 12종)
      ## 2. CIA 중요도/데이터 분류
      ## 3. 자산-통제 매핑
      ```
      ## ✅ 합격 기준
      보고서에 자산 식별 + 분류 + 통제 매핑이 포함된다.
    hint: '식별+분류+매핑'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W03 자산 관리 보고서
      ## 1. 식별: vhost 12종(neobank/govportal/mediforum/admin/siem 등) 자산 대장 등록
      ## 2. 분류: 금융/개인정보=1급·극비, 관리=1급, 시험=3급. 데이터 공개~극비
      ## 3. 매핑: 1급=TLS+MFA+감사+암호화, 3급=기본. 통제는 중요도 비례
      ## 결론: 모르는 자산은 못 지킨다. 식별→분류→소유자→차등 통제가 자산 관리
      EOF
    answer_detail: "자산 관리 보고 = 식별+분류+소유자+차등 통제. 자산 관리는 모든 통제의 기준점."
    verify:
      type: output_contains
      expect: '1급'
      field: stdout
      semantic:
        intent: "자산 관리 보고"
        success_criteria: ["식별/분류/매핑"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
