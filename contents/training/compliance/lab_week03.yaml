lab_id: standalone-compliance-week03
title: "자산 식별과 분류 — Inventory·중요도·데이터 분류"
version: standalone-compliance
course: compliance
week: 3
description: |
  컴플라이언스 자산 관리 한 바퀴를 감사자(auditor) 관점으로 돈다 — ① 자산 식별(el34-web 의 Apache
  sites-enabled 디렉터리를 열거해 실제 운영 중인 11개 vhost 자산을 빠짐없이 식별·집계하고, 자산이 아닌
  ports 설정 파일을 가려낸다) → ② 중요도 분류(CIA: 기밀·무결·가용 영향으로 1급 핵심~3급 시험 등급화)
  → ③ 데이터 분류(공개·내부·기밀·극비. 개인정보·카드정보·인증정보는 최소 기밀 이상) → ④ 자산 대장
  작성과 소유자 지정(책임 주체 없는 자산은 방치된다) → ⑤ 중요도에 비례한 자산-통제 차등 매핑 →
  ⑥ 자산 관리 보고서 종합. 핵심 원칙은 "모르는 자산은 지킬 수 없다(식별 누락=가장 큰 위험)"이며,
  이 대장·분류가 W04 이후 모든 통제(접근통제·암호화·로깅)의 기준점이 된다. 표준 근거는 ISMS-P 2.1
  (정보자산 식별·분류), ISO 27001 A.5.9(자산 목록)·A.5.12(정보 분류). 모든 명령은 el34
  호스트(ssh ccc@192.168.0.151, 비밀번호 1)에서 docker exec el34-web 으로 실행하며 신규 설치는 없다.
  분류·대장·매핑 미션은 학생이 작성한 분류 결과를 echo/cat 으로 출력하는 형태다.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "W01–W02 통과(컴플라이언스 개론·프레임워크, 정책/거버넌스)"
  - "el34 호스트 SSH 접속 + docker exec 사용법 숙지"
  - "lecture §2(자산 식별) §3(CIA 중요도 분류) §4(데이터 분류) §5(자산 대장·소유자) §6(통제 매핑) 통독"
objectives:
  - "자산 식별: el34-web 의 sites-enabled 를 열거해 11개 vhost 자산을 빠짐없이 식별·집계하고 비-자산(ports 설정)을 가려낸다"
  - "중요도 분류: CIA(기밀·무결·가용) 영향으로 각 자산을 1급(핵심)~3급(시험)으로 등급화한다"
  - "데이터 분류: 공개~극비 라벨을 매기고 개인정보·카드정보·인증정보가 최소 기밀 이상임을 입증한다"
  - "자산 대장 작성: 자산명·유형·위치·소유자·중요도·데이터분류·통제수준 7개 항목을 채우고 소유자 지정의 의미를 설명한다"
  - "자산-통제 차등 매핑: 중요도에 비례한 통제(1급=강함, 하위=기본)를 매핑하고 자산 관리 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      본 주차 자산 식별의 대상인 **el34-web 컨테이너**에 접근이 되는지부터 확인한다(도달성 점검).

      ## 💡 개념 한 줄
      모든 점검의 1 단계는 대상 도달 확인이다 — 대상에 닿지 못하면 이후의 모든 "없음" 결과가 무의미하다.
      이번 주의 자산(웹 vhost)은 모두 el34-web 의 Apache 가 운영하므로 식별 출발점이 el34-web 이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서 실행한다.
      ```bash
      # 1) 자산 식별 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web` : el34-web 컨테이너 안에서 명령을 실행한다(셸 진입 없이 한 번에).
      - `hostname; echo target_ok` : 컨테이너 hostname 을 찍고 정상 수행 표시(`target_ok`)를 출력한다.

      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 보이면 el34-web 접근 가능 — 응답이 없으면 호스트
      SSH 와 `docker ps` 로 컨테이너 상태부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 자산 식별 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "자산 식별 대상(el34-web)에 대한 도달성 점검. hostname 응답 + target_ok 출력이면 접근 가능. 모든 점검의 1단계이며, 대상에 닿지 못하면 이후 식별 결과가 무의미하다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      el34-web 이 실제로 운영 중인 **웹 애플리케이션 자산(vhost)** 을 빠짐없이 열거하고 개수를 집계한다.

      ## 💡 개념 한 줄
      자산 관리의 첫 통제는 **식별**이다 — "있는 줄 몰랐던 자산(shadow IT)이 가장 위험"하므로 누락 없이
      찾는 것이 핵심이다. Apache 는 **현재 활성화된 vhost 설정**을 `/etc/apache2/sites-enabled/`
      디렉터리에 모아두므로, 이 디렉터리를 열거하면 운영 중인 웹 자산을 한눈에 식별할 수 있다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) Apache 활성 vhost 설정(sites-enabled) 파일 수를 세어 assets= 로 출력하고 목록 나열
      docker exec el34-web sh -c 'N=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l); echo "assets=$N"; ls /etc/apache2/sites-enabled/'
      # 2) 해석 — 각 vhost가 보호 대상 자산(단, 200-ports.conf는 비-자산이라 실제 웹 자산은 11개)
      echo "→ juice/dvwa/neobank/govportal/mediforum/admin/siem/bastion 등 각각이 보호 대상 자산"
      ```
      - `/etc/apache2/sites-enabled/` : Apache 의 활성 vhost 설정 모음. 각 `.conf` 가 하나의 가상 호스트(vhost).
      - `ls ... | wc -l` : 파일 개수를 센다. 그 수를 `assets=` 로 출력. `2>/dev/null` 로 오류 메시지 숨김.

      ## ✅ 합격 기준
      `assets=` 출력 시 통과. **근거:** `assets=12` + 목록이 나오면 식별 성공 — 단 `200-ports.conf` 는 vhost
      가 아닌 포트 설정 파일이므로 실제 웹 자산은 11개(자동 집계 수치를 사람이 검토해 비-자산을 가려냄).
    hint: 'sites-enabled'
    category: recon
    points: 14
    answer: |
      # 1) Apache 활성 vhost 설정(sites-enabled) 파일 수를 세어 assets= 로 출력하고 목록 나열
      docker exec el34-web sh -c 'N=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l); echo "assets=$N"; ls /etc/apache2/sites-enabled/'
      # 2) 해석 — 각 vhost가 보호 대상 자산(단, 200-ports.conf는 비-자산이라 실제 웹 자산은 11개)
      echo "→ juice/dvwa/neobank/govportal/mediforum/admin/siem/bastion 등 각각이 보호 대상 자산"
    answer_detail: "자산 식별 = sites-enabled 의 실제 vhost 열거 후 대장 등록. ls|wc 는 12 를 돌려주지만 200-ports.conf 는 비-자산이므로 실제 웹 자산은 11개. 누락 자산(shadow IT)이 가장 위험하므로 빠짐없이 식별하고, 자동 집계 수치를 사람이 검토해 비-자산을 가려내는 것이 채점 의도."
    verify:
      type: output_contains
      expect: 'assets='
      field: stdout
      semantic:
        intent: "자산 식별"
        success_criteria: ["vhost 집계"]
        acceptable_methods: ["**[OSS] inventory (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      식별한 자산을 **CIA(기밀성·무결성·가용성) 영향**으로 평가해 1급(핵심)~3급(시험)으로 등급화한다.

      ## 💡 개념 한 줄
      식별만으로는 "어디에 자원을 더 쓸지"를 모른다. **CIA 중요도 등급**은 자산이 침해됐을 때의 피해를
      세 축으로 따져 매기는 점수다 — **기밀성**(노출되면 피해)·**무결성**(변조되면 피해)·**가용성**
      (중단되면 피해). 셋이 모두 높으면 1급이며, 이 등급이 차등 통제(통제를 얼마나 강하게)의 근거가 된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 1급(핵심) — 금융(기밀H/무결H/가용H)·개인정보(노출 시 법적·사회적 피해)
      echo "1급(핵심): neobank(금융 기밀H/무결H), govportal/mediforum(개인정보 기밀H)"
      # 2) 1급(관리) — admin/siem/bastion(그 자체보다 침해 시 전체 인프라 장악 위험)
      echo "1급(관리): admin/siem/bastion(침해 시 전체 영향)"
      # 3) 3급(시험) — juice/dvwa(의도적 취약 학습 표적, 실데이터 없음)
      echo "3급(시험): juice/dvwa(시험용)"
      # 4) 결론 — 등급=기밀성×무결성×가용성 영향, 높을수록 강한 통제
      echo "→ 등급 = 기밀성×무결성×가용성 영향. 높을수록 강한 통제"
      ```

      ## ✅ 합격 기준
      `1급` 출력 시 통과. **근거:** 금융·개인정보·관리 자산이 1급으로 등급화되면 통과 — 등급의 근거가 CIA
      영향(기밀×무결×가용)임을, 특히 관리 자산(admin/siem/bastion)이 왜 1급인지(하나 뚫리면 연쇄 위험)를 짚는다.
    hint: 'CIA 등급'
    category: analysis
    points: 14
    answer: |
      # 1) 1급(핵심) — 금융(기밀H/무결H/가용H)·개인정보(노출 시 법적·사회적 피해)
      echo "1급(핵심): neobank(금융 기밀H/무결H), govportal/mediforum(개인정보 기밀H)"
      # 2) 1급(관리) — admin/siem/bastion(그 자체보다 침해 시 전체 인프라 장악 위험)
      echo "1급(관리): admin/siem/bastion(침해 시 전체 영향)"
      # 3) 3급(시험) — juice/dvwa(의도적 취약 학습 표적, 실데이터 없음)
      echo "3급(시험): juice/dvwa(시험용)"
      # 4) 결론 — 등급=기밀성×무결성×가용성 영향, 높을수록 강한 통제
      echo "→ 등급 = 기밀성×무결성×가용성 영향. 높을수록 강한 통제"
    answer_detail: "중요도 분류 = CIA(기밀×무결×가용) 영향 등급. 금융(neobank)·개인정보(govportal/mediforum)=1급 핵심, 관리·관제(admin/siem/bastion)=1급(침해 시 전체 인프라 영향), 시험용(juice/dvwa)=3급. 등급이 차등 통제(자원 집중)의 객관적 근거가 된다."
    verify:
      type: output_contains
      expect: '1급'
      field: stdout
      semantic:
        intent: "CIA 중요도 분류"
        success_criteria: ["등급화"]
        acceptable_methods: ["**[표준] CIA 등급 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      각 자산이 다루는 **데이터**를 민감도에 따라 공개·내부·기밀·극비 4단계로 분류(라벨링)한다.

      ## 💡 개념 한 줄
      자산(시스템) 등급과 별개로, 그 자산이 다루는 **데이터의 민감도**를 라벨링해야 한다. **데이터 분류**
      라벨은 단순 표시가 아니라 **암호화·접근통제·로깅의 수준을 결정하는 입력값**이다("극비" 라벨 →
      저장 암호화 필수·최소권한·전수 감사가 자동으로 따라붙는다).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 공개(Public) — 외부 공개 무방(서비스 카탈로그·공지)
      echo "공개(Public): 카탈로그·공지"
      # 2) 내부(Internal) — 조직 내부용(운영 문서)
      echo "내부(Internal): 운영 문서"
      # 3) 기밀(Confidential) — 유출 시 피해(개인정보 mediforum/govportal, 인증정보)
      echo "기밀(Confidential): 개인정보(mediforum/govportal), 인증정보"
      # 4) 극비(Restricted) — 유출 시 치명(카드정보 neobank, 암호키·시크릿)
      echo "극비(Restricted): 카드정보(neobank), 키/시크릿"
      # 5) 결론 — 분류 라벨이 암호화·접근통제 수준을 결정
      echo "→ 분류 라벨이 암호화·접근통제 수준을 결정"
      ```

      ## ✅ 합격 기준
      `기밀` 출력 시 통과. **근거:** 개인정보·카드정보·인증정보가 최소 "기밀" 이상으로 분류되면 통과 —
      이 하한선은 ISMS-P(개인정보)·PCI-DSS 3·4(카드정보 암호화)의 직접 요구다.
    hint: '공개~극비'
    category: analysis
    points: 12
    answer: |
      # 1) 공개(Public) — 외부 공개 무방(서비스 카탈로그·공지)
      echo "공개(Public): 카탈로그·공지"
      # 2) 내부(Internal) — 조직 내부용(운영 문서)
      echo "내부(Internal): 운영 문서"
      # 3) 기밀(Confidential) — 유출 시 피해(개인정보 mediforum/govportal, 인증정보)
      echo "기밀(Confidential): 개인정보(mediforum/govportal), 인증정보"
      # 4) 극비(Restricted) — 유출 시 치명(카드정보 neobank, 암호키·시크릿)
      echo "극비(Restricted): 카드정보(neobank), 키/시크릿"
      # 5) 결론 — 분류 라벨이 암호화·접근통제 수준을 결정
      echo "→ 분류 라벨이 암호화·접근통제 수준을 결정"
    answer_detail: "데이터 분류 = 공개/내부/기밀/극비 라벨. 개인정보(mediforum/govportal)·카드정보(neobank)·인증정보는 최소 기밀 이상(ISMS-P 개인정보·PCI-DSS 3·4 요구). 라벨이 곧 통제 사양(암호화·접근통제·로깅 수준)을 결정하는 입력값이다."
    verify:
      type: output_contains
      expect: '기밀'
      field: stdout
      semantic:
        intent: "데이터 분류"
        success_criteria: ["민감도 등급"]
        acceptable_methods: ["**[표준] 데이터 분류 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      식별·분류 결과를 관리할 **자산 대장(Asset Register)** 의 구성 항목을 정리하고, 특히 **소유자**를
      지정한다.

      ## 💡 개념 한 줄
