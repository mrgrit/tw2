lab_id: standalone-compliance-week04
title: "접근통제 컴플라이언스 — 계정·암호정책·권한"
version: standalone-compliance
course: compliance
week: 4
description: |
  접근통제 컴플라이언스 감사 — 감사자 관점에서 el34-web 한 대의 OS 설정을 읽기 전용으로 점검하고
  표준(PCI-DSS 7·8, ISMS-P 2.5, CIS Benchmark)에 비추어 준수/갭을 판정한다. 접근통제 4단계
  (식별→인증→인가→검토)를 따라: 계정 식별(UID0 유일성), 암호 정책(PASS_MAX_DAYS 만료 주기 갭),
  민감 파일 권한(shadow 640/sudoers 440), 최소권한·직무분리(SoD)·권한 재검토를 점검하고, 핵심 갭
  (암호 만료 정책 부재)을 도출해 방어 권고와 감사 보고서로 종합한다. 모든 명령은 el34 호스트
  (ssh ccc@{{TARGET_IP}})에서 실행하며, 컨테이너 작업은 docker exec -it el34-web bash 로 접속해 수행하고, awk/grep/stat 등 기본 도구만
  쓴다. 시스템을 변경하지 않는 읽기 전용 감사이며 신규 설치는 없다.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W03 통과(정책·자산·로깅 감사 기초)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, pw 1) + docker exec 사용 가능"
  - "lecture §3(계정 식별) §4(암호 정책) §5(파일 권한·최소권한·직무분리) 숙지"
objectives:
  - "접근통제 4단계(식별→인증→인가→검토)를 표준 조항(PCI-DSS 7·8, ISMS-P 2.5)에 매핑한다"
  - "/etc/passwd 로 UID0 계정 수를 식별하고 단일/다중을 정상/백도어로 판정한다"
  - "/etc/login.defs 의 PASS_MAX_DAYS 가 ≤90일 기준을 초과하는 갭(99999=무기한)을 PCI-DSS 8.3.9 로 입증한다"
  - "stat 으로 shadow/sudoers 권한이 CIS 기준(shadow ≤640, sudoers 440)을 충족하는지 판정한다"
  - "최소권한·직무분리(SoD)·권한 재검토의 관리적 통제를 이해한다"
  - "준수/갭/방어를 구분한 접근통제 감사 보고서를 증거·표준 조항과 함께 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 감사 대상 el34-web 에 도달하는가
      ## 📖 개념
      접근통제 감사의 전제는 대상에 접근할 수 있다는 것이다. 점검 착수 전 항상 대상의
      도달성부터 확인한다 — 접근이 안 되면 이후의 모든 음성(이상 없음) 결과가 무의미해진다.
      el34-web 은 Apache+ModSecurity 가 도는 DMZ 핵심 서버(dmz 10.20.32.80)로, 외부에
      노출된 서버일수록 계정·권한 관리가 중요하므로 접근통제 감사의 대표 대상으로 삼는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — el34 호스트(ssh ccc@{{TARGET_IP}}, pw 1)에서 `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 접근통제 감사 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      - `docker exec -it el34-web bash` : 호스트에서 대상 컨테이너로 접속해 명령을 실행한다.
      - `hostname; echo target_ok` : 컨테이너 호스트명을 출력하고 도달 확인용 마커를 찍는다.
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 보이면 대상 접근 가능 → 감사 착수 가능. 응답이
      없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 접근통제 감사 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "접근통제 감사 대상 = el34-web(DMZ Apache 서버). target_ok 출력이 도달성 확인 증거이며, 이후 모든 점검은 이 컨테이너에 docker exec 로 보낸다."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 계정 식별 — UID0(root) 계정 수 (접근통제 1단계: 식별)
      ## 📖 개념
      접근통제 4단계의 첫째는 **식별** — 시스템에 어떤 계정이 있으며 그중 전권을 가진 계정이
      무엇인지 파악하는 것이다. 리눅스에서 계정은 **UID(User ID)** 숫자로 식별되고, **UID 0 =
      root(전권)** 다. 마스터키처럼 모든 것을 할 수 있으므로 **UID0 계정은 단 하나여야 정상**이다.
      `/etc/passwd` 에 UID 0인 줄이 둘 이상 나오면(예: `backdoor:x:0:0:...`) 공격자가 권한
      유지를 위해 심은 **백도어 계정**일 가능성이 높다. 대응 표준: PCI-DSS 8.2(고유 ID),
      ISMS-P 2.5.1.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) /etc/passwd에서 UID(3번째 필드)가 0인 계정 수를 세어 uid0_count= 로 출력하고 그 계정명 나열(root 하나여야 정상)
      echo "uid0_count=$(awk -F: '$3==0' /etc/passwd | wc -l)"; awk -F: '$3==0 {print $1}' /etc/passwd
      # 2) 해석 — UID0=root 하나여야 정상, 다중 UID0=백도어 의심
      echo "→ UID0 = root 하나여야 정상. 다중 UID0 = 백도어 의심"
      ```
      - `/etc/passwd` : 한 줄당 한 계정(사용자명:x:UID:GID:설명:홈:셸). 해시는 없는 계정 명부.
      - `awk -F:` : 콜론 구분자. `$3==0` : UID(3번째 필드)가 0인 줄만. `wc -l` : 줄 수=UID0 개수.
      ## ✅ 합격 기준
      `uid0_count=` 출력 시 통과. **근거:** `uid0_count=1` 이고 root 하나뿐이면 정상(준수) — 2 이상이고
      낯선 이름이 보이면 백도어 의심 → 즉시 사고 대응.
    hint: 'UID0'
    category: recon
    points: 14
    answer: |
      # 1) /etc/passwd에서 UID(3번째 필드)가 0인 계정 수를 세어 uid0_count= 로 출력하고 그 계정명 나열(root 하나여야 정상)
      docker exec el34-web sh -c 'echo "uid0_count=$(awk -F: "\$3==0" /etc/passwd | wc -l)"; awk -F: "\$3==0 {print \$1}" /etc/passwd'
      # 2) 해석 — UID0=root 하나여야 정상, 다중 UID0=백도어 의심
      echo "→ UID0 = root 하나여야 정상. 다중 UID0 = 백도어 의심"
    answer_detail: "계정 식별(접근통제 1단계) = /etc/passwd 의 UID0 점검. el34-web 은 root 단일(uid0_count=1)이 정상이며 준수. 다중 UID0 는 공격자가 권한 유지를 위해 심은 백도어 신호로 치명적 갭이다."
    expected_output: |
      uid0_count=1
      root
      → UID0 = root 하나여야 정상. 다중 UID0 = 백도어 의심
    verify:
      type: output_contains
      expect: 'uid0_count='
      field: stdout
      semantic:
        intent: "계정 식별"
        success_criteria: ["UID0 점검"]
        acceptable_methods: ["**[OSS] passwd 점검 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 암호 정책 — PASS_MAX_DAYS 만료 주기 갭 (접근통제 2단계: 인증) ★핵심 갭
      ## 📖 개념
      접근통제 4단계의 둘째는 **인증** — 신원이 진짜임을 증명하는 것이며, 암호가 그 핵심
      수단이다. 본 미션이 보는 것은 암호의 **만료 주기(PASS_MAX_DAYS)** = "암호를 최대 며칠까지
      쓸 수 있는가". 만료 정책이 있으면 유출된 암호도 길어야 그 주기 안에 바뀌어 **수명이
      끝난다**. 없으면 한 번 유출된 암호가 **무기한** 악용된다. PCI-DSS **8.3.9** 와 CIS Benchmark
      는 만료 주기를 **≤90일**로 요구한다. 이 미션이 본 주차에서 찾아야 할 **핵심 갭**이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) /etc/login.defs의 PASS_MAX_DAYS 값을 숫자만 추출해 max_days= 로 출력하고 90 초과면 gap=no_expiry
      V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo "compliant"
      # 2) 해석 — 99999=사실상 무기한, PCI-DSS 8.3.9/CIS는 ≤90일 → 갭(유출 시 무기한 악용)
      echo "→ 99999 = 사실상 무기한. PCI-DSS 8.3.9/CIS는 ≤90일 → 갭. 유출 시 무기한 악용"
      ```
      - `grep "^PASS_MAX_DAYS"` 만료 주기 줄 → `tr -dc "0-9"` 숫자만 남겨 값 V → `[ "$V" -gt 90 ]` 90 초과면 갭.
      ## ✅ 합격 기준
      `gap=` 출력 시 통과. **근거:** el34-web 은 `max_days=99999`(≈274년=사실상 무기한) → gap=no_expiry
      = 암호 만료 기준(≤90일) 초과 갭 발견 성공.
    hint: 'PASS_MAX_DAYS'
    category: manipulation
    points: 16
    answer: |
      # 1) /etc/login.defs의 PASS_MAX_DAYS 값을 숫자만 추출해 max_days= 로 출력하고 90 초과면 gap=no_expiry
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo "compliant"'
      # 2) 해석 — 99999=사실상 무기한, PCI-DSS 8.3.9/CIS는 ≤90일 → 갭(유출 시 무기한 악용)
      echo "→ 99999 = 사실상 무기한. PCI-DSS 8.3.9/CIS는 ≤90일 → 갭. 유출 시 무기한 악용"
    answer_detail: "암호 정책(접근통제 2단계 인증) = PASS_MAX_DAYS 만료 주기. el34-web 은 99999(리눅스 기본값, 사실상 무기한)로 PCI-DSS 8.3.9/CIS(≤90일) 미달 = 본 주차의 핵심 갭. 설정 한 줄(90으로 변경)로 시정 가능하다."
    expected_output: |
      max_days=99999
      gap=no_expiry
      → 99999 = 사실상 무기한. PCI-DSS 8.3.9/CIS는 ≤90일 → 갭. 유출 시 무기한 악용
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "암호 정책 갭"
        success_criteria: ["만료 기준 초과"]
        acceptable_methods: ["**[OSS] login.defs (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 파일 권한 — shadow / passwd / sudoers (접근통제 3단계: 인가)
      ## 📖 개념
      접근통제 4단계의 셋째는 **인가** — 인증된 사용자가 무엇까지 접근할 수 있는가다. 그 기반이
      **파일 권한(모드)** 으로, 민감 파일이 권한 밖 사용자에게 노출되지 않아야 한다. 권한은
      소유자/그룹/기타(everyone) 세 자리로, 읽기(4)+쓰기(2)+실행(1)의 합이다. 가장 중요한
      파일은 **암호 해시가 든 `/etc/shadow`** — 권한이 `644`(world-readable)면 일반 사용자가
      해시를 빼내 오프라인 크랙이 가능해 치명적이다. CIS Benchmark 기준: shadow ≤640, sudoers 440.
      `/etc/passwd` 의 `644`(누구나 읽기)는 해시가 없어 정상이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) shadow/passwd/sudoers 권한을 8진수로 출력하고 shadow가 600/640이면 compliant, 그 외 gap
      stat -c "%n %a" /etc/shadow /etc/passwd /etc/sudoers; S=$(stat -c "%a" /etc/shadow); case "$S" in 600|640) echo "compliant=shadow_$S";; *) echo "gap=shadow_$S";; esac
      # 2) 해석 — shadow 640(root:shadow)·sudoers 440 = CIS 준수, shadow 644면 해시 유출 치명 갭
      echo "→ shadow 640(root:shadow)·sudoers 440 = CIS 준수. shadow 644면 해시 유출 치명 갭"
      ```
      - `stat -c "%n %a"` : 파일명(%n)+8진수 권한(%a). `case "$S" in 600|640)` : shadow 권한 준수/갭 판정.
      ## ✅ 합격 기준
      `compliant=shadow` 출력 시 통과. **근거:** el34-web 은 shadow 640·sudoers 440 → compliant=shadow_640
      = 기준(shadow ≤640, sudoers 440) 준수. shadow 644 면 gap=shadow_644(해시 유출 치명 갭).
    hint: 'shadow 640'
    category: manipulation
    points: 14
    answer: |
      # 1) shadow/passwd/sudoers 권한을 8진수로 출력하고 shadow가 600/640이면 compliant, 그 외 gap
      docker exec el34-web sh -c 'stat -c "%n %a" /etc/shadow /etc/passwd /etc/sudoers; S=$(stat -c "%a" /etc/shadow); case "$S" in 600|640) echo "compliant=shadow_$S";; *) echo "gap=shadow_$S";; esac'
      # 2) 해석 — shadow 640(root:shadow)·sudoers 440 = CIS 준수, shadow 644면 해시 유출 치명 갭
      echo "→ shadow 640(root:shadow)·sudoers 440 = CIS 준수. shadow 644면 해시 유출 치명 갭"
    answer_detail: "파일 권한(접근통제 3단계 인가) = el34-web 의 shadow 640(root:shadow 만)·sudoers 440(읽기 전용)으로 CIS 준수. passwd 644 는 해시가 없어 정상. world-readable(644) shadow 였다면 암호 해시 유출 → 오프라인 크랙으로 이어지는 치명적 갭이다."
    expected_output: |
      /etc/shadow 640
      /etc/passwd 644
      /etc/sudoers 440
      compliant=shadow_640
      → shadow 640(root:shadow)·sudoers 440 = CIS 준수. shadow 644면 해시 유출 치명 갭
    verify:
      type: output_contains
      expect: 'compliant=shadow'
      field: stdout
      semantic:
        intent: "파일 권한 점검"
        success_criteria: ["민감 파일 보호"]
        acceptable_methods: ["**[OSS] stat (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 최소권한·직무분리·권한 재검토 (관리적 통제)
      ## 📖 개념
      앞 세 미션이 기술 설정을 점검했다면, 본 미션은 명령으로는 보이지 않는 **관리적 통제**를
      정리한다. 셋을 구분하라:
      - **최소권한(Least Privilege)** = 한 사람에게 주는 권한의 **양** — 업무에 필요한 최소만.
        사고의 폭발 반경(blast radius)을 줄인다. (PCI-DSS 7, ISMS-P 2.5.5)
      - **직무분리(SoD, Separation of Duties)** = 하나의 위험한 작업을 **여러 사람에게 나눔** —
        요청자≠승인자, 개발≠운영. 한 사람의 단독 부정을 막는다.
      - **권한 재검토(Review)** = 접근통제 4단계의 마지막. 부여한 권한이 아직 필요한지 주기적
        재확인. (PCI-DSS 7.2.5, ISMS-P 2.5.6) — 실무에서 가장 자주 누락된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 최소권한(Least Privilege) — 업무에 필요한 최소 권한만 부여(폭발 반경 축소)
