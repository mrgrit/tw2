      없이 즉시 적용 가능하므로 가장 먼저, **MFA**는 유출·추측을 근본적으로 막아 가장 효과적이므로
      그다음, **정기 재검토**는 권한의 시의성을 유지한다. **공유계정 금지**(1인 1계정)는 모든 행위를
      개인에게 귀속시키는 추적성(accountability)의 전제다.
