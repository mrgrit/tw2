lab_id: standalone-compliance-week10
title: "변경관리와 파일 무결성 모니터링(FIM)"
version: standalone-compliance
course: compliance
week: 10
description: |
  변경관리(change management) + FIM(파일 무결성 모니터링, Wazuh syscheck) 통합 감사 — 무단 변경은
  곧 침해(웹셸·백도어)거나 통제 우회의 신호다. 컴플라이언스는 (1) 모든 변경이 승인된 변경관리
  절차(PCI-DSS 6.4)를 거치고, (2) 절차를 벗어난 무단 변경은 FIM(PCI-DSS 11.5)이 탐지할 것을 요구한다.
  학생은 감사자가 되어 el34-web 의 syscheck 감시 설정(realtime/주기)을 점검하고, realtime 디렉터리
  (/etc/apache2)에 canary 파일을 만들어 FIM 탐지(rule 554 추가, whodata 행위자)를 증적으로 확인한 뒤,
  그 탐지를 변경관리 기록과 대조(기록 있음=정상, 없음=조사대상)하는 한 바퀴를 끝낸다. 점검 대상은
  agent(el34-web)/manager(el34-siem) 두 곳. 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 docker exec -it <컨테이너> bash
  로 접속해 실행하며, canary 는 즉시 self-clean, 신규 도구 설치는 없다.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W09 통과(프레임워크·정책·자산·접근통제·암호화·로깅·취약점·SCA 점검)"
  - "el34 호스트 SSH + docker exec 접근(점검 대상: el34-web agent / el34-siem manager)"
  - "lecture §2(변경관리 7단계) §3(FIM realtime vs 주기·rule 554/550/555) §5(FIM↔변경관리 연계) 숙지"
objectives:
  - "el34-web 의 FIM(syscheck) 감시 설정(realtime vs 주기)을 점검하고, 실제 변경 탐지가 작동함을 증적으로 보인다"
  - "realtime 디렉터리에 canary 를 만들어 FIM 탐지(rule 554·whodata)를 비파괴적으로 검증한다(self-clean)"
  - "FIM 경보를 변경관리 기록과 대조해 정상/무단을 가르는 연계 원리를 이해하고, 무결성 통제를 종합 보고한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (감사의 전제)
      무결성 감사의 첫 단계는 표적에 접근이 되는지 확인하는 것이다. 접근이 안 되면 이후 모든 음성
      결과가 무의미하다. FIM(파일 무결성 모니터링)은 두 축으로 동작한다 — 파일 변경을 감시하는
      **에이전트(`el34-web`)** 와 그 경보가 모이는 **매니저(`el34-siem`)**. 본 미션은 그중 점검 진입점인
      `el34-web` 이 살아 있어 점검 가능한 상태인지부터 확인한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) FIM 점검 진입점 el34-web(에이전트) 도달성 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 점검 진입점(el34-web) 접근 성공(감사의 전제) —
      응답이 없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) FIM 점검 진입점 el34-web(에이전트) 도달성 확인 — 호스트명 출력 후 target_ok
      ssh ccc@10.20.32.80 "hostname; echo target_ok"
    answer_detail: "FIM 점검 대상은 변경을 감시하는 에이전트(el34-web)와 경보가 모이는 매니저(el34-siem) 두 곳. hostname 응답 + target_ok 출력으로 점검 진입점(el34-web)의 도달성을 확인하는 감사 착수 전제 단계."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 FIM 설정 — 무엇을·어떻게 감시하나 (syscheck directories)
      대상에 도달했으면, FIM 이 어떤 디렉토리를 어떤 방식으로 감시하는지부터 본다. 감시 범위와 방식이
      곧 탐지의 한계 — 감시하지 않는 곳의 변경은 탐지되지 않는다.

      > **용어 — syscheck `<directories>` / realtime / whodata.** syscheck = Wazuh 의 FIM 모듈. `<directories>`
      > = 감시 대상 경로. `realtime="yes"` = 변경 즉시 탐지(inotify), 미지정 시 주기 스캔. `whodata="yes"` =
      > 변경한 행위자(사용자·프로세스)까지 기록. /etc/apache2·/etc/modsecurity 는 realtime+whodata 로 감시.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) el34-web ossec.conf에서 syscheck <directories> 감시 대상 줄을 앞 8개 추출
      grep -E '<directories' /var/ossec/etc/ossec.conf | head -8
      # 2) 해석 — /etc·/usr/bin·/boot(정기) + /etc/apache2·/etc/modsecurity(realtime+whodata) 감시
      # → /etc, /usr/bin, /boot(정기) + /etc/apache2, /etc/modsecurity(realtime+whodata) 감시
      ```
      ## ✅ 합격 기준
      `directories` 출력 시 통과. **근거:** `<directories>` 줄이 나오면 핵심 설정 경로가 FIM 감시 범위에
      들어 있음을 확인한 것 — 특히 /etc/apache2 가 realtime 이라야 웹 변조를 즉시 탐지한다.
    hint: '<directories>'
    category: manipulation
    points: 14
    answer: |
      # 1) el34-web ossec.conf에서 syscheck <directories> 감시 대상 줄을 앞 8개 추출
      ssh ccc@10.20.32.80 "grep -E '<directories' /var/ossec/etc/ossec.conf | head -8"
      # 2) 해석 — /etc·/usr/bin·/boot(정기) + /etc/apache2·/etc/modsecurity(realtime+whodata) 감시
      # → /etc, /usr/bin, /boot(정기) + /etc/apache2, /etc/modsecurity(realtime+whodata) 감시
    answer_detail: "FIM 설정 = syscheck <directories>. /etc·/usr/bin·/boot 는 정기 스캔, /etc/apache2·/etc/modsecurity 는 realtime+whodata(변경 즉시 + 행위자까지). 감시하지 않는 곳의 변경은 탐지 불가 = 감시 범위가 곧 탐지의 한계. 증적 = <directories> 줄."
    expected_output: |
      <directories>/etc,/usr/bin,/usr/sbin</directories>
          <directories>/bin,/sbin,/boot</directories>
          <directories realtime="yes" report_changes="yes" whodata="yes">/etc/apache2</directories>
          <directories realtime="yes" report_changes="yes" whodata="yes">/etc/modsecurity</directories>
          <directories realtime="yes" report_changes="yes">/usr/share/modsecurity-crs</directories>
          <directories realtime="yes" report_changes="yes">/home/ccc</directories>
      → /etc, /usr/bin, /boot(정기) + /etc/apache2, /etc/modsecurity(realtime+whodata) 감시
    verify:
      type: output_contains
      expect: 'directories'
      field: stdout
      semantic:
        intent: "FIM 설정 확인"
        success_criteria: ["모니터링 디렉토리"]
        acceptable_methods: ["**[OSS] ossec.conf (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 FIM 작동 — 실제로 변경을 탐지·기록하나 (syscheck 알림)
      설정이 있다고 작동을 보장하지는 않는다. syscheck 알림이 매니저에 적재되고 있는지로 FIM 이 실제
      동작 중임을 증적으로 확인한다.

      > **용어 — FIM rule 550/554/555.** Wazuh 기본 룰 — 550 = 파일 내용 변경(modified), 554 = 파일 추가
      > (added), 555 = 파일 삭제(deleted). syscheck 알림이 alerts.json 에 쌓이면 FIM 이 실제로 돌고 있다는 증적.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 매니저 alerts.json 끝 8000줄에서 syscheck 포함 줄 수를 세어 fim_alerts= 로 출력
      N=$(tail -8000 /var/ossec/logs/alerts/alerts.json | grep -c syscheck); echo "fim_alerts=$N"
      # 2) 해석 — syscheck 알림 다수 = FIM 작동(rule 550 변경/554 추가/555 삭제)
      # → syscheck 알림 다수 = FIM 작동(rule 550 변경/554 추가/555 삭제)
      ```
      - `grep -c syscheck` 의 `-c` 가 syscheck 포함 줄 수를 세어 변수 N 에 담는다.
      ## ✅ 합격 기준
      `fim_alerts=` 출력 시 통과. **근거:** fim_alerts=<수>가 0보다 크면 FIM 이 실제 변경을 탐지·기록 중
      = 무결성 모니터링이 작동하는 증적(설정만이 아니라 동작까지 확인).
    hint: 'syscheck 알림 수'
    category: analysis
    points: 14
    answer: |
      # 1) 매니저 alerts.json 끝 8000줄에서 syscheck 포함 줄 수를 세어 fim_alerts= 로 출력
      ssh ccc@10.20.32.100 'N=$(tail -8000 /var/ossec/logs/alerts/alerts.json | grep -c syscheck); echo "fim_alerts=$N"'
      # 2) 해석 — syscheck 알림 다수 = FIM 작동(rule 550 변경/554 추가/555 삭제)
      # → syscheck 알림 다수 = FIM 작동(rule 550 변경/554 추가/555 삭제)
    answer_detail: "FIM 작동 = syscheck 알림 적재. grep -c 로 센 수가 0보다 크면 변경 탐지가 실제 동작(rule 550 변경/554 추가/555 삭제). 설정 존재(미션 2)와 별개로 '돌고 있다'는 증적. 증적 = fim_alerts= 출력."
    expected_output: |
      fim_alerts=32
      → syscheck 알림 다수 = FIM 작동(rule 550 변경/554 추가/555 삭제)
    verify:
      type: output_contains
      expect: 'fim_alerts='
      field: stdout
      semantic:
        intent: "FIM 작동 확인"
        success_criteria: ["변경 탐지 동작"]
        acceptable_methods: ["**[OSS] alerts.json (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 무단 변경 탐지 — canary 로 실증 (비파괴)
      "감시한다"를 말이 아니라 실증한다. realtime 감시 디렉터리에 표식(canary) 파일을 만들어 FIM 이
      그 변경을 즉시 인지하는지 확인하고, 점검이 흔적을 남기지 않게 즉시 지운다(self-clean).

      > **용어 — canary / self-clean / whodata 행위자.** canary = 탐지 작동을 떠보려 일부러 만드는 표식 파일.
      > self-clean = 검증 직후 원상복구(rm)해 환경을 더럽히지 않는 비파괴 점검. whodata 라야 "누가 만들었나"까지 기록.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) realtime+whodata 디렉토리(/etc/apache2)에 canary 생성→존재 확인(fim_canary=)→즉시 삭제(self-clean)
      echo x > /etc/apache2/cp10_canary.txt; test -f /etc/apache2/cp10_canary.txt && echo "fim_canary=created_in_monitored_dir"; rm -f /etc/apache2/cp10_canary.txt; echo cleaned
      # 2) 해석 — realtime+whodata 디렉토리의 생성→FIM이 변경(+누가)으로 인지. canary 즉시 삭제
      # → realtime+whodata 디렉토리(/etc/apache2)의 생성→FIM이 변경(+누가)으로 인지. canary 즉시 삭제(self-clean)
      ```
      - 한 줄 안에서 생성→`test -f`로 존재 확인→`rm -f`로 self-clean까지 끝내 흔적을 남기지 않는다.
      ## ✅ 합격 기준
      `fim_canary=` 출력 시 통과. **근거:** fim_canary=created_in_monitored_dir 가 나오면 realtime 감시
      디렉터리에 변경을 일으킨 것 = FIM 이 rule 554(추가)로 탐지할 입력을 만든 증적(파일은 즉시 self-clean).
    hint: 'canary 생성/삭제'
    category: manipulation
    points: 14
    answer: |
      # 1) realtime+whodata 디렉토리(/etc/apache2)에 canary 생성→존재 확인(fim_canary=)→즉시 삭제(self-clean)
      ssh ccc@10.20.32.80 'echo x > /etc/apache2/cp10_canary.txt; test -f /etc/apache2/cp10_canary.txt && echo "fim_canary=created_in_monitored_dir"; rm -f /etc/apache2/cp10_canary.txt; echo cleaned'
      # 2) 해석 — realtime+whodata 디렉토리의 생성→FIM이 변경(+누가)으로 인지. canary 즉시 삭제
      # → realtime+whodata 디렉토리(/etc/apache2)의 생성→FIM이 변경(+누가)으로 인지. canary 즉시 삭제(self-clean)
    answer_detail: "무단 변경 = 모니터링 디렉토리의 변경. realtime+whodata 디렉터리(/etc/apache2)에 canary 생성 → FIM 이 rule 554(추가)로 즉시 탐지(whodata 로 행위자까지). 한 줄에서 생성→확인→rm 까지 끝내 self-clean(비파괴). 증적 = fim_canary= 출력."
    expected_output: |
      fim_canary=created_in_monitored_dir
      cleaned
      → realtime+whodata 디렉토리(/etc/apache2)의 생성→FIM이 변경(+누가)으로 인지. canary 즉시 삭제(self-clean)
    verify:
      type: output_contains
      expect: 'fim_canary='
      field: stdout
      semantic:
        intent: "무단 변경 탐지"
        success_criteria: ["변경 발생/탐지"]
        acceptable_methods: ["**[OSS] canary (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 변경관리 프로세스 — 승인된 변경의 절차
      탐지(FIM)의 짝은 절차(변경관리)다. 모든 변경이 거쳐야 할 변경관리 7단계를 정리한다 — 이 절차가
      있어야 "기록 있는 변경(정상) vs 기록 없는 변경(조사)"의 기준선이 생긴다.

      > **용어 — RFC / CAB / 긴급변경.** RFC(Request for Change) = 변경요청서. CAB(Change Advisory Board) =
      > 변경자문위원회(승인 주체). 긴급변경 = 사전 승인이 어려운 변경 — 사후 승인 + 기록은 반드시 남긴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 변경관리 7단계 전반 — 요청(RFC)→영향평가→승인(CAB)
      echo "변경관리 1) 변경요청(RFC) → 2) 영향평가 → 3) 승인(CAB)"
      # 2) 7단계 후반 — 테스트→배포→검증→기록
      echo "4) 테스트 → 5) 배포 → 6) 검증 → 7) 기록"
      # 3) 예외 — 긴급변경은 사후 승인 + 기록 필수
      echo "긴급변경: 사후 승인 + 기록 필수"
      # 4) 결론 — 모든 변경은 추적 가능해야(누가/왜/언제/무엇을)
      # → 모든 변경은 추적 가능해야(누가/왜/언제/무엇을)
      ```
      ## ✅ 합격 기준
      `변경관리` 출력 시 통과. **근거:** 변경관리 7단계(요청→평가→승인→테스트→배포→검증→기록)와
      긴급변경 예외가 정리되면 통과 — 이 절차가 FIM 탐지를 정상/무단으로 가르는 기준선(미션 6)이 된다.
    hint: '요청~검증'
    category: analysis
    points: 12
    answer: |
      # 1) 변경관리 7단계 전반 — 요청(RFC)→영향평가→승인(CAB)
      echo "변경관리 1) 변경요청(RFC) → 2) 영향평가 → 3) 승인(CAB)"
      # 2) 7단계 후반 — 테스트→배포→검증→기록
      echo "4) 테스트 → 5) 배포 → 6) 검증 → 7) 기록"
      # 3) 예외 — 긴급변경은 사후 승인 + 기록 필수
      echo "긴급변경: 사후 승인 + 기록 필수"
      # 4) 결론 — 모든 변경은 추적 가능해야(누가/왜/언제/무엇을)
