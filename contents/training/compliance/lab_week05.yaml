      ## 🎯 키 관리 (PCI-DSS 3)
      암호화 알고리즘이 아무리 강해도 키가 데이터 옆에 평문으로 있으면 무의미하다 — DB를 빼간
      공격자가 키도 같이 가져가 즉시 복호화하기 때문이다. 키 관리는 암호화의 실효성을 결정하는
      통제로, 키의 생애 전 주기를 안전하게 통제한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 키 관리 생명주기 — 생성→배포→보관(KMS/HSM)→교체(주기적)→폐기
      echo "키 관리 생명주기: 생성→배포→보관(KMS/HSM)→교체(주기적)→폐기"
      # 2) 분리 — 데이터 암호화 키(DEK) ≠ 마스터 키(KEK)
      echo "분리: 데이터 암호화 키(DEK) ≠ 마스터 키(KEK)"
      # 3) 접근통제 — 키 접근 최소화 + 감사
