lab_id: standalone-compliance-week05
title: "암호화 컴플라이언스 — 전송(TLS)·저장·키 관리 (PCI-DSS 4·3)"
version: standalone-compliance
course: compliance
week: 5
description: |
  암호화 컴플라이언스를 감사자 관점에서 점검한다. 데이터는 이동 중(in transit)과 저장 중(at rest)
  두 상태로 존재하며, 둘 중 약한 쪽으로 샌다. 전송 축(PCI-DSS 4)은 el34 web 443의 금융 vhost
  (neobank.el34.lab)에 openssl·nmap을 던져 TLS 버전(TLSv1.3)·cipher 강도(least strength A)·폐기
  프로토콜(TLS1.1) 차단을 증거로 확인하고, 저장 축(PCI-DSS 3)은 AES-256 저장 암호화와 키 관리
  (KMS/HSM·DEK/KEK 분리)의 요건을 정리한다. 마지막에 자체서명 인증서 갭까지 묶어 준수/갭/권고
  보고서를 쓴다. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec -it el34-attacker bash 로 접속해,
  읽기 전용으로 수행한다. 인가된 표적만 점검하며 신규 도구 설치는 없다(openssl·nmap 기본 제공).
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W04 통과 (W04 접근통제·W10 TLS 점검 경험)"
  - "el34 호스트 SSH 접속 + docker exec 사용법 숙지"
  - "lecture §2(전송 TLS 버전) §3(cipher 강도) §4(폐기 프로토콜) §5(저장) §6(키 관리) 정독"
objectives:
  - "전송 암호화(TLS 버전·cipher·폐기 프로토콜)를 PCI-DSS 4 기준으로 증거와 함께 판정한다"
  - "nmap least strength 등급으로 약한 cipher 잔존 여부를, openssl -tls1_1로 폐기 프로토콜 차단을 확인한다"
  - "저장 암호화(AES-256)와 키 관리(생명주기·DEK/KEK 분리)를 PCI-DSS 3 관점에서 정리하고 자체서명 갭을 도출한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — HTTPS 도달성 확인
      모든 암호화 점검의 전제는 대상에 요청이 닿는다는 것이다. 본격 점검 전에 금융 vhost
      (neobank.el34.lab, web 443)에 HTTPS로 도달 가능한지부터 확인한다 — 연결이 안 되면 이후 모든
      음성 결과가 무의미하기 때문이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) 금융 vhost(neobank) HTTPS 도달성 확인 — -k로 자체서명 허용, 응답코드만 https= 형식으로
      curl -sk -o /dev/null -w 'https=%{http_code}\n' -H 'Host: neobank.el34.lab' https://10.20.30.1/
      ```
      - `curl` : 명령줄 HTTP(S) 도구. `-s`(진행표시 숨김), `-k`(자체서명 허용), `-o /dev/null`(본문 버림),
        `-w 'https=%{http_code}'`(응답 코드만). `-H 'Host: neobank.el34.lab'`로 vhost 지정.
      - `10.20.30.1` : fw의 ext 게이트웨이. 요청은 fw → web 경로로 전달된다.
      ## ✅ 합격 기준
      `https=` 출력 시 통과. **근거:** `https=<코드>`(200/302 등)가 나오면 도달 성공 — 응답이 없으면
      Host 헤더·게이트웨이·포트(443)를 재확인한다.
    hint: 'https 도달'
    category: survey
    points: 10
    answer: |
      # 1) 금융 vhost(neobank) HTTPS 도달성 확인 — -k로 자체서명 허용, 응답코드만 https= 형식으로
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'https=%{http_code}\n' -H 'Host: neobank.el34.lab' https://10.20.30.1/"
    answer_detail: "암호화 점검 대상 = el34 web 443의 금융 vhost(neobank). curl -k로 HTTPS 응답 코드가 돌아오면(https=200/302 등) 대상이 살아있고 도달 가능 — 이후 TLS 점검의 전제가 성립한다."
    expected_output: |
      https=200
    verify:
      type: output_contains
      expect: 'https='
      field: stdout
      semantic:
        intent: "HTTPS 점검"
        success_criteria: ["443 도달"]
        acceptable_methods: ["**[OSS] curl -k (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 전송 암호화 — TLS 버전 (PCI-DSS 4)
      전송 암호화는 데이터가 회선을 지나는 동안 도청·변조를 막는 통제이고, 웹에서는 TLS(HTTPS의 S)가
      맡는다. 감사의 첫 항목은 "어떤 TLS 버전으로 협상되는가"다 — TLS1.0/1.1은 폐기(취약), TLS1.2가
      최소선, TLS1.3이 권장이다. PCI-DSS 4.2.1은 강한 암호(= TLS1.2+ + 강한 cipher)를 요구한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) openssl s_client로 neobank 443에 접속해 협상된 Protocol/Cipher 줄만 추출(SNI로 vhost 지정)
      echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -3
      # 2) 해석 — TLSv1.3 + AEAD(GCM) = PCI-DSS 4.2.1 강한 암호 준수, 단 인증서는 자체서명(W10 갭)
      echo "→ TLSv1.3 + AEAD(GCM) = PCI-DSS 4.2.1 강한 암호 준수. 단 인증서는 자체서명(W10 갭)"
      ```
      - `openssl s_client` : TLS 핸드셰이크 결과를 보여주는 진단 도구. `Protocol:`=협상 버전, `Cipher:`=선택 cipher.
      - `-servername neobank.el34.lab` SNI(vhost), 앞의 `echo |`는 핸드셰이크 후 입력을 닫아 멈춤 방지.
      ## ✅ 합격 기준
      `TLSv1` 출력 시 통과. **근거:** Protocol 이 TLSv1.2/TLSv1.3 이면 준수 — TLSv1.0/1.1 이거나 cipher 에
      RC4·3DES 가 보이면 갭으로 기록한다.
    hint: 'TLSv1.2+'
    category: analysis
    points: 14
    answer: |
      # 1) openssl s_client로 neobank 443에 접속해 협상된 Protocol/Cipher 줄만 추출(SNI로 vhost 지정)
      docker exec el34-attacker sh -c "echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -3"
      # 2) 해석 — TLSv1.3 + AEAD(GCM) = PCI-DSS 4.2.1 강한 암호 준수, 단 인증서는 자체서명(W10 갭)
      echo "→ TLSv1.3 + AEAD(GCM) = PCI-DSS 4.2.1 강한 암호 준수. 단 인증서는 자체서명(W10 갭)"
    answer_detail: "전송 암호화 점검 = openssl s_client로 협상된 TLS 버전(Protocol)과 cipher를 읽는 것. el34는 TLSv1.3 + TLS_AES_256_GCM_SHA384(GCM=AEAD, 암호화+무결성 동시)로 PCI-DSS 4.2.1 강한 암호를 충족. 단 버전·cipher의 강도와 인증서 신뢰(자체서명 갭)는 별개 통제다."
    expected_output: |
      New, TLSv1.3, Cipher is TLS_AES_256_GCM_SHA384
      → TLSv1.3 + AEAD(GCM) = PCI-DSS 4.2.1 강한 암호 준수. 단 인증서는 자체서명(W10 갭)
    verify:
      type: output_contains
      expect: 'TLSv1'
      field: stdout
      semantic:
        intent: "전송 암호화 점검"
        success_criteria: ["TLS1.2+"]
        acceptable_methods: ["**[OSS] openssl s_client (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 cipher 강도 — nmap ssl-enum (PCI-DSS 4.2.1)
      미션 2의 openssl은 이번 협상의 cipher 하나만 보여준다. 하지만 서버는 보통 여러 cipher를
      허용 목록으로 갖고, 클라이언트가 약한 것을 고르면 받아줄 수도 있다. 감사는 서버가 허용하는
      모든 cipher 중 가장 약한 것을 봐야 한다 — 사슬은 가장 약한 고리에서 끊어진다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) nmap ssl-enum-ciphers로 서버 허용 cipher 전체 등급과 least strength(최저 등급) 열거
      timeout 55 nmap --script ssl-enum-ciphers -p 443 10.20.30.1 2>/dev/null | grep -iE 'TLSv|least strength'
      # 2) 해석 — least strength A=약한 cipher 없음(PCI 준수), C~F면 RC4/3DES 잔존(PCI 미달)
      echo "→ least strength A = 약한 cipher 없음(PCI 준수). C~F면 RC4/3DES 잔존 = PCI 미달"
      ```
      - `nmap --script ssl-enum-ciphers` : 지원 cipher 전체에 A~F 등급을 매기고 `least strength:`(최저 등급)를 출력.
      - `-p 443` 대상 포트. 앞의 `timeout 55`는 스캔이 길어지면 55초에 강제 종료하는 안전장치.
      ## ✅ 합격 기준
      `least strength` 출력 시 통과. **근거:** `least strength: A`이면 약한 cipher 없음 = PCI 준수 —
      C~F면 RC4/3DES/EXPORT 잔존 = PCI 미달이다.
    hint: 'least strength'
    category: analysis
    points: 14
    answer: |
      # 1) nmap ssl-enum-ciphers로 서버 허용 cipher 전체 등급과 least strength(최저 등급) 열거
      docker exec el34-attacker sh -c "timeout 55 nmap --script ssl-enum-ciphers -p 443 10.20.30.1 2>/dev/null | grep -iE 'TLSv|least strength'"
      # 2) 해석 — least strength A=약한 cipher 없음(PCI 준수), C~F면 RC4/3DES 잔존(PCI 미달)
      echo "→ least strength A = 약한 cipher 없음(PCI 준수). C~F면 RC4/3DES 잔존 = PCI 미달"
    answer_detail: "cipher 강도 = nmap ssl-enum-ciphers의 least strength 등급(서버가 허용하는 cipher 중 가장 약한 것). el34는 A = 약한 cipher(RC4·3DES·EXPORT) 없음 = PCI-DSS 4.2.1 준수. C~F면 취약 cipher 잔존 = PCI 미달이므로 해당 cipher를 서버 설정에서 비활성해야 한다."
    expected_output: |
      |   TLSv1.2:
      |_  least strength: A
      → least strength A = 약한 cipher 없음(PCI 준수). C~F면 RC4/3DES 잔존 = PCI 미달
    verify:
      type: output_contains
      expect: 'least strength'
      field: stdout
      semantic:
        intent: "cipher 강도"
        success_criteria: ["등급 확인"]
        acceptable_methods: ["**[OSS] nmap ssl-enum (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 폐기 프로토콜 — TLS1.1 차단 (PCI-DSS 4)
      강한 버전을 켜는 것만으로는 부족하다 — 약한 버전을 닫았는지까지 봐야 한다. 서버가 구버전
      (TLS1.0/1.1)을 동시에 열어두면, 공격자가 일부러 약한 버전으로 협상을 끌어내리는 다운그레이드
      공격이 가능하다. 그래서 일부러 TLS1.1로만 접속해 서버가 거부하는지 능동적으로 시험한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) -tls1_1로만 핸드셰이크 강제 → 거부 신호(no protocols/alert/handshake fail) 있으면 tls11=blocked, 없으면 allowed
      if echo | openssl s_client -connect 10.20.30.1:443 -tls1_1 2>&1 | grep -qiE "no protocols|alert|handshake fail|no peer cert"; then echo "tls11=blocked"; else echo "tls11=allowed"; fi
      # 2) 해석 — PCI-DSS는 TLS1.0/1.1 사용 금지, 차단(blocked)이 준수(allowed면 즉시 비활성)
      echo "→ PCI-DSS는 TLS1.0/1.1 사용 금지. 차단(blocked)이 준수. allowed면 즉시 비활성"
      ```
      - `openssl s_client -tls1_1` : TLS1.1로만 핸드셰이크 시도. 서버가 닫아 두었으면 거부 신호가 나타난다.
      - `if ... grep -q ...; then "blocked"; else "allowed"` : 거부 신호 있으면 차단(준수), 없으면 허용(갭).
      ## ✅ 합격 기준
      `tls11=blocked` 출력 시 통과. **근거:** TLS1.1 협상 거부(blocked)면 다운그레이드 차단 = PCI 준수 —
      tls11=allowed면 폐기 프로토콜이 열린 갭이다.
    hint: 'TLS1.1 차단'
    category: manipulation
    points: 14
    answer: |
      # 1) -tls1_1로만 핸드셰이크 강제 → 거부 신호(no protocols/alert/handshake fail) 있으면 tls11=blocked, 없으면 allowed
      docker exec el34-attacker sh -c 'if echo | openssl s_client -connect 10.20.30.1:443 -tls1_1 2>&1 | grep -qiE "no protocols|alert|handshake fail|no peer cert"; then echo "tls11=blocked"; else echo "tls11=allowed"; fi'
      # 2) 해석 — PCI-DSS는 TLS1.0/1.1 사용 금지, 차단(blocked)이 준수(allowed면 즉시 비활성)
      echo "→ PCI-DSS는 TLS1.0/1.1 사용 금지. 차단(blocked)이 준수. allowed면 즉시 비활성"
    answer_detail: "폐기 프로토콜 = 보안 결함으로 사용 금지된 TLS1.0/1.1. 일부러 -tls1_1로 접속해 핸드셰이크가 거부되면(tls11=blocked) 다운그레이드 공격을 막은 것 = PCI-DSS 4 준수. allowed면 즉시 비활성해야 할 갭이다."
    expected_output: |
      tls11=blocked
      → PCI-DSS는 TLS1.0/1.1 사용 금지. 차단(blocked)이 준수. allowed면 즉시 비활성
    verify:
      type: output_contains
      expect: 'tls11=blocked'
      field: stdout
      semantic:
        intent: "폐기 프로토콜 차단"
        success_criteria: ["TLS1.1 거부"]
        acceptable_methods: ["**[OSS] openssl -tls1_1 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 저장 암호화 — at rest (PCI-DSS 3)
      전송만 막고 저장을 평문으로 두면, DB·디스크·백업을 통째로 빼가는 한 번에 데이터가 그대로
      노출된다. 저장 암호화(at rest)는 멈춰 있는 데이터를 암호화해 매체·백업이 유출돼도 못 읽게 하는
      통제다. 본 미션은 저장 축(PCI-DSS 3)의 대상·알고리즘·원칙을 정리해 전송과 짝을 맞춘다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 저장 암호화 대상 — 카드정보(PCI 3)·개인정보·인증정보·백업(운영 DB만 암호화하고 백업 평문이 흔한 실수)
      echo "대상: 카드정보(PCI 3)·개인정보·인증정보·백업"
      # 2) 방식 — AES-256 등 강한 알고리즘, DB(TDE)/디스크(LUKS)/파일 레벨
      echo "방식: AES-256 등 강한 알고리즘, DB/디스크/파일 레벨"
      # 3) 원칙 — 평문 저장 금지, 카드번호는 토큰화/마스킹
      echo "원칙: 평문 저장 금지, 카드번호는 토큰화/마스킹"
      # 4) 결론 — 전송만 암호화하고 저장은 평문이면 DB 유출 시 그대로 노출
      echo "→ 전송만 암호화하고 저장은 평문이면 DB 유출 시 그대로 노출"
      ```
      ## ✅ 합격 기준
      `AES-256` 출력 시 통과. **근거:** 저장 암호화의 대상·알고리즘(AES-256)·원칙(평문 금지/토큰화/마스킹)이
      정리되면 통과 — 전송만 막고 저장이 평문이면 한 번의 유출로 그대로 노출된다.
    hint: 'at rest AES-256'
    category: analysis
    points: 12
    answer: |
      # 1) 저장 암호화 대상 — 카드정보(PCI 3)·개인정보·인증정보·백업(운영 DB만 암호화하고 백업 평문이 흔한 실수)
      echo "대상: 카드정보(PCI 3)·개인정보·인증정보·백업"
      # 2) 방식 — AES-256 등 강한 알고리즘, DB(TDE)/디스크(LUKS)/파일 레벨
