lab_id: standalone-compliance-week13
title: "제3자·공급망 위험 — SBOM·외부 의존성·벤더 관리"
version: standalone-compliance
course: compliance
week: 13
description: |
  제3자·공급망 위험을 감사자(auditor) 관점에서 한 바퀴 점검한다 — "내가 만들지 않은 코드까지" 본다.
  공급망 위험의 세 갈래(① 소프트웨어 의존성 ② 외부 서비스/CDN ③ 수탁사/벤더)를 차례로 식별·평가하고
  통제·방어·보고로 마무리한다. 구체적으로 (1) 소프트웨어 구성 식별 = SBOM(소프트웨어 부품 명세서)의
  기초, el34-web 의 Apache 2.4.52·OpenSSL 3.0.2 등 구성요소 목록화 → (2) 외부 의존성 식별 = juice 가
  끌어오는 Google Fonts CDN(fonts.googleapis.com/gstatic.com) → (3) 버전→CVE 매핑(수동 대조 + 자동
  SCA: nuclei/Trivy/Dependency-Check) → (4) 제3자 위험 평가(보안 인증·데이터 접근 범위·계약) →
  (5) 공급망 통제(SBOM 가시성 / SRI 무결성 / 벤더 실사 관리). 모든 점검은 el34 호스트
  (ssh ccc@{{TARGET_IP}})에서 docker exec -it <컨테이너> bash 로 접속해 수행하며, 외부 의존성 점검만 el34-attacker 에서 fw
  게이트웨이를 통한다. 인가된 표적(el34)만 점검하고, 외부 서비스는 수동 분석만 한다. 신규 설치 없음.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W12 통과 (특히 W08 기준선 감사 방법론, W12 데이터 보호)"
  - "el34 호스트 SSH 접속 + docker exec 사용 가능"
  - "lecture §1(공급망 3갈래) §2(SBOM 기초) §3(외부 의존/CDN) §4(버전→CVE) §5(통제) §6(제3자 평가) 숙지"
objectives:
  - "공급망 위험 3갈래(소프트웨어 의존성/외부 서비스·CDN/수탁사) 구분"
  - "소프트웨어 구성 식별 = SBOM 기초(Apache/OpenSSL 버전 목록화)"
  - "외부 의존성(Google Fonts CDN) HTML 분석으로 식별"
  - "버전→CVE 매핑(수동 + 자동 SCA 도구)과 SBOM 이 전제임을 설명"
  - "제3자 위험 평가(인증·데이터 범위·계약 SLA/감사권) 항목 정리"
  - "공급망 통제(SBOM 가시성/SRI 무결성/벤더 실사 관리) 권고 + 보고서 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (공급망 감사의 전제)
      공급망 감사도 표적 도달성 확인부터 시작한다 — 접근이 안 되면 이후 구성요소·의존성 점검이 전부
      무의미하다. 본 주차의 점검 대상은 두 곳이다 — 소프트웨어 구성요소를 볼 **el34-web**(Apache·OpenSSL)
      과, 외부 의존성을 끌어오는 **juice**(미션 3). 먼저 구성요소 점검 진입점인 el34-web 의 도달성을 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 구성요소 점검 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 구성요소 점검 진입점(el34-web) 접근 성공 —
      응답이 없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 구성요소 점검 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "공급망 점검 대상 = el34-web(소프트웨어 구성요소: Apache/OpenSSL) + juice(외부 의존: CDN). hostname 응답 + target_ok 로 구성요소 점검 진입점의 도달성을 확인하는 감사 착수 전제 단계."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 소프트웨어 구성 — SBOM 기초
      공급망 감사의 1단계는 "무엇이 깔려 있나"를 목록화하는 것이다. 목록이 없으면 어떤 CVE 가 나를
      때리는지도 알 수 없다. 그 목록이 SBOM 이다.

      > **용어 — SBOM(Software Bill of Materials).** 소프트웨어 부품 명세서 — 시스템을 이루는 구성요소와
      > 버전을 적은 목록(제품의 부품표와 같음). 신규 CVE 가 공개됐을 때 "내가 영향받나"를 즉시 답하는 전제.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) el34-web의 Apache·OpenSSL 버전과 관련 패키지 수를 한 번에 — 구성요소 목록(SBOM)의 기초
      apache2 -v | head -1; openssl version; echo "components=$(dpkg -l | grep -ciE "apache2|openssl|libssl")"
      # 2) 해석 — Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제
      echo "→ Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제"
      ```
      - `apache2 -v`(서버 버전), `openssl version`(라이브러리 버전), `dpkg -l | grep -ciE`(관련 패키지 수)를 묶어 구성요소를 식별.
      ## ✅ 합격 기준
      `components=` 출력 시 통과. **근거:** 버전 정보 + components=<수>가 나오면 설치 구성요소를 목록화한
      것(SBOM 의 기초) — 목록 없이는 신규 CVE 공개 시 영향 범위를 판단할 수 없다.
    hint: '버전/패키지'
    category: recon
    points: 14
    answer: |
      # 1) el34-web의 Apache·OpenSSL 버전과 관련 패키지 수를 한 번에 — 구성요소 목록(SBOM)의 기초
      docker exec el34-web sh -c 'apache2 -v | head -1; openssl version; echo "components=$(dpkg -l | grep -ciE "apache2|openssl|libssl")"'
      # 2) 해석 — Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제
      echo "→ Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제"
    answer_detail: "SBOM 기초 = 설치 구성요소/버전 목록(Apache 2.4.52·OpenSSL 3.0.2 등). 목록 없이는 신규 CVE 공개 시 '내가 영향받나'를 답할 수 없다 = CVE 영향 평가의 전제. Log4Shell 때 SBOM 있는 조직이 즉시 영향 범위를 파악한 교훈. 증적 = components= 출력."
    expected_output: |
      Server version: Apache/2.4.52 (Ubuntu)
      OpenSSL 3.0.2 15 Mar 2022 (Library: OpenSSL 3.0.2 15 Mar 2022)
      components=10
      → Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제
    verify:
      type: output_contains
      expect: 'components='
      field: stdout
      semantic:
        intent: "구성요소 식별"
        success_criteria: ["버전/SBOM"]
        acceptable_methods: ["**[OSS] dpkg/version (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 외부 의존성 — CDN (내가 만들지 않은 코드)
      앱이 끌어오는 외부 자원은 곧 외부에 맡긴 신뢰다. 그 출처가 침해·변조되면 내 앱에 악성 코드가
      실린다. el34 juice 의 HTML 을 받아 내부(10.20/el34)가 아닌 외부 도메인을 추려 외부 의존을 식별한다.

      > **용어 — CDN / 외부 의존성.** CDN(Content Delivery Network) = 폰트·스크립트 등을 대신 배포해 주는
      > 외부 서비스(예: Google Fonts). 내 코드가 아니지만 브라우저가 실행하므로, CDN 침해는 곧 내 앱 침해.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) juice HTML에서 http(s) 링크를 추려 내부(10.20/el34) 제외→외부 도메인만 정렬·중복제거 앞 3개
      curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -oE 'https?://[a-zA-Z0-9.-]+' | grep -viE '10.20|el34' | sort -u | head -3
      # 2) 해석 — Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험
      echo "→ Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험"
      ```
      - `grep -oE 'https?://...'`(링크만)→`grep -viE '10.20|el34'`(내부 제외)→`sort -u`(중복 제거)→`head -3`(표본).
      ## ✅ 합격 기준
      `gstatic` 출력 시 통과. **근거:** fonts.gstatic.com 등 외부 도메인이 나오면 앱의 외부 의존(Google
      Fonts CDN)을 식별한 것 — 이 CDN 이 침해되면 앱에 악성 스크립트가 주입될 통로가 된다.
    hint: 'fonts.gstatic/googleapis'
    category: manipulation
    points: 14
    answer: |
      # 1) juice HTML에서 http(s) 링크를 추려 내부(10.20/el34) 제외→외부 도메인만 정렬·중복제거 앞 3개
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -oE 'https?://[a-zA-Z0-9.-]+' | grep -viE '10.20|el34' | sort -u | head -3"
      # 2) 해석 — Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험
      echo "→ Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험"
    answer_detail: "외부 의존성 = juice 가 끌어오는 Google Fonts CDN(fonts.googleapis.com/gstatic.com). 내 코드가 아니지만 브라우저가 실행하므로 제3자(CDN) 침해 시 앱에 악성 코드가 주입되는 경로. HTML 에서 외부 도메인을 추리는 것이 외부 의존 식별의 기본. 증적 = gstatic 도메인."
    expected_output: |
      https://fonts.googleapis.com
      https://fonts.gstatic.com
      https://www.youtube.com
      → Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험
    verify:
      type: output_contains
      expect: 'gstatic'
      field: stdout
      semantic:
        intent: "외부 의존성 식별"
        success_criteria: ["CDN 의존"]
        acceptable_methods: ["**[OSS] HTML 분석 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 취약점 매핑 — 버전→CVE
      구성요소 목록(SBOM)의 가치는 버전을 CVE 에 대조할 때 실현된다. 수동 대조와 자동 SCA 도구로 버전→
      CVE 매핑 방법을 정리한다.

      > **용어 — CVE / SCA.** CVE(Common Vulnerabilities and Exposures) = 공개 취약점에 붙는 고유 번호.
      > SCA(Software Composition Analysis) = 구성요소 버전을 CVE DB 와 자동 대조하는 분석(Trivy·Dependency-Check).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 수동 — 구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2)을 CVE 데이터베이스와 대조
      echo "구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2) → CVE 데이터베이스 대조"
      # 2) 자동 — nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check
      echo "자동화: nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check"
      # 3) 의의 — SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)
      echo "→ SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)"
      ```
      ## ✅ 합격 기준
      `CVE` 출력 시 통과. **근거:** 버전→CVE 대조(수동 + 자동 SCA)와 SBOM 이 전제라는 점이 정리되면
      통과 — 신규 CVE 공개 시 SBOM 으로 영향 범위를 즉시 파악하는 것이 핵심(Log4Shell 교훈).
    hint: '버전→CVE'
    category: analysis
    points: 12
    answer: |
      # 1) 수동 — 구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2)을 CVE 데이터베이스와 대조
      echo "구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2) → CVE 데이터베이스 대조"
      # 2) 자동 — nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check
      echo "자동화: nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check"
      # 3) 의의 — SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)
      echo "→ SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)"
    answer_detail: "취약점 매핑 = 구성요소 버전(Apache 2.4.52·OpenSSL 3.0.2)을 CVE DB 와 대조. 수동 대조 + 자동 SCA(nuclei CVE 템플릿·Trivy·OWASP Dependency-Check). SBOM 이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악 가능(Log4Shell 교훈). 증적 = CVE 포함 출력."
    expected_output: |
      구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2) → CVE 데이터베이스 대조
      자동화: nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check
      → SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)
    verify:
      type: output_contains
      expect: 'CVE'
      field: stdout
      semantic:
        intent: "취약점 매핑"
        success_criteria: ["버전→CVE"]
        acceptable_methods: ["**[표준] SCA (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 제3자 위험 평가 — 수탁사·CSP·CDN
      공급망 위험은 코드만이 아니라 사람·조직(수탁사·벤더)에도 있다. 제3자가 내 데이터를 처리하거나
      접근할수록 그 보안 수준이 곧 내 위험이 된다. 무엇을 기준으로 제3자를 평가할지 정리한다.

      > **용어 — 수탁사 / 위탁 처리자.** 내 업무(데이터 처리 등)를 위탁받아 수행하는 외부 조직. 개인정보를
      > 다루는 수탁사일수록 보안 인증·접근 범위·계약(감사권)을 실사해야 한다(개인정보보호법 수탁자 관리·감독).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
