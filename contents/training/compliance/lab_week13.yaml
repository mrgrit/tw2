lab_id: standalone-compliance-week13
title: "제3자·공급망 위험 — SBOM·외부 의존성·벤더 관리"
version: standalone-compliance
course: compliance
week: 13
description: |
  공급망 위험 — 소프트웨어 구성 식별(SBOM 기초), 외부 의존성(Google Fonts CDN), 버전→CVE 매핑,
  제3자 위험 평가, 공급망 통제(SBOM/SRI/벤더 실사). el34-web/juice 실 점검. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W12 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SBOM) §3(외부의존) §5(통제) 숙지"
objectives:
  - "소프트웨어 구성/외부 의존성 식별"
  - "버전→CVE 매핑"
  - "공급망 통제(SBOM/SRI/실사)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "공급망 점검 대상 = el34-web(구성요소)/juice(외부 의존)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 소프트웨어 구성 — SBOM 기초
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'apache2 -v | head -1; openssl version; echo "components=$(dpkg -l | grep -ciE "apache2|openssl|libssl")"'
      ```
      ## ✅ 합격 기준
      설치 구성요소·버전을 식별한다(SBOM의 기초).
    hint: '버전/패키지'
    category: recon
    points: 14
    answer: |
      echo "=== 소프트웨어 구성 (SBOM 기초) ==="
      docker exec el34-web sh -c 'apache2 -v | head -1; openssl version; echo "components=$(dpkg -l | grep -ciE "apache2|openssl|libssl")"'
      echo "→ Apache 2.4.52/OpenSSL 3.0.2 등. 구성요소 목록(SBOM)이 CVE 영향평가의 전제"
    answer_detail: "SBOM 기초 = 설치 구성요소/버전 목록. 목록 없이는 CVE 영향 평가 불가."
    verify:
      type: output_contains
      expect: 'components='
      field: stdout
      semantic:
        intent: "구성요소 식별"
        success_criteria: ["버전/SBOM"]
        acceptable_methods: ["**[OSS] dpkg/version (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 외부 의존성 — CDN
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -oE 'https?://[a-zA-Z0-9.-]+' | grep -viE '10.20|el34' | sort -u | head -3"
      ```
      ## ✅ 합격 기준
      앱의 외부 의존성(CDN)을 식별한다.
    hint: 'fonts.gstatic/googleapis'
    category: manipulation
    points: 14
    answer: |
      echo "=== 외부 의존성 (CDN) ==="
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/ | grep -oE 'https?://[a-zA-Z0-9.-]+' | grep -viE '10.20|el34' | sort -u | head -3"
      echo "→ Google Fonts(fonts.googleapis.com/gstatic.com) 외부 의존. CDN 침해/변조 시 악성 스크립트 주입 위험"
    answer_detail: "외부 의존성 = Google Fonts CDN. 제3자 침해 시 앱에 악성 코드 주입 경로."
    verify:
      type: output_contains
      expect: 'gstatic'
      field: stdout
      semantic:
        intent: "외부 의존성 식별"
        success_criteria: ["CDN 의존"]
        acceptable_methods: ["**[OSS] HTML 분석 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 취약점 매핑 — 버전→CVE
      ## 💻 실행 명령
      ```bash
      echo "Apache 2.4.52 → CVE DB 대조. SCA/SBOM 도구(nuclei CVE/Trivy/Dependency-Check)로 자동 매핑"
      ```
      ## ✅ 합격 기준
      구성요소 버전을 CVE에 매핑하는 방법을 정리한다.
    hint: '버전→CVE'
    category: analysis
    points: 12
    answer: |
      echo "=== 취약점 매핑 (버전→CVE) ==="
      echo "구성요소 버전(Apache 2.4.52, OpenSSL 3.0.2) → CVE 데이터베이스 대조"
      echo "자동화: nuclei CVE 템플릿, Trivy(컨테이너 SCA), OWASP Dependency-Check"
      echo "→ SBOM이 있어야 신규 CVE 공개 시 영향 범위를 즉시 파악(Log4Shell 교훈)"
    answer_detail: "취약점 매핑 = 버전→CVE 대조(자동: Trivy/Dependency-Check). SBOM이 영향평가 전제."
    verify:
      type: output_contains
      expect: 'CVE'
      field: stdout
      semantic:
        intent: "취약점 매핑"
        success_criteria: ["버전→CVE"]
        acceptable_methods: ["**[표준] SCA (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 제3자 위험 평가
      ## 💻 실행 명령
      ```bash
      echo "수탁사/CSP/CDN/SaaS의 보안 수준·인증(ISO27001/SOC2)·데이터 접근 범위 평가"
      ```
      ## ✅ 합격 기준
      제3자 위험 평가 항목을 정리한다.
    hint: '수탁사/CSP/CDN'
    category: analysis
    points: 12
    answer: |
      echo "=== 제3자 위험 평가 ==="
      echo "대상: 수탁사(위탁 처리자), CSP, CDN, SaaS, 오픈소스"
      echo "평가축: 보안 인증(ISO27001/SOC2), 데이터 접근 범위, 침해 이력, 계약(SLA/감사권)"
      echo "→ 제3자가 처리하는 개인정보·접근 권한이 클수록 높은 위험"
    answer_detail: "제3자 위험 평가 = 보안인증+데이터 접근 범위+계약. 위탁 범위에 비례한 실사."
    verify:
      type: output_contains
      expect: '수탁사'
      field: stdout
      semantic:
        intent: "제3자 위험 평가"
        success_criteria: ["평가 항목"]
        acceptable_methods: ["**[표준] 벤더 위험 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 공급망 통제
      ## 💻 실행 명령
      ```bash
      echo "SBOM 유지, 의존성 고정+정기 업데이트, SRI(외부 스크립트 무결성), 벤더 실사/계약"
      ```
      ## ✅ 합격 기준
      공급망 통제 수단을 정리한다.
    hint: 'SBOM/SRI/실사'
    category: report
    points: 12
    answer: |
      echo "=== 공급망 통제 ==="
      echo "1) SBOM: 구성요소 목록 유지·갱신"
      echo "2) 의존성 고정(버전 pin) + 정기 업데이트"
      echo "3) SRI(Subresource Integrity): 외부 스크립트 변조 탐지(해시 검증)"
      echo "4) 벤더 실사: 수탁사 보안 점검 + 계약(SLA·감사권)"
      echo "→ Google Fonts 같은 외부 의존엔 SRI 또는 self-host 적용"
    answer_detail: "공급망 통제 = SBOM+의존성고정+SRI+벤더실사. 외부 의존은 SRI/self-host."
    verify:
      type: output_contains
      expect: 'SBOM'
      field: stdout
      semantic:
        intent: "공급망 통제"
        success_criteria: ["SBOM/SRI/실사"]
        acceptable_methods: ["**[설명] 통제 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 공급망 보안
      ## 💻 실행 명령
      ```bash
      echo "SBOM 자동생성 + SCA 정기스캔 + SRI + 벤더 실사 + 신규 CVE 대응 프로세스"
      ```
      ## ✅ 합격 기준
      공급망 보안 방어를 정리한다.
    hint: 'SBOM/SCA/SRI/실사'
    category: report
    points: 12
    answer: |
      echo "=== 공급망 보안 방어 ==="
      echo "1) SBOM 자동 생성(빌드 파이프라인 통합)"
      echo "2) SCA 정기 스캔(Trivy/Dependency-Check)으로 의존성 CVE 추적"
      echo "3) SRI + 외부 의존 최소화(self-host)"
      echo "4) 벤더 실사 + 계약(보안 요구사항)"
      echo "5) 신규 CVE 대응 프로세스(영향 범위 즉시 파악)"
      echo "→ 핵심: 가시성(SBOM) + 무결성(SRI) + 벤더 관리"
    answer_detail: "방어 = SBOM+SCA+SRI+벤더실사+CVE대응. 가시성+무결성+벤더관리."
    verify:
      type: output_contains
      expect: 'SCA'
      field: stdout
      semantic:
        intent: "공급망 보안 방어"
        success_criteria: ["가시성/무결성/벤더"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 공급망 위험 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W13 공급망 위험 보고서 (학번, 이름)
      ## 1. 소프트웨어 구성(SBOM)/외부 의존(CDN)
      ## 2. 버전→CVE/제3자 위험
      ## 3. 공급망 통제(SBOM/SRI/실사)
      ```
      ## ✅ 합격 기준
      보고서에 구성 식별 + 제3자 위험 + 통제가 포함된다.
    hint: 'SBOM+제3자+통제'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W13 공급망 위험 보고서
      ## 1. 구성: Apache 2.4.52/OpenSSL 3.0.2(SBOM). 외부 의존: Google Fonts CDN
      ## 2. 위험: 버전→CVE 매핑 필요, CDN 침해 시 악성 스크립트 주입(제3자 위험)
      ## 3. 통제: SBOM 유지 + SCA 정기스캔 + SRI(외부 스크립트 무결성) + 벤더 실사
      ## 결론: 내 보안은 가장 약한 협력사만큼. SBOM 가시성+SRI 무결성+벤더 관리가 공급망 통제
      EOF
    answer_detail: "공급망 보고 = SBOM/외부의존+CVE/제3자위험+통제(SBOM/SRI/실사). 가시성이 핵심."
    verify:
      type: output_contains
      expect: 'SBOM'
      field: stdout
      semantic:
        intent: "공급망 위험 보고"
        success_criteria: ["구성/제3자/통제"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
