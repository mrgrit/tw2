lab_id: standalone-compliance-week01
title: "컴플라이언스 개론 — 프레임워크·통제·갭 분석"
version: standalone-compliance
course: compliance
week: 1
description: |
  컴플라이언스 개론 — 프레임워크(ISMS-P/ISO27001/PCI-DSS/NIST CSF), 통제 유형, 갭 분석(기준 vs 현재),
  증적, 점검 방법론. el34-web 실설정 점검 포함. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(프레임워크) §3(통제) §4(갭 분석) 숙지"
objectives:
  - "주요 프레임워크/통제 유형 이해"
  - "기준 vs 현재 갭 분석"
  - "증적 기반 점검 방법론"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      점검 대상(el34-web)에 접근 가능.
    hint: '대상 접근'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "컴플라이언스 점검 대상 = el34-web(웹 서버 자산)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 프레임워크 식별
      ## 💻 실행 명령
      ```bash
      echo "ISMS-P(국내), ISO27001(국제 ISMS), PCI-DSS(카드결제), NIST CSF(IPDRR)"
      ```
      ## ✅ 합격 기준
      주요 컴플라이언스 프레임워크를 식별한다.
    hint: 'ISMS-P/ISO/PCI/NIST'
    category: analysis
    points: 12
    answer: |
      echo "=== 프레임워크 식별 ==="
      echo "ISMS-P: 국내 정보보호·개인정보 관리체계 인증(관리체계+보호대책+개인정보)"
      echo "ISO 27001: 국제 ISMS 표준(Annex A 통제, PDCA)"
      echo "PCI-DSS: 카드 결제 데이터 보호(12 요구사항)"
      echo "NIST CSF: Identify/Protect/Detect/Respond/Recover"
      echo "→ 대상 업종·규제에 맞는 프레임워크 선택"
    answer_detail: "프레임워크 = ISMS-P(국내)/ISO27001(국제)/PCI-DSS(카드)/NIST CSF(IPDRR). 업종별 선택."
    verify:
      type: output_contains
      expect: 'ISMS-P'
      field: stdout
      semantic:
        intent: "프레임워크 식별"
        success_criteria: ["주요 프레임워크"]
        acceptable_methods: ["**[표준] 프레임워크 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 통제 유형 분류
      ## 💻 실행 명령
      ```bash
      echo "관리적(정책/교육), 물리적(출입통제), 기술적(접근통제/암호화/로깅)"
      ```
      ## ✅ 합격 기준
      통제를 관리/물리/기술로 분류한다.
    hint: '관리/물리/기술'
    category: analysis
    points: 12
    answer: |
      echo "=== 통제 유형 ==="
      echo "관리적(Administrative): 정책·절차·교육·위험평가"
      echo "물리적(Physical): 출입통제·CCTV·잠금장치"
      echo "기술적(Technical): 접근통제·암호화·로깅·방화벽"
      echo "기능별: 예방(Preventive)/탐지(Detective)/교정(Corrective)"
      echo "→ 통제는 유형별로 균형 배치(심층 방어)"
    answer_detail: "통제 유형 = 관리적/물리적/기술적. 기능별로 예방/탐지/교정."
    verify:
      type: output_contains
      expect: '기술적'
      field: stdout
      semantic:
        intent: "통제 분류"
        success_criteria: ["관리/물리/기술"]
        acceptable_methods: ["**[표준] 통제 유형 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 기술 점검 예 — ServerTokens 갭
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"'
      ```
      ## ✅ 합격 기준
      실제 설정을 점검해 기준 미충족(갭)을 발견한다.
    hint: 'ServerTokens 값이 Prod 인가'
    category: manipulation
    points: 14
    answer: |
      echo "=== 기술 점검 (ServerTokens) ==="
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"'
      echo "→ ServerTokens OS = 제품+OS 노출(Apache/2.4.52 Ubuntu). CIS는 Prod(제품만) 요구 → 갭"
    answer_detail: "기술 점검 = 실제 설정 확인. ServerTokens OS(설정됨)이나 CIS 요구 Prod 아님→버전노출 갭."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "기술 점검"
        success_criteria: ["설정 갭 발견"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 갭 분석 — 기준 vs 현재
      ## 💻 실행 명령
      ```bash
      echo "기준(CIS: ServerTokens Prod) vs 현재(미설정=Full) → 갭 → 조치(Prod 설정)"
      ```
      ## ✅ 합격 기준
      기준과 현재 상태를 대조해 갭과 조치를 도출한다.
    hint: '기준 vs 현재 → 조치'
    category: analysis
    points: 12
    answer: |
      echo "=== 갭 분석 ==="
      echo "기준(CIS Apache 2.4): ServerTokens Prod, ServerSignature Off"
      echo "현재(el34-web): ServerTokens OS(제품+OS 노출)"
      echo "갭: 버전 배너 노출(Prod 아님)"
      echo "조치: apache2.conf에 ServerTokens Prod 추가"
      echo "→ 갭 분석 = (요구 기준) − (현재 상태) = 조치 목록"
    answer_detail: "갭 분석 = 기준−현재. 미충족 항목을 조치 목록으로. 우선순위는 위험 기반."
    verify:
      type: output_contains
      expect: '갭'
      field: stdout
      semantic:
        intent: "갭 분석"
        success_criteria: ["기준vs현재/조치"]
        acceptable_methods: ["**[표준] 갭 분석 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 증적 — 재현 가능 증거
      ## 💻 실행 명령
      ```bash
      echo "증적: 설정 출력+점검 명령+일시. 감사에서 재현·추적 가능해야 인정"
      ```
      ## ✅ 합격 기준
      증적의 요건을 정리한다.
    hint: '재현 가능 증거'
    category: report
    points: 12
    answer: |
      echo "=== 증적(Evidence) ==="
      echo "구성: 점검 명령 + 결과 출력 + 점검 일시 + 점검자"
      echo "요건: 재현 가능(같은 명령→같은 결과), 추적 가능(출처 명확)"
      echo "예: 'grep ServerTokens /etc/apache2/ → 미설정' + 캡처 시각"
      echo "→ 증적 없는 점검 결과는 감사에서 불인정"
    answer_detail: "증적 = 재현·추적 가능한 증거(명령+출력+일시+점검자). 감사 인정의 핵심."
    verify:
      type: output_contains
      expect: '증적'
      field: stdout
      semantic:
        intent: "증적 요건"
        success_criteria: ["재현 가능 증거"]
        acceptable_methods: ["**[관리적] 증적 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 점검 방법론 — 3축
      ## 💻 실행 명령
      ```bash
      echo "문서검토(정책/절차) + 기술점검(설정/로그) + 인터뷰(운영실태) → 증적 → 갭/조치"
      ```
      ## ✅ 합격 기준
      컴플라이언스 점검 방법론을 정리한다.
    hint: '문서/기술/인터뷰'
    category: report
    points: 12
    answer: |
      echo "=== 점검 방법론 (3축) ==="
      echo "1) 문서 검토: 정책·지침·절차의 존재/적정성"
      echo "2) 기술 점검: 실제 설정·로그·구성 확인(증적)"
      echo "3) 인터뷰: 운영 실태·인식 수준"
      echo "→ 3축 교차로 '문서상 통제'와 '실제 통제'의 일치 확인"
    answer_detail: "방법론 = 문서검토+기술점검+인터뷰. 문서와 실제의 일치를 증적으로 확인."
    verify:
      type: output_contains
      expect: '기술 점검'
      field: stdout
      semantic:
        intent: "점검 방법론"
        success_criteria: ["문서/기술/인터뷰"]
        acceptable_methods: ["**[표준] 방법론 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 컴플라이언스 개요 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W01 개요 보고서 (학번, 이름)
      ## 1. 프레임워크/통제 유형
      ## 2. 갭 분석(ServerTokens)
      ## 3. 증적/방법론
      ```
      ## ✅ 합격 기준
      보고서에 프레임워크 + 갭 분석 + 방법론이 포함된다.
    hint: '프레임워크+갭+방법론'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W01 개요 보고서
      ## 1. 프레임워크: ISMS-P/ISO27001/PCI-DSS/NIST CSF, 통제(관리/물리/기술)
      ## 2. 갭 분석: 기준(CIS ServerTokens Prod) vs 현재(미설정) → 버전노출 갭 → Prod 설정
      ## 3. 증적: 점검 명령+출력+일시. 방법론: 문서검토+기술점검+인터뷰
      ## 결론: 컴플라이언스는 통제의 존재·작동을 증적으로 증명. 갭 분석으로 조치 우선순위화
      EOF
    answer_detail: "개요 보고 = 프레임워크+통제+갭분석+증적/방법론. 컴플라이언스 사고의 기본 틀."
    verify:
      type: output_contains
      expect: '갭'
      field: stdout
      semantic:
        intent: "컴플라이언스 개요 보고"
        success_criteria: ["프레임워크/갭/방법론"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
