lab_id: standalone-compliance-week01
title: "컴플라이언스 개론 — 프레임워크·통제·갭 분석"
version: standalone-compliance
course: compliance
week: 1
description: |
  컴플라이언스 개론 실습 — 감사자(auditor) 관점으로 보안을 점검하는 한 바퀴를 손으로 돈다.
  주요 프레임워크(ISMS-P=국내 종합 / ISO27001=국제 ISMS / PCI-DSS=카드 결제 / NIST CSF=IPDRR
  기능 모델)를 식별하고, 통제를 두 축(관리/물리/기술 · 예방/탐지/교정)으로 분류하며, el34-web 의
  실제 Apache ServerTokens 설정을 점검해 CIS 기준(Prod) 대비 갭(버전 배너 노출)을 발견한다.
  이어 그 갭을 기준−현재=조치 구조로 정리하고, 증적(재현·추적 가능 증거)·3축 방법론(문서/기술/
  인터뷰)을 거쳐 개요 보고서로 종합한다. 모든 명령은 el34 호스트(ssh ccc@192.168.0.151, pw 1)
  에서 docker exec 로 실행하며, 점검은 설정을 읽기만 한다(변경 금지). 신규 도구 설치 없음.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(프레임워크) §3(통제) §4(갭 분석) 숙지"
objectives:
  - "주요 프레임워크 4종(ISMS-P/ISO27001/PCI-DSS/NIST CSF)을 업종·규제와 연결해 식별한다"
  - "통제를 성격(관리/물리/기술)·기능(예방/탐지/교정) 두 축으로 분류한다"
  - "el34-web 실설정을 점검해 기준(CIS) 대비 갭을 실측으로 발견한다(ServerTokens)"
  - "갭을 기준−현재=조치로 정리하고, 재현·추적 가능한 증적으로 남긴다"
  - "문서검토+기술점검+인터뷰 3축 방법론으로 개요 보고서를 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      컴플라이언스 점검의 첫 단계 — 점검 대상 자산(el34-web)이 가동 중이며 접근 가능한지 확정한다.

      ## 📌 개념 한 줄
      모든 점검의 전제는 "대상에 도달 가능하다"이다. 접근이 안 되면 이후 모든 점검 결과가 무의미하므로,
      감사자는 본격 점검 전 항상 대상 자산의 도달성부터 확인한다(lecture §1.2, §7).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```

      ## 🔧 도구 풀이
      - `docker exec el34-web sh -c '...'` : el34 호스트에서 점검 대상 컨테이너(el34-web) 안으로 명령을
        보낸다. 신규 설치 없이 대상의 현재 상태를 읽는 표준 방식이다.
      - `hostname` : 컨테이너의 호스트명을 출력해 "어느 대상에 들어왔는지"를 증적으로 남긴다.

      ## ✅ 합격 기준
      출력에 `target_ok` 가 보이면(대상 도달 성공) 합격. 컨테이너를 찾지 못하면 호스트 접속과
      컨테이너 이름(el34-web)을 먼저 점검한다.
    hint: '대상 접근'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "컴플라이언스 점검 대상 = el34-web(외부 노출 Apache 웹 서버 자산). hostname 응답 +
      target_ok 출력으로 대상 도달을 확인 = 점검 범위(scope) 내 자산이 실재·접근 가능함을 증적으로 확정."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      주요 컴플라이언스 프레임워크 4종을 식별하고, 각각이 누구를 위해 무엇을 요구하는지 연결한다.

      ## 📌 개념 한 줄
      컴플라이언스의 첫 질문은 "무엇을 지켜야 하는가"다. 우리 업종·규제에 맞는 잣대(프레임워크)를
      먼저 정해야 무엇을 기준으로 점검할지가 정해진다(lecture §2). 프레임워크란 "보안을 위해 무엇을·
      어떻게 통제해야 하는가"를 정리해 둔 표준 체계(건축 법규 같은 잣대)다.

      ## 💻 실행 명령
      ```bash
      echo "ISMS-P(국내), ISO27001(국제 ISMS), PCI-DSS(카드결제), NIST CSF(IPDRR)"
      ```

      ## 🔧 표준 풀이
      - **ISMS-P** : 한국 정보보호·개인정보 관리체계 인증(관리체계+보호대책+개인정보). 국내 일정 규모
        이상은 법적 의무.
      - **ISO 27001** : 국제 ISMS 표준. PDCA(계획-실행-점검-개선 순환) + Annex A 통제 카탈로그(93개).
      - **PCI-DSS** : 카드 결제 데이터를 다루면 의무인 보안 표준(12개 요구사항 — 암호화·로깅·점검).
      - **NIST CSF** : 보안 활동을 IPDRR(Identify/Protect/Detect/Respond/Recover) 5 기능으로 보는 틀.

      ## ✅ 합격 기준
      출력에 `ISMS-P` 등 프레임워크가 식별되면 합격. 핵심은 이름 암기가 아니라 "어느 업종·규제 → 어느
      잣대"의 연결이다(국내 영업→ISMS-P, 해외 거래처→ISO27001, 카드 결제→PCI-DSS).
    hint: 'ISMS-P/ISO/PCI/NIST'
    category: analysis
    points: 12
    answer: |
      echo "=== 프레임워크 식별 ==="
      echo "ISMS-P: 국내 정보보호·개인정보 관리체계 인증(관리체계+보호대책+개인정보)"
      echo "ISO 27001: 국제 ISMS 표준(Annex A 통제, PDCA)"
      echo "PCI-DSS: 카드 결제 데이터 보호(12 요구사항)"
      echo "NIST CSF: Identify/Protect/Detect/Respond/Recover"
      echo "→ 대상 업종·규제에 맞는 프레임워크 선택"
    answer_detail: "프레임워크 = ISMS-P(국내 종합 인증)/ISO27001(국제 ISMS, PDCA+Annex A)/PCI-DSS(카드
      결제 12 요구사항)/NIST CSF(IPDRR 기능 모델). 한 조직이 업종·규제에 따라 여럿을 동시에 따른다.
      점검의 잣대를 먼저 정하는 단계 = 무엇을 기준으로 점검할지 확정."
    verify:
      type: output_contains
      expect: 'ISMS-P'
      field: stdout
      semantic:
        intent: "프레임워크 식별"
        success_criteria: ["주요 프레임워크"]
        acceptable_methods: ["**[표준] 프레임워크 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      보안 통제를 두 축으로 분류한다 — 성격(관리/물리/기술)과 기능(예방/탐지/교정).

      ## 📌 개념 한 줄
      통제(control)는 위험을 줄이는 구체적 대책(자물쇠·CCTV·교육 같은 개별 장치)이다. 체계적으로
      분류할 줄 알아야 점검에서 빠뜨리는 영역이 없고, 통제가 한쪽으로 쏠려 있지 않은지(심층 방어)를
      진단할 수 있다(lecture §3, §0.5.3).

      ## 💻 실행 명령
      ```bash
      echo "관리적(정책/교육), 물리적(출입통제), 기술적(접근통제/암호화/로깅)"
      ```

      ## 🔧 표준 풀이
      - **성격 축(누가 운영하나)** : 관리적(사람·절차 — 정책/교육/위험평가) · 물리적(물리 장치 —
        출입통제/CCTV/잠금) · 기술적(IT 기술 — 접근통제/암호화/로깅/방화벽).
      - **기능 축(언제 작동하나)** : 예방(Preventive, 사고 전 차단) · 탐지(Detective, 사고 중·후 인지) ·
        교정(Corrective, 사고 후 복구).
      - 예: 다음 미션의 ServerTokens 설정은 "기술적 · 예방" 통제다.

      ## ✅ 합격 기준
      출력에 `기술적` 을 포함해 통제 유형이 분류되면 합격. 한 유형만으로는 부족하므로 여러 유형을
      겹겹이 배치한다(심층 방어)는 점을 이해한다.
    hint: '관리/물리/기술'
    category: analysis
    points: 12
    answer: |
      echo "=== 통제 유형 ==="
      echo "관리적(Administrative): 정책·절차·교육·위험평가"
      echo "물리적(Physical): 출입통제·CCTV·잠금장치"
      echo "기술적(Technical): 접근통제·암호화·로깅·방화벽"
      echo "기능별: 예방(Preventive)/탐지(Detective)/교정(Corrective)"
      echo "→ 통제는 유형별로 균형 배치(심층 방어)"
    answer_detail: "통제 유형 = 성격 축(관리적/물리적/기술적) × 기능 축(예방/탐지/교정). 두 축으로
      분류해 통제가 한쪽으로 쏠리지 않게 균형(심층 방어)을 점검한다. ServerTokens 설정은 기술적·예방 통제."
    verify:
      type: output_contains
      expect: '기술적'
      field: stdout
      semantic:
        intent: "통제 분류"
        success_criteria: ["관리/물리/기술"]
        acceptable_methods: ["**[표준] 통제 유형 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      el34-web 의 실제 Apache ServerTokens 설정값을 점검해, CIS 기준(Prod) 대비 갭을 자동 판정한다.
      (이번 주차의 핵심 실습)

      ## 📌 개념 한 줄
      컴플라이언스의 진짜 힘은 추측이 아니라 실측이다. 문서상 통제와 실제 통제가 일치하는지를 설정
      명령으로 직접 확인한다. ServerTokens 는 Apache 가 응답 `Server:` 헤더에 자기 버전·OS 를 얼마나
      노출할지 정하는 설정으로, 가게가 간판에 상호만 쓸지(Prod) 주인 주소까지 쓸지(OS)의 차이다
      (lecture §4.3).

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"'
      ```

      ## 🔧 도구 풀이
      - `grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/` : Apache 설정 디렉터리 전체에서
        ServerTokens 줄을 찾는다(`-r` 하위 포함, `-h` 파일명 숨김, `-i` 대소문자 무시, `-E` 확장
        정규식, `^[[:space:]]*` 줄 앞 공백 허용).
      - `grep -qi "Prod" && echo compliant || echo gap=not_Prod` : 찾은 값에 Prod 가 있으면 충족,
        없으면 갭으로 판정하는 자동 갭 판정 로직.
      - 예상 출력: `current:	ServerTokens OS` 다음 줄에 `gap=not_Prod`.

      ## ✅ 합격 기준
      출력에 `gap=` 이 나타나면(현재 OS = 버전+OS 노출, 기준 Prod 미달) 합격. 핵심 깨달음 — "설정이
      되어 있다(OS)"가 곧 "기준을 충족한다(Prod)"는 아니다. 정확한 버전 노출은 그 버전의 알려진
      취약점(CVE) 공격을 쉽게 하므로 갭이다.
    hint: 'ServerTokens 값이 Prod 인가'
    category: manipulation
    points: 14
    answer: |
      echo "=== 기술 점검 (ServerTokens) ==="
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"'
      echo "→ ServerTokens OS = 제품+OS 노출(Apache/2.4.52 Ubuntu). CIS는 Prod(제품만) 요구 → 갭"
    answer_detail: "기술 점검 = 실제 설정을 명령으로 확인(실측). el34-web 현재값 ServerTokens OS는
      설정되어 있으나 CIS Apache 2.4 가 요구하는 Prod(제품명만)가 아니므로 Apache/2.4.52 (Ubuntu) 처럼
      버전+OS 를 노출하는 갭. gap=not_Prod 판정으로 기준 미충족을 증적과 함께 발견."
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "기술 점검"
        success_criteria: ["설정 갭 발견"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      앞서 발견한 ServerTokens 갭을 "기준 − 현재 = 조치" 구조로 정리해 갭 분석을 완성한다.

      ## 📌 개념 한 줄
      갭을 발견하는 데서 끝나면 안 된다. 발견을 기준·현재·조치 구조로 정리해야 "무엇을 어떻게 고쳐야
      하는가"가 명확해진다. 갭 분석(gap analysis) = 요구 기준(있어야 할 상태) − 현재 상태(실측) =
      미충족(갭)의 목록 = 조치 목록(lecture §4, §0.5.4).

      ## 💻 실행 명령
      ```bash
      echo "기준(CIS: ServerTokens Prod) vs 현재(미설정=Full) → 갭 → 조치(Prod 설정)"
      ```

      ## 🔧 개념 풀이
      - **기준(요구)** : CIS Apache 2.4 벤치마크 — ServerTokens Prod, ServerSignature Off(공격 표면
        최소화를 위한 정보 노출 억제).
      - **현재(실측)** : el34-web 의 ServerTokens OS(제품+OS 노출). ※ 미션 4 의 실측값.
      - **갭** : 버전 배너 노출(Prod 아님) → **조치** : apache 설정에 ServerTokens Prod 적용.

      ## ✅ 합격 기준
      출력에 `갭` 이 포함되며 기준·현재·조치가 함께 정리되면 합격. 갭마다 위험도를 매겨 조치
      우선순위(remediation roadmap)로 잇는다는 점을 이해한다.
    hint: '기준 vs 현재 → 조치'
    category: analysis
    points: 12
    answer: |
      echo "=== 갭 분석 ==="
      echo "기준(CIS Apache 2.4): ServerTokens Prod, ServerSignature Off"
      echo "현재(el34-web): ServerTokens OS(제품+OS 노출)"
      echo "갭: 버전 배너 노출(Prod 아님)"
      echo "조치: apache2.conf에 ServerTokens Prod 추가"
      echo "→ 갭 분석 = (요구 기준) − (현재 상태) = 조치 목록"
    answer_detail: "갭 분석 = 기준(CIS ServerTokens Prod) − 현재(el34-web ServerTokens OS) = 버전 배너
      노출 갭 → 조치(ServerTokens Prod 적용). 미충족 항목을 조치 목록으로 만들고, 우선순위는 위험 기반."
    verify:
      type: output_contains
      expect: '갭'
      field: stdout
      semantic:
        intent: "갭 분석"
        success_criteria: ["기준vs현재/조치"]
        acceptable_methods: ["**[표준] 갭 분석 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표
      점검 결과를 감사에서 인정받는 증적(evidence)으로 남기는 요건을 정리한다.

      ## 📌 개념 한 줄
      감사에서 "점검했습니다"라는 말은 증거가 아니다. 무엇을·언제·누가·어떤 명령으로 점검했고 결과가
