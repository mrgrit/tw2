lab_id: standalone-compliance-week12
title: "데이터 보호와 개인정보 — 처리 원칙·정보주체 권리·재식별"
version: standalone-compliance
course: compliance
week: 12
description: |
  데이터 보호 — 개인정보 처리 식별(Feedbacks 노출), 처리 원칙(최소화/목적/보유), 정보주체 권리,
  재식별 위험, 가명·마스킹, 안전성 확보 조치. juice 대상. 공격은 el34-attacker. 인가된 실습만. 신규 설치 없음.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W11 통과 (web-vuln W12 API 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(식별) §3(처리원칙) §5(가명/마스킹) 숙지"
objectives:
  - "개인정보 처리/노출 식별"
  - "처리 원칙/정보주체 권리"
  - "재식별 위험/안전성 조치"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
      ```
      ## ✅ 합격 기준
      대상 도달.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      docker exec el34-attacker sh -c "curl -sk -o /dev/null -w 'juice=%{http_code}\n' -H 'Host: juice.el34.lab' http://10.20.30.1/"
    answer_detail: "데이터 보호 점검 대상 = juiceshop(개인정보 처리 앱)."
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] curl (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 개인정보 처리 식별 — Feedbacks 노출
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE '@[a-zA-Z0-9.-]+' | head -3"
      ```
      ## ✅ 합격 기준
      무인증 응답에서 개인정보(이메일 조각)를 식별한다.
    hint: '이메일 도메인'
    category: manipulation
    points: 14
    answer: |
      echo "=== 개인정보 처리 식별 (Feedbacks) ==="
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE '@[a-zA-Z0-9.-]+' | head -3"
      echo "→ /api/Feedbacks 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함"
    answer_detail: "개인정보 식별 = Feedbacks API의 이메일 조각/UserId 노출(무인증). 처리 현황 파악."
    verify:
      type: output_contains
      expect: '@'
      field: stdout
      semantic:
        intent: "개인정보 식별"
        success_criteria: ["이메일/식별자"]
        acceptable_methods: ["**[OSS] API 응답 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 개인정보 처리 원칙
      ## 💻 실행 명령
      ```bash
      echo "목적 제한, 수집 최소화, 정확성, 보유 제한(파기), 안전성, 투명성"
      ```
      ## ✅ 합격 기준
      개인정보 처리 원칙을 정리한다.
    hint: '최소화/목적/보유'
    category: analysis
    points: 12
    answer: |
      echo "=== 개인정보 처리 원칙 ==="
      echo "목적 제한: 수집 목적 내에서만 이용"
      echo "수집 최소화: 필요 최소한만"
      echo "정확성: 최신·정확 유지"
      echo "보유 제한: 목적 달성 시 지체없이 파기"
      echo "안전성: 암호화·접근통제·로깅"
      echo "투명성: 처리방침 공개·동의"
      echo "→ Feedbacks 무인증 노출은 안전성·최소화 원칙 위반"
    answer_detail: "처리 원칙 = 목적제한/최소화/정확성/보유제한/안전성/투명성. Feedbacks 노출은 위반."
    verify:
      type: output_contains
      expect: '최소화'
      field: stdout
      semantic:
        intent: "처리 원칙"
        success_criteria: ["원칙 정리"]
        acceptable_methods: ["**[법규] 처리 원칙 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 정보주체 권리
      ## 💻 실행 명령
      ```bash
      echo "열람·정정·삭제·처리정지·동의철회·(GDPR)이동권/잊힐권리"
      ```
      ## ✅ 합격 기준
      정보주체의 권리를 정리한다.
    hint: '열람/정정/삭제'
    category: analysis
    points: 12
    answer: |
      echo "=== 정보주체 권리 ==="
      echo "열람 · 정정·삭제 · 처리정지 · 동의철회"
      echo "GDPR 추가: 데이터 이동권, 잊힐 권리(삭제권)"
      echo "→ 권리 행사 요청에 법정 기한 내 대응 의무"
    answer_detail: "정보주체 권리 = 열람/정정/삭제/처리정지/동의철회 + GDPR 이동권/잊힐권리."
    verify:
      type: output_contains
      expect: '처리정지'
      field: stdout
      semantic:
        intent: "정보주체 권리"
        success_criteria: ["권리 목록"]
        acceptable_methods: ["**[법규] 권리 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 노출 점검 — 재식별 위험
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE 'UserId[^,]*' | head -2; echo reident_check"
      ```
      ## ✅ 합격 기준
      식별자(UserId)+이메일 결합의 재식별 위험을 확인한다.
    hint: 'UserId 결합'
    category: manipulation
    points: 12
    answer: |
      echo "=== 재식별 위험 ==="
      docker exec el34-attacker sh -c "curl -sk -H 'Host: juice.el34.lab' http://10.20.30.1/api/Feedbacks | grep -oE 'UserId[^,]*' | head -2; echo reident_check"
      echo "→ 부분 마스킹(***in@도메인)이어도 UserId+도메인 결합으로 재식별 가능. 부분 마스킹의 한계"
    answer_detail: "재식별 = 부분 마스킹+식별자(UserId)+도메인 결합으로 개인 특정. 부분 마스킹 한계."
    verify:
      type: output_contains
      expect: 'reident_check'
      field: stdout
      semantic:
        intent: "재식별 위험"
        success_criteria: ["식별자 결합"]
        acceptable_methods: ["**[OSS] API 응답 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 가명·익명 처리, 마스킹
      ## 💻 실행 명령
      ```bash
      echo "가명처리(추가정보 없이 식별불가), 익명처리(복원불가), 마스킹(부분가림-재식별 잔존)"
      ```
      ## ✅ 합격 기준
      가명·익명·마스킹 처리를 구분한다.
    hint: '가명/익명/마스킹'
    category: analysis
    points: 12
    answer: |
      echo "=== 가명·익명·마스킹 ==="
      echo "가명처리: 추가정보 없이는 식별 불가(분석 활용 가능, 여전히 개인정보)"
      echo "익명처리: 복원 불가(개인정보 아님)"
      echo "마스킹: 화면/응답 부분 가림 — 부분 마스킹은 재식별 위험 잔존"
      echo "→ Feedbacks는 완전 비식별/접근통제가 필요(부분 마스킹 불충분)"
    answer_detail: "가명(식별불가/활용가능)·익명(복원불가)·마스킹(부분가림/재식별 잔존). 강도 차이."
    verify:
      type: output_contains
      expect: '가명처리'
      field: stdout
      semantic:
        intent: "비식별 처리"
        success_criteria: ["가명/익명/마스킹"]
        acceptable_methods: ["**[법규] 비식별 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 — 안전성 확보 조치
      ## 💻 실행 명령
      ```bash
      echo "최소수집+접근통제(인증)+암호화(전송/저장)+가명/익명+접근로깅+보유기간 파기"
      ```
      ## ✅ 합격 기준
      개인정보 안전성 확보 조치를 정리한다.
    hint: '접근통제/암호화/파기'
    category: report
    points: 12
    answer: |
      echo "=== 안전성 확보 조치 ==="
      echo "1) 최소 수집 + 목적 제한"
      echo "2) 접근통제: API 인증(Feedbacks 무인증 노출 차단)"
      echo "3) 암호화: 전송(TLS)+저장(AES-256)"
      echo "4) 가명/익명 처리, 응답 필드 최소화"
      echo "5) 접근 로깅 + 보유기간 만료 시 파기"
      echo "→ 핵심: 무인증 노출 차단 + 비식별 + 암호화"
    answer_detail: "안전성 조치 = 최소수집+접근통제+암호화+비식별+로깅+파기. 무인증 노출 차단 우선."
    verify:
      type: output_contains
      expect: '접근통제'
      field: stdout
      semantic:
        intent: "안전성 확보 조치"
        success_criteria: ["접근통제/암호화/파기"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 데이터 보호 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W12 데이터 보호 보고서 (학번, 이름)
      ## 1. 개인정보 노출(Feedbacks)/재식별 위험
      ## 2. 처리 원칙/정보주체 권리
      ## 3. 안전성 확보 조치
      ```
      ## ✅ 합격 기준
      보고서에 노출 + 처리 원칙 + 안전성 조치가 포함된다.
    hint: '노출+원칙+조치'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W12 데이터 보호 보고서
      ## 1. 노출: /api/Feedbacks 무인증 200 + 이메일/UserId → 부분 마스킹에도 재식별 위험
      ## 2. 원칙: 최소화/목적제한/보유제한/안전성 위반(무인증 노출). 정보주체 권리(열람~삭제) 보장 필요
      ## 3. 조치: API 인증 + 응답 최소화 + 가명/익명 + 암호화(전송/저장) + 보유기간 파기
      ## 결론: 개인정보는 빌린 것. 무인증 노출 차단·비식별·암호화로 안전성 확보, 위반 시 과징금
      EOF
    answer_detail: "데이터 보호 보고 = 노출(Feedbacks)+처리원칙/권리+안전성 조치. 개인정보보호법/GDPR."
    verify:
      type: output_contains
      expect: '재식별'
      field: stdout
      semantic:
        intent: "데이터 보호 보고"
        success_criteria: ["노출/원칙/조치"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
