      알아내는 것이다. 핵심 개념은 **준식별자(quasi-identifier)** — 그 자체로는 개인을 식별하지 못하나
      (예: 도메인·생년월일·우편번호·UserId), **여러 개를 결합하면** 식별되는 정보다. el34 Feedbacks 의
      이메일은 앞부분이 **부분 마스킹**(예: `a***@corp.com`)돼 있다 해도, 응답에는 **도메인(@corp.com)**
      과 **UserId** 가 그대로 남는다. 이 둘은 각각 모호한 준식별자지만, 결합하면(나아가 회사 직원 목록
      같은 외부 데이터와 다시 결합하면 = **결합 공격, linkage attack**) 개인을 특정할 통로가 된다.
