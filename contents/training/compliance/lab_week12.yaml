lab_id: standalone-compliance-week12
title: "데이터 보호와 개인정보 — 처리 원칙·정보주체 권리·재식별"
version: standalone-compliance
course: compliance
week: 12
description: |
  데이터 보호와 개인정보 — 한 명의 "개인정보 감사자(privacy auditor)"가 되어, el34 JuiceShop 의
  `/api/Feedbacks` 가 무인증으로 이메일 조각·UserId 를 흘리는 실제 결함을 표적으로 데이터 보호 감사의
  한 바퀴를 적용한다. 흐름: 대상 도달 → 개인정보 식별(Feedbacks 노출) → 처리 원칙 6(최소화·목적
  제한·보유 제한 등) 위반 판정 → 정보주체 권리(열람·정정·삭제…) → 재식별 위험(준식별자 결합) →
  가명·익명·마스킹 비식별 기법 구분 → 안전성 확보 조치(접근통제·암호화·파기) → 종합 보고서.

  핵심 관점은 "개인정보는 조직의 소유물이 아니라 정보주체에게 빌린 것"이며, 그래서 수집·이용·보관·
  파기 전 과정에 개인정보보호법(PIPA)·GDPR 이라는 법적 의무가 따른다는 것이다. W08 중간고사·web-vuln
  W12 에서 "보안 결함(과다 데이터 노출)"으로 본 같은 한 줄의 응답을, 본 주차는 "처리 원칙 위반 +
  재식별 위험"이라는 개인정보 보호의 시선으로 다시 판정한다. 채점은 "데이터가 새더라"는 선언이 아니라
  개인정보 식별 → 위반 원칙(법 조항) → 재식별 위험 → 안전성 조치의 네 박자다.

  표적은 el34 JuiceShop(juice.el34.lab), 점검은 외부 공격자 위치(ssh att@192.168.0.202)에서 nc(raw HTTP)·grep 으로 수행한다. 모든
  점검은 읽기 전용이며(노출된 개인정보를 수집·저장·재배포하지 않음), 인가된 표적만 점검한다. 신규
  도구 설치는 없다. lecture §0.5(개인정보/가명/익명) §2(식별) §3(처리원칙) §5(재식별) §6(가명/마스킹)
  과 1:1 로 대응한다.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W11 통과 (web-vuln W12 API 경험)"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(식별) §3(처리원칙) §5(가명/마스킹) 숙지"
objectives:
  - "개인정보 처리 식별 — el34 Feedbacks 응답의 이메일 조각·UserId 를 개인정보(준식별자)로 직접 식별한다"
  - "처리 원칙 6(목적 제한·수집 최소화·정확성·보유 제한·안전성·투명성)을 설명하고 Feedbacks 노출이 위반한 원칙(최소화·안전성)을 법 조항과 함께 판정한다"
  - "정보주체 권리(열람·정정·삭제·처리정지·동의철회 + GDPR 이동권·잊힐 권리)를 열거하고, 무인증 노출이 권리를 왜 무력화하는지 설명한다"
  - "재식별 위험을 이해하고 부분 마스킹+준식별자(UserId·도메인) 결합으로 개인이 특정될 수 있음을 증적으로 보인다"
  - "가명처리·익명처리·마스킹의 강도 차이와 법적 지위를 구분하고, Feedbacks 에 적정한 비식별을 판단한다"
  - "노출·위반·재식별 위험을 안전성 확보 조치(접근통제·암호화·비식별·파기)로 정렬해 데이터 보호 감사 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (감사의 전제)
      데이터 보호 감사의 첫 단계는 표적에 접근이 되는지부터 확인하는 것이다. 접근이 안 되면 이후 모든
      음성 결과(노출 없음·갭 없음)가 무의미하기 때문이다. 본 주차의 표적은 el34 의 **JuiceShop**
      (`juice.el34.lab`) — 고객 피드백·주문 등 **개인정보를 처리하는 웹 앱**이라 데이터 보호 점검의
      대상으로 적합하다. 점검은 망 외부 침입자 위치의 `el34-attacker` 컨테이너에서 fw 게이트웨이
      (`10.20.30.1`)로 `Host: juice.el34.lab` 헤더를 실어 요청하고, 돌아온 HTTP 응답 코드를 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) el34-attacker에서 fw 게이트웨이(10.20.30.1)에 Host: juice.el34.lab로 요청 — 응답코드를 juice= 로 출력
      echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE "[0-9]{3}"
      ```
      - `echo -en 'GET / ...\r\nHost: juice.el34.lab\r\n...'` 가 raw HTTP 요청이고, `nc -w3 192.168.0.161 80` 로 fw→web 에 전송(`-w3` 3초 타임아웃). `head -1`(응답 첫 줄)→`grep -oE '[0-9]{3}'`(상태 코드만). `Host` 헤더로 가상호스트(JuiceShop) 라우팅.
      ## ✅ 합격 기준
      `juice` 출력 시 통과. **근거:** juice=<응답코드>(예: juice=200)가 나오면 대상 도달 성공 — 응답이
      없으면 호스트 SSH·컨테이너 상태(`docker ps`)·vhost(`Host: juice.el34.lab`)부터 점검한다.
    hint: '도달성'
    category: survey
    points: 10
    answer: |
      # 1) el34-attacker에서 fw 게이트웨이(10.20.30.1)에 Host: juice.el34.lab로 요청 — 응답코드를 juice= 로 출력
      ssh att@192.168.0.202 "echo -en "GET / HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 | head -1 | grep -oE "[0-9]{3}"
    answer_detail: "데이터 보호 점검 대상 = JuiceShop(개인정보를 처리하는 웹 앱). el34-attacker 에서 fw 게이트웨이(10.20.30.1)로 Host: juice.el34.lab 헤더를 실어 호출하고 juice=<응답코드>가 돌아오면 대상 도달 확인 — 본격 점검 전 도달성을 검증하는 감사 착수의 전제 단계다."
    expected_output: |
      juice=200
    verify:
      type: output_contains
      expect: 'juice'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["도달"]
        acceptable_methods: ["**[OSS] nc (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 개인정보 처리 식별 — Feedbacks 노출
      데이터 보호 감사의 1단계는 "여기 **개인정보**가 있는가"를 식별하는 것이다. 보호할 대상이 무엇인지
      모르면 어떤 원칙도 적용할 수 없기 때문이다(자산 식별 = 감사의 출발점). **개인정보(personal data)**
      란 살아 있는 개인을 **식별할 수 있는** 정보(이름·이메일·식별번호 등)이며, 단독으론 모호해도 다른
      정보와 결합해 식별되는 것도 포함된다. JuiceShop 의 `/api/Feedbacks`(고객 피드백) 엔드포인트는
      **로그인 없이도(무인증) 200** 을 주는데, 그 응답 본문에 피드백을 남긴 사용자의 **이메일 조각**
      (부분 마스킹된 `@도메인`)과 **UserId** 가 함께 내려온다. 브라우저 화면으론 피드백 글만 멀쩡히
      보이지만, **API 응답 본문 자체**를 검사하면 화면에 쓰지도 않는 식별자가 함께 새고 있음이 드러난다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) /api/Feedbacks 무인증 응답에서 이메일 조각(@도메인)만 추려 앞 3개 — 무인증 개인정보 노출 확인
      echo -en "GET /api/Feedbacks HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null | grep -oE '@[a-zA-Z0-9.-]+' | head -3
      # 2) 해석 — 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함
      # → /api/Feedbacks 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함
      ```
      - `nc … /api/Feedbacks`(토큰·로그인 없이 raw HTTP 로 응답 본문)→`grep -oE '@[a-zA-Z0-9.-]+'`(@도메인만)→`head -3`(표본 3개).
      ## ✅ 합격 기준
      `@` 출력 시 통과. **근거:** @도메인(이메일 조각)이 나오면 무인증 응답에 개인정보가 실려 있다는 증거 —
      같은 응답의 UserId 와 함께 새는 것이 핵심이다(재식별은 미션 5). 노출된 실제 이메일은 증거로만 본다.
    hint: '이메일 도메인'
    category: manipulation
    points: 14
    answer: |
      # 1) /api/Feedbacks 무인증 응답에서 이메일 조각(@도메인)만 추려 앞 3개 — 무인증 개인정보 노출 확인
      ssh att@192.168.0.202 "echo -en "GET /api/Feedbacks HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null | grep -oE '@[a-zA-Z0-9.-]+' | head -3"
      # 2) 해석 — 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함
      # → /api/Feedbacks 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함
    answer_detail: "개인정보 식별 = /api/Feedbacks 가 무인증 200 으로 이메일 조각(@도메인)과 UserId 를 흘리는 것을 확인하는 단계(자산 식별 = 감사의 1단계). API·로그·백업 어디에 개인정보가 있는지 찾는 데이터 매핑(data mapping)의 축소판이며, 화면엔 안 보여도 응답 본문에는 식별자가 실려 있다는 사실이 핵심. 증적 = 추출된 @도메인."
    expected_output: |
      @juice-sh.op
      @juice-sh.op
      @juice-sh.op
      → /api/Feedbacks 무인증 200 + 이메일 조각(@도메인) + UserId 노출 = 개인정보 보호 결함
    verify:
      type: output_contains
      expect: '@'
      field: stdout
      semantic:
        intent: "개인정보 식별"
        success_criteria: ["이메일/식별자"]
        acceptable_methods: ["**[OSS] API 응답 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 개인정보 처리 원칙 6 — 무엇을 어겼는가
      발견한 노출이 "왜 문제인가"는 **처리 원칙**으로 설명된다. **처리 원칙(processing principles)** 은
      개인정보를 **수집·이용·보관·파기**하는 모든 단계에서 지켜야 할 기본 규칙으로, 개인정보보호법
      제3조와 GDPR 제5조가 정해 둔 것이다. 개별 통제(암호화·접근통제)의 상위 기준이며, 감사자는 결함이
      **어느 원칙을 위반했는지**로 그 법적 의미를 부여한다. 6가지는 ① **목적 제한**(수집한 목적 안에서만
      이용) ② **수집 최소화**(필요한 최소한만 수집·처리) ③ **정확성**(최신·정확하게 유지) ④ **보유
      제한**(목적 달성 시 지체없이 파기) ⑤ **안전성**(암호화·접근통제·로깅으로 보호) ⑥ **투명성**(처리
      방침 공개·적법 근거·동의)이다. el34 Feedbacks 의 무인증 노출은 **수집 최소화**(화면에 불필요한
      식별자를 응답에 포함)와 **안전성**(접근 통제 없이 무인증 노출)을 정면으로 위반한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) ① 목적 제한 — 수집 목적 내에서만 이용
      echo "목적 제한: 수집 목적 내에서만 이용"
      # 2) ② 수집 최소화 — 필요 최소한만
      echo "수집 최소화: 필요 최소한만"
      # 3) ③ 정확성 — 최신·정확 유지
      echo "정확성: 최신·정확 유지"
      # 4) ④ 보유 제한 — 목적 달성 시 지체없이 파기
      echo "보유 제한: 목적 달성 시 지체없이 파기"
      # 5) ⑤ 안전성 — 암호화·접근통제·로깅
      echo "안전성: 암호화·접근통제·로깅"
      # 6) ⑥ 투명성 — 처리방침 공개·동의
      echo "투명성: 처리방침 공개·동의"
      # 7) 판정 — Feedbacks 무인증 노출은 안전성·최소화 원칙 위반
      # → Feedbacks 무인증 노출은 안전성·최소화 원칙 위반
      ```
      ## ✅ 합격 기준
      `최소화` 출력 시 통과. **근거:** 처리 원칙 6 이 정리되고 수집 최소화가 나오면 통과 — 핵심은
      "노출됐다"를 넘어 "수집 최소화·안전성 원칙을 위반했다(증적: 무인증 응답의 이메일·UserId)"는 판정.
    hint: '최소화/목적/보유'
    category: analysis
    points: 12
    answer: |
      # 1) ① 목적 제한 — 수집 목적 내에서만 이용
      echo "목적 제한: 수집 목적 내에서만 이용"
      # 2) ② 수집 최소화 — 필요 최소한만
      echo "수집 최소화: 필요 최소한만"
      # 3) ③ 정확성 — 최신·정확 유지
      echo "정확성: 최신·정확 유지"
      # 4) ④ 보유 제한 — 목적 달성 시 지체없이 파기
      echo "보유 제한: 목적 달성 시 지체없이 파기"
      # 5) ⑤ 안전성 — 암호화·접근통제·로깅
      echo "안전성: 암호화·접근통제·로깅"
      # 6) ⑥ 투명성 — 처리방침 공개·동의
      echo "투명성: 처리방침 공개·동의"
      # 7) 판정 — Feedbacks 무인증 노출은 안전성·최소화 원칙 위반
