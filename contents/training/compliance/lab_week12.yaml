      echo -en "GET /api/Feedbacks HTTP/1.0\r\nHost: juice.el34.lab\r\nConnection: close\r\n\r\n" | nc -w3 192.168.0.161 80 >/dev/null | grep -oE 'UserId[^,]*' | head -2; echo reident_check
      # 2) 해석 — 부분 마스킹(***in@도메인)이어도 UserId+도메인 결합으로 재식별 가능
      # → 부분 마스킹(***in@도메인)이어도 UserId+도메인 결합으로 재식별 가능. 부분 마스킹의 한계
      ```
      - `grep -oE 'UserId[^,]*'` = UserId 로 시작해 다음 쉼표 전까지(쉼표 아닌 문자들) 값 추출. `head -2`(표본 2개).
      ## ✅ 합격 기준
      `reident_check` 출력 시 통과. **근거:** UserId 값 + reident_check 가 나오면 부분 마스킹에도 도메인 +
      UserId 결합으로 재식별 가능하다는 증거 — 비식별 안전성은 "무엇을 가렸나"가 아니라 "남은 것을 결합해
      식별되나"로 판단한다(재식별 위험은 가능성 판단일 뿐 실제 특정·악용하지 않는다).
