      않은 나머지 + 다른 단서가 남으면 **재식별 위험이 그대로**라 가장 약하다(여전히 개인정보). ②
      **가명처리(pseudonymization)**: 식별자를 사번·토큰 같은 **가명**으로 바꿔 **추가정보(대조표) 없이는**
      식별 못 하게 함. 대조표가 있으면 복원되므로 **법적으로 여전히 개인정보**다(다만 통계·연구엔 동의
      없이 활용할 길을 엶). ③ **익명처리(anonymization)**: 대조표를 없애고 준식별자까지 일반화해 **복원
      불가능**하게 만듦 → 법적으로 **개인정보가 아니다**(PIPA 적용 제외). 강도는 **마스킹 < 가명 < 익명**
