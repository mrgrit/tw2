        미션 2(노출)·3(원칙)·4(권리)·5(재식별)·7(조치)의 결과로 채워 보고서 본문을 만든다.
      ## ✅ 합격 기준
      보고서에 `재식별` 을 포함해 **노출 + 처리 원칙 + 안전성 조치**가 모두 담기면 합격. 어느 한 축이
      빠지면(예: 조치 없음) 미션 2·3·7 의 결과를 다시 종합한다.
