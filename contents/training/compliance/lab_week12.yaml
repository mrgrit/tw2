      echo "1) 최소 수집 + 목적 제한"
      # 2) 접근통제 — API 인증(Feedbacks 무인증 노출 차단, 최우선)
      echo "2) 접근통제: API 인증(Feedbacks 무인증 노출 차단)"
      # 3) 암호화 — 전송(TLS)+저장(AES-256)
      echo "3) 암호화: 전송(TLS)+저장(AES-256)"
      # 4) 가명/익명 처리, 응답 필드 최소화
      echo "4) 가명/익명 처리, 응답 필드 최소화"
      # 5) 접근 로깅 + 보유기간 만료 시 파기
      echo "5) 접근 로깅 + 보유기간 만료 시 파기"
      # 6) 핵심 — 무인증 노출 차단 + 비식별 + 암호화
      # → 핵심: 무인증 노출 차단 + 비식별 + 암호화
      ```
      ## ✅ 합격 기준
      `접근통제` 출력 시 통과. **근거:** 안전성 확보 조치가 위험 감소 효과순으로 정리되고 접근통제(무인증
      차단)가 최우선으로 짚이면 통과 — 우선순위 없는 나열은 "무엇부터 고칠지"를 알려주지 못한다.
