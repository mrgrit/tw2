lab_id: standalone-compliance-week08
title: "중간고사: 종합 보안 기준선(Baseline) 감사 (W01~W07)"
version: standalone-compliance
course: compliance
week: 8
description: |
  중간 평가 — 단 하나의 표적 시스템(el34-web)을 CIS Benchmark 기준선으로 한 바퀴 종합 감사한다.
  W01~W07 의 점검 역량(정보노출/접근통제/자산/암호정책/파일권한/암호화/로깅/취약점)을 따로따로가 아니라
  하나의 기준선 감사 흐름으로 통합 적용한다. 각 항목에서 기준(요구치) ↔ 현재 상태를 대조해 준수
  (compliant) / 갭(gap) 을 판정하고 증적을 확보한 뒤, 갭을 위험 기반 우선순위로 종합 보고한다.
  모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 docker exec -it <컨테이너> bash 로 접속해 실행하며 신규 도구 설치는 없다
  (설정·권한은 el34-web 안에서, 로깅은 el34-siem 에서, 전송 암호화·취약점 스캔은 el34-attacker 에서).
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W07 통과(프레임워크·정책·자산·접근통제·암호화·로깅·취약점 점검)"
  - "el34 호스트 SSH + docker exec 접근"
  - "전 주차 점검 명령(grep/stat/openssl/nuclei) 숙지"
objectives:
  - "한 표적(el34-web)에 대한 종합 기준선(baseline) 감사를 처음부터 끝까지 수행한다"
  - "각 점검 항목에서 기준(CIS/PCI/ISMS-P) 대비 준수/갭을 증적과 함께 판정한다"
  - "발견된 갭을 위험 기반 우선순위로 정렬해 종합 기준선 감사 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상 도달성 (감사의 전제)
      감사의 첫 단계는 표적에 접근이 되는지 확인하는 것이다. 접근이 안 되면 이후 모든 음성 결과가
      무의미하다. 이번 중간고사의 기준선 감사 대상은 el34 4-tier 의 dmz 계층에 있는 web 컨테이너
      (`el34-web`, Apache + ModSecurity)다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 기준선 감사 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      hostname; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 나오면 대상 접근 성공 — 응답이 없으면 호스트 SSH·
      컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 8
    answer: |
      # 1) 기준선 감사 대상 el34-web 도달성 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "기준선 감사 대상 = el34-web(dmz Apache+ModSec). hostname 응답 + target_ok 출력으로 도달성 확인 — 감사 착수의 전제 단계."
    expected_output: |
      web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 정보 노출 — ServerTokens (W01: 프레임워크·갭 분석)
      기준선의 첫 항목은 정보 최소화다. `ServerTokens` 가 `OS` 면 `Apache/2.4.52 (Ubuntu)` 처럼 제품
      버전·OS 가 드러나 공격자가 표적에 맞는 CVE 를 고른다. **CIS Apache 2.4 Benchmark 는 `Prod`** 를 요구.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) (①W01) Apache ServerTokens 값을 찾아 현재값 출력 후 Prod 여부 판정(아니면 gap=not_Prod)
      V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"
      # 2) 해석 — ServerTokens OS → CIS Prod 미달(갭)
      echo "→ ServerTokens OS → CIS Prod 미달(갭)"
      ```
      ## ✅ 합격 기준
      `gap=` 출력 시 통과. **근거:** gap=not_Prod 면 현재 값 OS 가 CIS 기준 Prod 에 미달한 갭(후속 공격
      정찰 단서, 시정 대상). 증적 = current: 뒤의 실제 설정값.
    hint: 'ServerTokens'
    category: manipulation
    points: 10
    answer: |
      # 1) (①W01) Apache ServerTokens 값을 찾아 현재값 출력 후 Prod 여부 판정(아니면 gap=not_Prod)
      docker exec el34-web sh -c 'V=$(grep -rhiE "^[[:space:]]*ServerTokens" /etc/apache2/ 2>/dev/null | head -1); echo "current:$V"; echo "$V" | grep -qi "Prod" && echo "compliant" || echo "gap=not_Prod"'
      # 2) 해석 — ServerTokens OS → CIS Prod 미달(갭)
      echo "→ ServerTokens OS → CIS Prod 미달(갭)"
    answer_detail: "ServerTokens OS = 제품+OS 노출 → CIS Apache 2.4(8.1) 의 Prod 요구 미달 = 갭(W01). 정보 최소화 위반으로 공격자 정찰 단서가 된다. 증적 = current: 뒤의 실제 설정값."
    expected_output: |
      current:ServerTokens OS
      gap=not_Prod
      → ServerTokens OS → CIS Prod 미달(갭)
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "정보 노출 점검"
        success_criteria: ["ServerTokens 갭"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ② 원격 접근 — PermitRootLogin (W02: 정책 강제)
      원격 root 직접 로그인은 침입자가 곧장 최고 권한으로 들어오는 가장 위험한 경로다. 정책("원격 root
      금지")이 실제 설정(`sshd_config` 의 `PermitRootLogin no`)으로 강제되는지 확인한다. 기준은 `no`(차단).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) (②W02) sshd_config의 PermitRootLogin 값을 끌어내 no면 compliant=rootlogin_off, 아니면 gap
      V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "$V"; echo "$V" | grep -qi "no" && echo "compliant=rootlogin_off" || echo "gap"
      # 2) 해석 — PermitRootLogin no = 준수(W02)
      echo "→ PermitRootLogin no = 준수(W02)"
      ```
      ## ✅ 합격 기준
      `compliant=` 출력 시 통과. **근거:** compliant=rootlogin_off 면 원격 root 로그인 차단으로 정책이
      설정으로 강제된 준수 상태 — gap 이면 원격 root 가 열린 즉시 시정 대상.
    hint: 'PermitRootLogin no'
    category: manipulation
    points: 10
    answer: |
      # 1) (②W02) sshd_config의 PermitRootLogin 값을 끌어내 no면 compliant=rootlogin_off, 아니면 gap
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "$V"; echo "$V" | grep -qi "no" && echo "compliant=rootlogin_off" || echo "gap"'
      # 2) 해석 — PermitRootLogin no = 준수(W02)
      echo "→ PermitRootLogin no = 준수(W02)"
    answer_detail: "PermitRootLogin no = 원격 root 직접 로그인 차단 → CIS SSH 기준 충족 = 준수(W02). 정책-시행 일치의 대표 사례. 증적 = sshd_config 의 실제 설정 라인."
    expected_output: |
      PermitRootLogin no
      compliant=rootlogin_off
      → PermitRootLogin no = 준수(W02)
    verify:
      type: output_contains
      expect: 'compliant='
      field: stdout
      semantic:
        intent: "원격 접근 점검"
        success_criteria: ["root 로그인 차단"]
        acceptable_methods: ["**[OSS] sshd_config (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ③ 자산 — vhost inventory (W03: 자산 식별·분류)
      모르는 것은 지킬 수 없다. 감사는 먼저 보호 대상(자산)을 집계해 **범위(scope)를 확정**한다(W03).
      el34-web 의 Apache 는 `Host:` 헤더로 여러 vhost 를 서비스하며, 각 vhost 가 하나의 웹 자산이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) (③W03) 활성 vhost(sites-enabled) 수를 세어 assets= 로 집계(감사 범위 웹 자산)
      echo "assets=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l)"
      # 2) 해석 — vhost 자산 집계(W03), 각 자산에 중요도·통제 매핑
      echo "→ vhost 자산 집계(W03). 각 자산에 중요도·통제 매핑"
      ```
      ## ✅ 합격 기준
      `assets=` 출력 시 통과. **근거:** assets=<수> 가 나오면 인벤토리 집계 성공 — 이 수가 감사 범위의
      활성 웹 자산 개수이자 자산별 중요도·통제 매핑의 출발점이다.
    hint: 'vhost 수'
    category: recon
    points: 10
    answer: |
      # 1) (③W03) 활성 vhost(sites-enabled) 수를 세어 assets= 로 집계(감사 범위 웹 자산)
      docker exec el34-web sh -c 'echo "assets=$(ls /etc/apache2/sites-enabled/ 2>/dev/null | wc -l)"'
      # 2) 해석 — vhost 자산 집계(W03), 각 자산에 중요도·통제 매핑
      echo "→ vhost 자산 집계(W03). 각 자산에 중요도·통제 매핑"
    answer_detail: "자산 식별 = 활성 vhost inventory 집계(W03, ISMS-P 2.1). assets=<수>가 감사 범위의 웹 자산 개수 — 자산별 중요도·소유자·통제 매핑의 출발점. 증적 = assets= 출력."
    expected_output: |
      assets=12
      → vhost 자산 집계(W03). 각 자산에 중요도·통제 매핑
    verify:
      type: output_contains
      expect: 'assets='
      field: stdout
      semantic:
        intent: "자산 집계"
        success_criteria: ["inventory"]
        acceptable_methods: ["**[OSS] inventory (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ③ 암호 정책 — PASS_MAX_DAYS (W04: 접근통제)
      만료 없는 암호는 한 번 유출되면 무기한 악용된다. `PASS_MAX_DAYS`(암호 강제 만료 주기)는
      **PCI-DSS 8.3.9 / CIS 가 ≤90일** 을 권고하며, `99999` 면 사실상 무기한이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) (③W04) PASS_MAX_DAYS 값을 숫자만 추출해 max_days= 출력 후 90 초과면 gap=no_expiry
      V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo "compliant"
      # 2) 해석 — 99999(무기한) → PCI 8.3.9(≤90) 미달(갭, W04)
      echo "→ 99999(무기한) → PCI 8.3.9(≤90) 미달(갭, W04)"
      ```
      ## ✅ 합격 기준
      `gap=` 출력 시 통과. **근거:** gap=no_expiry 면 max_days=99999(사실상 무기한)가 PCI-DSS 8.3.9
      (≤90일) 미달 — 계정 보호 직결로 우선순위 높은 시정 항목. 증적 = max_days= 출력.
    hint: 'PASS_MAX_DAYS'
    category: manipulation
    points: 10
    answer: |
      # 1) (③W04) PASS_MAX_DAYS 값을 숫자만 추출해 max_days= 출력 후 90 초과면 gap=no_expiry
      docker exec el34-web sh -c 'V=$(grep "^PASS_MAX_DAYS" /etc/login.defs | tr -dc "0-9"); echo "max_days=$V"; [ "$V" -gt 90 ] 2>/dev/null && echo "gap=no_expiry" || echo "compliant"'
      # 2) 해석 — 99999(무기한) → PCI 8.3.9(≤90) 미달(갭, W04)
      echo "→ 99999(무기한) → PCI 8.3.9(≤90) 미달(갭, W04)"
    answer_detail: "PASS_MAX_DAYS 99999 = 암호 사실상 무기한 → PCI-DSS 8.3.9/CIS(≤90일) 미달 = 갭(W04). 유출 시 무기한 악용되어 계정 보호 직결, 우선순위 높음(보고서 ①). 증적 = max_days= 출력."
    expected_output: |
      max_days=99999
      gap=no_expiry
      → 99999(무기한) → PCI 8.3.9(≤90) 미달(갭, W04)
    verify:
      type: output_contains
      expect: 'gap='
      field: stdout
      semantic:
        intent: "암호 정책 점검"
        success_criteria: ["만료 갭"]
        acceptable_methods: ["**[OSS] login.defs (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 ③ 파일 권한 — shadow / sudoers (W04: 민감 파일 보호)
      `/etc/shadow`(암호 해시)가 과도하게 열리면 누구나 해시를 읽어 오프라인 크래킹에 쓰는 치명적 갭이다.
      **CIS 기준은 shadow 640(또는 600), sudoers 440**. stat 으로 권한(8진수)을 읽어 판정한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) (③W04) shadow/sudoers 권한을 8진수로 출력 후 shadow가 600/640이면 compliant, 그 외 gap
      stat -c "%n %a" /etc/shadow /etc/sudoers; S=$(stat -c "%a" /etc/shadow); case "$S" in 600|640) echo "compliant=shadow_$S";; *) echo "gap=shadow_$S";; esac
      # 2) 해석 — shadow 640/sudoers 440 = CIS 준수(W04)
      echo "→ shadow 640/sudoers 440 = CIS 준수(W04)"
      ```
      ## ✅ 합격 기준
      `compliant=shadow` 출력 시 통과. **근거:** shadow 600/640 이면 CIS 민감 파일 권한 준수 —
      gap=shadow_644(world-readable)면 해시 유출 위험의 즉시 시정 대상. 증적 = stat 출력(%n %a).
    hint: 'shadow 640'
    category: manipulation
    points: 10
    answer: |
      # 1) (③W04) shadow/sudoers 권한을 8진수로 출력 후 shadow가 600/640이면 compliant, 그 외 gap
      docker exec el34-web sh -c 'stat -c "%n %a" /etc/shadow /etc/sudoers; S=$(stat -c "%a" /etc/shadow); case "$S" in 600|640) echo "compliant=shadow_$S";; *) echo "gap=shadow_$S";; esac'
      # 2) 해석 — shadow 640/sudoers 440 = CIS 준수(W04)
      echo "→ shadow 640/sudoers 440 = CIS 준수(W04)"
    answer_detail: "shadow 640(root:shadow)/sudoers 440 = CIS 민감 파일 권한 기준 충족 = 준수(W04). shadow 가 world-readable(644)면 해시 유출 치명 갭. 증적 = stat 출력(%n %a)."
    expected_output: |
      /etc/shadow 640
      /etc/sudoers 440
      compliant=shadow_640
      → shadow 640/sudoers 440 = CIS 준수(W04)
    verify:
      type: output_contains
      expect: 'compliant=shadow'
      field: stdout
      semantic:
        intent: "파일 권한 점검"
        success_criteria: ["민감 파일 보호"]
        acceptable_methods: ["**[OSS] stat (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ④ 암호화 — TLS (W05: 전송 암호화, PCI-DSS 4)
      전송 구간 암호화는 도청·변조 방어의 기본이며 **PCI-DSS 4 는 TLS1.2 이상**을 의무화한다. 외부
      진입점 점검이라 점검자 컨테이너(`el34-attacker`)에서 fw 게이트웨이(`10.20.30.1:443`)로 핸드셰이크.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-attacker` — `docker exec -it el34-attacker bash` 로 접속해 실행한다.

      ```bash
      # 1) (④W05) el34-attacker에서 fw 443에 핸드셰이크해 협상된 Protocol/Cipher 확인(외부 진입점 점검)
      echo | openssl s_client -connect 10.20.30.1:443 -servername neobank.el34.lab 2>/dev/null | grep -iE 'Protocol|Cipher' | head -2
      # 2) 해석 — TLSv1.3 = PCI 4 준수(단 자체서명 인증서 갭, W05/W10)
      echo "→ TLSv1.3 = PCI 4 준수(단 자체서명 인증서 갭, W05/W10)"
      ```
      ## ✅ 합격 기준
