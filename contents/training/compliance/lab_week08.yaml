  - order: 9
    instruction: |
      ## 🎯 ⑤ 취약점 스캔 — nuclei (W07: 취약점 관리, PCI-DSS 11.3)
      취약점은 매일 새로 생긴다. 한 번이 아니라 **정기 스캔**으로 식별·재검증하는 순환(식별→평가→조치
      →재검증)이 컴플라이언스의 요구이며, **PCI-DSS 11.3 은 분기별·변경 후 스캔**을 의무화한다.
      `nuclei` 는 템플릿(`.yaml`) 기반 취약점 스캐너로, 여기서는 보안 헤더 누락 템플릿을 표적에 던진다.
      **보안 헤더**(`X-Frame-Options`·`Content-Security-Policy` 등)는 누락 시 클릭재킹·XSS 방어가
      약해진다. 명령은 발견을 임시 파일에 모아(`tee`) 줄 수를 세어 `findings=<n>` 으로 보고한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "nuclei -u http://10.20.30.1 -H 'Host: juice.el34.lab' -t /root/nuclei-templates/http/misconfiguration/http-missing-security-headers.yaml -silent -nc 2>/dev/null | tee /tmp/cp8.txt | head -4; echo findings=\$(wc -l < /tmp/cp8.txt); rm -f /tmp/cp8.txt"
      ```
      ## ✅ 합격 기준
      출력에 `findings=<수>` 가 나오면 스캔 수행 성공 — 보안 헤더 누락 등이 식별된 갭이다. 이 한 회차가
      정기 스캔의 한 결과이며 패치 우선순위의 근거가 된다. (발견이 비거나 오류면 템플릿 경로·표적
      도달성을 점검.)
