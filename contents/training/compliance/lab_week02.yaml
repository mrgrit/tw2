      ```
      - **정책 위계** = 통제의 구조(정책>지침>절차>기준)
      - **R&R** = 통제의 책임 주체(경영진~담당자)
      - **생명주기** = 통제의 갱신 순환(제정~개정)
      - **준수 점검** = 통제의 증적(정책↔시행 대조)

