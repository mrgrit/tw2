      ## 🎯 목표
      **준수 점검(compliance check)** 의 원리 — 문서상 정책과 실제 시행을 **대조**해 일치/불일치를
      판정하는 절차 — 를 정리한다.

      ## 💡 개념 한 줄
      컴플라이언스의 본질은 문서와 현실의 **대조**다. 문서만 읽으면 "잘 적혀 있다"에서 끝나, 가장 흔한
      결함(정책은 있으나 시행 안 됨)을 놓친다. 그래서 준수 점검은 반드시 실제 설정·로그를 끌어와
      대조한다. (lecture §6)

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 정책 — '원격 root 직접 로그인 금지'
      echo "정책: '원격 root 직접 로그인 금지'"
      # 2) 시행 증적 — sshd_config PermitRootLogin no(W04 점검값)
      echo "시행 증적: sshd_config PermitRootLogin no(W04 점검값)"
      # 3) 판정 — 일치 → 준수(증적 확보)
      echo "판정: 일치 → 준수(증적 확보)"
      # 4) 결론 — 준수 점검 = 문서상 정책과 실제 설정/로그의 대조(불일치는 결함)
      echo "→ 준수 점검 = 문서상 정책과 실제 설정/로그의 대조. 불일치는 결함"
      ```

      ## ✅ 합격 기준
      `준수` 출력 시 통과. **근거:** 정책↔시행 대조 논리가 정리되면 통과 — 판정에는 반드시 증적(설정값)이
      따라야 한다("준수합니다"만으로는 감사에서 불인정).
