lab_id: standalone-compliance-week02
title: "보안 정책과 거버넌스 — 정책 위계·R&R·정책 강제"
version: standalone-compliance
course: compliance
week: 2
description: |
  보안 정책 위계(정책>지침>절차>기준), 거버넌스 R&R, 정책의 기술적 강제 점검(PermitRootLogin),
  정책 생명주기, 준수 점검. el34-web 실설정 점검 포함. 명령은 el34 호스트에서. 신규 설치 없음.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "W01 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(위계) §3(거버넌스) §4(강제) 숙지"
objectives:
  - "정책 위계/거버넌스 R&R 이해"
  - "정책의 기술적 강제 확인"
  - "정책 생명주기/준수 점검"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 대상
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      대상 접근.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "정책 강제 점검 대상 = el34-web."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 정책 위계
      ## 💻 실행 명령
      ```bash
      echo "정책(원칙) > 지침(권고) > 절차(실행단계) > 기준(측정치)"
      ```
      ## ✅ 합격 기준
      정책 문서 위계를 정리한다.
    hint: '정책>지침>절차>기준'
    category: analysis
    points: 12
    answer: |
      echo "=== 정책 위계 ==="
      echo "정책(Policy): 조직 의지·원칙(경영진 승인)"
      echo "지침(Guideline): 정책을 따르는 권고 방향"
      echo "절차(Procedure): 구체 실행 단계(누가/무엇을/어떻게)"
      echo "기준(Standard): 측정 가능 요구치(버전/길이/주기)"
      echo "→ 위계가 명확해야 정책이 시행으로 연결"
    answer_detail: "위계 = 정책>지침>절차>기준. 상위 원칙이 하위 실행으로 구체화."
    verify:
      type: output_contains
      expect: '절차'
      field: stdout
      semantic:
        intent: "정책 위계"
        success_criteria: ["정책>지침>절차>기준"]
        acceptable_methods: ["**[표준] 위계 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 거버넌스 R&R
      ## 💻 실행 명령
      ```bash
      echo "경영진(책임/자원), 정보보호위원회(심의), CISO(총괄), 담당자(이행)"
      ```
      ## ✅ 합격 기준
      거버넌스 역할·책임을 정리한다.
    hint: '경영진/위원회/CISO'
    category: analysis
    points: 12
    answer: |
      echo "=== 거버넌스 R&R ==="
      echo "경영진/이사회: 최종 책임, 자원 배분"
      echo "정보보호위원회: 정책 심의·의결"
      echo "CISO/정보보호책임자: 총괄 운영"
      echo "부서/담당자: 통제 이행"
      echo "→ ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점"
    answer_detail: "거버넌스 = 경영진/위원회/CISO/담당자 R&R. 경영진 참여가 핵심."
    verify:
      type: output_contains
      expect: 'CISO'
      field: stdout
      semantic:
        intent: "거버넌스 R&R"
        success_criteria: ["역할/책임"]
        acceptable_methods: ["**[표준] 거버넌스 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 정책 강제 점검 — PermitRootLogin
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      ```
      ## ✅ 합격 기준
      "원격 root 금지" 정책이 설정으로 강제되는지 확인한다.
    hint: 'PermitRootLogin no'
    category: manipulation
    points: 16
    answer: |
      echo "=== 정책 강제 점검 (PermitRootLogin) ==="
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      echo "→ PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)"
    answer_detail: "정책 강제 = 정책이 설정으로 시행됨. PermitRootLogin no → 정책-시행 일치(준수)."
    verify:
      type: output_contains
      expect: 'enforced='
      field: stdout
      semantic:
        intent: "정책 강제 확인"
        success_criteria: ["설정 시행 확인"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 정책 생명주기
      ## 💻 실행 명령
      ```bash
      echo "제정(승인)→시행(교육/배포)→모니터링(준수점검)→정기검토→개정"
      ```
      ## ✅ 합격 기준
      정책 생명주기를 정리한다.
    hint: '제정~개정'
    category: analysis
    points: 12
    answer: |
      echo "=== 정책 생명주기 ==="
      echo "1) 제정: 경영진 승인"
      echo "2) 시행: 교육·배포"
      echo "3) 모니터링: 준수 점검(증적)"
      echo "4) 정기 검토: 연 1회 등"
      echo "5) 개정: 환경 변화 반영"
      echo "→ 정기 검토 없는 정책은 결함(stale)"
    answer_detail: "생명주기 = 제정→시행→모니터링→검토→개정. 정기 검토가 stale 방지."
    verify:
      type: output_contains
      expect: '생명주기'
      field: stdout
      semantic:
        intent: "정책 생명주기"
        success_criteria: ["제정~개정"]
        acceptable_methods: ["**[표준] 생명주기 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 준수 점검 — 정책 vs 시행
      ## 💻 실행 명령
      ```bash
      echo "준수 점검 = (문서상 정책) vs (실제 설정/로그). 불일치=결함, 일치=증적"
      ```
      ## ✅ 합격 기준
      정책과 실제 시행의 일치를 점검하는 원리를 정리한다.
    hint: '정책 vs 시행'
    category: report
    points: 12
    answer: |
      echo "=== 준수 점검 ==="
      echo "정책: '원격 root 직접 로그인 금지'"
      echo "시행 증적: sshd_config PermitRootLogin no(W04 점검값)"
      echo "판정: 일치 → 준수(증적 확보)"
      echo "→ 준수 점검 = 문서상 정책과 실제 설정/로그의 대조. 불일치는 결함"
    answer_detail: "준수 점검 = 정책↔시행 대조. 일치=증적, 불일치=결함. 문서만으로 불충분."
    verify:
      type: output_contains
      expect: '준수'
      field: stdout
      semantic:
        intent: "준수 점검 원리"
        success_criteria: ["정책vs시행 대조"]
        acceptable_methods: ["**[관리적] 준수 점검 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 거버넌스 정리
      ## 💻 실행 명령
      ```bash
      echo "거버넌스 = 정책위계 + R&R + 생명주기 + 준수점검. 경영진 참여가 토대"
      ```
      ## ✅ 합격 기준
      거버넌스 요소를 종합한다.
    hint: '거버넌스 종합'
    category: report
    points: 12
    answer: |
      echo "=== 거버넌스 종합 ==="
      echo "1) 정책 위계: 정책>지침>절차>기준"
      echo "2) R&R: 경영진~담당자"
      echo "3) 생명주기: 제정~개정"
      echo "4) 준수 점검: 정책↔시행 증적"
      echo "→ 거버넌스가 모든 기술 통제의 근거이자 일관성의 원천"
    answer_detail: "거버넌스 = 위계+R&R+생명주기+준수점검. 통제의 근거·일관성 제공."
    verify:
      type: output_contains
      expect: '거버넌스'
      field: stdout
      semantic:
        intent: "거버넌스 종합"
        success_criteria: ["요소 종합"]
        acceptable_methods: ["**[설명] 거버넌스 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 정책/거버넌스 보고서
      ## 💻 보고서 양식
      ```markdown
      # 컴플라이언스 W02 정책/거버넌스 보고서 (학번, 이름)
      ## 1. 정책 위계/R&R
      ## 2. 정책 강제(PermitRootLogin no)
      ## 3. 생명주기/준수 점검
      ```
      ## ✅ 합격 기준
      보고서에 정책 위계 + 강제 점검 + 준수가 포함된다.
    hint: '위계+강제+준수'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 컴플라이언스 W02 정책/거버넌스 보고서
      ## 1. 정책 위계(정책>지침>절차>기준), R&R(경영진~담당자)
      ## 2. 정책 강제: '원격 root 금지' → PermitRootLogin no(시행 확인, 준수)
      ## 3. 생명주기(제정~개정) + 준수 점검(정책↔시행 증적 대조)
      ## 결론: 정책은 모든 통제의 뿌리. 정책-시행-증적 연결이 컴플라이언스의 핵심
      EOF
    answer_detail: "정책/거버넌스 보고 = 위계+R&R+강제점검+생명주기+준수. 정책-시행-증적 연결."
    verify:
      type: output_contains
      expect: '준수'
      field: stdout
      semantic:
        intent: "정책/거버넌스 보고"
        success_criteria: ["위계/강제/준수"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
