lab_id: standalone-compliance-week02
title: "보안 정책과 거버넌스 — 정책 위계·R&R·정책 강제"
version: standalone-compliance
course: compliance
week: 2
description: |
  보안 정책과 거버넌스 실습. 모든 기술 통제는 정책이 요구하기 때문에 존재한다 — 그 정책이 어떻게
  위계(정책>지침>절차>기준)로 구체화되고, 누가 책임지며(거버넌스 R&R: 경영진/정보보호위원회/CISO/담당자),
  종이 위 정책이 시스템에 기술적으로 강제되는지를 el34-web 의 실제 SSH 설정(PermitRootLogin)으로 직접
  확인한다. 정책 생명주기(제정~개정)와 준수 점검(문서상 정책 ↔ 실제 시행 대조)까지 다뤄, 정책-시행-증적의
  연결 고리를 종합 보고서로 묶는다. 핵심 미션은 4번(PermitRootLogin 기술적 강제 점검)이다.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec el34-web 으로 실행하며 신규 설치는 없다.
  lecture §2(정책 위계) §3(거버넌스 R&R) §4(기술적 강제) §5(생명주기) §6(준수 점검) 와 1:1 정합.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "W01 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(위계) §3(거버넌스) §4(강제) 숙지"
objectives:
  - "보안 문서 4단 위계(정책=원칙>지침=권고>절차=실행단계>기준=측정치)를 각 층의 역할 차이와 함께 정리한다"
  - "거버넌스 R&R(경영진=최종책임/자원, 정보보호위원회=심의·의결, CISO=총괄, 담당자=이행)을 ISMS-P 1.1 관점에서 설명한다"
  - "el34-web 의 sshd_config 에서 PermitRootLogin 값을 끌어내 '원격 root 금지' 정책이 기술적으로 강제(no)되는지 증적과 함께 판정한다"
  - "정책 생명주기(제정→시행→모니터링→정기 검토→개정)를 정리하고 정기 검토 없는 stale 정책의 위험을 설명한다"
  - "준수 점검(문서상 정책 ↔ 실제 설정/로그 대조, 일치=증적·불일치=갭)의 원리를 적용해 정책/거버넌스 종합 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      이번 주 정책 강제 점검의 대상인 **el34-web** 컨테이너에 접근 가능한지 확인한다.

      ## 💡 개념 한 줄
      감사자는 본격 점검에 앞서 늘 대상의 **도달성**부터 확인한다 — 접근이 안 되면 이후 모든 점검
      결과(음성이든 양성이든)가 무의미하기 때문이다. (lecture §8 미션 1)

      ## 💻 실행 명령
      el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서 실행한다.
      ```bash
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web` — el34 호스트 위에서 돌고 있는 web 컨테이너 안에서 명령을 실행한다.
      - `hostname` — 컨테이너의 호스트명을 출력(접근 성공의 신호), `echo target_ok` — 점검용 마커 출력.

      ## ✅ 합격 기준
      출력에 `target_ok` 가 보이면 대상 접근 성공. 응답이 없거나 오류면 호스트 SSH 접속과 컨테이너
      이름(el34-web)을 먼저 재확인한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "정책 강제 점검 대상 = el34-web. docker exec 로 접근해 target_ok 마커가 출력되면 도달성 확인(준수 점검의 0단계)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      보안 문서의 **4단 위계(정책 > 지침 > 절차 > 기준)** 를 각 층의 역할 차이와 함께 정리한다.

      ## 💡 개념 한 줄
      모든 기술 통제는 정책 위계의 맨 아래(설정)에 해당한다. 위로 갈수록 변하지 않는 **원칙**, 아래로
      갈수록 자주 바뀌는 **구체적 실행**이다. 위계를 알아야 임의의 설정을 보고 "어떤 정책의 어떤 절차의
      결과"인지 거꾸로 추적할 수 있다. (lecture §2)

      ## 💻 실행 명령
      ```bash
      echo "정책(원칙) > 지침(권고) > 절차(실행단계) > 기준(측정치)"
      ```
      - **정책(Policy)**: 무엇을·왜(원칙, 경영진 승인). 예) "원격 root 직접 로그인 금지"
      - **지침(Guideline)**: 정책을 따르는 권고 방향(강제 아닌 should). 예) "SSH 는 키 기반 권장, root 는 sudo 경유"
      - **절차(Procedure)**: 누가·무엇을·**어떻게**(실행 단계). 예) "sshd_config 를 PermitRootLogin no 로 설정 후 재시작"
      - **기준(Standard)**: 측정 가능한 요구치(숫자·버전, 강제 must). 예) "CIS SSH 벤치마크 충족"

      ## ✅ 합격 기준
      정책>지침>절차>기준 4단이 정리되고 출력에 `절차` 가 포함된다. 정책(무엇·왜)과 절차(어떻게)를
      뒤바꾸지 않도록 주의한다.
    hint: '정책>지침>절차>기준'
    category: analysis
    points: 12
    answer: |
      echo "=== 정책 위계 ==="
      echo "정책(Policy): 조직 의지·원칙(경영진 승인)"
      echo "지침(Guideline): 정책을 따르는 권고 방향"
      echo "절차(Procedure): 구체 실행 단계(누가/무엇을/어떻게)"
      echo "기준(Standard): 측정 가능 요구치(버전/길이/주기)"
      echo "→ 위계가 명확해야 정책이 시행으로 연결"
    answer_detail: "위계 = 정책(원칙/무엇·왜)>지침(권고)>절차(어떻게/실행단계)>기준(측정치). 상위 원칙이 하위 실행으로 구체화되며, 위계가 명확해야 정책이 빠짐없이 시행으로 연결된다."
    verify:
      type: output_contains
      expect: '절차'
      field: stdout
      semantic:
        intent: "정책 위계"
        success_criteria: ["정책>지침>절차>기준"]
        acceptable_methods: ["**[표준] 위계 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      정보보안 **거버넌스의 R&R(역할과 책임)** 4계층을 정리한다.

      ## 💡 개념 한 줄
      거버넌스(Governance) = 보안을 누가 정하고·의결하고·운영하고·감독하는가의 체계. 거버넌스 R&R 은
      ISMS-P 인증의 **첫 관문(1.1)** 이다 — R&R 이 정의되어 있지 않으면 통제가 아무리 많아도 관리체계
      자체가 성립하지 않는다. (lecture §3)

      ## 💻 실행 명령
      ```bash
      echo "경영진(책임/자원), 정보보호위원회(심의), CISO(총괄), 담당자(이행)"
      ```
      - **경영진/이사회**: 최종 책임, 정책 최종 승인, 예산·인력 등 **자원 배분**.
      - **정보보호위원회**: 정책 **심의·의결**, 보안 과제 우선순위 결정(한 사람의 독단이 아닌 조직의 합의).
      - **CISO(정보보호최고책임자)**: 보안 **총괄**, 정책 수립 주관, 위원회·경영진에 보고.
      - **부서/담당자**: 통제 **이행**·운영. 이들이 만드는 설정·로그가 곧 감사의 **증적**이 된다.

      ## ✅ 합격 기준
      4계층 R&R 이 정리되고 출력에 `CISO` 가 포함된다. 거버넌스(방향·감독)와 운영 관리(실행)를 혼동하지
      않는다.
    hint: '경영진/위원회/CISO'
    category: analysis
    points: 12
    answer: |
      echo "=== 거버넌스 R&R ==="
      echo "경영진/이사회: 최종 책임, 자원 배분"
      echo "정보보호위원회: 정책 심의·의결"
      echo "CISO/정보보호책임자: 총괄 운영"
      echo "부서/담당자: 통제 이행"
      echo "→ ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점"
    answer_detail: "거버넌스 R&R = 경영진(최종책임/자원)·정보보호위원회(심의·의결)·CISO(총괄)·담당자(이행). ISMS-P 1.1 은 경영진 참여·R&R·자원 배분을 관리체계의 출발점으로 본다."
    verify:
      type: output_contains
      expect: 'CISO'
      field: stdout
      semantic:
        intent: "거버넌스 R&R"
        success_criteria: ["역할/책임"]
        acceptable_methods: ["**[표준] 거버넌스 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 (이번 주 핵심 미션)
      종이 위 정책("원격 root 직접 로그인 금지")이 el34-web 에 **기술적으로 강제**되는지를, 실제 SSH 설정
      `PermitRootLogin` 값을 끌어내 판정한다.

      ## 💡 개념 한 줄
      **기술적 강제(technical enforcement)** = 정책을 시스템 설정으로 실제 시행해 자물쇠처럼 만드는 것.
      감사자가 가장 신뢰하는 증적은 사람의 약속(인터뷰)이 아니라 **설정값**이다. "안 합니다"라는 말보다
      `grep` 으로 끌어낸 설정 한 줄이 반박 불가능한 강한 증적이다. (lecture §4)

      ## 📖 용어 — PermitRootLogin
      `/etc/ssh/sshd_config` 의 `PermitRootLogin` 은 원격에서 root 로 직접 SSH 로그인할지를 정한다.
      `no` 면 차단(정책 준수), `yes` 면 허용(위반). root 직접 로그인을 막는 이유 — ① root 가 뚫리면 즉시
      전체 장악, ② 모두 root 로 들어오면 개인 추적 불가(추적성 상실). 그래서 일반 계정 로그인 후 sudo 가
      표준이다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      ```
      - `grep -iE "^PermitRootLogin" ...` — 줄 맨 앞(`^`)이 PermitRootLogin 인 줄만 잡는다. `^` 는
        주석(`#PermitRootLogin`)이 아니라 **실제 적용되는 설정 줄**만 끌어내기 위함이다.
      - `echo "current:$V"` — 현재 설정값을 증적으로 출력.
      - `... grep -qi "no" && echo "enforced=..." || echo "gap=..."` — 값에 `no` 가 있으면 강제됨(준수),
        아니면 갭으로 판정.

      ## ✅ 합격 기준
      `current:PermitRootLogin no` → `enforced=rootlogin_disabled` 가 출력되면 정책-시행 일치(준수).
      `gap=rootlogin_allowed` 가 나오면 정책은 있으나 시행 안 된 "문서상 보안" 결함이다.
    hint: 'PermitRootLogin no'
    category: manipulation
    points: 16
    answer: |
      echo "=== 정책 강제 점검 (PermitRootLogin) ==="
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      echo "→ PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)"
    answer_detail: "정책의 기술적 강제 = 정책이 시스템 설정으로 실제 시행됨. el34-web 의 sshd_config 가 PermitRootLogin no → '원격 root 금지' 정책이 기술적으로 강제됨(enforced, 정책-시행 일치=준수). 끌어낸 설정값 자체가 강한 증적. yes 였다면 문서상 보안 결함(gap)."
    verify:
      type: output_contains
      expect: 'enforced='
      field: stdout
      semantic:
        intent: "정책 강제 확인"
        success_criteria: ["설정 시행 확인"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      정책 **생명주기 5단계(제정 → 시행 → 모니터링 → 정기 검토 → 개정)** 를 정리한다.

      ## 💡 개념 한 줄
      정책은 한 번 쓰면 영원한 비석이 아니라 환경 변화에 맞춰 갱신되는 **살아 있는 문서**다. 생명주기를
      모르면 "오래된 정책을 지키니 안전하다"는 **stale 정책**의 함정에 빠진다. (lecture §5)

      ## 💻 실행 명령
      ```bash
      echo "제정(승인)→시행(교육/배포)→모니터링(준수점검)→정기검토→개정"
      ```
      - **제정(승인)**: 초안 → 위원회 의결 → 경영진 승인(승인 없으면 정책이 아니라 초안).
      - **시행(교육·배포)**: 구성원 교육 + 시스템 적용(아무도 모르는 정책은 지켜질 수 없다).
      - **모니터링(준수 점검)**: 실제 지켜지는지 점검·증적 수집(미션 4 의 PermitRootLogin 점검이 이 단계).
      - **정기 검토**: 보통 **연 1회** 여전히 유효한지 재확인(기술·법규·조직 변화 반영).
      - **개정**: 필요 시 갱신 → 다시 제정(승인)으로 순환.

      ## ✅ 합격 기준
      제정~개정 5단계가 정리되고 출력에 `생명주기` 가 포함된다. 정기 검토 없는 stale 정책의 위험을
      함께 적으면 좋다.
    hint: '제정~개정'
    category: analysis
    points: 12
    answer: |
      echo "=== 정책 생명주기 ==="
      echo "1) 제정: 경영진 승인"
      echo "2) 시행: 교육·배포"
      echo "3) 모니터링: 준수 점검(증적)"
      echo "4) 정기 검토: 연 1회 등"
      echo "5) 개정: 환경 변화 반영"
      echo "→ 정기 검토 없는 정책은 결함(stale)"
    answer_detail: "정책 생명주기 = 제정(승인)→시행(교육·배포)→모니터링(준수 점검)→정기 검토(연 1회)→개정의 순환. 정기 검토가 없으면 환경 변화에 뒤처진 stale 정책이 되어 그 자체가 컴플라이언스 결함이 된다."
    verify:
      type: output_contains
      expect: '생명주기'
      field: stdout
      semantic:
        intent: "정책 생명주기"
        success_criteria: ["제정~개정"]
        acceptable_methods: ["**[표준] 생명주기 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표
      **준수 점검(compliance check)** 의 원리 — 문서상 정책과 실제 시행을 **대조**해 일치/불일치를
      판정하는 절차 — 를 정리한다.

      ## 💡 개념 한 줄
      컴플라이언스의 본질은 문서와 현실의 **대조**다. 문서만 읽으면 "잘 적혀 있다"에서 끝나, 가장 흔한
      결함(정책은 있으나 시행 안 됨)을 놓친다. 그래서 준수 점검은 반드시 실제 설정·로그를 끌어와
      대조한다. (lecture §6)

      ## 💻 실행 명령
      ```bash
      echo "준수 점검 = (문서상 정책) vs (실제 설정/로그). 불일치=결함, 일치=증적"
      ```
      - **일치 → 준수**: 정책과 시행이 같으면, 그 **설정값 자체가 증적**이 된다.
      - **불일치 → 결함(갭)**: "정책은 있으나 시행 안 됨" = 문서상 보안 → 조치 대상.
      - 예시: 미션 4 의 `PermitRootLogin no`(실제 시행)를 "원격 root 금지"(문서상 정책)와 대조 → 일치 →
        준수(증적 확보).

      ## ✅ 합격 기준
      정책↔시행 대조 논리가 정리되고 출력에 `준수` 가 포함된다. 핵심 — 판정에는 반드시 증적(설정값)이
      따라야 한다("준수합니다"만으로는 감사에서 인정 안 됨).
