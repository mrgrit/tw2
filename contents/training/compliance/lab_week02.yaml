      네 요소는 따로 노는 개념이 아니라 톱니처럼 맞물린다 — **R&R(누가)** 이 정해진 사람들이,
      **위계(구조)** 로 정책을 구체화하고, **생명주기(순환)** 로 갱신하며, **준수 점검(증적)** 으로 시행을
      확인한다. 네 톱니가 모두 돌 때 비로소 "거버넌스가 작동한다". (lecture §7)

      ## 💻 실행 명령
      ```bash
