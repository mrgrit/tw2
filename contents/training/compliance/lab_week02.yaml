lab_id: standalone-compliance-week02
title: "보안 정책과 거버넌스 — 정책 위계·R&R·정책 강제"
version: standalone-compliance
course: compliance
week: 2
description: |
  보안 정책과 거버넌스 실습. 모든 기술 통제는 정책이 요구하기 때문에 존재한다 — 그 정책이 어떻게
  위계(정책>지침>절차>기준)로 구체화되고, 누가 책임지며(거버넌스 R&R: 경영진/정보보호위원회/CISO/담당자),
  종이 위 정책이 시스템에 기술적으로 강제되는지를 el34-web 의 실제 SSH 설정(PermitRootLogin)으로 직접
  확인한다. 정책 생명주기(제정~개정)와 준수 점검(문서상 정책 ↔ 실제 시행 대조)까지 다뤄, 정책-시행-증적의
  연결 고리를 종합 보고서로 묶는다. 핵심 미션은 4번(PermitRootLogin 기술적 강제 점검)이다.
  모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 docker exec el34-web 으로 실행하며 신규 설치는 없다.
  lecture §2(정책 위계) §3(거버넌스 R&R) §4(기술적 강제) §5(생명주기) §6(준수 점검) 와 1:1 정합.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "W01 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(위계) §3(거버넌스) §4(강제) 숙지"
objectives:
  - "보안 문서 4단 위계(정책=원칙>지침=권고>절차=실행단계>기준=측정치)를 각 층의 역할 차이와 함께 정리한다"
  - "거버넌스 R&R(경영진=최종책임/자원, 정보보호위원회=심의·의결, CISO=총괄, 담당자=이행)을 ISMS-P 1.1 관점에서 설명한다"
  - "el34-web 의 sshd_config 에서 PermitRootLogin 값을 끌어내 '원격 root 금지' 정책이 기술적으로 강제(no)되는지 증적과 함께 판정한다"
  - "정책 생명주기(제정→시행→모니터링→정기 검토→개정)를 정리하고 정기 검토 없는 stale 정책의 위험을 설명한다"
  - "준수 점검(문서상 정책 ↔ 실제 설정/로그 대조, 일치=증적·불일치=갭)의 원리를 적용해 정책/거버넌스 종합 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      이번 주 정책 강제 점검의 대상인 **el34-web** 컨테이너에 접근 가능한지 확인한다.

      ## 💡 개념 한 줄
      감사자는 본격 점검에 앞서 늘 대상의 **도달성**부터 확인한다 — 접근이 안 되면 이후 모든 점검
      결과(음성이든 양성이든)가 무의미하기 때문이다. (lecture §8 미션 1)

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서 실행한다.
      ```bash
      # 1) 정책 강제 점검 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
      ```
      - `docker exec el34-web` — el34 호스트 위에서 돌고 있는 web 컨테이너 안에서 명령을 실행한다.
      - `hostname` — 컨테이너의 호스트명을 출력(접근 성공의 신호), `echo target_ok` — 점검용 마커 출력.

      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** target_ok 가 보이면 대상 접근 성공 — 응답이 없으면 호스트 SSH
      접속과 컨테이너 이름(el34-web)을 먼저 재확인한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 정책 강제 점검 대상 el34-web 접근 확인 — 호스트명 출력 후 target_ok
      docker exec el34-web sh -c "hostname; echo target_ok"
    answer_detail: "정책 강제 점검 대상 = el34-web. docker exec 로 접근해 target_ok 마커가 출력되면 도달성 확인(준수 점검의 0단계)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["접근"]
        acceptable_methods: ["**[OSS] docker exec (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      보안 문서의 **4단 위계(정책 > 지침 > 절차 > 기준)** 를 각 층의 역할 차이와 함께 정리한다.

      ## 💡 개념 한 줄
      모든 기술 통제는 정책 위계의 맨 아래(설정)에 해당한다. 위로 갈수록 변하지 않는 **원칙**, 아래로
      갈수록 자주 바뀌는 **구체적 실행**이다. 위계를 알아야 임의의 설정을 보고 "어떤 정책의 어떤 절차의
      결과"인지 거꾸로 추적할 수 있다. (lecture §2)

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 정책(Policy) — 조직 의지·원칙(경영진 승인). 예) 원격 root 직접 로그인 금지
      echo "정책(Policy): 조직 의지·원칙(경영진 승인)"
      # 2) 지침(Guideline) — 정책을 따르는 권고 방향(강제 아닌 should)
      echo "지침(Guideline): 정책을 따르는 권고 방향"
      # 3) 절차(Procedure) — 구체 실행 단계(누가/무엇을/어떻게)
      echo "절차(Procedure): 구체 실행 단계(누가/무엇을/어떻게)"
      # 4) 기준(Standard) — 측정 가능 요구치(버전/길이/주기, 강제 must)
      echo "기준(Standard): 측정 가능 요구치(버전/길이/주기)"
      # 5) 결론 — 위계가 명확해야 정책이 시행으로 연결
      echo "→ 위계가 명확해야 정책이 시행으로 연결"
      ```

      ## ✅ 합격 기준
      `절차` 출력 시 통과. **근거:** 정책>지침>절차>기준 4단이 정리되면 통과 — 정책(무엇·왜)과 절차
      (어떻게)를 뒤바꾸지 않도록 주의한다.
    hint: '정책>지침>절차>기준'
    category: analysis
    points: 12
    answer: |
