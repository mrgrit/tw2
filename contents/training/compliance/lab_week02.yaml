      echo "정책(Policy): 조직 의지·원칙(경영진 승인)"
      # 2) 지침(Guideline) — 정책을 따르는 권고 방향(강제 아닌 should)
      echo "지침(Guideline): 정책을 따르는 권고 방향"
      # 3) 절차(Procedure) — 구체 실행 단계(누가/무엇을/어떻게)
      echo "절차(Procedure): 구체 실행 단계(누가/무엇을/어떻게)"
      # 4) 기준(Standard) — 측정 가능 요구치(버전/길이/주기, 강제 must)
      echo "기준(Standard): 측정 가능 요구치(버전/길이/주기)"
      # 5) 결론 — 위계가 명확해야 정책이 시행으로 연결
      echo "→ 위계가 명확해야 정책이 시행으로 연결"
    answer_detail: "위계 = 정책(원칙/무엇·왜)>지침(권고)>절차(어떻게/실행단계)>기준(측정치). 상위 원칙이 하위 실행으로 구체화되며, 위계가 명확해야 정책이 빠짐없이 시행으로 연결된다."
    verify:
      type: output_contains
      expect: '절차'
      field: stdout
      semantic:
        intent: "정책 위계"
        success_criteria: ["정책>지침>절차>기준"]
        acceptable_methods: ["**[표준] 위계 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      정보보안 **거버넌스의 R&R(역할과 책임)** 4계층을 정리한다.

      ## 💡 개념 한 줄
      거버넌스(Governance) = 보안을 누가 정하고·의결하고·운영하고·감독하는가의 체계. 거버넌스 R&R 은
      ISMS-P 인증의 **첫 관문(1.1)** 이다 — R&R 이 정의되어 있지 않으면 통제가 아무리 많아도 관리체계
      자체가 성립하지 않는다. (lecture §3)

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 경영진/이사회 — 최종 책임, 정책 최종 승인, 자원 배분
      echo "경영진/이사회: 최종 책임, 자원 배분"
      # 2) 정보보호위원회 — 정책 심의·의결(조직의 합의)
      echo "정보보호위원회: 정책 심의·의결"
      # 3) CISO/정보보호책임자 — 보안 총괄, 정책 수립 주관
      echo "CISO/정보보호책임자: 총괄 운영"
      # 4) 부서/담당자 — 통제 이행·운영(설정·로그=증적)
      echo "부서/담당자: 통제 이행"
      # 5) 결론 — ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점
      echo "→ ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점"
      ```

      ## ✅ 합격 기준
      `CISO` 출력 시 통과. **근거:** 4계층 R&R 이 정리되면 통과 — 거버넌스(방향·감독)와 운영 관리(실행)를
      혼동하지 않는다.
    hint: '경영진/위원회/CISO'
    category: analysis
    points: 12
    answer: |
      # 1) 경영진/이사회 — 최종 책임, 정책 최종 승인, 자원 배분
      echo "경영진/이사회: 최종 책임, 자원 배분"
      # 2) 정보보호위원회 — 정책 심의·의결(조직의 합의)
      echo "정보보호위원회: 정책 심의·의결"
      # 3) CISO/정보보호책임자 — 보안 총괄, 정책 수립 주관
      echo "CISO/정보보호책임자: 총괄 운영"
      # 4) 부서/담당자 — 통제 이행·운영(설정·로그=증적)
      echo "부서/담당자: 통제 이행"
      # 5) 결론 — ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점
      echo "→ ISMS-P 1.1: 경영진 참여·R&R이 관리체계 출발점"
    answer_detail: "거버넌스 R&R = 경영진(최종책임/자원)·정보보호위원회(심의·의결)·CISO(총괄)·담당자(이행). ISMS-P 1.1 은 경영진 참여·R&R·자원 배분을 관리체계의 출발점으로 본다."
    verify:
      type: output_contains
      expect: 'CISO'
      field: stdout
      semantic:
        intent: "거버넌스 R&R"
        success_criteria: ["역할/책임"]
        acceptable_methods: ["**[표준] 거버넌스 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 (이번 주 핵심 미션)
      종이 위 정책("원격 root 직접 로그인 금지")이 el34-web 에 **기술적으로 강제**되는지를, 실제 SSH 설정
      `PermitRootLogin` 값을 끌어내 판정한다.

      ## 💡 개념 한 줄
      **기술적 강제(technical enforcement)** = 정책을 시스템 설정으로 실제 시행해 자물쇠처럼 만드는 것.
      감사자가 가장 신뢰하는 증적은 사람의 약속(인터뷰)이 아니라 **설정값**이다. "안 합니다"라는 말보다
      `grep` 으로 끌어낸 설정 한 줄이 반박 불가능한 강한 증적이다. (lecture §4)

      ## 📖 용어 — PermitRootLogin
      `/etc/ssh/sshd_config` 의 `PermitRootLogin` 은 원격에서 root 로 직접 SSH 로그인할지를 정한다.
      `no` 면 차단(정책 준수), `yes` 면 허용(위반). root 직접 로그인을 막는 이유 — ① root 가 뚫리면 즉시
      전체 장악, ② 모두 root 로 들어오면 개인 추적 불가(추적성 상실). 그래서 일반 계정 로그인 후 sudo 가
      표준이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) sshd_config에서 실제 적용되는 PermitRootLogin 줄(^로 주석 제외)을 끌어내 현재값 출력 후 no면 enforced, 아니면 gap
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      # 2) 해석 — PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)
      echo "→ PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)"
      ```
      - `grep -iE "^PermitRootLogin" ...` — 줄 맨 앞(`^`)이 PermitRootLogin 인 줄만 잡는다(주석 `#...`이 아닌 실제 적용 줄).
      - `... grep -qi "no" && echo "enforced=..." || echo "gap=..."` — 값에 `no` 가 있으면 강제됨(준수), 아니면 갭.

      ## ✅ 합격 기준
      `enforced=` 출력 시 통과. **근거:** `current:PermitRootLogin no` → enforced=rootlogin_disabled 면
      정책-시행 일치(준수) — gap=rootlogin_allowed 면 정책은 있으나 시행 안 된 "문서상 보안" 결함이다.
    hint: 'PermitRootLogin no'
    category: manipulation
    points: 16
    answer: |
      # 1) sshd_config에서 실제 적용되는 PermitRootLogin 줄(^로 주석 제외)을 끌어내 현재값 출력 후 no면 enforced, 아니면 gap
      docker exec el34-web sh -c 'V=$(grep -iE "^PermitRootLogin" /etc/ssh/sshd_config 2>/dev/null); echo "current:$V"; echo "$V" | grep -qi "no" && echo "enforced=rootlogin_disabled" || echo "gap=rootlogin_allowed"'
      # 2) 해석 — PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)
      echo "→ PermitRootLogin no = '원격 root 직접 로그인 금지' 정책이 기술적으로 강제됨(준수)"
    answer_detail: "정책의 기술적 강제 = 정책이 시스템 설정으로 실제 시행됨. el34-web 의 sshd_config 가 PermitRootLogin no → '원격 root 금지' 정책이 기술적으로 강제됨(enforced, 정책-시행 일치=준수). 끌어낸 설정값 자체가 강한 증적. yes 였다면 문서상 보안 결함(gap)."
    verify:
      type: output_contains
      expect: 'enforced='
      field: stdout
      semantic:
        intent: "정책 강제 확인"
        success_criteria: ["설정 시행 확인"]
        acceptable_methods: ["**[OSS] 설정 점검 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      정책 **생명주기 5단계(제정 → 시행 → 모니터링 → 정기 검토 → 개정)** 를 정리한다.

      ## 💡 개념 한 줄
      정책은 한 번 쓰면 영원한 비석이 아니라 환경 변화에 맞춰 갱신되는 **살아 있는 문서**다. 생명주기를
      모르면 "오래된 정책을 지키니 안전하다"는 **stale 정책**의 함정에 빠진다. (lecture §5)

