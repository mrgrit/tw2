  # ============================================================
  # STEP 8 — 종합 상관: 한 공격이 남긴 다중 흔적
  # ============================================================
  - order: 8
    instruction: |
      ## 🎯 MISSION

      W01의 종합. **한 번의 SQLi 공격**이 (1) WAF에서 `942` 탐지 + `403` 차단, (2) SIEM에 web
      에이전트 경보로 수집되는 — **여러 도구에 동시에 남는 흔적**을 하나로 묶어(correlate) 본다.
      이것이 분석가가 "사건 하나"를 재구성하는 방식이다.

      ## 🖥️ Dashboard에서

      한 공격자 IP로 필터:
      ```kql
      data.client_ip:"10.20.30.202" OR data.srcip:"10.20.30.202"
      ```
      → 같은 출발지의 fw·ips·web 경보가 시간순으로 한 줄에 모인다.

      ## 💻 실행 명령 (CLI 검증)

      ```bash
      # 1) 단일 SQLi 공격
      CODE=$(docker exec el34-attacker curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=99%27%20OR%20%271%27%3D%271')
      sleep 4
      # 2) 흔적 2종 상관: WAF 942 탐지 + 차단코드
      WAF=$(docker exec el34-web tail -n 1500 /var/log/apache2/modsec_audit.log | grep -cE '942[0-9]{3}')
      # 3) 둘 다 성립하면 상관 완료
      if [ "$WAF" -gt 0 ] && [ "$CODE" = "403" ]; then echo "CORRELATED waf942=$WAF block=$CODE"; fi
      ```

      ## 📋 확인 사항

      - `CORRELATED waf942=... block=403` — 하나의 공격이 "탐지(942)"와 "차단(403)" 두 신호로
        교차 확인됨.
      - 실전 보고서에는 여기에 시각·공격자 IP(10.20.30.202)·대상 vhost(dvwa)를 덧붙인다.
    hint: 'CODE=$(docker exec el34-attacker curl ... -w %{http_code} ...); WAF=$(... grep -cE 942...); [ "$WAF" -gt 0 ] && [ "$CODE" = 403 ] && echo CORRELATED'
    answer: |
      CODE=$(docker exec el34-attacker curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=99%27%20OR%20%271%27%3D%271')
      sleep 4
      WAF=$(docker exec el34-web tail -n 1500 /var/log/apache2/modsec_audit.log | grep -cE '942[0-9]{3}')
      if [ "$WAF" -gt 0 ] && [ "$CODE" = "403" ]; then echo "CORRELATED waf942=$WAF block=$CODE"; fi
    answer_detail: |
      하나의 SQLi가 두 가지 독립 증거를 남긴다 — ModSec 감사 로그의 942 룰 매치(탐지)와
      403 응답(차단). 둘을 함께 확인하는 것이 상관(correlation)의 가장 작은 단위다.
      Dashboard에서는 공격자 IP로 필터해 fw/ips/web 경보를 한 타임라인에 모아 같은 일을 한다.
    verify:
      type: output_contains
      expect: CORRELATED
      field: stdout
      semantic:
        intent: |
          한 번의 SQLi 공격이 WAF 942 탐지와 403 차단 두 신호로 교차 확인되는 상관 분석의
          최소 단위를 수행.
        success_criteria:
          - "단일 SQLi 공격에 대해 modsec 942 매치 + 403 차단이 동시 성립(CORRELATED)"
