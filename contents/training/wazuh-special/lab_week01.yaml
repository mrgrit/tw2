lab_id: wazuh-special-week01
title: 특강 W01 — Wazuh Dashboard & KQL로 el34 4대 보안시스템 경보 읽기
version: standalone-non-ai
course: wazuh-special
week: 1
description: |
  강의(lecture_week01)에서 배운 Wazuh Dashboard / KQL / el34 4대 보안시스템(fw·ips·web·
  엔드포인트)을 el34에 직접 적용한다. 각 단계는 Dashboard의 KQL을 instruction으로 보여 주되,
  동일 데이터를 CLI(`docker exec`)로 확인·검증한다 — "Dashboard로 본 것과 CLI로 본 것이
  같은 데이터"임을 체감하는 것이 목표. 공격은 el34-attacker에서 일으키고, 경보는
  el34-siem(alerts.json)·el34-web(modsec_audit.log)·el34-ips(eve.json)에서 확인한다.
difficulty: medium
duration_minutes: 120
audience: SIEM/관제 입문자 (Wazuh 특강 1주차)
prerequisites:
  - el34 호스트 SSH 접속 가능 (`ssh ccc@192.168.0.80`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - Wazuh Dashboard 접속 (el34 호스트 Firefox → `https://192.168.136.145:5601/`, `admin`/`SecretPassword`) — 선택(시각 확인용)
  - lecture_week01.md 정독 (KQL 12 문법 + el34 4대 보안시스템)
objectives:
  - Wazuh manager에 fw·ips·web 3 에이전트가 붙어 경보를 보내는지 확인
  - alerts.json 한 건의 구조(rule.id·agent.name·data.*·timestamp) 읽기
  - KQL `agent.name:fw/ips/web` ↔ CLI grep 의 1:1 대응 체득
  - el34-attacker로 sqlmap·XSS·SQLi 트래픽을 일으켜 ips(Suricata)·web(ModSec) 경보 생성·식별
  - 한 번의 공격이 web(942 차단)·다도구에 남긴 흔적을 상관(correlate)
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Wazuh 가동 + 4대 에이전트 확인
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION

      모든 경보는 결국 **Wazuh manager** 한 곳으로 모인다(강의 §1의 "CCTV→관제요원→녹화서버→모니터" 그림).
      그 전제는 각 컨테이너의 **에이전트**가 manager에 정상으로 붙어 있는 것. el34의 4대 보안시스템 중
      `fw`·`ips`·`web` 3 에이전트가 **Active** 인지 먼저 확인한다.

      ## 🖥️ Dashboard에서(시각 확인)

      ☰ → **Server management → Agents** 화면에서 `fw`/`ips`/`web` 가 초록(Active)인지 본다.

      ## 💻 실행 명령 (CLI 검증)

      el34 호스트(`ssh ccc@192.168.0.80`, 비밀번호 `1`)에서:

      ```bash
      docker exec el34-siem /var/ossec/bin/agent_control -l
      ```

      ## 📋 확인 사항

      - `ID: 000, Name: wazuh.manager` (서버 자신)
      - `ID: 009, Name: fw ... Active` / `010, web ... Active` / `011, ips ... Active`
      - 셋 중 하나라도 `Disconnected` 면 그 컨테이너의 경보가 SIEM에 안 들어온다.
    hint: docker exec el34-siem /var/ossec/bin/agent_control -l
    answer: |
      docker exec el34-siem /var/ossec/bin/agent_control -l
    answer_detail: |
      agent_control -l 은 manager에 등록된 에이전트 목록과 연결 상태를 보여 준다.
      el34에는 fw(009)·web(010)·ips(011) 3개가 Active 로 붙어 있고, 이들이 각각
      nftables·ModSecurity·Suricata 로그를 manager로 보낸다. expect 로 "Name: web" 를
      확인 — web 에이전트가 있어야 이후 ModSec(WAF) 경보 단계가 의미를 가진다.
    verify:
      type: output_contains
      expect: "Name: web"
      field: stdout
      semantic:
        intent: |
          Wazuh manager에 fw/ips/web 에이전트가 Active 로 연결되어 4대 보안시스템 경보가
          SIEM 한 곳으로 수집되는 전제가 성립함을 확인.
        success_criteria:
          - "agent_control -l 출력에 web(및 fw/ips) 에이전트가 Active 로 표시"

  # ============================================================
  # STEP 2 — alerts.json 한 건 구조 읽기 (Discover의 CLI 등가물)
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION

      Dashboard **Discover** 가 한 줄씩 펼쳐 보여 주는 경보는, 디스크에서는 `el34-siem`의
      `alerts.json`(한 줄에 JSON 한 건) 이다. 경보 한 건이 **rule**(무엇이 걸렸나)·**agent**(어느
      시스템이)·**data**(상세)·**timestamp**(언제) 로 이뤄짐을 직접 확인한다.

      ## 🖥️ Dashboard에서

      Discover → 인덱스 `wazuh-alerts-*` → 아무 행이나 펼치면 동일한 JSON이 보인다.
      KQL `rule.id:*` 은 "rule.id 필드가 있는 모든 경보"(= 전부)를 뜻한다.

      ## 💻 실행 명령 (CLI 검증)

      ```bash
      # 가장 최근 경보 1건을 꺼내 핵심 필드 존재를 확인
      LINE=$(docker exec el34-siem tail -n 1 /var/ossec/logs/alerts/alerts.json)
      echo "$LINE" | grep -q '"rule"' && echo "$LINE" | grep -q '"agent"' \
        && echo "$LINE" | grep -q '"timestamp"' && echo "STRUCT_OK"
      ```

      ## 📋 확인 사항

      - 한 건 안에 `"rule":{...,"id":"..."}`, `"agent":{"id":"...","name":"..."}`,
        `"timestamp":"..."` 가 모두 있다.
      - 이 세 필드가 Discover에서 보는 `rule.id`·`agent.name`·`@timestamp` 의 원본이다.
    hint: docker exec el34-siem tail -n 1 /var/ossec/logs/alerts/alerts.json
    answer: |
      LINE=$(docker exec el34-siem tail -n 1 /var/ossec/logs/alerts/alerts.json)
      echo "$LINE" | grep -q '"rule"' && echo "$LINE" | grep -q '"agent"' \
        && echo "$LINE" | grep -q '"timestamp"' && echo "STRUCT_OK"
    answer_detail: |
      alerts.json 은 경보 한 건당 JSON 한 줄. tail -1 로 최신 한 건을 꺼내 rule/agent/timestamp
      세 필드가 모두 있는지 검사한다. 세 필드는 각각 Discover의 rule.id·agent.name·@timestamp 로
      보이는 값의 원본 — KQL은 결국 이 JSON 필드를 질의하는 문법임을 보여 준다.
    verify:
      type: output_contains
      expect: STRUCT_OK
      field: stdout
      semantic:
        intent: |
          경보 1건이 rule·agent·timestamp 구조를 가진 JSON이며, 이것이 Discover/KQL이
          다루는 데이터의 실체임을 확인.
        success_criteria:
          - "최신 alerts.json 한 건에 rule/agent/timestamp 필드가 모두 존재"

  # ============================================================
  # STEP 3 — 방화벽(fw) 경보: KQL agent.name:fw ↔ CLI grep
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION

      KQL `agent.name:fw` 한 줄이면 방화벽 경보만 골라낸다. 이 KQL이 CLI에서는 alerts.json을
      `"name":"fw"` 로 grep 하는 것과 **같은 일**임을 확인한다. 먼저 attacker로 트래픽을 일으켜
      방화벽이 볼 거리를 만든다.

      ## 🖥️ Dashboard에서

      ```kql
      agent.name:fw AND @timestamp:>now-1h
      ```
      → 행을 펼쳐 `data.srcip`(출발지)·`data.dstport`(목적지 포트)를 읽는다. el34는 출발지 IP를
      보존하므로 `data.srcip` 가 곧 공격자(10.20.30.202)다.

      ## 💻 실행 명령 (CLI 검증)

      ```bash
      # 1) attacker → 웹앱으로 트래픽 발생 (방화벽이 관측)
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: juice.el34.lab' http://10.20.30.1/
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: dvwa.el34.lab' http://10.20.30.1/
      sleep 4
      # 2) fw 에이전트 경보 건수 = KQL agent.name:fw 의 결과 수
      N=$(docker exec el34-siem tail -n 4000 /var/ossec/logs/alerts/alerts.json | grep -c '"name":"fw"')
      [ "$N" -gt 0 ] && echo "FW_ALERTS_OK n=$N"
      ```

      ## 📋 확인 사항

      - `FW_ALERTS_OK n=...` 출력 (fw 경보 1건 이상).
      - Dashboard에서 같은 KQL을 넣으면 같은 건수대가 나온다.
    hint: docker exec el34-siem tail -n 4000 /var/ossec/logs/alerts/alerts.json | grep -c '"name":"fw"'
    answer: |
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: juice.el34.lab' http://10.20.30.1/
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: dvwa.el34.lab' http://10.20.30.1/
      sleep 4
      N=$(docker exec el34-siem tail -n 4000 /var/ossec/logs/alerts/alerts.json | grep -c '"name":"fw"')
      [ "$N" -gt 0 ] && echo "FW_ALERTS_OK n=$N"
    answer_detail: |
      KQL `agent.name:fw` 는 alerts.json에서 `"agent":{...,"name":"fw"}` 인 줄을 세는 것과 동치.
      attacker가 보낸 트래픽을 방화벽 컨테이너의 에이전트가 관측해 manager로 올린 경보다.
      grep -c 가 1 이상이면 KQL 필터가 CLI grep과 동일하게 동작함을 입증.
    verify:
      type: output_contains
      expect: FW_ALERTS_OK
      field: stdout
      semantic:
        intent: |
          KQL agent.name:fw 가 alerts.json의 "name":"fw" grep과 동일하며, attacker 트래픽이
          방화벽 에이전트 경보로 SIEM에 수집됨을 확인.
        success_criteria:
          - "fw 에이전트 경보가 1건 이상 grep 됨(FW_ALERTS_OK)"

  # ============================================================
  # STEP 4 — IDS(ips/Suricata): sqlmap 스캐너 탐지
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION

      **Suricata**(에이전트 `ips`)는 패킷 내용에서 알려진 공격 시그니처를 잡는다. el34에는
      sqlmap 스캐너의 User-Agent를 탐지하는 사용자 정의 룰 `1000003` 이 있다. attacker로
      sqlmap UA 요청을 보내 Suricata가 경보를 만드는지 확인한다.

      ## 🖥️ Dashboard에서

      ```kql
      agent.name:ips AND data.alert.signature_id:*
      ```
      → `data.alert.signature`(룰 설명)·`data.alert.signature_id`(예: 1000003)·
      `data.alert.severity`(1심각~3정보)를 읽는다.

      ## 💻 실행 명령 (CLI 검증)

      Suricata의 원본은 `el34-ips`의 `eve.json`. alert 이벤트에는 `signature_id` 가 들어 있다.

      ```bash
      # 1) sqlmap User-Agent 로 스캔 흉내
      docker exec el34-attacker curl -s -o /dev/null -A 'sqlmap/1.7' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1'
      sleep 4
      # 2) Suricata alert(시그니처 매치) 발생 확인
      N=$(docker exec el34-ips tail -n 600 /var/log/suricata/eve.json | grep -c '"signature_id"')
      [ "$N" -gt 0 ] && echo "IPS_SIG_OK n=$N"
      ```

      ## 📋 확인 사항

      - `IPS_SIG_OK n=...` (Suricata 시그니처 경보 1건 이상).
      - eve.json에서 `"signature_id":1000003` 을 찾으면 sqlmap UA 룰이 탄 것.
    hint: docker exec el34-ips tail -n 600 /var/log/suricata/eve.json | grep -c '"signature_id"'
    answer: |
      docker exec el34-attacker curl -s -o /dev/null -A 'sqlmap/1.7' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1'
      sleep 4
      N=$(docker exec el34-ips tail -n 600 /var/log/suricata/eve.json | grep -c '"signature_id"')
      [ "$N" -gt 0 ] && echo "IPS_SIG_OK n=$N"
    answer_detail: |
      Suricata는 인라인으로 트래픽을 검사하며, sqlmap UA 같은 시그니처에 맞으면 eve.json에
      event_type:alert(+signature_id) 를 남긴다. KQL agent.name:ips & data.alert.signature_id:*
      가 Dashboard에서 보는 것과 같은 데이터. 사용자 정의 룰 1000003 이 sqlmap UA 탐지용.
    verify:
      type: output_contains
      expect: IPS_SIG_OK
      field: stdout
      semantic:
        intent: |
          Suricata(ips)가 sqlmap 스캐너 트래픽에 시그니처 경보(signature_id)를 생성함을 확인.
        success_criteria:
          - "eve.json에 signature_id 를 가진 alert 이벤트 1건 이상"

  # ============================================================
  # STEP 5 — WAF(web/ModSec): XSS 941 탐지
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION

      **ModSecurity + OWASP CRS**(에이전트 `web`)는 HTTP 요청의 웹 공격을 잡는다. CRS 룰 번호
      앞자리가 곧 공격 종류 — `941` = XSS. XSS payload를 보내 941 룰이 탄 흔적을 확인한다.

      ## 🖥️ Dashboard에서

      ```kql
      agent.name:web AND data.id:[941000 TO 941999]
      ```
      → `data.id`(룰 번호)·`data.uri`(공격 URL)·`data.client_ip`(공격자).

      ## 💻 실행 명령 (CLI 검증)

      ModSec의 원본 감사 로그는 `el34-web`의 `modsec_audit.log`(JSON). 차단된 트랜잭션 JSON에
      매치 룰 번호(941xxx)가 들어 있다.

      ```bash
      # 1) XSS payload 전송 (dvwa = ModSec 차단 모드 → 403)
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'
      sleep 3
      # 2) 941(XSS) 룰 매치 확인
      N=$(docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '941[0-9]{3}')
      [ "$N" -gt 0 ] && echo "XSS_941_OK n=$N"
      ```

      ## 📋 확인 사항

      - `XSS_941_OK n=...` (941xxx XSS 룰 매치 1건 이상).
      - Dashboard의 `data.id:[941000 TO 941999]` 와 같은 결과를 가리킨다.
    hint: docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '941[0-9]{3}'
    answer: |
      docker exec el34-attacker curl -s -o /dev/null -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'
      sleep 3
      N=$(docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '941[0-9]{3}')
      [ "$N" -gt 0 ] && echo "XSS_941_OK n=$N"
    answer_detail: |
      ModSec는 요청을 OWASP CRS 룰셋에 통과시키고, 매치되면 modsec_audit.log(JSON)에 룰 번호를
      남긴다. 941 대역 = XSS. dvwa vhost는 차단(blocking) 모드라 XSS 요청이 403으로 막히며
      동시에 941xxx 가 기록된다. KQL data.id:[941000 TO 941999] 와 동일한 신호.
    verify:
      type: output_contains
      expect: XSS_941_OK
      field: stdout
      semantic:
        intent: |
          ModSec(web)가 XSS payload에 941 대역 CRS 룰을 발동해 감사 로그에 기록함을 확인.
        success_criteria:
          - "modsec_audit.log 최근 구간에 941xxx 룰 매치 1건 이상"

  # ============================================================
  # STEP 6 — WAF(web/ModSec): SQLi 942 탐지 + 차단(403)
  # ============================================================
  - order: 6
    instruction: |
      ## 🎯 MISSION

      `942` = SQLi. SQL 인젝션 payload를 보내 (1) ModSec이 **403으로 차단**하고 (2) 942 룰이
      기록되는 것을 한 번에 확인한다. "탐지(로그)"와 "차단(응답코드)"은 별개 신호임을 체득한다.

      ## 🖥️ Dashboard에서

      ```kql
      agent.name:web AND data.id:[942000 TO 942999]
      ```

      ## 💻 실행 명령 (CLI 검증)

      ```bash
      # 1) SQLi 전송 + 응답코드 캡처 (차단되면 403)
      CODE=$(docker exec el34-attacker curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password--')
      sleep 3
      # 2) 942(SQLi) 룰 매치 확인
      N=$(docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '942[0-9]{3}')
      [ "$N" -gt 0 ] && echo "SQLI_942_OK code=$CODE n=$N"
      ```

      ## 📋 확인 사항

      - `SQLI_942_OK code=403 n=...` — 차단(403) + 탐지(942) 동시 성립.
      - 강의 §3 CRS 번호표: 942=SQLi, 949=종합 점수 기반 차단 결정.
    hint: docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '942[0-9]{3}'
    answer: |
      CODE=$(docker exec el34-attacker curl -s -o /dev/null -w '%{http_code}' -H 'Host: dvwa.el34.lab' 'http://10.20.30.1/?id=1%27%20UNION%20SELECT%20user,password--')
      sleep 3
      N=$(docker exec el34-web tail -n 2000 /var/log/apache2/modsec_audit.log | grep -cE '942[0-9]{3}')
      [ "$N" -gt 0 ] && echo "SQLI_942_OK code=$CODE n=$N"
    answer_detail: |
      SQLi payload는 CRS 942 대역에 걸린다. dvwa는 차단 모드라 응답이 403, 동시에
      modsec_audit.log에 942xxx 가 남는다. 응답코드(차단 여부)와 감사 로그(탐지 여부)는
      독립 신호 — DetectionOnly 모드 vhost(juice)라면 같은 942가 기록돼도 200이 돌아온다.
    verify:
      type: output_contains
      expect: SQLI_942_OK
      field: stdout
      semantic:
        intent: |
          ModSec(web)가 SQLi를 942 룰로 탐지하고 403으로 차단함을 동시에 확인.
        success_criteria:
          - "modsec_audit.log에 942xxx 룰 매치 + (차단 모드 vhost에서) 403 응답"

  # ============================================================
  # STEP 7 — 집계: rule.level 분포 (Visualize Terms의 CLI 등가물)
  # ============================================================
  - order: 7
    instruction: |
      ## 🎯 MISSION

      KQL은 "고르기"까지다. "세기"는 **Visualize**(집계)의 몫. Dashboard에서 rule.id Top10
      막대를 만드는 것과 같은 일을, CLI에서 `rule.level`(위험도 0~15) 분포로 집계해 본다.

      ## 🖥️ Dashboard에서

      Visualize → Vertical Bar → Terms(Field `rule.id`, Size 10) → "가장 자주 터진 규칙 Top10".
      여기서는 같은 집계 아이디어를 `rule.level` 로 적용한다.

      ## 💻 실행 명령 (CLI 검증)

