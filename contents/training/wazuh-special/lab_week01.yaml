      # 최근 경보의 위험도(rule.level) 분포 = "막대 차트"의 숫자판
      docker exec el34-siem tail -n 5000 /var/ossec/logs/alerts/alerts.json \
        | grep -oE '"level":[0-9]+' | sort | uniq -c | sort -rn | head
      B=$(docker exec el34-siem tail -n 5000 /var/ossec/logs/alerts/alerts.json \
        | grep -oE '"level":[0-9]+' | sort -u | wc -l)
      [ "$B" -gt 0 ] && echo "AGG_OK buckets=$B"
      ```

      ## 📋 확인 사항

      - 위험도별 경보 개수 표 출력 (예: `120 "level":3`, `40 "level":7` ...).
      - `AGG_OK buckets=N` — 서로 다른 위험도 구간이 N개. 이것이 막대 N개에 해당.
    hint: docker exec el34-siem tail -n 5000 /var/ossec/logs/alerts/alerts.json | grep -oE '"level":[0-9]+' | sort | uniq -c | sort -rn
    answer: |
