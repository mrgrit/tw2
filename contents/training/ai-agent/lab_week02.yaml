    answer_detail: "도구 보안 종합: LLM=제안, 실행기=검문, 최소권한. 보고서로 운영에 연결."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
      semantic:
        intent: "도구 보안 실습을 보고서로 종합"
        success_criteria: ["발견사항", "권고", "최소권한 원칙"]
