    answer_detail: "오케스트레이션 라우팅 메트릭."
    verify:
      type: output_contains
      expect: Monitoring
      field: stdout
      semantic: {intent: "오케스트레이션 메트릭", success_criteria: ["집계"]}

  - order: 8
    instruction: |
      ## 🎯 미션 — 평가 보고서
      ## 💻 실행 명령
      ```bash
      python3 -c "print('='*50)
      print('  Multi-Agent Security Assessment')
