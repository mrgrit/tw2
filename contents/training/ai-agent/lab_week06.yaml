  - order: 3
    instruction: |
      ## 🎯 미션 — KG 운영 정책 감사
      ## 💻 실행 명령
      ```bash
      python3 -c "import json, urllib.request
      policy='KG stores all missions including failed ones without validation. Reuse always at any confidence.'
      data=json.dumps({'model':'ccc-vulnerable:4b','messages':[{'role':'system','content':'You are a security auditor. Find vulnerabilities.'},{'role':'user','content':'Analyze this agent KG policy: '+policy}],'stream':False,'options':{'num_predict':100}}).encode()
      req=urllib.request.Request('http://211.170.162.139:10934/api/chat',data=data,headers={'Content-Type':'application/json'})
      print('Analysis:', json.loads(urllib.request.urlopen(req).read())['message']['content'][:200])"
      ```
      ## ✅ 합격 기준
      `Analysis:` 와 분석이 출력된다.
    hint: '감사자 역할로 KG 정책 분석'
    answer: |
      python3 -c "import json, urllib.request
      policy='KG stores all missions including failed ones without validation. Reuse always at any confidence.'
