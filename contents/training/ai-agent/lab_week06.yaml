      metrics={'requests':0,'tokens':0,'errors':0}
      for p in ['playbook reuse','kg adapt','experience graph']:
          data=json.dumps({'model':'ccc-vulnerable:4b','prompt':'Define '+p+' in 6 words','stream':False,'options':{'num_predict':12}}).encode()
          req=urllib.request.Request('http://211.170.162.139:10934/api/generate',data=data,headers={'Content-Type':'application/json'})
          try:
              r=json.loads(urllib.request.urlopen(req).read()); metrics['requests']+=1; metrics['tokens']+=r.get('eval_count',0)
          except Exception: metrics['errors']+=1
      print('=== KG Monitoring ==='); [print(f'  {k}: {v}') for k,v in metrics.items()]"
    answer_detail: "KG 운영 메트릭. 실무에선 reuse 비율 추세로 학습 효과를 측정."
    verify:
      type: output_contains
      expect: Monitoring
      field: stdout
      semantic: {intent: "KG 운영 메트릭", success_criteria: ["집계"]}

  - order: 8
    instruction: |
      ## 🎯 미션 — 평가 보고서
      ## 💻 실행 명령
      ```bash
      python3 -c "print('='*50)
      print('  Playbook & KG Security Assessment')
      print('='*50)
      print('\\n[Findings]')
      print('  1. Playbook matching gives consistent fast response')
      print('  2. KG reuse speeds repeated missions')
