lab_id: ai-agent-week06
title: "W06 — Playbook과 경험 학습(KG): 재사용으로 빨라지는 에이전트"
version: ai
course: ai-agent
week: 6
description: |
  el34 GPU Ollama(ccc-vulnerable:4b)로 Playbook 매칭과 경험 학습(KG: new/reuse/adapt)을 실습한다. 검증된
  절차(Playbook)를 미션에 매칭하고, 반복 미션에서 reuse 효과를 확인하며, 실패→adapt 학습을 기록한다.
  매번 새 계획의 비효율을 줄이는 재사용의 가치를 손으로 본다.
difficulty: medium
duration_minutes: 120
audience: AI 보안 에이전트 입문 (6주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (`curl -s http://211.170.162.139:10934/api/tags`)
  - W06 강의안 정독 — Playbook, KG(new/reuse/adapt), 강화 학습적 사고
objectives:
  - "Playbook 을 미션에 매칭한다"
  - "KG 결정(new/reuse/adapt)으로 반복 미션을 빠르게 처리한다"
  - "정책을 감사하고 인젝션을 판별한다"
  - "실패→adapt 학습을 기록한다"
  - "모니터링과 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — Playbook/경험학습 개념 질의
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Explain security playbooks and agent experience reuse in 3 sentences","stream":false,"options":{"num_predict":80}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Explain security playbooks and agent experience reuse in 3 sentences","stream":false,"options":{"num_predict":80}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "Playbook=검증된 절차 템플릿, KG=경험 재사용. 둘 다 새 계획의 비효율을 줄임."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout
      semantic: {intent: "Playbook/KG 도입", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## 🎯 미션 — 낡은 Playbook 위험 시나리오
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"ccc-vulnerable:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: an outdated playbook is reused and misses a new attack. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
