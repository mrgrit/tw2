lab_id: ai-agent-week14
title: "W14 — 프로젝트 B: CTF 공격 에이전트(ReAct·인가 정찰·범위 통제)"
version: ai
course: ai-agent
week: 14
description: |
  el34 GPU Ollama(gemma3:4b) + 인가된 격리 실습장(el34)에서 공격형 CTF 에이전트를 실습한다. ReAct
  루프로 CTF 접근을 추론하고, el34-attacker 로 인가된 대상(dvwa.el34.lab)에 정찰을 수행하며, 대상 범위
  화이트리스트로 인가 밖 공격을 차단한다. ⚠️ 모든 실습은 인가된 격리장 내부에서만.
difficulty: hard
duration_minutes: 150
audience: AI 보안 에이전트 (14주차, 프로젝트 B)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`) + ccc 가 docker 실행 권한 보유
  - el34 호스트에서 GPU Ollama 도달 (`curl -s http://211.170.162.139:10934/api/tags`)
  - W14 강의안 정독 — ReAct, 윤리·인가·격리, 범위 통제 / W01~W13 완료
objectives:
  - "ReAct 루프로 CTF 공격 접근을 추론한다"
  - "el34 인가 대상에 정찰을 실제 수행한다"
  - "대상 범위 화이트리스트로 인가 밖 공격을 차단한다"
  - "공격 에이전트의 오용 위험을 감사한다"
  - "모니터링과 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 공격 에이전트/ReAct 개념 질의
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Explain a ReAct CTF-solving agent and why authorization/isolation matter in 3 sentences","stream":false,"options":{"num_predict":80}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Explain a ReAct CTF-solving agent and why authorization/isolation matter in 3 sentences","stream":false,"options":{"num_predict":80}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "공격 에이전트는 인가된 격리장에서만. ReAct 로 정찰→탐색→익스플로잇."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout
      semantic: {intent: "공격 에이전트 도입", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## 🎯 미션 — 공격 에이전트 오용 시나리오
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: an offensive agent attacks targets outside its authorized scope. Risk, legal impact, control."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: an offensive agent attacks targets outside its authorized scope. Risk, legal impact, control."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
    answer_detail: "인가 밖 공격 = 범죄. 범위 통제가 필수인 이유."
    verify:
      type: output_contains
