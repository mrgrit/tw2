      field: stdout
      semantic: {intent: "오용 위험", success_criteria: ["시나리오"]}

  - order: 3
    instruction: |
      ## 🎯 미션 — 공격 에이전트 설계 감사
      ## 💻 실행 명령
      ```bash
      python3 -c "import json, urllib.request
      design='Offensive agent has no target scope check, can attack any IP, can run destructive exploits, no logging.'
      data=json.dumps({'model':'gemma3:4b','messages':[{'role':'system','content':'You are a security auditor. Find risks.'},{'role':'user','content':'Analyze this offensive agent design: '+design}],'stream':False,'options':{'num_predict':100}}).encode()
      req=urllib.request.Request('http://211.170.162.139:10934/api/chat',data=data,headers={'Content-Type':'application/json'})
      print('Analysis:', json.loads(urllib.request.urlopen(req).read())['message']['content'][:200])"
      ```
      ## ✅ 합격 기준
      `Analysis:` 와 분석이 출력된다.
    hint: '감사자 역할로 공격 에이전트 설계 분석'
