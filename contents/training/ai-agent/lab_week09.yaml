      field: stdout
      semantic: {intent: "위협 모니터링", success_criteria: ["집계"]}

  - order: 8
    instruction: |
      ## 🎯 미션 — 다층 방어 보고서
      ## 💻 실행 명령
      ```bash
      python3 -c "print('='*50)
      print('  Agent Threat & Defense Assessment')
      print('='*50)
      print('\\n[Threats]')
      print('  LLM01 injection (direct/indirect)')
