      print('  1. Default to ask mode, never blanket auto')
      print('  2. Exclude .env/keys from agent context')
      print('  3. Use local LLM for data sovereignty')
      print('='*50)"
      ```
      ## ✅ 합격 기준
      보고서가 `Assessment` 제목과 함께 출력된다.
    hint: '발견·권고 보고서'
    answer: |
