          except Exception: metrics['errors']+=1
      print('=== IR Monitoring ==='); [print(f'  {k}: {v}') for k,v in metrics.items()]"
    answer_detail: "IR 처리량 메트릭 — MTTR 단축 효과 측정의 기반."
    verify:
      type: output_contains
      expect: Monitoring
      field: stdout
      semantic: {intent: "IR 메트릭", success_criteria: ["집계"]}

