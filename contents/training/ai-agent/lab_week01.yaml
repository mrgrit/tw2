      print('\\n[Recommendations]')
      print('  1. Enhance semantic detection')
      print('  2. Add domain-specific rules')
      print('  3. Implement monitoring')
      print('='*50)"
      ```
      ## ✅ 합격 기준
      평가 보고서가 `Assessment` 제목과 함께 출력된다.
    hint: '발견사항·가드레일·권고를 보고서로 정리'
    answer: |
