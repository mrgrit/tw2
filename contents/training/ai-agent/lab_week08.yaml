      print('  3. Injection tested (red-team)')
      print('\\n[Known Limits]')
      print('  - Small model hallucination; injection residual risk')
      print('='*50)"
    answer_detail: "에이전트 명세(역할·도구·정책)+발견+한계. 운영·인수인계 기준."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
      semantic: {intent: "에이전트 명세 종합", success_criteria: ["명세","한계"]}
