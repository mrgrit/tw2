lab_id: ai-safety-week06
title: "W06 — 적대적 입력: 띄어쓰기·리트·구분자 우회와 입력 정제"
version: ai
course: ai-safety
week: 6
description: |
  el34 GPU Ollama 로 적대적 입력을 실습한다. 띄어쓰기(b o m b)·리트스피크(b0mb)·구분자(b.o.m.b)
  변형이 단순 키워드 필터를 우회함(BYPASS)을 보이고, 입력 정제(공백/구분 제거+디리트)로 변형을
  복원해 탐지하며(DETECTED), 다중 변형을 등급 탐지(CRITICAL)한다.
difficulty: medium
duration_minutes: 120
audience: AI Safety 입문 (6주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W06 강의안 정독 — 변형 기법, 적대적 접미사, 입력 정제
objectives:
  - "변형(공백/리트/구분자)이 단순 필터를 우회함을 보인다"
  - "입력 정제로 변형을 복원해 탐지한다"
  - "다중 변형을 등급별로 탐지한다"
  - "적대적 입력 노출을 감사한다"
  - "보고서를 만든다"
pass_threshold: 0.6

