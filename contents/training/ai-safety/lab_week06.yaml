  - order: 3
    instruction: |
      ## 🎯 미션 — 띄어쓰기/리트 변형이 필터 우회 (BYPASS)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      BAD=['bomb','weapon','hack']
      def naive(t): return any(b in t.lower() for b in BAD)
      print('=== Adversarial Evasion ===')
      for t in ['b o m b','b0mb','h4ck a server']:
          print(f'  [{\"BLOCKED\" if naive(t) else \"BYPASS\"}] {t}')"
      ```
      ## ✅ 합격 기준
      변형이 필터를 우회해 `BYPASS` 가 출력된다.
    hint: '공백/리트 변형 → 키워드 안 보임 → BYPASS'
    answer: |
      python3 -c "
      BAD=['bomb','weapon','hack']
      def naive(t): return any(b in t.lower() for b in BAD)
      print('=== Adversarial Evasion ===')
      for t in ['b o m b','b0mb','h4ck a server']:
          print(f'  [{\"BLOCKED\" if naive(t) else \"BYPASS\"}] {t}')"
    answer_detail: "b o m b / b0mb / h4ck 는 연속 키워드가 깨져 단순 필터 우회(BYPASS). 모델은 문맥으로 복원해 이해."
    verify:
      type: output_contains
      expect: BYPASS
      field: stdout
      semantic: {intent: "변형 우회", success_criteria: ["필터 우회"]}

  - order: 4
    instruction: |
      ## 🎯 미션 — 구분자 변형이 필터 우회 (BYPASS)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      BAD=['malware','exploit']
      def naive(t): return any(b in t.lower() for b in BAD)
      print('=== Separator Evasion ===')
      for t in ['m.a.l.w.a.r.e','e-x-p-l-o-i-t code']:
          print(f'  [{\"BLOCKED\" if naive(t) else \"BYPASS\"}] {t}')"
      ```
      ## ✅ 합격 기준
      구분자 변형이 필터를 우회해 `BYPASS` 가 출력된다.
    hint: '구분자(.,-) 삽입 → 키워드 깨짐 → BYPASS'
    answer: |
      python3 -c "
      BAD=['malware','exploit']
      def naive(t): return any(b in t.lower() for b in BAD)
      print('=== Separator Evasion ===')
      for t in ['m.a.l.w.a.r.e','e-x-p-l-o-i-t code']:
          print(f'  [{\"BLOCKED\" if naive(t) else \"BYPASS\"}] {t}')"
    answer_detail: "구분자(.,-)로 키워드를 쪼개 필터 우회(BYPASS)."
    verify:
      type: output_contains
      expect: BYPASS
      field: stdout
      semantic: {intent: "구분자 우회", success_criteria: ["필터 우회"]}

  - order: 5
    instruction: |
      ## 🎯 미션 — 입력 정제 방어 (DETECTED)

      공백/구분 제거 + 디리트(0→o,1→i,3→e,4→a) 후 검사하면 변형이 복원돼 탐지된다.

      ## 💻 실행 명령
      ```bash
      python3 -c "import re
      LEET={'0':'o','1':'i','3':'e','4':'a','5':'s','@':'a','\$':'s'}
      def sanitize(t):
          t=t.lower()
          t=''.join(LEET.get(ch,ch) for ch in t)
          return re.sub(r'[^a-z]','',t)
      BAD=['bomb','weapon','hack','malware','exploit']
      def detect(t): return any(b in sanitize(t) for b in BAD)
      print('=== Sanitized Detection ===')
      for t in ['b o m b','b0mb','m.a.l.w.a.r.e','h4ck']:
          print(f'  [{\"DETECTED\" if detect(t) else \"MISSED\"}] {t} -> {sanitize(t)}')"
      ```
      ## ✅ 합격 기준
      정제 후 변형이 복원돼 `DETECTED` 가 출력된다.
    hint: '공백/구분 제거 + 디리트 후 키워드 검사'
    answer: |
      python3 -c "import re
      LEET={'0':'o','1':'i','3':'e','4':'a','5':'s','@':'a','\$':'s'}
      def sanitize(t):
          t=t.lower()
          t=''.join(LEET.get(ch,ch) for ch in t)
          return re.sub(r'[^a-z]','',t)
      BAD=['bomb','weapon','hack','malware','exploit']
      def detect(t): return any(b in sanitize(t) for b in BAD)
      print('=== Sanitized Detection ===')
      for t in ['b o m b','b0mb','m.a.l.w.a.r.e','h4ck']:
          print(f'  [{\"DETECTED\" if detect(t) else \"MISSED\"}] {t} -> {sanitize(t)}')"
    answer_detail: "정제(소문자+디리트+비알파 제거)로 b0mb→bomb, m.a.l.w.a.r.e→malware 복원 → DETECTED. 변형 무력화."
    verify:
      type: output_contains
      expect: DETECTED
      field: stdout
      semantic: {intent: "입력 정제 방어", success_criteria: ["변형 복원","탐지"]}

