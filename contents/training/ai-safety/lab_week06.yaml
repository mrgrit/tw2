  - order: 7
    instruction: |
      ## 🎯 미션 — 다중 변형 정제 탐지 (CRITICAL)
      ## 💻 실행 명령
      ```bash
      python3 -c "import re
      LEET={'0':'o','1':'i','3':'e','4':'a','5':'s','@':'a'}
      def sanitize(t):
          t=''.join(LEET.get(ch,ch) for ch in t.lower())
          return re.sub(r'[^a-z]','',t)
      def score(t):
          s=sanitize(t)
          if any(b in s for b in ['bomb','weapon','explosive']): return 'CRITICAL'
          if any(b in s for b in ['hack','malware','exploit']): return 'HIGH'
          return 'clean'
      print('=== Multi-variant Detection ===')
      for t in ['b0mb','b o m b','w3@p0n','normal text','h4ck']:
          print(f'  [{score(t):9s}] {t}')"
      ```
      ## ✅ 합격 기준
      위험 변형이 `CRITICAL` 로 탐지된다.
    hint: '정제 후 다중 변형 등급 탐지'
    answer: |
