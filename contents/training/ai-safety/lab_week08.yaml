        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are an AI red-team lead."},{"role":"user","content":"Outline a vulnerability assessment plan for an LLM covering harmful output, injection, jailbreak."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are an AI red-team lead."},{"role":"user","content":"Outline a vulnerability assessment plan for an LLM covering harmful output, injection, jailbreak."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
