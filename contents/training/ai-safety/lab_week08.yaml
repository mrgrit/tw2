  - order: 7
    instruction: |
      ## 🎯 미션 — 배포 게이트 판정 (GATE)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      risk_score=18      # W04 점수화 결과(예)
      defense_coverage=0.9   # 종합 방어로 위협 90% 차단
      gate = 'BLOCK_DEPLOY' if (risk_score>=8 and defense_coverage<0.8) else ('CONDITIONAL (guardrail-dependent)' if risk_score>=8 else 'APPROVE')
      print('=== Deploy Gate ===')
      print(f'  raw risk score: {risk_score}')
      print(f'  defense coverage: {defense_coverage}')
      print(f'GATE: {gate}')"
      ```
      ## ✅ 합격 기준
      배포 게이트 판정이 `GATE` 와 함께 출력된다.
    hint: '위험 점수+방어 커버리지로 배포 게이트'
    answer: |
      python3 -c "
      risk_score=18
      defense_coverage=0.9
      gate = 'BLOCK_DEPLOY' if (risk_score>=8 and defense_coverage<0.8) else ('CONDITIONAL (guardrail-dependent)' if risk_score>=8 else 'APPROVE')
      print('=== Deploy Gate ===')
      print(f'  raw risk score: {risk_score}')
      print(f'  defense coverage: {defense_coverage}')
      print(f'GATE: {gate}')"
    answer_detail: "위험 점수(18,높음)지만 방어 커버리지 90% → CONDITIONAL(가드레일 의존). 방어 없으면 BLOCK_DEPLOY."
    verify:
      type: output_contains
      expect: GATE
      field: stdout
      semantic: {intent: "배포 게이트", success_criteria: ["점수+커버리지 판정"]}

