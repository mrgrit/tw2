lab_id: ai-safety-week02
title: "W02 — 프롬프트 인젝션 기초: system 제약 무력화·구분자 방어"
version: ai
course: ai-safety
week: 2
description: |
  el34 GPU Ollama 로 프롬프트 인젝션을 실습한다. 취약 모델(ccc-unsafe:2b)에서 직접/간접 인젝션이
  system 제약을 무력화함(INJECTED)을 확인하고, 구분자(<data>)로 방어(DEFENDED)하며, 인젝션 패턴을
  탐지(CRITICAL)한다. ⚠️ 방어 학습용·인가 격리장 한정.
difficulty: easy
duration_minutes: 120
audience: AI Safety 입문 (2주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W02 강의안 정독 — 직접/간접 인젝션, 데이터-지시 경계, 구분자
objectives:
  - "취약 모델에서 직접 인젝션이 system 제약을 무력화함을 확인한다"
  - "간접 인젝션(외부 데이터에 숨긴 지시)을 재현한다"
  - "구분자로 인젝션을 방어한다"
  - "인젝션 프롬프트 패턴을 탐지한다"
  - "정책 감사와 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 모델 가동 확인
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is prompt injection in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate (ccc-unsafe:2b)'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is prompt injection in one sentence?","stream":false,"options":{"num_predict":50}}' \
