       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat (gemma3:4b)'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: a prompt injection overrides a chatbot system role. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
    answer_detail: "인젝션으로 챗봇 역할 탈취 시나리오."
    verify:
