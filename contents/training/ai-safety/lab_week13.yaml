          req=urllib.request.Request('http://211.170.162.139:10934/api/chat',data=data,headers={'Content-Type':'application/json'})
          return json.loads(urllib.request.urlopen(req).read())['message']['content']
      findings='1) jailbreak->harmful (AML.T0054), 2) prompt injection (AML.T0051)'
      r=chat('You are a security report writer. Summarize impact and give one mitigation per finding.','Findings: '+findings)
      print('Analysis:', r.strip().replace(chr(10),' ')[:200])"
    answer_detail: "LLM 보고 자동화: 발견 영향·완화 초안 → Analysis:. 사람 검수."
    verify:
      type: output_contains
      expect: "Analysis:"
      field: stdout
      semantic: {intent: "보고 자동화", success_criteria: ["영향·완화 초안"]}

  - order: 8
    instruction: |
      ## STEP 8 — 레드팀 종합 보고서 (Assessment)
      > **이 단계에서 할 일:** 배터리·ASR·ATLAS·검증·우선순위를 종합 보고서로 정리.
      > **왜:** 레드팀 산출물은 판정 가능한 보고서다.

      ### ▷ 그대로 입력
      ```bash
      python3 -c "print('='*54)
      print('  AI Red Team Assessment (W13)')
      print('='*54)
      print('\\n[Coverage] 5 categories (OWASP LLM Top10 aligned)')
      print('[Findings] 3/5 vulnerable (harmful/jailbreak/injection)')
      print('[ATLAS] AML.T0057 / T0054 / T0051')
      print('[Verified] jailbreak reproduced 3/3 (real)')
      print('[Priority] 1.jailbreak->harmful(72) 2.injection(63)')
      print('\\n[Verdict] BLOCK deploy: fix top-priority findings, re-run battery')
      print('[Continuous] schedule periodic battery (new attacks emerge)')
      print('='*54)"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      ======================================================
        AI Red Team Assessment (W13)
      ======================================================
      [Coverage] ... [Findings] ... [ATLAS] ... [Verified] ... [Priority] ... [Verdict] ...
      ======================================================
      ```

      ### ▷ 결과 해석
      `Assessment` 헤더와 커버리지·발견·ATLAS·검증·우선순위·판정이 나오면 완료. 제출용엔 STEP 3 ASR·STEP 5
      검증·STEP 6 우선순위를 인용.
