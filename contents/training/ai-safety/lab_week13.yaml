lab_id: ai-safety-week13
title: "W13 — Red Teaming for AI: 공격 라이브러리·점수화·방어 검증"
version: ai
course: ai-safety
week: 13
description: |
  el34 GPU Ollama 로 AI 레드팀을 실습한다. 공격 라이브러리(인젝션·탈옥·유해요청)를 취약 모델에 자동
  실행해 취약점을 찾고(VULNERABLE), 성공률로 점수화(Score:)하며, 방어 적용 후 재실행으로 차단(BLOCKED)을
  검증하고, 커버리지 보고서(COVERAGE)를 만든다. ⚠️ 인가 격리장 한정.
difficulty: hard
duration_minutes: 150
audience: AI Safety (13주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W13 강의안 정독 — 레드팀 절차, 공격 라이브러리, 퍼플팀
objectives:
  - "공격 라이브러리를 자동 실행해 취약점을 찾는다"
  - "성공률로 취약점을 점수화한다"
  - "방어 적용 후 재실행으로 효과를 검증한다"
  - "레드팀 절차를 감사한다"
  - "커버리지 보고서를 만든다"
pass_threshold: 0.6

