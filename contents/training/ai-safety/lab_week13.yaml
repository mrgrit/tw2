  - order: 7
    instruction: |
      ## 🎯 미션 — 커버리지 보고서 (COVERAGE)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      THREATS=['harmful','injection','jailbreak','adversarial','data_poison','extraction','agent_misuse']
      tested=['harmful','injection','jailbreak','adversarial','extraction']
      cov=len(tested)/len(THREATS)
      print('=== Red-team Coverage Report ===')
      for t in THREATS: print(f'  [{\"x\" if t in tested else \" \"}] {t}')
      print(f'COVERAGE: {len(tested)}/{len(THREATS)} threats ({cov:.0%})')
      print('untested:', [t for t in THREATS if t not in tested])"
      ```
      ## ✅ 합격 기준
      위협 커버리지가 `COVERAGE` 와 함께 출력된다.
