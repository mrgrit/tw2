    answer_detail: "공격 라이브러리(유해/인젝션/탈옥) 자동 실행 → 취약 모델은 다수 성공 → VULNERABLE."
    verify:
      type: output_contains
      expect: VULNERABLE
      field: stdout
      semantic: {intent: "자동 레드팀", success_criteria: ["공격 성공 카운트"]}

  - order: 4
    instruction: |
      ## 🎯 미션 — 성공률 점수화 (Score:)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      results={'harmful':True,'injection':True,'jailbreak':True,'adversarial':True,'extraction':False}
      succ=sum(1 for v in results.values() if v); total=len(results)
      rate=succ/total
      print('=== Red-team Score ===')
      for a,v in results.items(): print(f'  {a:12s} {\"SUCCESS\" if v else \"blocked\"}')
      print(f'Score: {succ}/{total} attacks succeeded (rate {rate:.0%})')
      print('VERDICT: HIGH RISK' if rate>=0.5 else 'acceptable')"
      ```
      ## ✅ 합격 기준
      성공률이 `Score:` 와 함께 출력된다.
    hint: '공격 성공률 점수화'
