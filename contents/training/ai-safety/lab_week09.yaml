  - order: 3
    instruction: |
      ## 🎯 미션 — 모델 추출 시뮬레이션 (EXTRACTED)

      대량 질의로 입출력 쌍을 수집한다(대체 모델 학습용). 여기선 소량으로 원리를 보인다.

      ## 💻 실행 명령
      ```bash
      python3 -c "import json, urllib.request
      def gen(p):
          data=json.dumps({'model':'ccc-unsafe:2b','prompt':p,'stream':False,'options':{'num_predict':20}}).encode()
          req=urllib.request.Request('http://211.170.162.139:10934/api/generate',data=data,headers={'Content-Type':'application/json'})
          return json.loads(urllib.request.urlopen(req).read())['response']
      probes=['define firewall','define malware','define phishing']
      pairs=[(p, gen(p)[:30]) for p in probes]
      print('=== Extraction (collected I/O pairs) ===')
      for i,o in pairs: print(f'  {i} -> {o!r}')
      print(f'EXTRACTED: {len(pairs)} I/O pairs harvested (would train surrogate)')"
      ```
      ## ✅ 합격 기준
      입출력 쌍이 수집돼 `EXTRACTED` 가 출력된다.
    hint: '여러 질의로 입출력 쌍 수집'
    answer: |
      python3 -c "import json, urllib.request
      def gen(p):
          data=json.dumps({'model':'ccc-unsafe:2b','prompt':p,'stream':False,'options':{'num_predict':20}}).encode()
          req=urllib.request.Request('http://211.170.162.139:10934/api/generate',data=data,headers={'Content-Type':'application/json'})
          return json.loads(urllib.request.urlopen(req).read())['response']
      probes=['define firewall','define malware','define phishing']
      pairs=[(p, gen(p)[:30]) for p in probes]
      print('=== Extraction (collected I/O pairs) ===')
      for i,o in pairs: print(f'  {i} -> {o!r}')
      print(f'EXTRACTED: {len(pairs)} I/O pairs harvested (would train surrogate)')"
    answer_detail: "입출력 쌍을 대량 수집하면 대체 모델 학습 가능(추출). 실제론 수만~수십만 질의."
    verify:
      type: output_contains
      expect: EXTRACTED
      field: stdout
      semantic: {intent: "모델 추출 시뮬", success_criteria: ["I/O 수집"]}

  - order: 4
    instruction: |
      ## 🎯 미션 — 멤버십 추론 시뮬레이션 (INFERRED)

      모델 신뢰도로 "이 샘플이 학습에 쓰였나"를 판별한다(학습 샘플은 보통 더 확신).

      ## 💻 실행 명령
      ```bash
      python3 -c "
      conf={'patient_record_42':0.97,'random_text':0.55,'patient_record_99':0.96}
      THRESH=0.9
      print('=== Membership Inference ===')
      members=[]
      for s,c in conf.items():
          m=c>=THRESH
          if m: members.append(s)
          print(f'  conf={c} -> {\"MEMBER\" if m else \"non-member\"} ({s})')
      print(f'INFERRED: {len(members)} likely training members by confidence')"
      ```
      ## ✅ 합격 기준
      높은 신뢰도 샘플이 학습 멤버로 `INFERRED` 된다.
    hint: '높은 신뢰도 = 학습 멤버 추론'
    answer: |
      python3 -c "
      conf={'patient_record_42':0.97,'random_text':0.55,'patient_record_99':0.96}
      THRESH=0.9
      print('=== Membership Inference ===')
      members=[]
      for s,c in conf.items():
          m=c>=THRESH
          if m: members.append(s)
          print(f'  conf={c} -> {\"MEMBER\" if m else \"non-member\"} ({s})')
      print(f'INFERRED: {len(members)} likely training members by confidence')"
    answer_detail: "학습 샘플은 신뢰도가 높음(과적합) → 멤버십 추론. 프라이버시 침해(누가 학습됐나). 신뢰도 노출이 단서."
    verify:
      type: output_contains
      expect: INFERRED
      field: stdout
      semantic: {intent: "멤버십 추론", success_criteria: ["신뢰도 기반 판별"]}

  - order: 5
    instruction: |
      ## 🎯 미션 — 질의 예산 방어 (BLOCKED)

      사용자당 질의 예산을 두어 대량 추출 질의를 차단한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "
      BUDGET=10
      used=0; blocked=0
      print('=== Query Budget ===')
      for i in range(1,16):
          if used<BUDGET: used+=1; status='ok'
          else: blocked+=1; status='BLOCKED'
          if i in (10,11,15): print(f'  query {i}: {status}')
      print(f'BLOCKED {blocked} extraction queries beyond budget {BUDGET}')"
      ```
      ## ✅ 합격 기준
      예산 초과 질의가 `BLOCKED` 된다.
    hint: '사용자당 질의 예산 초과 차단'
    answer: |
      python3 -c "
      BUDGET=10
      used=0; blocked=0
      print('=== Query Budget ===')
      for i in range(1,16):
          if used<BUDGET: used+=1; status='ok'
          else: blocked+=1; status='BLOCKED'
          if i in (10,11,15): print(f'  query {i}: {status}')
      print(f'BLOCKED {blocked} extraction queries beyond budget {BUDGET}')"
    answer_detail: "질의 예산(10) 초과 질의 BLOCKED → 대량 추출 차단. rate limit·이상 패턴 탐지와 함께."
    verify:
      type: output_contains
      expect: BLOCKED
      field: stdout
      semantic: {intent: "질의 예산 방어", success_criteria: ["초과 차단"]}

  - order: 6
    instruction: |
