      field: stdout
      semantic: {intent: "모델 노출 감사", success_criteria: ["위험 식별"]}

  - order: 7
    instruction: |
      ## 🎯 미션 — 출력 최소화 (MINIMIZED)

      확률/로짓 등 단서를 제거하고 최종 답만 반환해 추출/추론 단서를 줄인다.

      ## 💻 실행 명령
      ```bash
      python3 -c "
      raw={'answer':'positive','confidence':0.973,'logprobs':[-0.01,-3.2,-5.1],'top_tokens':['pos','neg']}
      minimized={'answer': raw['answer']}
      print('=== Output Minimization ===')
      print('raw exposes:', list(raw.keys()))
      print('minimized exposes:', list(minimized.keys()))
      print('MINIMIZED' if 'confidence' not in minimized and 'logprobs' not in minimized else 'EXPOSED')"
      ```
      ## ✅ 합격 기준
      단서가 제거돼 `MINIMIZED` 가 출력된다.
    hint: '확률/로짓 숨기고 최종 답만'
    answer: |
      python3 -c "
      raw={'answer':'positive','confidence':0.973,'logprobs':[-0.01,-3.2,-5.1],'top_tokens':['pos','neg']}
      minimized={'answer': raw['answer']}
      print('=== Output Minimization ===')
      print('raw exposes:', list(raw.keys()))
      print('minimized exposes:', list(minimized.keys()))
      print('MINIMIZED' if 'confidence' not in minimized and 'logprobs' not in minimized else 'EXPOSED')"
    answer_detail: "confidence/logprobs 제거하고 answer 만 반환 → 추출·멤버십 단서 차단(MINIMIZED)."
    verify:
      type: output_contains
      expect: MINIMIZED
      field: stdout
      semantic: {intent: "출력 최소화", success_criteria: ["단서 제거"]}

