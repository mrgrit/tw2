lab_id: ai-safety-week09
title: "W09 — 모델 보안: 추출·멤버십 추론과 질의 예산·출력 최소화"
version: ai
course: ai-safety
week: 9
description: |
  el34 GPU Ollama 로 모델 자산 위협을 실습한다. 대량 질의로 입출력 쌍을 수집해 모델 추출을
  시뮬레이션하고(EXTRACTED), 신뢰도 기반 멤버십 추론을 재현하며(INFERRED), 질의 예산으로 추출을
  차단(BLOCKED)하고 출력 최소화(MINIMIZED)를 적용한다.
difficulty: medium
duration_minutes: 120
audience: AI Safety (9주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W09 강의안 정독 — 추출, 멤버십 추론, 역전, 질의 제한
objectives:
  - "대량 질의로 모델 추출을 시뮬레이션한다"
  - "신뢰도 기반 멤버십 추론을 재현한다"
  - "질의 예산으로 추출을 차단한다"
  - "출력 최소화로 단서 노출을 줄인다"
  - "모델 노출 설계를 감사하고 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 모델 가동 확인
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is model extraction in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is model extraction in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "모델 추출 = 질의로 모델 복제."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout
      semantic: {intent: "도입", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## 🎯 미션 — 모델 추출 시나리오
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: an attacker extracts a model by mass API queries. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: an attacker extracts a model by mass API queries. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
    answer_detail: "대량 질의 추출 시나리오."
