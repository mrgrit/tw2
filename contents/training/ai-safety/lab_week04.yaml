lab_id: ai-safety-week04
title: "W04 — LLM 탈옥: DAN·가상 프레이밍 재현과 탐지·출력 필터"
version: ai
course: ai-safety
week: 4
description: |
  el34 GPU Ollama 로 LLM 탈옥을 실습한다. DAN 역할극·가상 프레이밍이 취약 모델(ccc-unsafe:2b)에서
  유해 응답을 끌어냄(JAILBROKEN)을 확인하고, 탈옥 프롬프트 패턴 탐지(CRITICAL)와 출력 필터(BLOCKED)로
  방어한다. ⚠️ 방어 학습용·인가 격리장 한정.
difficulty: medium
duration_minutes: 120
audience: AI Safety 입문 (4주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W04 강의안 정독 — 탈옥 기법(DAN/가상/사칭), 탐지·출력 필터
objectives:
  - "DAN 역할극 탈옥이 유해 응답을 끌어냄을 확인한다"
  - "가상 프레이밍 탈옥을 재현한다"
  - "탈옥 프롬프트 패턴을 탐지한다"
  - "출력 필터로 탈옥 결과를 차단한다"
  - "탈옥 노출 감사와 보고서를 만든다"
pass_threshold: 0.6

