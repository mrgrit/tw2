      print(f'MAPPED to {len(funcs)}/4 RMF functions: {sorted(funcs)}')"
    answer_detail: "통제(편향측정·PII·정책·위협매핑·모니터링)를 NIST AI RMF Govern/Map/Measure/Manage에 매핑 → 커버리지 점검."
