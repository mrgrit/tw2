      field: stdout
      semantic: {intent: "모델 도달", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## STEP 2 — 집단별 편향 측정 (BIAS_DETECTED)
      > **이 단계에서 할 일:** AI 결정(승인/거절)을 집단별로 나눠 승인율 격차를 계산한다.
      > **왜:** 전체 정확도만 보면 편향이 숨는다. 집단별로 나눠야 불공정이 보인다(강의 §0.5.3).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      # 집단별 대출 승인 결과(1=승인,0=거절)
      approvals={'group_A':[1,1,1,1,0,1,1,1,1,1],'group_B':[1,0,0,1,0,0,0,1,0,0]}
      rates={g:sum(a)/len(a) for g,a in approvals.items()}
      disparity=max(rates.values())-min(rates.values())
      for g,r in rates.items(): print(f'  {g}: approval rate {r:.0%}')
      print(f'disparity: {disparity:.0%}')
      print('BIAS_DETECTED' if disparity>0.2 else 'fair')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
        group_A: approval rate 90%
        group_B: approval rate 30%
      disparity: 60%
      BIAS_DETECTED
      ```

      ### ▷ 결과 해석
      집단 A(90%) vs B(30%) 격차 60%p > 임계(20%) → `BIAS_DETECTED`. 전체 승인율은 정상이어도 집단 격차가
      크면 불공정. 재학습·후처리로 격차를 줄여야 한다.
    hint: '집단별 승인율 격차>임계 → BIAS_DETECTED'
    answer: |
      python3 -c "
      approvals={'group_A':[1,1,1,1,0,1,1,1,1,1],'group_B':[1,0,0,1,0,0,0,1,0,0]}
      rates={g:sum(a)/len(a) for g,a in approvals.items()}
      disparity=max(rates.values())-min(rates.values())
      for g,r in rates.items(): print(f'  {g}: approval rate {r:.0%}')
      print(f'disparity: {disparity:.0%}')
      print('BIAS_DETECTED' if disparity>0.2 else 'fair')"
    answer_detail: "집단별 승인율 격차로 편향 측정 → BIAS_DETECTED. 나눠서 재야 보임."
    verify:
      type: output_contains
      expect: BIAS_DETECTED
      field: stdout
      semantic: {intent: "편향 측정", success_criteria: ["집단 격차"]}

  - order: 3
    instruction: |
      ## STEP 3 — 공정성 지표 (Score:)
      > **이 단계에서 할 일:** 격차를 공정성 점수로 환산하고, 집단별 비율을 함께 보고한다.
      > **왜:** "편향 있다"를 숫자(공정성 점수)로 만들어 개선 목표를 세운다.

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      rates={'group_A':0.90,'group_B':0.30}
      disparity=max(rates.values())-min(rates.values())
      fairness=1-disparity   # 1=완전 공정, 0=최대 불공정
      print('=== Fairness Metrics ===')
      for g,r in rates.items(): print(f'  {g}: {r:.0%}')
      print(f'Score: fairness={fairness:.2f} (disparity={disparity:.0%}, target fairness>=0.90)')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      === Fairness Metrics ===
        group_A: 90%
        group_B: 30%
      Score: fairness=0.40 (disparity=60%, target fairness>=0.90)
      ```

      ### ▷ 결과 해석
      `Score: fairness=0.40` — 목표(≥0.90)에 크게 못 미침. 이 점수를 개선 목표로, 격차를 줄이는 조치 후
      재측정한다(W14 평가와 연결).
    hint: '격차→공정성 점수 → Score:'
    answer: |
      python3 -c "
      rates={'group_A':0.90,'group_B':0.30}
      disparity=max(rates.values())-min(rates.values())
      fairness=1-disparity
      print('=== Fairness Metrics ===')
      for g,r in rates.items(): print(f'  {g}: {r:.0%}')
      print(f'Score: fairness={fairness:.2f} (disparity={disparity:.0%}, target fairness>=0.90)')"
    answer_detail: "공정성 점수(1-격차) → Score:. 개선 목표 설정."
    verify:
      type: output_contains
      expect: "Score:"
      field: stdout
      semantic: {intent: "공정성 지표", success_criteria: ["점수화"]}

  - order: 4
    instruction: |
      ## STEP 4 — EU AI Act 위험 등급 매핑 (MAPPED)
      > **이 단계에서 할 일:** 시스템 용도로 EU AI Act 위험 4등급 중 하나를 배정한다.
      > **왜:** 등급이 정해져야 지켜야 할 의무가 정해진다(강의 §3.1).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      def eu_tier(use_case):
          uc=use_case.lower()
          if any(k in uc for k in ['social scoring','real-time biometric']): return 'UNACCEPTABLE (banned)'
          if any(k in uc for k in ['hiring','medical','law enforcement','credit','loan']): return 'HIGH (conformity+human oversight)'
          if any(k in uc for k in ['chatbot','deepfake']): return 'LIMITED (transparency)'
          return 'MINIMAL (no obligation)'
      for uc in ['Loan approval AI','Customer chatbot','Spam filter','Social scoring system']:
          print(f'  {eu_tier(uc):40s} <= {uc}')
      print('MAPPED' if 'HIGH' in eu_tier('Loan approval AI') else 'unmapped')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
        HIGH (conformity+human oversight)        <= Loan approval AI
        LIMITED (transparency)                   <= Customer chatbot
        MINIMAL (no obligation)                  <= Spam filter
        UNACCEPTABLE (banned)                    <= Social scoring system
      MAPPED
      ```

      ### ▷ 결과 해석
      대출 승인 AI는 `HIGH`(적합성 평가+인간 감독 의무), 챗봇은 LIMITED(투명성), 스팸필터는 MINIMAL, 소셜
      스코어링은 금지 → `MAPPED`. 등급이 의무를 결정한다.
    hint: '용도→EU AI Act 등급 배정 → MAPPED'
    answer: |
      python3 -c "
      def eu_tier(use_case):
          uc=use_case.lower()
          if any(k in uc for k in ['social scoring','real-time biometric']): return 'UNACCEPTABLE (banned)'
          if any(k in uc for k in ['hiring','medical','law enforcement','credit','loan']): return 'HIGH (conformity+human oversight)'
          if any(k in uc for k in ['chatbot','deepfake']): return 'LIMITED (transparency)'
          return 'MINIMAL (no obligation)'
      for uc in ['Loan approval AI','Customer chatbot','Spam filter','Social scoring system']:
          print(f'  {eu_tier(uc):40s} <= {uc}')
      print('MAPPED' if 'HIGH' in eu_tier('Loan approval AI') else 'unmapped')"
    answer_detail: "EU AI Act 위험 등급 매핑 → MAPPED. 등급이 의무 결정."
    verify:
      type: output_contains
      expect: MAPPED
      field: stdout
      semantic: {intent: "위험 등급 매핑", success_criteria: ["등급 배정"]}

  - order: 5
    instruction: |
      ## STEP 5 — 고위험 의무 체크리스트 (GATE)
      > **이 단계에서 할 일:** 고위험 AI의 의무 항목(위험관리·데이터거버넌스·문서화·인간감독·견고성·사이버보안)을
      > 자동 점검해 배포 게이트를 판정한다.
      > **왜:** 등급이 HIGH면 의무 미충족 시 배포 불가다(강의 §3.2).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      obligations={'risk_mgmt':True,'data_governance':True,'documentation':True,'human_oversight':False,'robustness':True,'cybersecurity':True}
      met=sum(1 for v in obligations.values() if v); total=len(obligations)
      missing=[k for k,v in obligations.items() if not v]
      print('obligations met:', str(met)+'/'+str(total), '| missing:', missing)
      print(f'GATE: {\"DEPLOY\" if met==total else \"BLOCK (fix: \"+str(missing)+\")\"}')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      obligations met: 5/6 | missing: ['human_oversight']
      GATE: BLOCK (fix: ['human_oversight'])
      ```

      ### ▷ 결과 해석
      6개 의무 중 인간 감독이 미충족 → `GATE: BLOCK`(배포 불가, 해당 항목 보완 필요). 모든 의무 충족 시
      DEPLOY. 규제 준수를 배포 게이트로 강제한다.
    hint: '고위험 의무 점검 → GATE: 판정'
    answer: |
      python3 -c "
      obligations={'risk_mgmt':True,'data_governance':True,'documentation':True,'human_oversight':False,'robustness':True,'cybersecurity':True}
      met=sum(1 for v in obligations.values() if v); total=len(obligations)
      missing=[k for k,v in obligations.items() if not v]
      print('obligations met:', str(met)+'/'+str(total), '| missing:', missing)
      print(f'GATE: {\"DEPLOY\" if met==total else \"BLOCK (fix: \"+str(missing)+\")\"}')"
    answer_detail: "고위험 의무 체크리스트로 배포 게이트 판정 → GATE:. 규제 준수 강제."
    verify:
      type: output_contains
      expect: "GATE:"
      field: stdout
      semantic: {intent: "규제 준수 게이트", success_criteria: ["의무 점검"]}

  - order: 6
    instruction: |
      ## STEP 6 — 투명성 (TRANSPARENT)
      > **이 단계에서 할 일:** 결정에 AI 사용 고지 + 결정 근거(설명)를 붙인다.
      > **왜:** 사용자는 "이게 AI 결정인지"와 "왜 그렇게 됐는지"를 알 권리가 있다(EU AI Act·한국법 투명성).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      def decide(income, debt):
          approved = income > debt*2
          reason = f'income {income} vs 2x debt {debt*2}'
          return {'ai_disclosure':'This decision was made by an AI system.','result':'APPROVED' if approved else 'DENIED','reason':reason,'appeal':'You may request human review.'}
      d=decide(5000,1000)
      for k,v in d.items(): print(f'  {k}: {v}')
      print('TRANSPARENT' if d['ai_disclosure'] and d['reason'] else 'opaque')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
        ai_disclosure: This decision was made by an AI system.
        result: APPROVED
        reason: income 5000 vs 2x debt 2000
        appeal: You may request human review.
      TRANSPARENT
      ```

      ### ▷ 결과 해석
      AI 고지 + 결정 근거 + 이의 절차가 모두 제시되면 `TRANSPARENT`. 불투명한 "블랙박스 결정"이 아니라
      설명·이의가 가능한 결정이어야 한다.
    hint: 'AI 고지+근거+이의절차 → TRANSPARENT'
    answer: |
      python3 -c "
      def decide(income, debt):
          approved = income > debt*2
          reason = f'income {income} vs 2x debt {debt*2}'
          return {'ai_disclosure':'This decision was made by an AI system.','result':'APPROVED' if approved else 'DENIED','reason':reason,'appeal':'You may request human review.'}
      d=decide(5000,1000)
      for k,v in d.items(): print(f'  {k}: {v}')
      print('TRANSPARENT' if d['ai_disclosure'] and d['reason'] else 'opaque')"
    answer_detail: "투명성: AI 고지+결정 근거+이의 절차 → TRANSPARENT."
    verify:
      type: output_contains
      expect: TRANSPARENT
      field: stdout
      semantic: {intent: "투명성", success_criteria: ["고지+근거"]}

  - order: 7
    instruction: |
      ## STEP 7 — 책임/데이터 최소화 (MINIMIZED)
      > **이 단계에서 할 일:** 감사 로그(책임 추적)를 남기고, 목적에 불필요한 개인정보를 수집 항목에서 제거한다.
      > **왜:** 책임 소재 추적(accountability)과 데이터 최소화(privacy)는 거버넌스의 기본이다(강의 §0.5.6).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "
      collected=['name','income','debt','race','religion','ssn']
      needed_for_loan=['name','income','debt']
      minimized=[f for f in collected if f in needed_for_loan]
      removed=[f for f in collected if f not in needed_for_loan]
      audit={'decision_id':'D-1001','actor':'loan-model-v2','result':'APPROVED','ts':'(logged)'}
      print('collected:', collected)
      print('minimized to:', minimized, '| removed (unnecessary/sensitive):', removed)
      print('audit log:', audit)
      print('MINIMIZED' if ('race' in removed and 'ssn' in removed and audit) else 'incomplete')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      collected: ['name', 'income', 'debt', 'race', 'religion', 'ssn']
      minimized to: ['name', 'income', 'debt'] | removed (unnecessary/sensitive): ['race', 'religion', 'ssn']
      audit log: {'decision_id': 'D-1001', ...}
      MINIMIZED
      ```

      ### ▷ 결과 해석
      대출에 불필요·민감한 항목(race/religion/ssn)이 제거되고 감사 로그가 남으면 `MINIMIZED`. 데이터
      최소화(편향·프라이버시 예방) + 책임 추적(감사)이 함께 이뤄진다.
    hint: '불필요 민감정보 제거+감사 로그 → MINIMIZED'
    answer: |
      python3 -c "
      collected=['name','income','debt','race','religion','ssn']
      needed_for_loan=['name','income','debt']
      minimized=[f for f in collected if f in needed_for_loan]
      removed=[f for f in collected if f not in needed_for_loan]
      audit={'decision_id':'D-1001','actor':'loan-model-v2','result':'APPROVED','ts':'(logged)'}
      print('collected:', collected)
      print('minimized to:', minimized, '| removed (unnecessary/sensitive):', removed)
      print('audit log:', audit)
      print('MINIMIZED' if ('race' in removed and 'ssn' in removed and audit) else 'incomplete')"
    answer_detail: "데이터 최소화(불필요/민감 제거)+감사 로그(책임) → MINIMIZED."
    verify:
      type: output_contains
      expect: MINIMIZED
      field: stdout
      semantic: {intent: "책임/최소화", success_criteria: ["데이터 최소화","감사"]}

  - order: 8
