      field: stdout
      semantic: {intent: "거버넌스 감사", success_criteria: ["갭 식별"]}

  - order: 7
    instruction: |
      ## 🎯 미션 — 규제 프레임워크 매핑 (MAPPED)

      구현한 통제를 NIST AI RMF 4기능(Govern/Map/Measure/Manage)에 매핑한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "
      controls={'bias measurement':'Measure','PII redaction':'Manage','risk policy':'Govern','threat mapping':'Map','monitoring':'Manage'}
      print('=== NIST AI RMF Mapping ===')
      funcs=set()
      for c,f in controls.items(): funcs.add(f); print(f'  {c:20s} -> {f}')
      print(f'MAPPED to {len(funcs)}/4 RMF functions: {sorted(funcs)}')"
      ```
      ## ✅ 합격 기준
      통제가 프레임워크에 `MAPPED` 된다.
    hint: '통제 → NIST AI RMF 4기능 매핑'
    answer: |
      python3 -c "
      controls={'bias measurement':'Measure','PII redaction':'Manage','risk policy':'Govern','threat mapping':'Map','monitoring':'Manage'}
