lab_id: ai-safety-week12
title: "W12 — AI 윤리와 규제: 편향·공정성·EU AI Act·투명성·책임"
version: ai
course: ai-safety
week: 12
description: |
  el34 에서 AI 거버넌스를 다룬다. 집단별 편향 측정(BIAS_DETECTED)·공정성 지표(Score:)를 내고, 시스템을
  EU AI Act 위험 등급에 매핑(MAPPED)하며, 고위험 의무 체크리스트로 배포를 판정(GATE)한다. 투명성(TRANSPARENT)·
  책임/데이터 최소화(MINIMIZED)를 구현한다. NIST RMF를 bastion 통제에 연결. ⚠️ 인가된 el34 격리 환경.
difficulty: medium
duration_minutes: 120
audience: AI Safety (12주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, pw `1`), GPU Ollama 도달(ccc-vulnerable:4b)
  - W12 강의안 정독 — §2 편향/공정성, §3 EU AI Act, §4 NIST/한국법
objectives:
  - "집단별 편향을 측정하고(BIAS_DETECTED) 공정성 지표를 낸다(Score:)"
  - "EU AI Act 위험 등급에 매핑한다(MAPPED)"
  - "고위험 의무 체크리스트로 배포를 판정한다(GATE)"
  - "투명성(TRANSPARENT)·책임/데이터 최소화(MINIMIZED)를 구현한다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
