lab_id: ai-safety-week12
title: "W12 — AI 윤리와 규제: 편향·PII·투명성·프레임워크 매핑"
version: ai
course: ai-safety
week: 12
description: |
  el34 GPU Ollama 로 AI 거버넌스를 실습한다. 윤리 원칙을 점검 가능한 통제로 바꾼다 — 편향 측정
  (BIAS_DETECTED)·PII 마스킹(REDACTED)·투명성 체크리스트(TRANSPARENT)·규제 프레임워크 매핑(MAPPED).
  기술 방어를 넘어 공정성·투명성·책임·프라이버시를 다룬다.
difficulty: medium
duration_minutes: 120
audience: AI Safety (12주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (gemma3:4b)
  - W12 강의안 정독 — 윤리 원칙, 편향, PII, EU AI Act/NIST AI RMF
objectives:
  - "집단별 결과 차이로 편향을 측정한다"
  - "PII 를 탐지하고 마스킹한다"
  - "투명성 체크리스트를 점검한다"
  - "거버넌스 공백을 감사한다"
  - "통제를 규제 프레임워크에 매핑한다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 모델 가동 확인
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"What is AI fairness in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"What is AI fairness in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "공정성 = 집단 간 차별 없는 결과."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout
      semantic: {intent: "도입", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## 🎯 미션 — 윤리 리스크 시나리오
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are an AI governance expert."},{"role":"user","content":"Scenario: a biased hiring model causes discrimination. Risk, regulatory impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are an AI governance expert."},{"role":"user","content":"Scenario: a biased hiring model causes discrimination. Risk, regulatory impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
    answer_detail: "편향 모델의 차별 시나리오."
    verify:
      type: output_contains
      expect: CHAT_OK
      field: stdout
      semantic: {intent: "시나리오", success_criteria: ["시나리오"]}

  - order: 3
    instruction: |
      ## 🎯 미션 — 편향 측정 (BIAS_DETECTED)

      같은 자격의 입력이 집단별로 다른 결과를 받는지 측정한다(disparity).

      ## 💻 실행 명령
      ```bash
      python3 -c "
      results={'groupA':[1,1,1,0],'groupB':[1,0,0,0]}  # 1=합격
      rate={g:sum(v)/len(v) for g,v in results.items()}
      disparity=abs(rate['groupA']-rate['groupB'])
      print('=== Bias Audit ===')
      for g,r in rate.items(): print(f'  {g}: pass rate {r:.2f}')
      print(f'disparity={disparity:.2f} (threshold 0.2)')
      print('BIAS_DETECTED' if disparity>0.2 else 'fair')"
      ```
      ## ✅ 합격 기준
      집단 간 차이가 커서 `BIAS_DETECTED` 가 출력된다.
    hint: '집단별 합격률 차이(disparity) 측정'
    answer: |
      python3 -c "
      results={'groupA':[1,1,1,0],'groupB':[1,0,0,0]}
      rate={g:sum(v)/len(v) for g,v in results.items()}
      disparity=abs(rate['groupA']-rate['groupB'])
      print('=== Bias Audit ===')
      for g,r in rate.items(): print(f'  {g}: pass rate {r:.2f}')
      print(f'disparity={disparity:.2f} (threshold 0.2)')
      print('BIAS_DETECTED' if disparity>0.2 else 'fair')"
    answer_detail: "groupA 0.75 vs groupB 0.25 = disparity 0.5 → 편향. 집단별 결과 측정이 공정성 점검의 기본."
    verify:
      type: output_contains
      expect: BIAS_DETECTED
      field: stdout
      semantic: {intent: "편향 측정", success_criteria: ["disparity 측정"]}

  - order: 4
    instruction: |
      ## 🎯 미션 — PII 탐지·마스킹 (REDACTED)

      텍스트에서 개인식별정보(이메일·전화·주민번호)를 탐지해 마스킹한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "import re
      text='Contact john@acme.com or 010-1234-5678, SSN 900101-1234567 for support.'
      pats=[(r'[\\w.]+@[\\w.]+','[EMAIL]'),(r'\\d{2,3}-\\d{3,4}-\\d{4}','[PHONE]'),(r'\\d{6}-\\d{7}','[SSN]')]
      red=text
      for p,tag in pats: red=re.sub(p,tag,red)
      print('original:', text)
      print('redacted:', red)
      print('REDACTED' if '[EMAIL]' in red and '[SSN]' in red else 'EXPOSED')"
      ```
      ## ✅ 합격 기준
      PII 가 마스킹돼 `REDACTED` 가 출력된다.
    hint: '이메일/전화/주민번호 정규식 마스킹'
    answer: |
      python3 -c "import re
      text='Contact john@acme.com or 010-1234-5678, SSN 900101-1234567 for support.'
      pats=[(r'[\\w.]+@[\\w.]+','[EMAIL]'),(r'\\d{2,3}-\\d{3,4}-\\d{4}','[PHONE]'),(r'\\d{6}-\\d{7}','[SSN]')]
      red=text
      for p,tag in pats: red=re.sub(p,tag,red)
      print('original:', text)
      print('redacted:', red)
      print('REDACTED' if '[EMAIL]' in red and '[SSN]' in red else 'EXPOSED')"
    answer_detail: "PII(이메일/전화/주민번호) 탐지·마스킹 → REDACTED. 프라이버시 최소화의 기본. RAG/로그/출력에 적용."
    verify:
      type: output_contains
      expect: REDACTED
      field: stdout
      semantic: {intent: "PII 마스킹", success_criteria: ["PII 탐지·마스킹"]}

  - order: 5
    instruction: |
      ## 🎯 미션 — 투명성 체크리스트 (TRANSPARENT)

      투명성 요건(AI 고지·근거 제시·결정 로그)을 점검한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "
      system={'ai_disclosure':True,'cite_sources':True,'decision_log':True,'human_appeal':True}
      missing=[k for k,v in system.items() if not v]
      print('=== Transparency Checklist ===')
      for k,v in system.items(): print(f'  [{\"x\" if v else \" \"}] {k}')
      print('TRANSPARENT' if not missing else f'GAPS: {missing}')"
      ```
      ## ✅ 합격 기준
      투명성 요건이 충족돼 `TRANSPARENT` 가 출력된다.
    hint: 'AI 고지·근거·결정로그·이의제기 체크'
    answer: |
      python3 -c "
      system={'ai_disclosure':True,'cite_sources':True,'decision_log':True,'human_appeal':True}
      missing=[k for k,v in system.items() if not v]
      print('=== Transparency Checklist ===')
      for k,v in system.items(): print(f'  [{\"x\" if v else \" \"}] {k}')
      print('TRANSPARENT' if not missing else f'GAPS: {missing}')"
    answer_detail: "AI 고지+근거 제시+결정 로그+이의제기 모두 충족 → TRANSPARENT. 투명성·책임을 점검 가능한 통제로."
    verify:
      type: output_contains
      expect: TRANSPARENT
      field: stdout
      semantic: {intent: "투명성 점검", success_criteria: ["요건 충족"]}

  - order: 6
    instruction: |
      ## 🎯 미션 — 거버넌스 공백 감사
      ## 💻 실행 명령
      ```bash
      python3 -c "import json, urllib.request
      sys_desc='High-risk AI hiring tool: no bias testing, no AI disclosure, no human oversight, PII stored in plaintext.'
      data=json.dumps({'model':'gemma3:4b','messages':[{'role':'system','content':'You are an AI governance auditor (EU AI Act/NIST). Find compliance gaps.'},{'role':'user','content':'Analyze: '+sys_desc}],'stream':False,'options':{'num_predict':100}}).encode()
      req=urllib.request.Request('http://211.170.162.139:10934/api/chat',data=data,headers={'Content-Type':'application/json'})
      print('Analysis:', json.loads(urllib.request.urlopen(req).read())['message']['content'][:200])"
      ```
      ## ✅ 합격 기준
      `Analysis:` 와 분석이 출력된다.
    hint: '거버넌스 감사자로 컴플라이언스 갭 분석'
    answer: |
