lab_id: ai-safety-week03
title: "W03 — 프롬프트 인젝션 고급: 인코딩·분할 우회와 정규화 방어"
version: ai
course: ai-safety
week: 3
description: |
  el34 GPU Ollama 로 고급 인젝션 우회를 실습한다. base64 인코딩·페이로드 분할이 단순 키워드 필터를
  우회함(BYPASS)을 보이고, 정규화(디코딩+소문자+공백제거) 후 검사로 우회를 잡으며(DETECTED), 다중
  우회를 등급 탐지(CRITICAL)한다. 우회 시연/방어는 결정적 로직, 시나리오/감사는 LLM.
difficulty: medium
duration_minutes: 120
audience: AI Safety 입문 (3주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W03 강의안 정독 — 인코딩/분할/다국어 우회, 정규화, 의미 기반 탐지
objectives:
  - "base64/분할 인젝션이 단순 키워드 필터를 우회함을 보인다"
  - "정규화 후 검사로 우회를 탐지한다"
  - "다중 우회를 등급별로 탐지한다"
  - "고급 우회 노출을 감사한다"
  - "보고서를 만든다"
pass_threshold: 0.6

