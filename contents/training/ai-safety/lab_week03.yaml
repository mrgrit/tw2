      print('=== Multi-evasion Detection ===')
      for t in inputs: print(f'  [{score(t):9s}] {t[:34]}')"
    answer_detail: "정규화 후 평문/base64 변형 모두 탐지. ignore+previous=CRITICAL. 표현 변형에 강건."
    verify:
