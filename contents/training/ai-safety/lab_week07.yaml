      semantic: {intent: "학습 파이프라인 감사", success_criteria: ["위험 식별"]}

  - order: 7
    instruction: |
      ## 🎯 미션 — 라벨 충돌/이상 탐지 (FLAGGED)

      같은(유사) 입력에 다른 라벨이 붙은 충돌을 이상으로 탐지한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "
      dataset=[('login failed','negative'),('login failed','positive'),('great service','positive'),('great service','positive')]
      from collections import defaultdict
      seen=defaultdict(set)
      for s,lab in dataset: seen[s].add(lab)
      conflicts=[s for s,labs in seen.items() if len(labs)>1]
      print('=== Anomaly Detection ===')
      for s,labs in seen.items(): print(f'  {\"[CONFLICT]\" if len(labs)>1 else \"[ok]      \"} {s[:24]} labels={labs}')
      print('FLAGGED' if conflicts else 'clean')"
      ```
      ## ✅ 합격 기준
      라벨 충돌이 `FLAGGED` 된다.
    hint: '같은 입력 다른 라벨 = 충돌 탐지'
    answer: |
      python3 -c "
      dataset=[('login failed','negative'),('login failed','positive'),('great service','positive'),('great service','positive')]
      from collections import defaultdict
      seen=defaultdict(set)
      for s,lab in dataset: seen[s].add(lab)
      conflicts=[s for s,labs in seen.items() if len(labs)>1]
      print('=== Anomaly Detection ===')
      for s,labs in seen.items(): print(f'  {\"[CONFLICT]\" if len(labs)>1 else \"[ok]      \"} {s[:24]} labels={labs}')
      print('FLAGGED' if conflicts else 'clean')"
    answer_detail: "같은 입력('login failed')에 negative+positive = 라벨 충돌(오염 신호) → FLAGGED. 이상 탐지로 오염 후보 식별."
    verify:
      type: output_contains
      expect: FLAGGED
      field: stdout
      semantic: {intent: "라벨 충돌 탐지", success_criteria: ["충돌 식별"]}

