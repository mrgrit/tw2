lab_id: ai-safety-week11
title: "W11 — RAG 보안: 지식 오염·컨텍스트 인젝션·문서 검증"
version: ai
course: ai-safety
week: 11
description: |
  el34 GPU Ollama 로 RAG 보안을 다룬다. 지식 저장소에 악성 문서를 심고(POISONED), 검색된 문서의 숨은 지시로
  모델을 탈취(INJECTED)하며, ASR을 측정한다. 방어로 간접 인젝션 탐지(DETECTED)·문서 검증 파이프라인(VALIDATED)·
  신뢰 경계 격리(DEFENDED)를 구현한다. bastion E.G(=RAG) 오염 방어와 연결. ⚠️ 인가된 el34 격리 환경에서만.
difficulty: medium
duration_minutes: 120
audience: AI Safety (11주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, pw `1`), GPU Ollama 도달(ccc-vulnerable:4b, ccc-unsafe:2b)
  - W11 강의안 정독 — §2 지식 오염, §3 컨텍스트 인젝션, §4 문서 검증
objectives:
  - "지식 저장소에 악성 문서를 삽입한다(POISONED)"
  - "RAG 컨텍스트 인젝션으로 모델을 탈취한다(INJECTED)"
  - "오염/인젝션 ASR을 측정한다"
  - "간접 인젝션 탐지(DETECTED)·문서 검증(VALIDATED)·신뢰 경계 격리(DEFENDED)로 방어한다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 모델 호출 확인
      > **이 단계에서 할 일:** `ccc-vulnerable:4b` 응답 확인.
      > **왜:** RAG 컨텍스트 인젝션(STEP 3)이 GPU 호출을 쓴다.

      ### ▷ 그대로 입력
      **실행 위치:** el34 **호스트**. GPU Ollama = `http://211.170.162.139:10934`.
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Say READY.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      READY
      GEN_OK
      ```

      ### ▷ 결과 해석
      `GEN_OK` = 호출 정상.
    hint: 'curl /api/generate → GEN_OK'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Say READY.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "GPU 도달 확인."
    verify:
