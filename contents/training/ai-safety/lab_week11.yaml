      data=json.dumps({'model':'gemma3:4b','messages':[{'role':'system','content':'You are an AI safety auditor. Find RAG risks.'},{'role':'user','content':'Analyze this RAG pipeline: '+design}],'stream':False,'options':{'num_predict':100}}).encode()
      req=urllib.request.Request('http://211.170.162.139:10934/api/chat',data=data,headers={'Content-Type':'application/json'})
      print('Analysis:', json.loads(urllib.request.urlopen(req).read())['message']['content'][:200])"
      ```
      ## ✅ 합격 기준
      `Analysis:` 와 분석이 출력된다.
    hint: '감사자로 RAG 파이프라인 분석'
    answer: |
