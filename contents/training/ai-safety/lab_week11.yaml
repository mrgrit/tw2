  - order: 7
    instruction: |
      ## 🎯 미션 — 출처 검증 (REJECTED)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      TRUSTED={'official-docs','vendor-kb','internal-wiki'}
      docs=[('official-docs','TLS guide'),('random-pastebin','??? advice'),('vendor-kb','patch notes')]
      print('=== Source Provenance ===')
      for src,t in docs:
          print(f'  [{\"ACCEPT\" if src in TRUSTED else \"REJECTED\"}] {src}: {t}')"
      ```
      ## ✅ 합격 기준
      미신뢰 출처 문서가 `REJECTED` 된다.
    hint: '신뢰 출처 allowlist'
    answer: |
