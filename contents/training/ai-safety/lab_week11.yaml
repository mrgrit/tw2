lab_id: ai-safety-week11
title: "W11 — RAG 보안: 지식 오염·간접 인젝션과 문맥 격리·출처 검증"
version: ai
course: ai-safety
week: 11
description: |
  el34 GPU Ollama 로 RAG 보안을 실습한다. 오염된 지식 문서를 탐지하고(POISONED), 검색 문서 속 숨은
  지시가 따라짐(INJECTED)을 보이며, 문맥 격리로 간접 인젝션을 막고(DEFENDED), 출처 검증으로 오염
  문서를 거부(REJECTED)한다. 검색을 신뢰하지 않고 검증하는 것이 핵심.
difficulty: medium
duration_minutes: 120
audience: AI Safety (11주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W11 강의안 정독 — 지식 오염, 간접 인젝션, 문맥 격리, 출처 검증
objectives:
  - "지식베이스의 오염 문서를 탐지한다"
  - "검색 문서 속 숨은 지시가 따라짐을 확인한다"
  - "문맥 격리로 간접 인젝션을 막는다"
  - "출처 검증으로 오염 문서를 거부한다"
  - "RAG 파이프라인을 감사하고 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 모델 가동 확인
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is RAG knowledge poisoning in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ## ✅ 합격 기준
      `GEN_OK` 가 출력된다.
    hint: 'curl /api/generate'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is RAG knowledge poisoning in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "RAG 오염 = 지식베이스에 거짓/악성 문서."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout
      semantic: {intent: "도입", success_criteria: ["호출 성공"]}

  - order: 2
    instruction: |
      ## 🎯 미션 — RAG 위협 시나리오
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: a poisoned document in a RAG store injects instructions into the agent. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
      ```
      ## ✅ 합격 기준
      `CHAT_OK` 가 출력된다.
    hint: 'curl /api/chat'
    answer: |
      curl -s http://211.170.162.139:10934/api/chat \
        -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a cybersecurity scenario generator."},{"role":"user","content":"Scenario: a poisoned document in a RAG store injects instructions into the agent. Attack vector, impact, mitigation."}],"stream":false,"options":{"num_predict":120}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin)['message']['content']; print(r); print('CHAT_OK' if r.strip() else 'CHAT_EMPTY')"
    answer_detail: "오염 문서 간접 인젝션 시나리오."
    verify:
