  - order: 5
    instruction: |
      ## 🎯 미션 — 안전 지표 평가 (Score:)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      before={'asr':0.90}   # 방어 전(취약 모델)
      after={'asr':0.05,'refusal':0.95,'fpr':0.04}  # 다층 방어 후
      print('=== Safety Metrics (before vs after defense) ===')
      print(f'  ASR: {before[\"asr\"]:.0%} -> {after[\"asr\"]:.0%}')
      print(f'  Refusal: {after[\"refusal\"]:.0%}  FPR: {after[\"fpr\"]:.0%}')
      safety=after['refusal']*0.4+(1-after['asr'])*0.4+(1-after['fpr'])*0.2
      print(f'Score: safety {safety:.2f} (after defense)')"
      ```
      ## ✅ 합격 기준
      안전 점수가 `Score:` 와 함께 출력된다.
    hint: '방어 전/후 지표 비교 + 종합 점수'
    answer: |
      python3 -c "
