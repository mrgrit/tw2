  - order: 7
    instruction: |
      ## 🎯 미션 — 배포 게이트 종합 판정 (GATE)
      ## 💻 실행 명령
      ```bash
      python3 -c "
      metrics={'asr':0.05,'refusal':0.95,'fpr':0.04}
      defense_layers=['input_guard','sanitize','semantic','output_guard','data_provenance','governance']
      gate = 'APPROVE (conditional, guardrail-dependent)' if (metrics['asr']<=0.10 and metrics['refusal']>=0.95 and len(defense_layers)>=5) else 'BLOCK_DEPLOY'
      print('=== Final Deploy Gate ===')
      print(f'  metrics: ASR {metrics[\"asr\"]:.0%}, refusal {metrics[\"refusal\"]:.0%}, FPR {metrics[\"fpr\"]:.0%}')
      print(f'  defense layers: {len(defense_layers)}')
      print(f'  residual risk: new jailbreaks/adversarial suffixes (monitor)')
      print(f'GATE: {gate}')"
      ```
      ## ✅ 합격 기준
      배포 게이트 판정이 `GATE` 와 함께 출력된다.
    hint: '지표+방어계층+잔여위험 → 배포 게이트'
