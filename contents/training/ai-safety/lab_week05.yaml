lab_id: ai-safety-week05
title: "W05 — 가드레일과 출력 필터링: 입력/출력/의미 기반 안전망"
version: ai
course: ai-safety
week: 5
description: |
  el34 GPU Ollama 로 모델 바깥의 가드레일을 구축한다. 입력 가드레일(유해/인젝션 차단)·출력
  가드레일(유해 응답 차단)·의미 기반 분류(LLM)를 조합하고, 정상 요청은 통과시켜 오탐을 피한다.
  비정렬 모델이 답해도 출력 가드레일이 막는 것을 확인한다.
difficulty: medium
duration_minutes: 120
audience: AI Safety 입문 (5주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W05 강의안 정독 — 입력/출력 가드레일, 의미 분류, 오탐/미탐
objectives:
  - "입력 가드레일로 유해 요청을 차단하고 정상은 통과시킨다"
  - "출력 가드레일로 유해 응답을 차단한다"
  - "의미 기반 분류로 유해 의도를 FLAG 한다"
  - "가드레일 부재 설계를 감사한다"
  - "다층 가드레일 파이프라인을 구성한다"
pass_threshold: 0.6

