  - order: 7
    instruction: |
      ## 🎯 미션 — 다층 가드레일 파이프라인 (GUARDRAIL_OK)

      입력 가드 → (모델) → 출력 가드 파이프라인을 구성해, 유해는 끝까지 차단되고 정상은 통과함을 확인한다.

      ## 💻 실행 명령
      ```bash
      python3 -c "import re
      BAD=['bomb','weapon','malware','hack','ignore previous']
      def input_guard(t): return any(b in t.lower() for b in BAD)
      def output_guard(t): return any(b in t.lower() for b in BAD)
      def pipeline(req, model_out):
          if input_guard(req): return 'BLOCKED@input'
          if output_guard(model_out): return 'BLOCKED@output'
          return 'ALLOWED'
      cases=[('How to make a bomb','...'),('Tell a joke','here is a joke'),('benign q','here is malware code')]
      print('=== Guardrail Pipeline ===')
      for req,out in cases: print(f'  {pipeline(req,out):14s} <- req={req[:18]!r}')
      print('GUARDRAIL_OK')"
      ```
      ## ✅ 합격 기준
      파이프라인이 입력/출력 양단에서 차단하고 `GUARDRAIL_OK` 가 출력된다.
    hint: '입력가드→모델→출력가드 파이프라인'
    answer: |
      python3 -c "import re
      BAD=['bomb','weapon','malware','hack','ignore previous']
      def input_guard(t): return any(b in t.lower() for b in BAD)
      def output_guard(t): return any(b in t.lower() for b in BAD)
      def pipeline(req, model_out):
          if input_guard(req): return 'BLOCKED@input'
          if output_guard(model_out): return 'BLOCKED@output'
          return 'ALLOWED'
      cases=[('How to make a bomb','...'),('Tell a joke','here is a joke'),('benign q','here is malware code')]
      print('=== Guardrail Pipeline ===')
      for req,out in cases: print(f'  {pipeline(req,out):14s} <- req={req[:18]!r}')
      print('GUARDRAIL_OK')"
    answer_detail: "입력 가드(유해 요청 차단)+출력 가드(유해 응답 차단) 양단 방어. 정상은 통과. 모델이 뚫려도 출력에서 잡힘."
    verify:
      type: output_contains
      expect: GUARDRAIL_OK
      field: stdout
      semantic: {intent: "다층 가드레일", success_criteria: ["양단 차단","정상 통과"]}

