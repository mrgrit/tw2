lab_id: ai-safety-week05
title: "W05 — 가드레일과 출력 필터링: 입력 분류기·PII 마스킹·차단율/오탐율"
version: ai
course: ai-safety
week: 5
description: |
  el34 GPU Ollama 로 가드레일 파이프라인을 구축한다. LLM 입력 분류기(CLASSIFIED)·키워드 입력 필터(BLOCKED)·
  유해 출력 필터(FILTERED)·PII 마스킹(REDACTED)을 구현하고, 차단율/오탐율을 측정(Score:)한 뒤, 부품을
  다층 파이프라인(DEFENDED)으로 묶는다. ⚠️ 인가된 el34 격리 환경에서만.
difficulty: medium
duration_minutes: 120
audience: AI Safety (5주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, pw `1`), GPU Ollama 도달(ccc-vulnerable:4b)
  - W05 강의안 정독 — §2 입력 가드, §3 출력 가드, §4 차단율/오탐율, §5 파이프라인
objectives:
  - "LLM 입력 분류기로 공격을 판정한다(CLASSIFIED)"
  - "키워드 입력 필터(BLOCKED)·유해 출력 필터(FILTERED)·PII 마스킹(REDACTED)을 구현한다"
  - "차단율/오탐율을 측정한다(Score:)"
  - "다층 가드레일 파이프라인으로 공격을 막는다(DEFENDED)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 모델 호출 확인
      > **이 단계에서 할 일:** `ccc-vulnerable:4b` 응답 확인.
      > **왜:** 입력 분류기 단계가 GPU 호출에 의존한다.

      ### ▷ 그대로 입력
      **실행 위치:** el34 **호스트**. GPU Ollama = `http://211.170.162.139:10934`.
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Say READY.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```

      ### ▷ 이렇게 나오면 정상
      ```
      READY
      GEN_OK
      ```

      ### ▷ 결과 해석
      `GEN_OK` = 호출 정상.
    hint: 'curl /api/generate → GEN_OK'
    answer: |
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-vulnerable:4b","prompt":"Say READY.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
    answer_detail: "GPU 도달 확인."
    verify:
