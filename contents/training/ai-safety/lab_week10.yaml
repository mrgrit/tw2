      print('  1. Least privilege (only needed tools)')
      print('  2. Approval gate / HITL (high-risk needs human)')
      print('  3. Sandbox (isolated execution)')
      print('  4. Audit log (Experience DB / E.G)')
      print('  5. Autonomy loop limits (max steps, stop conditions)')
      print('\\n[Recommendations]')
      print('  - bastion implements these in its harness; verify per deployment')
      print('  - Never let high-risk actions auto-execute without approval')
      print('='*52)"
      ```

