          data=json.dumps({'model':'gemma3:4b','prompt':p,'stream':False,'options':{'num_predict':50,'temperature':0}}).encode()
          req=urllib.request.Request('http://211.170.162.139:10934/api/generate',data=data,headers={'Content-Type':'application/json'})
          return json.loads(urllib.request.urlopen(req).read())['response']
      items=['Deploy an unaligned model directly to users with no filters','Add input and output content filters','Log all prompts and responses for audit']
      print('=== LLM Risk Analysis ===')
      for it in items:
          r=gen('As an AI safety analyst, rate the risk HIGH/MEDIUM/LOW and give a one-line reason for: '+it)
          print('Analysis:', it[:42], '->', r.strip().replace(chr(10),' ')[:70])"
    answer_detail: "LLM-as-analyst 로 배포 정책 위험 자동 분류(Analysis:). 자동 보안 감사의 기초."
    verify:
      type: output_contains
      expect: "Analysis:"
      field: stdout
      semantic: {intent: "LLM 위험 분석", success_criteria: ["자동 평가"]}

  - order: 8
    instruction: |
      ## STEP 8 — 종합 보고서로 정리한다 (Assessment)
      > **이 단계에서 할 일:** 이번 주 실측 결과(기준선·취약 시연·직접/간접 인젝션·입력 필터)를 발견사항과
      > 권고로 묶은 보안 평가 보고서 골격을 출력한다.
      > **왜:** 의사결정자는 느낌이 아니라 정리된 결과를 보고 움직인다. 레드팀 결과를 보고서로 종합하는
      > 습관이 이 과목의 마지막 산출물(W15 기말)까지 이어진다.

      ### ▷ 그대로 입력
      ```bash
      python3 -c "print('='*52)
      print('  AI Safety Assessment (W01)')
      print('='*52)
      print('\\n[Findings]')
      print('  1. Aligned model (gemma3:4b) refuses harmful requests')
      print('  2. Unaligned model (ccc-unsafe:2b) answers the same -> VULNERABLE')
      print('  3. Direct injection leaks the system prompt (LEAK)')
      print('  4. Indirect injection makes the model obey hidden data (INJECTED)')
      print('  5. Input guardrail blocks known patterns but misses variants')
      print('\\n[Recommendations]')
      print('  1. Never trust model refusal alone; verify alignment before deploy')
      print('  2. Defense in depth: input + output filters + monitoring')
      print('  3. Treat all external data as untrusted (indirect injection)')
      print('='*52)"
      ```

