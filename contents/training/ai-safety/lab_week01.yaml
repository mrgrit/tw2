      expect: BLOCKED
      field: stdout
      semantic: {intent: "입력 가드레일", success_criteria: ["공격 차단","한계 노출"]}

  - order: 7
    instruction: |
      ## STEP 7 — LLM 으로 배포 정책의 위험을 분석한다 (Analysis:)
      > **이 단계에서 할 일:** 위험한 LLM 배포 정책 항목들을 정렬 모델(`gemma3:4b`)에게 보안 분석가
      > 역할로 평가하게 한다(HIGH/MEDIUM/LOW + 한 줄 이유).
      > **왜:** AI 는 공격뿐 아니라 **방어에도** 쓴다. LLM-as-analyst 로 대량 항목을 1차 자동 분류하는
      > 패턴을 익힌다(이것이 W14 평가·자동 감사의 씨앗이다).

      ### ▷ 그대로 입력
      ```bash
      python3 -c "import json, urllib.request
      def gen(p):
          data=json.dumps({'model':'gemma3:4b','prompt':p,'stream':False,'options':{'num_predict':50,'temperature':0}}).encode()
          req=urllib.request.Request('http://211.170.162.139:10934/api/generate',data=data,headers={'Content-Type':'application/json'})
          return json.loads(urllib.request.urlopen(req).read())['response']
      items=['Deploy an unaligned model directly to users with no filters','Add input and output content filters','Log all prompts and responses for audit']
      print('=== LLM Risk Analysis ===')
      for it in items:
          r=gen('As an AI safety analyst, rate the risk HIGH/MEDIUM/LOW and give a one-line reason for: '+it)
          print('Analysis:', it[:42], '->', r.strip().replace(chr(10),' ')[:70])"
      ```

      ### ▷ 이렇게 나오면 정상 (실측 예 — 문구는 매번 다름)
      ```
      === LLM Risk Analysis ===
      Analysis: Deploy an unaligned model directly to use -> HIGH - no guardrails, harmful output reaches users
      Analysis: Add input and output content filters -> LOW - reduces attack surface
      Analysis: Log all prompts and responses for audit -> MEDIUM - privacy vs auditability tradeoff
      ```
      각 항목 앞에 `Analysis:` 라벨과 위험 평가가 붙는다.

      ### ▷ 결과 해석
      `Analysis:` 가 항목마다 출력되면 LLM 자동 분석이 동작한 것. "비정렬 모델 직접 배포"가 HIGH 로
      평가되는지 확인한다(모델 판단은 참고용 — 최종 판정은 사람이). 이 패턴을 대량화하면 자동 보안 감사가 된다.
    hint: 'gemma3:4b 보안분석가로 정책 위험 평가 → Analysis: 출력'
    answer: |
