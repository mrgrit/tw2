lab_id: ai-safety-week01
title: "W01 — AI Safety 개론: 취약 모델 시연·출력 가드레일·탈옥 탐지"
version: ai
course: ai-safety
week: 1
description: |
  el34 GPU Ollama 로 AI Safety 의 출발을 실습한다. 취약 모델(ccc-unsafe:2b)이 유해/탈옥 요청에
  응답함(VULNERABLE/JAILBROKEN)을 확인하고, 모델의 거부에만 기대지 않는 출력 가드레일(유해 응답
  BLOCKED)과 탈옥 프롬프트 패턴 탐지(CRITICAL)를 구현한다. ⚠️ 방어 학습용·인가 격리장 한정.
difficulty: easy
duration_minutes: 120
audience: AI Safety 입문 (1주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (`curl -s http://211.170.162.139:10934/api/tags`) — ccc-unsafe:2b, gemma3:4b
  - W01 강의안 정독 — 정렬, 비정렬 모델, 가드레일, 탈옥
objectives:
  - "취약 모델(ccc-unsafe:2b)이 유해 요청에 응답함을 확인한다"
  - "탈옥 프롬프트로도 응답함을 확인한다"
  - "출력 가드레일로 유해 응답을 차단한다"
  - "탈옥 프롬프트 패턴을 탐지한다"
  - "AI 배포 정책을 감사하고 보고서를 만든다"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 취약 모델 가동 확인
      취약 모델 ccc-unsafe:2b 에 일반 질문을 보내 응답을 받는다(모델 도달 확인).
      ## 💻 실행 명령
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"ccc-unsafe:2b","prompt":"What is AI safety in one sentence?","stream":false,"options":{"num_predict":50}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
