lab_id: ai-safety-week14
title: "W14 — AI Safety 평가 프레임워크: 지표·회귀·스코어카드"
version: ai
course: ai-safety
week: 14
description: |
  el34 GPU Ollama 로 안전 평가 프레임워크를 실습한다. 벤치마크로 공격 성공률(ASR)을 측정하고
  (BENCHMARK), 거부율·ASR·오탐율 지표를 계산하며(Score:), 버전 비교로 회귀를 탐지(REGRESSION)하고
  스코어카드로 배포 게이트를 판정(GATE)한다. "측정할 수 없으면 개선할 수 없다."
difficulty: medium
duration_minutes: 120
audience: AI Safety (14주차)
prerequisites:
  - el34 호스트 접속 가능 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - el34 호스트에서 GPU Ollama 도달 (ccc-unsafe:2b, gemma3:4b)
  - W14 강의안 정독 — 안전 지표, 벤치마크, 회귀, 스코어카드
objectives:
  - "벤치마크로 공격 성공률을 측정한다"
  - "거부율·ASR·오탐율 지표를 계산한다"
  - "버전 비교로 회귀를 탐지한다"
  - "평가 프레임워크 공백을 감사한다"
  - "스코어카드로 배포 게이트를 판정한다"
pass_threshold: 0.6

steps:

