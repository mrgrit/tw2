      문법 검증 → 적용 → 정리(삭제)까지 한 흐름으로 다룬다.

      ## 📖 개념 한 줄
      "차단 먼저, 분석 나중"(W09). 비콘이 살아 있는 동안 공격자는 계속 명령을 내려 피해를 키우므로,
      완벽한 분석을 기다리기보다 통신을 먼저 끊어 출혈을 멈춘다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      # 1) C2 차단 룰 추가 — 목적지 포트 45511 겨냥(alert, sid 9511001)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert ip any any -> any 45511 (msg:\"SOC W11 C2 beacon block\"; sid:9511001; rev:1;)
      EOF"
      # 2) 적용 전 룰 문법 테스트(-T) — 깨진 룰을 라이브에 안 넣기
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -1
      # 3) 재시작 없이 룰 무중단 재적용
      sudo suricatasc -c reload-rules >/dev/null
      # 4) self-clean — 차단 룰 삭제 + reload + 잔재 0 확인
      sudo sed -i "/sid:9511001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo "C2 차단룰 rule_removed (잔재=$(grep -c 9511001 /etc/suricata/rules/local.rules))"
      ```
      - 룰 구조 `alert ip any any -> any 45511` 은 목적지 포트 45511 트래픽을 잡는다(운영은 `alert` 대신 `drop`). `suricata -T` 문법 테스트 → `reload-rules` 무중단 적용 → `sed`+reload self-clean.

      ## ✅ 합격 기준
