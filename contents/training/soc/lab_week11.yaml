lab_id: standalone-soc-week11
title: "악성코드 감염 — C2 비콘을 IOC로 잡고 호스트를 격리하기"
version: standalone-soc
course: soc
week: 11
description: |
  악성코드의 가장 큰 약점은 C2(Command & Control, 공격자의 원격 통제 서버)에 주기적으로 거는 외부 통신
  — 비콘(beaconing)이다. 본 실습은 그 비콘을 IOC(Indicator of Compromise, 재사용 가능한 침해 지표)로
  잡아 감염 호스트를 격리하는 악성코드 IR(사고 대응)을 끝까지 수행한다. 흐름은 W09의 IR 라이프사이클
  (식별 → 격리 → 제거 → 복구)을 악성코드에 그대로 적용한 것이다 — (1) el34 web 호스트에 악성 프로세스
  (cmdline 표식 c2_beacon)와 C2 채널(비표준 포트 45511)을 안전하게 재현하고, (2) osquery(OS를 SQL
  테이블로 조회하는 스냅샷 도구)로 프로세스 cmdline(호스트 IOC)과 외부 연결(네트워크 IOC)을 추출하고,
  (3) 같은 C2 채널을 키로 감염 범위를 헌팅하고, (4) Suricata 차단 룰(sid 9511001)로 C2 통신을 끊어
  악성코드를 무력화하고, (5) 악성 프로세스를 제거(잔재 0 검증)한 뒤, 뽑은 IOC를 CDB list/MISP 공유
  형식으로 정리해 조직 전체 자동 탐지(W12 인텔)로 잇는다.
  탐지의 두 눈 — osquery(스냅샷: 지금 떠 있는 것)와 Sysmon for Linux(이벤트 스트림: 그 순간) — 가
  보완 관계임을 점검에서 확인한다. Sysmon은 el34 호스트(192.168.0.151)에 eBPF 센서로 설치돼 컨테이너
  내부까지 보므로, 점검의 systemctl is-active sysmon은 호스트에서 실행한다. 악성코드와 차단 룰은
  self-clean — 실습이 만든 프로세스·룰을 끝에 스스로 지워 공유 인프라를 보존한다. 모든 명령은 el34
  호스트(`ssh ccc@192.168.0.151`)에서 docker exec로 실행한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W07(osquery 스냅샷)·W09(IR 라이프사이클) 통과"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec"
  - "lecture §1(C2·비콘) §2(IOC 추출) §3(헌팅) §4(격리) §5(제거·복구·IOC 공유) 숙지"
objectives:
  - "C2 비콘의 개념(감염 호스트가 공격자 서버에 거는 주기적 외부 통신)을 설명하고, 비콘이 왜 악성코드의 약점이자 탐지 기회인지 근거를 댄다"
  - "네트워크 IOC(C2 포트·비콘 주기)와 호스트 IOC(악성 프로세스 cmdline·해시)를 구분하고, osquery로 각각을 추출한다"
  - "확보한 C2 채널(포트 45511)을 키로 감염 범위를 헌팅해 확산 여부를 판정한다"
  - "W09의 IR 절차를 적용해 Suricata 차단 룰(sid 9511001)로 C2 비콘을 끊고, 악성 프로세스를 제거(잔재 0)한다"
  - "추출한 IOC를 CDB list/MISP 공유 형식으로 정리해 조직 전체 자동 탐지(W12 인텔)로 잇고, 악성코드 IR 보고서로 종합한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 호스트를 볼 두 눈이 살아 있나
      악성코드 탐지의 전제는 호스트 가시화 도구가 준비돼 있는 것이다 — ① osquery(OS를 SQL 테이블로
      조회하는 스냅샷 도구, "지금 떠 있는 것"을 본다)와 ② Sysmon for Linux(eBPF 이벤트 스트림, "그
      순간"을 본다)다. 분석 착수 전 30초 가용성 점검이다.

      ## 📖 개념 한 줄
      두 도구는 경쟁이 아니라 보완이다 — 떠 있는 악성 프로세스·열린 C2 포트는 osquery 스냅샷이, 잠깐
      떴다 사라지는 인코딩 명령은 Sysmon 이벤트가 잡는다. 여기에 네트워크의 Suricata가 더해져 비콘이
      또렷이 보인다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** osquery 는 `el34-web`, sysmon 점검은 el34 호스트(컨테이너 아님).

      ```bash
      # ── el34-web 에서: osquery 동작 확인(스냅샷 도구, "지금 떠 있는 것") ──
      osqueryi --version
      # ── el34 호스트에서: Sysmon 데몬 active 확인(eBPF 이벤트 스트림, "그 순간") ──
      systemctl is-active sysmon
      # 악성코드 대응 세 시각 요약
      echo "악성코드 대응: osquery(프로세스/연결) + sysmon(NetworkConnect) + Suricata(C2 시그니처)"
      ```
      - osquery 는 컨테이너 안, Sysmon 은 eBPF 권한 문제로 el34 호스트(192.168.0.151)에 설치돼 컨테이너 내부 행위까지 포착(그래서 점검도 호스트에서).

      ## ✅ 합격 기준
      `5.23` 출력 시 통과. **근거:** osquery 버전(5.23대)이 출력되고 sysmon 이 active 면 스냅샷
      (osquery)·이벤트 스트림(Sysmon) 두 눈이 준비된 것 — Sysmon 이 멈췄으면 분석 전에 먼저 살린다.
    hint: 'osquery + sysmon'
    category: survey
    points: 8
    answer: |
      # 1) el34-web 안 osquery 동작 확인(스냅샷 도구, "지금 떠 있는 것")
      docker exec el34-web osqueryi --version
      # 2) 호스트의 Sysmon 데몬 active 확인(eBPF 이벤트 스트림, "그 순간")
      systemctl is-active sysmon
      # 3) 악성코드 대응 세 시각 요약
      echo "악성코드 대응: osquery(프로세스/연결) + sysmon(NetworkConnect) + Suricata(C2 시그니처)"
    answer_detail: "C2 비콘 탐지의 세 시각 = osquery(프로세스/소켓 스냅샷) + Sysmon for Linux(NetworkConnect 등 이벤트 스트림) + Suricata(네트워크 시그니처). 점검은 두 호스트 가시화 도구의 가용성을 확인하는 것 — osquery는 컨테이너 안, Sysmon은 호스트에 산다."
    expected_output: |
      osqueryi version 5.23.0
      active
      악성코드 대응: osquery(프로세스/연결) + sysmon(NetworkConnect) + Suricata(C2 시그니처)
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "악성코드 탐지 도구 점검"
        success_criteria: ["osquery + sysmon"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 악성코드의 최소 형태를 안전하게 재현
      이후 모든 분석·대응 미션의 원천 데이터를 만든다 — 악성 프로세스(cmdline에 c2_beacon 표식)와
      C2 채널(비표준 포트 45511 리스너)이라는 악성코드의 두 부품을 web 호스트에 재현한다. 진짜 외부
      C2에 연결하면 공유 인프라·외부에 영향을 주므로, 비표준 포트로 C2 통신을 안전하게 모사한다.

      ## 📖 개념 한 줄
      악성코드 = "악성 프로세스 + C2 채널"이 최소 형태다. C2에 거는 주기적 외부 통신(비콘)이 악성코드의
      생명선이자 IOC의 핵심 — 본 미션이 그 비콘을 만들어 둔다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 악성 프로세스(cmdline c2_beacon 표식) + C2 리스너(비표준 포트 45511) 백그라운드 상주
      nohup python3 -c "import time; c2_beacon_45511=1; time.sleep(200)" >/dev/null 2>&1 & nohup python3 -m http.server 45511 >/dev/null 2>&1 & echo infected
      # 2) 기동 대기 후 완료 마커
      sleep 1
      echo "malware done"
      ```
      - `nohup … &` 로 셸 종료 후에도 상주(악성코드 상주 모습). cmdline 의 **c2_beacon** 표식=호스트 IOC, 비표준 고포트 **45511**=네트워크 IOC(정상은 80/443).

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** 재현이 실행되고 malware done 이 나오면 악성 프로세스(c2_beacon)와
      C2 비콘 채널(45511)이 준비된 것 — 안 뜨면 이후 IOC 추출·헌팅에서 흔적이 안 보인다.
    hint: '악성 프로세스(c2 cmdline) + C2 리스너 45511'
    category: recon
    points: 10
    answer: |
      # 1) 악성 프로세스(cmdline c2_beacon 표식) + C2 리스너(비표준 포트 45511) 백그라운드 상주
      docker exec el34-web sh -c 'nohup python3 -c "import time; c2_beacon_45511=1; time.sleep(200)" >/dev/null 2>&1 & nohup python3 -m http.server 45511 >/dev/null 2>&1 & echo infected'
      # 2) 기동 대기 후 완료 마커
      sleep 1
      echo "malware done"
    answer_detail: "악성코드의 최소 형태 = 악성 프로세스(cmdline c2_beacon) + C2 비콘 채널(비표준 포트 45511). 진짜 C2 대신 비표준 포트로 안전하게 모사하며, 주기적 외부 통신(비콘)이 IOC의 핵심이자 악성코드의 약점이다."
    expected_output: |
      infected
      malware done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "악성코드(C2 비콘) 재현"
        success_criteria: ["악성 프로세스 + C2 리스너"]
        acceptable_methods: ["**[OSS] 악성 프로세스 + 리스너 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 재사용 가능한 호스트 IOC를 뽑는다
      식별을 "감염됐다"에서 멈추지 않고, **재사용 가능한 IOC**까지 뽑는다. osquery로 악성 프로세스의
      cmdline을 추출해 호스트 IOC로 확보한다 — 이 IOC는 같은 악성코드가 다른 호스트·다른 시점에
      나타날 때 즉시 식별하는 지문이 된다.

      ## 📖 개념 한 줄
      IOC(Indicator of Compromise) = 한 번 뽑으면 두고두고 재사용하는 침해 지표. 악성 프로세스 cmdline
      (c2_beacon)은 호스트 IOC, C2 포트(45511)는 네트워크 IOC다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) osquery processes에서 cmdline에 c2_beacon 포함하는 악성 프로세스 추출(호스트 IOC)
      osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%c2_beacon%" AND name != "osqueryi";'
      # 2) 해석 — IOC: 프로세스 cmdline(c2_beacon), C2 포트 45511. CDB list/MISP로 재사용
      echo "→ IOC: 프로세스 cmdline(c2_beacon), C2 포트 45511. CDB list/MISP로 재사용"
      ```
      - `processes` 테이블(pid/name/cmdline)을 `LIKE "%c2_beacon%"` 로 좁힌다(`%`=임의 문자열). 추려진 cmdline 이 곧 호스트 IOC.

      ## ✅ 합격 기준
      `c2_beacon` 출력 시 통과. **근거:** c2_beacon cmdline 을 가진 악성 프로세스가 보이면 호스트 IOC
      추출 성공 — 안 보이면 미션 2 의 감염 재현이나 osquery 가동을 점검한다.
    hint: 'osquery processes cmdline %c2_beacon%'
    category: analysis
    points: 12
    answer: |
      # 1) osquery processes에서 cmdline에 c2_beacon 포함하는 악성 프로세스 추출(호스트 IOC)
      docker exec el34-web osqueryi --json 'SELECT pid,name,cmdline FROM processes WHERE cmdline LIKE "%c2_beacon%" AND name != "osqueryi";'
      # 2) 해석 — IOC: 프로세스 cmdline(c2_beacon), C2 포트 45511. CDB list/MISP로 재사용
      echo "→ IOC: 프로세스 cmdline(c2_beacon), C2 포트 45511. CDB list/MISP로 재사용"
    answer_detail: "IOC 추출 = 재사용 가능한 침해 지표 확보. 여기서 뽑는 호스트 IOC는 악성 프로세스 cmdline(c2_beacon), 짝이 되는 네트워크 IOC는 C2 포트 45511이다. 이 IOC를 CDB list/MISP로 등록하면 같은 악성코드의 재발이 사람 분석 전에 자동 탐지된다(W12 인텔)."
    expected_output: |
      [
        {"cmdline":"python3 -c import time; c2_beacon_45511=1; time.sleep(200)","name":"python3","pid":"54279"}
      ]
      → IOC: 프로세스 cmdline(c2_beacon), C2 포트 45511. CDB list/MISP로 재사용
    verify:
      type: output_contains
      expect: 'c2_beacon'
      field: stdout
      semantic:
        intent: "악성코드 IOC 추출"
        success_criteria: ["프로세스 cmdline IOC", "C2 포트"]
        acceptable_methods: ["**[OSS] osquery processes IOC (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — "한 호스트만인가, 더 퍼졌나"를 판정
      식별로 한 호스트의 감염을 확인했다면, 다음 질문은 반드시 감염 범위다. 확보한 C2 채널(포트
      45511)을 키로 능동 헌팅해, 같은 C2를 쓰는 호스트가 또 있는지 — 즉 확산 여부 — 를 판정한다.

      ## 📖 개념 한 줄
      헌팅(threat hunting) = 경보를 기다리는 대신 확보한 IOC를 가설로 여러 호스트에서 같은 흔적을
      능동적으로 찾는 것. 같은 C2 채널 + 같은 비콘 주기 = 같은 악성코드의 확산이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) C2 채널 포트(45511)를 여는 리스너를 listening_ports에서 헌팅(감염 범위)
      osqueryi --json 'SELECT pid,port,address FROM listening_ports WHERE port=45511;'
      # 2) 해석 — 같은 C2 포트로 통신하는 호스트 = 확산, 비콘 주기 같으면 같은 악성코드
      echo "→ 같은 C2 포트로 통신하는 호스트 = 확산. 비콘 주기 같으면 같은 악성코드"
      ```
      - `listening_ports`(port/address/pid)를 `WHERE port=45511` 로 좁힌다. 같은 질의를 다른 호스트로 돌려 결과가 나오면 확산(실무는 전 자산 분산 실행).

      ## ✅ 합격 기준
      `45511` 출력 시 통과. **근거:** C2 포트(45511)가 헌팅으로 잡히면 감염 범위 확인 — 안 잡히면
      미션 2 의 감염 재현이나 osquery 를 점검한다.
    hint: 'listening_ports/process_open_sockets 45511'
    category: analysis
    points: 12
    answer: |
      # 1) C2 채널 포트(45511)를 여는 리스너를 listening_ports에서 헌팅(감염 범위)
      docker exec el34-web osqueryi --json 'SELECT pid,port,address FROM listening_ports WHERE port=45511;'
