      ## 📖 개념 한 줄
      제거(Eradicate)의 철칙은 "빠짐없이"(W09 §4) — 하나라도 남으면 재감염의 씨앗이 된다. 그래서 종료
      후 반드시 가시화 도구로 "정말 사라졌는지" 재확인한다.

