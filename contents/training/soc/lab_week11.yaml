      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) 악성 프로세스 + C2 리스너 종료([c]·[h] 대괄호로 pkill 자기매치 방지)
      pkill -f "[c]2_beacon" 2>/dev/null; pkill -f "[h]ttp.server 45511" 2>/dev/null; true
      # 2) 완료 마커
      echo eradicated
      # 3) 제거 확인 — processes 재조회 결과가 비어야 성공
      osqueryi --json 'SELECT pid FROM processes WHERE cmdline LIKE "%c2_beacon%" AND name != "osqueryi";'
      ```
      - `[c]2_beacon` 대괄호 트릭 — 정규식 `[c]2_beacon` 은 실제 `c2_beacon` 엔 매치되지만 명령줄에 적힌 `[c]2_beacon` 문자열엔 안 맞아 pkill 이 자기 자신을 안 죽인다. 끝의 processes 재조회가 비면 제거 성공.

