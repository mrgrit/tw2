      ## 🎯 목표 — 우선순위 정렬 (무엇부터 보나)

      실습 3~5 에서 분류한 세 경보를 P1/P2/P3 로 줄 세우는 L1 의 핵심 의사결정을 연습한다.
      한정된 분석 시간을 어디에 쓸지 정하는 작업이다.

      ## 개념 한 줄
      우선순위는 두 신호로 매긴다 — ①공격 단계(정찰 < 침투): 아직 안 들어온 정찰보다 이미
      공격 중인 침투가 위험. ②빈도(단발 < 다발): 짧은 시간 다발은 자동화된 진행형 공격의
      강한 신호. (P1=침투 성공/치명, P2=진행형 침투 시도, P3=정찰/단발.)

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 스캔(정찰, 단발) → P3 낮음
      echo "스캔(정찰, 단발)        → P3 (낮음)"
      # 2) 웹 SQLi(침투 시도) → P2 중간
      echo "웹 SQLi(침투 시도)       → P2 (중간)"
      # 3) SSH 무차별 대입(다발) → P2 중간(진행형)
      echo "SSH 무차별 대입(8건 다발) → P2 (중간, 진행형 — 곧 침투 시도)"
      # 4) 결론 — 진행형/침투(웹·인증) 먼저, 정찰(스캔)은 맥락으로 기록
      echo "→ 진행형/침투(웹·인증)을 먼저 본다. 정찰은 맥락으로 기록"
      ```

      ## ✅ 합격 기준
      `P2` 출력 시 통과. **근거:** 웹 SQLi·SSH 무차별 대입을 P2(중간), 단발 스캔을 P3(낮음)로 줄
      세우면 통과 → "진행형/침투를 먼저, 정찰은 맥락으로 기록".

      ## 🔧 개념 풀이
      - P1/P2/P3 — 경보의 처리 우선순위 등급(높음/중간/낮음). 절대 점수가 아니라 상대적
        줄 세우기다. 같은 P3 라도 중요 자산(예: 결제 서버)을 향하면 끌어올린다.
