    instruction: |
      ## 🎯 목표 — 트리아지: 웹 공격 경보 (시그니처/대상 식별)

      웹은 가장 흔한 침투 경로다. ModSec(WAF)이 차단한 웹 공격의 시그니처와 출발지를 읽어
      "웹 익스플로잇 시도"로 분류하는 법을 익힌다.

      ## 개념 한 줄
      웹 공격(SQLi 등, MITRE T1190)은 web 의 ModSecurity(WAF)가 검사해 modsec_audit.log 에
      남긴다. CRS 룰 ID 로 공격 종류를 식별한다 — 942=SQL Injection, 913=스캐너 탐지. 차단되면
      HTTP 403 이 응답된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) modsec_audit 최근 80줄에서 CRS 룰ID(942 SQLi 등)/도구지문(sqlmap) 추출
      sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "94[0-9]1[0-9]{2}|sqlmap" | sort -u
      # 2) 최근 1건의 차단 상태(403)와 실제 출발지(remote_address) 확인
      sudo tail -1 /var/log/apache2/modsec_audit.log | jq '{status:.response.status, remote:.transaction.remote_address}'
      # 3) 해석 — 웹 익스플로잇(SQLi/스캐너), 출발지 remote_address 식별
      echo "→ 분류: 웹 익스플로잇(SQLi/스캐너). 출발지 remote_address 식별"
      ```

      ## ✅ 합격 기준
      `sqlmap` 출력 시 통과. **근거:** 942(SQLi) 또는 도구 지문 sqlmap 이 매치되고 차단 결과(403)·실제
      출발지(remote_address=192.168.0.202)가 식별되면 통과 — el34 는 출처 IP 를 보존한다.

      ## 🔧 도구 풀이
      - modsec_audit.log — ModSecurity 가 검사한 웹 트랜잭션의 감사 로그(JSON 형식). 차단된
        요청의 출발지·상태·매치 룰을 담는다.
      - CRS(OWASP Core Rule Set) — ModSec 의 표준 웹 공격 룰셋. 942 대역이 SQLi, 941 이 XSS,
        913 이 스캐너 탐지다.
      - `remote_address` — 요청을 보낸 실제 출발지 IP. 상관(실습 7)에서 다른 소스의 출발지와
        대조하는 핵심 키다.
    hint: 'modsec audit 의 942/sqlmap + remote_address'
