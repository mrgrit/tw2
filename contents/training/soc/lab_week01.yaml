    instruction: |
      ## 🎯 목표 — L1 트리아지 보고서

      분석은 보고로 완성된다. 실습 1~7 을 표준 양식으로 정리해, L2 가 받아 즉시 이어갈 수 있는
      산출물을 만든다. SOC 의 모든 경보 처리는 추적성·인수인계·사후분석을 위해 기록으로 남아야 한다.

      ## 개념 한 줄
      L1 보고서 = 4요소(출발지/시그니처/시각/심각도) 식별 → 분류(정찰/인증/웹) → 우선순위
      (P1/P2/P3) → 상관(같은 출발지 → 한 캠페인) 의 4단계를 한 장으로 종합한 것.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 L1 트리아지 보고서 출력 — 4요소→분류→우선순위→상관→결론
      cat > ~/w01_note1.md <<'EOF'
      # SOC W01 L1 트리아지 보고서
      ## 1. 경보 4요소
      | 경보 | 출발지 | 시그니처 | 심각도 |
      |------|--------|----------|--------|
      | 스캔 | 192.168.0.202 | nmap SYN scan | 낮 |
      | 인증 | (다발) | Invalid user x8 | 중 |
      | 웹 | 192.168.0.202 | sqlmap/942 SQLi | 중 |
      ## 2. 분류: 스캔=정찰 / 인증=무차별대입 / 웹=익스플로잇
      ## 3. 우선순위: 웹·인증(P2) > 스캔(P3)
      ## 4. 상관: 스캔+웹 동일 출발지 192.168.0.202 → 정찰→침투 한 캠페인
      ## 결론: L1은 4요소로 빠르게 분류·우선순위·상관해 L2로 올린다
      EOF
      cat ~/w01_note1.md
      ```

      ## ✅ 합격 기준
      `트리아지` 출력 시 통과. **근거:** 보고서에 4요소 표 + 분류(정찰/인증/웹) + 우선순위(P1/P2/P3) +
      상관(같은 출발지 → 한 캠페인)이 모두 담기면 통과 — 실습 1~7 의 실제 출력값을 근거로 인용한다.

      ## 🔧 작성 팁
      위 양식을 채울 때 실습 1~7 의 실제 출력값(출발지 192.168.0.202, 시그니처 942/sqlmap,
      Invalid user 다발 등)을 근거로 인용한다. 추측이 아니라 관측된 증거로 결론을 뒷받침해야
      L2 가 신뢰하고 이어받을 수 있다.
