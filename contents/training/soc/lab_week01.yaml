    instruction: |
      ## 🎯 목표 — 상관(Purple): 같은 출발지로 한 캠페인

      L1 의 진짜 실력 — 흩어진 세 경보를 한 사건으로 엮는 상관(correlation)을 직접 해본다.
      실습 3~5 에서 따로따로 분류한 경보가 사실 한 공격자임을 출발지 IP 로 증명한다.

      ## 개념 한 줄
      상관 = 흩어진 경보를 공통 키(주로 출발지 IP)로 엮어 한 사건으로 종합하는 분석. 서로 다른
      소스(Suricata eve, ModSec audit)의 출발지가 같은 192.168.0.202 로 수렴하면 "한 공격자의
      단계적 캠페인(정찰 → 침투)"이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** Suricata 집계는 `el34-ips`, ModSec 확인은 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: Suricata alert 출발지를 집계(uniq -c)해 많은 순으로 상위 3개 ──
      tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert")|.src_ip' | sort | uniq -c | sort -rn | head -3

      # ── el34-web 에서: ModSec 웹 공격 출발지에 같은 192.168.0.202가 있는지 확인 ──
      sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "10\.20\.30\.202" | head -1

      # 상관 — 스캔+웹이 같은 출발지 192.168.0.202 = 한 공격자의 단계적 캠페인(정찰→침투)
      echo "→ 스캔+웹이 같은 출발지 192.168.0.202 = 한 공격자의 단계적 캠페인(정찰→침투)"
      ```

      ## ✅ 합격 기준
      `192.168.0.202` 출력 시 통과. **근거:** 두 소스(Suricata eve, ModSec audit) 모두에서 같은 출발지
      192.168.0.202 가 나오면 스캔과 웹 공격이 한 공격자임이 확인 — 출처 IP 보존(SNAT 없음)이 전제다.

      ## 🔧 도구 풀이
      - `jq -rc ... .src_ip | sort | uniq -c | sort -rn` — 모든 alert 의 출발지를 뽑아(`-r` 따옴표
        없이) 정렬·집계(`uniq -c`)한 뒤 많은 순(`sort -rn`)으로 보여준다 = 출발지별 경보 빈도표.
      - 상관의 전제는 출처 IP 보존이다 — el34 의 fw 는 SNAT 를 하지 않아 공격자 IP 가 모든
        소스에 그대로 남는다. SNAT 가 있으면 출발지가 다 같아져 상관이 무력화된다.
