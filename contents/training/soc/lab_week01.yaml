lab_id: standalone-soc-week01
title: "다중벡터 공격 vs SOC 관제·L1 트리아지"
version: standalone-soc
course: soc
week: 1
description: |
  SOC L1 분석가의 하루를 압축한 실습이다. 외부 공격자가 한 번에 세 갈래(포트 스캔 + SSH 무차별
  대입 + 웹 SQLi)로 들어오는 다중벡터 공격을 직접 재현하고(Red), 그 공격이 소스별로 흩어져 남긴
  텔레메트리를 분석해(Blue) L1 트리아지를 수행한다. 트리아지란 경보 하나하나를 깊게 파지 않고
  4요소(출발지 srcip / 시그니처 rule.description / 시각 timestamp / 심각도 rule.level)만 빠르게
  읽어 분류 → 우선순위(P1/P2/P3) → 상관까지 가는 1차 판단이다. 마지막엔 흩어진 세 경보를 같은
  출발지 IP 로 엮어 "한 공격자의 단계적 캠페인(정찰 → 침투)"으로 종합한다(Purple).

  분석 소스(어떤 공격이 어디에 흔적을 남기나):
    - Suricata eve.json (네트워크) ← 포트 스캔
    - 호스트 /var/log/auth.log (인증) ← SSH 무차별 대입
    - web modsec_audit.log (웹) ← 웹 SQLi
    - Wazuh alerts.json ← 위 소스가 SIEM 한곳으로 모인 통합 경보 스트림
  관측·분석 중심이라 인프라 변경은 없다. 공격(재현)은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서
  발신하고(세 벡터 모두 출처 192.168.0.202로 통일됨), 분석은 `ssh ccc@{{TARGET_IP}}`(el34 호스트, 비번 1)에서
  `ssh ccc@<장비IP>`(siem 32.100/ips 31.2/web 32.80)로 한다. 인증 로그는 호스트의 /var/log/auth.log(ccc는 adm
  그룹이라 sudo 없이 읽음). 도구 풀이 — jq: JSON 로그에서 원하는 필드만 뽑는 명령줄 도구.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}) + docker exec"
  - "lecture §3(트리아지 4요소) §4(다중벡터) §5(우선순위) 숙지"
objectives:
  - "SIEM(Wazuh) 가동 확인 — analysisd 데몬 + alerts.json 경보 적재 (관제의 출발점)"
  - "다중벡터 공격(포트 스캔 / SSH 무차별 대입 / 웹 SQLi) 재현 + 각 벡터가 남기는 소스 매핑"
  - "L1 트리아지 4요소(출발지 srcip / 시그니처 rule.description / 시각 timestamp / 심각도 level) 식별 + 분류"
  - "공격 단계(정찰<침투)와 빈도(단발<다발)로 우선순위(P1/P2/P3) 판정"
  - "흩어진 세 경보를 같은 출발지 IP 로 엮어 한 공격자의 캠페인(정찰→침투)으로 상관(correlation)"
  - "4요소 + 분류 + 우선순위 + 상관을 한 장의 L1 트리아지 보고서로 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SOC 대시보드 점검 (경보가 모이고 있나)

      관제의 모든 분석은 "SIEM이 경보를 실제로 수집 중인가"의 확인에서 출발한다. 이 첫 점검이
      실패하면(데몬 정지·스트림 멈춤) 뒤따르는 트리아지가 전부 무의미하다. 분석가가 매일 아침
      가장 먼저 하는 일이 바로 이 헬스체크다.

      ## 개념 한 줄
      SIEM(Wazuh)은 흩어진 소스(Suricata=네트워크 / ModSec=웹 / 호스트 인증 로그)의 이벤트를
      한 스트림(alerts.json)으로 모은다. 그 두뇌가 analysisd 데몬이다 — 이게 살아 있어야 경보가
      생성된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) Wazuh manager 데몬 상태에서 경보 생성 핵심 데몬 analysisd 가동 확인
      /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) alerts.json 에서 출발지(src_ip) 있는 최근 경보 1건을 jq로 파싱 — 4요소(출발지/시그니처/시각/심각도) 미리보기
      tail -1000 /var/ossec/logs/alerts/alerts.json | grep '"src_ip"' | tail -1 | jq '{src:.data.src_ip, sig:.rule.description, when:.timestamp, level:.rule.level}'
      ```

      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** analysisd is running 이 나오면 경보 생성 데몬이 가동 중이고,
      alerts.json 의 최근 1건이 jq 로 파싱돼 4요소가 보인다 — 안 보이면 manager·agent 연결을 점검한다.

      ## 🔧 도구 풀이
      - `wazuh-control status` — Wazuh manager 의 데몬 가동 상태를 보여주는 명령. analysisd 가
        경보 생성의 핵심 데몬이다.
      - `jq` — JSON 로그에서 원하는 필드만 골라 뽑는 명령줄 도구. `{src:.data.src_ip ...}` 는
        경보에서 4요소 필드만 추려 보여준다.
    hint: 'wazuh-control analysisd + alerts.json tail jq'
    category: survey
    points: 10
    answer: |
      # 1) Wazuh manager 데몬 상태에서 경보 생성 핵심 데몬 analysisd 가동 확인
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) alerts.json 에서 출발지(src_ip) 있는 최근 경보 1건을 jq로 파싱 — 4요소(출발지/시그니처/시각/심각도) 미리보기
      ssh ccc@10.20.32.100 'tail -1000 /var/ossec/logs/alerts/alerts.json | grep "\"src_ip\"" | tail -1 | jq "{src:.data.src_ip, sig:.rule.description, when:.timestamp, level:.rule.level}"'
    answer_detail: "SOC 관제의 토대 = SIEM(Wazuh)의 analysisd 데몬이 소스(Suricata/ModSec/호스트 인증 로그)의 이벤트를 alerts.json 한 스트림으로 수집하는 것. 채점은 출력에 'analysisd'(running)가 포함되는지로 가용성을 확인한다. 분석가는 이 스트림에서 4요소(출발지 src_ip/시그니처 rule.description/시각 timestamp/심각도 rule.level)를 읽는다 — 이 4요소가 본 실습 전체의 분석 골격이다."
    expected_output: |
      wazuh-analysisd is running...
      {
        "src": "192.168.0.202",
        "sig": "Suricata: Alert - EL34 Bot UA - sqlmap",
        "when": "2026-06-26T14:45:40.538+0000",
        "level": 3
      }
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "SIEM 경보 수집 가용성 점검 (관제 출발점)"
        success_criteria: ["analysisd running", "alerts.json 적재", "4요소 인지"]
        acceptable_methods:
          - "**[OSS] wazuh-control + alerts.json (권장)**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표 — 다중벡터 공격 재현 (스캔 + SSH 무차별 대입 + 웹)

      분석(Blue)의 대상이 되는 경보를 학생이 직접 만들어 "공격 → 경보"의 인과를 체득한다.
      한 공격자가 세 갈래로 들어오면 SOC 화면이 세 개의 별개 경보로 채워진다 — 이 흩어짐을
      눈으로 확인하는 것이 이후 트리아지·상관의 출발점이다.

      ## 개념 한 줄
      다중벡터 = 한 공격자가 여러 경로로 동시에 시도. 각 벡터는 서로 다른 소스에 흔적을 남긴다:
      ①포트 스캔→Suricata eve(네트워크), ②SSH 무차별 대입→호스트 auth.log(인증),
      ③웹 SQLi→ModSec audit(웹).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 세 벡터 모두 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 발신한다 —
      스캔·웹은 공인 진입 192.168.0.161로, SSH 무차별 대입은 el34 호스트(192.168.0.80) SSH로.

      ```bash
      # ── (202에서) ① 포트 스캔 — 공인 진입으로 SYN 스캔 (Suricata eve에 흔적) ──
      sudo nmap -sS -p 20-200 192.168.0.161 -T4 --max-retries 1 >/dev/null 2>&1; echo scanned

      # ── (202에서) ② SSH 무차별 대입 — el34 호스트(192.168.0.80) SSH에 없는 계정 8회 실패(auth.log에 src 192.168.0.202로 다발) ──
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad1@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad2@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad3@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad4@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad5@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad6@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad7@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad8@192.168.0.80 exit
      echo "brute x8 done"

      # ── 외부 공격자 VM 192.168.0.202 에서: ③ 웹 SQLi (sqlmap UA, ModSec audit에 942) ──
      echo -en 'GET /?id=socw1%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null

      echo "3-vector done"
      ```

      ## ✅ 합격 기준
      `vector done` 출력 시 통과. **근거:** 3-vector done 이 나오면 세 벡터가 모두 실행돼 각 소스
      (eve / auth.log / modsec_audit)에 새 이벤트가 쌓인 것 — 이를 실습 3~5 에서 찾아 분류한다.

      ## 🔧 도구 풀이
      - `nmap -sS` — 열린 포트를 탐색하는 정찰 도구. `-sS` 는 완전한 연결을 맺지 않는 SYN 스캔이다.
      - `ssh ... socw1bad$i@192.168.0.80` — 202에서 el34 호스트 SSH에 없는 계정으로 8회 로그인 실패를
        만들어, 호스트 auth.log 에 `Invalid user ... from 192.168.0.202` 무차별 대입 흔적을 남긴다.
      - nc `User-Agent: sqlmap/1.7` 헤더 — 공격 도구 UA 시그니처를 담고 URL 에 SQL 구문
        (`UNION SELECT`)을 주입한 웹 공격. ModSec 의 SQLi 룰(942)에 잡힌다.

      ## ⚠️ 윤리
      공격은 반드시 el34 실습 환경 안에서만 발생시킨다. 외부 시스템 대상 시도는 절대 금지다.
    hint: 'nmap + ssh 실패 8회(202→192.168.0.80) + 웹 SQLi'
    category: recon
    points: 10
    answer: |
      # 1) ① 포트 스캔 — 외부 공격자 VM 192.168.0.202가 SYN 스캔(Suricata eve에 흔적)
      ssh att@192.168.0.202 'sudo nmap -sS -p 20-200 192.168.0.161 -T4 --max-retries 1 >/dev/null 2>&1; echo scanned'
      # 2) ② SSH 무차별 대입 — 내 공격 VM(202)에서 el34 호스트(192.168.0.80) SSH에 없는 계정 8회 실패(auth.log에 src 192.168.0.202로 다발)
      ssh att@192.168.0.202 'for u in socw1bad1 socw1bad2 socw1bad3 socw1bad4 socw1bad5 socw1bad6 socw1bad7 socw1bad8; do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 ${u}@192.168.0.80 exit; done'
      echo "brute x8 done"
      # 3) ③ 웹 SQLi — sqlmap UA로 UNION SELECT 주입(ModSec audit에 942)
      ssh att@192.168.0.202 'echo -en 'GET /?id=socw1%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null'
      # 4) 3벡터 완료 마커
      echo "3-vector done"
    answer_detail: "한 공격자가 세 벡터로 공격하면 각각 다른 소스에 다른 경보로 흩어진다 — 스캔(Suricata eve)/인증 무차별 대입(호스트 auth.log)/웹(ModSec audit). 채점은 'vector done' 출력으로 3벡터 재현을 확인한다. 이 흩어짐이 본 실습의 핵심 난점이며, 실습 7 에서 같은 출발지로 다시 엮는다. (인증 벡터는 202에서 el34 호스트 192.168.0.80 SSH로 브루트 → auth.log에 src 192.168.0.202로 남아, 스캔·웹과 같은 출발지로 상관된다.)"
    expected_output: |
      scanned
      brute x8 done
      3-vector done
    verify:
      type: output_contains
      expect: 'vector done'
      field: stdout
      semantic:
        intent: "다중벡터 공격 재현 — 세 소스에 경보 생성"
        success_criteria: ["스캔/인증/웹 3벡터", "각 텔레메트리 소스 인지"]
        acceptable_methods:
          - "**[OSS] nmap + ssh 실패 + 웹 curl (권장)**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 트리아지: 스캔 경보 (정찰 분류, P3)

      가장 흔하고 가장 덜 위험한 경보인 포트 스캔을 분류하며 트리아지 4요소의 기본기를 익힌다.
      정찰 경보를 옳게 P3(낮음)로 내리는 것이 L1 의 첫 판단이다.

      ## 개념 한 줄
      포트 스캔은 공격의 "정찰" 단계(MITRE T1046) — 공격자가 열린 문을 찾는 행위다. Suricata 가
      네트워크 패킷을 보고 eve.json 에 alert 로 남긴다. 아직 침투가 아니므로 단발이면 우선순위 낮음.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      # 1) Suricata eve에서 scan 시그니처 alert만 골라 시그니처/출발지/심각도 추출(최근 3건)
      tail -3000 /var/log/suricata/eve.json | jq -c 'select(.event_type=="alert" and (.alert.signature|test("scan";"i")))|{sig:.alert.signature,src:.src_ip,sev:.alert.severity}' | tail -3
      # 2) 해석 — 정찰(Recon, MITRE T1046). 단발 스캔 = 우선순위 낮음(P3)
      echo "→ 분류: 정찰(Recon, MITRE T1046). 단발 스캔 = 우선순위 낮음(P3)"
      ```

      ## ✅ 합격 기준
      `scan` 출력 시 통과. **근거:** scan 류 시그니처가 출발지(src)·심각도(sev)와 함께 나오면 4요소
      중 셋을 식별한 것 → "정찰(T1046), 단발이라 P3" 로 분류. 안 보이면 실습 2 의 nmap 을 다시 실행한다.

      ## 🔧 도구 풀이
      - eve.json — Suricata 가 분석한 모든 이벤트를 한 줄당 1 JSON 으로 남기는 로그. `event_type`
        으로 종류를 구분하며, 공격 탐지는 `event_type=="alert"` 다.
      - `jq ... test("scan";"i")` — 시그니처 이름에 "scan" 이 (대소문자 무시 "i") 들어간 alert 만
        골라낸다. `.alert.severity` 가 Suricata 의 심각도(숫자가 작을수록 위험)다.
    hint: 'eve.json 의 scan 시그니처 + src_ip + severity'
    category: analysis
    points: 14
    answer: |
      # 1) Suricata eve에서 scan 시그니처 alert만 골라 시그니처/출발지/심각도 추출(최근 3건)
      ssh ccc@10.20.31.2 'sudo tail -3000 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\" and (.alert.signature|test(\"scan\";\"i\")))|{sig:.alert.signature,src:.src_ip,sev:.alert.severity}" | tail -3'
      # 2) 해석 — 정찰(Recon, MITRE T1046). 단발 스캔 = 우선순위 낮음(P3)
      echo "→ 분류: 정찰(Recon, MITRE T1046). 단발 스캔 = 우선순위 낮음(P3)"
