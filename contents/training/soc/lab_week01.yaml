    instruction: |
      ## 🎯 목표 — 트리아지: 인증 실패 경보 (무차별 대입 판정, P2)

      "정상 오타 한두 번"과 "무차별 대입 다발"을 구분하는 것이 인증 분석의 핵심이다. 이 구분을
      빈도(짧은 시간 다발)와 계정 다양성으로 판정하는 법을 익힌다.

      ## 개념 한 줄
      SSH 무차별 대입(MITRE T1110) = 여러 계정/비번을 자동으로 반복 시도하는 공격. 호스트
      인증 로그(/var/log/auth.log)에 `Invalid user`(없는 계정 시도) / `Failed password`(비번 실패)
      로 남는다. 다발 + 여러 계정이면 사전(wordlist) 기반 자동화 공격의 강한 신호다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) auth.log에서 인증 실패(없는 계정/비번 실패) 최근 10줄
      grep -aE "Invalid user|Failed password" /var/log/auth.log | tail -10
      # 2) 무차별 대입 실패 건수 집계(-c) — 빈도가 판정 단서
      grep -acE "Invalid user socw1|Failed password" /var/log/auth.log
      # 3) 판정 — 짧은 시간 다발 = SSH 무차별 대입(T1110), 진행형 → P2
      echo "→ 판정: 짧은 시간 다발 = SSH 무차별 대입(T1110). 진행형 공격 → P2(중간, 스캔보다 우선)"
      ```

      ## ✅ 합격 기준
      `Invalid user` 출력 시 통과. **근거:** Invalid user 가 다발(8건+)로 여러 계정(socw1bad*)에 걸쳐
      나오면 "무차별 대입, 진행형이라 P2" 로 판정 — 단발 1~2건이면 정상 오타일 수 있어 우선순위를 낮춘다.

      ## 🔧 도구 풀이
      - /var/log/auth.log — 리눅스 호스트의 로그인 시도 기록 파일. ccc 계정은 adm 그룹이라 sudo
        없이 읽는다.
      - `grep -aE` — `-a`: 바이너리로 오인될 수 있는 줄도 텍스트로 검색, `-E`: 확장 정규식(`|`=또는).
      - `grep -acE` — 여기에 `-c` 를 더해 매치된 줄 "수"만 센다(= 빈도 측정). 빈도가 무차별 대입
        판정의 핵심 단서다.
    hint: 'auth.log 의 Invalid user/Failed password 빈도 + 계정'
