lab_id: standalone-soc-week01
title: "다중벡터 공격 vs SOC 관제·L1 트리아지"
version: standalone-soc
course: soc
week: 1
description: |
  SOC L1 분석가의 하루를 압축한 실습이다. 외부 공격자가 한 번에 세 갈래(포트 스캔 + SSH 무차별
  대입 + 웹 SQLi)로 들어오는 다중벡터 공격을 직접 재현하고(Red), 그 공격이 소스별로 흩어져 남긴
  텔레메트리를 분석해(Blue) L1 트리아지를 수행한다. 트리아지란 경보 하나하나를 깊게 파지 않고
  4요소(출발지 srcip / 시그니처 rule.description / 시각 timestamp / 심각도 rule.level)만 빠르게
  읽어 분류 → 우선순위(P1/P2/P3) → 상관까지 가는 1차 판단이다. 마지막엔 흩어진 세 경보를 같은
  출발지 IP 로 엮어 "한 공격자의 단계적 캠페인(정찰 → 침투)"으로 종합한다(Purple).

  분석 소스(어떤 공격이 어디에 흔적을 남기나):
    - Suricata eve.json (네트워크) ← 포트 스캔
    - 호스트 /var/log/auth.log (인증) ← SSH 무차별 대입
    - web modsec_audit.log (웹) ← 웹 SQLi
    - Wazuh alerts.json ← 위 소스가 SIEM 한곳으로 모인 통합 경보 스트림
  관측·분석 중심이라 인프라 변경은 없다. 모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호
  1)에서 `docker exec el34-<컨테이너>` 로 실행한다(인증 로그는 호스트의 /var/log/auth.log, ccc는
  adm 그룹이라 sudo 없이 읽음). 도구 풀이 — jq: JSON 로그에서 원하는 필드만 뽑는 명령줄 도구.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "el34 호스트 SSH(ssh ccc@192.168.0.151) + docker exec"
  - "lecture §3(트리아지 4요소) §4(다중벡터) §5(우선순위) 숙지"
objectives:
  - "SIEM(Wazuh) 가동 확인 — analysisd 데몬 + alerts.json 경보 적재 (관제의 출발점)"
  - "다중벡터 공격(포트 스캔 / SSH 무차별 대입 / 웹 SQLi) 재현 + 각 벡터가 남기는 소스 매핑"
  - "L1 트리아지 4요소(출발지 srcip / 시그니처 rule.description / 시각 timestamp / 심각도 level) 식별 + 분류"
  - "공격 단계(정찰<침투)와 빈도(단발<다발)로 우선순위(P1/P2/P3) 판정"
  - "흩어진 세 경보를 같은 출발지 IP 로 엮어 한 공격자의 캠페인(정찰→침투)으로 상관(correlation)"
  - "4요소 + 분류 + 우선순위 + 상관을 한 장의 L1 트리아지 보고서로 종합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SOC 대시보드 점검 (경보가 모이고 있나)

      관제의 모든 분석은 "SIEM이 경보를 실제로 수집 중인가"의 확인에서 출발한다. 이 첫 점검이
      실패하면(데몬 정지·스트림 멈춤) 뒤따르는 트리아지가 전부 무의미하다. 분석가가 매일 아침
      가장 먼저 하는 일이 바로 이 헬스체크다.

      ## 개념 한 줄
      SIEM(Wazuh)은 흩어진 소스(Suricata=네트워크 / ModSec=웹 / 호스트 인증 로그)의 이벤트를
      한 스트림(alerts.json)으로 모은다. 그 두뇌가 analysisd 데몬이다 — 이게 살아 있어야 경보가
      생성된다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | jq "{src:.data.srcip, sig:.rule.description, level:.rule.level}"'
      ```

      ## ✅ 합격 기준
      `analysisd is running` 이 출력되고, alerts.json 의 최근 경보 1건이 jq 로 파싱되어 4요소
      (출발지 src / 시그니처 sig / 심각도 level)가 보인다. analysisd 가 안 보이면 manager 점검,
      경보가 안 나오면 agent 연결·소스를 점검한다.

      ## 🔧 도구 풀이
      - `wazuh-control status` — Wazuh manager 의 데몬 가동 상태를 보여주는 명령. analysisd 가
        경보 생성의 핵심 데몬이다.
      - `jq` — JSON 로그에서 원하는 필드만 골라 뽑는 명령줄 도구. `{src:.data.srcip ...}` 는
        경보에서 4요소 필드만 추려 보여준다.
    hint: 'wazuh-control analysisd + alerts.json tail jq'
    category: survey
    points: 10
    answer: |
      echo "=== Wazuh SIEM 가동 ==="
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      echo "=== 최근 경보 1건 (4요소 미리보기) ==="
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | jq "{src:.data.srcip, sig:.rule.description, when:.timestamp, level:.rule.level}"'
    answer_detail: "SOC 관제의 토대 = SIEM(Wazuh)의 analysisd 데몬이 소스(Suricata/ModSec/호스트 인증 로그)의 이벤트를 alerts.json 한 스트림으로 수집하는 것. 채점은 출력에 'analysisd'(running)가 포함되는지로 가용성을 확인한다. 분석가는 이 스트림에서 4요소(출발지 srcip/시그니처 rule.description/시각 timestamp/심각도 rule.level)를 읽는다 — 이 4요소가 본 실습 전체의 분석 골격이다."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "SIEM 경보 수집 가용성 점검 (관제 출발점)"
        success_criteria: ["analysisd running", "alerts.json 적재", "4요소 인지"]
        acceptable_methods:
          - "**[OSS] wazuh-control + alerts.json (권장)**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표 — 다중벡터 공격 재현 (스캔 + SSH 무차별 대입 + 웹)

      분석(Blue)의 대상이 되는 경보를 학생이 직접 만들어 "공격 → 경보"의 인과를 체득한다.
      한 공격자가 세 갈래로 들어오면 SOC 화면이 세 개의 별개 경보로 채워진다 — 이 흩어짐을
      눈으로 확인하는 것이 이후 트리아지·상관의 출발점이다.

      ## 개념 한 줄
      다중벡터 = 한 공격자가 여러 경로로 동시에 시도. 각 벡터는 서로 다른 소스에 흔적을 남긴다:
      ①포트 스캔→Suricata eve(네트워크), ②SSH 무차별 대입→호스트 auth.log(인증),
      ③웹 SQLi→ModSec audit(웹).

      ## 💻 실행 명령
      ```bash
      # ① 포트 스캔 (외부 공격자 → Suricata)
      docker exec el34-attacker sh -c 'nmap -sS -p 20-200 10.20.30.1 -T4 --max-retries 1 >/dev/null 2>&1; echo scanned'
      # ② SSH 무차별 대입 (호스트 auth.log에 인증 실패 다발)
      for i in $(seq 1 8); do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad$i@127.0.0.1 exit 2>/dev/null; done
      # ③ 웹 공격 (ModSec/Suricata)
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=socw1%27%20UNION%20SELECT%201--%20-"'
      echo "3-vector done"
      ```

      ## ✅ 합격 기준
      세 벡터가 모두 실행되고 `3-vector done` 이 출력된다. 각 벡터 직후 해당 소스(eve / auth.log /
      modsec_audit)에 새 이벤트가 쌓이며, 이를 실습 3~5 에서 찾아 분류한다.

      ## 🔧 도구 풀이
      - `nmap -sS` — 열린 포트를 탐색하는 정찰 도구. `-sS` 는 완전한 연결을 맺지 않는 SYN 스캔이다.
      - `ssh ... socw1bad$i@127.0.0.1` — 없는 계정으로 8회 로그인 실패를 만들어 auth.log 에 무차별
        대입 흔적을 남긴다(데모상 localhost 사용; 실전은 외부 IP, 분석 기법은 동일).
      - `curl -A "sqlmap/1.7"` — User-Agent 를 공격 도구 sqlmap 으로 위장하고 URL 에 SQL 구문
        (`UNION SELECT`)을 주입한 웹 공격. ModSec 의 SQLi 룰(942)에 잡힌다.

      ## ⚠️ 윤리
      공격은 반드시 el34 실습 환경 안에서만 발생시킨다. 외부 시스템 대상 시도는 절대 금지다.
    hint: 'nmap + ssh 실패 8회(127.0.0.1) + 웹 SQLi'
    category: recon
    points: 10
    answer: |
      echo "=== ① 포트 스캔 ==="
      docker exec el34-attacker sh -c 'nmap -sS -p 20-200 10.20.30.1 -T4 --max-retries 1 >/dev/null 2>&1; echo scanned'
      echo "=== ② SSH 무차별 대입 (인증 실패 다발) ==="
      for i in $(seq 1 8); do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 socw1bad$i@127.0.0.1 exit 2>/dev/null; done; echo "brute x8 done"
      echo "=== ③ 웹 공격 ==="
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://10.20.30.1/?id=socw1%27%20UNION%20SELECT%201--%20-"'
      echo "3-vector done"
    answer_detail: "한 공격자가 세 벡터로 공격하면 각각 다른 소스에 다른 경보로 흩어진다 — 스캔(Suricata eve)/인증 무차별 대입(호스트 auth.log)/웹(ModSec audit). 채점은 'vector done' 출력으로 3벡터 재현을 확인한다. 이 흩어짐이 본 실습의 핵심 난점이며, 실습 7 에서 같은 출발지로 다시 엮는다. (인증 벡터는 데모 편의상 127.0.0.1 localhost 로 생성 — 실전은 외부 IP 이지만 빈도+계정 다양성으로 무차별 대입을 판정하는 분석 기법은 완전히 동일하다.)"
    verify:
      type: output_contains
      expect: 'vector done'
      field: stdout
      semantic:
        intent: "다중벡터 공격 재현 — 세 소스에 경보 생성"
        success_criteria: ["스캔/인증/웹 3벡터", "각 텔레메트리 소스 인지"]
        acceptable_methods:
          - "**[OSS] nmap + ssh 실패 + 웹 curl (권장)**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 트리아지: 스캔 경보 (정찰 분류, P3)

      가장 흔하고 가장 덜 위험한 경보인 포트 스캔을 분류하며 트리아지 4요소의 기본기를 익힌다.
      정찰 경보를 옳게 P3(낮음)로 내리는 것이 L1 의 첫 판단이다.

      ## 개념 한 줄
      포트 스캔은 공격의 "정찰" 단계(MITRE T1046) — 공격자가 열린 문을 찾는 행위다. Suricata 가
      네트워크 패킷을 보고 eve.json 에 alert 로 남긴다. 아직 침투가 아니므로 단발이면 우선순위 낮음.

      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\" and (.alert.signature|test(\"scan\";\"i\")))|{sig:.alert.signature,src:.src_ip,sev:.alert.severity}" | tail -3'
      ```

      ## ✅ 합격 기준
      `scan` 류 시그니처가 출발지(src)·심각도(sev)와 함께 출력된다 → 4요소 중 출발지·시그니처·
      심각도를 식별하고 "정찰(T1046), 단발이라 P3" 로 분류. 스캔이 안 보이면 실습 2 의 nmap 을
      다시 실행한 뒤 확인한다(http 가 아닌 alert event 라 깊게 봐야 잡힌다 → tail -3000).

      ## 🔧 도구 풀이
      - eve.json — Suricata 가 분석한 모든 이벤트를 한 줄당 1 JSON 으로 남기는 로그. `event_type`
        으로 종류를 구분하며, 공격 탐지는 `event_type=="alert"` 다.
      - `jq ... test("scan";"i")` — 시그니처 이름에 "scan" 이 (대소문자 무시 "i") 들어간 alert 만
        골라낸다. `.alert.severity` 가 Suricata 의 심각도(숫자가 작을수록 위험)다.
    hint: 'eve.json 의 scan 시그니처 + src_ip + severity'
    category: analysis
    points: 14
    answer: |
      echo "=== 스캔 경보 트리아지 (Suricata eve) ==="
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\" and (.alert.signature|test(\"scan\";\"i\")))|{sig:.alert.signature,src:.src_ip,sev:.alert.severity}" | tail -3'
      echo "→ 분류: 정찰(Recon, MITRE T1046). 단발 스캔 = 우선순위 낮음(P3)"
    answer_detail: "스캔 경보는 공격의 정찰 단계(T1046)다. eve.json 의 alert 에서 출발지(src_ip)·시그니처(예: ET SCAN nmap SYN scan)·심각도(severity)의 3요소를 식별한다. 채점은 출력에 'scan' 시그니처가 잡히는지로 확인. 정찰은 '곧 공격이 온다'는 신호이지만 단독·단발이면 P3(낮음)으로 내린다 — 다만 같은 출발지가 반복되거나 다른 벡터와 엮이면(실습 7) 위험도가 급등하므로 맥락으로 기록해 둔다."
    verify:
      type: output_contains
      expect: 'scan'
      field: stdout
      semantic:
        intent: "스캔 경보 트리아지 — 출발지/시그니처/심각도 식별 + 정찰 분류"
        success_criteria: ["scan 시그니처", "src_ip 식별", "정찰(P3) 분류"]
        acceptable_methods:
          - "**[OSS] eve.json scan 경보 분석 (권장)**"
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 목표 — 트리아지: 인증 실패 경보 (무차별 대입 판정, P2)

      "정상 오타 한두 번"과 "무차별 대입 다발"을 구분하는 것이 인증 분석의 핵심이다. 이 구분을
      빈도(짧은 시간 다발)와 계정 다양성으로 판정하는 법을 익힌다.

      ## 개념 한 줄
      SSH 무차별 대입(MITRE T1110) = 여러 계정/비번을 자동으로 반복 시도하는 공격. 호스트
      인증 로그(/var/log/auth.log)에 `Invalid user`(없는 계정 시도) / `Failed password`(비번 실패)
      로 남는다. 다발 + 여러 계정이면 사전(wordlist) 기반 자동화 공격의 강한 신호다.

      ## 💻 실행 명령
      ```bash
      grep -aE "Invalid user|Failed password" /var/log/auth.log | tail -10
      echo "최근 실패 건수:"; grep -acE "Invalid user socw1|Failed password" /var/log/auth.log
      ```

      ## ✅ 합격 기준
      `Invalid user` 가 다발(8건+)로, 여러 계정(socw1bad*)에 걸쳐 나타남을 확인하고 "무차별 대입,
      진행형이라 P2" 로 판정한다. 단발 1~2건이면 정상 오타일 수 있어 우선순위를 낮춘다.

      ## 🔧 도구 풀이
      - /var/log/auth.log — 리눅스 호스트의 로그인 시도 기록 파일. ccc 계정은 adm 그룹이라 sudo
        없이 읽는다.
      - `grep -aE` — `-a`: 바이너리로 오인될 수 있는 줄도 텍스트로 검색, `-E`: 확장 정규식(`|`=또는).
      - `grep -acE` — 여기에 `-c` 를 더해 매치된 줄 "수"만 센다(= 빈도 측정). 빈도가 무차별 대입
        판정의 핵심 단서다.
    hint: 'auth.log 의 Invalid user/Failed password 빈도 + 계정'
    category: analysis
    points: 16
    answer: |
      echo "=== 인증 실패 경보 트리아지 (호스트 auth.log) ==="
      grep -aE "Invalid user|Failed password" /var/log/auth.log | tail -10
      echo "=== 최근 무차별 대입 실패 건수 ==="
      grep -acE "Invalid user socw1|Failed password" /var/log/auth.log
