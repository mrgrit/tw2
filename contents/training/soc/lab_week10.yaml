    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 웹 로그로 "어떻게 들어와서 무엇을 했나"(침투 경로) 복원
      ## 📖 개념 한 줄
      호스트를 뒤지기 전에, 웹 로그로 침투 경로를 먼저 복원해 헌팅 표적을 좁힌다. 두 로그는 같은
      요청을 **다른 관점**으로 본다 — **ModSec audit**는 "왜 막혔나"(매치 룰·anomaly), **access.log**
      는 "무엇이 들어왔나"(요청 전체상 + 웹쉘 사용 패턴).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) ModSec audit 최근 80줄 CRS 룰ID 분포 — 942(SQLi)→949110(anomaly 누적 차단)
      sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c
      # 2) dvwa access 최근 10줄 — 같은 요청의 전체상 + 웹쉘 사용 패턴(.php?c=)
      sudo tail -10 /var/log/apache2/dvwa_access.log
      # 3) 해석 — SQLi(942) 침투 후 웹쉘 작성, 웹쉘 접근 패턴(.php?c=)이 핵심 단서
      echo "→ SQLi(942) 침투 후 웹쉘 작성. 웹쉘 접근 패턴(.php?c=)이 핵심 단서"
      ```
      - 1) **942**(SQLi)가 점수를 올리고 **949110**(anomaly 누적)이 임계 초과로 403 차단(2단계). 2) access 에서 `.php?c=`/`?cmd=` 패턴이 웹쉘 사용 단서(정상 사용자는 .php 를 명령 바꿔가며 두드리지 않음).

      ## ✅ 합격 기준
      `942` 출력 시 통과. **근거:** ModSec 분포에 942 가 보이고 access 로 SQLi 요청·웹쉘 접근 흐름을
      복원하면 통과 — 침투 → 웹쉘 작성 → 웹쉘 사용 경로가 드러나 헌팅 표적이 좁혀진다.
    hint: 'modsec rule + access 요청'
    category: analysis
    points: 12
    answer: |
      # 1) ModSec audit 최근 80줄 CRS 룰ID 분포 — 942(SQLi)→949110(anomaly 누적 차단)
      ssh ccc@10.20.32.80 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c'
      # 2) dvwa access 최근 10줄 — 같은 요청의 전체상 + 웹쉘 사용 패턴(.php?c=)
      ssh ccc@10.20.32.80 'sudo tail -10 /var/log/apache2/dvwa_access.log'
      # 3) 해석 — SQLi(942) 침투 후 웹쉘 작성, 웹쉘 접근 패턴(.php?c=)이 핵심 단서
      echo "→ SQLi(942) 침투 후 웹쉘 작성. 웹쉘 접근 패턴(.php?c=)이 핵심 단서"
    answer_detail: "웹 로그 두 종을 교차로 읽어 침투 경로를 복원한다 — ModSec audit는 침투(942 SQLi 탐지 → 949110 anomaly 누적 → 403 차단)를, access.log는 같은 요청의 전체 흐름과 웹쉘 사용 패턴(.php?c= 반복 GET)을 보여준다. audit=WAF의 판단(왜 막혔나), access=요청 전체상(무엇이 들어왔나). 둘을 시간순으로 겹치면 침투 → 웹쉘 작성 → 웹쉘 사용 경로가 드러나고, 이것이 다음 호스트 헌팅의 표적이 된다."
