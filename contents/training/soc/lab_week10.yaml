    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 포렌식이 가리킨 웹쉘의 실체를 호스트에서 확정
      ## 📖 개념 한 줄
      포렌식(미션 3)이 "공격자가 .php를 심고 ?c=로 썼다"를 알려줬다면, 이제 osquery로 그 **실체**를
      확정한다 — 로그만으로는 파일을 지울 수 없기 때문이다. osquery는 OS 상태를 SQL 테이블로 조회하는
      호스트 가시화 도구다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) file 테이블로 웹쉘 파일 헌팅(path/size/mtime) — 최근 mtime의 .php가 의심
      osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/socw10_shell.php";'
      # 2) listening_ports로 콜백 채널 헌팅(비표준 포트 44410의 pid/port)
      osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=44410;'
      ```
      - 1) 결과가 한 행이면 그 파일이 디스크에 실재(mtime 이 방금이면 막 심긴 의심). 실전은 `WHERE path LIKE "/tmp/%shell%"` 로 넓게 훑는다. 2) 비표준 고포트 리스너의 `pid` 가 미션 6 에서 종료할 콜백 프로세스.

      ## ✅ 합격 기준
      `socw10_shell` 출력 시 통과. **근거:** file 질의에 socw10_shell.php 가 한 행으로 나오고 44410
      리스너가 잡히면 통과 — 흔적(로그)과 실체(파일·포트)가 한 사건으로 묶여 제거 표적이 확정된다.
    hint: 'osquery file(웹쉘) + listening_ports(콜백)'
    category: analysis
    points: 14
    answer: |
      # 1) file 테이블로 웹쉘 파일 헌팅(path/size/mtime) — 최근 mtime의 .php가 의심
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT path,size,mtime FROM file WHERE path="/tmp/socw10_shell.php";'
      # 2) listening_ports로 콜백 채널 헌팅(비표준 포트 44410의 pid/port)
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT pid,port FROM listening_ports WHERE port=44410;'
    answer_detail: "웹 로그가 가리킨 웹쉘의 실체를 osquery로 호스트에서 헌팅한다 — file 테이블(파일 path/size/mtime: 최근 mtime의 .php가 의심)로 웹쉘 파일을, listening_ports 테이블(pid/port)로 콜백 채널(비표준 포트 44410)을 잡는다. 포렌식(흔적)과 헌팅(실체)이 만나 제거 표적(그 파일·그 포트)이 확정된다. 실전에서는 LIKE '%shell%'·port>40000으로 넓게 훑어 후보를 모은다."
    expected_output: |
      [
        {"mtime":"1782485227","path":"/tmp/socw10_shell.php","size":"27"}
      ]
      [
        {"pid":"54204","port":"44410"},
        {"pid":"54204","port":"44410"}
      ]
    verify:
      type: output_contains
      expect: 'socw10_shell'
      field: stdout
