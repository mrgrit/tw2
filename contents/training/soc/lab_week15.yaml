lab_id: standalone-soc-week15
title: "기말(수료) — APT 캠페인을 SOC 전 역량으로 분석·대응"
version: standalone-soc
course: soc
week: 15
description: |
  SOC 관제 수료(기말) 시험. 한 APT(끈질긴 표적 공격) 행위자(출처 IP 192.168.0.202)가 4 단계 킬체인
  (① 정찰 → ② 웹 익스플로잇 → ③ 인증 공격 → ④ 호스트 발판)으로 들어온다. 학생은 14주의 SOC 전 역량을
  한 캠페인에 총동원한다 — 흩어진 네 소스(네트워크 eve / 웹 ModSec / 인증 auth.log / 호스트 osquery)를
  트리아지(4요소·우선순위)하고, 같은 출처 IP 로 교차 상관해 ATT&CK 서사(T1046→T1190→T1110→T1136)로
  종합한 뒤, 분석에서 멈추지 않고 IR 로 끝까지 대응한다 — 격리(Contain, IDS sid 9515001)로 출처를 끊고,
  제거(Eradicate)로 백도어 계정(socw15bd)을 뽑고, IOC(aptsoc)를 Wazuh 인텔 룰(id 101515, level 13)로
  격상해 재발을 자동 탐지하게 만든다. 마지막으로 4 단계가 SIEM(alerts.json) 한 곳으로 수렴함을 출처 상관으로
  증명하고 APT 종합 보고서로 마무리한다. el34 는 SNAT 를 하지 않아 출처 IP 가 전 계층에 보존되므로 이 상관이
  가능하다. 공유 인프라이므로 심은 흔적(계정/IDS 룰/Wazuh 룰)은 각 미션에서 self-clean 하고 baseline 은
  절대 바꾸지 않는다. APT 공격(재현)은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 발신하고(세 벡터 출처
  모두 192.168.0.202), 분석·대응은 el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비번 1)에서 `docker exec`로 하며,
  인증 로그는 호스트 /var/log/auth.log 를 본다.
difficulty: hard
duration_minutes: 280
prerequisites:
  - "W01–W14 전부 통과 — 트리아지/인증·웹·네트워크 분석/룰 작성/ATT&CK/교차 분석/IR/포렌식·헌팅/인텔/자동화"
  - "el34 호스트 SSH(`ssh ccc@{{TARGET_IP}}`, 비밀번호 1) + docker exec 로 컨테이너 진입"
  - "lecture §2(SOC의 APT 대응 흐름: 트리아지→상관→서사→IR→인텔→보고) §3(종합 보고서) §6(판단 프레임워크) 숙지"
objectives:
  - "APT 4 단계(정찰→웹침투→인증→발판)를 트리아지(4요소·P1~P4)·네 소스 교차 상관·ATT&CK 서사(T1046→T1190→T1110→T1136)로 종합한다"
  - "분석에서 멈추지 않고 IR 로 대응한다 — 격리(Contain, IDS sid 9515001)로 출처를 끊고 제거(Eradicate, userdel)로 백도어 발판(socw15bd)을 뽑는다"
  - "이 APT 의 IOC(aptsoc)를 Wazuh 인텔 룰(id 101515, level 13)로 격상해 재발을 자동 고위험으로 탐지하게 만든다(logtest 검증 후 cp 복원)"
  - "4 단계 흔적이 SIEM(alerts.json) 한 곳으로 수렴함을 출처 IP(192.168.0.202) 상관으로 증명하고 APT 종합 보고서로 마무리한다"
  - "공유 인프라 보존 — 모든 실습 흔적(계정/IDS 룰/Wazuh 룰)을 self-clean 해 베이스 상태로 복원한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — APT 종합 대응에 동원할 SOC 핵심 도구가 모두 살아있는지 점검
      APT 캠페인을 분석·대응하려면 세 도구가 모두 가용해야 한다 — SIEM(평결), osquery(호스트 헌팅),
      Suricata(네트워크). 하나라도 죽으면 그 단계가 사각(blind spot)이 된다.

      ## 개념 — 왜 도구 점검부터 하나
      분석가는 사건을 파기 전에 항상 데이터 소스·도구의 가용성부터 확인한다. 죽은 도구가 보는 단면은
      애초에 분석 범위에서 빠지므로, 시작부터 무엇을 볼 수 있고 없는지 정확히 알아야 한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 세 컨테이너에 각각 접속해 실행 — `docker exec -it el34-siem|el34-web|el34-ips bash`.

      ```bash
      # ── el34-siem 에서: SIEM 평결 엔진 ──
      # 1) SIEM 평결 엔진 analysisd 가동(심장)
      /var/ossec/bin/wazuh-control status | grep analysisd
      # ── el34-web 에서: 호스트 헌팅 도구 ──
      # 2) 호스트 헌팅 도구 osquery 버전(가동 여부)
      osqueryi --version
      # ── el34-ips 에서: 네트워크 IDS ──
      # 3) 네트워크 IDS Suricata 버전
      suricata -V | head -1
      ```

      ## ✅ 합격 기준
      `5.23` 출력 시 통과. **근거:** analysisd 가 running 이고 osquery·Suricata 가 버전을 응답하면
      SIEM/osquery/Suricata 전 도구가 준비된 것 — 셋 중 하나라도 없으면 그 단계는 분석/대응 불가다.
    hint: 'analysisd + osquery + suricata'
    category: survey
    points: 8
    answer: |
      # 1) SIEM 평결 엔진 analysisd 가동(심장)
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) 호스트 헌팅 도구 osquery 버전(가동 여부)
      ssh ccc@10.20.32.80 sudo osqueryi --version
      # 3) 네트워크 IDS Suricata 버전
      ssh ccc@10.20.31.2 'suricata -V | head -1'
    answer_detail: "SOC 전 도구 점검 — SIEM(Wazuh analysisd) 분석/평결, osquery 호스트 헌팅, Suricata 네트워크. APT 4 단계를 끊을 도구가 전부 살아 있어야 분석·대응이 가능하다. 채점은 osquery 버전 문자열(5.23)이 출력에 보이는지로 도구 가용을 확인한다."
    expected_output: |
      wazuh-analysisd is running...
      osqueryi version 5.23.0
      This is Suricata version 6.0.4 RELEASE
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "SOC 전 도구 점검"
        success_criteria: ["SIEM/osquery/Suricata"]
        acceptable_methods: ["**[OSS] 도구 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 분석·대응할 APT 캠페인을 직접 재현(정찰 → 웹침투 → 인증 → 발판)
      한 APT 행위자(출처 192.168.0.202)의 4 단계를 재현해, 네 소스에 흩어진 흔적을 만든다. 이 한 번의
      재현이 이후 모든 분석·대응 미션(트리아지·교차·서사·격리·제거)의 원천 데이터다.

      ## 개념 — 한 출처, 네 단계, 네 소스
      같은 공격자가 단계마다 다른 소스에 흔적을 남긴다 — 정찰은 네트워크(eve), 웹침투는 웹(ModSec),
      인증은 auth.log, 발판은 호스트(osquery). el34 가 SNAT 를 안 하므로 네 흔적의 출처가 모두
      192.168.0.202 로 보존된다(이것이 뒤의 교차 상관을 가능하게 한다).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** ①②③ 공격은 모두 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 — 정찰·웹은 공인 진입 192.168.0.161로, 인증 무차별 대입은 el34 호스트(192.168.0.80) SSH로(출처 모두 192.168.0.202). ④ 침투 후 발판(웹쉘 모사)은 `el34-web`.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: ① 정찰 + ② 웹 익스플로잇 ──
      # 1) ① 정찰 — SYN 포트 스캔(T1046)
      sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned
      # 2) ② 웹 익스플로잇 — sqlmap UA + SQLi(T1190, 공격 마커 aptsoc)
      echo -en 'GET /?id=aptsoc%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # ── (202에서) el34 호스트(192.168.0.80) SSH에: ③ 인증 공격(SSH 무차별 대입) ──
      # 3) ③ 인증 공격 — 여러 계정 SSH 무차별 대입(T1110)
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 admin@192.168.0.80 exit
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 oracle@192.168.0.80 exit
      # ── el34-web 에서: ④ 호스트 발판 ──
      # 4) ④ 호스트 발판 — 백도어 계정 socw15bd 생성(T1136, 침투 성공 흔적)
      id socw15bd >/dev/null 2>&1 && userdel -r socw15bd; useradd -m -s /bin/bash socw15bd; echo planted
      # ── el34 호스트에서: 완료 마커 ──
      # 5) SIEM 적재 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "apt campaign done"
      ```
      - `sudo nmap -sS`=SYN(half-open) 스캔, `-T4`=빠른 타이밍. `User-Agent:` 헤더=UA 위장. `ssh -o BatchMode=yes`=프롬프트 없이 즉시 실패(시도 흔적만). `useradd`=침투 성공의 호스트 흔적.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** 네 단계가 순서대로 실행되고 apt campaign done 이 나오면 통과 —
      단계가 빠지면 이후 그 소스 분석에서 흔적이 안 보이므로 재현부터 다시 한다.
    hint: 'nmap+웹+ssh브루트+백도어계정'
    category: recon
    points: 10
    answer: |
      # 1) ① 정찰 — SYN 포트 스캔(T1046)
      ssh att@192.168.0.202 'sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned'
      # 2) ② 웹 익스플로잇 — sqlmap UA + SQLi(T1190, 공격 마커 aptsoc)
      ssh att@192.168.0.202 "echo -en 'GET /?id=aptsoc%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 3) ③ 인증 공격 — 여러 계정 SSH 무차별 대입(T1110)
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@192.168.0.80 exit'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 admin@192.168.0.80 exit'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 oracle@192.168.0.80 exit'
      # 4) ④ 호스트 발판 — 백도어 계정 socw15bd 생성(T1136, 침투 성공 흔적)
      ssh ccc@10.20.32.80 'sudo id socw15bd >/dev/null 2>&1 && userdel -r socw15bd; useradd -m -s /bin/bash socw15bd; echo planted'
      # 5) SIEM 적재 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "apt campaign done"
    answer_detail: "APT 4 단계 재현 — 정찰(nmap, T1046) → 웹침투(sqlmap UA + SQLi, T1190) → 인증(SSH 무차별 대입, T1110) → 발판(백도어 계정 socw15bd, T1136). 한 출처(192.168.0.202)가 네 소스(네트워크·웹·인증·호스트)에 흔적을 남긴다. 끝에 조건 폴링(로그 흔적 대기) 은 SIEM(Wazuh)이 경보를 적재할 시간을 준 뒤 done 을 출력하기 위함. 채점은 출력에 'done' 이 보이는지로 4 단계 재현 완료를 확인한다. 이 흔적들이 이후 트리아지·교차 분석·격리·제거의 원천이다."
    expected_output: |
      scanned
      planted
      apt campaign done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "APT 다단계 재현"
        success_criteria: ["정찰/웹/인증/발판"]
        acceptable_methods: ["**[OSS] 4단계 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 목표 — 다단계 경보를 4요소로 트리아지하고 우선순위(P1~P4)를 매김
      쏟아지는 경보 중 "무엇부터 볼지"를 정하는 것이 SOC 의 첫 판단이다(W01). APT 의 흔적을 4요소로
      분류하고, 진행 단계에 따라 캠페인 전체의 우선순위를 결정한다.

      ## 개념 — 트리아지 4요소 + 진행 단계
      W01 의 트리아지 4요소는 **출발지**(같은 IP 인가) · **시그니처**(무슨 공격인가) · **시각**(연이어
      일어났나) · **심각도**(level 이 얼마나 높은가)다. 여기에 기말은 한 축을 더한다 — **진행 단계**.
      단발 정찰은 P3 이지만, 같은 출처가 정찰→침투→인증→발판까지 갔다면 진행형 침해다. 특히 백도어 계정
      (socw15bd)이 심겼다는 것은 **침투 성공의 확정 증거**이므로 이 캠페인은 **P1**이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) alerts.json 최근 500줄에서 출처 192.168.0.202 경보의 시그니처/심각도 추출(4요소)
      tail -500 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.data.src_ip=="192.168.0.202")|{sig:.rule.description,level:.rule.level}' | tail -5
      # 2) 판정 — 출발지 192.168.0.202, 다단계, 발판=침투성공 → P1
      # → 출발지 192.168.0.202, 다단계, 발판=침투성공 → P1
      ```

      ## ✅ 합격 기준
      `192.168.0.202` 출력 시 통과. **근거:** 출처 192.168.0.202 의 다단계 경보가 보이고 발판=침투 성공을
      근거로 P1 로 판정하면 통과 — 출처 경보가 비면 미션 2 의 재현이나 agent 연결을 점검한다.
    hint: 'alerts.json src .202 시그니처/level'
    category: analysis
    points: 10
    answer: |
      # 1) alerts.json 최근 500줄에서 출처 192.168.0.202 경보의 시그니처/심각도 추출(4요소)
      ssh ccc@10.20.32.100 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -c "select(.data.src_ip==\"192.168.0.202\")|{sig:.rule.description,level:.rule.level}" | tail -5'
      # 2) 판정 — 출발지 192.168.0.202, 다단계, 발판=침투성공 → P1
      # → 출발지 192.168.0.202, 다단계, 발판=침투성공 → P1
    answer_detail: "트리아지 = 4요소(출발지 192.168.0.202 / 시그니처 / 시각 / 심각도 level) + 진행 단계로 우선순위 결정. 단발 정찰은 P3 이지만 정찰→침투→인증→발판까지 진행했고 백도어 계정(socw15bd)이 심겨 침투 성공이 확정되므로 P1 이다. 채점은 출력에 출발지 192.168.0.202 가 보이는지로 트리아지 대상이 식별됐음을 확인한다."
    expected_output: |
      {"sig":"Suricata: Alert - EL34 SQL Injection - UNION SELECT","level":3}
      {"sig":"Suricata: Alert - EL34 Bot UA - sqlmap","level":3}
      {"sig":"Suricata: Alert - EL34 SQL Injection - UNION SELECT","level":3}
      {"sig":"Suricata: Alert - EL34 Bot UA - sqlmap","level":3}
      {"sig":"Suricata: Alert - EL34 SQL Injection - UNION SELECT","level":3}
      → 출발지 192.168.0.202, 다단계, 발판=침투성공 → P1
    verify:
      type: output_contains
      expect: '192.168.0.202'
