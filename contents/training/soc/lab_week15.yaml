      ```
      ## ✅ 합격 기준
      계정/IDS룰/Wazuh룰 잔재 0 + `check done`.
    hint: 'socw15bd/9515001/101515 잔재 0'
    category: cleanup
    points: 6
    answer: |
      docker exec el34-web sh -c 'userdel -r socw15bd 2>/dev/null; id socw15bd 2>/dev/null && echo "계정 잔재!" || echo "user ok"'
      echo "=== IDS sid 9515001 잔재 ==="
      docker exec el34-ips sh -c 'sudo grep -c 9515001 /etc/suricata/rules/local.rules'
      echo "=== Wazuh 101515 잔재 ==="
      docker exec el34-siem sh -c 'echo "101515 잔재=$(grep -c 101515 /var/ossec/etc/rules/local_rules.xml)"'
      echo "---check done---"
    answer_detail: "수료 마무리 = 실습 흔적(계정/IDS룰/Wazuh룰) 전체 정리. 공유 인프라를 베이스로 복원."
    verify:
      type: output_contains
      expect: 'check done'
      field: stdout
      semantic:
