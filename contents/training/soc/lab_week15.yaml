      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert ip 192.168.0.202 any -> any any (msg:\"SOC W15 APT contain\"; sid:9515001; rev:1;)
      EOF"
      # 2) 무중단 reload
      sudo suricatasc -c reload-rules
      # ── 외부 공격자 VM 192.168.0.202 에서: 출발지 트래픽 유발 ──
      echo -en 'GET / HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null; timeout 12 bash -c 'until ssh ccc@10.20.31.2 \"sudo grep -q 9515001 /var/log/suricata/eve.json\"; do :; done' || true
      # ── el34-ips 에서: 트리거 확인 + self-clean ──
