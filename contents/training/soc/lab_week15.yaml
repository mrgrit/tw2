      "이 IOC 가 보이면 즉시 고위험으로 다뤄라"를 룰로 박는 것. 공유 인프라이므로 **라이브 manager 를
      재시작하지 않고** `wazuh-logtest` 로만 검증하고, 끝나면 `cp` 로 원본 룰을 복원한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 원본 룰셋 백업(복원 안전장치)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw15_lr.bak
      # 2) APT IOC 격상 룰(id 101515, level 13, json + apt_ioc=aptsoc) append
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w15,\">
        <rule id=\"101515\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"apt_ioc\">aptsoc</field>
          <description>SOC W15 APT IOC escalate</description>
        </rule>
      </group>
      EOF"
      # 3) IOC JSON을 임시 파일로 작성(logtest 입력)
      cat > /tmp/socw15.json <<EOF
      {"apt_ioc":"aptsoc","src_ip":"192.168.0.202"}
      EOF
      # 4) logtest로 룰 101515 level 13 격상 발화 확인 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw15.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw15.json
      # 5) 백업 복원 — IOC 룰 잔재 0(베이스 보존)
      sudo cp /tmp/socw15_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw15_lr.bak; echo "복원 잔재=$(grep -c 101515 /var/ossec/etc/rules/local_rules.xml)"
      ```
      - `apt_ioc` 필드가 `aptsoc` 면 id 101515/level 13 발화. `wazuh-logtest`=라이브 재시작 없이 검증. id 네임스페이스 W15=1015xx(W09=1009xx, W13=1013xx 와 격리).

      ## ✅ 합격 기준
