lab_id: standalone-soc-week15
title: "기말(수료) — APT 캠페인을 SOC 전 역량으로 분석·대응"
version: standalone-soc
course: soc
week: 15
description: |
  SOC 관제 수료 시험. 한 APT 캠페인(정찰→웹침투→인증→호스트발판)을 트리아지·교차분석·ATT&CK 서사·
  IR(격리·제거)·인텔 격상으로 끝까지 분석·대응한다. 14주의 SOC 전 역량을 한 캠페인에 총동원.
  룰/발판은 self-clean(공유 인프라 보존). 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서.
difficulty: hard
duration_minutes: 280
prerequisites:
  - "W01–W14 전부 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(대응 흐름) §3(APT↔역량) 숙지"
objectives:
  - "APT 다단계를 트리아지·교차분석·ATT&CK 서사로 종합"
  - "IR(격리/제거) + 인텔 격상으로 대응"
  - "SIEM 수렴·출처 상관 + APT SOC 보고서"
  - "모든 실습 흔적 self-clean"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — SOC 전 도구
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      docker exec el34-web osqueryi --version; docker exec el34-ips sh -c 'suricata -V 2>/dev/null | head -1'
      ```
      ## ✅ 합격 기준
      SIEM/osquery/Suricata 전 도구 준비.
    hint: 'analysisd + osquery + suricata'
    category: survey
    points: 8
    answer: |
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      docker exec el34-web osqueryi --version
      docker exec el34-ips sh -c 'suricata -V 2>/dev/null | head -1'
    answer_detail: "SOC 전 도구 — SIEM(Wazuh) 분석/평결, osquery 호스트 헌팅, Suricata 네트워크."
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "SOC 전 도구 점검"
        success_criteria: ["SIEM/osquery/Suricata"]
        acceptable_methods: ["**[OSS] 도구 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 APT 다단계 재현
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'nmap -sS -p 20-120 10.20.30.1 -T4 >/dev/null 2>&1'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=aptsoc%27%20UNION%20SELECT%201--%20-\""
      for u in root admin oracle; do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null; done
      docker exec el34-web sh -c 'userdel -r socw15bd 2>/dev/null; useradd -m -s /bin/bash socw15bd; echo planted'
      echo "apt campaign done"
      ```
      ## ✅ 합격 기준
      정찰→웹→인증→발판 4단계가 재현된다.
    hint: 'nmap+웹+ssh브루트+백도어계정'
    category: recon
    points: 10
    answer: |
      docker exec el34-attacker sh -c 'nmap -sS -p 20-120 10.20.30.1 -T4 >/dev/null 2>&1; echo scanned'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=aptsoc%27%20UNION%20SELECT%201--%20-\""
      for u in root admin oracle; do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null; done
      docker exec el34-web sh -c 'userdel -r socw15bd 2>/dev/null; useradd -m -s /bin/bash socw15bd; echo planted'
      sleep 6
      echo "apt campaign done"
    answer_detail: "APT 4단계 — 정찰(스캔)→웹침투(SQLi)→인증(SSH 대입)→발판(백도어 계정 socw15bd). 흩어진 텔레메트리에 흔적."
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "APT 다단계 재현"
        success_criteria: ["정찰/웹/인증/발판"]
        acceptable_methods: ["**[OSS] 4단계 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 트리아지 — 4요소 + 우선순위
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -c "select(.data.src_ip==\"10.20.30.202\")|{sig:.rule.description,level:.rule.level}" | tail -5'
      ```
      ## ✅ 합격 기준
      경보를 4요소로 트리아지하고 우선순위를 매긴다.
    hint: 'alerts.json src .202 시그니처/level'
    category: analysis
    points: 10
    answer: |
      echo "=== 트리아지 (4요소) ==="
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -c "select(.data.src_ip==\"10.20.30.202\")|{sig:.rule.description,level:.rule.level}" | tail -5'
      echo "→ 출발지 10.20.30.202, 다단계, 발판=침투성공 → P1"
    answer_detail: "트리아지 = 출발지/시그니처/시각/심각도 + 우선순위. 발판(침투 성공)이 있으면 P1."
    verify:
      type: output_contains
      expect: '10.20.30.202'
      field: stdout
      semantic:
        intent: "4요소 트리아지 + 우선순위"
        success_criteria: ["4요소", "우선순위"]
        acceptable_methods: ["**[OSS] alerts.json 트리아지 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 교차 분석 — 네 소스
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort -u'
      grep -acE "Invalid user" /var/log/auth.log
      ```
      ## ✅ 합격 기준
      웹/인증 등 소스를 교차 분석한다.
    hint: 'modsec + auth.log 교차'
    category: analysis
    points: 10
    answer: |
      echo "=== 웹(ModSec) ==="; docker exec el34-web sh -c 'sudo tail -60 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort -u'
      echo "=== 인증(auth.log) ==="; grep -acE "Invalid user" /var/log/auth.log
      echo "=== 발판(osquery) ==="; docker exec el34-web osqueryi --json 'SELECT username FROM users WHERE username="socw15bd";'
      echo "→ 네 소스(웹/인증/호스트/네트워크) 교차 = 한 APT 캠페인"
    answer_detail: "교차 분석 = 웹(942)+인증(Invalid user)+호스트(socw15bd 발판)+네트워크. 한 출처의 다단계를 종합."
    verify:
      type: output_contains
      expect: 'socw15bd'
      field: stdout
      semantic:
        intent: "네 소스 교차 분석"
        success_criteria: ["웹/인증/호스트 교차"]
        acceptable_methods: ["**[OSS] 다소스 교차 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ATT&CK 서사
      ## 💻 실행 명령
      ```bash
      echo "정찰 T1046 → 웹침투 T1190 → 인증 T1110 → 발판 T1136"
      ```
      ## ✅ 합격 기준
      APT를 ATT&CK 서사로 종합한다.
    hint: 'T1046→T1190→T1110→T1136'
    category: analysis
    points: 10
    answer: |
      echo "=== APT ATT&CK 서사 ==="
      echo "T1046 정찰(스캔) → T1190 웹침투(SQLi) → T1110 인증(SSH 대입) → T1136 발판(백도어 계정)"
      echo "→ 출처 10.20.30.202 일관, 시간순, 단계 일관 = 한 APT 캠페인"
    answer_detail: "ATT&CK 서사 = 단계별 기술 + 출처/시간 일관. APT의 전체 그림."
    verify:
      type: output_contains
      expect: 'T1190'
      field: stdout
      semantic:
        intent: "ATT&CK 서사 종합"
        success_criteria: ["T1046→T1190→T1110→T1136"]
        acceptable_methods: ["**[관리적] ATT&CK 서사 (권장)**"]
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 IR Contain — 출발지 격리 (sid 9515001)
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert ip 10.20.30.202 any -> any any (msg:\"SOC W15 APT contain\"; sid:9515001; rev:1;)
      EOF"'
      docker exec el34-ips sh -c 'sudo suricatasc -c reload-rules'; sleep 2
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" http://10.20.30.1/'; sleep 4
      docker exec el34-ips sh -c 'sudo grep -c 9515001 /var/log/suricata/eve.json'
      docker exec el34-ips sh -c 'sudo sed -i "/sid:9515001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null'
      ```
      ## ✅ 합격 기준
      격리 룰(9515001)이 출발지를 플래그한다(정리 후 보존).
    hint: '출발지 alert 룰(9515001) → reload → 트리거 → 삭제'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-ips sh -c 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert ip 10.20.30.202 any -> any any (msg:\"SOC W15 APT contain\"; sid:9515001; rev:1;)
      EOF"'
      docker exec el34-ips sh -c 'sudo suricatasc -c reload-rules'; sleep 2
      docker exec el34-attacker sh -c 'curl -s -o /dev/null -H "Host: dvwa.el34.lab" http://10.20.30.1/'; sleep 4
      echo "=== 격리 룰 트리거 ==="
      docker exec el34-ips sh -c 'sudo grep -c 9515001 /var/log/suricata/eve.json'
      docker exec el34-ips sh -c 'sudo sed -i "/sid:9515001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo rule_removed'
    answer_detail: "IR Contain = APT 출발지 격리(IDS 9515001). 운영은 firewall drop, 공유 환경은 alert 시연 + 정리."
    verify:
      type: output_contains
      expect: 'rule_removed'
      field: stdout
      semantic:
        intent: "APT 출발지 격리"
        success_criteria: ["sid 9515001", "출발지 플래그", "정리"]
        acceptable_methods: ["**[OSS] 출발지 alert 룰 (권장)**"]
    target_vm: ips

  - order: 7
    instruction: |
      ## 🎯 IR Eradicate — 발판 제거
      ## 💻 실행 명령
      ```bash
      docker exec el34-web osqueryi --json 'SELECT username FROM users WHERE username="socw15bd";'
      docker exec el34-web sh -c 'userdel -r socw15bd 2>/dev/null; echo eradicated'
      ```
      ## ✅ 합격 기준
      백도어 발판을 제거한다.
    hint: 'osquery 확인 → userdel'
    category: response
    points: 12
    answer: |
      echo "=== 발판 확인 ==="
      docker exec el34-web osqueryi --json 'SELECT username,uid FROM users WHERE username="socw15bd";'
      echo "=== Eradicate ==="
      docker exec el34-web sh -c 'userdel -r socw15bd 2>/dev/null; echo eradicated'
    answer_detail: "IR Eradicate = osquery로 발판(socw15bd) 확인 후 제거. 빠짐없이."
    verify:
      type: output_contains
      expect: 'eradicated'
      field: stdout
      semantic:
        intent: "발판 제거"
        success_criteria: ["osquery 확인", "userdel"]
        acceptable_methods: ["**[OSS] osquery + userdel (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 인텔 격상 — APT IOC 룰 (id 101515)
      ## 💻 실행 명령
      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw15_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="soc_w15,">
        <rule id="101515" level="13">
          <decoded_as>json</decoded_as>
          <field name="apt_ioc">aptsoc</field>
          <description>SOC W15 - APT IOC escalate</description>
        </rule>
      </group>
      EOF'
      echo '{"apt_ioc":"aptsoc","src_ip":"10.20.30.202"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/socw15_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw15_lr.bak
      ```
      ## ✅ 합격 기준
      APT IOC 룰(101515)이 격상 발화한다(정리 후 보존).
    hint: 'APT IOC 룰(101515) → logtest → cp 복원'
    category: manipulation
    points: 12
    answer: |
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw15_lr.bak'
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w15,\">
        <rule id=\"101515\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"apt_ioc\">aptsoc</field>
          <description>SOC W15 APT IOC escalate</description>
        </rule>
      </group>
      EOF"'
      docker exec el34-siem sh -c 'cat > /tmp/socw15.json <<EOF
      {"apt_ioc":"aptsoc","src_ip":"10.20.30.202"}
      EOF'
      echo "=== APT IOC 격상 logtest ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw15.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw15.json'
      docker exec el34-siem sh -c 'sudo cp /tmp/socw15_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw15_lr.bak; echo "복원 잔재=$(grep -c 101515 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "인텔 격상 = APT IOC(aptsoc)를 level 13으로 → 재발 자동 고위험. W13 인텔 운영을 APT에 적용. logtest 검증 후 cp 복원."
    verify:
      type: output_contains
      expect: '101515'
      field: stdout
      semantic:
        intent: "APT IOC 인텔 격상"
        success_criteria: ["id 101515 발화", "cp 복원"]
        acceptable_methods: ["**[OSS] IOC 룰 + logtest (권장)**"]
    target_vm: siem

  - order: 9
    instruction: |
      ## 🎯 SIEM 수렴 + 출처 상관
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.data.src_ip==\"10.20.30.202\")|.rule.groups" | sort | uniq -c | head'
      ```
      ## ✅ 합격 기준
      APT 흔적이 SIEM으로 수렴하고 출처로 상관된다.
    hint: 'alerts.json src .202 그룹 수렴'
    category: analysis
    points: 10
    answer: |
      echo "=== SIEM 수렴 (출처 10.20.30.202) ==="
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.data.src_ip==\"10.20.30.202\")|.rule.groups" | sort | uniq -c | head'
      echo "→ 다단계 흔적이 한 출처로 SIEM 수렴 = 한 APT 캠페인"
    answer_detail: "SIEM 수렴 = 다단계 흔적이 한 출처(10.20.30.202)로 alerts.json에. 출처 상관으로 한 APT 캠페인 확정."
    verify:
      type: output_contains
      expect: 'ids'
      field: stdout
      semantic:
        intent: "SIEM 수렴 + 출처 상관"
        success_criteria: ["다그룹 수렴", "출처 상관"]
        acceptable_methods: ["**[OSS] alerts.json 수렴 (권장)**"]
    target_vm: siem

  - order: 10
    instruction: |
      ## 🎯 APT SOC 보고서 (수료)
      ## 💻 보고서 양식
      ```markdown
      # SOC W15 APT 종합 보고서 (학번, 이름)
      ## 1. 캠페인 (출처/단계)
      ## 2. 트리아지 + 교차 분석 + ATT&CK 서사
      ## 3. IR (격리/제거) + 인텔 격상
      ## 4. SIEM 수렴 + 재발 방지
      ```
      ## ✅ 합격 기준
      SOC 전 역량이 보고서에 종합된다.
    hint: '분석+트리아지+IR+인텔 종합'
    category: report
    points: 6
    answer: |
      cat <<'EOF'
      # SOC W15 APT 종합 보고서 (수료)
      ## 1. 캠페인: 출처 10.20.30.202, 정찰→웹침투→인증→발판 4단계
      ## 2. 분석: 트리아지(P1) + 네소스 교차 + ATT&CK 서사(T1046→T1190→T1110→T1136)
      ## 3. IR: Contain(IDS 9515001) → Eradicate(socw15bd userdel) + 인텔 격상(101515)
      ## 4. SIEM 수렴(한 출처) + 재발 방지(IOC 룰/자동화)
      ## 결론: SOC 분석가는 흩어진 텔레메트리에서 APT 서사를 읽고 끝까지 분석·대응한다
      EOF
    answer_detail: "APT SOC 보고서 = 분석(트리아지/교차/ATT&CK) + 대응(IR/인텔). SOC 전 역량의 종합 = 수료."
    verify:
      type: output_contains
      expect: 'APT'
      field: stdout
      semantic:
        intent: "APT SOC 종합 보고 (수료)"
        success_criteria: ["분석+IR+인텔 종합"]
        acceptable_methods: ["**[관리적] APT SOC 보고서 (권장)**"]
    target_vm: siem

  - order: 11
    instruction: |
      ## 🎯 정리 확인 — 공유 인프라 보존
      ## 💻 확인 명령
      ```bash
      docker exec el34-web sh -c 'id socw15bd 2>/dev/null && echo "잔재!" || echo "user ok"'
      docker exec el34-ips sh -c 'sudo grep -c 9515001 /etc/suricata/rules/local.rules'
      docker exec el34-siem sh -c 'echo "101515 잔재=$(grep -c 101515 /var/ossec/etc/rules/local_rules.xml)"'
