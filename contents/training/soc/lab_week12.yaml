lab_id: standalone-soc-week12
title: "내부 위협 — 권한 남용을 UEBA로 잡고 증거를 보전하기"
version: standalone-soc
course: soc
week: 12
description: |
  가장 까다로운 위협인 내부자(insider threat) — 인가된 사용자의 권한 남용 — 을 다룬다. 외부 위협과 달리
  내부자는 들어오는 길목도 악성 시그니처도 없으므로, "무엇이 악성인가"가 아니라 "이 사람의 평소(baseline)와
  다른가"를 보는 UEBA(사용자·엔티티 행위 분석)로 잡는다. 정상 도구로 비정상 행위를 만드는 sudo 권한 남용 +
  데이터 staging(민감 파일 압축)을 재현하고, 호스트 auth.log(로그인 시각·sudo)와 osquery(파일·프로세스)로
  네 행위 축의 일탈을 식별·헌팅한다. 핵심은 외부 위협과 다른 대응 순서 — 내부 위협은 법적·인사적 후속이 따르므로
  격리·삭제에 앞서 증거를 변경 없이 보전(sha256 해시 + 타임스탬프)한다. 그 뒤에야 유출 채널을 탐지 룰로
  격리하고, 보전을 전제로 staging을 제거·복구한다. 내부 위협 IR은 HR/법무 협업이 전제. staging/룰은
  self-clean(공유 인프라 보존). 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})에서 실행한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W02(인증 auth.log·Accepted·sudo)·W09(IR 라이프사이클) 통과"
  - "el34 호스트 SSH + docker exec, W06–W07 osquery 숙지"
  - "lecture §2(UEBA: baseline 대비 일탈·행위 네 축) §3(유출 체인) §5(증거 보전 최우선) 숙지"
objectives:
  - "내부 위협이 외부 위협과 다른 점(길목·시그니처·도구 부재)을 이해하고 UEBA(baseline 대비 일탈)로 식별"
  - "행위 네 축(로그인 시각·권한 사용·파일 접근·데이터 이동)의 일탈을 auth.log/osquery로 읽고 staging 헌팅"
  - "격리·삭제에 앞선 증거 보전(sha256 해시 + 타임스탬프)으로 무결성 확보 후, 유출 채널 격리·복구를 HR/법무 협업으로 수행"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 행위 소스(auth.log·osquery) 가용성 점검
      ## 📖 개념
      내부 위협은 시그니처가 없어 **행위(behavior)** 로만 잡는다. 그 행위를 읽는 두 원천이
      호스트 `auth.log`(로그인 시각·sudo 권한 사용)와 `el34-web`의 osquery(파일·프로세스)다.
      분석 착수 전, 이 두 소스가 살아 있는지부터 확인한다 — 소스가 비면 그 행위 축은 못 본다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** auth.log 는 el34 호스트, osquery 는 `el34-web`.

      ```bash
      # ── el34 호스트에서: auth.log 존재 확인(로그인 시각·sudo = 행위 소스 1) ──
      ls -la /var/log/auth.log
      # ── el34-web 에서: osquery 동작 확인(파일·프로세스 = 행위 소스 2) ──
      osqueryi --version
      # UEBA 두 소스 요약
      echo "UEBA 소스: auth.log(로그인/sudo 행위) + osquery(파일/프로세스 행위)"
      ```
      ## ✅ 합격 기준
      `5.23` 출력 시 통과. **근거:** auth.log(로그인/sudo 행위)가 존재하고 osquery 가 el34 표준
      버전 5.23.0 을 응답하면 두 행위 소스(UEBA의 눈)가 준비된 것 — 둘 다 있어야 행위로 잡는다.
      ## 🔍 도구 풀이
      `auth.log`는 "사람이 언제·무슨 권한을 썼나", osquery 는 "그 결과 시스템에 무엇이 생겼나"를 본다.
    hint: 'auth.log + osquery'
    category: survey
    points: 8
    answer: |
      # 1) 호스트 auth.log 존재 확인(로그인 시각·sudo 권한 사용 = 행위 소스 1)
      ls -la /var/log/auth.log
      # 2) el34-web osquery 동작 확인(파일·프로세스 = 행위 소스 2)
      ssh ccc@10.20.32.80 sudo osqueryi --version
      # 3) UEBA 두 소스 요약
      echo "UEBA 소스: auth.log(로그인/sudo 행위) + osquery(파일/프로세스 행위)"
    answer_detail: "UEBA(사용자·엔티티 행위 분석)의 전제 = 읽을 행위 소스의 가용성. 호스트 auth.log(로그인 시각·sudo 권한 사용)와 el34-web osquery 5.23.0(파일 접근·staging)이 행위의 네 축을 나눠 담당한다. 둘 다 살아 있어야 내부 위협을 행위로 식별할 수 있다."
    expected_output: |
      -rw-r----- 1 syslog adm 811542  6월 26 23:46 /var/log/auth.log
      osqueryi version 5.23.0
      UEBA 소스: auth.log(로그인/sudo 행위) + osquery(파일/프로세스 행위)
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "행위 소스 점검"
        success_criteria: ["auth.log + osquery"]
        acceptable_methods: ["**[OSS] 소스 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 내부 위협 행위 재현: sudo 권한 남용 + 데이터 staging
      ## 📖 개념
      내부 위협의 핵심은 **정상 도구로 비정상 행위**를 만드는 것이다. `sudo`(관리 권한)와
      `tar`(압축)는 둘 다 정상 명령이지만, 그 사용 **패턴**이 일탈이다. 여기서는 sudo 권한
      사용(`auth.log`에 흔적)과 민감 파일을 `/tmp`에 압축하는 **데이터 staging**(유출 직전
      준비, lecture §3)을 재현해, 이후 분석·증거보전 미션의 원천 데이터를 만든다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** sudo 권한 사용은 el34 호스트, 데이터 staging 은 `el34-web`.

      ```bash
      # ── el34 호스트에서: 권한 사용 — 비밀번호(1) stdin sudo 무인 실행(auth.log에 sudo 흔적) ──
      echo 1 | sudo -S id >/dev/null 2>&1; echo "sudo used"
      # ── el34-web 에서: 데이터 staging — 민감 파일을 /tmp에 압축(유출 직전 준비) ──
      tar czf /tmp/socw12_exfil.tar.gz /etc/passwd /etc/hostname 2>/dev/null; echo staged
      # 완료 마커
      echo "insider done"
      ```
      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** sudo 권한 사용 + 민감 파일 staging 아카이브
      (/tmp/socw12_exfil.tar.gz)가 재현되고 insider done 이 나오면 통과.
      ## 🔍 도구 풀이
      `echo 1 | sudo -S` 는 stdin 으로 비밀번호(1)를 넘겨 sudo 를 무인 실행(auth.log 에 sudo 줄). `tar czf`
      는 c(생성)·z(gzip)·f(파일명)로 민감 파일을 한 아카이브에 모은다 — 사용자 `/tmp`의 임시 아카이브가 곧 유출 직전 신호.
    hint: 'sudo + tar 민감파일 staging'
    category: recon
    points: 10
    answer: |
      # 1) 권한 사용 — 비밀번호(1)를 stdin으로 넘겨 sudo 무인 실행(auth.log에 sudo 흔적)
      echo 1 | sudo -S id >/dev/null 2>&1; echo "sudo used"
      # 2) 데이터 staging — 민감 파일(/etc/passwd,hostname)을 /tmp에 압축(유출 직전 준비)
      ssh ccc@10.20.32.80 'tar czf /tmp/socw12_exfil.tar.gz /etc/passwd /etc/hostname 2>/dev/null; echo staged'
      # 3) 완료 마커
      echo "insider done"
    answer_detail: "내부 위협 = 인가된 사용자가 정상 권한으로 하는 비정상 행위. sudo 권한 사용(정상 명령)과 민감 파일 압축(tar, 정상 명령)이지만, 그 조합·패턴이 일탈 — staging은 유출 체인의 2단계(접근→staging→반출)로 반출 전에 잡을 마지막 신호다. 시그니처가 없으므로 행위(UEBA)로 잡는다."
    expected_output: |
      sudo used
      staged
      insider done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "내부 위협(권한남용+staging) 재현"
        success_criteria: ["sudo 사용", "데이터 staging"]
        acceptable_methods: ["**[OSS] sudo + tar staging (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — UEBA Identify: baseline 대비 행위 일탈 식별
      ## 📖 개념
      UEBA의 핵심 동작은 "관측된 행위 − baseline = 일탈"이다(lecture §2). 여기서는 **권한 사용
      축**(평소 안 쓰던 sudo 명령 다발)과 **로그인 시각 축**(비업무 시간 로그인)에서 "평소답지
      않음"을 읽는다. 명령 하나하나는 정상이어도, 여러 축이 함께 일탈하면 강한 신호가 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) auth.log에서 sudo COMMAND 패턴(권한 사용 축) 최근 8건
      grep -aE "sudo:.*COMMAND" /var/log/auth.log | tail -8
      # 2) 로그인 시각(야간?) 축 — Accepted 최근 5건
      grep -a "Accepted" /var/log/auth.log | tail -5
      # 3) 해석 — baseline 대비 갑작스런 sudo 다발/야간 로그인 = 행위 편차(내부 위협 신호)
      echo "→ baseline 대비: 갑작스런 sudo 다발/야간 로그인 = 행위 편차(내부 위협 신호)"
      ```
      ## ✅ 합격 기준
      `COMMAND` 출력 시 통과. **근거:** auth.log 에서 sudo ... COMMAND 패턴(권한 사용)이 식별되면
      통과 — COMMAND= 뒤 명령을 평소 명령 집합과 비교해 일탈을 판단한다.
      ## 🔍 도구 풀이
      `grep -a`(텍스트 강제) `-E`(확장 정규식). sudo 줄의 COMMAND= 뒤 명령을 평소 집합과 비교 →
      갑작스런 sudo 다발/평소 안 쓰던 관리 명령이 권한 남용 신호. 로그인 시각은 Accepted 타임스탬프로 야간·주말 여부 판단.
    hint: 'auth.log sudo COMMAND 패턴'
    category: analysis
    points: 12
    answer: |
      # 1) auth.log에서 sudo COMMAND 패턴(권한 사용 축) 최근 8건
      grep -aE "sudo:.*COMMAND" /var/log/auth.log | tail -8
      # 2) 로그인 시각(야간?) 축 — Accepted 최근 5건
      grep -a "Accepted" /var/log/auth.log | tail -5
      # 3) 해석 — baseline 대비 갑작스런 sudo 다발/야간 로그인 = 행위 편차(내부 위협 신호)
      echo "→ baseline 대비: 갑작스런 sudo 다발/야간 로그인 = 행위 편차(내부 위협 신호)"
    answer_detail: "UEBA Identify = baseline 대비 일탈 읽기. sudo COMMAND 로그(권한 사용 축) + Accepted 시각(로그인 시각 축)을 평소와 비교한다. UEBA는 선악을 단정하지 않고 '평소와 다름'의 신호를 올리는 데까지이며(오탐 동반), 분석가가 맥락을 더해 판정한다. 여러 축의 동시 일탈일수록 강한 내부 위협 신호다."
    expected_output: |
      Jun 21 22:40:32 elf4 sudo:     root : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/bash
      Jun 22 05:42:33 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 22 05:58:12 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 23 07:18:37 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 24 21:44:35 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 25 01:38:59 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 25 07:45:28 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 26 23:47:24 elf4 sudo:      ccc : PWD=/home/ccc ; USER=root ; COMMAND=/usr/bin/id
      Jun 26 23:
    verify:
      type: output_contains
      expect: 'COMMAND'
      field: stdout
      semantic:
        intent: "UEBA로 비정상 행위 식별"
        success_criteria: ["sudo COMMAND 패턴", "행위 편차"]
        acceptable_methods: ["**[OSS] auth.log sudo/시각 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 목표 — Hunt: 데이터 staging 아카이브 헌팅 (데이터 이동 축)
      ## 📖 개념
      유출 체인에서 **반출 전에 잡을 마지막 기회**가 staging이다(lecture §3). 1단계(대량 접근)는
      권한 내라 구별이 어렵고 3단계(반출)는 사후이므로, 그 사이 "민감 파일이 압축되어 한곳에 모인
      순간"을 osquery로 잡는다. `/tmp`의 `.tar.gz` 안에 민감 파일이 있으면 곧 나갈 짐가방이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) osquery file로 staging 아카이브 헌팅 — 경로/크기
      osqueryi --json 'SELECT path,size FROM file WHERE path="/tmp/socw12_exfil.tar.gz";'
      # 2) 해석 — 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging(대량 읽기+압축+전송)
      echo "→ 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging. 대량 읽기+압축+전송 = 유출 체인"
      ```
      ## ✅ 합격 기준
      `exfil` 출력 시 통과. **근거:** staging 아카이브가 경로(path)·크기(size)와 함께 헌팅되면 통과 —
      운영 헌팅은 `path LIKE "/tmp/%.tar.gz"` 로 넓게 훑는다(압축본의 비표준 위치·민감 내용이 단서).
      ## 🔍 도구 풀이
      osquery `file` 테이블은 파일 시스템을 SQL 로 질의(W06). `--json` 출력. path·size 가 반환되면 staging 실재 증거 — DLP 와 함께 유출의 마지막 방어선.
    hint: 'osquery file exfil 아카이브'
    category: analysis
    points: 12
    answer: |
      # 1) osquery file로 staging 아카이브 헌팅 — 경로/크기
      ssh ccc@10.20.32.80 sudo osqueryi --json 'SELECT path,size FROM file WHERE path="/tmp/socw12_exfil.tar.gz";'
      # 2) 해석 — 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging(대량 읽기+압축+전송)
      echo "→ 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging. 대량 읽기+압축+전송 = 유출 체인"
    answer_detail: "Hunt = 데이터 이동 축의 물증(staging) 헌팅. osquery file 테이블로 /tmp의 민감 파일 압축본을 잡는다 — 유출 체인(대량 접근 → staging → 반출)에서 반출 전에 잡을 마지막 신호다. 압축본의 비표준 위치와 민감 내용이 단서이며, DLP와 함께 유출의 마지막 방어선이다."
    expected_output: |
      [
        {"path":"/tmp/socw12_exfil.tar.gz","size":"558"}
      ]
      → 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging. 대량 읽기+압축+전송 = 유출 체인
    verify:
      type: output_contains
      expect: 'exfil'
      field: stdout
      semantic:
        intent: "데이터 staging 헌팅"
        success_criteria: ["staging 아카이브", "유출 체인 인지"]
        acceptable_methods: ["**[OSS] osquery file staging (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 증거 보전: 변경 없이 해시 + 타임스탬프 (최우선 단계)
      ## 📖 개념
