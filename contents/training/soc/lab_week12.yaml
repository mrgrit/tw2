      ## 🎯 목표 — Contain: 유출 채널 격리 (Suricata sid 9512001)
      ## 📖 개념
      증거를 보전한 **뒤에야** 유출 채널을 막는다 — 보전(미션 5) → 격리(여기) 순서가 내부 위협
      대응의 핵심이다. `.tar.gz` 전송을 탐지하는 룰을 작성·검증·적용했다가 self-clean으로 정리해,
      공유 인프라를 보존하면서 DLP(데이터 유출 차단)의 발상을 시연한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      # 1) 유출 채널 탐지 룰 추가 — http.uri에 .tar.gz 실린 전송(alert, sid 9512001, nocase)
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"SOC W12 data exfil archive\"; http.uri; content:\".tar.gz\"; nocase; sid:9512001; rev:1;)
      EOF"
      # 2) 적용 전 룰 문법 테스트(-T)
      sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -1
      # 3) 무중단 룰 재적용
      sudo suricatasc -c reload-rules >/dev/null
      # 4) self-clean — 룰 삭제 + reload + 잔재 0 확인
      sudo sed -i "/sid:9512001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo "유출채널 rule_removed (잔재=$(grep -c 9512001 /etc/suricata/rules/local.rules))"
      ```
      ## ✅ 합격 기준
      `rule_removed` 출력 시 통과. **근거:** 유출 채널 격리 룰(sid 9512001)이 작성·문법검증·적용된 뒤
      정리(잔재 0)되면 통과 — 핵심 순서는 증거 보전(미션 5) 후 격리, 운영은 DLP 차단+계정 권한 동결.
      ## 🔍 도구 풀이
      `http.uri ... content:".tar.gz"` 는 URI 에 .tar.gz 가 실린 전송 탐지(운영 DLP 축소판). 수명주기: `suricata -T`(문법)→`reload-rules`(무중단)→`sed`로 삭제(self-clean). 공유 el34라 drop 대신 alert 시연.
