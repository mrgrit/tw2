      후속(징계·소송)이 따르므로, 무엇을 지우거나 바꾸기 **전에** 증거를 변경 없이 보전해야
      한다(lecture §5). 포렌식 제1원칙 — "원본을 손대지 않는다". 이 단계가 빠지면 이후 모든 기술
      조치가 법적으로 무의미해질 수 있다. 따라서 격리(미션 6)·삭제(미션 7)보다 **앞선다**.
