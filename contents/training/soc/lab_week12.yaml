lab_id: standalone-soc-week12
title: "내부 위협 — 권한 남용을 UEBA로 잡고 증거를 보전하기"
version: standalone-soc
course: soc
week: 12
description: |
  가장 까다로운 위협인 내부자(insider threat) — 인가된 사용자의 권한 남용 — 을 다룬다. 외부 위협과 달리
  내부자는 들어오는 길목도 악성 시그니처도 없으므로, "무엇이 악성인가"가 아니라 "이 사람의 평소(baseline)와
  다른가"를 보는 UEBA(사용자·엔티티 행위 분석)로 잡는다. 정상 도구로 비정상 행위를 만드는 sudo 권한 남용 +
  데이터 staging(민감 파일 압축)을 재현하고, 호스트 auth.log(로그인 시각·sudo)와 osquery(파일·프로세스)로
  네 행위 축의 일탈을 식별·헌팅한다. 핵심은 외부 위협과 다른 대응 순서 — 내부 위협은 법적·인사적 후속이 따르므로
  격리·삭제에 앞서 증거를 변경 없이 보전(sha256 해시 + 타임스탬프)한다. 그 뒤에야 유출 채널을 탐지 룰로
  격리하고, 보전을 전제로 staging을 제거·복구한다. 내부 위협 IR은 HR/법무 협업이 전제. staging/룰은
  self-clean(공유 인프라 보존). 모든 명령은 el34 호스트(ssh ccc@192.168.0.151)에서 실행한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W02(인증 auth.log·Accepted·sudo)·W09(IR 라이프사이클) 통과"
  - "el34 호스트 SSH + docker exec, W06–W07 osquery 숙지"
  - "lecture §2(UEBA: baseline 대비 일탈·행위 네 축) §3(유출 체인) §5(증거 보전 최우선) 숙지"
objectives:
  - "내부 위협이 외부 위협과 다른 점(길목·시그니처·도구 부재)을 이해하고 UEBA(baseline 대비 일탈)로 식별"
  - "행위 네 축(로그인 시각·권한 사용·파일 접근·데이터 이동)의 일탈을 auth.log/osquery로 읽고 staging 헌팅"
  - "격리·삭제에 앞선 증거 보전(sha256 해시 + 타임스탬프)으로 무결성 확보 후, 유출 채널 격리·복구를 HR/법무 협업으로 수행"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 행위 소스(auth.log·osquery) 가용성 점검
      ## 📖 개념
      내부 위협은 시그니처가 없어 **행위(behavior)** 로만 잡는다. 그 행위를 읽는 두 원천이
      호스트 `auth.log`(로그인 시각·sudo 권한 사용)와 `el34-web`의 osquery(파일·프로세스)다.
      분석 착수 전, 이 두 소스가 살아 있는지부터 확인한다 — 소스가 비면 그 행위 축은 못 본다.
      ## 💻 실행 명령
      ```bash
      ls /var/log/auth.log; docker exec el34-web osqueryi --version
      ```
      ## ✅ 합격 기준
      `auth.log`(로그인/sudo 행위)가 존재하고, osquery가 el34 표준 버전 **5.23.0** 을 응답한다.
      ## 🔍 도구 풀이
      `osqueryi --version` 은 osquery 대화형 셸의 버전을 출력한다(예: `osqueryi version 5.23.0`).
      두 행위 소스가 곧 UEBA의 눈 — `auth.log`는 "사람이 언제·무슨 권한을 썼나", osquery는 "그
      결과 시스템에 무엇이 생겼나"를 본다.
    hint: 'auth.log + osquery'
    category: survey
    points: 8
    answer: |
      ls -la /var/log/auth.log
      docker exec el34-web osqueryi --version
      echo "UEBA 소스: auth.log(로그인/sudo 행위) + osquery(파일/프로세스 행위)"
    answer_detail: "UEBA(사용자·엔티티 행위 분석)의 전제 = 읽을 행위 소스의 가용성. 호스트 auth.log(로그인 시각·sudo 권한 사용)와 el34-web osquery 5.23.0(파일 접근·staging)이 행위의 네 축을 나눠 담당한다. 둘 다 살아 있어야 내부 위협을 행위로 식별할 수 있다."
    verify:
      type: output_contains
      expect: '5.23'
      field: stdout
      semantic:
        intent: "행위 소스 점검"
        success_criteria: ["auth.log + osquery"]
        acceptable_methods: ["**[OSS] 소스 점검 (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 내부 위협 행위 재현: sudo 권한 남용 + 데이터 staging
      ## 📖 개념
      내부 위협의 핵심은 **정상 도구로 비정상 행위**를 만드는 것이다. `sudo`(관리 권한)와
      `tar`(압축)는 둘 다 정상 명령이지만, 그 사용 **패턴**이 일탈이다. 여기서는 sudo 권한
      사용(`auth.log`에 흔적)과 민감 파일을 `/tmp`에 압축하는 **데이터 staging**(유출 직전
      준비, lecture §3)을 재현해, 이후 분석·증거보전 미션의 원천 데이터를 만든다.
      ## 💻 실행 명령
      ```bash
      echo 1 | sudo -S id >/dev/null 2>&1   # 권한 사용(auth.log sudo)
      docker exec el34-web sh -c 'tar czf /tmp/socw12_exfil.tar.gz /etc/passwd /etc/hostname 2>/dev/null; echo staged'
      echo "insider done"
      ```
      ## ✅ 합격 기준
      sudo 권한 사용 + 민감 파일 staging 아카이브(`/tmp/socw12_exfil.tar.gz`)가 재현되고
      `insider done` 이 출력된다.
      ## 🔍 도구 풀이
      `echo 1 | sudo -S` 는 표준입력으로 비밀번호(1)를 넘겨 sudo를 무인 실행한다 — 그 결과
      `auth.log`에 sudo 권한 사용 줄이 남는다. `tar czf` 는 `c`(생성)·`z`(gzip 압축)·`f`(파일명)로
      `/etc`의 민감 파일을 한 아카이브에 모은다 — 이것이 staging이다. 정상 백업은 지정 경로·도구를
      쓰지, 사용자 `/tmp`에 임시 아카이브를 만들지 않으므로 이 조합이 곧 유출 직전 신호다.
    hint: 'sudo + tar 민감파일 staging'
    category: recon
    points: 10
    answer: |
      echo "=== 권한 사용 (auth.log sudo) ==="
      echo 1 | sudo -S id >/dev/null 2>&1; echo "sudo used"
      echo "=== 데이터 staging (민감 파일 압축) ==="
      docker exec el34-web sh -c 'tar czf /tmp/socw12_exfil.tar.gz /etc/passwd /etc/hostname 2>/dev/null; echo staged'
      echo "insider done"
    answer_detail: "내부 위협 = 인가된 사용자가 정상 권한으로 하는 비정상 행위. sudo 권한 사용(정상 명령)과 민감 파일 압축(tar, 정상 명령)이지만, 그 조합·패턴이 일탈 — staging은 유출 체인의 2단계(접근→staging→반출)로 반출 전에 잡을 마지막 신호다. 시그니처가 없으므로 행위(UEBA)로 잡는다."
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "내부 위협(권한남용+staging) 재현"
        success_criteria: ["sudo 사용", "데이터 staging"]
        acceptable_methods: ["**[OSS] sudo + tar staging (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — UEBA Identify: baseline 대비 행위 일탈 식별
      ## 📖 개념
      UEBA의 핵심 동작은 "관측된 행위 − baseline = 일탈"이다(lecture §2). 여기서는 **권한 사용
      축**(평소 안 쓰던 sudo 명령 다발)과 **로그인 시각 축**(비업무 시간 로그인)에서 "평소답지
      않음"을 읽는다. 명령 하나하나는 정상이어도, 여러 축이 함께 일탈하면 강한 신호가 된다.
      ## 💻 실행 명령
      ```bash
      grep -aE "sudo:.*COMMAND" /var/log/auth.log | tail -8
      ```
      ## ✅ 합격 기준
      `auth.log`에서 `sudo ... COMMAND` 패턴(권한 사용)이 식별된다.
      ## 🔍 도구 풀이
      `grep -a` 의 `-a`는 로그를 바이너리로 오인해 출력이 잘리는 것을 막아 텍스트로 강제하고,
      `-E`는 확장 정규식을 쓴다. sudo 줄의 `COMMAND=` 뒤 명령을 그 계정의 **평소 명령 집합**과
      비교해 일탈을 판단한다 — 갑작스러운 sudo 다발/평소 안 쓰던 관리 명령이 권한 남용 신호다.
      로그인 시각은 `Accepted` 줄의 타임스탬프로 야간·주말 여부를 본다.
    hint: 'auth.log sudo COMMAND 패턴'
    category: analysis
    points: 12
    answer: |
      echo "=== sudo 권한 사용 (UEBA) ==="
      grep -aE "sudo:.*COMMAND" /var/log/auth.log | tail -8
      echo "=== 로그인 시각(야간?) ==="
      grep -a "Accepted" /var/log/auth.log | tail -5
      echo "→ baseline 대비: 갑작스런 sudo 다발/야간 로그인 = 행위 편차(내부 위협 신호)"
    answer_detail: "UEBA Identify = baseline 대비 일탈 읽기. sudo COMMAND 로그(권한 사용 축) + Accepted 시각(로그인 시각 축)을 평소와 비교한다. UEBA는 선악을 단정하지 않고 '평소와 다름'의 신호를 올리는 데까지이며(오탐 동반), 분석가가 맥락을 더해 판정한다. 여러 축의 동시 일탈일수록 강한 내부 위협 신호다."
    verify:
      type: output_contains
      expect: 'COMMAND'
      field: stdout
      semantic:
        intent: "UEBA로 비정상 행위 식별"
        success_criteria: ["sudo COMMAND 패턴", "행위 편차"]
        acceptable_methods: ["**[OSS] auth.log sudo/시각 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 목표 — Hunt: 데이터 staging 아카이브 헌팅 (데이터 이동 축)
      ## 📖 개념
      유출 체인에서 **반출 전에 잡을 마지막 기회**가 staging이다(lecture §3). 1단계(대량 접근)는
      권한 내라 구별이 어렵고 3단계(반출)는 사후이므로, 그 사이 "민감 파일이 압축되어 한곳에 모인
      순간"을 osquery로 잡는다. `/tmp`의 `.tar.gz` 안에 민감 파일이 있으면 곧 나갈 짐가방이다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web osqueryi --json 'SELECT path,size FROM file WHERE path="/tmp/socw12_exfil.tar.gz";'
      ```
      ## ✅ 합격 기준
      staging 아카이브가 경로(`path`)·크기(`size`)와 함께 헌팅된다.
      ## 🔍 도구 풀이
      osquery `file` 테이블은 파일 시스템을 SQL로 질의하게 해준다(W06). `--json`은 결과를 JSON으로
      출력한다. `path`(어디에)·`size`(얼마나)가 반환되면 staging이 실재한다는 증거다. 운영 헌팅은
      `path LIKE "/tmp/%.tar.gz"` 처럼 패턴으로 넓게 훑어 의심 아카이브 전반을 찾는다 — 압축본의
      비표준 위치(`/tmp`)와 민감 내용이 핵심 단서다.
    hint: 'osquery file exfil 아카이브'
    category: analysis
    points: 12
    answer: |
      echo "=== 데이터 staging 헌팅 (osquery file) ==="
      docker exec el34-web osqueryi --json 'SELECT path,size FROM file WHERE path="/tmp/socw12_exfil.tar.gz";'
      echo "→ 민감 파일 압축(/tmp/*.tar.gz of /etc) = 유출 직전 staging. 대량 읽기+압축+전송 = 유출 체인"
    answer_detail: "Hunt = 데이터 이동 축의 물증(staging) 헌팅. osquery file 테이블로 /tmp의 민감 파일 압축본을 잡는다 — 유출 체인(대량 접근 → staging → 반출)에서 반출 전에 잡을 마지막 신호다. 압축본의 비표준 위치와 민감 내용이 단서이며, DLP와 함께 유출의 마지막 방어선이다."
    verify:
      type: output_contains
      expect: 'exfil'
      field: stdout
      semantic:
        intent: "데이터 staging 헌팅"
        success_criteria: ["staging 아카이브", "유출 체인 인지"]
        acceptable_methods: ["**[OSS] osquery file staging (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 증거 보전: 변경 없이 해시 + 타임스탬프 (최우선 단계)
      ## 📖 개념
      여기서 내부 위협 대응이 외부 위협과 **결정적으로** 갈린다. 내부 위협은 법적·인사적
      후속(징계·소송)이 따르므로, 무엇을 지우거나 바꾸기 **전에** 증거를 변경 없이 보전해야
      한다(lecture §5). 포렌식 제1원칙 — "원본을 손대지 않는다". 이 단계가 빠지면 이후 모든 기술
      조치가 법적으로 무의미해질 수 있다. 따라서 격리(미션 6)·삭제(미션 7)보다 **앞선다**.
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sha256sum /tmp/socw12_exfil.tar.gz; stat -c "%y %s" /tmp/socw12_exfil.tar.gz'
      ```
      ## ✅ 합격 기준
      대상 파일(`socw12_exfil`)의 해시·타임스탬프가 변경 없이 기록된다.
      ## 🔍 도구 풀이
      `sha256sum`은 파일을 256비트 지문(해시)으로 환산한다 — 1바이트만 바뀌어도 전혀 다른 값이
      나오므로, 채집 시점 해시를 기록해 두면 나중에 "그때 그대로인가"를 재계산으로 입증한다.
      `stat -c "%y %s"`는 수정 시각(`%y`)·크기(`%s`)를 출력한다. 두 명령 모두 파일을 **읽기만**
      하고 바꾸지 않는다 — 증거 보전은 항상 비파괴여야 한다.
    hint: 'sha256sum + stat (증거 보전)'
    category: analysis
    points: 12
    answer: |
      echo "=== 증거 보전 (해시 + 타임스탬프, 변경 금지) ==="
      docker exec el34-web sh -c 'sha256sum /tmp/socw12_exfil.tar.gz; stat -c "%y %s bytes" /tmp/socw12_exfil.tar.gz'
      echo "→ 내부 위협은 법적 대응 동반 → 증거(해시/시각)를 변경 없이 보전. 함부로 삭제 금지"
    answer_detail: "내부 위협 IR의 최우선 = 증거 보전(격리·삭제보다 앞). 파일 해시(sha256)+타임스탬프(stat)를 변경 없이 기록해 무결성을 입증한다 — 해시는 1바이트 변경도 잡아내므로 법정 증거능력의 근거가 된다(법무/포렌식). 명령은 읽기 전용(비파괴). 외부 위협과 달리 '지우기 전에 지문부터'가 원칙이다."
    verify:
      type: output_contains
      expect: 'socw12_exfil'
      field: stdout
      semantic:
        intent: "증거 보전(해시/타임스탬프)"
        success_criteria: ["sha256 해시", "타임스탬프", "변경 없이"]
        acceptable_methods: ["**[OSS] sha256sum + stat (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — Contain: 유출 채널 격리 (Suricata sid 9512001)
      ## 📖 개념
      증거를 보전한 **뒤에야** 유출 채널을 막는다 — 보전(미션 5) → 격리(여기) 순서가 내부 위협
      대응의 핵심이다. `.tar.gz` 전송을 탐지하는 룰을 작성·검증·적용했다가 self-clean으로 정리해,
      공유 인프라를 보존하면서 DLP(데이터 유출 차단)의 발상을 시연한다.
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"SOC W12 data exfil archive\"; http.uri; content:\".tar.gz\"; sid:9512001; rev:1;)
      EOF"'
      docker exec el34-ips sh -c 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -1; sudo suricatasc -c reload-rules'
