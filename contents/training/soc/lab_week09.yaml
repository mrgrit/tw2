lab_id: standalone-soc-week09
title: "사고 발생 첫 60분 — 식별·격리·제거·복구·교훈의 IR 절차"
version: standalone-soc
course: soc
week: 9
description: |
  사고가 터진 첫 60분의 사고 대응(IR) 절차를 한 바퀴 돈다 — Identify(식별)→Contain(격리)→
  Eradicate(제거)→Recover(복구)→Lessons(교훈). W08까지가 "무슨 일이 일어났나"를 읽는 분석이었다면,
  본 실습은 그 판정을 근거로 인프라에 실제로 손을 대어 피해를 멈추는 대응이다. 통제된 한 침해
  (SQLi 침투 + 백도어 계정 socw9bd + 웹쉘 /tmp/socw9_shell.php)를 재현하고, SIEM(alerts.json)·
  osquery로 범위/심각도를 식별하고, Suricata 격리 룰(alert, sid 9509001)로 공격 출발지
  (192.168.0.202)를 플래그하고, osquery로 발판을 빠짐없이 제거하고, 서비스 정상성과 발판 잔재 0을
  검증하고, 타임라인/근본원인/재발방지를 정리해 IR 보고서로 종합한다. 격리 룰과 재현 발판은
  시연 후 self-clean으로 원복해 공유 인프라를 보존한다. 사고를 유발하는 공격(재현)은 내 공격 VM
  `ssh att@192.168.0.202`(비번 1)에서 보내고(공격 출발지 192.168.0.202), IR 대응(식별·격리·제거)은
  el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비번 1)에서 docker exec로 수행한다.
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W01–W08 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2-§6(IR 5단계) 숙지"
objectives:
  - "NIST 기반 IR 생명주기 5단계(식별→격리→제거→복구→교훈)와 그 순서의 이유를 설명한다"
  - "SIEM(alerts.json)과 osquery로 사고의 범위·심각도를 증거로 식별한다(Identify)"
  - "Suricata 룰(sid 9509001)로 공격 출발지를 플래그해 확산을 막고 self-clean으로 정리한다(Contain)"
  - "osquery로 발판(백도어 계정·웹쉘)을 확인 후 userdel·rm으로 빠짐없이 제거한다(Eradicate)"
  - "웹 헬스체크와 잔재 0 검증으로 복구를 확인하고(Recover), 근본원인·재발방지를 정리한다(Lessons)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      사고 대응(IR)에 착수하기 전에, 식별·격리·제거에 쓸 핵심 도구가 살아 있는지 먼저 점검한다.
      ## 개념 한 줄
      사고가 터진 뒤 도구를 찾으면 늦다 — 대응자는 착수 전에 SIEM(식별)·IDS(격리)·osquery(제거)의
      가용성부터 확인한다. 이것이 IR 의 0번째 행동이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** SIEM 점검은 `el34-siem`, osquery 는 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-siem 에서: SIEM 분석 데몬 analysisd (식별 도구) ──
      /var/ossec/bin/wazuh-control status | grep analysisd
      # ── el34-web 에서: osquery 동작 확인 (제거 단계 호스트 헌팅 도구) ──
      osqueryi --version
      # IR 도구 요약
      echo "IR 도구: SIEM(식별) + osquery(제거) + IDS(격리)"
      ```
      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** analysisd 가 running 이고 osquery 버전이 출력되면 식별·제거
      도구가 준비된 것 — 셋 중 하나라도 죽어 있으면 그 단계가 막히므로 가장 먼저 확인한다.
      ## 🔧 도구 풀이
      - `wazuh-control status` — Wazuh manager 데몬 상태. `analysisd` 는 로그를 룰로 평가해 경보를 만드는 SIEM 의 두뇌(식별 핵심).
      - `osqueryi --version` — OS 의 프로세스·파일·계정을 SQL 로 질의하는 도구의 동작 확인(제거 핵심).
    hint: 'analysisd + osquery'
    category: survey
    points: 8
    answer: |
      # 1) SIEM 분석 데몬 analysisd 가동 확인(식별 도구)
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) osquery 동작 확인(제거 단계 호스트 헌팅 도구)
      docker exec el34-web osqueryi --version
      # 3) IR 도구 요약
      echo "IR 도구: SIEM(식별) + osquery(제거) + IDS(격리)"
    answer_detail: "IR 착수 전 도구 점검. analysisd(SIEM)가 running 이면 식별(출발지·타임라인)이, osquery 가 동작하면 제거(발판 헌팅)가 가능하다. 격리는 IDS(다음 미션의 Suricata)로 한다. 셋 중 하나라도 죽어 있으면 그 단계가 막히므로 가장 먼저 확인한다."
    expected_output: |
      wazuh-analysisd is running...
      osqueryi version 5.23.0
      IR 도구: SIEM(식별) + osquery(제거) + IDS(격리)
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "IR 도구 준비 점검"
        success_criteria: ["SIEM + osquery"]
        acceptable_methods: ["**[OSS] 도구 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표
      이후 모든 대응 단계가 다룰 사고 대상을 통제된 형태로 만든다 — SQLi 침투에 더해 백도어 계정과
      웹쉘이라는 두 발판을 심는다.
      ## 개념 한 줄
      실제 침해는 "침투(SQLi)"로 끝나지 않고 재진입을 위한 "지속성(백도어 계정·웹쉘)"을 남긴다 —
      이 두 발판이 격리·제거가 끊어낼 표적이다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** 침투는 `외부 공격자 VM 192.168.0.202`, 발판 심기는 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: 침투 — sqlmap UA SQLi 주입 ──
      curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' "http://192.168.0.161/?id=socw9%27%20UNION%20SELECT%201--%20-"
      # ── el34-web 에서: 지속성 발판 — 백도어 계정 socw9bd + 웹쉘 작성 ──
      userdel -r socw9bd 2>/dev/null; useradd -m -s /bin/bash socw9bd; echo "<?php system(\$_GET[c]); ?>" > /tmp/socw9_shell.php; echo planted
      # 로그 수렴 대기 후 완료 마커
      sleep 5
      echo "incident done"
      ```
      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** SQLi 요청 + 백도어 계정(socw9bd) + 웹쉘 파일이 모두 실행되고
      incident done 이 나오면 사고 재현 성공 — 이 두 발판이 이후 식별·제거의 표적이다.
      ## 🔧 도구 풀이
      - `-A sqlmap/1.7` — curl UA 를 SQL 자동 공격 도구로 위장. `useradd -m -s /bin/bash socw9bd` — 백도어 계정(명단에 없는 출입증).
      - 웹쉘 `<?php system($_GET[c]); ?>` — 파라미터 c 의 명령을 실행하는 한 줄(침투 경로가 패치돼도 남는 발판).
    hint: 'SQLi + 백도어 계정 + 웹쉘 파일'
    category: recon
    points: 10
    answer: |
      # 1) 침투 — sqlmap UA로 SQLi 주입(웹/네트워크 로그에 공격 흔적)
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://192.168.0.161/?id=socw9%27%20UNION%20SELECT%201--%20-\""
      # 2) 지속성 발판 — 백도어 계정 socw9bd 생성 + 웹쉘 /tmp/socw9_shell.php 작성
      docker exec el34-web sh -c 'userdel -r socw9bd 2>/dev/null; useradd -m -s /bin/bash socw9bd; echo "<?php system(\$_GET[c]); ?>" > /tmp/socw9_shell.php; echo planted'
      # 3) 로그 수렴 대기 후 완료 마커
      sleep 5
      echo "incident done"
    answer_detail: "사고 = 침투(SQLi) + 두 발판(백도어 계정 socw9bd + 웹쉘 socw9_shell.php). 침투만이 아니라 지속성 수단을 함께 심는 것이 실제 침해의 모습이며, 이 두 발판이 이후 식별·제거 단계의 표적이다. SQLi 페이로드는 sqlmap UA 로 위장해 네트워크·웹 로그에 공격 흔적을 남긴다. 한 번의 재현이 미션 3–8 전체의 원천 데이터다."
    expected_output: |
      planted
      incident done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "사고(침투+발판) 재현"
        success_criteria: ["침투 + 발판"]
        acceptable_methods: ["**[OSS] SQLi + 발판 (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      IR 1단계 — 사고의 범위(어디까지 뚫렸나)와 심각도(시도인가 침해인가)를 증거로 확정한다.
      ## 개념 한 줄
      식별은 이후 격리·제거의 방향을 정하는 나침반이다 — 범위를 모르면 격리를 너무 좁게(놓침) 또는
      너무 넓게(과잉 차단) 하게 된다. W01–W08 의 분석 역량이 여기서 그대로 쓰인다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** SIEM 타임라인은 `el34-siem`, osquery 발판 확인은 `el34-web`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-siem 에서: Identify — 출발지 192.168.0.202 경보 시간순(타임라인) ──
      tail -1000 /var/ossec/logs/alerts/alerts.json | jq -rc 'select(.data.src_ip=="192.168.0.202")|[.timestamp,.rule.description]|@tsv' | tail -5
      # ── el34-web 에서: Identify — osquery로 백도어 계정(socw9bd) 발판 존재 확인 ──
      osqueryi --json 'SELECT username,uid FROM users WHERE username="socw9bd";'
      # 해석 — 범위: 출발지 192.168.0.202·web 침투·백도어 발판, 심각도: 침투 성공(P1)
      echo "→ 범위: 출발지 192.168.0.202, web 호스트 침투, 백도어 계정 발판. 심각도: 침투 성공(P1)"
      ```
      ## ✅ 합격 기준
      `socw9bd` 출력 시 통과. **근거:** SIEM 경보로 출발지(192.168.0.202)·타임라인이 보이고 osquery 가
      백도어 계정 socw9bd 를 반환하면 범위(web 침투 + 백도어 발판)와 심각도(침투 성공 = P1)가 확정된다.
      ## 🔧 도구 풀이
      - `alerts.json` + `jq select(.data.src_ip==192.168.0.202)` — 출발지로 묶은 시간순 타임라인. el34 fw 가 SNAT 안 해 출처 IP 보존(W08 §3).
      - `osqueryi --json 'SELECT ... FROM users WHERE ...'` — 호스트 계정 조회. 백도어 계정 반환 = 침해(P1)의 결정적 증거.
    hint: 'alerts.json 출발지 + osquery 발판'
    category: analysis
    points: 12
    answer: |
      # 1) Identify — SIEM에서 출발지 192.168.0.202 경보를 시간순(타임라인)으로
      docker exec el34-siem sh -c 'tail -1000 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.data.src_ip==\"192.168.0.202\")|[.timestamp,.rule.description]|@tsv" | tail -5'
      # 2) Identify — osquery로 백도어 계정(socw9bd) 발판 존재 확인
      docker exec el34-web osqueryi --json 'SELECT username,uid FROM users WHERE username="socw9bd";'
      # 3) 해석 — 범위: 출발지 192.168.0.202·web 침투·백도어 발판, 심각도: 침투 성공(P1)
      echo "→ 범위: 출발지 192.168.0.202, web 호스트 침투, 백도어 계정 발판. 심각도: 침투 성공(P1)"
    answer_detail: "Identify(식별) = 무슨 일이 어디까지 일어났나를 증거로 확정. 두 축 — SIEM alerts.json 으로 출발지(192.168.0.202)·타임라인(시간순 경보)을, osquery 로 호스트에 남은 발판(백도어 계정 socw9bd)을 확인한다. 계정이 존재한다는 것은 공격자가 호스트에 계정을 만들 정도로 뚫렸다는 뜻 → 심각도는 '시도'가 아니라 '침해(P1)'. 이 범위·심각도가 이후 격리·제거의 강도와 범위를 결정한다."
    expected_output: |
      2026-06-26T14:46:34.598+0000	Suricata: Alert - EL34 SQL Injection - UNION SELECT
      2026-06-26T14:46:44.549+0000	Suricata: Alert - EL34 SQL Injection - UNION SELECT
      2026-06-26T14:46:44.551+0000	Suricata: Alert - EL34 Bot UA - sqlmap
      2026-06-26T14:46:54.552+0000	Suricata: Alert - EL34 SQL Injection - UNION SELECT
      2026-06-26T14:46:54.589+0000	Suricata: Alert - EL34 Bot UA - sqlmap
      [
        {"uid":"1001","username":"socw9bd"}
      ]
      → 범위: 출발지 192.168.0.202, web 호스트 침투, 백도어 계정 발판. 심각도: 침투 성공(P1)
    verify:
      type: output_contains
      expect: 'socw9bd'
      field: stdout
      semantic:
        intent: "사고 범위/심각도 식별"
        success_criteria: ["출발지/타임라인", "발판 식별", "심각도 판정"]
        acceptable_methods: ["**[OSS] SIEM + osquery 식별 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      IR 2단계 — 제거에 걸리는 시간 동안 확산을 막는 방화문을 세운다. 공격 출발지를 통째로 플래그해
      "이 출처가 또 움직이면 즉시 보인다"는 상태를 만든다.
      ## 개념 한 줄
      격리의 원칙은 "차단 우선, 분석 나중"이되 "빠르되 정밀하게"다 — 너무 넓게 막으면 정상 서비스까지
      끊긴다. 공유 인프라이므로 실제 drop 대신 alert(탐지 플래그)로 시연하고 끝나면 룰을 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** 격리 룰·검증·정리는 `el34-ips`, 테스트 트래픽은 `외부 공격자 VM 192.168.0.202`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-ips 에서: 격리 룰 추가(출발지 192.168.0.202 플래그, sid 9509001) + 즉시 reload ──
      sudo bash -c "cat >> /etc/suricata/rules/local.rules <<EOF
      alert ip 192.168.0.202 any -> any any (msg:\"SOC W09 IR contain flag attacker source\"; sid:9509001; rev:1;)
      EOF"
      sudo suricatasc -c reload-rules

      # ── 외부 공격자 VM 192.168.0.202 에서: 출발지가 다시 움직이게 유발(테스트 트래픽) ──
      curl -s -o /dev/null -H "Host: dvwa.el34.lab" http://192.168.0.161/

      # ── el34-ips 에서: 격리 룰 포착 횟수(1+) + self-clean(룰 삭제 + reload) (4초 후) ──
      sudo grep -c 9509001 /var/log/suricata/eve.json
      sudo sed -i "/sid:9509001/d" /etc/suricata/rules/local.rules; sudo suricatasc -c reload-rules >/dev/null; echo rule_removed
      ```
      ## ✅ 합격 기준
      `rule_removed` 출력 시 통과. **근거:** grep -c 9509001 이 1 이상(출발지 트래픽 포착)이고 마지막에
      rule_removed(self-clean 완료)가 나오면 통과 — 격리 후 공유 인프라를 원복한 것이다.
      ## 🔧 도구 풀이
      - Suricata 룰 `<액션> <프로토콜> <출발지> -> <목적지> (옵션)` — `alert`=탐지·기록(차단 안 함), `sid:9509001`=룰 고유번호.
      - `suricatasc -c reload-rules`=재기동 없이 즉시 반영, `sed -i "/sid:9509001/d"`=룰 삭제로 원복(self-clean). 운영은 같은 논리를 firewall drop 으로.
