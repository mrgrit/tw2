lab_id: standalone-soc-week02
title: "SSH 무차별 대입 vs 시스템 로그(sshd 인증) 분석·추적"
version: standalone-soc
course: soc
week: 2
description: |
  공격의 두 단계 "정찰(포트 스캔) → 침투 시도(SSH 무차별 대입)"를 두 로그로 읽어 한 사건으로 엮는다.
  정찰 단계는 el34-ips 의 Suricata eve.json(event_type=alert 의 스캔 시그니처)을 jq 로 분석하고,
  침투 단계는 호스트 /var/log/auth.log 를 깊게 분석한다 — 실패 빈도(임계 기반), 노린 계정 분포(사전
  공격 식별), 정상(Accepted)과 공격(다발 Failed/Invalid) 구분, 스캔↔인증 출발지 상관, 사건 타임라인,
  침투 성공 여부 추적. 인증 분석의 원천은 호스트 auth.log(ccc=adm 그룹이라 sudo 불필요), 스캔 분석은
  ips 의 Suricata eve.json. 관측·분석 중심이라 인프라는 변경하지 않는다. 공격 재현은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서, 분석은 el34 호스트
  (`ssh ccc@{{TARGET_IP}}`)에서 실행한다.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W01(L1 트리아지) 통과 — 경보 4요소(출발지/시그니처/시각/심각도) 숙지"
  - "el34 호스트 SSH 접근 가능(ssh ccc@{{TARGET_IP}}, ccc=adm 그룹)"
  - "lecture §0.5(스캔·임계·상관 개념) §2(스캔/eve.json) §3(sshd 메시지·구분법) §4(상관·타임라인) 숙지"
objectives:
  - "Suricata eve.json 에서 jq 로 스캔 시그니처·출발지(src_ip) 추출"
  - "sshd 인증 로그에서 실패 패턴/빈도(임계 기반)로 자동화 공격 식별"
  - "노린 계정 분포로 사전(wordlist) 공격과 특정 계정 표적을 구분"
  - "Accepted(정상)와 Failed/Invalid(공격)를 구분해 침투 성공 여부 판정"
  - "스캔 출발지와 인증 공격 출발지를 상관 + 사건 타임라인 재구성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 호스트 인증 로그 접근

      **왜 이걸 먼저 하나**: 어떤 분석이든 첫걸음은 "원천 데이터가 살아 있는가"의 확인이다.
      이번 주 침투 단계 분석의 원천은 호스트의 `/var/log/auth.log`(sshd 가 인증 시도를 남기는
      시스템 로그)다. 이 파일에 접근되는지, sshd 인증 이벤트가 실제로 쌓여 있는지 먼저 본다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) auth.log 존재·크기·권한 확인
      ls -la /var/log/auth.log
      # 2) sshd가 남긴 줄 수 집계(-a 텍스트 처리, -c 줄 수) — 0보다 크면 이벤트 적재됨
      grep -ac sshd /var/log/auth.log
      # 3) 최근 sshd 이벤트 1건 미리보기
      grep -a sshd /var/log/auth.log | tail -1
      ```

      ## ✅ 합격 기준
      `sshd` 출력 시 통과. **근거:** auth.log 를 읽을 수 있고(권한 오류 없음) sshd 이벤트 건수가 1
      이상이면 통과 — 권한 오류가 나면 계정의 `adm` 그룹 소속을 확인한다(ccc 는 sudo 없이 읽혀야 한다).
    hint: 'ls auth.log + grep -ac sshd'
    category: survey
    points: 10
    answer: |
      # 1) auth.log 존재·크기·권한 확인
      ls -la /var/log/auth.log
      # 2) sshd가 남긴 줄 수 집계(-a 텍스트 처리, -c 줄 수) — 0보다 크면 이벤트 적재됨
      grep -ac sshd /var/log/auth.log
      # 3) 최근 sshd 이벤트 1건 미리보기
      grep -a sshd /var/log/auth.log | tail -1
    answer_detail: "호스트 /var/log/auth.log 가 sshd 인증 분석의 원천이다. 계정 ccc 는 adm 그룹이라 sudo 없이 이 파일을 읽는다. 컨테이너(el34-web 등) 안에는 auth.log 가 없으므로, 인증 분석은 컨테이너가 아니라 반드시 호스트에서 한다. grep -ac 가 0보다 큰 값을 내면 sshd 이벤트가 쌓여 있다는 뜻이다."
    expected_output: |
      -rw-r----- 1 syslog adm 809432  6월 26 23:45 /var/log/auth.log
      4373
      Jun 26 23:45:50 elf4 sshd[2303494]: Connection closed by invalid user socw1bad8 192.168.0.202 port 36684 [preauth]
    verify:
      type: output_contains
      expect: 'sshd'
      field: stdout
      semantic:
        intent: "호스트 인증 로그 접근 점검"
        success_criteria: ["auth.log 읽기 가능", "sshd 이벤트 존재"]
        acceptable_methods:
          - "**[OSS] auth.log 접근 (권장)**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 정찰+무차별 대입 재현 — 스캔 + 여러 계정 실패 다발

      **왜 이걸 하나**: 분석할 데이터를 직접 만든다(탐지 규칙 검증의 표준 절차 — 통제된 공격을
      의도적으로 일으켜 로그에 제대로 잡히는지 본다). 공격의 두 단계를 모두 재현한다 — ① 호스트에
      여러 계정으로 SSH 로그인을 실패시켜 auth.log 에 무차별 대입 흔적을 만들고, ② attacker
      컨테이너에서 포트 스캔(nmap)을 일으켜 Suricata eve.json 에 스캔 시그니처를 만든다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** 모두 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 — SSH 무차별 대입은 el34 호스트(192.168.0.80) SSH로, 포트 정찰은 공인 진입 192.168.0.161로 발신한다(출처는 둘 다 192.168.0.202).

      ```bash
      # ── (202에서) el34 호스트(192.168.0.80) SSH에: 1) 무차별 대입 재현 — 흔한 계정 8종 차례로 ssh(존재=Failed/없음=Invalid user) ──
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 admin@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 oracle@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 test@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 ubuntu@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 postgres@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 git@192.168.0.80 exit 2>/dev/null
      ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 mysql@192.168.0.80 exit 2>/dev/null

      # ── 외부 공격자 VM 192.168.0.202 에서: 2) 대입 전 포트 정찰 (Suricata eve에 스캔 시그니처) ──
      sudo nmap -sS -p 20-30 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned

      # 3) 완료 마커
      echo "brute+scan done"
      ```
      - 흔한 계정 목록(wordlist: root/admin/oracle/test/ubuntu/postgres/git/mysql)을 차례로 ssh 로 시도(`BatchMode=yes` 로 즉시 실패: 존재 계정=Failed, 없는 계정=Invalid user).
      - `sudo nmap -sS -p 20-30 … -T4` — fw 게이트(192.168.0.161) 20~30 포트 SYN 스캔(연결 절반만, 빠름). Suricata 가 스캔으로 탐지.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** brute+scan done 이 나오면 여러 계정 SSH 실패 + 포트 스캔이
      재현된 것 — 이 흔적을 STEP 3~6 에서 읽는다.
    hint: 'ssh 실패(root/admin/oracle...) + nmap'
    category: recon
    points: 10
    answer: |
      # 1) 무차별 대입 재현 — 흔한 계정 8종을 차례로 ssh 시도(존재=Failed/없음=Invalid user로 다발)
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 admin@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 oracle@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 test@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 ubuntu@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 postgres@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 git@192.168.0.80 exit 2>/dev/null'
      ssh att@192.168.0.202 'ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 mysql@192.168.0.80 exit 2>/dev/null'
      # 2) 대입 전 포트 정찰 — 외부 공격자 VM 192.168.0.202가 SYN 스캔(Suricata eve에 스캔 시그니처)
      ssh att@192.168.0.202 'sudo nmap -sS -p 20-30 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned'
      # 3) 완료 마커
      echo "brute+scan done"
    answer_detail: "wordlist 공격은 여러 계정(root/admin/oracle…)을 차례로 시도하므로 auth.log 에 Invalid user(없는 계정)·Failed(존재 계정) 다발로 남는다. 그리고 실전에서 대입 직전에는 보통 포트 스캔(정찰)이 선행한다 — 공격자가 SSH 포트(22)가 열렸는지 먼저 확인하기 때문. 이 step 은 그 두 단계(스캔+대입)를 통제된 환경에서 함께 생성해, 이후 분석 step 들이 읽을 흔적을 만든다."
    expected_output: |
      scanned
      brute+scan done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "무차별 대입(여러 계정) + 정찰 재현"
        success_criteria: ["여러 계정 실패", "스캔"]
        acceptable_methods:
          - "**[OSS] 다계정 ssh 실패 + nmap (권장)**"
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 실패 패턴 분석 — 빈도(임계 기반)

      **왜 이걸 하나**: 무차별 대입을 가르는 1차이자 가장 빠른 신호는 **빈도**다. "짧은 시간에
      실패가 몇 번 쌓였나"로 자동화 공격을 판별한다 — 이것이 임계 기반 탐지("N초에 M회 이상이면
      비정상")의 사고방식이다. 1분에 수십 건이면 자동화 공격, 하루 2~3건 산발이면 정상 오타다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 두 종류 실패 메시지(비번 실패/없는 계정)를 한 번에 최근 15줄
      grep -aE "Failed password|Invalid user" /var/log/auth.log | tail -15
      # 2) 총 실패 건수 집계(-c) — 빈도로 자동화 여부 판단
      grep -acE "Failed password|Invalid user" /var/log/auth.log
      # 3) 해석 — 짧은 시간 다발 = 자동화 무차별 대입(정상 오타는 하루 2~3건)
      echo "→ 짧은 시간 다발 = 자동화 무차별 대입(정상 오타는 하루 2~3건)"
      ```

      ## ✅ 합격 기준
      `Invalid user` 출력 시 통과. **근거:** 실패가 다발(Invalid user/Failed)로 보이고 총 실패 건수로
      빈도를 가늠하면 통과 — 1분 수십 건은 자동화, 하루 2~3건은 정상 오타로 판단한다.
    hint: 'Failed password/Invalid user 빈도'
    category: analysis
    points: 14
    answer: |
      # 1) 두 종류 실패 메시지(비번 실패/없는 계정)를 한 번에 최근 15줄
      grep -aE "Failed password|Invalid user" /var/log/auth.log | tail -15
      # 2) 총 실패 건수 집계(-c) — 빈도로 자동화 여부 판단
      grep -acE "Failed password|Invalid user" /var/log/auth.log
      # 3) 해석 — 짧은 시간 다발 = 자동화 무차별 대입(정상 오타는 하루 2~3건)
      echo "→ 짧은 시간 다발 = 자동화 무차별 대입(정상 오타는 하루 2~3건)"
    answer_detail: "실패 빈도가 핵심 1차 신호다 — 1분에 수십 건이면 자동화 공격(임계 기반 판단). 정상 사용자의 오타는 드물고 산발적(하루 2~3건). 빈도만으로 공격/정상을 1차로 가른다. 다만 공격자가 시도 간격을 늘려(low-and-slow) 임계 아래로 깔면 빈도만으로는 놓치므로, 다음 step 의 계정 분포·성공 여부와 함께 봐야 한다."
    expected_output: |
      Jun 26 23:45:50 elf4 sshd[2303433]: Invalid user socw1bad1 from 192.168.0.202 port 36620
      Jun 26 23:45:50 elf4 sshd[2303436]: Invalid user socw1bad2 from 192.168.0.202 port 36624
      Jun 26 23:45:50 elf4 sshd[2303439]: Invalid user socw1bad3 from 192.168.0.202 port 36640
      Jun 26 23:45:50 elf4 sshd[2303461]: Invalid user socw1bad4 from 192.168.0.202 port 36646
      Jun 26 23:45:50 elf4 sshd[2303466]: Invalid user socw1bad5 from 192.168.0.202 port 36656
      Jun 26 23:45:50 elf4 sshd[2303469]: Invalid user socw1bad6 from 192.168.0.202 port 36670
      Jun 26 23:45:50 elf4 sshd[2303472]: Invalid user socw1bad7 from 192.168.0.202 port 36674
      Jun 26 23:45:50 elf4 sshd[2303494]: Invalid user socw1bad8 from 192.168.0.202 port 36684
      Jun 26 23:45:52 elf4
    verify:
      type: output_contains
      expect: 'Invalid user'
      field: stdout
      semantic:
        intent: "인증 실패 빈도 분석"
        success_criteria: ["Invalid user/Failed 다발", "빈도=자동화 신호"]
        acceptable_methods:
          - "**[OSS] auth.log 실패 빈도 (권장)**"
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 표적 계정 분석 — 무엇을 노렸나(분포)

      **왜 이걸 하나**: 빈도(STEP 3) 다음 신호는 "어떤 계정을 노렸나"의 분포다. 한 사람이
      root/admin/oracle/test 같은 여러 계정을 동시에 시도한다면 사람의 오타가 아니라 자동화된
      사전(wordlist) 공격이다. 계정 분포는 공격의 성격을 드러낸다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 노린 계정 분포 — "Invalid user <계정>"만 뽑아 계정별 횟수 집계(상위 10)
      grep -aoE "Invalid user [a-z0-9]+" /var/log/auth.log | sort | uniq -c | sort -rn | head -10
      # 2) 존재 계정 root 대상 시도 건수(Failed/Invalid)
      grep -acE "Failed password for root|Invalid user root" /var/log/auth.log
      # 3) 해석 — root/admin/oracle 등 여러 계정 = 사전(wordlist) 기반 무차별 대입
      echo "→ root/admin/oracle 등 여러 계정 = 사전(wordlist) 기반 무차별 대입"
      ```

      ## ✅ 합격 기준
      `root` 출력 시 통과. **근거:** 노린 계정 목록(root 등 여러 개)과 각 횟수가 나오면 통과 —
      여러 계정이면 wordlist 공격, 한 계정만 집요하면 특정 계정 표적으로 성격을 가른다.
    hint: 'Invalid user <계정> 분포 (root/admin/oracle...)'
    category: analysis
    points: 14
    answer: |
      # 1) 노린 계정 분포 — "Invalid user <계정>"만 뽑아 계정별 횟수 집계(상위 10)
      grep -aoE "Invalid user [a-z0-9]+" /var/log/auth.log | sort | uniq -c | sort -rn | head -10
      # 2) 존재 계정 root 대상 시도 건수(Failed/Invalid)
      grep -acE "Failed password for root|Invalid user root" /var/log/auth.log
