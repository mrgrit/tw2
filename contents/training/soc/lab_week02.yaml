lab_id: standalone-soc-week02
title: "SSH 무차별 대입 vs 시스템 로그(sshd 인증) 분석·추적"
version: standalone-soc
course: soc
week: 2
description: |
  sshd 인증 로그(호스트 /var/log/auth.log)를 깊게 분석한다 — 실패 빈도, 노린 계정, 정상(Accepted)과
  공격(다발 Failed/Invalid) 구분, 정찰(스캔) 상관, 사건 타임라인, 침투 성공 여부 추적. 인증 분석의
  원천은 호스트 auth.log(ccc=adm 그룹 sudo 불필요). 관측·분석 중심, 인프라 변경 없음.
  명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W01(L1 트리아지) 통과"
  - "el34 호스트 SSH(ssh ccc@192.168.0.151)"
  - "lecture §2(sshd 메시지) §3(구분법) §5(타임라인) 숙지"
objectives:
  - "sshd 인증 로그에서 실패 패턴/빈도 분석"
  - "노린 계정 분포로 사전(wordlist) 공격 식별"
  - "Accepted(정상)와 Failed/Invalid(공격) 구분"
  - "스캔 출발지와 인증 공격 상관 + 사건 타임라인"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 호스트 인증 로그 접근

      인증 분석의 원천 = 호스트 auth.log. 접근과 sshd 이벤트 존재를 확인한다.

      ## 💻 실행 명령
      ```bash
      ls -la /var/log/auth.log
      grep -ac sshd /var/log/auth.log
      ```
      ## ✅ 합격 기준
      auth.log를 읽을 수 있고 sshd 이벤트가 있다.
    hint: 'ls auth.log + grep -ac sshd'
    category: survey
    points: 10
    answer: |
      echo "=== 호스트 auth.log ==="
      ls -la /var/log/auth.log
      echo "=== sshd 이벤트 수 ==="
      grep -ac sshd /var/log/auth.log
      echo "=== 최근 sshd 1건 ==="
      grep -a sshd /var/log/auth.log | tail -1
    answer_detail: "호스트 /var/log/auth.log가 sshd 인증 분석의 원천(ccc=adm 그룹이라 sudo 불필요). 컨테이너(el34-web)엔 auth.log가 없어 호스트에서 분석한다."
    verify:
      type: output_contains
      expect: 'sshd'
      field: stdout
      semantic:
        intent: "호스트 인증 로그 접근 점검"
        success_criteria: ["auth.log 읽기 가능", "sshd 이벤트 존재"]
        acceptable_methods:
          - "**[OSS] auth.log 접근 (권장)**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 무차별 대입 재현 — 여러 계정 실패 다발

      사전(wordlist) 기반 무차별 대입을 재현한다 — 여러 계정으로 실패 다발 + 스캔.

      ## 💻 실행 명령
      ```bash
      for u in root admin oracle test ubuntu postgres git mysql; do
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null
      done
      docker exec el34-attacker sh -c 'nmap -sS -p 20-30 10.20.30.1 -T4 >/dev/null 2>&1; echo scanned'
      echo "brute+scan done"
      ```
      ## ✅ 합격 기준
      여러 계정 실패 + 스캔이 재현된다.
    hint: 'ssh 실패(root/admin/oracle...) + nmap'
    category: recon
    points: 10
    answer: |
      echo "=== 무차별 대입 재현 (8 계정) ==="
      for u in root admin oracle test ubuntu postgres git mysql; do
        ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null
      done
      echo "=== 대입 전 포트 정찰 ==="
      docker exec el34-attacker sh -c 'nmap -sS -p 20-30 10.20.30.1 -T4 >/dev/null 2>&1; echo scanned'
      echo "brute+scan done"
    answer_detail: "wordlist 공격은 여러 계정(root/admin/oracle…)을 차례로 시도 → auth.log에 Invalid user/Failed 다발. 보통 직전에 포트 스캔(정찰)이 선행한다."
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "무차별 대입(여러 계정) + 정찰 재현"
        success_criteria: ["여러 계정 실패", "스캔"]
        acceptable_methods:
          - "**[OSS] 다계정 ssh 실패 + nmap (권장)**"
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 실패 패턴 분석 — 빈도

      auth.log에서 인증 실패의 빈도를 본다(짧은 시간 다발 = 자동화 공격).

      ## 💻 실행 명령
      ```bash
      grep -aE "Failed password|Invalid user" /var/log/auth.log | tail -15
      echo "총 실패:"; grep -acE "Failed password|Invalid user" /var/log/auth.log
      ```
      ## ✅ 합격 기준
      실패 다발(`Invalid user`)을 빈도로 식별한다.
    hint: 'Failed password/Invalid user 빈도'
    category: analysis
    points: 14
    answer: |
      echo "=== 최근 인증 실패 ==="
      grep -aE "Failed password|Invalid user" /var/log/auth.log | tail -15
      echo "=== 총 실패 건수 ==="
      grep -acE "Failed password|Invalid user" /var/log/auth.log
      echo "→ 짧은 시간 다발 = 자동화 무차별 대입(정상 오타는 하루 2~3건)"
    answer_detail: "실패 빈도가 핵심 신호 — 1분에 수십 건이면 자동화 공격. 정상 사용자 오타는 드물고 산발적. 빈도로 공격/정상을 1차 가른다."
    verify:
      type: output_contains
      expect: 'Invalid user'
      field: stdout
      semantic:
        intent: "인증 실패 빈도 분석"
        success_criteria: ["Invalid user/Failed 다발", "빈도=자동화 신호"]
        acceptable_methods:
          - "**[OSS] auth.log 실패 빈도 (권장)**"
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 표적 계정 분석 — 무엇을 노렸나

      어떤 계정을 노렸는지 분포를 본다(여러 계정 = 사전 공격).

      ## 💻 실행 명령
      ```bash
      grep -aoE "Invalid user [a-z0-9]+" /var/log/auth.log | sort | uniq -c | sort -rn | head -10
      ```
      ## ✅ 합격 기준
      노린 계정(`root` 등 여러 개)을 식별한다.
    hint: 'Invalid user <계정> 분포 (root/admin/oracle...)'
    category: analysis
    points: 14
    answer: |
      echo "=== 노린 계정 분포 ==="
      grep -aoE "Invalid user [a-z0-9]+" /var/log/auth.log | sort | uniq -c | sort -rn | head -10
      echo "=== root 대상 Failed (존재 계정) ==="
      grep -acE "Failed password for root|Invalid user root" /var/log/auth.log
      echo "→ root/admin/oracle 등 여러 계정 = 사전(wordlist) 기반 무차별 대입"
    answer_detail: "노린 계정 분포가 공격 성격을 드러낸다. 여러 계정(root/admin/oracle/test…)을 차례로 = wordlist 공격. 한 계정만 반복 = 특정 계정 표적(다른 성격)."
    verify:
      type: output_contains
      expect: 'root'
      field: stdout
      semantic:
        intent: "표적 계정 분포로 사전 공격 식별"
        success_criteria: ["계정 분포(root 등)", "여러 계정=wordlist 판정"]
        acceptable_methods:
          - "**[OSS] Invalid user 계정 분포 (권장)**"
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 Accepted vs 공격 — 침투 성공 여부 추적

      가장 중요한 질문: 공격이 성공했나? `Accepted`(로그인 성공)와 공격 실패를 구분한다.

      ## 💻 실행 명령
      ```bash
      echo "성공(Accepted):"; grep -a "Accepted" /var/log/auth.log | tail -5
      echo "실패(공격):"; grep -acE "Failed password|Invalid user" /var/log/auth.log
      ```
      ## ✅ 합격 기준
      `Accepted`(정상 로그인)와 공격 실패를 구분한다.
    hint: 'Accepted(성공) vs Failed/Invalid(공격) 구분'
    category: analysis
    points: 16
    answer: |
      echo "=== 로그인 성공 (Accepted) — 정상 사용자 ==="
      grep -a "Accepted" /var/log/auth.log | tail -5
      echo "=== 공격 실패 건수 ==="
      grep -acE "Failed password|Invalid user" /var/log/auth.log
      echo "→ Accepted는 정상 계정(예: ccc) 로그인. 공격 출발지에서 Accepted가 나오면 침투 성공(P1!)"
    answer_detail: "사건 심각도의 분기점 — 공격(다발 Failed/Invalid)과 별개로 Accepted가 공격 출발지에서 나오면 침투 성공 → 즉시 P1. 정상 계정(ccc 등)의 Accepted는 합법. 출발지+계정으로 성공이 공격인지 정상인지 판별."
    verify:
      type: output_contains
      expect: 'Accepted'
      field: stdout
      semantic:
        intent: "Accepted(성공)와 공격 실패 구분 — 침투 여부 추적"
        success_criteria: ["Accepted 식별", "공격 실패와 구분", "침투 성공 시 P1"]
        acceptable_methods:
          - "**[OSS] Accepted vs Failed grep (권장)**"
          - "**[설명] 성공 출발지로 침투 판별**"
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 정찰 상관 — 스캔 ↔ 인증 출발지

      대입 전 정찰(스캔)이 있었는지, 같은 출발지인지 확인한다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and (.alert.signature|test(\"scan\";\"i\")))|.src_ip" | sort | uniq -c | tail -3'
      ```
      ## ✅ 합격 기준
      스캔 경보 출발지를 확인하고 인증 공격과 상관한다.
    hint: 'eve.json scan 출발지 ↔ 인증 출발지 상관'
    category: analysis
    points: 12
    answer: |
      echo "=== 스캔(정찰) 출발지 ==="
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and (.alert.signature|test(\"scan\";\"i\")))|.src_ip" | sort | uniq -c | tail -3'
      echo "→ 분석가는 스캔 출발지와 인증 공격 출발지를 매칭해 '정찰→대입'이 같은 공격자인지 판정"
      echo "  (이 데모는 인증이 127.0.0.1 localhost, 스캔이 10.20.30.202 — 실전은 같은 외부 IP로 상관)"
    answer_detail: "무차별 대입 전엔 보통 SSH 포트를 찾는 스캔이 선행. 스캔 출발지 = 인증 공격 출발지면 한 공격자의 '정찰→대입' 단계. el34 출처 보존이 상관의 전제."
    verify:
      type: output_contains
      expect: '10.20.30.202'
      field: stdout
      semantic:
        intent: "정찰(스캔)과 인증 공격 출발지 상관"
        success_criteria: ["스캔 출발지 식별", "정찰→대입 상관 기법"]
        acceptable_methods:
          - "**[OSS] eve scan src ↔ auth src (권장)**"
    target_vm: ips

  - order: 7
    instruction: |
      ## 🎯 사건 타임라인 — 시간순 재구성

      정찰→대입→(성공?)을 시간순으로 재구성한다.

      ## 💻 실행 명령
      ```bash
      echo "[인증 시도 시각]"; grep -aE "Invalid user|Failed password|Accepted" /var/log/auth.log | tail -8 | awk '{print $1,$2,$3,$6,$7,$8}'
      ```
      ## ✅ 합격 기준
      인증 사건을 시간순으로 재구성한다.
    hint: 'auth.log 시각순 (Invalid/Failed/Accepted)'
    category: analysis
    points: 12
    answer: |
      echo "=== 사건 타임라인 (인증 시도 시각순) ==="
      grep -aE "Invalid user|Failed password|Accepted|preauth" /var/log/auth.log | tail -10
      echo "→ T0 스캔(정찰) → T1 무차별 대입 다발 → T2 Accepted 여부(침투!) 순으로 재구성"
    answer_detail: "사건 추적의 마무리 = 시간순 재구성. preauth(인증 전 끊김)는 스크립트성 시도. Accepted가 공격 구간에 있으면 침투 성공 시점. 타임라인으로 사건의 시작·전개·결과를 한눈에."
    verify:
      type: output_contains
      expect: 'preauth'
      field: stdout
      semantic:
        intent: "인증 사건 시간순 재구성"
        success_criteria: ["시각순 정렬", "정찰→대입→성공 흐름", "preauth/Accepted 의미"]
        acceptable_methods:
          - "**[OSS] auth.log 시각순 (권장)**"
    target_vm: siem

  - order: 8
    instruction: |
      ## 🎯 분석 보고서 — 무차별 대입 판정 + 침투 여부

      STEP 1–7을 sshd 인증 분석 보고서로 종합한다.

      ## 💻 보고서 양식
      ```markdown
      # SOC W02 sshd 인증 분석 보고서 (학번, 이름)
      ## 1. 실패 패턴 (빈도/총건수)
      ## 2. 표적 계정 (여러 계정 → wordlist)
      ## 3. Accepted vs 공격 (침투 성공 여부)
      ## 4. 정찰 상관 + 타임라인
      ## 5. 판정: 무차별 대입 (성공/차단)
      ```
      ## ✅ 합격 기준
      보고서에 무차별 대입 판정 + 침투 여부가 포함된다.
    hint: '실패패턴+표적계정+성공여부+타임라인'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # SOC W02 sshd 인증 분석 보고서
      ## 1. 실패 패턴: 짧은 시간 다발(자동화 무차별 대입)
      ## 2. 표적 계정: root/admin/oracle/test 등 여러 계정 → wordlist 공격
      ## 3. Accepted vs 공격: 정상(ccc) Accepted만 / 공격 출발지 Accepted 없음 → 침투 미성공(시도 차단)
      ## 4. 정찰 상관: 스캔 선행 + 타임라인(정찰→대입)
      ## 5. 판정: SSH 무차별 대입(T1110), 성공 흔적 없음 → "시도(차단)". (Accepted 발견 시 "침해"로 격상)
      ## 결론: 인증 로그는 빈도+계정+성공여부로 공격/정상을 판별하는 1차 증거
      EOF
    answer_detail: "sshd 분석 종합 = 빈도(자동화) + 계정 분포(wordlist) + Accepted(침투 여부) + 타임라인. 성공 흔적 유무가 '시도'와 '침해'를 가른다."
    verify:
      type: output_contains
      expect: '무차별'
      field: stdout
      semantic:
        intent: "sshd 인증 분석 종합 보고"
        success_criteria: ["실패패턴/표적계정", "침투 여부", "무차별 대입 판정"]
        acceptable_methods:
          - "**[관리적] 인증 분석 보고서 (권장)**"
    target_vm: siem
