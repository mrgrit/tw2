      ## 🎯 정찰 상관 — 스캔(Suricata eve.json) ↔ 인증 출발지

      **왜 이걸 하나**: 흩어진 두 단계를 하나의 사건으로 엮는 핵심 단계다. 무차별 대입 직전에는
      보통 포트 스캔(정찰)이 선행한다. el34-ips 의 Suricata 가 스캔을 eve.json 에 남기므로, 그
      스캔 출발지를 뽑아 인증 공격 출발지와 같은지 본다 — 같으면 "정찰 → 대입"의 한 공격자다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** scan 출발지 집계는 `el34-ips` — `docker exec -it el34-ips bash` 로 접속.
      (인증 출발지는 STEP 3~5 의 호스트 auth.log 와 대조)

      ```bash
      # 1) Suricata eve에서 scan 시그니처 alert의 출발지(src_ip)를 집계
      tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert" and (.alert.signature|test("scan";"i")))|.src_ip' | sort | uniq -c | tail -3
      # 2) 상관 — 스캔 출발지와 인증 공격 출발지를 매칭해 '정찰→대입' 동일 공격자인지 판정
