      # 3) 확인 — 인증·스캔 출발지가 모두 192.168.0.202 → 같은 공격자로 상관됨
      echo "  (인증·스캔 출발지가 모두 192.168.0.202 → 같은 공격자로 상관됨)"
      ```
      - `select(.event_type=="alert" and (.alert.signature|test("scan";"i")))` — alert 이고 시그니처에 "scan"(대소문자 무시)이 든 줄만 통과 → `.src_ip` 로 출발지만 뽑아 `uniq -c` 집계.

      ## ✅ 합격 기준
