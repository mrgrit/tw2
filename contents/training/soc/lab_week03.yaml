  - order: 7
    instruction: |
      ## 🎯 SIEM 통합 — 세 로그가 한 경보 스트림으로

      세 로그를 일일이 열지 않고도 SIEM 한 곳에서 한 출발지의 사건을 보는 워크플로를
      확인한다. web/ips agent 가 ship 한 로그가 Wazuh manager 의 alerts.json 으로 수렴했는지
      본다. (이 STEP 은 target 이 siem.)

      ## 💡 개념 한 줄
      el34 의 web·ips 컨테이너에 Wazuh **agent** 가 있어 자기 로그를 manager(`el34-siem`)로
      ship → manager 가 정규화해 `/var/ossec/logs/alerts/alerts.json` 한 스트림으로 수렴.
      출발지 하나로 필터링하면 그 공격자의 웹·네트워크 경보를 한 번에 본다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) manager alerts.json 최근 400줄에서 출발지 192.168.0.202 경보만 필터 → 룰ID/설명(최근 5)
      tail -400 /var/ossec/logs/alerts/alerts.json | jq -rc 'select(.data.src_ip=="192.168.0.202")|{r:.rule.id,d:.rule.description}' | tail -5
      # 2) 해석 — 세 로그를 안 열어도 SIEM에서 출발지 192.168.0.202의 사건이 한눈에 보인다
      # → 세 로그를 일일이 안 열어도 SIEM에서 출발지 192.168.0.202의 사건이 한눈에 보인다
      ```

      ## 🔧 도구·옵션 풀이
      - `tail -400 alerts.json` — manager 가 수렴시킨 최근 경보 400줄(한 줄=한 JSON 경보).
      - `select(.data.src_ip==\"192.168.0.202\")` — 공격자 출발지로 경보를 필터링.
      - `.rule.id`/`.rule.description` — Wazuh 가 붙인 룰 ID·설명(사람이 읽을 평결 문장)을 뽑는다.

      ## ✅ 합격 기준
      `192.168.0.202` 출력 시 통과. **근거:** alerts.json 에 출발지 192.168.0.202 의 경보가 수렴해
      보이면 통과 — 단 specific 한 SQLi/XSS 룰 대신 일반 Apache 4xx 룰이 더 자주 보이는데, 이는
      의도된 gap 으로 W04 에서 사용자 정의 decoder+custom rule 로 해결한다.
