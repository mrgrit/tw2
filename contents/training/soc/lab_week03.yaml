    instruction: |
      ## 🎯 Suricata eve 분석 — 네트워크 관점

      WAF 가 못 보는 네트워크 관점을 본다. IDS Suricata 가 web 앞단(ips 컨테이너)에서 본
      한 출발지의 event_type 분포와 alert 시그니처를 읽는다. (이 STEP 만 target 이 ips.)

      ## 💡 개념 한 줄
      Suricata 는 같은 한 흐름을 여러 event_type 으로 쪼갠다 — **alert**(시그니처 매치=공격
      탐지, 분석의 핵심) / **http**(HTTP 트랜잭션 메타) / **flow**(세션 통계). flow 가 압도적으로
      많고 alert·http 는 드물어 `tail -3000` 처럼 깊게 긁어야 잡힌다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-ips` — `docker exec -it el34-ips bash` 로 접속해 실행한다.

      ```bash
      # 1) 출발지 192.168.0.202의 event_type 분포(alert/http/flow)
      tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.src_ip=="192.168.0.202")|.event_type' | sort | uniq -c
      # 2) alert 이벤트의 시그니처 집계(무엇으로 탐지됐나)
      tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert")|.alert.signature' | sort | uniq -c | tail -5
      # 3) 해석 — alert(시그니처)/http(트랜잭션)/flow(세션). WAF가 못 본 네트워크 공격도 잡음
      # → alert(시그니처)/http(트랜잭션)/flow(세션). WAF가 못 본 네트워크 공격도 잡음
      ```

      ## 🔧 도구·옵션 풀이
      - `jq -rc "select(.src_ip==\"192.168.0.202\")|.event_type"` — eve.json 한 줄=한 JSON 에서
        출발지가 공격자인 이벤트만 골라 event_type 만 raw(-r) 출력.
      - `select(.event_type==\"alert\")|.alert.signature` — alert 이벤트의 시그니처 문장
        (예: "ET SCAN ...")만 뽑는다 = "무엇으로 탐지됐는지".
      - `tail -3000` — alert·http 는 flow 에 비해 드물어 충분히 깊게 봐야 한다.

      ## ✅ 합격 기준
      `alert` 출력 시 통과. **근거:** 출발지의 event_type 분포에 alert 가 포함되고 alert 시그니처가
      식별되면 통과 — 네트워크(Suricata)와 응용(ModSec)을 함께 봐야 사각지대가 준다.
    hint: 'eve.json event_type 분포 + alert signature'
