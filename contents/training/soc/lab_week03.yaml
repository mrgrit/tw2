      # 3) 해석 — alert(시그니처)/http(트랜잭션)/flow(세션). WAF가 못 본 네트워크 공격도 잡음
      # → alert(시그니처)/http(트랜잭션)/flow(세션). WAF가 못 본 네트워크 공격도 잡음
    answer_detail: "Suricata eve 는 한 흐름을 alert(시그니처 매치)/http(트랜잭션 메타)/flow(세션 통계)로 쪼개 본다. 네트워크 관점이라 포트 스캔 등 비-HTTP 공격까지 잡는 게 강점이고, WAF(L7)와 상호 보완한다. 다만 '어떤 CRS 룰에 왜 걸렸나' 같은 응용 계층 판단은 ModSec audit 이 정확하다 — 네트워크(Suricata)와 응용(ModSec)을 함께 봐야 사각지대가 준다. flow 가 압도적으로 많아 alert 가 안 보이면 더 깊게 긁는다."
