lab_id: standalone-soc-week03
title: "웹 공격 vs 네트워크/웹 로그(Apache·ModSec·Suricata) 교차 분석"
version: standalone-soc
course: soc
week: 3
description: |
  한 번의 웹 공격(SQLi·XSS·스캐너)은 세 로그에 서로 다른 모습으로 남는다 — Apache per-vhost
  access.log 는 "무엇이 들어왔나"(요청 전체상), ModSecurity audit 은 "왜 막혔나"(WAF 의 판단),
  Suricata eve.json 은 "네트워크에서 무엇이 보였나"(시그니처·세션). 본 실습은 차단형 vhost
  `dvwa.el34.lab` 에 세 종류 공격을 흘려 세 로그를 동시에 채운 뒤, 각 로그를 직접 열어 강점과
  한계를 확인하고(전체 요청 / WAF 룰 판단 / 네트워크 시그니처), 같은 출발지(192.168.0.202)로 한
  공격자·한 사건으로 교차 상관하며, 마지막으로 Wazuh SIEM 의 alerts.json 한 스트림으로 수렴함을
  확인한다. el34 는 fw 가 SNAT 하지 않아 세 로그 모두 실제 공격자 IP(192.168.0.202)를 보존하므로 교차
  상관이 가능하다. 관측·분석 중심이며 인프라는 변경하지 않는다. 공격(재현)은 내 공격 VM
  `ssh att@192.168.0.202`(비번 1)에서, 분석은 `ssh ccc@{{TARGET_IP}}`(el34 호스트, 비번 1)에서 `docker exec`로 한다.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W01–W02 통과 (W01 트리아지 4요소, W02 인증 로그 분석)"
  - "el34 호스트 SSH(`ssh ccc@{{TARGET_IP}}`, 비밀번호 1) + docker exec 접근"
  - "lecture 숙지 — §1(한 공격 세 로그) §2(ModSec audit/CRS 룰군) §3(Apache access) §4(Suricata eve) §5(교차 상관) §6(SIEM 수렴)"
objectives:
  - "세 로그(Apache per-vhost access / ModSec audit / Suricata eve)의 위치와 역할을 구분한다"
  - "ModSec audit 에서 6자리 CRS 룰 ID(942 SQLi/941 XSS/913 스캐너/949110 누적 차단)와 응답코드(403/200)·remote_address 를 식별한다"
  - "Apache access 에서 요청 라인·client IP·응답코드 분포(전체상)를 분석한다"
  - "Suricata eve 에서 한 출발지의 event_type 분포(alert/http/flow)와 alert 시그니처를 식별한다"
  - "세 로그를 같은 출발지(192.168.0.202)로 교차 상관해 한 사건으로 묶고, Wazuh alerts.json 수렴을 확인한다"
  - "세 로그 강점을 합친 교차 분석 보고서를 작성한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 세 로그의 위치

      분석을 시작하려면 먼저 데이터가 어디 있는지 알아야 한다. 본 주차의 세 소스가 어느
      컨테이너의 어느 경로에 사는지 확인한다 — Apache per-vhost access(`el34-web`),
      ModSec audit(`el34-web`), Suricata eve(`el34-ips`).

      ## 💡 개념 한 줄
      el34 의 Apache 는 단일 `access.log` 가 아니라 **vhost 별 분리 로그**(dvwa 트래픽은
      `dvwa_access.log`)를 둔다 — 특정 사이트 공격만 좁혀 보기 위함. audit 과 eve 는 서로
      다른 컨테이너(web/ips)에 있다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** Apache/ModSec 로그는 `el34-web`, Suricata 로그는 `el34-ips`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: Apache per-vhost access + ModSec audit 로그 (root라 sudo) ──
      sudo ls -la /var/log/apache2/dvwa_access.log /var/log/apache2/modsec_audit.log

      # ── el34-ips 에서: Suricata eve 로그 ──
      ls -la /var/log/suricata/eve.json
      ```

      ## 🔧 도구·옵션 풀이
      - `docker exec -it el34-<name> bash` — el34 호스트에서 해당 컨테이너로 접속해 명령을 실행한다.
      - `sudo` — Apache 로그는 root 권한이라 web 컨테이너에서 sudo 로 읽는다(ips 의 eve 는 불필요).
      - `ls -la` — 파일 존재 + 크기 확인. 크기가 0 이 아니어야 로그가 실제로 쌓이는 중.

      ## ✅ 합격 기준
      `audit` 출력 시 통과. **근거:** Apache access / ModSec audit / Suricata eve 세 로그가 모두
      존재하고 크기가 0 이 아니면 통과 — 셋 다 보이면 분석을 시작할 준비가 된 것이다.
    hint: 'dvwa_access.log + modsec_audit.log + eve.json'
    category: survey
    points: 10
    answer: |
      # 1) web 컨테이너의 Apache per-vhost access + ModSec audit 로그 존재·크기 확인(root라 sudo)
      ssh ccc@10.20.32.80 'sudo ls -la /var/log/apache2/dvwa_access.log /var/log/apache2/modsec_audit.log'
      # 2) ips 컨테이너의 Suricata eve 로그 존재·크기 확인
      ssh ccc@10.20.31.2 'sudo ls -la /var/log/suricata/eve.json'
    answer_detail: "세 로그가 각각 무엇을 보는지 = Apache access(모든 요청·응답의 전체상, 판단 없음) / ModSec audit(WAF 가 왜 막았는지) / Suricata eve(네트워크 시그니처·세션). dvwa 는 차단형 vhost 라 per-vhost access 로그(`dvwa_access.log`)에 별도로 쌓이고, audit·eve 는 web·ips 두 컨테이너에 나뉘어 있다. 세 로그가 존재하면 분석을 시작할 준비가 된 것."
    expected_output: |
      -rw-r--r-- 1 root root    392086 Jun 26 14:45 /var/log/apache2/dvwa_access.log
      -rw-r----- 1 root root 427599684 Jun 26 14:45 /var/log/apache2/modsec_audit.log
      -rw-r--r-- 1 root root 97729615 Jun 26 14:45 /var/log/suricata/eve.json
    verify:
      type: output_contains
      expect: 'audit'
      field: stdout
      semantic:
        intent: "웹 공격 분석 세 로그 위치 확인"
        success_criteria: ["access/audit/eve 존재"]
        acceptable_methods:
          - "**[OSS] 세 로그 ls (권장)**"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 웹 공격 재현 — SQLi + XSS + 스캐너

      분석할 흔적을 직접 만든다. 외부 공격자 VM 192.168.0.202에서 차단형 vhost `dvwa.el34.lab` 로 SQLi 와
      XSS 를 보내고, 첫 요청에는 스캐너 User-Agent(`sqlmap/1.7`)를 실어 세 종류 공격을 한
      공격자가 보낸 것으로 재현한다. 이 한 줄의 curl 들이 세 로그(access·audit·eve)에 동시에
      흔적을 남긴다.

      ## 💡 개념 한 줄
      대상은 **차단형 vhost `dvwa`** (ModSec `On` → 403). juice 는 DetectionOnly 라 같은 공격이
      200 으로 통과하면서 탐지만 남는 대조군이다. URL 의 `%27`·`%20` 은 `'`·공백의 URL 인코딩.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) SQLi — 스캐너 UA(sqlmap/1.7)로 UNION SELECT 주입(942 SQLi + 913 scanner 자극)
      echo -en 'GET /?id=socw3%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # 2) XSS — <script> 페이로드 주입(941 XSS 자극)
      echo -en 'GET /?q=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # 3) Wazuh agent ship 대기(수렴 확인 대비) 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "web attacks done"
      ```

      ## 🔧 도구·옵션 풀이
      - `외부 공격자 VM 192.168.0.202` — 외부 공격자 VM 192.168.0.202 공격자 컨테이너(출발지 192.168.0.202).
      - `curl -s -o /dev/null` — 조용히(-s) 응답 본문을 버리고(-o /dev/null) 요청만 발생.
      - `-A 'sqlmap/1.7'` — User-Agent 를 스캐너로 위장 → ModSec 913(스캐너) 룰군을 자극.
      - `?id=...UNION SELECT...` = SQLi(942 룰군), `?q=<script>...` = XSS(941 룰군) payload.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** "web attacks done" 이 나오면 SQLi/XSS/스캐너 흔적이 세 로그에
      생성된 것 — 응답코드 자체는 다음 실습에서 로그로 확인한다.
    hint: 'sqlmap UA SQLi + XSS curl'
    category: recon
    points: 10
    answer: |
      # 1) SQLi — 스캐너 UA(sqlmap/1.7)로 UNION SELECT 주입(942 SQLi + 913 scanner 자극)
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw3%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 2) XSS — <script> 페이로드 주입(941 XSS 자극)
      ssh att@192.168.0.202 'echo -en 'GET /?q=<script>alert(1)</script> HTTP/1.0\r\nHost: dvwa.el34.lab\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null'
      # 3) Wazuh agent ship 대기(수렴 확인 대비) 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "web attacks done"
    answer_detail: "한 공격자(192.168.0.202)가 SQLi(942)/XSS(941)/스캐너 UA(913)로 차단형 dvwa 를 친다. 같은 요청이 세 로그에 다르게 남는다 — Apache access(요청 라인+응답코드), ModSec audit(걸린 CRS 룰), Suricata eve(네트워크 시그니처·세션). 조건 폴링(로그 흔적 대기) 은 Wazuh agent 가 manager 로 ship 할 시간을 주기 위함(실습 7 의 수렴 확인 대비). 흔적이 생성되면 STEP 3~5 에서 각 로그를 열어 분석한다."
    expected_output: |
      web attacks done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "웹 공격 재현 — 세 로그에 흔적 생성"
        success_criteria: ["SQLi/XSS/스캐너"]
        acceptable_methods:
          - "**[OSS] attacker curl SQLi/XSS (권장)**"
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ModSec audit 분석 — 왜 막혔나 (rule/payload/응답)

      세 로그 중 유일하게 "왜 막혔나"를 답하는 audit 을 읽는다. 어떤 CRS 룰이 걸렸고
      응답코드가 무엇인지, 출발지가 누구인지 식별한다.

      ## 💡 개념 한 줄
      CRS 는 룰 하나에 바로 막지 않고 **위험 점수를 누적**한다. 941/942 등 공격 룰의 점수가
      임계치(기본 5)를 넘으면 **949110** 이 발동해 403 으로 차단한다. 룰 ID 앞 3자리가
      공격 종류 = 942 SQLi / 941 XSS / 913 스캐너 / 949 누적 차단.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) modsec_audit 최근 80줄에서 6자리 CRS 룰ID(9xxxxx)만 추출해 룰별 횟수 집계
      sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c
      # 2) 최근 1건의 응답코드(403=차단)와 실제 출발지(remote_address) 확인
      sudo tail -1 /var/log/apache2/modsec_audit.log | jq '{status:.response.status, remote:.transaction.remote_address}'
      # 3) 해석 — 942=SQLi, 941=XSS, 913=scanner, 949110=anomaly 차단. status 403=차단
      # → 942=SQLi, 941=XSS, 913=scanner, 949110=anomaly 차단. status 403=차단
      ```

      ## 🔧 도구·옵션 풀이
      - `grep -oE "9[0-9]{5}"` — 9 로 시작하는 6자리(=CRS 룰 ID)만 통째로 추출. 룰 ID 는
        JSON 의 `audit_data.messages[]` 안에 `[id "942100"]` 형식으로 들어 있어, 경로를
        외우지 않고 이렇게 긁는 게 실용적이다.
      - `sort | uniq -c` — 같은 룰 ID 를 모아 등장 횟수를 센다(룰군 분포 한눈에).
      - `jq "{status:.response.status, remote:.transaction.remote_address}"` — audit JSON 에서
        응답코드와 실제 출발지 IP 만 뽑는다.

      ## ✅ 합격 기준
      `942` 출력 시 통과. **근거:** 공격 룰(942/941/913)과 누적 차단 룰 949110, 응답코드 403,
      remote_address(192.168.0.202)가 식별되면 통과 — 949110 이 보이면 점수 누적으로 차단까지 간 것.
    hint: 'modsec audit 의 9xxxxx rule + response.status'
    category: analysis
    points: 14
    answer: |
      # 1) modsec_audit 최근 80줄에서 6자리 CRS 룰ID(9xxxxx)만 추출해 룰별 횟수 집계
      ssh ccc@10.20.32.80 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c'
      # 2) 최근 1건의 응답코드(403=차단)와 실제 출발지(remote_address) 확인
      ssh ccc@10.20.32.80 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{status:.response.status, remote:.transaction.remote_address}"'
      # 3) 해석 — 942=SQLi, 941=XSS, 913=scanner, 949110=anomaly 차단. status 403=차단
      # → 942=SQLi, 941=XSS, 913=scanner, 949110=anomaly 차단. status 403=차단
    answer_detail: "ModSec audit 는 세 로그 중 유일하게 '왜 막혔나'를 답한다. 룰 ID(942 SQLi/941 XSS/913 scanner)가 어떤 payload 에 걸려 점수가 누적되고, 임계치를 넘으면 949110 이 403 으로 차단한다 — 즉 949110 이 보이면 '공격 룰들의 점수가 합산되어 차단까지 갔다'는 결정적 신호다. remote_address 는 el34 출처 보존 덕에 실제 공격자 IP. 반대로 941/942 는 있는데 949110 이 없고 200 이면 탐지만 된 경우(DetectionOnly 또는 점수 미달)."
    expected_output: |
      2 901960
            1 910360
          118 913100
            6 923076
            2 923077
            1 926725
            2 926829
            8 930100
           16 930110
            4 930120
            4 931100
           40 932115
      … (이하 생략)
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic:
        intent: "ModSec audit로 rule/payload/응답 식별"
        success_criteria: ["rule id 942/941/949", "응답코드 403", "remote_address"]
        acceptable_methods:
          - "**[OSS] modsec audit rule + status (권장)**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 Apache access 분석 — 요청 전체상

      WAF 판단이 빠진, 모든 요청의 사실(전체상)을 본다. ModSec audit 이 "거른 것"만 본다면
      access 는 "들어온 전부"(차단된 것 + 통과한 것 + 정상 요청)를 본다.

      ## 💡 개념 한 줄
      access 한 줄 형식 = `client IP - - [시각] "요청 라인" 응답코드 크기 "리퍼러" "User-Agent"`.
      payload 가 요청 라인에 그대로 노출되고, client IP 는 el34 출처 보존으로 실제 공격자 IP.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-web` — `docker exec -it el34-web bash` 로 접속해 실행한다.

      ```bash
      # 1) dvwa access 최근 10줄 — 모든 요청의 전체상(client IP/요청라인/응답코드)
      sudo tail -10 /var/log/apache2/dvwa_access.log
      # 2) 응답코드 분포 — " 403 " 같은 3자리 코드만 뽑아 집계(403 차단/200 통과 비율)
      sudo tail -50 /var/log/apache2/dvwa_access.log | grep -oE "\" [0-9]{3} " | sort | uniq -c
      # 3) 해석 — access는 모든 요청을 기록(탐지는 없지만 전체상)
      # → access는 모든 요청(client IP, 요청라인, status)을 기록 — 탐지는 없지만 전체상
      ```

      ## 🔧 도구·옵션 풀이
      - `tail -10 dvwa_access.log` — dvwa vhost 의 최근 10줄. (단일 access.log 가 아니라
