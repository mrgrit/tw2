  - order: 8
    instruction: |
      ## 🎯 교차 분석 보고서

      STEP 1~7 을 한 장의 교차 분석 보고서로 종합한다. 각 로그의 강점을 합쳐 한 공격자의
      사건으로 결론을 도출하는 마무리다 — 분석은 결국 '남이 읽고 판단할 수 있는 보고서'로
      끝난다.

      ## 💡 개념 한 줄
      세 로그 강점 = access(요청 전체상) / audit(WAF 가 왜 막았나) / eve(네트워크 시그니처).
      이를 같은 출발지로 묶어 '차단됐어도 다른 경로 성공 여부를 교차로 봐야 한다'는 통합
      통찰까지 적는 것이 핵심.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 교차 분석 보고서 출력 — ModSec→access→eve→교차 상관→SIEM 결론
      cat > ~/w03_note1.md <<'EOF'
      # SOC W03 웹 공격 교차 분석 보고서
      ## 1. ModSec: 942(SQLi)/941(XSS)/913(scanner) → 949110 차단(403), remote 192.168.0.202
      ## 2. Apache access: GET /?id=...UNION... 403 (요청 전체상 + client IP)
      ## 3. Suricata eve: alert(시그니처)+http+flow, src 192.168.0.202
      ## 4. 교차 상관: 세 로그 모두 192.168.0.202 = 한 공격자
      ## 5. SIEM 통합: web/ips agent → alerts.json 한 스트림, 출발지로 사건 종합
      ## 결론: 한 공격도 세 로그에 다르게 남는다 — 교차로 봐야 전체상(차단됐어도 다른 경로 성공 여부 등)
      EOF
      cat ~/w03_note1.md
      ```

      ## ✅ 합격 기준
      `교차` 출력 시 통과. **근거:** 보고서에 세 로그의 교차 분석(같은 출발지 + 각 로그 강점 +
      통합 결론)이 담기면 통과 — 한 로그만 보면 놓치는 것을 교차로 잡는 게 SOC 분석의 핵심이다.
