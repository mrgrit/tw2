  - order: 6
    instruction: |
      ## 🎯 교차 상관 — 세 로그 같은 출발지

      흩어진 세 흔적을 한 사건으로 묶는다. 세 로그가 같은 공격자(192.168.0.202)를 가리키는지
      직접 맞춰 본다 — 이게 SOC 분석의 핵심 동작이다.

      ## 💡 개념 한 줄
      세 로그는 출발지를 다른 필드명으로 부른다 — ModSec `remote_address` = Apache client IP
      = Suricata `src_ip`. 이 셋이 같은 값이면 한 공격자·한 사건. el34 가 SNAT 하지 않아
      세 로그 모두 실제 IP 를 보존하기에 가능한 상관이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** ModSec/Apache 는 `el34-web`, Suricata 는 `el34-ips`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── el34-web 에서: ModSec audit + Apache access 의 공격자 IP ──
      echo "[ModSec audit]"; sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "10\.20\.30\.202" | head -1
      echo "[Apache access]"; sudo tail -50 /var/log/apache2/dvwa_access.log | grep -oE "10\.20\.30\.202" | head -1

      # ── el34-ips 에서: Suricata eve alert 의 같은 IP ──
      echo "[Suricata eve]"; tail -3000 /var/log/suricata/eve.json | jq -rc 'select(.event_type=="alert")|.src_ip' | grep -m1 "192.168.0.202"

      # 상관 — 세 로그 모두 192.168.0.202 = 한 공격자(el34 출처 보존)
      # → 세 로그 모두 192.168.0.202 = 한 공격자 (el34 출처 보존)
      ```

      ## 🔧 도구·옵션 풀이
      - `grep -oE "10\.20\.30\.202"` — 세 로그(각기 다른 형식)에서 공통 키인 공격자 IP 만
        뽑아 같은 값인지 눈으로 맞춘다(`.` 은 정규식 메타라 `\.` 로 이스케이프).
      - `head -1` / `grep -m1` — 첫 일치만 보여 출발지가 존재함을 확인.
      - 세 로그가 web/web/ips 두 컨테이너에 흩어져 있어도 출발지 하나로 묶인다.

      ## ✅ 합격 기준
      `192.168.0.202` 출력 시 통과. **근거:** 세 로그 모두 출발지 192.168.0.202 가 나오면 한 공격자·
      한 사건으로 상관된 것 — 교차의 가치는 한 로그만으로는 못 내리는 결론을 잡는 데 있다.
