lab_id: standalone-soc-week04
title: "Wazuh 관제(Manager/Agent)·커스텀 룰 작성·검증"
version: standalone-soc
course: soc
week: 4
description: |
  W01~W03에서 "이미 떠 있는 경보"를 읽고 분류했다면, 이번 주는 한 단계 위 — 분석가가 직접 탐지를
  만든다. 무차별 대입(brute-force) 같은 인증 공격을 예시로, 원시 로그(auth.log의 Failed password)가
  Wazuh 안에서 decoder→rule→alerts.json으로 변환되는 파이프라인을 추적한다. 먼저 Wazuh manager
  (analysisd=룰엔진, remoted=agent통신)/agent 구조를 점검하고, wazuh-logtest로 SSH 인증 실패 한
  줄의 decoder 필드(srcip 등)와 매치되는 기본 룰(5760)을 확인한다. 그 위에 기본 룰이 못 잡거나
  너무 낮게 평가하는 위협을 잡는 커스텀 룰(field match 100440 + if_group/맥락 체이닝 격상 100441,
  본 트랙 soc 대역 1004xx)을 local_rules.xml에 작성하고 logtest로 발화를 검증한다(라이브 analysisd
  무중단). 마지막에 새 룰이 만드는 오탐(false positive)을 조건 좁히기·level 적정화·화이트리스트로
  줄이는 튜닝까지 다룬다. 공유 SIEM이므로 룰은 검증이 끝나면 백업 복원으로 반드시 삭제(베이스 보존,
  wazuh-control restart 금지). 룰 작성·검증은 el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비번 1)에 들어가
  `docker exec el34-siem`로 하고, 룰을 발화시킬 트리거 공격은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서
  공인 진입 192.168.0.161로 보낸다(출처 192.168.0.202로 기록되어 커스텀 룰이 매치).
difficulty: hard
duration_minutes: 200
prerequisites:
  - "W01–W03 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §3(logtest) §4(커스텀 룰) §5(검증) §6(튜닝) 숙지"
objectives:
  - "Wazuh 탐지 파이프라인(원시 로그→decoder→rule→alerts.json) 이해 + manager(analysisd 룰엔진)/agent(web·ips) 가용성 점검"
  - "wazuh-logtest로 SSH 무차별 대입 로그의 decoder 필드(srcip/dstuser)와 매치되는 기본 룰(5760, group authentication_failed) 디버그"
  - "기본 룰이 못 잡는 위협을 잡는 커스텀 탐지 룰(field match, id 100440 level 10) 작성 + logtest 발화 검증"
  - "기존 탐지에 맥락을 더해 격상하는 체이닝 룰(맥락 매치 100441 level 12, 운영은 if_group/if_sid·frequency/timeframe) 작성"
  - "새 룰의 오탐(false positive)을 조건 좁히기·level 적정화·화이트리스트로 줄이는 튜닝"
  - "공유 SIEM 안전 운영 — logtest로만 검증(라이브 무재시작) + 백업 복원으로 베이스 보존"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — Manager / Agent (탐지 엔진 가용성)

      ### 왜 이걸 먼저 하나
      커스텀 룰은 결국 manager의 **analysisd**(decoder→rule 판정 엔진) 위에서 돈다. 이 엔진이
      멈춰 있으면 디코더도 룰도 한 줄도 평가되지 않는다. 그래서 룰 작업의 1순위는 "탐지 엔진이
      살아있고, 로그를 보내는 agent가 붙어 있는가"를 확인하는 것이다.

      ### 무엇을 보나 (처음 나오는 데몬 풀이)
      - **analysisd** — decoder→rule을 돌려 경보(alerts.json)를 만드는 핵심 판정 엔진.
      - **remoted** — agent와 통신(1514/tcp)하며 원격 로그를 받는 데몬.
      - **agent(web 004 / ips 003)** — 각 호스트의 로그를 읽어 manager로 ship하는 수집기.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) manager 데몬 상태 — 판정 엔진 analysisd + agent 통신 remoted 가동 확인
      /var/ossec/bin/wazuh-control status | grep -E "analysisd|remoted"
      # 2) agent 목록 — web(004)/ips(003)가 active인지 확인
      /var/ossec/bin/agent_control -l | grep -E "web,|ips," || echo "(agent)"
      ```
      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** analysisd/remoted 가 running 이고 web/ips agent 가 active 면
      탐지를 만들고 적용할 토대가 선 것 — analysisd 가 멈추면 어떤 커스텀 룰도 평가되지 않는다.
    hint: 'wazuh-control + agent_control'
    category: survey
    points: 10
    answer: |
      # 1) manager 데몬 상태 — 판정 엔진 analysisd + agent 통신 remoted 가동 확인
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep -E "analysisd|remoted"
      # 2) agent 목록 — web(004)/ips(003)가 active인지 확인
      docker exec el34-siem /var/ossec/bin/agent_control -l | grep -E "web,|ips," || echo "(agent)"
    answer_detail: "manager의 analysisd(decoder→rule 판정 엔진)와 remoted(agent 통신)가 running이고 agent(web 004/ips 003)가 active여야 탐지를 만들고 적용할 토대가 선다. analysisd가 멈추면 어떤 커스텀 룰도 평가되지 않으므로 룰 작업의 1순위 점검이다."
    expected_output: |
      wazuh-remoted is running...
      wazuh-analysisd is running...
         ID: 003, Name: ips, IP: any, Active
         ID: 004, Name: web, IP: any, Active
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "Wazuh manager/agent 점검"
        success_criteria: ["analysisd/remoted running", "web/ips agent"]
        acceptable_methods: ["**[OSS] wazuh-control + agent_control (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 decoder 디버그 — wazuh-logtest

      ### 개념 (왜 이걸 하나)
      룰의 조건은 **decoder가 뽑은 필드** 위에서만 동작한다. decoder가 srcip을 안 뽑으면 룰에
      `<field name="srcip">`을 써봐야 영영 매치되지 않는다. 그래서 룰을 쓰기 전에 "이 로그에서
      어떤 필드가 나오는가 = 룰이 쓸 재료"를 먼저 확인한다. 여기서는 SSH 무차별 대입(brute-force)
      한 줄(`Failed password for root from 9.9.9.9`)을 넣는다.

      ### wazuh-logtest 가 보여주는 3단계
      - **Phase 1 (Pre-decoding)** — 시간·호스트·프로그램(sshd) 1차 분해.
      - **Phase 2 (Decoding)** — sshd decoder가 srcip=9.9.9.9, dstuser=root 등 필드를 추출.
      - **Phase 3 (Rule matching)** — 뽑힌 필드가 기본 룰에 매치 → 본 줄은 **rule 5760**(다수 인증
        실패, group authentication_failed)이 잡는다. 5760이 보인다는 건 "기본 룰이 이미 이 패턴을
        잡으니 나는 그 위에 격상/보강만 하면 된다"는 신호다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) SSH 무차별 대입 한 줄을 임시 로그 파일로 작성(logtest 입력)
      cat > /tmp/socw4ssh.log <<EOF
      Jan  1 00:00:00 web sshd[1]: Failed password for root from 9.9.9.9 port 22 ssh2
      EOF
      # 2) wazuh-logtest로 decoder→rule 통과 — decoder 필드(srcip)와 매치 룰(5760) 확인 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw4ssh.log 2>&1 | grep -aE "decoder|id:|srcip|Failed" | head -6; rm -f /tmp/socw4ssh.log
      ```
      ## ✅ 합격 기준
      `5760` 출력 시 통과. **근거:** Phase2 decoder 필드(srcip)와 Phase3 매치 룰 5760(다수 인증 실패)이
      보이면 통과 — 5760 이 잡힌다는 건 기본 룰이 이미 이 패턴을 잡으니 그 위에 격상/보강만 하면 된다는 뜻.
    hint: 'sshd 줄 → wazuh-logtest → rule 5760'
    category: analysis
    points: 12
    answer: |
      # 1) SSH 무차별 대입 한 줄을 임시 로그 파일로 작성(logtest 입력)
      docker exec el34-siem sh -c 'cat > /tmp/socw4ssh.log <<EOF
      Jan  1 00:00:00 web sshd[1]: Failed password for root from 9.9.9.9 port 22 ssh2
      EOF'
      # 2) wazuh-logtest로 decoder→rule 통과 — decoder 필드(srcip)와 매치 룰(5760) 확인 후 임시파일 삭제
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw4ssh.log 2>&1 | grep -aE "decoder|id:|srcip|Failed" | head -6; rm -f /tmp/socw4ssh.log'
    answer_detail: "wazuh-logtest는 라이브 analysisd를 건드리지 않고 로그 한 줄을 decoder→rule에 통과시켜 단계별 결과를 보여준다. Phase2에서 sshd decoder가 뽑는 필드(srcip=9.9.9.9, dstuser=root)가 곧 룰이 쓸 재료이고, Phase3의 rule 5760(다수 인증 실패, group authentication_failed)은 기본 룰이 이미 이 무차별 대입 패턴을 잡고 있음을 뜻한다 — 커스텀 룰은 이 위에 격상/보강을 얹는다."
    expected_output: |
      full event: 'Jan  1 00:00:00 web sshd[1]: Failed password for root from 9.9.9.9 port 22 ssh2'
      	srcip: '9.9.9.9'
      	id: '5760'
      	mitre.id: '['T1110.001', 'T1021.004']'
    verify:
      type: output_contains
      expect: '5760'
      field: stdout
      semantic:
        intent: "decoder/rule 디버그"
        success_criteria: ["decoder 필드", "rule 5760"]
        acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 커스텀 탐지 룰 작성 (id 100440)

      ### 개념 (왜 이걸 하나)
      기본 룰이 모르는 우리만의 위협(여기선 json 로그의 내부 마커 `alert_signature=SOC_CUSTOM`)을
      분석가가 직접 잡는다. 룰은 `/var/ossec/etc/rules/local_rules.xml`에 쓰며, 사용자 룰 id는
      100000+(본 트랙 soc 대역 **1004xx**)를 쓴다.

      ### 룰 요소 풀이
      - `<decoded_as>json</decoded_as>` — JSON으로 디코딩된 로그에만 적용(대상을 좁혀 오탐 방지).
      - `<field name="alert_signature">SOC_CUSTOM</field>` — 핵심 조건. 이 필드 값이 마커와 같으면 매치.
      - `level 10` — 못 잡던 위협을 환경에 맞는 적정 심각도로 매긴다.

      ### 공유 SIEM 철칙 — 작성→검증→복원
      백업(cp) → 룰 append → wazuh-logtest로 발화 검증 → 백업 복원으로 잔재 0. 라이브는 재시작하지
      않는다(검증은 엔진 무중단).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 베이스 local_rules.xml 백업(검증 후 원복용)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw4_lr.bak
      # 2) 커스텀 탐지 룰(id 100440, level 10, json + alert_signature=SOC_CUSTOM) append
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w4,\">
        <rule id=\"100440\" level=\"10\">
          <decoded_as>json</decoded_as>
          <field name=\"alert_signature\">SOC_CUSTOM</field>
          <description>SOC W04 custom detection</description>
        </rule>
      </group>
      EOF"
      # 3) 마커 JSON을 임시 파일로 작성(logtest 입력)
      cat > /tmp/socw4.json <<EOF
      {"alert_signature":"SOC_CUSTOM","src_ip":"9.9.9.9"}
      EOF
      # 4) logtest로 룰 100440 level 10 발화 확인(라이브 무중단) 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw4.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw4.json
      # 5) 백업 복원 — 커스텀 룰 잔재 0(공유 SIEM 베이스 보존)
      sudo cp /tmp/socw4_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw4_lr.bak; echo "복원 잔재=$(grep -c 100440 /var/ossec/etc/rules/local_rules.xml)"
      ```
      ## ✅ 합격 기준
      `100440` 출력 시 통과. **근거:** logtest 에 rule 100440(level 10) 발화가 보이면 통과 — 검증 후
      cp 백업으로 복원해 베이스 local_rules.xml 을 원상 보존한다(라이브 무재시작).
    hint: 'field match 룰(100440) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      # 1) 베이스 local_rules.xml 백업(검증 후 원복용)
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw4_lr.bak'
      # 2) 커스텀 탐지 룰(id 100440, level 10, json + alert_signature=SOC_CUSTOM) append
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w4,\">
        <rule id=\"100440\" level=\"10\">
          <decoded_as>json</decoded_as>
          <field name=\"alert_signature\">SOC_CUSTOM</field>
          <description>SOC W04 custom detection</description>
        </rule>
      </group>
      EOF"'
      # 3) 마커 JSON을 임시 파일로 작성(logtest 입력)
      docker exec el34-siem sh -c 'cat > /tmp/socw4.json <<EOF
      {"alert_signature":"SOC_CUSTOM","src_ip":"9.9.9.9"}
      EOF'
      # 4) logtest로 룰 100440 level 10 발화 확인(라이브 무중단) 후 임시파일 삭제
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw4.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw4.json'
      # 5) 백업 복원 — 커스텀 룰 잔재 0(공유 SIEM 베이스 보존)
      docker exec el34-siem sh -c 'sudo cp /tmp/socw4_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw4_lr.bak; echo "복원 잔재=$(grep -c 100440 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "분석가가 기본 룰이 모르는 내부 마커(alert_signature=SOC_CUSTOM)를 level 10으로 직접 탐지하는 첫 커스텀 룰. <decoded_as>json으로 대상 로그를 좁히고 <field>로 조건을 지정한다(id는 soc 대역 1004xx). wazuh-logtest에 'id 100440, level 10, Alert to be generated.'가 뜨면 성공. 공유 SIEM이므로 검증 후 cp 백업으로 복원해 베이스 local_rules.xml을 원상 보존한다(라이브 무재시작)."
    expected_output: |
      id: '100440'
      	level: '10'
      **Alert to be generated.
      복원 잔재=0
    verify:
      type: output_contains
      expect: '100440'
      field: stdout
      semantic:
        intent: "커스텀 탐지 룰 작성 + logtest 검증"
        success_criteria: ["id 100440 작성", "logtest 발화", "cp 복원"]
        acceptable_methods: ["**[OSS] field match 룰 + wazuh-logtest (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 체이닝 격상 룰 (id 100441, if_group)

      ### 개념 (왜 이걸 하나)
      기본 룰이 어떤 사건을 너무 조용히(낮은 level) 흘려보낼 때, 분석가는 거기에 **맥락**을 더해
      심각도를 올린다. 이 미션은 맥락 필드(`threat=apt`, 지능형 지속 위협)가 보이면 level 12로
      격상하는 룰로 그 원리를 익힌다.

      ### 운영에서의 체이닝 (개념 확장)
      - `<if_group>authentication_failed</if_group>` — 인증 실패 계열 탐지 **뒤에만** 발화(맥락 결합).
      - `<if_sid>5760</if_sid>` — 특정 룰(다수 인증 실패 5760)이 먼저 매치된 뒤에만 발화.
      - `frequency="5" timeframe="60"` + `<same_source_ip/>` — "같은 출발지에서 60초에 5회 이상"
        이라는 임계(threshold) 격상. el34의 fw는 출발지 IP를 보존(SNAT 안 함)하므로 same_source_ip
        빈도가 정확히 동작한다. (빈도 룰은 누적 후 발화 → 검증 시 임계를 넘기는 다중 라인 필요.)

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 베이스 local_rules.xml 백업(검증 후 원복용)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw4_lr.bak
      # 2) 맥락 격상 룰(id 100441, level 12, json + threat=apt) append
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w4c,\">
        <rule id=\"100441\" level=\"12\">
          <decoded_as>json</decoded_as>
          <field name=\"threat\">apt</field>
          <description>SOC W04 APT context escalation</description>
        </rule>
      </group>
      EOF"
      # 3) 맥락 JSON을 임시 파일로 작성(logtest 입력)
