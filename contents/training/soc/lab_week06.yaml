      모든 SOC 사건은 보고서로 마감된다. 재현 가능한 증거와 명확한 우선순위를 담은 보고가
      분석가의 최종 산출물이다. 보고서는 분석의 흐름 그대로 — 매핑(무엇을 봤나) → 재구성
      (어떻게 엮었나) → 증거(어떻게 입증했나) → 우선순위(어떻게 결정했나) — 4단으로 쓴다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 캠페인 분석 보고서 출력 — ATT&CK→캠페인→증거→에스컬레이션→결론
      cat <<'EOF'
      # SOC W06 캠페인 분석 보고서
      ## 1. ATT&CK: 스캔(T1046 정찰)→SQLi(T1190 침투)→(인증 T1110)
      ## 2. 캠페인: 출발지 192.168.0.202, 시간순 정찰→침투 체인
      ## 3. 증거: ModSec(942→949110), Suricata(scan signature_id), 출처 보존
      ## 4. 에스컬레이션: 정찰→침투 체인 진행 = P2(L2/IR로)
      ## 결론: ATT&CK으로 읽으면 흩어진 경보가 '어느 단계까지 온 캠페인'으로 보인다
      EOF
      ```

      ## 🔧 각 절에 담을 내용
      - **1. ATT&CK 매핑** — 스캔=T1046, SQLi=T1190, (인증=T1110) 등 경보별 전술/기술.
      - **2. 캠페인 재구성** — 출발지 192.168.0.202, 시간순 정찰→침투 체인.
      - **3. 심층 증거** — ModSec(942→949110), Suricata(scan signature), 출처 IP 보존.
      - **4. 에스컬레이션** — 정찰→침투 전진 = P2(L2/IR로), 근거 명시.

      ## ✅ 합격 기준
      `ATT&CK` 출력 시 통과. **근거:** 보고서에 ATT&CK 매핑 + 캠페인 재구성 + 에스컬레이션이
      모두 담기면 통과 — 흩어진 경보를 단계로 읽어 재현 가능한 증거·우선순위로 보고한 것이다.
