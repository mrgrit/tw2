    instruction: |
      ## 🎯 목표
      지금까지의 분석을 종합해 사건의 우선순위를 매기고, 에스컬레이션(L2/IR로 올림) 여부를
      결정한다 — 분석의 결론이 행동으로 이어지는 단계.

      ## 📖 개념 (왜 이걸 하나)
      **에스컬레이션** = 일선 분석가(L1)가 처리 범위를 넘는 사건을 상급(L2/IR)으로 올리는
      절차다. 다 올리면 상급이 마비되고, 안 올리면 진짜 침해를 놓친다. 그래서 우선순위
      판정이 선행된다. 핵심 원리: **ATT&CK 전술 단계가 깊을수록, 체인이 전진 중일수록
      우선순위가 높다**(정찰은 피해 전, 침투 성공·지속성은 피해 후 + 시급).

      ## 💻 실행 명령
      ```bash
      echo "정찰만(T1046)        → P3"
      echo "침투 시도(T1190 체인) → P2 (에스컬레이션)"
      echo "침투 성공/지속성     → P1 (즉시 IR)"
      ```

      ## 🔧 P1~P4 등급
      | 등급 | 기준 | 대응 |
      |------|------|------|
      | P1 | 침투 성공/지속성/고가치 자산 | 즉시 IR |
      | P2 | 진행형 침투(체인 전진 중) | 에스컬레이션 |
      | P3 | 단발/정찰만 | 모니터링 |
      | P4 | 정보성/오탐 | 기록만 |

      ## ✅ 합격 기준
      ATT&CK 단계 깊이 + 체인 진전으로 P1~P4를 판정하면 통과. 본 캠페인(정찰→침투 전진 중)은
      P2(에스컬레이션)이며, 지속성(T1136)까지 잡히면 P1로 격상하는 논리를 설명할 수 있어야 한다.
