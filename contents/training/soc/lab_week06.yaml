lab_id: standalone-soc-week06
title: "분석가의 눈 — 흩어진 경보를 ATT&CK으로 읽고 한 캠페인으로 엮기"
version: standalone-soc
course: soc
week: 6
description: |
  분석가의 눈으로 흩어진 경보를 읽는 주차다. 단발 경보(스캔·SQLi·인증 실패)를 하나하나
  떼어 보는 대신, MITRE ATT&CK 전술(왜)/기술(어떻게)로 매핑해 "공격이 지금 어느 단계까지
  왔나"를 판단한다. 이어 같은 출발지 IP(192.168.0.202) + 시간순으로 묶어 한 공격자의
  캠페인 타임라인으로 재구성하고, ModSec(웹 침투 T1190)과 Suricata(네트워크 정찰 T1046)
  로그로 각 단계를 교차 입증(다소스 상관)한 뒤, ATT&CK 단계 깊이 + 체인 진전 여부로
  P1~P4 우선순위를 매겨 에스컬레이션을 판정한다.
  관측·분석 중심이며, 공유 SIEM이므로 룰 변경 없이 읽기 위주로 진행한다. 공격(재현)은 내 공격 VM
  `ssh att@192.168.0.202`(비번 1)에서 공인 진입 192.168.0.161로, 분석은 el34 호스트(`ssh ccc@{{TARGET_IP}}`,
  비번 1)에서 `docker exec`로 한다(모든 벡터가 출처 192.168.0.202로 묶임).
  el34는 fw가 출처 IP를 바꾸지 않아(SNAT 없음) 공격자 IP가 Suricata·ModSec·Wazuh 전
  계층에 그대로 보존되며, 이 출처 보존이 캠페인 재구성과 다소스 상관의 전제가 된다.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(ATT&CK) §3(캠페인) §5(에스컬레이션) 숙지"
objectives:
  - "임의의 경보를 MITRE ATT&CK 전술(TA번호)/기술(T번호)에 매핑하고, 전술 순서로 공격 단계의 깊이를 판단한다"
  - "alerts.json에서 같은 출발지(192.168.0.202)의 경보를 시간순으로 추출해 한 공격자의 캠페인 타임라인으로 재구성한다"
  - "웹 침투(T1190)는 ModSec CRS 룰(942·949110 anomaly 차단)로, 네트워크 정찰(T1046)은 Suricata signature로 교차 입증한다(다소스 상관)"
  - "ATT&CK 단계 깊이 + 체인 진전 여부로 사건을 P1~P4로 분류하고 에스컬레이션(L2/IR로 올림) 여부를 근거와 함께 판정한다"
  - "분석 결과를 ATT&CK 매핑 → 캠페인 재구성 → 다소스 증거 → 에스컬레이션 순의 1페이지 보고서로 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      ATT&CK 분석에 들어가기 전, 경보를 만들어내는 엔진과 적재 경로가 살아 있는지 점검한다.

      ## 📖 개념 (왜 이걸 하나)
      Wazuh manager의 분석 엔진 `analysisd`가 decoder→rule을 돌려 경보를 만들고, 그 결과가
      `alerts.json`에 한 줄씩 쌓인다. 이 둘 중 하나라도 죽어 있으면 신규 경보가 생성·적재되지
      않으므로, 이후의 매핑·재구성·심층 분석이 전부 무의미해진다. 그래서 가장 먼저 확인한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) Wazuh 분석 엔진 analysisd 가동 확인
      /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) alerts.json 최신 1건의 출발지/룰 설명 미리보기(적재 확인)
      tail -1 /var/ossec/logs/alerts/alerts.json | jq '{src:.data.src_ip,sig:.rule.description}'
      ```

      ## 🔧 처음 나오는 도구/옵션
      - `wazuh-control status` — Wazuh manager의 데몬 상태를 보여준다. `grep analysisd`로 분석 엔진만 추린다.
      - `tail -1 alerts.json` — 가장 최근 경보 한 줄(JSON)을 뗀다.
      - `jq "{src:.data.src_ip,sig:.rule.description}"` — 그 JSON에서 출발지 IP와 룰 설명만 보기 좋게 추출한다.

      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** analysisd is running + 최신 경보 1건이 JSON으로 적재돼
      보이면 통과 — analysisd 가 stopped 면 신규 경보가 안 생기므로 먼저 복구해야 한다.
    hint: 'analysisd + alerts.json'
    category: survey
    points: 10
    answer: |
      # 1) Wazuh 분석 엔진 analysisd 가동 확인
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) alerts.json 최신 1건의 출발지/룰 설명 미리보기(적재 확인)
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json | jq "{src:.data.src_ip,sig:.rule.description}"'
    answer_detail: "ATT&CK 분석의 토대 = 살아 있는 경보 스트림(alerts.json)과 분석 엔진(analysisd) + 심층 소스(ModSec/Suricata). analysisd가 running이고 alerts.json에 최신 경보가 적재되면 통과로 판정한다. 엔진이 멈춰 있으면 이후 모든 분석이 빈 결과가 되므로 1순위 점검 항목이다."
    expected_output: |
      wazuh-analysisd is running...
      {
        "src": "192.168.0.202",
        "sig": "Suricata: Alert - EL34 Bot UA - sqlmap"
      }
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "텔레메트리 점검"
        success_criteria: ["analysisd", "경보 적재"]
        acceptable_methods: ["**[OSS] wazuh-control (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표
      이후 실습에서 매핑·재구성할 원본 경보를 만든다. ATT&CK 전술 순서대로 정찰(포트 스캔)
      → 초기침투(SQLi)를 한 출발지(192.168.0.202)에서 연속으로 흘려보낸다.

      ## 📖 개념 (왜 이걸 하나)
      분석할 캠페인이 있어야 분석을 한다. 공격은 보통 "먼저 둘러보고(정찰) 다음에 찌른다
      (침투)"는 순서를 따르며, 이 순서가 곧 ATT&CK 전술 순서다. Red(공격)가 통제된 환경에서
      체인을 재현해야 Blue(분석)가 탐지·재구성을 검증할 수 있다 — Purple Team의 표준 절차다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 정찰 — SYN 포트 스캔(T1046, 연결 안 맺는 은밀한 스캔)
      sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned
      # 2) 초기침투 — sqlmap UA로 SQLi 주입(T1190, 차단형 dvwa)
      curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' "http://192.168.0.161/?id=socw6%27%20UNION%20SELECT%201--%20-"
      # 3) 경보 전파 대기 후 완료 마커
      sleep 6
      echo "chain done"
      ```

      ## 🔧 처음 나오는 도구/옵션
      - `sudo nmap -sS -p 20-120 -T4` — 포트 20~120 범위를 빠른 속도(T4)로 훑는 SYN 스캔(정찰 T1046).
      - `-A sqlmap/1.7` — User-Agent를 sqlmap으로 위장(탐지 유발용). `?id=...UNION%20SELECT...` = SQL 주입(T1190).
      - `-H 'Host: dvwa.el34.lab'` — 차단형(SecRuleEngine On) vhost 라 SQLi 가 ModSec 에 잡힌다.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** nmap 스캔 완료 + SQLi curl 후 chain done 이 나오면 통과 —
      이 시점부터 세 도구(Suricata/ModSec/Wazuh)에 흔적이 쌓이기 시작한다.
    hint: 'nmap + 웹 SQLi'
    category: recon
    points: 10
    answer: |
      # 1) 정찰 — SYN 포트 스캔(T1046, 연결 안 맺는 은밀한 스캔)
      ssh att@192.168.0.202 'sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned'
      # 2) 초기침투 — sqlmap UA로 SQLi 주입(T1190, 차단형 dvwa)
      ssh att@192.168.0.202 "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://192.168.0.161/?id=socw6%27%20UNION%20SELECT%201--%20-\""
      # 3) 경보 전파 대기 후 완료 마커
      sleep 6
      echo "chain done"
    answer_detail: "정찰(스캔, T1046)→초기침투(SQLi, T1190) — ATT&CK 전술 순서대로 진행되는 공격 체인을 한 출발지(192.168.0.202)에서 재현한다. `chain done` 출력이면 두 단계가 발생한 것으로 판정하며, sleep으로 경보 전파를 기다린 뒤 후속 분석 실습이 같은 출발지의 흔적을 잡을 수 있게 한다."
    expected_output: |
      scanned
      chain done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "공격 체인 재현"
        success_criteria: ["스캔→웹 체인"]
        acceptable_methods: ["**[OSS] nmap + 웹 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 목표
      재현한 경보들을 MITRE ATT&CK의 전술(왜)/기술(어떻게)에 매핑한다 — 분석가의 첫 해석 작업.

      ## 📖 개념 (왜 이걸 하나)
      - **전술(Tactic, TA번호)** = 공격의 목적/단계(정찰·초기침투·자격증명 접근 등).
      - **기술(Technique, T번호)** = 그 목적을 이루는 구체적 수법.
      매핑해야 "지금 어느 단계인가"를 말할 수 있다. 전술 번호의 순서를 보면 "정찰만(초기)" vs
      "침투까지(심각)"가 한눈에 갈린다 — 단계가 깊을수록 위험하다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 스캔 → 정찰 전술/기술
      echo "스캔     → TA0043 정찰 / T1046 Network Service Scanning"
      # 2) SQLi → 초기침투 전술/기술
      echo "SQLi     → TA0001 초기침투 / T1190 Exploit Public-Facing Application"
      # 3) 인증 실패 → 자격증명 접근 전술/기술
      echo "인증 실패 → TA0006 자격증명 접근 / T1110 Brute Force"
      # 4) 해석 — 매핑하면 '정찰만(초기)' vs '침투까지(심각)' 단계가 한눈에
      echo "→ 매핑하면 '정찰만(초기)' vs '침투까지(심각)' 단계가 한눈에"
      ```

      ## 🔧 매핑 규칙 (외울 게 아니라 단계로 읽기)
      | 경보 | 전술(왜) | 기술(어떻게) |
      |------|---------|-------------|
      | 포트 스캔 | TA0043 정찰 | T1046 Network Service Scanning |
      | SQLi | TA0001 초기침투 | T1190 Exploit Public-Facing Application |
      | 인증 실패(SSH brute) | TA0006 자격증명 접근 | T1110 Brute Force |

      ## ✅ 합격 기준
      `T1190` 출력 시 통과. **근거:** 각 경보가 ATT&CK 기술(T1190 등)에 매핑되면 통과 — 전술 순서
      (정찰 TA0043→초기침투 TA0001→자격증명 TA0006)로 단계 깊이를 읽는 것이 에스컬레이션의 토대다.
    hint: '경보 → 전술/기술 매핑'
    category: analysis
    points: 12
    answer: |
      # 1) 스캔 → 정찰 전술/기술
      echo "스캔     → TA0043 정찰 / T1046 Network Service Scanning"
      # 2) SQLi → 초기침투 전술/기술
      echo "SQLi     → TA0001 초기침투 / T1190 Exploit Public-Facing Application"
      # 3) 인증 실패 → 자격증명 접근 전술/기술
      echo "인증 실패 → TA0006 자격증명 접근 / T1110 Brute Force"
      # 4) 해석 — 매핑하면 '정찰만(초기)' vs '침투까지(심각)' 단계가 한눈에
      echo "→ 매핑하면 '정찰만(초기)' vs '침투까지(심각)' 단계가 한눈에"
    answer_detail: "경보를 ATT&CK 전술(왜)/기술(어떻게)로 매핑하면 공격 단계가 드러난다. 출력에 T1190 등 기술 번호가 포함되면 통과로 판정한다. 전술 순서(정찰 TA0043→초기침투 TA0001→자격증명 TA0006)로 '지금 어디까지 왔나'를 판단하며, 단계가 깊을수록 우선순위가 높아진다 — 이 매핑이 실습 7 에스컬레이션 판정의 근거가 된다."
    expected_output: |
      스캔     → TA0043 정찰 / T1046 Network Service Scanning
      SQLi     → TA0001 초기침투 / T1190 Exploit Public-Facing Application
      인증 실패 → TA0006 자격증명 접근 / T1110 Brute Force
      → 매핑하면 '정찰만(초기)' vs '침투까지(심각)' 단계가 한눈에
    verify:
      type: output_contains
      expect: 'T1190'
      field: stdout
      semantic:
        intent: "경보 ATT&CK 매핑"
        success_criteria: ["전술/기술 매핑", "T1046/T1190/T1110"]
        acceptable_methods: ["**[관리적] ATT&CK 매핑 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 목표
      흩어진 경보를 같은 출발지로 묶고 시간순으로 늘어놓아, 한 공격자의 캠페인 타임라인으로
      재구성한다 — 이것이 W06의 심장이다.

      ## 📖 개념 (왜 이걸 하나)
      SIEM은 경보를 발생 순서대로 쌓을 뿐, "이 경보와 저 경보가 같은 공격자의 같은 작전"
      이라고 묶어주지 않는다. 그 연결은 분석가의 몫이다. 두 개의 상관 키 —
      **출발지 상관**(같은 src_ip로 묶기)과 **시간순 정렬**(timestamp 오름차순) — 을 쓴다.
      el34는 fw가 SNAT를 하지 않아 출처 IP가 전 계층에 보존되므로 192.168.0.202로 정확히 묶인다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 출발지 192.168.0.202 경보만 골라 [시각, 룰설명] 시간순 최근 10건 — 캠페인 타임라인
      tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc 'select(.data.src_ip=="192.168.0.202")|[.timestamp,.rule.description]|@tsv' | tail -10
      # 2) 해석 — 출발지 192.168.0.202 + 시간순 + ATT&CK 전술 순서 = 한 공격자의 캠페인
      echo "→ 출발지 192.168.0.202 + 시간순 + ATT&CK 전술 순서 = 한 공격자의 캠페인"
      ```

      ## 🔧 명령 해부
      - `tail -2000` — 최근 경보 2000줄만 본다(전체를 다 읽으면 느리다).
      - `jq -rc "select(.data.src_ip==...)"` — 출발지가 공격자 IP인 줄만 고른다.
      - `[.timestamp,.rule.description]|@tsv` — 시각과 경보 설명만 탭으로 뽑아 `| tail -10` 으로 최근 10건을 시간순으로 읽는다.

      ## ✅ 합격 기준
      `192.168.0.202` 출력 시 통과. **근거:** 출발지 192.168.0.202 의 경보들이 시간순으로 나열되면
      통과 — 그 순서가 ATT&CK 전술 순서(정찰→침투)와 맞으면 의도된 캠페인이라는 강한 신호다.
    hint: 'alerts.json src 192.168.0.202 시간순'
    category: analysis
    points: 14
    answer: |
