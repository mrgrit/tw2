      ModSec(Apache + OWASP CRS)은 차단한 요청에 매치된 룰 ID를 남긴다. CRS는 공격 유형별로
      번호 대역을 나눈다 — **941xxx=XSS, 942xxx=SQLi**. 핵심은 **anomaly score**:
      룰에 걸릴 때마다 위험 점수를 누적하고, 임계치를 넘으면 **949110**(Anomaly Threshold)이
      발동해 차단한다. 942가 보이고 뒤이어 949110이 보이면 "SQLi가 점수를 쌓아 차단됐다"는
      T1190의 직접 증거다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

