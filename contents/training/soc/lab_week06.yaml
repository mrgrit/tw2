  - order: 6
    instruction: |
      ## 🎯 목표
      캠페인의 네트워크 정찰 단계(T1046)를 Suricata signature로 입증해, ModSec(웹) 증거와
      함께 다소스 상관을 완성한다.

      ## 📖 개념 (왜 이걸 하나)
      ips의 Suricata는 분석한 모든 패킷을 eve.json에 JSON 1줄씩 기록한다. `event_type:"alert"`
      줄에는 **signature_id**(룰 번호)·signature(설명)·출발지/목적지·**flow**(한 통신 세션
      단위)가 담긴다. 한 출발지에서 짧은 시간에 수많은 flow가 여러 포트로 향하면 = 포트
      스캔(T1046)의 전형이다. signature로 "무엇을 탐지했나", flow로 "얼마나 광범위했나"를 읽는다.

      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|[.alert.signature_id,.alert.signature]|@tsv" | sort | uniq -c | tail -5'
      ```

      ## 🔧 명령 해부
      - `tail -3000 eve.json` — alert는 flow보다 드물어 깊게 봐야 잡힌다.
      - `select(.event_type=="alert" and .src_ip=="10.20.30.202")` — alert 이벤트 중 공격자 출발지만 고른다.
      - `[.alert.signature_id,.alert.signature]|@tsv` — 룰 번호와 설명을 탭으로 뽑는다.
      - `sort | uniq -c | tail -5` — signature별 횟수를 집계해 상위 항목을 본다.

      ## ✅ 합격 기준
      sqlmap(또는 스캔) 관련 signature가 보이면 통과. 같은 출발지(10.20.30.202)가 ModSec·
      Suricata 양쪽에 찍힌 것을 확인하면 캠페인 단계가 확정된다. (ips는 두 NIC에서 sniff
      하므로 같은 트랜잭션이 2줄로 보일 수 있는데, src_ip는 동일하다.)
    hint: 'eve alert signature_id'
    category: analysis
    points: 12
    answer: |
      echo "=== Suricata 심층 (T1046 정찰 입증) ==="
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|[.alert.signature_id,.alert.signature]|@tsv" | sort | uniq -c | tail -5'
      echo "→ signature_id/signature로 스캔(T1046) 단계 입증, flow로 세션 규모"
    answer_detail: "캠페인의 정찰 단계(T1046)를 Suricata로 입증한다. 출력에 sqlmap(또는 스캔) signature가 보이면 통과로 판정한다. signature_id로 탐지 내용을, 보존된 출발지(10.20.30.202)로 동일 공격자임을, flow로 세션 규모를 읽는다. 이 네트워크 증거가 ModSec의 웹 증거와 같은 출발지에서 만나면 다소스 상관이 완성되어 캠페인 단계가 확정된다."
    verify:
      type: output_contains
      expect: 'sqlmap'
      field: stdout
      semantic:
        intent: "Suricata 심층으로 네트워크 단계 입증"
        success_criteria: ["signature_id/signature", "T1046 증거"]
        acceptable_methods: ["**[OSS] eve signature (권장)**"]
    target_vm: ips

