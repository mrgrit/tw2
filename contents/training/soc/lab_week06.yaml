      단위)가 담긴다. 한 출발지에서 짧은 시간에 수많은 flow가 여러 포트로 향하면 = 포트
      스캔(T1046)의 전형이다. signature로 "무엇을 탐지했나", flow로 "얼마나 광범위했나"를 읽는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** 스캐너 트래픽은 `외부 공격자 VM 192.168.0.202`, eve 분석은 `el34-ips`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: 스캐너 트래픽 생성 (sqlmap UA → Suricata 스캐너 시그니처 유발) ──
      curl -s -o /dev/null -w 'sent=%{http_code}\n' -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' 'http://192.168.0.161/?id=socw6scan%27%20UNION%20SELECT%201--%20-'

      # ── el34-ips 에서: eve 의 alert+출발지 192.168.0.202 signature 집계 (트래픽 3초 후) ──
      tail -3000 /var/log/suricata/eve.json | jq -rR 'fromjson? | select(.event_type=="alert" and .src_ip=="192.168.0.202") | [.alert.signature_id,.alert.signature]|@tsv' | sort | uniq -c | sort -rn | head -8

      # 해석 — signature로 스캔/정찰(T1046) 입증. 같은 출발지가 ModSec·Suricata 양쪽에 = 다소스 상관
      echo "→ signature로 스캔/정찰(T1046) 입증. 같은 출발지(192.168.0.202)가 ModSec·Suricata 양쪽에 = 다소스 상관"
      ```

      ## 🔧 명령 해부
      - 1) `-A sqlmap/1.7` — User-Agent를 sqlmap으로 위장해 Suricata 스캐너 룰(EL34 Bot UA - sqlmap)을 유발. 윈도우에 신선한 alert를 보장(재현성).
      - 3) `jq -rR "fromjson? | …"` — 각 줄을 raw로 읽어 `fromjson?` 로 파싱하되, 깨진 JSON 줄(eve.json 절단 라인)은 `?` 로 건너뛴다(jq 중단 방지).
      - `select(.event_type=="alert" and .src_ip=="192.168.0.202")` → `sort | uniq -c | sort -rn | head -8` — alert만 골라 signature별 횟수를 **빈도순**으로 집계(사전순 tail은 핵심 룰을 놓침).

      ## ✅ 합격 기준
      `sqlmap` 출력 시 통과. **근거:** 방금 생성한 sqlmap UA 요청이 Suricata 의 'Bot UA - sqlmap'
