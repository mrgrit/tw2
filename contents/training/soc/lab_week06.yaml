      ```bash
      # 1) modsec_audit 최근 80줄에서 CRS 룰ID(9xxxxx)만 추출해 룰별 횟수 집계
      sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c
      # 2) 해석 — 942(SQLi)가 anomaly score 누적 → 949110 차단. T1190 단계의 증거
      echo "→ 942(SQLi) payload가 anomaly score 누적 → 949110 차단. T1190 단계의 증거"
      ```

