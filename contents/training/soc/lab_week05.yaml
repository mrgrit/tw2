lab_id: standalone-soc-week05
title: "경보 폭주 vs 경보 분석(level·groups·빈도)·오탐 판정·억제"
version: standalone-soc
course: soc
week: 5
description: |
  SOC의 진짜 적은 공격이 아니라 경보 폭주(alert fatigue)다 — 하루 수만 건 중 진짜 위협은 몇 건이라,
  분석가가 전부 보면 정작 중요한 한 건을 놓친다(양치기 소년 효과). 본 lab은 폭주를 다스리는 전 과정을
  손으로 밟는다: ① 폭주를 재현하고 ② level(심각도)·groups(종류)·빈도(top talker) 세 축으로 분류하고
  ③ 오탐(false positive) 3기준으로 판정하고 ④ 오탐 노이즈를 level 0 억제 룰로 좁게 끄고 ⑤ 경보 관리
  보고서로 종합한다. 분석 대상은 el34-siem 의 Wazuh alerts.json, 억제는 local_rules.xml 의 level 0 룰을
  wazuh-logtest 로 무중단 검증(공유 SIEM 이라 라이브 적용 대신 검증 후 원복). 관측·분석 중심이라 인프라를
  바꾸지 않는다. 경보를 유발하는 공격(재현)은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 공인 진입
  192.168.0.161로, 분석은 el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비번 1) 경유로 각 장비(web 10.20.32.80/ips 31.2/siem 32.100)에 `ssh ccc@<장비IP>` 로.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W01–W04 통과 (triage·level·false positive·local_rules.xml·wazuh-logtest 이해)"
  - "el34 호스트 SSH(ssh ccc@{{TARGET_IP}}, pw 1) + docker exec 숙달"
  - "lecture §2~§4(분류 3축) §5(오탐 판정 3기준) §6(level 0 억제) 숙지"
objectives:
  - "alerts.json을 level(심각도)/groups(종류)/빈도(top talker) 세 축으로 분류한다"
  - "폭주의 구체적 원인(top rule ID·top 출발지 IP)을 지목한다"
  - "오탐 판정 3기준(정상 업무·양성 맥락·규칙적 빈도)을 적용해 노이즈와 진짜를 가른다"
  - "level 0 억제 룰(100450)을 좁은 조건으로 작성 + wazuh-logtest 검증 + 원복(공유 SIEM 보존)"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 경보량(폭주의 척도)

      ## 📖 개념 (왜 이걸 하나)
      폭주를 분석하려면 먼저 두 가지를 확인한다 — (1) 경보를 만드는 manager 의 채점 엔진
      `analysisd` 가 살아 있는가, (2) 경보가 실제로 얼마나 쌓여 있는가(=폭주의 척도). 엔진이
      죽었으면 분석할 폭주 자체가 없다. SIEM 운영자가 하루를 여는 첫 명령이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) manager 채점 엔진 analysisd 가동 확인
      /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) 최근 2000줄 중 "rule" 키 든 줄 수 = 최근 경보 건수(폭주의 척도)
      tail -2000 /var/ossec/logs/alerts/alerts.json | grep -c '"rule"'
      ```

      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** analysisd is running 이고 경보가 다수(>0) 수집돼 있으면
      통과 — 이 더미를 이번 주 내내 level/groups/빈도로 분류하고 오탐을 억제해 진짜만 남긴다.
    hint: 'analysisd + alerts.json 건수'
    category: survey
    points: 10
    answer: |
      # 1) manager 채점 엔진 analysisd 가동 확인
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) 최근 2000줄 중 "rule" 키 든 줄 수 = 최근 경보 건수(폭주의 척도)
      ssh ccc@10.20.32.100 'tail -2000 /var/ossec/logs/alerts/alerts.json | grep "\"rule\""' | jq -s length
    answer_detail: "경보량이 곧 폭주의 척도다. analysisd 가 running 이어야 경보가 생성되고, 그 다수 경보를 분류 없이 그대로 보면 alert fatigue(둔감)에 빠진다 — 이번 주 내내 이 더미를 level/groups/빈도로 분류하고 오탐을 억제해 진짜만 남긴다. 채점은 analysisd 가동을 확인."
    expected_output: |
      wazuh-analysisd is running...
      941
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "경보량 점검"
        success_criteria: ["analysisd", "경보 다수"]
        acceptable_methods: ["**[OSS] alerts.json 건수 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 경보 폭주 재현 — 반복 공격으로 다발 생성

      ## 📖 개념 (왜 이걸 하나)
      분석할 폭주를 직접 만든다. el34 의 내부 공격자 컨테이너(`외부 공격자 VM 192.168.0.202`, 출발지
      192.168.0.202)에서 포트 스캔과 웹 SQLi 를 반복해, Suricata(그룹 `ids`)와 ModSec(그룹
      `web`) 경보를 다발로 일으킨다. 한 공격자의 반복 행위가 어떻게 여러 경보의 더미가 되는지
      — 실제 SOC 가 마주하는 폭주의 축소판이다. el34 는 fw 가 SNAT 하지 않아 출처 IP(.202)가
      모든 경보에 보존되므로, 뒤(미션 5)에서 이 IP 를 top talker 로 짚을 수 있다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 포트 스캔 반복 — Suricata ids 경보 다발
      sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned
      # 2) 웹 SQLi 5회 반복(차단형 dvwa) — ModSec web/attacks 경보 다발
      echo -en 'GET /?id=socw5-1%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET /?id=socw5-2%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET /?id=socw5-3%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET /?id=socw5-4%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      echo -en 'GET /?id=socw5-5%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # 3) agent ship 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "flood done"
      ```

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** flood done 이 나오면 반복 공격으로 경보 다발이 생성된 것 —
      잠시 뒤 미션 3~5 집계에서 증가가 보인다.
    hint: 'nmap + 웹 SQLi 반복 → 경보 다발'
    category: recon
    points: 10
    answer: |
      # 1) 포트 스캔 반복 — Suricata ids 경보 다발
      ssh att@192.168.0.202 'sudo nmap -sS -p 20-120 192.168.0.161 -T4 >/dev/null 2>&1; echo scanned'
      # 2) 웹 SQLi 5회 반복(차단형 dvwa) — ModSec web/attacks 경보 다발
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw5-1%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw5-2%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw5-3%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw5-4%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw5-5%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 3) agent ship 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "flood done"
    answer_detail: "반복 공격이 Suricata(ids)·ModSec(web) 경보 다발을 만든다 — 실제 SOC의 폭주 상황을 통제된 형태로 재현(Purple Team 의 공격 주입 기법). 출처 IP 192.168.0.202 가 보존돼 뒤에서 top talker 로 묶인다. 채점은 flood done 출력으로 재현 완료를 확인."
    expected_output: |
      scanned
      flood done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "경보 폭주 재현"
        success_criteria: ["스캔+웹 반복", "경보 다발"]
        acceptable_methods: ["**[OSS] 반복 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 분류 축 1 — level(심각도) 분포

      ## 📖 개념 (왜 이걸 하나)
      폭주를 줄이는 첫 칼질. Wazuh level 은 0~16 정수 심각도다(0~4 정보성 / 5~7 주목 /
      8~11 경고 / 12~16 고위험). 폭주의 압도적 다수는 낮은 level 이라, 낮은 것을 걷어내고
      높은 것부터 보면 봐야 할 양이 급감한다. 분석가의 매일 첫 화면이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 최근 2000줄 경보의 level만 뽑아 "level=N"으로 집계(심각도 분포)
      tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc '"level="+(.rule.level|tostring)' | sort | uniq -c | sort -rn
      # 2) 해석 — 폭주의 대부분은 낮은 level. 높은 level(12+)부터 본다
      # → 폭주의 대부분은 낮은 level. 높은 level(12+)부터 본다
      ```
      - `jq -rc "\"level=\"+(.rule.level|tostring)"` — 각 경보의 `.rule.level` 만 `level=3` 문자열로(`-r` 따옴표 없이). `sort | uniq -c | sort -rn` 로 집계.

      ## ✅ 합격 기준
      `level=` 출력 시 통과. **근거:** level 별 건수 분포가 나오면 통과 — 폭주의 대부분이 낮은 level
      이라 고위험(12+)부터 볼 순서를 잡는다.
    hint: 'jq .rule.level 분포'
    category: analysis
    points: 12
    answer: |
      # 1) 최근 2000줄 경보의 level만 뽑아 "level=N"으로 집계(심각도 분포)
      ssh ccc@10.20.32.100 'tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc "\"level=\"+(.rule.level|tostring)" | sort | uniq -c | sort -rn'
      # 2) 해석 — 폭주의 대부분은 낮은 level. 높은 level(12+)부터 본다
      # → 폭주의 대부분은 낮은 level. 높은 level(12+)부터 본다
    answer_detail: "level로 첫 칼질 — 0~4 정보성(대부분 무시), 7+ 주목, 12+ 고위험. 폭주의 대부분이 낮은 level이라 높은 것부터 보면 효율적."
    expected_output: |
      875 level=3
           62 level=10
           24 level=7
            1 level=5
            1 level=4
      → 폭주의 대부분은 낮은 level. 높은 level(12+)부터 본다
    verify:
      type: output_contains
      expect: 'level='
      field: stdout
      semantic:
        intent: "level 분포로 심각도 분류"
        success_criteria: ["level별 집계", "고위험 우선"]
        acceptable_methods: ["**[OSS] jq level 분포 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 분류 축 2 — groups(종류) 분포

      ## 📖 개념 (왜 이걸 하나)
      level 이 "얼마나 위험한가" 라면 groups 는 "무슨 종류인가" 다. 각 룰은 분류 태그를 단다 —
      `ids`(Suricata 네트워크), `web`/`attacks`(ModSec 웹 공격), `authentication_failed`(sshd 인증),
      `syscheck`(FIM 파일변경), `sca`(설정점검). 한 그룹이 압도적이면 그 소스에 노이즈 또는
      진행형 공격이 있다는 신호 — 폭주의 **원인 위치** 를 좁힌다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 경보 groups(배열)별 조합 집계 — 어떤 종류가 폭주하나
      tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc .rule.groups | sort | uniq -c | sort -rn | head
      # 2) 해석 — 압도적 그룹(ids/syscheck 등)이 폭주의 원인 소스
      # → 압도적 그룹(ids/syscheck 등)이 폭주의 원인 소스
      ```
      - `.rule.groups` 는 배열(예: `["ids","suricata"]`)이라 `-c` 로 한 줄 출력 후 같은 조합끼리 센다.

      ## ✅ 합격 기준
      `ids` 출력 시 통과. **근거:** 어떤 그룹(ids/syscheck/web 등)이 폭주하는지 식별되면 통과 —
      압도 그룹이 폭주의 원인 소스(노이즈 또는 진행형 공격) 위치다.
    hint: 'jq .rule.groups 분포'
    category: analysis
    points: 12
    answer: |
      # 1) 경보 groups(배열)별 조합 집계 — 어떤 종류가 폭주하나
      ssh ccc@10.20.32.100 'tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc .rule.groups | sort | uniq -c | sort -rn | head'
      # 2) 해석 — 압도적 그룹(ids/syscheck 등)이 폭주의 원인 소스
      # → 압도적 그룹(ids/syscheck 등)이 폭주의 원인 소스
    answer_detail: "그룹 분포로 '무엇이 폭주의 원인인가'를 본다. 한 그룹(ids/syscheck)이 압도적이면 그 소스에 노이즈가 있다는 신호."
    expected_output: |
      875 ["ids","suricata"]
           62 ["sigma","el34","sigma","apache","webserver"]
           20 ["ossec","syscheck","syscheck_entry_modified","syscheck_file"]
            2 ["ossec","rootcheck"]
            1 ["stats"]
            1 ["sigma","el34","sigma","linux","process_creation"]
            1 ["ossec","syscheck","syscheck_entry_deleted","syscheck_file"]
            1 ["ossec","syscheck","syscheck_entry_added","syscheck_file"]
      → 압도적 그룹(ids/syscheck 등)이 폭주의 원인 소스
    verify:
      type: output_contains
      expect: 'ids'
      field: stdout
      semantic:
        intent: "groups 분포로 폭주 원인 종류 식별"
        success_criteria: ["그룹별 집계", "압도 그룹 식별"]
        acceptable_methods: ["**[OSS] jq groups 분포 (권장)**"]
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 분류 축 3 — 빈도(top talker)

      ## 📖 개념 (왜 이걸 하나)
      level·groups 가 "위험도" 와 "계열" 을 줬다면 빈도는 "범인" 을 지목한다. **어떤 룰** 이 /
      **어떤 출발지** 가 경보를 가장 많이 쏟아내나(top talker). 한 룰이 폭주의 대부분이면 그
      룰이 오탐 후보이거나 진행형 공격의 증거이고, 한 출발지가 폭주를 일으키면 집중 공격자이거나
      노이즈 소스다. 다음 미션(오탐 판정)의 대상을 정하는 단계다.

