      ## 🎯 억제(suppression) 룰 — level 0 으로 노이즈 끄기

      ## 📖 개념 (왜 이걸 하나)
      오탐으로 판정한 노이즈를 W04 에서 쓴 그 파일 `/var/ossec/etc/rules/local_rules.xml` 에
      **level 0** 룰로 추가해 화면에서 치운다(Wazuh 에서 level 0 = alert 미생성 = 억제). 핵심은
      **정상 패턴만 좁게** 매치하는 것 — `noise` 필드가 정확히 `healthcheck` 인 것만 끈다. 넓게
      끄면("404 전부" 같이) 노이즈와 함께 진짜 공격까지 꺼져 미탐(false negative)이 된다.

      > ⚠️ **공유 el34 보존 수칙.** SIEM 은 여러 학생이 공유하므로 라이브 적용(`wazuh-control
      > restart`)은 하지 않는다. ① `cp` 로 백업 → ② 룰 추가 후 `wazuh-logtest` 로 발화만 검증 →
      > ③ `cp` 로 원복(잔재 0 확인). `wazuh-logtest` 는 라이브 analysisd 를 멈추지 않고, 입력
      > 한 줄이 어느 decoder→rule 로 흐르는지 단계별로 보여주는 점검 도구다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 베이스 local_rules.xml 백업(검증 후 원복용)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw5_lr.bak
      # 2) 억제 룰(id 100450, level 0, json + noise=healthcheck) append — 정상 패턴만 좁게
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w5,\">
        <rule id=\"100450\" level=\"0\">
          <decoded_as>json</decoded_as>
          <field name=\"noise\">healthcheck</field>
          <description>SOC W05 suppress benign healthcheck noise</description>
        </rule>
      </group>
      EOF"
      # 3) 정상 패턴 JSON을 임시 파일로 작성(logtest 입력)
      cat > /tmp/socw5.json <<EOF
      {"noise":"healthcheck","src_ip":"10.0.0.5"}
      EOF
      # 4) logtest로 룰 100450이 level 0(미경보)으로 매치되는지 확인 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw5.json 2>&1 | grep -aE "id:|level:" | head -4; rm -f /tmp/socw5.json
      # 5) 백업 복원 — 억제 룰 잔재 0(공유 SIEM 베이스 보존)
      sudo cp /tmp/socw5_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw5_lr.bak; echo "복원 잔재=$(grep -c 100450 /var/ossec/etc/rules/local_rules.xml)"
      ```
      - `id="100450" level="0"` — SOC 트랙 W05 네임스페이스. level 0 이 억제의 핵심(alert 미생성). `<field name="noise">healthcheck</field>` 로 정상 패턴만 좁게 매치.

      ## ✅ 합격 기준
      `100450` 출력 시 통과. **근거:** wazuh-logtest 에서 억제 룰 100450 이 level 0 으로 매치되면
