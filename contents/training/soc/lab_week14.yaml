    instruction: |
      ## 🎯 목표
      미션 1–7 을 한 문서로 종합해, 자동화 SOC 설계 능력을 입증한다 — 본 주차의 최종 산출물.

      ## 📖 개념 (왜 이걸 하나)
      자동화 SOC 를 도입·인수인계할 때는 "무엇이·어떤 임계로·얼마 동안 자동 대응되고, 어떤 안전장치로
      자가 DoS 를 막으며, 어떤 트리아지를 자동화했는가"를 한 장의 설계 문서로 남긴다. 본 보고서는 그
      표준 구조를 따른다 — Active Response 설계 → 자동 대응 룰 → 안전장치 → AI 자율 트리아지·무인 효과.
      결론에는 "자동화는 사람을 대체가 아니라 증폭하며, 안전장치 + 사람 검증 루프 없는 자동화는 위협보다
      위험하다"는 핵심을 근거와 함께 적는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 자동 대응 보고서 출력 — AR 설계→트리거 룰→안전장치→AI 자율→결론
      cat <<'EOF'
      # SOC W14 자동 대응 보고서
      ## 1. Active Response: command(firewall-drop)+active-response(level>=12, timeout 600)
      ## 2. 자동 대응 룰: level 13(101410) 발화 → AR 자동 firewall-drop
      ## 3. 안전장치: timeout(자동해제)+화이트리스트(예외)+level 임계(확신) → 자가 DoS 방지
      ## 4. AI 자율: 룰+인텔+빈도 자동 트리아지, 사람은 검증+L3. 24/7 적시성
      ## 결론: 야간 무인 SOC = AI 트리아지 + Active Response, 단 안전장치+사람 검증 필수
      EOF
      ```
      - 1절=미션3(command+active-response 매핑), 2절=미션4(level 13 트리거 룰), 3절=미션5(세 안전장치), 4절=미션6·7(자율 트리아지+24/7 적시성).

      ## ✅ 합격 기준
      `Active Response` 출력 시 통과. **근거:** 보고서에 Active Response 설계 + 안전장치 + AI 자율
      트리아지가 모두 담기면 통과 — '자동화는 대체가 아니라 증폭, 안전장치+검증 루프 필수'가 결론이다.
