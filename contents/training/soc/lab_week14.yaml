      자동화의 이득은 둘이다(lecture §1.3) — **적시성**: 야간 03시 고위험 공격에 사람은 아침 09시에야
      반응하지만 자동 대응은 수 초 내 출처를 차단한다(그 시간차가 유출 여부를 가른다). **처리량**: 분당
      수천 건 경보를 사람이 다 볼 수는 없지만 자율 트리아지가 걸러 요약하면 같은 인원이 더 많이 감당한다.
      그러나 한계도 분명하다 — 모르는 위협(0-day)은 못 막고, 틀리면 자가 DoS 이며, **완전 무인은
      위험**하다. 자동화는 사람의 검증 루프(human-in-the-loop) 안에서만 안전하다 — 대체가 아니라 증폭.

