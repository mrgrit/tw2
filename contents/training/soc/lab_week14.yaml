      echo "화이트리스트: 내부/중요 IP 절대 차단 안 함"
      echo "level 임계: level>=12(높은 확신)에만 자동 대응, 낮으면 사람 확인"
      ```
      위 세 줄이 자가 DoS 를 막는 세 안전장치다 — 차례로 (1) 틀려도 영구는 아니다(timeout), (2) 핵심
      자산은 예외(화이트리스트), (3) 확신이 높을 때만 손을 쓴다(level 임계).

