lab_id: standalone-soc-week07
title: "SIGMA로 한 번 쓰고 Wazuh·Suricata 두 곳에 이식"
version: standalone-soc
course: soc
week: 7
description: |
  탐지를 벤더 표준(SIGMA YAML)으로 한 번 쓰고 여러 백엔드로 이식한다. SIGMA 룰 구조를 읽고,
  sigma2wazuh.py로 Wazuh 룰로 변환하고, logtest로 검증하며, Suricata 이식 개념과 실제 탐지를 확인한다.
  el34엔 ~/el34/sigma(룰+컨버터) + Wazuh sigma_rules.xml(id 200001-3)이 가동 중. 컨버터는 stdout 출력
  (라이브 미변경). 명령은 el34 호스트(`ssh ccc@192.168.0.151`)에서.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W04(Wazuh 룰) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SIGMA 구조) §3(변환) §5(Suricata 이식) 숙지"
objectives:
  - "SIGMA YAML 룰 구조(logsource/detection/tags) 이해"
  - "sigma2wazuh.py로 Wazuh 룰 변환"
  - "변환 룰 logtest 검증 + 실제 탐지 확인"
  - "다중 백엔드 이식(Wazuh/Suricata)의 가치 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — SIGMA 설정
      ## 💻 실행 명령
      ```bash
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py
      docker exec el34-siem sh -c 'grep -c "<rule " /var/ossec/etc/rules/sigma_rules.xml'
      ```
      ## ✅ 합격 기준
      SIGMA 룰/컨버터 + Wazuh sigma_rules.xml이 존재한다.
    hint: 'sigma rules/ + sigma2wazuh.py + sigma_rules.xml'
    category: survey
    points: 10
    answer: |
      echo "=== SIGMA 룰 + 컨버터 ==="
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py
      echo "=== Wazuh 적용된 sigma 룰 수 ==="
      docker exec el34-siem sh -c 'grep -c "<rule " /var/ossec/etc/rules/sigma_rules.xml'
    answer_detail: "SIGMA 설정 = 룰(rules/*.yml) + 컨버터(sigma2wazuh.py) + 적용(Wazuh sigma_rules.xml id 200001-3)."
    verify:
      type: output_contains
      expect: 'sigma2wazuh'
      field: stdout
      semantic:
        intent: "SIGMA 설정 점검"
        success_criteria: ["rules/ + 컨버터", "Wazuh sigma_rules.xml"]
        acceptable_methods: ["**[OSS] sigma 설정 ls (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 SIGMA 룰 읽기 — web-sqli.yml
      ## 💻 실행 명령
      ```bash
      cat ~/el34/sigma/rules/0002-web-sqli.yml
      ```
      ## ✅ 합격 기준
      logsource/detection/tags 구조를 읽는다.
    hint: 'web-sqli.yml 의 detection/tags'
    category: analysis
    points: 12
    answer: |
      echo "=== SIGMA 룰 (web-sqli) ==="
      cat ~/el34/sigma/rules/0002-web-sqli.yml
      echo "→ logsource(어디에)/detection(무엇을)/tags(ATT&CK) — 표준 YAML"
    answer_detail: "SIGMA 룰 = logsource(apache/webserver) + detection(union select 등 keywords) + condition + tags(attack.t1190). 벤더 무관 표준."
    verify:
      type: output_contains
      expect: 'detection'
      field: stdout
      semantic:
        intent: "SIGMA YAML 구조 이해"
        success_criteria: ["logsource/detection/tags", "표준 구조"]
        acceptable_methods: ["**[OSS] sigma yml 읽기 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 변환 — sigma2wazuh.py
      ## 💻 실행 명령
      ```bash
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -A4 'id="200002"'
      ```
      ## ✅ 합격 기준
      SIGMA가 Wazuh 룰(id 200002, regex)로 변환된다.
    hint: 'sigma2wazuh.py rules/ → Wazuh XML(200002)'
    category: manipulation
    points: 14
    answer: |
      echo "=== sigma2wazuh.py 변환 (stdout) ==="
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -A4 'id="200002"'
      echo "→ SIGMA keywords → Wazuh <regex>, level/tags → Wazuh level/group (stdout, 라이브 미변경)"
    answer_detail: "sigma2wazuh.py가 SIGMA YAML → Wazuh 룰. keywords가 pcre2 regex로, tags가 group으로. stdout 출력이라 라이브 sigma_rules.xml은 안 건드린다(운영은 > 리다이렉트 + restart)."
    verify:
      type: output_contains
      expect: '200002'
      field: stdout
      semantic:
        intent: "SIGMA → Wazuh 룰 변환"
        success_criteria: ["sigma2wazuh.py 실행", "id 200002 regex 변환"]
        acceptable_methods: ["**[OSS] sigma2wazuh.py rules/ (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 logtest 검증 — 변환 룰 발화
      ## 💻 실행 명령
      ```bash
      echo '1.2.3.4 - - [x] "GET /?id=1 union select 1,2 HTTP/1.1" 403' \
        | docker exec -i el34-siem /var/ossec/bin/wazuh-logtest
      ```
      ## ✅ 합격 기준
      변환 룰 `200002`가 logtest에서 발화한다.
    hint: 'union select 라인 → wazuh-logtest → 200002'
    category: analysis
    points: 14
    answer: |
      docker exec el34-siem sh -c 'cat > /tmp/socw7.log <<EOF
      1.2.3.4 - - [x] "GET /?id=1 union select 1,2 HTTP/1.1" 403
      EOF'
      echo "=== SIGMA 변환 룰 logtest ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw7.log 2>&1 | grep -aE "id:|level:|sigma|Alert to be" | head -5; rm -f /tmp/socw7.log'
    answer_detail: "변환된 SIGMA 룰(200002)이 union select 로그에 실제 발화 — SIGMA 한 줄이 Wazuh 경보가 된다. 라이브 sigma_rules.xml은 이미 적용돼 있어 logtest가 그대로 검증."
    verify:
      type: output_contains
      expect: '200002'
      field: stdout
      semantic:
        intent: "변환 SIGMA 룰 logtest 검증"
        success_criteria: ["200002 발화", "sigma group"]
        acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 Suricata 이식 — 같은 탐지 다른 백엔드
      ## 💻 실행 명령
      ```bash
      echo "SIGMA web-sqli.yml →(sigma2wazuh.py)→ Wazuh <regex> 룰 (로그 탐지)"
      echo "SIGMA web-sqli.yml →(sigma -t suricata)→ Suricata content 룰 (네트워크 탐지)"
      ```
      ## ✅ 합격 기준
      같은 SIGMA가 Wazuh/Suricata 두 백엔드로 이식됨을 이해한다.
    hint: 'SIGMA → Wazuh + Suricata 두 백엔드'
    category: analysis
    points: 10
    answer: |
      echo "=== 한 SIGMA, 두 백엔드 ==="
      echo "web-sqli.yml ─┬─ sigma2wazuh.py    → Wazuh <regex> 룰 (호스트/로그 탐지)"
      echo "              └─ sigma -t suricata → Suricata content 룰 (네트워크 탐지)"
      echo "→ 네트워크(Suricata) + 로그(Wazuh) 양쪽에서 같은 탐지. 벤더 종속 없이 탐지 자산 관리"
    answer_detail: "SIGMA는 Suricata 백엔드도 지원(sigma-cli). 같은 web-sqli SIGMA가 Suricata 룰로도 변환돼 네트워크/로그 양쪽 탐지. '한 번 쓰고 어디서나'."
    verify:
      type: output_contains
      expect: 'Suricata'
      field: stdout
      semantic:
        intent: "SIGMA 다중 백엔드 이식 이해"
        success_criteria: ["Wazuh + Suricata 변환", "벤더 무관"]
        acceptable_methods: ["**[설명] 다중 백엔드 (권장)**"]
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 실제 탐지 — SQLi 공격 → Wazuh sigma 경보
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw7%20union%20select%201,2--%20-\""
      sleep 8
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.rule.groups|index(\"sigma\"))|{r:.rule.id,d:.rule.description}" | tail -3'
      ```
      ## ✅ 합격 기준
      실제 SQLi가 Wazuh sigma 룰 경보로 잡힌다(또는 sigma 룰 존재 확인).
    hint: 'union select 공격 → alerts.json sigma 그룹'
    category: detect
    points: 14
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw7%20union%20select%201,2--%20-\""
      sleep 8
      echo "=== alerts.json sigma 그룹 경보 ==="
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.rule.groups|index(\"sigma\"))|{r:.rule.id,d:.rule.description}" | tail -3' || echo "(sigma 경보 — 룰 200002 적용 확인)"
      echo "=== (보강) sigma 룰 적용 확인 ==="
      docker exec el34-siem sh -c 'grep -c sigma /var/ossec/etc/rules/sigma_rules.xml'
    answer_detail: "SIGMA에서 변환된 Wazuh 룰이 실제 SQLi 공격을 sigma 그룹 경보로 잡는다. 표준 한 줄이 라이브 탐지가 되는 전 과정의 마무리."
    verify:
      type: output_contains
      expect: 'sigma'
      field: stdout
      semantic:
        intent: "SIGMA 변환 룰의 실제 탐지 확인"
        success_criteria: ["sigma 그룹 경보 또는 룰 적용", "표준→라이브 탐지"]
        acceptable_methods: ["**[OSS] 공격 후 alerts.json sigma (권장)**"]
    target_vm: siem

  - order: 7
    instruction: |
      ## 🎯 다중 플랫폼 가치 — 한 번 쓰고 어디서나
      ## 💻 실행 명령
      ```bash
      echo "SIGMA 1개 → Wazuh + Suricata + (Splunk/Elastic...) = 탐지 자산 1벌로 N 플랫폼"
      ```
      ## ✅ 합격 기준
      SIGMA의 다중 플랫폼 가치를 정리한다.
    hint: '한 SIGMA → N 백엔드'
    category: analysis
    points: 12
    answer: |
      echo "=== SIGMA 다중 플랫폼 가치 ==="
      echo "탐지 1개를 SIGMA로 작성 → sigma2wazuh(Wazuh) / sigma -t suricata(Suricata) / sigma -t splunk(SPL)..."
      echo "→ 벤더 바뀌어도 SIGMA 자산 재사용. 커뮤니티 SIGMA 룰(수천개) 즉시 이식. 탐지 표준화"
    answer_detail: "SIGMA의 가치 = 탐지 자산을 한 벌로 관리하고 N 플랫폼에 이식. 벤더 종속 탈피 + 커뮤니티 룰 재사용. SOC의 탐지 표준화."
    verify:
      type: output_contains
      expect: 'SIGMA'
      field: stdout
      semantic:
        intent: "SIGMA 다중 플랫폼 가치 이해"
        success_criteria: ["1 SIGMA → N 백엔드", "벤더 무관/재사용"]
        acceptable_methods: ["**[설명] 다중 플랫폼 가치 (권장)**"]
    target_vm: siem

  - order: 8
    instruction: |
      ## 🎯 SIGMA 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC W07 SIGMA 보고서 (학번, 이름)
      ## 1. SIGMA 룰 구조 (logsource/detection/tags)
      ## 2. 변환 (sigma2wazuh.py → Wazuh 200002)
      ## 3. 검증 (logtest 발화 + 실제 탐지)
      ## 4. 다중 백엔드 (Wazuh/Suricata) 가치
      ```
      ## ✅ 합격 기준
      보고서에 SIGMA 변환·검증·이식이 포함된다.
    hint: 'SIGMA 구조+변환+검증+이식'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # SOC W07 SIGMA 보고서
      ## 1. SIGMA: web-sqli.yml (logsource apache, detection union select 등, tags t1190)
      ## 2. 변환: sigma2wazuh.py → Wazuh rule 200002 (<regex> pcre2)
      ## 3. 검증: logtest 200002 발화 + 실제 SQLi → sigma 그룹 경보
      ## 4. 이식: 같은 SIGMA → Suricata 백엔드도 (네트워크+로그 양쪽 탐지)
      ## 결론: 탐지를 SIGMA 표준으로 한 번 쓰고 N 플랫폼에 이식 — 벤더 무관 탐지 자산
      EOF
    answer_detail: "SIGMA 종합 = 표준 작성 → 변환 → 검증 → 다중 이식. 탐지 자산을 벤더 종속 없이 관리하는 SOC의 성숙."
    verify:
      type: output_contains
      expect: 'SIGMA'
      field: stdout
      semantic:
        intent: "SIGMA 종합 보고"
        success_criteria: ["구조/변환/검증/이식"]
        acceptable_methods: ["**[관리적] SIGMA 보고서 (권장)**"]
    target_vm: siem
