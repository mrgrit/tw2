      # ── el34-siem 에서: alerts.json 의 sigma 그룹 경보 + 적용 룰 수 (공격 8초 후) ──
      tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc 'select(.rule.groups|index("sigma"))|{r:.rule.id,d:.rule.description}' | tail -3
      grep -c sigma /var/ossec/etc/rules/sigma_rules.xml

      # 해석 — 변환된 SIGMA 룰이 실제 SQLi를 sigma 그룹 경보로 탐지(룰 200002 적용)
      echo "→ 변환된 SIGMA 룰이 실제 SQLi를 sigma 그룹 경보로 탐지(룰 200002 적용)"
