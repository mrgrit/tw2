      흐름: 외부 SQLi(union select) → 웹·네트워크 로그 → ips/web agent 수집 → manager의 변환 룰 매치
      → `alerts.json`의 **sigma 그룹** 경보. group에 `sigma`가 붙는 것은 이 경보가 SIGMA에서 유래했다는
      표식이다(§3 변환에서 group에 sigma가 들어갔음을 기억).

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** SQLi 공격은 `외부 공격자 VM 192.168.0.202`, alerts.json 확인은 `el34-siem`.
      각 컨테이너에 `docker exec -it el34-<name> bash` 로 접속해 실행한다.

      ```bash
      # ── 외부 공격자 VM 192.168.0.202 에서: 실제 SQLi(union select) 공격 — dvwa 대상(%20=공백, 본문 버림) ──
