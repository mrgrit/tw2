lab_id: standalone-soc-week07
title: "SIGMA로 한 번 쓰고 Wazuh·Suricata 두 곳에 이식"
version: standalone-soc
course: soc
week: 7
description: |
  탐지 규칙을 벤더 중립 표준(SIGMA YAML)으로 한 번 작성해 여러 보안 제품(백엔드)으로 이식하는
  법을 익힌다. 핵심 흐름은 "SIGMA 한 벌 → 컨버터 → N 백엔드"다. 학생은 (1) SIGMA 룰의 세 기둥
  (logsource=어떤 로그에 / detection·condition=무엇을 어떻게 / tags=ATT&CK 매핑)을 읽고,
  (2) sigma2wazuh.py로 SIGMA YAML을 Wazuh 룰(XML)로 변환하며(keywords→<regex>, level/tags→
  level/group), (3) wazuh-logtest로 변환 룰(id 200002)이 실제 발화하는지 라이브 무중단으로 검증하고,
  (4) 같은 SIGMA가 Suricata 백엔드로도 이식됨을 이해한 뒤, (5) 실제 SQLi 공격이 alerts.json의 sigma
  그룹 경보로 잡힘을 데이터로 확인한다.
  el34엔 ~/el34/sigma(룰 rules/ + 컨버터 sigma2wazuh.py)와, 그것을 변환해 적용한 Wazuh
  sigma_rules.xml(id 200001-3)이 이미 가동 중이다. 컨버터는 결과를 stdout으로만 출력하므로 라이브
  sigma_rules.xml은 바뀌지 않는다(공유 인프라 보존). 룰 작성·검증은 el34 호스트(`ssh ccc@{{TARGET_IP}}`,
  비번 1)에서 docker exec로 하고, 룰을 발화시킬 트리거 공격은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서 보낸다.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W04(Wazuh 룰) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(SIGMA 구조) §3(변환) §5(Suricata 이식) 숙지"
objectives:
  - "SIGMA YAML 룰의 세 기둥(logsource=대상 로그 / detection·condition=탐지 로직 / tags=ATT&CK) 읽기"
  - "sigma2wazuh.py로 SIGMA→Wazuh 룰 변환 — keywords→<regex pcre2>, level/tags→level/group 대응 확인"
  - "변환 룰(id 200002)을 wazuh-logtest로 라이브 무중단 발화 검증 + 실제 SQLi 공격으로 sigma 그룹 경보 확인"
  - "같은 SIGMA가 Suricata 백엔드로도 이식됨을 이해하고 '한 번 쓰고 N 백엔드' 다중 플랫폼 가치 설명"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SIGMA 파이프라인 3부품 점검
      모든 SIGMA 작업의 전제는 세 부품이 갖춰져 있는 것이다 — ① SIGMA 룰(`~/el34/sigma/rules/`의
      YAML), ② 변환 컨버터(`sigma2wazuh.py`), ③ 그 변환 결과가 적용된 Wazuh 룰 파일
      (`/var/ossec/etc/rules/sigma_rules.xml`, id 200001-3). 작업 전 30초 인벤토리 점검이다.

      ## 🧩 개념 한 줄
      SIGMA(표준 레시피) → 컨버터(번역기) → Wazuh 룰(주방용 레시피)의 세 부품이 SIGMA "한 번 쓰고
      어디서나"의 토대다. 하나라도 없으면 변환·탐지가 성립하지 않는다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** SIGMA 룰·컨버터는 el34 호스트의 `~/el34/sigma/`, Wazuh 적용 룰은 `el34-siem`.

      ```bash
      # ── el34 호스트에서: SIGMA 룰 디렉터리와 컨버터 스크립트 존재 확인 ──
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py

      # ── el34-siem 에서: Wazuh에 적용된 sigma 룰 개수(<rule 카운트) ──
      grep -c "<rule " /var/ossec/etc/rules/sigma_rules.xml
      ```

      ## ✅ 합격 기준
      `sigma2wazuh` 출력 시 통과. **근거:** rules/ 와 sigma2wazuh.py 가 보이고 sigma_rules.xml 의
      `<rule` 개수가 3(또는 그 이상)으로 나오면 통과 — 룰·컨버터·적용 룰 세 부품이 모두 존재한다.
    hint: 'sigma rules/ + sigma2wazuh.py + sigma_rules.xml'
    category: survey
    points: 10
    answer: |
      # 1) SIGMA 룰 디렉터리와 컨버터 스크립트 존재 확인
      ls ~/el34/sigma/rules/ ~/el34/sigma/sigma2wazuh.py
      # 2) Wazuh에 적용된 sigma 룰 개수(<rule 카운트) — 변환·적용 확인
      docker exec el34-siem sh -c 'grep -c "<rule " /var/ossec/etc/rules/sigma_rules.xml'
    answer_detail: "SIGMA 설정 = 룰(rules/*.yml) + 컨버터(sigma2wazuh.py) + 적용(Wazuh sigma_rules.xml id 200001-3)."
    expected_output: |
      /home/ccc/el34/sigma/sigma2wazuh.py

      /home/ccc/el34/sigma/rules/:
      0001-ssh-bruteforce.yml
      0002-web-sqli.yml
      0003-linux-suspicious-cmd.yml
      3
    verify:
      type: output_contains
      expect: 'sigma2wazuh'
      field: stdout
      semantic:
        intent: "SIGMA 설정 점검"
        success_criteria: ["rules/ + 컨버터", "Wazuh sigma_rules.xml"]
        acceptable_methods: ["**[OSS] sigma 설정 ls (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 목표 — web-sqli SIGMA 룰의 세 기둥 읽기
      실제 SIGMA 룰 파일(`0002-web-sqli.yml`)을 열어 세 기둥을 눈으로 확인한다 — **logsource**(어떤
      로그에), **detection + condition**(무엇을 어떤 조합으로), **tags**(어떤 ATT&CK 기법).

      ## 🧩 개념 한 줄
      SIGMA 룰은 들여쓰기로 구조를 표현하는 YAML 한 장이다. 이 세 기둥 구조를 읽을 줄 알아야 다음
      단계(변환)의 출력과 1:1로 대응시킬 수 있다. 특히 `detection.selection.keywords`는 "로그 어디든
      이 문자열이 있으면 매치", `tags`의 `attack.t1190`은 MITRE ATT&CK T1190(공개 앱 취약점 악용)을
      뜻한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) web-sqli SIGMA 룰 전체 출력 — logsource/detection/condition/tags 세 기둥 확인
      cat ~/el34/sigma/rules/0002-web-sqli.yml
      # 2) 해석 — logsource(어디에)/detection(무엇을)/tags(ATT&CK) 표준 YAML
      echo "→ logsource(어디에)/detection(무엇을)/tags(ATT&CK) — 표준 YAML"
      ```

      ## ✅ 합격 기준
      `detection` 출력 시 통과. **근거:** logsource(apache/webserver)·detection(union select 등 keywords
      + condition)·tags(attack.t1190) 세 블록이 모두 보이면 통과 — 이 셋이 SIGMA 룰의 골격이다.
    hint: 'web-sqli.yml 의 detection/tags'
    category: analysis
    points: 12
    answer: |
      # 1) web-sqli SIGMA 룰 전체 출력 — logsource/detection/condition/tags 세 기둥 확인
      cat ~/el34/sigma/rules/0002-web-sqli.yml
      # 2) 해석 — logsource(어디에)/detection(무엇을)/tags(ATT&CK) 표준 YAML
      echo "→ logsource(어디에)/detection(무엇을)/tags(ATT&CK) — 표준 YAML"
    answer_detail: "SIGMA 룰 = logsource(apache/webserver) + detection(union select 등 keywords) + condition + tags(attack.t1190). 벤더 무관 표준."
    expected_output: |
      title: Web SQL Injection Pattern in Access Log
      id: el34-0002-web-sqli
      status: experimental
      description: Apache/ModSec 접근 로그에서 전형적인 SQLi 패턴 — union select / or 1=1 등
      logsource:
          product: apache
          category: webserver
      detection:
          selection:
              keywords:
                  - 'union select'
                  - 'OR 1=1'
      … (이하 생략)
    verify:
      type: output_contains
      expect: 'detection'
      field: stdout
      semantic:
        intent: "SIGMA YAML 구조 이해"
        success_criteria: ["logsource/detection/tags", "표준 구조"]
        acceptable_methods: ["**[OSS] sigma yml 읽기 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 목표 — SIGMA YAML 을 Wazuh 룰(XML)로 자동 변환
      컨버터 `sigma2wazuh.py`로 SIGMA 룰을 Wazuh 룰로 번역한다. "한 번 쓰고 어디서나"의 "어디서나"가
      실제로 일어나는 핵심 단계다.

      ## 🧩 개념 한 줄
      컨버터가 하는 일은 "껍데기 갈아끼우기"다 — SIGMA의 `keywords` 목록 → Wazuh `<regex type="pcre2">`
      (괄호와 `|`로 "이 중 아무거나"), SIGMA의 `level`/`tags` → Wazuh `level`/`<group>`(group에 `sigma`
      표식이 붙는다). web-sqli SIGMA는 id 200002 룰로 변환된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) sigma2wazuh.py로 rules/ 전체를 Wazuh XML로 변환(stdout) → id 200002 룰과 아래 4줄 추출
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -A4 'id="200002"'
      # 2) 해석 — keywords→<regex>, level/tags→level/group (stdout만, 라이브 sigma_rules.xml 미변경)
      echo "→ SIGMA keywords → Wazuh <regex>, level/tags → Wazuh level/group (stdout, 라이브 미변경)"
      ```
      - `sigma2wazuh.py rules/` 는 변환 결과를 **화면(stdout)으로만** 출력해 라이브 sigma_rules.xml 은 안 바뀐다(공유 인프라 안전). `grep -A4 'id="200002"'` 로 200002 룰과 아래 4줄만 추린다.

      ## ✅ 합격 기준
      `200002` 출력 시 통과. **근거:** id="200002" 와 그 아래 `<regex ...>` 가 보이면 통과 — SIGMA
      keywords 가 Wazuh 정규식 룰로 변환된 것이다.
    hint: 'sigma2wazuh.py rules/ → Wazuh XML(200002)'
    category: manipulation
    points: 14
    answer: |
      # 1) sigma2wazuh.py로 rules/ 전체를 Wazuh XML로 변환(stdout) → id 200002 룰과 아래 4줄 추출
      cd ~/el34/sigma && python3 sigma2wazuh.py rules/ 2>/dev/null | grep -A4 'id="200002"'
      # 2) 해석 — keywords→<regex>, level/tags→level/group (stdout만, 라이브 sigma_rules.xml 미변경)
      echo "→ SIGMA keywords → Wazuh <regex>, level/tags → Wazuh level/group (stdout, 라이브 미변경)"
    answer_detail: "sigma2wazuh.py가 SIGMA YAML → Wazuh 룰. keywords가 pcre2 regex로, tags가 group으로. stdout 출력이라 라이브 sigma_rules.xml은 안 건드린다(운영은 > 리다이렉트 + restart)."
    expected_output: |
      <rule id="200002" level="10">
          <regex type="pcre2">(union select|OR 1=1|' OR '|information_schema|sleep\()</regex>
          <description>[Sigma] Apache/ModSec 접근 로그에서 전형적인 SQLi 패턴 — union select / or 1=1 등</description>
          <group>sigma,apache,webserver,</group>
        </rule>
      → SIGMA keywords → Wazuh <regex>, level/tags → Wazuh level/group (stdout, 라이브 미변경)
    verify:
      type: output_contains
      expect: '200002'
      field: stdout
      semantic:
        intent: "SIGMA → Wazuh 룰 변환"
        success_criteria: ["sigma2wazuh.py 실행", "id 200002 regex 변환"]
        acceptable_methods: ["**[OSS] sigma2wazuh.py rules/ (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 목표 — 변환 룰(200002)이 실제로 발화하는지 라이브 무중단 검증
      "변환됐다 ≠ 잡힌다." union select가 든 웹 접근 로그 한 줄을 넣어, 변환 룰 200002가 정말 매치돼
      경보가 되는지 확인한다.

      ## 🧩 개념 한 줄
      `wazuh-logtest`는 로그 한 줄을 넣으면 현재 룰셋을 새로 읽어 **별도 테스트 인스턴스**에서 어떤
      룰이 매치되는지 보여 주는 "시식(맛보기)" 도구다. 라이브 manager의 판결 엔진을 건드리지 않으므로
      여러 학생이 함께 쓰는 el34-siem에서도 안전하다. el34엔 sigma_rules.xml(200001-3)이 이미 적용돼
      있어 그대로 검증된다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) union select가 든 아파치 접근 로그 한 줄을 임시 파일로 작성(logtest 입력)
      cat > /tmp/socw7.log <<EOF
      1.2.3.4 - - [x] "GET /?id=1 union select 1,2 HTTP/1.1" 403
      EOF
      # 2) logtest로 변환 룰 200002 발화(id/level/sigma group/Alert) 확인 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw7.log 2>&1 | grep -aE "id:|level:|sigma|Alert to be" | head -5; rm -f /tmp/socw7.log
      ```

      ## ✅ 합격 기준
      `200002` 출력 시 통과. **근거:** id 200002, level 10, groups 의 sigma, Alert to be generated. 가
      보이면 통과 — SIGMA→변환→실제 Wazuh 경보의 사슬이 끊김 없이 이어졌다는 증거다.
    hint: 'union select 라인 → wazuh-logtest → 200002'
    category: analysis
    points: 14
    answer: |
      # 1) union select가 든 아파치 접근 로그 한 줄을 임시 파일로 작성(logtest 입력)
      docker exec el34-siem sh -c 'cat > /tmp/socw7.log <<EOF
      1.2.3.4 - - [x] "GET /?id=1 union select 1,2 HTTP/1.1" 403
      EOF'
      # 2) logtest로 변환 룰 200002 발화(id/level/sigma group/Alert) 확인 후 임시파일 삭제
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw7.log 2>&1 | grep -aE "id:|level:|sigma|Alert to be" | head -5; rm -f /tmp/socw7.log'
    answer_detail: "변환된 SIGMA 룰(200002)이 union select 로그에 실제 발화 — SIGMA 한 줄이 Wazuh 경보가 된다. 라이브 sigma_rules.xml은 이미 적용돼 있어 logtest가 그대로 검증."
    expected_output: |
      id: '200002'
      	level: '10'
      	groups: '['sigma', 'el34', 'sigma', 'apache', 'webserver']'
      **Alert to be generated.
    verify:
      type: output_contains
      expect: '200002'
      field: stdout
      semantic:
        intent: "변환 SIGMA 룰 logtest 검증"
        success_criteria: ["200002 발화", "sigma group"]
        acceptable_methods: ["**[OSS] wazuh-logtest (권장)**"]
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 목표 — 같은 SIGMA 가 Suricata 백엔드로도 이식됨을 이해(개념)
      지금까지는 SIGMA→Wazuh 한 방향만 봤다. SIGMA의 진짜 가치는 같은 한 벌이 다른 제품으로도
      변환된다는 점이다. el34의 IDS인 Suricata도 SIGMA의 변환 대상(백엔드)이다.

      ## 🧩 개념 한 줄
      Wazuh와 Suricata는 보는 위치가 다르다 — Wazuh는 서버에 남은 로그 속 SQLi(호스트/사후), Suricata는
      네트워크를 흐르는 패킷 속 SQLi(네트워크/실시간)를 본다. 같은 web-sqli SIGMA 한 벌을 두 백엔드로
      변환하면 하나의 탐지 의도가 네트워크와 로그 양쪽에서 동시에 작동한다. Suricata 변환은 공식
      `sigma-cli`의 `sigma convert -t suricata`가 담당한다(본 단계는 개념 이해가 목표 — 라이브 실습은
      Wazuh 백엔드에 집중).

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 한 SIGMA → Wazuh 백엔드(호스트/로그 정규식 룰)
      echo "web-sqli.yml ─┬─ sigma2wazuh.py    → Wazuh <regex> 룰 (호스트/로그 탐지)"
      # 2) 같은 SIGMA → Suricata 백엔드(네트워크 content 룰)
      echo "              └─ sigma -t suricata → Suricata content 룰 (네트워크 탐지)"
      # 3) 결론 — 네트워크(Suricata)+로그(Wazuh) 양쪽에서 같은 탐지, 벤더 종속 없이 자산 관리
      echo "→ 네트워크(Suricata) + 로그(Wazuh) 양쪽에서 같은 탐지. 벤더 종속 없이 탐지 자산 관리"
      ```

      ## ✅ 합격 기준
      `Suricata` 출력 시 통과. **근거:** 한 SIGMA 가 Wazuh(로그)·Suricata(네트워크) 두 백엔드로 이식돼
      같은 탐지를 양쪽에서 한다는 구조를 정리하면 통과.
    hint: 'SIGMA → Wazuh + Suricata 두 백엔드'
    category: analysis
    points: 10
    answer: |
      # 1) 한 SIGMA → Wazuh 백엔드(호스트/로그 정규식 룰)
      echo "web-sqli.yml ─┬─ sigma2wazuh.py    → Wazuh <regex> 룰 (호스트/로그 탐지)"
      # 2) 같은 SIGMA → Suricata 백엔드(네트워크 content 룰)
      echo "              └─ sigma -t suricata → Suricata content 룰 (네트워크 탐지)"
