lab_id: standalone-soc-week08
title: "중간고사 — 흩어진 로그를 교차 분석해 하나의 공격 서사로 종합"
version: standalone-soc
course: soc
week: 8
description: |
  SOC W01–W07 의 분석 역량을 한 사건 위에서 통합하는 중간고사 종합 실기. 한 공격자의 다단계 공격
  (포트 스캔 → SQLi → SSH 무차별 대입)을 재현한 뒤, SOC 분석의 네 소스 — 네트워크(Suricata
  eve.json) · 웹(ModSec audit + access.log) · 인증(auth.log) · 통합(Wazuh alerts.json) — 을 교차
  분석한다. el34 가 출처 IP 를 보존(fw 가 SNAT 안 함)하는 성질을 이용해 흩어진 흔적을 같은 출발지
  IP(10.20.30.202) + 시각으로 묶어 "한 공격자의 단계적 체인"으로 상관하고, 각 단계를 MITRE
  ATT&CK(T1046 정찰 → T1190 웹 침투 → T1110 자격증명)으로 매핑해 하나의 공격 서사로 종합한다.
  마지막으로 auth.log 의 Accepted 유무로 침투 성공 여부를 판정하고 우선순위(P1~P4)·에스컬레이션을
  결정한 뒤 종합 보고서로 정리한다. 본 실기는 관측·분석 종합이며 인프라를 변경하지 않는다(룰 작성·계정
  생성 없음). 모든 명령은 el34 호스트(`ssh ccc@192.168.0.151`, 비밀번호 1)에서 실행한다.
difficulty: hard
duration_minutes: 220
prerequisites:
  - "W01–W07 통과 (트리아지·인증로그·웹로그·Wazuh룰·경보관리·ATT&CK·SIGMA)"
  - "el34 호스트 SSH 접속 + docker exec 사용 가능"
  - "lecture §2(종합 분석 5단계) · §3(출처 IP 보존) · §6(상관과 서사) 숙지"
objectives:
  - "네 소스(인증·웹·네트워크·SIEM)를 교차 분석해 각 소스가 보여주는 공격 단면을 식별한다"
  - "출처 IP 보존을 이용해 흩어진 흔적을 같은 출발지 IP + 시각으로 한 공격자로 상관한다"
  - "각 단계를 MITRE ATT&CK(T1046→T1190→T1110)으로 매핑해 시간순 공격 서사를 구성한다"
  - "Accepted 유무로 침투 성공 여부를 판정하고 우선순위(P1~P4)·에스컬레이션을 결정한다"
  - "네 소스 분석 → 상관 → 서사 → 판정을 증거와 함께 한 종합 보고서로 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 네 분석 소스가 모두 준비됐나
      종합 분석의 전제는 읽을 소스가 모두 살아 있어야 한다는 것이다. SOC 분석가는 사건을 파기 전에
      항상 데이터 소스의 가용성부터 확인한다(lecture §2.1 수집). 여기서는 교차 분석의 네 기둥 —
      통합(SIEM `analysisd`) · 인증(`auth.log`) · 네트워크(Suricata `eve.json`) — 이 존재·동작하는지
      확인한다(웹 ModSec 은 미션 4 에서 본다).
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ls /var/log/auth.log; docker exec el34-ips sh -c 'ls /var/log/suricata/eve.json'
      ```
      - `wazuh-control status | grep analysisd` — Wazuh 의 경보 분석 데몬(`analysisd`)이 running 인지.
        이 데몬이 죽으면 alerts.json 이 생성되지 않는다.
      - `ls /var/log/auth.log` — 호스트의 SSH 인증 로그가 존재하는지(인증 소스).
      - `ls .../eve.json` — Suricata 의 네트워크 이벤트 로그가 존재하는지(네트워크 소스).
      ## ✅ 합격 기준
      `analysisd` 가 running 이고 `auth.log`·`eve.json` 이 존재한다(네 소스 준비 완료). 어느 하나라도
      없으면 그 단면은 분석 불가이므로 먼저 원인을 파악한다.
    hint: 'analysisd + auth.log + eve'
    category: survey
    points: 8
    answer: |
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      ls /var/log/auth.log
      docker exec el34-ips sh -c 'ls /var/log/suricata/eve.json'
      echo "4소스 준비: auth.log(인증)/eve(네트워크)/modsec(웹)/alerts.json(SIEM)"
    answer_detail: "교차 분석의 네 소스 점검 — 인증(auth.log)·웹(ModSec/access)·네트워크(eve)·통합(alerts.json). 채점은 SIEM 분석 데몬(analysisd)이 running 이고 인증·네트워크 로그가 존재함을 확인한다. 이 가용성 점검이 통과해야 이후 단면 분석이 의미가 있다."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "네 분석 소스 점검"
        success_criteria: ["SIEM + auth + eve"]
        acceptable_methods: ["**[OSS] 소스 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 다단계 공격 재현 — 스캔 → 웹 → 인증
      종합 분석의 대상이 될 다단계 공격을 한 공격자(`10.20.30.202`) 관점에서 직접 재현한다. 이 한 번의
      재현이 이후 모든 분석 미션(미션 3~9)의 원천 데이터다 — 세 단계가 네트워크·웹·인증 소스에 각각
      흔적을 남긴다(lecture §1.1 사슬).
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c 'nmap -sS -p 20-120 10.20.30.1 -T4 >/dev/null 2>&1; echo scanned'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw8%27%20UNION%20SELECT%201--%20-\""
      for u in root admin oracle test; do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null; done
      echo "multi-stage done"
      ```
      - **① 정찰** — `nmap -sS`(SYN 스캔, 포트 20–120, `-T4` 빠른 타이밍)로 어떤 포트가 열렸나 탐색
        → Suricata eve 에 스캔 흔적(T1046).
      - **② 웹 침투** — `curl -A sqlmap/1.7`(스캐너 UA)로 `dvwa.el34.lab` 에 `UNION SELECT` SQLi
        주입 → ModSec 942/949110 차단(T1190).
      - **③ 인증** — 네 계정(root/admin/oracle/test)에 SSH 무차별 대입(키 없이 BatchMode 실패) →
        auth.log 에 `Invalid user` 다발(T1110).
      - 재현 후 로그가 SIEM 으로 수렴할 시간을 잠시 둔다(answer 의 `sleep`).
      ## ✅ 합격 기준
      세 단계가 순서대로 실행되고 `multi-stage done` 이 출력된다(이후 네 소스에 흔적이 남는다).
    hint: 'nmap + 웹 + ssh 브루트'
    category: recon
    points: 10
    answer: |
      docker exec el34-attacker sh -c 'nmap -sS -p 20-120 10.20.30.1 -T4 >/dev/null 2>&1; echo scanned'
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw8%27%20UNION%20SELECT%201--%20-\""
      for u in root admin oracle test; do ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=3 $u@127.0.0.1 exit 2>/dev/null; done
      sleep 6
      echo "multi-stage done"
    answer_detail: "한 공격자의 다단계 공격 — 정찰(nmap 스캔)→웹 침투(sqlmap UA + UNION SELECT SQLi)→자격증명(SSH 무차별 대입) — 을 재현해 네 소스(eve/ModSec/auth.log/alerts.json)에 흩어진 흔적을 만든다. 채점은 세 단계가 모두 실행되고 done 이 출력됨을 확인한다. 이 흔적들이 이후 교차 분석·상관·서사의 원천이다."
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "다단계 공격 재현"
        success_criteria: ["스캔/웹/인증"]
        acceptable_methods: ["**[OSS] 3단계 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 네트워크 분석 — Suricata eve (사슬의 첫 단면)
      한 공격자의 네트워크 관점을 읽는다. Suricata 는 패킷을 시그니처로 검사하는 IDS 이고(W03 복습),
      그 결과가 `eve.json` 에 한 줄당 하나의 JSON 이벤트로 남는다. 정찰(스캔)과 sqlmap UA 의 흔적이
      여기서 보인다(lecture §4.1).
      ## 💻 실행 명령
      ```bash
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|.alert.signature" | sort | uniq -c | tail -5'
      ```
      - `tail -3000 eve.json` — 최근 이벤트를 넉넉히 본다(alert 는 flow 보다 드물어 깊게 봐야 잡힘).
      - `jq select(.event_type=="alert" and .src_ip=="10.20.30.202")` — `event_type` 으로 룰 매치
        이벤트만, `src_ip` 로 **이 공격자 하나만** 골라낸다.
      - `.alert.signature | sort | uniq -c` — 어떤 시그니처가 몇 번 잡혔나 분포로 집계한다.
      ## ✅ 합격 기준
      출발지 `10.20.30.202` 의 alert 가 잡히고 스캔/SQLi 시그니처가 보인다(네트워크 관점의 공격 증거).
    hint: 'eve alert signature for .202'
    category: analysis
    points: 10
    answer: |
      echo "=== 네트워크(Suricata eve) — 출발지 10.20.30.202 alert ==="
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|.src_ip" | sort | uniq -c'
      echo "=== 시그니처 종류 ==="
      docker exec el34-ips sh -c 'tail -3000 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\" and .src_ip==\"10.20.30.202\")|.alert.signature" | sort | uniq -c | tail -5'
    answer_detail: "네트워크 단면 — 출발지 10.20.30.202 의 alert(스캔/SQLi 시그니처)가 eve.json 에 다수 남는다. event_type=='alert' + src_ip 로 한 공격자만 골라낸 것이 핵심이다. 채점은 출력에 출발지 10.20.30.202 가 보임을 확인한다. 이 시그니처들이 이후 ATT&CK 매핑에서 T1046(정찰)/T1190(침투)의 네트워크 측 증거가 된다."
    verify:
      type: output_contains
      expect: '10.20.30.202'
      field: stdout
      semantic:
        intent: "네트워크 분석"
        success_criteria: ["eve 시그니처", "출발지"]
        acceptable_methods: ["**[OSS] eve signature (권장)**"]
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 웹 분석 — ModSec + access (사슬의 둘째 단면)
      한 공격자의 웹 관점을 읽는다. ModSecurity(+OWASP CRS)는 HTTP 페이로드를 검사하는 WAF 이고(W03
      복습), SQLi 가 어떻게 차단됐는지 audit 로그의 룰 ID 분포로 증명한다. 핵심은 차단이 단일 룰이
      아니라 anomaly score 누적의 결과라는 것이다(lecture §4.2).
      ## 💻 실행 명령
      ```bash
      docker exec el34-web sh -c 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c'
      ```
      - `tail -80 modsec_audit.log` — 최근 audit 항목을 본다(JSON 라인 형식).
      - `grep -oE "9[0-9]{5}"` — 6자리 CRS 룰 ID(9 로 시작)만 뽑는다.
      - `sort | uniq -c` — 어떤 룰이 몇 번 매치됐나 분포. **942**(SQLi 탐지)가 점수를 올리고
        **949110**(Inbound Anomaly Score Exceeded)이 누적 임계 초과로 403 차단하는 2단계가 보인다.
      ## ✅ 합격 기준
      `942`(SQLi)와 `949110`(anomaly 누적 차단)이 함께 보인다(웹 침투가 막힌 증거와 그 메커니즘).
    hint: 'modsec rule 분포'
    category: analysis
    points: 10
    answer: |
      echo "=== 웹(ModSec) ==="
      docker exec el34-web sh -c 'sudo tail -80 /var/log/apache2/modsec_audit.log | grep -oE "9[0-9]{5}" | sort | uniq -c'
      echo "=== 웹(access 응답코드) ==="
      docker exec el34-web sh -c 'sudo tail -30 /var/log/apache2/dvwa_access.log | grep -oE "\" [0-9]{3} " | sort | uniq -c'
    answer_detail: "웹 단면 — 942(SQLi)가 anomaly score 를 올리고 949110(누적 임계 초과)이 403 으로 차단한다. 즉 '942 가 직접 막은' 것이 아니라 누적의 결과라는 2단계 메커니즘이 핵심이다. access 로그(응답코드)로 요청 전체상을 보강한다. 채점은 출력에 942 가 보임을 확인한다. 이 룰들이 ATT&CK T1190(웹 침투)의 증거다."
    verify:
      type: output_contains
      expect: '942'
      field: stdout
      semantic:
        intent: "웹 분석"
        success_criteria: ["rule 942/949110", "응답코드"]
        acceptable_methods: ["**[OSS] modsec + access (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 인증 분석 — auth.log (사슬의 셋째 단면)
      한 공격자의 인증 관점을 읽는다. `auth.log` 는 호스트의 SSH 로그인 시도가 한 줄씩 남는 인증
      로그다(W02 복습). 무차별 대입의 패턴과 침투 성공 여부의 핵심 증거가 모두 여기에 있다(lecture
      §4.3). 명령은 호스트에서 직접 실행한다(컨테이너 아님).
      ## 💻 실행 명령
      ```bash
      grep -aoE "Invalid user [a-z]+" /var/log/auth.log | sort | uniq -c | sort -rn | head
      ```
      - `grep -a` — 바이너리로 오인된 줄도 텍스트로 본다, `-oE "Invalid user [a-z]+"` — 시도된
        계정 이름만 뽑는다.
      - `sort | uniq -c | sort -rn` — 어떤 계정이 몇 번 찍혔나 빈도순. **여러 계정에 걸쳐 다수**면
        무차별 대입(T1110), 단발이면 정상 오타다.
      - 이어서 `Accepted` 유무로 침투 성공 여부를 가른다(answer 참고) — 이것이 미션 9 판정의 근거다.
      ## ✅ 합격 기준
      `Invalid user` 가 여러 계정에 다수로 보인다(무차별 대입의 증거). `Accepted` 가 없으면 인증 침투는
      시도에 그친 것이다.
    hint: 'auth.log Invalid user 분포'
    category: analysis
    points: 10
    answer: |
      echo "=== 인증(auth.log) ==="
      grep -aoE "Invalid user [a-z]+" /var/log/auth.log | sort | uniq -c | sort -rn | head
      echo "=== 성공 여부 ==="; grep -ac Accepted /var/log/auth.log
      echo "→ Invalid user 다발 = 무차별 대입(T1110), Accepted로 침투 여부 판정"
    answer_detail: "인증 단면 — Invalid user 가 여러 계정(root/admin/oracle/test)에 다수면 무차별 대입(T1110)이고, Accepted 줄의 유무가 침투 성공 여부를 가른다. 두 가지(무차별 대입 패턴 + 성공 여부)를 인증 로그 한 곳에서 동시에 읽는 것이 핵심이다. 채점은 출력에 'Invalid user' 가 보임을 확인한다. Accepted 판정은 미션 9 로 이어진다."
    verify:
      type: output_contains
      expect: 'Invalid user'
      field: stdout
      semantic:
        intent: "인증 분석"
        success_criteria: ["Invalid user 다발", "성공 여부"]
        acceptable_methods: ["**[OSS] auth.log (권장)**"]
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 SIEM 종합 — alerts.json 수렴
      개별 소스가 아니라 흩어진 흔적이 **SIEM 한 곳으로 수렴**하는지 확인한다 — 통합 관제의 전제다.
      Wazuh manager 는 흩어진 소스(agent)를 한 곳으로 모으는 SIEM 의 두뇌이고(W04 복습), el34 의 활성
      agent 는 ips(003)·web(004) 둘이다(lecture §4.4).
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem sh -c 'tail -500 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.data.src_ip==\"10.20.30.202\")|.rule.groups" | sort | uniq -c | head'
      ```
      - `tail -500 alerts.json` — Wazuh 가 만든 최근 통합 경보를 본다.
      - `jq select(.data.src_ip=="10.20.30.202")` — 이 공격자의 경보만 골라낸다.
