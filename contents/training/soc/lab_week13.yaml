lab_id: standalone-soc-week13
title: "인텔 주도 트리아지 — '알려진 위협' 한마디가 대응을 가속한다"
version: standalone-soc
course: soc
week: 13
description: |
  위협 인텔(known-bad 여부)을 트리아지(경보 분류·우선순위 판단)의 1차 결정에 직접 써서 대응을 가속한다.
  같은 경보라도 "이 출발지·이 도구는 이미 알려진 악성(known-bad)"이라는 인텔 한마디가 붙으면, 분석가는
  "누구지? 위험한가?"를 조사하기도 전에 우선순위를 정할 수 있다. 본 실습은 (1) 인텔 스택(Wazuh 평결 엔진
  + OpenCTI/MISP 인텔 소스)을 점검하고, (2) 알려진 악성 도구 sqlmap 으로 공격을 재현해 known-bad IOC 가
  텔레메트리에 나타나게 한 뒤, (3) 인텔 없는 느린 트리아지(경보마다 조사)와 인텔 있는 빠른 트리아지
  (즉시 격상)를 직접 대비하고, (4) 인텔 매칭 룰(id 101310, level 13)로 known-bad 를 즉시 격상하며,
  (5) 그 가속이 SOC 처리량(throughput)을 어떻게 끌어올리는지(아는 건 빨리, 모르는 건 깊게)를 정리한다.
  매칭 룰은 wazuh-logtest 로만 검증하고 끝나면 삭제한다(el34-siem 은 공유 자원이라 restart 금지 — 다른
  학생 ingest 보존). 트리거 공격(재현)은 내 공격 VM `ssh att@192.168.0.202`(비번 1)에서, 분석·대응은
  el34 호스트(`ssh ccc@{{TARGET_IP}}`, 비번 1)에서 `docker exec`로 한다.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W05(트리아지)·W11(IOC) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(enrichment) §3(가속) 숙지"
objectives:
  - "인텔 enrichment(경보에 known-bad 맥락 한 줄)로 트리아지의 판단 재료를 바꾼다"
  - "인텔 없는 느린 경로(경보마다 조사)와 인텔 있는 빠른 경로(즉시 격상)를 대비해 가속의 원천을 설명한다"
  - "인텔 매칭 룰(id 101310, level 13)로 known-bad 를 즉시 격상하고 logtest 로 무중단 검증한다"
  - "인텔 주도 트리아지의 처리량 향상과 시간 재배분(아는 건 빨리, 모르는 건 깊게)을 이해한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 인텔 스택(적용 지점 Wazuh + 인텔 소스 OpenCTI/MISP)
      ## 개념
      인텔 주도 트리아지가 성립하려면 두 부품이 모두 살아 있어야 한다 — 격상이 실제로 일어날
      **적용 지점**(Wazuh 의 평결 엔진 `analysisd`)과, known-bad 를 공급하는 **인텔 소스**
      (OpenCTI/MISP). 소스와 적용 지점을 따로 보는 것이 인텔 운영 점검의 핵심이다(lecture §6.3).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실행 위치:** analysisd 점검은 `el34-siem` 안(`docker exec -it el34-siem bash`), 컨테이너 집계는 el34 호스트.

      ```bash
      # ── el34-siem 에서: 적용 지점(평결 엔진) 점검 ──
      # 1) Wazuh 평결 엔진 analysisd 가동(격상이 실제로 일어날 곳)
      /var/ossec/bin/wazuh-control status | grep analysisd
      # ── el34 호스트에서: 인텔 소스 집계 ──
      # 2) known-bad 공급 OpenCTI/MISP 컨테이너 수 집계(-i 대소문자 무시, -c 개수)
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|misp'
      ```
      ## ✅ 합격 기준
      `analysisd` 출력 시 통과. **근거:** Wazuh analysisd(평결·격상 엔진)가 running 이고 OpenCTI/MISP
      인텔 소스가 가동 중이면 인텔 스택이 선 것 — analysisd 가 멈추면 격상 자체가 안 나온다.
    hint: 'analysisd + opencti/misp'
    category: survey
    points: 10
    answer: |
      # 1) 적용 지점 — Wazuh 평결 엔진 analysisd 가동(격상이 실제로 일어날 곳)
      ssh ccc@10.20.32.100 sudo /var/ossec/bin/wazuh-control status | grep analysisd
      # 2) 인텔 소스 — known-bad 공급 OpenCTI/MISP 컨테이너 수 집계(-i 대소문자 무시, -c 개수)
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|misp'
    answer_detail: "인텔 주도 트리아지의 토대 = 적용 지점 Wazuh(analysisd 가 매칭·격상)와 인텔 소스 OpenCTI/MISP(known-bad 공급). analysisd 가 멈추면 격상 자체가 안 나므로 최우선 점검 대상이고, 소스(OpenCTI/MISP)와 적용 지점(Wazuh)을 따로 확인하는 습관이 핵심."
    expected_output: |
      wazuh-analysisd is running...
      4
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "인텔 스택 점검"
        success_criteria: ["analysisd + opencti/misp"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 공격 재현 — 알려진 악성 도구(sqlmap = known-bad IOC)
      ## 개념
      인텔 가속을 검증하려면 먼저 인텔이 "악성"으로 아는 도구의 흔적이 텔레메트리에 있어야 한다.
      sqlmap 은 자동 SQL 인젝션 도구로, 기본 User-Agent 에 `sqlmap` 이름이 박혀 있어 **그 도구
      시그니처 자체가 known-bad IOC** 다(lecture §2·§5). 여기서는 그 sqlmap UA + SQLi 공격을 흘려,
      이후 미션들이 분석할 원천 데이터를 만든다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **공격 VM:** `ssh att@192.168.0.202`(비번 1) 로 접속해 실행한다.

      ```bash
      # 1) 알려진 악성 도구 sqlmap UA로 SQLi 공격 — UA 자체가 known-bad IOC
      echo -en 'GET /?id=socw13%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null
      # 2) 파이프라인 반영 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "attack done"
      ```
      - `-A sqlmap/1.7`(UA=known-bad IOC), `-H 'Host: dvwa.el34.lab'`(L7 라우팅), `%27%20UNION%20SELECT%201--%20-`(URL 인코딩 SQLi). 출처 IP 는 SNAT 없이 보존.

      ## ✅ 합격 기준
      `done` 출력 시 통과. **근거:** 알려진 악성 도구(sqlmap) 공격이 재현되고 attack done 이 나오면
      통과 — known-bad IOC 가 텔레메트리에 나타나 이후 미션의 원천 데이터가 된다.
    hint: 'sqlmap 공격'
    category: recon
    points: 8
    answer: |
      # 1) 알려진 악성 도구 sqlmap UA로 SQLi 공격 — UA 자체가 known-bad IOC
      ssh att@192.168.0.202 "echo -en 'GET /?id=socw13%27%20UNION%20SELECT%201--%20- HTTP/1.0\r\nHost: dvwa.el34.lab\r\nUser-Agent: sqlmap/1.7\r\nConnection: close\r\n\r\n' | nc -w3 192.168.0.161 80 >/dev/null"
      # 2) 파이프라인 반영 대기 후 완료 마커
      # (고정 sleep 제거: 이어지는 확인 명령이 재시도/즉시 반영)
      echo "attack done"
    answer_detail: "sqlmap = UA 에 이름이 박힌, 이미 인텔에 등록된 악성 도구(known-bad IOC). 같은 SQLi 경보라도 출발지·도구가 known-bad 면 트리아지 결정이 달라진다(즉시 P1). 조건 폴링(로그 흔적 대기) 은 공격 흔적이 파이프라인에 반영되기까지의 지연을 기다리는 것."
    expected_output: |
      attack done
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "알려진 악성 도구 공격 재현"
        success_criteria: ["sqlmap 공격"]
        acceptable_methods: ["**[OSS] sqlmap 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 인텔 없는 트리아지 — 느린 경로
      ## 개념
      인텔이 주는 가속을 체감하려면, 먼저 인텔 없는 트리아지가 경보마다 얼마나 많은 조사를
      반복하는지를 직접 정리해야 한다. 인텔이 없으면 분석가는 경보 하나하나를 **처음부터** 조사한다
      — 출발지 IP 가 누구인지(whois·과거 이력), 도구/페이로드가 얼마나 위험한지, 그래서 우선순위가
      무엇인지. 이 5단계가 경보마다 반복되니 처리량이 제한되고 alert fatigue(경보 피로)를 부른다
      (lecture §1).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 인텔 없는 느린 경로 5단계 — 경보마다 처음부터 조사
      echo "경보 수신 → 출발지 IP 조사(누구?) → 도구/페이로드 분석(위험?) → 위험도 판정 → 우선순위"
      # 2) 한계 — 경보마다 조사 필요, 처리량 제한·alert fatigue 위험
      # → 경보마다 조사 필요. 처리량 제한, alert fatigue 위험
      ```
      ## ✅ 합격 기준
      `조사` 출력 시 통과. **근거:** 인텔 없는 트리아지의 5단계(수신→출발지 조사→도구 분석→위험도
      판정→우선순위)와 한계(조사 필요·처리량 제한)가 정리되면 통과 — 이 '느림'이 다음 가속의 기준이다.
    hint: '인텔 없으면 조사 필요(느림)'
    category: analysis
    points: 10
    answer: |
      # 1) 인텔 없는 느린 경로 5단계 — 경보마다 처음부터 조사
      echo "경보 수신 → 출발지 IP 조사(누구?) → 도구/페이로드 분석(위험?) → 위험도 판정 → 우선순위"
      # 2) 한계 — 경보마다 조사 필요, 처리량 제한·alert fatigue 위험
      # → 경보마다 조사 필요. 처리량 제한, alert fatigue 위험
    answer_detail: "인텔 없으면 경보마다 처음부터 조사 — 출발지·도구·위험도를 매번 판정하는 5단계 경로다. 느리고 처리량이 제한되며, 큐가 쌓이면 alert fatigue 로 진짜 위협을 놓친다. 이 '느림'을 구체적 단계로 잡아야 다음 미션의 인텔 가속이 왜 큰지 설명할 수 있다."
    expected_output: |
      경보 수신 → 출발지 IP 조사(누구?) → 도구/페이로드 분석(위험?) → 위험도 판정 → 우선순위
      → 경보마다 조사 필요. 처리량 제한, alert fatigue 위험
    verify:
      type: output_contains
      expect: '조사'
      field: stdout
      semantic:
        intent: "인텔 없는 트리아지 한계 이해"
        success_criteria: ["조사 경로", "처리량 제한"]
        acceptable_methods: ["**[설명] 느린 경로 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 인텔 매칭 룰 — known-bad 즉시 격상 (id 101310, level 13)
      ## 개념
      인텔 주도 트리아지의 "빠른 경로"를 코드로 구현한 것이 인텔 매칭 룰이다(lecture §5). known-bad
      IOC(여기서는 `tool=sqlmap`)가 보이면 경보를 즉시 level 13(고위험)으로 격상해, 사람이 5단계
      조사를 거쳐 내릴 "P1" 판단을 룰이 대신한다. 검증은 라이브 manager 를 건드리지 않는
      `wazuh-logtest`(모의재판)로만 하고, 끝나면 베이스를 원상복구한다 — el34-siem 은 모든 학생이
      함께 쓰는 공유 자원이라 restart 가 금지되기 때문이다(다른 학생 ingest 보존).
      ## 💻 실행 명령 (한 줄씩 따라 실행)

      **실습 컨테이너:** `el34-siem` — `docker exec -it el34-siem bash` 로 접속해 실행한다.

      ```bash
      # 1) 베이스 룰셋 백업(원복용)
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw13_lr.bak
      # 2) 인텔 매칭 룰(id 101310, level 13, json + tool=sqlmap=known-bad) append
      sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w13,\">
        <rule id=\"101310\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"tool\">sqlmap</field>
          <description>SOC W13 known-bad tool intel escalate</description>
        </rule>
      </group>
      EOF"
      # 3) known-bad JSON을 임시 파일로 작성(logtest 입력)
      cat > /tmp/socw13.json <<EOF
      {"tool":"sqlmap","src_ip":"192.168.0.202"}
      EOF
      # 4) logtest로 룰 101310 level 13 즉시 격상 발화 확인 후 임시파일 삭제
      sudo /var/ossec/bin/wazuh-logtest < /tmp/socw13.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw13.json
      # 5) 백업 복원 — 매칭 룰 잔재 0(공유 SIEM 베이스 보존)
      sudo cp /tmp/socw13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw13_lr.bak; echo "복원 잔재=$(grep -c 101310 /var/ossec/etc/rules/local_rules.xml)"
      ```
      - 1013xx=W13 id 네임스페이스(100000 미만은 Wazuh 예약). `<field name="tool">sqlmap`(운영은 `<list lookup>`으로 CDB 수천 IOC 매칭, 격상 논리 동일). logtest 는 별도 인스턴스라 라이브 무중단.

      ## ✅ 합격 기준
      `101310` 출력 시 통과. **근거:** logtest Phase 3 에 id 101310/level 13/Alert to be 가 보이면
      known-bad 즉시 격상 성공 — cp 복원으로 잔재 0(grep -c 101310)이 되어야 한다.
    hint: '인텔 매칭 룰(101310) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      # 1) 베이스 룰셋 백업(원복용)
      ssh ccc@10.20.32.100 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw13_lr.bak'
      # 2) 인텔 매칭 룰(id 101310, level 13, json + tool=sqlmap=known-bad) append
      ssh ccc@10.20.32.100 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w13,\">
        <rule id=\"101310\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"tool\">sqlmap</field>
          <description>SOC W13 known-bad tool intel escalate</description>
        </rule>
      </group>
      EOF"'
      # 3) known-bad JSON을 임시 파일로 작성(logtest 입력)
      ssh ccc@10.20.32.100 'cat > /tmp/socw13.json <<EOF
      {"tool":"sqlmap","src_ip":"192.168.0.202"}
      EOF'
      # 4) logtest로 룰 101310 level 13 즉시 격상 발화 확인 후 임시파일 삭제
      ssh ccc@10.20.32.100 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw13.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw13.json'
      # 5) 백업 복원 — 매칭 룰 잔재 0(공유 SIEM 베이스 보존)
      ssh ccc@10.20.32.100 'sudo cp /tmp/socw13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw13_lr.bak; echo "복원 잔재=$(grep -c 101310 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "인텔 매칭 룰(tool=sqlmap=known-bad)이 경보를 level 13 으로 즉시 격상 — 분석가의 5단계 조사를 기다리지 않고 우선순위(P1)를 코드가 먼저 결정한다. 검증은 logtest Phase 3 의 id 101310/level 13 발화로 확인하고, cp 복원으로 잔재 0(grep -c 101310)이 되어야 한다. 운영에서는 `<field>` 를 `<list lookup>` 으로 바꿔 CDB list 의 수천 IOC 를 한 번에 매칭한다(W12, 격상 논리 동일)."
    expected_output: |
      id: '101310'
      	level: '13'
      **Alert to be generated.
      복원 잔재=0
    verify:
      type: output_contains
      expect: '101310'
      field: stdout
