lab_id: standalone-soc-week13
title: "인텔 주도 트리아지 — '알려진 위협' 한마디가 대응을 가속한다"
version: standalone-soc
course: soc
week: 13
description: |
  위협 인텔로 트리아지를 가속한다. 같은 경보라도 "known-bad" 인텔이 붙으면 조사 전에 우선순위가 정해진다.
  알려진 악성 도구 공격을 재현하고, 인텔 매칭 룰로 즉시 격상하고, OpenCTI/MISP 인텔 운영을 확인한다.
  매칭 룰은 logtest로만 검증 + 삭제(공유 SIEM 보존). 명령은 el34 호스트에서.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W05(트리아지)·W11(IOC) 통과"
  - "el34 호스트 SSH + docker exec"
  - "lecture §2(enrichment) §3(가속) 숙지"
objectives:
  - "인텔 enrichment로 경보 맥락 부여"
  - "인텔 매칭 룰로 즉시 격상"
  - "인텔 주도 트리아지의 처리량 향상 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — 인텔 스택
      ## 💻 실행 명령
      ```bash
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|misp'
      ```
      ## ✅ 합격 기준
      Wazuh + OpenCTI/MISP 인텔 스택 가동.
    hint: 'analysisd + opencti/misp'
    category: survey
    points: 10
    answer: |
      docker exec el34-siem /var/ossec/bin/wazuh-control status | grep analysisd
      docker ps --format '{{.Names}}' | grep -ciE 'opencti|misp'
    answer_detail: "인텔 주도 트리아지의 토대 = Wazuh(매칭) + OpenCTI/MISP(인텔 소스)."
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "인텔 스택 점검"
        success_criteria: ["analysisd + opencti/misp"]
        acceptable_methods: ["**[OSS] 점검 (권장)**"]
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 공격 재현 — 알려진 악성 도구
      ## 💻 실행 명령
      ```bash
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw13%27%20UNION%20SELECT%201--%20-\""
      echo "attack done"
      ```
      ## ✅ 합격 기준
      알려진 악성 도구(sqlmap) 공격이 재현된다.
    hint: 'sqlmap 공격'
    category: recon
    points: 8
    answer: |
      docker exec el34-attacker sh -c "curl -s -o /dev/null -A sqlmap/1.7 -H 'Host: dvwa.el34.lab' \"http://10.20.30.1/?id=socw13%27%20UNION%20SELECT%201--%20-\""
      sleep 3
      echo "attack done"
    answer_detail: "sqlmap = 이미 인텔에 등록된 악성 도구. 같은 경보지만 인텔이 붙으면 트리아지가 달라진다."
    verify:
      type: output_contains
      expect: 'done'
      field: stdout
      semantic:
        intent: "알려진 악성 도구 공격 재현"
        success_criteria: ["sqlmap 공격"]
        acceptable_methods: ["**[OSS] sqlmap 공격 (권장)**"]
    target_vm: siem

  - order: 3
    instruction: |
      ## 🎯 인텔 없는 트리아지 — 느린 경로
      ## 💻 실행 명령
      ```bash
      echo "인텔 없음: 경보 → 출발지 조사 → 도구 분석 → 위험도 판정 → 우선순위 (수 분)"
      ```
      ## ✅ 합격 기준
      인텔 없는 트리아지의 한계(조사 시간)를 정리한다.
    hint: '인텔 없으면 조사 필요(느림)'
    category: analysis
    points: 10
    answer: |
      echo "=== 인텔 없는 트리아지 (느린 경로) ==="
      echo "경보 수신 → 출발지 IP 조사(누구?) → 도구/페이로드 분석(위험?) → 위험도 판정 → 우선순위"
      echo "→ 경보마다 조사 필요. 처리량 제한, alert fatigue 위험"
    answer_detail: "인텔 없으면 경보마다 처음부터 조사 — 출발지/도구/위험도를 매번 판정. 느리고 처리량 제한."
    verify:
      type: output_contains
      expect: '조사'
      field: stdout
      semantic:
        intent: "인텔 없는 트리아지 한계 이해"
        success_criteria: ["조사 경로", "처리량 제한"]
        acceptable_methods: ["**[설명] 느린 경로 (권장)**"]
    target_vm: siem

  - order: 4
    instruction: |
      ## 🎯 인텔 매칭 룰 — known-bad 즉시 격상 (id 101310)
      ## 💻 실행 명령
      ```bash
      sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw13_lr.bak
      sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name="soc_w13,">
        <rule id="101310" level="13">
          <decoded_as>json</decoded_as>
          <field name="tool">sqlmap</field>
          <description>SOC W13 - known-bad tool (intel), escalate</description>
        </rule>
      </group>
      EOF'
      echo '{"tool":"sqlmap","src_ip":"10.20.30.202"}' | sudo /var/ossec/bin/wazuh-logtest
      sudo cp /tmp/socw13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw13_lr.bak
      ```
      ## ✅ 합격 기준
      인텔 매칭 룰(101310)이 known-bad를 즉시 격상한다(logtest).
    hint: '인텔 매칭 룰(101310) → logtest → cp 복원'
    category: manipulation
    points: 16
    answer: |
      docker exec el34-siem sh -c 'sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/socw13_lr.bak'
      docker exec el34-siem sh -c 'sudo bash -c "cat >> /var/ossec/etc/rules/local_rules.xml <<EOF
      <group name=\"soc_w13,\">
        <rule id=\"101310\" level=\"13\">
          <decoded_as>json</decoded_as>
          <field name=\"tool\">sqlmap</field>
          <description>SOC W13 known-bad tool intel escalate</description>
        </rule>
      </group>
      EOF"'
      docker exec el34-siem sh -c 'cat > /tmp/socw13.json <<EOF
      {"tool":"sqlmap","src_ip":"10.20.30.202"}
      EOF'
      echo "=== 인텔 매칭 격상 logtest ==="
      docker exec el34-siem sh -c 'sudo /var/ossec/bin/wazuh-logtest < /tmp/socw13.json 2>&1 | grep -aE "id:|level:|Alert to be" | head -4; rm -f /tmp/socw13.json'
      docker exec el34-siem sh -c 'sudo cp /tmp/socw13_lr.bak /var/ossec/etc/rules/local_rules.xml; sudo rm -f /tmp/socw13_lr.bak; echo "복원 잔재=$(grep -c 101310 /var/ossec/etc/rules/local_rules.xml)"'
    answer_detail: "인텔 매칭 룰(tool=sqlmap=known-bad)이 경보를 level 13으로 즉시 격상 — 조사 전에 우선순위 결정. CDB list로 수천 IOC를 한 번에 매칭(W12 secuops)."
    verify:
      type: output_contains
      expect: '101310'
      field: stdout
      semantic:
        intent: "인텔 매칭 룰로 즉시 격상"
        success_criteria: ["id 101310 발화", "known-bad 격상", "cp 복원"]
        acceptable_methods: ["**[OSS] 인텔 매칭 룰 + logtest (권장)**"]
    target_vm: siem

  - order: 5
    instruction: |
      ## 🎯 인텔 주도 격상 — 즉시 P1
      ## 💻 실행 명령
      ```bash
      echo "인텔 있음: 경보 + known-bad → 즉시 P1 → 조사 생략, 대응 직행"
      ```
      ## ✅ 합격 기준
      인텔로 즉시 P1 격상 결정을 내린다.
    hint: 'known-bad → 즉시 P1'
    category: analysis
    points: 10
    answer: |
      echo "=== 인텔 주도 트리아지 (빠른 경로) ==="
      echo "경보 + 인텔(sqlmap=known-bad) → 즉시 P1 격상 → 조사 생략 가능 → 대응 직행"
      echo "→ '이미 아는 답'을 인텔이 제공 → 조사 시간 절약"
    answer_detail: "인텔 주도 = 조사를 건너뛰고 우선순위 직행. known-bad면 즉시 P1, 대응으로. 분석가의 시간을 모르는 위협에 집중."
    verify:
      type: output_contains
      expect: 'P1'
      field: stdout
      semantic:
        intent: "인텔 주도 즉시 격상 결정"
        success_criteria: ["known-bad → P1", "조사 생략"]
        acceptable_methods: ["**[설명] 빠른 경로 (권장)**"]
    target_vm: siem

  - order: 6
    instruction: |
      ## 🎯 인텔 플랫폼 — OpenCTI/MISP
      ## 💻 실행 명령
      ```bash
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      ```
      ## ✅ 합격 기준
      인텔 소스(OpenCTI/MISP)가 가동 중이다.
    hint: 'docker ps opencti/misp'
    category: survey
    points: 8
    answer: |
      echo "=== 인텔 플랫폼 ==="
      docker ps --format '{{.Names}}' | grep -iE 'opencti|misp' | head
      echo "→ OpenCTI/MISP 인텔 → CDB list → Wazuh 매칭 룰 → 자동 격상 (인텔 운영 파이프라인)"
    answer_detail: "인텔 소스(OpenCTI/MISP) → CDB list → Wazuh 매칭. 인텔이 들어오면 경보가 자동 격상되는 운영 파이프라인."
    verify:
      type: output_contains
      expect: 'opencti'
      field: stdout
      semantic:
        intent: "인텔 플랫폼 확인"
        success_criteria: ["OpenCTI/MISP 가동"]
        acceptable_methods: ["**[OSS] docker ps (권장)**"]
    target_vm: siem

  - order: 7
    instruction: |
      ## 🎯 가속 효과 — 처리량 향상
      ## 💻 실행 명령
      ```bash
      echo "인텔 없음: 경보당 조사 수 분 / 인텔 있음: 즉시 격상 수 초 → 처리량 수배"
      ```
      ## ✅ 합격 기준
      인텔 주도 트리아지의 처리량 향상을 정리한다.
    hint: '처리량 향상'
    category: analysis
    points: 8
    answer: |
      echo "=== 인텔 가속 효과 ==="
      echo "인텔 없음: 경보당 조사 수 분, 처리량 제한"
      echo "인텔 있음: known-bad 즉시 격상 수 초 → 처리량 수배, 모르는 위협에 집중"
      echo "→ SOC 처리량은 인텔로 결정 — 아는 건 빨리, 모르는 건 깊게"
    answer_detail: "인텔 주도의 효과 = 처리량 향상. 아는 위협을 빨리 쳐내 분석가가 모르는 위협(진짜 어려운 것)에 시간을 쓴다."
    verify:
      type: output_contains
      expect: '처리량'
      field: stdout
      semantic:
        intent: "인텔 가속 효과 이해"
        success_criteria: ["처리량 향상", "시간 재배분"]
        acceptable_methods: ["**[설명] 가속 효과 (권장)**"]
    target_vm: siem

  - order: 8
    instruction: |
      ## 🎯 인텔 트리아지 보고서
      ## 💻 보고서 양식
      ```markdown
      # SOC W13 인텔 주도 트리아지 보고서 (학번, 이름)
      ## 1. 인텔 없는 vs 있는 트리아지
      ## 2. 인텔 매칭 룰(101310) 격상
      ## 3. 인텔 플랫폼 (OpenCTI/MISP→CDB→Wazuh)
      ## 4. 가속 효과 (처리량)
      ```
      ## ✅ 합격 기준
      보고서에 인텔 매칭 + 가속 효과가 포함된다.
    hint: '인텔 매칭+가속'
    category: report
    points: 10
    answer: |
      cat <<'EOF'
      # SOC W13 인텔 주도 트리아지 보고서
      ## 1. 인텔 없음(경보당 조사) vs 있음(known-bad 즉시 격상)
      ## 2. 인텔 매칭 룰 101310: tool=sqlmap=known-bad → level 13 즉시 격상
      ## 3. 인텔 운영: OpenCTI/MISP → CDB list → Wazuh 매칭 룰 → 자동 격상
      ## 4. 가속: 아는 위협 수 초 처리 → 처리량 수배, 모르는 위협에 집중
      ## 결론: '알려진 위협' 한마디(인텔)가 트리아지를 가속 — SOC 처리량의 핵심
      EOF
    answer_detail: "인텔 주도 트리아지 = 인텔로 우선순위를 조사 전에 결정. 처리량 향상 + 시간 재배분. SOC 운영 효율의 핵심."
    verify:
      type: output_contains
      expect: '인텔'
      field: stdout
      semantic:
        intent: "인텔 트리아지 종합 보고"
        success_criteria: ["인텔 매칭", "가속 효과"]
        acceptable_methods: ["**[관리적] 인텔 트리아지 보고서 (권장)**"]
    target_vm: siem
