      echo "인텔 없음: 경보당 조사 수 분, 처리량 제한"
      # 2) 인텔 있음 — known-bad 즉시 격상 수 초 → 처리량 수배, 모르는 위협에 집중
      echo "인텔 있음: known-bad 즉시 격상 수 초 → 처리량 수배, 모르는 위협에 집중"
      # 3) 결론 — SOC 처리량은 인텔로 결정(아는 건 빨리, 모르는 건 깊게)
      # → SOC 처리량은 인텔로 결정 — 아는 건 빨리, 모르는 건 깊게
      ```
