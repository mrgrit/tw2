      ## 개념
      인텔 주도 트리아지의 결과를 운영 지표로 정리한다. **처리량(throughput)** 은 단위 시간에
      분석가가 처리하는 경보 건수다. known-bad 를 수 초에 쳐내면 같은 시간에 더 많은 경보를 처리하고
      (처리량↑), 남는 시간을 인텔이 모르는 진짜 어려운 위협에 쓸 수 있다(시간 재배분). 정확한 초
      측정이 아니라 "경보당 수 분 → 수 초"라는 **자릿수 차이가 곧 처리량 수배**라는 감각이 핵심이다
      (lecture §7).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
