      echo "→ 그래서 격리에 더해 최소권한(W04)+seccomp/AppArmor+user namespace 가 필요"
    answer_detail: "격리 한계 = namespace/cgroups 는 공유 커널 위 소프트웨어 경계라 커널 취약점/오설정 시 escape. 추가 강화(seccomp/AppArmor/user ns) 필요."
    expected_output: |
      namespace/cgroups 는 호스트 커널 하나 위에 그은 소프트웨어 경계(VM 처럼 커널 분리 아님)
      → 커널 취약점(예: dirtypipe)·오설정(특권/과한 cap)으로 경계가 깨지면 escape
      → 그래서 격리에 더해 최소권한(W04)+seccomp/AppArmor+user namespace 가 필요
    verify:
      type: output_contains
      expect: 'escape'
      field: stdout
      semantic:
        intent: "격리 한계"
        success_criteria: ["공유 커널"]
        acceptable_methods: ["**[관리적] 한계 (권장)**"]
