      echo "namespace/cgroups 는 호스트 커널 하나 위에 그은 소프트웨어 경계(VM 처럼 커널 분리 아님)"
      # 2) 한계 — 커널 취약점(dirtypipe)·오설정(특권/과한 cap)으로 경계가 깨지면 escape
      echo "→ 커널 취약점(예: dirtypipe)·오설정(특권/과한 cap)으로 경계가 깨지면 escape"
      # 3) 결론 — 격리에 더해 최소권한(W04)+seccomp/AppArmor+user namespace 필요
      echo "→ 그래서 격리에 더해 최소권한(W04)+seccomp/AppArmor+user namespace 가 필요"
      ```
      ## ✅ 합격 기준
      `escape` 출력 시 통과. **근거:** namespace/cgroups 가 공유 커널 위 소프트웨어 경계라 커널 취약점/
      오설정 시 escape 가능하다는 한계가 정리되면 추가 강화의 근거가 선다.
