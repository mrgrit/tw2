  - order: 7
    instruction: |
      ## 🎯 목표 — 격리 강화 방어
      공유 커널의 얕은 격리를 커널 보안 모듈로 다층 보강하는 방어를 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
