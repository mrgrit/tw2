lab_id: standalone-cloud-container-week05
title: "컨테이너 격리 — Namespace·Cgroups 점검"
version: standalone-cloud-container
course: cloud-container
week: 5
description: |
  컨테이너 격리의 두 기둥 — namespace(무엇이 보이나 분리)와 cgroups(자원 제한) — 를 점검한다.
  /proc/1/ns 로 namespace 격리를 보고, pid/net 격리·cgroups 자원 한도·공유 커널의 격리 한계를 다룬다.
  el34-web 대상. 명령은 el34 호스트 docker CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W04 통과 (공유 커널 이해)"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(namespace) §3(cgroups) §4(격리 한계) 숙지"
objectives:
  - "namespace 격리(pid/net/mnt 등) 확인"
  - "cgroups 자원 제한 점검"
  - "공유 커널 격리 한계·강화 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 대상 확인
      격리 점검 대상(el34-web)을 확인한다.
      ## 📖 개념 한 줄
      컨테이너 격리 = namespace(가시성 분리) + cgroups(자원 제한)를 호스트 커널 위에 소프트웨어로 그은 경계.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web 상태 확인 → 끝에 target_ok(격리 점검 대상 가동 확인)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** state=running 과 target_ok 가 나오면 격리 점검 대상이 떠 있는 것.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) el34-web 상태 확인 → 끝에 target_ok(격리 점검 대상 가동 확인)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
    answer_detail: "격리 점검 대상 = el34-web. 격리 = namespace(가시성)+cgroups(자원)."
    expected_output: |
      state=running
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 확인"
        success_criteria: ["가동"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — Namespace 목록
      컨테이너 프로세스가 가진 namespace 들을 확인한다.
      ## 📖 개념 한 줄
      namespace 는 프로세스가 "무엇을 볼 수 있는가"를 분리한다 — pid(프로세스)·net(네트워크)·mnt(파일
      시스템)·ipc·uts(호스트명)·user(uid 매핑) 등.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 컨테이너 PID 1(init)의 namespace 링크 목록 확인 → 끝에 ns_listed
      docker exec el34-web sh -c "ls /proc/1/ns/"; echo ns_listed
      # 2) 해석 — pid/net/mnt/ipc/uts/user 등 각 namespace = 가시성 격리 경계
      echo "→ pid/net/mnt/ipc/uts/user 등 = 각 격리 경계. 컨테이너는 호스트와 다른 namespace 에 격리"
      ```
      ## ✅ 합격 기준
      `ns_listed` 출력 시 통과. **근거:** namespace 목록(pid/net/mnt 등)과 ns_listed 가 나오면 각 격리 경계를 확인한 것.
      ## 🔧 도구 풀이
      - `/proc/1/ns/` — PID 1(컨테이너 init) 프로세스가 속한 namespace 들의 링크. 각각이 격리 경계 하나.
    hint: '/proc/1/ns'
    category: recon
    points: 14
    answer: |
      # 1) 컨테이너 PID 1(init)의 namespace 링크 목록 확인 → 끝에 ns_listed
      docker exec el34-web sh -c "ls /proc/1/ns/"; echo ns_listed
      # 2) 해석 — pid/net/mnt/ipc/uts/user 등 각 namespace = 가시성 격리 경계
      echo "→ pid/net/mnt/ipc/uts/user 등 = 각 격리 경계. 컨테이너는 호스트와 다른 namespace 에 격리"
    answer_detail: "namespace 목록 = /proc/1/ns/(pid/net/mnt/ipc/uts/user 등). 각 namespace 가 가시성 격리 경계 하나. 컨테이너는 호스트와 분리된 namespace 집합을 가진다."
    expected_output: |
      cgroup
      ipc
      mnt
      net
      pid
      pid_for_children
      time
      time_for_children
      user
      uts
      ns_listed
      → pid/net/mnt/ipc/uts/user 등 = 각 격리 경계. 컨테이너는 호스트와 다른 namespace 에 격리
    verify:
      type: output_contains
      expect: 'ns_listed'
      field: stdout
      semantic:
        intent: "namespace 목록"
        success_criteria: ["격리 경계"]
        acceptable_methods: ["**[OSS] /proc/ns (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — PID Namespace 격리
      컨테이너가 호스트 프로세스를 못 보는지(pid namespace 격리) 확인한다.
      ## 📖 개념 한 줄
      pid namespace 덕분에 컨테이너 안에서는 자기 프로세스만 보이고 호스트·다른 컨테이너 프로세스는 안 보인다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 컨테이너 내부에서 보이는 프로세스 수 출력(container_procs=) — 자기 프로세스만 보임
      echo -n "container_procs="; docker exec el34-web sh -c "ps -e 2>/dev/null | wc -l"
      # 2) PidMode 설정 확인 — 비어 있으면 자체 pid namespace(격리)
      docker inspect el34-web --format 'PidMode=[{{.HostConfig.PidMode}}]'
      # 3) 해석 — PidMode=[](빈 값)=자체 pid namespace(격리), host 면 격리 깨짐
      echo "→ PidMode=[](빈 값)=자체 pid namespace(격리). 컨테이너는 자기 프로세스만 봄. host 면 격리 깨짐"
      ```
      ## ✅ 합격 기준
      `PidMode=[]` 출력 시 통과. **근거:** PidMode 가 비어 있으면 자체 pid namespace(격리)로 컨테이너가
      자기 프로세스만 보는 것 — `host` 면 호스트 pid 공유로 격리가 깨진 갭이다.
      ## 🔧 도구 풀이
      - `PidMode` 가 비어 있으면 자체 pid namespace(격리). `host` 면 호스트 pid 공유(격리 깨짐=갭).
    hint: 'pid namespace'
    category: manipulation
    points: 12
    answer: |
      # 1) 컨테이너 내부에서 보이는 프로세스 수 출력(container_procs=) — 자기 프로세스만 보임
      echo -n "container_procs="; docker exec el34-web sh -c "ps -e 2>/dev/null | wc -l"
      # 2) PidMode 설정 확인 — 비어 있으면 자체 pid namespace(격리)
      docker inspect el34-web --format 'PidMode=[{{.HostConfig.PidMode}}]'
      # 3) 해석 — PidMode=[](빈 값)=자체 pid namespace(격리), host 면 격리 깨짐
      echo "→ PidMode=[](빈 값)=자체 pid namespace(격리). 컨테이너는 자기 프로세스만 봄. host 면 격리 깨짐"
    answer_detail: "pid namespace = 프로세스 가시성 격리. PidMode 비어있음=격리(컨테이너 자기 프로세스만). --pid=host 면 호스트 프로세스 노출=갭."
    expected_output: |
      container_procs=16
      PidMode=[]
      → PidMode=[](빈 값)=자체 pid namespace(격리). 컨테이너는 자기 프로세스만 봄. host 면 격리 깨짐
    verify:
      type: output_contains
      expect: 'PidMode=[]'
      field: stdout
      semantic:
        intent: "pid 격리"
        success_criteria: ["pid namespace"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 네트워크 Namespace
      컨테이너의 네트워크 격리(자체 net namespace)를 확인한다.
      ## 📖 개념 한 줄
      net namespace 덕분에 컨테이너는 자체 IP·인터페이스·라우팅을 가지며, 호스트 네트워크와 분리된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 네트워크 모드 표시(NetMode=)
      docker inspect el34-web --format 'NetMode={{.HostConfig.NetworkMode}}'
      # 2) 모드 판정 — host면 gap=host_network, 커스텀 네트워크면 compliant=isolated_net
      N=$(docker inspect el34-web --format '{{.HostConfig.NetworkMode}}'); [ "$N" = "host" ] && echo "gap=host_network" || echo "compliant=isolated_net"
      # 3) 해석 — NetMode=el34-dmz(커스텀)=격리(준수), host 면 호스트 네트워크 노출=갭
      echo "→ NetMode=el34-dmz(커스텀 네트워크)=격리(준수). host 면 호스트 네트워크 노출=갭"
      ```
      ## ✅ 합격 기준
      `compliant=isolated_net` 출력 시 통과. **근거:** NetworkMode 가 커스텀 네트워크(el34-dmz)면 net
      namespace 격리(준수) — `host` 면 호스트 네트워크 스택 공유로 격리가 없는 갭이다.
      ## 🔧 도구 풀이
      - NetworkMode=`host` 면 호스트 네트워크 공유(격리 없음=갭). 커스텀 네트워크(el34-dmz)면 격리.
    hint: 'net namespace'
    category: manipulation
    points: 12
    answer: |
      # 1) 네트워크 모드 표시(NetMode=)
      docker inspect el34-web --format 'NetMode={{.HostConfig.NetworkMode}}'
      # 2) 모드 판정 — host면 gap=host_network, 커스텀 네트워크면 compliant=isolated_net
      N=$(docker inspect el34-web --format '{{.HostConfig.NetworkMode}}'); [ "$N" = "host" ] && echo "gap=host_network" || echo "compliant=isolated_net"
      # 3) 해석 — NetMode=el34-dmz(커스텀)=격리(준수), host 면 호스트 네트워크 노출=갭
      echo "→ NetMode=el34-dmz(커스텀 네트워크)=격리(준수). host 면 호스트 네트워크 노출=갭"
    answer_detail: "net namespace = 네트워크 격리. el34-web=el34-dmz 커스텀 네트워크(격리, 준수). --net=host 면 호스트 네트워크 스택 공유=격리 없음 갭."
    expected_output: |
      NetMode=el34-dmz
      compliant=isolated_net
      → NetMode=el34-dmz(커스텀 네트워크)=격리(준수). host 면 호스트 네트워크 노출=갭
    verify:
      type: output_contains
      expect: 'compliant=isolated_net'
      field: stdout
      semantic:
        intent: "net 격리"
        success_criteria: ["net namespace"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — Cgroups 자원 제한
      컨테이너의 자원 한도(메모리/CPU)를 점검한다.
      ## 📖 개념 한 줄
      cgroups 는 컨테이너가 쓸 수 있는 자원(메모리·CPU)을 제한해, 한 컨테이너가 호스트 자원을 독식
      (자원 고갈 DoS)하지 못하게 한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 메모리/CPU 한도 표시(Memory/NanoCpus)
      docker inspect el34-web --format 'Memory={{.HostConfig.Memory}} NanoCpus={{.HostConfig.NanoCpus}}'
      # 2) 메모리 한도 판정 — 0이면 gap=no_mem_limit(무제한), 양수면 compliant=mem_limited
      M=$(docker inspect el34-web --format '{{.HostConfig.Memory}}'); [ "$M" = "0" ] && echo "gap=no_mem_limit" || echo "compliant=mem_limited"
      # 3) 해석 — Memory=0=무제한(자원 고갈 DoS 위험, 갭), --memory/--cpus 로 한도 설정 권고
      echo "→ Memory=0=무제한(자원 고갈 DoS 위험, 갭). --memory/--cpus 로 한도 설정 권고"
      ```
      ## ✅ 합격 기준
      `mem` 출력 시 통과. **근거:** Memory/NanoCpus 와 판정(gap=no_mem_limit 또는 compliant=mem_limited)이
      나오면 cgroups 자원 한도 점검 성공(0=무제한=자원 고갈 DoS 위험 갭).
      ## 🔧 도구 풀이
      - Memory=0 이면 메모리 한도 없음(자원 고갈 DoS 위험). 양수면 바이트 단위 한도.
    hint: 'cgroups 자원'
    category: analysis
    points: 12
    answer: |
      # 1) 메모리/CPU 한도 표시(Memory/NanoCpus)
      docker inspect el34-web --format 'Memory={{.HostConfig.Memory}} NanoCpus={{.HostConfig.NanoCpus}}'
      # 2) 메모리 한도 판정 — 0이면 gap=no_mem_limit(무제한), 양수면 compliant=mem_limited
      M=$(docker inspect el34-web --format '{{.HostConfig.Memory}}'); [ "$M" = "0" ] && echo "gap=no_mem_limit" || echo "compliant=mem_limited"
      # 3) 해석 — Memory=0=무제한(자원 고갈 DoS 위험, 갭), --memory/--cpus 로 한도 설정 권고
      echo "→ Memory=0=무제한(자원 고갈 DoS 위험, 갭). --memory/--cpus 로 한도 설정 권고"
    answer_detail: "cgroups = 자원 제한. Memory=0 이면 무제한 → 한 컨테이너가 호스트 메모리 독식(DoS) 가능 = 갭. --memory/--cpus 한도 권고."
    expected_output: |
      Memory=0 NanoCpus=0
      gap=no_mem_limit
      → Memory=0=무제한(자원 고갈 DoS 위험, 갭). --memory/--cpus 로 한도 설정 권고
    verify:
      type: output_contains
      expect: 'mem'
      field: stdout
      semantic:
        intent: "cgroups 점검"
        success_criteria: ["자원 한도"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 격리의 한계 (공유 커널)
      namespace/cgroups 격리의 근본 한계를 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
