lab_id: standalone-cloud-container-week02
title: "이미지 보안 — 레이어·베이스·크기·노출 포트"
version: standalone-cloud-container
course: cloud-container
week: 2
description: |
  이미지 보안 — 컨테이너가 태어나는 이미지 자체를 점검자(CIS Docker / NIST SP 800-190 이미지 항목)의 눈으로
  해부한다. 이미지에 든 모든 패키지·도구·열린 포트·비밀은 그대로 런타임의 공격 표면이 되기 때문이다.
  레이어/빌드 히스토리(docker history, 비밀 잔존 위험), 베이스 이미지(el34-web = Ubuntu 22.04 풀베이스),
  이미지 크기 = 공격 표면 척도(web 약 560MB·attacker 약 4GB), 노출 포트(EXPOSE 22 SSH = 불필요 표면),
  이미지 최소화(멀티스테이지 빌드/distroless/.dockerignore/비밀 미포함)와 이미지 위생을 다룬다.
  el34 이미지를 실제로 조회해 표면을 증적으로 보인다. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})의
  docker CLI 로 수행하는 읽기 전용 조회이며, 신규 도구 설치는 없다(취약점 스캐너 Trivy 는 다음 주 W03).
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01 통과"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(레이어) §3(베이스) §5(최소화) 숙지"
objectives:
  - "이미지 레이어(누적 변경분)·빌드 히스토리를 분석하고 비밀 잔존 위험을 이해한다"
  - "베이스 이미지(el34-web = Ubuntu 22.04 풀베이스)를 식별하고 풀 OS 베이스의 넓은 표면을 설명한다"
  - "이미지 크기·노출 포트(EXPOSE 22 SSH)를 공격 표면 관점으로 점검·판정한다"
  - "이미지 최소화(멀티스테이지/distroless/.dockerignore/비밀 미포함)와 위생 방어를 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      이미지 보안 점검의 대상(el34-web 이미지)에 접근이 되는지 먼저 확인한다.
      ## 📖 개념
      모든 점검의 전제는 "표적이 실제로 존재하고 조회 가능한가"이다. 대상이 없는데 던지는 음성 결과는
      무의미하므로, 점검자는 본격 분석에 앞서 대상 도달성부터 확인한다(lecture §8 미션 1).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 점검 대상(el34-web)의 이미지를 식별 → 끝에 target_ok 출력(대상 도달성 확인)
      docker inspect el34-web --format 'image={{.Config.Image}}' 2>/dev/null; echo target_ok
      ```
      - `docker inspect <컨테이너>` : 컨테이너·이미지의 상세 메타데이터(JSON)를 조회하는 읽기 전용 명령.
      - `--format '...'` : 그 JSON 에서 원하는 필드만 골라 출력하는 Go 템플릿. 여기서는 이미지 식별만 본다.
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** 끝에 target_ok 가 나오면 대상 이미지가 살아 있고 조회 가능한 것 —
      응답이 없으면 호스트 SSH·컨테이너 상태(`docker ps`)부터 점검한다.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 점검 대상(el34-web)의 이미지를 식별 → 끝에 target_ok 출력(대상 도달성 확인)
      docker inspect el34-web --format 'image={{.Config.Image}}' 2>/dev/null; echo target_ok
    answer_detail: "이미지 보안 점검의 대상은 el34-web 이미지다. docker inspect 로 이미지가 식별되고 끝에 target_ok 가 출력되면 대상이 살아 있고 조회 가능하다는 뜻 — 점검 착수의 전제 확인이다."
    expected_output: |
      image=el34-web
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 점검"
        success_criteria: ["이미지 확인"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      el34-web 이미지의 레이어 수와 빌드 히스토리를 읽어, 이미지가 어떻게 만들어져 무엇을 품게 됐는지
      분석한다.
      ## 📖 개념
      이미지는 Dockerfile 명령(RUN/COPY 등) 한 줄이 만든 **변경분 한 겹(레이어)** 의 누적이다(양파 구조,
      lecture §2). 각 레이어는 불변·영구 보존되므로, **비밀을 넣었다 지워도 이전 레이어에 그대로 남는다**
      — 이것이 비밀을 이미지에 굽지 말아야 하는 직접적 근거다. `docker history` 는 그 레이어별 명령·크기를
      보여 주는 "시공 일지"다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 이미지 레이어 개수를 세어 layers= 형식으로(docker history -q 는 레이어 ID, wc -l 로 개수)
      echo "layers=$(docker history -q el34-web 2>/dev/null | wc -l)"
      # 2) 레이어별 크기·명령을 앞 6줄 확인(용량 큰 RUN·의심 COPY 찾기)
      docker history el34-web --format '{{.Size}} {{.CreatedBy}}' | head -6
      # 3) 해석 — COPY로 굽힌 비밀/파일은 삭제해도 이전 레이어에 잔존
      echo "→ 레이어별 명령/크기. COPY로 굽힌 비밀/파일은 삭제해도 이전 레이어에 잔존"
      ```
      - `docker history -q` : 레이어 ID 만 한 줄씩 출력 → `wc -l` 로 세면 레이어 개수가 된다.
      - `--format '{{.Size}} {{.CreatedBy}}'` : 각 레이어가 추가한 크기와 그 레이어를 만든 명령을 본다.
        용량 큰 `RUN apt-get install` 줄(표면 비대)과 의심스러운 COPY(비밀·불필요 파일)를 찾는다.
      ## ✅ 합격 기준
      `layers=` 출력 시 통과. **근거:** `layers=<수>` 와 레이어별 명령·크기가 보이면 히스토리 분석 성공 —
      비밀을 넣었다 rm 해도 이전 레이어에 영구 잔존한다는 위험을 역추적할 근거다.
    hint: 'docker history'
    category: recon
    points: 14
    answer: |
      # 1) 이미지 레이어 개수를 세어 layers= 형식으로(docker history -q 는 레이어 ID, wc -l 로 개수)
      echo "layers=$(docker history -q el34-web 2>/dev/null | wc -l)"
      # 2) 레이어별 크기·명령을 앞 6줄 확인(용량 큰 RUN·의심 COPY 찾기)
      docker history el34-web --format '{{.Size}} {{.CreatedBy}}' | head -6
      # 3) 해석 — COPY로 굽힌 비밀/파일은 삭제해도 이전 레이어에 잔존
      echo "→ 레이어별 명령/크기. COPY로 굽힌 비밀/파일은 삭제해도 이전 레이어에 잔존"
    answer_detail: "레이어는 Dockerfile 의 RUN/COPY 명령이 만든 변경분의 누적이다. docker history 로 레이어별 명령·크기를 역추적해 빌드 단계를 분석한다. 핵심 위험은 비밀을 넣었다 rm 해도 이전 레이어에 영구 잔존한다는 점 — layers= 와 레이어 목록이 출력되면 분석 성공이다."
    expected_output: |
      layers=22
      0B ENTRYPOINT ["/entrypoint.sh"]
      0B EXPOSE [22/tcp 443/tcp 80/tcp]
      4.1kB RUN /bin/sh -c chmod +x /entrypoint.sh # bui…
      12.3kB COPY web/entrypoint.sh /entrypoint.sh # buil…
      102kB COPY secuops-easy-deploy/gui/modsec_edu_gui/…
      12.3kB COPY web/wazuh-agent.conf.append /tmp/wazuh-…
      → 레이어별 명령/크기. COPY로 굽힌 비밀/파일은 삭제해도 이전 레이어에 잔존
    verify:
      type: output_contains
      expect: 'layers='
      field: stdout
      semantic:
        intent: "레이어 분석"
        success_criteria: ["히스토리"]
        acceptable_methods: ["**[OSS] docker history (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      el34-web 의 베이스 이미지(출발점이 된 바닥 OS)를 식별하고, 풀 OS 베이스가 큰 공격 표면을 만든다는
      점을 확인한다.
      ## 📖 개념
      베이스 이미지는 Dockerfile 의 `FROM` 으로 지정하는 바닥 이미지로, 내가 쌓은 레이어는 모두 그 위에
      올라간다 — 그래서 **베이스가 표면의 8할을 결정**한다(lecture §3). 풀 OS 베이스(Ubuntu/Debian)는
      셸·패키지매니저·각종 도구를 다 품어 편리하지만, 그만큼 패키지·CVE·침해 후 악용 도구가 많다. 보안
      권고는 distroless/alpine/slim 같은 최소 베이스다(단 디버깅·호환성과 트레이드오프). el34 는 학생이
      직접 점검·실습할 수 있도록 일부러 셸 있는 풀베이스를 쓴다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 컨테이너 내부 /etc/os-release 첫 줄을 읽어 베이스 OS 식별(메타데이터 아닌 내부 파일이라 exec)
      docker exec el34-web sh -c 'cat /etc/os-release | head -1'
      # 2) 해석 — Ubuntu 22.04 풀베이스 = 공격 표면 큼, 권고는 distroless/alpine/slim
      echo "→ Ubuntu 22.04(full OS) 베이스 = 공격 표면 큼. 권고는 distroless/alpine/slim(트레이드오프)"
      ```
      - `docker exec <컨테이너> sh -c '...'` : 컨테이너 안에서 명령을 실행한다(메타데이터가 아니라 내부
        파일을 봐야 하므로 inspect 가 아닌 exec 를 쓴다).
      - `/etc/os-release` : 리눅스 배포판의 이름·버전을 담은 표준 파일. 첫 줄(PRETTY_NAME)에 베이스 OS 가
        드러난다.
      ## ✅ 합격 기준
      `Ubuntu` 출력 시 통과. **근거:** Ubuntu(22.04 풀베이스)가 보이면 베이스 식별 성공 — 풀 OS 베이스 =
      표면 넓음 판정(권고는 distroless/alpine/slim 최소 베이스).
    hint: 'os-release'
    category: manipulation
    points: 12
    answer: |
      # 1) 컨테이너 내부 /etc/os-release 첫 줄을 읽어 베이스 OS 식별(메타데이터 아닌 내부 파일이라 exec)
      docker exec el34-web sh -c 'cat /etc/os-release | head -1'
      # 2) 해석 — Ubuntu 22.04 풀베이스 = 공격 표면 큼, 권고는 distroless/alpine/slim
      echo "→ Ubuntu 22.04(full OS) 베이스 = 공격 표면 큼. 권고는 distroless/alpine/slim(트레이드오프)"
    answer_detail: "베이스 이미지는 표면의 8할을 결정한다. el34-web 은 /etc/os-release 첫 줄에 Ubuntu 22.04 가 나오는 풀 OS 베이스 — 셸·패키지매니저·도구를 다 품어 표면이 넓다. 보안 권고는 distroless/alpine/slim 같은 최소 베이스다. 출력에 Ubuntu 가 보이면 베이스 식별 성공이다."
    expected_output: |
      PRETTY_NAME="Ubuntu 22.04.5 LTS"
      → Ubuntu 22.04(full OS) 베이스 = 공격 표면 큼. 권고는 distroless/alpine/slim(트레이드오프)
    verify:
      type: output_contains
      expect: 'Ubuntu'
      field: stdout
      semantic:
        intent: "베이스 이미지 식별"
        success_criteria: ["베이스 OS"]
        acceptable_methods: ["**[OSS] os-release (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      el34 이미지들의 크기를 조회하고, 크기를 공격 표면의 척도로 해석한다.
      ## 📖 개념
      이미지 크기는 그 안에 담긴 파일·패키지의 총량이라, **공격 표면의 거친 척도**다(lecture §4.1).
      클수록 더 많은 패키지(→ 더 많은 CVE)와 더 많은 침해 후 악용 도구를 뜻한다. el34-web 은 약 560MB
      (풀 우분투 + 웹 스택), 공격용 attacker 는 약 4GB(nmap·sqlmap·nuclei·메타스플로잇 등 도구를 의도적으로
      다 담음)다. 반면 distroless 기반 앱 이미지는 보통 수십 MB — 이 차이가 곧 표면의 차이다. 크기 자체는
      취약점이 아니지만, 다수 이미지를 점검할 때 표면이 의심스러운 이미지를 먼저 추리는 1차 트리아지 신호다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 호스트의 el34 이미지들의 이름·크기를 size_check 접두와 함께 조회(크기=표면 척도)
      docker images --format 'size_check {{.Repository}} {{.Size}}' | grep -i el34 | head -6
      # 2) 해석 — web 560MB·attacker 4GB 등, 크기=패키지 수=CVE 수=악용 도구, 최소화 필요
      echo "→ web 560MB·attacker 4GB 등. 크기=패키지 수=CVE 수=침해 후 악용 도구. 최소화 필요"
      ```
      - `docker images --format 'size_check {{.Repository}} {{.Size}}'` : 이미지 이름·크기를 한 줄씩 출력.
      - `grep -i el34` : el34 관련 이미지만 골라 본다(`-i` = 대소문자 무시).
      ## ✅ 합격 기준
      `size_check` 출력 시 통과. **근거:** size_check 와 함께 el34 이미지 크기(web 약 560MB·attacker 약 4GB
      등)가 보이면 표면 척도 분석 성공 — el34 이미지가 안 보이면 필터·이미지 목록을 재확인한다.
    hint: '이미지 크기'
    category: analysis
    points: 12
    answer: |
      # 1) 호스트의 el34 이미지들의 이름·크기를 size_check 접두와 함께 조회(크기=표면 척도)
      docker images --format 'size_check {{.Repository}} {{.Size}}' | grep -i el34 | head -6
      # 2) 해석 — web 560MB·attacker 4GB 등, 크기=패키지 수=CVE 수=악용 도구, 최소화 필요
      echo "→ web 560MB·attacker 4GB 등. 크기=패키지 수=CVE 수=침해 후 악용 도구. 최소화 필요"
    answer_detail: "이미지 크기는 공격 표면의 거친 척도다 — 클수록 패키지·CVE·침해 후 악용 도구가 많다. el34-web 약 560MB(풀 우분투+웹 스택), attacker 약 4GB(공격 도구 다수), distroless 앱은 수십 MB. 다수 이미지 점검 시 1차 트리아지 지표이며, size_check 와 함께 el34 이미지 크기가 출력되면 성공이다."
    expected_output: |
      size_check el34-fw 435MB
      size_check el34-siem 2.07GB
      size_check el34-ips 484MB
      size_check el34-web 560MB
      size_check el34-sysmon-host 381MB
      size_check el34-attacker 4.01GB
      → web 560MB·attacker 4GB 등. 크기=패키지 수=CVE 수=침해 후 악용 도구. 최소화 필요
    verify:
      type: output_contains
      expect: 'size_check'
      field: stdout
      semantic:
        intent: "이미지 크기 분석"
        success_criteria: ["표면 관점"]
        acceptable_methods: ["**[OSS] docker images (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표
      el34-web 이미지가 선언한 노출 포트(EXPOSE)를 점검해, 웹 이미지에 불필요한 관리 포트(SSH)가 굳어
      있는지 판정한다.
      ## 📖 개념
      `EXPOSE` 는 Dockerfile 에 적는 메타데이터로 "이 이미지는 이 포트로 서비스한다"는 선언이다(lecture
      §4.3). 그 자체로 포트를 외부에 여는 것은 아니지만(실제 개방은 런타임 `-p`), 이미지가 어떤 네트워크
      표면을 전제하는지 읽는 단서가 된다. 웹 이미지인데 22/tcp(SSH)가 노출 포트에 있으면, 웹 서비스에
      불필요한 SSH 서버가 이미지에 함께 담겼다는 신호 — 공격자에게 무차별 대입·자격 탈취의 표적이 되는
