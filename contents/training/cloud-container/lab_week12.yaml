lab_id: standalone-cloud-container-week12
title: "오케스트레이션 보안 — Compose·Kubernetes 보안 통제"
version: standalone-cloud-container
course: cloud-container
week: 12
description: |
  오케스트레이션 보안 — 다수 컨테이너를 자동 배포·운영하는 계층(Docker Compose / Kubernetes)의 보안 통제.
  el34 스택의 재시작 정책 일관성을 점검하고, compose 시크릿·k8s Pod 보안(SecurityContext/RBAC/
  NetworkPolicy/Secret)을 다룬다. 명령은 el34 호스트 docker CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W11 통과 (4계층의 오케스트레이션 계층)"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(compose) §3(k8s 보안) 숙지"
objectives:
  - "오케스트레이션 계층의 보안 통제 이해"
  - "스택 운영 일관성(restart 등) 점검"
  - "k8s Pod 보안(SecurityContext/RBAC/NetworkPolicy) 이해"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 스택 확인
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 중 컨테이너 수를 세어 stack_containers= 로 집계 → 끝에 target_ok(스택 확인)
      echo "stack_containers=$(docker ps -q | wc -l)"; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** 스택 컨테이너 수와 target_ok 가 나오면 다수 컨테이너 스택을 확인한 것.
    hint: '스택'
    category: survey
    points: 10
    answer: |
      # 1) 실행 중 컨테이너 수를 세어 stack_containers= 로 집계 → 끝에 target_ok(스택 확인)
      echo "stack_containers=$(docker ps -q | wc -l)"; echo target_ok
    answer_detail: "오케스트레이션 = 다수 컨테이너의 배포·확장·운영 자동화(compose/k8s). el34 는 다수 컨테이너 스택."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic: {intent: "스택", success_criteria: ["컨테이너 수"], acceptable_methods: ["**[OSS] docker ps (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 운영 일관성 (restart 정책)
      ## 📖 개념 한 줄
      오케스트레이션은 스택 전체에 일관된 운영 정책(재시작·복원력)을 적용한다. 일부만 다르면 그 컨테이너가
      장애 시 복구 안 되는 약한 고리가 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 중 컨테이너 앞 8개의 이름·재시작 정책을 순회 출력 → 끝에 restart_audited(스택 일관성 점검)
      docker ps -q | head -8 | while read c; do docker inspect "$c" --format '{{.Name}} restart={{.HostConfig.RestartPolicy.Name}}'; done; echo restart_audited
      # 2) 해석 — 스택 전반 unless-stopped = 일관된 복원력 정책(준수), no면 약한 고리
      echo "→ 스택 전반 unless-stopped = 일관된 복원력 정책(준수). no 인 컨테이너가 있으면 약한 고리"
      ```
      ## ✅ 합격 기준
      `restart_audited` 출력 시 통과. **근거:** 각 컨테이너 restart 정책과 restart_audited 가 나오면 스택
      전반의 복원력 정책 일관성을 점검한 것(no 인 컨테이너가 있으면 약한 고리).
      ## 🔧 도구 풀이
      - 스택 전체의 RestartPolicy 를 훑어 일관성 점검 — unless-stopped/always 가 복원력 정책.
    hint: 'restart 일관성'
    category: manipulation
    points: 14
    answer: |
      # 1) 실행 중 컨테이너 앞 8개의 이름·재시작 정책을 순회 출력 → 끝에 restart_audited(스택 일관성 점검)
      docker ps -q | head -8 | while read c; do docker inspect "$c" --format '{{.Name}} restart={{.HostConfig.RestartPolicy.Name}}'; done; echo restart_audited
      # 2) 해석 — 스택 전반 unless-stopped = 일관된 복원력 정책(준수), no면 약한 고리
      echo "→ 스택 전반 unless-stopped = 일관된 복원력 정책(준수). no 인 컨테이너가 있으면 약한 고리"
    answer_detail: "운영 일관성 = 스택 전체 RestartPolicy 점검. el34 는 unless-stopped 일관(복원력 준수). 오케스트레이션은 정책을 스택 단위로 강제."
    verify:
      type: output_contains
      expect: 'restart_audited'
      field: stdout
      semantic: {intent: "운영 일관성", success_criteria: ["restart 정책"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — Compose 보안
      ## 📖 개념 한 줄
      Docker Compose 파일은 스택의 설정을 코드로 정의한다(IaC) — 여기에 비밀 평문·특권·과한 포트가 있으면
      스택 전체에 퍼진다. compose 의 `secrets:` 로 비밀을 env 가 아닌 파일로 주입한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) compose 파일(IaC)에 담기는 위험 — 평문 env 비밀, privileged:true, 과한 ports, 호스트 볼륨
      echo "compose 파일(IaC)에 담기는 위험: 평문 env 비밀, privileged: true, 과한 ports, 호스트 볼륨 마운트"
      # 2) 통제 — secrets: 블록(비밀을 env 아닌 파일로), read_only, cap_drop, user 지정, 최소 ports
      echo "통제: secrets: 블록(비밀을 env 아닌 파일로), read_only: true, cap_drop, user 지정, 최소 ports"
      # 3) compose 파일도 코드 리뷰·비밀 스캔(gitleaks) 대상
      echo "compose 파일도 코드 리뷰·비밀 스캔(gitleaks) 대상"
      # 4) compose 보안 정리 완료 표식
      echo "compose_secured"
      ```
      ## ✅ 합격 기준
      `compose_secured` 출력 시 통과. **근거:** compose IaC 의 비밀/특권/포트 통제 + secrets: 블록(파일
      주입)이 정리되면 통과(compose 파일도 코드 리뷰·비밀 스캔 대상).
    hint: 'compose secrets'
    category: analysis
    points: 12
    answer: |
      # 1) compose 파일(IaC)에 담기는 위험 — 평문 env 비밀, privileged:true, 과한 ports, 호스트 볼륨
      echo "compose 파일(IaC)에 담기는 위험: 평문 env 비밀, privileged: true, 과한 ports, 호스트 볼륨 마운트"
      # 2) 통제 — secrets: 블록(비밀을 env 아닌 파일로), read_only, cap_drop, user 지정, 최소 ports
