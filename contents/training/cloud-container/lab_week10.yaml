lab_id: standalone-cloud-container-week10
title: "컨테이너 런타임 위협 탐지 — Wazuh/Falco 행위 모니터링"
version: standalone-cloud-container
course: cloud-container
week: 10
description: |
  컨테이너 런타임 위협 탐지 — 정적 점검(W03~W09)을 넘어, 실행 중 컨테이너의 비정상 행위(예상 밖 프로세스·
  파일 변경·아웃바운드)를 탐지한다. el34 는 Wazuh(siem) + 호스트 Sysmon 으로 컨테이너 행위까지 포착.
  Falco 개념도 다룬다. 명령은 el34 호스트 docker/Wazuh CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: medium
duration_minutes: 140
prerequisites:
  - "W01–W09 통과 (정적 점검)"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(런타임 탐지) §3(Wazuh/Falco) 숙지"
objectives:
  - "런타임 위협 탐지의 필요성 이해(정적 점검의 한계)"
  - "Wazuh 컨테이너/호스트 행위 모니터링 확인"
  - "탐지 기반 방어(Falco/Wazuh) 운영"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — SIEM 대상 확인
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 런타임 탐지 원천 el34-siem(Wazuh) 컨테이너 확인 — 호스트명 출력 후 target_ok
      docker exec el34-siem sh -c "hostname; echo target_ok"
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** el34-siem 호스트명과 target_ok 가 나오면 런타임 탐지 원천(Wazuh)이 떠 있는 것.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) 런타임 탐지 원천 el34-siem(Wazuh) 컨테이너 확인 — 호스트명 출력 후 target_ok
      docker exec el34-siem sh -c "hostname; echo target_ok"
    answer_detail: "런타임 탐지 원천 = el34-siem(Wazuh). 정적 점검은 '설정'을, 런타임 탐지는 '행위'를 본다."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic: {intent: "대상", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker exec (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 정적 점검의 한계
      ## 📖 개념 한 줄
      W03~W09 의 정적 점검(이미지·설정)은 "배포 시점"의 상태만 본다. 실행 중 침해(웹셸·리버스셸·예상 밖
      프로세스)는 런타임 행위 탐지로만 잡힌다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 정적 점검(W03~09)의 범위 — 이미지 CVE·런타임 설정 = 배포 시점 상태
      echo "정적(W03~09): 이미지 CVE·런타임 설정 = '배포 시점' 상태"
      # 2) 런타임 탐지의 범위 — 실행 중 비정상 행위(예상 밖 프로세스/파일 변경/아웃바운드 C2)
      echo "런타임 탐지: 실행 중 컨테이너의 비정상 행위(예상 밖 프로세스/파일 변경/아웃바운드 C2)"
      # 3) 결론 — 정적으로 깨끗해도 런타임에 침해될 수 있음(둘은 보완)
      echo "→ 정적으로 깨끗해도 런타임에 침해될 수 있다. 둘은 보완"
      # 4) 차이 정리 완료 표식
      echo "static_vs_runtime"
      ```
      ## ✅ 합격 기준
      `static_vs_runtime` 출력 시 통과. **근거:** 정적(배포 시점 설정) vs 런타임(실행 중 행위) 차이가
      정리되면 정적 점검만으론 실행 중 침해를 못 잡음이 드러난다.
    hint: '정적 한계'
    category: analysis
    points: 12
    answer: |
      # 1) 정적 점검(W03~09)의 범위 — 이미지 CVE·런타임 설정 = 배포 시점 상태
      echo "정적(W03~09): 이미지 CVE·런타임 설정 = '배포 시점' 상태"
      # 2) 런타임 탐지의 범위 — 실행 중 비정상 행위(예상 밖 프로세스/파일 변경/아웃바운드 C2)
      echo "런타임 탐지: 실행 중 컨테이너의 비정상 행위(예상 밖 프로세스/파일 변경/아웃바운드 C2)"
      # 3) 결론 — 정적으로 깨끗해도 런타임에 침해될 수 있음(둘은 보완)
      echo "→ 정적으로 깨끗해도 런타임에 침해될 수 있다. 둘은 보완"
      # 4) 차이 정리 완료 표식
      echo "static_vs_runtime"
    answer_detail: "정적(배포 시점 설정) vs 런타임(실행 중 행위). 정적 점검 통과해도 런타임 침해 가능 → 행위 탐지 필요."
    verify:
      type: output_contains
      expect: 'static_vs_runtime'
      field: stdout
      semantic: {intent: "정적 한계", success_criteria: ["정적 vs 런타임"], acceptable_methods: ["**[관리적] 개념 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — Wazuh 모니터링 확인
      ## 📖 개념 한 줄
      el34 의 Wazuh 는 컨테이너가 도는 호스트/컨테이너의 로그·FIM·행위를 수집해 비정상을 탐지한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) Wazuh alert 적재 확인 — alerts.json 마지막 줄 일부 출력 후 wazuh_active
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 60; echo; echo wazuh_active'
      # 2) 해석 — Wazuh가 컨테이너 호스트 로그/FIM/행위를 수집·탐지(런타임 이상을 alert로)
      echo "→ Wazuh 가 컨테이너 호스트 로그/FIM/행위 수집·탐지. 런타임 이상을 alert 로"
      ```
      ## ✅ 합격 기준
      `wazuh_active` 출력 시 통과. **근거:** alerts.json 적재와 wazuh_active 가 나오면 Wazuh 가 런타임
      이상을 alert 로 수집·탐지 중임을 확인한 것.
    hint: 'Wazuh'
    category: manipulation
    points: 14
    answer: |
      # 1) Wazuh alert 적재 확인 — alerts.json 마지막 줄 일부 출력 후 wazuh_active
      docker exec el34-siem sh -c 'tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -c 60; echo; echo wazuh_active'
      # 2) 해석 — Wazuh가 컨테이너 호스트 로그/FIM/행위를 수집·탐지(런타임 이상을 alert로)
      echo "→ Wazuh 가 컨테이너 호스트 로그/FIM/행위 수집·탐지. 런타임 이상을 alert 로"
    answer_detail: "Wazuh 런타임 탐지 = alerts.json 적재. 컨테이너 호스트의 로그/FIM/행위를 수집해 비정상 탐지(secuops/soc 트랙과 동일 엔진)."
    verify:
      type: output_contains
      expect: 'wazuh_active'
      field: stdout
      semantic: {intent: "Wazuh 모니터링", success_criteria: ["적재"], acceptable_methods: ["**[OSS] Wazuh (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 호스트 Sysmon 의 컨테이너 가시성
      ## 📖 개념 한 줄
      컨테이너 프로세스도 결국 호스트 커널의 프로세스다 — 호스트의 Sysmon(eBPF)이 컨테이너 내부
      프로세스·네트워크·파일 생성까지 포착한다(W11 secuops 에서 설치).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web 컨테이너 안에서 런타임 행위 1건 발생(=호스트 커널 프로세스) → behavior_generated
      docker exec el34-web sh -c "echo runtime_event_$(id -u) > /dev/null; echo behavior_generated"
      # 2) 해석 — 컨테이너 프로세스=호스트 커널 프로세스, 호스트 Sysmon(eBPF)이 내부 행위까지 포착
      echo "→ 컨테이너 프로세스=호스트 커널 프로세스. 호스트 Sysmon(eBPF)이 컨테이너 내부 행위까지 포착"
      # 3) 의의 — 비특권 컨테이너에 에이전트 못 넣어도 호스트에서 행위 가시성 확보
      echo "→ 비특권 컨테이너 안에 에이전트 못 넣어도, 호스트에서 행위 가시성 확보"
      ```
      ## ✅ 합격 기준
      `behavior_generated` 출력 시 통과. **근거:** 컨테이너 내 행위가 발생하면(behavior_generated) 그
      프로세스는 호스트 커널 프로세스라 호스트 Sysmon 이 관측 가능하다(비특권 컨테이너도 호스트 레벨 가시성).
    hint: 'sysmon 가시성'
    category: analysis
    points: 12
    answer: |
      # 1) el34-web 컨테이너 안에서 런타임 행위 1건 발생(=호스트 커널 프로세스) → behavior_generated
      docker exec el34-web sh -c "echo runtime_event_$(id -u) > /dev/null; echo behavior_generated"
      # 2) 해석 — 컨테이너 프로세스=호스트 커널 프로세스, 호스트 Sysmon(eBPF)이 내부 행위까지 포착
      echo "→ 컨테이너 프로세스=호스트 커널 프로세스. 호스트 Sysmon(eBPF)이 컨테이너 내부 행위까지 포착"
      # 3) 의의 — 비특권 컨테이너에 에이전트 못 넣어도 호스트에서 행위 가시성 확보
      echo "→ 비특권 컨테이너 안에 에이전트 못 넣어도, 호스트에서 행위 가시성 확보"
    answer_detail: "호스트 Sysmon = 컨테이너 프로세스(=호스트 커널 프로세스) 행위 포착. 비특권 컨테이너도 호스트 레벨에서 런타임 가시성 확보."
    verify:
      type: output_contains
      expect: 'behavior_generated'
      field: stdout
      semantic: {intent: "Sysmon 가시성", success_criteria: ["호스트 관측"], acceptable_methods: ["**[OSS] docker exec (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — Falco (컨테이너 전용 런타임 탐지)
      ## 📖 개념 한 줄
      Falco 는 컨테이너 런타임 위협 탐지의 표준 — 커널 시스템콜을 규칙으로 보고 "컨테이너 안에서 셸 실행"
      "민감 파일 읽기" 같은 행위를 실시간 탐지한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) Falco — 컨테이너 런타임 위협 탐지의 사실상 표준(CNCF)
      echo "Falco = 컨테이너 런타임 위협 탐지의 사실상 표준(CNCF)"
      # 2) 원리 — 커널 시스템콜을 eBPF로 보고 규칙과 대조
      echo "원리: 커널 시스템콜을 eBPF 로 보고 규칙과 대조"
      # 3) 탐지 예 — 컨테이너 내 셸/etc 쓰기/민감파일/아웃바운드/권한상승
      echo "탐지 예: 컨테이너 내 셸 실행, /etc 쓰기, 민감 파일 읽기, 예상 밖 아웃바운드, 권한상승 시도"
      # 4) 결론 — Wazuh(로그/FIM)+Falco(syscall)로 런타임 행위 다각 탐지
      echo "→ Wazuh(로그/FIM) + Falco(syscall) 로 런타임 행위를 다각 탐지"
      ```
      ## ✅ 합격 기준
      `Falco` 출력 시 통과. **근거:** Falco 가 커널 syscall 규칙으로 '컨테이너 내 셸'·'민감파일 접근' 등을
      실시간 탐지하며 Wazuh 와 보완함이 정리되면 통과.
    hint: 'Falco'
    category: analysis
    points: 12
    answer: |
      # 1) Falco — 컨테이너 런타임 위협 탐지의 사실상 표준(CNCF)
      echo "Falco = 컨테이너 런타임 위협 탐지의 사실상 표준(CNCF)"
      # 2) 원리 — 커널 시스템콜을 eBPF로 보고 규칙과 대조
      echo "원리: 커널 시스템콜을 eBPF 로 보고 규칙과 대조"
      # 3) 탐지 예 — 컨테이너 내 셸/etc 쓰기/민감파일/아웃바운드/권한상승
      echo "탐지 예: 컨테이너 내 셸 실행, /etc 쓰기, 민감 파일 읽기, 예상 밖 아웃바운드, 권한상승 시도"
      # 4) 결론 — Wazuh(로그/FIM)+Falco(syscall)로 런타임 행위 다각 탐지
      echo "→ Wazuh(로그/FIM) + Falco(syscall) 로 런타임 행위를 다각 탐지"
    answer_detail: "Falco = CNCF 컨테이너 런타임 탐지. syscall 규칙으로 '컨테이너 내 셸'·'민감파일 접근' 등 실시간 탐지. Wazuh 와 보완."
    verify:
      type: output_contains
      expect: 'Falco'
      field: stdout
      semantic: {intent: "Falco", success_criteria: ["syscall 탐지"], acceptable_methods: ["**[OSS] Falco (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 탐지 vs 예방
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 예방 — 정적 강화(최소권한·이미지 스캔·시크릿 외부주입)로 침해 표면 축소
      echo "예방: 정적 강화(최소권한·이미지 스캔·시크릿 외부주입) → 침해 표면 축소"
      # 2) 탐지 — 런타임 행위 모니터링(Wazuh/Falco/Sysmon)으로 예방 뚫은 침해 포착
      echo "탐지: 런타임 행위 모니터링(Wazuh/Falco/Sysmon) → 예방을 뚫은 침해 포착"
      # 3) 대응 — 비정상 컨테이너 격리·종료·재배포(이미지 불변→깨끗한 이미지 교체)
      echo "대응: 비정상 컨테이너 격리·종료·재배포(이미지는 불변→깨끗한 이미지로 교체)"
      # 4) 결론 — 예방+탐지+대응 삼중 체계, 컨테이너는 재배포가 쉬워 대응이 빠름
      echo "→ 예방+탐지+대응의 삼중 체계. 컨테이너는 재배포가 쉬워 대응이 빠름"
      ```
      ## ✅ 합격 기준
      `탐지` 출력 시 통과. **근거:** 예방(정적)+탐지(런타임)+대응(격리/재배포) 삼중 체계가 정리되면
      정적만으론 못 잡는 실행 중 침해를 탐지가 보완함이 드러난다.
    hint: '탐지/예방/대응'
    category: report
    points: 12
    answer: |
      # 1) 예방 — 정적 강화(최소권한·이미지 스캔·시크릿 외부주입)로 침해 표면 축소
      echo "예방: 정적 강화(최소권한·이미지 스캔·시크릿 외부주입) → 침해 표면 축소"
