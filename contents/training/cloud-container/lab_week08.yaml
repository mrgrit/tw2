lab_id: standalone-cloud-container-week08
title: "중간고사: 컨테이너 보안 기준선 종합 점검 (W01~W07)"
version: standalone-cloud-container
course: cloud-container
week: 8
description: |
  중간 평가 — el34-web 한 컨테이너를 CIS Docker / NIST 800-190 기준선으로 한 바퀴 종합 점검한다.
  W01~W07 역량(식별·이미지 스캔·런타임 특권/cap/user·격리·시크릿·네트워크)을 통합해 항목별 준수/갭을
  판정하고 우선순위로 종합한다. 명령은 el34 호스트 docker/trivy CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01–W07 통과"
  - "el34 호스트 SSH + docker/trivy CLI"
  - "전 주차 점검 명령 숙지"
objectives:
  - "컨테이너 종합 기준선 점검 수행"
  - "이미지·런타임·시크릿·네트워크 준수/갭 판정"
  - "우선순위 기반 종합 보고"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 대상 식별
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web 상태 확인 → 끝에 target_ok(종합 점검 대상 식별)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** state=running 과 target_ok 가 나오면 종합 점검 대상이 떠 있는 것.
    hint: '대상'
    category: survey
    points: 8
    answer: |
      # 1) el34-web 상태 확인 → 끝에 target_ok(종합 점검 대상 식별)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
    answer_detail: "기준선 종합 점검 대상 = el34-web."
    expected_output: |
      state=running
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic: {intent: "대상", success_criteria: ["가동"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 ① 이미지 취약점 (W03)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W03) el34-web 이미지 HIGH/CRITICAL 취약점 스캔 → Total: 집계 줄만 추출
      /usr/local/bin/trivy image --scanners vuln --severity HIGH,CRITICAL --no-progress el34-web:latest | grep -iE 'Total:'
      # 2) 해석 — HIGH 취약점 존재(갭), 최소 베이스+갱신 필요
      # → HIGH 취약점 존재(갭). 최소 베이스+갱신
      ```
      ## ✅ 합격 기준
      `Total:` 출력 시 통과. **근거:** Trivy HIGH/CRITICAL 집계가 나오면 이미지 취약점 갭을 확인한 것.
    hint: 'trivy'
    category: manipulation
    points: 12
    answer: |
      # 1) (W03) el34-web 이미지 HIGH/CRITICAL 취약점 스캔 → Total: 집계 줄만 추출
      /usr/local/bin/trivy image --scanners vuln --severity HIGH,CRITICAL --no-progress el34-web:latest | grep -iE 'Total:'
      # 2) 해석 — HIGH 취약점 존재(갭), 최소 베이스+갱신 필요
      # → HIGH 취약점 존재(갭). 최소 베이스+갱신
    answer_detail: "이미지 취약점(W03) = Trivy HIGH 집계. 베이스 패키지 CVE 갭."
    expected_output: |
      Total: 2 (HIGH: 2, CRITICAL: 0)
      → HIGH 취약점 존재(갭). 최소 베이스+갱신
    verify:
      type: output_contains
      expect: 'Total:'
      field: stdout
      semantic: {intent: "이미지 스캔", success_criteria: ["CVE 집계"], acceptable_methods: ["**[OSS] trivy (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 ② 특권 (W04, CIS 5.4)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W04, CIS 5.4) 특권 여부를 변수로 받아 판정 — false면 compliant=not_privileged
      P=$(docker inspect el34-web --format '{{.HostConfig.Privileged}}'); echo "privileged=$P"; [ "$P" = "false" ] && echo "compliant=not_privileged" || echo "gap=privileged"
      # 2) 해석 — Privileged=false = CIS 5.4 준수
      # → Privileged=false = CIS 5.4 준수
      ```
      ## ✅ 합격 기준
      `compliant=not_privileged` 출력 시 통과. **근거:** 특권 없음(CIS 5.4 준수) — true 면 격리 무력화 갭.
    hint: 'privileged'
    category: manipulation
    points: 10
    answer: |
      # 1) (W04, CIS 5.4) 특권 여부를 변수로 받아 판정 — false면 compliant=not_privileged
      P=$(docker inspect el34-web --format '{{.HostConfig.Privileged}}'); echo "privileged=$P"; [ "$P" = "false" ] && echo "compliant=not_privileged" || echo "gap=privileged"
      # 2) 해석 — Privileged=false = CIS 5.4 준수
      # → Privileged=false = CIS 5.4 준수
    answer_detail: "특권(W04) = Privileged false(준수, CIS 5.4)."
    expected_output: |
      privileged=false
      compliant=not_privileged
      → Privileged=false = CIS 5.4 준수
    verify:
      type: output_contains
      expect: 'compliant=not_privileged'
      field: stdout
      semantic: {intent: "특권", success_criteria: ["준수"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 ③ Capability (W04, CIS 5.3)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W04, CIS 5.3) CapDrop 표시 후 판정 — ALL/CAP_ 있으면 compliant, 비었으면 gap=no_capdrop
      docker inspect el34-web --format 'CapDrop={{.HostConfig.CapDrop}}'; D=$(docker inspect el34-web --format '{{.HostConfig.CapDrop}}'); echo "$D" | grep -qiE 'ALL|CAP_' && echo "compliant=caps_dropped" || echo "gap=no_capdrop"
      # 2) 해석 — CapDrop 비어있음 = CIS 5.3 갭(drop all 권고)
      # → CapDrop 비어있음 = CIS 5.3 갭(drop all 권고)
      ```
      ## ✅ 합격 기준
      `gap=no_capdrop` 출력 시 통과. **근거:** CapDrop 이 비어 기본 cap 전부 잔존 = CIS 5.3 갭.
    hint: 'capdrop'
    category: manipulation
    points: 10
    answer: |
      # 1) (W04, CIS 5.3) CapDrop 표시 후 판정 — ALL/CAP_ 있으면 compliant, 비었으면 gap=no_capdrop
      docker inspect el34-web --format 'CapDrop={{.HostConfig.CapDrop}}'; D=$(docker inspect el34-web --format '{{.HostConfig.CapDrop}}'); echo "$D" | grep -qiE 'ALL|CAP_' && echo "compliant=caps_dropped" || echo "gap=no_capdrop"
      # 2) 해석 — CapDrop 비어있음 = CIS 5.3 갭(drop all 권고)
      # → CapDrop 비어있음 = CIS 5.3 갭(drop all 권고)
    answer_detail: "Capability(W04) = CapDrop 비어있음 갭(CIS 5.3)."
    expected_output: |
      CapDrop=[]
      gap=no_capdrop
      → CapDrop 비어있음 = CIS 5.3 갭(drop all 권고)
    verify:
      type: output_contains
      expect: 'gap=no_capdrop'
      field: stdout
      semantic: {intent: "capability", success_criteria: ["갭"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 ④ 실행 사용자 (W04, CIS 4.1)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W04, CIS 4.1) 컨테이너 내 uid 확인 — 0이면 gap=runs_as_root, 아니면 compliant=nonroot
      ssh ccc@10.20.32.80 id -u | grep -q '^0$' && echo "gap=runs_as_root" || echo "compliant=nonroot"
      # 2) 해석 — root(uid0) 실행 = CIS 4.1 갭
      # → root(uid0) 실행 = CIS 4.1 갭
      ```
      ## ✅ 합격 기준
      `gap=runs_as_root` 출력 시 통과. **근거:** 컨테이너 내 uid 0(root 실행) = CIS 4.1 갭.
    hint: 'root'
    category: manipulation
    points: 10
    answer: |
      # 1) (W04, CIS 4.1) 컨테이너 내 uid 확인 — 0이면 gap=runs_as_root, 아니면 compliant=nonroot
      ssh ccc@10.20.32.80 id -u | grep -q '^0$' && echo "gap=runs_as_root" || echo "compliant=nonroot"
      # 2) 해석 — root(uid0) 실행 = CIS 4.1 갭
      # → root(uid0) 실행 = CIS 4.1 갭
    answer_detail: "실행 사용자(W04) = root 실행 갭(CIS 4.1)."
    expected_output: |
      gap=runs_as_root
      → root(uid0) 실행 = CIS 4.1 갭
    verify:
      type: output_contains
      expect: 'gap=runs_as_root'
      field: stdout
      semantic: {intent: "user", success_criteria: ["root 갭"], acceptable_methods: ["**[OSS] docker exec (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 ⑤ 시크릿 노출 (W06)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W06) env 비밀 후보 개수를 세어 판정 — 1개 이상이면 gap=secret_in_env
      D=$(docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -ciE 'pass|secret|token|key|cred'); echo "env_secrets=$D"; [ "$D" -gt 0 ] && echo "gap=secret_in_env" || echo "compliant=no_env_secret"
      # 2) 해석 — env에 비밀(SSH_PASS) 노출 = 갭
      # → env 에 비밀(SSH_PASS) 노출 = 갭
      ```
      ## ✅ 합격 기준
      `gap=secret_in_env` 출력 시 통과. **근거:** env 비밀 후보가 1개 이상이면 비밀 노출 갭(SSH_PASS).
    hint: 'secret env'
    category: manipulation
    points: 12
    answer: |
      # 1) (W06) env 비밀 후보 개수를 세어 판정 — 1개 이상이면 gap=secret_in_env
      D=$(docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -ciE 'pass|secret|token|key|cred'); echo "env_secrets=$D"; [ "$D" -gt 0 ] && echo "gap=secret_in_env" || echo "compliant=no_env_secret"
      # 2) 해석 — env에 비밀(SSH_PASS) 노출 = 갭
      # → env 에 비밀(SSH_PASS) 노출 = 갭
    answer_detail: "시크릿(W06) = env 비밀 노출 갭(SSH_PASS)."
    expected_output: |
      env_secrets=1
      gap=secret_in_env
      → env 에 비밀(SSH_PASS) 노출 = 갭
    verify:
      type: output_contains
      expect: 'gap=secret_in_env'
      field: stdout
      semantic: {intent: "시크릿", success_criteria: ["env 노출"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 ⑥ 격리 (W05)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W05) 컨테이너 PID1 namespace 목록을 한 줄로 표시 → 끝에 ns_ok(자체 namespace 격리 확인)
      ssh ccc@10.20.32.80 "ls /proc/1/ns/ | tr '\n' ' '"; echo; echo ns_ok
      # 2) 해석 — 자체 namespace 격리(준수), 단 공유 커널 한계
      # → 자체 namespace 격리(준수). 단 공유 커널 한계
      ```
      ## ✅ 합격 기준
      `ns_ok` 출력 시 통과. **근거:** namespace 목록과 ns_ok 가 나오면 자체 namespace 격리(준수)를 확인한 것.
    hint: 'namespace'
    category: analysis
    points: 10
    answer: |
      # 1) (W05) 컨테이너 PID1 namespace 목록을 한 줄로 표시 → 끝에 ns_ok(자체 namespace 격리 확인)
      ssh ccc@10.20.32.80 "ls /proc/1/ns/ | tr '\n' ' '"; echo; echo ns_ok
      # 2) 해석 — 자체 namespace 격리(준수), 단 공유 커널 한계
      # → 자체 namespace 격리(준수). 단 공유 커널 한계
    answer_detail: "격리(W05) = namespace 격리 확인(준수)."
    expected_output: |
      cgroup ipc mnt net pid pid_for_children time time_for_children user uts
      ns_ok
      → 자체 namespace 격리(준수). 단 공유 커널 한계
    verify:
      type: output_contains
      expect: 'ns_ok'
      field: stdout
      semantic: {intent: "격리", success_criteria: ["namespace"], acceptable_methods: ["**[OSS] /proc/ns (권장)**"]}
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 ⑦ 네트워크 (W07)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (W07) el34-web 소속 네트워크를 나열 → 끝에 nets_ok(4-tier 분리 소속 확인)
      docker inspect el34-web --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'; echo nets_ok
      # 2) 해석 — 4-tier 분리(준수), web 은 dmz/int 다리
      # → 4-tier 분리(준수). web 은 dmz/int 다리
      ```
      ## ✅ 합격 기준
      `nets_ok` 출력 시 통과. **근거:** 소속 네트워크와 nets_ok 가 나오면 4-tier 분리 소속(준수)을 확인한 것.
    hint: 'network'
    category: analysis
    points: 10
    answer: |
      # 1) (W07) el34-web 소속 네트워크를 나열 → 끝에 nets_ok(4-tier 분리 소속 확인)
      docker inspect el34-web --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'; echo nets_ok
      # 2) 해석 — 4-tier 분리(준수), web 은 dmz/int 다리
      # → 4-tier 분리(준수). web 은 dmz/int 다리
    answer_detail: "네트워크(W07) = 4-tier 분리 소속 확인(준수)."
    expected_output: |
      el34-dmz el34-int
      nets_ok
      → 4-tier 분리(준수). web 은 dmz/int 다리
    verify:
      type: output_contains
      expect: 'nets_ok'
      field: stdout
      semantic: {intent: "네트워크", success_criteria: ["분리"], acceptable_methods: ["**[OSS] docker inspect (권장)**"]}
    target_vm: web

  - order: 9
    instruction: |
      ## 🎯 ⑧ docker.sock 권한 (CIS 3.15)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (CIS 3.15) 컨테이너 내부에 docker.sock 마운트 여부 확인 → 끝에 sock_checked(미마운트가 양호)
      ssh ccc@10.20.32.80 "ls -la /var/run/docker.sock >/dev/null 2>&1 || echo no_sock_in_container"; echo sock_checked
      # 2) 해석 — 컨테이너에 docker.sock 미마운트=양호(마운트 시 컨테이너→호스트 docker 장악 위험)
      # → 컨테이너에 docker.sock 마운트 안 됨=양호(마운트 시 컨테이너→호스트 docker 장악 위험)
      ```
      ## ✅ 합격 기준
      `sock_checked` 출력 시 통과. **근거:** docker.sock 점검 결과와 sock_checked 가 나오면 컨테이너에 sock
      미마운트(양호)를 확인한 것 — 마운트되면 컨테이너가 호스트 docker 를 제어하는 escape 경로다.
    hint: 'docker.sock'
    category: manipulation
    points: 10
    answer: |
      # 1) (CIS 3.15) 컨테이너 내부에 docker.sock 마운트 여부 확인 → 끝에 sock_checked(미마운트가 양호)
      ssh ccc@10.20.32.80 "ls -la /var/run/docker.sock >/dev/null 2>&1 || echo no_sock_in_container"; echo sock_checked
      # 2) 해석 — 컨테이너에 docker.sock 미마운트=양호(마운트 시 컨테이너→호스트 docker 장악 위험)
      # → 컨테이너에 docker.sock 마운트 안 됨=양호(마운트 시 컨테이너→호스트 docker 장악 위험)
    answer_detail: "docker.sock(CIS 3.15) = 컨테이너 내 미마운트가 양호. 마운트되면 컨테이너가 호스트 docker 를 제어 = escape 경로."
    expected_output: |
      no_sock_in_container
      sock_checked
      → 컨테이너에 docker.sock 마운트 안 됨=양호(마운트 시 컨테이너→호스트 docker 장악 위험)
    verify:
      type: output_contains
      expect: 'sock_checked'
      field: stdout
      semantic: {intent: "docker.sock", success_criteria: ["sock 점검"], acceptable_methods: ["**[OSS] docker exec (권장)**"]}
    target_vm: web

  - order: 10
    instruction: |
      ## 🎯 종합 기준선 보고서
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) heredoc(<<'EOF' ... EOF)으로 기준선 감사 보고서를 출력 — 준수/갭/우선순위 종합
      cat > ~/cloud-container_w08_note1.md <<'EOF'
      # 클라우드·컨테이너 W08 기준선 감사 보고서
      ## 1. 준수: 특권 없음(CIS 5.4), namespace 격리(W05), 4-tier 네트워크 분리(W07), docker.sock 미마운트(3.15)
      ## 2. 갭: 이미지 HIGH 취약점(W03), CapDrop 비어있음(CIS 5.3), root 실행(CIS 4.1), env 비밀 SSH_PASS(W06)
      ## 3. 우선순위: ①env 비밀 즉시 rotation ②root→비-root+cap drop ALL ③이미지 갱신/재빌드 ④healthcheck 추가
      ## 결론: 격리·분리·특권은 양호하나 root 실행·cap 미드롭·env 비밀·이미지 CVE 가 핵심 갭. 최소권한+시크릿 외부주입 우선
      EOF
      cat ~/cloud-container_w08_note1.md
