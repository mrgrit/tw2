lab_id: standalone-cloud-container-week07
title: "컨테이너 네트워크 보안 — 분리·노출 포트 점검"
version: standalone-cloud-container
course: cloud-container
week: 7
description: |
  컨테이너 네트워크 보안 — docker network 로 네트워크 분리(segmentation)와 컨테이너 소속·노출 포트를
  점검한다. el34 는 4-tier(ext/pipe/dmz/int)를 docker 네트워크로 구현. 동서(east-west) 트래픽 제어와
  최소 노출을 다룬다. 명령은 el34 호스트 docker CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W06 통과"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(네트워크 분리) §4(노출 포트) 숙지"
objectives:
  - "docker 네트워크 분리(segmentation) 확인"
  - "컨테이너 소속·노출 포트 점검"
  - "동서 트래픽 제어·최소 노출 방어"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 대상 확인
      네트워크 점검 대상(el34-web)을 확인한다.
      ## 📖 개념 한 줄
      컨테이너 네트워크 보안 = 어떤 컨테이너가 어떤 네트워크에 붙어 누구와 통신 가능한지(분리)와, 외부에
      무엇을 노출하는지(포트)를 통제하는 것.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web 상태 확인 → 끝에 target_ok(네트워크 점검 대상 가동 확인)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** state=running 과 target_ok 가 나오면 네트워크 점검 대상이 떠 있는 것.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      # 1) el34-web 상태 확인 → 끝에 target_ok(네트워크 점검 대상 가동 확인)
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
    answer_detail: "네트워크 점검 대상 = el34-web. 네트워크 보안 = 분리(누구와 통신)+노출(외부에 무엇)."
    expected_output: |
      state=running
      target_ok
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 확인"
        success_criteria: ["가동"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 네트워크 목록 (분리)
      호스트의 docker 네트워크를 나열해 분리 구조를 본다.
      ## 📖 개념 한 줄
      docker 네트워크는 컨테이너 그룹을 격리한다 — 같은 네트워크의 컨테이너만 서로 직접 통신할 수 있다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 호스트의 docker 네트워크를 이름·드라이버로 나열 → 끝에 nets_listed(분리 구조 확인)
      docker network ls --format '{{.Name}} {{.Driver}}'; echo nets_listed
      # 2) 해석 — el34-ext/pipe/dmz/int = 4-tier 분리, 같은 네트워크끼리만 직접 통신(segmentation)
      echo "→ el34-ext/pipe/dmz/int = 4-tier 분리. 같은 네트워크끼리만 직접 통신(segmentation)"
      ```
      ## ✅ 합격 기준
      `nets_listed` 출력 시 통과. **근거:** 네트워크 목록(el34-ext/pipe/dmz/int 등)과 nets_listed 가 나오면
      4-tier 분리 구조를 확인한 것.
      ## 🔧 도구 풀이
      - `docker network ls` — 정의된 네트워크 목록. el34 는 4-tier 를 별도 네트워크로 분리.
    hint: 'docker network ls'
    category: recon
    points: 14
    answer: |
      # 1) 호스트의 docker 네트워크를 이름·드라이버로 나열 → 끝에 nets_listed(분리 구조 확인)
      docker network ls --format '{{.Name}} {{.Driver}}'; echo nets_listed
      # 2) 해석 — el34-ext/pipe/dmz/int = 4-tier 분리, 같은 네트워크끼리만 직접 통신(segmentation)
      echo "→ el34-ext/pipe/dmz/int = 4-tier 분리. 같은 네트워크끼리만 직접 통신(segmentation)"
    answer_detail: "네트워크 목록 = docker network ls. el34 는 4-tier(ext/pipe/dmz/int)를 별도 bridge 네트워크로 분리 — 같은 네트워크 컨테이너만 직접 통신."
    expected_output: |
      bridge bridge
      el34-dmz bridge
      el34-ext bridge
      el34-int bridge
      el34-pipe bridge
      el34_default bridge
      host host
      none null
      nets_listed
      → el34-ext/pipe/dmz/int = 4-tier 분리. 같은 네트워크끼리만 직접 통신(segmentation)
    verify:
      type: output_contains
      expect: 'nets_listed'
      field: stdout
      semantic:
        intent: "네트워크 목록"
        success_criteria: ["분리 구조"]
        acceptable_methods: ["**[OSS] docker network (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 컨테이너 네트워크 소속
      el34-web 이 어떤 네트워크에 붙어 있는지 본다.
      ## 📖 개념 한 줄
      한 컨테이너가 여러 네트워크에 동시에 붙으면 그 네트워크들 사이의 다리(bridge)가 된다 — web 은 dmz 와
      int 를 잇는다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web이 붙은 네트워크와 각 IP를 나열 → 끝에 nets_membership(여러 개면 tier 간 다리)
      docker inspect el34-web --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}={{$v.IPAddress}} {{end}}'; echo nets_membership
      # 2) 해석 — web이 dmz/int 두 네트워크에 붙으면 두 tier의 다리, 다리 컨테이너는 침해 시 영향 큼
      echo "→ web 이 dmz/int 두 네트워크에 붙으면 두 tier 의 다리. 다리 컨테이너는 침해 시 영향 큼"
      ```
      ## ✅ 합격 기준
      `nets_membership` 출력 시 통과. **근거:** 소속 네트워크와 IP(예: el34-dmz/el34-int)와 nets_membership 이
      나오면 web 이 tier 간 다리임이 확인된다(다리는 침해 시 영향 커 소속 최소화 권고).
      ## 🔧 도구 풀이
      - `.NetworkSettings.Networks` — 컨테이너가 붙은 네트워크와 각 IP. 여러 개면 네트워크 간 다리.
    hint: '네트워크 소속'
    category: manipulation
    points: 12
    answer: |
      # 1) el34-web이 붙은 네트워크와 각 IP를 나열 → 끝에 nets_membership(여러 개면 tier 간 다리)
      docker inspect el34-web --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}={{$v.IPAddress}} {{end}}'; echo nets_membership
      # 2) 해석 — web이 dmz/int 두 네트워크에 붙으면 두 tier의 다리, 다리 컨테이너는 침해 시 영향 큼
      echo "→ web 이 dmz/int 두 네트워크에 붙으면 두 tier 의 다리. 다리 컨테이너는 침해 시 영향 큼"
    answer_detail: "네트워크 소속 = NetworkSettings.Networks. web 이 여러 네트워크(dmz/int)에 붙으면 tier 간 다리 — 침해 시 양쪽 영향. 소속은 최소화 권고."
    expected_output: |
      el34-dmz=10.20.32.80 el34-int=10.20.40.80
      nets_membership
      → web 이 dmz/int 두 네트워크에 붙으면 두 tier 의 다리. 다리 컨테이너는 침해 시 영향 큼
    verify:
      type: output_contains
      expect: 'nets_membership'
      field: stdout
      semantic:
        intent: "네트워크 소속"
        success_criteria: ["소속 네트워크"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 노출 포트 점검
      외부로 매핑된(publish) 포트를 점검한다.
      ## 📖 개념 한 줄
      `-p` 로 호스트에 매핑된 포트만 외부에서 접근 가능 — 노출 포트는 최소화해야 공격 표면이 작다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web의 컨테이너↔호스트 포트 매핑을 JSON으로 확인 → 끝에 ports_checked(매핑된 것만 외부 접근)
      docker inspect el34-web --format '{{json .NetworkSettings.Ports}}'; echo ports_checked
      # 2) 해석 — 호스트로 매핑된(publish) 포트만 외부 접근 가능, 불필요 노출은 표면 증가 → 최소화
      echo "→ 호스트로 매핑된(publish) 포트만 외부 접근 가능. 불필요한 노출은 표면 증가 → 최소화"
      ```
      ## ✅ 합격 기준
      `ports_checked` 출력 시 통과. **근거:** 포트 매핑 정보와 ports_checked 가 나오면 외부 노출 포트를
      점검한 것(매핑된 것만 외부 접근 — 최소 노출이 표면 축소).
      ## 🔧 도구 풀이
      - `.NetworkSettings.Ports` — 컨테이너 포트↔호스트 포트 매핑. 매핑된 것만 외부 접근 가능.
    hint: '노출 포트'
    category: manipulation
    points: 12
    answer: |
      # 1) el34-web의 컨테이너↔호스트 포트 매핑을 JSON으로 확인 → 끝에 ports_checked(매핑된 것만 외부 접근)
      docker inspect el34-web --format '{{json .NetworkSettings.Ports}}'; echo ports_checked
      # 2) 해석 — 호스트로 매핑된(publish) 포트만 외부 접근 가능, 불필요 노출은 표면 증가 → 최소화
      echo "→ 호스트로 매핑된(publish) 포트만 외부 접근 가능. 불필요한 노출은 표면 증가 → 최소화"
    answer_detail: "노출 포트 = NetworkSettings.Ports(컨테이너↔호스트 매핑). 매핑된 포트만 외부 접근 — 최소 노출이 표면 축소의 핵심."
    expected_output: |
      {"22/tcp":null,"443/tcp":null,"80/tcp":null,"8080/tcp":[{"HostIp":"192.168.136.145","HostPort":"8083"}]}
      ports_checked
      → 호스트로 매핑된(publish) 포트만 외부 접근 가능. 불필요한 노출은 표면 증가 → 최소화
    verify:
      type: output_contains
      expect: 'ports_checked'
      field: stdout
      semantic:
        intent: "노출 포트 점검"
        success_criteria: ["포트 매핑"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 분리(segmentation) 의미
      4-tier 네트워크 분리가 왜 보안에 중요한지 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34 4-tier 구조 정리(ext→pipe→dmz→int)
      echo "el34 4-tier: ext(외부 발판) → pipe → dmz(web/ips/siem) → int(내부 앱)"
      # 2) 분리 효과 — int 내부 앱은 ext에서 직접 도달 불가, 반드시 web/ips 경유
      echo "분리 효과: int 의 내부 앱은 ext 에서 직접 도달 불가, 반드시 web/ips 경유"
      # 3) 결론 — 한 tier 침해가 자동 확산되지 않음(east-west 차단), 평면 네트워크면 한 번에 전체 노출
      echo "→ 한 tier 침해가 다른 tier 로 자동 확산되지 않음(east-west 차단). 평면 네트워크면 한 번에 전체 노출"
      # 4) 분리 의미 정리 완료 표식
      echo "segmentation_explained"
      ```
      ## ✅ 합격 기준
      `segmentation_explained` 출력 시 통과. **근거:** 4-tier 분리가 침해의 동서(east-west) 확산을 차단한다는
      의미가 정리되면 통과(평면 네트워크는 한 번에 전체 노출).
    hint: 'segmentation'
    category: analysis
    points: 12
    answer: |
      # 1) el34 4-tier 구조 정리(ext→pipe→dmz→int)
      echo "el34 4-tier: ext(외부 발판) → pipe → dmz(web/ips/siem) → int(내부 앱)"
      # 2) 분리 효과 — int 내부 앱은 ext에서 직접 도달 불가, 반드시 web/ips 경유
      echo "분리 효과: int 의 내부 앱은 ext 에서 직접 도달 불가, 반드시 web/ips 경유"
      # 3) 결론 — 한 tier 침해가 자동 확산되지 않음(east-west 차단), 평면 네트워크면 한 번에 전체 노출
      echo "→ 한 tier 침해가 다른 tier 로 자동 확산되지 않음(east-west 차단). 평면 네트워크면 한 번에 전체 노출"
      # 4) 분리 의미 정리 완료 표식
      echo "segmentation_explained"
    answer_detail: "분리 = 침해의 동서(east-west) 확산 차단. 4-tier 로 int 내부 앱을 ext 에서 격리 → 한 컨테이너 침해가 전체로 번지지 않음. 평면 네트워크는 위험."
    expected_output: |
      el34 4-tier: ext(외부 발판) → pipe → dmz(web/ips/siem) → int(내부 앱)
      분리 효과: int 의 내부 앱은 ext 에서 직접 도달 불가, 반드시 web/ips 경유
      → 한 tier 침해가 다른 tier 로 자동 확산되지 않음(east-west 차단). 평면 네트워크면 한 번에 전체 노출
      segmentation_explained
    verify:
      type: output_contains
      expect: 'segmentation_explained'
      field: stdout
      semantic:
        intent: "분리 의미"
        success_criteria: ["east-west 차단"]
        acceptable_methods: ["**[관리적] 분리 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 네트워크 위협
      컨테이너 네트워크 관련 위협을 정리한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 기본 bridge 위협 — 같은 네트워크 컨테이너끼리 무제한 통신(한 컨테이너 침해→이웃 측면 이동)
      echo "1) 기본 bridge: 같은 네트워크의 컨테이너끼리 무제한 통신(한 컨테이너 침해→이웃 측면 이동)"
      # 2) --net=host 위협 — 네트워크 격리 없음, 호스트 포트 직접 노출
      echo "2) --net=host: 네트워크 격리 없음, 호스트 포트 직접 노출"
      # 3) 과다 노출 포트(-p) — 불필요한 외부 접근면
      echo "3) 과다 노출 포트(-p): 불필요한 외부 접근면"
      # 4) 내부 서비스(DB) 분리 없이 노출
      echo "4) 내부 서비스(DB)가 분리 없이 같은 네트워크에 노출"
      # 5) 결론 — 평면/과노출 네트워크가 측면 이동의 고속도로
      echo "→ 평면/과노출 네트워크가 측면 이동의 고속도로"
      ```
      ## ✅ 합격 기준
      `측면 이동` 출력 시 통과. **근거:** 기본 bridge 무제한 통신·host 네트워크·과다 노출이 측면 이동
      (east-west) 경로가 됨이 정리되면 통과.
    hint: '네트워크 위협'
    category: analysis
    points: 10
    answer: |
