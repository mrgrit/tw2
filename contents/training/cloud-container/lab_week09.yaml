course: cloud-container
week: 9
description: |
  CIS Docker Benchmark — 컨테이너 런타임(W04)을 넘어 Docker 데몬·호스트 구성을 점검한다. docker.sock
  권한(CIS 3.15), daemon.json 설정, 컨테이너 healthcheck(CIS 5.26)·restart policy 를 기준 대조한다.
  명령은 el34 호스트 docker CLI/파일 점검. 신규 설치 없음. 읽기 전용 점검.
