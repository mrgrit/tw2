    instruction: |
      ## 🎯 목표 — Restart Policy
      ## 📖 개념 한 줄
      재시작 정책은 가용성·복원력 통제다. `unless-stopped`/`on-failure` 는 비정상 종료 시 자동 복구.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 재시작 정책 판정 — unless-stopped/on-failure/always면 compliant, 그 외 gap=no_restart
      R=$(docker inspect el34-web --format '{{.HostConfig.RestartPolicy.Name}}'); echo "restart=$R"; case "$R" in unless-stopped|on-failure|always) echo "compliant=restart_$R";; *) echo "gap=no_restart";; esac
      # 2) 해석 — unless-stopped = 비정상 종료 시 자동 복구(복원력 준수)
      echo "→ unless-stopped = 비정상 종료 시 자동 복구(복원력 준수)"
