  - order: 2
    instruction: |
      ## 🎯 목표 — docker.sock 권한 (CIS 3.15)
      ## 📖 개념 한 줄
      `/var/run/docker.sock` 은 docker 데몬 제어 소켓 — 이걸 쥐면 호스트의 모든 컨테이너를 제어한다.
      소유 root, 그룹 docker, 권한 660(others 접근 불가)이어야 한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) docker.sock 권한 표시 후 판정 — stat로 8진수 권한을 받아 660/600이면 compliant, 그 외 gap
      ls -la /var/run/docker.sock; P=$(stat -c '%a' /var/run/docker.sock 2>/dev/null); case "$P" in 660|600) echo "compliant=sock_$P";; *) echo "gap=sock_$P";; esac
      # 2) 해석 — 660(root:docker)=준수, docker.sock은 데몬 제어=사실상 호스트 root 권한
      echo "→ 660(root:docker)=준수. docker.sock 은 데몬 제어 = 사실상 호스트 root 권한"
      ```
      ## ✅ 합격 기준
      `compliant=sock` 출력 시 통과. **근거:** 권한이 660(또는 600)이면 root:docker rw·others 없음으로 CIS
      3.15 준수 — 666 등 others 쓰기 가능이면 치명 갭이다.
      ## 🔧 도구 풀이
      - `stat -c '%a'` — 8진수 권한. 660=root:docker rw, others 없음(CIS 3.15 준수). 666 등이면 갭.
    hint: 'docker.sock'
    category: manipulation
    points: 14
    answer: |
      # 1) docker.sock 권한 표시 후 판정 — stat로 8진수 권한을 받아 660/600이면 compliant, 그 외 gap
      ls -la /var/run/docker.sock; P=$(stat -c '%a' /var/run/docker.sock 2>/dev/null); case "$P" in 660|600) echo "compliant=sock_$P";; *) echo "gap=sock_$P";; esac
      # 2) 해석 — 660(root:docker)=준수, docker.sock은 데몬 제어=사실상 호스트 root 권한
      echo "→ 660(root:docker)=준수. docker.sock 은 데몬 제어 = 사실상 호스트 root 권한"
    answer_detail: "docker.sock(CIS 3.15) = 660 root:docker 준수. 이 소켓 접근=전 컨테이너 제어=호스트 장악. world-writable(666)이면 치명 갭."
    verify:
      type: output_contains
      expect: 'compliant=sock'
      field: stdout
      semantic: {intent: "docker.sock 권한", success_criteria: ["660 준수"], acceptable_methods: ["**[OSS] stat (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — Docker 데몬 설정 (daemon.json)
      ## 📖 개념 한 줄
      `/etc/docker/daemon.json` 은 데몬 전역 보안 옵션(userland-proxy, live-restore, icc, userns-remap 등)을
      담는다. CIS 는 여러 데몬 옵션을 권고한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) /etc/docker/daemon.json 의 보안 옵션 앞 8줄 확인(부재면 no_daemon_json) → 끝에 daemon_checked
      cat /etc/docker/daemon.json 2>/dev/null | head -8 || echo no_daemon_json; echo daemon_checked
      # 2) 해석 — daemon.json의 icc/userns-remap/live-restore 등 CIS 권고 옵션 확인
      echo "→ daemon.json 의 보안 옵션 점검. icc/userns-remap/live-restore 등 CIS 권고 항목 확인"
      ```
      ## ✅ 합격 기준
      `daemon_checked` 출력 시 통과. **근거:** daemon.json 내용(또는 부재)과 daemon_checked 가 나오면 데몬
      전역 옵션을 점검한 것(부재 시 기본값 동작 — CIS 권고 옵션 미설정 가능).
      ## 🔧 도구 풀이
      - daemon.json 부재 시 데몬은 기본값으로 동작 — CIS 권고 옵션(icc=false 등)이 미설정일 수 있다.
    hint: 'daemon.json'
    category: manipulation
    points: 12
    answer: |
      # 1) /etc/docker/daemon.json 의 보안 옵션 앞 8줄 확인(부재면 no_daemon_json) → 끝에 daemon_checked
      cat /etc/docker/daemon.json 2>/dev/null | head -8 || echo no_daemon_json; echo daemon_checked
      # 2) 해석 — daemon.json의 icc/userns-remap/live-restore 등 CIS 권고 옵션 확인
      echo "→ daemon.json 의 보안 옵션 점검. icc/userns-remap/live-restore 등 CIS 권고 항목 확인"
    answer_detail: "데몬 설정(daemon.json) = 전역 보안 옵션. CIS 는 icc=false(컨테이너 간 기본 통신 차단)·userns-remap·live-restore 등 권고. 부재면 기본값."
