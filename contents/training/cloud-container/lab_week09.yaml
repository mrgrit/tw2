      ```bash
      # 1) healthcheck 설정 여부 판정 — 없으면 gap=no_healthcheck(CIS 5.26), 있으면 compliant=healthcheck
      H=$(docker inspect el34-web --format '{{if .Config.Healthcheck}}yes{{else}}none{{end}}'); echo "healthcheck=$H"; [ "$H" = "none" ] && echo "gap=no_healthcheck" || echo "compliant=healthcheck"
      # 2) 해석 — healthcheck 없음 = CIS 5.26 갭(비정상 컨테이너 자동 감지 불가)
      echo "→ healthcheck 없음 = CIS 5.26 갭. 비정상 컨테이너를 자동 감지 못 함"
      ```
      ## ✅ 합격 기준
      `gap=no_healthcheck` 출력 시 통과. **근거:** el34-web 은 healthcheck 없음 = CIS 5.26 갭(비정상 컨테이너
      자동 감지·교체 불가 → HEALTHCHECK 지시어 권고).
    hint: 'healthcheck'
