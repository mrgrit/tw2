lab_id: standalone-cloud-container-week01
title: "컨테이너 보안 개론 — 식별·격리·4계층·기본 점검"
version: standalone-cloud-container
course: cloud-container
week: 1
description: |
  컨테이너 보안 개론 점검 실습. 컨테이너는 호스트 커널을 공유해(shared kernel) VM 보다 격리가 얕고,
  설정 하나(특권·root·과한 권한)가 container escape 로 호스트 전체를 위협할 수 있다. 본 실습에서
  학생은 점검자(auditor) 관점으로 (1) docker 가용 확인 → (2) 컨테이너 식별(docker ps, el34 41 컨테이너)
  → (3) 컨테이너 vs VM 격리 차이 정리 → (4) 보안 4계층(NIST SP 800-190: 이미지·런타임·레지스트리·
  오케스트레이션) 정리 → (5) 공유 커널 위험(특권·root·과한 capability) 정리 → (6) docker inspect 로
  el34-web 런타임 기본 점검(Privileged=false 양호 + User 비어 root 실행 = CIS Docker Benchmark 4.1 갭)
  → (7) 최소권한 방어 개요 → (8) 개론 보고서 순으로 진행한다. 핵심 산출물은 미션 6 의 gap=runs_as_root
  발견이다. 모든 명령은 el34 호스트(ssh ccc@{{TARGET_IP}})의 docker CLI 로 실행하며 신규 설치는 없고,
  읽기 전용 점검만 한다(설정 변경 금지). 표준: CIS Docker Benchmark / NIST SP 800-190.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "el34 호스트 SSH 접속(ssh ccc@{{TARGET_IP}}, 비밀번호 1)"
  - "docker CLI 사용 권한(ccc 계정)"
  - "lecture §0.5(컨테이너 vs VM·공유 커널·escape·capability·docker inspect) 숙지"
  - "lecture §4(보안 4계층) §5(공유 커널 위험) §6(기본 점검 root 갭) 숙지"
objectives:
  - "docker ps 로 실행 중 컨테이너를 식별·집계해 점검 범위를 확정한다"
  - "컨테이너(커널 공유=얕은 격리) vs VM(별도 OS=강한 격리) 차이를 설명한다"
  - "컨테이너 보안 4계층(NIST 800-190)과 각 계층의 통제를 정리한다"
  - "공유 커널 위험(특권·root·과한 capability)이 escape 로 이어지는 이유를 설명한다"
  - "docker inspect 로 el34-web 의 root 실행 갭(CIS Docker 4.1)을 증적과 함께 판정한다"
  - "최소권한 기반 컨테이너 방어(비-root·특권금지·cap 최소·읽기전용FS)를 정리한다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표
      모든 컨테이너 보안 점검의 도구인 `docker` CLI 가 el34 호스트에서 동작하는지부터 확인한다.
      도구가 안 되면 이후 점검이 무의미하므로, 본격 점검 전 환경 가동을 검증하는 단계다.

      ## 개념 한 줄
      `docker` 는 컨테이너를 만들고·실행하고·점검하는 명령줄 도구다. 본 주차의 모든 점검(`docker ps`,
      `docker inspect`)이 이 CLI 로 이뤄진다. 점검은 호스트(ssh ccc@{{TARGET_IP}})에서 한다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) docker CLI 가용 확인 — 서버 버전을 docker= 형식으로(조회 실패해도 docker_ok 출력)
      docker version --format 'docker={{.Server.Version}}' 2>/dev/null || echo docker_ok
      # 2) 가용성 표식 한 번 더 출력(CLI 접근 확인)
      echo docker_ok
      ```

      ## ✅ 합격 기준
      `docker` 출력 시 통과. **근거:** 서버 버전(docker=...) 또는 `docker_ok` 가 나오면 docker CLI 접근이
      확인된 것 — 이후 모든 점검(docker ps/inspect)의 전제다.

      ## 도구 풀이
      - `docker version` — docker 클라이언트·서버의 버전을 출력한다.
      - `--format '...'` — Go 템플릿으로 원하는 필드(여기선 `.Server.Version`)만 뽑는다.
      - `2>/dev/null || echo docker_ok` — 버전 조회가 실패해도 `docker_ok` 를 출력해 가용성만 확인한다.
    hint: 'docker version'
    category: survey
    points: 10
    answer: |
      # 1) docker CLI 가용 확인 — 서버 버전을 docker= 형식으로(조회 실패해도 docker_ok 출력)
      docker version --format 'docker={{.Server.Version}}' 2>/dev/null || echo docker_ok
      # 2) 가용성 표식 한 번 더 출력(CLI 접근 확인)
      echo docker_ok
    answer_detail: "컨테이너 보안 점검의 도구 = el34 호스트의 docker CLI. 본 미션은 본격 점검 전 docker 가용성(CLI 접근·서버 응답)을 확인하는 전제 단계다. 출력에 docker(버전 또는 docker_ok)가 나오면 점검 환경이 준비된 것."
    verify:
      type: output_contains
      expect: 'docker'
      field: stdout
      semantic:
        intent: "docker 가용"
        success_criteria: ["CLI 접근"]
        acceptable_methods: ["**[OSS] docker (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표
      호스트에서 **무엇이 실행 중인가**(컨테이너 수·이름)를 집계해 점검 범위를 확정한다. 보안 점검의
      1 단계는 자산 인벤토리 — 모르는 것은 지킬 수 없다.

      ## 개념 한 줄
      `docker ps` 는 실행 중인 컨테이너를 나열한다. el34 는 단일 VM 위에 41 개 컨테이너(web/ips/siem/
      fw/attacker 등)가 돌며, 이 목록이 곧 본 주차에 점검할 대상의 범위다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 중 컨테이너 수를 세어 containers= 형식으로 집계(docker ps -q 는 ID만, wc -l 로 줄 수)
      echo "containers=$(docker ps -q | wc -l)"
      # 2) 컨테이너 이름을 앞 10개까지 나열(무엇이 도는지 식별)
      docker ps --format '{{.Names}}' | head -10
      # 3) 해석 — el34는 다수 컨테이너(web/ips/siem/fw/attacker 등), 식별이 점검 출발점
      echo "→ el34는 다수 컨테이너(web/ips/siem/fw/attacker 등). 무엇이 도는지 파악이 출발점"
      ```

      ## ✅ 합격 기준
      `containers=` 출력 시 통과. **근거:** `containers=` 와 집계 값 + 컨테이너 이름이 나열되면 실행 중
      컨테이너를 식별·집계한 것(점검 범위 확정).

      ## 도구 풀이
      - `docker ps -q` — `-q`(quiet)는 컨테이너 ID 만 한 줄씩 출력한다.
      - `| wc -l` — 줄 수를 세어 실행 중 컨테이너 수를 구한다.
      - `--format '{{.Names}}'` — 컨테이너 이름만 뽑는 Go 템플릿. `head -10` 으로 앞 10 개만 본다.
    hint: 'docker ps'
    category: recon
    points: 14
    answer: |
      # 1) 실행 중 컨테이너 수를 세어 containers= 형식으로 집계(docker ps -q 는 ID만, wc -l 로 줄 수)
      echo "containers=$(docker ps -q | wc -l)"
      # 2) 컨테이너 이름을 앞 10개까지 나열(무엇이 도는지 식별)
      docker ps --format '{{.Names}}' | head -10
      # 3) 해석 — el34는 다수 컨테이너(web/ips/siem/fw/attacker 등), 식별이 점검 출발점
      echo "→ el34는 다수 컨테이너(web/ips/siem/fw/attacker 등). 무엇이 도는지 파악이 출발점"
    answer_detail: "컨테이너 식별(점검 1단계 = 자산 인벤토리) = docker ps. 실행 중 컨테이너의 수(docker ps -q | wc -l)와 이름 목록이 곧 보안 점검의 범위다. el34 는 41 컨테이너(web/ips/siem/fw/attacker 등)가 단일 호스트에서 돈다. 무엇이 도는지 모르면 어느 것이 특권·root·외부 포트로 떠 있는지도 알 수 없으므로, 식별이 모든 점검의 출발점이다."
    verify:
      type: output_contains
      expect: 'containers='
      field: stdout
      semantic:
        intent: "컨테이너 식별"
        success_criteria: ["목록/집계"]
        acceptable_methods: ["**[OSS] docker ps (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표
      컨테이너 보안의 모든 통제가 출발하는 전제 — **컨테이너와 VM 의 격리 차이** — 를 명확히 정리한다.
      왜 컨테이너에만 추가 설정 통제(특권 금지·비-root)가 필요한지의 근거다.

      ## 개념 한 줄
      VM 은 하이퍼바이저 위에 **별도 게스트 OS(커널 포함)** 를 통째로 올려 격리가 두껍지만 무겁다.
      컨테이너는 **호스트 커널을 공유**하고 namespace/cgroups 로 프로세스만 격리해 가볍지만 격리가 얕다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) VM의 격리 특성 — 하드웨어 가상화 + 게스트 OS 별도(강한 격리, 무겁다)
      echo "VM: 하드웨어 가상화 + 게스트 OS 별도 → 강한 격리, 무겁다"
      # 2) 컨테이너의 격리 특성 — 호스트 커널 공유 + 프로세스 격리(가볍다, 격리 얕다)
      echo "컨테이너: 호스트 커널 공유 + 프로세스 격리 → 가볍다, 격리 얕다"
      # 3) 결론 — 컨테이너 보안 = 얕은 격리를 설정(특권/권한/user)으로 보강
      echo "→ 컨테이너 보안 = 얕은 격리를 설정(특권/권한/user)으로 보강"
      ```

      ## ✅ 합격 기준
      `커널` 출력 시 통과. **근거:** 출력에 커널(공유)이 들어가 컨테이너와 VM 의 격리 차이가 정리되면,
      컨테이너에 추가 설정 보강이 필요한 근거가 선다.

      ## 용어 풀이
      - **커널(kernel)** — OS 의 핵심(프로세스·메모리·장치 관리). 컨테이너는 호스트의 커널 하나를 공유.
      - **namespace/cgroups** — 컨테이너별 격리(이름공간 분리)와 자원 제한을 거는 Linux 커널 기능.
      - 핵심: 컨테이너의 얕은 격리를 **설정(특권/권한/user)으로 보강**하는 것이 컨테이너 보안이다.
    hint: '커널 공유'
    category: analysis
    points: 12
    answer: |
      # 1) VM의 격리 특성 — 하드웨어 가상화 + 게스트 OS 별도(강한 격리, 무겁다)
      echo "VM: 하드웨어 가상화 + 게스트 OS 별도 → 강한 격리, 무겁다"
      # 2) 컨테이너의 격리 특성 — 호스트 커널 공유 + 프로세스 격리(가볍다, 격리 얕다)
      echo "컨테이너: 호스트 커널 공유 + 프로세스 격리 → 가볍다, 격리 얕다"
      # 3) 결론 — 컨테이너 보안 = 얕은 격리를 설정(특권/권한/user)으로 보강
      echo "→ 컨테이너 보안 = 얕은 격리를 설정(특권/권한/user)으로 보강"
    answer_detail: "핵심 차이는 커널을 공유하느냐다. 컨테이너 = 호스트 커널 공유 + namespace/cgroups 로 프로세스 격리(가볍지만 격리 얕음). VM = 하이퍼바이저 위 별도 게스트 OS(커널 포함, 무겁지만 격리 강함). 컨테이너의 얕은 격리 때문에 특권 금지·비-root 같은 추가 설정 보강이 필요하다 — 이것이 컨테이너 보안의 출발 전제다. 출력에 커널(공유)이 들어가면 차이를 정리한 것."
    verify:
      type: output_contains
      expect: '커널'
      field: stdout
      semantic:
        intent: "컨테이너 vs VM"
        success_criteria: ["격리 차이"]
        acceptable_methods: ["**[표준] 개념 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표
      컨테이너 위협을 **빠짐없이 훑을 체크포인트**로 나눈다. NIST SP 800-190 의 보안 4계층(이미지·
      런타임·레지스트리·오케스트레이션)을 정리해, 이 트랙 전체의 점검 지도를 세운다.

      ## 개념 한 줄
      컨테이너 위협은 한 군데가 아니라 4계층에 흩어져 있다. 한 계층만 막으면 다른 계층이 뚫리므로,
      이미지(무엇으로)·런타임(어떻게 실행)·레지스트리(어디서)·오케스트레이션(어떻게 운영)을 모두 본다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 이미지 계층 — 베이스 이미지·레이어·취약점
      echo "1) 이미지: 베이스 이미지·레이어·취약점"
      # 2) 런타임 계층 — 특권/capabilities/user/격리
      echo "2) 런타임: 특권/capabilities/user/격리"
      # 3) 레지스트리 계층 — 출처·서명·무결성
      echo "3) 레지스트리: 출처·서명·무결성"
      # 4) 오케스트레이션 계층 — compose/k8s 설정
      echo "4) 오케스트레이션: compose/k8s 설정"
      # 5) 결론 — 각 계층마다 통제, 한 계층만 강해도 부족
      echo "→ 각 계층마다 통제. 한 계층만 강해도 부족"
      ```

      ## ✅ 합격 기준
      `런타임` 출력 시 통과. **근거:** 런타임(2 계층)을 포함한 4계층이 정리되면 트랙 전체의 점검
      체크포인트 골격이 선다.

      ## 표준 풀이
      - **NIST SP 800-190** — 미국 NIST 의 컨테이너 보안 표준. 위험·통제를 4계층으로 정리한다.
      - **① 이미지** 최소 베이스·취약점 스캔(W02·W03) / **② 런타임** 특권·user·capability(본 주차).
      - **③ 레지스트리** 출처·서명·무결성(W11 계열) / **④ 오케스트레이션** compose·k8s 설정(W12 계열).
    hint: '이미지/런타임/레지스트리/오케'
    category: analysis
    points: 12
    answer: |
      # 1) 이미지 계층 — 베이스 이미지·레이어·취약점
      echo "1) 이미지: 베이스 이미지·레이어·취약점"
      # 2) 런타임 계층 — 특권/capabilities/user/격리
      echo "2) 런타임: 특권/capabilities/user/격리"
      # 3) 레지스트리 계층 — 출처·서명·무결성
      echo "3) 레지스트리: 출처·서명·무결성"
      # 4) 오케스트레이션 계층 — compose/k8s 설정
      echo "4) 오케스트레이션: compose/k8s 설정"
