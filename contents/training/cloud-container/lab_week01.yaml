      실행 사용자를 읽어, CIS Docker Benchmark 4.1 대비 **root 실행 갭**을 본인 손으로 찾아낸다.

      ## 개념 한 줄
      `docker inspect` 는 컨테이너의 임대 계약서 전문 — 런타임 권한·사용자 등 모든 설정을 보여준다.
      `Config.User` 가 비어 있으면 컨테이너가 root(uid 0)로 도는 것이며, 이는 CIS Docker 4.1 위반이다.

      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web의 특권 여부와 실행 사용자를 docker inspect로 읽기(Priv=특권, User=실행 사용자)
      docker inspect el34-web --format 'Priv={{.HostConfig.Privileged}} User=[{{.Config.User}}]'
      # 2) User 값이 비어 있으면(=root, uid0) gap=runs_as_root 판정(CIS Docker 4.1 위반), 아니면 user= 출력
      U=$(docker inspect el34-web --format '{{.Config.User}}'); [ -z "$U" ] && echo "gap=runs_as_root" || echo "user=$U"
      # 3) 해석 — Privileged=false(양호), User 비어있음=root(uid0) 실행 → CIS Docker 4.1 갭
      echo "→ Privileged=false(양호), User 비어있음=root(uid0) 실행 → CIS Docker 4.1 위반(갭)"
      ```

      ## ✅ 합격 기준
      `gap=runs_as_root` 출력 시 통과. **근거:** `Config.User` 가 빈 값이라 컨테이너가 root 로 도는 갭을
      판정한 것(첫 줄은 `Priv=false User=[]` — 특권은 양호, 사용자는 미지정).

      ## 도구/기준 풀이
      - `docker inspect <c> --format '...'` — 컨테이너 설정을 JSON 으로 읽되 원하는 필드만 추출.
      - `.HostConfig.Privileged` — 특권 컨테이너 여부(false 여야 양호). `.Config.User` — 실행 사용자.
