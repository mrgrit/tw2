lab_id: standalone-cloud-container-week01
title: "컨테이너 보안 개론 — 식별·격리·4계층·기본 점검"
version: standalone-cloud-container
course: cloud-container
week: 1
description: |
  컨테이너 보안 개론 — 컨테이너 식별(docker ps), 컨테이너 vs VM, 보안 4계층(NIST 800-190),
  공유 커널 위험, 기본 점검(Privileged/User root 갭). el34 41 컨테이너 실 점검. 명령은 el34 호스트 docker CLI. 신규 설치 없음.
difficulty: easy
duration_minutes: 120
prerequisites:
  - "el34 호스트 SSH"
  - "docker CLI 접근(ccc)"
  - "lecture §3(4계층) §4(공유커널) §5(기본점검) 숙지"
objectives:
  - "컨테이너 식별/구성 파악"
  - "컨테이너 보안 4계층 이해"
  - "기본 런타임 갭(root) 점검"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 점검 — docker 가용
      ## 💻 실행 명령
      ```bash
      docker version --format 'docker={{.Server.Version}}' 2>/dev/null || echo docker_ok
      ```
      ## ✅ 합격 기준
      docker CLI 사용 가능.
    hint: 'docker version'
    category: survey
    points: 10
    answer: |
      docker version --format 'docker={{.Server.Version}}' 2>/dev/null || echo docker_ok
      echo docker_ok
    answer_detail: "컨테이너 보안 점검 도구 = docker CLI(el34 호스트)."
    verify:
      type: output_contains
      expect: 'docker'
      field: stdout
      semantic:
        intent: "docker 가용"
        success_criteria: ["CLI 접근"]
        acceptable_methods: ["**[OSS] docker (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 컨테이너 식별
      ## 💻 실행 명령
      ```bash
      echo "containers=$(docker ps -q | wc -l)"; docker ps --format '{{.Names}}' | head -8
      ```
      ## ✅ 합격 기준
      실행 중인 컨테이너를 식별·집계한다.
    hint: 'docker ps'
    category: recon
    points: 14
    answer: |
      echo "=== 컨테이너 식별 ==="
      echo "containers=$(docker ps -q | wc -l)"
      docker ps --format '{{.Names}}' | head -10
      echo "→ el34는 다수 컨테이너(web/ips/siem/fw/attacker 등). 무엇이 도는지 파악이 출발점"
    answer_detail: "컨테이너 식별 = docker ps. 실행 중 컨테이너 목록/수가 보안 점검 범위."
    verify:
      type: output_contains
      expect: 'containers='
      field: stdout
      semantic:
        intent: "컨테이너 식별"
        success_criteria: ["목록/집계"]
        acceptable_methods: ["**[OSS] docker ps (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 컨테이너 vs VM
      ## 💻 실행 명령
      ```bash
      echo "VM=하드웨어 가상화+게스트OS(강한격리/무겁다), 컨테이너=커널공유(가볍다/얕은격리)"
      ```
      ## ✅ 합격 기준
      컨테이너와 VM의 격리 차이를 정리한다.
    hint: '커널 공유'
    category: analysis
    points: 12
    answer: |
      echo "=== 컨테이너 vs VM ==="
      echo "VM: 하드웨어 가상화 + 게스트 OS 별도 → 강한 격리, 무겁다"
      echo "컨테이너: 호스트 커널 공유 + 프로세스 격리 → 가볍다, 격리 얕다"
      echo "→ 컨테이너 보안 = 얕은 격리를 설정(특권/권한/user)으로 보강"
    answer_detail: "컨테이너=커널 공유(얕은 격리), VM=별도 OS(강한 격리). 설정 보강이 핵심."
    verify:
      type: output_contains
      expect: '커널'
      field: stdout
      semantic:
        intent: "컨테이너 vs VM"
        success_criteria: ["격리 차이"]
        acceptable_methods: ["**[표준] 개념 (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 보안 4계층 (NIST 800-190)
      ## 💻 실행 명령
      ```bash
      echo "이미지/런타임/레지스트리/오케스트레이션"
      ```
      ## ✅ 합격 기준
      컨테이너 보안 4계층을 정리한다.
    hint: '이미지/런타임/레지스트리/오케'
    category: analysis
    points: 12
    answer: |
      echo "=== 보안 4계층 (NIST 800-190) ==="
      echo "1) 이미지: 베이스 이미지·레이어·취약점"
      echo "2) 런타임: 특권/capabilities/user/격리"
      echo "3) 레지스트리: 출처·서명·무결성"
      echo "4) 오케스트레이션: compose/k8s 설정"
      echo "→ 각 계층마다 통제. 한 계층만 강해도 부족"
    answer_detail: "보안 4계층 = 이미지/런타임/레지스트리/오케스트레이션(NIST 800-190)."
    verify:
      type: output_contains
      expect: '런타임'
      field: stdout
      semantic:
        intent: "보안 4계층"
        success_criteria: ["4계층"]
        acceptable_methods: ["**[표준] NIST 800-190 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 공유 커널 위험
      ## 💻 실행 명령
      ```bash
      echo "특권 컨테이너(호스트 장악), root 실행, 과한 capability=escape 위험"
      ```
      ## ✅ 합격 기준
      공유 커널의 위험을 정리한다.
    hint: 'escape/특권/root'
    category: analysis
    points: 12
    answer: |
      echo "=== 공유 커널 위험 ==="
      echo "특권 컨테이너(--privileged): 호스트 장치/커널 접근 → escape 시 호스트 장악"
      echo "root 실행: 컨테이너 root = 탈출 시 호스트 권한 위협"
      echo "과한 capability: CAP_SYS_ADMIN 등은 사실상 특권"
      echo "→ 커널 공유라 컨테이너 탈출이 곧 호스트 위협(escape)"
    answer_detail: "공유 커널 위험 = 특권/root/과한 cap → escape 시 호스트 장악. 격리가 얕음."
    verify:
      type: output_contains
      expect: 'escape'
      field: stdout
      semantic:
        intent: "공유 커널 위험"
        success_criteria: ["escape/특권"]
        acceptable_methods: ["**[표준] 위험 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 기본 점검 — Privileged/User
      ## 💻 실행 명령
      ```bash
      docker inspect el34-web --format 'Priv={{.HostConfig.Privileged}} User=[{{.Config.User}}]'; U=$(docker inspect el34-web --format '{{.Config.User}}'); [ -z "$U" ] && echo "gap=runs_as_root" || echo "user=$U"
      ```
      ## ✅ 합격 기준
      컨테이너가 root로 실행되는 갭을 발견한다.
    hint: 'User 비어있음=root'
    category: manipulation
    points: 16
    answer: |
      echo "=== 기본 점검 (Privileged/User) ==="
      docker inspect el34-web --format 'Priv={{.HostConfig.Privileged}} User=[{{.Config.User}}]'
      U=$(docker inspect el34-web --format '{{.Config.User}}'); [ -z "$U" ] && echo "gap=runs_as_root" || echo "user=$U"
      echo "→ Privileged=false(양호), User 비어있음=root(uid0) 실행 → CIS Docker 4.1 위반(갭)"
    answer_detail: "기본 점검 = Privileged(false 양호)+User(비어있음=root 갭, CIS 4.1)."
    verify:
      type: output_contains
      expect: 'gap=runs_as_root'
      field: stdout
      semantic:
        intent: "런타임 기본 점검"
        success_criteria: ["root 실행 갭"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 방어 개요 — 최소권한
      ## 💻 실행 명령
      ```bash
      echo "비-root user, 특권 금지, capability 최소(drop all+필요만), 읽기전용 루트FS"
      ```
      ## ✅ 합격 기준
      컨테이너 보안 방어 개요를 정리한다.
    hint: '비-root/최소권한'
    category: report
    points: 12
    answer: |
      echo "=== 방어 개요 (최소권한) ==="
      echo "1) 비-root user(USER 지시어 + uid≥1000)"
      echo "2) 특권 금지(--privileged 사용 안 함)"
      echo "3) capability 최소화(drop all + 필요한 것만 add)"
      echo "4) 읽기전용 루트FS(--read-only) + no-new-privileges"
      echo "→ 핵심: 얕은 격리를 최소권한 설정으로 보강"
    answer_detail: "방어 = 비-root+특권금지+cap 최소+읽기전용FS. 최소권한으로 escape 영향 축소."
    verify:
      type: output_contains
      expect: '최소권한'
      field: stdout
      semantic:
        intent: "방어 개요"
        success_criteria: ["최소권한"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 컨테이너 개론 보고서
      ## 💻 보고서 양식
      ```markdown
      # 클라우드·컨테이너 W01 개론 보고서 (학번, 이름)
      ## 1. 컨테이너 식별/4계층
      ## 2. 공유 커널 위험/기본 점검(root 갭)
      ## 3. 방어 개요
      ```
      ## ✅ 합격 기준
      보고서에 4계층 + root 갭 + 방어가 포함된다.
    hint: '4계층+root갭+방어'
    category: report
    points: 12
    answer: |
      cat <<'EOF'
      # 클라우드·컨테이너 W01 개론 보고서
      ## 1. 식별: el34 다수 컨테이너. 보안 4계층(이미지/런타임/레지스트리/오케스트레이션)
      ## 2. 위험: 커널 공유→escape. 점검: el34-web Privileged=false(양호)·User=root(CIS 4.1 갭)
      ## 3. 방어: 비-root user + 특권 금지 + capability 최소 + 읽기전용 루트FS
      ## 결론: 컨테이너는 가볍지만 격리가 얕다. 최소권한 설정으로 escape 영향을 줄이는 것이 핵심
      EOF
    answer_detail: "개론 보고 = 식별/4계층+공유커널 위험/root 갭+최소권한 방어."
    verify:
      type: output_contains
      expect: '4계층'
      field: stdout
      semantic:
        intent: "컨테이너 개론 보고"
        success_criteria: ["4계층/갭/방어"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
