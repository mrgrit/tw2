lab_id: standalone-cloud-container-week14
title: "클라우드 보안 태세 관리 (CSPM)·감사"
version: standalone-cloud-container
course: cloud-container
week: 14
description: |
  클라우드 보안 태세 관리(CSPM) — 클라우드 계정의 설정을 표준(CIS Cloud Benchmark)에 자동·지속 대조해
  오설정(W13)을 찾아 시정하는 체계. 설정 드리프트 탐지, 클라우드 감사 로깅(CloudTrail 류), 컨테이너 스캔
  연계를 다룬다. el34 는 온프레미스라 개념 중심 + CSPM 원리를 W09(SCA)와 대비해 학습한다.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W13 통과 (클라우드 오설정 W13)"
  - "el34 호스트 SSH (개념 정리 중심)"
  - "lecture §2(CSPM) §3(드리프트) §4(감사) 숙지"
objectives:
  - "CSPM 의 역할(클라우드 설정 자동 점검) 이해"
  - "설정 드리프트·클라우드 감사 로깅"
  - "CSPM·CIS Cloud·컨테이너 스캔 통합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — CSPM 도입
      ## 📖 개념 한 줄
      CSPM(Cloud Security Posture Management)은 클라우드 계정의 수많은 설정을 표준에 자동·지속 대조해
      오설정을 찾아내는 도구·체계다 — W09 의 SCA(호스트 구성 평가)의 클라우드 버전이라 보면 된다.
      ## 💻 실행 명령
      ```bash
      echo "CSPM=클라우드 설정 자동 점검(W13 오설정 탐지). W09 SCA(호스트)의 클라우드 확장판"
      ```
      ## ✅ 합격 기준
      CSPM 정의가 정리되면 통과.
    hint: 'CSPM 정의'
    category: survey
    points: 10
    answer: |
      echo "=== CSPM 도입 ==="
      echo "CSPM(Cloud Security Posture Management): 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조"
      echo "→ W13 의 오설정(공개 버킷·개방 SG·미암호화)을 사람이 아니라 도구가 계정 전체에서 상시 탐지"
      echo "→ W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전"
      echo "cspm_defined"
    answer_detail: "CSPM = 클라우드 설정을 표준에 자동·지속 대조해 오설정 탐지. W09 SCA 의 클라우드 확장판."
    verify:
      type: output_contains
      expect: 'cspm_defined'
      field: stdout
      semantic: {intent: "CSPM 정의", success_criteria: ["자동 점검"], acceptable_methods: ["**[표준] CSPM (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — CSPM 점검 항목
      ## 📖 개념 한 줄
      CSPM 은 IAM·스토리지·네트워크·암호화·로깅 등 영역별로 CIS Cloud Benchmark 항목을 점검한다.
      ## 💻 실행 명령
      ```bash
      echo "점검: 공개 버킷, 0.0.0.0/0 SG, 미암호화, MFA 미사용, 루트키, 로깅 비활성 → PASS/FAIL"
      ```
      ## ✅ 합격 기준
      CSPM 점검 항목이 정리되면 통과.
    hint: 'CSPM 항목'
    category: analysis
    points: 12
    answer: |
      echo "=== CSPM 점검 항목 (CIS Cloud) ==="
      echo "IAM: 루트 계정 MFA, 미사용 자격, 과다 권한 정책"
      echo "스토리지: 공개 버킷, 미암호화, 버저닝/로깅"
      echo "네트워크: 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙"
      echo "로깅: CloudTrail/감사 로깅 활성, 무결성"
      echo "→ 각 항목 PASS/FAIL + 심각도. W09 SCA 와 같은 구조(자동 대조)"
    answer_detail: "CSPM 항목 = IAM/스토리지/네트워크/암호화/로깅의 CIS Cloud 점검. PASS/FAIL+심각도(W09 SCA 와 동일 구조)."
    verify:
      type: output_contains
      expect: 'CIS Cloud'
      field: stdout
      semantic: {intent: "CSPM 항목", success_criteria: ["영역별 점검"], acceptable_methods: ["**[표준] CIS Cloud (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 설정 드리프트
      ## 📖 개념 한 줄
      배포 후 누군가 설정을 바꾸면(드리프트) 기준선에서 이탈한다 — CSPM 은 지속 모니터링으로 드리프트를
      탐지한다(W10 런타임 탐지의 클라우드 설정판).
      ## 💻 실행 명령
      ```bash
      echo "드리프트=승인 기준선 이탈(누군가 버킷 공개로 변경). CSPM 지속 모니터링으로 탐지+알림"
      ```
      ## ✅ 합격 기준
      설정 드리프트 개념이 정리되면 통과.
    hint: '드리프트'
    category: analysis
    points: 12
    answer: |
      echo "=== 설정 드리프트 ==="
      echo "드리프트: 배포 시 안전했던 설정이 운영 중 변경되어 기준선에서 이탈(예: 버킷이 공개로 바뀜)"
      echo "탐지: CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정 auto-remediation)"
      echo "예방: IaC(Terraform)로 설정을 코드화하고 드리프트를 코드 대비 비교"
      echo "→ 한 번 점검이 아니라 '지속' 점검 — 변경관리(compliance W10) 의 클라우드판"
    answer_detail: "드리프트 = 기준선 이탈 설정 변경. CSPM 지속 모니터링+알림+IaC 대비 비교로 탐지. 일회성 아닌 지속 점검."
    verify:
      type: output_contains
      expect: '드리프트'
      field: stdout
      semantic: {intent: "설정 드리프트", success_criteria: ["지속 점검"], acceptable_methods: ["**[설명] 개념 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 클라우드 감사 로깅
      ## 📖 개념 한 줄
      클라우드 API 호출 감사 로그(AWS CloudTrail/GCP Audit Logs)는 "누가 무엇을 언제 했나"의 클라우드판
      — 침해 조사·CSPM 의 근거 데이터다(compliance W06 감사 추적의 클라우드 적용).
      ## 💻 실행 명령
      ```bash
      echo "CloudTrail/Audit Logs=클라우드 API 감사 추적(누가/무엇을/언제). 무결성+보존+SIEM 연동"
      ```
      ## ✅ 합격 기준
      클라우드 감사 로깅 개념이 정리되면 통과.
    hint: 'CloudTrail'
    category: report
    points: 12
    answer: |
      echo "=== 클라우드 감사 로깅 ==="
      echo "CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure): 모든 클라우드 API 호출 기록"
      echo "감사 5요소(W06): 누가(IAM 주체)/언제/무엇을(API)/어디서(IP)/결과 → 클라우드판"
      echo "요건: 전 리전·전 계정 활성, 무결성 보호, 장기 보존, SIEM 연동"
      echo "→ CSPM 의 드리프트 탐지·침해 조사의 근거 데이터"
    answer_detail: "클라우드 감사 = CloudTrail/Audit Logs(API 호출 감사 추적). compliance W06 감사 5요소의 클라우드 적용. CSPM·조사의 근거."
    verify:
      type: output_contains
      expect: 'CloudTrail'
      field: stdout
      semantic: {intent: "클라우드 감사", success_criteria: ["API 감사 추적"], acceptable_methods: ["**[표준] 감사 로깅 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 컨테이너+클라우드 통합 점검
      ## 📖 개념 한 줄
      성숙한 운영은 CSPM(클라우드 설정) + 이미지 스캔(W03) + 런타임 탐지(W10) + 쿠버네티스 보안(W12)을
      한 플랫폼(CNAPP)으로 통합한다.
      ## 💻 실행 명령
      ```bash
      echo "CNAPP=CSPM+이미지스캔(W03)+런타임(W10)+k8s(W12) 통합. 빌드→배포→런타임 전 구간 가시성"
      ```
      ## ✅ 합격 기준
      통합 점검(CNAPP) 개념이 정리되면 통과.
    hint: 'CNAPP 통합'
    category: report
    points: 12
    answer: |
      echo "=== 컨테이너+클라우드 통합 (CNAPP) ==="
      echo "CNAPP(Cloud-Native Application Protection Platform): CSPM+CWPP(워크로드)+이미지스캔+런타임 통합"
      echo "빌드(이미지 스캔 W03) → 배포(CIS/IaC W09·k8s W12) → 런타임(행위 탐지 W10) → 클라우드 설정(CSPM)"
      echo "→ 분절된 점검을 한 플랫폼에서 연결: 한 취약점을 빌드~런타임~클라우드까지 추적"
      echo "integrated"
    answer_detail: "통합 = CNAPP(CSPM+CWPP+이미지스캔+런타임). 빌드→배포→런타임→클라우드 전 구간을 한 플랫폼에서 연결."
    verify:
      type: output_contains
      expect: 'CNAPP'
      field: stdout
      semantic: {intent: "통합 점검", success_criteria: ["CNAPP"], acceptable_methods: ["**[설명] 통합 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 방어 종합
      ## 💻 실행 명령
      ```bash
      echo "CSPM 지속점검+CIS Cloud+IaC 드리프트+CloudTrail 감사+CNAPP 통합으로 빌드~런타임~클라우드"
      ```
      ## ✅ 합격 기준
      CSPM/클라우드 보안 운영 방어가 정리되면 통과.
    hint: 'CSPM 운영'
    category: report
    points: 12
    answer: |
      echo "=== CSPM·클라우드 보안 운영 ==="
      echo "1) CSPM 지속 점검(CIS Cloud) + 자동 시정(auto-remediation)"
      echo "2) IaC(Terraform)로 설정 코드화 + 드리프트 탐지"
      echo "3) CloudTrail 등 감사 로깅 전 계정 활성 + SIEM 연동"
      echo "4) CNAPP 로 이미지(W03)·런타임(W10)·클라우드 설정 통합 가시성"
      echo "→ 클라우드 설정도 '지속 점검 + 자동 시정 + 감사'의 순환으로 관리"
    answer_detail: "방어 = CSPM 지속점검+IaC 드리프트+CloudTrail 감사+CNAPP 통합. 지속 점검·자동 시정·감사 순환."
    verify:
      type: output_contains
      expect: 'CSPM'
      field: stdout
      semantic: {intent: "CSPM 운영 방어", success_criteria: ["지속점검/통합"], acceptable_methods: ["**[설명] 방어 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 목표 — CSPM 보고서
      ## 💻 보고서 양식
      ```markdown
      # 클라우드·컨테이너 W14 CSPM 보고서 (학번, 이름)
      ## 1. CSPM 역할 / CIS Cloud 점검 항목
      ## 2. 드리프트 / 클라우드 감사 로깅
      ## 3. CNAPP 통합 / 운영
      ```
      ## ✅ 합격 기준
      CSPM + 감사 + 통합 포함.
    hint: 'CSPM+감사+통합'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # 클라우드·컨테이너 W14 CSPM 보고서
      ## 1. CSPM: 클라우드 설정을 CIS Cloud 에 자동·지속 대조(W09 SCA 의 클라우드판). IAM/스토리지/네트워크/로깅 점검
      ## 2. 드리프트: 기준선 이탈을 지속 모니터링+IaC 대비. 감사: CloudTrail(API 감사 추적, W06 클라우드판)
      ## 3. 통합(CNAPP): 이미지 스캔(W03)+런타임(W10)+k8s(W12)+CSPM 을 한 플랫폼으로
      ## 결론: 클라우드 설정은 지속 점검(CSPM)+감사(CloudTrail)+자동 시정으로 관리. CNAPP 로 빌드~런타임~클라우드 통합
      EOF
    answer_detail: "CSPM 보고 = CSPM 역할/CIS Cloud+드리프트/감사+CNAPP 통합. 지속 점검·감사·통합 가시성."
    verify:
      type: output_contains
      expect: 'CSPM'
      field: stdout
      semantic: {intent: "CSPM 보고", success_criteria: ["CSPM/감사/통합"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
