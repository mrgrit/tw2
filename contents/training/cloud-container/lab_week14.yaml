lab_id: standalone-cloud-container-week14
title: "클라우드 보안 태세 관리 (CSPM)·감사"
version: standalone-cloud-container
course: cloud-container
week: 14
description: |
  클라우드 보안 태세 관리(CSPM) — 클라우드 계정의 설정을 표준(CIS Cloud Benchmark)에 자동·지속 대조해
  오설정(W13)을 찾아 시정하는 체계. 설정 드리프트 탐지, 클라우드 감사 로깅(CloudTrail 류), 컨테이너 스캔
  연계를 다룬다. el34 는 온프레미스라 개념 중심 + CSPM 원리를 W09(SCA)와 대비해 학습한다.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W13 통과 (클라우드 오설정 W13)"
  - "el34 호스트 SSH (개념 정리 중심)"
  - "lecture §2(CSPM) §3(드리프트) §4(감사) 숙지"
objectives:
  - "CSPM 의 역할(클라우드 설정 자동 점검) 이해"
  - "설정 드리프트·클라우드 감사 로깅"
  - "CSPM·CIS Cloud·컨테이너 스캔 통합"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — CSPM 도입
      ## 📖 개념 한 줄
      CSPM(Cloud Security Posture Management)은 클라우드 계정의 수많은 설정을 표준에 자동·지속 대조해
      오설정을 찾아내는 도구·체계다 — W09 의 SCA(호스트 구성 평가)의 클라우드 버전이라 보면 된다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) CSPM 정의 — 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조
      echo "CSPM(Cloud Security Posture Management): 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조"
      # 2) 역할 — W13 오설정(공개 버킷·개방 SG·미암호화)을 도구가 계정 전체에서 상시 탐지
      # → W13 의 오설정(공개 버킷·개방 SG·미암호화)을 사람이 아니라 도구가 계정 전체에서 상시 탐지
      # 3) 비유 — W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전
      # → W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전
      # 4) 정의 정리 완료 표식
      echo "cspm_defined"
      ```
      ## ✅ 합격 기준
      `cspm_defined` 출력 시 통과. **근거:** CSPM 이 클라우드 설정을 표준에 자동·지속 대조해 오설정을
      탐지하는 W09 SCA 의 클라우드 확장판임이 정리되면 통과.
    hint: 'CSPM 정의'
    category: survey
    points: 10
    answer: |
      # 1) CSPM 정의 — 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조
      echo "CSPM(Cloud Security Posture Management): 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조"
      # 2) 역할 — W13 오설정(공개 버킷·개방 SG·미암호화)을 도구가 계정 전체에서 상시 탐지
      # → W13 의 오설정(공개 버킷·개방 SG·미암호화)을 사람이 아니라 도구가 계정 전체에서 상시 탐지
      # 3) 비유 — W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전
      # → W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전
      # 4) 정의 정리 완료 표식
      echo "cspm_defined"
    answer_detail: "CSPM = 클라우드 설정을 표준에 자동·지속 대조해 오설정 탐지. W09 SCA 의 클라우드 확장판."
    expected_output: |
      CSPM(Cloud Security Posture Management): 클라우드 계정 설정을 표준(CIS)에 자동·지속 대조
      → W13 의 오설정(공개 버킷·개방 SG·미암호화)을 사람이 아니라 도구가 계정 전체에서 상시 탐지
      → W09 SCA(호스트 CIS 자동 점검)의 클라우드 버전
      cspm_defined
    verify:
      type: output_contains
      expect: 'cspm_defined'
      field: stdout
      semantic: {intent: "CSPM 정의", success_criteria: ["자동 점검"], acceptable_methods: ["**[표준] CSPM (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — CSPM 점검 항목
      ## 📖 개념 한 줄
      CSPM 은 IAM·스토리지·네트워크·암호화·로깅 등 영역별로 CIS Cloud Benchmark 항목을 점검한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) CSPM 점검 항목 — CIS Cloud Benchmark 영역별
      echo "CSPM 점검 항목 (CIS Cloud Benchmark):"
      # 2) IAM — 루트 계정 MFA, 미사용 자격, 과다 권한 정책
      echo "IAM: 루트 계정 MFA, 미사용 자격, 과다 권한 정책"
      # 3) 스토리지 — 공개 버킷, 미암호화, 버저닝/로깅
      echo "스토리지: 공개 버킷, 미암호화, 버저닝/로깅"
      # 4) 네트워크 — 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙
      echo "네트워크: 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙"
      # 5) 로깅 — CloudTrail/감사 로깅 활성·무결성
      echo "로깅: CloudTrail/감사 로깅 활성, 무결성"
      # 6) 결론 — 각 항목 PASS/FAIL + 심각도(W09 SCA와 같은 자동 대조 구조)
      # → 각 항목 PASS/FAIL + 심각도. W09 SCA 와 같은 구조(자동 대조)
      ```
      ## ✅ 합격 기준
      `CIS Cloud` 출력 시 통과. **근거:** IAM/스토리지/네트워크/로깅 영역별 CIS Cloud 점검이 정리되면
      각 항목 PASS/FAIL+심각도(W09 SCA 와 같은 자동 대조 구조)가 선다.
    hint: 'CSPM 항목'
    category: analysis
    points: 12
    answer: |
      # 1) CSPM 점검 항목 — CIS Cloud Benchmark 영역별
      echo "CSPM 점검 항목 (CIS Cloud Benchmark):"
      # 2) IAM — 루트 계정 MFA, 미사용 자격, 과다 권한 정책
      echo "IAM: 루트 계정 MFA, 미사용 자격, 과다 권한 정책"
      # 3) 스토리지 — 공개 버킷, 미암호화, 버저닝/로깅
      echo "스토리지: 공개 버킷, 미암호화, 버저닝/로깅"
      # 4) 네트워크 — 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙
      echo "네트워크: 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙"
      # 5) 로깅 — CloudTrail/감사 로깅 활성·무결성
      echo "로깅: CloudTrail/감사 로깅 활성, 무결성"
      # 6) 결론 — 각 항목 PASS/FAIL + 심각도(W09 SCA와 같은 자동 대조 구조)
      # → 각 항목 PASS/FAIL + 심각도. W09 SCA 와 같은 구조(자동 대조)
    answer_detail: "CSPM 항목 = IAM/스토리지/네트워크/암호화/로깅의 CIS Cloud 점검. PASS/FAIL+심각도(W09 SCA 와 동일 구조)."
    expected_output: |
      CSPM 점검 항목 (CIS Cloud Benchmark):
      IAM: 루트 계정 MFA, 미사용 자격, 과다 권한 정책
      스토리지: 공개 버킷, 미암호화, 버저닝/로깅
      네트워크: 0.0.0.0/0 보안그룹, 기본 VPC, 미사용 규칙
      로깅: CloudTrail/감사 로깅 활성, 무결성
      → 각 항목 PASS/FAIL + 심각도. W09 SCA 와 같은 구조(자동 대조)
    verify:
      type: output_contains
      expect: 'CIS Cloud'
      field: stdout
      semantic: {intent: "CSPM 항목", success_criteria: ["영역별 점검"], acceptable_methods: ["**[표준] CIS Cloud (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 설정 드리프트
      ## 📖 개념 한 줄
      배포 후 누군가 설정을 바꾸면(드리프트) 기준선에서 이탈한다 — CSPM 은 지속 모니터링으로 드리프트를
      탐지한다(W10 런타임 탐지의 클라우드 설정판).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 드리프트 정의 — 배포 시 안전했던 설정이 운영 중 변경돼 기준선 이탈(예: 버킷 공개)
      echo "드리프트: 배포 시 안전했던 설정이 운영 중 변경되어 기준선에서 이탈(예: 버킷이 공개로 바뀜)"
      # 2) 탐지 — CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정)
      echo "탐지: CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정 auto-remediation)"
      # 3) 예방 — IaC(Terraform)로 설정 코드화 + 드리프트를 코드 대비 비교
      echo "예방: IaC(Terraform)로 설정을 코드화하고 드리프트를 코드 대비 비교"
      # 4) 결론 — 한 번이 아니라 지속 점검(compliance W10 변경관리의 클라우드판)
      # → 한 번 점검이 아니라 '지속' 점검 — 변경관리(compliance W10) 의 클라우드판
      ```
      ## ✅ 합격 기준
      `드리프트` 출력 시 통과. **근거:** 기준선 이탈(드리프트)을 CSPM 지속 모니터링+IaC 대비 비교로 탐지함이
      정리되면 일회성 아닌 지속 점검의 의미가 선다.
    hint: '드리프트'
    category: analysis
    points: 12
    answer: |
      # 1) 드리프트 정의 — 배포 시 안전했던 설정이 운영 중 변경돼 기준선 이탈(예: 버킷 공개)
      echo "드리프트: 배포 시 안전했던 설정이 운영 중 변경되어 기준선에서 이탈(예: 버킷이 공개로 바뀜)"
      # 2) 탐지 — CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정)
      echo "탐지: CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정 auto-remediation)"
      # 3) 예방 — IaC(Terraform)로 설정 코드화 + 드리프트를 코드 대비 비교
      echo "예방: IaC(Terraform)로 설정을 코드화하고 드리프트를 코드 대비 비교"
      # 4) 결론 — 한 번이 아니라 지속 점검(compliance W10 변경관리의 클라우드판)
      # → 한 번 점검이 아니라 '지속' 점검 — 변경관리(compliance W10) 의 클라우드판
    answer_detail: "드리프트 = 기준선 이탈 설정 변경. CSPM 지속 모니터링+알림+IaC 대비 비교로 탐지. 일회성 아닌 지속 점검."
    expected_output: |
      드리프트: 배포 시 안전했던 설정이 운영 중 변경되어 기준선에서 이탈(예: 버킷이 공개로 바뀜)
      탐지: CSPM 지속 모니터링 → 이탈 즉시 알림(+자동 시정 auto-remediation)
      예방: IaC(Terraform)로 설정을 코드화하고 드리프트를 코드 대비 비교
      → 한 번 점검이 아니라 '지속' 점검 — 변경관리(compliance W10) 의 클라우드판
    verify:
      type: output_contains
      expect: '드리프트'
      field: stdout
      semantic: {intent: "설정 드리프트", success_criteria: ["지속 점검"], acceptable_methods: ["**[설명] 개념 (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 클라우드 감사 로깅
      ## 📖 개념 한 줄
      클라우드 API 호출 감사 로그(AWS CloudTrail/GCP Audit Logs)는 "누가 무엇을 언제 했나"의 클라우드판
      — 침해 조사·CSPM 의 근거 데이터다(compliance W06 감사 추적의 클라우드 적용).
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 클라우드 감사 로그 — CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure)가 모든 API 호출 기록
      echo "CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure): 모든 클라우드 API 호출 기록"
      # 2) 감사 5요소(W06) — 누가/언제/무엇을/어디서/결과의 클라우드판
      echo "감사 5요소(W06): 누가(IAM 주체)/언제/무엇을(API)/어디서(IP)/결과 → 클라우드판"
      # 3) 요건 — 전 리전·전 계정 활성, 무결성 보호, 장기 보존, SIEM 연동
      echo "요건: 전 리전·전 계정 활성, 무결성 보호, 장기 보존, SIEM 연동"
      # 4) 결론 — CSPM 드리프트 탐지·침해 조사의 근거 데이터
      # → CSPM 의 드리프트 탐지·침해 조사의 근거 데이터
      ```
      ## ✅ 합격 기준
      `CloudTrail` 출력 시 통과. **근거:** CloudTrail/Audit Logs 가 API 호출 감사 추적(W06 감사 5요소의
      클라우드 적용)이며 CSPM·조사의 근거임이 정리되면 통과.
    hint: 'CloudTrail'
    category: report
    points: 12
    answer: |
      # 1) 클라우드 감사 로그 — CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure)가 모든 API 호출 기록
      echo "CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure): 모든 클라우드 API 호출 기록"
      # 2) 감사 5요소(W06) — 누가/언제/무엇을/어디서/결과의 클라우드판
      echo "감사 5요소(W06): 누가(IAM 주체)/언제/무엇을(API)/어디서(IP)/결과 → 클라우드판"
      # 3) 요건 — 전 리전·전 계정 활성, 무결성 보호, 장기 보존, SIEM 연동
      echo "요건: 전 리전·전 계정 활성, 무결성 보호, 장기 보존, SIEM 연동"
      # 4) 결론 — CSPM 드리프트 탐지·침해 조사의 근거 데이터
      # → CSPM 의 드리프트 탐지·침해 조사의 근거 데이터
    answer_detail: "클라우드 감사 = CloudTrail/Audit Logs(API 호출 감사 추적). compliance W06 감사 5요소의 클라우드 적용. CSPM·조사의 근거."
    expected_output: |
      CloudTrail(AWS)/Audit Logs(GCP)/Activity Log(Azure): 모든 클라우드 API 호출 기록
