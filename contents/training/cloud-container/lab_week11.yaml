course: cloud-container
week: 11
description: |
  레지스트리·이미지 신뢰 — 이미지를 "어디서 가져오고(레지스트리) 진짜인지(서명·다이제스트) 어떻게
  보증하나"를 다룬다. docker inspect 로 이미지 다이제스트(sha256) 확인, 가변 태그 vs 불변 다이제스트,
