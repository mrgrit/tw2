  - order: 2
    instruction: |
      ## 🎯 목표 — 이미지 다이제스트 (불변 식별)
      ## 📖 개념 한 줄
      이미지 다이제스트(`sha256:...`)는 이미지 내용의 해시 — 내용이 1비트만 달라도 값이 바뀌므로, 같은
      다이제스트는 "정확히 같은 이미지"임을 보증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) el34-web:latest 이미지의 sha256 다이제스트(.Id) 앞부분 확인 → 끝에 digest_shown
      docker image inspect el34-web:latest --format 'digest={{.Id}}' | head -c 50; echo; echo digest_shown
      # 2) 해석 — sha256 다이제스트=내용 해시, 같은 다이제스트=같은 이미지 보증(무결성)
      echo "→ sha256 다이제스트 = 내용 해시. 같은 다이제스트=같은 이미지 보증(무결성)"
      ```
      ## ✅ 합격 기준
      `digest_shown` 출력 시 통과. **근거:** `sha256:...` 다이제스트와 digest_shown 이 나오면 무결성·출처
      검증의 기준값을 확인한 것(같은 다이제스트=비트 단위 동일 이미지).
      ## 🔧 도구 풀이
      - `.Id` (또는 RepoDigests) = 이미지의 sha256 다이제스트. 무결성·출처 검증의 기준값.
    hint: 'digest sha256'
    category: manipulation
    points: 14
    answer: |
      # 1) el34-web:latest 이미지의 sha256 다이제스트(.Id) 앞부분 확인 → 끝에 digest_shown
      docker image inspect el34-web:latest --format 'digest={{.Id}}' | head -c 50; echo; echo digest_shown
      # 2) 해석 — sha256 다이제스트=내용 해시, 같은 다이제스트=같은 이미지 보증(무결성)
      echo "→ sha256 다이제스트 = 내용 해시. 같은 다이제스트=같은 이미지 보증(무결성)"
    answer_detail: "이미지 다이제스트 = sha256 내용 해시(불변 식별). 같은 다이제스트=비트 단위 동일 이미지 → 무결성·출처 검증 기준."
    verify:
