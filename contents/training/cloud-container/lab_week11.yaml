  - order: 4
    instruction: |
      ## 🎯 목표 — 레지스트리 신뢰
      ## 📖 개념 한 줄
      공개 레지스트리의 임의 이미지는 악성·타이포스쿼팅 위험 — 신뢰할 수 있는(사설/검증된) 레지스트리와
      검증된 베이스만 써야 한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 위험 — 공개 레지스트리 임의 이미지(악성코드 내장/typosquatting 유사명)
      echo "위험: 공개 레지스트리의 임의 이미지(악성코드 내장/typosquatting 유사명)"
      # 2) 통제 — 사설 레지스트리 + 검증 베이스(공식/distroless) + 허용목록
      echo "통제: 사설 레지스트리 + 검증된 베이스(공식/distroless) + 허용목록(allowed registries)"
      # 3) pull 정책 — 서명 검증된 이미지만, 내부 미러로 외부 의존 축소
      echo "+ pull 정책(서명 검증된 이미지만), 내부 미러로 외부 의존 축소"
      # 4) 결론 — 이미지의 출처를 신뢰 경로로 제한
      echo "→ 이미지의 '출처'를 신뢰 경로로 제한"
      ```
      ## ✅ 합격 기준
      `레지스트리` 출력 시 통과. **근거:** 사설/검증 레지스트리+검증 베이스+허용목록이 정리되면 이미지
      출처를 신뢰 경로로 제한하는 원칙이 선다(공개 임의 이미지는 공급망 위험).
    hint: '레지스트리 신뢰'
