  - order: 3
    instruction: |
      ## 🎯 목표 — 가변 태그 vs 불변 다이제스트
      ## 📖 개념 한 줄
      `:latest` 같은 태그는 가변 — 같은 태그가 언제든 다른 이미지를 가리킬 수 있다(공급망 변조 위험).
      불변 다이제스트로 핀(pin)하면 항상 같은 이미지를 보증한다.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 가변 태그 — :latest/:1.0은 레지스트리에서 같은 태그가 다른 이미지로 덮일 수 있음
      echo "태그(:latest, :1.0): 가변 — 레지스트리에서 같은 태그가 다른 이미지로 덮일 수 있음"
      # 2) 불변 다이제스트 — @sha256:...은 항상 정확히 그 이미지
      echo "다이제스트(@sha256:...): 불변 — 항상 정확히 그 이미지"
      # 3) 위험 — latest 핀 시 공격자가 같은 태그로 악성 이미지를 올리면 그대로 받음
      echo "위험: latest 핀 시 공격자가 레지스트리에 악성 이미지를 같은 태그로 올리면 그대로 받음"
      # 4) 결론 — 운영 배포는 다이제스트 핀(image@sha256:...) 권고
      echo "→ 운영 배포는 다이제스트 핀(image@sha256:...) 권고"
      ```
      ## ✅ 합격 기준
      `다이제스트` 출력 시 통과. **근거:** 가변 태그(latest, 변조 위험) vs 불변 다이제스트(핀, 안전) 차이가
      정리되면 운영 배포의 다이제스트 핀 권고 근거가 선다.
    hint: 'tag vs digest'
    category: analysis
    points: 12
    answer: |
      # 1) 가변 태그 — :latest/:1.0은 레지스트리에서 같은 태그가 다른 이미지로 덮일 수 있음
      echo "태그(:latest, :1.0): 가변 — 레지스트리에서 같은 태그가 다른 이미지로 덮일 수 있음"
      # 2) 불변 다이제스트 — @sha256:...은 항상 정확히 그 이미지
      echo "다이제스트(@sha256:...): 불변 — 항상 정확히 그 이미지"
