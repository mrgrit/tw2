      echo "위험: latest 핀 시 공격자가 레지스트리에 악성 이미지를 같은 태그로 올리면 그대로 받음"
      # 4) 결론 — 운영 배포는 다이제스트 핀(image@sha256:...) 권고
      echo "→ 운영 배포는 다이제스트 핀(image@sha256:...) 권고"
    answer_detail: "가변 태그(latest)는 공급망 변조 위험(같은 태그 다른 이미지). 불변 다이제스트 핀(@sha256)이 안전."
    verify:
      type: output_contains
      expect: '다이제스트'
