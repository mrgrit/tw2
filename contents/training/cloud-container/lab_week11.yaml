      ```bash
      # 1) 호스트의 이미지 목록(이름:태그)을 앞 5개 나열 → 끝에 images_listed(이미지 신뢰 점검 대상)
      docker images --format '{{.Repository}}:{{.Tag}}' | head -5; echo images_listed
