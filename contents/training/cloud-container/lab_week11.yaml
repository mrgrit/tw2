  - order: 5
    instruction: |
      ## 🎯 목표 — 이미지 서명
      ## 📖 개념 한 줄
      이미지 서명은 "이 이미지를 신뢰된 주체가 만들었고 변조되지 않았다"를 암호학적으로 보증한다 — Docker
      Content Trust(Notary), 또는 cosign/sigstore.
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) Docker Content Trust(DCT)/Notary — 이미지 태그에 서명, pull 시 서명 검증(DOCKER_CONTENT_TRUST=1)
      echo "Docker Content Trust(DCT)/Notary: 이미지 태그에 서명, pull 시 서명 검증(DOCKER_CONTENT_TRUST=1)"
      # 2) cosign/sigstore — 컨테이너 이미지 서명의 현대 표준(키리스 서명, 투명성 로그)
      echo "cosign/sigstore: 컨테이너 이미지 서명의 현대 표준(키리스 서명, 투명성 로그)"
      # 3) 효과 — 서명 없는/변조된 이미지의 배포 차단(공급망 무결성)
      echo "효과: 서명 없는/변조된 이미지의 배포를 차단(공급망 무결성)"
      # 4) 결론 — 다이제스트(무결성) + 서명(출처 보증) = 이미지 신뢰의 두 축
      echo "→ 다이제스트(무결성) + 서명(출처 보증) = 이미지 신뢰의 두 축"
      ```
      ## ✅ 합격 기준
      `cosign` 출력 시 통과. **근거:** DCT/Notary·cosign/sigstore 서명 검증으로 변조/미서명 이미지 배포를
      차단함이 정리되면 다이제스트(무결성)+서명(출처 보증)의 두 축이 선다.
    hint: 'cosign/DCT'
    category: report
    points: 12
    answer: |
      # 1) Docker Content Trust(DCT)/Notary — 이미지 태그에 서명, pull 시 서명 검증(DOCKER_CONTENT_TRUST=1)
      echo "Docker Content Trust(DCT)/Notary: 이미지 태그에 서명, pull 시 서명 검증(DOCKER_CONTENT_TRUST=1)"
      # 2) cosign/sigstore — 컨테이너 이미지 서명의 현대 표준(키리스 서명, 투명성 로그)
      echo "cosign/sigstore: 컨테이너 이미지 서명의 현대 표준(키리스 서명, 투명성 로그)"
      # 3) 효과 — 서명 없는/변조된 이미지의 배포 차단(공급망 무결성)
