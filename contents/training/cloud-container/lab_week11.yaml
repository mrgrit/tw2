      echo "→ 다이제스트(무결성) + 서명(출처 보증) = 이미지 신뢰의 두 축"
    answer_detail: "이미지 서명 = DCT/Notary 또는 cosign/sigstore. 서명 검증으로 변조/미서명 이미지 배포 차단. 다이제스트+서명=신뢰 두 축."
