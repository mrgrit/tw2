lab_id: standalone-cloud-container-week13
title: "클라우드 보안 기초 — 공유 책임 모델·IAM 최소권한"
version: standalone-cloud-container
course: cloud-container
week: 13
description: |
  클라우드 보안 기초 — 컨테이너가 흔히 올라가는 클라우드(IaaS/PaaS/SaaS)의 보안 모델. 공유 책임 모델
  (CSP vs 고객), IAM 최소권한, 흔한 클라우드 오설정(공개 스토리지·개방 보안그룹), 자격 증명 관리를 다룬다.
  el34 는 온프레미스 컨테이너 환경이라 본 주차는 개념 중심(클라우드 사고 사례·원칙)으로 진행한다.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W12 통과 (컨테이너 보안 4계층)"
  - "el34 호스트 SSH (개념 정리 중심)"
  - "lecture §2(공유책임) §3(IAM) §4(오설정) 숙지"
objectives:
  - "공유 책임 모델(IaaS/PaaS/SaaS) 이해"
  - "IAM 최소권한·과다권한 위험"
  - "클라우드 흔한 오설정·자격 증명 관리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 클라우드 맥락 도입
      ## 📖 개념 한 줄
      컨테이너는 대개 클라우드(AWS/GCP/Azure)의 IaaS/PaaS 위에서 돈다 — 그래서 컨테이너 보안은 그것을
      감싸는 클라우드 보안과 분리할 수 없다.
      ## 💻 실행 명령
      ```bash
      echo "컨테이너는 클라우드 IaaS(VM)/PaaS(관리형 k8s)/레지스트리 위에서 운영 → 클라우드 보안과 연계"
      ```
      ## ✅ 합격 기준
      클라우드-컨테이너 연계 맥락이 정리되면 통과.
    hint: '클라우드 맥락'
    category: survey
    points: 10
    answer: |
      echo "=== 클라우드 맥락 ==="
      echo "컨테이너 운영 기반: IaaS(EC2 등 VM), PaaS(EKS/GKE 관리형 k8s), 관리형 레지스트리(ECR 등)"
      echo "→ 컨테이너를 아무리 강화해도 그 아래 클라우드 계정/IAM/네트워크가 뚫리면 무력"
      echo "cloud_context"
    answer_detail: "클라우드 맥락 = 컨테이너는 클라우드 IaaS/PaaS 위에서 운영. 클라우드 계정·IAM 보안이 컨테이너 보안의 토대."
    verify:
      type: output_contains
      expect: 'cloud_context'
      field: stdout
      semantic: {intent: "클라우드 맥락", success_criteria: ["연계"], acceptable_methods: ["**[관리적] 개념 (권장)**"]}
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 공유 책임 모델
      ## 📖 개념 한 줄
      클라우드 보안은 CSP(클라우드 제공자)와 고객이 책임을 나눈다 — "of the cloud"(인프라)는 CSP,
      "in the cloud"(데이터·설정·IAM)는 고객. 서비스 모델(IaaS<PaaS<SaaS)에 따라 경계가 이동한다.
      ## 💻 실행 명령
      ```bash
      echo "of the cloud(HW/하이퍼바이저)=CSP, in the cloud(데이터/IAM/OS/설정)=고객. IaaS→SaaS로 고객 책임 축소"
      ```
      ## ✅ 합격 기준
      공유 책임 경계가 정리되면 통과.
    hint: '공유 책임'
    category: analysis
    points: 14
    answer: |
      echo "=== 공유 책임 모델 ==="
      echo "CSP 책임(of the cloud): 물리 보안, 하이퍼바이저, 관리형 서비스 기반"
      echo "고객 책임(in the cloud): 데이터, IAM, 네트워크 설정, OS/컨테이너(IaaS), 애플리케이션"
      echo "경계 이동: IaaS(고객이 OS까지)→PaaS(고객이 앱·데이터)→SaaS(고객이 데이터·접근만)"
      echo "→ '클라우드니까 CSP 가 다 해주겠지'가 가장 흔한 오해. 설정·IAM·데이터는 항상 고객 몫"
    answer_detail: "공유 책임 = CSP(of the cloud: HW/하이퍼바이저) vs 고객(in the cloud: 데이터/IAM/설정). IaaS→SaaS 로 고객 책임 축소. 설정·IAM·데이터는 항상 고객."
    verify:
      type: output_contains
      expect: '공유 책임'
      field: stdout
      semantic: {intent: "공유 책임 모델", success_criteria: ["CSP vs 고객"], acceptable_methods: ["**[표준] 공유책임 (권장)**"]}
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — IAM 최소권한
      ## 📖 개념 한 줄
      클라우드 침해의 대부분은 과다 권한 IAM(역할·키)에서 시작한다 — 한 자격이 탈취되면 그 권한만큼
      피해가 번진다. 최소권한과 단기 자격(임시 토큰)이 핵심.
      ## 💻 실행 명령
      ```bash
      echo "과다 IAM(admin/와일드카드 *)=한 키 탈취로 계정 장악. 최소권한+역할 분리+임시 자격(STS)"
      ```
      ## ✅ 합격 기준
      IAM 최소권한 원칙이 정리되면 통과.
    hint: 'IAM 최소권한'
    category: analysis
    points: 12
    answer: |
      echo "=== IAM 최소권한 ==="
      echo "위험: 과다 권한(AdministratorAccess, Action:* Resource:*) → 한 자격 탈취가 계정 전체 장악"
      echo "원칙: 최소권한(필요한 액션·리소스만), 역할 분리, 임시 자격(STS/AssumeRole), MFA"
      echo "컨테이너 연계: Pod/태스크에 IAM 역할 부여 시도 최소권한(IRSA/태스크 역할)"
      echo "→ IAM 이 클라우드의 '진짜 경계' — 네트워크보다 IAM 침해가 흔하다"
    answer_detail: "IAM 최소권한 = 과다 권한이 클라우드 침해 1순위. 최소권한+역할분리+임시자격+MFA. 컨테이너도 워크로드별 최소 IAM 역할."
    verify:
      type: output_contains
      expect: '최소권한'
      field: stdout
      semantic: {intent: "IAM 최소권한", success_criteria: ["과다권한 위험"], acceptable_methods: ["**[표준] IAM (권장)**"]}
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 흔한 클라우드 오설정
      ## 📖 개념 한 줄
      대형 클라우드 유출의 다수는 단순 오설정 — 공개 스토리지 버킷, 전체 개방 보안그룹(0.0.0.0/0),
      미암호화 저장, 공개 스냅샷이다.
      ## 💻 실행 명령
      ```bash
      echo "공개 스토리지 버킷, 0.0.0.0/0 개방 보안그룹, 미암호화 디스크/스냅샷, 공개 AMI/이미지"
      ```
      ## ✅ 합격 기준
      흔한 클라우드 오설정이 정리되면 통과.
    hint: '클라우드 오설정'
    category: analysis
    points: 12
    answer: |
      echo "=== 흔한 클라우드 오설정 ==="
      echo "1) 공개 스토리지 버킷(S3 public) → 데이터 대량 유출(최다 사고 유형)"
      echo "2) 보안그룹 0.0.0.0/0 전체 개방 → 관리 포트(22/3389/DB) 인터넷 노출"
      echo "3) 미암호화 저장(EBS/스냅샷/버킷)"
      echo "4) 공개 스냅샷/이미지에 비밀·데이터 포함"
      echo "→ 오설정은 익스플로잇 없이 그대로 노출 = 가장 흔하고 큰 사고"
    answer_detail: "클라우드 오설정 = 공개 버킷+개방 보안그룹+미암호화+공개 스냅샷. 익스플로잇 없이 노출되는 최다 사고 유형."
    verify:
      type: output_contains
      expect: '오설정'
      field: stdout
      semantic: {intent: "클라우드 오설정", success_criteria: ["공개버킷/개방SG"], acceptable_methods: ["**[관리적] 오설정 (권장)**"]}
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 자격 증명 관리
      ## 📖 개념 한 줄
      하드코딩된 클라우드 키(코드·이미지·env)는 유출 시 즉시 계정 침해 — W06 의 시크릿 관리가 클라우드
      자격에도 그대로 적용된다(임시 자격·역할 기반이 최선).
      ## 💻 실행 명령
      ```bash
      echo "키 하드코딩 금지(W06), 역할 기반 자격(인스턴스/Pod 역할), 임시 토큰, 키 rotation, 비밀 스캐너"
      ```
      ## ✅ 합격 기준
      클라우드 자격 관리가 정리되면 통과.
    hint: '자격 관리'
    category: report
    points: 12
    answer: |
      echo "=== 자격 증명 관리 ==="
      echo "위험: 코드/이미지/env 에 하드코딩된 access key → 유출 시 계정 침해(W06 과 동일 문제)"
      echo "통제: 역할 기반 자격(EC2 instance role/Pod IRSA), 장기 키 지양 + 임시 토큰(STS)"
      echo "+ 키 rotation, gitleaks/스캐너로 코드·이미지 비밀 탐지, 노출 키 즉시 폐기"
      echo "→ 클라우드 키는 '안 두기' + '역할 기반' 이 정답"
    answer_detail: "클라우드 자격 = 하드코딩 키 금지(W06)+역할 기반(instance/Pod 역할)+임시 토큰+rotation+비밀 스캔. 노출 키 즉시 폐기."
    verify:
      type: output_contains
      expect: 'rotation'
      field: stdout
      semantic: {intent: "자격 관리", success_criteria: ["역할 기반/임시"], acceptable_methods: ["**[설명] 방어 (권장)**"]}
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 방어 종합
      ## 💻 실행 명령
      ```bash
      echo "공유책임 인지 + IAM 최소권한/MFA + 오설정 차단(공개금지/암호화) + 역할기반 자격 + 감사로깅"
      ```
      ## ✅ 합격 기준
      클라우드 보안 방어가 정리되면 통과.
    hint: '클라우드 방어'
    category: report
    points: 12
    answer: |
      echo "=== 클라우드 보안 방어 ==="
      echo "1) 공유 책임 경계 명확화(고객 몫: 데이터/IAM/설정)"
      echo "2) IAM 최소권한 + MFA + 임시 자격"
      echo "3) 오설정 차단: 공개 버킷 금지, 보안그룹 최소 개방, 저장 암호화 기본"
      echo "4) 자격: 역할 기반 + rotation + 비밀 스캔"
      echo "5) 감사 로깅(CloudTrail 등) + 이상 탐지(W14 CSPM)"
      echo "→ 클라우드의 진짜 경계는 IAM 과 설정. 둘을 최소·암호화·감사로 통제"
    answer_detail: "방어 = 공유책임 인지+IAM 최소권한/MFA+오설정 차단+역할 기반 자격+감사로깅. IAM/설정이 클라우드 경계."
    verify:
      type: output_contains
      expect: 'IAM'
      field: stdout
      semantic: {intent: "클라우드 방어", success_criteria: ["IAM/오설정/자격"], acceptable_methods: ["**[설명] 방어 (권장)**"]}
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 목표 — 클라우드 보안 보고서
      ## 💻 보고서 양식
      ```markdown
      # 클라우드·컨테이너 W13 클라우드 보안 보고서 (학번, 이름)
      ## 1. 공유 책임 모델 / IAM 최소권한
      ## 2. 흔한 오설정 / 자격 관리
      ## 3. 방어(IAM/오설정/감사)
      ```
      ## ✅ 합격 기준
      공유책임 + IAM + 방어 포함.
    hint: '공유책임+IAM+방어'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # 클라우드·컨테이너 W13 클라우드 보안 보고서
      ## 1. 공유 책임: CSP(인프라) vs 고객(데이터/IAM/설정). IAM 최소권한이 클라우드의 진짜 경계
      ## 2. 오설정: 공개 버킷·개방 보안그룹·미암호화가 최다 사고. 자격: 하드코딩 키 금지+역할 기반(W06 연계)
      ## 3. 방어: IAM 최소권한/MFA + 오설정 차단(공개금지/암호화) + 역할 기반 자격 + 감사로깅
      ## 결론: 컨테이너를 강화해도 그 아래 클라우드 IAM·설정이 뚫리면 무력. 클라우드 경계는 IAM 과 설정
      EOF
    answer_detail: "클라우드 보고 = 공유책임+IAM 최소권한+오설정/자격+방어. IAM·설정이 클라우드 경계, 컨테이너 보안의 토대."
    verify:
      type: output_contains
      expect: '공유 책임'
      field: stdout
      semantic: {intent: "클라우드 보고", success_criteria: ["공유책임/IAM/방어"], acceptable_methods: ["**[관리적] 보고서 (권장)**"]}
    target_vm: web
