lab_id: standalone-cloud-container-week06
title: "컨테이너 시크릿 관리 — 환경변수 비밀 노출 점검"
version: standalone-cloud-container
course: cloud-container
week: 6
description: |
  컨테이너 시크릿 관리 — docker inspect 로 환경변수(env)에 박힌 비밀(비밀번호·키·토큰)을 찾고, 왜
  env/이미지 레이어에 비밀을 두면 안 되는지, 올바른 시크릿 주입(마운트/secret/vault)을 다룬다.
  el34-web: env 에 SSH_PASS 노출(갭). 명령은 el34 호스트 docker CLI. 신규 설치 없음. 읽기 전용 점검.
difficulty: medium
duration_minutes: 130
prerequisites:
  - "W01–W05 통과"
  - "el34 호스트 SSH + docker CLI"
  - "lecture §2(env 노출) §4(올바른 시크릿) 숙지"
objectives:
  - "환경변수 비밀 노출 탐지"
  - "env/레이어 비밀의 위험 이해"
  - "올바른 시크릿 주입(마운트/vault) 방어"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 목표 — 대상 확인
      시크릿 점검 대상(el34-web)을 확인한다.
      ## 📖 개념 한 줄
      시크릿(비밀)은 비밀번호·API 키·토큰·인증서처럼 노출되면 즉시 침해로 이어지는 값이다.
      ## 💻 실행 명령
      ```bash
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과.
    hint: '대상'
    category: survey
    points: 10
    answer: |
      docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
    answer_detail: "시크릿 점검 대상 = el34-web. 시크릿=노출 시 즉시 침해되는 비밀값(비번/키/토큰)."
    verify:
      type: output_contains
      expect: 'target_ok'
      field: stdout
      semantic:
        intent: "대상 확인"
        success_criteria: ["가동"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 목표 — 환경변수 덤프
      컨테이너의 환경변수(env) 전체를 본다. 비밀이 여기 박혀 있는 경우가 흔하다.
      ## 📖 개념 한 줄
      env 는 `docker inspect`·`/proc/<pid>/environ`·자식 프로세스 등 여러 경로로 노출돼, 비밀을 두기에
      가장 나쁜 곳 중 하나다.
      ## 💻 실행 명령
      ```bash
      docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | head -10; echo env_dumped
      ```
      ## ✅ 합격 기준
      env 목록과 `env_dumped` 가 출력되면 통과.
      ## 🔧 도구 풀이
      - `{{range .Config.Env}}` — 컨테이너에 설정된 모든 환경변수를 한 줄씩 출력.
    hint: 'env 덤프'
    category: recon
    points: 12
    answer: |
      echo "=== 환경변수 덤프 ==="
      docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | head -12; echo env_dumped
      echo "→ env 는 docker inspect/proc/자식프로세스로 노출. 비밀을 두기 가장 나쁜 곳"
    answer_detail: "env 덤프 = Config.Env 전체. env 는 inspect/proc/자식 프로세스로 새어 비밀 저장처로 부적합."
    verify:
      type: output_contains
      expect: 'env_dumped'
      field: stdout
      semantic:
        intent: "env 덤프"
        success_criteria: ["환경변수 목록"]
        acceptable_methods: ["**[OSS] docker inspect (권장)**"]
    target_vm: web

  - order: 3
    instruction: |
      ## 🎯 목표 — 비밀 탐지 (env grep)
      env 에서 비밀로 보이는 항목(pass/secret/key/token)을 걸러낸다.
      ## 📖 개념 한 줄
      자동 비밀 탐지는 변수명 패턴(PASS/SECRET/KEY/TOKEN)으로 후보를 찾는다.
      ## 💻 실행 명령
      ```bash
      docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -iE 'pass|secret|token|key|cred' | head; D=$(docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -ciE 'pass|secret|token|key|cred'); [ "$D" -gt 0 ] && echo "gap=secret_in_env" || echo "compliant=no_env_secret"
      ```
      ## ✅ 합격 기준
      `gap=secret_in_env` 출력 시 비밀 노출 발견 성공(el34-web 은 env 에 비밀이 있다).
    hint: 'pass/key/token'
    category: manipulation
    points: 16
    answer: |
      echo "=== 비밀 탐지 (env) ==="
      docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -iE 'pass|secret|token|key|cred' | head; D=$(docker inspect el34-web --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -ciE 'pass|secret|token|key|cred'); [ "$D" -gt 0 ] && echo "gap=secret_in_env" || echo "compliant=no_env_secret"
      echo "→ env 에 비밀(예: SSH_PASS) 노출 = 시크릿 관리 갭. inspect 한 번에 평문 유출"
    answer_detail: "비밀 탐지 = env 변수명 패턴(pass/key/token) 매칭. el34-web 은 env 에 비밀 노출 → gap=secret_in_env. docker inspect 권한만 있으면 평문 탈취."
    verify:
      type: output_contains
      expect: 'gap=secret_in_env'
      field: stdout
      semantic:
        intent: "비밀 탐지"
        success_criteria: ["env 비밀 노출"]
        acceptable_methods: ["**[OSS] env grep (권장)**"]
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 목표 — 왜 위험한가 (노출 경로)
      env/이미지 레이어의 비밀이 왜 위험한지 정리한다.
      ## 💻 실행 명령
      ```bash
      echo "env=inspect/proc/자식 노출, 이미지 레이어=삭제해도 history에 잔존, 로그/에러에 유출"
      ```
      ## ✅ 합격 기준
      비밀 노출 경로가 정리되면 통과.
    hint: '노출 경로'
    category: analysis
    points: 10
    answer: |
      echo "=== 왜 위험한가 ==="
      echo "1) env: docker inspect 한 번/proc/자식 프로세스 상속으로 평문 노출"
      echo "2) 이미지 레이어: Dockerfile 에 ENV/COPY 로 구우면 삭제해도 이전 레이어에 잔존(history)"
      echo "3) 로그·에러 메시지에 env 가 덤프되며 유출"
      echo "→ 비밀은 '구워 넣으면' 회수 불가. 런타임에 외부에서 주입해야"
    answer_detail: "위험 경로 = env(inspect/proc/자식) + 이미지 레이어 잔존(history) + 로그 유출. 비밀을 이미지/env 에 구우면 회수 불가."
    verify:
      type: output_contains
      expect: '레이어'
      field: stdout
      semantic:
        intent: "노출 경로"
        success_criteria: ["env/레이어/로그"]
        acceptable_methods: ["**[관리적] 영향 (권장)**"]
    target_vm: web

  - order: 5
    instruction: |
      ## 🎯 목표 — 올바른 시크릿 주입
      비밀을 안전하게 다루는 방법을 정리한다.
      ## 📖 개념 한 줄
      비밀은 이미지/env 가 아니라 런타임에 "마운트된 파일·시크릿 매니저"로 주입하고 메모리에서만 쓴다.
      ## 💻 실행 명령
      ```bash
      echo "시크릿 매니저(Vault/K8s Secret/docker secret), 파일 마운트(tmpfs), 빌드시 주입 금지"
      ```
      ## ✅ 합격 기준
      올바른 시크릿 주입 방법이 정리되면 통과.
    hint: 'vault/마운트'
    category: analysis
    points: 12
    answer: |
      echo "=== 올바른 시크릿 주입 ==="
      echo "1) 시크릿 매니저: HashiCorp Vault / Kubernetes Secret / docker secret"
      echo "2) 파일 마운트: 비밀을 런타임에 tmpfs 파일로 마운트(이미지에 안 구움)"
      echo "3) 빌드 시 비밀 주입 금지(--secret 마운트, 레이어에 안 남게)"
      echo "4) 최소 권한 + 짧은 수명(rotation) + 접근 감사"
      echo "→ 핵심: 이미지/env 가 아니라 런타임 외부 주입 + 메모리에서만 사용"
    answer_detail: "올바른 시크릿 = Vault/K8s Secret/docker secret + tmpfs 마운트 + 빌드 시 비주입 + rotation. env/이미지에 굽지 않기."
    verify:
      type: output_contains
      expect: 'Vault'
      field: stdout
      semantic:
        intent: "올바른 시크릿 주입"
        success_criteria: ["매니저/마운트"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 6
    instruction: |
      ## 🎯 목표 — 탐지 자동화
      비밀 노출을 자동 탐지하는 방법을 정리한다.
      ## 💻 실행 명령
      ```bash
      echo "이미지/리포 비밀 스캐너(trivy secret, gitleaks), env 점검 CI 게이트"
      ```
      ## ✅ 합격 기준
      비밀 탐지 자동화가 정리되면 통과.
    hint: '비밀 스캐너'
    category: report
    points: 12
    answer: |
      echo "=== 탐지 자동화 ==="
      echo "1) 이미지 비밀 스캔: trivy(--scanners secret), gitleaks(리포지토리)"
      echo "2) env/설정 비밀 점검을 CI 게이트로(발견 시 배포 차단)"
      echo "3) docker inspect env 정기 점검(이번 실습 방식)"
      echo "→ 비밀은 '안 두기'가 최선, 그래도 새는지 자동 탐지로 이중 안전망"
    answer_detail: "탐지 = trivy secret 스캔/gitleaks + CI 게이트 + env 정기 점검. 예방(안 두기)+탐지(이중 안전망)."
    verify:
      type: output_contains
      expect: 'gitleaks'
      field: stdout
      semantic:
        intent: "탐지 자동화"
        success_criteria: ["비밀 스캐너"]
        acceptable_methods: ["**[OSS] 비밀 스캐너 (권장)**"]
    target_vm: web

  - order: 7
    instruction: |
      ## 🎯 목표 — 방어 종합
      ## 💻 실행 명령
      ```bash
      echo "env/이미지에 비밀 금지 + 시크릿 매니저 주입 + rotation + 비밀 스캔 CI 게이트 + 접근 감사"
      ```
      ## ✅ 합격 기준
      시크릿 관리 방어가 종합되면 통과.
    hint: '시크릿 관리 종합'
    category: report
    points: 12
    answer: |
      echo "=== 시크릿 관리 방어 종합 ==="
      echo "1) 예방: env/이미지 레이어에 비밀 절대 금지"
      echo "2) 주입: 시크릿 매니저(Vault/Secret)로 런타임 외부 주입"
      echo "3) 수명: 주기적 rotation + 짧은 TTL"
      echo "4) 탐지: 비밀 스캐너 CI 게이트"
      echo "5) 감사: 비밀 접근 로깅"
      echo "→ 노출된 SSH_PASS 같은 기존 비밀은 즉시 rotation"
    answer_detail: "방어 = 예방(안 굽기)+주입(매니저)+rotation+탐지(스캐너)+감사. 이미 노출된 비밀은 즉시 교체."
    verify:
      type: output_contains
      expect: 'rotation'
      field: stdout
      semantic:
        intent: "시크릿 관리 방어"
        success_criteria: ["예방/주입/탐지"]
        acceptable_methods: ["**[설명] 방어 (권장)**"]
    target_vm: web

  - order: 8
    instruction: |
      ## 🎯 목표 — 시크릿 관리 보고서
      ## 💻 보고서 양식
      ```markdown
      # 클라우드·컨테이너 W06 시크릿 관리 보고서 (학번, 이름)
      ## 1. env 비밀 노출(SSH_PASS) 발견
      ## 2. 노출 경로(env/레이어/로그)
      ## 3. 방어(매니저 주입/rotation/스캔)
      ```
      ## ✅ 합격 기준
      보고서에 노출 + 위험 + 방어가 포함된다.
    hint: '노출+위험+방어'
    category: report
    points: 14
    answer: |
      cat <<'EOF'
      # 클라우드·컨테이너 W06 시크릿 관리 보고서
      ## 1. 발견: el34-web env 에 비밀(SSH_PASS) 평문 노출 → docker inspect 권한만으로 탈취 가능(갭)
      ## 2. 위험: env(inspect/proc/자식)+이미지 레이어 잔존(history)+로그 유출. 구우면 회수 불가
      ## 3. 방어: 시크릿 매니저(Vault/Secret) 런타임 주입 + rotation + 비밀 스캐너 CI 게이트 + 노출 비밀 즉시 교체
      ## 결론: 비밀은 이미지/env 가 아니라 런타임 외부에서 주입. 노출된 SSH_PASS 는 즉시 rotation 필요
      EOF
    answer_detail: "시크릿 보고 = env 비밀 노출(SSH_PASS)+노출경로+방어(매니저/rotation/스캔). 런타임 외부 주입이 근본."
    verify:
      type: output_contains
      expect: 'rotation'
      field: stdout
      semantic:
        intent: "시크릿 관리 보고"
        success_criteria: ["노출/위험/방어"]
        acceptable_methods: ["**[관리적] 보고서 (권장)**"]
    target_vm: web
