    answer_detail: "탐지 = trivy secret 스캔/gitleaks + CI 게이트 + env 정기 점검. 예방(안 두기)+탐지(이중 안전망)."
    verify:
      type: output_contains
      expect: 'gitleaks'
      field: stdout
      semantic:
        intent: "탐지 자동화"
        success_criteria: ["비밀 스캐너"]
