      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) 실행 컨테이너 수 집계 + el34-web 상태 확인 → 끝에 target_ok(종합 감사 대상 식별)
      echo "containers=$(docker ps -q | wc -l)"; docker inspect el34-web --format 'state={{.State.Status}}'; echo target_ok
      ```
      ## ✅ 합격 기준
      `target_ok` 출력 시 통과. **근거:** 컨테이너 수·el34-web 상태·target_ok 가 나오면 종합 감사 대상이 떠 있는 것.
