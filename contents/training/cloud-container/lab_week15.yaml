      # 2) (③W04, CIS 4.1) 컨테이너 내 uid 판정 — 0이면 gap=runs_as_root, 아니면 nonroot
      docker exec el34-web id -u | grep -q '^0$' && echo "gap=runs_as_root" || echo "nonroot"
