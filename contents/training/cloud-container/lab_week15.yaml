  - order: 4
    instruction: |
      ## 🎯 ③ Capability·User (W04)
      ## 💻 실행 명령 (한 줄씩 따라 실행)
      ```bash
      # 1) (③W04, CIS 5.3) CapDrop 판정 — ALL/CAP_ 있으면 caps_ok, 비었으면 gap=no_capdrop
      D=$(docker inspect el34-web --format '{{.HostConfig.CapDrop}}'); echo "$D" | grep -qiE 'ALL|CAP_' && echo "caps_ok" || echo "gap=no_capdrop"
      # 2) (③W04, CIS 4.1) 컨테이너 내 uid 판정 — 0이면 gap=runs_as_root, 아니면 nonroot
      docker exec el34-web id -u | grep -q '^0$' && echo "gap=runs_as_root" || echo "nonroot"
      ```
      ## ✅ 합격 기준
      `gap=runs_as_root` 출력 시 통과. **근거:** CapDrop 비어있음(CIS 5.3) + root 실행(CIS 4.1) 갭이 확인된다.
