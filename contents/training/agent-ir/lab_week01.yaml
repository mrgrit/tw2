lab_id: agent-ir-week01
title: "W01 — AI Vulnerability Storm: 공격 속도 관찰·템포 격차·el34 기준선"
version: ai
course: agent-ir
week: 1
description: |
  AI 속도 IR의 존재 이유. LLM 정찰 속도 관찰(AI_SPEED), 공격/방어 템포 격차 정량화(TEMPO_GAP),
  el34 방어 기준선 수집(BASELINE_OK), 종합(Assessment).
  공격이 분 단위인데 방어가 주 단위면 진다 — 방어도 에이전트로 속도를.
difficulty: hard
duration_minutes: 150
audience: 에이전트 IR (1주차)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - bastion API — el34-bastion:9100, X-API-Key ccc-api-key-2026
  - W01 강의안 정독 — §0.5(템포 불일치·기준선)
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "AI 공격 추론 속도 관찰(AI_SPEED)"
  - "공격/방어 템포 격차 정량화(TEMPO_GAP)"
  - "el34 방어 기준선 수집(BASELINE_OK)"
  - "종합(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — AI 공격 속도 관찰 → AI_SPEED
      > **🎯 목표:** LLM이 정찰 계획을 초 단위로 생성 — AI 공격의 속도를 체감.
      > **개념:** 사람 몇 시간이 초로 압축(교육용 관찰; 실제 공격 수행 아님).
      ```bash
      python3 - <<'PY'
      import json, urllib.request, time
      GPU="http://211.170.162.139:10934/api/generate"
      prompt=('Output JSON only: {"recon_plan":["<step1>","<step2>","<step3>","<step4>"]}. '
              'List a 4-step network recon plan for a web target (conceptual, for a blue-team drill).')
      b={"model":"gemma3:4b","prompt":prompt,"stream":False,"format":"json","options":{"num_predict":220,"temperature":0.2}}
      t0=time.time()
      r=json.load(urllib.request.urlopen(urllib.request.Request(GPU,data=json.dumps(b).encode(),headers={"Content-Type":"application/json"}),timeout=70)).get("response","")
      dt=time.time()-t0
      plan=json.loads(r).get("recon_plan",[])
      print(f"generated {len(plan)}-step recon plan in {dt:.1f}s")
      for s in plan[:4]: print("  -", str(s)[:50])
      # 초 단위로 다단계 공격 계획 생성 = AI 속도
      print("AI_SPEED" if len(plan)>=4 and dt<60 else "SLOW")
      PY
      ```
      ✅ 마지막 줄 `AI_SPEED` (4단계 정찰 계획을 수십 초 내 생성).
      🔎 사람은 이런 계획·조사에 몇 시간. AI는 초 단위 — 이것이 템포 불일치의 근원(방어 관점 관찰).
    answer: |
      generated 4-step recon plan in 8.3s
        - Passive DNS and WHOIS enumeration
        - Port and service scan of the web host
        - Web technology fingerprinting
        - Vulnerability mapping to known CVEs
      AI_SPEED
    answer_detail: "LLM이 4단계 정찰 계획을 수십 초 내 생성 → AI_SPEED. 사람 시간→AI 초."
    verify:
      type: output_contains
      expect: AI_SPEED
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 템포 격차 정량화 → TEMPO_GAP
      > **🎯 목표:** AI 공격 주기 vs 사람 방어 주기 시간 비교.
      > **개념:** 왜 방어가 뒤늦나 — 속도 차를 숫자로.
      ```bash
      python3 - <<'PY'
      # 단계별 소요(시간 단위) — 대략적 관찰치
      ai_attack   ={"recon":0.1, "exploit_dev":2, "attack":0.1}      # 분~시간
      human_defense={"log_analysis":8, "rule_writing":24, "response":48}  # 시간~일
      ai_total=sum(ai_attack.values()); hd_total=sum(human_defense.values())
      gap=hd_total/ai_total
      print(f"AI attack cycle:   {ai_total:.1f} h")
      print(f"human defense cycle: {hd_total:.1f} h")
      print(f"tempo gap: {gap:.0f}x (defense is {gap:.0f}x slower)")
      # 방어가 공격보다 훨씬 느리면 템포 불일치 확인
      print("TEMPO_GAP" if gap>=5 else "MATCHED")
      PY
      ```
      ✅ 마지막 줄 `TEMPO_GAP` (방어 주기가 공격 주기보다 수십 배 느림).
      🔎 이 격차만큼 방어가 뒤늦는다 = 위험 노출 시간. 방어를 에이전트로 좁혀야 하는 이유.
    answer: |
      AI attack cycle:   2.2 h
      human defense cycle: 80.0 h
      tempo gap: 36x (defense is 36x slower)
      TEMPO_GAP
    answer_detail: "AI 공격 2.2h vs 사람 방어 80h, 격차 36배 → TEMPO_GAP. 방어가 뒤늦는 이유."
    verify:
      type: output_contains
      expect: TEMPO_GAP
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — el34 방어 기준선 → BASELINE_OK
      > **🎯 목표:** bastion으로 방어 기준선 신호(호스트 상태)를 수집.
      > **개념:** 정상을 알아야 이상을 안다 — 탐지의 출발점.
      ### 💻 그대로 입력
      ```bash
      echo 1 | sudo -S docker exec el34-bastion sh -c \
        'curl -s -X POST -H "X-API-Key: ccc-api-key-2026" -H "content-type: application/json" -d "{\"target\":\"siem\",\"command\":\"uptime\"}" http://localhost:9100/exec;
         echo; curl -s -X POST -H "X-API-Key: ccc-api-key-2026" -H "content-type: application/json" -d "{\"target\":\"web\",\"command\":\"date\"}" http://localhost:9100/exec' 2>/dev/null \
       | python3 -c "import sys,json
      lines=[l for l in sys.stdin.read().splitlines() if l.strip().startswith('{')]
      sigs=[]
      for l in lines:
          d=json.loads(l); sigs.append((d.get('target'),d.get('command'),d.get('rc'),(d.get('stdout') or '').strip()[:22]))
      for tg,cmd,rc,out in sigs: print(f'  [{tg}] {cmd}: rc={rc} {out}')
      print('BASELINE_OK' if all(rc==0 for _,_,rc,_ in sigs) and len(sigs)>=2 else 'NO_BASELINE')"
      ```
      ✅ 마지막 줄 `BASELINE_OK` (siem·web VM 정상 상태 신호 수집).
      ### 🔎 이 기준선(정상 시 신호)이 이후 주차 탐지의 대조 기준. 공격 흔적은 기준선과의 편차로 잡는다.
    answer: |
      [siem] uptime: rc=0 06:26:45 up 23:59
      [web] date: rc=0 Wed Jul  1 06:26:45 UTC
      BASELINE_OK
    answer_detail: "bastion으로 siem·web VM 정상 상태 신호 수집 → BASELINE_OK. 탐지 기준선."
    verify:
      type: output_contains
      expect: BASELINE_OK
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 종합 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a short note for W01 of an AI-speed incident response course. Findings: an LLM generated a multi-step recon plan in seconds (AI_SPEED), a tempo comparison showed human defense is ~36x slower than an AI attack cycle (TEMPO_GAP), and a defense baseline was collected from el34 via bastion (BASELINE_OK). Explain the tempo mismatch (2 years to 2 hours) and that defense must match speed with agents while keeping controls. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":320}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: 템포 불일치가 방어를 무너뜨린다. 방어도 에이전트로 속도를 맞추되 통제를 지킨다. 기준선이 탐지의 출발점.
      다음 주(W02)는 **공격자 해부 — Tool-use 루프와 능력 경계**.
    answer: |
      Assessment
      AI compresses the attack cycle from years to hours, so human-speed defense is far too slow (tempo mismatch).
      Defense must match speed with agents while keeping controls; a baseline is the starting point for detection.
    answer_detail: "W01 AI Storm 종합(Assessment). 템포 불일치·에이전트 방어·기준선."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
