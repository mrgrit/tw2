lab_id: agent-ir-week15
title: "W15 — 기말: 종합 Purple 사이클·AI-IR 준비도 평가·3대 기둥 종합"
version: ai
course: agent-ir
week: 15
description: |
  과목 전체 종합. Red→Blue→Purple 전체 사이클(PURPLE_COMPLETE), AI-IR 준비도 평가(READINESS_SCORED),
  3대 기둥(템포·킬체인·자동화) 종합(SYNTHESIS_OK), 최종 개인 보고서(Assessment).
  결론: AI 속도 공격은 에이전트 방어(템포 좁히기+킬체인 탐지+자기 개선)로 따라잡는다.
difficulty: hard
duration_minutes: 180
audience: 에이전트 IR (15주차·기말)
prerequisites:
  - el34 호스트 접속 (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`)
  - GPU Ollama 도달 — gemma3:4b
  - W01~W14 실습 완료
objectives:
  - "GPU 헬스체크(GEN_OK)"
  - "Red→Blue→Purple 전체 사이클(PURPLE_COMPLETE)"
  - "AI-IR 준비도 평가(READINESS_SCORED)"
  - "3대 기둥 종합(SYNTHESIS_OK)"
  - "최종 개인 보고서(Assessment)"
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      ## STEP 1 — GPU 헬스체크 → GEN_OK
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Reply with the word ready.","stream":false,"options":{"num_predict":10}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('GEN_OK' if r.strip() else 'GEN_EMPTY')"
      ```
      ✅ 마지막 줄 `GEN_OK`.
    answer: |
      ready
      GEN_OK
    answer_detail: "GPU 응답 확인."
    verify:
      type: output_contains
      expect: GEN_OK
      field: stdout

  - order: 2
    instruction: |
      ## STEP 2 — 종합 Purple 사이클 → PURPLE_COMPLETE
      > **🎯 목표:** Red(공격)→Blue(탐지·대응)→Purple(코치·승격) 전체 사이클을 한 번에.
      > **개념:** 배운 모든 것이 하나로 작동.
      ```bash
      python3 - <<'PY'
      # Red: 공격 시뮬(킬체인)
      red={"chain":["recon","exploit","lateral"],"source":"185.x"}
      # Blue: 각 단계 탐지 + 대응
      DETECT={"recon":"pattern (W03)","exploit":"mutation burst (W04)","lateral":"auth anomaly (W05)"}
      blue={s:DETECT[s] for s in red["chain"]}
      response="isolate + block (approval)"
      # Purple: 성공 대응을 경험→코치/승격
      purple={"experience":"detect+isolate succeeded","promote":"playbook: killchain_response","coach":"codified to Bastion"}
      print("RED  :", red["chain"])
      print("BLUE :", list(blue.values()), "->", response)
      print("PURPLE:", purple["promote"], "|", purple["coach"])
      cycle_ok = len(blue)==len(red["chain"]) and purple["promote"] and purple["coach"]
      print("PURPLE_COMPLETE" if cycle_ok else "INCOMPLETE")
      PY
      ```
      ✅ 마지막 줄 `PURPLE_COMPLETE` (Red 킬체인→Blue 단계 탐지·대응→Purple 승격·코치 전체 사이클).
      🔎 공격→탐지→대응→경험→자동 방어. 사이클이 돌수록 방어가 나아진다 — 자기 개선 체계.
    answer: |
      RED  : ['recon', 'exploit', 'lateral']
      BLUE : ['pattern (W03)', 'mutation burst (W04)', 'auth anomaly (W05)'] -> isolate + block (approval)
      PURPLE: playbook: killchain_response | codified to Bastion
      PURPLE_COMPLETE
    answer_detail: "Red→Blue→Purple 전체 사이클 통합 → PURPLE_COMPLETE. 자기 개선 체계."
    verify:
      type: output_contains
      expect: PURPLE_COMPLETE
      field: stdout

  - order: 3
    instruction: |
      ## STEP 3 — 준비도 평가 → READINESS_SCORED
      > **🎯 목표:** AI-IR 준비도를 여러 차원으로 정직히 점수화.
      > **개념:** 약점 진단이 개선의 출발점.
      ```bash
      python3 - <<'PY'
      # AI-IR 준비도 차원별 점수(0~1) — 정직하게
      readiness={"detection_tempo":0.8,   # AI 속도 따라잡나
                 "killchain_coverage":0.9, # 전 단계 커버하나
                 "active_defense":0.6,      # 기만·지연 갖췄나
                 "automation":0.7,          # Purple 자동화 되나
                 "documentation":0.8}       # 사고 문서·환류 되나
      avg=sum(readiness.values())/len(readiness)
      weakest=min(readiness, key=readiness.get)
      for dim,sc in readiness.items(): print(f"  {dim:20}: {sc:.1f} {'(weakest)' if dim==weakest else ''}")
      print(f"overall readiness: {avg:.2f}")
      print(f"improvement priority: {weakest}")
      # 평가가 완료되고 약점이 식별되면 성공
      print("READINESS_SCORED" if avg>0 and weakest else "NO_SCORE")
      PY
      ```
      ✅ 마지막 줄 `READINESS_SCORED` (차원별 점수 + 최약점(active_defense) 식별).
      🔎 정직한 점수로 약점(능동 방어 0.6)을 드러내 개선 우선순위를 정한다. readiness=개선 출발점.
    answer: |
      detection_tempo     : 0.8
      killchain_coverage  : 0.9
      active_defense      : 0.6 (weakest)
      automation          : 0.7
      documentation       : 0.8
      overall readiness: 0.76
      improvement priority: active_defense
      READINESS_SCORED
    answer_detail: "AI-IR 준비도 차원별 점수+약점 식별 → READINESS_SCORED. 개선 출발점."
    verify:
      type: output_contains
      expect: READINESS_SCORED
      field: stdout

  - order: 4
    instruction: |
      ## STEP 4 — 3대 기둥 종합 → SYNTHESIS_OK
      > **🎯 목표:** 과목의 3대 기둥이 모두 구현됐는지 확인.
      > **개념:** 템포·킬체인·자동화 — 셋이 함께 서야 AI 속도를 따라잡는다.
      ```bash
      python3 - <<'PY'
      # 3대 기둥과 각 근거(구현 주차)
      pillars={"tempo_defense":["W01 tempo","W03 early detect","W09 realtime rule"],
               "killchain_detection":["W02 dissect","W03-07 stage detect"],
               "purple_automation":["W10 active defense","W11 coach","W12 auto-promote"]}
      complete=all(len(evidence)>=2 for evidence in pillars.values())
      for p,ev in pillars.items():
          print(f"  {p:22}: {', '.join(ev)}")
      # 세 기둥 모두 근거(2주차 이상)가 있으면 종합 완성
      print("all three pillars implemented:", complete)
      print("SYNTHESIS_OK" if complete else "GAPS")
      PY
      ```
      ✅ 마지막 줄 `SYNTHESIS_OK` (템포·킬체인·자동화 3대 기둥 모두 구현).
      🔎 템포 방어+킬체인 탐지+Purple 자동화. 셋이 함께 AI 속도 공격을 따라잡는다 — 과목의 결론.
    answer: |
      tempo_defense         : W01 tempo, W03 early detect, W09 realtime rule
      killchain_detection   : W02 dissect, W03-07 stage detect
      purple_automation     : W10 active defense, W11 coach, W12 auto-promote
      all three pillars implemented: True
      SYNTHESIS_OK
    answer_detail: "3대 기둥(템포·킬체인·자동화) 모두 구현 확인 → SYNTHESIS_OK. 과목 결론."
    verify:
      type: output_contains
      expect: SYNTHESIS_OK
      field: stdout

  - order: 5
    instruction: |
      ## STEP 5 — 최종 개인 보고서 → Assessment
      ```bash
      curl -s http://211.170.162.139:10934/api/generate \
        -d '{"model":"gemma3:4b","prompt":"Write a final capstone report for the agent incident response course. Findings: a full Red->Blue->Purple cycle ran end to end (PURPLE_COMPLETE), AI-IR readiness was scored by dimension with active defense as the weakest (READINESS_SCORED), and the three pillars tempo defense, kill-chain detection, and Purple automation were all implemented (SYNTHESIS_OK). Conclude with the course thesis: AI-speed attacks can be matched by agent defense that narrows tempo, detects anywhere on the kill chain, and self-improves, always under control. Start with exactly Assessment on its own line.","stream":false,"options":{"num_predict":340}}' \
       | python3 -c "import sys,json; r=json.load(sys.stdin).get('response',''); print(r); print('' if 'Assessment' in r else '[형식 미준수 — 재실행]')"
      ```
      ✅ 출력에 `Assessment`.
      🔎 정리: AI 속도 공격은 에이전트 방어로 따라잡는다 — 템포 좁히기+킬체인 탐지+자기 개선, 통제 안에서. 수고했습니다.
    answer: |
      Assessment
      A full Red->Blue->Purple cycle worked, readiness was scored honestly, and the three pillars (tempo defense, kill-chain detection, Purple automation) were implemented.
      Course thesis: AI-speed attacks are matched by agent defense that narrows tempo, detects anywhere on the kill chain, and self-improves under control.
    answer_detail: "W15 기말 종합(Assessment). 종합 Purple·준비도·3대 기둥, 과목 결론."
    verify:
      type: output_contains
      expect: Assessment
      field: stdout
