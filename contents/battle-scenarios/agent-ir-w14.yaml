id: "agent-ir-w14"
category: "agent-ir"
title: "[에이전트IR W14] 모의 실사고: 다단계 Agentic APT vs 종합 IR 대응"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — **다단계 Agentic APT**(장기·은밀·다단계 AI 지원 침투)를 모의하고, 그에 대한
  종합 IR을 훈련한다. 실전에 가까운 다단계 시나리오로 W01~W13 역량을 통합한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(Agentic APT)와 Blue(종합 IR 대응)를 모두 수행.
    • duel : Red 학생이 다단계 APT를 수행하고, Blue 학생이 탐지·상관·봉쇄·복구로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 에이전트 IR 관점 — Agentic APT는 정찰→침투→확산→(지속)→목적 달성의 다단계를 AI 속도·은밀성으로
    수행한다. 종합 IR은 이를 킬체인 전체로 탐지·상관·봉쇄·복구·보고한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE(PoC·파괴/유출 금지) 엄수.

# ───────────────────────── RED (다단계 Agentic APT) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — Agentic APT 킬체인 실행

      정찰→침투→확산의 **다단계 APT 킬체인**을 AI 속도·은밀성을 섞어 실행한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰→웹 침투→다중 서비스 확산을 단계별로
        (고유 태그). 일부 단계는 저속·은밀하게 조절.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T3 -Pn 192.168.0.161 -p1-1000 --reason
      curl -s -A 'auto-red-<학번>-apt' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      for h in dvwa.el34.lab neobank.el34.lab; do curl -s -A 'auto-red-<학번>-apt' -H "Host: $h" http://192.168.0.161/; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 APT 킬체인**(단계·은밀성·시각).

      ### ✅ 합격 기준
      정찰→침투→확산의 다단계 APT를 실행해 대상에 흔적을 남기고 킬체인 단계·은밀성을 기록한다.
    hint: "정찰→웹 침투→다중 서비스 확산 다단계(태그 auto-red-<학번>-apt), 일부 저속·은밀. 단계·시각 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-14-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          Agentic APT 킬체인 — 다단계·AI 속도·은밀성을 섞은 실전형 침투.
        success_criteria:
          - "대상 WAF/IPS에 다단계 APT 흔적이 남고 고유 태그로 귀속됨"
          - "정찰→침투→확산 다단계를 실행"
          - "(설명) 킬체인 단계·은밀성·시각을 기록"
        acceptable_methods:
          - "다단계 APT 킬체인 + 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "단계 연결 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 은밀성·지속성 요소 추가

      APT답게 **은밀성·지속성** 요소를 추가한다: 저속 구간·정상 위장·반복 재접속(시도 패턴만).

      ### ✅ 합격 기준
      저속·정상 위장·반복 재접속으로 은밀성·지속성을 시뮬하고, 탐지를 어렵게 하는 방식을 분석한다.
    hint: "저속 구간·정상 위장·반복 재접속(태그, 실제 백도어 금지)으로 은밀성·지속성 시뮬 + 탐지 회피 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-14-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          은밀성·지속성 — 저속·위장·반복으로 탐지를 어렵게 하는 APT 특성을 시뮬.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "저속·정상 위장·반복 재접속으로 은밀성·지속성을 시뮬"
          - "(설명) 탐지 회피 방식을 분석"
        acceptable_methods:
          - "은밀·지속 시뮬 + 회피 분석"
        negative_signs:
          - "실제 백도어(윤리 위반)"
          - "은밀성 요소 없음"

# ───────────────────────── BLUE (종합 IR 대응) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — APT 킬체인 탐지·상관·재구성

      Red APT를 **전체 킬체인으로 탐지·상관·재구성**한다.

      ### 어떻게
      - Wazuh/Suricata에서 정찰·침투·확산·은밀 구간을 출처·시간·태그로 상관.
      - 저속·은밀 구간도 누적·상관으로 잡아 전체 APT 타임라인을 재구성.

      ### ✅ 합격 기준
      다단계·은밀 이벤트를 상관해 전체 APT 킬체인 타임라인을 재구성하고 은밀 구간도 식별한다.
    hint: "Wazuh/Suricata에서 정찰·침투·확산·은밀 구간을 출처·시간·태그로 상관 → 전체 APT 타임라인 재구성. 저속 구간 누적 상관."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-14-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          APT 킬체인 재구성 — 다단계·은밀 이벤트를 상관해 전체 타임라인을 복원.
        success_criteria:
          - "Wazuh/Suricata에서 다단계·은밀 이벤트를 상관"
          - "전체 APT 킬체인 타임라인을 재구성"
          - "(설명) 저속·은밀 구간도 식별"
        acceptable_methods:
          - "다단계 상관 + 타임라인 재구성"
        negative_signs:
          - "경보 근거 없음"
          - "은밀 구간 미탐·타임라인 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 종합 IR: 봉쇄·근절·복구·보고

      APT에 대한 **종합 IR**을 수행한다.

      ### 무엇을
      - **봉쇄**: 출처 차단·확산 세그먼트 격리(자동, 고위험 승인).
      - **근절·복구**: 지속 아티팩트 제거·영향 자산 복구·무결성 확인.
      - **보고**: 킬체인 타임라인·ATT&CK 매핑·영향·교훈, 지식화(플레이북 반영).
      - **자동화**: AI 속도 대응을 위한 플레이북·자동 봉쇄 활용.

      ### ✅ 합격 기준
      봉쇄·근절·복구·보고·지식화를 제시하고 "다단계 Agentic APT엔 킬체인 전반의 종합 IR" 원칙을
      설명한다.
    hint: "봉쇄(차단·격리)+근절·복구(아티팩트 제거·무결성)+보고(타임라인·ATT&CK·교훈·플레이북 반영)+자동화. '킬체인 전반 종합 IR' 원칙."
    verify:
      type: "semantic"
      expect: "apt_comprehensive_ir"
      semantic:
        intent: |
          종합 IR — APT 킬체인 전반을 봉쇄·근절·복구·보고·지식화로 대응.
        success_criteria:
          - "봉쇄(차단·격리)와 근절·복구(무결성 확인)를 제시"
          - "보고(타임라인·ATT&CK·교훈)와 지식화(플레이북 반영)를 제시"
          - "AI 속도 대응 자동화를 제시"
          - "(설명) '킬체인 전반의 종합 IR' 원칙 설명"
        acceptable_methods:
          - "봉쇄 + 근절/복구 + 보고 + 지식화 + 자동화"
        negative_signs:
          - "봉쇄만·복구/보고 없음"
          - "자동화·지식화 없음"
