id: "agent-ir-w05"
category: "agent-ir"
title: "[에이전트IR W5] 기계 속도 측면이동·지속성 vs 확산·지속 흔적 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — 침투 후 **기계 속도의 측면이동·지속성 확립**과, 그 **확산·지속 흔적**을 탐지하는
  방어를 다룬다. AI는 초기 발판에서 순식간에 확산하므로, 방어자는 확산의 초기 신호를 잡아야 한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(확산·지속 시도)와 Blue(확산·지속 흔적 탐지)를 모두 수행.
    • duel : Red 학생이 측면이동·지속성을 시도하고, Blue 학생이 확산 흔적을 탐지한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. el34의
    다중 vhost·서비스를 대상 표면으로 삼아 확산을 **시뮬**한다. Red 채점은 **대상 탐지 흔적** + 본인
    명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 에이전트 IR 관점 — 측면이동은 "새 대상으로의 접근 패턴 변화"로, 지속성은 "반복 재접속·설정 변경
    시도"로 나타난다. 방어자는 확산 그래프(어디서→어디로)를 그린다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. 실제 파괴·영속 백도어 금지(시뮬·PoC).

# ───────────────────────── RED (확산·지속 시도) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 다중 서비스 측면이동 시뮬

      초기 발판(웹)에서 **el34의 다른 서비스/vhost로 접근을 확장**하는 측면이동을 시뮬한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상의 여러 vhost/서비스(예: 웹·다른 취약앱·8007 등)로 접근
        패턴을 확장(고유 태그).
      - 확산 경로(발판→다음 대상)를 기록.

      ### 권장 명령 (참고)
      ```bash
      for h in juiceshop.el34.lab dvwa.el34.lab neobank.el34.lab; do
        curl -s -o /dev/null -w "$h=%{http_code}\n" -A 'auto-red-<학번>-lateral' -H "Host: $h" http://192.168.0.161/; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 확산 경로**(발판→다음 대상, 시각).

      ### ✅ 합격 기준
      다중 서비스로 접근을 확장하는 측면이동을 시뮬해 대상에 흔적을 남기고 확산 경로를 기록한다.
    hint: "여러 vhost/서비스로 접근 확장(Host 헤더·태그 auto-red-<학번>). 확산 경로(발판→다음 대상) 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-5-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          기계 속도 측면이동 — 발판에서 다중 대상으로 순식간에 접근을 확장하는 확산을 시뮬.
        success_criteria:
          - "대상 WAF/IPS에 다중 서비스 접근 흔적이 남고 고유 태그로 귀속됨"
          - "다중 서비스/vhost로 측면이동을 시뮬"
          - "(설명) 확산 경로(발판→다음 대상·시각)를 기록"
        acceptable_methods:
          - "다중 vhost/서비스 접근 확장 + 경로 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "확산 경로 기록 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 지속성 확립 시도 흔적

      **지속성**(반복 재접속·설정/자격 변경 시도)을 시뮬해 방어자에게 남는 지속 흔적을 실증한다(실제
      백도어 설치 금지, 시도 패턴만).

      ### ✅ 합격 기준
      반복 재접속·변경 시도로 지속성 확립 패턴을 시뮬하고, 그것이 남기는 지속 흔적(반복성·주기성)을
      분석한다.
    hint: "반복 재접속·변경 시도(태그)로 지속성 시뮬(실제 백도어 금지) + 반복성·주기성 흔적 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-5-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          지속성 시도 — 반복 재접속·변경 시도가 남기는 주기적·반복적 흔적을 실증.
        success_criteria:
          - "대상 IPS/WAF에 반복 시도 흔적이 남고 고유 태그로 귀속됨"
          - "반복 재접속·변경 시도로 지속성을 시뮬"
          - "(설명) 반복성·주기성 흔적을 분석"
        acceptable_methods:
          - "반복 시도 + 지속 흔적 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "실제 백도어 설치(윤리 위반)"

# ───────────────────────── BLUE (확산·지속 흔적 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 확산 그래프·지속 흔적 탐지

      Red의 **측면이동·지속성**을 SIEM/IPS에서 탐지해 확산 그래프를 그린다.

      ### 어떻게
      - Wazuh/Suricata에서 동일 출처가 여러 대상/서비스에 접근한 패턴을 상관해 확산 경로를 재구성.
      - 반복 재접속·주기적 시도를 지속성 흔적으로 식별.

      ### ✅ 합격 기준
      측면이동을 상관해 확산 경로를 재구성하고 지속성 흔적(반복·주기)을 식별한다.
    hint: "Wazuh/Suricata에서 동일 출처의 다중 대상 접근을 상관→확산 경로 재구성 + 반복·주기 지속 흔적 식별."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-5-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          확산·지속 탐지 — 동일 출처의 다중 대상 접근을 상관해 확산 경로와 지속 흔적을 식별.
        success_criteria:
          - "Wazuh/Suricata에서 다중 대상 접근을 상관"
          - "확산 경로(어디서→어디로)를 재구성"
          - "(설명) 반복·주기적 지속 흔적을 식별"
        acceptable_methods:
          - "확산 상관 + 지속 흔적 식별"
        negative_signs:
          - "경보 근거 없음"
          - "확산 경로·지속 흔적 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 확산 차단·봉쇄·지속성 제거 설계

      기계 속도 확산을 막는 **조기 봉쇄·지속성 제거**를 설계한다.

      ### 무엇을
      - **확산 조기 탐지**: 동일 출처의 대상 수 급증·서비스 간 이동을 임계·상관으로 조기 탐지.
      - **분할·봉쇄**: 네트워크 분할·최소 신뢰로 확산 표면 축소, 출처·세그먼트 조기 격리.
      - **지속성 제거**: 반복 재접속·변경 시도 탐지·차단, 무결성 모니터로 지속 아티팩트 발견.
      - **속도 대응**: 확산이 빠르므로 자동 봉쇄(고위험은 승인 게이트).

      ### ✅ 합격 기준
      확산 조기 탐지·분할 봉쇄·지속성 제거·속도 대응을 제시하고 "확산은 초기에 끊어야 한다" 원칙을
      설명한다.
    hint: "확산 조기 탐지(대상 수 급증)+분할·봉쇄(최소 신뢰·조기 격리)+지속성 제거(반복 시도 차단·무결성 모니터)+자동 봉쇄. '확산은 초기에 끊기' 원칙."
    verify:
      type: "semantic"
      expect: "containment_design"
      semantic:
        intent: |
          확산 봉쇄·지속성 제거 — 조기 탐지·분할·자동 봉쇄로 기계 속도 확산을 끊는다.
        success_criteria:
          - "확산 조기 탐지(대상 수 급증·서비스 간 이동)를 제시"
          - "분할·봉쇄(최소 신뢰·조기 격리)를 제시"
          - "지속성 제거(반복 시도 차단·무결성 모니터)와 속도 대응을 제시"
          - "(설명) '확산은 초기에 끊어야' 원칙 설명"
        acceptable_methods:
          - "조기 탐지 + 분할 봉쇄 + 지속성 제거 + 속도 대응"
        negative_signs:
          - "확산 조기 탐지·분할 없음"
          - "느린 수동 대응만"
