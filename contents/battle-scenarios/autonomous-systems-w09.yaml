id: "autonomous-systems-w09"
category: "autonomous-systems"
title: "[자율시스템 W9] 로봇 보안: 시리얼·펌웨어·ROS 표면 침투 vs 로봇 보안 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  로봇 보안 공방전 — 로봇의 **시리얼 통신·펌웨어·ROS 미들웨어** 공격 표면과 방어를 설계·분석한다.
  실물 로봇·하드웨어가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(로봇 표면 침투 경로)와 Blue(로봇 보안 설계)를 모두 수행.
    • duel : Red 학생이 침투 경로를 제시하고, Blue 학생이 로봇 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 시리얼·펌웨어·ROS 표면별 공격 경로의 구체성, 사이버→
    물리(액추에이터 조작) 연결, 로봇 보안(인증·펌웨어 서명·통신 보안) 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (로봇 표면 침투 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 시리얼·펌웨어·ROS 표면 매핑 + 침투 경로

      로봇의 3대 표면(시리얼/버스 통신·펌웨어/MCU·ROS 미들웨어)을 매핑하고 침투 경로를 설계한다.

      ### 무엇을
      - **시리얼/버스**: UART/CAN/I2C 무인증 명령 주입·스니핑.
      - **펌웨어/MCU**: 펌웨어 추출·하드코딩 비밀·서명 부재·디버그 인터페이스.
      - **ROS**: 노드/토픽 무인증 접근(W10 심화).
      - 한 표면 침투가 **액추에이터(모터·관절) 조작**으로 이어지는 경로.

      ### ✅ 합격 기준
      최소 2개 표면(시리얼·펌웨어·ROS)의 구체적 공격 경로를 설계하고, 사이버 침투가 물리 조작으로
      이어짐을 서술한다.
    hint: "시리얼(UART/CAN 무인증 주입)·펌웨어(추출·하드코딩 비밀·무서명)·ROS(무인증) 2+ 표면 + 액추에이터 조작 연결."
    verify:
      type: "semantic"
      expect: "robot_attack_path"
      semantic:
        intent: |
          로봇 표면 침투 — 시리얼·펌웨어·ROS 표면을 매핑하고 물리 조작으로 잇는 경로를 구성.
        success_criteria:
          - "로봇 3대 표면(시리얼·펌웨어·ROS)을 매핑"
          - "최소 2개 표면의 구체적 공격 경로(무인증 주입·펌웨어 추출·무서명)를 설계"
          - "사이버 침투가 액추에이터 물리 조작으로 이어짐을 서술"
        acceptable_methods:
          - "표면별 공격 + 물리 조작 연결"
        negative_signs:
          - "표면 하나만·기법 불명"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 펌웨어 분석·백도어 착안

      로봇 펌웨어의 취약(하드코딩 비밀·서명 부재·안전하지 않은 업데이트)을 분석하고, 펌웨어 변조/
      백도어가 어떻게 지속 제어를 주는지 설명한다.

      ### ✅ 합격 기준
      펌웨어 취약(하드코딩 비밀·무서명·불안전 업데이트)을 분석하고, 펌웨어 변조가 지속·은밀한 물리
      제어로 이어지는 경로를 설명한다.
    hint: "펌웨어 하드코딩 비밀·무서명·불안전 업데이트 → 변조/백도어로 지속·은밀 물리 제어. 지속성 설명."
    verify:
      type: "semantic"
      expect: "firmware_analysis"
      semantic:
        intent: |
          로봇 펌웨어 취약 — 하드코딩 비밀·무서명·불안전 업데이트가 지속 제어(백도어)를 허용함을 이해.
        success_criteria:
          - "펌웨어 취약(하드코딩 비밀·무서명·불안전 업데이트)을 분석"
          - "펌웨어 변조/백도어가 지속·은밀 물리 제어로 이어짐을 설명"
          - "(설명) 펌웨어 무결성의 중요성을 언급"
        acceptable_methods:
          - "펌웨어 취약 분석 + 지속 제어 경로"
        negative_signs:
          - "펌웨어 취약 근거 없이 '변조 가능'만"

# ───────────────────────── BLUE (로봇 보안 설계) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 로봇 통신·펌웨어 보안 설계

      RED의 표면 침투를 막는 **통신·펌웨어 보안**을 설계한다.

      ### 무엇을
      - **통신 보안**: 시리얼/버스 명령 인증·무결성(CAN 인증·메시지 서명), 디버그 인터페이스 비활성.
      - **펌웨어 보안**: 서명된 펌웨어·보안 부팅·롤백 방지, 하드코딩 비밀 제거.
      - **접근 통제**: ROS 노드/토픽 인증(W10), 최소 권한.

      ### ✅ 합격 기준
      통신 인증/무결성·펌웨어 서명/보안 부팅·접근 통제를 제시하고 RED 표면별로 매핑한다.
    hint: "시리얼/CAN 명령 인증·서명+디버그 비활성+펌웨어 서명·보안 부팅·비밀 제거+ROS 인증. RED 표면 매핑."
    verify:
      type: "semantic"
      expect: "robot_security"
      semantic:
        intent: |
          로봇 통신·펌웨어 보안 — 인증·무결성·서명·접근 통제로 표면을 방어.
        success_criteria:
          - "통신 보안(명령 인증·서명·디버그 비활성)을 제시"
          - "펌웨어 보안(서명·보안 부팅·비밀 제거)을 제시"
          - "접근 통제(ROS 인증·최소 권한)를 제시하고 RED 표면 매핑"
        acceptable_methods:
          - "통신 + 펌웨어 + 접근 통제"
        negative_signs:
          - "표면 하나만 방어"
          - "펌웨어 서명 또는 통신 인증 누락"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 로봇 안전 우선 설계 (물리 안전 계층)

      보안을 넘어 로봇의 **물리 안전**을 보장하는 독립 안전 계층을 설계한다.

      ### 무엇을
      - **독립 안전 계층**: 비상 정지(E-stop)·속도/토크 제한·작업 공간 제한을 제어 소프트와 독립적으로 강제.
      - **안전 정격**: 안전 정격 부품(safety-rated)·감시 회로(watchdog), 이상 시 안전 상태로.
      - **인간-로봇 협업 안전**: 근접 감지·충돌 회피·힘 제한(협동 로봇).

      ### ✅ 합격 기준
      독립 안전 계층(E-stop·속도/토크 제한)과 안전 정격·감시를 제시하고 "제어가 뚫려도 물리적으로
      안전" 원칙을 설명한다.
    hint: "독립 안전 계층(E-stop·속도/토크·작업공간 제한)+안전 정격·watchdog+협업 안전(근접·힘 제한). '제어 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "robot_safety"
      semantic:
        intent: |
          로봇 물리 안전 — 독립 안전 계층·안전 정격으로 제어가 뚫려도 물리 안전을 보장.
        success_criteria:
          - "독립 안전 계층(E-stop·속도/토크·작업 공간 제한)을 제시"
          - "안전 정격 부품·감시 회로(watchdog)를 제시"
          - "(설명) 협업 안전과 '제어 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "독립 안전 계층 + 안전 정격 + 협업 안전"
        negative_signs:
          - "독립 안전 계층 없음"
          - "보안만·물리 안전 관점 없음"
