id: "agent-ir-w12"
category: "agent-ir"
title: "[에이전트IR W12] Purple Round 2: 반복 공격 vs Experience→Playbook 자동 승격(자기 개선)"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR Purple 공방전 — Purple Round 2. 반복되는 공격 경험(Experience)을 **재사용 가능한
  Playbook으로 자동 승격**하는 자기 개선 루프를 다룬다. 한 번 배운 대응이 자동화된 표준 절차가 된다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(반복·변형 공격)와 Blue(Experience→Playbook 승격)를 모두 수행.
    • duel : Red 학생이 반복·변형 공격을 하고, Blue 학생이 경험을 플레이북으로 승격한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 승격 설계는 self 기준 semantic.

  ▸ 에이전트 IR 관점 — Experience(개별 대응 기록)가 충분히 쌓이면 공통 패턴을 추출해 Playbook(표준
    절차)으로 승격한다. 이것이 자율 시스템의 자기 개선이다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (반복·변형 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 반복·변형 공격으로 경험 축적 유도

      Blue가 경험을 쌓을 수 있도록 **같은 유형의 공격을 여러 변형으로 반복**한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 같은 유형(예: SQLi)의 여러 변형을 반복
        수행(고유 태그).
      - 반복 패턴과 변형 범위를 기록.

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 반복·변형 범위**(플레이북 승격의 근거).

      ### ✅ 합격 기준
      같은 유형의 여러 변형을 반복해 대상에 흔적을 남기고, 반복 패턴·변형 범위를 기록한다.
    hint: "같은 유형(SQLi 등) 여러 변형 반복(태그 auto-red-<학번>) + 반복 패턴·변형 범위 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-12-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          반복·변형 공격 — 경험 축적을 유도해 플레이북 승격의 근거를 제공.
        success_criteria:
          - "대상 WAF/IPS에 반복·변형 공격 흔적이 남고 고유 태그로 귀속됨"
          - "같은 유형의 여러 변형을 반복 수행"
          - "(설명) 반복 패턴·변형 범위를 기록"
        acceptable_methods:
          - "반복·변형 공격 + 범위 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "단발·변형 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 승격 플레이북의 커버리지 검증

      Blue가 승격한 플레이북이 **새 변형까지 커버**하는지 검증한다.

      ### ✅ 합격 기준
      플레이북 승격 후 새 변형으로 재공격해 커버리지(일반화)를 검증하고 미커버를 피드백한다.
    hint: "승격 플레이북에 없던 새 변형으로 재공격(태그) → 커버리지 검증 + 미커버 피드백. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-12-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          플레이북 커버리지 검증 — 새 변형으로 승격 플레이북의 일반화를 검증.
        success_criteria:
          - "대상 IPS/WAF에 새 변형 공격 흔적이 남고 고유 태그로 귀속됨"
          - "새 변형으로 플레이북 커버리지를 검증"
          - "(설명) 미커버를 피드백"
        acceptable_methods:
          - "새 변형 재공격 + 커버리지 검증"
        negative_signs:
          - "동일 변형만"

# ───────────────────────── BLUE (Experience→Playbook 승격) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 경험 패턴 추출·플레이북 승격

      반복된 대응 경험에서 **공통 패턴**을 추출해 재사용 Playbook으로 승격한다.

      ### 무엇을
      - 반복 대응 기록(Experience)에서 공통 탐지 지표·대응 단계·분기를 추출.
      - 매개변수화된 Playbook(트리거·단계·판정·분기)으로 승격, 변형까지 일반화.
      - 승격 기준(빈도·성공률·안정성)을 명시.

      ### ✅ 합격 기준
      반복 경험에서 공통 패턴을 추출해 매개변수화 플레이북으로 승격하고, 승격 기준을 제시한다.
    hint: "반복 Experience→공통 탐지 지표·대응 단계·분기 추출→매개변수화 Playbook 승격(일반화)+승격 기준(빈도·성공률·안정성)."
    verify:
      type: "semantic"
      expect: "playbook_promotion"
      semantic:
        intent: |
          Experience→Playbook 승격 — 반복 경험의 공통 패턴을 재사용 플레이북으로 자동 승격.
        success_criteria:
          - "반복 경험에서 공통 패턴(지표·단계·분기)을 추출"
          - "매개변수화 플레이북으로 승격(변형 일반화)"
          - "(설명) 승격 기준(빈도·성공률·안정성)을 제시"
        acceptable_methods:
          - "패턴 추출 + 플레이북 승격 + 기준"
        negative_signs:
          - "단발 대응만·일반화 없음"
          - "승격 기준 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자기 개선 루프·안전·거버넌스 설계

      Experience→Playbook 승격의 **자기 개선 루프**를 안전하게 설계한다.

      ### 무엇을
      - **자기 개선 루프**: 대응→경험 축적→패턴 추출→플레이북 승격→적용→새 경험의 반복.
      - **검증 게이트**: 자동 승격 전 검증(오탐·과차단·부작용), 사람 승인(고위험).
      - **버전·롤백**: 플레이북 버전 관리·성능 저하 시 롤백.
      - **감사·거버넌스**: 승격·변경 감사, 승격 정책.

      ### ✅ 합격 기준
      자기 개선 루프·검증 게이트·버전/롤백·감사를 제시하고 "자동 승격은 검증·게이트와 함께" 원칙을
      설명한다.
    hint: "자기 개선 루프(경험→추출→승격→적용)+검증 게이트(오탐·부작용·승인)+버전/롤백+감사·정책. '자동 승격은 검증·게이트와 함께' 원칙."
    verify:
      type: "semantic"
      expect: "self_improvement_loop"
      semantic:
        intent: |
          자기 개선 루프 — 경험을 플레이북으로 승격하는 순환을 검증·게이트·감사로 안전하게 운영.
        success_criteria:
          - "자기 개선 루프(경험→추출→승격→적용)를 제시"
          - "검증 게이트(오탐·부작용·사람 승인)를 제시"
          - "버전/롤백·감사·정책을 제시"
          - "(설명) '자동 승격은 검증·게이트와 함께' 원칙 설명"
        acceptable_methods:
          - "자기 개선 루프 + 검증 게이트 + 버전/롤백 + 감사"
        negative_signs:
          - "검증 없이 자동 승격"
          - "롤백·감사 언급 없음"
