id: "ai-security-w11"
category: "ai-security"
title: "[AI보안활용 W11] 자율 미션: 다단계 자율 실행 시험 vs Red/Blue/Purple 승인 게이트 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — bastion **자율 미션**(다단계 자율 실행·Red/Blue/Purple·승인 게이트)을 구축한다.
  Red는 자율 미션의 위험 지점을 시험하고, Blue는 승인 게이트를 갖춘 안전한 자율 미션을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율 미션 위험 시험)와 Blue(승인 게이트 자율 미션)를 모두 수행.
    • duel : Red 학생이 위험 지점을 시험하고, Blue 학생이 안전한 자율 미션으로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 자율 미션 설계는 semantic.

  ▸ 관점 — 자율 미션은 다단계를 스스로 실행한다. 위험은 비가역 행동이므로, 조회는 자율·변경은 승인
    게이트로 통제한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (자율 미션 위험 시험) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 자율 대응이 오작동하면 위험한 상황 유발

      자율 방어 미션이 **오작동 시 피해가 큰** 상황을 유발한다(예: 정상 트래픽을 공격으로 오인해 과차단
      유도).

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 공격과 함께 정상 위장 트래픽을 섞어
        (고유 태그), 자율 대응이 과차단하면 정상까지 피해볼 상황을 만든다.

      ### ✅ 합격 기준
      자율 대응이 오작동(과차단·오탐 대응)하면 피해가 큰 상황을 유발하고, 비가역 자율 행동의 위험을
      설명한다.
    hint: "공격+정상 위장 혼합(태그) → 자율 대응 과차단 시 정상 피해 상황. 비가역 자율 행동 위험 설명. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-11-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 대응 위험 — 비가역 자율 행동이 오작동하면 정상까지 피해봄을 실증.
        success_criteria:
          - "대상 WAF/IPS에 혼합 활동 흔적이 남고 고유 태그로 귀속됨"
          - "자율 대응 오작동 시 피해 큰 상황을 유발"
          - "(설명) 비가역 자율 행동의 위험을 설명"
        acceptable_methods:
          - "공격+정상 혼합 + 위험 설명"
        negative_signs:
          - "탐지 흔적 없음"
          - "위험 설명 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — Purple 관점: 자율 미션 개선점 도출

      Red/Blue/Purple 관점에서 자율 미션의 **개선점**을 도출한다: 어디에 승인 게이트가 필요한가, 무엇을
      자율화해도 안전한가.

      ### ✅ 합격 기준
      자율 미션에서 자율 허용 지점과 승인 필요 지점을 구분해 개선점을 제시한다.
    hint: "자율 미션의 자율 허용 지점(조회·탐지) vs 승인 필요 지점(차단·변경) 구분 개선점. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-11-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Purple 개선점 — 자율/승인 경계를 구분해 자율 미션의 안전 개선점을 도출.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "자율 허용 지점과 승인 필요 지점을 구분"
          - "(설명) 개선점을 제시"
        acceptable_methods:
          - "자율/승인 경계 구분 + 개선점"
        negative_signs:
          - "경계 구분 없음"

# ───────────────────────── BLUE (승인 게이트 자율 미션) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 다단계 자율 미션 실행 (조회 자율·변경 승인)

      **다단계 자율 방어 미션**을 실행한다: 탐지→조사(자율)→대응 준비(승인 게이트).

      ### 어떻게
      - Wazuh/Suricata에서 Red 공격을 자율 탐지·조사(조회는 자율).
      - 대응(차단)은 준비만 하고 **승인 게이트**를 거치도록 설계.
      - 오탐 위험(정상 위장)을 승인 단계에서 걸러냄.

      ### ✅ 합격 기준
      탐지·조사를 자율 수행하고 대응은 승인 게이트를 거치게 하며, 오탐 위험을 승인 단계에서 거른다.
    hint: "Wazuh/Suricata 자율 탐지·조사(조회 자율)+대응은 승인 게이트+오탐(정상 위장) 승인 단계 필터."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-11-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 미션 실행 — 조회 자율·변경 승인으로 다단계 자율 방어를 안전하게 수행.
        success_criteria:
          - "Wazuh/Suricata에서 Red 공격을 자율 탐지·조사"
          - "대응(차단)은 승인 게이트를 거치게 설계"
          - "(설명) 오탐 위험을 승인 단계에서 거름"
        acceptable_methods:
          - "자율 조사 + 승인 게이트 대응"
        negative_signs:
          - "경보 근거 없음"
          - "승인 없이 자율 차단"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자율 미션 안전 아키텍처·Purple 순환 설계

      자율 미션의 **안전 아키텍처와 Purple 순환**을 설계한다.

      ### 무엇을
      - **자율성 수준**: 행동별 위험도 등급 → 조회 자율·변경 승인·비가역 사람 게이트.
      - **오작동 방지**: 대응 검증·롤백·범위 제한·킬스위치.
      - **Purple 순환**: Red 시험→Blue 개선→재검증으로 미션 강건성 향상.
      - **감사·관찰**: 모든 자율 행동 감사, 사람 개입 지점 명확.

      ### ✅ 합격 기준
      자율성 수준·오작동 방지·Purple 순환·감사를 제시하고 "자율은 위험도 기반 게이트와 함께" 원칙을
      설명한다.
    hint: "자율성 수준(위험도별 게이트)+오작동 방지(검증·롤백·킬스위치)+Purple 순환(시험→개선→재검증)+감사. '자율은 위험도 게이트와 함께' 원칙."
    verify:
      type: "semantic"
      expect: "autonomous_mission_safety"
      semantic:
        intent: |
          자율 미션 안전 — 위험도 기반 게이트·오작동 방지·Purple 순환으로 자율 미션을 안전하게 개선.
        success_criteria:
          - "자율성 수준(위험도별 게이트)을 제시"
          - "오작동 방지(검증·롤백·킬스위치)를 제시"
          - "Purple 순환과 감사를 제시"
          - "(설명) '자율은 위험도 기반 게이트와 함께' 원칙 설명"
        acceptable_methods:
          - "자율성 수준 + 오작동 방지 + Purple + 감사"
        negative_signs:
          - "게이트·킬스위치 없음"
          - "완전 자율"
