id: "aisec-w13"
category: "aisec"
title: "[AI에이전트보안 W13] 프로젝트A: 자율 IR 에이전트 우회 vs 자율 IR 에이전트 구축·평가"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  프로젝트 A 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). **자율 인시던트 대응(IR) 에이전트**를 구축·평가하고, 그 에이전트를
  우회·기만하려는 공격으로 검증한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(IR 에이전트 우회)와 Blue(자율 IR 에이전트 구축·평가)를 모두 수행.
    • duel : Red 학생이 IR 에이전트를 우회하고, Blue 학생이 견고한 IR 에이전트로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 IR 에이전트가
    관찰할 이벤트를 만든다. 채점은 **명령 흔적(command_ran)** + **보고서 증거·설계**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — IR 에이전트 검증용 다양한 이벤트 생성

      자율 IR 에이전트가 처리할 **다양한 보안 이벤트**(정상·인젝션·유출·도구)를 대상에 만든다.

      ### ✅ 합격 기준
      최소 3종 이벤트를 실제로 만들어 IR 에이전트 처리 대상을 제공한다.
    hint: "/api/chat 정상+인젝션, dataset 유출, tool 남용 등 3+ 이벤트 생성. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-13-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          IR 검증 이벤트 — 다양한 이벤트로 IR 에이전트 처리 범위를 시험.
        success_criteria:
          - "본인 인프라 명령 로그에 다수 /api 호출 흔적이 남음"
          - "최소 3종 이벤트를 실제로 생성"
          - "(설명) 각 이벤트 유형을 분류"
        acceptable_methods:
          - "다종 이벤트 생성"
        negative_signs:
          - "이벤트 단일·명령 흔적 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — IR 에이전트 기만·사각지대 분석

      IR 에이전트를 **기만/우회**하는 방법을 분석한다: 노이즈·저속·오탐 유발·트리아지 회피.

      ### ✅ 합격 기준
      IR 에이전트 기만/우회 최소 2가지와 사각지대를 분석한다.
    hint: "노이즈·저속·오탐·트리아지 회피 2+ + IR 에이전트 사각지대 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-13-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          IR 에이전트 기만 — 노이즈·저속·오탐으로 자율 IR을 우회하는 사각지대를 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "IR 에이전트 기만/우회 최소 2가지를 분석"
          - "(설명) 사각지대를 서술"
        acceptable_methods:
          - "기만/우회 분석"
        negative_signs:
          - "우회 1개·막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 자율 IR 에이전트 파이프라인 구축·평가

      **자율 IR 에이전트**를 설계·구축하고 평가한다: 탐지→트리아지→대응→학습.

      ### 무엇을
      - 탐지·트리아지(오탐/저속 대응)·대응(Playbook·승인)·학습·감사.
      - 평가: 정확도·안전성·기만 저항으로 검증.

      ### ✅ 합격 기준
      탐지→트리아지→대응→학습 파이프라인과 평가 기준을 설계하고 RED 이벤트/기만에 대응 매핑한다.
    hint: "탐지→트리아지(오탐/저속)→대응(Playbook·승인)→학습·감사+평가(정확·안전·기만 저항). RED 매핑."
    verify:
      type: "semantic"
      expect: "autonomous_ir_agent2"
      semantic:
        intent: |
          자율 IR 에이전트 — 파이프라인과 평가로 자율 IR을 구축·검증.
        success_criteria:
          - "탐지→트리아지→대응→학습 파이프라인을 제시"
          - "평가 기준(정확·안전·기만 저항)을 제시"
          - "RED 이벤트/기만에 대응 매핑"
        acceptable_methods:
          - "IR 파이프라인 + 평가 + 매핑"
        negative_signs:
          - "파이프라인 일부만·평가 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — IR 에이전트 안전·검증 설계

      IR 에이전트의 **안전장치·검증**을 설계한다.

      ### 무엇을
      - 자율성 수준(조회 자율·대응 승인·비가역 게이트)·기만 대응(상관·베이스라인·교차 검증)·회귀
        검증·감사/롤백.

      ### ✅ 합격 기준
      자율성 수준·기만 대응·회귀 검증·감사/롤백을 제시하고 "자율 IR도 안전장치·검증과 함께" 원칙을 설명한다.
    hint: "자율성 수준(대응 승인·비가역 게이트)+기만 대응(상관·베이스라인·교차 검증)+회귀 검증+감사·롤백. '안전장치·검증과 함께' 원칙."
    verify:
      type: "semantic"
      expect: "ir_agent_safety2"
      semantic:
        intent: |
          IR 에이전트 안전·검증 — 자율성 수준·기만 대응·검증·감사로 안전한 자율 IR을 만든다.
        success_criteria:
          - "자율성 수준(대응 승인·비가역 게이트)을 제시"
          - "기만 대응(상관·베이스라인·교차 검증)을 제시"
          - "회귀 검증·감사/롤백을 제시하고 원칙 설명"
        acceptable_methods:
          - "자율성 수준 + 기만 대응 + 검증 + 감사"
        negative_signs:
          - "안전장치 없는 완전 자율"
          - "검증·감사 없음"
