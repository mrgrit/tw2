id: "autonomous-systems-w12"
category: "autonomous-systems"
title: "[자율시스템 W12] V2X/자동차 보안: CAN 인젝션·원격 진입 vs CAN 보안·도메인 분리"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  V2X/자동차 보안 공방전 — **CAN 버스·ECU·커넥티드카(텔레매틱스·V2X)** 의 공격과 방어를 설계·분석
  한다. 실물 차량이 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(원격 진입→CAN 인젝션 경로)와 Blue(CAN 보안·도메인 분리)를 모두 수행.
    • duel : Red 학생이 공격 경로를 제시하고, Blue 학생이 CAN 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 원격 진입(텔레매틱스·V2X)→내부망→CAN 인젝션→물리
    (제동·조향) 경로 구체성, CAN 보안(인증·IDS)·도메인 분리·게이트웨이의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 자동차 공격은 인명 위험. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (원격 진입→CAN 인젝션 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 원격 진입 → 내부망 → CAN 인젝션 → 물리 제어

      원격 진입점에서 내부 CAN으로 피벗해 안전 필수 기능을 조작하는 경로를 설계한다.

      ### 무엇을
      - **원격 진입**: 텔레매틱스(셀룰러)·인포테인먼트(WiFi/BT)·V2X·OBD-II 중 하나로 진입.
      - **피벗**: 게이트웨이를 넘어 파워트레인/섀시 CAN으로 측면 이동.
      - **CAN 인젝션**: CAN은 무인증·브로드캐스트 → 위조 프레임으로 제동·조향·엔진 제어 조작.
      - 물리 결과(급제동·조향 개입).

      ### ✅ 합격 기준
      원격 진입→게이트웨이 피벗→CAN 인젝션→물리 제어의 경로를 구체적(진입 벡터·CAN 특성 명시)으로
      설계한다.
    hint: "텔레매틱스/인포테인먼트/V2X/OBD 진입→게이트웨이 넘어 CAN 피벗→무인증 CAN 프레임 위조(제동/조향/엔진)→물리. 진입 벡터·CAN 특성 명시."
    verify:
      type: "semantic"
      expect: "vehicle_attack_path"
      semantic:
        intent: |
          자동차 원격→물리 경로 — 원격 진입에서 CAN으로 피벗해 안전 필수 기능을 조작하는 경로를 이해.
        success_criteria:
          - "원격 진입점(텔레매틱스·인포테인먼트·V2X·OBD)을 명시"
          - "게이트웨이 피벗과 CAN 무인증 인젝션을 구체적으로 설계"
          - "물리 결과(제동·조향·엔진)로 이어짐을 서술"
        acceptable_methods:
          - "원격 진입 → 피벗 → CAN 인젝션 → 물리"
        negative_signs:
          - "진입 벡터·CAN 특성 근거 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — CAN·V2X 신뢰 모델 취약 분석

      CAN(무인증 브로드캐스트·우선순위 중재)과 V2X(위조 메시지·sybil)의 **신뢰 모델** 취약을 분석한다.

      ### ✅ 합격 기준
      CAN의 무인증·브로드캐스트·버스 오프 취약과 V2X 위조/sybil을 분석하고, 각각이 어떤 조작·교란을
      가능케 하는지 설명한다.
    hint: "CAN 무인증·브로드캐스트·우선순위 중재(버스오프 DoS) + V2X 위조 메시지·sybil. 조작·교란 가능성 분석."
    verify:
      type: "semantic"
      expect: "can_trust_model"
      semantic:
        intent: |
          CAN·V2X 신뢰 취약 — 무인증 브로드캐스트와 위조/sybil이 조작·교란을 허용함을 이해.
        success_criteria:
          - "CAN 무인증·브로드캐스트·버스 오프 취약을 분석"
          - "V2X 위조/sybil 취약을 분석"
          - "(설명) 각 취약이 가능케 하는 조작·교란을 설명"
        acceptable_methods:
          - "CAN + V2X 신뢰 모델 취약 분석"
        negative_signs:
          - "프로토콜 근거 없이 막연"

# ───────────────────────── BLUE (CAN 보안·도메인 분리) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — CAN IDS·이상 탐지 설계

      CAN 인젝션을 **탐지**하는 방안을 설계한다.

      ### 무엇을
      - **CAN IDS**: 메시지 주기·ID·페이로드 이상, 위조 프레임(동일 ID 충돌), 버스 부하 이상.
      - **물리 정합성**: CAN 명령과 실제 차량 상태(속도·조향각) 불일치.
      - **진입 탐지**: 텔레매틱스/인포테인먼트 이상 접근·게이트웨이 통과 이상.

      ### ✅ 합격 기준
      CAN IDS(주기·ID·페이로드)·물리 정합성·진입 탐지를 제시하고 RED 경로에 매핑한다.
    hint: "CAN IDS(주기·ID·페이로드·동일 ID 충돌·버스 부하)+물리 정합성(명령 vs 상태)+진입 탐지. RED 경로 매핑."
    verify:
      type: "semantic"
      expect: "can_ids"
      semantic:
        intent: |
          CAN IDS·이상 탐지 — 메시지·물리·진입 신호로 CAN 인젝션을 탐지.
        success_criteria:
          - "CAN IDS(주기·ID·페이로드·충돌·버스 부하)를 제시"
          - "물리 정합성(명령 vs 상태)을 제시"
          - "진입 탐지를 제시하고 RED 경로 매핑"
        acceptable_methods:
          - "CAN IDS + 물리 정합성 + 진입 탐지"
        negative_signs:
          - "탐지 신호 막연"
          - "물리 정합성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — CAN 보안·도메인 분리·안전 심층 방어

      자동차의 **CAN 보안·도메인 분리·안전 심층 방어**를 설계한다.

      ### 무엇을
      - **CAN 보안**: 메시지 인증(CAN-MAC/SecOC), 리플레이 방지(프레시니스), 안전 필수 버스 격리.
      - **도메인 분리·게이트웨이**: 인포테인먼트/텔레매틱스와 파워트레인/섀시 분리, 방화벽 게이트웨이·
        일방향 통제.
      - **V2X 보안**: PKI 인증서·오배치 탐지(misbehavior detection).
      - **독립 안전 계층**: 사이버가 뚫려도 물리 안전 한계(조향/제동 물리 한계·운전자 우선·페일 세이프).

      ### ✅ 합격 기준
      CAN 인증(SecOC)·도메인 분리 게이트웨이·V2X PKI·독립 안전 계층을 제시하고 "사이버가 뚫려도 물리
      안전" 원칙을 설명한다.
    hint: "CAN 인증(SecOC)·리플레이 방지+도메인 분리 게이트웨이(인포 vs 섀시)+V2X PKI·오배치 탐지+독립 안전 계층. '사이버 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "vehicle_defense"
      semantic:
        intent: |
          자동차 CAN 보안·도메인 분리 — 인증·분리·V2X 보안·독립 안전 계층으로 원격→물리 경로를 차단.
        success_criteria:
          - "CAN 인증(SecOC)·리플레이 방지·버스 격리를 제시"
          - "도메인 분리 게이트웨이(인포 vs 섀시)를 제시"
          - "V2X PKI·오배치 탐지와 독립 안전 계층을 제시"
          - "(설명) '사이버 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "CAN 인증 + 도메인 분리 + V2X 보안 + 독립 안전"
        negative_signs:
          - "도메인 분리 또는 독립 안전 계층 없음"
          - "CAN 인증 언급 없음"
