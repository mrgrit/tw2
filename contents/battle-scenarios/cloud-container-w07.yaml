id: "cloud-container-w07"
category: "cloud-container"
title: "[클라우드/컨테이너 W7] 컨테이너 네트워크 — 측면 이동·노출 포트 vs 네트워크 정책"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  클라우드/컨테이너 7주차 — **컨테이너 네트워크 보안**. 컨테이너 간 측면 이동·노출 포트·네트워크 격리를 점검한다.
  공격자는 노출 포트/평면 네트워크로 이동하고, 점검자(너)는 네트워크 정책·격리를 점검·구현한다.

  ▸ 이야기: 공격자가 노출 포트로 침투해(태그 `cc07r1`) 컨테이너 측면이동 포트(`58007`)와 계정 `cca07` 을 남긴다.
    점검자는 ① 노출 포트 탐지, ② 네트워크 Wazuh 룰, ③ 네트워크 정책 점검·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/포트·계정).
  ▸ 마커: 태그 **`cc07r1-<본인id>`**, 측면이동 포트 **58007**, 계정 **`cca07`**,
    Suricata **sid 9007011**, Wazuh **id 106071**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [노출 포트 침투] — 평면 네트워크 공략

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "cc07r1-kim" -H "Host: dvwa.6v6.lab" "http://192.168.0.161/?svc=internal-db:5432&probe=cc07r1-kim"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `cc07r1` 흔적 시 인정.
    hint: "태그(cc07r1) 내부 서비스 접근 → 대상 modsec audit. 채점: log_contains modsec cc07r1."
    verify:
      type: "log_contains"
      expect: "cc07r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "cc07r1", since_sec: 1800 } }
      semantic:
        intent: "컨테이너 측면 이동(T1021) — 평면 네트워크로 내부 서비스 접근. 태그(cc07r1) 귀속."
        success_criteria: ["대상 WAF audit 에 cc07r1 태그", "네트워크 격리 부재 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 내부 접근"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [측면이동 포트] — 노출 리스너 + 계정

      ### 할 일
      ```bash
      nohup ncat -lk 58007 >/dev/null 2>&1 &
      sudo useradd -m -s /bin/bash cca07
      ```
      ### 채점 방법 / 합격 기준
      포트 58007 listening 또는 `cca07` 존재 시 인정.
    hint: "측면이동 포트 58007 + useradd cca07. 채점: port_listening 58007 + file_contains passwd cca07."
    verify:
      type: "port_listening"
      expect: "58007"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 58007 } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "cca07" } }
      semantic:
        intent: "컨테이너 측면 이동(T1021) + 계정(T1136) — 노출 포트 리스너."
        success_criteria: ["포트 58007 listening 또는 계정 cca07", "측면 이동 경로 서술"]
        acceptable_methods: ["리스너 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [측면이동 포트 탐지] — Suricata 룰 (sid 9007011)

      ### 할 일
      ```
      alert tcp any any -> any 58007 (msg:"CLOUD-W07 container lateral movement port 58007"; flow:to_server; sid:9007011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9007011 룰 존재 시 인정.
    hint: "측면이동 포트 Suricata 룰(sid 9007011, port 58007) → reload. 채점: file_contains local.rules 9007011."
    verify:
      type: "file_contains"
      expect: "9007011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9007011" } }
      semantic:
        intent: "컨테이너 네트워크 — 측면이동 포트 Suricata 룰. 네트워크 정책 병행."
        success_criteria: ["local.rules 에 sid 9007011 (port 58007)", "네트워크 정책 권고"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["포트 불일치 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [네트워크 이동 탐지] — Wazuh 룰 (id 106071)

      ### 할 일
      ```xml
      <group name="edu,container,">
        <rule id="106071" level="12">
          <if_group>edu</if_group>
          <match>cca07</match>
          <description>CLOUD-W07 - container lateral movement / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 106071 룰 존재 시 인정.
    hint: "네트워크 이동 Wazuh 룰(id 106071) → restart. 채점: file_contains local_rules.xml 106071."
    verify:
      type: "file_contains"
      expect: "106071"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "106071" } }
      semantic:
        intent: "컨테이너 네트워크 — 측면 이동/계정 Wazuh 룰."
        success_criteria: ["local_rules.xml 에 rule id 106071", "측면 이동 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [네트워크 정책 점검·R/B/P]

      ### 할 일
      보고서에:
      - 컨테이너 네트워크 점검(네트워크 분할/egress 제한/내부 통신 정책/노출 포트 최소화) + 위험도 + 권고
      - R/B/P 회고 + 측면이동 포트(58007)·계정(cca07) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 네트워크 정책 점검·R/B/P 로 인정.
    hint: "컨테이너 네트워크 점검(분할/egress/내부 통신 정책/포트 최소화) + R/B/P + 포트/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "컨테이너 네트워크 점검 종합 — 분할/egress/정책 + R/B/P. 분석형 — 구체 정책/권고 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "네트워크 점검(분할/egress/내부 정책/포트 최소화) + 권고"
          - "R/B/P 회고 + 포트/계정 헌팅"
        acceptable_methods: ["점검 표 + 권고 + 회고 + 헌팅"]
        negative_signs: ["권고/회고 누락"]
