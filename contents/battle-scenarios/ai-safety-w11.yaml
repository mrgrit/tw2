id: "ai-safety-w11"
category: "ai-safety"
title: "[AI안전 W11] RAG 보안: 검색 통로 위협 vs 검색 접근 통제·소스 격리"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  RAG 보안 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 검색 통로로 들어오는 위협
  (오염·유출)과 방어를 다룬다.
  ▸ 실측 — `/api/rag/add`(무인증 오염)·`/api/dataset`(전체 덤프)·정상 질의 retrieved 유출이 모두 통한다.
    Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리:
    인가 대상만, 고유 마커.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 검색 오염 + 유출 실증

      RAG의 두 위협을 실증한다: (1) `/api/rag/add` 무인증 오염(고유 마커 트리거), (2) `/api/dataset`·
      retrieved로 민감 데이터 유출.

      ### ✅ 합격 기준
      오염(마커 트리거)과 유출(AWS키/PII/SSN) 두 위협을 각각 실제 증거로 실증한다.
    hint: "/api/rag/add 오염(마커 트리거)+/api/dataset·retrieved 유출(실제 값). 두 위협 실증."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-11-1", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "RAG 위협 — 오염(무결성)과 유출(기밀성) 두 축을 실증."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add·/api/dataset 호출 흔적이 남음"
          - "오염(마커 트리거)과 유출(실제 값) 증거를 제시"
          - "(설명) 무결성·기밀성 두 축을 설명"
        acceptable_methods: ["오염 + 유출 실증"]
        negative_signs: ["한 축만·증거 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 검색 편향·간접 인젝션 심화

      오염 문서로 특정 주제 검색을 장악(검색 편향)하고, 숨긴 지시로 답변을 조작하는 간접 인젝션을
      심화한다.

      ### ✅ 합격 기준
      표적 주제 검색을 오염 문서로 장악해 답변 편향/조작을 마커·retrieved로 증명한다.
    hint: "표적 주제 오염 문서 다수 주입 → retrieved 장악·답변 편향 증명. 검색 편향·간접 인젝션."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "red-11-2", type: "command_ran", target: "attacker", params: { pattern: "rag/add" } }
      semantic:
        intent: "검색 편향 — 오염으로 retrieval을 장악해 생성 결과를 조작."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add 호출 흔적이 남음"
          - "표적 질의 retrieved/answer 편향을 마커로 증명"
          - "(설명) 검색 편향 메커니즘을 설명"
        acceptable_methods: ["표적 오염 + 편향 증명"]
        negative_signs: ["편향 증거 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — RAG 위협 표면 진단

      RAG 파이프라인(수집·검색·생성)의 위협 표면을 진단한다: 무인증 수집·접근 없는 검색·데이터 덤프.

      ### ✅ 합격 기준
      수집·검색·유출 표면을 증거로 진단하고 무결성/기밀성 위험을 등급화한다.
    hint: "수집(rag/add)·검색(retrieval 접근)·유출(dataset) 표면 증거 진단 + 무결성/기밀성 등급."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-11-1", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "RAG 위협 표면 진단 — 수집·검색·유출을 증거로 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "수집·검색·유출 표면을 증거로 진단"
          - "(설명) 무결성/기밀성 위험 등급화"
        acceptable_methods: ["표면별 증거 진단"]
        negative_signs: ["증거 없이 주장만"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 검색 접근 통제·소스 격리 설계

      RAG 보안을 설계한다: 수집 인증·검토(오염 차단), 검색 사용자 권한 필터·민감 데이터 인덱싱 제외,
      검색 데이터/지시 격리(간접 인젝션 차단), 응답 마스킹.

      ### ✅ 합격 기준
      수집 통제·검색 권한 필터·소스 격리·응답 마스킹을 제시하고 "검색은 권한 안에서·데이터는 지시가
      아니다" 원칙을 설명한다.
    hint: "수집 인증·검토+검색 권한 필터·민감 인덱싱 제외+데이터/지시 격리+응답 마스킹. '검색은 권한 안, 데이터≠지시' 원칙."
    verify:
      type: "semantic"
      expect: "rag_security"
      semantic:
        intent: "RAG 보안 — 수집 통제·검색 권한·소스 격리로 오염·유출을 막는다."
        success_criteria:
          - "수집 인증·검토를 제시"
          - "검색 권한 필터·민감 데이터 인덱싱 제외를 제시"
          - "데이터/지시 격리·응답 마스킹을 제시"
          - "(설명) '검색은 권한 안, 데이터≠지시' 원칙 설명"
        acceptable_methods: ["수집 통제 + 검색 권한 + 격리 + 마스킹"]
        negative_signs: ["수집만·검색 권한 없음", "소스 격리 언급 없음"]
