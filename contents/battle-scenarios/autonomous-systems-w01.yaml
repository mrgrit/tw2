id: "autonomous-systems-w01"
category: "autonomous-systems"
title: "[자율시스템 W1] CPS 침투(드론·자율주행) vs 안전 우선 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  사이버물리시스템(CPS) 공방전 — 드론·자율주행 등 자율 시스템의 **사이버→물리** 공격과 방어를
  설계·분석한다. CPS는 실물 하드웨어(드론·차량·RF·센서)가 필요하므로, 본 공방전은 **위협 모델·
  공격 경로·안전 우선 방어를 설계·서술**하는 **분석형**이다(결정론 시뮬 + GPU 분석, semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(사이버→물리 공격 경로 설계)와 Blue(탐지·안전 우선 방어)를 모두 수행.
    • duel : Red 학생이 대상 CPS의 공격 경로를 제시하고, Blue 학생이 방어·안전 설계로 대응.

  ▸ 채점(중요)
    실물 CPS가 없으므로 **보고서의 설계 품질**로 채점한다 — 3계층(사이버·물리·브리지) 매핑, 사이버→
    물리 경로의 구체성·타당성, 안전 우선(페일세이프·독립 안전 계층) 방어의 구체성. 근거 없는 일반론은
    불인정. GPU(gemma3)로 분석·종합을 보조할 수 있다.

  ▸ 윤리 — 실제 드론·차량 공격은 실물·법적 인가·안전이 필요. 본 공방전은 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (사이버→물리 공격 경로 설계) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 사이버→물리 공격 경로 설계 (드론 또는 자율주행 택1)

      대상 CPS(드론 또는 자율주행차)를 하나 골라, **사이버 진입 → 브리지 → 물리 결과**로 이어지는
      구체적 공격 경로를 설계한다.

      ### 무엇을 (택1 예시)
      - **드론**: 무인증 MAVLink(사이버) → 위조 착륙/경로 명령(브리지) → 추락/이탈(물리). 또는 deauth →
        조종 상실. 또는 GPS 스푸핑 → 지오펜스 우회.
      - **자율주행**: 적대적 패치(사이버) → 표지판 오분류(브리지) → 정지 위반(물리). 또는 라이다 스푸핑 →
        유령 브레이크. 또는 OTA 변조 → 전 차량.

      ### ✅ 합격 기준
      3계층(사이버·물리·브리지)을 명시하고, 한 사이버 취약점이 **구체적 물리 결과**로 이어지는 경로를
      단계별로 서술한다(막연한 "해킹" 금지, 실제 기법·프로토콜·센서 명시).
    hint: "드론(MAVLink/deauth/GPS) 또는 자율주행(적대적 패치/라이다 스푸핑/OTA) 중 하나로, 사이버→브리지→물리 경로를 기법·프로토콜까지 구체적으로."
    verify:
      type: "semantic"
      expect: "cyber_physical_path"
      semantic:
        intent: |
          CPS 사이버→물리 공격 경로 설계. 3계층(사이버·물리·브리지)과 구체 기법을 연결해 물리 결과를
          도출하는 능력을 평가.
        success_criteria:
          - "대상 CPS(드론/자율주행)를 정하고 사이버·물리·브리지 3계층을 명시"
          - "구체적 기법·프로토콜/센서(MAVLink·deauth·GPS·적대적 패치·라이다 등)를 사용한 경로"
          - "사이버 진입이 구체적 물리 결과(추락·사고·이탈)로 이어지는 단계 서술"
        acceptable_methods:
          - "드론: MAVLink 인젝션/deauth/GPS 스푸핑 경로"
          - "자율주행: 적대적 패치/센서 스푸핑/OTA 변조 경로"
        negative_signs:
          - "막연한 '해킹'·기법 불명"
          - "물리 결과 없이 사이버만 서술"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 안전 우회·은폐 분석

      RED-1 경로가 **안전 장치(페일세이프·지오펜스·안전 모니터)를 어떻게 우회/무력화**하거나, 공격을
      **은폐**(Stuxnet식 HMI 위장·센서값 조작)하는지 분석한다.

      ### ✅ 합격 기준
      대상의 안전 장치를 식별하고, 공격이 그것을 우회/은폐하는 방식(또는 왜 안전 장치가 막는지)을
      구체적으로 서술한다.
    hint: "페일세이프/지오펜스/안전모니터를 식별하고, 공격이 우회·은폐하는 방식(GPS 스푸핑으로 지오펜스 우회, 센서 조작 은폐 등)을 분석."
    verify:
      type: "semantic"
      expect: "safety_bypass"
      semantic:
        intent: |
          공격이 CPS 안전 장치를 우회·무력화·은폐하는 분석. 안전 장치의 한계를 이해.
        success_criteria:
          - "대상의 안전 장치(페일세이프·지오펜스·안전 모니터·SIS)를 식별"
          - "공격이 우회/무력화/은폐하는 방식 또는 안전 장치가 막는 이유를 구체적으로 서술"
          - "(설명) 안전≠보안, 독립 안전 계층의 의미 언급"
        acceptable_methods:
          - "GPS 스푸핑으로 지오펜스 우회"
          - "센서/HMI 값 조작으로 은폐(Stuxnet식)"
        negative_signs:
          - "안전 장치 식별 없음"
          - "우회/은폐 방식이 막연"

# ───────────────────────── BLUE (탐지·안전 우선 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — CPS 공격 탐지 설계

      RED가 설계한 사이버→물리 공격을 **탐지**하는 방안을 설계한다. CPS 특성상 사이버·물리 양쪽 신호를
      본다.

      ### 무엇을
      - **사이버 탐지**: 무서명 MAVLink·deauth flood·적대적 입력 신뢰도 이상·OTA 서명 실패.
      - **물리 탐지**: GPS 위치 점프·센서 정합성 불일치(카메라 vs 라이다)·물리적으로 불가능한 상태.
      - **중복성**: 한 센서/신호가 속아도 다른 것으로 교차 검증.

      ### ✅ 합격 기준
      RED 공격에 대응하는 **구체적 탐지 신호**(사이버+물리)와 중복성·정합성 검사를 제시한다.
    hint: "RED 경로별 탐지 신호(사이버: 무서명/deauth/신뢰도 이상, 물리: 위치 점프/센서 불일치) + 중복성·정합성 검사."
    verify:
      type: "semantic"
      expect: "detection"
      semantic:
        intent: |
          CPS 공격 탐지 설계 — 사이버·물리 신호와 센서 중복성·정합성으로 RED 공격을 탐지.
        success_criteria:
          - "RED 공격에 대응하는 구체적 사이버 탐지 신호 제시"
          - "물리 탐지(위치 점프·센서 정합성 불일치 등) 제시"
          - "(설명) 센서 중복성·정합성 검사로 교차 검증"
        acceptable_methods:
          - "무서명 MAVLink/deauth/신뢰도 이상 탐지"
          - "GPS/센서 정합성·중복성 검사"
        negative_signs:
          - "탐지 신호가 막연"
          - "사이버 또는 물리 한쪽만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 우선 심층 방어 설계

      탐지에 이어 **안전 최우선 심층 방어**를 설계한다. 핵심은 "보안이 뚫려도 물리적으로 안전"하게 하는
      것이다.

      ### 무엇을
      - **통신/인증**: MAVLink 서명·WiFi 암호·V2X PKI·SROS2·OTA 서명 등(대상에 맞게).
      - **항법/인식**: GPS 안티스푸핑·대체 항법·AI 강건성·센서 중복성.
      - **독립 안전 계층**: 페일세이프(귀환/안전 정지)·지오펜싱·안전 모니터·SIS — 보안과 분리.

      ### ✅ 합격 기준
      RED 공격을 막는 **계층별 방어**를 제시하고, 특히 **독립 안전 계층**(보안 뚫려도 안전)을 명시하며
      "안전 최우선" 원칙을 설명한다.
    hint: "통신 인증·항법/인식 방어 + 독립 안전 계층(페일세이프·안전 모니터·SIS). '보안 뚫려도 안전' 원칙 설명."
    verify:
      type: "semantic"
      expect: "safety_first_defense"
      semantic:
        intent: |
          CPS 안전 우선 심층 방어 설계 — 통신·항법·인식 방어 + 독립 안전 계층으로 물리 안전 보장.
          보안≠안전, 안전 최우선 원칙.
        success_criteria:
          - "RED 공격을 막는 계층별 방어(통신 인증·항법/인식 방어)를 구체적으로 제시"
          - "독립 안전 계층(페일세이프·안전 모니터·지오펜싱·SIS)을 명시"
          - "(설명) '보안이 뚫려도 물리적으로 안전' 안전 최우선 원칙 설명"
        acceptable_methods:
          - "MAVLink 서명·V2X PKI·SROS2·안티스푸핑 등 계층 방어"
          - "페일세이프·안전 모니터·SIS 독립 안전 계층"
        negative_signs:
          - "독립 안전 계층 언급 없음"
          - "구체적 방어 없이 '방어하겠다'만"
