id: "agent-ir-adv-w03"
category: "agent-ir-adv"
title: "[에이전트IR고급 W3] AD Kerberoasting 자동화 vs 분 단위 도메인 위협 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 공격 에이전트가 **Active Directory Kerberoasting**을 분 단위로 자동화해
  서비스 계정을 크래킹하는 공격과, 그 도메인 위협의 탐지를 다룬다. Red는 대상 정찰·침투 흔적을 남기고
  Kerberoasting 킬체인을 설계하며, Blue는 AD 위협 탐지를 설계한다.

  ▸ 채점 특성 — el34는 Windows/AD 텔레메트리를 보유하지 않는다. 따라서 **관측 채점은 대상(el34)에
    남는 정찰·웹 공격 흔적(Suricata/ModSec/Wazuh)** 으로 하고, Kerberoasting 자체는 **설계·분석**으로
    평가한다(GRADING-LIMITATIONS 참조).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(Kerberoasting 킬체인)와 Blue(AD 탐지)를 모두 수행.
    • duel : Red 학생이 도메인 공격을 설계·정찰하고, Blue 학생은 탐지 설계로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (Kerberoasting 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 도메인 정찰 + SPN 열거 설계 (killchain: recon)

      외부 공격자 VM({{ATTACKER_IP}})에서 대상을 정찰(고유 태그)하고, **SPN(서비스 주체명) 열거**로
      Kerberoasting 표적을 찾는 단계를 설계한다.

      ### 권장 명령 (참고)
      ```bash
      nmap -sV -Pn 192.168.0.161 -p88,389,445,3268 --reason   # Kerberos/LDAP/SMB 표면 정찰
      curl -A 'auto-red-<학번>-recon' http://192.168.0.161/
      ```

      ### ✅ 합격 기준
      대상에 정찰 흔적을 남기고, SPN 열거→서비스 계정 표적 식별(GetUserSPNs 개념)을 설계한다.
    hint: "Kerberos/LDAP 표면 정찰(태그)+SPN 열거(GetUserSPNs)로 서비스 계정 표적 식별 설계. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-3-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          도메인 정찰·SPN 열거 — Kerberoasting 표적(서비스 계정)을 찾는 단계를 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "SPN 열거→서비스 계정 표적 식별을 설계"
          - "(설명) 도메인 계정이 표적인 이유를 설명"
        acceptable_methods:
          - "정찰 + SPN 열거 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "SPN/표적 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — Kerberoasting 크래킹·자동화 킬체인 설계

      대상 웹 침투 시도(고유 태그)로 흔적을 남기고, **Kerberoasting 자동화 킬체인**을 설계한다.

      ### 무엇을
      - TGS 티켓 요청→오프라인 크래킹(약한 서비스 계정 암호)→계정 탈취→권한 상승.
      - 에이전트가 이 과정을 분 단위로 자동화하는 흐름(SPN 열거→요청→크래킹→재사용).

      ### ✅ 합격 기준
      대상에 공격 흔적을 남기고, TGS 요청→크래킹→탈취→상승의 자동화 킬체인을 구체적으로 설계한다.
    hint: "대상 웹 PoC(태그)+Kerberoasting 킬체인(TGS 요청→오프라인 크래킹→탈취→상승)·에이전트 자동화 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-3-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Kerberoasting 자동화 — TGS 요청·오프라인 크래킹으로 서비스 계정을 탈취하는 킬체인을 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "TGS 요청→크래킹→탈취→상승 킬체인을 설계"
          - "(설명) 에이전트가 분 단위로 자동화하는 위협을 설명"
        acceptable_methods:
          - "웹 흔적 + Kerberoasting 킬체인 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (AD 위협 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 공격 탐지 + Kerberoasting 관찰 지점 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **Kerberoasting 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·침투 확인.
      - AD 탐지 신호(개념): 이벤트 4769(TGS 요청) 급증·약한 암호화(RC4) 티켓 요청·비정상 SPN 조회·
        한 계정의 대량 SPN 요청.

      ### ✅ 합격 기준
      RED 공격을 탐지하고, Kerberoasting 탐지 신호(4769 급증·RC4 티켓·대량 SPN 조회)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+AD 신호(이벤트 4769 급증·RC4 티켓·비정상/대량 SPN 조회) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-3-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Kerberoasting 탐지 — TGS 요청 이상·RC4 티켓·대량 SPN 조회로 도메인 위협을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "Kerberoasting 탐지 신호(4769·RC4·대량 SPN)를 설계"
          - "(설명) 분 단위 자동화에 맞춘 실시간 탐지 필요를 언급"
        acceptable_methods:
          - "SIEM 탐지 + AD 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "AD 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — AD 하드닝·방어 설계

      Kerberoasting을 막는 **AD 하드닝**을 설계한다.

      ### 무엇을
      - **강한 서비스 계정**: gMSA(관리형 서비스 계정)·길고 무작위 암호(크래킹 저항).
      - **암호화 강화**: RC4 비활성·AES 강제.
      - **최소 권한·SPN 관리**: 불필요 SPN 제거·서비스 계정 최소 권한.
      - **탐지·대응**: 4769 모니터링·자동 차단·honey SPN(허니 계정).

      ### ✅ 합격 기준
      gMSA·RC4 비활성·SPN 최소화·honey SPN을 제시하고 "서비스 계정 크래킹을 불가능하게" 원칙을 설명한다.
    hint: "gMSA·강한 암호+RC4 비활성·AES+불필요 SPN 제거·최소 권한+4769 모니터링·honey SPN. '크래킹 불가능하게' 원칙."
    verify:
      type: "semantic"
      expect: "ad_hardening"
      semantic:
        intent: |
          AD 하드닝 — gMSA·AES·SPN 최소화·honey SPN으로 Kerberoasting을 막는다.
        success_criteria:
          - "강한 서비스 계정(gMSA·무작위 암호)을 제시"
          - "RC4 비활성·AES 강제를 제시"
          - "SPN 최소화·honey SPN·4769 모니터링을 제시하고 원칙 설명"
        acceptable_methods:
          - "gMSA + AES + SPN 관리 + honey"
        negative_signs:
          - "약한 서비스 계정 유지"
          - "암호화/탐지 언급 없음"
