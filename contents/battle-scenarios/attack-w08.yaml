id: "attack-w08"
category: "attack"
title: "[공격기법 W8] 중간고사 — CTF 형식 종합 익스플로잇 vs 공격 탐지·관제"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  공격기법 8주차 — **중간고사(CTF 형식)**. W01~W07 의 공격 역량을 **Capture The Flag** 로 종합 평가한다.
  공격자는 정찰→웹 익스플로잇(SQLi/XSS/Traversal/SSRF)→셸 획득의 체인으로 플래그를 캡처한다. 방어자는
  이 CTF 활동을 관제·탐지하고 익스플로잇 체인을 재구성한다. 공격·방어 양면 역량의 종합 시험.

  ▸ 모드: solo(공격자→탐지 1인) / duel(Red 가 상대에 익스플로잇 체인, Blue 가 본인 방어층으로 탐지). 대상=solo 본인 / duel 상대.
  ▸ 공격자 위치: **망 외부 공격자(attacker-ext)**. 외부 명령 미수집 → Red 채점은 대상 WAF/IPS 흔적 + 셸 획득 아티팩트로.
  ▸ 셸 캡처(플래그) 마커: 리스너 **포트 19999**. 탐지룰은 Suricata **local.rules**(sid **9408001+**).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — 익스플로잇 체인 (정찰 → 웹 익스플로잇)

      정찰로 표면을 식별하고, 가장 효과적인 웹 취약점(SQLi/XSS/Traversal/SSRF 중)으로 침투한다. CTF
      의 1차 플래그(웹 침투 흔적)를 만든다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      nikto -h http://<대상_공개IP> -maxtime 60s
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%201"
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF audit 의 익스플로잇 탐지.
      ✅ 합격: 대상 WAF audit 에 SQLi/스캐너 탐지.
    hint: "attacker-ext 정찰+웹 익스플로잇. 채점: 대상 ModSec 942/scanner."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
        - { id: "red-1-2", type: "log_contains", target: "web", params: { log: "modsec", pattern: "scanner", since_sec: 1800 } }
      semantic:
        intent: "CTF 익스플로잇 체인 — 정찰→웹 침투. 외부 공격자 모델 → 대상 WAF audit 흔적으로 판정."
        success_criteria: ["대상 WAF audit 에 익스플로잇 탐지", "(설명) 정찰→침투 체인과 선택한 취약점 서술"]
        acceptable_methods: ["attacker-ext 정찰 + SQLi/XSS/Traversal/SSRF"]
        negative_signs: ["대상 미도달", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — 셸 획득 (플래그 캡처)

      침투를 발판으로 셸/콜백을 획득해 플래그를 캡처한다(리스너 **포트 19999** = 캡처된 셸).

      ### 권장 명령 (참고)
      ```bash
      nohup ncat -lk 19999 >/dev/null 2>&1 &     # 캡처된 셸 모사
      ```
      📌 채점: 대상 호스트에 셸 캡처 흔적(포트 19999)이 있는지.
      ✅ 합격: 대상 호스트에서 포트 19999 가 listening 이다.
    hint: "ncat -lk 19999 (셸 캡처=플래그). 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "플래그 캡처 — 셸 획득(T1059). 익스플로잇이 실제 코드 실행으로 이어졌음."
        success_criteria: ["포트 19999 listening(셸 캡처)", "(설명) 침투→셸 획득 경로 서술"]
        acceptable_methods: ["ncat 리스너 / 리버스셸 모사"]
        negative_signs: ["셸 미획득"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — CTF 활동 관제 + 익스플로잇 체인 재구성

      CTF 공격 활동을 관제해 정찰→익스플로잇→셸 획득 체인을 시간순으로 재구성한다. 어느 단계가
      탐지/차단됐는지 판정한다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(관제 대상).
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "정찰→익스플로잇→셸 체인 재구성. 채점: wazuh_alert + 체인 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "CTF 관제 — 익스플로잇 체인 재구성(정찰→침투→셸) + 단계별 탐지/차단 판정."
        success_criteria: ["경보 수집 확인", "(재구성) 체인 타임라인", "(판정) 어느 단계가 탐지/차단됐는지"]
        acceptable_methods: ["SIEM 관제 + 체인 분석"]
        negative_signs: ["체인 재구성 없이 단발 경보만"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 익스플로잇 체인 탐지룰 작성 (sid 9408001)

      셸 콜백/익스플로잇 후속 행위(비표준 포트 연결 등)를 탐지하는 Suricata 룰(**sid 9408001**)을
      `local.rules` 에 작성한다.

      ### 권장 룰 (참고)
      ```
      alert ip any any -> any 19999 (msg:"ATK W08 shell callback"; sid:9408001; rev:1;)
      ```
      📌 채점: local.rules 에 익스플로잇/셸 탐지룰(sid 9408001)이 작성됐는지.
      ✅ 합격: local.rules 에 9408001 룰이 있다.
    hint: "local.rules 에 셸 콜백/익스플로잇 탐지룰(sid 9408001) → reload."
    verify:
      type: "file_contains"
      expect: "9408001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9408001" } }
      semantic:
        intent: "익스플로잇 탐지 — 셸 콜백(비표준 포트)/후속 행위 룰화. 익스플로잇 단계를 넘은 신호 포착."
        success_criteria: ["local.rules 에 sid 9408001", "셸/콜백 탐지 로직", "(설명) 익스플로잇 후속 신호"]
        acceptable_methods: ["local.rules 작성 + reload"]
        negative_signs: ["문법 오류", "정상 트래픽 과탐"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 종합 방어 분석 + 시험 보고서

      CTF 전 과정을 분석해 가장 위험했던 취약점과 방어 우선순위를 정리한 보고서를 작성한다(공격자
      관점에서 본 약점 → 방어 강화).

      📌 채점: 본인 web modsec audit 에 공격 흔적이 있는지(분석 대상).
      ✅ 합격: 본인 WAF audit 에 익스플로잇 탐지가 있다.
    hint: "가장 위험한 취약점 + 방어 우선순위 보고서. 채점: log_contains web modsec 942100."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "종합 보고서 — 공격자 관점 약점 분석 → 방어 우선순위. CTF 의 학습 환류."
        success_criteria: ["공격 흔적 확인", "(분석) 가장 위험한 취약점 + 근거", "(우선순위) 방어 강화 순서"]
        acceptable_methods: ["전 과정 분석 + 보고서"]
        negative_signs: ["우선순위 없는 나열"]
