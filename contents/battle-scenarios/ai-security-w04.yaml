id: "ai-security-w04"
category: "ai-security"
title: "[AI보안활용 W4] 대량·상관 필요 로그 vs LLM 로그 분석(요약·상관·우선순위)"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — **LLM 기반 로그 분석**(요약·상관·우선순위화)과 결정론 검증을 다룬다. Red는
  상관이 필요한 대량·다계층 로그를 만들고, Blue는 LLM으로 요약·상관·우선순위화하되 결정론으로 검증한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(대량·상관 로그 생성)와 Blue(LLM 요약·상관·우선순위)를 모두 수행.
    • duel : Red 학생이 상관 난제를 만들고, Blue 학생이 LLM으로 분석·우선순위화한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 LLM 분석은 el34 GPU 활용, 품질로 semantic 채점.

  ▸ 관점 — 방어자는 대량 로그에 파묻힌다. LLM은 요약·상관·우선순위로 부하를 줄이지만, 우선순위 판단은
    결정론(규칙·심각도)으로 검증해야 한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (대량·상관 로그 생성) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 상관 필요한 다단계·다계층 로그

      단일 이벤트로는 안 보이고 **상관해야 보이는** 다단계·다계층 활동을 만든다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰→공격→반복 접근을 여러 계층에 걸쳐
        (고유 태그).

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 상관 포인트**(무엇을 상관해야 공격이 보이나).

      ### ✅ 합격 기준
      상관해야 보이는 다단계·다계층 활동을 만들어 대상에 흔적을 남기고, 상관 포인트를 제시한다.
    hint: "정찰→공격→반복 접근을 여러 계층에(태그) → 상관해야 보이게. 상관 포인트 제시. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-4-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          상관 난제 생성 — 단일로는 안 보이고 상관해야 보이는 활동을 만든다.
        success_criteria:
          - "대상 WAF/IPS에 다단계·다계층 흔적이 남고 고유 태그로 귀속됨"
          - "상관해야 보이는 활동을 생성"
          - "(설명) 상관 포인트를 제시"
        acceptable_methods:
          - "다단계·다계층 활동 + 상관 포인트"
        negative_signs:
          - "탐지 흔적 없음"
          - "단일 이벤트만"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 우선순위 혼란 유발 (저위험 다수 + 고위험 소수)

      저위험 다수 활동에 **고위험 소수**를 섞어, 우선순위 판단을 어렵게 한다.

      ### ✅ 합격 기준
      저위험 다수 + 고위험 소수를 섞어 우선순위 혼란을 유발하고, 고위험이 묻히기 쉬움을 분석한다.
    hint: "저위험 다수+고위험 소수 섞기(태그) → 우선순위 혼란. 고위험이 묻히는 위험 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-4-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          우선순위 혼란 — 저위험 다수에 고위험을 묻어 트리아지를 어렵게 함.
        success_criteria:
          - "대상 IPS/WAF에 혼합 활동 흔적이 남고 고유 태그로 귀속됨"
          - "저위험 다수 + 고위험 소수를 섞음"
          - "(설명) 고위험이 묻히기 쉬움을 분석"
        acceptable_methods:
          - "저/고위험 혼합 + 분석"
        negative_signs:
          - "혼합 없음"

# ───────────────────────── BLUE (LLM 요약·상관·우선순위) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — LLM 요약·상관·우선순위화

      LLM으로 Red 로그를 **요약·상관·우선순위화**한다.

      ### 어떻게
      - Wazuh/Suricata에서 Red 로그를 수집.
      - LLM으로 요약(무슨 일)·상관(단계 묶기)·우선순위(고위험 선별).
      - 우선순위를 결정론(심각도·규칙)으로 **교차 검증**해 고위험이 안 묻히게.

      ### ✅ 합격 기준
      LLM으로 요약·상관·우선순위화하고, 고위험을 결정론으로 교차 검증해 선별한다.
    hint: "Wazuh/Suricata 로그 → LLM 요약·상관·우선순위 → 결정론(심각도·규칙) 교차 검증으로 고위험 선별."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-4-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          LLM 요약·상관·우선순위 — LLM으로 부하를 줄이되 우선순위를 결정론으로 검증.
        success_criteria:
          - "Wazuh/Suricata에서 Red 로그를 수집"
          - "LLM으로 요약·상관·우선순위화"
          - "(설명) 고위험을 결정론(심각도·규칙)으로 교차 검증"
        acceptable_methods:
          - "요약·상관·우선순위 + 결정론 검증"
        negative_signs:
          - "로그 근거 없음"
          - "우선순위 검증 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — LLM 분석 파이프라인·결정론 검증 설계

      LLM 로그 분석을 안전하게 운영하는 **파이프라인**을 설계한다.

      ### 무엇을
      - **파이프라인**: 수집→정규화→LLM 요약/상관→결정론 우선순위→트리아지 큐.
      - **결정론 검증**: 우선순위·분류를 규칙·심각도로 검증(LLM 단독 판단 금지).
      - **부하 관리**: 대량 로그 배치·샘플링 없이 우선순위로 집중, 비용·성능.
      - **환각·인젝션 방어**: 원본 근거 링크·로그 인젝션 방어(W03 연계).

      ### ✅ 합격 기준
      분석 파이프라인·결정론 검증·부하 관리·환각 방어를 제시하고 "LLM은 부하를 줄이고 결정론이 판단을
      보증" 원칙을 설명한다.
    hint: "파이프라인(수집→정규화→LLM 요약/상관→결정론 우선순위→큐)+결정론 검증+부하 관리+환각/인젝션 방어. 'LLM 부하 감소, 결정론 판단 보증' 원칙."
    verify:
      type: "semantic"
      expect: "log_analysis_pipeline"
      semantic:
        intent: |
          LLM 분석 파이프라인 — LLM 요약/상관과 결정론 검증을 결합한 안전한 트리아지 파이프라인.
        success_criteria:
          - "파이프라인(수집→정규화→LLM→결정론 우선순위→큐)을 제시"
          - "결정론 검증(규칙·심각도)을 제시"
          - "부하 관리와 환각/인젝션 방어를 제시"
          - "(설명) 'LLM 부하 감소, 결정론 판단 보증' 원칙 설명"
        acceptable_methods:
          - "파이프라인 + 결정론 검증 + 부하 관리 + 방어"
        negative_signs:
          - "LLM 단독 판단"
          - "결정론 검증 없음"
