id: "agent-ir-w08"
category: "agent-ir"
title: "[에이전트IR W8] 중간평가: Blue Team Agent IR CTF — 종합 캠페인 vs 종합 IR"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간평가 CTF 공방전 — W01~W07(템포·도구 루프·정찰·익스플로잇·측면이동·다형성·규모)을 종합해, Red는
  **다단계 AI 속도 캠페인**을 수행하고 Blue는 **종합 IR**(탐지→상관→봉쇄→보고)로 대응한다. Blue Team의
  종합 대응 역량을 평가한다. 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(종합 캠페인)와 Blue(종합 IR)를 모두 수행.
    • duel : Red 학생이 다단계 캠페인을 수행하고, Blue 학생이 종합 IR로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE(PoC·파괴/유출 금지) 엄수.

# ───────────────────────── RED (종합 AI 속도 캠페인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 다단계 캠페인: 정찰→익스플로잇→확산 (압축 템포)

      W01~W07 기법을 엮어 **압축된 다단계 캠페인**을 수행한다: 초고속 정찰→다수 익스플로잇 시도→다형성
      회피→다중 서비스 확산.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰→공격→확산을 짧은 창에(고유 태그).
      - 각 단계·시각·기법을 기록.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T4 -Pn 192.168.0.161 -p1-1000 --reason
      for v in "1'OR'1'='1" "1'/**/OR/**/1=1"; do curl -s -A 'auto-red-<학번>-ctf' "http://192.168.0.161/vulnerabilities/sqli/?id=$v"; done
      for h in dvwa.el34.lab neobank.el34.lab; do curl -s -A 'auto-red-<학번>-ctf' -H "Host: $h" http://192.168.0.161/; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 다단계 캠페인**(단계·시각·기법).

      ### ✅ 합격 기준
      정찰→익스플로잇→확산의 다단계 캠페인을 압축 템포로 수행해 대상에 흔적을 남기고 단계·기법을 기록한다.
    hint: "정찰→다수 익스플로잇→다형성→확산을 짧은 창에(태그 auto-red-<학번>-ctf). 단계·시각·기법 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-8-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          종합 AI 속도 캠페인 — 학기 전반 기법을 압축 템포 다단계 캠페인으로 종합.
        success_criteria:
          - "대상 WAF/IPS에 다단계 캠페인 흔적이 남고 고유 태그로 귀속됨"
          - "정찰→익스플로잇→확산을 압축 템포로 수행"
          - "(설명) 단계·시각·기법을 기록"
        acceptable_methods:
          - "다단계 캠페인 + 단계 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "단계 연결·기록 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 캠페인 특성 자기 분석 (방어자 관점 예측)

      자신의 캠페인이 **방어자에게 어떻게 보일지** 예측·분석한다: 템포·규칙성·확산·다형성 신호가 로그에
      어떻게 남는지.

      ### ✅ 합격 기준
      자신의 캠페인이 남긴 탐지 신호(템포·규칙성·확산·다형성)를 방어자 관점에서 예측·분석한다.
    hint: "자기 캠페인이 남긴 신호(템포·규칙성·확산·다형성)를 방어자 관점에서 예측·분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-8-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          방어자 관점 예측 — 공격이 남기는 신호를 스스로 분석해 탐지 가능성을 이해.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "자신의 캠페인 신호(템포·규칙성·확산·다형성)를 예측"
          - "(설명) 방어자 관점에서 분석"
        acceptable_methods:
          - "신호 예측 + 방어자 관점 분석"
        negative_signs:
          - "자기 분석 없음"

# ───────────────────────── BLUE (종합 IR) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 탐지·상관: 캠페인 재구성

      Red의 다단계 캠페인을 **탐지·상관**해 전체를 재구성한다.

      ### 어떻게
      - Wazuh/Suricata에서 정찰·익스플로잇·확산 이벤트를 출처·시간·태그로 상관.
      - 압축 템포·규칙성·확산을 근거로 하나의 AI 속도 캠페인으로 재구성(킬체인 타임라인).

      ### ✅ 합격 기준
      다단계 이벤트를 상관해 킬체인 타임라인으로 캠페인을 재구성하고 AI 속도 특성을 식별한다.
    hint: "Wazuh/Suricata 정찰·익스플로잇·확산 이벤트를 출처·시간·태그로 상관 → 킬체인 타임라인 재구성. AI 속도 특성 식별."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-8-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          종합 탐지·상관 — 다단계 이벤트를 킬체인 타임라인으로 재구성해 캠페인을 식별.
        success_criteria:
          - "Wazuh/Suricata에서 다단계 이벤트를 상관"
          - "킬체인 타임라인으로 캠페인을 재구성"
          - "(설명) AI 속도 특성(템포·규칙성·확산)을 식별"
        acceptable_methods:
          - "이벤트 상관 + 킬체인 타임라인"
        negative_signs:
          - "경보 근거 없음"
          - "타임라인·재구성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 종합 IR: 봉쇄·대응·사고 보고

      캠페인에 대한 **종합 IR**을 수행한다: 봉쇄→근절→복구→보고.

      ### 무엇을
      - **봉쇄**: 공격 출처 차단·확산 세그먼트 격리(자동 봉쇄, 고위험 승인).
      - **근절·복구**: 지속 아티팩트 제거·영향 자산 복구.
      - **사고 보고**: 킬체인 타임라인·기법(MITRE ATT&CK 매핑)·영향·교훈.
      - **AI 속도 대응**: 사람이 못 따라가므로 자동화·플레이북 활용.

      ### ✅ 합격 기준
      봉쇄·근절·복구·사고 보고(ATT&CK 매핑)를 제시하고 "AI 속도 캠페인엔 자동화된 종합 IR" 원칙을
      설명한다.
    hint: "봉쇄(출처 차단·격리)+근절·복구+사고 보고(킬체인 타임라인·ATT&CK 매핑·교훈)+AI 속도 자동화. '자동화된 종합 IR' 원칙."
    verify:
      type: "semantic"
      expect: "comprehensive_ir"
      semantic:
        intent: |
          종합 IR — 봉쇄·근절·복구·보고를 자동화와 함께 수행해 AI 속도 캠페인에 대응.
        success_criteria:
          - "봉쇄(출처 차단·격리)를 제시"
          - "근절·복구와 사고 보고(킬체인·ATT&CK 매핑)를 제시"
          - "AI 속도 대응(자동화·플레이북)을 제시"
          - "(설명) '자동화된 종합 IR' 원칙 설명"
        acceptable_methods:
          - "봉쇄 + 근절/복구 + 보고 + 자동화"
        negative_signs:
          - "봉쇄만·보고 없음"
          - "자동화·ATT&CK 매핑 없음"
