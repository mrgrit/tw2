id: "compliance-w05"
category: "compliance"
title: "[컴플라이언스 W5] GDPR Article 32 — 미암호화·PII 노출 vs 암호화·책임추적 통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  컴플라이언스 5주차 — **GDPR Article 32 기술적 보호조치**. 저장/전송 데이터 암호화·지속적 보안 보장·가용성
  복원·책임추적성(accountability)을 요구한다. 공격자는 미암호화/PII 노출을 악용하고, 감사자(너)는 암호화·자동
  차단·감사추적 통제를 구현하고 충족을 증적으로 입증한다.

  ▸ 이야기
    공격자가 미암호화 전송/노출된 개인 데이터를 노려 침투하고(태그 `co05r1`), PII 잔존 파일(`/tmp/.co05pii`)과
    계정 `compa05` 를 남긴다. 감사자는 ① 지속적 보안(자동 차단) 통제, ② 감사추적(accountability) 룰, ③ GDPR
    Art.32 종합 점검·증적으로 대응한다.

  ▸ 모드
    • solo : 한 학생이 PII 노출 악용(자기 인프라 표적)과 통제 구현을 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라의 PII 를 악용, Blue 는 자기 인프라에 통제 구현.

  ▸ 공격자 위치(중요)
    Red 미션은 **attacker-ext(SSH 2203)** 기준. Red 채점은 **대상 인프라의 흔적(WAF audit 태그 / PII 파일·계정)** 으로 한다.

  ▸ 이번 주차 전용 마커
    악용 태그 **`co05r1-<본인id>`**, 잔존 PII **`/tmp/.co05pii`**(마커 `co05`), 계정 **`compa05`**,
    Suricata 지속보안 룰 **sid 9805011**, Wazuh 감사추적 룰 **id 104051**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [미암호화/PII 접근] — 전송 보호 공백 공략

      ### 상황
      GDPR Art.32 는 전송 중 데이터 암호화를 요구한다. 너는 태그 `co05r1-<본인id>` 로 개인 데이터에 접근을 시도해
      전송/저장 보호의 공백을 입증한다.

      ### 할 일 (attacker-ext)
      ```bash
      curl -s -A "co05r1-kim" -H "Host: govportal.6v6.lab" \
        "http://192.168.0.161/api/citizens/export.csv?file=co05r1-kim/../../../../var/log/apache2/access.log"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `co05r1` 가 포함된 흔적이 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `co05r1` 태그가 포함된 흔적이 남는다.
    hint: "태그(co05r1) 개인 데이터 접근 시도 → 대상 modsec audit. 채점: log_contains modsec co05r1."
    verify:
      type: "log_contains"
      expect: "co05r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "co05r1", since_sec: 1800 } }
      semantic:
        intent: "전송/저장 보호 미흡 악용(T1530) — GDPR Art.32 암호화 공백 입증. 태그(co05r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 co05r1 태그가 포함된 흔적"
          - "어떤 데이터 보호 공백을 노렸는지 서술"
        acceptable_methods:
          - "attacker-ext 에서 태그 단 데이터 접근 시도"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [PII 잔존] — 데이터 최소화 위반 + 계정

      ### 상황
      GDPR 데이터 최소화 원칙상 `/tmp` 등에 민감 데이터가 남으면 안 된다. 너는 잔존 PII **`/tmp/.co05pii`**(마커
      `co05`)와 계정 **`compa05`** 를 남겨 위반을 시연한다.

      ### 할 일
      ```bash
      printf 'co05 PII: user@eu.example 4111-1111-1111-1111 DE-passport' > /tmp/.co05pii
      sudo useradd -m -s /bin/bash compa05
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.co05pii`(마커 `co05`)이 있거나 `/etc/passwd` 에 `compa05` 가 있는지로 채점.

      ### 합격 기준
      `/tmp/.co05pii`(마커 `co05`) 또는 계정 `compa05`.
    hint: "잔존 PII /tmp/.co05pii (마커 co05) + useradd compa05. 채점: file_contains pii co05 + file_contains passwd compa05."
    verify:
      type: "file_contains"
      expect: "co05"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.co05pii", pattern: "co05" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "compa05" } }
      semantic:
        intent: "데이터 최소화 위반(T1530) + 계정(T1136) — GDPR 잔존 PII. 보존 한정/최소화 원칙 위배."
        success_criteria:
          - "/tmp/.co05pii(마커 co05) 또는 계정 compa05"
          - "데이터 최소화/보존 한정 위반 서술"
        acceptable_methods:
          - "PII 잔존 파일 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [지속적 보안] — 반복 접근 자동 탐지 Suricata 룰 (sid 9805011)

      ### 상황
      GDPR Art.32(1)(b) 는 지속적 보안 보장을 요구한다(fail2ban 류 자동 차단). 반복 비인가 접근을 잡는 Suricata
      룰(**sid 9805011**)을 배포해 지속 보안을 입증한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"COMPLIANCE-W05 GDPR repeated unauthorized access (path traversal)"; flow:to_server; http.uri; content:"../"; nocase; sid:9805011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      (탐지 → fail2ban/active-response 로 자동 차단 연계.)

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9805011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 지속 보안 룰 sid 9805011 이 존재한다.
    hint: "지속적 보안(fail2ban류) Suricata 룰(sid 9805011) → reload + 자동 차단 연계. 채점: file_contains local.rules 9805011."
    verify:
      type: "file_contains"
      expect: "9805011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9805011" } }
      semantic:
        intent: "GDPR Art.32(1)(b) 지속적 보안 — 반복 비인가 접근 탐지 + 자동 차단 연계. 보안 서비스 지속 보장."
        success_criteria:
          - "local.rules 에 sid 9805011"
          - "fail2ban/active-response 자동 차단 연계 + Art.32(1)(b) 언급"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [책임추적성] — 감사추적 Wazuh 룰 (id 104051) [Art.5(2)]

      ### 상황
      GDPR Art.5(2) accountability 는 충분한 감사추적(audit trail)을 요구한다. PII 접근/계정 변경을 추적하는
      Wazuh 룰(**id 104051**)을 만든다.

      ### 할 일
      ```xml
      <group name="edu,gdpr,">
        <rule id="104051" level="12">
          <if_group>edu</if_group>
          <match>compa05</match>
          <description>COMPLIANCE-W05 - GDPR Art.5(2) accountability: PII access / account change</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 104051 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 감사추적 id 104051 룰이 존재한다.
    hint: "책임추적성(Art.5(2)) 감사추적 Wazuh 룰(id 104051) → restart. 채점: file_contains local_rules.xml 104051."
    verify:
      type: "file_contains"
      expect: "104051"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "104051" } }
      semantic:
        intent: "GDPR Art.5(2) 책임추적성 — PII 접근/계정 변경 감사추적 Wazuh 룰. accountability 통제."
        success_criteria:
          - "local_rules.xml 에 rule id 104051"
          - "PII 접근/계정 추적 로직 + Art.5(2) 연계"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [Art.32 종합 점검·증적] — GDPR 충족 입증

      ### 상황
      GDPR Art.32 기술적 보호조치를 종합 점검하고 증적을 정리한다(저장 암호화, 전송 TLS, IP 가명화, 백업/복원,
      자동 차단, /tmp 민감 데이터 정리, 감사추적).

      ### 할 일
      보고서에:
      - 항목별 점검(디스크 암호화/TLS 만료/IP 가명화 로그 포맷/백업/fail2ban/`/tmp` 정리) + Art.32 조항 매핑 + 증적
      - 미흡 개선 + 잔존 PII(`/tmp/.co05pii`)·계정(compa05) 헌팅·삭제
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 Art.32 종합 점검 증적으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ Art.32 항목별 점검·증적·헌팅은 제출로 검증).
    hint: "GDPR Art.32 점검(저장암호화/TLS/IP가명화/백업/fail2ban//tmp정리/감사추적) + 조항 매핑 + 증적 + PII/계정 헌팅·삭제. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "GDPR Art.32 종합 점검·증적 — 기술 보호조치 항목별 충족 입증 + 데이터 최소화(PII 삭제). 분석형 — 조항 매핑/증적 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "Art.32 항목별 점검(암호화/TLS/가명화/백업/자동차단) + 조항 매핑 + 증적"
          - "잔존 PII 삭제(데이터 최소화) + 계정 헌팅"
        acceptable_methods:
          - "점검 표 + 조항 매핑 + 증적 + 헌팅"
        negative_signs:
          - "조항/증적 없는 서술 / 항목 누락"
