id: "iot-security-w10"
category: "iot-security"
title: "[IoT보안 W10] 스마트홈 보안: 허브 장악·장치 간 신뢰 악용 vs 생태계 분리·프라이버시"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  스마트홈 공방전 — **허브 장악·장치 간 신뢰 악용·프라이버시**의 공격과 생태계 방어를 설계·분석한다.
  실물 스마트홈이 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(허브·장치 신뢰 악용)와 Blue(생태계 분리·프라이버시)를 모두 수행.
    • duel : Red 학생이 스마트홈 장악 경로를 제시하고, Blue 학생이 생태계 방어로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 허브 SPOF·장치 간 신뢰·측면이동·프라이버시 경로의
    구체성, 생태계 분리·최소 신뢰·프라이버시 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (허브·장치 신뢰 악용) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 약한 장치 → 측면이동 → 허브 장악 (SPOF)

      스마트홈의 **가장 약한 장치**를 발판으로 측면이동해 **허브(SPOF)** 를 장악하는 경로를 설계한다.

      ### 무엇을
      - 약한 장치(값싼 전구·센서, W02~W07 취약) 침해 → 같은 망/신뢰 관계 악용해 측면이동.
      - 허브 장악 시 연결된 모든 장치(잠금·카메라·경보) 제어 → 물리 위협.
      - 허브가 SPOF인 이유(중앙 신뢰·자동화 규칙 실행)를 명시.

      ### ✅ 합격 기준
      약한 장치→측면이동→허브 장악→전 장치 제어 경로를 구체적으로 설계하고 허브 SPOF의 위험을 설명한다.
    hint: "약한 장치(전구/센서) 침해→같은 망·신뢰 악용 측면이동→허브 장악→잠금/카메라/경보 제어. 허브 SPOF 위험."
    verify:
      type: "semantic"
      expect: "smarthome_hub_takeover"
      semantic:
        intent: |
          허브 장악 — 약한 장치를 발판으로 측면이동해 허브(SPOF)를 장악, 전 장치를 제어.
        success_criteria:
          - "약한 장치 침해→측면이동→허브 장악 경로를 구체적으로 설계"
          - "허브 장악이 전 장치 제어·물리 위협으로 이어짐을 서술"
          - "(설명) 허브가 SPOF인 이유(중앙 신뢰·자동화)를 설명"
        acceptable_methods:
          - "약한 장치 → 측면이동 → 허브 장악"
        negative_signs:
          - "측면이동·SPOF 설명 없음"
          - "경로가 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 장치 간 신뢰·자동화 규칙·프라이버시 악용

      **장치 간 신뢰와 자동화 규칙**을 악용하고 **프라이버시**를 침해하는 경로를 분석한다.

      ### 무엇을
      - 자동화 규칙 악용(예: "재실 감지 시 잠금 해제"를 조건 위조로 트리거).
      - 장치 간 암묵적 신뢰(로컬 API 무인증)·클라우드 계정 탈취.
      - 프라이버시: 센서·카메라·사용 패턴으로 재실/생활 패턴 유추.

      ### ✅ 합격 기준
      자동화 규칙 악용 또는 장치 간 신뢰 악용과 프라이버시 침해(생활 패턴 유추)를 구체적으로 분석한다.
    hint: "자동화 규칙 악용(조건 위조 트리거)+장치 간 암묵 신뢰(로컬 무인증)·클라우드 계정 탈취+센서/패턴으로 생활 유추(프라이버시)."
    verify:
      type: "semantic"
      expect: "device_trust_privacy"
      semantic:
        intent: |
          장치 간 신뢰·프라이버시 악용 — 자동화 규칙·암묵 신뢰·패턴 유추로 물리·프라이버시 침해.
        success_criteria:
          - "자동화 규칙 악용 또는 장치 간 신뢰 악용을 분석"
          - "프라이버시 침해(생활 패턴 유추)를 분석"
          - "(설명) 암묵적 신뢰가 위험함을 언급"
        acceptable_methods:
          - "자동화/신뢰 악용 + 프라이버시 분석"
        negative_signs:
          - "신뢰 악용·프라이버시 중 하나만·막연"

# ───────────────────────── BLUE (생태계 분리·프라이버시) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 생태계 분리·최소 신뢰 설계

      RED의 측면이동·허브 장악을 막는 **생태계 분리·최소 신뢰**를 설계한다.

      ### 무엇을
      - **네트워크 분리**: IoT VLAN 분리·장치 간 통신 최소화(마이크로세분화), 신뢰 도메인 구분.
      - **최소 신뢰**: 장치 간·로컬 API 인증, 암묵적 신뢰 제거.
      - **허브 보호**: 허브 하드닝·인증·자동화 규칙 무결성, SPOF 완화(중요 기능 독립).
      - RED 경로 매핑.

      ### ✅ 합격 기준
      네트워크 분리·최소 신뢰·허브 보호를 제시하고 RED의 측면이동·허브 장악 경로를 끊는 방법을 설명한다.
    hint: "IoT VLAN 분리·마이크로세분화+장치 간/로컬 API 인증(암묵 신뢰 제거)+허브 하드닝·자동화 규칙 무결성·SPOF 완화. RED 경로 차단."
    verify:
      type: "semantic"
      expect: "ecosystem_segmentation"
      semantic:
        intent: |
          생태계 분리·최소 신뢰 — 분리·인증·허브 보호로 측면이동과 허브 장악을 막는다.
        success_criteria:
          - "네트워크 분리(IoT VLAN·마이크로세분화)를 제시"
          - "최소 신뢰(장치 간/로컬 API 인증)를 제시"
          - "허브 보호·SPOF 완화를 제시하고 RED 경로 차단을 설명"
        acceptable_methods:
          - "분리 + 최소 신뢰 + 허브 보호"
        negative_signs:
          - "분리 또는 최소 신뢰 없음"
          - "허브 SPOF 방치"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 프라이버시·자동화 안전·수명주기 설계

      스마트홈의 **프라이버시·자동화 안전·수명주기**를 설계한다.

      ### 무엇을
      - **프라이버시**: 데이터 최소화·로컬 처리 우선·암호화·접근 제어, 사용자 투명성/동의.
      - **자동화 안전**: 안전 필수 자동화(잠금)는 검증된 조건·다중 확인, 안전측 기본값(모호하면 잠김).
      - **계정·수명주기**: 강한 인증(MFA)·계정 탈취 대비, 장치 추가/제거 시 신뢰 갱신, 업데이트·EOL.

      ### ✅ 합격 기준
      데이터 최소화·프라이버시 통제·자동화 안전 기본값·계정 보안을 제시하고 "편의와 보안·프라이버시의
      균형" 원칙을 설명한다.
    hint: "데이터 최소화·로컬 처리·암호화·동의+안전 필수 자동화 검증·안전측 기본값+MFA·신뢰 갱신·EOL. '편의와 보안·프라이버시 균형' 원칙."
    verify:
      type: "semantic"
      expect: "smarthome_privacy_safety"
      semantic:
        intent: |
          스마트홈 프라이버시·자동화 안전 — 데이터 최소화·안전 기본값·계정 보안으로 프라이버시와 물리
          안전을 지킨다.
        success_criteria:
          - "프라이버시(데이터 최소화·로컬 처리·암호화·동의)를 제시"
          - "자동화 안전(검증 조건·안전측 기본값)을 제시"
          - "계정 보안(MFA)·신뢰 갱신·수명주기를 제시"
          - "(설명) '편의와 보안·프라이버시 균형' 원칙 설명"
        acceptable_methods:
          - "프라이버시 + 자동화 안전 + 계정 + 수명주기"
        negative_signs:
          - "프라이버시 또는 자동화 안전 한쪽만"
          - "안전측 기본값 언급 없음"
