id: "autonomous-systems-w13"
category: "autonomous-systems"
title: "[자율시스템 W13] AI 모델 공격: 적대적 입력·중독 vs 로버스트니스·검증"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  AI 모델 공격/방어 공방전 — CPS의 **AI 모델**(인식·의사결정)에 대한 적대적 입력·데이터 중독·모델
  추출과, 로버스트니스·형식 검증 방어를 설계·분석한다. 실물 모델·센서가 필요하므로 **설계·서술형**
  이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(AI 모델 공격)와 Blue(로버스트니스·검증)를 모두 수행.
    • duel : Red 학생이 모델 공격 경로를 제시하고, Blue 학생이 로버스트 방어로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 적대적 입력·중독·추출의 구체성과 물리 영향, 로버스트니스
    (적대적 훈련·인증된 방어)·형식 검증·런타임 모니터의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (AI 모델 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 적대적 입력·데이터 중독 → 물리 오작동

      CPS AI 모델에 대한 **적대적 입력**(추론 시)과 **데이터 중독**(훈련 시)을 설계하고 물리 영향으로
      잇는다.

      ### 무엇을
      - **적대적 입력(회피)**: 미세 섭동·물리 패치로 오분류(표지판·장애물) → 위험 결정.
      - **데이터 중독**: 훈련 데이터에 백도어 트리거 심기 → 특정 입력에서 의도적 오작동.
      - **화이트/블랙박스** 차이와 전이성(transferability) 언급.

      ### ✅ 합격 기준
      적대적 입력과 데이터 중독 중 최소 1개를 구체적으로 설계하고(위협 모델·기법 명시), 물리 오작동으로
      이어짐을 서술한다.
    hint: "적대적 입력(섭동·물리 패치 오분류)/데이터 중독(백도어 트리거) → 물리 오작동. 화이트/블랙박스·전이성 언급."
    verify:
      type: "semantic"
      expect: "model_attack"
      semantic:
        intent: |
          AI 모델 공격 — 적대적 입력·데이터 중독이 물리 오작동으로 이어짐을 위협 모델과 함께 이해.
        success_criteria:
          - "적대적 입력 또는 데이터 중독을 구체적으로 설계(위협 모델·기법)"
          - "물리 오작동으로 이어짐을 서술"
          - "(설명) 화이트/블랙박스·전이성을 언급"
        acceptable_methods:
          - "적대적 입력·중독 + 물리 영향"
        negative_signs:
          - "위협 모델·기법 불명"
          - "물리 영향 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 모델 추출·역공학 분석

      모델 **추출(질의로 복제)·역공학**으로 방어를 무력화하는 경로를 분석한다: 복제 모델로 적대적 예제를
      더 쉽게 생성(대리 모델 공격), 지식재산·안전 로직 유출.

      ### ✅ 합격 기준
      모델 추출/역공학 경로와, 복제 모델이 적대적 공격을 어떻게 쉽게 만드는지(대리 모델·전이) 분석한다.
    hint: "질의 기반 모델 추출·복제 → 대리 모델로 적대적 예제 생성 용이·전이. 지식재산·안전 로직 유출."
    verify:
      type: "semantic"
      expect: "model_extraction"
      semantic:
        intent: |
          모델 추출·역공학 — 복제 모델이 공격을 쉽게 만들고 지식재산·안전 로직을 유출함을 이해.
        success_criteria:
          - "모델 추출/역공학 경로(질의 기반 복제)를 분석"
          - "복제 모델이 적대적 공격을 쉽게 만드는 원리(대리·전이)를 설명"
          - "(설명) 지식재산·안전 로직 유출 위험을 언급"
        acceptable_methods:
          - "모델 추출 + 대리 모델 공격 분석"
        negative_signs:
          - "추출 원리 없이 '가능'만"

# ───────────────────────── BLUE (로버스트니스·검증) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 로버스트니스·적대적 방어 설계

      AI 모델의 **로버스트니스**를 높이는 방어를 설계한다.

      ### 무엇을
      - **적대적 훈련**: 적대적 예제로 훈련해 강건성 향상.
      - **인증된 방어**: 랜덤 스무딩 등 인증 반경 내 강건성 보장.
      - **입력 방어·이상 탐지**: 입력 정화·OOD(분포 밖) 탐지·불확실성 추정.
      - **추출 방어**: 질의 레이트리밋·출력 정보 제한.

      ### ✅ 합격 기준
      적대적 훈련·인증된 방어·입력/OOD 탐지·추출 방어를 제시하고 RED 공격에 매핑한다.
    hint: "적대적 훈련+인증된 방어(랜덤 스무딩)+입력 정화·OOD 탐지·불확실성+질의 레이트리밋(추출 방어). RED 공격 매핑."
    verify:
      type: "semantic"
      expect: "model_robustness"
      semantic:
        intent: |
          모델 로버스트니스 — 적대적 훈련·인증 방어·이상 탐지·추출 방어로 모델 공격에 저항.
        success_criteria:
          - "적대적 훈련·인증된 방어를 제시"
          - "입력 정화·OOD 탐지·불확실성 추정을 제시"
          - "추출 방어(레이트리밋·출력 제한)를 제시하고 RED 매핑"
        acceptable_methods:
          - "적대적 훈련 + 인증 방어 + 이상 탐지 + 추출 방어"
        negative_signs:
          - "단일 방어만"
          - "인증 방어 또는 OOD 탐지 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 형식 검증·런타임 모니터·안전 계층 설계

      모델을 신뢰할 수 없다는 전제에서 **형식 검증·런타임 안전 모니터**를 설계한다.

      ### 무엇을
      - **형식 검증**: 안전 속성(특정 입력에서 특정 결정 금지)을 형식적으로 검증(가능한 범위).
      - **런타임 모니터**: 모델 출력을 안전 규칙(물리 제약·안전 봉투)으로 검사, 위반 시 안전측 개입.
      - **독립 안전 계층**: AI가 틀려도 물리 안전을 지키는 규칙 기반 안전 시스템(모델과 독립).
      - **모니터링·재훈련**: 분포 이동·성능 저하 모니터, 안전한 재훈련·검증 파이프라인.

      ### ✅ 합격 기준
      형식 검증·런타임 안전 모니터·독립 안전 계층을 제시하고 "AI가 틀려도 안전 규칙이 물리 안전을 보장"
      원칙을 설명한다.
    hint: "형식 검증(안전 속성)+런타임 모니터(안전 봉투·위반 시 개입)+독립 안전 계층(규칙 기반)+분포 이동 모니터·안전 재훈련. 'AI 틀려도 안전 규칙이 보장' 원칙."
    verify:
      type: "semantic"
      expect: "model_verification"
      semantic:
        intent: |
          형식 검증·런타임 안전 — 모델을 신뢰하지 않고 검증·모니터·독립 안전 계층으로 물리 안전을 보장.
        success_criteria:
          - "형식 검증(안전 속성)을 제시"
          - "런타임 안전 모니터(안전 봉투·위반 시 개입)를 제시"
          - "독립 안전 계층(규칙 기반)과 분포 이동 모니터·안전 재훈련을 제시"
          - "(설명) 'AI가 틀려도 안전 규칙이 물리 안전 보장' 원칙 설명"
        acceptable_methods:
          - "형식 검증 + 런타임 모니터 + 독립 안전 + 재훈련"
        negative_signs:
          - "독립 안전 계층·런타임 모니터 없음"
          - "모델 방어만·검증 관점 없음"
