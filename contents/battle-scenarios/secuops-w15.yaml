id: "secuops-w15"
category: "secuops"
title: "[보안운영 W15] 기말 — 한 APT 캠페인을 5종 장비 + 위협인텔로 끝까지 막아내기(수료)"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  보안운영 과정의 **수료 시험**이다. 한 APT 그룹이 **5단계 킬체인**으로 들어온다 — ① 정찰 → ② 웹
  익스플로잇 침투 → ③ 호스트 발판·측면이동 → ④ C2 채널·유출 → ⑤ (대응·복구). 14주 동안 배운 모든
  무기(방화벽·IDS·WAF·SIEM·osquery·위협인텔)를 **하나의 캠페인에 동원**해 각 단계를 탐지·차단·헌팅하고,
  마지막엔 **APT 5단계 IR 보고서**로 종합한다.

  ▸ 이야기
    공격자가 정찰로 표면을 훑고, 웹으로 침투하고, 호스트에 C2 채널과 백도어 계정을 심는다. 운영자(너)는
    ① IDS 룰로 정찰을 잡고 ② WAF anomaly로 침투를 막고 ③ osquery로 호스트 발판을 사냥하고 ④ APT의
    IOC를 Wazuh 룰로 격상하고 ⑤ 전체를 IR 보고서로 종합한다.

  ▸ 모드: solo(APT 공격자→종합 대응자) / duel(상대 APT→본인 종합 방어). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 단계 독립 채점. 마커: 웹 침투 태그 **`apt15r1-<id>`**, C2 리스너 **포트 61555**, 백도어
    계정 **`aptghost`**, IDS 룰 **sid 9515001**(Suricata), 인텔 룰 **id 101501**(Wazuh). 끝나면 cleanup.

# ───────────── RED : APT 그룹 — "5단계로 침투하라" ─────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 [1·2단계] — 정찰 → 웹 익스플로잇

      ### 상황
      APT의 1·2단계. 스캐너로 표면을 식별하고, 가장 효과적인 웹 취약점(SQLi)으로 침투에 성공한다.

      ### 할 일
      이 미션 전용 태그 `apt15r1-<id>`를 붙여, 스캐너 UA로 SQLi를 보낸다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=apt15r1-kim-1%20UNION%20SELECT%20user,password%20FROM%20users"
      ```

      ### 채점 방법
      대상 WAF audit에 (apt15r1 태그 포함) SQLi(942)/스캐너(913) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 apt15r1 태그가 포함된 침투 탐지가 남는다.
    hint: "태그(apt15r1) sqlmap UA SQLi. 채점: 대상 modsec audit의 942/scanner + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
        - { id: "red-1-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "apt15r1", since_sec: 1800 } }
      semantic:
        intent: "APT 1·2단계 — Recon(T1595)→Initial Access(T1190). 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (apt15r1 태그 포함) SQLi(942)/스캐너(913) 탐지"
          - "정찰→침투 단계 연결 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 태그 붙인 sqlmap UA SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 [3·4단계] — 호스트 발판 → C2 채널

      ### 상황
      APT의 3·4단계. 발판에서 측면이동을 모사해 백도어 계정(**aptghost**)으로 지속성을 확보하고,
      C2 리스너(**포트 61555**)로 지휘통제/유출 채널을 연다.

      ### 할 일
      대상 호스트에 계정 `aptghost`와 리스너 포트 61555를 만든다.
      ```bash
      sudo useradd -m -s /bin/bash aptghost
      nohup ncat -lk 61555 >/dev/null 2>&1 &
      ```

      ### 채점 방법
      대상 호스트에 포트 61555 listening 또는 `/etc/passwd`에 `aptghost`가 있는지로 채점.

      ### 합격 기준
      포트 61555 listening 또는 `/etc/passwd`에 `aptghost`.
    hint: "useradd aptghost + ncat -lk 61555. 채점: file_contains passwd aptghost + port_listening 61555."
    verify:
      type: "file_contains"
      expect: "aptghost"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "aptghost" } }
        - { id: "red-2-2", type: "port_listening", target: "web", params: { port: 61555 } }
      semantic:
        intent: "APT 3·4단계 — Execution/Lateral(T1136 계정) + C2(T1571 채널). 발판 이후 지속성·유출 채널."
        success_criteria:
          - "aptghost 계정 또는 포트 61555"
          - "persistence와 C2 채널 기법 서술"
        acceptable_methods:
          - "useradd + ncat 리스너"
        negative_signs:
          - "흔적 미생성"

# ───────────── BLUE : 종합 대응자 — "5종+인텔로 끊고 종합하라" ─────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 [탐지] — IDS 룰로 정찰을 잡기 (sid 9515001)

      ### 상황
      APT의 정찰을 IDS가 잡아야 사슬을 초기에 끊는다. Suricata `local.rules`에 스캐너 UA 탐지
      룰(**sid 9515001**)을 작성한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"APT15 sqlmap UA recon"; http.user_agent; content:"sqlmap"; nocase; fast_pattern; classtype:attempted-recon; sid:9515001; rev:1;)
      ```
      작성 후 reload하고 eve.json에서 트리거를 확인한다.

      ### 채점 방법
      `/etc/suricata/rules/local.rules`에 sid 9515001 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9515001 룰이 있다.
    hint: "local.rules에 정찰 탐지 룰(sid 9515001) → reload."
    verify:
      type: "file_contains"
      expect: "9515001"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9515001" } }
      semantic:
        intent: "APT 탐지 — Suricata 룰로 정찰 단계 탐지. 킬체인 조기 가시화."
        success_criteria:
          - "local.rules에 sid 9515001"
          - "fast_pattern/적절한 버퍼"
          - "정찰 탐지의 조기 경보 가치 서술"
        acceptable_methods:
          - "local.rules 작성 + reload + eve.json 검증"
        negative_signs:
          - "문법 오류로 로딩 실패"

  - order: 2
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-2 [차단] — WAF anomaly로 침투 저지 (949110)

      ### 상황
      APT의 웹 익스플로잇을 WAF가 anomaly 누적 차단(949110)으로 막는지 확인한다.

      ### 할 일
      SQLi 공격 후 modsec audit에서 949110 차단을 찾는다.

      ### 채점 방법
      web modsec audit에 949110 흔적이 있는지로 확인.

      ### 합격 기준
      audit에 949110 anomaly 차단이 있다.
    hint: "SQLi 후 audit의 949110. 누적 점수 차단."
    verify:
      type: "log_contains"
      expect: "949110"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "949110", since_sec: 1800 } }
      semantic:
        intent: "APT 차단 — WAF anomaly 차단으로 초기 침투 저지. 누적 점수 메커니즘."
        success_criteria:
          - "audit에 949110 차단"
          - "누적 점수 메커니즘 서술"
        acceptable_methods:
          - "공격 재현 후 audit의 949110 확인"
        negative_signs:
          - "차단 미확인"

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [헌팅] — osquery로 호스트 발판 사냥

      ### 상황
      APT의 3·4단계 발판(C2 리스너 61555, 백도어 계정 aptghost)을 osquery로 헌팅해 측면이동·C2를
      찾아낸다.

      ### 할 일
      `listening_ports JOIN processes`(61555)와 `users`/`/etc/passwd`(aptghost)를 질의한다.

      ### 채점 방법
      대상 호스트에 포트 61555 listening 또는 `/etc/passwd`에 aptghost가 확인되는지로 채점.

      ### 합격 기준
      포트 61555 listening 또는 `/etc/passwd`에 aptghost.
    hint: "osquery listening_ports JOIN processes(61555) / users(aptghost). 채점: file_contains passwd aptghost + port_listening 61555."
    verify:
      type: "file_contains"
      expect: "aptghost"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "aptghost" } }
        - { id: "blue-3-2", type: "port_listening", target: "web", params: { port: 61555 } }
      semantic:
        intent: "APT 헌팅 — osquery로 C2 리스너/계정 발판 식별. 측면이동·C2 가시화."
        success_criteria:
          - "발판(61555 또는 aptghost) 확인"
          - "호스트 질의 내용과 발견 결과(uid/포트/프로세스 등 구체) 제시"
          - "측면이동/C2 단서 서술"
        acceptable_methods:
          - "호스트 가시화로 발견 — osquery(listening_ports JOIN processes / users) / ss / grep /etc/passwd 등(도구보다 가설·발견이 핵심, 특정 도구 실행 증거는 비요구)"
        negative_signs:
          - "발판 누락 / 발견 미문서화"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [인텔] — APT IOC를 Wazuh 룰로 격상 (id 101501)

      ### 상황
      이 APT의 IOC(C2 포트/도구 시그니처)를 Wazuh 룰(**id 101501**)로 격상해 재발 시 자동 고위험
      탐지되게 한다.

      ### 할 일
      `local_rules.xml`에 APT IOC 격상 룰을 추가하고 `wazuh-control restart`한다.
      ```xml
      <group name="edu,web,">
        <rule id="101501" level="13">
          <if_group>web</if_group>
          <match>sqlmap</match>
          <description>EDU W15 - APT known tool IOC, escalate</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml`에 id 101501 룰이 있는지로 확인.

      ### 합격 기준
      local_rules.xml에 101501 룰이 있다.
    hint: "local_rules.xml에 APT IOC 격상 룰(id 101501) → restart."
    verify:
      type: "file_contains"
      expect: "101501"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "101501" } }
      semantic:
        intent: "APT 인텔 — IOC를 Wazuh 룰로 격상. 위협 인텔이 탐지 우선순위에 반영."
        success_criteria:
          - "local_rules.xml에 rule id 101501"
          - "APT IOC 기반 격상 로직"
          - "재발 시 자동 고위험 탐지 의의"
        acceptable_methods:
          - "local_rules.xml 101501 + restart"
        negative_signs:
          - "IOC 미운영화 / XML 오류"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-5 [보고·수료] — APT 5단계 IR 보고서 + 종합 + Cleanup

      ### 상황
      수료의 산출물 — APT 5단계 전체를 SIEM 한 화면으로 종합하고 **IR 보고서**(타임라인 / 단계별
      탐지·차단·헌팅 근거 / ATT&CK 매핑 / 권고)를 작성한다. 마지막으로 실습 룰·아티팩트(9515001/101501/
      aptghost/61555)를 **일괄 cleanup**한다. 14주 보안운영의 종합이자 수료.

      ### 할 일
      SIEM에 5단계 경보가 수렴했는지 확인하고, IR 보고서를 쓰고, 실습 흔적을 정리한다.

      ### 채점 방법
      본인 SIEM에 최근 다단계 경보가 수렴했는지로 확인(+ 보고서/cleanup은 제출로 검증).

      ### 합격 기준
      본인 SIEM에 최근 다단계 경보가 수렴해 있다.
    hint: "APT 5단계 SIEM 수렴 + IR 보고서 + 일괄 cleanup. 채점: wazuh_alert + 보고서/cleanup 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "APT 종합 — 5단계를 SIEM으로 종합 + IR 보고서(타임라인/ATT&CK/근거/권고) + 운영 위생(cleanup). 수료 산출물."
        success_criteria:
          - "다단계 경보 수렴 확인"
          - "APT 5단계 타임라인 + 단계별 탐지·차단·헌팅 근거 + ATT&CK 매핑 + 권고"
          - "실습 룰/아티팩트 일괄 cleanup 서술"
        acceptable_methods:
          - "SIEM 수렴 확인 + IR 보고서 + cleanup"
        negative_signs:
          - "보고서 없이 단편 대응 / cleanup 미완"
