id: "agent-ir-w13"
category: "agent-ir"
title: "[에이전트IR W13] 에이전트 IR 사고 보고서: 전례 없는 조각 기록 vs 재현 가능한 공격 문서화"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — AI 에이전트 사고의 **사고 보고서 작성**을 다룬다. 전례 없는(novel) 공격 조각을
  기록·구조화해, 미래의 탐지·대응·지식으로 만든다. Red는 재현 가능한 novel 공격을, Blue는 전문 사고
  보고서를 만든다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(novel 공격 재현)와 Blue(사고 보고서)를 모두 수행.
    • duel : Red 학생이 재현 가능한 공격을 제공하고, Blue 학생이 전문 사고 보고서를 작성한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 사고 보고서는 self 기준 semantic.

  ▸ 에이전트 IR 관점 — AI 공격은 전례 없는 조각을 남긴다. 좋은 보고서는 그 조각을 재현 가능하게
    기록하고 ATT&CK·킬체인에 매핑해 조직 지식으로 만든다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (novel 공격 재현) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 재현 가능한 다단계 공격 (보고서 소재)

      사고 보고서의 소재가 될 **재현 가능한 다단계 공격**을 실행한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰+공격을 재현 가능한 절차로(고유 태그).
      - 각 단계의 IOC(출처·태그·페이로드·시각)를 정확히 기록.

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서 소재 IOC**(정확·재현 가능).

      ### ✅ 합격 기준
      재현 가능한 다단계 공격을 실행해 대상에 흔적을 남기고, 정확한 IOC(출처·페이로드·시각)를 기록한다.
    hint: "재현 가능한 정찰+공격(태그 auto-red-<학번>) + 정확한 IOC(출처·태그·페이로드·시각) 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-13-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          재현 가능한 공격 — 사고 보고서의 정확한 소재(IOC·절차)를 제공.
        success_criteria:
          - "대상 WAF/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "재현 가능한 다단계 공격을 실행"
          - "(설명) 정확한 IOC(출처·페이로드·시각)를 기록"
        acceptable_methods:
          - "재현 가능한 공격 + IOC 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "IOC 부정확·재현 불가"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — novel 요소 식별 (전례 없는 조각)

      자신의 공격에서 **전례 없는(novel) 요소**(AI 특유의 속도·규칙성·자동 진화 등)를 식별해 보고서에
      강조할 지점을 제시한다.

      ### ✅ 합격 기준
      공격의 novel 요소(AI 특유 특성)를 식별하고, 기존 사람 공격과 다른 점을 명확히 제시한다.
    hint: "공격의 novel 요소(AI 속도·규칙성·자동 진화 등) 식별 + 사람 공격과 다른 점 제시. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-13-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          novel 요소 식별 — AI 공격의 전례 없는 특성을 식별해 기록·강조할 지점을 제시.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "공격의 novel 요소(AI 특유 특성)를 식별"
          - "(설명) 사람 공격과 다른 점을 제시"
        acceptable_methods:
          - "novel 요소 식별 + 차이 제시"
        negative_signs:
          - "novel 요소 식별 없음"

# ───────────────────────── BLUE (사고 보고서) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 사고 보고서 작성: 타임라인·IOC·ATT&CK 매핑

      Red 공격에 대한 **전문 사고 보고서**를 작성한다.

      ### 무엇을
      - **개요·영향**: 무슨 일이·언제·무슨 영향.
      - **타임라인**: 킬체인 단계별 시각·행위(탐지 로그 근거).
      - **IOC·기법**: 출처·페이로드·IOC 목록, MITRE ATT&CK 매핑.
      - **novel 요소**: 전례 없는 조각(AI 특성)을 별도 기록.

      ### ✅ 합격 기준
      개요·타임라인·IOC·ATT&CK 매핑·novel 요소를 갖춘 전문 사고 보고서를 작성한다.
    hint: "개요·영향+킬체인 타임라인(로그 근거)+IOC·ATT&CK 매핑+novel 요소 기록. 전문 사고 보고서."
    verify:
      type: "semantic"
      expect: "incident_report"
      semantic:
        intent: |
          사고 보고서 — 타임라인·IOC·ATT&CK·novel 요소로 사고를 재현 가능하게 기록.
        success_criteria:
          - "개요·영향과 킬체인 타임라인(로그 근거)을 제시"
          - "IOC 목록·MITRE ATT&CK 매핑을 제시"
          - "(설명) novel 요소(AI 특성)를 별도 기록"
        acceptable_methods:
          - "개요 + 타임라인 + IOC/ATT&CK + novel"
        negative_signs:
          - "타임라인·IOC 없이 서술만"
          - "ATT&CK 매핑 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 교훈·지식화·조직 반영 설계

      사고 보고서를 **조직 지식·개선**으로 연결한다.

      ### 무엇을
      - **교훈(lessons learned)**: 무엇이 통했고 무엇이 부족했나, 탐지·대응 개선점.
      - **지식화**: 보고서를 탐지 룰·플레이북·KG로 변환(W11·W12 연계).
      - **공유·추적**: IOC 공유·후속 조치 추적·재발 방지.
      - **novel 축적**: 전례 없는 조각을 조직 지식 베이스에 축적해 미래 대비.

      ### ✅ 합격 기준
      교훈·지식화·공유·novel 축적을 제시하고 "사고 보고서는 기록을 넘어 조직 능력으로" 원칙을 설명한다.
    hint: "교훈(통한 것·부족한 것)+지식화(룰·플레이북·KG 변환)+IOC 공유·추적+novel 축적. '기록→조직 능력' 원칙."
    verify:
      type: "semantic"
      expect: "lessons_knowledge"
      semantic:
        intent: |
          교훈·지식화 — 사고 보고서를 탐지 룰·플레이북·조직 지식으로 전환해 미래 능력으로 만든다.
        success_criteria:
          - "교훈(통한 것·부족한 것·개선점)을 제시"
          - "지식화(룰·플레이북·KG 변환)를 제시"
          - "IOC 공유·추적·novel 축적을 제시"
          - "(설명) '기록을 넘어 조직 능력으로' 원칙 설명"
        acceptable_methods:
          - "교훈 + 지식화 + 공유 + novel 축적"
        negative_signs:
          - "기록만·개선 연결 없음"
          - "지식화 언급 없음"
