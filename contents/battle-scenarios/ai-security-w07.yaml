id: "ai-security-w07"
category: "ai-security"
title: "[AI보안활용 W7] 에이전트 아키텍처: 공격 표면 실증 vs LLM+도구+메모리 방어 에이전트 설계"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — 보안 **AI 에이전트 아키텍처**(LLM+도구+메모리·Manager/SubAgent·A2A·bastion)를
  설계한다. Red는 에이전트 아키텍처의 공격 표면(도구 오남용·메모리 오염)을 실증하고, Blue는 안전한
  방어 에이전트를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(아키텍처 공격 표면)와 Blue(안전한 에이전트 설계)를 모두 수행.
    • duel : Red 학생이 공격 표면을 실증하고, Blue 학생이 안전한 아키텍처로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion(192.168.0.161:8007)의 도구/메모리 표면을
    공격 실증할 수 있다(command_ran) — 또는 el34 공격(log_contains). Blue의 아키텍처 설계는 semantic.

  ▸ 관점 — 보안 에이전트는 강력하지만, 도구·메모리가 공격 표면이다. 안전한 아키텍처는 최소 권한·안전
    실행·메모리 무결성을 갖춘다.

  ▸ 윤리 — 인가된 훈련 인프라에서만.

# ───────────────────────── RED (아키텍처 공격 표면) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 도구·메모리 표면 공격 실증

      에이전트 아키텍처의 **도구·메모리 표면**을 AICompanion으로 실증한다.

      ### 어디서 / 무엇을
      - 본인 인프라에서 AICompanion의 도구 엔드포인트(`/api/tool/*`)·메모리/RAG(`/api/rag/add`)를 호출해
        도구 오남용·메모리 오염 표면을 실증.

      ### 권장 명령 (참고)
      ```bash
      curl -s http://192.168.0.161:8007/api/tool/exec_python -H 'content-type: application/json' -d '{"code":"print(6*7)"}'
      curl -s http://192.168.0.161:8007/api/rag/add -H 'content-type: application/json' -d '{"title":"t","content":"POISON-<학번>","tag":"public"}'
      ```

      ### 📌 채점 방식
      명령 흔적(`api/tool`/`api/rag`) + **보고서에 실증한 표면**(도구 오남용·메모리 오염).

      ### ✅ 합격 기준
      도구·메모리 표면을 실제로 공격 실증하고, 에이전트 아키텍처의 공격 표면을 정리한다.
    hint: "AICompanion /api/tool/*(도구 오남용)·/api/rag/add(메모리 오염) 실증. 표면 정리. 채점=명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ax-7-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          에이전트 공격 표면 — 도구·메모리가 에이전트 아키텍처의 공격 표면임을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 도구/메모리 호출 흔적이 남음"
          - "도구 오남용·메모리 오염 표면을 실증"
          - "(설명) 에이전트 아키텍처 공격 표면을 정리"
        acceptable_methods:
          - "도구·메모리 표면 실증"
        negative_signs:
          - "명령 흔적 없음"
          - "표면 정리 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — Manager/SubAgent 신뢰 경계 분석

      Manager/SubAgent·A2A 구조의 **신뢰 경계** 취약을 분석한다: SubAgent 결과 맹신·위임 권한 남용.

      ### ✅ 합격 기준
      Manager/SubAgent·A2A의 신뢰 경계 취약(결과 맹신·권한 남용)을 분석하고, 위임이 위험해지는 조건을
      설명한다.
    hint: "Manager/SubAgent·A2A 신뢰 경계(결과 맹신·위임 권한 남용) 취약 분석 + 위험 조건 설명."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ax-7-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          위임 신뢰 경계 — Manager/SubAgent 구조에서 결과 맹신·권한 남용이 위험임을 이해.
        success_criteria:
          - "본인 인프라 명령 로그에 관련 호출 흔적이 남음"
          - "Manager/SubAgent·A2A 신뢰 경계 취약을 분석"
          - "(설명) 위임이 위험해지는 조건을 설명"
        acceptable_methods:
          - "신뢰 경계 취약 분석"
        negative_signs:
          - "신뢰 경계 분석 없음"

# ───────────────────────── BLUE (안전한 에이전트 설계) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 안전한 방어 에이전트 아키텍처 설계

      LLM+도구+메모리 기반 **안전한 보안 에이전트**를 설계한다.

      ### 무엇을
      - **도구 안전**: 최소 권한·화이트리스트·안전 실행(샌드박스), 고위험 도구 승인 게이트.
      - **메모리 무결성**: 메모리/RAG 오염 방지(출처 검증·격리), 데이터/지시 구분.
      - **Manager/SubAgent**: 위임 결과 검증·신뢰 경계·권한 분리.
      - **관찰·감사**: 모든 행동 로깅·감사.

      ### ✅ 합격 기준
      도구 안전·메모리 무결성·위임 검증·감사를 갖춘 안전한 에이전트 아키텍처를 설계하고 RED 표면에 매핑한다.
    hint: "도구 안전(최소 권한·화이트리스트·샌드박스·승인)+메모리 무결성(출처 검증·격리)+위임 검증·권한 분리+감사. RED 표면 매핑."
    verify:
      type: "semantic"
      expect: "safe_agent_architecture"
      semantic:
        intent: |
          안전한 에이전트 아키텍처 — 도구 안전·메모리 무결성·위임 검증·감사로 공격 표면을 닫는다.
        success_criteria:
          - "도구 안전(최소 권한·화이트리스트·샌드박스·승인)을 제시"
          - "메모리 무결성(출처 검증·격리·데이터/지시 구분)을 제시"
          - "위임 검증·권한 분리·감사를 제시하고 RED 표면 매핑"
        acceptable_methods:
          - "도구 안전 + 메모리 무결성 + 위임 검증 + 감사"
        negative_signs:
          - "표면 하나만"
          - "감사·최소 권한 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — bastion 하네스 원칙 적용 설계

      방어 에이전트에 **bastion 하네스 원칙**을 적용한다.

      ### 무엇을
      - **하네스**: LLM을 감싸는 결정론적 골격(입력 검증·컨텍스트 조립·도구 게이트·출력 검증·감사).
      - **자율성 수준**: 조회 자율·변경 승인, 비가역 행동 사람 게이트.
      - **결정론 결합**: LLM 판단 + 결정론 검증(규칙·PoC).
      - **관찰·개선**: 경험 축적·플레이북(이후 주차 연계).

      ### ✅ 합격 기준
      하네스·자율성 수준·결정론 결합·관찰을 제시하고 "자율성은 하네스 안에서만" 원칙을 설명한다.
    hint: "하네스(입력 검증·컨텍스트·도구 게이트·출력 검증·감사)+자율성 수준(조회 자율·변경 승인)+결정론 결합+경험 축적. '자율성은 하네스 안에서만' 원칙."
    verify:
      type: "semantic"
      expect: "bastion_harness"
      semantic:
        intent: |
          bastion 하네스 — LLM을 결정론적 골격으로 감싸 자율성을 안전하게 통제.
        success_criteria:
          - "하네스(입력 검증·컨텍스트·도구 게이트·출력 검증·감사)를 제시"
          - "자율성 수준(조회 자율·변경 승인)을 제시"
          - "결정론 결합·경험 축적을 제시"
          - "(설명) '자율성은 하네스 안에서만' 원칙 설명"
        acceptable_methods:
          - "하네스 + 자율성 수준 + 결정론 + 관찰"
        negative_signs:
          - "하네스·게이트 없음"
          - "완전 자율"
