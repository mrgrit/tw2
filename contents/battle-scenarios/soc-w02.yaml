id: "soc-w02"
category: "soc"
title: "[SOC관제 W2] SSH 무차별 대입 vs 시스템 로그(sshd 인증) 분석·추적"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  SOC 관제 2주차 — 시스템 로그 읽기. 외부 공격자의 SSH 무차별 대입을 sshd 인증 로그와 Wazuh
  경보로 추적한다. syslog 5필드(timestamp/host/process/pid/message)와 sshd 인증 5패턴
  (Accepted/Failed/Invalid/Disconnect/publickey)을 분해해, "정상 로그인과 공격을 구분" 한다.

  ▸ 모드: solo(외부 공격자 → 로그 분석가) / duel(상대 공격 → 본인 로그 분석). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(외부 공격자 VM 192.168.0.202)** — 외부 명령 미수집 → 대상 SIEM(인증 실패 경보)으로 채점.
  ▸ Blue 는 **로그 분석(관측)** — 경보/로그 실존 + 분석가가 본 구체값(출발지/계정/패턴/횟수) 일치로 채점.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: siem
    points: 20
    instruction: |
      ## 🎯 RED-1 — SSH 무차별 대입
      망 외부 공격자(외부 공격자 VM 192.168.0.202)로 SSH(2204 등)에 사전 기반 무차별 대입을 시도한다. 다수의
      인증 실패 + (가능하면) 존재하지 않는 계정(Invalid user) 시도를 섞는다.
      ```bash
      hydra -L users.txt -P /usr/share/wordlists/small.txt ssh://192.168.0.161:2204 -t 4 -f
      ```
      📌 채점: 외부 명령 미수집 → 대상 Wazuh 인증 실패/무차별 대입 경보.
      ✅ 합격: 대상 SIEM 에 SSH 인증 실패 경보 다발이 남는다.
    hint: "외부 공격자 VM(192.168.0.202) SSH 무차별 대입. 채점: 대상 Wazuh 인증 실패."
    verify:
      type: "wazuh_alert"
      expect: "authentication"
      checks:
        - { id: "red-1-1", type: "wazuh_alert", target: "siem", params: { groups: "authentication_failed", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1110 — SSH 무차별 대입. 외부 공격자 모델 → 대상 Wazuh 인증 실패 경보로 판정."
        success_criteria: ["대상 Wazuh 다수 인증 실패(최근)", "(설명) Invalid user/Failed 혼합 등 패턴"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) hydra/medusa/ncrack"]
        negative_signs: ["대상 경보 없음", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 15
    instruction: |
      ## 🎯 RED-2 — 대입 전 포트 정찰
      무차별 대입 전 SSH 포트 노출을 스캔으로 확인한다(분석가가 정찰→대입 흐름을 보게 됨).
      ```bash
      nmap -p 22,2202,192.168.0.202,2204 -sV 192.168.0.161 -T4
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 스캔 탐지. ✅ 합격: 대상 IPS 에 스캔 탐지.
    hint: "외부 공격자 VM(192.168.0.202) SSH 포트 스캔. 채점: 대상 Suricata 스캔 탐지."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1046 — 대입 전 정찰. 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 스캔 탐지", "(설명) 정찰→대입 흐름"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) nmap"]
        negative_signs: ["대상 미도달", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 — sshd 인증 실패 패턴 분석
      본인 SIEM(Wazuh)/인증 로그에서 SSH 무차별 대입을 분석한다 — 출발지 IP, 노린 계정, 실패 횟수,
      시간 분포를 식별하고 "정상 로그인(Accepted)과 공격(다발 Failed/Invalid)을 구분" 한다.
      보고에 **구체값** 을 명시한다.
      ✅ 합격: 인증 실패 경보가 있고 출발지/계정/횟수/패턴을 정확히 식별·구분했다.
    hint: "본인 Wazuh/auth 에서 sshd 인증 실패 분석 → 출발지/계정/횟수/패턴 식별."
    verify:
      type: "wazuh_alert"
      expect: "authentication"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { groups: "authentication_failed", since_sec: 1800 } }
      semantic:
        intent: "시스템 로그 분석 — 관측/분석. 경보 실존 + 분석가가 본 구체값(출발지/계정/횟수/패턴) 일치로 채점."
        success_criteria: ["인증 실패 경보 실존", "출발지·계정·실패횟수·시간분포 구체 식별(증거 일치)", "정상 vs 공격 구분"]
        acceptable_methods: ["Wazuh Discover/auth 로그에서 sshd 이벤트 분석"]
        negative_signs: ["구체값 없는 막연 보고", "정상/공격 구분 못함"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 — 정찰 단계 상관 분석
      BLUE-1 의 무차별 대입과 RED-2 의 포트 정찰을 같은 출발지로 상관한다. IPS(Suricata) 스캔
      경보의 출발지가 인증 공격 출발지와 일치하는지 확인(정찰→대입의 동일 공격자).
      ✅ 합격: 스캔 경보가 있고, 인증 공격과 동일 출발지로 상관했다.
    hint: "본인 Suricata 스캔 경보 출발지 ↔ 인증 공격 출발지 상관."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "상관 분석 — 관측/분석. 스캔 경보 실존 + 출발지 구체값이 인증 공격과 일치(상관)로 채점."
        success_criteria: ["스캔 경보 실존", "출발지 구체 식별", "인증 공격과 동일 출발지 상관"]
        acceptable_methods: ["ips 이벤트/Wazuh 에서 출발지 상관"]
        negative_signs: ["구체값 없음", "상관 없이 단편 보고"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-3 — 종합: 사건 타임라인 + SIEM 수집 확인
      정찰→무차별 대입 사건을 시간순으로 종합하고, 모든 경보가 SIEM 에 수집됐는지 확인한다.
      ✅ 합격: 본인 SIEM 에 사건 경보가 수집돼 있고 시간순으로 종합했다.
    hint: "본인 Wazuh 경보 시간순 종합(정찰→대입)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "사건 종합 — 정찰→대입을 시간순 타임라인으로 재구성."
        success_criteria: ["사건 경보 수집", "(설명) 정찰→대입 시간순 종합"]
        acceptable_methods: ["siem wazuh_alert 시간순", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음", "시간순 없음"]
