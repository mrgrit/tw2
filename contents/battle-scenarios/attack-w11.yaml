id: "attack-w11"
category: "attack"
title: "[공격기법 W11] Linux 권한 상승(SUID·sudo·cron) vs privesc 탐지·하드닝"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격기법 11주차 — **Linux 권한 상승(Privilege Escalation)**. 발판을 잡은 공격자는 SUID 바이너리,
  sudo 설정 오류, world-writable, cron, capabilities, 커널 취약점으로 일반 사용자→root 로 상승한다.
  방어자는 권한 상승 흔적(새 권한 계정·SUID 변경·비정상 sudo)을 탐지하고 하드닝한다.

  ▸ 모드: solo(공격자 권한상승 시뮬→탐지 1인) / duel(상대 호스트 권한상승→본인 탐지). 대상=solo 본인 / duel 상대.
  ▸ Red 는 발판 이후 **호스트 내부** 권한 상승 — 명령 로그 신뢰 제한 → 대상 호스트 아티팩트로 채점.
  ▸ privesc 결과 마커: root 권한 백도어 계정 **eduintruder**, root 셸 리스너 **포트 19999**. 탐지룰은
    Wazuh **local_rules.xml**(교육용 id **9411001**).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — 권한 상승 → root 백도어 계정

      SUID/sudo 오설정/cron 등으로 root 권한을 획득하고, 지속성을 위해 백도어 계정(**eduintruder**)을
      만든다(root 권한으로 useradd). privesc 성공의 증거다.

      ### 권장 명령 (참고 — 발판 이후)
      ```bash
      find / -perm -4000 2>/dev/null        # SUID 헌팅
      sudo -l                                # sudo 오설정 확인
      # root 획득 후:
      useradd -m -s /bin/bash eduintruder
      ```
      📌 채점: 대상 호스트의 /etc/passwd 에 권한 상승 산물(eduintruder)이 추가됐는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있다(privesc 성공).
    hint: "SUID/sudo 로 root → useradd eduintruder. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "red-1-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "MITRE T1548/T1068 — 권한 상승(SUID/sudo/cron/kernel). root 획득 후 백도어 계정 = privesc 성공 증거."
        success_criteria: ["/etc/passwd 에 eduintruder", "(경로) 어떤 privesc 벡터(SUID/sudo/cron)를 썼는지 서술"]
        acceptable_methods: ["SUID/sudo/cron/capabilities/kernel exploit → root → useradd"]
        negative_signs: ["권한 상승 미성공"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — root persistence (셸 리스너)

      root 권한으로 지속 접근 채널을 연다(root 셸 리스너 **포트 19999**, 또는 root cron/SUID 백도어).

      ### 권장 명령 (참고)
      ```bash
      nohup ncat -lk 19999 >/dev/null 2>&1 &    # root 셸 리스너
      ```
      📌 채점: 대상 호스트에 root persistence(포트 19999)가 생겼는지.
      ✅ 합격: 대상 호스트에서 포트 19999 가 listening 이다.
    hint: "root 셸 리스너 ncat 19999. 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "T1543/T1053 — root persistence(셸 리스너/cron/SUID 백도어). 권한 상승의 지속화."
        success_criteria: ["포트 19999 listening", "(설명) root persistence 기법 서술"]
        acceptable_methods: ["root 셸 리스너 / cron / SUID 백도어"]
        negative_signs: ["persistence 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 권한 상승 흔적 탐지

      권한 상승 흔적을 탐지한다: 새 권한 계정(eduintruder), 비정상 SUID 바이너리, world-writable,
      비정상 sudo 사용, root 프로세스. osquery `suid_bin`/`users` 로 헌팅한다.

      📌 채점: 대상 호스트에 권한 상승 산물(eduintruder)이 탐지되는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있고 탐지했다.
    hint: "osquery suid_bin/users 로 privesc 흔적 헌팅. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "privesc 탐지 — 새 권한 계정/비정상 SUID/world-writable/sudo 남용. osquery suid_bin/users 헌팅."
        success_criteria: ["권한 상승 산물 확인", "(헌팅) suid_bin/users/sudo 점검", "(식별) baseline 대비 새 SUID/계정"]
        acceptable_methods: ["osquery suid_bin/users + sudo 로그"]
        negative_signs: ["탐지 누락"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — privesc 탐지룰 작성 (id 9411001)

      권한 상승을 탐지하는 Wazuh 룰(**id 9411001**)을 `local_rules.xml` 에 작성한다(새 SUID 생성,
      root 계정 추가, 비정상 sudo). 즉시 경보로 잡는다.

      ### 권장 형태 (참고)
      ```xml
      <rule id="9411001" level="12">
        <if_sid>5902</if_sid>
        <match>eduintruder</match>
        <description>EDU W11 - privesc backdoor account</description>
      </rule>
      ```
      📌 채점: local_rules.xml 에 privesc 탐지룰(id 9411001)이 작성됐는지.
      ✅ 합격: local_rules.xml 에 9411001 룰이 있다.
    hint: "local_rules.xml 에 privesc(SUID/계정/sudo) 탐지룰(id 9411001) → restart."
    verify:
      type: "file_contains"
      expect: "9411001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "9411001" } }
      semantic:
        intent: "privesc 탐지룰 — 새 SUID 생성/root 계정 추가/비정상 sudo 를 Wazuh 룰로. 권한 변화 즉시 경보."
        success_criteria: ["local_rules.xml 에 rule id 9411001", "privesc 신호(SUID/계정/sudo) 탐지", "(설명) 어떤 이벤트에 매칭"]
        acceptable_methods: ["local_rules.xml 9411001 + restart"]
        negative_signs: ["XML 문법 오류", "정상 변경 과탐"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 하드닝 권고 (SUID 최소화·sudo 정책·커널)

      권한 상승 표면을 줄이는 하드닝을 권고한다: 불필요 SUID 제거, sudo 최소권한/NOPASSWD 제거,
      world-writable 정리, 커널/패키지 패치, capabilities 검토.

      📌 채점: web 서버(Apache)가 정상 가동 중인지(하드닝 후 보존).
      ✅ 합격: web 의 apache2 가 running 이다.
    hint: "SUID 최소화/sudo 정책/패치/capabilities 권고. 채점: process_running web apache2."
    verify:
      type: "process_running"
      expect: "apache"
      checks:
        - { id: "blue-3-1", type: "process_running", target: "web", params: { name: "apache2" } }
      semantic:
        intent: "하드닝 — SUID 최소화, sudo 최소권한, world-writable 정리, 패치, capabilities 검토. privesc 표면 축소."
        success_criteria: ["apache2 가동(보존) 확인", "(하드닝) SUID/sudo/패치/capabilities 권고", "(우선순위) 위험 큰 벡터부터"]
        acceptable_methods: ["하드닝 권고 + 서비스 보존"]
        negative_signs: ["과도한 제거로 서비스 손상", "우선순위 없음"]
