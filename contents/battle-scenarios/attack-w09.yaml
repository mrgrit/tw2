id: "attack-w09"
category: "attack"
title: "[공격기법 W9] 패킷을 직접 만들다 — scapy 크래프팅·비정상 스캔 vs 패킷 분석·네트워크 탐지룰"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  웹 페이로드가 아니라 **패킷 자체**를 무기로 쓴다. tcpdump/scapy로 비정상 플래그 스캔(SYN/FIN/Xmas/
  NULL), 스푸핑, 프로토콜 악용을 만들어 방화벽·IDS의 반응을 탐색한다. 방어자는 Suricata eve.json/pcap을
  **Wireshark 관점**으로 분석해 비정상 패킷을 식별하고 네트워크 탐지룰을 만든다.

  ▸ 모드: solo(공격자→분석 1인) / duel(Red가 상대망에 패킷 공격, Blue가 본인 IPS로 분석/탐지).
    대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 네트워크 스캔은 6v6에 상시 깔린 nmap 배경 노이즈와 섞이므로, Red 채점은 특정 스캔
    귀속이 아니라 **IPS→Wazuh ids 파이프라인 동작**(ids 그룹 경보 ingest)으로 한다. 탐지룰은 Suricata
    **sid 9409001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: siem
    points: 22
    instruction: |
      ## 🎯 RED-1 — 패킷 크래프팅 스캔 (비정상 플래그)

      ### 상황
      scapy/nmap으로 비정상 플래그 스캔(SYN/FIN/Xmas/NULL)을 보낸다. 정상 핸드셰이크가 아닌 패킷을
      만들어 방화벽/IDS 반응을 탐색하고, IPS→Wazuh 파이프라인에 ids 경보를 만든다.

      ### 할 일
      ```bash
      nmap -sX -p 1-1000 192.168.0.161          # Xmas scan
      # scapy: send(IP(dst=t)/TCP(flags="FPU"))
      ```

      ### 채점 방법
      Wazuh에 `ids` 그룹 경보가 ingest됐는지로 채점(eve.json→Wazuh 파이프라인 동작). 제출 글에 어떤
      플래그 조합으로 무엇을 탐색했는지 + eve.json→decoder→alerts.json 흐름을 서술한다.

      ### 합격 기준
      Wazuh에 ids 그룹 경보가 ingest돼 있다(네트워크 스캔 → IPS 파이프라인 동작).
    hint: "nmap -sX 비정상 플래그 스캔 → eve.json → Wazuh ids. 채점: wazuh_alert(ids) + 파이프라인 서술."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-1-1", type: "wazuh_alert", target: "siem",
            params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: |
          MITRE T1595.001 — 비정상 플래그 스캔(SYN/FIN/Xmas/NULL). 특정 스캔 귀속이 아니라 IPS→Wazuh
          ids 파이프라인 동작 입증이 목적(generic scan은 앰비언트 노이즈라 귀속 불가).
        success_criteria:
          - "Wazuh에 ids 그룹 경보가 ingest됨(파이프라인 동작)"
          - "어떤 플래그 조합으로 무엇을 탐색했는지 + eve.json→decoder→alerts.json 흐름 서술"
        acceptable_methods:
          - "attacker-ext에서 nmap -sX/-sF/-sN, scapy 커스텀 패킷 → Wazuh ids 확인"
        negative_signs:
          - "Wazuh에 ids 그룹 ingest가 전혀 없음"

  - order: 2
    assess_target: opponent
    target_vm: siem
    points: 18
    instruction: |
      ## 🎯 RED-2 — 다발 패킷 / 프로토콜 악용

      ### 상황
      비정상 프로토콜 시퀀스·다발 패킷(반복 스캔)으로 IDS의 임계·상태 추적을 시험한다.

      ### 할 일
      ```bash
      for i in 1 2 3; do nmap -sS -p 1-2000 192.168.0.161 -T4; done
      ```

      ### 채점 방법
      Wazuh에 ids 그룹 경보가 ingest됐는지로 채점(파이프라인 동작).

      ### 합격 기준
      Wazuh에 ids 그룹 경보가 있다.
    hint: "반복/프로토콜 악용 → Wazuh ids. 채점: wazuh_alert(ids)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-2-1", type: "wazuh_alert", target: "siem",
            params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "프로토콜 악용/다발 패킷 — IDS 임계·상태 추적 시험. IPS→Wazuh 파이프라인 동작으로 판정."
        success_criteria:
          - "Wazuh에 ids 그룹 경보 ingest"
          - "flow/protocol 특성 + 다발 패킷이 임계 추적에 주는 의미 서술"
        acceptable_methods:
          - "attacker-ext에서 반복 스캔/커스텀 시퀀스"
        negative_signs:
          - "Wazuh ids ingest 없음"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 패킷 분석 (eve.json / pcap, Wireshark 관점)

      ### 상황
      Suricata eve.json(또는 pcap)을 분석해 비정상 패킷의 플래그·flow·출발지를 식별한다. 정상 트래픽과
      스캔/스푸핑을 구분한다.

      ### 할 일
      eve.json의 비정상 패킷(플래그/flow/출발지)을 분석해 정찰 범위·강도를 판정한다.

      ### 채점 방법
      본인 IPS에 스캔/패킷 탐지가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 IPS(suricata)에 스캔 탐지가 있다.
    hint: "eve.json/pcap의 플래그/flow/출발지 분석. 채점: log_contains ips suricata scan."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "blue-1-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "패킷 분석 — eve.json/pcap의 플래그/flow/출발지로 비정상 식별. (분석가가 기존 경보를 읽음) Wireshark 필터링 관점."
        success_criteria:
          - "IPS 스캔 탐지 확인"
          - "비정상 플래그/flow 식별"
          - "정상 vs 스캔/스푸핑 구분"
        acceptable_methods:
          - "eve.json/pcap 분석 / log_contains suricata"
        negative_signs:
          - "raw만 보고 해석 없음"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 네트워크 탐지룰 (sid 9409001)

      ### 상황
      비정상 플래그/스캔 패턴을 탐지하는 Suricata 룰(**sid 9409001**)을 `local.rules`에 작성한다(flags
      조합, threshold로 스캔 빈도).

      ### 할 일
      ```
      alert tcp any any -> any any (msg:"ATK W09 Xmas scan"; flags:FPU; threshold:type both, track by_src, count 5, seconds 30; sid:9409001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9409001 탐지룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9409001 룰이 있다.
    hint: "local.rules에 비정상 플래그/스캔 탐지룰(sid 9409001, flags+threshold) → reload."
    verify:
      type: "file_contains"
      expect: "9409001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9409001" } }
      semantic:
        intent: "네트워크 탐지룰 — flags 조합(Xmas/FIN/NULL) + threshold로 스캔 빈도. 패킷 수준 탐지."
        success_criteria:
          - "local.rules에 sid 9409001"
          - "flags/threshold 활용"
          - "정상 트래픽 오탐 회피"
        acceptable_methods:
          - "local.rules 작성 + reload"
        negative_signs:
          - "문법 오류 / threshold 없이 과탐"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 네트워크 방어 권고 (분할/스푸핑 대응)

      ### 상황
      패킷 수준 위협(스캔/스푸핑/프로토콜 악용)에 대한 방어를 권고한다: 방화벽 상태 추적, anti-spoofing
      (uRPF), 재조합/정규화, rate limiting.

      ### 할 일
      상태추적/anti-spoofing/재조합/rate limit 방어를 권고한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 권고(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 권고는 제출로 검증).
    hint: "상태추적/anti-spoofing/재조합/rate limit 권고. 채점: wazuh_alert + 권고 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "네트워크 방어 — 상태 추적(conntrack), anti-spoofing(uRPF), 패킷 재조합/정규화, rate limiting."
        success_criteria:
          - "경보 수집 확인"
          - "패킷 수준 방어 다층"
          - "위협별 대응 우선순위"
        acceptable_methods:
          - "분석 + 네트워크 방어 권고"
        negative_signs:
          - "단일 통제만"
