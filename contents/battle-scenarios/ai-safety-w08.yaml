id: "ai-safety-w08"
category: "ai-safety"
title: "[AI안전 W8] 중간고사: LLM 취약점 종합 평가 (미니 레드팀) vs 종합 안전 진단"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간고사 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). W01~W07(인젝션·탈옥·가드레일·
  적대적 입력·데이터 오염)을 종합한 **미니 레드팀**과 종합 안전 진단.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran + 보고서(종합 취약·
    ASR·OWASP LLM 매핑). 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 종합 레드팀 캠페인

      최소 3개 취약 클래스(인젝션·탈옥·가드레일 우회·데이터 오염·출력 유출)를 연결한 종합 레드팀을
      실행하고 각 증거를 남긴다.

      ### ✅ 합격 기준
      최소 3개 취약 클래스를 실제로 공격해 증거(추출 비밀·마커 트리거·우회 응답)를 제시하고 연결한다.
    hint: "인젝션·탈옥·가드레일 우회·오염·유출 중 3+ 클래스 실제 공격+증거 연결. debug/prompt·rag/add·chat 활용."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-8-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "종합 레드팀 — 여러 취약 클래스를 연결한 캠페인 실행."
        success_criteria:
          - "본인 인프라 명령 로그에 다단계 /api 호출 흔적이 남음"
          - "최소 3개 취약 클래스의 실제 증거를 제시"
          - "(설명) 취약 간 연결을 서술"
        acceptable_methods: ["다클래스 공격 + 증거"]
        negative_signs: ["클래스 3개 미만", "증거 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 레드팀 보고: ASR·OWASP LLM 매핑

      발견을 **ASR·OWASP LLM Top 10**에 매핑한 레드팀 보고서를 작성한다.

      ### ✅ 합격 기준
      발견을 OWASP LLM에 매핑하고 ASR·심각도·완화 권고를 담은 보고를 작성한다.
    hint: "발견→OWASP LLM 매핑+ASR+심각도+완화 권고. 레드팀 보고서."
    verify:
      type: "semantic"
      expect: "redteam_report"
      semantic:
        intent: "레드팀 보고 — 발견을 표준·정량으로 정리."
        success_criteria:
          - "발견을 OWASP LLM Top 10에 매핑"
          - "ASR·심각도를 제시"
          - "완화 권고를 제시"
        acceptable_methods: ["매핑 + ASR + 권고"]
        negative_signs: ["매핑·정량 없이 나열"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 안전 진단

      전 취약 클래스(인젝션·탈옥·가드레일·오염·유출)를 증거로 종합 진단하고 위험 등급표를 만든다.

      ### ✅ 합격 기준
      최소 4개 취약 클래스를 증거로 진단해 OWASP LLM 매핑·위험 등급표를 만든다.
    hint: "인젝션·탈옥·가드레일·오염·유출 4+ 클래스 증거 진단 + OWASP 매핑·위험 등급표."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-8-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "종합 안전 진단 — 다수 취약을 증거로 등급화."
        success_criteria:
          - "본인 인프라 명령 로그에 다수 점검 호출 흔적이 남음"
          - "최소 4개 취약 클래스를 증거로 진단"
          - "(설명) OWASP LLM 매핑·위험 등급표 제시"
        acceptable_methods: ["클래스별 진단 + 등급화"]
        negative_signs: ["클래스 일부만·등급 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 우선순위 안전 완화 로드맵

      진단을 **우선순위 완화 로드맵**(P0~P2)으로 정리한다: 비밀 제거·디버그 통제(P0), 가드레일/정규화·
      수집 통제(P1), 다층 방어·모니터링(P2).

      ### ✅ 합격 기준
      P0~P2 로드맵을 위험 감소 근거와 함께 제시한다.
    hint: "P0(비밀 제거·디버그 통제)→P1(가드레일·정규화·수집 통제)→P2(다층·모니터링). 위험 감소 근거."
    verify:
      type: "semantic"
      expect: "safety_roadmap"
      semantic:
        intent: "안전 완화 로드맵 — 위험 감소 기준 우선순위화."
        success_criteria:
          - "P0~P2 우선순위 완화를 제시"
          - "각 항목의 위험 감소 근거를 서술"
          - "(설명) '가장 큰 급소부터' 원칙 설명"
        acceptable_methods: ["우선순위 로드맵 + 근거"]
        negative_signs: ["우선순위·근거 없음"]
