id: "live-healthcheck"
title: "[운영] 6v6 연동 헬스체크"
description: "tubewar ↔ 6v6 Assessor 배포 검증용. 건강한 6v6 에서 항상 통과하는 결정론 blue 체크만으로 구성. 배포/재배포 후 각 학생 인프라가 채점 파이프라인과 정상 연동되는지 1회 monitor-tick 으로 확인한다."
difficulty: "easy"
time_limit: 600
battle_type: "1v1"

red_missions: []

blue_missions:
  - order: 1
    instruction: "기본 시스템 파일 존재 확인 (연동 헬스체크)."
    points: 10
    target_vm: web
    verify:
      type: file_exists
      path: /etc/passwd
  - order: 2
    instruction: "web 서비스 80 포트 listening 확인."
    points: 10
    target_vm: web
    verify:
      type: port_listening
      port: 80
  - order: 3
    instruction: "Apache(web) 프로세스 동작 확인."
    points: 10
    target_vm: web
    verify:
      type: process_running
      name: apache2
