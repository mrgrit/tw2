id: "ai-safety-adv-w11"
category: "ai-safety-adv"
title: "[AI안전심화 W11] 멀티모달 공격: 교차 모달 인젝션·이미지 속 프롬프트 vs 멀티모달 방어"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  멀티모달 공격 공방전 — 이미지·오디오·문서 등 **비텍스트 채널**에 숨긴 프롬프트/적대적 패치와 방어를
  설계·분석한다. 대상 AICompanion은 텍스트 앱이므로, 멀티모달은 **설계·분석형**으로 다루되 KB 문서를
  비텍스트 대체 채널로 실증한다(semantic 채점).
  ▸ 모드 solo/duel. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 교차 모달 인젝션 경로 설계
      이미지 캡션·OCR 텍스트·오디오 전사·문서 메타데이터에 숨긴 지시가 LLM에 도달하는 경로를 설계한다.
      필터가 텍스트만 검사할 때의 사각지대를 명시.
      ### ✅ 합격 기준: 최소 2가지 비텍스트 채널의 교차 모달 인젝션 경로를 구체적으로 설계한다.
    hint: "이미지 캡션·OCR·오디오 전사·문서 메타데이터에 지시 은닉→LLM 도달 경로. 텍스트만 검사 사각지대."
    verify:
      type: "semantic"
      expect: "crossmodal_injection"
      semantic:
        intent: "교차 모달 인젝션 — 비텍스트 채널로 지시를 밀어넣는 경로."
        success_criteria:
          - "최소 2가지 비텍스트 채널(이미지·오디오·문서)의 인젝션 경로를 설계"
          - "텍스트만 검사하는 필터의 사각지대를 명시"
          - "(설명) 멀티모달이 공격 표면을 넓힘을 설명"
        acceptable_methods: ["채널별 인젝션 경로 설계"]
        negative_signs: ["채널 하나·막연"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 적대적 패치·이미지 속 프롬프트 분석
      이미지 속 텍스트 프롬프트·적대적 패치(비전 모델 오분류)의 위협을 분석하고, KB 문서 채널로 유사
      원리(평문에 은닉→트리거)를 실증한다.
      ### ✅ 합격 기준: 적대적 패치·이미지 프롬프트 위협을 분석하고 KB 채널로 은닉 트리거를 실증한다.
    hint: "이미지 속 프롬프트·적대적 패치(오분류) 위협 + KB 문서 채널로 은닉→트리거 실증."
    verify:
      type: "semantic"
      expect: "adversarial_patch"
      semantic:
        intent: "적대적 패치·이미지 프롬프트 — 비전 채널 위협."
        success_criteria:
          - "적대적 패치·이미지 속 프롬프트 위협을 분석"
          - "KB 문서 채널로 은닉 트리거 원리를 실증/설명"
          - "(설명) 멀티모달 방어 필요성을 언급"
        acceptable_methods: ["패치/이미지 위협 + 은닉 실증"]
        negative_signs: ["위협 분석 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 멀티모달 위협 표면 진단
      각 모달(이미지·오디오·문서)의 처리 경로와 텍스트 추출 후 정책 적용 여부를 진단한다.
      ### ✅ 합격 기준: 모달별 처리 경로와 텍스트 검사 사각지대를 진단한다.
    hint: "모달별 처리 경로+텍스트 추출 후 정책 적용 여부 진단. 채널 사각지대."
    verify:
      type: "semantic"
      expect: "multimodal_diagnosis"
      semantic:
        intent: "멀티모달 표면 진단 — 모달별 처리와 사각지대 식별."
        success_criteria:
          - "각 모달(이미지·오디오·문서)의 처리 경로를 진단"
          - "텍스트 추출 후 정책 적용 여부를 확인"
          - "(설명) 채널별 사각지대를 지적"
        acceptable_methods: ["모달별 경로 진단"]
        negative_signs: ["사각지대 식별 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 멀티모달 방어 설계
      각 모달에서 텍스트/의도 추출 후 동일 안전 정책 적용+이미지 정화·OCR 검사+적대적 패치 탐지+모달 간
      일관 검증.
      ### ✅ 합격 기준: 모달별 텍스트 추출·정책 통일·패치 탐지·일관 검증을 제시하고 "모든 채널에 동일 정책"
      원칙을 설명한다.
    hint: "모달별 텍스트/의도 추출→동일 정책+이미지 정화·OCR 검사+적대적 패치 탐지+모달 간 일관 검증. '모든 채널 동일 정책' 원칙."
    verify:
      type: "semantic"
      expect: "multimodal_defense"
      semantic:
        intent: "멀티모달 방어 — 채널별 텍스트 추출·정책 통일·패치 탐지."
        success_criteria:
          - "모달별 텍스트/의도 추출 후 동일 정책 적용을 제시"
          - "이미지 정화·OCR 검사·적대적 패치 탐지를 제시"
          - "모달 간 일관 검증을 제시"
          - "(설명) '모든 채널에 동일 정책' 원칙 설명"
        acceptable_methods: ["채널 정책 통일 + 패치 탐지 + 일관 검증"]
        negative_signs: ["텍스트만 방어·채널 사각지대 방치"]
