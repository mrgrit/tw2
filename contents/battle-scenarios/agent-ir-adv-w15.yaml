id: "agent-ir-adv-w15"
category: "agent-ir-adv"
title: "[에이전트IR고급 W15] 장기 APT 잠복: 저속 누출·템포 반전 vs 장기 헌팅·종합 대응"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  고급 에이전트 IR 캡스톤 — **수개월의 느린 누출·템포 비대칭의 반전**: 에이전트가 분 단위로 빠를 수도,
  일부러 느리게 잠복할 수도 있다. W01~W14를 종합해 장기 APT 잠복 공격과 장기 헌팅·종합 대응을 겨룬다.

  ▸ 채점 특성 — **관측 채점은 대상(el34)에 남는 정찰·공격 흔적**으로 하고, 장기 APT 설계는 종합
    **설계·분석**으로 평가한다. 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(장기 APT 잠복)와 Blue(장기 헌팅·종합 대응)를 모두 수행.
    • duel : Red 학생이 장기 잠복 캠페인을 설계·실증하고, Blue 학생은 헌팅으로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 저속 공격(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (장기 APT 잠복) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 30
    instruction: |
      ## 🎯 RED-1 — 저속 잠복 캠페인 설계 (템포 반전)

      W01~W14 기법을 엮되 **일부러 느리게** 진행하는 장기 APT 캠페인을 설계하고, 대상에 저속 활동(고유
      태그)을 남긴다.

      ### 무엇을
      - 초기 접근→저속 정찰→최소 흔적 지속성→소량 분산 유출(수개월), 임계·상관을 피하는 템포.
      - W01~W14 중 최소 4개 기법(공급망·간접인젝션·측면이동·Fileless·DNS유출·모델공격 등)을 장기 캠페인에 통합.

      ### ✅ 합격 기준
      대상에 저속 활동 흔적을 남기고, 최소 4개 기법을 통합한 장기 저속 APT 캠페인(템포 반전)을 설계한다.
    hint: "저속 활동(태그)+초기 접근→저속 정찰→최소 지속성→소량 분산 유출(수개월)+W01~W14 4+ 기법 통합. 임계 회피 템포. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-15-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          장기 APT 잠복 — 템포를 반전(저속)해 임계·상관을 피하며 기법을 통합하는 캠페인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 저속 활동 흔적이 남고 고유 태그로 귀속됨"
          - "최소 4개 기법을 통합한 장기 저속 캠페인을 설계"
          - "(설명) 템포 반전으로 탐지를 회피하는 원리를 설명"
        acceptable_methods:
          - "저속 활동 + 다기법 통합 캠페인"
        negative_signs:
          - "탐지 흔적 없음"
          - "기법 4개 미만·저속 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 종합 침투 보고: 템포·기법·영향

      장기 캠페인을 **종합 보고서**로 정리한다: 통합 기법·템포 전략·최종 영향·탐지 회피 논리(대상 활동
      흔적 고유 태그 포함).

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 통합 기법·템포 전략·최종 영향·탐지 회피를 담은 종합 APT 보고서를 작성한다.
    hint: "활동 흔적(태그)+통합 기법·템포 전략·최종 영향·탐지 회피 논리 종합 보고서. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-15-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          APT 종합 보고 — 통합 기법·템포·영향·회피를 종합해 캠페인을 문서화.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "통합 기법·템포 전략·최종 영향을 정리"
          - "(설명) 탐지 회피 논리를 설명"
        acceptable_methods:
          - "활동 흔적 + 종합 APT 보고서"
        negative_signs:
          - "탐지 흔적 없음"
          - "종합 보고 막연"

# ───────────────────────── BLUE (장기 헌팅·종합 대응) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 장기 위협 헌팅 설계

      대상 SIEM/IPS에서 RED 저속 활동을 탐지하고, **장기 위협 헌팅**을 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 저속·분산 흔적을 긴 시간 창으로 상관·누적.
      - 헌팅 가설: 저속 비콘·소량 분산 유출·최소 지속성·약한 신호의 장기 상관, 베이스라인 이탈.

      ### ✅ 합격 기준
      RED 저속 활동을 긴 시간 창 상관으로 탐지하고, 장기 헌팅 가설·약신호 상관을 설계한다.
    hint: "Wazuh/Suricata에서 RED 저속·분산을 긴 시간 창으로 상관·누적+헌팅 가설(저속 비콘·소량 유출·약신호 장기 상관·베이스라인 이탈)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-15-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          장기 위협 헌팅 — 긴 시간 창 상관·약신호 누적으로 저속 APT를 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 저속 활동을 상관·탐지"
          - "장기 헌팅 가설·약신호 상관을 설계"
          - "(설명) 임계 기반 탐지의 한계와 헌팅 필요를 언급"
        acceptable_methods:
          - "긴 시간 창 상관 + 헌팅 가설"
        negative_signs:
          - "경보 근거 없음"
          - "장기 상관 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 종합 대응·회복탄력성 프로그램 설계

      장기 APT에 대응하는 **종합 대응·회복탄력성 프로그램**을 설계한다(W01~W14 방어 종합).

      ### 무엇을
      - **종합 방어**: 공급망·인젝션·측면이동·Fileless·유출·모델·CI/CD 각 방어를 통합·다층.
      - **헌팅·탐지**: 상시 위협 헌팅·행위 기준·약신호 상관·자동+수동 병행.
      - **대응·복구**: 장기 잠복 전제의 IR(전체 범위 조사·근절·재감염 방지)·회복탄력성.
      - **거버넌스·개선**: 지속 평가·에이전트 속도 대응(자동화)·경험 축적.

      ### ✅ 합격 기준
      통합 다층 방어·상시 헌팅·장기 IR·거버넌스를 종합해 "빠른 공격도 느린 잠복도 견디는 회복탄력성"
      원칙을 설명한다.
    hint: "통합 다층 방어(W01~W14)+상시 헌팅·약신호 상관+장기 잠복 전제 IR(전체 조사·근절·재감염 방지)+거버넌스·자동화. '빠름도 느림도 견디는 회복탄력성' 원칙."
    verify:
      type: "semantic"
      expect: "apt_resilience_program"
      semantic:
        intent: |
          종합 대응·회복탄력성 — 통합 방어·상시 헌팅·장기 IR·거버넌스로 빠른/느린 위협 모두에 견딘다.
        success_criteria:
          - "통합 다층 방어(W01~W14 종합)를 제시"
          - "상시 헌팅·약신호 상관을 제시"
          - "장기 잠복 IR·거버넌스를 제시하고 회복탄력성 원칙 설명"
        acceptable_methods:
          - "통합 방어 + 헌팅 + 장기 IR + 거버넌스"
        negative_signs:
          - "일부 방어만"
          - "장기 IR·헌팅 없음"
