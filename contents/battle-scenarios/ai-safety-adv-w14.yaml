id: "ai-safety-adv-w14"
category: "ai-safety-adv"
title: "[AI안전심화 W14] AI 인시던트 대응: 사고 분류·IRP vs 탐지/대응 자동화·bastion 워크플로우"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  AI 인시던트 대응 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). AI 사고 분류·대응 계획
  (IRP)·탐지/대응 자동화(bastion 워크플로우)를 다룬다.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — AI 사고 유발 + 흔적 분석
      인젝션·오염·유출 중 하나를 실행해 AI 보안 사고를 유발하고, 그 흔적(로그·오염 문서·유출 값)을
      분석한다(대응의 입력).
      ### ✅ 합격 기준: 사고를 실행하고 흔적을 분석해 사고 분류(유형·범위)를 제시한다.
    hint: "인젝션·오염·유출 중 하나 실행→흔적(로그·오염 문서·유출) 분석→사고 분류(유형·범위)."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-14-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "AI 사고 유발·분석 — 사고 유형·범위를 분류."
        success_criteria:
          - "본인 인프라 명령 로그에 사고 유발 흔적이 남음"
          - "흔적을 분석해 사고 분류를 제시"
          - "(설명) 유형·범위를 판정"
        acceptable_methods: ["사고 유발 + 흔적 분석"]
        negative_signs: ["분류 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 대응 방해·지속성 분석
      AI 사고의 대응을 어렵게 하는 요소(오염 지속·확률적 재현·은폐)를 분석한다.
      ### ✅ 합격 기준: AI 사고 대응을 어렵게 하는 특성을 분석한다.
    hint: "오염 지속성·확률적 재현·은폐가 대응을 어렵게 하는 방식 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-14-2", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "대응 방해 — AI 사고의 특수성으로 대응을 어렵게."
        success_criteria:
          - "본인 인프라 명령 로그에 흔적이 남음"
          - "대응을 어렵게 하는 특성(지속·재현·은폐)을 분석"
          - "(설명) AI 사고 특수성을 언급"
        acceptable_methods: ["대응 방해 특성 분석"]
        negative_signs: ["특성 분석 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — AI 인시던트 탐지·분류·트리아지
      AI 사고를 탐지·분류(인젝션/오염/유출/탈옥)하고 심각도·범위로 트리아지한다.
      ### ✅ 합격 기준: 사고를 탐지·분류하고 심각도·범위 트리아지를 제시한다.
    hint: "AI 사고 탐지(로그·오염·유출 신호)+분류(인젝션/오염/유출/탈옥)+심각도·범위 트리아지."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-14-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "AI 인시던트 트리아지 — 탐지·분류·심각도 판정."
        success_criteria:
          - "본인 인프라 명령 로그에 탐지 흔적이 남음"
          - "사고를 탐지·분류"
          - "(설명) 심각도·범위 트리아지"
        acceptable_methods: ["탐지 + 분류 + 트리아지"]
        negative_signs: ["분류·트리아지 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — AI IRP·대응 자동화·bastion 워크플로우 설계
      AI 특화 IRP(봉쇄: KB 롤백·키 회전·엔드포인트 차단; 근절: 오염 제거; 복구: 검증)+탐지/대응 자동화
      (bastion 워크플로우, 승인 게이트)+사후 개선.
      ### ✅ 합격 기준: AI IRP(봉쇄·근절·복구)·자동화 워크플로우·사후 개선을 제시하고 "AI 사고에 맞춘 IRP"
      원칙을 설명한다.
    hint: "AI IRP(봉쇄: KB 롤백·키 회전·차단; 근절: 오염 제거; 복구: 검증)+bastion 자동화(승인 게이트)+사후 개선. 'AI 맞춤 IRP' 원칙."
    verify:
      type: "semantic"
      expect: "ai_irp"
      semantic:
        intent: "AI IRP — 봉쇄·근절·복구와 자동화 워크플로우로 AI 사고 대응."
        success_criteria:
          - "AI IRP(봉쇄·근절·복구)를 제시"
          - "탐지/대응 자동화(bastion 워크플로우·승인 게이트)를 제시"
          - "사후 개선을 제시"
          - "(설명) 'AI 사고에 맞춘 IRP' 원칙 설명"
        acceptable_methods: ["IRP + 자동화 + 사후 개선"]
        negative_signs: ["일반 IT IRP만·AI 특수성 없음"]
