id: "secuops-w14"
category: "secuops"
title: "[보안운영 W14] APT 유사 다단계 침투 vs 능동적 위협 헌팅(Hypothesis·Sighting·Report·TLP)"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  보안운영 14주차 — 인텔을 소비만 하지 않고 **능동적으로 헌팅** 한다. **Threat Hunting 5 단계**
  (Hypothesis → Collect → Query → Analyze → Document)로 가설을 세우고 실 데이터를 질의해 침해를
  찾는다. 발견은 **STIX Sighting/Report** 로 문서화하고, **MISP**(Event/Attribute/Object/Tag/Galaxy)와
  양방향 공유하며 **TLP** 4 등급으로 배포를 통제한다. 공격자가 APT 유사 다단계로 잠입하면, 헌터는
  가설 기반으로 흔적을 추적해 운영 룰로 굳힌다.

  ▸ 모드: solo(다단계 침투→위협 헌터) / duel(상대 침투→본인 헌팅). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** + 호스트 persistence. 외부 명령 미수집 → 대상 흔적으로 채점.
  ▸ OpenCTI/MISP 미설치 → Sighting/Report/공유는 STIX 객체 작성·설계로, **헌팅 운영화는 Wazuh
    custom 룰(sid 100300)**. 권장 침해 마커: 사용자 **eduintruder**, 리스너 **포트 19999**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 다단계 침투 (정찰 → 웹 침해)

      APT 유사 다단계 — 저소음 정찰(스캔) 후 웹 인젝션으로 발판을 만든다. 헌터의 "정찰 후 침해가
      이어졌다"는 가설의 표적이다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      nmap -sT -p 80,443,8080 <대상_공개IP>
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%201"
      ```
      📌 채점: 외부 명령 미수집 → 대상 IPS(정찰)/WAF(침해) 흔적.
      ✅ 합격: 대상 IPS 에 스캔 탐지(다단계의 1단계).
    hint: "attacker-ext 정찰→웹침해 다단계. 채점: 대상 Suricata scan."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "APT 유사 다단계 — 정찰 후 침해. 헌터의 가설(정찰→침해 연결) 표적. 외부 공격자 모델 → 대상 IPS/WAF 흔적으로 판정."
        success_criteria: ["대상 IPS 에 정찰 탐지", "(설명) 다단계의 각 단계와 헌팅 가설을 서술"]
        acceptable_methods: ["attacker-ext 정찰+웹침해 다단계"]
        negative_signs: ["대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — 호스트 persistence (헌팅 표적)

      침투 후 **백도어 계정(eduintruder)** + **리스너(포트 19999)** 로 지속성을 확보한다. 헌터가
      "발판 이후 persistence 가 생겼다"는 가설로 추적할 표적이다.

      ### 권장 명령 (참고)
      ```bash
      sudo useradd -m -s /bin/bash eduintruder
      nohup ncat -lk 19999 >/dev/null 2>&1 &
      ```
      📌 채점: 대상 호스트에 persistence(eduintruder 또는 포트 19999)가 생겼는지.
      ✅ 합격: /etc/passwd 에 eduintruder 또는 포트 19999 listening.
    hint: "useradd eduintruder + ncat 19999. 채점: file_contains passwd eduintruder + port_listening 19999."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
        - { id: "red-2-2", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "MITRE T1136/T1571 — 침투 후 persistence(계정/리스너). 헌터의 가설 추적 표적."
        success_criteria: ["eduintruder 계정 또는 포트 19999", "(설명) persistence 기법과 헌팅 단서 서술"]
        acceptable_methods: ["useradd / ncat 리스너 / authorized_keys"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — MISP 도입 기획 + OpenCTI 비교 + 5 핵심 객체

      MISP(Event/Attribute/Object/Tag/Galaxy) 5 핵심 객체의 관계·사용 시점을 학습하고 OpenCTI 와
      비교(강점/역할)한다. 두 플랫폼의 양방향 sync 와 circular loop 회피 3 방법을 설계한다.

      📌 채점: 인텔 운영 기반(manager)이 가동 중인지.
      ✅ 합격: siem 에 wazuh-analysisd 가 running 이다.
    hint: "MISP 5객체 + OpenCTI 비교 + circular loop 회피. 채점: process_running siem wazuh-analysisd."
    verify:
      type: "process_running"
      expect: "analysisd"
      checks:
        - { id: "blue-1-1", type: "process_running", target: "siem", params: { name: "wazuh-analysisd" } }
      semantic:
        intent: "MISP vs OpenCTI — Event/Attribute/Object/Tag/Galaxy 5객체. 양방향 sync + circular loop 회피(방향 태그/timestamp/UUID)."
        success_criteria: ["(학습) MISP 5객체 관계+사용 시점", "manager 가동", "(설계) OpenCTI↔MISP sync circular 회피 3방법"]
        acceptable_methods: ["MISP 5객체 + 비교 + sync 설계"]
        negative_signs: ["객체 관계 미이해", "circular loop 회피 누락"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Threat Hunting 5 단계 (Hypothesis → Query → 침해 발견)

      **가설** 을 세운다("외부 정찰 후 호스트 persistence 가 생겼을 것"). 실 데이터(osquery users/
      listening_ports, 로그)를 **질의** 해 RED 의 persistence(eduintruder 계정 / 포트 19999)를 찾아낸다.

      ### 헌팅 절차 (참고)
      ```
      Hypothesis: 정찰 IP → 발판 → 새 계정/리스너 persistence
      Query: osquery "SELECT * FROM users WHERE uid>=1000"; listening_ports JOIN processes
      Analyze → Document(Sighting)
      ```
      📌 채점: 대상 호스트에서 헌팅으로 persistence(eduintruder)가 확인되는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있고 헌팅으로 찾아냈다.
    hint: "가설 기반 osquery 질의로 persistence 헌팅. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
        - { id: "blue-2-2", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "능동적 헌팅 — Hypothesis→Collect→Query→Analyze→Document. 가설 기반 질의로 잠복 침해를 선제 발견."
        success_criteria: ["persistence(계정/리스너) 헌팅 확인", "(가설) 명시적 hypothesis 제시", "(질의) 실 데이터 query 와 발견 결과 제시"]
        acceptable_methods: ["가설 수립 + osquery/로그 질의 + 발견 문서화"]
        negative_signs: ["가설 없이 무작정 탐색", "발견 미문서화"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — Sighting + Report STIX 객체 작성

      헌팅 발견을 **STIX 2.1 Sighting**(언제/어디서 IOC 가 관측됐는지) + **Report**(분석 종합)로
      문서화한다. Sighting 은 indicator 와 연결되고, Report 는 사건의 서사를 담는다.

      📌 채점: 인텔 문서화의 적용 기반(CDB 인프라)이 갖춰져 있는지.
      ✅ 합격: siem 에 CDB list 디렉토리가 존재한다.
    hint: "STIX Sighting(관측) + Report(종합) 작성. 채점: file_exists /var/ossec/etc/lists."
    verify:
      type: "file_exists"
      expect: "lists"
      checks:
        - { id: "blue-3-1", type: "file_exists", target: "siem", params: { path: "/var/ossec/etc/lists" } }
      semantic:
        intent: "STIX Sighting/Report — Sighting(IOC 관측 사실, count/observed_data) + Report(분석 서사). 발견의 공유 가능한 표준 표현."
        success_criteria: ["(작성) Sighting + Report STIX 객체 제시", "Sighting↔indicator 연결", "(설명) 두 객체의 의미 차이"]
        acceptable_methods: ["STIX Sighting/Report JSON 작성"]
        negative_signs: ["Sighting 과 Report 혼동", "indicator 미연결"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 — 헌팅 결과의 운영화 (custom 룰 sid 100300)

      일회성 헌팅을 넘어, 발견한 침해 패턴(persistence 시그니처)을 **custom 룰(sid 100300)** 으로
      운영화해 재발 시 자동 탐지되게 한다. 헌팅 → 룰 의 선순환.

      ### 권장 형태 (참고)
      ```xml
      <rule id="100300" level="12">
        <if_sid>...</if_sid>
        <description>EDU W14 - hunted persistence pattern operationalized</description>
      </rule>
      ```
      📌 채점: local_rules.xml 에 헌팅 운영화 룰(sid 100300)이 작성됐는지.
      ✅ 합격: local_rules.xml 에 100300 룰이 있다.
    hint: "발견 패턴을 local_rules.xml 의 custom 룰(id 100300)로 운영화 → restart."
    verify:
      type: "file_contains"
      expect: "100300"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "100300" } }
      semantic:
        intent: "헌팅→탐지 선순환 — 발견한 침해 패턴을 룰로 굳혀 재발 자동 탐지. 헌팅의 결과가 영구 가시성으로."
        success_criteria: ["local_rules.xml 에 rule id 100300", "헌팅 발견 패턴 기반 로직", "(설명) 헌팅→룰화 선순환의 의의"]
        acceptable_methods: ["발견 기반 local_rules.xml 100300 작성 + restart"]
        negative_signs: ["헌팅만 하고 운영화 누락(재발 미탐)"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — TLP 4 등급 + MISP 공유 (배포 통제)

      발견 인텔에 **TLP**(RED/AMBER/GREEN/CLEAR) 4 등급을 적용해 배포 범위를 통제하고, MISP 로
      커뮤니티에 공유한다(circular loop 회피). 잘못된 TLP 가 일으키는 사고 사례도 분석한다.

      📌 채점: 본인 SIEM 에 최근 경보(헌팅 대상)가 수집됐는지.
      ✅ 합격: 본인 SIEM 에 최근 경보가 수집돼 있다.
    hint: "TLP 4등급 적용 + MISP 공유(circular 회피). 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "배포 통제 — TLP 4등급으로 공유 범위 제한 + MISP 커뮤니티 공유. 잘못된 TLP 의 정보 유출 위험."
        success_criteria: ["최근 경보 수집", "(적용) TLP 4등급 분류 + 배포 범위 서술", "(분석) 잘못된 TLP 사고 사례"]
        acceptable_methods: ["TLP 분류 + MISP 공유 설계"]
        negative_signs: ["TLP 미적용(무분별 공유)"]
