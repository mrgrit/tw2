id: "ai-agent-w08"
category: "ai-agent"
title: "[AI에이전트 W8] 중간 실습: 취약 에이전트 침투 vs 나만의 안전 보안 에이전트 구축"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간 실습 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). W01~W07(인지·판단·실행·도구·프롬프트·하네스·Bastion·클라이언트)을
  종합해, 취약 에이전트를 침투하고 **나만의 안전한 보안 에이전트**를 설계한다. 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(취약 에이전트 종합 침투)와 Blue(안전 에이전트 구축)를 모두 수행.
    • duel : Red 학생이 종합 침투하고, Blue 학생이 안전 에이전트로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서의 종합 침투·설계**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 취약 에이전트 종합 침투 (인지·판단·실행)

      AICompanion의 **인지→판단→실행 각 단계 취약**을 연결해 종합 침투한다.

      ### 무엇을
      - 인지(입력): 인젝션·간접 인젝션.
      - 판단(LLM): 시스템 프롬프트/비밀 탈취.
      - 실행(도구): 무인증 도구 남용·데이터 유출.
      - 최소 3개 단계를 연결한 킬체인과 실제 증거.

      ### ✅ 합격 기준
      인지·판단·실행 최소 3단계를 연결한 종합 침투를 실제 증거와 함께 수행한다.
    hint: "인지(인젝션)+판단(비밀 탈취)+실행(도구 남용·유출) 3+ 단계 연결 킬체인·실제 증거. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-8-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          에이전트 종합 침투 — 인지·판단·실행 각 단계 취약을 연결하는 능력을 평가.
        success_criteria:
          - "본인 인프라 명령 로그에 다단계 /api 호출 흔적이 남음"
          - "인지·판단·실행 최소 3단계를 연결한 침투를 실제 증거로 수행"
          - "(설명) 단계 간 인과를 서술"
        acceptable_methods:
          - "3단계 연결 종합 침투"
        negative_signs:
          - "단계 연결 없음·증거 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 침투 결과 종합·설계 요구사항 도출

      침투 결과를 종합해, **안전한 에이전트가 갖춰야 할 요구사항**(각 단계 방어)을 도출한다.

      ### ✅ 합격 기준
      각 침투를 막을 요구사항(입력 검증·비밀 격리·도구 게이트·감사)을 도출한다.
    hint: "침투별 방어 요구사항(입력 검증·비밀 격리·도구 게이트·감사) 도출."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-8-2", type: "command_ran", target: "attacker",
            params: { pattern: "chat" } }
      semantic:
        intent: |
          설계 요구사항 도출 — 침투를 방어 요구사항으로 역산.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "각 침투를 막을 요구사항을 도출"
          - "(설명) 요구사항을 단계에 매핑"
        acceptable_methods:
          - "요구사항 도출 + 매핑"
        negative_signs:
          - "요구사항 막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 나만의 안전 보안 에이전트 아키텍처 설계

      W01~W07을 종합한 **안전한 보안 에이전트 아키텍처**를 설계한다.

      ### 무엇을
      - 인지: 입력 검증·인젝션 탐지·데이터 격리.
      - 판단: 비밀 격리·프롬프트 견고성.
      - 실행: 도구 게이트·안전 실행(whitelist)·최소 권한·HITL.
      - 하네스·감사: 전 단계 게이트·append-only 감사.

      ### ✅ 합격 기준
      인지·판단·실행·하네스·감사를 갖춘 안전 에이전트 아키텍처를 RED 침투에 매핑해 설계한다.
    hint: "인지(입력 검증·격리)+판단(비밀 격리·견고성)+실행(게이트·whitelist·HITL)+하네스·감사. RED 침투 매핑."
    verify:
      type: "semantic"
      expect: "safe_agent_arch"
      semantic:
        intent: |
          안전 에이전트 아키텍처 — 각 단계 방어와 하네스·감사를 통합해 설계.
        success_criteria:
          - "인지·판단·실행 각 방어를 제시"
          - "하네스·감사를 제시"
          - "RED 침투에 매핑"
        acceptable_methods:
          - "단계별 방어 + 하네스 + 감사 + 매핑"
        negative_signs:
          - "일부 단계만"
          - "매핑 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 검증·운영 계획 설계

      설계한 에이전트를 **검증·운영**하는 계획을 세운다.

      ### 무엇을
      - **검증**: 각 방어를 테스트(레드팀 케이스)로 회귀 검증.
      - **운영**: 모니터링·감사 검토·이상 대응.
      - **개선**: 경험 학습(검증된 지식만)·지속 개선.

      ### ✅ 합격 기준
      레드팀 검증·운영 모니터링·지속 개선 계획을 제시하고 "설계→검증→운영→개선" 순환을 설명한다.
    hint: "레드팀 회귀 검증+모니터링·감사·이상 대응+검증된 학습·지속 개선. '설계→검증→운영→개선' 순환."
    verify:
      type: "semantic"
      expect: "agent_verification_ops"
      semantic:
        intent: |
          검증·운영 — 레드팀 검증·모니터링·개선으로 안전 에이전트를 지속 운영.
        success_criteria:
          - "레드팀 회귀 검증을 제시"
          - "운영 모니터링·이상 대응을 제시"
          - "지속 개선과 순환 원칙을 설명"
        acceptable_methods:
          - "검증 + 운영 + 개선"
        negative_signs:
          - "검증·운영 없음"
