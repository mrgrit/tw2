id: "attack-w01"
category: "attack"
title: "[공격기법 W1] 침투 환경·정찰 개시 vs 방어 가시성 확인"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  공격기법 1주차 — 침투 테스트의 시작. 공격자는 교전 규칙(RoE) 안에서 대상 자산의 도달성을 확인하고
  초기 정찰을 개시한다. 방어자는 이 정찰이 방어 스택(IPS/WAF/SIEM)에 보이는지 확인한다(공격 과목
  이지만 방어 가시성도 함께 본다 = 공방 통합).

  ▸ 모드: solo(공격자→방어 가시성 점검 1인) / duel(Red 가 상대 자산 정찰, Blue 가 본인 방어로 탐지). 대상=solo 본인 / duel 상대.
  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 18
    instruction: |
      ## 🎯 RED-1 — 대상 자산 도달성 + 호스트/포트 발견
      망 외부 공격자(외부 공격자 VM 192.168.0.202)로 대상의 공개 자산(웹 8종 후보 등)에 도달 가능한지, 어떤 포트가
      열렸는지 스캔으로 확인한다(PTES Intelligence Gathering).
      ```bash
      nmap -sV -p 80,443,3000,8080 192.168.0.161 -T4 --max-retries 1
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 스캔 탐지. ✅ 합격: 대상 IPS 에 스캔 탐지.
    hint: "외부 공격자 VM(192.168.0.202) nmap 도달성/포트 스캔. 채점: 대상 Suricata 스캔 탐지."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "PTES Intelligence Gathering / MITRE T1046 — 대상 도달성+포트 발견. 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 스캔 탐지(최근)", "(설명) 발견 자산/포트와 RoE 준수"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) nmap -sV"]
        negative_signs: ["대상 미도달", "RoE 위반(범위 밖)", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — 웹 자산 핑거프린팅
      발견한 웹 자산의 기술 스택/엔드포인트를 식별한다(whatweb/curl). 후속 익스플로잇 표면 매핑.
      ```bash
      whatweb http://192.168.0.161:3000 ; curl -sI http://192.168.0.161:8080
      ```
      📌 채점: 외부 명령 미수집 → 대상 웹 방어층(ModSec/접근) 또는 IPS 에 남은 요청/탐지 흔적.
      ✅ 합격: 대상 방어층에 웹 탐색 요청 흔적이 남는다.
    hint: "외부 공격자 VM(192.168.0.202) 웹 핑거프린팅. 채점: 대상 ModSec/Suricata 의 요청 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1592 — 웹 핑거프린팅. 외부 공격자 모델 → 대상 방어층/IPS 흔적으로 판정."
        success_criteria: ["대상 방어층/IPS 에 웹 탐색 흔적", "(설명) 식별 스택/엔드포인트"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) whatweb/curl -I/wappalyzer"]
        negative_signs: ["대상 미도달", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — 정찰 탐지 가시성 확인
      공격자의 정찰이 본인 IPS(Suricata)에 탐지되는지 확인하고 출발지/시그니처를 식별한다(방어
      과점에서 '공격 과목' 학생도 자기 행위가 어떻게 보이는지 이해).
      ✅ 합격: 본인 IPS 에 정찰 탐지가 있고 출발지/시그니처를 식별했다.
    hint: "본인 Suricata 에서 정찰 탐지 + 출발지/시그니처 식별."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "blue-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "방어 가시성 — 관측/분석. 정찰 탐지 실존 + 구체값(출발지/시그니처) 일치로 채점."
        success_criteria: ["정찰 탐지 실존", "출발지/시그니처 구체 식별(증거 일치)", "(설명) 공격이 어떻게 탐지되는지"]
        acceptable_methods: ["ips 이벤트/Suricata 분석"]
        negative_signs: ["구체값 없음", "구체값 불일치"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-2 — SIEM 으로 정찰 활동 종합
      정찰 활동이 SIEM(Wazuh)으로 모이는지 확인하고, 공격자가 어떤 자산을 노렸는지 종합한다.
      ✅ 합격: 본인 SIEM 에 정찰 관련 경보가 수집돼 있다.
    hint: "본인 Wazuh 에서 정찰 경보 수집 + 표적 자산 종합."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-2-1", type: "wazuh_alert", target: "siem", params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — 정찰이 Wazuh 로 수렴. 공격 과목 학생도 탐지 관점 이해."
        success_criteria: ["본인 Wazuh 에 ids/정찰 경보(최근)", "(설명) 표적 자산 종합"]
        acceptable_methods: ["siem wazuh_alert(ids)", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
