id: "attack-w10"
category: "attack"
title: "[공격기법 W10] IDS/WAF 우회(Evasion) vs 정규화·다층 탐지 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격기법 10주차 — **IDS/WAF 우회(Evasion)**. 공격자는 인코딩(URL/유니코드/이중)·대소문자·주석
  인젝션·패킷 분할·타이밍으로 탐지를 회피하려 한다. 방어자는 어떤 우회가 통과/차단됐는지 분석하고,
  **정규화(normalization/transform)** 와 다층 탐지로 우회를 무력화한다. 우회와 정규화의 군비 경쟁이
  핵심.

  ▸ 모드: solo(공격자→방어 1인) / duel(Red 가 상대에 우회 공격, Blue 가 본인 방어층으로 분석/대응). 대상=solo 본인 / duel 상대.
  ▸ 공격자 위치: **망 외부 공격자(attacker-ext)**. 외부 명령 미수집 → Red 채점은 대상 WAF/IPS 의 (부분) 탐지 흔적 + 우회 성공(통과) 분석으로.
  ▸ 탐지/정규화 룰은 Suricata **local.rules**(교육용 sid **9410001+**).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — WAF 우회 (인코딩·대소문자·주석)

      SQLi/XSS 를 인코딩(`%3C`, 이중 인코딩), 대소문자(`UnIoN`), 인라인 주석(`/**/`)으로 변형해 CRS
      를 우회 시도한다. 일부는 transform 으로 차단되고 일부는 통과할 수 있다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%2F%2A%2A%2FUnIoN%2F%2A%2A%2FSeLeCt%2F%2A%2A%2F1"
      ```
      📌 채점: 외부 명령 미수집 → 대상 ModSec audit 의 (우회 시도) 탐지.
      ✅ 합격: 대상 WAF audit 에 SQLi/우회 변형 탐지.
    hint: "attacker-ext 인코딩/대소문자/주석 우회. 채점: 대상 ModSec audit. 우회 성공=200 반영."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
        - { id: "red-1-2", type: "log_contains", target: "web", params: { log: "modsec", pattern: "Anomaly Score Exceeded", since_sec: 1800 } }
      semantic:
        intent: "WAF 우회 — 인코딩/대소문자/주석으로 CRS 회피. 외부 공격자 모델 → 대상 audit 의 (부분) 탐지 + 우회 성공(200 반영) 분석으로 판정."
        success_criteria: ["대상 audit 에 우회 변형 탐지(최근)", "(분석) 어떤 변형이 차단(403)/통과(200)됐는지 서술", "(우회) transform 으로 막힌 변형 식별"]
        acceptable_methods: ["attacker-ext 인코딩/이중인코딩/대소문자/주석 변형"]
        negative_signs: ["대상 미도달", "우회 성공/실패 미구분"]

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 18
    instruction: |
      ## 🎯 RED-2 — IDS 우회 (분할·타이밍·난독화)

      패킷 분할(fragmentation), 느린 스캔(timing), 페이로드 난독화로 Suricata 시그니처 매칭을 회피
      시도한다. 재조합/정규화가 없으면 통과할 수 있다.

      ### 권장 명령 (참고)
      ```bash
      nmap -f -T1 -p 1-1000 <대상_공개IP>      # fragment + slow timing
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 의 (재조합 후) 탐지.
      ✅ 합격: 대상 IPS 에 스캔/우회 시도 탐지.
    hint: "attacker-ext nmap -f -T1 분할/느린 스캔. 채점: 대상 Suricata. 재조합 없으면 우회."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "IDS 우회 — 분할/타이밍/난독화로 시그니처 회피. 대상 Suricata 의 재조합 후 탐지 여부로 판정."
        success_criteria: ["대상 IPS 탐지(또는 우회 성공 분석)", "(분석) 재조합/정규화가 우회를 막았는지 서술"]
        acceptable_methods: ["attacker-ext nmap -f/-T1, 페이로드 난독화"]
        negative_signs: ["대상 미도달"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 우회 분석 (통과 vs 차단 판정)

      각 우회 변형이 통과(200)했는지 차단(403/탐지)됐는지 분석한다. WAF transform(urlDecodeUni/
      lowercase)·IDS 재조합이 어떤 우회를 무력화했는지 식별한다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(분석 대상).
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "각 우회의 통과/차단 + transform/재조합 효과 분석. 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "우회 분석 — 변형별 통과/차단 + transform(urlDecodeUni/lowercase)/재조합의 무력화 효과 판정."
        success_criteria: ["경보 수집 확인", "(판정) 변형별 통과/차단 매트릭스", "(무력화) transform/재조합이 막은 우회"]
        acceptable_methods: ["audit/eve 분석"]
        negative_signs: ["통과/차단 미구분"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 정규화 탐지룰 작성 (sid 9410001)

      우회를 무력화하는 룰을 작성한다(**sid 9410001**): Suricata 의 normalize 버퍼(http.uri 정규화)
      또는 stream 재조합을 활용해 인코딩/분할 우회에도 매칭되게 한다.

      ### 권장 룰 (참고)
      ```
      alert http any any -> any any (msg:"ATK W10 normalized SQLi"; http.uri; content:"union"; nocase; pcre:"/union\s*(\/\*.*\*\/)?\s*select/i"; sid:9410001; rev:1;)
      ```
      📌 채점: local.rules 에 정규화 탐지룰(sid 9410001)이 작성됐는지.
      ✅ 합격: local.rules 에 9410001 룰이 있다.
    hint: "local.rules 에 정규화/재조합 활용 탐지룰(sid 9410001, nocase+pcre) → reload."
    verify:
      type: "file_contains"
      expect: "9410001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9410001" } }
      semantic:
        intent: "정규화 탐지 — http.uri 정규화/nocase/pcre + stream 재조합으로 인코딩·주석·분할 우회 무력화."
        success_criteria: ["local.rules 에 sid 9410001", "정규화/nocase/pcre 활용", "(설명) 어떤 우회를 잡는지"]
        acceptable_methods: ["local.rules 작성 + reload"]
        negative_signs: ["고정 문자열만(우회 가능)", "문법 오류"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 다층 정규화 방어 권고

      우회 군비 경쟁에 대응하는 다층 방어를 권고한다: WAF transform 다단계(urlDecodeUni+lowercase),
      IDS stream 재조합, 정규화 후 매칭, paranoia level 상향의 트레이드오프.

      📌 채점: 본인 web modsec audit 에 공격/우회 흔적이 있는지(분석 대상).
      ✅ 합격: 본인 WAF audit 에 탐지가 있다.
    hint: "다단계 transform/재조합/paranoia 트레이드오프 권고. 채점: log_contains web modsec 942100."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "다층 정규화 — WAF transform 다단계 + IDS 재조합 + paranoia level. 탐지율 vs 오탐 트레이드오프."
        success_criteria: ["공격 흔적 확인", "(권고) 다층 정규화 방어", "(트레이드오프) paranoia/오탐 균형"]
        acceptable_methods: ["분석 + 다층 방어 권고"]
        negative_signs: ["단일 정규화만"]
