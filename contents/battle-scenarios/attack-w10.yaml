id: "attack-w10"
category: "attack"
title: "[공격기법 W10] 필터를 빠져나가기 — 인코딩·분할·난독화 우회 vs 정규화 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  탐지를 **회피(Evasion)**하는 기술. 같은 공격이라도 인코딩(URL/유니코드/이중)·대소문자·주석 인젝션·
  패킷 분할·타이밍으로 위장하면 시그니처를 빠져나간다. 방어자는 어떤 우회가 통과/차단됐는지 분석하고,
  **정규화(normalization)**로 위장을 벗겨 무력화한다. 우회와 정규화의 군비 경쟁이 핵심이다.

  ▸ 모드: solo(공격자→방어 1인) / duel(Red가 상대에 우회 공격, Blue가 본인 방어층으로 분석/대응).
    대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Red 채점은 대상 WAF audit의 (부분) 탐지 흔적 + 태그로. 우회 성공은 "200 반영" 여부로
    분석한다. 정규화 탐지룰 Suricata **sid 9410001**. 웹공격 태그 **`at10r1-<id>`**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — WAF 우회 (인코딩·대소문자·주석)

      ### 상황
      SQLi/XSS를 인코딩(`%3C`, 이중 인코딩), 대소문자(`UnIoN`), 인라인 주석(`/**/`)으로 변형해 CRS를
      우회 시도한다. 일부는 transform으로 차단되고 일부는 통과할 수 있다.

      ### 할 일
      이 미션 전용 태그 `at10r1-<id>`를 붙여 우회 변형 공격을 보낸다.
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=at10r1-kim-1%2F%2A%2A%2FUnIoN%2F%2A%2A%2FSeLeCt%2F%2A%2A%2F1"
      ```

      ### 채점 방법
      대상 WAF audit에 (at10r1 태그 포함) 우회 변형 탐지가 남았는지로 채점. 어떤 변형이 차단(403)/통과
      (200)됐는지 분석한다.

      ### 합격 기준
      대상 WAF audit에 at10r1 태그가 포함된 우회 변형 흔적이 남는다.
    hint: "태그(at10r1) 인코딩/대소문자/주석 우회. 채점: 대상 modsec audit + 태그. 우회 성공=200."
    verify:
      type: "log_contains"
      expect: "at10r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "at10r1", since_sec: 1800 } }
      semantic:
        intent: "WAF 우회 — 인코딩/대소문자/주석으로 CRS 회피. 대상 audit의 (부분) 탐지 + 우회 성공(200 반영) 분석으로 판정. 태그 귀속."
        success_criteria:
          - "대상 audit에 (at10r1 태그 포함) 우회 변형 흔적(최근)"
          - "어떤 변형이 차단(403)/통과(200)됐는지 분석"
          - "transform으로 막힌 변형 식별"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 태그 붙인 인코딩/이중인코딩/대소문자/주석 변형"
        negative_signs:
          - "대상 미도달 / 태그 누락 / 우회 성공·실패 미구분"

  - order: 2
    assess_target: opponent
    target_vm: siem
    points: 18
    instruction: |
      ## 🎯 RED-2 — IDS 우회 (분할·타이밍·난독화)

      ### 상황
      패킷 분할(fragmentation), 느린 스캔(timing), 페이로드 난독화로 Suricata 시그니처 매칭을 회피
      시도한다. 재조합/정규화가 없으면 통과할 수 있다.

      ### 할 일
      ```bash
      nmap -f -T1 -p 1-1000 192.168.0.161      # fragment + slow timing
      ```

      ### 채점 방법
      Wazuh에 ids 그룹 경보가 ingest됐는지로 채점(재조합 후 탐지/파이프라인 동작).

      ### 합격 기준
      Wazuh에 ids 그룹 경보가 있다.
    hint: "nmap -f -T1 분할/느린 스캔. 채점: wazuh_alert(ids). 재조합 없으면 우회."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-2-1", type: "wazuh_alert", target: "siem",
            params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "IDS 우회 — 분할/타이밍/난독화로 시그니처 회피. Wazuh ids 파이프라인(재조합 후 탐지)으로 판정."
        success_criteria:
          - "Wazuh ids 경보 ingest"
          - "재조합/정규화가 우회를 막았는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 nmap -f/-T1, 페이로드 난독화"
        negative_signs:
          - "Wazuh ids ingest 없음"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 우회 분석 (통과 vs 차단 판정)

      ### 상황
      각 우회 변형이 통과(200)했는지 차단(403/탐지)됐는지 분석한다. WAF transform(urlDecodeUni/lowercase)·
      IDS 재조합이 어떤 우회를 무력화했는지 식별한다.

      ### 할 일
      변형별 통과/차단 매트릭스 + transform/재조합 효과를 분석한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 분석은 제출로 검증).
    hint: "각 우회의 통과/차단 + transform/재조합 효과 분석. 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "우회 분석 — 변형별 통과/차단 + transform(urlDecodeUni/lowercase)/재조합의 무력화 효과 판정."
        success_criteria:
          - "경보 수집 확인"
          - "변형별 통과/차단 매트릭스"
          - "transform/재조합이 막은 우회"
        acceptable_methods:
          - "audit/eve 분석"
        negative_signs:
          - "통과/차단 미구분"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 정규화 탐지룰 (sid 9410001)

      ### 상황
      우회를 무력화하는 룰을 작성한다(**sid 9410001**): Suricata의 정규화 버퍼(http.uri 정규화)나 pcre로
      인코딩/주석 우회에도 매칭되게 한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATK W10 normalized SQLi"; http.uri; content:"union"; nocase; pcre:"/union\s*(\/\*.*?\*\/)?\s*select/i"; sid:9410001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9410001 정규화 탐지룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9410001 룰이 있다.
    hint: "local.rules에 정규화/pcre 활용 탐지룰(sid 9410001, nocase+pcre) → reload."
    verify:
      type: "file_contains"
      expect: "9410001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9410001" } }
      semantic:
        intent: "정규화 탐지 — http.uri 정규화/nocase/pcre로 인코딩·주석·대소문자 우회 무력화."
        success_criteria:
          - "local.rules에 sid 9410001"
          - "정규화/nocase/pcre 활용"
          - "어떤 우회를 잡는지 서술"
        acceptable_methods:
          - "local.rules 작성 + reload"
        negative_signs:
          - "고정 문자열만(우회 가능) / 문법 오류"

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 다층 정규화 방어 권고

      ### 상황
      우회 군비 경쟁에 대응하는 다층 방어를 권고한다: WAF transform 다단계(urlDecodeUni+lowercase),
      IDS stream 재조합, 정규화 후 매칭, paranoia level 상향의 트레이드오프.

      ### 할 일
      다단계 transform/재조합/paranoia 트레이드오프를 권고한다.

      ### 채점 방법
      본인 web modsec audit에 공격/우회 흔적이 있는지 + 권고(제출)로 채점.

      ### 합격 기준
      본인 WAF audit에 탐지가 있다.
    hint: "다단계 transform/재조합/paranoia 트레이드오프 권고. 채점: log_contains web modsec at10r1."
    verify:
      type: "log_contains"
      expect: "at10r1"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "at10r1", since_sec: 1800 } }
      semantic:
        intent: "다층 정규화 — WAF transform 다단계 + IDS 재조합 + paranoia level. 탐지율 vs 오탐 트레이드오프."
        success_criteria:
          - "공격 흔적 확인"
          - "다층 정규화 방어"
          - "paranoia/오탐 균형"
        acceptable_methods:
          - "분석 + 다층 방어 권고"
        negative_signs:
          - "단일 정규화만"
