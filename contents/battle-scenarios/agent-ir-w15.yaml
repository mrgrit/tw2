id: "agent-ir-w15"
category: "agent-ir"
title: "[에이전트IR W15] 기말: 종합 Purple + Mythos-readiness — 자율 방어 순환 종합"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  기말 캡스톤 공방전 — 한 학기 전체(템포·도구·정찰·익스플로잇·확산·다형성·규모·탐지·기만·Purple·보고·
  APT)를 종합해 **Purple 순환**(공격→탐지→대응→학습→개선)을 완성하고, 미래의 더 강한 AI 공격
  (Mythos-readiness)에 대한 준비를 평가한다. 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(종합 공격)와 Blue(종합 Purple 방어)를 모두 수행.
    • duel : Red 학생이 종합 공격을, Blue 학생이 종합 Purple 대응·개선을 수행한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속. ROE 엄수.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (종합 공격 + Purple 기여) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 종합 다단계 공격 (Purple 입력)

      학기 전체 기법을 엮은 **종합 다단계 공격**을 실행하고, Blue의 방어·학습 입력으로 구조화한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰→다형성 익스플로잇→확산 다단계
        (고유 태그).
      - Blue가 재현·학습·개선할 수 있게 절차·IOC를 구조화.

      ### ✅ 합격 기준
      학기 기법을 엮은 종합 다단계 공격을 실행해 대상에 흔적을 남기고, Purple 입력으로 구조화한다.
    hint: "정찰→다형성 익스플로잇→확산 다단계(태그 auto-red-<학번>). 절차·IOC 구조화(Blue 학습용). 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-15-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          종합 공격 + Purple 입력 — 학기 기법을 엮어 Blue가 학습·개선할 종합 공격을 제공.
        success_criteria:
          - "대상 WAF/IPS에 종합 다단계 공격 흔적이 남고 고유 태그로 귀속됨"
          - "학기 기법을 엮은 다단계 공격을 실행"
          - "(설명) Purple 입력(절차·IOC)으로 구조화"
        acceptable_methods:
          - "종합 다단계 공격 + 구조화"
        negative_signs:
          - "탐지 흔적 없음"
          - "구조화·연결 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — Mythos-readiness: 미래 공격 진화 예측

      더 강한 미래 AI 공격을 예측한다: 완전 자율·더 빠른 진화·멀티모달·협조 규모화 등이 방어를 어떻게
      압박할지.

      ### ✅ 합격 기준
      미래 AI 공격의 진화 방향(자율성·속도·규모·회피)을 예측하고, 현재 방어의 준비 부족 지점을 논한다.
    hint: "미래 공격 진화(완전 자율·더 빠른 진화·멀티모달·협조 규모화) 예측 + 현재 방어 준비 부족 지점 논의. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-15-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Mythos-readiness 예측 — 미래 AI 공격의 진화를 예측해 방어 준비의 격차를 드러냄.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "미래 공격 진화 방향(자율성·속도·규모·회피)을 예측"
          - "(설명) 현재 방어 준비 부족 지점을 논함"
        acceptable_methods:
          - "미래 공격 예측 + 준비 격차"
        negative_signs:
          - "예측·격차 분석 없음"

# ───────────────────────── BLUE (종합 Purple 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 Purple 대응: 탐지·상관·대응·학습

      Red 종합 공격에 **Purple 순환**으로 대응한다: 탐지→상관→대응→학습.

      ### 어떻게
      - Wazuh/Suricata에서 종합 공격을 탐지·상관해 킬체인 재구성.
      - 대응(봉쇄) 후 대응 지식을 학습(룰·플레이북·KG 갱신).
      - 각 단계의 자동화·자율성 수준·감사를 명시.

      ### ✅ 합격 기준
      종합 공격을 탐지·상관·대응하고 대응 지식을 학습(룰·플레이북 갱신)하며 자동화·감사를 설명한다.
    hint: "Wazuh/Suricata 탐지·상관→킬체인 재구성→봉쇄→학습(룰·플레이북·KG 갱신). 자동화·자율성·감사 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-15-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          종합 Purple 대응 — 탐지·상관·대응·학습의 순환으로 종합 공격에 대응하고 자율 능력을 개선.
        success_criteria:
          - "Wazuh/Suricata에서 종합 공격을 탐지·상관·킬체인 재구성"
          - "대응(봉쇄) 후 대응 지식을 학습(룰·플레이북·KG 갱신)"
          - "(설명) 자동화·자율성 수준·감사를 명시"
        acceptable_methods:
          - "탐지·상관·대응·학습 순환"
        negative_signs:
          - "경보 근거 없음"
          - "학습·감사 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Mythos-readiness 준비도 평가·개선 로드맵

      미래 AI 공격에 대한 **준비도(Mythos-readiness)를 평가**하고 개선 로드맵을 세운다.

      ### 무엇을
      - **준비도 평가**: 탐지 속도·상관 능력·자동화·기만·학습 순환의 성숙도 평가.
      - **격차·로드맵**: Red가 예측한 미래 공격 대비 격차와 우선순위 개선(자동화·자율 방어 강화).
      - **자율 방어 순환**: 자기 개선 루프(경험→플레이북)·기만·능동 방어의 지속 강화.
      - **거버넌스·안전**: 자율성 수준·감사·정렬로 안전한 자율 방어.

      ### ✅ 합격 기준
      준비도 평가·격차 로드맵·자율 방어 순환·거버넌스를 제시하고 "AI 공격의 진화에 맞춰 방어도 자율·
      자기개선해야" 원칙을 설명한다.
    hint: "준비도 평가(탐지 속도·상관·자동화·기만·학습 성숙도)+격차 로드맵+자율 방어 순환(자기 개선·기만·능동)+거버넌스. '방어도 자율·자기개선' 원칙."
    verify:
      type: "semantic"
      expect: "mythos_readiness"
      semantic:
        intent: |
          Mythos-readiness 준비도 — 미래 AI 공격 대비 준비도를 평가하고 자율·자기개선 방어로 격차를 좁힌다.
        success_criteria:
          - "준비도 평가(탐지 속도·상관·자동화·기만·학습 성숙도)를 제시"
          - "격차·우선순위 개선 로드맵을 제시"
          - "자율 방어 순환(자기 개선·기만·능동)과 거버넌스를 제시"
          - "(설명) '방어도 자율·자기개선해야' 원칙 설명"
        acceptable_methods:
          - "준비도 평가 + 로드맵 + 자율 순환 + 거버넌스"
        negative_signs:
          - "평가·로드맵 없이 일반론"
          - "자율·자기개선 관점 없음"
