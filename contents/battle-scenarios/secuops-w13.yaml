id: "secuops-w13"
category: "secuops"
title: "[보안운영 W13] 맥락이 평결을 바꾼다 — enrichment와 빈도로 경보 우선순위 자동 조정"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  W12에선 "알려진 악성인가"만 봤다. 이번 주는 한 걸음 더 — **맥락(context)**이 평결을 바꾼다. 같은
  출발지라도 ① **적대 국가**(GeoIP)이거나 ② **평판이 나쁘거나**(VirusTotal/abuse.ch) ③ **반복**되면,
  평범했던 경보가 **고위험(P1)**으로 올라간다. CTI 운영의 핵심은 정적 매칭을 넘어 **enrichment + 빈도**로
  우선순위를 자동 조정하고, 그걸 **자동화**(Stream Connector)하는 것이다.

  ▸ 이야기
    공격자가 **알려진 악성 출발지에서 반복** 공격한다. 운영자(너)는 외부 Connector로 IOC를 수집하고,
    enrichment(국가·평판)로 맥락을 더하며, **빈도 기반 격상 룰**로 반복되는 평판 불량 공격을 자동으로
    고위험으로 올린다. 마지막엔 OpenCTI Stream Connector로 이 모든 걸 자동화하는 그림을 그린다.

  ▸ 모드: solo(IOC 공격→인텔 운영자) / duel(상대 IOC 공격→본인 enrichment 격상). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — OpenCTI 미설치 → Connector/enrichment는 설계·시뮬, **실 적용은 Wazuh 빈도 격상 룰
    (id 101301, `local_rules.xml`)**. 웹공격 태그 **`ct13r1-<id>`**.

# ───────────── RED : 공격자 — "알려진 곳에서 반복하라" ─────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 평판 불량 출발지에서 반복 공격 (enrichment 표적)

      ### 상황
      한 번이면 평범하지만 **반복**하면 다르다. 같은 (알려진 악성) 도구로 반복 공격해, 운영자가
      평판(IOC)+빈도를 결합해 격상할 표적을 만든다.

      ### 할 일
      이 미션 전용 태그 `ct13r1-<id>`를 붙여 같은 공격을 **여러 번** 반복한다.
      ```bash
      for i in 1 2 3 4 5; do curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=ct13r1-kim-rep$i%20UNION%20SELECT%201"; done
      ```

      ### 채점 방법
      대상 WAF audit에 (ct13r1 태그 포함) 반복 공격 탐지가 남았는지로 채점한다.

      ### 합격 기준
      대상 WAF audit에 ct13r1 태그가 포함된 반복 공격 탐지가 남는다.
    hint: "태그(ct13r1) sqlmap 반복 공격. 채점: 대상 modsec audit + 태그."
    verify:
      type: "log_contains"
      expect: "ct13r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "ct13r1", since_sec: 1800 } }
      semantic:
        intent: "평판 불량 IOC + 빈도 — 반복 공격. GeoIP/평판 enrichment + 빈도 결합 격상의 표적. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (ct13r1 태그 포함) 반복 공격 탐지(최근)"
          - "이 경보에 어떤 enrichment(GeoIP/평판)+빈도를 붙여 격상할지 서술"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 반복 sqlmap/nikto 공격"
        negative_signs:
          - "대상 미도달 / 태그 누락 / 단발(빈도 없음)"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 17
    instruction: |
      ## 🎯 RED-2 — 네트워크 정찰 (IPS→Wazuh ids 파이프라인)

      ### 상황
      웹 말고 네트워크 계층에서도 평판 불량 출발지의 활동이 흐른다. 포트 스캔이 Suricata→Wazuh로
      들어와 ids 그룹 경보가 되고, 이것도 enrichment 대상이다.

      ### 할 일
      ```bash
      nmap -sS -p 1-1000 192.168.0.161 -T4
      ```

      ### 채점 방법
      Wazuh에 `ids` 그룹 경보가 ingest됐는지로 채점(IPS→Wazuh 파이프라인 동작).

      ### 합격 기준
      Wazuh에 ids 그룹 경보가 있다.
    hint: "nmap → eve → Wazuh ids 그룹. 채점: wazuh_alert(ids)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-2-1", type: "wazuh_alert", target: "siem",
            params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "네트워크 ingest — 포트 스캔 → eve.json → Wazuh ids 그룹. 파이프라인 동작 입증(특정 스캔 귀속 아님)."
        success_criteria:
          - "Wazuh에 ids 그룹 경보가 ingest됨"
          - "이 네트워크 경보를 enrichment로 어떻게 맥락화할지 서술"
        acceptable_methods:
          - "attacker-ext에서 nmap 포트 스캔 → Wazuh ids 그룹 확인"
        negative_signs:
          - "Wazuh에 ids 그룹 ingest가 전혀 없음"

# ───────────── BLUE : 인텔 운영자 — "맥락으로 우선순위를 바꿔라" ─────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — 수집과 enrichment의 역할 분담 (Connector 설계)

      ### 상황
      OpenCTI엔 두 종류의 Connector가 있다 — **외부 Connector**(MITRE/abuse.ch/OTX에서 IOC **수집**)와
      **enrichment Connector**(GeoIP/VirusTotal/Shodan으로 경보에 **맥락** 추가). 둘의 역할을 구분해
      운영 워크플로우를 설계한다.

      ### 할 일
      외부 Connector(수집) + enrichment Connector(GeoIP/평판/노출) 3종의 워크플로우를 설계한다.

      ### 채점 방법
      인텔→SIEM 파이프라인의 manager가 가동 중인지로 확인(적용 기반).

      ### 합격 기준
      siem에 wazuh-analysisd가 running이다(+ 설계는 제출로 검증).
    hint: "외부 Connector(수집)+enrichment Connector(GeoIP/VT/Shodan) 워크플로우. 채점: process_running siem wazuh-analysisd."
    verify:
      type: "process_running"
      expect: "analysisd"
      checks:
        - { id: "blue-1-1", type: "process_running", target: "siem", params: { name: "wazuh-analysisd" } }
      semantic:
        intent: "CTI 운영 — 외부 Connector(수집) + enrichment Connector(맥락). 수집과 enrichment의 역할 구분."
        success_criteria:
          - "외부 Connector + enrichment Connector 3종 워크플로우"
          - "manager 가동"
          - "enrichment가 트리아지에 주는 가치 서술"
        acceptable_methods:
          - "Connector 워크플로우 설계 + enrichment 매핑"
        negative_signs:
          - "수집/enrichment 구분 못함"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 빈도가 평결을 바꾼다 (격상 룰 id 101301)

      ### 상황
      이번 주 핵심 — 같은 IOC가 **반복**되면 자동으로 고위험으로 올린다. Wazuh의 `frequency`+`timeframe`
      과 `if_matched_sid`로 "정해진 시간 안에 N번 이상 매칭되면 격상"하는 룰(**id 101301**)을 쓴다.

      ### 할 일
      `local_rules.xml`에 빈도 기반 격상 룰을 추가하고 `wazuh-control restart`한다.
      ```xml
      <group name="edu,web,">
        <rule id="101301" level="13" frequency="4" timeframe="120">
          <if_matched_group>web</if_matched_group>
          <match>sqlmap</match>
          <description>EDU W13 - repeated known-bad tool, escalate to critical</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml`에 id 101301 빈도 격상 룰이 있는지로 확인.

      ### 합격 기준
      local_rules.xml에 101301 룰이 있다.
    hint: "local_rules.xml에 frequency/timeframe 격상 룰(id 101301) → restart."
    verify:
      type: "file_contains"
      expect: "101301"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "101301" } }
      semantic:
        intent: "MITRE D3FEND — enrichment+빈도 자동 격상. frequency/timeframe + if_matched_group/sid로 반복 IOC 매칭 시 level 상향."
        success_criteria:
          - "local_rules.xml에 rule id 101301"
          - "frequency/timeframe 결합으로 반복 시 격상"
          - "enrichment 맥락(평판/지역)이 격상에 어떻게 반영되는지 서술"
        acceptable_methods:
          - "local_rules.xml 101301 빈도 격상 룰 + restart"
        negative_signs:
          - "단순 매칭만(빈도/격상 로직 없음) / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — Python Stream Connector (OpenCTI → CDB 자동 sync)

      ### 상황
      신규 indicator가 OpenCTI에 들어오면 **Python Stream Connector**가 실시간으로 Wazuh CDB list에
      반영하는 자동화를 설계한다(중복/만료/TLP 필터 포함). 수동 CDB 관리의 한계를 극복한다.

      ### 할 일
      Stream Connector의 sync 로직(중복/만료/TLP)을 설계하고, CDB list 인프라가 있는지 확인한다.

      ### 채점 방법
      siem에 CDB list 인프라(sync 대상)가 있는지로 확인.

      ### 합격 기준
      siem에 CDB list 디렉토리가 존재한다(+ 설계는 제출로 검증).
    hint: "Python Stream Connector → CDB sync(중복/만료/TLP) 설계. 채점: file_exists /var/ossec/etc/lists."
    verify:
      type: "file_exists"
      expect: "lists"
      checks:
        - { id: "blue-3-1", type: "file_exists", target: "siem", params: { path: "/var/ossec/etc/lists" } }
      semantic:
        intent: "IOC 자동화 — Stream Connector가 indicator→CDB 실시간 sync. 중복/만료/TLP 필터로 품질 유지."
        success_criteria:
          - "CDB 인프라 확인"
          - "Stream Connector sync 로직(중복/만료/TLP) 제시"
          - "실시간성과 CDB reload 반영"
        acceptable_methods:
          - "Python Stream Connector 설계 + CDB sync 워크플로우"
        negative_signs:
          - "만료/중복 처리 누락"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 — enrichment → 격상 검증

      ### 상황
      RED의 반복 IOC 공격을 재현하고, enrichment+빈도 격상 룰(101301)이 경보를 상위 level로 올리는지
      검증한다. 격상 전(평범한 단발 스캔)과 후(평판 불량 반복 → 고위험)의 우선순위 차이를 본다.

      ### 할 일
      반복 공격 재현 후 alerts.json에서 101301 격상을 확인한다.

      ### 채점 방법
      본인 SIEM에 최근 경보가 수집됐는지로 확인.

      ### 합격 기준
      본인 SIEM에 최근 경보가 수집돼 있다.
    hint: "반복 IOC 공격 재현 → 101301 격상 확인. 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "운영 검증 — enrichment+빈도 격상이 실제 우선순위에 반영. 평판 불량 IOC 반복 시 고위험으로 자동 상향."
        success_criteria:
          - "최근 경보 수집"
          - "격상 전후 level 차이 확인"
          - "분석가 트리아지에 주는 효과 서술"
        acceptable_methods:
          - "반복 공격 재현 후 alerts.json의 격상 확인 / wazuh_alert"
        negative_signs:
          - "격상 미확인"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — 운영 성숙: 사고 분석 + ATT&CK Navigator 커버리지

      ### 상황
      IOC 운영엔 실 사고가 따른다 — 오탐 IOC, 만료된 IOC, 잘못된 enrichment. 이를 분석해 근본 해결하고,
      탐지 룰을 **MITRE ATT&CK Navigator**로 매핑해 커버리지 공백을 시각화한다.

      ### 할 일
      IOC 운영 사고 3 사례와 근본 해결을 정리하고, ATT&CK Navigator 커버리지 공백을 식별한다.

      ### 채점 방법
      siem에 CDB list 예시 파일(운영 대상)이 있는지로 확인.

      ### 합격 기준
      siem에 CDB list 파일이 존재한다(+ 분석은 제출로 검증).
    hint: "오탐/만료 IOC 사고 분석 + ATT&CK Navigator 커버리지. 채점: file_exists /var/ossec/etc/lists/audit-keys."
    verify:
      type: "file_exists"
      expect: "lists"
      checks:
        - { id: "blue-5-1", type: "file_exists", target: "siem", params: { path: "/var/ossec/etc/lists/audit-keys" } }
      semantic:
        intent: "운영 성숙 — IOC 사고(오탐/만료/잘못된 enrichment) 근본 해결 + ATT&CK Navigator로 커버리지 공백 가시화."
        success_criteria:
          - "CDB 운영 대상 확인"
          - "IOC 운영 사고 3 사례 + 근본 해결"
          - "ATT&CK Navigator 커버리지 공백 식별"
        acceptable_methods:
          - "사고 분석 + Navigator 커버리지 매핑"
        negative_signs:
          - "증상 대응만(근본 원인 누락)"
