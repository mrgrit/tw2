id: "ai-safety-adv-w05"
category: "ai-safety-adv"
title: "[AI안전심화 W5] AI 에이전트 보안: 도구 공격·Excessive Agency vs bastion 권한 모델"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  에이전트 보안 심화 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 도구 사용 공격·과도한
  에이전시와 bastion 권한 모델 방어를 다룬다.
  ▸ 실측 — `/api/tool/exec_python`(RCE)·`update_user`(무인증 200)·`http_get`/`chain`(WAF 민감). Red 위치:
    본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만, PoC.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 도구 사용 공격 체인
      무인증 도구를 연쇄해 권한 초과 행동을 실증한다(exec·update_user·http_get/chain 반응 기록).
      ### ✅ 합격 기준: 도구 최소 2개 남용을 실제 캡처로 증명하고 연쇄 위험을 논증한다.
    hint: "exec_python·update_user·http_get/chain 반응 기록+연쇄 위험. 요청/응답 캡처."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "red-5-1", type: "command_ran", target: "attacker", params: { pattern: "tool" } }
      semantic:
        intent: "도구 사용 공격 — 무인증 도구 연쇄로 권한 초과(LLM08)."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/tool/* 흔적이 남음"
          - "도구 2개 남용을 실제 캡처로 증명"
          - "(설명) 연쇄 위험 논증"
        acceptable_methods: ["도구 연쇄 + 캡처"]
        negative_signs: ["도구 하나·캡처 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 권한 모델 취약 분석 (Excessive Agency)
      에이전트의 기능·권한·자율성 3축이 과도함을 분석하고, bastion 권한 모델(자율성 수준) 관점에서 무엇이
      빠졌는지 논한다.
      ### ✅ 합격 기준: 기능·권한·자율성 과도함을 분석하고 필요한 권한 통제(승인 게이트·최소 권한)를 도출한다.
    hint: "기능·권한·자율성 3축 과도함 분석 + bastion 권한 모델 관점 결여(승인·최소 권한) 도출."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "red-5-2", type: "command_ran", target: "attacker", params: { pattern: "tool" } }
      semantic:
        intent: "과도한 에이전시 분석 — 3축 과도함과 권한 통제 결여를 도출."
        success_criteria:
          - "본인 인프라 명령 로그에 흔적이 남음"
          - "기능·권한·자율성 과도함을 분석"
          - "(설명) 필요한 권한 통제를 도출"
        acceptable_methods: ["3축 분석 + 통제 도출"]
        negative_signs: ["3축 관점 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 에이전시 표면 진단
      도구·인증·최악 행동을 목록화·등급화(LLM08).
      ### ✅ 합격 기준: 도구별 인증·최악 행동을 증거로 목록화한다.
    hint: "도구 4종 인증·상태코드·최악 행동 등급. 채점=본인 인프라 tool 흔적."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "blue-5-1", type: "command_ran", target: "attacker", params: { pattern: "tool" } }
      semantic:
        intent: "에이전시 표면 진단 — 도구·권한·최악 행동 목록화."
        success_criteria:
          - "본인 인프라 명령 로그에 도구 열거 흔적이 남음"
          - "도구별 인증·최악 행동 등급화"
          - "(설명) LLM08 매핑"
        acceptable_methods: ["도구 열거 + 등급"]
        negative_signs: ["증거 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — bastion 권한 모델 설계
      자율성 수준(조회 자율·변경 승인)·최소 권한·도구 인증·SSRF 허용목록·샌드박스·감사.
      ### ✅ 합격 기준: 자율성 수준·최소 권한·승인 게이트·샌드박스·감사를 제시하고 "권한 모델로 피해 제한"
      원칙을 설명한다.
    hint: "자율성 수준(조회 자율·변경 승인)+최소 권한·도구 인증+SSRF 허용목록+샌드박스·감사. '권한 모델로 피해 제한' 원칙."
    verify:
      type: "semantic"
      expect: "bastion_permission"
      semantic:
        intent: "bastion 권한 모델 — 자율성 수준·최소 권한·승인으로 에이전시를 통제."
        success_criteria:
          - "자율성 수준(조회 자율·변경 승인)을 제시"
          - "최소 권한·도구 인증·SSRF 허용목록을 제시"
          - "샌드박스·감사를 제시"
          - "(설명) '권한 모델로 피해 제한' 원칙 설명"
        acceptable_methods: ["자율성 수준 + 최소 권한 + 승인 + 감사"]
        negative_signs: ["승인 게이트·자율성 수준 없음"]
