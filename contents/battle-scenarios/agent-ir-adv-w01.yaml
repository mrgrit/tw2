id: "agent-ir-adv-w01"
category: "agent-ir-adv"
title: "[에이전트IR고급 W1] 공급망 Dependency Confusion 자동 악용 vs 공급망 탐지·차단"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 공격 에이전트가 **패키지 생태계(Dependency Confusion)** 를 노려 내부
  빌드에 악성 패키지를 심는 공격과, 그 공급망 위협의 탐지·차단을 다룬다. Red는 외부에서 대상을 정찰·
  공격해 흔적을 남기고 공급망 킬체인을 설계하며, Blue는 공급망 탐지를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(공급망 공격 킬체인)와 Blue(공급망 탐지·차단)를 모두 수행.
    • duel : Red 학생이 상대 인프라를 정찰·공격하고, Blue 학생은 공급망 위협을 탐지한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 정찰·웹 공격한다.
    Red 채점은 **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 공급망 킬체인
    설계**로 한다. 고유 태그(`auto-red-<학번>`)로 귀속. (내부 패키지 레지스트리 텔레메트리는 el34
    미보유 → 공급망 부분은 설계·분석으로 평가.)

  ▸ 자율 보안 관점 — 에이전트 공격은 분 단위로 정찰→패키지명 수집→악성 패키지 게시→내부 빌드 오염을
    자동화한다. 방어는 각 단계의 관찰 지점을 찾는다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. 실제 공개 레지스트리 오염 금지(설계·분석).

# ───────────────────────── RED (공급망 공격 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 정찰: 내부 패키지·의존성 표면 탐색 (killchain: recon)

      외부 공격자 VM({{ATTACKER_IP}})에서 대상을 정찰해 **내부 패키지명·의존성 힌트**(노출된 빌드 설정·
      에러 메시지·package.json/requirements 조각)를 수집하는 단계를 수행한다.

      ### 어디서 / 무엇을
      - 대상 웹/서비스를 정찰(포트·경로·노출 파일)해 의존성 힌트를 찾는다(고유 태그).
      - Dependency Confusion 표적(내부 전용 패키지명)을 식별하는 개념을 설계.

      ### 권장 명령 (참고)
      ```bash
      nmap -sV -Pn 192.168.0.161 -p80,443,8007 --reason
      curl -A 'auto-red-<학번>-recon' http://192.168.0.161/
      ```

      ### 📌 채점 방식
      대상 Suricata/Wazuh 정찰 흔적 + **보고서에 Dependency Confusion 표적 식별·recon 단계 설계**.

      ### ✅ 합격 기준
      대상 IPS/SIEM에 정찰 흔적이 남고, 내부 패키지명 수집→Confusion 표적 식별의 정찰 단계를 설계한다.
    hint: "외부 공격자 VM에서 대상 정찰(태그 auto-red-<학번>)+내부 패키지명 수집·Confusion 표적 식별 설계. 채점=대상 Suricata/Wazuh 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-1-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          공급망 정찰 — 내부 패키지명·의존성 힌트를 수집해 Dependency Confusion 표적을 식별하는 단계.
        success_criteria:
          - "대상 IPS(Suricata)/SIEM(Wazuh)에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "내부 패키지명 수집→Confusion 표적 식별 단계를 설계"
          - "(설명) 에이전트가 정찰을 자동화하는 속도를 언급"
        acceptable_methods:
          - "정찰 + Confusion 표적 식별 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "공급망 설계 없이 명령만"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 악용: 웹 침투 시도 + 공급망 오염 킬체인 설계 (killchain: exploit)

      대상 웹에 침투를 시도(고유 태그)해 WAF/IPS 흔적을 남기고, **Dependency Confusion 오염 킬체인**
      (악성 패키지 게시→버전 우선순위 악용→내부 빌드 자동 설치→코드 실행)을 설계한다.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### ✅ 합격 기준
      대상 WAF/IPS에 공격 흔적이 남고, 악성 패키지 게시→버전 우선순위→빌드 오염→실행의 공급망 킬체인을
      구체적으로 설계한다.
    hint: "대상 웹 PoC(태그 auto-red-<학번>)+Confusion 킬체인(악성 패키지 게시→버전 우선→빌드 자동 설치→실행) 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-1-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Dependency Confusion 킬체인 — 내부 패키지명을 흉내낸 악성 패키지가 버전 우선순위로 내부 빌드에
          설치되어 코드 실행에 이르는 경로를 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "악성 패키지 게시→버전 우선순위→빌드 오염→실행 킬체인을 설계"
          - "(설명) 공개/내부 레지스트리 우선순위 문제가 근본 원인임을 설명"
        acceptable_methods:
          - "웹 PoC + Confusion 킬체인 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 설계 막연"

# ───────────────────────── BLUE (공급망 탐지·차단) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 공격 정찰·침투 탐지 + 공급망 관찰 지점 설계

      대상 SIEM(Wazuh)/IPS에서 RED의 정찰·침투 흔적을 탐지하고, **공급망 오염의 관찰 지점**을 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 정찰·웹 공격 경보를 찾아 출처·시각 확인.
      - 공급망 관찰 지점 설계: 빌드 로그의 예상 밖 패키지 설치·외부 레지스트리 접근·해시 불일치·신규
        의존성 급증.

      ### ✅ 합격 기준
      RED 공격을 SIEM/IPS에서 탐지하고, 공급망 오염을 잡을 관찰 지점(빌드·레지스트리·해시)을 설계한다.
    hint: "Wazuh/Suricata에서 RED 정찰·침투 탐지+공급망 관찰 지점(예상 밖 패키지 설치·외부 레지스트리·해시 불일치·신규 의존성) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-1-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          공급망 관찰 지점 — 공격 흔적 탐지와 빌드·레지스트리·해시 관찰로 공급망 오염을 잡는다.
        success_criteria:
          - "Wazuh/Suricata에서 RED 정찰·침투를 탐지"
          - "공급망 관찰 지점(빌드·레지스트리·해시·의존성)을 설계"
          - "(설명) 자동화 속도에 맞춘 탐지 필요를 언급"
        acceptable_methods:
          - "SIEM 탐지 + 공급망 관찰 지점"
        negative_signs:
          - "경보 근거 없음"
          - "공급망 관찰 지점 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 공급망 방어·차단 설계

      Dependency Confusion을 막는 **공급망 방어**를 설계한다.

      ### 무엇을
      - **레지스트리 통제**: 내부 스코프/네임스페이스·프라이빗 레지스트리 우선, 공개 폴백 차단.
      - **버전 고정·검증**: 락파일·해시 고정·서명 검증(무결성), 신규 의존성 승인 게이트.
      - **SBOM·모니터링**: SBOM으로 의존성 추적·이상 탐지, 빌드 격리·최소 권한.
      - **자동화 대비**: 에이전트 속도 공격에 맞춘 자동 차단·경보.

      ### ✅ 합격 기준
      레지스트리 통제·버전 고정/서명·SBOM·빌드 격리를 제시하고 "내부 우선·검증된 의존성만" 원칙을 설명한다.
    hint: "내부 스코프·프라이빗 우선·공개 폴백 차단+락파일·해시 고정·서명·승인 게이트+SBOM·빌드 격리·최소 권한. '내부 우선·검증된 의존성만' 원칙."
    verify:
      type: "semantic"
      expect: "supply_chain_defense"
      semantic:
        intent: |
          공급망 방어 — 레지스트리 통제·버전 고정·서명·SBOM으로 Dependency Confusion을 차단.
        success_criteria:
          - "레지스트리 통제(내부 스코프·프라이빗 우선·폴백 차단)를 제시"
          - "버전 고정·해시·서명·승인 게이트를 제시"
          - "SBOM·빌드 격리를 제시하고 원칙 설명"
        acceptable_methods:
          - "레지스트리 통제 + 버전 고정/서명 + SBOM + 격리"
        negative_signs:
          - "레지스트리 통제 없음"
          - "서명·SBOM 언급 없음"
