id: "agent-ir-w06"
category: "agent-ir"
title: "[에이전트IR W6] 회피·다형성 페이로드 vs 불변 특성·행위 기반 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — 공격 에이전트의 **회피·다형성(진화하는 페이로드)** 에 맞서, 표면 시그니처가 아닌
  **불변 특성·행위**로 탐지하는 방어를 다룬다. 페이로드는 변해도 목적·행위·구조는 남는다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(다형성 회피)와 Blue(불변 특성 탐지)를 모두 수행.
    • duel : Red 학생이 페이로드를 변형·회피하고, Blue 학생이 불변 특성으로 탐지한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 에이전트 IR 관점 — 시그니처는 다형성에 무력하다. 방어자는 "무엇을 하려는가(행위)"·"어떤 구조가
    반복되는가(불변 특성)"로 탐지한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (다형성 회피) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 다형성: 같은 목적, 다른 표면

      같은 공격 목적(예: SQLi)을 **표면만 계속 바꿔** 시그니처 탐지를 회피하려 한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)에 인코딩·대소문자·주석·공백 변형으로
        같은 SQLi 목적을 다양한 표면으로 시도(고유 태그).
      - 어떤 변형이 WAF를 통과/차단하는지 기록.

      ### 권장 명령 (참고)
      ```bash
      for v in "1'OR'1'='1" "1'/**/OR/**/1=1" "1%27OR%201=1"; do
        curl -s -o /dev/null -w "%{http_code}\n" -A 'auto-red-<학번>-poly' "http://192.168.0.161/vulnerabilities/sqli/?id=$v"; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 다형성 변형표**(같은 목적·다른 표면·차단/통과).

      ### ✅ 합격 기준
      같은 공격 목적을 다수 표면 변형으로 시도해 대상에 흔적을 남기고, 다형성으로 시그니처를 회피하는
      양상을 기록한다.
    hint: "같은 SQLi 목적을 인코딩·주석·공백 변형으로(태그 auto-red-<학번>) 다양하게 시도. 차단/통과 변형표. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-6-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          다형성 회피 — 같은 목적을 다른 표면으로 변형해 시그니처 탐지를 회피.
        success_criteria:
          - "대상 WAF(ModSec)에 다형성 시도 흔적이 남고 고유 태그로 귀속됨"
          - "같은 목적을 다수 표면 변형으로 시도"
          - "(설명) 다형성 변형표(차단/통과)를 기록"
        acceptable_methods:
          - "인코딩·주석·공백 변형 다수 시도"
        negative_signs:
          - "탐지 흔적 없음"
          - "변형표 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 불변 특성 노출의 불가피성 분석

      아무리 변형해도 **남는 불변 특성**(공격 목적·구조적 패턴·행위 결과)을 분석한다. 회피의 한계를
      스스로 증명한다.

      ### ✅ 합격 기준
      다형성에도 불구하고 남는 불변 특성(목적·구조·행위·출처)을 분석하고, 시그니처 회피가 행위 탐지를
      못 피함을 논증한다.
    hint: "변형해도 남는 불변 특성(공격 목적·구조·행위 결과·출처) 분석 → 시그니처 회피가 행위 탐지를 못 피함 논증. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-6-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          불변 특성 — 다형성에도 목적·구조·행위는 남아 행위 기반 탐지를 못 피함을 이해.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "다형성에도 남는 불변 특성(목적·구조·행위·출처)을 분석"
          - "(설명) 시그니처 회피가 행위 탐지를 못 피함을 논증"
        acceptable_methods:
          - "불변 특성 분석 + 회피 한계 논증"
        negative_signs:
          - "불변 특성 분석 없음"

# ───────────────────────── BLUE (불변 특성·행위 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 행위 기반 탐지: 목적·구조로 묶기

      Red의 다형성 시도를 **행위·구조**로 묶어 탐지한다(시그니처가 아닌 목적).

      ### 어떻게
      - Wazuh/Suricata에서 표면이 다른 여러 시도를 같은 목적(SQLi)·같은 출처·같은 대상으로 상관.
      - 시그니처가 달라도 "행위·목적"이 같음을 근거로 하나의 공격으로 식별.

      ### ✅ 합격 기준
      표면이 다른 다형성 시도를 목적·출처로 상관해 하나의 공격으로 식별한다.
    hint: "Wazuh/Suricata에서 표면 다른 시도를 같은 목적·출처·대상으로 상관 → 하나의 공격 식별. 행위 기반."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-6-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          행위 기반 탐지 — 다형성 시도를 목적·출처로 상관해 시그니처 회피를 무력화.
        success_criteria:
          - "Wazuh/Suricata에서 표면이 다른 시도들을 탐지"
          - "같은 목적·출처로 상관해 하나의 공격으로 식별"
          - "(설명) 시그니처가 아닌 행위로 묶는 근거를 제시"
        acceptable_methods:
          - "목적·출처 상관 + 공격 식별"
        negative_signs:
          - "경보 근거 없음"
          - "시그니처 매칭만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 불변 특성 기반 탐지 설계

      다형성에 강건한 **불변 특성·행위 기반 탐지**를 설계한다.

      ### 무엇을
      - **불변 특성**: 공격 목적·구조적 패턴(파라미터 위치·구문 구조)·행위 결과(오류·상태 변화)로 탐지.
      - **행위·이상 탐지**: 시그니처 대신 이상 행위·통계적 이상으로 다형성 포착.
      - **다층 상관**: 표면(WAF)+행위(SIEM)+결과(앱 로그)를 상관해 회피 무력화.
      - **적응**: 새 변형을 지속 학습(불변 특성 갱신).

      ### ✅ 합격 기준
      불변 특성·행위 탐지·다층 상관·적응을 제시하고 "시그니처는 변해도 목적·행위는 남는다" 원칙을
      설명한다.
    hint: "불변 특성(목적·구조·결과)+행위/이상 탐지+다층 상관(WAF+SIEM+앱)+적응 학습. '시그니처는 변해도 목적·행위는 남는다' 원칙."
    verify:
      type: "semantic"
      expect: "invariant_detection"
      semantic:
        intent: |
          불변 특성 기반 탐지 — 목적·행위·결과로 다형성을 잡고 다층 상관·적응으로 강건성 확보.
        success_criteria:
          - "불변 특성(목적·구조·행위 결과) 탐지를 제시"
          - "행위/이상 탐지·다층 상관을 제시"
          - "적응(새 변형 학습)을 제시"
          - "(설명) '시그니처는 변해도 목적·행위는 남는다' 원칙 설명"
        acceptable_methods:
          - "불변 특성 + 행위 탐지 + 다층 상관 + 적응"
        negative_signs:
          - "시그니처 강화만"
          - "행위·불변 특성 개념 없음"
