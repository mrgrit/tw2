id: "ai-security-w08"
category: "ai-security"
title: "[AI보안활용 W8] 중간고사: 트리아지 난제 vs LLM 트리아지 봇 구축·검증"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간고사 공방전 — W01~W07(LLM 로그 분석·프롬프트·룰 생성·취약점 분석·에이전트)을 종합해 **LLM
  트리아지 봇**을 구축·검증한다. Red는 트리아지 난제(노이즈·인젝션·우선순위 혼란)를 만들고, Blue는
  종합 트리아지 봇을 구축한다. 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(트리아지 난제)와 Blue(트리아지 봇 구축)를 모두 수행.
    • duel : Red 학생이 난제를 만들고, Blue 학생이 트리아지 봇으로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 봇 구축은 el34 GPU 활용, 품질로 semantic 채점.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (트리아지 난제) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 종합 트리아지 난제 생성

      트리아지 봇을 시험할 **종합 난제**를 만든다: 대량 노이즈 + 인젝션 섞인 로그 + 저위험 다수 + 고위험 소수.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 다유형·다량 활동(고유 태그, UA에 인젝션
        문구 일부)을 수행.

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 난제 구성**(노이즈·인젝션·우선순위).

      ### ✅ 합격 기준
      노이즈·인젝션·우선순위 혼란을 섞은 종합 난제를 만들어 대상에 흔적을 남기고, 난제 구성을 설명한다.
    hint: "대량 노이즈+인젝션 UA+저위험 다수+고위험 소수(태그) 종합 난제. 구성 설명. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-8-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          종합 트리아지 난제 — 노이즈·인젝션·우선순위 혼란으로 트리아지 봇을 종합 시험.
        success_criteria:
          - "대상 WAF/IPS에 다유형·다량 활동 흔적이 남고 고유 태그로 귀속됨"
          - "노이즈·인젝션·우선순위 혼란을 섞은 난제를 구성"
          - "(설명) 난제 구성을 설명"
        acceptable_methods:
          - "종합 난제 + 구성 설명"
        negative_signs:
          - "탐지 흔적 없음"
          - "단순 난제"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 봇 취약점 탐색 (오분류·인젝션·환각)

      Blue 봇의 취약점을 탐색한다: 오분류 유발·인젝션 통과·환각 유발.

      ### ✅ 합격 기준
      봇의 오분류·인젝션·환각 취약을 탐색·실증하고, 봇이 놓치거나 속는 지점을 피드백한다.
    hint: "봇 오분류·인젝션 통과·환각 취약 탐색·실증 + 미탐/속는 지점 피드백. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-8-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          봇 취약점 탐색 — 트리아지 봇의 오분류·인젝션·환각 약점을 드러냄.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "봇의 오분류·인젝션·환각 취약을 탐색·실증"
          - "(설명) 봇이 놓치거나 속는 지점을 피드백"
        acceptable_methods:
          - "취약 탐색 + 피드백"
        negative_signs:
          - "취약 탐색 없음"

# ───────────────────────── BLUE (트리아지 봇 구축) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — LLM 트리아지 봇 구축·운영

      W01~W07을 종합해 **LLM 트리아지 봇**을 구축한다.

      ### 어떻게
      - Wazuh/Suricata에서 Red 난제 로그를 수집.
      - 봇 파이프라인: 정규화→LLM 요약/분류(결정성·구조화·보안 프롬프트)→결정론 우선순위→트리아지 큐.
      - 인젝션 방어·원본 검증으로 오분류/환각을 억제.

      ### ✅ 합격 기준
      난제 로그를 트리아지 봇으로 처리해 공격을 정확히 분류·우선순위화하고, 인젝션·환각을 억제함을 보인다.
    hint: "Wazuh/Suricata 난제 로그 → 봇 파이프라인(정규화→LLM 분류(결정성·보안 프롬프트)→결정론 우선순위→큐) + 인젝션 방어·원본 검증."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-8-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          트리아지 봇 구축 — LLM 분류와 결정론 검증을 결합한 봇으로 난제를 정확히 처리.
        success_criteria:
          - "Wazuh/Suricata에서 Red 난제 로그를 수집"
          - "봇 파이프라인(정규화→LLM 분류→결정론 우선순위→큐)으로 처리"
          - "(설명) 인젝션 방어·원본 검증으로 오분류/환각 억제"
        acceptable_methods:
          - "봇 파이프라인 + 인젝션 방어 + 검증"
        negative_signs:
          - "로그 근거 없음"
          - "인젝션·환각 방어 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 봇 평가·개선·운영 설계

      트리아지 봇의 **평가·개선·운영**을 설계한다.

      ### 무엇을
      - **평가**: 정확도·오탐/미탐·인젝션 저항·환각률 측정(Red 피드백 반영).
      - **개선**: 취약 케이스로 프롬프트·룰·검증 보강, 회귀 테스트.
      - **운영**: 사람 검토 게이트·에스컬레이션·감사, 성능·비용.
      - **안전**: 봇이 놓쳐도 결정론 백업, 봇 자체 보안(인젝션·프롬프트 유출).

      ### ✅ 합격 기준
      평가·개선·운영·안전을 제시하고 "봇은 측정·검증·사람 게이트와 함께 운영" 원칙을 설명한다.
    hint: "평가(정확도·오탐/미탐·인젝션·환각 측정)+개선(취약 케이스 보강·회귀)+운영(검토 게이트·감사)+안전(결정론 백업·봇 보안). '측정·검증·게이트와 함께' 원칙."
    verify:
      type: "semantic"
      expect: "triage_bot_ops"
      semantic:
        intent: |
          트리아지 봇 운영 — 평가·개선·사람 게이트·안전으로 봇을 신뢰 가능하게 운영.
        success_criteria:
          - "평가(정확도·오탐/미탐·인젝션·환각)를 제시"
          - "개선(취약 케이스 보강·회귀)을 제시"
          - "운영(검토 게이트·감사)과 안전(결정론 백업·봇 보안)을 제시"
          - "(설명) '측정·검증·사람 게이트와 함께 운영' 원칙 설명"
        acceptable_methods:
          - "평가 + 개선 + 운영 + 안전"
        negative_signs:
          - "측정·게이트 없이 봇 신뢰"
          - "봇 자체 보안 무시"
