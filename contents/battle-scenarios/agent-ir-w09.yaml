id: "agent-ir-w09"
category: "agent-ir"
title: "[에이전트IR W9] 실시간 탐지 룰 엔지니어링 vs 탐지 회피·오탐 유발"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — AI 속도에 맞춘 **실시간 탐지 룰 엔지니어링**(정확도·오탐·성능의 균형)과, 그것을
  회피·오탐 유발로 무력화하려는 공격을 다룬다. 좋은 룰은 빠르고 정확하며 오탐이 적어야 한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(탐지 회피·오탐 유발)와 Blue(실시간 탐지 룰)를 모두 수행.
    • duel : Red 학생이 룰을 회피·오탐 유발하고, Blue 학생이 강건한 룰을 설계한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (탐지 회피·오탐 유발) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 탐지 룰 경계 탐색

      대상의 탐지 룰(WAF/IPS)이 **어디서 트리거되는지** 탐색해 경계를 매핑한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 강도·형태를 조절한 요청(고유 태그)을
        보내 탐지 트리거 경계를 매핑(무엇이 탐지되고 무엇이 통과).

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 탐지 경계 맵**(트리거/통과 조건).

      ### ✅ 합격 기준
      요청을 조절해 탐지 룰의 트리거 경계를 매핑하고, 룰의 강점·약점을 분석한다.
    hint: "강도·형태 조절 요청(태그)으로 탐지 트리거/통과 경계 매핑. 룰 강점·약점 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-9-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          탐지 룰 경계 탐색 — 룰이 트리거되는 조건을 매핑해 강점·약점을 이해.
        success_criteria:
          - "대상 IPS/WAF에 탐색 흔적이 남고 고유 태그로 귀속됨"
          - "탐지 트리거/통과 경계를 매핑"
          - "(설명) 룰의 강점·약점을 분석"
        acceptable_methods:
          - "강도 조절 탐색 + 경계 맵"
        negative_signs:
          - "탐지 흔적 없음"
          - "경계 맵 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 오탐 유발·경보 피로 시도

      정상처럼 보이는 활동으로 **오탐(false positive)** 을 유발하거나 대량 경보로 **경보 피로**를
      노리는 시도를 분석·실증한다(정상 트래픽 위장).

      ### ✅ 합격 기준
      오탐 유발·경보 피로 시도(정상 위장·대량 저위험 활동)를 실증하고, 룰의 정밀도(precision) 취약을
      분석한다.
    hint: "정상 위장·대량 저위험 활동(태그)으로 오탐/경보 피로 유발 시도 + 룰 정밀도 취약 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-9-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          오탐 유발 — 정상 위장·대량 활동으로 룰 정밀도를 공략해 경보 피로를 노림.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "오탐 유발·경보 피로 시도를 실증"
          - "(설명) 룰 정밀도 취약을 분석"
        acceptable_methods:
          - "정상 위장·대량 활동 + 정밀도 분석"
        negative_signs:
          - "실증·분석 없음"

# ───────────────────────── BLUE (실시간 탐지 룰) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 실시간 탐지 룰 작성·검증

      Red 활동을 잡는 **실시간 탐지 룰**을 작성·검증한다(Wazuh/Suricata 관점).

      ### 어떻게
      - Wazuh/Suricata에서 Red 활동을 잡는 룰(패턴·상관·임계)을 설계하고, 실제 경보로 검증.
      - 탐지율(recall)과 오탐(precision)을 함께 고려.

      ### ✅ 합격 기준
      Red 활동을 잡는 탐지 룰을 설계·검증하고, 탐지율·오탐 균형을 근거로 제시한다.
    hint: "Wazuh/Suricata 룰(패턴·상관·임계)로 Red 활동 탐지 검증 + 탐지율/오탐 균형 근거."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-9-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          실시간 탐지 룰 — Red 활동을 잡는 룰을 검증하고 탐지율·오탐 균형을 고려.
        success_criteria:
          - "Wazuh/Suricata에서 Red 활동을 잡는 룰을 설계·검증(실제 경보)"
          - "탐지율(recall)과 오탐(precision)을 함께 고려"
          - "(설명) 균형 근거를 제시"
        acceptable_methods:
          - "룰 설계 + 검증 + 균형 근거"
        negative_signs:
          - "경보 근거 없음"
          - "오탐 고려 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 탐지 엔지니어링: 정확도·오탐·성능 균형 설계

      AI 속도에 맞는 **탐지 엔지니어링 원칙**을 설계한다.

      ### 무엇을
      - **정확도·오탐 균형**: 룰 정밀도/재현율 튜닝, 오탐 억제(화이트리스트·컨텍스트), 경보 피로 방지.
      - **성능·실시간성**: 대량 로그를 실시간 처리(효율적 룰·상관·샘플링 없이 놓치지 않기).
      - **회피 강건성**: 불변 특성·행위 기반으로 회피에 강건.
      - **룰 수명주기**: 검증·튜닝·회귀 테스트·버전 관리.

      ### ✅ 합격 기준
      정확도·오탐 균형·성능·회피 강건성·룰 수명주기를 제시하고 "빠르고 정확하며 오탐 적은 룰" 원칙을
      설명한다.
    hint: "정확도/오탐 균형(정밀도·재현율 튜닝·경보 피로 방지)+실시간 성능+회피 강건성(불변 특성)+룰 수명주기(검증·회귀). '빠르고 정확·오탐 적게' 원칙."
    verify:
      type: "semantic"
      expect: "detection_engineering"
      semantic:
        intent: |
          탐지 엔지니어링 — 정확도·오탐·성능·강건성·수명주기를 균형 있게 설계.
        success_criteria:
          - "정확도·오탐 균형(정밀도/재현율·경보 피로 방지)을 제시"
          - "실시간 성능과 회피 강건성을 제시"
          - "룰 수명주기(검증·튜닝·회귀)를 제시"
          - "(설명) '빠르고 정확하며 오탐 적은 룰' 원칙 설명"
        acceptable_methods:
          - "균형 + 성능 + 강건성 + 수명주기"
        negative_signs:
          - "탐지율만·오탐/성능 무시"
          - "수명주기 언급 없음"
