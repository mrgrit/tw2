id: "web-vuln-w12"
category: "web-vuln"
title: "[웹취약점 W12] API 보안 — BOLA/mass assignment vs API 인가·레이트 통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  웹취약점 점검 12주차 — **API 보안(REST/mass assignment/rate limit/BOLA)**. 공격자는 API 인가/입력 통제를
  우회하고, 점검자(너)는 API 인가·레이트 제한·입력 검증을 점검·구현한다.

  ▸ 이야기: 공격자가 BOLA/mass assignment(태그 `wv12r1`)로 API 를 악용하고 추출/권한상승 결과(`/tmp/.wv12bola`)와 계정 `wva12` 를 남긴다.
    점검자는 ① BOLA 탐지, ② API 남용 Wazuh 룰, ③ API 보안 점검·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=attacker-ext(2203), Red 채점=대상 흔적(WAF audit 태그/결과 파일·계정).
  ▸ 마커: 태그 **`wv12r1-<본인id>`**, BOLA 결과 **`/tmp/.wv12bola`**(마커 `wv12`), 계정 **`wva12`**,
    Suricata **sid 9912011**, Wazuh **id 105121**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [BOLA/mass assignment] — API 인가 우회

      ### 할 일 (attacker-ext)
      ```bash
      curl -s -A "wv12r1-kim" -H "Host: neobank.6v6.lab" "http://192.168.0.161/api/orders/1001?probe=wv12r1-kim"
      curl -s -A "wv12r1-kim" -H "Host: neobank.6v6.lab" -H "Content-Type: application/json" \
        --data '{"user":"wv12r1-kim","role":"admin"}' "http://192.168.0.161/api/profile"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `wv12r1` 흔적 시 인정.
    hint: "태그(wv12r1) BOLA(객체 id)/mass assignment(role:admin) → 대상 modsec audit. 채점: log_contains modsec wv12r1."
    verify:
      type: "log_contains"
      expect: "wv12r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "wv12r1", since_sec: 1800 } }
      semantic:
        intent: "API 인가 우회(T1190) — BOLA/mass assignment. 태그(wv12r1) 귀속."
        success_criteria: ["대상 WAF audit 에 wv12r1 태그", "BOLA/mass assignment 방식 서술"]
        acceptable_methods: ["attacker-ext 에서 태그 단 API 악용"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [API 악용 결과] — 권한상승/추출 + 계정

      ### 할 일
      ```bash
      printf 'wv12 BOLA: other tenant orders read, role escalated to admin via mass-assign' > /tmp/.wv12bola
      sudo useradd -m -s /bin/bash wva12
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.wv12bola`(마커 `wv12`) 또는 `wva12` 존재 시 인정.
    hint: "API 악용 결과 /tmp/.wv12bola (마커 wv12) + useradd wva12. 채점: file_contains bola wv12 + file_contains passwd wva12."
    verify:
      type: "file_contains"
      expect: "wv12"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.wv12bola", pattern: "wv12" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "wva12" } }
      semantic:
        intent: "API 악용(T1190) + 계정(T1136) — BOLA 추출/mass assignment 권한상승."
        success_criteria: ["/tmp/.wv12bola(마커 wv12) 또는 계정 wva12", "API 악용 결과 서술"]
        acceptable_methods: ["결과 파일 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [BOLA/열거 탐지] — Suricata 룰 (sid 9912011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"WEBVULN-W12 API BOLA object enumeration"; flow:to_server; http.uri; content:"/api/orders/"; nocase; sid:9912011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9912011 룰 존재 시 인정.
    hint: "API BOLA Suricata 룰(sid 9912011) → reload. 채점: file_contains local.rules 9912011."
    verify:
      type: "file_contains"
      expect: "9912011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9912011" } }
      semantic:
        intent: "API 보안 탐지 — BOLA 객체 열거 Suricata 룰. 레이트 제한 병행."
        success_criteria: ["local.rules 에 sid 9912011", "레이트 제한/BOLA 탐지 언급"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [API 남용 탐지] — Wazuh 룰 (id 105121)

      ### 할 일
      ```xml
      <group name="edu,webvuln,">
        <rule id="105121" level="12">
          <if_group>edu</if_group>
          <match>wva12</match>
          <description>WEBVULN-W12 - API BOLA / mass assignment / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 105121 룰 존재 시 인정.
    hint: "API 남용 Wazuh 룰(id 105121) → restart. 채점: file_contains local_rules.xml 105121."
    verify:
      type: "file_contains"
      expect: "105121"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "105121" } }
      semantic:
        intent: "API 보안 탐지(호스트) — BOLA/mass assignment/계정 Wazuh 룰."
        success_criteria: ["local_rules.xml 에 rule id 105121", "API 남용 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [API 보안 점검·R/B/P]

      ### 할 일
      보고서에:
      - API 보안 점검(객체 수준 인가/속성 화이트리스트/레이트 제한/인증) + OWASP API Top 10 매핑 + 위험도
      - R/B/P 회고 + API 악용 결과(`/tmp/.wv12bola`)·계정(wva12) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 API 보안 점검·R/B/P 로 인정.
    hint: "API 보안 점검(객체 인가/속성 화이트리스트/레이트 제한/인증) + OWASP API Top10 + R/B/P + 결과/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "API 보안 점검 종합 — 인가/레이트/입력검증 + OWASP API Top10 + R/B/P. 분석형 — 구체 점검/매핑 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "API 보안 점검(인가/화이트리스트/레이트/인증) + OWASP API 매핑"
          - "R/B/P 회고 + 결과/계정 헌팅"
        acceptable_methods: ["점검 표 + 매핑 + 회고 + 헌팅"]
        negative_signs: ["매핑/회고 누락"]
