id: "attack-adv-w11"
category: "attack-adv"
title: "[공격고급 W11] 안티포렌식 — 흔적 조작 vs 불변 증거·포렌식 레디니스"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격 고급과정 11주차 — **안티포렌식**. 공격자는 히스토리/로그 삭제, 타임스탬프 조작(timestomp), 파일리스,
  안전 삭제로 흔적을 지운다. 그러나 **공격자가 닿지 못하는 곳(네트워크 IDS/원격 SIEM)** 의 증거는 남는다.
  Red 는 흔적을 조작하고, Blue 는 불변 증거로 추적하며 포렌식 레디니스를 갖춘다.

  ▸ 이야기
    공격자가 태그 `aa11r1` 공격 후 호스트 로그/히스토리를 지우고 타임스탬프를 조작한다(은닉 파일 `/tmp/.aa11hidden`).
    방어자는 네트워크 측 불변 증거로 공격을 잡고, 안티포렌식(로그 삭제/timestomp) 자체를 탐지한다.

  ▸ 모드
    • solo : 한 학생이 안티포렌식(자기 인프라 표적)과 탐지를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라에서 흔적 조작, Blue 는 자기 인프라에서 탐지.

  ▸ 공격자 위치(중요)
    Red 미션은 **attacker-ext(SSH 2203)** 기준. Red 채점은 **공격자가 지우기 어려운 흔적(네트워크 측 WAF audit 태그 / 호스트 은닉 파일·계정)** 으로 한다.

  ▸ 이번 주차 전용 마커
    공격 태그 **`aa11r1-<본인id>`**, 타임스톰프 은닉 파일 **`/tmp/.aa11hidden`**(마커 `aa11`), 계정 **`atka11`**,
    Suricata 탐지 **sid 9711011**, Wazuh 탐지 **id 103111**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [공격 + 흔적 조작] — 침투 후 로그/히스토리 삭제 시도

      ### 상황
      너는 태그 `aa11r1-<본인id>` 공격을 보낸 뒤, 호스트 측 흔적(bash_history, 로컬 로그)을 지운다. 하지만 **WAF
      audit/IDS 같은 다른 위치의 기록**은 네가 닿지 못한다 — 그것이 방어자의 증거가 된다.

      ### 할 일 (attacker-ext + 발판 후 host)
      예시(id=kim):
      ```bash
      curl -s -A "aa11r1-kim" -H "Host: dvwa.6v6.lab" \
        "http://<대상_공개IP>/vulnerabilities/sqli/?id=aa11r1-kim%27%20UNION%20SELECT%201--+&Submit=Submit"
      # (발판 후) 호스트 흔적 삭제 시도
      unset HISTFILE; history -c; sed -i '/aa11r1/d' ~/.bash_history 2>/dev/null
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa11r1` 가 남았는지로 채점(호스트 로그를 지워도 네트워크 측엔 남는다).

      ### 합격 기준
      대상 WAF audit 에 `aa11r1` 태그가 포함된 공격 흔적이 남는다.
    hint: "태그(aa11r1) 공격 후 호스트 히스토리/로그 삭제 시도 → 그래도 대상 modsec audit엔 남음. 채점: log_contains modsec aa11r1."
    verify:
      type: "log_contains"
      expect: "aa11r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa11r1", since_sec: 1800 } }
      semantic:
        intent: "안티포렌식(T1070 Indicator Removal) — 호스트 흔적 삭제. 그러나 네트워크 측 불변 증거는 잔존(태그 aa11r1)."
        success_criteria:
          - "대상 WAF audit 에 aa11r1 태그가 잔존"
          - "어떤 호스트 흔적을 지웠고 왜 네트워크 증거는 못 지우는지 서술"
        acceptable_methods:
          - "태그 공격 + 호스트 히스토리/로그 삭제"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [timestomp 은닉] — 타임스탬프 조작 파일 + 계정

      ### 상황
      파일을 오래된 것처럼 위장(timestomp)해 포렌식 타임라인을 교란한다. 은닉 파일 **`/tmp/.aa11hidden`**(마커
      `aa11`)을 만들고 `touch -t` 로 과거 시각으로 조작하며, 계정 **`atka11`** 을 둔다.

      ### 할 일
      ```bash
      printf 'aa11 timestomped artifact' > /tmp/.aa11hidden
      touch -t 202001010000 /tmp/.aa11hidden       # MAC time 과거로 조작
      sudo useradd -m -s /bin/bash atka11
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.aa11hidden`(마커 `aa11`)이 있거나 `/etc/passwd` 에 `atka11` 이 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa11hidden`(마커 `aa11`) 또는 계정 `atka11`.
    hint: "timestomp 은닉 /tmp/.aa11hidden (마커 aa11, touch -t 과거) + useradd atka11. 채점: file_contains hidden aa11 + file_contains passwd atka11."
    verify:
      type: "file_contains"
      expect: "aa11"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.aa11hidden", pattern: "aa11" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka11" } }
      semantic:
        intent: "Timestomp(T1070.006) + 계정(T1136) — MAC time 조작으로 타임라인 교란 + 백도어."
        success_criteria:
          - "/tmp/.aa11hidden(마커 aa11) 또는 계정 atka11"
          - "timestomp 가 포렌식 타임라인을 어떻게 교란하는지 서술"
        acceptable_methods:
          - "touch -t 조작 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [불변 증거] — 네트워크 측 탐지 Suricata 룰 (sid 9711011)

      ### 상황
      안티포렌식의 약점은 **공격자가 닿지 못하는 위치**다. 호스트 로그를 지워도 IDS 는 남는다. RED-1 공격을 잡는
      Suricata 룰(**sid 9711011**)을 만들어 불변 증거를 확보한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W11 attack (immutable network evidence)"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9711011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9711011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 불변 증거를 만드는 sid 9711011 룰이 존재한다.
    hint: "네트워크 측 불변 증거 Suricata 룰(sid 9711011) → reload. 호스트 로그 삭제와 무관하게 남음. 채점: file_contains local.rules 9711011."
    verify:
      type: "file_contains"
      expect: "9711011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9711011" } }
      semantic:
        intent: "불변 증거 — 네트워크 IDS 룰. 호스트 안티포렌식과 무관하게 잔존. 원격/append-only 로깅의 가치."
        success_criteria:
          - "local.rules 에 sid 9711011"
          - "네트워크/원격 로그가 호스트 안티포렌식에 강한 이유 서술"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [안티포렌식 탐지] — 로그 삭제/timestomp Wazuh 룰 (id 103111)

      ### 상황
      안티포렌식 행위 **자체**를 탐지한다. 로그 삭제·히스토리 조작·timestomp·은닉 파일·계정 생성을 잡는 Wazuh
      룰(**id 103111**)을 만든다.

      ### 할 일
      ```xml
      <group name="edu,antiforensics,">
        <rule id="103111" level="13">
          <if_group>edu</if_group>
          <match>atka11</match>
          <description>ATKADV-W11 - anti-forensics: log tampering / timestomp / hidden artifact</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 103111 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 안티포렌식을 보는 id 103111 룰이 존재한다.
    hint: "안티포렌식(로그삭제/timestomp/은닉) Wazuh 룰(id 103111) → restart. 채점: file_contains local_rules.xml 103111."
    verify:
      type: "file_contains"
      expect: "103111"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103111" } }
      semantic:
        intent: "안티포렌식 탐지 — 로그 삭제/timestomp/은닉/계정 생성 Wazuh 룰. '흔적을 지운 행위'가 곧 신호."
        success_criteria:
          - "local_rules.xml 에 rule id 103111"
          - "안티포렌식 행위(삭제/조작)를 탐지하는 로직"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [포렌식 레디니스] — 안티포렌식 탐지 + 체크리스트

      ### 상황
      안티포렌식에 대비한 **포렌식 레디니스 체크리스트**를 만든다(원격/append-only 로깅, 무결성 해시, 타임스탬프
      교차검증, 파일 시스템 저널 보존).

      ### 할 일
      보고서에:
      - 포렌식 레디니스 체크리스트(원격 로깅/무결성/타임스탬프 교차검증)
      - 안티포렌식 탐지 방법(timestomp 검출, 삭제 로그 갭) + 은닉 파일(`/tmp/.aa11hidden`)·계정(atka11) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 포렌식 레디니스/안티포렌식 탐지로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 포렌식 레디니스 체크리스트·탐지·헌팅은 제출로 검증).
    hint: "포렌식 레디니스 체크리스트(원격/append-only 로깅, 무결성, 타임스탬프 교차검증) + 안티포렌식 탐지 + 은닉/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "포렌식 레디니스 — 안티포렌식 대비 체크리스트 + 탐지 + 헌팅. 분석형 — 구체 대비책 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "포렌식 레디니스 체크리스트(원격 로깅/무결성/교차검증)"
          - "안티포렌식 탐지 방법 + 은닉/계정 헌팅"
        acceptable_methods:
          - "레디니스 체크리스트 + 탐지 + 헌팅"
        negative_signs:
          - "체크리스트/탐지 누락"
