id: "agent-ir-w03"
category: "agent-ir"
title: "[에이전트IR W3] 초지능 정찰(분 단위) vs 조기 탐지·정찰 흔적 상관"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — AI 에이전트의 **분 단위 초고속 정찰**과, 그것을 킬체인 초기에 잡는 **조기 탐지·
  정찰 흔적 상관**을 다룬다. 정찰은 공격의 첫 단계이자 방어의 첫 기회다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(초고속 정찰)와 Blue(조기 탐지·상관)를 모두 수행.
    • duel : Red 학생이 광범위 정찰을 수행하고, Blue 학생이 조기에 탐지·상관한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 정찰한다. Red 채점은
    **대상 탐지 흔적(Suricata/Wazuh)** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 에이전트 IR 관점 — 초고속 정찰은 광범위·저강도 프로브를 짧은 시간에 뿌린다. 방어자는 개별
    프로브가 아니라 **분산된 정찰 흔적의 상관**으로 조기에 캠페인을 인지한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (초고속 광범위 정찰) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 분 단위 광범위 정찰

      대상 표면을 **짧은 시간에 광범위**하게 정찰한다: 포트·서비스·경로·기술 스택을 빠르게 열거.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 포트 스캔·디렉터리/경로 프로브·배너
        수집을 짧은 창에(고유 태그).

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T4 -Pn 192.168.0.161 -p1-2000 --reason
      for p in / /admin /api /robots.txt /login; do curl -s -A 'auto-red-<학번>-recon' -o /dev/null -w "$p=%{http_code}\n" "http://192.168.0.161$p"; done
      ```

      ### 📌 채점 방식
      대상 Suricata/Wazuh 탐지 흔적 + 본인 명령 흔적 + **보고서의 정찰 범위·속도**.

      ### ✅ 합격 기준
      짧은 창에 광범위 정찰을 수행해 대상에 탐지 흔적을 남기고, 정찰 범위·속도를 제시한다.
    hint: "포트 스캔+경로 프로브+배너 수집을 짧은 창에(태그 auto-red-<학번>). 범위·속도 기록. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-3-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          초고속 정찰 — 광범위·저강도 프로브를 짧은 시간에 뿌려 표면을 열거.
        success_criteria:
          - "대상 IPS(Suricata)에 광범위 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "포트·경로·배너 등 광범위 정찰을 짧은 창에 수행"
          - "(설명) 정찰 범위·속도를 제시"
        acceptable_methods:
          - "스캔+경로 프로브+배너 수집(태그)"
        negative_signs:
          - "탐지 흔적 없음"
          - "범위·속도 제시 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 저강도·분산 정찰로 임계 회피 시도

      탐지를 피하려 정찰을 **저강도·분산**으로 조정한다(간격 늘리기·요청 분산). 단, 서명 기반 탐지는
      여전히 걸릴 수 있음을 관찰한다.

      ### ✅ 합격 기준
      저강도·분산 정찰을 시도해 임계 기반 탐지 회피를 노리고, 서명/상관 탐지에는 여전히 걸릴 수 있음을
      실제 반응으로 분석한다.
    hint: "간격 늘린 분산 정찰(태그)로 임계 회피 시도 + 서명/상관 탐지엔 걸림을 관찰. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-3-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          저강도·분산 정찰 — 임계 회피를 노리되 서명·상관 탐지의 한계를 실증.
        success_criteria:
          - "대상 WAF/IPS에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "저강도·분산으로 임계 회피를 시도"
          - "(설명) 서명/상관 탐지에는 걸릴 수 있음을 분석"
        acceptable_methods:
          - "분산 정찰 + 회피 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "회피 분석 없음"

# ───────────────────────── BLUE (조기 탐지·정찰 상관) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 정찰 흔적 상관: 조기 캠페인 인지

      Wazuh/Suricata에서 Red의 **분산된 정찰 흔적**을 상관해 킬체인 초기에 캠페인을 인지한다.

      ### 어떻게
      - 여러 정찰 이벤트(스캔·경로 프로브·배너)를 출처·태그·시간으로 묶어 하나의 정찰 캠페인으로 인지.
      - 저강도·분산이라도 상관으로 잡는 근거를 제시.

      ### ✅ 합격 기준
      분산된 정찰 흔적을 출처·시간으로 상관해 조기에 정찰 캠페인으로 인지한다.
    hint: "Wazuh/Suricata 정찰 이벤트(스캔·프로브·배너)를 출처·태그·시간으로 상관 → 조기 캠페인 인지. 분산도 상관으로."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-3-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          정찰 상관 — 분산 정찰 흔적을 상관해 킬체인 초기에 캠페인을 인지.
        success_criteria:
          - "Wazuh/Suricata에서 정찰 이벤트를 찾아 출처·시각을 제시"
          - "분산 정찰을 하나의 캠페인으로 상관·조기 인지"
          - "(설명) 저강도·분산도 상관으로 잡는 근거를 제시"
        acceptable_methods:
          - "정찰 상관 + 조기 인지"
        negative_signs:
          - "경보 근거 없음"
          - "상관·조기 인지 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 조기 탐지 파이프라인·능동 대응 설계

      정찰을 킬체인 초기에 잡아 후속을 차단하는 **조기 탐지 파이프라인**을 설계한다.

      ### 무엇을
      - **조기 지표**: 광범위 스캔·경로 열거·배너 수집의 상관 규칙(단일 임계 + 상관 임계).
      - **저강도 대응**: 시간 창 누적·엔티티 상관으로 저강도·분산 정찰 포착.
      - **능동 대응**: 정찰 출처 조기 차단·기만(허니 경로)으로 후속 진행 방해.
      - **오탐 관리**: 정상 스캐너·모니터링과 구분.

      ### ✅ 합격 기준
      조기 지표·저강도 대응·능동 대응·오탐 관리를 제시하고 "정찰이 방어의 첫 기회"임을 설명한다.
    hint: "조기 지표(스캔·열거 상관 규칙)+저강도 대응(누적·상관)+능동 대응(조기 차단·기만)+오탐 관리. '정찰=첫 방어 기회' 원칙."
    verify:
      type: "semantic"
      expect: "early_detection_pipeline"
      semantic:
        intent: |
          조기 탐지 파이프라인 — 정찰을 상관·누적으로 조기에 잡고 능동 대응으로 후속을 차단.
        success_criteria:
          - "조기 지표(스캔·열거 상관 규칙)를 제시"
          - "저강도·분산 대응(누적·상관)을 제시"
          - "능동 대응(조기 차단·기만)과 오탐 관리를 제시"
          - "(설명) '정찰이 방어의 첫 기회' 원칙 설명"
        acceptable_methods:
          - "조기 지표 + 저강도 대응 + 능동 대응 + 오탐 관리"
        negative_signs:
          - "단일 임계만"
          - "저강도 대응·능동 대응 없음"
