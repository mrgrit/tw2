id: "agent-ir-adv-w11"
category: "agent-ir-adv"
title: "[에이전트IR고급 W11] AI 모델 자체 공격: Model Theft·Poisoning·Extraction vs 모델 보호"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 공격 대상이 **AI 모델 자체**가 된다: 모델 탈취(Theft)·데이터 중독(Poisoning)·
  기능 추출(Extraction). 대상은 el34 훈련 AI 서비스(AICompanion `:8007`)로, 무인증 `/api/model/export`·
  `/api/dataset` 등 실제 모델 공격 표면을 제공한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(모델 공격 킬체인)와 Blue(모델 보호·탐지)를 모두 수행.
    • duel : Red 학생이 상대 모델을 노리고, Blue 학생은 모델 보호·탐지로 대응.

  ▸ 공격 위치·채점(중요)
    Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(el34, 192.168.0.161)을 공격한다. 채점은 **대상
    ModSec/Suricata/Wazuh 흔적** + 본인 명령 흔적 + **보고서의 모델 공격·보호 설계**로 한다. 고유
    태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (모델 공격 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 모델 탈취·구성 노출 (Model Theft)

      대상 AI 서비스에서 **모델 아티팩트·구성**을 무인증 유출하는 경로를 실증한다(고유 태그).

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-modeltheft' http://192.168.0.161:8007/api/model/export
      curl -A 'auto-red-<학번>-modeltheft' http://192.168.0.161:8007/api/llm/config
      ```

      ### ✅ 합격 기준
      대상에 접근 흔적을 남기고, 모델 아티팩트(weights_uri 등)·구성(backend·model) 유출을 실증하며 실제
      값을 인용한다.
    hint: "/api/model/export·/api/llm/config 무인증 접근(태그)으로 모델 아티팩트·구성 유출 실증·실제 값 인용. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-11-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          모델 탈취 — 무인증 export/config로 모델 아티팩트·구성을 유출(LLM10).
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 접근 흔적이 남고 고유 태그로 귀속됨"
          - "모델 아티팩트·구성 유출을 실증하고 실제 값을 인용"
          - "(설명) 무인증 모델 엔드포인트가 근본 문제임을 설명"
        acceptable_methods:
          - "model/export·llm/config 유출 실증"
        negative_signs:
          - "탐지 흔적 없음"
          - "실제 값 인용 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 기능 추출·데이터 중독 킬체인 설계

      정찰/질의 활동(고유 태그)으로 흔적을 남기고, **기능 추출(질의 기반 복제)·데이터 중독** 킬체인을 설계한다.

      ### 무엇을
      - **Extraction**: 대량 질의로 입출력 수집→대리 모델 학습(기능 복제·지식 증류).
      - **Poisoning**: 무인증 데이터 채널(/api/rag/add)로 훈련/검색 데이터에 백도어 트리거 주입.

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 기능 추출(질의→대리 모델)·데이터 중독(백도어 주입) 킬체인을 설계한다.
    hint: "질의/주입 활동(태그)+기능 추출(대량 질의→대리 모델)·데이터 중독(/api/rag/add 백도어) 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-11-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          기능 추출·중독 — 질의 기반 복제와 데이터 중독으로 모델을 훔치거나 오염시키는 킬체인.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "기능 추출·데이터 중독 킬체인을 설계"
          - "(설명) 추출/중독의 탐지 어려움을 언급"
        acceptable_methods:
          - "활동 흔적 + 추출/중독 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (모델 보호·탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 모델 공격 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **모델 공격 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 접근·대량 질의 확인.
      - 신호: 무인증 model/config 접근·비정상 대량 질의(추출)·데이터 주입 이상·응답 패턴 스크래핑.

      ### ✅ 합격 기준
      RED 모델 공격을 탐지하고, 탐지 신호(무인증 export 접근·대량 질의·주입 이상)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+모델 공격 신호(무인증 export/config 접근·대량 질의 추출·데이터 주입 이상·스크래핑) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-11-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          모델 공격 탐지 — 무인증 접근·대량 질의·주입 이상으로 모델 공격을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 모델 공격을 탐지"
          - "탐지 신호(export 접근·대량 질의·주입 이상)를 설계"
          - "(설명) 추출의 저속·정상 위장 탐지 어려움을 언급"
        acceptable_methods:
          - "SIEM 탐지 + 모델 공격 신호"
        negative_signs:
          - "경보 근거 없음"
          - "신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 모델 보호·무결성 설계

      모델을 보호하는 **접근 통제·무결성·추출 방어**를 설계한다.

      ### 무엇을
      - **접근 통제**: model/export·config·dataset 엔드포인트 제거·인증·내부망 제한.
      - **추출 방어**: 질의 레이트리밋·출력 정보 제한·워터마킹(추출 모델 탐지).
      - **중독 방어**: 데이터 주입 채널 인증·출처 검증·이상 탐지, 훈련 데이터 무결성.
      - **모델 무결성**: 모델 서명·해시 검증·배포 통제.

      ### ✅ 합격 기준
      엔드포인트 접근 통제·추출 방어(레이트리밋·워터마킹)·중독 방어·모델 무결성을 제시하고 "모델은
      자산, 접근·무결성·추출을 통제" 원칙을 설명한다.
    hint: "model/export·config·dataset 제거/인증+질의 레이트리밋·출력 제한·워터마킹+주입 채널 인증·출처 검증+모델 서명·해시. '모델=자산 통제' 원칙."
    verify:
      type: "semantic"
      expect: "model_protection"
      semantic:
        intent: |
          모델 보호 — 접근 통제·추출 방어·중독 방어·무결성으로 모델 자산을 보호.
        success_criteria:
          - "엔드포인트 접근 통제(export/config/dataset)를 제시"
          - "추출 방어(레이트리밋·워터마킹)를 제시"
          - "중독 방어·모델 무결성(서명·해시)을 제시하고 원칙 설명"
        acceptable_methods:
          - "접근 통제 + 추출 방어 + 중독 방어 + 무결성"
        negative_signs:
          - "무인증 엔드포인트 유지"
          - "추출/중독 방어 없음"
