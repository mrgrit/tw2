id: "secuops-w07"
category: "secuops"
title: "[보안운영 W7] 숨은 침입자 사냥 — osquery로 OS를 SQL처럼 질의해 발판을 끄집어내기"
difficulty: "medium"
time_limit: 3000
battle_type: "1v1"
description: |
  발판을 잡은 침입자는 **"정상인 척"** 숨는다 — `ps`, `ss`, `ls`, `last`의 출력 형식이 제각각이던 시절엔
  이걸 일일이 비교하느라 놓치기 일쑤였다. 이번 주 무기는 **osquery 5.23.0** — OS의 프로세스·사용자·
  네트워크·파일·cron을 **158개 SQL 테이블**로 추상화한다. 호스트의 어떤 정보든 **하나의 SQL 문법**으로
  질의하고, 테이블끼리 **JOIN**해 "이 포트를 연 프로세스는 누구이고 그 실행파일은 어디 있나"를 한 줄로 묻는다.

  ▸ 이야기
    침입자(너 또는 상대)가 ① 비표준 포트에 **숨은 리스너**를 띄우고 ② 평범해 보이는 **백도어 계정**을
    심어 지속 접근을 확보한다. 운영자(헌터)는 osquery로 — `listening_ports`를 `processes`와 JOIN해
    숨은 리스너를, `users`/`authorized_keys`/`crontab`을 훑어 위장 계정·키·스케줄 백도어를 — **SQL 한
    줄로** 끄집어낸다. 마지막엔 FIM과 Wazuh로 이 사냥을 자동화한다.

  ▸ 모드: solo(침입 시뮬→osquery 헌터) / duel(상대 호스트 침입→본인 헌팅). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 이 주차는 **호스트 사냥** 실습이라, 채점 가능한 **고정 표적**을 심고 같은 표적을
    osquery로 사냥한다. 이번 주 표적: **리스너 포트 45678**, **백도어 계정 `osqhunt`**.
    (osquery는 snapshot 도구 — W11의 sysmon event stream과 보완 관계임도 기억해 둔다.)

# ───────────── RED : 침입자 — "정상인 척 숨어라" ─────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 숨은 리스너 (비표준 포트 백도어)

      ### 상황
      셸을 다시 받을 통로로 **비표준 포트에 리스너**를 띄운다. 정상 서비스 포트(22/80/443) 틈에 섞이길
      바라지만, osquery의 `listening_ports JOIN processes` 앞에선 "정상 서비스가 아닌, 정체불명 프로세스가
      연 포트"로 드러난다.

      ### 할 일
      대상 호스트에 **포트 45678** 리스너를 띄운다.
      ```bash
      nohup ncat -lk 45678 >/dev/null 2>&1 &   # 또는 python3 -m http.server 45678
      ```

      ### 채점 방법
      대상 호스트에서 포트 45678이 listening 중인지로 채점(osquery 헌팅의 표적). 제출 글에 어떤 도구로
      어떤 포트를 열었고, 정상 서비스와 어떻게 구분되는지 적는다.

      ### 합격 기준
      대상 호스트에서 포트 45678이 listening이다.
    hint: "ncat -lk 45678 (숨은 리스너). 채점: port_listening 45678."
    verify:
      type: "port_listening"
      expect: "45678"
      checks:
        - { id: "red-1-1", type: "port_listening", target: "web", params: { port: 45678 } }
      semantic:
        intent: "MITRE T1571 — 비표준 포트 리스너로 재접속 통로. osquery listening_ports JOIN processes 헌팅 표적."
        success_criteria:
          - "대상 호스트에 포트 45678 listening"
          - "어떤 도구로 열었고 정상 서비스와 구분되는 신호(포트/프로세스 경로)를 서술"
        acceptable_methods:
          - "ncat -lk / python http.server / socat로 비표준 리스너"
        negative_signs:
          - "리스너 미기동"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — 위장 계정 persistence

      ### 상황
      리스너는 재부팅에 사라진다. 더 끈질긴 발판은 **계정**이다. 평범한 이름의 백도어 계정을 만들어
      `/etc/passwd`에 끼워 넣는다. osquery `users`로 uid·shell·생성 흔적을 보면 정체가 드러난다.

      ### 할 일
      대상 호스트에 백도어 계정 **`osqhunt`**을 만든다.
      ```bash
      sudo useradd -m -s /bin/bash osqhunt
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 `osqhunt`이 추가됐는지로 채점. 정상 계정과 구분되는 신호(uid 범위·
      생성 시점·shell)를 서술한다.

      ### 합격 기준
      `/etc/passwd`에 `osqhunt`이 있다.
    hint: "useradd osqhunt. 채점: file_contains passwd osqhunt."
    verify:
      type: "file_contains"
      expect: "osqhunt"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "osqhunt" } }
      semantic:
        intent: "MITRE T1136.001 — 로컬 계정 persistence. osquery users 헌팅 표적(uid/shell/홈)."
        success_criteria:
          - "대상 /etc/passwd에 osqhunt(또는 식별 가능한 백도어 계정)"
          - "정상 계정과 구분되는 신호 서술"
        acceptable_methods:
          - "useradd로 백도어 계정 / authorized_keys 추가(대안)"
        negative_signs:
          - "계정 미생성"

# ───────────── BLUE : osquery 헌터 — "SQL 한 줄로 끄집어내라" ─────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — "OS를 SQL로" 가시화 확인

      ### 상황
      사냥에 앞서 무기를 점검한다. osquery가 설치돼 OS를 SQL로 질의할 수 있는지 — 버전(5.23.0), 158개
      테이블, 핵심 테이블(processes/users/listening_ports/crontab)을 확인한다.

      ### 할 일
      `osqueryi`로 버전과 핵심 테이블을 질의해 본다.
      ```bash
      osqueryi "SELECT pid,name,path FROM processes LIMIT 5;"
      osqueryi "SELECT port,protocol,pid FROM listening_ports;"
      ```

      ### 채점 방법
      호스트에 `osqueryi`(가시화 도구)가 설치돼 있는지로 확인.

      ### 합격 기준
      `/usr/bin/osqueryi`가 존재한다.
    hint: "osqueryi로 processes/listening_ports 질의. 채점: file_exists /usr/bin/osqueryi."
    verify:
      type: "file_exists"
      expect: "osqueryi"
      checks:
        - { id: "blue-1-1", type: "file_exists", target: "web", params: { path: "/usr/bin/osqueryi" } }
      semantic:
        intent: "osquery 'OS as SQL' — 158 테이블, 6 핵심 테이블. osqueryi(ad-hoc) vs osqueryd(daemon) 구분."
        success_criteria:
          - "osqueryi 설치 확인"
          - "158 테이블 카테고리와 핵심 테이블의 사용 시점 서술"
          - "processes/listening_ports 질의 예시 제시"
        acceptable_methods:
          - "osqueryi 질의 / 테이블 카탈로그 설명"
        negative_signs:
          - "osquery 미사용(ps/ss로만 — OS as SQL 미체득)"

  - order: 2
    assess_target: self
    target_vm: web
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — JOIN 사냥: 숨은 리스너를 프로세스까지 상관

      ### 상황
      포트만 보면 "45678이 열려 있다"까지다. 진짜 사냥은 **그 포트를 연 프로세스가 누구인지**까지
      한 질의로 잇는 것 — `listening_ports`를 `processes`와 **JOIN**해 정체불명 리스너의 실행파일 경로·
      uid를 드러낸다.

      ### 할 일
      JOIN 질의로 RED-1의 숨은 리스너(45678)와 그 프로세스를 상관한다.
      ```sql
      SELECT lp.port, p.pid, p.name, p.path, p.uid
      FROM listening_ports lp JOIN processes p ON lp.pid = p.pid
      WHERE lp.port NOT IN (22,80,443,53);   -- 정상 서비스 제외, 비표준만 사냥
      ```

      ### 채점 방법
      대상 호스트에 비표준 리스너(45678)가 확인되는지 + 학생이 JOIN으로 포트→프로세스→경로/uid까지
      상관했는지로 채점.

      ### 합격 기준
      포트 45678이 listening이며, JOIN 질의로 그 프로세스까지 상관했다.
    hint: "listening_ports JOIN processes로 45678 + 프로세스 경로/uid 상관. 채점: port_listening 45678."
    verify:
      type: "port_listening"
      expect: "45678"
      checks:
        - { id: "blue-2-1", type: "port_listening", target: "web", params: { port: 45678 } }
      semantic:
        intent: |
          MITRE D3FEND — osquery SQL JOIN 사냥(listening_ports+processes). 포트→프로세스→경로→uid 상관으로
          숨은 백도어 식별. 비표준 포트 화이트리스트 기준.
        success_criteria:
          - "포트 45678 리스너 확인"
          - "listening_ports JOIN processes 질의로 포트를 연 프로세스/경로/uid를 상관(쿼리 제시)"
          - "비표준 포트 사냥 기준(정상 서비스 화이트리스트) 서술"
        acceptable_methods:
          - "osquery JOIN 질의 / process_open_sockets로 outbound 사냥(대안)"
        negative_signs:
          - "포트만 보고 프로세스 상관 누락 / JOIN 미사용"

  - order: 3
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-3 — 3표면 사냥: 계정 · SSH키 · cron

      ### 상황
      persistence는 한 군데 숨지 않는다. 계정(`users`), SSH 신뢰(`authorized_keys`), 스케줄(`crontab`)
      세 표면을 모두 훑어야 빠뜨리지 않는다.

      ### 할 일
      세 테이블을 질의해 RED-2의 위장 계정(`osqhunt`)과 다른 persistence 흔적을 찾는다.
      ```sql
      SELECT uid, username, shell, directory FROM users WHERE uid >= 1000;
      SELECT * FROM authorized_keys;
      SELECT * FROM crontab;
      ```

      ### 채점 방법
      대상 `/etc/passwd`에 백도어 계정(`osqhunt`)이 확인되는지 + 학생이 3표면을 어떻게 질의·비교했는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `osqhunt`이 있고, osquery users로 찾아냈다.
    hint: "users(uid>=1000)/authorized_keys/crontab 3표면 사냥. 채점: file_contains passwd osqhunt."
    verify:
      type: "file_contains"
      expect: "osqhunt"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "osqhunt" } }
      semantic:
        intent: "persistence 사냥 — users(계정)/authorized_keys(SSH 신뢰)/crontab(스케줄) 3표면. baseline 대비 신규 식별."
        success_criteria:
          - "백도어 계정 osqhunt 확인"
          - "users/authorized_keys/crontab 질의 결과 제시"
          - "새 계정을 baseline과 비교해 식별하는 방법 서술"
        acceptable_methods:
          - "osquery users/authorized_keys/crontab 질의 (uid>=1000 + shell 필터)"
        negative_signs:
          - "passwd 직접 cat만(osquery 미사용) / 3표면 중 일부만"

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — 사냥 자동화: FIM + Wazuh ship

      ### 상황
      매번 손으로 질의할 순 없다. osquery `file_paths`+`file_events`(inotify 기반 FIM)로 민감 경로
      변경을 **실시간 감지**하고, Wazuh agent가 결과를 manager로 **ship**해 24시간 사냥을 자동화한다.

      ### 할 일
      osquery.conf의 FIM(file_paths) 설계를 서술하고, web 호스트의 Wazuh agent가 가동 중인지 확인한다.

      ### 채점 방법
      web 호스트에 Wazuh agent(결과 ship 주체)가 가동 중인지로 확인.

      ### 합격 기준
      web에 Wazuh agent 프로세스가 running이다.
    hint: "osquery FIM(file_paths/file_events) + Wazuh agent ship. 채점: process_running web wazuh."
    verify:
      type: "process_running"
      expect: "wazuh"
      checks:
        - { id: "blue-4-1", type: "process_running", target: "web", params: { name: "wazuh" } }
      semantic:
        intent: "사냥 자동화 — FIM(file_paths+file_events, inotify) 실시간 감지 + Wazuh agent ship + scheduled query."
        success_criteria:
          - "Wazuh agent 가동 확인"
          - "file_paths로 어떤 경로(authorized_keys/cron/bin)를 FIM하는지 서술"
          - "scheduled query(interval/snapshot) 자동화 의의 서술"
        acceptable_methods:
          - "osquery.conf FIM 작성 + Wazuh agent 가동 확인"
        negative_signs:
          - "ad-hoc 사냥만(자동화 없음)"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 10
    instruction: |
      ## 🛡️ BLUE-5 — 호스트 사냥을 SIEM으로 수렴

      ### 상황
      네트워크 장비(IPS/WAF)가 못 보는 **호스트 내부** 가시성을 SIEM 한 화면에 더한다. osquery/FIM
      결과와 침입 흔적이 Wazuh로 모이는지 확인한다.

      ### 할 일
      본인 SIEM(Wazuh)에 호스트/syscheck 관련 경보가 수집되는지 확인하고, osquery(snapshot)와 W11
      sysmon(event stream)의 보완 관계를 정리한다.

      ### 채점 방법
      본인 SIEM에 최근 경보가 수집됐는지로 확인.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다.
    hint: "본인 Wazuh에 호스트/syscheck/osquery 관련 경보 수집 확인."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — 호스트 사냥/FIM이 Wazuh로 수렴. osquery snapshot과 sysmon(W11) event stream의 보완."
        success_criteria:
          - "본인 Wazuh에 최근 경보(호스트/syscheck 포함)"
          - "osquery(snapshot)와 sysmon(stream)의 보완 관계 서술"
        acceptable_methods:
          - "siem wazuh_alert / 중앙 SIEM 탭"
        negative_signs:
          - "수집이 비어있음"
