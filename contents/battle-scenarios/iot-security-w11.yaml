id: "iot-security-w11"
category: "iot-security"
title: "[IoT보안 W11] IoT 허니팟: 공격자 유인·관찰 우회 vs 허니팟 설계·위협 인텔"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IoT 허니팟 공방전 — 가짜 IoT 장치로 **공격자를 유인·관찰**하는 방어 도구와, 그것을 간파·우회하려는
  공격을 설계·분석한다. 실물/에뮬 허니팟이 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(허니팟 간파·우회)와 Blue(허니팟 설계·위협 인텔)를 모두 수행.
    • duel : Red 학생이 허니팟 탐지·회피를 시도하고, Blue 학생이 고품질 허니팟으로 관찰한다.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 허니팟 탐지 지표(핑거프린팅)·회피의 구체성, 허니팟
    설계(현실성·격리·수집)·위협 인텔 활용의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (허니팟 간파·우회) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 허니팟 핑거프린팅: 가짜 장치 식별

      공격자 관점에서 IoT 허니팟을 **간파**하는 지표를 설계한다.

      ### 무엇을
      - **핑거프린팅**: 비현실적 응답(너무 완벽/느림)·에뮬레이션 아티팩트(가짜 배너·비일관 동작)·
        타이밍·기본 설정, 인터넷 노출 특성(신규 IP·수집 도구 흔적).
      - **행위 탐지**: 실제 장치와 다른 상호작용(모든 자격 허용·명령 로깅 흔적).
      - 최소 3가지 탐지 지표를 제시.

      ### ✅ 합격 기준
      허니팟을 실제 장치와 구분하는 탐지 지표 최소 3가지(응답·에뮬 아티팩트·타이밍·행위)를 구체적으로
      설계한다.
    hint: "핑거프린팅(비현실 응답·에뮬 아티팩트·타이밍·기본 설정)+행위(모든 자격 허용·로깅 흔적). 3+ 탐지 지표."
    verify:
      type: "semantic"
      expect: "honeypot_fingerprint"
      semantic:
        intent: |
          허니팟 핑거프린팅 — 가짜 장치의 아티팩트를 지표로 식별하는 공격자 관점을 이해.
        success_criteria:
          - "허니팟 탐지 지표 최소 3가지(응답·에뮬 아티팩트·타이밍·행위)를 설계"
          - "실제 장치와 구분하는 근거를 제시"
          - "(설명) 허니팟 현실성이 관건임을 언급"
        acceptable_methods:
          - "핑거프린팅 + 행위 탐지 지표"
        negative_signs:
          - "지표 3개 미만·막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 허니팟 회피·기만 대응 분석

      허니팟으로 의심되면 **회피/기만**하는 전략을 분석한다: 활동 최소화·가짜 정보 주입(허니팟 오염)·
      진짜 표적만 선별.

      ### ✅ 합격 기준
      허니팟 의심 시 회피(활동 중단)·기만(허니팟에 가짜 정보 주입)·표적 선별 전략을 분석하고 그 한계를
      논한다.
    hint: "허니팟 의심 시 활동 최소화·가짜 정보 주입(허니팟 오염)·진짜 표적 선별 전략. 회피 한계도 논의."
    verify:
      type: "semantic"
      expect: "honeypot_evasion"
      semantic:
        intent: |
          허니팟 회피·기만 — 의심 시 활동 조정·기만으로 관찰을 무력화하려는 전략과 한계를 이해.
        success_criteria:
          - "회피(활동 중단)·기만(가짜 정보 주입)·표적 선별 전략을 분석"
          - "각 전략의 한계를 논함"
          - "(설명) 고품질 허니팟은 회피가 어려움을 언급"
        acceptable_methods:
          - "회피/기만 전략 + 한계 분석"
        negative_signs:
          - "전략·한계 없이 '회피 가능'만"

# ───────────────────────── BLUE (허니팟 설계·위협 인텔) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 고품질 IoT 허니팟 설계

      RED의 핑거프린팅에 강건한 **현실적 IoT 허니팟**을 설계한다.

      ### 무엇을
      - **현실성**: 실제 펌웨어/응답 모방·현실적 지연·일관 동작, 실제 장치 배너/프로토콜 재현.
      - **상호작용 수준**: 저/고상호작용 트레이드오프(고상호작용=풍부하나 위험).
      - **격리·안전**: 허니팟을 실제 망과 격리(공격 발판화 방지)·아웃바운드 통제.
      - **수집**: 공격 명령·페이로드·자격 시도 로깅(위협 인텔 원천).

      ### ✅ 합격 기준
      현실성·상호작용 수준·격리·수집을 갖춘 IoT 허니팟을 설계하고 RED 핑거프린팅에 강건함을 설명한다.
    hint: "현실적 응답·펌웨어 모방·일관 동작+상호작용 수준 트레이드오프+실망 격리·아웃바운드 통제+공격 로깅. 핑거프린팅 강건."
    verify:
      type: "semantic"
      expect: "honeypot_design"
      semantic:
        intent: |
          IoT 허니팟 설계 — 현실성·격리·수집을 갖춰 공격자를 유인·관찰하고 핑거프린팅에 저항.
        success_criteria:
          - "현실성(펌웨어/응답 모방·일관 동작)을 제시"
          - "상호작용 수준 트레이드오프와 격리·안전을 제시"
          - "공격 수집(명령·페이로드·자격 로깅)을 제시"
        acceptable_methods:
          - "현실성 + 상호작용 + 격리 + 수집"
        negative_signs:
          - "격리 없이 실망 배치(위험)"
          - "현실성·수집 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 위협 인텔 활용·조기 경보 설계

      허니팟 수집을 **위협 인텔**로 활용하는 체계를 설계한다.

      ### 무엇을
      - **인텔 추출**: 새로운 공격 기법·IOC·봇넷 C2·자격 사전 추출.
      - **조기 경보**: 허니팟 히트를 조기 경보로(실제 자산 공격 전조), 신규 공격 탐지.
      - **공유·대응**: IOC 공유·탐지 규칙 생성, 실제 방어(W02~W10)에 반영.
      - **오탐·법적**: 무해 스캔 구분, 함정(entrapment) 회피.

      ### ✅ 합격 기준
      허니팟 인텔 추출·조기 경보·IOC 공유·대응 반영을 제시하고 "허니팟은 관찰을 넘어 방어 개선으로"
      원칙을 설명한다.
    hint: "인텔 추출(신규 기법·IOC·C2·자격)+조기 경보+IOC 공유·탐지 규칙 생성·실제 방어 반영+오탐/법적 고려. '관찰→방어 개선' 원칙."
    verify:
      type: "semantic"
      expect: "threat_intel"
      semantic:
        intent: |
          허니팟 위협 인텔 — 수집을 인텔·조기 경보·탐지 규칙으로 전환해 실제 방어를 개선.
        success_criteria:
          - "인텔 추출(신규 기법·IOC·C2·자격)을 제시"
          - "조기 경보·IOC 공유·탐지 규칙 생성을 제시"
          - "실제 방어 반영과 오탐/법적 고려를 제시"
          - "(설명) '관찰을 넘어 방어 개선으로' 원칙 설명"
        acceptable_methods:
          - "인텔 추출 + 조기 경보 + 공유 + 방어 반영"
        negative_signs:
          - "수집만·활용 없음"
          - "방어 반영 언급 없음"
