id: "ai-safety-adv-w04"
category: "ai-safety-adv"
title: "[AI안전심화 W4] RAG 보안: 검색 중독·문서 인젝션 vs 소스 격리·검색 접근 통제"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  RAG 보안 심화 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 검색 중독·문서 인젝션과
  소스 격리 방어를 다룬다.
  ▸ 실측 — `/api/rag/add` 무인증 오염이 피해자 질의에서 트리거, `/api/dataset` 전체 유출. Red 위치: 본인
    인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만, 고유 마커.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 검색 중독으로 답변 조작

      표적 주제에 고유 마커 문서를 다수 주입해 **retrieval을 장악**하고 답변을 조작한다.
      ### ✅ 합격 기준
      표적 질의 retrieved/answer가 오염 문서로 편향됨을 마커로 증명한다.
    hint: "표적 주제 오염 문서 다수 주입→retrieved 장악·답변 편향 마커 증명."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "red-4-1", type: "command_ran", target: "attacker", params: { pattern: "rag/add" } }
      semantic:
        intent: "검색 중독 — retrieval 장악으로 생성 조작."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add·/api/chat 흔적이 남음"
          - "표적 질의 편향을 마커로 증명"
          - "(설명) 검색 중독 메커니즘 설명"
        acceptable_methods: ["표적 오염 + 편향 증명"]
        negative_signs: ["편향 증거 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 문서 인젝션 지속성·전파 분석

      오염 문서의 **지속성**(리셋 전까지 유지)과 전파(다수 질의 영향)를 분석하고 데이터 덤프로 저장
      데이터 유출도 확인한다.
      ### ✅ 합격 기준
      오염 지속성·전파를 분석하고 /api/dataset 유출로 저장 데이터 노출을 실증한다.
    hint: "오염 문서 지속성·전파 분석 + /api/dataset 저장 데이터 유출 실증."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-4-2", type: "command_ran", target: "attacker", params: { pattern: "dataset" } }
      semantic:
        intent: "문서 인젝션 지속·전파 — 오염의 지속성과 저장 유출을 이해."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/dataset 흔적이 남음"
          - "오염 지속성·전파를 분석"
          - "(설명) 저장 데이터 유출을 실증"
        acceptable_methods: ["지속성 분석 + 덤프 실증"]
        negative_signs: ["실증 없이 서술만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — RAG 오염·유출 표면 진단
      수집·검색·저장 표면을 증거로 진단(무인증 수집·retrieval 접근·덤프).
      ### ✅ 합격 기준: 오염·유출 표면을 증거로 진단하고 등급화한다.
    hint: "수집(rag/add)·검색·저장(dataset) 표면 증거 진단 + 등급화."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-4-1", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "RAG 표면 진단 — 오염·유출을 증거로 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 흔적이 남음"
          - "수집·검색·저장 표면을 증거로 진단"
          - "(설명) 무결성/기밀성 등급화"
        acceptable_methods: ["표면별 증거 진단"]
        negative_signs: ["증거 없이 주장만"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 소스 격리·검색 접근 통제 설계
      수집 인증·검토, 검색 권한 필터·민감 인덱싱 제외, 데이터/지시 격리, 출처 가중·응답 마스킹.
      ### ✅ 합격 기준: 소스 격리·검색 권한·출처 가중·마스킹을 제시하고 "데이터≠지시, 검색은 권한 안"
      원칙을 설명한다.
    hint: "수집 인증·검토+검색 권한 필터·민감 인덱싱 제외+데이터/지시 격리+출처 가중·마스킹. '데이터≠지시' 원칙."
    verify:
      type: "semantic"
      expect: "source_isolation"
      semantic:
        intent: "소스 격리·검색 통제 — 오염·유출을 근본 차단."
        success_criteria:
          - "수집 인증·검토를 제시"
          - "검색 권한 필터·민감 인덱싱 제외를 제시"
          - "데이터/지시 격리·출처 가중·마스킹을 제시"
          - "(설명) '데이터≠지시, 검색은 권한 안' 원칙 설명"
        acceptable_methods: ["수집 통제 + 검색 권한 + 격리 + 마스킹"]
        negative_signs: ["소스 격리 없음"]
