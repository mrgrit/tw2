id: "soc-w09"
category: "soc"
title: "[SOC관제 W9] 사고 발생 첫 60분 — 식별·격리·제거·복구·교훈의 IR 절차"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  경보가 진짜 **사고(incident)**로 확인되는 순간, 분석은 끝나고 **대응**이 시작된다. 첫 60분이 피해를
  가른다. 능숙한 대응자는 즉흥적으로 움직이지 않고 **표준 절차**를 따른다 — **Identify**(식별) →
  **Contain**(격리) → **Eradicate**(제거) → **Recover**(복구) → **Lessons**(교훈). 증거를 보존하며,
  추가 피해를 막고, 모든 발판을 근절한 뒤, 서비스를 안전하게 되살린다.

  ▸ 이야기
    공격자가 침투해 호스트에 발판(백도어 계정)을 심는다. 대응자(너)는 사고를 식별·분류하고, 공격
    출발지를 격리(차단룰)하며, persistence를 제거하고, 서비스를 복구한 뒤 교훈을 정리한다.

  ▸ 모드: solo(공격자→IR 대응자) / duel(상대 침해→본인 IR). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Red 채점은 대상 흔적(WAF audit 태그 / 호스트 계정)으로. 격리 차단룰은 Suricata
    **sid 9509001**. 웹공격 태그 **`ir9r1-<id>`**, persistence 마커 **계정 `ir9ghost`**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 침해 사고 유발 (다벡터)

      ### 상황
      정찰+웹 침투로 명확한 침해 사고 경보를 만든다. IR 대응자가 식별·분류해야 할 사건이다.

      ### 할 일
      이 미션 전용 태그 `ir9r1-<id>`를 붙여 스캐너 UA로 SQLi를 보낸다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://<대상_공개IP>/?id=ir9r1-kim-1%20UNION%20SELECT%201"
      ```

      ### 채점 방법
      대상 WAF audit에 (ir9r1 태그 포함) 침해 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 ir9r1 태그가 포함된 탐지가 남는다.
    hint: "태그(ir9r1) sqlmap SQLi. 채점: 대상 modsec audit + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "ir9r1", since_sec: 1800 } }
      semantic:
        intent: "침해 사고 유발 — IR Identify 단계 표적. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (ir9r1 태그 포함) 침해 탐지(최근)"
          - "어떤 침해 벡터인지 서술"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 sqlmap SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 호스트 persistence (제거 대상)

      ### 상황
      침해 후 백도어 계정을 심어 지속성을 확보한다. IR의 Eradicate 단계 표적이다.

      ### 할 일
      대상 호스트에 계정 **`ir9ghost`**를 만든다.
      ```bash
      sudo useradd -m -s /bin/bash ir9ghost
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 `ir9ghost`가 추가됐는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `ir9ghost`가 있다.
    hint: "useradd ir9ghost. 채점: file_contains passwd ir9ghost."
    verify:
      type: "file_contains"
      expect: "ir9ghost"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "ir9ghost" } }
      semantic:
        intent: "MITRE T1136 — 백도어 계정 persistence. IR Eradicate 단계 표적."
        success_criteria:
          - "/etc/passwd에 ir9ghost"
          - "persistence 기법 서술"
        acceptable_methods:
          - "useradd / authorized_keys"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [Identify] — 사고 식별 + 분류

      ### 상황
      경보를 분석해 사고를 식별하고, 심각도(P1~P4)와 영향 범위(어떤 자산/계정)를 분류한다.

      ### 할 일
      사고를 식별하고 심각도·범위를 분류한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분류(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 분류는 제출로 검증).
    hint: "사고 식별 + 심각도/범위 분류. 채점: wazuh_alert + 분류 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "IR Identify — 사고 식별 + 심각도/범위 분류. 대응의 출발점."
        success_criteria:
          - "경보 수집 확인"
          - "무슨 사고인지 + 영향 범위(자산/계정)"
          - "심각도 P1~P4 분류"
        acceptable_methods:
          - "경보 분석 + 사고 분류"
        negative_signs:
          - "범위/심각도 미분류"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [Contain] — 격리 (출발지 차단룰, sid 9509001)

      ### 상황
      공격 출발지를 **격리**한다. Suricata `local.rules`에 출발지/패턴 차단(drop)룰(**sid 9509001**)을
      작성해 추가 피해를 막는다. 증거 보존을 위해 무분별한 종료는 피한다.

      ### 할 일
      ```
      drop http any any -> any any (msg:"IR W09 contain attacker tool"; http.user_agent; content:"sqlmap"; nocase; sid:9509001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9509001 격리 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9509001 룰이 있다.
    hint: "local.rules에 차단(drop)룰(sid 9509001) → reload."
    verify:
      type: "file_contains"
      expect: "9509001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9509001" } }
      semantic:
        intent: "IR Contain — 공격 출발지/도구 격리(drop). 증거 보존하며 추가 피해 차단."
        success_criteria:
          - "local.rules에 sid 9509001 차단룰"
          - "격리 범위(출발지/패턴) + 증거 보존 고려"
          - "성급한 종료 회피 원칙"
        acceptable_methods:
          - "local.rules drop 룰 + reload"
        negative_signs:
          - "증거 파괴 / 격리 범위 과도·부족"

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [Eradicate] — persistence 식별 + 제거

      ### 상황
      RED-2의 persistence(백도어 계정 ir9ghost)를 식별하고 제거한다. 모든 발판을 찾아 근절해야 재침투를
      막는다(하나라도 남으면 실패).

      ### 할 일
      호스트를 점검해 백도어 계정을 전수 식별하고 제거 계획을 세운다.

      ### 채점 방법
      대상 호스트에서 persistence(ir9ghost)가 식별되는지로 채점(이후 제거).

      ### 합격 기준
      persistence(ir9ghost)를 식별했다.
    hint: "호스트 점검(계정/리스너/cron/SSH키)으로 ir9ghost 전수 식별 → 제거. 채점: file_contains passwd ir9ghost(식별)."
    verify:
      type: "file_contains"
      expect: "ir9ghost"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "ir9ghost" } }
      semantic:
        intent: "IR Eradicate — 모든 persistence 발판 식별 후 제거. 전수 조사가 핵심(하나라도 남으면 재침투). 채점 핵심은 발견+전수조사 계획(특정 도구 실행 증거는 비요구)."
        success_criteria:
          - "persistence(ir9ghost) 식별 확인"
          - "계정/리스너/cron/SSH키 전수 점검 계획"
          - "각 발판 제거 절차 서술"
        acceptable_methods:
          - "호스트 가시화로 발견 — osquery/ss/grep /etc/passwd 등 → userdel/포트 종료/cron 제거(도구보다 전수 조사가 핵심)"
        negative_signs:
          - "일부 발판만 제거(재침투 가능) / 전수 조사 누락"

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [Recover] — 서비스 복구 + 정상성 검증

      ### 상황
      제거 후 서비스를 정상 상태로 복구하고 검증한다. 웹 서버(Apache)가 정상 가동되고 안전한 baseline으로
      돌아왔는지 확인한다.

      ### 할 일
      서비스 복구 + 정상성을 검증한다.

      ### 채점 방법
      web 서버(Apache)가 정상 가동 중인지로 채점.

      ### 합격 기준
      web의 apache2가 running이다.
    hint: "서비스 복구 + 정상성 검증. 채점: process_running web apache2."
    verify:
      type: "process_running"
      expect: "apache"
      checks:
        - { id: "blue-4-1", type: "process_running", target: "web", params: { name: "apache2" } }
      semantic:
        intent: "IR Recover — 서비스 정상 복구 + baseline 검증. 침해 전 정상 상태로 안전 복귀."
        success_criteria:
          - "apache2 가동(복구) 확인"
          - "설정이 안전 baseline으로 복귀"
          - "재침투 감시 강화"
        acceptable_methods:
          - "서비스 재기동 + 정상성/baseline 검증"
        negative_signs:
          - "취약 상태로 복구(재침투 위험)"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 [Lessons] — 교훈 정리 + IR 보고서

      ### 상황
      사고 전체를 타임라인으로 정리하고, 근본 원인과 재발 방지책(탐지룰/패치/정책)을 담은 IR 보고서를
      작성한다.

      ### 할 일
      타임라인 + 근본 원인 + 재발 방지 IR 보고서를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 보고서(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 보고서는 제출로 검증).
    hint: "타임라인+근본원인+재발방지 IR 보고서. 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "IR Lessons — 타임라인 + 근본 원인 + 재발 방지. 교훈을 탐지룰/패치/정책으로 환류."
        success_criteria:
          - "경보 수집 확인"
          - "타임라인 + 근본 원인 + 재발 방지책"
          - "운영 개선 항목 제시"
        acceptable_methods:
          - "IR 보고서 작성"
        negative_signs:
          - "근본 원인 누락 / 재발 방지책 없음"
