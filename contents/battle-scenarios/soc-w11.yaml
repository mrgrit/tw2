id: "soc-w11"
category: "soc"
title: "[SOC관제 W11] 악성코드 침해(실행→C2→persistence) vs 인시던트 대응 실습(2) — IOC 헌팅·호스트 격리"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  SOC 관제 11주차 — **인시던트 대응 실습(2) 악성코드**. 침투 후 악성코드가 실행되어 **C2 비콘** 으로
  외부와 통신하고 **persistence** 를 심는 사고를 대응한다. 대응자는 악성 프로세스·드롭 파일·C2 연결을
  **IOC** 로 식별하고, 감염 호스트를 네트워크에서 **격리** 하며, 악성코드와 발판을 제거해 복구한다.

  ▸ 모드: solo(공격자 → 악성코드 IR) / duel(상대 감염 → 본인 IR). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** + 호스트 감염. 외부 명령 미수집 → 대상 호스트/SIEM 흔적으로 채점.
  ▸ 마커: C2 비콘 리스너 **포트 19999**, 악성코드 persistence 계정 **eduintruder**. 격리 차단룰은
    Suricata **local.rules**(sid **9011001**).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 악성코드 C2 비콘 (포트 19999)

      감염 호스트에서 악성코드가 외부 C2 와 통신하는 비콘을 모사한다(리스너/콜백 포트 **19999**).
      대응자의 C2 탐지·IOC 추출 표적이다.

      ### 권장 명령 (참고)
      ```bash
      nohup ncat -lk 19999 >/dev/null 2>&1 &      # C2 비콘 모사
      ```
      📌 채점: 대상 호스트에 C2 비콘 리스너(19999)가 열렸는지.
      ✅ 합격: 대상 호스트에서 포트 19999 가 listening 이다.
    hint: "ncat -lk 19999 (C2 비콘). 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "red-1-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "T1071 — 악성코드 C2 비콘. 대응자의 C2 탐지/IOC 추출 표적."
        success_criteria: ["포트 19999 listening", "(설명) C2 통신 패턴과 IOC(IP/포트) 서술"]
        acceptable_methods: ["ncat 리스너 / 주기적 콜백 모사"]
        negative_signs: ["비콘 미생성"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 악성코드 persistence (계정)

      악성코드가 재부팅 후에도 살아남도록 백도어 계정(**eduintruder**)을 심는다. 대응자의 Eradicate
      표적이다.

      ### 권장 명령 (참고)
      ```bash
      sudo useradd -m -s /bin/bash eduintruder
      ```
      📌 채점: 대상 호스트의 /etc/passwd 에 persistence 계정(eduintruder)이 추가됐는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있다.
    hint: "useradd eduintruder. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "T1136 — 악성코드 persistence(계정). 재부팅 생존. Eradicate 표적."
        success_criteria: ["/etc/passwd 에 eduintruder", "(설명) persistence 메커니즘 서술"]
        acceptable_methods: ["useradd / cron / service 등록"]
        negative_signs: ["persistence 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [Identify] — 악성코드 식별 + IOC 추출

      감염을 식별하고 IOC 를 추출한다. 악성 프로세스(비정상 경로/이름), C2 연결(목적지/포트), 드롭
      파일(해시)을 IOC 로 정리한다.

      📌 채점: 대상 호스트에 C2 비콘(19999)이 식별되는지(IOC).
      ✅ 합격: 포트 19999 가 listening 이며 IOC 로 식별했다.
    hint: "악성 프로세스/C2 연결/드롭파일 IOC 추출. 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "blue-1-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "악성코드 식별 — 프로세스/C2/드롭파일을 IOC(IP/포트/해시/경로)로 추출."
        success_criteria: ["C2 비콘 식별", "(IOC) 프로세스 경로 + C2 IP/포트 + 파일 해시 정리", "(연관) IOC 간 관계"]
        acceptable_methods: ["ss/osquery C2 연결 + 프로세스 + 파일 해시"]
        negative_signs: ["IOC 추출 없이 경보만"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [Hunt] — 감염 범위 헌팅 (프로세스·연결·persistence)

      감염 범위를 전수 헌팅한다. C2 리스너(19999)와 그 프로세스, persistence 계정(eduintruder), 자동
      실행(cron/service)을 모두 찾아 감염의 전모를 파악한다.

      📌 채점: 대상 호스트에 persistence 계정(eduintruder)이 헌팅으로 확인되는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있고 헌팅으로 찾아냈다.
    hint: "C2/계정/cron/service 전수 헌팅. 채점: file_contains passwd eduintruder + port_listening 19999."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
        - { id: "blue-2-2", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "감염 범위 헌팅 — C2/계정/자동실행 전수 조사. 감염 전모 파악이 제거의 전제."
        success_criteria: ["persistence + C2 확인", "(전수) 프로세스/연결/계정/cron/service 점검", "(범위) 감염 호스트·계정 목록"]
        acceptable_methods: ["osquery/ss 전수 헌팅"]
        negative_signs: ["일부만 확인(잔존 위험)"]

  - order: 3
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [Contain] — 호스트 네트워크 격리 (C2 차단룰 sid 9011001)

      감염 호스트를 네트워크에서 격리한다. Suricata `local.rules` 에 C2 목적지/포트 차단(drop)룰
      (**sid 9011001**)을 작성하거나 방화벽으로 C2 통신을 끊어 추가 확산을 막는다.

      ### 권장 룰 (참고)
      ```
      drop ip any any -> any 19999 (msg:"IR W11 contain C2 beacon"; sid:9011001; rev:1;)
      ```
      📌 채점: local.rules 에 C2 격리 차단룰(sid 9011001)이 작성됐는지.
      ✅ 합격: local.rules 에 9011001 룰이 있다.
    hint: "local.rules 에 C2 차단(drop)룰(sid 9011001) 작성 → reload."
    verify:
      type: "file_contains"
      expect: "9011001"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9011001" } }
      semantic:
        intent: "IR Contain — 감염 호스트 네트워크 격리(C2 차단). 확산 차단하며 증거 보존."
        success_criteria: ["local.rules 에 sid 9011001 C2 차단", "(격리) C2 목적지/포트 차단 범위", "(보존) 증거 보존 고려"]
        acceptable_methods: ["local.rules drop / 방화벽 C2 차단"]
        negative_signs: ["격리 전 증거 파괴", "확산 방치"]

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [Eradicate+Recover] — 악성코드 제거 + 복구

      악성코드와 모든 발판(프로세스/파일/계정/자동실행)을 제거하고 호스트를 정상 복구한다. 재감염
      방지를 위해 침투 취약점도 패치한다.

      📌 채점: web 서버(Apache)가 정상 가동 중인지(복구 검증).
      ✅ 합격: web 의 apache2 가 running 이다.
    hint: "악성코드/발판 전수 제거 + apache 복구. 채점: process_running web apache2."
    verify:
      type: "process_running"
      expect: "apache"
      checks:
        - { id: "blue-4-1", type: "process_running", target: "web", params: { name: "apache2" } }
      semantic:
        intent: "IR Eradicate+Recover — 악성코드/발판 전수 제거 + 정상 복구 + 취약점 패치(재감염 방지)."
        success_criteria: ["apache2 가동(복구)", "(제거) 프로세스/파일/계정/자동실행 전수 제거", "(패치) 침투 취약점 보완"]
        acceptable_methods: ["발판 제거 + 서비스 복구 + 패치"]
        negative_signs: ["발판 잔존", "취약점 미패치(재감염)"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 [Report] — 악성코드 IR 보고서 + IOC 공유

      감염→C2→persistence→대응 전 과정을 보고서로 정리하고, 추출한 IOC(해시/IP/포트)를 탐지룰·CDB
      로 공유해 조직 전체 가시성을 높인다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(+ 보고서/IOC 는 제출로 검증).
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "악성코드 IR 보고서 + IOC(해시/IP/포트) 공유. 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "악성코드 IR 보고서 — 타임라인 + IOC + 재발 방지. IOC 를 탐지룰/CDB 로 환류해 조직 가시성 강화."
        success_criteria: ["경보 수집 확인", "(보고서) 타임라인 + IOC 목록 + 근본 원인", "(공유) IOC 를 룰/CDB 로 환류"]
        acceptable_methods: ["IR 보고서 + IOC 공유"]
        negative_signs: ["IOC 미공유(재발 시 미탐)"]
