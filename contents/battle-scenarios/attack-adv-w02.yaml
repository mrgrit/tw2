id: "attack-adv-w02"
category: "attack-adv"
title: "[공격고급 W2] OSINT 고급 정보수집 — 표면 열거 vs 정찰 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격 고급과정 2주차 — **OSINT/정찰**. 공격의 8할은 정찰이다. 숨은 경로·헤더·배너·기술 스택을 체계적으로
  수집해 공격 표면을 그린다. Red 는 표면을 열거하고, Blue 는 그 정찰 행위를 탐지·차단한다.

  ▸ 이야기
    공격자가 스캐너로 관리자/API 경로를 열거하고, 헤더·배너에서 기술 스택을 핑거프린팅하며, 수집 결과를
    정찰 산출물로 정리한다. 방어자는 스캐너/열거를 탐지하고 공격 표면을 위협 모델로 정리한다.

  ▸ 모드
    • solo : 한 학생이 정찰(자기 인프라 표적)과 탐지를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라를 정찰, Blue 는 자기 인프라에서 탐지.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    정찰 태그 **`aa02r1-<본인id>`**, 정찰 산출물 **`/tmp/.aa02recon`**(마커 `aa02`), 계정 **`atka02`**,
    Suricata 탐지 **sid 9702011**, Wazuh 탐지 **id 103021**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [표면 열거] — 스캐너로 숨은 경로·기술 스택 핑거프린팅

      ### 상황
      너는 스캐너 UA(태그 `aa02r1-<본인id>`)로 관리자/API 경로(`/admin`, `/api`, `/swagger`, `/console`)를 열거하고
      보안 헤더 부재를 확인한다. 스캐너 활동은 대상 WAF 의 스캐너 탐지(913)에 태그와 함께 남는다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim):
      ```bash
      for p in /admin /api /swagger /console /debug; do
        curl -s -A "aa02r1-kim-recon" -H "Host: dvwa.el34.lab" "http://192.168.0.161$p" -o /dev/null
      done
      curl -sI -A "aa02r1-kim-recon" -H "Host: dvwa.el34.lab" "http://192.168.0.161/"   # 헤더/배너
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa02r1` 가 포함된 스캐너/열거 탐지(913 계열)가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `aa02r1` 태그가 포함된 정찰 탐지가 남는다.
    hint: "스캐너 UA(aa02r1)로 admin/api 경로 열거 + 헤더 점검 → 대상 modsec audit 913. 채점: log_contains modsec aa02r1."
    verify:
      type: "log_contains"
      expect: "aa02r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa02r1", since_sec: 1800 } }
      semantic:
        intent: "OSINT/정찰 — Active Scanning(T1595) + 경로 열거 + 기술 스택 핑거프린팅. 대상 WAF audit, 태그(aa02r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 aa02r1 태그가 포함된 정찰 탐지(913)"
          - "열거한 경로/헤더와 발견 공격 표면 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 단 스캐너 열거"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [정찰 산출물·발판] — 토폴로지 맵 + 백도어 계정

      ### 상황
      수집한 정보를 정찰 산출물 **`/tmp/.aa02recon`**(마커 `aa02`)로 정리하고, 후속 공격을 위한 백도어 계정
      **`atka02`** 를 만든다.

      ### 할 일
      ```bash
      printf 'aa02 recon: web=3000 ssh=22 admin=/admin tech=node/express' > /tmp/.aa02recon
      sudo useradd -m -s /bin/bash atka02
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.aa02recon`(마커 `aa02`)이 있거나 `/etc/passwd` 에 `atka02` 가 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa02recon`(마커 `aa02`) 또는 계정 `atka02`.
    hint: "정찰 산출물 /tmp/.aa02recon (마커 aa02) + useradd atka02. 채점: file_contains 산출물 aa02 + file_contains passwd atka02."
    verify:
      type: "file_contains"
      expect: "aa02"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.aa02recon", pattern: "aa02" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka02" } }
      semantic:
        intent: "정찰 산출물(T1592 수집) + 발판 계정(T1136). 토폴로지 맵 + 백도어. 후속 공격 준비."
        success_criteria:
          - "/tmp/.aa02recon(마커 aa02) 또는 계정 atka02"
          - "수집 정보를 어떻게 공격에 쓸지 서술"
        acceptable_methods:
          - "산출물 파일 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [스캐너 열거 탐지] — Suricata 룰 (sid 9702011)

      ### 상황
      정찰을 조기에 잡으면 후속 공격을 예방한다. 관리자/민감 경로 열거를 탐지하는 Suricata 룰(**sid 9702011**)을 만든다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W02 sensitive path enumeration"; flow:to_server; http.uri; content:"/swagger"; nocase; sid:9702011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9702011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 경로 열거를 보는 sid 9702011 룰이 존재한다.
    hint: "민감 경로 열거 Suricata 룰(sid 9702011, /swagger 등) → reload. 채점: file_contains local.rules 9702011."
    verify:
      type: "file_contains"
      expect: "9702011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9702011" } }
      semantic:
        intent: "정찰 탐지(네트워크) — 민감 경로 열거 Suricata 룰. 킬체인 조기 차단."
        success_criteria:
          - "local.rules 에 sid 9702011"
          - "어떤 열거 패턴을 보는지 서술"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [정찰 빈도 탐지] — Wazuh 룰 (id 103021)

      ### 상황
      정찰은 짧은 시간에 **많은 경로**를 두드린다. 동일 IP 의 반복 404/열거를 잡는 Wazuh 룰(**id 103021**, frequency)을 만든다.

      ### 할 일
      ```xml
      <group name="edu,recon,">
        <rule id="103021" level="10" frequency="8" timeframe="120">
          <if_matched_group>web</if_matched_group>
          <same_source_ip />
          <description>ATKADV-W02 - reconnaissance: rapid path enumeration from same IP</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 103021 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 정찰 빈도를 보는 id 103021 룰이 존재한다.
    hint: "정찰 빈도 Wazuh 룰(id 103021, frequency same_source_ip) → restart. 채점: file_contains local_rules.xml 103021."
    verify:
      type: "file_contains"
      expect: "103021"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103021" } }
      semantic:
        intent: "정찰 탐지(호스트/빈도) — frequency 로 동일 IP 의 빠른 경로 열거 포착. 정찰은 단발보다 빈도가 신호."
        success_criteria:
          - "local_rules.xml 에 rule id 103021 (frequency)"
          - "정찰 빈도 탐지 로직 서술"
        acceptable_methods:
          - "Wazuh frequency 룰 + restart"
        negative_signs:
          - "frequency 없는 단순 룰 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [공격 표면·위협 모델링] — 정찰 결과 방어 관점 분석

      ### 상황
      방어자도 **자기 공격 표면**을 알아야 한다. 정찰로 노출된 표면(열린 경로/헤더 부재/배너)을 정리하고, 우선순위화된
      공격 벡터와 방어 조치를 위협 모델로 작성한다.

      ### 할 일
      보고서에:
      - 노출된 공격 표면(경로/헤더/배너/기술 스택) + 정찰 산출물(`/tmp/.aa02recon`)·계정(atka02) 헌팅 결과
      - 우선순위화된 공격 벡터 + 방어 조치(보안 헤더/경로 숨김/배너 제거)
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 공격 표면·위협 모델로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 공격 표면·위협 모델·헌팅은 제출로 검증).
    hint: "노출 공격표면 정리 + 위협 모델(벡터 우선순위+방어조치) + 산출물/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "위협 모델링 — 정찰로 드러난 공격 표면 + 우선순위 벡터 + 방어 조치. 분석형 — 구체 표면/조치 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "노출 공격 표면 + 우선순위화된 공격 벡터 + 방어 조치"
          - "정찰 산출물/계정 헌팅 결과"
        acceptable_methods:
          - "공격 표면 표 + 위협 모델"
        negative_signs:
          - "표면/조치 누락"
