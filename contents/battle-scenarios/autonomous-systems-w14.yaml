id: "autonomous-systems-w14"
category: "autonomous-systems"
title: "[자율시스템 W14] CPS 인시던트 대응: 사이버물리 특수성 — 은폐 공격 분석 vs 안전 우선 대응"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  CPS 인시던트 대응 공방전 — 사이버물리 인시던트의 **특수성**(물리 안전·실시간·중단 불가·은폐)을
  다룬다. Red는 대응을 어렵게 하는 은폐·지속 공격을 분석하고, Blue는 안전 최우선 인시던트 대응을
  설계한다. **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(대응 방해·은폐 공격)와 Blue(CPS 인시던트 대응)를 모두 수행.
    • duel : Red 학생이 은폐·지속 공격을 제시하고, Blue 학생이 안전 우선 대응으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: CPS 인시던트 특수성 반영, 은폐/지속 공격 분석의 구체성,
    안전 최우선 대응(격리 vs 가동 유지 트레이드오프·포렌식·복구)의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (대응 방해·은폐 공격 분석) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — CPS 대응을 어렵게 하는 은폐·지속 공격

      CPS 인시던트 **대응을 방해**하는 공격 특성을 분석한다: 은폐(HMI 위장·로그 조작)·지속(펌웨어
      백도어)·물리 영향(전원 차단 불가·안전 위험으로 즉시 격리 곤란).

      ### ✅ 합격 기준
      은폐·지속·물리 제약 중 최소 2가지가 CPS 인시던트 대응을 어떻게 어렵게 하는지 구체적으로 분석한다.
    hint: "은폐(HMI 위장·로그 조작)+지속(펌웨어 백도어)+물리 제약(즉시 격리 곤란·안전) 중 2+가 대응을 어렵게 하는 방식 분석."
    verify:
      type: "semantic"
      expect: "cps_ir_challenge"
      semantic:
        intent: |
          CPS 대응 방해 — 은폐·지속·물리 제약이 인시던트 대응을 어렵게 하는 특수성을 이해.
        success_criteria:
          - "은폐·지속·물리 제약 중 최소 2가지를 분석"
          - "각각이 대응을 어떻게 어렵게 하는지 구체적으로 서술"
          - "(설명) CPS 인시던트가 IT와 다른 점을 언급"
        acceptable_methods:
          - "은폐/지속/물리 제약 분석"
        negative_signs:
          - "특수성 1개·막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 물리 안전 트레이드오프 악용 분석

      "격리하면 안전 위험, 가동 유지하면 공격 지속"이라는 **CPS 대응 딜레마**를 공격자가 어떻게
      악용하는지 분석한다(예: 안전 필수 프로세스를 인질로).

      ### ✅ 합격 기준
      격리 vs 가동 유지 딜레마를 설명하고, 공격자가 물리 안전 제약을 악용해 대응을 지연/무력화하는
      시나리오를 분석한다.
    hint: "격리=안전 위험 vs 가동 유지=공격 지속 딜레마. 공격자가 안전 필수 프로세스를 인질로 대응 지연/무력화하는 시나리오."
    verify:
      type: "semantic"
      expect: "safety_tradeoff_abuse"
      semantic:
        intent: |
          물리 안전 트레이드오프 악용 — 격리/가동 딜레마를 공격자가 악용하는 방식을 이해.
        success_criteria:
          - "격리 vs 가동 유지 딜레마를 설명"
          - "공격자가 물리 안전 제약을 악용해 대응을 지연/무력화하는 시나리오를 분석"
          - "(설명) 안전 최우선이 대응을 제약함을 언급"
        acceptable_methods:
          - "딜레마 설명 + 악용 시나리오"
        negative_signs:
          - "딜레마 설명 없음"
          - "악용 시나리오 막연"

# ───────────────────────── BLUE (CPS 안전 우선 인시던트 대응) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — CPS 인시던트 탐지·트리아지·안전 판단

      CPS 인시던트의 **탐지·트리아지**를 안전 관점으로 설계한다.

      ### 무엇을
      - **탐지**: 사이버(프로토콜 이상)+물리(프로세스 이탈·독립 계측 불일치=은폐 탐지).
      - **트리아지**: 물리 안전 영향(위험도)을 우선 평가, 안전 위험이면 즉시 안전 조치.
      - **안전 판단**: 격리 vs 가동 유지 결정 기준(안전 최우선), 안전 팀·엔지니어 협업.

      ### ✅ 합격 기준
      사이버+물리 탐지(은폐 탐지 포함)와 안전 영향 우선 트리아지·격리 결정 기준을 구체적으로 설계한다.
    hint: "사이버+물리 탐지(독립 계측 은폐 탐지)+안전 영향 우선 트리아지+격리 vs 가동 결정 기준(안전 최우선)·엔지니어 협업."
    verify:
      type: "semantic"
      expect: "cps_ir_triage"
      semantic:
        intent: |
          CPS 인시던트 탐지·트리아지 — 물리 안전 영향을 우선하는 탐지·판단.
        success_criteria:
          - "사이버+물리 탐지(독립 계측 은폐 탐지)를 제시"
          - "안전 영향 우선 트리아지를 제시"
          - "(설명) 격리 vs 가동 결정 기준(안전 최우선)·협업을 제시"
        acceptable_methods:
          - "탐지 + 안전 우선 트리아지 + 결정 기준"
        negative_signs:
          - "물리/안전 관점 없이 IT식 대응만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 우선 봉쇄·복구·포렌식 설계

      CPS 특수성을 반영한 **봉쇄·복구·포렌식**을 설계한다.

      ### 무엇을
      - **봉쇄(안전 우선)**: 안전 상태로 전환 후 격리(SIS 활용), 안전 필수 기능은 수동/독립 운용으로 유지.
      - **복구**: 검증된 백업·펌웨어 재설치(백도어 제거)·설정 무결성 복원, 단계적 재가동.
      - **포렌식**: 물리 증거(계측 로그)+사이버 증거, 은폐 대비 독립 기록, 휘발성·실시간성 고려.
      - **사후·회복탄력성**: 재발 방지·이중화·훈련, 안전과 보안 통합 거버넌스.

      ### ✅ 합격 기준
      안전 우선 봉쇄·검증 복구·CPS 포렌식·회복탄력성을 제시하고 "대응 전 과정에서 물리 안전 최우선"
      원칙을 설명한다.
    hint: "안전 상태 전환 후 격리(SIS)+검증 백업·펌웨어 재설치·단계 재가동+물리+사이버 포렌식(독립 기록)+재발 방지·이중화. '물리 안전 최우선' 원칙."
    verify:
      type: "semantic"
      expect: "cps_ir_recovery"
      semantic:
        intent: |
          CPS 봉쇄·복구·포렌식 — 안전 우선으로 봉쇄·복구하고 물리+사이버 포렌식으로 회복탄력성 확보.
        success_criteria:
          - "안전 우선 봉쇄(안전 상태 전환 후 격리·SIS)를 제시"
          - "검증 복구(백업·펌웨어 재설치·단계 재가동)를 제시"
          - "CPS 포렌식(물리+사이버·독립 기록)과 회복탄력성을 제시"
          - "(설명) '대응 전 과정 물리 안전 최우선' 원칙 설명"
        acceptable_methods:
          - "안전 봉쇄 + 검증 복구 + 포렌식 + 회복탄력성"
        negative_signs:
          - "안전 우선 관점 없이 즉시 격리만"
          - "물리 포렌식·복구 검증 없음"
