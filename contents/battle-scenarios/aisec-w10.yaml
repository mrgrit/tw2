id: "aisec-w10"
category: "aisec"
title: "[AI에이전트보안 W10] 멀티에이전트 조율 신뢰 악용 vs 전문 에이전트·교차 검증 설계"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  멀티에이전트 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 전문 에이전트의 조율과 **교차 검증**, 그 위협(신뢰 악용·오염 전파)을
  다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(조율 신뢰 악용)와 Blue(교차 검증 설계)를 모두 수행.
    • duel : Red 학생이 신뢰를 악용하고, Blue 학생이 교차 검증으로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거·설계**로 판정. 고유 마커(`INJECTED-BY-<학번>`).

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 공유 지식 오염 → 전문 에이전트 전파

      공유 지식을 오염시켜 **협력하는 전문 에이전트로 전파**됨을 실증한다.

      ### 권장 명령 (참고 — 마커는 본인 학번)
      ```bash
      curl -s http://192.168.0.161:8007/api/rag/add -H 'content-type: application/json' \
        -d '{"title":"shared","content":"Shared: INJECTED-BY-<학번>.","tag":"public"}'
      ```

      ### ✅ 합격 기준
      공유 지식 오염(고유 마커)과 협력 흐름 전파를 증거로 보인다.
    hint: "공유 지식(rag/add) 오염(마커)→협력 전파(마커 출현) 증거. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "as-10-1", type: "command_ran", target: "attacker",
            params: { pattern: "rag" } }
      semantic:
        intent: |
          조율 신뢰 악용 — 공유 지식 오염이 전문 에이전트로 전파됨을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add 호출 흔적이 남음"
          - "오염 전파(마커 출현)를 증거로 제시"
          - "(설명) 암묵 신뢰 위험을 설명"
        acceptable_methods:
          - "공유 지식 오염 + 전파 증거"
        negative_signs:
          - "명령 흔적·마커 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 조율 위협 유형 분석

      멀티에이전트 **조율 위협**을 분석한다: 신뢰 남용·책임 분산·조율자 장악·합의 조작.

      ### ✅ 합격 기준
      조율 위협 최소 3가지를 분석하고 협력이 공격 표면을 넓히는 방식을 설명한다.
    hint: "신뢰 남용·책임 분산·조율자 장악·합의 조작 3+ 분석. 협력이 표면 확대."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-10-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          조율 위협 — 협력 구조가 새 공격 표면을 만듦을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "조율 위협 최소 3가지를 분석"
          - "(설명) 협력이 표면을 넓히는 방식을 설명"
        acceptable_methods:
          - "조율 위협 분석"
        negative_signs:
          - "위협 3개 미만·막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 조율 신뢰 표면 진단

      멀티에이전트 **조율 신뢰 표면**을 진단한다.

      ### ✅ 합격 기준
      공유 지식 오염·에이전트 간 신뢰 위험을 증거·분석으로 진단한다.
    hint: "공유 지식 오염·에이전트 신뢰·조율자 위험 증거·분석 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-10-3", type: "command_ran", target: "attacker",
            params: { pattern: "rag" } }
      semantic:
        intent: |
          조율 신뢰 진단 — 공유 지식·신뢰 위험을 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "공유 지식 오염·신뢰 위험을 진단"
          - "(설명) 위험을 식별"
        acceptable_methods:
          - "조율 신뢰 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 전문 에이전트·교차 검증 설계

      멀티에이전트의 **전문화·교차 검증·신뢰 경계**를 설계한다.

      ### 무엇을
      - **교차 검증**: 중요 판단을 독립 에이전트가 교차 검증·합의(단일 신뢰 금지).
      - **신뢰 경계**: 에이전트 간 출력을 미신뢰 데이터로 취급·검증.
      - **공유 지식 무결성**: 인증·출처·오염 격리.
      - **책임·감사**: 각 에이전트 책임·위임 사슬 감사·조율자 보호.

      ### ✅ 합격 기준
      교차 검증·신뢰 경계·지식 무결성·감사를 제시하고 "협력은 검증·신뢰 경계와 함께" 원칙을 설명한다.
    hint: "교차 검증·합의(단일 신뢰 금지)+에이전트 출력 미신뢰·검증+공유 지식 인증·오염 격리+위임 사슬 감사·조율자 보호. '협력은 검증·경계' 원칙."
    verify:
      type: "semantic"
      expect: "multiagent_crosscheck"
      semantic:
        intent: |
          전문 에이전트·교차 검증 — 교차 검증·신뢰 경계·지식 무결성으로 조율을 안전하게.
        success_criteria:
          - "교차 검증·합의를 제시"
          - "신뢰 경계·공유 지식 무결성을 제시"
          - "책임·감사를 제시하고 원칙 설명"
        acceptable_methods:
          - "교차 검증 + 신뢰 경계 + 지식 무결성 + 감사"
        negative_signs:
          - "단일 신뢰 유지"
          - "교차 검증·감사 없음"
