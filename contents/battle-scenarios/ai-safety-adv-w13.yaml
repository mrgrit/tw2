id: "ai-safety-adv-w13"
category: "ai-safety-adv"
title: "[AI안전심화 W13] AI 거버넌스+규제: 컴플라이언스 갭 vs EU AI Act·NIST AI RMF 자동화"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  AI 거버넌스·규제 공방전 — EU AI Act·NIST AI RMF 기준 컴플라이언스 갭 분석과 준수 자동화를 설계한다.
  규제·정책은 **설계·분석형**이다(semantic 채점). 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 규제 컴플라이언스 갭 분석
      대상 AI 서비스가 EU AI Act(위험 등급·투명성·인간 감독)·GDPR·NIST AI RMF 대비 위반하는 항목을
      실제 취약(PII 유출·투명성 부재·감독 부재)에 근거해 분석한다.
      ### ✅ 합격 기준: 최소 3개 규제 항목 위반을 실제 취약 근거로 분석한다.
    hint: "EU AI Act(위험 등급·투명성·인간 감독)·GDPR·NIST AI RMF 위반 3+ 실제 취약 근거 분석."
    verify:
      type: "semantic"
      expect: "compliance_gap"
      semantic:
        intent: "규제 갭 분석 — 실제 취약을 규제 위반으로 매핑."
        success_criteria:
          - "최소 3개 규제 항목 위반을 분석"
          - "실제 취약(PII·투명성·감독)에 근거"
          - "(설명) EU AI Act·NIST AI RMF 매핑"
        acceptable_methods: ["규제별 위반 분석"]
        negative_signs: ["규제 근거 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 규제 리스크·집행 영향 평가
      위반을 규제 리스크(과징금·금지·시정명령)로 등급화하고 고위험 AI 분류 여부를 판정한다.
      ### ✅ 합격 기준: 위반을 규제 리스크로 등급화하고 고위험 분류를 판정한다.
    hint: "위반→규제 리스크(과징금·금지·시정)+고위험 AI 분류 판정."
    verify:
      type: "semantic"
      expect: "regulatory_risk_adv"
      semantic:
        intent: "규제 리스크 평가 — 위반의 집행 영향·고위험 분류."
        success_criteria:
          - "위반을 규제 리스크로 등급화"
          - "고위험 AI 분류 여부를 판정"
          - "(설명) 집행 영향을 서술"
        acceptable_methods: ["리스크 등급 + 분류 판정"]
        negative_signs: ["등급·분류 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 규제 준수 거버넌스 설계
      NIST AI RMF(Govern·Map·Measure·Manage)+EU AI Act 요구(위험 관리·투명성·인간 감독·로깅)+데이터
      거버넌스+책임성.
      ### ✅ 합격 기준: RMF·AI Act 요구를 매핑한 거버넌스를 설계한다.
    hint: "NIST AI RMF+EU AI Act(위험 관리·투명성·인간 감독·로깅)+데이터 거버넌스+책임성 매핑."
    verify:
      type: "semantic"
      expect: "regulatory_governance"
      semantic:
        intent: "규제 준수 거버넌스 — RMF·AI Act 요구를 프레임워크로."
        success_criteria:
          - "NIST AI RMF(Govern·Map·Measure·Manage)를 제시"
          - "EU AI Act 요구(위험 관리·투명성·인간 감독·로깅)를 제시"
          - "데이터 거버넌스·책임성을 매핑"
        acceptable_methods: ["RMF + AI Act 매핑"]
        negative_signs: ["규제 매핑 없이 일반론"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 컴플라이언스 자동화 설계
      준수 증거 자동 수집(로깅·감사)+지속 평가·리포팅+정책 as code+수명주기 게이트.
      ### ✅ 합격 기준: 준수 증거 자동화·지속 평가·정책 as code·게이트를 제시하고 "준수를 자동·지속" 원칙을
      설명한다.
    hint: "준수 증거 자동 수집(로깅·감사)+지속 평가·리포팅+정책 as code+수명주기 게이트. '자동·지속 준수' 원칙."
    verify:
      type: "semantic"
      expect: "compliance_automation"
      semantic:
        intent: "컴플라이언스 자동화 — 증거 수집·지속 평가·정책 코드화."
        success_criteria:
          - "준수 증거 자동 수집(로깅·감사)을 제시"
          - "지속 평가·리포팅을 제시"
          - "정책 as code·수명주기 게이트를 제시"
          - "(설명) '준수를 자동·지속' 원칙 설명"
        acceptable_methods: ["증거 자동화 + 지속 평가 + 정책 코드"]
        negative_signs: ["수동·일회성만"]
