id: "soc-w15"
category: "soc"
title: "[SOC관제 W15] 기말 — APT 5단계 vs 종합 인시던트 대응(탐지·ATT&CK·IR 6단계·CTI·자동화)(수료)"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  SOC 관제 15주차 — **기말(수료)**. W01~W14 의 관제 역량을 **APT 5 단계**(Recon T1595 → Brute T1110
  → Exploit T1190 → C2 T1071 → Exfil T1041)로 통합 평가한다. 공격자가 다단계 APT 를 진행하면, 관제자는
  ① 탐지(SIGMA/룰), ② ATT&CK kill chain 매핑, ③ IR 6단계 대응, ④ CTI 공유, ⑤ 자동화/회고까지
  SOC 분석가의 전 역량을 동원한다. 14주 SOC 관제의 종합이자 수료.

  ▸ 모드: solo(APT 공격자 → 종합 관제자) / duel(상대 APT → 본인 종합 대응). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** + 호스트 침해. 외부 명령 미수집 → 대상 흔적으로 채점.
  ▸ 마커: 탐지룰 Suricata sid **9515001**, IOC 룰 Wazuh id **9515100**, 호스트 아티팩트 **포트 19999 /
    사용자 eduintruder**. 마지막에 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 [단계1·2·3] — Recon → Brute → Exploit

      ① nmap 정찰 → ② SSH 무차별대입 → ③ 웹 익스플로잇(SQLi)으로 발판을 만든다. 다계층(네트워크/
      인증/웹)에 흔적을 남긴다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      nmap -sV <대상_공개IP>; hydra -l admin -P rockyou.txt ssh://<대상_공개IP>:2204
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%201"
      ```
      📌 채점: 외부 명령 미수집 → 대상 IPS(정찰) + WAF(SQLi 942) 흔적.
      ✅ 합격: 대상 IPS 에 스캔, WAF audit 에 SQLi(942) 탐지.
    hint: "attacker-ext nmap+hydra+SQLi. 채점: 대상 Suricata scan + ModSec 942."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
        - { id: "red-1-2", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "APT 단계1·2·3 — Recon(T1595)→Brute(T1110)→Exploit(T1190). 다계층 킬체인. 외부 공격자 모델 → 대상 IPS+WAF 흔적으로 판정."
        success_criteria: ["대상 IPS 스캔 + WAF 942 탐지", "(설명) 정찰→무차별대입→침투 단계 연결 서술"]
        acceptable_methods: ["attacker-ext nmap+hydra+sqlmap"]
        negative_signs: ["대상 미도달", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 [단계4·5] — C2 → Exfiltration

      ④ C2 비콘(**포트 19999**)으로 지휘통제 채널을 열고, ⑤ persistence 계정(**eduintruder**)으로
      지속 유출 발판을 확보한다.

      ### 권장 명령 (참고)
      ```bash
      nohup ncat -lk 19999 >/dev/null 2>&1 &; sudo useradd -m -s /bin/bash eduintruder
      ```
      📌 채점: 대상 호스트에 C2(포트 19999) + persistence(eduintruder)가 생겼는지.
      ✅ 합격: 포트 19999 listening, /etc/passwd 에 eduintruder.
    hint: "ncat 19999 + useradd eduintruder. 채점: port_listening 19999 + file_contains passwd eduintruder."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 19999 } }
        - { id: "red-2-2", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "APT 단계4·5 — C2(T1071) + Exfil(T1041). 지휘통제 채널 + 지속 유출 발판."
        success_criteria: ["포트 19999 + eduintruder", "(설명) C2/Exfil 기법 서술"]
        acceptable_methods: ["ncat 리스너 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 [탐지] — SIGMA/Suricata 탐지룰 (sid 9515001)

      APT 의 정찰/침투를 탐지하는 룰(**sid 9515001**)을 `local.rules` 에 작성한다(SIGMA 로 기술 후
      Suricata 변환 가능).

      📌 채점: local.rules 에 탐지룰(sid 9515001)이 작성됐는지.
      ✅ 합격: local.rules 에 9515001 룰이 있다.
    hint: "local.rules 에 APT 탐지룰(sid 9515001) → reload."
    verify:
      type: "file_contains"
      expect: "9515001"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9515001" } }
      semantic:
        intent: "탐지 — SIGMA/Suricata 룰로 APT 단계 탐지. 표준 기술 + 실 적용."
        success_criteria: ["local.rules 에 sid 9515001", "(SIGMA) 표준 기술 후 변환", "(검증) eve.json 매치"]
        acceptable_methods: ["SIGMA→Suricata 변환 + local.rules + reload"]
        negative_signs: ["문법 오류 로딩 실패"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 [ATT&CK] — kill chain 매핑

      수집된 경보를 ATT&CK kill chain 단계(Recon→Brute→Exploit→C2→Exfil)로 매핑해 APT 캠페인의
      전모를 재구성한다.

      📌 채점: 본인 SIEM 에 다단계 경보가 수집됐는지(매핑 대상).
      ✅ 합격: 본인 SIEM 에 최근 경보가 수집돼 있다.
    hint: "경보 → ATT&CK kill chain 단계 매핑 + 캠페인 재구성. 채점: wazuh_alert + 매핑 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-2-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "ATT&CK 매핑 — 경보를 kill chain 단계로 배열해 APT 캠페인 재구성."
        success_criteria: ["경보 수집 확인", "(매핑) 5단계 technique 매핑", "(재구성) 캠페인 타임라인"]
        acceptable_methods: ["ATT&CK 매핑 + 타임라인"]
        negative_signs: ["단계 매핑 누락"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [IR 6단계] — persistence 헌팅 + 격리/제거

      IR 6단계(준비/식별/격리/제거/복구/교훈)를 적용한다. RED 의 C2(19999)·persistence(eduintruder)를
      헌팅해 격리·제거하고 서비스를 복구한다.

      📌 채점: 대상 호스트에서 persistence(eduintruder) + C2(19999)가 헌팅되는지.
      ✅ 합격: /etc/passwd 에 eduintruder, 포트 19999 listening(식별 후 제거).
    hint: "osquery 로 C2/persistence 헌팅 → 격리/제거. 채점: file_contains passwd eduintruder + port_listening 19999."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
        - { id: "blue-3-2", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "IR 6단계 — C2/persistence 헌팅 후 격리·제거·복구. 전수 조사가 핵심."
        success_criteria: ["C2 + persistence 헌팅 확인", "(IR) 식별→격리→제거→복구 단계 적용", "(전수) 모든 발판 점검"]
        acceptable_methods: ["osquery 헌팅 + 격리/제거 + 복구"]
        negative_signs: ["발판 잔존", "IR 단계 누락"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [CTI+자동화] — IOC CDB 룰 + Active Response (id 9515100)

      이번 APT 의 IOC(C2 IP/포트, 공격 출발지)를 CDB list 로 등록하고 매칭/격상 룰(**id 9515100**)을
      `local_rules.xml` 에 작성한다. Active Response 와 연계해 재발 시 자동 차단되게 한다.

      📌 채점: local_rules.xml 에 IOC 룰(id 9515100)이 작성됐는지.
      ✅ 합격: local_rules.xml 에 9515100 룰이 있다.
    hint: "CDB list + local_rules.xml IOC 룰(id 9515100) + Active Response 연계 → restart."
    verify:
      type: "file_contains"
      expect: "9515100"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "9515100" } }
      semantic:
        intent: "CTI+자동화 — APT IOC 를 CDB+룰로 운영화 + Active Response 자동 차단. 헌팅→자동 대응 환류."
        success_criteria: ["local_rules.xml 에 rule id 9515100", "CDB list IOC + 매칭/격상", "(자동화) Active Response 연계"]
        acceptable_methods: ["CDB list + local_rules.xml 9515100 + AR 연계 + restart"]
        negative_signs: ["IOC 미운영화", "자동 차단 미연계"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 19
    instruction: |
      ## 🛡️ BLUE-5 [종합] — IR 보고서 + R/B/P 회고 + Cleanup (수료)

      APT 5단계 대응 전체를 IR 보고서(타임라인 / ATT&CK 매핑 / 단계별 탐지·격리·제거 근거 / 권고)로
      종합하고, Red/Blue/Purple 회고로 개선점을 도출한다. 마지막으로 실습 룰·호스트 아티팩트
      (9515001/9515100/eduintruder/19999)를 **일괄 cleanup** 한다. SOC 관제 14주의 종합이자 수료.

      📌 채점: 본인 SIEM 에 APT 다단계 경보가 수렴했는지(+ 보고서/회고/cleanup 은 제출로 검증).
      ✅ 합격: 본인 SIEM 에 최근 다단계 경보가 수렴해 있다.
    hint: "APT IR 보고서 + R/B/P 회고 + 일괄 cleanup. 채점: wazuh_alert + 보고서/cleanup 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "종합 — APT IR 보고서(타임라인/ATT&CK/근거/권고) + R/B/P 회고 + 운영 위생(cleanup). 수료의 산출물."
        success_criteria: ["다단계 경보 수렴 확인", "(보고서) 타임라인+ATT&CK+단계별 근거+권고", "(회고) R/B/P 개선점", "(cleanup) 실습 룰/아티팩트 일괄 정리"]
        acceptable_methods: ["IR 보고서 + 회고 + cleanup"]
        negative_signs: ["보고서/회고 없이 단편 대응", "cleanup 미완(룰/계정/리스너 잔존)"]
