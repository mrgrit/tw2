id: "soc-w15"
category: "soc"
title: "[SOC관제 W15] 기말 — APT 캠페인 전체를 SOC 전 역량으로 분석·대응하기(수료)"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  SOC 관제의 **수료 시험**. 한 **APT 캠페인**이 5단계 킬체인으로 들어온다 — 정찰 → 침투 → 호스트 발판 →
  C2/유출 → (대응). 14주 동안 배운 **SOC 분석가의 전 역량**을 하나의 사건에 동원한다: ① 다소스 탐지와
  SIGMA 룰, ② ATT&CK kill chain 매핑, ③ IR 6단계 대응, ④ 위협 인텔(CTI) 활용, ⑤ 자동화와 종합 IR
  보고서.

  ▸ 이야기
    공격자가 정찰로 표면을 훑고, 웹으로 침투하고, 호스트에 C2 채널과 백도어 계정을 심는다. 관제자(너)는
    탐지룰로 잡고, ATT&CK으로 매핑하고, IR 절차로 대응하고, IOC를 운영화하고, 전체를 보고서로 종합한다.

  ▸ 모드: solo(APT 공격자→종합 관제자) / duel(상대 APT→본인 종합 대응). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 단계 독립 채점. 마커: 웹 침투 태그 **`soc15r1-<id>`**, C2 리스너 **포트 53535**, 백도어
    계정 **`aptsoc`**, IDS 룰 **sid 9515015**(Suricata), 인텔 룰 **id 101515**(Wazuh). 끝나면 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 [1·2단계] — 정찰 → 웹 침투

      ### 상황
      APT 1·2단계. 스캐너로 정찰하고 SQLi로 침투한다.

      ### 할 일
      이 미션 전용 태그 `soc15r1-<id>`를 붙여 sqlmap UA로 SQLi를 보낸다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
        "http://{{WEB_ENTRY}}/?id=soc15r1-kim-1%20UNION%20SELECT%201"
      ```

      ### 채점 방법
      대상 WAF audit에 (soc15r1 태그 포함) 침투 탐지(913/942)가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 soc15r1 태그가 포함된 침투 탐지가 남는다.
    hint: "태그(soc15r1) sqlmap SQLi. 채점: 대상 modsec audit의 913/942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "soc15r1", since_sec: 1800 } }
      semantic:
        intent: "APT 1·2단계 — Recon(T1595)→Initial Access(T1190). 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (soc15r1 태그 포함) 침투 탐지(913/942)"
          - "정찰→침투 단계 연결 서술"
        acceptable_methods:
          - "외부 공격자 VM({{ATTACKER_IP}})에서 태그 붙인 sqlmap SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 [3·4단계] — 호스트 발판 → C2 채널

      ### 상황
      APT 3·4단계. 백도어 계정(**aptsoc**)으로 지속성을 확보하고 C2 리스너(**포트 53535**)로 지휘통제/
      유출 채널을 연다.

      ### 할 일
      대상 호스트에 계정 `aptsoc`와 리스너 포트 53535를 만든다.
      ```bash
      sudo useradd -m -s /bin/bash aptsoc
      nohup ncat -lk 53535 >/dev/null 2>&1 &
      ```

      ### 채점 방법
      대상 호스트에 포트 53535 listening 또는 `/etc/passwd`에 `aptsoc`가 있는지로 채점.

      ### 합격 기준
      포트 53535 listening 또는 `/etc/passwd`에 `aptsoc`.
    hint: "useradd aptsoc + ncat -lk 53535. 채점: file_contains passwd aptsoc + port_listening 53535."
    verify:
      type: "file_contains"
      expect: "aptsoc"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "aptsoc" } }
        - { id: "red-2-2", type: "port_listening", target: "web", params: { port: 53535 } }
      semantic:
        intent: "APT 3·4단계 — Execution/Lateral(T1136 계정) + C2(T1571 채널). 발판 이후 지속성·유출 채널."
        success_criteria:
          - "aptsoc 계정 또는 포트 53535"
          - "persistence와 C2 채널 기법 서술"
        acceptable_methods:
          - "useradd + ncat 리스너"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 [탐지] — SIGMA/Suricata 탐지룰 (sid 9515015)

      ### 상황
      APT의 정찰/침투를 탐지하는 룰(**sid 9515015**)을 `local.rules`에 작성한다(SIGMA로 기술 후 변환).

      ### 할 일
      ```
      alert http any any -> any any (msg:"SOC15 APT sqlmap recon"; http.user_agent; content:"sqlmap"; nocase; fast_pattern; sid:9515015; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9515015 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9515015 룰이 있다.
    hint: "local.rules에 APT 탐지룰(sid 9515015) → reload."
    verify:
      type: "file_contains"
      expect: "9515015"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9515015" } }
      semantic:
        intent: "APT 탐지 — SIGMA/Suricata 룰로 정찰 단계 탐지. 킬체인 조기 가시화."
        success_criteria:
          - "local.rules에 sid 9515015"
          - "fast_pattern/적절한 버퍼"
          - "SIGMA→Suricata 변환 + eve.json 검증"
        acceptable_methods:
          - "local.rules 작성 + reload + eve.json 검증"
        negative_signs:
          - "문법 오류로 로딩 실패"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 [ATT&CK] — kill chain 매핑

      ### 상황
      수집된 경보를 ATT&CK kill chain 단계(Recon→Initial Access→Execution→C2→Exfil)로 매핑해 APT
      캠페인의 전모를 재구성한다.

      ### 할 일
      경보를 kill chain 단계로 매핑하고 캠페인을 재구성한다.

      ### 채점 방법
      Wazuh에 다단계 경보가 있는지 + 매핑(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 최근 경보가 수집돼 있다(+ 매핑은 제출로 검증).
    hint: "경보 → ATT&CK kill chain 단계 매핑 + 캠페인 재구성. 채점: wazuh_alert + 매핑 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-2-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "ATT&CK 매핑 — 경보를 kill chain 단계로 배열해 APT 캠페인 재구성."
        success_criteria:
          - "경보 수집 확인"
          - "5단계 technique 매핑"
          - "캠페인 타임라인 재구성"
        acceptable_methods:
          - "ATT&CK 매핑 + 타임라인"
        negative_signs:
          - "단계 매핑 누락"

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [IR 6단계] — persistence 헌팅 + 격리/제거

      ### 상황
      IR 6단계를 적용한다. RED-2의 C2(53535)·persistence(aptsoc)를 헌팅해 격리·제거하고 서비스를
      복구한다.

      ### 할 일
      호스트를 헌팅해 C2/persistence를 찾고 IR 절차(식별→격리→제거→복구)를 적용한다.

      ### 채점 방법
      대상 호스트에서 persistence(aptsoc) 또는 C2(53535)가 헌팅되는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 aptsoc 또는 포트 53535 listening(식별 후 제거).
    hint: "호스트 헌팅으로 C2/persistence 찾기 → IR 절차. 채점: file_contains passwd aptsoc + port_listening 53535."
    verify:
      type: "file_contains"
      expect: "aptsoc"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "aptsoc" } }
        - { id: "blue-3-2", type: "port_listening", target: "web", params: { port: 53535 } }
      semantic:
        intent: "IR 6단계 — C2/persistence 헌팅 후 격리·제거·복구. 전수 조사가 핵심. 채점 핵심은 발견+전수조사(도구 실행 증거 비요구)."
        success_criteria:
          - "C2 또는 persistence 헌팅 확인"
          - "식별→격리→제거→복구 단계 적용"
          - "모든 발판 전수 점검(음성 결과 포함 보고)"
        acceptable_methods:
          - "osquery/ss/grep로 발견 + 격리/제거/복구(도구보다 전수 조사 핵심)"
        negative_signs:
          - "발판 잔존 / IR 단계 누락"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [CTI+자동화] — IOC Wazuh 룰 + Active Response (id 101515)

      ### 상황
      이 APT의 IOC(C2 포트/도구 시그니처)를 Wazuh 룰(**id 101515**)로 격상해 재발 시 자동 고위험 탐지
      되게 한다.

      ### 할 일
      `local_rules.xml`에 IOC 격상 룰을 추가하고 `wazuh-control restart`한다.
      ```xml
      <group name="edu,web,">
        <rule id="101515" level="13">
          <if_group>web</if_group>
          <match>sqlmap</match>
          <description>EDU W15 - APT known tool IOC, escalate</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml`에 id 101515 룰이 있는지로 확인.

      ### 합격 기준
      local_rules.xml에 101515 룰이 있다.
    hint: "local_rules.xml에 APT IOC 격상 룰(id 101515) → restart."
    verify:
      type: "file_contains"
      expect: "101515"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "101515" } }
      semantic:
        intent: "CTI+자동화 — APT IOC를 Wazuh 룰로 격상 + Active Response 연계. 헌팅→자동 대응 환류."
        success_criteria:
          - "local_rules.xml에 rule id 101515"
          - "APT IOC 기반 격상 로직"
          - "재발 시 자동 고위험 탐지 의의"
        acceptable_methods:
          - "local_rules.xml 101515 + restart"
        negative_signs:
          - "IOC 미운영화 / XML 오류"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 19
    instruction: |
      ## 🛡️ BLUE-5 [보고·수료] — 종합 IR 보고서 + 회고 + Cleanup

      ### 상황
      수료의 산출물 — APT 5단계 전체를 SIEM 한 화면으로 종합하고 **IR 보고서**(타임라인/단계별 탐지·
      대응 근거/ATT&CK/권고)를 작성한다. Red/Blue/Purple 회고로 개선점을 도출하고, 실습 룰·아티팩트
      (9515015/101515/aptsoc/53535)를 **일괄 cleanup**한다. 14주 SOC 관제의 종합이자 수료.

      ### 할 일
      SIEM 수렴 확인 + IR 보고서 + R/B/P 회고 + 일괄 cleanup.

      ### 채점 방법
      Wazuh에 다단계 경보가 수렴했는지 + 보고서/회고/cleanup(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 최근 다단계 경보가 수렴해 있다(+ 보고서/회고/cleanup은 제출로 검증).
    hint: "APT 5단계 SIEM 수렴 + IR 보고서 + R/B/P 회고 + 일괄 cleanup. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "APT 종합 — 5단계를 SIEM으로 종합 + IR 보고서(타임라인/ATT&CK/근거/권고) + R/B/P 회고 + 운영 위생(cleanup). 수료 산출물."
        success_criteria:
          - "다단계 경보 수렴 확인"
          - "APT 5단계 타임라인 + 단계별 탐지·대응 근거 + ATT&CK + 권고"
          - "R/B/P 회고 + 실습 룰/아티팩트 일괄 cleanup"
        acceptable_methods:
          - "IR 보고서 + 회고 + cleanup"
        negative_signs:
          - "보고서/회고 없이 단편 대응 / cleanup 미완"
