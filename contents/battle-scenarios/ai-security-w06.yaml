id: "ai-security-w06"
category: "ai-security"
title: "[AI보안활용 W6] 취약 코드·CVE 소재 vs LLM 취약점 분석·오탐 한계·결정론 검증"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — **LLM으로 취약점 분석**(코드 리뷰·CVE 영향 평가)을 하되 오탐 한계를 결정론으로
  보완한다. Red는 취약/정상 코드와 CVE 시나리오를 소재로 제시하고, Blue는 LLM 분석 후 검증한다.
  실물 코드 소재가 필요하므로 이 주차는 **분석·설계형(semantic)** 이 중심이다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(취약 코드·CVE 소재)와 Blue(LLM 분석·검증)를 모두 수행.
    • duel : Red 학생이 분석 대상을 제시하고, Blue 학생이 LLM으로 분석·검증한다.

  ▸ 채점(중요) — 코드/CVE 소재는 el34 앱·공개 CVE를 참고한다. **보고서의 분석 품질·검증**으로 채점
    (semantic). LLM 분석의 오탐/미탐과 결정론 검증이 핵심.

  ▸ 관점 — LLM 코드 리뷰는 빠르지만 **오탐(없는 취약 지적)·미탐·환각**이 있다. 결정론(정적 분석·PoC·
    버전 대조)으로 검증한다.

  ▸ 윤리 — 인가된 훈련 범위의 분석.

# ───────────────────────── RED (취약 코드·CVE 소재) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 취약/정상 혼합 분석 소재 구성

      LLM 취약점 분석을 시험할 **취약 코드와 정상 코드를 섞은 소재**를 구성한다(el34 취약앱·공개 예제 참고).

      ### 무엇을
      - 명백한 취약(SQLi·명령 주입·하드코딩 비밀)과 정상(안전한 처리)을 섞은 코드 스니펫을 준비.
      - LLM이 취약을 정확히 찾고 정상을 오탐하지 않아야 하는 시험 세트 구성.

      ### ✅ 합격 기준
      취약·정상을 섞은 분석 소재를 구성하고, 각 스니펫의 정답(취약 여부·유형)을 명시한다.
    hint: "취약(SQLi·명령 주입·하드코딩 비밀)+정상 코드 혼합 소재 구성 + 각 정답(취약 여부·유형) 명시. el34 취약앱 참고."
    verify:
      type: "semantic"
      expect: "vuln_test_set"
      semantic:
        intent: |
          취약점 분석 시험 세트 — 취약·정상을 섞어 LLM 분석의 오탐/미탐을 시험할 소재를 구성.
        success_criteria:
          - "취약·정상 코드를 섞은 소재를 구성"
          - "각 스니펫의 정답(취약 여부·유형)을 명시"
          - "(설명) 오탐/미탐을 시험하는 의도를 제시"
        acceptable_methods:
          - "혼합 소재 + 정답 명시"
        negative_signs:
          - "취약만·정답 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — CVE 영향 평가 함정 구성

      **CVE 영향 평가**의 함정을 구성한다: 버전은 취약하나 실제로는 미사용 경로, 또는 완화 설정으로 영향
      없는 경우 등 "버전만 보면 오판"하는 시나리오.

      ### ✅ 합격 기준
      "버전만 보면 취약하나 실제 영향은 다른" CVE 시나리오를 구성하고, LLM이 맥락 없이 오판할 지점을
      제시한다.
    hint: "버전 취약하나 미사용 경로/완화 설정으로 영향 없는 CVE 시나리오 구성 + LLM 오판 지점 제시."
    verify:
      type: "semantic"
      expect: "cve_context_trap"
      semantic:
        intent: |
          CVE 맥락 함정 — 버전만으로 판단하면 오판하는 시나리오로 맥락의 중요성을 드러냄.
        success_criteria:
          - "버전 취약하나 실제 영향이 다른 CVE 시나리오를 구성"
          - "LLM이 맥락 없이 오판할 지점을 제시"
          - "(설명) 맥락(사용 경로·완화)의 중요성을 언급"
        acceptable_methods:
          - "CVE 맥락 함정 + 오판 지점"
        negative_signs:
          - "단순 버전 매칭만"

# ───────────────────────── BLUE (LLM 분석·검증) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — LLM 코드 리뷰·CVE 평가 + 오탐/미탐 측정

      LLM으로 Red 소재를 분석하고 **오탐/미탐을 측정**한다.

      ### 어떻게
      - LLM에 코드 스니펫을 주고 취약 여부·유형을 판정, 정답과 대조해 오탐/미탐 측정.
      - CVE 시나리오는 맥락(사용 경로·완화)을 함께 줘 영향 평가.
      - LLM 판정을 결정론(정적 분석·PoC·버전 대조)으로 교차 검증.

      ### ✅ 합격 기준
      LLM 분석의 오탐/미탐을 정답과 대조해 측정하고, 결정론으로 교차 검증한다.
    hint: "LLM으로 코드 취약 판정→정답 대조 오탐/미탐 측정+CVE 맥락 평가+결정론(정적 분석·PoC·버전) 교차 검증."
    verify:
      type: "semantic"
      expect: "llm_vuln_analysis"
      semantic:
        intent: |
          LLM 취약점 분석 — LLM 판정의 오탐/미탐을 측정하고 결정론으로 검증.
        success_criteria:
          - "LLM으로 코드 취약 여부·유형을 판정하고 정답과 대조(오탐/미탐 측정)"
          - "CVE 맥락(사용 경로·완화) 영향 평가"
          - "(설명) 결정론(정적 분석·PoC·버전)으로 교차 검증"
        acceptable_methods:
          - "LLM 판정 + 오탐/미탐 측정 + 결정론 검증"
        negative_signs:
          - "정답 대조·측정 없음"
          - "결정론 검증 없이 LLM 신뢰"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — LLM 취약점 분석 한계·워크플로우 설계

      LLM 취약점 분석을 안전하게 쓰는 **한계 인식·워크플로우**를 설계한다.

      ### 무엇을
      - **한계**: 오탐(경보 피로)·미탐(놓침)·환각(없는 CVE)·맥락 부족(사용 경로).
      - **워크플로우**: LLM 초안(빠른 스크리닝)→결정론 검증(정적 분석·PoC·SBOM 대조)→사람 확인.
      - **맥락 주입**: 코드베이스·설정·SBOM을 컨텍스트로 줘 맥락 평가.
      - **우선순위**: 검증된 고위험만 에스컬레이션.

      ### ✅ 합격 기준
      한계·검증 워크플로우·맥락 주입·우선순위를 제시하고 "LLM은 스크리닝, 결정론·사람이 확정" 원칙을
      설명한다.
    hint: "한계(오탐·미탐·환각·맥락 부족)+워크플로우(LLM 스크리닝→결정론 검증→사람)+맥락 주입(코드·SBOM)+우선순위. 'LLM 스크리닝, 결정론·사람 확정' 원칙."
    verify:
      type: "semantic"
      expect: "vuln_analysis_workflow"
      semantic:
        intent: |
          LLM 취약점 분석 워크플로우 — 한계를 인식하고 스크리닝→검증→확정으로 안전하게 운영.
        success_criteria:
          - "한계(오탐·미탐·환각·맥락 부족)를 인식"
          - "검증 워크플로우(LLM 스크리닝→결정론 검증→사람)를 제시"
          - "맥락 주입·우선순위를 제시"
          - "(설명) 'LLM은 스크리닝, 결정론·사람이 확정' 원칙 설명"
        acceptable_methods:
          - "한계 + 워크플로우 + 맥락 + 우선순위"
        negative_signs:
          - "LLM 판정 확정 신뢰"
          - "결정론·사람 검증 없음"
