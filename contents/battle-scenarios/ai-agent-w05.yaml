id: "ai-agent-w05"
category: "ai-agent"
title: "[AI에이전트 W5] 서버 하네스(Bastion) 위임 악용 vs Manager–SubAgent 안전 실행 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  서버 사이드 하네스 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). bastion **Manager–SubAgent·A2A 실행 흐름**을 이해하고, 위임·원격 실행의
  악용과 안전 실행(whitelist·게이트)을 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(위임·실행 악용)와 Blue(안전 실행 설계)를 모두 수행.
    • duel : Red 학생이 위임 실행을 악용하고, Blue 학생이 안전 실행으로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 실행 도구 악용: 임의 실행 실증

      Manager가 SubAgent에 실행을 위임할 때, **안전 실행 통제가 없으면** 임의 실행이 됨을 실증한다.

      ### 권장 명령 (참고)
      ```bash
      curl -s http://192.168.0.161:8007/api/tool/exec_python -H 'content-type: application/json' \
        -d '{"code":"print(1+1)"}'
      ```

      ### ✅ 합격 기준
      실행 도구가 whitelist/게이트 없이 임의 코드를 실행함을 증명하고, 위임 실행의 위험을 설명한다.
    hint: "exec_python 임의 실행 실증(whitelist 부재)+위임 실행 위험 설명. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "ag-5-1", type: "command_ran", target: "attacker",
            params: { pattern: "tool" } }
      semantic:
        intent: |
          위임 실행 악용 — 안전 실행 통제 없는 위임이 임의 실행이 됨을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api/tool 호출 흔적이 남음"
          - "whitelist/게이트 없는 임의 실행을 증명"
          - "(설명) 위임 실행의 위험을 설명"
        acceptable_methods:
          - "exec_python 임의 실행 실증"
        negative_signs:
          - "명령 흔적 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 위임 신뢰·결과 검증 부재 분석

      **위임 결과를 검증하지 않을 때**의 위험을 분석한다: SubAgent 환각/오보를 Manager가 신뢰.

      ### ✅ 합격 기준
      위임 결과 검증 부재(환각 신뢰·권한 남용) 위험을 실제 응답 관찰과 함께 분석한다.
    hint: "위임 결과 미검증(SubAgent 환각/오보 신뢰·권한 남용) 위험을 응답 관찰과 함께 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-5-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          위임 검증 부재 — 결과 미검증이 환각·권한 남용을 부름을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "위임 결과 검증 부재 위험을 관찰과 함께 분석"
          - "(설명) 결과 검증의 필요를 언급"
        acceptable_methods:
          - "검증 부재 위험 분석"
        negative_signs:
          - "관찰 없이 서술만"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 실행·위임 표면 진단

      우리 에이전트의 **실행·위임 표면**을 진단한다: 안전 실행(whitelist)·권한·검증 유무.

      ### ✅ 합격 기준
      실행 통제·위임 권한·결과 검증 유무를 증거로 진단한다.
    hint: "실행 도구 whitelist·위임 권한·결과 검증 유무를 증거로 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-5-3", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          실행·위임 표면 진단 — 안전 실행·권한·검증 유무를 증거로 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "실행 통제·위임 권한·검증 유무를 진단"
          - "(설명) 공백을 식별"
        acceptable_methods:
          - "실행/위임 표면 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — Manager–SubAgent 안전 실행 설계

      bastion 관점의 **안전 실행·위임**을 설계한다.

      ### 무엇을
      - **안전 실행(whitelist)**: 허용된 명령/도구만 실행, 임의 실행 금지·샌드박스.
      - **위임 경계**: SubAgent 역할·권한 최소화, 위임 사슬 감사.
      - **결과 검증**: SubAgent 결과를 독립 검증(환각 방지) 후 반영.
      - **게이트**: 고위험 행동 사람 승인·자율성 수준.

      ### ✅ 합격 기준
      안전 실행(whitelist)·위임 경계·결과 검증·게이트를 제시하고 "위임은 최소 권한·검증·감사와 함께"
      원칙을 설명한다.
    hint: "안전 실행(whitelist·샌드박스)+위임 경계(역할·권한 최소·감사)+결과 검증+고위험 승인. '위임은 최소 권한·검증·감사' 원칙."
    verify:
      type: "semantic"
      expect: "safe_execution"
      semantic:
        intent: |
          안전 실행·위임 — whitelist·위임 경계·결과 검증·게이트로 서버 하네스를 안전하게.
        success_criteria:
          - "안전 실행(whitelist·샌드박스)을 제시"
          - "위임 경계(역할·권한 최소·감사)를 제시"
          - "결과 검증·게이트를 제시하고 원칙 설명"
        acceptable_methods:
          - "whitelist + 위임 경계 + 검증 + 게이트"
        negative_signs:
          - "임의 실행 허용"
          - "검증·감사 없음"
