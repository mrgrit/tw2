id: "autonomous-security-w08"
category: "autonomous-security"
title: "[자율보안 W8] 중간고사: 자율 보안 점검 CTF — 자율 킬체인 vs 자율 대응"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간고사 CTF 공방전 — W02~W07(ReAct·하니스·SubAgent 위임·Playbook·변조 불가 감사·RL 보상)을 종합해,
  **자율 에이전트 스타일의 킬체인**과 **자율 대응**을 겨룬다. 단순 명령이 아니라 자율 에이전트 설계
  원칙(3단계 처리·가드레일·위임·감사·정렬)을 실제 공방에 적용한다.

  ▸ 평가 성격 — 자율 에이전트 관점의 완결성(정찰→침투→감사, 탐지→트리아지→대응)과 bastion 원칙 적용을
    평가한다. 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율 킬체인)와 Blue(자율 대응)를 모두 수행.
    • duel : Red 학생이 자율 킬체인으로 공격하고, Blue 학생은 자율 대응으로 방어한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 자율 에이전트 설계**로 한다.
    고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE(PoC·파괴/유출 금지) 엄수.

# ───────────────────────── RED (자율 킬체인 종합) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 자율 킬체인 종합: 정찰→침투→감사

      자율 에이전트 관점으로 **정찰→침투→흔적/감사**의 완결 킬체인을 실행한다. W02~W07 원칙을 적용:
      ReAct 루프·3단계 처리·SubAgent 위임·Playbook·ROE.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 el34(192.168.0.161)를 정찰·웹 침투(고유 태그).
      - 각 단계에 어떤 자율 원칙(ReAct/위임/Playbook/게이트)을 적용했는지 명시.

      ### 권장 명령 (참고)
      ```bash
      nmap -sV -Pn 192.168.0.161 -p80,443,8007 --reason
      curl -A 'auto-red-<학번>-ctf' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 자율 킬체인 설계**(단계별 자율 원칙 적용·ROE).

      ### ✅ 합격 기준
      대상에 정찰·침투 흔적을 남기고, 자율 에이전트 원칙(ReAct/위임/Playbook/게이트/ROE)을 적용한
      완결 킬체인을 설명한다.
    hint: "정찰→침투→감사 완결 킬체인(태그 auto-red-<학번>)에 W02~W07 자율 원칙 적용. 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-8-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 킬체인 종합 — 자율 에이전트 원칙을 완결 킬체인에 적용. 중간 역량 종합 평가.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 정찰·침투 흔적이 남고 고유 태그로 귀속됨"
          - "정찰→침투→감사 완결 킬체인을 실행"
          - "(설명) 단계별 자율 원칙(ReAct/위임/Playbook/게이트/ROE) 적용을 명시"
        acceptable_methods:
          - "완결 킬체인 + 자율 원칙 매핑"
        negative_signs:
          - "흔적 없음"
          - "자율 원칙 적용 설명 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 자율 에이전트 관점 침투 보고 + 감사

      킬체인을 **자율 에이전트 보고서**로 정리한다: 각 행동의 (생각·도구·관찰), ROE 준수, 그리고 모든
      행동이 append-only 감사에 남는다는 전제의 감사 트레일.

      ### 무엇을
      - ReAct 트레이스(단계별 생각/행동/관찰)와 위임 사슬 정리.
      - ROE 준수 증거(범위·PoC·금지 회피)와 감사 트레일(행동→해시체인 개념).

      ### ✅ 합격 기준
      ReAct 트레이스·위임 사슬·ROE·감사 트레일을 갖춘 자율 에이전트 침투 보고서를 작성한다.
    hint: "ReAct 트레이스(생각/행동/관찰)+위임 사슬+ROE 준수 증거+감사 트레일(해시체인) 자율 보고서."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-8-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 침투 보고 — ReAct 트레이스·위임·ROE·감사를 갖춘 책임 있는 자율 에이전트 보고.
        success_criteria:
          - "대상 IPS에 관련 흔적이 남음(고유 태그)"
          - "ReAct 트레이스·위임 사슬을 정리"
          - "(설명) ROE 준수·감사 트레일을 제시"
        acceptable_methods:
          - "ReAct 트레이스 + 감사 트레일 보고서"
        negative_signs:
          - "트레이스·감사 없이 결과만"

# ───────────────────────── BLUE (자율 대응 종합) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 자율 탐지·트리아지·대응 파이프라인

      자율 Blue로서 **탐지→트리아지→대응 준비** 파이프라인을 실행한다. W02~W07 원칙 적용: ReAct
      트리아지·하니스 게이트·대응 Playbook·감사.

      ### 어떻게
      - Wazuh/Suricata에서 RED의 공격 경보를 탐지(출처·심각도).
      - ReAct 트리아지로 위협 판정, 대응 Playbook으로 차단안 준비(적용은 승인 게이트).
      - 각 단계 자율 원칙 적용을 명시.

      ### ✅ 합격 기준
      공격 경보를 탐지·트리아지·대응 준비까지 파이프라인으로 실행하고 자율 원칙 적용을 설명한다.
    hint: "Wazuh/Suricata 경보 탐지→ReAct 트리아지→대응 Playbook 준비(승인 게이트). 자율 원칙 적용 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-8-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 대응 파이프라인 — 탐지·트리아지·대응을 자율 원칙으로 종합. 중간 방어 역량 평가.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격 경보를 탐지(출처·심각도)"
          - "ReAct 트리아지·대응 Playbook 준비를 실행"
          - "(설명) 각 단계 자율 원칙(하니스 게이트·승인·감사) 적용 명시"
        acceptable_methods:
          - "탐지→트리아지→대응 준비 파이프라인"
        negative_signs:
          - "경보 근거 없음"
          - "자율 원칙 적용 설명 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자율 대응 안전성·감사 종합

      자율 대응의 **안전성과 감사**를 종합한다.

      ### 무엇을
      - **자율성 수준**: 조회 자율·차단 승인, 비가역 조치 사람 게이트.
      - **대응 검증**: 자동 생성 대응(룰·차단)의 안전성 검증·롤백 계획.
      - **감사 무결성**: 모든 탐지·대응을 변조 불가 감사(해시체인)에 기록.
      - **정렬**: 대응 정책이 실제 성과(보상 해킹 방지)에 정렬됨을 설명.

      ### ✅ 합격 기준
      자율성 수준·대응 검증·감사 무결성·정렬을 종합해 "자율 대응은 안전장치·감사·정렬과 함께" 원칙을
      설명한다.
    hint: "자율성 수준(조회 자율/차단 승인)+대응 검증·롤백+변조 불가 감사+성과 정렬. '안전장치·감사·정렬과 함께' 원칙."
    verify:
      type: "semantic"
      expect: "autonomous_response_safety"
      semantic:
        intent: |
          자율 대응 안전성 종합 — 자율성 수준·검증·감사·정렬로 안전하고 책임 있는 자율 방어.
        success_criteria:
          - "자율성 수준(조회 자율/차단 승인·비가역 사람 게이트)을 제시"
          - "대응 검증·롤백·변조 불가 감사를 제시"
          - "(설명) 정책이 실제 성과에 정렬됨(보상 해킹 방지)을 설명"
          - "(설명) '자율 대응은 안전장치·감사·정렬과 함께' 원칙 설명"
        acceptable_methods:
          - "자율성 수준 + 검증 + 감사 + 정렬 종합"
        negative_signs:
          - "안전장치 없는 완전 자율"
          - "감사·정렬 언급 없음"
