id: "attack-w15"
category: "attack"
title: "[공격기법 W15] 캡스톤 — PTES 7단계로 완주하는 침투, 킬체인 재구성으로 막는 방어"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  공격기법 트랙의 **종합 캡스톤**. 그동안 익힌 정찰·웹 익스플로잇·권한상승·지속성·횡적이동을 **PTES**
  (Penetration Testing Execution Standard) 7단계 — 사전협의→정보수집→위협모델링→취약점분석→익스플로잇
  →포스트익스플로잇→리포팅 — 하나의 흐름으로 꿴다. 단발 공격이 아니라 **목표 지향 침투 한 건**을
  완주하는 게 핵심. 방어자는 흩어진 경보를 **킬체인 타임라인**으로 재구성하고, 침투 경로를 끊고,
  경영진·기술 **이중 리포트**로 마무리한다.

  ▸ 모드: solo(침투 1건 완주→자가 킬체인 재구성) / duel(상대망 침투→본인 방어·리포팅). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — RoE는 이 실습 범위로 한정(대상 인프라 외 금지). 웹 단계 태그 **`pt15r1-<id>`**,
    포스트익스플로잇 산물 계정 **`ptesbd`**, 침투경로 차단룰 Suricata **sid 9415001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — 정보수집 → 취약점분석 → 익스플로잇 (PTES 2·4·5단계)

      ### 상황
      사전협의(RoE)로 범위를 이 인프라로 한정한 뒤, 정보수집(표면 식별)→취약점분석(약점 후보)→
      익스플로잇(초기 침투)으로 **목표 지향 침투의 앞단**을 완주한다. 단발 페이로드가 아니라 단계가
      서로를 잇는 흐름이어야 한다.

      ### 할 일
      이 미션 전용 태그 `pt15r1-<id>`를 붙여 정찰→침투 흐름을 수행한다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=pt15r1-kim-1%20UNION%20SELECT%201"
      ```

      ### 채점 방법
      대상 WAF audit에 (pt15r1 태그 포함) 침투 시도 탐지(913/942)가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 pt15r1 태그가 포함된 탐지가 남는다.
    hint: "PTES 2·4·5단계(정보수집→취약점분석→익스플로잇), 태그 pt15r1. 채점: 대상 modsec audit 913/942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "pt15r1", since_sec: 1800 } }
      semantic:
        intent: "PTES 앞단 완주 — 정보수집→취약점분석→익스플로잇이 한 흐름. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (pt15r1 태그 포함) 침투 탐지(최근)"
          - "정보수집→취약점분석→익스플로잇 단계가 서로를 잇는 흐름"
          - "RoE(범위 한정) 명시"
        acceptable_methods:
          - "정찰 후 식별된 약점으로 익스플로잇 (단계 연결)"
        negative_signs:
          - "대상 미도달 / 태그 누락 / 단계 연결 없는 단발 공격"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — 포스트익스플로잇 (PTES 6단계: 지속성·수집)

      ### 상황
      침투에 성공한 뒤 포스트익스플로잇으로 넘어간다: 지속성 발판(백도어 계정 **ptesbd**)을 심고, 가치
      있는 자산을 식별한다. 목표(임무 영향)를 달성하는 단계다.

      ### 할 일
      ```bash
      useradd -m -s /bin/bash ptesbd        # 지속성 발판
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 포스트익스플로잇 산물(ptesbd)이 있는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `ptesbd`가 있다.
    hint: "포스트익스플로잇(지속성) → useradd ptesbd. 채점: file_contains passwd ptesbd."
    verify:
      type: "file_contains"
      expect: "ptesbd"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "ptesbd" } }
      semantic:
        intent: "PTES 6단계 — 침투 후 지속성·자산 식별. 초기 침투가 임무 영향으로 이어짐."
        success_criteria:
          - "/etc/passwd에 ptesbd"
          - "침투(RED-1)→포스트익스플로잇 연결 서술"
          - "어떤 자산을 노렸는지"
        acceptable_methods:
          - "지속성 발판 / 자산 수집"
        negative_signs:
          - "산물 미생성 / 앞 단계와 단절"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 킬체인 타임라인 재구성

      ### 상황
      흩어진 경보(WAF·IDS·호스트)를 **하나의 침투 킬체인**으로 재구성한다. 정찰→침투→포스트익스플로잇이
      언제 어떤 순서로 일어났는지 타임라인으로 잇고, PTES 단계와 ATT&CK technique에 매핑한다.

      ### 할 일
      경보를 시간순으로 잇고 PTES 단계 / ATT&CK에 매핑한 킬체인 타임라인을 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 타임라인(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 타임라인은 제출로 검증).
    hint: "WAF·IDS·호스트 경보 → 시간순 킬체인 + PTES/ATT&CK 매핑. 채점: wazuh_alert + 타임라인 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "킬체인 재구성 — 흩어진 다중 소스 경보를 시간순 침투 흐름으로. PTES/ATT&CK 매핑."
        success_criteria:
          - "경보 수집 확인"
          - "정찰→침투→포스트익스플로잇 시간순 타임라인"
          - "각 단계 PTES/ATT&CK 매핑"
        acceptable_methods:
          - "다중 소스 상관 + 타임라인"
        negative_signs:
          - "경보 나열만(흐름 재구성 없음)"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 침투 경로 차단 탐지룰 (sid 9415001)

      ### 상황
      재구성한 킬체인에서 **초기 침투 지점**(SQLi 익스플로잇)을 끊는 Suricata 룰(**sid 9415001**)을
      `local.rules`에 작성한다. 도구 UA가 아니라 **침투에 쓰인 페이로드 자체**(UNION SELECT)를 막아야
      UA를 바꿔도 재침투가 안 된다. 가장 앞단을 막으면 뒤 단계(포스트익스플로잇) 전체가 무력화된다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATK W15 PTES SQLi entry"; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; distance:0; fast_pattern; sid:9415001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9415001 차단룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9415001 룰이 있다.
    hint: "초기 침투 페이로드(UNION SELECT) 차단 룰(sid 9415001) → reload."
    verify:
      type: "file_contains"
      expect: "9415001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9415001" } }
      semantic:
        intent: "침투 경로 차단 — 킬체인 앞단(초기 침투)을 끊어 뒤 단계 전체 무력화. 가장 효율적 차단점 선택."
        success_criteria:
          - "local.rules에 sid 9415001"
          - "왜 이 지점이 가장 효율적 차단점인지"
          - "reload + 재침투 시 차단 검증 계획"
        acceptable_methods:
          - "local.rules 작성 + reload"
        negative_signs:
          - "뒷단만 막아 앞단 재침투 허용 / 문법 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — PTES 리포트 (PTES 7단계: 경영진 + 기술 이중 보고)

      ### 상황
      침투 한 건을 **PTES 리포트**로 마무리한다: 경영진용(위험·영향·우선순위)과 기술용(재현 절차·근본
      원인·구체적 개선)을 모두 작성한다. 캡스톤의 마지막 — 발견을 행동으로 옮기는 단계다.

      ### 할 일
      경영진 요약 + 기술 상세(재현/근본원인/개선)로 된 PTES 리포트를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지(증거 보존) + 리포트(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 리포트는 제출로 검증).
    hint: "경영진(위험/영향) + 기술(재현/근본원인/개선) 이중 리포트. 채점: wazuh_alert + 리포트 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "PTES 리포팅 — 경영진(위험/영향/우선순위) + 기술(재현/근본원인/개선) 이중 보고. 발견을 행동으로."
        success_criteria:
          - "경보 수집(증거 보존) 확인"
          - "경영진용 + 기술용 두 청중 모두"
          - "재현 절차 + 근본 원인 + 우선순위화된 개선"
        acceptable_methods:
          - "PTES 이중 리포트"
        negative_signs:
          - "한 청중만 / 개선 없는 사실 나열"
