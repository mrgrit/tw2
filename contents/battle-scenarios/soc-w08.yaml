id: "soc-w08"
category: "soc"
title: "[SOC관제 W8] 중간고사 — 다벡터 공격 vs 전 로그소스 분석·ATT&CK 매핑 종합"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  SOC 관제 8주차 — **중간고사**. W01~W07 의 분석 역량을 종합 평가한다. 공격자가 다벡터로 공격하면,
  분석가는 **전 로그소스**(인증 sshd / 네트워크 Suricata / 웹 ModSec / 통합 Wazuh alerts.json)를
  교차 분석하고, 모든 경보를 **MITRE ATT&CK** 으로 매핑해 하나의 공격 서사로 종합한다. 개별 도구가
  아닌 **교차 상관** 이 SOC 분석가의 핵심 역량이다.

  ▸ 모드: solo(공격자 → 분석가) / duel(상대 공격 → 본인 분석). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** — 외부 명령 미수집 → 대상 SIEM/방어층 경보로 채점.
  ▸ Blue 는 **경보 분석(관측)** — 경보 실존 + 분석가가 본 구체값(rule.id/level/출발지/ATT&CK) 일치로 채점.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: siem
    points: 20
    instruction: |
      ## 🎯 RED-1 — 다벡터 공격 (전 로그소스 유발)

      정찰(nmap)+인증 무차별대입(hydra ssh)+웹 인젝션+스캐너를 섞어 모든 로그소스(인증/네트워크/웹/
      통합)에 흔적을 남긴다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      nmap -sV <대상_공개IP>; hydra -l admin -P rockyou.txt ssh://<대상_공개IP>:2204
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%201"
      ```
      📌 채점: 외부 명령 미수집 → 대상 Wazuh 에 다수 경보(여러 소스).
      ✅ 합격: 대상 SIEM 에 다벡터 경보가 수집된다.
    hint: "attacker-ext nmap+hydra+sqlmap. 채점: 대상 Wazuh 다수 경보."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "다벡터 공격 — 전 로그소스(인증/네트워크/웹) 유발. 외부 공격자 모델 → 대상 Wazuh 다수 경보로 판정."
        success_criteria: ["대상 Wazuh 에 다수 경보(여러 소스)", "(설명) 어떤 벡터가 어떤 로그소스를 만드는지 서술"]
        acceptable_methods: ["attacker-ext nmap+hydra+sqlmap+nikto"]
        negative_signs: ["대상 경보 없음", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 웹 익스플로잇 (logsource=web)

      SQLi 로 WAF audit 에 명확한 매칭 룰 ID(942)를 남긴다(분석가의 웹 로그 분석 표적).

      ### 권장 명령 (참고)
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%20user,password%20FROM%20users"
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF audit 의 SQLi(942) 탐지.
      ✅ 합격: 대상 WAF audit 에 SQLi(942) 탐지.
    hint: "attacker-ext UNION SQLi. 채점: 대상 ModSec 942."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "웹 로그소스 — SQLi(942). 대상 WAF audit 흔적으로 판정."
        success_criteria: ["대상 WAF audit 에 942 탐지", "(설명) 매칭 룰 ID 와 ATT&CK(T1190) 매핑"]
        acceptable_methods: ["attacker-ext UNION SQLi"]
        negative_signs: ["대상 미도달"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [로그소스1] — 인증 로그 분석 (무차별대입)

      sshd 인증 로그/Wazuh 인증 경보를 분석해 무차별대입(T1110)의 출발지·시도 횟수·성공 여부를
      판정한다.

      📌 채점: 본인 SIEM 에 인증/경보가 수집됐는지(분석 대상).
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "sshd 인증 로그/Wazuh 인증 경보 분석(출발지/횟수/성공). 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "인증 로그 분석 — 무차별대입(T1110). 출발지/시도횟수/성공여부 판정."
        success_criteria: ["경보 수집 확인", "(분석) 출발지 IP + 시도 횟수 + 성공/실패 판정", "ATT&CK T1110 매핑"]
        acceptable_methods: ["sshd 로그/Wazuh 인증 경보 분석"]
        negative_signs: ["성공 여부 미판정"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 [로그소스2] — 네트워크 로그 분석 (Suricata eve)

      Suricata eve.json 을 분석해 정찰(T1595)의 스캔 유형·포트 범위·강도를 판정한다.

      📌 채점: 본인 IPS 에 스캔 탐지가 있는지(분석 대상).
      ✅ 합격: 본인 IPS 에 스캔 탐지가 있다.
    hint: "Suricata eve 분석(스캔유형/포트/강도). 채점: log_contains ips suricata scan."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "네트워크 로그 분석 — 정찰(T1595). eve.json 의 스캔 유형/포트/강도 판정."
        success_criteria: ["IPS 스캔 탐지 확인", "(분석) 스캔 유형 + 포트 범위 + 강도", "ATT&CK T1595 매핑"]
        acceptable_methods: ["eve.json 분석 / log_contains suricata"]
        negative_signs: ["해석 없이 raw 나열"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [로그소스3] — 웹 로그 분석 (ModSec audit)

      ModSec audit 를 분석해 웹 익스플로잇(T1190)의 페이로드·매칭 룰 ID·차단 여부를 판정한다.

      📌 채점: 본인 web modsec audit 에 웹공격 탐지가 있는지(분석 대상).
      ✅ 합격: 본인 WAF audit 에 SQLi(942) 탐지가 있다.
    hint: "modsec audit 분석(페이로드/룰ID/403). 채점: log_contains web modsec 942100."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "웹 로그 분석 — 익스플로잇(T1190). 페이로드/매칭 룰/차단 여부 판정."
        success_criteria: ["WAF audit 942 탐지 확인", "(분석) 페이로드 + 매칭 룰 ID + 차단 여부", "ATT&CK T1190 매핑"]
        acceptable_methods: ["modsec audit 분석 / log_contains"]
        negative_signs: ["차단 여부 미판정"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [통합] — 교차 상관 (alerts.json 통합)

      4 로그소스의 경보를 Wazuh alerts.json 에서 **교차 상관** 한다. 같은 출발지 IP/타임라인으로
      인증·네트워크·웹 경보를 하나의 공격으로 묶는다.

      📌 채점: 본인 SIEM 에 통합 경보가 수집됐는지.
      ✅ 합격: 본인 SIEM 에 최근 경보가 수집돼 있다.
    hint: "출발지 IP/타임라인으로 4소스 교차 상관. 채점: wazuh_alert + 상관 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "교차 상관 — 4 로그소스를 출발지/타임라인으로 하나의 공격으로 통합. SOC 분석가의 핵심."
        success_criteria: ["통합 경보 확인", "(상관) 출발지 IP + 타임라인으로 4소스 묶기", "(결론) 단일 공격 캠페인 판정"]
        acceptable_methods: ["alerts.json 교차 상관 / wazuh_alert"]
        negative_signs: ["소스별 독립 분석만(상관 없음)"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 14
    instruction: |
      ## 🛡️ BLUE-5 [종합] — ATT&CK 매핑 종합 + 시험 보고서

      전체 분석을 ATT&CK 매트릭스로 매핑하고(킬체인 단계별 technique), 1 페이지 시험 보고서(타임라인/
      소스별 근거/ATT&CK/우선순위)를 작성한다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(+ 보고서는 제출로 검증).
      ✅ 합격: 본인 SIEM 에 최근 경보가 수집돼 있다.
    hint: "ATT&CK 매트릭스 매핑 + 1페이지 보고서. 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "종합 — ATT&CK 매트릭스 매핑 + 시험 보고서. 분석을 의사결정 가능한 산출물로."
        success_criteria: ["경보 수집 확인", "(매핑) 킬체인 단계별 ATT&CK technique 매트릭스", "(보고서) 타임라인+근거+우선순위"]
        acceptable_methods: ["ATT&CK 매핑 + 보고서 작성"]
        negative_signs: ["매핑 누락", "보고서 없음"]
