id: "soc-w08"
category: "soc"
title: "[SOC관제 W8] 중간고사 — 흩어진 로그를 교차 분석해 하나의 공격 서사로 종합하기"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  SOC 관제 **중간 평가**. 한 공격 캠페인의 흔적은 절대 한 곳에 모여 있지 않다 — 네트워크(Suricata IDS),
  웹(WAF audit), 인증(시스템 로그)에 **흩어져** 있다. 분석가는 이 흩어진 조각을 **교차 분석**해 같은
  출발지·시간으로 묶고, 전체를 **하나의 공격 서사**로 종합한 뒤 **MITRE ATT&CK** 매트릭스로 매핑한다.
  개별 도구가 아니라 **교차 상관**이 시험의 핵심이다.

  ▸ 모드: solo(공격자→분석가) / duel(상대 공격→본인 분석). 대상=solo 본인 / duel 상대.

  ▸ 📋 채점 메모(운영) — 분석형(경보 트리아지·교차상관) 미션이라 자동채점이 보수적(partial 상한).
    검증 가능한 증거(Wazuh rule 86601 노이즈 vs 고유 표식 분리) 인용이 점수의 핵심. `GRADING-LIMITATIONS.md` 참고.

  ▸ 알아둘 점 — 이 환경에서 경보는 소스가 나뉜다: **네트워크는 Wazuh(Suricata IDS)**, **웹공격은
    WAF(ModSec) audit**. 각 경보는 실재 소스에서 확인한다. Red 채점은 대상 WAF audit(태그/룰)으로.
    웹공격 태그 **`sa8r1-<id>`**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 다벡터 공격 (여러 로그소스 유발)

      ### 상황
      정찰(스캐너 UA)+침투(SQLi)를 섞어 보내, 분석가가 네트워크·웹 여러 소스를 교차해야 할 흔적을
      만든다.

      ### 할 일
      이 미션 전용 태그 `sa8r1-<id>`를 붙여 스캐너 UA로 SQLi를 보낸다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=sa8r1-kim-1%20UNION%20SELECT%20user,password%20FROM%20users"
      ```

      ### 채점 방법
      대상 WAF audit에 (sa8r1 태그 포함) 스캐너(913)/SQLi(942) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 sa8r1 태그가 포함된 다벡터 탐지가 남는다.
    hint: "태그(sa8r1) sqlmap UA SQLi. 채점: 대상 modsec audit의 913/942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
        - { id: "red-1-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "sa8r1", since_sec: 1800 } }
      semantic:
        intent: "다벡터 — 정찰(913)+SQLi(942). 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (sa8r1 태그 포함) 913/942 탐지"
          - "어떤 벡터가 어떤 로그소스를 만드는지 서술"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 스캐너 UA + SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 웹 익스플로잇 (logsource=web)

      ### 상황
      SQLi로 WAF audit에 명확한 매칭 룰(942)을 남긴다(분석가의 웹 로그 분석 표적).

      ### 할 일
      태그 `sa8r1-<id>`를 붙여 UNION SQLi를 보낸다.
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" "http://192.168.0.161/?id=sa8r1-kim-2%20OR%201=1"
      ```

      ### 채점 방법
      대상 WAF audit에 (sa8r1 태그 포함) SQLi(942) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 sa8r1 태그가 포함된 SQLi 탐지가 남는다.
    hint: "태그(sa8r1) SQLi. 채점: 대상 modsec audit의 942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "sa8r1", since_sec: 1800 } }
      semantic:
        intent: "웹 로그소스 — SQLi(T1190). 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (sa8r1 태그 포함) SQLi 탐지"
          - "매칭 룰 ID와 ATT&CK(T1190) 매핑"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [네트워크] — Suricata IDS 경보 분석

      ### 상황
      Wazuh에 들어온 네트워크 경보(Suricata)를 분석해 정찰(T1595)의 스캔 유형·강도를 판정한다.

      ### 할 일
      Wazuh의 ids 그룹 경보(signature/flow)를 분석해 정찰 범위를 판정한다.

      ### 채점 방법
      Wazuh에 ids 그룹 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      Wazuh에 ids 그룹 경보가 있다.
    hint: "Wazuh의 Suricata(ids) 경보 분석. 채점: wazuh_alert(ids) + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "네트워크 분석 — Wazuh의 Suricata IDS 경보로 정찰(T1595) 유형/강도. (이 환경 Wazuh의 주 경보원)"
        success_criteria:
          - "Wazuh ids 경보 확인"
          - "스캔 유형/강도 + ATT&CK T1595 매핑"
          - "앰비언트 노이즈 vs 표적 구분"
        acceptable_methods:
          - "wazuh_alert(ids) 분석"
        negative_signs:
          - "해석 없이 나열"

  - order: 2
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 [웹] — WAF audit 분석

      ### 상황
      WAF(ModSec) audit를 분석해 웹 익스플로잇(T1190)의 페이로드·매칭 룰 ID·차단 여부를 판정한다.
      (웹공격은 Wazuh가 아니라 WAF audit에 있다.)

      ### 할 일
      WAF audit에서 SQLi(942) 등 매칭 룰과 페이로드, 차단(403) 여부를 분석한다.

      ### 채점 방법
      본인 web modsec audit에 SQLi(942) 탐지가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 WAF audit에 SQLi(942) 탐지가 있다.
    hint: "WAF(ModSec) audit의 페이로드/룰ID/403 분석. 채점: log_contains web modsec 942100."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "웹 분석 — WAF audit의 익스플로잇(T1190) 페이로드/매칭 룰/차단 판정. 웹공격의 실재 소스는 WAF audit."
        success_criteria:
          - "WAF audit 942 탐지 확인"
          - "페이로드 + 매칭 룰 ID + 차단 여부 + ATT&CK T1190"
          - "침투 성공/차단 판정"
        acceptable_methods:
          - "modsec audit 분석 / log_contains"
        negative_signs:
          - "차단 여부 미판정"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-3 [인증] — 인증/시스템 로그 분석

      ### 상황
      인증 경보(무차별대입 등)를 분석해 출발지·시도 횟수·성공 여부를 판정한다(있는 경우).

      ### 할 일
      Wazuh의 인증 관련 경보를 분석한다(없으면 "이 캠페인엔 인증 공격이 없었다"도 유효한 분석).

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      Wazuh에 경보가 수집돼 있다.
    hint: "Wazuh 인증 경보 분석(출발지/횟수/성공). 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "인증 분석 — 무차별대입(T1110) 출발지/횟수/성공. 없으면 '인증 벡터 부재'도 분석 결과."
        success_criteria:
          - "경보 수집 확인"
          - "인증 경보 분석(또는 부재 판정) + ATT&CK T1110"
        acceptable_methods:
          - "Wazuh 인증 경보 분석"
        negative_signs:
          - "분석 없이 단정"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 [통합] — 교차 상관

      ### 상황
      세 소스(네트워크 Wazuh IDS / 웹 WAF audit / 인증)의 경보를 **교차 상관**한다. 같은 출발지
      IP/타임라인으로 흩어진 조각을 하나의 공격으로 묶는다.

      ### 할 일
      출발지/타임라인으로 다중 소스 경보를 묶어 단일 캠페인 여부를 결론낸다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 교차 상관(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 교차 상관은 제출로 검증).
    hint: "출발지/타임라인으로 3소스 교차 상관. 채점: wazuh_alert + 상관 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "교차 상관 — 3 소스를 출발지/타임라인으로 하나의 공격으로 통합. SOC 분석가의 핵심."
        success_criteria:
          - "경보 수집 확인"
          - "출발지 IP + 타임라인으로 다중 소스 묶기"
          - "단일 공격 캠페인 판정"
        acceptable_methods:
          - "다중 소스 교차 상관"
        negative_signs:
          - "소스별 독립 분석만(상관 없음)"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 14
    instruction: |
      ## 🛡️ BLUE-5 [종합] — ATT&CK 매핑 + 시험 보고서

      ### 상황
      전체 분석을 ATT&CK 매트릭스로 매핑하고(킬체인 단계별 technique), 1 페이지 시험 보고서(타임라인/
      소스별 근거/ATT&CK/우선순위)를 작성한다.

      ### 할 일
      ATT&CK 매핑 + 1 페이지 보고서를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 보고서(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 보고서는 제출로 검증).
    hint: "ATT&CK 매트릭스 + 1페이지 보고서. 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "종합 — ATT&CK 매트릭스 + 시험 보고서. 분석을 의사결정 가능한 산출물로."
        success_criteria:
          - "경보 수집 확인"
          - "킬체인 단계별 ATT&CK technique 매트릭스"
          - "타임라인+소스별 근거+우선순위 보고서"
        acceptable_methods:
          - "ATT&CK 매핑 + 보고서 작성"
        negative_signs:
          - "매핑 누락 / 보고서 없음"
