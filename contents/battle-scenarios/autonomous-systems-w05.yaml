id: "autonomous-systems-w05"
category: "autonomous-systems"
title: "[자율시스템 W5] GPS 스푸핑 vs 안티스푸핑·대체 항법"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  GPS 보안 공방전 — **GPS 스푸핑/재밍**의 공격과 **안티스푸핑·대체 항법** 방어를 설계·분석한다.
  실물 RF·GNSS가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(GPS 스푸핑 경로)와 Blue(안티스푸핑·대체 항법)를 모두 수행.
    • duel : Red 학생이 스푸핑 경로를 제시하고, Blue 학생이 안티스푸핑으로 대응.

  ▸ 채점(중요)
    실물이 없으므로 **보고서의 설계 품질**로 채점 — 스푸핑/재밍의 원리·물리 결과 구체성, 안티스푸핑
    (신호 검증)·대체 항법(관성·시각·지형)·다중 항법 융합의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — GPS 스푸핑/재밍은 실제로 불법·위험. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (GPS 스푸핑 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — GPS 스푸핑→위치 오인→물리 결과 경로

      GNSS 신호를 위조해 **위치를 오인**시키고 물리 결과(경로 이탈·지오펜스 우회·시간 조작)로 잇는
      경로를 설계한다.

      ### 무엇을
      - 스푸핑 원리: 진짜보다 강한 위조 위성 신호로 수신기를 캡처, 위치/시간을 점진 이동.
      - 재밍과의 차이(재밍=거부, 스푸핑=오도)와 각 물리 결과.
      - 표적(드론·차량·시각 동기 시스템)별 최종 영향.

      ### ✅ 합격 기준
      GPS 스푸핑의 원리(신호 캡처·점진 이동)와 재밍과의 차이를 설명하고, 위치/시간 오인이 구체적 물리
      결과로 이어지는 경로를 설계한다.
    hint: "위조 위성 신호로 수신기 캡처·위치 점진 이동. 재밍(거부) vs 스푸핑(오도) 차이. 경로 이탈·지오펜스 우회·시간 조작 물리 결과."
    verify:
      type: "semantic"
      expect: "gps_spoof_path"
      semantic:
        intent: |
          GPS 스푸핑 경로 — 신호 위조로 위치/시간을 오도해 물리 결과를 유발하는 원리·경로를 이해.
        success_criteria:
          - "스푸핑 원리(신호 캡처·점진 이동)를 설명"
          - "재밍과 스푸핑의 차이를 구분"
          - "위치/시간 오인이 구체적 물리 결과(이탈·우회·시간 조작)로 이어짐을 서술"
        acceptable_methods:
          - "스푸핑 원리 + 물리 결과 경로"
        negative_signs:
          - "원리 없이 '스푸핑 가능'만"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 스푸핑 탐지 회피 분석

      안티스푸핑 탐지(신호 세기·다중 안테나·물리 정합성)를 **회피**하려는 방법을 분석한다: 점진적
      이동으로 급변 탐지 회피, 신호 세기 조절, 물리적으로 그럴듯한 궤적 유지.

      ### ✅ 합격 기준
      안티스푸핑 탐지 방식을 식별하고, 점진 이동·세기 조절·정합 궤적 등 회피 착안과 그 한계를 분석한다.
    hint: "안티스푸핑(신호 세기·다중 안테나·물리 정합성) 회피: 점진 이동·세기 조절·그럴듯한 궤적. 회피 한계도 분석."
    verify:
      type: "semantic"
      expect: "spoof_evasion"
      semantic:
        intent: |
          스푸핑 탐지 회피 — 안티스푸핑을 우회하려는 착안과 그 한계를 이해.
        success_criteria:
          - "안티스푸핑 탐지 방식(세기·다중 안테나·정합성)을 식별"
          - "회피 착안(점진 이동·세기 조절·정합 궤적)을 분석"
          - "(설명) 회피의 한계(다중 검증에 걸림)를 논함"
        acceptable_methods:
          - "탐지 방식 식별 + 회피 착안 + 한계"
        negative_signs:
          - "탐지 방식 없이 '회피 가능'만"

# ───────────────────────── BLUE (안티스푸핑·대체 항법) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 안티스푸핑 탐지 설계

      GPS 스푸핑/재밍을 **탐지**하는 방안을 설계한다.

      ### 무엇을
      - **신호 검증**: 신호 세기 이상·C/N0 급변·다중 안테나 도래각(AoA)·암호 인증 신호(예: Galileo OSNMA).
      - **물리 정합성**: GPS 위치와 관성(IMU)·속도·지형의 불일치, 물리적으로 불가능한 점프 탐지.
      - **다중 수신·상관**: 여러 수신기/센서 교차 검증.

      ### ✅ 합격 기준
      신호 검증·물리 정합성·다중 상관 기반 안티스푸핑 탐지를 구체적으로 제시하고 교차 검증을 설계한다.
    hint: "신호 검증(C/N0·AoA·OSNMA)+물리 정합성(GPS vs IMU/속도/지형)+다중 수신 상관. 교차 검증."
    verify:
      type: "semantic"
      expect: "antispoof_detection"
      semantic:
        intent: |
          안티스푸핑 탐지 — 신호·물리·다중 상관으로 스푸핑을 탐지.
        success_criteria:
          - "신호 검증(세기·C/N0·AoA·인증 신호)을 제시"
          - "물리 정합성(GPS vs IMU/속도/지형)을 제시"
          - "다중 수신·상관 교차 검증을 제시"
        acceptable_methods:
          - "신호 검증 + 물리 정합성 + 다중 상관"
        negative_signs:
          - "탐지 신호 막연"
          - "물리 정합성 또는 신호 검증 한쪽만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 대체 항법·다중 항법 융합 설계

      GPS가 스푸핑/거부돼도 항법을 유지하는 **대체 항법·다중 항법 융합**을 설계한다.

      ### 무엇을
      - **대체 항법**: 관성 항법(INS/IMU)·시각 항법(VIO)·지형 참조(TERCOM)·기타 신호(신뢰 무선).
      - **다중 항법 융합**: 칼만 필터 등으로 GPS+INS+시각 융합, GPS 이상 시 자동 전환·가중 감소.
      - **안전 우선**: 항법 신뢰 저하 시 안전 모드(호버·감속·정지)로 물리 안전 확보.

      ### ✅ 합격 기준
      대체 항법(INS·시각·지형)과 다중 항법 융합·자동 전환을 제시하고, 항법 신뢰 저하 시 안전 모드로
      "GPS 없어도 안전" 원칙을 설명한다.
    hint: "대체 항법(INS/IMU·VIO·지형)+다중 항법 융합(칼만·자동 전환·가중 감소)+신뢰 저하 시 안전 모드. 'GPS 없어도 안전' 원칙."
    verify:
      type: "semantic"
      expect: "alternative_navigation"
      semantic:
        intent: |
          대체·다중 항법 — GPS 의존을 줄이고 융합·전환·안전 모드로 스푸핑/거부에도 항법·안전을 유지.
        success_criteria:
          - "대체 항법(INS·시각·지형 참조)을 제시"
          - "다중 항법 융합·GPS 이상 시 자동 전환·가중 감소를 제시"
          - "항법 신뢰 저하 시 안전 모드를 제시"
          - "(설명) 'GPS 없어도 안전' 원칙 설명"
        acceptable_methods:
          - "대체 항법 + 융합/전환 + 안전 모드"
        negative_signs:
          - "GPS 단일 의존 유지"
          - "안전 모드·융합 언급 없음"
