id: "ai-security-w13"
category: "ai-security"
title: "[AI보안활용 W13] 분산 지식: 지식 오염 시험 vs local_knowledge·SubAgent 지식 전달 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — bastion **분산 지식**(local_knowledge·SubAgent 지식 전달·E.G 확장)을 구축한다.
  Red는 공유 지식 오염을 시험하고, Blue는 신뢰 있는 지식 전달·확장을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(지식 오염 시험)와 Blue(신뢰 지식 전달)를 모두 수행.
    • duel : Red 학생이 지식을 오염시키고, Blue 학생이 신뢰 지식 아키텍처로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)에 오염 신호를 심으려 시도
    (고유 태그). Red 채점은 **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 지식 설계는 semantic.

  ▸ 관점 — 여러 에이전트가 local_knowledge를 공유·전달하면 효율↑, 단 오염된 지식이 전파되면 전체가
    오판한다. 출처 신뢰·검증이 핵심.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (지식 오염 시험) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 오염 신호로 공유 지식 왜곡 시도

      방어 에이전트들이 공유하는 지식(IOC·평판)에 **오염 신호**를 심으려 시도한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 반복 패턴(고유 태그)을 남겨, 방어가
        학습·공유할 지식에 거짓 신호를 주입.

      ### ✅ 합격 기준
      방어가 수집·공유할 지식에 오염 신호를 남기고, 그것이 전파되면 생기는 오판을 분석한다.
    hint: "반복 패턴(태그)으로 공유 지식에 오염 신호 주입 + 전파 오판 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-13-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          공유 지식 오염 — 거짓 신호를 심어 분산 지식 전파로 전체 오판을 유도.
        success_criteria:
          - "대상 IPS/WAF에 오염 신호 흔적이 남고 고유 태그로 귀속됨"
          - "공유 지식에 오염 신호를 남김"
          - "(설명) 전파 오판을 분석"
        acceptable_methods:
          - "오염 신호 주입 + 전파 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "전파 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — SubAgent 지식 전달 신뢰 공격 분석

      SubAgent 간 **지식 전달의 신뢰**를 공격하는 방법을 분석한다: 위조 출처·오래된 지식 재생·SubAgent
      결과 맹신.

      ### ✅ 합격 기준
      SubAgent 지식 전달의 신뢰 취약(위조 출처·재생·맹신)을 분석하고, 오염이 전파되는 경로를 설명한다.
    hint: "SubAgent 지식 전달 신뢰 취약(위조 출처·오래된 지식 재생·결과 맹신) 분석 + 전파 경로. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-13-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          지식 전달 신뢰 공격 — 위조·재생·맹신으로 SubAgent 지식 전달을 오염시킴.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "SubAgent 지식 전달 신뢰 취약을 분석"
          - "(설명) 오염 전파 경로를 설명"
        acceptable_methods:
          - "신뢰 취약 분석 + 전파 경로"
        negative_signs:
          - "신뢰 취약 분석 없음"

# ───────────────────────── BLUE (신뢰 지식 전달) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 오염 탐지·지식 검증

      공유·전달되는 지식의 **오염을 탐지·검증**한다.

      ### 어떻게
      - Wazuh/Suricata에서 Red 오염 신호(반복·위장)를 찾아 이상 지식으로 표시.
      - 지식을 공유/전달 전 검증(출처·일관성·급변)해 오염 전파를 막는다.

      ### ✅ 합격 기준
      오염 신호를 탐지하고, 지식 전달 전 검증(출처·일관성)으로 오염 전파를 차단하는 방법을 제시한다.
    hint: "Wazuh/Suricata에서 오염 신호(반복·위장) 탐지 + 전달 전 검증(출처·일관성·급변)으로 전파 차단."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-13-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          지식 오염 탐지·검증 — 오염을 식별하고 전달 전 검증으로 전파를 차단.
        success_criteria:
          - "Wazuh/Suricata에서 Red 오염 신호를 탐지"
          - "전달 전 검증(출처·일관성·급변)을 제시"
          - "(설명) 오염 전파 차단을 설명"
        acceptable_methods:
          - "오염 탐지 + 전달 전 검증"
        negative_signs:
          - "경보 근거 없음"
          - "검증 없이 전달"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — local_knowledge·SubAgent 지식 전달 아키텍처 설계

      신뢰 있는 **분산 지식 아키텍처**를 설계한다.

      ### 무엇을
      - **local_knowledge**: 에이전트별 로컬 지식 + 검증된 공유 지식 분리.
      - **지식 전달**: SubAgent 결과는 미신뢰로 취급→검증 후 상위 지식 반영, 출처·서명.
      - **E.G 확장**: 경험·지식을 검증하며 확장(오염 격리·롤백).
      - **신선도·감사**: 지식 만료·출처 신뢰·변경 감사.

      ### ✅ 합격 기준
      local_knowledge 분리·검증 기반 전달·E.G 확장·신선도/감사를 제시하고 "지식은 검증 후 전달·공유"
      원칙을 설명한다.
    hint: "local_knowledge(로컬+검증 공유 분리)+SubAgent 결과 미신뢰→검증 후 반영·서명+E.G 확장(오염 격리·롤백)+신선도·감사. '검증 후 전달·공유' 원칙."
    verify:
      type: "semantic"
      expect: "distributed_knowledge_design"
      semantic:
        intent: |
          분산 지식 아키텍처 — local_knowledge 분리·검증 전달·오염 격리로 신뢰 있는 지식 공유.
        success_criteria:
          - "local_knowledge(로컬+검증 공유 분리)를 제시"
          - "SubAgent 결과 미신뢰→검증 후 반영·서명을 제시"
          - "E.G 확장(오염 격리·롤백)·신선도·감사를 제시"
          - "(설명) '지식은 검증 후 전달·공유' 원칙 설명"
        acceptable_methods:
          - "local_knowledge + 검증 전달 + E.G 확장 + 감사"
        negative_signs:
          - "검증 없는 맹목 공유"
          - "오염 격리·감사 없음"
