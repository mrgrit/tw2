id: "web-vuln-w15"
category: "web-vuln"
title: "[웹취약점 W15] 기말 — 종합 웹취약점 점검 프로젝트 + 보고·권고(수료)"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  웹취약점 점검 **기말 프로젝트**. 한 대상에 대해 전 과정(정찰→인증→입력검증→접근제어→암호화→API)을 종합
  점검하고, 사례 시나리오·표준 보고서·권고를 산출한다. 공격자가 종합 침투하고, 점검자(너)는 종합 탐지와 최종
  보고서를 작성한다.

  ▸ 이야기: 공격자가 종합 침투(태그 `wv15r1`)로 다중 취약점을 입증하고 종합 산출물(`/tmp/.wv15final`)과 계정 `wva15` 를 남긴다.
    점검자는 ① 종합 탐지, ② 통합 Wazuh 룰, ③ 최종 점검 보고서·권고·R/B/P·cleanup 으로 수료한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/산출물·계정).
  ▸ 마커: 태그 **`wv15r1-<본인id>`**, 종합 산출물 **`/tmp/.wv15final`**(마커 `wv15`), 계정 **`wva15`**,
    Suricata **sid 9915011**, Wazuh **id 105151**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [종합 침투] — 다중 취약점 연계 입증

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "wv15r1-kim" -H "Host: juice.6v6.lab" \
        "http://192.168.0.161/rest/products/search?id=wv15r1-kim%27%20UNION%20SELECT%201--+&Submit=Submit"
      curl -s -H "Host: juice.6v6.lab" "http://192.168.0.161/rest/products/search?name=wv15r1-kim<script>1</script>"
      curl -s -A "wv15r1-kim" -H "Host: juice.6v6.lab" "http://192.168.0.161/rest/products/search?file=wv15r1-kim/../../etc/passwd"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `wv15r1` 흔적 시 인정.
    hint: "태그(wv15r1) SQLi+XSS+트래버설 종합 → 대상 modsec audit. 채점: log_contains modsec wv15r1."
    verify:
      type: "log_contains"
      expect: "wv15r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "wv15r1", since_sec: 1800 } }
      semantic:
        intent: "종합 침투(T1190) — 다중 취약점 연계 입증. 태그(wv15r1) 귀속."
        success_criteria: ["대상 WAF audit 에 wv15r1 태그", "연계 취약점 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 종합 침투"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [종합 산출물] — 발견 인벤토리 + 계정

      ### 할 일
      ```bash
      printf 'wv15 findings: SQLi(crit) XSS(high) traversal(high) auth(med) — full assessment' > /tmp/.wv15final
      sudo useradd -m -s /bin/bash wva15
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.wv15final`(마커 `wv15`) 또는 `wva15` 존재 시 인정.
    hint: "종합 산출물 /tmp/.wv15final (마커 wv15) + useradd wva15. 채점: file_contains final wv15 + file_contains passwd wva15."
    verify:
      type: "file_contains"
      expect: "wv15"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.wv15final", pattern: "wv15" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "wva15" } }
      semantic:
        intent: "종합 발견 인벤토리(T1592) + 계정(T1136) — 전 과정 점검 결과."
        success_criteria: ["/tmp/.wv15final(마커 wv15) 또는 계정 wva15", "발견 취약점 위험도 서술"]
        acceptable_methods: ["산출물 파일 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [종합 탐지] — Suricata 룰 (sid 9915011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"WEBVULN-W15 comprehensive web attack"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9915011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9915011 룰 존재 시 인정.
    hint: "종합 탐지 Suricata 룰(sid 9915011) → reload. 채점: file_contains local.rules 9915011."
    verify:
      type: "file_contains"
      expect: "9915011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9915011" } }
      semantic:
        intent: "종합 탐지(네트워크) — 다중 웹 공격 Suricata 룰."
        success_criteria: ["local.rules 에 sid 9915011", "종합 공격 탐지 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [통합 탐지] — Wazuh 룰 (id 105151)

      ### 할 일
      ```xml
      <group name="edu,webvuln,">
        <rule id="105151" level="13">
          <if_group>edu</if_group>
          <match>wva15</match>
          <description>WEBVULN-W15 - comprehensive assessment findings / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 105151 룰 존재 시 인정.
    hint: "통합 탐지 Wazuh 룰(id 105151) → restart. 채점: file_contains local_rules.xml 105151."
    verify:
      type: "file_contains"
      expect: "105151"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "105151" } }
      semantic:
        intent: "통합 탐지(호스트) — 종합 발견/계정 Wazuh 룰."
        success_criteria: ["local_rules.xml 에 rule id 105151", "통합 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [수료] — 최종 점검 보고서·권고·Cleanup

      ### 상황
      웹취약점 점검 수료 산출물이다. 사례 시나리오 기반 **최종 보고서**(발견 목록/위험도/공격 내러티브/권고/Executive
      Summary)를 작성하고, R/B/P 회고 후 아티팩트를 **일괄 cleanup** 한다.

      ### 할 일
      - 최종 보고서(발견/위험도/내러티브/권고/Exec Summary) + R/B/P 회고
      - cleanup:
      ```bash
      sudo rm -f /tmp/.wv15final; sudo userdel -r wva15 2>/dev/null
      sudo sed -i '/9915011/d' /etc/suricata/rules/local.rules && sudo suricatasc -c reload-rules
      # local_rules.xml 에서 105151 블록 제거 후 wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 최종 보고서·권고·cleanup 으로 인정.
    hint: "최종 점검 보고서(발견/위험도/내러티브/권고/Exec Summary) + R/B/P + wv15/wva15/9915011/105151 cleanup. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "웹취약점 점검 기말 — 최종 보고서/권고 + R/B/P + cleanup. 15주 매듭."
        success_criteria:
          - "최근 경보 수집 확인"
          - "최종 보고서(발견/위험도/내러티브/권고/Exec Summary)"
          - "R/B/P 회고 + 아티팩트 일괄 cleanup"
        acceptable_methods: ["최종 보고서 + 회고 + cleanup"]
        negative_signs: ["보고서 구조 누락 / cleanup 미완"]
