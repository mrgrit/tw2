id: "autonomous-security-w01"
category: "autonomous-security"
title: "[자율보안 W1] 자율 Red 에이전트 vs 자율 Blue 에이전트 — bastion Purple 순환"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자율 보안 공방전 — bastion 자율 에이전트 관점의 Red/Blue 대전. 학생은 자연어 지시로 인프라를
  운영하는 에이전트(Manager)처럼, 정찰·공격(Red) 또는 탐지·대응(Blue)을 **자율 에이전트 스타일**로
  수행하고, 그 과정을 bastion 원칙(3단계 처리·가드레일·감사·경험)으로 설명한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율 공격 킬체인)와 Blue(자율 탐지·대응)를 모두 수행한다. 공격이 만든
             흔적이 대상 인프라(Suricata/Wazuh)에 남고, 이어서 방어자 관점에서 그 흔적을 탐지·대응한다.
    • duel : Red 학생이 상대 인프라를 자율 킬체인으로 공격하고, Blue 학생은 자기 인프라에서 탐지·대응.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34)을 공격한다. 외부 공격자 명령 로그는
    수집이 불완전하므로, Red 채점은 **대상 인프라에 남은 탐지 흔적(Suricata/Wazuh)** + 본인 인프라
    명령 흔적(command_ran) + **보고서의 자율 에이전트 설계**(킬체인 단계·ROE 준수·근거)로 한다.
    반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분한다.

  ▸ 자율 보안 관점(bastion)
    Red = red-team-operator 페르소나(model_tier=attack, ROE 강제). Blue = triage/analyst 페르소나
    (자율성 수준: 조회 자율·차단 승인). 모든 행동은 append-only 해시체인 감사에 남는다는 전제로 설명.

  ▸ 윤리 — 모든 공격은 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (자율 공격 에이전트 킬체인) ─────────────────────────
# 외부 공격자 VM({{ATTACKER_IP}})에서 수행. 채점 = 대상 탐지 흔적 + 명령 흔적 + 자율 설계 보고.
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-1 — 자율 정찰: 대상 표면 탐색 (killchain: recon)

      당신은 bastion **red-team-operator** 페르소나다. 외부 공격자 VM({{ATTACKER_IP}})에서 대상 el34의
      생존 호스트·서비스를 **자율 정찰**한다(킬체인 1단계).

      ### 어디서 / 무엇을
      - 접속: 외부 공격자 VM({{ATTACKER_IP}}).
      - 동작: 대상 공개 표면에 스캔(포트/서비스). 고유 태그(UA·주석)를 붙여 귀속 가능하게.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T3 -Pn 192.168.0.161 -p1-1000 --reason
      curl -A 'auto-red-<학번>-recon' http://192.168.0.161/
      ```

      ### 📌 채점 방식
      대상 Suricata/Wazuh에 스캔 탐지 흔적 + 본인 명령 흔적 + **보고서에 킬체인 recon 단계 설계**
      (무엇을·왜, ROE 범위 준수)를 근거로 제시.

      ### ✅ 합격 기준
      대상 IPS/SIEM에 정찰 탐지 흔적이 남고, 보고서가 자율 정찰 단계를 설명한다.
    hint: "외부 공격자 VM에서 nmap/curl로 대상 .161 정찰(고유 태그). 킬체인 recon 단계로 보고. 채점=대상 Suricata/Wazuh 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Red 킬체인 1단계(정찰). 외부 공격자 모델이므로 command_ran(외부)은 불신, 대상
          Suricata/Wazuh 탐지 흔적 + 출처 IP·태그 상관으로 판정. bastion red-team-operator·ROE 관점.
        success_criteria:
          - "대상 IPS(Suricata)/SIEM(Wazuh)에 정찰 스캔 탐지 흔적이 남음"
          - "흔적의 source가 외부 공격자({{ATTACKER_IP}})이고 고유 태그로 귀속됨"
          - "(설명) 킬체인 recon 단계를 자율 에이전트 관점(무엇을·왜·ROE 범위)으로 서술"
        acceptable_methods:
          - "외부 공격자 VM에서 nmap 스캔(태그)"
          - "curl 고유 UA로 표면 확인"
        negative_signs:
          - "대상에 닿지 않아 탐지 흔적 없음"
          - "킬체인/ROE 설명 없이 명령만 나열"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-2 — 자율 침투 시뮬: 웹 공격 + ROE 준수 (killchain: exploit)

      정찰(RED-1) 결과로 웹 표면을 **자율 침투 시뮬**한다(킬체인 2단계). 단 **ROE**(범위=대상 웹만,
      금지=파괴·유출, PoC 수준)를 엄격히 지킨다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)에 SQLi/XSS 등 PoC 시도(고유 태그).
      - WAF(ModSecurity)에 차단/탐지 흔적이 남게.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 WAF(ModSec)/Suricata에 공격 탐지 흔적 + 보고서의 **ROE 준수**(범위·PoC·금지 행동 회피)와
      킬체인 exploit 설계.

      ### ✅ 합격 기준
      대상 WAF/IPS에 웹 공격 탐지 흔적이 남고, 보고서가 ROE를 지킨 자율 침투를 설명한다.
    hint: "외부 공격자에서 대상 웹에 SQLi/XSS PoC(고유 태그). ROE(범위·PoC·파괴/유출 금지) 준수 설명. 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Red 킬체인 2단계(침투 시뮬). ROE 강제가 핵심 — 인가 범위·PoC 수준·파괴/유출 금지.
          대상 WAF/IPS 탐지 흔적 + 출처·태그 상관으로 판정.
        success_criteria:
          - "대상 WAF(ModSec) 또는 IPS에 웹 공격 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "(설명) ROE 준수(범위=대상 웹, PoC만, 파괴·유출 금지)를 명시"
          - "(설명) 킬체인 exploit 단계를 자율 에이전트 관점으로 서술"
        acceptable_methods:
          - "curl 로 SQLi/XSS PoC(고유 태그)"
          - "동등한 웹 공격 PoC"
        negative_signs:
          - "탐지 흔적 없음(대상 미도달)"
          - "ROE 위반(파괴·데이터 유출) 또는 ROE 설명 없음"

# ───────────────────────── BLUE (자율 방어 에이전트) ─────────────────────────
# 본인 인프라(self) 기준. 자율성 수준: 조회 자율, 차단은 승인 관점으로 설명.
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 자율 탐지·트리아지: SIEM에서 공격 흔적 식별

      당신은 bastion **자율 Blue**(triage 페르소나)다. 대상 인프라의 SIEM(Wazuh)/IPS(Suricata)에서
      방금(또는 직전) 공격 흔적을 **자율 탐지·트리아지**한다.

      ### 어떻게
      - Wazuh/Suricata에서 스캔·웹 공격 경보를 찾아 출처 IP·시각·심각도를 확인.
      - 트리아지: 오탐/저위험 vs 진짜 위협을 분류(자율 Blue 파이프라인 W11).

      ### ✅ 합격 기준
      SIEM/IPS에서 공격 경보를 찾아 출처·심각도를 제시하고, 트리아지 결과를 서술한다.
    hint: "Wazuh/Suricata에서 정찰·웹 공격 경보 확인(출처 IP·시각). 트리아지(오탐vs위협) 분류. 자율 Blue triage 관점."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Blue 탐지·트리아지 — SIEM/IPS 경보에서 공격을 식별하고 심각도·신뢰도로 분류.
          bastion triage 페르소나·자율 Blue 파이프라인 관점.
        success_criteria:
          - "Wazuh/Suricata에서 정찰·웹 공격 경보를 찾아 출처 IP·시각을 제시"
          - "(설명) 트리아지(오탐/저위험 vs 진짜 위협) 결과를 서술"
          - "(설명) 자율 Blue 파이프라인(탐지→분류)로 설명"
        acceptable_methods:
          - "Wazuh 대시보드/로그에서 경보 조회"
          - "Suricata eve.json/fast.log 확인"
        negative_signs:
          - "경보 근거 없이 '탐지됨'만 서술"
          - "출처·심각도 특정 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 자율 대응: 차단 규칙 + 자율성 수준·감사

      트리아지(BLUE-1)에서 진짜 위협으로 판정한 공격에 **자율 대응**한다 — 단 bastion 자율성 수준을
      지킨다: 조회는 자율, **차단(변경)은 위험 행동이라 승인 관점**으로 다룬다.

      ### 어떻게
      - 공격 출처 IP를 방화벽(nftables)에서 차단하는 규칙을 작성/적용(또는 IPS 룰 배포).
      - **자율성 수준**: 차단은 비가역·고위험이므로 "사람 승인 후 적용" 절차로 설명.
      - **감사**: 대응 행동을 (개념상) append-only 해시체인 감사에 남김을 명시.

      ### ✅ 합격 기준
      공격 출처에 대한 차단 규칙을 제시/적용하고, 자율성 수준(승인)·감사 원칙을 설명한다.
    hint: "공격 출처 IP를 nftables/IPS 룰로 차단. 차단은 고위험→승인 관점(자율성 수준). 감사(해시체인) 명시. bastion 가드레일."
    verify:
      type: "semantic"
      expect: "response"
      semantic:
        intent: |
          자율 Blue 대응 — 위협 출처 차단을 설계·적용하되 bastion 가드레일(위험 행동 승인)·감사
          무결성을 지킨다. 자율성 수준(조회 자율·차단 승인)이 핵심.
        success_criteria:
          - "공격 출처 IP에 대한 방화벽(nftables) 차단 규칙 또는 IPS 룰을 구체적으로 제시/적용"
          - "(설명) 차단은 고위험이라 사람 승인 절차(자율성 수준)를 거침을 명시"
          - "(설명) 대응 행동을 append-only 해시체인 감사에 남기는 원칙을 설명"
        acceptable_methods:
          - "nft add rule ... drop (출처 IP 차단)"
          - "Suricata/Wazuh 탐지 룰 배포"
        negative_signs:
          - "구체적 규칙 없이 '차단하겠다'만 서술"
          - "자율성 수준·감사 원칙 언급 없음(가드레일 무시)"
