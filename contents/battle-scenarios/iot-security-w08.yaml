id: "iot-security-w08"
category: "iot-security"
title: "[IoT보안 W8] 중간 평가: IoT 디바이스 4대 표면 종합 침투 vs 종합 방어"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간 평가 공방전 — W02~W07(네트워크 프로토콜·하드웨어·펌웨어·웹·무선·BLE)을 종합해, IoT 디바이스
  하나를 **4대 표면(device·network·cloud·app)** 으로 종합 침투하고 종합 방어를 설계한다. 실물이
  필요하므로 **설계·서술형**이다(semantic 채점). 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(4대 표면 종합 침투)와 Blue(종합 방어)를 모두 수행.
    • duel : Red 학생이 종합 침투를 제시하고, Blue 학생이 종합 방어로 대응.

  ▸ 채점(중요) — **보고서의 종합 설계 품질**로 채점: 4대 표면을 연결한 킬체인, W02~W07 기법 통합의
    구체성, OWASP IoT Top 10 매핑, 종합 방어의 완결성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (4대 표면 종합 침투) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 4대 표면 연결 종합 킬체인

      대상 IoT 디바이스(카메라·스마트락·게이트웨이 등 택1)를 골라, **device·network·cloud·app 4대
      표면**을 연결한 종합 킬체인을 설계한다.

      ### 무엇을
      - W02~W07 기법 통합: 하드웨어(UART/펌웨어)·네트워크(MQTT/무선/BLE)·웹(명령 주입/인증)·클라우드(API).
      - 최소 3개 표면을 연결(예: 펌웨어 하드코딩 비밀→클라우드 API→전 장치 제어).
      - 각 단계 기법과 표면 간 이동을 명시.

      ### ✅ 합격 기준
      최소 3개 표면을 연결한 종합 킬체인을 W02~W07 기법으로 구체적으로 설계하고 표면 간 이동을 서술한다.
    hint: "device(UART/펌웨어)·network(MQTT/무선/BLE)·web(명령 주입/인증)·cloud(API) 중 3+ 표면 연결. W02~W07 기법 통합. 표면 간 이동."
    verify:
      type: "semantic"
      expect: "iot_full_killchain"
      semantic:
        intent: |
          IoT 4대 표면 종합 침투 — 학기 전반 기법을 표면 간 이동으로 연결하는 능력 종합 평가.
        success_criteria:
          - "대상 IoT를 정하고 최소 3개 표면을 연결"
          - "W02~W07 기법(하드웨어·네트워크·웹·클라우드)을 통합"
          - "표면 간 이동(한 표면→다른 표면)을 구체적으로 서술"
        acceptable_methods:
          - "다표면 연결 킬체인 + 기법 통합"
        negative_signs:
          - "표면 3개 미만 또는 연결 없음"
          - "기법 통합 없이 나열"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — OWASP IoT Top 10 매핑 + 영향 종합

      침투 결과를 **OWASP IoT Top 10**에 매핑하고 영향(대량 장악·물리·프라이버시)을 종합 보고한다.

      ### ✅ 합격 기준
      발견을 OWASP IoT Top 10에 매핑하고 심각도·최종 영향(봇넷/물리/프라이버시)을 담은 종합 보고를
      작성한다.
    hint: "발견→OWASP IoT Top 10 매핑+심각도+최종 영향(봇넷 대량화/물리/프라이버시). 종합 보고."
    verify:
      type: "semantic"
      expect: "iot_impact_report"
      semantic:
        intent: |
          IoT 침투 보고 — 발견을 표준(OWASP IoT)에 매핑하고 영향으로 의사결정에 연결.
        success_criteria:
          - "발견을 OWASP IoT Top 10에 매핑"
          - "심각도를 부여"
          - "최종 영향(봇넷·물리·프라이버시)을 종합"
        acceptable_methods:
          - "OWASP 매핑 + 심각도 + 영향"
        negative_signs:
          - "매핑·영향 없이 나열만"

# ───────────────────────── BLUE (IoT 종합 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 4대 표면 종합 방어 설계

      RED 4대 표면 침투에 대응하는 **표면별 종합 방어**를 설계한다.

      ### 무엇을
      - **Device**: 디버그 잠금·보안 부팅·비밀 제거·하드웨어 보호.
      - **Network**: 프로토콜 인증·암호(MQTT/무선/BLE)·네트워크 분리.
      - **Cloud**: API 인증·최소 권한·데이터 암호화.
      - **App**: 입력 검증·인증·CSRF.
      - 각 방어를 RED 경로·OWASP IoT에 매핑.

      ### ✅ 합격 기준
      4대 표면 각각의 구체적 방어를 제시하고 RED 킬체인 급소(하드코딩 비밀·게이트웨이)를 끊는 우선순위를
      제시한다.
    hint: "Device(디버그 잠금·보안 부팅·비밀 제거)·Network(인증·암호·분리)·Cloud(API 인증)·App(입력 검증·인증). 급소 차단 우선순위+OWASP 매핑."
    verify:
      type: "semantic"
      expect: "iot_surface_defense_comprehensive"
      semantic:
        intent: |
          IoT 4대 표면 종합 방어 — 표면별 방어와 급소 차단으로 RED 킬체인을 막는다.
        success_criteria:
          - "4대 표면(device·network·cloud·app) 각각의 구체적 방어를 제시"
          - "RED 킬체인 급소(하드코딩 비밀·게이트웨이) 차단 우선순위를 제시"
          - "(설명) OWASP IoT Top 10 매핑을 제시"
        acceptable_methods:
          - "표면별 방어 + 급소 차단 + 매핑"
        negative_signs:
          - "표면 일부만"
          - "급소·우선순위 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Security by Design·생태계 방어 종합

      개별 방어를 넘어 **Security by Design·생태계 분리**를 종합한다.

      ### 무엇을
      - **Security by Design**: 기본 비밀번호 금지·안전한 업데이트·최소 표면·암호화 기본.
      - **생태계 분리**: 네트워크 분리·최소 신뢰(마이크로세분화)로 측면이동·허브 SPOF 완화.
      - **모니터링·수명주기**: 이상 탐지·SBOM·업데이트·EOL.
      - **프라이버시·물리 안전**: 데이터 최소화, 안전 필수 장치 안전 기본값.

      ### ✅ 합격 기준
      Security by Design·생태계 분리·수명주기·프라이버시를 종합해 제시하고 "설계 단계부터 보안" 원칙을
      설명한다.
    hint: "Security by Design(기본 비밀번호 금지·안전 업데이트·최소 표면)+생태계 분리(마이크로세분화)+SBOM·EOL+프라이버시·안전 기본값. '설계 단계부터 보안' 원칙."
    verify:
      type: "semantic"
      expect: "security_by_design_comprehensive"
      semantic:
        intent: |
          IoT Security by Design·생태계 종합 — 설계 단계 보안과 생태계 분리로 근본 방어.
        success_criteria:
          - "Security by Design(기본 비밀번호 금지·안전 업데이트·최소 표면)을 제시"
          - "생태계 분리(마이크로세분화·SPOF 완화)를 제시"
          - "수명주기(SBOM·EOL)·프라이버시·안전 기본값을 제시"
          - "(설명) '설계 단계부터 보안' 원칙 설명"
        acceptable_methods:
          - "Security by Design + 생태계 분리 + 수명주기 + 프라이버시"
        negative_signs:
          - "개별 패치만·설계 관점 없음"
          - "생태계 분리 언급 없음"
