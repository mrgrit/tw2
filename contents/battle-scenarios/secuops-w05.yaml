id: "secuops-w05"
category: "secuops"
title: "[보안운영 W5] 다단계·민감정보 공격 vs Suricata 심화룰(pcre·flowbits·threshold)"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  보안운영 5주차 — Suricata 룰 심화. 외부 공격자가 ① 민감정보(주민번호 형태) 유출 시도 ②
  다단계 공격(스캐너 UA 정찰 → /admin 접근)을 시도하면, 운영자는 pcre(정규식 prefilter),
  flowbits(다단계 상태 추적), threshold/suppression(운영 통제)을 결합한 production-grade 탐지룰을
  작성한다.

  ▸ 모드: solo(외부 공격자→IPS 운영자) / duel(상대 공격→본인 IPS). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** — 외부 명령 미수집 → 대상 방어층/SIEM 흔적으로 채점.
  ▸ 커스텀 룰은 **/etc/suricata/rules/local.rules**, 교육용 sid 9005000+ (각 미션 권장 sid 사용).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 민감정보 유출 시도 (SQL UNION → 데이터 추출)
      UNION 기반 SQLi 로 사용자 테이블(주민번호/비밀번호 형태 데이터)을 끌어내려 시도한다.
      ```bash
      curl -s "http://192.168.0.161:8080/vulnerabilities/sqli/?id=1' UNION SELECT user,password FROM users-- -&Submit=Submit" \
           --cookie "security=low; PHPSESSID=test"
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF(ModSecurity) audit 의 SQLi 탐지.
      ✅ 합격: 대상 WAF audit 에 SQLi(UNION) 탐지 흔적.
    hint: "attacker-ext UNION SQLi. 채점: 대상 ModSecurity audit 의 SQLi 탐지."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1190 + T1213 — UNION SQLi 로 민감정보 추출. 외부 공격자 모델 → 대상 WAF audit 탐지로 판정."
        success_criteria: ["대상 ModSecurity audit 에 SQLi 탐지(최근)", "(설명) 어떤 데이터를 노렸는지 서술"]
        acceptable_methods: ["attacker-ext UNION SQLi / sqlmap --technique=U"]
        negative_signs: ["대상 WAF 흔적 없음", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 17
    instruction: |
      ## 🎯 RED-2 — 다단계 정찰 (스캐너 UA → 관리 경로 탐색)
      스캐너성 다중 요청으로 정찰 후 `/admin` 등 민감 경로 접근을 시도한다(BLUE 의 flowbits
      다단계 탐지 표적). nikto/반복 curl 로 수행.
      ```bash
      nikto -h http://192.168.0.161:8080 -maxtime 60s
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 의 스캔/정찰 탐지.
      ✅ 합격: 대상 IPS 에 스캐너/정찰 탐지 흔적.
    hint: "attacker-ext nikto/반복 정찰. 채점: 대상 Suricata 스캔 탐지."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1595 — 다단계 정찰(스캐너→관리경로). 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 에 스캔/정찰 탐지(최근)", "(설명) 정찰→관리경로 단계 서술"]
        acceptable_methods: ["attacker-ext nikto/gobuster/반복 curl"]
        negative_signs: ["대상 미도달", "command_ran(attacker-ext) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 — pcre 정규식 탐지룰 (민감정보 패턴)
      content prefilter + **pcre** 로 민감정보(주민번호 형태 13자리 숫자 또는 카드번호)를 응답/요청
      에서 탐지하는 룰을 작성한다. content 로 1차 거른 뒤 pcre 로 정밀 매치(성능). **sid:9005002**.
      ```
      alert http any any -> any any (msg:"EDU sensitive RRN pattern"; flow:to_server; \
        http.uri; content:"id="; pcre:"/\d{6}[-]?\d{7}/"; classtype:policy-violation; sid:9005002; rev:1;)
      ```
      📌 채점: local.rules 에 sid 9005002 (pcre 민감정보) 룰이 작성됐는지.
      ✅ 합격: local.rules 에 9005002 pcre 룰이 있다.
    hint: "local.rules 에 content+pcre 민감정보 룰(sid 9005002) 작성."
    verify:
      type: "file_contains"
      expect: "9005002"
      checks:
        # sid 9005002 는 교육용 고유 식별자 — 베이스/CRS 룰과 충돌 없음.
        - { id: "blue-1-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9005002" } }
      semantic:
        intent: "MITRE D3FEND — pcre 정밀 탐지 + content prefilter(성능). 민감정보(RRN/카드) 패턴 탐지."
        success_criteria: ["local.rules 에 sid 9005002 pcre 룰", "content prefilter + pcre 결합", "(설명) prefilter 의 성능 이점"]
        acceptable_methods: ["local.rules 에 content+pcre 룰(sid 9005002)"]
        negative_signs: ["pcre 만 단독(prefilter 없음→느림)", "문법 오류 로딩 실패"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — flowbits 다단계 추적룰
      단발이 아닌 **다단계** 공격(스캐너 UA 정찰 → /admin 접근)을 flowbits 로 추적한다. 1단계에서
      flowbits 를 set 하고, 2단계에서 isset 일 때만 경보. **sid:9005003(set)/9005004(isset)** 권장,
      msg 에 'EDU flowbits'.
      ```
      alert http any any -> any any (msg:"EDU flowbits step1 scanner"; http.user_agent; content:"nikto"; nocase; \
        flowbits:set,edu.scan; flowbits:noalert; sid:9005003; rev:1;)
      alert http any any -> any any (msg:"EDU flowbits step2 admin after scan"; http.uri; content:"/admin"; \
        flowbits:isset,edu.scan; classtype:web-application-attack; sid:9005004; rev:1;)
      ```
      📌 채점: local.rules 에 flowbits 기반 다단계 룰(sid 9005003/9005004)이 작성됐는지.
      ✅ 합격: local.rules 에 flowbits 다단계 룰이 있다.
    hint: "local.rules 에 flowbits set/isset 다단계 룰(sid 9005003/9005004) 작성."
    verify:
      type: "file_contains"
      expect: "9005003"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", regex: "9005003|9005004" } }
      semantic:
        intent: "MITRE D3FEND — flowbits 상태 추적으로 다단계 공격 탐지(정찰 후 접근). 단발 대비 문맥 탐지."
        success_criteria: ["local.rules 에 flowbits set/isset 룰(sid 9005003/9005004)", "1단계 noalert + 2단계 isset", "(설명) 다단계 탐지 의의"]
        acceptable_methods: ["local.rules 에 flowbits set→isset 2단 룰"]
        negative_signs: ["flowbits 없이 단발 룰만", "set/isset 연결 누락"]

  - order: 3
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — production-grade 결합 룰 (threshold 포함)
      앞의 기술을 결합한 운영급 룰을 작성한다(content prefilter + 적절한 버퍼 + threshold 로 과탐
      억제). **sid:9005099**, msg 'EDU production'. threshold 로 빈도 임계 적용.
      ```
      alert http any any -> any any (msg:"EDU production combined"; flow:to_server; http.uri; \
        content:"union"; nocase; pcre:"/union\s+select/i"; \
        threshold:type threshold, track by_src, count 3, seconds 60; \
        classtype:web-application-attack; sid:9005099; rev:1;)
      ```
      📌 채점: local.rules 에 sid 9005099 결합 룰이 작성됐는지.
      ✅ 합격: local.rules 에 9005099 production 룰이 있다.
    hint: "local.rules 에 content+pcre+threshold 결합 룰(sid 9005099) 작성."
    verify:
      type: "file_contains"
      expect: "9005099"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", pattern: "9005099" } }
      semantic:
        intent: "운영급 룰 — prefilter+pcre+threshold 결합으로 정확도+성능+과탐억제 균형."
        success_criteria: ["local.rules 에 sid 9005099 결합 룰", "content prefilter+pcre+threshold 결합", "(설명) 과탐 억제 설계"]
        acceptable_methods: ["local.rules 에 결합 룰(sid 9005099)"]
        negative_signs: ["threshold 없이 과탐", "prefilter 없이 pcre 단독"]

  - order: 4
    assess_target: self
    target_vm: ips
    points: 10
    instruction: |
      ## 🛡️ BLUE-4 — 공격 재현 → 결합 룰 탐지 확인
      (solo 면 RED 의 UNION/정찰 재현 후) eve.json 에서 작성한 룰들이 트리거한 경보를 확인한다.
      ✅ 합격: 본인 IPS 로그에 SQLi/정찰 탐지 경보가 있다(작성 룰 동작).
    hint: "공격 재현 후 eve.json 에서 작성 룰 경보 확인."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "blue-4-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "룰 검증 — 심화 룰이 재현 공격을 실제 탐지하는지 확인."
        success_criteria: ["Suricata eve.json 에 SQLi/정찰 탐지(최근)", "작성 룰(sid 9005xxx)에서 트리거", "(설명) 재현→탐지"]
        acceptable_methods: ["공격 재현 후 log_contains suricata"]
        negative_signs: ["룰만 작성·미검증"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 10
    instruction: |
      ## 🛡️ BLUE-5 — SIEM 통합 + suppression 운영 권고
      탐지가 Wazuh 로 모이는지 확인하고, 과탐이 많은 경우 suppression/event_filter 로 통제하는
      운영 권고를 정리한다.
      ✅ 합격: 본인 SIEM 에 IPS 탐지 경보가 수집돼 있다.
    hint: "본인 Wazuh 에서 IPS 탐지 경보 수집 확인."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 + 운영 통제 — Suricata 탐지의 Wazuh 수렴 + suppression 권고."
        success_criteria: ["본인 Wazuh 에 ids 경보(최근)", "(설명) 과탐 시 suppression/event_filter 운영 권고"]
        acceptable_methods: ["siem wazuh_alert(ids)", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
