id: "autonomous-security-w14"
category: "autonomous-security"
title: "[자율보안 W14] 정책 조종(Policy Steering) 공격 vs 견고한 RL Steering·정책 최적화"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  RL Steering·정책 최적화 공방전 — 자율 보안 에이전트의 **정책을 정교하게 조종(steering)** 하는 공격과,
  그에 맞선 견고한 정책 최적화를 다룬다. 공격자는 환경·입력을 조작해 에이전트 정책을 원하는 방향으로
  몰아가고(policy steering), 방어자는 조종에 강건한 정책과 안전 제약을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(정책 조종 시나리오)와 Blue(견고한 정책 최적화·steering)를 모두 수행.
    • duel : Red 학생이 방어 에이전트의 정책을 조종하려 하고, Blue 학생은 강건한 정책으로 저항한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)에 정책 조종용 자극(특정
    패턴 반복·미끼)을 준다. Red 채점은 **대상 탐지 흔적** + 본인 명령 흔적 + **보고서의 정책 조종
    분석**으로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — RL steering은 보상·프롬프트·환경을 조정해 정책을 원하는 행동으로 유도한다.
    적대적 조종(반복 미끼로 오탐 유발·차단 회피 학습)에 강건해야 한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (정책 조종 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 미끼 반복으로 정책 조종 시도 (오탐 유발·둔감화)

      방어 에이전트의 정책을 조종하려 시도한다: **양성처럼 보이는 미끼 패턴을 반복**해 오탐 피로·둔감화를
      유발하거나, 특정 반응을 학습시켜 후속 공격을 흘려보낸다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 미끼 패턴을 반복(고유 태그).
      - 이 반복이 방어 정책을 어떻게 조종(둔감화·오탐 피로)할 수 있는지 분석.

      ### 권장 명령 (참고)
      ```bash
      for i in $(seq 1 15); do curl -A 'auto-red-<학번>-steer' "http://192.168.0.161/?decoy=$i"; sleep 3; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 정책 조종 분석**(미끼→둔감화/오탐→후속 회피).

      ### ✅ 합격 기준
      미끼 반복으로 정책 조종을 시도하고, 둔감화·오탐 피로·후속 회피 학습 경로를 분석한다.
    hint: "양성 위장 미끼 반복(태그 auto-red-<학번>)으로 오탐 피로·둔감화 유발 시도 + 정책 조종 경로 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-14-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          정책 조종(steering) 공격 — 미끼 반복으로 방어 정책을 둔감화·오탐 피로로 몰아 후속 공격을 흘림.
        success_criteria:
          - "대상 IPS(Suricata)에 미끼 흔적이 남고 고유 태그로 귀속됨"
          - "미끼 반복으로 정책 조종을 시도"
          - "(설명) 둔감화·오탐 피로·후속 회피 학습 경로를 분석"
        acceptable_methods:
          - "미끼 반복 + 조종 경로 분석"
        negative_signs:
          - "흔적 없음"
          - "조종 경로 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 적대적 정책 조종 유형 분석

      RL/자율 정책에 대한 **적대적 조종 유형**을 분석한다: 보상 조작·환경 오염·프롬프트/컨텍스트 조종·
      데이터 중독(training poisoning). 각각이 자율 보안 에이전트를 어떻게 오도하는지.

      ### ✅ 합격 기준
      적대적 정책 조종 유형 최소 3가지를 자율 보안 예시와 함께 분석하고, RED-1 실증을 한 유형에 매핑한다.
    hint: "보상 조작·환경 오염·컨텍스트 조종·데이터 중독 등 3+ 조종 유형을 보안 예시와 함께 분석. RED-1을 한 유형에 매핑."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-14-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          적대적 정책 조종 유형 — 보상·환경·컨텍스트·데이터를 통한 조종을 카탈로그화해 방어 근거 마련.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남음(고유 태그)"
          - "적대적 조종 유형 최소 3가지를 보안 예시와 함께 분석"
          - "(설명) RED-1 실증을 한 유형에 매핑"
        acceptable_methods:
          - "조종 유형 분석 + 매핑"
        negative_signs:
          - "유형 1~2개·예시 없음"

# ───────────────────────── BLUE (견고한 정책 최적화·Steering) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 조종 시도 탐지: 미끼·둔감화 공격 식별

      정책 조종 시도를 **탐지**한다. 반복 미끼·둔감화 유도 패턴을 SIEM에서 식별한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED의 미끼 반복(고유 태그)을 찾아 "조종 시도" 후보로 표시.
      - 정상 트래픽과 조종 미끼를 구분하는 근거(반복성·타이밍·양성 위장)를 제시.

      ### ✅ 합격 기준
      미끼 반복·둔감화 유도를 탐지하고, 정상과 구분하는 근거를 제시한다.
    hint: "Wazuh/Suricata에서 RED 미끼 반복(태그) 탐지 + 정상과 구분 근거(반복성·타이밍·위장)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-14-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          정책 조종 탐지 — 미끼 반복·둔감화 유도를 식별해 조종을 차단.
        success_criteria:
          - "Wazuh/Suricata에서 RED 미끼 반복을 탐지"
          - "정상과 조종 미끼를 구분하는 근거를 제시"
          - "(설명) 조종 시도를 식별·설명"
        acceptable_methods:
          - "미끼 반복 탐지 + 구분 근거"
        negative_signs:
          - "미끼 근거 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 견고한 정책 최적화·안전 Steering 설계

      적대적 조종에 강건한 **정책 최적화와 안전 steering**을 설계한다.

      ### 무엇을
      - **적대적 강건성**: 적대적 훈련·이상 입력 탐지·정책 정규화로 조종 저항.
      - **안전 제약·불변식**: 정책이 절대 넘지 않는 안전 제약(둔감화돼도 고위험은 항상 대응).
      - **안전 Steering**: 보상·프롬프트 조정은 승인·감사 하에만, 리워드 탬퍼링/데이터 중독 차단.
      - **모니터링·롤백**: 정책 드리프트 모니터링, 조종 감지 시 이전 안전 정책으로 롤백.

      ### ✅ 합격 기준
      적대적 강건성·안전 제약 불변식·안전 steering·드리프트 모니터링을 설계하고, "정책은 조종돼도 안전
      제약을 넘지 않게" 원칙을 설명한다.
    hint: "적대적 훈련·이상 입력 탐지+안전 제약 불변식(고위험 항상 대응)+안전 Steering(승인·감사)+드리프트 모니터링·롤백. '조종돼도 안전 제약 유지' 원칙."
    verify:
      type: "semantic"
      expect: "robust_policy"
      semantic:
        intent: |
          견고한 정책 최적화 — 적대적 강건성·안전 제약·안전 steering·모니터링으로 조종에 저항.
        success_criteria:
          - "적대적 강건성(적대 훈련·이상 입력 탐지·정규화)을 제시"
          - "안전 제약 불변식(둔감화돼도 고위험 항상 대응)을 제시"
          - "안전 steering(승인·감사)·드리프트 모니터링·롤백을 제시"
          - "(설명) '정책은 조종돼도 안전 제약을 넘지 않게' 원칙 설명"
        acceptable_methods:
          - "강건성 + 안전 제약 + 안전 steering + 모니터링"
        negative_signs:
          - "안전 제약 불변식 없음"
          - "적대적 강건성·롤백 언급 없음"
