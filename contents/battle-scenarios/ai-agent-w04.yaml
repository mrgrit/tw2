id: "ai-agent-w04"
category: "ai-agent"
title: "[AI에이전트 W4] 하네스 부재 악용 vs 에이전트 하네스(가드레일·게이트) 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  에이전트 하네스 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 에이전트를 안전하게 가두는 **하네스(harness)**: 입력 검증·컨텍스트
  조립·도구 게이트·출력 검증·감사. Red는 하네스 부재를 악용하고, Blue는 하네스를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(하네스 부재 악용)와 Blue(하네스 설계)를 모두 수행.
    • duel : Red 학생이 하네스 없는 에이전트를 악용하고, Blue 학생이 하네스로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 하네스 부재 악용: 입력→도구 직결 실증

      하네스(게이트) 없이 **입력이 곧 도구 실행**으로 이어지는 위험을 실증한다.

      ### 어떻게
      - `/api/chat` 인젝션 + `/api/tool/*` 무인증 호출로, 입력 검증·도구 게이트·출력 검증이 없을 때의
        위험(비밀 유출·능력 초과)을 실제 호출로 보인다.

      ### ✅ 합격 기준
      입력 검증·도구 게이트 부재로 인젝션/도구 오남용이 통함을 실제 호출로 증명한다.
    hint: "/api/chat 인젝션+/api/tool 무인증 호출로 입력 검증·게이트·출력 검증 부재 위험 실증."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-4-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          하네스 부재 — 게이트 없이 입력이 도구·비밀로 직결되는 위험을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api 호출 흔적이 남음"
          - "입력 검증·도구 게이트 부재로 오남용이 통함을 증명"
          - "(설명) 하네스가 없을 때의 위험을 설명"
        acceptable_methods:
          - "인젝션 + 무인증 도구 호출"
        negative_signs:
          - "명령 흔적 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 하네스 우회 지점 분석

      하네스가 일부 있어도 **우회되는 지점**을 분석한다: 입력 검증 우회·게이트 미적용 경로·출력 검증 공백.

      ### ✅ 합격 기준
      하네스 각 구성(입력·게이트·출력)의 우회 지점을 최소 2가지 실제 시도로 분석한다.
    hint: "입력 검증 우회·게이트 미적용 경로·출력 검증 공백 2+ 실제 시도·분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-4-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          하네스 우회 — 부분 하네스의 공백을 분석해 완전성의 필요를 이해.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "하네스 우회 지점 최소 2가지를 시도·분석"
          - "(설명) 하네스 완전성의 필요를 언급"
        acceptable_methods:
          - "우회 지점 시도 + 분석"
        negative_signs:
          - "우회 1개·막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 하네스 표면 진단

      우리 에이전트에 **하네스 구성이 있는지** 진단한다: 입력 검증·게이트·출력 검증·감사.

      ### ✅ 합격 기준
      하네스 각 구성의 유무를 증거로 진단하고 공백을 식별한다.
    hint: "입력 검증·도구 게이트·출력 검증·감사 유무를 증거로 진단·공백 식별."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-4-3", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          하네스 표면 진단 — 하네스 구성 유무를 증거로 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "하네스 각 구성 유무를 증거로 진단"
          - "(설명) 공백을 식별"
        acceptable_methods:
          - "하네스 구성 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 에이전트 하네스 설계

      LLM을 안전하게 감싸는 **하네스**를 설계한다.

      ### 무엇을
      - **입력 검증**: 인젝션 탐지·입력/지시 구분·정규화.
      - **컨텍스트 조립**: 신뢰 데이터만·검색 데이터 격리.
      - **도구 게이트**: 도구 인증·허용목록·고위험 승인.
      - **출력 검증**: 비밀 마스킹·형식 검증·행동 경계.
      - **감사**: 모든 단계 append-only 감사.

      ### ✅ 합격 기준
      입력·컨텍스트·게이트·출력·감사를 갖춘 하네스를 설계하고 "자율성은 하네스 안에서만" 원칙을 설명한다.
    hint: "입력 검증+컨텍스트 조립(데이터 격리)+도구 게이트(인증·승인)+출력 검증+감사. '자율성은 하네스 안에서만' 원칙."
    verify:
      type: "semantic"
      expect: "agent_harness"
      semantic:
        intent: |
          에이전트 하네스 — 입력·컨텍스트·게이트·출력·감사로 LLM을 안전하게 감싼다.
        success_criteria:
          - "입력 검증·컨텍스트 조립(데이터 격리)을 제시"
          - "도구 게이트(인증·승인)·출력 검증을 제시"
          - "감사를 제시하고 '자율성은 하네스 안에서만' 원칙 설명"
        acceptable_methods:
          - "입력 + 컨텍스트 + 게이트 + 출력 + 감사"
        negative_signs:
          - "구성 누락"
          - "감사·게이트 없음"
