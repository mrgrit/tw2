id: "agent-ir-adv-w07"
category: "agent-ir-adv"
title: "[에이전트IR고급 W7] 다단계 피싱→웹셸→측면이동 vs 킬체인 단계별 탐지·차단"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — **Human+Agent 하이브리드** 다단계 공격: 피싱으로 초기 접근→웹셸 설치→
  측면이동을 에이전트가 가속한다. Red는 대상에 웹셸/측면이동 흔적을 남기고 다단계 킬체인을 설계하며,
  Blue는 단계별 탐지·차단을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(다단계 킬체인)와 Blue(단계별 탐지·차단)를 모두 수행.
    • duel : Red 학생이 다단계 공격을 수행하고, Blue 학생은 각 단계를 탐지·차단한다.

  ▸ 공격 위치·채점(중요)
    Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(el34, 192.168.0.161)을 공격한다. 채점은 **대상
    ModSec/Suricata/Wazuh 흔적**(웹셸 업로드·명령 실행 시도는 WAF 탐지) + 본인 명령 흔적 + **보고서의
    다단계 킬체인·탐지 설계**로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (다단계 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 초기 접근→웹셸 설치 시도 (killchain: initial access)

      대상 웹에 **웹셸 설치·명령 실행** 시도(고유 태그)로 흔적을 남기고, 피싱→초기 접근 단계를 설계한다.

      ### 권장 명령 (참고 — WAF 탐지 관찰)
      ```bash
      curl -A 'auto-red-<학번>-webshell' "http://192.168.0.161/upload?f=shell.php"
      curl -A 'auto-red-<학번>-cmd' "http://192.168.0.161/?cmd=id"
      ```

      ### ✅ 합격 기준
      대상에 웹셸/명령 실행 시도 흔적을 남기고, 피싱(초기 접근)→웹셸 설치 단계를 설계한다.
    hint: "웹셸 업로드·cmd 실행 시도(태그)+피싱→초기 접근→웹셸 설치 단계 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-7-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          초기 접근→웹셸 — 피싱으로 발판을 얻고 웹셸로 명령 실행 능력을 확보하는 단계를 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 웹셸/명령 시도 흔적이 남고 고유 태그로 귀속됨"
          - "피싱→초기 접근→웹셸 설치 단계를 설계"
          - "(설명) Human+Agent 하이브리드 특성을 언급"
        acceptable_methods:
          - "웹셸/명령 시도 + 초기 접근 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "단계 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 측면이동·지속성 킬체인 설계

      정찰·이동 활동(고유 태그)으로 흔적을 남기고, **웹셸→내부 정찰→측면이동→지속성** 킬체인을 설계한다.

      ### 무엇을
      - 자격 수집→내부 서비스 이동(SMB/SSH/RDP)→권한 상승→지속성(서비스·작업 스케줄).
      - 에이전트가 각 단계를 가속(기계 속도 확산).

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 웹셸→측면이동→지속성 킬체인을 단계별로 설계한다.
    hint: "정찰/이동 활동(태그)+웹셸→자격 수집→측면이동(SMB/SSH)→권한 상승→지속성 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-7-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          측면이동·지속성 — 발판에서 자격 수집·이동·지속성으로 확산하는 킬체인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "웹셸→측면이동→지속성 킬체인을 설계"
          - "(설명) 에이전트가 확산을 가속함을 설명"
        acceptable_methods:
          - "활동 흔적 + 측면이동 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (단계별 탐지·차단) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 다단계 킬체인 탐지 설계

      대상 SIEM/IPS에서 RED 각 단계를 탐지하고, **단계별 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 웹셸 업로드·명령 실행·측면이동 흔적 확인.
      - 단계별 신호: 웹 디렉토리 신규 파일·웹서버의 셸 자식 프로세스·비정상 내부 연결(SMB/SSH)·자격 사용 이상.

      ### ✅ 합격 기준
      RED 각 단계를 탐지하고, 단계별 탐지 신호(웹셸·셸 프로세스·측면이동)를 설계한다.
    hint: "Wazuh/Suricata에서 웹셸·명령·측면이동 탐지+단계 신호(신규 웹 파일·웹서버 셸 자식 프로세스·비정상 내부 연결·자격 이상) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-7-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          다단계 탐지 — 각 킬체인 단계의 신호를 설계해 조기 차단 지점을 만든다.
        success_criteria:
          - "Wazuh/Suricata에서 RED 각 단계를 탐지"
          - "단계별 탐지 신호(웹셸·셸 프로세스·측면이동)를 설계"
          - "(설명) 조기 단계 차단이 확산을 막음을 언급"
        acceptable_methods:
          - "단계별 탐지 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "단계 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 단계별 차단·확산 억제 설계

      다단계 공격을 **단계별로 끊는** 방어를 설계한다.

      ### 무엇을
      - **초기 접근**: 피싱 방어(메일 필터·MFA)·웹셸 업로드 차단(업로드 검증·실행 권한 제거).
      - **측면이동 억제**: 네트워크 분리·최소 권한·자격 위생(LAPS·PAM), 내부 인증 모니터링.
      - **지속성 탐지**: 신규 서비스·작업 스케줄·자동실행 모니터링.
      - **속도 대응**: 자동화 확산에 맞춘 자동 격리·세분화.

      ### ✅ 합격 기준
      초기 접근·측면이동·지속성 각 단계 차단과 확산 억제를 제시하고 "한 단계라도 끊으면 킬체인이 멈춘다"
      원칙을 설명한다.
    hint: "초기 접근(피싱 방어·MFA·업로드 차단)+측면이동 억제(분리·최소 권한·PAM·인증 모니터링)+지속성 탐지+자동 격리. '한 단계라도 끊기' 원칙."
    verify:
      type: "semantic"
      expect: "killchain_disruption"
      semantic:
        intent: |
          단계별 차단 — 초기 접근·측면이동·지속성을 각각 끊어 킬체인을 붕괴시킨다.
        success_criteria:
          - "초기 접근 차단(피싱 방어·업로드 차단)을 제시"
          - "측면이동 억제(분리·최소 권한·PAM)를 제시"
          - "지속성 탐지·자동 격리를 제시하고 원칙 설명"
        acceptable_methods:
          - "단계별 차단 + 확산 억제"
        negative_signs:
          - "단일 지점만"
          - "측면이동/지속성 대응 없음"
