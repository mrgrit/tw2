id: "ai-agent-w12"
category: "ai-agent"
title: "[AI에이전트 W12] 평가 게이밍·벤치마크 취약 vs 정확도·안전성·비용 평가 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  에이전트 평가 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 에이전트가 "잘하는지·안전한지" 측정하는 **평가·벤치마크**와, 평가를
  속이는(게이밍) 위험, 견고한 평가 설계를 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(평가 게이밍·벤치마크 취약)와 Blue(견고한 평가 설계)를 모두 수행.
    • duel : Red 학생이 평가를 게이밍하고, Blue 학생이 견고한 평가로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거·분석**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 평가 게이밍: 지표만 채우기 실증

      에이전트 평가가 **표면 지표**에 의존할 때 게이밍되는 위험을 실증한다.

      ### 어떻게
      - AICompanion에 "정답처럼 보이는" 응답을 유도(실제 안전/정확 없이 지표만)·평가 프롬프트 인젝션 시도.
      - 표면 지표(응답 존재·형식)와 실제 품질(정확·안전)의 괴리를 관찰.

      ### ✅ 합격 기준
      표면 지표만 채우는 게이밍(형식 맞추기·평가 인젝션)을 실제 시도로 실증하고 지표-품질 괴리를 분석한다.
    hint: "형식만 맞춘 응답 유도·평가 프롬프트 인젝션 시도로 표면 지표 게이밍 실증 + 지표-품질 괴리 분석. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "ag-12-1", type: "command_ran", target: "attacker",
            params: { pattern: "chat" } }
      semantic:
        intent: |
          평가 게이밍 — 표면 지표 의존 평가가 게이밍됨을 실증(굿하트 법칙).
        success_criteria:
          - "본인 인프라 명령 로그에 /api/chat 호출 흔적이 남음"
          - "표면 지표 게이밍을 실제 시도로 실증"
          - "(설명) 지표-품질 괴리(굿하트)를 분석"
        acceptable_methods:
          - "게이밍 시도 + 괴리 분석"
        negative_signs:
          - "명령 흔적 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 벤치마크 취약·안전성 미측정 분석

      벤치마크의 **취약**을 분석한다: 데이터 오염(테스트 유출)·안전성 미측정·비용 무시·과적합.

      ### ✅ 합격 기준
      벤치마크 취약 최소 3가지(데이터 오염·안전 미측정·비용 무시)를 분석하고 잘못된 평가의 위험을 설명한다.
    hint: "데이터 오염(테스트 유출)·안전성 미측정·비용 무시·과적합 3+ 취약 분석. 잘못된 평가 위험."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-12-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          벤치마크 취약 — 데이터 오염·안전 미측정 등이 평가를 무의미하게 만듦을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "벤치마크 취약 최소 3가지를 분석"
          - "(설명) 잘못된 평가의 위험을 설명"
        acceptable_methods:
          - "벤치마크 취약 분석"
        negative_signs:
          - "취약 3개 미만·막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 평가 취약 진단

      우리 평가 체계의 **취약**을 진단한다: 지표 게이밍·데이터 오염·안전 미측정.

      ### ✅ 합격 기준
      평가 게이밍·데이터 오염·안전 미측정 취약을 증거·분석으로 진단한다.
    hint: "지표 게이밍·데이터 오염·안전 미측정 취약 증거·분석 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-12-3", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          평가 취약 진단 — 게이밍·오염·미측정을 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "평가 취약을 증거·분석으로 진단"
          - "(설명) 취약을 식별"
        acceptable_methods:
          - "평가 취약 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 정확도·안전성·비용 평가 설계

      견고한 **에이전트 평가**를 설계한다.

      ### 무엇을
      - **다차원 지표**: 정확도뿐 아니라 안전성(인젝션 저항·유해 거부)·비용·지연·회귀.
      - **게이밍 방지**: 표면 지표가 아닌 실제 결과·홀드아웃·적대적 평가(레드팀 케이스).
      - **데이터 위생**: 테스트/훈련 분리·오염 방지.
      - **지속 평가**: 회귀 탐지·배포 전 게이트·모니터링.

      ### ✅ 합격 기준
      다차원 지표(정확·안전·비용)·게이밍 방지·데이터 위생·지속 평가를 제시하고 "실제 결과·안전을 함께
      측정" 원칙을 설명한다.
    hint: "다차원(정확·안전·비용·지연·회귀)+게이밍 방지(실제 결과·홀드아웃·적대적)+데이터 위생·오염 방지+회귀 게이트. '실제 결과·안전 함께' 원칙."
    verify:
      type: "semantic"
      expect: "agent_evaluation"
      semantic:
        intent: |
          에이전트 평가 — 다차원 지표·게이밍 방지·데이터 위생·지속 평가로 견고하게 측정.
        success_criteria:
          - "다차원 지표(정확·안전·비용)를 제시"
          - "게이밍 방지(실제 결과·홀드아웃·적대적)를 제시"
          - "데이터 위생·지속 평가를 제시하고 원칙 설명"
        acceptable_methods:
          - "다차원 + 게이밍 방지 + 데이터 위생 + 지속"
        negative_signs:
          - "단일 지표·안전 미측정"
          - "게이밍 방지 없음"
