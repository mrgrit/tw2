id: "aisec-w02"
category: "aisec"
title: "[AI에이전트보안 W2] 도구 호출 실행 루프 오남용 vs 메시지 역할·도구 게이트 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  도구 호출 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). **메시지 역할·도구 호출·실행 루프**를 이해하고, 무인증·과도한 도구의
  오남용과 도구 게이트 설계를 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(도구 실행 루프 오남용)와 Blue(도구 게이트 설계)를 모두 수행.
    • duel : Red 학생이 도구를 오남용하고, Blue 학생이 게이트로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 무인증 도구 실행 루프 악용

      도구 호출 실행 루프가 **무인증·검증 없음**일 때의 악용을 실증한다.

      ### 권장 명령 (참고)
      ```bash
      curl -s http://192.168.0.161:8007/api/tool/exec_python -H 'content-type: application/json' \
        -d '{"code":"print(7*6)"}'
      ```

      ### ✅ 합격 기준
      무인증 도구 실행(코드 실행·사용자 변경)을 실제 호출로 증명하고 실행 루프 위험을 설명한다.
    hint: "exec_python·update_user 무인증 실행 증명+실행 루프(관찰→도구) 위험 설명. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "as-2-1", type: "command_ran", target: "attacker",
            params: { pattern: "tool" } }
      semantic:
        intent: |
          도구 실행 루프 악용 — 무인증·검증 없는 도구 루프가 임의 실행이 됨을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api/tool 호출 흔적이 남음"
          - "무인증 도구 실행을 실제 호출로 증명"
          - "(설명) 실행 루프 위험을 설명"
        acceptable_methods:
          - "무인증 도구 실행 실증"
        negative_signs:
          - "명령 흔적 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 메시지 역할 위조·도구 연쇄 분석

      **메시지 역할 위조**(사용자가 시스템/도구 역할 흉내)와 도구 연쇄(chain) 위험을 분석한다.

      ### ✅ 합격 기준
      메시지 역할 위조·도구 연쇄 위험을 실제 시도/관찰과 함께 분석한다.
    hint: "역할 위조(사용자가 시스템/도구 흉내)·도구 연쇄(chain 원격 코드) 위험 시도/관찰 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-2-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          역할 위조·연쇄 — 메시지 역할 경계 붕괴와 도구 연쇄 위험을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "역할 위조·도구 연쇄 위험을 분석"
          - "(설명) 역할 경계의 필요를 언급"
        acceptable_methods:
          - "역할 위조·연쇄 분석"
        negative_signs:
          - "분석 막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 도구·역할 표면 진단

      도구 호출·메시지 역할 표면을 진단한다.

      ### ✅ 합격 기준
      도구 인증·역할 경계·연쇄 위험을 증거로 진단한다.
    hint: "도구 인증·역할 경계·연쇄 위험 증거 진단."
    verify:
      type: "command_ran"
      expect: "api/tool"
      checks:
        - { id: "as-2-3", type: "command_ran", target: "attacker",
            params: { pattern: "tool" } }
      semantic:
        intent: |
          도구·역할 진단 — 인증·역할 경계·연쇄를 증거로 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "도구 인증·역할 경계를 진단"
          - "(설명) 위험을 식별"
        acceptable_methods:
          - "도구/역할 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 메시지 역할·도구 게이트 설계

      안전한 **역할 경계·도구 게이트**를 설계한다.

      ### 무엇을
      - **역할 경계**: 시스템/사용자/도구 메시지 명확 분리, 사용자 입력이 역할을 위조 못 하게.
      - **도구 게이트**: 도구 인증·허용목록·입력 스키마·고위험 승인.
      - **연쇄 통제**: 원격 코드/연쇄 도구 금지·격리.
      - **감사**: 도구 호출 감사.

      ### ✅ 합격 기준
      역할 경계·도구 게이트·연쇄 통제·감사를 제시하고 "역할 분리 + 도구 게이트" 원칙을 설명한다.
    hint: "역할 경계(시스템/사용자/도구 분리)+도구 게이트(인증·허용목록·스키마·승인)+연쇄 금지·격리+감사. '역할 분리+도구 게이트' 원칙."
    verify:
      type: "semantic"
      expect: "tool_gate_design"
      semantic:
        intent: |
          역할·도구 게이트 — 역할 경계·도구 게이트·연쇄 통제·감사로 도구 루프를 안전하게.
        success_criteria:
          - "역할 경계(메시지 분리)를 제시"
          - "도구 게이트(인증·허용목록·승인)를 제시"
          - "연쇄 통제·감사를 제시하고 원칙 설명"
        acceptable_methods:
          - "역할 경계 + 도구 게이트 + 연쇄 통제 + 감사"
        negative_signs:
          - "역할 경계 없음"
          - "게이트·감사 없음"
