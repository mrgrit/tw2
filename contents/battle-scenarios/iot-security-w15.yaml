id: "iot-security-w15"
category: "iot-security"
title: "[IoT보안 W15] 종합 평가: 전체 IoT 침투 vs Security by Design 종합 방어 프로그램"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  종합 평가(캡스톤) — 한 학기 전체(네트워크·하드웨어·펌웨어·웹·무선·BLE·카메라·스마트홈·허니팟·OT·
  자동차·가이드라인)를 종합해, 대상 IoT 시스템을 **전체 침투 평가**하고 **Security by Design 종합
  방어 프로그램**을 설계한다. **설계·서술형**이다(semantic 채점). 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(전체 IoT 침투)와 Blue(종합 방어 프로그램)를 모두 수행.
    • duel : Red 학생이 전체 침투를 제시하고, Blue 학생이 방어 프로그램으로 대응.

  ▸ 채점(중요) — **보고서의 종합 설계 품질**로 채점: 4대 표면·다중 장치를 연결한 킬체인, 학기 전체
    기법 통합, OWASP IoT Top 10 커버, Security by Design 종합 방어의 완결성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (전체 IoT 침투 평가) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 전체 IoT 시스템 침투 킬체인

      대상 IoT 시스템(스마트홈·카메라 생태계·산업 IoT 등 택1)을 골라, 학기 전체 기법을 **연결한 전체
      킬체인**을 설계한다.

      ### 무엇을
      - 4대 표면(device·network·cloud·app)과 다중 장치를 연결: 하드웨어/펌웨어→무선/네트워크→허브/
        클라우드→전 장치·물리·프라이버시.
      - 최소 4개 표면/기법을 연결하고 각 단계·표면 간 이동을 명시.

      ### ✅ 합격 기준
      최소 4개 표면/기법을 연결한 전체 킬체인을 구체적으로 설계하고 최종 영향(대량 장악/물리/프라이버시)을
      서술한다.
    hint: "대상 IoT 생태계 택1 + 하드웨어/펌웨어→무선/네트워크→허브/클라우드→전 장치. 4+ 표면/기법 연결. 최종 영향."
    verify:
      type: "semantic"
      expect: "iot_full_pentest"
      semantic:
        intent: |
          전체 IoT 침투 킬체인 — 학기 전체 기법을 표면·장치 간으로 연결하는 종합 능력 평가.
        success_criteria:
          - "대상 IoT 시스템을 정하고 최소 4개 표면/기법을 연결"
          - "표면 간·장치 간 이동을 구체적으로 서술"
          - "최종 영향(대량 장악/물리/프라이버시)을 서술"
        acceptable_methods:
          - "다표면·다장치 연결 킬체인"
        negative_signs:
          - "표면 4개 미만 또는 연결 없음"
          - "최종 영향 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — IoT 침투 보고: OWASP 커버·영향·권고

      전체 침투를 **IoT 침투 보고서**로 정리한다: OWASP IoT Top 10 커버리지, 심각도, 최종 영향, 우선
      수정 권고.

      ### ✅ 합격 기준
      발견을 OWASP IoT Top 10에 커버 매핑하고 심각도·영향·우선 권고를 담은 종합 보고서를 작성한다.
    hint: "발견→OWASP IoT Top 10 커버리지+심각도+최종 영향+우선 수정 권고. IoT 침투 보고서."
    verify:
      type: "semantic"
      expect: "iot_pentest_report"
      semantic:
        intent: |
          IoT 침투 보고 — 발견을 표준 커버·심각도·권고로 의사결정에 연결.
        success_criteria:
          - "발견을 OWASP IoT Top 10에 커버 매핑"
          - "심각도·최종 영향을 서술"
          - "우선 수정 권고를 제시"
        acceptable_methods:
          - "OWASP 커버 + 심각도 + 권고"
        negative_signs:
          - "커버·권고 없이 나열만"

# ───────────────────────── BLUE (Security by Design 종합 방어 프로그램) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 방어 아키텍처 (4대 표면 + 생태계)

      RED 전체 침투에 대응하는 **엔드투엔드 종합 방어 아키텍처**를 설계한다.

      ### 무엇을
      - **Device**: 하드웨어 보호·보안 부팅·비밀 제거.
      - **Network**: 프로토콜 인증·암호·분리·무선 보안.
      - **Cloud**: API 인증·최소 권한·데이터 보호.
      - **App**: 입력 검증·인증·CSRF.
      - **생태계**: 마이크로세분화·최소 신뢰·허브 SPOF 완화, 각 방어를 RED 킬체인·OWASP IoT에 매핑.

      ### ✅ 합격 기준
      4대 표면+생태계 방어를 아우르는 엔드투엔드 아키텍처를 RED 킬체인·OWASP IoT에 매핑해 설계한다.
    hint: "Device(하드웨어·보안 부팅)·Network(인증·암호·분리)·Cloud(API 인증)·App(입력 검증)+생태계(마이크로세분화·SPOF 완화). RED 킬체인·OWASP 매핑."
    verify:
      type: "semantic"
      expect: "iot_defense_arch"
      semantic:
        intent: |
          IoT 종합 방어 아키텍처 — 4대 표면·생태계 방어를 엔드투엔드로 종합하고 RED·OWASP에 매핑.
        success_criteria:
          - "4대 표면(device·network·cloud·app) 방어를 제시"
          - "생태계 분리·최소 신뢰·SPOF 완화를 제시"
          - "RED 킬체인·OWASP IoT에 매핑"
        acceptable_methods:
          - "표면별 방어 + 생태계 + 매핑"
        negative_signs:
          - "표면 일부만"
          - "생태계·매핑 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Security by Design 프로그램·수명주기·거버넌스

      아키텍처를 **실행 가능한 Security by Design 프로그램**으로 만든다.

      ### 무엇을
      - **Security by Design**: 기본 비밀번호 금지·안전한 업데이트·최소 표면·기본 암호화·안전 기본 설정.
      - **수명주기**: Secure SDLC·SBOM·공급망·자동 업데이트·EOL.
      - **운영·프라이버시**: 모니터링·인시던트 대응·데이터 최소화·프라이버시 보호.
      - **표준·거버넌스**: OWASP IoT·ETSI EN 303 645·NIST 준수, 정기 감사·인증.

      ### ✅ 합격 기준
      Security by Design·수명주기·운영/프라이버시·표준 거버넌스를 갖춘 프로그램을 제시하고 "설계부터
      EOL까지 보안·프라이버시 내재화" 원칙을 설명한다.
    hint: "Security by Design+Secure SDLC·SBOM·자동 업데이트·EOL+모니터링·IR·프라이버시+표준(OWASP·ETSI·NIST)·감사. '설계부터 EOL까지 내재화' 원칙."
    verify:
      type: "semantic"
      expect: "iot_security_program"
      semantic:
        intent: |
          IoT Security by Design 프로그램 — 아키텍처를 설계 원칙·수명주기·운영·거버넌스의 실행 프로그램으로
          종합. 학기 전체 종합.
        success_criteria:
          - "Security by Design 원칙을 제시"
          - "수명주기(Secure SDLC·SBOM·자동 업데이트·EOL)를 제시"
          - "운영/프라이버시와 표준(OWASP·ETSI·NIST)·거버넌스를 제시"
          - "(설명) '설계부터 EOL까지 보안·프라이버시 내재화' 원칙 설명"
        acceptable_methods:
          - "Security by Design + 수명주기 + 운영 + 거버넌스"
        negative_signs:
          - "일회성 방어만"
          - "수명주기·표준·프라이버시 언급 없음"
