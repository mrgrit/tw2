id: "secuops-w06"
category: "secuops"
title: "[보안운영 W6] 웹 다중공격(XSS·SQLi·LFI·RCE) vs ModSecurity/CRS 운영(anomaly score·audit 분석·예외)"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  보안운영 6주차 — 6v6-web 의 **Apache 2.4 + mod_security2 + OWASP CRS 3.3.2** 를 운영 관점으로
  해부한다. Suricata(W04-W05)의 passive sniff 와 달리 ModSec 은 **inline + 차단** 이다. 외부
  공격자가 XSS·SQLi·LFI·RCE 다중 공격을 보내면, 운영자는 ① 정책 본체(SecRuleEngine 3모드·5 phase),
  ② **anomaly score 누적**(CRITICAL=5 누적 → inbound threshold 도달 시 949110 block), ③ audit log
  JSON(`audit_data.messages[]`)에서 매칭 룰 ID 추출, ④ 오탐 **예외/튜닝 룰** 을 좁은 범위로 작성한다.

  ▸ 모드: solo(외부 공격자→WAF 운영자) / duel(상대 공격→본인 WAF). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** — 외부 명령 미수집 → 대상 WAF audit·SIEM 흔적으로 채점.
  ▸ anomaly scoring: XSS `<script>alert(1)</script>` = 941100+941110+941160(CRITICAL ×3)= score 15
    → 949110 inbound block + 980130 correlation. 커스텀 룰/예외의 증거는 audit 의 고유 msg 마커(EDU …).

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 반사형 XSS (anomaly score 유발)

      대상 웹앱 입력에 `<script>alert(1)</script>` 류 XSS 를 주입한다. CRS 941 계열(XSS)의 CRITICAL
      룰 여러 개가 매치돼 anomaly score 가 누적되고, threshold 도달 시 차단된다.

      ### 권장 명령 (참고 — 외부 공격자: 공개 진입점 + Host 헤더)
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?q=%3Cscript%3Ealert(1)%3C/script%3E"
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF(ModSecurity) audit 의 XSS(941) 탐지.
      ✅ 합격: 대상 WAF audit 에 XSS 탐지 흔적.
    hint: "attacker-ext 에서 <script> XSS. 채점: 대상 ModSecurity audit 의 XSS(941) 탐지."
    verify:
      type: "log_contains"
      expect: "XSS"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "XSS", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1059.007 / OWASP A03 — 반사형 XSS. 외부 공격자 모델 → 대상 ModSecurity audit(941 XSS)·anomaly 누적으로 판정(command_ran(attacker-ext) 불신뢰)."
        success_criteria: ["대상 ModSecurity audit 에 XSS(941) 탐지(최근)", "(설명) 어떤 파라미터에 어떤 스크립트를 주입했는지 서술"]
        acceptable_methods: ["attacker-ext 에서 curl 로 인코딩된 <script> XSS", "이벤트 핸들러(onerror=) 변형(대안)"]
        negative_signs: ["대상 WAF audit 에 흔적 없음(미도달)", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — SQLi(UNION) + LFI 다중 공격 (anomaly block 유발)

      UNION 기반 SQLi(942 libinjection 매치)와 경로탐색/LFI(`../../etc/passwd`)를 함께 보내 anomaly
      score 를 끌어올린다. CRS 942/930 계열이 매치되며 threshold 도달 시 949110 으로 차단된다.

      ### 권장 명령 (참고)
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=1%20UNION%20SELECT%20user,password%20FROM%20users"
      curl -s -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?file=..%2f..%2f..%2fetc%2fpasswd"
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF audit 의 SQLi(942) 탐지 또는 anomaly 차단.
      ✅ 합격: 대상 WAF audit 에 SQLi(942) 탐지 또는 anomaly 차단 흔적.
    hint: "attacker-ext 에서 UNION SQLi + LFI. 채점: 대상 ModSecurity audit 의 942/anomaly."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
        - { id: "red-2-2", type: "log_contains", target: "web", params: { log: "modsec", pattern: "Anomaly Score Exceeded", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1190 + T1083 — UNION SQLi + LFI. 외부 공격자 모델 → 대상 WAF audit(942 libinjection / 949110 anomaly block)로 판정. 둘 중 하나라도 탐지면 인정."
        success_criteria: ["대상 ModSecurity audit 에 942(SQLi) 매치 또는 Anomaly Score Exceeded(차단)(최근)", "(설명) 어떤 SQLi/LFI 페이로드를 보냈는지 서술"]
        acceptable_methods: ["attacker-ext 에서 UNION SQLi + 인코딩 LFI", "sqlmap --technique=U(대안)"]
        negative_signs: ["대상 WAF audit 에 흔적 없음", "command_ran(attacker-ext) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — 정책 본체 점검 (SecRuleEngine 차단모드 + CRS + JSON audit)

      운영 인수 첫 점검. ModSec 이 **차단(On)** 인지(DetectionOnly 면 로그만), CRS 3.3.2 가 로드됐는지,
      audit format 이 **JSON**(Wazuh decoder 호환)인지 확인한다. production WAF 의 minimum bar.

      ### 점검 포인트
      - `SecRuleEngine On`(차단) / `SecRequestBodyAccess On` / `SecAuditLogFormat JSON`
      - CRS 30+ 룰 파일, 941(XSS)/942(SQLi)/949(anomaly)/980(correlation)

      📌 채점: web 의 modsecurity.conf 가 차단 모드(SecRuleEngine On)인지.
      ✅ 합격: modsecurity.conf 에 SecRuleEngine On.
    hint: "web 의 /etc/modsecurity/modsecurity.conf 에 SecRuleEngine On 확인 + JSON audit format."
    verify:
      type: "file_contains"
      expect: "SecRuleEngine On"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web", params: { path: "/etc/modsecurity/modsecurity.conf", pattern: "SecRuleEngine On" } }
      semantic:
        intent: "정책 본체 점검 — On(차단) vs DetectionOnly(로그만), JSON audit(Wazuh 호환), CRS 로드. production minimum bar."
        success_criteria: ["modsecurity.conf 에 SecRuleEngine On", "(설명) On/DetectionOnly/Off 3모드 + JSON audit 의미 서술"]
        acceptable_methods: ["file_contains modsecurity.conf / waf-gui 정책 화면", "apache2ctl -M | grep security2"]
        negative_signs: ["DetectionOnly 인데 차단으로 오해", "audit format 이 JSON 아님(Wazuh decoder 부적합)"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — anomaly score 누적 → 949110 inbound block 추적

      이번 주 핵심 — CRS 는 단일 룰이 아니라 **anomaly score 누적** 으로 차단을 결정한다. XSS
      `<script>alert(1)</script>` 는 941100+941110+941160(CRITICAL=5 ×3)= **score 15** → inbound
      threshold(기본 5) 초과 → **949110** 으로 차단되고 audit 에 `Inbound Anomaly Score Exceeded`
      가 기록된다. 공격을 재현해 이 누적·차단 흐름을 audit 에서 확인한다.

      📌 채점: web modsec audit 에 anomaly 차단(949110 / Anomaly Score Exceeded) 흔적.
      ✅ 합격: audit 에 anomaly score 초과 차단 흔적이 있다.
    hint: "XSS/SQLi 재현 → audit 에서 949110 'Inbound Anomaly Score Exceeded' 확인. 누적 점수 메커니즘."
    verify:
      type: "log_contains"
      expect: "949110"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "949110", since_sec: 1800 } }
      semantic:
        intent: "anomaly scoring 수학 — CRITICAL=5/ERROR=4/WARNING=3 누적 → threshold 도달 시 949110 block. 단일 룰이 아닌 누적 결정 메커니즘 이해."
        success_criteria: ["audit 에 949110 / Inbound Anomaly Score Exceeded(최근)", "(설명) XSS=15(941100+941110+941160) 누적 → block 흐름 서술", "(설명) threshold(inbound 5) 정책 의미"]
        acceptable_methods: ["공격 재현 후 audit 의 949110 확인", "audit_data.messages[] 에서 누적 룰 추출"]
        negative_signs: ["단일 룰 차단으로 오해(누적 메커니즘 미이해)", "audit 미확인"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-3 — 5공격 차단 검증 + audit 에서 매칭 룰 ID 추출

      XSS/SQLi/LFI/RCE/PHP 다중 공격을 재현하고, audit log JSON 의 `audit_data.messages[]`(embedded
      metadata 단일 string 배열)에서 **각 공격이 어떤 CRS 룰 ID 에 걸렸는지** 추출한다. 예: SQLi(UNION)
      → **942100**(libinjection). 이는 IR 의 source of truth.

      ### 참고 (jq 추출)
      ```bash
      # messages[] 에서 id/msg 패턴 추출 (운영자 IR 절차)
      ```
      📌 채점: web modsec audit 에 SQLi 매칭 룰(942100) 흔적.
      ✅ 합격: audit 에 942100(SQLi libinjection) 등 매칭 룰 ID 가 확인된다.
    hint: "5공격 재현 → audit messages[] 에서 매칭 룰 ID 추출. SQLi=942100."
    verify:
      type: "log_contains"
      expect: "942100"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "audit log JSON IR — messages[] 가 IR 의 source of truth. 공격마다 매칭 룰 ID 추출(942 SQLi / 941 XSS / 930 LFI 등)."
        success_criteria: ["audit 에 942100(또는 다른 매칭 CRS 룰 ID)(최근)", "(설명) audit_data.messages[] 구조와 룰 ID 추출 방법 서술", "(설명) 5공격별 매칭 룰 분류"]
        acceptable_methods: ["5공격 재현 후 audit jq 파싱", "log_contains 942100/941xxx 등"]
        negative_signs: ["audit 구조 미이해(messages[] 파싱 실패)", "재현·확인 누락"]

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — 오탐 예외/튜닝 룰을 좁은 범위로 작성 (EDU 마커)

      운영에서 정상 트래픽이 CRS 에 걸리는 **오탐(false-positive)** 은 불가피하다. 전체 룰을 끄지 말고
      **좁은 범위** 로 예외/튜닝한다(`<LocationMatch>` + `SecRuleRemoveById`, 또는 특정 파라미터만
      `SecRuleUpdateTargetById`). 검증을 위해 고유 msg 마커 `EDU tune` 를 단 커스텀 탐지룰을 함께
      넣어 audit 에 본인 룰 동작이 기록되게 한다.

      ### 권장 형태 (참고 — 좁은 예외 + EDU 마커 검증룰)
      ```
      # 예외: 특정 경로의 942100 오탐만 제거 (전체 비활성화 금지)
      <LocationMatch "^/report/upload">
        SecRuleRemoveById 942100
      </LocationMatch>
      # 검증용 커스텀 탐지룰(고유 마커)
      SecRule ARGS "@contains edu_probe_xyz" "id:9006004,phase:2,pass,log,msg:'EDU tune marker'"
      ```
      적용 후 그 패턴으로 접속하면 audit 에 `EDU tune` 가 남는다.

      📌 채점: web modsec audit 에 `EDU tune` 마커(본인 커스텀 룰 동작).
      ✅ 합격: audit 에 EDU tune 마커가 기록된다(좁은 예외 + 검증룰 적용).
    hint: "LocationMatch+SecRuleRemoveById 로 좁은 예외 + msg:'EDU tune' 검증룰 → 패턴 접속 → audit 에 EDU tune."
    verify:
      type: "log_contains"
      expect: "EDU tune"
      checks:
        - { id: "blue-4-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "EDU tune", since_sec: 1800 } }
      semantic:
        intent: "MITRE D3FEND — FP 예외를 좁은 범위로(룰 전체 비활성화 금지). LocationMatch/RemoveById/UpdateTargetById 3패턴 + 검증 마커."
        success_criteria: ["audit 에 'EDU tune' 마커(최근)", "(설명) 예외를 좁게 한정한 방법(LocationMatch/특정 파라미터) 서술", "(설명) 전체 비활성화의 위험"]
        acceptable_methods: ["좁은 예외(LocationMatch+RemoveById) + EDU 마커 검증룰 → 패턴 접속으로 확인"]
        negative_signs: ["룰 전체 비활성화(과도한 예외)", "EDU tune audit 미확인"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 10
    instruction: |
      ## 🛡️ BLUE-5 — WAF audit 가 Wazuh(SIEM)로 수렴하는지 검증

      ModSec audit(JSON)가 Wazuh decoder 로 파싱돼 SIEM 에 모이는지 확인한다(W10 의 통합 관제 예고).
      JSON audit format 이 핵심 — Wazuh 가 룰 ID·anomaly score 를 구조적으로 인덱싱한다.

      📌 채점: 본인 SIEM 에 최근 웹/공격 관련 경보가 수집됐는지.
      ✅ 합격: 본인 SIEM 에 웹공격/WAF 관련 경보가 있다.
    hint: "본인 Wazuh 에서 WAF/웹공격 경보 수집 확인(중앙 SIEM 탭에서도 보임)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — ModSec audit(JSON)가 Wazuh 로 수렴. JSON format 이 구조적 인덱싱의 전제."
        success_criteria: ["본인 Wazuh 에 최근 웹공격/WAF 관련 경보", "(설명) JSON audit → Wazuh decoder 수집 흐름 서술"]
        acceptable_methods: ["siem 에서 wazuh_alert / 중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음", "audit format 이 JSON 아니라 decoder 미작동"]
