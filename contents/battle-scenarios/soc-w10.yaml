id: "soc-w10"
category: "soc"
title: "[SOC관제 W10] 웹쉘 침해 — SQLi→웹쉘→콜백을 포렌식하고 헌팅해 끊어내기"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  인시던트 대응 실습(1) — **웹 공격**. 가장 흔한 웹 침해 시나리오를 끝까지 대응한다: 공격자가 SQLi로
  침투해 **웹쉘**을 심고 외부로 **콜백**을 연다. 대응자는 WAF audit·접근로그로 **침투 경로를 포렌식**
  하고, 웹쉘(콜백 리스너)을 **헌팅**하고, WAF/IDS로 출발지를 **격리**하고, 웹쉘을 **제거**해 서비스를
  복구한다.

  ▸ 모드: solo(공격자→웹 IR) / duel(상대 웹 침해→본인 IR). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Red 채점은 대상 WAF audit(태그) / 호스트 콜백 포트로. 웹쉘 콜백 마커 **포트 47474**,
    격리 차단룰 Suricata **sid 9510001**. 웹공격 태그 **`wb10r1-<id>`**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — SQLi 침투 (포렌식 시작점)

      ### 상황
      UNION SQLi로 DB 정보를 끌어내며 침투한다. WAF audit에 침투 경로의 명확한 흔적을 남긴다(대응자의
      포렌식 시작점).

      ### 할 일
      이 미션 전용 태그 `wb10r1-<id>`를 붙여 UNION SQLi를 보낸다.
      ```bash
      curl -s -H "Host: dvwa.el34.lab" \
        "http://{{WEB_ENTRY}}/?id=wb10r1-kim-1%20UNION%20SELECT%20user,password%20FROM%20users"
      ```

      ### 채점 방법
      대상 WAF audit에 (wb10r1 태그 포함) SQLi(942) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 wb10r1 태그가 포함된 SQLi 탐지가 남는다.
    hint: "태그(wb10r1) UNION SQLi. 채점: 대상 modsec audit의 942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "wb10r1", since_sec: 1800 } }
      semantic:
        intent: "T1190 — SQLi 침투. 대응자 포렌식의 시작점. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (wb10r1 태그 포함) SQLi(942) 탐지"
          - "침투 경로(파라미터/페이로드) 서술"
        acceptable_methods:
          - "외부 공격자 VM({{ATTACKER_IP}})에서 태그 붙인 UNION SQLi"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 웹쉘 콜백 (포트 47474)

      ### 상황
      침투 후 웹쉘/리버스 콜백으로 발판을 만든다(콜백 리스너 포트 **47474**). 대응자의 웹쉘 헌팅 표적이다.

      ### 할 일
      대상 호스트에 콜백 리스너 포트 47474를 연다.
      ```bash
      nohup ncat -lk 47474 >/dev/null 2>&1 &
      ```

      ### 채점 방법
      대상 호스트에서 포트 47474가 listening인지로 채점.

      ### 합격 기준
      대상 호스트에서 포트 47474가 listening이다.
    hint: "ncat -lk 47474 (웹쉘 콜백). 채점: port_listening 47474."
    verify:
      type: "port_listening"
      expect: "47474"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 47474 } }
      semantic:
        intent: "T1505.003 — 웹쉘/콜백 발판. 대응자의 헌팅 표적."
        success_criteria:
          - "포트 47474 listening"
          - "웹쉘 발판 기법 서술"
        acceptable_methods:
          - "ncat 리스너 / 웹쉘 업로드 모사"
        negative_signs:
          - "발판 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [Identify] — 웹 로그 포렌식 (침투 경로 복원)

      ### 상황
      WAF audit·접근로그를 포렌식해 침투 경로를 복원한다. 어떤 파라미터에 어떤 SQLi 페이로드가 들어왔고,
      응답 코드/데이터 추출 정황은 무엇인지 판정한다.

      ### 할 일
      WAF audit에서 침투 경로(파라미터/페이로드/응답/타임라인)를 복원한다.

      ### 채점 방법
      본인 web modsec audit에 침투 흔적(942)이 있는지 + 포렌식(제출)으로 채점.

      ### 합격 기준
      본인 WAF audit에 SQLi(942) 탐지가 있다.
    hint: "WAF audit+접근로그로 침투 경로 복원. 채점: log_contains web modsec 942100."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "blue-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "웹 포렌식 — audit/접근로그로 침투 경로(파라미터/페이로드/응답) 복원. 사고의 전말 파악."
        success_criteria:
          - "침투 흔적 확인"
          - "파라미터+페이로드+응답코드+추출 정황 복원"
          - "침투 시점 타임라인"
        acceptable_methods:
          - "modsec audit + 접근로그 포렌식"
        negative_signs:
          - "경로 복원 없이 경보만 확인"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [Hunt] — 웹쉘 헌팅 (콜백 리스너 + 프로세스)

      ### 상황
      웹쉘 발판을 헌팅한다. 비표준 리스너(47474)와 그 프로세스, 최근 생성된 의심 파일(webroot)을 찾아
      발판의 정체를 규명한다.

      ### 할 일
      비표준 리스너(47474)와 그 프로세스를 상관해 웹쉘 발판을 규명한다.

      ### 채점 방법
      대상 호스트에 웹쉘 콜백 리스너(47474)가 탐지되는지로 채점.

      ### 합격 기준
      포트 47474가 listening이며 프로세스까지 상관했다.
    hint: "listening_ports JOIN processes로 47474 + webroot 의심파일 헌팅. 채점: port_listening 47474."
    verify:
      type: "port_listening"
      expect: "47474"
      checks:
        - { id: "blue-2-1", type: "port_listening", target: "web", params: { port: 47474 } }
      semantic:
        intent: "웹쉘 헌팅 — 비표준 리스너+프로세스+webroot 의심파일 상관으로 발판 규명. 채점 핵심은 발견+상관(특정 도구 실행 증거 비요구)."
        success_criteria:
          - "콜백 리스너 47474 + 프로세스 상관"
          - "webroot의 최근 생성/수정 파일 점검"
          - "웹쉘 정체 규명"
        acceptable_methods:
          - "ss/osquery로 포트+프로세스, find로 webroot 의심파일(도구보다 발견이 핵심)"
        negative_signs:
          - "포트만, 프로세스/파일 상관 누락"

  - order: 3
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [Contain] — 출발지/도구 격리 (sid 9510001)

      ### 상황
      추가 피해를 막기 위해 공격 출발지/도구를 격리한다. Suricata `local.rules`에 차단(drop)룰
      (**sid 9510001**)을 작성한다.

      ### 할 일
      ```
      drop http any any -> any any (msg:"IR W10 contain webshell tool"; http.user_agent; content:"sqlmap"; nocase; sid:9510001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9510001 격리 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9510001 룰이 있다.
    hint: "local.rules에 차단룰(sid 9510001) → reload."
    verify:
      type: "file_contains"
      expect: "9510001"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9510001" } }
      semantic:
        intent: "IR Contain — 공격 출발지/도구 격리(drop). 증거 보존하며 추가 피해 차단."
        success_criteria:
          - "local.rules에 sid 9510001 차단룰"
          - "격리 범위 + 증거 보존 고려"
        acceptable_methods:
          - "local.rules drop 룰 + reload"
        negative_signs:
          - "증거 파괴 / 격리 과도"

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [Eradicate+Recover] — 웹쉘 제거 + 서비스 복구

      ### 상황
      웹쉘/콜백 발판을 제거하고(리스너 종료, 악성 파일 삭제, 침해 계정 정리) 웹 서비스를 정상 복구한다.

      ### 할 일
      웹쉘/리스너를 제거하고 apache를 정상 복구한다.

      ### 채점 방법
      web 서버(Apache)가 정상 가동 중인지로 채점.

      ### 합격 기준
      web의 apache2가 running이다.
    hint: "웹쉘/리스너 제거 + apache 복구. 채점: process_running web apache2."
    verify:
      type: "process_running"
      expect: "apache"
      checks:
        - { id: "blue-4-1", type: "process_running", target: "web", params: { name: "apache2" } }
      semantic:
        intent: "IR Eradicate+Recover — 웹쉘/발판 전수 제거 + 서비스 정상 복구."
        success_criteria:
          - "apache2 가동(복구)"
          - "웹쉘/리스너/악성파일/계정 전수 제거 서술"
          - "정상성 검증"
        acceptable_methods:
          - "발판 제거 + 서비스 복구"
        negative_signs:
          - "일부 발판 잔존 / 취약 상태 복구"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 [Report] — 웹 침해 IR 보고서

      ### 상황
      침투(SQLi)→발판(웹쉘)→대응의 전 과정을 타임라인으로 정리하고, 근본 원인(취약 파라미터)과 재발
      방지책(입력검증/WAF룰/패치)을 담은 IR 보고서를 작성한다.

      ### 할 일
      웹 침해 타임라인 + 근본 원인 + 재발 방지 보고서를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 보고서(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 보고서는 제출로 검증).
    hint: "웹 침해 타임라인+근본원인+재발방지 IR 보고서. 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "웹 IR 보고서 — 침투→웹쉘→대응 타임라인 + 근본 원인 + 재발 방지(입력검증/WAF/패치)."
        success_criteria:
          - "경보 수집 확인"
          - "타임라인 + 근본 원인(취약 파라미터) + 재발 방지"
          - "WAF룰/패치 권고"
        acceptable_methods:
          - "IR 보고서 작성"
        negative_signs:
          - "근본 원인 누락"
