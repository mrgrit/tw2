id: "agent-ir-adv-w08"
category: "agent-ir-adv"
title: "[에이전트IR고급 W8] 컨테이너·K8s 탈출 + API 악용 vs 클러스터 격리·탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 작은 결함(과특권 컨테이너·노출 K8s API)이 **클러스터 전체 장악**으로
  번지는 공격과 클러스터 격리·탐지를 다룬다.

  ▸ 채점 특성 — el34는 K8s 텔레메트리를 보유하지 않는다. **관측 채점은 대상(el34)에 남는 정찰·웹 공격
    흔적**으로 하고, 컨테이너/K8s 탈출은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(컨테이너 탈출 킬체인)와 Blue(클러스터 격리·탐지)를 모두 수행.
    • duel : Red 학생이 탈출·확산을 설계·정찰하고, Blue 학생은 격리·탐지로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰·웹 공격(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (컨테이너 탈출 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 컨테이너 진입 + 노출 표면 파악

      대상 웹 침투 시도(고유 태그)로 흔적을 남기고, **컨테이너 진입 후 탈출 표면**을 파악하는 단계를 설계한다.

      ### 무엇을
      - 진입: 웹 RCE로 컨테이너 셸 확보(개념).
      - **탈출 표면**: 과특권(privileged)·docker.sock 마운트·hostPath·능력(CAP_SYS_ADMIN)·노출 kubelet/API.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/?cmd=id"
      ```

      ### ✅ 합격 기준
      대상에 공격 흔적을 남기고, 컨테이너 진입→탈출 표면(과특권·docker.sock·hostPath·노출 API) 파악을 설계한다.
    hint: "웹 RCE 시도(태그)+컨테이너 진입→탈출 표면(privileged·docker.sock·hostPath·CAP·노출 kubelet/API) 파악. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-8-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          컨테이너 진입·탈출 표면 — 과특권·마운트·노출 API 등 탈출 경로 표면을 파악.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "컨테이너 진입→탈출 표면(과특권·docker.sock·hostPath·노출 API)을 설계"
          - "(설명) 작은 결함이 큰 영향으로 번짐을 언급"
        acceptable_methods:
          - "웹 흔적 + 탈출 표면 파악"
        negative_signs:
          - "탐지 흔적 없음"
          - "탈출 표면 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 탈출→클러스터 장악 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **컨테이너 탈출→노드→클러스터 장악** 킬체인을 설계한다.

      ### 무엇을
      - 탈출(docker.sock·hostPath로 노드 접근)→노드 자격/kubelet→API 서버·서비스 계정 토큰 탈취→클러스터 장악.
      - 과특권 서비스 계정·RBAC 오용으로 전역 확산.

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 탈출→노드→API→클러스터 장악 킬체인과 RBAC/토큰 오용을 설계한다.
    hint: "정찰(태그)+탈출(docker.sock/hostPath→노드)→kubelet/서비스 계정 토큰→API 서버→클러스터 장악·RBAC 오용. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-8-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          클러스터 장악 — 탈출에서 노드·API·토큰으로 전체를 장악하는 킬체인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "탈출→노드→API→클러스터 장악 킬체인을 설계"
          - "(설명) RBAC/서비스 계정 토큰 오용을 설명"
        acceptable_methods:
          - "활동 흔적 + 클러스터 장악 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (클러스터 격리·탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 컨테이너·K8s 위협 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **컨테이너/K8s 위협 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·침투 확인.
      - 컨테이너/K8s 신호(개념): 컨테이너 내 비정상 프로세스·마운트 접근·kubelet/API 비정상 호출·
        서비스 계정 토큰 사용·권한 상승 audit 이벤트.

      ### ✅ 합격 기준
      RED 공격을 탐지하고, 컨테이너/K8s 위협 신호(탈출 시도·API 남용·토큰 사용)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+컨테이너/K8s 신호(비정상 프로세스·마운트 접근·kubelet/API 남용·토큰 사용·audit 권한 상승) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-8-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          컨테이너·K8s 탐지 — 탈출 시도·API 남용·토큰 사용으로 클러스터 위협을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "컨테이너/K8s 위협 신호(탈출·API 남용·토큰)를 설계"
          - "(설명) 런타임 가시성의 중요성을 언급"
        acceptable_methods:
          - "SIEM 탐지 + K8s 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "K8s 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 클러스터 격리·하드닝 설계

      컨테이너 탈출·확산을 막는 **격리·하드닝**을 설계한다.

      ### 무엇을
      - **컨테이너 하드닝**: 비특권·읽기 전용 루트·능력 제거·seccomp/AppArmor, docker.sock 마운트 금지.
      - **K8s 하드닝**: 최소 RBAC·서비스 계정 토큰 최소화·Pod Security·NetworkPolicy 분리·API 인증.
      - **런타임 보호**: 런타임 탐지(탈출·비정상 프로세스)·자동 격리(admission 통제).
      - **최소 권한**: 노드/네임스페이스 분리로 폭발 반경 축소.

      ### ✅ 합격 기준
      컨테이너·K8s 하드닝·런타임 보호·분리를 제시하고 "작은 결함이 클러스터 전체가 되지 않게" 원칙을 설명한다.
    hint: "비특권·읽기 전용·seccomp/AppArmor·docker.sock 금지+최소 RBAC·토큰 최소화·Pod Security·NetworkPolicy+런타임 탐지·admission+분리. '작은 결함≠전체' 원칙."
    verify:
      type: "semantic"
      expect: "cluster_hardening"
      semantic:
        intent: |
          클러스터 격리·하드닝 — 컨테이너·K8s 하드닝·런타임 보호·분리로 탈출·확산을 막는다.
        success_criteria:
          - "컨테이너 하드닝(비특권·seccomp·docker.sock 금지)을 제시"
          - "K8s 하드닝(최소 RBAC·토큰 최소화·NetworkPolicy)을 제시"
          - "런타임 보호·분리를 제시하고 원칙 설명"
        acceptable_methods:
          - "컨테이너 + K8s 하드닝 + 런타임 + 분리"
        negative_signs:
          - "과특권 유지"
          - "RBAC/런타임 보호 없음"
