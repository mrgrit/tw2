id: "autonomous-systems-w03"
category: "autonomous-systems"
title: "[자율시스템 W3] 드론 하이재킹: Deauth·MAVLink 인젝션 vs 링크 방어·탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  드론 해킹 공방전 — **Deauth(연결 해제)·MAVLink 명령 인젝션·하이재킹**의 공격 경로와 방어를 설계·
  분석한다. 실물 드론·RF가 필요하므로 **설계·서술형**이다(결정론 시뮬 + GPU 분석, semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(하이재킹 경로)와 Blue(링크 방어·탐지)를 모두 수행.
    • duel : Red 학생이 하이재킹 경로를 제시하고, Blue 학생이 방어·탐지로 대응.

  ▸ 채점(중요)
    실물이 없으므로 **보고서의 설계 품질**로 채점 — Deauth→제어 상실→MAVLink 인젝션→하이재킹의 사이버→
    물리 경로 구체성, 링크 방어(서명·인증)·탐지(RF/프로토콜 이상)의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 실제 드론 공격은 실물·법적 인가·안전 필요. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (드론 하이재킹 경로 설계) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — Deauth→제어 상실→MAVLink 인젝션 하이재킹 경로

      WiFi 제어 드론을 대상으로 **Deauth로 정규 조종을 끊고, MAVLink 인젝션으로 제어를 탈취**하는
      경로를 단계별로 설계한다.

      ### 무엇을 (단계별)
      1) **Deauth**: 802.11 deauth 프레임으로 GCS↔드론 WiFi 연결 해제(정규 조종 상실).
      2) **접속 탈취**: 드론 AP에 재접속·세션 탈취(개방/약한 인증 악용).
      3) **MAVLink 인젝션**: 위조 MAVLink 명령(모드 변경·항로점·착륙/무장) 주입으로 제어 탈취.
      4) **물리 결과**: 하이재킹→이탈·추락·탈취.

      ### ✅ 합격 기준
      Deauth→접속 탈취→MAVLink 인젝션→물리 결과의 하이재킹 경로를 단계별로 구체적(프로토콜·프레임·
      명령 명시)으로 설계한다.
    hint: "Deauth(802.11)→AP 재접속·세션 탈취→위조 MAVLink 명령(모드/항로점/착륙) 인젝션→하이재킹. 단계별 프로토콜·명령 명시."
    verify:
      type: "semantic"
      expect: "drone_hijack_path"
      semantic:
        intent: |
          드론 하이재킹 경로 — Deauth·MAVLink 인젝션을 연결해 사이버→물리 제어 탈취를 구체 기법으로 구성.
        success_criteria:
          - "Deauth(802.11 프레임)로 정규 제어 상실을 유도"
          - "접속 탈취·MAVLink 위조 명령 인젝션을 구체적으로 설계"
          - "하이재킹이 물리 결과(이탈·추락·탈취)로 이어짐을 서술"
        acceptable_methods:
          - "Deauth→세션 탈취→MAVLink 인젝션→물리 경로"
        negative_signs:
          - "기법 불명·프로토콜 미명시"
          - "물리 결과 없이 사이버만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — MAVLink 프로토콜 취약 분석

      MAVLink 프로토콜 자체의 취약(무서명·평문·재전송·인증 부재)을 분석하고, 인젝션/스푸핑이 왜
      가능한지 프로토콜 수준에서 설명한다.

      ### ✅ 합격 기준
      MAVLink의 무서명·평문·인증 부재를 지적하고, 그로 인해 명령 인젝션·텔레메트리 스푸핑·재전송이
      가능함을 프로토콜 수준으로 설명한다.
    hint: "MAVLink 무서명·평문·인증 부재·시퀀스 취약 → 명령 인젝션·텔레메트리 스푸핑·재전송 가능. 프로토콜 수준 분석."
    verify:
      type: "semantic"
      expect: "mavlink_protocol"
      semantic:
        intent: |
          MAVLink 프로토콜 취약 — 무서명·평문·인증 부재가 인젝션/스푸핑을 허용함을 프로토콜 수준으로 이해.
        success_criteria:
          - "MAVLink 무서명·평문·인증/무결성 부재를 지적"
          - "명령 인젝션·텔레메트리 스푸핑·재전송 가능성을 프로토콜 수준으로 설명"
          - "(설명) 프로토콜 설계가 보안을 전제하지 않음을 언급"
        acceptable_methods:
          - "프로토콜 취약(무서명·평문·재전송) 분석"
        negative_signs:
          - "프로토콜 근거 없이 '인젝션 가능'만"

# ───────────────────────── BLUE (링크 방어·탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 드론 하이재킹 탐지 설계

      Deauth·MAVLink 인젝션·하이재킹을 **탐지**하는 방안을 설계한다(사이버+물리 신호).

      ### 무엇을
      - **RF/무선 탐지**: Deauth flood 탐지, 비정상 AP·재접속·신호 이상.
      - **프로토콜 탐지**: 무서명/시퀀스 이상 MAVLink, 출처 불일치 명령, 급격한 모드/항로 변경.
      - **물리 정합성**: 명령과 실제 기동 불일치·물리적으로 불가능한 상태 변화.

      ### ✅ 합격 기준
      RED 하이재킹에 대응하는 RF·프로토콜·물리 탐지 신호를 구체적으로 제시하고 교차 검증을 설계한다.
    hint: "Deauth flood 탐지+MAVLink 무서명/시퀀스/출처 이상+물리 정합성(명령 vs 기동). 교차 검증."
    verify:
      type: "semantic"
      expect: "drone_detection"
      semantic:
        intent: |
          드론 하이재킹 탐지 — RF·프로토콜·물리 신호와 정합성으로 공격을 탐지.
        success_criteria:
          - "RF 탐지(Deauth flood·비정상 재접속)를 제시"
          - "프로토콜 탐지(무서명·시퀀스·출처 이상 MAVLink)를 제시"
          - "물리 정합성(명령 vs 실제 기동) 교차 검증을 제시"
        acceptable_methods:
          - "RF + 프로토콜 + 물리 정합성 탐지"
        negative_signs:
          - "탐지 신호 막연"
          - "사이버 또는 물리 한쪽만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 링크 방어·안전 우선 심층 방어

      하이재킹을 막는 **링크 방어와 안전 우선 심층 방어**를 설계한다.

      ### 무엇을
      - **링크 보안**: MAVLink 서명·암호화, 강한 WiFi 인증(Deauth 완화: PMF/802.11w), 명령 출처 인증.
      - **독립 안전 계층**: 하이재킹돼도 지오펜스·RTL·안전 착륙이 통신과 독립적으로 강제.
      - **다중 링크·중복성**: 링크 이중화·이상 시 안전 모드 전환.

      ### ✅ 합격 기준
      MAVLink 서명·PMF·출처 인증 등 링크 방어와 독립 안전 계층(지오펜스·RTL)을 제시하고 "하이재킹돼도
      물리 안전" 원칙을 설명한다.
    hint: "MAVLink 서명·암호+PMF(802.11w, Deauth 완화)·출처 인증 + 독립 안전 계층(지오펜스·RTL). '하이재킹돼도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "link_defense"
      semantic:
        intent: |
          링크 방어·안전 우선 — 링크 보안과 독립 안전 계층으로 하이재킹을 막고 물리 안전을 보장.
        success_criteria:
          - "링크 보안(MAVLink 서명·암호·PMF·출처 인증)을 제시"
          - "독립 안전 계층(지오펜스·RTL·안전 착륙, 통신 독립)을 제시"
          - "다중 링크·중복성·안전 모드를 제시"
          - "(설명) '하이재킹돼도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "링크 보안 + 독립 안전 계층 + 중복성"
        negative_signs:
          - "독립 안전 계층 없음"
          - "링크 보안만·물리 안전 없음"
