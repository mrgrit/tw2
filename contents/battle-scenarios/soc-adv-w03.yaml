id: "soc-adv-w03"
category: "soc-adv"
title: "[SOC고급 W3] SIGMA 탐지 엔지니어링 — C2·권한상승 vs 벤더독립 룰 변환"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  SOC 고급과정 3주차 — **SIGMA**. SIGMA 는 "벤더 독립적"으로 탐지 로직을 기술하는 언어다. 한 번 SIGMA 로
  쓰면 Wazuh·Suricata·Splunk 등 어디로든 변환된다. 이번 공방전에서 공격자는 **C2 비표준 포트 비콘**과
  **Linux SUID 권한상승**을 시도하고, 관제팀(너)은 그 위협을 **SIGMA 로 기술한 뒤 Wazuh 와 Suricata 양쪽으로
  변환**해 멀티 플랫폼 탐지를 만든다.

  ▸ 이야기
    공격자가 대상 호스트에 알려진 C2 포트(**54003**) 리스너를 열고, SUID 루트 백도어 바이너리를 심어 권한
    상승 발판을 만든다. 관제팀은 ① C2 포트 SIGMA → Wazuh 변환, ② 같은 SIGMA → Suricata 변환(네트워크 계층),
    ③ SUID 권한상승 탐지룰을 만들고, ④ ATT&CK 커버리지·falsepositives 를 설계하고, ⑤ 종합 보고·변환 호환성을 정리한다.

  ▸ 모드
    • solo : 공격(자기 인프라 표적) + 관제를 한 학생이. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라를 외부 공격, Blue 는 자기 인프라에서 SIGMA 탐지 적용.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    C2 리스너 포트 **54003**, SUID 백도어 **`/tmp/.sa03suid`**, 백도어 계정 **`soca03`**,
    Wazuh 룰 **id 102031**(C2 포트), **102032**(SUID 권한상승), Suricata 룰 **sid 9603031**(C2 포트). 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 [C2 비표준 포트] — 알려진 C2 포트 비콘 채널 열기

      ### 상황
      많은 C2 프레임워크는 비표준 포트(4444/5555/8888 등)를 쓴다. 너는 대상 호스트에 **C2 포트 54003** 리스너를
      열어 지휘통제 채널을 만든다. 이 포트가 열려 있으면 관제팀의 C2 포트 SIGMA 룰이 잡아야 한다.

      ### 할 일 (외부 공격자 VM(192.168.0.202) → 발판 후 호스트)
      ```bash
      nohup ncat -lk 54003 >/dev/null 2>&1 &    # ncat 없으면: nc -lk 54003 또는 python3 -m http.server 54003
      ```

      ### 채점 방법
      대상 호스트에 포트 54003 이 listening 인지로 채점한다.

      ### 합격 기준
      대상 호스트에서 포트 54003 이 listening 이다.
    hint: "포트 54003 리스너(ncat -lk 54003). 채점: port_listening 54003. C2 비표준 포트 SIGMA 의 표적."
    verify:
      type: "port_listening"
      expect: "54003"
      checks:
        - { id: "red-1-1", type: "port_listening", target: "web", params: { port: 54003 } }
      semantic:
        intent: "C2 채널(T1571 Non-Standard Port) — 알려진 비표준 C2 포트(54003) 리스너 개설. C2 포트 SIGMA 룰의 표적."
        success_criteria:
          - "포트 54003 listening"
          - "C2 비표준 포트 기법과 의도 서술"
        acceptable_methods:
          - "ncat/nc/python 리스너로 54003 개방"
        negative_signs:
          - "포트 미개방 / 다른 포트"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 [SUID 권한상승] — SUID 루트 백도어 심기

      ### 상황
      Linux 권한상승의 고전은 **SUID 비트**다. 너는 대상 호스트에 SUID 루트 셸 사본 **`/tmp/.sa03suid`** 을
      심어 언제든 루트로 올라설 발판을 만든다(보조로 계정 `soca03` 도 생성). 관제팀의 auditd/SUID 탐지룰이
      이걸 잡아야 한다.

      ### 할 일
      ```bash
      cp /bin/bash /tmp/.sa03suid && sudo chmod 4755 /tmp/.sa03suid
      sudo useradd -m -s /bin/bash soca03
      ```

      ### 채점 방법
      대상 호스트에 SUID 백도어 파일 `/tmp/.sa03suid` 가 있거나 `/etc/passwd` 에 `soca03` 이 있는지로 채점.

      ### 합격 기준
      `/tmp/.sa03suid` 파일이 존재하거나 `/etc/passwd` 에 `soca03` 이 있다.
    hint: "cp /bin/bash /tmp/.sa03suid + chmod 4755 + useradd soca03. 채점: file_exists /tmp/.sa03suid + file_contains passwd soca03."
    verify:
      type: "file_exists"
      expect: "/tmp/.sa03suid"
      checks:
        - { id: "red-2-1", type: "file_exists", target: "web", params: { path: "/tmp/.sa03suid" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "soca03" } }
      semantic:
        intent: "권한상승(T1548.001 SUID) + Persistence(T1136). SUID 루트 백도어 + 백도어 계정. Linux auditd/SUID 탐지룰의 표적."
        success_criteria:
          - "SUID 파일 /tmp/.sa03suid 또는 계정 soca03"
          - "SUID 권한상승 메커니즘 서술"
        acceptable_methods:
          - "cp+chmod 4755 SUID + useradd"
        negative_signs:
          - "SUID 비트 없음 / 흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 16
    instruction: |
      ## 🛡️ BLUE-1 [SIGMA → Wazuh] — C2 포트 탐지 (id 102031)

      ### 상황
      먼저 SIGMA 로 "C2 비표준 포트(54003) 연결" 탐지 로직을 **벤더 독립적으로** 기술하고, 그것을 Wazuh 룰
      (**id 102031**)로 변환해 적용한다.

      ### 할 일
      1) SIGMA 로직(개념, 보고서에 기술):
      ```yaml
      title: SOCADV-W03 Suspicious C2 Non-Standard Port
      status: test
      logsource: { category: network_connection }
      detection:
        selection: { DestinationPort: 54003 }
        condition: selection
      level: high
      tags: [attack.command_and_control, attack.t1571]
      ```
      2) Wazuh 변환 — `/var/ossec/etc/rules/local_rules.xml` 에 추가 후 재시작:
      ```xml
      <group name="edu,c2,">
        <rule id="102031" level="12">
          <if_group>edu</if_group>
          <match>54003</match>
          <description>SOCADV-W03 - C2 non-standard port 54003 (SIGMA-&gt;Wazuh)</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 102031 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 C2 포트(54003)를 보는 id 102031 룰이 존재한다.
    hint: "C2 포트 54003 SIGMA → Wazuh 룰(id 102031) 변환. 채점: file_contains local_rules.xml 102031."
    verify:
      type: "file_contains"
      expect: "102031"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "102031" } }
      semantic:
        intent: "SIGMA→Wazuh 변환 — 벤더 독립 SIGMA 로직(C2 포트 54003)을 Wazuh XML 룰로 매핑. detection.selection → match. T1571."
        success_criteria:
          - "local_rules.xml 에 rule id 102031"
          - "C2 포트(54003) 탐지 로직 + SIGMA 원본 logic 제시"
          - "SIGMA detection → Wazuh match 변환 주의점 서술"
        acceptable_methods:
          - "SIGMA 작성 + Wazuh 수동 변환 + restart"
        negative_signs:
          - "SIGMA 없이 즉흥 룰 / XML 오류"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 15
    instruction: |
      ## 🛡️ BLUE-2 [SIGMA → Suricata] — 같은 위협을 네트워크 계층에서 (sid 9603031)

      ### 상황
      SIGMA 의 힘은 **한 번 쓰고 여러 플랫폼으로 변환**하는 것이다. BLUE-1 의 C2 포트 SIGMA 를 이번엔
      **Suricata 룰(sid 9603031)** 로도 변환해 네트워크 계층에서도 같은 위협을 본다.

      ### 할 일
      `/etc/suricata/rules/local.rules` 에 추가 후 reload:
      ```
      alert tcp any any -> any 54003 (msg:"SOCADV-W03 C2 non-standard port 54003"; flow:to_server; sid:9603031; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9603031 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 포트 54003 행 트래픽을 보는 sid 9603031 룰이 존재한다.
    hint: "같은 C2 포트 SIGMA → Suricata 룰(sid 9603031, dest port 54003) 변환 → reload. 채점: file_contains local.rules 9603031."
    verify:
      type: "file_contains"
      expect: "9603031"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9603031" } }
      semantic:
        intent: "SIGMA→Suricata 변환 — 동일 탐지 로직을 네트워크 IDS 로도. 멀티 플랫폼 변환의 핵심(write once, deploy many)."
        success_criteria:
          - "local.rules 에 sid 9603031 (dest port 54003)"
          - "BLUE-1 과 동일 SIGMA 에서 변환했음을 서술"
          - "Wazuh(호스트) vs Suricata(네트워크) 관점 차이 설명"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "포트 불일치 / 문법 오류로 로딩 실패"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-3 [SUID 권한상승 탐지] — auditd 기반 Wazuh 룰 (id 102032)

      ### 상황
      RED-2 의 SUID 백도어를 잡는다. Linux 권한상승(SUID exploitation)을 탐지하는 Wazuh 룰(**id 102032**)을
      만든다(개념적으로는 auditd SIGMA 를 변환한 것).

      ### 할 일
      `local_rules.xml` 에 추가 후 재시작:
      ```xml
      <group name="edu,privesc,">
        <rule id="102032" level="12">
          <if_group>edu</if_group>
          <match>4755</match>
          <description>SOCADV-W03 - SUID privilege escalation artifact (Linux auditd)</description>
        </rule>
      </group>
      ```
      또한 호스트에서 SUID 백도어를 헌팅·제거한다:
      ```bash
      find /tmp -perm -4000 -type f 2>/dev/null    # SUID 파일 탐색
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 102032 룰이 있는지로 확인(+ SUID 헌팅·제거는 보고로 검증).

      ### 합격 기준
      `local_rules.xml` 에 SUID 권한상승을 보는 id 102032 룰이 존재한다.
    hint: "SUID 권한상승 Wazuh 룰(id 102032) + find /tmp -perm -4000 헌팅. 채점: file_contains local_rules.xml 102032."
    verify:
      type: "file_contains"
      expect: "102032"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "102032" } }
      semantic:
        intent: "SUID 권한상승 탐지(T1548.001) — auditd SIGMA → Wazuh 룰. RED-2 의 SUID 백도어 대응 + 호스트 SUID 헌팅."
        success_criteria:
          - "local_rules.xml 에 rule id 102032"
          - "SUID/권한상승 탐지 로직"
          - "find -perm -4000 등으로 SUID 백도어 헌팅·제거 서술"
        acceptable_methods:
          - "Wazuh 룰 작성 + SUID 헌팅 + restart"
        negative_signs:
          - "룰만 / 헌팅 없음 / XML 오류"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 [커버리지·오탐 설계] — ATT&CK 매핑 + falsepositives

      ### 상황
      성숙한 탐지 엔지니어링은 **무엇을 못 보는지**를 안다. 이번 주 만든 룰(102031 C2 / 9603031 C2 / 102032 SUID)을
      MITRE ATT&CK 에 매핑하고, 각 룰의 **falsepositives**(정상 관리 활동 등)와 필터 조건을 설계한다.

      ### 할 일
      보고서에:
      - ATT&CK 매핑: 102031/9603031 → T1571, 102032 → T1548.001 + 커버리지 공백(미탐 technique)
      - falsepositives: 각 룰의 오탐 시나리오 + 제외 필터(예: 정상 백업 SUID 도구, 허용 포트)
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 ATT&CK 매핑/falsepositives 로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ ATT&CK 매핑·falsepositives 설계는 제출로 검증).
    hint: "룰 ATT&CK 매핑(T1571/T1548.001) + 커버리지 공백 + 각 룰 falsepositives/필터 설계. 실증 증거(86601 등) 인용. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "커버리지·오탐 설계 — 룰 ATT&CK 매핑 + 미탐 공백 + SIGMA falsepositives 필드 활용. 분석형 — 실재 증거 인용 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "이번 주 룰의 ATT&CK technique 매핑 + 커버리지 공백"
          - "각 룰 falsepositives 시나리오 + 제외 필터"
        acceptable_methods:
          - "ATT&CK 표 + FP 분석"
        negative_signs:
          - "매핑/오탐 분석 없음"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 19
    instruction: |
      ## 🛡️ BLUE-5 [종합 보고·Cleanup] — 변환 호환성 + 테스트 + 위생

      ### 상황
      SIGMA 탐지 엔지니어링의 산출물이다. 룰셋 목록, **변환 호환성**(같은 SIGMA 가 Wazuh/Suricata 로 잘 변환됐나),
      테스트 방법(`wazuh-logtest`/`suricata -T`), 운영 가이드를 종합하고, R/B/P 회고 후 아티팩트를 **일괄 cleanup** 한다.

      ### 할 일
      - 변환 호환성: BLUE-1(Wazuh)·BLUE-2(Suricata)가 동일 로직임을 표로 비교
      - 테스트: `sudo suricata -T -S /etc/suricata/rules/local.rules` (문법) / `wazuh-logtest`
      - R/B/P 회고 + cleanup:
      ```bash
      rm -f /tmp/.sa03suid; sudo userdel -r soca03 2>/dev/null; sudo pkill -f 'ncat -lk 54003' 2>/dev/null
      sudo sed -i '/9603031/d' /etc/suricata/rules/local.rules && sudo suricatasc -c reload-rules
      # local_rules.xml 에서 102031/102032 블록 제거 후 wazuh-control restart
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 변환 호환성/테스트/회고/cleanup 으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 변환 호환성·테스트·회고·cleanup 은 제출로 검증).
    hint: "변환 호환성(Wazuh vs Suricata) 표 + suricata -T/wazuh-logtest 테스트 + R/B/P 회고 + 9603031/102031/102032/SUID/계정 일괄 cleanup. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "SIGMA 종합 — 룰셋 목록 + 변환 호환성(Wazuh/Suricata) + 테스트 절차 + 운영 가이드 + R/B/P 회고 + cleanup. Detection Engineering 보고서."
        success_criteria:
          - "최근 경보 수집 확인"
          - "변환 호환성 비교(동일 SIGMA → Wazuh/Suricata) + 테스트 절차"
          - "R/B/P 회고 + 아티팩트 일괄 cleanup"
