id: "secuops-w04"
category: "secuops"
title: "[보안운영 W4] 스캐너 공격 vs Suricata IDS 운영·룰 작성·탐지검증"
difficulty: "medium"
time_limit: 3000
battle_type: "1v1"
description: |
  보안운영 4주차 — IPS(Suricata)의 운영(데몬/설정/통계)과 탐지룰 작성을 실전으로 다룬다. 외부
  공격자가 스캐너(sqlmap)로 공격하면, 운영자는 Suricata 설정을 점검하고 스캐너 탐지룰을 작성·
  reload·트리거·검증한다(작성으로 끝내지 않고 실제 탐지까지 확인).

  ▸ 모드: solo(외부 공격자→IPS 운영자) / duel(상대 공격→본인 IPS 탐지). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(외부 공격자 VM {{ATTACKER_IP}})** — 외부 명령 미수집 → 대상 방어층/SIEM 흔적으로 채점.
  ▸ 커스텀 룰은 **/etc/suricata/rules/local.rules**, 교육용 sid 9004000+ 와 msg 'EDU ...' 표식.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 15
    instruction: |
      ## 🎯 RED-1 — 서비스 스캔 (IDS 탐지 유발)
      망 외부 공격자(외부 공격자 VM {{ATTACKER_IP}})로 대상 서비스를 스캔한다. Suricata 가 가장 먼저 잡는 정찰.
      ```bash
      nmap -sV -p 1-10000 {{WEB_ENTRY}} -T4 --max-retries 1
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 스캔 탐지. ✅ 합격: 대상 IPS 에 스캔 탐지.
    hint: "외부 공격자 VM({{ATTACKER_IP}}) nmap 스캔. 채점: 대상 Suricata 스캔 탐지."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1046 — IDS 탐지 유발 정찰. 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 스캔 탐지", "(설명) 식별 서비스 서술"]
        acceptable_methods: ["외부 공격자 VM({{ATTACKER_IP}}) nmap"]
        negative_signs: ["대상 미도달", "command_ran(외부 공격자 VM {{ATTACKER_IP}}) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — sqlmap 스캐너 공격 (탐지룰 표적)
      식별한 웹 서비스에 **sqlmap** 을 돌린다. sqlmap 은 User-Agent `sqlmap/...` 와 다량 페이로드를
      보내 방어층이 스캐너로 탐지하기 쉽다(BLUE-2 의 탐지룰 표적).
      ```bash
      sqlmap -u "http://{{WEB_ENTRY}}:8080/vulnerabilities/sqli/?id=1&Submit=Submit" \
             --cookie="security=low; PHPSESSID=test" --batch
      ```
      📌 채점: 외부 명령 미수집 → 대상 WAF(ModSecurity) audit 의 SQLi/스캐너 탐지.
      ✅ 합격: 대상 WAF audit 에 sqlmap/SQLi 탐지 흔적.
    hint: "외부 공격자 VM({{ATTACKER_IP}}) sqlmap. 채점: 대상 ModSecurity audit 의 SQLi/스캐너 탐지."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1190 + 자동화 — sqlmap 스캐너. 외부 공격자 모델 → 대상 WAF audit 의 SQLi/scanner 탐지로 판정."
        success_criteria: ["대상 ModSecurity audit 에 SQLi/스캐너 탐지(최근)", "(설명) sqlmap 기법 서술"]
        acceptable_methods: ["외부 공격자 VM({{ATTACKER_IP}}) sqlmap/nikto"]
        negative_signs: ["대상 WAF 흔적 없음", "command_ran(외부 공격자 VM {{ATTACKER_IP}}) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — Suricata 설정 핵심키 점검
      룰 작성 전, Suricata 설정(`/etc/suricata/suricata.yaml`)의 핵심(af-packet/rule-files/HOME_NET)이
      정상인지 점검한다. local.rules 가 rule-files 에 등록돼 있어야 커스텀 룰이 로딩된다.
      ✅ 합격: suricata.yaml 에 rule-files(또는 local.rules 등록)가 확인된다.
    hint: "본인 ips 의 suricata.yaml 에서 rule-files/local.rules 등록 확인."
    verify:
      type: "file_contains"
      expect: "rule-files"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/suricata.yaml", pattern: "rule-files" } }
      semantic:
        intent: "IPS 운영 — 룰 로딩 토대(rule-files/local.rules 등록) 점검."
        success_criteria: ["suricata.yaml 에 rule-files", "(설명) local.rules 가 로딩되는 경로 서술"]
        acceptable_methods: ["file_contains suricata.yaml rule-files", "ips-gui 구성 메뉴"]
        negative_signs: ["rule-files 미등록 → 커스텀 룰 미로딩"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — sqlmap 스캐너 탐지룰 작성 (sid 9004001)
      이번 주 핵심 — `http.user_agent` 에서 `sqlmap` 을 잡는 Suricata 룰을
      `/etc/suricata/rules/local.rules` 에 작성한다. **sid:9004001**, msg 에 'EDU' 포함.
      ```
      alert http any any -> any any (msg:"EDU sqlmap scanner"; flow:to_server; \
        http.user_agent; content:"sqlmap"; nocase; classtype:web-application-attack; sid:9004001; rev:1;)
      ```
      📌 채점: local.rules 에 sqlmap User-Agent 탐지 룰(본인 작성)이 있는지.
      ✅ 합격: local.rules 에 sqlmap 탐지 룰이 있다.
    hint: "local.rules 에 http.user_agent content:sqlmap 룰(sid 9004001) 작성."
    verify:
      type: "file_contains"
      expect: "sqlmap"
      checks:
        # 'sqlmap' 은 베이스 local.rules 에 없는 고유 content → 학생 작성 룰만 매치.
        - { id: "blue-2-1", type: "file_contains", target: "ips", params: { path: "/etc/suricata/rules/local.rules", regex: "sqlmap|SQLMAP|Sqlmap" } }
      semantic:
        intent: "MITRE D3FEND D3-NTA — 스캐너 User-Agent 시그니처. http.user_agent 버퍼+content 로 sqlmap 탐지."
        success_criteria: ["local.rules 에 http.user_agent+sqlmap 룰", "sid 9004000+/msg 'EDU'", "(설명) UA 위장 한계 인지"]
        acceptable_methods: ["ips-gui 룰 폼(→local.rules)", "local.rules 직접 작성"]
        negative_signs: ["문법 오류 로딩 실패", "버퍼 없이 과탐"]

  - order: 3
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-3 — 공격 재현 → 작성 룰 실제 탐지 확인
      (solo 면 RED-2 의 sqlmap 재현 후) eve.json 에서 작성한 sqlmap 탐지 룰이 트리거한 경보를 찾는다.
      ✅ 합격: 본인 IPS 로그에 sqlmap 탐지 경보가 있다(작성 룰 동작).
    hint: "sqlmap 재현 후 eve.json 에서 sqlmap 탐지 경보 확인."
    verify:
      type: "log_contains"
      expect: "sqlmap"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "sqlmap", since_sec: 1800 } }
      semantic:
        intent: "룰 검증 — 작성 룰이 재현 공격을 실제 탐지하는지 eve.json 으로 확인."
        success_criteria: ["Suricata eve.json 에 sqlmap 탐지(최근)", "BLUE-2 룰(sid 9004001)에서 트리거", "(설명) 작성→재현→탐지"]
        acceptable_methods: ["sqlmap 재현 후 log_contains suricata sqlmap"]
        negative_signs: ["룰만 작성·미검증", "CRS 등 타 룰에서만 탐지"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 10
    instruction: |
      ## 🛡️ BLUE-4 — SIEM 통합 수집 확인
      IPS 탐지가 Wazuh 로 모이는지 확인(W09 의 Wazuh-Suricata 통합 예고).
      ✅ 합격: 본인 SIEM 에 IPS/웹공격 관련 경보 수집.
    hint: "본인 Wazuh 에서 IPS/웹공격 경보 수집 확인."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { groups: "ids", since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — Suricata 탐지가 Wazuh 로 수렴."
        success_criteria: ["본인 Wazuh 에 ids 경보(최근)", "(설명) IPS→SIEM 수집 흐름"]
        acceptable_methods: ["siem wazuh_alert(ids)", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
