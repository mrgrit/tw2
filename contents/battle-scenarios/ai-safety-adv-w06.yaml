id: "ai-safety-adv-w06"
category: "ai-safety-adv"
title: "[AI안전심화 W6] 모델 탈취/추출: 기능 추출·지식 증류 vs 워터마킹·탐지"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  모델 탈취 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 기능 추출·지식 증류·모델 유출과
  워터마킹·탐지 방어를 다룬다.
  ▸ 실측 — `/api/model/export`·`/api/llm/config` 무인증 모델 유출. Red 위치: 본인 인프라
    (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 모델 아티팩트 유출 + 기능 추출
      export/config 무인증 획득 + 질의 기반 기능 추출(입출력 수집) 경로 실증/논증.
      ### ✅ 합격 기준: 모델 아티팩트 실제 값 인용 + 기능 추출 경로를 제시한다.
    hint: "/api/model/export·llm/config 무인증 획득 + 질의 기반 기능 추출 경로. 실제 값 인용."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-6-1", type: "command_ran", target: "attacker", params: { pattern: "model" } }
      semantic:
        intent: "모델 탈취 — 아티팩트 유출·기능 추출(LLM10)."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/model/export·llm/config 흔적이 남음"
          - "모델 아티팩트 실제 값을 인용"
          - "(설명) 기능 추출 경로를 제시"
        acceptable_methods: ["export·config + 추출 경로"]
        negative_signs: ["실제 값 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 지식 증류·복제 모델 위협 분석
      추출한 입출력으로 대리 모델을 증류하는 위협과, 복제 모델로 적대적 예제를 쉽게 만드는 전이를 분석한다.
      ### ✅ 합격 기준: 지식 증류·복제 모델의 전이 공격 위협을 분석한다.
    hint: "입출력 수집→대리 모델 증류→적대적 예제 전이. 지식재산·안전 로직 유출."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-6-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "지식 증류·복제 — 복제 모델이 공격을 쉽게 만듦."
        success_criteria:
          - "본인 인프라 명령 로그에 흔적이 남음"
          - "지식 증류·복제 위협을 분석"
          - "(설명) 전이 공격을 설명"
        acceptable_methods: ["증류·전이 분석"]
        negative_signs: ["원리 없이 '가능'만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 모델 유출·추출 표면 진단
      무인증 export/config + 질의 추출 여지 증거 진단.
      ### ✅ 합격 기준: 무인증 노출·추출 여지를 증거로 진단한다.
    hint: "export/config 무인증 + 질의 추출 여지 증거 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-6-1", type: "command_ran", target: "attacker", params: { pattern: "model" } }
      semantic:
        intent: "모델 유출 표면 진단."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 흔적이 남음"
          - "무인증 노출·추출 여지를 증거로 제시"
          - "(설명) LLM10·추출로 매핑"
        acceptable_methods: ["노출 증거 진단"]
        negative_signs: ["증거 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 워터마킹·추출 방어 설계
      엔드포인트 제거·인증+질의 레이트리밋·출력 제한+워터마킹(도난 탐지)+이상 질의 패턴 탐지.
      ### ✅ 합격 기준: 엔드포인트 통제·추출 방어·워터마킹·이상 탐지를 제시하고 "질의로도 모델 보호" 원칙을
      설명한다.
    hint: "export/config 제거·인증+레이트리밋·출력 제한+워터마킹+이상 질의 탐지. '질의로도 보호' 원칙."
    verify:
      type: "semantic"
      expect: "model_theft_defense"
      semantic:
        intent: "모델 탈취 방어 — 엔드포인트 통제·추출 방어·워터마킹."
        success_criteria:
          - "엔드포인트 제거·인증을 제시"
          - "레이트리밋·출력 제한을 제시"
          - "워터마킹·이상 질의 탐지를 제시"
          - "(설명) '질의로도 모델 보호' 원칙 설명"
        acceptable_methods: ["통제 + 추출 방어 + 워터마킹 + 탐지"]
        negative_signs: ["엔드포인트 노출 유지"]
