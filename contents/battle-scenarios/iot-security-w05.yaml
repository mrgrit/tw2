id: "iot-security-w05"
category: "iot-security"
title: "[IoT보안 W5] IoT 웹 인터페이스 공격: 명령 주입·인증 우회·CSRF vs 웹 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IoT 웹 인터페이스 공방전 — IoT 장치의 **관리 웹 UI/API**에 대한 명령 주입·인증 우회·CSRF와 웹 보안을
  설계·분석한다. 실물 장치 웹이 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(웹 인터페이스 공격)와 Blue(IoT 웹 보안)를 모두 수행.
    • duel : Red 학생이 웹 공격 경로를 제시하고, Blue 학생이 웹 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 명령 주입·인증 우회·CSRF 경로의 구체성과 물리 영향
    (장치 제어), 웹 보안(입력 검증·인증·CSRF 토큰) 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (웹 인터페이스 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 명령 주입 → 장치 OS 명령 실행 → 물리 제어

      IoT 웹 UI의 흔한 취약인 **OS 명령 주입**(ping/진단/네트워크 설정 파라미터)으로 장치 셸을 얻는
      경로를 설계한다.

      ### 무엇을
      - 진단/설정 기능(ping·traceroute·파일명·네트워크 파라미터)에 `;`·`|`·`$()` 주입 → OS 명령 실행.
      - 셸 획득 → 장치 제어(펌웨어·설정·물리 액추에이터).
      - IoT 웹이 명령 주입에 취약한 이유(경량 CGI·검증 부재)를 언급.

      ### ✅ 합격 기준
      명령 주입 취약 지점(진단/설정)과 페이로드, 셸 획득→물리 제어 경로를 구체적으로 설계한다.
    hint: "진단/설정 파라미터(ping·파일명·네트워크)에 ;|$() 명령 주입→OS 실행→셸→물리 제어. 경량 CGI 검증 부재."
    verify:
      type: "semantic"
      expect: "command_injection"
      semantic:
        intent: |
          IoT 명령 주입 — 진단/설정 기능의 검증 부재로 OS 명령을 실행해 장치를 제어.
        success_criteria:
          - "명령 주입 취약 지점(진단/설정)과 페이로드를 구체적으로 설계"
          - "셸 획득→장치/물리 제어로 이어짐을 서술"
          - "(설명) IoT 웹이 명령 주입에 취약한 이유를 언급"
        acceptable_methods:
          - "명령 주입 페이로드 + 셸 + 물리 제어"
        negative_signs:
          - "주입 지점·페이로드 근거 없이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 인증 우회·CSRF 분석

      IoT 웹의 **인증 우회**(기본 자격·인증 없는 API·세션 취약)와 **CSRF**(설정 변경 위조 요청)를 분석
      한다.

      ### ✅ 합격 기준
      인증 우회(기본 자격·무인증 API·약한 세션)와 CSRF(위조 설정 변경) 중 최소 2가지 경로를 구체적으로
      분석하고 장치 장악으로 이어짐을 설명한다.
    hint: "기본 자격·무인증 API·약한 세션(인증 우회)+CSRF(위조 설정 변경). 2+ 경로로 장치 장악. 물리 영향."
    verify:
      type: "semantic"
      expect: "auth_bypass_csrf"
      semantic:
        intent: |
          IoT 인증 우회·CSRF — 기본 자격·무인증 API·CSRF로 장치를 장악하는 경로를 이해.
        success_criteria:
          - "인증 우회(기본 자격·무인증 API·약한 세션)를 분석"
          - "CSRF(위조 설정 변경) 경로를 분석"
          - "(설명) 장치 장악·물리 영향으로 이어짐을 설명"
        acceptable_methods:
          - "인증 우회 + CSRF 2+ 경로"
        negative_signs:
          - "경로 1개·막연"

# ───────────────────────── BLUE (IoT 웹 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 입력 검증·명령 주입 방어 설계

      RED의 명령 주입·주입류 공격을 막는 **입력 검증·안전한 실행**을 설계한다.

      ### 무엇을
      - **입력 검증**: 허용목록·타입/형식 검증, 쉘 메타문자 차단.
      - **안전한 실행**: 쉘 호출 회피(exec 배열·파라미터 분리), 최소 권한 실행.
      - **출력/오류**: 상세 오류 노출 금지.
      - RED 주입 지점별 대응.

      ### ✅ 합격 기준
      입력 허용목록·쉘 호출 회피·최소 권한을 제시하고 RED 명령 주입 지점에 대응 매핑한다.
    hint: "입력 허용목록·타입 검증·메타문자 차단+쉘 호출 회피(exec 배열)·최소 권한+오류 은닉. RED 주입 지점 매핑."
    verify:
      type: "semantic"
      expect: "input_validation"
      semantic:
        intent: |
          IoT 웹 입력 검증 — 허용목록·쉘 회피·최소 권한으로 명령 주입을 막는다.
        success_criteria:
          - "입력 검증(허용목록·타입·메타문자 차단)을 제시"
          - "안전한 실행(쉘 호출 회피·최소 권한)을 제시"
          - "RED 주입 지점별 대응을 매핑"
        acceptable_methods:
          - "입력 검증 + 안전 실행 + 매핑"
        negative_signs:
          - "블랙리스트만·쉘 회피 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 인증·세션·CSRF·심층 방어 설계

      IoT 웹의 **인증·세션·CSRF 방어와 심층 방어**를 설계한다.

      ### 무엇을
      - **인증**: 기본 자격 금지·강제 변경, 모든 API 서버측 인증, 강한 세션(만료·안전 쿠키).
      - **CSRF 방어**: CSRF 토큰·SameSite 쿠키·재인증(민감 작업).
      - **최소 노출**: 관리 UI 로컬/내부망 제한, 불필요 서비스 제거.
      - **심층 방어**: 레이트리밋·로깅, 펌웨어 무결성(W03/W04 연계).

      ### ✅ 합격 기준
      기본 자격 금지·API 인증·CSRF 토큰·최소 노출을 제시하고 "IoT 웹도 표준 웹 보안 원칙 적용" 원칙을
      설명한다.
    hint: "기본 자격 금지·API 인증·강한 세션+CSRF 토큰·SameSite·재인증+관리 UI 내부망 제한+레이트리밋. 'IoT 웹도 표준 웹 보안' 원칙."
    verify:
      type: "semantic"
      expect: "iot_web_security"
      semantic:
        intent: |
          IoT 웹 보안 — 인증·세션·CSRF·최소 노출로 웹 인터페이스를 방어.
        success_criteria:
          - "인증(기본 자격 금지·API 인증·강한 세션)을 제시"
          - "CSRF 방어(토큰·SameSite·재인증)를 제시"
          - "최소 노출·레이트리밋·무결성을 제시"
          - "(설명) 'IoT 웹도 표준 웹 보안 원칙 적용' 원칙 설명"
        acceptable_methods:
          - "인증 + CSRF + 최소 노출 + 심층 방어"
        negative_signs:
          - "기본 자격 유지"
          - "CSRF 또는 API 인증 누락"
