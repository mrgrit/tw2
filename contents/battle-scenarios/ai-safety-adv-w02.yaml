id: "ai-safety-adv-w02"
category: "ai-safety-adv"
title: "[AI안전심화 W2] 프롬프트 인젝션 심화: 간접·인코딩·체인·Adaptive ASR vs 적응 방어"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  인젝션 심화 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 간접·인코딩·체인 인젝션과
  적응형 ASR을 다룬다.
  ▸ 실측 — 의미론적 우회는 WAF 통과, `/api/rag/add` 간접 인젝션은 피해자 질의에서 트리거. Red 위치:
    본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만, 고유 마커.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 간접+체인 인젝션 + Adaptive ASR

      간접 인젝션(KB 오염)과 체인(다단계 유도)을 결합하고, 방어 반응을 보며 **적응적으로** 페이로드를
      조정해 ASR을 높인다.

      ### ✅ 합격 기준
      간접+체인 인젝션을 실증(마커 트리거)하고, 적응 조정으로 ASR이 향상됨을 측정한다.
    hint: "/api/rag/add 간접+체인 유도 결합, 방어 반응 보며 적응 조정. 마커 트리거+ASR 향상 측정."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "red-2-1", type: "command_ran", target: "attacker", params: { pattern: "rag/add" } }
      semantic:
        intent: "적응형 인젝션 — 간접+체인+적응 조정으로 ASR을 높인다."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add·/api/chat 호출 흔적이 남음"
          - "간접+체인 인젝션을 마커 트리거로 실증"
          - "(설명) 적응 조정으로 ASR 향상을 측정"
        acceptable_methods: ["간접+체인+적응 조정"]
        negative_signs: ["단발·적응 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 인코딩·우회 조합 최적화

      인코딩·프레이밍·분할 우회를 **조합**해 최적 우회를 찾고 ASR을 측정한다.

      ### ✅ 합격 기준
      최소 2가지 우회 조합의 ASR을 비교해 최적 조합을 도출한다.
    hint: "인코딩·프레이밍·분할 조합 ASR 비교 + 최적 조합 도출."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "red-2-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "우회 조합 최적화 — 조합으로 ASR을 극대화."
        success_criteria:
          - "본인 인프라 명령 로그에 반복 호출 흔적이 남음"
          - "최소 2가지 우회 조합의 ASR을 비교"
          - "(설명) 최적 조합을 도출"
        acceptable_methods: ["조합 ASR 비교"]
        negative_signs: ["조합·비교 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 적응형 공격 탐지 진단

      적응형 인젝션의 **패턴 진화**를 탐지할 수 있는지 진단한다: 반복 실패 후 변형·간접 경로·조합 시도의
      흔적.

      ### ✅ 합격 기준
      적응형 공격의 흔적(변형 반복·간접 경로)을 증거로 진단한다.
    hint: "반복 실패 후 변형·간접 경로·조합 시도 흔적 증거 진단. 적응형 공격 탐지 가능성."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-2-1", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "적응형 공격 진단 — 변형·간접·조합 흔적을 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "적응형 공격 흔적을 증거로 제시"
          - "(설명) 탐지 가능성/한계를 논함"
        acceptable_methods: ["적응 흔적 진단"]
        negative_signs: ["증거 없이 주장만"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 적응 방어 설계: 소스 격리·의미 탐지·모니터링

      적응형 인젝션에 대한 **적응 방어**를 설계한다: 소스 격리(간접 차단)·의미 기반 탐지·행동 모니터링
      (반복 변형 시도 탐지)·수집 통제.

      ### ✅ 합격 기준
      소스 격리·의미 탐지·행동 모니터링·수집 통제를 제시하고 "적응 공격엔 다층+행동 탐지" 원칙을 설명한다.
    hint: "소스 격리(간접 차단)+의미 탐지+행동 모니터링(반복 변형)+수집 통제. '다층+행동 탐지' 원칙."
    verify:
      type: "semantic"
      expect: "adaptive_defense"
      semantic:
        intent: "적응 방어 — 소스 격리·의미 탐지·행동 모니터링으로 진화 공격에 대응."
        success_criteria:
          - "소스 격리(간접 차단)를 제시"
          - "의미 기반 탐지·행동 모니터링을 제시"
          - "수집 통제를 제시"
          - "(설명) '다층+행동 탐지' 원칙 설명"
        acceptable_methods: ["소스 격리 + 의미 탐지 + 행동 모니터링"]
        negative_signs: ["시그니처 필터만"]
