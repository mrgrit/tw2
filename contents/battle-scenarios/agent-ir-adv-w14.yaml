id: "agent-ir-adv-w14"
category: "agent-ir-adv"
title: "[에이전트IR고급 W14] CI/CD 공급망 오염 vs 파이프라인 무결성·탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — **CI/CD 파이프라인(GitHub Actions·Jenkins·GitLab) 오염**으로 빌드·배포에
  악성 코드를 주입하는 공급망 공격과, 파이프라인 무결성·탐지를 다룬다.

  ▸ 채점 특성 — CI/CD 내부는 el34 밖이다. **관측 채점은 대상(el34)에 남는 정찰·공격 흔적**으로 하고,
    파이프라인 오염은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(CI/CD 오염 킬체인)와 Blue(파이프라인 무결성·탐지)를 모두 수행.
    • duel : Red 학생이 파이프라인 오염을 설계·정찰하고, Blue 학생은 무결성·탐지로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰·공격(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (CI/CD 오염 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 파이프라인 진입점·시크릿 표면 파악

      대상 웹/저장소 정찰(고유 태그)로 흔적을 남기고, **CI/CD 진입점·시크릿 표면**을 파악하는 단계를 설계한다.

      ### 무엇을
      - 진입: 유출 토큰·취약 워크플로우(pull_request_target)·서드파티 액션·자기 호스팅 러너.
      - **시크릿 표면**: 파이프라인 시크릿·배포 자격·레지스트리 키.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-recon' "http://192.168.0.161/.git/config"
      ```

      ### ✅ 합격 기준
      대상에 정찰 흔적을 남기고, CI/CD 진입점(취약 워크플로우·러너)·시크릿 표면 파악을 설계한다.
    hint: "저장소/워크플로우 정찰(태그)+진입점(pull_request_target·서드파티 액션·자기 호스팅 러너)·시크릿 표면 파악. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-14-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          CI/CD 진입점·시크릿 — 취약 워크플로우·러너·시크릿 표면을 파악하는 단계를 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "CI/CD 진입점·시크릿 표면을 설계"
          - "(설명) 파이프라인이 고가치 표적인 이유를 설명"
        acceptable_methods:
          - "정찰 + 진입점/시크릿 파악"
        negative_signs:
          - "탐지 흔적 없음"
          - "진입점 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 빌드 오염·배포 확산 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **빌드 오염→서명된 아티팩트→대량 배포** 킬체인을 설계한다.

      ### 무엇을
      - 워크플로우/빌드 스크립트 변조·악성 의존성·러너 침해로 빌드에 코드 주입.
      - 오염 아티팩트가 정상 서명·배포되어 다운스트림(고객·내부)으로 확산(SolarWinds식).

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 빌드 오염→서명·배포→다운스트림 확산 킬체인을 설계한다.
    hint: "정찰(태그)+워크플로우/빌드 변조·러너 침해→빌드 코드 주입→정상 서명·배포→다운스트림 확산(SolarWinds식) 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-14-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          빌드 오염·확산 — 파이프라인 오염이 서명·배포를 거쳐 다운스트림으로 확산하는 킬체인.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "빌드 오염→서명·배포→확산 킬체인을 설계"
          - "(설명) 신뢰된 배포 채널 악용의 위력을 설명"
        acceptable_methods:
          - "활동 흔적 + 빌드 오염 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (파이프라인 무결성·탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — CI/CD 위협 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **CI/CD 오염 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·공격 확인.
      - CI/CD 신호(개념): 워크플로우 변경·비정상 러너 활동·예상 밖 아웃바운드(빌드 중)·시크릿 접근 이상·
        의존성 급변·빌드 산출물 해시 변화.

      ### ✅ 합격 기준
      RED 공격을 탐지하고, CI/CD 오염 신호(워크플로우 변경·빌드 이상·해시 변화)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+CI/CD 신호(워크플로우 변경·비정상 러너·빌드 중 아웃바운드·시크릿 접근·의존성 급변·산출물 해시 변화) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-14-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          CI/CD 탐지 — 워크플로우 변경·빌드 이상·해시 변화로 파이프라인 오염을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "CI/CD 오염 신호(워크플로우·빌드·해시)를 설계"
          - "(설명) 빌드 환경 가시성의 중요성을 언급"
        acceptable_methods:
          - "SIEM 탐지 + CI/CD 신호"
        negative_signs:
          - "경보 근거 없음"
          - "CI/CD 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 파이프라인 무결성·SLSA 설계

      CI/CD 오염을 막는 **파이프라인 무결성**을 설계한다.

      ### 무엇을
      - **무결성·출처**: 서명된 커밋·빌드 출처(SLSA provenance)·아티팩트 서명·재현 가능 빌드.
      - **권한·격리**: 러너 격리·최소 권한 토큰·시크릿 최소화·서드파티 액션 고정(핀)·리뷰.
      - **워크플로우 보안**: 위험 트리거(pull_request_target) 통제·브랜치 보호·2인 리뷰.
      - **검증·배포 통제**: 배포 전 검증·admission·SBOM.

      ### ✅ 합격 기준
      서명·출처(SLSA)·러너 격리·워크플로우 보안·배포 검증을 제시하고 "빌드에서 배포까지 무결성 사슬" 원칙을 설명한다.
    hint: "서명 커밋·SLSA provenance·아티팩트 서명·재현 빌드+러너 격리·최소 권한·액션 핀+위험 트리거 통제·브랜치 보호·2인 리뷰+배포 검증·SBOM. '무결성 사슬' 원칙."
    verify:
      type: "semantic"
      expect: "pipeline_integrity"
      semantic:
        intent: |
          파이프라인 무결성 — 서명·출처·격리·검증으로 빌드-배포 무결성 사슬을 만든다.
        success_criteria:
          - "무결성·출처(서명·SLSA·재현 빌드)를 제시"
          - "권한·격리(러너 격리·최소 권한·액션 핀)를 제시"
          - "워크플로우 보안·배포 검증을 제시하고 원칙 설명"
        acceptable_methods:
          - "서명/출처 + 격리 + 워크플로우 보안 + 배포 검증"
        negative_signs:
          - "서명·출처 없음"
          - "러너 격리·검증 없음"
