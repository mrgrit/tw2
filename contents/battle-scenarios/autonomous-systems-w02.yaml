id: "autonomous-systems-w02"
category: "autonomous-systems"
title: "[자율시스템 W2] 드론 아키텍처·통신 표면 침투 설계 vs 통신 보안 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  드론 기초 공방전 — 드론의 **아키텍처(FC·GCS·링크)·WiFi 제어·통신 구조**를 이해하고, 통신 표면의
  공격 경로와 방어를 설계·분석한다. 실물 드론·RF가 필요하므로 본 공방전은 **설계·서술형**이다(결정론
  시뮬 + GPU 분석, semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(드론 통신 표면 공격 경로)와 Blue(통신 보안 설계)를 모두 수행.
    • duel : Red 학생이 드론 통신 공격 경로를 제시하고, Blue 학생이 통신 보안으로 대응.

  ▸ 채점(중요)
    실물 드론이 없으므로 **보고서의 설계 품질**로 채점 — 아키텍처 계층 매핑, 통신 표면(제어 링크·
    텔레메트리·WiFi)별 공격 경로의 구체성·타당성, 통신 보안(인증·암호·서명) 방어의 구체성. 근거 없는
    일반론은 불인정. GPU(gemma3)로 분석·종합 보조 가능.

  ▸ 윤리 — 실제 드론 공격은 실물·법적 인가·안전이 필요. 본 공방전은 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (드론 통신 표면 공격 경로 설계) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 드론 아키텍처·통신 표면 매핑 + 공격 경로

      드론 아키텍처(비행 컨트롤러 FC·지상국 GCS·제어/텔레메트리 링크·WiFi/RF)를 매핑하고, 통신 표면의
      **공격 경로**를 설계한다.

      ### 무엇을
      - 아키텍처 계층(FC·GCS·링크·페이로드)과 각 통신 채널(WiFi 제어·MAVLink 텔레메트리·RC)을 명시.
      - 표면별 공격 착안: 개방 WiFi(무인증 제어)·평문 MAVLink(스니핑/인젝션)·약한 페어링.
      - 한 통신 취약이 어떤 제어 상실로 이어지는지 경로화.

      ### ✅ 합격 기준
      드론 아키텍처 계층과 통신 표면을 매핑하고, 최소 2개 통신 채널의 구체적 공격 경로(기법·프로토콜
      명시)를 설계한다.
    hint: "FC·GCS·링크 아키텍처 + WiFi 제어/MAVLink 텔레메트리/RC 채널별 공격(개방 WiFi·평문 MAVLink·약한 페어링). 통신 취약→제어 상실 경로."
    verify:
      type: "semantic"
      expect: "drone_comm_attack_path"
      semantic:
        intent: |
          드론 통신 표면 공격 경로 — 아키텍처와 통신 채널을 매핑하고 구체 기법으로 제어 상실 경로를 구성.
        success_criteria:
          - "드론 아키텍처 계층(FC·GCS·링크)과 통신 채널을 명시"
          - "최소 2개 통신 채널의 구체적 공격(개방 WiFi·평문 MAVLink·약한 페어링 등)을 설계"
          - "통신 취약이 제어 상실로 이어지는 경로를 서술"
        acceptable_methods:
          - "WiFi 무인증 제어·MAVLink 스니핑/인젝션·페어링 취약 경로"
        negative_signs:
          - "막연한 '해킹'·기법 불명"
          - "채널 하나만·경로 연결 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 통신 신뢰 가정의 허점 분석

      드론 통신이 깔고 있는 **신뢰 가정**(링크는 안전하다·명령 출처는 GCS다)의 허점을 분석한다.

      ### ✅ 합격 기준
      드론 통신의 신뢰 가정을 식별하고, 그 가정이 깨질 때(무인증·평문·재전송) 공격자가 무엇을 할 수
      있는지 구체적으로 서술한다.
    hint: "'링크는 안전·명령 출처는 GCS' 가정의 허점(무인증·평문·재전송 공격)을 분석. 가정이 깨지면 하이재킹 가능."
    verify:
      type: "semantic"
      expect: "trust_assumption"
      semantic:
        intent: |
          통신 신뢰 가정 분석 — 드론이 전제하는 신뢰가 깨질 때의 공격 가능성을 이해.
        success_criteria:
          - "드론 통신의 신뢰 가정(링크 안전·출처 신뢰)을 식별"
          - "가정이 깨질 때(무인증·평문·재전송)의 공격 가능성을 구체적으로 서술"
          - "(설명) 신뢰 가정이 보안의 약점임을 언급"
        acceptable_methods:
          - "무인증·평문·재전송 공격으로 신뢰 가정 붕괴 분석"
        negative_signs:
          - "신뢰 가정 식별 없음"
          - "공격 가능성이 막연"

# ───────────────────────── BLUE (드론 통신 보안 설계) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 통신 보안 설계: 인증·암호·무결성

      RED의 통신 공격 경로를 막는 **통신 보안**을 설계한다.

      ### 무엇을
      - **인증**: 제어 링크·명령 출처 인증(GCS만 제어), 강한 페어링.
      - **암호·무결성**: MAVLink 서명·암호화 링크, 재전송 방지(nonce·시퀀스).
      - **WiFi/RF 보안**: 강한 WiFi 인증·주파수 관리, 무인증 제어 차단.
      - RED 경로별 대응을 매핑.

      ### ✅ 합격 기준
      RED 통신 경로에 대응하는 인증·암호·무결성·WiFi 보안을 구체적으로 제시하고 경로별로 매핑한다.
    hint: "명령 출처 인증(GCS만)+MAVLink 서명·암호·재전송 방지+강한 WiFi 인증. RED 경로별 대응 매핑."
    verify:
      type: "semantic"
      expect: "comm_security"
      semantic:
        intent: |
          드론 통신 보안 — 인증·암호·무결성으로 통신 표면을 방어하고 RED 경로를 막는다.
        success_criteria:
          - "명령 출처 인증(GCS만 제어)·강한 페어링을 제시"
          - "MAVLink 서명·암호화·재전송 방지를 제시"
          - "WiFi/RF 보안(강한 인증·무인증 제어 차단)을 제시"
          - "(설명) RED 경로별 대응을 매핑"
        acceptable_methods:
          - "인증 + 암호/무결성 + WiFi 보안 + 경로 매핑"
        negative_signs:
          - "채널 하나만 방어"
          - "경로 매핑 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 통신 두절·페일세이프 설계 (안전 우선)

      통신 보안을 넘어, **통신이 두절되거나 공격받아도 안전**하도록 페일세이프를 설계한다(안전≠보안).

      ### 무엇을
      - **페일세이프**: 링크 상실 시 자동 귀환(RTL)·안전 착륙·호버, 명령 무결성 실패 시 안전 모드.
      - **독립 안전 계층**: 지오펜스·고도/영역 제한을 통신과 독립적으로 강제.
      - **저하 운용(graceful degradation)**: 일부 센서/링크 손상 시 안전하게 성능 저하.

      ### ✅ 합격 기준
      링크 상실·공격 시의 페일세이프와 독립 안전 계층을 구체적으로 제시하고 "통신 보안이 뚫려도
      물리적으로 안전" 원칙을 설명한다.
    hint: "링크 상실 RTL/안전 착륙+지오펜스·영역 제한(통신 독립)+저하 운용. '통신 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "failsafe_design"
      semantic:
        intent: |
          드론 페일세이프 — 통신 두절·공격 시에도 물리적 안전을 보장하는 독립 안전 계층.
        success_criteria:
          - "링크 상실 페일세이프(RTL·안전 착륙·호버)를 제시"
          - "독립 안전 계층(지오펜스·영역 제한, 통신 독립)을 제시"
          - "저하 운용(graceful degradation)을 제시"
          - "(설명) '통신 보안이 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "페일세이프 + 독립 안전 계층 + 저하 운용"
        negative_signs:
          - "독립 안전 계층 언급 없음"
          - "통신 보안만·물리 안전 관점 없음"
