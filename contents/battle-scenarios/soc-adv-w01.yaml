    instruction: |
      ## 🛡️ BLUE-5 [갭 분석·로드맵·Cleanup] — 개선 계획 종합 + 실습 위생

      ### 상황
      평가의 산출물이다. 목표 Level 4 대비 **갭 분석**과 **3단계(3·6·12개월) 개선 로드맵**(각 단계 실행 항목 +
      기대 KPI)을 만들고, Red/Blue/Purple 회고로 이번 공방전의 교훈을 정리한다. 마지막으로 이번 주 실습
      아티팩트(9601011 / 102011 / soca01 / 54001)를 **일괄 cleanup** 한다.

      ### 할 일
      - 갭 분석: 도메인별 (현재 → 목표 4) 갭 + 우선순위(HIGH/MED/LOW)
      - 로드맵: Phase1(3M) Quick-Wins / Phase2(6M) 역량구축 / Phase3(12M) 최적화, 각 KPI 포함
      - R/B/P 회고 + cleanup:
      ```bash
      sudo userdel -r soca01 2>/dev/null
      sudo pkill -f 'ncat -lk 54001' 2>/dev/null
      sudo sed -i '/9601011/d' /etc/suricata/rules/local.rules && sudo suricatasc -c reload-rules
      # Wazuh 102011 룰 블록 제거 후 wazuh-control restart
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 갭 분석/로드맵/회고/cleanup 으로 채점한다.

