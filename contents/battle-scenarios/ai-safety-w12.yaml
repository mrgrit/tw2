id: "ai-safety-w12"
category: "ai-safety"
title: "[AI안전 W12] AI 윤리와 규제: 거버넌스 갭 분석 vs 규제 준수 거버넌스"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  AI 윤리·규제 공방전 — 기술을 넘어 **거버넌스**로. 대상 AI 서비스(AICompanion 사례)의 윤리·규제
  갭을 분석하고 준수 거버넌스를 설계한다. 규제·정책은 **설계·분석형**이다(semantic 채점).
  ▸ 모드 solo/duel. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 윤리·규제 갭 분석

      대상 AI 서비스가 위반하는 윤리·규제 항목을 분석한다: 개인정보(PII/SSN 노출)·투명성 부재·안전
      정렬 미흡·책임성(감사) 부재 등을 EU AI Act·GDPR·NIST AI RMF 관점에서.

      ### ✅ 합격 기준
      최소 3개 윤리·규제 항목의 위반을 실제 취약(PII 유출·비밀 노출 등)에 근거해 분석한다.
    hint: "PII/SSN 노출·투명성·안전 정렬·책임성 위반을 EU AI Act·GDPR·NIST AI RMF 관점 3+ 분석. 실제 취약 근거."
    verify:
      type: "semantic"
      expect: "governance_gap"
      semantic:
        intent: "윤리·규제 갭 분석 — 실제 취약을 규제 위반으로 매핑."
        success_criteria:
          - "최소 3개 윤리·규제 항목 위반을 분석"
          - "실제 취약(PII 유출·비밀 노출 등)에 근거"
          - "(설명) EU AI Act·GDPR·NIST AI RMF 등에 매핑"
        acceptable_methods: ["규제 항목별 위반 분석"]
        negative_signs: ["규제 근거 없이 일반론"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 위험 등급·영향 평가 (규제 리스크)

      규제 위반의 **위험 등급과 비즈니스/법적 영향**(과징금·신뢰 손상·서비스 중단)을 평가한다.

      ### ✅ 합격 기준
      위반을 규제 리스크(영향×가능성)로 등급화하고 최상위 리스크의 근거를 설명한다.
    hint: "규제 위반을 리스크(영향×가능성)로 등급화 + 과징금·신뢰·중단 영향. 최상위 근거."
    verify:
      type: "semantic"
      expect: "regulatory_risk"
      semantic:
        intent: "규제 리스크 평가 — 위반을 영향·가능성으로 우선순위화."
        success_criteria:
          - "위반을 규제 리스크로 등급화"
          - "비즈니스/법적 영향을 서술"
          - "(설명) 최상위 리스크 근거를 제시"
        acceptable_methods: ["리스크 등급 + 영향"]
        negative_signs: ["등급·영향 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — AI 거버넌스 프레임워크 설계

      규제 준수 **거버넌스 프레임워크**를 설계한다: 위험 관리(NIST AI RMF: Govern·Map·Measure·Manage),
      데이터 거버넌스(PII 보호·최소화), 투명성(모델 카드·설명), 책임성(감사·역할).

      ### ✅ 합격 기준
      위험 관리·데이터 거버넌스·투명성·책임성을 갖춘 프레임워크를 규제 항목에 매핑해 제시한다.
    hint: "NIST AI RMF(Govern·Map·Measure·Manage)+데이터 거버넌스(PII 보호)+투명성(모델 카드)+책임성(감사). 규제 매핑."
    verify:
      type: "semantic"
      expect: "governance_framework"
      semantic:
        intent: "AI 거버넌스 프레임워크 — 위험 관리·데이터·투명성·책임성을 규제에 매핑."
        success_criteria:
          - "위험 관리(NIST AI RMF 등)를 제시"
          - "데이터 거버넌스·투명성을 제시"
          - "책임성(감사·역할)을 제시하고 규제 항목 매핑"
        acceptable_methods: ["위험 관리 + 데이터 + 투명성 + 책임성"]
        negative_signs: ["규제 매핑 없이 일반론"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 컴플라이언스 운영·수명주기 설계

      거버넌스를 **운영 가능한 컴플라이언스**로 만든다: 정기 평가·감사, 인시던트 대응·보고 의무,
      수명주기(설계~배포~운영~폐기) 준수 게이트, 지속 모니터링·개선.

      ### ✅ 합격 기준
      정기 평가·감사·인시던트 보고·수명주기 게이트를 제시하고 "준수는 일회성이 아닌 지속 운영" 원칙을
      설명한다.
    hint: "정기 평가·감사+인시던트 대응·보고 의무+수명주기 준수 게이트+지속 모니터링. '지속 운영' 원칙."
    verify:
      type: "semantic"
      expect: "compliance_ops"
      semantic:
        intent: "컴플라이언스 운영 — 평가·감사·수명주기 게이트로 지속 준수."
        success_criteria:
          - "정기 평가·감사를 제시"
          - "인시던트 대응·보고 의무를 제시"
          - "수명주기 준수 게이트·지속 모니터링을 제시"
          - "(설명) '지속 운영' 원칙 설명"
        acceptable_methods: ["평가·감사 + 보고 + 수명주기 게이트"]
        negative_signs: ["일회성 준수만"]
