id: "agent-ir-w11"
category: "agent-ir"
title: "[에이전트IR W11] Purple Round 1: 공격 재현 vs 클라이언트→서버 지식 이식(코칭)"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR Purple 공방전 — Purple Round 1. Red가 공격을 재현하면 Blue는 그 대응 지식을 **클라이언트
  (Claude Code)→서버(Bastion)로 이식**해 자율 방어 능력을 코칭한다. 사람의 통찰을 자율 시스템에
  주입하는 순환의 첫 라운드다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(공격 재현)와 Blue(지식 이식·코칭)를 모두 수행.
    • duel : Red 학생이 공격을 재현하고, Blue 학생이 대응 지식을 서버 에이전트에 이식한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 지식 이식은 self 기준 semantic.

  ▸ 에이전트 IR 관점 — Purple은 공격→방어→학습의 순환이다. Round 1은 "사람/클라이언트가 발견한 대응
    지식을 서버 자율 에이전트의 지식(KG·룰)으로 이식"하는 것이 핵심.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (공격 재현) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 재현 가능한 공격 실행 (Purple 입력)

      Blue가 대응 지식을 만들 수 있도록 **재현 가능한 공격**을 실행한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 명확한 공격(정찰+웹 공격, 고유 태그)을
        재현 가능한 절차로 수행.
      - 절차·시각·기법을 Blue가 재현·학습할 수 있게 문서화.

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 재현 절차**(Blue 학습용).

      ### ✅ 합격 기준
      재현 가능한 공격을 실행해 대상에 흔적을 남기고, Blue가 대응 지식화할 수 있게 절차를 문서화한다.
    hint: "재현 가능한 정찰+웹 공격(태그 auto-red-<학번>) + 절차·시각·기법 문서화(Blue 학습용). 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-11-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          재현 가능한 공격 — Purple 순환의 입력으로 Blue가 대응 지식화할 수 있는 명확한 공격을 제공.
        success_criteria:
          - "대상 WAF/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "재현 가능한 공격을 실행"
          - "(설명) Blue 학습용 절차·기법을 문서화"
        acceptable_methods:
          - "재현 가능한 공격 + 절차 문서화"
        negative_signs:
          - "탐지 흔적 없음"
          - "재현 절차 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 변형 재공격으로 이식 지식 검증

      Blue가 지식을 이식한 뒤, **변형 재공격**으로 이식된 방어가 변형에도 통하는지 검증한다.

      ### ✅ 합격 기준
      원 공격의 변형을 재실행해 이식된 방어의 일반화(변형 커버)를 검증하고, 커버 못한 부분을 피드백한다.
    hint: "원 공격 변형 재실행(태그)으로 이식 방어의 일반화 검증 + 미커버 피드백. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-11-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          이식 지식 검증 — 변형 재공격으로 이식된 방어의 일반화를 검증하고 피드백.
        success_criteria:
          - "대상 IPS/WAF에 변형 재공격 흔적이 남고 고유 태그로 귀속됨"
          - "변형 재공격으로 이식 방어의 일반화를 검증"
          - "(설명) 미커버 부분을 피드백"
        acceptable_methods:
          - "변형 재공격 + 일반화 검증"
        negative_signs:
          - "변형 없이 동일 재공격만"

# ───────────────────────── BLUE (지식 이식·코칭) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 대응 지식 추출·서버 이식 (클라이언트→서버)

      Red 공격에서 얻은 **대응 지식**을 서버 자율 에이전트(Bastion)의 지식으로 이식한다.

      ### 무엇을
      - Red 공격을 분석해 탐지 지표·대응 절차를 **일반화된 지식**(탐지 룰·플레이북·KG 엔트리)으로 추출.
      - 클라이언트(사람/Claude Code)의 통찰을 서버 지식 형식(룰·플레이북)으로 변환·이식.
      - 이식된 지식이 재현·검증 가능하도록 명세.

      ### ✅ 합격 기준
      Red 공격 대응 지식을 일반화된 형식(룰·플레이북·KG)으로 추출·이식하고, 이식 절차를 명세한다.
    hint: "Red 공격→탐지 지표·대응 절차를 일반화(룰·플레이북·KG 엔트리)로 추출→서버 지식 형식으로 변환·이식. 이식 절차 명세."
    verify:
      type: "semantic"
      expect: "knowledge_transfer"
      semantic:
        intent: |
          지식 이식 — 사람/클라이언트의 대응 통찰을 서버 자율 에이전트의 지식(룰·플레이북·KG)으로 변환·이식.
        success_criteria:
          - "Red 공격 대응 지식을 일반화된 형식(룰·플레이북·KG)으로 추출"
          - "클라이언트→서버 이식 변환을 제시"
          - "(설명) 이식 지식의 재현·검증 명세를 제시"
        acceptable_methods:
          - "지식 추출 + 형식 변환 + 이식 명세"
        negative_signs:
          - "일반화 없이 단발 대응만"
          - "이식 형식·절차 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 코칭 루프·검증·안전 설계

      클라이언트→서버 **코칭 루프**를 설계한다.

      ### 무엇을
      - **코칭 루프**: 관찰→지식 추출→서버 이식→검증→피드백의 반복 구조.
      - **검증**: 이식 지식이 실제로 탐지/대응하는지 재현 검증(RED-2 피드백 반영).
      - **일반화**: 단발이 아닌 변형 커버(불변 특성 기반 지식).
      - **안전·감사**: 이식 지식의 안전성 검토(오탐·과차단), 지식 변경 감사.

      ### ✅ 합격 기준
      코칭 루프·검증·일반화·안전/감사를 제시하고 "사람의 통찰을 자율 시스템에 안전하게 이식하는 순환"
      원칙을 설명한다.
    hint: "코칭 루프(관찰→추출→이식→검증→피드백)+재현 검증+일반화(불변 특성)+안전 검토·감사. '통찰을 자율 시스템에 안전 이식' 원칙."
    verify:
      type: "semantic"
      expect: "coaching_loop"
      semantic:
        intent: |
          코칭 루프 — 관찰·이식·검증·피드백의 반복으로 자율 시스템을 사람 통찰로 개선하되 안전을 지킨다.
        success_criteria:
          - "코칭 루프(관찰→추출→이식→검증→피드백)를 제시"
          - "재현 검증과 일반화(변형 커버)를 제시"
          - "안전 검토(오탐·과차단)·감사를 제시"
          - "(설명) '통찰을 자율 시스템에 안전 이식하는 순환' 원칙 설명"
        acceptable_methods:
          - "코칭 루프 + 검증 + 일반화 + 안전/감사"
        negative_signs:
          - "검증·안전 없이 이식만"
          - "루프·피드백 없음"
