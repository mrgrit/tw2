id: "autonomous-systems-w15"
category: "autonomous-systems"
title: "[자율시스템 W15] 종합 평가: 전체 CPS 침투 vs 안전 우선 종합 방어 프로그램"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  종합 평가(캡스톤) — 한 학기 전체(드론·자율주행·GPS·로봇·ROS2·OT/ICS·V2X·AI 모델·인시던트 대응)를
  종합해, 대상 CPS 하나를 **전체 침투 평가**하고 **안전 우선 종합 방어 프로그램**을 설계한다.
  **설계·서술형**이다(semantic 채점). 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(전체 CPS 침투)와 Blue(안전 우선 방어 프로그램)를 모두 수행.
    • duel : Red 학생이 전체 침투를 제시하고, Blue 학생이 방어 프로그램으로 대응.

  ▸ 채점(중요) — **보고서의 종합 설계 품질**로 채점: 대상 CPS의 다중 표면을 연결한 사이버→물리 킬체인,
    3계층 매핑·안전 장치 우회 분석, 안전 우선 다층 방어·독립 안전 계층·거버넌스의 완결성. 근거 없는
    일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (전체 CPS 침투 평가) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 대상 CPS 전체 침투 킬체인 (사이버→물리)

      대상 CPS(드론·자율주행·로봇·ICS·커넥티드카 중 택1)를 골라, 학기 전체 기법을 **연결한 전체
      킬체인**을 설계한다.

      ### 무엇을
      - 진입(원격/통신/공급망)→내부 피벗→제어 조작(프로토콜/AI/펌웨어)→안전 장치 우회→물리 결과.
      - 3계층(사이버·브리지·물리) 매핑과 각 단계의 구체 기법.

      ### ✅ 합격 기준
      최소 4개 표면/기법을 연결한 전체 킬체인을 3계층 매핑과 함께 구체적으로 설계하고, 안전 장치 우회를
      포함한다.
    hint: "대상 CPS 택1 + 진입→피벗→제어 조작→안전 장치 우회→물리 결과, 4+ 기법 연결. 3계층 매핑·구체 기법."
    verify:
      type: "semantic"
      expect: "full_cps_killchain"
      semantic:
        intent: |
          전체 CPS 침투 킬체인 — 학기 전체 기법을 하나의 사이버→물리 경로로 종합.
        success_criteria:
          - "대상 CPS를 정하고 최소 4개 표면/기법을 연결"
          - "3계층(사이버·브리지·물리)으로 매핑"
          - "안전 장치 우회와 구체적 물리 결과를 포함"
        acceptable_methods:
          - "다중 기법 연결 전체 킬체인 + 3계층"
        negative_signs:
          - "기법 4개 미만 또는 연결 없음"
          - "안전 장치 우회·물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — CPS 침투 보고: 영향·위험 평가

      전체 침투를 **CPS 침투 보고서**로 정리한다: 각 발견의 사이버→물리 위험, 안전·인명 영향, 심각도,
      우선 수정 권고.

      ### ✅ 합격 기준
      발견을 사이버→물리 위험·안전 영향·심각도로 평가하고 우선 수정 권고를 담은 종합 보고서를 작성한다.
    hint: "발견별 사이버→물리 위험·안전/인명 영향·심각도 + 우선 수정 권고. CPS 침투 보고서."
    verify:
      type: "semantic"
      expect: "cps_pentest_report"
      semantic:
        intent: |
          CPS 침투 보고 — 발견을 안전 영향·심각도·권고로 의사결정에 연결.
        success_criteria:
          - "각 발견의 사이버→물리 위험·안전 영향을 평가"
          - "심각도를 부여"
          - "우선 수정 권고를 제시"
        acceptable_methods:
          - "위험·영향·심각도·권고 보고서"
        negative_signs:
          - "안전 영향·심각도 없이 나열만"

# ───────────────────────── BLUE (안전 우선 종합 방어 프로그램) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 안전 우선 종합 방어 아키텍처

      RED 전체 침투에 대응하는 **엔드투엔드 안전 우선 방어 아키텍처**를 설계한다.

      ### 무엇을
      - **통신·인증**: 링크/버스/OTA 서명·인증·무결성.
      - **항법·인식·모델**: 안티스푸핑·다중 항법·견고한 인식·모델 검증.
      - **분리·접근 통제**: 도메인/네트워크 분리·게이트웨이·최소 권한.
      - **독립 안전 계층**: SIS·페일세이프·비상 제동 등 보안과 독립된 물리 안전.
      - **탐지**: 사이버+물리 다층 탐지·정합성.

      ### ✅ 합격 기준
      통신/인증·항법/인식/모델·분리·독립 안전 계층·탐지를 아우르는 엔드투엔드 아키텍처를 RED 킬체인에
      매핑해 설계한다.
    hint: "통신 인증+항법/인식/모델 방어+도메인 분리+독립 안전 계층(SIS·페일세이프)+사이버+물리 탐지. RED 킬체인 매핑."
    verify:
      type: "semantic"
      expect: "cps_defense_arch"
      semantic:
        intent: |
          안전 우선 종합 방어 아키텍처 — 학기 전체 방어를 엔드투엔드로 종합하고 RED 킬체인에 매핑.
        success_criteria:
          - "통신/인증·항법/인식/모델 방어를 제시"
          - "분리·접근 통제와 독립 안전 계층을 제시"
          - "사이버+물리 다층 탐지를 제시하고 RED 킬체인 매핑"
        acceptable_methods:
          - "엔드투엔드 안전 우선 아키텍처 + 매핑"
        negative_signs:
          - "일부 표면만"
          - "독립 안전 계층 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — CPS 보안·안전 통합 프로그램·거버넌스

      아키텍처를 **실행 가능한 CPS 보안·안전 통합 프로그램**으로 만든다.

      ### 무엇을
      - **안전·보안 통합**: 안전(safety)과 보안(security)을 통합 거버넌스로(둘의 트레이드오프 조율).
      - **수명주기**: 설계 단계 보안·안전(Security/Safety by Design), 공급망·OTA·폐기까지.
      - **인시던트 대응·회복탄력성**: 안전 우선 IR(W14)·이중화·훈련.
      - **표준·규정**: ISO 21434(자동차)·IEC 62443(ICS)·안전 표준 준수.

      ### ✅ 합격 기준
      안전·보안 통합 거버넌스·수명주기·IR·표준 준수를 담은 프로그램을 제시하고, "안전과 보안을 통합해
      물리 안전을 최우선으로" 원칙을 설명한다.
    hint: "안전·보안 통합 거버넌스+수명주기(Security/Safety by Design)+안전 우선 IR·이중화+표준(ISO 21434·IEC 62443). '안전+보안 통합, 물리 안전 최우선' 원칙."
    verify:
      type: "semantic"
      expect: "cps_security_program"
      semantic:
        intent: |
          CPS 보안·안전 통합 프로그램 — 아키텍처를 거버넌스·수명주기·IR·표준의 실행 프로그램으로 종합.
        success_criteria:
          - "안전·보안 통합 거버넌스(트레이드오프 조율)를 제시"
          - "수명주기(Security/Safety by Design·공급망·OTA)를 제시"
          - "안전 우선 IR·회복탄력성·표준(ISO 21434·IEC 62443) 준수를 제시"
          - "(설명) '안전과 보안 통합, 물리 안전 최우선' 원칙 설명"
        acceptable_methods:
          - "통합 거버넌스 + 수명주기 + IR + 표준"
        negative_signs:
          - "보안만·안전 통합 관점 없음"
          - "수명주기·표준 언급 없음"
