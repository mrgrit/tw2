id: "agent-ir-adv-w10"
category: "agent-ir-adv"
title: "[에이전트IR고급 W10] DNS Exfiltration + AI 인코딩 vs 데이터 유출 탐지·차단"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 방화벽을 지나가는 **조용한 데이터 유출(DNS Exfiltration)** 과 AI 기반 인코딩·
  청킹을 다룬다. Red는 대상에 정찰·유출 시도 흔적을 남기고 유출 킬체인을 설계하며, Blue는 유출 탐지·
  차단을 설계한다.

  ▸ 채점 특성 — el34는 웹 진입 표면(Suricata/ModSec/Wazuh)을 관측한다. **관측 채점은 대상에 남는
    정찰·웹 공격 흔적**으로 하고, DNS 유출 기법은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(DNS 유출 킬체인)와 Blue(유출 탐지·차단)를 모두 수행.
    • duel : Red 학생이 유출 채널을 설계·정찰하고, Blue 학생은 탐지·차단으로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰·웹 공격(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (DNS 유출 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 데이터 수집 + 유출 채널 선택 설계

      대상 웹 침투 시도(고유 태그)로 흔적을 남기고, **유출할 데이터 수집과 채널(DNS) 선택**을 설계한다.

      ### 무엇을
      - 진입/수집: 웹 RCE로 민감 데이터 접근(개념).
      - **채널 선택**: DNS는 대개 아웃바운드 허용·검사 약함 → DNS 쿼리에 데이터를 실어 유출.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### ✅ 합격 기준
      대상에 공격 흔적을 남기고, 데이터 수집→DNS 채널 선택(허용·저검사)을 설계한다.
    hint: "웹 침투 시도(태그)+데이터 수집→DNS 채널 선택(아웃바운드 허용·검사 약함) 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-10-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          유출 채널 선택 — DNS의 허용·저검사 특성을 이용한 유출 채널을 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "데이터 수집→DNS 채널 선택을 설계"
          - "(설명) DNS가 유출에 유리한 이유를 설명"
        acceptable_methods:
          - "웹 흔적 + DNS 채널 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "채널 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — AI 인코딩·청킹·저속 유출 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **인코딩·청킹·저속 유출** 킬체인을 설계한다.

      ### 무엇을
      - 인코딩(base32/커스텀)·청킹(서브도메인 라벨에 분할)·저속(레이트 조절)으로 탐지 회피.
      - AI가 정상 트래픽 패턴을 모방·타이밍을 조절해 이상 탐지를 회피.

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 인코딩·청킹·저속·정상 모방 유출 킬체인과 탐지 회피 원리를 설계한다.
    hint: "정찰(태그)+인코딩(base32)·청킹(서브도메인 분할)·저속·정상 트래픽 모방 유출 킬체인·탐지 회피. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-10-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          AI 인코딩·저속 유출 — 인코딩·청킹·저속·정상 모방으로 탐지를 회피하는 유출 킬체인.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "인코딩·청킹·저속·정상 모방 유출 킬체인을 설계"
          - "(설명) 탐지 회피 원리를 설명"
        acceptable_methods:
          - "활동 흔적 + 인코딩/저속 유출 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "회피 설계 막연"

# ───────────────────────── BLUE (유출 탐지·차단) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — DNS 유출 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **DNS 유출 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·침투 확인.
      - DNS 유출 신호: 비정상적으로 긴/무작위 서브도메인·높은 NXDOMAIN·한 도메인에 대량 쿼리·엔트로피
        높은 라벨·비정상 레코드 타입(TXT/NULL).

      ### ✅ 합격 기준
      RED 공격을 탐지하고, DNS 유출 신호(긴 서브도메인·엔트로피·대량 쿼리)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+DNS 유출 신호(긴/무작위 서브도메인·NXDOMAIN·대량 쿼리·높은 엔트로피·TXT/NULL) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-10-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          DNS 유출 탐지 — 서브도메인 엔트로피·쿼리 패턴으로 유출을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "DNS 유출 신호(긴 서브도메인·엔트로피·대량 쿼리)를 설계"
          - "(설명) 저속 유출 탐지의 어려움을 언급"
        acceptable_methods:
          - "SIEM 탐지 + DNS 유출 신호"
        negative_signs:
          - "경보 근거 없음"
          - "DNS 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 유출 차단·데이터 보호 설계

      DNS 유출을 막는 **차단·데이터 보호**를 설계한다.

      ### 무엇을
      - **DNS 통제**: 내부 리졸버 강제·외부 DNS 차단·DNS 필터링/터널 탐지, 로깅.
      - **아웃바운드 통제**: 이그레스 방화벽·허용목록·프록시 강제(비정상 채널 차단).
      - **데이터 보호**: DLP·민감 데이터 최소화·암호화·접근 통제(유출해도 가치 제한).
      - **속도 대응**: 자동화 유출 속도에 맞춘 자동 차단·격리.

      ### ✅ 합격 기준
      DNS 통제·이그레스 통제·DLP·자동 대응을 제시하고 "유출 채널을 좁히고 데이터 가치를 제한" 원칙을 설명한다.
    hint: "내부 리졸버 강제·외부 DNS 차단·터널 탐지+이그레스 방화벽·프록시 강제+DLP·데이터 최소화·암호화+자동 차단. '채널 좁히고 가치 제한' 원칙."
    verify:
      type: "semantic"
      expect: "exfil_prevention"
      semantic:
        intent: |
          유출 차단·데이터 보호 — DNS/이그레스 통제·DLP로 유출을 좁히고 데이터 가치를 제한.
        success_criteria:
          - "DNS 통제(내부 리졸버·외부 차단·터널 탐지)를 제시"
          - "이그레스 통제(방화벽·프록시)를 제시"
          - "DLP·데이터 보호·자동 대응을 제시하고 원칙 설명"
        acceptable_methods:
          - "DNS 통제 + 이그레스 + DLP + 자동 대응"
        negative_signs:
          - "DNS/이그레스 통제 없음"
          - "데이터 보호 없음"
