id: "wazuh-special-w02"
category: "wazuh-special"
title: "[Wazuh특강 W2] bastion 미션 흔적 생성 vs 미션 한 건의 일생 로그 추적"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  Wazuh 특강 공방전 — 자율 보안 에이전트(**bastion**) 관점에서, 공격 또는 대응 **미션 한 건의 전체
  일생(정찰→행동→탐지→대응)** 을 Wazuh 로그로 추적하는 능력을 다룬다. Red는 추적 대상 미션 흔적을
  만들고, Blue는 그 일생을 로그로 재구성한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(미션 흔적 생성)와 Blue(미션 일생 추적)를 모두 수행.
    • duel : Red 학생이 한 미션을 수행해 흔적을 남기고, Blue 학생이 그 일생을 추적한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)에 하나의 명확한 미션을
    수행한다. Red 채점은 **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + 보고서. 고유
    태그(`auto-red-<학번>`)로 귀속. Blue의 추적은 semantic.

  ▸ 관점 — bastion 미션은 시작→단계→결과→감사의 일생을 가진다. Wazuh에서 그 일생을 시간순으로
    재구성하면 "무엇이·언제·어떻게" 일어났는지 한 미션의 전 과정을 이해할 수 있다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (미션 흔적 생성) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 하나의 명확한 미션 수행 (일생 추적 대상)

      추적 가능한 **하나의 미션**(정찰→침투→결과)을 명확한 단계로 수행한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 정찰→웹 침투를 한 미션으로 수행(고유 태그).
      - 미션 시작·각 단계·종료 시각을 기록.

      ### 권장 명령 (참고)
      ```bash
      echo "MISSION START $(date)"
      nmap -sV -Pn 192.168.0.161 -p80,8007 --reason
      curl -A 'auto-red-<학번>-mission' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      echo "MISSION END $(date)"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 미션 단계·시각**(일생 추적 기준).

      ### ✅ 합격 기준
      정찰→침투의 한 미션을 명확한 단계로 수행해 대상에 흔적을 남기고, 시작·단계·종료 시각을 기록한다.
    hint: "정찰→웹 침투를 한 미션으로(태그 auto-red-<학번>-mission) + 시작·단계·종료 시각 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "wz-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          미션 흔적 생성 — 추적 가능한 한 미션의 일생(시작→단계→종료)을 명확히 남김.
        success_criteria:
          - "대상 WAF/IPS에 미션 흔적이 남고 고유 태그로 귀속됨"
          - "정찰→침투를 한 미션으로 수행"
          - "(설명) 시작·단계·종료 시각을 기록"
        acceptable_methods:
          - "한 미션 수행 + 단계·시각 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "단계·시각 기록 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 미션 결과·감사 관점 정리

      미션의 **결과와 감사 관점**을 정리한다: 무엇을 시도했고·무엇이 성공/차단됐고·어떤 흔적이 남았나.

      ### ✅ 합격 기준
      미션 결과(성공/차단)와 남은 흔적을 감사 관점으로 정리하고, 이 미션이 로그로 재구성 가능함을 제시한다.
    hint: "미션 결과(성공/차단)·남은 흔적을 감사 관점 정리 + 로그 재구성 가능성 제시. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "wz-2-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          미션 감사 관점 — 결과·흔적을 감사 관점으로 정리해 로그 재구성의 기준을 제공.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "미션 결과(성공/차단)와 남은 흔적을 감사 관점으로 정리"
          - "(설명) 로그로 재구성 가능함을 제시"
        acceptable_methods:
          - "결과·흔적 감사 정리"
        negative_signs:
          - "결과·흔적 정리 없음"

# ───────────────────────── BLUE (미션 일생 추적) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 미션 일생 재구성: 시작→단계→결과

      Wazuh에서 Red 미션의 **전체 일생을 시간순으로 재구성**한다.

      ### 어떻게
      - Wazuh(el34)에서 고유 태그·출처로 Red 미션 이벤트를 모두 찾아 시간순 정렬.
      - 정찰→침투→결과의 각 단계를 로그 근거로 재구성(미션 타임라인).

      ### ✅ 합격 기준
      Red 미션 이벤트를 시간순으로 재구성해 미션 일생(정찰→침투→결과) 타임라인을 만든다.
    hint: "Wazuh에서 고유 태그·출처로 미션 이벤트 전부 조회 → 시간순 정렬 → 정찰→침투→결과 타임라인 재구성."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "wz-2-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          미션 일생 재구성 — 미션 이벤트를 시간순으로 묶어 정찰→침투→결과 타임라인을 복원.
        success_criteria:
          - "Wazuh에서 고유 태그·출처로 미션 이벤트를 조회"
          - "시간순으로 미션 일생(정찰→침투→결과)을 재구성"
          - "(설명) 각 단계를 로그 근거로 제시"
        acceptable_methods:
          - "미션 이벤트 조회 + 타임라인 재구성"
        negative_signs:
          - "경보 근거 없음"
          - "타임라인·단계 재구성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 미션 추적 방법론·감사 관점 설계

      한 미션을 추적하는 **재사용 가능한 방법론과 감사 관점**을 설계한다.

      ### 무엇을
      - **추적 방법론**: 미션 식별자(태그·출처)로 이벤트 수집→시간순 정렬→단계 매핑→결과 판정의 절차.
      - **감사 관점**: 미션의 무결성(모든 단계가 기록됐나)·귀속(누가)·결과(무엇이 일어났나).
      - **bastion 연계**: 자율 에이전트 미션도 같은 방식으로 추적(행동→감사 로그)됨을 설명.
      - **재사용**: 저장 쿼리·타임라인 템플릿으로 다른 미션에도 적용.

      ### ✅ 합격 기준
      미션 추적 절차·감사 관점·bastion 연계·재사용을 제시하고 "미션 한 건의 일생을 완결적으로 추적"
      원칙을 설명한다.
    hint: "추적 절차(식별자→수집→정렬→단계 매핑→결과)+감사 관점(무결성·귀속·결과)+bastion 미션 연계+저장 쿼리·템플릿 재사용. '미션 일생 완결 추적' 원칙."
    verify:
      type: "semantic"
      expect: "mission_tracing"
      semantic:
        intent: |
          미션 추적 방법론 — 미션 일생을 완결적으로 추적하는 절차·감사 관점을 재사용 가능하게 설계.
        success_criteria:
          - "추적 절차(식별자→수집→정렬→단계 매핑→결과)를 제시"
          - "감사 관점(무결성·귀속·결과)을 제시"
          - "bastion 미션 연계와 저장 쿼리·템플릿 재사용을 제시"
          - "(설명) '미션 한 건의 일생을 완결적으로 추적' 원칙 설명"
        acceptable_methods:
          - "추적 절차 + 감사 관점 + bastion 연계 + 재사용"
        negative_signs:
          - "일회성 조회만·방법론 없음"
          - "감사 관점 언급 없음"
