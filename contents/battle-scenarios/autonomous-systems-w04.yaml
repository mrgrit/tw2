id: "autonomous-systems-w04"
category: "autonomous-systems"
title: "[자율시스템 W4] 드론 탐지·지오펜스 회피 vs 드론 탐지·RF 분석·지오펜싱 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  드론 방어(카운터 드론) 공방전 — **드론 탐지·RF 분석·지오펜싱**의 방어와 그 회피를 설계·분석한다.
  실물 드론·RF가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(탐지·지오펜스 회피)와 Blue(카운터 드론 탐지·지오펜싱)를 모두 수행.
    • duel : Red 학생이 회피 경로를 제시하고, Blue 학생이 탐지·지오펜싱으로 대응.

  ▸ 채점(중요)
    실물이 없으므로 **보고서의 설계 품질**로 채점 — 탐지/지오펜스 회피의 구체성, 카운터 드론 탐지(RF·
    레이더·음향·시각)·지오펜싱의 구체성·다중성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (탐지·지오펜스 회피) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 카운터 드론 탐지 회피 경로

      카운터 드론 탐지(RF·레이더·음향·시각)를 **회피**하는 경로를 설계한다.

      ### 무엇을
      - 각 탐지 방식의 원리와 회피 착안: RF(저전력·주파수 도약·자율비행으로 링크 최소화), 레이더(저고도·
        지형 이용·소형), 음향(저소음), 시각(야간·소형·위장).
      - 단일 회피가 아닌 다중 탐지를 동시에 회피하기 어려움을 인지하고 최적 경로 설계.

      ### ✅ 합격 기준
      최소 2가지 탐지 방식의 원리와 구체적 회피 기법을 설계하고, 다중 탐지 동시 회피의 어려움을 논한다.
    hint: "RF(저전력·주파수 도약·링크 최소)·레이더(저고도·소형)·음향(저소음)·시각(야간·위장) 회피. 다중 탐지 동시 회피 난이도 논의."
    verify:
      type: "semantic"
      expect: "detection_evasion"
      semantic:
        intent: |
          카운터 드론 탐지 회피 — 각 탐지 방식의 원리를 이해하고 회피 기법을 설계. 다중 탐지의 상보성 인지.
        success_criteria:
          - "최소 2가지 탐지 방식(RF·레이더·음향·시각)의 원리를 설명"
          - "각 방식의 구체적 회피 기법을 설계"
          - "(설명) 다중 탐지 동시 회피의 어려움을 논함"
        acceptable_methods:
          - "방식별 원리 + 회피 기법 + 다중 탐지 논의"
        negative_signs:
          - "방식 하나만·원리 없음"
          - "회피 기법이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 지오펜스 우회 분석

      지오펜싱(비행 금지 구역 강제)을 **우회**하는 방법을 분석한다: GPS 스푸핑으로 위치 오인·펌웨어
      변조로 지오펜스 무력화·오프라인 지오펜스 DB 조작.

      ### ✅ 합격 기준
      지오펜스의 강제 메커니즘을 식별하고, GPS 스푸핑·펌웨어 변조·DB 조작 중 최소 2가지 우회 경로를
      구체적으로 분석한다.
    hint: "지오펜스 메커니즘(GPS 기반 위치·DB) 식별 + GPS 스푸핑·펌웨어 변조·DB 조작 2+ 우회 경로 분석."
    verify:
      type: "semantic"
      expect: "geofence_bypass"
      semantic:
        intent: |
          지오펜스 우회 — 지오펜스가 GPS·펌웨어·DB에 의존함을 악용해 무력화하는 경로 분석.
        success_criteria:
          - "지오펜스 강제 메커니즘(GPS 위치·펌웨어·DB)을 식별"
          - "최소 2가지 우회(GPS 스푸핑·펌웨어 변조·DB 조작)를 구체적으로 분석"
          - "(설명) 지오펜스가 단일 신호에 의존할 때의 약점을 언급"
        acceptable_methods:
          - "GPS 스푸핑·펌웨어·DB 우회 분석"
        negative_signs:
          - "우회 경로 1개·막연"

# ───────────────────────── BLUE (카운터 드론 탐지·지오펜싱) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 다중 센서 카운터 드론 탐지 설계

      RED의 회피에 강건한 **다중 센서 카운터 드론 탐지**를 설계한다.

      ### 무엇을
      - **다중 모달**: RF·레이더·음향·시각(EO/IR)을 융합해 단일 회피를 무력화(한 방식 회피해도 다른
        방식이 포착).
      - **RF 분석**: 제어 링크·텔레메트리 신호 특성으로 드론 식별·측위.
      - **융합·상관**: 센서 융합으로 오탐 감소·신뢰도 향상.

      ### ✅ 합격 기준
      RF·레이더·음향·시각 다중 센서 융합 탐지를 구체적으로 제시하고, 단일 회피를 다른 센서가 포착하는
      상보성을 설명한다.
    hint: "RF·레이더·음향·시각(EO/IR) 다중 모달 융합 + RF 신호 특성 식별 + 센서 융합 상관. 단일 회피를 다른 센서가 포착."
    verify:
      type: "semantic"
      expect: "counter_drone_detection"
      semantic:
        intent: |
          다중 센서 카운터 드론 탐지 — 다중 모달 융합으로 단일 회피를 무력화하고 신뢰도를 높인다.
        success_criteria:
          - "RF·레이더·음향·시각 중 다수 센서를 융합한 탐지를 제시"
          - "RF 신호 특성 기반 식별·측위를 제시"
          - "(설명) 센서 상보성(단일 회피를 다른 센서가 포착)을 설명"
        acceptable_methods:
          - "다중 모달 융합 + RF 분석 + 상관"
        negative_signs:
          - "단일 센서만"
          - "상보성·융합 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 강건한 지오펜싱·대응 설계

      우회에 강건한 **지오펜싱과 대응**을 설계한다.

      ### 무엇을
      - **강건한 지오펜싱**: 다중 항법(GPS+관성+지형)으로 스푸핑 저항, 서명된 지오펜스 DB·펌웨어 무결성.
      - **독립 강제**: 지오펜스를 통신·GPS와 독립적으로도 강제(다중 신호 합의).
      - **대응**: 침입 드론에 대한 단계적 대응(경고·재밍·포획, 법·안전 고려)과 오탐 대비.

      ### ✅ 합격 기준
      다중 항법 기반 스푸핑 저항 지오펜싱·서명 DB·독립 강제와 단계적 대응을 제시하고, "단일 신호 의존을
      피하라" 원칙을 설명한다.
    hint: "다중 항법(GPS+관성+지형) 스푸핑 저항+서명 DB·펌웨어 무결성+독립 강제(다중 합의)+단계적 대응. '단일 신호 의존 회피' 원칙."
    verify:
      type: "semantic"
      expect: "robust_geofencing"
      semantic:
        intent: |
          강건한 지오펜싱 — 다중 항법·서명·독립 강제로 우회에 저항하고 단계적 대응을 설계.
        success_criteria:
          - "다중 항법 기반 스푸핑 저항 지오펜싱을 제시"
          - "서명 DB·펌웨어 무결성·독립 강제(다중 합의)를 제시"
          - "침입 드론 단계적 대응·오탐 대비를 제시"
          - "(설명) '단일 신호 의존 회피' 원칙 설명"
        acceptable_methods:
          - "다중 항법 + 서명/무결성 + 독립 강제 + 대응"
        negative_signs:
          - "단일 GPS 의존 지오펜스만"
          - "독립 강제·대응 언급 없음"
