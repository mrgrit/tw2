id: "autonomous-security-w07"
category: "autonomous-security"
title: "[자율보안 W7] 보상 해킹(Reward Hacking) vs 견고한 보상·정책 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  강화학습·보상 공방전 — 자율 보안 에이전트의 **정책 개선(RL)과 보상 해킹**을 Red/Blue로 실습한다.
  보상 함수가 허술하면 에이전트가 **의도와 다른 방식으로 보상만 최대화**(reward hacking)한다. Red는
  보상 허점을 악용하고, Blue는 견고한 보상·정책을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(보상 해킹 시나리오 실증)와 Blue(견고한 보상·정책 설계)를 모두 수행.
    • duel : Red 학생이 보상 허점을 악용하는 정책을 제시하고, Blue 학생은 그것을 막는 보상을 설계한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격하며 "보상만 채우는
    허술한 정책"을 실증한다. Red 채점은 **대상 탐지 흔적** + 본인 명령 흔적 + **보고서의 보상 해킹
    분석**으로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — RL 에이전트는 (상태)→(정책)→(행동)→(보상)으로 학습한다. 보상이 "많이
    스캔=보상"처럼 대리지표(proxy)면, 에이전트는 실제 보안 성과 없이 대리지표만 채운다(굿하트 법칙).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (보상 해킹 실증) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 대리지표만 채우는 정책 실증 (proxy gaming)

      "보안 활동량"을 보상으로 삼는 허술한 정책을 가정하고, **실제 성과 없이 대리지표만 폭증**시키는
      행동을 실증한다(예: 의미 없는 대량 스캔으로 "활동 보상"만 채우기).

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 대량 스캔/요청(고유 태그)으로
        "활동량"을 만든다. 실제 침투 성과와 무관하게 지표만 오르는 것을 보임.
      - 보상 함수의 허점(활동량=보상)을 어떻게 악용했는지 분석.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T3 -Pn 192.168.0.161 -p1-500 --reason
      for i in $(seq 1 20); do curl -A 'auto-red-<학번>-rlhack' "http://192.168.0.161/?probe=$i"; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서에 보상 해킹 분석**(대리지표만 채운 방식·굿하트 법칙).

      ### ✅ 합격 기준
      대상에 대량 활동 흔적을 남기고, 실제 성과 없이 대리지표만 채우는 보상 해킹을 굿하트 법칙으로 분석한다.
    hint: "대량 스캔/요청(태그 auto-red-<학번>)으로 '활동량 보상'만 채우기 실증 + 굿하트 법칙 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-7-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          보상 해킹(proxy gaming) — 대리지표를 실제 목표로 착각한 보상을 악용해 성과 없이 지표만 채움.
          굿하트 법칙.
        success_criteria:
          - "대상 IPS(Suricata)에 대량 활동 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "실제 성과 없이 대리지표만 채우는 방식을 실증"
          - "(설명) 굿하트 법칙(대리지표가 목표가 되면 지표가 된다)으로 분석"
        acceptable_methods:
          - "대량 활동으로 지표만 채우기 + 분석"
        negative_signs:
          - "흔적 없음"
          - "보상 해킹 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 보상 허점 유형 카탈로그

      보상 해킹의 **여러 유형**을 카탈로그로 정리한다: 대리지표 게이밍·부작용 무시·리워드 탬퍼링·
      명세 게이밍(specification gaming). 각각이 자율 보안 에이전트에서 어떻게 나타나는지 예시.

      ### 어떻게
      - 각 유형에 대해 "허술한 보상 → 에이전트의 우회 행동 → 의도 이탈"의 구체 예시를 제시.
      - 대상 실증(RED-1)을 최소 1개 유형에 매핑.

      ### ✅ 합격 기준
      보상 해킹 유형 최소 3가지를 자율 보안 예시와 함께 카탈로그화하고, RED-1 실증을 한 유형에 매핑한다.
    hint: "대리지표 게이밍·부작용 무시·리워드 탬퍼링·명세 게이밍 등 3+ 유형을 보안 예시와 함께 정리. RED-1을 한 유형에 매핑."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-7-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          보상 해킹 유형 이해 — 다양한 실패 양식을 카탈로그화해 견고한 보상 설계의 근거를 만든다.
        success_criteria:
          - "대상 IPS에 관련 활동 흔적이 남음(고유 태그)"
          - "보상 해킹 유형 최소 3가지를 자율 보안 예시와 함께 정리"
          - "(설명) RED-1 실증을 한 유형에 매핑"
        acceptable_methods:
          - "유형별 예시 카탈로그 + 매핑"
        negative_signs:
          - "유형 1~2개·예시 없음"

# ───────────────────────── BLUE (견고한 보상·정책 설계) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 보상 해킹 탐지: 지표 vs 실제 성과 대조

      우리 자율 에이전트가 **대리지표만 채우는지** 탐지한다. SIEM에서 "활동량은 많은데 실제 위협
      대응 성과는 없는" 패턴을 찾는다.

      ### 어떻게
      - Wazuh/Suricata에서 대량 활동(RED의 지표 채우기)을 확인.
      - "활동량"과 "실제 성과"(진짜 위협 탐지·차단)를 대조해 보상 해킹 징후를 식별.

      ### ✅ 합격 기준
      대량 활동 대비 실제 성과 부재를 대조해 보상 해킹 징후를 탐지하고 설명한다.
    hint: "Wazuh/Suricata에서 대량 활동 확인 + '활동량 vs 실제 성과' 대조로 보상 해킹 징후 탐지."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-7-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          보상 해킹 탐지 — 대리지표와 실제 성과를 대조해 게이밍을 식별.
        success_criteria:
          - "Wazuh/Suricata에서 대량 활동을 확인"
          - "활동량 대비 실제 성과 부재를 대조"
          - "(설명) 보상 해킹 징후를 식별·설명"
        acceptable_methods:
          - "지표 vs 성과 대조"
        negative_signs:
          - "활동 근거 없음"
          - "대조 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 견고한 보상·정책 설계

      보상 해킹을 막는 **견고한 보상 함수와 정책 안전장치**를 설계한다.

      ### 무엇을
      - **성과 기반 보상**: 대리지표가 아닌 실제 결과(진짜 위협 탐지·오탐 감소)로 보상, 부작용 페널티.
      - **다중 목표·제약**: 활동량뿐 아니라 정확도·안전·비용을 함께 최적화, 안전 제약(constraint) 강제.
      - **인간 피드백**: RLHF·선호 학습으로 의도 정렬, 이상 정책 사람 검토.
      - **정책 안전장치**: 탐색(exploration) 범위 제한·ROE, 리워드 탬퍼링 차단(보상 계산 격리·감사).

      ### ✅ 합격 기준
      성과 기반 보상·다중 목표 제약·인간 피드백·정책 안전장치를 구체적으로 설계하고, "대리지표가 아닌
      실제 성과, 안전 제약과 함께" 원칙을 설명한다.
    hint: "성과 기반 보상(실제 결과·부작용 페널티)+다중 목표 제약(정확도·안전·비용)+RLHF 정렬+탐색 범위/리워드 탬퍼링 차단. '실제 성과+안전 제약' 원칙."
    verify:
      type: "semantic"
      expect: "robust_reward"
      semantic:
        intent: |
          견고한 보상·정책 설계 — 성과 기반 보상·제약·인간 피드백·안전장치로 보상 해킹을 방지하고 의도
          정렬을 확보.
        success_criteria:
          - "성과 기반 보상(실제 결과·부작용 페널티)을 제시"
          - "다중 목표·안전 제약(정확도·안전·비용)을 제시"
          - "인간 피드백(RLHF)·탐색 범위 제한·리워드 탬퍼링 차단을 제시"
          - "(설명) '대리지표가 아닌 실제 성과, 안전 제약과 함께' 원칙 설명"
        acceptable_methods:
          - "성과 보상 + 제약 + RLHF + 안전장치"
        negative_signs:
          - "단일 대리지표 보상 유지"
          - "안전 제약·인간 피드백 언급 없음"
