id: "ai-safety-w09"
category: "ai-safety"
title: "[AI안전 W9] 모델 보안: 모델 추출·추론 공격 vs 모델 보호"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  모델 보안 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 모델 도난(추출)·추론 공격과
  방어를 다룬다.
  ▸ 실측 — `/api/model/export`(무인증 모델 아티팩트 유출)·`/api/llm/config`(백엔드 구성)로 모델 정보가
    직접 샌다. Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic.
    윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 모델 아티팩트·구성 유출

      `/api/model/export`·`/api/llm/config`로 모델 아티팩트·백엔드 구성을 무인증 획득한다.

      ### 권장 명령
      ```bash
      curl -s http://192.168.0.161:8007/api/model/export
      curl -s http://192.168.0.161:8007/api/llm/config
      ```

      ### ✅ 합격 기준
      무인증으로 모델 아티팩트(weights_uri 등)·구성(model·backend)을 획득해 실제 값을 인용한다.
    hint: "/api/model/export(weights_uri)·/api/llm/config(model·backend) 무인증 획득. 실제 값 인용. 모델 탈취(LLM10)."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-9-1", type: "command_ran", target: "attacker", params: { pattern: "model" } }
      semantic:
        intent: "모델 추출 — 무인증 엔드포인트로 모델 아티팩트·구성을 탈취(LLM10)."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/model/export·/api/llm/config 호출 흔적이 남음"
          - "모델 아티팩트·구성의 실제 값을 인용"
          - "(설명) 모델 탈취 위험을 설명"
        acceptable_methods: ["export·config 무인증 획득"]
        negative_signs: ["실제 값 인용 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 추론 공격 분석 (질의 기반 추출·멤버십 추론)

      질의만으로 모델을 복제(기능 추출)하거나 특정 데이터가 학습/지식에 있는지 추론(멤버십 추론)하는
      경로를 분석한다. `/api/chat`·`/api/dataset` 질의 패턴으로 실증/논증.

      ### ✅ 합격 기준
      질의 기반 기능 추출 또는 멤버십 추론 경로를 분석하고 가능하면 dataset/chat 질의로 실증한다.
    hint: "질의 기반 기능 추출(입력→출력 수집)·멤버십 추론(특정 데이터 존재 확인). /api/chat·/api/dataset로 실증/논증."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-9-2", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "추론 공격 — 질의로 모델 기능·학습 데이터 존재를 추론."
        success_criteria:
          - "본인 인프라 명령 로그에 관련 호출 흔적이 남음"
          - "기능 추출 또는 멤버십 추론 경로를 분석"
          - "(설명) 가능하면 실제 질의로 실증"
        acceptable_methods: ["추출/추론 경로 분석 + 실증"]
        negative_signs: ["경로 없이 '가능'만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 모델 유출 표면 진단

      모델 유출 표면을 진단한다: 무인증 export/config, 질의 기반 추출 여지, 출력 정보량.

      ### ✅ 합격 기준
      무인증 모델 노출과 추출 여지를 증거로 진단한다.
    hint: "/api/model/export·/api/llm/config 무인증 노출 + 질의 추출 여지 증거 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-9-1", type: "command_ran", target: "attacker", params: { pattern: "model" } }
      semantic:
        intent: "모델 유출 표면 진단 — 무인증 노출·추출 여지를 증거로 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "무인증 모델 노출·추출 여지를 증거로 제시"
          - "(설명) LLM10·추론 공격으로 매핑"
        acceptable_methods: ["노출 증거 진단"]
        negative_signs: ["증거 없이 주장만"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 모델 보호 설계

      모델을 보호하는 방어를 설계한다: export/config 엔드포인트 제거·인증, 질의 레이트리밋·출력 정보
      제한(추출 방어), 워터마킹(도난 탐지), 멤버십 추론 완화(차등 프라이버시·출력 노이즈).

      ### ✅ 합격 기준
      엔드포인트 통제·추출 방어(레이트리밋·출력 제한)·워터마킹·추론 완화를 제시하고 "질의로도 모델을
      지킨다" 원칙을 설명한다.
    hint: "export/config 제거·인증+질의 레이트리밋·출력 제한+워터마킹+멤버십 추론 완화(DP·노이즈). '질의로도 보호' 원칙."
    verify:
      type: "semantic"
      expect: "model_protection"
      semantic:
        intent: "모델 보호 — 엔드포인트 통제·추출 방어·워터마킹으로 모델을 지킨다."
        success_criteria:
          - "export/config 엔드포인트 제거·인증을 제시"
          - "질의 레이트리밋·출력 제한(추출 방어)을 제시"
          - "워터마킹·멤버십 추론 완화를 제시"
          - "(설명) '질의로도 모델을 지킨다' 원칙 설명"
        acceptable_methods: ["엔드포인트 통제 + 추출 방어 + 워터마킹"]
        negative_signs: ["엔드포인트 노출 유지", "추출 방어 없음"]
