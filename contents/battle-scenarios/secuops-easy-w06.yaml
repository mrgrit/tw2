id: "secuops-easy-w06"
category: "secuops-easy"
title: "[보안운영입문 W6] 졸업 미션 — WAF 우회 공격 막아내기 + 한 공격을 세 장비에서 추적하기"
difficulty: "easy"
time_limit: 3000
battle_type: "1v1"
description: |
  보안운영 입문 과정의 **졸업 미션**이다. 지난 5주 동안 방화벽·IPS·WAF를 하나씩 배웠다. 이번 주는
  그 마지막 장비인 **WAF(ModSecurity)**를 끝까지 다루고, 6주의 핵심을 한자리에 모은다.

  ▸ 이야기
    외부 공격자가 평범한 공격은 WAF에 막히자 **위장 기법**(인코딩·대소문자·자동 스캐너)으로 우회를
    시도한다. 신입 운영자(너)는 WAF의 진짜 무기인 **변환(transform)**과 **다중 패턴 매칭(@pm)**,
    그리고 **안전한 룰 도입 절차(탐지→관찰→차단)**로 이를 막는다. 마지막으로, 같은 공격 하나가
    방화벽·IPS·WAF **세 장비에 어떻게 다르게 보이는지** 직접 추적해 "심층 방어"가 그림이 아니라
    실제로 작동함을 눈으로 확인한다.

  ▸ 모드
    • solo : 외부 공격자 → WAF 운영자를 한 학생이 차례로 수행. 대상=본인 인프라.
    • duel : Red가 상대 웹을 우회 공격, Blue가 본인 WAF로 방어. 대상=상대 인프라.

  ▸ 알아둘 점
    • 공격자는 **망 외부(외부 공격자 VM {{ATTACKER_IP}})**에 있어 그의 명령 기록은 수집되지 않는다. 그래서 Red 채점은
      **대상 WAF가 남긴 흔적(modsec audit)**으로 한다. 같은 시각 자동 스캐너 노이즈와 섞이지 않도록,
      **자기 공격에 고유 표식**(아래 RED 미션의 태그)을 반드시 붙여 "이게 내 공격"임을 증명한다.
    • Blue가 만든 커스텀 룰의 증거는 modsec audit에 남는 **고유 메시지 표식(EDU-W6-…)**이다. 이번 주
      표식은 ENC(인코딩 차단) / PM(스캐너 차단) / WATCH(탐지 전용)로 미션마다 다르다.

# ───────────── RED : 외부 공격자 — "위장으로 WAF를 뚫어라" ─────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 인코딩으로 위장한 XSS

      ### 상황
      평범한 `<script>`는 WAF에 바로 막힌다. 그래서 **URL 인코딩**(`%3Cscript%3E`)으로 같은 공격을
      위장해 WAF의 눈을 피하려 한다. 변환(transform)이 없는 WAF라면 이 위장에 뚫린다.

      ### 할 일
      대상 웹앱의 입력값에 **인코딩된 XSS**를 주입한다. 단, 자동 스캐너 노이즈와 구분되도록
      **요청에 너만의 고유 표식**을 함께 넣는다(예: 쿼리 파라미터 값에 `eduw6-<본인식별>`).
      ```bash
      # {{WEB_ENTRY}}는 상대(또는 본인) el34의 공개 진입점, Host로 웹앱을 지정
      curl -s -H "Host: dvwa.el34.lab" \
        "http://{{WEB_ENTRY}}/?q=eduw6-kim-%3Cscript%3Ealert(1)%3C/script%3E"
      ```

      ### 채점 방법
      외부 명령은 수집되지 않으므로, **대상 WAF audit에 남은 XSS(941) 탐지**로 채점한다. 제출 글에
      ① 어떤 파라미터에 ② 어떤 인코딩 페이로드를 ③ 어떤 고유 표식과 함께 보냈는지 적어야, 그 기록이
      너의 공격임이 증명된다.

      ### 합격 기준
      대상 WAF audit에 너의 고유 표식이 포함된 XSS 탐지가 남는다.
    hint: "인코딩 XSS(%3Cscript%3E) + 고유 표식. 채점: 대상 modsec audit의 XSS(941) + 너의 표식 서술."
    verify:
      type: "log_contains"
      expect: "XSS"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "XSS", since_sec: 1800 } }
      semantic:
        intent: |
          OWASP XSS / MITRE T1059.007 — 인코딩으로 위장한 반사형 XSS. 외부 공격자 모델이므로 대상
          ModSecurity audit(941 계열)으로 판정한다. 자동 스캐너(Nikto 등) 앰비언트 노이즈와 구분하려면
          학생이 고유 표식을 붙이고 그것을 서술해 자기 공격으로 귀속시켜야 한다.
        success_criteria:
          - "대상 modsec audit에 XSS(941) 탐지가 최근 존재"
          - "학생이 보낸 인코딩 페이로드·파라미터·고유 표식을 구체적으로 서술하고, 그 표식이 audit 기록과 일치"
        acceptable_methods:
          - "외부 공격자 VM({{ATTACKER_IP}})에서 curl로 %3Cscript%3E 등 인코딩 XSS + 고유 표식"
          - "onerror= 등 이벤트 핸들러 변형(대안)"
        negative_signs:
          - "표식 없이 보내 자동 스캐너 노이즈와 구분 불가(귀속 실패)"
          - "대상 WAF audit에 흔적 없음 / command_ran(외부 공격자 VM {{ATTACKER_IP}}) 의존"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 자동 스캐너로 무차별 탐색

      ### 상황
      손으로 하나씩 보내는 대신 **자동 취약점 스캐너**(nikto/sqlmap)로 수백 개의 공격 패턴을 한 번에
      쏟아붓는다. 스캐너는 자기 이름을 User-Agent에 노출하는 경우가 많아, WAF의 스캐너 탐지(CRS 913)에
      걸린다. 이 공격은 다음 BLUE-3(@pm 다중 차단)의 표적이 된다.

      ### 할 일
      대상 웹에 자동 스캐너를 돌린다(시간 제한을 두어 짧게).
      ```bash
      nikto -h http://{{WEB_ENTRY}}/ -maxtime 60s
      # 또는: curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" "http://{{WEB_ENTRY}}/?id=1"
      ```

      ### 채점 방법
      대상 WAF audit의 **스캐너 탐지(913, "security scanner")** 흔적으로 채점한다. 어떤 도구를
      썼는지 제출 글에 적는다.

      ### 합격 기준
      대상 WAF audit에 스캐너 탐지 흔적이 남는다.
    hint: "nikto/sqlmap UA 스캔. 채점: 대상 modsec audit의 scanner(913) 탐지."
    verify:
      type: "log_contains"
      expect: "scanner"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "scanner", since_sec: 1800 } }
      semantic:
        intent: |
          MITRE T1595.002 — 자동 취약점 스캐너. CRS 913(scanner detection)이 User-Agent로 탐지.
          외부 공격자 모델 → 대상 WAF audit의 scanner 탐지로 판정.
        success_criteria:
          - "대상 modsec audit에 scanner(913) 탐지가 최근 존재"
          - "어떤 스캐너를 어떤 표면에 돌렸는지 서술"
        acceptable_methods:
          - "외부 공격자 VM({{ATTACKER_IP}})에서 nikto / sqlmap / gobuster 등 자동 스캐너"
        negative_signs:
          - "대상 미도달 / 흔적 없음"

# ───────────── BLUE : WAF 운영자 — "변환과 절차로 막아라" ─────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — WAF가 "차단"하는 상태인지 먼저 확인

      ### 상황
      룰을 아무리 잘 짜도 WAF가 **탐지만(DetectionOnly)** 하는 상태면 공격은 그대로 통과한다. 방어의
      첫걸음은 WAF가 **실제 차단(On)** 모드인지 확인하는 것이다.

      ### 할 일
      웹 서버의 ModSecurity 설정에서 `SecRuleEngine` 값이 **On**(차단)인지 확인한다. DetectionOnly나
      Off면 운영에 부적합하다.

      ### 채점 방법
      web의 `/etc/modsecurity/modsecurity.conf`에 `SecRuleEngine On`이 있는지로 확인한다.

      ### 합격 기준
      modsecurity.conf에 `SecRuleEngine On`이 설정돼 있다.
    hint: "modsecurity.conf의 SecRuleEngine On 확인. On=차단, DetectionOnly=로그만."
    verify:
      type: "file_contains"
      expect: "SecRuleEngine On"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web",
            params: { path: "/etc/modsecurity/modsecurity.conf", pattern: "SecRuleEngine On" } }
      semantic:
        intent: "방어 태세 점검 — On(차단)이라야 SecRule이 실제 403 차단을 한다. On/DetectionOnly/Off 3모드 이해."
        success_criteria:
          - "modsecurity.conf에 SecRuleEngine On"
          - "On과 DetectionOnly의 차이(차단 vs 로그만)를 서술"
        acceptable_methods:
          - "file_contains modsecurity.conf / 콘솔의 정책 화면"
        negative_signs:
          - "DetectionOnly인데 차단으로 오해"

  - order: 2
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 변환(transform)으로 인코딩 위장을 무력화 (이번 주 핵심)

      ### 상황
      RED-1의 인코딩 XSS(`%3Cscript%3E`)는 글자 그대로 비교하면 안 잡힌다. WAF의 진짜 힘은
      **변환(transform)** — 매칭 전에 `t:urlDecodeUni`로 **먼저 디코딩**해 정상 형태로 되돌린 뒤
      비교하면, 어떤 인코딩 위장도 잡힌다.

      ### 할 일
      web 컨테이너의 `/etc/modsecurity/edu-custom.conf`에 **변환을 적용한 커스텀 SecRule**을 추가하고,
      적용 전 `apache2ctl configtest`로 검증 후 `graceful`로 안전하게 반영한다. 고유 표식은 **`EDU-W6-ENC`**.
      ```apache
      SecRule ARGS "@rx <script" \
        "id:9106002,phase:2,t:urlDecodeUni,t:lowercase,deny,status:403,log,\
         msg:'EDU-W6-ENC blocked encoded XSS',severity:'CRITICAL'"
      ```
      적용 후, **인코딩된** XSS(`?q=%3Cscript%3E…`)로 다시 접속하면 디코딩 후 매칭되어 **403 차단**되고
      audit에 `EDU-W6-ENC`가 남는다. (변환이 없을 때와 직접 비교해 보면 차이가 분명하다.)

      ### 채점 방법
      modsec audit에 **`EDU-W6-ENC` 표식이 있는 차단**이 남았는지로, '변환으로 인코딩 위장을 실제로
      막았음'을 확인한다.

      ### 합격 기준
      WAF audit에 `EDU-W6-ENC` 표식이 남고, 인코딩 XSS가 403으로 차단된다.
    hint: "ARGS @rx <script + t:urlDecodeUni + deny + msg:'EDU-W6-ENC…' → configtest+graceful → %3Cscript%3E 접속 → audit에 EDU-W6-ENC."
    verify:
      type: "log_contains"
      expect: "EDU-W6-ENC"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "EDU-W6-ENC", since_sec: 1800 } }
      semantic:
        intent: |
          MITRE D3FEND D3-WAF — transform(t:urlDecodeUni/t:lowercase)으로 인코딩·대소문자 위장을 정규화
          후 차단. WAF가 IPS와 다른 핵심 능력. '작성'이 아니라 '실제 차단'이 핵심이라 audit에 EDU-W6-ENC
          표식 + 403이 남아야 인정.
        success_criteria:
          - "modsec audit에 'EDU-W6-ENC' 표식이 있는 차단 트랜잭션(최근)"
          - "룰에 변환(urlDecodeUni)이 포함되고, 인코딩 위장이 실제로 차단됨을 확인"
          - "변환 있는 룰과 없는 룰의 결과 차이(통과 vs 차단)를 서술"
        acceptable_methods:
          - "edu-custom.conf에 t:urlDecodeUni deny 룰 작성 → configtest+graceful → 인코딩 공격 재현으로 403 확인"
        negative_signs:
          - "변환 없이 평문만 매칭(인코딩 위장 통과)"
          - "룰만 작성하고 EDU-W6-ENC audit 미확인"

  - order: 3
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-3 — @pm으로 여러 스캐너를 한 룰에 (운영 효율)

      ### 상황
      RED-2의 스캐너(nikto/sqlmap/nmap…)를 막겠다고 룰을 도구마다 따로 만들면 관리가 지옥이 된다.
      **@pm**(phrase match)은 여러 문구를 **한 룰**로 한 번에 매칭해, 스캐너 목록 관리를 쉽게 한다.
      User-Agent를 보고 차단하므로 헤더 단계(phase:1)에서 일찍 막는다.

      ### 할 일
      `edu-custom.conf`에 **@pm 다중 스캐너 차단 룰**을 추가한다. 고유 표식은 **`EDU-W6-PM`**.
      ```apache
      SecRule REQUEST_HEADERS:User-Agent "@pm sqlmap nikto nmap gobuster" \
        "id:9106003,phase:1,t:lowercase,deny,status:403,log,\
         msg:'EDU-W6-PM blocked scanner UA',severity:'CRITICAL'"
      ```
      configtest+graceful로 적용 후, 스캐너 UA로 접속하면 403 + audit에 `EDU-W6-PM`이 남는다.

      ### 채점 방법
      modsec audit에 **`EDU-W6-PM` 표식이 있는 차단**이 남았는지로 확인한다.

      ### 합격 기준
      WAF audit에 `EDU-W6-PM` 표식이 남고, 스캐너 UA가 403으로 차단된다.
    hint: "User-Agent @pm sqlmap nikto nmap gobuster + deny + msg:'EDU-W6-PM…' → graceful → 스캐너 UA 접속 → audit에 EDU-W6-PM."
    verify:
      type: "log_contains"
      expect: "EDU-W6-PM"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "EDU-W6-PM", since_sec: 1800 } }
      semantic:
        intent: |
          연산자 선택 — @pm(phrase match)으로 다중 스캐너 시그니처를 한 룰로 효율 관리. @contains를 4번
          쓰는 것보다 운영상 우월. '실제 차단'이 핵심 — audit에 EDU-W6-PM + 403.
        success_criteria:
          - "modsec audit에 'EDU-W6-PM' 표식이 있는 차단(최근)"
          - "@pm이 @contains 반복보다 나은 이유(목록 관리/성능) 서술"
        acceptable_methods:
          - "User-Agent @pm … deny 룰 → graceful → 스캐너 UA로 403 확인"
        negative_signs:
          - "룰만 작성하고 EDU-W6-PM audit 미확인"

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — 신규 룰은 "탐지 먼저, 차단은 나중에" (안전한 도입)

      ### 상황
      새로 만든 룰을 곧바로 `deny`로 켜면, 오탐으로 멀쩡한 사용자를 막아 사고가 난다. 그래서 신규 룰은
      먼저 **`pass`(탐지/로그만)**로 넣어 audit를 관찰하고, 오탐이 없음을 확인한 뒤 `deny`로 바꾼다.

      ### 할 일
      `edu-custom.conf`에 **탐지 전용(pass) 룰**을 추가한다. 고유 표식은 **`EDU-W6-WATCH`**.
      ```apache
      SecRule ARGS "@contains edu_probe_w6" \
        "id:9106004,phase:2,t:none,pass,log,\
         msg:'EDU-W6-WATCH detect-only sample',severity:'NOTICE'"
      ```
      적용 후 `?x=edu_probe_w6`로 접속하면 **요청은 통과(차단 아님)**하지만 audit에 `EDU-W6-WATCH`가
      기록된다(관찰용).

      ### 채점 방법
      modsec audit에 **`EDU-W6-WATCH` 표식**이 남았는지로, 'pass(탐지) 모드를 이해·적용했음'을 확인한다.

      ### 합격 기준
      WAF audit에 `EDU-W6-WATCH` 표식이 남고(차단이 아닌 탐지 로그), 해당 요청은 통과한다.
    hint: "ARGS @contains edu_probe_w6 + action=pass + log + msg:'EDU-W6-WATCH…' → graceful → 그 패턴 접속(통과) → audit에 EDU-W6-WATCH."
    verify:
      type: "log_contains"
      expect: "EDU-W6-WATCH"
      checks:
        - { id: "blue-4-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "EDU-W6-WATCH", since_sec: 1800 } }
      semantic:
        intent: |
          안전한 룰 도입 절차 — pass(탐지)→관찰→deny(차단). 신규 룰을 곧장 차단하지 않고 오탐을 먼저
