  - order: 5
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-5 — 졸업 종합: 한 공격, 세 장비의 서로 다른 흔적

      ### 상황
      6주의 마무리다. **같은 공격 하나**(자동 스캐너 + SQLi)를 흘려보내고, 그 하나가 세 장비에 **어떻게
      다르게 보이는지** 직접 추적한다. 이것이 "심층 방어"의 실체다.
      - **방화벽**: IP·포트만 보므로 정상 80포트 요청은 통과시킨다(연결 자체는 기록).
      - **IPS(Suricata)**: 패킷 속 문자열(스캐너 UA·UNION)을 발견해 **eve.json에 alert**를 남긴다.
      - **WAF(ModSecurity)**: HTTP 구조를 이해해 **audit에 탐지/차단**을 남긴다.

      세 장비는 같은 공격을 **다른 관점**(IPS=네트워크 문자열, WAF=HTTP 의미)으로 본다. 겹치는 웹
      구간은 이중으로 막고, 안 겹치는 구간은 서로 보완한다.

      ### 할 일
      스캐너 UA + SQLi 공격을 한 번 흘려보낸 뒤, **IPS(suricata)와 WAF(modsec) 두 곳에서 같은 공격의
      흔적**을 각각 찾아 비교한다. (방화벽 연결 기록은 설명으로 보강한다.)

      ### 채점 방법
      본인 **IPS에 스캔/공격 alert**와 **WAF audit에 공격 탐지**가 둘 다 남았는지로, 한 공격이 두 장비에
      서로 다르게 기록됨을 확인한다.

      ### 합격 기준
      본인 IPS(suricata)에 alert가, WAF(modsec) audit에 공격 탐지가 모두 최근에 남아 있다.
    hint: "스캐너+SQLi 한 번 → IPS suricata alert + WAF modsec 탐지 두 흔적 비교. 방화벽은 설명 보강."
    verify:
      type: "log_contains"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "alert", since_sec: 1800 } }
        - { id: "blue-5-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "scanner", since_sec: 1800 } }
      semantic:
        intent: |
          심층 방어 종합(6주 finale) — 한 공격을 IPS(네트워크 문자열)와 WAF(HTTP 의미) 두 관점에서
          추적하고, 방화벽이 왜 정상 80포트를 통과시키는지 이해. 한 겹이 놓쳐도 다음 겹이 잡는다.
        success_criteria:
          - "본인 IPS(suricata)에 최근 alert, WAF(modsec) audit에 공격 탐지 모두 존재"
          - "같은 공격이 IPS와 WAF에 어떻게 다르게 보이는지 서술"
          - "방화벽은 왜 정상 80포트 웹 요청을 통과시키는지 서술"
        acceptable_methods:
          - "스캐너+SQLi 한 번 재현 후 IPS eve.json과 WAF audit 양쪽 흔적 확인"
        negative_signs:
          - "한 장비 흔적만 확인(세 장비 관점 차이를 설명 못함)"
          - "수집이 비어있음"
