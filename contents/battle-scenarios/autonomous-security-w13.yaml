id: "autonomous-security-w13"
category: "autonomous-security"
title: "[자율보안 W13] 분산 지식 오염 공격 vs 다중 에이전트 지식 공유·동기화 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  분산 지식 아키텍처 공방전 — 여러 자율 에이전트가 **지식을 공유·동기화**할 때의 공격/방어를 다룬다.
  한 에이전트의 오염된 지식이 동기화로 전파되면 전체가 오판한다. Red는 지식 오염·전파를 노리고, Blue는
  신뢰 있는 지식 공유·동기화를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(분산 지식 오염 경로)와 Blue(신뢰 지식 공유·동기화)를 모두 수행.
    • duel : Red 학생이 지식 오염을 전파시키고, Blue 학생은 오염 탐지·동기화 무결성으로 막는다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격해 방어 에이전트가
    수집하는 지식(IOC·평판)에 **오염 신호**를 심으려 시도한다. Red 채점은 **대상 탐지 흔적** + 본인
    명령 흔적 + **보고서의 오염·전파 분석**으로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — 분산 에이전트는 KG·평판·IOC를 공유한다. 오염(거짓 IOC·평판 조작)이
    동기화로 전파되면 오탐/미탐이 확산된다. 출처 신뢰·합의·서명이 핵심.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (분산 지식 오염·전파) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 오염 신호 주입: 거짓 IOC·평판 조작 착안

      방어 에이전트들이 공유하는 지식(IOC·출처 평판)에 **오염 신호**를 심는 경로를 착안·시도한다. 예:
      정상 IP를 흉내내거나, 고유 태그로 특정 패턴을 반복해 "학습"을 유도.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 반복 패턴(고유 태그)을 주입해 방어가
        수집하는 지식에 신호를 남긴다.
      - 이 신호가 동기화로 전파되면 어떤 오판(오탐·차단 회피)이 생기는지 분석.

      ### 권장 명령 (참고)
      ```bash
      for i in $(seq 1 10); do curl -A 'auto-red-<학번>-poison' "http://192.168.0.161/?sig=benign$i"; done
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 오염·전파 분석**(무슨 신호를·어떻게 전파·무슨 오판).

      ### ✅ 합격 기준
      방어가 수집할 지식에 오염 신호를 남기고, 동기화 전파로 인한 오판 시나리오를 분석한다.
    hint: "반복 패턴(태그 auto-red-<학번>) 주입으로 방어 지식에 오염 신호 + 동기화 전파 오판 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-13-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          분산 지식 오염 — 공유 지식(IOC·평판)에 거짓 신호를 심어 동기화로 전파, 전체 오판 유도.
        success_criteria:
          - "대상 IPS(Suricata)에 오염 신호 흔적이 남고 고유 태그로 귀속됨"
          - "방어가 수집할 지식에 오염 신호를 남김"
          - "(설명) 동기화 전파로 인한 오판(오탐·회피) 시나리오 분석"
        acceptable_methods:
          - "오염 신호 주입 + 전파 오판 분석"
        negative_signs:
          - "흔적 없음"
          - "전파 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 동기화 신뢰 공격: 합의·출처 우회 착안

      분산 지식의 **동기화 신뢰 메커니즘**(출처 서명·합의·평판)을 우회하는 방법을 분석한다. 위조 출처·
      다수 위장(sybil)·오래된 지식 재생 등.

      ### ✅ 합격 기준
      동기화 신뢰 메커니즘(서명·합의·평판)을 우회하려는 공격 유형을 분석하고, 각각이 어떻게 오염을
      전파시킬 수 있는지 논증한다.
    hint: "위조 출처·sybil(다수 위장)·오래된 지식 재생 등 동기화 신뢰 우회 유형 분석 + 전파 논증."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-13-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          동기화 신뢰 우회 — 서명·합의·평판을 우회하는 공격(위조·sybil·재생)으로 오염 전파.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남음(고유 태그)"
          - "동기화 신뢰 우회 유형(위조 출처·sybil·재생)을 분석"
          - "(설명) 각 유형의 오염 전파 경로를 논증"
        acceptable_methods:
          - "신뢰 우회 유형 분석 + 전파 논증"
        negative_signs:
          - "우회 유형 없이 '오염 가능'만"

# ───────────────────────── BLUE (신뢰 지식 공유·동기화) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 오염 탐지: 이상 지식·평판 급변 식별

      공유 지식의 **오염을 탐지**한다. 평판 급변·모순 IOC·출처 이상을 식별한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED의 오염 신호(반복 패턴·위장)를 찾아 이상 지식 후보로 표시.
      - 정상 지식과 오염 신호를 구분하는 근거(출처 신뢰·일관성·급변)를 제시.

      ### ✅ 합격 기준
      오염 신호를 탐지하고, 정상 지식과 구분하는 근거(출처·일관성·급변)를 제시한다.
    hint: "Wazuh/Suricata에서 RED 오염 신호(반복·위장) 탐지 + 정상 지식과 구분 근거(출처 신뢰·일관성·급변)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-13-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          지식 오염 탐지 — 평판 급변·모순·출처 이상으로 오염을 식별. 동기화 전 검증.
        success_criteria:
          - "Wazuh/Suricata에서 RED 오염 신호를 탐지"
          - "정상 지식과 오염을 구분하는 근거를 제시"
          - "(설명) 동기화 전 검증의 필요성을 언급"
        acceptable_methods:
          - "오염 신호 탐지 + 구분 근거"
        negative_signs:
          - "오염 근거 없음"
          - "구분 근거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 신뢰 지식 공유·동기화 아키텍처 설계

      다중 에이전트 간 **신뢰 있는 지식 공유·동기화**를 설계한다.

      ### 무엇을
      - **출처 신뢰·서명**: 지식에 출처·서명 부여, 위조·부인 방지.
      - **합의·평판**: 여러 출처 교차 검증·평판 가중, sybil 저항(신원·비용).
      - **동기화 무결성**: 버전·해시체인으로 재생·변조 차단, 충돌 해소 규칙.
      - **오염 격리·롤백**: 오염 의심 지식 격리·검증 후 반영, 전파된 오염 롤백.

      ### ✅ 합격 기준
      출처 서명·합의/평판·동기화 무결성·오염 격리를 구체적으로 설계하고, "지식은 검증·합의 후 공유"
      원칙을 설명한다.
    hint: "출처 서명+합의·평판(교차 검증·sybil 저항)+동기화 무결성(버전·해시체인)+오염 격리·롤백. '검증·합의 후 공유' 원칙."
    verify:
      type: "semantic"
      expect: "distributed_knowledge_trust"
      semantic:
        intent: |
          신뢰 지식 공유·동기화 — 출처 서명·합의·무결성·오염 격리로 분산 지식의 신뢰를 보장.
        success_criteria:
          - "출처 신뢰·서명(위조·부인 방지)을 제시"
          - "합의·평판(교차 검증·sybil 저항)을 제시"
          - "동기화 무결성(버전·해시체인)·오염 격리·롤백을 제시"
          - "(설명) '지식은 검증·합의 후 공유' 원칙 설명"
        acceptable_methods:
          - "서명 + 합의/평판 + 무결성 + 오염 격리"
        negative_signs:
          - "검증 없는 맹목 동기화"
          - "합의·오염 격리 언급 없음"
