id: "ai-security-w12"
category: "ai-security"
title: "[AI보안활용 W12] Agent Daemon 상시 관제: 감시 사각지대 시험 vs explore·daemon·stimulate 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — bastion **Agent Daemon**(explore·daemon·stimulate 모드로 상시 자율 관제)을
  구축한다. Red는 상시 감시의 사각지대(타이밍·저강도)를 시험하고, Blue는 능동 관제 데몬을 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(감시 사각지대 시험)와 Blue(관제 데몬 설계)를 모두 수행.
    • duel : Red 학생이 사각지대를 노리고, Blue 학생이 상시 관제 데몬으로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 데몬 설계는 semantic.

  ▸ 관점 — Daemon은 사람이 안 볼 때도 상시 관제한다: explore(탐색)·daemon(주기)·stimulate(능동 자극)로
    사각지대를 줄인다. 단 cron 남용이 아닌 salience 기반이어야 한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (감시 사각지대 시험) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 상시 관제 타이밍 사각지대 시험

      상시 관제의 **타이밍 사각지대**(점검 주기 사이·저강도)를 노린 공격을 시험한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 저강도·간헐 공격(고유 태그)을 수행,
        주기적 관제 사이를 노린다.

      ### ✅ 합격 기준
      저강도·간헐 공격으로 상시 관제 타이밍 사각지대를 시험하고, 그럼에도 누적·능동 관제엔 걸릴 수 있음을
      분석한다.
    hint: "저강도·간헐 공격(태그)으로 점검 주기 사이 사각지대 노림 + 누적·능동 관제엔 걸림 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-12-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          관제 타이밍 사각지대 — 주기 사이·저강도로 상시 관제를 회피하려는 시험.
        success_criteria:
          - "대상 IPS/WAF에 간헐 공격 흔적이 남고 고유 태그로 귀속됨"
          - "저강도·간헐로 타이밍 사각지대를 시험"
          - "(설명) 누적·능동 관제엔 걸릴 수 있음을 분석"
        acceptable_methods:
          - "저강도·간헐 공격 + 사각지대 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "사각지대 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 능동 관제(stimulate) 우회 분석

      능동 자극(stimulate) 관제(방어가 먼저 프로브·유인)를 **우회**하려는 방법을 분석한다.

      ### ✅ 합격 기준
      능동 관제(stimulate)의 원리와, 공격자가 그것을 회피하려면 무엇이 필요한지 분석한다.
    hint: "능동 자극 관제(방어가 먼저 프로브·유인) 원리 + 우회 요건 분석. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-12-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          능동 관제 우회 — stimulate 관제의 원리와 회피 요건을 이해.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "능동 관제(stimulate) 원리를 분석"
          - "(설명) 우회 요건을 분석"
        acceptable_methods:
          - "능동 관제 원리 + 우회 요건"
        negative_signs:
          - "관제 원리 분석 없음"

# ───────────────────────── BLUE (관제 데몬 설계) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 상시 관제 데몬 실행 (누적·상관)

      Red의 저강도·간헐 공격을 **상시 관제 데몬**으로 잡는다.

      ### 어떻게
      - Wazuh/Suricata를 상시 관제(daemon)하며 시간 창 누적·엔티티 상관으로 저강도 공격 포착.
      - explore(관련 로그 탐색)로 놓친 신호를 능동 발굴.

      ### ✅ 합격 기준
      저강도·간헐 공격을 누적·상관으로 포착하고, 상시 관제·능동 탐색으로 사각지대를 줄임을 보인다.
    hint: "Wazuh/Suricata 상시 관제(daemon)+시간 창 누적·상관으로 저강도 포착+explore 능동 발굴."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-12-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          상시 관제 데몬 — 누적·상관·능동 탐색으로 저강도·간헐 공격을 포착.
        success_criteria:
          - "Wazuh/Suricata에서 저강도·간헐 공격을 누적·상관으로 포착"
          - "explore로 놓친 신호를 능동 발굴"
          - "(설명) 사각지대 축소를 설명"
        acceptable_methods:
          - "누적·상관 + 능동 탐색"
        negative_signs:
          - "경보 근거 없음"
          - "누적·상관 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Daemon 모드·salience·안전 설계

      Agent Daemon의 **모드·트리거·안전**을 설계한다.

      ### 무엇을
      - **모드**: explore(탐색)·daemon(주기 점검)·stimulate(능동 자극)를 목적에 맞게.
      - **salience 트리거**: cron 남용 금지 — 중요도(salience) 기반으로만 보고·행동(노이즈 억제).
      - **누적·상관**: 저강도·간헐을 시간 창 누적으로 포착.
      - **안전·자율성**: 능동 행동(자극·차단)은 승인·범위 제한, 감사.

      ### ✅ 합격 기준
      모드·salience 트리거·누적 상관·안전을 제시하고 "상시 관제는 salience 기반, 능동 행동은 통제와
      함께" 원칙을 설명한다.
    hint: "모드(explore·daemon·stimulate)+salience 트리거(cron 남용 금지)+누적·상관(저강도)+능동 행동 승인·범위·감사. 'salience 기반·능동 행동 통제' 원칙."
    verify:
      type: "semantic"
      expect: "daemon_design"
      semantic:
        intent: |
          Agent Daemon 설계 — 모드·salience·누적 상관·안전으로 상시 능동 관제를 안전하게 운영.
        success_criteria:
          - "모드(explore·daemon·stimulate)를 제시"
          - "salience 트리거(cron 남용 금지)를 제시"
          - "누적·상관과 능동 행동 안전(승인·범위·감사)을 제시"
          - "(설명) 'salience 기반·능동 행동 통제' 원칙 설명"
        acceptable_methods:
          - "모드 + salience + 누적 상관 + 안전"
        negative_signs:
          - "cron 남용·무차별 관제"
          - "능동 행동 통제·감사 없음"
