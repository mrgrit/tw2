id: "autonomous-security-w12"
category: "autonomous-security"
title: "[자율보안 W12] 자율 Red Agent 구축: 인가된 자율 공격 에이전트 vs 자율 봉쇄"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자율 Red 에이전트 공방전 — W02~W10의 원칙을 모아 **인가된 자율 공격 에이전트**를 구축한다. 핵심은
  자율성과 **ROE(교전 규칙) 강제**의 균형: 에이전트가 스스로 정찰·침투를 진행하되, 인가 범위·PoC·파괴/
  유출 금지를 절대 벗어나지 않게 한다. Blue는 이 자율 Red를 탐지·봉쇄한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율 공격 에이전트 구축·운영)와 Blue(자율 Red 탐지·봉쇄)를 모두 수행.
    • duel : Red 학생이 자율 공격 에이전트를 운영하고, Blue 학생은 탐지·봉쇄한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 자율 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + **보고서의 자율 Red 설계·ROE 강제**로 한다. 고유
    태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — 자율 Red = red-team-operator 페르소나 + ROE 가드레일 + 킬체인 Playbook +
    감사. 자율성이 커질수록 ROE 강제·감사·킬스위치가 더 중요하다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE 위반(파괴·유출·범위 초과)은 즉시 실패.

# ───────────────────────── RED (자율 공격 에이전트 구축·운영) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 자율 공격 에이전트 운영: 킬체인 자율 실행 + ROE 강제

      **자율 공격 에이전트**를 구축해 정찰→침투 킬체인을 자율 실행하되, ROE를 하드 게이트로 강제한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)을 킬체인 Playbook으로 자율 공격(고유 태그).
      - **ROE 가드레일**: 범위=대상 웹만, PoC 수준, 파괴/유출 금지 — 각 행동 전 ROE 검사 게이트를 통과.
      - 자율성 수준(어디까지 자율·어디부터 승인)과 킬스위치(중단 조건)를 명시.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-agent' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 자율 Red 설계**(킬체인 Playbook·ROE 게이트·자율성
      수준·킬스위치·감사).

      ### ✅ 합격 기준
      자율 공격 에이전트로 킬체인을 실행해 대상에 흔적을 남기고, ROE 하드 게이트·자율성 수준·킬스위치·
      감사를 설계·설명한다.
    hint: "킬체인 Playbook 자율 실행(태그 auto-red-<학번>) + 각 행동 전 ROE 게이트(범위·PoC·파괴/유출 금지)·자율성 수준·킬스위치·감사. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-12-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Red 에이전트 — 킬체인 자율 실행과 ROE 하드 게이트의 균형. 자율성이 커질수록 강제·감사가
          중요.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 자율 공격 흔적이 남고 고유 태그로 귀속됨"
          - "킬체인 Playbook 자율 실행을 수행"
          - "(설명) ROE 하드 게이트·자율성 수준·킬스위치·감사를 설계·설명"
        acceptable_methods:
          - "자율 킬체인 + ROE 게이트 + 킬스위치"
        negative_signs:
          - "흔적 없음"
          - "ROE 게이트·킬스위치 설명 없음 또는 ROE 위반"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — ROE 위반 방지·감사 트레일 검증

      자율 Red가 **ROE를 절대 벗어나지 않음**을 검증한다. 위험 행동(파괴·유출·범위 초과)을 시도하면
      게이트가 차단하는지, 모든 행동이 감사에 남는지 확인한다.

      ### 어떻게
      - ROE 경계 케이스(범위 밖·파괴성 행동)를 게이트가 차단하는지 설계·검증(실제 위반은 하지 않음).
      - 자율 실행의 감사 트레일(행동→해시체인)을 제시.

      ### ✅ 합격 기준
      ROE 경계 케이스에서 게이트가 차단함을 검증하고, 자율 실행의 감사 트레일 무결성을 제시한다.
    hint: "ROE 경계 케이스(범위 밖·파괴성)를 게이트가 차단하는지 설계·검증(실제 위반 금지) + 감사 트레일(해시체인) 제시."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-12-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          ROE 강제·감사 — 자율 Red의 안전성은 ROE 게이트가 위반을 차단하고 모든 행동이 감사에 남는 데서
          온다.
        success_criteria:
          - "대상 IPS에 관련 흔적이 남음(고유 태그)"
          - "ROE 경계 케이스에서 게이트 차단을 검증(실제 위반 없이)"
          - "(설명) 자율 실행 감사 트레일(해시체인) 무결성을 제시"
        acceptable_methods:
          - "ROE 게이트 검증 + 감사 트레일"
        negative_signs:
          - "실제 ROE 위반(윤리 위반)"
          - "감사 트레일 없음"

# ───────────────────────── BLUE (자율 Red 탐지·봉쇄) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 자율 Red 탐지: 자동화 공격 패턴 식별

      상대의 **자율 공격 에이전트**를 탐지한다. 자동화 공격은 사람과 다른 특징(일관 UA·규칙적 타이밍·
      Playbook 순서)이 있다.

      ### 어떻게
      - Wazuh/Suricata에서 RED의 자율 공격 흔적을 찾아 자동화 특징(태그·타이밍·순서)을 식별.
      - 사람 공격 vs 자동 에이전트를 구분하는 근거를 제시.

      ### ✅ 합격 기준
      자율 Red의 공격을 탐지하고, 자동화 특징(태그·타이밍·순서)으로 사람과 구분한다.
    hint: "Wazuh/Suricata에서 RED 자율 공격 흔적 + 자동화 특징(일관 태그·규칙 타이밍·Playbook 순서) 식별. 사람 vs 에이전트 구분."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-12-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Red 탐지 — 자동화 공격의 특징을 식별해 사람과 구분. 봉쇄의 전제.
        success_criteria:
          - "Wazuh/Suricata에서 RED 자율 공격을 탐지"
          - "자동화 특징(태그·타이밍·순서)을 식별"
          - "(설명) 사람 공격과 자동 에이전트를 구분하는 근거 제시"
        acceptable_methods:
          - "자동화 특징 식별 + 구분 근거"
        negative_signs:
          - "공격 근거 없음"
          - "자동화 특징 식별 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자율 Red 봉쇄·킬스위치 설계

      자율 공격 에이전트를 **봉쇄**하는 대응을 설계한다.

      ### 무엇을
      - **봉쇄**: 공격 출처(태그·IP) 차단, 자동화 특징 기반 레이트리밋·챌린지.
      - **속도 대응**: 자율 공격은 빠르므로 자동 봉쇄 게이트(고위험은 승인)로 신속 대응.
      - **적대적 자율성 대비**: 공격 에이전트가 우회·재시도하므로 다층·적응 방어.
      - **감사·정렬**: 봉쇄 조치 감사, 대응 정책이 실제 성과에 정렬.

      ### ✅ 합격 기준
      자동화 특징 기반 봉쇄·신속 대응 게이트·다층 방어·감사를 설계하고, "자율 공격에는 신속·다층
      자율 방어로" 원칙을 설명한다.
    hint: "출처 차단·자동화 기반 레이트리밋/챌린지+신속 봉쇄 게이트+적대적 자율성 대비 다층·적응+감사. '신속·다층 자율 방어' 원칙."
    verify:
      type: "semantic"
      expect: "autonomous_containment"
      semantic:
        intent: |
          자율 Red 봉쇄 — 자동화 특징 기반 신속·다층 자율 방어로 봉쇄. 적대적 자율성에 적응.
        success_criteria:
          - "자동화 특징 기반 봉쇄(출처 차단·레이트리밋·챌린지)를 제시"
          - "신속 대응 게이트(고위험 승인)·다층 적응 방어를 제시"
          - "봉쇄 감사·정책 정렬을 제시"
          - "(설명) '자율 공격에는 신속·다층 자율 방어로' 원칙 설명"
        acceptable_methods:
          - "봉쇄 + 신속 게이트 + 다층 적응 + 감사"
        negative_signs:
          - "느린 수동 대응만"
          - "다층·적응·감사 언급 없음"
