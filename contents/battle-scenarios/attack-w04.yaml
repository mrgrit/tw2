id: "attack-w04"
category: "attack"
title: "[공격기법 W4] SQL Injection(sqlmap·WAF 우회) vs SQLi 탐지·차단 분석"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격기법 4주차 — SQL Injection(OWASP A03). 공격자는 4종 SQLi 페이로드와 sqlmap 자동화/tamper 로
  데이터 추출을 시도하고 WAF(ModSecurity CRS 942)를 우회하려 한다. 방어자는 SQLi 시도를 탐지하고,
  어떤 페이로드가 차단(403)되고 어떤 것이 통과(200)했는지 분석한다.

  ▸ 모드: solo(공격자→SQLi 탐지 1인) / duel(Red 가 상대에 SQLi, Blue 가 본인 WAF 로 탐지/차단 분석). 대상=solo 본인 / duel 상대.
  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — SQLi 페이로드 4종 + sqlmap 자동화
      DVWA(8080)/JuiceShop 에 error/union/boolean/time-based SQLi 를 시도하고 sqlmap 으로 자동화한다.
      ```bash
      curl -s "http://192.168.0.161:8080/vulnerabilities/sqli/?id=1' UNION SELECT user,password FROM users-- -&Submit=Submit" --cookie "security=low; PHPSESSID=test"
      sqlmap -u "http://192.168.0.161:8080/vulnerabilities/sqli/?id=1&Submit=Submit" --cookie="security=low; PHPSESSID=test" --batch --dbs
      ```
      📌 채점: 외부 명령 미수집 → 대상 ModSecurity(CRS 942) SQLi 탐지. ✅ 합격: 대상 WAF audit 에 SQLi 탐지 다수.
    hint: "외부 공격자 VM(192.168.0.202) SQLi 4종+sqlmap. 채점: 대상 ModSec 942 SQLi 탐지."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "OWASP A03 / MITRE T1190 — SQLi 4종+sqlmap. 외부 공격자 모델 → 대상 ModSec 942 탐지로 판정."
        success_criteria: ["대상 ModSec audit 에 SQLi 탐지 다수(최근)", "(설명) 사용한 SQLi 타입/추출 시도"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) SQLi 페이로드/sqlmap --batch"]
        negative_signs: ["대상 WAF 흔적 없음", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — ModSec(CRS 942) 우회 시도 (tamper)
      sqlmap tamper(space2comment, between 등)나 인코딩으로 CRS 942 룰을 우회하려 시도한다. 우회에
      성공하면 페이로드가 403 이 아닌 200 으로 통과한다.
      ```bash
      sqlmap -u "...sqli/?id=1&Submit=Submit" --cookie="security=low; PHPSESSID=test" --batch \
             --tamper=space2comment,between --technique=BU
      ```
      📌 채점: 외부 명령 미수집 → 대상 ModSec audit 에 우회 시도/통과 흔적(차단 회피 페이로드 요청).
      ✅ 합격: 대상 WAF audit 에 우회 시도(다양 변형 SQLi) 흔적이 남는다.
    hint: "외부 공격자 VM(192.168.0.202) sqlmap --tamper 우회. 채점: 대상 ModSec audit 의 우회 시도 흔적."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "WAF 우회 — tamper/인코딩. 외부 공격자 모델 → 대상 ModSec audit 의 변형 SQLi 시도로 판정. '우회 성공'은 200 통과 여부로 별도 판단."
        success_criteria: ["대상 ModSec audit 에 변형 SQLi 시도(최근)", "(설명) 어떤 tamper 로 무엇을 우회하려 했는지 + 200/403 결과"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) sqlmap --tamper / 수동 인코딩"]
        negative_signs: ["대상 흔적 없음", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — WAF 차단 모드 확인
      SQLi 를 실제 차단(403)하려면 ModSecurity 가 On 이어야 한다. SecRuleEngine On 을 확인한다.
      ✅ 합격: 본인 web 의 ModSecurity 가 SecRuleEngine On 이다.
    hint: "본인 web 의 modsecurity.conf SecRuleEngine On 확인."
    verify:
      type: "file_contains"
      expect: "SecRuleEngine On"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web", params: { path: "/etc/modsecurity/modsecurity.conf", pattern: "SecRuleEngine On" } }
      semantic:
        intent: "차단 태세 — On 이라야 CRS 942 가 403 차단."
        success_criteria: ["SecRuleEngine On", "(설명) On/DetectionOnly 차이"]
        acceptable_methods: ["file_contains modsecurity.conf / waf-gui"]
        negative_signs: ["DetectionOnly 오해"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — SQLi 탐지·차단 분석 (CRS 942)
      본인 WAF audit 에서 RED 의 SQLi 를 분석한다 — 어떤 **942 룰 id** 가 어떤 **페이로드** 에 걸렸고,
      **차단(403) vs 통과(200)** 결과가 무엇인지 구체 식별한다. 우회된 페이로드가 있으면 식별한다.
      ✅ 합격: SQLi 탐지가 있고 룰 id/페이로드/응답코드를 구체 식별했다.
    hint: "본인 ModSecurity audit 에서 SQLi → 942 룰 id/페이로드/응답코드(403/200) 식별."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "MITRE D3FEND D3-WAF — 관측/분석. ModSec audit 실존 + 구체값(942 룰 id/페이로드/응답코드) 일치로 채점."
        success_criteria: ["SQLi 탐지 실존", "942 룰 id·페이로드·응답코드(403/200) 구체 식별(증거 일치)", "우회 페이로드 식별(있으면)"]
        acceptable_methods: ["waf-gui audit/log_contains modsec 분석"]
        negative_signs: ["구체값 없음/불일치", "차단/통과 구분 못함"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 13
    instruction: |
      ## 🛡️ BLUE-3 — SIEM 으로 SQLi 사건 종합
      SQLi 시도·우회 시도가 SIEM(Wazuh)으로 모여 한 사건으로 보이는지 확인하고, 공격자의 우회
      진화를 시간순으로 요약한다.
      ✅ 합격: 본인 SIEM 에 SQLi/웹공격 경보가 수집돼 있다.
    hint: "본인 Wazuh 에서 SQLi 경보 수집 + 우회 진화 시간순 종합."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — SQLi 사건이 Wazuh 로 수렴, 우회 진화 추적."
        success_criteria: ["SQLi/웹공격 경보 수집(최근)", "(설명) 우회 진화 시간순 종합"]
        acceptable_methods: ["siem wazuh_alert", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
