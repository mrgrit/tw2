id: "iot-security-w04"
category: "iot-security"
title: "[IoT보안 W4] 펌웨어 분석: 하드코딩 비밀·백도어 추출 vs 펌웨어 보안·SBOM"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  펌웨어 분석 공방전 — 추출한 펌웨어의 **언팩·하드코딩 비밀·백도어·정적 분석**과 펌웨어 보안을
  설계·분석한다. 실물 펌웨어 이미지·도구가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(펌웨어 정적 분석·비밀/백도어 추출)와 Blue(펌웨어 보안·SBOM)를 모두 수행.
    • duel : Red 학생이 펌웨어 분석 결과를 제시하고, Blue 학생이 펌웨어 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 언팩·파일시스템·비밀/백도어/취약 의존성 탐지 방법의
    구체성, 펌웨어 보안(비밀 제거·서명·SBOM·안전 업데이트)의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (펌웨어 정적 분석) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 펌웨어 언팩 → 하드코딩 비밀·백도어 탐지

      추출한 펌웨어 이미지를 언팩·분석해 **하드코딩 비밀·백도어**를 찾는 방법론을 설계한다.

      ### 무엇을
      - **언팩**: binwalk 등으로 파일시스템(squashfs 등)·커널·부트로더 분리.
      - **비밀 탐지**: 하드코딩 자격/키·인증서·기본 계정(/etc/passwd·shadow)·API 키.
      - **백도어 탐지**: 숨은 서비스·매직 패킷·디버그 계정·의심 바이너리.
      - 탐지 방법(문자열·엔트로피·파일 트리)을 명시.

      ### ✅ 합격 기준
      펌웨어 언팩·하드코딩 비밀 탐지·백도어 탐지 방법론을 구체적(도구·아티팩트·위치)으로 설계한다.
    hint: "binwalk 언팩→파일시스템/커널 분리→하드코딩 자격·키·기본 계정(passwd/shadow)·백도어(숨은 서비스·매직 패킷) 탐지. 도구·위치 명시."
    verify:
      type: "semantic"
      expect: "firmware_static_analysis"
      semantic:
        intent: |
          펌웨어 정적 분석 — 언팩·비밀/백도어 탐지 방법론으로 펌웨어의 숨은 취약을 찾는다.
        success_criteria:
          - "언팩(파일시스템·커널 분리) 방법을 구체적으로 설계"
          - "하드코딩 비밀·기본 계정 탐지 방법을 제시"
          - "백도어(숨은 서비스·매직 패킷·디버그 계정) 탐지를 제시"
        acceptable_methods:
          - "binwalk 언팩 + 비밀/백도어 탐지"
        negative_signs:
          - "도구·아티팩트 근거 없이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 취약 의존성·N-day 분석

      펌웨어의 **오래된 컴포넌트·라이브러리**(BusyBox·OpenSSL·커널 등)를 식별하고 알려진
      취약(N-day)을 매핑한다.

      ### ✅ 합격 기준
      펌웨어의 주요 컴포넌트 버전을 식별하는 방법과, 오래된 버전을 알려진 CVE(N-day)에 매핑하는 접근을
      구체적으로 설계한다.
    hint: "BusyBox/OpenSSL/커널 등 버전 식별(문자열·바이너리) → 알려진 CVE(N-day) 매핑. 취약 의존성 분석."
    verify:
      type: "semantic"
      expect: "firmware_ndays"
      semantic:
        intent: |
          펌웨어 취약 의존성 — 오래된 컴포넌트를 식별해 N-day에 매핑, 공급망 취약을 이해.
        success_criteria:
          - "펌웨어 컴포넌트 버전 식별 방법을 설계"
          - "오래된 버전을 알려진 CVE(N-day)에 매핑하는 접근을 제시"
          - "(설명) 펌웨어 업데이트 부재가 N-day 노출을 키움을 언급"
        acceptable_methods:
          - "컴포넌트 식별 + CVE 매핑"
        negative_signs:
          - "버전 식별·매핑 방법 없음"

# ───────────────────────── BLUE (펌웨어 보안·SBOM) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 펌웨어 비밀 제거·무결성 설계

      RED의 펌웨어 분석을 무력화하는 **비밀 제거·무결성**을 설계한다.

      ### 무엇을
      - **비밀 제거**: 하드코딩 자격/키 제거, 장치별 고유 자격·프로비저닝, 기본 계정 제거·강제 변경.
      - **백도어 제거**: 디버그 서비스·매직 패킷 제거, 최소 서비스.
      - **무결성**: 서명된 펌웨어·보안 부팅(W03 연계), 변조 탐지.

      ### ✅ 합격 기준
      비밀 제거·장치별 고유 자격·백도어 제거·펌웨어 서명을 제시하고 RED 분석 결과를 무력화함을 설명한다.
    hint: "하드코딩 비밀 제거·장치별 고유 자격·기본 계정 강제 변경+디버그/백도어 제거·최소 서비스+펌웨어 서명. RED 분석 무력화."
    verify:
      type: "semantic"
      expect: "firmware_secret_removal"
      semantic:
        intent: |
          펌웨어 비밀 제거·무결성 — 비밀/백도어 제거와 서명으로 정적 분석 가치를 없앤다.
        success_criteria:
          - "하드코딩 비밀 제거·장치별 고유 자격을 제시"
          - "기본 계정·백도어·불필요 서비스 제거를 제시"
          - "펌웨어 서명·무결성을 제시하고 RED 분석 무력화를 설명"
        acceptable_methods:
          - "비밀 제거 + 백도어 제거 + 서명"
        negative_signs:
          - "하드코딩 비밀 유지"
          - "서명·무결성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — SBOM·안전한 업데이트·수명주기 설계

      펌웨어 **공급망(SBOM)·안전한 업데이트·수명주기**를 설계한다.

      ### 무엇을
      - **SBOM**: 소프트웨어 자재명세로 컴포넌트·버전 추적, 신규 CVE 시 영향 신속 파악.
      - **안전한 업데이트(OTA)**: 서명·암호화 업데이트, 롤백 방지, 원자적 적용·복구.
      - **취약점 관리**: 정기 스캔·패치·EOL 정책.
      - **레거시**: 업데이트 불가 장치는 격리·모니터링·교체 계획.

      ### ✅ 합격 기준
      SBOM·서명 OTA·취약점 관리·수명주기를 제시하고 "펌웨어는 추적·서명·갱신 가능해야" 원칙을 설명한다.
    hint: "SBOM(컴포넌트 추적·CVE 영향)+서명 OTA·롤백 방지+정기 스캔·패치·EOL+레거시 격리. '추적·서명·갱신 가능' 원칙."
    verify:
      type: "semantic"
      expect: "firmware_sbom"
      semantic:
        intent: |
          펌웨어 공급망·수명주기 — SBOM·서명 OTA·취약점 관리로 지속 가능한 펌웨어 보안.
        success_criteria:
          - "SBOM(컴포넌트·버전 추적·CVE 영향)을 제시"
          - "서명·암호화 OTA·롤백 방지를 제시"
          - "취약점 관리·EOL·레거시 대응을 제시"
          - "(설명) '추적·서명·갱신 가능' 원칙 설명"
        acceptable_methods:
          - "SBOM + 서명 OTA + 취약점 관리 + 레거시"
        negative_signs:
          - "업데이트 메커니즘 없음"
          - "SBOM·수명주기 언급 없음"
