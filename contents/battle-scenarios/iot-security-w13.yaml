id: "iot-security-w13"
category: "iot-security"
title: "[IoT보안 W13] 자동차 보안: CAN·ECU·원격 공격 vs CAN 보안·도메인 분리·안전"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자동차 보안 공방전 — 커넥티드카의 **CAN 버스·ECU·원격 공격**과 방어를 설계·분석한다(IoT 관점의
  차량 입문). 실물 차량이 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(원격→CAN 공격)와 Blue(CAN 보안·안전)를 모두 수행.
    • duel : Red 학생이 공격 경로를 제시하고, Blue 학생이 CAN 보안·도메인 분리로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 원격 진입→CAN 인젝션→물리 경로의 구체성, CAN 보안·
    도메인 분리·독립 안전 계층의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 자동차 공격은 인명 위험. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (원격→CAN 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 원격 진입 → CAN 인젝션 → 안전 필수 제어

      원격 진입점에서 CAN으로 피벗해 안전 필수 기능을 조작하는 경로를 설계한다.

      ### 무엇을
      - **원격 진입**: 텔레매틱스·인포테인먼트(BT/WiFi)·OBD-II 동글·앱 중 하나.
      - **피벗**: 게이트웨이를 넘어 안전 필수 CAN(파워트레인/섀시)으로 이동.
      - **CAN 인젝션**: CAN 무인증·브로드캐스트 → 위조 프레임으로 제동·조향·계기 조작.
      - 물리 결과.

      ### ✅ 합격 기준
      원격 진입→게이트웨이 피벗→CAN 인젝션→안전 필수 제어의 경로를 구체적(진입 벡터·CAN 특성 명시)으로
      설계한다.
    hint: "텔레매틱스/인포테인먼트/OBD 진입→게이트웨이 넘어 CAN 피벗→무인증 CAN 프레임 위조(제동/조향/계기)→물리. 진입·CAN 특성 명시."
    verify:
      type: "semantic"
      expect: "vehicle_can_attack"
      semantic:
        intent: |
          자동차 원격→CAN 공격 — 원격 진입에서 CAN으로 피벗해 안전 필수 기능을 조작하는 경로를 이해.
        success_criteria:
          - "원격 진입점(텔레매틱스·인포테인먼트·OBD)을 명시"
          - "게이트웨이 피벗과 CAN 무인증 인젝션을 설계"
          - "물리 결과(제동·조향·계기)로 이어짐을 서술"
        acceptable_methods:
          - "원격 진입 → 피벗 → CAN 인젝션 → 물리"
        negative_signs:
          - "진입·CAN 근거 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — CAN·ECU 신뢰 모델 취약 분석

      CAN(무인증 브로드캐스트·버스 오프)과 ECU(무서명 펌웨어·진단 접근)의 취약을 분석한다.

      ### ✅ 합격 기준
      CAN 무인증·브로드캐스트·버스 오프 DoS와 ECU 취약(무서명 펌웨어·진단 남용) 중 최소 2가지를
      분석하고 조작 가능성을 설명한다.
    hint: "CAN 무인증·브로드캐스트·버스 오프 DoS+ECU 무서명 펌웨어·UDS 진단 남용. 2+ 취약·조작 가능성."
    verify:
      type: "semantic"
      expect: "can_ecu_trust"
      semantic:
        intent: |
          CAN·ECU 취약 — 무인증 브로드캐스트와 무서명 펌웨어·진단 남용이 조작을 허용함을 이해.
        success_criteria:
          - "CAN 무인증·브로드캐스트·버스 오프 취약을 분석"
          - "ECU 취약(무서명 펌웨어·진단 남용)을 분석"
          - "(설명) 조작·DoS 가능성을 설명"
        acceptable_methods:
          - "CAN + ECU 취약 분석"
        negative_signs:
          - "취약 1개·프로토콜 근거 없음"

# ───────────────────────── BLUE (CAN 보안·안전) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — CAN IDS·이상 탐지 설계

      CAN 인젝션을 **탐지**하는 방안을 설계한다.

      ### 무엇을
      - **CAN IDS**: 메시지 주기·ID·페이로드 이상, 동일 ID 충돌·버스 부하 이상.
      - **물리 정합성**: CAN 명령과 실제 차량 상태(속도·조향각) 불일치.
      - **진입 탐지**: 텔레매틱스/인포테인먼트 이상 접근·게이트웨이 통과 이상.

      ### ✅ 합격 기준
      CAN IDS(주기·ID·페이로드)·물리 정합성·진입 탐지를 제시하고 RED 경로에 매핑한다.
    hint: "CAN IDS(주기·ID·페이로드·충돌·버스 부하)+물리 정합성(명령 vs 상태)+진입 탐지. RED 경로 매핑."
    verify:
      type: "semantic"
      expect: "vehicle_can_ids"
      semantic:
        intent: |
          CAN IDS — 메시지·물리·진입 신호로 CAN 인젝션을 탐지.
        success_criteria:
          - "CAN IDS(주기·ID·페이로드·충돌)를 제시"
          - "물리 정합성(명령 vs 상태)을 제시"
          - "진입 탐지를 제시하고 RED 경로 매핑"
        acceptable_methods:
          - "CAN IDS + 물리 정합성 + 진입 탐지"
        negative_signs:
          - "탐지 신호 막연"
          - "물리 정합성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — CAN 보안·도메인 분리·독립 안전 설계

      자동차의 **CAN 보안·도메인 분리·독립 안전**을 설계한다.

      ### 무엇을
      - **CAN 보안**: 메시지 인증(SecOC)·리플레이 방지, 안전 필수 버스 격리.
      - **도메인 분리·게이트웨이**: 인포테인먼트/텔레매틱스와 파워트레인/섀시 분리, 방화벽 게이트웨이.
      - **ECU 보안**: 서명 펌웨어·보안 부팅·진단 인증(UDS 보안 접근).
      - **독립 안전 계층**: 사이버가 뚫려도 물리 안전 한계(조향/제동 물리 한계·운전자 우선·페일세이프).

      ### ✅ 합격 기준
      CAN 인증(SecOC)·도메인 분리·ECU 서명·독립 안전 계층을 제시하고 "사이버가 뚫려도 물리 안전"
      원칙을 설명한다.
    hint: "CAN 인증(SecOC)·리플레이 방지+도메인 분리 게이트웨이+ECU 서명·보안 부팅·UDS 보안 접근+독립 안전 계층. '사이버 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "vehicle_defense"
      semantic:
        intent: |
          자동차 CAN 보안·도메인 분리 — 인증·분리·ECU 보안·독립 안전 계층으로 원격→물리 경로를 차단.
        success_criteria:
          - "CAN 인증(SecOC)·리플레이 방지·버스 격리를 제시"
          - "도메인 분리 게이트웨이(인포 vs 섀시)를 제시"
          - "ECU 서명·진단 인증과 독립 안전 계층을 제시"
          - "(설명) '사이버 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "CAN 인증 + 도메인 분리 + ECU 보안 + 독립 안전"
        negative_signs:
          - "도메인 분리 또는 독립 안전 계층 없음"
          - "CAN 인증 언급 없음"
