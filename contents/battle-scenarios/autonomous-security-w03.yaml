id: "autonomous-security-w03"
category: "autonomous-security"
title: "[자율보안 W3] 하니스 엔지니어링: 3단계 공격 파이프라인 vs 3단계 방어 처리"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  하니스 엔지니어링 공방전 — bastion의 **3단계 처리 흐름**(입력/전처리 → 추론/결정 → 실행/후처리)과
  하니스(가드레일·컨텍스트 조립·도구 게이트)를 Red/Blue로 실습한다. Red는 공격을 3단계 파이프라인으로
  구조화하고, Blue는 방어 처리 하니스를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(3단계 공격 파이프라인)와 Blue(3단계 방어 하니스)를 모두 수행.
    • duel : Red 학생이 파이프라인 공격을 수행하고, Blue 학생은 방어 하니스로 각 단계를 통제한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 3단계 파이프라인 설계**로
    한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — 하니스는 LLM을 감싸는 결정론적 골격이다: 입력 검증·컨텍스트 조립·도구
    게이트·출력 검증·감사. 자율성은 하니스 안에서만 허용된다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (3단계 공격 파이프라인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 입력→추론→실행 파이프라인으로 정찰·침투

      공격을 **3단계 파이프라인**으로 구조화해 수행한다: (1) 입력/전처리(목표·범위 정의, 정찰 데이터
      수집) → (2) 추론/결정(무엇을 어떻게 공격할지 결정) → (3) 실행/후처리(공격 실행·결과 정리).

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 el34(192.168.0.161)를 정찰·침투(고유 태그).
      - 각 행동을 3단계 중 어디에 속하는지 명시하며 진행.

      ### 권장 명령 (참고)
      ```bash
      nmap -sV -Pn 192.168.0.161 -p80,443,8007 --reason        # 1단계: 입력 수집
      curl -A 'auto-red-<학번>-pipeline' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"  # 3단계: 실행
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 3단계 파이프라인 매핑**(각 행동이 어느 단계인지, 왜).

      ### ✅ 합격 기준
      대상 IPS/WAF에 탐지 흔적이 남고, 공격을 입력→추론→실행 3단계로 구조화해 설명한다.
    hint: "정찰·침투를 입력(수집)→추론(결정)→실행 3단계로 매핑하며 대상 공격(태그 auto-red-<학번>). 채점=대상 Suricata/ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-3-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          3단계 처리 파이프라인 — 공격을 입력/전처리·추론/결정·실행/후처리로 구조화. bastion 처리 흐름 관점.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "(설명) 각 행동을 입력→추론→실행 3단계로 매핑"
          - "(설명) 단계 분리가 왜 통제·재현에 유리한지 설명"
        acceptable_methods:
          - "정찰(입력)→결정(추론)→공격(실행) 파이프라인"
        negative_signs:
          - "탐지 흔적 없음"
          - "3단계 매핑 없이 명령만"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 하니스 우회 착안: 가드레일·도구 게이트 회피

      방어 측 하니스(입력 검증·도구 게이트)를 **어떻게 우회**할지 착안한다. 인코딩·분할·타이밍으로
      단계별 게이트를 회피하는 방법을 분석·시도한다(WAF가 막으면 그 경계를 기록).

      ### 어떻게
      - 대상 WAF/IPS의 탐지 규칙을 자극해 어떤 패턴이 게이트에 걸리는지 관찰.
      - 인코딩/분할 등 우회를 시도해 게이트 경계를 매핑(성공/차단 기록).

      ### ✅ 합격 기준
      방어 하니스의 게이트를 자극·우회 시도해 경계를 실제 반응으로 매핑하고, 하니스가 어디서 막는지
      분석한다.
    hint: "WAF/IPS 게이트에 인코딩/분할 우회 시도해 차단/통과 경계 기록. 하니스가 어디서 막는지 분석."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-3-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          하니스 게이트 우회 분석 — 결정론적 하니스(게이트)의 경계를 자극·매핑. 방어 하니스의 강점·약점 이해.
        success_criteria:
          - "대상 IPS/WAF에 우회 시도 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "게이트 차단/통과 경계를 실제 반응으로 매핑"
          - "(설명) 하니스가 어디서 막는지 분석"
        acceptable_methods:
          - "인코딩/분할 우회 시도 + 경계 기록"
        negative_signs:
          - "시도 없이 '우회 가능'만 주장"

# ───────────────────────── BLUE (3단계 방어 처리 하니스) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 방어 하니스 1·2단계: 입력 검증·추론 게이트

      방어 처리 하니스의 앞 두 단계를 SIEM 경보에 적용한다: (1) 입력/전처리(경보 정규화·중복 제거·
      컨텍스트 조립) → (2) 추론/결정(트리아지·우선순위, LLM 판단은 게이트 안에서).

      ### 어떻게
      - Wazuh/Suricata에서 방금 공격 경보를 수집·정규화(입력 단계).
      - 컨텍스트(출처·심각도·과거 이력)를 조립해 위협 여부를 결정(추론 단계).
      - 각 단계의 게이트(무엇을 통과/차단)를 명시.

      ### ✅ 합격 기준
      공격 경보를 수집·정규화하고 컨텍스트 기반 트리아지 결정을 하며, 입력·추론 게이트를 설명한다.
    hint: "Wazuh/Suricata 경보 수집·정규화(입력)+컨텍스트 조립·트리아지 결정(추론). 각 단계 게이트 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          방어 하니스 입력·추론 — 경보 정규화·컨텍스트 조립·트리아지를 게이트로 구조화. bastion 처리 흐름.
        success_criteria:
          - "Wazuh/Suricata에서 공격 경보를 수집·정규화(입력 단계 증거)"
          - "컨텍스트 기반 트리아지 결정(추론 단계)을 제시"
          - "(설명) 입력·추론 게이트(통과/차단 기준)를 명시"
        acceptable_methods:
          - "경보 수집·정규화 + 컨텍스트 트리아지"
        negative_signs:
          - "경보 근거 없음"
          - "게이트 설명 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 방어 하니스 3단계: 실행 게이트·출력 검증·감사

      하니스의 마지막 단계(실행/후처리)를 설계한다: 대응 행동을 게이트로 통제하고, 출력을 검증하며,
      감사에 남긴다.

      ### 무엇을
      - **실행 게이트**: 대응 행동(차단·격리)은 위험도별 게이트 — 저위험 자율, 고위험 사람 승인.
      - **출력 검증**: 자동 생성된 대응(룰·명령)이 안전한지 검증 후 적용(오작동 방지).
      - **후처리·감사**: 대응 결과 기록·롤백 계획, append-only 감사 무결성.
      - **하니스 원칙**: LLM 자율성은 결정론적 게이트 안에서만.

      ### ✅ 합격 기준
      실행 게이트(위험도별 자율/승인)·출력 검증·감사를 구체적으로 설계하고, "자율성은 하니스 게이트
      안에서만" 원칙을 설명한다.
    hint: "실행 게이트(위험도별 자율/승인)+출력 검증(대응 안전성)+후처리·감사(롤백·무결성). '자율성은 게이트 안에서만' 원칙."
    verify:
      type: "semantic"
      expect: "defense_harness"
      semantic:
        intent: |
          방어 하니스 실행 단계 — 대응 게이트·출력 검증·감사로 자율 대응을 안전하게. 하니스가 자율성을 감쌈.
        success_criteria:
          - "실행 게이트(위험도별 자율/사람 승인)를 제시"
          - "출력 검증(자동 대응의 안전성 검증)을 제시"
          - "후처리·감사(롤백·무결성)를 제시"
          - "(설명) '자율성은 하니스 게이트 안에서만' 원칙 설명"
        acceptable_methods:
          - "실행 게이트 + 출력 검증 + 감사 설계"
        negative_signs:
          - "게이트 없이 완전 자율 대응"
          - "출력 검증·감사 언급 없음"
