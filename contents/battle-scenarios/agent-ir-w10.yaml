id: "agent-ir-w10"
category: "agent-ir"
title: "[에이전트IR W10] 기만·지연 능동 방어: 허니팟·타르핏 vs 기만 간파·비용 분석"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — **능동 방어(기만·지연)**: 허니팟·타르핏으로 공격 에이전트를 유인·지연시켜 비용을
  올리고 관찰한다. Red는 기만을 간파·회피하려 하고, Blue는 기만·지연 아키텍처를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(기만 간파)와 Blue(기만·지연 설계)를 모두 수행.
    • duel : Red 학생이 기만을 간파·회피하고, Blue 학생이 고품질 기만으로 유인·지연한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 탐색한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. 고유 태그(`auto-red-<학번>`)로 귀속. Blue의 기만 설계는
    self 기준 semantic.

  ▸ 에이전트 IR 관점 — AI는 빠르지만, 기만·지연은 그 속도를 역이용한다: 가짜 표면에 시간을 쓰게 하고
    (타르핏), 행동을 관찰(허니팟)해 인텔을 얻는다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (기만 간파·회피) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 기만 간파: 진짜 vs 가짜 표면 구분

      대상 표면을 탐색하며 **허니팟/가짜 표면 지표**를 찾는다(비현실적 응답·너무 쉬운 자격·일관성 부족).

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)의 여러 경로/서비스를 프로브(고유 태그)
        하며 진짜/가짜 지표를 수집.

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 기만 간파 지표**(무엇이 가짜로 의심되나·근거).

      ### ✅ 합격 기준
      표면을 프로브해 허니팟/기만 의심 지표를 최소 2가지 도출하고 진짜 vs 가짜 구분 근거를 제시한다.
    hint: "여러 경로/서비스 프로브(태그)하며 허니팟 지표(비현실 응답·너무 쉬운 자격·일관성 부족) 2+ 수집. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-10-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          기만 간파 — 허니팟/가짜 표면의 지표를 찾아 진짜와 구분하려는 공격자 관점.
        success_criteria:
          - "대상 IPS/WAF에 프로브 흔적이 남고 고유 태그로 귀속됨"
          - "허니팟/기만 의심 지표 최소 2가지를 도출"
          - "(설명) 진짜 vs 가짜 구분 근거를 제시"
        acceptable_methods:
          - "표면 프로브 + 기만 지표 도출"
        negative_signs:
          - "탐지 흔적 없음"
          - "지표·근거 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 타르핏·지연의 비용 분석

      기만/타르핏이 공격자에게 부과하는 **비용(시간·자원·불확실성)** 을 분석한다. 고품질 기만이 왜
      회피하기 어려운지 논한다.

      ### ✅ 합격 기준
      타르핏·기만이 부과하는 비용(시간 낭비·오판 위험·관찰됨)을 분석하고, 고품질 기만의 회피 한계를 논한다.
    hint: "타르핏/기만이 부과하는 비용(시간·자원·불확실성·관찰됨) 분석 + 고품질 기만 회피 한계 논의. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-10-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          기만 비용 분석 — 기만·지연이 공격자에게 부과하는 비용과 회피 한계를 이해.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "타르핏·기만의 비용(시간·자원·불확실성·관찰)을 분석"
          - "(설명) 고품질 기만의 회피 한계를 논함"
        acceptable_methods:
          - "비용 분석 + 회피 한계"
        negative_signs:
          - "비용 분석 없음"

# ───────────────────────── BLUE (기만·지연 능동 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 허니팟·기만 표면 배치·관찰

      공격 에이전트를 유인·관찰하는 **허니팟·기만 표면**을 설계·배치한다.

      ### 무엇을
      - **기만 표면**: 가짜 자격·가짜 엔드포인트·허니 토큰을 실제 표면과 섞어 배치(현실성).
      - **격리·안전**: 기만을 실제 자산과 격리(발판화 방지)·아웃바운드 통제.
      - **관찰**: 기만에 닿은 활동을 고신뢰 경보로 수집(정상 사용자는 안 닿음 → 오탐 거의 없음).

      ### ✅ 합격 기준
      현실적 기만 표면·격리·고신뢰 관찰을 제시하고 "기만 접촉=고신뢰 신호"를 설명한다.
    hint: "가짜 자격·엔드포인트·허니 토큰(현실성)+실자산 격리·아웃바운드 통제+기만 접촉=고신뢰 경보. '기만 접촉=고신뢰 신호'."
    verify:
      type: "semantic"
      expect: "honeypot_deployment"
      semantic:
        intent: |
          기만 표면 배치 — 현실적 허니팟·허니 토큰으로 고신뢰 관찰을 얻고 격리로 안전 유지.
        success_criteria:
          - "현실적 기만 표면(가짜 자격·엔드포인트·허니 토큰)을 제시"
          - "격리·안전(발판화 방지)을 제시"
          - "(설명) 기만 접촉이 고신뢰 신호임을 설명"
        acceptable_methods:
          - "기만 표면 + 격리 + 고신뢰 관찰"
        negative_signs:
          - "격리 없이 실자산 노출"
          - "현실성·관찰 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 타르핏·비용 부과·능동 방어 설계

      공격 에이전트의 속도를 역이용하는 **타르핏·비용 부과 능동 방어**를 설계한다.

      ### 무엇을
      - **타르핏·지연**: 느린 응답·무한 미로·가짜 데이터로 에이전트 시간·자원 소모.
      - **비용 부과**: 챌린지(PoW·CAPTCHA)·레이트리밋으로 자동화 비용↑.
      - **인텔·적응**: 관찰한 공격 패턴을 인텔로 축적, 실제 방어 룰(W09)에 반영.
      - **법·윤리 경계**: 기만은 유인만, 역공격(hack-back) 금지.

      ### ✅ 합격 기준
      타르핏·비용 부과·인텔 축적·윤리 경계를 제시하고 "AI 속도를 비용·지연으로 역이용" 원칙을 설명한다.
    hint: "타르핏·지연(느린 응답·미로·가짜 데이터)+비용 부과(PoW·챌린지·레이트리밋)+인텔 축적·룰 반영+역공격 금지. 'AI 속도를 역이용' 원칙."
    verify:
      type: "semantic"
      expect: "active_defense_design"
      semantic:
        intent: |
          타르핏·능동 방어 — 지연·비용 부과로 AI 속도를 역이용하고 인텔을 축적하되 윤리 경계를 지킨다.
        success_criteria:
          - "타르핏·지연(시간·자원 소모)을 제시"
          - "비용 부과(PoW·챌린지·레이트리밋)를 제시"
          - "인텔 축적·룰 반영과 윤리 경계(역공격 금지)를 제시"
          - "(설명) 'AI 속도를 비용·지연으로 역이용' 원칙 설명"
        acceptable_methods:
          - "타르핏 + 비용 부과 + 인텔 + 윤리 경계"
        negative_signs:
          - "역공격(hack-back) 제안"
          - "비용 부과·인텔 언급 없음"
