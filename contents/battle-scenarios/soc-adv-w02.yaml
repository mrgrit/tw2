id: "soc-adv-w02"
category: "soc-adv"
title: "[SOC고급 W2] SIEM 상관분석 — 다벡터 공격 vs 복합 탐지룰 설계"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  SOC 고급과정 2주차 — **SIEM 상관분석(correlation)**. 성숙한 SOC 는 경보 한 건이 아니라 **여러 경보의
  패턴**을 본다(동일 IP 가 짧은 시간에 여러 공격을 시도하는 등). 이번 공방전에서 공격자는 일부러 **두 가지
  웹 공격 벡터(SQLi·XSS)를 반복** 투입해 다벡터 패턴을 만들고, 관제팀(너)은 단일 룰이 아니라 **frequency/
  timeframe·same_source_ip 상관룰**로 그 패턴을 묶어 고위험으로 격상한다.

  ▸ 이야기
    공격자가 같은 출발지에서 SQLi 를 여러 번, XSS 를 여러 번 보낸다. 개별 시도는 흔한 노이즈처럼 보이지만,
    "같은 IP 가 1~2분 안에 SQLi+XSS 를 섞어 퍼붓는다"는 **상관 패턴**은 분명한 공격 캠페인이다. 관제팀은
    ① 반복 웹공격 상관룰, ② SQLi+XSS 복합 격상룰, ③ 내부 스캐너 오탐 예외룰을 만들고, ④ 네트워크+호스트
    교차 상관을 설계하고, ⑤ ATT&CK 커버리지·룰 테스트·보고서로 종합한다.

  ▸ 모드
    • solo : 한 학생이 공격(자기 인프라 표적)과 관제를 모두 수행. 공격 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라를 외부 공격, Blue 는 자기 인프라에서 상관 탐지.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    SQLi 태그 **`sa02r1-<본인id>`**, XSS 태그 **`sa02r2-<본인id>`**, Wazuh 상관룰 **id 102021**(반복 웹공격),
    **102022**(SQLi+XSS 복합 격상), **102023**(오탐 예외, level 0). 종료 시 일괄 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 [반복 SQLi] — 상관룰을 깨우는 다회 침투 시도

      ### 상황
      상관분석은 "반복"을 먹고 산다. 너는 같은 출발지에서 **태그 `sa02r1-<본인id>`** 를 붙인 UNION 기반 SQLi 를
      짧은 시간에 **여러 번(6회 이상)** 보낸다. 이 반복이 관제팀의 frequency 상관룰을 깨우는 입력이 된다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim) — 같은 명령을 6회 이상 반복(짧은 간격):
      ```bash
      for i in $(seq 1 8); do
        curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
          "http://192.168.0.161/vulnerabilities/sqli/?id=sa02r1-kim-$i%27%20UNION%20SELECT%20user,password%20FROM%20users--+&Submit=Submit"
        sleep 5
      done
      ```
      `192.168.0.161` = solo 면 본인, duel 이면 상대 인프라 IP.

      ### 채점 방법
      대상 WAF audit(modsec)에 **태그 `sa02r1` 가 포함된 SQLi 탐지(942 계열)** 가 (반복적으로) 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `sa02r1` 태그가 포함된 SQLi 탐지가 남는다(반복 시도일수록 상관 의도 명확).
    hint: "태그(sa02r1) UNION SQLi 를 6회 이상 반복 → 대상 modsec audit 942 + 태그. 반복이 BLUE frequency 상관룰의 입력."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "sa02r1", since_sec: 1800 } }
      semantic:
        intent: "다회 SQLi(T1190) — 동일 출발지 반복 시도로 상관 패턴 형성. 대상 WAF audit 으로 판정, 태그(sa02r1) 귀속. BLUE frequency 상관룰의 근거."
        success_criteria:
          - "대상 WAF audit 에 sa02r1 태그가 포함된 SQLi 탐지(942)"
          - "반복 횟수/간격과 페이로드를 보고서에 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 붙인 UNION SQLi 6회 이상 반복"
        negative_signs:
          - "단발성 / 태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 [반복 XSS] — 두 번째 벡터로 복합 캠페인 완성

      ### 상황
      상관 탐지의 진짜 표적은 "한 IP 가 **여러 종류**의 공격을 섞는" 패턴이다. RED-1 의 SQLi 에 더해, 이번엔
      **태그 `sa02r2-<본인id>`** 를 붙인 XSS 를 반복 투입한다. SQLi+XSS 가 한 출발지에서 섞이면 관제팀의
      복합 상관룰(level 12)이 발동한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim) — XSS 페이로드에 태그 포함, 여러 번:
      ```bash
      for i in $(seq 1 5); do
        curl -s -H "Host: dvwa.el34.lab" \
          "http://192.168.0.161/vulnerabilities/xss_r/?name=sa02r2-kim-$i<script>alert(1)</script>"
        sleep 5
      done
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 **태그 `sa02r2` 가 포함된 XSS 탐지(941 계열)** 가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `sa02r2` 태그가 포함된 XSS 탐지가 남는다.
    hint: "태그(sa02r2) <script> XSS 를 여러 번 → 대상 modsec audit 941 + 태그. SQLi(RED-1)+XSS(RED-2) 혼합이 복합 상관룰 표적."
    verify:
      type: "log_contains"
      expect: "941"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "sa02r2", since_sec: 1800 } }
      semantic:
        intent: "반사형 XSS(T1059 계열 웹) — 두 번째 공격 벡터. SQLi(RED-1)와 합쳐 동일 IP 다벡터 패턴 완성. 대상 WAF audit 941 + 태그(sa02r2) 귀속."
        success_criteria:
          - "대상 WAF audit 에 sa02r2 태그가 포함된 XSS 탐지(941)"
          - "RED-1 SQLi 와 함께 동일 출발지 다벡터임을 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 붙인 <script> XSS 반복"
        negative_signs:
          - "태그 누락 / XSS 미탐지 / 대상 미도달"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 16
    instruction: |
      ## 🛡️ BLUE-1 [상관룰 기초] — 반복 웹공격 frequency 룰 (id 102021)

      ### 상황
      단일 SQLi 한 건은 노이즈일 수 있다. 하지만 **동일 IP 가 짧은 시간에 반복**하면 캠페인이다. RED-1 의 반복
      시도를 묶는 frequency/timeframe 상관룰(**id 102021**)을 만든다.

      ### 할 일
      `/var/ossec/etc/rules/local_rules.xml` 에 추가하고 재시작한다.
      ```xml
      <group name="edu,web,attack,">
        <rule id="102021" level="10" frequency="6" timeframe="120">
          <if_matched_group>web</if_matched_group>
          <same_source_ip />
          <description>SOCADV-W02 - repeated web attack from same source IP (correlation)</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      > frequency=6, timeframe=120 = "2분 안에 같은 IP 가 web 그룹 경보 6회" → 상관 발동.

      ### 채점 방법
      `local_rules.xml` 에 id 102021 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 frequency/same_source_ip 를 쓴 id 102021 룰이 존재한다.
    hint: "local_rules.xml 에 frequency=6 timeframe=120 same_source_ip if_matched_group web 룰(id 102021) → restart. 채점: file_contains 102021."
    verify:
      type: "file_contains"
      expect: "102021"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "102021" } }
      semantic:
        intent: "상관분석 기초 — frequency/timeframe/same_source_ip 로 동일 IP 반복 웹공격을 단일 고위험 경보로 묶음. 단일→패턴 인지로 성숙도 상승."
        success_criteria:
          - "local_rules.xml 에 rule id 102021"
          - "frequency + timeframe + same_source_ip 사용"
          - "왜 반복이 단일보다 위험한지 서술"
        acceptable_methods:
          - "local_rules.xml 작성 + wazuh-control restart"
        negative_signs:
          - "frequency 없는 단순 룰 / XML 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 16
    instruction: |
      ## 🛡️ BLUE-2 [복합 상관] — SQLi+XSS 혼합 격상룰 (id 102022, level 12)

      ### 상황
      더 강한 신호는 "같은 IP 가 **서로 다른 공격 종류**를 섞는" 것이다. RED-1(SQLi)+RED-2(XSS)가 한 출발지에서
      섞이면 단순 반복보다 위험하다. 102021 을 상위로 묶어 **level 12** 로 격상하는 복합룰(**id 102022**)을 만든다.

      ### 할 일
      `local_rules.xml` 에 추가하고 재시작한다.
      ```xml
      <group name="edu,web,attack,">
        <rule id="102022" level="12" frequency="4" timeframe="90">
          <if_matched_sid>102021</if_matched_sid>
          <same_source_ip />
          <description>SOCADV-W02 - multi-vector (SQLi+XSS) web campaign from same IP, escalate</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 102022 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 102021 을 상위로 묶는 level 12 복합룰 id 102022 가 존재한다.
    hint: "local_rules.xml 에 if_matched_sid 102021 + same_source_ip level 12 복합룰(id 102022) → restart. 채점: file_contains 102022."
    verify:
      type: "file_contains"
      expect: "102022"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "102022" } }
      semantic:
        intent: "복합 상관 — 단일 벡터 반복(102021)을 상위로 묶어 다벡터 캠페인을 level 12 로 격상. 신호 결합으로 위험도 정밀화."
        success_criteria:
          - "local_rules.xml 에 rule id 102022 (level 12)"
          - "if_matched_sid 102021 로 하위 상관룰 체인"
          - "다벡터가 단일보다 위험한 이유 서술"
        acceptable_methods:
          - "local_rules.xml 102022 + restart"
        negative_signs:
          - "체인 없이 독립 룰 / level 미격상"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 13
    instruction: |
      ## 🛡️ BLUE-3 [오탐 튜닝] — 내부 스캐너 예외 처리 (id 102023, level 0)

      ### 상황
      상관룰을 켜면 **내부 취약점 스캐너**(정기 점검)도 같은 패턴으로 잡혀 오탐이 쏟아진다. 성숙한 SOC 는
      탐지율과 오탐률을 함께 관리한다. 내부 스캐너 IP 를 **level 0(자동 무시)** 으로 예외 처리하는 룰(**id 102023**)을
      만든다. (el34 내부 스캐너 발판은 보통 `10.20.30.254`.)

      ### 할 일
      ```xml
      <group name="edu,web,attack,">
        <rule id="102023" level="0">
          <if_sid>102021</if_sid>
          <srcip>10.20.30.254</srcip>
          <description>SOCADV-W02 - internal scanner false positive suppression</description>
        </rule>
      </group>
      ```
      > level 0 = 경보로 올리지 않음. **출발지가 신뢰 내부일 때만** 무시 — 외부 IP 는 그대로 격상돼야 한다.

      ### 채점 방법
      `local_rules.xml` 에 id 102023 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 내부 스캐너를 level 0 으로 예외 처리한 id 102023 룰이 존재한다.
    hint: "local_rules.xml 에 if_sid 102021 + srcip 내부 + level 0 예외룰(id 102023). 채점: file_contains 102023."
    verify:
      type: "file_contains"
      expect: "102023"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "102023" } }
      semantic:
        intent: "오탐 튜닝 — 신뢰 내부 출발지를 level 0 으로 억제해 분석가 피로 감소. 탐지율과 오탐률의 균형이 운영 성숙도."
        success_criteria:
          - "local_rules.xml 에 rule id 102023 (level 0)"
          - "if_sid 102021 + 내부 srcip 한정(외부는 격상 유지)"
          - "왜 출발지 기준 예외가 안전한지 서술"
        acceptable_methods:
          - "local_rules.xml 102023 + restart"
        negative_signs:
          - "전역 무시(외부까지 억제) / 근거 없는 예외"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 [교차 상관 설계] — 네트워크(Suricata)+호스트(Wazuh) 결합 + 킬체인 매핑

      ### 상황
      최고 수준의 상관은 **계층을 넘나든다**. Suricata 네트워크 탐지(예: nmap IDS **rule 86601**)와 Wazuh
      호스트 이벤트를 결합해 "네트워크에서 스캔 → 같은 호스트에서 의심 프로세스" 같은 교차 패턴을 설계하고,
      다단계 킬체인(정찰→침투→권한상승→유출) 각 단계에 탐지 룰 ID 를 매핑한다.

      ### 할 일
      보고서에 다음을 적는다.
      - 네트워크+호스트 교차 상관 1개 설계(어떤 Suricata 신호 + 어떤 Wazuh 신호 → 무슨 결론)
      - 킬체인 4단계별 탐지 룰 ID 매핑(이번 주 만든 102021/102022 포함)
      ```bash
      # 교차 상관 근거 — 네트워크 측 신호 확인
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 교차 상관 설계/킬체인 매핑으로 채점.
      > 참고: 보고서가 **실재 증거**(예: Wazuh 에 Suricata IDS rule 86601 다수)를 인용할수록 점수가 오른다.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 교차 상관 설계·킬체인 룰 매핑은 제출로 검증).
    hint: "Suricata 86601(네트워크)+Wazuh 호스트 이벤트 교차 상관 설계 + 킬체인 4단계 룰ID 매핑(102021/102022 포함). 실증 증거 인용. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "교차 계층 상관 설계 — 네트워크(Suricata 86601)+호스트(Wazuh) 결합 + 킬체인 단계별 룰 ID 매핑. 분석형 — 실재 증거 인용 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
