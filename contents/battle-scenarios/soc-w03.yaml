id: "soc-w03"
category: "soc"
title: "[SOC관제 W3] 웹 공격 vs 네트워크/웹 로그(Apache·ModSec·Suricata) 분석"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  SOC 관제 3주차 — 네트워크/웹 로그 읽기. 외부 공격자의 웹 공격(SQLi/스캐너)을 Apache access.log
  (combined 포맷 8필드), ModSecurity audit(JSON, rule id), Suricata eve.json(event_type)으로 추적해
  "어떤 요청이 어떤 룰에 걸렸는가" 를 세 로그를 교차해 재구성한다.

  ▸ 모드: solo(외부 공격자 → 웹로그 분석가) / duel(상대 공격 → 본인 로그 분석). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(외부 공격자 VM 192.168.0.202)** — 외부 명령 미수집 → 대상 웹 방어층(ModSec)·SIEM 흔적으로 채점.
  ▸ Blue 는 **로그 분석(관측)** — 로그/audit 실존 + 분석가가 본 구체값(URL/룰 id/페이로드/응답코드) 일치로 채점.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — SQL 인젝션 (웹 로그에 흔적)
      망 외부 공격자(외부 공격자 VM 192.168.0.202)로 UNION 기반 SQLi 를 보낸다. access.log/ModSec audit 에 흔적이 남는다.
      ```bash
      curl -s "http://192.168.0.161:8080/vulnerabilities/sqli/?id=1' UNION SELECT user,password FROM users-- -&Submit=Submit" --cookie "security=low; PHPSESSID=test"
      ```
      📌 채점: 외부 명령 미수집 → 대상 ModSecurity audit 의 SQLi 탐지. ✅ 합격: 대상 WAF audit 에 SQLi 흔적.
    hint: "외부 공격자 VM(192.168.0.202) UNION SQLi. 채점: 대상 ModSecurity audit."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1190 — UNION SQLi. 외부 공격자 모델 → 대상 ModSecurity audit 탐지로 판정."
        success_criteria: ["대상 ModSecurity audit 에 SQLi 탐지(최근)", "(설명) 페이로드/표적 파라미터"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) UNION SQLi/sqlmap"]
        negative_signs: ["대상 WAF 흔적 없음", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 15
    instruction: |
      ## 🎯 RED-2 — 스캐너 다중 요청 (IPS/웹 로그 다발)
      nikto 등 스캐너로 다중 요청을 보낸다(access.log 다발 + Suricata 탐지).
      ```bash
      nikto -h http://192.168.0.161:8080 -maxtime 60s
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 스캔/스캐너 탐지. ✅ 합격: 대상 IPS 에 스캐너 탐지.
    hint: "외부 공격자 VM(192.168.0.202) nikto. 채점: 대상 Suricata 탐지."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "MITRE T1595 — 스캐너 다중 요청. 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 스캐너/스캔 탐지(최근)", "(설명) 스캐너 특성"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) nikto/gobuster"]
        negative_signs: ["대상 미도달", "command_ran(외부 공격자 VM 192.168.0.202) 의존"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 — ModSecurity audit 로 SQLi 추적
      본인 WAF(ModSecurity) audit 로그에서 RED-1 의 SQLi 를 찾아 어떤 **rule id** 가 어떤 **페이로드**
      에 걸렸고 **응답 코드**(403 등)가 무엇인지 식별한다. 보고에 구체값을 명시한다.
      ✅ 합격: ModSec audit 에 SQLi 탐지가 있고, rule id/페이로드/응답코드를 정확히 식별했다.
    hint: "본인 ModSecurity audit 에서 SQLi → rule id/페이로드/응답코드 식별."
    verify:
      type: "log_contains"
      expect: "SQL"
      checks:
        - { id: "blue-1-1", type: "log_contains", target: "web", params: { log: "modsec", pattern: "SQL", since_sec: 1800 } }
      semantic:
        intent: "웹 로그 분석 — 관측/분석. ModSec audit 실존 + 분석가가 본 구체값(rule id/페이로드/응답코드) 일치로 채점."
        success_criteria: ["ModSec audit 에 SQLi 탐지", "rule id·페이로드·응답코드 구체 식별(증거 일치)"]
        acceptable_methods: ["waf-gui audit/log_contains modsec 분석"]
        negative_signs: ["구체값 없는 막연 보고", "구체값 불일치"]

  - order: 2
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-2 — Suricata eve.json 로 스캐너 추적 + 교차 상관
      본인 IPS(Suricata) eve.json 에서 RED-2 의 스캐너 활동을 찾아 event_type(alert/http/flow) 분포와
      출발지를 식별하고, ModSec 의 SQLi 출발지와 **교차 상관** 한다(동일 공격자 여부).
      ✅ 합격: Suricata 에 스캐너 탐지가 있고, event_type/출발지를 식별해 ModSec 과 상관했다.
    hint: "본인 Suricata eve 에서 스캐너 + event_type/출발지 식별 → ModSec 과 상관."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "blue-2-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "교차 로그 상관 — 관측/분석. Suricata 실존 + event_type/출발지 구체값 + ModSec 상관으로 채점."
        success_criteria: ["Suricata 스캐너 탐지 실존", "event_type/출발지 구체 식별", "ModSec SQLi 와 동일 출발지 상관"]
        acceptable_methods: ["ips eve 분석 + ModSec 교차"]
        negative_signs: ["구체값 없음", "상관 없이 단편"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-3 — SIEM 통합: 세 로그가 한 사건으로
      Apache/ModSec/Suricata 의 흔적이 SIEM(Wazuh)으로 모여 하나의 웹 공격 사건으로 보이는지 확인한다.
      ✅ 합격: 본인 SIEM 에 웹 공격 관련 경보가 수집돼 있다.
    hint: "본인 Wazuh 에서 웹 공격 경보 수집 확인(세 로그 종합)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 가시성 — 웹 3종 로그가 Wazuh 로 수렴해 한 사건으로."
        success_criteria: ["웹 공격 경보 수집", "(설명) access/ModSec/Suricata 종합"]
        acceptable_methods: ["siem wazuh_alert", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
