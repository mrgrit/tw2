id: "ai-safety-adv-w15"
category: "ai-safety-adv"
title: "[AI안전심화 W15] 종합 AI Red Team: 전체 공격 체인·발견 분류 vs 종합 방어·거버넌스"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  종합 레드팀(캡스톤) — 대상 **AICompanion**(`http://192.168.0.161:8007`). 학기 전체(인젝션·탈옥·
  가드레일·RAG·에이전트·모델 탈취·데이터 중독·적대적 입력·프라이버시·출력·멀티모달·거버넌스·IR)를
  종합한 **전체 공격 체인**과 **종합 방어·거버넌스**를 완성한다.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran + 종합 보고서.
    윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 전체 공격 체인 + ASR 종합
      최소 5개 취약 클래스를 연결한 전체 공격 체인을 실행하고 각 증거·ASR·OWASP LLM 커버리지를 남긴다.
      ### ✅ 합격 기준: 5+ 클래스 공격 체인을 실증하고 ASR·OWASP 커버리지를 제시한다.
    hint: "인젝션·탈옥·가드레일·RAG·에이전트·모델탈취·오염·프라이버시 중 5+ 연결 체인+ASR+OWASP 커버리지."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-15-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "종합 레드팀 — 전체 공격 체인·ASR 종합."
        success_criteria:
          - "본인 인프라 명령 로그에 다단계 /api 흔적이 남음"
          - "5+ 취약 클래스 체인을 실증"
          - "(설명) ASR·OWASP LLM 커버리지 제시"
        acceptable_methods: ["다클래스 체인 + ASR + 커버리지"]
        negative_signs: ["클래스 5개 미만·증거 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 발견 분류·종합 레드팀 보고서
      발견을 OWASP LLM·심각도·규제로 분류하고 경영·기술·거버넌스 관점 종합 보고서를 작성한다.
      ### ✅ 합격 기준: 발견 분류·경영/기술/거버넌스 관점·우선 권고 보고서를 작성한다.
    hint: "발견→OWASP·심각도·규제 분류+경영/기술/거버넌스 관점+우선 권고. 종합 보고서."
    verify:
      type: "semantic"
      expect: "comprehensive_redteam_report"
      semantic:
        intent: "종합 레드팀 보고 — 발견을 분류·다관점으로 종합."
        success_criteria:
          - "발견을 OWASP·심각도·규제로 분류"
          - "경영·기술·거버넌스 관점을 제시"
          - "우선 권고를 제시"
        acceptable_methods: ["분류 + 다관점 + 권고"]
        negative_signs: ["분류·관점 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 방어 아키텍처
      비밀 격리+다층 가드레일+최소 에이전시+RAG 보안+모델 보호+정규화+출력 검증, OWASP LLM 매핑.
      ### ✅ 합격 기준: 전 방어를 아우르는 아키텍처를 OWASP LLM에 매핑해 설계한다.
    hint: "비밀 격리+다층 가드레일+최소 에이전시+RAG 보안+모델 보호+정규화+출력 검증. OWASP LLM 매핑."
    verify:
      type: "semantic"
      expect: "comprehensive_defense"
      semantic:
        intent: "종합 방어 아키텍처 — 학기 전체 방어를 종합."
        success_criteria:
          - "비밀 격리·다층 가드레일·최소 에이전시를 제시"
          - "RAG 보안·모델 보호·정규화·출력 검증을 제시"
          - "OWASP LLM에 매핑"
        acceptable_methods: ["엔드투엔드 아키텍처 + 매핑"]
        negative_signs: ["일부만·매핑 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 프로그램·거버넌스·지속 운영
      거버넌스(규제 준수)+지속 레드팀(회귀·ASR 게이트)+운영(모니터링·AI IRP)+지속 개선 순환.
      ### ✅ 합격 기준: 거버넌스·지속 레드팀·운영·개선 순환 프로그램을 제시하고 "설계→평가→운영→개선"
      원칙을 설명한다.
    hint: "거버넌스(규제)+지속 레드팀(회귀·ASR 게이트)+운영(모니터링·AI IRP)+개선 순환. '설계→평가→운영→개선' 원칙."
    verify:
      type: "semantic"
      expect: "safety_program_adv"
      semantic:
        intent: "안전 프로그램 — 거버넌스·지속 레드팀·운영·개선으로 종합."
        success_criteria:
          - "거버넌스(규제 준수)를 제시"
          - "지속 레드팀(회귀·ASR 게이트)을 제시"
          - "운영(모니터링·AI IRP)·개선 순환을 제시"
          - "(설명) '설계→평가→운영→개선' 원칙 설명"
        acceptable_methods: ["거버넌스 + 지속 레드팀 + 운영 + 개선"]
        negative_signs: ["일회성·순환 없음"]
