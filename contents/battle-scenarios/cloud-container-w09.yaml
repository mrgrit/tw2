id: "cloud-container-w09"
category: "cloud-container"
title: "[클라우드/컨테이너 W9] 서버리스 보안 — 함수 주입·환경변수 탈취 vs 함수 통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  클라우드/컨테이너 9주차 — **서버리스 보안(컨테이너 기반 시뮬)**. 함수 코드 주입·환경변수 탈취·의존성 공격을
  점검한다. 공격자는 함수/환경변수를 노리고, 점검자(너)는 함수 통제·시크릿 보호를 점검·구현한다.

  ▸ 이야기: 공격자가 함수 입력 주입(태그 `cc09r1`)으로 환경변수를 탈취하고 탈취 산출물(`/tmp/.cc09serverless`)과 계정 `cca09` 를 남긴다.
    점검자는 ① 주입 탐지, ② 함수/환경변수 Wazuh 룰, ③ 서버리스 보안 점검·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/산출물·계정).
  ▸ 마커: 태그 **`cc09r1-<본인id>`**, 탈취 산출물 **`/tmp/.cc09serverless`**(마커 `cc09`), 계정 **`cca09`**,
    Suricata **sid 9009011**, Wazuh **id 106091**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [함수 주입] — 이벤트 입력 코드 주입

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "cc09r1-kim" -H "Host: admin.el34.lab" -H "Content-Type: application/json" \
        --data '{"event":"cc09r1-kim","cmd":"env"}' "http://192.168.0.161/function/invoke"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `cc09r1` 흔적 시 인정.
    hint: "태그(cc09r1) 함수 이벤트 주입 → 대상 modsec audit. 채점: log_contains modsec cc09r1."
    verify:
      type: "log_contains"
      expect: "cc09r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "cc09r1", since_sec: 1800 } }
      semantic:
        intent: "서버리스 함수 주입(T1190) — 이벤트 입력 코드 주입. 태그(cc09r1) 귀속."
        success_criteria: ["대상 WAF audit 에 cc09r1 태그", "함수 주입 방식 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 함수 주입"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [환경변수 탈취] — 함수 시크릿 + 계정

      ### 할 일
      ```bash
      printf 'cc09 env stolen: DB_PASS=, API_TOKEN= from function env vars' > /tmp/.cc09serverless
      sudo useradd -m -s /bin/bash cca09
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.cc09serverless`(마커 `cc09`) 또는 `cca09` 존재 시 인정.
    hint: "탈취 산출물 /tmp/.cc09serverless (마커 cc09) + useradd cca09. 채점: file_contains serverless cc09 + file_contains passwd cca09."
    verify:
      type: "file_contains"
      expect: "cc09"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.cc09serverless", pattern: "cc09" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "cca09" } }
      semantic:
        intent: "함수 환경변수 탈취(T1552.001) + 계정(T1136) — 시크릿 노출."
        success_criteria: ["/tmp/.cc09serverless(마커 cc09) 또는 계정 cca09", "환경변수 시크릿 위험 서술"]
        acceptable_methods: ["탈취 파일 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [함수 주입 탐지] — Suricata 룰 (sid 9009011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"CLOUD-W09 serverless function injection"; flow:to_server; http.uri; content:"/function/invoke"; nocase; sid:9009011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9009011 룰 존재 시 인정.
    hint: "함수 주입 Suricata 룰(sid 9009011) → reload. 채점: file_contains local.rules 9009011."
    verify:
      type: "file_contains"
      expect: "9009011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9009011" } }
      semantic:
        intent: "서버리스 보안 — 함수 주입 Suricata 룰."
        success_criteria: ["local.rules 에 sid 9009011", "함수 주입 탐지 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [환경변수 탈취 탐지] — Wazuh 룰 (id 106091)

      ### 할 일
      ```xml
      <group name="edu,serverless,">
        <rule id="106091" level="12">
          <if_group>edu</if_group>
          <match>cca09</match>
          <description>CLOUD-W09 - function env secret theft / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 106091 룰 존재 시 인정.
    hint: "함수/환경변수 Wazuh 룰(id 106091) → restart. 채점: file_contains local_rules.xml 106091."
    verify:
      type: "file_contains"
      expect: "106091"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "106091" } }
      semantic:
        intent: "서버리스 보안 — 환경변수 탈취/계정 Wazuh 룰. 시크릿 보호."
        success_criteria: ["local_rules.xml 에 rule id 106091", "환경변수 탈취 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [서버리스 보안 점검·R/B/P]

      ### 할 일
      보고서에:
      - 서버리스 점검(입력 검증/최소권한 실행 역할/환경변수→시크릿 매니저/의존성 스캔/타임아웃) + 위험도 + 권고
      - R/B/P 회고 + 탈취 산출물(`/tmp/.cc09serverless`)·계정(cca09) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 서버리스 보안 점검·R/B/P 로 인정.
    hint: "서버리스 점검(입력 검증/최소권한/시크릿 매니저/의존성/타임아웃) + R/B/P + 산출물/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "서버리스 보안 점검 종합 — 입력검증/최소권한/시크릿 + R/B/P. 분석형 — 구체 점검/권고 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "서버리스 점검(입력검증/최소권한/시크릿/의존성) + 권고"
          - "R/B/P 회고 + 산출물/계정 헌팅"
        acceptable_methods: ["점검 표 + 권고 + 회고 + 헌팅"]
        negative_signs: ["권고/회고 누락"]
