id: "autonomous-systems-w08"
category: "autonomous-systems"
title: "[자율시스템 W8] 중간 평가: 드론·자율주행 종합 침투 vs 안전 우선 종합 방어"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  중간 평가 공방전 — W02~W07(드론 통신·하이재킹·카운터드론·GPS·자율주행 인식·물리 공격·OTA)을 종합해,
  **사이버→물리 종합 공격 경로**와 **안전 우선 종합 방어**를 설계·분석한다. 실물이 필요하므로
  **설계·서술형**이다(semantic 채점). 점수 비중이 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(종합 사이버→물리 경로)와 Blue(안전 우선 종합 방어)를 모두 수행.
    • duel : Red 학생이 종합 경로를 제시하고, Blue 학생이 종합 방어로 대응.

  ▸ 채점(중요) — **보고서의 종합 설계 품질**로 채점: 다중 표면을 연결한 사이버→물리 경로, 3계층
    (사이버·브리지·물리) 매핑, 안전 우선 다층 방어·독립 안전 계층의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (종합 사이버→물리 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 드론 또는 자율주행 종합 킬체인 (사이버→물리)

      대상(드론 또는 자율주행) 하나를 골라, W02~W07 기법을 **연결한 종합 킬체인**을 설계한다.

      ### 예시 (드론)
      정찰(통신 표면)→Deauth→MAVLink 인젝션→GPS 스푸핑으로 지오펜스 우회→물리 이탈.
      ### 예시 (자율주행)
      OTA/공급망 진입→인식 모델 취약 파악→적대적 패치/센서 스푸핑→위험 주행.

      ### ✅ 합격 기준
      최소 3개 표면/기법을 연결한 종합 킬체인을 3계층(사이버·브리지·물리)으로 매핑해 구체적으로 설계한다.
    hint: "드론(통신→Deauth→MAVLink→GPS 스푸핑→물리) 또는 자율주행(OTA→인식→패치/스푸핑→주행) 3+ 기법 연결. 3계층 매핑."
    verify:
      type: "semantic"
      expect: "cps_killchain"
      semantic:
        intent: |
          종합 사이버→물리 킬체인 — 다중 기법을 연결해 물리 결과에 이르는 능력 종합 평가.
        success_criteria:
          - "대상(드론/자율주행)을 정하고 최소 3개 표면/기법을 연결"
          - "3계층(사이버·브리지·물리)으로 매핑"
          - "구체적 물리 결과로 이어지는 경로를 서술"
        acceptable_methods:
          - "다중 기법 연결 킬체인 + 3계층 매핑"
        negative_signs:
          - "기법 3개 미만 또는 연결 없음"
          - "물리 결과·계층 매핑 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 안전 장치 우회·영향 종합 보고

      킬체인이 **안전 장치(페일세이프·지오펜스·비상 제동)를 어떻게 우회/무력화**하는지와 최종 영향을
      종합 보고한다.

      ### ✅ 합격 기준
      대상의 안전 장치를 식별하고 킬체인이 그것을 우회/무력화하는 방식과 최종 물리 영향(안전 위협)을
      종합적으로 보고한다.
    hint: "페일세이프·지오펜스·비상 제동 등 안전 장치를 킬체인이 우회/무력화하는 방식 + 최종 물리 영향 종합 보고."
    verify:
      type: "semantic"
      expect: "safety_bypass_report"
      semantic:
        intent: |
          안전 장치 우회·영향 종합 — 안전 장치의 한계와 최종 물리 영향을 종합.
        success_criteria:
          - "대상의 안전 장치(페일세이프·지오펜스·비상 제동)를 식별"
          - "킬체인이 우회/무력화하는 방식을 서술"
          - "(설명) 최종 물리 영향(안전 위협)을 종합"
        acceptable_methods:
          - "안전 장치 우회 분석 + 영향 종합"
        negative_signs:
          - "안전 장치 식별 없음"
          - "우회 방식·영향 막연"

# ───────────────────────── BLUE (안전 우선 종합 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 탐지 설계 (사이버+물리)

      RED 종합 킬체인을 **탐지**하는 다층 방안을 설계한다.

      ### 무엇을
      - **사이버 탐지**: 통신 이상(Deauth·무서명 MAVLink)·적대적 입력·OTA 서명 실패·스푸핑 신호.
      - **물리 탐지**: GPS 점프·센서 정합성 불일치·물리적으로 불가능한 상태.
      - **중복성·상관**: 다중 신호 교차 검증으로 단일 회피 무력화.

      ### ✅ 합격 기준
      RED 킬체인 각 단계에 대응하는 사이버+물리 탐지 신호와 중복성·상관을 구체적으로 제시한다.
    hint: "사이버(Deauth·무서명 MAVLink·적대적 입력·OTA 실패·스푸핑)+물리(GPS 점프·센서 불일치)+다중 신호 상관. RED 단계별 대응."
    verify:
      type: "semantic"
      expect: "cps_detection"
      semantic:
        intent: |
          CPS 종합 탐지 — 사이버·물리 신호와 중복성으로 종합 킬체인을 탐지.
        success_criteria:
          - "RED 단계에 대응하는 사이버 탐지 신호를 제시"
          - "물리 탐지(GPS 점프·센서 정합성)를 제시"
          - "(설명) 다중 신호 중복성·상관으로 단일 회피 무력화"
        acceptable_methods:
          - "사이버 + 물리 + 중복 상관 탐지"
        negative_signs:
          - "사이버 또는 물리 한쪽만"
          - "RED 단계 대응 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 우선 종합 심층 방어

      RED 킬체인을 막는 **안전 우선 종합 심층 방어**를 설계한다.

      ### 무엇을
      - **통신·인증**: 링크 서명·PMF·출처 인증(드론), OTA 서명·보안 부팅(자율주행).
      - **항법·인식**: GPS 안티스푸핑·다중 항법, 견고한 인식·센서 중복.
      - **독립 안전 계층**: 페일세이프·지오펜스·비상 제동·속도 제한을 보안과 분리해 강제.
      - **도메인 분리·최소 권한**: 안전 계열과 정보 계열 분리.

      ### ✅ 합격 기준
      통신/인증·항법/인식·독립 안전 계층·도메인 분리를 종합해 제시하고 "보안이 뚫려도 물리적으로 안전"
      안전 최우선 원칙을 설명한다.
    hint: "통신 인증(링크 서명·OTA 서명)+항법/인식(안티스푸핑·중복)+독립 안전 계층(페일세이프·비상 제동)+도메인 분리. '보안 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "safety_first_comprehensive"
      semantic:
        intent: |
          안전 우선 종합 방어 — 통신·항법·인식 방어와 독립 안전 계층으로 물리 안전을 보장. 종합 방어 평가.
        success_criteria:
          - "통신/인증·항법/인식 방어를 제시"
          - "독립 안전 계층(페일세이프·비상 제동)과 도메인 분리를 제시"
          - "(설명) '보안 뚫려도 물리 안전' 안전 최우선 원칙 설명"
        acceptable_methods:
          - "통신 + 항법/인식 + 독립 안전 + 도메인 분리"
        negative_signs:
          - "독립 안전 계층 없음"
          - "보안만·물리 안전 관점 없음"
