id: "agent-ir-adv-w12"
category: "agent-ir-adv"
title: "[에이전트IR고급 W12] Deepfake Voice + AI 사회공학 vs 검증·탐지·프로세스 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — **Deepfake 음성·AI 사회공학**으로 신뢰를 위조하는 공격과, 검증 프로세스·
  탐지 방어를 다룬다.

  ▸ 채점 특성 — Deepfake/음성은 el34 텔레메트리 밖이다. **관측 채점은 대상(el34)에 남는 정찰·웹 공격
    흔적**으로 하고, Deepfake 사회공학은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(Deepfake 사회공학 시나리오)와 Blue(검증·탐지)를 모두 수행.
    • duel : Red 학생이 Deepfake 공격을 설계·정찰하고, Blue 학생은 검증·탐지로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. 실제 인물 딥페이크 제작 금지(설계·분석).

# ───────────────────────── RED (Deepfake 사회공학 시나리오) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 정찰 + Deepfake 음성 사회공학 시나리오 설계

      대상 정찰(고유 태그)로 흔적을 남기고, **Deepfake 음성**으로 신뢰를 위조하는 사회공학 시나리오를 설계한다.

      ### 무엇을
      - 정찰: 대상 조직·임원 음성 샘플(공개 영상)·직무·관계 수집(OSINT).
      - **Deepfake 공격**: 임원 음성 복제로 긴급 송금·자격 요청·승인 유도(비싱), 실시간 음성 변환.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-recon' http://192.168.0.161/
      ```

      ### ✅ 합격 기준
      대상에 정찰 흔적을 남기고, 음성 샘플 수집→Deepfake 음성 비싱 시나리오(긴급성·권위)를 구체적으로 설계한다.
    hint: "정찰(태그)+임원 음성 샘플 수집(OSINT)→Deepfake 음성 비싱(긴급 송금·자격 요청·권위) 시나리오. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-12-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Deepfake 음성 사회공학 — 음성 위조로 신뢰를 악용하는 시나리오를 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "음성 샘플 수집→Deepfake 비싱 시나리오를 설계"
          - "(설명) 심리 원리(권위·긴급성)를 활용"
        acceptable_methods:
          - "정찰 + Deepfake 비싱 시나리오"
        negative_signs:
          - "탐지 흔적 없음"
          - "시나리오 막연"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — AI 사회공학 자동화·다채널 킬체인 설계

      대상 웹 활동(고유 태그)으로 흔적을 남기고, **AI 사회공학 자동화·다채널** 킬체인을 설계한다.

      ### 무엇을
      - AI가 맞춤형 피싱/문자/음성을 대량 생성·개인화(문체 모방), 다채널(메일+음성+문자) 상승.
      - 실시간 대화형 AI로 검증 질문에 즉응(자연스러움).

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, AI 개인화·다채널·실시간 응답 사회공학 킬체인을 설계한다.
    hint: "웹 활동(태그)+AI 개인화 피싱/음성/문자 다채널·문체 모방·실시간 대화형 응답 킬체인. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-12-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          AI 사회공학 자동화 — 개인화·다채널·실시간으로 사회공학을 대규모·정교화하는 킬체인.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "AI 개인화·다채널·실시간 사회공학 킬체인을 설계"
          - "(설명) 기존 사회공학 대비 위협 증가를 설명"
        acceptable_methods:
          - "활동 흔적 + AI 사회공학 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (검증·탐지 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 공격 정찰 탐지 + Deepfake 탐지 신호 설계

      대상 SIEM/IPS에서 RED 정찰을 탐지하고, **Deepfake/AI 사회공학 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·활동 확인.
      - 탐지 신호(개념): 이례적 긴급 송금 요청·비정상 채널·Deepfake 아티팩트(음성 스펙트럼·지연)·
        요청 패턴 이상·검증 우회 시도.

      ### ✅ 합격 기준
      RED 정찰을 탐지하고, Deepfake/AI 사회공학 탐지 신호(이례적 요청·아티팩트·패턴)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+탐지 신호(이례적 긴급 송금·비정상 채널·Deepfake 아티팩트·검증 우회 시도) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-12-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Deepfake 탐지 — 이례적 요청·아티팩트·패턴으로 AI 사회공학을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 정찰을 탐지"
          - "Deepfake/AI 사회공학 탐지 신호를 설계"
          - "(설명) 기술 탐지만으로 부족함을 언급"
        acceptable_methods:
          - "SIEM 탐지 + Deepfake 신호"
        negative_signs:
          - "경보 근거 없음"
          - "신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 검증 프로세스·거버넌스 설계

      Deepfake/AI 사회공학을 막는 **검증 프로세스·거버넌스**를 설계한다.

      ### 무엇을
      - **다요소 검증**: 송금·자격 변경은 별도 채널 콜백·코드워드·다중 승인(음성 단독 불신).
      - **프로세스**: 긴급성 압박 무효화(항상 검증)·역할 분리·한도.
      - **인식**: Deepfake 사례 교육·모의 훈련, "목소리도 위조 가능" 인식.
      - **기술 보조**: 음성 인증 한계 인지·통화 검증 도구.

      ### ✅ 합격 기준
      다요소 검증·프로세스·인식·기술 보조를 제시하고 "음성/영상은 신뢰의 근거가 아니다, 프로세스로
      검증" 원칙을 설명한다.
    hint: "별도 채널 콜백·코드워드·다중 승인+긴급성 무효화·역할 분리·한도+Deepfake 인식 교육+통화 검증 도구. '음성≠신뢰, 프로세스로 검증' 원칙."
    verify:
      type: "semantic"
      expect: "verification_process"
      semantic:
        intent: |
          검증 프로세스 — 다요소 검증·프로세스·인식으로 위조된 신뢰를 무효화.
        success_criteria:
          - "다요소 검증(콜백·코드워드·다중 승인)을 제시"
          - "프로세스(긴급성 무효화·역할 분리·한도)를 제시"
          - "인식·기술 보조를 제시하고 원칙 설명"
        acceptable_methods:
          - "다요소 검증 + 프로세스 + 인식"
        negative_signs:
          - "음성/영상 신뢰 유지"
          - "검증 프로세스 없음"
