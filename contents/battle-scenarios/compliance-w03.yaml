id: "compliance-w03"
category: "compliance"
title: "[컴플라이언스 W3] ISMS-P 인증 기준 — 계정·권한 악용 vs 계정관리·로그 통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  컴플라이언스 3주차 — **ISMS-P 인증 기준**. 사용자 계정 관리(2.5.1)·식별/인증(2.5.2)·접근 권한 관리(2.5.4)·
  로그 및 접속기록 관리(2.9.5)의 기술적 점검을 다룬다. 공격자는 계정/권한의 허점을 악용하고, 감사자(너)는
  계정관리·로그인 감사 통제를 구현하고 인증 기준 충족을 증적으로 입증한다.

  ▸ 이야기
    공격자가 불필요/약한 계정과 과도한 sudo 권한을 악용한다(태그 `co03r1`). 감사자는 ① 로그인 감사(auditd),
    ② 계정/권한 탐지룰, ③ ISMS-P 종합 점검·증적으로 대응한다.

  ▸ 모드
    • solo : 한 학생이 계정 악용(자기 인프라 표적)과 통제 구현을 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라 계정을 악용, Blue 는 자기 인프라에 통제 구현.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    악용 태그 **`co03r1-<본인id>`**, 권한 산출물 **`/tmp/.co03priv`**(마커 `co03`), 계정 **`compa03`**,
    로그인 감사 **`/etc/audit/rules.d/compliance-co03.rules`**(키 `co03`), Wazuh 탐지 **id 104031**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [계정/권한 악용] — 약한 인증으로 침투

      ### 상황
      ISMS-P 식별/인증 미흡을 노린다. 너는 태그 `co03r1-<본인id>` 로 약한 인증을 공략해 침투한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim):
      ```bash
      curl -s -A "co03r1-kim" -H "Host: neobank.6v6.lab" \
        --data "username=admin&password=admin&Login=Login" "http://192.168.0.161/login?probe=co03r1-kim"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `co03r1` 가 포함된 흔적이 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `co03r1` 태그가 포함된 흔적이 남는다.
    hint: "태그(co03r1) 약한 인증 침투 → 대상 modsec audit. 채점: log_contains modsec co03r1."
    verify:
      type: "log_contains"
      expect: "co03r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "co03r1", since_sec: 1800 } }
      semantic:
        intent: "ISMS-P 식별/인증 미흡 악용(T1110/T1078) — 약한 계정 침투. 태그(co03r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 co03r1 태그가 포함된 흔적"
          - "어떤 계정/인증 허점을 노렸는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 단 약한 인증 공략"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [과도 권한] — sudo 남용 산출물 + 불필요 계정

      ### 상황
      과도한 sudo 권한과 불필요 계정은 ISMS-P 접근 권한 관리 위반이다. 너는 권한 남용 산출물 **`/tmp/.co03priv`**
      (마커 `co03`)와 불필요 계정 **`compa03`** 을 남긴다.

      ### 할 일
      ```bash
      printf 'co03 sudo abuse: compa03 ALL=(ALL) NOPASSWD:ALL' > /tmp/.co03priv
      sudo useradd -m -s /bin/bash compa03
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.co03priv`(마커 `co03`)이 있거나 `/etc/passwd` 에 `compa03` 이 있는지로 채점.

      ### 합격 기준
      `/tmp/.co03priv`(마커 `co03`) 또는 계정 `compa03`.
    hint: "권한 남용 /tmp/.co03priv (마커 co03) + useradd compa03. 채점: file_contains priv co03 + file_contains passwd compa03."
    verify:
      type: "file_contains"
      expect: "co03"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.co03priv", pattern: "co03" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "compa03" } }
      semantic:
        intent: "과도 권한/불필요 계정(T1078.003) — ISMS-P 접근 권한 관리 위반. 최소권한 원칙 위배."
        success_criteria:
          - "/tmp/.co03priv(마커 co03) 또는 계정 compa03"
          - "과도 sudo/불필요 계정의 위험 서술"
        acceptable_methods:
          - "권한 산출물 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [로그인 감사] — auditd (key co03)

      ### 상황
      ISMS-P 2.9.5(로그 및 접속기록 관리)는 로그인/로그아웃 추적을 요구한다. 인증 이벤트와 권한 변경을 감사하는
      auditd 룰을 **`/etc/audit/rules.d/compliance-co03.rules`**(키 `co03`)에 작성한다.

      ### 할 일
      ```bash
      sudo tee /etc/audit/rules.d/compliance-co03.rules >/dev/null <<'RUL'
      -w /var/log/auth.log -p wa -k co03_login
      -w /etc/sudoers -p wa -k co03_priv
      -w /etc/passwd -p wa -k co03_acct
      RUL
      sudo augenrules --load 2>/dev/null || sudo auditctl -R /etc/audit/rules.d/compliance-co03.rules
      ```

      ### 채점 방법
      web 의 `/etc/audit/rules.d/compliance-co03.rules` 에 키 `co03` 룰이 있는지로 확인.

      ### 합격 기준
      auditd 룰 파일에 로그인/권한/계정을 감사하는 `co03` 키 룰이 존재한다.
    hint: "로그인 감사 auditd 룰(auth.log/sudoers/passwd, key co03) → compliance-co03.rules. 채점: file_contains 그 파일 co03."
    verify:
      type: "file_contains"
      expect: "co03"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web",
            params: { path: "/etc/audit/rules.d/compliance-co03.rules", pattern: "co03" } }
      semantic:
        intent: "ISMS-P 2.9.5 로그/접속기록 — auditd 로 로그인/권한 변경 추적. 접속기록 관리 통제 구현."
        success_criteria:
          - "compliance-co03.rules 에 co03 키 룰(auth/sudoers/passwd)"
          - "ISMS-P 2.9.5 요구사항 언급 + augenrules 로딩"
        acceptable_methods:
          - "auditd 룰 작성 + 로딩"
        negative_signs:
          - "감사 대상 부적절 / 미로딩"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [계정/권한 탐지] — Wazuh 룰 (id 104031)

      ### 상황
      불필요 계정 생성·과도 권한 부여를 잡는 Wazuh 룰(**id 104031**)을 만든다(ISMS-P 2.5 접근 권한 관리).

      ### 할 일
      ```xml
      <group name="edu,ismsp,">
        <rule id="104031" level="12">
          <if_group>edu</if_group>
          <match>compa03</match>
          <description>COMPLIANCE-W03 - ISMS-P: unauthorized account / excessive privilege</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 104031 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 계정/권한 탐지 id 104031 룰이 존재한다.
    hint: "계정/권한 Wazuh 룰(id 104031) → restart. 채점: file_contains local_rules.xml 104031."
    verify:
      type: "file_contains"
      expect: "104031"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "104031" } }
      semantic:
        intent: "ISMS-P 접근 권한 관리 — 불필요 계정/과도 권한 Wazuh 룰. 2.5 통제 구현."
        success_criteria:
          - "local_rules.xml 에 rule id 104031"
          - "계정/권한 탐지 로직 + ISMS-P 2.5 연계"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [ISMS-P 종합 점검·증적] — 인증 기준 충족 입증

      ### 상황
      ISMS-P 기술 점검 항목을 종합하고 증적을 정리한다(계정 목록/만료, sudo 사용자, NTP 동기화, 세션 타임아웃,
      orphan 파일, 디렉터리 리스팅, 로그인 감사).

      ### 할 일
      보고서에:
      - 항목별 점검(`passwd -S`/`sudo -l`/`timedatectl`/`TMOUT`/`find -nouser`/`apache Options`) + 증적
      - 미흡 항목 개선 + 권한 산출물(`/tmp/.co03priv`)·계정(compa03) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 ISMS-P 종합 점검 증적으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 인증 기준 항목별 점검·증적·헌팅은 제출로 검증).
    hint: "ISMS-P 점검(계정/만료/sudo/NTP/세션/orphan/디렉터리리스팅/로그인감사) + 증적 + 권한산출물/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "ISMS-P 종합 점검·증적 — 인증 기준 항목별 충족 입증 + 개선. 분석형 — 구체 점검/증적/통제 ID 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "ISMS-P 항목별 점검(계정/sudo/NTP/세션/orphan 등) + 증적 + 통제 ID 매핑"
          - "미흡 개선 + 권한산출물/계정 헌팅"
        acceptable_methods:
          - "점검 표 + 증적 + 헌팅"
        negative_signs:
          - "증적/통제 ID 없는 서술 / 항목 누락"
