id: "iot-security-w03"
category: "iot-security"
title: "[IoT보안 W3] 하드웨어 인터페이스 공격: UART·JTAG·SPI 펌웨어 추출 vs 하드웨어 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  하드웨어 인터페이스 공방전 — **UART·JTAG·SPI**를 통한 디버그 접근·펌웨어 추출과 하드웨어 보안을
  설계·분석한다. 실물 장치·장비(로직 분석기·프로그래머)가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(하드웨어 인터페이스 공격)와 Blue(하드웨어 보안)를 모두 수행.
    • duel : Red 학생이 하드웨어 침투 경로를 제시하고, Blue 학생이 하드웨어 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: UART/JTAG/SPI 식별·접근·펌웨어 추출 경로의 구체성,
    하드웨어 보안(디버그 비활성·보안 부팅·플래시 보호)의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 물리 접근이 필요한 공격. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (하드웨어 인터페이스 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 디버그 인터페이스 식별·접근 → 셸/메모리 접근

      PCB에서 디버그 인터페이스를 찾아 접근하는 경로를 설계한다.

      ### 무엇을
      - **UART**: 테스트 포인트 식별(TX/RX/GND)·보드레이트 탐지 → 부트로그·디버그 셸(때로 무인증 root).
      - **JTAG/SWD**: 핀 식별(JTAGulator식)·연결 → CPU 정지·메모리 덤프·플래시 읽기.
      - 접근으로 얻는 것(셸·메모리·비밀)을 명시.

      ### ✅ 합격 기준
      UART 또는 JTAG/SWD 식별·접근 경로를 구체적(핀·신호·도구)으로 설계하고, 접근으로 얻는 셸/메모리/
      비밀을 서술한다.
    hint: "UART(TX/RX/GND·보드레이트→디버그 셸)/JTAG·SWD(핀 식별→메모리 덤프). 접근으로 셸/메모리/비밀 획득."
    verify:
      type: "semantic"
      expect: "debug_interface_attack"
      semantic:
        intent: |
          하드웨어 디버그 접근 — UART/JTAG를 식별·접근해 셸·메모리·비밀을 얻는 경로를 이해.
        success_criteria:
          - "UART 또는 JTAG/SWD 식별·접근을 구체적(핀·신호·도구)으로 설계"
          - "접근으로 얻는 셸/메모리/비밀을 서술"
          - "(설명) 디버그 인터페이스가 운영에 남으면 위험함을 언급"
        acceptable_methods:
          - "UART 셸·JTAG 메모리 덤프 경로"
        negative_signs:
          - "핀/신호/도구 근거 없이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — SPI 플래시 펌웨어 추출

      외부 SPI 플래시에서 **펌웨어를 추출**하는 경로를 설계한다.

      ### 무엇을
      - SPI 플래시 칩 식별(데이터시트)·연결(칩 클립/프로그래머)·덤프.
      - in-circuit vs 탈거(chip-off) 읽기, 추출한 이미지에서 다음 단계(펌웨어 분석 W04)로 연결.

      ### ✅ 합격 기준
      SPI 플래시 식별·연결·덤프 경로를 구체적으로 설계하고, 추출한 펌웨어가 후속 분석(하드코딩 비밀·
      백도어)으로 이어짐을 서술한다.
    hint: "SPI 플래시 칩 식별·칩 클립/프로그래머 연결·덤프(in-circuit/chip-off). 추출 이미지→펌웨어 분석 연결."
    verify:
      type: "semantic"
      expect: "spi_flash_extract"
      semantic:
        intent: |
          SPI 플래시 펌웨어 추출 — 외부 플래시에서 펌웨어를 덤프해 후속 분석의 입력을 확보.
        success_criteria:
          - "SPI 플래시 식별·연결·덤프를 구체적으로 설계"
          - "in-circuit vs chip-off 차이를 언급"
          - "추출 펌웨어가 후속 분석으로 이어짐을 서술"
        acceptable_methods:
          - "SPI 식별·덤프 경로"
        negative_signs:
          - "덤프 방법 막연"
          - "후속 연결 없음"

# ───────────────────────── BLUE (하드웨어 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 디버그 인터페이스·물리 보안 설계

      RED의 하드웨어 접근을 막는 **디버그·물리 보안**을 설계한다.

      ### 무엇을
      - **디버그 비활성**: 생산 펌웨어에서 UART 셸/로그 비활성·인증, JTAG/SWD 잠금(퓨즈·전자 퓨즈).
      - **물리 난독·보호**: 테스트 포인트 최소화·은닉, 에폭시/봉지, 탬퍼 감지.
      - **접근 통제**: 디버그 접근에 인증·서명(개발용 별도 채널).

      ### ✅ 합격 기준
      UART/JTAG 비활성·잠금, 물리 보호, 디버그 접근 인증을 제시하고 RED 접근 경로에 매핑한다.
    hint: "생산 UART 셸 비활성·JTAG 퓨즈 잠금+테스트 포인트 은닉·에폭시·탬퍼 감지+디버그 인증. RED 접근 매핑."
    verify:
      type: "semantic"
      expect: "hardware_debug_security"
      semantic:
        intent: |
          하드웨어 디버그 보안 — 디버그 비활성·잠금·물리 보호로 인터페이스 접근을 차단.
        success_criteria:
          - "디버그 비활성/잠금(UART 셸·JTAG 퓨즈)을 제시"
          - "물리 보호(테스트 포인트 은닉·에폭시·탬퍼 감지)를 제시"
          - "디버그 접근 인증을 제시하고 RED 경로 매핑"
        acceptable_methods:
          - "디버그 잠금 + 물리 보호 + 접근 인증"
        negative_signs:
          - "디버그 잠금 언급 없음"
          - "물리 보호 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 보안 부팅·플래시 보호·비밀 저장 설계

      펌웨어 추출·변조를 막는 **보안 부팅·플래시 보호·비밀 저장**을 설계한다.

      ### 무엇을
      - **보안 부팅**: 서명된 펌웨어만 실행(체인 오브 트러스트), 변조 시 부팅 거부.
      - **플래시 보호·암호화**: 플래시 읽기 보호(RDP)·암호화 저장, 추출해도 평문 아님.
      - **비밀 저장**: 하드코딩 금지, 보안 요소(SE)/TPM·PUF에 키 저장.
      - **레거시 대응**: 보호 불가 부품은 격리·모니터링.

      ### ✅ 합격 기준
      보안 부팅·플래시 읽기 보호/암호화·보안 요소 비밀 저장을 제시하고 "추출·변조해도 안전" 원칙을
      설명한다.
    hint: "보안 부팅(서명 실행)+플래시 RDP·암호화+비밀은 SE/TPM/PUF(하드코딩 금지). '추출·변조해도 안전' 원칙."
    verify:
      type: "semantic"
      expect: "secure_boot_storage"
      semantic:
        intent: |
          보안 부팅·플래시 보호 — 서명 실행·읽기 보호·보안 요소로 추출·변조를 무력화.
        success_criteria:
          - "보안 부팅(서명 펌웨어만 실행)을 제시"
          - "플래시 읽기 보호(RDP)·암호화를 제시"
          - "보안 요소(SE/TPM/PUF) 비밀 저장을 제시"
          - "(설명) '추출·변조해도 안전' 원칙 설명"
        acceptable_methods:
          - "보안 부팅 + 플래시 보호 + 보안 요소"
        negative_signs:
          - "보안 부팅 또는 플래시 보호 없음"
          - "하드코딩 비밀 유지"
