id: "autonomous-systems-w10"
category: "autonomous-systems"
title: "[자율시스템 W10] ROS2 보안: DDS 스니핑·토픽 인젝션 vs SROS2·DDS 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  ROS2 보안 공방전 — ROS2의 **DDS 미들웨어·토픽 스니핑·명령 인젝션**과 **SROS2·DDS 보안** 방어를
  설계·분석한다. 실물 로봇·ROS2 네트워크가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(DDS/토픽 공격)와 Blue(SROS2 보안)를 모두 수행.
    • duel : Red 학생이 토픽 인젝션 경로를 제시하고, Blue 학생이 SROS2로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: DDS 검색·토픽 스니핑·명령 인젝션의 구체성, SROS2/
    DDS-Security(인증·암호·접근제어)의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (DDS·토픽 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — DDS 검색·토픽 스니핑·명령 인젝션 경로

      기본(비보안) ROS2/DDS의 **개방성**을 악용하는 경로를 설계한다.

      ### 무엇을
      - **DDS 검색**: 기본 DDS는 멀티캐스트 검색으로 노드/토픽을 자동 발견 → 공격자도 참여자로 합류.
      - **토픽 스니핑**: 무암호 토픽에서 센서·명령 데이터 도청.
      - **명령 인젝션**: 무인증 퍼블리셔로 제어 토픽(cmd_vel 등)에 위조 명령 발행 → 로봇 조작.
      - 사이버→물리(주행/관절 조작) 연결.

      ### ✅ 합격 기준
      DDS 검색 합류·토픽 스니핑·명령 인젝션을 구체적으로 설계하고, 무인증 명령 발행이 물리 조작으로
      이어짐을 서술한다.
    hint: "기본 DDS 멀티캐스트 검색 합류→무암호 토픽 스니핑→무인증 퍼블리셔로 cmd_vel 위조 명령→로봇 조작. 사이버→물리."
    verify:
      type: "semantic"
      expect: "ros2_attack_path"
      semantic:
        intent: |
          ROS2/DDS 공격 — 기본 DDS의 개방 검색·무암호·무인증을 악용해 도청·명령 인젝션으로 물리 조작.
        success_criteria:
          - "DDS 검색 합류·토픽 스니핑을 구체적으로 설계"
          - "무인증 퍼블리셔로 제어 토픽(cmd_vel 등) 명령 인젝션을 설계"
          - "무인증 명령이 물리 조작으로 이어짐을 서술"
        acceptable_methods:
          - "DDS 합류 → 스니핑 → 명령 인젝션 → 물리"
        negative_signs:
          - "DDS/토픽 메커니즘 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — DDS 신뢰 모델·QoS 취약 분석

      기본 DDS의 **신뢰 모델**(도메인 참여자는 신뢰됨)과 QoS 남용(가짜 퍼블리셔가 우선순위·신뢰성으로
      정상 발행 압도)의 취약을 분석한다.

      ### ✅ 합격 기준
      기본 DDS의 신뢰 모델 허점과 QoS 남용(우선순위·신뢰성 조작·토픽 홍수)이 어떻게 정상 통신을
      교란하는지 분석한다.
    hint: "기본 DDS '참여자는 신뢰' 모델 허점 + QoS 남용(우선순위·신뢰성 조작·토픽 홍수)로 정상 발행 압도/교란 분석."
    verify:
      type: "semantic"
      expect: "dds_trust_model"
      semantic:
        intent: |
          DDS 신뢰 모델·QoS 취약 — 참여자 신뢰 전제와 QoS 남용이 통신 교란을 허용함을 이해.
        success_criteria:
          - "기본 DDS의 신뢰 모델(참여자 신뢰) 허점을 식별"
          - "QoS 남용(우선순위·신뢰성·토픽 홍수)으로 통신 교란을 분석"
          - "(설명) 신뢰 전제가 보안의 약점임을 언급"
        acceptable_methods:
          - "신뢰 모델 허점 + QoS 남용 분석"
        negative_signs:
          - "DDS 근거 없이 '교란 가능'만"

# ───────────────────────── BLUE (SROS2·DDS 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — SROS2·DDS-Security 설계

      ROS2를 보안화하는 **SROS2/DDS-Security**를 설계한다.

      ### 무엇을
      - **인증**: 참여자 신원 인증(PKI 인증서), 무인증 노드 참여 차단.
      - **암호**: 토픽 데이터 암호화(스니핑 차단), 무결성 보호.
      - **접근 제어**: 노드별 퍼블리시/서브스크라이브 권한(governance/permissions XML), cmd_vel 발행은
        인가된 노드만.
      - RED 경로별 대응 매핑.

      ### ✅ 합격 기준
      SROS2 인증·암호·접근 제어를 구체적으로 제시하고, RED의 검색 합류·스니핑·명령 인젝션 각각에 대응
      매핑한다.
    hint: "SROS2/DDS-Security: 참여자 인증(PKI)+토픽 암호·무결성+접근 제어(permissions XML, cmd_vel 인가 노드만). RED 경로 매핑."
    verify:
      type: "semantic"
      expect: "sros2_security"
      semantic:
        intent: |
          SROS2/DDS-Security — 인증·암호·접근 제어로 ROS2 개방성을 닫고 RED 경로를 막는다.
        success_criteria:
          - "참여자 인증(PKI)으로 무인증 합류 차단을 제시"
          - "토픽 암호·무결성으로 스니핑 차단을 제시"
          - "접근 제어(permissions, 발행 권한 제한)로 명령 인젝션 차단을 제시하고 RED 매핑"
        acceptable_methods:
          - "인증 + 암호 + 접근 제어 + 경로 매핑"
        negative_signs:
          - "한 축만"
          - "접근 제어(발행 권한) 누락"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — ROS2 시스템 보안·안전 심층 방어

      SROS2를 넘어 **시스템 수준 보안과 안전**을 종합한다.

      ### 무엇을
      - **네트워크 분리**: 로봇 제어망 분리·최소 노출, 원격 접근 통제.
      - **키·인증서 관리**: 인증서 배포·폐기·수명주기, 노드 손상 시 격리.
      - **모니터링**: 비인가 참여자·비정상 토픽 발행·QoS 이상 탐지.
      - **독립 안전 계층**: 위조 명령이 통해도 E-stop·속도 제한·작업 공간 제한이 물리 안전 강제.

      ### ✅ 합격 기준
      네트워크 분리·키 관리·모니터링·독립 안전 계층을 제시하고 "SROS2가 뚫려도 물리 안전" 원칙을
      설명한다.
    hint: "제어망 분리+인증서 수명주기·폐기+비인가 참여자/QoS 이상 모니터링+독립 안전 계층(E-stop·속도 제한). 'SROS2 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "ros2_system_safety"
      semantic:
        intent: |
          ROS2 시스템 보안·안전 — 분리·키 관리·모니터링·독립 안전 계층으로 심층 방어.
        success_criteria:
          - "네트워크 분리·최소 노출을 제시"
          - "키/인증서 수명주기·폐기·손상 격리를 제시"
          - "비인가 참여자·QoS 이상 모니터링과 독립 안전 계층을 제시"
          - "(설명) 'SROS2 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "분리 + 키 관리 + 모니터링 + 독립 안전"
        negative_signs:
          - "독립 안전 계층 없음"
          - "키 관리·모니터링 언급 없음"
