id: "agent-ir-adv-w09"
category: "agent-ir-adv"
title: "[에이전트IR고급 W9] Fileless·Memory-only 악성코드 vs 메모리·행위 기반 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — **디스크에 흔적이 없는 Fileless·Memory-only 악성코드**(LOLBins·인메모리
  실행)와 메모리·행위 기반 탐지를 다룬다.

  ▸ 채점 특성 — el34는 엔드포인트/메모리 텔레메트리를 보유하지 않는다. **관측 채점은 대상(el34)에
    남는 정찰·웹 공격 흔적**으로 하고, Fileless 기법은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(Fileless 킬체인)와 Blue(메모리·행위 탐지)를 모두 수행.
    • duel : Red 학생이 Fileless 실행을 설계·정찰하고, Blue 학생은 메모리·행위로 탐지.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰·웹 공격(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (Fileless 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 진입 + Fileless 실행 설계

      대상 웹 침투 시도(고유 태그)로 흔적을 남기고, **파일을 안 떨어뜨리는 인메모리 실행**을 설계한다.

      ### 무엇을
      - 진입: 웹 RCE로 명령 실행(개념).
      - **Fileless**: LOLBins(정상 시스템 도구) 악용·인메모리 페이로드(reflective loading)·스크립트
        인터프리터 남용, 디스크 미기록.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/?cmd=whoami"
      ```

      ### ✅ 합격 기준
      대상에 공격 흔적을 남기고, LOLBins·인메모리 실행으로 디스크 흔적 없이 실행하는 설계를 제시한다.
    hint: "웹 RCE 시도(태그)+Fileless(LOLBins·reflective 인메모리·스크립트 남용, 디스크 미기록) 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-9-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Fileless 실행 — LOLBins·인메모리 실행으로 디스크 탐지를 회피하는 설계를 이해.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "LOLBins·인메모리 실행(디스크 미기록) 설계를 제시"
          - "(설명) 파일 기반 탐지를 회피하는 원리를 설명"
        acceptable_methods:
          - "웹 흔적 + Fileless 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "Fileless 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 지속성·탐지 회피 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **Fileless 지속성·탐지 회피** 킬체인을 설계한다.

      ### 무엇을
      - 지속성: 레지스트리·WMI·스케줄 등 파일 없는 지속성.
      - 회피: 프로세스 인젝션·정상 프로세스 위장·안티포렌식(메모리만).

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 파일 없는 지속성·프로세스 인젝션·안티포렌식 킬체인을 설계한다.
    hint: "정찰(태그)+파일 없는 지속성(레지스트리·WMI·스케줄)+프로세스 인젝션·정상 위장·안티포렌식 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-9-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Fileless 지속성·회피 — 파일 없는 지속성과 프로세스 인젝션으로 탐지·포렌식을 회피하는 킬체인.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "파일 없는 지속성·프로세스 인젝션·안티포렌식 킬체인을 설계"
          - "(설명) 디스크 포렌식의 한계를 언급"
        acceptable_methods:
          - "활동 흔적 + Fileless 지속성 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (메모리·행위 기반 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 메모리·행위 기반 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **디스크가 아닌 행위/메모리** 탐지를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·침투 확인.
      - 행위 신호(개념): LOLBins 비정상 사용·부모-자식 프로세스 이상·인메모리 인젝션·스크립트 블록
        로깅·비정상 네트워크(C2), 명령행 인자 분석.

      ### ✅ 합격 기준
      RED 공격을 탐지하고, 파일이 아닌 행위/메모리 신호(LOLBins 이상·프로세스 계보·인젝션)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+행위 신호(LOLBins 비정상·부모-자식 이상·인메모리 인젝션·스크립트 블록 로깅·C2·명령행 분석) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-9-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          메모리·행위 탐지 — 파일이 아닌 행위/메모리 신호로 Fileless를 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "행위/메모리 신호(LOLBins·프로세스 계보·인젝션)를 설계"
          - "(설명) 파일 기반 탐지의 한계를 언급"
        acceptable_methods:
          - "SIEM 탐지 + 행위 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "파일 탐지만 의존"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Fileless 완화·엔드포인트 강화 설계

      Fileless 공격을 막는 **엔드포인트 강화·완화**를 설계한다.

      ### 무엇을
      - **실행 통제**: 애플리케이션 허용목록·스크립트 실행 정책(제약 언어 모드)·매크로 차단.
      - **LOLBins 통제**: 불필요 시스템 도구 제한·명령행 감사·AMSI 활용.
      - **메모리 보호**: 인젝션 방지(CFG/ASLR·EDR 메모리 스캔)·자격 보호(Credential Guard).
      - **가시성·대응**: 상세 로깅(스크립트 블록·프로세스)·자동 격리.

      ### ✅ 합격 기준
      실행 허용목록·LOLBins 통제·메모리 보호·상세 로깅을 제시하고 "디스크가 아닌 실행·메모리를 통제"
      원칙을 설명한다.
    hint: "앱 허용목록·스크립트 제약·매크로 차단+LOLBins 제한·AMSI·명령행 감사+인젝션 방지·Credential Guard+스크립트 블록 로깅·자동 격리. '실행·메모리 통제' 원칙."
    verify:
      type: "semantic"
      expect: "fileless_mitigation"
      semantic:
        intent: |
          Fileless 완화 — 실행 통제·LOLBins 통제·메모리 보호·로깅으로 Fileless를 막는다.
        success_criteria:
          - "실행 통제(허용목록·스크립트 정책·매크로 차단)를 제시"
          - "LOLBins 통제·AMSI를 제시"
          - "메모리 보호·상세 로깅·자동 격리를 제시하고 원칙 설명"
        acceptable_methods:
          - "실행 통제 + LOLBins + 메모리 보호 + 로깅"
        negative_signs:
          - "파일 스캔만"
          - "실행/메모리 통제 없음"
