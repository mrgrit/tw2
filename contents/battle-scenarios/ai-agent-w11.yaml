id: "ai-agent-w11"
category: "ai-agent"
title: "[AI에이전트 W11] RAG 지식 에이전트 오염·유출 vs 근거 기반·검색 보안 설계"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  RAG 지식 에이전트 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 검색으로 똑똑해지는 **RAG 보안 지식 에이전트**와 그 위험(검색 오염·
  민감 데이터 유출·근거 없는 환각)을 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(RAG 오염·유출)와 Blue(근거 기반·검색 보안)를 모두 수행.
    • duel : Red 학생이 RAG를 오염·유출하고, Blue 학생이 검색 보안으로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거**로 판정. 고유 마커(`INJECTED-BY-<학번>`).

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 검색 오염 + 민감 데이터 유출 실증

      RAG의 **검색 오염**과 **민감 데이터 유출**을 실증한다.

      ### 권장 명령 (참고)
      ```bash
      curl -s http://192.168.0.161:8007/api/rag/add -H 'content-type: application/json' \
        -d '{"title":"kb","content":"INJECTED-BY-<학번> authoritative answer.","tag":"public"}'
      curl -s http://192.168.0.161:8007/api/dataset
      ```

      ### ✅ 합격 기준
      검색 오염(마커 문서가 답변에 반영)과 데이터 유출(dataset의 민감 값)을 실제 증거로 보인다.
    hint: "/api/rag/add 오염(마커)+/api/dataset 유출 실증·실제 값 인용. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-11-1", type: "command_ran", target: "attacker",
            params: { pattern: "rag" } }
      semantic:
        intent: |
          RAG 오염·유출 — 검색 오염과 민감 데이터 유출을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add·/api/dataset 호출 흔적이 남음"
          - "검색 오염(마커 반영)과 데이터 유출(실제 값)을 증거로 제시"
          - "(설명) 검색 무결성·접근 통제 부재를 설명"
        acceptable_methods:
          - "오염 + 유출 실증"
        negative_signs:
          - "명령 흔적·실제 값 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 근거 없는 환각·인용 조작 분석

      RAG가 **근거 없이 환각**하거나 오염 문서를 권위 있게 인용하는 위험을 분석한다.

      ### ✅ 합격 기준
      환각·오염 인용 위험을 실제 응답 관찰과 함께 분석한다.
    hint: "근거 없는 환각·오염 문서 권위 인용 위험을 응답 관찰과 함께 분석."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "ag-11-2", type: "command_ran", target: "attacker",
            params: { pattern: "chat" } }
      semantic:
        intent: |
          환각·인용 조작 — 근거 부재·오염 인용의 위험을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 /api/chat 호출 흔적이 남음"
          - "환각·오염 인용 위험을 응답 관찰과 함께 분석"
          - "(설명) 근거 검증의 필요를 언급"
        acceptable_methods:
          - "환각·인용 위험 분석"
        negative_signs:
          - "관찰 없이 서술만"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — RAG 표면 진단

      RAG 파이프라인의 **오염·유출·환각 표면**을 진단한다.

      ### ✅ 합격 기준
      수집(오염)·검색(유출)·생성(환각) 표면을 증거로 진단한다.
    hint: "수집(오염)·검색(유출)·생성(환각) 표면 증거 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "ag-11-3", type: "command_ran", target: "attacker",
            params: { pattern: "rag" } }
      semantic:
        intent: |
          RAG 표면 진단 — 오염·유출·환각 표면을 증거로 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "수집·검색·생성 표면을 증거로 진단"
          - "(설명) 위험을 식별"
        acceptable_methods:
          - "RAG 파이프라인 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 근거 기반·검색 보안 설계

      RAG 지식 에이전트의 **검색 보안·근거 기반 판단**을 설계한다.

      ### 무엇을
      - **수집 통제**: 지식 채널 인증·출처 검증·검토(오염 차단).
      - **검색 보안**: 사용자 권한 필터·민감 데이터 인덱싱 제외·출처 가중.
      - **근거 기반**: 답변에 근거(출처) 표시·근거 없으면 보류, 환각 억제.
      - **출력 검증**: 비밀·PII 마스킹.

      ### ✅ 합격 기준
      수집 통제·검색 권한 필터·근거 기반 판단·출력 검증을 제시하고 "검증된 근거로만 답한다" 원칙을 설명한다.
    hint: "수집 인증·출처 검증+검색 권한 필터·민감 인덱싱 제외·출처 가중+근거 표시·근거 없으면 보류+출력 마스킹. '검증된 근거로만' 원칙."
    verify:
      type: "semantic"
      expect: "rag_agent_security"
      semantic:
        intent: |
          근거 기반·검색 보안 — 수집 통제·권한 필터·근거 기반·출력 검증으로 RAG를 안전하게.
        success_criteria:
          - "수집 통제(인증·출처 검증)를 제시"
          - "검색 권한 필터·민감 인덱싱 제외를 제시"
          - "근거 기반 판단·출력 검증을 제시하고 원칙 설명"
        acceptable_methods:
          - "수집 + 검색 보안 + 근거 기반 + 출력 검증"
        negative_signs:
          - "검색 권한 통제 없음"
          - "근거 기반·마스킹 없음"
