id: "ai-safety-adv-w01"
category: "ai-safety-adv"
title: "[AI안전심화 W1] LLM Red Teaming 프레임워크: 체계적 공격·측정 vs 자동화 방어 검증"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  LLM 레드팀 프레임워크 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 체계적 공격·측정·
  자동화의 레드팀 프레임워크를 세운다.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran + 보고서(방법론·ASR).
    윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 레드팀 프레임워크 정의 + 기준선 ASR

      공격 카테고리(인젝션·탈옥·유출·오염·에이전시)와 **판정 기준·ASR 측정법**을 정의하고, 각 카테고리
      기준선 ASR을 측정한다.

      ### ✅ 합격 기준
      최소 4개 공격 카테고리의 판정 기준과 기준선 ASR을 측정해 제시한다.
    hint: "공격 카테고리 정의+판정 기준+카테고리별 기준선 ASR 측정. debug/prompt·chat·rag/add·tool 활용."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-1-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "레드팀 프레임워크 — 카테고리·판정·ASR로 체계화."
        success_criteria:
          - "본인 인프라 명령 로그에 다수 /api 호출 흔적이 남음"
          - "최소 4개 공격 카테고리의 판정 기준·기준선 ASR을 측정"
          - "(설명) 측정법을 정의"
        acceptable_methods: ["카테고리별 ASR 측정"]
        negative_signs: ["카테고리·판정 기준 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 변형 생성·확장 전략

      각 카테고리의 **변형 생성 전략**(프레이밍·인코딩·조합)으로 커버리지를 넓히고 ASR 향상을 측정한다.

      ### ✅ 합격 기준
      변형 생성으로 ASR이 변하는지 측정하고 가장 효과적인 변형 전략을 제시한다.
    hint: "프레이밍·인코딩·조합 변형으로 ASR 향상 측정 + 효과적 변형 전략."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-1-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "변형 생성 — 커버리지·ASR을 높이는 전략."
        success_criteria:
          - "본인 인프라 명령 로그에 반복 호출 흔적이 남음"
          - "변형별 ASR 변화를 측정"
          - "(설명) 효과적 변형 전략을 제시"
        acceptable_methods: ["변형 생성 + ASR 측정"]
        negative_signs: ["변형·측정 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 방어 관점 레드팀 결과 해석

      레드팀 ASR을 **방어 관점으로 해석**한다: 높은 ASR 카테고리를 취약 우선순위로, 방어 목표(목표 ASR)를
      설정.

      ### ✅ 합격 기준
      카테고리별 ASR을 취약 우선순위로 해석하고 방어 목표를 설정한다.
    hint: "카테고리별 ASR→취약 우선순위+목표 ASR 설정. 채점=본인 인프라 검증 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-1-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "레드팀 결과 해석 — ASR을 방어 우선순위·목표로 전환."
        success_criteria:
          - "본인 인프라 명령 로그에 검증 호출 흔적이 남음"
          - "카테고리별 ASR을 취약 우선순위로 해석"
          - "(설명) 방어 목표(목표 ASR)를 설정"
        acceptable_methods: ["ASR 해석 + 목표 설정"]
        negative_signs: ["우선순위·목표 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자동화 방어 검증 파이프라인 설계

      레드팀을 **CI에 통합한 자동 방어 검증**을 설계한다: 회귀 스위트·ASR 게이트·신규 위협 반영.

      ### ✅ 합격 기준
      회귀 스위트·ASR 게이트·신규 위협 반영을 갖춘 자동 검증 파이프라인을 제시한다.
    hint: "회귀 스위트(CI)+ASR 게이트(임계 초과 차단)+신규 위협 반영. 자동 방어 검증."
    verify:
      type: "semantic"
      expect: "auto_defense_validation"
      semantic:
        intent: "자동 방어 검증 — CI 통합 회귀·ASR 게이트로 지속 검증."
        success_criteria:
          - "회귀 스위트(CI 통합)를 제시"
          - "ASR 게이트(임계 초과 차단)를 제시"
          - "신규 위협 반영을 제시"
        acceptable_methods: ["회귀 + ASR 게이트 + 갱신"]
        negative_signs: ["일회성·게이트 없음"]
