id: "aisec-w07"
category: "aisec"
title: "[AI에이전트보안 W7] 클라이언트 하네스(Claude Code·MCP) 권한 악용 vs 권한·경계 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  클라이언트 하네스 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 클라이언트 사이드 하네스(Claude Code·CLAUDE.md·MCP·권한)와 서버
  하네스의 차이를 이해하고, 권한 악용과 경계 설계를 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(클라이언트 권한 악용)와 Blue(권한·경계 설계)를 모두 수행.
    • duel : Red 학생이 권한을 악용하고, Blue 학생이 경계로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion·클라이언트 관점으로
    수행. 채점은 **명령 흔적(command_ran)** + **보고서 증거·설계**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 클라이언트 넓은 권한 악용 실증

      클라이언트 에이전트의 **넓은 권한·MCP 신뢰**가 악용될 수 있음을 실증한다.

      ### ✅ 합격 기준
      넓은 클라이언트 권한(실행·네트워크)·MCP 신뢰 경계 부재를 실제 호출로 증명하고 위험을 설명한다.
    hint: "클라이언트에서 AICompanion 도구/API 호출로 넓은 권한 악용·MCP 신뢰 부재 실증. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-7-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          클라이언트 권한 악용 — 넓은 권한·MCP 신뢰 부재 위험을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "넓은 권한·MCP 신뢰 부재를 실제 호출로 증명"
          - "(설명) 위험을 설명"
        acceptable_methods:
          - "클라이언트 권한 악용 실증"
        negative_signs:
          - "명령 흔적 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 콘텐츠 인젝션→클라이언트 도구 하이재킹 분석

      클라이언트가 처리하는 콘텐츠의 인젝션이 **파일/명령 도구**를 하이재킹하는 위험과, 서버 하네스와의
      차이를 분석한다.

      ### ✅ 합격 기준
      콘텐츠 인젝션→클라이언트 도구 하이재킹 경로와 서버/클라이언트 하네스 차이를 분석한다.
    hint: "콘텐츠 인젝션→클라이언트 도구(파일·명령) 하이재킹+서버 vs 클라이언트 하네스 차이 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-7-2", type: "command_ran", target: "attacker",
            params: { pattern: "chat" } }
      semantic:
        intent: |
          클라이언트 하이재킹 — 콘텐츠 인젝션이 클라이언트 도구를 탈취하는 경로와 하네스 차이를 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "콘텐츠 인젝션→도구 하이재킹 경로를 분석"
          - "(설명) 서버/클라이언트 하네스 차이를 설명"
        acceptable_methods:
          - "하이재킹 경로 + 하네스 차이 분석"
        negative_signs:
          - "경로 막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 클라이언트 권한 표면 진단

      클라이언트 에이전트의 **권한·MCP 신뢰 표면**을 진단한다.

      ### ✅ 합격 기준
      클라이언트 권한·MCP 신뢰 경계를 증거·분석으로 진단한다.
    hint: "클라이언트 파일·명령·네트워크 권한·MCP 신뢰 경계 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-7-3", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          클라이언트 권한 진단 — 권한·MCP 신뢰를 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "클라이언트 권한·MCP 신뢰를 진단"
          - "(설명) 과도한 권한을 식별"
        acceptable_methods:
          - "권한/MCP 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — 클라이언트 권한·경계 설계

      클라이언트 하네스의 **권한·경계**를 설계한다.

      ### 무엇을
      - **권한 최소화·승인**: 파일/명령/네트워크 최소·허용목록, 위험 행동 승인(권한 프롬프트).
      - **MCP 신뢰 경계**: 신뢰 서버만·입력 검증·격리.
      - **콘텐츠 신뢰**: 신뢰되지 않은 콘텐츠를 지시로 실행 금지.
      - **설정·감사**: CLAUDE.md/설정으로 규칙 강제·감사.

      ### ✅ 합격 기준
      권한 최소화·승인·MCP 경계·콘텐츠 신뢰 경계를 제시하고 "클라이언트도 최소 권한·승인·경계로" 원칙을 설명한다.
    hint: "권한 최소·허용목록·위험 승인+신뢰 MCP·입력 검증·격리+콘텐츠 지시 미실행+설정·감사. '최소 권한·승인·경계' 원칙."
    verify:
      type: "semantic"
      expect: "client_boundary"
      semantic:
        intent: |
          클라이언트 권한·경계 — 최소 권한·승인·MCP 경계·콘텐츠 신뢰 경계로 클라이언트 하네스를 안전하게.
        success_criteria:
          - "권한 최소화·위험 행동 승인을 제시"
          - "MCP 신뢰 경계·격리를 제시"
          - "콘텐츠 신뢰 경계·감사를 제시하고 원칙 설명"
        acceptable_methods:
          - "권한 최소 + 승인 + MCP 경계 + 콘텐츠 경계"
        negative_signs:
          - "넓은 권한 유지"
          - "승인·경계 없음"
