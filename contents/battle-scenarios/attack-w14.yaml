id: "attack-w14"
category: "attack"
title: "[공격기법 W14] 레드와 블루가 함께 — Caldera+Wazuh로 탐지 커버리지 측정·보강·재검증"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  공격과 방어를 한 사이클로 돌리는 **Purple Team**. Red(Caldera 에뮬레이션)와 Blue(Wazuh 탐지)를
  맞물려 **탐지 커버리지 공백**을 측정하고 메운다. 에뮬레이션한 ATT&CK technique마다 탐지됐는지
  매핑(ATT&CK Navigator)하고, 미탐 technique의 룰을 보강해 **다시 검증**하는 반복 개선 루프가 핵심이다.

  ▸ 모드: solo(에뮬레이션↔탐지 1인 purple) / duel(상대 에뮬레이션→본인 탐지 보강). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Caldera 미설치 → 에뮬레이션은 동등 수동. Red 채점은 대상 WAF audit(태그)/호스트 흔적으로.
    웹 태그 **`pu14r1-<id>`**, 약한 가시성 technique 산물 계정 **`purpbot`**, 보강 룰 Suricata **sid 9414001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — Caldera operation (다중 technique)

      ### 상황
      여러 ATT&CK technique(정찰/실행/발견)을 한 operation으로 에뮬레이션해 Blue의 탐지 커버리지를
      측정할 데이터를 만든다.

      ### 할 일
      이 미션 전용 태그 `pu14r1-<id>`를 붙여 다중 technique을 수행한다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/?id=pu14r1-kim-1%20UNION%20SELECT%201"
      ```

      ### 채점 방법
      대상 WAF audit에 (pu14r1 태그 포함) 다중 technique 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 pu14r1 태그가 포함된 탐지가 남는다.
    hint: "Caldera operation/수동 다중 technique(태그 pu14r1). 채점: 대상 modsec audit의 913/942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "pu14r1", since_sec: 1800 } }
      semantic:
        intent: "Caldera operation — 다중 technique 에뮬레이션으로 탐지 커버리지 측정 데이터 생성. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (pu14r1 태그 포함) 다중 technique 탐지(최근)"
          - "몇 개 technique을 묶었는지 + 커버리지 측정 의도"
        acceptable_methods:
          - "Caldera operation / 동등 수동 다중 technique"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — 탐지 회피 technique (gap 유발)

      ### 상황
      일부러 탐지가 약한 technique(은밀한 발견/지속성)을 에뮬레이션해 커버리지 공백을 드러낸다. 백도어
      계정(**purpbot**)으로 지속성 산물을 남긴다.

      ### 할 일
      ```bash
      useradd -m -s /bin/bash purpbot
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 에뮬레이션 산물(purpbot)이 있는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `purpbot`이 있다.
    hint: "탐지 약한 technique 에뮬레이션 → useradd purpbot. 채점: file_contains passwd purpbot."
    verify:
      type: "file_contains"
      expect: "purpbot"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "purpbot" } }
      semantic:
        intent: "탐지 gap 유발 — 약한 가시성 technique 에뮬레이션. 커버리지 공백을 의도적으로 노출."
        success_criteria:
          - "/etc/passwd에 purpbot"
          - "어떤 technique이 탐지 약한지 가설"
        acceptable_methods:
          - "은밀한 발견/지속성 ability / 동등 수동"
        negative_signs:
          - "산물 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 에뮬레이션↔탐지 매핑 (커버리지 측정)

      ### 상황
      에뮬레이션한 각 technique이 탐지됐는지 매핑해 **탐지 커버리지**를 측정한다(탐지/미탐 매트릭스).
      ATT&CK Navigator로 커버리지를 색칠한다.

      ### 할 일
      technique별 탐지/미탐 매트릭스 + Navigator 커버리지를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 매핑(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 매핑은 제출로 검증).
    hint: "technique별 탐지/미탐 매트릭스 + Navigator 커버리지. 채점: wazuh_alert + 매핑 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "Purple 커버리지 측정 — 에뮬레이션 technique ↔ 탐지 매핑. Navigator로 공백 가시화."
        success_criteria:
          - "경보 수집 확인"
          - "technique별 탐지/미탐 매트릭스"
          - "Navigator 커버리지 색칠"
        acceptable_methods:
          - "탐지 매핑 + ATT&CK Navigator"
        negative_signs:
          - "매핑 없이 경보 나열"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 미탐 technique 탐지룰 보강 (sid 9414001)

      ### 상황
      커버리지 측정에서 드러난 **공백**: 기존 IDS는 sqlmap을 **도구 UA**로만 잡는다 → 공격자가 UA를
      바꾸면(스푸핑) 같은 SQLi가 그대로 통과한다. 도구 시그니처가 아니라 **페이로드 자체**(UNION SELECT)를
      잡는 Suricata 룰(**sid 9414001**)을 `local.rules`에 작성해 이 공백을 메운다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATK W14 coverage gap - SQLi payload"; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; distance:0; fast_pattern; sid:9414001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9414001 보강 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9414001 룰이 있다.
    hint: "UA 스푸핑으로 새는 공백을 페이로드(UNION SELECT) 룰로 보강(sid 9414001) → reload."
    verify:
      type: "file_contains"
      expect: "9414001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9414001" } }
      semantic:
        intent: "커버리지 보강 — UA 스푸핑으로 새는 공백을 페이로드 기반 룰로. 도구 시그니처가 아닌 SQLi 페이로드(UNION SELECT)를 탐지. purple 루프의 핵심(측정→보강)."
        success_criteria:
          - "local.rules에 sid 9414001"
          - "기존 UA 룰의 공백(스푸핑 회피)을 페이로드 탐지로 메움"
          - "보강 후 재검증 계획"
        acceptable_methods:
          - "페이로드(UNION SELECT 등) 기반 룰 작성 + reload"
        negative_signs:
          - "기존 UA 룰과 동일 패턴 중복 / 문법 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 반복 개선 + 회귀 검증

      ### 상황
      보강 룰 적용 후 같은 operation을 재실행해 커버리지가 올라갔는지 회귀 검증한다. Purple Team의 반복
      개선 루프(측정→보강→재검증)를 한 사이클 완성한다.

      ### 할 일
      operation 재실행 → 커버리지 상승을 회귀 검증한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 회귀 검증(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 검증은 제출로 검증).
    hint: "operation 재실행 → 커버리지 상승 회귀 검증. 채점: wazuh_alert + 검증 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "Purple 반복 개선 — 보강 후 재실행으로 커버리지 상승 검증. 측정→보강→재검증 루프 완성."
        success_criteria:
          - "경보 수집 확인"
          - "재실행 시 미탐 technique이 탐지됨 확인"
          - "한 사이클 완성 서술"
        acceptable_methods:
          - "operation 재실행 + 커버리지 비교"
        negative_signs:
          - "보강만 하고 재검증 누락"
