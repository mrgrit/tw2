id: "iot-security-w12"
category: "iot-security"
title: "[IoT보안 W12] OT/SCADA 기초: 레거시·에어갭 침투 vs 안전 최우선·분리"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  OT/SCADA 기초 공방전 — 산업 제어의 **레거시 프로토콜·에어갭 신화·안전 최우선** 특성과 공격/방어를
  설계·분석한다(IoT 관점의 OT 입문). 실물 ICS가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(OT 침투 경로)와 Blue(안전 최우선·분리)를 모두 수행.
    • duel : Red 학생이 OT 침투 경로를 제시하고, Blue 학생이 안전 우선 방어로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: 레거시 프로토콜 무인증·에어갭 우회·IT/OT 경계 경로의
    구체성, 안전 최우선(SIS)·Purdue 분리·모니터링 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — OT 공격은 물리 재앙·인명 위험. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (OT 침투 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — IT/OT 경계 침투 + 레거시 프로토콜 조작

      IT에서 OT로 피벗해 레거시 프로토콜을 조작하는 경로를 설계한다.

      ### 무엇을
      - **IT/OT 경계**: IT 침해→엔지니어링 워크스테이션/점프박스→OT 진입(경계가 허술한 경우).
      - **레거시 프로토콜**: Modbus/DNP3 무인증·평문 → 코일/레지스터 write·PLC 로직 조작.
      - **물리 결과**: 프로세스 조작(밸브·모터·설정치).

      ### ✅ 합격 기준
      IT/OT 경계 피벗과 레거시 프로토콜 조작이 물리 프로세스 조작으로 이어지는 경로를 구체적으로 설계한다.
    hint: "IT 침해→엔지니어링 워크스테이션→OT 진입+Modbus/DNP3 무인증 write·PLC 로직 조작→물리 프로세스. 경계·프로토콜 명시."
    verify:
      type: "semantic"
      expect: "ot_attack_path"
      semantic:
        intent: |
          OT 침투 — IT/OT 경계 피벗과 레거시 프로토콜 조작으로 물리 프로세스를 조작하는 경로를 이해.
        success_criteria:
          - "IT/OT 경계 피벗(엔지니어링 WS/점프박스)을 설계"
          - "레거시 프로토콜(Modbus/DNP3 무인증) 조작을 설계"
          - "물리 프로세스 조작으로 이어짐을 서술"
        acceptable_methods:
          - "IT/OT 피벗 + 프로토콜 조작 + 물리"
        negative_signs:
          - "경계·프로토콜 근거 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 에어갭 신화·레거시 취약 분석

      "에어갭이면 안전하다"는 **신화의 허점**과 레거시 취약(패치 불가·기본 자격·문서화된 프로토콜)을
      분석한다.

      ### ✅ 합격 기준
      에어갭 우회 경로(USB·유지보수 노트북·임시 연결·공급망) 최소 2가지와 레거시 취약(패치 불가·기본
      자격)을 분석한다.
    hint: "에어갭 우회(USB·유지보수 노트북·임시 연결·공급망 2+)+레거시 취약(패치 불가·기본 자격·문서화 프로토콜). Stuxnet식 USB."
    verify:
      type: "semantic"
      expect: "airgap_myth"
      semantic:
        intent: |
          에어갭 신화·레거시 취약 — 에어갭 우회 경로와 패치 불가 레거시의 위험을 이해.
        success_criteria:
          - "에어갭 우회 경로(USB·유지보수·임시 연결·공급망) 최소 2가지를 분석"
          - "레거시 취약(패치 불가·기본 자격·문서화 프로토콜)을 분석"
          - "(설명) 에어갭이 완전 격리가 아님을 언급"
        acceptable_methods:
          - "에어갭 우회 + 레거시 취약 분석"
        negative_signs:
          - "우회 경로 1개·막연"

# ───────────────────────── BLUE (안전 최우선·분리) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — OT 탐지·모니터링 설계

      OT 공격을 **탐지**하는 방안을 설계한다(OT는 수동 모니터링이 관건).

      ### 무엇을
      - **수동 모니터링**: OT 네트워크 수동 캡처(능동 스캔은 위험)로 비정상 명령·신규 장치·프로토콜 이상.
      - **베이스라인**: 정상 프로세스 값·통신 패턴 베이스라인 이탈 탐지.
      - **IT/OT 경계**: 경계 통과·엔지니어링 WS 이상 접근 탐지.

      ### ✅ 합격 기준
      OT 수동 모니터링·베이스라인 이탈·경계 탐지를 제시하고 "OT는 능동 스캔이 위험하므로 수동 관찰"을
      설명한다.
    hint: "수동 캡처(능동 스캔 위험)로 비정상 명령·신규 장치+프로세스/통신 베이스라인 이탈+IT/OT 경계 탐지. '수동 관찰' 강조."
    verify:
      type: "semantic"
      expect: "ot_detection"
      semantic:
        intent: |
          OT 탐지 — 수동 모니터링·베이스라인·경계 탐지로 OT 공격을 안전하게 탐지.
        success_criteria:
          - "OT 수동 모니터링(비정상 명령·신규 장치)을 제시"
          - "프로세스/통신 베이스라인 이탈 탐지를 제시"
          - "(설명) IT/OT 경계 탐지와 '능동 스캔 위험' 원칙을 제시"
        acceptable_methods:
          - "수동 모니터링 + 베이스라인 + 경계"
        negative_signs:
          - "능동 스캔 위험 무시"
          - "탐지 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 최우선·Purdue 분리·심층 방어 설계

      OT의 **안전 최우선 심층 방어**를 설계한다.

      ### 무엇을
      - **독립 안전 계장(SIS)**: 제어와 분리된 SIS가 위험 시 안전 정지를 물리·독립 강제.
      - **Purdue 분리·경계**: 레벨 분리·DMZ·데이터 다이오드(단방향)·경계 방화벽.
      - **레거시 대응**: 패치 불가 장치는 분리·보상 통제(모니터링·접근 통제)로 감싸기.
      - **접근·매체 통제**: 유지보수 매체(USB) 통제, 원격 접근 최소화·다요소.

      ### ✅ 합격 기준
      독립 SIS·Purdue 분리·데이터 다이오드·레거시 보상 통제·매체 통제를 제시하고 "안전 최우선, 격리로
      감싸라" 원칙을 설명한다.
    hint: "독립 SIS(안전 정지)+Purdue 분리·DMZ·데이터 다이오드+레거시 보상 통제(분리·모니터링)+USB/원격 접근 통제. '안전 최우선·격리로 감싸기' 원칙."
    verify:
      type: "semantic"
      expect: "ot_safety_defense"
      semantic:
        intent: |
          OT 안전 최우선 방어 — 독립 SIS·Purdue 분리·레거시 보상 통제로 물리 안전을 보장.
        success_criteria:
          - "독립 안전 계장(SIS)을 제시"
          - "Purdue 분리·DMZ·데이터 다이오드를 제시"
          - "레거시 보상 통제·매체/원격 접근 통제를 제시"
          - "(설명) '안전 최우선, 격리로 감싸기' 원칙 설명"
        acceptable_methods:
          - "SIS + Purdue 분리 + 레거시 보상 + 접근 통제"
        negative_signs:
          - "독립 SIS 언급 없음"
          - "레거시 보상 통제 없음"
