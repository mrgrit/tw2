id: "cohort-cross-infra-demo"
title: "[데모] 코호트 cross-infra 듀얼"
description: "코호트(분반) 단위 1v1 cross-infra 공방전 데모. Red 는 **망 외부 공격자(attacker-ext)** 로 상대(Blue) VM 의 공개 포트(http://<상대IP>/ + Host 헤더)만 보고 공격하고(assess_target=opponent), Blue 는 자신의 WAF/IPS/Wazuh 로그에서 그 흔적을 탐지/방어한다. 외부 공격자의 명령 로그는 6v6 에서 수집이 불완전하므로, Red 채점은 **상대 인프라의 공격 흔적**(WAF/접근로그 + source IP·payload 상관)으로만 한다."
difficulty: "easy"
time_limit: 1800
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "망 외부 공격자(attacker-ext)에서 상대 VM 공개포트로 SQLi 공격을 보내 상대 WAF(ModSecurity) 로그에 흔적을 남겨라. 예: curl -H 'Host: dvwa.6v6.lab' \"http://<상대IP>/?id=1' UNION SELECT...\""
    hint: "attacker-ext(:2203) → 공개포트 80 + Host 헤더. 내부 IP 직접 접근 불가(외부 침입자 모델)."
    points: 20
    target_vm: web
    assess_target: opponent
    verify:
      # 외부 공격은 타깃 측 흔적으로 채점(외부 attacker 명령은 미수집). modsec 로그 별칭.
      type: log_contains
      log: modsec
      pattern: "union"
  - order: 2
    instruction: "외부 공격으로 상대 IPS(Suricata)에 SQLi/스캔 시그니처가 잡히게 하라 (상대 인프라에서 채점)."
    hint: "공개포트 공격 트래픽이 fw→ips 검사를 거치며 Suricata 에 탐지됨"
    points: 15
    target_vm: ips
    assess_target: opponent
    verify:
      type: log_contains
      log: suricata
      pattern: "SQL"

blue_missions:
  - order: 1
    instruction: "본인 web 로그에서 SQLi 공격 흔적을 탐지하라 (본인 인프라에서 채점)."
    hint: "ModSecurity 로그에서 공격 도구/페이로드 흔적 검색"
    points: 15
    target_vm: web
    verify:
      type: log_contains
      log: modsec
      pattern: "sqlmap"
  - order: 2
    instruction: "Wazuh 에서 ModSecurity SQLi 알림(rule 31108)을 확인하라."
    hint: "alerts.json 에서 rule.id 31108"
    points: 15
    target_vm: siem
    verify:
      type: wazuh_alert
      rule_id: "31108"
