id: "cohort-cross-infra-demo"
title: "[데모] 코호트 cross-infra 듀얼"
description: "코호트(분반) 단위로 매칭되는 1v1 cross-infra 공방전 데모. Red 는 상대(Blue) 인프라를 공격해 흔적을 남기고(assess_target=opponent), Blue 는 자신의 인프라에서 그 흔적을 탐지/방어한다. 채점은 6v6 Assessor 의 read-only check 로만 수행된다."
difficulty: "easy"
time_limit: 1800
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "상대 web 서버 침투 후 웹쉘 파일을 업로드하라 (상대 인프라에서 채점)."
    hint: "파일 업로드 취약점 → /var/www/html/shell.php"
    points: 20
    target_vm: web
    assess_target: opponent
    verify:
      type: file_exists
      path: /var/www/html/shell.php
  - order: 2
    instruction: "상대 web 접근 로그에 SQLi 공격 요청을 발생시켜라 (상대 인프라에서 채점)."
    hint: "union select 페이로드를 access.log 에 남긴다"
    points: 15
    target_vm: web
    assess_target: opponent
    verify:
      type: log_contains
      path: /var/log/apache2/access.log
      pattern: "union select"

blue_missions:
  - order: 1
    instruction: "본인 web 접근 로그에서 SQLi 공격 흔적을 탐지하라 (본인 인프라에서 채점)."
    hint: "access.log 에서 union select 패턴 검색"
    points: 15
    target_vm: web
    verify:
      type: log_contains
      path: /var/log/apache2/access.log
      pattern: "union select"
  - order: 2
    instruction: "Wazuh 에서 ModSecurity SQLi 알림(rule 31108)을 확인하라."
    hint: "alerts.json 에서 rule.id 31108"
    points: 15
    target_vm: siem
    verify:
      type: wazuh_alert
      rule_id: "31108"
