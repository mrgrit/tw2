id: "compliance-w09"
category: "compliance"
title: "[컴플라이언스 W9] ISMS 기술 점검 — 관리체계 공백 악용 vs 기술 통제 점검"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  컴플라이언스 9주차 — **정보보호관리체계(ISMS) 기술 점검**. 자산/접근/운영/로그 관리의 기술적 통제를 점검한다.
  공격자는 관리체계 공백을 악용하고, 감사자(너)는 기술 통제를 구현하고 충족을 증적으로 입증한다.

  ▸ 이야기: 공격자가 침투해(태그 `co09r1`) 관리 사각(`/tmp/.co09gap`)과 계정 `compa09` 을 남긴다. 감사자는
    ① 침입 탐지, ② 운영/로그 관리 룰, ③ ISMS 기술 통제 종합 점검·증적으로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/사각 파일·계정).
  ▸ 마커: 태그 **`co09r1-<본인id>`**, 관리 사각 **`/tmp/.co09gap`**(마커 `co09`), 계정 **`compa09`**,
    Suricata **sid 9809011**, Wazuh **id 104091**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [관리체계 공백 악용] — 운영 통제 미흡 공략

      ### 상황
      ISMS 운영 통제가 미흡하면 침투가 쉽다. 너는 태그 `co09r1-<본인id>` 로 침투해 통제 공백을 입증한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "co09r1-kim" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/vulnerabilities/sqli/?id=co09r1-kim%27%20OR%201=1--+&Submit=Submit"
      ```

      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `co09r1` 흔적 시 인정.
    hint: "태그(co09r1) 침투 → 대상 modsec audit. 채점: log_contains modsec co09r1."
    verify:
      type: "log_contains"
      expect: "co09r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "co09r1", since_sec: 1800 } }
      semantic:
        intent: "ISMS 운영 통제 공백 악용(T1190). 태그(co09r1) 귀속."
        success_criteria: ["대상 WAF audit 에 co09r1 태그", "통제 공백 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 침투"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [관리 사각] — 미관리 자산/계정

      ### 상황
      미관리 자산·계정은 ISMS 위반이다. 너는 관리 사각 산출물 **`/tmp/.co09gap`**(마커 `co09`)과 계정 **`compa09`** 을 남긴다.

      ### 할 일
      ```bash
      printf 'co09 unmanaged asset: shadow service, no owner, no logging' > /tmp/.co09gap
      sudo useradd -m -s /bin/bash compa09
      ```

      ### 채점 방법 / 합격 기준
      `/tmp/.co09gap`(마커 `co09`) 또는 `compa09` 존재 시 인정.
    hint: "관리 사각 /tmp/.co09gap (마커 co09) + useradd compa09. 채점: file_contains gap co09 + file_contains passwd compa09."
    verify:
      type: "file_contains"
      expect: "co09"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.co09gap", pattern: "co09" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "compa09" } }
      semantic:
        intent: "미관리 자산/계정(T1136) — ISMS 자산/접근 관리 공백."
        success_criteria: ["/tmp/.co09gap(마커 co09) 또는 계정 compa09", "미관리 자산 위험 서술"]
        acceptable_methods: ["사각 산출물 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [침입 탐지] — Suricata 룰 (sid 9809011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"COMPLIANCE-W09 ISMS intrusion (operations control)"; flow:to_server; http.uri; content:"OR 1=1"; nocase; sid:9809011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9809011 룰 존재 시 인정.
    hint: "ISMS 침입 탐지 Suricata 룰(sid 9809011) → reload. 채점: file_contains local.rules 9809011."
    verify:
      type: "file_contains"
      expect: "9809011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9809011" } }
      semantic:
        intent: "ISMS 운영 통제 — 침입 탐지 Suricata 룰. 운영 보안 통제."
        success_criteria: ["local.rules 에 sid 9809011", "운영 통제 연계"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [운영/로그 관리] — Wazuh 룰 (id 104091)

      ### 할 일
      ```xml
      <group name="edu,isms,">
        <rule id="104091" level="12">
          <if_group>edu</if_group>
          <match>compa09</match>
          <description>COMPLIANCE-W09 - ISMS: unmanaged asset / account (operations &amp; log mgmt)</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 104091 룰 존재 시 인정.
    hint: "운영/로그 관리 Wazuh 룰(id 104091) → restart. 채점: file_contains local_rules.xml 104091."
    verify:
      type: "file_contains"
      expect: "104091"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "104091" } }
      semantic:
        intent: "ISMS 운영/로그 관리 — 미관리 자산/계정 Wazuh 룰. 자산/접근/로그 관리 통제."
        success_criteria: ["local_rules.xml 에 rule id 104091", "운영/로그 관리 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [ISMS 기술 통제 종합 점검·증적]

      ### 할 일
      보고서에:
      - 기술 통제별 점검(자산관리/접근통제/운영보안/로그관리/암호화) + 증적
      - 미흡 개선 + 관리 사각(`/tmp/.co09gap`)·계정(compa09) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 ISMS 점검 증적으로 인정.
    hint: "ISMS 기술 통제 점검(자산/접근/운영/로그/암호화) + 증적 + 사각/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "ISMS 종합 점검·증적 — 기술 통제 영역별 충족 입증. 분석형 — 통제/증적 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "기술 통제별 점검(자산/접근/운영/로그/암호화) + 증적"
          - "관리 사각/계정 헌팅"
        acceptable_methods: ["점검 표 + 증적 + 헌팅"]
        negative_signs: ["증적 없는 서술 / 영역 누락"]
