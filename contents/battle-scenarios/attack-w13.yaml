id: "attack-w13"
category: "attack"
title: "[공격기법 W13] 로봇 공격자 — MITRE Caldera로 ATT&CK 자동 에뮬레이션 vs 탐지·매핑"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  손으로 하나씩 치는 공격을 넘어, **MITRE Caldera**로 자동화한다. **ability**(ATT&CK technique 단위
  행위)를 **adversary**(체인)로 묶으면 정찰→실행→발견→지속성을 에이전트가 자동으로 수행한다. 한 번
  설계하면 반복 실행·커버리지 측정이 가능하다. 방어자는 에뮬레이션된 ATT&CK technique을 탐지·매핑하고
  탐지 공백을 찾는다.

  ▸ 모드: solo(에뮬레이션→탐지 1인) / duel(상대망 에뮬레이션→본인 탐지). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 이 el34엔 Caldera가 **미설치** → ability/adversary는 설계/시뮬, 실 행위는 동등 수동
    명령으로. Red 채점은 대상 WAF audit(태그)/호스트 흔적으로. 웹 태그 **`ca13r1-<id>`**, 발견 단계 산물
    계정 **`caldbot`**, 탐지룰 Suricata **sid 9413001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — adversary 체인 에뮬레이션 (정찰 → 실행)

      ### 상황
      Caldera adversary(또는 동등 수동)로 정찰(T1595)→웹 실행(T1190) ability 체인을 자동 실행한다.
      각 ability가 ATT&CK technique 단위로 매핑됨을 이해한다.

      ### 할 일
      이 미션 전용 태그 `ca13r1-<id>`를 붙여 정찰+실행 ability 체인을 수행한다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
        "http://192.168.0.161/?id=ca13r1-kim-1%20UNION%20SELECT%201"
      ```

      ### 채점 방법
      대상 WAF audit에 (ca13r1 태그 포함) 에뮬레이션 행위 탐지(913/942)가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 ca13r1 태그가 포함된 탐지가 남는다.
    hint: "Caldera/수동으로 정찰+실행 ability 체인(태그 ca13r1). 채점: 대상 modsec audit의 913/942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "ca13r1", since_sec: 1800 } }
      semantic:
        intent: "Caldera ability/adversary — ATT&CK technique 단위 자동 실행. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (ca13r1 태그 포함) 에뮬레이션 행위 탐지(최근)"
          - "각 ability의 ATT&CK technique 매핑 서술"
          - "adversary 체인 구성 서술"
        acceptable_methods:
          - "Caldera adversary 실행 / 동등 수동 명령 체인"
        negative_signs:
          - "대상 미도달 / 태그 누락 / technique 매핑 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — 발견 + 지속성 ability (호스트)

      ### 상황
      발견(Discovery T1087 계정 열거)·지속성(T1136) ability를 에뮬레이션해 백도어 계정(**caldbot**)을
      만든다.

      ### 할 일
      ```bash
      useradd -m -s /bin/bash caldbot      # T1136 ability 산물
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 에뮬레이션 산물(caldbot)이 있는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `caldbot`이 있다.
    hint: "Discovery/Persistence ability → useradd caldbot. 채점: file_contains passwd caldbot."
    verify:
      type: "file_contains"
      expect: "caldbot"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "caldbot" } }
      semantic:
        intent: "Caldera Discovery/Persistence ability — T1087/T1136 자동 실행. 호스트 산물로 판정."
        success_criteria:
          - "/etc/passwd에 caldbot"
          - "ability→technique 매핑 서술"
        acceptable_methods:
          - "Caldera ability / 동등 수동"
        negative_signs:
          - "산물 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 에뮬레이션 탐지 + ATT&CK 매핑

      ### 상황
      에뮬레이션된 technique들을 SIEM에서 탐지하고 ATT&CK 매트릭스로 매핑한다. 자동 에뮬레이션의
      장점(반복성/커버리지)을 활용해 탐지를 검증한다.

      ### 할 일
      에뮬레이션 technique을 탐지하고 ATT&CK으로 매핑한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 매핑(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 매핑은 제출로 검증).
    hint: "에뮬레이션 technique 탐지 + ATT&CK 매핑. 채점: wazuh_alert + 매핑 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "에뮬레이션 탐지 — 실행된 technique을 SIEM에서 탐지 + ATT&CK 매핑. 반복 가능한 탐지 검증."
        success_criteria:
          - "경보 수집 확인"
          - "탐지된 technique → ATT&CK 매핑"
          - "어느 ability가 탐지/미탐지"
        acceptable_methods:
          - "SIEM 탐지 + ATT&CK 매핑"
        negative_signs:
          - "매핑 누락"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — 미탐 technique 탐지룰 (sid 9413001)

      ### 상황
      에뮬레이션에서 탐지되지 않은(gap) technique을 잡는 Suricata 룰(**sid 9413001**)을 `local.rules`에
      작성한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATK W13 emulated technique"; http.user_agent; content:"sqlmap"; nocase; fast_pattern; sid:9413001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9413001 탐지룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9413001 룰이 있다.
    hint: "탐지 gap technique 룰(sid 9413001) → reload."
    verify:
      type: "file_contains"
      expect: "9413001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9413001" } }
      semantic:
        intent: "탐지 gap 보완 — 에뮬레이션에서 미탐된 technique을 룰로. 자동 에뮬레이션이 커버리지 공백을 드러냄."
        success_criteria:
          - "local.rules에 sid 9413001"
          - "미탐 technique 대상"
          - "gap을 어떻게 식별했는지"
        acceptable_methods:
          - "local.rules 작성 + reload"
        negative_signs:
          - "문법 오류 / 이미 탐지되는 것 중복"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 적대자 에뮬레이션의 가치 분석

      ### 상황
      Caldera 자동 에뮬레이션의 가치(반복 가능/커버리지 측정/탐지 회귀 테스트)와 한계(실 공격과의 차이/
      환경 의존)를 분석하고, 운영 탐지 검증 파이프라인에 어떻게 통합할지 제안한다.

      ### 할 일
      에뮬레이션 가치/한계 + 탐지 검증 파이프라인 통합안을 정리한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 분석은 제출로 검증).
    hint: "에뮬레이션 가치/한계 + 탐지 검증 파이프라인. 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "에뮬레이션 가치 — 반복성/커버리지 측정/탐지 회귀. 한계(실 공격 차이) + CI 통합."
        success_criteria:
          - "경보 수집 확인"
          - "가치/한계 균형 분석"
          - "탐지 검증 파이프라인 제안"
        acceptable_methods:
          - "에뮬레이션 가치 분석 + 통합안"
        negative_signs:
          - "에뮬레이션 맹신/무용론"
