id: "attack-adv-w15"
category: "attack-adv"
title: "[공격고급 W15] 모의해킹 보고서 — 대표 취약점 입증 + 표준 보고서(수료)"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  공격 고급과정 **수료 시험**. 모의해킹의 산출물은 결국 **보고서**다. 대표 취약점을 입증(PoC)하고, 표준 형식
  (Executive Summary / Finding / CVSS / 공격 내러티브 / ATT&CK 매핑 / 위험 히트맵 / 재테스트 계획)으로 보고서를
  완성한다. Red 는 보고 대상 취약점을 입증하고, Blue 는 대응 룰과 정식 모의해킹 보고서를 작성한다.

  ▸ 이야기
    공격자가 대표 취약점(SQLi/기본 자격증명)을 태그 `aa15r1` 로 입증하고 PoC 증거(`/tmp/.aa15poc`)와 계정
    `atka15` 를 남긴다. 방어자는 탐지 룰을 배포하고, 발견사항을 표준 보고서로 문서화한다.

  ▸ 모드
    • solo : 한 학생이 입증(자기 인프라 표적)과 보고서를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라에서 입증, Blue 는 자기 인프라에서 대응·보고.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    입증 태그 **`aa15r1-<본인id>`**, PoC 증거 **`/tmp/.aa15poc`**(마커 `aa15`), 계정 **`atka15`**,
    Suricata 탐지 **sid 9715011**, Wazuh 탐지 **id 103151**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [대표 취약점 입증] — 보고서에 실릴 Finding

      ### 상황
      보고서의 핵심은 **재현 가능한 입증**이다. 너는 태그 `aa15r1-<본인id>` 로 대표 취약점(SQLi)을 입증한다 — 이
      탐지가 Finding 의 증거가 된다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim):
      ```bash
      curl -s -A "aa15r1-kim" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/vulnerabilities/sqli/?id=aa15r1-kim%27%20UNION%20SELECT%20user,password%20FROM%20users--+&Submit=Submit"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa15r1` 가 포함된 입증 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `aa15r1` 태그가 포함된 입증 탐지가 남는다.
    hint: "태그(aa15r1) 대표 취약점(SQLi) 입증 → 대상 modsec audit. 채점: log_contains modsec aa15r1."
    verify:
      type: "log_contains"
      expect: "aa15r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa15r1", since_sec: 1800 } }
      semantic:
        intent: "대표 취약점 입증(T1190) — 재현 가능한 PoC. 보고서 Finding 의 증거. 태그(aa15r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 aa15r1 태그가 포함된 입증 탐지"
          - "재현 절차(요청/응답)를 Finding 형식으로 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 단 입증"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [PoC 증거 + 발판] — 부록용 산출물

      ### 상황
      보고서 **기술 부록**에 들어갈 PoC 증거 **`/tmp/.aa15poc`**(마커 `aa15`)를 남기고, 두 번째 Finding(기본
      자격증명)의 발판으로 계정 **`atka15`** 를 만든다.

      ### 할 일
      ```bash
      printf 'aa15 PoC: SQLi dump + default cred admin:admin' > /tmp/.aa15poc
      sudo useradd -m -s /bin/bash atka15
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.aa15poc`(마커 `aa15`)이 있거나 `/etc/passwd` 에 `atka15` 가 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa15poc`(마커 `aa15`) 또는 계정 `atka15`.
    hint: "PoC 증거 /tmp/.aa15poc (마커 aa15) + useradd atka15. 채점: file_contains poc aa15 + file_contains passwd atka15."
    verify:
      type: "file_contains"
      expect: "aa15"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.aa15poc", pattern: "aa15" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka15" } }
      semantic:
        intent: "PoC 증거(부록) + 기본 자격증명 Finding(T1078) + 계정(T1136). 보고서 증빙."
        success_criteria:
          - "/tmp/.aa15poc(마커 aa15) 또는 계정 atka15"
          - "PoC 증거가 어떤 Finding 을 뒷받침하는지 서술"
        acceptable_methods:
          - "PoC 파일 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [대응 탐지] — Suricata 룰 (sid 9715011)

      ### 상황
      입증된 취약점에 대한 탐지 룰(**sid 9715011**)을 배포한다(보고서의 "탐지/대응" 항목 증빙).

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W15 reported SQLi finding"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9715011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9715011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 sid 9715011 룰이 존재한다.
    hint: "Finding 대응 Suricata 룰(sid 9715011) → reload. 채점: file_contains local.rules 9715011."
    verify:
      type: "file_contains"
      expect: "9715011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9715011" } }
      semantic:
        intent: "Finding 대응 탐지(네트워크) — 보고된 취약점 Suricata 룰. 보고서의 탐지 가능성 증빙."
        success_criteria:
          - "local.rules 에 sid 9715011"
          - "이 룰이 어떤 Finding 에 대응하는지 명시"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [발판 대응] — Wazuh 룰 (id 103151)

      ### 상황
      RED-2 의 발판(계정/PoC)을 잡는 Wazuh 룰(**id 103151**)을 배포한다.

      ### 할 일
      ```xml
      <group name="edu,pentest,">
        <rule id="103151" level="12">
          <if_group>edu</if_group>
          <match>atka15</match>
          <description>ATKADV-W15 - reported finding: backdoor account / PoC artifact</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 103151 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 id 103151 룰이 존재한다.
    hint: "발판 대응 Wazuh 룰(id 103151) → restart. 채점: file_contains local_rules.xml 103151."
    verify:
      type: "file_contains"
      expect: "103151"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103151" } }
      semantic:
        intent: "Finding 대응 탐지(호스트) — 백도어 계정/PoC Wazuh 룰. 후속 위험 대응 증빙."
        success_criteria:
          - "local_rules.xml 에 rule id 103151"
          - "발판(계정) 탐지 로직"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [수료] — 모의해킹 보고서 + Cleanup

      ### 상황
      수료의 산출물이다. **표준 모의해킹 보고서**(Executive Summary / Finding(제목·CVSS·재현·영향·권고) / 공격
      내러티브 / **ATT&CK 매핑** / 위험 히트맵 / 재테스트 계획)를 완성하고, 아티팩트를 **일괄 cleanup** 한다.

      ### 할 일
      보고서에:
      - Executive Summary + Finding 2건(SQLi/기본자격증명: CVSS 벡터/재현/영향/권고)
      - 공격 내러티브(시간순) + ATT&CK 매핑 + 위험 히트맵(발생가능성×영향) + 재테스트 계획
      - cleanup:
      ```bash
      sudo rm -f /tmp/.aa15poc; sudo userdel -r atka15 2>/dev/null
      sudo sed -i '/9715011/d' /etc/suricata/rules/local.rules && sudo suricatasc -c reload-rules
      # local_rules.xml 에서 103151 블록 제거 후 wazuh-control restart
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 표준 보고서/ATT&CK/히트맵/재테스트/cleanup 으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 표준 모의해킹 보고서·ATT&CK·히트맵·재테스트·cleanup 은 제출로 검증).
    hint: "표준 모의해킹 보고서(Exec Summary/Finding+CVSS/내러티브/ATT&CK/위험 히트맵/재테스트) + PoC/계정/9715011/103151 일괄 cleanup. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "모의해킹 보고서(수료) — Exec Summary/Finding/CVSS/내러티브/ATT&CK/히트맵/재테스트 + cleanup. 공격 고급과정의 매듭."
        success_criteria:
          - "최근 경보 수집 확인"
          - "Exec Summary + Finding(CVSS/재현/영향/권고) + 공격 내러티브 + ATT&CK + 위험 히트맵 + 재테스트"
          - "아티팩트 일괄 cleanup"
        acceptable_methods:
          - "표준 보고서 + ATT&CK + 히트맵 + 재테스트 + cleanup"
        negative_signs:
          - "보고서 섹션 누락 / cleanup 미완"
