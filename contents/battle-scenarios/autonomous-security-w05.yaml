id: "autonomous-security-w05"
category: "autonomous-security"
title: "[자율보안 W5] 재사용 공격 Playbook vs 자동 대응 Playbook"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  Playbook 자동화 공방전 — bastion의 **재사용 가능한 보안 임무(Playbook)** 를 Red/Blue로 실습한다.
  일회성 명령이 아니라, 매개변수화된 단계·판정·분기를 가진 **재현 가능한 Playbook**을 설계·실행한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(공격 Playbook)와 Blue(대응 Playbook)를 모두 설계·실행.
    • duel : Red 학생이 공격 Playbook을 실행하고, Blue 학생은 대응 Playbook으로 자동 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 Playbook 설계**(매개변수·
    단계·판정·분기)로 한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — Playbook은 (입력 매개변수)→(단계 시퀀스)→(각 단계 판정·분기)→(출력)로
    구성돼 재사용·재현·감사가 가능하다. 자율 에이전트가 Playbook을 실행 단위로 삼는다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (재사용 공격 Playbook) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 매개변수화된 공격 Playbook 실행

      "웹 앱 침투"를 **재사용 가능한 Playbook**으로 설계해 대상에 실행한다. 대상 URL·경로 등을 매개변수로
      두어 다른 대상에도 재사용 가능하게.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)에 Playbook 단계(정찰→취약 탐지→PoC)
        를 실행(고유 태그).
      - Playbook을 매개변수(target·paths·payloads)·단계·각 단계 판정(성공/실패 분기)으로 문서화.

      ### 권장 명령 (참고)
      ```bash
      TARGET=192.168.0.161
      curl -A 'auto-red-<학번>-pb-recon' "http://$TARGET/"
      curl -A 'auto-red-<학번>-pb-sqli' "http://$TARGET/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 Playbook 정의**(매개변수·단계·판정·분기).

      ### ✅ 합격 기준
      대상에 Playbook을 실행해 탐지 흔적을 남기고, 매개변수화된 재사용 Playbook(단계·판정·분기)을 정의한다.
    hint: "웹 침투를 매개변수화 Playbook(target·payloads·단계·판정)으로 설계·실행(태그 auto-red-<학번>). 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-5-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          재사용 공격 Playbook — 매개변수·단계·판정·분기로 구조화해 재현·재사용 가능한 임무. bastion
          Playbook 관점.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 Playbook 실행 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "(설명) 매개변수(target·payloads)·단계·각 단계 판정·분기를 정의"
          - "(설명) 다른 대상 재사용 가능성을 설명"
        acceptable_methods:
          - "매개변수화 Playbook 단계 실행"
        negative_signs:
          - "탐지 흔적 없음"
          - "일회성 명령·재사용 구조 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — Playbook 판정·분기·오류 처리 강화

      Playbook의 **판정 로직과 분기·오류 처리**를 강화한다. 단계 실패 시 대체 경로, 방어 차단 시 우회
      분기, 재시도·중단 조건을 설계·검증한다.

      ### 어떻게
      - 방어(WAF)가 차단(403)하면 대체 페이로드로 분기하는 로직을 실제로 시도.
      - 각 단계 판정 기준(무엇을 성공/실패로 볼지)과 오류 처리(재시도·중단)를 명시.

      ### ✅ 합격 기준
      Playbook에 판정·분기·오류 처리를 넣어 방어 차단 시 대체 경로로 분기함을 실제 반응으로 검증한다.
    hint: "WAF 403 시 대체 페이로드 분기 로직 실제 시도 + 판정 기준·재시도/중단 조건 명시. 견고한 Playbook."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-5-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Playbook 견고성 — 판정·분기·오류 처리로 방어 대응·실패에 유연. 재현 가능한 자율 실행.
        success_criteria:
          - "대상 IPS/WAF에 분기 시도 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "방어 차단 시 대체 경로 분기를 실제 반응으로 검증"
          - "(설명) 판정 기준·오류 처리(재시도·중단)를 명시"
        acceptable_methods:
          - "분기 로직 실제 시도 + 판정/오류 처리 정의"
        negative_signs:
          - "분기·판정 없이 선형 실행만"

# ───────────────────────── BLUE (자동 대응 Playbook) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 대응 Playbook 실행: 경보→조사→대응 시퀀스

      SIEM 경보에 대한 **자동 대응 Playbook**(SOAR식)을 실행한다: 경보 트리거→조사→위협 판정→대응
      준비 시퀀스.

      ### 어떻게
      - Wazuh/Suricata 공격 경보를 트리거로 Playbook 시작.
      - 조사 단계(출처·심각도·이력)→판정→대응 준비(차단안)를 시퀀스로 실행.
      - 각 단계 입력·판정·출력을 명시.

      ### ✅ 합격 기준
      공격 경보를 트리거로 대응 Playbook(조사→판정→대응 준비)을 실행하고 각 단계를 설명한다.
    hint: "Wazuh/Suricata 경보 트리거→조사→판정→대응 준비 Playbook 시퀀스 실행. 각 단계 입력·판정·출력 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          대응 Playbook — 경보 트리거→조사→판정→대응의 재현 가능한 시퀀스. SOAR식 자동 대응.
        success_criteria:
          - "Wazuh/Suricata 공격 경보를 트리거로 Playbook을 시작"
          - "조사→판정→대응 준비 시퀀스를 실행"
          - "(설명) 각 단계 입력·판정·출력을 명시"
        acceptable_methods:
          - "경보 트리거 대응 Playbook 시퀀스"
        negative_signs:
          - "경보 근거 없음"
          - "시퀀스·판정 구조 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 대응 Playbook 안전장치·재사용 설계

      대응 Playbook의 **안전장치와 재사용성**을 설계한다. 자동 대응은 잘못되면 피해가 크므로 게이트가
      필수다.

      ### 무엇을
      - **안전장치**: 고위험 대응(차단·격리)은 사람 승인 게이트, 자동 대응 범위 제한(화이트리스트).
      - **멱등성·롤백**: 반복 실행해도 안전(멱등), 잘못된 대응 롤백 계획.
      - **재사용**: 매개변수화(경보 유형·자산·심각도)로 여러 상황 재사용.
      - **감사·검증**: 각 실행을 append-only 감사, 대응 효과 검증.

      ### ✅ 합격 기준
      승인 게이트·멱등성/롤백·재사용 매개변수·감사를 구체적으로 설계하고, "자동 대응은 안전장치와 함께"
      원칙을 설명한다.
    hint: "고위험 대응 승인 게이트+멱등성/롤백+재사용 매개변수화+감사·효과 검증. '자동 대응은 안전장치와 함께' 원칙."
    verify:
      type: "semantic"
      expect: "response_playbook_safety"
      semantic:
        intent: |
          대응 Playbook 안전성 — 승인 게이트·멱등성·롤백·재사용·감사로 자동 대응을 안전하고 재현 가능하게.
        success_criteria:
          - "고위험 대응 승인 게이트·자동 범위 제한을 제시"
          - "멱등성·롤백 계획을 제시"
          - "재사용 매개변수화·감사·효과 검증을 제시"
          - "(설명) '자동 대응은 안전장치와 함께' 원칙 설명"
        acceptable_methods:
          - "승인 게이트 + 멱등성/롤백 + 재사용 + 감사"
        negative_signs:
          - "안전장치 없는 완전 자동 대응"
          - "롤백·감사 언급 없음"
