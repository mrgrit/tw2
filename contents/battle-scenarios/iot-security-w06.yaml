id: "iot-security-w06"
category: "iot-security"
title: "[IoT보안 W6] 무선 프로토콜 해킹: Zigbee·Z-Wave·독점 RF vs 무선 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  무선 프로토콜 공방전 — **Zigbee·Z-Wave·독점 RF(Sub-GHz)** 의 공격과 방어를 설계·분석한다. 실물 SDR·
  라디오가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(무선 프로토콜 공격)와 Blue(무선 보안)를 모두 수행.
    • duel : Red 학생이 무선 공격 경로를 제시하고, Blue 학생이 무선 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: Zigbee/Z-Wave/RF 취약(키 교환·재전송·재밍)의 구체성,
    무선 보안(키 관리·프레임 카운터·인증) 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — RF 공격은 실물·법적 인가 필요. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (무선 프로토콜 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — Zigbee/Z-Wave 키 탈취·명령 인젝션 경로

      Zigbee/Z-Wave의 **키 교환·페어링 취약**을 악용하는 경로를 설계한다.

      ### 무엇을
      - **Zigbee**: 페어링 시 네트워크 키가 (레거시) 평문/약한 전송으로 노출 → 스니핑으로 키 탈취 →
        복호화·명령 인젝션(전등·잠금).
      - **Z-Wave**: 약한 S0 키 교환·다운그레이드 → 명령 인젝션.
      - 스니핑(SDR)·재전송·명령 위조로 물리 제어.

      ### ✅ 합격 기준
      Zigbee 또는 Z-Wave의 키 취약(페어링/교환)을 악용해 키 탈취·명령 인젝션으로 물리 제어하는 경로를
      구체적으로 설계한다.
    hint: "Zigbee 페어링 네트워크 키 노출·스니핑→복호화→명령 인젝션 / Z-Wave S0 약한 교환·다운그레이드. SDR 스니핑·재전송·물리 제어."
    verify:
      type: "semantic"
      expect: "zigbee_zwave_attack"
      semantic:
        intent: |
          Zigbee/Z-Wave 공격 — 키 교환·페어링 취약을 악용해 키 탈취·명령 인젝션으로 장치를 제어.
        success_criteria:
          - "Zigbee 또는 Z-Wave의 키 취약(페어링·교환)을 악용하는 경로를 설계"
          - "키 탈취·명령 인젝션을 구체적으로 서술"
          - "물리 제어(전등·잠금)로 이어짐을 서술"
        acceptable_methods:
          - "키 취약 → 스니핑/복호화 → 명령 인젝션"
        negative_signs:
          - "프로토콜 근거 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 독점 RF·재전송·재밍 분석

      독점 Sub-GHz RF(차고문·리모컨)의 취약을 분석한다: **재전송(replay)**·고정 코드·약한 롤링 코드·
      **재밍**.

      ### ✅ 합격 기준
      독점 RF의 고정/약한 롤링 코드·재전송·재밍 중 최소 2가지 취약을 분석하고 물리 제어(문 열림 등)로
      이어짐을 설명한다.
    hint: "독점 RF 고정 코드/약한 롤링 코드 재전송+재밍(RollJam식). 2+ 취약 → 물리 제어(차고문·리모컨). SDR 캡처·재생."
    verify:
      type: "semantic"
      expect: "rf_replay"
      semantic:
        intent: |
          독점 RF 취약 — 고정/약한 롤링 코드·재전송·재밍으로 물리 장치를 제어함을 이해.
        success_criteria:
          - "독점 RF 취약(고정/약한 롤링 코드·재전송·재밍) 최소 2가지를 분석"
          - "물리 제어(문 열림 등)로 이어짐을 설명"
          - "(설명) RollJam식 재밍+재전송 결합을 언급"
        acceptable_methods:
          - "재전송·재밍 취약 분석"
        negative_signs:
          - "취약 1개·막연"

# ───────────────────────── BLUE (무선 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 무선 키 관리·인증·무결성 설계

      RED의 무선 공격을 막는 **키 관리·인증·무결성**을 설계한다.

      ### 무엇을
      - **강한 키 교환**: Zigbee 3.0 install code·Z-Wave S2(ECDH), 평문 키 전송 제거.
      - **프레임 무결성·재전송 방지**: 프레임 카운터·nonce, 재전송 거부.
      - **롤링 코드 강화**: 암호학적 롤링 코드·챌린지-응답(독점 RF).
      - RED 경로별 대응.

      ### ✅ 합격 기준
      강한 키 교환(install code·S2)·프레임 카운터·암호 롤링 코드를 제시하고 RED 무선 공격에 매핑한다.
    hint: "Zigbee install code·Z-Wave S2(ECDH)+프레임 카운터·nonce(재전송 방지)+암호 롤링 코드·챌린지-응답. RED 경로 매핑."
    verify:
      type: "semantic"
      expect: "wireless_key_security"
      semantic:
        intent: |
          무선 키 관리·무결성 — 강한 키 교환·프레임 카운터·암호 롤링 코드로 스니핑·재전송을 막는다.
        success_criteria:
          - "강한 키 교환(install code·S2 ECDH)을 제시"
          - "프레임 카운터·nonce(재전송 방지)를 제시"
          - "암호 롤링 코드·챌린지-응답을 제시하고 RED 매핑"
        acceptable_methods:
          - "키 교환 + 재전송 방지 + 롤링 코드"
        negative_signs:
          - "평문 키·고정 코드 유지"
          - "재전송 방지 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 무선 모니터링·복원력·물리 안전 설계

      무선 계층의 **모니터링·복원력·안전**을 설계한다.

      ### 무엇을
      - **RF 모니터링**: 재밍·비정상 트래픽·재전송 시도 탐지, 무선 IDS.
      - **복원력**: 재밍 시 대체 채널·유선 백업, 통신 상실 시 안전 기본값.
      - **키 수명주기**: 키 회전·폐기·장치 탈퇴 시 rekey.
      - **물리 안전**: 잠금 등 안전 필수 장치는 무선 실패 시 안전측(잠김 유지) 기본값.

      ### ✅ 합격 기준
      RF 모니터링·재밍 복원력·키 수명주기·안전 기본값을 제시하고 "무선이 실패해도 안전" 원칙을 설명한다.
    hint: "무선 IDS(재밍·재전송 탐지)+재밍 복원력(대체 채널·유선 백업)+키 회전·rekey+무선 실패 시 안전측 기본값. '무선 실패해도 안전' 원칙."
    verify:
      type: "semantic"
      expect: "wireless_resilience"
      semantic:
        intent: |
          무선 복원력·안전 — 모니터링·재밍 복원력·안전 기본값으로 무선 실패에도 안전을 보장.
        success_criteria:
          - "RF 모니터링(재밍·재전송 탐지)을 제시"
          - "재밍 복원력(대체 채널·백업)과 키 수명주기를 제시"
          - "무선 실패 시 안전측 기본값을 제시"
          - "(설명) '무선 실패해도 안전' 원칙 설명"
        acceptable_methods:
          - "모니터링 + 복원력 + 키 수명주기 + 안전 기본값"
        negative_signs:
          - "안전 기본값·복원력 언급 없음"
