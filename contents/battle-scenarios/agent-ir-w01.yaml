id: "agent-ir-w01"
category: "agent-ir"
title: "[에이전트IR W1] AI 속도 다단계 공격 vs 템포 불일치 탐지 기준선"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — AI 에이전트 공격의 핵심 특성인 **템포 불일치**("2년→2시간")를 방어자 관점에서
  다룬다. Red는 사람보다 훨씬 빠른 다단계 공격을 대상(el34)에 가하고, Blue는 그 **속도·기계적 규칙성**
  을 탐지 신호로 삼아 IR 기준선을 세운다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(AI 속도 공격)와 Blue(템포 기반 탐지)를 모두 수행. 공격 흔적을 이어서 방어자로 분석.
    • duel : Red 학생이 빠른 다단계 공격을 수행하고, Blue 학생은 대상 인프라에서 탐지·분석한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 웹 진입 192.168.0.161)을 공격한다. 외부
    명령 로그는 불완전하므로 Red 채점은 **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 +
    **보고서**로 한다. 반드시 **고유 태그**(`auto-red-<학번>`)를 UA·주석에 붙여 귀속한다.

  ▸ 에이전트 IR 관점 — 방어의 존재 이유는 "사람이 못 따라가는 속도"다. Blue는 개별 이벤트가 아니라
    **짧은 시간 창에 압축된 다단계 시퀀스**를 하나의 캠페인으로 상관한다.

  ▸ 윤리 — 모든 공격은 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (AI 속도 다단계 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 압축된 다단계: 정찰→공격을 짧은 창에 (템포)

      사람 공격자라면 며칠 걸릴 정찰→공격을 **짧은 시간 창(수 분)에 압축**해 수행한다. 속도 자체가
      방어자에게 남기는 신호임을 실증한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 el34(192.168.0.161)에 정찰(스캔)→웹 공격(SQLi/XSS)을
        연속으로(고유 태그).
      - 각 단계 시각을 기록해 "압축된 템포"를 보고서에 제시.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -T4 -Pn 192.168.0.161 -p1-1000 --reason
      curl -A 'auto-red-<학번>-storm' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 Suricata/ModSec/Wazuh 탐지 흔적 + 본인 명령 흔적 + **보고서의 단계별 타임스탬프(압축 템포)**.

      ### ✅ 합격 기준
      정찰→공격을 짧은 창에 압축 수행해 대상에 탐지 흔적을 남기고, 단계별 시각으로 템포를 제시한다.
    hint: "외부 공격자에서 nmap→SQLi를 수 분 내 연속(태그 auto-red-<학번>). 단계별 타임스탬프 기록. 채점=대상 Suricata/ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-1-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          AI 속도 다단계 — 압축된 템포로 정찰→공격을 연속 수행. 속도가 방어자에게 남기는 신호임을 실증.
        success_criteria:
          - "대상 IPS(Suricata)/WAF에 정찰·공격 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "정찰→공격을 짧은 창에 압축 수행"
          - "(설명) 단계별 타임스탬프로 압축 템포를 제시"
        acceptable_methods:
          - "연속 nmap→웹 공격(태그) + 타임스탬프"
        negative_signs:
          - "탐지 흔적 없음"
          - "템포(타임스탬프) 제시 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 기계적 규칙성 노출 (탐지 관찰 지점)

      AI 공격은 **기계적 규칙성**(일정 간격·동일 UA·순차적 페이로드)을 남긴다. 이 규칙성이 방어자에게
      어떻게 보이는지 실증하고, 사람 공격과의 차이를 분석한다.

      ### 어떻게
      - 대상 웹(192.168.0.161)에 규칙적 간격의 다수 요청(고유 태그)을 보내 기계적 패턴을 남긴다.
      - 사람 대비 규칙성(간격·순서·일관성)의 차이를 보고서에 분석.

      ### ✅ 합격 기준
      규칙적 다수 요청으로 대상에 기계적 패턴을 남기고, 사람 공격과 구분되는 특성(간격·일관성·순서)을
      분석한다.
    hint: "규칙적 간격 다수 요청(태그)으로 기계적 패턴 노출 + 사람 대비 규칙성 차이 분석. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-1-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          기계적 규칙성 — AI 공격이 남기는 일정 간격·일관 UA·순차 패턴이 탐지 관찰 지점임을 실증.
        success_criteria:
          - "대상 WAF(ModSec)에 규칙적 요청 흔적이 남고 고유 태그로 귀속됨"
          - "기계적 패턴(간격·순서·일관성)을 남김"
          - "(설명) 사람 공격과 구분되는 특성을 분석"
        acceptable_methods:
          - "규칙적 다수 요청 + 특성 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "사람 대비 분석 없음"

# ───────────────────────── BLUE (템포 기반 탐지 기준선) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 압축 템포 탐지: 캠페인 상관

      대상 SIEM(Wazuh)/IPS(Suricata)에서 Red의 **압축된 다단계 시퀀스**를 하나의 캠페인으로 상관한다.

      ### 어떻게
      - Wazuh/Suricata에서 짧은 시간 창의 정찰→공격 이벤트를 찾아 **출처·태그·시각**으로 묶는다.
      - 개별 경보가 아니라 "수 분 내 다단계"라는 템포를 캠페인 지표로 제시.

      ### ✅ 합격 기준
      짧은 창의 다단계 이벤트를 출처·시각으로 상관해 하나의 AI 속도 캠페인으로 식별한다.
    hint: "Wazuh/Suricata에서 짧은 창의 정찰→공격 이벤트를 출처·태그·시각으로 묶어 캠페인 상관. 템포를 지표로."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-1-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          압축 템포 캠페인 상관 — 개별 이벤트를 시간·출처로 묶어 AI 속도 캠페인으로 식별.
        success_criteria:
          - "Wazuh/Suricata에서 다단계 이벤트를 찾아 출처·시각을 제시"
          - "짧은 창의 다단계를 하나의 캠페인으로 상관"
          - "(설명) 압축 템포를 캠페인 지표로 설명"
        acceptable_methods:
          - "출처·시각 상관 + 캠페인 식별"
        negative_signs:
          - "경보 근거 없음"
          - "개별 이벤트만·상관 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 템포 기반 탐지 기준선 설계

      AI 속도 공격을 잡는 **템포·규칙성 기반 탐지 기준선**을 설계한다.

      ### 무엇을
      - **템포 지표**: 시간 창당 이벤트 수·단계 전환 속도 임계, 사람 대비 이상 속도 탐지.
      - **규칙성 지표**: 일정 간격·동일 UA·순차 페이로드 등 기계적 특성 탐지.
      - **상관 규칙**: 짧은 창의 다단계(정찰+공격+…)를 캠페인으로 묶는 상관 규칙.
      - **오탐 관리**: 정상 자동화(스캐너·모니터링)와 공격 자동화 구분.

      ### ✅ 합격 기준
      템포·규칙성 지표와 캠페인 상관 규칙을 구체적으로 설계하고, "속도·규칙성이 AI 공격의 관찰 지점"
      원칙과 오탐 관리를 설명한다.
    hint: "템포 지표(창당 이벤트·전환 속도 임계)+규칙성 지표(간격·UA·순서)+캠페인 상관 규칙+정상 자동화 구분. '속도·규칙성=관찰 지점' 원칙."
    verify:
      type: "semantic"
      expect: "tempo_detection_baseline"
      semantic:
        intent: |
          템포 탐지 기준선 — 속도·규칙성·상관으로 AI 속도 공격을 잡는 기준선을 세우고 오탐을 관리.
        success_criteria:
          - "템포 지표(시간 창당 이벤트·전환 속도 임계)를 제시"
          - "규칙성 지표(간격·UA·순차 페이로드)를 제시"
          - "캠페인 상관 규칙과 정상 자동화 구분(오탐 관리)을 제시"
          - "(설명) '속도·규칙성이 AI 공격의 관찰 지점' 원칙 설명"
        acceptable_methods:
          - "템포 + 규칙성 + 상관 + 오탐 관리"
        negative_signs:
          - "단일 임계만"
          - "오탐 관리·상관 언급 없음"
