id: "ai-safety-adv-w09"
category: "ai-safety-adv"
title: "[AI안전심화 W9] 프라이버시 공격: 멤버십 추론·훈련 데이터 추출 vs 차등 프라이버시"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  프라이버시 공격 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 멤버십 추론·훈련/지식
  데이터 추출과 차등 프라이버시·최소화 방어를 다룬다.
  ▸ 실측 — `/api/dataset`·retrieved로 PII/SSN이 유출. Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`,
    비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만, PII는 보고서 외 저장 금지.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 데이터 추출로 PII 획득
      /api/dataset·retrieved로 PII/SSN을 획득하고, 특정 데이터 존재 여부(멤버십 추론)를 질의로 확인한다.
      ### ✅ 합격 기준: PII/SSN 실제 값을 획득 인용하고 멤버십 추론 경로를 실증한다.
    hint: "/api/dataset·retrieved로 PII/SSN 획득 + 특정 데이터 존재 질의(멤버십 추론)."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-9-1", type: "command_ran", target: "attacker", params: { pattern: "dataset" } }
      semantic:
        intent: "프라이버시 추출 — PII 획득·멤버십 추론."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/dataset·/api/chat 흔적이 남음"
          - "PII/SSN 실제 값을 획득 인용"
          - "(설명) 멤버십 추론 경로를 실증"
        acceptable_methods: ["dataset/retrieved 추출 + 멤버십 추론"]
        negative_signs: ["실제 값 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 추론 공격 원리 분석
      멤버십 추론·모델 반전(입력 재구성)·훈련 데이터 추출의 원리와 신뢰도 신호(과확신)를 분석한다.
      ### ✅ 합격 기준: 멤버십 추론·데이터 추출 원리와 프라이버시 위험을 분석한다.
    hint: "멤버십 추론(신뢰도 신호)·모델 반전·훈련 데이터 추출 원리 + 프라이버시 위험."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "red-9-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "추론 공격 원리 — 멤버십·반전·추출로 프라이버시 침해."
        success_criteria:
          - "본인 인프라 명령 로그에 흔적이 남음"
          - "멤버십 추론·데이터 추출 원리를 분석"
          - "(설명) 프라이버시 위험을 설명"
        acceptable_methods: ["추론 원리 분석"]
        negative_signs: ["원리 없이 서술만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 프라이버시 노출 표면 진단
      데이터 덤프·retrieved PII 노출·과확신 출력을 증거로 진단.
      ### ✅ 합격 기준: PII 노출·추론 여지를 증거로 진단한다.
    hint: "/api/dataset·retrieved PII 노출 + 과확신 출력 증거 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-9-1", type: "command_ran", target: "attacker", params: { pattern: "dataset" } }
      semantic:
        intent: "프라이버시 노출 진단 — PII 노출·추론 여지 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 흔적이 남음"
          - "PII 노출·추론 여지를 증거로 제시"
          - "(설명) 프라이버시 위험 등급화"
        acceptable_methods: ["노출 증거 진단"]
        negative_signs: ["증거 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 차등 프라이버시·데이터 최소화 설계
      데이터 최소화·PII 인덱싱 제외·토큰화+차등 프라이버시(노이즈)+출력 신뢰도 제한+데이터셋 엔드포인트
      제거·검색 권한 필터.
      ### ✅ 합격 기준: 데이터 최소화·DP·출력 제한·접근 통제를 제시하고 "프라이버시는 설계로 내재" 원칙을
      설명한다.
    hint: "데이터 최소화·PII 제외·토큰화+DP(노이즈)+출력 신뢰도 제한+엔드포인트 제거·검색 권한. '프라이버시 설계 내재' 원칙."
    verify:
      type: "semantic"
      expect: "differential_privacy"
      semantic:
        intent: "프라이버시 방어 — 최소화·DP·접근 통제로 추론·추출을 막는다."
        success_criteria:
          - "데이터 최소화·PII 인덱싱 제외·토큰화를 제시"
          - "차등 프라이버시(노이즈)·출력 신뢰도 제한을 제시"
          - "데이터셋 엔드포인트 제거·검색 권한 필터를 제시"
          - "(설명) '프라이버시는 설계로 내재' 원칙 설명"
        acceptable_methods: ["최소화 + DP + 출력 제한 + 접근 통제"]
        negative_signs: ["최소화·DP 없음"]
