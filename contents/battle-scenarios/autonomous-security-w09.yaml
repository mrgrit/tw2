id: "autonomous-security-w09"
category: "autonomous-security"
title: "[자율보안 W9] 경험 재사용 공격 vs KG·Experience·EvidenceDB 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  지식·경험 아키텍처 공방전 — bastion의 **지식 그래프(KG)·경험(Experience)·증거DB(EvidenceDB)** 를
  Red/Blue로 실습한다. 자율 에이전트는 과거 경험·지식을 재사용해 더 빨리·정확히 판단한다. Red는 과거
  정찰 지식을 재사용해 공격을 가속하고, Blue는 증거·경험 기반 탐지를 강화한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(경험 재사용 공격)와 Blue(증거·경험 기반 방어)를 모두 수행.
    • duel : Red 학생이 축적 지식으로 공격을 가속하고, Blue 학생은 EvidenceDB로 상관·탐지한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 지식·경험 재사용 설계**로
    한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — KG(엔티티·관계)·Experience(과거 임무 결과)·EvidenceDB(관찰 증거)는 에이전트
    기억이다. 재사용으로 효율↑, 단 오래된/오염된 지식은 오판을 부른다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (경험·지식 재사용 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 과거 정찰 지식 재사용으로 공격 가속

      이전 주(W02~W08)에서 축적한 대상 지식(열린 포트·서비스·취약 경로)을 **KG/Experience로 재사용**해
      정찰을 생략하고 바로 표적 침투한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)의 알려진 취약 경로에 바로 PoC(고유 태그).
      - 재사용한 지식(엔티티·관계·과거 결과)과 그로 인한 효율 향상을 명시.

      ### 권장 명령 (참고)
      ```bash
      # 과거 경험: /vulnerabilities/sqli 취약 → 정찰 생략, 바로 표적
      curl -A 'auto-red-<학번>-exp' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 지식 재사용 설계**(무슨 지식을·어떻게 재사용해
      효율↑).

      ### ✅ 합격 기준
      과거 지식을 재사용해 표적 침투 흔적을 남기고, 재사용한 지식과 효율 향상을 설명한다.
    hint: "과거 정찰 지식(취약 경로) 재사용해 정찰 생략·바로 표적 침투(태그 auto-red-<학번>). 재사용 지식·효율 명시."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-9-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          경험·지식 재사용 — KG/Experience로 과거 지식을 재사용해 공격을 가속. 에이전트 기억의 활용.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 표적 침투 흔적이 남고 고유 태그로 귀속됨"
          - "재사용한 지식(엔티티·관계·과거 결과)을 명시"
          - "(설명) 재사용으로 인한 효율 향상을 설명"
        acceptable_methods:
          - "과거 지식 재사용 표적 침투"
        negative_signs:
          - "흔적 없음"
          - "재사용 지식 설명 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 지식 신선도·오염 위험 분석

      재사용 지식의 **한계**를 분석한다. 오래된 지식(포트가 닫힘)·오염된 경험(방어 변경)을 그대로
      믿으면 오판·실패한다. 지식 검증의 필요성을 논증한다.

      ### 어떻게
      - 과거 지식이 지금도 유효한지 최소한의 검증(표적 응답 확인)을 하고, 불일치가 있으면 기록.
      - 지식 신선도·출처 신뢰가 자율 에이전트 판단에 왜 중요한지 논증.

      ### ✅ 합격 기준
      재사용 지식의 현재 유효성을 검증하고, 지식 신선도·오염이 자율 판단에 미치는 위험을 논증한다.
    hint: "과거 지식이 지금도 유효한지 표적 응답으로 검증 + 불일치 기록. 지식 신선도·오염 위험 논증."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-9-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          지식 신선도·오염 — 재사용 지식이 낡거나 오염되면 오판. 지식 검증의 필요.
        success_criteria:
          - "대상 IPS에 검증 활동 흔적이 남음(고유 태그)"
          - "재사용 지식의 현재 유효성을 검증(불일치 기록)"
          - "(설명) 지식 신선도·오염이 자율 판단에 미치는 위험 논증"
        acceptable_methods:
          - "지식 유효성 검증 + 위험 논증"
        negative_signs:
          - "검증 없이 과거 지식 맹신"

# ───────────────────────── BLUE (증거·경험 기반 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — EvidenceDB 상관: 과거 증거로 공격 식별

      SIEM 경보를 **과거 증거(EvidenceDB)·경험과 상관**해 공격을 더 빨리·정확히 식별한다.

      ### 어떻게
      - Wazuh/Suricata의 현재 경보를 과거 유사 공격 경험(같은 출처·패턴·태그)과 상관.
      - 반복 공격자·알려진 패턴이면 신속 판정, 새 패턴이면 조사 심화.

      ### ✅ 합격 기준
      현재 경보를 과거 증거·경험과 상관해 공격을 식별하고, 반복/신규를 구분한다.
    hint: "Wazuh/Suricata 경보를 과거 증거(같은 출처·패턴·태그)와 상관. 반복 공격자 신속 판정 vs 신규 조사 심화."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-9-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          증거 기반 상관 — EvidenceDB·경험으로 현재 경보를 과거와 상관해 신속·정확히 식별.
        success_criteria:
          - "Wazuh/Suricata 경보를 과거 증거·경험과 상관"
          - "반복 공격자·알려진 패턴과 신규를 구분"
          - "(설명) 경험 재사용이 탐지 효율을 높임을 설명"
        acceptable_methods:
          - "경보-과거 증거 상관 + 반복/신규 구분"
        negative_signs:
          - "경보 근거 없음"
          - "상관 없이 단발 판정만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 지식·경험 아키텍처 설계 (KG·Experience·EvidenceDB)

      방어용 **지식·경험 아키텍처**를 설계한다.

      ### 무엇을
      - **KG**: 자산·계정·공격자·IOC를 엔티티·관계로 그래프화(맥락 파악·확산 추적).
      - **Experience**: 과거 임무·대응 결과를 저장해 재사용(무엇이 통했나).
      - **EvidenceDB**: 관찰 증거(경보·로그·아티팩트)를 구조화 저장·상관.
      - **신선도·출처·오염 관리**: 지식 만료·출처 신뢰·오염 격리(오래된/조작 지식 배제), 재사용 전 검증.

      ### ✅ 합격 기준
      KG·Experience·EvidenceDB와 신선도/출처/오염 관리를 구체적으로 설계하고, "경험 재사용은 검증된
      신선한 지식으로" 원칙을 설명한다.
    hint: "KG(엔티티·관계)+Experience(과거 결과)+EvidenceDB(증거 상관)+신선도/출처/오염 관리·재사용 전 검증. '검증된 신선한 지식 재사용' 원칙."
    verify:
      type: "semantic"
      expect: "knowledge_architecture"
      semantic:
        intent: |
          지식·경험 아키텍처 — KG·Experience·EvidenceDB로 맥락·재사용·상관을 지원하되 신선도·출처·오염을
          관리해 오판을 방지.
        success_criteria:
          - "KG(엔티티·관계 그래프)를 제시"
          - "Experience(과거 결과 재사용)·EvidenceDB(증거 상관)를 제시"
          - "신선도·출처 신뢰·오염 관리·재사용 전 검증을 제시"
          - "(설명) '검증된 신선한 지식 재사용' 원칙 설명"
        acceptable_methods:
          - "KG + Experience + EvidenceDB + 신선도/오염 관리"
        negative_signs:
          - "저장만 하고 신선도·오염 관리 없음"
          - "검증 없는 맹목 재사용"
