id: "agent-ir-adv-w05"
category: "agent-ir-adv"
title: "[에이전트IR고급 W5] 0-day 웹 프레임워크 자동 악용 vs 패치 전 이상 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 공격 에이전트가 **패치 없는 0-day 웹 프레임워크 취약**을 세션 내에서 발견·
  악용하는 공격과, 시그니처가 없는 상태에서의 이상 탐지를 다룬다. Red는 대상 웹에 실제 공격 흔적을
  남기고 0-day 악용 킬체인을 설계하며, Blue는 패치 전 탐지를 설계한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(0-day 악용 킬체인)와 Blue(패치 전 이상 탐지)를 모두 수행.
    • duel : Red 학생이 상대 웹을 0-day로 노리고, Blue 학생은 이상 탐지로 대응.

  ▸ 공격 위치·채점(중요)
    Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(el34, 192.168.0.161)을 공격한다. 채점은 **대상
    ModSec/Suricata/Wazuh 흔적** + 본인 명령 흔적 + **보고서의 0-day 악용·탐지 설계**로 한다. 고유
    태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점 — 에이전트는 시그니처 없는 취약을 세션 내 도구 생성으로 즉석 악용한다. 방어는
    시그니처가 아닌 이상 행위로 잡아야 한다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (0-day 악용 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 웹 프레임워크 표면 정찰 + 취약 후보 도출

      대상 웹(192.168.0.161)을 정찰(고유 태그)해 **프레임워크·엔드포인트 표면**을 파악하고 취약 후보를
      도출한다.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-recon' -I http://192.168.0.161/
      curl -A 'auto-red-<학번>-recon' "http://192.168.0.161/?debug=1"
      ```

      ### ✅ 합격 기준
      대상에 정찰 흔적을 남기고, 프레임워크 지문·엔드포인트에서 취약 후보(역직렬화·템플릿 인젝션·인증
      우회)를 도출한다.
    hint: "대상 웹 정찰(태그)로 프레임워크 지문·엔드포인트 파악+취약 후보(역직렬화·SSTI·인증 우회) 도출. 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-5-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          웹 프레임워크 정찰 — 지문·엔드포인트에서 0-day 취약 후보를 도출.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 정찰 흔적이 남고 고유 태그로 귀속됨"
          - "프레임워크 지문·취약 후보(역직렬화·SSTI·인증 우회)를 도출"
          - "(설명) 시그니처 없는 취약의 특성을 언급"
        acceptable_methods:
          - "정찰 + 취약 후보 도출"
        negative_signs:
          - "탐지 흔적 없음"
          - "취약 후보 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 즉석 익스플로잇·자동 악용 킬체인 설계

      취약 후보에 대해 **세션 내 익스플로잇 개발·자동 악용** 킬체인을 설계하고 대상에 시도 흔적(고유
      태그)을 남긴다.

      ### 무엇을
      - 페이로드 반복 조정(에이전트가 응답 보며 익스플로잇 개선)·RCE 도달·발판 확보.
      - 시그니처 없이 즉석 악용하는 에이전트의 속도·적응성.

      ### ✅ 합격 기준
      대상에 시도 흔적을 남기고, 세션 내 익스플로잇 개발→RCE→발판의 자동 악용 킬체인을 설계한다.
    hint: "취약 후보 익스플로잇 시도(태그)+세션 내 페이로드 조정→RCE→발판 자동 악용 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-5-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          0-day 자동 악용 — 세션 내 익스플로잇 개발로 시그니처 없는 취약을 즉석 악용하는 킬체인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 시도 흔적이 남고 고유 태그로 귀속됨"
          - "세션 내 익스플로잇 개발→RCE→발판 킬체인을 설계"
          - "(설명) 에이전트의 적응적 페이로드 조정을 설명"
        acceptable_methods:
          - "익스플로잇 시도 + 자동 악용 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (패치 전 이상 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 시그니처 없는 이상 탐지 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **시그니처 없이** 0-day를 잡는 이상 탐지를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 공격 흔적 확인.
      - 이상 탐지 신호: 반복 실패→성공 패턴(페이로드 조정)·비정상 응답 크기·예상 밖 프로세스/아웃바운드·
        엔드포인트 행위 이상(RCE 후 행동).

      ### ✅ 합격 기준
      RED 공격을 탐지하고, 시그니처 없이 잡는 이상 신호(페이로드 조정 패턴·행위 이상)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+시그니처 없는 이상(반복 실패→성공·비정상 응답·예상 밖 프로세스/아웃바운드·행위 이상) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-5-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          패치 전 이상 탐지 — 시그니처가 아닌 행위/패턴 이상으로 0-day 악용을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "시그니처 없는 이상 신호(조정 패턴·행위 이상)를 설계"
          - "(설명) 시그니처 방어의 한계를 언급"
        acceptable_methods:
          - "SIEM 탐지 + 이상 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "시그니처만 의존"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 0-day 완화·심층 방어 설계

      패치가 없는 상태에서 **0-day 피해를 제한**하는 심층 방어를 설계한다.

      ### 무엇을
      - **가상 패치·WAF**: 이상 행위 기반 가상 패치, 임시 완화 규칙.
      - **격리·최소 권한**: 앱 샌드박스·최소 권한·아웃바운드 통제(RCE 후 확산 차단).
      - **런타임 보호**: RASP·행위 기반 차단, 예상 밖 프로세스 실행 차단.
      - **신속 대응**: 자동화 속도에 맞춘 격리·롤백·패치 파이프라인.

      ### ✅ 합격 기준
      가상 패치·격리/최소 권한·런타임 보호·신속 대응을 제시하고 "패치 없어도 피해를 제한" 원칙을 설명한다.
    hint: "가상 패치·임시 WAF 규칙+앱 샌드박스·최소 권한·아웃바운드 통제+RASP 행위 차단+자동 격리·롤백. '패치 없어도 피해 제한' 원칙."
    verify:
      type: "semantic"
      expect: "zeroday_mitigation"
      semantic:
        intent: |
          0-day 완화 — 가상 패치·격리·런타임 보호·신속 대응으로 패치 전 피해를 제한.
        success_criteria:
          - "가상 패치·임시 완화를 제시"
          - "격리·최소 권한·아웃바운드 통제를 제시"
          - "런타임 보호·신속 대응을 제시하고 원칙 설명"
        acceptable_methods:
          - "가상 패치 + 격리 + 런타임 보호 + 대응"
        negative_signs:
          - "패치만 기다림"
          - "격리·런타임 보호 없음"
