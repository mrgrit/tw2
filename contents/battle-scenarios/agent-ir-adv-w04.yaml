id: "agent-ir-adv-w04"
category: "agent-ir-adv"
title: "[에이전트IR고급 W4] Cloud IAM 자동 Pivot vs 클라우드 위협 탐지·최소 권한"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — 유출된 키 하나로 공격 에이전트가 **클라우드 IAM을 10분 만에 자동 Pivot**해
  권한을 상승·확산하는 공격과 클라우드 위협 탐지를 다룬다.

  ▸ 채점 특성 — el34는 클라우드(AWS/GCP) 텔레메트리를 보유하지 않는다. **관측 채점은 대상(el34)에
    남는 정찰·웹 공격 흔적**으로 하고, IAM Pivot은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(IAM Pivot 킬체인)와 Blue(클라우드 탐지·최소 권한)를 모두 수행.
    • duel : Red 학생이 클라우드 Pivot을 설계·정찰하고, Blue 학생은 탐지·최소 권한으로 대응.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 정찰(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (IAM Pivot 킬체인) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 키 유출 진입 + IAM 열거 설계

      대상 웹 침투 시도(고유 태그)로 흔적을 남기고, **유출 키→IAM 열거**로 권한 경계를 파악하는 단계를
      설계한다.

      ### 무엇을
      - 진입: 노출된 자격(코드·설정·메타데이터 서비스 SSRF)으로 클라우드 키 획득 개념.
      - **IAM 열거**: 자신의 권한·역할·정책·신뢰 관계 열거(enumerate-iam 개념)로 Pivot 경로 탐색.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### ✅ 합격 기준
      대상에 공격 흔적을 남기고, 키 유출→IAM 열거→Pivot 경로 탐색 단계를 설계한다.
    hint: "대상 웹 PoC(태그)+키 유출(SSRF 메타데이터 등)→IAM 열거(권한·역할·신뢰 관계)→Pivot 경로 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-4-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          IAM 열거 — 유출 키의 권한 경계를 열거해 Pivot 경로를 찾는 단계를 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "키 유출→IAM 열거→Pivot 경로 탐색을 설계"
          - "(설명) 메타데이터 SSRF 등 유출 경로를 언급"
        acceptable_methods:
          - "웹 흔적 + IAM 열거 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "IAM 열거 설계 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 권한 상승·자동 Pivot 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **IAM 권한 상승·Pivot 자동화 킬체인**을 설계한다.

      ### 무엇을
      - 권한 상승 경로(과도한 정책·PassRole·역할 체이닝·리소스 정책 오용).
      - 확산: 데이터(S3)·컴퓨트(EC2/Lambda)·다른 계정으로 Pivot, 에이전트가 10분 내 자동화.

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 권한 상승(PassRole·역할 체이닝)→자동 Pivot 킬체인을 구체적으로 설계한다.
    hint: "정찰 흔적(태그)+권한 상승(과도한 정책·PassRole·역할 체이닝)→S3/컴퓨트/타 계정 자동 Pivot 킬체인. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-4-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          IAM 자동 Pivot — 권한 상승과 역할 체이닝으로 클라우드를 확산 장악하는 킬체인을 설계.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "권한 상승(PassRole·역할 체이닝)→자동 Pivot 킬체인을 설계"
          - "(설명) 10분 자동화 속도의 위협을 설명"
        acceptable_methods:
          - "활동 흔적 + Pivot 킬체인 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "권한 상승 경로 막연"

# ───────────────────────── BLUE (클라우드 탐지·최소 권한) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 공격 탐지 + 클라우드 IAM 관찰 지점 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **클라우드 IAM 위협 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 정찰·침투 확인.
      - 클라우드 신호(개념): CloudTrail의 대량 IAM 열거·비정상 AssumeRole·새 액세스 키 생성·비정상
        지역/시간·권한 상승 API.

      ### ✅ 합격 기준
      RED 공격을 탐지하고, 클라우드 IAM 위협 신호(대량 열거·비정상 AssumeRole·권한 상승)를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+클라우드 신호(CloudTrail 대량 IAM 열거·비정상 AssumeRole·키 생성·권한 상승 API) 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-4-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          클라우드 IAM 탐지 — 대량 열거·비정상 AssumeRole·권한 상승으로 클라우드 위협을 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지"
          - "클라우드 IAM 위협 신호(열거·AssumeRole·권한 상승)를 설계"
          - "(설명) 자동 Pivot 속도에 맞춘 탐지 필요를 언급"
        acceptable_methods:
          - "SIEM 탐지 + 클라우드 신호 설계"
        negative_signs:
          - "경보 근거 없음"
          - "클라우드 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 최소 권한·클라우드 하드닝 설계

      IAM Pivot을 막는 **최소 권한·클라우드 하드닝**을 설계한다.

      ### 무엇을
      - **최소 권한**: 과도한 정책 제거·PassRole 제한·역할 체이닝 통제, 권한 경계(permission boundary).
      - **자격 위생**: 단기 자격·키 회전·메타데이터 서비스 보호(IMDSv2), 하드코딩 키 제거.
      - **분리·경보**: 계정/환경 분리, 권한 상승·비정상 API 자동 경보·차단.
      - **자동 대응**: 자동화 속도에 맞춘 자동 키 폐기·격리.

      ### ✅ 합격 기준
      최소 권한·권한 경계·단기 자격·IMDSv2·자동 대응을 제시하고 "키 하나가 전체가 되지 않게" 원칙을 설명한다.
    hint: "최소 권한·PassRole 제한·permission boundary+단기 자격·키 회전·IMDSv2·하드코딩 제거+계정 분리·자동 경보/키 폐기. '키 하나≠전체' 원칙."
    verify:
      type: "semantic"
      expect: "cloud_least_privilege"
      semantic:
        intent: |
          최소 권한·클라우드 하드닝 — 최소 권한·단기 자격·분리·자동 대응으로 IAM Pivot을 막는다.
        success_criteria:
          - "최소 권한·권한 경계·PassRole 제한을 제시"
          - "단기 자격·키 회전·IMDSv2를 제시"
          - "분리·자동 대응을 제시하고 원칙 설명"
        acceptable_methods:
          - "최소 권한 + 자격 위생 + 분리 + 자동 대응"
        negative_signs:
          - "과도한 권한 유지"
          - "단기 자격·자동 대응 없음"
