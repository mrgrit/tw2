id: "ai-safety-w06"
category: "ai-safety"
title: "[AI안전 W6] 적대적 입력: 분류기 교란·필터 회피 vs 강건성"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  적대적 입력 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 입력 교란(문자 변형·인코딩·
  적대적 접미사)으로 안전 분류/필터를 회피하는 공격과 강건성 방어를 다룬다.
  ▸ 실측 — 구문적 페이로드는 WAF 403, 의미론적·정규화 회피는 통과. Red 위치: 본인 인프라
    (`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 입력 교란으로 필터 회피

      문자 교란(유니코드·공백·동형문자)·인코딩·적대적 접미사로 안전 필터/WAF를 회피하는 입력을 시도해
      **무엇이 회피되는지** 매핑한다.

      ### ✅ 합격 기준
      최소 3가지 교란 기법을 시도해 필터 반응을 기록하고 회피된 기법의 실제 응답을 제시한다.
    hint: "유니코드/공백/동형문자·인코딩·적대적 접미사 3+ 교란 시도해 필터 반응 기록 + 회피 응답."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "red-6-1", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "적대적 입력 회피 — 입력 교란으로 안전 필터를 우회함을 실증."
        success_criteria:
          - "본인 인프라 명령 로그에 다수 /api/chat 호출 흔적이 남음"
          - "최소 3가지 교란 기법의 필터 반응을 기록"
          - "회피된 기법의 실제 응답을 제시"
        acceptable_methods: ["교란 기법별 시도 + 반응"]
        negative_signs: ["기법 3개 미만", "반응 기록 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 교란 강도 vs 회피율 분석

      교란 강도를 조절하며 **회피율과 의미 보존**의 트레이드오프를 분석한다(너무 세면 의미 붕괴).

      ### ✅ 합격 기준
      교란 강도별 회피율·의미 보존을 측정해 최적 지점을 분석한다.
    hint: "교란 강도 조절하며 회피율 vs 의미 보존 트레이드오프 측정·최적 지점 분석."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "red-6-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "교란 트레이드오프 — 회피율과 의미 보존의 균형을 정량 분석."
        success_criteria:
          - "본인 인프라 명령 로그에 반복 호출 흔적이 남음"
          - "교란 강도별 회피율·의미 보존을 측정"
          - "(설명) 최적 지점을 분석"
        acceptable_methods: ["강도별 측정 + 분석"]
        negative_signs: ["측정 없이 서술만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 교란 회피 취약 진단

      우리 필터의 **정규화 부재·교란 취약**을 진단한다: 동형문자·인코딩·공백 교란이 통과하는지 증거로 확인.

      ### ✅ 합격 기준
      교란 회피 취약을 증거로 진단하고 정규화 부재를 지적한다.
    hint: "동형문자·인코딩·공백 교란 통과 여부 증거로 진단 + 정규화 부재 지적."
    verify:
      type: "command_ran"
      expect: "api/chat"
      checks:
        - { id: "blue-6-1", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "교란 취약 진단 — 정규화 부재로 인한 필터 회피를 증거로 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "교란 회피 취약을 증거로 제시"
          - "(설명) 정규화 부재를 지적"
        acceptable_methods: ["교란 통과 증거 진단"]
        negative_signs: ["증거 없이 주장만"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 강건성 설계: 정규화·적대적 훈련·앙상블

      적대적 입력에 대한 **강건성**을 설계한다: 입력 정규화(유니코드·공백 정규화)·적대적 훈련·앙상블
      분류·불확실성 기반 보수 판단.

      ### ✅ 합격 기준
      입력 정규화·적대적 훈련·앙상블·불확실성 처리를 제시하고 "정규화로 교란 공간 축소" 원칙을 설명한다.
    hint: "입력 정규화(유니코드·공백)+적대적 훈련+앙상블+불확실성 보수 판단. '정규화로 교란 공간 축소' 원칙."
    verify:
      type: "semantic"
      expect: "adversarial_robustness"
      semantic:
        intent: "적대적 강건성 — 정규화·적대적 훈련·앙상블로 교란 회피를 줄인다."
        success_criteria:
          - "입력 정규화(유니코드·공백)를 제시"
          - "적대적 훈련·앙상블을 제시"
          - "불확실성 기반 보수 판단을 제시"
          - "(설명) '정규화로 교란 공간 축소' 원칙 설명"
        acceptable_methods: ["정규화 + 적대적 훈련 + 앙상블"]
        negative_signs: ["정규화 언급 없음", "단일 방어만"]
