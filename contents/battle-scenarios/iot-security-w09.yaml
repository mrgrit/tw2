id: "iot-security-w09"
category: "iot-security"
title: "[IoT보안 W9] IP Camera 해킹: RTSP·기본 자격·펌웨어 취약 vs 카메라 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IP 카메라 공방전 — **RTSP 무인증 스트림·기본 자격·펌웨어 취약**의 공격과 카메라 보안을 설계·분석
  한다. 실물 카메라가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(카메라 침투)와 Blue(카메라 보안)를 모두 수행.
    • duel : Red 학생이 침투 경로를 제시하고, Blue 학생이 카메라 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: RTSP·기본 자격·펌웨어·클라우드 경로의 구체성, 프라이버시·
    봇넷 영향, 카메라 보안 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 카메라 침해는 심각한 프라이버시 침해. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (카메라 침투) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — RTSP·기본 자격 → 영상 접근·장치 장악

      IP 카메라의 흔한 취약을 연결한 침투 경로를 설계한다.

      ### 무엇을
      - **RTSP**: 무인증/약한 인증 RTSP 스트림 접근(경로 추측·기본 자격) → 실시간 영상 도청.
      - **기본 자격**: admin/admin 등 기본/약한 자격으로 웹 UI·ONVIF 장악.
      - **펌웨어 취약**: 알려진 CVE·백도어(예: 특정 벤더 하드코딩 계정) → 장치 장악.
      - 프라이버시·봇넷(Mirai식) 영향으로 연결.

      ### ✅ 합격 기준
      RTSP·기본 자격·펌웨어 취약 중 최소 2가지를 연결한 침투 경로를 구체적으로 설계하고 영상 도청·장치
      장악·봇넷 영향으로 이어짐을 서술한다.
    hint: "무인증 RTSP 스트림(경로·기본 자격)+admin/admin 웹/ONVIF+펌웨어 CVE/백도어. 2+ 연결 → 영상 도청·장악·Mirai 봇넷."
    verify:
      type: "semantic"
      expect: "camera_attack"
      semantic:
        intent: |
          IP 카메라 침투 — RTSP·기본 자격·펌웨어 취약을 연결해 영상 도청·장악·봇넷으로 이어짐을 이해.
        success_criteria:
          - "RTSP·기본 자격·펌웨어 취약 중 최소 2가지를 연결한 경로를 설계"
          - "영상 도청·장치 장악으로 이어짐을 서술"
          - "(설명) 봇넷(Mirai식) 대량화·프라이버시 영향을 언급"
        acceptable_methods:
          - "RTSP + 기본 자격/펌웨어 연결 경로"
        negative_signs:
          - "취약 1개·막연"
          - "영향 연결 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 클라우드 연동·대량 노출 분석

      카메라의 **클라우드 연동·대량 노출**을 분석한다: P2P/클라우드 API 취약, Shodan식 인터넷 노출로
      대량 스캔·장악.

      ### ✅ 합격 기준
      카메라 클라우드/P2P API 취약과 인터넷 대량 노출(Shodan식)을 분석하고, 개별이 아닌 대량 장악
      경로를 설명한다.
    hint: "P2P/클라우드 API 취약+Shodan식 인터넷 노출 대량 스캔. 개별 vs 대량 장악(같은 펌웨어 공유) 경로."
    verify:
      type: "semantic"
      expect: "camera_mass_exposure"
      semantic:
        intent: |
          카메라 대량 노출 — 클라우드/P2P 취약과 인터넷 노출로 대량 장악되는 경로를 이해.
        success_criteria:
          - "클라우드/P2P API 취약을 분석"
          - "인터넷 대량 노출(Shodan식)과 대량 장악 경로를 설명"
          - "(설명) 같은 펌웨어 공유가 대량화를 키움을 언급"
        acceptable_methods:
          - "클라우드/P2P + 대량 노출 분석"
        negative_signs:
          - "대량화 경로 없이 개별만"

# ───────────────────────── BLUE (카메라 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — RTSP·인증·펌웨어 보안 설계

      RED의 카메라 침투를 막는 **인증·스트림 보안·펌웨어 보안**을 설계한다.

      ### 무엇을
      - **인증 강화**: 기본 자격 금지·최초 강제 변경, RTSP/ONVIF 인증·암호(TLS), 무인증 스트림 차단.
      - **펌웨어**: 서명 펌웨어·백도어 제거·CVE 패치·SBOM.
      - **최소 노출**: 인터넷 직접 노출 금지·VPN/게이트웨이 경유.
      - RED 경로 매핑.

      ### ✅ 합격 기준
      기본 자격 금지·RTSP 인증/암호·펌웨어 서명·최소 노출을 제시하고 RED 경로에 매핑한다.
    hint: "기본 자격 금지·강제 변경+RTSP/ONVIF 인증·TLS·무인증 스트림 차단+펌웨어 서명·CVE 패치+인터넷 노출 금지. RED 매핑."
    verify:
      type: "semantic"
      expect: "camera_security"
      semantic:
        intent: |
          카메라 보안 — 인증·스트림 보안·펌웨어 보안·최소 노출로 RED 경로를 막는다.
        success_criteria:
          - "인증 강화(기본 자격 금지·RTSP/ONVIF 인증·암호)를 제시"
          - "펌웨어 보안(서명·백도어 제거·패치)을 제시"
          - "최소 노출(인터넷 직접 노출 금지)을 제시하고 RED 매핑"
        acceptable_methods:
          - "인증 + 스트림 보안 + 펌웨어 + 최소 노출"
        negative_signs:
          - "기본 자격·무인증 스트림 유지"
          - "최소 노출 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 프라이버시·봇넷 완화·수명주기 설계

      카메라의 **프라이버시·봇넷 완화·수명주기**를 설계한다.

      ### 무엇을
      - **프라이버시**: 영상 암호화(전송·저장)·접근 제어·데이터 최소화·보관 정책, 물리 셔터/표시등.
      - **봇넷 완화**: 아웃바운드 통제·이상 트래픽 탐지·자동 업데이트로 대량 감염 차단.
      - **네트워크 분리**: 카메라 VLAN 분리·최소 신뢰.
      - **수명주기**: 자동 보안 업데이트·EOL·교체.

      ### ✅ 합격 기준
      영상 암호화·접근 제어·봇넷 완화·네트워크 분리·수명주기를 제시하고 "프라이버시와 봇넷 방지를
      함께" 원칙을 설명한다.
    hint: "영상 암호화(전송·저장)·접근 제어·데이터 최소화+아웃바운드 통제·자동 업데이트(봇넷 완화)+카메라 VLAN 분리+EOL. '프라이버시+봇넷 방지' 원칙."
    verify:
      type: "semantic"
      expect: "camera_privacy_botnet"
      semantic:
        intent: |
          카메라 프라이버시·봇넷 완화 — 암호화·접근 제어·아웃바운드 통제·분리로 프라이버시와 대량 감염을
          방지.
        success_criteria:
          - "프라이버시(영상 암호화·접근 제어·데이터 최소화)를 제시"
          - "봇넷 완화(아웃바운드 통제·자동 업데이트)를 제시"
          - "네트워크 분리·수명주기를 제시"
          - "(설명) '프라이버시와 봇넷 방지를 함께' 원칙 설명"
        acceptable_methods:
          - "프라이버시 + 봇넷 완화 + 분리 + 수명주기"
        negative_signs:
          - "프라이버시 또는 봇넷 완화 한쪽만"
          - "네트워크 분리 언급 없음"
