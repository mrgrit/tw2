id: "attack-w07"
category: "attack"
title: "[공격기법 W7] 닿으면 안 될 곳에 닿기 — SSRF·Path Traversal·악성 업로드 (A10·A05·A03)"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  OWASP **A10 SSRF** + **A05 보안 설정 오류(파일 업로드)** + **A03 인젝션(Path Traversal/LFI)**. 공통
  주제는 **"닿으면 안 될 곳에 닿기"** — 경로탐색으로 웹 루트 밖 `/etc/passwd`를 읽고, SSRF로 내부망/
  클라우드 메타데이터에 접근하고, 악성 파일을 업로드해 실행을 노린다. 방어자는 이 시도를 탐지·차단한다.

  ▸ 모드: solo(공격자→탐지 1인) / duel(Red가 상대에 공격, Blue가 본인 방어층으로 탐지/분석).
    대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — 공격자는 **망 외부(attacker-ext)** → Red 채점은 **대상 WAF audit(태그/CRS 930·933·934)**으로.
    웹공격 태그 **`at7r1-<id>`**, 차단룰 Suricata **sid 9407001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 — Path Traversal / LFI (A03)

      ### 상황
      `../../etc/passwd` 류 경로탐색으로 웹 루트 밖 임의 파일을 읽으려 시도한다(인코딩 우회 `..%2f`
      포함). CRS 930(LFI/Traversal) 탐지 대상.

      ### 할 일
      이 미션 전용 태그 `at7r1-<id>`를 붙여 경로탐색을 시도한다.
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" \
        "http://<대상_공개IP>/?file=at7r1-kim-..%2f..%2f..%2fetc%2fpasswd"
      ```

      ### 채점 방법
      대상 WAF audit에 (at7r1 태그 포함) Path Traversal/LFI(930) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 at7r1 태그가 포함된 Traversal/LFI 탐지가 남는다.
    hint: "태그(at7r1) ../etc/passwd (인코딩). 채점: 대상 modsec audit의 930 Traversal + 태그."
    verify:
      type: "log_contains"
      expect: "at7r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "at7r1", since_sec: 1800 } }
      semantic:
        intent: "OWASP A03 / MITRE T1083 — Path Traversal/LFI. 외부 공격자 모델 → 대상 ModSec CRS 930(또는 태그 포함 요청) 탐지로 판정. 인코딩 우회 관찰. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (at7r1 태그 포함) Traversal/LFI 탐지(최근)"
          - "평문 vs 인코딩 우회 결과 차이 서술"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 ../etc/passwd / ..%2f 인코딩"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 — SSRF / 악성 파일 업로드 (A10·A05)

      ### 상황
      SSRF로 내부/메타데이터(`169.254.169.254`)에 접근하거나, 악성 확장자(.php) 업로드로 실행을 노린다.
      CRS 933(PHP)/934(SSRF) 탐지 대상.

      ### 할 일
      태그 `at7r1-<id>`를 붙여 SSRF/업로드를 시도한다.
      ```bash
      curl -s -H "Host: dvwa.6v6.lab" \
        "http://<대상_공개IP>/?url=at7r1-kim-http://169.254.169.254/latest/meta-data/"
      ```

      ### 채점 방법
      대상 WAF audit에 (at7r1 태그 포함) SSRF/업로드 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 at7r1 태그가 포함된 SSRF/업로드 탐지가 남는다.
    hint: "태그(at7r1) SSRF(169.254)/.php 업로드. 채점: 대상 modsec audit + 태그."
    verify:
      type: "log_contains"
      expect: "at7r1"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "at7r1", since_sec: 1800 } }
      semantic:
        intent: "OWASP A10 SSRF / A05 업로드 — MITRE T1190. 외부 공격자 모델 → 대상 ModSec CRS 933/934(또는 태그 포함 요청) 탐지로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (at7r1 태그 포함) SSRF/업로드 탐지(최근)"
          - "SSRF로 노린 내부 자원 / 업로드 우회 시도 서술"
        acceptable_methods:
          - "attacker-ext에서 태그 붙인 SSRF(169.254/내부IP) / 악성 확장자 업로드"
        negative_signs:
          - "대상 미도달 / 태그 누락"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — Traversal/SSRF/업로드 탐지 분석

      ### 상황
      세 공격(Traversal/SSRF/업로드)의 WAF·SIEM 경보를 분석해 어떤 자원을 노렸는지, 차단됐는지를
      판정한다. 인코딩 우회가 WAF transform으로 막혔는지 확인한다.

      ### 할 일
      세 공격이 노린 자원 + 차단 여부 + 인코딩 우회 방어를 분석한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 분석은 제출로 검증).
    hint: "Traversal/SSRF/업로드 분석(노린 자원/차단/인코딩 우회). 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "탐지 분석 — Traversal(노린 파일)/SSRF(노린 내부자원)/업로드(확장자) 판정 + 차단 여부 + 인코딩 우회 방어."
        success_criteria:
          - "경보 수집 확인"
          - "각 공격이 노린 자원 + 차단 여부"
          - "urlDecodeUni로 인코딩 우회 차단 확인"
        acceptable_methods:
          - "WAF audit/SIEM 분석"
        negative_signs:
          - "차단/우회 여부 미판정"

  - order: 2
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 — SSRF/Traversal 차단룰 (sid 9407001)

      ### 상황
      SSRF(내부 IP/메타데이터 접근)와 Path Traversal(`../`)을 탐지하는 Suricata 룰(**sid 9407001**)을
      `local.rules`에 작성한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATK W07 SSRF metadata"; http.uri; content:"169.254.169.254"; sid:9407001; rev:1;)
      ```
      작성 후 reload하고 eve.json에서 트리거를 확인한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9407001 차단룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9407001 룰이 있다.
    hint: "local.rules에 SSRF(169.254)/Traversal(../) 탐지룰(sid 9407001) → reload."
    verify:
      type: "file_contains"
      expect: "9407001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9407001" } }
      semantic:
        intent: "차단룰 — SSRF(내부 IP/169.254) + Traversal(../) 탐지. content + 인코딩 정규화 고려."
        success_criteria:
          - "local.rules에 sid 9407001"
          - "SSRF/Traversal 탐지 로직"
          - "인코딩 우회 대응"
        acceptable_methods:
          - "local.rules 작성 + reload"
        negative_signs:
          - "문법 오류 / 인코딩 우회 미대응"

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 방어 강화 권고 (입력검증·업로드 정책·egress 통제)

      ### 상황
      근본 강화를 권고한다: 경로 정규화/화이트리스트(Traversal), 확장자·MIME·실행권한 제거(업로드),
      egress 차단/메타데이터 보호(SSRF).

      ### 할 일
      세 공격별 근본 방어 + WAF 즉시 완화를 권고한다.

      ### 채점 방법
      본인 web modsec audit에 공격 흔적이 있는지 + 권고(제출)로 채점.

      ### 합격 기준
      본인 WAF audit에 탐지가 있다.
    hint: "입력검증/업로드정책/egress 통제 권고. 채점: log_contains web modsec at7r1."
    verify:
      type: "log_contains"
      expect: "at7r1"
      checks:
        - { id: "blue-3-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "at7r1", since_sec: 1800 } }
      semantic:
        intent: "강화 권고 — 경로 정규화/화이트리스트, 업로드 확장자·실행권한 통제, SSRF egress/메타데이터 보호."
        success_criteria:
          - "공격 흔적 확인"
          - "세 공격별 근본 방어"
          - "WAF 즉시 차단"
        acceptable_methods:
          - "분석 + 강화 권고"
        negative_signs:
          - "블랙리스트만(우회 가능)"
