id: "secuops-w10"
category: "secuops"
title: "[보안운영 W10] 분석가의 조종석 — 한 화면에서 보고, 파일 변조를 잡고, 자동으로 되받아치기"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  W9에서 만든 manager 위에 **Wazuh dashboard**(Web UI + OpenSearch indexer)를 얹어 **통합 운영**한다.
  분석가의 조종석에는 세 가지가 있다 — ① 5개 패널(Overview/Agents/Modules/Discovery/Rules)로 **한 화면
  관제**, ② **FIM(syscheck)**으로 민감 파일이 바뀌면 즉시 감지, ③ **Active Response**로 위협에 손 안
  대고 **자동 대응**(차단).

  ▸ 이야기
    공격자가 ① 웹공격을 쏟아붓고 ② 호스트에 잠입해 **민감 파일(/etc/passwd)을 변조**(백도어 계정
    추가)한다. 운영자(너)는 ① dashboard로 경보를 보고 ② FIM이 그 파일 변조를 잡았는지 확인하고 ③ 그
    변조를 상위로 격상하는 룰을 쓰고 ④ Active Response로 공격 출발지를 자동 차단하도록 설계하고 ⑤
    5개 소스가 dashboard 한 화면으로 수렴하는지 본다.

  ▸ 모드: solo(공격자→dashboard 운영자) / duel(상대 공격→본인 dashboard). 대상=solo 본인 / duel 상대.

  ▸ 📋 채점 메모(운영) — FIM 미션은 실제 syscheck 룰이 살아 있어야 '탐지됨'이 입증된다(룰 없이 권고만
    하면 partial 바닥). 풀배틀 채점 시 FIM 룰을 심은 채로 평가할 것. 한계는 `GRADING-LIMITATIONS.md` 참고.

  ▸ 알아둘 점 — 웹공격 태그 **`dw10r1-<id>`**, FIM 트리거용 변조 마커 **계정 `fimcanary`**(=/etc/passwd
    변경), 변조 탐지 룰 **id 101001**(`local_rules.xml`), Active Response는 manager **ossec.conf**.

# ───────────── RED : 공격자 — "보고, 변조하라" ─────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — 웹공격 burst (dashboard 소스 1)

      ### 상황
      웹공격을 burst로 보내 dashboard의 Discovery 패널에 실시간 유입을 만든다.

      ### 할 일
      이 미션 전용 태그 `dw10r1-<id>`를 붙인 SQLi를 여러 번 보낸다.
      ```bash
      for i in 1 2 3; do curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
        "http://192.168.0.161/?id=dw10r1-kim-$i%20UNION%20SELECT%201"; done
      ```

      ### 채점 방법
      대상 WAF audit에 (dw10r1 태그 포함) SQLi(942) 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 dw10r1 태그가 포함된 SQLi 탐지가 남는다.
    hint: "태그(dw10r1) sqlmap UA SQLi burst. 채점: 대상 modsec audit의 942 + 태그."
    verify:
      type: "log_contains"
      expect: "942"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "942100", since_sec: 1800 } }
      semantic:
        intent: "dashboard 소스 1 — 웹공격이 modsec audit → Wazuh → dashboard Discovery. 대상 WAF로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (dw10r1 태그 포함) SQLi(942) 탐지(최근)"
          - "dashboard의 어느 패널에서 보이는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 태그 붙인 SQLi burst"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — 민감 파일 변조 (FIM 트리거)

      ### 상황
      호스트에 잠입해 **민감 파일을 변조**한다 — `/etc/passwd`에 백도어 계정을 끼워 넣으면, FIM이
      감시하는 파일이 바뀐 것이라 syscheck가 delta를 잡아야 한다.

      ### 할 일
      대상 호스트에 계정 **`fimcanary`**를 추가한다(=/etc/passwd 변경).
      ```bash
      sudo useradd -m -s /bin/bash fimcanary
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 `fimcanary` 변경이 발생했는지로 채점(FIM 트리거 대상).

      ### 합격 기준
      `/etc/passwd`에 `fimcanary`가 있다.
    hint: "useradd fimcanary로 passwd 변경(FIM 대상). 채점: file_contains passwd fimcanary."
    verify:
      type: "file_contains"
      expect: "fimcanary"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "fimcanary" } }
      semantic:
        intent: "MITRE T1136 + FIM 트리거 — 민감 파일(passwd) 변경으로 syscheck delta 유발."
        success_criteria:
          - "/etc/passwd에 fimcanary 변경"
          - "syscheck가 이 변경을 어떻게 delta로 잡는지 서술"
        acceptable_methods:
          - "useradd / 모니터링 경로 파일 변경"
        negative_signs:
          - "변경 미발생"

# ───────────── BLUE : 분석가 — "보고, FIM으로 잡고, 자동 대응하라" ─────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — dashboard 살아있나 (indexer + 5 패널)

      ### 상황
      dashboard가 보이려면 OpenSearch indexer가 경보를 인덱싱해야 한다. 5개 패널(Overview/Agents/
      Modules/Discovery/Rules)의 용도를 파악한다.

      ### 할 일
      dashboard에 접근해 경보가 인덱싱돼 표시되는지 확인하고, 5 패널의 쓰임을 정리한다.

      ### 채점 방법
      본인 SIEM에 경보가 인덱싱돼(dashboard가 데이터 표시) 있는지로 확인.

      ### 합격 기준
      본인 SIEM에 최근 경보가 인덱싱돼 있다.
    hint: "dashboard 5 패널 + indexer 활성. 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "dashboard 운영 — indexer + 5 패널. Discovery=raw event, Rules=룰 검색."
        success_criteria:
          - "경보 인덱싱 확인"
          - "5 패널 각 용도 서술 + indexer↔dashboard 관계"
        acceptable_methods:
          - "dashboard 접근 / wazuh_alert로 인덱싱 확인"
        negative_signs:
          - "panel 빈 화면 원인(filebeat/indexer) 미진단"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 파일 변조를 잡아 격상 (FIM 룰 id 101001)

      ### 상황
      FIM(syscheck)이 `/etc/passwd` 변경을 감지하면 기본 경보가 뜬다. 운영자는 그중 **백도어 계정 추가**
      같은 고위험 변조를 상위 레벨로 **격상**하는 커스텀 룰(**id 101001**)을 쓴다.

      ### 할 일
      `local_rules.xml`에 syscheck 경보를 격상하는 룰을 추가하고 `wazuh-control restart`한다.
      ```xml
      <group name="edu,syscheck,">
        <rule id="101001" level="12">
          <if_group>syscheck</if_group>
          <field name="file">/etc/passwd</field>
          <description>EDU W10 - /etc/passwd tampered (possible backdoor account)</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml`에 id 101001 룰이 있는지로 확인.

      ### 합격 기준
      local_rules.xml에 101001 룰이 있다.
    hint: "local_rules.xml에 syscheck 격상 룰(id 101001, if_group syscheck + field file) → restart."
    verify:
      type: "file_contains"
      expect: "101001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "101001" } }
      semantic:
        intent: "FIM 격상 — syscheck 경보 중 민감 파일(passwd) 변조를 if_group syscheck + field로 상위 레벨 격상."
        success_criteria:
          - "local_rules.xml에 rule id 101001"
          - "if_group syscheck 체이닝 + 파일 경로 필터"
          - "왜 passwd 변조를 고위험으로 격상하는지 서술"
        acceptable_methods:
          - "local_rules.xml 작성 + restart + 변조 재현으로 검증"
        negative_signs:
          - "XML 문법 오류로 로딩 실패"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-3 — 손 안 대고 되받아치기 (Active Response)

      ### 상황
      고위험 경보가 떴을 때 사람을 기다리지 않고 **자동 차단**한다. `ossec.conf`의 `<active-response>`
      +`<command>`로 특정 룰/레벨 트리거 시 firewall-drop을 실행하게 설계한다. 단, 무한 차단·오탐 차단을
      막는 timeout과 화이트리스트도 함께 둔다.

      ### 할 일
      siem의 `ossec.conf`에서 `<active-response>` 설정을 점검(또는 추가)하고, 트리거 시
      `/var/ossec/logs/active-responses.log`에 실행이 기록되는 흐름을 서술한다.

      ### 채점 방법
      siem의 ossec.conf에 active-response 설정이 있는지로 확인.

      ### 합격 기준
      ossec.conf에 active-response 설정이 있다.
    hint: "ossec.conf의 <active-response>+<command>(firewall-drop)+timeout. 채점: file_contains ossec.conf active-response."
    verify:
      type: "file_contains"
      expect: "active-response"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/ossec.conf", pattern: "active-response" } }
      semantic:
        intent: "MITRE D3FEND — Active Response 자동 차단(firewall-drop) + timeout/예외로 오탐 차단·무한 차단 방지."
        success_criteria:
          - "ossec.conf에 active-response 설정"
          - "어떤 룰/레벨에 어떤 command(firewall-drop)를 매핑하는지 서술"
          - "timeout/화이트리스트로 자가 DoS·오탐 차단 방지"
        acceptable_methods:
          - "active-response/command 설정 + 트리거로 active-responses.log 확인"
        negative_signs:
          - "timeout/예외 없이 무한 차단(자가 DoS 위험)"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 — 5개 소스가 한 화면으로

      ### 상황
      dashboard의 힘은 **여러 소스를 한 화면에 모으는** 데 있다. ModSec audit / Suricata eve / osquery /
      syscheck(FIM) / 호스트 이벤트 — 다섯 갈래가 dashboard로 수렴하는지 확인한다.

      ### 할 일
      RED의 웹공격 + 파일 변조를 재현한 뒤, dashboard에 여러 소스의 경보가 함께 쌓이는지(수렴) 확인하고
      어느 패널에서 각 소스를 보는지 정리한다.

      ### 채점 방법
      본인 SIEM에 최근 다소스 경보가 수렴했는지로 확인.

      ### 합격 기준
      본인 SIEM에 최근 경보가 수렴해 있다.
    hint: "공격+변조 재현 → 5소스 dashboard 수렴. 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 운영 — 5 소스(modsec/eve/osquery/syscheck/host)가 dashboard로 수렴."
        success_criteria:
          - "다소스 경보 수렴 확인"
          - "각 소스를 어느 패널에서 보는지 + 상관 방법 서술"
        acceptable_methods:
          - "공격+변조 재현 후 dashboard / wazuh_alert 관측"
        negative_signs:
          - "일부 소스만 / 수렴 미확인"

  - order: 5
    assess_target: self
    target_vm: web
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — 호스트 소스를 보내는 agent

      ### 상황
      ModSec audit와 osquery 결과가 dashboard로 들어오려면 web 호스트의 Wazuh agent가 manager로
      ship해야 한다(agent.conf의 `<localfile>`).

      ### 할 일
      web 호스트의 Wazuh agent가 가동 중인지 확인하고, agent가 어떤 소스를 ship하는지 정리한다.

      ### 채점 방법
      web 호스트에 Wazuh agent가 가동 중인지로 확인.

      ### 합격 기준
      web에 Wazuh agent 프로세스가 running이다.
    hint: "agent.conf localfile로 modsec/osquery ship. 채점: process_running web wazuh."
    verify:
      type: "process_running"
      expect: "wazuh"
      checks:
        - { id: "blue-5-1", type: "process_running", target: "web", params: { name: "wazuh" } }
      semantic:
        intent: "호스트 소스 ship — agent.conf <localfile>로 modsec audit/osquery를 manager로 전송. dashboard 통합의 전제."
        success_criteria:
          - "web의 Wazuh agent 가동"
          - "localfile로 어떤 소스를 ship하는지 서술"
        acceptable_methods:
          - "agent.conf localfile 점검 + agent 가동 확인"
        negative_signs:
          - "agent down → 소스 누락"
