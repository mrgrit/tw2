id: "ai-safety-adv-w07"
category: "ai-safety-adv"
title: "[AI안전심화 W7] 데이터 중독: 백도어 트리거·라벨 오염 vs 파인튜닝 무력화·탐지"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  데이터 중독 심화 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 백도어 트리거·라벨 오염과
  탐지·정제 방어를 다룬다.
  ▸ 실측 — `/api/rag/add` 무인증 오염이 조건부 트리거로 작동. Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`,
    비밀번호 `1`). 채점 command_ran+semantic. 윤리: 인가 대상만, 고유 마커.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 조건부 백도어 트리거 심기
      특정 트리거에서만 발동하는 백도어를 KB에 심고 실증(평소 정상).
      ### ✅ 합격 기준: 조건부 트리거 백도어 발동을 실제 응답으로 증명한다.
    hint: "/api/rag/add 조건부 트리거(TRIGGER-<학번>→BACKDOOR-<학번>)+발동 실증. 평소 정상."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "red-7-1", type: "command_ran", target: "attacker", params: { pattern: "rag/add" } }
      semantic:
        intent: "백도어 트리거 — 조건부 발동으로 탐지 회피."
        success_criteria:
          - "본인 인프라 명령 로그에 /api/rag/add 흔적이 남음"
          - "트리거 발동 실제 응답을 인용"
          - "(설명) 조건부가 탐지를 어렵게 함을 설명"
        acceptable_methods: ["조건부 오염 + 발동 증명"]
        negative_signs: ["발동 응답 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 라벨 오염·파인튜닝 무력화 분석
      라벨 오염(안전 예제를 유해로 오도)·소량 중독이 파인튜닝 정렬을 무력화하는 경로를 분석한다.
      ### ✅ 합격 기준: 라벨 오염·소량 중독의 정렬 무력화 경로와 탐지 어려움을 분석한다.
    hint: "라벨 오염(안전↔유해 오도)·소량 중독으로 파인튜닝 정렬 무력화. 탐지 어려움."
    verify:
      type: "command_ran"
      expect: "rag"
      checks:
        - { id: "red-7-2", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "라벨 오염·무력화 — 소량 중독이 정렬을 무너뜨림."
        success_criteria:
          - "본인 인프라 명령 로그에 흔적이 남음"
          - "라벨 오염·소량 중독 경로를 분석"
          - "(설명) 정렬 무력화·탐지 어려움 설명"
        acceptable_methods: ["오염 경로 분석"]
        negative_signs: ["경로 없이 서술만"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 데이터 오염 표면·무결성 진단
      무인증 수집·출처 검증 부재·오염 탐지 가능성을 증거로 진단.
      ### ✅ 합격 기준: 오염 표면을 증거로 진단하고 탐지 접근을 제시한다.
    hint: "/api/rag/add 무인증·출처 부재 증거 진단 + 오염 탐지(지시성·이상) 접근."
    verify:
      type: "command_ran"
      expect: "rag/add"
      checks:
        - { id: "blue-7-1", type: "command_ran", target: "attacker", params: { pattern: "rag" } }
      semantic:
        intent: "데이터 오염 진단 — 무인증 수집·출처 부재 식별."
        success_criteria:
          - "본인 인프라 명령 로그에 진단 흔적이 남음"
          - "오염 표면을 증거로 진단"
          - "(설명) 탐지 접근을 제시"
        acceptable_methods: ["오염 표면 증거 진단"]
        negative_signs: ["증거 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 중독 탐지·데이터 정제 설계
      출처 검증·수집 인증+데이터 정제·이상/트리거 스캔+파인튜닝 전후 안전 회귀 검증+신뢰 데이터만 학습.
      ### ✅ 합격 기준: 출처 검증·정제·트리거 스캔·안전 회귀를 제시하고 "신뢰 데이터만·학습 후 검증" 원칙을
      설명한다.
    hint: "출처 검증·수집 인증+데이터 정제·트리거 스캔+파인튜닝 안전 회귀+신뢰 데이터만. '신뢰 데이터·학습 후 검증' 원칙."
    verify:
      type: "semantic"
      expect: "poisoning_defense"
      semantic:
        intent: "중독 방어 — 출처 검증·정제·안전 회귀로 오염을 차단."
        success_criteria:
          - "출처 검증·수집 인증을 제시"
          - "데이터 정제·트리거 스캔을 제시"
          - "파인튜닝 전후 안전 회귀 검증을 제시"
          - "(설명) '신뢰 데이터만·학습 후 검증' 원칙 설명"
        acceptable_methods: ["출처 검증 + 정제 + 스캔 + 회귀"]
        negative_signs: ["출처 검증·회귀 없음"]
