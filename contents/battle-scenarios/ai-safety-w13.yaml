id: "ai-safety-w13"
category: "ai-safety"
title: "[AI안전 W13] Red Teaming for AI: 체계적 약점 탐색 vs 레드팀 대응·회귀 검증"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  AI 레드팀 공방전 — 대상 **AICompanion**(`http://192.168.0.161:8007`). 능동적으로 약점을 찾는
  **체계적 레드팀 방법론**과 그 대응·회귀 검증을 다룬다.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran + 보고서의 방법론·
    테스트 케이스. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 체계적 레드팀 테스트 스위트 실행

      OWASP LLM Top 10 각 항목에 대한 **테스트 케이스 스위트**(입력·기대 결과·변형)를 설계·실행한다.

      ### ✅ 합격 기준
      OWASP LLM Top 10을 커버하는 테스트 스위트를 실행하고 각 케이스의 통과/실패를 기록한다.
    hint: "LLM Top10 항목별 테스트 케이스(입력·기대·변형) 실행 + 통과/실패 기록. 재현 가능한 스위트."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-13-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "체계적 레드팀 — 표준 커버 테스트 스위트로 약점을 탐색."
        success_criteria:
          - "본인 인프라 명령 로그에 다수 테스트 호출 흔적이 남음"
          - "OWASP LLM Top 10 커버 테스트 스위트를 실행"
          - "각 케이스 통과/실패를 기록"
        acceptable_methods: ["항목별 테스트 케이스 실행"]
        negative_signs: ["일회성 공격·기록 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 자동화·확장 가능한 레드팀 설계

      테스트를 **자동화·재현 가능**하게 만든다: 변형 생성·판정 기준·ASR 집계, 회귀 실행 가능한 형태.

      ### ✅ 합격 기준
      변형 생성·판정 기준·ASR 집계를 갖춘 재현 가능한 레드팀 체계를 제시한다.
    hint: "변형 생성·판정 기준·ASR 집계·회귀 실행 가능 체계. 자동화 레드팀."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-13-2", type: "command_ran", target: "attacker", params: { pattern: "chat" } }
      semantic:
        intent: "자동화 레드팀 — 재현·확장 가능한 검증 체계."
        success_criteria:
          - "본인 인프라 명령 로그에 반복 실행 흔적이 남음"
          - "변형 생성·판정 기준·ASR 집계를 제시"
          - "(설명) 회귀 실행 가능성을 설명"
        acceptable_methods: ["자동화 체계 + 판정 기준"]
        negative_signs: ["재현·판정 기준 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 레드팀 결과 대응·우선순위화

      레드팀 발견을 **대응·우선순위화**한다: 실패 케이스를 완화에 연결하고 위험 순으로 정렬.

      ### ✅ 합격 기준
      레드팀 실패 케이스를 완화 항목에 연결하고 위험 우선순위로 정리한다.
    hint: "레드팀 실패 케이스→완화 매핑+위험 우선순위. 채점=본인 인프라 검증 호출 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "blue-13-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "레드팀 대응 — 발견을 완화에 연결하고 우선순위화."
        success_criteria:
          - "본인 인프라 명령 로그에 검증 호출 흔적이 남음"
          - "실패 케이스를 완화에 연결"
          - "(설명) 위험 우선순위로 정리"
        acceptable_methods: ["실패→완화 매핑 + 우선순위"]
        negative_signs: ["매핑·우선순위 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 회귀 검증·지속 레드팀 운영 설계

      완화가 유지되는지 확인하는 **회귀 검증·지속 레드팀** 운영을 설계한다: CI 통합·정기 레드팀·신규
      위협 반영·메트릭 추적(ASR 추이).

      ### ✅ 합격 기준
      회귀 검증·정기 레드팀·메트릭 추적을 제시하고 "레드팀은 일회성이 아닌 지속 운영" 원칙을 설명한다.
    hint: "회귀 검증(CI 통합)+정기 레드팀+신규 위협 반영+ASR 추이 메트릭. '지속 운영' 원칙."
    verify:
      type: "semantic"
      expect: "continuous_redteam"
      semantic:
        intent: "지속 레드팀 — 회귀 검증·정기 실행·메트릭으로 방어를 유지."
        success_criteria:
          - "회귀 검증(CI 통합)을 제시"
          - "정기 레드팀·신규 위협 반영을 제시"
          - "메트릭 추적(ASR 추이)을 제시"
          - "(설명) '지속 운영' 원칙 설명"
        acceptable_methods: ["회귀 + 정기 + 메트릭"]
        negative_signs: ["일회성 레드팀만"]
