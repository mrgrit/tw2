id: "iot-security-w07"
category: "iot-security"
title: "[IoT보안 W7] BLE 해킹: 약한 페어링·스니핑·MITM vs BLE 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  BLE 해킹 공방전 — Bluetooth Low Energy의 **약한 페어링·스니핑·MITM**과 BLE 보안을 설계·분석한다.
  실물 BLE 장치·스니퍼가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(BLE 공격)와 Blue(BLE 보안)를 모두 수행.
    • duel : Red 학생이 BLE 공격 경로를 제시하고, Blue 학생이 BLE 보안으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: BLE 페어링(Just Works)·스니핑·MITM·GATT 취약의 구체성,
    BLE 보안(LE Secure Connections·인증·GATT 권한) 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (BLE 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 약한 페어링·스니핑 → 통신 복호화

      BLE의 **약한 페어링(Just Works)** 과 스니핑을 악용해 통신을 복호화하는 경로를 설계한다.

      ### 무엇을
      - **페어링 취약**: Just Works(MITM 보호 없음)·레거시 페어링의 약한 TK/STK → 키 추정/스니핑.
      - **스니핑**: 광고·연결 캡처(스니퍼), 페어링 캡처 시 세션 키 복원 → 통신 복호화.
      - GATT 특성 열거로 제어 특성 파악.

      ### ✅ 합격 기준
      BLE 약한 페어링(Just Works/레거시)과 스니핑으로 통신을 복호화하는 경로를 구체적으로 설계하고 GATT
      제어 특성 파악으로 이어짐을 서술한다.
    hint: "Just Works/레거시 페어링 약한 TK/STK+스니핑(광고·연결·페어링 캡처)→세션 키 복원→복호화. GATT 특성 열거."
    verify:
      type: "semantic"
      expect: "ble_pairing_sniff"
      semantic:
        intent: |
          BLE 약한 페어링·스니핑 — Just Works/레거시 취약으로 세션 키를 복원해 통신을 복호화.
        success_criteria:
          - "약한 페어링(Just Works/레거시 TK/STK) 취약을 설계"
          - "스니핑으로 세션 키 복원·통신 복호화를 서술"
          - "GATT 특성 열거로 제어 특성 파악을 언급"
        acceptable_methods:
          - "페어링 취약 + 스니핑 + 복호화"
        negative_signs:
          - "페어링/키 메커니즘 근거 없이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — MITM·GATT 인젝션·재전송 분석

      BLE **MITM**(가짜 주변장치·클론)과 GATT write 인젝션·재전송을 분석한다.

      ### ✅ 합격 기준
      BLE MITM(클론/릴레이)·GATT write 인젝션·재전송 중 최소 2가지를 분석하고 장치 제어(잠금 해제 등)로
      이어짐을 설명한다.
    hint: "BLE MITM(가짜 주변장치·클론·릴레이)+GATT write 인젝션·재전송. 2+ → 장치 제어(잠금 해제 등)."
    verify:
      type: "semantic"
      expect: "ble_mitm"
      semantic:
        intent: |
          BLE MITM·GATT 인젝션 — 클론/릴레이와 GATT write로 장치를 제어함을 이해.
        success_criteria:
          - "BLE MITM(클론·릴레이)·GATT write 인젝션·재전송 최소 2가지를 분석"
          - "장치 제어(잠금 해제 등)로 이어짐을 설명"
          - "(설명) MITM 보호 부재가 근본 원인임을 언급"
        acceptable_methods:
          - "MITM + GATT 인젝션/재전송 분석"
        negative_signs:
          - "경로 1개·막연"

# ───────────────────────── BLUE (BLE 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — LE Secure Connections·인증 설계

      RED의 BLE 공격을 막는 **강한 페어링·인증**을 설계한다.

      ### 무엇을
      - **LE Secure Connections**: ECDH 기반 페어링(스니핑해도 키 복원 불가), 레거시 페어링 비활성.
      - **MITM 보호**: Numeric Comparison/Passkey(적절한 IO 능력)로 MITM 차단, Just Works 지양.
      - **링크 암호·무결성**: 암호화 링크 강제, 재전송 방지.
      - RED 경로별 대응.

      ### ✅ 합격 기준
      LE Secure Connections(ECDH)·MITM 보호 페어링·암호 링크를 제시하고 RED의 스니핑·MITM에 대응
      매핑한다.
    hint: "LE Secure Connections(ECDH)·레거시 비활성+MITM 보호(Numeric Comparison/Passkey, Just Works 지양)+암호 링크·재전송 방지. RED 매핑."
    verify:
      type: "semantic"
      expect: "ble_secure_pairing"
      semantic:
        intent: |
          BLE 강한 페어링·인증 — LE Secure Connections·MITM 보호로 스니핑·MITM을 막는다.
        success_criteria:
          - "LE Secure Connections(ECDH)·레거시 비활성을 제시"
          - "MITM 보호(Numeric Comparison/Passkey)를 제시"
          - "암호 링크·재전송 방지를 제시하고 RED 매핑"
        acceptable_methods:
          - "LESC + MITM 보호 + 암호 링크"
        negative_signs:
          - "Just Works/레거시 유지"
          - "MITM 보호 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — GATT 권한·앱 계층·심층 방어 설계

      링크 보안을 넘어 **GATT 권한·애플리케이션 계층 보안·심층 방어**를 설계한다.

      ### 무엇을
      - **GATT 권한**: 민감 특성에 인증·암호 요구(read/write 권한), 무인증 write 차단.
      - **앱 계층 인증**: 링크 위에 애플리케이션 인증(챌린지-응답)·명령 무결성.
      - **본딩·키 관리**: 안전한 본딩 저장·키 회전·장치 분실 시 폐기.
      - **물리 안전**: 잠금 등은 BLE 실패/의심 시 안전측 기본값.

      ### ✅ 합격 기준
      GATT 권한·앱 계층 인증·본딩 관리·안전 기본값을 제시하고 "링크 보안+앱 계층 인증 다층" 원칙을
      설명한다.
    hint: "GATT 특성 권한(인증·암호 요구·무인증 write 차단)+앱 계층 인증(챌린지-응답)+본딩·키 회전+안전 기본값. '링크+앱 계층 다층' 원칙."
    verify:
      type: "semantic"
      expect: "ble_app_security"
      semantic:
        intent: |
          BLE GATT·앱 계층 보안 — 링크 보안 위에 GATT 권한·앱 인증을 더해 다층 방어.
        success_criteria:
          - "GATT 권한(민감 특성 인증·암호 요구)을 제시"
          - "앱 계층 인증(챌린지-응답)·명령 무결성을 제시"
          - "본딩·키 관리와 안전 기본값을 제시"
          - "(설명) '링크 보안+앱 계층 인증 다층' 원칙 설명"
        acceptable_methods:
          - "GATT 권한 + 앱 인증 + 본딩 관리 + 안전 기본값"
        negative_signs:
          - "링크 보안만·앱 계층 없음"
          - "GATT 권한 언급 없음"
