id: "iot-security-w14"
category: "iot-security"
title: "[IoT보안 W14] IoT 보안 가이드라인: OWASP IoT Top 10 갭 진단 vs Security by Design·표준 준수"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IoT 보안 가이드라인 공방전 — **OWASP IoT Top 10·Security by Design·표준(ETSI EN 303 645 등)** 을
  기준으로 갭을 진단하고 준수 프로그램을 설계한다. **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(가이드라인 갭 진단·위반 실증 설계)와 Blue(Security by Design·표준 준수)를 모두 수행.
    • duel : Red 학생이 표준 위반을 드러내고, Blue 학생이 준수 프로그램으로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: OWASP IoT Top 10 항목별 갭 진단의 구체성, Security by
    Design·표준 준수 매핑의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (가이드라인 갭 진단) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — OWASP IoT Top 10 갭 진단

      대상 IoT 제품(W02~W13에서 다룬 것 중 택1)에 대해 **OWASP IoT Top 10 항목별 갭**을 진단한다.

      ### 무엇을
      - 각 항목(약한/기본 자격·불안전 네트워크 서비스·불안전 인터페이스·업데이트 부재·불안전 컴포넌트·
        프라이버시·불안전 데이터 전송/저장·장치 관리 부재·불안전 기본 설정·물리 하드닝 부재)에 대해
        대상의 위반 여부·근거를 진단.
      - 각 갭이 어떤 공격을 가능케 하는지 W02~W13 기법에 연결.

      ### ✅ 합격 기준
      OWASP IoT Top 10 중 최소 5개 항목에 대해 대상의 갭을 진단하고 각 갭이 가능케 하는 공격을 연결한다.
    hint: "OWASP IoT Top 10 5+ 항목별 대상 갭 진단(기본 자격·불안전 서비스·업데이트 부재·프라이버시 등)+각 갭이 가능케 하는 공격 연결."
    verify:
      type: "semantic"
      expect: "owasp_iot_gap"
      semantic:
        intent: |
          OWASP IoT Top 10 갭 진단 — 표준 항목별로 대상의 결함을 진단하고 공격에 연결.
        success_criteria:
          - "OWASP IoT Top 10 최소 5개 항목의 갭을 진단"
          - "각 갭의 위반 근거를 제시"
          - "각 갭이 가능케 하는 공격(W02~W13 기법)을 연결"
        acceptable_methods:
          - "항목별 갭 진단 + 공격 연결"
        negative_signs:
          - "항목 5개 미만·근거 없음"
          - "공격 연결 없이 나열만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 표준 미준수 우선순위·위험 평가

      진단한 갭을 **위험 기준으로 우선순위화**한다: 악용 용이성×영향으로 가장 위험한 미준수 항목을 선별.

      ### ✅ 합격 기준
      갭을 악용 용이성×영향으로 위험 평가해 우선순위를 매기고, 최상위 위험 항목의 근거를 설명한다.
    hint: "갭을 악용 용이성×영향으로 위험 평가·우선순위. 최상위 위험 항목(기본 자격·업데이트 부재 등) 근거."
    verify:
      type: "semantic"
      expect: "compliance_risk"
      semantic:
        intent: |
          표준 미준수 위험 평가 — 갭을 위험 기준으로 우선순위화해 개선 순서의 근거를 만든다.
        success_criteria:
          - "갭을 악용 용이성×영향으로 위험 평가"
          - "우선순위를 매김"
          - "최상위 위험 항목의 근거를 설명"
        acceptable_methods:
          - "위험 평가 + 우선순위"
        negative_signs:
          - "우선순위 없이 나열만"

# ───────────────────────── BLUE (Security by Design·표준 준수) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — Security by Design·표준 준수 매핑

      RED 갭을 닫는 **Security by Design 원칙과 표준 준수**를 설계한다.

      ### 무엇을
      - **Security by Design 원칙**: 기본 비밀번호 금지·안전한 업데이트·최소 표면·기본 암호화·안전한 기본 설정.
      - **표준 매핑**: ETSI EN 303 645·OWASP IoT·NIST 등 요구사항에 대상 개선을 매핑.
      - RED가 진단한 각 갭에 대응하는 준수 항목을 제시.

      ### ✅ 합격 기준
      RED 갭 각각에 대응하는 Security by Design 원칙·표준 요구사항을 매핑해 제시한다.
    hint: "Security by Design(기본 비밀번호 금지·안전 업데이트·최소 표면·기본 암호화)+표준(ETSI EN 303 645·OWASP·NIST) 매핑. RED 갭별 대응."
    verify:
      type: "semantic"
      expect: "security_by_design_mapping"
      semantic:
        intent: |
          Security by Design·표준 매핑 — 갭을 표준 요구사항·설계 원칙에 매핑해 준수를 설계.
        success_criteria:
          - "Security by Design 원칙(기본 비밀번호 금지·안전 업데이트·최소 표면·암호화)을 제시"
          - "표준(ETSI EN 303 645·OWASP IoT·NIST) 요구사항에 매핑"
          - "RED 갭별 대응 준수 항목을 제시"
        acceptable_methods:
          - "설계 원칙 + 표준 매핑 + 갭 대응"
        negative_signs:
          - "표준 매핑 없음"
          - "갭 대응 없이 일반론"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 준수 프로그램·수명주기·거버넌스 설계

      일회성 준수가 아닌 **지속 가능한 준수 프로그램**을 설계한다.

      ### 무엇을
      - **수명주기**: 설계→개발→배포→운영→EOL 각 단계 보안 요구·게이트(Secure SDLC).
      - **공급망**: SBOM·컴포넌트 취약점 관리·서명.
      - **운영**: 자동 업데이트·모니터링·취약점 공개(대응 프로세스)·인시던트 대응.
      - **거버넌스·인증**: 역할·정책·정기 감사, 인증(라벨링) 취득.

      ### ✅ 합격 기준
      Secure SDLC·공급망·운영·거버넌스를 갖춘 준수 프로그램을 제시하고 "표준 준수는 설계부터 EOL까지
      지속" 원칙을 설명한다.
    hint: "Secure SDLC(단계별 게이트)+SBOM·공급망+자동 업데이트·취약점 공개·IR+거버넌스·인증. '설계부터 EOL까지 지속' 원칙."
    verify:
      type: "semantic"
      expect: "compliance_program"
      semantic:
        intent: |
          IoT 준수 프로그램 — SDLC·공급망·운영·거버넌스로 지속 가능한 표준 준수를 설계.
        success_criteria:
          - "Secure SDLC(단계별 보안 게이트)를 제시"
          - "공급망(SBOM·취약점 관리)·운영(자동 업데이트·취약점 공개·IR)을 제시"
          - "거버넌스·인증을 제시"
          - "(설명) '설계부터 EOL까지 지속' 원칙 설명"
        acceptable_methods:
          - "SDLC + 공급망 + 운영 + 거버넌스"
        negative_signs:
          - "일회성 준수만"
          - "수명주기·거버넌스 언급 없음"
