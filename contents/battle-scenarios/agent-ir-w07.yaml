id: "agent-ir-w07"
category: "agent-ir"
title: "[에이전트IR W7] 규모화: 다중 에이전트 병렬 캠페인 vs 협조 캠페인 상관 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  에이전트 IR 공방전 — 공격의 **규모화(scale)**: 다중 에이전트가 역할을 나눠 병렬로 협조 공격하는
  양상과, 그 **협조 캠페인**을 상관 탐지하는 방어를 다룬다. 규모는 AI 공격의 결정적 우위다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(다중 역할 병렬 공격)와 Blue(협조 캠페인 상관)를 모두 수행.
    • duel : Red 학생이 병렬·역할 분할 공격을 수행하고, Blue 학생이 협조 캠페인을 상관 탐지한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. 다중 에이전트는
    서로 다른 태그(`auto-red-<학번>-a`, `-b`)·역할로 시뮬한다. Red 채점은 **대상 탐지 흔적** + 본인
    명령 흔적 + 보고서.

  ▸ 에이전트 IR 관점 — 협조 캠페인은 여러 출처·역할이 하나의 목표를 향한다. 방어자는 개별 에이전트가
    아니라 **공동 목표·시간 상관·역할 분담**으로 캠페인을 묶는다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (다중 역할 병렬 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 역할 분할 병렬 공격 시뮬

      다중 에이전트를 **역할 분할**(정찰 에이전트·공격 에이전트·검증 에이전트)해 병렬로 대상을 공격
      하는 것을 시뮬한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 서로 다른 태그·역할로 병렬 활동(정찰 `-a`, 공격 `-b`)을 대상
        (192.168.0.161)에 수행.
      - 역할별 활동과 공동 목표를 기록.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-a-recon' http://192.168.0.161/ &
      curl -A 'auto-red-<학번>-b-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1" &
      wait
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 역할 분할·공동 목표**.

      ### ✅ 합격 기준
      역할을 나눈 병렬 활동을 시뮬해 대상에 흔적을 남기고, 역할 분담과 공동 목표를 기록한다.
    hint: "정찰 -a / 공격 -b 등 역할 분할 병렬 활동(태그 auto-red-<학번>-*). 역할·공동 목표 기록. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ai-7-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          규모화·역할 분할 — 다중 에이전트가 역할을 나눠 병렬로 공동 목표를 향함.
        success_criteria:
          - "대상 WAF/IPS에 병렬 활동 흔적이 남고 고유 태그로 귀속됨"
          - "역할 분할(정찰·공격 등) 병렬 활동을 시뮬"
          - "(설명) 역할 분담과 공동 목표를 기록"
        acceptable_methods:
          - "역할별 병렬 활동 + 공동 목표 기록"
        negative_signs:
          - "탐지 흔적 없음"
          - "역할 분할·공동 목표 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 규모의 효과·분산 귀속 회피 분석

      규모화가 주는 **효과**(병렬로 시간 단축·표면 넓힘)와, 여러 출처로 분산해 귀속을 어렵게 하는
      회피를 분석한다.

      ### ✅ 합격 기준
      규모화의 효과(시간 단축·표면 확대)와 분산 귀속 회피를 분석하고, 그럼에도 공동 목표·시간 상관으로
      묶일 수 있음을 논한다.
    hint: "규모 효과(병렬 시간 단축·표면 확대)+분산 귀속 회피 분석 + 공동 목표·시간 상관으로 묶일 수 있음 논의. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ai-7-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          규모의 효과·회피 — 병렬·분산이 주는 우위와 그 한계(상관으로 묶임)를 이해.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "규모화 효과(시간 단축·표면 확대)와 분산 귀속 회피를 분석"
          - "(설명) 공동 목표·시간 상관으로 묶일 수 있음을 논함"
        acceptable_methods:
          - "규모 효과 + 회피 분석 + 상관 한계"
        negative_signs:
          - "효과·회피 분석 없음"

# ───────────────────────── BLUE (협조 캠페인 상관) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 협조 캠페인 상관: 다중 출처를 하나로

      Red의 **다중 역할·출처**를 하나의 협조 캠페인으로 상관한다.

      ### 어떻게
      - Wazuh/Suricata에서 여러 태그·출처의 활동을 **공동 목표(같은 대상)·시간 상관·역할 상보성**으로 묶기.
      - 개별로는 저강도여도 합치면 하나의 대규모 캠페인임을 식별.

      ### ✅ 합격 기준
      다중 출처·역할 활동을 공동 목표·시간으로 상관해 하나의 협조 캠페인으로 식별한다.
    hint: "Wazuh/Suricata에서 여러 태그·출처를 공동 목표·시간·역할 상보성으로 상관 → 하나의 대규모 캠페인 식별."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ai-7-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          협조 캠페인 상관 — 다중 출처·역할을 공동 목표·시간으로 묶어 대규모 캠페인을 식별.
        success_criteria:
          - "Wazuh/Suricata에서 다중 출처·역할 활동을 탐지"
          - "공동 목표·시간·역할 상보성으로 상관"
          - "(설명) 하나의 협조 캠페인으로 식별"
        acceptable_methods:
          - "다중 출처 상관 + 캠페인 식별"
        negative_signs:
          - "경보 근거 없음"
          - "개별 출처만·상관 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 규모 대응 탐지 아키텍처 설계

      다중 에이전트 협조 캠페인을 잡는 **규모 대응 탐지 아키텍처**를 설계한다.

      ### 무엇을
      - **캠페인 상관**: 출처·목표·시간·역할을 그래프로 묶는 엔티티 상관(다중 출처를 하나로).
      - **저강도 합산**: 개별 저강도 활동을 합산해 임계 판정(분산 회피 무력화).
      - **규모 대응**: 사람이 못 따라가는 규모이므로 자동 상관·자동 봉쇄(고위험 승인 게이트).
      - **위협 인텔**: 협조 패턴·역할 구조를 인텔로 축적해 재탐지.

      ### ✅ 합격 기준
      캠페인 상관·저강도 합산·규모 대응 자동화·위협 인텔을 제시하고 "규모에는 상관과 자동화로 맞선다"
      원칙을 설명한다.
    hint: "캠페인 상관(출처·목표·시간·역할 그래프)+저강도 합산+자동 상관·봉쇄(승인 게이트)+위협 인텔. '규모엔 상관·자동화로' 원칙."
    verify:
      type: "semantic"
      expect: "scale_detection_arch"
      semantic:
        intent: |
          규모 대응 탐지 — 캠페인 상관·저강도 합산·자동화로 다중 에이전트 협조 공격에 맞선다.
        success_criteria:
          - "캠페인 상관(출처·목표·시간·역할 그래프)을 제시"
          - "저강도 합산(분산 회피 무력화)을 제시"
          - "규모 대응 자동화·위협 인텔을 제시"
          - "(설명) '규모에는 상관과 자동화로 맞선다' 원칙 설명"
        acceptable_methods:
          - "캠페인 상관 + 저강도 합산 + 자동화 + 인텔"
        negative_signs:
          - "개별 탐지만"
          - "상관·자동화 없음"
