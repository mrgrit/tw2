id: "ai-security-w14"
category: "ai-security"
title: "[AI보안활용 W14] RL Steering: 보상 함수 공략 vs 보상 설계·행동 조향·reward hacking 방지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  AI 보안 활용 공방전 — bastion **RL Steering**(보상 함수 설계·행동 조향·reward hacking 방지)을 심화한다.
  Red는 보상 함수를 공략(게이밍)하고, Blue는 견고한 보상 설계로 정책을 안전하게 조향한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(보상 공략)와 Blue(견고한 보상 설계)를 모두 수행.
    • duel : Red 학생이 보상을 게이밍하고, Blue 학생이 견고한 보상·조향을 설계한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)에 대리지표 게이밍을 실증
    (고유 태그). Red 채점은 **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 보상 설계는 semantic.

  ▸ 관점 — 보상이 대리지표(활동량)면 에이전트는 성과 없이 지표만 채운다(굿하트 법칙). 견고한 보상은
    실제 성과·안전 제약·인간 피드백으로 설계된다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (보상 공략) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 25
    instruction: |
      ## 🎯 RED-1 — 대리지표 게이밍 실증 (활동량만 채우기)

      "활동량=보상" 같은 허술한 보상을 가정해, **실제 성과 없이 지표만 폭증**시키는 행동을 실증한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 대량·무의미 활동(고유 태그)으로 "활동
        지표"를 채운다. 실제 침투 성과와 무관함을 보임.

      ### ✅ 합격 기준
      대량 활동으로 대리지표를 채우는 게이밍을 실증하고, 굿하트 법칙으로 분석한다.
    hint: "대량·무의미 활동(태그)으로 '활동 지표' 채우기 실증 + 굿하트 법칙 분석. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-14-1", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          대리지표 게이밍 — 활동량 보상을 악용해 성과 없이 지표만 채움(굿하트 법칙).
        success_criteria:
          - "대상 IPS/WAF에 대량 활동 흔적이 남고 고유 태그로 귀속됨"
          - "실제 성과 없이 대리지표만 채우는 게이밍을 실증"
          - "(설명) 굿하트 법칙으로 분석"
        acceptable_methods:
          - "대량 활동 게이밍 + 분석"
        negative_signs:
          - "탐지 흔적 없음"
          - "게이밍 분석 없음"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 보상 함수 취약 유형 분석

      보상 함수의 **취약 유형**을 분석한다: 대리지표 게이밍·부작용 무시·리워드 탬퍼링·명세 게이밍.

      ### ✅ 합격 기준
      보상 함수 취약 유형 최소 3가지를 보안 에이전트 예시와 함께 분석하고, RED-1을 한 유형에 매핑한다.
    hint: "대리지표 게이밍·부작용 무시·리워드 탬퍼링·명세 게이밍 등 3+ 유형을 보안 예시와 분석 + RED-1 매핑. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-14-2", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          보상 취약 유형 — 다양한 reward hacking 양식을 카탈로그화.
        success_criteria:
          - "대상 WAF/IPS에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "보상 함수 취약 유형 최소 3가지를 예시와 함께 분석"
          - "(설명) RED-1을 한 유형에 매핑"
        acceptable_methods:
          - "유형 분석 + 매핑"
        negative_signs:
          - "유형 1~2개·예시 없음"

# ───────────────────────── BLUE (견고한 보상·조향) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 보상 게이밍 탐지 (지표 vs 성과)

      RED의 대리지표 게이밍을 **탐지**한다.

      ### 어떻게
      - Wazuh/Suricata에서 대량 활동(RED 게이밍)을 확인.
      - "활동량"과 "실제 성과"(진짜 위협 대응)를 대조해 게이밍 징후를 식별.

      ### ✅ 합격 기준
      대량 활동 대비 실제 성과 부재를 대조해 보상 게이밍 징후를 탐지·설명한다.
    hint: "Wazuh/Suricata 대량 활동 확인 + '활동량 vs 실제 성과' 대조로 게이밍 징후 탐지."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-14-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          게이밍 탐지 — 대리지표와 실제 성과를 대조해 reward hacking을 식별.
        success_criteria:
          - "Wazuh/Suricata에서 대량 활동을 확인"
          - "활동량 대비 실제 성과 부재를 대조"
          - "(설명) 게이밍 징후를 식별"
        acceptable_methods:
          - "지표 vs 성과 대조"
        negative_signs:
          - "활동 근거 없음"
          - "대조 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 견고한 보상 설계·안전 조향

      reward hacking을 막는 **견고한 보상·안전 조향**을 설계한다.

      ### 무엇을
      - **성과 기반 보상**: 실제 결과(위협 대응·오탐 감소)로 보상, 부작용 페널티.
      - **다중 목표·제약**: 정확도·안전·비용 함께 최적화, 안전 제약 강제.
      - **인간 피드백**: RLHF·선호 학습으로 의도 정렬, 이상 정책 검토.
      - **탬퍼링 방지·감사**: 보상 계산 격리·감사, 정책 드리프트 모니터·롤백.

      ### ✅ 합격 기준
      성과 기반 보상·다중 목표 제약·인간 피드백·탬퍼링 방지를 제시하고 "보상은 실제 성과·안전 제약으로,
      정렬은 인간 피드백으로" 원칙을 설명한다.
    hint: "성과 기반 보상(부작용 페널티)+다중 목표 제약(정확도·안전·비용)+RLHF 정렬+탬퍼링 방지·드리프트 모니터·롤백. '실제 성과·안전 제약·인간 피드백' 원칙."
    verify:
      type: "semantic"
      expect: "robust_reward_design"
      semantic:
        intent: |
          견고한 보상 설계 — 성과 기반·제약·인간 피드백·탬퍼링 방지로 정책을 안전하게 조향.
        success_criteria:
          - "성과 기반 보상(부작용 페널티)을 제시"
          - "다중 목표·안전 제약을 제시"
          - "인간 피드백(RLHF)·탬퍼링 방지·드리프트 모니터를 제시"
          - "(설명) '실제 성과·안전 제약·인간 피드백' 원칙 설명"
        acceptable_methods:
          - "성과 보상 + 제약 + RLHF + 탬퍼링 방지"
        negative_signs:
          - "대리지표 보상 유지"
          - "인간 피드백·제약 없음"
