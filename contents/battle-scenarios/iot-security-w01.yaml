id: "iot-security-w01"
category: "iot-security"
title: "[IoT보안 W1] IoT 4대 표면 침투 vs Security by Design 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IoT 보안 공방전 — IoT 시스템(카메라·스마트홈·산업/차량)의 **4대 공격 표면**
  (device·network·cloud·app)을 침투 평가하고 방어를 설계한다. 물리 IoT 장치·RF·하드웨어는
  실물이 필요하므로, 본 공방전은 **위협 모델·공격 경로·표준 기반 방어를 설계·서술**하는 **분석형**
  이다(결정론 시뮬 + GPU 분석, semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(4대 표면 침투 경로)와 Blue(Security by Design 방어)를 모두 수행.
    • duel : Red 학생이 IoT 시스템 공격 경로를 제시하고, Blue 학생이 표준 기반 방어로 대응.

  ▸ 채점(중요)
    실물 IoT가 없으므로 **보고서의 설계 품질**로 채점한다 — 4대 표면 매핑, 취약점을 연결한 공격 경로의
    구체성·타당성, OWASP IoT Top 10·Security by Design 기반 방어의 구체성. 근거 없는 일반론은 불인정.
    GPU(gemma3)로 분석·종합을 보조할 수 있다.

  ▸ 윤리 — 실제 IoT 장치 공격은 실물·인가가 필요. 본 공방전은 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (4대 표면 침투 경로 설계) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 4대 표면 침투 경로 설계 (대상 IoT 택1)

      대상 IoT 시스템(IP 카메라·스마트홈·자동차 중 택1)을 골라, **device·network·cloud·app 4대 표면**을
      점검하고, 취약점을 **연결한 공격 경로**를 설계한다.

      ### 무엇을 (예시)
      - **IP 카메라**: 기본 자격(device) → 무인증 RTSP 영상(network) → 펌웨어 하드코딩 비밀(device) →
        클라우드 API 접근(cloud) → 전 장치 제어.
      - **스마트홈**: 약한 전구(device) → 같은 망 측면이동(network) → 허브 장악(SPOF) → 잠금 제어.
      - **자동차**: 텔레매틱스 원격(network) → CAN 주입(device) → 브레이크/조향 조작(물리).

      ### ✅ 합격 기준
      4대 표면 중 최소 2개를 명시하고, 개별 취약점을 **연결한 공격 경로**(한 표면→다른 표면)를 구체적
      기법으로 서술한다(막연한 "해킹" 금지).
    hint: "IP 카메라/스마트홈/자동차 중 하나로, 4대 표면(device·network·cloud·app) 중 2개+를 연결한 공격 경로를 구체적 기법(기본자격·RTSP·하드코딩 비밀·측면이동·CAN)으로."
    verify:
      type: "semantic"
      expect: "iot_attack_path"
      semantic:
        intent: |
          IoT 4대 표면 침투 경로 설계. 표면을 연결한 공격 경로를 구체 기법으로 구성하는 능력을 평가.
        success_criteria:
          - "대상 IoT를 정하고 4대 표면 중 최소 2개를 명시"
          - "구체적 기법(기본자격·RTSP·펌웨어 비밀·측면이동·CAN 등)을 사용"
          - "개별 취약점을 연결한 공격 경로(표면 간 이동)를 서술"
        acceptable_methods:
          - "카메라: 기본자격→RTSP→펌웨어 비밀→클라우드"
          - "스마트홈: 약한 장치→측면이동→허브→잠금"
          - "자동차: 텔레매틱스→CAN 주입→물리"
        negative_signs:
          - "막연한 '해킹'·기법 불명"
          - "표면 하나만·경로 연결 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 확산·영향 분석 (봇넷·물리·프라이버시)

      RED-1 경로의 **최종 영향**을 분석한다: 봇넷 편입(Mirai식 대량화)·물리 위협(OT·자동차)·프라이버시
      유출(카메라·센서) 중 대상에 맞는 것을 구체적으로.

      ### ✅ 합격 기준
      대상 IoT의 최종 영향(대량 장악/물리 재앙/사생활 침해)과 왜 그렇게 확산되는지(공유 비밀·SPOF·
      원격 진입)를 구체적으로 서술한다.
    hint: "최종 영향(봇넷 대량화/물리 사고/프라이버시 유출)과 확산 원인(하드코딩 비밀 전 모델 공유·허브 SPOF·원격 진입점)을 분석."
    verify:
      type: "semantic"
      expect: "impact_analysis"
      semantic:
        intent: |
          IoT 공격의 확산·영향 분석. 개별 침해가 대량화/물리/프라이버시로 커지는 경로를 이해.
        success_criteria:
          - "대상의 최종 영향(봇넷/물리 재앙/프라이버시)을 구체적으로 서술"
          - "확산 원인(공유 비밀·SPOF·원격 진입·측면이동) 설명"
          - "(설명) IoT는 개별이 아니라 생태계·물리 안전 위협임을 언급"
        acceptable_methods:
          - "하드코딩 비밀 전 모델 공유로 대량 장악"
          - "허브 SPOF·측면이동으로 집 전체"
          - "OT/자동차 물리 재앙"
        negative_signs:
          - "영향이 막연"
          - "확산 원인 설명 없음"

# ───────────────────────── BLUE (Security by Design 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 4대 표면 방어 설계 (OWASP IoT Top 10)

      RED의 공격 경로를 **표면별로 방어**한다. OWASP IoT Top 10 관점에서 각 표면의 방어를 구체적으로.

      ### 무엇을
      - **Device**: 기본 자격 강제 변경·펌웨어 비밀 제거·서명·디버그 비활성.
      - **Network**: MQTT/BLE/무선 인증·암호화, RTSP 인증, 네트워크 분리.
      - **Cloud**: API 인증·최소 권한·데이터 암호화.
      - **App**: 하드코딩 비밀 제거·안전한 통신.

      ### ✅ 합격 기준
      RED 경로에 대응하는 **표면별 구체적 방어**를 제시하고, 경로 급소(하드코딩 비밀·허브·게이트웨이)를
      끊는 우선순위를 제시한다.
    hint: "RED 경로별로 표면 방어(기본자격 변경·펌웨어 서명·RTSP 인증·네트워크 분리·API 인증) + 경로 급소 차단 우선순위."
    verify:
      type: "semantic"
      expect: "surface_defense"
      semantic:
        intent: |
          IoT 4대 표면 방어 설계 — OWASP IoT Top 10 기반으로 RED 경로를 표면별로 막고 급소를 차단.
        success_criteria:
          - "RED 경로에 대응하는 표면별 구체적 방어 제시"
          - "경로 급소(하드코딩 비밀·허브·게이트웨이) 차단 우선순위 제시"
          - "(설명) OWASP IoT Top 10 등 표준 관점 언급"
        acceptable_methods:
          - "기본자격 변경·펌웨어 서명·RTSP 인증·네트워크 분리·API 인증"
          - "경로 급소 우선 차단"
        negative_signs:
          - "표면 하나만 방어"
          - "구체적 방어 없이 '방어하겠다'만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — Security by Design·생태계 방어

      개별 방어를 넘어 **Security by Design과 생태계·물리 안전**을 종합한다.

      ### 무엇을
      - **Security by Design**: 설계 단계 보안(기본 비밀번호 금지·안전한 업데이트·최소 표면·암호화 기본).
      - **생태계 분리**: 네트워크 분리·최소 신뢰(마이크로세분화)로 측면이동·허브 SPOF 완화.
      - **물리 안전**(대상이 OT/자동차면): 도메인 분리·독립 안전 시스템·안전 최우선.
      - **표준·규정 준수**: OWASP IoT·ETSI·Security by Design.

      ### ✅ 합격 기준
      Security by Design 원칙과 생태계 분리(측면이동·SPOF 완화)를 구체적으로 제시하고, 물리 안전 영역이면
      안전 최우선을 명시한다.
    hint: "Security by Design(설계 단계 보안)·생태계 분리(마이크로세분화)·물리 안전(도메인 분리·SIS)·표준 준수를 종합."
    verify:
      type: "semantic"
      expect: "security_by_design"
      semantic:
        intent: |
          IoT Security by Design·생태계·물리 안전 종합 방어. 설계 단계 보안과 생태계 분리로 근본 방어.
        success_criteria:
          - "Security by Design 원칙(기본 비밀번호 금지·업데이트·최소 표면·암호화)을 구체적으로 제시"
          - "생태계 분리(네트워크 분리·최소 신뢰)로 측면이동·SPOF 완화 제시"
          - "(설명) 물리 안전 영역이면 안전 최우선, 표준(OWASP/ETSI) 준수 언급"
        acceptable_methods:
          - "Security by Design·기본 비밀번호 금지·안전한 업데이트"
          - "네트워크 분리·마이크로세분화"
          - "OT/자동차 도메인 분리·독립 안전 시스템"
        negative_signs:
          - "Security by Design 언급 없음"
          - "생태계·설계 관점 없이 개별 패치만"
