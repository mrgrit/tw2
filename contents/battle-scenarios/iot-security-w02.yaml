id: "iot-security-w02"
category: "iot-security"
title: "[IoT보안 W2] IoT 네트워크 프로토콜 공격: MQTT·CoAP vs 경량 프로토콜 보안"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  IoT 네트워크 프로토콜 공방전 — **MQTT·CoAP 등 경량 프로토콜**의 공격 표면과 방어를 설계·분석한다.
  실물 IoT·브로커 환경이 필요하므로 **설계·서술형**이다(결정론 시뮬 + GPU 분석, semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(프로토콜 공격 경로)와 Blue(경량 프로토콜 보안)를 모두 수행.
    • duel : Red 학생이 프로토콜 공격을 제시하고, Blue 학생이 보안 설계로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: MQTT/CoAP 취약(무인증·평문·토픽 개방)의 구체성, 공격
    경로(도청·인젝션·제어 탈취), 보안(인증·TLS·ACL) 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (프로토콜 공격 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — MQTT 브로커 공격: 무인증 구독·발행 → 제어 탈취

      기본(비보안) MQTT의 개방성을 악용하는 경로를 설계한다.

      ### 무엇을
      - **무인증 접속**: 인증 없는 브로커에 연결, `#` 와일드카드 구독으로 전 토픽 도청(센서·명령).
      - **명령 인젝션**: 제어 토픽에 위조 메시지 발행 → 장치 조작(예: 잠금 해제·릴레이 on).
      - **retained/LWT 남용**: retained 메시지·유언(LWT) 조작.
      - 사이버→물리(장치 제어) 연결.

      ### ✅ 합격 기준
      MQTT 무인증 구독(도청)·발행(제어 탈취) 경로를 구체적으로 설계하고 물리 장치 조작으로 이어짐을
      서술한다.
    hint: "무인증 브로커 접속·'#' 와일드카드 구독 도청+제어 토픽 위조 발행(잠금 해제 등)+retained/LWT 남용. 사이버→물리."
    verify:
      type: "semantic"
      expect: "mqtt_attack"
      semantic:
        intent: |
          MQTT 공격 — 무인증·개방 토픽을 악용해 도청·명령 인젝션으로 장치를 제어.
        success_criteria:
          - "MQTT 무인증 구독(와일드카드 도청)을 설계"
          - "제어 토픽 위조 발행으로 장치 조작을 설계"
          - "사이버 조작이 물리 장치 제어로 이어짐을 서술"
        acceptable_methods:
          - "무인증 구독/발행 + retained/LWT 남용"
        negative_signs:
          - "프로토콜 메커니즘 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — CoAP·경량 프로토콜 취약 분석

      CoAP(UDP 기반) 등 경량 프로토콜의 취약을 분석한다: 무인증·평문, UDP **증폭 DoS**(스푸핑 출처),
      리소스 열거.

      ### ✅ 합격 기준
      CoAP의 무인증·평문·UDP 증폭·리소스 열거 중 최소 2가지 취약을 분석하고 각 공격 영향을 설명한다.
    hint: "CoAP 무인증·평문+UDP 증폭 DoS(출처 스푸핑)+리소스 열거(/.well-known/core). 2+ 취약·영향 분석."
    verify:
      type: "semantic"
      expect: "coap_attack"
      semantic:
        intent: |
          CoAP·경량 프로토콜 취약 — 무인증·평문·UDP 증폭·열거가 도청·DoS·정찰을 허용함을 이해.
        success_criteria:
          - "CoAP 취약(무인증·평문·UDP 증폭·리소스 열거) 최소 2가지를 분석"
          - "각 취약의 공격 영향(도청·증폭 DoS·정찰)을 설명"
          - "(설명) 경량 프로토콜이 보안을 후순위로 둔 배경을 언급"
        acceptable_methods:
          - "CoAP 취약 2+ 분석 + 영향"
        negative_signs:
          - "취약 1개·막연"

# ───────────────────────── BLUE (경량 프로토콜 보안) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — MQTT/CoAP 보안 설계: 인증·암호·ACL

      RED의 프로토콜 공격을 막는 **인증·암호·접근 제어**를 설계한다.

      ### 무엇을
      - **인증**: MQTT 사용자/클라이언트 인증(자격·인증서), 무인증 접속 차단.
      - **암호**: TLS(MQTT)·DTLS(CoAP)로 도청·MITM 차단.
      - **접근 제어(ACL)**: 토픽/리소스별 구독·발행 권한(최소 권한, 와일드카드 도청 차단).
      - RED 경로별 대응 매핑.

      ### ✅ 합격 기준
      MQTT/CoAP 인증·TLS/DTLS·토픽 ACL을 구체적으로 제시하고 RED의 도청·인젝션·DoS에 대응 매핑한다.
    hint: "MQTT 인증(자격·인증서)+TLS/DTLS 암호+토픽/리소스 ACL(최소 권한·와일드카드 차단). RED 경로 매핑."
    verify:
      type: "semantic"
      expect: "mqtt_security"
      semantic:
        intent: |
          경량 프로토콜 보안 — 인증·암호·ACL로 개방성을 닫고 RED 공격을 막는다.
        success_criteria:
          - "MQTT/CoAP 인증(무인증 차단)을 제시"
          - "TLS/DTLS 암호를 제시"
          - "토픽/리소스 ACL(최소 권한)을 제시하고 RED 경로 매핑"
        acceptable_methods:
          - "인증 + 암호 + ACL + 매핑"
        negative_signs:
          - "한 축만"
          - "ACL(권한) 누락"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 네트워크 분리·모니터링·경량 환경 대응 설계

      경량 IoT 환경의 제약(저전력·저자원)을 반영한 **네트워크 분리·모니터링·심층 방어**를 설계한다.

      ### 무엇을
      - **네트워크 분리**: IoT VLAN/세그먼트 분리, 브로커·게이트웨이 최소 노출.
      - **모니터링**: 비정상 토픽 발행·구독·트래픽 이상·증폭 DoS 탐지.
      - **경량 대응**: 자원 제약 장치엔 게이트웨이에서 보안 종단(TLS 오프로딩)·인증 프록시.
      - **레이트리밋·안전**: 증폭 DoS 완화(응답 크기 제한), 장치 오작동 대비 안전 기본값.

      ### ✅ 합격 기준
      네트워크 분리·모니터링·게이트웨이 보안 종단·DoS 완화를 제시하고 "경량 환경은 게이트웨이·분리로
      감싸라" 원칙을 설명한다.
    hint: "IoT VLAN 분리+비정상 토픽/증폭 DoS 모니터링+게이트웨이 TLS 오프로딩·인증 프록시+증폭 완화(응답 제한). '경량은 게이트웨이·분리로 감싸기' 원칙."
    verify:
      type: "semantic"
      expect: "iot_network_defense"
      semantic:
        intent: |
          경량 IoT 네트워크 방어 — 분리·모니터링·게이트웨이 보안 종단으로 자원 제약을 보완.
        success_criteria:
          - "네트워크 분리(IoT VLAN·최소 노출)를 제시"
          - "모니터링(비정상 토픽·증폭 DoS)을 제시"
          - "게이트웨이 보안 종단·DoS 완화를 제시"
          - "(설명) '경량은 게이트웨이·분리로 감싸기' 원칙 설명"
        acceptable_methods:
          - "분리 + 모니터링 + 게이트웨이 종단 + DoS 완화"
        negative_signs:
          - "분리·게이트웨이 관점 없음"
          - "자원 제약 고려 없음"
