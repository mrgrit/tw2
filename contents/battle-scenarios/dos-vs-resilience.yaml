id: "dos-vs-resilience"
title: "DoS 공격 vs 서비스 복원력"
description: "경쟁사의 의뢰를 받은 해커 그룹이 우리 서비스에 대한 서비스 거부 공격을 예고했다. Red Team은 Slowloris, HTTP Flood 등 다양한 DoS 기법으로 웹 서비스를 마비시켜야 한다. Blue Team은 연결 제한, rate limiting, 서비스 모니터링을 통해 서비스 가용성을 유지해야 한다."
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "대상 웹 서버(10.20.30.80)의 현재 연결 상태와 응답 시간을 측정하라."
    hint: "curl -s -o /dev/null -w 'HTTP Code: %{http_code}, Time: %{time_total}s' http://10.20.30.80 && echo"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "HTTP Code:"
      semantic:
        intent: "DoS 전 baseline 측정 — 정상 응답 시간/code 기록. 후속 공격 후 비교 위한 reference."
        success_criteria:
          - "curl -w 형식 옵션 (http_code + time_total)"
          - "응답에 HTTP 200 또는 30x + 응답 시간 (ms 단위)"
          - "baseline 시간 측정 (예: 0.05s)"
        acceptable_methods:
          - "curl -w '%{http_code} %{time_total}'"
          - "ab -n 1 URL (apache bench 단일)"
          - "wget --debug + grep timing"
          - "python3 + time.time() wrapper"
        negative_signs:
          - "응답 시간 측정 누락 (HTTP code 만)"
          - "단일 측정만 + 평균 안 냄"

  - order: 2
    instruction: "nmap으로 대상 웹 서버에서 실행 중인 HTTP 서비스의 상세 정보를 파악하라."
    hint: "nmap -sV --script http-server-header -p 80,3000,8080 10.20.30.80 --max-retries 1 --host-timeout 15s -T4"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "open"
      semantic:
        intent: "MITRE T1592.002 — DoS 표적 service stack 식별. Apache vs Nginx vs Express 별 약점 (worker model / max connections / keepalive) 분석."
        success_criteria:
          - "nmap -sV + http-server-header script"
          - "응답에 Server: 헤더 + version (Apache/2.4 / Nginx/1.18 / Express)"
          - "alternate port (3000 JuiceShop / 8080 DVWA) 식별"
        acceptable_methods:
          - "nmap -sV --script http-server-header"
          - "curl -I (수동)"
          - "whatweb -v"
        negative_signs:
          - "단일 port (80) 만 + 다른 service 누락"
          - "version 정보 추출 안 함"

  - order: 3
    instruction: "nmap의 http-slowloris 스크립트로 Slowloris 공격 가능성을 테스트하라."
    hint: "nmap --script http-slowloris-check -p 80 10.20.30.80 --max-retries 1 --host-timeout 15s -T4"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "slowloris"
      semantic:
        intent: "MITRE T1499.001 (Direct Network Flood) — Slowloris 취약성 식별. Apache prefork mod 가 가장 취약. nmap NSE 로 자동 검사."
        success_criteria:
          - "nmap --script http-slowloris-check"
          - "응답에 slowloris 결과 (vulnerable / not vulnerable)"
          - "vulnerable 시 후속 실 공격 (slowloris.py 등) 가능성 명시"
        acceptable_methods:
          - "nmap --script http-slowloris-check"
          - "slowhttptest 도구 (전용)"
          - "wireshark + 수동 incomplete request"
        negative_signs:
          - "script 결과 무시 + 실 공격 바로 시도"
          - "vulnerable 판정 후 영향 분석 없음"

  - order: 4
    instruction: "다수의 동시 HTTP 연결을 생성하여 HTTP Flood를 시뮬레이션하라 (10회)."
    hint: "for i in $(seq 1 10); do curl -s -o /dev/null -w '%{http_code} ' http://10.20.30.80 & done; wait; echo 'Flood simulation complete'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Flood simulation complete"
      semantic:
        intent: "MITRE T1499.002 (Service Exhaustion Flood) — HTTP Flood 시뮬레이션. for loop + & 백그라운드로 동시 N connection. 작은 N (10) 만 lab 안전."
        success_criteria:
          - "for loop + curl & + wait 패턴"
          - "10 동시 요청 발송"
          - "응답에 Flood simulation complete + status code 분포"
        acceptable_methods:
          - "for loop + curl &"
          - "ab -n 100 -c 10 URL (apache bench)"
          - "wrk -t10 -c100 -d10s URL"
          - "siege -c 10 -r 1 URL"
        negative_signs:
          - "wait 없이 background 종료 → 결과 손실"
          - "100+ connection 발송 (lab 안전 초과 — DoS 실제 가능)"

  - order: 5
    instruction: "대용량 요청 페이로드로 서버 리소스 소진을 시도하라."
    hint: "python3 -c \"import urllib.request; [urllib.request.urlopen('http://10.20.30.80:3000/rest/products/search?q=' + 'A'*500) for i in range(5)]\" 2>&1; echo 'Payload test complete'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Payload test complete"
      semantic:
        intent: "MITRE T1499.004 (Application or System Exploitation) — 큰 query string 으로 server CPU/memory 소진. SQLi 도구의 long string 옵션과 동일 효과."
        success_criteria:
          - "python urllib + 'A'*500 또는 더 긴 페이로드"
          - "JuiceShop /rest/products/search?q= 같은 search endpoint"
          - "5 요청 + Payload test complete confirm"
        acceptable_methods:
          - "python urllib + 긴 string"
          - "curl --data-binary $(yes A | head -c 10000)"
          - "ab -p file (POST body 파일)"
        negative_signs:
          - "1 요청만 + iterate 안 함"
          - "응답 status code 분석 없음 (500 에러 / timeout)"

  - order: 6
    instruction: "공격 후 서비스 응답 시간 변화를 측정하여 공격 효과를 확인하라."
    hint: "for i in 1 2 3; do curl -s -o /dev/null -w 'Response %{http_code} in %{time_total}s\\n' http://10.20.30.80; done"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Response"
      semantic:
        intent: "공격 효과 정량 측정 — Step 1 baseline 대비 응답 시간 증가율 + 200/503 status 변화. DoS 효과 = baseline × 5+ 또는 503/timeout 발생."
        success_criteria:
          - "for 3+ 회 curl + time_total 측정"
          - "응답에 Response code + 시간"
          - "Step 1 baseline 과 비교 (배수 증가율)"
        acceptable_methods:
          - "for + curl -w"
          - "ab -n 100 (large sample)"
          - "monitoring tool (prometheus / datadog 같은 metric)"
        negative_signs:
          - "단일 측정만 + baseline 비교 없음"
          - "503/timeout 발생해도 분석 없음 (DoS 성공인데 인지 못함)"

blue_missions:
  - order: 1
    instruction: "현재 웹 서버의 연결 상태를 확인하라."
    hint: "ss -tn state established | grep ':80\\|:3000\\|:8080' | wc -l && ss -tn state established | head -20"
    points: 10
    target_vm: web
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "DoS 진행 중 connection table 모니터링 — 정상 baseline 대비 비정상 connection 수 식별. SYN/ESTABLISHED/TIME_WAIT 분포 분석."
        success_criteria:
          - "ss -tn state established + grep target ports"
          - "connection 수 카운트"
          - "동일 source IP 의 다중 connection 식별 (DoS 시그니처)"
        acceptable_methods:
          - "ss -tn + wc -l"
          - "netstat -anp (legacy)"
          - "conntrack -L (NAT 뒤)"
          - "Wazuh metric"
        negative_signs:
          - "ss 만 + count/source 분석 없음"
          - "established 만 + SYN 누락 (Slowloris 신호 놓침)"

  - order: 2
    instruction: "Apache의 현재 연결 수와 프로세스 상태를 모니터링하라."
    hint: "apachectl status 2>/dev/null || (ps aux | grep apache | wc -l && echo 'Apache processes counted')"
    points: 10
    target_vm: web
    verify:
      type: "output_contains"
      expect: "apache"
      semantic:
        intent: "Apache mod_status 또는 process count — worker 소진 (MaxRequestWorkers 도달) 식별. Slowloris 의 핵심 지표."
        success_criteria:
          - "apachectl status (ExtendedStatus On 필요) 또는 ps grep"
          - "응답에 worker count + busy/idle 비율"
          - "MaxRequestWorkers 도달 여부 식별"
        acceptable_methods:
          - "apachectl status / curl http://localhost/server-status"
          - "ps aux | grep apache | wc -l"
          - "systemctl status apache2 + active connections"
          - "munin / nagios apache 플러그인"
        negative_signs:
          - "process count 만 + busy/idle 분석 없음"
          - "mod_status 미설정 → fallback (ps) 만"

  - order: 3
    instruction: "nftables에 동일 IP에서의 연결 수를 제한하는 룰을 추가하라 (초당 25개)."
    hint: "nft add rule inet filter input tcp dport { 80, 3000, 8080 } ct state new limit rate 25/second accept"
    points: 20
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Connection rate limit — 초당 25 new connection 만 accept, 초과 drop. HTTP Flood / Slowloris 의 효과적 차단."
        success_criteria:
          - "nft add rule + ct state new + limit rate"
          - "tcp dport multi (80, 3000, 8080)"
          - "rate 25/second (또는 적절한 baseline)"
        acceptable_methods:
          - "nft + limit rate"
          - "iptables -m hashlimit (per-source IP)"
          - "Cilium L4 rate limit"
          - "Cloudflare/CDN egress (production)"
        negative_signs:
          - "rate 너무 높음 (1000/s) — DoS 차단 효과 없음"
          - "single port 만 + multi service 무시"

  - order: 4
    instruction: "nftables에 SYN Flood 방어를 위한 룰을 추가하라."
    hint: "nft add rule inet filter input tcp flags syn limit rate 50/second accept"
    points: 20
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "SYN Flood 방어 — TCP flags syn 만 매칭 + rate limit. SYN cookie 와 함께 사용 권장."
        success_criteria:
          - "nft add rule + tcp flags syn + limit rate"
          - "rate 50/second (또는 적절)"
          - "(보너스) net.ipv4.tcp_syncookies=1 sysctl"
        acceptable_methods:
          - "nft tcp flags syn limit"
          - "iptables -p tcp --syn -m limit"
          - "sysctl net.ipv4.tcp_syncookies=1"
          - "tc (traffic control) shaping"
        negative_signs:
          - "tcp flags 매칭 없이 전체 input 적용"
          - "syncookies 사용 안 함 (kernel level 방어 누락)"

  - order: 5
    instruction: "suricata에서 DoS 관련 알림을 확인하라."
    hint: "grep -iE 'dos\\|flood\\|slowloris' /var/log/suricata/fast.log | tail -20"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Suricata ET DoS 카테고리 (sid 2003068 등) 매칭. 네트워크 레벨 detection — application layer (Apache mod_status) 와 별개 신호."
        success_criteria:
          - "fast.log 또는 eve.json grep dos/flood/slowloris"
          - "최소 1개 alert (또는 정상 시 없음 보고)"
          - "alert 의 sid + classification + source IP"
        acceptable_methods:
          - "grep + tail fast.log"
          - "jq alert filtering eve.json"
          - "Wazuh suricata decoder"
        negative_signs:
          - "Suricata 룰셋 (suricata-update) 누락"
          - "alert 보이지만 sid 분석 없음"

  - order: 6
    instruction: "Apache 접근 로그에서 비정상적으로 빈번한 요청 IP를 식별하라."
    hint: "awk '{print $1}' /var/log/apache2/access.log | sort | uniq -c | sort -rn | head -10"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "10.20.30"
      semantic:
        intent: "DoS source IP 식별 — access.log 의 IP 별 요청 빈도 정렬. top 10 IP + 비정상 임계값 (분당 100+) 식별."
        success_criteria:
          - "awk '{print $1}' access.log | sort | uniq -c | sort -rn"
          - "top 10 IP + count"
          - "임계값 비교 (정상 baseline 대비 N배)"
        acceptable_methods:
          - "awk + sort + uniq -c + sort -rn"
          - "goaccess access.log (실시간 시각화)"
          - "ELK aggregation"
          - "fail2ban filter (자동 차단까지)"
        negative_signs:
          - "전체 IP list 없이 단일 attacker IP 만 추출"
          - "임계값 비교 없이 단순 list dump"
