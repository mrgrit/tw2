id: "ai-safety-w15"
category: "ai-safety"
title: "[AI안전 W15] 기말: AI 모델 종합 보안 평가 프로젝트 vs 종합 안전 프로그램"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  기말 종합(캡스톤) — 대상 **AICompanion**(`http://192.168.0.161:8007`). 한 학기 전체(인젝션·탈옥·
  가드레일·적대적 입력·데이터 오염·모델 보안·에이전트·RAG·거버넌스·평가)를 종합해 **AI 모델 종합
  보안 평가**와 **종합 안전 프로그램**을 완성한다.
  ▸ Red 위치: 본인 인프라(`ssh ccc@{{TARGET_IP}}`, 비밀번호 `1`). 채점 command_ran + 종합 보고서.
    윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 종합 AI 보안 평가 캠페인

      최소 5개 취약 클래스(인젝션·탈옥·가드레일 우회·데이터 오염·모델 유출·에이전트·RAG)를 커버하는
      종합 평가를 실행하고 각 증거·ASR을 남긴다.

      ### ✅ 합격 기준
      최소 5개 취약 클래스를 실제 공격해 증거·ASR을 제시하고 OWASP LLM Top 10 커버리지를 만든다.
    hint: "인젝션·탈옥·가드레일·오염·모델유출·에이전트·RAG 중 5+ 클래스 실제 공격+증거·ASR+OWASP 커버리지."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "red-15-1", type: "command_ran", target: "attacker", params: { pattern: "api" } }
      semantic:
        intent: "종합 AI 보안 평가 — 학기 전체 역량을 하나의 캠페인으로."
        success_criteria:
          - "본인 인프라 명령 로그에 다단계 /api 호출 흔적이 남음"
          - "최소 5개 취약 클래스의 실제 증거·ASR을 제시"
          - "(설명) OWASP LLM Top 10 커버리지를 제시"
        acceptable_methods: ["다클래스 공격 + 증거 + 커버리지"]
        negative_signs: ["클래스 5개 미만", "증거·커버리지 없음"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 전문 AI 보안 평가 보고서

      경영 요약·기술 상세·거버넌스 관점을 갖춘 **전문 평가 보고서**를 작성한다.

      ### ✅ 합격 기준
      경영 요약·기술 상세(재현·증거·OWASP·ASR)·규제 관점·우선 권고를 갖춘 보고서를 작성한다.
    hint: "경영 요약+기술 상세(재현·증거·OWASP·ASR)+규제 관점+우선 권고. 전문 보고서."
    verify:
      type: "semantic"
      expect: "ai_security_report"
      semantic:
        intent: "전문 평가 보고 — 발견을 경영·기술·규제 관점으로 종합."
        success_criteria:
          - "경영 요약을 제시"
          - "기술 상세(재현·증거·OWASP·ASR)를 제시"
          - "규제 관점·우선 권고를 제시"
        acceptable_methods: ["경영/기술/규제/권고 보고서"]
        negative_signs: ["기술 나열만·경영/규제 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 안전 아키텍처

      전 취약에 대응하는 **엔드투엔드 안전 아키텍처**를 설계한다: 비밀 격리·다층 가드레일(입력·모델·
      출력)·최소 에이전시·RAG 보안·모델 보호·정규화, OWASP LLM에 매핑.

      ### ✅ 합격 기준
      비밀 격리·다층 가드레일·최소 에이전시·RAG/모델 보호를 아우르는 아키텍처를 OWASP LLM에 매핑해
      설계한다.
    hint: "비밀 격리+다층 가드레일(입력·모델·출력)+최소 에이전시+RAG 보안+모델 보호+정규화. OWASP LLM 매핑."
    verify:
      type: "semantic"
      expect: "safety_architecture"
      semantic:
        intent: "종합 안전 아키텍처 — 학기 전체 방어를 엔드투엔드로 종합."
        success_criteria:
          - "비밀 격리·다층 가드레일을 제시"
          - "최소 에이전시·RAG/모델 보호를 제시"
          - "OWASP LLM에 매핑"
        acceptable_methods: ["엔드투엔드 아키텍처 + 매핑"]
        negative_signs: ["일부 표면만", "매핑 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 프로그램: 거버넌스·평가·운영

      아키텍처를 **실행 가능한 안전 프로그램**으로 만든다: 거버넌스(정책·역할·규제 준수), 지속 평가·
      레드팀(회귀), 운영(모니터링·인시던트 대응), 지속 개선 순환.

      ### ✅ 합격 기준
      거버넌스·지속 평가/레드팀·운영·개선 순환을 갖춘 프로그램을 제시하고 "설계→평가→운영→개선 순환"
      원칙을 설명한다.
    hint: "거버넌스(정책·규제)+지속 평가·레드팀(회귀)+운영(모니터링·IR)+개선 순환. '설계→평가→운영→개선' 원칙."
    verify:
      type: "semantic"
      expect: "safety_program"
      semantic:
        intent: "안전 프로그램 — 아키텍처를 거버넌스·평가·운영·개선의 프로그램으로 종합."
        success_criteria:
          - "거버넌스(정책·역할·규제 준수)를 제시"
          - "지속 평가·레드팀(회귀)을 제시"
          - "운영(모니터링·IR)과 개선 순환을 제시"
          - "(설명) '설계→평가→운영→개선 순환' 원칙 설명"
        acceptable_methods: ["거버넌스 + 평가 + 운영 + 개선"]
        negative_signs: ["일회성·순환 없음"]
