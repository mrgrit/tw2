id: "compliance-w02"
category: "compliance"
title: "[컴플라이언스 W2] 정보통신망법 기술적 보호조치 — 경계 우회 vs 침입탐지·접근통제"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  컴플라이언스 2주차 — **정보통신망법 기술적 보호조치**. 침입차단(방화벽)·침입탐지(IDS)·접근통제·로그 위변조
  방지를 요구한다. 공격자는 경계 보호의 공백을 노려 침투하고, 감사자(너)는 IDS 룰·접근통제·로그 보호로 준수를 입증한다.

  ▸ 이야기
    공격자가 불필요 서비스/약한 경계를 노려 침투하고(태그 `co02r1`) 백도어 포트(56002)를 연다. 감사자는
    ① IDS 침입탐지 룰, ② 불필요 서비스/접근통제 탐지, ③ 기술적 보호조치 종합 점검·증적으로 대응한다.

  ▸ 모드
    • solo : 한 학생이 경계 우회(자기 인프라 표적)와 통제 구현을 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라 경계를 우회, Blue 는 자기 인프라에 통제 구현.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    악용 태그 **`co02r1-<본인id>`**, 백도어 포트 **56002**, 계정 **`compa02`**,
    Suricata IDS 룰 **sid 9802011**, Wazuh 탐지 **id 104021**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [경계 우회 침투] — 약한 경계 보호 공략

      ### 상황
      침입차단/탐지가 미흡하면 공격은 쉽게 들어온다. 너는 태그 `co02r1-<본인id>` 로 웹 침투를 수행해 경계 보호의
      공백을 입증한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim):
      ```bash
      curl -s -A "co02r1-kim" -H "Host: govportal.6v6.lab" \
        "http://192.168.0.161/api/citizens/export.csv?id=co02r1-kim%27%20UNION%20SELECT%201--+&Submit=Submit"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `co02r1` 가 포함된 침투 흔적이 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `co02r1` 태그가 포함된 흔적이 남는다.
    hint: "태그(co02r1) 웹 침투 → 대상 modsec audit. 채점: log_contains modsec co02r1."
    verify:
      type: "log_contains"
      expect: "co02r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "co02r1", since_sec: 1800 } }
      semantic:
        intent: "경계 보호 미준수 악용(T1190) — 침입차단/탐지 공백 입증. 태그(co02r1) 귀속."
        success_criteria:
          - "대상 WAF audit 에 co02r1 태그가 포함된 침투 흔적"
          - "어떤 경계 보호 공백을 노렸는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 에서 태그 단 웹 침투"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [불필요 서비스] — 백도어 포트 + 계정

      ### 상황
      불필요 서비스/포트는 정보통신망법이 통제를 요구하는 항목이다. 너는 백도어 포트 **56002** 를 열고 계정
      **`compa02`** 를 만들어 미통제 서비스를 시연한다.

      ### 할 일
      ```bash
      nohup ncat -lk 56002 >/dev/null 2>&1 &     # 불필요/백도어 서비스
      sudo useradd -m -s /bin/bash compa02
      ```

      ### 채점 방법
      대상 호스트에 포트 56002 listening 이거나 `/etc/passwd` 에 `compa02` 가 있는지로 채점.

      ### 합격 기준
      포트 56002 listening 또는 계정 `compa02`.
    hint: "백도어 포트 56002 + useradd compa02. 채점: port_listening 56002 + file_contains passwd compa02."
    verify:
      type: "port_listening"
      expect: "56002"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 56002 } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "compa02" } }
      semantic:
        intent: "불필요 서비스(미통제 포트) + 계정(T1136) — 접근통제 미준수. 망법 통제 대상."
        success_criteria:
          - "포트 56002 listening 또는 계정 compa02"
          - "불필요 서비스가 왜 위험한지 서술"
        acceptable_methods:
          - "리스너 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [침입탐지(IDS) 운영] — Suricata 룰 (sid 9802011)

      ### 상황
      정보통신망법은 **침입탐지시스템 운영**을 요구한다. RED-1 침투를 잡는 Suricata 룰(**sid 9802011**)을 배포해
      IDS 가 실제로 작동함을 입증한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"COMPLIANCE-W02 IDS: web intrusion detected"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9802011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9802011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 침입탐지 룰 sid 9802011 이 존재한다.
    hint: "IDS 침입탐지 Suricata 룰(sid 9802011) → reload. 채점: file_contains local.rules 9802011."
    verify:
      type: "file_contains"
      expect: "9802011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9802011" } }
      semantic:
        intent: "망법 침입탐지 운영 — Suricata 룰로 침입 탐지 작동 입증. 기술적 보호조치(IDS) 구현."
        success_criteria:
          - "local.rules 에 sid 9802011"
          - "IDS 운영이 망법 요구사항인 점 언급"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [접근통제·서비스 탐지] — Wazuh 룰 (id 104021)

      ### 상황
      불필요 서비스/백도어 포트와 비인가 계정을 잡는 Wazuh 룰(**id 104021**)을 만든다(접근통제 + 로그 위변조 방지 연계).

      ### 할 일
      ```xml
      <group name="edu,netact,">
        <rule id="104021" level="12">
          <if_group>edu</if_group>
          <match>compa02</match>
          <description>COMPLIANCE-W02 - unnecessary service / unauthorized account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 104021 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 접근통제/서비스 탐지 id 104021 룰이 존재한다.
    hint: "접근통제/서비스 Wazuh 룰(id 104021) → restart. 채점: file_contains local_rules.xml 104021."
    verify:
      type: "file_contains"
      expect: "104021"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "104021" } }
      semantic:
        intent: "망법 접근통제 — 불필요 서비스/비인가 계정 Wazuh 룰. 접근통제 + 로그 보호 구현."
        success_criteria:
          - "local_rules.xml 에 rule id 104021"
          - "불필요 서비스/계정 탐지 로직 + 로그 위변조 방지(원격 전송) 언급"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [기술적 보호조치 종합·증적] — 망법 준수 입증

      ### 상황
      망법 기술적 보호조치를 종합 점검하고 증적을 정리한다(방화벽 DROP 정책, IDS 가동, LISTEN 포트 최소화,
      rsyslog 원격 전송, 보안 헤더).

      ### 할 일
      보고서에:
      - 항목별 점검(`nft list ruleset` 정책 / `suricata 상태` / `ss -tlnp` / `rsyslog.conf` / 보안 헤더) + 증적
      - 미준수 개선 + 백도어 포트(56002)·계정(compa02) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 종합 점검 증적으로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ 보호조치 항목별 점검·증적·헌팅은 제출로 검증).
    hint: "망법 보호조치 점검(방화벽 DROP/IDS/LISTEN 포트/rsyslog 원격/보안헤더) + 증적 + 포트/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "망법 종합 점검·증적 — 보호조치 항목별 준수 입증 + 개선. 분석형 — 구체 점검/증적 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "보호조치 항목별 점검(방화벽/IDS/포트/로그/헤더) + 증적"
          - "미준수 개선 + 포트/계정 헌팅"
        acceptable_methods:
          - "점검 표 + 증적 + 헌팅"
        negative_signs:
          - "증적 없는 서술 / 항목 누락"
