id: "soc-w12"
category: "soc"
title: "[SOC관제 W12] 내부 위협 — 인가된 사용자의 권한 남용을 UEBA로 잡고 증거를 보전하기"
difficulty: "hard"
time_limit: 2700
battle_type: "1v1"
description: |
  인시던트 대응 실습(3) — **내부 위협**. 외부 침입과 달리 **인가된 사용자**가 정상 자격으로 권한을
  남용한다. 시그니처도, 익스플로잇도 없다 — 그래서 **UEBA**(평소와 다른 행위)로만 잡힌다. 내부자는
  백도어 계정·SSH 키를 만들고 민감 데이터를 스테이징·유출한다. 대응자는 baseline 대비 이탈을 식별하고,
  계정을 격리하며, **증거 보전(chain of custody)**을 지키고 **HR/법무**와 협업한다.

  ▸ 모드: solo(내부자→내부위협 IR) / duel(상대 내부 침해→본인 IR). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Red는 **내부자(insider)** 권한 남용 — 명령 로그 신뢰 제한 → 대상 호스트 흔적으로 채점.
    권한 남용 계정 마커 **`insdr12`**, 데이터 유출 채널 **포트 52525**, 격리 차단룰 Suricata **sid 9512001**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 권한 남용 (백도어 계정 insdr12)

      ### 상황
      인가된 접근을 남용해 백도어 계정(**insdr12**)을 추가한다(은밀한 지속 접근). 정상 작업처럼 보이지만
      UEBA로는 이상 신호다.

      ### 할 일
      대상 호스트에 계정 `insdr12`를 만든다.
      ```bash
      sudo useradd -m -s /bin/bash insdr12
      ```

      ### 채점 방법
      대상 호스트 `/etc/passwd`에 `insdr12`가 추가됐는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `insdr12`가 있다.
    hint: "useradd insdr12. 채점: file_contains passwd insdr12."
    verify:
      type: "file_contains"
      expect: "insdr12"
      checks:
        - { id: "red-1-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "insdr12" } }
      semantic:
        intent: "T1078/T1136 — 내부자 권한 남용(백도어 계정). 정상처럼 보이나 UEBA 이상 신호."
        success_criteria:
          - "/etc/passwd에 insdr12"
          - "정상 작업 대비 무엇이 이상한지(시점/권한/패턴) 서술"
        acceptable_methods:
          - "useradd / authorized_keys / sudo 권한 추가"
        negative_signs:
          - "흔적 미생성"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 데이터 스테이징/유출 채널 (포트 52525)

      ### 상황
      민감 데이터를 모아 외부로 빼낼 채널을 연다(유출 리스너 포트 **52525**). 대응자의 DLP/유출 탐지
      표적이다.

      ### 할 일
      대상 호스트에 유출 채널 포트 52525를 연다.
      ```bash
      nohup ncat -lk 52525 >/dev/null 2>&1 &
      ```

      ### 채점 방법
      대상 호스트에서 포트 52525가 listening인지로 채점.

      ### 합격 기준
      대상 호스트에서 포트 52525가 listening이다.
    hint: "ncat -lk 52525 (유출 채널). 채점: port_listening 52525."
    verify:
      type: "port_listening"
      expect: "52525"
      checks:
        - { id: "red-2-1", type: "port_listening", target: "web", params: { port: 52525 } }
      semantic:
        intent: "T1041/T1074 — 데이터 스테이징/유출 채널. DLP/유출 탐지 표적."
        success_criteria:
          - "포트 52525 listening"
          - "스테이징→유출 경로 서술"
        acceptable_methods:
          - "ncat 채널 / 대용량 전송 모사"
        negative_signs:
          - "채널 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 [Identify] — UEBA 관점 비정상 식별

      ### 상황
      **UEBA**(User & Entity Behavior Analytics) 관점으로 비정상을 식별한다. 평소 baseline 대비 새
      계정/권한 상승/비정상 시간 접근/대용량 전송 등 행위 이탈을 찾는다.

      ### 할 일
      baseline 대비 새 계정/권한/시간/전송 이탈을 식별한다(권한 남용 계정 insdr12).

      ### 채점 방법
      대상 호스트에 권한 남용 계정(insdr12)이 식별되는지로 채점.

      ### 합격 기준
      `/etc/passwd`에 `insdr12`가 있고 비정상으로 식별했다.
    hint: "baseline 대비 새 계정/권한/시간/전송 이탈. 채점: file_contains passwd insdr12."
    verify:
      type: "file_contains"
      expect: "insdr12"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "insdr12" } }
      semantic:
        intent: "UEBA — baseline 대비 행위 이탈(새 계정/권한 상승/비정상 시간/대용량 전송)로 내부 위협 식별. 채점 핵심은 발견+UEBA 추론(도구 실행 증거 비요구)."
        success_criteria:
          - "권한 남용 계정 식별"
          - "baseline 대비 무엇이 이탈했는지"
          - "내부자 vs 외부 침입 구분"
        acceptable_methods:
          - "osquery users + 접근 로그 baseline 비교(도구보다 발견 핵심)"
        negative_signs:
          - "외부 침입 기준으로만 봄(내부자 특성 무시)"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [Hunt] — 권한 남용 + 유출 흔적 헌팅

      ### 상황
      권한 남용의 전모를 헌팅한다. 추가된 계정/SSH 키/sudo 권한, 데이터 스테이징/유출 채널(52525),
      접근한 민감 자원을 모두 찾는다.

      ### 할 일
      계정/SSH키/sudo/유출채널을 전수 헌팅한다.

      ### 채점 방법
      대상 호스트에 유출 채널(52525) 또는 권한 남용 계정(insdr12)이 헌팅되는지로 채점.

      ### 합격 기준
      포트 52525 listening 또는 `/etc/passwd`에 insdr12.
    hint: "계정/SSH키/sudo/유출채널 전수 헌팅. 채점: port_listening 52525 + file_contains passwd insdr12."
    verify:
      type: "port_listening"
      expect: "52525"
      checks:
        - { id: "blue-2-1", type: "port_listening", target: "web", params: { port: 52525 } }
        - { id: "blue-2-2", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "insdr12" } }
      semantic:
        intent: "권한 남용 헌팅 — 계정/SSH키/sudo/유출채널/민감자원 전수. 채점 핵심은 발견+전수조사(도구 실행 증거 비요구)."
        success_criteria:
          - "유출 채널 + 권한 남용 흔적 확인"
          - "계정/키/권한/채널/접근 전수 점검"
          - "유출 데이터 범위 추정"
        acceptable_methods:
          - "osquery 계정/키/sudo + 네트워크 채널 헌팅(도구보다 전수 조사 핵심)"
        negative_signs:
          - "일부만 확인 / 유출 범위 미추정"

  - order: 3
    assess_target: self
    target_vm: ips
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [Contain] — 유출 채널 격리 (sid 9512001)

      ### 상황
      데이터 유출 채널을 격리한다. Suricata `local.rules`에 유출 포트 차단(drop)룰(**sid 9512001**)을
      작성한다. 단, 내부 위협은 증거 보전(chain of custody)이 중요하므로 데이터는 보존한다.

      ### 할 일
      ```
      drop tcp any any -> any 52525 (msg:"IR W12 contain exfil channel"; sid:9512001; rev:1;)
      ```
      작성 후 reload한다.

      ### 채점 방법
      ips의 `local.rules`에 sid 9512001 격리 룰이 있는지로 확인.

      ### 합격 기준
      local.rules에 9512001 룰이 있다.
    hint: "local.rules에 유출채널 차단룰(sid 9512001) → reload."
    verify:
      type: "file_contains"
      expect: "9512001"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9512001" } }
      semantic:
        intent: "IR Contain(내부) — 유출 채널 격리(drop). 증거 보전(chain of custody)하며 데이터 보존."
        success_criteria:
          - "local.rules에 sid 9512001 차단룰"
          - "유출 채널 차단 + 증거 보전"
          - "내부 위협 특유의 데이터 보존 고려"
        acceptable_methods:
          - "local.rules drop / 방화벽 차단"
        negative_signs:
          - "증거 파괴(데이터 즉시 삭제)"

  - order: 4
    assess_target: self
    target_vm: web
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 [Eradicate+Recover] — 비인가 접근 제거 + 복구

      ### 상황
      비인가 계정/SSH 키/권한/유출 채널을 모두 제거하고 정상 상태로 복구한다. 권한 검토(최소 권한)로
      재발을 방지한다.

      ### 할 일
      비인가 접근을 전수 제거하고 apache를 복구한다.

      ### 채점 방법
      web 서버(Apache)가 정상 가동 중인지로 채점.

      ### 합격 기준
      web의 apache2가 running이다.
    hint: "비인가 계정/키/권한/채널 제거 + apache 복구. 채점: process_running web apache2."
    verify:
      type: "process_running"
      expect: "apache"
      checks:
        - { id: "blue-4-1", type: "process_running", target: "web", params: { name: "apache2" } }
      semantic:
        intent: "IR Eradicate+Recover(내부) — 비인가 접근 전수 제거 + 정상 복구 + 최소 권한 재검토."
        success_criteria:
          - "apache2 가동(복구)"
          - "계정/키/권한/채널 전수 제거"
          - "최소 권한 원칙 재적용"
        acceptable_methods:
          - "비인가 접근 제거 + 권한 검토"
        negative_signs:
          - "일부 잔존 / 권한 재검토 누락"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 [Report] — 내부 위협 IR 보고서 (증거 보전·법무 협업)

      ### 상황
      사고를 타임라인으로 정리하되, 내부 위협 특유의 **증거 보전(chain of custody)**과 HR/법무 협업,
      개인정보 처리 주의를 포함한 보고서를 작성한다.

      ### 할 일
      증거 보전+HR/법무 협업+개인정보 주의를 포함한 내부위협 IR 보고서를 작성한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 보고서(제출)로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 보고서는 제출로 검증).
    hint: "내부위협 IR 보고서(증거보전+HR/법무+개인정보). 채점: wazuh_alert + 보고서 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "내부 위협 IR 보고서 — 타임라인 + 증거 보전(chain of custody) + HR/법무 협업 + 개인정보 주의."
        success_criteria:
          - "경보 수집 확인"
          - "타임라인 + 유출 범위 + 근본 원인"
          - "증거 보전 + HR/법무 협업 + 개인정보 처리"
        acceptable_methods:
          - "내부 위협 IR 보고서 작성"
        negative_signs:
          - "증거 보전 절차 누락 / 법무·HR 협업 미고려"
