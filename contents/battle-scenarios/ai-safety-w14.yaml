id: "ai-safety-w14"
category: "ai-safety"
title: "[AI안전 W14] AI Safety 평가 프레임워크: 평가 갭 분석 vs 안전 측정·비교·추적"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  AI 안전 평가 공방전 — 안전을 **측정·비교·추적**하는 프레임워크를 설계·분석한다. 평가 방법론은
  **설계·분석형**이다(semantic 채점).
  ▸ 모드 solo/duel. 윤리: 인가 대상만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 평가 갭·측정 함정 분석

      기존 안전 평가의 **갭·함정**을 분석한다: 단일 지표 의존·벤치마크 과적합·측정 회피·정적 벤치마크의
      한계(신규 공격 미반영).

      ### ✅ 합격 기준
      최소 3가지 평가 갭/함정(단일 지표·과적합·정적 한계 등)을 분석하고 왜 안전을 오판하게 하는지 설명한다.
    hint: "단일 지표·벤치마크 과적합·측정 회피·정적 한계 3+ 평가 함정 분석 + 오판 원인."
    verify:
      type: "semantic"
      expect: "eval_gap"
      semantic:
        intent: "평가 갭 분석 — 안전 측정의 함정을 이해."
        success_criteria:
          - "최소 3가지 평가 갭/함정을 분석"
          - "각 함정이 안전을 오판하게 하는 이유를 설명"
          - "(설명) 정적 벤치마크의 한계를 언급"
        acceptable_methods: ["평가 함정 분석"]
        negative_signs: ["함정 3개 미만·막연"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 적대적 평가 관점: 측정을 속이기

      평가자를 속이는 관점(측정 시점만 안전·조건부 발동·평가 데이터 인지)을 분석해 견고한 평가의
      필요성을 도출한다.

      ### ✅ 합격 기준
      측정을 속이는 방법(측정 시점 한정·조건부·평가 인지)을 분석하고 견고한 평가 요건을 제시한다.
    hint: "측정 시점만 안전·조건부 발동·평가 데이터 인지로 평가 속이기 → 견고한 평가 요건 도출."
    verify:
      type: "semantic"
      expect: "eval_gaming"
      semantic:
        intent: "평가 게이밍 — 측정을 속이는 방법으로 견고한 평가 필요성을 도출."
        success_criteria:
          - "측정을 속이는 방법을 분석"
          - "견고한 평가 요건을 제시"
          - "(설명) 동적·적대적 평가의 필요성을 언급"
        acceptable_methods: ["게이밍 분석 + 요건"]
        negative_signs: ["게이밍 방법 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 안전 평가 프레임워크 설계

      **다차원 안전 평가 프레임워크**를 설계한다: 다지표(ASR·거부율·오탐·유해성·프라이버시), 적대적/
      동적 평가, 재현 가능한 벤치마크+레드팀 병행.

      ### ✅ 합격 기준
      다지표·적대적 평가·재현 벤치마크를 갖춘 프레임워크를 제시하고 단일 지표 의존을 피하는 이유를 설명한다.
    hint: "다지표(ASR·거부율·오탐·유해성·프라이버시)+적대적/동적 평가+재현 벤치마크+레드팀 병행. 단일 지표 회피."
    verify:
      type: "semantic"
      expect: "eval_framework"
      semantic:
        intent: "안전 평가 프레임워크 — 다지표·적대적·재현 평가로 안전을 측정."
        success_criteria:
          - "다지표(ASR·거부율·오탐·유해성·프라이버시)를 제시"
          - "적대적/동적 평가를 제시"
          - "재현 벤치마크+레드팀 병행을 제시"
          - "(설명) 단일 지표 의존 회피를 설명"
        acceptable_methods: ["다지표 + 적대적 + 재현"]
        negative_signs: ["단일 지표만", "적대적 평가 없음"]

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 추적·회귀·거버넌스 연계 설계

      안전을 **추적·회귀·거버넌스에 연계**한다: 버전별 안전 메트릭 추적(추이·회귀 탐지), 릴리스 게이트
      (안전 임계 미달 시 차단), 거버넌스 보고 연계.

      ### ✅ 합격 기준
      메트릭 추적·회귀 탐지·릴리스 게이트·거버넌스 연계를 제시하고 "안전을 지속 추적·게이트" 원칙을
      설명한다.
    hint: "버전별 안전 메트릭 추적·회귀 탐지+릴리스 게이트(임계 미달 차단)+거버넌스 보고 연계. '지속 추적·게이트' 원칙."
    verify:
      type: "semantic"
      expect: "safety_tracking"
      semantic:
        intent: "안전 추적·게이트 — 메트릭 추적·회귀·릴리스 게이트로 안전을 유지."
        success_criteria:
          - "버전별 메트릭 추적·회귀 탐지를 제시"
          - "릴리스 게이트(안전 임계)를 제시"
          - "거버넌스 보고 연계를 제시"
          - "(설명) '지속 추적·게이트' 원칙 설명"
        acceptable_methods: ["추적 + 회귀 + 게이트 + 거버넌스"]
        negative_signs: ["추적·게이트 없음"]
