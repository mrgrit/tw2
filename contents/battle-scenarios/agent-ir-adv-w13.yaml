id: "agent-ir-adv-w13"
category: "agent-ir-adv"
title: "[에이전트IR고급 W13] Insider + Agent Weaponization vs 내부자·에이전트 오남용 탐지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  고급 에이전트 IR 공방전 — **내부자가 보안 에이전트를 도구로 무기화**(Agent Weaponization)해 권한
  안에서 은밀히 악용하는 공격과, 내부자·에이전트 오남용 탐지를 다룬다.

  ▸ 채점 특성 — 내부자·에이전트 오남용의 일부는 el34 밖이다. **관측 채점은 대상(el34)에 남는 정찰·
    공격 흔적**으로 하고, Weaponization은 **설계·분석**으로 평가한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(내부자·에이전트 무기화)와 Blue(오남용 탐지)를 모두 수행.
    • duel : Red 학생이 무기화를 설계·실증하고, Blue 학생은 오남용을 탐지한다.

  ▸ 공격 위치 — Red는 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161) 활동(고유 태그).

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (내부자·에이전트 무기화) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 에이전트 권한 오남용 설계

      **인가된 보안 에이전트의 권한**을 내부자가 악용하는 경로를 설계하고, 대상에 활동 흔적(고유 태그)을 남긴다.

      ### 무엇을
      - 에이전트가 가진 조회·실행 권한을 정상 업무로 위장해 민감 데이터 접근·수집.
      - 프롬프트/명령으로 에이전트를 유도(합법 요청처럼)해 정책 경계를 조금씩 넘기.

      ### 권장 명령 (참고)
      ```bash
      curl -A 'auto-red-<학번>-insider' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 에이전트 권한을 정상 업무로 위장해 오남용하는 경로를 설계한다.
    hint: "활동 흔적(태그)+에이전트 조회·실행 권한을 정상 업무 위장해 민감 접근·정책 경계 넘기 설계. 채점=대상 ModSec 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "aia-13-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          에이전트 권한 오남용 — 인가된 에이전트를 정상 위장해 권한 안에서 악용하는 경로를 설계.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "에이전트 권한 오남용(정상 위장·경계 넘기)을 설계"
          - "(설명) 권한 안 악용이 탐지 어려움을 언급"
        acceptable_methods:
          - "활동 흔적 + 권한 오남용 설계"
        negative_signs:
          - "탐지 흔적 없음"
          - "오남용 설계 막연"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 에이전트 무기화·은폐 킬체인 설계

      정찰 활동(고유 태그)으로 흔적을 남기고, **에이전트를 공격 도구로 무기화**하는 킬체인을 설계한다.

      ### 무엇을
      - 에이전트에 악성 Playbook/스킬 주입·자동화 남용(대량 수집·유출을 에이전트가 수행).
      - 은폐: 정상 업무 로그에 섞기·감사 우회 시도·소량 분산.

      ### ✅ 합격 기준
      대상에 활동 흔적을 남기고, 에이전트 무기화(악성 Playbook·자동화 남용)와 은폐 킬체인을 설계한다.
    hint: "정찰(태그)+악성 Playbook/스킬 주입·자동화 남용(대량 수집·유출)+정상 로그에 섞기·감사 우회 은폐. 채점=대상 Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "aia-13-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          에이전트 무기화 — 악성 Playbook·자동화 남용으로 에이전트를 공격 도구화하고 은폐하는 킬체인.
        success_criteria:
          - "대상 IPS(Suricata)에 활동 흔적이 남고 고유 태그로 귀속됨"
          - "에이전트 무기화·은폐 킬체인을 설계"
          - "(설명) 신뢰된 도구의 오남용 위험을 설명"
        acceptable_methods:
          - "활동 흔적 + 무기화 킬체인"
        negative_signs:
          - "탐지 흔적 없음"
          - "킬체인 막연"

# ───────────────────────── BLUE (내부자·에이전트 오남용 탐지) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 오남용 탐지: 행위 기준·이상 설계

      대상 SIEM/IPS에서 RED 흔적을 탐지하고, **내부자·에이전트 오남용 탐지 신호**를 설계한다.

      ### 어떻게
      - Wazuh/Suricata에서 RED 활동 확인.
      - 신호(개념): 정상 대비 이례적 접근량·시간·범위(UEBA)·에이전트 행동 이탈·대량 조회/유출·
        정책 경계 접근·감사 이상.

      ### ✅ 합격 기준
      RED 활동을 탐지하고, 행위 기준(UEBA)·에이전트 행동 이탈·대량 접근 이상 신호를 설계한다.
    hint: "Wazuh/Suricata RED 흔적+UEBA(이례적 접근량·시간·범위)·에이전트 행동 이탈·대량 조회/유출·감사 이상 신호 설계."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "aia-13-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          오남용 탐지 — UEBA·에이전트 행동 이탈·대량 접근으로 내부자/무기화를 탐지.
        success_criteria:
          - "Wazuh/Suricata에서 RED 활동을 탐지"
          - "UEBA·에이전트 행동 이탈·대량 접근 신호를 설계"
          - "(설명) 권한 안 악용 탐지의 어려움을 언급"
        acceptable_methods:
          - "SIEM 탐지 + UEBA/행동 이탈 신호"
        negative_signs:
          - "경보 근거 없음"
          - "행위 기준 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 내부자·에이전트 거버넌스 설계

      내부자·에이전트 무기화를 막는 **거버넌스·통제**를 설계한다.

      ### 무엇을
      - **최소 권한·분리**: 에이전트/사용자 최소 권한·직무 분리·이중 승인(민감 행동).
      - **에이전트 통제**: Playbook/스킬 서명·변경 통제·행동 경계(가드레일)·감사 무결성.
      - **UEBA·모니터링**: 행위 기준·이상 경보·대량 접근 제한.
      - **문화·프로세스**: 내부자 위협 프로그램·퇴사자 통제·최소 신뢰.

      ### ✅ 합격 기준
      최소 권한·에이전트 통제(서명·가드레일·감사)·UEBA·내부자 프로그램을 제시하고 "신뢰된 도구·내부자도
      통제·감사" 원칙을 설명한다.
    hint: "최소 권한·직무 분리·이중 승인+Playbook/스킬 서명·변경 통제·가드레일·감사+UEBA·대량 접근 제한+내부자 위협 프로그램. '신뢰도 통제·감사' 원칙."
    verify:
      type: "semantic"
      expect: "insider_agent_governance"
      semantic:
        intent: |
          내부자·에이전트 거버넌스 — 최소 권한·에이전트 통제·UEBA·프로그램으로 무기화를 막는다.
        success_criteria:
          - "최소 권한·직무 분리·이중 승인을 제시"
          - "에이전트 통제(서명·가드레일·감사)를 제시"
          - "UEBA·내부자 프로그램을 제시하고 원칙 설명"
        acceptable_methods:
          - "최소 권한 + 에이전트 통제 + UEBA + 프로그램"
        negative_signs:
          - "과도한 신뢰 유지"
          - "에이전트 통제·감사 없음"
