id: "aisec-w04"
category: "aisec"
title: "[AI에이전트보안 W4] 하네스 7대 구성요소 결함 악용 vs harness engineering 설계"
difficulty: "medium"
time_limit: 2400
battle_type: "1v1"
description: |
  에이전트 하네스 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). 하네스의 **7대 구성요소**(입력 검증·컨텍스트 조립·정책/가드레일·도구
  게이트·출력 검증·감사·상태/메모리)와 harness engineering을 이해하고, 결함 악용과 설계를 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(하네스 결함 악용)와 Blue(harness engineering 설계)를 모두 수행.
    • duel : Red 학생이 하네스 결함을 악용하고, Blue 학생이 설계로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion으로 수행. 채점은
    **명령 흔적(command_ran)** + **보고서 증거·설계**로 판정.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 하네스 구성요소 결함 악용

      7대 구성요소 중 **결함(입력 검증·도구 게이트·출력 검증 부재)** 을 악용한다.

      ### ✅ 합격 기준
      최소 2개 구성요소 결함(입력·게이트·출력)을 실제 호출로 악용하고 어느 구성요소가 없었는지 매핑한다.
    hint: "입력 검증·도구 게이트·출력 검증 부재 중 2+ 악용·실제 호출+없는 구성요소 매핑. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-4-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          하네스 결함 악용 — 부재한 구성요소를 통해 오남용이 통함을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 /api 호출 흔적이 남음"
          - "최소 2개 구성요소 결함을 악용"
          - "(설명) 없는 구성요소를 매핑"
        acceptable_methods:
          - "구성요소 결함 악용 + 매핑"
        negative_signs:
          - "명령 흔적·매핑 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 상태·메모리 오염 분석

      하네스의 **상태/메모리** 구성요소 오염(컨텍스트 오염·세션 혼입)을 분석한다.

      ### ✅ 합격 기준
      상태/메모리 오염 위험을 실제 관찰과 함께 분석하고 하네스에서의 위치를 매핑한다.
    hint: "상태/메모리 오염(컨텍스트 오염·세션 혼입) 관찰·분석+하네스 구성요소 매핑."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-4-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          상태·메모리 오염 — 컨텍스트/세션 오염이 하네스의 한 구성요소 결함임을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "상태/메모리 오염 위험을 관찰·분석"
          - "(설명) 하네스 구성요소로 매핑"
        acceptable_methods:
          - "상태/메모리 오염 분석"
        negative_signs:
          - "관찰 없이 서술만"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 — 하네스 구성요소 진단

      우리 에이전트의 **7대 구성요소 유무**를 진단한다.

      ### ✅ 합격 기준
      입력·컨텍스트·정책·게이트·출력·감사·상태 각 구성요소 유무를 증거로 진단한다.
    hint: "7대 구성요소(입력·컨텍스트·정책·게이트·출력·감사·상태) 유무 증거 진단."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-4-3", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          하네스 구성요소 진단 — 7대 구성요소 유무를 증거로 식별.
        success_criteria:
          - "본인 인프라 명령 로그에 진단 호출 흔적이 남음"
          - "7대 구성요소 유무를 진단"
          - "(설명) 부재 구성요소를 식별"
        acceptable_methods:
          - "구성요소 점검"
        negative_signs:
          - "증거 없이 서술만"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-2 — harness engineering 설계

      **7대 구성요소를 갖춘 하네스**를 설계한다.

      ### 무엇을
      - 입력 검증·컨텍스트 조립(격리)·정책/가드레일·도구 게이트·출력 검증·감사·상태/메모리 위생.
      - 각 구성요소가 어떤 위협을 막는지 매핑, harness engineering 원칙(결정론 골격에 LLM 자율성).

      ### ✅ 합격 기준
      7대 구성요소를 갖춘 하네스를 설계하고 각 구성요소를 위협에 매핑하며 harness engineering 원칙을 설명한다.
    hint: "7대 구성요소(입력·컨텍스트·정책·게이트·출력·감사·상태) 설계+위협 매핑+harness engineering 원칙."
    verify:
      type: "semantic"
      expect: "harness_engineering"
      semantic:
        intent: |
          harness engineering — 7대 구성요소로 LLM을 안전하게 감싸는 결정론적 골격을 설계.
        success_criteria:
          - "7대 구성요소를 갖춘 하네스를 제시"
          - "각 구성요소를 위협에 매핑"
          - "(설명) harness engineering 원칙을 설명"
        acceptable_methods:
          - "7대 구성요소 + 위협 매핑"
        negative_signs:
          - "구성요소 누락"
          - "위협 매핑 없음"
