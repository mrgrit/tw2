id: "attack-adv-w14"
category: "attack-adv"
title: "[공격고급 W14] 종합 모의해킹 — 풀 킬체인 침투 vs 종합 탐지·CVSS 평가"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  공격 고급과정 14주차 — **종합 모의해킹**. 1~13주 기법을 하나의 engagement 로 통합한다: 정찰 → 웹 취약점 →
  초기 접근 → 권한상승 → 측면이동 → 유출, 그리고 CVSS 평가와 공격 체인 다이어그램. Red 는 풀 킬체인을
  수행하고, Blue 는 전 단계를 탐지하고 위험을 평가한다.

  ▸ 이야기
    공격자가 태그 `aa14r1` 로 정찰·침투하고, 권한상승·측면이동으로 데이터 유출 발판(loot `/tmp/.aa14loot`)과 계정
    `atka14` 를 확보한다. 방어자는 침투를 탐지하고, 발견 취약점을 CVSS 로 평가하며 우선순위 방어 권고를 낸다.

  ▸ 모드
    • solo : 한 학생이 모의해킹(자기 인프라 표적)과 종합 탐지를 모두. 대상 = 본인 인프라.
    • duel : Red 가 상대(Blue) 인프라에 풀 킬체인, Blue 는 자기 인프라에서 종합 대응.

  ▸ 공격자 위치(중요)
    이 주차의 Red 미션은 **망 외부 공격자 VM(192.168.0.202)** 기준이다. el34 는 공격자의 출처 IP를
    fw→ips→web(WAF) 전 계층에 그대로 보존하므로(HAProxy 제거·NAT 출처소실 없음), Red 채점은 **대상
    (el34) 인프라에 남은 탐지 흔적**(WAF audit / IPS / 호스트 계정·포트)과 **출처 IP(192.168.0.202)·
    고유 태그 상관**으로 한다. 반드시 **고유 태그**를 붙여 앰비언트 노이즈와 구분되게 한다.

  ▸ 이번 주차 전용 마커
    공격 태그 **`aa14r1-<본인id>`**, 유출 loot **`/tmp/.aa14loot`**(마커 `aa14`), 계정 **`atka14`**,
    Suricata 탐지 **sid 9714011**, Wazuh 탐지 **id 103141**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [정찰 → 초기 접근] — 풀 킬체인 진입

      ### 상황
      모의해킹의 시작이다. 정찰로 표면을 파악하고(범위/제한 준수), 발견한 웹 취약점으로 초기 접근을 확보한다.
      태그 `aa14r1-<본인id>` 로 침투를 표시한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      예시(id=kim):
      ```bash
      nmap -sV -Pn -p 80,443,3000 192.168.0.161           # 정찰(참고)
      curl -s -A "aa14r1-kim-pentest" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/vulnerabilities/sqli/?id=aa14r1-kim%27%20UNION%20SELECT%20user,password%20FROM%20users--+&Submit=Submit"
      ```

      ### 채점 방법
      대상 WAF audit(modsec)에 태그 `aa14r1` 가 포함된 침투 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit 에 `aa14r1` 태그가 포함된 침투 탐지가 남는다.
    hint: "정찰 + 태그(aa14r1) 침투 → 대상 modsec audit. 채점: log_contains modsec aa14r1."
    verify:
      type: "log_contains"
      expect: "aa14r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "aa14r1", since_sec: 1800 } }
      semantic:
        intent: "모의해킹 정찰→초기 접근(T1595→T1190). 범위 준수 + 태그(aa14r1) 귀속. 풀 킬체인 진입."
        success_criteria:
          - "대상 WAF audit 에 aa14r1 태그가 포함된 침투 탐지"
          - "정찰 결과와 침투 벡터 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202) 정찰 + 태그 침투"
        negative_signs:
          - "태그 누락 / 대상 미도달"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [권한상승→측면이동→유출] — 목표 달성 발판

      ### 상황
      초기 접근 후 권한상승·측면이동으로 민감 데이터를 모아 유출 발판 **`/tmp/.aa14loot`**(마커 `aa14`)을 만들고
      계정 **`atka14`** 으로 지속성을 둔다(킬체인 목표 달성).

      ### 할 일
      ```bash
      cat /etc/passwd /etc/hostname > /tmp/.aa14loot 2>/dev/null; echo 'aa14 loot' >> /tmp/.aa14loot
      sudo useradd -m -s /bin/bash atka14
      ```

      ### 채점 방법
      대상 호스트에 `/tmp/.aa14loot`(마커 `aa14`)이 있거나 `/etc/passwd` 에 `atka14` 이 있는지로 채점.

      ### 합격 기준
      `/tmp/.aa14loot`(마커 `aa14`) 또는 계정 `atka14`.
    hint: "유출 loot /tmp/.aa14loot (마커 aa14) + useradd atka14. 채점: file_contains loot aa14 + file_contains passwd atka14."
    verify:
      type: "file_contains"
      expect: "aa14"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.aa14loot", pattern: "aa14" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "atka14" } }
      semantic:
        intent: "권한상승→측면이동→유출(T1548/T1078/T1074) + 계정(T1136) — 킬체인 목표 달성."
        success_criteria:
          - "/tmp/.aa14loot(마커 aa14) 또는 계정 atka14"
          - "권한상승·측면이동·유출 경로 서술"
        acceptable_methods:
          - "loot 파일 + useradd"
        negative_signs:
          - "흔적 미생성"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [침투 탐지] — Suricata 룰 (sid 9714011)

      ### 상황
      모의해킹 침투를 잡는 Suricata 룰(**sid 9714011**)을 배포한다.

      ### 할 일
      ```
      alert http any any -> any any (msg:"ATKADV-W14 pentest SQLi UNION"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9714011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```

      ### 채점 방법
      ips 의 `local.rules` 에 sid 9714011 룰이 있는지로 확인.

      ### 합격 기준
      `local.rules` 에 침투를 보는 sid 9714011 룰이 존재한다.
    hint: "침투 Suricata 룰(sid 9714011, UNION SELECT) → reload. 채점: file_contains local.rules 9714011."
    verify:
      type: "file_contains"
      expect: "9714011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9714011" } }
      semantic:
        intent: "모의해킹 탐지(네트워크) — 침투 단계 Suricata 룰. 풀 킬체인 조기 가시화."
        success_criteria:
          - "local.rules 에 sid 9714011"
          - "침투 단계 탐지 명시"
        acceptable_methods:
          - "Suricata 룰 작성 + reload"
        negative_signs:
          - "패턴 부정확 / 문법 오류"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 22
    instruction: |
      ## 🛡️ BLUE-2 [권한상승/유출 탐지] — Wazuh 룰 (id 103141)

      ### 상황
      RED-2 의 권한상승·유출·계정 생성을 잡는 Wazuh 룰(**id 103141**)을 배포한다.

      ### 할 일
      ```xml
      <group name="edu,pentest,">
        <rule id="103141" level="13">
          <if_group>edu</if_group>
          <match>atka14</match>
          <description>ATKADV-W14 - pentest post-exploitation: privesc/exfil/account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```

      ### 채점 방법
      `local_rules.xml` 에 id 103141 룰이 있는지로 확인.

      ### 합격 기준
      `local_rules.xml` 에 후속 공격을 보는 id 103141 룰이 존재한다.
    hint: "권한상승/유출/계정 Wazuh 룰(id 103141) → restart. 채점: file_contains local_rules.xml 103141."
    verify:
      type: "file_contains"
      expect: "103141"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "103141" } }
      semantic:
        intent: "모의해킹 탐지(호스트) — 후속 공격(권한상승/유출/계정) Wazuh 룰. 목표 달성 단계 포착."
        success_criteria:
          - "local_rules.xml 에 rule id 103141"
          - "후속 공격 탐지 로직"
        acceptable_methods:
          - "Wazuh 룰 작성 + restart"
        negative_signs:
          - "탐지 로직 부실 / XML 오류"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [CVSS·공격 체인·권고] — 위험 평가 종합

      ### 상황
      발견 취약점을 **CVSS v3.1** 로 평가하고, 초기 접근→목표 달성까지 **공격 체인 다이어그램**을 그리고, 단기/
      중기/장기 **방어 권고**를 우선순위화한다.

      ### 할 일
      보고서에:
      - 상위 취약점 CVSS 점수/벡터 + 공격 체인 다이어그램(텍스트)
      - 단기/중기/장기 방어 권고 + loot(`/tmp/.aa14loot`)·계정(atka14) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```

      ### 채점 방법
      본인 SIEM 에 최근 경보가 수집돼 있는지 + 제출한 CVSS/공격 체인/권고로 채점.

      ### 합격 기준
      본인 SIEM 에 최근 경보가 있다(+ CVSS·공격 체인·방어 권고·헌팅은 제출로 검증).
    hint: "CVSS v3.1 평가 + 공격 체인 다이어그램 + 단/중/장기 방어 권고 + loot/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "모의해킹 위험 평가 — CVSS + 공격 체인 + 우선순위 권고 + 헌팅. 분석형 — CVSS 벡터/체인 구체 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "상위 취약점 CVSS 점수/벡터 + 공격 체인 다이어그램"
          - "단/중/장기 방어 권고 + loot/계정 헌팅"
        acceptable_methods:
          - "CVSS 표 + 체인 + 권고 + 헌팅"
        negative_signs:
          - "CVSS/체인/권고 누락"
