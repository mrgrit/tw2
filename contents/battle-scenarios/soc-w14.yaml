id: "soc-w14"
category: "soc"
title: "[SOC관제 W14] 야간 근무는 잠들지 않는다 — AI 자율 관제와 Active Response로 자동 대응"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  사람이 24시간 모든 경보를 볼 수는 없다. **자동화 관제**는 그 공백을 메운다 — **AI 기반 자율 보안
  관제**(Bastion Agent Daemon: explore 상황 탐색 / daemon 상시 감시 / stimulate 자극 테스트)와
  **Active Response**(자동 차단)로 탐지→대응을 무인으로 돌린다. 공격이 들어오면 룰이 탐지하고 Active
  Response가 출발지를 즉시 차단하며, 자율 에이전트가 상황을 분석한다. 분석가는 자동화를 **구성·검증**
  하고 **장점과 한계**를 안다.

  ▸ 이야기
    공격자가 반복 공격을 한다. 분석가(너)는 자동 탐지룰과 Active Response를 구성해, 사람이 없는 시간에도
    탐지→자동 차단이 도는지 stimulate로 검증한다.

  ▸ 모드: solo(공격자→자동화 관제자) / duel(상대 공격→본인 자동화 대응). 대상=solo 본인 / duel 상대.

  ▸ 알아둘 점 — Red 채점은 대상 WAF audit(태그)으로. 자동 탐지룰 `local_rules.xml`(id **101414**),
    Active Response는 manager `ossec.conf`. 웹공격 태그 **`au14r1-<id>`**.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 공격 (자동 탐지→대응 트리거)

      ### 상황
      스캐너/공격을 보내 자동 탐지룰을 트리거한다. Active Response의 자동 차단 대상이 된다.

      ### 할 일
      이 미션 전용 태그 `au14r1-<id>`를 붙여 sqlmap UA로 공격한다.
      ```bash
      curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
        "http://192.168.0.161/?id=au14r1-kim-1"
      ```

      ### 채점 방법
      대상 WAF audit에 (au14r1 태그 포함) 공격 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 au14r1 태그가 포함된 공격 탐지가 남는다.
    hint: "태그(au14r1) sqlmap UA. 채점: 대상 modsec audit의 scanner + 태그."
    verify:
      type: "log_contains"
      expect: "scanner"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "au14r1", since_sec: 1800 } }
      semantic:
        intent: "자동 대응 트리거 — 탐지룰을 트리거하는 공격. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (au14r1 태그 포함) 공격 탐지(최근)"
          - "어떤 행위가 자동 대응을 유발하는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 태그 붙인 sqlmap/스캔"
        negative_signs:
          - "대상 미도달 / 태그 누락"

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 — 반복 공격 (auto-block 검증 표적)

      ### 상황
      동일 공격을 반복해 자동 차단(Active Response)이 작동해야 할 상황을 만든다.

      ### 할 일
      태그 `au14r1-<id>`를 붙여 같은 공격을 반복한다.
      ```bash
      for i in 1 2 3 4 5; do curl -s -A "sqlmap/1.7" -H "Host: dvwa.el34.lab" \
        "http://192.168.0.161/?id=au14r1-kim-rep$i"; done
      ```

      ### 채점 방법
      대상 WAF audit에 (au14r1 태그 포함) 반복 공격 탐지가 남았는지로 채점.

      ### 합격 기준
      대상 WAF audit에 au14r1 태그가 포함된 반복 공격 탐지가 남는다.
    hint: "태그(au14r1) 반복 sqlmap. 채점: 대상 modsec audit + 태그."
    verify:
      type: "log_contains"
      expect: "au14r1"
      checks:
        - { id: "red-2-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "au14r1", since_sec: 1800 } }
      semantic:
        intent: "반복 공격 — auto-block 검증 표적. 대상 WAF audit으로 판정. 태그 귀속."
        success_criteria:
          - "대상 WAF audit에 (au14r1 태그 포함) 반복 공격 탐지"
          - "빈도가 자동 차단을 어떻게 유발하는지 서술"
        acceptable_methods:
          - "외부 공격자 VM(192.168.0.202)에서 태그 붙인 반복 공격"
        negative_signs:
          - "대상 미도달 / 태그 누락"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — Bastion Agent Daemon 이해 (explore/daemon/stimulate)

      ### 상황
      AI 자율 보안 관제 개념을 이해한다. Bastion Agent Daemon의 **explore**(상황 탐색), **daemon**(상시
      감시), **stimulate**(자극 테스트) 기능과, 사람 관제 대비 자동화의 위치를 파악한다.

      ### 할 일
      explore/daemon/stimulate 각 기능과 사람-자동화 역할 분담을 정리한다.

      ### 채점 방법
      Wazuh에 경보(자율 에이전트 분석 대상)가 있는지 + 개념(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 개념은 제출로 검증).
    hint: "Bastion Agent Daemon explore/daemon/stimulate 이해. 채점: wazuh_alert + 개념 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "AI 자율 관제 — explore/daemon/stimulate. 사람 관제와 자동화의 역할 분담."
        success_criteria:
          - "경보 수집 확인"
          - "explore/daemon/stimulate 각 기능"
          - "사람 vs 자동화 역할 분담"
        acceptable_methods:
          - "Bastion Agent Daemon 기능 설명"
        negative_signs:
          - "자동화의 한계 무시(맹신)"

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자동 탐지룰 (id 101414, Active Response 연계)

      ### 상황
      자동 대응을 유발할 탐지룰(**id 101414**)을 `local_rules.xml`에 작성한다. 이 룰이 트리거되면 Active
      Response가 작동하도록 level/rule id를 Active Response와 연계한다.

      ### 할 일
      `local_rules.xml`에 트리거 룰을 추가하고 `wazuh-control restart`한다.
      ```xml
      <group name="edu,web,">
        <rule id="101414" level="10">
          <if_group>web|ids</if_group>
          <match>sqlmap</match>
          <description>EDU W14 - auto-response trigger</description>
        </rule>
      </group>
      ```

      ### 채점 방법
      `local_rules.xml`에 id 101414 트리거 룰이 있는지로 확인.

      ### 합격 기준
      local_rules.xml에 101414 룰이 있다.
    hint: "local_rules.xml에 트리거 룰(id 101414) + Active Response 연계 → restart."
    verify:
      type: "file_contains"
      expect: "101414"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "101414" } }
      semantic:
        intent: "자동 탐지→대응 연계 — 트리거 룰의 level/id를 Active Response와 매핑. 탐지가 곧 대응으로."
        success_criteria:
          - "local_rules.xml에 rule id 101414"
          - "Active Response와 level/id 매핑"
          - "탐지→자동 대응 흐름 서술"
        acceptable_methods:
          - "local_rules.xml 101414 + AR 연계 + restart"
        negative_signs:
          - "AR 연계 없는 단순 탐지룰"

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — Active Response 자동 차단 설정

      ### 상황
      manager `ossec.conf`의 `<active-response>`+`<command>`로 자동 차단(firewall-drop)을 구성한다.
      무한 차단/오탐 차단을 막는 timeout·화이트리스트도 설계한다.

      ### 할 일
      ossec.conf의 active-response 설정을 점검(또는 추가)하고, command/timeout/화이트리스트 설계를 서술한다.

      ### 채점 방법
      siem의 ossec.conf에 active-response 설정이 있는지로 채점.

      ### 합격 기준
      ossec.conf에 active-response 설정이 있다.
    hint: "ossec.conf <active-response>+<command>(firewall-drop)+timeout. 채점: file_contains ossec.conf active-response."
    verify:
      type: "file_contains"
      expect: "active-response"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/ossec.conf", pattern: "active-response" } }
      semantic:
        intent: "Active Response — 자동 차단(firewall-drop) + timeout/화이트리스트로 오탐 차단·무한 차단 방지."
        success_criteria:
          - "ossec.conf에 active-response"
          - "command(firewall-drop) + timeout"
          - "오탐 차단/화이트리스트 예외"
        acceptable_methods:
          - "active-response/command 설정"
        negative_signs:
          - "timeout/예외 없이 무한 차단(자가 DoS 위험)"

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — 자극 테스트(stimulate)로 auto-block 검증

      ### 상황
      Bastion의 stimulate 또는 직접 공격 재현으로 자동 차단을 검증한다. 공격 → 탐지 → Active Response
      차단 → active-responses.log 기록의 전 흐름이 자동으로 도는지 확인한다.

      ### 할 일
      stimulate/공격 재현으로 자동 차단 + active-responses.log를 확인한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 자동 흐름 검증(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 최근 경보가 수집돼 있다.
    hint: "stimulate/공격 재현 → 자동 차단 + active-responses.log. 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "자동화 검증 — 공격→탐지→AR 차단→로그의 자동 흐름. stimulate로 안전하게 검증."
        success_criteria:
          - "경보 수집 확인"
          - "자동 차단 + active-responses.log 기록"
          - "탐지→대응 무인 동작"
        acceptable_methods:
          - "stimulate / 공격 재현 후 AR 로그 확인"
        negative_signs:
          - "자동 흐름 미검증"

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — 자동화 장점/한계 분석

      ### 상황
      자동 관제의 장점(속도/24시간/일관성)과 한계(오탐 차단의 위험, 맥락 부재, 정교한 공격 회피)를
      분석하고, 사람-자동화 협업(HITL) 운영안을 제시한다.

      ### 할 일
      자동화 장점/한계 + HITL 협업 운영안을 정리한다.

      ### 채점 방법
      Wazuh에 경보가 있는지 + 분석(제출)으로 채점.

      ### 합격 기준
      본인 SIEM에 경보가 수집돼 있다(+ 분석은 제출로 검증).
    hint: "자동화 장점/한계 + HITL 협업. 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "자동화 성찰 — 장점(속도/상시/일관)과 한계(오탐 차단/맥락 부재/회피). 사람-자동화 협업(HITL)."
        success_criteria:
          - "경보 수집 확인"
          - "장점/한계 균형 분석"
          - "HITL 협업 모델 제시"
        acceptable_methods:
          - "자동화 장단점 분석 + HITL 설계"
        negative_signs:
          - "자동화 맹신 또는 무용론(균형 부재)"
