id: "soc-w14"
category: "soc"
title: "[SOC관제 W14] 공격 vs 자동화 관제(Bastion Agent Daemon·자동 탐지→Active Response 차단)"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  SOC 관제 14주차 — **자동화 관제**. 사람이 24시간 모든 경보를 보지 못하므로, **AI 기반 자율 보안
  관제**(Bastion Agent Daemon: explore/daemon/stimulate)와 **Active Response**(자동 차단)로 탐지→대응을
  자동화한다. 공격이 들어오면 룰이 탐지하고 Active Response 가 출발지를 즉시 차단하며, 자율 에이전트가
  상황을 분석한다. 분석가는 자동화를 구성하고 **자극 테스트(stimulate)** 로 검증하며 장점·한계를 안다.

  ▸ 모드: solo(공격자 → 자동화 관제자) / duel(상대 공격 → 본인 자동화 대응). 대상=solo 본인 / duel 상대.
  ▸ Red 는 **망 외부 공격자(attacker-ext)** — 외부 명령 미수집 → 대상 SIEM/방어층 흔적으로 채점.
  ▸ 자동 탐지룰 `local_rules.xml`(id **9014001**), Active Response 는 manager `ossec.conf` 의
    `<active-response>`+`<command>`.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-1 — 공격 (자동 탐지→대응 트리거)

      스캐너/공격을 보내 자동 탐지룰을 트리거한다. Active Response 의 자동 차단 대상이 된다.

      ### 권장 명령 (참고 — 외부 공격자)
      ```bash
      nikto -h http://<대상_공개IP> -maxtime 60s
      ```
      📌 채점: 외부 명령 미수집 → 대상 Suricata 의 스캔/공격 탐지(자동 대응 트리거).
      ✅ 합격: 대상 IPS 에 스캔 탐지.
    hint: "attacker-ext nikto/스캔. 채점: 대상 Suricata scan."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "ips", params: { log: "suricata", pattern: "scan", since_sec: 1800 } }
      semantic:
        intent: "자동 대응 트리거 — 탐지룰을 트리거하는 공격. 외부 공격자 모델 → 대상 Suricata 흔적으로 판정."
        success_criteria: ["대상 IPS 스캔 탐지", "(설명) 어떤 행위가 자동 대응을 유발하는지"]
        acceptable_methods: ["attacker-ext nikto/스캔/반복 공격"]
        negative_signs: ["대상 미도달", "command_ran(attacker-ext) 의존"]

  - order: 2
    assess_target: opponent
    target_vm: siem
    points: 15
    instruction: |
      ## 🎯 RED-2 — 반복 공격 (auto-block 검증 표적)

      동일 공격을 반복해 자동 차단(Active Response)이 작동해야 할 상황을 만든다.

      ### 권장 명령 (참고)
      ```bash
      for i in $(seq 5); do curl -s -A "sqlmap/1.7" -H "Host: dvwa.6v6.lab" "http://<대상_공개IP>/?id=$i"; done
      ```
      📌 채점: 외부 명령 미수집 → 대상 Wazuh 에 반복 공격 경보.
      ✅ 합격: 대상 SIEM 에 경보가 수집된다.
    hint: "attacker-ext 반복 공격. 채점: 대상 Wazuh 경보."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "red-2-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "반복 공격 — auto-block 검증 표적. 대상 Wazuh 경보로 판정."
        success_criteria: ["대상 Wazuh 경보", "(설명) 빈도가 자동 차단을 어떻게 유발하는지"]
        acceptable_methods: ["attacker-ext 반복 공격"]
        negative_signs: ["대상 경보 없음"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-1 — Bastion Agent Daemon 이해 (explore/daemon/stimulate)

      AI 자율 보안 관제 개념을 이해한다. Bastion Agent Daemon 의 **explore**(상황 탐색), **daemon**
      (상시 감시), **stimulate**(자극 테스트) 기능과, 사람 관제 대비 자동화의 위치를 파악한다.

      📌 채점: 본인 SIEM 에 경보(자율 에이전트 분석 대상)가 수집됐는지.
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "Bastion Agent Daemon explore/daemon/stimulate 이해. 채점: wazuh_alert + 개념 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-1-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "AI 자율 관제 — Bastion Agent Daemon explore/daemon/stimulate. 사람 관제와 자동화의 역할 분담."
        success_criteria: ["경보 수집 확인", "(이해) explore/daemon/stimulate 각 기능", "(위치) 사람 vs 자동화 역할 분담"]
        acceptable_methods: ["Bastion Agent Daemon 기능 설명 + 자율 관제 개념"]
        negative_signs: ["자동화의 한계 무시(맹신)"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자동 탐지룰 작성 (id 9014001, Active Response 연계)

      자동 대응을 유발할 탐지룰(**id 9014001**)을 `local_rules.xml` 에 작성한다. 이 룰이 트리거되면
      Active Response 가 작동하도록 level/rule id 를 Active Response 와 연계한다.

      ### 권장 형태 (참고)
      ```xml
      <rule id="9014001" level="10">
        <if_group>web|ids</if_group>
        <match>sqlmap</match>
        <description>EDU W14 - auto-response trigger</description>
      </rule>
      ```
      📌 채점: local_rules.xml 에 자동 대응 트리거 룰(id 9014001)이 작성됐는지.
      ✅ 합격: local_rules.xml 에 9014001 룰이 있다.
    hint: "local_rules.xml 에 트리거 룰(id 9014001) + Active Response 연계 → restart."
    verify:
      type: "file_contains"
      expect: "9014001"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "9014001" } }
      semantic:
        intent: "자동 탐지→대응 연계 — 트리거 룰의 level/id 를 Active Response 와 매핑. 탐지가 곧 대응으로."
        success_criteria: ["local_rules.xml 에 rule id 9014001", "(연계) Active Response 와 level/id 매핑", "(설명) 탐지→자동 대응 흐름"]
        acceptable_methods: ["local_rules.xml 9014001 + AR 연계 + restart"]
        negative_signs: ["AR 연계 없는 단순 탐지룰"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — Active Response 자동 차단 설정

      manager `ossec.conf` 의 `<active-response>`+`<command>` 로 자동 차단(예: firewall-drop)을
      구성한다. 무한 차단/오탐 차단을 막는 timeout·예외도 설계한다.

      📌 채점: siem 의 ossec.conf 에 active-response 설정이 있는지.
      ✅ 합격: ossec.conf 에 active-response 설정이 있다.
    hint: "ossec.conf <active-response>+<command>(firewall-drop) + timeout/예외. 채점: file_contains ossec.conf active-response."
    verify:
      type: "file_contains"
      expect: "active-response"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/ossec.conf", pattern: "active-response" } }
      semantic:
        intent: "Active Response — 자동 차단(firewall-drop) + timeout/예외로 오탐 차단·무한 차단 방지."
        success_criteria: ["ossec.conf 에 active-response", "(설계) command(firewall-drop) + timeout", "(안전) 오탐 차단/화이트리스트 예외"]
        acceptable_methods: ["active-response/command 설정"]
        negative_signs: ["timeout/예외 없이 무한 차단(자가 DoS 위험)"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 15
    instruction: |
      ## 🛡️ BLUE-4 — 자극 테스트(stimulate)로 auto-block 검증

      Bastion 의 stimulate 또는 직접 공격 재현으로 자동 차단을 검증한다. 공격 → 탐지 → Active Response
      차단 → active-responses.log 기록의 전 흐름이 자동으로 도는지 확인한다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(자동 흐름 검증).
      ✅ 합격: 본인 SIEM 에 최근 경보가 수집돼 있다.
    hint: "stimulate/공격 재현 → 자동 차단 + active-responses.log 확인. 채점: wazuh_alert."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "자동화 검증 — 공격→탐지→AR 차단→로그의 자동 흐름. stimulate 로 안전하게 검증."
        success_criteria: ["경보 수집 확인", "(검증) 자동 차단 + active-responses.log 기록", "(흐름) 탐지→대응 무인 동작"]
        acceptable_methods: ["stimulate / 공격 재현 후 AR 로그 확인"]
        negative_signs: ["자동 흐름 미검증"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — 자동화 장점/한계 분석

      자동 관제의 장점(속도/24시간/일관성)과 한계(오탐 차단의 위험, 맥락 부재, 정교한 공격 회피)를
      분석하고, 사람-자동화 협업(HITL) 운영안을 제시한다.

      📌 채점: 본인 SIEM 에 경보가 수집됐는지(+ 분석은 제출로 검증).
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "자동화 장점/한계 + HITL 협업 운영안. 채점: wazuh_alert + 분석 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "자동화 성찰 — 장점(속도/상시/일관)과 한계(오탐 차단/맥락 부재/회피). 사람-자동화 협업(HITL)."
        success_criteria: ["경보 수집 확인", "(장점/한계) 균형 분석", "(운영안) HITL 협업 모델 제시"]
        acceptable_methods: ["자동화 장단점 분석 + HITL 설계"]
        negative_signs: ["자동화 맹신 또는 무용론(균형 부재)"]
