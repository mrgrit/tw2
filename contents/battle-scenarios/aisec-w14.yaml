id: "aisec-w14"
category: "aisec"
title: "[AI에이전트보안 W14] 프로젝트B: CTF 자동 풀이 에이전트(공격 추론) vs 안전 경계·오남용 방지"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  프로젝트 B 공방전 — 대상은 el34의 훈련용 취약 AI 어시스턴트 **AICompanion**
  (`http://192.168.0.161:8007`). **CTF 자동 풀이(공격 추론) 에이전트**를 만들고, 안전 경계로 오남용을
  방지한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(공격 에이전트로 취약 풀이)와 Blue(안전 경계·오남용 방지)를 모두 수행.
    • duel : Red 학생이 공격 에이전트를 운영하고, Blue 학생이 안전 경계로 대응.

  ▸ 공격 위치·채점 — Red는 본인 인프라(`ssh ccc@{{TARGET_IP}}`)에서 AICompanion을 CTF 표적으로 공격
    에이전트를 실증. 채점은 **명령 흔적(command_ran)** + **보고서 증거·설계**로 판정. ROE 준수.

  ▸ 윤리 — 인가된 훈련 대상(AICompanion)에서만. ROE(인가 범위·PoC·파괴 금지) 준수.

red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 공격 추론 에이전트로 취약 자동 풀이

      **공격 추론 루프**(정찰→취약 식별→악용)로 AICompanion의 취약을 자동 풀이한다.

      ### ✅ 합격 기준
      공격 추론으로 최소 1개 취약을 자동 풀이해 실제 증거(비밀/유출)를 얻고, 추론 단계·ROE를 기록한다.
    hint: "공격 추론(정찰→식별→악용)으로 취약 자동 풀이·실제 증거+단계 기록·ROE 준수. 채점=본인 인프라 명령 흔적."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-14-1", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          공격 추론 자동 풀이 — 공격 에이전트가 취약을 자동 식별·악용하는 능력을 실증.
        success_criteria:
          - "본인 인프라 명령 로그에 다단계 /api 호출 흔적이 남음"
          - "최소 1개 취약을 자동 풀이해 실제 증거를 획득"
          - "(설명) 추론 단계·ROE 준수를 기록"
        acceptable_methods:
          - "공격 추론 자동 풀이"
        negative_signs:
          - "명령 흔적·증거 없음"
          - "ROE 위반"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 공격 에이전트 오남용·안전 경계 분석

      공격 능력을 가진 에이전트의 **오남용 위험**과 안전 경계 필요성을 분석한다.

      ### ✅ 합격 기준
      오남용 위험 최소 3가지(범위 이탈·파괴·무단 표적·자동화 확산)와 안전 경계 필요성을 분석한다.
    hint: "범위 이탈·파괴·무단 표적·자동화 확산 3+ + 안전 경계(ROE·범위 강제) 필요성 분석."
    verify:
      type: "command_ran"
      expect: "api"
      checks:
        - { id: "as-14-2", type: "command_ran", target: "attacker",
            params: { pattern: "api" } }
      semantic:
        intent: |
          공격 에이전트 오남용 — 공격 능력의 이중용도 위험을 분석.
        success_criteria:
          - "본인 인프라 명령 로그에 호출 흔적이 남음"
          - "오남용 위험 최소 3가지를 분석"
          - "(설명) 안전 경계 필요성을 설명"
        acceptable_methods:
          - "오남용 위험 분석"
        negative_signs:
          - "위험 3개 미만·막연"

blue_missions:
  - order: 1
    assess_target: self
    target_vm: secu
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 공격 에이전트 안전 경계 설계

      공격 능력을 **인가 범위에 가두는** 안전 경계를 설계한다.

      ### 무엇을
      - ROE 하드 게이트(범위·금지 행동·PoC)·범위 검증·범위 밖 중단·킬스위치·감사·최소 능력.

      ### ✅ 합격 기준
      ROE 게이트·범위 검증·킬스위치·감사를 제시하고 "공격 능력은 인가 범위에만" 원칙을 설명한다.
    hint: "ROE 하드 게이트(범위·금지·PoC)+범위 검증·범위 밖 중단+킬스위치·감사+최소 능력. '인가 범위에만' 원칙."
    verify:
      type: "semantic"
      expect: "offensive_roe2"
      semantic:
        intent: |
          공격 에이전트 안전 경계 — ROE 강제·범위 검증·킬스위치·감사로 공격 능력을 통제.
        success_criteria:
          - "ROE 하드 게이트를 제시"
          - "범위 검증·범위 밖 중단을 제시"
          - "킬스위치·감사·최소 능력을 제시하고 원칙 설명"
        acceptable_methods:
          - "ROE 게이트 + 범위 검증 + 킬스위치 + 감사"
        negative_signs:
          - "범위 강제 없음"
          - "킬스위치·감사 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 이중용도·거버넌스 설계

      공격 에이전트의 **이중용도·거버넌스**를 설계한다.

      ### 무엇을
      - 접근 통제(권한·승인·로깅)·오남용 탐지·사용 정책·법/윤리 준수·방어 목적 정렬.

      ### ✅ 합격 기준
      접근 통제·오남용 탐지·정책·정렬을 제시하고 "공격 능력은 거버넌스·책임과 함께" 원칙을 설명한다.
    hint: "사용 권한·승인·로깅+오남용 탐지+사용 정책·법·윤리+방어 목적 정렬. '거버넌스·책임과 함께' 원칙."
    verify:
      type: "semantic"
      expect: "dual_use_gov2"
      semantic:
        intent: |
          이중용도 거버넌스 — 접근 통제·오남용 탐지·정책·정렬로 공격 능력을 책임 있게 운영.
        success_criteria:
          - "접근 통제(권한·승인·로깅)를 제시"
          - "오남용 탐지를 제시"
          - "정책·정렬을 제시하고 원칙 설명"
        acceptable_methods:
          - "접근 통제 + 오남용 탐지 + 정책 + 정렬"
        negative_signs:
          - "거버넌스 없음"
          - "오남용 탐지·정책 없음"
