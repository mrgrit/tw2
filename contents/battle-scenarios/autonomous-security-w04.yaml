id: "autonomous-security-w04"
category: "autonomous-security"
title: "[자율보안 W4] SubAgent 위임 공격 vs A2A 위임 방어·결과 검증"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  SubAgent·원격 실행 공방전 — bastion의 **A2A(Agent-to-Agent) 위임·원격 수행·결과 검증**을 Red/Blue로
  실습한다. Manager 에이전트가 전문 SubAgent에게 임무를 위임하고, 원격 실행 결과를 **검증**하는 흐름을
  공격/방어 관점에서 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(SubAgent에게 공격 임무 위임·검증)와 Blue(위임 대응·결과 검증)를 모두 수행.
    • duel : Red 학생이 SubAgent 위임으로 상대를 공격하고, Blue 학생은 위임 대응·검증으로 방어한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적(Suricata/ModSec/Wazuh)** + 본인 명령 흔적 + **보고서의 위임·검증 설계**로 한다.
    고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — Manager는 임무를 분해해 SubAgent(전문 페르소나)에게 위임하고, 원격 실행
    결과를 **독립 검증**(결과가 실제 성공인지, 환각/오보 아닌지)한다. 위임 사슬은 감사에 남는다.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (SubAgent 위임 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 임무 분해·SubAgent 위임으로 침투

      Manager 관점에서 공격 임무를 **분해**하고, 각 하위 임무를 전문 SubAgent(정찰 SubAgent·웹 침투
      SubAgent)에게 위임하는 흐름으로 대상을 공격한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 el34(192.168.0.161)를 정찰·웹 침투(고유 태그).
      - 임무 분해(정찰/침투/검증)와 각 SubAgent의 역할·입력·출력을 명시.

      ### 권장 명령 (참고)
      ```bash
      # 정찰 SubAgent
      curl -A 'auto-red-<학번>-recon' http://192.168.0.161/
      # 웹 침투 SubAgent
      curl -A 'auto-red-<학번>-exploit' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 임무 분해·SubAgent 위임 설계**(역할·입출력·경계).

      ### ✅ 합격 기준
      대상 WAF/IPS에 탐지 흔적이 남고, 임무 분해와 SubAgent 위임(역할·입출력)을 설명한다.
    hint: "임무를 정찰/침투 SubAgent로 분해·위임하며 대상 공격(태그 auto-red-<학번>). 각 SubAgent 역할·입출력 명시. 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-4-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          A2A 위임 — Manager가 임무를 분해해 전문 SubAgent에게 위임. 원격 수행의 구조를 이해.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "(설명) 임무 분해와 SubAgent 위임(역할·입출력)을 설명"
          - "(설명) 위임 경계·ROE를 명시"
        acceptable_methods:
          - "정찰/침투 SubAgent 분해·위임 공격"
        negative_signs:
          - "탐지 흔적 없음"
          - "위임 구조 설명 없이 명령만"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 원격 실행 결과 검증: 성공/환각 판별

      위임한 SubAgent의 **원격 실행 결과를 검증**한다. 자율 에이전트의 흔한 실패는 "성공했다"고
      보고하지만 실제로는 실패/환각인 경우다. 결과의 진위를 독립 근거로 확인한다.

      ### 어떻게
      - 각 SubAgent 결과(정찰 발견·침투 성공)를 **독립 근거**(대상 응답·탐지 흔적)로 교차 검증.
      - "보고된 성공"과 "실제 증거"를 대조해 환각/오보를 걸러낸다.

      ### ✅ 합격 기준
      SubAgent가 보고한 결과를 독립 근거로 검증하고, 실제 성공과 환각/오보를 구분한 결과를 보고한다.
    hint: "SubAgent 보고 결과를 대상 응답·탐지 흔적으로 교차 검증. '보고된 성공' vs '실제 증거' 대조로 환각 걸러내기."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-4-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          원격 결과 검증 — 위임 결과의 진위를 독립 근거로 확인. 자율 에이전트의 환각/오보를 방지.
        success_criteria:
          - "대상 IPS/WAF에 검증용 활동 탐지 흔적이 남고 고유 태그로 귀속됨"
          - "SubAgent 보고 결과를 독립 근거(대상 응답·탐지)로 교차 검증"
          - "(설명) 실제 성공과 환각/오보를 구분"
        acceptable_methods:
          - "결과 교차 검증 + 환각 판별"
        negative_signs:
          - "보고를 검증 없이 신뢰"
          - "독립 근거 없이 '성공'만 서술"

# ───────────────────────── BLUE (A2A 위임 방어·결과 검증) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 위임 대응: 탐지 SubAgent·대응 SubAgent

      방어 Manager로서 대응 임무를 분해해 SubAgent에게 위임한다: 탐지 SubAgent(경보 조사)·대응
      SubAgent(차단 준비). SIEM 경보를 근거로 위임 흐름을 실행한다.

      ### 어떻게
      - Wazuh/Suricata 경보를 탐지 SubAgent가 조사(출처·심각도).
      - 대응 SubAgent가 차단안을 준비(적용은 검증·승인 후).
      - 각 SubAgent의 역할·입출력·경계를 명시.

      ### ✅ 합격 기준
      공격 경보를 근거로 탐지·대응 SubAgent 위임 흐름을 실행하고 각 역할을 설명한다.
    hint: "탐지 SubAgent(경보 조사)+대응 SubAgent(차단 준비) 위임. Wazuh/Suricata 경보 근거. 역할·입출력·경계 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-4-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          방어 A2A 위임 — 탐지·대응을 전문 SubAgent로 분해·위임. 원격 대응의 구조.
        success_criteria:
          - "Wazuh/Suricata 공격 경보를 근거로 탐지 SubAgent 조사를 수행"
          - "대응 SubAgent 차단안 준비(적용은 검증·승인 후)를 제시"
          - "(설명) 각 SubAgent 역할·입출력·경계를 명시"
        acceptable_methods:
          - "탐지/대응 SubAgent 위임 흐름"
        negative_signs:
          - "경보 근거 없음"
          - "위임 구조 설명 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 위임 결과 검증·신뢰 경계 설계

      위임한 SubAgent 결과를 **검증**하고, 위임 사슬의 **신뢰 경계**를 설계한다.

      ### 무엇을
      - **결과 검증**: SubAgent가 "차단 완료"라고 하면 실제 룰 적용·효과를 독립 확인(환각 방지).
      - **신뢰 경계**: SubAgent 출력은 신뢰되지 않은 것으로 취급 — 검증 후 상위 결정에 반영.
      - **권한 분리**: 조사(자율) vs 변경(승인) 권한 분리, 비가역 조치는 사람 승인.
      - **감사**: 위임 사슬(누가 누구에게 무엇을) append-only 기록.

      ### ✅ 합격 기준
      위임 결과 검증·신뢰 경계·권한 분리·감사를 구체적으로 설계하고, "SubAgent 결과는 검증 후 신뢰"
      원칙을 설명한다.
    hint: "결과 검증(실제 적용·효과 독립 확인)+신뢰 경계(SubAgent 출력=미신뢰)+권한 분리(조사 자율/변경 승인)+위임 사슬 감사. 'SubAgent 결과는 검증 후 신뢰' 원칙."
    verify:
      type: "semantic"
      expect: "delegation_trust"
      semantic:
        intent: |
          위임 신뢰 경계 — SubAgent 결과를 검증하고 신뢰 경계·권한 분리·감사로 안전한 위임. 환각·권한
          남용 방지.
        success_criteria:
          - "결과 검증(실제 적용·효과 독립 확인)을 제시"
          - "신뢰 경계(SubAgent 출력=미신뢰, 검증 후 반영)를 제시"
          - "권한 분리(조사 자율/변경 승인)와 위임 사슬 감사를 제시"
          - "(설명) 'SubAgent 결과는 검증 후 신뢰' 원칙 설명"
        acceptable_methods:
          - "결과 검증 + 신뢰 경계 + 권한 분리 + 감사"
        negative_signs:
          - "SubAgent 결과를 검증 없이 신뢰"
          - "권한 분리·감사 언급 없음"
