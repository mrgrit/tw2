id: "ai-security-w15"
category: "ai-security"
title: "[AI보안활용 W15] 기말: 자율 보안 에이전트 종합 구축 vs 종합 공격 검증"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  기말 캡스톤 공방전 — W01~W14(LLM 로그 분석·프롬프트·룰 생성·취약점 분석·bastion·Playbook·자율 미션·
  Daemon·분산 지식·RL)를 종합해 **자율 보안 에이전트를 구축·검증**한다. Red는 종합 공격으로 에이전트를
  검증하고, Blue는 종합 자율 보안 에이전트를 구축한다. 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(종합 검증 공격)와 Blue(자율 에이전트 구축)를 모두 수행.
    • duel : Red 학생이 종합 공격으로 에이전트를 시험하고, Blue 학생이 자율 에이전트로 대응한다.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue의 에이전트 구축은 el34 GPU 활용, 품질로 semantic 채점.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE 엄수.

# ───────────────────────── RED (종합 검증 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 자율 에이전트 종합 검증 공격

      Blue 자율 에이전트를 검증하는 **종합 다단계 공격**을 수행한다: 정찰→익스플로잇→확산 + 노이즈·
      인젝션·저강도 등 학기 전반 난제를 섞는다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 다단계+난제 혼합 공격(고유 태그).

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 종합 공격 구성**(단계·난제).

      ### ✅ 합격 기준
      다단계+난제(노이즈·인젝션·저강도)를 섞은 종합 검증 공격을 수행해 대상에 흔적을 남기고 구성을 설명한다.
    hint: "정찰→익스플로잇→확산+노이즈·인젝션·저강도 난제 혼합(태그) 종합 검증 공격. 구성 설명. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "ax-15-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          종합 검증 공격 — 다단계+학기 난제를 섞어 자율 에이전트를 종합 시험.
        success_criteria:
          - "대상 WAF/IPS에 종합 공격 흔적이 남고 고유 태그로 귀속됨"
          - "다단계+난제(노이즈·인젝션·저강도)를 섞음"
          - "(설명) 종합 공격 구성을 설명"
        acceptable_methods:
          - "종합 검증 공격 + 구성 설명"
        negative_signs:
          - "탐지 흔적 없음"
          - "단순 공격"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 에이전트 취약·개선점 종합 리포트

      Blue 에이전트의 **취약·개선점**을 종합 리포트한다: 어떤 난제에 약했나(미탐·오분류·환각·과차단·
      게이밍), 어떻게 개선해야 하나.

      ### ✅ 합격 기준
      에이전트가 약했던 지점(파이프라인 단계별)을 종합 리포트하고 개선점을 제시한다.
    hint: "에이전트 약점(미탐·오분류·환각·과차단·게이밍)을 파이프라인 단계별 종합 리포트 + 개선점. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "ax-15-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          에이전트 취약 리포트 — 자율 에이전트의 약점을 단계별로 식별해 개선 근거 제공.
        success_criteria:
          - "대상 IPS/WAF에 관련 흔적이 남고 고유 태그로 귀속됨"
          - "에이전트 약점(미탐·오분류·환각·과차단·게이밍)을 단계별 리포트"
          - "(설명) 개선점을 제시"
        acceptable_methods:
          - "단계별 취약 리포트 + 개선점"
        negative_signs:
          - "취약 식별 없음"

# ───────────────────────── BLUE (자율 보안 에이전트 구축) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 종합 자율 보안 에이전트 구축·운영

      W01~W14를 종합해 **자율 보안 에이전트**를 구축·운영한다.

      ### 어떻게
      - Daemon 상시 관제로 Red 공격 탐지→LLM 트리아지(결정성·보안 프롬프트·결정론 검증)→대응 Playbook
        (승인 게이트)→학습(경험→플레이북).
      - hardness·whitelist·감사·자율성 수준을 적용.

      ### ✅ 합격 기준
      Red 종합 공격을 자율 에이전트(관제→트리아지→대응→학습)로 처리하고, 하네스·게이트·감사를 적용함을
      보인다.
    hint: "Daemon 관제→LLM 트리아지(결정론 검증)→대응 Playbook(승인 게이트)→학습. 하네스·whitelist·감사·자율성 수준 적용."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "ax-15-3", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 3000 } }
      semantic:
        intent: |
          종합 자율 보안 에이전트 — 관제·트리아지·대응·학습을 하네스·게이트·감사와 함께 운영.
        success_criteria:
          - "Daemon 관제로 Red 공격을 탐지·트리아지(결정론 검증)"
          - "대응 Playbook(승인 게이트)·학습(경험→플레이북)을 수행"
          - "(설명) 하네스·whitelist·감사·자율성 수준을 적용"
        acceptable_methods:
          - "관제→트리아지→대응→학습 + 하네스/게이트/감사"
        negative_signs:
          - "경보 근거 없음"
          - "하네스·게이트·감사 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 에이전트 검증·평가·거버넌스 종합

      자율 보안 에이전트를 **검증·평가·거버넌스**로 완성한다.

      ### 무엇을
      - **검증·평가**: 정확도·오탐/미탐·인젝션 저항·환각·게이밍 저항·성능 측정(Red 리포트 반영).
      - **안전 거버넌스**: 자율성 수준·승인 게이트·킬스위치·변조 불가 감사.
      - **정렬**: 보상·정책이 실제 성과에 정렬(reward hacking 방지).
      - **지속 개선**: 취약 반영·회귀 테스트·경험→플레이북 승격.

      ### ✅ 합격 기준
      검증·평가·거버넌스·정렬·지속 개선을 제시하고 "자율 보안 에이전트는 측정·거버넌스·정렬로 신뢰
      가능하게 운영" 원칙을 설명한다.
    hint: "검증·평가(정확도·오탐/미탐·인젝션·환각·게이밍·성능)+거버넌스(자율성·게이트·킬스위치·감사)+정렬+지속 개선. '측정·거버넌스·정렬로 신뢰' 원칙."
    verify:
      type: "semantic"
      expect: "agent_governance"
      semantic:
        intent: |
          에이전트 거버넌스 — 검증·평가·거버넌스·정렬·지속 개선으로 자율 보안 에이전트를 신뢰 가능하게.
        success_criteria:
          - "검증·평가(정확도·오탐/미탐·인젝션·환각·게이밍·성능)를 제시"
          - "안전 거버넌스(자율성·게이트·킬스위치·감사)를 제시"
          - "정렬과 지속 개선(회귀·플레이북 승격)을 제시"
          - "(설명) '측정·거버넌스·정렬로 신뢰 가능하게 운영' 원칙 설명"
        acceptable_methods:
          - "검증 + 거버넌스 + 정렬 + 지속 개선"
        negative_signs:
          - "측정·거버넌스 없이 운영"
          - "정렬·감사 언급 없음"
