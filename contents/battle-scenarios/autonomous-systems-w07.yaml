id: "autonomous-systems-w07"
category: "autonomous-systems"
title: "[자율시스템 W7] 자율주행 공격: 적대적 패치·센서 스푸핑·OTA 변조 vs 다층 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자율주행 공격 공방전 — **적대적 패치·라이다/카메라 스푸핑·OTA 변조**의 사이버→물리 경로와 방어를
  설계·분석한다. 실물 차량·센서가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율주행 공격 경로)와 Blue(다층 방어)를 모두 수행.
    • duel : Red 학생이 공격 경로를 제시하고, Blue 학생이 다층 방어로 대응.

  ▸ 채점(중요)
    실물이 없으므로 **보고서의 설계 품질**로 채점 — 적대적 패치·센서 스푸핑·OTA 변조의 사이버→물리
    경로 구체성, 다층 방어(입력·모델·시스템)·독립 안전 계층의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (자율주행 공격 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 적대적 패치·센서 스푸핑 → 물리 결과

      물리 세계 공격(적대적 패치·센서 스푸핑)이 **인식 오류→위험한 주행 결정**으로 이어지는 경로를
      설계한다.

      ### 무엇을 (택1+ 예시)
      - **적대적 패치**: 표지판/도로에 붙인 패치로 표지판 오분류(정지→속도표지)·차선 오인 → 정지 위반·
        차선 이탈.
      - **라이다 스푸핑**: 위조 반사로 유령 물체(급제동) 또는 실제 물체 은폐(미제동).
      - **카메라 눈부심/블라인딩**: 인식 무력화.

      ### ✅ 합격 기준
      최소 1개 물리 공격(적대적 패치·라이다/카메라 스푸핑)이 인식 오류를 거쳐 구체적 위험 주행 결과로
      이어지는 경로를 단계별로 설계한다.
    hint: "적대적 패치(표지판 오분류)/라이다 스푸핑(유령·은폐)/카메라 블라인딩 → 인식 오류 → 위험 주행(정지 위반·급제동·미제동). 단계별."
    verify:
      type: "semantic"
      expect: "av_physical_attack"
      semantic:
        intent: |
          자율주행 물리 공격 — 물리 세계 조작이 인식 오류를 거쳐 위험한 주행 결정으로 이어지는 경로를 이해.
        success_criteria:
          - "물리 공격(적대적 패치·라이다/카메라 스푸핑) 중 최소 1개를 구체적으로 설계"
          - "인식 오류(오분류·유령·은폐)를 명시"
          - "구체적 위험 주행 결과(정지 위반·급제동·미제동)로 이어짐을 서술"
        acceptable_methods:
          - "적대적 패치·센서 스푸핑 → 물리 경로"
        negative_signs:
          - "기법 불명"
          - "물리 결과 없이 인식만"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — OTA·소프트웨어 공급망 공격 분석

      개별 차량이 아닌 **전 차량**을 노리는 OTA(무선 업데이트)·소프트웨어 공급망 공격을 분석한다.

      ### 무엇을
      - OTA 변조(무서명 업데이트·MITM)로 악성 펌웨어 배포 → 전 차량 영향.
      - 공급망 오염(모델·의존성·부품)으로 백도어·오작동 삽입.
      - 개별 vs 대량(fleet-wide) 영향의 차이.

      ### ✅ 합격 기준
      OTA 변조 또는 공급망 오염 경로를 구체적으로 분석하고, 전 차량 대량 영향(fleet-wide)의 위험을 설명한다.
    hint: "OTA 무서명 업데이트·MITM으로 악성 펌웨어 전 차량 배포 / 공급망 오염(모델·부품 백도어). 대량 영향 위험."
    verify:
      type: "semantic"
      expect: "ota_supply_chain"
      semantic:
        intent: |
          OTA·공급망 공격 — 무선 업데이트·공급망 오염으로 전 차량을 노리는 대량 영향 경로를 이해.
        success_criteria:
          - "OTA 변조(무서명·MITM) 또는 공급망 오염 경로를 구체적으로 분석"
          - "전 차량 대량(fleet-wide) 영향을 설명"
          - "(설명) 개별 vs 대량 영향 차이를 언급"
        acceptable_methods:
          - "OTA 변조·공급망 오염 분석"
        negative_signs:
          - "경로 막연"
          - "대량 영향 언급 없음"

# ───────────────────────── BLUE (다층 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 인식·입력 다층 방어 설계

      물리 공격을 막는 **입력·모델 다층 방어**를 설계한다.

      ### 무엇을
      - **입력 방어**: 적대적 입력 탐지·정화, 센서 신호 정합성(라이다 vs 카메라 vs 레이더 교차 검증).
      - **모델 방어**: 적대적 훈련·앙상블·불확실성 추정.
      - **물리 정합성**: 인식 결과가 물리적으로 타당한지(유령 물체 급출현 배제).

      ### ✅ 합격 기준
      입력 탐지/정화·센서 교차 검증·모델 강건성·물리 정합성을 제시하고 RED 물리 공격에 매핑한다.
    hint: "적대적 입력 탐지/정화+센서 교차 검증(라이다/카메라/레이더)+적대적 훈련·앙상블+물리 정합성. RED 공격 매핑."
    verify:
      type: "semantic"
      expect: "av_layered_defense"
      semantic:
        intent: |
          인식 다층 방어 — 입력·모델·물리 정합성으로 물리 공격에 저항.
        success_criteria:
          - "입력 방어(적대적 탐지·정화·센서 교차 검증)를 제시"
          - "모델 방어(적대적 훈련·앙상블·불확실성)를 제시"
          - "물리 정합성 검사를 제시하고 RED 공격에 매핑"
        acceptable_methods:
          - "입력 + 모델 + 물리 정합성 다층"
        negative_signs:
          - "단일 방어만"
          - "센서 교차/물리 정합성 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 시스템·OTA 보안 + 독립 안전 계층

      OTA·공급망과 시스템 수준 방어, 그리고 **독립 안전 계층**을 설계한다.

      ### 무엇을
      - **OTA 보안**: 서명된 업데이트·보안 부팅·롤백 방지, 단계적 배포(카나리)로 대량 사고 차단.
      - **공급망**: 모델·부품 출처·무결성 검증(W12 자동차 보안과 연계).
      - **독립 안전 계층**: 인식/소프트가 뚫려도 물리 안전을 지키는 독립 안전 시스템(비상 제동·속도
        제한·운전자 개입)과 도메인 분리.

      ### ✅ 합격 기준
      서명 OTA·보안 부팅·단계 배포와 독립 안전 계층(비상 제동)을 제시하고 "소프트가 뚫려도 물리 안전"
      원칙을 설명한다.
    hint: "서명 OTA·보안 부팅·롤백 방지·카나리 배포+공급망 무결성+독립 안전 계층(비상 제동·속도 제한). '소프트 뚫려도 물리 안전' 원칙."
    verify:
      type: "semantic"
      expect: "av_system_safety"
      semantic:
        intent: |
          시스템·OTA 보안 + 독립 안전 — 서명 업데이트·단계 배포와 독립 안전 계층으로 대량 사고와 물리
          위험을 차단.
        success_criteria:
          - "OTA 보안(서명·보안 부팅·롤백 방지·카나리 배포)을 제시"
          - "공급망 무결성 검증을 제시"
          - "독립 안전 계층(비상 제동·속도 제한·도메인 분리)을 제시"
          - "(설명) '소프트가 뚫려도 물리 안전' 원칙 설명"
        acceptable_methods:
          - "OTA 보안 + 공급망 + 독립 안전 계층"
        negative_signs:
          - "독립 안전 계층 없음"
          - "OTA 서명·단계 배포 언급 없음"
