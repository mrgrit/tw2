id: "autonomous-systems-w11"
category: "autonomous-systems"
title: "[자율시스템 W11] OT/ICS 보안: Modbus 인젝션·Stuxnet식 은폐 vs 안전 계장·심층 방어"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  OT/ICS 보안 공방전 — 산업 제어(PLC·Modbus·SCADA)의 공격과 **안전 최우선** 방어를 설계·분석한다.
  실물 ICS가 필요하므로 **설계·서술형**이다(semantic 채점). Stuxnet처럼 사이버 공격이 물리 파괴로
  이어지는 CPS의 대표 사례를 다룬다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(ICS 공격·은폐 경로)와 Blue(안전 계장·심층 방어)를 모두 수행.
    • duel : Red 학생이 ICS 공격 경로를 제시하고, Blue 학생이 안전 우선 방어로 대응.

  ▸ 채점(중요) — **보고서의 설계 품질**로 채점: PLC/Modbus/SCADA 표면과 사이버→물리 경로, Stuxnet식
    은폐(HMI 위장)의 구체성, 안전 계장(SIS)·심층 방어·에어갭의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — ICS 공격은 물리 재앙·인명 위험. 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (ICS 공격·은폐 경로) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — Modbus 인젝션→물리 프로세스 조작 경로

      ICS 프로토콜의 무인증을 악용해 물리 프로세스를 조작하는 경로를 설계한다.

      ### 무엇을
      - **표면**: SCADA/HMI·엔지니어링 워크스테이션·PLC·Modbus/DNP3 프로토콜(무인증·평문).
      - **경로**: 네트워크 진입 → Modbus write(코일/레지스터 조작) 또는 PLC 로직 변조 → 물리 프로세스
        (밸브·모터·설정치) 조작 → 물리 결과(과압·과속·오작동).
      - Purdue 모델 계층(레벨 0~4)에서 어디를 지나는지 명시.

      ### ✅ 합격 기준
      Modbus 인젝션 또는 PLC 로직 변조가 물리 프로세스 조작으로 이어지는 경로를 Purdue 계층과 함께
      구체적으로 설계한다.
    hint: "SCADA/HMI→Modbus write(코일/레지스터)·PLC 로직 변조→밸브/모터/설정치 조작→물리 결과(과압·과속). Purdue 계층 명시."
    verify:
      type: "semantic"
      expect: "ics_attack_path"
      semantic:
        intent: |
          ICS 물리 조작 — 무인증 ICS 프로토콜로 물리 프로세스를 조작하는 사이버→물리 경로를 이해.
        success_criteria:
          - "ICS 표면(SCADA·PLC·Modbus)과 Purdue 계층을 명시"
          - "Modbus write·PLC 로직 변조가 물리 조작으로 이어짐을 설계"
          - "구체적 물리 결과(과압·과속·오작동)를 서술"
        acceptable_methods:
          - "Modbus/PLC 조작 → 물리 프로세스 경로"
        negative_signs:
          - "프로토콜·계층 근거 없이 막연"
          - "물리 결과 없음"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — Stuxnet식 은폐: HMI 위장·센서값 조작

      공격을 **은폐**하는 방법을 분석한다: HMI/오퍼레이터에게 정상값을 보여주며(record-and-replay) 실제
      프로세스를 조작(Stuxnet식).

      ### ✅ 합격 기준
      HMI 위장·센서값 조작(정상값 재생)으로 오퍼레이터를 속이며 물리 조작을 은폐하는 방식을 구체적으로
      분석하고, 왜 탐지가 어려운지 설명한다.
    hint: "HMI에 정상값 재생(record-replay)하며 실제 프로세스 조작(Stuxnet식). 오퍼레이터 기만·탐지 어려움 설명."
    verify:
      type: "semantic"
      expect: "ics_stealth"
      semantic:
        intent: |
          ICS 은폐 — HMI 위장·센서값 조작으로 오퍼레이터를 속이며 물리 조작을 은폐(Stuxnet식).
        success_criteria:
          - "HMI 위장·센서값 조작(정상값 재생) 방식을 구체적으로 분석"
          - "오퍼레이터 기만으로 탐지가 어려운 이유를 설명"
          - "(설명) 독립 물리 계측의 필요성을 언급"
        acceptable_methods:
          - "HMI 위장·record-replay 은폐 분석"
        negative_signs:
          - "은폐 방식이 막연"

# ───────────────────────── BLUE (안전 계장·심층 방어) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — ICS 탐지·이상 감시 설계

      ICS 공격을 **탐지**하는 방안을 설계한다.

      ### 무엇을
      - **프로토콜 탐지**: 비정상 Modbus write·엔지니어링 명령·비인가 출처·PLC 로직 변경.
      - **물리 정합성**: 독립 계측(HMI와 별개 센서)으로 실제값 vs 표시값 대조(은폐 탐지).
      - **베이스라인**: 프로세스 정상 범위·통신 패턴 이탈 탐지.

      ### ✅ 합격 기준
      프로토콜 이상·물리 정합성(독립 계측)·베이스라인 이탈 탐지를 제시하고 Stuxnet식 은폐를 잡는 방법을
      설명한다.
    hint: "비정상 Modbus write·PLC 로직 변경 탐지+독립 계측으로 실제값 vs HMI 표시값 대조(은폐 탐지)+베이스라인 이탈. 은폐 탐지 방법."
    verify:
      type: "semantic"
      expect: "ics_detection"
      semantic:
        intent: |
          ICS 탐지 — 프로토콜·물리 정합성·베이스라인으로 조작과 은폐를 탐지.
        success_criteria:
          - "프로토콜 이상(비정상 write·PLC 변경·비인가 출처) 탐지를 제시"
          - "독립 계측 기반 물리 정합성(실제값 vs 표시값)으로 은폐 탐지를 제시"
          - "(설명) 베이스라인 이탈 탐지를 제시"
        acceptable_methods:
          - "프로토콜 + 물리 정합성 + 베이스라인"
        negative_signs:
          - "물리 정합성(은폐 탐지) 없음"
          - "탐지 신호 막연"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 안전 계장(SIS)·심층 방어 설계 (안전 최우선)

      ICS의 **안전 최우선 심층 방어**를 설계한다. 핵심은 보안과 독립된 안전 계장이다.

      ### 무엇을
      - **안전 계장 시스템(SIS)**: 제어(BPCS)와 독립된 SIS가 위험 상태에서 안전 정지(과압 시 밸브 개방
        등)를 물리·독립적으로 강제.
      - **심층 방어·분리**: Purdue 계층 분리·에어갭/데이터 다이오드·DMZ, 엔지니어링 워크스테이션 통제.
      - **접근 통제·무결성**: PLC 쓰기 보호·로직 서명, 원격 접근 최소화·다요소.
      - **레거시 대응**: 무인증 프로토콜은 분리·모니터링으로 감싸기.

      ### ✅ 합격 기준
      독립 SIS·Purdue 분리·에어갭/다이오드·접근 통제를 제시하고 "보안이 뚫려도 SIS가 물리 안전을
      보장" 안전 최우선 원칙을 설명한다.
    hint: "독립 SIS(제어와 분리, 물리 안전 정지)+Purdue 분리·에어갭/데이터 다이오드+PLC 쓰기 보호·로직 서명+레거시 감싸기. '보안 뚫려도 SIS가 안전 보장' 원칙."
    verify:
      type: "semantic"
      expect: "ics_safety_defense"
      semantic:
        intent: |
          ICS 안전 최우선 방어 — 독립 SIS와 심층 분리로 사이버가 뚫려도 물리 안전을 보장.
        success_criteria:
          - "독립 안전 계장(SIS, 제어와 분리)을 제시"
          - "Purdue 분리·에어갭/데이터 다이오드·DMZ를 제시"
          - "접근 통제(PLC 쓰기 보호·로직 서명)·레거시 대응을 제시"
          - "(설명) '보안 뚫려도 SIS가 물리 안전 보장' 안전 최우선 원칙 설명"
        acceptable_methods:
          - "독립 SIS + 분리 + 접근 통제 + 레거시 대응"
        negative_signs:
          - "독립 SIS 언급 없음"
          - "보안만·안전 계장 관점 없음"
