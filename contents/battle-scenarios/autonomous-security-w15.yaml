id: "autonomous-security-w15"
category: "autonomous-security"
title: "[자율보안 W15] 기말고사: 자율 Purple Team 구축 — 자율 Red↔Blue 순환"
difficulty: "hard"
time_limit: 3600
battle_type: "1v1"
description: |
  기말고사(캡스톤) — 한 학기 전체(ReAct·하니스·위임·Playbook·감사·RL·지식·Watcher·자율 Red/Blue·정책
  최적화)를 종합해 **자율 Purple Team**을 구축한다. 자율 Red가 공격하고 자율 Blue가 방어하며, 그 결과가
  서로의 지식·정책을 개선하는 **Purple 순환**을 완성한다.

  ▸ 평가 성격 — 자율 Red와 자율 Blue의 완결성, 그리고 둘을 잇는 Purple 순환(공격→방어→학습→개선)의
    설계·운영을 평가한다. 점수 비중이 가장 크다.

  ▸ 두 가지 모드
    • solo : 한 학생이 자율 Red와 자율 Blue를 모두 구축하고 Purple 순환을 운영.
    • duel : Red 학생이 자율 공격을, Blue 학생이 자율 방어를 맡아 Purple 순환을 함께 운영.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 자율 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + **보고서의 자율 Red·Purple 설계**로 한다. 고유
    태그(`auto-red-<학번>`)로 귀속. ROE 엄수.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만. ROE(PoC·파괴/유출 금지) 위반은 즉시 실패.

# ───────────────────────── RED (자율 Red + Purple 기여) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 30
    instruction: |
      ## 🎯 RED-1 — 자율 Red 킬체인 + ROE·감사 (Purple 입력)

      자율 Red 에이전트로 킬체인(정찰→침투)을 실행하고, 그 결과를 **Purple 순환의 입력**(Blue가 배울
      공격 데이터)으로 정리한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상 웹(192.168.0.161)을 킬체인 Playbook으로 자율 공격(고유 태그).
      - ROE 게이트·감사·킬스위치 적용. 공격 결과를 Blue가 재현·학습할 수 있게 구조화.

      ### 권장 명령 (참고)
      ```bash
      nmap -sV -Pn 192.168.0.161 -p80,443,8007 --reason
      curl -A 'auto-red-<학번>-purple' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서의 자율 Red 설계(ROE·감사)와 Purple 입력 구조화**.

      ### ✅ 합격 기준
      자율 Red 킬체인을 ROE·감사와 함께 실행해 대상에 흔적을 남기고, Blue가 학습할 수 있게 공격 결과를
      구조화한다.
    hint: "자율 Red 킬체인(태그 auto-red-<학번>)+ROE 게이트·감사·킬스위치. 공격 결과를 Blue 학습용으로 구조화. 채점=대상 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-15-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Red + Purple 입력 — 킬체인을 ROE·감사와 함께 자율 실행하고 결과를 Blue 학습용으로 구조화.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 자율 킬체인 흔적이 남고 고유 태그로 귀속됨"
          - "ROE 게이트·감사·킬스위치를 적용"
          - "(설명) 공격 결과를 Blue가 재현·학습할 수 있게 구조화"
        acceptable_methods:
          - "자율 킬체인 + ROE/감사 + Purple 입력 구조화"
        negative_signs:
          - "흔적 없음"
          - "ROE/감사 없음 또는 Purple 입력 미구조화"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — Purple 순환 설계: 공격→방어→개선

      자율 Red의 공격이 **자율 Blue의 개선으로 이어지는 Purple 순환**을 설계한다.

      ### 무엇을
      - 공격 결과(성공 경로·탐지 여부)를 Blue의 탐지 규칙·경험 갱신으로 연결하는 피드백 루프.
      - 다음 라운드에 Red가 어떻게 진화(우회)하고 Blue가 어떻게 대응하는지, 반복으로 양쪽이 강해지는
        메커니즘을 설계.

      ### ✅ 합격 기준
      공격→방어 개선→진화된 공격→개선의 Purple 순환을 설계하고, 반복으로 양쪽이 강해지는 메커니즘을
      설명한다.
    hint: "공격 결과→Blue 규칙·경험 갱신→진화된 공격→개선의 Purple 피드백 루프 설계. 반복 강화 메커니즘."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-15-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          Purple 순환 설계 — 공격·방어를 잇는 피드백으로 양쪽을 반복 강화. 자율 Purple의 핵심.
        success_criteria:
          - "대상 IPS에 관련 흔적이 남음(고유 태그)"
          - "공격→방어 개선→진화 공격의 Purple 순환을 설계"
          - "(설명) 반복으로 양쪽이 강해지는 메커니즘을 설명"
        acceptable_methods:
          - "Purple 피드백 루프 설계"
        negative_signs:
          - "순환 없이 단발 공격만"

# ───────────────────────── BLUE (자율 Blue + Purple 순환 운영) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 자율 Blue 대응 + 공격 학습

      자율 Blue로 RED의 킬체인을 탐지→트리아지→대응하고, 그 공격을 **학습**해 규칙·경험을 갱신한다.

      ### 어떻게
      - Watcher가 RED 공격을 포착 → ReAct 트리아지 → 대응 Playbook(게이트).
      - 공격 경로·태그를 Experience/규칙에 갱신해 다음 라운드 탐지를 강화.
      - 자율성 수준·감사를 명시.

      ### ✅ 합격 기준
      RED 공격을 자율 대응하고, 공격을 학습해 규칙·경험을 갱신하며, 자율성 수준·감사를 설명한다.
    hint: "Watcher→ReAct 트리아지→대응(게이트)로 RED 공격 처리 + 공격 경로·태그를 Experience/규칙에 갱신. 자율성·감사 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-15-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Blue 대응·학습 — 공격을 자율 처리하고 경험·규칙을 갱신해 다음 라운드를 강화.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 탐지·자율 대응"
          - "공격 경로·태그를 Experience/규칙에 갱신"
          - "(설명) 자율성 수준·감사를 명시"
        acceptable_methods:
          - "자율 대응 + 공격 학습"
        negative_signs:
          - "공격 근거 없음"
          - "학습 갱신·감사 설명 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 자율 Purple Team 아키텍처·운영 종합

      자율 Red와 자율 Blue를 잇는 **Purple Team 아키텍처**를 종합한다.

      ### 무엇을
      - **Purple 순환**: 자율 Red 공격 → 자율 Blue 대응·학습 → 개선 → 진화 공격의 폐루프.
      - **공유 지식·감사**: KG/Experience 공유(신뢰·오염 관리), 변조 불가 감사로 양쪽 행동 기록.
      - **안전·정렬·거버넌스**: ROE·자율성 수준·에스컬레이션·정책 정렬(보상 해킹 방지)·킬스위치.
      - **지속 개선**: 라운드마다 커버리지·강건성 측정, 사각지대 보완.

      ### ✅ 합격 기준
      Purple 순환·공유 지식/감사·안전 거버넌스·지속 개선을 종합한 자율 Purple Team 아키텍처를 제시하고,
      "자율 Red·Blue가 순환하며 함께 강해진다" 원칙을 설명한다.
    hint: "Purple 순환(Red↔Blue 폐루프)+공유 지식/변조 불가 감사+안전 거버넌스(ROE·자율성·정렬·킬스위치)+지속 개선. '순환하며 함께 강화' 원칙."
    verify:
      type: "semantic"
      expect: "autonomous_purple_team"
      semantic:
        intent: |
          자율 Purple Team — 자율 Red·Blue를 순환으로 잇고 공유 지식·감사·안전 거버넌스로 지속 개선.
          학기 전체 종합.
        success_criteria:
          - "Purple 순환(자율 Red↔Blue 폐루프)을 제시"
          - "공유 지식(신뢰·오염 관리)·변조 불가 감사를 제시"
          - "안전 거버넌스(ROE·자율성 수준·정렬·킬스위치)와 지속 개선을 제시"
          - "(설명) '자율 Red·Blue가 순환하며 함께 강해진다' 원칙 설명"
        acceptable_methods:
          - "Purple 순환 + 공유 지식/감사 + 거버넌스 + 개선"
        negative_signs:
          - "Red 또는 Blue 한쪽만"
          - "안전 거버넌스·감사 언급 없음"
