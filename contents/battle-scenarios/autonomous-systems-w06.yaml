id: "autonomous-systems-w06"
category: "autonomous-systems"
title: "[자율시스템 W6] 자율주행 인식 파이프라인 공격면 분석 vs 견고한 인식·센서 퓨전"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자율주행 기초 공방전 — **AI 인식 모델·센서 퓨전·의사결정** 파이프라인의 공격면과 방어를 설계·분석
  한다. 실물 차량·센서가 필요하므로 **설계·서술형**이다(semantic 채점).

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(인식 파이프라인 공격면)와 Blue(견고한 인식·퓨전)를 모두 수행.
    • duel : Red 학생이 인식 공격면을 제시하고, Blue 학생이 견고한 인식으로 대응.

  ▸ 채점(중요)
    실물이 없으므로 **보고서의 설계 품질**로 채점 — 센서(카메라·라이다·레이더)→인식→퓨전→의사결정
    파이프라인 매핑, 각 단계 공격면의 구체성, 견고한 인식·퓨전·중복성 방어의 구체성. 근거 없는 일반론 불인정.

  ▸ 윤리 — 인가된 훈련 범위의 설계·분석.

# ───────────────────────── RED (인식 파이프라인 공격면 분석) ─────────────────────────
red_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 25
    instruction: |
      ## 🎯 RED-1 — 인식 파이프라인 공격면 매핑

      자율주행 인식 파이프라인(센서 입력→AI 인식→센서 퓨전→의사결정→제어)을 매핑하고 각 단계의
      **공격면**을 분석한다.

      ### 무엇을
      - 센서별 입력(카메라·라이다·레이더·GPS)과 각 단계의 취약: 센서 스푸핑(입력)·적대적 입력(인식)·
        퓨전 교란·의사결정 오도.
      - 어느 단계를 공격하면 어떤 오작동(오분류·유령 물체·미탐)이 나는지 매핑.

      ### ✅ 합격 기준
      인식 파이프라인 단계를 매핑하고, 최소 2개 단계의 구체적 공격면(센서·모델·퓨전)을 실제 기법으로
      분석한다.
    hint: "센서 입력→AI 인식→퓨전→의사결정 파이프라인 + 각 단계 공격면(센서 스푸핑·적대적 입력·퓨전 교란). 오작동 매핑."
    verify:
      type: "semantic"
      expect: "perception_attack_surface"
      semantic:
        intent: |
          자율주행 인식 공격면 — 파이프라인 각 단계의 취약을 매핑해 오작동 경로를 이해.
        success_criteria:
          - "인식 파이프라인(센서→인식→퓨전→의사결정) 단계를 매핑"
          - "최소 2개 단계의 구체적 공격면(센서 스푸핑·적대적 입력·퓨전 교란)을 분석"
          - "공격이 유발하는 오작동(오분류·유령 물체·미탐)을 서술"
        acceptable_methods:
          - "단계별 공격면 + 오작동 매핑"
        negative_signs:
          - "파이프라인 매핑 없음"
          - "공격면이 막연"

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-2 — 센서 퓨전 신뢰 가정 분석

      센서 퓨전이 깔고 있는 **신뢰 가정**(센서는 대체로 정직하다·다수결이면 안전)의 허점을 분석한다.
      한 센서만 속여도 퓨전이 오도되는 경우, 여러 센서를 동시에 속이는 경우를 논한다.

      ### ✅ 합격 기준
      센서 퓨전의 신뢰 가정을 식별하고, 단일/다중 센서 스푸핑이 퓨전 결과를 오도하는 조건을 구체적으로
      분석한다.
    hint: "'센서는 정직·다수결이면 안전' 가정 허점. 단일 센서 스푸핑이 퓨전 오도/여러 센서 동시 스푸핑 조건 분석."
    verify:
      type: "semantic"
      expect: "fusion_trust"
      semantic:
        intent: |
          센서 퓨전 신뢰 가정 — 퓨전이 전제하는 센서 신뢰가 깨질 때의 오도 조건을 이해.
        success_criteria:
          - "센서 퓨전의 신뢰 가정(센서 정직·다수결)을 식별"
          - "단일/다중 센서 스푸핑이 퓨전을 오도하는 조건을 분석"
          - "(설명) 퓨전이 만능이 아님을 언급"
        acceptable_methods:
          - "신뢰 가정 식별 + 오도 조건 분석"
        negative_signs:
          - "신뢰 가정 식별 없음"
          - "오도 조건이 막연"

# ───────────────────────── BLUE (견고한 인식·센서 퓨전) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 25
    instruction: |
      ## 🛡️ BLUE-1 — 견고한 인식·이상 탐지 설계

      RED의 인식 공격에 견고한 **인식과 이상 탐지**를 설계한다.

      ### 무엇을
      - **견고한 인식**: 적대적 훈련·입력 정화·불확실성 추정(신뢰도 낮으면 보수적 판단).
      - **이상 탐지**: 센서 신호 이상·물리적으로 불가능한 인식(갑자기 나타난 물체)·시간 일관성 검사.
      - **신뢰도 기반 판단**: 인식 신뢰도가 낮으면 안전측(감속·정지)으로.

      ### ✅ 합격 기준
      적대적 강건 인식·이상 탐지·신뢰도 기반 판단을 구체적으로 제시하고 RED 공격에 매핑한다.
    hint: "적대적 훈련·입력 정화·불확실성 추정+이상 탐지(물리 불가능·시간 일관성)+신뢰도 낮으면 보수적. RED 공격 매핑."
    verify:
      type: "semantic"
      expect: "robust_perception"
      semantic:
        intent: |
          견고한 인식 — 적대적 강건성·이상 탐지·신뢰도 기반 판단으로 인식 공격에 저항.
        success_criteria:
          - "견고한 인식(적대적 훈련·입력 정화·불확실성 추정)을 제시"
          - "이상 탐지(물리 불가능·시간 일관성)를 제시"
          - "(설명) 신뢰도 낮을 때 보수적 판단과 RED 공격 매핑"
        acceptable_methods:
          - "강건 인식 + 이상 탐지 + 신뢰도 기반 판단"
        negative_signs:
          - "단일 모델 방어만"
          - "신뢰도·이상 탐지 언급 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 중복 센서 퓨전·안전 의사결정 설계

      단일 센서 스푸핑에 강건한 **중복 센서 퓨전과 안전 의사결정**을 설계한다.

      ### 무엇을
      - **중복·다양성**: 이종 센서(카메라·라이다·레이더) 중복, 물리 원리가 다른 센서로 상호 검증.
      - **정합성 검사·이상 배제**: 센서 간 불일치 시 이상 센서 배제·저하 운용.
      - **안전 의사결정**: 불확실·모순 시 안전측 결정(감속·정지·인간 개입), 독립 안전 계층(비상 제동).

      ### ✅ 합격 기준
      이종 센서 중복·정합성 검사·안전 의사결정·독립 안전 계층을 제시하고 "모순되면 안전측으로" 원칙을
      설명한다.
    hint: "이종 센서 중복(물리 원리 다름)+정합성 검사·이상 센서 배제+안전 의사결정(불확실→안전측)+독립 비상 제동. '모순되면 안전측' 원칙."
    verify:
      type: "semantic"
      expect: "safe_fusion"
      semantic:
        intent: |
          중복 센서 퓨전·안전 의사결정 — 이종 중복·정합성·안전측 결정으로 스푸핑에 강건.
        success_criteria:
          - "이종 센서 중복·다양성(상호 검증)을 제시"
          - "정합성 검사·이상 센서 배제·저하 운용을 제시"
          - "안전 의사결정(불확실→안전측)·독립 안전 계층(비상 제동)을 제시"
          - "(설명) '모순되면 안전측으로' 원칙 설명"
        acceptable_methods:
          - "이종 중복 + 정합성 + 안전 결정 + 독립 안전"
        negative_signs:
          - "동종 센서만·안전측 결정 없음"
          - "독립 안전 계층 언급 없음"
