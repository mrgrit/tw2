id: "autonomous-security-w11"
category: "autonomous-security"
title: "[자율보안 W11] 자율 Blue Agent 구축: 탐지→트리아지→대응→학습 자율 파이프라인"
difficulty: "hard"
time_limit: 3000
battle_type: "1v1"
description: |
  자율 Blue 에이전트 공방전 — W02~W10의 원칙(ReAct·하니스·위임·Playbook·감사·경험·Watcher)을 모아
  **완전한 자율 방어 에이전트**를 구축한다. Red는 이 자율 Blue를 검증하기 위한 공격을 제공하고, Blue는
  탐지→트리아지→대응→학습의 자율 루프를 구축·운영한다.

  ▸ 두 가지 모드
    • solo : 한 학생이 Red(자율 Blue 검증용 공격)와 Blue(자율 방어 에이전트 구축)를 모두 수행.
    • duel : Red 학생이 다양한 공격으로 상대의 자율 Blue를 시험하고, Blue 학생은 자율 파이프라인으로 대응.

  ▸ 공격 위치·채점(중요)
    Red는 **외부 공격자 VM({{ATTACKER_IP}})** 에서 대상(el34, 192.168.0.161)을 공격한다. Red 채점은
    **대상 탐지 흔적** + 본인 명령 흔적 + 보고서. Blue는 자기 인프라(self)에서 자율 방어 파이프라인을
    구축·설명한다. 고유 태그(`auto-red-<학번>`)로 귀속.

  ▸ 자율 보안 관점(bastion) — 자율 Blue = 상시 감시(Watcher)→탐지(ReAct 트리아지)→대응(Playbook·게이트)
    →학습(Experience 갱신)의 폐루프. 자율성 수준(조회 자율·차단 승인)과 감사가 핵심.

  ▸ 윤리 — 인가된 훈련 인프라(el34)에서만.

# ───────────────────────── RED (자율 Blue 검증용 공격) ─────────────────────────
red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 — 다양한 공격으로 자율 Blue 시험

      상대의 자율 Blue 에이전트를 검증하기 위해, **서로 다른 유형의 공격**(정찰·웹 침투·저속)을 대상에
      가한다. 자율 Blue가 각 유형을 탐지·대응하는지 관찰한다.

      ### 어디서 / 무엇을
      - 외부 공격자 VM({{ATTACKER_IP}})에서 대상(192.168.0.161)에 최소 2가지 유형 공격(고유 태그).
      - 각 공격이 자율 Blue에 어떻게 탐지/대응됐는지(또는 놓쳤는지) 관찰·기록.

      ### 권장 명령 (참고)
      ```bash
      nmap -sS -Pn 192.168.0.161 -p1-500 --reason
      curl -A 'auto-red-<학번>-test' "http://192.168.0.161/vulnerabilities/sqli/?id=1' OR '1'='1"
      ```

      ### 📌 채점 방식
      대상 탐지 흔적 + 본인 명령 흔적 + **보고서에 공격 유형별 자율 Blue 반응 관찰**.

      ### ✅ 합격 기준
      최소 2가지 유형 공격을 가해 대상에 흔적을 남기고, 자율 Blue의 탐지/대응(또는 미탐)을 관찰·기록한다.
    hint: "정찰·웹 침투 등 2+ 유형 공격(태그 auto-red-<학번>)으로 자율 Blue 시험 + 반응 관찰. 채점=대상 ModSec/Suricata 흔적."
    verify:
      type: "log_contains"
      expect: "attack"
      checks:
        - { id: "red-11-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Blue 검증 공격 — 다양한 유형으로 방어 에이전트의 커버리지를 시험.
        success_criteria:
          - "대상 WAF(ModSec)/IPS에 공격 흔적이 남고 고유 태그로 귀속됨"
          - "최소 2가지 유형 공격을 가함"
          - "(설명) 자율 Blue의 유형별 반응(탐지/대응/미탐)을 관찰·기록"
        acceptable_methods:
          - "다유형 공격 + 반응 관찰"
        negative_signs:
          - "흔적 없음"
          - "단일 유형·반응 관찰 없음"

  - order: 2
    assess_target: opponent
    target_vm: ips
    points: 20
    instruction: |
      ## 🎯 RED-2 — 자율 Blue 사각지대 리포트

      시험 결과로 자율 Blue의 **사각지대**를 리포트한다: 어떤 공격 유형·타이밍·기법을 놓쳤고, 자율
      파이프라인의 어느 단계(탐지·트리아지·대응)에서 실패했는지.

      ### ✅ 합격 기준
      자율 Blue가 놓친 사각지대를 파이프라인 단계별로 리포트하고 개선점을 제안한다.
    hint: "자율 Blue가 놓친 공격/타이밍/기법을 파이프라인 단계(탐지·트리아지·대응)별로 리포트 + 개선 제안."
    verify:
      type: "log_contains"
      expect: "scan"
      checks:
        - { id: "red-11-2", type: "log_contains", target: "ips",
            params: { log: "suricata", pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 Blue 사각지대 리포트 — 방어 파이프라인의 실패 단계를 식별해 개선 근거 제공.
        success_criteria:
          - "대상 IPS에 관련 흔적이 남음(고유 태그)"
          - "자율 Blue 사각지대를 파이프라인 단계별로 리포트"
          - "(설명) 개선점을 제안"
        acceptable_methods:
          - "단계별 사각지대 리포트 + 개선 제안"
        negative_signs:
          - "사각지대 식별 없이 '방어 약함'만"

# ───────────────────────── BLUE (자율 방어 에이전트 구축) ─────────────────────────
blue_missions:
  - order: 1
    assess_target: self
    target_vm: siem
    points: 30
    instruction: |
      ## 🛡️ BLUE-1 — 자율 방어 폐루프 구축: 탐지→트리아지→대응

      **자율 방어 파이프라인**을 구축·운영한다: Watcher 감시 → ReAct 트리아지 → Playbook 대응(게이트).
      RED의 공격을 이 파이프라인으로 처리한다.

      ### 어떻게
      - Watcher가 Wazuh/Suricata 신호를 상시 감시해 트리거.
      - ReAct 트리아지로 위협 판정(출처·심각도·경험 상관).
      - 대응 Playbook으로 차단안 준비(고위험은 승인 게이트).
      - 각 단계의 자율성 수준·게이트·감사를 명시.

      ### ✅ 합격 기준
      RED 공격을 감시→트리아지→대응 준비까지 자율 파이프라인으로 처리하고, 각 단계의 자율성 수준·게이트·
      감사를 설명한다.
    hint: "Watcher 감시→ReAct 트리아지→Playbook 대응(승인 게이트) 폐루프로 RED 공격 처리. 자율성 수준·게이트·감사 명시."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-11-1", type: "wazuh_alert", target: "siem",
            params: { pattern: "auto-red", since_sec: 1800 } }
      semantic:
        intent: |
          자율 방어 폐루프 — 감시·트리아지·대응을 자율 파이프라인으로 통합하고 게이트·감사로 안전하게.
        success_criteria:
          - "Wazuh/Suricata에서 RED 공격을 감시·포착"
          - "ReAct 트리아지→대응 Playbook 준비를 실행"
          - "(설명) 각 단계 자율성 수준·게이트·감사를 명시"
        acceptable_methods:
          - "감시→트리아지→대응 자율 파이프라인"
        negative_signs:
          - "공격 근거 없음"
          - "게이트·자율성 수준 설명 없음"

  - order: 2
    assess_target: self
    target_vm: secu
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 — 학습 루프·운영 설계: 폐루프 완성

      자율 방어를 **학습·개선하는 폐루프**로 완성한다.

      ### 무엇을
      - **학습**: 대응 결과·오탐/미탐을 Experience에 갱신해 다음 판정 개선(경험 재사용).
      - **자기 평가**: 자율 Blue가 놓친 사각지대(RED 리포트 반영)를 정기 평가·보완.
      - **운영·안전**: 자율성 수준·에스컬레이션·변조 불가 감사·정렬(보상 해킹 방지)로 지속 운영.
      - **폐루프**: 감시→탐지→대응→학습→(개선)→감시.

      ### ✅ 합격 기준
      학습·자기 평가·운영 안전을 갖춘 자율 방어 폐루프를 설계하고, "자율 Blue는 학습으로 계속 나아진다"
      원칙을 설명한다.
    hint: "학습(Experience 갱신)+자기 평가(사각지대 보완)+운영 안전(자율성·감사·정렬). 감시→탐지→대응→학습 폐루프. '학습으로 개선' 원칙."
    verify:
      type: "semantic"
      expect: "autonomous_blue_loop"
      semantic:
        intent: |
          자율 Blue 학습 폐루프 — 대응 결과를 경험으로 학습하고 자기 평가·안전 운영으로 지속 개선.
        success_criteria:
          - "학습(Experience 갱신, 오탐/미탐 반영)을 제시"
          - "자기 평가(사각지대 보완)를 제시"
          - "운영 안전(자율성 수준·감사·정렬)과 감시→…→학습 폐루프를 제시"
          - "(설명) '자율 Blue는 학습으로 계속 나아진다' 원칙 설명"
        acceptable_methods:
          - "학습 + 자기 평가 + 안전 운영 폐루프"
        negative_signs:
          - "학습 루프 없이 정적 대응만"
          - "감사·정렬 언급 없음"
