id: "compliance-w11"
category: "compliance"
title: "[컴플라이언스 W11] 위험관리 — 취약점 악용 vs 위험 식별·평가·완화"
difficulty: "medium"
time_limit: 2700
battle_type: "1v1"
description: |
  컴플라이언스 11주차 — **위험관리**. 자산의 취약점을 식별·평가하고 위험을 완화한다. 공격자는 미식별 취약점을
  악용하고, 감사자(너)는 취약점 탐지·완화 통제를 구현하고 위험 평가를 증적으로 입증한다.

  ▸ 이야기: 공격자가 미식별 취약점을 악용해(태그 `co11r1`) 위험 노출 흔적(`/tmp/.co11risk`)과 계정 `compa11` 을 남긴다.
    감사자는 ① 취약점 악용 탐지, ② 위험 완화 룰, ③ 위험 식별·평가·완화 종합·증적으로 대응한다.

  ▸ 모드: solo/duel. 공격자=외부 공격자 VM(192.168.0.202)(192.168.0.202), Red 채점=대상 흔적(WAF audit 태그/위험 파일·계정).
  ▸ 마커: 태그 **`co11r1-<본인id>`**, 위험 노출 **`/tmp/.co11risk`**(마커 `co11`), 계정 **`compa11`**,
    Suricata **sid 9811011**, Wazuh **id 104111**. 종료 시 cleanup.

red_missions:
  - order: 1
    assess_target: opponent
    target_vm: web
    points: 20
    instruction: |
      ## 🎯 RED-1 [취약점 악용] — 미식별 취약점 공략

      ### 상황
      위험관리의 출발은 취약점 식별이다. 너는 태그 `co11r1-<본인id>` 로 미식별 취약점을 악용해 위험을 입증한다.

      ### 할 일 (외부 공격자 VM 192.168.0.202)
      ```bash
      curl -s -A "co11r1-kim" -H "Host: dvwa.6v6.lab" \
        "http://192.168.0.161/vulnerabilities/sqli/?id=co11r1-kim%27%20UNION%20SELECT%201--+&Submit=Submit"
      ```
      ### 채점 방법 / 합격 기준
      대상 WAF audit 에 태그 `co11r1` 흔적 시 인정.
    hint: "태그(co11r1) 취약점 악용 → 대상 modsec audit. 채점: log_contains modsec co11r1."
    verify:
      type: "log_contains"
      expect: "co11r1"
      checks:
        - { id: "red-1-1", type: "log_contains", target: "web",
            params: { log: "modsec", pattern: "co11r1", since_sec: 1800 } }
      semantic:
        intent: "미식별 취약점 악용(T1190) — 위험관리 공백. 태그(co11r1) 귀속."
        success_criteria: ["대상 WAF audit 에 co11r1 태그", "악용 취약점/위험 서술"]
        acceptable_methods: ["외부 공격자 VM(192.168.0.202) 에서 태그 단 취약점 악용"]
        negative_signs: ["태그 누락 / 대상 미도달"]

  - order: 2
    assess_target: opponent
    target_vm: web
    points: 15
    instruction: |
      ## 🎯 RED-2 [위험 노출] — 미완화 위험 산출물 + 계정

      ### 상황
      미완화 위험은 사고로 이어진다. 너는 위험 노출 산출물 **`/tmp/.co11risk`**(마커 `co11`)과 계정 **`compa11`** 을 남긴다.

      ### 할 일
      ```bash
      printf 'co11 unmitigated risk: critical CVE unpatched, exploitable' > /tmp/.co11risk
      sudo useradd -m -s /bin/bash compa11
      ```
      ### 채점 방법 / 합격 기준
      `/tmp/.co11risk`(마커 `co11`) 또는 `compa11` 존재 시 인정.
    hint: "위험 노출 /tmp/.co11risk (마커 co11) + useradd compa11. 채점: file_contains risk co11 + file_contains passwd compa11."
    verify:
      type: "file_contains"
      expect: "co11"
      checks:
        - { id: "red-2-1", type: "file_contains", target: "web",
            params: { path: "/tmp/.co11risk", pattern: "co11" } }
        - { id: "red-2-2", type: "file_contains", target: "web",
            params: { path: "/etc/passwd", pattern: "compa11" } }
      semantic:
        intent: "미완화 위험(T1190) + 계정(T1136) — 위험 평가/완화 부재."
        success_criteria: ["/tmp/.co11risk(마커 co11) 또는 계정 compa11", "미완화 위험 서술"]
        acceptable_methods: ["위험 산출물 + useradd"]
        negative_signs: ["흔적 미생성"]

blue_missions:
  - order: 1
    assess_target: self
    target_vm: ips
    points: 22
    instruction: |
      ## 🛡️ BLUE-1 [취약점 악용 탐지] — Suricata 룰 (sid 9811011)

      ### 할 일
      ```
      alert http any any -> any any (msg:"COMPLIANCE-W11 risk: vulnerability exploit attempt"; flow:to_server; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; sid:9811011; rev:1;)
      ```
      ```bash
      sudo suricatasc -c reload-rules
      ```
      ### 채점 방법 / 합격 기준
      ips 의 `local.rules` 에 sid 9811011 룰 존재 시 인정.
    hint: "취약점 악용 탐지 Suricata 룰(sid 9811011) → reload. 채점: file_contains local.rules 9811011."
    verify:
      type: "file_contains"
      expect: "9811011"
      checks:
        - { id: "blue-1-1", type: "file_contains", target: "ips",
            params: { path: "/etc/suricata/rules/local.rules", pattern: "9811011" } }
      semantic:
        intent: "위험 완화 — 취약점 악용 탐지 Suricata 룰. 위험 모니터링."
        success_criteria: ["local.rules 에 sid 9811011", "위험 탐지 의의"]
        acceptable_methods: ["Suricata 룰 작성 + reload"]
        negative_signs: ["패턴 부정확 / 문법 오류"]

  - order: 2
    assess_target: self
    target_vm: siem
    points: 20
    instruction: |
      ## 🛡️ BLUE-2 [위험 완화] — Wazuh 룰 (id 104111)

      ### 할 일
      ```xml
      <group name="edu,risk,">
        <rule id="104111" level="12">
          <if_group>edu</if_group>
          <match>compa11</match>
          <description>COMPLIANCE-W11 - risk mgmt: unmitigated risk / account</description>
        </rule>
      </group>
      ```
      ```bash
      sudo /var/ossec/bin/wazuh-control restart
      ```
      ### 채점 방법 / 합격 기준
      `local_rules.xml` 에 id 104111 룰 존재 시 인정.
    hint: "위험 완화 Wazuh 룰(id 104111) → restart. 채점: file_contains local_rules.xml 104111."
    verify:
      type: "file_contains"
      expect: "104111"
      checks:
        - { id: "blue-2-1", type: "file_contains", target: "siem",
            params: { path: "/var/ossec/etc/rules/local_rules.xml", pattern: "104111" } }
      semantic:
        intent: "위험 완화 — 미완화 위험/계정 Wazuh 룰. 위험 통제 구현."
        success_criteria: ["local_rules.xml 에 rule id 104111", "위험 완화 탐지 로직"]
        acceptable_methods: ["Wazuh 룰 작성 + restart"]
        negative_signs: ["탐지 로직 부실 / XML 오류"]

  - order: 3
    assess_target: self
    target_vm: siem
    points: 18
    instruction: |
      ## 🛡️ BLUE-3 [위험 식별·평가·완화 종합·증적]

      ### 할 일
      보고서에:
      - 위험 식별(자산×위협×취약점) + 위험 평가(가능성×영향, 위험 등급) + 완화 계획(수용/감소/전가/회피)
      - 위험 노출(`/tmp/.co11risk`)·계정(compa11) 헌팅
      ```bash
      sudo tail -200 /var/ossec/logs/alerts/alerts.json | \
        python3 -c 'import sys,json;[print(json.loads(l).get("rule",{}).get("id")) for l in sys.stdin if l.strip()]' | sort | uniq -c | sort -rn | head
      ```
      ### 채점 방법 / 합격 기준
      본인 SIEM 에 최근 경보 + 제출한 위험 평가 증적으로 인정.
    hint: "위험 식별(자산×위협×취약점) + 평가(가능성×영향/등급) + 완화(수용/감소/전가/회피) + 노출/계정 헌팅. 채점: wazuh_alert + 제출."
    verify:
      type: "wazuh_alert"
      expect: "alert"
      checks:
        - { id: "blue-3-1", type: "wazuh_alert", target: "siem", params: { since_sec: 1800 } }
      semantic:
        intent: "위험관리 종합·증적 — 식별/평가/완화. 분석형 — 위험 등급/완화 전략 제시 시 점수 상승."
        success_criteria:
          - "최근 경보 수집 확인"
          - "위험 식별 + 평가(가능성×영향/등급) + 완화 계획"
          - "위험 노출/계정 헌팅"
        acceptable_methods: ["위험 평가표 + 완화 + 헌팅"]
        negative_signs: ["평가/완화 누락"]
